ingly%2520degrades%2520accuracy%2520for%2520some%2520perturbation%2520classes%252C%2520indicating%2520that%2520selective%2520application%2520is%2520necessary.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.22072v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Understanding%20Artificial%20Theory%20of%20Mind%3A%20Perturbed%20Tasks%20and%20Reasoning%20in%20Large%20Language%20Models&entry.906535625=Christian%20Nickel%20and%20Laura%20Schrewe%20and%20Florian%20Mai%20and%20Lucie%20Flek&entry.1292438233=Theory%20of%20Mind%20%28ToM%29%20refers%20to%20an%20agent%27s%20ability%20to%20model%20the%20internal%20states%20of%20others.%20Contributing%20to%20the%20debate%20whether%20large%20language%20models%20%28LLMs%29%20exhibit%20genuine%20ToM%20capabilities%2C%20our%20study%20investigates%20their%20ToM%20robustness%20using%20perturbations%20on%20false-belief%20tasks%20and%20examines%20the%20potential%20of%20Chain-of-Thought%20prompting%20%28CoT%29%20to%20enhance%20performance%20and%20explain%20the%20LLM%27s%20decision.%20We%20introduce%20a%20handcrafted%2C%20richly%20annotated%20ToM%20dataset%2C%20including%20classic%20and%20perturbed%20false%20belief%20tasks%2C%20the%20corresponding%20spaces%20of%20valid%20reasoning%20chains%20for%20correct%20task%20completion%2C%20subsequent%20reasoning%20faithfulness%2C%20task%20solutions%2C%20and%20propose%20metrics%20to%20evaluate%20reasoning%20chain%20correctness%20and%20to%20what%20extent%20final%20answers%20are%20faithful%20to%20reasoning%20traces%20of%20the%20generated%20CoT.%20We%20show%20a%20steep%20drop%20in%20ToM%20capabilities%20under%20task%20perturbation%20for%20all%20evaluated%20LLMs%2C%20questioning%20the%20notion%20of%20any%20robust%20form%20of%20ToM%20being%20present.%20While%20CoT%20prompting%20improves%20the%20ToM%20performance%20overall%20in%20a%20faithful%20manner%2C%20it%20surprisingly%20degrades%20accuracy%20for%20some%20perturbation%20classes%2C%20indicating%20that%20selective%20application%20is%20necessary.&entry.1838667208=http%3A//arxiv.org/abs/2602.22072v1&entry.124074799=Read"},
{"title": "GeoMotion: Rethinking Motion Segmentation via Latent 4D Geometry", "author": "Xiankang He and Peile Lin and Ying Cui and Dongyan Guo and Chunhua Shen and Xiaoqin Zhang", "abstract": "Motion segmentation in dynamic scenes is highly challenging, as conventional methods heavily rely on estimating camera poses and point correspondences from inherently noisy motion cues. Existing statistical inference or iterative optimization techniques that struggle to mitigate the cumulative errors in multi-stage pipelines often lead to limited performance or high computational cost. In contrast, we propose a fully learning-based approach that directly infers moving objects from latent feature representations via attention mechanisms, thus enabling end-to-end feed-forward motion segmentation. Our key insight is to bypass explicit correspondence estimation and instead let the model learn to implicitly disentangle object and camera motion. Supported by recent advances in 4D scene geometry reconstruction (e.g., $\u03c0^3$), the proposed method leverages reliable camera poses and rich spatial-temporal priors, which ensure stable training and robust inference for the model. Extensive experiments demonstrate that by eliminating complex pre-processing and iterative refinement, our approach achieves state-of-the-art motion segmentation performance with high efficiency. The code is available at:https://github.com/zjutcvg/GeoMotion.", "link": "http://arxiv.org/abs/2602.21810v1", "date": "2026-02-25", "relevancy": 2.5147, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6391}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6229}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.617}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GeoMotion%3A%20Rethinking%20Motion%20Segmentation%20via%20Latent%204D%20Geometry&body=Title%3A%20GeoMotion%3A%20Rethinking%20Motion%20Segmentation%20via%20Latent%204D%20Geometry%0AAuthor%3A%20Xiankang%20He%20and%20Peile%20Lin%20and%20Ying%20Cui%20and%20Dongyan%20Guo%20and%20Chunhua%20Shen%20and%20Xiaoqin%20Zhang%0AAbstract%3A%20Motion%20segmentation%20in%20dynamic%20scenes%20is%20highly%20challenging%2C%20as%20conventional%20methods%20heavily%20rely%20on%20estimating%20camera%20poses%20and%20point%20correspondences%20from%20inherently%20noisy%20motion%20cues.%20Existing%20statistical%20inference%20or%20iterative%20optimization%20techniques%20that%20struggle%20to%20mitigate%20the%20cumulative%20errors%20in%20multi-stage%20pipelines%20often%20lead%20to%20limited%20performance%20or%20high%20computational%20cost.%20In%20contrast%2C%20we%20propose%20a%20fully%20learning-based%20approach%20that%20directly%20infers%20moving%20objects%20from%20latent%20feature%20representations%20via%20attention%20mechanisms%2C%20thus%20enabling%20end-to-end%20feed-forward%20motion%20segmentation.%20Our%20key%20insight%20is%20to%20bypass%20explicit%20correspondence%20estimation%20and%20instead%20let%20the%20model%20learn%20to%20implicitly%20disentangle%20object%20and%20camera%20motion.%20Supported%20by%20recent%20advances%20in%204D%20scene%20geometry%20reconstruction%20%28e.g.%2C%20%24%CF%80%5E3%24%29%2C%20the%20proposed%20method%20leverages%20reliable%20camera%20poses%20and%20rich%20spatial-temporal%20priors%2C%20which%20ensure%20stable%20training%20and%20robust%20inference%20for%20the%20model.%20Extensive%20experiments%20demonstrate%20that%20by%20eliminating%20complex%20pre-processing%20and%20iterative%20refinement%2C%20our%20approach%20achieves%20state-of-the-art%20motion%20segmentation%20performance%20with%20high%20efficiency.%20The%20code%20is%20available%20at%3Ahttps%3A//github.com/zjutcvg/GeoMotion.%0ALink%3A%20http e%2520model.%2520Extensive%2520experiments%2520demonstrate%2520that%2520by%2520eliminating%2520complex%2520pre-processing%2520and%2520iterative%2520refinement%252C%2520our%2520approach%2520achieves%2520state-of-the-art%2520motion%2520segmentation%2520performance%2520with%2520high%2520efficiency.%2520The%2520code%2520is%2520available%2520at%253Ahttps%253A//github.com/zjutcvg/GeoMotion.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.21810v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GeoMotion%3A%20Rethinking%20Motion%20Segmentation%20via%20Latent%204D%20Geometry&entry.906535625=Xiankang%20He%20and%20Peile%20Lin%20and%20Ying%20Cui%20and%20Dongyan%20Guo%20and%20Chunhua%20Shen%20and%20Xiaoqin%20Zhang&entry.1292438233=Motion%20segmentation%20in%20dynamic%20scenes%20is%20highly%20challenging%2C%20as%20conventional%20methods%20heavily%20rely%20on%20estimating%20camera%20poses%20and%20point%20correspondences%20from%20inherently%20noisy%20motion%20cues.%20Existing%20statistical%20inference%20or%20iterative%20optimization%20techniques%20that%20struggle%20to%20mitigate%20the%20cumulative%20errors%20in%20multi-stage%20pipelines%20often%20lead%20to%20limited%20performance%20or%20high%20computational%20cost.%20In%20contrast%2C%20we%20propose%20a%20fully%20learning-based%20approach%20that%20directly%20infers%20moving%20objects%20from%20latent%20feature%20representations%20via%20attention%20mechanisms%2C%20thus%20enabling%20end-to-end%20feed-forward%20motion%20segmentation.%20Our%20key%20insight%20is%20to%20bypass%20explicit%20correspondence%20estimation%20and%20instead%20let%20the%20model%20learn%20to%20implicitly%20disentangle%20object%20and%20camera%20motion.%20Supported%20by%20recent%20advances%20in%204D%20scene%20geometry%20reconstruction%20%28e.g.%2C%20%24%CF%80%5E3%24%29%2C%20the%20proposed%20method%20leverages%20reliable%20camera%20poses%20and%20rich%20spatial-te {"title": "RABot: Reinforcement-Guided Graph Augmentation for Imbalanced and Noisy Social Bot Detection", "author": "Longlong Zhang and Xi Wang and Haotong Du and Yangyi Xu and Zhuo Liu and Yang Liu", "abstract": "Social bot detection is pivotal for safeguarding the integrity of online information ecosystems. Although recent graph neural network (GNN) solutions achieve strong results, they remain hindered by two practical challenges: (i) severe class imbalance arising from the high cost of generating bots, and (ii) topological noise introduced by bots that skillfully mimic human behavior and forge deceptive links. We propose the Reinforcement-guided graph Augmentation social Bot detector (RABot), a multi-granularity graph-augmentation framework that addresses both issues in a unified manner. RABot employs a neighborhood-aware oversampling strategy that linearly interpolates minority-class embeddings within local subgraphs, thereby stabilizing the decision boundary under low-resource regimes. Concurrently, a reinforcement-learning-driven edge-filtering module combines similarity-based edge features with adaptive threshold optimization to excise spurious interactions during message passing, yielding a cleaner topology. Extensive experiments on three real-world benchmarks and four GNN backbones demonstrate that RABot consistently surpasses state-of-the-art baselines. In addition, since its augmentation and filtering modules are orthogonal to the underlying architecture, RABot can be seamlessly integrated into existing GNN pipelines to boost performance with minimal overhead.", "link": "http://arxiv.org/abs/2602.21749v1", "date": "2026-02-25", "relevancy": 2.5142, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.512}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5083}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4883}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RABot%3A%20Reinforcement-Guided%20Graph%20Augmentation%20for%20Imbalanced%20and%20Noisy%20Social%20Bot%20Detection&body=Title%3A%20RABot%3A%20Reinforcement-Guided%20Graph%20Augmentation%20for%20Imbalanced%20and%20Noisy%20Social%20Bot%20Detection%0AAuthor%3A%20Longlong%20Zhang%20and%20Xi%20Wang%20and%20Haotong%20Du%20and%20Yangyi%20Xu%20and%20Zhuo%20Liu%20and%20Yang%20Liu%0AAbstract%3A%20Social%20bot%20detection%20is%20pivotal%20for%20safeguarding%20the%20integrity%20of%20online%20information%20ecosystems.%20Although%20recent%20graph%20neural%20network%20%28GNN%29%20solutions%20achieve%20strong%20results%2C%20they%20remain%20hindered%20by%20two%20practical%20challenges%3A%20%28i%29%20severe%20class%20imbalance%20arising%20from%20the%20high%20cost%20of%20generating%20bots%2C%20and%20%28ii%29%20topological%20noise%20introduced%20by%20bots%20that%20skillfully%20mimic%20human%20behavior%20and%20forge%20deceptive%20links.%20We%20propose%20the%20Reinforcement-guided%20graph%20Augmentation%20social%20Bot%20detector%20%28RABot%29%2C%20a%20multi-granularity%20graph-augmentation%20framework%20that%20addresses%20both%20issues%20in%20a%20unified%20manner.%20RABot%20employs%20a%20neighborhood-aware%20oversampling%20strategy%20that%20linearly%20interpolates%20minority-class%20embeddings%20within%20local%20subgraphs%2C%20thereby%20stabilizing%20the%20decision%20boundary%20under%20low-resource%20regimes.%20Concurrently%2C%20a%20reinforcement-learning-driven%20edge-filtering%20module%20combines%20similarity-based%20edge%20features%20with%20adaptive%20threshold%20optimization%20to%20excise%20spurious%20interactions%20during%20message%20passing%2C%20yielding%20a%20cleaner%20topology.%20Extensive%20experiments%20on%20three%20real-world%20benchmarks%20and%20four%20GNN%20backbones%20demonstrate%20that%20RABot%20consistently%20surpasses%20state-of-the-art%20baselines.%20In%20addition%2C%20since%20its%20augmentation%20and%20filtering%20modules%20are%20orthogonal%20to%20the%20underlying%20architecture%2C%20RABot%20can%20be%20seamlessly%20integrated%20into%20existing%20GNN%20pipelines%20to%20boost%20performance%20with%20minimal%20overhead.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21749v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRABot%253A%2520Reinforcement-Guided%2520Graph%2520Augmentation%2520for%2520Imbalanced%2520and%2520Noisy%2520Social%2520Bot%2520Detection%26entry.906535625%3DLonglong%2520Zhang%2520and%2520Xi%2520Wang%2520and%2520Haotong%2520Du%2520and%2520Yangyi%2520Xu%2520and%2520Zhuo%2520Liu%2520and%2520Yang%2520Liu%26entry.1292438233%3DSocial%2520bot%2520detection%2520is%2520pivotal%2520for%2520safeguarding%2520the%2520integrity%2520of%2520online%2520information%2520ecosystems.%2520Although%2520recent%2520graph%2520neural%2520network%2520%2528GNN%2529%2520solutions%2520achieve%2520strong%2520results%252C%2520they%2520remain%2520hindered%2520by%2520two%2520practical%2520challenges%253A%2520%2528i%2529%2520severe%2520class%2520imbalance%2520arising%2520from%2520the%2520high%2520cost%2520of%2520generating%2520bots%252C%2520and%2520%2528ii%2529%2520topological%2520noise%2520introduced%2520by%2520bots%2520that%2520skillfully%2520mimic%2520human%2520behavior%2520and%2520forge%2520deceptive%2520links.%2520We%2520propose%2520the%2520Reinforcement-guided%2520graph%2520Augmentation%2520social%2520Bot%2520detector%2520%2528RABot%2529%252C%2520a%2520multi-granularity%2520graph-augmentation%2520framework%2520that%2520addresses%2520both%2520issues%2520in%2520a%2520unified%2520manner.%2520RABot%2520employs%2520a%2520neighborhood-aware%2520oversampling%2520strategy%2520that%2520linearly%2520interpolates%2520minority-class%2520embeddings%2520within%2520local%2520subgraphs%252C%2520thereby%2520stabilizing%2520the%2520decision%2520boundary%2520under%2520low-resource%2520regimes.%2520Concurrently%252C%2520a%2520reinforcement-learning-driven%2520edge-filtering%2520module%2520combines%2520similarity-based%2520edge%2520features%2520with%2520adaptive%2520threshold%2520optimization%2520to%2520excise%2520spurious%2520interactions%2520during%2520message%2520passing%252C%2520yielding%2520a%2520cleaner%2520topology.%2520Extensive%2520experiments%2520on%2520three%2520real-world%2520benchmarks%2520and%2520four%2520GNN%2520backbones%2520demonstrate%2520that%2520RABot%2520consistently%2520surpasses%2520state-of-the-art%2520baselines.%2520In%2520addition%252C%2520since%2520its%2520augmentation%2520and%2520filtering%2520modules%2520are%2520orthogonal%2520to%2520the%2520underlying%2520architecture%252C%2520RABot%2520can%2520be%2520seamlessly%2520integrated%2520into%2520existing%2520GNN%2520pipelines%2520to%2520boost%2520performance%2520with%2520minimal%2520overhead.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.21749v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=RABot%3A%20Reinforcement-Guided%20Graph%20Augmentation%20for%20Imbalanced%20and%20Noisy%20Social%20Bot%20Detection&entry.906535625=Longlong%20Zhang%20and%20Xi%20Wang%20and%20Haotong%20Du%20and%20Yangyi%20Xu%20and%20Zhuo%20Liu%20and%20Yang%20Liu&entry.1292438233=Social%20bot%20detection%20is%20pivotal%20for%20safeguarding%20the%20integrity%20of%20online%20information%20ecosystems.%20Although%20recent%20graph%20neural%20network%20%28GNN%29%20solutions%20achieve%20strong%20results%2C%20they%20remain%20hindered%20by%20two%20practical%20challenges%3A%20%28i%29%20severe%20class%20imbalance%20arising%20from%20the%20high%20cost%20of%20generating%20bots%2C%20and%20%28ii%29%20topological%20noise%20introduced%20by%20bots%20that%20skillfully%20mimic%20human%20behavior%20and%20forge%20deceptive% {"title": "DynamicGTR: Leveraging Graph Topology Representation Preferences to Boost VLM Capabilities on Graph QAs", "author": "Yanbin Wei and Jiangyue Yan and Chun Kang and Yang Chen and Hua Liu and James Kwok and Yu Zhang", "abstract": "Vision-Language Models (VLMs) have emerged as versatile solutions for zero-shot question answering (QA) across various domains. However, enabling VLMs to effectively comprehend structured graphs and perform accurate, efficient QA remains challenging. Existing approaches typically rely on one single graph topology representation (GTR), such as fixed-style visual images or unified text descriptions. This ``one-size-fits-all'' strategy often neglects model-specific and task-specific preferences, resulting in inaccurate or over-lengthy responses to graph-related queries. To address this, we propose the $\\mbox{DynamicGTR}$ framework, which dynamically selects the optimal GTR for each query during inference, thereby enhancing the zero-shot graph QA capabilities of VLMs with a customizable accuracy and brevity trade-off. Extensive experiments show that DynamicGTR not only improves VLM-based graph algorithm QA performance but also successfully transfers the experience trained from synthetic graph algorithm tasks to real-world applications like link prediction and node classification, without any additional training. Additionally, DynamicGTR demonstrates strong transferability across tasks, domains, and models, suggesting its potential as a flexible solution for broad graph scenarios.", "link": "http://arxiv.org/abs/2602.21864v1", "date": "2026-02-25", "relevancy": 2.5063, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5068}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5019}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/ abilities%2520of%2520VLMs%2520with%2520a%2520customizable%2520accuracy%2520and%2520brevity%2520trade-off.%2520Extensive%2520experiments%2520show%2520that%2520DynamicGTR%2520not%2520only%2520improves%2520VLM-based%2520graph%2520algorithm%2520QA%2520performance%2520but%2520also%2520successfully%2520transfers%2520the%2520experience%2520trained%2520from%2520synthetic%2520graph%2520algorithm%2520tasks%2520to%2520real-world%2520applications%2520like%2520link%2520prediction%2520and%2520node%2520classification%252C%2520without%2520any%2520additional%2520training.%2520Additionally%252C%2520DynamicGTR%2520demonstrates%2520strong%2520transferability%2520across%2520tasks%252C%2520domains%252C%2520and%2520models%252C%2520suggesting%2520its%2520potential%2520as%2520a%2520flexible%2520solution%2520for%2520broad%2520graph%2520scenarios.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.21864v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=DynamicGTR%3A%20Leveraging%20Graph%20Topology%20Representation%20Preferences%20to%20Boost%20VLM%20Capabilities%20on%20Graph%20QAs&entry.906535625=Yanbin%20Wei%20and%20Jiangyue%20Yan%20and%20Chun%20Kang%20and%20Yang%20Chen%20and%20Hua%20Liu%20and%20James%20Kwok%20and%20Yu%20Zhang&entry.1292438233=Vision-Language%20Models%20%28VLMs%29%20have%20emerged%20as%20versatile%20solutions%20for%20zero-shot%20question%20answering%20%28QA%29%20across%20various%20domains.%20However%2C%20enabling%20VLMs%20to%20effectively%20comprehend%20structured%20graphs%20and%20perform%20accurate%2C%20efficient%20QA%20remains%20challenging.%20Existing%20approaches%20typically%20rely%20on%20one%20single%20graph%20topology%20representation%20%28GTR%29%2C%20such%20as%20fixed-style%20visual%20images%20or%20unified%20text%20descriptions.%20This%20%60%60one-size-fits-all%27%27%20strategy%20often%20neglects%20model-specific%20and%20task-specific%20preferences%2C%20resulting%20 {"title": "From Statics to Dynamics: Physics-Aware Image Editing with Latent Transition Priors", "author": "Liangbing Zhao and Le Zhuo and Sayak Paul and Hongsheng Li and Mohamed Elhoseiny", "abstract": "Instruction-based image editing has achieved remarkable success in semantic alignment, yet state-of-the-art models frequently fail to render physically plausible results when editing involves complex causal dynamics, such as refraction or material deformation. We attribute this limitation to the dominant paradigm that treats editing as a discrete mapping between image pairs, which provides only boundary conditions and leaves transition dynamics underspecified. To address this, we reformulate physics-aware editing as predictive physical state transitions and introduce PhysicTran38K, a large-scale video-based dataset comprising 38K transition trajectories across five physical domains, constructed via a two-stage filtering and constraint-aware annotation pipeline. Building on this supervision, we propose PhysicEdit, an end-to-end framework equipped with a textual-visual dual-thinking mechanism. It combines a frozen Qwen2.5-VL for physically grounded reasoning with learnable transition queries that provide timestep-adaptive visual guidance to a diffusion backbone. Experiments show that PhysicEdit improves over Qwen-Image-Edit by 5.9% in physical realism and 10.1% in knowledge-grounded editing, setting a new state-of-the-art for open-source methods, while remaining competitive with leading proprietary models.", "link": "http://arxiv.org/abs/2602.21778v1", "date": "2026-02-25", "relevancy": 2.5005, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6594}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.6051}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5988}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Statics%20to%20Dynamics%3A%20Physics-Aware%20Image%20Editing%20with%20Latent%20Transition%20Priors&body=Title%3A%20From%20Statics%20to%20Dynamics%3A%20Physics-Aware%20Image%20Editing%20with%20Latent%20Transition%20Priors%0AAuthor%3A%20Liangbing%20Zhao%20and%20Le%20Zhuo%20and%20Sayak%20Paul%20and%20Hongsheng%20Li%20and%20Mohamed%20Elhoseiny%0AAbstract%3A%20Instruction-based%20image%20editing%20has%20achieved%20remarkable%20success%20in%20semantic%20alignment%2C%20yet%20state-of-the-art%20models%20frequently%20fail%20to%20render%20physically%20plausible%20results%20when%20editing%20involves%20complex%20causal%20dynamics%2C%20such%20as%20refraction%20or%20material%20deformation.%20We%20attribute%20this%20limitation%20to%20the%20dominant%20paradigm%20that%20treats%20editing%20as%20a%20discrete%20mapping%20between%20image%20pairs%2C%20which%20provides%20only%20boundary%20conditions%20and%20leaves%20transition%20dynamics%20underspecified.%20To%20address%20this%2C%20we%20reformulate%20physics-aware%20editing%20as%20predictive%20physical%20state%20transitions%20and%20introduce%20PhysicTran38K%2C%20a%20large-scale%20video-based%20dataset%20comprising%2038K%20transition%20trajectories%20across%20five%20physical%20domains%2C%20constructed%20via%20a%20two-stage%20filtering%20and%20constraint-aware%20annotation%20pipeline.%20Building%20on%20this%20supervision%2C%20we%20propose%20PhysicEdit%2C%20an%20end-to-end%20framework%20equipped%20with%20a%20textual-visual%20dual-thinking%20mechanism.%20It%20combines%20a%20frozen%20Qwen2.5-VL%20for%20physically%20grounded%20reasoning%20with%20learnable%20transition%20queries%20that%20provide%20timestep-adaptive%20visual%20guidance%20to%20a%20diffusion%20backbone.%20Experiments%20show%20that%20PhysicEdit%20improves%20over%20Qwen-Image-Edit%20by%205.9%25%20in%20physical%20realism%20and%2010.1%25%20in%20knowledge-grounded%20editing%2C%20setting%20a%20new%20state-of-the-art%20for%20open-source%20methods%2C%20while%20remaining%20competitive%20with%20leading%20proprietary%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21778v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Statics%2520to%2520Dynamics%253A%2520Physics-Aware%2520Image%2520Editing%2520with%2520Latent%2520Transition%2520Priors%26entry.906535625%3DLiangbing%2520Zhao%2520and%2520Le%2520Zhuo%2520and%2520Sayak%2520Paul%2520and%2520Hongsheng%2520Li%2520and%2520Mohamed%2520Elhoseiny%26entry.1292438233%3DInstruction-based%2520image%2520editing%2520has%2520achieved%2520remarkable%2520success%2520in%2520semantic%2520alignment%252C%2520yet%2520state-of-the-art%2520models%2520frequently%2520fail%2520to%2520render%2520physically%2520plausible%2520results%2520when%2520editing%2520involves%2520complex%2520causal%2520dynamics%252C%2520such%2520as%2520refraction%2520or%2520material%2520deformation.%2520We%2520attribute%2520this%2520limitation%2520to%2520the%2520dominant%2520paradigm%2520that%2520treats%2520editing%2520as%2520a%2520discrete%2520mapping%2520between%2520image%2520pairs%252C%2520which%2520provides%2520only%2520boundary%2520conditions%2520and%2520leaves%2520transition%2520dynamics%2520underspecified.%2520To%2520address%2520this%252C%2520we%2520reformulate%2520physics-aware%2520editing%2520as%2520predictive%2520physical%2520state%2520transitions%2520and%2520introduce%2520PhysicTran38K%252C%2520a%2520large-scale%2520video-based%2520dataset%2520comprising%252038K%2520transition%2520trajectories%2520across%2520five%2520physical%2520domains%252C%2520constructed%2520via%2520a%2520two-stage%2520filtering%2520and%2520constraint-aware%2520annotation%2520pipeline.%2520Building%2520on%2520this%2520supervision%252C%2520we%2520propose%2520PhysicEdit%252C%2520an%2520end-to-end%2520framework%2520equipped%2520with%2520a%2520textual-visual%2520dual-thinking%2520mechanism.%2520It%2520combines%2520a%2520frozen%2520Qwen2.5-VL%2520for%2520physically%2520grounded%2520reasoning%2520with%2520learnable%2520transition%2520queries%2520that%2520provide%2520timestep-adaptive%2520visual%2520guidance%2520to%2520a%2520diffusion%2520backbone.%2520Experiments%2520show%2520that%2520PhysicEdit%2520improves%2520over%2520Qwen-Image-Edit%2520by%25205.9%2525%2520in%2520physical%2520realism%2520and%252010.1%2525%2520in%2520knowledge-grounded%2520editing%252C%2520setting%2520a%2520new%2520state-of-the-art%2520for%2520open-source%2520methods%252C%2520while%2520remaining%2520competitive%2520with%2520leading%2520proprietary%2520models.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.21778v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=From%20Statics%20to%20Dynamics%3A%20Physics-Aware%20Image%20Editing%20with%20Latent%20Transition%20Priors&entry.906535625=Liangbing%20Zhao%20and%20Le%20Zhuo%20and%20Sayak%20Paul%20and%20Hongsheng%20Li%20and%20Mohamed%20Elhoseiny&entry.1292438233=Instruction-based%20image%20editing%20has%20achieved%20remarkable%20success%20in%20semantic%20alignment%2C%20yet%20state-of-the-art%20models%20frequently%20fail%20to%20render%20physically%20plausible%20results%20when%20editing%20involves%20complex%20causal%20dynamics%2C%20such%20as%20refraction%20or%20material%20deformation.%20We%20attribute%20this%20limitation%20to%20the%20dominant%20paradigm%20that%20treats%20editing%20as%20a%20discrete%20mapping%20between%20image%20pairs%2C%20which%20provides%20only%20boundary%20conditions%20and%20leaves%20transition%20dynamics%20underspecified.%20To%20address%20this%2C%20we%20reformulate%20physics-aware%20editing%20as%20predictive%20physical%20state%20transitions%20and%20introduce%20PhysicTran38K%2C%20a%20large-scale%20video-based%20dataset%20comprising%2038K%20transition%20trajectories%20across%20five%20physical%20domains%2C%20constructed%20via%20a%20two-stage%20filtering%20and%20constraint-aware%20annotation%20pipeline.%20Building%20on%20this%20supervision%2C%20we%20propose%20PhysicEdit%2C%20an%20end-to-end%20framework%20equipped%20with%20a%20textual-visual%20dual-thinking%20mechanism.%20It%20combines%20a%20frozen%20Qwen2.5-VL%20for%20physically%20grounded%20reasoning%20with%20learnable%20transition%20queries%20that%20provide%20timestep-adaptive%20visual%20guidance%20to%20a%20diffusion%20backbone.%20Experiments%20show%20that%20PhysicEdit%20improves%20over%20Qwen-Image-Edit%20by%205.9%25%20in%20physical%20realism%20and%2010.1%25%20in%20knowledge-grounded%20editing%2C%20setting%20a%20new%20state-of-the-art%20for%20open-source%20methods%2C%20while%20remaining%20competitive%20with%20leading%20proprietary%20models.&entry.1838667208=http%3A//arxiv.org/abs/2602.21778v1&entry.124074799=Read"},
{"title": "UNet-Based Keypoint Regression for 3D Cone Localization in Autonomous Racing", "author": "Mariia Baidachna and James Carty and Aidan Ferguson and Joseph Agrane and Varad Kulkarni and Aubrey Agub and Michael Baxendale and Aaron David and Rachel Horton and Elliott Atkinson", "abstract": "Accurate cone localization in 3D space is essential in autonomous racing for precise navigation around the track. Approaches that rely on traditional computer vision algorithms are sensitive to environmental variations, and neural networks are often trained on limited data and are infeasible to run in real time. We present a UNet-based neural network for keypoint detection on cones, leveraging the largest custom-labeled dataset we have assembled. Our approach enables accurate cone position estimation and the potential for color prediction. Our model achieves substantial improvements in keypoint accuracy over conventional methods. Furthermore, we leverage our predicted keypoints in the perception pipeline and evaluate the end-to-end autonomous system. Our results show high-quality performance across all metrics, highlighting the effectiveness of this approach and its potential for adoption in competitive autonomous racing systems.", "link": "http://arxiv.org/abs/2602.21904v1", "date": "2026-02-25", "relevancy": 2.4982, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6722}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5915}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.588}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20UNet-Based%20Keypoint%20Regression%20for%203D%20Cone%20Localization%20in%20Autonomou {"title": "Rethinking Flexible Graph Similarity Computation: One-step Alignment with Global Guidance", "author": "Zhouyang Liu and Ning Liu and Yixin Chen and Jiezhong He and Shuai Ma and Dongsheng Li", "abstract": "Graph Edit Distance (GED) is a widely used measure of graph similarity, valued for its flexibility in encoding domain knowledge through operation costs. However, existing learning-based approximation methods follow a modeling paradigm that decouples local candidate match selection from both operation costs and global dependencies between matches. This decoupling undermines their ability to capture the intrinsic flexibility of GED and often forces them to rely on costly iterative refinement to obtain accurate alignments. In this work, we revisit the formulation of GED and revise the prevailing paradigm, and propose Graph Edit Network (GEN), an implementation of the revised formulation that tightly integrates cost-aware expense estimation with globally guided one-step alignment. Specifically, GEN incorporates operation costs into node matching expenses estimation, ensuring match decisions respect the specified cost setting. Furthermore, GEN models match dependencies within and across graphs, capturing each match's impact on the overall alignment. These designs enable accurate GED approximation without iterative refinement. Extensive experiments on real-world and synthetic benchmarks demonstrate that GEN achieves up to a 37.8% reduction in GED predictive errors, while increasing inference throughput by up to 414x. These results highlight GEN's practical efficiency and the effectiveness of the revision. Beyond this implementation, our revision provides a principled framework for advancing learning-based GED approximation.", "link": "http://arxiv.org/abs/2504.06533v3", "date": "2026-02-25", "relevancy": 2.4676, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5234}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4882}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.469}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Rethinking%20Flexible%20Graph%20Similarity%20Computation%3A%20One-step%20Alignment%20with%20Global%20Guidance&body=Title%3A%20Rethinking%20Flexible%20Graph%20Similarity%20Computation%3A%20One-step%20Alignment%20with%20Global%20Guidance%0AAuthor%3A%20Zhouyang%20Liu%20and%20Ning%20Liu%20and%20Yixin%20Chen%20and%20Jiezhong%20He%20and%20Shuai%20Ma%20and%20Dongsheng%20Li%0AAbstract%3A%20Graph%20Edit%20Distance%20%28GED%29%20is%20a%20widely%20used%20measure%20of%20graph%20similarity%2C%20valued%20for%20its%20flexibility%20in%20encoding%20domain%20knowledge%20through%20operation%20costs.%20However%2C%20existing%20learning-based%20approximation%20methods%20follow%20a%20modeling%20paradigm%20that%20decouples%20local%20candidate%20match%20selection%20from%20both%20operation%20costs%20and%20global%20dependencies%20between%20matches.%20This%20decoupling%20undermines%20their%20ability%20to%20capture%20the%20intrinsic%20flexibility%20of%20GED%20and%20often%20forces%20them%20to%20rely%20on%20costly%20iterative%20refinement%20to%20obtain%20accurate%20alignments.%20In%20this%20work%2C%20we%20revisit%20the%20formulation%20of%20GED%20and%20revise%20the%20prevailing%20paradigm%2C%20and%20propose%20Graph%20Edit%20Network%20%28GEN%29%2C%20an%20implementation%20of%20the%20revised%20formulation%20that%20tightly%20integrates%20cost-aware%20expense%20estimation%20with%20globally%20guided%20one-step%20alignment.%20Specifically%2C%20GEN%20incorporates%20operation%20costs%20into%20node%20matching%20expenses%20estimation%2C%20ensuring%20match%20decisions%20respect%20the%20specified%20cost%20setting.%20Furthermore%2C%20GEN%20models%20match%20dependencies%20within%20and%20across%20graphs%2C%20capturing%20each%20match%27s%20impact%20on%20the%20overall%20alignment.%20These%20designs%20enable%20accurate%20GED%20approximation%20without%20iterative%20refinement.%20Extensive%20experiments%20on%20real-world%20and%20synthetic%20benchmarks%20demonstrate%20that%20GEN%20achieves%20up%20to%20a%2037.8%25%20reduction%20in%20GED%20predictive%20errors%2C%20while%20increasing%20inference%20throughput%20by%20up%20to%20414x.%20These%20results%20highlight%20GEN%27s%20practical%20efficiency%20and%20the%20effectiveness%20of%20the%20revision.%20Beyond%20this%20implementation%2C%20our%20revision%20provides%20a%20principled%20framework%20for%20advancing%20learning-based%20GED%20approximation.%0ALink%3A%20http%3A//arxiv.org/abs/2504.06533v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRethinking%2520Flexible%2520Graph%2520Similarity%2520Computation%253A%2520One-step%2520Alignment%2520with%2520Global%2520Guidance%26entry.906535625%3DZhouyang%2520Liu%2520and%2520Ning%2520Liu%2520and%2520Yixin%2520Chen%2520and%2520Jiezhong%2520He%2520and%2520Shuai%2520Ma%2520and%2520Dongsheng%2520Li%26entry.1292438233%3DGraph%2520Edit%2520Distance%2520%2528GED%2529%2520is%2520a%2520widely%2520used%2520measure%2520of%2520graph%2520similarity%252C%2520valued%2520for%2520its%2520flexibility%2520in%2520encoding%2520domain%2520knowledge%2520through%2520operation%2520costs.%2520However%252C%2520existing%2520learning-based%2520approximation%2520methods%2520follow%2520a%2520modeling%2520paradigm%2520that%2520decouples%2520local%2520candidate%2520match%2520selection%2520from%2520both%2520operation%2520costs%2520and%2520global%2520dependencies%2520between%2520matches.%2520This%2520decoupling%2520undermines%2520their%2520ability%2520to%2520capture%2520the%2520intrinsic%2520flexibility%2520of%2520GED%2520and%2520often%2520forces%2520them%2520to%2520rely%2520on%2 {"title": "PanoEnv: Exploring 3D Spatial Intelligence in Panoramic Environments with Reinforcement Learning", "author": "Zekai Lin and Xu Zheng", "abstract": "360 panoramic images are increasingly used in virtual reality, autonomous driving, and robotics for holistic scene understanding. However, current Vision-Language Models (VLMs) struggle with 3D spatial reasoning on Equirectangular Projection (ERP) images due to geometric distortion and limited 3D supervision. We introduce PanoEnv, a large-scale VQA benchmark built from synthetic 3D environments, containing 14.8K questions across five categories (e.g., relative position, volume comparison) grounded in accurate 3D annotations including depth, segmentation, and bounding boxes. Benchmarking 14 state-of-the-art VLMs reveals limited 3D understanding, achieving only 49.34% overall accuracy and 8.36% on open-ended (OE) questions. To enhance 3D reasoning, we propose a reinforcement learning post-training framework based on Group Relative Policy Optimization (GRPO) with a ground-truth-guided reward that incorporates five geometry-aware strategies such as distance tolerance and spatial consistency. A two-stage curriculum further mitigates catastrophic forgetting: Stage 1 trains on structured tasks (true/false and multiple choice), and Stage 2 fine-tunes on mixed open-ended data to improve generalization. Our 7B model achieves new state-of-the-art performance, improving overall accuracy to 52.93% (+3.59%) and open-ended accuracy to 14.83% while maintaining structured-task performance. It also achieves top semantic evaluation scores (Q-Score 6.24, P-Score 5.95), surpassing 32B models. These results demonstrate that PanoEnv-QA and our curriculum-based RL framework effectively instill 3D spatial intelligence in VLMs for omnidirectional perception.", "link": "http://arxiv.org/abs/2602.21992v1", "date": "2026-02-25", "relevancy": 2.4656, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Un gies%20such%20as%20distance%20tolerance%20and%20spatial%20consistency.%20A%20two-stage%20curriculum%20further%20mitigates%20catastrophic%20forgetting%3A%20Stage%201%20trains%20on%20structured%20tasks%20%28true/false%20and%20multiple%20choice%29%2C%20and%20Stage%202%20fine-tunes%20on%20mixed%20open-ended%20data%20to%20improve%20generalization.%20Our%207B%20model%20achieves%20new%20state-of-the-art%20performance%2C%20improving%20overall%20accuracy%20to%2052.93%25%20%28%2B3.59%25%29%20and%20open-ended%20accuracy%20to%2014.83%25%20while%20maintaining%20structured-task%20performance.%20It%20also%20achieves%20top%20semantic%20evaluation%20scores%20%28Q-Score%206.24%2C%20P-Score%205.95%29%2C%20surpassing%2032B%20models.%20These%20results%20demonstrate%20that%20PanoEnv-QA%20and%20our%20curriculum-based%20RL%20framework%20effectively%20instill%203D%20spatial%20intelligence%20in%20VLMs%20for%20omnidirectional%20perception.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21992v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPanoEnv%253A%2520Exploring%25203D%2520Spatial%2520Intelligence%2520in%2520Panoramic%2520Environments%2520with%2520Reinforcement%2520Learning%26entry.906535625%3DZekai%2520Lin%2520and%2520Xu%2520Zheng%26entry.1292438233%3D360%2520panoramic%2520images%2520are%2520increasingly%2520used%2520in%2520virtual%2520reality%252C%2520autonomous%2520driving%252C%2520and%2520robotics%2520for%2520holistic%2520scene%2520understanding.%2520However%252C%2520current%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520struggle%2520with%25203D%2520spatial%2520reasoning%2520on%2520Equirectangular%2520Projection%2520%2528ERP%2529%2520images%2520due%2520to%2520geometric%2520distortion%2520and%2520limited%25203D%2520supervision.%2520We%2520introduce%2520PanoEnv%252C%2520a%2520large-scale%2520VQA%2520benchmark%2520built%2520from%2520synthetic%25203D%2520environments%252C%2520containing%252014.8K%2520q {"title": "Protein Graph Neural Networks for Heterogeneous Cryo-EM Reconstruction", "author": "Jonathan Krook and Axel Janson and Joakim and\u00e9n and Melanie Weber and Ozan \u00d6ktem", "abstract": "We present a geometry-aware method for heterogeneous single-particle cryogenic electron microscopy (cryo-EM) reconstruction that predicts atomic backbone conformations. To incorporate protein-structure priors, we represent the backbone as a graph and use a graph neural network (GNN) autodecoder that maps per-image latent variables to 3D displacements of a template conformation. The objective combines a data-discrepancy term based on a differentiable cryo-EM forward model with geometric regularization, and it supports unknown orientations via ellipsoidal support lifting (ESL) pose estimation. On synthetic datasets derived from molecular dynamics trajectories, the proposed GNN achieves higher accuracy compared to a multilayer perceptron (MLP) of comparable size, highlighting the benefits of a geometry-informed inductive bias.", "link": "http://arxiv.org/abs/2602.21915v1", "date": "2026-02-25", "relevancy": 2.4549, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5212}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4765}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4752}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Protein%20Graph%20Neural%20Networks%20for%20Heterogeneous%20Cryo-EM%20Reconstruction&body=Title%3A%20Protein%20Graph%20Neural%20Networks%20for%20Heterogeneous%20Cryo-EM%20Reconstruction%0AAuthor%3A%20Jonathan%20Krook%20and%20Axel%20Janson%20and%20Joakim%20and%C3%A9n%20and%20Melanie%20Weber%20and%20Ozan%20%C3%96ktem%0AAbstract%3A%20We%20present%20a%20geometry-aware%20method%20for%20heterogeneous%20single-particle%20cryogenic%20electron%20microscopy%20%28cryo-EM%29%20reconstruction%20that%20predicts%20atomic%20backbone%20conformations.%20To%20incorporate%20protein-structure%20priors%2C%20we%20represent%20the%20backbone%20as%20a%20graph%20and%20use%20a%20graph%20neural%20network%20%28GNN%29%20autodecoder%20that%20maps%20per-image%20latent%20variables%20to%203D%20displacements%20of%20a%20template%20conformation.%20The%20objective%20combines%20a%20data-discrepancy%20term%20based%20on%20a%20differentiable%20cryo-EM%20forward%20model%20with%20geometric%20regularization%2C%20and%20it%20supports%20unknown%20orientations%20via%20ellipsoidal%20support%20lifting%20%28ESL%29%20pose%20estimation.%20On%20synthetic%20datasets%20derived%20from%20molecular%20dynamics%20trajectories%2C%20the%20proposed%20GNN%20achieves%20higher%20accuracy%20compared%20to%20a%20multilayer%20perceptron%20%28MLP%29%20of%20comparable%20size%2C%20highlighting%20the%20benefits%20of%20a%20geometry-informed%20inductive%20bias.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21915v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DProtein%2520Graph%2520Neural%2520Networks%2520for%2520Heterogeneous%2520Cryo-EM%2520Reconstruction%26entry.906535625%3DJonathan%2520Krook%2520and%2520Axel%2520Janson%2520and%2520Joakim%2520and%25C3%25A9n%2520and%2520Melanie%2520Weber%2520and%2520Ozan%2520%25C3%2596ktem%26entry.1292438233%3DWe%2520present%2520a%2520geometry-aware%2520method%2520for%2520heterogeneous%2520single-particle%2520cryogenic%2520electron%2520microscopy%2520%2528cryo-EM%2529%2520reconstruction%2520that%2520predicts%2520atomic%2520backbone%2520conformations.%2520To%2520incorporate%2520protein-structure%2520priors%252C%2520we%2520represent%2520the%2520backbone%2520as%2520a%2520graph%2520and%2520use%2520a%2520graph%2520neural%2 t%20supports%20unknown%20orientations%20via%20ellipsoidal%20support%20lifting%20%28ESL%29%20pose%20estimation.%20On%20synthetic%20datasets%20derived%20from%20molecular%20dynamics%20trajectories%2C%20the%20proposed%20GNN%20achieves%20higher%20accuracy%20compared%20to%20a%20multilayer%20perceptron%20%28MLP%29%20of%20comparable%20size%2C%20highlighting%20the%20benefits%20of%20a%20geometry-informed%20inductive%20bias.&entry.1838667208=http%3A//arxiv.org/abs/2602.21915v1&entry.124074799=Read"},
{"title": "Dream-SLAM: Dreaming the Unseen for Active SLAM in Dynamic Environments", "author": "Xiangqi Meng and Pengxu Hou and Zhenjun Zhao and Javier Civera and Daniel Cremers and Hesheng Wang and Haoang Li", "abstract": "In addition to the core tasks of simultaneous localization and mapping (SLAM), active SLAM additionally in- volves generating robot actions that enable effective and efficient exploration of unknown environments. However, existing active SLAM pipelines are limited by three main factors. First, they inherit the restrictions of the underlying SLAM modules that they may be using. Second, their motion planning strategies are typically shortsighted and lack long-term vision. Third, most approaches struggle to handle dynamic scenes. To address these limitations, we propose a novel monocular active SLAM method, Dream-SLAM, which is based on dreaming cross-spatio-temporal images and semantically plausible structures of partially observed dynamic environments. The generated cross-spatio-temporal im- ages are fused with real observations to mitigate noise and data incompleteness, leading to more accurate camera pose estimation and a more coherent 3D scene representation. Furthermore, we integrate dreamed and observed scene structures to enable long- horizon planning, producing farsighted trajectories that promote efficient and thorough exploration. Extensive experiments on both public and self-collected datasets demonstrate that Dream-SLAM outperforms state-of-the-art methods in localization accuracy, mapping quality, and exploration efficiency. Source code will be publicly available upon paper acceptance.", "link": "http://arxiv.org/abs/2602.21967v1", "date": "2026-02-25", "relevancy": 2.4198, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6125}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6004}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5975}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dream-SLAM%3A%20Dreaming%20the%20Unseen%20for%20Active%20SLAM%20in%20Dynamic%20Environments&body=Title%3A%20Dream-SLAM%3A%20Dreaming%20the%20Unseen%20for%20Active%20SLAM%20in%20Dynamic%20Environments%0AAuthor%3A%20Xiangqi%20Meng%20and%20Pengxu%20Hou%20and%20Zhenjun%20Zhao%20and%20Javier%20Civera%20and%20Daniel%20Cremers%20and%20Hesheng%20Wang%20and%20Haoang%20Li%0AAbstract%3A%20In%20addition%20to%20the%20core%20tasks%20of%20simultaneous%20localization%20and%20mapping%20%28SLAM%29%2C%20active%20SLAM%20additionally%20in-%20volves%20generating%20robot%20actions%20that%20enable%20effective%20and%20efficient%20exploration%20of%20unknown%20environments.%20However%2C%20existing%20active%20SLAM%20pipelines%20are%20limited%20by%20three%20main%20factors.%20First%2C%20they%20inherit%20the%20restrictions%20of%20the%20underlying%20SLAM%20modules%20that%20they%20may%20be%20using.%20Second%2C%20their%20motion%20planning%20strategies%20are%20typically%20shortsighted%20and%20lack%20long-term%20vision.%20Third%2C%20most%20approaches%20struggle%20to%20handle%20dynamic%20scenes.%20To%20address%20these%20limitations%2C%20we%20propose%20a%20novel%20monocular%20active%20SLAM%20method%2C%20Dream-SLAM%2C%20which%20is%20based%20on%20dreaming%20cross-spatio-temporal%20images%20and%20semantically%20plausible%20structures%20of%20partially%20observed%20dynamic%20environments.%20The%20generated%20cross-spatio-temporal%20im-%20ages%20are%20fused%20with%20real%20observations%20to%20mitigate%20noise%20and%20data%20incompleteness%2C%20leading%20to%20more%20accurate%20camera%20pose%20estimation%20and%20a%20more%20coherent%203D%20scene%20representation.%20Furthermore%2C%20we%20integrate%20dreamed%2 {"title": "PepCompass: Navigating peptide embedding spaces using Riemannian Geometry", "author": "Marcin Mo\u017cejko and Adam Bielecki and Jurand Pr\u0105dzy\u0144ski and Marcin Traskowski and Antoni Janowski and Hyun-Su Lee and Marcelo Der Torossian Torres and Micha\u0142 Kmicikiewicz and Paulina Szymczak and Karol Jurasz and Micha\u0142 Kucharczyk and Cesar de la Fuente-Nunez and Ewa Szczurek", "abstract": "Antimicrobial peptide discovery is challenged by the astronomical size of peptide space and the relative scarcity of active peptides. Generative models provide continuous latent \"maps\" of peptide space, but conventionally ignore decoder-induced geometry and rely on flat Euclidean metrics, rendering exploration and optimization distorted and inefficient. Prior manifold-based remedies assume fixed intrinsic dimensionality, which critically fails in practice for peptide data. Here, we introduce PepCompass, a geometry-aware framework for peptide exploration and optimization. At its core, we define a Union of $\u03ba$-Stable Riemannian Manifolds $\\mathbb{M}^\u03ba$, a family of decoder-induced manifolds that captures local geometry while ensuring computational stability. We propose two local exploration methods: Second-Order Riemannian Brownian Efficient Sampling, which provides a convergent second-order approximation to Riemannian Brownian motion, and Mutation Enumeration in Tangent Space, which reinterprets tangent directions as discrete amino-acid substitutions. Combining these yields Local Enumeration Bayesian Optimization (LE-BO), an efficient algorithm for local activity optimization. Finally, we introduce Potential-minimizing Geodesic Search (PoGS), which interpolates between prototype embeddings along property-enriched geodesics, biasing discovery toward seeds, i.e. peptides with favorable activity. In-vitro validation confirms the effectiveness of PepCompass: PoGS yields four novel seeds, and subsequent optimization with LE-BO discovers 25 highly active peptides with broad-spectrum activity, including against resistant bacterial strains. These results demonstrate that geometry-informed exploration provides a powerful new paradigm for antimicrobial peptide design.", "link": "http://arxiv.org/abs/2510.01988v5", "date": "2026-02-25", "relevancy": 2.3869, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4861}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.477}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.469}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PepCompass%3A%20Navigating%20peptide%20embedding%20spaces%20using%20Riemannian%20Geometry&body=Title%3A%20PepCompass%3A%20Navigating%20peptide%20embedding%20spaces%20using%20Riemannian%20Geometry%0AAuthor%3A%20Marcin%20Mo%C5%BCejko%20and%20Adam%20Bielecki%20and%20Jurand%20Pr%C4%85dzy%C5%84ski%20and%20Marcin%20Traskowski%20and%20Antoni%20Janowski%20and%20Hyun-Su%20Lee%20and%20Marcelo%20Der%20Torossian%20Torres%20and%20Micha%C5%82%20Kmicikiewicz%20and%20Paulina%20Szymczak%20and%20Karol%20Jurasz%20and%20Micha%C5%82%20Kucharczyk%20and%20Cesar%20de%20la%20Fuente-Nunez%20and%20Ewa%20Szczurek%0AAbstract%3A%20Antimicrobial%20peptide%20discovery%20is%20challenged%20by%20the%20astronomical%20size%20of%20peptide%20space%20and%20the%20relative%20scarcity%20of%20active%20peptides.%20Generative%20models%20provide%20continuous%20latent%20%22maps%22%20of%20peptide%20space%2C%20but%20conventionally%20ignore%20decoder-induced%20geometry%20and%20rely%20on%20flat%20Euclidean%20metrics%2C%20rendering%20exploration%20and%20optimization%20distorted%20and%20inefficient.%20Prior%20manifold-based%20remedies%20assume%20fixed%20intrinsic%20dimensionality%2C%20which%20critically%20fails%20in%20practice%20for%20peptide%20data.%20Here%2C%20we%20introduce%20PepCompass%2C%20a%20geometry-aware%20framework%20for%20peptide%20exploration%20and%20optimization.%20At%20its%20core%2C%20we%20define%20a%20Union%20of%20%24%CE%BA%24-Stable%20Riemannian%20Manifolds%20%24%5Cmathbb%7BM%7D%5E%CE%BA%24%2C%20a%20family%20of%20decoder-induced%20manifolds%20that%20captures%20local%20geometry%20while%20ensuring%20computational%20stability.%20We%20propose%20two%20local%20exploration%20methods%3A%20Second-Order%20Riemannian%20Brownian%20Efficient%20Sampling%2C%20which%20provides%20a%20convergent%20second-order%20approximation%20to%20Riemannian%20Brownian%20motion%2C%20and%20Mutation%20Enumeration%20in%20Tangent%20Space%2C%20which%20reinterprets%20tangent%20directions%20as%20discrete%20amino-acid%20substitutions.%20Combining%20these%20yields%20Local%20Enumeration%20Bayesian%20Optimization%20%28LE-BO%29%2C%20an%20efficient%20algorithm%20for%20local%20activity%20optimization.%20Finally%2C%20we%20introduce%20Potential-minimizing%20Geodesic%20Search%20%28PoGS%29%2C%20which%20interpolates%20between%20prototype%20embeddings%20along%20property-enriched%20geodesics%2C%20biasing%20discovery%20toward%20seeds%2C%20i.e.%20peptides%20with%20favorable%20activity.%20In-vitro%20validation%20confirms%20the%20effectiveness%20of%20PepCompass%3A%20PoGS%20yields%20four%20novel%20seeds%2C%20and%20subsequent%20optimization%20with%20LE-BO%20discovers%2025%20highly%20active%20peptides%20with%20broad-spectrum%20activity%2C%20including%20against%20resistant%20bacterial%20strains.%20These%20results%20demonstrate%20that%20geometry-informed%20exploration%20provides%20a%20powerful%20new%20paradigm%20for%20antimicrobial%20peptide%20design.%0ALink%3A%20http%3A//arxiv.org/abs/2510.01988v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPepCompass%253A%2520Navigating%2520peptide%2520embedding A%20PoGS%20yields%20four%20novel%20seeds%2C%20and%20subsequent%20optimization%20with%20LE-BO%20discovers%2025%20highly%20active%20peptides%20with%20broad-spectrum%20activity%2C%20including%20against%20resistant%20bacterial%20strains.%20These%20results%20demonstrate%20that%20geometry-informed%20exploration%20provides%20a%20powerful%20new%20paradigm%20for%20antimicrobial%20peptide%20design.&entry.1838667208=http%3A//arxiv.org/abs/2510.01988v5&entry.124074799=Read"},
{"title": "Learning to Collaborate via Structures: Cluster-Guided Item Alignment for Federated Recommendation", "author": "Yuchun Tu and Zhiwei Li and Bingli Sun and Yixuan Li and Xiao Song", "abstract": "Federated recommendation facilitates collaborative model training across distributed clients while keeping sensitive user interaction data local. Conventional approaches typically rely on synchronizing high-dimensional item representations between the server and clients. This paradigm implicitly assumes that precise geometric alignment of embedding coordinates is necessary for collaboration across clients. We posit that establishing relative semantic relationships among items is more effective than enforcing shared representations. Specifically, global semantic relations serve as structural constraints for items. Within these constraints, the framework allows item representations to vary locally on each client, which flexibility enables the model to capture fine-grained user personalization while maintaining global consistency. To this end, we propose Cluster-Guided FedRec framework (CGFedRec), a framework that transforms uploaded embeddings into compact cluster labels. In this framework, the server functions as a global structure discoverer to learn item clusters and distributes only the resulting labels. This mechanism explicitly cuts off the downstream transmission of item embeddings, relieving clients from maintaining global shared item embeddings. Consequently, CGFedRec achieves the effective injection of global collaborative signals into local item representations without transmitting full embeddings. Extensive experiments demonstrate that our approach significantly improves communication efficiency while maintaining superior recommendation accuracy across multiple datasets.", "link": "http://arxiv.org/abs/2602.21957v1", "date": "2026-02-25", "relevancy": 2.3739, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4895}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4804}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4544}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20to%20Collaborate%20via%20Structures%3A%20Cluster-Guided%20Item%20Alignment%20for%20Federated%20Recommendation&body=Title%3A%20Learning%20to%20Collaborate%20via%20Structures%3A%20Cluster-Guided%20Item%20Alignment%20for%20Federated%20Recommendation%0AAuthor%3A%20Yuchun%20Tu%20and%20Zhiwei%20Li%20and%20Bingli%20Sun%20and%20Yixuan%20Li%20and%20Xiao%20Song%0AAbstract%3A%20Federated%20recommendation%20facilitates%20collaborative%20model%20training%20across%20distributed%20clients%20while%20keeping%20sensitive%20user%20interaction%20data%20local.%20Conventional%20approaches%20typically%20rely%20on%20synchronizing%20high-dimensional%20item%20representations%20between%20the%20server%20and%20clients.%20This%20paradigm%20implicitly%20assumes%20that%20precise%20geometric%20alignment%20of%20embedding%20coordinates%20is%20necessary%20for%20collaboration%20across%20clients.%20We%20posit%20that%20establishing%20relative%20semantic%20relationships%20among%20items%20is%20more%20effective%20than%20enforcing%20shared%20representations.%20Specifically%2C%20global%20semantic%20relations%20serve%20as%20structural%20constraints%20for%20items.%20Within%20these%20constraints%2C%20the%20framework%20allows%20item%20representations%20to%20vary%20locally%20on%20each%20client%2C%20which%20flexibility%20enables%20the%20model%20to%20capture%20fine-grained%20user%20personalization%20while%20maintaining%20global%20consistency.%20To%20this%20end%2C%20we%20propose%20Cluster-Guided%20FedRec%20framework%20%28CGFedRec%29%2C%20a%20framework%20that%20transforms%20uploaded%20embeddings%20into%20compact%20cluster%20labels.%20In%20this%20framework%2C%20the%20server%20functions%20as%20a%20global%20structure%20discoverer%20to%20learn%20item%20clusters%20and%20distributes%20only%20the%20resulting%20labels.%20This%20mechanism%20explicitly%20cuts%20off%20the%20downstream%20transmission%20of%20item%20embeddings%2C%20relieving%20clients%20from%20maintaining%20global%20shared%20item%20embeddings.%20Consequently%2C%20CGFedRec%20achieves%20the%20effective%20injection%20of%20global%20collaborative%20signals%20into%20local%20item%20representations%20without%20transmitting%20full%20embeddings.%20Extensive%20experiments%20demonstrate%20that%20our%20approach%20significantly%20improves%20communication%20efficiency%20while%20maintaining%20superior%20recommendation%20accuracy%20across%20multiple%20datasets.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21957v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520to%2520Collaborate%2520via%2520Structures%253A%2520Cluster-Guided%2520Item%2520Alignment%2520for%2520Federated%2520Recommendation%26entry.906535625%3DYuchun%2520Tu%2520and%2520Zhiwei%2520Li%2520and%2520Bingli%2520Sun%2520and%2520Yixuan%2520Li%2520and%2520Xiao%2520Song%26entry.1292438233%3DFederated%2520recommendation%2520facilitates%2520collaborative%2520model%2520training%2520across%2520distributed%2520clients%2520while%2520keeping%2520sensitive%2520user%2520interaction%2520data%2520local.%2520Conventional%2520approaches%2520typically%2520rely%2520on%2520synchronizing%2520high-dimensional%2520item%2520representations%2520between%2520the%2520server%2520and%2520clients.%2520This%2520paradigm%2520implicitly%2520assumes%2520that%2520precise%2520geometric%2520alignment%2520of%2520embedding%2520coordinates%2520is%2520necessary%2520for%2520collaboration%2520across%2520clients.%2520We%2520posit%2520that%2520establishing%2520relative%2520se {"title": "Learning in the Null Space: Small Singular Values for Continual Learning", "author": "Cuong Anh Pham and Praneeth Vepakomma and Samuel Horv\u00e1th", "abstract": "Alleviating catastrophic forgetting while enabling further learning is a primary challenge in continual learning (CL). Orthogonal-based training methods have gained attention for their efficiency and strong theoretical properties, and many existing approaches enforce orthogonality through gradient projection. In this paper, we revisit orthogonality and exploit the fact that small singular values correspond to directions that are nearly orthogonal to the input space of previous tasks. Building on this principle, we introduce NESS (Null-space Estimated from Small Singular values), a CL method that applies orthogonality directly in the weight space rather than through gradient manipulation. Specifically, NESS constructs an approximate null space using the smallest singular values of each layer's input representation and parameterizes task-specific updates via a compact low-rank adaptation (LoRA-style) formulation constrained to this subspace. The subspace basis is fixed to preserve the null-space constraint, and only a single trainable matrix is learned for each task. This design ensures that the resulting updates remain approximately in the null space of previous inputs while enabling adaptation to new tasks. Our theoretical analysis and experiments on three benchmark datasets demonstrate competitive performance, low forgetting, and stable accuracy across tasks, highlighting the role of small singular values in continual learning. The code is available at https://github.com/pacman-ctm/NESS.", "link": "http://arxiv.org/abs/2602.21919v1", "date": "2026-02-25", "relevancy": 2.3623, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4785}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.475}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.464}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20in%20the%20Null%20Space%3A%20Small%20Singular%20Values%20for%20Continual%20Learning&body=Title%3A%20Learning%20in%20the%20Null%20Space%3A%20Small%20Singular%20Values%20for%20Continual%20Learning%0AAuthor%3A%20Cuong%20Anh%20Pham%20and%20Praneeth%20Vepakomma%20and%20Samuel%20Horv%C3%A1th%0AAbstract%3A%20Alleviating%20catastrophic%20forgetting%20while%20enabling%20further%20learning%20is%20a%20primary%20challenge%20in%20continual%20learning%20%28CL%29.%20Orthogonal-based%20training%20methods%20have%20gained%20attention%20for%20their%20efficiency%20and%20strong%20theoretical%20properties%2C%20and%20many%20existing%20approaches%20enforce%20orthogonality%20through%20gradient%20projection.%20In%20this%20paper%2C%20we%20revisit%20orthogonality%20and%20exploit%20the%20fact%20that%20small%20singular%20values%20correspond%20to%20directions%20that%20are%20nearly%20orthogonal%20to%20the%20input%20space%20of%20previous%20tasks.%20Building%20on%20this%20principle%2C%20we%20introduce%20NESS%20%28Null-space%20Estimated%20from%20Small%20Singular%20values%29%2C%20a%20CL%20method%20that%20applies%20orthogonality%20directly%20in%20the%20weight%20space%20rather%20than%20through%20gradient%20manipulation.%20Specifically%2C%20NESS%20constructs%20an%20approximate%20null%20space%20using%20the%20smallest%20singular%20values%20of%20each%20layer%27s%20input%20representation%20and%20parameterizes%20task-specific%20updates%20via%20a%20compact%20low-rank%20adaptation%20%28LoRA-style%29%20formulation%20constrained%20to%20this%20subspace.%20The%20subspace%20basis%20is%20fixed%20to%20preserve%20the%20null-space%20constraint%2C%20and%20only%20a%20single%20trainable%20matrix%20is%20learned%20for%20each%20task.%20This%20design%20ensures%20that%20the%20resulting%20updates%20remain%20approximately%20in%20the%20null%20space%20of%20previous%20inputs%20while%20enabling%20adaptation%20to%20new%20tasks.%20Our%20theoretical%20analysis%20and%20experiments%20on%20three%20benchmark%20datasets%20demonstrate%20competitive%20performance%2C%20low%20forgetting%2C%20and%20stable%20accuracy%20across%20tasks%2C%20highlighting%20the%20role%20of%20small%20singular%20values%20in%20continual%20learning.%20The%20code%20is%20available%20at%20https%3A//github.com/pacman-ctm/NESS.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21919v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520in%2520the%2520Null%2520Space%253A%2520Small%2520Singular%2520Values%2520for%2520Continual%2520Learning%26entry.906535625%3DCuong%2520Anh%2520Pham%2520and%2520Praneeth%2520Vepakomma%2520and%2520Samuel%2520Horv%25C3%25A1th%26entry.1292438233%3DAlleviating%2520catastrophic%2520forgetting%2520while%2520enabling%2520further%2520learning%2520is%2520a%2520primary%2520challenge%2520in%2520continual%2520learning%2520%2528CL%2529.%2520Orthogonal-based%2520training%2520methods%2520have%2520gained%2520attention%2520for%2520their%2520efficiency%2520and%2520strong%2520theoretical%2520properties%252C%2520and%2520many%2520existing%2520approaches%2520enforce%2520orthogonality%2520through%2520gradient%2520projection.%2520In%2520this%2520paper%252C%2520we%2520revisit%2520orthogonality%2520and%2520exploit%2520the%2520fact%2520that%2520small%2520singular%2520values%2520correspond%2520to%2520directions%2520that%2520are%2520nearly%2520orthogonal%2520to%2520the%2520input%2520space%2520of%2520previous%2520tasks.%2520Building%2520on%2520this%2520principle%252C%2520we%2520introduce%2520NESS%2520%2528Null-space%2520Estimated%2520from%2520Small%2520Singular%2520values%2529%252C%2520a%2520CL%2520 {"title": "TG-ASR: Translation-Guided Learning with Parallel Gated Cross Attention for Low-Resource Automatic Speech Recognition", "author": "Cheng-Yeh Yang and Chien-Chun Wang and Li-Wei Chen and Hung-Shin Lee and Hsin-Min Wang and Berlin Chen", "abstract": "Low-resource automatic speech recognition (ASR) continues to pose significant challenges, primarily due to the limited availability of transcribed data for numerous languages. While a wealth of spoken content is accessible in television dramas and online videos, Taiwanese Hokkien exemplifies this issue, with transcriptions often being scarce and the majority of available subtitles provided only in Mandarin. To address this deficiency, we introduce TG-ASR for Taiwanese Hokkien drama speech recognition, a translation-guided ASR framework that utilizes multilingual translation embeddings to enhance recognition performance in low-resource environments. The framework is centered around the parallel gated cross-attention (PGCA) mechanism, which adaptively integrates embeddings from various auxiliary languages into the ASR decoder. This mechanism facilitates robust cross-linguistic semantic guidance while ensuring stable optimization and minimizing interference between languages. To support ongoing research initiatives, we present YT-THDC, a 30-hour corpus of Taiwanese Hokkien drama speech with aligned Mandarin subtitles and manually verified Taiwanese Hokkien transcriptions. Comprehensive experiments and analyses identify the auxiliary languages that most effectively enhance ASR performance, achieving a 14.77% relative reduction in character error rate and demonstrating the efficacy of translation-guided learning for underrepresented languages in practical applications.", "link": "http://arxiv.org/abs/2602.22039v1", "date": "2026-02-25", "relevancy": 2.3472, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4813}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4699}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.457}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TG-ASR%3A%20Translation-Guided%20Learning%20with%20Parallel%20Gated%20Cross%20Attention%20for%20Low-Resource%20Automatic%20Speech%20Recognition&body=Title%3A%20TG-ASR%3A%20Translation-Guided%20Learning%20with%20Parallel%20Gated%20Cross%20Attention%20for%20Low-Resource%20Automatic%20Speech%20Recognition%0AAuthor%3A%20Cheng-Yeh%20Yang%20and%20Chien-Chun%20Wang%20and%20Li-Wei%20Chen%20and%20Hung-Shin%20Lee%20and%20Hsin-Min%20Wang%20and%20Berlin%20Chen%0AAbstract%3A%20Low-resource%20automatic%20speech%20recognition%20%28ASR%29%20continues%20to%20pose%20significant%20challenges%2C%20primarily%20due%20to%20the%20limited%20availability%20of%20transcribed%20data%20for%20numerous%20languages.%20While%20a%20wealth%20of%20spoken%20content%20is%20accessible%20in%20television%20dramas%20and%20online%20videos%2C%20Taiwanese%20Hokkien%20exemplifies%20this%20issue%2C%20with%20transcriptions%20often%20being%20scarce%20and%20the%20majority%20of%20available%20subtitles%20provided%20only%20in%20Mandarin.%20To%20address%20this%20deficiency%2C%20we%20introduce%20TG-ASR%20for%20Taiwanese%20Hokkien%20drama%20speech%20recognition%2C%20a%20translation-guided%20ASR%20framework%20that%20utilizes%20multilingual%20translation%20embeddings%20to%20enhance%20recognition%20performance%20in%20low-resource%20environments.%20The%20framework%20is%20centered%20around%20the%20parallel%20gated%20cross-attention%20%28PGCA%29%20mechanism%2C%20which%20adaptively%20integrates%20embeddings%20from%20various%20auxiliary%20languages%20into%20the%20ASR%20decoder.%20This%20mechanism%20facilitates%20robust%20cross-linguistic%20semantic%20guidance%20while%20ensuring%20stable%20optimization%20and%20minimizing%20interference%20between%20languages.%20To%20support%20ongoing%20research%20initiatives%2C%20we%20present%20YT-THDC%2C%20a%2030-hour%20corpus%20of%20Taiwanese%20Hokkien%20drama%20speech%20with%20aligned%20Mandarin%20subtitles%20and%20manually%20verified%20Taiwanese%20Hokkien%20transcriptions.%20Comprehensive%20experiments%20and%20analyses%20identify%20the%20auxiliary%20languages%20that%20most%20effectively%20enhance%20ASR%20performance%2C%20achieving%20a%2014.77%25%20relative%20reduction%20in%20character%20error%20rate%20and%20demonstrating%20the%20efficacy%20of%20translation-guided%20learning%20for%20underrepresented%20languages%20in%20practical%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22039v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTG-ASR%253A%2520Translation-Guided%2520Learning%2520with%2520Parallel%2520Gated%2520Cross%2520Attention%2520for%2520Low-Resource%2520Automatic%2520Speech%2520Recognition%26entry.906535625%3DCheng-Yeh%2520Yang%2520and%2520Chien-Chun%2520Wang%2520and%2520Li-Wei%2520Chen%2520and%2520Hung-Shin%2520Lee%2520and%2520Hsin-Min%2520Wang%2520and%2520Berlin%2520Chen%26entry.1292438233%3DLow-resource%2520automatic%2520speech%2520recognition%2520%2528ASR%2529%2520continues%2520to%2520pose%2520significant%2520challenges%252C%2520primarily%2520due%2520to%2520the%2520limited%2520availability%2520of%2520transcribed%2520data%2520for%2520numerous%2520languages.%2520While%2520a%2520wealth%2520of%2520spoken%2520content%2520is%2520accessible%2520in%2520television%2520dramas%2520and%2520online%2520videos%252C%2520Taiwanese%2520Hokkien%2520exemplifies%2520this%2520issue%252C%2520with%2520transcriptions%2520often%2520being%2520scarce%2520and%2520the%2520majority%2520of%2520available%2520subtitles%2520provided%2520only%2520in%2520Mandarin.%2520To%

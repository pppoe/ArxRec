{"title": "Self-Curriculum Model-based Reinforcement Learning for Shape Control of Deformable Linear Objects", "author": "Zhaowei Liang and Song Wang and Zhao Jin and Shirui Wu and Dan Wu", "abstract": "Precise shape control of Deformable Linear Objects (DLOs) is crucial in robotic applications such as industrial and medical fields. However, existing methods face challenges in handling complex large deformation tasks, especially those involving opposite curvatures, and lack efficiency and precision. To address this, we propose a two-stage framework combining Reinforcement Learning (RL) and online visual servoing. In the large-deformation stage, a model-based reinforcement learning approach using an ensemble of dynamics models is introduced to significantly improve sample efficiency. Additionally, we design a self-curriculum goal generation mechanism that dynamically selects intermediate-difficulty goals with high diversity through imagined evaluations, thereby optimizing the policy learning process. In the small-deformation stage, a Jacobian-based visual servo controller is deployed to ensure high-precision convergence. Simulation results show that the proposed method enables efficient policy learning and significantly outperforms mainstream baselines in shape control success rate and precision. Furthermore, the framework effectively transfers the policy trained in simulation to real-world tasks with zero-shot adaptation. It successfully completes all 30 cases with diverse initial and target shapes across DLOs of different sizes and materials. The project website is available at: https://anonymous.4open.science/w/sc-mbrl-dlo-EB48/", "link": "http://arxiv.org/abs/2602.21816v1", "date": "2026-02-25", "relevancy": 2.1825, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.549}, {"title": "Synthesizing Moving People with 3D Control", "link": "h ccess%20rate%20and%20precision.%20Furthermore%2C%20the%20framework%20effectively%20transfers%20the%20policy%20trained%20in%20simulation%20to%20real-world%20tasks%20with%20zero-shot%20adaptation.%20It%20successfully%20completes%20all%2030%20cases%20with%20diverse%20initial%20and%20target%20shapes%20across%20DLOs%20of%20different%20sizes%20and%20materials.%20The%20project%20website%20is%20available%20at%3A%20https%3A//anonymous.4open.science/w/sc-mbrl-dlo-EB48/%0ALink%3A%20http%3A//arxiv.org/abs/2602.21816v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSelf-Curriculum%2520Model-based%2520Reinforcement%2520Learning%2520for%2520Shape%2520Control%2520of%2520Deformable%2520Linear%2520Objects%26entry.906535625%3DZhaowei%2520Liang%2520and%2520Song%2520Wang%2520and%2520Zhao%2520Jin%2520and%2520Shirui%2520Wu%2520and%2520Dan%2520Wu%26entry.1292438233%3DPrecise%2520shape%2520control%2520of%2520Deformable%2520Linear%2520Objects%2520%2528DLOs%2529%2520is%2520crucial%2520in%2520robotic%2520applications%2520such%2520as%2520industrial%2520and%2520medical%2520fields.%2520However%252C%2520existing%2520methods%2520face%2520challenges%2520in%2520handling%2520complex%2520large%2520deformation%2520tasks%252C%2520especially%2520those%2520involving%2520opposite%2520curvatures%252C%2520and%2520lack%2520efficiency%2520and%2520precision.%2520To%2520address%2520this%252C%2520we%2520propose%2520a%2520two-stage%2520framework%2520combining%2520Reinforcement%2520Learning%2520%2528RL%2529%2520and%2520online%2520visual%2520servoing.%2520In%2520the%2520large-deformation%2520stage%252C%2520a%2520model-based%2520reinforcement%2520learning%2520approach%2520using%2520an%2520ensemble%2520of%2520dynamics%2520models%2520is%2520introduced%2520to%2520significantly%2520improve%2520sample%2520efficiency.%2520Additionally%252C%2520we%2520design%2520a%2520self-curriculum%2520goal%2520generation%2520mechanism%2520that%2520dyna {"title": "PatchDenoiser: Parameter-efficient multi-scale patch learning and fusion denoiser for medical images", "author": "Jitindra Fartiyal and Pedro Freire and Sergei K. Turitsyn and Sergei G. Solovski", "abstract": "Medical images are essential for diagnosis, treatment planning, and research, but their quality is often degraded by noise from low-dose acquisition, patient motion, or scanner limitations, affecting both clinical interpretation and downstream analysis. Traditional filtering approaches often over-smooth and lose fine anatomical details, while deep learning methods, including CNNs, GANs, and transformers, may struggle to preserve such details or require large, computationally expensive models, limiting clinical practicality.\n  We propose PatchDenoiser, a lightweight, energy-efficient multi-scale patch-based denoising framework. It decomposes denoising into local texture extraction and global context aggregation, fused via a spatially aware patch fusion strategy. This design enables effective noise suppression while preserving fine structural and anatomical details. PatchDenoiser is ultra-lightweight, with far fewer parameters and lower computational complexity than CNN-, GAN-, and transformer-based denoisers.\n  On the 2016 Mayo Low-Dose CT dataset, PatchDenoiser consistently outperforms state-of-the-art CNN- and GAN-based methods in PSNR and SSIM. It is robust to variations in slice thickness, reconstruction kernels, and HU windows, generalizes across scanners without fine-tuning, and reduces parameters by ~9x and energy consumption per inference by ~27x compared with conventional CNN denoisers.\n  PatchDenoiser thus provides a practical, scalable, and computationally efficient solution for medical image denoising, balancing performance, robustness, and clinical deployability.", "link": "http://arxiv.org/abs/2602.21987v1", "date": "2026-02-25", "relevancy": 2.1819, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5609}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5384}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5245}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PatchDenoiser%3A%20Parameter-efficient%20multi-scale%20patch%20learning%20and%20fusion%20denoiser%20for%20medical%20images&body=Title%3A%20PatchDenoiser%3A%20Parameter-efficient%20multi-scale%20patch%20learning%20and%20fusion%20denoiser%20for%20medical%20images%0AAuthor%3A%20Jitindra%20Fartiyal%20and%20Pedro%20Freire%20and%20Sergei%20K.%20Turitsyn%20and%20Sergei%20G.%20Solovski%0AAbstract%3A%20Medical%20images%20are%20essential%20for%20diagnosis%2C%20treatment%20planning%2C%20and%20research%2C%20but%20their%20quality%20is%20often%20degraded%20by%20noise%20from%20low-dose%20acquisition%2C%20patient%20motion%2C%20or%20scanner%20limitations%2C%20affecting%20both%20clinical%20interpretation%20and%20downstream%20analysis.%20Traditional%20filtering%20approaches%20often%20over-smooth%20and%20lose%20fine%20anatomical%20details%2C%20while%20deep%20learning%20methods%2C%20including%20CNNs%2C%20GANs%2C%20and%20transformers%2C%20may%20struggle%20to%20preserve%20such%20details%20or%20require%20large%2C%20computationally%20expensive%20models%2C%20limiting%20clinical%20practicality.%0A%20%20We%20propose%20PatchDenoiser%2C%20a%20lightweight%2C%20energy-efficient%20multi-scale%20patch-based%20denoising%20framework.%20It%20decomposes%20denoising%20into%20local%20texture%20extraction%20and%20global%20context%20aggregation%2C%20fused%20via%20a%20spatially%20aware%20patch%20fusion%20strategy.%20This%20design%20enables%20effective%20noise%20suppression%20while%20preserving%20fine%20structural%20and%20anatomical%20details.%20PatchDenoiser%20is%20ultra-lightweight%2C%20with%20far%20fewer%20parameters%20and%20lower%20computational%20complexity%20than%20CNN-%2C%20GAN-%2C%20and%20transformer-based%20denoisers.%0A%20%20On%20the%202016%20Mayo%20Low-Dose%20CT%20dataset%2C%20PatchDenoiser%20consistently%20outperforms%20state-of-the-art%20CNN-%20and%20GAN-based%20methods%20in%20PSNR%20and%20SSIM.%20It%20is%20robust%20to%20variations%20in%20slice%20thickness%2C%20reconstruction%20kernels%2C%20and%20HU%20windows%2C%20generalizes%20across%20scanners%20without%20fine-tuning%2C%20and%20reduces%20parameters%20by%20~9x%20and%20energy%20consumption%20per%20inference%20by%20~27x%20compared%20with%20conventional%20CNN%20denoisers.%0A%20%20PatchDenoiser%20thus%20provides%20a%20practical%2C%20scalable%2C%20and%20computationally%20efficient%20solution%20for%20medical%20image%20denoising%2C%20balancing%20performance%2C%20robustness%2C%20and%20clinical%20deployability.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21987v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPatchDenoiser%253A%2520Parameter-efficient%2520multi-scale%2520patch%2520learning%2520and%2520fusion%2520denoiser%2520for%2520medical%2520images%26entry.906535625%3DJitindra%2520Fartiyal%2520and%2520Pedro%2520Freire%2520and%2520Sergei%2520K.%2520Turitsyn%2520and%2520Sergei%2520G.%2520Solovski%26entry.1292438233%3DMedical%2520images%2520are%2520essential%2520for%2520diagnosis%252C%2520treatment%2520planning%252C%2520and%2520research%252C%2520but%2520their%2520quality%2520is%2520often%2520degraded%2520by%2520noise%2520from%2520low-dose%2520acquisition%252C%2520patient%2520motion%252C%2520or%2520scanner%2520limitations%252C%2520affecting%2520both%2520clinical%2520interpretation%2520and%2520downstream%2520analysis.%2520Traditional%2520filtering%2520approaches%2520often%2520over-smooth%2520and%2520lose%2520fine%2520anatomical%2520details%252C%2520while%2520deep%2520learning%25 {"title": "TIPS Over Tricks: Simple Prompts for Effective Zero-shot Anomaly Detection", "author": "Alireza Salehi and Ehsan Karami and Sepehr Noey and Sahand Noey and Makoto Yamada and Reshad Hosseini and Mohammad Sabokrou", "abstract": "Anomaly detection identifies departures from expected behavior in safety-critical settings. When target-domain normal data are unavailable, zero-shot anomaly detection (ZSAD) leverages vision-language models (VLMs). However, CLIP's coarse image-text alignment limits both localization and detection due to (i) spatial misalignment and (ii) weak sensitivity to fine-grained anomalies; prior works compensate with complex auxiliary modules yet largely overlook the choice of backbone. We revisit the backbone and use TIPS-a VLM trained with spatially aware objectives. While TIPS alleviates CLIP's issues, it exposes a distributional gap between global and local features. We address this with decoupled prompts-fixed for image-level detection and learnable for pixel-level localization-and by injecting local evidence into the global score. Without CLIP-specific tricks, our TIPS-based pipeline improves image-level performance by 1.1-3.9% and pixel-level by 1.5-6.9% across seven industrial datasets, delivering strong generalization with a lean architecture. Code is available at github.com/AlirezaSalehy/Tipsomaly.", "link": "http://arxiv.org/abs/2602.03594v2", "date": "2026-02-25", "relevancy": 2.1762, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5708}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.526}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5245}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TIPS%20Over%20Tricks%3A%20Simple%20Prompts%20for%20Effective%20Zero-shot%20Anomaly%20Detection&body=Title%3A%20TIPS%20Over%20Tricks%3A%20Simple%20Prompts%20for%20Effective%20Zero-shot%20Anomaly%20Detection%0AAuthor%3A%20Alireza%20Salehi%20and%20Ehsan%20Karami%20and%20Sepehr%20Noey%20and%20Sahand%20Noey%20and%20Makoto%20Yamada%20and%20Reshad%20Hosseini%20and%20Mohammad%20Sabokrou%0AAbstract%3A%20Anomaly%20detection%20identifies%20departures%20from%20expected%20behavior%20in%20safety-critical%20settings.%20When%20target-domain%20normal%20data%20are%20unavailable%2C%20zero-shot%20anomaly%20detection%20%28ZSAD%29%20leverages%20vision-language%20models%20%28VLMs%29.%20However%2C%20CLIP%27s%20coarse%20image-text%20alignment%20limits%20both%20localization%20and%20detection%20due%20to%20%28i%29%20spatial%20misalignment%20and%20%28ii%29%20weak%20sensitivity%20to%20fine-grained%20anomalies%3B%20prior%20works%20compensate%20with%20complex%20auxiliary%20modules%20yet%20largely%20overlook%20the%20choice%20of%20backbone.%20We%20revisit%20the%20backbone%20and%20use%20TIPS-a%20VLM%20trained%20with%20spatially%20aware%20objectives.%20While%20TIPS%20alleviates%20CLIP%27s%20issues%2C%20it%20exposes%20a%20distributional%20gap%20between%20global%20and%20local%20features.%20We%20address%20this%20with%20decoupled%20prompts-fixed%20for%20image-level%20detection%20and%20learnable%20for%20pixel-level%20localization-and%20by%20injecting%20local%20evidence%20into%20the%20global%20score.%20Without%20CLIP-specific%20tricks%2C%20our%20TIPS-based%20pipeline%20improves%20image-level%20performance%20by%201.1-3.9%25%20and%20pixel-level%20by%201.5-6.9%25%20across%20seven%20industrial%20datasets%2C%20delivering%20strong%20generalization%20with%20a%20lean%20architecture.%20Code%20is%20available%20at%20github.com/AlirezaSalehy/Tipsomaly.%0ALink%3A%20http%3A//arxiv.org/abs/2602.03594v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.138 with%2520a%2520lean%2520architecture.%2520Code%2520is%2520available%2520at%2520github.com/AlirezaSalehy/Tipsomaly.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.03594v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=TIPS%20Over%20Tricks%3A%20Simple%20Prompts%20for%20Effective%20Zero-shot%20Anomaly%20Detection&entry.906535625=Alireza%20Salehi%20and%20Ehsan%20Karami%20and%20Sepehr%20Noey%20and%20Sahand%20Noey%20and%20Makoto%20Yamada%20and%20Reshad%20Hosseini%20and%20Mohammad%20Sabokrou&entry.1292438233=Anomaly%20detection%20identifies%20departures%20from%20expected%20behavior%20in%20safety-critical%20settings.%20When%20target-domain%20normal%20data%20are%20unavailable%2C%20zero-shot%20anomaly%20detection%20%28ZSAD%29%20leverages%20vision-language%20models%20%28VLMs%29.%20However%2C%20CLIP%27s%20coarse%20image-text%20alignment%20limits%20both%20localization%20and%20detection%20due%20to%20%28i%29%20spatial%20misalignment%20and%20%28ii%29%20weak%20sensitivity%20to%20fine-grained%20anomalies%3B%20prior%20works%20compensate%20with%20complex%20auxiliary%20modules%20yet%20largely%20overlook%20the%20choice%20of%20backbone.%20We%20revisit%20the%20backbone%20and%20use%20TIPS-a%20VLM%20trained%20with%20spatially%20aware%20objectives.%20While%20TIPS%20alleviates%20CLIP%27s%20issues%2C%20it%20exposes%20a%20distributional%20gap%20between%20global%20and%20local%20features.%20We%20address%20this%20with%20decoupled%20prompts-fixed%20for%20image-level%20detection%20and%20learnable%20for%20pixel-level%20localization-and%20by%20injecting%20local%20evidence%20into%20the%20global%20score.%20Without%20CLIP-specific%20tricks%2C%20our%20TIPS-based%20pipeline%20improves%20image-level%20performance%20by%201.1-3.9%25%20and%20pixel-level%20by%201.5-6.9%25%20across%20seven%20industrial%20datasets%2C%20delivering%20strong%20generalization%20with%20a%20lean%20architecture.%20Code%20is%20available%20at%20github.com/AlirezaSalehy/Tipsomaly.&entry.1838667208=http%3A//arxiv.org/abs/2602.03594v2&entry.124074799=Read"},
{"title": "High-Fidelity And Complex Test Data Generation For Google SQL Code Generation Services", "author": "Shivasankari Kannan and Yeounoh Chung and Amita Gondi and Tristan Swadell and Fatma Ozcan", "abstract": "The demand for high-fidelity test data is paramount in industrial settings where access to production data is largely restricted. Traditional data generation methods often fall short, struggling with low-fidelity and the ability to model complex data structures and semantic relationships that are critical for testing complex SQL code generation services like Natural Language to SQL (NL2SQL). In this paper, we address the critical need for generating syntactically correct and semantically relevant high-fidelity mock data for complex data structures that includes columns with nested structures that we frequently encounter in Google workloads. We highlight the limitations of existing approaches used in production, particularly their inability to handle large and complex data structures, as well as the lack of semantically coherent test data that lead to limited test coverage. We demonstrate that by leveraging Large Language Models (LLMs) and incorporating strategic pre- and post-processing steps, we can generate syntactically correct and semantically relevant high-fidelity test data that adheres to complex structural constraints and maintains semantic integrity to the SQL test targets (queries/functions). This approach supports comprehensive testing of complex SQL queries involving joins, aggregations, and even deeply nested subqueries, ensuring robust evaluation of SQL code generation services, like NL2SQL and SQL Code Assistant. Our results demonstrate the practical utility of an LLM (\\textit{Gemini}) based test data generation for industrial SQL code generation services where generating high-fidelity test data is essential due to the frequent unavailability and inaccessibility of production datasets for testing.", "link": "http://arxiv.org/abs/2504.17203v4", "date": "2026-02-25", "relevancy": 2.171, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4382}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4379}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4265}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20High-Fidelity%20And%20Complex%20Test%20Data%20Generation%20For%20Google%20SQL%20Code%20Generation%20Services&body=Title%3A%20High-Fidelity%20And%20Complex%20Test%20Data%20Generation%20For%20Google%20SQL%20Code%20Generation%20Services%0AAuthor%3A%20Shivasankari%20Kannan%20and%20Yeounoh%20Chung%20and%20Amita%20Gondi%20and%20Tristan%20Swadell%20and%20Fatma%20Ozcan%0AAbstract%3A%20The%20demand%20for%20high-fidelity%20test%20data%20is%20paramount%20in%20industrial%20settings%20where%20access%20to%20production%20data%20is%20largely%20restricted.%20Traditional%20data%20generation%20methods%20often%20fall%20short%2C%20struggling%20with%20low-fidelity%20and%20the%20ability%20to%20model%20complex%20data%20structures%20and%20semantic%20relationships%20that%20are%20critical%20for%20testing%20complex%20SQL%20code%20generation%20services%20like%20Natural%20Language%20to%20SQL%20%28NL2SQL%29.%20In%20this%20paper%2C%20we%20address%20the%20critical%20need%20for%20generating%20syntactically%20correct%20and%20semantically%20relevant%20high-fidelity%20mock%20data%20for%20complex%20data%20structures%20that%20includes%20columns%20with%20nested%20structures%20that%20we%20frequently%20encounter%20in%20Google%20workloads.%20We%20highlight%20the%20limitations%20of%20existing%20approaches%20used%20in%20production%2C%20particularly%20their%20inability%20to%20handle%20large%20and%20complex%20data%20structures%2C%20as%20well%20as%20the%20lack%20of%20semantically%20coherent%20test%20data%20that%20lead%20to%20limited%20test%20coverage.%20We%20demonstrate%20that%20by%20leveraging%20Large%20Language%20Models%20%28LLMs%29%20and%20incorporating%20strategic%20pre-%20and%20post-processing%20steps%2C%20we%20can%20generate%20syntactically%20correct%20and%20semantically%20relevant%20high-fidelity%20test%20data%20that%20adheres%20to%20complex%20structural%20constraints%20and%20maintains%20semantic%20integrity%20to%20the%20SQL%20test%20targets%20%28queries/functions%29.%20This%20approach%20supports%20comprehensive%20testing%20of%20complex%20SQL%20queries%20involving%20joins%2C%20aggregations%2C%20and%20even%20deeply%20nested%20subqueries%2C%20ensuring%20robust%20evaluation%20of%20SQL%20code%20generation%20services%2C%20like%20NL2SQL%20and%20SQL%20Code%20Assistant.%20Our%20results%20demonstrate%20the%20practical%20utility%20of%20an%20LLM%20%28%5Ctextit%7BGemini%7D%29%20based%20test%20data%20generation%20for%20industrial%20SQL%20code%20generation%20services%20where%20generating%20high-fidelity%20test%20data%20is%20essential%20due%20to%20the%20frequent%20unavailability%20and%20inaccessibility%20of%20production%20datasets%20for%20testing.%0ALink%3A%20http%3A//arxiv.org/abs/2504.17203v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHigh-Fidelity%2520And%2520Complex%2520Test%2520Data%2520Generation%2520For%2520Google%2520SQL%2520Code%2520Generation%2520Services%26entry.906535625%3DShivasankari%2520Kannan%2520and%2520Yeounoh%2520Chung%2520and%2520Amita%2520Gondi%2520and%2520Tristan%2520Swadell%2520and%2520Fatma%2520Ozcan%26entry.1292438233%3DThe%2520demand%2520for%2520high-fidelity%2520test%2520data%2520is%2520paramount%2520in%2520industrial%2520settings%2520where%2520access%2520to%2520production%2520data%2520is%2520largely%2520restricted.%2520Traditional%2520data%2520generation%2520methods%2520often%2520fall%2520short%252C%2520struggling%2520with%2520low-fidelity%2520and%2520the%2520ability%2520to%2520model%2520complex%2520data%2520structures%2520and%2520semantic%2520relationships%2520that%2520are%2520critical%2520for%2520testing%2520complex%2520SQL%2520code%2520generation%2520services%2520like%2520Natural%2520Language%2520to%2520SQL%2520%2528NL2SQL%2529.%2520In%2520this%2520paper%252C%2520we%2520address%2520the%2520critical%2520need%2520for%2520generating%2520syntactically%2520correct%2520and%2520semantically%2520relevant%2520high-fidelity%2520mock%2520data%2520for%2520complex%2520data%2520structures%2520that%2520includes%2520columns%2520with%2520nested%2520structures%2520that%2520we%2520frequently%2520encounter%2520in%2520Google%2520workloads.%2520We%2520highlight%2520the%2520limitations%2520of%2520existing%2520approaches%2520used%2520in%2520production%252C%2520particularly%2520their%2520inability%2520to%2520handle%2520large%2520and%2520complex%2520data%2520structures%252C%2520as%2520well%2520as%2520the%2520lack%2520of%2520semantically%2520coherent%2520test%2520data%2520that%2520lead%2520to%2520limited%2520test%2520coverage.%2520We%2520demonstrate%2520that%2520by%2520leveraging%2520Large%2520Language%2520Models%2520%2528LLMs%2529%2520and%2520incorporating%2520strategic%2520pre-%2520and%2520post-processing%2520steps%252C%2520we%2520can%2520generate%2520syntactically%2520correct%2520and%2520semantically%2520relevant%2520high-fidelity%2520test%2520data%2520that%2520adheres%2520to%2520complex%2520structural%2520constraints%2520and%2520maintains%2520semantic%2520integrity%2520to%2520the%2520SQL%2520test%2520targets%2520%2528queries/functions%2529.%2520This%2520approach%2520supports%2520comprehensive%2520testing%2520of%2520complex%2520SQL%2520queries%2520involving%2520joins%252C%2520aggregations%252C%2520and%2520even%2520deeply%2520nested%2520subqueries%252C%2520ensuring%2520robust%2520evaluation%2520of%2520SQL%2520code%2520generation%2520service omplex%20data%20structures%2C%20as%20well%20as%20the%20lack%20of%20semantically%20coherent%20test%20data%20that%20lead%20to%20limited%20test%20coverage.%20We%20demonstrate%20that%20by%20leveraging%20Large%20Language%20Models%20%28LLMs%29%20and%20incorporating%20strategic%20pre-%20and%20post-processing%20steps%2C%20we%20can%20generate%20syntactically%20correct%20and%20semantically%20relevant%20high-fidelity%20test%20data%20that%20adheres%20to%20complex%20structural%20constraints%20and%20maintains%20semantic%20integrity%20to%20the%20SQL%20test%20targets%20%28queries/functions%29.%20This%20approach%20supports%20comprehensive%20testing%20of%20complex%20SQL%20queries%20involving%20joins%2C%20aggregations%2C%20and%20even%20deeply%20nested%20subqueries%2C%20ensuring%20robust%20evaluation%20of%20SQL%20code%20generation%20services%2C%20like%20NL2SQL%20and%20SQL%20Code%20Assistant.%20Our%20results%20demonstrate%20the%20practical%20utility%20of%20an%20LLM%20%28%5Ctextit%7BGemini%7D%29%20based%20test%20data%20generation%20for%20industrial%20SQL%20code%20generation%20services%20where%20generating%20high-fidelity%20test%20data%20is%20essential%20due%20to%20the%20frequent%20unavailability%20and%20inaccessibility%20of%20production%20datasets%20for%20testing.&entry.1838667208=http%3A//arxiv.org/abs/2504.17203v4&entry.124074799=Read"},
{"title": "AdaSpot: Spend Resolution Where It Matters for Precise Event Spotting", "author": "Artur Xarles and Sergio Escalera and Thomas B. Moeslund and Albert Clap\u00e9s", "abstract": "Precise Event Spotting aims to localize fast-paced actions or events in videos with high temporal precision, a key task for applications in sports analytics, robotics, and autonomous systems. Existing methods typically process all frames uniformly, overlooking the inherent spatio-temporal redundancy in video data. This leads to redundant computation on non-informative regions while limiting overall efficiency. To remain tractable, they often spatially downsample inputs, losing fine-grained details crucial for precise localization. To address these limitations, we propose \\textbf{AdaSpot}, a simple yet effective framework that processes low-resolution videos to extract global task-relevant features while adaptively selecting the most informative region-of-interest in each frame for high-resolution processing. The selection is performed via an unsupervised, task-aware strategy that maintains spatio-temporal consistency across frames and avoids the training instability of learnable alternatives. This design preserves essential fine-grained visual cues with a marginal computational overhead compared to low-resolution-only baselines, while remaining far more efficient than uniform high-resolution processing. Experiments on standard PES benchmarks demonstrate that \\textbf{AdaSpot} achieves state-of-the-art performance under strict evaluation metrics (\\eg, $+3.96$ and $+2.26$ mAP$@0$ frames on Tennis and FineDiving), while also maintaining strong results under looser metrics. Code is available at: \\href{https://github.com/arturxe2/AdaSpot}{https://github.com/arturxe2/AdaSpot}.", "link": "http://arxiv.org/abs/2602.22073v1", "date": "2026-02-25", "relevancy": 2.1709, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5486}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5471}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5171}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AdaSpot%3A%20Spend%20Resolution%20Where%20It%20Matters%20for%20Precise%20Event%20Spotting&body=Title%3A%20AdaSpot%3A%20Spend%20Resolution%20Where%20It%20Matters%20for%20Precise%20Event%20Spotting%0AAuthor%3A%20Artur%20Xarles%20and%20Sergio%20Escalera%20and%20Thomas%20B.%20Moeslund%20and%20Albert%20Clap%C3%A9s%0AAbstract%3A%20Precise%20Event%20Spotting%20aims%20to%20localize%20fast-paced%20actions%20or%20events%20in%20videos%20with%20high%20temporal%20precision%2C%20a%20key%20task%20for%20applications%20in%20sports%20analytics%2C%20robotics%2C%20and%20autonomous%20systems.%20Existing%20methods%20typically%20process%20all%20frames%20uniformly%2C%20overlooking%20the%20inherent%20spatio-temporal%20redundancy%20in%20video%20data.%20This%20leads%20to%20redundant%20computation%20on%20non-informative%20regions%20while%20limiting%20overall%20efficiency.%20To%20remain%20tractable%2C%20they%20often%20spatially%20downsample%20inputs%2C%20losing%20fine-grained%20details%20crucial%20for%20precise%20localization.%20To%20address%20these%20limitations%2C%20we%20propose%20%5Ctextbf%7BAdaSpot%7D%2C%20a%20simple%20yet%20effective%20framework%20that%20processes%20low-resolution%20videos%20to%20extract%20global%20task-relevant%20features%20while%20adaptively%20selecting%20the%20most%20informative%20region-of-interest%20in%20each%20frame%20for%20high-resolution%20processing.%20The%20selection%20is%20performed%20via%20an%20unsupervised%2C%20task-aware%20strategy%20that%20maintains%20spatio-temporal%20consistency%20across%20frames%20and%20avoids%20the%20training%20instability%20of%20learnable%20alternatives.%20This%20design%20preserves%20essential%20fine-grained%20visual%20cues%20with%20a%20marginal%20computational%20overhead%20compared%20to%20low-resolution-only%20baselines%2C%20while%20remaining%20far%20more%20efficient%20than%20uniform%20high-resolution%20processing.%20Experiments%20on%20standard%20PES%20benchmarks%20demonstrate%20that%20%5Ctextbf%7BAdaSpot%7D%20achieves%20state-of-the-art%20performance%20under%20strict%20evaluation%20metrics%20%28%5Ceg%2C%20%24%2B3.96%24%20and%20%24%2B2.26%24%20mAP%24%400%24%20frames%20on%20Tennis%20and%20FineDiving%29%2C%20while%20also%20maintaining%20strong%20results%20under%20looser%20metrics.%20Code%20is%20available%20at%3A%20%5Chref%7Bhttps%3A//github.com/arturxe2/AdaSpot%7D%7Bhttps%3A//github.com/arturxe2/AdaSpot%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22073v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAdaSpot%253A%2520Spend%2520Resolution%2520Where%2520It%2520Matters%2520for%2520Precise%2520Event%2520Spotting%26entry.906535625%3DArtur%2520Xarles%2520and%2520Sergio%2520Escalera%2520and%2520Thomas%2520B.%2520Moeslund%2520and%2520Albert%2520Clap%25C3%25A9s%26entry.1292438233%3DPrecise%2520Event%2520Spotting%2520aims%2520to%2520localize%2520fast-paced%2520actions%2520or%2520events%2520in%2520videos%2520with%2520high%2520temporal%2520precision%252C%2520a%2520key%2520task%2520for%2520applications%2520in%2520sports%2520analytics%252C%2520robotics%252C%2520and%2520autonomous%2520systems.%2520Existing%2520methods%2520typically%2520process%2520all%2520frames%2520uniformly%252C%2520overlooking%2520the%2520inherent%2520spatio-temporal%2520redundancy%2520in%2520video%2520data.%2520This%2520leads%2520to%2520redundant%2520computation%2520on%2520non-informative%2520regions%2520while%2520limiting%2520overall%2520efficiency.%2520To%2520remain%2520tractable%252C%2520they%2520often%2520sp {"title": "Object-Centric World Models from Few-Shot Annotations for Sample-Efficient Reinforcement Learning", "author": "Weipu Zhang and Adam Jelley and Trevor McInroe and Amos Storkey and Gang Wang", "abstract": "While deep reinforcement learning (RL) from pixels has achieved remarkable success, its sample inefficiency remains a critical limitation for real-world applications. Model-based RL (MBRL) addresses this by learning a world model to generate simulated experience, but standard approaches that rely on pixel-level reconstruction losses often fail to capture small, task-critical objects in complex, dynamic scenes. We posit that an object-centric (OC) representation can direct model capacity toward semantically meaningful entities, improving dynamics prediction and sample efficiency. In this work, we introduce OC-STORM, an object-centric MBRL framework that enhances a learned world model with object representations extracted by a pretrained segmentation network. By conditioning on a minimal number of annotated frames, OC-STORM learns to track decision-relevant object dynamics and inter-object interactions without extensive labeling or access to privileged information. Empirical results demonstrate that OC-STORM significantly outperforms the STORM baseline on the Atari 100k benchmark and achieves state-of-the-art sample efficiency on challenging boss fights in the visually complex game Hollow Knight. Our findings underscore the potential of integrating OC priors into MBRL for complex visual domains. Project page: https://oc-storm.weipuzhang.com", "link": "http://arxiv.org/abs/2501.16443v2", "date": "2026-02-25", "relevancy": 2.1641, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5473}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5398}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5398}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Object-Centric%20World%20Models%20from%20Few-Shot%20Annotations%20for%20Sample-Efficient%20Reinforcement%20Learning&body=Title%3A%20Object-Centric%20World%20Models%20from%20Few-Shot%20Annotations%20for%20Sample-Efficient%20Reinforcement%20Learning%0AAuthor%3A%20Weipu%20Zhang%20and%20Adam%20Jelley%20and%20Trevor%20McInroe%20and%20Amos%20Storkey%20and%20Gang%20Wang%0AAbstract%3A%20While%20deep%20reinforcement%20learning%20%28RL%29%20from%20pixels%20has%20achieved%20remarkable%20success%2C%20its%20sample%20inefficiency%20remains%20a%20critical%20limitation%20for%20real-world%20applications.%20Model-based%20RL%20%28MBRL%29%20addresses%20this%20by%20learning%20a%20world%20model%20to%20generate%20simulated%20experience%2C%20but%20standard%20approaches%20that%20rely%20on%20pixel-level%20reconstruction%20losses%20often%20fail%20to%20capture%20small%2C%20task-critical%20objects%20in%20complex%2C%20dynamic%20scenes.%20We%20posit%20that%20an%20object-centric%20%28OC%29%20representation%20can%20direct%20model%20capacity%20toward%20semantically%20meaningful%20entities%2C%20improving%20dynamics%20prediction%20and%20sample%20efficiency.%20In%20this%20work%2C%20we%20introduce%20OC-STORM%2C%20an%20object-centric%20MBRL%20framework%20that%20enhances%20a%20learned%20world%20model%20with%20object%20representations%20extracted%20by%20a%20pretrained%20segmentation%20network.%20By%20conditioning%20on%20a%20minimal%20number%20of%20annotated%20frames%2C%20OC-STORM%20learns%20to%20track%20decision-relevant%20object%20dynamics%20and%20inter-object%20interactions%20without%20extensive%20labeling%20or%20access%20to%20privileged%20information.%20Empirical%20results%20demonstrate%20that%20OC-STORM%20significantly%20outperforms%20the%20STORM%20baseline%20on%20the%20Atari%20100k%20benchmark%20and%20achieves%20state-of-the-art%20sample%20efficiency%20on%20challenging%20boss%20fights%20in%20the%20visually%20complex%20game%20Hollow%20Knight.%20Our%20findings%20underscore%20the%20potential%20of%20integrating%20OC%20priors%20into%20MBRL%20for%20complex%20visual%20domains.%20Project%20page%3A%20https%3A//oc-storm.weipuzhang.com%0ALink%3A%20http%3A//arxiv.org/abs/2501.16443v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DObject-Centric%2520World%2520Models%2520from%2520Few-Shot%2520Annotations%2520for%2520Sample-Efficient%2520Reinforcement%2520Learning%26entry.906535625%3DWeipu%2520Zhang%2520and%2520Adam%2520Jelley%2520and%2520Trevor%2520McInroe%2520and%2520Amos%2520Storkey%2520and%2520Gang%2520Wang%26entry.1292438233%3DWhile%2520deep%2520reinforcement%2520learning%2520%2528RL%2529%2520from%2520pixels%2520has%2520achieved%2520remarkable%2520success%252C%2520its%2520sample%2520inefficiency%2520remains%2520a%2520critical%2520limitation%2520for%2520real-world%2520applications.%2520Model-based%2520RL%2520%2528MBRL%2529%2520addresses%2520this%2520by%2520learning%2520a%2520world%2520model%2520to%2520generate%2520simulated%2520experience%252C%2520but%2520standard%2520approaches%2520that%2520rely%2520on%2520pixel-level%2520reconstruction%2520losses%2520often%2520fail%2520to%2520capture%2520small%252C%2520task-critical%2520objects%2520in%2520complex%252C%2520dynamic%2520scenes.%2520We%2520posit%2520that%2520an%2520object-centric%2520%2528OC%2529%2520representation%2520can%2520direct%2520model%2520capacity%2520toward%2520semantically%2520meaningful%2520entities%252C%2520improving%2520dynamics%2520prediction%2520and%2520sample%2520efficiency.%2520In%2520this%2520work%252C%2520we%2520introduce%2520OC-STORM%252C%2520an%2520object-centric%2520MBRL%2520framework%2520that%2520enhances%2520a%2520learned%2520world%2520model%2520with%2520object%2520representations%2520extracted%2520by%2520a%2520pretrained%2520segmentation%2520network.%2520By%2520conditioning%2520on%2520a%2520minimal%2520number%2520of%2520annotated%2520frames%252C%2520OC-STORM%2520learns%2520to%2520track%2520decision-relevant%2520object%2520dynamics%2520and%2520inter-object%2520interactions%2520without%2520extensive%2520labeling%2520or%2520access%2520to%2520privileged%2520information.%2520Empirical%2520results%2520demonstrate%2520that%2520OC-STORM%2520significantly%2520outperforms%2520the%2520STORM%2520baseline%2520on%2520the%2520Atari%2520100k%2520benchmark%2520and%2520achieves%2520state-of-the-art%2520sample%2520efficiency%2520on%2520challenging%2520boss%2520fights%2520in%2520the%2520visually%2520complex%2520game%2520Hollow%2520Knight.%2520Our%2520findings%2520underscore%2520the%2520potential%2520of%2520integrating%2520OC%2520priors%2520into%2520MBRL%2520for%2520complex%2520visual%2520domains.%2520Project%2520page%253A%2520https%253A//oc-storm.weipuzhang.com%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2501.16443v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Object-Centric%20World%20Models%20from%20Few-Shot%20Annotations%20for%20Sample-Efficient%20Reinforcement%20Learning&entry.906535625=Weipu%20Zhang%20and%20Adam%20Jelley%20and%20Trevor%20McInroe%20and%20Amos%20Storkey%20and%20Gang%20Wang&entry.1292438233=While%20deep%20reinforcement%20learning%20%28RL%29%20from%20pixels%20has%20achieved%20remarkable%20success%2C%20its%20sample%20inefficiency%20remains%20a%20critical%20limitation%20for%20real-world%20applications.%20Model-based%20RL%20%28MBRL%29%20addresses%20this%20by%20learning%20a%20world%20model%20to%20generate%20simulated%20experience%2C%20but%20standard%20approaches%20that%20rely%20on%20pixel-level%20reconstruction%20losses%20often%20fail%20to%20capture%20small%2C%20task-critical%20objects%20in%20complex%2C%20dynamic%20sc {"title": "Diversity Boosts AI-Generated Text Detection", "author": "Advik Raj Basani and Pin-Yu Chen", "abstract": "Detecting AI-generated text is an increasing necessity to combat misuse of LLMs in education, business compliance, journalism, and social media, where synthetic fluency can mask misinformation or deception. While prior detectors often rely on token-level likelihoods or opaque black-box classifiers, these approaches struggle against high-quality generations and offer little interpretability. In this work, we propose DivEye, a novel detection framework that captures how unpredictability fluctuates across a text using surprisal-based features. Motivated by the observation that human-authored text exhibits richer variability in lexical and structural unpredictability than LLM outputs, DivEye captures this signal through a set of interpretable statistical features. Our method outperforms existing zero-shot detectors by up to 33.2% and achieves competitive performance with fine-tuned baselines across multiple benchmarks. DivEye is robust to paraphrasing and adversarial attacks, generalizes well across domains and models, and improves the performance of existing detectors by up to 18.7% when used as an auxiliary signal. Beyond detection, DivEye provides interpretable insights into why a text is flagged, pointing to rhythmic unpredictability as a powerful and underexplored signal for LLM detection.", "link": "http://arxiv.org/abs/2509.18880v3", "date": "2026-02-25", "relevancy": 2.1601, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5591}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5405}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5319}], "mail 7%2525%2520when%2520used%2520as%2520an%2520auxiliary%2520signal.%2520Beyond%2520detection%252C%2520DivEye%2520provides%2520interpretable%2520insights%2520into%2520why%2520a%2520text%2520is%2520flagged%252C%2520pointing%2520to%2520rhythmic%2520unpredictability%2520as%2520a%2520powerful%2520and%2520underexplored%2520signal%2520for%2520LLM%2520detection.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.18880v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Diversity%20Boosts%20AI-Generated%20Text%20Detection&entry.906535625=Advik%20Raj%20Basani%20and%20Pin-Yu%20Chen&entry.1292438233=Detecting%20AI-generated%20text%20is%20an%20increasing%20necessity%20to%20combat%20misuse%20of%20LLMs%20in%20education%2C%20business%20compliance%2C%20journalism%2C%20and%20social%20media%2C%20where%20synthetic%20fluency%20can%20mask%20misinformation%20or%20deception.%20While%20prior%20detectors%20often%20rely%20on%20token-level%20likelihoods%20or%20opaque%20black-box%20classifiers%2C%20these%20approaches%20struggle%20against%20high-quality%20generations%20and%20offer%20little%20interpretability.%20In%20this%20work%2C%20we%20propose%20DivEye%2C%20a%20novel%20detection%20framework%20that%20captures%20how%20unpredictability%20fluctuates%20across%20a%20text%20using%20surprisal-based%20features.%20Motivated%20by%20the%20observation%20that%20human-authored%20text%20exhibits%20richer%20variability%20in%20lexical%20and%20structural%20unpredictability%20than%20LLM%20outputs%2C%20DivEye%20captures%20this%20signal%20through%20a%20set%20of%20interpretable%20statistical%20features.%20Our%20method%20outperforms%20existing%20zero-shot%20detectors%20by%20up%20to%2033.2%25%20and%20achieves%20competitive%20performance%20with%20fine-tuned%20baselines%20across%20multiple%20benchmarks.%20DivEye%20is%20robust%20to%20paraphrasing%20and%20adversarial%20attacks%2C%20generalizes%20well%20across%20domains%20and%20models%2C%20and%20improves%20the%20performance%20of%20existing%20detectors%20by%20up%20to%2018.7%25%20when%20used%20as%20an%20auxiliary%20signal.%20Beyond%20detection%2C%20DivEye%20provides%20interpretable%20insights%20into%20why%20a%20text%20is%20flagged%2C%20pointing%20to%20rhythmic%20unpredictability%20as%20a%20powerful%20and%20underexplored%20signal%20for%20LLM%20detection.&entry.1838667208=http%3A//arxiv.org/abs/2509.18880v3&entry.124074799=Read"},
{"title": "Off-The-Shelf Image-to-Image Models Are All You Need To Defeat Image Protection Schemes", "author": "Xavier Pleimling and Sifat Muhammad Abdullah and Gunjan Balde and Peng Gao and Mainack Mondal and Murtuza Jadliwala and Bimal Viswanath", "abstract": "Advances in Generative AI (GenAI) have led to the development of various protection strategies to prevent the unauthorized use of images. These methods rely on adding imperceptible protective perturbations to images to thwart misuse such as style mimicry or deepfake manipulations. Although previous attacks on these protections required specialized, purpose-built methods, we demonstrate that this is no longer necessary. We show that off-the-shelf image-to-image GenAI models can be repurposed as generic ``denoisers\" using a simple text prompt, effectively removing a wide range of protective perturbations. Across 8 case studies spanning 6 diverse protection schemes, our general-purpose attack not only circumvents these defenses but also outperforms existing specialized attacks while preserving the image's utility for the adversary. Our findings reveal a critical and widespread vulnerability in the current landscape of image protection, indicating that many schemes provide a false sense of security. We stress the urgent need to develop robust defenses and establish that any future protection mechanism must be benchmarked against attacks from off-the-shelf GenAI models. Code is available in this repository: https://github.com/mlsecviswanath/img2imgdenoiser", "link": "http://arxiv.org/abs/2602.22197v1", "date": "2026-02-25", "relevancy": 2.1571, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5561}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5414}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5304}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Off-The-Shelf%20Image-to-Image%20Models%20Are%20All%20You%20Need%20To%20Defeat%20Image%20Protection%20Schemes&body=Title%3A%20Off-The-Shelf%20Image-to-Image%20Models%20Are%20All%20You%20Need%20To%20Defeat%20Image%20Protection%20Schemes%0AAuthor%3A%20Xavier%20Pleimling%20and%20Sifat%20Muhammad%20Abdullah%20and%20Gunjan%20Balde%20and%20Peng%20Gao%20and%20Mainack%20Mondal%20and%20Murtuza%20Jadliwala%20and%20Bimal%20Viswanath%0AAbstract%3A%20Advances%20in%20Generative%20AI%20%28GenAI%29%20have%20led%20to%20the%20development%20of%20various%20protection%20strategies%20to%20prevent%20the%20unauthorized%20use%20of%20images.%20These%20methods%20rely%20on%20adding%20imperceptible%20protective%20perturbations%20to%20images%20to%20thwart%20misuse%20such%20as%20style%20mimicry%20or%20deepfake%20manipulations.%20Although%20previous%20attacks%20on%20these%20protections%20required%20specialized%2C%20purpose-built%20methods%2C%20we%20demonstrate%20that%20this%20is%20no%20longer%20necessary.%20We%20show%20that%20off-the-shelf%20image-to-image%20GenAI%20models%20can%20be%20repurposed%20as%20generic%20%60%60denoisers%22%20using%20a%20simple%20text%20prompt%2C%20effectively%20removing%20a%20wide%20range%20of%20protective%20perturbations.%20Across%208%20case%20studies%20spanning%206%20diverse%20protection%20schemes%2C%20our%20general-purpose%20attack%20not%20only%20circumvents%20these%20defenses%20but%20also%20outperforms%20existing%20specialized%20attacks%20while%20preserving%20the%20image%27s%20utility%20for%20the%20adversary.%20Our%20findings%20reveal%20a%20critical%20and%20widespread%20vulnerability%20in%20the%20current%20landscape%20of%20image%20protection%2C%20indicating%20that%20many%20schemes%20provide%20a%20false%20sense%20of%20security.%20We%20stress%20the%20urgent%20need%20to%20develop%20robust%20defenses%20and%20establish%20that%20any%20future%20protection%20mechanism%20must%20be%20benchmarked%20against%20attacks%20from%20off-the-shelf%20GenAI%20models.%20Code%20is%20available%20in%20this%20repository%3A%20https%3A//github.com/mlsecviswanath/img2imgdenoiser%0ALink%3A%20http%3A//arxiv.org/abs/2602.22197v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOff-The-Shelf%2520Image-to-Image%2520Models%2520Are%2520All%2520You%2520Need%2520To%2520Defeat%2520Image%2520Protection%2520Schemes%26entry.906535625%3DXavier%2520Pleimling%2520and%2520Sifat%2520Muhammad%2520Abdullah%2520and%2520Gunjan%2520Balde%2520and%2520Peng%2520Gao%2520and%2520Mainack%2520Mondal%2520and%2520Murtuza%2520Jadliwala%2520and%2520Bimal%2520Viswanath%26entry.1292438233%3DAdvances%2520in%2520Generative%2520AI%2520%2528GenAI%2529%2520have%2520led%2520to%2520the%2520development%2520of%2520various%2520protection%2520strategies%2520to%2520prevent%2520the%2520unauthorized%2520use%2520of%2520images.%2520These%2520methods%2520rely%2520on%2520adding%2520imperceptible%2520protective%2520perturbations%2520to%2520images%2520to%2520thwart%2520misuse%2520such%2520as%2520style%2520mimicry%2520or%2520deepfake%2520manipulations.%2520Although%2520previous%2520attacks%2520on%2520these%2520protections%2520required%2520specialized%252C%2520purpose-built%2520methods%252C%2520we%2520demonstrate%2520that%2520this%2520is%2520no%2520longer%2520necessary.%2520We%2520show%2520that%2520off-the-shelf%2520image-to-image%2520GenAI%2520models%2520can%2520be%2520repurposed%2520as%2520generic%2520%2560%2560denoisers%2522%2520using%2520a%2520simple%2520text%2520prompt%252C%2520effectively%2520removing%2520a%2520wide%2520range%2520of%2520protective%2520perturbations.%2520Across%25208%2520case%2520studies%2520spanning%25206%2520diverse%2520protection%2520schemes%252C%2520our%2520general-purpose%2520attack%2520not%2520only%2520circumvents%2520these%2520defenses%2520but%2520also%2520outperforms%2520existing%2520specialized%2520attacks%2520while%2520preserving%2520the%2520image%2527s%2520utility%2520for%2520the%2520adversary.%2520Our%2520findings%2520reveal%2520a%2520critical%2520and%2520widespread%2520vulnerability%2520in%2520the%2520current%2520landscape%2520of%2520image%2520protection%252C%2520indicating%2520that%2520many%2520schemes%2520provide%2520a%2520false%2520sense%2520of%2520security.%2520We%2520stress%2520the%2520urgent%2520need%2520to%2520develop%2520robust%2520defenses%2520and%2520establish%2520that%2520any%2520future%2520protection%2520mechanism%2520must%2520be%2520benchmarked%2520against%2520attacks%2520from%2520off-the-shelf%2520GenAI%2520models.%2520Code%2520is%2520available%2520in%2520this%2520repository%253A%2520https%253A//github.com/mlsecviswanath/img2imgdenoiser%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.22197v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Off-The-Shelf%20Image-to-Image%20Models%20Are%20All%20You%20Need%20To%20Defeat%20Image%20Protection%20Schemes&entry.906535625=Xavier%20Pleimling%20and%20Sifat%20Muhammad%20Abdullah%20and%20Gunjan%20Balde%20and%20Peng%20Gao%20and%20Mainack%20Mondal%20and%20Murtuza%20Jadliwala%20and%20Bimal%20Viswanath&entry.1292438233=Advances%20in%20Generative%20AI%20%28GenAI%29%20have%20led%20to%20the%20development%20of%20various%20protection%20strategies%20to%20prevent%20the%20unauthorized%20use%20of%20images.%20These%20methods%20rely%20on%20adding%20imperceptible%20protective%20perturbations%20to%20images%20to%20thwart%20misuse%20such%20as%20style%20mimicry%20or%20deepfake%20manipulations.%20Although%20previous%20attacks%20on%20these%20protections%20required%20specialized%2C%20purpose-built%20methods%2C%20we%20demonstrate%20that%20this%20is%20no%20longer%20necessary.%20We%20show%20that%20off-the-shelf%20image-to-image%20GenA {"title": "MPC of Uncertain Nonlinear Systems with Meta-Learning for Fast Adaptation of Neural Predictive Models", "author": "Jiaqi Yan and Ankush Chakrabarty and Alisa Rupenyan and John Lygeros", "abstract": "In this paper, we consider the problem of reference tracking in uncertain nonlinear systems. A neural State-Space Model (NSSM) is used to approximate the nonlinear system, where a deep encoder network learns the nonlinearity from data, and a state-space component captures the temporal relationship. This transforms the nonlinear system into a linear system in a latent space, enabling the application of model predictive control (MPC) to determine effective control actions. Our objective is to design the optimal controller using limited data from the \\textit{target system} (the system of interest). To this end, we employ an implicit model-agnostic meta-learning (iMAML) framework that leverages information from \\textit{source systems} (systems that share similarities with the target system) to expedite training in the target system and enhance its control performance. The framework consists of two phases: the (offine) meta-training phase learns a aggregated NSSM using data from source systems, and the (online) meta-inference phase quickly adapts this aggregated model to the target system using only a few data points and few online training iterations, based on local loss function gradients. The iMAML algorithm exploits the implicit function theorem to exactly compute the gradient during training, without relying on the entire optimization path. By focusing solely on the optimal solution, rather than the path, we can meta-train with less storage complexity and fewer approximations than other contemporary meta-learning algorithms. We demonstrate through numerical examples that our proposed method can yield accurate predictive models by adaptation, resulting in a downstream MPC that outperforms several baselines.", "link": "http://arxiv.org/abs/2404.12097v2", "date": "2026-02-25", "relevancy": 2.1522, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5618}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5368}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5298}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MPC%20of%20Uncertain%20Nonlinear%20Systems%20with%20Meta-Learning%20for%20Fast%20Adaptation%20of%20Neural%20Predictive%20Models&body=Title%3A%20MPC%20of%20Uncertain%20Nonlinear%20Systems%20with%20Meta-Learning%20for%20Fast%20Adaptation%20of%20Neural%20Predictive%20Models%0AAuthor%3A%20Jiaqi%20Yan%20and%20Ankush%20Chakrabarty%20and%20Alisa%20Rupenyan%20and%20John%20Lygeros%0AAbstract%3A%20In%20this%20paper%2C%20we%20consider%20the%20problem%20of%20reference%20tracking%20in%20uncertain%20nonlinear%20systems.%20A%20neural%20State-Space%20Model%20%28NSSM%29%20is%20used%20to%20approximate%20the%20nonlinear%20system%2C%20where%20a%20deep%20encoder%20network%20learns%20the%20nonlinearity%20from%20data%2C%20and%20a%20state-space%20component%20captures%20the%20temporal%20relationship.%20This%20transforms%20the%20nonlinear%20system%20into%20a%20linear%20system%20in%20a%20latent%20space%2C%20enabling%20the%20application%20of%20model%20predictive%20control%20%28MPC%29%20to%20determine%20effective%20control%20actions.%20Our%20objective%20is%20to%20design%20the%20optimal%20controller%20using%20limited%20data%20from%20the%20%5Ctextit%7Btarget%20system%7D%20%28the%20system%20of%20interest%29.%20To%20this%20end%2C%20we%20employ%20an%20implicit%20model-agnostic%20meta-learning%20%28iMAML%29%20framework%20that%20leverages%20information%20from%20%5Ctextit%7Bsource%20systems%7D%20%28systems%20that%20share%20similarities%20with%20the%20target%20system%29%20to%20expedite%20training%20in%20the%20target%20system%20and%20enhance%20its%20control%20performance.%20The%20framework%20consists%20of%20two%20phases%3A%20the%20%28offine%29%20meta-training%20phase%20learns%20a%20aggregated%20NSSM%20using%20data%20from%20source%20systems%2C%20and%20the%20%28online%29%20meta-inference%20phase%20quickly%20adapts%20this%20aggregated%20model%20to%20the%20target%20system%20using%20only%20a%20few%20data%20points%20and%20few%20online%20training%20iterations%2C%20based%20on%20local%20loss%20function%20gradients.%20The%20iMAML%20algorithm%20exploits%20the%20implicit%20function%20theorem%20to%20exactly%20compute%20the%20gradient%20during%20training%2C%20without%20relying%20on%20the%20entire%20optimization%20path.%20By%20focusing%20solely%20on%20the%20optimal%20solution%2C%20rather%20than%20the%20path%2C%20we%20can%20meta-train%20with%20less%20storage%20complexity%20and%20fewer%20approximations%20than%20other%20contemporary%20meta-learning%20algorithms.%20We%20demonstrate%20through%20numerical%20examples%20that%20our%20proposed%20method%20can%20yield%20accurate%20predictive%20models%20by%20adaptation%2C%20resulting%20in%20a%20downstream%20MPC%20that%20outperforms%20several%20baselines.%0ALink%3A%20http%3A//arxiv.org/abs/2404.12097v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMPC%2520of%2520Uncertain%2520Nonlinear%2520Systems%2520with%2520Meta-Learning%2520for%2520Fast%2520Adaptation%2520of%2520Neural%2520Predictive%2520Models%26entry.906535625%3DJiaqi%2520Yan%2520and%2520Ankush%2520Chakrabarty%2520and%2520Alisa%2520Rupenyan%2520and%2520John%2520Lygeros%26entry.1292438233%3DIn%2520this%2520paper%252C%2520we%2520consider%2520the%2520problem%2520of%2520reference%2520tracking%2520in%2520uncertain%2520nonlinear%2520systems.%2520A%2520neural%2520State-Space%2520Model%2520%2528NSSM%252 ying%2520on%2520the%2520entire%2520optimization%2520path.%2520By%2520focusing%2520solely%2520on%2520the%2520optimal%2520solution%252C%2520rather%2520than%2520the%2520path%252C%2520we%2520can%2520meta-train%2520with%2520less%2520storage%2520complexity%2520and%2520fewer%2520approximations%2520than%2520other%2520contemporary%2520meta-learning%2520algorithms.%2520We%2520demonstrate%2520through%2520numerical%2520examples%2520that%2520our%2520proposed%2520method%2520can%2520yield%2520accurate%2520predictive%2520models%2520by%2520adaptation%252C%2520resulting%2520in%2520a%2520downstream%2520MPC%2520that%2520outperforms%2520several%2520baselines.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2404.12097v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MPC%20of%20Uncertain%20Nonlinear%20Systems%20with%20Meta-Learning%20for%20Fast%20Adaptation%20of%20Neural%20Predictive%20Models&entry.906535625=Jiaqi%20Yan%20and%20Ankush%20Chakrabarty%20and%20Alisa%20Rupenyan%20and%20John%20Lygeros&entry.1292438233=In%20this%20paper%2C%20we%20consider%20the%20problem%20of%20reference%20tracking%20in%20uncertain%20nonlinear%20systems.%20A%20neural%20State-Space%20Model%20%28NSSM%29%20is%20used%20to%20approximate%20the%20nonlinear%20system%2C%20where%20a%20deep%20encoder%20network%20learns%20the%20nonlinearity%20from%20data%2C%20and%20a%20state-space%20component%20captures%20the%20temporal%20relationship.%20This%20transforms%20the%20nonlinear%20system%20into%20a%20linear%20system%20in%20a%20latent%20space%2C%20enabling%20the%20application%20of%20model%20predictive%20control%20%28MPC%29%20to%20determine%20effective%20control%20actions.%20Our%20objective%20is%20to%20design%20the%20optimal%20controller%20using%20limited%20data%20from%20the%20%5Ctextit%7Btarget%20system%7D%20%28the%20system%20of%20interest%29.%20To%20this%20end%2C%20we%20employ%20an%20implicit%20model-agnostic%20meta-learning%20 {"title": "Active operator learning with predictive uncertainty quantification for partial differential equations", "author": "Nick Winovich and Mitchell Daneker and Lu Lu and Guang Lin", "abstract": "With the increased prevalence of neural operators being used to provide rapid solutions to partial differential equations (PDEs), understanding the accuracy of model predictions and the associated error levels is necessary for deploying reliable surrogate models in scientific applications. Existing uncertainty quantification (UQ) frameworks employ ensembles or Bayesian methods, which can incur substantial computational costs during both training and inference. We propose a lightweight predictive UQ method tailored for Deep operator networks (DeepONets) that also generalizes to other operator networks. Numerical experiments on linear and nonlinear PDEs demonstrate that the framework's uncertainty estimates are unbiased and provide accurate out-of-distribution uncertainty predictions with a sufficiently large training dataset. Our framework provides fast inference and uncertainty estimates that can efficiently drive outer-loop analyses that would be prohibitively expensive with conventional solvers. We demonstrate how predictive uncertainties can be used in the context of Bayesian optimization and active learning problems to yield improvements in accuracy and data-efficiency for outer-loop optimization procedures. In the active learning setup, we extend the framework to Fourier Neural Operators (FNO) and describe a generalized method for other operator networks. To enable real-time deployment, we introduce an inference strategy based on precomputed trunk outputs and a sparse placement matrix, reducing evaluation time by more than a factor of five. Our method provides a practical route to uncertainty-aware operator learning in time-sensitive settings.", "link": "http://arxiv.org/abs/2503.03178v4", "date": "2026-02-25", "relevancy": 2.1521, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5443}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5374}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5361}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Active%20operator%20learning%20with%20predictive%20uncertainty%20quantification%20for%20partial%20differential%20equations&body=Title%3A%20Active%20operator%20learning%20with%20predictive%20uncertainty%20quantification%20for%20partial%20differential%20equations%0AAuthor%3A%20Nick%20Winovich%20and%20Mitchell%20Daneker%20and%20Lu%20Lu%20and%20Guang%20Lin%0AAbstract%3A%20With%20the%20increased%20prevalence%20of%20neural%20operators%20being%20used%20to%20provide%20rapid%20solutions%20to%20partial%20differential%20equations%20%28PDEs%29%2C%20understanding%20the%20accuracy%20of%20model%20predictions%20and%20the%20associated%20error%20levels%20is%20necessary%20for%20deploying%20reliable%20surrogate%20models%20in%20scientific%20applications.%20Existing%20uncertainty%20quantification%20%28UQ%29%20frameworks%20employ%20ensembles%20or%20Bayesian%20methods%2C%20which%20can%20incur%20substantial%20computational%20costs%20during%20both%20training%20and%20inference.%20We%20propose%20a%20lightweight%20predictive%20UQ%20method%20tailored%20for%20Deep%20operator%20networks%20%28DeepONets%29%20that%20also%20generalizes%20to%20other%20operator%20networks.%20Numerical%20experiments%20on%20linear%20and%20nonlinear%20PDEs%20demonstrate%20that%20the%20framework%27s%20uncertainty%20estimates%20are%20unbiased%20and%20provide%20accurate%20out-of-distribution%20uncertainty%20predictions%20with%20a%20sufficiently%20large%20training%20dataset.%20Our%20framework%20provides%20fast%20inference%20and%20uncertainty%20estimates%20that%20can%20efficiently%20drive%20outer-loop%20analyses%20that%20would%20be%20prohibitively%20expensive%20with%20conventional%20solvers.%20We%20demonstrate%20how%20predictive%20uncertainties%20can%20be%20used%20in%20the%20context%20of%20Bayesian%20optimization%20and%20active%20learning%20problems%20to%20yield%20improvements%20in%20accuracy%20and%20data-efficiency%20for%20outer-loop%20optimization%20procedures.%20In%20the%20active%20learning%20setup%2C%20we%20extend%20the%20framework%20to%20Fourier%20Neural%20Operators%20%28FNO%29%20and%20describe%20a%20generalized%20method%20for%20other%20operator%20networks.%20To%20enable%20real-time%20deployment%2C%20we%20introduce%20an%20inference%20strategy%20based%20on%20precomputed%20trunk%20outputs%20and%20a%20sparse%20placement%20matrix%2C%20reducing%20evaluation%20time%20by%20more%20than%20a%20factor%20of%20five.%20Our%20method%20provides%20a%20practical%20route%20to%20uncertainty-aware%20operator%20learning%20in%20time-sensitive%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2503.03178v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DActive%2520operator%2520learning%2520with%2520predictive%2520uncertainty%2520quantification%2520for%2520partial%2520differential%2520equations%26entry.906535625%3DNick%2520Winovich%2520and%2520Mitchell%2520Daneker%2520and%2520Lu%2520Lu%2520and%2520Guang%2520Lin%26entry.1292438233%3DWith%2520the%2520increased%2520prevalence%2520of%2520neural%2520operators%2520being%2520used%2520to%2520provide%2520rapid%2520solutions%2520to%2520partial%2520differential%2520equations%2520%2528PDEs%2529%252C%2520understanding%2520the%2520accuracy%2520of%2520model%2520predictions%2520and%2520the%2520associated%2520error%2520levels%2520is%2520necessary%2520for%2520deploying%2520reliable%2520surrogate%2520models%2520in%2520scientific%2520applications.%2520Existing%2520uncertainty%2520quantifica {"title": "Learning Partial Graph Matching via Optimal Partial Transport", "author": "Gathika Ratnayaka and James Nichols and Qing Wang", "abstract": "Partial graph matching extends traditional graph matching by allowing some nodes to remain unmatched, enabling applications in more complex scenarios. However, this flexibility introduces additional complexity, as both the subset of nodes to match and the optimal mapping must be determined. While recent studies have explored deep learning techniques for partial graph matching, a significant limitation remains: the absence of an optimization objective that fully captures the problem's intrinsic nature while enabling efficient solutions. In this paper, we propose a novel optimization framework for partial graph matching, inspired by optimal partial transport. Our approach formulates an objective that enables partial assignments while incorporating matching biases, using weighted total variation as the divergence function to guarantee optimal partial assignments. Our method can achieve efficient, exact solutions within cubic worst case time complexity. Our contributions are threefold: (i) we introduce a novel optimization objective that balances matched and unmatched nodes; (ii) we establish a connection between partial graph matching and linear sum assignment problem, enabling efficient solutions; (iii) we propose a deep graph matching architecture with a novel partial matching loss, providing an end-to-end solution. The empirical evaluations on standard graph matching benchmarks demonstrate the efficacy of the proposed approach.", "link": "http://arxiv.org/abs/2410.16718v8", "date": "2026-02-25", "relevancy": 2.1517, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5581}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5385}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.486}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Partial%20Graph%20Matching%20via%20Optimal%20Partial%20Transport&body=Title%3A%20Learning%20Partial%20Graph%20Matching%20via%20Optimal%20Partial%20Transport%0AAuthor%3A%20Gathika%20Ratnayaka%20and%20James%20Nichols%20and%20Qing%20Wang%0AAbstract%3A%20Partial%20graph%20matching%20extends%20traditional%20graph%20matching%20by%20allowing%20some%20nodes%20to%20remain%20unmatched%2C%20enabling%20applications%20in%20more%20complex%20scenarios.%20However%2C%20this%20flexibility%20introduces%20additional%20complexity%2C%20as%20both%20the%20subset%20of%20nodes%20to%20match%20and%20the%20optimal%20mapping%20must%20be%20determined.%20While%20recent%20studies%20have%20explored%20deep%20learning%20techniques%20for%20partial%20graph%20matching%2C%20a%20significant%20limitation%20remains%3A%20the%20absence%20of%20an%20optimization%20objective%20that%20fully%20captures%20the%20problem%27s%20intrinsic%20nature%20while%20enabling%20efficient%20solutions.%20In%20this%20paper%2C%20we%20propose%20a%20novel%20optimization%20framework%20for%20partial%20graph%20matching%2C%20inspired%20by%20optimal%20partial%20transport.%20Our%20approach%20formulates%20an%20objective%20that%20enables%20partial%20assignments%20while%20incorporating%20matching%20biases%2C%20using%20weighted%20total%20variation%20as%20the%20divergence%20function%20to%20guarantee%20optimal%20partial%20assignments.%20Our%20method%20can%20achieve%20efficient%2C%20exact%20solutions%20within%20cubic%20worst%20case%20time%20complexity.%20Our%20contributions%20are%20threefold%3A%20%28i%29%20we%20introduce%20a%20novel%20optimization%20objective%20that%20balances%20matched%20and%20unmatched%20nodes%3B%20%28ii%29%20we%20establish%20a%20connection%20between%20partial%20graph%20matching%20and%20linear%20sum%20assignment%20problem%2C%20enabling%20efficient%20solutions%3B%20%28iii%29%20we%20propose%20a%20deep%20graph%20matching%20architecture%20with%20a%20novel%20partial%20matching%20loss%2C%20providing%20an%20end-to-end%20solution.%20The%20empirical%20evaluations%20on%20standard%20graph%20matching%20benchmarks%20demonstrate%20the%20efficacy%20of%20the%20proposed%20approach.%0ALink%3A%20http%3A//arxiv.org/abs/2410.16718v8%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520Partial%2520Graph%2520Matching%2520via%2520Optimal%2520Partial%2520Transport%26entry.906535625%3DGathika%2520Ratnayaka%2520and%2520James%2520Nichols%2520and%2520Qing%2520Wang%26entry.1292438233%3DPartial%2520graph%2520matching%2520extends%2520traditional%2520graph%2520matching%2520by%2520allowing%2520some%2520nodes%2520to%2520remain%2520unmatched%252C%2520enabling%2520applications%2520in%2520more%2520complex%2520scenarios.%2520However%252C%2520this%2520flexibility%2520introduces%2520additional%2520complexity%252C%2520as%2520both%2520the%2520subset%2520of%2520nodes%2520to%2520match%2520and%2520the%2520optimal%2520mapping%2520must%2520be%2520determined.%2520While%2520recent%2520studies%2520have%2520explored%2520deep%2520learning%2520techniques%2520for%2520partial%2520graph%2520matching%252C%2520a%2520significant%2520limitation%2520remains%253A%2520the%2520absence%2520of%2520an%2520optimization%2520objective%2520that%2520fully%2520captures%2520the%2520problem%2527s%2520intrinsic%2520nature%2520while%2520enabling%2520efficient%2520solutions.%2520In%2520this%2520paper%252C%2520we%2520propose%2520a%2520novel%2520optimization%2520framework%2520for%2520partial%2520graph%2520matching%252C%2520inspired%2520by%2520optimal%2520partial%2520transport.%2520Our%2520approach%2520formulates%2520an%2520objective%2520that%2520enables%2520partial%2520assignments r%20partial%20graph%20matching%2C%20a%20significant%20limitation%20remains%3A%20the%20absence%20of%20an%20optimization%20objective%20that%20fully%20captures%20the%20problem%27s%20intrinsic%20nature%20while%20enabling%20efficient%20solutions.%20In%20this%20paper%2C%20we%20propose%20a%20novel%20optimization%20framework%20for%20partial%20graph%20matching%2C%20inspired%20by%20optimal%20partial%20transport.%20Our%20approach%20formulates%20an%20objective%20that%20enables%20partial%20assignments%20while%20incorporating%20matching%20biases%2C%20using%20weighted%20total%20variation%20as%20the%20divergence%20function%20to%20guarantee%20optimal%20partial%20assignments.%20Our%20method%20can%20achieve%20efficient%2C%20exact%20solutions%20within%20cubic%20worst%20case%20time%20complexity.%20Our%20contributions%20are%20threefold%3A%20%28i%29%20we%20introduce%20a%20novel%20optimization%20objective%20that%20balances%20matched%20and%20unmatched%20nodes%3B%20%28ii%29%20we%20establish%20a%20connection%20between%20partial%20graph%20matching%20and%20linear%20sum%20assignment%20problem%2C%20enabling%20efficient%20solutions%3B%20%28iii%29%20we%20propose%20a%20deep%20graph%20matching%20architecture%20with%20a%20novel%20partial%20matching%20loss%2C%20providing%20an%20end-to-end%20solution.%20The%20empirical%20evaluations%20on%20standard%20graph%20matching%20benchmarks%20demonstrate%20the%20efficacy%20of%20the%20proposed%20approach.&entry.1838667208=http%3A//arxiv.org/abs/2410.16718v8&entry.124074799=Read"},
{"title": "Riemannian Variational Flow Matching for Material and Protein Design", "author": "Olga Zaghen and Floor Eijkelboom and Alison Pouplin and Cong Liu and Max Welling and Jan-Willem van de Meent and Erik J. Bekkers", "abstract": "We present Riemannian Gaussian Variational Flow Matching (RG-VFM), a geometric extension of Variational Flow Matching (VFM) for generative modeling on manifolds. Motivated by the benefits of VFM, we derive a variational flow matching objective for manifolds with closed-form geodesics based on Riemannian Gaussian distributions. Crucially, in Euclidean space, predicting endpoints (VFM), velocities (FM), or noise (diffusion) is largely equivalent due to affine interpolations. However, on curved manifolds this equivalence breaks down. We formally analyze the relationship between our model and Riemannian Flow Matching (RFM), revealing that the RFM objective lacks a curvature-dependent penalty -- encoded via Jacobi fields -- that is naturally present in RG-VFM. Based on this relationship, we hypothesize that endpoint prediction provides a stronger learning signal by directly minimizing geodesic distances. Experiments on synthetic spherical and hyperbolic benchmarks, as well as real-world tasks in material and protein generation, demonstrate that RG-VFM more effectively captures manifold structure and improves downstream performance over Euclidean and velocity-based baselines. Code available at https://github.com/olgatticus/rg-vfm.", "link": "http://arxiv.org/abs/2502.12981v3", "date": "2026-02-25", "relevancy": 2.1513, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5758}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5276}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs {"title": "Are Foundation Models the Route to Full-Stack Transfer in Robotics?", "author": "Freek Stulp and Samuel Bustamante and Jo\u00e3o Silv\u00e9rio and Alin Albu-Sch\u00e4ffer and Jeannette Bohg and Shuran Song", "abstract": "In humans and robots alike, transfer learning occurs at different levels of abstraction, from high-level linguistic transfer to low-level transfer of motor skills. In this article, we provide an overview of the impact that foundation models and transformer networks have had on these different levels, bringing robots closer than ever to \"full-stack transfer\". Considering LLMs, VLMs and VLAs from a robotic transfer learning perspective allows us to highlight recurring concepts for transfer, beyond specific implementations. We also consider the challenges of data collection and transfer benchmarks for robotics in the age of foundation models. Are foundation models the route to full-stack transfer in robotics? Our expectation is that they will certainly stay on this route as a key technology.", "link": "http://arxiv.org/abs/2602.22001v1", "date": "2026-02-25", "relevancy": 2.1485, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5398}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5398}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5237}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Are%20Foundation%20Models%20the%20Route%20to%20Full-Stack%20Transfer%20in%20Robotics%3F&body=Title%3A%20Are%20Foundation%20Models%20the%20Route%20to%20Full-Stack%20Transfer%20in%20Robotics%3F%0AAuthor%3A%20Freek%20Stulp%20and%20Samuel%20Bustamante%20and%20Jo%C3%A3o%20Silv%C3%A9rio%2

{"title": "Structure-to-Image: Zero-Shot Depth Estimation in Colonoscopy via High-Fidelity Sim-to-Real Adaptation", "author": "Juan Yang and Yuyan Zhang and Han Jia and Bing Hu and Wanzhong Song", "abstract": "Monocular depth estimation (MDE) for colonoscopy is hampered by the domain gap between simulated and real-world images. Existing image-to-image translation methods, which use depth as a posterior constraint, often produce structural distortions and specular highlights by failing to balance realism with structure consistency. To address this, we propose a Structure-to-Image paradigm that transforms the depth map from a passive constraint into an active generative foundation. We are the first to introduce phase congruency to colonoscopic domain adaptation and design a cross-level structure constraint to co-optimize geometric structures and fine-grained details like vascular textures. In zero-shot evaluations conducted on a publicly available phantom dataset, the MDE model that was fine-tuned on our generated data achieved a maximum reduction of 44.18% in RMSE compared to competing methods. Our code is available at https://github.com/YyangJJuan/PC-S2I.git.", "link": "http://arxiv.org/abs/2602.21740v1", "date": "2026-02-25", "relevancy": 2.2713, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5696}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.569}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5659}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Structure-to-Image%3A%20Zero-Shot%20Depth%20Estimation%20in%20Colonoscopy%20via%20High-Fidelity%20Sim-to-Real%20Adaptation&body=Title%3A%20Structure-to-Image%3A%20Zero-Shot%20Depth%20Estimation%20in%20Colonoscopy%20via%20High-Fidelity%20Sim-to-Real%20Adaptation%0AAuthor%3A%20Juan%20Yang%20and%20Yuyan%20Zhang%20and%20Han%20Jia%20and%20Bing%20Hu%20and%20Wanzhong%20Song%0AAbstract%3A%20Monocular%20depth%20estimation%20%28MDE%29%20for%20colonoscopy%20is%20hampered%20by%20the%20domain%20gap%20between%20simulated%20and%20real-world%20images.%20Existing%20image-to-image%20translation%20methods%2C%20which%20use%20depth%20as%20a%20posterior%20constraint%2C%20often%20produce%20structural%20distortions%20and%20specular%20highlights%20by%20failing%20to%20balance%20realism%20with%20structure%20consistency.%20To%20address%20this%2C%20we%20propose%20a%20Structure-to-Image%20paradigm%20that%20transforms%20the%20depth%20map%20from%20a%20passive%20constraint%20into%20an%20active%20generative%20foundation.%20We%20are%20the%20first%20to%20introduce%20phase%20congruency%20to%20colonoscopic%20domain%20adaptation%20and%20design%20a%20cross-level%20structure%20constraint%20to%20co-optimize%20geometric%20structures%20and%20fine-grained%20details%20like%20vascular%20textures.%20In%20zero-shot%20evaluations%20conducted%20on%20a%20publicly%20available%20phantom%20dataset%2C%20the%20MDE%20model%20that%20was%20fine-tuned%20on%20our%20generated%20data%20achieved%20a%20maximum%20reduction%20of%2044.18%25%20in%20RMSE%20compared%20to%20competing%20methods.%20Our%20code%20is%20available%20at%20https%3A//github.com/YyangJJuan/PC-S2I.git.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21740v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStructure-to-Image%253A%2520Zero-Shot%2520Depth%2520Estimation%2520in%2520Colonoscopy%2520via%2520High-Fidelity%2520Sim-to-Real%2520Adaptation%26entry.906535625%3DJuan%2520Yang%2520and%2520Yuyan%2520Zhang%2520and%2520Han%2520Jia%2520and%2520Bing%2520Hu%2520and%2520Wanzhong%2520Song%26entry.1292438233%3DMonocular%2520depth%2520estimation%2520%2528MDE%2529%2520for%2520colonoscopy%2520is%2520hampered%2520by%2520the%2520domain%2520gap%2520between%2520simulated%2520and%2520real-world%2520images.%2520Existing%2520image-to-image%2520translation%2520methods%252C%2520which%2520use%2520depth%2520as%2520a%2520posterior%2520constraint%252C%2520often%2520produce%2520structural%2520distortions%2520and%2520specular%2520highlights%2520by%2520failing%2520to%2520balance%2520realism%2520with%2520structure%2520consistency.%2520To%2520address%2520this%252C%2520we%2520propose%2520a%2520Structure-to-Image%2520paradigm%2520that%2520transforms%2520the%2520depth%2520map%2520from%2520a%2520passive%2520constraint%2520into%2520an%2520active%2520generative%2520foundation.%2520We%2520are%2520the%2520first%2520to%2520introduce%2520phase%2520congruency%2520to%2520colonoscopic%2520domain%2520adaptation%2520and%2520design%2520a%2520cross-level%2520structure%2520constraint%2520to%2520co-optimize%2520geometric%2520structures%2520and%2520fine-grained%2520details%2520like%2520vascular%2520textures.%2520In%2520zero-shot%2520evaluations%2520conducted%2520on%2520a%2520publicly%2520available%2520phantom%2520dataset%252C%2520the%2520MDE%2520model%2520that%2520was%2520fine-tuned%2520on%2520our%2520generated%2520data%2520achieved%2520a%2520maximum%2520reduction%2520of%252044.18%2525%2520in%2520RMSE%2520compared%2520to%2520competing%2520methods.%2520Our%2520code%2520is%2520available%2520at%2520https%253A//github.com/YyangJJuan/PC-S2I.git.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.21740v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Structure-to-Image%3A%20Zero-Shot%20Depth%20Estimation%20in%20Colonoscopy%20via%20High-Fidelity%20Sim-to-Real%20Adaptation&entry.906535625=Juan%20Yang%20and%20Yuyan%20Zhang%20and%20Han%20Jia%20and%20Bing%20Hu%20and%20Wanzhong%20Song&entry.1292438233=Monocular%20depth%20estimation%20%28MDE%29%20for%20colonoscopy%20is%20hampered%20by%20the%20domain%20gap%20between%20simulated%20and%20real-world%20images.%20Existing%20image-to-image%20translation%20methods%2C%20which%20use%20depth%20as%20a%20posterior%20constraint%2C%20often%20produce%20structural%20distortions%20and%20specular%20highlights%20by%20failing%20to%20balance%20realism%20with%20structure%20consistency.%20To%20address%20this%2C%20we%20propose%20a%20Structure-to-Image%20paradigm%20that%20transforms%20the%20depth%20map%20from%20a%20passive%20constraint%20into%20an%20active%20generative%20foundation.%20We%20are%20the%20first%20to%20introduce%20phase%20congruency%20to%20colonoscopic%20domain%20adaptation%20and%20design%20a%20cross-level%20structure%20constraint%20to%20co-optimize%20geometric%20structures%20and%20fine-grained%20details%20like%20vascular%20textures.%20In%20zero-shot%20evaluations%20conducted%20on%20a%20publicly%20available%20phantom%20dataset%2C%20the%20MDE%20model%20that%20was%20fine-tuned%20on%20our%20generated%20data%20achieved%20a%20maximum%20reduction%20of%2044.18%25%20in%20RMSE%20compared%20to%20competing%20methods.%20Our%20code%20is%20available%20at%20https%3A//github.com/YyangJJuan/PC-S2I.git.&entry.1838667208=http%3A//arxiv.org/abs/2602.21740v1&entry.124074799=Read"},
{"title": "TextPecker: Rewarding Structural Anomaly Quantification for Enhancing Visual Text Rendering", "author": "Hanshen Zhu and Yuliang Liu and Xuecheng Wu and An-Lan Wang and Hao Feng and Dingkang Yang and Chao Feng and Can Huang and Jingqun Tang and Xiang Bai", "abstract": "Visual Text Rendering (VTR) remains a critical challenge in text-to-image generation, where even advanced models frequently produce text with structural anomalies such as distortion, blurriness, and misalignment. However, we find that leading MLLMs and specialist OCR models largely fail to perceive these structural anomalies, creating a critical bottleneck for both VTR evaluation and RL-based optimization. As a result, even state-of-the-art generators (e.g., SeedDream4.0, Qwen-Image) still struggle to render structurally faithful text. To address this, we propose TextPecker, a plug-and-play structural anomaly perceptive RL strategy that mitigates noisy reward signals and works with any textto-image generator. To enable this capability, we construct a recognition dataset with character-level structural-anomaly annotations and develop a stroke-editing synthesis engine to expand structural-error coverage. Experiments show that TextPecker consistently improves diverse text-to-image models; even on the well-optimized Qwen-Image, it significantly yields average gains of 4% in structural fidelity and 8.7% in semantic alignment for Chinese text rendering, establishing a new state-of-the-art in high-fidelity VTR. Our work fills a gap in VTR optimization, providing a foundational step towards reliable and structural faithful visual text generation.", "link": "http://arxiv.org/abs/2602.20903v2", "date": "2026-02-25", "relevancy": 2.2693, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5847}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "htt {"title": "Parallel Continuous-Time Relative Localization with Augmented Clamped Non-Uniform B-Splines", "author": "Jiadong Lu and Zhehan Li and Tao Han and Miao Xu and Chao Xu and Yanjun Cao", "abstract": "Accurate relative localization is critical for multi-robot cooperation. In robot swarms, measurements from different robots arrive asynchronously and with clock time-offsets. Although Continuous-Time (CT) formulations have proved effective for handling asynchronous measurements in single-robot SLAM and calibration, extending CT methods to multi-robot settings faces great challenges to achieve high-accuracy, low-latency, and high-frequency performance. Especially, existing CT methods suffer from the inherent query-time delay of unclamped B-splines and high computational cost. This paper proposes CT-RIO, a novel Continuous-Time Relative-Inertial Odometry framework. We employ Clamped Non-Uniform B-splines (C-NUBS) to represent robot states for the first time, eliminating the query-time delay. We further augment C-NUBS with closed-form extension and shrinkage operations that preserve the spline shape, making it suitable for online estimation and enabling flexible knot management. This flexibility leads to the concept of knot-keyknot strategy, which supports spline extension at high-frequency while retaining sparse keyknots for adaptive relative-motion modeling. We then formulate a sliding-window relative localization problem that operates purely on relative kinematics and inter-robot constraints. To meet the demanding computation required at swarm scale, we decompose the tightly-coupled optimization into robot-wise sub-problems and solve them in parallel using incremental asynchronous block coordinate descent. Extensive experiments show that CT-RIO converges from time-offsets as large as 263 ms to sub-millisecond within 3 s, and achieves RMSEs of 0.046 m and 1.8 \u00b0. It consistently outperforms state-of-the-art methods, with improvements of up to 60% under high-speed motion.", "link": "http://arxiv.org/abs/2602.22006v1", "date": "2026-02-25", "relevancy": 2.2692, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5731}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5673}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5529}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Parallel%20Continuous-Time%20Relative%20Localization%20with%20Augmented%20Clamped%20Non-Uniform%20B-Splines&body=Title%3A%20Parallel%20Continuous-Time%20Relative%20Localization%20with%20Augmented%20Clamped%20Non-Uniform%20B-Splines%0AAuthor%3A%20Jiadong%20Lu%20and%20Zhehan%20Li%20and%20Tao%20Han%20and%20Miao%20Xu%20and%20Chao%20Xu%20and%20Yanjun%20Cao%0AAbstract%3A%20Accurate%20relative%20localization%20is%20critical%20for%20multi-robot%20cooperation.%20In%20robot%20swarms%2C%20measurements%20from%20different%20robots%20arrive%20asynchronously%20and%20with%20clock%20time-offsets.%20Although%20Continuous-Time%20%28CT%29%20formulations%20have%20proved%20effective%20for%20handling%20asynchronous%20measurements%20in%20single-robot%20SLAM%20and%20calibration%2C%20extending%20CT%20methods%20to%20multi-robot%20settings%20faces%20great%20challenges%20to%20achieve%20high-accuracy%2C%20low-latency%2C%20and%20high-frequency%20performance.%20Especially%2C%20existing%20CT%20methods%20suffer%20from%20the%20inherent%20query-time%20delay%20of%20unclamped%20B-splines%20and%20high%20computational%20cost.%20This%20paper%20proposes%20CT-RIO%2C%20a%20novel%20Continuous-Time%20Relative-Inertial%20Odometry%20framework.%20We%20employ%20Clamped%20Non-Uniform%20B-splines%20%28C-NUBS%29%20to%20represent%20robot%20st {"title": "Humanizing Robot Gaze Shifts: A Framework for Natural Gaze Shifts in Humanoid Robots", "author": "Jingchao Wei and Jingkai Qin and Yuxiao Cao and Jingcheng Huang and Xiangrui Zeng and Min Li and Zhouping Yin", "abstract": "Leveraging auditory and visual feedback for attention reorientation is essential for natural gaze shifts in social interaction. However, enabling humanoid robots to perform natural and context-appropriate gaze shifts in unconstrained human--robot interaction (HRI) remains challenging, as it requires the coupling of cognitive attention mechanisms and biomimetic motion generation. In this work, we propose the Robot Gaze-Shift (RGS) framework, which integrates these two components into a unified pipeline. First, RGS employs a vision--language model (VLM)-based gaze reasoning pipeline to infer context-appropriate gaze targets from multimodal interaction cues, ensuring consistency with human gaze-orienting regularities. Second, RGS introduces a conditional Vector Quantized-Variational Autoencoder (VQ-VAE) model for eye--head coordinated gaze-shift motion generation, producing diverse and human-like gaze-shift behaviors. Experiments validate that RGS effectively replicates human-like target selection and generates realistic, diverse gaze-shift motions.", "link": "http://arxiv.org/abs/2602.21983v1", "date": "2026-02-25", "relevancy": 2.2577, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5749}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5588}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5562}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Humanizing%20Robot%20Gaze%20Shifts%3A%20A%20Framework% {"title": "Joint Shadow Generation and Relighting via Light-Geometry Interaction Maps", "author": "Shan Wang and Peixia Li and Chenchen Xu and Ziang Cheng and Jiayu Yang and Hongdong Li and Pulak Purkait", "abstract": "We propose Light-Geometry Interaction (LGI) maps, a novel representation that encodes light-aware occlusion from monocular depth. Unlike ray tracing, which requires full 3D reconstruction, LGI captures essential light-shadow interactions reliably and accurately, computed from off-the-shelf 2.5D depth map predictions. LGI explicitly ties illumination direction to geometry, providing a physics-inspired prior that constrains generative models. Without such prior, these models often produce floating shadows, inconsistent illumination, and implausible shadow geometry. Building on this representation, we propose a unified pipeline for joint shadow generation and relighting - unlike prior methods that treat them as disjoint tasks - capturing the intrinsic coupling of illumination and shadowing essential for modeling indirect effects. By embedding LGI into a bridge-matching generative backbone, we reduce ambiguity and enforce physically consistent light-shadow reasoning. To enable effective training, we curated the first large-scale benchmark dataset for joint shadow and relighting, covering reflections, transparency, and complex interreflections. Experiments show significant gains in realism and consistency across synthetic and real images. LGI thus bridges geometry-inspired rendering with generative modeling, enabling efficient, physically consistent shadow generation and relighting.", "link": "http://arxiv.org/abs/2602.21820v1", "date": "2026-02-25", "relevancy": 2.2389, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.6005}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.572}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5311}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Joint%20Shadow%20Generation%20and%20Relighting%20via%20Light-Geometry%20Interaction%20Maps&body=Title%3A%20Joint%20Shadow%20Generation%20and%20Relighting%20via%20Light-Geometry%20Interaction%20Maps%0AAuthor%3A%20Shan%20Wang%20and%20Peixia%20Li%20and%20Chenchen%20Xu%20and%20Ziang%20Cheng%20and%20Jiayu%20Yang%20and%20Hongdong%20Li%20and%20Pulak%20Purkait%0AAbstract%3A%20We%20propose%20Light-Geometry%20Interaction%20%28LGI%29%20maps%2C%20a%20novel%20representation%20that%20encodes%20light-aware%20occlusion%20from%20monocular%20depth.%20Unlike%20ray%20tracing%2C%20which%20requires%20full%203D%20reconstruction%2C%20LGI%20captures%20essential%20light-shadow%20interactions%20reliably%20and%20accurately%2C%20computed%20from%20off-the-shelf%202.5D%20depth%20map%20predictions.%20LGI%20explicitly%20ties%20illumination%20direction%20to%20geometry%2C%20providing%20a%20physics-inspired%20prior%20that%20constrains%20generative%20models.%20Without%20such%20prior%2C%20these%20models%20often%20produce%20floating%20shadows%2C%20inconsistent%20illumination%2C%20and%20implausible%20shadow%20geometry.%20Building%20on%20this%20representation%2C%20we%20propose%20a%20unified%20pipeline%20for%20joint%20shadow%20generation%20and%20relighting%20-%20unlike%20prior%20methods%20that%20treat%20them%20as%20disjoint%20tasks%20-%20capturing%20the%20intrinsic%20coupling%20of%20illumination%20and%20shadowing%20essential%20for%20modeling%20indirect%20effects.%20By%20embedding%20LGI%20into%20a%20bridge-matching%20generative%20backbone%2C%20we%20reduce%20ambiguity%20and%20enforce%20physically%20consistent%20light-shadow%20reasoning.%20To%20enable%20effective%20training%2C%20we%20curated%20the%20first%20large-scale%20benchmark%20dataset%20for%20joint%20shadow%20and%20relighting%2C%20covering%20reflections%2C%20transparency%2C%20and%20complex%20interreflections.%20Experiments%20show%20significant%20gains%20in%20realism%20and%20consistency%20across%20synthetic%20and%20real%20images.%20LGI%20thus%20bridges%20geometry-inspired%20rendering%20with%20generative%20modeling%2C%20enabling%20efficient%2C%20physically%20consistent%20shadow%20generation%20and%20relighting.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21820v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DJoint%2520Shadow%2520Generation%2520and%2520Relighting%2520via%2520Light-Geometry%2520Interaction%2520Maps%26entry.906535625%3DShan%2520Wang%2520and%2520Peixia%2520Li%2520and%2520Chenchen%2520Xu%2520and%2520Ziang%2520Cheng%2520and%2520Jiayu%2520Yang%2520and%2520Hongdong%2520Li%2520and%2520Pulak%2520Purkait%26entry.1292438233%3DWe%2520propose%2520Light-Geometry%2520Interaction%2520%2528LGI%2529%2520maps%252C%2520a%2520novel%2520representation%2520that%2520encodes%2520light-aware%2520occlusion%2520from%2520monocular%2520depth.%2520Unlike%2520ray%2520tracing%252C%2520which%2520requires%2520full%25203D%2520reconstruction%252C%2520LGI%2520captures%2520essential%2520light-shadow%2520interactions%2520reliably%2520and%2520accurately%252C%2520computed%2520from%2520off-the-shelf%25202.5D%2520depth%2520map%2520predictions.%2520LGI%2520explicitly%2520ties%2520illumination%2520direction%2520to%2520geometry%252C%2520providing%2520a%2520physics-inspired%2520prior%2520that%2520constrains%2520generative%2520models.%2520Without%2520such%2520prior%252C%2520these%2520models%2520often%2520produce%2520floating%2520shadows%252C%2520inconsistent%2520illumination%252C%2520and%2520implausible%2520shadow%2520geometry.%2520Building%2520on%2520this%2520representation%252C%2520we%2520propose%2520a%2520unified%2520pipeline%2520for%2520joint%2520shadow%2520generation%2520and%2520relighting%2520-%2520unlike%2520prio {"title": "Probing the Geometry of Diffusion Models with the String Method", "author": "Elio Moreau and Florentin Coeurdoux and Gr\u00e9goire Ferre and Eric Vanden-Eijnden", "abstract": "Understanding the geometry of learned distributions is fundamental to improving and interpreting diffusion models, yet systematic tools for exploring their landscape remain limited. Standard latent-space interpolations fail to respect the structure of the learned distribution, often traversing low-density regions. We introduce a framework based on the string method that computes continuous paths between samples by evolving curves under the learned score function. Operating on pretrained models without retraining, our approach interpolates between three regimes: pure generative transport, which yields continuous sample paths; gradient-dominated dynamics, which recover minimum energy paths (MEPs); and finite-temperature string dynamics, which compute principal curves -- self-consistent paths that balance energy and entropy. We demonstrate that the choice of regime matters in practice. For image diffusion models, MEPs contain high-likelihood but unrealistic ''cartoon'' images, confirming prior observations that likelihood maxima appear unrealistic; principal curves instead yield realistic morphing sequences despite lower likelihood. For protein structure prediction, our method computes transition pathways between metastable conformers directly from models trained on static structures, yielding paths with physically plausible intermediates. Together, these results establish the string method as a principled tool for probing the modal structure of diffusion models -- identifying modes, characterizing barriers, and mapping connectivity in complex learned distributions.", "link": "http://arxiv.org/abs/2602.22122v1", "date": "2026-02-25", "relevancy": 2.2293, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5639}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5628}, {"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.5492}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Probing%20the%20Geometry%20of%20Diffusion%20Models%20with%20the%20String%20Method&body=Title%3A%20Probing%20the%20Geometry%20of%20Diffusion%20Models%20with%20the%20String%20Method%0AAuthor%3A%20Elio%20Moreau%20and%20Florentin%20Coeurdoux%20and%20Gr%C3%A9goire%20Ferre%20and%20Eric%20Vanden-Eijnden%0AAbstract%3A%20Understanding%20the%20geometry%20of%20learned%20distributions%20is%20fundamental%20to%20improving%20and%20interpreting%20diffusion%20models%2C%20yet%20systematic%20tools%20for%20exploring%20their%20landscape%20remain%20limited.%20Standard%20latent-space%20interpolations%20fail%20to%20respect%20the%20structure%20of%20the%20learned%20distribution%2C%20often%20traversing%20low-density%20regions.%20We%20introduce%20a%20framework%20based%20on%20the%20string%20method%20that%20computes%20continuous%20paths%20between%20samples%20by%20evolving%20curves%20under%20the%20learned%20score%20function.%20Operating%20on%20pretrained%20models%20without%20retraining%2C%20our%20approach%20interpolates%20between%20three%20regimes%3A%20pure%20generative%20transport%2C%20which%20yields%20continuous%20sample%20paths%3B%20gradient-dominated%20dynamics%2C%20which%20recover%20minimum%20energy%20paths%20%28MEPs%29%3B%20and%20finite-temperature%20string%20dynamics%2C%20which%20compute%20principal%20curves%20--%20self-consistent%20paths%20that%20balance%20energy%20and%20entropy.%20We%20demonstrate%20that%20the%20choice%20of%20regime%20matters%20in%20practice.%20For%20image%20diffusion%20models%2C%20MEPs%20contain%20high-likelihood%20but%20unrealistic%20%27%27cartoon%27%27%20images%2C%20confirming%20prior%20observations%20that%20likelihood%20maxima%20appear%20unrealistic%3B%20principal%20curves%20instead%20yield%20realistic%20morphing%20sequences%20despite%20lower%20likelihood.%20For%20protein%20structure%20prediction%2C%20our%20method%20computes%20transition%20pathways%20between%20metastable%20conformers%20directly%20from%20models%20trained%20on%20static%20structures%2C%20yielding%20paths%20with%20physically%20plausible%20intermediates.%20Together%2C%20these%20results%20establish%20the%20string%20method%20as%20a%20principled%20tool%20for%20probing%20the%20modal%20structure%20of%20diffusion%20models%20--%20identifying%20modes%2C%20characterizing%20barriers%2C%20and%20mapping%20connectivity%20in%20complex%20learned%20distributions.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22122v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DProbing%2520the%2520Geometry%2520of%2520Diffusion%2520Models%2520with%2520the%2520String%2520Method%26entry.906535625%3DElio%2520Moreau%2520and%2520Florentin%2520Coeurdoux%2520and%2520Gr%25C3%25A9goire%2520Ferre%2520and%2520Eric%2520Vanden-Eijnden%26entry.1292438233%3DUnderstanding%2520the%2520geometry%2520of%2520learned%2520distributions%2520is%2520fundamental%2520to%2520improving%2520and%2520interpreting%2520diffusion%2520models%252C%2520yet%2520systematic%2520tools%2520for%2520exploring%2520their%2520landscape%2520remain%2520limited.%2520Standard%2520latent-space%2520interpolations%2520fail%2520to%2520respect%2520the%2520structure%2520of%2520the%2520learned%2520distribution%252C%2520often%2520traversing%2520low-density%2520regions.%2520We%2520introduce%2520a%2520framework%2520based%2520on%2520the%2520string%2520method%2520that%2520computes%2520continuous%2520paths%2520between%2520samples%2520by%2520evolving%2520curves%2520under%2520the%2520learned%2520score%2520function.%2520Operating%2520on%2520pretrained%2520models%2520without%2520r {"title": "A Distributional Treatment of Real2Sim2Real for Object-Centric Agent Adaptation in Vision-Driven Deformable Linear Object Manipulation", "author": "Georgios Kamaras and Subramanian Ramamoorthy", "abstract": "We present an integrated (or end-to-end) framework for the Real2Sim2Real problem of manipulating deformable linear objects (DLOs) based on visual perception. Working with a parameterised set of DLOs, we use likelihood-free inference (LFI) to compute the posterior distributions for the physical parameters using which we can approximately simulate the behaviour of each specific DLO. We use these posteriors for domain randomisation while training, in simulation, object-specific visuomotor policies (i.e. assuming only visual and proprioceptive sensory) for a DLO reaching task, using model-free reinforcement learning. We demonstrate the utility of this approach by deploying sim-trained DLO manipulation policies in the real world in a zero-shot manner, i.e. without any further fine-tuning. In this context, we evaluate the capacity of a prominent LFI method to perform fine classification over the parametric set of DLOs, using only visual and proprioceptive data obtained in a dynamic manipulation trajectory. We then study the implications of the resulting domain distributions in sim-based policy learning and real-world performance.", "link": "http://arxiv.org/abs/2502.18615v3", "date": "2026-02-25", "relevancy": 2.226, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5965}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5657}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5313}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Distributional%20Treatment%20of%20Real2Sim2Real%20for%20Object-Centric%20Agent%20Adaptation%20in%20Vision-Driven%20Deformable%20Linear%20Object%20Manipulation&body=Title%3A%20A%20Distributional%20Treatment%20of%20Real2Sim2Real%20for%20Object-Centric%20Agent%20Adaptation%20in%20Vision-Driven%20Deformable%20Linear%20Object%20Manipulation%0AAuthor%3A%20Georgios%20Kamaras%20and%20Subramanian%20Ramamoorthy%0AAbstract%3A%20We%20present%20an%20integrated%20%28or%20end-to-end%29%20framework%20for%20the%20Real2Sim2Real%20problem%20of%20manipulating%20deformable%20linear%20objects%20%28DLOs%29%20based%20on%20visual%20perception.%20Working%20with%20a%20parameterised%20set%20of%20DLOs%2C%20we%20use%20likelihood-free%20inference%20%28LFI%29%20to%20compute%20the%20posterior%20distributions%20for%20the%20physical%20parameters%20using%20which%20we%20can%20approximately%20simulate%20the%20behaviour%20of%20each%20specific%20DLO.%20We%20use%20these%20posteriors%20for%20domain%20randomisation%20while%20training%2C%20in%20simulation%2C%20object-specific%20visuomotor%20policies%20%28i.e.%20assuming%20only%20visual%20and%20proprioceptive%20sensory%29%20for%20a%20DLO%20reaching%20task%2C%20using%20model-free%20reinforcement%20learning.%20We%20demonstrate%20the%20utility%20of%20this%20approach%20by%20deploying%20sim-trained%20DLO%20manipulation%20policies%20in%20the%20real%20world%20in%20a%20zero-shot%20manner%2C%20i.e.%20without%20any%20further%20fine-tuning.%20In%20this%20context%2C%20we%20evaluate%20the%20capacity%20of%20a%20prominent%20LFI%20method%20to%20perform%20fine%20classification%20over%20the%20parametric%20set%20of%20DLOs%2C%20using%20only%20visual%20and%20proprioceptive%20data%20obtained%20in%20a%20dynamic%20manipulation%20trajectory.%20We%20then%20study%20the%20implications%20of%20the%20resulting%20domain%20distributions%20in%20sim-based%20policy%20learni %20parametric%20set%20of%20DLOs%2C%20using%20only%20visual%20and%20proprioceptive%20data%20obtained%20in%20a%20dynamic%20manipulation%20trajectory.%20We%20then%20study%20the%20implications%20of%20the%20resulting%20domain%20distributions%20in%20sim-based%20policy%20learning%20and%20real-world%20performance.&entry.1838667208=http%3A//arxiv.org/abs/2502.18615v3&entry.124074799=Read"},
{"title": "Monocular Normal Estimation via Shading Sequence Estimation", "author": "Zongrui Li and Xinhua Ma and Minghui Hu and Yunqing Zhao and Yingchen Yu and Qian Zheng and Chang Liu and Xudong Jiang and Song Bai", "abstract": "Monocular normal estimation aims to estimate the normal map from a single RGB image of an object under arbitrary lights. Existing methods rely on deep models to directly predict normal maps. However, they often suffer from 3D misalignment: while the estimated normal maps may appear to have a correct appearance, the reconstructed surfaces often fail to align with the geometric details. We argue that this misalignment stems from the current paradigm: the model struggles to distinguish and reconstruct varying geometry represented in normal maps, as the differences in underlying geometry are reflected only through relatively subtle color variations. To address this issue, we propose a new paradigm that reformulates normal estimation as shading sequence estimation, where shading sequences are more sensitive to various geometric information. Building on this paradigm, we present RoSE, a method that leverages image-to-video generative models to predict shading sequences. The predicted shading sequences are then converted into normal maps by solving a simple ordinary least-squares problem. To enhance robustness and better handle complex objects, RoSE is trained on a synthetic dataset, MultiShade, with diverse shapes, materials, and light conditions. Experiments demonstrate that RoSE achieves state-of-the-art performance on real-world benchmark datasets for object-based monocular normal estimation.", "link": "http://arxiv.org/abs/2602.09929v3", "date": "2026-02-25", "relevancy": 2.223, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5596}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5577}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5511}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Monocular%20Normal%20Estimation%20via%20Shading%20Sequence%20Estimation&body=Title%3A%20Monocular%20Normal%20Estimation%20via%20Shading%20Sequence%20Estimation%0AAuthor%3A%20Zongrui%20Li%20and%20Xinhua%20Ma%20and%20Minghui%20Hu%20and%20Yunqing%20Zhao%20and%20Yingchen%20Yu%20and%20Qian%20Zheng%20and%20Chang%20Liu%20and%20Xudong%20Jiang%20and%20Song%20Bai%0AAbstract%3A%20Monocular%20normal%20estimation%20aims%20to%20estimate%20the%20normal%20map%20from%20a%20single%20RGB%20image%20of%20an%20object%20under%20arbitrary%20lights.%20Existing%20methods%20rely%20on%20deep%20models%20to%20directly%20predict%20normal%20maps.%20However%2C%20they%20often%20suffer%20from%203D%20misalignment%3A%20while%20the%20estimated%20normal%20maps%20may%20appear%20to%20have%20a%20correct%20appearance%2C%20the%20reconstructed%20surfaces%20often%20fail%20to%20align%20with%20the%20geometric%20details.%20We%20argue%20that%20this%20misalignment%20stems%20from%20the%20current%20paradigm%3A%20the%20model%20struggles%20to%20distinguish%20and%20reconstruct%20varying%20geometry%20represented%20in%20normal%20maps%2C%20as%20the%20differences%20in%20underlying%20geometry%20are%20reflected%20only%20through%20relatively%20subtle%20color%20variations.%20To%20address%20this%20issue%2C%20we%20propose%20a%20new%20paradigm%20that%20reformulates%20normal%20estimation%20as%20shading%20sequence%20estimation%2C%20where%20shading%20sequences%20are%20more%20sensitive%20to%20various%20geometric%20information.%20Building%20on%20this%20paradigm%2C%20we%20present%20RoSE%2C%20a%20method%20that%20leverages%20image-to-video%20generative%20models%20to%20predict%20shading%20sequences.%20The%20predicted%20shading%20sequences%20are%20then%20converted%20into%20normal%20maps%20by%20solving%20a%20simple%20ordinary%20least-squares%20problem.%20To%20enhance%20robustness%20and%20better%20handle%20complex%20objects%2C%20RoSE%20is%20trained%20on%20a%20synthetic%20dataset%2C%20MultiShade%2C%20with%20diverse%20shapes%2C%20materials%2C%20and%20light%20conditions.%20Experiments%20demonstrate%20that%20RoSE%20achieves%20state-of-the-art%20performance%20on%20real-world%20benchmark%20datasets%20for%20object-based%20monocular%20normal%20estimation.%0ALink%3A%20http%3A//arxiv.org/abs/2602.09929v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMonocular%2520Normal%2520Estimation%2520via%2520Shading%2520Sequence%2520Estimation%26entry.906535625%3DZongrui%2520Li%2520and%2520Xinhua%2520Ma%2520and%2520Minghui%2520Hu%2520and%2520Yunqing%2520Zhao%2520and%2520Yingchen%2520Yu%2520and%2520Qian%2520Zheng%2520and%2520Chang%2520Liu%2520and%2520Xudong%2520Jiang%2520and%2520Song%2520Bai%26entry.1292438233%3DMonocular%2520normal%2520estimation%2520aims%2520to%2520estimate%2520the%2520normal%2520map%2520from%2520a%2520single%2520RGB%2520image%2520of%2520an%2520object%2520under%2520arbitrary%2520lights.%2520Existing%2520methods%2520rely%2520on%2520deep%2520models%2520to%2520directly%2520predict%2520normal%2520maps.%2520However%252C%2520they%2520often%2520suffer%2520from%25203D%2520misalignment%253A%2520while%2520the%2520estimated%2520normal%2520maps%2520may%2520appear%2520to%2520have%2520a%2520correct%2520appearance%252C%2520the%2520reconstructed%2520surfaces%2520often%2520fail%2520to%2520align%2520with%2520the%2520geometric%2520details.%2520We%2520argue%2520that%2520this%2520misalignment%2520stems%2520from%2520the%2520current%2520paradigm%253A%2520the%2520model%2520struggles%2520to%2520distinguish%2520and%2520reconstruct%2520varying%2520geometry%2520represented%2520in%2520normal%2520maps%252C%2520as%2520the%2520differences%2520in%2520underlying%2520geometry%2520are%2520reflected%2520only%2520through%2520relatively%2520subtle%2520color%2520variations.%2520To%2520address%2520this%2520issue%252C%2520we%2520propose%2520a%2520new%2520paradigm%2520that%2520reformulates%2520normal%2520estimation%2520as%2520shading%2520sequence%2520estimation%252C%2520where%2520shading%2520sequences%2520are%2520more%2520sensitive%2520to%2520various%2520geometric%2520information.%2520Building%2520on%2520this%2520paradigm%252C%2520we%2520present%2520RoSE%252C%2520a%2520method%2520that%2520leverages%2520image-to-video%2520generative%2520models%2520to%2520predict%2520shading%2520sequences.%2520The%2520predicted%2520shading%2520sequences%2520are%2520then%2520converted%2520into%2520normal%2520maps%2520by%2520solving%2520a%2520simple%2520ordinary%2520least-squares%2520problem.%2520To%2520enhance%2520robustness%2520and%2520better%2520handle%2520complex%2520objects%252C%2520RoSE%2520is%2520trained%2520on%2520a%2520synthetic%2520dataset%252C%2520MultiShade%252C%2520with%2520diverse%2520shapes%252C%2520materials%252C%2520and%2520light%2520conditions.%2520Experiments%2520demonstrate%2520that%2520RoSE%2520achieves%2520state-of-the-art%2520performance%2520on%2520real-world%2520benchmark%2520datasets%2520for%2520object-based%2520monocular%2520normal%2520estimation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.09929v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Monocular%20Normal%20Estimation%20via%20Shading%20Sequence%20Estimation&entry.906535625=Zongrui%20Li%20and%20Xinhua%20Ma%20and%20Minghui%20Hu%20and%20Yunqing%20Zhao%20and%20Yingchen%20Yu%20and%20Qian%20Zheng%20and%20Chang%20Liu%20and%20Xudong%20Jiang%20and%20Song%20Bai&entry.1292438233=Monocular%20normal%20estimation%20aims%20to%20estimate%20the%20normal%20map%20from%20a%20single%20RGB%20image%20of%20an%20object%20under%20arbitrary%20lights.%20Existing%20methods%20rely%20on%20deep%20models%20to {"title": "The Error of Deep Operator Networks Is the Sum of Its Parts: Branch-Trunk and Mode Error Decompositions", "author": "Alexander Heinlein and Johannes Taraz", "abstract": "Operator learning has the potential to strongly impact scientific computing by learning solution operators for differential equations, potentially accelerating multi-query tasks such as design optimization and uncertainty quantification by orders of magnitude. Despite proven universal approximation properties, deep operator networks (DeepONets) often exhibit limited accuracy and generalization in practice, which hinders their adoption. Understanding these limitations is therefore crucial for further advancing the approach.\n  This work analyzes performance limitations of the classical DeepONet architecture. It is shown that the approximation error is dominated by the branch network when the internal dimension is sufficiently large, and that the learned trunk basis can often be replaced by classical basis functions without a significant impact on performance.\n  To investigate this further, a modified DeepONet is constructed in which the trunk network is replaced by the left singular vectors of the training solution matrix. This modification yields several key insights. First, a spectral bias in the branch network is observed, with coefficients of dominant, low-frequency modes learned more effectively. Second, due to singular-value scaling of the branch coefficients, the overall branch error is dominated by modes with intermediate singular values rather than the smallest ones. Third, using a shared branch network for all mode coefficients, as in the standard architecture, improves generalization of small modes compared to a stacked architecture in which coefficients are computed separately. Finally, strong and detrimental coupling between modes in parameter space is identified.", "link": "http://arxiv.org/abs/2602.21910v1", "date": "2026-02-25", "relevancy": 2.223, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4571}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4383}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4383}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Error%20of%20Deep%20Operator%20Networks%20Is%20the%20Sum%20of%20Its%20Parts%3A%20Branch-Trunk%20and%20Mode%20Error%20Decompositions&body=Title%3A%20The%20Error%20of%20Deep%20Operator%20Networks%20Is%20the%20Sum%20of%20Its%20Parts%3A%20Branch-Trunk%20and%20Mode%20Error%20Decompositions%0AAuthor%3A%20Alexander%20Heinlein%20and%20Johannes%20Taraz%0AAbstract%3A%20Operator%20learning%20has%20the%20potential%20to%20strongly%20impact%20scientific%20computing%20by%20learning%20solution%20operators%20for%20differential%20equations%2C%20potentially%20accelerating%20multi-query%20tasks%20such%20as%20design%20optimization%20and%20uncertainty%20quantification%20by%20orders%20of%20magnitude.%20Despite%20proven%20universal%20approximation%20properties%2C%20deep%20operator%20networks%20%28DeepONets%29%20often%20exhibit%20limited%20accuracy%20and%20generalization%20in%20practice%2C%20which%20hinders%20their%20adoption.%20Understanding%20these%20limitations%20is%20therefore%20crucial%20for%20further%20advancing%20the%20approach.%0A%20%20This%20work%20analyzes%20performance%20limitations%20of%20the%20classical%20DeepONet%20architecture.%20It%20is%20shown%20that%20the%20approximation%20error%20is%20dominated%20by%20the%20branch%20network%20when%20the%20internal%20dimension%20is%20sufficiently%20large%2C%20and%20that%20the%20learned%20trunk%20basis%20can%20often%20be%20replaced%20by%20classical%20basis%20functions%20without%20a%20significant%20impact%20on%20performance.%0A%20%20To%20investigate%20this%20further%2C%20a%20modified%20DeepONet%20is%20constructed%20in%20which%20the%20trunk%20network%20is%20replaced%20by%20the%20left%20singular%20vectors%20of%20the%20training%20solution%20matrix.%20This%20modification%20yields%20several%20key%20insights.%20First%2C%20a%20spectral%20bias%20in%20the%20branch%20network%20is%20observed%2C%20with%20coefficients%20of%20dominant%2C%20low-frequency%20modes%20learned%20more%20effectively.%20Second%2C%20due%20to%20singular-value%20scaling%20of%20the%20branch%20coefficients%2C%20the%20overall%20branch%20error%20is%20dominated%20by%20modes%20with%20intermediate%20singular%20values%20rather%20than%20the%20smallest%20ones.%20Third%2C%20using%20a%20shared%20branch%20network%20for%20all%20mode%20coefficients%2C%20as%20in%20the%20standard%20architecture%2C%20improves%20generalization%20of%20small%20modes%20compared%20to%20a%20stacked%20architecture%20in%20which%20coefficients%20are%20computed%20separately.%20Finally%2C%20strong%20and%20detrimental%20coupling%20between%20modes%20in%20parameter%20space%20is%20identified.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21910v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Error%2520of%2520Deep%2520Operator%2520Networks%2520Is%2520the%2520Sum%2520of%2520Its%2520Parts%253A%2520Branch-Trunk%2520and%2520Mode%2520Error%2520Decompositions%26entry.906535625%3DAlexander%2520Heinlein%2520and%2520Johannes%2520Taraz%26entry.1292438233%3DOperator%2520learning%2520has%2520the%2520potential%2520to%2520strongly%2520impact%2520scientific%2520computing%2520by%2520learning%2520solution%2520operators%2520for%2520differential%2520equations%252C%2520potentially%2520accelerating%2520multi-query%2520tasks%2520such%2520as%2520design%2520optimization%2520and%2520uncertainty%2520quantification%2520by%2520orders%2520of%2520magnitude.%2520Despite%2520proven%2520universal%2520approximation%2520properties {"title": "LoRA-Edit: Controllable First-Frame-Guided Video Editing via Mask-Aware LoRA Fine-Tuning", "author": "Chenjian Gao and Lihe Ding and Xin Cai and Zhanpeng Huang and Zibin Wang and Tianfan Xue", "abstract": "Video editing using diffusion models has achieved remarkable results in generating high-quality edits for videos. However, current methods often rely on large-scale pretraining, limiting flexibility for specific edits. First-frame-guided editing provides control over the first frame, but lacks fine-grained control over the edit's subsequent temporal evolution. To address this, we propose a mask-based LoRA (Low-Rank Adaptation) tuning method that adapts pretrained Image-to-Video models for flexible video editing. Our key innovation is using a spatiotemporal mask to strategically guide the LoRA fine-tuning process. This teaches the model two distinct skills: first, to interpret the mask as a command to either preserve content from the source video or generate new content in designated regions. Second, for these generated regions, LoRA learns to synthesize either temporally consistent motion inherited from the video or novel appearances guided by user-provided reference frames. This dual-capability LoRA grants users control over the edit's entire temporal evolution, allowing complex transformations like an object rotating or a flower blooming. Experimental results show our method achieves superior video editing performance compared to baseline methods. The code and video results are available at our project website: https://cjeen.github.io/LoRAEdit.", "link": "http://arxiv.org/abs/2506.10082v6", "date": "2026-02-25", "relevancy": 2.2185, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6289}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5512}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5284}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LoRA-Edit%3A%20Controllable%20First-Frame-Guided%20Video%20Editing%20via%20Mask-Aware%20LoRA%20Fine-Tuning&body=Title%3A%20LoRA-Edit%3A%20Controllable%20First-Frame-Guided%20Video%20Editing%20via%20Mask-Aware%20LoRA%20Fine-Tuning%0AAuthor%3A%20Chenjian%20Gao%20and%20Lihe%20Ding%20and%20Xin%20Cai%20and%20Zhanpeng%20Huang%20and%20Zibin%20Wang%20and%20Tianfan%20Xue%0AAbstract%3A%20Video%20editing%20using%20diffusion%20models%20has%20achieved%20remarkable%20results%20in%20generating%20high-quality%20edits%20for%20videos.%20However%2C%20current%20methods%20often%20rely%20on%20large-scale%20pretraining%2C%20limiting%20flexibility%20for%20specific%20edits.%20First-frame-guided%20editing%20provides%20control%20over%20the%20first%20frame%2C%20but%20lacks%20fine-grained%20control%20over%20the%20edit%27s%20subsequent%20temporal%20evolution.%20To%20address%20this%2C%20we%20propose%20a%20mask-based%20LoRA%20%28Low-Rank%20Adaptation%29%20tuning%20method%20that%20adapts%20pretrained%20Image-to-Video%20models%20for%20flexible%20video%20editing.%20Our%20key%20innovation%20is%20using%20a%20spatiotemporal%20mask%20to%20strategically%20guide%20the%20LoRA%20fine-tuning%20process.%20This%20teaches%20the%20model%20two%20distinct%20skills%3A%20first%2C%20to%20interpret%20the%20mask%20as%20a%20command%20to%20either%20preserve%20content%20from%20the%20source%20video%20or%20generate%20new%20content%20in%20designated%20regions.%20Second%2C%20for%20these%20generated%20regions%2C%20LoRA%20learns%20to%20synthesize%20either%20temporally%20consistent%20motion%20inherited%20from%20the%20video%20or%20novel%20appearances%20guided%20by%20user-provided%20reference%20frames.%20This%20dual-capability%20LoRA%20grants%20users%20control%20over%20the%20edit%27s%20entire%20temporal%20evolution%2C%20allowing%20complex%20transformations%20like%20an%20object%20rotating%20or%20a%20flower%20blooming.%20Experimental%20results%20show%20our%20method%20achieves%20superior%20video%20editing%20performance%20compared%20to%20baseline%20methods.%20The%20code%20and%20video%20results%20are%20available%20at%20our%20project%20website%3A%20https%3A//cjeen.github.io/LoRAEdit.%0ALink%3A%20http%3A//arxiv.org/abs/2506.10082v6%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLoRA-Edit%253A%2520Controllable%2520First-Frame-Guided%2520Video%2520Editing%2520via%2520Mask-Aware%2520LoRA%2520Fine-Tuning%26entry.906535625%3DChenjian%2520Gao%2520and%2520Lihe%2520Ding%2520and%2520Xin%2520Cai%2520and%2520Zhanpeng%2520Huang%2520and%2520Zibin%2520Wang%2520and%2520Tianfan%2520Xue%26entry.1292438233%3DVideo%2520editing%2520using%2520diffusion%2520models%2520has%2520achieved%2520remarkable%2520results%2520in%2520generating%2520high-quality%2520edits%2520for%2520videos.%2520However%252C%2520current%2520methods%2520often%2520rely%2520on%2520large-scale%2520pretraining%252C%2520limiting%2520flexibility%2520for%2520specific%2520edits.%2520First-frame-guided%2520editing%2520provides%2520control%2520over%2520the%2520first%2520frame%252C%2520but%2520lacks%2520fine-grained%2520control%2520over%2520the%2520edit%2527s%2520subsequent%2520temporal%2520evolution.%2520To%2520address%2520this%252C%2520we%2520propose%2520a%2520mask-based%2520LoRA%2520%2528Low-Rank%2520Adaptation%2529%2520tuning%2520method%2520that%2520adapts%2520pretrained%2520Image-to-Video%2520models%2520for%2520flexible%2520video%2520editing.%2520Our%2520key%2520innovation%2520is%2520using%2520a%2520spatiotemporal%2520mask%2520to%2520strategically%2520guide%2520the%2520LoRA%2520fine-tuning%2520process.%2520This%2520teaches%2520the%2520model%2520two%2520distinct%2520skills%253A%2520first%252C%2520to%2520interpret%2520the%2520mask%2520as%2520a%2520command%2520 {"title": "Search or Accelerate: Confidence-Switched Position Beam Search for Diffusion Language Models", "author": "Mingyu Cao and Alvaro H. C. Correia and Christos Louizos and Shiwei Liu and Lu Yin", "abstract": "Diffusion Language Models (DLMs) generate text by iteratively denoising a masked sequence, repeatedly deciding which positions to commit at each step. Standard decoding follows a greedy rule: unmask the most confident positions, yet this local choice can lock the model into a suboptimal unmasking order, especially on reasoning-heavy prompts. We present SOAR, a training-free decoding algorithm that adapts its behavior to the model's uncertainty. When confidence is low, SOAR briefly widens the search over alternative unmasking decisions to avoid premature commitments; when confidence is high, it collapses the search and decodes many positions in parallel to reduce the number of denoising iterations. Across mathematical reasoning and code generation benchmarks (GSM8K, MBPP, HumanEval) on Dream-7B and LLaDA-8B, SOAR improves generation quality while maintaining competitive inference speed, offering a practical way to balance quality and efficiency in DLM decoding. Our Code is available at https://github.com/duterscmy/SOAR", "link": "http://arxiv.org/abs/2602.10953v2", "date": "2026-02-25", "relevancy": 2.2177, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5824}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5488}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5488}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Search%20or%20Accelerate%3A%20Confidence-Switched%20Position%20Beam%20Search%20for%20Diffusion%20Language%20Models&body=Title%3A%20Search%20or%20Accelerate%3A%20Confidence-Switched%20Position%20Beam%20Search%20for%20Diffusion%20Language%20Models%0AAuthor%3A%20Mingyu%20Cao%20and%20Alvaro%20H.%20C.%20Correia%20and%20Christos%20Louizos%20and%20Shiwei%20Liu%20and%20Lu%20Yin%0AAbstract%3A%20Diffusion%20Language%20Models%20%28DLMs%29%20generate%20text%20by%20iteratively%20denoising%20a%20masked%20sequence%2C%20repeatedly%20deciding%20which%20positions%20to%20commit%20at%20each%20step.%20Standard%20decoding%20follows%20a%20greedy%20rule%3A%20unmask%20the%20most%20confident%20positions%2C%20yet%20this%20local%20choice%20can%20lock%20the%20model%20into%20a%20suboptimal%20unmasking%20order%2C%20especially%20on%20reasoning-heavy%20prompts.%20We%20present%20SOAR%2C%20a%20training-free%20decoding%20algorithm%20that%20adapts%20its%20behavior%20to%20the%20model%27s%20uncertainty.%20When%20confidence%20is%20low%2C%20SOAR%20briefly%20widens%20the%20search%20over%20alternative%20unmasking%20decisions%20to%20avoid%20premature%20commitments%3B%20when%20confidence%20is%20high%2C%20it%20collapses%20the%20search%20and%20decodes%20many%20positions%20in%20parallel%20to%20reduce%20the%20number%20of%20denoising%20iterations.%20Across%20mathematical%20reasoning%20and%20code%20generation%20benchmarks%20%28GSM8K%2C%20MBPP%2C%20HumanEval%29%20on%20Dream-7B%20and%20LLaDA-8B%2C%20SOAR%20improves%20generation%20quality%20while%20maintaining%20competitive%20inference%20speed%2C%20offering%20a%20practical%20way%20to%20balance%20quality%20and%20efficiency%20in%20DLM%20decoding.%20Our%20Code%20is%20available%20at%20https%3A//github.com/duterscmy/SOAR%0ALink%3A%20http%3A//arxiv.org/abs/2602.10953v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSearch%2520or%2520Accelerate%253A%2520Confidence-Switched%2520Position%2520Beam%2520Search%2520for%2520Diffusion%2520Language%2520Models%26entry.906535625%3DMingyu%2520Cao%2520and%2520Alvaro%2520H.%2520C.%2520Correia%2520and%2520Christos%2520Louizos%2520and%2520Shiwei%2520Liu%2520and%2520Lu%2520Yin%26entry.1292438233%3DDiffusion%2520Language%2520Models%2520%2528DLMs%2529%2520generate%2520text%2520by%2520iteratively%2520denoising%2520a%2520masked%2520sequence%252C%2520repeatedly%2520deciding%2520which%2520positions%2520to%2520commit%2520at%2520each%2520step.%2520Standard%2520decoding%2520follows%2520a%2520greedy%2520rule%253A%2520unmask%2520the%2520most%2520confident%2520positions%252C%2520yet%2520this%2520local%2520choice%2520can%2520lock%2520the%2520model%2520into%2520a%2520suboptimal%2520unmasking%2520order%252C%2520especially%2520on%2520reasoning-heavy%2520prompts.%2520We%2520present%2520SOAR%252C%2520a%2520training-free%2520decoding%2520algorithm%2520that%2520adapts%2520its%2520behavior%2520to%2520the%2520model%2527s%2520uncertainty.%2520When%2520confidence%2520is%2520low%252C%2520SOAR%2520briefly%2520widens%2520the%2520search%2520over%2520alternative%2520unmasking%2520decisions%2520to%2520avoid%2520premature%2520commitments%253B%2520when%2520confidence%2520is%2520high%252C%2520it%2520collapses%2520the%2520search%2520and%2520decodes%2520many%2520positions%2520in%2520parallel%2520to%2520reduce%2520the%2520number%2520of%2520denoising%2520iterations.%2520Across%2520mathematical%2520reasoning%2520and%2520code%2520generation%2520benchmarks%2520%2528GSM8K%252C%2520MBPP%252C%2520HumanEval%2529%2520on%2520Dream-7B%2520and%2520LLaDA-8B%252C%2520SOAR%2520improves%2520generation%2520quality%2520while%2520maintaining%2520competitive%2520inference%2520speed%252C%2520offering%2520a%2520practical%2520way%2520to%2520balance%2520quality%2520and%2520efficiency%2520in%2520DLM%2520decoding.%2520Our%2520Code%2520is%2520available%2520at%2520https%253A//github.com/duterscmy/SOAR%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.10953v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Search%20or%20Accelerate%3A%20Confidence-Switched%20Position%20Beam%20Search%20for%20Diffusion%20Language%20Models&entry.906535625=Mingyu%20Cao%20and%20Alvaro%20H.%20C.%20Correia%20and%20Christos%20Louizos%20and%20Shiwei%20Liu%20and%20Lu%20Yin&entry.1292438233=Diffusion%20Language%20Models%20%28DLMs%29%20generate%20text%20by%20iteratively%20denoising%20a%20masked%20sequence%2C%20repeatedly%20deciding%20which%20positions%20to%20commit%20at%20each%20step.%20Standard%20decoding%20follows%20a%20greedy%20rule%3A%20unmask%20the%20most%20confident%20positions%2C%20yet%20this%20local%20choice%20can%20lock%20the%20model%20into%20a%20suboptimal%20unmasking%20order%2C%20especially%20on%20reasoning-heavy%20prompts.%20We%20present%20SOAR%2C%20a%20training-free%20decoding%20algorithm%20that%20adapts%20its%20behavior%20to%20the%20model%27s%20uncertainty.%20When%20confidence%20is%20low%2C%20SOAR%20briefly%20widens%20the%20search%20over%20alternative%20unmasking%20decisions%20to%20avoid%20premature%20commitments%3B%20when%20confidence%20is%20high%2C%20it%20collapses%20the%20search%20and%20decodes%20many%20positions%20in%20parallel%20to%20reduce%20the%20number%20of%20denoising%20iterations.%20Across%20mathematical%20reasoning%20and%20code%20generation%20benchmarks%20%28GSM8K%2C%20MBPP%2C%20HumanEval%29%20on%20Dream-7B%20and%20LLaDA-8B%2C%20SOAR%20improves%20generation%20quality%20while%20maintaining%20competitive%20inference%20speed%2C%20offering%20a%20practical%20way%20to%20balance%20quality%20and%20efficiency%20in%20DLM%20decoding.%20Our%20Code%20is%20available%20at%20https%3A//github.com/duterscmy/SOAR&entry.1838667208=http%3A//arxiv.org/abs/2602.10953v2&entry.124074799=Read"},
{"title": "Force Policy: Learning Hybrid Force-Position Control Policy under Interaction Frame for Contact-Rich Manipulation", "author": "Hongjie Fang and Shirun Tang and Mingyu Mei and Haoxiang Qin and Zihao He and Jingjing Chen and Ying Feng and Chenxi Wang and Wanxi Liu and Zaixing He and Cewu Lu and Shiquan Wang", "abstract": "Contact-rich manipulation demands human-like integration of perception and force feedback: vision should guide task progress, while high-frequency interaction control must stabilize contact under uncertainty. Existing learning-based policies often entangle these roles in a monolithic network, trading off global generalization against stable local refinement, while control-centric approaches typically assume a known task structure or learn only controller parameters rather than the structure itself. In this paper, we formalize a physically grounded interaction frame, an instantaneous local basis that decouples force regulation from motion execution, and propose a method to recover it from demonstrations. Based on this, we address both issues by proposing Force Policy, a global-local vision-force policy in which a global policy guides free-space actions using vision, and upon contact, a high-frequency local policy with force feedback estimates the interaction frame and executes hybrid force-position control for stable interaction. Real-world experiments across diverse contact-rich tasks show consistent gains over strong baselines, with more robust contact establishment, more accurate force regulation, and reliable generalization to novel objects with varied geometries and physical properties, ultimately improving both contact stability and execution quality. Project page: https://force-policy.github.io/", "link": "http://arxiv.org/abs/2602.22088v1", "date": "2026-02-25", "relevancy": 2.2145, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5725}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5545}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5451}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Force%20Policy%3A%20Learning%20Hybrid%20Force-Position%20Control%20Policy%20under%20Interaction%20Frame%20for%20Contact-Rich%20Manipulation&body=Title%3A%20Force%20Policy%3A%20Learning%20Hybrid%20Force-Position%20Control%20Policy%20under%20Interaction%20Frame%20for%20Contact-Rich%20Manipulation%0AAuthor%3A%20Hongjie%20Fang%20and%20Shirun%20Tang%20and%20Mingyu%20Mei%20and%20Haoxiang%20Qin%20and%20Zihao%20He%20and%20Jingjing%20Chen%20and%20Ying%20Feng%20and%20Chenxi%20Wang%20and%20Wanxi%20Liu%20and%20Zaixing%20He%20and%20Cewu%20Lu%20and%20Shiquan%20Wang%0AAbstract%3A%20Contact-rich%20manipulation%20demands%20human-like%20integration%20of%20perception%20and%20force%20feedback%3A%20vision%20should%20guide%20task%20progress%2C%20while%20high-frequency%20interaction%20control%20must%20stabilize%20contact%20under%20uncertainty.%20Existing%20learning-based%20policies%20often%20entangle%20these%20roles%20in%20a%20monolithic%20network%2C%20trading%20off%20global%20generalization%20against%20stable%20local%20refinement%2C%20while%20control-centric%20approaches%20typically%20assume%20a%20known%20task%20structure%20or%20learn%20only%20controller%20parameters%20rather%20than%20the%20structure%20itself.%20In%20this%20paper%2C%20we%20formalize%20a%20physically%20grounded%20interaction%20frame%2C%20an%20instantaneous%20local%20basis%20that%20decouples%20force%20regulation%20from%20motion%20execution%2C%20and%20propose%20a%20method%20to%20recover%20it%20from%20demonstrations.%20Based%20on%20this%2C%20we%20address%20both%20issues%20by%20proposing%20Force%20Policy%2C%20a%20global-local%20vision-force%20policy%20in%20which%20a%20global%20policy%20guides%20free-space%20actions%20using%20vision%2C%20and%20upon%20contact%2C%20a%20high-frequency%20local%20policy%20with%20force%20feedback%20estimates%20the%20interaction%20frame%20and%20executes%20hybrid%20force-position%20control%20for%20stable%20interaction.%20Real-world%20experiments%20across%20diverse%20contact-rich%20tasks%20show%20consistent%20gains%20over%20strong%20baselines%2C%20with%20more%20robust%20contact%20establishment%2C%20more%20accurate%20force%20regulation%2C%20and%20reliable%20generalization%20to%20novel%20objects%20with%20varied%20geometries%20and%20physical%20properties%2C%20ultimately%20improving%20both%20contact%20stability%20and%20execution%20quality.%20Project%20page%3A%20https%3A//force-policy.github.io/%0ALink%3A%20http%3A//arxiv.org/abs/2602.22088v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DForce%2520Policy%253A%2520Learning%2520Hybrid%2520Force-Position%2520Control%2520Policy%2520under%2520Interaction%2520Frame%2520for%2520Contact-Rich%2520Manipulation%26entry.906535625%3DHongjie%2520Fang%2520and%2520Shirun%2520Tang%2520and%2520Mingyu%2520Mei%2520and%2520Haoxiang%2520Qin%2520and%2520Zihao%2520He%2520and%2520Jingjing%2520Chen%2520and%2520Ying%2520Feng%2520and%2520Chenxi%2520Wang%2520and%2520Wanxi%2520Liu%2520and%2520Zaixing%2520He%2520and%2520Cewu%2520Lu%2520and%2520Shiquan%2520Wang%26entry.1292438233%3DContact-rich%2520manipulation%2520demands%2520human-like%2520integration%2520of%2520perception%2520and%2520force%2520feedback%253A%2520vision%2520should%2520guide%2520task%2520progress%252C%2520while%2520high-frequency%2520interaction%2520control%2520must%2520stabilize%2520contact%2520under%2520uncertainty.%2520Existing%2520learning-based%2520policies%2520often%2520entangle%2520these%2520roles%2520in%2520a%2520monolithic%2520network%252C%2520trading%2520off%2520global%2520generalization%2520against%2520stable {"title": "Depth-Breadth Synergy in RLVR: Unlocking LLM Reasoning Gains with Adaptive Exploration", "author": "Zhicheng Yang and Zhijiang Guo and Yinya Huang and Yongxin Wang and Dongchun Xie and Hanhui Li and Yiwei Wang and Xiaodan Liang and Jing Tang", "abstract": "Reinforcement Learning with Verifiable Reward (RLVR) has emerged as a powerful paradigm for unlocking reasoning capabilities in large language models, yet its full potential is hindered by two under-explored dimensions: Depth-the hardest problem a model can sample; Breadth-the number of instances consumed in a single iteration. We dissect the popular GRPO algorithm and reveal a systematic bias: the cumulative-advantage disproportionately weights samples with medium accuracy, while down-weighting the low-accuracy instances that are crucial for pushing reasoning boundaries. To rectify the depth neglect, we introduce Difficulty Adaptive Rollout Sampling (DARS), which re-weights hard problems through targeted multi-stage rollouts, thereby increasing the number of positive rollouts for hard problems. Empirically, naively enlarging rollout size only accelerates convergence and even hurts Pass@K. Our DARS, in contrast, delivers consistent Pass@K gains without extra inference cost at convergence. Just as we adaptively expanded the depth of exploration, we now ask whether aggressively scaling the breadth of training data can further amplify reasoning gains. To this end, we intensely scale batch size and replace PPO's mini-batch iterations with full-batch updates over multiple epochs. Increasing breadth significantly enhances Pass@1 performance. Large-breadth training sustains high token-level entropy, indicating continued exploration and reduced gradient noise. We further present DARS-B, which augments DARS with large breadth, and demonstrate simultaneous gains in Pass@K and Pass@1. The results confirm that breadth and adaptive exploration across depth operate as orthogonal dimensions in RLVR, which are key to u {"title": "Capturing Stable HDR Videos Using a Dual-Camera System", "author": "Qianyu Zhang and Bolun Zheng and Lingyu Zhu and Hangjia Pan and Zunjie Zhu and Zongpeng Li and Shiqi Wang", "abstract": "High Dynamic Range (HDR) video acquisition using the alternating exposure (AE) paradigm has garnered significant attention due to its cost-effectiveness with a single consumer camera. However, despite progress driven by deep neural networks, these methods remain prone to temporal flicker in real-world applications due to inter-frame exposure inconsistencies. To address this challenge while maintaining the cost-effectiveness of the AE paradigm, we propose a novel learning-based HDR video generation solution. Specifically, we propose a dual-stream HDR video generation paradigm that decouples temporal luminance anchoring from exposure-variant detail reconstruction, overcoming the inherent limitations of the AE paradigm. To support this, we design an asynchronous dual-camera system (DCS), which enables independent exposure control across two cameras, eliminating the need for synchronization typically required in traditional multi-camera setups. Furthermore, an exposure-adaptive fusion network (EAFNet) is formulated for the DCS system. EAFNet integrates a pre-alignment subnetwork that aligns features across varying exposures, ensuring robust feature extraction for subsequent fusion, an asymmetric cross-feature fusion subnetwork that emphasizes reference-based attention to effectively merge these features across exposures, and a reconstruction subnetwork to mitigate ghosting artifacts and preserve fine details. Extensive experimental evaluations demonstrate that the proposed method achieves state-of-the-art performance across various datasets, showing the remarkable potential of our solution in HDR video reconstruction. The codes and data captured by DCS will be available at https://zqqqyu.github.io/DCS-HDR/.", "link": "http://arxiv.org/abs/2507.06593v3", "date": "2026-02-25", "relevancy": 2.211, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6064}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5433}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5407}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Capturing%20Stable%20HDR%20Videos%20Using%20a%20Dual-Camera%20System&body=Title%3A%20Capturing%20Stable%20HDR%20Videos%20Using%20a%20Dual-Camera%20System%0AAuthor%3A%20Qianyu%20Zhang%20and%20Bolun%20Zheng%20and%20Lingyu%20Zhu%20and%20Hangjia%20Pan%20and%20Zunjie%20Zhu%20and%20Zongpeng%20Li%20and%20Shiqi%20Wang%0AAbstract%3A%20High%20Dynamic%20Range%20%28HDR%29%20video%20acquisition%20using%20the%20alternating%20exposure%20%28AE%29%20paradigm%20has%20garnered%20significant%20attention%20due%20to%20its%20cost-effectiveness%20with%20a%20single%20consumer%20camera.%20However%2C%20despite%20progress%20driven%20by%20deep%20neural%20networks%2C%20these%20methods%20remain%20prone%20to%20temporal%20flicker%20in%20real-world%20applications%20due%20to%20inter-frame%20exposure%20inconsistencies.%20To%20address%20this%20challenge%20while%20maintaining%20the%20cost-effectiveness%20of%20the%20AE%20paradigm%2C%20we%20propose%20a%20novel%20learning-based%20HDR%20video%20generation%20solution.%20Specifically%2C%20we%20propose%20a%20dual-stream%20HDR%20video%20generation%20paradigm%20that%20decouples%20temporal%20luminance%20anchoring%20from%20exposure-variant%20detail%20reconstruction%2C%20overcoming%20the%20inherent%20limitations%20of%20the%20AE%20paradigm.%20To%20support%20this%2C%20we%20design%20an%20asynchronous%20dual-camera%20system%20%28DCS%29%2C%20which%20enables%20independent%20exposure%20control%20across%20two%20cameras%2C%20eliminating%20the%20need%20for%20synchronization%20typically%20required%20in%20traditional%20multi-camera%20setups.%20Furthermore%2C%20an%20exposure-adaptive%20fusion%20network%20%28EAFNet%29%20is%20formulated%20for%20the%20DCS%20system.%20EAFNet%20integrates%20a%20pre-alignment%20subnetwork%20that%20aligns%20features%20across%20varying%20exposures%2C%20ensuring%20robust%20feature%20extraction%20for%20subsequent%20fusion%2C%20an%20asymmetric%20cross-feature%20fusion%20subnetwork%20that%20emphasizes%20reference-based%20attention%20to%20effectively%20merge%20these%20features%20across%20exposures%2C%20and%20a%20reconstruction%20subnetwork%20to%20mitigate%20ghosting%20artifacts%20and%20preserve%20fine%20details.%20Extensive%20experimental%20evaluations%20demonstrate%20that%20the%20proposed%20method%20achieves%20state-of-the-art%20performance%20across%20various%20datasets%2C%20showing%20the%20remarkable%20potential%20of%20our%20solution%20in%20HDR%20video%20reconstruction.%20The%20codes%20and%20data%20captured%20by%20DCS%20will%20be%20available%20at%20https%3A//zqqqyu.github.io/DCS-HDR/.%0ALink%3A%20http%3A//arxiv.org/abs/2507.06593v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCapturing%2520Stable%2520HDR%2520Videos%2520Using%2520a%2520Dual-Camera%2520System%26entry.906535625%3DQianyu%2520Zhang%2520and%2520Bolun%2520Zheng%2520and%2520Lingyu%2520Zhu%2520and%2520Hangjia%2520Pan%2520and%2520Zunjie%2520Zhu%2520and%2520Zongpeng%2520Li%2520and%2520Shiqi%2520Wang%26entry.1292438233%3DHigh%2520Dynamic%2520Range%2520%2528HDR%2529%2520video%2520acquisition%2520using%2520the%2520alternating%2520exposure%2520%2528AE%2529%2520paradigm%2520has%2520garnered%2520significant%2520attention%2520due%2520to%2520its%2520cost-effectiveness%2520with%2520a%2520single%2520consumer%2520camera.%2520However%252C%2520despite%2520progress%2520driven%2520by%2520deep%2520neural%2520networks%252C%252 {"title": "Don't stop me now: Rethinking Validation Criteria for Model Parameter Selection", "author": "Andrea Apicella and Francesco Isgr\u00f2 and Andrea Pollastro and Roberto Prevete", "abstract": "Despite the extensive literature on training loss functions, the evaluation of generalization on the validation set remains underexplored. In this work, we conduct a systematic empirical and statistical study of how the validation criterion used for model selection affects test performance in neural classifiers, with attention to early stopping. Using fully connected networks on standard benchmarks under $k$-fold evaluation, we compare: (i) early stopping with patience and (ii) post-hoc selection over all epochs (i.e. no early stopping). Models are trained with cross-entropy, C-Loss, or PolyLoss; the model parameter selection on the validation set is made using accuracy or one of the three loss functions, each considered independently. Three main findings emerge. (1) Early stopping based on validation accuracy performs worst, consistently selecting checkpoints with lower test accuracy than both loss-based early stopping and post-hoc selection. (2) Loss-based validation criteria yield comparable and more stable test accuracy. (3) Across datasets and folds, any single validation rule often underperforms the test-optimal checkpoint. Overall, the selected model typically achieves test-set performance statistically lower than the best performance across all epochs, regardless of the validation criterion. Our results suggest avoiding validation accuracy (in particular with early stopping) for parameter selection, favoring loss-based validation criteria.", "link": "http://arxiv.org/abs/2602.22107v1", "date": "2026-02-25", "relevancy": 2.2081, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4601}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4524}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4124}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Don%27t%20stop%20me%20now%3A%20Rethinking%20Validation%20Criteria%20for%20Model%20Parameter%20Selection&body=Title%3A%20Don%27t%20stop%20me%20now%3A%20Rethinking%20Validation%20Criteria%20for%20Model%20Parameter%20Selection%0AAuthor%3A%20Andrea%20Apicella%20and%20Francesco%20Isgr%C3%B2%20and%20Andrea%20Pollastro%20and%20Roberto%20Prevete%0AAbstract%3A%20Despite%20the%20extensive%20literature%20on%20training%20loss%20functions%2C%20the%20evaluation%20of%20generalization%20on%20the%20validation%20set%20remains%20underexplored.%20In%20this%20work%2C%20we%20conduct%20a%20systematic%20empirical%20and%20statistical%20study%20of%20how%20the%20validation%20criterion%20used%20for%20model%20selection%20affects%20test%20performance%20in%20neural%20classifiers%2C%20with%20attention%20to%20early%20stopping.%20Using%20fully%20connected%20networks%20on%20standard%20benchmarks%20under%20%24k%24-fold%20evaluation%2C%20we%20compare%3A%20%28i%29%20early%20stopping%20with%20patience%20and%20%28ii%29%20post-hoc%20selection%20over%20all%20epochs%20%28i.e.%20no%20early%20stopping%29.%20Models%20are%20trained%20with%20cross-entropy%2C%20C-Loss%2C%20or%20PolyLoss%3B%20the%20model%20parameter%20selection%20on%20the%20validation%20set%20is%20made%20using%20accuracy%20or%20one%20of%20the%20three%20loss%20functions%2C%20each%20considered%20independently.%20Three%20main%20findings%20emerge.%20%281%29%20Early%20stopping%20based%20on%20validation%20accuracy%20performs%20worst%2C%20consistently%20selecting%20checkpoints%20with%20lower%20test%20accuracy%20than%20both%20loss-based%20early%20stopping%20and%20post-hoc%20selection.%20%282%29%20Loss-based%20validation%20criteria%20yield%20comparable%20and%20more%20stable%20test%20accuracy.%20%283%29%20Across%20datasets%20and%20folds%2C%20any%20single%20validation%20rule%20often%20underperforms%20the%20test-optimal%20checkpoint.%20Overall%2C%20the%20selected%20model%20typically%20achieves%20test-set%20performance%20statistically%20lower%20than%20the%20best%20performance%20across%20all%20epochs%2C%20regardless%20of%20the%20validation%20criterion.%20Our%20results%20suggest%20avoiding%20validation%20accuracy%20%28in%20particular%20with%20early%20stopping%29%20for%20parameter%20selection%2C%20favoring%20loss-based%20validation%20criteria.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22107v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDon%2527t%2520stop%2520me%2520now%253A%2520Rethinking%2520Validation%2520Criteria%2520for%2520Model%2520Parameter%2520Selection%26entry.906535625%3DAndrea%2520Apicella%2520and%2520Francesco%2520Isgr%25C3%25B2%2520and%2520Andrea%2520Pollastro%2520and%2520Roberto%2520Prevete%26entry.1292438233%3DDespite%2520the%2520extensive%2520literature%2520on%2520training%2520loss%2520functions%252C%2520the%2520evaluation%2520of%2520generalization%2520on%2520the%2520validation%2520set%2520remains%2520underexplored.%2520In%2520this%2520work%252C%2520we%2520conduct%2520a%2520systematic%2520empirical%2520and%2520statistical%2520study%2520of%2520how%2520the%2520validation%2520criterion%2520used%2520for%2520model%2520selection%2520affects%2520test%2520performance%2520in%2520neural%2520classifiers%252C%2520with%2520attention%2520to%2520early%2520stopping.%2520Using%2520fully%2520connected%2520networks%2520on%2520standard%2520benchmarks%2520under%2520%2524k%2524-fold%2520evaluation%252C%2520we%2520compare%253A%2520%2528i%2529%2520early%2520stopping%2520with%2520patience%2520and%2520%2528ii%2529%

{"title": "Compression then Matching: An Efficient Pre-training Paradigm for Multimodal Embedding", "author": "Da Li and Yuxiao Luo and Keping Bi and Jiafeng Guo and Wei Yuan and Biao Yang and Yan Wang and Fan Yang and Tingting Gao and Guorui Zhou", "abstract": "Multimodal large language models advance multimodal representation learning by acquiring transferable semantic embeddings, thereby substantially enhancing performance across a range of vision-language tasks, including cross-modal retrieval, clustering, and classification. An effective embedding is expected to comprehensively preserve the semantic content of the input while simultaneously emphasizing features that are discriminative for downstream tasks. Recent approaches demonstrate that MLLMs can be adapted into competitive embedding models via large-scale contrastive learning, enabling the simultaneous optimization of two complementary objectives. We argue that the two aforementioned objectives can be decoupled: a comprehensive understanding of the input facilitates the embedding model in achieving superior performance in downstream tasks via contrastive learning. In this paper, we propose CoMa, a compressed pre-training phase, which serves as a warm-up stage for contrastive learning. Experiments demonstrate that with only a small amount of pre-training data, we can transform an MLLM into a competitive embedding model. CoMa achieves new state-of-the-art results among MLLMs of comparable size on the MMEB, realizing optimization in both efficiency and effectiveness.", "link": "http://arxiv.org/abs/2511.08480v2", "date": "2026-02-25", "relevancy": 2.7195, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5974}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5172}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5172}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Compression%20then%20Matching%3A%20An%20Efficient%20Pre-training%20Paradigm%20for%20Multimodal%20Embedding&body=Title%3A%20Compression%20then%20Matching%3A%20An%20Efficient%20Pre-training%20Paradigm%20for%20Multimodal%20Embedding%0AAuthor%3A%20Da%20Li%20and%20Yuxiao%20Luo%20and%20Keping%20Bi%20and%20Jiafeng%20Guo%20and%20Wei%20Yuan%20and%20Biao%20Yang%20and%20Yan%20Wang%20and%20Fan%20Yang%20and%20Tingting%20Gao%20and%20Guorui%20Zhou%0AAbstract%3A%20Multimodal%20large%20language%20models%20advance%20multimodal%20representation%20learning%20by%20acquiring%20transferable%20semantic%20embeddings%2C%20thereby%20substantially%20enhancing%20performance%20across%20a%20range%20of%20vision-language%20tasks%2C%20including%20cross-modal%20retrieval%2C%20clustering%2C%20and%20classification.%20An%20effective%20embedding%20is%20expected%20to%20comprehensively%20preserve%20the%20semantic%20content%20of%20the%20input%20while%20simultaneously%20emphasizing%20features%20that%20are%20discriminative%20for%20downstream%20tasks.%20Recent%20approaches%20demonstrate%20that%20MLLMs%20can%20be%20adapted%20into%20competitive%20embedding%20models%20via%20large-scale%20contrastive%20learning%2C%20enabling%20the%20simultaneous%20optimization%20of%20two%20complementary%20objectives.%20We%20argue%20that%20the%20two%20aforementioned%20objectives%20can%20be%20decoupled%3A%20a%20comprehensive%20understanding%20of%20the%20input%20facilitates%20the%20embedding%20model%20in%20achieving%20superior%20performance%20in%20downstream%20tasks%20via%20contrastive%20learning.%20In%20this%20paper%2C%20we%20propose%20CoMa%2C%20a%20compressed%20pre-training%20phase%2C%20which%20serves%20as%20a%20warm-up%20stage%20for%20contrastive%20learning.%20Experiments%20demonstrate%20that%20with%20only%20a%20small%20amount%20of%20pre-traini {"title": "GFPL: Generative Federated Prototype Learning for Resource-Constrained and Data-Imbalanced Vision Task", "author": "Shiwei Lu and Yuhang He and Jiashuo Li and Qiang Wang and Yihong Gong", "abstract": "Federated learning (FL) facilitates the secure utilization of decentralized images, advancing applications in medical image recognition and autonomous driving. However, conventional FL faces two critical challenges in real-world deployment: ineffective knowledge fusion caused by model updates biased toward majority-class features, and prohibitive communication overhead due to frequent transmissions of high-dimensional model parameters. Inspired by the human brain's efficiency in knowledge integration, we propose a novel Generative Federated Prototype Learning (GFPL) framework to address these issues. Within this framework, a prototype generation method based on Gaussian Mixture Model (GMM) captures the statistical information of class-wise features, while a prototype aggregation strategy using Bhattacharyya distance effectively fuses semantically similar knowledge across clients. In addition, these fused prototypes are leveraged to generate pseudo-features, thereby mitigating feature distribution imbalance across clients. To further enhance feature alignment during local training, we devise a dual-classifier architecture, optimized via a hybrid loss combining Dot Regression and Cross-Entropy. Extensive experiments on benchmarks show that GFPL improves model accuracy by 3.6% under imbalanced data settings while maintaining low communication cost.", "link": "http://arxiv.org/abs/2602.21873v1", "date": "2026-02-25", "relevancy": 2.7076, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5531}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5397}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5317}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GFPL%3A%20Generative%20Federated%20Prototype%20Learning%20for%20Resource-Constrained%20and%20Data-Imbalanced%20Vision%20Task&body=Title%3A%20GFPL%3A%20Generative%20Federated%20Prototype%20Learning%20for%20Resource-Constrained%20and%20Data-Imbalanced%20Vision%20Task%0AAuthor%3A%20Shiwei%20Lu%20and%20Yuhang%20He%20and%20Jiashuo%20Li%20and%20Qiang%20Wang%20and%20Yihong%20Gong%0AAbstract%3A%20Federated%20learning%20%28FL%29%20facilitates%20the%20secure%20utilization%20of%20decentralized%20images%2C%20advancing%20applications%20in%20medical%20image%20recognition%20and%20autonomous%20driving.%20However%2C%20conventional%20FL%20faces%20two%20critical%20challenges%20in%20real-world%20deployment%3A%20ineffective%20knowledge%20fusion%20caused%20by%20model%20updates%20biased%20toward%20majority-class%20features%2C%20and%20prohibitive%20communication%20overhead%20due%20to%20frequent%20transmissions%20of%20high-dimensional%20model%20parameters.%20Inspired%20by%20the%20human%20brain%27s%20efficiency%20in%20knowledge%20integration%2C%20we%20propose%20a%20novel%20Generative%20Federated%20Prototype%20Learning%20%28GFPL%29%20framework%20to%20address%20these%20issues.%20Within%20this%20framework%2C%20a%20prototype%20generation%20method%20based%20on%20Gaussian%20Mixture%20Model%20%28GMM%29%20captures%20the%20statistical%20information%20of%20class-wise%20features%2C%20while%20a%20prototype%20aggregation%20strategy%20using%20Bhattacharyya%20distance%20effectively%20fuses%20semantically%20similar%20knowledge%20across%20clients.%20In%20addition%2C%20these%20fused%20prototypes%20are%20leveraged%20to%20generate%20pseudo-features%2C%20thereby%20mitigating%20feature%20distribution%20imbalance%20across%20clients.%20To%20further%20enhance%20feature%20alignment%20during%20local%20training%2C%20we%20devise%20a%20dual-classifier%20architecture%2C%20optimized%20via%20a%20hybrid%20loss%20combining%20Dot%20Regression%20and%20Cross-Entropy.%20Extensive%20experiments%20on%20benchmarks%20show%20that%20GFPL%20improves%20model%20accuracy%20by%203.6%25%20under%20imbalanced%20data%20settings%20while%20maintaining%20low%20communication%20cost.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21873v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGFPL%253A%2520Generative%2520Federated%2520Prototype%2520Learning%2520for%2520Resource-Constrained%2520and%2520Data-Imbalanced%2520Vision%2520Task%26entry.906535625%3DShiwei%2520Lu%2520and%2520Yuhang%2520He%2520and%2520Jiashuo%2520Li%2520and%2520Qiang%2520Wang%2520and%2520Yihong%2520Gong%26entry.1292438233%3DFederated%2520learning%2520%2528FL%2529%2520facilitates%2520the%2520secure%2520utilization%2520of%2520decentralized%2520images%252C%2520advancing%2520applications%2520in%2520medical%2520image%2520recognition%2520and%2520autonomous%2520driving.%2520However%252C%2520conventional%2520FL%2520faces%2520two%2520critical%2520challenges%2520in%2520real-world%2520deployment%253A%2520ineffective%2520knowledge%2520fusion%2520caused%2520by%2520model%2520updates%2520biased%2520toward%2520majority-class%2520features%252C%2520and%2520prohibitive%2520communication%2520overhead%2520due%2520to%2520frequent%2520transmissions%2520of%2520high-dimensional%2520model%2520parameters.%2520Inspired%2520by%2520the%2520human%2520brain%2527s%2520efficiency%2520in%2520knowledge%2520integration%252C%2520we%2520propose%2520a%2520novel%2520Generative%2520Federated%2520Prototype%2520Learning%2520%2528GFPL%2529%2520framework%2520to%2520address%2520these%2520issues.%2520Within%2520this%2520framework%252C%2520a%2520prototype%2520generation%2520method%2520based%2520on%2520Gaussian%2520Mixture%2520Model%2520%2528GMM%2529%2520captures%2520the%2520statistical%2520information%2520of%2520class-wis {"title": "NoLan: Mitigating Object Hallucinations in Large Vision-Language Models via Dynamic Suppression of Language Priors", "author": "Lingfeng Ren and Weihao Yu and Runpeng Yu and Xinchao Wang", "abstract": "Object hallucination is a critical issue in Large Vision-Language Models (LVLMs), where outputs include objects that do not appear in the input image. A natural question arises from this phenomenon: Which component of the LVLM pipeline primarily contributes to object hallucinations? The vision encoder to perceive visual information, or the language decoder to generate text responses? In this work, we strive to answer this question through designing a systematic experiment to analyze the roles of the vision encoder and the language decoder in hallucination generation. Our observations reveal that object hallucinations are predominantly associated with the strong priors from the language decoder. Based on this finding, we propose a simple and training-free framework, No-Language-Hallucination Decoding, NoLan, which refines the output distribution by dynamically suppressing language priors, modulated based on the output distribution difference between multimodal and text-only inputs. Experimental results demonstrate that NoLan effectively reduces object hallucinations across various LVLMs on different tasks. For instance, NoLan achieves substantial improvements on POPE, enhancing the accuracy of LLaVA-1.5 7B and Qwen-VL 7B by up to 6.45 and 7.21, respectively. The code is publicly available at: https://github.com/lingfengren/NoLan.", "link": "http://arxiv.org/abs/2602.22144v1", "date": "2026-02-25", "relevancy": 2.7069, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5547}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5547}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5147}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NoLan%3A%20Mitigating%20Object%20Hallucinations%20in%20Large%20Vision-Language%20Models%20via%20Dynamic%20Suppression%20of%20Language%20Priors&body=Title%3A%20NoLan%3A%20Mitigating%20Object%20Hallucinations%20in%20Large%20Vision-Language%20Models%20via%20Dynamic%20Suppression%20of%20Language%20Priors%0AAuthor%3A%20Lingfeng%20Ren%20and%20Weihao%20Yu%20and%20Runpeng%20Yu%20and%20Xinchao%20Wang%0AAbstract%3A%20Object%20hallucination%20is%20a%20critical%20issue%20in%20Large%20Vision-Language%20Models%20%28LVLMs%29%2C%20where%20outputs%20include%20objects%20that%20do%20not%20appear%20in%20the%20input%20image.%20A%20natural%20question%20arises%20from%20this%20phenomenon%3A%20Which%20component%20of%20the%20LVLM%20pipeline%20primarily%20contributes%20to%20object%20hallucinations%3F%20The%20vision%20encoder%20to%20perceive%20visual%20information%2C%20or%20the%20language%20decoder%20to%20generate%20text%20responses%3F%20In%20this%20work%2C%20we%20strive%20to%20answer%20this%20question%20through%20designing%20a%20systematic%20experiment%20to%20analyze%20the%20roles%20of%20the%20vision%20encoder%20and%20the%20language%20decoder%20in%20hallucination%20generation.%20Our%20observations%20reveal%20that%20object%20hallucinations%20are%20predominantly%20associated%20with%20the%20strong%20priors%20from%20the%20language%20decoder.%20Based%20on%20this%20finding%2C%20we%20propose%20a%20simple%20and%20training-free%20framework%2C%20No-Language-Hallucination%20Decoding%2C%20NoLan%2C%20which%20refines%20the%20output%20distribution%20by%20dynamically%20suppressing%20language%20priors%2C%20modulated%20based%20on%20the%20output%20distribution%20difference%20between%20multimodal%20and%20text-only%20inputs.%20Experimental%20results%20demonstrate%20that%20NoLan%20effectively%20reduces%20object%20hallucinations%20across%20various%20LVLMs%20on%20different%20tasks.%20For%20instance%2C%20NoLan%20achieves%20substantial%20improvements%20on%20POPE%2C%20enhancing%20the%20accuracy%20of%20LLaVA-1.5%207B%20and%20Qwen-VL%207B%20by%20up%20to%206.45%20and%207.21%2C%20respectively.%20The%20code%20is%20publicly%20available%20at%3A%20https%3A//github.com/lingfengren/NoLan.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22144v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNoLan%253A%2520Mitigating%2520Object%2520Hallucinations%2520in%2520Large%2520Vision-Language%2520Models%2520via%2520Dynamic%2520Suppression%2520of%2520Language%2520Priors%26entry.906535625%3DLingfeng%2520Ren%2520and%2520Weihao%2520Yu%2520and%2520Runpeng%2520Yu%2520and%2520Xinchao%2520Wang%26entry.1292438233%3DObject%2520hallucination%2520is%2520a%2520critical%2520issue%2520in%2520Large%2520Vision-Language%2520Models%2520%2528LVLMs%2529%252C%2520where%2520outputs%2520include%2520objects%2520that%2520do%2520not%2520appear%2520in%2520the%2520input%2520image.%2520A%2520natural%2520question%2520arises%2520from%2520this%2520phenomenon%253A%2520Which%2520component%2520of%2520the%2520LVLM%2520pipeline%2520primarily%2520contributes%2520to%2520object%2520hallucinations%253F%2520The%2520vision%2520encoder%2520to%2520perceive%2520visual%2520information%252C%2520or%2520the%2520language%2520decoder%2520to%2520generate%2520text%2520responses%253F%2520In%2520this%2520work%252C%2520we%2520strive%2520to%2520answer%2520this%2520question%2520through%2520designing%2520a%2520systematic%2520experiment%2520to%2520analyze%2520the%2520roles%2520of%2520the%2520vision%2520encoder%2520and%2520the%2520language%2520decoder%2520in%2520hallucination%2520generation.%2520Our%2520observations%2520reveal%2520that%2520object%2520hallucinations%2520are%2520predominantly%2520associated%2520with%2520the%2520strong%2520priors%2520from%2520the%25 {"title": "PoseAdapt: Sustainable Human Pose Estimation via Continual Learning Benchmarks and Toolkit", "author": "Muhammad Saif Ullah Khan and Didier Stricker", "abstract": "Human pose estimators are typically retrained from scratch or naively fine-tuned whenever keypoint sets, sensing modalities, or deployment domains change--an inefficient, compute-intensive practice that rarely matches field constraints. We present PoseAdapt, an open-source framework and benchmark suite for continual pose model adaptation. PoseAdapt defines domain-incremental and class-incremental tracks that simulate realistic changes in density, lighting, and sensing modality, as well as skeleton growth. The toolkit supports two workflows: (i) Strategy Benchmarking, which lets researchers implement continual learning (CL) methods as plugins and evaluate them under standardized protocols; and (ii) Model Adaptation, which allows practitioners to adapt strong pretrained models to new tasks with minimal supervision. We evaluate representative regularization-based methods in single-step and sequential settings. Benchmarks enforce a fixed lightweight backbone, no access to past data, and tight per-step budgets. This isolates adaptation strategy effects, highlighting the difficulty of maintaining accuracy under strict resource limits. PoseAdapt connects modern CL techniques with practical pose estimation needs, enabling adaptable models that improve over time without repeated full retraining.", "link": "http://arxiv.org/abs/2409.20469v3", "date": "2026-02-25", "relevancy": 2.6946, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5489}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5478}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "si {"title": "Learning What Matters: Prioritized Concept Learning via Relative Error-driven Sample Selection", "author": "Shivam Chandhok and Qian Yang and Oscar Manas and Kanishk Jain and Leonid Sigal and Aishwarya Agrawal", "abstract": "Instruction tuning has been central to the success of recent vision-language models (VLMs), but it remains expensive-requiring large-scale datasets, high-quality annotations, and large compute budgets. We propose PRioritized cOncept learninG via Relative Error-driven Sample Selection (PROGRESS), a data- and compute-efficient framework that enables VLMs to dynamically select what to learn next based on their evolving needs during training. At each stage, the model tracks its learning progress across skills and selects the most informative samples-those it has not already mastered and that are not too difficult to learn at the current stage of training. This strategy effectively controls skill acquisition and the order in which skills are learned. Specifically, we sample from skills showing the highest learning progress, prioritizing those with the most rapid improvement. Unlike prior methods, PROGRESS requires no upfront answer annotations, queries answers only on a need basis, avoids reliance on additional supervision from auxiliary VLMs, and does not require compute-heavy gradient computations for data selection. Experiments across multiple instruction-tuning datasets of varying scales demonstrate that PROGRESS consistently outperforms state-of-the-art baselines with much less data and supervision. Additionally, we show strong cross-architecture generalization and transferability to larger models, validating PROGRESS as a scalable solution for efficient learning.", "link": "http://arxiv.org/abs/2506.01085v2", "date": "2026-02-25", "relevancy": 2.674, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5483}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5483}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5078}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20What%20Matters%3A%20Prioritized%20Concept%20Learning%20via%20Relative%20Error-driven%20Sample%20Selection&body=Title%3A%20Learning%20What%20Matters%3A%20Prioritized%20Concept%20Learning%20via%20Relative%20Error-driven%20Sample%20Selection%0AAuthor%3A%20Shivam%20Chandhok%20and%20Qian%20Yang%20and%20Oscar%20Manas%20and%20Kanishk%20Jain%20and%20Leonid%20Sigal%20and%20Aishwarya%20Agrawal%0AAbstract%3A%20Instruction%20tuning%20has%20been%20central%20to%20the%20success%20of%20recent%20vision-language%20models%20%28VLMs%29%2C%20but%20it%20remains%20expensive-requiring%20large-scale%20datasets%2C%20high-quality%20annotations%2C%20and%20large%20compute%20budgets.%20We%20propose%20PRioritized%20cOncept%20learninG%20via%20Relative%20Error-driven%20Sample%20Selection%20%28PROGRESS%29%2C%20a%20data-%20and%20compute-efficient%20framework%20that%20enables%20VLMs%20to%20dynamically%20select%20what%20to%20learn%20next%20based%20on%20their%20evolving%20needs%20during%20training.%20At%20each%20stage%2C%20the%20model%20tracks%20its%20learning%20progress%20across%20skills%20and%20selects%20the%20most%20informative%20samples-those%20it%20has%20not%20already%20mastered%20and%20that%20are%20not%20too%20difficult%20to%20learn%20at%20the%20current%20stage%20of%20training.%20This%20strategy%20effectively%20controls%20skill%20acquisition%20and%20the%20order%20in%20which%20skills%20are%20learned.%20Specifically%2C%20we%20sample%20from%20skills%20showing%20the%20highest%20learning%20progress%2C%20prioritizing%20those%20with%20the%20most%20rapid%20improvement.%20Unlike%20prior%20methods%2C%20PROGRESS%20requires%20no%20upfront%20answer%20annotations%2C%20queries%20answers%20only%20on%20a%20need%20basis%2C%20avoids%20reliance%20on%20additional%20supervision%20from%20auxiliary%20VLMs%2C%20and%20does%20not%20require%20compute-heavy%20gradient%20computations%20for%20data%20selection.%20Experiments%20across%20multiple%20instruction-tuning%20datasets%20of%20varying%20scales%20demonstrate%20that%20PROGRESS%20consistently%20outperforms%20state-of-the-art%20baselines%20with%20much%20less%20data%20and%20supervision.%20Additionally%2C%20we%20show%20strong%20cross-architecture%20generalization%20and%20transferability%20to%20larger%20models%2C%20validating%20PROGRESS%20as%20a%20scalable%20solution%20for%20efficient%20learning.%0ALink%3A%20http%3A//arxiv.org/abs/2506.01085v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520What%2520Matters%253A%2520Prioritized%2520Concept%2520Learning%2520via%2520Relative%2520Error-driven%2520Sample%2520Selection%26entry.906535625%3DShivam%2520Chandhok%2520and%2520Qian%2520Yang%2520and%2520Oscar%2520Manas%2520and%2520Kanishk%2520Jain%2520and%2520Leonid%2520Sigal%2520and%2520Aishwarya%2520Agrawal%26entry.1292438233%3DInstruction%2520tuning%2520has%2520been%2520central%2520to%2520the%2520success%2520of%2520recent%2520vision-language%2520models%2520%2528VLMs%2529%252C%2520but%2520it%2520remains%2520expensive-requiring%2520large-scale%2520datasets%252C%2520high-quality%2520annotations%252C%2520and%2520large%2520compute%2520budgets.%2520We%2520propose%2520PRioritized%2520cOncept%2520learninG%2520via%2520Relative%2520Error-driven%2520Sample%2520Selection%2520%2528PROGRESS%2529%252C%2520a%2520data-%2520and%2520compute-efficient%2520framework%2520that%2520enables%2520VLMs%2520to%2520dynamically%2520select%2520what%2520to%2520learn%2520next%2520based%2520on%2520their%2520evolving%2520needs%2520during%2520training.%2520At%2520each%2520stage%252C%2520the%2520model%2520tracks%2520its% {"title": "RGB-Event HyperGraph Prompt for Kilometer Marker Recognition based on Pre-trained Foundation Models", "author": "Xiaoyu Xian and Shiao Wang and Xiao Wang and Daxin Tian and Yan Tian", "abstract": "Metro trains often operate in highly complex environments, characterized by illumination variations, high-speed motion, and adverse weather conditions. These factors pose significant challenges for visual perception systems, especially those relying solely on conventional RGB cameras. To tackle these difficulties, we explore the integration of event cameras into the perception system, leveraging their advantages in low-light conditions, high-speed scenarios, and low power consumption. Specifically, we focus on Kilometer Marker Recognition (KMR), a critical task for autonomous metro localization under GNSS-denied conditions. In this context, we propose a robust baseline method based on a pre-trained RGB OCR foundation model, enhanced through multi-modal adaptation. Furthermore, we construct the first large-scale RGB-Event dataset, EvMetro5K, containing 5,599 pairs of synchronized RGB-Event samples, split into 4,479 training and 1,120 testing samples. Extensive experiments on EvMetro5K and other widely used benchmarks demonstrate the effectiveness of our approach for KMR. Both the dataset and source code will be released on https://github.com/Event-AHU/EvMetro5K_benchmark", "link": "http://arxiv.org/abs/2602.22026v1", "date": "2026-02-25", "relevancy": 2.6531, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5449}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.542}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5049}] {"title": "Mixed Magnification Aggregation for Generalizable Region-Level Representations in Computational Pathology", "author": "Eric Zimmermann and Julian Viret and Michal Zelechowski and James Brian Hall and Neil Tenenholtz and Adam Casson and George Shaikovski and Eugene Vorontsov and Siqi Liu and Kristen A Severson", "abstract": "In recent years, a standard computational pathology workflow has emerged where whole slide images are cropped into tiles, these tiles are processed using a foundation model, and task-specific models are built using the resulting representations. At least 15 different foundation models have been proposed, and the vast majority are trained exclusively with tiles using the 20$\\times$ magnification. However, it is well known that certain histologic features can only be discerned with larger context windows and requires a pathologist to zoom in and out when analyzing a whole slide image. Furthermore, creating 224$\\times$224 pixel crops at 20$\\times$ leads to a large number of tiles per slide, which can be gigapixel in size. To more accurately capture multi-resolution features and investigate the possibility of reducing the number of representations per slide, we propose a region-level mixing encoder. Our approach jointly fuses image tile representations of a mixed magnification foundation model using a masked embedding modeling pretraining step. We explore a design space for pretraining the proposed mixed-magnification region aggregators and evaluate our models on transfer to biomarker prediction tasks representing various cancer types. Results demonstrate cancer dependent improvements in predictive performance, highlighting the importance of spatial context and understanding.", "link": "http://arxiv.org/abs/2602.22176v1", "date": "2026-02-25", "relevancy": 2.652, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5613}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.515}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.515}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mixed%20Magnification%20Aggregation%20for%20Generalizable%20Region-Level%20Representations%20in%20Computational%20Pathology&body=Title%3A%20Mixed%20Magnification%20Aggregation%20for%20Generalizable%20Region-Level%20Representations%20in%20Computational%20Pathology%0AAuthor%3A%20Eric%20Zimmermann%20and%20Julian%20Viret%20and%20Michal%20Zelechowski%20and%20James%20Brian%20Hall%20and%20Neil%20Tenenholtz%20and%20Adam%20Casson%20and%20George%20Shaikovski%20and%20Eugene%20Vorontsov%20and%20Siqi%20Liu%20and%20Kristen%20A%20Severson%0AAbstract%3A%20In%20recent%20years%2C%20a%20standard%20computational%20pathology%20workflow%20has%20emerged%20where%20whole%20slide%20images%20are%20cropped%20into%20tiles%2C%20these%20tiles%20are%20processed%20using%20a%20foundation%20model%2C%20and%20task-specific%20models%20are%20built%20using%20the%20resulting%20representations.%20At%20least%2015%20different%20foundation%20models%20have%20been%20proposed%2C%20and%20the%20vast%20majority%20are%20trained%20exclusively%20with%20tiles%20using%20the%2020%24%5Ctimes%24%20magnification.%20However%2C%20it%20is%20well%20known%20that%20certain%20histologic%20features%20can%20only%20be%20discerned%20with%20larger%20context%20windows%20and%20requires%20a%20pathologist%20to%20zoom%20in%20and%20out%20when%20analyzing%20a%20whole%20slide%20image.%20Furthermore%2C%20creating%20224%24%5Ctimes%24224%20pixel%20crops%20at%2020%24%5Ctimes%24%20leads%20to%20a%20large%20number%20of%20tiles%20per%20slide%2C%20which%20can%20be%20gigapixel%20in%20size.%20To%20more%20accurately%20capture%20multi-resolution%20features%20and%20investigate%20the%20possibility%20of%20reducing%20the%20number%20of%20representations%20per%20slide%2C%20we%20propose%20a%20region-level%20mixing%20encoder.%20Our%20approach%20jointly%20fuses%20image%20tile%20representations%20of%20a%20mixed%20magnification%20foundation%20model%20using%20a%20masked%20embedding%20modeling%20pretraining%20step.%20We%20explore%20a%20design%20space%20for%20pretraining%20the%20proposed%20mixed-magnification%20region%20aggregators%20and%20evaluate%20our%20models%20on%20transfer%20to%20biomarker%20prediction%20tasks%20representing%20various%20cancer%20types.%20Results%20demonstrate%20cancer%20dependent%20improvements%20in%20predictive%20performance%2C%20highlighting%20the%20importance%20of%20spatial%20context%20and%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22176v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMixed%2520Magnification%2520Aggregation%2520for%2520Generalizable%2520Region-Level%2520Representations%2520in%2520Computational%2520Pathology%26entry.906535625%3DEric%2520Zimmermann%2520and%2520Julian%2520Viret%2520and%2520Michal%2520Zelechowski%2520and%2520James%2520Brian%2520Hall%2520and%2520Neil%2520Tenenholtz%2520and%2520Adam%2520Casson%2520and%2520George%2520Shaikovski%2520and%2520Eugene%2520Vorontsov%2520and%2520Siqi%2520Liu%2520and%2520Kristen%2520A%2520Severson%26entry.1292438233%3DIn%2520recent%2520years%252C%2520a%2520standard%2520computational%2520pathology%2520workflow%2520has%2520emerged%2520where%2520whole%2520slide%2520images%2520are%2520cropped%2520into%2520tiles%252C%2520these%2520tiles%2520are%2520processed%2520using%2520a%2520foundation%2520model%252C%2520and%2520task-specific%2520models%2520are%2520built%2520using%2520the%2520resulting%2520representations.%2520At%2520least%252015%2520different%2520foundation%2520models%2520have%2520been%2520proposed%252C%2520and%2520the%2520vast%2520majority%2520are%2520trained%2520exclusively%2520with%2520 {"title": "Learning to Fuse and Reconstruct Multi-View Graphs for Diabetic Retinopathy Grading", "author": "Haoran Li and Yuxin Lin and Huan Wang and Xiaoling Luo and Qi Zhu and Jiahua Shi and Huaming Chen and Bo Du and Johan Barthelemy and Zongyan Xue and Jun Shen and Yong Xu", "abstract": "Diabetic retinopathy (DR) is one of the leading causes of vision loss worldwide, making early and accurate DR grading critical for timely intervention. Recent clinical practices leverage multi-view fundus images for DR detection with a wide coverage of the field of view (FOV), motivating deep learning methods to explore the potential of multi-view learning for DR grading. However, existing methods often overlook the inter-view correlations when fusing multi-view fundus images, failing to fully exploit the inherent consistency across views originating from the same patient. In this work, we present MVGFDR, an end-to-end Multi-View Graph Fusion framework for DR grading. Different from existing methods that directly fuse visual features from multiple views, MVGFDR is equipped with a novel Multi-View Graph Fusion (MVGF) module to explicitly disentangle the shared and view-specific visual features. Specifically, MVGF comprises three key components: (1) Multi-view Graph Initialization, which constructs visual graphs via residual-guided connections and employs Discrete Cosine Transform (DCT) coefficients as frequency-domain anchors; (2) Multi-view Graph Fusion, which integrates selective nodes across multi-view graphs based on frequency-domain relevance to capture complementary view-specific information; and (3) Masked Cross-view Reconstruction, which leverages masked reconstruction of shared information across views to facilitate view-invariant representation learning. Extensive experimental results on MFIDDR, by far the largest multi-view fundus image dataset, demonstrate the superiority of our proposed approach over existing state-of-the-art approaches in diabetic retinopathy grading.", "link": "http://arxiv.org/abs/2602.21944v1", "date": "2026-02-25", "relevancy": 2.652, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5417}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5248}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5248}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20to%20Fuse%20and%20Reconstruct%20Multi-View%20Graphs%20for%20Diabetic%20Retinopathy%20Grading&body=Title%3A%20Learning%20to%20Fuse%20and%20Reconstruct%20Multi-View%20Graphs%20for%20Diabetic%20Retinopathy%20Grading%0AAuthor%3A%20Haoran%20Li%20and%20Yuxin%20Lin%20and%20Huan%20Wang%20and%20Xiaoling%20Luo%20and%20Qi%20Zhu%20and%20Jiahua%20Shi%20and%20Huaming%20Chen%20and%20Bo%20Du%20and%20Johan%20Barthelemy%20and%20Zongyan%20Xue%20and%20Jun%20Shen%20and%20Yong%20Xu%0AAbstract%3A%20Diabetic%20retinopathy%20%28DR%29%20is%20one%20of%20the%20leading%20causes%20of%20vision%20loss%20worldwide%2C%20making%20early%20and%20accurate%20DR%20grading%20critical%20for%20timely%20intervention.%20Recent%20clinical%20practices%20leverage%20multi-view%20fundus%20images%20for%20DR%20detection%20with%20a%20wide%20coverage%20of%20the%20field%20of%20view%20%28FOV%29%2C%20motivating%20deep%20learning%20methods%20to%20explore%20the%20potential%20of%20multi-view%20learning%20for%20DR%20grading.%20However%2C%20existing%20methods%20often%20overlook%20the%20inter-view%20correlations%20when%20fusing%20multi-view%20fundus%20images%2C%20failing%20to%20fully%20exploit%20the%20inherent%20consistency%20across%20views%20originating%20from%20the%20same%20patient.%20In%20this%20work%2C%20we%20present%20MVGFDR%2C%20an%20end-to-end%20Multi-View%20Graph%20Fusion%20framew {"title": "Global-Aware Edge Prioritization for Pose Graph Initialization", "author": "Tong Wei and Giorgos Tolias and Jiri Matas and Daniel Barath", "abstract": "The pose graph is a core component of Structure-from-Motion (SfM), where images act as nodes and edges encode relative poses. Since geometric verification is expensive, SfM pipelines restrict the pose graph to a sparse set of candidate edges, making initialization critical. Existing methods rely on image retrieval to connect each image to its $k$ nearest neighbors, treating pairs independently and ignoring global consistency. We address this limitation through the concept of edge prioritization, ranking candidate edges by their utility for SfM. Our approach has three components: (1) a GNN trained with SfM-derived supervision to predict globally consistent edge reliability; (2) multi-minimal-spanning-tree-based pose graph construction guided by these ranks; and (3) connectivity-aware score modulation that reinforces weak regions and reduces graph diameter. This globally informed initialization yields more reliable and compact pose graphs, improving reconstruction accuracy in sparse and high-speed settings and outperforming SOTA retrieval methods on ambiguous scenes. The ode and trained models are available at https://github.com/weitong8591/global_edge_prior.", "link": "http://arxiv.org/abs/2602.21963v1", "date": "2026-02-25", "relevancy": 2.6437, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5526}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5244}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5093}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Global-Aware%20Edge%20Prioritization%20for%20Pose%20Graph%20Initialization&body=Title%3A%20Global-Aware%20Edge%20Prioritization%20for%20Pose%20Graph%20Initialization%0AAuthor%3A%20Tong%20Wei%20and%20Giorgos%20Tolias%20and%20Jiri%20Matas%20and%20Daniel%20Barath%0AAbstract%3A%20The%20pose%20graph%20is%20a%20core%20component%20of%20Structure-from-Motion%20%28SfM%29%2C%20where%20images%20act%20as%20nodes%20and%20edges%20encode%20relative%20poses.%20Since%20geometric%20verification%20is%20expensive%2C%20SfM%20pipelines%20restrict%20the%20pose%20graph%20to%20a%20sparse%20set%20of%20candidate%20edges%2C%20making%20initialization%20critical.%20Existing%20methods%20rely%20on%20image%20retrieval%20to%20connect%20each%20image%20to%20its%20%24k%24%20nearest%20neighbors%2C%20treating%20pairs%20independently%20and%20ignoring%20global%20consistency.%20We%20address%20this%20limitation%20through%20the%20concept%20of%20edge%20prioritization%2C%20ranking%20candidate%20edges%20by%20their%20utility%20for%20SfM.%20Our%20approach%20has%20three%20components%3A%20%281%29%20a%20GNN%20trained%20with%20SfM-derived%20supervision%20to%20predict%20globally%20consistent%20edge%20reliability%3B%20%282%29%20multi-minimal-spanning-tree-based%20pose%20graph%20construction%20guided%20by%20these%20ranks%3B%20and%20%283%29%20connectivity-aware%20score%20modulation%20that%20reinforces%20weak%20regions%20and%20reduces%20graph%20diameter.%20This%20globally%20informed%20initialization%20yields%20more%20reliable%20and%20compact%20pose%20graphs%2C%20improving%20reconstruction%20accuracy%20in%20sparse%20and%20high-speed%20settings%20and%20outperforming%20SOTA%20retrieval%20methods%20on%20ambiguous%20scenes.%20The%20ode%20and%20trained%20models%20are%20available%20at%20https%3A//github.com/weitong8591/global_edge_prior.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21963v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGlobal {"title": "MedTri: A Platform for Structured Medical Report Normalization to Enhance Vision-Language Pretraining", "author": "Yuetan Chu and Xinhua Ma and Xinran Jin and Gongning Luo and Xin Gao", "abstract": "Medical vision-language pretraining increasingly relies on medical reports as large-scale supervisory signals; however, raw reports often exhibit substantial stylistic heterogeneity, variable length, and a considerable amount of image-irrelevant content. Although text normalization is frequently adopted as a preprocessing step in prior work, its design principles and empirical impact on vision-language pretraining remain insufficiently and systematically examined. In this study, we present MedTri, a deployable normalization framework for medical vision-language pretraining that converts free-text reports into a unified [Anatomical Entity: Radiologic Description + Diagnosis Category] triplet. This structured, anatomy-grounded normalization preserves essential morphological and spatial information while removing stylistic noise and image-irrelevant content, providing consistent and image-grounded textual supervision at scale. Across multiple datasets spanning both X-ray and computed tomography (CT) modalities, we demonstrate that structured, anatomy-grounded text normalization is an important factor in medical vision-language pretraining quality, yielding consistent improvements over raw reports and existing normalization baselines. In addition, we illustrate how this normalization can easily support modular text-level augmentation strategies, including knowledge enrichment and anatomy-grounded counterfactual supervision, which provide complementary gains in robustness and generalization without altering the core normalization process. Together, our results position structured text normalization as a critical and generalizable preprocessing component for medical vision-language learning, while MedTri provides this normalization platform. Code and data will be released at https://github.com/Arturia-Pendragon-Iris/MedTri.", "link": "http://arxiv.org/abs/2602.22143v1", "date": "2026-02-25", "relevancy": 2.6392, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.567}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5083}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5083}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MedTri%3A%20A%20Platform%20for%20Structured%20Medical%20Report%20Normalization%20to%20Enhance%20Vision-Language%20Pretraining&body=Title%3A%20MedTri%3A%20A%20Platform%20for%20Structured%20Medical%20Report%20Normalization%20to%20Enhance%20Vision-Language%20Pretraining%0AAuthor%3A%20Yuetan%20Chu%20and%20Xinhua%20Ma%20and%20Xinran%20Jin%20and%20Gongning%20Luo%20and%20Xin%20Gao%0AAbstract%3A%20Medical%20vision-language%20pretraining%20increasingly%20relies%20on%20medical%20reports%20as%20large-scale%20supervisory%20signals%3B%20however%2C%20raw%20reports%20often%20exhibit%20substantial%20stylistic%20heterogeneity%2C%20variable%20length%2C%20and%20a%20considerable%20amount%20of%20image-irrelevant%20content.%20Although%20text%20normalization%20is%20frequently%20adopted%20as%20a%20preprocessing%20step%20in%20prior%20work%2C%20its%20design%20principles%20and%20empirical%20impact%20on%20vision-language%20pretraining%20remain%20insufficiently%20and%20systematically%20examined.%20In%20this%20study%2C%20we%20present%20MedTri%2C%20a%20deployable%20normalization%20framework%20for%20medical%20vision-language%20pretraining%20that%20converts%20free-text%20reports%20into%20a%20unified%20%5BAnatomical%20Entity%3A%20Radiologic%20Description%20%2B%20Diagnosis%20Category%5D%20triplet.%20This%20structur {"title": "From Words to Amino Acids: Does the Curse of Depth Persist?", "author": "Aleena Siji and Amir Mohammad Karimi Mamaghan and Ferdinand Kapl and Tobias H\u00f6ppe and Emmanouil Angelis and Andrea Dittadi and Maurice Brenner and Michael Heinzinger and Karl Henrik Johansson and Kaitlin Maile and Johannes von Oswald and Stefan Bauer", "abstract": "Protein language models (PLMs) have become widely adopted as general-purpose models, demonstrating strong performance in protein engineering and de novo design. Like large language models (LLMs), they are typically trained as deep transformers with next-token or masked-token prediction objectives on massive sequence corpora and are scaled by increasing model depth. Recent work on autoregressive LLMs has identified the Curse of Depth: later layers contribute little to the final output predictions. These findings naturally raise the question of whether a similar depth inefficiency also appears in PLMs, where many widely used models are not autoregressive, and some are multimodal, accepting both protein sequence and structure as input. In this work, we present a depth analysis of six popular PLMs across model families and scales, spanning three training objectives, namely autoregressive, masked, and diffusion, and quantify how layer contributions evolve with depth using a unified set of probing- and perturbation-based measurements. Across all models, we observe consistent depth-dependent patterns that extend prior findings on LLMs: later layers depend less on earlier computations and mainly refine the final output distribution, and these effects are increasingly pronounced in deeper models. Taken together, our results suggest that PLMs exhibit a form of depth inefficiency, motivating future work on more depth-efficient architectures and training methods.", "link": "http://arxiv.org/abs/2602.21750v1", "date": "2026-02-25", "relevancy": 2.616, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5356}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5356}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4983}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Words%20to%20Amino%20Acids%3A%20Does%20the%20Curse%20of%20Depth%20Persist%3F&body=Title%3A%20From%20Words%20to%20Amino%20Acids%3A%20Does%20the%20Curse%20of%20Depth%20Persist%3F%0AAuthor%3A%20Aleena%20Siji%20and%20Amir%20Mohammad%20Karimi%20Mamaghan%20and%20Ferdinand%20Kapl%20and%20Tobias%20H%C3%B6ppe%20and%20Emmanouil%20Angelis%20and%20Andrea%20Dittadi%20and%20Maurice%20Brenner%20and%20Michael%20Heinzinger%20and%20Karl%20Henrik%20Johansson%20and%20Kaitlin%20Maile%20and%20Johannes%20von%20Oswald%20and%20Stefan%20Bauer%0AAbstract%3A%20Protein%20language%20models%20%28PLMs%29%20have%20become%20widely%20adopted%20as%20general-purpose%20models%2C%20demonstrating%20strong%20performance%20in%20protein%20engineering%20and%20de%20novo%20design.%20Like%20large%20language%20models%20%28LLMs%29%2C%20they%20are%20typically%20trained%20as%20deep%20transformers%20with%20next-token%20or%20masked-token%20prediction%20objectives%20on%20massive%20sequence%20corpora%20and%20are%20scaled%20by%20increasing%20model%20depth.%20Recent%20work%20on%20autoregressive%20LLMs%20has%20identified%20the%20Curse%20of%20Depth%3A%20later%20layers%20contribute%20little%20to%20the%20final%20output%20predictions.%20These%20findings%20naturally%20raise%20the%20question%20of%20whether%20a%20similar%20depth%20inefficiency%20also%20appears%20in%20PLMs%2C%20where%20many%20widely%20used%20models%20are%20not%20autoregressive%2C%20and%20some%20are%20multimodal%2C%20accepting%20both%20protein%20sequence%20and%20structure%20as%20input.%20In%20this%20work%2C%20we%20present%20a%20depth%20analysis%20of%20six%20popular%20PLMs%20across%20model%20families%20and%20scales%2C%20spanning%20three%20training%20objectives%2C%20namely%20autoregressive%2C%20masked%2C%20and%20diffusion%2C%20and%20quantify%20how%20layer%20contributions%20evolve%20with%20depth%20using%20a%20unified%20set%20of%20probing-%20and%20perturbation-based%20measurements.%20Across%20all%20models%2C%20we%20observe%20consistent%20depth-dependent%20patterns%20that%20extend%20prior%20findings%20on%20LLMs%3A%20later%20layers%20depend%20less%20on%20earlier%20computations%20and%20mainly%20refine%20the%20final%20output%20distribution%2C%20and%20these%20effects%20are%20increasingly%20pronounced%20in%20deeper%20models.%20Taken%20together%2C%20our%20results%20suggest%20that%20PLMs%20exhibit%20a%20form%20of%20depth%20inefficiency%2C%20motivating%20future%20work%20on%20more%20depth-efficient%20architectures%20and%20training%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21750v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Words%2520to%2520Amino%2520Acids%253A%2520Does%2520the%2520Curse%2520of%2520Depth%2520Persist%253F%26entry.906535625%3DAleena%2520Siji%2520and%2520Amir%2520Mohammad%2520Karimi%2520Mamaghan%2520and%2520Ferdinand%2520Kapl%2520and%2520Tobias%2520H%25C3%25B6ppe%2520and%2520Emmanouil%2520Angelis%2520and%2520Andrea%2520Dittadi%2520and%2520Maurice%2520Brenner%2520and%2520Michael%2520Heinzinger%2520and%2520Karl%2520Henrik%2520Johansson%2520and%2520Kaitlin%2520Maile%2520and%2520Johannes%2520von%2520Oswald%2520and%2520Stefan%2520Bauer%26entry.1292438233%3DProtein%2520language%2520models%2520%2528PLMs%2529%2520have%2520become%2520widely%2520adopted%2520as%2520general-purpose%2520models%252C%2520demonstrating%2520strong%2520performance%2520in%2520protein%2520engineering%2520and%2520de%2520novo%2520design.%2520Like%2520large%2520language%2520models%2520%2528L {"title": "StoryMovie: A Dataset for Semantic Alignment of Visual Stories with Movie Scripts and Subtitles", "author": "Daniel Oliveira and David Martins de Matos", "abstract": "Visual storytelling models that correctly ground entities in images may still hallucinate semantic relationships, generating incorrect dialogue attribution, character interactions, or emotional states. We introduce StoryMovie, a dataset of 1,757 stories aligned with movie scripts and subtitles through LCS matching. Our alignment pipeline synchronizes screenplay dialogue with subtitle timestamps, enabling dialogue attribution by linking character names from scripts to temporal positions from subtitles. Using this aligned content, we generate stories that maintain visual grounding tags while incorporating authentic character names, dialogue, and relationship dynamics. We fine-tune Qwen Storyteller3 on this dataset, building on prior work in visual grounding and entity re-identification. Evaluation using DeepSeek V3 as judge shows that Storyteller3 achieves an 89.9% win rate against base Qwen2.5-VL 7B on subtitle alignment. Compared to Storyteller, trained without script grounding,\n  Storyteller3 achieves 48.5% versus 38.0%, confirming that semantic alignment progressively improves dialogue attribution beyond visual grounding alone.", "link": "http://arxiv.org/abs/2602.21829v1", "date": "2026-02-25", "relevancy": 2.5864, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5278}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5278}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4963}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20StoryMovie%3A%20A%20Dataset%20for%20Semantic%20Alignment%20of%20Visual%20Stories%20with%20Movie%20Scripts%20and%20Subtitles&body=Title%3A%20StoryMovie%3A%20A%20Dataset%20for%20Semantic%20Alignment%20of%20Visual%20Stories%20with%20Movie%20Scripts%20and%20Subtitles%0AAuthor%3A%20Daniel%20Oliveira%20and%20David%20Martins%20de%20Matos%0AAbstract%3A%20Visual%20storytelling%20models%20that%20correctly%20ground%20entities%20in%20images%20may%20still%20hallucinate%20semantic%20relationships%2C%20generating%20incorrect%20dialogue%20attribution%2C%20character%20interactions%2C%20or%20emotional%20states.%20We%20introduce%20StoryMovie%2C%20a%20dataset%20of%201%2C757%20stories%20aligned%20with%20movie%20scripts%20and%20subtitles%20through%20LCS%20matching.%20Our%20alignment%20pipeline%20synchronizes%20screenplay%20dialogue%20with%20subtitle%20timestamps%2C%20enabling%20dialogue%20attribution%20by%20linking%20character%20names%20from%20scripts%20to%20temporal%20positions%20from%20subtitles.%20Using%20this%20aligned%20content%2C%20we%20generate%20stories%20that%20maintain%20visual%20grounding%20tags%20while%20incorporating%20authentic%20character%20names%2C%20dialogue%2C%20and%20relationship%20dynamics.%20We%20fine-tune%20Qwen%20Storyteller3%20on%20this%20dataset%2C%20building%20on%20prior%20work%20in%20visual%20grounding%20and%20entity%20re-identification.%20Evaluation%20using%20DeepSeek%20V3%20as%20judge%20shows%20that%20Storyteller3%20achieves%20an%2089.9%25%20win%20rate%20against%20base%20Qwen2.5-VL%207B%20on%20subtitle%20alignment.%20Compared%20to%20Storyteller%2C%20trained%20without%20script%20grounding%2C%0A%20%20Storyteller3%20achieves%2048.5%25%20versus%2038.0%25%2C%20confirming%20that%20semantic%20alignment%20progressively%20improves%20dialogue%20attribution%20beyond%20visual%20grounding%20alone.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21829v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStoryMovie%253A%2520A%2520D 0visual%2520grounding%2520alone.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.21829v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=StoryMovie%3A%20A%20Dataset%20for%20Semantic%20Alignment%20of%20Visual%20Stories%20with%20Movie%20Scripts%20and%20Subtitles&entry.906535625=Daniel%20Oliveira%20and%20David%20Martins%20de%20Matos&entry.1292438233=Visual%20storytelling%20models%20that%20correctly%20ground%20entities%20in%20images%20may%20still%20hallucinate%20semantic%20relationships%2C%20generating%20incorrect%20dialogue%20attribution%2C%20character%20interactions%2C%20or%20emotional%20states.%20We%20introduce%20StoryMovie%2C%20a%20dataset%20of%201%2C757%20stories%20aligned%20with%20movie%20scripts%20and%20subtitles%20through%20LCS%20matching.%20Our%20alignment%20pipeline%20synchronizes%20screenplay%20dialogue%20with%20subtitle%20timestamps%2C%20enabling%20dialogue%20attribution%20by%20linking%20character%20names%20from%20scripts%20to%20temporal%20positions%20from%20subtitles.%20Using%20this%20aligned%20content%2C%20we%20generate%20stories%20that%20maintain%20visual%20grounding%20tags%20while%20incorporating%20authentic%20character%20names%2C%20dialogue%2C%20and%20relationship%20dynamics.%20We%20fine-tune%20Qwen%20Storyteller3%20on%20this%20dataset%2C%20building%20on%20prior%20work%20in%20visual%20grounding%20and%20entity%20re-identification.%20Evaluation%20using%20DeepSeek%20V3%20as%20judge%20shows%20that%20Storyteller3%20achieves%20an%2089.9%25%20win%20rate%20against%20base%20Qwen2.5-VL%207B%20on%20subtitle%20alignment.%20Compared%20to%20Storyteller%2C%20trained%20without%20script%20grounding%2C%0A%20%20Storyteller3%20achieves%2048.5%25%20versus%2038.0%25%2C%20confirming%20that%20semantic%20alignment%20progressively%20improves%20dialogue%20attribution%20beyond%20visual%20grounding%20alone.&entry.1838667208=http%3A//arxiv.org/abs/2602.21829v1&entry.124074799= {"title": "On Imbalanced Regression with Hoeffding Trees", "author": "Pantia-Marina Alchirch and Dimitrios I. Diochnos", "abstract": "Many real-world applications provide a continuous stream of data that is subsequently used by machine learning models to solve regression tasks of interest. Hoeffding trees and their variants have a long-standing tradition due to their effectiveness, either alone or as base models in broader ensembles. At the same time a recent line of work in batch learning has shown that kernel density estimation (KDE) is an effective approach for smoothed predictions in imbalanced regression tasks [Yang et al., 2021]. Moreover, another recent line of work for batch learning, called hierarchical shrinkage (HS) [Agarwal et al., 2022], has introduced a post-hoc regularization method for decision trees that does not alter the structure of the learned tree. Using a telescoping argument we cast KDE to streaming environments and extend the implementation of HS to incremental decision tree models. Armed with these extensions we investigate the performance of decision trees that may enjoy such options in datasets commonly used for regression in online settings. We conclude that KDE is beneficial in the early parts of the stream, while HS hardly, if ever, offers performance benefits. Our code is publicly available at: https://github.com/marinaAlchirch/DSFA_2026.", "link": "http://arxiv.org/abs/2602.22101v1", "date": "2026-02-25", "relevancy": 2.5445, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5568}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5044}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4655}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20On%20Imbalanced%20Regression%20with%20Hoeffding%20Trees&body=Title%3A%20On%20Imbalanced%20Regression%20with%20Hoeffding%20Trees%0AAuthor%3A%20Pantia-Marina%20Alchirch%20and%20Dimitrios%20I.%20Diochnos%0AAbstract%3A%20Many%20real-world%20applications%20provide%20a%20continuous%20stream%20of%20data%20that%20is%20subsequently%20used%20by%20machine%20learning%20models%20to%20solve%20regression%20tasks%20of%20interest.%20Hoeffding%20trees%20and%20their%20variants%20have%20a%20long-standing%20tradition%20due%20to%20their%20effectiveness%2C%20either%20alone%20or%20as%20base%20models%20in%20broader%20ensembles.%20At%20the%20same%20time%20a%20recent%20line%20of%20work%20in%20batch%20learning%20has%20shown%20that%20kernel%20density%20estimation%20%28KDE%29%20is%20an%20effective%20approach%20for%20smoothed%20predictions%20in%20imbalanced%20regression%20tasks%20%5BYang%20et%20al.%2C%202021%5D.%20Moreover%2C%20another%20recent%20line%20of%20work%20for%20batch%20learning%2C%20called%20hierarchical%20shrinkage%20%28HS%29%20%5BAgarwal%20et%20al.%2C%202022%5D%2C%20has%20introduced%20a%20post-hoc%20regularization%20method%20for%20decision%20trees%20that%20does%20not%20alter%20the%20structure%20of%20the%20learned%20tree.%20Using%20a%20telescoping%20argument%20we%20cast%20KDE%20to%20streaming%20environments%20and%20extend%20the%20implementation%20of%20HS%20to%20incremental%20decision%20tree%20models.%20Armed%20with%20these%20extensions%20we%20investigate%20the%20performance%20of%20decision%20trees%20that%20may%20enjoy%20such%20options%20in%20datasets%20commonly%20used%20for%20regression%20in%20online%20settings.%20We%20conclude%20that%20KDE%20is%20beneficial%20in%20the%20early%20parts%20of%20the%20stream%2C%20while%20HS%20hardly%2C%20if%20ever%2C%20offers%20performance%20benefits.%20Our%20code%20is%20publicly%20available%20at%3A%20https%3A//github.com/marinaAlchirch/DSFA_2026.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22101v1%0AForm%3A%20https%3A {"title": "JailBound: Jailbreaking Internal Safety Boundaries of Vision-Language Models", "author": "Jiaxin Song and Yixu Wang and Jie Li and Rui Yu and Yan Teng and Xingjun Ma and Yingchun Wang", "abstract": "Vision-Language Models (VLMs) exhibit impressive performance, yet the integration of powerful vision encoders has significantly broadened their attack surface, rendering them increasingly susceptible to jailbreak attacks. However, lacking well-defined attack objectives, existing jailbreak methods often struggle with gradient-based strategies prone to local optima and lacking precise directional guidance, and typically decouple visual and textual modalities, thereby limiting their effectiveness by neglecting crucial cross-modal interactions. Inspired by the Eliciting Latent Knowledge (ELK) framework, we posit that VLMs encode safety-relevant information within their internal fusion-layer representations, revealing an implicit safety decision boundary in the latent space. This motivates exploiting boundary to steer model behavior. Accordingly, we propose JailBound, a novel latent space jailbreak framework comprising two stages: (1) Safety Boundary Probing, which addresses the guidance issue by approximating decision boundary within fusion layer's latent space, thereby identifying optimal perturbation directions towards the target region; and (2) Safety Boundary Crossing, which overcomes the limitations of decoupled approaches by jointly optimizing adversarial perturbations across both image and text inputs. This latter stage employs an innovative mechanism to steer the model's internal state towards policy-violating outputs while maintaining cross-modal semantic consistency. Extensive experiments on six diverse VLMs demonstrate JailBound's efficacy, achieves 94.32% white-box and 67.28% black-box attack success averagely, which are 6.17% and 21.13% higher than SOTA methods, respectively. Our findings expose a overlooked safety risk in VLMs and highlight the urgent need for more robust defenses. Warning: This paper contains potentially sensitive, harmful and offensive content.", "link": "http://arxiv.org/abs/2505.19610v3", "date": "2026-02-25", "relevancy": 2.5408, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5187}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5187}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4871}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20JailBound%3A%20Jailbreaking%20Internal%20Safety%20Boundaries%20of%20Vision-Language%20Models&body=Title%3A%20JailBound%3A%20Jailbreaking%20Internal%20Safety%20Boundaries%20of%20Vision-Language%20Models%0AAuthor%3A%20Jiaxin%20Song%20and%20Yixu%20Wang%20and%20Jie%20Li%20and%20Rui%20Yu%20and%20Yan%20Teng%20and%20Xingjun%20Ma%20and%20Yingchun%20Wang%0AAbstract%3A%20Vision-Language%20Models%20%28VLMs%29%20exhibit%20impressive%20performance%2C%20yet%20the%20integration%20of%20powerful%20vision%20encoders%20has%20significantly%20broadened%20their%20attack%20surface%2C%20rendering%20them%20increasingly%20susceptible%20to%20jailbreak%20attacks.%20However%2C%20lacking%20well-defined%20attack%20objectives%2C%20existing%20jailbreak%20methods%20often%20struggle%20with%20gradient-based%20strategies%20prone%20to%20local%20optima%20and%20lacking%20precise%20directional%20guidance%2C%20and%20typically%20decouple%20visual%20and%20textual%20modalities%2C%20thereby%20limiting%20their%20effectiveness%20by%20neglecting%20crucial%20cross-modal%20interactions.%20Inspired%20by%20the%20Eliciting%20Latent%20Knowledge%20%28ELK%29%20framework%2C%20we%20posit%20that%20VLMs%20encode%20safety-relevant%20information%20within%20their%20internal%20fusion-layer%20representations%2C%20revealing%20an%20implicit%20safety%20decision%20boundary%20in%20the%20latent%20space.%20This%20motivates%20exploiting%20boundary%20to%20steer%20model%20behavior.%20Accordingly%2C%20we%20propose%20JailBound%2C%20a%20novel%20latent%20space%20jailbreak%20framework%20comprising%20two%20stages%3A%20%281%29%20Safety%20Boundary%20Probing%2C%20which%20addresses%20the%20guidance%20issue%20by%20approximating%20decision%20boundary%20within%20fusion%20layer%27s%20latent%20space%2C%20thereby%20identifying%20optimal%20perturbation%20directions%20towards%20the%20target%20region%3B%20and%20%282%29%20Safety%20Boundary%20Crossing%2C%20which%20overcomes%20the%20limitations%20of%20decoupled%20approaches%20by%20jointly%20optimizing%20adversarial%20perturbations%20across%20both%20image%20and%20text%20inputs.%20This%20latter%20stage%20employs%20an%20innovative%20mechanism%20to%20steer%20the%20model%27s%20internal%20state%20towards%20policy-violating%20outputs%20while%20maintaining%20cross-modal%20semantic%20consistency.%20Extensive%20experiments%20on%20six%20diverse%20VLMs%20demonstrate%20JailBound%27s%20efficacy%2C%20achieves%2094.32%25%20white-box%20and%2067.28%25%20black-box%20attack%20success%20averagely%2C%20which%20are%206.17%25%20and%2021.13%25%20higher%20than%20SOTA%20methods%2C%20respectively.%20Our%20findings%20expose%20a%20overlooked%20safety%20risk%20in%20VLMs%20and%20highlight%20the%20urgent%20need%20for%20more%20robust%20defenses.%20Warning%3A%20This%20paper%20contains%20potentially%20sensitive%2C%20harmful%20and%20offensive%20content.%0ALink%3A%20http%3A//arxiv.org/abs/2505.19610v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DJailBound%253A%2520Jailbreaking%2520Internal%2520Safety%2520Boundaries%2520of%2520Vision-Language%2520Mode {"title": "Renaissance: Investigating the Pretraining of Vision-Language Encoders", "author": "Clayton Fields and Casey Kennington", "abstract": "In the past several years there has been an explosion of available models for vision-language (VL) tasks. Unfortunately, the literature still leaves open a number of questions related to best practices in designing and training such models. Additionally, the limited programming tools available for modeling make conducting VL research more difficult than necessary. In this paper, we seek to answer several questions related to the pretraining of VL encoders through meta-analysis. To conduct these experiments, we introduce a VL evaluation framework called Renaissance. In our first set of experiments, we show that we can save significant compute at little to no cost to downstream performance, by freezing large parts of VL models during pretraining. In our second set of experiments, we examine the effect of basing a VL transformer on a vision model versus a text model. Renaissance offers a great deal of flexibility in creating, training and evaluating transformer encoders for VL modeling. Its source code will be made publicly available upon publication. The source code for Renaissance can be found at https://github.com/bsu-slim/renaissance.", "link": "http://arxiv.org/abs/2411.06657v2", "date": "2026-02-25", "relevancy": 2.5342, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6511}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6511}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5457}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Renaissance%3A%20Investigating%20the%20Pretraining%20of%20Vision-Language%20Encoders&body=Title%3A%20Renaissance%3A%20Investigating%20the%20Pretraining%20of%20Vision-Language%20Encoders%0AAuthor%3A%20Clayton%20Fields%20and%20Casey%20Kennington%0AAbstract%3A%20In%20the%20past%20several%20years%20there%20has%20been%20an%20explosion%20of%20available%20models%20for%20vision-language%20%28VL%29%20tasks.%20Unfortunately%2C%20the%20literature%20still%20leaves%20open%20a%20number%20of%20questions%20related%20to%20best%20practices%20in%20designing%20and%20training%20such%20models.%20Additionally%2C%20the%20limited%20programming%20tools%20available%20for%20modeling%20make%20conducting%20VL%20research%20more%20difficult%20than%20necessary.%20In%20this%20paper%2C%20we%20seek%20to%20answer%20several%20questions%20related%20to%20the%20pretraining%20of%20VL%20encoders%20through%20meta-analysis.%20To%20conduct%20these%20experiments%2C%20we%20introduce%20a%20VL%20evaluation%20framework%20called%20Renaissance.%20In%20our%20first%20set%20of%20experiments%2C%20we%20show%20that%20we%20can%20save%20significant%20compute%20at%20little%20to%20no%20cost%20to%20downstream%20performance%2C%20by%20freezing%20large%20parts%20of%20VL%20models%20during%20pretraining.%20In%20our%20second%20set%20of%20experiments%2C%20we%20examine%20the%20effect%20of%20basing%20a%20VL%20transformer%20on%20a%20vision%20model%20versus%20a%20text%20model.%20Renaissance%20offers%20a%20great%20deal%20of%20flexibility%20in%20creating%2C%20training%20and%20evaluating%20transformer%20encoders%20for%20VL%20modeling.%20Its%20source%20code%20will%20be%20made%20publicly%20available%20upon%20publication.%20The%20source%20code%20for%20Renaissance%20can%20be%20found%20at%20https%3A//github.com/bsu-slim/renaissance.%0ALink%3A%20http%3A//arxiv.org/abs/2411.06657v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRenaissance%253A%2520Investigating%2520the%2520Pretraining%2520of%2520Vision-Language%25 y.1838667208%3Dhttp%253A//arxiv.org/abs/2411.06657v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Renaissance%3A%20Investigating%20the%20Pretraining%20of%20Vision-Language%20Encoders&entry.906535625=Clayton%20Fields%20and%20Casey%20Kennington&entry.1292438233=In%20the%20past%20several%20years%20there%20has%20been%20an%20explosion%20of%20available%20models%20for%20vision-language%20%28VL%29%20tasks.%20Unfortunately%2C%20the%20literature%20still%20leaves%20open%20a%20number%20of%20questions%20related%20to%20best%20practices%20in%20designing%20and%20training%20such%20models.%20Additionally%2C%20the%20limited%20programming%20tools%20available%20for%20modeling%20make%20conducting%20VL%20research%20more%20difficult%20than%20necessary.%20In%20this%20paper%2C%20we%20seek%20to%20answer%20several%20questions%20related%20to%20the%20pretraining%20of%20VL%20encoders%20through%20meta-analysis.%20To%20conduct%20these%20experiments%2C%20we%20introduce%20a%20VL%20evaluation%20framework%20called%20Renaissance.%20In%20our%20first%20set%20of%20experiments%2C%20we%20show%20that%20we%20can%20save%20significant%20compute%20at%20little%20to%20no%20cost%20to%20downstream%20performance%2C%20by%20freezing%20large%20parts%20of%20VL%20models%20during%20pretraining.%20In%20our%20second%20set%20of%20experiments%2C%20we%20examine%20the%20effect%20of%20basing%20a%20VL%20transformer%20on%20a%20vision%20model%20versus%20a%20text%20model.%20Renaissance%20offers%20a%20great%20deal%20of%20flexibility%20in%20creating%2C%20training%20and%20evaluating%20transformer%20encoders%20for%20VL%20modeling.%20Its%20source%20code%20will%20be%20made%20publicly%20available%20upon%20publication.%20The%20source%20code%20for%20Renaissance%20can%20be%20found%20at%20https%3A//github.com/bsu-slim/renaissance.&entry.1838667208=http%3A//arxiv.org/abs/2411.06657v2&entry.124074799=Read"},
{"title": "Understanding Artificial Theory of Mind: Perturbed Tasks and Reasoning in Large Language Models", "author": "Christian Nickel and Laura Schrewe and Florian Mai and Lucie Flek", "abstract": "Theory of Mind (ToM) refers to an agent's ability to model the internal states of others. Contributing to the debate whether large language models (LLMs) exhibit genuine ToM capabilities, our study investigates their ToM robustness using perturbations on false-belief tasks and examines the potential of Chain-of-Thought prompting (CoT) to enhance performance and explain the LLM's decision. We introduce a handcrafted, richly annotated ToM dataset, including classic and perturbed false belief tasks, the corresponding spaces of valid reasoning chains for correct task completion, subsequent reasoning faithfulness, task solutions, and propose metrics to evaluate reasoning chain correctness and to what extent final answers are faithful to reasoning traces of the generated CoT. We show a steep drop in ToM capabilities under task perturbation for all evaluated LLMs, questioning the notion of any robust form of ToM being present. While CoT prompting improves the ToM performance overall in a faithful manner, it surprisingly degrades accuracy for some perturbation classes, indicating that selective application is necessary.", "link": "http://arxiv.org/abs/2602.22072v1", "date": "2026-02-25", "relevancy": 2.5206, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5055}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5055}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5014}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Understanding%20Artificial%20Theory%20of%20Mind%3A%20Perturbed%20Tasks%20and%20Reasoning%20in%20Large%20Language%20Models&body=Title%3A%20Understanding%20Artificial%20Theory%20of%20Mind%3A%20Perturbed%20Tasks%20and%20Reasoning%20in%20Large%20Language%20Models%0AAuthor%3A%20Christian%20Nickel%20and%20Laura%20Schrewe%20and%20Florian%20Mai%20and%20Lucie%20Flek%0AAbstract%3A%20Theory%20of%20Mind%20%28ToM%29%20refers%20to%20an%20agent%27s%20ability%20to%20model%20the%20internal%20states%20of%20others.%20Contributing%20to%20the%20debate%20whether%20large%20language%20models%20%28LLMs%29%20exhibit%20genuine%20ToM%20capabilities%2C%20our%20study%20investigates%20their%20ToM%20robustness%20using%20perturbations%20on%20false-belief%20tasks%20and%20examines%20the%20potential%20of%20Chain-of-Thought%20prompting%20%28CoT%29%20to%20enhance%20performance%20and%20explain%20the%20LLM%27s%20decision.%20We%20introduce%20a%20handcrafted%2C%20richly%20annotated%20ToM%20dataset%2C%20including%20classic%20and%20perturbed%20false%20belief%20tasks%2C%20the%20corresponding%20spaces%20of%20valid%20reasoning%20chains%20for%20correct%20task%20completion%2C%20subsequent%20reasoning%20faithfulness%2C%20task%20solutions%2C%20and%20propose%20metrics%20to%20evaluate%20reasoning%20chain%20correctness%20and%20to%20what%20extent%20final%20answers%20are%20faithful%20to%20reasoning%20traces%20of%20the%20generated%20CoT.%20We%20show%20a%20steep%20drop%20in%20ToM%20capabilities%20under%20task%20perturbation%20for%20all%20evaluated%20LLMs%2C%20questioning%20the%20notion%20of%20any%20robust%20form%20of%20ToM%20being%20present.%20While%20CoT%20prompting%20improves%20the%20ToM%20performance%20overall%20in%20a%20faithful%20manner%2C%20it%20surprisingly%20degrades%20accuracy%20for%20some%20perturbation%20classes%2C%20indicating%20that%20selective%20application%20is%20necessary.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22072v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fe

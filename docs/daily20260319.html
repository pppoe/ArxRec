{"title": "TAPESTRY: From Geometry to Appearance via Consistent Turntable Videos", "author": "Yan Zeng and Haoran Jiang and Kaixin Yao and Qixuan Zhang and Longwen Zhang and Lan Xu and Jingyi Yu", "abstract": "Automatically generating photorealistic and self-consistent appearances for untextured 3D models is a critical challenge in digital content creation. The advancement of large-scale video generation models offers a natural approach: directly synthesizing 360-degree turntable videos (TTVs), which can serve not only as high-quality dynamic previews but also as an intermediate representation to drive texture synthesis and neural rendering. However, existing general-purpose video diffusion models struggle to maintain strict geometric consistency and appearance stability across the full range of views, making their outputs ill-suited for high-quality 3D reconstruction. To this end, we introduce TAPESTRY, a framework for generating high-fidelity TTVs conditioned on explicit 3D geometry. We reframe the 3D appearance generation task as a geometry-conditioned video diffusion problem: given a 3D mesh, we first render and encode multi-modal geometric features to constrain the video generation process with pixel-level precision, thereby enabling the creation of high-quality and consistent TTVs. Building upon this, we also design a method for downstream reconstruction tasks from the TTV input, featuring a multi-stage pipeline with 3D-Aware Inpainting. By rotating the model and performing a context-aware secondary generation, this pipeline effectively completes self-occluded regions to achieve full surface coverage. The videos generated by TAPESTRY are not only high-quality dynamic previews but also serve as a reliable, 3D-aware intermediate representation that can be seamlessly back-projected into UV textures or used to supervise neural rendering methods like 3DGS. This enables the automated creation of production-ready, complete 3D assets from untextured meshes. Experimental results demonstrate that our method outperforms existing approaches in both video consistency and final reconstruction quality.", "link": "http://arxiv.org/abs/2603.17735v1", "date": "2026-03-18", "relevancy": 3.2379, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6539}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6539}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.635}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TAPESTRY%3A%20From%20Geometry%20to%20Appearance%20via%20Consistent%20Turntable%20Videos&body=Title%3A%20TAPESTRY%3A%20From%20Geometry%20to%20Appearance%20via%20Consistent%20Turntable%20Videos%0AAuthor%3A%20Yan%20Zeng%20and%20Haoran%20Jiang%20and%20Kaixin%20Yao%20and%20Qixuan%20Zhang%20and%20Longwen%20Zhang%20and%20Lan%20Xu%20and%20Jingyi%20Yu%0AAbstract%3A%20Automatically%20generating%20photorealistic%20and%20self-consistent%20appearances%20for%20untextured%203D%20models%20is%20a%20critical%20challenge%20in%20digital%20content%20creation.%20The%20advancement%20of%20large-scale%20video%20generation%20models%20offers%20a%20natural%20approach%3A%20directly%20synthesizing%20360-degree%20turntable%20videos%20%28TTVs%29%2C%20which%20can%20serve%20not%20only%20as%20high-quality%20dynamic%20previews%20but%20also%20as%20an%20intermediate%20representation%20to%20drive%20texture%20synthesis%20and%20neural%20rendering.%20However%2C%20existing%20general-purpose%20video%20diffusion%20models%20struggle%20to%20maintain%20strict%20geometric%20consistency%20and%20appearance%20stability%20across%20the%20full%20range%20of%20views%2C%20making%20their%20outputs%20ill-suited%20for%20high-quality%203D%20reconstruction.%20To%20this%20end%2C%20we%20introduce%20TAPESTRY%2C%20a%20framework%20for%20generating%20high-fidelity%20TTVs%20conditioned%20on%20explicit%203D%20geometry.%20We%20reframe%20the%203D%20appearance%20generation%20task%20as%20a%20geometry-conditioned%20video%20diffusion%20problem%3A%20given%20a%203D%20mesh%2C%20we%20first%20render%20and%20encode%20multi-modal%20geometric%20features%20to%20constrain%20the%20video%20generation%20process%20with%20pixel-level%20precision%2C%20thereby%20enabling%20the%20creation%20of%20high-quality%20and%20consistent%20TTVs.%20Building%20upon%20this%2C%20we%20also%20design%20a%20method%20for%20downstream%20reconstruction%20tasks%20from%20the%20TTV%20input%2C%20featuring%20a%20multi-stage%20pipeline%20with%203D-Aware%20Inpainting.%20By%20rotating%20the%20model%20and%20performing%20a%20context-aware%20secondary%20generation%2C%20this%20pipeline%20effectively%20completes%20self-occluded%20regions%20to%20achieve%20full%20surface%20coverage.%20The%20videos%20generated%20by%20TAPESTRY%20are%20not%20only%20high-quality%20dynamic%20previews%20but%20also%20serve%20as%20a%20reliable%2C%203D-aware%20intermediate%20representation%20that%20can%20be%20seamlessly%20back-projected%20into%20UV%20textures%20or%20used%20to%20supervise%20neural%20rendering%20methods%20like%203DGS.%20This%20enables%20the%20automated%20creation%20of%20production-ready%2C%20complete%203D%20assets%20from%20untextured%20meshes.%20Experimental%20results%20demonstrate%20that%20our%20method%20outperforms%20existing%20approaches%20in%20both%20video%20consistency%20and%20final%20reconstruction%20quality.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17735v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTAPESTRY%253A%2520From%2520Geometry%2520to%2520Appearance%2520via%2520Consistent%2520Turntable%2520Videos%26entry.906535625%3DYan%2520Zeng%2520and%2520Haoran%2520Jiang%2520and%2520Kaixin%2520Yao%2520and%2520Qixuan%2520Zhang%2520and%2520Longwen%25 {"title": "Loc3R-VLM: Language-based Localization and 3D Reasoning with Vision-Language Models", "author": "Kevin Qu and Haozhe Qi and Mihai Dusmanu and Mahdi Rad and Rui Wang and Marc Pollefeys", "abstract": "Multimodal Large Language Models (MLLMs) have made impressive progress in connecting vision and language, but they still struggle with spatial understanding and viewpoint-aware reasoning. Recent efforts aim to augment the input representations with geometric cues rather than explicitly teaching models to reason in 3D space. We introduce Loc3R-VLM, a framework that equips 2D Vision-Language Models with advanced 3D understanding capabilities from monocular video input. Inspired by human spatial cognition, Loc3R-VLM relies on two joint objectives: global layout reconstruction to build a holistic representation of the scene structure, and explicit situation modeling to anchor egocentric perspective. These objectives provide direct spatial supervision that grounds both perception and language in a 3D context. To ensure geometric consistency and metric-scale alignment, we leverage lightweight camera pose priors extracted from a pre-trained 3D foundation model. Loc3R-VLM achieves state-of-the-art performance in language-based localization and outperforms existing 2D- and video-based approaches on situated and general 3D question-answering benchmarks, demonstrating that our spatial supervision framework enables strong 3D understanding. Project page: https://kevinqu7.github.io/loc3r-vlm", "link": "http://arxiv.org/abs/2603.18002v1", "date": "2026-03-18", "relevancy": 3.2323, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6549}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6549}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6297}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Loc3R-VLM%3A%20Language-based%20Localization%20and%203D%20Reasoning%20with%20Vision-Language%20Models&body=Title%3A%20Loc3R-VLM%3A%20Language-based%20Localization%20and%203D%20Reasoning%20with%20Vision-Language%20Models%0AAuthor%3A%20Kevin%20Qu%20and%20Haozhe%20Qi%20and%20Mihai%20Dusmanu%20and%20Mahdi%20Rad%20and%20Rui%20Wang%20and%20Marc%20Pollefeys%0AAbstract%3A%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20have%20made%20impressive%20progress%20in%20connecting%20vision%20and%20language%2C%20but%20they%20still%20struggle%20with%20spatial%20understanding%20and%20viewpoint-aware%20reasoning.%20Recent%20efforts%20aim%20to%20augment%20the%20input%20representations%20with%20geometric%20cues%20rather%20than%20explicitly%20teaching%20models%20to%20reason%20in%203D%20space.%20We%20introduce%20Loc3R-VLM%2C%20a%20framework%20that%20equips%202D%20Vision-Language%20Models%20with%20advanced%203D%20understanding%20capabilities%20from%20monocular%20video%20input.%20Inspired%20by%20human%20spatial%20cognition%2C%20Loc3R-VLM%20relies%20on%20two%20joint%20objectives%3A%20global%20layout%20reconstruction%20to%20build%20a%20holistic%20representation%20of%20the%20scene%20structure%2C%20and%20explicit%20situation%20modeling%20to%20anchor%20egocentric%20perspective.%20These%20objectives%20provide%20direct%20spatial%20supervision%20that%20grounds%20both%20perception%20and%20language%20in%20a%203D%20context.%20To%20ensure%20geometric%20consistency%20and%20metric-scale%20alignment%2C%20we%20leverage%20lightweight%20camera%20pose%20priors%20extracted%20from%20a%20pre-trained%203D%20foundation%20model.%20Loc3R-VLM%20achieves%20state-of-the-art%20performance%20in%20language-based%20localization%20and%20outperforms%20existing%202D-%20and%20video-based%20approaches%20on%20situated%20and%20general%203D%20question-answering%20benchmarks%2C%20demonstrating%20that%20our%20spatial%20supervision%20framework%20enables%20strong%203D%20understanding.%20Project%20page%3A%20https%3A//kevinqu7.github.io/loc3r-vlm%0ALink%3A%20http%3A//arxiv.org/abs/2603.18002v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLoc3R-VLM%253A%2520Language-based%2520Localization%2520and%25203D%2520Reasoning%2520with%2520Vision-Language%2520Models%26entry.906535625%3DKevin%2520Qu%2520and%2520Haozhe%2520Qi%2520and%2520Mihai%2520Dusmanu%2520and%2520Mahdi%2520Rad%2520and%2520Rui%2520Wang%2520and%2520Marc%2520Pollefeys%26entry.1292438233%3DMultimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520have%2520made%2520impressive%2520progress%2520in%2520connecting%2520vision%2520and%2520language%252C%2520but%2520they%2520still%2520struggle%2520with%2520spatial%2520understanding%2520and%2520viewpoint-aware%2520reasoning.%2520Recent%2520efforts%2520aim%2520to%2520augment%2520the%2520input%2520representations%2520with%2520geometric%2520cues%2520rather%2520than%2520explicitly%2520teaching%2520models%2520to%2520reason%2520in%25203D%2520space.%2520We%2520introduce%2520Loc3R-VLM%252C%2520a%2520framework%2520that%2520equips%25202D%2520Vision-Language%2520Models%2520with%2520advanced%25203D%2520understanding%2520capabilities%2520from%2520monocular%2520video%2520input.%2520Inspired%2520by%2520human%2520spatial%2520cognition%252C%2520Loc3R-VLM%2520relies%2520on%2520two%2520joint%2520objectives%253A%2520global%2520layout%2520reconstruction%2520to%2520build%2520a%2520holistic%2520representation%2520of%2520the%2520scene%2520structure%252C%2520and%2520explicit%2520situation%2520modeling%2520to%2520anchor%2520egocentric%2520perspective.%2520These%2520objectives%2520provide%2520direct%2520spatial%2520supervision%2520that%2520grounds%2520both%2520perception%2520and%2520language%2520in%2520a%25203D%2520context.%2520To%2520ensu {"title": "HyperMotionX: The Dataset and Benchmark with DiT-Based Pose-Guided Human Image Animation of Complex Motions", "author": "Shuolin Xu and Siming Zheng and Ziyi Wang and HC Yu and Jinwei Chen and Huaqi Zhang and Daquan Zhou and Tong-Yee Lee and Bo Li and Peng-Tao Jiang", "abstract": "Recent advances in diffusion models have significantly improved conditional video generation, particularly in the pose-guided human image animation task. Although existing methods are capable of generating high-fidelity and time-consistent animation sequences in regular motions and static scenes. However there are still obvious limitations when facing complex human body motions that contain highly dynamic, non-standard motions, and the lack of a high-quality benchmark for evaluation of complex human motion animations. To address this challenge, we propose a concise yet powerful DiT-based human animation generation baseline and design spatial low-frequency enhanced RoPE, a novel module that selectively enhances low-frequency spatial feature modeling by introducing learnable frequency scaling. Furthermore, we introduce the Open-HyperMotionX Dataset and HyperMotionX Bench, which provide high-quality human pose annotations and curated video clips for evaluating and improving pose-guided human image animation models under complex human motion conditions. Our method significantly improves structural stability and appearance consistency in highly dynamic human motion sequences. Extensive experiments demonstrate the effectiveness of our dataset and proposed approach in advancing the generation quality of complex human motion image animations. The codes, model weights, and dataset have been made publicly available at https://vivocameraresearch.github.io/hypermotion/", "link": "http://arxiv.org/abs/2505.22977v2", "date": "2026-03-18", "relevancy": 3.2046, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.7044}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.6329}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5855}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HyperMotionX%3A%20The%20Dataset%20and%20Benchmark%20with%20DiT-Based%20Pose-Guided%20Human%20Image%20Animation%20of%20Complex%20Motions&body=Title%3A%20HyperMotionX%3A%20The%20Dataset%20and%20Benchmark%20with%20DiT-Based%20Pose-Guided%20Human%20Image%20Animation%20of%20Complex%20Motions%0AAuthor%3A%20Shuolin%20Xu%20and%20Siming%20Zheng%20and%20Ziyi%20Wang%20and%20HC%20Yu%20and%20Jinwei%20Chen%20and%20Huaqi%20Zhang%20and%20Daquan%20Zhou%20and%20Tong-Yee%20Lee%20and%20Bo%20Li%20and%20Peng-Tao%20Jiang%0AAbstract%3A%20Recent%20advances%20in%20diffusion%20models%20have%20significantly%20improved%20conditional%20video%20generation%2C%20particularly%20in%20the%20pose-guided%20human%20image%20animation%20task.%20Although%20existing%20methods%20are%20capable%20of%20generating%20high-fidelity%20and%20time-consistent%20animation%20sequences%20in%20regular%20motions%20and%20static%20scenes.%20However%20there%20are%20still%20obvious%20limitations%20when%20facing%20complex%20human%20body%20motions%20that%20contain%20highly%20dynamic%2C%20non-standard%20motions%2C%20and%20the%20lack%20of%20a%20high-quality%20benchmark%20for%20evaluation%20of%20complex%20human%20motion%20animations.%20To%20address%20this%20challenge%2C%20we%20propose%20a%20concise%20yet%20powerful%20DiT-based%20human%20animation%20generation%20baseline%20and%20design%20spatial%20low-frequency%20enhanced%20RoPE%2C%20a%20novel%20module%20that%20selectively%20enhances%20low-frequency%20spatial%20feature%20modeling%20by%20introducing%20learnable%20frequency%20scaling.%20Furthermore%2C%20we%20introduce%20the%20Open-HyperMotionX%20Dataset%20and%20HyperMotionX%20Bench%2C%20which%20provide%20high-quality%20human%20pose%20annotations%20and%20curated%20video%20clips%20for%20evaluating%20and%20improving%20pose-guided%20human%20image%20animation%20models%20under%20complex%20human%20motion%20conditions.%20Our%20method%20significantly%20improves%20structural%20stability%20and%20appearance%20consistency%20in%20highly%20dynamic%20human%20motion%20sequences.%20Extensive%20experiments%20demonstrate%20the%20effectiveness%20of%20our%20dataset%20and%20proposed%20approach%20in%20advancing%20the%20generation%20quality%20of%20complex%20human%20motion%20image%20animations.%20The%20codes%2C%20model%20weights%2C%20and%20dataset%20have%20been%20made%20publicly%20available%20at%20https%3A//vivocameraresearch.github.io/hypermotion/%0ALink%3A%20http%3A//arxiv.org/abs/2505.22977v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHyperMotionX%253A%2520The%2520Dataset%2520and%2520Benchmark%2520with%2520DiT-Based%2520Pose-Guided%2520Human%2520Image%2520Animation%2520of%2520Complex%2520Motions%26entry.906535625%3DShuolin%2520Xu%2520and%2520Siming%2520Zheng%2520and%2520Ziyi%2520Wang%2520and%2520HC%2520Yu%2520and%2520Jinwei%2520Chen%2520and%2520Huaqi%2520Zhang%2520and%2520Daquan%2520Zhou%2520and%2520Tong-Yee%2520Lee%2520and%2520Bo%2520Li%2520and%2520Peng-Tao%2520Jiang%26entry.1292438233%3DRecent%2520advances%2520in%2520diffusion%2520models%2520have%2520significantly%2520improved%2520conditional%2520video%2520generation%252C%2520particularly%2520in%2520the%2520pose-guided%2520human%2520image%2520animation%2520task.%2520Although%2520existing%2520methods%2520are%2520capable%2520of%2520generating%2520high-fidelity%2520and%2520time-consistent%2520animation%2520sequences%2520in%2520regular%2520motions%2520and%2520static%2520scenes.%2520However%2520there%2520are%2520still%2520obvious%2520limitations%2520when%2520facing%2520complex%2520human%2520body%2520m {"title": "ReLaGS: Relational Language Gaussian Splatting", "author": "Yaxu Xie and Abdalla Arafa and Alireza Javanmardi and Christen Millerdurai and Jia Cheng Hu and Shaoxiang Wang and Alain Pagani and Didier Stricker", "abstract": "Achieving unified 3D perception and reasoning across tasks such as segmentation, retrieval, and relation understanding remains challenging, as existing methods are either object-centric or rely on costly training for inter-object reasoning. We present a novel framework that constructs a hierarchical language-distilled Gaussian scene and its 3D semantic scene graph without scene-specific training. A Gaussian pruning mechanism refines scene geometry, while a robust multi-view language alignment strategy aggregates noisy 2D features into accurate 3D object embeddings. On top of this hierarchy, we build an open-vocabulary 3D scene graph with Vision Language derived annotations and Graph Neural Network-based relational reasoning. Our approach enables efficient and scalable open-vocabulary 3D reasoning by jointly modeling hierarchical semantics and inter/intra-object relationships, validated across tasks including open-vocabulary segmentation, scene graph generation, and relation-guided retrieval. Project page: https://dfki-av.github.io/ReLaGS/", "link": "http://arxiv.org/abs/2603.17605v1", "date": "2026-03-18", "relevancy": 3.1931, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.7026}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6082}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.605}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ReLaGS%3A%20Relational%20Language%20Gaussian%20Splatting&body= {"title": "Event-Driven Video Generation", "author": "Chika Maduabuchi", "abstract": "State-of-the-art text-to-video models often look realistic frame-by-frame yet fail on simple interactions: motion starts before contact, actions are not realized, objects drift after placement, and support relations break. We argue this stems from frame-first denoising, which updates latent state everywhere at every step without an explicit notion of when and where an interaction is active. We introduce Event-Driven Video Generation (EVD), a minimal DiT-compatible framework that makes sampling event-grounded: a lightweight event head predicts token-aligned event activity, event-grounded losses couple activity to state change during training, and event-gated sampling (with hysteresis and early-step scheduling) suppresses spurious updates while concentrating updates during interactions. On EVD-Bench, EVD consistently improves human preference and VBench dynamics, substantially reducing failure modes in state persistence, spatial accuracy, support relations, and contact stability without sacrificing appearance. These results indicate that explicit event grounding is a practical abstraction for reducing interaction hallucinations in video generation.", "link": "http://arxiv.org/abs/2603.13402v2", "date": "2026-03-18", "relevancy": 3.1706, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.6448}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6403}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6172}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Event-Driven%20Video%20Generation&body=Title%3A%20Event-Driven%20Video%20Generation%0AAuthor%3A%20Chika%20Maduabuchi%0AAbstract%3A%20State- ot%2520realized%252C%2520objects%2520drift%2520after%2520placement%252C%2520and%2520support%2520relations%2520break.%2520We%2520argue%2520this%2520stems%2520from%2520frame-first%2520denoising%252C%2520which%2520updates%2520latent%2520state%2520everywhere%2520at%2520every%2520step%2520without%2520an%2520explicit%2520notion%2520of%2520when%2520and%2520where%2520an%2520interaction%2520is%2520active.%2520We%2520introduce%2520Event-Driven%2520Video%2520Generation%2520%2528EVD%2529%252C%2520a%2520minimal%2520DiT-compatible%2520framework%2520that%2520makes%2520sampling%2520event-grounded%253A%2520a%2520lightweight%2520event%2520head%2520predicts%2520token-aligned%2520event%2520activity%252C%2520event-grounded%2520losses%2520couple%2520activity%2520to%2520state%2520change%2520during%2520training%252C%2520and%2520event-gated%2520sampling%2520%2528with%2520hysteresis%2520and%2520early-step%2520scheduling%2529%2520suppresses%2520spurious%2520updates%2520while%2520concentrating%2520updates%2520during%2520interactions.%2520On%2520EVD-Bench%252C%2520EVD%2520consistently%2520improves%2520human%2520preference%2520and%2520VBench%2520dynamics%252C%2520substantially%2520reducing%2520failure%2520modes%2520in%2520state%2520persistence%252C%2520spatial%2520accuracy%252C%2520support%2520relations%252C%2520and%2520contact%2520stability%2520without%2520sacrificing%2520appearance.%2520These%2520results%2520indicate%2520that%2520explicit%2520event%2520grounding%2520is%2520a%2520practical%2520abstraction%2520for%2520reducing%2520interaction%2520hallucinations%2520in%2520video%2520generation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.13402v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Event-Driven%20Video%20Generation&entry.906535625=Chika%20Maduabuchi&entry.1292438233=State-of-the-art%20text-to-video%20models%20often%20look%20realistic%20frame-by-frame%20yet%20fail%20on%20simple%20interactions%3A%20motion%20starts%20before%20contact%2C%20actions%20are%20not%20realized%2C%20objects%20drift%20after%20placement%2C%20and%20support%20relations%20break.%20We%20argue%20this%20stems%20from%20frame-first%20denoising%2C%20which%20updates%20latent%20state%20everywhere%20at%20every%20step%20without%20an%20explicit%20notion%20of%20when%20and%20where%20an%20interaction%20is%20active.%20We%20introduce%20Event-Driven%20Video%20Generation%20%28EVD%29%2C%20a%20minimal%20DiT-compatible%20framework%20that%20makes%20sampling%20event-grounded%3A%20a%20lightweight%20event%20head%20predicts%20token-aligned%20event%20activity%2C%20event-grounded%20losses%20couple%20activity%20to%20state%20change%20during%20training%2C%20and%20event-gated%20sampling%20%28with%20hysteresis%20and%20early-step%20scheduling%29%20suppresses%20spurious%20updates%20while%20concentrating%20updates%20during%20interactions.%20On%20EVD-Bench%2C%20EVD%20consistently%20improves%20human%20preference%20and%20VBench%20dynamics%2C%20substantially%20reducing%20failure%20modes%20in%20state%20persistence%2C%20spatial%20accuracy%2C%20support%20relations%2C%20and%20contact%20stability%20without%20sacrificing%20appearance.%20These%20results%20indicate%20that%20explicit%20event%20grounding%20is%20a%20practical%20abstraction%20for%20reducing%20interaction%20hallucinations%20in%20video%20generation.&entry.1838667208=http%3A//arxiv.org/abs/2603.13402v2&entry.124074799=Read"},
{"title": "PC-CrossDiff: Point-Cluster Dual-Level Cross-Modal Differential Attention for Unified 3D Referring and Segmentation", "author": "Wenbin Tan and Jiawen Lin and Fangyong Wang and Yuan Xie and Yong Xie and Yachao Zhang and Yanyun Qu", "abstract": "3D Visual Grounding (3DVG) aims to localize the referent of natural language referring expressions through two core tasks: Referring Expression Comprehension (3DREC) and Segmentation (3DRES). While existing methods achieve high accuracy in simple, single-object scenes, they suffer from severe performance degradation in complex, multi-object scenes that are common in real-world settings, hindering practical deployment. Existing methods face two key challenges in complex, multi-object scenes: inadequate parsing of implicit localization cues critical for disambiguating visually similar objects, and ineffective suppression of dynamic spatial interference from co-occurring objects, resulting in degraded grounding accuracy. To address these challenges, we propose PC-CrossDiff, a unified dual-task framework with a dual-level cross-modal differential attention architecture for 3DREC and 3DRES. Specifically, the framework introduces: (i) Point-Level Differential Attention (PLDA) modules that apply bidirectional differential attention between text and point clouds, adaptively extracting implicit localization cues via learnable weights to improve discriminative representation; (ii) Cluster-Level Differential Attention (CLDA) modules that establish a hierarchical attention mechanism to adaptively enhance localization-relevant spatial relationships while suppressing ambiguous or irrelevant spatial relations through a localization-aware differential attention block. Our method achieves state-of-the-art performance on the ScanRefer, NR3D, and SR3D benchmarks. Notably, on the Implicit subsets of ScanRefer, it improves the Overall@0.50 score by +10.16% for the 3DREC task, highlighting its strong ability to parse implicit spatial cues.", "link": "http://arxiv.org/abs/2603.17753v1", "date": "2026-03-18", "relevancy": 3.1616, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6737}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6135}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6099}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PC-CrossDiff%3A%20Point-Cluster%20Dual-Level%20Cross-Modal%20Differential%20Attention%20for%20Unified%203D%20Referring%20and%20Segmentation&body=Title%3A%20PC-CrossDiff%3A%20Point-Cluster%20Dual-Level%20Cross-Modal%20Differential%20Attention%20for%20Unified%203D%20Referring%20and%20Segmentation%0AAuthor%3A%20Wenbin%20Tan%20and%20Jiawen%20Lin%20and%20Fangyong%20Wang%20and%20Yuan%20Xie%20and%20Yong%20Xie%20and%20Yachao%20Zhang%20and%20Yanyun%20Qu%0AAbstract%3A%203D%20Visual%20Grounding%20%283DVG%29%20aims%20to%20localize%20the%20referent%20of%20natural%20language%20referring%20expressions%20through%20two%20core%20tasks%3A%20Referring%20Expression%20Comprehension%20%283DREC%29%20and%20Segmentation%20%283DRES%29.%20While%20existing%20methods%20achieve%20high%20accuracy%20in%20simple%2C%20single-object%20scenes%2C%20they%20suffer%20from%20severe%20performance%20degradation%20in%20complex%2C%20multi-object%20scenes%20that%20are%20common%20in%20real-world%20settings%2C%20hindering%20practical%20deployment.%20Existing%20methods%20face%20two%20key%20challenges%20in%20complex%2C%20multi-object%20scenes%3A%20inadequate%20parsing%20of%20implicit%20localization%20cues%20critical%20for%20disambiguating%20visually%20similar%20objects%2C%20and%20ineffective%20suppression%20of%20dynamic%20spatial%20interference%20from%20co-occurring%20objects%2C%20resulting%20in%20degraded%20grounding%20accuracy.%20To%20address%20these%20challenges%2C%20we%20propose%20PC-CrossDiff%2C%20a%20unified%20dual-task%20framework%20with%20a%20dual-level%20cross-modal%20differential%20attention%20architecture%20for%203DREC%20and%203DRES.%20Specifically%2C%20the%20framework%20introduces%3A%20%28i%29%20Point-Level%20Differential%20Attention%20%28PLDA%29%20modules%20that%20apply%20bidirectional%20differential%20attention%20between%20text%20and%20point%20clouds%2C%20adaptively%20extracting%20implicit%20localization%20cues%20via%20learnable%20weights%20to%20improve%20discriminative%20representation%3B%20%28ii%29%20Cluster-Level%20Differential%20Attention%20%28CLDA%29%20modules%20that%20establish%20a%20hierarchical%20attention%20mechanism%20to%20adaptively%20enhance%20localization-relevant%20spatial%20relationships%20while%20suppressing%20ambiguous%20or%20irrelevant%20spatial%20relations%20through%20a%20localization-aware%20differential%20attention%20block.%20Our%20method%20achieves%20state-of-the-art%20performance%20on%20the%20ScanRefer%2C%20NR3D%2C%20and%20SR3D%20benchmarks.%20Notably%2C%20on%20the%20Implicit%20subsets%20of%20ScanRefer%2C%20it%20improves%20the%20Overall%400.50%20score%20by%20%2B10.16%25%20for%20the%203DREC%20task%2C%20highlighting%20its%20strong%20ability%20to%20parse%20implicit%20spatial%20cues.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17753v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPC-CrossDiff%253A%2520Point-Cluster%2520Dual-Level%2520Cross-Modal%2520Differential%2520Attention%2520for%2520Unified%25203D%2520Referring%2520and%2520Segmentation%26entry.906535625%3DWenbin%2520Tan%2520and%2520Jiawen%2520Lin%2520and%2520Fangyong%2520Wang%2520and%2520Yuan%2520Xie%2520and%2520Yong%2520Xie%2520and%2520Yachao%2520Zhang%2520and%2520Yanyun%2520Qu%26entry.1292438233%3D3D%2520Visual%2520Grounding%2520%25283DVG%2529%2520aim {"title": "S-VGGT: Structure-Aware Subscene Decomposition for Scalable 3D Foundation Models", "author": "Xinze Li and Pengxu Chen and Yiyuan Wang and Weifeng Su and Wentao Cheng", "abstract": "Feed-forward 3D foundation models face a key challenge: the quadratic computational cost introduced by global attention, which severely limits scalability as input length increases. Concurrent acceleration methods, such as token merging, operate at the token level. While they offer local savings, the required nearest-neighbor searches introduce undesirable overhead. Consequently, these techniques fail to tackle the fundamental issue of structural redundancy dominant in dense capture data. In this work, we introduce \\textbf{S-VGGT}, a novel approach that addresses redundancy at the structural frame level, drastically shifting the optimization focus. We first leverage the initial features to build a dense scene graph, which characterizes structural scene redundancy and guides the subsequent scene partitioning. Using this graph, we softly assign frames to a small number of subscenes, guaranteeing balanced groups and smooth geometric transitions. The core innovation lies in designing the subscenes to share a common reference frame, establishing a parallel geometric bridge that enables independent and highly efficient processing without explicit geometric alignment. This structural reorganization provides strong intrinsic acceleration by cutting the global attention cost at its source. Crucially, S-VGGT is entirely orthogonal to token-level acceleration methods, allowing the two to be seamlessly combined for compounded speedups without compromising reconstruction fidelity. Code is available at https://github.com/Powertony102/S-VGGT.", "link": "http://arxiv.org/abs/2603.17625v1", "date": "2026-03-18", "relevancy": 3.1454, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6357}, novation%20lies%20in%20designing%20the%20subscenes%20to%20share%20a%20common%20reference%20frame%2C%20establishing%20a%20parallel%20geometric%20bridge%20that%20enables%20independent%20and%20highly%20efficient%20processing%20without%20explicit%20geometric%20alignment.%20This%20structural%20reorganization%20provides%20strong%20intrinsic%20acceleration%20by%20cutting%20the%20global%20attention%20cost%20at%20its%20source.%20Crucially%2C%20S-VGGT%20is%20entirely%20orthogonal%20to%20token-level%20acceleration%20methods%2C%20allowing%20the%20two%20to%20be%20seamlessly%20combined%20for%20compounded%20speedups%20without%20compromising%20reconstruction%20fidelity.%20Code%20is%20available%20at%20https%3A//github.com/Powertony102/S-VGGT.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17625v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DS-VGGT%253A%2520Structure-Aware%2520Subscene%2520Decomposition%2520for%2520Scalable%25203D%2520Foundation%2520Models%26entry.906535625%3DXinze%2520Li%2520and%2520Pengxu%2520Chen%2520and%2520Yiyuan%2520Wang%2520and%2520Weifeng%2520Su%2520and%2520Wentao%2520Cheng%26entry.1292438233%3DFeed-forward%25203D%2520foundation%2520models%2520face%2520a%2520key%2520challenge%253A%2520the%2520quadratic%2520computational%2520cost%2520introduced%2520by%2520global%2520attention%252C%2520which%2520severely%2520limits%2520scalability%2520as%2520input%2520length%2520increases.%2520Concurrent%2520acceleration%2520methods%252C%2520such%2520as%2520token%2520merging%252C%2520operate%2520at%2520the%2520token%2520level.%2520While%2520they%2520offer%2520local%2520savings%252C%2520the%2520required%2520nearest-neighbor%2520searches%2520introduce%2520undesirable%2520overhead.%2520Consequently%252C%2520these%2520techniques%2520fail%2520to%2520tackle%2520the%2520fundamental%2520issue%2520of%2520structural%2520redundancy%2520dominant%2520in%2520dense%2520capture%2520data.%2520In%2520this%2520work {"title": "Omni-3DEdit: Generalized Versatile 3D Editing in One-Pass", "author": "Chen Liyi and Wang Pengfei and Zhang Guowen and Ma Zhiyuan and Zhang Lei", "abstract": "Most instruction-driven 3D editing methods rely on 2D models to guide the explicit and iterative optimization of 3D representations. This paradigm, however, suffers from two primary drawbacks. First, it lacks a universal design of different 3D editing tasks because the explicit manipulation of 3D geometry necessitates task-dependent rules, e.g., 3D appearance editing demands inherent source 3D geometry, while 3D removal alters source geometry. Second, the iterative optimization process is highly time-consuming, often requiring thousands of invocations of 2D/3D updating. We present Omni-3DEdit, a unified, learning-based model that generalizes various 3D editing tasks implicitly. One key challenge to achieve our goal is the scarcity of paired source-edited multi-view assets for training. To address this issue, we construct a data pipeline, synthesizing a relatively rich number of high-quality paired multi-view editing samples. Subsequently, we adapt the pre-trained generative model SEVA as our backbone by concatenating source view latents along with conditional tokens in sequence space. A dual-stream LoRA module is proposed to disentangle different view cues, largely enhancing our model's representational learning capability. As a learning-based model, our model is free of the time-consuming online optimization, and it can complete various 3D editing tasks in one forward pass, reducing the inference time from tens of minutes to approximately two minutes. Extensive experiments demonstrate the effectiveness and efficiency of Omni-3DEdit.", "link": "http://arxiv.org/abs/2603.17841v1", "date": "2026-03-18", "relevancy": 3.0505, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6195}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6195}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5912}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Omni-3DEdit%3A%20Generalized%20Versatile%203D%20Editing%20in%20One-Pass&body=Title%3A%20Omni-3DEdit%3A%20Generalized%20Versatile%203D%20Editing%20in%20One-Pass%0AAuthor%3A%20Chen%20Liyi%20and%20Wang%20Pengfei%20and%20Zhang%20Guowen%20and%20Ma%20Zhiyuan%20and%20Zhang%20Lei%0AAbstract%3A%20Most%20instruction-driven%203D%20editing%20methods%20rely%20on%202D%20models%20to%20guide%20the%20explicit%20and%20iterative%20optimization%20of%203D%20representations.%20This%20paradigm%2C%20however%2C%20suffers%20from%20two%20primary%20drawbacks.%20First%2C%20it%20lacks%20a%20universal%20design%20of%20different%203D%20editing%20tasks%20because%20the%20explicit%20manipulation%20of%203D%20geometry%20necessitates%20task-dependent%20rules%2C%20e.g.%2C%203D%20appearance%20editing%20demands%20inherent%20source%203D%20geometry%2C%20while%203D%20removal%20alters%20source%20geometry.%20Second%2C%20the%20iterative%20optimization%20process%20is%20highly%20time-consuming%2C%20often%20requiring%20thousands%20of%20invocations%20of%202D/3D%20updating.%20We%20present%20Omni-3DEdit%2C%20a%20unified%2C%20learning-based%20model%20that%20generalizes%20various%203D%20editing%20tasks%20implicitly.%20One%20key%20challenge%20to%20achieve%20our%20goal%20is%20the%20scarcity%20of%20paired%20source-edited%20multi-view%20assets%20for%20training.%20To%20address%20this%20issue%2C%20we%20construct%20a%20data%20pipeline%2C%20synthesizing%20a%20relatively%20rich%20number%20of%20high-quality%20paired%20multi-view%20editing%20samples.%20Subsequently%2C%20we%20adapt%20the%20pre-trained%20generative%20model%20SEVA%20as%20our%20backbone%20by%20concatenating%20source%20view%20latents%20along%20with%20conditional%20tokens%20in%20sequence%20space.%20A%20dual-stream%20LoRA%20module%20is%20proposed%20to%20disentangle%20different%20view%20cues%2C%20largely%20enhancing%20our%20model%27s%20representational%20learning%20capability.%20As%20a%20learning-based%20model%2C%20our%20model%20is%20free%20of%20the%20time-consuming%20online%20optimization%2C%20and%20it%20can%20complete%20various%203D%20editing%20tasks%20in%20one%20forward%20pass%2C%20reducing%20the%20inference%20time%20from%20tens%20of%20minutes%20to%20approximately%20two%20minutes.%20Extensive%20experiments%20demonstrate%20the%20effectiveness%20and%20efficiency%20of%20Omni-3DEdit.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17841v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOmni-3DEdit%253A%2520Generalized%2520Versatile%25203D%2520Editing%2520in%2520One-Pass%26entry.906535625%3DChen%2520Liyi%2520and%2520Wang%2520Pengfei%2520and%2520Zhang%2520Guowen%2520and%2520Ma%2520Zhiyuan%2520and%2520Zhang%2520Lei%26entry.1292438233%3DMost%2520instruction-driven%25203D%2520editing%2520methods%2520rely%2520on%25202D%2520models%2520to%2520guide%2520the%2520explicit%2520and%2520iterative%2520optimization%2520of%25203D%2520representations.%2520This%2520paradigm%252C%2520however%252C%2520suffers%2520from%2520two%2520primary%2520drawbacks.%2520First%252C%2520it%2520lacks%2520a%2520universal%2520design%2520of%2520different%25203D%2520editing%2520tasks%2520because%2520the%2520explicit%2520manipulation%2520of%25203D%2520geometry%2520necessitates%2520task-dependent%2520rules%252C%2520e.g.%252C%25203D%2520appearance%2520editing%2520demands%2520inherent%2520source%25203D%2520geometry%252C%2520while%25203D%2520removal%2520alters%2520source%2520geometry.%2520Second%252C%2520the%2520iterative%2520optimization%2520process%2520is%2520highly%2520time-consuming%252C%2520often%2520requiring%2520thousands%2520of%2520invocations%2520of%2520 {"title": "Training-free Detection of Generated Videos via Spatial-Temporal Likelihoods", "author": "Omer Ben Hayun and Roy Betser and Meir Yossef Levi and Levi Kassel and Guy Gilboa", "abstract": "Following major advances in text and image generation, the video domain has surged, producing highly realistic and controllable sequences. Along with this progress, these models also raise serious concerns about misinformation, making reliable detection of synthetic videos increasingly crucial. Image-based detectors are fundamentally limited because they operate per frame and ignore temporal dynamics, while supervised video detectors generalize poorly to unseen generators, a critical drawback given the rapid emergence of new models. These challenges motivate zero-shot approaches, which avoid synthetic data and instead score content against real-data statistics, enabling training-free, model-agnostic detection. We introduce STALL, a simple, training-free, theoretically justified detector that provides likelihood-based scoring for videos, jointly modeling spatial and temporal evidence within a probabilistic framework. We evaluate STALL on two public benchmarks and introduce ComGenVid, a new benchmark with state-of-the-art generative models. STALL consistently outperforms prior image- and video-based baselines. Code and data are available at https://omerbenhayun.github.io/stall-video.", "link": "http://arxiv.org/abs/2603.15026v2", "date": "2026-03-18", "relevancy": 2.9759, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.6075}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.595}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5831}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Training-free%20Detection%20of%20Generated%20Videos%20via%20Spatial-Temporal%20Likelihoods&body=Title%3A%20Training-free%20Detection%20of%20Generated%20Videos%20via%20Spatial-Temporal%20Likelihoods%0AAuthor%3A%20Omer%20Ben%20Hayun%20and%20Roy%20Betser%20and%20Meir%20Yossef%20Levi%20and%20Levi%20Kassel%20and%20Guy%20Gilboa%0AAbstract%3A%20Following%20major%20advances%20in%20text%20and%20image%20generation%2C%20the%20video%20domain%20has%20surged%2C%20producing%20highly%20realistic%20and%20controllable%20sequences.%20Along%20with%20this%20progress%2C%20these%20models%20also%20raise%20serious%20concerns%20about%20misinformation%2C%20making%20reliable%20detection%20of%20synthetic%20videos%20increasingly%20crucial.%20Image-based%20detectors%20are%20fundamentally%20limited%20because%20they%20operate%20per%20frame%20and%20ignore%20temporal%20dynamics%2C%20while%20supervised%20video%20detectors%20generalize%20poorly%20to%20unseen%20generators%2C%20a%20critical%20drawback%20given%20the%20rapid%20emergence%20of%20new%20models.%20These%20challenges%20motivate%20zero-shot%20approaches%2C%20which%20avoid%20synthetic%20data%20and%20instead%20score%20content%20against%20real-data%20statistics%2C%20enabling%20training-free%2C%20model-agnostic%20detection.%20We%20introduce%20STALL%2C%20a%20simple%2C%20training-free%2C%20theoretically%20justified%20detector%20that%20provides%20likelihood-based%20scoring%20for%20videos%2C%20jointly%20modeling%20spatial%20and%20temporal%20evidence%20within%20a%20probabilistic%20framework.%20We%20evaluate%20STALL%20on%20two%20public%20benchmarks%20and%20introduce%20ComGenVid%2C%20a%20new%20benchmark%20with%20state-of-the-art%20generative%20models.%20STALL%20consistently%20outperforms%20prior%20image-%20and%20video-based%20baselines.%20Code%20and%20data%20are%20available%20at%20https%3A//omerbenhayun.github.io/stall-video.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15026v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9Bur {"title": "Eye image segmentation using visual and concept prompts with Segment Anything Model 3 (SAM3)", "author": "Diederick C. Niehorster and Marcus Nystr\u00f6m", "abstract": "Previous work has reported that vision foundation models show promising zero-shot performance in eye image segmentation. Here we examine whether the latest iteration of the Segment Anything Model, SAM3, offers better eye image segmentation performance than SAM2, and explore the performance of its new concept (text) prompting mode. Eye image segmentation performance was evaluated using diverse datasets encompassing both high-resolution high-quality videos from a lab environment and the TEyeD dataset consisting of challenging eye videos acquired in the wild. Results show that in most cases SAM3 with either visual or concept prompts did not perform better than SAM2, for both lab and in-the-wild datasets. Since SAM2 not only performed better but was also faster, we conclude that SAM2 remains the best option for eye image segmentation. We provide our adaptation of SAM3's codebase that allows processing videos of arbitrary duration.", "link": "http://arxiv.org/abs/2603.17715v1", "date": "2026-03-18", "relevancy": 2.8737, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5797}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5797}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5649}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Eye%20image%20segmentation%20using%20visual%20and%20concept%20prompts%20with%20Segment%20Anything%20Model%203%20%28SAM3%29&body=Title%3A%20Eye%20image%20segmentation%20using%20visual%20and%20concept%20prompts%20with%20Segment%20Anything%20 ine%2520whether%2520the%2520latest%2520iteration%2520of%2520the%2520Segment%2520Anything%2520Model%252C%2520SAM3%252C%2520offers%2520better%2520eye%2520image%2520segmentation%2520performance%2520than%2520SAM2%252C%2520and%2520explore%2520the%2520performance%2520of%2520its%2520new%2520concept%2520%2528text%2529%2520prompting%2520mode.%2520Eye%2520image%2520segmentation%2520performance%2520was%2520evaluated%2520using%2520diverse%2520datasets%2520encompassing%2520both%2520high-resolution%2520high-quality%2520videos%2520from%2520a%2520lab%2520environment%2520and%2520the%2520TEyeD%2520dataset%2520consisting%2520of%2520challenging%2520eye%2520videos%2520acquired%2520in%2520the%2520wild.%2520Results%2520show%2520that%2520in%2520most%2520cases%2520SAM3%2520with%2520either%2520visual%2520or%2520concept%2520prompts%2520did%2520not%2520perform%2520better%2520than%2520SAM2%252C%2520for%2520both%2520lab%2520and%2520in-the-wild%2520datasets.%2520Since%2520SAM2%2520not%2520only%2520performed%2520better%2520but%2520was%2520also%2520faster%252C%2520we%2520conclude%2520that%2520SAM2%2520remains%2520the%2520best%2520option%2520for%2520eye%2520image%2520segmentation.%2520We%2520provide%2520our%2520adaptation%2520of%2520SAM3%2527s%2520codebase%2520that%2520allows%2520processing%2520videos%2520of%2520arbitrary%2520duration.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.17715v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Eye%20image%20segmentation%20using%20visual%20and%20concept%20prompts%20with%20Segment%20Anything%20Model%203%20%28SAM3%29&entry.906535625=Diederick%20C.%20Niehorster%20and%20Marcus%20Nystr%C3%B6m&entry.1292438233=Previous%20work%20has%20reported%20that%20vision%20foundation%20models%20show%20promising%20zero-shot%20performance%20in%20eye%20image%20segmentation.%20Here%20we%20examine%20whether%20the%20latest%20iteration%20of%20the%20Segment%20Anything%20Model% {"title": "ProGVC: Progressive-based Generative Video Compression via Auto-Regressive Context Modeling", "author": "Daowen Li and Ruixiao Dong and Ying Chen and Kai Li and Ding Ding and Li Li", "abstract": "Perceptual video compression leverages generative priors to reconstruct realistic textures and motions at low bitrates. However, existing perceptual codecs often lack native support for variable bitrate and progressive delivery, and their generative modules are weakly coupled with entropy coding, limiting bitrate reduction. Inspired by the next-scale prediction in the Visual Auto-Regressive (VAR) models, we propose ProGVC, a Progressive-based Generative Video Compression framework that unifies progressive transmission, efficient entropy coding, and detail synthesis within a single codec. ProGVC encodes videos into hierarchical multi-scale residual token maps, enabling flexible rate adaptation by transmitting a coarse-to-fine subset of scales in a progressive manner. A Transformer-based multi-scale autoregressive context model estimates token probabilities, utilized both for efficient entropy coding of the transmitted tokens and for predicting truncated fine-scale tokens at the decoder to restore perceptual details. Extensive experiments demonstrate that as a new coding paradigm, ProGVC delivers promising perceptual compression performance at low bitrates while offering practical scalability at the same time.", "link": "http://arxiv.org/abs/2603.17546v1", "date": "2026-03-18", "relevancy": 2.8732, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5836}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.58}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5603}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ProGVC%3A%20Progressive-based%20Generative%20Video%20Compression%20via%20Auto-Regressive%20Context%20Modeling&body=Title%3A%20ProGVC%3A%20Progressive-based%20Generative%20Video%20Compression%20via%20Auto-Regressive%20Context%20Modeling%0AAuthor%3A%20Daowen%20Li%20and%20Ruixiao%20Dong%20and%20Ying%20Chen%20and%20Kai%20Li%20and%20Ding%20Ding%20and%20Li%20Li%0AAbstract%3A%20Perceptual%20video%20compression%20leverages%20generative%20priors%20to%20reconstruct%20realistic%20textures%20and%20motions%20at%20low%20bitrates.%20However%2C%20existing%20perceptual%20codecs%20often%20lack%20native%20support%20for%20variable%20bitrate%20and%20progressive%20delivery%2C%20and%20their%20generative%20modules%20are%20weakly%20coupled%20with%20entropy%20coding%2C%20limiting%20bitrate%20reduction.%20Inspired%20by%20the%20next-scale%20prediction%20in%20the%20Visual%20Auto-Regressive%20%28VAR%29%20models%2C%20we%20propose%20ProGVC%2C%20a%20Progressive-based%20Generative%20Video%20Compression%20framework%20that%20unifies%20progressive%20transmission%2C%20efficient%20entropy%20coding%2C%20and%20detail%20synthesis%20within%20a%20single%20codec.%20ProGVC%20encodes%20videos%20into%20hierarchical%20multi-scale%20residual%20token%20maps%2C%20enabling%20flexible%20rate%20adaptation%20by%20transmitting%20a%20coarse-to-fine%20subset%20of%20scales%20in%20a%20progressive%20manner.%20A%20Transformer-based%20multi-scale%20autoregressive%20context%20model%20estimates%20token%20probabilities%2C%20utilized%20both%20for%20efficient%20entropy%20coding%20of%20the%20transmitted%20tokens%20and%20for%20predicting%20truncated%20fine-scale%20tokens%20at%20the%20decoder%20to%20restore%20perceptual%20details.%20Extensive%20experiments%20demonstrate%20that%20as%20a%20new%20coding%20paradigm%2C%20ProGVC%20delivers%20promising%20perceptual%20compression%20performance%20at%20low%20bitrates%20while%20offering%20practical%20scalability%20at%20the%20same%20time.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17546v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DProGVC%253A%2520Progressive-based%2520Generative%2520Video%2520Compression%2520via%2520Auto-Regressive%2520Context%2520Modeling%26entry.906535625%3DDaowen%2520Li%2520and%2520Ruixiao%2520Dong%2520and%2520Ying%2520Chen%2520and%2520Kai%2520Li%2520and%2520Ding%2520Ding%2520and%2520Li%2520Li%26entry.1292438233%3DPerceptual%2520video%2520compression%2520leverages%2520generative%2520priors%2520to%2520reconstruct%2520realistic%2520textures%2520and%2520motions%2520at%2520low%2520bitrates.%2520However%252C%2520existing%2520perceptual%2520codecs%2520often%2520lack%2520native%2520support%2520for%2520variable%2520bitrate%2520and%2520progressive%2520delivery%252C%2520and%2520their%2520generative%2520modules%2520are%2520weakly%2520coupled%2520with%2520entropy%2520coding%252C%2520limiting%2520bitrate%2520reduction.%2520Inspired%2520by%2520the%2520next-scale%2520prediction%2520in%2520the%2520Visual%2520Auto-Regressive%2520%2528VAR%2529%2520models%252C%2520we%2520propose%2520ProGVC%252C%2520a%2520Progressive-based%2520Generative%2520Video%2520Compression%2520framework%2520that%2520unifies%2520progressive%2520transmission%252C%2520efficient%2520entropy%2520coding%252C%2520and%2520detail%2520synthesis%2520within%2520a%2520single%2520codec.%2520ProGVC%2520encodes%2520videos%2520into%2520hierarchical%2520multi-scale%2520residual%2520token%2520maps%252C%2520enabling%2520flexible%2520rate%2520adaptation%2520by%2520transmitting%2520a%2520coarse-to-fine%2520subset%2520of%2520scales%2520in%2520a%2520progressive%2520manner.%2520A%2520Transformer-based%2520multi-scale%2520autoregressive%2520context%2520model%2520estimates%2520token%2520probabilities%252C%2520utilized%2520both%2520for%2520efficient%2520entropy%2520coding%2520of%2520the%2520transmitted%2520tokens%2520and%2520for%2520predicting%2520truncated%2520fine-scale%2520tokens%2520at%2520the%2520decoder%2520to%2520restore%2520perceptual%2520details.%2520Extensive%2520experiments%2520demonstrate%2520that%2520as%2520a%2520new%2520coding%2520paradigm%252C%2520ProGVC%2520delivers%2520promising%2520perceptual%2520compression%2520performance%2520at%2520low%2520bitrates%2520while%2520offering%2520practical%2520scalability%2520at%2520the%2520same%2520time.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.17546v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ProGVC%3A%20Progressive-based%20Generative%20Video%20Compression%20via%20Auto-Regressive%20Context%20Modeling&entry.906535625=Daowen%20Li%20and%20Ruixiao%20Dong%20and%20Ying%20Chen%20and%20Kai%20Li%20and%20Ding%20Ding%20and%20Li%20Li&entry.1292438233=Perceptual%20video%20compression%20leverages%20generative%20priors%20to%20reconstruct%20realistic%20textures%20and%20motions%20at%20low%20bitrates.%20However%2C%20existing%20perceptual%20codecs%20often%20lack%20native%20support%20for%20variable%20bitrate%20and%20progressive%20delivery%2C%20and%20their%20generative%20modules%20are%20weakly%20coupled%20with%20entropy%20coding%2C%20limiting%20bitrate%20reduction.%20Inspired%20by%20the%20next-scale%20prediction%20in%20the%20Visual%20Auto-Regressive%20%28VAR%29%20models%2C%20we%20propose%20ProGVC%2C%20a%20Progressive-based%20Generative%20Video%20Compression%20framework%20that%20unifies%20progressive%20transmission%2C%20efficient%20entropy%20coding%2C%20and%20detail%20synthesis%20within%20a%20single%20codec.%20ProGVC%20encodes%20videos%20into%20hierarchical%20multi-scale%20residual%20token%20maps%2C%20enabling%20flexible%20rate%20adaptation%20by%20transmitting%20a%20coarse-to-fine%20subset%20of%20scales%20in%20a%20progressive%20manner.%20A%20Transformer-based%20multi-scale%20autoregressive%20context%20model%20estimates%20token%20probabilities%2C%20utilized%20both%20for%20efficient {"title": "M2P: Improving Visual Foundation Models with Mask-to-Point Weakly-Supervised Learning for Dense Point Tracking", "author": "Qiangqiang Wu and Tianyu Yang and Bo Fang and Jia Wan and Matias Di Martino and Guillermo Sapiro and Antoni B. Chan", "abstract": "Tracking Any Point (TAP) has emerged as a fundamental tool for video understanding. Current approaches adapt Vision Foundation Models (VFMs) like DINOv2 via offline finetuning or test-time optimization. However, these VFMs rely on static image pre-training, which is inherently sub-optimal for capturing dense temporal correspondence in videos. To address this, we propose Mask-to-Point (M2P) learning, which leverages rich video object segmentation (VOS) mask annotations to improve VFMs for dense point tracking. Our M2P introduces three new mask-based constraints for weakly-supervised representation learning. First, we propose a local structure consistency loss, which leverages Procrustes analysis to model the cohesive motion of points lying within a local structure, achieving more reliable point-to-point matching learning. Second, we propose a mask label consistency (MLC) loss, which enforces that sampled foreground points strictly match foreground regions across frames. The proposed MLC loss can be regarded as a regularization, which stabilizes training and prevents convergence to trivial solutions. Finally, mask boundary constrain is applied to explicitly supervise boundary points. We show that our weaklysupervised M2P models significantly outperform baseline VFMs with efficient training by using only 3.6K VOS training videos. Notably, M2P achieves 12.8% and 14.6% performance gains over DINOv2-B/14 and DINOv3-B/16 on the TAP-Vid-DAVIS benchmark, respectively. Moreover, the proposed M2P models are used as pre-trained backbones for both test-time optimized and offline fine-tuned TAP tasks, demonstrating its potential to serve as general pre-trained models for point tracking. Code will be made publicly available upon acceptance.", "link": "http://arxiv.org/abs/2603.17813v1", "date": "2026-03-18", "relevancy": 2.8718, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6074}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5685}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5472}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20M2P%3A%20Improving%20Visual%20Foundation%20Models%20with%20Mask-to-Point%20Weakly-Supervised%20Learning%20for%20Dense%20Point%20Tracking&body=Title%3A%20M2P%3A%20Improving%20Visual%20Foundation%20Models%20with%20Mask-to-Point%20Weakly-Supervised%20Learning%20for%20Dense%20Point%20Tracking%0AAuthor%3A%20Qiangqiang%20Wu%20and%20Tianyu%20Yang%20and%20Bo%20Fang%20and%20Jia%20Wan%20and%20Matias%20Di%20Martino%20and%20Guillermo%20Sapiro%20and%20Antoni%20B.%20Chan%0AAbstract%3A%20Tracking%20Any%20Point%20%28TAP%29%20has%20emerged%20as%20a%20fundamental%20tool%20for%20video%20understanding.%20Current%20approaches%20adapt%20Vision%20Foundation%20Models%20%28VFMs%29%20like%20DINOv2%20via%20offline%20finetuning%20or%20test-time%20optimization.%20However%2C%20these%20VFMs%20rely%20on%20static%20image%20pre-training%2C%20which%20is%20inherently%20sub-optimal%20for%20capturing%20dense%20temporal%20correspondence%20in%20videos.%20To%20address%20this%2C%20we%20propose%20Mask-to-Point%20%28M2P%29%20learning%2C%20which%20leverages%20rich%20video%20object%20segmentation%20%28VOS%29%20mask%20annotations%20to%20improve%20VFMs%20for%20dense%20point%20tracking.%20Our%20M2P%20introduces%20three%20new%20mask-based%20constraints%20for%20weakly-supervised%20representation%20learning.%20First%2C%20we%20propose%20a%20local%20structure%20consistency%20loss%2C%20which%20leverages%20Procrustes%20analysis%20to%20model%20the%20cohesive%20motion%20of%20points%20lying%20within%20a%20local%20structure%2C%20achieving%20more%20reliable%20point-to-point%20matching%20learning.%20Second%2C%20we%20propose%20a%20mask%20label%20consistency%20%28MLC%29%20loss%2C%20which%20enforces%20that%20sampled%20foreground%20points%20strictly%20match%20foreground%20regions%20across%20frames.%20The%20proposed%20MLC%20loss%20can%20be%20regarded%20as%20a%20regularization%2C%20which%20stabilizes%20training%20and%20prevents%20convergence%20to%20trivial%20solutions.%20Finally%2C%20mask%20boundary%20constrain%20is%20applied%20to%20explicitly%20supervise%20boundary%20points.%20We%20show%20that%20our%20weaklysupervised%20M2P%20models%20significantly%20outperform%20baseline%20VFMs%20with%20efficient%20training%20by%20using%20only%203.6K%20VOS%20training%20videos.%20Notably%2C%20M2P%20achieves%2012.8%25%20and%2014.6%25%20performance%20gains%20over%20DINOv2-B/14%20and%20DINOv3-B/16%20on%20the%20TAP-Vid-DAVIS%20benchmark%2C%20respectively.%20Moreover%2C%20the%20proposed%20M2P%20models%20are%20used%20as%20pre-trained%20backbones%20for%20both%20test-time%20optimized%20and%20offline%20fine-tuned%20TAP%20tasks%2C%20demonstrating%20its%20potential%20to%20serve%20as%20general%20pre-trained%20models%20for%20point%20tracking.%20Code%20will%20be%20made%20publicly%20available%20upon%20acceptance.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17813v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DM2P%253A%2520Improving%2520Visual%2520Foundation%2520Models%2520with%2520Mask-to-Point%2520Weakly-Supervised%2520Learning%2520for%2520Dense%2520Point%2520Tracking%26entry.906535625%3DQiangqiang%2520Wu%2520and%2520Tianyu%2520Yang%2520and%2520Bo%2520Fang%2520and%2520Jia%2520Wan%2520and%2520Matias%2520Di%2520Martino%2520and%2520Guillermo%2520Sapiro%2520an {"title": "Interpretable Cross-Domain Few-Shot Learning with Rectified Target-Domain Local Alignment", "author": "Yaze Zhao and Yixiong Zou and Yuhua Li and Ruixuan Li", "abstract": "Cross-Domain Few-Shot Learning (CDFSL) adapts models trained with large-scale general data (source domain) to downstream target domains with only scarce training data, where the research on vision-language models (e.g., CLIP) is still in the early stages. Typical downstream domains, such as medical diagnosis, require fine-grained visual cues for interpretable recognition, but we find that current fine-tuned CLIP models can hardly focus on these cues, albeit they can roughly focus on important regions in source domains. Although current works have demonstrated CLIP's shortcomings in capturing local subtle patterns, in this paper, we find that the domain gap and scarce training data further exacerbate such shortcomings, much more than that of holistic patterns, which we call the local misalignment problem in CLIP-based CDFSL. To address this problem, due to the lack of supervision in aligning local visual features and text semantics, we turn to self-supervision information. Inspired by the translation task, we propose the CC-CDFSL method with cycle consistency, which translates local visual features into text features and then translates them back into visual features (and vice versa), and constrains the original features close to the translated back features. To reduce the noise imported by richer information in the visual modality, we further propose a Semantic Anchor mechanism, which first augments visual features to provide a larger corpus for the text-to-image mapping, and then shrinks the image features to filter out irrelevant image-to-text mapping. Extensive experiments on various benchmarks, backbones, and fine-tuning methods show we can (1) effectively improve the local vision-language alignment, (2) enhance the interpretability of learned patterns and model decisions by visualizing patches, and (3) achieve state-of-the-art performance.", "link": "http://arxiv.org/abs/2603.17655v1", "date": "2026-03-18", "relevancy": 2.8322, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.598}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5698}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5315}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Interpretable%20Cross-Domain%20Few-Shot%20Learning%20with%20Rectified%20Target-Domain%20Local%20Alignment&body=Title%3A%20Interpretable%20Cross-Domain%20Few-Shot%20Learning%20with%20Rectified%20Target-Domain%20Local%20Alignment%0AAuthor%3A%20Yaze%20Zhao%20and%20Yixiong%20Zou%20and%20Yuhua%20Li%20and%20Ruixuan%20Li%0AAbstract%3A%20Cross-Domain%20Few-Shot%20Learning%20%28CDFSL%29%20adapts%20models%20trained%20with%20large-scale%20general%20data%20%28source%20domain%29%20to%20downstream%20target%20domains%20with%20only%20scarce%20training%20data%2C%20where%20the%20research%20on%20vision-language%20models%20%28e.g.%2C%20CLIP%29%20is%20still%20in%20the%20early%20stages.%20Typical%20downstream%20domains%2C%20such%20as%20medical%20diagnosis%2C%20require%20fine-grained%20visual%20cues%20for%20interpretable%20recognition%2C%20but%20we%20find%20that%20current%20fine-tuned%20CLIP%20models%20can%20hardly%20focus%20on%20these%20cues%2C%20albeit%20they%20can%20roughly%20focus%20on%20important%20regions%20in%20source%20domains.%20Although%20current%20works%20have%20demonstrated%20CLIP%27s%20shortcomings%20in%20capturing%20local%20subtle%20patterns%2C%20in%20this%20paper%2C%20we%20find%20that%20the%20domain%20gap%20and%20scarce%20training%20data%20further%20exacerbate%20such%20shortcomings%2C%20much%20more%20than%20that%20of%20holistic%20patterns%2C%20which%20we%20call%20the%20local%20misalignment%20problem%20in%20CLIP-based%20CDFSL.%20To%20address%20this%20problem%2C%20due%20to%20the%20lack%20of%20supervision%20in%20aligning%20local%20visual%20features%20and%20text%20semantics%2C%20we%20turn%20to%20self-supervision%20information.%20Inspired%20by%20the%20translation%20task%2C%20we%20propose%20the%20CC-CDFSL%20method%20with%20cycle%20consistency%2C%20which%20translates%20local%20visual%20features%20into%20text%20features%20and%20then%20translates%20them%20back%20into%20visual%20features%20%28and%20vice%20versa%29%2C%20and%20constrains%20the%20original%20features%20close%20to%20the%20translated%20back%20features.%20To%20reduce%20the%20noise%20imported%20by%20richer%20information%20in%20the%20visual%20modality%2C%20we%20further%20propose%20a%20Semantic%20Anchor%20mechanism%2C%20which%20first%20augments%20visual%20features%20to%20provide%20a%20larger%20corpus%20for%20the%20text-to-image%20mapping%2C%20and%20then%20shrinks%20the%20image%20features%20to%20filter%20out%20irrelevant%20image-to-text%20mapping.%20Extensive%20experiments%20on%20various%20benchmarks%2C%20backbones%2C%20and%20fine-tuning%20methods%20show%20we%20can%20%281%29%20effectively%20improve%20the%20local%20vision-language%20alignment%2C%20%282%29%20enhance%20the%20interpretability%20of%20learned%20patterns%20and%20model%20decisions%20by%20visualizing%20patches%2C%20and%20%283%29%20achieve%20state-of-the-art%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17655v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInterpretable%2520Cross-Domain%2520Few-Shot%2520Learning%2520with%2520Rectified%2520Target-Domain%2520Local%2520Alignment%26entry.906535625%3DYaze%2520Zhao%2520and%2520Yixiong%2520Zou%2520and%2520Yuhua%2520Li%2520and%2520Ruixuan%2520Li%26entry.1292438233%3DCross-Domain%2520Few-Shot%2520Learni iginal%2520features%2520close%2520to%2520the%2520translated%2520back%2520features.%2520To%2520reduce%2520the%2520noise%2520imported%2520by%2520richer%2520information%2520in%2520the%2520visual%2520modality%252C%2520we%2520further%2520propose%2520a%2520Semantic%2520Anchor%2520mechanism%252C%2520which%2520first%2520augments%2520visual%2520features%2520to%2520provide%2520a%2520larger%2520corpus%2520for%2520the%2520text-to-image%2520mapping%252C%2520and%2520then%2520shrinks%2520the%2520image%2520features%2520to%2520filter%2520out%2520irrelevant%2520image-to-text%2520mapping.%2520Extensive%2520experiments%2520on%2520various%2520benchmarks%252C%2520backbones%252C%2520and%2520fine-tuning%2520methods%2520show%2520we%2520can%2520%25281%2529%2520effectively%2520improve%2520the%2520local%2520vision-language%2520alignment%252C%2520%25282%2529%2520enhance%2520the%2520interpretability%2520of%2520learned%2520patterns%2520and%2520model%2520decisions%2520by%2520visualizing%2520patches%252C%2520and%2520%25283%2529%2520achieve%2520state-of-the-art%2520performance.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.17655v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Interpretable%20Cross-Domain%20Few-Shot%20Learning%20with%20Rectified%20Target-Domain%20Local%20Alignment&entry.906535625=Yaze%20Zhao%20and%20Yixiong%20Zou%20and%20Yuhua%20Li%20and%20Ruixuan%20Li&entry.1292438233=Cross-Domain%20Few-Shot%20Learning%20%28CDFSL%29%20adapts%20models%20trained%20with%20large-scale%20general%20data%20%28source%20domain%29%20to%20downstream%20target%20domains%20with%20only%20scarce%20training%20data%2C%20where%20the%20research%20on%20vision-language%20models%20%28e.g.%2C%20CLIP%29%20is%20still%20in%20the%20early%20stages.%20Typical%20downstream%20domains%2C%20such%20as%20medical%20diagnosis%2C%20require%20fine-grained%20visual%20cues%20for%20interpretable%20recognition%2C%20but%20we%20find%20that%20current%20fine-tuned%20CLIP%20models%20can%20hardly%20focus%20on%20these%20cues%2C%20albeit%20they%20can%20roughly%20focus%20on%20important%20regions%20in%20source%20domains.%20Although%20current%20works%20have%20demonstrated%20CLIP%27s%20shortcomings%20in%20capturing%20local%20subtle%20patterns%2C%20in%20this%20paper%2C%20we%20find%20that%20the%20domain%20gap%20and%20scarce%20training%20data%20further%20exacerbate%20such%20shortcomings%2C%20much%20more%20than%20that%20of%20holistic%20patterns%2C%20which%20we%20call%20the%20local%20misalignment%20problem%20in%20CLIP-based%20CDFSL.%20To%20address%20this%20problem%2C%20due%20to%20the%20lack%20of%20supervision%20in%20aligning%20local%20visual%20features%20and%20text%20semantics%2C%20we%20turn%20to%20self-supervision%20information.%20Inspired%20by%20the%20translation%20task%2C%20we%20propose%20the%20CC-CDFSL%20method%20with%20cycle%20consistency%2C%20which%20translates%20local%20visual%20features%20into%20text%20features%20and%20then%20translates%20them%20back%20into%20visual%20features%20%28and%20vice%20versa%29%2C%20and%20constrains%20the%20original%20features%20close%20to%20the%20translated%20back%20features.%20To%20reduce%20the%20noise%20imported%20by%20richer%20information%20in%20the%20visual%20modality%2C%20we%20further%20propose%20a%20Semantic%20Anchor%20mechanism%2C%20which%20first%20augments%20visual%20features%20to%20provide%20a%20larger%20corpus%20for%20the%20text-to-image%20mapping%2C%20and%20then%20shrinks%20the%20image%20features%20to%20filter%20out%20irrelevant%20image-to-text%20mapping.%20Extensive%20experiments%20on%20various%20benchmarks%2C%20backbones%2C%20and%20fine-tuning%20methods%20show%20we%20can%20%281%29%20effectively%20improve%20the%20local%20vision-language%20alignment%2C%20%282%29%20enhance%20the%20interpretability%20of%20learned%20patterns%20and%20model%20decisions%20by%20visualizing%20patches%2C%20and%20%283%29%20achieve%20state-of-the-art%20performance.&entry.1838667208=http%3A//a {"title": "LoST: Level of Semantics Tokenization for 3D Shapes", "author": "Niladri Shekhar Dutt and Zifan Shi and Paul Guerrero and Chun-Hao Paul Huang and Duygu Ceylan and Niloy J. Mitra and Xuelin Chen", "abstract": "Tokenization is a fundamental technique in the generative modeling of various modalities. In particular, it plays a critical role in autoregressive (AR) models, which have recently emerged as a compelling option for 3D generation. However, optimal tokenization of 3D shapes remains an open question. State-of-the-art (SOTA) methods primarily rely on geometric level-of-detail (LoD) hierarchies, originally designed for rendering and compression. These spatial hierarchies are often token-inefficient and lack semantic coherence for AR modeling. We propose Level-of-Semantics Tokenization (LoST), which orders tokens by semantic salience, such that early prefixes decode into complete, plausible shapes that possess principal semantics, while subsequent tokens refine instance-specific geometric and semantic details. To train LoST, we introduce Relational Inter-Distance Alignment (RIDA), a novel 3D semantic alignment loss that aligns the relational structure of the 3D shape latent space with that of the semantic DINO feature space. Experiments show that LoST achieves SOTA reconstruction, surpassing previous LoD-based 3D shape tokenizers by large margins on both geometric and semantic reconstruction metrics. Moreover, LoST achieves efficient, high-quality AR 3D generation and enables downstream tasks like semantic retrieval, while using only 0.1%-10% of the tokens needed by prior AR models.", "link": "http://arxiv.org/abs/2603.17995v1", "date": "2026-03-18", "relevancy": 2.793, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5699}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5529}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5529}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LoST%3A%20Level%20of%20Semantics%20Tokenization%20for%203D%20Shapes&body=Title%3A%20LoST%3A%20Level%20of%20Semantics%20Tokenization%20for%203D%20Shapes%0AAuthor%3A%20Niladri%20Shekhar%20Dutt%20and%20Zifan%20Shi%20and%20Paul%20Guerrero%20and%20Chun-Hao%20Paul%20Huang%20and%20Duygu%20Ceylan%20and%20Niloy%20J.%20Mitra%20and%20Xuelin%20Chen%0AAbstract%3A%20Tokenization%20is%20a%20fundamental%20technique%20in%20the%20generative%20modeling%20of%20various%20modalities.%20In%20particular%2C%20it%20plays%20a%20critical%20role%20in%20autoregressive%20%28AR%29%20models%2C%20which%20have%20recently%20emerged%20as%20a%20compelling%20option%20for%203D%20generation.%20However%2C%20optimal%20tokenization%20of%203D%20shapes%20remains%20an%20open%20question.%20State-of-the-art%20%28SOTA%29%20methods%20primarily%20rely%20on%20geometric%20level-of-detail%20%28LoD%29%20hierarchies%2C%20originally%20designed%20for%20rendering%20and%20compression.%20These%20spatial%20hierarchies%20are%20often%20token-inefficient%20and%20lack%20semantic%20coherence%20for%20AR%20modeling.%20We%20propose%20Level-of-Semantics%20Tokenization%20%28LoST%29%2C%20which%20orders%20tokens%20by%20semantic%20salience%2C%20such%20that%20early%20prefixes%20decode%20into%20complete%2C%20plausible%20shapes%20that%20possess%20principal%20semantics%2C%20while%20subsequent%20tokens%20refine%20instance-specific%20geometric%20and%20semantic%20details.%20To%20train%20LoST%2C%20we%20introduce%20Relational%20Inter-Distance%20Alignment%20%28RIDA%29%2C%20a%20novel%203D%20semantic%20alignment%20loss%20that%20aligns%20the%20relational%20structure%20of%20the%203D%20shape%20latent%20space%20with%20that%20of%20the%20semantic%20DINO%20feature%20space.%20Experiments%20show%20that%20LoST%20achieves%20SOTA%20reconstruction%2C%20surpassing%20previous%20LoD-based%203D%20shape%20tokenizers%20by%20large%20margins%20on%20both%20geometric%20and%20semantic%20reconstruction%20metrics.%20Moreover%2C%20LoST%20achieves%20efficient%2C%20high-quality%20AR%203D%20generation%20and%20enables%20downstream%20tasks%20like%20semantic%20retrieval%2C%20while%20using%20only%200.1%25-10%25%20of%20the%20tokens%20needed%20by%20prior%20AR%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17995v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLoST%253A%2520Level%2520of%2520Semantics%2520Tokenization%2520for%25203D%2520Shapes%26entry.906535625%3DNiladri%2520Shekhar%2520Dutt%2520and%2520Zifan%2520Shi%2520and%2520Paul%2520Guerrero%2520and%2520Chun-Hao%2520Paul%2520Huang%2520and%2520Duygu%2520Ceylan%2520and%2520Niloy%2520J.%2520Mitra%2520and%2520Xuelin%2520Chen%26entry.1292438233%3DTokenization%2520is%2520a%2520fundamental%2520technique%2520in%2520the%2520generative%2520modeling%2520of%2520various%2520modalities.%2520In%2520particular%252C%2520it%2520plays%2520a%2520critical%2520role%2520in%2520autoregressive%2520%2528AR%2529%2520models%252C%2520which%2520have%2520recently%2520emerged%2520as%2520a%2520compelling%2520option%2520for%25203D%2520generation.%2520However%252C%2520optimal%2520tokenization%2520of%25203D%2520shapes%2520remains%2520an%2520open%2520question.%2520State-of-the-art%2520%2528SOTA%2529%2520methods%2520primarily%2520rely%2520on%2520geometric%2520level-of-detail%2520%2528LoD%2529%2520hierarchies%252C%2520originally%2520designed%2520for%2520rendering%2520and%2520compression.%2520These%2520spatial%2520hierarchies%2520are%2520often%2520token-inefficient%2520and%2520lack%2520semantic%2520coherence%2520for%2520AR%2520modeling.%2520We%2520propose%2520Level-of-Semantics%2520Tokenization%2520%2528LoST%2529%252C%2520which%2520orders%2520tokens%2520by%2520semantic%2520salience%252C%252

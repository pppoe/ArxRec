ve%20visual%20modality.%20At%20its%20core%20is%20DrAction%2C%20a%20differentiable%2C%20format-agnostic%20renderer%20that%20converts%20skeletal%20kinematics%20into%20compact%20image%20sequences.%20Because%20the%20pipeline%20is%20end-to-end%20differentiable%2C%20MLLM%20gradients%20can%20directly%20guide%20the%20rendering%20to%20produce%20task-informative%20visual%20tokens.%20To%20further%20enhance%20reasoning%20capabilities%2C%20we%20introduce%20a%20cooperative%20training%20strategy%3A%20Causal%20Reasoning%20Distillation%20transfers%20structured%2C%20step-by-step%20reasoning%20from%20a%20teacher%20model%2C%20while%20Discriminative%20Finetuning%20sharpens%20decision%20boundaries%20between%20confusable%20actions.%20SkeletonLLM%20demonstrates%20strong%20generalization%20on%20diverse%20tasks%20including%20recognition%2C%20captioning%2C%20reasoning%2C%20and%20cross-format%20transfer%20--%20suggesting%20a%20viable%20path%20for%20applying%20MLLMs%20to%20non-native%20modalities.%20Code%20will%20be%20released%20upon%20acceptance.&entry.1838667208=http%3A//arxiv.org/abs/2603.18003v1&entry.124074799=Read"},
{"title": "EVA: Aligning Video World Models with Executable Robot Actions via Inverse Dynamics Rewards", "author": "Ruixiang Wang and Qingming Liu and Yueci Deng and Guiliang Liu and Zhen Liu and Kui Jia", "abstract": "Video generative models are increasingly used as world models for robotics, where a model generates a future visual rollout conditioned on the current observation and task instruction, and an inverse dynamics model (IDM) converts the generated frames into executable robot actions. However, current video world models lack explicit executability constraints. As a result, visually coherent rollouts may still violate rigid-body and kinematic consistency, producing unstable or infeasible control commands when decoded by an IDM. We refer to this mismatch between visual generation and physically executable control as the executability gap. While this gap can be mitigated at inference time using techniques such as rejection sampling, such approaches are inefficient due to the high cost of video generation. In this paper, we leverage the executability gap as a training signal and introduce Executable Video Alignment (EVA), a reinforcement-learning post-training framework for aligning video world models. EVA trains an inverse dynamics model on real robot trajectories and repurposes it as a reward model that evaluates generated videos through the action sequences they induce, encouraging smooth motions measured by velocity, acceleration, and jerk while penalizing actions that violate embodiment constraints. Importantly, the reward remains informative even when generated videos contain severe visual artifacts, since such artifacts typically translate into unstable or out-of-bound actions. Experiments on the RoboTwin benchmark and a real bimanual robot show that EVA reduces embodiment-specific artifacts in generated rollouts and improves downstream task execution success.", "link": "http://arxiv.org/abs/2603.17808v1", "date": "2026-03-18", "relevancy": 2.2348, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5694}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5517}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5508}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EVA%3A%20Aligning%20Video%20World%20Models%20with%20Executable%20Robot%20Actions%20via%20Inverse%20Dynamics%20Rewards&body=Title%3A%20EVA%3A%20Aligning%20Video%20World%20Models%20with%20Executable%20Robot%20Actions%20via%20Inverse%20Dynamics%20Rewards%0AAuthor%3A%20Ruixiang%20Wang%20and%20Qingming%20Liu%20and%20Yueci%20Deng%20and%20Guiliang%20Liu%20and%20Zhen%20Liu%20and%20Kui%20Jia%0AAbstract%3A%20Video%20generative%20models%20are%20increasingly%20used%20as%20world%20models%20for%20robotics%2C%20where%20a%20model%20generates%20a%20future%20visual%20rollout%20conditioned%20on%20the%20current%20observation%20and%20task%20instruction%2C%20and%20an%20inverse%20dynamics%20model%20%28IDM%29%20converts%20the%20generated%20frames%20into%20executable%20robot%20actions.%20However%2C%20current%20video%20world%20models%20lack%20explicit%20executability%20constraints.%20As%20a%20result%2C%20visually%20coherent%20rollouts%20may%20still%20violate%20rigid-body%20and%20kinematic%20consistency%2C%20producing%20unstable%20or%20infeasible%20control%20commands%20when%20decoded%20by%20an%20IDM.%20We%20refer%20to%20this%20mismatch%20between%20visual%20generation%20and%20physically%20executable%20control%20as%20the%20executability%20gap.%20While%20this%20gap%20can%20be%20mitigated%20at%20inference%20time%20using%20techniques%20such%20as%20rejection%20sampling%2C%20such%20approaches%20are%20inefficient%20due%20to%20the%20high%20cost%20of%20video%20generation.%20In%20this%20paper%2C%20we%20leverage%20the%20executability%20gap%20as%20a%20training%20signal%20and%20introduce%20Executable%20Video%20Alignment%20%28EVA%29%2C%20a%20reinforcement-learning%20post-training%20framework%20for%20aligning%20video%20world%20models.%20EVA%20trains%20an%20inverse%20dynamics%20model%20on%20real%20robot%20trajectories%20and%20repurposes%20it%20as%20a%20reward%20model%20that%20evaluates%20generated%20videos%20through%20the%20action%20sequences%20they%20induce%2C%20encouraging%20smooth%20motions%20measured%20by%20velocity%2C%20acceleration%2C%20and%20jerk%20while%20penalizing%20actions%20that%20violate%20embodiment%20constraints.%20Importantly%2C%20the%20reward%20remains%20informative%20even%20when%20generated%20videos%20contain%20severe%20visual%20artifacts%2C%20since%20such%20artifacts%20typically%20translate%20into%20unstable%20or%20out-of-bound%20actions.%20Experiments%20on%20the%20RoboTwin%20benchmark%20and%20a%20real%20bimanual%20robot%20show%20that%20EVA%20reduces%20embodiment-specific%20artifacts%20in%20generated%20rollouts%20and%20improves%20downstream%20task%20execution%20success.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17808v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEVA%253A%2520Aligning%2520Video%2520World%2520Models%2520with%2520Executable%2520Robot%2520Actions%2520via%2520Inverse%2520Dynamics%2520Rewards%26entry.906535625%3DRuixiang%2520Wang%2520and%2520Qingming%2520Liu%2520and%2520Yueci%2520Deng%2520and%2520Guiliang%2520Liu%2520and%2520Zhen%2520Liu%2520and%2520Kui%2520Jia%26entry.1292438233%3DVideo%2520generative%2520models%2520are%2520increasingly%2520used%2520as%2520world%2520models%2520for%2520robotics%252C%2520where%2520a%2520model%2520generates%2520a%2520future%2520visual%2520rollout%2520conditioned%2520on%2520the%2520current%2520observation%2520and%2520task%2520instruction%252C%2520and%2520an%2520inverse%2520dynamics%2520model%2520%2528IDM%2529%2520convert 2520out-of-bound%2520actions.%2520Experiments%2520on%2520the%2520RoboTwin%2520benchmark%2520and%2520a%2520real%2520bimanual%2520robot%2520show%2520that%2520EVA%2520reduces%2520embodiment-specific%2520artifacts%2520in%2520generated%2520rollouts%2520and%2520improves%2520downstream%2520task%2520execution%2520success.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.17808v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=EVA%3A%20Aligning%20Video%20World%20Models%20with%20Executable%20Robot%20Actions%20via%20Inverse%20Dynamics%20Rewards&entry.906535625=Ruixiang%20Wang%20and%20Qingming%20Liu%20and%20Yueci%20Deng%20and%20Guiliang%20Liu%20and%20Zhen%20Liu%20and%20Kui%20Jia&entry.1292438233=Video%20generative%20models%20are%20increasingly%20used%20as%20world%20models%20for%20robotics%2C%20where%20a%20model%20generates%20a%20future%20visual%20rollout%20conditioned%20on%20the%20current%20observation%20and%20task%20instruction%2C%20and%20an%20inverse%20dynamics%20model%20%28IDM%29%20converts%20the%20generated%20frames%20into%20executable%20robot%20actions.%20However%2C%20current%20video%20world%20models%20lack%20explicit%20executability%20constraints.%20As%20a%20result%2C%20visually%20coherent%20rollouts%20may%20still%20violate%20rigid-body%20and%20kinematic%20consistency%2C%20producing%20unstable%20or%20infeasible%20control%20commands%20when%20decoded%20by%20an%20IDM.%20We%20refer%20to%20this%20mismatch%20between%20visual%20generation%20and%20physically%20executable%20control%20as%20the%20executability%20gap.%20While%20this%20gap%20can%20be%20mitigated%20at%20inference%20time%20using%20techniques%20such%20as%20rejection%20sampling%2C%20such%20approaches%20are%20inefficient%20due%20to%20the%20high%20cost%20of%20video%20generation.%20In%20this%20paper%2C%20we%20leverage%20the%20executability%20gap%20as%20a%20training%20signal%20and%20introduce%20Executable%20Video%20Alignm {"title": "Differential Attention-Augmented BiomedCLIP with Asymmetric Focal Optimization for Imbalanced Multi-Label Video Capsule Endoscopy Classification", "author": "Podakanti Satyajith Chary and Nagarajan Ganapathy", "abstract": "This work presents a multi-label classification framework for video capsule endoscopy (VCE) that addresses the extreme class imbalance inherent in the Galar dataset through a combination of architectural and optimization-level strategies. Our approach modifies BiomedCLIP, a biomedical vision-language foundation model, by replacing its standard multi-head self-attention with a differential attention mechanism that computes the difference between two softmax attention maps to suppress attention noise. To counteract the skewed label distribution, where pathological findings constitute less than 0.1% of all annotated frames, a sqrt-frequency weighted sampler, asymmetric focal loss, mixup regularization, and per-class threshold optimization are employed. Temporal coherence is enforced through median-filter smoothing and gap merging prior to event-level JSON generation. On the held-out RARE-VISION test set comprising three NaviCam examinations (161,025 frames), the pipeline achieves an overall temporal mAP@0.5 of 0.2456 and mAP@0.95 of 0.2353, with total inference completed in approximately 8.6 minutes on a single GPU.", "link": "http://arxiv.org/abs/2603.17879v1", "date": "2026-03-18", "relevancy": 2.2302, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5643}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5628}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5276}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Differential%20Attention-Augmented%20BiomedCLIP%20with%20Asymmetric%20Focal%20Optimization%20for%20Imbalanced%20Multi-Label%20Video%20Capsule%20Endoscopy%20Classification&body=Title%3A%20Differential%20Attention-Augmented%20BiomedCLIP%20with%20Asymmetric%20Focal%20Optimization%20for%20Imbalanced%20Multi-Label%20Video%20Capsule%20Endoscopy%20Classification%0AAuthor%3A%20Podakanti%20Satyajith%20Chary%20and%20Nagarajan%20Ganapathy%0AAbstract%3A%20This%20work%20presents%20a%20multi-label%20classification%20framework%20for%20video%20capsule%20endoscopy%20%28VCE%29%20that%20addresses%20the%20extreme%20class%20imbalance%20inherent%20in%20the%20Galar%20dataset%20through%20a%20combination%20of%20architectural%20and%20optimization-level%20strategies.%20Our%20approach%20modifies%20BiomedCLIP%2C%20a%20biomedical%20vision-language%20foundation%20model%2C%20by%20replacing%20its%20standard%20multi-head%20self-attention%20with%20a%20differential%20attention%20mechanism%20that%20computes%20the%20difference%20between%20two%20softmax%20attention%20maps%20to%20suppress%20attention%20noise.%20To%20counteract%20the%20skewed%20label%20distribution%2C%20where%20pathological%20findings%20constitute%20less%20than%200.1%25%20of%20all%20annotated%20frames%2C%20a%20sqrt-frequency%20weighted%20sampler%2C%20asymmetric%20focal%20loss%2C%20mixup%20regularization%2C%20and%20per-class%20threshold%20optimization%20are%20employed.%20Temporal%20coherence%20is%20enforced%20through%20median-filter%20smoothing%20and%20gap%20merging%20prior%20to%20event-level%20JSON%20generation.%20On%20the%20held-out%20RARE-VISION%20test%20set%20comprising%20three%20NaviCam%20examinations%20%28161%2C025%20frames%29%2C%20the%20pipeline%20achieves%20an%20overall%20temporal%20mAP%400.5%20of%200.2456%20and%20mAP%400.95%20of%200.2353%2C%20with%20total%20inference%20completed%20in%20approximately%208.6%20minutes%20on%20a%20single%20GPU.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17879v1%0AForm%3A%20https%3A//doc 20mAP%25400.5%2520of%25200.2456%2520and%2520mAP%25400.95%2520of%25200.2353%252C%2520with%2520total%2520inference%2520completed%2520in%2520approximately%25208.6%2520minutes%2520on%2520a%2520single%2520GPU.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.17879v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Differential%20Attention-Augmented%20BiomedCLIP%20with%20Asymmetric%20Focal%20Optimization%20for%20Imbalanced%20Multi-Label%20Video%20Capsule%20Endoscopy%20Classification&entry.906535625=Podakanti%20Satyajith%20Chary%20and%20Nagarajan%20Ganapathy&entry.1292438233=This%20work%20presents%20a%20multi-label%20classification%20framework%20for%20video%20capsule%20endoscopy%20%28VCE%29%20that%20addresses%20the%20extreme%20class%20imbalance%20inherent%20in%20the%20Galar%20dataset%20through%20a%20combination%20of%20architectural%20and%20optimization-level%20strategies.%20Our%20approach%20modifies%20BiomedCLIP%2C%20a%20biomedical%20vision-language%20foundation%20model%2C%20by%20replacing%20its%20standard%20multi-head%20self-attention%20with%20a%20differential%20attention%20mechanism%20that%20computes%20the%20difference%20between%20two%20softmax%20attention%20maps%20to%20suppress%20attention%20noise.%20To%20counteract%20the%20skewed%20label%20distribution%2C%20where%20pathological%20findings%20constitute%20less%20than%200.1%25%20of%20all%20annotated%20frames%2C%20a%20sqrt-frequency%20weighted%20sampler%2C%20asymmetric%20focal%20loss%2C%20mixup%20regularization%2C%20and%20per-class%20threshold%20optimization%20are%20employed.%20Temporal%20coherence%20is%20enforced%20through%20median-filter%20smoothing%20and%20gap%20merging%20prior%20to%20event-level%20JSON%20generation.%20On%20the%20held-out%20RARE-VISION%20test%20set%20comprising%20three%20NaviCam%20examinations%20%28161%2C025%20frames%29%2C%20the%20pipeline%20achieves%20an%20overall%20temporal%20mAP%400.5%20of%200.24 {"title": "HeiSD: Hybrid Speculative Decoding for Embodied Vision-Language-Action Models with Kinematic Awareness", "author": "Zihao Zheng and Zhihao Mao and Sicheng Tian and Maoliang Li and Jiayu Chen and Xinhao Sun and Zhaobo Zhang and Xuanzhe Liu and Donggang Cao and Hong Mei and Xiang Chen", "abstract": "Vision-Language-Action (VLA) Models have become the mainstream solution for robot control, but suffer from slow inference speeds. Speculative Decoding (SD) is a promising acceleration method which can be divided into two categories: drafter-based SD and retrieval-based SD. Existing methods fail to analyze the advantages and disadvantages of these two types of SD in VLA models, leading to their sole application or optimization. In this paper, we analyze the trajectory patterns of robots controlled by the VLA model and derive a key insight: the two types of SD should be used in a hybrid manner. However, achieving hybrid SD in VLA models poses several challenges: (1) draft rejection and persistent errors in retrieval-based SD; (2) difficulty in determining the hybrid boundary. To address these, we propose the HeiSD framework. We propose a retrieval-based SD optimization method in HeiSD,which contains a verify-skip mechanism and a sequence-wise relaxed acceptance strategy. Moreover, we proposed a kinematic-based fused metric in HeiSD to automatically determine the hybrid boundary. Experimental results demonstrate that HeiSD attains a speedup of up to 2.45x in simulation benchmarks and 2.06x~2.41x in real-world scenarios, while sustaining a high task success rate.", "link": "http://arxiv.org/abs/2603.17573v1", "date": "2026-03-18", "relevancy": 2.2209, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5792}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/a %2Cwhich%20contains%20a%20verify-skip%20mechanism%20and%20a%20sequence-wise%20relaxed%20acceptance%20strategy.%20Moreover%2C%20we%20proposed%20a%20kinematic-based%20fused%20metric%20in%20HeiSD%20to%20automatically%20determine%20the%20hybrid%20boundary.%20Experimental%20results%20demonstrate%20that%20HeiSD%20attains%20a%20speedup%20of%20up%20to%202.45x%20in%20simulation%20benchmarks%20and%202.06x~2.41x%20in%20real-world%20scenarios%2C%20while%20sustaining%20a%20high%20task%20success%20rate.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17573v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHeiSD%253A%2520Hybrid%2520Speculative%2520Decoding%2520for%2520Embodied%2520Vision-Language-Action%2520Models%2520with%2520Kinematic%2520Awareness%26entry.906535625%3DZihao%2520Zheng%2520and%2520Zhihao%2520Mao%2520and%2520Sicheng%2520Tian%2520and%2520Maoliang%2520Li%2520and%2520Jiayu%2520Chen%2520and%2520Xinhao%2520Sun%2520and%2520Zhaobo%2520Zhang%2520and%2520Xuanzhe%2520Liu%2520and%2520Donggang%2520Cao%2520and%2520Hong%2520Mei%2520and%2520Xiang%2520Chen%26entry.1292438233%3DVision-Language-Action%2520%2528VLA%2529%2520Models%2520have%2520become%2520the%2520mainstream%2520solution%2520for%2520robot%2520control%252C%2520but%2520suffer%2520from%2520slow%2520inference%2520speeds.%2520Speculative%2520Decoding%2520%2528SD%2529%2520is%2520a%2520promising%2520acceleration%2520method%2520which%2520can%2520be%2520divided%2520into%2520two%2520categories%253A%2520drafter-based%2520SD%2520and%2520retrieval-based%2520SD.%2520Existing%2520methods%2520fail%2520to%2520analyze%2520the%2520advantages%2520and%2520disadvantages%2520of%2520these%2520two%2520types%2520of%2520SD%2520in%2520VLA%2520models%252C%2520leading%2520to%2520their%2520sole%2520application%2520or%2520optimization.%2520In%2520this%2520paper%252C%2520we%2520analyze%2520the%2520trajectory%2520patterns%2520of%2520robots%2520controlled%2520by%2520the%2520V {"title": "SemanticFace: Semantic Facial Action Estimation via Semantic Distillation in Interpretable Space", "author": "Zejian Kang and Kai Zheng and Yuanchen Fei and Wentao Yang and Hongyuan Zou and Xiangru Huang", "abstract": "Facial action estimation from a single image is often formulated as predicting or fitting parameters in compact expression spaces, which lack explicit semantic interpretability. However, many practical applications, such as avatar control and human-computer interaction, require interpretable facial actions that correspond to meaningful muscle movements. In this work, we propose SemanticFace, a framework for facial action estimation in the interpretable ARKit blendshape space that reformulates coefficient prediction as structured semantic reasoning. SemanticFace adopts a two-stage semantic distillation paradigm: it first derives structured semantic supervision from ground-truth ARKit coefficients and then distills this knowledge into a multimodal large language model to predict interpretable facial action coefficients from images. Extensive experiments demonstrate that language-aligned semantic supervision improves both coefficient accuracy and perceptual consistency, while enabling strong cross-identity generalization and robustness to large domain shifts, including cartoon faces.", "link": "http://arxiv.org/abs/2603.14827v2", "date": "2026-03-18", "relevancy": 2.2154, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5678}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5654}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5352}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SemanticFace%3A%20Semantic%20Facial%20Action% {"title": "Unified Spatio-Temporal Token Scoring for Efficient Video VLMs", "author": "Jianrui Zhang and Yue Yang and Rohun Tripathi and Winson Han and Ranjay Krishna and Christopher Clark and Yong Jae Lee and Sangho Lee", "abstract": "Token pruning is essential for enhancing the computational efficiency of vision-language models (VLMs), particularly for video-based tasks where temporal redundancy is prevalent. Prior approaches typically prune tokens either (1) within the vision transformer (ViT) exclusively for unimodal perception tasks such as action recognition and object segmentation, without adapting to downstream vision-language tasks; or (2) only within the LLM while leaving the ViT output intact, often requiring complex text-conditioned token selection mechanisms. In this paper, we introduce Spatio-Temporal Token Scoring (STTS), a simple and lightweight module that prunes vision tokens across both the ViT and the LLM without text conditioning or token merging, and is fully compatible with end-to-end training. By learning how to score temporally via an auxiliary loss and spatially via LLM downstream gradients, aided by our efficient packing algorithm, STTS prunes 50% of vision tokens throughout the entire architecture, resulting in a 62% improvement in efficiency during both training and inference with only a 0.7% drop in average performance across 13 short and long video QA tasks. Efficiency gains increase with more sampled frames per video. Applying test-time scaling for long-video QA further yields performance gains of 0.5-1% compared to the baseline. Overall, STTS represents a novel, simple yet effective technique for unified, architecture-wide vision token pruning.", "link": "http://arxiv.org/abs/2603.18004v1", "date": "2026-03-18", "relevancy": 2.2129, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5857}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5332}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5288}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unified%20Spatio-Temporal%20Token%20Scoring%20for%20Efficient%20Video%20VLMs&body=Title%3A%20Unified%20Spatio-Temporal%20Token%20Scoring%20for%20Efficient%20Video%20VLMs%0AAuthor%3A%20Jianrui%20Zhang%20and%20Yue%20Yang%20and%20Rohun%20Tripathi%20and%20Winson%20Han%20and%20Ranjay%20Krishna%20and%20Christopher%20Clark%20and%20Yong%20Jae%20Lee%20and%20Sangho%20Lee%0AAbstract%3A%20Token%20pruning%20is%20essential%20for%20enhancing%20the%20computational%20efficiency%20of%20vision-language%20models%20%28VLMs%29%2C%20particularly%20for%20video-based%20tasks%20where%20temporal%20redundancy%20is%20prevalent.%20Prior%20approaches%20typically%20prune%20tokens%20either%20%281%29%20within%20the%20vision%20transformer%20%28ViT%29%20exclusively%20for%20unimodal%20perception%20tasks%20such%20as%20action%20recognition%20and%20object%20segmentation%2C%20without%20adapting%20to%20downstream%20vision-language%20tasks%3B%20or%20%282%29%20only%20within%20the%20LLM%20while%20leaving%20the%20ViT%20output%20intact%2C%20often%20requiring%20complex%20text-conditioned%20token%20selection%20mechanisms.%20In%20this%20paper%2C%20we%20introduce%20Spatio-Temporal%20Token%20Scoring%20%28STTS%29%2C%20a%20simple%20and%20lightweight%20module%20that%20prunes%20vision%20tokens%20across%20both%20the%20ViT%20and%20the%20LLM%20without%20text%20conditioning%20or%20token%20merging%2C%20and%20is%20fully%20compatible%20with%20end-to-end%20training.%20By%20learning%20how%20to%20score%20temporally%20via%20an%20auxiliary%20loss%20and%20spatially%20via%20LLM%20downstream%20gradients%2C%20aided%20by%20our%20efficient%20packing%20algorithm%2C%20STTS%20prunes%2050%25%20of%20vision%20tokens%20throughout%20the%20entire%20architecture%2C%20resulting%20in%20a%2062%25%20improvement%20in%20efficiency%20during%20both%20training%20and%20inference%20with%20only%20a%200.7%25%20drop%20in%20average%20performance%20across%2013%20short%20and%20long%20video%20QA%20tasks.%20Efficiency%20gains%20increase%20with%20more%20sampled%20frames%20per%20video.%20Applying%20test-time%20scaling%20for%20long-video%20QA%20further%20yields%20performance%20gains%20of%200.5-1%25%20compared%20to%20the%20baseline.%20Overall%2C%20STTS%20represents%20a%20novel%2C%20simple%20yet%20effective%20technique%20for%20unified%2C%20architecture-wide%20vision%20token%20pruning.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18004v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnified%2520Spatio-Temporal%2520Token%2520Scoring%2520for%2520Efficient%2520Video%2520VLMs%26entry.906535625%3DJianrui%2520Zhang%2520and%2520Yue%2520Yang%2520and%2520Rohun%2520Tripathi%2520and%2520Winson%2520Han%2520and%2520Ranjay%2520Krishna%2520and%2520Christopher%2520Clark%2520and%2520Yong%2520Jae%2520Lee%2520and%2520Sangho%2520Lee%26entry.1292438233%3DToken%2520pruning%2520is%2520essential%2520for%2520enhancing%2520the%2520computational%2520efficiency%2520of%2520vision-language%2520models%2520%2528VLMs%2529%252C%2520particularly%2520for%2520video-based%2520tasks%2520where%2520temporal%2520redundancy%2520is%2520prevalent.%2520Prior%2520approaches%2520typically%2520prune%2520tokens%2520either%2520%25281%2529%2520within%2520the%2520vision%2520transformer%2520%2528ViT%2529%2520exclusively%2520for%2520unimodal%2520perception%2520tasks%2520such%2520as%2520action%2520recognition%2520and%2520object%2520segmentation%252C%2520without%2520adapting%2520to%2520downstream%2520vision-language%2520tasks%253B%2520or%2520%25282%2529%2520only%2520within%2520the%2520LLM%2520while%2520leaving%2520the%2520ViT%2520output% {"title": "Signal in the Noise: Polysemantic Interference Transfers and Predicts Cross-Model Influence", "author": "Bofan Gong and Shiyang Lai and James Evans and Dawn Song", "abstract": "Polysemanticity is pervasive in language models and remains a major challenge for interpretation and model behavioral control. Leveraging sparse autoencoders (SAEs), we map the polysemantic topology of two small models (Pythia-70M and GPT-2-Small) to identify SAE feature pairs that are semantically unrelated yet exhibit interference within models. We intervene at four foci (prompt, token, feature, neuron) and measure induced shifts in the next-token prediction distribution, uncovering polysemantic structures that expose a systematic vulnerability in these models. Critically, interventions distilled from counterintuitive interference patterns shared by two small models transfer reliably to larger instruction-tuned models (Llama-3.1-8B/70B-Instruct and Gemma-2-9B-Instruct), yielding predictable behavioral shifts without access to model internals. These findings challenge the view that polysemanticity is purely stochastic, demonstrating instead that interference structures generalize across scale and family. Such generalization suggests a convergent, higher-order organization of internal representations, which is only weakly aligned with intuition and structured by latent regularities, offering new possibilities for both black-box control and theoretical insight into human and artificial cognition.", "link": "http://arxiv.org/abs/2505.11611v3", "date": "2026-03-18", "relevancy": 2.2125, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5616}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5514}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5514}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Signal%20in%20the%20Noise%3A%20Polysemantic%20Interference%20Transfers%20and%20Predicts%20Cross-Model%20Influence&body=Title%3A%20Signal%20in%20the%20Noise%3A%20Polysemantic%20Interference%20Transfers%20and%20Predicts%20Cross-Model%20Influence%0AAuthor%3A%20Bofan%20Gong%20and%20Shiyang%20Lai%20and%20James%20Evans%20and%20Dawn%20Song%0AAbstract%3A%20Polysemanticity%20is%20pervasive%20in%20language%20models%20and%20remains%20a%20major%20challenge%20for%20interpretation%20and%20model%20behavioral%20control.%20Leveraging%20sparse%20autoencoders%20%28SAEs%29%2C%20we%20map%20the%20polysemantic%20topology%20of%20two%20small%20models%20%28Pythia-70M%20and%20GPT-2-Small%29%20to%20identify%20SAE%20feature%20pairs%20that%20are%20semantically%20unrelated%20yet%20exhibit%20interference%20within%20models.%20We%20intervene%20at%20four%20foci%20%28prompt%2C%20token%2C%20feature%2C%20neuron%29%20and%20measure%20induced%20shifts%20in%20the%20next-token%20prediction%20distribution%2C%20uncovering%20polysemantic%20structures%20that%20expose%20a%20systematic%20vulnerability%20in%20these%20models.%20Critically%2C%20interventions%20distilled%20from%20counterintuitive%20interference%20patterns%20shared%20by%20two%20small%20models%20transfer%20reliably%20to%20larger%20instruction-tuned%20models%20%28Llama-3.1-8B/70B-Instruct%20and%20Gemma-2-9B-Instruct%29%2C%20yielding%20predictable%20behavioral%20shifts%20without%20access%20to%20model%20internals.%20These%20findings%20challenge%20the%20view%20that%20polysemanticity%20is%20purely%20stochastic%2C%20demonstrating%20instead%20that%20interference%20structures%20generalize%20across%20scale%20and%20family.%20Such%20generalization%20suggests%20a%20convergent%2C%20higher-order%20organization%20of%20internal%20representations%2C%20which%20is%20only%20weakly%20aligned%20with%20intuition%20and%20structured%20by%20latent%20regularities%2C%20offering%20new%20possibilities%20for%20both%20black-box%20control%20and%20theoretical%20insight%20into%20human%20and%20artificial%20cognition.%0ALink%3A%20http%3A//arxiv.org/abs/2505.11611v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSignal%2520in%2520the%2520Noise%253A%2520Polysemantic%2520Interference%2520Transfers%2520and%2520Predicts%2520Cross-Model%2520Influence%26entry.906535625%3DBofan%2520Gong%2520and%2520Shiyang%2520Lai%2520and%2520James%2520Evans%2520and%2520Dawn%2520Song%26entry.1292438233%3DPolysemanticity%2520is%2520pervasive%2520in%2520language%2520models%2520and%2520remains%2520a%2520major%2520challenge%2520for%2520interpretation%2520and%2520model%2520behavioral%2520control.%2520Leveraging%2520sparse%2520autoencoders%2520%2528SAEs%2529%252C%2520we%2520map%2520the%2520polysemantic%2520topology%2520of%2520two%2520small%2520models%2520%2528Pythia-70M%2520and%2520GPT-2-Small%2529%2520to%2520identify%2520SAE%2520feature%2520pairs%2520that%2520are%2520semantically%2520unrelated%2520yet%2520exhibit%2520interference%2520within%2520models.%2520We%2520intervene%2520at%2520four%2520foci%2520%2528prompt%252C%2520token%252C%2520feature%252C%2520neuron%2529%2520and%2520measure%2520induced%2520shifts%2520in%2520the%2520next-token%2520prediction%2520distribution%252C%2520uncovering%2520polysemantic%2520structures%2520that%2520expose%2520a%2520systematic%2520vulnerability%2520in%2520these%2520models.%2520Critically%252C%2520interventions%2520distilled%2520from%2520counterintuitive%2520interference%2520patterns%2520shared%2520by%2520two%2520small%2520models%2520transfer%2520reliably%2520to%2520larger%2520instruction-tuned%2520models%2520%2528Llama-3.1-8B/70B-Instruct%2520and%2520Gemma-2-9B-Instruct%2529%252C%2520yielding%2520predictable%2520behavioral%2520shifts%2520without%2520access%2520to%2520model%252 {"title": "Frequency Autoregressive Image Generation with Continuous Tokens", "author": "Hu Yu and Hao Luo and Hangjie Yuan and Yu Rong and Jie Huang and Feng Zhao", "abstract": "Autoregressive (AR) models for image generation typically adopt a two-stage paradigm of vector quantization and raster-scan ``next-token prediction\", inspired by its great success in language modeling. However, due to the huge modality gap, image autoregressive models may require a systematic reevaluation from two perspectives: tokenizer format and regression direction. In this paper, we introduce the frequency progressive autoregressive (\\textbf{FAR}) paradigm and instantiate FAR with the continuous tokenizer. Specifically, we identify spectral dependency as the desirable regression direction for FAR, wherein higher-frequency components build upon the lower one to progressively construct a complete image. This design seamlessly fits the causality requirement for autoregressive models and preserves the unique spatial locality of image data. Besides, we delve into the integration of FAR and the continuous tokenizer, introducing a series of techniques to address optimization challenges and improve the efficiency of training and inference processes. We demonstrate the efficacy of FAR through comprehensive experiments on the ImageNet dataset and verify its potential on text-to-image generation.", "link": "http://arxiv.org/abs/2503.05305v2", "date": "2026-03-18", "relevancy": 2.2122, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5728}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5522}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5336}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Frequency%20Autoregressive%20Image%20Generation%20with%20Continuous%20Tokens&body=Title%3A%20Frequency%20Autoregressive%20Image%20Generation%20with%20Continuous%20Tokens%0AAuthor%3A%20Hu%20Yu%20and%20Hao%20Luo%20and%20Hangjie%20Yuan%20and%20Yu%20Rong%20and%20Jie%20Huang%20and%20Feng%20Zhao%0AAbstract%3A%20Autoregressive%20%28AR%29%20models%20for%20image%20generation%20typically%20adopt%20a%20two-stage%20paradigm%20of%20vector%20quantization%20and%20raster-scan%20%60%60next-token%20prediction%22%2C%20inspired%20by%20its%20great%20success%20in%20language%20modeling.%20However%2C%20due%20to%20the%20huge%20modality%20gap%2C%20image%20autoregressive%20models%20may%20require%20a%20systematic%20reevaluation%20from%20two%20perspectives%3A%20tokenizer%20format%20and%20regression%20direction.%20In%20this%20paper%2C%20we%20introduce%20the%20frequency%20progressive%20autoregressive%20%28%5Ctextbf%7BFAR%7D%29%20paradigm%20and%20instantiate%20FAR%20with%20the%20continuous%20tokenizer.%20Specifically%2C%20we%20identify%20spectral%20dependency%20as%20the%20desirable%20regression%20direction%20for%20FAR%2C%20wherein%20higher-frequency%20components%20build%20upon%20the%20lower%20one%20to%20progressively%20construct%20a%20complete%20image.%20This%20design%20seamlessly%20fits%20the%20causality%20requirement%20for%20autoregressive%20models%20and%20preserves%20the%20unique%20spatial%20locality%20of%20image%20data.%20Besides%2C%20we%20delve%20into%20the%20integration%20of%20FAR%20and%20the%20continuous%20tokenizer%2C%20introducing%20a%20series%20of%20techniques%20to%20address%20optimization%20challenges%20and%20improve%20the%20efficiency%20of%20training%20and%20inference%20processes.%20We%20demonstrate%20the%20efficacy%20of%20FAR%20through%20comprehensive%20experiments%20on%20the%20ImageNet%20dataset%20and%20verify%20its%20potential%20on%20text-to-image%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2503.05305v2%0AForm%3A%20https%3A//docs.google.com/forms ization%20challenges%20and%20improve%20the%20efficiency%20of%20training%20and%20inference%20processes.%20We%20demonstrate%20the%20efficacy%20of%20FAR%20through%20comprehensive%20experiments%20on%20the%20ImageNet%20dataset%20and%20verify%20its%20potential%20on%20text-to-image%20generation.&entry.1838667208=http%3A//arxiv.org/abs/2503.05305v2&entry.124074799=Read"},
{"title": "Diagonal Linear Networks and the Lasso Regularization Path", "author": "Rapha\u00ebl Berthier", "abstract": "Diagonal linear networks are neural networks with linear activation and diagonal weight matrices. Their theoretical interest is that their implicit regularization can be rigorously analyzed: from a small initialization, the training of diagonal linear networks converges to the linear predictor with minimal 1-norm among minimizers of the training loss. In this paper, we deepen this analysis showing that the full training trajectory of diagonal linear networks is closely related to the lasso regularization path. In this connection, the training time plays the role of an inverse regularization parameter. Both rigorous results and simulations are provided to illustrate this conclusion. Under a monotonicity assumption on the lasso regularization path, the connection is exact while in the general case, we show an approximate connection.", "link": "http://arxiv.org/abs/2509.18766v3", "date": "2026-03-18", "relevancy": 2.2092, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4639}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4418}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4199}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Diagonal%20Linear%20Networks%20and%20the%20Lasso%20Regularization%20Path&body=Title%3A%20Diagonal%20Linear%20Networks%20and%20the%20Lasso%20Regularization%20Path%0AAuthor%3A%20Rapha%C3%ABl%20Berthier%0AAbstract%3A%20Diagonal%20linear%20networks%20are%20neural%20networks%20with%20linear%20activation%20and%20diagonal%20weight%20matrices.%20Their%20theoretical%20interest%20is%20that%20their%20implicit%20regularization%20can%20be%20rigorously%20analyzed%3A%20from%20a%20small%20initialization%2C%20the%20training%20of%20diagonal%20linear%20networks%20converges%20to%20the%20linear%20predictor%20with%20minimal%201-norm%20among%20minimizers%20of%20the%20training%20loss.%20In%20this%20paper%2C%20we%20deepen%20this%20analysis%20showing%20that%20the%20full%20training%20trajectory%20of%20diagonal%20linear%20networks%20is%20closely%20related%20to%20the%20lasso%20regularization%20path.%20In%20this%20connection%2C%20the%20training%20time%20plays%20the%20role%20of%20an%20inverse%20regularization%20parameter.%20Both%20rigorous%20results%20and%20simulations%20are%20provided%20to%20illustrate%20this%20conclusion.%20Under%20a%20monotonicity%20assumption%20on%20the%20lasso%20regularization%20path%2C%20the%20connection%20is%20exact%20while%20in%20the%20general%20case%2C%20we%20show%20an%20approximate%20connection.%0ALink%3A%20http%3A//arxiv.org/abs/2509.18766v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDiagonal%2520Linear%2520Networks%2520and%2520the%2520Lasso%2520Regularization%2520Path%26entry.906535625%3DRapha%25C3%25ABl%2520Berthier%26entry.1292438233%3DDiagonal%2520linear%2520networks%2520are%2520neural%2520networks%2520with%2520linear%2520activation%2520and%2520diagonal%2520weight%2520matrices.%2520Their%2520theoretical%2520interest%2520is%2520that%2520their%2520implicit%2520regularization%2520can%2520be%2520rigorously%2520analyzed%253A%2520from%2520a%2520small%2520initialization%252C%2520the%2520training%2520of%2520diagonal%2520linear%2520networks%2520converges%2520to%2520the%2520linear%2520predictor%2520with%2520minimal%25201-norm%2520among%2520minimizers%2520of%2520the%2520training%2520loss.%2520In%2520this%2520paper%252C%2520we%2520deepen%2520this%2520analysis%2520showing%2520that%2520the%2520full%2520training%2520trajectory%2520of%2520diagonal%2520linear%2520networks% {"title": "Text-to-Stage: Spatial Layouts from Long-form Narratives", "author": "Jefferson Hernandez and Swarnadeep Saha and Chenxi Whitehouse and Sanjeel Parekh and Calvin Murdock and Yuliang Li and W. Owen Brimijoin and Vamsi Krishna Ithapu and Ishwarya Ananthabhotla", "abstract": "In this work, we probe the ability of a language model to demonstrate spatial reasoning from unstructured text, mimicking human capabilities and automating a process that benefits many downstream media applications. Concretely, we study the narrative-to-play task: inferring stage-play layouts (scenes, speaker positions, movements, and room types) from text that lacks explicit spatial, positional, or relational cues. We then introduce a dramaturgy-inspired deterministic evaluation suite and, finally, a training and inference recipe that combines rejection SFT using Best-of-N sampling with RL from verifiable rewards via GRPO. Experiments on a text-only corpus of classical English literature demonstrate improvements over vanilla models across multiple metrics (character attribution, spatial plausibility, and movement economy), as well as alignment with an LLM-as-a-judge and subjective human preferences.", "link": "http://arxiv.org/abs/2603.17832v1", "date": "2026-03-18", "relevancy": 2.1911, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5481}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5481}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5462}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Text-to-Stage%3A%20Spatial%20Layouts%20from%20Long-form%20Narratives&body=Title%3A%20Text-to-Stage%3A%20Spatial%20Layouts%20from%2 {"title": "A Creative Agent is Worth a 64-Token Template", "author": "Ruixiao Shi and Fu Feng and Yucheng Xie and Xu Yang and Jing Wang and Xin Geng", "abstract": "Text-to-image (T2I) models have substantially improved image fidelity and prompt adherence, yet their creativity remains constrained by reliance on discrete natural language prompts. When presented with fuzzy prompts such as ``a creative vinyl record-inspired skyscraper'', these models often fail to infer the underlying creative intent, leaving creative ideation and prompt design largely to human users. Recent reasoning- or agent-driven approaches iteratively augment prompts but incur high computational and monetary costs, as their instance-specific generation makes ``creativity'' costly and non-reusable, requiring repeated queries or reasoning for subsequent generations. To address this, we introduce \\textbf{CAT}, a framework for \\textbf{C}reative \\textbf{A}gent \\textbf{T}okenization that encapsulates agents' intrinsic understanding of ``creativity'' through a \\textit{Creative Tokenizer}. Given the embeddings of fuzzy prompts, the tokenizer generates a reusable token template that can be directly concatenated with them to inject creative semantics into T2I models without repeated reasoning or prompt augmentation. To enable this, the tokenizer is trained via creative semantic disentanglement, leveraging relations among partially overlapping concept pairs to capture the agent's latent creative representations. Extensive experiments on \\textbf{\\textit{Architecture Design}}, \\textbf{\\textit{Furniture Design}}, and \\textbf{\\textit{Nature Mixture}} tasks demonstrate that CAT provides a scalable and effective paradigm for enhancing creativity in T2I generation, achieving a $3.7\\times$ speedup and a $4.8\\times$ reduction in computational cost, while producing images with superior human preference and text-image alignment compared to state-of-the-art T2I models and creative generation methods.", "link": "http://arxiv.org/abs/2603.17895v1", "date": "2026-03-18", "relevancy": 2.1886, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5542}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5467}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5306}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Creative%20Agent%20is%20Worth%20a%2064-Token%20Template&body=Title%3A%20A%20Creative%20Agent%20is%20Worth%20a%2064-Token%20Template%0AAuthor%3A%20Ruixiao%20Shi%20and%20Fu%20Feng%20and%20Yucheng%20Xie%20and%20Xu%20Yang%20and%20Jing%20Wang%20and%20Xin%20Geng%0AAbstract%3A%20Text-to-image%20%28T2I%29%20models%20have%20substantially%20improved%20image%20fidelity%20and%20prompt%20adherence%2C%20yet%20their%20creativity%20remains%20constrained%20by%20reliance%20on%20discrete%20natural%20language%20prompts.%20When%20presented%20with%20fuzzy%20prompts%20such%20as%20%60%60a%20creative%20vinyl%20record-inspired%20skyscraper%27%27%2C%20these%20models%20often%20fail%20to%20infer%20the%20underlying%20creative%20intent%2C%20leaving%20creative%20ideation%20and%20prompt%20design%20largely%20to%20human%20users.%20Recent%20reasoning-%20or%20agent-driven%20approaches%20iteratively%20augment%20prompts%20but%20incur%20high%20computational%20and%20monetary%20costs%2C%20as%20their%20instance-specific%20generation%20makes%20%60%60creativity%27%27%20costly%20and%20non-reusable%2C%20requiring%20repeated%20queries%20or%20reasoning%20for%20subsequent%20generations.%20To%20address%20this%2C%20we%20introduce%20%5Ctextbf%7BCAT%7D%2C%20a%20framework%20for%20%5Ctextbf%7BC%7Dreative%20%5Ctextbf%7BA%7Dgent%20%5Ctextbf%7BT%7Dokenization%20that%20encapsulates%20agents%27%20intrinsic%20understanding%20of%20%60%60creativity%27%27%20through%20a%20%5Ctextit%7BCreative%20Tokenizer%7D.%20Given%20the%20embeddings%20of%20fuzzy%20prompts%2C%20the%20tokenizer%20generates%20a%20reusable%20token%20template%20that%20can%20be%20directly%20concatenated%20with%20them%20to%20inject%20creative%20semantics%20into%20T2I%20models%20without%20repeated%20reasoning%20or%20prompt%20augmentation.%20To%20enable%20this%2C%20the%20tokenizer%20is%20trained%20via%20creative%20semantic%20disentanglement%2C%20leveraging%20relations%20among%20partially%20overlapping%20concept%20pairs%20to%20capture%20the%20agent%27s%20latent%20creative%20representations.%20Extensive%20experiments%20on%20%5Ctextbf%7B%5Ctextit%7BArchitecture%20Design%7D%7D%2C%20%5Ctextbf%7B%5Ctextit%7BFurniture%20Design%7D%7D%2C%20and%20%5Ctextbf%7B%5Ctextit%7BNature%20Mixture%7D%7D%20tasks%20demonstrate%20that%20CAT%20provides%20a%20scalable%20and%20effective%20paradigm%20for%20enhancing%20creativity%20in%20T2I%20generation%2C%20achieving%20a%20%243.7%5Ctimes%24%20speedup%20and%20a%20%244.8%5Ctimes%24%20reduction%20in%20computational%20cost%2C%20while%20producing%20images%20with%20superior%20human%20preference%20and%20text-image%20alignment%20compared%20to%20state-of-the-art%20T2I%20models%20and%20creative%20generation%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17895v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Creative%2520Agent%2520is%2520Worth%2520a%252064-Token%2520Template%26entry.906535625%3DRuixiao%2520Shi%2520and%2520Fu%2520Feng%2520and%2520Yucheng%2520Xie%2520and%2520Xu%2520Yang%2520and%2520Jing%2520Wang%2520and%2520Xin%2520Geng%26entry.1292438233%3DText-to-image%2520%2528T2I%2529%2520models%2520have%2520substantially%2520improved%2520image%2520fidelity%2520and%2520prompt%2520adherence%252C%2520yet%2520their%2520creativity%2520remains%2520constrained%2520by%2520reliance%2520on%2520discrete%2520natural%2520language%2520prompts.%2520When%2520presented%2520with%2520fuzzy%2520prompts%2520such%2520as%2520%2560%2560a%2520creative%2520vinyl%2520record-inspired%2520skyscraper%2527%2527%252C%2520these%2520models%2520often%2520fail%2520to%2520infer%2520the%2520underlying%2520creative%2520intent%252C%2520leaving%2520creative%2520ideation%2520and%2520prompt%2520design%2520largely%2520to%2520human%2520users.%2520Recent%2520reasoning-%2520or%2520agent-driven%2520approaches%2520iteratively%2520augment%2520prompts%2520but%2520incur%2520high%2520computational%2520and%2520monetary%2520costs%252C%2520as%2520their%2520instance-specific%2520generation%2520makes%2520%2560%2560creativity%2527%2527%2520costly%2520and%2520non-reusable%252C%2520requiring%2520repeated%2520queries%2520or%2520reasoning%2520for%2520subsequent%2520generations.%2520To%2520address%2520this%252C%2520we%2520introduce%2520%255Ctextbf%257BCAT%257D%252C%2520a%2520framework%2520for%2520%255Ctextbf%257BC%257Dreative%2520%255Ctextbf%257BA%257Dgent%2520%255Ctextbf%257BT%257Dokenization%2520that%2520encapsulates%2520agents%2527%2520intrinsic%2520understanding%2520of%2520%2560%2560creativity%2527%2527%2520through%2520a%2520%255Ctextit%257BCreative%2520Tokenizer%257D.%2520Given%2520the%2520embeddings%2520of%2520fuzzy%2520prompts%252C%2520the%2520tokenizer%2520generates%2520a%2520reusable%2520token%2520template%2520that%2520can%2520be%2520directly%2520concatenated%2520with%2520them%2520to%2520inject%2520creative%2520semantics%2520into%2520T2I%2520models%2520without%2520repeated%2520reasoning%2520or%2520prompt%2520augmentation.%2520To%2520enable%2520this%252C%2520the%2520tokenizer%2520is%2520trained%2520via%2520creative%2520semantic%2520disentanglement%252C%2520leveraging%2520relations%2520among%2520partially%2520overlapping%2520concept%2520pairs%2520to%2520capture%2520the%2520agent%2527s%2520latent%2520creative%2520representations.%2520Extensive%2520experiments%2520on%2520%255Ctextbf%257B%255Ctextit%257BArchitecture%2520Design%257D%257D%2 {"title": "VISER: Visually-Informed System for Enhanced Robustness in Open-Set Iris Presentation Attack Detection", "author": "Byron Dowling and Eleanor Frederick and Jacob Piland and Adam Czajka", "abstract": "Human perceptual priors have shown promise in saliency-guided deep learning training, particularly in the domain of iris presentation attack detection (PAD). Common saliency approaches include hand annotations obtained via mouse clicks and eye gaze heatmaps derived from eye tracking data. However, the most effective form of human saliency for open-set iris PAD remains underexplored. In this paper, we conduct a series of experiments comparing hand annotations, eye tracking heatmaps, segmentation masks, and DINOv2 embeddings to a state-of-the-art deep learning-based baseline on the task of open-set iris PAD. Results for open-set PAD in a leave-one-attack-type out paradigm indicate that denoised eye tracking heatmaps show the best generalization improvement over cross entropy in terms of Area Under the ROC curve (AUROC) and Attack Presentation Classification Error Rate (APCER) at Bona Fide Presentation Classification Error Rate (BPCER) of 1%. Along with this paper, we offer trained models, code, and saliency maps for reproducibility and to facilitate follow-up research efforts.", "link": "http://arxiv.org/abs/2603.17859v1", "date": "2026-03-18", "relevancy": 2.1865, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5533}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5521}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5378}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VISER%3A%20Visually-Informed%2 {"title": "Consistency-Driven Dual LSTM Models for Kinematic Control of a Wearable Soft Robotic Arm", "author": "Xingyu Chen and Yi Xiong and Li Wen", "abstract": "In this paper, we introduce a consistency-driven dual LSTM framework for accurately learning both the forward and inverse kinematics of a pneumatically actuated soft robotic arm integrated into a wearable device. This approach effectively captures the nonlinear and hysteretic behaviors of soft pneumatic actuators while addressing the one-to-many mapping challenge between actuation inputs and end-effector positions. By incorporating a cycle consistency loss, we enhance physical realism and improve the stability of inverse predictions. Extensive experiments-including trajectory tracking, ablation studies, and wearable demonstrations-confirm the effectiveness of our method. Results indicate that the inclusion of the consistency loss significantly boosts prediction accuracy and promotes physical consistency over conventional approaches. Moreover, the wearable soft robotic arm demonstrates strong human-robot collaboration capabilities and adaptability in everyday tasks such as object handover, obstacle-aware pick-and-place, and drawer operation. This work underscores the promising potential of learning-based kinematic models for human-centric, wearable robotic systems.", "link": "http://arxiv.org/abs/2603.17672v1", "date": "2026-03-18", "relevancy": 2.185, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5939}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.541}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5325}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec .124074799=Read"},
{"title": "AgentFactory: A Self-Evolving Framework Through Executable Subagent Accumulation and Reuse", "author": "Zhang Zhang and Shuqi Lu and Hongjin Qian and Di He and Zheng Liu", "abstract": "Building LLM-based agents has become increasingly important. Recent works on LLM-based agent self-evolution primarily record successful experiences as textual prompts or reflections, which cannot reliably guarantee efficient task re-execution in complex scenarios. We propose AgentFactory, a new self-evolution paradigm that preserves successful task solutions as executable subagent code rather than textual experience. Crucially, these subagents are continuously refined based on execution feedback, becoming increasingly robust and efficient as more tasks are encountered. Saved subagents are pure Python code with standardized documentation, enabling portability across any Python-capable system. We demonstrate that AgentFactory enables continuous capability accumulation: its library of executable subagents grows and improves over time, progressively reducing the effort required for similar tasks without manual intervention. Our implementation is open-sourced at https://github.com/zzatpku/AgentFactory, and our demonstration video is available at https://youtu.be/iKSsuAXJHW0.", "link": "http://arxiv.org/abs/2603.18000v1", "date": "2026-03-18", "relevancy": 2.1783, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5748}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5464}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5136}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AgentFactory%3A%20A%20Self-Evolving%20Framework%20Through%20Executable%20Subagent%20Accumulation%20and%20Reuse&body=Title%3A%20AgentFactory%3A%20A%20Self-Evolving%20Framework%20Through%20Executable%20Subagent%20Accumulation%20and%20Reuse%0AAuthor%3A%20Zhang%20Zhang%20and%20Shuqi%20Lu%20and%20Hongjin%20Qian%20and%20Di%20He%20and%20Zheng%20Liu%0AAbstract%3A%20Building%20LLM-based%20agents%20has%20become%20increasingly%20important.%20Recent%20works%20on%20LLM-based%20agent%20self-evolution%20primarily%20record%20successful%20experiences%20as%20textual%20prompts%20or%20reflections%2C%20which%20cannot%20reliably%20guarantee%20efficient%20task%20re-execution%20in%20complex%20scenarios.%20We%20propose%20AgentFactory%2C%20a%20new%20self-evolution%20paradigm%20that%20preserves%20successful%20task%20solutions%20as%20executable%20subagent%20code%20rather%20than%20textual%20experience.%20Crucially%2C%20these%20subagents%20are%20continuously%20refined%20based%20on%20execution%20feedback%2C%20becoming%20increasingly%20robust%20and%20efficient%20as%20more%20tasks%20are%20encountered.%20Saved%20subagents%20are%20pure%20Python%20code%20with%20standardized%20documentation%2C%20enabling%20portability%20across%20any%20Python-capable%20system.%20We%20demonstrate%20that%20AgentFactory%20enables%20continuous%20capability%20accumulation%3A%20its%20library%20of%20executable%20subagents%20grows%20and%20improves%20over%20time%2C%20progressively%20reducing%20the%20effort%20required%20for%20similar%20tasks%20without%20manual%20intervention.%20Our%20implementation%20is%20open-sourced%20at%20https%3A//github.com/zzatpku/AgentFactory%2C%20and%20our%20demonstration%20video%20is%20available%20at%20https%3A//youtu.be/iKSsuAXJHW0.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18000v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAgentFactory%253A%2520A%2520Self-Evolving%2520Framework%2520Through%2520Executable%2520Subagent%2520Accumulation%2520and%2520Reuse%26entry.906535625%3DZhang%2520Zhang%2520and%2520Shuqi%2520Lu%2520 {"title": "Where MLLMs Attend and What They Rely On: Explaining Autoregressive Token Generation", "author": "Ruoyu Chen and Xiaoqing Guo and Kangwei Liu and Siyuan Liang and Shiming Liu and Qunli Zhang and Laiyuan Wang and Hua Zhang and Xiaochun Cao", "abstract": "Multimodal large language models (MLLMs) have demonstrated remarkable capabilities in aligning visual inputs with natural language outputs. Yet, the extent to which generated tokens depend on visual modalities remains poorly understood, limiting interpretability and reliability. In this work, we present EAGLE, a lightweight black-box framework for explaining autoregressive token generation in MLLMs. EAGLE attributes any selected tokens to compact perceptual regions while quantifying the relative influence of language priors and perceptual evidence. The framework introduces an objective function that unifies sufficiency (insight score) and indispensability (necessity score), optimized via greedy search over sparsified image regions for faithful and efficient attribution. Beyond spatial attribution, EAGLE performs modality-aware analysis that disentangles what tokens rely on, providing fine-grained interpretability of model decisions. Extensive experiments across open-source MLLMs show that EAGLE consistently outperforms existing methods in faithfulness, localization, and hallucination diagnosis, while requiring substantially less GPU memory. These results highlight its effectiveness and practicality for advancing the interpretability of MLLMs.", "link": "http://arxiv.org/abs/2509.22496v5", "date": "2026-03-18", "relevancy": 2.1756, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.554}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5419}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5419}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Where%20MLLMs%20Attend%20and%20What%20They%20Rely%20On%3A%20Explaining%20Autoregressive%20Token%20Generation&body=Title%3A%20Where%20MLLMs%20Attend%20and%20What%20They%20Rely%20On%3A%20Explaining%20Autoregressive%20Token%20Generation%0AAuthor%3A%20Ruoyu%20Chen%20and%20Xiaoqing%20Guo%20and%20Kangwei%20Liu%20and%20Siyuan%20Liang%20and%20Shiming%20Liu%20and%20Qunli%20Zhang%20and%20Laiyuan%20Wang%20and%20Hua%20Zhang%20and%20Xiaochun%20Cao%0AAbstract%3A%20Multimodal%20large%20language%20models%20%28MLLMs%29%20have%20demonstrated%20remarkable%20capabilities%20in%20aligning%20visual%20inputs%20with%20natural%20language%20outputs.%20Yet%2C%20the%20extent%20to%20which%20generated%20tokens%20depend%20on%20visual%20modalities%20remains%20poorly%20understood%2C%20limiting%20interpretability%20and%20reliability.%20In%20this%20work%2C%20we%20present%20EAGLE%2C%20a%20lightweight%20black-box%20framework%20for%20explaining%20autoregressive%20token%20generation%20in%20MLLMs.%20EAGLE%20attributes%20any%20selected%20tokens%20to%20compact%20perceptual%20regions%20while%20quantifying%20the%20relative%20influence%20of%20language%20priors%20and%20perceptual%20evidence.%20The%20framework%20introduces%20an%20objective%20function%20that%20unifies%20sufficiency%20%28insight%20score%29%20and%20indispensability%20%28necessity%20score%29%2C%20optimized%20via%20greedy%20search%20over%20sparsified%20image%20regions%20for%20faithful%20and%20efficient%20attribution.%20Beyond%20spatial%20attribution%2C%20EAGLE%20performs%20modality-aware%20analysis%20that%20disentangles%20what%20tokens%20rely%20on%2C%20providing%20fine-grained%20interpretability%20of%20model%20decisions.%20Extensive%20experiments%20across%20open-source%20MLLMs%20show%20that%20EAGLE%20consistently%20outperforms%20existing%20methods%20in%20faithfulness%2C%20localization%2C%20and%20hallucination%20diagnosis%2C%20while%20requiring%20substantially%20less%20GPU%20memory.%20These%20results%20highlight%20its%20effectiveness%20and%20practicality%20for%20advancing%20the%20interpretability%20of%20MLLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2509.22496v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhere%2520MLLMs%2520Attend%2520and%2520What%2520They%2520Rely%2520On%253A%2520Explaining%2520Autoregressive%2520Token%2520Generation%26entry.906535625%3DRuoyu%2520Chen%2520and%2520Xiaoqing%2520Guo%2520and%2520Kangwei%2520Liu%2520and%2520Siyuan%2520Liang%2520and%2520Shiming%2520Liu%2520and%2520Qunli%2520Zhang%2520and%2520Laiyuan%2520Wang%2520and%2520Hua%2520Zhang%2520and%2520Xiaochun%2520Cao%26entry.1292438233%3DMultimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520have%2520demonstrated%2520remarkable%2520capabilities%2520in%2520aligning%2520visual%2520inputs%2520with%2520natural%2520language%2520outputs.%2520Yet%252C%2520the%2520extent%2520to%2520which%2520generated%2520tokens%2520depend%2520on%2520visual%2520modalities%2520remains%2520poorly%2520understood%252C%2520limiting%2520interpretability%2520and%2520reliability.%2520In%2520this%2520work%252C%2520we%2520present%2520EAGLE%252C%2520a%2520lightweight%2520black-box%2520framework%2520for%2520explaining%2520autoregressive%2520token%2520generation%2520in%2520MLLMs.%2520EAGLE%2520attributes%2520any%2520selected%2520tokens%2520to%2520compact%2520perceptual%2520regions%2520while%2520quantifying%2520the%2520relative%2520influence%2520of%2520language%2520priors%2520and%2520perceptual%2520evidence.%2520The%2520framework%2520introduces%2520an%2520objective%2520function%2520that%2520unifies%2520sufficiency%2520%2528insight%2520score%2529%2520and%2520indispensability%2520%2528necessity%2520score%2529%252C%2520optimized%2520via%2520greedy%2520search%2520over%2520sparsified%2520image%2520 {"title": "U-ARM : Ultra low-cost general teleoperation interface for robot manipulation", "author": "Yanwen Zou and Zhaoye Zhou and Chenyang Shi and Zewei Ye and Junda Huang and Yan Ding and Bo Zhao", "abstract": "We propose U-Arm, a low-cost and rapidly adaptable leader-follower teleoperation framework designed to interface with most of commercially available robotic arms. Our system supports teleoperation through three structurally distinct 3D-printed leader arms that share consistent control logic, enabling seamless compatibility with diverse commercial robot configurations. Compared with previous open-source leader-follower interfaces, we further optimized both the mechanical design and servo selection, achieving a bill of materials (BOM) cost of only \\$50.5 for the 6-DoF leader arm and \\$56.8 for the 7-DoF version. To enhance usability, we mitigate the common challenge in controlling redundant degrees of freedom by %engineering methods mechanical and control optimizations. Experimental results demonstrate that U-Arm achieves 39\\% higher data collection efficiency and comparable task success rates across multiple manipulation scenarios compared with Joycon, another low-cost teleoperation interface. We have open-sourced all CAD models of three configs and also provided simulation support for validating teleoperation workflows. We also open-sourced real-world manipulation data collected with U-Arm. The project website is https://github.com/MINT-SJTU/LeRobot-Anything-U-Arm.", "link": "http://arxiv.org/abs/2509.02437v4", "date": "2026-03-18", "relevancy": 1.9516, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.4976}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4884}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4779}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20U-ARM%20%3A%20Ultra%20low-cost%20general%20teleoperation%20interface%20for%20robot%20manipulation&body=Title%3A%20U-ARM%20%3A%20Ultra%20low-cost%20general%20teleoperation%20interface%20for%20robot%20manipulation%0AAuthor%3A%20Yanwen%20Zou%20and%20Zhaoye%20Zhou%20and%20Chenyang%20Shi%20and%20Zewei%20Ye%20and%20Junda%20Huang%20and%20Yan%20Ding%20and%20Bo%20Zhao%0AAbstract%3A%20We%20propose%20U-Arm%2C%20a%20low-cost%20and%20rapidly%20adaptable%20leader-follower%20teleoperation%20framework%20designed%20to%20interface%20with%20most%20of%20commercially%20available%20robotic%20arms.%20Our%20system%20supports%20teleoperation%20through%20three%20structurally%20distinct%203D-printed%20leader%20arms%20that%20share%20consistent%20control%20logic%2C%20enabling%20seamless%20compatibility%20with%20diverse%20commercial%20robot%20configurations.%20Compared%20with%20previous%20open-source%20leader-follower%20interfaces%2C%20we%20further%20optimized%20both%20the%20mechanical%20design%20and%20servo%20selection%2C%20achieving%20a%20bill%20of%20materials%20%28BOM%29%20cost%20of%20only%20%5C%2450.5%20for%20the%206-DoF%20leader%20arm%20and%20%5C%2456.8%20for%20the%207-DoF%20version.%20To%20enhance%20usability%2C%20we%20mitigate%20the%20common%20challenge%20in%20controlling%20redundant%20degrees%20of%20freedom%20by%20%25engineering%20methods%20mechanical%20and%20control%20optimizations.%20Experimental%20results%20demonstrate%20that%20U-Arm%20achieves%2039%5C%25%20higher%20data%20collection%20efficiency%20and%20comparable%20task%20success%20rates%20across%20multiple%20manipulation%20scenarios%20compared%20with%20Joycon%2C%20another%20low-cost%20teleoperation%20interface.%20We%20have%20open-sourced%20all%20CAD%20models%20of%20three%20configs%20and%20also%20provided%20simulation%20support%20for%20validating%20teleoperation%20workflows.%20We%20also%20open {"title": "Learning Over Dirty Data with Minimal Repairs", "author": "Cheng Zhen and  Prayoga and Nischal Aryal and Arash Termehchy and Garrett Biwer and Lubna Alzamil", "abstract": "Missing data often exists in real-world datasets, requiring significant time and effort for data repair to learn accurate models. In this paper, we show that imputing all missing values is not always necessary to achieve an accurate ML model. We introduce concepts of minimal and almost minimal repair, which are subsets of missing data items in training data whose imputation delivers accurate and reasonably accurate models, respectively. Imputing these subsets can significantly reduce the time, computational resources, and manual effort required for learning. We show that finding these subsets is NP-hard for some popular models and propose efficient approximation algorithms for wide range of models. Our extensive experiments indicate that our proposed algorithms can substantially reduce the time and effort required to learn on incomplete datasets.", "link": "http://arxiv.org/abs/2503.13921v2", "date": "2026-03-18", "relevancy": 1.6486, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4217}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4176}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4004}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Over%20Dirty%20Data%20with%20Minimal%20Repairs&body=Title%3A%20Learning%20Over%20Dirty%20Data%20with%20Minimal%20Repairs%0AAuthor%3A%20Cheng%20Zhen%20and%20%20Prayoga%20and%20Nischal%20Aryal%20and%20Arash%20Termehchy%20and%20Garrett%20Biwer%20and%20Lubna%20Alzamil%0AAbstract%3A%20Missing%20data%20ofte {"title": "GIFT: Reconciling Post-Training Objectives via Finite-Temperature Gibbs Initialization", "author": "Zhengyang Zhao and Lu Ma and Yizhen Jiang and Xiaochen Ma and Zimo Meng and Chengyu Shen and Lexiang Tang and Haoze Sun and Peng Pei and Wentao Zhang", "abstract": "The prevailing post-training paradigm for Large Reasoning Models (LRMs) - Supervised Fine-Tuning (SFT) followed by Reinforcement Learning (RL) - suffers from an intrinsic optimization mismatch: the rigid supervision inherent in SFT induces distributional collapse, thereby exhausting the exploration space necessary for subsequent RL. In this paper, we reformulate SFT to reconcile post-training objectives and propose Gibbs Initialization with Finite Temperature (GIFT). We characterize standard SFT as a degenerate zero-temperature limit that suppresses base priors. Conversely, GIFT incorporates supervision as a finite-temperature energy potential, establishing a distributional bridge that promotes objective consistency throughout the post-training pipeline. Our experiments demonstrate that GIFT significantly outperforms standard SFT and other competitive baselines when utilized for RL initialization, providing a mathematically principled pathway to preserve exploration and align the two post-training stages. Our code is available at https://github.com/zzy1127/GIFT.", "link": "http://arxiv.org/abs/2601.09233v2", "date": "2026-03-18", "relevancy": 1.943, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5014}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4773}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4735}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GIFT%3A%20Reconciling%20Post-Training%20Objectives%20via% {"title": "End-to-end data-driven prediction of urban airflow and pollutant dispersion", "author": "Nishant Kumar and Franck Kerherv\u00e9 and Lionel Agostini and Laurent Cordier", "abstract": "Climate change and the rapid growth of urban populations are intensifying environmental stresses within cities, making the behavior of urban atmospheric flows a critical factor in public health, energy use, and overall livability. This study targets to develop fast and accurate models of urban pollutant dispersion to support decision-makers, enabling them to implement mitigation measures in a timely and cost-effective manner. To reach this goal, an end-to-end data-driven approach is proposed to model and predict the airflow and pollutant dispersion in a street canyon in skimming flow regime. A series of time-resolved snapshots obtained from large eddy simulation (LES) serves as the database. The proposed framework is based on four fundamental steps. Firstly, a reduced basis is obtained by spectral proper orthogonal decomposition (SPOD) of the database. The projection of the time series snapshot data onto the SPOD modes (time-domain approach) provides the temporal coefficients of the dynamics. Secondly, a nonlinear compression of the temporal coefficients is performed by autoencoder to reduce further the dimensionality of the problem. Thirdly, a reduced-order model (ROM) is learned in the latent space using Long Short-Term Memory (LSTM) netowrks. Finally, the pollutant dispersion is estimated from the predicted velocity field through convolutional neural network that maps both fields. The results demonstrate the efficacy of the model in predicting the instantaneous as well as statistically stationary fields over long time horizon.", "link": "http://arxiv.org/abs/2603.17606v1", "date": "2026-03-18", "relevancy": 0.9748, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5075} ficients%20of%20the%20dynamics.%20Secondly%2C%20a%20nonlinear%20compression%20of%20the%20temporal%20coefficients%20is%20performed%20by%20autoencoder%20to%20reduce%20further%20the%20dimensionality%20of%20the%20problem.%20Thirdly%2C%20a%20reduced-order%20model%20%28ROM%29%20is%20learned%20in%20the%20latent%20space%20using%20Long%20Short-Term%20Memory%20%28LSTM%29%20netowrks.%20Finally%2C%20the%20pollutant%20dispersion%20is%20estimated%20from%20the%20predicted%20velocity%20field%20through%20convolutional%20neural%20network%20that%20maps%20both%20fields.%20The%20results%20demonstrate%20the%20efficacy%20of%20the%20model%20in%20predicting%20the%20instantaneous%20as%20well%20as%20statistically%20stationary%20fields%20over%20long%20time%20horizon.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17606v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEnd-to-end%2520data-driven%2520prediction%2520of%2520urban%2520airflow%2520and%2520pollutant%2520dispersion%26entry.906535625%3DNishant%2520Kumar%2520and%2520Franck%2520Kerherv%25C3%25A9%2520and%2520Lionel%2520Agostini%2520and%2520Laurent%2520Cordier%26entry.1292438233%3DClimate%2520change%2520and%2520the%2520rapid%2520growth%2520of%2520urban%2520populations%2520are%2520intensifying%2520environmental%2520stresses%2520within%2520cities%252C%2520making%2520the%2520behavior%2520of%2520urban%2520atmospheric%2520flows%2520a%2520critical%2520factor%2520in%2520public%2520health%252C%2520energy%2520use%252C%2520and%2520overall%2520livability.%2520This%2520study%2520targets%2520to%2520develop%2520fast%2520and%2520accurate%2520models%2520of%2520urban%2520pollutant%2520dispersion%2520to%2520support%2520decision-makers%252C%2520enabling%2520them%2520to%2520implement%2520mitigation%2520measures%2520in%2520a%2520timely%2520and%2520cost-effective%2520manner.%2520To%2520reach%2520this%2520goal%252C%2520an%2520end-to-end%2520data-driven%2520approach%2520is%2520propose

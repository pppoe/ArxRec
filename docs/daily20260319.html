{"title": "KeyframeFace: Language-Driven Facial Animation via Semantic Keyframes", "author": "Jingchao Wu and Zejian Kang and Haibo Liu and Yuanchen Fei and Xiangru Huang", "abstract": "Facial animation is a core component for creating digital characters in Computer Graphics (CG) industry. A typical production workflow relies on sparse, semantically meaningful keyframes to precisely control facial expressions. Enabling such animation directly from natural-language descriptions could significantly improve content creation efficiency and accessibility. However, most existing methods adopt a text-to-continuous-frames paradigm, directly regressing dense facial motion trajectories from language. This formulation entangles high-level semantic intent with low-level motion, lacks explicit semantic control structure, and limits precise editing and interpretability. Inspired by the keyframe paradigm in animation production, we propose KeyframeFace, a framework for semantic facial animation from language via interpretable keyframes. Instead of predicting dense motion trajectories, our method represents animation as a sequence of semantically meaningful keyframes in an interpretable ARKit-based facial control space. A language-driven model leverages large language model (LLM) priors to generate keyframes that align with contextual text descriptions and emotion cues. To support this formulation, we construct a multimodal dataset comprising 2,100 expression scripts paired with monocular videos, per-frame ARKit coefficients, and manually annotated semantic keyframes. Experiments show that incorporating semantic keyframe supervision and language priors significantly improves expression fidelity and semantic alignment compared to methods that do not use facial action semantics.", "link": "http://arxiv.org/abs/2512.11321v2", "date": "2026-03-18", "relevancy": 2.7752, "topK": [{"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5734}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5722}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5196}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20KeyframeFace%3A%20Language-Driven%20Facial%20Animation%20via%20Semantic%20Keyframes&body=Title%3A%20KeyframeFace%3A%20Language-Driven%20Facial%20Animation%20via%20Semantic%20Keyframes%0AAuthor%3A%20Jingchao%20Wu%20and%20Zejian%20Kang%20and%20Haibo%20Liu%20and%20Yuanchen%20Fei%20and%20Xiangru%20Huang%0AAbstract%3A%20Facial%20animation%20is%20a%20core%20component%20for%20creating%20digital%20characters%20in%20Computer%20Graphics%20%28CG%29%20industry.%20A%20typical%20production%20workflow%20relies%20on%20sparse%2C%20semantically%20meaningful%20keyframes%20to%20precisely%20control%20facial%20expressions.%20Enabling%20such%20animation%20directly%20from%20natural-language%20descriptions%20could%20significantly%20improve%20content%20creation%20efficiency%20and%20accessibility.%20However%2C%20most%20existing%20methods%20adopt%20a%20text-to-continuous-frames%20paradigm%2C%20directly%20regressing%20dense%20facial%20motion%20trajectories%20from%20language.%20This%20formulation%20entangles%20high-level%20semantic%20intent%20with%20low-level%20motion%2C%20lacks%20explicit%20semantic%20control%20structure%2C%20and%20limits%20precise%20editing%20and%20interpretability.%20Inspired%20by%20the%20keyframe%20paradigm%20in%20animation%20production%2C%20we%20propose%20KeyframeFace%2C%20a%20framework%20for%20semantic%20facial%20animation%20from%20language%20via%20interpretable%20keyframes.%20Instead%20of%20predicting%20dense%20motion%20trajectories%2C%20our%20method%20represents%20animation%20as%20a%20sequence%20of%20semantically%20meaningful%20keyframes%20in%20an%20interpretable%20ARKit-based%20facial%20control%20space.%20A%20language-driven%20model%20leverages%20large%20language%20model%20%28LLM%29%20priors%20to%20generate%20keyframes%20that%20align%20with%20contextual%20text%20descriptions%20and%20emotion%20cues.%20To%20support%20this%20formulation%2C%20we%20construct%20a%20multimodal%20dataset%20comprising%202%2C100%20expression%20scripts%20paired%20with%20monocular%20videos%2C%20per-frame%20ARKit%20coefficients%2C%20and%20manually%20annotated%20semantic%20keyframes.%20Experiments%20show%20that%20incorporating%20semantic%20keyframe%20supervision%20and%20language%20priors%20significantly%20improves%20expression%20fidelity%20and%20semantic%20alignment%20compared%20to%20methods%20that%20do%20not%20use%20facial%20action%20semantics.%0ALink%3A%20http%3A//arxiv.org/abs/2512.11321v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DKeyframeFace%253A%2520Language-Driven%2520Facial%2520Animation%2520via%2520Semantic%2520Keyframes%26entry.906535625%3DJingchao%2520Wu%2520and%2520Zejian%2520Kang%2520and%2520Haibo%2520Liu%2520and%2520Yuanchen%2520Fei%2520and%2520Xiangru%2520Huang%26entry.1292438233%3DFacial%2520animation%2520is%2520a%2520core%2520component%2520for%2520creating%2520digital%2520characters%2520in%2520Computer%2520Graphics%2520%2528CG%2529%2520industry.%2520A%2520typical%2520production%2520workflow%2520relies%2520on%2520sparse%252C%2520semantically%2520meaningful%2520keyframes%2520to%2520precisely%2520control%2520facial%2520expressions.%2520Enabling%2520such%2520animation%2520directly%2520from%2520natural-language%2520descriptions%2520could%2520significantly%2520improve%2520content%2520creation%2520efficiency%2520and%2520accessibility.%2520However%252C%2520most%2520existing%2520methods%2520adopt%2520a%2520text-to-continuous-frames%2520paradigm%252C%2520directly%2520regressing%2520dense%2520facial%2520motion%2520trajectories%2520from%2520language.%2520This%2520formulation%2520entangles%2520high-level%2520semantic%2520intent%2520with%2520low-level%2520motion%252C%2520lacks%2520explicit%2520semantic%2520control%2520structure%252C%2520and%2520limits%2520precise%2520editing%2520and%2520interpretability.%2520Inspired%2520by%2520the%2520keyframe%2520paradigm%2520in%2520animation%2520production%252C%2520we%2520propose%2520KeyframeFace%252C%2520a%2520framework%2520for%2520semantic%2520facial%2520animation%2520from%2520language%2520via%2520interpretable%2520keyframes.%2520Instead%2520of%2520predicting%2520dense%2520motion%2520trajectories%252C%2520our%2520method%2520represents%2520animation%2520as%2520a%2520sequence%2520of%2520semantically%2520meaningful%2520keyframes%2520in%2520an%2520interpretable%2520ARKit-based%2520facial%2520control%2520space.%2520A%2520language-driven%2520model%2520leverages%2520large%2520language%2520model%2520%2528LLM%2529%2520priors%2520to%2520generate%2520keyframes%2520that%2520align%2520with%2520contextual%2520text%2520descriptions%2520and%2520emotion%2520cues.%2520To%2520support%2520this%2520formulation%252C%2520we%2520construct%2520a%2520multimodal%2520dataset%2520comprising%25202%252C100%2520expression%2520scripts%2520paired%2520with%2520monocular%2520videos%252C%2520per-frame%2520ARKit%2520coefficients%252C%2520and%2520manually%2520annotated%2520semantic%2520keyframes.%2520Experiments%2520show%2520that%2520incorporating%2520semantic%2520keyframe%2520supervision%2520and%2520language%2520priors%2520significantly%2520improves%2520expression%2520fidelity%2520and%2520semantic%2520alignment%2520compared%2520to%2520methods%2520that%2520do%2520not%2520use%2520facial%2520action%2520semantics.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.11321v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=KeyframeFace%3A%20Language-Driven%20Facial%20Animation%20via%20Semantic%20Keyframes&entry.906535625=Jingchao%20W 0improves%20expression%20fidelity%20and%20semantic%20alignment%20compared%20to%20methods%20that%20do%20not%20use%20facial%20action%20semantics.&entry.1838667208=http%3A//arxiv.org/abs/2512.11321v2&entry.124074799=Read"},
{"title": "AdaMuS: Adaptive Multi-view Sparsity Learning for Dimensionally Unbalanced Data", "author": "Cai Xu and Changhao Sun and Ziyu Guan and Wei Zhao", "abstract": "Multi-view learning primarily aims to fuse multiple features to describe data comprehensively. Most prior studies implicitly assume that different views share similar dimensions. In practice, however, severe dimensional disparities often exist among different views, leading to the unbalanced multi-view learning issue. For example, in emotion recognition tasks, video frames often reach dimensions of $10^6$, while physiological signals comprise only $10^1$ dimensions. Existing methods typically face two main challenges for this problem: (1) They often bias towards high-dimensional data, overlooking the low-dimensional views. (2) They struggle to effectively align representations under extreme dimensional imbalance, which introduces severe redundancy into the low-dimensional ones. To address these issues, we propose the Adaptive Multi-view Sparsity Learning (AdaMuS) framework. First, to prevent ignoring the information of low-dimensional views, we construct view-specific encoders to map them into a unified dimensional space. Given that mapping low-dimensional data to a high-dimensional space often causes severe overfitting, we design a parameter-free pruning method to adaptively remove redundant parameters in the encoders. Furthermore, we propose a sparse fusion paradigm that flexibly suppresses redundant dimensions and effectively aligns each view. Additionally, to learn representations with stronger generalization, we propose a self-supervised learning paradigm that obtains supervision information by constructing similarity graphs. Extensive evaluations on a synthetic toy dataset and seven real-world benchmarks demonstrate that AdaMuS consistently achieves superior performance and exhibits strong generalization across both classification and semantic segmentation tasks.", "link": "http://arxiv.org/abs/2603.17610v1", "date": "2026-03-18", "relevancy": 2.7687, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5829}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5524}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5259}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AdaMuS%3A%20Adaptive%20Multi-view%20Sparsity%20Learning%20for%20Dimensionally%20Unbalanced%20Data&body=Title%3A%20AdaMuS%3A%20Adaptive%20Multi-view%20Sparsity%20Learning%20for%20Dimensionally%20Unbalanced%20Data%0AAuthor%3A%20Cai%20Xu%20and%20Changhao%20Sun%20and%20Ziyu%20Guan%20and%20Wei%20Zhao%0AAbstract%3A%20Multi-view%20learning%20primarily%20aims%20to%20fuse%20multiple%20features%20to%20describe%20data%20comprehensively.%20Most%20prior%20studies%20implicitly%20assume%20that%20different%20views%20share%20similar%20dimensions.%20In%20practice%2C%20however%2C%20severe%20dimensional%20disparities%20often%20exist%20among%20different%20views%2C%20leading%20to%20the%20unbalanced%20multi-view%20learning%20issue.%20For%20example%2C%20in%20emotion%20recognition%20tasks%2C%20video%20frames%20often%20reach%20dimensions%20of%20%2410%5E6%24%2C%20while%20physiological%20signals%20comprise%20only%20%2410%5E1%24%20dimensions.%20Existing%20methods%20typically%20face%20two%20main%20challenges%20for%20this%20problem%3A%20%281%29%20They%20often%20bias%20towards%20high-dimensional%20data%2C%20overlooking%20the%20low-dimensional%20views.%20%282%29%20They%20struggle%20to%20effectively%20align%20representations%20under%20extreme%20dimensional%20imbalance%2C%20which%20introduces%20severe%20redundancy%20into%20the%20low-dimensional%20ones.%20To%20address%20these%20issues%2C%20we%20propose%20the%20Adaptive%20Multi-view%20Sparsity%20Learning%20%28AdaMuS%29%20framework.%20First%2C%20to%20prevent%20ignoring%20the%20information%20of%20low-dimensional%20views%2C%20we%20construct%20view-specific%20encoders%20to%20map%20them%20into%20a%20unified%20dimensional%20space.%20Given%20that%20mapping%20low-dimensional%20data%20to%20a%20high-dimensional%20space%20often%20causes%20severe%20overfitting%2C%20we%20design%20a%20parameter-free%20pruning%20method%20to%20adaptively%20remove%20redundant%20parameters%20in%20the%20encoders.%20Furthermore%2C%20we%20propose%20a%20sparse%20fusion%20paradigm%20that%20flexibly%20suppresses%20redundant%20dimensions%20and%20effectively%20aligns%20each%20view.%20Additionally%2C%20to%20learn%20representations%20with%20stronger%20generalization%2C%20we%20propose%20a%20self-supervised%20learning%20paradigm%20that%20obtains%20supervision%20information%20by%20constructing%20similarity%20graphs.%20Extensive%20evaluations%20on%20a%20synthetic%20toy%20dataset%20and%20seven%20real-world%20benchmarks%20demonstrate%20that%20AdaMuS%20consistently%20achieves%20superior%20performance%20and%20exhibits%20strong%20generalization%20across%20both%20classification%20and%20semantic%20segmentation%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17610v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAdaMuS%253A%2520Adaptive%2520Multi-view%2520Sparsity%2520Learning%2520for%2520Dimensionally%2520Unbalanced%2520Data%26entry.906535625%3DCai%2520Xu%2520and%2520Changhao%2520Sun%2520and%2520Ziyu%2520Guan%2520and%2520Wei%2520Zhao%26entry.1292438233%3DMulti-view%2520learning%2520primarily%2520aims%2520to%2520fuse%2520multiple%2520features%2520to%2520describe%2520data%2520comprehensively.%2520Most%2520prior%2520studies%2520implicitly%2520assume%2520that%2520different%2520views%2520share%2520similar%2520dimensions.%2520In%2520practice%252C%2520however%252C%2520severe%2520dimensional%2520disparities%2520often%2520exist%2520among%2520different%2520views%252C%2520leading%2520to%2520the%2520unbalanced%2520multi-view%2520learning%2520issue.%2520For%2520example%252C%2520in%2520emotion%2520recognition%2520tasks%252C%2520video%2520frames%2520often%2520reach%2520dimensions%2520of%2520%252410%255E6%2524%252C%2520while%2520physiological%2520signals%2520comprise%2520only%2520%252410%255E1%2524%2520dimensions.%2520Existing%2520methods%2520typically%2520face%2520two%2520main%2520challenges%2520for%2520this%2520problem%253A%2520%25281%2529%2520They%2520often%2520bias%2520towards%2520high-dimensional%2520data%252C%2520overlooking%2520the%2520low-dimensional%2520views.%2520%25282%2529%2520They%2520struggle%2520to%2520effectively%2520align%2520representations%2520under%2520extreme%2520dimensional%2520imbalance%252C%2520which%2520introduces%2520severe%2520redundancy%2520into%2520the%2520low-dimensional%2520ones.%2520To%2520address%2520these%2520issues%252C%2520we%2520propose%2520the%2520Adaptive%2520Multi-view%2520Sparsity%2520Learning%2520%2528AdaMuS%2529%2520framework.%2520First%252C%2520to%2520prevent%2520ignoring%2520the%2520information%2520of%2520low-dimensional%2520views%252C%2520we%2520construct%2520view-specific%2520encoders%2520to%2520map%2520them%2520into%2520a%2520unified%2520dimensional%2520space.%2520Given%2520that%2520mapping%2520low-dimensional%2520data%2520to%2520a%2520high-dimensional%2520space%2520often%2520causes%2520severe%2520overfitting%252C%2520we%2520design%2520a%2520parameter-free%2520pruning%2520method%2520to%2520adaptively%2520remove%2520redundant%2520parameters%2520in%2520the%2520encoders.%2520Furthermore%252C%2520we%2520propose%2520a%2520sparse%2520fusion%2520paradigm%2520that%2520flexibly%2520suppresses%2520redundant%2520dimensions%2520and%2520effectively%2520aligns%2520each%2520view.%2520Additionally%252C%2520to%2520learn%2520representations%2520with%2520stronger%2520generalization%252C%2520we%2520propose%2520a%2520self-supervised%2520learning%2520paradigm%2520that%2520obtains%2520supervision%2520information%2520by%2520constructing%2520similarity%2520graphs.%2520Extensive%2520evaluations%2520on%2520a%2520synthetic%2520toy%2520dataset%2520and%2520seven%2520real-world%2520benchmarks%2520demonstrate%2520that%2520AdaMuS%2520consistently%2520achieves%2520superior%2520performance%2520and%2520exhibits%2520strong%2520generalization%2520across%2520both%2520classification%2520and%2520semantic%2520segmentation%2520tasks.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.17610v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=AdaMuS%3A%20Adaptive%20Multi-view%20Sparsity%20Learning%20for%20Dimensionally%20Unbalanced%20Data&entry.906535625=Cai%20Xu%20and%20Changhao%20Sun%20and%20Ziyu%20Guan%20and%20Wei%20Zhao&entry.1292438233=Multi-view%20learning%20primarily%20aims%20to%20fuse%20multiple%20features%20to%20describe%20data%20comprehensively.%20Most%20prior%20studies%20implicitly%20assume%20that%20different%20views%20share%20similar%20dimensions.%20In%20practice%2C%20however%2C%20severe%20dimensional%20disparities%20often%20exist%20among%20different%20views%2C%20leading%20to%20the%20unbalanced%20multi-view%20learning%20issue.%20For%20example%2C%20in%20emotion%20recognition%20tasks%2C%20video%20frames%20often%20reach%20dimensions%20of%20%2410%5E6%24%2C%20while%20physiological%20signals%20comprise%20only%20%2410%5E1%24%20dimensions.%20Existing%20methods%20typically%20face%20two%20main%20challenges%20for%20this%20problem%3A%20%281%29%20They%20often%20bias%20towards%20high-dimensional%20data%2C%20overlooking%20the%20low-dimensional%20views.%20%282%29%20They%20struggle%20to%20effectively%20align%20representations%20under%20extreme%20dimensional%20imbalance%2C%20which%20introduces%20severe%20redundancy%20into%20the%20low-dimensional%20ones.%20To%20address%20these%20issues%2C%20we%20propose%20the%20Adaptive%20Multi-view%20Sparsity%20Learning%20%28AdaMuS%29%20framework.%20First%2C%20to%20prevent%20ignoring%20the%20information%20of%20low-dimensional%20views%2C%20we%20construct%20view-specific%20encoders%20to%20map%20them%20into%20a%20unified%20dimensional%20space.%20Given%20that%20mapping%20low-dimensional%20data%20to%20a%20high-dimensional%20space%20often%20causes%20severe%20overfitting%2C%20we%20design%20a%20parameter-free%20pruning%20method%20to%20adaptively%20remove%20redundant%20parameters%20in%20the%20encoders.%20Furthermore%2C%20we%20propose%20a%20sparse%20fusion%20paradigm%20that%20flexibly%20suppresses%20redundant%20dimensions%20and%20effectively%20aligns%20each%20view.%20Additionally%2C%20to%20learn%20representations%20with%20stronger%20generalization%2C%20we%20propose%20a%20self-supervised%20learning%20paradigm%20that%20obtains%20supervision%20information%20by%20constructing%20similarity%20graphs.%20Extensive%20evaluations%20on%20a%20synthetic%20toy%20dataset%20and%20seven%20real-world%20benchmarks%20demonstrate%20that%20AdaMuS%20consistently%20achieves%20superior%20performance%20and%20exhibits%20strong%20generalization%20across%20both%20classification%20and%20semantic%20segmentation%20tasks.&entry.1838667208=http%3A//arxiv.org/abs/2603.17610v1&entry.124074799=Read"},
{"title": "DeepCORO-CLIP: A Multi-View Foundation Model for Comprehensive Coronary Angiography Video-Text Analysis and External Validation", "author": "Sarra Harrabi and Yichen Wu and Geoffrey H. Tison and Minhaj Ansari and Milos Vukadinovic and David Ouyang and Joshua P. Barrios and Jacques Delfrate and Robert Avram", "abstract": "Coronary angiography is the reference standard for evaluating coronary artery disease, yet visual interpretation remains variable between readers. Existing artificial intelligence methods typically analyze single frames or projections and focus mainly on stenosis, limiting comprehensive coronary assessment. We present DeepCORO-CLIP, a multi-view foundation model trained with video-text contrastive learning on 203,808 angiography videos from 28,117 patients across 32,473 studies at the Montreal Heart Institute and externally validated on 4,249 studies from the University of California, San Francisco. DeepCORO-CLIP integrates multiple projections with attention-based pooling for study-level assessment across diagnostic, prognostic, and disease progression tasks. For significant stenosis detection, the model achieved an AUROC of 0.888 internally and 0.89 on external validation. Mean absolute error against core laboratory quantitative coronary angiography was 13.6%, lower than clinical reports at 19.0%. The model also performed strongly for chronic total occlusion, intracoronary thrombus, and coronary calcification detection. Transfer learning enabled prediction of one-year major adverse cardiovascular events with AUROC 0.79 and estimation of left ventricular ejection fraction with mean absolute error 7.3%. Embeddings also captured disease progression across serial examinations. With a mean inference time of 4.2 seconds in hospital deployment, DeepCORO-CLIP provides a foundation for automated coronary angiography interpretation at the point of care. Code, sample data, model weights, and deployment infrastructure are publicly released.", "link": "http://arxiv.org/abs/2603.17675v1", "date": "2026-03-18", "relevancy": 2.7607, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5617}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5474}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5474}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DeepCORO-CLIP%3A%20A%20Multi-View%20Foundation%20Model%20for%20Comprehensive%20Coronary%20Angiography%20Video-Text%20Analysis%20and%20External%20Validation&body=Title%3A%20DeepCORO-CLIP%3A%20A%20Multi-View%20Foundation%20Model%20for%20Comprehensive%20Coronary%20Angiography%20Video-Text%20Analysis%20and%20External%20Validation%0AAuthor%3A%20Sarra%20Harrabi%20and%20Yichen%20Wu%20and%20Geoffrey%20H.%20Tison%20and%20Minhaj%20Ansari%20and%20Milos%20Vukadinovic%20and%20David%20Ouyang%20and%20Joshua%20P.%20Barrios%20and%20Jacques%20Delfrate%20and%20Robert%20Avram%0AAbstract%3A%20Coronary%20angiography%20is%20the%20reference%20standard%20for%20evaluating%20coronary%20artery%20disease%2C%20yet%20visual%20interpretation%20remains%20variable%20between%20readers.%20Existing%20artificial%20intelligence%20methods%20typically%20analyze%20single%20frames%20or%20projections%20and%20focus%20mainly%20on%20stenosis%2C%20limiting%20comprehensive%20coronary%20assessment.%20We%20present%20DeepCORO-CLIP%2C%20a%20multi-view%20foundation%20model%20trained%20with%20video-text%20contrastive%20learning%20on%20203%2C808%20angiography%20videos%20from%2028%2C117%20patients%20across%2032%2C473%20studies%20at%20the%20Montreal%20Heart%20Institute%20and%20externally%20validated%20on%204%2C249%20studies%20from%20the%20University%20of%20California%2C%20San%20Francisco.%20DeepCORO-CL {"title": "SARE: Sample-wise Adaptive Reasoning for Training-free Fine-grained Visual Recognition", "author": "Jingxiao Yang and DaLin He and Miao Pan and Ge Su and Wenqi Zhang and Yifeng Hu and Tangwei Li and Yuke Li and Xuhong Zhang", "abstract": "Recent advances in Large Vision-Language Models (LVLMs) have enabled training-free Fine-Grained Visual Recognition (FGVR). However, effectively exploiting LVLMs for FGVR remains challenging due to the inherent visual ambiguity of subordinate-level categories. Existing methods predominantly adopt either retrieval-oriented or reasoning-oriented paradigms to tackle this challenge, but both are constrained by two fundamental limitations:(1) They apply the same inference pipeline to all samples without accounting for uneven recognition difficulty, thereby leading to suboptimal accuracy and efficiency; (2) The lack of mechanisms to consolidate and reuse error-specific experience causes repeated failures on similar challenging cases. To address these limitations, we propose SARE, a Sample-wise Adaptive textbfREasoning framework for training-free FGVR. Specifically, SARE adopts a cascaded design that combines fast candidate retrieval with fine-grained reasoning, invoking the latter only when necessary. In the reasoning process, SARE incorporates a self-reflective experience mechanism that leverages past failures to provide transferable discriminative guidance during inference, without any parameter updates. Extensive experiments across 14 datasets substantiate that SARE achieves state-of-the-art performance while substantially reducing computational overhead.", "link": "http://arxiv.org/abs/2603.17729v1", "date": "2026-03-18", "relevancy": 2.7263, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.585}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5254}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5254}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SARE%3A%20Sample-wise%20Adaptive%20Reasoning%20for%20Training-free%20Fine-grained%20Visual%20Recognition&body=Title%3A%20SARE%3A%20Sample-wise%20Adaptive%20Reasoning%20for%20Training-free%20Fine-grained%20Visual%20Recognition%0AAuthor%3A%20Jingxiao%20Yang%20and%20DaLin%20He%20and%20Miao%20Pan%20and%20Ge%20Su%20and%20Wenqi%20Zhang%20and%20Yifeng%20Hu%20and%20Tangwei%20Li%20and%20Yuke%20Li%20and%20Xuhong%20Zhang%0AAbstract%3A%20Recent%20advances%20in%20Large%20Vision-Language%20Models%20%28LVLMs%29%20have%20enabled%20training-free%20Fine-Grained%20Visual%20Recognition%20%28FGVR%29.%20However%2C%20effectively%20exploiting%20LVLMs%20for%20FGVR%20remains%20challenging%20due%20to%20the%20inherent%20visual%20ambiguity%20of%20subordinate-level%20categories.%20Existing%20methods%20predominantly%20adopt%20either%20retrieval-oriented%20or%20reasoning-oriented%20paradigms%20to%20tackle%20this%20challenge%2C%20but%20both%20are%20constrained%20by%20two%20fundamental%20limitations%3A%281%29%20They%20apply%20the%20same%20inference%20pipeline%20to%20all%20samples%20without%20accounting%20for%20uneven%20recognition%20difficulty%2C%20thereby%20leading%20to%20suboptimal%20accuracy%20and%20efficiency%3B%20%282%29%20The%20lack%20of%20mechanisms%20to%20consolidate%20and%20reuse%20error-specific%20experience%20causes%20repeated%20failures%20on%20similar%20challenging%20cases.%20To%20address%20these%20limitations%2C%20we%20propose%20SARE%2C%20a%20Sample-wise%20Adaptive%20textbfREasoning%20framework%20for%20training-free%20FGVR.%20Specifically%2C%20SARE%20adopts%20a%20cascaded%20design%20that%20combines {"title": "Equivariant symmetry-aware head pose estimation for fetal MRI", "author": "Ramya Muthukrishnan and Borjan Gagoski and Aryn Lee and P. Ellen Grant and Elfar Adalsteinsson and Benjamin Billot and Polina Golland", "abstract": "We present E(3)-Pose, a novel fast pose estimation method that jointly and explicitly models rotation equivariance and object symmetry. Our work is motivated by the challenging problem of accounting for fetal head motion during a diagnostic MRI scan. We aim to enable automatic adaptive prescription of diagnostic 2D MRI slices with 6-DoF head pose estimation, supported by rapid low-resolution 3D MRI volumes acquired before each 2D slice. Existing pose estimation methods struggle to generalize to clinical volumes due to pose ambiguities induced by inherent anatomical symmetries, as well as low resolution, noise, and artifacts. In contrast, E(3)-Pose captures anatomical symmetries and rigid pose equivariance by construction, and yields robust estimates of the fetal head pose. Our experiments on publicly available and representative clinical fetal MRI datasets demonstrate the superior robustness and generalization of our method across domains. Crucially, E(3)-Pose achieves state-of-the-art accuracy on clinical MRI volumes, supporting future clinical translation. Our implementation is publicly available at github.com/MedicalVisionGroup/E3-Pose.", "link": "http://arxiv.org/abs/2512.04890v6", "date": "2026-03-18", "relevancy": 2.7198, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5582}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.5369}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.5369}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Equivariant%20symmetry-aware%20head%20pose%20estimati 0MRI%2520volumes%252C%2520supporting%2520future%2520clinical%2520translation.%2520Our%2520implementation%2520is%2520publicly%2520available%2520at%2520github.com/MedicalVisionGroup/E3-Pose.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.04890v6%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Equivariant%20symmetry-aware%20head%20pose%20estimation%20for%20fetal%20MRI&entry.906535625=Ramya%20Muthukrishnan%20and%20Borjan%20Gagoski%20and%20Aryn%20Lee%20and%20P.%20Ellen%20Grant%20and%20Elfar%20Adalsteinsson%20and%20Benjamin%20Billot%20and%20Polina%20Golland&entry.1292438233=We%20present%20E%283%29-Pose%2C%20a%20novel%20fast%20pose%20estimation%20method%20that%20jointly%20and%20explicitly%20models%20rotation%20equivariance%20and%20object%20symmetry.%20Our%20work%20is%20motivated%20by%20the%20challenging%20problem%20of%20accounting%20for%20fetal%20head%20motion%20during%20a%20diagnostic%20MRI%20scan.%20We%20aim%20to%20enable%20automatic%20adaptive%20prescription%20of%20diagnostic%202D%20MRI%20slices%20with%206-DoF%20head%20pose%20estimation%2C%20supported%20by%20rapid%20low-resolution%203D%20MRI%20volumes%20acquired%20before%20each%202D%20slice.%20Existing%20pose%20estimation%20methods%20struggle%20to%20generalize%20to%20clinical%20volumes%20due%20to%20pose%20ambiguities%20induced%20by%20inherent%20anatomical%20symmetries%2C%20as%20well%20as%20low%20resolution%2C%20noise%2C%20and%20artifacts.%20In%20contrast%2C%20E%283%29-Pose%20captures%20anatomical%20symmetries%20and%20rigid%20pose%20equivariance%20by%20construction%2C%20and%20yields%20robust%20estimates%20of%20the%20fetal%20head%20pose.%20Our%20experiments%20on%20publicly%20available%20and%20representative%20clinical%20fetal%20MRI%20datasets%20demonstrate%20the%20superior%20robustness%20and%20generalization%20of%20our%20method%20across%20domains.%20Crucially%2C%20E%283%29-Pose%20achieves%20state-of-the-art%20accuracy%20on%20clinical%20MRI%20volumes%2C%20supporting%20future%20clinical%20translation.%20Our%20implementation%20is%20publicly%20available%20at%20github.com/MedicalVisionGroup/E3-Pose.&entry.1838667208=http%3A//arxiv.org/abs/2512.04890v6&entry.124074799=Read"},
{"title": "Dynamic-ICP: Doppler-Aware Iterative Closest Point Registration for Dynamic Scenes", "author": "Dong Wang and Daniel Casado Herraez and Stefan May and Andreas N\u00fcchter", "abstract": "Reliable odometry in highly dynamic environments remains challenging when it relies on ICP-based registration: ICP assumes near-static scenes and degrades in repetitive or low-texture geometry. We introduce Dynamic-ICP, a Doppler-aware registration framework. The method (i) estimates ego motion from per-point Doppler velocity via robust regression and builds a velocity filter, (ii) clusters dynamic objects and reconstructs object-wise translational velocities from ego-compensated radial measurements, (iii) predicts dynamic points with a constant-velocity model, and (iv) aligns scans using a compact objective that combines point-to-plane geometry residual with a translation-invariant, rotation-only Doppler residual. The approach requires no external sensors or sensor-vehicle calibration and operates directly on FMCW LiDAR range and Doppler velocities. We evaluate Dynamic-ICP on three datasets-HeRCULES, HeLiPR, AevaScenes-focusing on highly dynamic scenes. Dynamic-ICP consistently improves rotational stability and translation accuracy over the state-of-the-art methods. Our approach is also simple to integrate into existing pipelines, runs in real time, and provides a lightweight solution for robust registration in dynamic environments. To encourage further research, the code is available at: https://github.com/JMUWRobotics/Dynamic-ICP.", "link": "http://arxiv.org/abs/2511.20292v3", "date": "2026-03-18", "relevancy": 2.7103, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5465}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5 {"title": "Fine-Grained Post-Training Quantization for Large Vision Language Models with Quantization-Aware Integrated Gradients", "author": "Ziwei Xiang and Fanhu Zeng and Hongjian Fang and Rui-Qi Wang and Renxing Chen and Yanan Zhu and Yi Chen and Peipei Yang and Xu-Yao Zhang", "abstract": "Large Vision Language Models (LVLMs) have achieved remarkable success in a range of downstream tasks that require multimodal interaction, but their capabilities come with substantial computational and memory overhead, which hinders practical deployment. Among numerous acceleration techniques, post-training quantization is a popular and effective strategy for reducing memory cost and accelerating inference. However, existing LVLM quantization methods typically measure token sensitivity at the modality level, which fails to capture the complex cross-token interactions and falls short in quantitatively measuring the quantization error at the token level. As tokens interact within the model, the distinction between modalities gradually diminishes, suggesting the need for fine-grained calibration. Inspired by axiomatic attribution in mechanistic interpretability, we introduce a fine-grained quantization strategy on Quantization-aware Integrated Gradients (QIG), which leverages integrated gradients to quantitatively evaluate token sensitivity and push the granularity from modality level to token level, reflecting both inter-modality and intra-modality dynamics. Extensive experiments on multiple LVLMs under both W4A8 and W3A16 settings show that our method improves accuracy across models and benchmarks with negligible latency overhead. For example, under 3-bit weight-only quantization, our method improves the average accuracy of LLaVA-onevision-7B by 1.60%, reducing the gap to its full-precision counterpart to only 1.33%. The code is available at https://github.com/ucas-xiang/QIG.", "link": "http://arxiv.org/abs/2603.17809v1", "date": "2026-03-18", "relevancy": 2.6716, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5415}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5415}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5199}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Fine-Grained%20Post-Training%20Quantization%20for%20Large%20Vision%20Language%20Models%20with%20Quantization-Aware%20Integrated%20Gradients&body=Title%3A%20Fine-Grained%20Post-Training%20Quantization%20for%20Large%20Vision%20Language%20Models%20with%20Quantization-Aware%20Integrated%20Gradients%0AAuthor%3A%20Ziwei%20Xiang%20and%20Fanhu%20Zeng%20and%20Hongjian%20Fang%20and%20Rui-Qi%20Wang%20and%20Renxing%20Chen%20and%20Yanan%20Zhu%20and%20Yi%20Chen%20and%20Peipei%20Yang%20and%20Xu-Yao%20Zhang%0AAbstract%3A%20Large%20Vision%20Language%20Models%20%28LVLMs%29%20have%20achieved%20remarkable%20success%20in%20a%20range%20of%20downstream%20tasks%20that%20require%20multimodal%20interaction%2C%20but%20their%20capabilities%20come%20with%20substantial%20computational%20and%20memory%20overhead%2C%20which%20hinders%20practical%20deployment.%20Among%20numerous%20acceleration%20techniques%2C%20post-training%20quantization%20is%20a%20popular%20and%20effective%20strategy%20for%20reducing%20memory%20cost%20and%20accelerating%20inference.%20However%2C%20existing%20LVLM%20quantization%20methods%20typically%20measure%20token%20sensitivity%20at%20the%20modality%20level%2C%20which%20fails%20to%20capture%20the%20complex%20cross-token%20interactions%20and%20falls%20short%20in%20quantitatively%20measuring%20the%20quantization%20error%20at%20the%20token%20level.%20As%20tokens%20interact%20within%20the%20model%2C%20the%20distinction%20between%20modalities%20gradually%20diminishes%2C%20suggesting%20the%20need%20for%20fine-grained%20calibration.%20Inspired%20by%20axiomatic%20attribution%20in%20mechanistic%20interpretability%2C%20we%20introduce%20a%20fine-grained%20quantization%20strategy%20on%20Quantization-aware%20Integrated%20Gradients%20%28QIG%29%2C%20which%20leverages%20integrated%20gradients%20to%20quantitatively%20evaluate%20token%20sensitivity%20and%20push%20the%20granularity%20from%20modality%20level%20to%20token%20level%2C%20reflecting%20both%20inter-modality%20and%20intra-modality%20dynamics.%20Extensive%20experiments%20on%20multiple%20LVLMs%20under%20both%20W4A8%20and%20W3A16%20settings%20show%20that%20our%20method%20improves%20accuracy%20across%20models%20and%20benchmarks%20with%20negligible%20latency%20overhead.%20For%20example%2C%20under%203-bit%20weight-only%20quantization%2C%20our%20method%20improves%20the%20average%20accuracy%20of%20LLaVA-onevision-7B%20by%201.60%25%2C%20reducing%20the%20gap%20to%20its%20full-precision%20counterpart%20to%20only%201.33%25.%20The%20code%20is%20available%20at%20https%3A//github.com/ucas-xiang/QIG.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17809v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFine-Grained%2520Post-Training%2520Quantization%2520for%2520Large%2520Vision%2520Language%2520Models%2520with%2520Quantization-Aware%2520Integrated%2520Gradients%26entry.906535625%3DZiwei%2520Xiang%2520and%2520Fanhu%2520Zeng%2520and%2520Hongjian%2520Fang%2520and%2520Rui-Qi%2520Wang%2520and%2520Renxing%2520Chen%2520and%2520Yanan%2520Zhu%2520and%2520Yi%2520Chen%2520and%2520Peipei%2520Yang%2520and%2520Xu-Yao%2520Zhang%26entry.1292438233%3DLarge%2520Vision%2520Language%2520Models%2520%2528LVLMs%2529%2520have%2520achieved%2520remarkable%2520success%2520in%2520a%2520range%2520of%2520downstream%2520tasks%2520that%2520require%2520multimodal%2520interaction%252C%2520but%2520their%2520capabilities%2520come%25 {"title": "Multi-Source Human-in-the-Loop Digital Twin Testbed for Connected and Autonomous Vehicles in Mixed Traffic Flow", "author": "Jianghong Dong and Jiawei Wang and Chunying Yang and Mengchi Cai and Chaoyi Chen and Qing Xu and Jianqiang Wang and Keqiang Li", "abstract": "In the emerging mixed traffic environments, Connected and Autonomous Vehicles (CAVs) have to interact with surrounding human-driven vehicles (HDVs). This paper introduces MSH-MCCT (Multi-Source Human-in-the-Loop Mixed Cloud Control Testbed), a novel CAV testbed that captures complex interactions between various CAVs and HDVs. Utilizing the Mixed Digital Twin concept, which combines Mixed Reality with Digital Twin, MSH-MCCT integrates physical, virtual, and mixed platforms, along with multi-source control inputs. Bridged by the mixed platform, MSH-MCCT allows human drivers and CAV algorithms to operate both physical and virtual vehicles within multiple fields of view. Particularly, this testbed facilitates the coexistence and real-time interaction of physical and virtual CAVs \\& HDVs, significantly enhancing the experimental flexibility and scalability. Experiments on vehicle platooning in mixed traffic showcase the potential of MSH-MCCT to conduct CAV testing with multi-source real human drivers in the loop through driving simulators of diverse fidelity. The videos for the experiments are available at our project website: https://dongjh20.github.io/MSH-MCCT.", "link": "http://arxiv.org/abs/2603.17751v1", "date": "2026-03-18", "relevancy": 2.6384, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5377}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5227}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5227}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multi-Source%20Human-in-the-Loop%20Digital%20Twin%20Testbed%20for%20Connected%20and%20Autonomous%20Vehicles%20in%20Mixed%20Traffic%20Flow&body=Title%3A%20Multi-Source%20Human-in-the-Loop%20Digital%20Twin%20Testbed%20for%20Connected%20and%20Autonomous%20Vehicles%20in%20Mixed%20Traffic%20Flow%0AAuthor%3A%20Jianghong%20Dong%20and%20Jiawei%20Wang%20and%20Chunying%20Yang%20and%20Mengchi%20Cai%20and%20Chaoyi%20Chen%20and%20Qing%20Xu%20and%20Jianqiang%20Wang%20and%20Keqiang%20Li%0AAbstract%3A%20In%20the%20emerging%20mixed%20traffic%20environments%2C%20Connected%20and%20Autonomous%20Vehicles%20%28CAVs%29%20have%20to%20interact%20with%20surrounding%20human-driven%20vehicles%20%28HDVs%29.%20This%20paper%20introduces%20MSH-MCCT%20%28Multi-Source%20Human-in-the-Loop%20Mixed%20Cloud%20Control%20Testbed%29%2C%20a%20novel%20CAV%20testbed%20that%20captures%20complex%20interactions%20between%20various%20CAVs%20and%20HDVs.%20Utilizing%20the%20Mixed%20Digital%20Twin%20concept%2C%20which%20combines%20Mixed%20Reality%20with%20Digital%20Twin%2C%20MSH-MCCT%20integrates%20physical%2C%20virtual%2C%20and%20mixed%20platforms%2C%20along%20with%20multi-source%20control%20inputs.%20Bridged%20by%20the%20mixed%20platform%2C%20MSH-MCCT%20allows%20human%20drivers%20and%20CAV%20algorithms%20to%20operate%20both%20physical%20and%20virtual%20vehicles%20within%20multiple%20fields%20of%20view.%20Particularly%2C%20this%20testbed%20facilitates%20the%20coexistence%20and%20real-time%20interaction%20of%20physical%20and%20virtual%20CAVs%20%5C%26%20HDVs%2C%20significantly%20enhancing%20the%20experimental%20flexibility%20and%20scalability.%20Experiments%20on%20vehicle%20platooning%20in%20mixed%20traffic%20showcase%20the%20potential%20of%20MSH-MCCT%20to%20conduct%20CAV%20testing%20with%20multi-source%20real%20human%20drivers%20in%20the%20loop%20through%20driving%20simulators%20of%20diverse%20fidelity.%20The%20videos%20for%20t {"title": "LoGSAM: Parameter-Efficient Cross-Modal Grounding for MRI Segmentation", "author": "Mohammad Robaitul Islam Bhuiyan and Sheethal Bhat and Melika Qahqaie and Tri-Thien Nguyen and Paula Andrea P\u00e9rez Toro and Tomas Arias Vergara and Andreas Maier", "abstract": "Precise localization and delineation of brain tumors using Magnetic Resonance Imaging (MRI) are essential for planning therapy and guiding surgical decisions. However, most existing approaches rely on task-specific supervised models and are constrained by the limited availability of annotated data. To address this, we propose LoGSAM, a parameter-efficient, detection-driven framework that transforms radiologist dictation into text prompts for foundation-model-based localization and segmentation. Radiologist speech is first transcribed and translated using a pretrained Whisper ASR model, followed by negation-aware clinical NLP to extract tumor-specific textual prompts. These prompts guide text-conditioned tumor localization via a LoRA-adapted vision-language detection model, Grounding DINO (GDINO). The LoRA adaptation updates using 5% of the model parameters, thereby enabling computationally efficient domain adaptation while preserving pretrained cross-modal knowledge. The predicted bounding boxes are used as prompts for MedSAM to generate pixel-level tumor masks without any additional fine-tuning. Conditioning the frozen MedSAM on LoGSAM-derived priors yields a state-of-the-art dice score of 80.32% on BRISC 2025. In addition, we evaluate the full pipeline using German dictations from a board-certified radiologist on 12 unseen MRI scans, achieving 91.7% case-level accuracy. These results highlight the feasibility of constructing a modular, speech-to-segmentation pipeline by intelligently leveraging pretrained foundation models with minimal parameter updates.", "link": "http://arxiv.org/abs/2603.17576v1", "date": "2026-03-18", "relevancy": 2.6359, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5272}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5272}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.527}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LoGSAM%3A%20Parameter-Efficient%20Cross-Modal%20Grounding%20for%20MRI%20Segmentation&body=Title%3A%20LoGSAM%3A%20Parameter-Efficient%20Cross-Modal%20Grounding%20for%20MRI%20Segmentation%0AAuthor%3A%20Mohammad%20Robaitul%20Islam%20Bhuiyan%20and%20Sheethal%20Bhat%20and%20Melika%20Qahqaie%20and%20Tri-Thien%20Nguyen%20and%20Paula%20Andrea%20P%C3%A9rez%20Toro%20and%20Tomas%20Arias%20Vergara%20and%20Andreas%20Maier%0AAbstract%3A%20Precise%20localization%20and%20delineation%20of%20brain%20tumors%20using%20Magnetic%20Resonance%20Imaging%20%28MRI%29%20are%20essential%20for%20planning%20therapy%20and%20guiding%20surgical%20decisions.%20However%2C%20most%20existing%20approaches%20rely%20on%20task-specific%20supervised%20models%20and%20are%20constrained%20by%20the%20limited%20availability%20of%20annotated%20data.%20To%20address%20this%2C%20we%20propose%20LoGSAM%2C%20a%20parameter-efficient%2C%20detection-driven%20framework%20that%20transforms%20radiologist%20dictation%20into%20text%20prompts%20for%20foundation-model-based%20localization%20and%20segmentation.%20Radiologist%20speech%20is%20first%20transcribed%20and%20translated%20using%20a%20pretrained%20Whisper%20ASR%20model%2C%20followed%20by%20negation-aware%20clinical%20NLP%20to%20extract%20tumor-specific%20textual%20prompts.%20These%20prompts%20guide%20text-conditioned%20tumor%20localization%20via%20a%20LoRA-adapted%20vision-language%20detection%20model%2C%20Grounding%20DINO%20%28GDINO%29.%20The%20LoRA%20adaptation%20updates%20using%205%25%20of%20the%20model%20parameters%2C%20thereby%20enabling%20computationally%20efficient%20domain%20adaptation%20while%20preserving%20pretrained%20cross-modal%20knowledge.%20The%20predicted%20bounding%20boxes%20are%20used%20as%20prompts%20for%20MedSAM%20to%20generate%20pixel-level%20tumor%20masks%20without%20any%20additional%20fine-tuning.%20Conditioning%20the%20frozen%20MedSAM%20on%20LoGSAM-derived%20priors%20yields%20a%20state-of-the-art%20dice%20score%20of%2080.32%25%20on%20BRISC%202025.%20In%20addition%2C%20we%20evaluate%20the%20full%20pipeline%20using%20German%20dictations%20from%20a%20board-certified%20radiologist%20on%2012%20unseen%20MRI%20scans%2C%20achieving%2091.7%25%20case-level%20accuracy.%20These%20results%20highlight%20the%20feasibility%20of%20constructing%20a%20modular%2C%20speech-to-segmentation%20pipeline%20by%20intelligently%20leveraging%20pretrained%20foundation%20models%20with%20minimal%20parameter%20updates.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17576v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLoGSAM%253A%2520Parameter-Efficient%2520Cross-Modal%2520Grounding%2520for%2520MRI%2520Segmentation%26entry.906535625%3DMohammad%2520Robaitul%2520Islam%2520Bhuiyan%2520and%2520Sheethal%2520Bhat%2520and%2520Melika%2520Qahqaie%2520and%2520Tri-Thien%2520Nguyen%2520and%2520Paula%2520Andrea%2520P%25C3%25A9rez%2520Toro%2520and%2520Tomas%2520Arias%2520Vergara%2520and%2520Andreas%2520Maier%26entry.1292438233%3DPrecise%2520localization%2520and%2520delineation%2520of%2520brain%2520tumors%2520using%2520Magnetic%2520Resonance%2520Imaging%2520%2528MRI%2529%2520are%2520essential%2520for%2520planning%2520therapy%2520and%2520guiding%2520surgical%2520decisions.%2520However%252C%2520most%2520existing%2520approaches%2520rely%2520on%2520task-specific%2520supervised%2520models%2520and%2520are%2520constrained%2520by%2520the%2520limited%2520availability%2520of%2520annotated%2520data.%2 {"title": "Skyfall-GS: Synthesizing Immersive 3D Urban Scenes from Satellite Imagery", "author": "Jie-Ying Lee and Yi-Ruei Liu and Shr-Ruei Tsai and Wei-Cheng Chang and Chung-Ho Wu and Jiewen Chan and Zhenjun Zhao and Chieh Hubert Lin and Yu-Lun Liu", "abstract": "Synthesizing large-scale, explorable, and geometrically accurate 3D urban scenes is a challenging yet valuable task for immersive and embodied applications. The challenge lies in the lack of large-scale and high-quality real-world 3D scans for training generalizable generative models. In this paper, we take an alternative route to create large-scale 3D scenes by leveraging readily available satellite imagery for realistic coarse geometry and open-domain diffusion models for high-quality close-up appearance synthesis. We propose Skyfall-GS, a novel hybrid framework that synthesizes immersive city-block scale 3D urban scenes by combining satellite reconstruction with diffusion refinement, eliminating the need for costly 3D annotations, and also featuring real-time, immersive 3D exploration. We tailor a curriculum-driven iterative refinement strategy to progressively enhance geometric completeness and photorealistic texture. Extensive experiments demonstrate that Skyfall-GS provides improved cross-view consistent geometry and more realistic textures compared to state-of-the-art approaches. Project page: https://skyfall-gs.jayinnn.dev/", "link": "http://arxiv.org/abs/2510.15869v3", "date": "2026-03-18", "relevancy": 2.6254, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6568}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6568}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6543}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5Bar 20provides%2520improved%2520cross-view%2520consistent%2520geometry%2520and%2520more%2520realistic%2520textures%2520compared%2520to%2520state-of-the-art%2520approaches.%2520Project%2520page%253A%2520https%253A//skyfall-gs.jayinnn.dev/%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.15869v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Skyfall-GS%3A%20Synthesizing%20Immersive%203D%20Urban%20Scenes%20from%20Satellite%20Imagery&entry.906535625=Jie-Ying%20Lee%20and%20Yi-Ruei%20Liu%20and%20Shr-Ruei%20Tsai%20and%20Wei-Cheng%20Chang%20and%20Chung-Ho%20Wu%20and%20Jiewen%20Chan%20and%20Zhenjun%20Zhao%20and%20Chieh%20Hubert%20Lin%20and%20Yu-Lun%20Liu&entry.1292438233=Synthesizing%20large-scale%2C%20explorable%2C%20and%20geometrically%20accurate%203D%20urban%20scenes%20is%20a%20challenging%20yet%20valuable%20task%20for%20immersive%20and%20embodied%20applications.%20The%20challenge%20lies%20in%20the%20lack%20of%20large-scale%20and%20high-quality%20real-world%203D%20scans%20for%20training%20generalizable%20generative%20models.%20In%20this%20paper%2C%20we%20take%20an%20alternative%20route%20to%20create%20large-scale%203D%20scenes%20by%20leveraging%20readily%20available%20satellite%20imagery%20for%20realistic%20coarse%20geometry%20and%20open-domain%20diffusion%20models%20for%20high-quality%20close-up%20appearance%20synthesis.%20We%20propose%20Skyfall-GS%2C%20a%20novel%20hybrid%20framework%20that%20synthesizes%20immersive%20city-block%20scale%203D%20urban%20scenes%20by%20combining%20satellite%20reconstruction%20with%20diffusion%20refinement%2C%20eliminating%20the%20need%20for%20costly%203D%20annotations%2C%20and%20also%20featuring%20real-time%2C%20immersive%203D%20exploration.%20We%20tailor%20a%20curriculum-driven%20iterative%20refinement%20strategy%20to%20progressively%20enhance%20geometric%20completeness%20and%20photorealistic%20texture.%20Extensive%20experiments%20demonstrate%20that%20Skyfall-GS%20provides%20improved%20cross-view%20consistent%20geometry%20and%20more%20realistic%20textures%20compared%20to%20state-of-the-art%20approaches.%20Project%20page%3A%20https%3A//skyfall-gs.jayinnn.dev/&entry.1838667208=http%3A//arxiv.org/abs/2510.15869v3&entry.124074799=Read"},
{"title": "RoboForge: Physically Optimized Text-guided Whole-Body Locomotion for Humanoids", "author": "Xichen Yuan and Zhe Li and Bofan Lyu and Kuangji Zuo and Yanshuo Lu and Gen Li and Jianfei Yang", "abstract": "While generative models have become effective at producing human-like motions from text, transferring these motions to humanoid robots for physical execution remains challenging. Existing pipelines are often limited by retargeting, where kinematic quality is undermined by physical infeasibility, contact-transition errors, and the high cost of real-world dynamical data. We present a unified latent-driven framework that bridges natural language and whole-body humanoid locomotion through a retarget-free, physics-optimized pipeline. Rather than treating generation and control as separate stages, our key insight is to couple them bidirectionally under physical constraints.We introduce a Physical Plausibility Optimization (PP-Opt) module as the coupling interface. In the forward direction, PP-Opt refines a teacher-student distillation policy with a plausibility-centric reward to suppress artifacts such as floating, skating, and penetration. In the backward direction, it converts reward-optimized simulation rollouts into high-quality explicit motion data, which is used to fine-tune the motion generator toward a more physically plausible latent distribution. This bidirectional design forms a self-improving cycle: the generator learns a physically grounded latent space, while the controller learns to execute latent-conditioned behaviors with dynamical integrity.Extensive experiments on the Unitree G1 humanoid show that our bidirectional optimization improves tracking accuracy and success rates. Across IsaacLab and MuJoCo, the implicit latent-driven pipeline consistently outperforms conventional explicit retargeting baselines in both precision and stability. By coupling diffusion-based motion generation with physical plausibility optimization, our framework provides a practical path toward deployable text-guided humanoid intelligence.", "link": "http://arxiv.org/abs/2603.17927v1", "date": "2026-03-18", "relevancy": 2.614, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6576}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6515}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6483}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RoboForge%3A%20Physically%20Optimized%20Text-guided%20Whole-Body%20Locomotion%20for%20Humanoids&body=Title%3A%20RoboForge%3A%20Physically%20Optimized%20Text-guided%20Whole-Body%20Locomotion%20for%20Humanoids%0AAuthor%3A%20Xichen%20Yuan%20and%20Zhe%20Li%20and%20Bofan%20Lyu%20and%20Kuangji%20Zuo%20and%20Yanshuo%20Lu%20and%20Gen%20Li%20and%20Jianfei%20Yang%0AAbstract%3A%20While%20generative%20models%20have%20become%20effective%20at%20producing%20human-like%20motions%20from%20text%2C%20transferring%20these%20motions%20to%20humanoid%20robots%20for%20physical%20execution%20remains%20challenging.%20Existing%20pipelines%20are%20often%20limited%20by%20retargeting%2C%20where%20kinematic%20quality%20is%20undermined%20by%20physical%20infeasibility%2C%20contact-transition%20errors%2C%20and%20the%20high%20cost%20of%20real-world%20dynamical%20data.%20We%20present%20a%20unified%20latent-driven%20framework%20that%20bridges%20natural%20language%20and%20whole-body%20humanoid%20locomotion%20through%20a%20retarget-free%2C%20physics-optimized%20pipeline.%20Rather%20than%20treating%20generation%20and%20control%20as%20separate%20stages%2C%20our%20key%20insight%20is%20to%20couple%20them%20bidirectionally%20under%20physical%20constraints.We%20introduce%20a%20Physical%20Plausibility%20Optimization%20%28PP-Opt%29%20module%20as%20the%20coupling%20interface.%20In%20the%20forward%20direction%2C%20PP-Opt%20refines%20a%20teacher-student%20distillation%20policy%20with%20a%20plausibility-centric%20reward%20to%20suppress%20artifacts%20such%20as%20floating%2C%20skating%2C%20and%20penetration.%20In%20the%20backward%20direction%2C%20it%20converts%20reward-optimized%20simulation%20rollouts%20into%20high-quality%20explicit%20motion%20data%2C%20which%20is%20used%20to%20fine-tune%20the%20motion%20generator%20toward%20a%20more%20physically%20plausible%20latent%20distribution.%20This%20bidirectional%20design%20forms%20a%20self-improving%20cycle%3A%20the%20generator%20learns%20a%20physically%20grounded%20latent%20space%2C%20while%20the%20controller%20learns%20to%20execute%20latent-conditioned%20behaviors%20with%20dynamical%20integrity.Extensive%20experiments%20on%20the%20Unitree%20G1%20humanoid%20show%20that%20our%20bidirectional%20optimization%20improves%20tracking%20accuracy%20and%20success%20rates.%20Across%20IsaacLab%20and%20MuJoCo%2C%20the%20implicit%20latent-driven%20pipeline%20consistently%20outperforms%20conventional%20explicit%20retargeting%20baselines%20in%20both%20precision%20and%20stability.%20By%20coupling%20diffusion-based%20motion%20generation%20with%20physical%20plausibility%20optimization%2C%20our%20framework%20provides%20a%20practical%20path%20toward%20deployable%20text-guided%20humanoid%20intelligence.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17927v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRoboForge%253A%2520Physically%2520Optimized%2520Text-guided%2520Whole-Body%2520Locomotion%2520for%2520Humanoids%26entry.906535625%3DXichen%2520Yuan%2520and%2520Zhe%2520Li%2520and%2520Bofan%2520Lyu%2520and%2520Kuangji%2520Zuo%2520and%2520Yanshuo%2520Lu%2520and%2520Gen%2520Li%2520and%2520Jianfei%2520Yang%26entry.1292438233%3DWhile%2520generative%2520models%2520have%2520become%2520effective%2520at%2520producing%2520human-like%2520motions%2520from%2520text%252C%2520transferring%2520these%2520motions%2520to%2520humanoid%2520robots%2520for%2520physical%2520execution%2520remains%2520challenging.%2520Existing%2520pipelines%2520are%2520often%2520limited%2520by%2520retargeting%252C%2520where%2520kinematic%2520quality%2520is%2520undermined%2520by%2520physical%2520infeasibility%252C%2520contact-transition%2520errors%252C%2520and%2520the%2520high%2520cost%2520of%2520real-world%2520dynamical%2520data.%2520We%2520present%2520a%2520unified%2520latent-driven%2520framework%2520that%2520bridges%2520natural%2520language%2520and%2520whole-body%2520humanoid%2520locomotion%2520through%2520a%2520retarget-free%252C%2520physics-optimized%2520pipeline.%2520Rather%2520than%2520treating%2520generation%2520and%2520control%2520as%2520separate%2520stages%252C%2520our%2520key%2520insight%2520is%2520to%2520couple%2520them%2520bidirectionally%2520under%2520physical%2520constraints.We%2520introduce%2520a%2520Physical%2520Plausibility%2520Optimization%2520%2528PP-Opt%2529%2520module%2520as%2520the%2520coupling%2520interface.%2520In%2520the%2520forward%2520direction%252C%2520PP-Opt%2520refines%2520a%2520teacher-student%2520distillation%2520policy%2520with%2520a%2520plausibility-centric%2520reward%2520to%2520suppress%2520artifacts%2520such%2520as%2520floating%252C%2520skating%252C%2520and%2520penetration.%2520In%2520the%2520backward%2520direction%252C%2520it%2520converts%2520reward-optimized%2520simulation%2520rollouts%2520into%2520high-quality%2520explicit%2520motion%2520data%252C%2520which%2520is%2520used%2520to%2520fine-tune%2520the%2520motion%2520generator%2520toward%2520a%2520more%2520physically%2520plausible%2520latent%2520distribution.%2520This%2520bidirectional%2520design%2520forms%2520a%2520self-improving%2520cycle%253A%2520the%2520generator%2520learns%2520a%2520physically%2520grounded%2520latent%2520space%252C%2520while%2520the%2520controller%2520learns%2520to%2520execute%2520latent-conditioned%2520behaviors%2520with%2520dynamical%2520integrity.Extensive%2520experiments%2520on%2520the%2520Unitree%2520G1%2520humanoid%2520show%2520that%2520our%2520bidirectional%2520optimization%2520improves%2520tracking%2520accuracy%2520and%2520success%2520rates.%2520Across%2520IsaacLab%2520and%2520MuJoCo%252C%2520the%2520implicit%2520latent-driven%2520pipeline%2520consistently%2520outperforms%2520conventional%2520explicit%2520retargeting%2520baselines%2520in%2520both%2520precision%2520and%2520stability.%2520By%2520coupling%2520diffusion-based%2520motion%2520generation%2520with%2520physical%2520plausibility%2520optimization%252C%2520our%2520framework%2520provides%2520a%2520practical%2520path%2520toward%2520deployable%2520text-guided%2520humanoid%2520intelligence.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.17927v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=RoboForge%3A%20Physically%20Optimized%20Text-guided%20Whole-Body%20Locomotion%20for%20Humanoids&entry.906535625=Xichen%20Yuan%20and%20Zhe%20Li%20and%20Bofan%20Lyu%20and%20Kuangji%20Zuo%20and%20Yanshuo%20Lu%20and%20Gen%20Li%20and%20Jianfei%20Yang&entry.1292438233=While%20generative%20models%20have%20become%20effective%20at%20producing%20human-like%20motions%20from%20text%2C%20transferring%20these%20motions%20to%20humanoid%20robots%20for%20physical%20execution%20remains%20challenging.%20Existing%20pipelines%20are%20often%20limited%20by%20retargeting%2C%20where%20kinematic%20quality%20is%20undermined%20by%20physical%20infeasibility%2C%20contact-transition%20errors%2C%20and%20the%20high%20cost%20of%20real-world%20dynamical%20data.%20We%20present%20a%20unified%20latent-driven%20framework%20that%20bridges%20natural%20language%20and%20whole-body%20humanoid%20locomotion%20through%20a%20retarget-free%2C%20physics-optimized%20pipeline.%20Rather%20than%20treating%20generation%20and%20control%20as%20separate%20stages%2C%20our%20key%20insight%20is%20to%20couple%20them%20bidirectionally%20under%20physical%20constraints.We%20introduce%20a%20Physical%20Plausibility%20Optimization%20%28PP-Opt%29%20module%20as%20the%20coupling%20interface.%20In%20the%20forward%20direction%2C%20PP-Opt%20refines%20a%20teacher-student%20distillation%20policy%20with%20a%20plausibility-centric%20reward%20to%20suppress%20artifacts%20such%20as%20floating%2C%20skating%2C%20and%20penetration.%20In%20the%20backward%20direction%2C%20it%20converts%20reward-optimized%20simulation%20rollouts%20into%20high-quality%20explicit%20motion%20data%2C%20which%20is%20used%20to%20fine-tune%20the%20motion%20generator%20toward%20a%20more%20physically%20plausible%20latent%20distribution.%20This%20bidirectional%20design%20forms%20a%20self-improving%20cycle%3A%20the%20generator%20learns%20a%20physically%20grounded%20latent%20space%2C%20while%20the%20controller%20learns%20to%20execute%20latent-conditioned%20behaviors%20with%20dynamical%20integrity.Extensive%20experiments%20on%20the%20Unitree%20G1%20humanoid%20show%20that%20our%20bidirectional%20optimization%20improves%20tracking%20accuracy%20and%20success%20rates.%20Across%20IsaacLab%20and%20MuJoCo%2C%20the%20implicit%20latent-driven%20pipeline%20consistently%20outperforms%20conventional%20explicit%20retargeting%20baselines%20in%20both%20precision%20and%20stability.%20By%20coupling%20diffusion-based%20motion%20generation%20with%20physical%20plausibility%20optimization%2C%20our%20framework%20provides%20a%20practical%20path%20toward%20deployable%20text-guided%20humanoid%20intelligence.&entry.1838667208=http%3A//arxiv.org/abs/2603.17927v1&entry.124074799=Read"},
{"title": "WeatherReasonSeg: A Benchmark for Weather-Aware Reasoning Segmentation in Visual Language Models", "author": "Wanjun Du and Zifeng Yuan and Tingting Chen and Fucai Ke and Beibei Lin and Shunli Zhang", "abstract": "Existing vision-language models (VLMs) have demonstrated impressive performance in reasoning-based segmentation. However, current benchmarks are primarily constructed from high-quality images captured under idealized conditions. This raises a critical question: when visual cues are severely degraded by adverse weather conditions such as rain, snow, or fog, can VLMs sustain reliable reasoning segmentation capabilities? In response to this challenge, we introduce WeatherReasonSeg, a benchmark designed to evaluate VLM performance in reasoning-based segmentation under adverse weather conditions. It consists of two complementary components. First, we construct a controllable reasoning dataset by applying synthetic weather with varying severity levels to existing segmentation datasets, enabling fine-grained robustness analysis. Second, to capture real-world complexity, we curate a real-world adverse-weather reasoning segmentation dataset with semantically consistent queries generated via mask-guided LLM prompting. We further broaden the evaluation scope across five reasoning dimensions, including functionality, application scenarios, structural attributes, interactions, and requirement matching. Extensive experiments across diverse VLMs reveal two key findings: (1) VLM performance degrades monotonically with increasing weather severity, and (2) different weather types induce distinct vulnerability patterns. We hope WeatherReasonSeg will serve as a foundation for advancing robust, weather-aware reasoning.", "link": "http://arxiv.org/abs/2603.17680v1", "date": "2026-03-18", "relevancy": 2.6103, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5258}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5258}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5147}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20WeatherReasonSeg%3A%20A%20Benchmark%20for%20Weather-Aware%20Reasoning%20Segmentation%20in%20Visual%20Language%20Models&body=Title%3A%20WeatherReasonSeg%3A%20A%20Benchmark%20for%20Weather-Aware%20Reasoning%20Segmentation%20in%20Visual%20Language%20Models%0AAuthor%3A%20Wanjun%20Du%20and%20Zifeng%20Yuan%20and%20Tingting%20Chen%20and%20Fucai%20Ke%20and%20Beibei%20Lin%20and%20Shunli%20Zhang%0AAbstract%3A%20Existing%20vision-language%20models%20%28VLMs%29%20have%20demonstrated%20impressive%20performance%20in%20reasoning-based%20segmentation.%20However%2C%20current%20benchmarks%20are%20primarily%20constructed%20from%20high-quality%20images%20captured%20under%20idealized%20conditions.%20This%20raises%20a%20critical%20question%3A%20when%20visual%20cues%20are%20severely%20degraded%20by%20adverse%20weather%20conditions%20such%20as%20rain%2C%20snow%2C%20or%20fog%2C%20can%20VLMs%20sustain%20reliable%20reasoning%20segmentation%20capabilities%3F%20In%20response%20to%20this%20challenge%2C%20we%20introduce%20WeatherReasonSeg%2C%20a%20benchmark%20designed%20to%20evaluate%20VLM%20performance%20in%20reasoning-based%20segmentation%20under%20adverse%20weather%20conditions.%20It%20consists%20of%20two%20complementary%20components.%20First%2C%20we%20construct%20a%20controllable%20reasoning%20dataset%20by%20applying%20synthetic%20weather%20with%20varying%20severity%20levels%20to%20existing%20segmentation%20datasets%2C%20enabling%20fine-grained%20robustness%20analysis.%20Second%2C%20to%20capture%20real-world%20complexity%2C%20we%20curate%20a%20real-world%20adverse-weather%20reasoning%20segmentation%20dataset%20with%20semantically%20consistent%20queries%20generated%20via%20mask-guided%20LLM%20prompting.%20We%20further%20broaden%20the%20evaluation%20scope%20across%20five%20reasoning%20dimensions%2C%20including%20functionality%2C%20application%20scenarios%2C%20structural%20attributes%2C%20interactions%2C%20and%20requirement%20matching.%20Extensive%20experiments%20across%20diverse%20VLMs%20reveal%20two%20key%20findings%3A%20%281%29%20VLM%20performance%20degrades%20monotonically%20with%20increasing%20weather%20severity%2C%20and%20%282%29%20different%20weather%20types%20induce%20distinct%20vulnerability%20patterns.%20We%20hope%20WeatherReasonSeg%20will%20serve%20as%20a%20foundation%20for%20advancing%20robust%2C%20weather-aware%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17680v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWeatherReasonSeg%253A%2520A%2520Benchmark%2520for%2520Weather-Aware%2520Reasoning%2520Segmentation%2520in%2520Visual%2520Language%2520Models%26entry.906535625%3DWanjun%2520Du%2520and%2520Zifeng%2520Yuan%2520and%2520Tingting%2520Chen%2520and%2520Fucai%2520Ke%2520and%2520Beibei%2520Lin%2520and%2520Shunli%2520Zhang%26entry.1292438233%3DExisting%2520vision-language%2520models%2520%2528VLMs%2529%2520have%2520demonstrated%2520impressive%2520performance%2520in%2520reasoning-based%2520segmentation.%2520However%252C%2520current%2520benchmarks%2520are%2520primarily%2520constructed%2520from%2520high-quality%2520images%2520captured%2520under%2520idealized%2520conditions.%2520This%2520raises%2520a%2520critical%2520question%253A%2520when%2520visual%2520cues%2520are%2520severely%2520degraded%2520by%2520adverse%2520weather%2520conditions%2520such%2520as%2520rain%252C%2520snow%252C%2520or%2520fog%252C%2520can%2520VLMs%2520sustain%2520reliable%2520re {"title": "ResNet-50 with Class Reweighting and Anatomy-Guided Temporal Decoding for Gastrointestinal Video Analysis", "author": "Romil Imtiaz and Dimitris K. Iakovidis", "abstract": "We developed a multi-label gastrointestinal video analysis pipeline based on a ResNet-50 frame classifier followed by anatomy-guided temporal event decoding. The system predicts 17 labels, including 5 anatomy classes and 12 pathology classes, from frames resized to 336x336. A major challenge was severe class imbalance, particularly for rare pathology labels. To address this, we used clipped class-wise positive weighting in the training loss, which improved rare-class learning while maintaining stable optimization. At the temporal stage, we found that direct frame-to-event conversion produced fragmented mismatches with the official ground truth. The final submission therefore combined GT-style framewise event composition, anatomy vote smoothing, and anatomy-based pathology gating with a conservative hysteresis decoder. This design improved the final temporal mAP from 0.3801 to 0.4303 on the challenge test set.", "link": "http://arxiv.org/abs/2603.17784v1", "date": "2026-03-18", "relevancy": 2.5979, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5417}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5122}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5048}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ResNet-50%20with%20Class%20Reweighting%20and%20Anatomy-Guided%20Temporal%20Decoding%20for%20Gastrointestinal%20Video%20Analysis&body=Title%3A%20ResNet-50%20with%20Class%20Reweighting%20and%20Anatomy-Guided%20Temporal%20Decoding%20for%20Gastrointestinal%20Video%20Analysis%0AAuthor%3A%20Romil%20Imtiaz%20and%20Dimitris%20K.%20Iakovidis%0AAbstract%3A%20We%20developed%20a%20multi-label%20gastrointestinal%20video%20analysis%20pipeline%20based%20on%20a%20ResNet-50%20frame%20classifier%20followed%20by%20anatomy-guided%20temporal%20event%20decoding.%20The%20system%20predicts%2017%20labels%2C%20including%205%20anatomy%20classes%20and%2012%20pathology%20classes%2C%20from%20frames%20resized%20to%20336x336.%20A%20major%20challenge%20was%20severe%20class%20imbalance%2C%20particularly%20for%20rare%20pathology%20labels.%20To%20address%20this%2C%20we%20used%20clipped%20class-wise%20positive%20weighting%20in%20the%20training%20loss%2C%20which%20improved%20rare-class%20learning%20while%20maintaining%20stable%20optimization.%20At%20the%20temporal%20stage%2C%20we%20found%20that%20direct%20frame-to-event%20conversion%20produced%20fragmented%20mismatches%20with%20the%20official%20ground%20truth.%20The%20final%20submission%20therefore%20combined%20GT-style%20framewise%20event%20composition%2C%20anatomy%20vote%20smoothing%2C%20and%20anatomy-based%20pathology%20gating%20with%20a%20conservative%20hysteresis%20decoder.%20This%20design%20improved%20the%20final%20temporal%20mAP%20from%200.3801%20to%200.4303%20on%20the%20challenge%20test%20set.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17784v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DResNet-50%2520with%2520Class%2520Reweighting%2520and%2520Anatomy-Guided%2520Temporal%2520Decoding%2520for%2520Gastrointestinal%2520Video%2520Analysis%26entry.906535625%3DRomil%2520Imtiaz%2520and%2520Dimitris%2520K.%2520Iakovidis%26entry.1292438233%3DWe%2520developed%2520a%2520multi-label%2520gastrointestinal%2520video%2520analysis%2520pipeline%2520based%2520on%2520a%2520ResNet-50%2520frame%2520classifier%2520followed%2520by%2520anatomy-guided%2520temporal%2520event%2520decoding.%2520The%2520system%2520predicts%252017%2520labels%252C%2520including%25205%2520anatomy%2520classes%2520and%252012%2520pathology%2520classes%252C%2520from%2520frames%2520resized%2520to%2520336x336.%2520A%2520major%2520challenge%2520was%2520severe%2520class%2520imbalance%252C%2520particularly%2520for%2520rare%2520pathology%2520labels.%2520To%2520address%2520this%252C%2520we%2520used%2520clipped%2520class-wise%2520positive%2520weighting%2520in%2520the%2520training%2520loss%252C%2520which%2520improved%2520rare-class%2520learning%2520while%2520maintaining%2520stable%2520optimization.%2520At%2520the%2520temporal%2520stage%252C%2520we%2520found%2520that%2520direct%2520frame-to-event%2520conversion%2520produced%2520fragmented%2520mismatches%2520with%2520the%2520official%2520ground%2520truth.%2520The%2520final%2520submission%2520therefore%2520combined%2520GT-style%2520framewise%2520event%2520composition%252C%2520anatomy%2520vote%2520smoothing%252C%2520and%2520anatomy-based%2520pathology%2520gating%2520with%2520a%2520conservative%2520hysteresis%2520decoder.%2520This%2520design%2520improved%2520the%2520final%2520temporal%2520mAP%2520from%25200.3801%2520to%25200.4303%2520on%2520the%2520challenge%2520test%2520set.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.17784v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ResNet-50%20with%20Class%20Reweighting%20and%20Anatomy-Guided%20Temporal%20Decoding%20for%20Gastrointestinal%20Video%20Analysis&entry.906535625=Romil%20Imtiaz%20and%20Dimitris%20K.%20Iakovidis&entry.1292438233=We%20developed%20a%20multi-label%20gastrointestinal%20video%20analysis%20pipeline%20based%20on%20a%20ResNet-50%20frame%20classifier%20followed%20by%20anatomy-guided%20temporal%20event%20decoding.%20The%20system%20predicts%2017%20labels%2C%20including%205%20anatomy%20classes%20and%2012%20pathology%20classes%2C%20from%20frames%20resized%20to%20336x336.%20A%20major%20challenge%20was%20severe%20class%

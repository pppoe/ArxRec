inate%20generation%2C%20symmetry-consistent%20message%20passing%2C%20and%20physics%20residual%20constraints.%20In%20addition%2C%20SymPINN%20improves%20training%20effectiveness%20by%20encoding%20initial%20conditions%20as%20hard%20constraints%2C%20incorporating%20Fourier%20feature%20encoding%20to%20enhance%20the%20representation%20of%20dynamic%20motions%2C%20and%20employing%20a%20two-stage%20optimization%20strategy.%20Extensive%20numerical%20experiments%20on%20symmetric%20T-bars%20and%20lander%20structures%20demonstrate%20significantly%20improved%20prediction%20accuracy%20and%20computational%20efficiency%20compared%20to%20standard%20physics-informed%20models%2C%20indicating%20the%20great%20potential%20of%20symmetry-aware%20learning%20for%20structure-preserving%20modeling%20of%20tensegrity%20dynamics.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17824v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSymmetry-Reduced%2520Physics-Informed%2520Learning%2520of%2520Tensegrity%2520Dynamics%26entry.906535625%3DJing%2520Qin%2520and%2520Muhao%2520Chen%26entry.1292438233%3DTensegrity%2520structures%2520possess%2520intrinsic%2520geometric%2520symmetries%2520that%2520govern%2520their%2520dynamic%2520behavior.%2520However%252C%2520most%2520existing%2520physics-informed%2520neural%2520network%2520%2528PINN%2529%2520approaches%2520for%2520tensegrity%2520dynamics%2520do%2520not%2520explicitly%2520exploit%2520these%2520symmetries%252C%2520leading%2520to%2520high%2520computational%2520complexity%2520and%2520unstable%2520optimization.%2520In%2520this%2520work%252C%2520we%2520propose%2520a%2520symmetry-reduced%2520physics-informed%2520neural%2520network%2520%2528SymPINN%2529%2520framework%2520that%2520embeds%2520group-theory-based%2520symmetry%2520directly%2520into%2520both%2520the%2520solution%2520expression%2520and%2520the%2520neural%2520network%2520architecture%2520to%2520predict%2520tensegrity%2520dynam {"title": "DancingBox: A Lightweight MoCap System for Character Animation from Physical Proxies", "author": "Haocheng Yuan and Adrien Bousseau and Hao Pan and Lei Zhong and Changjian Li", "abstract": "Creating compelling 3D character animations typically requires either expert use of professional software or expensive motion capture systems operated by skilled actors. We present DancingBox, a lightweight, vision-based system that makes motion capture accessible to novices by reimagining the process as digital puppetry. Instead of tracking precise human motions, DancingBox captures the approximate movements of everyday objects manipulated by users with a single webcam. These coarse proxy motions are then refined into realistic character animations by conditioning a generative motion model on bounding-box representations, enriched with human motion priors learned from large-scale datasets. To overcome the lack of paired proxy-animation data, we synthesize training pairs by converting existing motion capture sequences into proxy representations. A user study demonstrates that DancingBox enables intuitive and creative character animation using diverse proxies, from plush toys to bananas, lowering the barrier to entry for novice animators.", "link": "http://arxiv.org/abs/2603.17704v1", "date": "2026-03-18", "relevancy": 2.3829, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6323}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5767}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5521}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DancingBox%3A%20A%20Lightweight%20MoCap%20System%20for%20Character%20Animation%20from%20Physical%20Proxies&body=Title%3A%20DancingBox%3A%20A%2 {"title": "PanoVGGT: Feed-Forward 3D Reconstruction from Panoramic Imagery", "author": "Yijing Guo and Mengjun Chao and Luo Wang and Tianyang Zhao and Haizhao Dai and Yingliang Zhang and Jingyi Yu and Yujiao Shi", "abstract": "Panoramic imagery offers a full 360\u00b0 field of view and is increasingly common in consumer devices. However, it introduces non-pinhole distortions that challenge joint pose estimation and 3D reconstruction. Existing feed-forward models, built for perspective cameras, generalize poorly to this setting. We propose PanoVGGT, a permutation-equivariant Transformer framework that jointly predicts camera poses, depth maps, and 3D point clouds from one or multiple panoramas in a single forward pass. The model incorporates spherical-aware positional embeddings and a panorama-specific three-axis SO(3) rotation augmentation, enabling effective geometric reasoning in the spherical domain. To resolve inherent global-frame ambiguity, we further introduce a stochastic anchoring strategy during training. In addition, we contribute PanoCity, a large-scale outdoor panoramic dataset with dense depth and 6-DoF pose annotations. Extensive experiments on PanoCity and standard benchmarks demonstrate that PanoVGGT achieves competitive accuracy, strong robustness, and improved cross-domain generalization. Code and dataset will be released.", "link": "http://arxiv.org/abs/2603.17571v1", "date": "2026-03-18", "relevancy": 2.3799, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6017}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5967}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5876}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PanoVGGT%3A%20Feed-Forward%203D%20Reconstruction%20from%20Panoramic%20Imagery&body=Title%3A%20PanoVGGT%3A%20Feed-Forward%203D%20Reconstruction%20from%20Panoramic%20Imagery%0AAuthor%3A%20Yijing%20Guo%20and%20Mengjun%20Chao%20and%20Luo%20Wang%20and%20Tianyang%20Zhao%20and%20Haizhao%20Dai%20and%20Yingliang%20Zhang%20and%20Jingyi%20Yu%20and%20Yujiao%20Shi%0AAbstract%3A%20Panoramic%20imagery%20offers%20a%20full%20360%C2%B0%20field%20of%20view%20and%20is%20increasingly%20common%20in%20consumer%20devices.%20However%2C%20it%20introduces%20non-pinhole%20distortions%20that%20challenge%20joint%20pose%20estimation%20and%203D%20reconstruction.%20Existing%20feed-forward%20models%2C%20built%20for%20perspective%20cameras%2C%20generalize%20poorly%20to%20this%20setting.%20We%20propose%20PanoVGGT%2C%20a%20permutation-equivariant%20Transformer%20framework%20that%20jointly%20predicts%20camera%20poses%2C%20depth%20maps%2C%20and%203D%20point%20clouds%20from%20one%20or%20multiple%20panoramas%20in%20a%20single%20forward%20pass.%20The%20model%20incorporates%20spherical-aware%20positional%20embeddings%20and%20a%20panorama-specific%20three-axis%20SO%283%29%20rotation%20augmentation%2C%20enabling%20effective%20geometric%20reasoning%20in%20the%20spherical%20domain.%20To%20resolve%20inherent%20global-frame%20ambiguity%2C%20we%20further%20introduce%20a%20stochastic%20anchoring%20strategy%20during%20training.%20In%20addition%2C%20we%20contribute%20PanoCity%2C%20a%20large-scale%20outdoor%20panoramic%20dataset%20with%20dense%20depth%20and%206-DoF%20pose%20annotations.%20Extensive%20experiments%20on%20PanoCity%20and%20standard%20benchmarks%20demonstrate%20that%20PanoVGGT%20achieves%20competitive%20accuracy%2C%20strong%20robustness%2C%20and%20improved%20cross-domain%20generalization.%20Code%20and%20dataset%20will%20be%20released.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17571v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.13809298 -domain%20generalization.%20Code%20and%20dataset%20will%20be%20released.&entry.1838667208=http%3A//arxiv.org/abs/2603.17571v1&entry.124074799=Read"},
{"title": "Differential Privacy in Generative AI Agents: Analysis and Optimal Tradeoffs", "author": "Ya-Ting Yang and Quanyan Zhu", "abstract": "Large language models (LLMs) and AI agents are increasingly integrated into enterprise systems to access internal databases and generate context-aware responses. While such integration improves productivity and decision support, the model outputs may inadvertently reveal sensitive information. Although many prior efforts focus on protecting the privacy of user prompts, relatively few studies consider privacy risks from the enterprise data perspective. Hence, this paper develops a probabilistic framework for analyzing privacy leakage in AI agents based on differential privacy. We model response generation as a stochastic mechanism that maps prompts and datasets to distributions over token sequences. Within this framework, we introduce token-level and message-level differential privacy and derive privacy bounds that relate privacy leakage to generation parameters such as temperature and message length. We further formulate a privacy-utility design problem that characterizes optimal temperature selection.", "link": "http://arxiv.org/abs/2603.17902v1", "date": "2026-03-18", "relevancy": 2.3732, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4891}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4752}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4597}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Differential%20Privacy%20in%20Generative%20AI%20Agents%3A%20Analysis%20and%20Optimal%20Tradeoffs&body=Title%3A%20Differential%20Privacy%20in%20Generative%20AI%20Agents%3A%20Analysis%20and%20Optimal%20Tradeoffs%0AAuthor%3A%20Ya-Ting%20Yang%20and%20Quanyan%20Zhu%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20and%20AI%20agents%20are%20increasingly%20integrated%20into%20enterprise%20systems%20to%20access%20internal%20databases%20and%20generate%20context-aware%20responses.%20While%20such%20integration%20improves%20productivity%20and%20decision%20support%2C%20the%20model%20outputs%20may%20inadvertently%20reveal%20sensitive%20information.%20Although%20many%20prior%20efforts%20focus%20on%20protecting%20the%20privacy%20of%20user%20prompts%2C%20relatively%20few%20studies%20consider%20privacy%20risks%20from%20the%20enterprise%20data%20perspective.%20Hence%2C%20this%20paper%20develops%20a%20probabilistic%20framework%20for%20analyzing%20privacy%20leakage%20in%20AI%20agents%20based%20on%20differential%20privacy.%20We%20model%20response%20generation%20as%20a%20stochastic%20mechanism%20that%20maps%20prompts%20and%20datasets%20to%20distributions%20over%20token%20sequences.%20Within%20this%20framework%2C%20we%20introduce%20token-level%20and%20message-level%20differential%20privacy%20and%20derive%20privacy%20bounds%20that%20relate%20privacy%20leakage%20to%20generation%20parameters%20such%20as%20temperature%20and%20message%20length.%20We%20further%20formulate%20a%20privacy-utility%20design%20problem%20that%20characterizes%20optimal%20temperature%20selection.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17902v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDifferential%2520Privacy%2520in%2520Generative%2520AI%2520Agents%253A%2520Analysis%2520and%2520Optimal%2520Tradeoffs%26entry.906535625%3DYa-Ting%2520Yang%2520and%2520Quanyan%2520Zhu%26entry.1292438233%3DLarge%2520language%2520models%2520%2528LLMs%2529%2520and%2520AI%2520agents%2520are%2520increasingly%2520integrated%2520into%2520enterprise%2520systems%2520to%2520access%2520internal%2520databases%2520and%2520generate%2520context-aware%2520responses.%2520While%2520such%2520integration%2520improves%2520productivity%2520and%2520decision%2520support%252C%2520the%2520model%2520outputs%2520may%2520inadvertently%2520reveal%2520sensitive%2520information.%2520Although%2520many%2520prior%2520efforts%2520focus%2520on%2520protecting%2520the%2520privacy%2520of%2520user%2520prompts%252C%2520relatively%2520few%2520studies%2520consider%2520privacy%2520risks%2520from%2520the%2520enterprise%2520data%2520perspective.%2520Hence%252C%2520this%2520paper%2520develops%2520a%2520probabilistic%2520framework%2520for%2520analyzing%2520privacy%2520leakage%2520in%2520AI%2520agents%2520based%2520on%2520differential%2520privacy.%2520We%2520model%2520response%2520generation%2520as%2520a%2520stochastic%2520mechanism%2520that%2520maps%2520prompts%2520and%2520datasets%2520to%2520distributions%2520over%2520token%2520sequences.%2520Within%2520this%2520framework%252C%2520we%2520introduce%2520token-level%2520and%2520message-level%2520differential%2520privacy%2520and%2520derive%2520privacy%2520bounds%2520that%2520relate%2520privacy%2520leakage%2520to%2520generation%2520parameters%2520such%2520as%2520temperature%2520and%2520message%2520length.%2520We%2520further%2520formulate%2520a%2520privacy-utility%2520design%2520problem%2520that%2520characterizes%2520optimal%2520temperature%2520selection.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.17902v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Differential%20Privacy%20in%20Generative%20AI%20Agents%3A%20Analysis%20and%20Optimal%20Tradeoffs&entry.906535625=Ya-Ting%20Yang%20and%20Quanyan%20Zhu&entry.1292438233=Large%20language%20models%20%28LLMs%29%20and%20AI%20agents%20are%20increasingly%20integrated%20into%20enterprise%20systems%20to%20access%20internal%20databases%20and%20generate%20context-aware%20responses.%20While%20such%20integration%20improves%20productivity%20and%20decision%20support%2C%20the%20model%20outputs%20may%20inadvertently%20reveal%20sensitive%20information.%20Although%20many%20prior%20efforts%20focus%20on%20protecting%20the%20privacy%20of%20user%20prompts%2C%20relatively%20few%20studies%20consider%20privacy%20risks%20from%20the%20enterprise%20data%20perspective.%20Hence%2C%20this%20paper%20develops%20a%20probabilistic%20framework%20for%20analyzing%20privacy%20leakage%20in%20AI%20agents%20based%20on%20differential%20privacy.%20We%20model%20response%20generation%20as%20a%20stochastic%20mechanism%20that%20maps%20prompts%20and%20datasets%20to%20distributions%20over%20token%20sequences.%20Within%20this%20framework%2C%20we%20introduce%20token-level%20and%20message-level%20differential%20privacy%20and%20derive%20privacy%20bounds%20that%20relate%20privacy%20leakage%20to%20generation%20parameters%20such%20as%20temperature%20and%20message%20length.%20We%20further%20formulate%20a%20privacy-utility%20design%20problem%20that%20characterizes%20optimal%20temperature%20selection.&entry.1838667208=http%3A//arxiv.org/abs/2603.17902v1&entry.124074799=Read"},
{"title": "OccTENS: 3D Occupancy World Model via Temporal Next-Scale Prediction", "author": "Bu Jin and Songen Gu and Xiaotao Hu and Yupeng Zheng and Xiaoyang Guo and Qian Zhang and Xiaoxiao Long and Wei Yin", "abstract": "In this paper, we propose OccTENS, a generative occupancy world model that enables controllable, high-fidelity long-term occupancy generation while maintaining computational efficiency. Different from visual generation, the occupancy world model must capture the fine-grained 3D geometry and dynamic evolution of the 3D scenes, posing great challenges for the generative models. Recent approaches based on autoregression (AR) have demonstrated the potential to predict vehicle movement and future occupancy scenes simultaneously from historical observations, but they typically suffer from \\textbf{inefficiency}, \\textbf{temporal degradation} in long-term generation and \\textbf{lack of controllability}. To holistically address these issues, we reformulate the occupancy world model as a temporal next-scale prediction (TENS) task, which decomposes the temporal sequence modeling problem into the modeling of spatial scale-by-scale generation and temporal scene-by-scene prediction. With a \\textbf{TensFormer}, OccTENS can effectively manage the temporal causality and spatial relationships of occupancy sequences in a flexible and scalable way. To enhance the pose controllability, we further propose a holistic pose aggregation strategy, which features a unified sequence modeling for occupancy and ego-motion. Experiments show that OccTENS outperforms the state-of-the-art method with both higher occupancy quality and faster inference time.", "link": "http://arxiv.org/abs/2509.03887v2", "date": "2026-03-18", "relevancy": 2.3699, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5988}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5968}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5857}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OccTENS%3A%203D%20Occupancy%20World%20Model%20via%20Temporal%20Next-Scale%20Prediction&body=Title%3A%20OccTENS%3A%203D%20Occupancy%20World%20Model%20via%20Temporal%20Next-Scale%20Prediction%0AAuthor%3A%20Bu%20Jin%20and%20Songen%20Gu%20and%20Xiaotao%20Hu%20and%20Yupeng%20Zheng%20and%20Xiaoyang%20Guo%20and%20Qian%20Zhang%20and%20Xiaoxiao%20Long%20and%20Wei%20Yin%0AAbstract%3A%20In%20this%20paper%2C%20we%20propose%20OccTENS%2C%20a%20generative%20occupancy%20world%20model%20that%20enables%20controllable%2C%20high-fidelity%20long-term%20occupancy%20generation%20while%20maintaining%20computational%20efficiency.%20Different%20from%20visual%20generation%2C%20the%20occupancy%20world%20model%20must%20capture%20the%20fine-grained%203D%20geometry%20and%20dynamic%20evolution%20of%20the%203D%20scenes%2C%20posing%20great%20challenges%20for%20the%20generative%20models.%20Recent%20approaches%20based%20on%20autoregression%20%28AR%29%20have%20demonstrated%20the%20potential%20to%20predict%20vehicle%20movement%20and%20future%20occupancy%20scenes%20simultaneously%20from%20historical%20observations%2C%20but%20they%20typically%20suffer%20from%20%5Ctextbf%7Binefficiency%7D%2C%20%5Ctextbf%7Btemporal%20degradation%7D%20in%20long-term%20generation%20and%20%5Ctextbf%7Black%20of%20controllability%7D.%20To%20holistically%20address%20these%20issues%2C%20we%20reformulate%20the%20occupancy%20world%20model%20as%20a%20temporal%20next-scale%20prediction%20%28TENS%29%20task%2C%20which%20decomposes%20the%20temporal%20sequence%20modeling%20problem%20into%20the%20modeling%20of%20spatial%20scale-by-scale%20generation%20and%20temporal%20scene-by-scene%20prediction.%20With%20a%20%5Ctextbf%7BTensFormer%7D%2C%20OccTENS%20can%20effectively%20manage%20the%20temporal%20causality%20and%20spatial%20relationships%20of%20occupancy%20sequences%20in%20a%20flexible%20and%20scalable%20way.%20To%20enhance%20the%20pose%20controllability%2C%20we%20further%20propose%20a%20holistic%20pose%20aggregation%20strategy%2C%20which%20features%20a%20unified%20sequence%20modeling%20for%20occupancy%20and%20ego-motion.%20Experiments%20show%20that%20OccTENS%20outperforms%20the%20state-of-the-art%20method%20with%20both%20higher%20occupancy%20quality%20and%20faster%20inference%20time.%0ALink%3A%20http%3A//arxiv.org/abs/2509.03887v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOccTENS%253A%25203D%2520Occupancy%2520World%2520Model%2520via%2520Temporal%2520Next-Scale%2520Prediction%26entry.906535625%3DBu%2520Jin%2520and%2520Songen%2520Gu%2520and%2520Xiaotao%2520Hu%2520and%2520Yupeng%2520Zheng%2520and%2520Xiaoyang%2520Guo%2520and%2520Qian%2520Zhang%2520and%2520Xiaoxiao%2520Long%2520and%2520Wei%2520Yin%26entry.1292438233%3DIn%2520this%2520paper%252C%2520we%2520propose%2520OccTENS%252C%2520a%2520generative%2520occupancy%2520world%2520model%2520that%2520enables%2520controllable%252C%2520high-fidelity%2520long-term%2520occupancy%2520generation%2520while%2520maintaining%2520computational%2520efficiency.%2520Different%2520from%2520visual%2520generation%252C%2520the%2520occupancy%2520world%2520model%2520must%2520capture%2520the%2520fine-grained%25203D%2520geometry%2520and%2520dynamic%2520evolution%2520of%2520the%25203D%2520scenes%252C%2520posing%2520great%2520challenges%2520for%2520the%2520generative%2520models.%2520Recent%2520approaches%2520based%2520on%2520autoregression%2520%2528AR%2529%2520have%2520demonstrated%2520the%2520potential%2520to%2520predict%2520vehicle%2520movement%2520and%2520future%2520occupancy%2520scenes%2520simultaneously%2520from%2520historical%2520observations%252C%2520but%2520they%2520typically%2520suffer%2520from%2520%255Ctextbf%257Binefficiency%257D%252C%2520%255Ctextbf%257B {"title": "SAATT Nav: a Socially Aware Autonomous Transparent Transportation Navigation Framework for Wheelchairs", "author": "Yutong Zhang and Shaiv Y. Mehra and Bradley S. Duerstock and Juan P. Wachs", "abstract": "While powered wheelchairs reduce physical fatigue as opposed to manual wheelchairs for individuals with mobility impairment, they demand high cognitive workload due to information processing, decision making and motor coordination. Current autonomous systems lack social awareness in navigation and transparency in decision-making, leading to decreased perceived safety and trust from the user and others in context. This work proposes Socially Aware Autonomous Transparent Transportation (SAATT) Navigation framework for wheelchairs as a potential solution. By implementing a Large Language Model (LLM) informed of user intent and capable of predicting other peoples' intent as a decision-maker for its local controller, it is able to detect and navigate social situations, such as passing pedestrians or a pair conversing. Furthermore, the LLM textually communicates its reasoning at each waypoint for transparency. In this experiment, it is compared against a standard global planner, a representative competing social navigation model, and an Ablation study in three simulated environments varied by social levels in eight metrics categorized under Safety, Social Compliance, Efficiency, and Comfort. Overall, SAATT Nav outperforms in most social situations and equivalently or only slightly worse in the remaining metrics, demonstrating the potential of a socially aware and transparent autonomous navigation system to assist wheelchair users.", "link": "http://arxiv.org/abs/2603.13698v2", "date": "2026-03-18", "relevancy": 2.3675, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.6856}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.535}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5209}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SAATT%20Nav%3A%20a%20Socially%20Aware%20Autonomous%20Transparent%20Transportation%20Navigation%20Framework%20for%20Wheelchairs&body=Title%3A%20SAATT%20Nav%3A%20a%20Socially%20Aware%20Autonomous%20Transparent%20Transportation%20Navigation%20Framework%20for%20Wheelchairs%0AAuthor%3A%20Yutong%20Zhang%20and%20Shaiv%20Y.%20Mehra%20and%20Bradley%20S.%20Duerstock%20and%20Juan%20P.%20Wachs%0AAbstract%3A%20While%20powered%20wheelchairs%20reduce%20physical%20fatigue%20as%20opposed%20to%20manual%20wheelchairs%20for%20individuals%20with%20mobility%20impairment%2C%20they%20demand%20high%20cognitive%20workload%20due%20to%20information%20processing%2C%20decision%20making%20and%20motor%20coordination.%20Current%20autonomous%20systems%20lack%20social%20awareness%20in%20navigation%20and%20transparency%20in%20decision-making%2C%20leading%20to%20decreased%20perceived%20safety%20and%20trust%20from%20the%20user%20and%20others%20in%20context.%20This%20work%20proposes%20Socially%20Aware%20Autonomous%20Transparent%20Transportation%20%28SAATT%29%20Navigation%20framework%20for%20wheelchairs%20as%20a%20potential%20solution.%20By%20implementing%20a%20Large%20Language%20Model%20%28LLM%29%20informed%20of%20user%20intent%20and%20capable%20of%20predicting%20other%20peoples%27%20intent%20as%20a%20decision-maker%20for%20its%20local%20controller%2C%20it%20is%20able%20to%20detect%20and%20navigate%20social%20situations%2C%20such%20as%20passing%20pedestrians%20or%20a%20pair%20conversing.%20Furthermore%2C%20the%20LLM%20textually%20communicates%20its%20reasoning%20at%20each%20waypoint%20for%20transparency.%20In%20this%20experiment%2C%20it%20is%20compared%20against%20a%20standard%20global%20planner%2C%20a%20representative%20competing%20social%20navigation%20model%2C%20and%20an%20Ablation%20study%20in%20three%20simulated%20environments%20varied%20by%20social%20levels%20in%20eight%20metrics%20categorized%20under%20Safety%2C%20Social%20Compliance%2C%20Efficiency%2C%20and%20Comfort.%20Overall%2C%20SAATT%20Nav%20outperforms%20in%20most%20social%20situations%20and%20equivalently%20or%20only%20slightly%20worse%20in%20the%20remaining%20metrics%2C%20demonstrating%20the%20potential%20of%20a%20socially%20aware%20and%20transparent%20autonomous%20navigation%20system%20to%20assist%20wheelchair%20users.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13698v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSAATT%2520Nav%253A%2520a%2520Socially%2520Aware%2520Autonomous%2520Transparent%2520Transportation%2520Navigation%2520Framework%2520for%2520Wheelchairs%26entry.906535625%3DYutong%2520Zhang%2520and%2520Shaiv%2520Y.%2520Mehra%2520and%2520Bradley%2520S.%2520Duerstock%2520and%2520Juan%2520P.%2520Wachs%26entry.1292438233%3DWhile%2520powered%2520wheelchairs%2520reduce%2520physical%2520fatigue%2520as%2520opposed%2520to%2520manual%2520wheelchairs%2520for%2520individuals%2520with%2520mobility%2520impairment%252C%2520they%2520demand%2520high%2520cognitive%2520workload%2520due%2520to%2520information%2520processing%252C%2520decision%2520making%2520and%2520motor%2520coordination.%2520Current%2520autonomous%2520systems%2520lack%2520social%2520awareness%2520in%2520navigation%2520and%2520transparency%2520in%2520decision-making%252C%2520leading%2520to%2520decreased%2520perceived%2520safety%2520and%2520trust%2520from%2520the%2520user%2520and%2520others%2520in%2520context.%2520This%2520work%2520proposes%2520Socially%2520Aware%2520Autonomous%2520Transparent%2520Transportation%2520%2528SAATT%2529%2520Navigation%2520framework%2520for%2520wheelchairs%2520as%2520a%2 {"title": "Feature Space Renormalization for Semi-supervised Learning", "author": "Jun Sun and Wancheng Zhang and Chao Zhou and Zhongjie Mao and Chao Li and Xiao-Jun Wu", "abstract": "Semi-supervised learning (SSL) has been proven to be a powerful method for leveraging unlabeled data to alleviate models'dependence on large labeled datasets. The common framework among recent approaches is to train the model on a large amount of unlabeled data with consistency regularization to constrain the model predictions to be invariant to input perturbation. This paper proposes a feature space renormalizati-on (FSR) mechanism for SSL, which imposes consistency on feature representations rather than on labels to enable the model to learn better discriminative features. In order to apply this mechanism to SSL, we design a dual-branch FSR module consisting of a dual-branch header and an FSR block. This module can be seamlessly plugged and played into existing SSL frameworks to enhance the performance of the base SSL. The experimental results show that our proposed FSR module helps the base SSL framework (e.g. CRMatch and FreeMatch), achieve better performance on a variety of standard SSL benchmark datasets, without incurring additional overhead in terms of computation time and GPU memory.", "link": "http://arxiv.org/abs/2311.04055v2", "date": "2026-03-18", "relevancy": 2.3631, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4785}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4781}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4612}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Feature%20Space%20Renormalization%20for%20Semi-supe {"title": "Learning Transferable Temporal Primitives for Video Reasoning via Synthetic Videos", "author": "Songtao Jiang and Sibo Song and Chenyi Zhou and Yuan Wang and Ruizhe Chen and Tongkun Guan and Ruilin Luo and Yan Zhang and Zhihang Tang and Yuchong Sun and Hang Zhang and Zhibo Yang and Shuai Bai and Junyang Lin and Zuozhu Liu", "abstract": "The transition from image to video understanding requires vision-language models (VLMs) to shift from recognizing static patterns to reasoning over temporal dynamics such as motion trajectories, speed changes, and state transitions. Yet current post-training methods fall short due to two critical limitations: (1) existing datasets often lack temporal-centricity, where answers can be inferred from isolated keyframes rather than requiring holistic temporal integration; and (2) training data generated by proprietary models contains systematic errors in fundamental temporal perception, such as confusing motion directions or misjudging speeds. We introduce SynRL, a post-training framework that teaches models temporal primitives, the fundamental building blocks of temporal understanding including direction, speed, and state tracking. Our key insight is that these abstract primitives, learned from programmatically generated synthetic videos, transfer effectively to real-world scenarios. We decompose temporal understanding into short-term perceptual primitives (speed, direction) and long-term cognitive primitives, constructing 7.7K CoT and 7K RL samples with ground-truth frame-level annotations through code-based video generation. Despite training on simple geometric shapes, SynRL achieves substantial improvements across 15 benchmarks spanning temporal grounding, complex reasoning, and general video understanding. Remarkably, our 7.7K synthetic CoT samples outperform Video-R1 with 165K real-world samples. We attribute this to fundamental temporal skills, such as tracking frame by frame changes and comparing velocity, that transfer effectively from abstract synthetic patterns to complex real-world scenarios. This establishes a new paradigm for video post-training: video temporal learning through carefully designed synthetic data provides a more cost efficient scaling path.", "link": "http://arxiv.org/abs/2603.17693v1", "date": "2026-03-18", "relevancy": 2.3585, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5966}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5898}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5825}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Transferable%20Temporal%20Primitives%20for%20Video%20Reasoning%20via%20Synthetic%20Videos&body=Title%3A%20Learning%20Transferable%20Temporal%20Primitives%20for%20Video%20Reasoning%20via%20Synthetic%20Videos%0AAuthor%3A%20Songtao%20Jiang%20and%20Sibo%20Song%20and%20Chenyi%20Zhou%20and%20Yuan%20Wang%20and%20Ruizhe%20Chen%20and%20Tongkun%20Guan%20and%20Ruilin%20Luo%20and%20Yan%20Zhang%20and%20Zhihang%20Tang%20and%20Yuchong%20Sun%20and%20Hang%20Zhang%20and%20Zhibo%20Yang%20and%20Shuai%20Bai%20and%20Junyang%20Lin%20and%20Zuozhu%20Liu%0AAbstract%3A%20The%20transition%20from%20image%20to%20video%20understanding%20requires%20vision-language%20models%20%28VLMs%29%20to%20shift%20from%20recognizing%20static%20patterns%20to%20reasoning%20over%20temporal%20dynamics%20such%20as%20motion%20trajectories%2C%20speed%20changes%2C%20and%20state%20transitions.%20Yet%20current%20post-training%20methods%20fall%20short%20due%20to%20two%20critical%20limitations%3A%20%281%29%20existing%20datasets%20often%20lack%20temporal-centricity%2C%20where%20answers%20can%20be%20inferred%20from%20isolated%20keyframes%20rather%20than%20requiring%20holistic%20temporal%20integration%3B%20and%20%282%29%20training%20data%20generated%20by%20proprietary%20models%20contains%20systematic%20errors%20in%20fundamental%20temporal%20perception%2C%20such%20as%20confusing%20motion%20directions%20or%20misjudging%20speeds.%20We%20introduce%20SynRL%2C%20a%20post-training%20framework%20that%20teaches%20models%20temporal%20primitives%2C%20the%20fundamental%20building%20blocks%20of%20temporal%20understanding%20including%20direction%2C%20speed%2C%20and%20state%20tracking.%20Our%20key%20insight%20is%20that%20these%20abstract%20primitives%2C%20learned%20from%20programmatically%20generated%20synthetic%20videos%2C%20transfer%20effectively%20to%20real-world%20scenarios.%20We%20decompose%20temporal%20understanding%20into%20short-term%20perceptual%20primitives%20%28speed%2C%20direction%29%20and%20long-term%20cognitive%20primitives%2C%20constructing%207.7K%20CoT%20and%207K%20RL%20samples%20with%20ground-truth%20frame-level%20annotations%20through%20code-based%20video%20generation.%20Despite%20training%20on%20simple%20geometric%20shapes%2C%20SynRL%20achieves%20substantial%20improvements%20across%2015%20benchmarks%20spanning%20temporal%20grounding%2C%20complex%20reasoning%2C%20and%20general%20video%20understanding.%20Remarkably%2C%20our%207.7K%20synthetic%20CoT%20samples%20outperform%20Video-R1%20with%20165K%20real-world%20samples.%20We%20attribute%20this%20to%20fundamental%20temporal%20skills%2C%20such%20as%20tracking%20frame%20by%20frame%20changes%20and%20comparing%20velocity%2C%20that%20transfer%20effectively%20from%20abstract%20synthetic%20patterns%20to%20complex%20real-world%20scenarios.%20This%20establishes%20a%20new%20paradigm%20for%20video%20post-training%3A%20video%20temporal%20learning%20through%20carefully%20designed%20synthetic%20data%20provides%20a%20more%20cost%20efficient%20scaling%20path.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17693v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1 yi%20Zhou%20and%20Yuan%20Wang%20and%20Ruizhe%20Chen%20and%20Tongkun%20Guan%20and%20Ruilin%20Luo%20and%20Yan%20Zhang%20and%20Zhihang%20Tang%20and%20Yuchong%20Sun%20and%20Hang%20Zhang%20and%20Zhibo%20Yang%20and%20Shuai%20Bai%20and%20Junyang%20Lin%20and%20Zuozhu%20Liu&entry.1292438233=The%20transition%20from%20image%20to%20video%20understanding%20requires%20vision-language%20models%20%28VLMs%29%20to%20shift%20from%20recognizing%20static%20patterns%20to%20reasoning%20over%20temporal%20dynamics%20such%20as%20motion%20trajectories%2C%20speed%20changes%2C%20and%20state%20transitions.%20Yet%20current%20post-training%20methods%20fall%20short%20due%20to%20two%20critical%20limitations%3A%20%281%29%20existing%20datasets%20often%20lack%20temporal-centricity%2C%20where%20answers%20can%20be%20inferred%20from%20isolated%20keyframes%20rather%20than%20requiring%20holistic%20temporal%20integration%3B%20and%20%282%29%20training%20data%20generated%20by%20proprietary%20models%20contains%20systematic%20errors%20in%20fundamental%20temporal%20perception%2C%20such%20as%20confusing%20motion%20directions%20or%20misjudging%20speeds.%20We%20introduce%20SynRL%2C%20a%20post-training%20framework%20that%20teaches%20models%20temporal%20primitives%2C%20the%20fundamental%20building%20blocks%20of%20temporal%20understanding%20including%20direction%2C%20speed%2C%20and%20state%20tracking.%20Our%20key%20insight%20is%20that%20these%20abstract%20primitives%2C%20learned%20from%20programmatically%20generated%20synthetic%20videos%2C%20transfer%20effectively%20to%20real-world%20scenarios.%20We%20decompose%20temporal%20understanding%20into%20short-term%20perceptual%20primitives%20%28speed%2C%20direction%29%20and%20long-term%20cognitive%20primitives%2C%20constructing%207.7K%20CoT%20and%207K%20RL%20samples%20with%20ground-truth%20frame-level%20annotations%20through%20code-based%20video%20generation.%20Despite%20training%20on%20simple%20geometric%20shapes%2C%20SynRL%20achieves%20substantial%20improvements%20across%20 {"title": "NV-Bench: Benchmark of Nonverbal Vocalization Synthesis for Expressive Text-to-Speech Generation", "author": "Qinke Ni and Huan Liao and Dekun Chen and Yuxiang Wang and Zhizheng Wu", "abstract": "While recent text-to-speech (TTS) systems increasingly integrate nonverbal vocalizations (NVs), their evaluations lack standardized metrics and reliable ground-truth references. To bridge this gap, we propose NV-Bench, the first benchmark grounded in a functional taxonomy that treats NVs as communicative acts rather than acoustic artifacts. NV-Bench comprises 1,651 multi-lingual, in-the-wild utterances with paired human reference audio, balanced across 14 NV categories. We introduce a dual-dimensional evaluation protocol: (1) Instruction Alignment, utilizing the proposed paralinguistic character error rate (PCER) to assess controllability, (2) Acoustic Fidelity, measuring the distributional gap to real recordings to assess acoustic realism. We evaluate diverse TTS models and develop two baselines. Experimental results demonstrate a strong correlation between our objective metrics and human perception, establishing NV-Bench as a standardized evaluation framework.", "link": "http://arxiv.org/abs/2603.15352v2", "date": "2026-03-18", "relevancy": 2.3547, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5189}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.447}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.447}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NV-Bench%3A%20Benchmark%20of%20Nonverbal%20Vocalization%20Synthesis%20for%20Expressive%20Text-to-Speech%20Generation&body=Title%3A%20NV-Bench%3A%20Benchmark%20of%20Nonverbal%20Vocalization%20Synthesis%20for%20Expressive%20Text-to-Speech%20Generation%0AAuthor%3A%20Qinke%20Ni%20and%20Huan%20Liao%20and%20Dekun%20Chen%20and%20Yuxiang%20Wang%20and%20Zhizheng%20Wu%0AAbstract%3A%20While%20recent%20text-to-speech%20%28TTS%29%20systems%20increasingly%20integrate%20nonverbal%20vocalizations%20%28NVs%29%2C%20their%20evaluations%20lack%20standardized%20metrics%20and%20reliable%20ground-truth%20references.%20To%20bridge%20this%20gap%2C%20we%20propose%20NV-Bench%2C%20the%20first%20benchmark%20grounded%20in%20a%20functional%20taxonomy%20that%20treats%20NVs%20as%20communicative%20acts%20rather%20than%20acoustic%20artifacts.%20NV-Bench%20comprises%201%2C651%20multi-lingual%2C%20in-the-wild%20utterances%20with%20paired%20human%20reference%20audio%2C%20balanced%20across%2014%20NV%20categories.%20We%20introduce%20a%20dual-dimensional%20evaluation%20protocol%3A%20%281%29%20Instruction%20Alignment%2C%20utilizing%20the%20proposed%20paralinguistic%20character%20error%20rate%20%28PCER%29%20to%20assess%20controllability%2C%20%282%29%20Acoustic%20Fidelity%2C%20measuring%20the%20distributional%20gap%20to%20real%20recordings%20to%20assess%20acoustic%20realism.%20We%20evaluate%20diverse%20TTS%20models%20and%20develop%20two%20baselines.%20Experimental%20results%20demonstrate%20a%20strong%20correlation%20between%20our%20objective%20metrics%20and%20human%20perception%2C%20establishing%20NV-Bench%20as%20a%20standardized%20evaluation%20framework.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15352v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNV-Bench%253A%2520Benchmark%2520of%2520Nonverbal%2520Vocalization%2520Synthesis%2520for%2520Expressive%2520Text-to-Speech%2520Generation%26entry.906535625%3DQinke%2520Ni%2520and%2520Huan%2520Liao%2520and%2520Dekun%2520Chen%2520and%2520Yuxiang%2520Wang%2520and%2520Zhizheng%2520Wu%26entry.1292438233%3DWhile%2520recent%2520text-to-speech%25 {"title": "VideoAtlas: Navigating Long-Form Video in Logarithmic Compute", "author": "Mohamed Eltahir and Ali Habibullah and Yazan Alshoibi and Lama Ayash and Tanveer Hussain and Naeemullah Khan", "abstract": "Extending language models to video introduces two challenges: representation, where existing methods rely on lossy approximations, and long-context, where caption- or agent-based pipelines collapse video into text and lose visual fidelity. To overcome this, we introduce \\textbf{VideoAtlas}, a task-agnostic environment to represent video as a hierarchical grid that is simultaneously lossless, navigable, scalable, caption- and preprocessing-free. An overview of the video is available at a glance, and any region can be recursively zoomed into, with the same visual representation used uniformly for the video, intermediate investigations, and the agent's memory, eliminating lossy text conversion end-to-end. This hierarchical structure ensures access depth grows only logarithmically with video length. For long-context, Recursive Language Models (RLMs) recently offered a powerful solution for long text, but extending them to visual domain requires a structured environment to recurse into, which \\textbf{VideoAtlas} provides. \\textbf{VideoAtlas} as a Markov Decision Process unlocks Video-RLM: a parallel Master-Worker architecture where a Master coordinates global exploration while Workers concurrently drill into assigned regions to accumulate lossless visual evidence. We demonstrate three key findings: (1)~logarithmic compute growth with video duration, further amplified by a 30-60\\% multimodal cache hit rate arising from the grid's structural reuse. (2)~environment budgeting, where bounding the maximum exploration depth provides a principled compute-accuracy hyperparameter. (3)~emergent adaptive compute allocation that scales with question granularity. When scaling from 1-hour to 10-hour benchmarks, Video-RLM remains the most duration-robust method with minimal accuracy degradation, demonstrating that structured environment navigation is a viable and scalable paradigm for video understanding.", "link": "http://arxiv.org/abs/2603.17948v1", "date": "2026-03-18", "relevancy": 2.3511, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5935}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5866}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5866}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VideoAtlas%3A%20Navigating%20Long-Form%20Video%20in%20Logarithmic%20Compute&body=Title%3A%20VideoAtlas%3A%20Navigating%20Long-Form%20Video%20in%20Logarithmic%20Compute%0AAuthor%3A%20Mohamed%20Eltahir%20and%20Ali%20Habibullah%20and%20Yazan%20Alshoibi%20and%20Lama%20Ayash%20and%20Tanveer%20Hussain%20and%20Naeemullah%20Khan%0AAbstract%3A%20Extending%20language%20models%20to%20video%20introduces%20two%20challenges%3A%20representation%2C%20where%20existing%20methods%20rely%20on%20lossy%20approximations%2C%20and%20long-context%2C%20where%20caption-%20or%20agent-based%20pipelines%20collapse%20video%20into%20text%20and%20lose%20visual%20fidelity.%20To%20overcome%20this%2C%20we%20introduce%20%5Ctextbf%7BVideoAtlas%7D%2C%20a%20task-agnostic%20environment%20to%20represent%20video%20as%20a%20hierarchical%20grid%20that%20is%20simultaneously%20lossless%2C%20navigable%2C%20scalable%2C%20caption-%20and%20preprocessing-free.%20An%20overview%20of%20the%20video%20is%20available%20at%20a%20glance%2C%20and%20any%20region%20can%20be%20recursively%20zoomed%20into%2C%20with%20the%20same%20visual%20representation%20used%20uniformly%20for%20the%20video%2C%20intermediate%20investigations%2C%20and%20the%20agent%27s%20memory%2C%20eliminating%20lossy%20text%20conversion%20end-to-end.%20This%20hierarchical%20structure%20ensures%20access%20depth%20grows%20only%20logarithmically%20with%20video%20length.%20For%20long-context%2C%20Recursive%20Language%20Models%20%28RLMs%29%20recently%20offered%20a%20powerful%20solution%20for%20long%20text%2C%20but%20extending%20them%20to%20visual%20domain%20requires%20a%20structured%20environment%20to%20recurse%20into%2C%20which%20%5Ctextbf%7BVideoAtlas%7D%20provides.%20%5Ctextbf%7BVideoAtlas%7D%20as%20a%20Markov%20Decision%20Process%20unlocks%20Video-RLM%3A%20a%20parallel%20Master-Worker%20architecture%20where%20a%20Master%20coordinates%20global%20exploration%20while%20Workers%20concurrently%20drill%20into%20assigned%20regions%20to%20accumulate%20lossless%20visual%20evidence.%20We%20demonstrate%20three%20key%20findings%3A%20%281%29~logarithmic%20compute%20growth%20with%20video%20duration%2C%20further%20amplified%20by%20a%2030-60%5C%25%20multimodal%20cache%20hit%20rate%20arising%20from%20the%20grid%27s%20structural%20reuse.%20%282%29~environment%20budgeting%2C%20where%20bounding%20the%20maximum%20exploration%20depth%20provides%20a%20principled%20compute-accuracy%20hyperparameter.%20%283%29~emergent%20adaptive%20compute%20allocation%20that%20scales%20with%20question%20granularity.%20When%20scaling%20from%201-hour%20to%2010-hour%20benchmarks%2C%20Video-RLM%20remains%20the%20most%20duration-robust%20method%20with%20minimal%20accuracy%20degradation%2C%20demonstrating%20that%20structured%20environment%20navigation%20is%20a%20viable%20and%20scalable%20paradigm%20for%20video%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17948v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVideoAtlas%253A%2520Navigating%2520Long-Form%2520Video%2520in%2520Logarithmic%2520Compute%26entry.906535625%3DMohamed%2520Eltahir%2520and%2520Ali%2520Habibullah%2520and%2520Yazan%2520Alshoibi%2520and%2520Lama%2520Ay {"title": "DexViTac: Collecting Human Visuo-Tactile-Kinematic Demonstrations for Contact-Rich Dexterous Manipulation", "author": "Xitong Chen and Yifeng Pan and Min Li and Xiaotian Ding", "abstract": "Large-scale, high-quality multimodal demonstrations are essential for robot learning of contact-rich dexterous manipulation. While human-centric data collection systems lower the barrier to scaling, they struggle to capture the tactile information during physical interactions. Motivated by this, we present DexViTac, a portable, human-centric data collection system tailored for contact-rich dexterous manipulation. The system enables the high-fidelity acquisition of first-person vision, high-density tactile sensing, end-effector poses, and hand kinematics within unstructured, in-the-wild environments. Building upon this hardware, we propose a kinematics-grounded tactile representation learning algorithm that effectively resolves semantic ambiguities within tactile signals. Leveraging the efficiency of DexViTac, we construct a multimodal dataset comprising over 2,400 visuo-tactile-kinematic demonstrations. Experiments demonstrate that DexViTac achieves a collection efficiency exceeding 248 demonstrations per hour and remains robust against complex visual occlusions. Real-world deployment confirms that policies trained with the proposed dataset and learning strategy achieve an average success rate exceeding 85% across four challenging tasks. This performance significantly outperforms baseline methods, thereby validating the substantial improvement the system provides for learning contact-rich dexterous manipulation. Project page: https://xitong-c.github.io/DexViTac/.", "link": "http://arxiv.org/abs/2603.17851v1", "date": "2026-03-18", "relevancy": 2.3449, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6118}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5694}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5674}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DexViTac%3A%20Collecting%20Human%20Visuo-Tactile-Kinematic%20Demonstrations%20for%20Contact-Rich%20Dexterous%20Manipulation&body=Title%3A%20DexViTac%3A%20Collecting%20Human%20Visuo-Tactile-Kinematic%20Demonstrations%20for%20Contact-Rich%20Dexterous%20Manipulation%0AAuthor%3A%20Xitong%20Chen%20and%20Yifeng%20Pan%20and%20Min%20Li%20and%20Xiaotian%20Ding%0AAbstract%3A%20Large-scale%2C%20high-quality%20multimodal%20demonstrations%20are%20essential%20for%20robot%20learning%20of%20contact-rich%20dexterous%20manipulation.%20While%20human-centric%20data%20collection%20systems%20lower%20the%20barrier%20to%20scaling%2C%20they%20struggle%20to%20capture%20the%20tactile%20information%20during%20physical%20interactions.%20Motivated%20by%20this%2C%20we%20present%20DexViTac%2C%20a%20portable%2C%20human-centric%20data%20collection%20system%20tailored%20for%20contact-rich%20dexterous%20manipulation.%20The%20system%20enables%20the%20high-fidelity%20acquisition%20of%20first-person%20vision%2C%20high-density%20tactile%20sensing%2C%20end-effector%20poses%2C%20and%20hand%20kinematics%20within%20unstructured%2C%20in-the-wild%20environments.%20Building%20upon%20this%20hardware%2C%20we%20propose%20a%20kinematics-grounded%20tactile%20representation%20learning%20algorithm%20that%20effectively%20resolves%20semantic%20ambiguities%20within%20tactile%20signals.%20Leveraging%20the%20efficiency%20of%20DexViTac%2C%20we%20construct%20a%20multimodal%20dataset%20comprising%20over%202%2C400%20visuo-tactile-kinematic%20demonstrations.%20Experiments%20demonstrate%20that%20DexViTac%20achieves%20a%20collection%20efficiency%20exceeding%20248%20demonstrations%20per%20hour%20and%20remains%20robust%20against%20complex%20visual%20occlusions.%20Real-world%20deployment%20confirms%20that%20policies%20trained%20with%20the%20proposed%20dataset%20and%20learning%20strategy%20achieve%20an%20average%20success%20rate%20exceeding%2085%25%20across%20four%20challenging%20tasks.%20This%20performance%20significantly%20outperforms%20baseline%20methods%2C%20thereby%20validating%20the%20substantial%20improvement%20the%20system%20provides%20for%20learning%20contact-rich%20dexterous%20manipulation.%20Project%20page%3A%20https%3A//xitong-c.github.io/DexViTac/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17851v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDexViTac%253A%2520Collecting%2520Human%2520Visuo-Tactile-Kinematic%2520Demonstrations%2520for%2520Contact-Rich%2520Dexterous%2520Manipulation%26entry.906535625%3DXitong%2520Chen%2520and%2520Yifeng%2520Pan%2520and%2520Min%2520Li%2520and%2520Xiaotian%2520Ding%26entry.1292438233%3DLarge-scale%252C%2520high-quality%2520multimodal%2520demonstrations%2520are%2520essential%2520for%2520robot%2520learning%2520of%2520contact-rich%2520dexterous%2520manipulation.%2520While%2520human-centric%2520data%2520collection%2520systems%2520lower%2520the%2520barrier%2520to%2520scaling%252C%2520they%2520struggle%2520to%2520capture%2520the%2520tactile%2520information%2520during%2520physical%2520interactions.%2520Motivated%2520by%2520this%252C%2520we%2520present%2520DexViTac%252C%2520a%2520portable%252C%2520human-centric%2520data%2520collection%2520system%2520tailored%2520for%2520contact-rich%2520dexterous%2520manipulation.%2520The%2520system%2520enables%2520the%2520high-fidelity%2520acquisition%2520of%2520first-person%2520vision%252C%2520high-density%2520tactile%2520sensing%252C%2520end-effector%2520poses%252C%2520and%2520hand%2520kinematics%2520within%2520unstructured%252C%2520in-the-wild%2520environments.%2520Building%2520upon%2520this%2520hardware%252C%2520we% {"title": "IA2: Alignment with ICL Activations Improves Supervised Fine-Tuning", "author": "Aayush Mishra and Daniel Khashabi and Anqi Liu", "abstract": "Supervised Fine-Tuning (SFT) is used to specialize model behavior by training weights to produce intended target responses for queries. In contrast, In-Context Learning (ICL) adapts models during inference with instructions or demonstrations in the prompt. ICL can offer better generalizability and more calibrated responses compared to SFT in data scarce settings, at the cost of more inference compute. In this work, we ask the question: Can ICL's internal computations be used to improve the qualities of SFT? We first show that ICL and SFT produce distinct activation patterns, indicating that the two methods achieve adaptation through different functional mechanisms. Motivated by this observation and to use ICL's rich functionality, we introduce ICL Activation Alignment (IA2), a self-distillation technique which aims to replicate ICL's activation patterns in SFT models and incentivizes ICL-like internal reasoning. Performing IA2 as a priming step before SFT significantly improves the accuracy and calibration of model outputs, as shown by our extensive empirical results on 12 popular benchmarks and two model families. This finding is not only practically useful, but also offers a conceptual window into the inner mechanics of model adaptation.", "link": "http://arxiv.org/abs/2509.22621v3", "date": "2026-03-18", "relevancy": 2.3404, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4797}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4741}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4504}], "mailto": "mailto:haoxiang.li.2024 es%2520the%2520accuracy%2520and%2520calibration%2520of%2520model%2520outputs%252C%2520as%2520shown%2520by%2520our%2520extensive%2520empirical%2520results%2520on%252012%2520popular%2520benchmarks%2520and%2520two%2520model%2520families.%2520This%2520finding%2520is%2520not%2520only%2520practically%2520useful%252C%2520but%2520also%2520offers%2520a%2520conceptual%2520window%2520into%2520the%2520inner%2520mechanics%2520of%2520model%2520adaptation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.22621v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=IA2%3A%20Alignment%20with%20ICL%20Activations%20Improves%20Supervised%20Fine-Tuning&entry.906535625=Aayush%20Mishra%20and%20Daniel%20Khashabi%20and%20Anqi%20Liu&entry.1292438233=Supervised%20Fine-Tuning%20%28SFT%29%20is%20used%20to%20specialize%20model%20behavior%20by%20training%20weights%20to%20produce%20intended%20target%20responses%20for%20queries.%20In%20contrast%2C%20In-Context%20Learning%20%28ICL%29%20adapts%20models%20during%20inference%20with%20instructions%20or%20demonstrations%20in%20the%20prompt.%20ICL%20can%20offer%20better%20generalizability%20and%20more%20calibrated%20responses%20compared%20to%20SFT%20in%20data%20scarce%20settings%2C%20at%20the%20cost%20of%20more%20inference%20compute.%20In%20this%20work%2C%20we%20ask%20the%20question%3A%20Can%20ICL%27s%20internal%20computations%20be%20used%20to%20improve%20the%20qualities%20of%20SFT%3F%20We%20first%20show%20that%20ICL%20and%20SFT%20produce%20distinct%20activation%20patterns%2C%20indicating%20that%20the%20two%20methods%20achieve%20adaptation%20through%20different%20functional%20mechanisms.%20Motivated%20by%20this%20observation%20and%20to%20use%20ICL%27s%20rich%20functionality%2C%20we%20introduce%20ICL%20Activation%20Alignment%20%28IA2%29%2C%20a%20self-distillation%20technique%20which%20aims%20to%20replicate%20ICL%27s%20activation%20patterns%20in%20SFT%20mod {"title": "AgentVLN: Towards Agentic Vision-and-Language Navigation", "author": "Zihao Xin and Wentong Li and Yixuan Jiang and Ziyuan Huang and Bin Wang and Piji Li and Jianke Zhu and Jie Qin and Shengjun Huang", "abstract": "Vision-and-Language Navigation (VLN) requires an embodied agent to ground complex natural-language instructions into long-horizon navigation in unseen environments. While Vision-Language Models (VLMs) offer strong 2D semantic understanding, current VLN systems remain constrained by limited spatial perception, 2D-3D representation mismatch, and monocular scale ambiguity. In this paper, we propose AgentVLN, a novel and efficient embodied navigation framework that can be deployed on edge computing platforms. We formulate VLN as a Partially Observable Semi-Markov Decision Process (POSMDP) and introduce a VLM-as-Brain paradigm that decouples high-level semantic reasoning from perception and planning via a plug-and-play skill library. To resolve multi-level representation inconsistency, we design a cross-space representation mapping that projects perception-layer 3D topological waypoints into the image plane, yielding pixel-aligned visual prompts for the VLM. Building on this bridge, we integrate a context-aware self-correction and active exploration strategy to recover from occlusions and suppress error accumulation over long trajectories. To further address the spatial ambiguity of instructions in unstructured environments, we propose a Query-Driven Perceptual Chain-of-Thought (QD-PCoT) scheme, enabling the agent with the metacognitive ability to actively seek geometric depth information. Finally, we construct AgentVLN-Instruct, a large-scale instruction-tuning dataset with dynamic stage routing conditioned on target visibility. Extensive experiments show that AgentVLN consistently outperforms prior state-of-the-art methods (SOTA) on long-horizon VLN benchmarks, offering a practical paradigm for lightweight deployment of next-generation embodied navigation models. Code: https://github.com/Allenxinn/AgentVLN.", "link": "http://arxiv.org/abs/2603.17670v1", "date": "2026-03-18", "relevancy": 2.3392, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5932}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5886}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5749}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AgentVLN%3A%20Towards%20Agentic%20Vision-and-Language%20Navigation&body=Title%3A%20AgentVLN%3A%20Towards%20Agentic%20Vision-and-Language%20Navigation%0AAuthor%3A%20Zihao%20Xin%20and%20Wentong%20Li%20and%20Yixuan%20Jiang%20and%20Ziyuan%20Huang%20and%20Bin%20Wang%20and%20Piji%20Li%20and%20Jianke%20Zhu%20and%20Jie%20Qin%20and%20Shengjun%20Huang%0AAbstract%3A%20Vision-and-Language%20Navigation%20%28VLN%29%20requires%20an%20embodied%20agent%20to%20ground%20complex%20natural-language%20instructions%20into%20long-horizon%20navigation%20in%20unseen%20environments.%20While%20Vision-Language%20Models%20%28VLMs%29%20offer%20strong%202D%20semantic%20understanding%2C%20current%20VLN%20systems%20remain%20constrained%20by%20limited%20spatial%20perception%2C%202D-3D%20representation%20mismatch%2C%20and%20monocular%20scale%20ambiguity.%20In%20this%20paper%2C%20we%20propose%20AgentVLN%2C%20a%20novel%20and%20efficient%20embodied%20navigation%20framework%20that%20can%20be%20deployed%20on%20edge%20computing%20platforms.%20We%20formulate%20VLN%20as%20a%20Partially%20Observable%20Semi-Markov%20Decision%20Process%20%28POSMDP%29%20and%20introduce%20a%20VLM-as-Brain%20paradigm%20that%20decouples%20high-level%20semantic%20reasoning%20from%20perception%20and%20planning%20via%20a%20plug-and-play%20skill%20library.%20To%20resolve%20multi-level%20representation%20inconsistency%2C%20we%20design%20a%20cross-space%20representation%20mapping%20that%20projects%20perception-layer%203D%20topological%20waypoints%20into%20the%20image%20plane%2C%20yielding%20pixel-aligned%20visual%20prompts%20for%20the%20VLM.%20Building%20on%20this%20bridge%2C%20we%20integrate%20a%20context-aware%20self-correction%20and%20active%20exploration%20strategy%20to%20recover%20from%20occlusions%20and%20suppress%20error%20accumulation%20over%20long%20trajectories.%20To%20further%20address%20the%20spatial%20ambiguity%20of%20instructions%20in%20unstructured%20environments%2C%20we%20propose%20a%20Query-Driven%20Perceptual%20Chain-of-Thought%20%28QD-PCoT%29%20scheme%2C%20enabling%20the%20agent%20with%20the%20metacognitive%20ability%20to%20actively%20seek%20geometric%20depth%20information.%20Finally%2C%20we%20construct%20AgentVLN-Instruct%2C%20a%20large-scale%20instruction-tuning%20dataset%20with%20dynamic%20stage%20routing%20conditioned%20on%20target%20visibility.%20Extensive%20experiments%20show%20that%20AgentVLN%20consistently%20outperforms%20prior%20state-of-the-art%20methods%20%28SOTA%29%20on%20long-horizon%20VLN%20benchmarks%2C%20offering%20a%20practical%20paradigm%20for%20lightweight%20deployment%20of%20next-generation%20embodied%20navigation%20models.%20Code%3A%20https%3A//github.com/Allenxinn/AgentVLN.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17670v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAgentVLN%253A%2520Towards%2520Agentic%2520Vision-and-Language%2520Navigation%26entry.906535625%3DZihao%2520Xin%2520and%2520Wentong%2520Li%2520and%2520Yixuan%2520Jiang%2520and%2520Ziyuan%2520Huang%2520and%2520Bin%2520Wang%2520and%2520Piji%2520Li%2520and%2520Jianke%2520Zhu%2520and%2520Jie%2520Qin%2520and%2520Shengjun%2520Huang%26entry.1292438233%3DVision-and-Langua {"title": "How do LLMs Compute Verbal Confidence", "author": "Dharshan Kumaran and Arthur Conmy and Federico Barbero and Simon Osindero and Viorica Patraucean and Petar Velickovic", "abstract": "Verbal confidence -- prompting LLMs to state their confidence as a number or category -- is widely used to extract uncertainty estimates from black-box models. However, how LLMs internally generate such scores remains unknown. We address two questions: first, when confidence is computed - just-in-time when requested, or automatically during answer generation and cached for later retrieval; and second, what verbal confidence represents - token log-probabilities, or a richer evaluation of answer quality? Focusing on Gemma 3 27B and Qwen 2.5 7B, we provide convergent evidence for cached retrieval. Activation steering, patching, noising, and swap experiments reveal that confidence representations emerge at answer-adjacent positions before appearing at the verbalization site. Attention blocking pinpoints the information flow: confidence is gathered from answer tokens, cached at the first post-answer position, then retrieved for output. Critically, linear probing and variance partitioning reveal that these cached representations explain substantial variance in verbal confidence beyond token log-probabilities, suggesting a richer answer-quality evaluation rather than a simple fluency readout. These findings demonstrate that verbal confidence reflects automatic, sophisticated self-evaluation -- not post-hoc reconstruction -- with implications for understanding metacognition in LLMs and improving calibration.", "link": "http://arxiv.org/abs/2603.17839v1", "date": "2026-03-18", "relevancy": 2.3327, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4792}, {"t hat%20these%20cached%20representations%20explain%20substantial%20variance%20in%20verbal%20confidence%20beyond%20token%20log-probabilities%2C%20suggesting%20a%20richer%20answer-quality%20evaluation%20rather%20than%20a%20simple%20fluency%20readout.%20These%20findings%20demonstrate%20that%20verbal%20confidence%20reflects%20automatic%2C%20sophisticated%20self-evaluation%20--%20not%20post-hoc%20reconstruction%20--%20with%20implications%20for%20understanding%20metacognition%20in%20LLMs%20and%20improving%20calibration.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17839v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHow%2520do%2520LLMs%2520Compute%2520Verbal%2520Confidence%26entry.906535625%3DDharshan%2520Kumaran%2520and%2520Arthur%2520Conmy%2520and%2520Federico%2520Barbero%2520and%2520Simon%2520Osindero%2520and%2520Viorica%2520Patraucean%2520and%2520Petar%2520Velickovic%26entry.1292438233%3DVerbal%2520confidence%2520--%2520prompting%2520LLMs%2520to%2520state%2520their%2520confidence%2520as%2520a%2520number%2520or%2520category%2520--%2520is%2520widely%2520used%2520to%2520extract%2520uncertainty%2520estimates%2520from%2520black-box%2520models.%2520However%252C%2520how%2520LLMs%2520internally%2520generate%2520such%2520scores%2520remains%2520unknown.%2520We%2520address%2520two%2520questions%253A%2520first%252C%2520when%2520confidence%2520is%2520computed%2520-%2520just-in-time%2520when%2520requested%252C%2520or%2520automatically%2520during%2520answer%2520generation%2520and%2520cached%2520for%2520later%2520retrieval%253B%2520and%2520second%252C%2520what%2520verbal%2520confidence%2520represents%2520-%2520token%2520log-probabilities%252C%2520or%2520a%2520richer%2520evaluation%2520of%2520answer%2520quality%253F%2520Focusing%2520on%2520Gemma%25203%252027B%2520and%2520Qwen%25202.5%25207B%252C%2520we%2520provide%2520convergent%2520evidence%2520for%2520cached%2520retrieval.%2520Activation%2520steering% {"title": "Facts as First Class Objects: Knowledge Objects for Persistent LLM Memory", "author": "Oliver Zahn and Simran Chana", "abstract": "Large language models increasingly serve as persistent knowledge workers, with in-context memory - facts stored in the prompt - as the default strategy. We benchmark in-context memory against Knowledge Objects (KOs), discrete hash-addressed tuples with O(1) retrieval. Within the context window, Claude Sonnet 4.5 achieves 100% exact-match accuracy from 10 to 7,000 facts (97.5% of its 200K window). However, production deployment reveals three failure modes: capacity limits (prompts overflow at 8,000 facts), compaction loss (summarization destroys 60% of facts), and goal drift (cascading compaction erodes 54% of project constraints while the model continues with full confidence). KOs achieve 100% accuracy across all conditions at 252x lower cost. On multi-hop reasoning, KOs reach 78.9% versus 31.6% for in-context. Cross-model replication across four frontier models confirms compaction loss is architectural, not model-specific. We additionally show that embedding retrieval fails on adversarial facts (20% precision at 1) and that neural memory (Titans) stores facts but fails to retrieve them on demand. We introduce density-adaptive retrieval as a switching mechanism and release the benchmark suite.", "link": "http://arxiv.org/abs/2603.17781v1", "date": "2026-03-18", "relevancy": 2.3316, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4759}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4759}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4472}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Facts%20as%20First%20Class%20Objects%3A%20Knowledge%20Objects%20for%20Persistent%20LLM%20Memory&body=Title%3A%20Facts%20as%20First%20Class%20Objects%3A%20Knowledge%20Objects%20for%20Persistent%20LLM%20Memory%0AAuthor%3A%20Oliver%20Zahn%20and%20Simran%20Chana%0AAbstract%3A%20Large%20language%20models%20increasingly%20serve%20as%20persistent%20knowledge%20workers%2C%20with%20in-context%20memory%20-%20facts%20stored%20in%20the%20prompt%20-%20as%20the%20default%20strategy.%20We%20benchmark%20in-context%20memory%20against%20Knowledge%20Objects%20%28KOs%29%2C%20discrete%20hash-addressed%20tuples%20with%20O%281%29%20retrieval.%20Within%20the%20context%20window%2C%20Claude%20Sonnet%204.5%20achieves%20100%25%20exact-match%20accuracy%20from%2010%20to%207%2C000%20facts%20%2897.5%25%20of%20its%20200K%20window%29.%20However%2C%20production%20deployment%20reveals%20three%20failure%20modes%3A%20capacity%20limits%20%28prompts%20overflow%20at%208%2C000%20facts%29%2C%20compaction%20loss%20%28summarization%20destroys%2060%25%20of%20facts%29%2C%20and%20goal%20drift%20%28cascading%20compaction%20erodes%2054%25%20of%20project%20constraints%20while%20the%20model%20continues%20with%20full%20confidence%29.%20KOs%20achieve%20100%25%20accuracy%20across%20all%20conditions%20at%20252x%20lower%20cost.%20On%20multi-hop%20reasoning%2C%20KOs%20reach%2078.9%25%20versus%2031.6%25%20for%20in-context.%20Cross-model%20replication%20across%20four%20frontier%20models%20confirms%20compaction%20loss%20is%20architectural%2C%20not%20model-specific.%20We%20additionally%20show%20that%20embedding%20retrieval%20fails%20on%20adversarial%20facts%20%2820%25%20precision%20at%201%29%20and%20that%20neural%20memory%20%28Titans%29%20stores%20facts%20but%20fails%20to%20retrieve%20them%20on%20demand.%20We%20introduce%20density-adaptive%20retrieval%20as%20a%20switching%20mechanism%20and%20release%20the%20benchmark%20suite.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17781v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFacts%2520as%2520First%2520Class%2520Objects%253A%2520Knowledge%2520Objects%2520for%2520Persistent%2520LLM%2520Memory%26entry.906535625%3DOliver%2520Zahn%2520and%2520Simran%2520Chana%26entry.1292438233%3DLarge%2520language%2520models%2520increasingly%2520serve%2520as%2520persistent%2520knowledge%2520workers%252C%2520with%2520in-context%2520memory%2520-%2520facts%2520stored%2520in%2520the%2520prompt%2520-%2520as%2520the%2520default%2520strategy.%2520We%2520benchmark%2520in-context%2520memory%2520against%2520Knowledge%2520Objects%2520%2528KOs%2529%252C%2520discrete%2520hash-addressed%2520tuples%2520with%2520O%25281%2529%2520retrieval.%2520Within%2520the%2520context%2520window%252C%2520Claude%2520Sonnet%25204.5%2520achieves%2520100%2525%2520exact-match%2520accuracy%2520from%252010%2520to%25207%252C000%2520facts%2520%252897.5%2525%2520of%2520its%2520200K%2520window%2529.%2520However%252C%2520production%2520deployment%2520reveals%2520three%2520failure%2520modes%253A%2520capacity%2520limits%2520%2528prompts%2520overflow%2520at%25208%252C000%2520facts%2529%252C%2520compaction%2520loss%2520%2528summarization%2520destroys%252060%2525%2520of%2520facts%2529%252C%2520and%2520goal%2520drift%2520%2528cascading%2520compaction%2520erodes%252054%2525%2520of%2520project%2520constraints%2520while%2520the%2520model%2520continues%2520with%2520full%2520confidence%2529.%2520KOs%2520achieve%2520100%2525%2520accuracy%2520across%2520all%2520conditions%2520at%2520252x%2520lower%2520cost.%2520On%2520multi-hop%2520reasoning%252C%2520KOs%2520reach%252078.9%2525%2520versus%252031.6%2525%2520for%2520in-context.%2520Cross-model%2520replication%2520across%2520four%2520frontier%2520models%2520confirms%2520compaction%2520loss%2520is%2520architectural%252C%2520not%2520model-specific.%2520We%2520ad

{"title": "World Reconstruction From Inconsistent Views", "author": "Lukas H\u00f6llein and Matthias Nie\u00dfner", "abstract": "Video diffusion models generate high-quality and diverse worlds; however, individual frames often lack 3D consistency across the output sequence, which makes the reconstruction of 3D worlds difficult. To this end, we propose a new method that handles these inconsistencies by non-rigidly aligning the video frames into a globally-consistent coordinate frame that produces sharp and detailed pointcloud reconstructions. First, a geometric foundation model lifts each frame into a pixel-wise 3D pointcloud, which contains unaligned surfaces due to these inconsistencies. We then propose a tailored non-rigid iterative frame-to-model ICP to obtain an initial alignment across all frames, followed by a global optimization that further sharpens the pointcloud. Finally, we leverage this pointcloud as initialization for 3D reconstruction and propose a novel inverse deformation rendering loss to create high quality and explorable 3D environments from inconsistent views. We demonstrate that our 3D scenes achieve higher quality than baselines, effectively turning video models into 3D-consistent world generators.", "link": "http://arxiv.org/abs/2603.16736v2", "date": "2026-03-18", "relevancy": 2.5956, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.7219}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6343}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6343}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20World%20Reconstruction%20From%20Inconsistent%20Views&body=Title%3A%20World%20Reconstruction%20From%20Inconsistent%20Views%0AAuthor%3A%20Lukas%20H%C3%B6llein%20and%20Matthias%20Nie%C3%9Fner%0AAbstract%3A%20Video%20diffusion%20models%20generate%20high-quality%20and%20diverse%20worlds%3B%20however%2C%20individual%20frames%20often%20lack%203D%20consistency%20across%20the%20output%20sequence%2C%20which%20makes%20the%20reconstruction%20of%203D%20worlds%20difficult.%20To%20this%20end%2C%20we%20propose%20a%20new%20method%20that%20handles%20these%20inconsistencies%20by%20non-rigidly%20aligning%20the%20video%20frames%20into%20a%20globally-consistent%20coordinate%20frame%20that%20produces%20sharp%20and%20detailed%20pointcloud%20reconstructions.%20First%2C%20a%20geometric%20foundation%20model%20lifts%20each%20frame%20into%20a%20pixel-wise%203D%20pointcloud%2C%20which%20contains%20unaligned%20surfaces%20due%20to%20these%20inconsistencies.%20We%20then%20propose%20a%20tailored%20non-rigid%20iterative%20frame-to-model%20ICP%20to%20obtain%20an%20initial%20alignment%20across%20all%20frames%2C%20followed%20by%20a%20global%20optimization%20that%20further%20sharpens%20the%20pointcloud.%20Finally%2C%20we%20leverage%20this%20pointcloud%20as%20initialization%20for%203D%20reconstruction%20and%20propose%20a%20novel%20inverse%20deformation%20rendering%20loss%20to%20create%20high%20quality%20and%20explorable%203D%20environments%20from%20inconsistent%20views.%20We%20demonstrate%20that%20our%203D%20scenes%20achieve%20higher%20quality%20than%20baselines%2C%20effectively%20turning%20video%20models%20into%203D-consistent%20world%20generators.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16736v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWorld%2520Reconstruction%2520From%2520Inconsistent%2520Views%26entry.906535625%3DLukas%2520H%25C3%25B6llein%2520and%2520Matthias%2520Nie%25C3%259Fner%26entry.1292438233%3DVideo%2520diffusion%2520models%2520generate%2520high-quality%2520and%2520diverse%2520worlds%253B%2520however%252C%2520individual%2520frames%2520often%2520lack%25203D%2520consistency%2520across%2520the%2520output%2520sequence%252C%2520which%2520makes%2520the%2520reconstruction%2520of%25203D%2520worlds%2520difficult.%2520To%2520this%2520end%252C%2520we%2520propose%2520a%2520new%2520method%2520that%2520handles%2520these%2520inconsistencies%2520by%2520non-rigidly%2520aligning%2520the%2520video%2520frames%2520into%2520a%2520globally-consistent%2520coordinate%2520frame%2520that%2520produces%2520sharp%2520and%2520detailed%2520pointcloud%2520reconstructions.%2520First%252C%2520a%2520geometric%2520foundation%2520model%2520lifts%2520each%2520frame%2520into%2520a%2520pixel-wise%25203D%2520pointcloud%252C%2520which%2520contains%2520unaligned%2520surfaces%2520due%2520to%2520these%2520inconsistencies.%2520We%2520then%2520propose%2520a%2520tailored%2520non-rigid%2520iterative%2520frame-to-model%2520ICP%2520to%2520obtain%2520an%2520initial%2520alignment%2520across%2520all%2520frames%252C%2520followed%2520by%2520a%2520global%2520optimization%2520that%2520further%2520sharpens%2520the%2520pointcloud.%2520Finally%252C%2520we%2520leverage%2520this%2520pointcloud%2520as%2520initialization%2520for%25203D%2520reconstruction%2520and%2520propose%2520a%2520novel%2520inverse%2520deformation%2520rendering%2520loss%2520to%2520create%2520high%2520quality%2520and%2520explorable%25203D%2520environments%2520from%2520inconsistent%2520views.%2520We%2520demonstrate%2520that%2520our%25203D%2520scenes%2520achieve%2520higher%2520quality%2520than%2520baselines%252C%2520effectively%2520turning%2520video%2520models%2520into%25203D-consistent%2520world%2520generators.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16736v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=World%20Reconstruction%20From%20Inconsistent%20Views&entry.906535625=Lukas%20H%C3%B6llein%20and%20Matthias%20Nie%C3%9Fner&entry.1292438233=Video%20diffusion%20models%20generate%20high-quality%20and%20diverse%20worlds%3B%20however%2C%20individual%20frames%20often%20lack%203D%20consistency%20across%20the%20output%20sequence%2C%20which%20makes%20the%20reconstruction%20of%203D%20worlds%20difficult.%20To%20this%20end%2C%20we%20propose%20a%20new%20method%20that%20handles%20these%20inconsistencies%20by%20non-rigidly%20aligning%20the%20video%20frames%20into%20a%20globally-consistent%20coordinate%20frame%20that%20produces%20sharp%20and%20detailed%20pointcloud%20reconstructions.%20First%2C%20a%20geometric%20foundation%20model%20lifts%20each%20frame%20into%20a%20pixel-wise%203D%20pointcloud%2C%20which%20contains%20unaligned%20surfaces%20due%20to%20these%20inconsistencies.%20We%20then%20propose%20a%20tailored%20non-rigid%20iterative%20frame-to-model%20ICP%20to%20obtain%20an%20initial%20alignment%20across%20all%20frames%2C%20followed%20by%20a%20global%20optimization%20that%20further%20sharpens%20the%20pointcloud.%20Finally%2C%20we%20leverage%20this%20pointcloud%20as%20initialization%20for%203D%20reconstruction%20and%20propose%20a%20novel%20inverse%20deformation%20rendering%20loss%20to%20create%20high%20quality%20and%20explorable%203D%20environments%20from%20inconsistent%20views.%20We%20demonstrate%20that%20our%203D%20scenes%20achieve%20higher%20quality%20than%20baselines%2C%20effectively%20turning%20video%20models%20into%203D-consistent%20world%20generators.&entry.1838667208=http%3A//arxiv.org/abs/2603.16736v2&entry.124074799=Read"},
{"title": "Exploring parameter-efficient fine-tuning (PEFT) of billion-parameter vision models with QLoRA and DoRA: insights into generalization for limited-data image classification under a 98:1 test-to-train regime", "author": "Haiyu Yang and Sumit Sharma and Enhong Liu and Miel Hostens", "abstract": "Automated behavior classification is essential for precision livestock farming but faces challenges of high computational costs and limited labeled data. This study systematically compared three approaches: training from scratch (ResNet-18, ViT-Small), frozen feature extraction, and parameter-efficient fine-tuning (PEFT) of the DINOv3 foundation model (6.7 billion parameters). We evaluated QLoRA and DoRA across multiple configurations varying rank (8, 16, 64) and target modules (q_proj versus all-linear layers).\n  With 2,160 verified training images, we assessed generalization of our model on 211,800 test samples, which is essentially a 98:1 test-to-train ratio. Results demonstrated that PEFT substantially outperformed alternatives, where the best QLoRA configuration (all-linear layers and rank=64) achieved 83.16% test accuracy with only 2.72% parameters (183.0M) in 5.8 hours, compared to 72.87% for ResNet-18 (16.8 hours), 61.91% for ViT-Small (18.7 hours), and 76.56% for frozen DINOv3 (17.5 hours). DoRA achieved comparable accuracy (83.14%) but with longer training time (11.0 hours).\n  Notably, increasing adapter capacity consistently improved generalization while simultaneously not causing overfitting: reducing rank from 16 to 8 decreased test accuracy from 78.38% to 77.17%, while expanding from q_proj-only to all-linear layers with rank=64 improved accuracy from 78.38% to 83.16%. This suggests underfitting, instead of overfitting, is the primary challenge when adapting foundation models to agricultural imagery. Our findings provide guidelines for deploying billion-parameter vision models with PEFT in agricultural livestock applications.", "link": "http://arxiv.org/abs/2603.17782v1", "date": "2026-03-18", "relevancy": 2.5819, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5334}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5334}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4823}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Exploring%20parameter-efficient%20fine-tuning%20%28PEFT%29%20of%20billion-parameter%20vision%20models%20with%20QLoRA%20and%20DoRA%3A%20insights%20into%20generalization%20for%20limited-data%20image%20classification%20under%20a%2098%3A1%20test-to-train%20regime&body=Title%3A%20Exploring%20parameter-efficient%20fine-tuning%20%28PEFT%29%20of%20billion-parameter%20vision%20models%20with%20QLoRA%20and%20DoRA%3A%20insights%20into%20generalization%20for%20limited-data%20image%20classification%20under%20a%2098%3A1%20test-to-train%20regime%0AAuthor%3A%20Haiyu%20Yang%20and%20Sumit%20Sharma%20and%20Enhong%20Liu%20and%20Miel%20Hostens%0AAbstract%3A%20Automated%20behavior%20classification%20is%20essential%20for%20precision%20livestock%20farming%20but%20faces%20challenges%20of%20high%20computational%20costs%20and%20limited%20labeled%20data.%20This%20study%20systematically%20compared%20three%20approaches%3A%20training%20from%20scratch%20%28ResNet-18%2C%20ViT-Small%29%2C%20frozen%20feature%20extraction%2C%20and%20parameter-efficient%20fine-tuning%20%28PEFT%29%20of%20the%20DINOv3%20foundation%20model%20%286.7%20billion%20parameters%29.%20We%20evaluated%20QLoRA%20and%20DoRA%20across%20multiple%20configurations%20varying%20rank%20%288%2C%2016%2C%2064%29%20and%20target%20modules%20%28q_proj%20versus%20all-linear%20layers%29.%0A%20%20With%202%2C160%20verified%20training%20images%2C%20we%20assessed%20generalization%20of%20our%20model%20on%20211%2C800%20test%20samples%2C%20which%20is%20essentially%20a%2098%3A1%20test-to-train%20ratio.%20Results%20demonstrated%20that%20PEFT%20substantially%20outperformed%20alternatives%2C%20where%20the%20best%20QLoRA%20configuration%20%28all-linear%20layers%20and%20rank%3D64%29%20achieved%2083.16%25%20test%20accuracy%20with%20only%202.72%25%20parameters%20%28183.0M%29%20in%205.8%20hours%2C%20compared%20to%2072.87%25%20for%20ResNet-18%20%2816.8%20hours%29%2C%2061.91%25%20for%20ViT-Small%20%2818.7%20hours%29%2C%20and%2076.56%25%20for%20frozen%20DINOv3%20%2817.5%20hours%29.%20DoRA%20achieved%20comparable%20accuracy%20%2883.14%25%29%20but%20with%20longer%20training%20time%20%2811.0%20hours%29.%0A%20%20Notably%2C%20increasing%20adapter%20capacity%20consistently%20improved%20generalization%20while%20simultaneously%20not%20causing%20overfitting%3A%20reducing%20rank%20from%2016%20to%208%20decreased%20test%20accuracy%20from%2078.38%25%20to%2077.17%25%2C%20while%20expanding%20from%20q_proj-only%20to%20all-linear%20layers%20with%20rank%3D64%20improved%20accuracy%20from%2078.38%25%20to%2083.16%25.%20This%20suggests%20underfitting%2C%20instead%20of%20overfitting%2C%20is%20the%20primary%20challenge%20when%20adapting%20foundation%20models%20to%20agricultural%20imagery.%20Our%20findings%20provide%20guidelines%20for%20deploying%20billion-parameter%20vision%20models%20with%20PEFT%20in%20agricultural%20livestock%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17782v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DExploring%2520parameter-efficient%2520fine-tuning%2520%2528PEFT%2529%2520of%2520billion-parameter%2520vision%2520models%2520with%2520QLoRA%2520and%2520DoRA%253A%2520insights%2520into%2520generalization%2520for%2520limited-data%2520image%2520classification%2520under%2520a%252098%253A1%2520test-to-train%2520regime%26en {"title": "Identity as Presence: Towards Appearance and Voice Personalized Joint Audio-Video Generation", "author": "Yingjie Chen and Shilun Lin and Cai Xing and Qixin Yan and Wenjing Wang and Dingming Liu and Hao Liu and Chen Li and Jing Lyu", "abstract": "Recent advances have demonstrated compelling capabilities in synthesizing real individuals into generated videos, reflecting the growing demand for identity-aware content creation. Nevertheless, an openly accessible framework enabling fine-grained control over facial appearance and voice timbre across multiple identities remains unavailable. In this work, we present a unified and scalable framework for identity-aware joint audio-video generation, enabling high-fidelity and consistent personalization. Specifically, we introduce a data curation pipeline that automatically extracts identity-bearing information with paired annotations across audio and visual modalities, covering diverse scenarios from single-subject to multi-subject interactions. We further propose a flexible and scalable identity injection mechanism for single- and multi-subject scenarios, in which both facial appearance and vocal timbre act as identity-bearing control signals. Moreover, in light of modality disparity, we design a multi-stage training strategy to accelerate convergence and enforce cross-modal coherence. Experiments demonstrate the superiority of the proposed framework. For more details and qualitative results, please refer to our webpage: \\href{https://chen-yingjie.github.io/projects/Identity-as-Presence}{Identity-as-Presence}.", "link": "http://arxiv.org/abs/2603.17889v1", "date": "2026-03-18", "relevancy": 2.5632, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.7065}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5939}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5938}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Identity%20as%20Presence%3A%20Towards%20Appearance%20and%20Voice%20Personalized%20Joint%20Audio-Video%20Generation&body=Title%3A%20Identity%20as%20Presence%3A%20Towards%20Appearance%20and%20Voice%20Personalized%20Joint%20Audio-Video%20Generation%0AAuthor%3A%20Yingjie%20Chen%20and%20Shilun%20Lin%20and%20Cai%20Xing%20and%20Qixin%20Yan%20and%20Wenjing%20Wang%20and%20Dingming%20Liu%20and%20Hao%20Liu%20and%20Chen%20Li%20and%20Jing%20Lyu%0AAbstract%3A%20Recent%20advances%20have%20demonstrated%20compelling%20capabilities%20in%20synthesizing%20real%20individuals%20into%20generated%20videos%2C%20reflecting%20the%20growing%20demand%20for%20identity-aware%20content%20creation.%20Nevertheless%2C%20an%20openly%20accessible%20framework%20enabling%20fine-grained%20control%20over%20facial%20appearance%20and%20voice%20timbre%20across%20multiple%20identities%20remains%20unavailable.%20In%20this%20work%2C%20we%20present%20a%20unified%20and%20scalable%20framework%20for%20identity-aware%20joint%20audio-video%20generation%2C%20enabling%20high-fidelity%20and%20consistent%20personalization.%20Specifically%2C%20we%20introduce%20a%20data%20curation%20pipeline%20that%20automatically%20extracts%20identity-bearing%20information%20with%20paired%20annotations%20across%20audio%20and%20visual%20modalities%2C%20covering%20diverse%20scenarios%20from%20single-subject%20to%20multi-subject%20interactions.%20We%20further%20propose%20a%20flexible%20and%20scalable%20identity%20injection%20mechanism%20for%20single-%20and%20multi-subject%20scenarios%2C%20in%20which%20both%20facial%20appearance%20and%20vocal%20timbre%20act%20as%20identity-bearing%20control%20signals.%20Moreover%2C%20in%20light%20of%20modality%20disparity%2C%20we%20design%20a%20multi-stage%20training%20strategy%20to%20accelerate%20convergence%20and%20enforce%20cross-modal%20coherence.%20Experiments%20demonstrate%20the%20superiority%20of%20the%20proposed%20framework.%20For%20more%20details%20and%20qualitative%20results%2C%20please%20refer%20to%20our%20webpage%3A%20%5Chref%7Bhttps%3A//chen-yingjie.github.io/projects/Identity-as-Presence%7D%7BIdentity-as-Presence%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17889v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIdentity%2520as%2520Presence%253A%2520Towards%2520Appearance%2520and%2520Voice%2520Personalized%2520Joint%2520Audio-Video%2520Generation%26entry.906535625%3DYingjie%2520Chen%2520and%2520Shilun%2520Lin%2520and%2520Cai%2520Xing%2520and%2520Qixin%2520Yan%2520and%2520Wenjing%2520Wang%2520and%2520Dingming%2520Liu%2520and%2520Hao%2520Liu%2520and%2520Chen%2520Li%2520and%2520Jing%2520Lyu%26entry.1292438233%3DRecent%2520advances%2520have%2520demonstrated%2520compelling%2520capabilities%2520in%2520synthesizing%2520real%2520individuals%2520into%2520generated%2520videos%252C%2520reflecting%2520the%2520growing%2520demand%2520for%2520identity-aware%2520content%2520creation.%2520Nevertheless%252C%2520an%2520openly%2520accessible%2520framework%2520enabling%2520fine-grained%2520control%2520over%2520facial%2520appearance%2520and%2520voice%2520timbre%2520across%2520multiple%2520identities%2520remains%2520unavailable.%2520In%2520this%2520work%252C%2520we%2520present%2520a%2520unified%2520and%2520scalable%2520framework%2520for%2520identity-aware%2520joint%2520audio-video%2520generation%252C%2520enabling%2520high-fidelity%2520and%2520consistent%2520personalization.%2520Specifically%252C%2520we%2520introduce%2520a%2520data%2520curation%2520pipeline%2520that%2520automatically%2520extracts%2520identity-bearing%2520information%2520with%2520paired%2520annotations%2520across%2520audio%2520and%2520visual%2520modalities%252C%2520covering%2520diverse%2520scenarios%2520from%2520single-subject%2520to%2520multi-subjec {"title": "Revisiting foundation models for cell instance segmentation", "author": "Anwai Archit and Constantin Pape", "abstract": "Cell segmentation is a fundamental task in microscopy image analysis. Several foundation models for cell segmentation have been introduced, virtually all of them are extensions of Segment Anything Model (SAM), improving it for microscopy data. Recently, SAM2 and SAM3 have been published, further improving and extending the capabilities of general-purpose segmentation foundation models. Here, we comprehensively evaluate foundation models for cell segmentation (CellPoseSAM, CellSAM, $\u03bc$SAM) and for general-purpose segmentation (SAM, SAM2, SAM3) on a diverse set of (light) microscopy datasets, for tasks including cell, nucleus and organoid segmentation. Furthermore, we introduce a new instance segmentation strategy called automatic prompt generation (APG) that can be used to further improve SAM-based microscopy foundation models. APG consistently improves segmentation results for $\u03bc$SAM, which is used as the base model, and is competitive with the state-of-the-art model CellPoseSAM. Moreover, our work provides important lessons for adaptation strategies of SAM-style models to microscopy and provides a strategy for creating even more powerful microscopy foundation models. Our code is publicly available at https://github.com/computational-cell-analytics/micro-sam.", "link": "http://arxiv.org/abs/2603.17845v1", "date": "2026-03-18", "relevancy": 2.5486, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5185}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5185}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4921}], "mailt {"title": "Video Understanding: From Geometry and Semantics to Unified Models", "author": "Zhaochong An and Zirui Li and Mingqiao Ye and Feng Qiao and Jiaang Li and Zongwei Wu and Vishal Thengane and Chengzu Li and Lei Li and Luc Van Gool and Guolei Sun and Serge Belongie", "abstract": "Video understanding aims to enable models to perceive, reason about, and interact with the dynamic visual world. In contrast to image understanding, video understanding inherently requires modeling temporal dynamics and evolving visual context, placing stronger demands on spatiotemporal reasoning and making it a foundational problem in computer vision. In this survey, we present a structured overview of video understanding by organizing the literature into three complementary perspectives: low-level video geometry understanding, high-level semantic understanding, and unified video understanding models. We further highlight a broader shift from isolated, task-specific pipelines toward unified modeling paradigms that can be adapted to diverse downstream objectives, enabling a more systematic view of recent progress. By consolidating these perspectives, this survey provides a coherent map of the evolving video understanding landscape, summarizes key modeling trends and design principles, and outlines open challenges toward building robust, scalable, and unified video foundation models.", "link": "http://arxiv.org/abs/2603.17840v1", "date": "2026-03-18", "relevancy": 2.5312, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6491}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6491}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5514}], "mailto": "mailto:h ectives%2C%20this%20survey%20provides%20a%20coherent%20map%20of%20the%20evolving%20video%20understanding%20landscape%2C%20summarizes%20key%20modeling%20trends%20and%20design%20principles%2C%20and%20outlines%20open%20challenges%20toward%20building%20robust%2C%20scalable%2C%20and%20unified%20video%20foundation%20models.&entry.1838667208=http%3A//arxiv.org/abs/2603.17840v1&entry.124074799=Read"},
{"title": "Look Before You Fuse: 2D-Guided Cross-Modal Alignment for Robust 3D Detection", "author": "Xiang Li and Zhangchi Hu and Xiao Xu and Bin Kong", "abstract": "Integrating LiDAR and camera inputs into a unified Bird's-Eye-View (BEV) representation is crucial for enhancing 3D perception capabilities of autonomous vehicles. However, existing methods suffer from spatial misalignment between LiDAR and camera features, which causes inaccurate depth supervision in camera branch and erroneous fusion during cross-modal feature aggregation. The root cause of this misalignment lies in projection errors, stemming from calibration inaccuracies and rolling shutter effect.The key insight of this work is that locations of these projection errors are not random but highly predictable, as they are concentrated at object-background boundaries which 2D detectors can reliably identify. Based on this, our main motivation is to utilize 2D object priors to pre-align cross-modal features before fusion. To address local misalignment, we propose Prior Guided Depth Calibration (PGDC), which leverages 2D priors to alleviate misalignment and preserve correct cross-modal feature pairs. To resolve global misalignment, we introduce Discontinuity Aware Geometric Fusion (DAGF) to suppress residual noise from PGDC and explicitly enhance sharp depth transitions at object-background boundaries, yielding a structurally aware representation. To effectively utilize these aligned representations, we incorporate Structural Guidance Depth Modulator (SGDM), using a gated attention mechanism to efficiently fuse aligned depth and image features. Our method achieves SOTA performance on nuScenes validation dataset, with its mAP and NDS reaching 71.5% and 73.6% respectively. Additionally, on the Argoverse 2 validation set, we achieve a competitive mAP of 41.7%.", "link": "http://arxiv.org/abs/2507.16861v3", "date": "2026-03-18", "relevancy": 2.5286, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6596}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6249}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6076}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Look%20Before%20You%20Fuse%3A%202D-Guided%20Cross-Modal%20Alignment%20for%20Robust%203D%20Detection&body=Title%3A%20Look%20Before%20You%20Fuse%3A%202D-Guided%20Cross-Modal%20Alignment%20for%20Robust%203D%20Detection%0AAuthor%3A%20Xiang%20Li%20and%20Zhangchi%20Hu%20and%20Xiao%20Xu%20and%20Bin%20Kong%0AAbstract%3A%20Integrating%20LiDAR%20and%20camera%20inputs%20into%20a%20unified%20Bird%27s-Eye-View%20%28BEV%29%20representation%20is%20crucial%20for%20enhancing%203D%20perception%20capabilities%20of%20autonomous%20vehicles.%20However%2C%20existing%20methods%20suffer%20from%20spatial%20misalignment%20between%20LiDAR%20and%20camera%20features%2C%20which%20causes%20inaccurate%20depth%20supervision%20in%20camera%20branch%20and%20erroneous%20fusion%20during%20cross-modal%20feature%20aggregation.%20The%20root%20cause%20of%20this%20misalignment%20lies%20in%20projection%20errors%2C%20stemming%20from%20calibration%20inaccuracies%20and%20rolling%20shutter%20effect.The%20key%20insight%20of%20this%20work%20is%20that%20locations%20of%20these%20projection%20errors%20are%20not%20random%20but%20highly%20predictable%2C%20as%20they%20are%20concentrated%20at%20object-background%20boundaries%20which%202D%20detectors%20can%20reliably%20identify.%20Based%20on%20this%2C%20our%20main%20motivation%20is%20to%20utilize%202D%20object%20priors%20to%20pre-align%20cross-modal%20features%20before%20fusion.%20To%20address%20local%20misalignment%2C%20we%20propose%20Prior%20Guided%20Depth%20Calibration%20%28PGDC%29%2C%20which%20leverages%202D%20priors%20to%20alleviate%20misalignment%20and%20preserve%20correct%20cross-modal%20feature%20pairs.%20To%20resolve%20global%20misalignment%2C%20we%20introduce%20Discontinuity%20Aware%20Geometric%20Fusion%20%28DAGF%29%20to%20suppress%20residual%20noise%20from%20PGDC%20and%20explicitly%20enhance%20sharp%20depth%20transitions%20at%20object-background%20boundaries%2C%20yielding%20a%20structurally%20aware%20representation.%20To%20effectively%20utilize%20these%20aligned%20representations%2C%20we%20incorporate%20Structural%20Guidance%20Depth%20Modulator%20%28SGDM%29%2C%20using%20a%20gated%20attention%20mechanism%20to%20efficiently%20fuse%20aligned%20depth%20and%20image%20features.%20Our%20method%20achieves%20SOTA%20performance%20on%20nuScenes%20validation%20dataset%2C%20with%20its%20mAP%20and%20NDS%20reaching%2071.5%25%20and%2073.6%25%20respectively.%20Additionally%2C%20on%20the%20Argoverse%202%20validation%20set%2C%20we%20achieve%20a%20competitive%20mAP%20of%2041.7%25.%0ALink%3A%20http%3A//arxiv.org/abs/2507.16861v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLook%2520Before%2520You%2520Fuse%253A%25202D-Guided%2520Cross-Modal%2520Alignment%2520for%2520Robust%25203D%2520Detection%26entry.906535625%3DXiang%2520Li%2520and%2520Zhangchi%2520Hu%2520and%2520Xiao%2520Xu%2520and%2520Bin%2520Kong%26entry.1292438233%3DIntegrating%2520LiDAR%2520and%2520camera%2520inputs%2520into%2520a%2520unified%2520Bird%2527s-Eye-View%2520%2528BEV%2529%2520representation%2520is%2520crucial%2520for%2520enhancing%25203D%2520perception%2520capabilities%2520of%2520autonomous%2520vehicles.%2520However%252C%2520existing%2520methods%2520suffer%2520from%2520spatial%2520misalignment%2520between%2520LiDAR%2520and%2520camera%2520features%252C%2520which%2520causes%2520inaccurate%2520depth%2520supervision%2520in%2520camera%2520branch%2520and%2520erroneous%2520fusio {"title": "Anchoring and Rescaling Attention for Semantically Coherent Inbetweening", "author": "Tae Eun Choi and Sumin Shim and Junhyeok Kim and Seong Jae Hwang", "abstract": "Generative inbetweening (GI) seeks to synthesize realistic intermediate frames between the first and last keyframes beyond mere interpolation. As sequences become sparser and motions larger, previous GI models struggle with inconsistent frames with unstable pacing and semantic misalignment. Since GI involves fixed endpoints and numerous plausible paths, this task requires additional guidance gained from the keyframes and text to specify the intended path. Thus, we give semantic and temporal guidance from the keyframes and text onto each intermediate frame through Keyframe-anchored Attention Bias. We also better enforce frame consistency with Rescaled Temporal RoPE, which allows self-attention to attend to keyframes more faithfully. TGI-Bench, the first benchmark specifically designed for text-conditioned GI evaluation, enables challenge-targeted evaluation to analyze GI models. Without additional training, our method achieves state-of-the-art frame consistency, semantic fidelity, and pace stability for both short and long sequences across diverse challenges.", "link": "http://arxiv.org/abs/2603.17651v1", "date": "2026-03-18", "relevancy": 2.5229, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5091}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5034}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5013}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Anchoring%20and%20Rescaling%20Attention%20for%20Semantically%20Coherent%20Inbetweening&body=Title% etweening&entry.906535625=Tae%20Eun%20Choi%20and%20Sumin%20Shim%20and%20Junhyeok%20Kim%20and%20Seong%20Jae%20Hwang&entry.1292438233=Generative%20inbetweening%20%28GI%29%20seeks%20to%20synthesize%20realistic%20intermediate%20frames%20between%20the%20first%20and%20last%20keyframes%20beyond%20mere%20interpolation.%20As%20sequences%20become%20sparser%20and%20motions%20larger%2C%20previous%20GI%20models%20struggle%20with%20inconsistent%20frames%20with%20unstable%20pacing%20and%20semantic%20misalignment.%20Since%20GI%20involves%20fixed%20endpoints%20and%20numerous%20plausible%20paths%2C%20this%20task%20requires%20additional%20guidance%20gained%20from%20the%20keyframes%20and%20text%20to%20specify%20the%20intended%20path.%20Thus%2C%20we%20give%20semantic%20and%20temporal%20guidance%20from%20the%20keyframes%20and%20text%20onto%20each%20intermediate%20frame%20through%20Keyframe-anchored%20Attention%20Bias.%20We%20also%20better%20enforce%20frame%20consistency%20with%20Rescaled%20Temporal%20RoPE%2C%20which%20allows%20self-attention%20to%20attend%20to%20keyframes%20more%20faithfully.%20TGI-Bench%2C%20the%20first%20benchmark%20specifically%20designed%20for%20text-conditioned%20GI%20evaluation%2C%20enables%20challenge-targeted%20evaluation%20to%20analyze%20GI%20models.%20Without%20additional%20training%2C%20our%20method%20achieves%20state-of-the-art%20frame%20consistency%2C%20semantic%20fidelity%2C%20and%20pace%20stability%20for%20both%20short%20and%20long%20sequences%20across%20diverse%20challenges.&entry.1838667208=http%3A//arxiv.org/abs/2603.17651v1&entry.124074799=Read"},
{"title": "GMT: Goal-Conditioned Multimodal Transformer for 6-DOF Object Trajectory Synthesis in 3D Scenes", "author": "Huajian Zeng and Abhishek Saroha and Daniel Cremers and Xi Wang", "abstract": "Synthesizing controllable 6-DOF object manipulation trajectories in 3D environments is essential for enabling robots to interact with complex scenes, yet remains challenging due to the need for accurate spatial reasoning, physical feasibility, and multimodal scene understanding. Existing approaches often rely on 2D or partial 3D representations, limiting their ability to capture full scene geometry and constraining trajectory precision. We present GMT, a multimodal transformer framework that generates realistic and goal-directed object trajectories by jointly leveraging 3D bounding box geometry, point cloud context, semantic object categories, and target end poses. The model represents trajectories as continuous 6-DOF pose sequences and employs a tailored conditioning strategy that fuses geometric, semantic, contextual, and goaloriented information. Extensive experiments on synthetic and real-world benchmarks demonstrate that GMT outperforms state-of-the-art human motion and human-object interaction baselines, such as CHOIS and GIMO, achieving substantial gains in spatial accuracy and orientation control. Our method establishes a new benchmark for learningbased manipulation planning and shows strong generalization to diverse objects and cluttered 3D environments. Project page: https://huajian- zeng.github. io/projects/gmt/.", "link": "http://arxiv.org/abs/2603.17993v1", "date": "2026-03-18", "relevancy": 2.5157, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.654}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6189}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5912}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GMT%3A%20Goal-Conditioned%20Multimodal%20Transformer%20for%206-DOF%20Object%20Trajectory%20Synthesis%20in%203D%20Scenes&body=Title%3A%20GMT%3A%20Goal-Conditioned%20Multimodal%20Transformer%20for%206-DOF%20Object%20Trajectory%20Synthesis%20in%203D%20Scenes%0AAuthor%3A%20Huajian%20Zeng%20and%20Abhishek%20Saroha%20and%20Daniel%20Cremers%20and%20Xi%20Wang%0AAbstract%3A%20Synthesizing%20controllable%206-DOF%20object%20manipulation%20trajectories%20in%203D%20environments%20is%20essential%20for%20enabling%20robots%20to%20interact%20with%20complex%20scenes%2C%20yet%20remains%20challenging%20due%20to%20the%20need%20for%20accurate%20spatial%20reasoning%2C%20physical%20feasibility%2C%20and%20multimodal%20scene%20understanding.%20Existing%20approaches%20often%20rely%20on%202D%20or%20partial%203D%20representations%2C%20limiting%20their%20ability%20to%20capture%20full%20scene%20geometry%20and%20constraining%20trajectory%20precision.%20We%20present%20GMT%2C%20a%20multimodal%20transformer%20framework%20that%20generates%20realistic%20and%20goal-directed%20object%20trajectories%20by%20jointly%20leveraging%203D%20bounding%20box%20geometry%2C%20point%20cloud%20context%2C%20semantic%20object%20categories%2C%20and%20target%20end%20poses.%20The%20model%20represents%20trajectories%20as%20continuous%206-DOF%20pose%20sequences%20and%20employs%20a%20tailored%20conditioning%20strategy%20that%20fuses%20geometric%2C%20semantic%2C%20contextual%2C%20and%20goaloriented%20information.%20Extensive%20experiments%20on%20synthetic%20and%20real-world%20benchmarks%20demonstrate%20that%20GMT%20outperforms%20state-of-the-art%20human%20motion%20and%20human-object%20interaction%20baselines%2C%20such%20as%20CHOIS%20and%20GIMO%2C%20achieving%20substantial%20gains%20in%20spatial%20accuracy%20and%20orientation%20control.%20Our%20method%20establishes%20a%20new%20benchmark%20for%20learningbased%20manipulation%20planning%20and%20shows%20strong%20generalization%20to%20diverse%20objects%20and%20cluttered%203D%20environments.%20Project%20page%3A%20https%3A//huajian-%20zeng.github.%20io/projects/gmt/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17993v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGMT%253A%2520Goal-Conditioned%2520Multimodal%2520Transformer%2520for%25206-DOF%2520Object%2520Trajectory%2520Synthesis%2520in%25203D%2520Scenes%26entry.906535625%3DHuajian%2520Zeng%2520and%2520Abhishek%2520Saroha%2520and%2520Daniel%2520Cremers%2520and%2520Xi%2520Wang%26entry.1292438233%3DSynthesizing%2520controllable%25206-DOF%2520object%2520manipulation%2520trajectories%2520in%25203D%2520environments%2520is%2520essential%2520for%2520enabling%2520robots%2520to%2520interact%2520with%2520complex%2520scenes%252C%2520yet%2520remains%2520challenging%2520due%2520to%2520the%2520need%2520for%2520accurate%2520spatial%2520reasoning%252C%2520physical%2520feasibility%252C%2520and%2520multimodal%2520scene%2520understanding.%2520Existing%2520approaches%2520often%2520rely%2520on%25202D%2520or%2520partial%25203D%2520representations%252C%2520limiting%2520their%2520ability%2520to%2520capture%2520full%2520scene%2520geometry%2520and%2520constraining%2520trajectory%2520precision.%2520We%2520present%2520GMT%252C%2520a%2520multimodal%2520transformer%2520framework%2520that%2520generates%2520realistic%2520and%2520goal-directed%2520object%2520trajectories%2520by%2520jointly%2520leveraging%25203D%2520bounding%2520box%2520geometry%252C%2520point%2520cloud%2520context%252C%2520semantic%2520object%2520categories%252C%2520and%2520target%2520end%2520poses.%2520The%2520model%2520represents%2520trajectories%2520as%2520continuous%25206-DOF%2520pose%2520sequences%2520and%2520employs%2520a%2520tailored%2520conditioning%2520strategy%2520that%2520fuses%2520geometric%252C%2520semantic%252C%2520contextual%252C%2520and%2520goaloriented%2520information.%2520Extensive%2520experiments%2520on%2520synthetic%2520and%2520real-world%2520benchmarks%2520demonstrate%2520that%2520GMT%2520outperforms%2520state-of-the-art%2520human%2520motion%2520and%2520human-object%2520interaction%2520baselines%252C%2520such%2520as%2520CHOIS%2520and%2520GIMO%252C%2520achieving%2520substantial%2520gains%2520in%2520spatial%2520accuracy%2520and%2520orientation%2520control.%2520Our%2520method%2520establishes%2520a%2520new%2520benchmark%2520for%2520learningbased%2520manipulation%2520planning%2520and%2520shows%2520strong%2520generalization%2520to%2520diverse%2520objects%2520and%2520cluttered%25203D%2520environments.%2520Project%2520page%253A%2520https%253A//huajian-%2520zeng.github.%2520io/projects/gmt/.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.17993v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GMT%3A%20Goal-Conditioned%20Multimodal%20Transformer%20for%206-DOF%20Object%20Trajectory%20Synthesis%20in%203D%20Scenes&entry.906535625=Huajian%20Zeng%20and%20Abhishek%20Saroha%20and%20Daniel%20Cremers%20and%20Xi%20Wang&entry.1292438233=Synthesizing%20controllable%206-DOF%20object%20manipulation%20trajectories%20in%203D%20environments%20is%20essential%20for%20enabling%20robots%20to%20interact%20with%20complex%20scenes%2C%20yet%20remains%20challenging%20due%20to%20the%20need%20for%20accurate%20spatial%20reasoning%2C%20physical%20feasibility%2C%20and%20multimodal%20scene%20understanding.%20Existing%20approaches%20often%20rely%20on%202D%20or%20partial%203D%20representations%2C%20limiting%20their%20ability%20to%20capture%20full%20scene%20geometry%20and%20constraining%20trajectory%20precision.%20We%20present%20GMT%2C%20a%20multimodal%20transformer%20framework%20that%20generates%20realistic%20and%20goal-directed%20object%20trajectories%20by%20jointly%20leveraging%203D%20bounding%20box%20geometry% {"title": "Part-Aware Open-Vocabulary 3D Affordance Grounding via Prototypical Semantic and Geometric Alignment", "author": "Dongqiang Gou and Xuming He", "abstract": "Grounding natural language questions to functionally relevant regions in 3D objects -- termed language-driven 3D affordance grounding -- is essential for embodied intelligence and human-AI interaction. Existing methods, while progressing from label-based to language-driven approaches, still face challenges in open-vocabulary generalization, fine-grained geometric alignment, and part-level semantic consistency. To address these issues, we propose a novel two-stage cross-modal framework that enhances both semantic and geometric representations for open-vocabulary 3D affordance grounding. In the first stage, large language models generate part-aware instructions to recover missing semantics, enabling the model to link semantically similar affordances. In the second stage, we introduce two key components: Affordance Prototype Aggregation (APA), which captures cross-object geometric consistency for each affordance, and Intra-Object Relational Modeling (IORM), which refines geometric differentiation within objects to support precise semantic alignment. We validate the effectiveness of our method through extensive experiments on a newly introduced benchmark, as well as two existing benchmarks, demonstrating superior performance in comparison with existing methods.", "link": "http://arxiv.org/abs/2603.17647v1", "date": "2026-03-18", "relevancy": 2.498, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6282}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6282}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": " {"title": "Feeling the Space: Egomotion-Aware Video Representation for Efficient and Accurate 3D Scene Understanding", "author": "Shuyao Shi and Kang G. Shin", "abstract": "Recent Multimodal Large Language Models (MLLMs) have shown high potential for spatial reasoning within 3D scenes. However, they typically rely on computationally expensive 3D representations like point clouds or reconstructed Bird's-Eye View (BEV) maps, or lack physical grounding to resolve ambiguities in scale and size. This paper significantly enhances MLLMs with egomotion modality data, captured by Inertial Measurement Units (IMUs) concurrently with the video. In particular, we propose a novel framework, called Motion-MLLM, introducing two key components: (1) a cascaded motion-visual keyframe filtering module that leverages both IMU data and visual features to efficiently select a sparse yet representative set of keyframes, and (2) an asymmetric cross-modal fusion module where motion tokens serve as intermediaries that channel egomotion cues and cross-frame visual context into the visual representation. By grounding visual content in physical egomotion trajectories, Motion-MLLM can reason about absolute scale and spatial relationships across the scene. Our extensive evaluation shows that Motion-MLLM makes significant improvements in various tasks related to 3D scene understanding and spatial reasoning. Compared to state-of-the-art (SOTA) methods based on video frames and explicit 3D data, Motion-MLLM exhibits similar or even higher accuracy with significantly less overhead (i.e., 1.40$\\times$ and 1.63$\\times$ higher cost-effectiveness, respectively).", "link": "http://arxiv.org/abs/2603.17980v1", "date": "2026-03-18", "relevancy": 2.4947, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.631}, {"title": "Synthesizing Moving People with 3D Control", "lin {"title": "MagicWorld: Towards Long-Horizon Stability for Interactive Video World Exploration", "author": "Guangyuan Li and Bo Li and Jinwei Chen and Xiaobin Hu and Lei Zhao and Peng-Tao Jiang", "abstract": "Recent interactive video world model methods generate scene evolution conditioned on user instructions. Although they achieve impressive results, two key limitations remain. First, they exhibit motion drift in complex environments with multiple interacting subjects, where dynamic subjects fail to follow realistic motion patterns during scene evolution. Second, they suffer from error accumulation in long-horizon interactions, where autoregressive generation gradually drifts from earlier scene states and causes structural and semantic inconsistencies. In this paper, we propose MagicWorld, an interactive video world model built upon an autoregressive framework. To address motion drift, we incorporate a flow-guided motion preservation constraint that mitigates motion degradation in dynamic subjects, encouraging realistic motion patterns and stable interactions during scene evolution. To mitigate error accumulation in long-horizon interactions, we design two complementary strategies, including a history cache retrieval strategy and an enhanced interactive training strategy. The former reinforces historical scene states by retrieving past generations during interaction, while the latter adopts multi-shot aggregated distillation with dual-reward weighting for interactive training, enhancing long-term stability and reducing error accumulation. In addition, we construct RealWM120K, a real-world dataset with diverse city-walk videos and multimodal annotations to support dynamic perception and long-horizon world modeling. Experimental results demonstrate that MagicWorld improves motion realism and alleviates error accumulation during long-horizon interactions.", "link": "http://arxiv.org/abs/2511.18886v2", "date": "2026-03-18", "relevancy": 2.4932, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.7218}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.61}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5972}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MagicWorld%3A%20Towards%20Long-Horizon%20Stability%20for%20Interactive%20Video%20World%20Exploration&body=Title%3A%20MagicWorld%3A%20Towards%20Long-Horizon%20Stability%20for%20Interactive%20Video%20World%20Exploration%0AAuthor%3A%20Guangyuan%20Li%20and%20Bo%20Li%20and%20Jinwei%20Chen%20and%20Xiaobin%20Hu%20and%20Lei%20Zhao%20and%20Peng-Tao%20Jiang%0AAbstract%3A%20Recent%20interactive%20video%20world%20model%20methods%20generate%20scene%20evolution%20conditioned%20on%20user%20instructions.%20Although%20they%20achieve%20impressive%20results%2C%20two%20key%20limitations%20remain.%20First%2C%20they%20exhibit%20motion%20drift%20in%20complex%20environments%20with%20multiple%20interacting%20subjects%2C%20where%20dynamic%20subjects%20fail%20to%20follow%20realistic%20motion%20patterns%20during%20scene%20evolution.%20Second%2C%20they%20suffer%20from%20error%20accumulation%20in%20long-horizon%20interactions%2C%20where%20autoregressive%20generation%20gradually%20drifts%20from%20earlier%20scene%20states%20and%20causes%20structural%20and%20semantic%20inconsistencies.%20In%20this%20paper%2C%20we%20propose%20MagicWorld%2C%20an%20interactive%20video%20world%20model%20built%20upon%20an%20autoregressive%20framework.%20To%20address%20motion%20drift%2C%20we%20incorporate%20a%20flow-guided%20motion%20preservation%20constraint%20that%20mitigates%20motion%20degradation%20in%20dynamic%20subjects%2C%20encouraging%20realistic%20motion%20patterns%20and%20stable%20interactions%20during%20scene%20evolution.%20To%20mitigate%20error%20accumulation%20in%20long-horizon%20interactions%2C%20we%20design%20two%20complementary%20strategies%2C%20including%20a%20history%20cache%20retrieval%20strategy%20and%20an%20enhanced%20interactive%20training%20strategy.%20The%20former%20reinforces%20historical%20scene%20states%20by%20retrieving%20past%20generations%20during%20interaction%2C%20while%20the%20latter%20adopts%20multi-shot%20aggregated%20distillation%20with%20dual-reward%20weighting%20for%20interactive%20training%2C%20enhancing%20long-term%20stability%20and%20reducing%20error%20accumulation.%20In%20addition%2C%20we%20construct%20RealWM120K%2C%20a%20real-world%20dataset%20with%20diverse%20city-walk%20videos%20and%20multimodal%20annotations%20to%20support%20dynamic%20perception%20and%20long-horizon%20world%20modeling.%20Experimental%20results%20demonstrate%20that%20MagicWorld%20improves%20motion%20realism%20and%20alleviates%20error%20accumulation%20during%20long-horizon%20interactions.%0ALink%3A%20http%3A//arxiv.org/abs/2511.18886v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMagicWorld%253A%2520Towards%2520Long-Horizon%2520Stability%2520for%2520Interactive%2520Video%2520World%2520Exploration%26entry.906535625%3DGuangyuan%2520Li%2520and%2520Bo%2520Li%2520and%2520Jinwei%2520Chen%2520and%2520Xiaobin%2520Hu%2520and%2520Lei%2520Zhao%2520and%2520Peng-Tao%2520Jiang%26entry.1292438233%3DRecent%2520interactive%2520video%2520world%2520model%2520methods%2520generate%2520scene%2520evolution%2520conditioned%2520on%2520user%2520instructions.%2520Although%2520they%2520achieve%2520impressive%2520results%252C%2520two%2520key%2520limitations%2520remain.%2520First%252C%2520they%2520exhibit%2520motion%2520drift%2520in%2520complex%2520environments%2520with%2520multiple%2520interacting%2520subjects%252C%2520where%2520dynamic%2520subjects%2520fail%2520to%2520follow%2520realistic%2520motion%2520patterns%2520during%2520scene%2520evolution.%2520Second%252C%252 {"title": "CLeAN: Continual Learning Adaptive Normalization in Dynamic Environments", "author": "Isabella Marasco and Davide Evangelista and Elena Loli Piccolomini and Michele Colajanni", "abstract": "Artificial intelligence systems predominantly rely on static data distributions, making them ineffective in dynamic real-world environments, such as cybersecurity, autonomous transportation, or finance, where data shifts frequently. Continual learning offers a potential solution by enabling models to learn from sequential data while retaining prior knowledge. However, a critical and underexplored issue in this domain is data normalization. Conventional normalization methods, such as min-max scaling, presuppose access to the entire dataset, which is incongruent with the sequential nature of continual learning. In this paper we introduce Continual Learning Adaptive Normalization (CLeAN), a novel adaptive normalization technique designed for continual learning in tabular data. CLeAN involves the estimation of global feature scales using learnable parameters that are updated via an Exponential Moving Average (EMA) module, enabling the model to adapt to evolving data distributions. Through comprehensive evaluations on two datasets and various continual learning strategies, including Resevoir Experience Replay, A-GEM, and EwC we demonstrate that CLeAN not only improves model performance on new data but also mitigates catastrophic forgetting. The findings underscore the importance of adaptive normalization in enhancing the stability and effectiveness of tabular data, offering a novel perspective on the use of normalization to preserve knowledge in dynamic learning environments.", "link": "http://arxiv.org/abs/2603.17548v1", "date": "2026-03-18", "relevancy": 2.4905, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5257}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4865}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4821}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CLeAN%3A%20Continual%20Learning%20Adaptive%20Normalization%20in%20Dynamic%20Environments&body=Title%3A%20CLeAN%3A%20Continual%20Learning%20Adaptive%20Normalization%20in%20Dynamic%20Environments%0AAuthor%3A%20Isabella%20Marasco%20and%20Davide%20Evangelista%20and%20Elena%20Loli%20Piccolomini%20and%20Michele%20Colajanni%0AAbstract%3A%20Artificial%20intelligence%20systems%20predominantly%20rely%20on%20static%20data%20distributions%2C%20making%20them%20ineffective%20in%20dynamic%20real-world%20environments%2C%20such%20as%20cybersecurity%2C%20autonomous%20transportation%2C%20or%20finance%2C%20where%20data%20shifts%20frequently.%20Continual%20learning%20offers%20a%20potential%20solution%20by%20enabling%20models%20to%20learn%20from%20sequential%20data%20while%20retaining%20prior%20knowledge.%20However%2C%20a%20critical%20and%20underexplored%20issue%20in%20this%20domain%20is%20data%20normalization.%20Conventional%20normalization%20methods%2C%20such%20as%20min-max%20scaling%2C%20presuppose%20access%20to%20the%20entire%20dataset%2C%20which%20is%20incongruent%20with%20the%20sequential%20nature%20of%20continual%20learning.%20In%20this%20paper%20we%20introduce%20Continual%20Learning%20Adaptive%20Normalization%20%28CLeAN%29%2C%20a%20novel%20adaptive%20normalization%20technique%20designed%20for%20continual%20learning%20in%20tabular%20data.%20CLeAN%20involves%20the%20estimation%20of%20global%20feature%20scales%20using%20learnable%20parameters%20that%20are%20updated%20via%20an%20Exponential%20Moving%20Average%20%28EMA%29%20module%2C%20enabling%20the%20model%20to%20adapt%20to%20evolving%20data%20distributions.%20Through%20comprehensive%20evaluations%20on%20two%20datasets%20and%20various%20continual%20learning%20strategies%2C%20including%20Resevoir%20Experience%20Replay%2C%20A-GEM%2C%20and%20EwC%20we%20demonstrate%20that%20CLeAN%20not%20only%20improves%20model%20performance%20on%20new%20data%20but%20also%20mitigates%20catastrophic%20forgetting.%20The%20findings%20underscore%20the%20importance%20of%20adaptive%20normalization%20in%20enhancing%20the%20stability%20and%20effectiveness%20of%20tabular%20data%2C%20offering%20a%20novel%20perspective%20on%20the%20use%20of%20normalization%20to%20preserve%20knowledge%20in%20dynamic%20learning%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17548v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCLeAN%253A%2520Continual%2520Learning%2520Adaptive%2520Normalization%2520in%2520Dynamic%2520Environments%26entry.906535625%3DIsabella%2520Marasco%2520and%2520Davide%2520Evangelista%2520and%2520Elena%2520Loli%2520Piccolomini%2520and%2520Michele%2520Colajanni%26entry.1292438233%3DArtificial%2520intelligence%2520systems%2520predominantly%2520rely%2520on%2520static%2520data%2520distributions%252C%2520making%2520them%2520ineffective%2520in%2520dynamic%2520real-world%2520environments%252C%2520such%2520as%2520cybersecurity%252C%2520autonomous%2520transportation%252C%2520or%2520finance%252C%2520where%2520data%2520shifts%2520frequently.%2520Continual%2520learning%2520offers%2520a%2520potential%2520solution%2520by%2520enabling%2520models%2520to%2520learn%2520from%2520sequential%2520data%2520while%2520retaining%2520prior%2520knowledge.%2520However%252C%2520a%2520critical%2520and%2520underexplored%2520issue%2520in%2520this%2520domain%2520is%2520data%2520normalization.%2520Conventional%2520normalization%2520methods%252C%2520such%2520as%2520min-max%2520scaling%252C%2520presuppose%2520access%2520to%2520the%2520entire%2520dataset%252C%2520which%2520is%2520incongruent%2520with%2520the%2520sequential%2520nature%2520of%2520continual%2520learn {"title": "EchoGen: Cycle-Consistent Learning for Unified Layout-Image Generation and Understanding", "author": "Kai Zou and Hongbo Liu and Dian Zheng and Jianxiong Gao and Zhiwei Zhao and Bin Liu", "abstract": "In this work, we present EchoGen, a unified framework for layout-to-image generation and image grounding, capable of generating images with accurate layouts and high fidelity to text descriptions (e.g., spatial relationships), while grounding the image robustly at the same time. We believe that image grounding possesses strong text and layout understanding abilities, which can compensate for the corresponding limitations in layout-to-image generation. At the same time, images generated from layouts exhibit high diversity in content, thereby enhancing the robustness of image grounding. Jointly training both tasks within a unified model can promote performance improvements for each. However, we identify that this joint training paradigm encounters several optimization challenges and results in restricted performance. To address these issues, we propose progressive training strategies. First, the Parallel Multi-Task Pre-training (PMTP) stage equips the model with basic abilities for both tasks, leveraging shared tokens to accelerate training. Next, the Dual Joint Optimization (DJO) stage exploits task duality to sequentially integrate the two tasks, enabling unified optimization. Finally, the Cycle RL stage eliminates reliance on visual supervision by using consistency constraints as rewards, significantly enhancing the model's unified capabilities via the GRPO strategy. Extensive experiments demonstrate state-of-the-art results on both layout-to-image generation and image grounding benchmarks, and reveal clear synergistic gains from optimizing the two tasks together.", "link": "http://arxiv.org/abs/2603.18001v1", "date": "2026-03-18", "relevancy": 2.4516, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.6602}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5829}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5698}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EchoGen%3A%20Cycle-Consistent%20Learning%20for%20Unified%20Layout-Image%20Generation%20and%20Understanding&body=Title%3A%20EchoGen%3A%20Cycle-Consistent%20Learning%20for%20Unified%20Layout-Image%20Generation%20and%20Understanding%0AAuthor%3A%20Kai%20Zou%20and%20Hongbo%20Liu%20and%20Dian%20Zheng%20and%20Jianxiong%20Gao%20and%20Zhiwei%20Zhao%20and%20Bin%20Liu%0AAbstract%3A%20In%20this%20work%2C%20we%20present%20EchoGen%2C%20a%20unified%20framework%20for%20layout-to-image%20generation%20and%20image%20grounding%2C%20capable%20of%20generating%20images%20with%20accurate%20layouts%20and%20high%20fidelity%20to%20text%20descriptions%20%28e.g.%2C%20spatial%20relationships%29%2C%20while%20grounding%20the%20image%20robustly%20at%20the%20same%20time.%20We%20believe%20that%20image%20grounding%20possesses%20strong%20text%20and%20layout%20understanding%20abilities%2C%20which%20can%20compensate%20for%20the%20corresponding%20limitations%20in%20layout-to-image%20generation.%20At%20the%20same%20time%2C%20images%20generated%20from%20layouts%20exhibit%20high%20diversity%20in%20content%2C%20thereby%20enhancing%20the%20robustness%20of%20image%20grounding.%20Jointly%20training%20both%20tasks%20within%20a%20unified%20model%20can%20promote%20performance%20improvements%20for%20each.%20However%2C%20we%20identify%20that%20this%20joint%20training%20paradigm%20encounters%20several%20optimization%20challenges%20and%20results%20in%20restricted%20performance.%20To%20address%20these%20issues%2C%20we%20propose%20progressive%20training%20strategies.%20First%2C%20the%20Parallel%20Multi-Task%20Pre-training%20%28PMTP%29%20stage%20equips%20the%20model%20with%20basic%20abilities%20for%20both%20tasks%2C%20leveraging%20shared%20tokens%20to%20accelerate%20training.%20Next%2C%20the%20Dual%20Joint%20Optimization%20%28DJO%29%20stage%20exploits%20task%20duality%20to%20sequentially%20integrate%20the%20two%20tasks%2C%20enabling%20unified%20optimization.%20Finally%2C%20the%20Cycle%20RL%20stage%20eliminates%20reliance%20on%20visual%20supervision%20by%20using%20consistency%20constraints%20as%20rewards%2C%20significantly%20enhancing%20the%20model%27s%20unified%20capabilities%20via%20the%20GRPO%20strategy.%20Extensive%20experiments%20demonstrate%20state-of-the-art%20results%20on%20both%20layout-to-image%20generation%20and%20image%20grounding%20benchmarks%2C%20and%20reveal%20clear%20synergistic%20gains%20from%20optimizing%20the%20two%20tasks%20together.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18001v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEchoGen%253A%2520Cycle-Consistent%2520Learning%2520for%2520Unified%2520Layout-Image%2520Generation%2520and%2520Understanding%26entry.906535625%3DKai%2520Zou%2520and%2520Hongbo%2520Liu%2520and%2520Dian%2520Zheng%2520and%2520Jianxiong%2520Gao%2520and%2520Zhiwei%2520Zhao%2520and%2520Bin%2520Liu%26entry.1292438233%3DIn%2520this%2520work%252C%2520we%2520present%2520EchoGen%252C%2520a%2520unified%2520framework%2520for%2520layout-to-image%2520generation%2520and%2520image%2520grounding%252C%2520capable%2520of%2520generating%2520images%2520with%2520accurate%2520layouts%2520and%2520high%2520fidelity%2520to%2520text%2520descriptions%2520%2528e.g.%252C%2520spatial%2520relationships%2529%252C%2520while%2520grounding%2520the%2520image%2520robustly%2520at%2520the%2520same%2520time.%2520We%2520believe%2520that%2520image%2520grounding%2520possesses%2520strong%2520text%2520and%2520layout%2520understanding%2520abilities%252C%2520which%2520can%2520compensate%2520for%2520the%2520corresponding%2520l {"title": "CoVerRL: Breaking the Consensus Trap in Label-Free Reasoning via Generator-Verifier Co-Evolution", "author": "Teng Pan and Yuchen Yan and Zixuan Wang and Ruiqing Zhang and Gaiyang Han and Wanqi Zhang and Weiming Lu and Jun Xiao and Yongliang Shen", "abstract": "Label-free reinforcement learning enables large language models to improve reasoning capabilities without ground-truth supervision, typically by treating majority-voted answers as pseudo-labels. However, we identify a critical failure mode: as training maximizes self-consistency, output diversity collapses, causing the model to confidently reinforce systematic errors that evade detection. We term this the consensus trap. To escape it, we propose CoVerRL, a framework where a single model alternates between generator and verifier roles, with each capability bootstrapping the other. Majority voting provides noisy but informative supervision for training the verifier, while the improving verifier progressively filters self-consistent errors from pseudo-labels. This co-evolution creates a virtuous cycle that maintains high reward accuracy throughout training. Experiments across Qwen and Llama model families demonstrate that CoVerRL outperforms label-free baselines by 4.7-5.9\\% on mathematical reasoning benchmarks. Moreover, self-verification accuracy improves from around 55\\% to over 85\\%, confirming that both capabilities genuinely co-evolve.", "link": "http://arxiv.org/abs/2603.17775v1", "date": "2026-03-18", "relevancy": 2.4326, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5085}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4857}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4654}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CoVerRL%3A%20Breaking%20the%20Consensus%20Trap%20in%20Label-Free%20Reasoning%20via%20Generator-Verifier%20Co-Evolution&body=Title%3A%20CoVerRL%3A%20Breaking%20the%20Consensus%20Trap%20in%20Label-Free%20Reasoning%20via%20Generator-Verifier%20Co-Evolution%0AAuthor%3A%20Teng%20Pan%20and%20Yuchen%20Yan%20and%20Zixuan%20Wang%20and%20Ruiqing%20Zhang%20and%20Gaiyang%20Han%20and%20Wanqi%20Zhang%20and%20Weiming%20Lu%20and%20Jun%20Xiao%20and%20Yongliang%20Shen%0AAbstract%3A%20Label-free%20reinforcement%20learning%20enables%20large%20language%20models%20to%20improve%20reasoning%20capabilities%20without%20ground-truth%20supervision%2C%20typically%20by%20treating%20majority-voted%20answers%20as%20pseudo-labels.%20However%2C%20we%20identify%20a%20critical%20failure%20mode%3A%20as%20training%20maximizes%20self-consistency%2C%20output%20diversity%20collapses%2C%20causing%20the%20model%20to%20confidently%20reinforce%20systematic%20errors%20that%20evade%20detection.%20We%20term%20this%20the%20consensus%20trap.%20To%20escape%20it%2C%20we%20propose%20CoVerRL%2C%20a%20framework%20where%20a%20single%20model%20alternates%20between%20generator%20and%20verifier%20roles%2C%20with%20each%20capability%20bootstrapping%20the%20other.%20Majority%20voting%20provides%20noisy%20but%20informative%20supervision%20for%20training%20the%20verifier%2C%20while%20the%20improving%20verifier%20progressively%20filters%20self-consistent%20errors%20from%20pseudo-labels.%20This%20co-evolution%20creates%20a%20virtuous%20cycle%20that%20maintains%20high%20reward%20accuracy%20throughout%20training.%20Experiments%20across%20Qwen%20and%20Llama%20model%20families%20demonstrate%20that%20CoVerRL%20outperforms%20label-free%20baselines%20by%204.7-5.9%5C%25%20on%20mathematical%20reasoning%20benchmarks.%20Moreover%2C%20self-verification%20accuracy%20improves%20from%20around%2055%5C%25%20to%20over%2085%5C%25%2C%20confirming%20that%20both%20capabilities%20genuinely%20co-evolve.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17775v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCoVerRL%253A%2520Breaking%2520the%2520Consensus%2520Trap%2520in%2520Label-Free%2520Reasoning%2520via%2520Generator-Verifier%2520Co-Evolution%26entry.906535625%3DTeng%2520Pan%2520and%2520Yuchen%2520Yan%2520and%2520Zixuan%2520Wang%2520and%2520Ruiqing%2520Zhang%2520and%2520Gaiyang%2520Han%2520and%2520Wanqi%2520Zhang%2520and%2520Weiming%2520Lu%2520and%2520Jun%2520Xiao%2520and%2520Yongliang%2520Shen%26entry.1292438233%3DLabel-free%2520reinforcement%2520learning%2520enables%2520large%2520language%2520models%2520to%2520improve%2520reasoning%2520capabilities%2520without%2520ground-truth%2520supervision%252C%2520typically%2520by%2520treating%2520majority-voted%2520answers%2520as%2520pseudo-labels.%2520However%252C%2520we%2520identify%2520a%2520critical%2520failure%2520mode%253A%2520as%2520training%2520maximizes%2520self-consistency%252C%2520output%2520diversity%2520collapses%252C%2520causing%2520the%2520model%2520to%2520confidently%2520reinforce%2520systematic%2520errors%2520that%2520evade%2520detection.%2520We%2520term%2520this%2520the%2520consensus%2520trap.%2520To%2520escape%2520it%252C%2520we%2520propose%2520CoVerRL%252C%2520a%2520framework%2520where%2520a%2520single%2520model%2520alternates%2520between%2520generator%2520and%2520verifier%2520roles%252C%2520with%2520each%2520capability%2520bootstrapping%2520the%2520other.%2520Majority%2520voting%2520provides%2520noisy%2520but%2520informative%2520supervision%2520for%2520training%2520the%2520verifier%252C%2520while%2520the%2520improving%2520verifier%2520progressively%2520filters%2520self-consistent%2520errors%2520from%2520pseudo-labels.%2520This%2520co-evolution%2520creates%2520a%2520virtuous%2520cycle%2520that%2520maintains%2520 {"title": "High-Fidelity Diffusion Face Swapping with ID-Constrained Facial Conditioning", "author": "Dailan He and Xiahong Wang and Shulun Wang and Guanglu Song and Bingqi Ma and Hao Shao and Yu Liu and Hongsheng Li", "abstract": "Face swapping aims to seamlessly transfer a source facial identity onto a target while preserving target attributes such as pose and expression. Diffusion models, known for their superior generative capabilities, have recently shown promise in advancing face-swapping quality. This paper addresses two key challenges in diffusion-based face swapping: the prioritized preservation of identity over target attributes and the inherent conflict between identity and attribute conditioning. To tackle these issues, we introduce an identity-constrained attribute-tuning framework for face swapping that first ensures identity preservation and then fine-tunes for attribute alignment, achieved through a decoupled condition injection. We further enhance fidelity by incorporating identity and adversarial losses in a post-training refinement stage. Our proposed identity-constrained diffusion-based face-swapping model outperforms existing methods in both qualitative and quantitative evaluations, demonstrating superior identity similarity and attribute consistency, achieving a new state-of-the-art performance in high-fidelity face swapping.", "link": "http://arxiv.org/abs/2503.22179v2", "date": "2026-03-18", "relevancy": 2.4019, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6187}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5897}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5818}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20High-Fidelity%20Diffusion%20Face%20Swapping%20with {"title": "Vector sketch animation generation with differentiable motion trajectories", "author": "Xinding Zhu and Xinye Yang and Shuyang Zheng and Zhexin Zhang and Fei Gao and Jing Huang and Jiazhou Chen", "abstract": "Sketching is a direct and inexpensive means of visual expression. Though image-based sketching has been well studied, video-based sketch animation generation is still very challenging due to the temporal coherence requirement. In this paper, we propose a novel end-to-end automatic generation approach for vector sketch animation. To solve the flickering issue, we introduce a Differentiable Motion Trajectory (DMT) representation that describes the frame-wise movement of stroke control points using differentiable polynomial-based trajectories. DMT enables global semantic gradient propagation across multiple frames, significantly improving the semantic consistency and temporal coherence, and producing high-framerate output. DMT employs a Bernstein basis to balance the sensitivity of polynomial parameters, thus achieving more stable optimization. Instead of implicit fields, we introduce sparse track points for explicit spatial modeling, which improves efficiency and supports long-duration video processing. Evaluations on DAVIS and LVOS datasets demonstrate the superiority of our approach over SOTA methods. Cross-domain validation on 3D models and text-to-video data confirms the robustness and compatibility of our approach.", "link": "http://arxiv.org/abs/2509.25857v2", "date": "2026-03-18", "relevancy": 2.3975, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.615}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5991}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5839}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Vector%20sketch%20animation%20generation%20with%20differentiable%20motion%20trajectories&body=Title%3A%20Vector%20sketch%20animation%20generation%20with%20differentiable%20motion%20trajectories%0AAuthor%3A%20Xinding%20Zhu%20and%20Xinye%20Yang%20and%20Shuyang%20Zheng%20and%20Zhexin%20Zhang%20and%20Fei%20Gao%20and%20Jing%20Huang%20and%20Jiazhou%20Chen%0AAbstract%3A%20Sketching%20is%20a%20direct%20and%20inexpensive%20means%20of%20visual%20expression.%20Though%20image-based%20sketching%20has%20been%20well%20studied%2C%20video-based%20sketch%20animation%20generation%20is%20still%20very%20challenging%20due%20to%20the%20temporal%20coherence%20requirement.%20In%20this%20paper%2C%20we%20propose%20a%20novel%20end-to-end%20automatic%20generation%20approach%20for%20vector%20sketch%20animation.%20To%20solve%20the%20flickering%20issue%2C%20we%20introduce%20a%20Differentiable%20Motion%20Trajectory%20%28DMT%29%20representation%20that%20describes%20the%20frame-wise%20movement%20of%20stroke%20control%20points%20using%20differentiable%20polynomial-based%20trajectories.%20DMT%20enables%20global%20semantic%20gradient%20propagation%20across%20multiple%20frames%2C%20significantly%20improving%20the%20semantic%20consistency%20and%20temporal%20coherence%2C%20and%20producing%20high-framerate%20output.%20DMT%20employs%20a%20Bernstein%20basis%20to%20balance%20the%20sensitivity%20of%20polynomial%20parameters%2C%20thus%20achieving%20more%20stable%20optimization.%20Instead%20of%20implicit%20fields%2C%20we%20introduce%20sparse%20track%20points%20for%20explicit%20spatial%20modeling%2C%20which%20improves%20efficiency%20and%20supports%20long-duration%20video%20processing.%20Evaluations%20on%20DAVIS%20and%20LVOS%20datasets%20demonstrate%20the%20superiority%20of%20our%20approach%20over%20SOTA%20methods.%20Cross-domain%20validation%20on%203D%20models%20and%20text-to-video%20data%20confirms%20the%20robustness%20and%20compatibility% %252C%2520which%2520improves%2520efficiency%2520and%2520supports%2520long-duration%2520video%2520processing.%2520Evaluations%2520on%2520DAVIS%2520and%2520LVOS%2520datasets%2520demonstrate%2520the%2520superiority%2520of%2520our%2520approach%2520over%2520SOTA%2520methods.%2520Cross-domain%2520validation%2520on%25203D%2520models%2520and%2520text-to-video%2520data%2520confirms%2520the%2520robustness%2520and%2520compatibility%2520of%2520our%2520approach.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.25857v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Vector%20sketch%20animation%20generation%20with%20differentiable%20motion%20trajectories&entry.906535625=Xinding%20Zhu%20and%20Xinye%20Yang%20and%20Shuyang%20Zheng%20and%20Zhexin%20Zhang%20and%20Fei%20Gao%20and%20Jing%20Huang%20and%20Jiazhou%20Chen&entry.1292438233=Sketching%20is%20a%20direct%20and%20inexpensive%20means%20of%20visual%20expression.%20Though%20image-based%20sketching%20has%20been%20well%20studied%2C%20video-based%20sketch%20animation%20generation%20is%20still%20very%20challenging%20due%20to%20the%20temporal%20coherence%20requirement.%20In%20this%20paper%2C%20we%20propose%20a%20novel%20end-to-end%20automatic%20generation%20approach%20for%20vector%20sketch%20animation.%20To%20solve%20the%20flickering%20issue%2C%20we%20introduce%20a%20Differentiable%20Motion%20Trajectory%20%28DMT%29%20representation%20that%20describes%20the%20frame-wise%20movement%20of%20stroke%20control%20points%20using%20differentiable%20polynomial-based%20trajectories.%20DMT%20enables%20global%20semantic%20gradient%20propagation%20across%20multiple%20frames%2C%20significantly%20improving%20the%20semantic%20consistency%20and%20temporal%20coherence%2C%20and%20producing%20high-framerate%20output.%20DMT%20employs%20a%20Bernstein%20basis%20to%20balance%20the%20sensitivity%20of%20polynomial%20parameters%2C%20thus%20achieving%20more%20sta {"title": "Symmetry-Reduced Physics-Informed Learning of Tensegrity Dynamics", "author": "Jing Qin and Muhao Chen", "abstract": "Tensegrity structures possess intrinsic geometric symmetries that govern their dynamic behavior. However, most existing physics-informed neural network (PINN) approaches for tensegrity dynamics do not explicitly exploit these symmetries, leading to high computational complexity and unstable optimization. In this work, we propose a symmetry-reduced physics-informed neural network (SymPINN) framework that embeds group-theory-based symmetry directly into both the solution expression and the neural network architecture to predict tensegrity dynamics. By decomposing nodes into symmetry orbits and representing free nodal coordinates using a symmetry basis, the proposed method constructs a reduced coordinate representation that preserves geometric symmetry of the structure. The full coordinates are then recovered via symmetry transformations of the reduced solution learned by the network, ensuring that the predicted configurations automatically satisfy the symmetry constraints. In this framework, equivariance is enforced through orbit-based coordinate generation, symmetry-consistent message passing, and physics residual constraints. In addition, SymPINN improves training effectiveness by encoding initial conditions as hard constraints, incorporating Fourier feature encoding to enhance the representation of dynamic motions, and employing a two-stage optimization strategy. Extensive numerical experiments on symmetric T-bars and lander structures demonstrate significantly improved prediction accuracy and computational efficiency compared to standard physics-informed models, indicating the great potential of symmetry-aware learning for structure-preserving modeling of tensegrity dynamics.", "link": "http://arxiv.org/abs/2603.17824v1", "date": "2026-03-18", "relevancy": 2.3843, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Ge

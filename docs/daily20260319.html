{"title": "YOLO26: An Analysis of NMS-Free End to End Framework for Real-Time Object Detection", "author": "Sudip Chakrabarty", "abstract": "The ``You Only Look Once'' (YOLO) framework has long served as a standard for real-time object detection, though traditional iterations have utilized Non-Maximum Suppression (NMS) post-processing, which introduces specific latency and hyperparameter variables. This paper presents a comprehensive architectural analysis of YOLO26, a model that shifts toward a native end-to-end learning strategy by eliminating NMS. This study examines the core mechanisms driving this framework: the MuSGD optimizer for backbone stabilization, Small-Target-Aware Label Assignment (STAL), and ProgLoss for dynamic supervision. To contextualize its performance, this article reviews exhaustive benchmark data from the COCO \\texttt{val2017} leaderboard. This evaluation provides an objective comparison of YOLO26 across various model scales (Nano to Extra-Large) against both prior CNN lineages and contemporary Transformer-based architectures (e.g., RT-DETR, DEIM, RF-DETR), detailing the observed speed-accuracy trade-offs and parameter requirements without asserting a singular optimal model. Additionally, the analysis covers the framework's unified multi-task capabilities, including the YOLOE-26 open-vocabulary module for promptable detection. Ultimately, this paper serves to document how decoupling representation learning from heuristic post-processing impacts the \"Export Gap\" and deterministic latency in modern edge-based computer vision deployments.", "link": "http://arxiv.org/abs/2601.12882v2", "date": "2026-03-18", "relevancy": 2.3157, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5978}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5843}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5579}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20YOLO26%3A%20An%20Analysis%20of%20NMS-Free%20End%20to%20End%20Framework%20for%20Real-Time%20Object%20Detection&body=Title%3A%20YOLO26%3A%20An%20Analysis%20of%20NMS-Free%20End%20to%20End%20Framework%20for%20Real-Time%20Object%20Detection%0AAuthor%3A%20Sudip%20Chakrabarty%0AAbstract%3A%20The%20%60%60You%20Only%20Look%20Once%27%27%20%28YOLO%29%20framework%20has%20long%20served%20as%20a%20standard%20for%20real-time%20object%20detection%2C%20though%20traditional%20iterations%20have%20utilized%20Non-Maximum%20Suppression%20%28NMS%29%20post-processing%2C%20which%20introduces%20specific%20latency%20and%20hyperparameter%20variables.%20This%20paper%20presents%20a%20comprehensive%20architectural%20analysis%20of%20YOLO26%2C%20a%20model%20that%20shifts%20toward%20a%20native%20end-to-end%20learning%20strategy%20by%20eliminating%20NMS.%20This%20study%20examines%20the%20core%20mechanisms%20driving%20this%20framework%3A%20the%20MuSGD%20optimizer%20for%20backbone%20stabilization%2C%20Small-Target-Aware%20Label%20Assignment%20%28STAL%29%2C%20and%20ProgLoss%20for%20dynamic%20supervision.%20To%20contextualize%20its%20performance%2C%20this%20article%20reviews%20exhaustive%20benchmark%20data%20from%20the%20COCO%20%5Ctexttt%7Bval2017%7D%20leaderboard.%20This%20evaluation%20provides%20an%20objective%20comparison%20of%20YOLO26%20across%20various%20model%20scales%20%28Nano%20to%20Extra-Large%29%20against%20both%20prior%20CNN%20lineages%20and%20contemporary%20Transformer-based%20architectures%20%28e.g.%2C%20RT-DETR%2C%20DEIM%2C%20RF-DETR%29%2C%20detailing%20the%20observed%20speed-accuracy%20trade-offs%20and%20parameter%20requirements%20without%20asserting%20a%20singular%20optimal%20model.%20Additionally%2C%20the%20analysis%20covers%20the%20framework%27s%20unified%20multi-task%20capabilities%2C%20including%20the%20YOLOE-26%20open-vocabulary%20module%20for%20promptable%20detection.%20Ultimately%2C%20this%20paper%20serves%20to%20document%20how%20decoupling%20representation%20learning%20from%20heuristic%20post-processing%20impacts%20the%20%22Export%20Gap%22%20and%20deterministic%20latency%20in%20modern%20edge-based%20computer%20vision%20deployments.%0ALink%3A%20http%3A//arxiv.org/abs/2601.12882v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DYOLO26%253A%2520An%2520Analysis%2520of%2520NMS-Free%2520End%2520to%2520End%2520Framework%2520for%2520Real-Time%2520Object%2520Detection%26entry.906535625%3DSudip%2520Chakrabarty%26entry.1292438233%3DThe%2520%2560%2560You%2520Only%2520Look%2520Once%2527%2527%2520%2528YOLO%2529%2520framework%2520has%2520long%2520served%2520as%2520a%2520standard%2520for%2520real-time%2520object%2520detection%252C%2520though%2520traditional%2520iterations%2520have%2520utilized%2520Non-Maximum%2520Suppression%2520%2528NMS%2529%2520post-processing%252C%2520which%2520introduces%2520specific%2520latency%2520and%2520hyperparameter%2520variables.%2520This%2520paper%2520presents%2520a%2520comprehensive%2520architectural%2520analysis%2520of%2520YOLO26%252C%2520a%2520model%2520that%2520shifts%2520toward%2520a%2520native%2520end-to-end%2520learning%2520strategy%2520by%2520eliminating%2520NMS.%2520This%2520study%2520examines%2520the%2520core%2520mechanisms%2520driving%2520this%2520framework%253A%2520the%2520MuSGD%2520optimizer%2520for%2520backbone%2520stabilization%252C%2520Small-Target-Aware%2520Label%2520Assignment%2520%2528STAL%2529%252C%2520and%2520ProgLoss%2520for%2520dynamic%2520supervision.%2520To%2520contextualize%2520its%2520performance%252C%2520this%2520article%2520reviews%2520exhaustive%2520benchmark%2520data%2520from%2520the%2520COCO%2520%255Ctexttt%257Bval2017%257D%2520leaderboard.%2520This%2520evaluation%2520provides%2520an%2520objective%2520comparison%2520of%2520YOLO26%2520across%2520various%2520model%2520scales%2520%2528Nano%2520to%2520Extra-Large%2529%2520against%2520both%2520prior%2520CNN%2520lineages%2520and%2520contemporary%2520Transformer-based%2520architectures%2520%2528e.g.%252C%2520RT-DETR%252C%2520DEIM%252C%2520RF-DETR%2529%252C%2520detailing%2520the%2520observed%2520speed-accuracy%2520trade-offs%2520and%2520parameter%2520requirements%2520without%2520asserting%2520a%2520singular%2520optimal%2520model.%2520Additionally%252C%2520the%2520analysis%2520covers%2520the%2520framework%2527s%2520unified%2520multi-task%2520capabilities%252C%2520including%2520the%2520YOLOE-26%2520open-vocabulary%2520module%2520for%2520promptable%2520detection.%2520Ultimately%252C%2520this%2520paper%2520serves%2520to%2520document%2520how%2520decoupling%2520representation%2520learning%2520from%2520heuristic%2520post-processing%2520impacts%2520the%2520%2522Export%2520Gap%2522%2520and%2520deterministic%2520latency%2520in%2520modern%2520edge-based%2520computer%2520vision%2520deployments.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.12882v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=YOLO26%3A%20An%20Analysis%20of%20NMS-Free%20End%20to%20End%20Framework%20for%20Real-Time%20Object%20Detection&entry.906535625=Sudip%20Chakrabarty&entry.1292438233=The%20%60%60You%20Only%20Look%20Once%27%27%20%28YOLO%29%20framework%20has%20long%20served%20as%20a%20standard%20for%20real-time%20object%20detection%2C%20though%20traditional%20iterations%20have%20utilized%20Non-Maximum%20Suppression%20%28NMS%29%20post-processing%2C%20which%20introduces%20specific%20latency%20and%20hyperparameter%20variables.%20This%20paper%20presents%20a%20comprehensive%20architectural%20analysis%20of%20YOLO26%2C%20a%20model%20that%20shifts%20toward%20a%20native%20end-to-end%20learning%20strategy%20by%20eliminating%20NMS.%20This%20study%20examines%20the%20core%20mechanisms%20driving%20this%20framework%3A%20the%20MuSGD%20optimizer%20for%20backbone%20stabilization%2C%20Small-Target-Aware%20Label%20Assignment%20%28STAL%29%2C%20and%20ProgLoss%20for%20dynamic%20supervision.%20To%20contextualize%20its%20performance%2C%20this%20article%20reviews%20exhaustive%20benchmark%20data%20from%20the%20COCO%20%5Ctexttt%7Bval2017%7D%20leaderboard.%20This%20evaluation%20provides%20an%20objective%20comparison%20of%20YOLO26%20across%20various%20model%20scales%20%28Nano%20to%20Extra-Large%29%20against%20both%20prior%20CNN%20lineages%20and%20contemporary%20Transformer-based%20architectures%20%28e.g.%2C%20RT-DETR%2C%20DEIM%2C%20RF-DETR%29%2C%20detailing%20the%20observed%20speed-accuracy%20trade-offs%20and%20parameter%20requirements%20without%20asserting%20a%20singular%20optimal%20model.%20Additionally%2C%20the%20analysis%20covers%20the%20framework%27s%20unified%20multi-task%20capabilities%2C%20including%20the%20YOLOE-26%20open-vocabulary%20module%20for%20promptable%20detection.%20Ultimately%2C%20this%20paper%20serves%20to%20document%20how%20decoupling%20representation%20learning%20from%20heuristic%20post-processing%20impacts%20the%20%22Export%20Gap%22%20and%20deterministic%20latency%20in%20modern%20edge-based%20computer%20vision%20deployments.&entry.1838667208=http%3A//arxiv.org/abs/2601.12882v2&entry.124074799=Read"},
{"title": "LaS-Comp: Zero-shot 3D Completion with Latent-Spatial Consistency", "author": "Weilong Yan and Haipeng Li and Hao Xu and Nianjin Ye and Yihao Ai and Shuaicheng Liu and Jingyu Hu", "abstract": "This paper introduces LaS-Comp, a zero-shot and category-agnostic approach that leverages the rich geometric priors of 3D foundation models to enable 3D shape completion across diverse types of partial observations. Our contributions are threefold: First, \\ourname{} harnesses these powerful generative priors for completion through a complementary two-stage design: (i) an explicit replacement stage that preserves the partial observation geometry to ensure faithful completion; and (ii) an implicit refinement stage ensures seamless boundaries between the observed and synthesized regions. Second, our framework is training-free and compatible with different 3D foundation models. Third, we introduce Omni-Comp, a comprehensive benchmark combining real-world and synthetic data with diverse and challenging partial patterns, enabling a more thorough and realistic evaluation. Both quantitative and qualitative experiments demonstrate that our approach outperforms previous state-of-the-art approaches. Our code and data will be available at \\href{https://github.com/DavidYan2001/LaS-Comp}{LaS-Comp}.", "link": "http://arxiv.org/abs/2602.18735v2", "date": "2026-03-18", "relevancy": 2.3084, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.578}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.578}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5728}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LaS-Comp%3A%20Zero-shot%203D%20Completion%20with%20Latent-Spatial%20Consistency&body=Title%3A%20LaS-Comp%3A%20Zero-shot%203D%20Completion%20with%20Latent-Spatial%20Consistency%0AAuthor%3A%20Weilong%20Yan%20and%20Haipeng%20Li%20and%20Hao%20Xu%20and%20Nianjin%20Ye%20and%20Yihao%20Ai%20and%20Shuaicheng%20Liu%20and%20Jingyu%20Hu%0AAbstract%3A%20This%20paper%20introduces%20LaS-Comp%2C%20a%20zero-shot%20and%20category-agnostic%20approach%20that%20leverages%20the%20rich%20geometric%20priors%20of%203D%20foundation%20models%20to%20enable%203D%20shape%20completion%20across%20diverse%20types%20of%20partial%20observations.%20Our%20contributions%20are%20threefold%3A%20First%2C%20%5Courname%7B%7D%20harnesses%20these%20powerful%20generative%20priors%20for%20completion%20through%20a%20complementary%20two-stage%20design%3A%20%28i%29%20an%20explicit%20replacement%20stage%20that%20preserves%20the%20partial%20observation%20geometry%20to%20ensure%20faithful%20completion%3B%20and%20%28ii%29%20an%20implicit%20refinement%20stage%20ensures%20seamless%20boundaries%20between%20the%20observed%20and%20synthesized%20regions.%20Second%2C%20our%20framework%20is%20training-free%20and%20compatible%20with%20different%203D%20foundation%20models.%20Third%2C%20we%20introduce%20Omni-Comp%2C%20a%20comprehensive%20benchmark%20combining%20real-world%20and%20synthetic%20data%20with%20diverse%20and%20challenging%20partial%20patterns%2C%20enabling%20a%20more%20thorough%20and%20realistic%20evaluation.%20Both%20quantitative%20and%20qualitative%20experiments%20demonstrate%20that%20our%20approach%20outperforms%20previous%20state-of-the-art%20approaches.%20Our%20code%20and%20data%20will%20be%20available%20at%20%5Chref%7Bhttps%3A//github.com/DavidYan2001/LaS-Comp%7D%7BLaS-Comp%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2602.18735v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLaS-Comp%253A%2520Zero-shot%25203D%2520Completion%2520with%2520Latent-Spatial%2520Consistency%26entry.90 {"title": "VisBrowse-Bench: Benchmarking Visual-Native Search for Multimodal Browsing Agents", "author": "Zhengbo Zhang and Jinbo Su and Zhaowen Zhou and Changtao Miao and Yuhan Hong and Qimeng Wu and Yumeng Liu and Feier Wu and Yihe Tian and Yuhao Liang and Zitong Shan and Wanke Xia and Yi-Fan Zhang and Bo Zhang and Zhe Li and Shiming Xiang and Ying Yan", "abstract": "The rapid advancement of Multimodal Large Language Models (MLLMs) has enabled browsing agents to acquire and reason over multimodal information in the real world. But existing benchmarks suffer from two limitations: insufficient evaluation of visual reasoning ability and the neglect of native visual information of web pages in the reasoning chains. To address these challenges, we introduce a new benchmark for visual-native search, VisBrowse-Bench. It contains 169 VQA instances covering multiple domains and evaluates the models' visual reasoning capabilities during the search process through multimodal evidence cross-validation via text-image retrieval and joint reasoning. These data were constructed by human experts using a multi-stage pipeline and underwent rigorous manual verification. We additionally propose an agent workflow that can effectively drive the browsing agent to actively collect and reason over visual information during the search process. We comprehensively evaluated both open-source and closed-source models in this workflow. Experimental results show that even the best-performing model, Claude-4.6-Opus only achieves an accuracy of 47.6%, while the proprietary Deep Research model, o3-deep-research only achieves an accuracy of 41.1%. The code and data can be accessed at: https://github.com/ZhengboZhang/VisBrowse-Bench", "link": "http://arxiv.org/abs/2603.16289v2", "date": "2026-03-18", "relevancy": 2.3073, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.585}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.585}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.536}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VisBrowse-Bench%3A%20Benchmarking%20Visual-Native%20Search%20for%20Multimodal%20Browsing%20Agents&body=Title%3A%20VisBrowse-Bench%3A%20Benchmarking%20Visual-Native%20Search%20for%20Multimodal%20Browsing%20Agents%0AAuthor%3A%20Zhengbo%20Zhang%20and%20Jinbo%20Su%20and%20Zhaowen%20Zhou%20and%20Changtao%20Miao%20and%20Yuhan%20Hong%20and%20Qimeng%20Wu%20and%20Yumeng%20Liu%20and%20Feier%20Wu%20and%20Yihe%20Tian%20and%20Yuhao%20Liang%20and%20Zitong%20Shan%20and%20Wanke%20Xia%20and%20Yi-Fan%20Zhang%20and%20Bo%20Zhang%20and%20Zhe%20Li%20and%20Shiming%20Xiang%20and%20Ying%20Yan%0AAbstract%3A%20The%20rapid%20advancement%20of%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20has%20enabled%20browsing%20agents%20to%20acquire%20and%20reason%20over%20multimodal%20information%20in%20the%20real%20world.%20But%20existing%20benchmarks%20suffer%20from%20two%20limitations%3A%20insufficient%20evaluation%20of%20visual%20reasoning%20ability%20and%20the%20neglect%20of%20native%20visual%20information%20of%20web%20pages%20in%20the%20reasoning%20chains.%20To%20address%20these%20challenges%2C%20we%20introduce%20a%20new%20benchmark%20for%20visual-native%20search%2C%20VisBrowse-Bench.%20It%20contains%20169%20VQA%20instances%20covering%20multiple%20domains%20and%20evaluates%20the%20models%27%20visual%20reasoning%20capabilities%20during%20the%20search%20process%20through%20multimodal%20evidence%20cross-validation%20via%20text-image%20retrieval%20and%20joint%20reasoning.%20These%20data%20were%20constructed%20by%20human%20experts%20using%20a%20multi-stage%20pipeline%20and%20underwent%20rigorous%20manual%20verification.%20We%20additionally%20propose%20an%20agent%20workflow%20that%20can%20effectively%20drive%20the%20browsing%20agent%20to%20actively%20collect%20and%20reason%20over%20visual%20information%20during%20the%20search%20process.%20We%20comprehensively%20evaluated%20both%20open-source%20and%20closed-source%20models%20in%20this%20workflow.%20Experimental%20results%20show%20that%20even%20the%20best-performing%20model%2C%20Claude-4.6-Opus%20only%20achieves%20an%20accuracy%20of%2047.6%25%2C%20while%20the%20proprietary%20Deep%20Research%20model%2C%20o3-deep-research%20only%20achieves%20an%20accuracy%20of%2041.1%25.%20The%20code%20and%20data%20can%20be%20accessed%20at%3A%20https%3A//github.com/ZhengboZhang/VisBrowse-Bench%0ALink%3A%20http%3A//arxiv.org/abs/2603.16289v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVisBrowse-Bench%253A%2520Benchmarking%2520Visual-Native%2520Search%2520for%2520Multimodal%2520Browsing%2520Agents%26entry.906535625%3DZhengbo%2520Zhang%2520and%2520Jinbo%2520Su%2520and%2520Zhaowen%2520Zhou%2520and%2520Changtao%2520Miao%2520and%2520Yuhan%2520Hong%2520and%2520Qimeng%2520Wu%2520and%2520Yumeng%2520Liu%2520and%2520Feier%2520Wu%2520and%2520Yihe%2520Tian%2520and%2520Yuhao%2520Liang%2520and%2520Zitong%2520Shan%2520and%2520Wanke%2520Xia%2520and%2520Yi-Fan%2520Zhang%2520and%2520Bo%2520Zhang%2520and%2520Zhe%2520Li%2520and%2520Shiming%2520Xiang%2520and%2520Ying%2520Yan%26entry.1292438233%3DThe%2520rapid%2520advancement%2520of%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520has%2520enabled%2520browsing%2520agents%2520to%2520acquire%2520and%2520reason%2520over%2520multimodal%2520information%2520in%2520the%2520real%2520world.%2520But%2520existing%2520benchmarks%2520suffer%2520from%2520two%2520limitations%253A%2520insufficient%2520evaluation%2520of%2520visual%2520reasoning%2520ability%2520and%2520the%2520neglect%2520of%2520native%2520 {"title": "EngGPT2: Sovereign, Efficient and Open Intelligence", "author": "G. Ciarfaglia and A. Rosanova and S. Cipolla and J. Bartoli and A. Di Domenico and C. Fioroni and A. Fontana and M. R. Scoleri and M. I. Mone and D. Franchi and M. C. Del Gaudio and F. Picariello and M. Gabusi and S. Bonura and V. Morreale and I. Bailo", "abstract": "EngGPT2-16B-A3B is the latest iteration of Engineering Group's Italian LLM and it's built to be a Sovereign, Efficient and Open model. EngGPT2 is trained on 2.5 trillion tokens - less than Qwen3's 36T or Llama3's 15T - and delivers performance on key benchmarks, including MMLU-Pro, GSM8K, IFEval and HumanEval, comparable to dense models in the 8B-16B range, while requiring one-fifth to half of the inference power, and between one-tenth to one-sixth of the training data and consequent needed training power. Designed as a trained-from-scratch Mixture-of-Experts (MoE) architecture, EngGPT2 features 16 billion parameters with 3 billion active per inference, with expert sizes positioned between those used in GPT-OSS and Qwen3. Approximately 25% of its training corpus consists of Italian-language data, to deliver strong capabilities for European and Italian NLP tasks among models of similar scale. This efficiency aims to position EngGPT2 as a key contributor to the growing portfolio of open-weight European models, combining performance and efficiency with full alignment to the EU AI Act. EngGPT2 is also a single model capable of multiple reasoning modes: non-reasoning, reasoning in Italian or English, and turbo-reasoning (a concise, bullet-point style reasoning available in both languages designed for real-time reasoning use cases). EngGPT2 aims to set a new standard for resource-conscious, high-performance LLMs tailored to European and Italian contexts.", "link": "http://arxiv.org/abs/2603.16430v2", "date": "2026-03-18", "relevancy": 2.2995, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/ab {"title": "Automated Grammar-based Algebraic Multigrid Design With Evolutionary Algorithms", "author": "Dinesh Parthasarathy and Wayne Mitchell and Arjun Gambhir and Harald K\u00f6stler and Ulrich R\u00fcde", "abstract": "Although multigrid is asymptotically optimal for solving many important partial differential equations, its efficiency relies heavily on the careful selection of the individual algorithmic components. In contrast to recent approaches that can optimize certain multigrid components using deep learning techniques, we adopt a complementary strategy, employing evolutionary algorithms to construct efficient multigrid cycles from proven algorithmic building blocks. Here, we will present its application to generate efficient algebraic multigrid methods with so-called \\emph{flexible cycling}, that is, level-specific smoothing sequences and non-recursive cycling patterns. The search space with such non-standard cycles is intractable to navigate manually, and is generated using genetic programming (GP) guided by context-free grammars. Numerical experiments with the linear algebra library, \\emph{hypre}, demonstrate the potential of these non-standard GP cycles to improve multigrid performance both as a solver and a preconditioner.", "link": "http://arxiv.org/abs/2603.17641v1", "date": "2026-03-18", "relevancy": 2.2891, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4834}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4606}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4294}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Automated%20Grammar-based%20Algebraic%20Multigrid%20Design%20With%20Evolutionary%20Algorithms&body=Title%3A%20Automated%20Grammar-based%20Algebraic%20Multigrid%20Design%20With%20Evolutionary%20Algorithms%0AAuthor%3A%20Dinesh%20Parthasarathy%20and%20Wayne%20Mitchell%20and%20Arjun%20Gambhir%20and%20Harald%20K%C3%B6stler%20and%20Ulrich%20R%C3%BCde%0AAbstract%3A%20Although%20multigrid%20is%20asymptotically%20optimal%20for%20solving%20many%20important%20partial%20differential%20equations%2C%20its%20efficiency%20relies%20heavily%20on%20the%20careful%20selection%20of%20the%20individual%20algorithmic%20components.%20In%20contrast%20to%20recent%20approaches%20that%20can%20optimize%20certain%20multigrid%20components%20using%20deep%20learning%20techniques%2C%20we%20adopt%20a%20complementary%20strategy%2C%20employing%20evolutionary%20algorithms%20to%20construct%20efficient%20multigrid%20cycles%20from%20proven%20algorithmic%20building%20blocks.%20Here%2C%20we%20will%20present%20its%20application%20to%20generate%20efficient%20algebraic%20multigrid%20methods%20with%20so-called%20%5Cemph%7Bflexible%20cycling%7D%2C%20that%20is%2C%20level-specific%20smoothing%20sequences%20and%20non-recursive%20cycling%20patterns.%20The%20search%20space%20with%20such%20non-standard%20cycles%20is%20intractable%20to%20navigate%20manually%2C%20and%20is%20generated%20using%20genetic%20programming%20%28GP%29%20guided%20by%20context-free%20grammars.%20Numerical%20experiments%20with%20the%20linear%20algebra%20library%2C%20%5Cemph%7Bhypre%7D%2C%20demonstrate%20the%20potential%20of%20these%20non-standard%20GP%20cycles%20to%20improve%20multigrid%20performance%20both%20as%20a%20solver%20and%20a%20preconditioner.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17641v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAutomated%2520Grammar-based%2520Algebraic%2520Multigrid%2520Design%2520With%2520Evolutionary%2520Algorithms%26entry.906535625%3DDinesh%2520Parthasarathy%2520and%2520Wayne%2520Mitchell%2520and%2520Arjun%2520Gambhir%2520and%2520Harald%2520K%25C3%25B6stler%2520 535625=Dinesh%20Parthasarathy%20and%20Wayne%20Mitchell%20and%20Arjun%20Gambhir%20and%20Harald%20K%C3%B6stler%20and%20Ulrich%20R%C3%BCde&entry.1292438233=Although%20multigrid%20is%20asymptotically%20optimal%20for%20solving%20many%20important%20partial%20differential%20equations%2C%20its%20efficiency%20relies%20heavily%20on%20the%20careful%20selection%20of%20the%20individual%20algorithmic%20components.%20In%20contrast%20to%20recent%20approaches%20that%20can%20optimize%20certain%20multigrid%20components%20using%20deep%20learning%20techniques%2C%20we%20adopt%20a%20complementary%20strategy%2C%20employing%20evolutionary%20algorithms%20to%20construct%20efficient%20multigrid%20cycles%20from%20proven%20algorithmic%20building%20blocks.%20Here%2C%20we%20will%20present%20its%20application%20to%20generate%20efficient%20algebraic%20multigrid%20methods%20with%20so-called%20%5Cemph%7Bflexible%20cycling%7D%2C%20that%20is%2C%20level-specific%20smoothing%20sequences%20and%20non-recursive%20cycling%20patterns.%20The%20search%20space%20with%20such%20non-standard%20cycles%20is%20intractable%20to%20navigate%20manually%2C%20and%20is%20generated%20using%20genetic%20programming%20%28GP%29%20guided%20by%20context-free%20grammars.%20Numerical%20experiments%20with%20the%20linear%20algebra%20library%2C%20%5Cemph%7Bhypre%7D%2C%20demonstrate%20the%20potential%20of%20these%20non-standard%20GP%20cycles%20to%20improve%20multigrid%20performance%20both%20as%20a%20solver%20and%20a%20preconditioner.&entry.1838667208=http%3A//arxiv.org/abs/2603.17641v1&entry.124074799=Read"},
{"title": "Embedding World Knowledge into Tabular Models: Towards Best Practices for Embedding Pipeline Design", "author": "Oksana Kolomenko and Ricardo Knauer and Erik Rodner", "abstract": "Embeddings are a powerful way to enrich data-driven machine learning models with the world knowledge of large language models (LLMs). Yet, there is limited evidence on how to design effective LLM-based embedding pipelines for tabular prediction. In this work, we systematically benchmark 256 pipeline configurations, covering 8 preprocessing strategies, 16 embedding models, and 2 downstream models. Our results show that it strongly depends on the specific pipeline design whether incorporating the prior knowledge of LLMs improves the predictive performance. In general, concatenating embeddings tends to outperform replacing the original columns with embeddings. Larger embedding models tend to yield better results, while public leaderboard rankings and model popularity are poor performance indicators. Finally, gradient boosting decision trees tend to be strong downstream models. Our findings provide researchers and practitioners with guidance for building more effective embedding pipelines for tabular prediction tasks.", "link": "http://arxiv.org/abs/2603.17737v1", "date": "2026-03-18", "relevancy": 2.2864, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4622}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4548}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4548}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Embedding%20World%20Knowledge%20into%20Tabular%20Models%3A%20Towards%20Best%20Practices%20for%20Embedding%20Pipeline%20Design&body=Title%3A%20Embedding%20World%20Knowledge%20into%20Tabular%20Models%3A%20Towards%20Best%20Practices%20for%20Embedding%20Pipeline%20Design%0AAuthor%3A%20Oksana%20Kolomenko%20and%20Ricardo%20Knauer%20and%20Erik%20Rodner%0AAbstract%3A%20Embeddings%20are%20a%20powerful%20way%20to%20enrich%20data-driven%20machine%20learning%20models%20with%20the%20world%20knowledge%20of%20large%20language%20models%20%28LLMs%29.%20Yet%2C%20there%20is%20limited%20evidence%20on%20how%20to%20design%20effective%20LLM-based%20embedding%20pipelines%20for%20tabular%20prediction.%20In%20this%20work%2C%20we%20systematically%20benchmark%20256%20pipeline%20configurations%2C%20covering%208%20preprocessing%20strategies%2C%2016%20embedding%20models%2C%20and%202%20downstream%20models.%20Our%20results%20show%20that%20it%20strongly%20depends%20on%20the%20specific%20pipeline%20design%20whether%20incorporating%20the%20prior%20knowledge%20of%20LLMs%20improves%20the%20predictive%20performance.%20In%20general%2C%20concatenating%20embeddings%20tends%20to%20outperform%20replacing%20the%20original%20columns%20with%20embeddings.%20Larger%20embedding%20models%20tend%20to%20yield%20better%20results%2C%20while%20public%20leaderboard%20rankings%20and%20model%20popularity%20are%20poor%20performance%20indicators.%20Finally%2C%20gradient%20boosting%20decision%20trees%20tend%20to%20be%20strong%20downstream%20models.%20Our%20findings%20provide%20researchers%20and%20practitioners%20with%20guidance%20for%20building%20more%20effective%20embedding%20pipelines%20for%20tabular%20prediction%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17737v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEmbedding%2520World%2520Knowledge%2520into%2520Tabular%2520Models%253A%2520Towards%2520Best%2520Practices%2520for%2520Embedding%2520Pipeline%2520Design%26entry.906535625%3DOksana%2520Kolomenko%2520and%2520Ricardo%2520Knauer%2520and%2520Erik%2520Rodner%26entry.1292 {"title": "RangeAD: Fast On-Model Anomaly Detection", "author": "Luca Hinkamp and Simon Kl\u00fcttermann and Emmanuel M\u00fcller", "abstract": "In practice, machine learning methods commonly require anomaly detection (AD) to filter inputs or detect distributional shifts. Typically, this is implemented by running a separate AD model alongside the primary model. However, this separation ignores the fact that the primary model already encodes substantial information about the target distribution. In this paper, we introduce On-Model AD, a setting for anomaly detection that explicitly leverages access to a related machine learning model. Within this setting, we propose RangeAD, an algorithm that utilizes neuron-wise output ranges derived from the primary model. RangeAD achieves superior performance even on high-dimensional tasks while incurring substantially lower inference costs. Our results demonstrate the potential of the On-Model AD setting as a practical framework for efficient anomaly detection.", "link": "http://arxiv.org/abs/2603.17795v1", "date": "2026-03-18", "relevancy": 2.2849, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4652}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4639}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4418}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RangeAD%3A%20Fast%20On-Model%20Anomaly%20Detection&body=Title%3A%20RangeAD%3A%20Fast%20On-Model%20Anomaly%20Detection%0AAuthor%3A%20Luca%20Hinkamp%20and%20Simon%20Kl%C3%BCttermann%20and%20Emmanuel%20M%C3%BCller%0AAbstract%3A%20In%20practice%2C%20machine%20learning%20methods%20commonly%20require%20anomaly%20detection%20% {"title": "DiffVP: Differential Visual Semantic Prompting for LLM-Based CT Report Generation", "author": "Yuhe Tian and Kun Zhang and Haoran Ma and Rui Yan and Yingtai Li and Rongsheng Wang and Shaohua Kevin Zhou", "abstract": "While large language models (LLMs) have advanced CT report generation, existing methods typically encode 3D volumes holistically, failing to distinguish informative cues from redundant anatomical background. Inspired by radiological cognitive subtraction, we propose Differential Visual Prompting (DiffVP), which conditions report generation on explicit, high-level semantic scan-to-reference differences rather than solely on absolute visual features. DiffVP employs a hierarchical difference extractor to capture complementary global and local semantic discrepancies into a shared latent space, along with a difference-to-prompt generator that transforms these signals into learnable visual prefix tokens for LLM conditioning. These difference prompts serve as structured conditioning signals that implicitly suppress invariant anatomy while amplifying diagnostically relevant visual evidence, thereby facilitating accurate report generation without explicit lesion localization. On two large-scale benchmarks, DiffVP consistently outperforms prior methods, improving the average BLEU-1-4 by +10.98 and +4.36, respectively, and further boosts clinical efficacy on RadGenome-ChestCT (F1 score 0.421). All codes will be released at https://github.com/ArielTYH/DiffVP/.", "link": "http://arxiv.org/abs/2603.17718v1", "date": "2026-03-18", "relevancy": 2.2759, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5775}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5775}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5263}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DiffVP%3A%20Differential%20Visual%20Semantic%20Prompting%20for%20LLM-Based%20CT%20Report%20Generation&body=Title%3A%20DiffVP%3A%20Differential%20Visual%20Semantic%20Prompting%20for%20LLM-Based%20CT%20Report%20Generation%0AAuthor%3A%20Yuhe%20Tian%20and%20Kun%20Zhang%20and%20Haoran%20Ma%20and%20Rui%20Yan%20and%20Yingtai%20Li%20and%20Rongsheng%20Wang%20and%20Shaohua%20Kevin%20Zhou%0AAbstract%3A%20While%20large%20language%20models%20%28LLMs%29%20have%20advanced%20CT%20report%20generation%2C%20existing%20methods%20typically%20encode%203D%20volumes%20holistically%2C%20failing%20to%20distinguish%20informative%20cues%20from%20redundant%20anatomical%20background.%20Inspired%20by%20radiological%20cognitive%20subtraction%2C%20we%20propose%20Differential%20Visual%20Prompting%20%28DiffVP%29%2C%20which%20conditions%20report%20generation%20on%20explicit%2C%20high-level%20semantic%20scan-to-reference%20differences%20rather%20than%20solely%20on%20absolute%20visual%20features.%20DiffVP%20employs%20a%20hierarchical%20difference%20extractor%20to%20capture%20complementary%20global%20and%20local%20semantic%20discrepancies%20into%20a%20shared%20latent%20space%2C%20along%20with%20a%20difference-to-prompt%20generator%20that%20transforms%20these%20signals%20into%20learnable%20visual%20prefix%20tokens%20for%20LLM%20conditioning.%20These%20difference%20prompts%20serve%20as%20structured%20conditioning%20signals%20that%20implicitly%20suppress%20invariant%20anatomy%20while%20amplifying%20diagnostically%20relevant%20visual%20evidence%2C%20thereby%20facilitating%20accurate%20report%20generation%20without%20explicit%20lesion%20localization.%20On%20two%20large-scale%20benchmarks%2C%20DiffVP%20consistently%20outperforms%20prior%20methods%2C%20improving%20the%20average%20BLEU-1-4%20by%20%2B10.98%20and%20%2B4.36%2C%20respectively%2C%20and%20further%20boosts%20clinical%20efficacy%20on%20RadGenome-ChestCT%20%28F1%20score%200.421%29.%20All%20codes%20will%20be%20released%20at%20https%3A//github.com/ArielTYH/DiffVP/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17718v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDiffVP%253A%2520Differential%2520Visual%2520Semantic%2520Prompting%2520for%2520LLM-Based%2520CT%2520Report%2520Generation%26entry.906535625%3DYuhe%2520Tian%2520and%2520Kun%2520Zhang%2520and%2520Haoran%2520Ma%2520and%2520Rui%2520Yan%2520and%2520Yingtai%2520Li%2520and%2520Rongsheng%2520Wang%2520and%2520Shaohua%2520Kevin%2520Zhou%26entry.1292438233%3DWhile%2520large%2520language%2520models%2520%2528LLMs%2529%2520have%2520advanced%2520CT%2520report%2520generation%252C%2520existing%2520methods%2520typically%2520encode%25203D%2520volumes%2520holistically%252C%2520failing%2520to%2520distinguish%2520informative%2520cues%2520from%2520redundant%2520anatomical%2520background.%2520Inspired%2520by%2520radiological%2520cognitive%2520subtraction%252C%2520we%2520propose%2520Differential%2520Visual%2520Prompting%2520%2528DiffVP%2529%252C%2520which%2520conditions%2520report%2520generation%2520on%2520explicit%252C%2520high-level%2520semantic%2520scan-to-reference%2520differences%2520rather%2520than%2520solely%2520on%2520absolute%2520visual%2520features.%2520DiffVP%2520employs%2520a%2520hierarchical%2520difference%2520extractor%2520to%2520capture%2520complementary%2520global%2520and%2520local%2520semantic%2520discrepancies%2520into%2520a%2520shared%2520latent%2520space%252C%2520along%2520with%2520a%2520difference-to-prompt%2520generator%2520that%2520transforms%2520these%2520signals%2520into%2520learnable%2520visual%2520prefix%2520tokens%2520for%2520LLM%2520conditioning.%2520These%2520difference%2520prompts%2520serve%2520as%2520structured%2520conditioning%2520signals%2520that%2520implicitly%2520suppress%2520invariant%2520anatomy%2520while%2520amplifying%252 {"title": "A Comprehensive Benchmark of Histopathology Foundation Models for Kidney Digital Pathology Images", "author": "Harishwar Reddy Kasireddy and Patricio S. La Rosa and Akshita Gupta and Anindya S. Paul and Jamie L. Fermin and William L. Clapp and Meryl A. Waldman and Tarek M. El-Ashkar and Sanjay Jain and Luis Rodrigues and Kuang Yu Jen and Avi Z. Rosenberg and Michael T. Eadon and Jeffrey B. Hodgin and Pinaki Sarder", "abstract": "Histopathology foundation models (HFMs), pretrained on large-scale cancer datasets, have advanced computational pathology. However, their applicability to non-cancerous chronic kidney disease remains underexplored, despite coexistence of renal pathology with malignancies such as renal cell and urothelial carcinoma. We systematically evaluate 11 publicly available HFMs across 11 kidney-specific downstream tasks spanning multiple stains (PAS, H&E, PASM, and IHC), spatial scales (tile and slide-level), task types (classification, regression, and copy detection), and clinical objectives, including detection, diagnosis, and prognosis. Tile-level performance is assessed using repeated stratified group cross-validation, while slide-level tasks are evaluated using repeated nested stratified cross-validation. Statistical significance is examined using Friedman test followed by pairwise Wilcoxon signed-rank testing with Holm-Bonferroni correction and compact letter display visualization. To promote reproducibility, we release an open-source Python package, kidney-hfm-eval, available at https://pypi.org/project/kidney-hfm-eval/ , that reproduces the evaluation pipelines. Results show moderate to strong performance on tasks driven by coarse meso-scale renal morphology, including diagnostic classification and detection of prominent structural alterations. In contrast, performance consistently declines for tasks requiring fine-grained microstructural discrimination, complex biological phenotypes, or slide-level prognostic inference, largely independent of stain type. Overall, current HFMs appear to encode predominantly static meso-scale representations and may have limited capacity to capture subtle renal pathology or prognosis-related signals. Our results highlight the need for kidney-specific, multi-stain, and multimodal foundation models to support clinically reliable decision-making in nephrology.", "link": "http://arxiv.org/abs/2603.15967v2", "date": "2026-03-18", "relevancy": 2.2741, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4666}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4666}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4312}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Comprehensive%20Benchmark%20of%20Histopathology%20Foundation%20Models%20for%20Kidney%20Digital%20Pathology%20Images&body=Title%3A%20A%20Comprehensive%20Benchmark%20of%20Histopathology%20Foundation%20Models%20for%20Kidney%20Digital%20Pathology%20Images%0AAuthor%3A%20Harishwar%20Reddy%20Kasireddy%20and%20Patricio%20S.%20La%20Rosa%20and%20Akshita%20Gupta%20and%20Anindya%20S.%20Paul%20and%20Jamie%20L.%20Fermin%20and%20William%20L.%20Clapp%20and%20Meryl%20A.%20Waldman%20and%20Tarek%20M.%20El-Ashkar%20and%20Sanjay%20Jain%20and%20Luis%20Rodrigues%20and%20Kuang%20Yu%20Jen%20and%20Avi%20Z.%20Rosenberg%20and%20Michael%20T.%20Eadon%20and%20Jeffrey%20B.%20Hodgin%20and%20Pinaki%20Sarder%0AAbstract%3A%20Histopathology%20foundation%20models%20%28HFMs%29%2C%20pretrained%20on%20large-scale%20cancer%20datasets%2C%20have%20advanced%20computational%20pathology.%20However%2C%20their%20applicability%20to%20non-cancerous%20chronic%20kidney%20disease%20remains%20underexplored%2C%20despite%20coexistence%20of%20renal%20pathology%20with%20malignancies%20such%20as%20renal%20cell%20and%20urothelial%20carcinoma.%20We%20systematically%20evaluate%2011%20publicly%20available%20HFMs%20across%2011%20kidney-specific%20downstream%20tasks%20spanning%20multiple%20stains%20%28PAS%2C%20H%26E%2C%20PASM%2C%20and%20IHC%29%2C%20spatial%20scales%20%28tile%20and%20slide-level%29%2C%20task%20types%20%28classification%2C%20regression%2C%20and%20copy%20detection%29%2C%20and%20clinical%20objectives%2C%20including%20detection%2C%20diagnosis%2C%20and%20prognosis.%20Tile-level%20performance%20is%20assessed%20using%20repeated%20stratified%20group%20cross-validation%2C%20while%20slide-level%20tasks%20are%20evaluated%20using%20repeated%20nested%20stratified%20cross-validation.%20Statistical%20significance%20is%20examined%20using%20Friedman%20test%20followed%20by%20pairwise%20Wilcoxon%20signed-rank%20testing%20with%20Holm-Bonferroni%20correction%20and%20compact%20letter%20display%20visualization.%20To%20promote%20reproducibility%2C%20we%20release%20an%20open-source%20Python%20package%2C%20kidney-hfm-eval%2C%20available%20at%20https%3A//pypi.org/project/kidney-hfm-eval/%20%2C%20that%20reproduces%20the%20evaluation%20pipelines.%20Results%20show%20moderate%20to%20strong%20performance%20on%20tasks%20driven%20by%20coarse%20meso-scale%20renal%20morphology%2C%20including%20diagnostic%20classification%20and%20detection%20of%20prominent%20structural%20alterations.%20In%20contrast%2C%20performance%20consistently%20declines%20for%20tasks%20requiring%20fine-grained%20microstructural%20discrimination%2C%20complex%20biological%20phenotypes%2C%20or%20slide-level%20prognostic%20inference%2C%20largely%20independent%20of%20stain%20type.%20Overall%2C%20current%20HFMs%20appear%20to%20encode%20predominantly%20static%20meso-scale%20representations%20and%20may%20have%20limited%20capacity%20to%20capture%20subtle%20renal%20pathology%20or%20prognosis-related%20signals.%20Our%20results%20highlight%20the%20need%20for%20ki {"title": "Concept-to-Pixel: Prompt-Free Universal Medical Image Segmentation", "author": "Haoyun Chen and Fenghe Tang and Wenxin Ma and Shaohua Kevin Zhou", "abstract": "Universal medical image segmentation seeks to use a single foundational model to handle diverse tasks across multiple imaging modalities. However, existing approaches often rely heavily on manual visual prompts or retrieved reference images, which limits their automation and robustness. In addition, naive joint training across modalities often fails to address large domain shifts. To address these limitations, we propose Concept-to-Pixel (C2P), a novel prompt-free universal segmentation framework. C2P explicitly separates anatomical knowledge into two components: Geometric and Semantic representations. It leverages Multimodal Large Language Models (MLLMs) to distill abstract, high-level medical concepts into learnable Semantic Tokens and introduces explicitly supervised Geometric Tokens to enforce universal physical and structural constraints. These disentangled tokens interact deeply with image features to generate input-specific dynamic kernels for precise mask prediction. Furthermore, we introduce a Geometry-Aware Inference Consensus mechanism, which utilizes the model's predicted geometric constraints to assess prediction reliability and suppress outliers. Extensive experiments and analysis on a unified benchmark comprising eight diverse datasets across seven modalities demonstrate the significant superiority of our jointly trained approach, compared to universe- or single-model approaches. Remarkably, our unified model demonstrates strong generalization, achieving impressive results not only on zero-shot tasks involving unseen cases but also in cross-modal transfers across similar tasks. Code is available at: https://github.com/Yundi218/Concept-to-Pixel", "link": "http://arxiv.org/abs/2603.17746v1", "date": "2026-03-18", "relevancy": 2.2717, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5789}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5622}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5549}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Concept-to-Pixel%3A%20Prompt-Free%20Universal%20Medical%20Image%20Segmentation&body=Title%3A%20Concept-to-Pixel%3A%20Prompt-Free%20Universal%20Medical%20Image%20Segmentation%0AAuthor%3A%20Haoyun%20Chen%20and%20Fenghe%20Tang%20and%20Wenxin%20Ma%20and%20Shaohua%20Kevin%20Zhou%0AAbstract%3A%20Universal%20medical%20image%20segmentation%20seeks%20to%20use%20a%20single%20foundational%20model%20to%20handle%20diverse%20tasks%20across%20multiple%20imaging%20modalities.%20However%2C%20existing%20approaches%20often%20rely%20heavily%20on%20manual%20visual%20prompts%20or%20retrieved%20reference%20images%2C%20which%20limits%20their%20automation%20and%20robustness.%20In%20addition%2C%20naive%20joint%20training%20across%20modalities%20often%20fails%20to%20address%20large%20domain%20shifts.%20To%20address%20these%20limitations%2C%20we%20propose%20Concept-to-Pixel%20%28C2P%29%2C%20a%20novel%20prompt-free%20universal%20segmentation%20framework.%20C2P%20explicitly%20separates%20anatomical%20knowledge%20into%20two%20components%3A%20Geometric%20and%20Semantic%20representations.%20It%20leverages%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20to%20distill%20abstract%2C%20high-level%20medical%20concepts%20into%20learnable%20Semantic%20Tokens%20and%20introduces%20explicitly%20supervised%20Geometric%20Tokens%20to%20enforce%20universal%20physical%20and%20structural%20constraints.%20These%20disentangled%20tokens%20interact%20deeply%20with%20image%20features%20to%20generate%20input-specific%20dynamic%20kernels%20for%20precise%20mask%20prediction.%20Furthermore%2C%20we%20introduce%20a%20Geometry-Aware%20Inference%20Consensus%20mechanism%2C%20which%20utilizes%20the%20model%27s%20predicted%20geometric%20constraints%20to%20assess%20prediction%20reliability%20and%20suppress%20outliers.%20Extensive%20experiments%20and%20analysis%20on%20a%20unified%20benchmark%20comprising%20eight%20diverse%20datasets%20across%20seven%20modalities%20demonstrate%20the%20significant%20superiority%20of%20our%20jointly%20trained%20approach%2C%20compared%20to%20universe-%20or%20single-model%20approaches.%20Remarkably%2C%20our%20unified%20model%20demonstrates%20strong%20generalization%2C%20achieving%20impressive%20results%20not%20only%20on%20zero-shot%20tasks%20involving%20unseen%20cases%20but%20also%20in%20cross-modal%20transfers%20across%20similar%20tasks.%20Code%20is%20available%20at%3A%20https%3A//github.com/Yundi218/Concept-to-Pixel%0ALink%3A%20http%3A//arxiv.org/abs/2603.17746v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DConcept-to-Pixel%253A%2520Prompt-Free%2520Universal%2520Medical%2520Image%2520Segmentation%26entry.906535625%3DHaoyun%2520Chen%2520and%2520Fenghe%2520Tang%2520and%2520Wenxin%2520Ma%2520and%2520Shaohua%2520Kevin%2520Zhou%26entry.1292438233%3DUniversal%2520medical%2520image%2520segmentation%2520seeks%2520to%2520use%2520a%2520single%2520foundational%2520model%2520to%2520handle%2520diverse%2520tasks%2520across%2520multiple%2520imaging%2520modalities.%2520However%252C%2520existing%2520approaches%2520often%2520rely%2520heavily%2520on%2520manual%2520visual%2520prompts%2520or%2520retrieved%2520reference%2520images%252C%2520which%2520limits%2520their%2520automation%2520and%2520robustness.%2520In%2520addition%252C%2520naive%2520joint%2520training%2520across%2520modalities%2520often%2520fails%2520to%2520address%2520large%2520domain%2520shifts.%2520To%2520addr {"title": "VolumeDP: Modeling Volumetric Representation for Manipulation Policy Learning", "author": "Tianxing Zhou and Feiyang Xue and Zhangchen Ye and Tianyuan Yuan and Hang Zhao and Tao Jiang", "abstract": "Imitation learning is a prominent paradigm for robotic manipulation. However, existing visual imitation methods map 2D image observations directly to 3D action outputs, imposing a 2D-3D mismatch that hinders spatial reasoning and degrades robustness. We present VolumeDP, a policy architecture that restores spatial alignment by explicitly reasoning in 3D. VolumeDP first lifts image features into a Volumetric Representation via cross-attention. It then selects task-relevant voxels with a learnable module and converts them into a compact set of spatial tokens, markedly reducing computation while preserving action-critical geometry. Finally, a multi-token decoder conditions on the entire token set to predict actions, thereby avoiding lossy aggregation that collapses multiple spatial tokens into a single descriptor. VolumeDP achieves a state-of-the-art average success rate of 88.8% on the LIBERO simulation benchmark, outperforming the strongest baseline by a substantial 14.8% improvement. It also delivers large performance gains over prior methods on the ManiSkill and LIBERO-Plus benchmarks. Real-world experiments further demonstrate higher success rates and robust generalization to novel spatial layouts, camera viewpoints, and environment backgrounds. Code will be released.", "link": "http://arxiv.org/abs/2603.17720v1", "date": "2026-03-18", "relevancy": 2.2689, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5757}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5696}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5578}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VolumeDP%3A%20Modeling%20Volumetric%20Representation%20for%20Manipulation%20Policy%20Learning&body=Title%3A%20VolumeDP%3A%20Modeling%20Volumetric%20Representation%20for%20Manipulation%20Policy%20Learning%0AAuthor%3A%20Tianxing%20Zhou%20and%20Feiyang%20Xue%20and%20Zhangchen%20Ye%20and%20Tianyuan%20Yuan%20and%20Hang%20Zhao%20and%20Tao%20Jiang%0AAbstract%3A%20Imitation%20learning%20is%20a%20prominent%20paradigm%20for%20robotic%20manipulation.%20However%2C%20existing%20visual%20imitation%20methods%20map%202D%20image%20observations%20directly%20to%203D%20action%20outputs%2C%20imposing%20a%202D-3D%20mismatch%20that%20hinders%20spatial%20reasoning%20and%20degrades%20robustness.%20We%20present%20VolumeDP%2C%20a%20policy%20architecture%20that%20restores%20spatial%20alignment%20by%20explicitly%20reasoning%20in%203D.%20VolumeDP%20first%20lifts%20image%20features%20into%20a%20Volumetric%20Representation%20via%20cross-attention.%20It%20then%20selects%20task-relevant%20voxels%20with%20a%20learnable%20module%20and%20converts%20them%20into%20a%20compact%20set%20of%20spatial%20tokens%2C%20markedly%20reducing%20computation%20while%20preserving%20action-critical%20geometry.%20Finally%2C%20a%20multi-token%20decoder%20conditions%20on%20the%20entire%20token%20set%20to%20predict%20actions%2C%20thereby%20avoiding%20lossy%20aggregation%20that%20collapses%20multiple%20spatial%20tokens%20into%20a%20single%20descriptor.%20VolumeDP%20achieves%20a%20state-of-the-art%20average%20success%20rate%20of%2088.8%25%20on%20the%20LIBERO%20simulation%20benchmark%2C%20outperforming%20the%20strongest%20baseline%20by%20a%20substantial%2014.8%25%20improvement.%20It%20also%20delivers%20large%20performance%20gains%20over%20prior%20methods%20on%20the%20ManiSkill%20and%20LIBERO-Plus%20benchmarks.%20Real-world%20experiments%20further%20demonstrate%20higher%20success%20rates%20and%20robust% {"title": "On the Dynamic Regret of Following the Regularized Leader: Optimism with History Pruning", "author": "Naram Mhaisen and George Iosifidis", "abstract": "We revisit the Follow the Regularized Leader (FTRL) framework for Online Convex Optimization (OCO) over compact sets, focusing on achieving dynamic regret guarantees. Prior work has highlighted the framework's limitations in dynamic environments due to its tendency to produce \"lazy\" iterates. However, building on insights showing FTRL's ability to produce \"agile\" iterates, we show that it can indeed recover known dynamic regret bounds through optimistic composition of future costs and careful linearization of past costs, which can lead to pruning some of them. This new analysis of FTRL against dynamic comparators yields a principled way to interpolate between lazy and agile updates and offers several benefits, including refined control over regret terms, optimism without cyclic dependence, and the application of minimal recursive regularization akin to AdaFTRL. More broadly, we show that it is not the \"lazy\" projection style of FTRL that hinders (optimistic) dynamic regret, but the decoupling of the algorithm's state (linearized history) from its iterates, allowing the state to grow arbitrarily. Instead, pruning synchronizes these two when necessary.", "link": "http://arxiv.org/abs/2505.22899v3", "date": "2026-03-18", "relevancy": 2.2678, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4642}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4496}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4468}], "mail c%2520regret%252C%2520but%2520the%2520decoupling%2520of%2520the%2520algorithm%2527s%2520state%2520%2528linearized%2520history%2529%2520from%2520its%2520iterates%252C%2520allowing%2520the%2520state%2520to%2520grow%2520arbitrarily.%2520Instead%252C%2520pruning%2520synchronizes%2520these%2520two%2520when%2520necessary.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2505.22899v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=On%20the%20Dynamic%20Regret%20of%20Following%20the%20Regularized%20Leader%3A%20Optimism%20with%20History%20Pruning&entry.906535625=Naram%20Mhaisen%20and%20George%20Iosifidis&entry.1292438233=We%20revisit%20the%20Follow%20the%20Regularized%20Leader%20%28FTRL%29%20framework%20for%20Online%20Convex%20Optimization%20%28OCO%29%20over%20compact%20sets%2C%20focusing%20on%20achieving%20dynamic%20regret%20guarantees.%20Prior%20work%20has%20highlighted%20the%20framework%27s%20limitations%20in%20dynamic%20environments%20due%20to%20its%20tendency%20to%20produce%20%22lazy%22%20iterates.%20However%2C%20building%20on%20insights%20showing%20FTRL%27s%20ability%20to%20produce%20%22agile%22%20iterates%2C%20we%20show%20that%20it%20can%20indeed%20recover%20known%20dynamic%20regret%20bounds%20through%20optimistic%20composition%20of%20future%20costs%20and%20careful%20linearization%20of%20past%20costs%2C%20which%20can%20lead%20to%20pruning%20some%20of%20them.%20This%20new%20analysis%20of%20FTRL%20against%20dynamic%20comparators%20yields%20a%20principled%20way%20to%20interpolate%20between%20lazy%20and%20agile%20updates%20and%20offers%20several%20benefits%2C%20including%20refined%20control%20over%20regret%20terms%2C%20optimism%20without%20cyclic%20dependence%2C%20and%20the%20application%20of%20minimal%20recursive%20regularization%20akin%20to%20AdaFTRL.%20More%20broadly%2C%20we%20show%20that%20it%20is%20not%20the%20%22lazy%22%20projection%20style%20of%20FTRL%20that%20hinde {"title": "Can Blindfolded LLMs Still Trade? An Anonymization-First Framework for Portfolio Optimization", "author": "Joohyoung Jeon and Hongchul Lee", "abstract": "For LLM trading agents to be genuinely trustworthy, they must demonstrate understanding of market dynamics rather than exploitation of memorized ticker associations. Building responsible multi-agent systems demands rigorous signal validation: proving that predictions reflect legitimate patterns, not pre-trained recall. We address two sources of spurious performance: memorization bias from ticker-specific pre-training, and survivorship bias from flawed backtesting. Our approach is to blindfold the agents--anonymizing all identifiers--and verify whether meaningful signals persist. BlindTrade anonymizes tickers and company names, and four LLM agents output scores along with reasoning. We construct a GNN graph from reasoning embeddings and trade using PPO-DSR policy. On 2025 YTD (through 2025-08-01), we achieved Sharpe 1.40 +/- 0.22 across 20 seeds and validated signal legitimacy through negative control experiments. To assess robustness beyond a single OOS window, we additionally evaluate an extended period (2024--2025), revealing market-regime dependency: the policy excels in volatile conditions but shows reduced alpha in trending bull markets.", "link": "http://arxiv.org/abs/2603.17692v1", "date": "2026-03-18", "relevancy": 2.2661, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4696}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4523}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-2 {"title": "Versatile Editing of Video Content, Actions, and Dynamics without Training", "author": "Vladimir Kulikov and Roni Paiss and Andrey Voynov and Inbar Mosseri and Tali Dekel and Tomer Michaeli", "abstract": "Controlled video generation has seen drastic improvements in recent years. However, editing actions and dynamic events, or inserting contents that should affect the behaviors of other objects in real-world videos, remains a major challenge. Existing trained models struggle with complex edits, likely due to the difficulty of collecting relevant training data. Similarly, existing training-free methods are inherently restricted to structure- and motion-preserving edits and do not support modification of motion or interactions. Here, we introduce DynaEdit, a training-free editing method that unlocks versatile video editing capabilities with pretrained text-to-video flow models. Our method relies on the recently introduced inversion-free approach, which does not intervene in the model internals, and is thus model-agnostic. We show that naively attempting to adapt this approach to general unconstrained editing results in severe low-frequency misalignment and high-frequency jitter. We explain the sources for these phenomena and introduce novel mechanisms for overcoming them. Through extensive experiments, we show that DynaEdit achieves state-of-the-art results on complex text-based video editing tasks, including modifying actions, inserting objects that interact with the scene, and introducing global effects.", "link": "http://arxiv.org/abs/2603.17989v1", "date": "2026-03-18", "relevancy": 2.265, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6178}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5642}, {"title": "Synthesizing Moving People with 3D Control", "li {"title": "SegFly: A 2D-3D-2D Paradigm for Aerial RGB-Thermal Semantic Segmentation at Scale", "author": "Markus Gross and Sai Bharadhwaj Matha and Rui Song and Viswanathan Muthuveerappan and Conrad Christoph and Julius Huber and Daniel Cremers", "abstract": "Semantic segmentation for uncrewed aerial vehicles (UAVs) is fundamental for aerial scene understanding, yet existing RGB and RGB-T datasets remain limited in scale, diversity, and annotation efficiency due to the high cost of manual labeling and the difficulties of accurate RGB-T alignment on off-the-shelf UAVs. To address these challenges, we propose a scalable geometry-driven 2D-3D-2D paradigm that leverages multi-view redundancy in high-overlap aerial imagery to automatically propagate labels from a small subset of manually annotated RGB images to both RGB and thermal modalities within a unified framework. By lifting less than 3% of RGB images into a semantic 3D point cloud and reprojecting it into all views, our approach enables dense pseudo ground-truth generation across large image collections, automatically producing 97% of RGB labels and 100% of thermal labels while achieving 91% and 88% annotation accuracy without any 2D manual refinement. We further extend this 2D-3D-2D paradigm to cross-modal image registration, using 3D geometry as an intermediate alignment space to obtain fully automatic, strong pixel-level RGB-T alignment with 87% registration accuracy and no hardware-level synchronization. Applying our framework to existing geo-referenced aerial imagery, we construct SegFly, a large-scale benchmark with over 20,000 high-resolution RGB images and more than 15,000 geometrically aligned RGB-T pairs spanning diverse urban, industrial, and rural environments across multiple altitudes and seasons. On SegFly, we establish the Firefly baseline for RGB and thermal semantic segmentation and show that both conventional architectures and vision foundation models benefit substantially from SegFly supervision, highlighting the potential of geometry-driven 2D-3D-2D pipelines for scalable multi-modal scene understanding. Data and Code available at https://github.com/markus-42/SegFly.", "link": "http://arxiv.org/abs/2603.17920v1", "date": "2026-03-18", "relevancy": 2.2538, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.592}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5596}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5364}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SegFly%3A%20A%202D-3D-2D%20Paradigm%20for%20Aerial%20RGB-Thermal%20Semantic%20Segmentation%20at%20Scale&body=Title%3A%20SegFly%3A%20A%202D-3D-2D%20Paradigm%20for%20Aerial%20RGB-Thermal%20Semantic%20Segmentation%20at%20Scale%0AAuthor%3A%20Markus%20Gross%20and%20Sai%20Bharadhwaj%20Matha%20and%20Rui%20Song%20and%20Viswanathan%20Muthuveerappan%20and%20Conrad%20Christoph%20and%20Julius%20Huber%20and%20Daniel%20Cremers%0AAbstract%3A%20Semantic%20segmentation%20for%20uncrewed%20aerial%20vehicles%20%28UAVs%29%20is%20fundamental%20for%20aerial%20scene%20understanding%2C%20yet%20existing%20RGB%20and%20RGB-T%20datasets%20remain%20limited%20in%20scale%2C%20diversity%2C%20and%20annotation%20efficiency%20due%20to%20the%20high%20cost%20of%20manual%20labeling%20and%20the%20difficulties%20of%20accurate%20RGB-T%20alignment%20on%20off-the-shelf%20UAVs.%20To%20address%20these%20challenges%2C%20we%20propose%20a%20scalable%20geometry-driven%202D-3D-2D%20paradigm%20that%20leverages%20multi-view%20redundancy%20in%20high-overlap%20aerial%20imagery%20to%20automatically%20propagate%20labels%20from%20a%20small%20subset%20of%20manually%20annotated%20RGB%20images%20to%20both%20RGB%20and%20thermal%20modalities%20within%20a%20unified%20framework.%20By%20lifting%20less%20than%203%25%20of%20RGB%20images%20into%20a%20semantic%203D%20point%20cloud%20and%20reprojecting%20it%20into%20all%20views%2C%20our%20approach%20enables%20dense%20pseudo%20ground-truth%20generation%20across%20large%20image%20collections%2C%20automatically%20producing%2097%25%20of%20RGB%20labels%20and%20100%25%20of%20thermal%20labels%20while%20achieving%2091%25%20and%2088%25%20annotation%20accuracy%20without%20any%202D%20manual%20refinement.%20We%20further%20extend%20this%202D-3D-2D%20paradigm%20to%20cross-modal%20image%20registration%2C%20using%203D%20geometry%20as%20an%20intermediate%20alignment%20space%20to%20obtain%20fully%20automatic%2C%20strong%20pixel-level%20RGB-T%20alignment%20with%2087%25%20registration%20accuracy%20and%20no%20hardware-level%20synchronization.%20Applying%20our%20framework%20to%20existing%20geo-referenced%20aerial%20imagery%2C%20we%20construct%20SegFly%2C%20a%20large-scale%20benchmark%20with%20over%2020%2C000%20high-resolution%20RGB%20images%20and%20more%20than%2015%2C000%20geometrically%20aligned%20RGB-T%20pairs%20spanning%20diverse%20urban%2C%20industrial%2C%20and%20rural%20environments%20across%20multiple%20altitudes%20and%20seasons.%20On%20SegFly%2C%20we%20establish%20the%20Firefly%20baseline%20for%20RGB%20and%20thermal%20semantic%20segmentation%20and%20show%20that%20both%20conventional%20architectures%20and%20vision%20foundation%20models%20benefit%20substantially%20from%20SegFly%20supervision%2C%20highlighting%20the%20potential%20of%20geometry-driven%202D-3D-2D%20pipelines%20for%20scalable%20multi-modal%20scene%20understanding.%20Data%20and%20Code%20available%20at%20https%3A//github.com/markus-42/SegFly.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17920v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSegFly%253A%2520A%25202D-3D-2D%2520Paradigm%2520for%2520Aerial%2520RGB-Thermal {"title": "Universal Skeleton Understanding via Differentiable Rendering and MLLMs", "author": "Ziyi Wang and Peiming Li and Xinshun Wang and Yang Tang and Kai-Kuang Ma and Mengyuan Liu", "abstract": "Multimodal large language models (MLLMs) exhibit strong visual-language reasoning, yet remain confined to their native modalities and cannot directly process structured, non-visual data such as human skeletons. Existing methods either compress skeleton dynamics into lossy feature vectors for text alignment, or quantize motion into discrete tokens that generalize poorly across heterogeneous skeleton formats. We present SkeletonLLM, which achieves universal skeleton understanding by translating arbitrary skeleton sequences into the MLLM's native visual modality. At its core is DrAction, a differentiable, format-agnostic renderer that converts skeletal kinematics into compact image sequences. Because the pipeline is end-to-end differentiable, MLLM gradients can directly guide the rendering to produce task-informative visual tokens. To further enhance reasoning capabilities, we introduce a cooperative training strategy: Causal Reasoning Distillation transfers structured, step-by-step reasoning from a teacher model, while Discriminative Finetuning sharpens decision boundaries between confusable actions. SkeletonLLM demonstrates strong generalization on diverse tasks including recognition, captioning, reasoning, and cross-format transfer -- suggesting a viable path for applying MLLMs to non-native modalities. Code will be released upon acceptance.", "link": "http://arxiv.org/abs/2603.18003v1", "date": "2026-03-18", "relevancy": 2.2432, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5623}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5616}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5549}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Universal%20Skeleton%20Understanding%20via%20Differentiable%20Rendering%20and%20MLLMs&body=Title%3A%20Universal%20Skeleton%20Understanding%20via%20Differentiable%20Rendering%20and%20MLLMs%0AAuthor%3A%20Ziyi%20Wang%20and%20Peiming%20Li%20and%20Xinshun%20Wang%20and%20Yang%20Tang%20and%20Kai-Kuang%20Ma%20and%20Mengyuan%20Liu%0AAbstract%3A%20Multimodal%20large%20language%20models%20%28MLLMs%29%20exhibit%20strong%20visual-language%20reasoning%2C%20yet%20remain%20confined%20to%20their%20native%20modalities%20and%20cannot%20directly%20process%20structured%2C%20non-visual%20data%20such%20as%20human%20skeletons.%20Existing%20methods%20either%20compress%20skeleton%20dynamics%20into%20lossy%20feature%20vectors%20for%20text%20alignment%2C%20or%20quantize%20motion%20into%20discrete%20tokens%20that%20generalize%20poorly%20across%20heterogeneous%20skeleton%20formats.%20We%20present%20SkeletonLLM%2C%20which%20achieves%20universal%20skeleton%20understanding%20by%20translating%20arbitrary%20skeleton%20sequences%20into%20the%20MLLM%27s%20native%20visual%20modality.%20At%20its%20core%20is%20DrAction%2C%20a%20differentiable%2C%20format-agnostic%20renderer%20that%20converts%20skeletal%20kinematics%20into%20compact%20image%20sequences.%20Because%20the%20pipeline%20is%20end-to-end%20differentiable%2C%20MLLM%20gradients%20can%20directly%20guide%20the%20rendering%20to%20produce%20task-informative%20visual%20tokens.%20To%20further%20enhance%20reasoning%20capabilities%2C%20we%20introduce%20a%20cooperative%20training%20strategy%3A%20Causal%20Reasoning%20Distillation%20transfers%20structured%2C%20step-by-step%20reasoning%20from%20a%20teacher%20model%2C%20while%20Discriminative%20Finetuning%20sharpens%20decision%20boundaries%20between%20confusable%20actions.%20SkeletonLLM%20demonstrates%20strong%20generalization%20on%20diverse%20tasks%20including%20recognition%2C%20captioning%2C%20reasoning%2C%20and%20cross-format%20transfer%20--%20suggesting%20a%20viable%20path%20for%20applying%20MLLMs%20to%20non-native%20modalities.%20Code%20will%20be%20released%20upon%20acceptance.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18003v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUniversal%2520Skeleton%2520Understanding%2520via%2520Differentiable%2520Rendering%2520and%2520MLLMs%26entry.906535625%3DZiyi%2520Wang%2520and%2520Peiming%2520Li%2520and%2520Xinshun%2520Wang%2520and%2520Yang%2520Tang%2520and%2520Kai-Kuang%2520Ma%2520and%2520Mengyuan%2520Liu%26entry.1292438233%3DMultimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520exhibit%2520strong%2520visual-language%2520reasoning%252C%2520yet%2520remain%2520confined%2520to%2520their%2520native%2520modalities%2520and%2520cannot%2520directly%2520process%2520structured%252C%2520non-visual%2520data%2520such%2520as%2520human%2520skeletons.%2520Existing%2520methods%2520either%2520compress%2520skeleton%2520dynamics%2520into%2520lossy%2520feature%2520vectors%2520for%2520text%2520alignment%252C%2520or%2520quantize%2520motion%2520into%2520discrete%2520tokens%2520that%2520generalize%2520poorly%2520across%2520heterogeneous%2520skeleton%2520formats.%2520We%2520present%2520SkeletonLLM%252C%2520which%2520achieves%2520universal%2520skeleton%2520understanding%2520by%2520translating%2520arbitrary%2520skeleton%2520sequences%2520into%2520the%2520MLLM%2527s%2520native%2520visual%2520modality.%2520At%2520its%2520core%2520is%2520DrAction%252C%2520a%2520differentiable%252C%2520format-agnostic%2520renderer%2520that%2520converts%2520skeletal%2520kinematics%2520into%2520compact%2520image%2520sequences.%2520Because%2520the%2520pipeline%2520is%2520end-to-end%2520differentiable%252C%2520MLLM%2520gradients%2520can%2520directly%2520guide%2520the%2520rendering%2520to%2520pro

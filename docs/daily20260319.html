{"title": "FrescoDiffusion: 4K Image-to-Video with Prior-Regularized Tiled Diffusion", "author": "Hugo Caselles-Dupr\u00e9 and Mathis Koroglu and Guillaume Jeanneret and Arnaud Dapogny and Matthieu Cord", "abstract": "Diffusion-based image-to-video (I2V) models are increasingly effective, yet they struggle to scale to ultra-high-resolution inputs (e.g., 4K). Generating videos at the model's native resolution often loses fine-grained structure, whereas high-resolution tiled denoising preserves local detail but breaks global layout consistency. This failure mode is particularly severe in the fresco animation setting: monumental artworks containing many distinct characters, objects, and semantically different sub-scenes that must remain spatially coherent over time. We introduce FrescoDiffusion, a training-free method for coherent large-format I2V generation from a single complex image. The key idea is to augment tiled denoising with a precomputed latent prior: we first generate a low-resolution video at the underlying model resolution and upsample its latent trajectory to obtain a global reference that captures long-range temporal and spatial structure. For 4K generation, we compute per-tile noise predictions and fuse them with this reference at every diffusion timestep by minimizing a single weighted least-squares objective in model-output space. The objective combines a standard tile-merging criterion with our regularization term, yielding a closed-form fusion update that strengthens global coherence while retaining fine detail. We additionally provide a spatial regularization variable that enables region-level control over where motion is allowed. Experiments on the VBench-I2V dataset and our proposed fresco I2V dataset show improved global consistency and fidelity over tiled baselines, while being computationally efficient. Our regularization enables explicit controllability of the trade-off between creativity and consistency.", "link": "http://arxiv.org/abs/2603.17555v1", "date": "2026-03-18", "relevancy": 1.9815, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6895}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.6339}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.6147}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FrescoDiffusion%3A%204K%20Image-to-Video%20with%20Prior-Regularized%20Tiled%20Diffusion&body=Title%3A%20FrescoDiffusion%3A%204K%20Image-to-Video%20with%20Prior-Regularized%20Tiled%20Diffusion%0AAuthor%3A%20Hugo%20Caselles-Dupr%C3%A9%20and%20Mathis%20Koroglu%20and%20Guillaume%20Jeanneret%20and%20Arnaud%20Dapogny%20and%20Matthieu%20Cord%0AAbstract%3A%20Diffusion-based%20image-to-video%20%28I2V%29%20models%20are%20increasingly%20effective%2C%20yet%20they%20struggle%20to%20scale%20to%20ultra-high-resolution%20inputs%20%28e.g.%2C%204K%29.%20Generating%20videos%20at%20the%20model%27s%20native%20resolution%20often%20loses%20fine-grained%20structure%2C%20whereas%20high-resolution%20tiled%20denoising%20preserves%20local%20detail%20but%20breaks%20global%20layout%20consistency.%20This%20failure%20mode%20is%20particularly%20severe%20in%20the%20fresco%20animation%20setting%3A%20monumental%20artworks%20containing%20many%20distinct%20characters%2C%20objects%2C%20and%20semantically%20different%20sub-scenes%20that%20must%20remain%20spatially%20coherent%20over%20time.%20We%20introduce%20FrescoDiffusion%2C%20a%20training-free%20method%20for%20coherent%20large-format%20I2V%20generation%20from%20a%20single%20complex%20image.%20The%20key%20idea%20is%20to%20augment%20tiled%20denoising%20with%20a%20precomputed%20latent%20prior%3A%20we%20first%20generate%20a%20low-resolution%20video%20at%20the%20underlying%20model%20resolution%20and%20upsample%20its%20latent%20trajectory%20to%20obtain%20a%20global%20reference%20that%20captures%20long-range%20temporal%20and%20spatial%20structure.%20For%204K%20generation%2C%20we%20compute%20per-tile%20noise%20predictions%20and%20fuse%20them%20with%20this%20reference%20at%20every%20diffusion%20timestep%20by%20minimizing%20a%20single%20weighted%20least-squares%20objective%20in%20model-output%20space.%20The%20objective%20combines%20a%20standard%20tile-merging%20criterion%20with%20our%20regularization%20term%2C%20yielding%20a%20closed-form%20fusion%20update%20that%20strengthens%20global%20coherence%20while%20retaining%20fine%20detail.%20We%20additionally%20provide%20a%20spatial%20regularization%20variable%20that%20enables%20region-level%20control%20over%20where%20motion%20is%20allowed.%20Experiments%20on%20the%20VBench-I2V%20dataset%20and%20our%20proposed%20fresco%20I2V%20dataset%20show%20improved%20global%20consistency%20and%20fidelity%20over%20tiled%20baselines%2C%20while%20being%20computationally%20efficient.%20Our%20regularization%20enables%20explicit%20controllability%20of%20the%20trade-off%20between%20creativity%20and%20consistency.%0ALink%3A%20http%3A//arxiv.org/abs/2603.17555v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrescoDiffusion%253A%25204K%2520Image-to-Video%2520with%2520Prior-Regularized%2520Tiled%2520Diffusion%26entry.906535625%3DHugo%2520Caselles-Dupr%25C3%25A9%2520and%2520Mathis%2520Koroglu%2520and%2520Guillaume%2520Jeanneret%2520and%2520Arnaud%2520Dapogny%2520and%2520Matthieu%2520Cord%26entry.1292438233%3DDiffusion-based%2520image-to-video%2520%2528I2V%2529%2520models%2520are%2520increasingly%2520effective%252C%2520yet%2520they%2520struggle%2520to%2520scale%2520to%2520ultra-high-resolution%2520inputs%2520%2528e.g.%252C%25204K%2529.%2520Generating%2520videos%2520at%2520the%2520model%2527s%2520native%2520resolution%2520often%2520l nch-I2V%2520dataset%2520and%2520our%2520proposed%2520fresco%2520I2V%2520dataset%2520show%2520improved%2520global%2520consistency%2520and%2520fidelity%2520over%2520tiled%2520baselines%252C%2520while%2520being%2520computationally%2520efficient.%2520Our%2520regularization%2520enables%2520explicit%2520controllability%2520of%2520the%2520trade-off%2520between%2520creativity%2520and%2520consistency.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.17555v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=FrescoDiffusion%3A%204K%20Image-to-Video%20with%20Prior-Regularized%20Tiled%20Diffusion&entry.906535625=Hugo%20Caselles-Dupr%C3%A9%20and%20Mathis%20Koroglu%20and%20Guillaume%20Jeanneret%20and%20Arnaud%20Dapogny%20and%20Matthieu%20Cord&entry.1292438233=Diffusion-based%20image-to-video%20%28I2V%29%20models%20are%20increasingly%20effective%2C%20yet%20they%20struggle%20to%20scale%20to%20ultra-high-resolution%20inputs%20%28e.g.%2C%204K%29.%20Generating%20videos%20at%20the%20model%27s%20native%20resolution%20often%20loses%20fine-grained%20structure%2C%20whereas%20high-resolution%20tiled%20denoising%20preserves%20local%20detail%20but%20breaks%20global%20layout%20consistency.%20This%20failure%20mode%20is%20particularly%20severe%20in%20the%20fresco%20animation%20setting%3A%20monumental%20artworks%20containing%20many%20distinct%20characters%2C%20objects%2C%20and%20semantically%20different%20sub-scenes%20that%20must%20remain%20spatially%20coherent%20over%20time.%20We%20introduce%20FrescoDiffusion%2C%20a%20training-free%20method%20for%20coherent%20large-format%20I2V%20generation%20from%20a%20single%20complex%20image.%20The%20key%20idea%20is%20to%20augment%20tiled%20denoising%20with%20a%20precomputed%20latent%20prior%3A%20we%20first%20generate%20a%20low-resolution%20video%20at%20the%20underlying%20model%20resolution%20and%20upsample%20its%20latent%20trajectory%20to%20obtain%20a%20gl {"title": "Semi-supervised Shelter Mapping for WASH Accessibility Assessment in Rohingya Refugee Camps", "author": "Kyeongjin Ahn and YongHun Suh and Sungwon Han and Jeasurk Yang and Hannes Taubenb\u00f6ck and Meeyoung Cha", "abstract": "Lack of access to Water, Sanitation, and Hygiene (WASH) services is a major public health concern in refugee camps, where extreme crowding accelerates the spread of communicable diseases. The Rohingya settlements in Cox's Bazar, Bangladesh, exemplify these conditions, with large populations living under severe spatial constraints. We develop a semi-supervised segmentation framework using the Segment Anything Model (SAM) to map shelters from multi-temporal sub-meter remote sensing imagery (2017-2025), improving detection in complex camp environments by 4.9% in F1-score over strong baselines. The detected shelter maps show that shelter expansion stabilized after 2020, whereas continued population growth reduced per capita living space by approximately 14% between 2020 and 2025. WASH accessibility, measured with an enhanced network-based two-step floating catchment area (2SFCA) method, declined from 2022 to 2025, increasing facility loads and exceeding global benchmarks. Gender-disaggregated scenarios that incorporate safety penalty further reveal pronounced inequities, with female accessibility approximately 27% lower than male. Together, these results demonstrate that remote sensing-driven AI diagnostics can generate equity-focused evidence to prioritize WASH investments and mitigate health risks in protracted displacement settings.", "link": "http://arxiv.org/abs/2511.07231v4", "date": "2026-03-18", "relevancy": 1.7599, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4692}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4289}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4151}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Semi-supervised%20Shelter%20Mapping%20for%20WASH%20Accessibility%20Assessment%20in%20Rohingya%20Refugee%20Camps&body=Title%3A%20Semi-supervised%20Shelter%20Mapping%20for%20WASH%20Accessibility%20Assessment%20in%20Rohingya%20Refugee%20Camps%0AAuthor%3A%20Kyeongjin%20Ahn%20and%20YongHun%20Suh%20and%20Sungwon%20Han%20and%20Jeasurk%20Yang%20and%20Hannes%20Taubenb%C3%B6ck%20and%20Meeyoung%20Cha%0AAbstract%3A%20Lack%20of%20access%20to%20Water%2C%20Sanitation%2C%20and%20Hygiene%20%28WASH%29%20services%20is%20a%20major%20public%20health%20concern%20in%20refugee%20camps%2C%20where%20extreme%20crowding%20accelerates%20the%20spread%20of%20communicable%20diseases.%20The%20Rohingya%20settlements%20in%20Cox%27s%20Bazar%2C%20Bangladesh%2C%20exemplify%20these%20conditions%2C%20with%20large%20populations%20living%20under%20severe%20spatial%20constraints.%20We%20develop%20a%20semi-supervised%20segmentation%20framework%20using%20the%20Segment%20Anything%20Model%20%28SAM%29%20to%20map%20shelters%20from%20multi-temporal%20sub-meter%20remote%20sensing%20imagery%20%282017-2025%29%2C%20improving%20detection%20in%20complex%20camp%20environments%20by%204.9%25%20in%20F1-score%20over%20strong%20baselines.%20The%20detected%20shelter%20maps%20show%20that%20shelter%20expansion%20stabilized%20after%202020%2C%20whereas%20continued%20population%20growth%20reduced%20per%20capita%20living%20space%20by%20approximately%2014%25%20between%202020%20and%202025.%20WASH%20accessibility%2C%20measured%20with%20an%20enhanced%20network-based%20two-step%20floating%20catchment%20area%20%282SFCA%29%20method%2C%20declined%20from%202022%20to%202025%2C%20increasing%20facility%20loads%20and%20exceeding%20global%20benchmarks.%20Gender-disaggregated%20scenarios%20that%20incorporate%20safety%20penalty%20further%20reveal%20pronounced%20inequities%2C%20with%20female%20accessibility%20approximately%2027%25%20lower%20than%20male.%20Together%2C%20these%20results%20demonstrate%20that%20remote%20sensing-driven%20AI%20diagnostics%20can%20generate%20equity-focused%20evidence%20to%20prioritize%20WASH%20investments%20and%20mitigate%20health%20risks%20in%20protracted%20displacement%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2511.07231v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSemi-supervised%2520Shelter%2520Mapping%2520for%2520WASH%2520Accessibility%2520Assessment%2520in%2520Rohingya%2520Refugee%2520Camps%26entry.906535625%3DKyeongjin%2520Ahn%2520and%2520YongHun%2520Suh%2520and%2520Sungwon%2520Han%2520and%2520Jeasurk%2520Yang%2520and%2520Hannes%2520Taubenb%25C3%25B6ck%2520and%2520Meeyoung%2520Cha%26entry.1292438233%3DLack%2520of%2520access%2520to%2520Water%252C%2520Sanitation%252C%2520and%2520Hygiene%2520%2528WASH%2529%2520services%2520is%2520a%2520major%2520public%2520health%2520concern%2520in%2520refugee%2520camps%252C%2520where%2520extreme%2520crowding%2520accelerates%2520the%2520spread%2520of%2520communicable%2520diseases.%2520The%2520Rohingya%2520settlements%2520in%2520Cox%2527s%2520Bazar%252C%2520Bangladesh%252C%2520exemplify%2520these%2520conditions%252C%2520with%2520large%2520populations%2520living%2520under%2520severe%2520spatial%2520constraints.%2520We%2520develop%2520a%2520semi-supervised%2520segmentation%2520framework%2520using%2520the%2520Segment%2520Anything%2520Model%2520%2528SAM%2529%2520to%2520map%2520shelters%2520from%2520multi-temporal%2520sub-meter%2520remote%2520sensing%2520imagery%2520%25282017-2025%2529%252C%2520improving%2520detection%2520in%2520complex%2520camp%2520environments%2520by%25204.9%2525%2520in%2520F1-score%2520over%2520strong%2520baselines.%2520The%2520detected%2520shelter%2520maps%2520show%2520that%2520shelter%2520expansion%2520stabilized%2520after%25202020%252C%2520whereas%2520continued%2520population%2520growth%2520reduced%2520per%2520capita%2520living%2520space%2520by%2520approximately%252014%2525%2520between%25202020%2520and%25202025.%2520WASH%2520accessibility%252C%2520measured%2520with%2520an%2520enhanced%2520network-based%2520two-step%2520floating%2520catchment%2520area%2520%25282SFCA%2529%2520method%252C%2520declined%2520from%25202022%2520to%25202025%252C%2520increasing%2520facility%2520loads%2520and%2520exceeding%2520global%2520benchmarks.%2520Gender-disaggregated%2520scenarios%2520that%2520incorporate%2520safety%2520penalty%2520further%2520reveal%2520pronounced%2520inequities%252C%2520with%2520female%2520accessibility%2520approximately%252027%2525%2520lower%2520than%2520male.%2520Together%252C%2520these%2520results%2520demonstrate%2520that%2520remote%2520sensing-driven%2520AI%2520diagnostics%2520can%2520generate%2520equity-focused%2520evidence%2520to%2520prioritize%2520WASH%2520investments%2520and%2520mitigate%2520health%2520risks%2520in%2520protracted%2520displacement%2520settings.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.07231v4%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Semi-supervised%20Shelter%20Mapping%20for%20WASH%20Accessibility%20Assessment%20in%20Rohingya%20Refugee%20Camps&entry.906535625=Kyeongjin%20Ahn%20and%20YongHun%20Suh%20and%20Sungwon%20Han%20and%20Jeasurk%20Yang%20and%20Hannes%20Taubenb%C3%B6ck%20and%20Meeyoung%20Cha&entry.1292438233=Lack%20of%20access%20to%20Water%2C%20Sanitation%2C%20and%20Hygiene%20%28WASH%29%20services%20is%20a%20major%20public%20health%20concern%20in%20refugee%20camps%2C%20where%20extreme%20crowding%20accelerates%20the%20spread%20of%20communicable%20diseases.%20The%20Rohingya%20settlements%20in%20Cox%27s%20Bazar%2C%20Bangladesh%2C%20exemplify%20these%20conditions%2C%20with%20l {"title": "Search2Motion: Training-Free Object-Level Motion Control via Attention-Consensus Search", "author": "Sainan Liu and Tz-Ying Wu and Hector A Valdez and Subarna Tripathi", "abstract": "We present Search2Motion, a training-free framework for object-level motion editing in image-to-video generation. Unlike prior methods requiring trajectories, bounding boxes, masks, or motion fields, Search2Motion adopts target-frame-based control, leveraging first-last-frame motion priors to realize object relocation while preserving scene stability without fine-tuning. Reliable target-frame construction is achieved through semantic-guided object insertion and robust background inpainting. We further show that early-step self-attention maps predict object and camera dynamics, offering interpretable user feedback and motivating ACE-Seed (Attention Consensus for Early-step Seed selection), a lightweight search strategy that improves motion fidelity without look-ahead sampling or external evaluators. Noting that existing benchmarks conflate object and camera motion, we introduce S2M-DAVIS and S2M-OMB for stable-camera, object-only evaluation, alongside FLF2V-obj metrics that isolate object artifacts without requiring ground-truth trajectories. Search2Motion consistently outperforms baselines on FLF2V-obj and VBench.", "link": "http://arxiv.org/abs/2603.16711v2", "date": "2026-03-18", "relevancy": 1.8057, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6111}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6044}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5864}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Search2Motion%3A%20Training-Free%20Object-Level%20Motion%20Control%20via%20Attention-Consensus%20Search&body=Title%3A%20Search2Motion%3A%20Training-Free%20Object-Level%20Motion%20Control%20via%20Attention-Consensus%20Search%0AAuthor%3A%20Sainan%20Liu%20and%20Tz-Ying%20Wu%20and%20Hector%20A%20Valdez%20and%20Subarna%20Tripathi%0AAbstract%3A%20We%20present%20Search2Motion%2C%20a%20training-free%20framework%20for%20object-level%20motion%20editing%20in%20image-to-video%20generation.%20Unlike%20prior%20methods%20requiring%20trajectories%2C%20bounding%20boxes%2C%20masks%2C%20or%20motion%20fields%2C%20Search2Motion%20adopts%20target-frame-based%20control%2C%20leveraging%20first-last-frame%20motion%20priors%20to%20realize%20object%20relocation%20while%20preserving%20scene%20stability%20without%20fine-tuning.%20Reliable%20target-frame%20construction%20is%20achieved%20through%20semantic-guided%20object%20insertion%20and%20robust%20background%20inpainting.%20We%20further%20show%20that%20early-step%20self-attention%20maps%20predict%20object%20and%20camera%20dynamics%2C%20offering%20interpretable%20user%20feedback%20and%20motivating%20ACE-Seed%20%28Attention%20Consensus%20for%20Early-step%20Seed%20selection%29%2C%20a%20lightweight%20search%20strategy%20that%20improves%20motion%20fidelity%20without%20look-ahead%20sampling%20or%20external%20evaluators.%20Noting%20that%20existing%20benchmarks%20conflate%20object%20and%20camera%20motion%2C%20we%20introduce%20S2M-DAVIS%20and%20S2M-OMB%20for%20stable-camera%2C%20object-only%20evaluation%2C%20alongside%20FLF2V-obj%20metrics%20that%20isolate%20object%20artifacts%20without%20requiring%20ground-truth%20trajectories.%20Search2Motion%20consistently%20outperforms%20baselines%20on%20FLF2V-obj%20and%20VBench.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16711v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSearch2Motion%253A%2520Training-Free%2520Object-Level%2520Motion%2520Control%2520via%2520Attention-Consensus%2520Sear qShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Search2Motion%3A%20Training-Free%20Object-Level%20Motion%20Control%20via%20Attention-Consensus%20Search&entry.906535625=Sainan%20Liu%20and%20Tz-Ying%20Wu%20and%20Hector%20A%20Valdez%20and%20Subarna%20Tripathi&entry.1292438233=We%20present%20Search2Motion%2C%20a%20training-free%20framework%20for%20object-level%20motion%20editing%20in%20image-to-video%20generation.%20Unlike%20prior%20methods%20requiring%20trajectories%2C%20bounding%20boxes%2C%20masks%2C%20or%20motion%20fields%2C%20Search2Motion%20adopts%20target-frame-based%20control%2C%20leveraging%20first-last-frame%20motion%20priors%20to%20realize%20object%20relocation%20while%20preserving%20scene%20stability%20without%20fine-tuning.%20Reliable%20target-frame%20construction%20is%20achieved%20through%20semantic-guided%20object%20insertion%20and%20robust%20background%20inpainting.%20We%20further%20show%20that%20early-step%20self-attention%20maps%20predict%20object%20and%20camera%20dynamics%2C%20offering%20interpretable%20user%20feedback%20and%20motivating%20ACE-Seed%20%28Attention%20Consensus%20for%20Early-step%20Seed%20selection%29%2C%20a%20lightweight%20search%20strategy%20that%20improves%20motion%20fidelity%20without%20look-ahead%20sampling%20or%20external%20evaluators.%20Noting%20that%20existing%20benchmarks%20conflate%20object%20and%20camera%20motion%2C%20we%20introduce%20S2M-DAVIS%20and%20S2M-OMB%20for%20stable-camera%2C%20object-only%20evaluation%2C%20alongside%20FLF2V-obj%20metrics%20that%20isolate%20object%20artifacts%20without%20requiring%20ground-truth%20trajectories.%20Search2Motion%20consistently%20outperforms%20baselines%20on%20FLF2V-obj%20and%20VBench.&entry.1838667208=http%3A//arxiv.org/abs/2603.16711v2&entry.124074799=Read"},
{"title": "NavThinker: Action-Conditioned World Models for Coupled Prediction and Planning in Social Navigation", "author": "Tianshuai Hu and Zeying Gong and Lingdong Kong and XiaoDong Mei and Yiyi Ding and Qi Zeng and Ao Liang and Rong Li and Yangyi Zhong and Junwei Liang", "abstract": "Social navigation requires robots to act safely in dynamic human environments. Effective behavior demands thinking ahead: reasoning about how the scene and pedestrians evolve under different robot actions rather than reacting to current observations alone. This creates a coupled prediction-planning challenge, where robot actions and human motion mutually influence each other. To address this challenge, we propose NavThinker, a future-aware framework that couples an action-conditioned world model with on-policy reinforcement learning. The world model operates in the Depth Anything V2 patch feature space and performs autoregressive prediction of future scene geometry and human motion; multi-head decoders then produce future depth maps and human trajectories, yielding a future-aware state aligned with traversability and interaction risk. Crucially, we train the policy with DD-PPO while injecting world-model think-ahead signals via: (i) action-conditioned future features fused into the current observation embedding and (ii) social reward shaping from predicted human trajectories. Experiments on single- and multi-robot Social-HM3D show state-of-the-art navigation success, with zero-shot transfer to Social-MP3D and real-world deployment on a Unitree Go2, validating generalization and practical applicability. Webpage: https://hutslib.github.io/NavThinker.", "link": "http://arxiv.org/abs/2603.15359v2", "date": "2026-03-18", "relevancy": 1.8314, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6289}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.6099}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5935}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NavThinker%3A%20Action-Conditioned%20World%20Models%20for%20Coupled%20Prediction%20and%20Planning%20in%20Social%20Navigation&body=Title%3A%20NavThinker%3A%20Action-Conditioned%20World%20Models%20for%20Coupled%20Prediction%20and%20Planning%20in%20Social%20Navigation%0AAuthor%3A%20Tianshuai%20Hu%20and%20Zeying%20Gong%20and%20Lingdong%20Kong%20and%20XiaoDong%20Mei%20and%20Yiyi%20Ding%20and%20Qi%20Zeng%20and%20Ao%20Liang%20and%20Rong%20Li%20and%20Yangyi%20Zhong%20and%20Junwei%20Liang%0AAbstract%3A%20Social%20navigation%20requires%20robots%20to%20act%20safely%20in%20dynamic%20human%20environments.%20Effective%20behavior%20demands%20thinking%20ahead%3A%20reasoning%20about%20how%20the%20scene%20and%20pedestrians%20evolve%20under%20different%20robot%20actions%20rather%20than%20reacting%20to%20current%20observations%20alone.%20This%20creates%20a%20coupled%20prediction-planning%20challenge%2C%20where%20robot%20actions%20and%20human%20motion%20mutually%20influence%20each%20other.%20To%20address%20this%20challenge%2C%20we%20propose%20NavThinker%2C%20a%20future-aware%20framework%20that%20couples%20an%20action-conditioned%20world%20model%20with%20on-policy%20reinforcement%20learning.%20The%20world%20model%20operates%20in%20the%20Depth%20Anything%20V2%20patch%20feature%20space%20and%20performs%20autoregressive%20prediction%20of%20future%20scene%20geometry%20and%20human%20motion%3B%20multi-head%20decoders%20then%20produce%20future%20depth%20maps%20and%20human%20trajectories%2C%20yielding%20a%20future-aware%20state%20aligned%20with%20traversability%20and%20interaction%20risk.%20Crucially%2C%20we%20train%20the%20policy%20with%20DD-PPO%20while%20injecting%20world-model%20think-ahead%20signals%20via%3A%20%28i%29%20action-conditioned%20future%20features%20fused%20into%20the%20current%20observation%20embedding%20and%20%28ii%29%20social%20reward%20shaping%20from%20predicted%20human%20trajectories.%20Experiments%20on%20single-%20and%20multi-robot%20Social-HM3D%20show%20state-of-the-art%20navigation%20success%2C%20with%20zero-shot%20transfer%20to%20Social-MP3D%20and%20real-world%20deployment%20on%20a%20Unitree%20Go2%2C%20validating%20generalization%20and%20practical%20applicability.%20Webpage%3A%20https%3A//hutslib.github.io/NavThinker.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15359v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNavThinker%253A%2520Action-Conditioned%2520World%2520Models%2520for%2520Coupled%2520Prediction%2520and%2520Planning%2520in%2520Social%2520Navigation%26entry.906535625%3DTianshuai%2520Hu%2520and%2520Zeying%2520Gong%2520and%2520Lingdong%2520Kong%2520and%2520XiaoDong%2520Mei%2520and%2520Yiyi%2520Ding%2520and%2520Qi%2520Zeng%2520and%2520Ao%2520Liang%2520and%2520Rong%2520Li%2520and%2520Yangyi%2520Zhong%2520and%2520Junwei%2520Liang%26entry.1292438233%3DSocial%2520navigation%2520requires%2520robots%2520to%2520act%2520safely%2520in%2520dynamic%2520human%2520environments.%2520Effective%2520behavior%2520demands%2520thinking%2520ahead%253A%2520reasoning%2520about%2520how%2520the%2520scene%2520and%2520pedestrians%2520evolve%2520under%2520different%2520robot%2520actions%2520rather%2520than%2520reacting%2520to%2520current%2520observations%2520alone.%2520This%2520creates%2520a%2520coupled%2520prediction-planning%2520challenge%252C%2520where%2520robot%2520actions%2520and%2520human%2520motion%2520mutually%2520influence%2520each%2520other.%2520To%2520address%2520this%2520challenge%252C%2520we%2520propose%2520NavThinker%252C%2520a%2520future-aware%2520framework%2520that%2520couples%2520an%25 {"title": "Unlearnable phases of matter", "author": "Tarun Advaith Kumar and Yijian Zou and Amir-Reza Negari and Roger G. Melko and Timothy H. Hsieh", "abstract": "We identify fundamental limitations in machine learning by demonstrating that non-trivial mixed-state phases of matter are computationally hard to learn. Focusing on unsupervised learning of distributions, we show that autoregressive neural networks fail to learn global properties of distributions characterized by locally indistinguishable (LI) states. We demonstrate that conditional mutual information (CMI) is a useful diagnostic for LI: we show that for classical distributions, long-range CMI of a state implies a spatially LI partner. By introducing a restricted statistical query model, we prove that nontrivial phases with long-range CMI, such as strong-to-weak spontaneous symmetry breaking phases, are hard to learn. We validate our claims by using recurrent, convolutional, and Transformer neural networks to learn the syndrome and physical distributions of toric/surface code under bit flip noise. Our findings suggest hardness of learning as a diagnostic tool for detecting mixed-state phases and transitions and error-correction thresholds, and they suggest CMI and more generally ``non-local Gibbsness'' as metrics for how hard a distribution is to learn.", "link": "http://arxiv.org/abs/2602.11262v2", "date": "2026-03-18", "relevancy": 1.9177, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5018}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4871}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://a {"title": "Workflow-Aware Structured Layer Decomposition for Illustration Production", "author": "Tianyu Zhang and Dongchi Li and Keiichi Sawada and Haoran Xie", "abstract": "Recent generative image editing methods adopt layered representations to mitigate the entangled nature of raster images and improve controllability, typically relying on object-based segmentation. However, such strategies may fail to capture the structural and stylized properties of human-created images, such as anime illustrations. To solve this issue, we propose a workflow-aware structured layer decomposition framework tailored to the illustration production of anime artwork. Inspired by the creation pipeline of anime production, our method decomposes the illustration into semantically meaningful production layers, including line art, flat color, shadow, and highlight. To decouple all these layers, we introduce lightweight layer semantic embeddings to provide specific task guidance for each layer. Furthermore, a set of layer-wise losses is incorporated to supervise the training process of individual layers. To overcome the lack of ground-truth layered data, we construct a high-quality illustration dataset that simulated the standard anime production workflow. Experiments demonstrate that the accurate and visually coherent layer decompositions were achieved by using our method. We believe that the resulting layered representation further enables downstream tasks such as recoloring and embedding texture, supporting content creation, and illustration editing. Code is available at: https://github.com/zty0304/Anime-layer-decomposition", "link": "http://arxiv.org/abs/2603.14925v2", "date": "2026-03-18", "relevancy": 2.0864, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5418}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5137}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5046}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Workflow-Aware%20Structured%20Layer%20Decomposition%20for%20Illustration%20Production&body=Title%3A%20Workflow-Aware%20Structured%20Layer%20Decomposition%20for%20Illustration%20Production%0AAuthor%3A%20Tianyu%20Zhang%20and%20Dongchi%20Li%20and%20Keiichi%20Sawada%20and%20Haoran%20Xie%0AAbstract%3A%20Recent%20generative%20image%20editing%20methods%20adopt%20layered%20representations%20to%20mitigate%20the%20entangled%20nature%20of%20raster%20images%20and%20improve%20controllability%2C%20typically%20relying%20on%20object-based%20segmentation.%20However%2C%20such%20strategies%20may%20fail%20to%20capture%20the%20structural%20and%20stylized%20properties%20of%20human-created%20images%2C%20such%20as%20anime%20illustrations.%20To%20solve%20this%20issue%2C%20we%20propose%20a%20workflow-aware%20structured%20layer%20decomposition%20framework%20tailored%20to%20the%20illustration%20production%20of%20anime%20artwork.%20Inspired%20by%20the%20creation%20pipeline%20of%20anime%20production%2C%20our%20method%20decomposes%20the%20illustration%20into%20semantically%20meaningful%20production%20layers%2C%20including%20line%20art%2C%20flat%20color%2C%20shadow%2C%20and%20highlight.%20To%20decouple%20all%20these%20layers%2C%20we%20introduce%20lightweight%20layer%20semantic%20embeddings%20to%20provide%20specific%20task%20guidance%20for%20each%20layer.%20Furthermore%2C%20a%20set%20of%20layer-wise%20losses%20is%20incorporated%20to%20supervise%20the%20training%20process%20of%20individual%20layers.%20To%20overcome%20the%20lack%20of%20ground-truth%20layered%20data%2C%20we%20construct%20a%20high-quality%20illustration%20dataset%20that%20simulated%20the%20standard%20anime%20production%20workflow.%20Experiments%20demonstrate%20that%20the%20accurate%20and%20visually%20coherent%20layer%20decompositions%20were%20achieved%20by%20using%20our%20method.%20We%20believe%20that%20the%20resulting%20layered%20representation%20further%20enables%20downstream%20tasks%20such%20as%20recoloring%20and%20embedding%20texture%2C%20supporting%20content%20creation%2C%20and%20illustration%20editing.%20Code%20is%20available%20at%3A%20https%3A//github.com/zty0304/Anime-layer-decomposition%0ALink%3A%20http%3A//arxiv.org/abs/2603.14925v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWorkflow-Aware%2520Structured%2520Layer%2520Decomposition%2520for%2520Illustration%2520Production%26entry.906535625%3DTianyu%2520Zhang%2520and%2520Dongchi%2520Li%2520and%2520Keiichi%2520Sawada%2520and%2520Haoran%2520Xie%26entry.1292438233%3DRecent%2520generative%2520image%2520editing%2520methods%2520adopt%2520layered%2520representations%2520to%2520mitigate%2520the%2520entangled%2520nature%2520of%2520raster%2520images%2520and%2520improve%2520controllability%252C%2520typically%2520relying%2520on%2520object-based%2520segmentation.%2520However%252C%2520such%2520strategies%2520may%2520fail%2520to%2520capture%2520the%2520structural%2520and%2520stylized%2520properties%2520of%2520human-created%2520images%252C%2520such%2520as%2520anime%2520illustrations.%2520To%2520solve%2520this%2520issue%252C%2520we%2520propose%2520a%2520workflow-aware%2520structured%2520layer%2520decomposition%2520framework%2520tailored%2520to%2520the%2520illustration%2520production%2520of%2520anime%2520artwork.%2520Inspired%2520by%2520the%2520creation%2520pipeline%2520of%2520anime%2520production%252C%2520our%2520method%2520decomposes%2520the%2520illustration%2520into%2520semantically%2520meaningful%2520production%2520layers%252C%2520including%2520line%2520art%252C%2520flat%2520color%252C%2520shadow%252C%2520and%2520highlight.%2520To%2520decouple%2520all%2520these%2520layers%252C%2520we%2520introduce%2520lightweight%2520layer%2520semantic%2520embe       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

  </body>
</html>

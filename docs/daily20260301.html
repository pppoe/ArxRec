{"title": "Proxy-GS: Unified Occlusion Priors for Training and Inference in Structured 3D Gaussian Splatting", "author": "Yuanyuan Gao and Yuning Gong and Yifei Liu and Li Jingfeng and Dingwen Zhang and Yanci Zhang and Dan Xu and Xiao Sun and Zhihang Zhong", "abstract": "3D Gaussian Splatting (3DGS) has emerged as an efficient approach for achieving photorealistic rendering. Recent MLP-based variants further improve visual fidelity but introduce substantial decoding overhead during rendering. To alleviate computation cost, several pruning strategies and level-of-detail (LOD) techniques have been introduced, aiming to effectively reduce the number of Gaussian primitives in large-scale scenes. However, our analysis reveals that significant redundancy still remains due to the lack of occlusion awareness. In this work, we propose Proxy-GS, a novel pipeline that exploits a proxy to introduce Gaussian occlusion awareness from any view. At the core of our approach is a fast proxy system capable of producing precise occlusion depth maps at a resolution of 1000x1000 under 1ms. This proxy serves two roles: first, it guides the culling of anchors and Gaussians to accelerate rendering speed. Second, it guides the densification towards surfaces during training, avoiding inconsistencies in occluded regions, and improving the rendering quality. In heavily occluded scenarios, such as the MatrixCity Streets dataset, Proxy-GS not only equips MLP-based Gaussian splatting with stronger rendering capability but also achieves faster rendering speed. Specifically, it achieves more than 2.5x speedup over Octree-GS, and consistently delivers substantially higher rendering quality. Code will be public upon acceptance.", "link": "http://arxiv.org/abs/2509.24421v3", "date": "2026-02-26", "relevancy": 3.2956, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6677}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.663}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6467}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Proxy-GS%3A%20Unified%20Occlusion%20Priors%20for%20Training%20and%20Inference%20in%20Structured%203D%20Gaussian%20Splatting&body=Title%3A%20Proxy-GS%3A%20Unified%20Occlusion%20Priors%20for%20Training%20and%20Inference%20in%20Structured%203D%20Gaussian%20Splatting%0AAuthor%3A%20Yuanyuan%20Gao%20and%20Yuning%20Gong%20and%20Yifei%20Liu%20and%20Li%20Jingfeng%20and%20Dingwen%20Zhang%20and%20Yanci%20Zhang%20and%20Dan%20Xu%20and%20Xiao%20Sun%20and%20Zhihang%20Zhong%0AAbstract%3A%203D%20Gaussian%20Splatting%20%283DGS%29%20has%20emerged%20as%20an%20efficient%20approach%20for%20achieving%20photorealistic%20rendering.%20Recent%20MLP-based%20variants%20further%20improve%20visual%20fidelity%20but%20introduce%20substantial%20decoding%20overhead%20during%20rendering.%20To%20alleviate%20computation%20cost%2C%20several%20pruning%20strategies%20and%20level-of-detail%20%28LOD%29%20techniques%20have%20been%20introduced%2C%20aiming%20to%20effectively%20reduce%20the%20number%20of%20Gaussian%20primitives%20in%20large-scale%20scenes.%20However%2C%20our%20analysis%20reveals%20that%20significant%20redundancy%20still%20remains%20due%20to%20the%20lack%20of%20occlusion%20awareness.%20In%20this%20work%2C%20we%20propose%20Proxy-GS%2C%20a%20novel%20pipeline%20that%20exploits%20a%20proxy%20to%20introduce%20Gaussian%20occlusion%20awareness%20from%20any%20view.%20At%20the%20core%20of%20our%20approach%20is%20a%20fast%20proxy%20system%20capable%20of%20producing%20precise%20occlusion%20depth%20maps%20at%20a%20resolution%20of%201000x1000%20under%201ms.%20This%20proxy%20serves%20two%20roles%3A%20first%2C%20it%20guides%20the%20culling%20of%20 {"title": "Latent Gaussian Splatting for 4D Panoptic Occupancy Tracking", "author": "Maximilian Luz and Rohit Mohan and Thomas N\u00fcrnberg and Yakov Miron and Daniele Cattaneo and Abhinav Valada", "abstract": "Capturing 4D spatiotemporal surroundings is crucial for the safe and reliable operation of robots in dynamic environments. However, most existing methods address only one side of the problem: they either provide coarse geometric tracking via bounding boxes, or detailed 3D structures like voxel-based occupancy that lack explicit temporal association. In this work, we present Latent Gaussian Splatting for 4D Panoptic Occupancy Tracking (LaGS) that advances spatiotemporal scene understanding in a holistic direction. Our approach incorporates camera-based end-to-end tracking with mask-based multi-view panoptic occupancy prediction, and addresses the key challenge of efficiently aggregating multi-view information into 3D voxel grids via a novel latent Gaussian splatting approach. Specifically, we first fuse observations into 3D Gaussians that serve as a sparse point-centric latent representation of the 3D scene, and then splat the aggregated features onto a 3D voxel grid that is decoded by a mask-based segmentation head. We evaluate LaGS on the Occ3D nuScenes and Waymo datasets, achieving state-of-the-art performance for 4D panoptic occupancy tracking. We make our code available at https://lags.cs.uni-freiburg.de/.", "link": "http://arxiv.org/abs/2602.23172v1", "date": "2026-02-26", "relevancy": 3.293, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6971}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6605}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", " .uni-freiburg.de/.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23172v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLatent%2520Gaussian%2520Splatting%2520for%25204D%2520Panoptic%2520Occupancy%2520Tracking%26entry.906535625%3DMaximilian%2520Luz%2520and%2520Rohit%2520Mohan%2520and%2520Thomas%2520N%25C3%25BCrnberg%2520and%2520Yakov%2520Miron%2520and%2520Daniele%2520Cattaneo%2520and%2520Abhinav%2520Valada%26entry.1292438233%3DCapturing%25204D%2520spatiotemporal%2520surroundings%2520is%2520crucial%2520for%2520the%2520safe%2520and%2520reliable%2520operation%2520of%2520robots%2520in%2520dynamic%2520environments.%2520However%252C%2520most%2520existing%2520methods%2520address%2520only%2520one%2520side%2520of%2520the%2520problem%253A%2520they%2520either%2520provide%2520coarse%2520geometric%2520tracking%2520via%2520bounding%2520boxes%252C%2520or%2520detailed%25203D%2520structures%2520like%2520voxel-based%2520occupancy%2520that%2520lack%2520explicit%2520temporal%2520association.%2520In%2520this%2520work%252C%2520we%2520present%2520Latent%2520Gaussian%2520Splatting%2520for%25204D%2520Panoptic%2520Occupancy%2520Tracking%2520%2528LaGS%2529%2520that%2520advances%2520spatiotemporal%2520scene%2520understanding%2520in%2520a%2520holistic%2520direction.%2520Our%2520approach%2520incorporates%2520camera-based%2520end-to-end%2520tracking%2520with%2520mask-based%2520multi-view%2520panoptic%2520occupancy%2520prediction%252C%2520and%2520addresses%2520the%2520key%2520challenge%2520of%2520efficiently%2520aggregating%2520multi-view%2520information%2520into%25203D%2520voxel%2520grids%2520via%2520a%2520novel%2520latent%2520Gaussian%2520splatting%2520approach.%2520Specifically%252C%2520we%2520first%2520fuse%2520observations%2520into%25203D%2520Gaussians%2520that%2520serve%2520as%2520a%2520sparse%2520point-centric%2520latent%2520representation%2520of%2520the%25203D%2520scene%252C%2520and%2520then%2520splat%2520the% {"title": "ST-GS: Vision-Based 3D Semantic Occupancy Prediction with Spatial-Temporal Gaussian Splatting", "author": "Xiaoyang Yan and Muleilan Pei and Shaojie Shen", "abstract": "3D occupancy prediction is critical for comprehensive scene understanding in vision-centric autonomous driving. Recent advances have explored utilizing 3D semantic Gaussians to model occupancy while reducing computational overhead, but they remain constrained by insufficient multi-view spatial interaction and limited multi-frame temporal consistency. To overcome these issues, in this paper, we propose a novel Spatial-Temporal Gaussian Splatting (ST-GS) framework to enhance both spatial and temporal modeling in existing Gaussian-based pipelines. Specifically, we develop a guidance-informed spatial aggregation strategy within a dual-mode attention mechanism to strengthen spatial interaction in Gaussian representations. Furthermore, we introduce a geometry-aware temporal fusion scheme that effectively leverages historical context to improve temporal continuity in scene completion. Extensive experiments on the large-scale nuScenes occupancy prediction benchmark showcase that our proposed approach not only achieves state-of-the-art performance but also delivers markedly better temporal consistency compared to existing Gaussian-based methods.", "link": "http://arxiv.org/abs/2509.16552v2", "date": "2026-02-26", "relevancy": 3.2207, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6793}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6601}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.593}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ST-GS%3A%20Vision-Based%203D%20Semantic%20Occupancy%20Prediction%20with%20Spatial-Temporal%20Gaussian%20Splatting&body=Title%3A%20ST-GS%3A%20Vision-Based%203D%20Semantic%20Occupancy%20Prediction%20with%20Spatial-Temporal%20Gaussian%20Splatting%0AAuthor%3A%20Xiaoyang%20Yan%20and%20Muleilan%20Pei%20and%20Shaojie%20Shen%0AAbstract%3A%203D%20occupancy%20prediction%20is%20critical%20for%20comprehensive%20scene%20understanding%20in%20vision-centric%20autonomous%20driving.%20Recent%20advances%20have%20explored%20utilizing%203D%20semantic%20Gaussians%20to%20model%20occupancy%20while%20reducing%20computational%20overhead%2C%20but%20they%20remain%20constrained%20by%20insufficient%20multi-view%20spatial%20interaction%20and%20limited%20multi-frame%20temporal%20consistency.%20To%20overcome%20these%20issues%2C%20in%20this%20paper%2C%20we%20propose%20a%20novel%20Spatial-Temporal%20Gaussian%20Splatting%20%28ST-GS%29%20framework%20to%20enhance%20both%20spatial%20and%20temporal%20modeling%20in%20existing%20Gaussian-based%20pipelines.%20Specifically%2C%20we%20develop%20a%20guidance-informed%20spatial%20aggregation%20strategy%20within%20a%20dual-mode%20attention%20mechanism%20to%20strengthen%20spatial%20interaction%20in%20Gaussian%20representations.%20Furthermore%2C%20we%20introduce%20a%20geometry-aware%20temporal%20fusion%20scheme%20that%20effectively%20leverages%20historical%20context%20to%20improve%20temporal%20continuity%20in%20scene%20completion.%20Extensive%20experiments%20on%20the%20large-scale%20nuScenes%20occupancy%20prediction%20benchmark%20showcase%20that%20our%20proposed%20approach%20not%20only%20achieves%20state-of-the-art%20performance%20but%20also%20delivers%20markedly%20better%20temporal%20consistency%20compared%20to%20existing%20Gaussian-based%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2509.16552v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DST-GS%253A%2520Vision-Based%25203D%2520Semantic%252 {"title": "Object-Centric Representation Learning for Enhanced 3D Semantic Scene Graph Prediction", "author": "KunHo Heo and GiHyun Kim and SuYeon Kim and MyeongAh Cho", "abstract": "3D Semantic Scene Graph Prediction aims to detect objects and their semantic relationships in 3D scenes, and has emerged as a crucial technology for robotics and AR/VR applications. While previous research has addressed dataset limitations and explored various approaches including Open-Vocabulary settings, they frequently fail to optimize the representational capacity of object and relationship features, showing excessive reliance on Graph Neural Networks despite insufficient discriminative capability. In this work, we demonstrate through extensive analysis that the quality of object features plays a critical role in determining overall scene graph accuracy. To address this challenge, we design a highly discriminative object feature encoder and employ a contrastive pretraining strategy that decouples object representation learning from the scene graph prediction. This design not only enhances object classification accuracy but also yields direct improvements in relationship prediction. Notably, when plugging in our pretrained encoder into existing frameworks, we observe substantial performance improvements across all evaluation metrics. Additionally, whereas existing approaches have not fully exploited the integration of relationship information, we effectively combine both geometric and semantic features to achieve superior relationship prediction. Comprehensive experiments on the 3DSSG dataset demonstrate that our approach significantly outperforms previous state-of-the-art methods. Our code is publicly available at https://github.com/VisualScienceLab-KHU/OCRL-3DSSG-Codes.", "link": "http://arxiv.org/abs/2510.04714v4", "date": "2026-02-26", "relevancy": 3.1943, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.662}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.662}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5925}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Object-Centric%20Representation%20Learning%20for%20Enhanced%203D%20Semantic%20Scene%20Graph%20Prediction&body=Title%3A%20Object-Centric%20Representation%20Learning%20for%20Enhanced%203D%20Semantic%20Scene%20Graph%20Prediction%0AAuthor%3A%20KunHo%20Heo%20and%20GiHyun%20Kim%20and%20SuYeon%20Kim%20and%20MyeongAh%20Cho%0AAbstract%3A%203D%20Semantic%20Scene%20Graph%20Prediction%20aims%20to%20detect%20objects%20and%20their%20semantic%20relationships%20in%203D%20scenes%2C%20and%20has%20emerged%20as%20a%20crucial%20technology%20for%20robotics%20and%20AR/VR%20applications.%20While%20previous%20research%20has%20addressed%20dataset%20limitations%20and%20explored%20various%20approaches%20including%20Open-Vocabulary%20settings%2C%20they%20frequently%20fail%20to%20optimize%20the%20representational%20capacity%20of%20object%20and%20relationship%20features%2C%20showing%20excessive%20reliance%20on%20Graph%20Neural%20Networks%20despite%20insufficient%20discriminative%20capability.%20In%20this%20work%2C%20we%20demonstrate%20through%20extensive%20analysis%20that%20the%20quality%20of%20object%20features%20plays%20a%20critical%20role%20in%20determining%20overall%20scene%20graph%20accuracy.%20To%20address%20this%20challenge%2C%20we%20design%20a%20highly%20discriminative%20object%20feature%20encoder%20and%20employ%20a%20contrastive%20pretraining%20strategy%20that%20decouples%20object%20representation%20learning%20from%20the%20scene%20graph%20prediction.%20This%20design%20not%20only%20enhances%20object%20classification%20accuracy%20but%20also%20yields%20direct%20improvements%20in%20relationship%20prediction.%20Notably%2C%20when%20plugging%20in%20our%20pretrained%20encoder%20into%20existing%20frameworks%2C%20we%20observe%20substantial%20performance%20improvements%20across%20all%20evaluation%20metrics.%20Additionally%2C%20whereas%20existing%20approaches%20have%20not%20fully%20exploited%20the%20integration%20of%20relationship%20information%2C%20we%20effectively%20combine%20both%20geometric%20and%20semantic%20features%20to%20achieve%20superior%20relationship%20prediction.%20Comprehensive%20experiments%20on%20the%203DSSG%20dataset%20demonstrate%20that%20our%20approach%20significantly%20outperforms%20previous%20state-of-the-art%20methods.%20Our%20code%20is%20publicly%20available%20at%20https%3A//github.com/VisualScienceLab-KHU/OCRL-3DSSG-Codes.%0ALink%3A%20http%3A//arxiv.org/abs/2510.04714v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DObject-Centric%2520Representation%2520Learning%2520for%2520Enhanced%25203D%2520Semantic%2520Scene%2520Graph%2520Prediction%26entry.906535625%3DKunHo%2520Heo%2520and%2520GiHyun%2520Kim%2520and%2520SuYeon%2520Kim%2520and%2520MyeongAh%2520Cho%26entry.1292438233%3D3D%2520Semantic%2520Scene%2520Graph%2520Prediction%2520aims%2520to%2520detect%2520objects%2520and%2520their%2520semantic%2520relationships%2520in%25203D%2520scenes%252C%2520and%2520has%2520emerged%2520as%2520a%2520crucial%2520technology%2520for%2520robotics%2520and%2520AR/VR%2520applications.%2520While%2520previous%2520research%2520has%2520addressed%2520dataset%2520limitations%2520and%2520explored%2520various%2520approaches%2520including%2520Open-Vocabulary%2520settings%252C%2520they%2520frequently%2520fail%2520to%2520optimize%2520the%2520representational%2520capacity%2520of%2520object%2520and%2520relationship%2520features%252C%2520showing%2520excessive%2520reliance%2520on%2520Graph%2520Neural%2520Networks%2520despite%2520insufficient%2520discriminative%2520capability.%2520In%2520this%2520work%252C%2520we%2520demonstrate%2520through%2520extensive%2520analysis%2520that%2520the%2520quality%2520of%2520object%2520features%2520plays%2520a%2520critical%2520role%2520in%2520determining%2520overall%2520scene%2520graph%2520accuracy.%2520To%2520address%2520this%2520challenge%252C%2520we%2520design%2520a%2520highly%2520discriminative%2520object%2520feature%2520encoder%2520and%2520employ%2520a%2520contrastive%2520pretraining%2520strategy%2520that%2520decouples%2520object%2520representation%2520learning%2520from%2520the%2520scene%2520graph%2520prediction.%2520This%2520design%2520not%2520only%2520enhances%2520object%2520classification%2520accuracy%2520but%2520also%2520yields%2520direct%2520improvements%2520in%2520relationship%2520prediction.%2520Notably%252C%2520when%2520plugging%2520in%2520our%2520pretrained%2520encoder%2520into%2520existing%2520frameworks%252C%2520we%2520observe%2520substantial%2520performance%2520improvements%2520across%2520all%2520evaluation%2520metrics.%2520Additionally%252C%2520whereas%2520existing%2520approaches%2520have%2520not%2520fully%2520exploited%2520the%2520integration%2520of%2520relationship%2520information%252C%2520we%2520effectively%2520combine%2520both%2520geometric%2520and%2520semantic%2520features%2520to%2520achieve%2520superior%2520relationship%2520prediction.%2520Comprehensive%2520experiments%2520on%2520the%25203DSSG%2520dataset%2520demonstrate%2520that%2520our%2520approach%2520significantly%2520outperforms%2520previous%2520state-of-the-art%2520methods.%2520Our%2520code%2520is%2520publicly%2520available%2520at%2520https%253A//github.com/VisualScienceLab-KHU/OCRL-3DSSG-Codes.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.04714v4%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Object-Centric%20Representation%20Learning%20for%20Enhanced%203D%20Semantic%20Scene%20Graph%20Prediction&entry.906535625=Kun {"title": "PackUV: Packed Gaussian UV Maps for 4D Volumetric Video", "author": "Aashish Rai and Angela Xing and Anushka Agarwal and Xiaoyan Cong and Zekun Li and Tao Lu and Aayush Prakash and Srinath Sridhar", "abstract": "Volumetric videos offer immersive 4D experiences, but remain difficult to reconstruct, store, and stream at scale. Existing Gaussian Splatting based methods achieve high-quality reconstruction but break down on long sequences, temporal inconsistency, and fail under large motions and disocclusions. Moreover, their outputs are typically incompatible with conventional video coding pipelines, preventing practical applications.\n  We introduce PackUV, a novel 4D Gaussian representation that maps all Gaussian attributes into a sequence of structured, multi-scale UV atlas, enabling compact, image-native storage. To fit this representation from multi-view videos, we propose PackUV-GS, a temporally consistent fitting method that directly optimizes Gaussian parameters in the UV domain. A flow-guided Gaussian labeling and video keyframing module identifies dynamic Gaussians, stabilizes static regions, and preserves temporal coherence even under large motions and disocclusions. The resulting UV atlas format is the first unified volumetric video representation compatible with standard video codecs (e.g., FFV1) without losing quality, enabling efficient streaming within existing multimedia infrastructure.\n  To evaluate long-duration volumetric capture, we present PackUV-2B, the largest multi-view video dataset to date, featuring more than 50 synchronized cameras, substantial motion, and frequent disocclusions across 100 sequences and 2B (billion) frames. Extensive experiments demonstrate that our method surpasses existing baselines in rendering fidelity while scaling to sequences up to 30 minutes with consistent quality.", "link": "http://arxiv.org/abs/2602.23040v1", "date": "2026-02-26", "relevancy": 3.1019, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6468}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6268}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5876}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PackUV%3A%20Packed%20Gaussian%20UV%20Maps%20for%204D%20Volumetric%20Video&body=Title%3A%20PackUV%3A%20Packed%20Gaussian%20UV%20Maps%20for%204D%20Volumetric%20Video%0AAuthor%3A%20Aashish%20Rai%20and%20Angela%20Xing%20and%20Anushka%20Agarwal%20and%20Xiaoyan%20Cong%20and%20Zekun%20Li%20and%20Tao%20Lu%20and%20Aayush%20Prakash%20and%20Srinath%20Sridhar%0AAbstract%3A%20Volumetric%20videos%20offer%20immersive%204D%20experiences%2C%20but%20remain%20difficult%20to%20reconstruct%2C%20store%2C%20and%20stream%20at%20scale.%20Existing%20Gaussian%20Splatting%20based%20methods%20achieve%20high-quality%20reconstruction%20but%20break%20down%20on%20long%20sequences%2C%20temporal%20inconsistency%2C%20and%20fail%20under%20large%20motions%20and%20disocclusions.%20Moreover%2C%20their%20outputs%20are%20typically%20incompatible%20with%20conventional%20video%20coding%20pipelines%2C%20preventing%20practical%20applications.%0A%20%20We%20introduce%20PackUV%2C%20a%20novel%204D%20Gaussian%20representation%20that%20maps%20all%20Gaussian%20attributes%20into%20a%20sequence%20of%20structured%2C%20multi-scale%20UV%20atlas%2C%20enabling%20compact%2C%20image-native%20storage.%20To%20fit%20this%20representation%20from%20multi-view%20videos%2C%20we%20propose%20PackUV-GS%2C%20a%20temporally%20consistent%20fitting%20method%20that%20directly%20optimizes%20Gaussian%20parameters%20in%20the%20UV%20domain.%20A%20flow-guided%20Gaussian%20labeling%20and%20video%20keyframing%20module%20identifies%20dynamic%20Gaussians%2C%20stabilizes%20static%20regions%2C%20and%20preserves%20temporal%20coherence%20even%20under%20large%20motions%20and%20disocclusions.%20The%20resulting%20UV%20atlas%20format%20is%20the%20first%20unified%20volumetric%20video%20representation%20compatible%20with%20standard%20video%20codecs%20%28e.g.%2C%20FFV1%29%20without%20losing%20quality%2C%20enabling%20efficient%20streaming%20within%20existing%20multimedia%20infrastructure.%0A%20%20To%20evaluate%20long-duration%20volumetric%20capture%2C%20we%20present%20PackUV-2B%2C%20the%20largest%20multi-view%20video%20dataset%20to%20date%2C%20featuring%20more%20than%2050%20synchronized%20cameras%2C%20substantial%20motion%2C%20and%20frequent%20disocclusions%20across%20100%20sequences%20and%202B%20%28billion%29%20frames.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20surpasses%20existing%20baselines%20in%20rendering%20fidelity%20while%20scaling%20to%20sequences%20up%20to%2030%20minutes%20with%20consistent%20quality.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23040v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPackUV%253A%2520Packed%2520Gaussian%2520UV%2520Maps%2520for%25204D%2520Volumetric%2520Video%26entry.906535625%3DAashish%2520Rai%2520and%2520Angela%2520Xing%2520and%2520Anushka%2520Agarwal%2520and%2520Xiaoyan%2520Cong%2520and%2520Zekun%2520Li%2520and%2520Tao%2520Lu%2520and%2520Aayush%2520Prakash%2520and%2520Srinath%2520Sridhar%26entry.1292438233%3DVolumetric%2520videos%2520offer%2520immersive%25204D%2520experiences%252C%2520but%2520remain%2520difficult%2520to%2520reconstruct%252C%2520store%252C%2520and%2520stream%2520at%2520scale.%2520Existing%2520Gaussian%2520Splatting%2520based%2520methods%2520achieve%2520high-quality%2520reconstruction%2520but%2520break%2520down%2520on%2520long%2520sequences%252C%2520temporal%2520inconsistency%252C%2520and%2520fail%2520under%2520large%2520motions%2520and%2520disocclusions.%2520More {"title": "VGG-T$^3$: Offline Feed-Forward 3D Reconstruction at Scale", "author": "Sven Elflein and Ruilong Li and S\u00e9rgio Agostinho and Zan Gojcic and Laura Leal-Taix\u00e9 and Qunjie Zhou and Aljosa Osep", "abstract": "We present a scalable 3D reconstruction model that addresses a critical limitation in offline feed-forward methods: their computational and memory requirements grow quadratically w.r.t. the number of input images. Our approach is built on the key insight that this bottleneck stems from the varying-length Key-Value (KV) space representation of scene geometry, which we distill into a fixed-size Multi-Layer Perceptron (MLP) via test-time training. VGG-T$^3$ (Visual Geometry Grounded Test Time Training) scales linearly w.r.t. the number of input views, similar to online models, and reconstructs a $1k$ image collection in just $54$ seconds, achieving a $11.6\\times$ speed-up over baselines that rely on softmax attention. Since our method retains global scene aggregation capability, our point map reconstruction error outperforming other linear-time methods by large margins. Finally, we demonstrate visual localization capabilities of our model by querying the scene representation with unseen images.", "link": "http://arxiv.org/abs/2602.23361v1", "date": "2026-02-26", "relevancy": 3.1005, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6585}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6059}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5959}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VGG-T%24%5E3%24%3A%20Offline%20Feed-Forward%203D%20Reconstruction%20at%20Scale&body=Title%3A%20VGG-T%24%5E3%24%3A%20Offline%20Feed-Forward%203D%20Reconstruction%20at%20Scale%0AAuthor%3A%20Sven%20Elflein%20and%20Ruilong%20Li%20and%20S%C3%A9rgio%20Agostinho%20and%20Zan%20Gojcic%20and%20Laura%20Leal-Taix%C3%A9%20and%20Qunjie%20Zhou%20and%20Aljosa%20Osep%0AAbstract%3A%20We%20present%20a%20scalable%203D%20reconstruction%20model%20that%20addresses%20a%20critical%20limitation%20in%20offline%20feed-forward%20methods%3A%20their%20computational%20and%20memory%20requirements%20grow%20quadratically%20w.r.t.%20the%20number%20of%20input%20images.%20Our%20approach%20is%20built%20on%20the%20key%20insight%20that%20this%20bottleneck%20stems%20from%20the%20varying-length%20Key-Value%20%28KV%29%20space%20representation%20of%20scene%20geometry%2C%20which%20we%20distill%20into%20a%20fixed-size%20Multi-Layer%20Perceptron%20%28MLP%29%20via%20test-time%20training.%20VGG-T%24%5E3%24%20%28Visual%20Geometry%20Grounded%20Test%20Time%20Training%29%20scales%20linearly%20w.r.t.%20the%20number%20of%20input%20views%2C%20similar%20to%20online%20models%2C%20and%20reconstructs%20a%20%241k%24%20image%20collection%20in%20just%20%2454%24%20seconds%2C%20achieving%20a%20%2411.6%5Ctimes%24%20speed-up%20over%20baselines%20that%20rely%20on%20softmax%20attention.%20Since%20our%20method%20retains%20global%20scene%20aggregation%20capability%2C%20our%20point%20map%20reconstruction%20error%20outperforming%20other%20linear-time%20methods%20by%20large%20margins.%20Finally%2C%20we%20demonstrate%20visual%20localization%20capabilities%20of%20our%20model%20by%20querying%20the%20scene%20representation%20with%20unseen%20images.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23361v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVGG-T%2524%255E3%2524%253A%2520Offline%2520Feed-Forward%25203D%2520Reconstruction%2520at%2520Scale%26entry.906535625%3DSven%2520Elflein%2520and%2520Ruilong%2520Li%2520and%2520S%25C3%25A9rgio%2520Agostinho%2520and%2520Zan%2520Gojcic%252 {"title": "Efficient Encoder-Free Fourier-based 3D Large Multimodal Model", "author": "Guofeng Mei and Wei Lin and Luigi Riz and Yujiao Wu and Yiming Wang and Fabio Poiesi", "abstract": "Large Multimodal Models (LMMs) that process 3D data typically rely on heavy, pre-trained visual encoders to extract geometric features. While recent 2D LMMs have begun to eliminate such encoders for efficiency and scalability, extending this paradigm to 3D remains challenging due to the unordered and large-scale nature of point clouds. This leaves a critical unanswered question: How can we design an LMM that tokenizes unordered 3D data effectively and efficiently without a cumbersome encoder? We propose Fase3D, the first efficient encoder-free Fourier-based 3D scene LMM. Fase3D tackles the challenges of scalability and permutation invariance with a novel tokenizer that combines point cloud serialization and the Fast Fourier Transform (FFT) to approximate self-attention. This design enables an effective and computationally minimal architecture, built upon three key innovations: First, we represent large scenes compactly via structured superpoints. Second, our space-filling curve serialization followed by an FFT enables efficient global context modeling and graph-based token merging. Lastly, our Fourier-augmented LoRA adapters inject global frequency-aware interactions into the LLMs at a negligible cost. Fase3D achieves performance comparable to encoder-based 3D LMMs while being significantly more efficient in computation and parameters. Project website: https://tev-fbk.github.io/Fase3D.", "link": "http://arxiv.org/abs/2602.23153v1", "date": "2026-02-26", "relevancy": 3.0212, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6137}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "s {"title": "Cytoarchitecture in Words: Weakly Supervised Vision-Language Modeling for Human Brain Microscopy", "author": "Matthew Sutton and Katrin Amunts and Timo Dickscheid and Christian Schiffer", "abstract": "Foundation models increasingly offer potential to support interactive, agentic workflows that assist researchers during analysis and interpretation of image data. Such workflows often require coupling vision to language to provide a natural-language interface. However, paired image-text data needed to learn this coupling are scarce and difficult to obtain in many research and clinical settings. One such setting is microscopic analysis of cell-body-stained histological human brain sections, which enables the study of cytoarchitecture: cell density and morphology and their laminar and areal organization. Here, we propose a label-mediated method that generates meaningful captions from images by linking images and text only through a label, without requiring curated paired image-text data. Given the label, we automatically mine area descriptions from related literature and use them as synthetic captions reflecting canonical cytoarchitectonic attributes. An existing cytoarchitectonic vision foundation model (CytoNet) is then coupled to a large language model via an image-to-text training objective, enabling microscopy regions to be described in natural language. Across 57 brain areas, the resulting method produces plausible area-level descriptions and supports open-set use through explicit rejection of unseen areas. It matches the cytoarchitectonic reference label for in-scope patches with 90.6% accuracy and, with the area label masked, its descriptions remain discriminative enough to recover the area in an 8-way test with 68.6% accuracy. These results suggest that weak, label-mediated pairing can suffice to connect existing biomedical vision foundation models to language, providing a practical recipe for integrating natural-language in domains where fine-grained paired annotations are scarce.", "link": "http://arxiv.org/abs/2602.23088v1", "date": "2026-02-26", "relevancy": 2.9927, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6043}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6043}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5871}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Cytoarchitecture%20in%20Words%3A%20Weakly%20Supervised%20Vision-Language%20Modeling%20for%20Human%20Brain%20Microscopy&body=Title%3A%20Cytoarchitecture%20in%20Words%3A%20Weakly%20Supervised%20Vision-Language%20Modeling%20for%20Human%20Brain%20Microscopy%0AAuthor%3A%20Matthew%20Sutton%20and%20Katrin%20Amunts%20and%20Timo%20Dickscheid%20and%20Christian%20Schiffer%0AAbstract%3A%20Foundation%20models%20increasingly%20offer%20potential%20to%20support%20interactive%2C%20agentic%20workflows%20that%20assist%20researchers%20during%20analysis%20and%20interpretation%20of%20image%20data.%20Such%20workflows%20often%20require%20coupling%20vision%20to%20language%20to%20provide%20a%20natural-language%20interface.%20However%2C%20paired%20image-text%20data%20needed%20to%20learn%20this%20coupling%20are%20scarce%20and%20difficult%20to%20obtain%20in%20many%20research%20and%20clinical%20settings.%20One%20such%20setting%20is%20microscopic%20analysis%20of%20cell-body-stained%20histological%20human%20brain%20sections%2C%20which%20enables%20the%20study%20of%20cytoarchitecture%3A%20cell%20density%20and%20morphology%20and%20their%20laminar%20and%20areal%20organization.%20Here%2C%20we%20propose%20a%20label-mediated%20method%20that%20generates%20meaningful%20captions%20from%20images%20by%20linking%20images%20and%20text%20only%20through%20a%20label%2C%20without%20requiring%20curated%20paired%20image-text%20data.%20Given%20the%20label%2C%20we%20automatically%20mine%20area%20descriptions%20from%20related%20literature%20and%20use%20them%20as%20synthetic%20captions%20reflecting%20canonical%20cytoarchitectonic%20attributes.%20An%20existing%20cytoarchitectonic%20vision%20foundation%20model%20%28CytoNet%29%20is%20then%20coupled%20to%20a%20large%20language%20model%20via%20an%20image-to-text%20training%20objective%2C%20enabling%20microscopy%20regions%20to%20be%20described%20in%20natural%20language.%20Across%2057%20brain%20areas%2C%20the%20resulting%20method%20produces%20plausible%20area-level%20descriptions%20and%20supports%20open-set%20use%20through%20explicit%20rejection%20of%20unseen%20areas.%20It%20matches%20the%20cytoarchitectonic%20reference%20label%20for%20in-scope%20patches%20with%2090.6%25%20accuracy%20and%2C%20with%20the%20area%20label%20masked%2C%20its%20descriptions%20remain%20discriminative%20enough%20to%20recover%20the%20area%20in%20an%208-way%20test%20with%2068.6%25%20accuracy.%20These%20results%20suggest%20that%20weak%2C%20label-mediated%20pairing%20can%20suffice%20to%20connect%20existing%20biomedical%20vision%20foundation%20models%20to%20language%2C%20providing%20a%20practical%20recipe%20for%20integrating%20natural-language%20in%20domains%20where%20fine-grained%20paired%20annotations%20are%20scarce.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23088v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCytoarchitecture%2520in%2520Words%253A%2520Weakly%2520Supervised%2520Vision-Language%2520Modeling%2520for%2520Human%2520Brain%2520Microscopy%26entry.906535625%3DMatthew%2520Sutton%2520and%2520Katrin%2520Amunts%2520and%2520Timo%2520Dickscheid%2520and%2520Christian%2520Schiffer%26entry.1292438233%3DFoundation%2520models%2520increasingly%2520offer%2520potential%2520to%2520support%2520interactive%252C%2520agentic%2520wo {"title": "SuperQuadricOcc: Multi-Layer Gaussian Approximation of Superquadrics for Real-Time Self-Supervised Occupancy Estimation", "author": "Seamie Hayes and Reenu Mohandas and Tim Brophy and Alexandre Boulch and Ganesh Sistu and Ciaran Eising", "abstract": "Semantic occupancy estimation enables comprehensive scene understanding for automated driving, providing dense spatial and semantic information essential for perception and planning. While Gaussian representations have been widely adopted in self-supervised occupancy estimation, the deployment of a large number of Gaussian primitives drastically increases memory requirements and is not suitable for real-time inference. In contrast, superquadrics permit reduced primitive count and lower memory requirements due to their diverse shape set. However, implementation into a self-supervised occupancy model is nontrivial due to the absence of a superquadric rasterizer to enable model supervision. Our proposed method, SuperQuadricOcc, employs a superquadric-based scene representation. By leveraging a multi-layer icosphere-tessellated Gaussian approximation of superquadrics, we enable Gaussian rasterization for supervision during training. On the Occ3D dataset, SuperQuadricOcc achieves a 75% reduction in memory footprint, 124% faster inference, and a 5.9% improvement in mIoU compared to previous Gaussian-based methods, without the use of temporal labels. To our knowledge, this is the first occupancy model to enable real-time inference while maintaining competitive performance. The use of superquadrics reduces the number of primitives required for scene modeling by 84% relative to Gaussian-based approaches. Finally, evaluation against prior methods is facilitated by our fast superquadric voxelization module. The code will be made available at https://github.com/seamie6/SuperQuadricOcc.", "link": "http://arxiv.org/abs/2511.17361v3", "date": "2026-02-26", "relevancy": 2.9255, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6298}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.569}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5565}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SuperQuadricOcc%3A%20Multi-Layer%20Gaussian%20Approximation%20of%20Superquadrics%20for%20Real-Time%20Self-Supervised%20Occupancy%20Estimation&body=Title%3A%20SuperQuadricOcc%3A%20Multi-Layer%20Gaussian%20Approximation%20of%20Superquadrics%20for%20Real-Time%20Self-Supervised%20Occupancy%20Estimation%0AAuthor%3A%20Seamie%20Hayes%20and%20Reenu%20Mohandas%20and%20Tim%20Brophy%20and%20Alexandre%20Boulch%20and%20Ganesh%20Sistu%20and%20Ciaran%20Eising%0AAbstract%3A%20Semantic%20occupancy%20estimation%20enables%20comprehensive%20scene%20understanding%20for%20automated%20driving%2C%20providing%20dense%20spatial%20and%20semantic%20information%20essential%20for%20perception%20and%20planning.%20While%20Gaussian%20representations%20have%20been%20widely%20adopted%20in%20self-supervised%20occupancy%20estimation%2C%20the%20deployment%20of%20a%20large%20number%20of%20Gaussian%20primitives%20drastically%20increases%20memory%20requirements%20and%20is%20not%20suitable%20for%20real-time%20inference.%20In%20contrast%2C%20superquadrics%20permit%20reduced%20primitive%20count%20and%20lower%20memory%20requirements%20due%20to%20their%20diverse%20shape%20set.%20However%2C%20implementation%20into%20a%20self-supervised%20occupancy%20model%20is%20nontrivial%20due%20to%20the%20absence%20of%20a%20superquadric%20rasterizer%20to%20enable%20model%20supervision.%20Our%20proposed%20method%2C%20SuperQuadricOcc%2C%20employs%20a%20superquadric-based%20scene%20representation.%20By%20leveraging%20a%20multi-layer%20icosphere-tessellated%20Gaussian%20approximation%20of%20superquadrics%2C%20we%20enable%20Gaussian%20rasterization%20for%20supervision%20during%20training.%20On%20the%20Occ3D%20dataset%2C%20SuperQuadricOcc%20achieves%20a%2075%25%20reduction%20in%20memory%20footprint%2C%20124%25%20faster%20inference%2C%20and%20a%205.9%25%20improvement%20in%20mIoU%20compared%20to%20previous%20Gaussian-based%20methods%2C%20without%20the%20use%20of%20temporal%20labels.%20To%20our%20knowledge%2C%20this%20is%20the%20first%20occupancy%20model%20to%20enable%20real-time%20inference%20while%20maintaining%20competitive%20performance.%20The%20use%20of%20superquadrics%20reduces%20the%20number%20of%20primitives%20required%20for%20scene%20modeling%20by%2084%25%20relative%20to%20Gaussian-based%20approaches.%20Finally%2C%20evaluation%20against%20prior%20methods%20is%20facilitated%20by%20our%20fast%20superquadric%20voxelization%20module.%20The%20code%20will%20be%20made%20available%20at%20https%3A//github.com/seamie6/SuperQuadricOcc.%0ALink%3A%20http%3A//arxiv.org/abs/2511.17361v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSuperQuadricOcc%253A%2520Multi-Layer%2520Gaussian%2520Approximation%2520of%2520Superquadrics%2520for%2520Real-Time%2520Self-Supervised%2520Occupancy%2520Estimation%26entry.906535625%3DSeamie%2520Hayes%2520and%2520Reenu%2520Mohandas%2520and%2520Tim%2520Brophy%2520and%2520Alexandre%2520Boulch%2520and%2520Ganesh%2520Sistu%2520and%2520Ciaran%2520Eising%26entry.1292438233%3DSemantic%2520occupancy%2520estimation%2520enables%2520comprehensive%2520scene%2520understanding%2520for%2520automated%2520driving%252C%2520providing%2520dense%2520spatial%2520and%2520semantic%2520information%2520essential%2520for%2520perception%2520and%2520planning.%2520While%2520Gaussian%2520representations%2520have%2520been%2520widely%2520adopted%2520in%2520self-supervised%2520occupancy%2520estimation%252C%2520the%252 {"title": "LAMM-ViT: AI Face Detection via Layer-Aware Modulation of Region-Guided Attention", "author": "Jiangling Zhang and Weijie Zhu and Jirui Huang and Yaxiong Chen", "abstract": "Detecting AI-synthetic faces presents a critical challenge: it is hard to capture consistent structural relationships between facial regions across diverse generation techniques. Current methods, which focus on specific artifacts rather than fundamental inconsistencies, often fail when confronted with novel generative models. To address this limitation, we introduce Layer-aware Mask Modulation Vision Transformer (LAMM-ViT), a Vision Transformer designed for robust facial forgery detection. This model integrates distinct Region-Guided Multi-Head Attention (RG-MHA) and Layer-aware Mask Modulation (LAMM) components within each layer. RG-MHA utilizes facial landmarks to create regional attention masks, guiding the model to scrutinize architectural inconsistencies across different facial areas. Crucially, the separate LAMM module dynamically generates layer-specific parameters, including mask weights and gating values, based on network context. These parameters then modulate the behavior of RG-MHA, enabling adaptive adjustment of regional focus across network depths. This architecture facilitates the capture of subtle, hierarchical forgery cues ubiquitous among diverse generation techniques, such as GANs and Diffusion Models. In cross-model generalization tests, LAMM-ViT demonstrates superior performance, achieving 94.09% mean ACC (a +5.45% improvement over SoTA) and 98.62% mean AP (a +3.09% improvement). These results demonstrate LAMM-ViT's exceptional ability to generalize and its potential for reliable deployment against evolving synthetic media threats.", "link": "http://arxiv.org/abs/2505.07734v2", "date": "2026-02-26", "relevancy": 2.9242, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6146}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5778}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5621}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LAMM-ViT%3A%20AI%20Face%20Detection%20via%20Layer-Aware%20Modulation%20of%20Region-Guided%20Attention&body=Title%3A%20LAMM-ViT%3A%20AI%20Face%20Detection%20via%20Layer-Aware%20Modulation%20of%20Region-Guided%20Attention%0AAuthor%3A%20Jiangling%20Zhang%20and%20Weijie%20Zhu%20and%20Jirui%20Huang%20and%20Yaxiong%20Chen%0AAbstract%3A%20Detecting%20AI-synthetic%20faces%20presents%20a%20critical%20challenge%3A%20it%20is%20hard%20to%20capture%20consistent%20structural%20relationships%20between%20facial%20regions%20across%20diverse%20generation%20techniques.%20Current%20methods%2C%20which%20focus%20on%20specific%20artifacts%20rather%20than%20fundamental%20inconsistencies%2C%20often%20fail%20when%20confronted%20with%20novel%20generative%20models.%20To%20address%20this%20limitation%2C%20we%20introduce%20Layer-aware%20Mask%20Modulation%20Vision%20Transformer%20%28LAMM-ViT%29%2C%20a%20Vision%20Transformer%20designed%20for%20robust%20facial%20forgery%20detection.%20This%20model%20integrates%20distinct%20Region-Guided%20Multi-Head%20Attention%20%28RG-MHA%29%20and%20Layer-aware%20Mask%20Modulation%20%28LAMM%29%20components%20within%20each%20layer.%20RG-MHA%20utilizes%20facial%20landmarks%20to%20create%20regional%20attention%20masks%2C%20guiding%20the%20model%20to%20scrutinize%20architectural%20inconsistencies%20across%20different%20facial%20areas.%20Crucially%2C%20the%20separate%20LAMM%20module%20dynamically%20generates%20layer-specific%20parameters%2C%20including%20mask%20weights%20and%20gating%20values%2C%20based%20on%20network%20context.%20These%20parameters%20then%20modulate%20the%20behavior%20of%20RG-MHA%2C%20enabling%20adaptive%20adjustment%20of%20regional%20focus%20across%20network%20depths.%20This%20architecture%20facilitates%20the%20capture%20of%20subtle%2C%20hierarchical%20forgery%20cues%20ubiquitous%20among%20diverse%20generation%20techniques%2C%20such%20as%20GANs%20and%20Diffusion%20Models.%20In%20cross-model%20generalization%20tests%2C%20LAMM-ViT%20demonstrates%20superior%20performance%2C%20achieving%2094.09%25%20mean%20ACC%20%28a%20%2B5.45%25%20improvement%20over%20SoTA%29%20and%2098.62%25%20mean%20AP%20%28a%20%2B3.09%25%20improvement%29.%20These%20results%20demonstrate%20LAMM-ViT%27s%20exceptional%20ability%20to%20generalize%20and%20its%20potential%20for%20reliable%20deployment%20against%20evolving%20synthetic%20media%20threats.%0ALink%3A%20http%3A//arxiv.org/abs/2505.07734v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLAMM-ViT%253A%2520AI%2520Face%2520Detection%2520via%2520Layer-Aware%2520Modulation%2520of%2520Region-Guided%2520Attention%26entry.906535625%3DJiangling%2520Zhang%2520and%2520Weijie%2520Zhu%2520and%2520Jirui%2520Huang%2520and%2520Yaxiong%2520Chen%26entry.1292438233%3DDetecting%2520AI-synthetic%2520faces%2520presents%2520a%2520critical%2520challenge%253A%2520it%2520is%2520hard%2520to%2520capture%2520consistent%2520structural%2520relationships%2520between%2520facial%2520regions%2520across%2520diverse%2520generation%2520techniques.%2520Current%2520methods%252C%2520which%2520focus%2520on%2520specific%2520artifacts%2520rather%2520than%2520fundamental%2520inconsistencies%252C%2520often%2520fail%2520when%2520confronted%2520with%2520novel%2520generative%2520models.%2520To%2520address%2520this%2520limitation%252C%2520we%2520introduce%2520Layer-aware%2520Mask%2520Modulation%2520Vision%2520Transformer%2520%2528LAMM-ViT%2529%252C%2520a%2520Vision%2520Transformer%2520designed%2520for%2520robust%2520facial%2520forgery%2520detection.%2520This%2520model%2520integrates%25 {"title": "Retrieve and Segment: Are a Few Examples Enough to Bridge the Supervision Gap in Open-Vocabulary Segmentation?", "author": "Tilemachos Aravanis and Vladan Stojni\u0107 and Bill Psomas and Nikos Komodakis and Giorgos Tolias", "abstract": "Open-vocabulary segmentation (OVS) extends the zero-shot recognition capabilities of vision-language models (VLMs) to pixel-level prediction, enabling segmentation of arbitrary categories specified by text prompts. Despite recent progress, OVS lags behind fully supervised approaches due to two challenges: the coarse image-level supervision used to train VLMs and the semantic ambiguity of natural language. We address these limitations by introducing a few-shot setting that augments textual prompts with a support set of pixel-annotated images. Building on this, we propose a retrieval-augmented test-time adapter that learns a lightweight, per-image classifier by fusing textual and visual support features. Unlike prior methods relying on late, hand-crafted fusion, our approach performs learned, per-query fusion, achieving stronger synergy between modalities. The method supports continually expanding support sets, and applies to fine-grained tasks such as personalized segmentation. Experiments show that we significantly narrow the gap between zero-shot and supervised segmentation while preserving open-vocabulary ability.", "link": "http://arxiv.org/abs/2602.23339v1", "date": "2026-02-26", "relevancy": 2.8561, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5829}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5829}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5479}], "mailto": "mailto:haoxiang.li.2024@gmail.com? {"title": "PoSh: Using Scene Graphs To Guide LLMs-as-a-Judge For Detailed Image Descriptions", "author": "Amith Ananthram and Elias Stengel-Eskin and Lorena A. Bradford and Julia Demarest and Adam Purvis and Keith Krut and Robert Stein and Rina Elster Pantalony and Mohit Bansal and Kathleen McKeown", "abstract": "While vision-language models (VLMs) have advanced into detailed image description, evaluation remains a challenge. Standard metrics (e.g. CIDEr, SPICE) were designed for short texts and tuned to recognize errors that are now uncommon, such as object misidentification. In contrast, long texts require sensitivity to attribute and relation attachments and scores that localize errors to particular text spans. In this work, we introduce PoSh, a metric for detailed image description that uses scene graphs as structured rubrics to guide LLMs-as-a-Judge, producing aggregate scores grounded in fine-grained errors (e.g. mistakes in compositional understanding). PoSh is replicable, interpretable and a better proxy for human raters than existing metrics (including GPT4o-as-a-Judge). To validate PoSh, we introduce a challenging new dataset, DOCENT. This novel benchmark contains artwork, paired with expert-written references, and model-generated descriptions, augmented with granular and coarse judgments of their quality from art history students. Thus, DOCENT enables evaluating both detailed image description metrics and detailed image description itself in a challenging new domain. We show that PoSh achieves stronger correlations (+0.05 Spearman $\u03c1$) with the human judgments in DOCENT than the best open-weight alternatives, is robust to image type (using CapArena, an existing dataset of web imagery) and is a capable reward function, outperforming standard supervised fine-tuning. Then, using PoSh, we characterize the performance of open and closed models in describing the paintings, sketches and statues in DOCENT and find that foundation models struggle to achieve full, error-free coverage of images with rich scene dynamics, establishing a demanding new task to gauge VLM progress. Through both PoSh and DOCENT, we hope to enable advances in important areas such as assistive text generation.", "link": "http://arxiv.org/abs/2510.19060v3", "date": "2026-02-26", "relevancy": 2.8482, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5825}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5825}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5438}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PoSh%3A%20Using%20Scene%20Graphs%20To%20Guide%20LLMs-as-a-Judge%20For%20Detailed%20Image%20Descriptions&body=Title%3A%20PoSh%3A%20Using%20Scene%20Graphs%20To%20Guide%20LLMs-as-a-Judge%20For%20Detailed%20Image%20Descriptions%0AAuthor%3A%20Amith%20Ananthram%20and%20Elias%20Stengel-Eskin%20and%20Lorena%20A.%20Bradford%20and%20Julia%20Demarest%20and%20Adam%20Purvis%20and%20Keith%20Krut%20and%20Robert%20Stein%20and%20Rina%20Elster%20Pantalony%20and%20Mohit%20Bansal%20and%20Kathleen%20McKeown%0AAbstract%3A%20While%20vision-language%20models%20%28VLMs%29%20have%20advanced%20into%20detailed%20image%20description%2C%20evaluation%20remains%20a%20challenge.%20Standard%20metrics%20%28e.g.%20CIDEr%2C%20SPICE%29%20were%20designed%20for%20short%20texts%20and%20tuned%20to%20recognize%20errors%20that%20are%20now%20uncommon%2C%20such%20as%20object%20misidentification.%20In%20contrast%2C%20long%20texts%20require%20sensitivity%20to%20attribute%20and%20relation%20attachments%20and%20scores%20that%20localize%20errors%20to%20particular%20text%20spans.%20In%20this%20work%2C%20we%20introduce%20PoSh%2C%20a%20metric%20for%20detailed%20image%20description%20that%20uses%20scene%20graphs%20as%20structured%20rubrics%20to%20guide%20LLMs-as-a-Judge%2C%20producing%20aggregate%20scores%20grounded%20in%20fine-grained%20errors%20%28e.g.%20mistakes%20in%20compositional%20understanding%29.%20PoSh%20is%20replicable%2C%20interpretable%20and%20a%20better%20proxy%20for%20human%20raters%20than%20existing%20metrics%20%28including%20GPT4o-as-a-Judge%29.%20To%20validate%20PoSh%2C%20we%20introduce%20a%20challenging%20new%20dataset%2C%20DOCENT.%20This%20novel%20benchmark%20contains%20artwork%2C%20paired%20with%20expert-written%20references%2C%20and%20model-generated%20descriptions%2C%20augmented%20with%20granular%20and%20coarse%20judgments%20of%20their%20quality%20from%20art%20history%20students.%20Thus%2C%20DOCENT%20enables%20evaluating%20both%20detailed%20image%20description%20metrics%20and%20detailed%20image%20description%20itself%20in%20a%20challenging%20new%20domain.%20We%20show%20that%20PoSh%20achieves%20stronger%20correlations%20%28%2B0.05%20Spearman%20%24%CF%81%24%29%20with%20the%20human%20judgments%20in%20DOCENT%20than%20the%20best%20open-weight%20alternatives%2C%20is%20robust%20to%20image%20type%20%28using%20CapArena%2C%20an%20existing%20dataset%20of%20web%20imagery%29%20and%20is%20a%20capable%20reward%20function%2C%20outperforming%20standard%20supervised%20fine-tuning.%20Then%2C%20using%20PoSh%2C%20we%20characterize%20the%20performance%20of%20open%20and%20closed%20models%20in%20describing%20the%20paintings%2C%20sketches%20and%20statues%20in%20DOCENT%20and%20find%20that%20foundation%20models%20struggle%20to%20achieve%20full%2C%20error-free%20coverage%20of%20images%20with%20rich%20scene%20dynamics%2C%20establishing%20a%20demanding%20new%20task%20to%20gauge%20VLM%20progress.%20Through%20both%20PoSh%20and%20DOCENT%2C%20we%20hope%20to%20enable%20advances%20in%20important%20areas%20such%20as%20assistive%20text%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2510.19060v3%0AForm%3A%20https%3A//docs.google.com/forms/d/ {"title": "TriLite: Efficient Weakly Supervised Object Localization with Universal Visual Features and Tri-Region Disentanglement", "author": "Arian Sabaghi and Jos\u00e9 Oramas", "abstract": "Weakly supervised object localization (WSOL) aims to localize target objects in images using only image-level labels. Despite recent progress, many approaches still rely on multi-stage pipelines or full fine-tuning of large backbones, which increases training cost, while the broader WSOL community continues to face the challenge of partial object coverage. We present TriLite, a single-stage WSOL framework that leverages a frozen Vision Transformer with Dinov2 pre-training in a self-supervised manner, and introduces only a minimal number of trainable parameters (fewer than 800K on ImageNet-1K) for both classification and localization. At its core is the proposed TriHead module, which decomposes patch features into foreground, background, and ambiguous regions, thereby improving object coverage while suppressing spurious activations. By disentangling classification and localization objectives, TriLite effectively exploits the universal representations learned by self-supervised ViTs without requiring expensive end-to-end training. Extensive experiments on CUB-200-2011, ImageNet-1K, and OpenImages demonstrate that TriLite sets a new state of the art, while remaining significantly more parameter-efficient and easier to train than prior methods. The code will be released soon.", "link": "http://arxiv.org/abs/2602.23120v1", "date": "2026-02-26", "relevancy": 2.8461, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6041}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5653}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n {"title": "Large Multimodal Models as General In-Context Classifiers", "author": "Marco Garosi and Matteo Farina and Alessandro Conti and Massimiliano Mancini and Elisa Ricci", "abstract": "Which multimodal model should we use for classification? Previous studies suggest that the answer lies in CLIP-like contrastive Vision-Language Models (VLMs), due to their remarkable performance in zero-shot classification. In contrast, Large Multimodal Models (LMM) are more suitable for complex tasks. In this work, we argue that this answer overlooks an important capability of LMMs: in-context learning. We benchmark state-of-the-art LMMs on diverse datasets for closed-world classification and find that, although their zero-shot performance is lower than CLIP's, LMMs with a few in-context examples can match or even surpass contrastive VLMs with cache-based adapters, their \"in-context\" equivalent. We extend this analysis to the open-world setting, where the generative nature of LMMs makes them more suitable for the task. In this challenging scenario, LMMs struggle whenever provided with imperfect context information. To address this issue, we propose CIRCLE, a simple training-free method that assigns pseudo-labels to in-context examples, iteratively refining them with the available context itself. Through extensive experiments, we show that CIRCLE establishes a robust baseline for open-world classification, surpassing VLM counterparts and highlighting the potential of LMMs to serve as unified classifiers, and a flexible alternative to specialized models.", "link": "http://arxiv.org/abs/2602.23229v1", "date": "2026-02-26", "relevancy": 2.8251, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5913}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5519}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5519}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Large%20Multimodal%20Models%20as%20General%20In-Context%20Classifiers&body=Title%3A%20Large%20Multimodal%20Models%20as%20General%20In-Context%20Classifiers%0AAuthor%3A%20Marco%20Garosi%20and%20Matteo%20Farina%20and%20Alessandro%20Conti%20and%20Massimiliano%20Mancini%20and%20Elisa%20Ricci%0AAbstract%3A%20Which%20multimodal%20model%20should%20we%20use%20for%20classification%3F%20Previous%20studies%20suggest%20that%20the%20answer%20lies%20in%20CLIP-like%20contrastive%20Vision-Language%20Models%20%28VLMs%29%2C%20due%20to%20their%20remarkable%20performance%20in%20zero-shot%20classification.%20In%20contrast%2C%20Large%20Multimodal%20Models%20%28LMM%29%20are%20more%20suitable%20for%20complex%20tasks.%20In%20this%20work%2C%20we%20argue%20that%20this%20answer%20overlooks%20an%20important%20capability%20of%20LMMs%3A%20in-context%20learning.%20We%20benchmark%20state-of-the-art%20LMMs%20on%20diverse%20datasets%20for%20closed-world%20classification%20and%20find%20that%2C%20although%20their%20zero-shot%20performance%20is%20lower%20than%20CLIP%27s%2C%20LMMs%20with%20a%20few%20in-context%20examples%20can%20match%20or%20even%20surpass%20contrastive%20VLMs%20with%20cache-based%20adapters%2C%20their%20%22in-context%22%20equivalent.%20We%20extend%20this%20analysis%20to%20the%20open-world%20setting%2C%20where%20the%20generative%20nature%20of%20LMMs%20makes%20them%20more%20suitable%20for%20the%20task.%20In%20this%20challenging%20scenario%2C%20LMMs%20struggle%20whenever%20provided%20with%20imperfect%20context%20information.%20To%20address%20this%20issue%2C%20we%20propose%20CIRCLE%2C%20a%20simple%20training-free%20method%20that%20assigns%20pseudo-labels%20to%20in-context%20examples%2C%20iteratively%20refining%20them%20with%20the%20available%20context%20itself.%20Through%20extensive%20experiments%2C%20we%20show%20that%20CIRCLE%20establishes%20a%20robust%20baseline%20for%20open-world%20classification%2C%20surpassing%20VLM%20counterparts%20and%20highlighting%20the%20potential%20of%20LMMs%20to%20serve%20as%20unified%20classifiers%2C%20and%20a%20flexible%20alternative%20to%20specialized%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23229v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLarge%2520Multimodal%2520Models%2520as%2520General%2520In-Context%2520Classifiers%26entry.906535625%3DMarco%2520Garosi%2520and%2520Matteo%2520Farina%2520and%2520Alessandro%2520Conti%2520and%2520Massimiliano%2520Mancini%2520and%2520Elisa%2520Ricci%26entry.1292438233%3DWhich%2520multimodal%2520model%2520should%2520we%2520use%2520for%2520classification%253F%2520Previous%2520studies%2520suggest%2520that%2520the%2520answer%2520lies%2520in%2520CLIP-like%2520contrastive%2520Vision-Language%2520Models%2520%2528VLMs%2529%252C%2520due%2520to%2520their%2520remarkable%2520performance%2520in%2520zero-shot%2520classification.%2520In%2520contrast%252C%2520Large%2520Multimodal%2520Models%2520%2528LMM%2529%2520are%2520more%2520suitable%2520for%2520complex%2520tasks.%2520In%2520this%2520work%252C%2520we%2520argue%2520that%2520this%2520answer%2520overlooks%2520an%2520important%2520capability%2520of%2520LMMs%253A%2520in-context%2520learning.%2520We%2520benchmark%2520state-of-the-art%2520LMMs%2520on%2520diverse%2520datasets%2520for%2520closed-world%2520classification%2520and%2520find%2520that%252C%2520although%2520their%2520zero-shot%2520performance%2520is%2520lower%2520than%2520CLIP%2527s%252C%2520LMMs%2520with%2520a%2520few%2520in-context%2520examples%2520can%2520match%2520or%2520even%2520surpass%2520contrastive%2520VLMs%2520with%2520cache-based%2520adapters%252C%2520their%2520%2522in-context%2522%2520equivalent.%2520We%2520extend%2520this%2520analysis%2520to%2520the%2520open-world%2520setting%252C%2520where%2520the%2520generative%2520nature%2520of%2520LMMs%2520makes%2520them%2520more%2520suitable%2520for%2520the%2520task.%2520In%2520this%2520challenging%2520scenario%252C%2520LMMs%2520struggle%2520whenever%2520provided%2520with%2520imperfect%2520context%2520information.%2520To%2520address%2520this%2520issue%252C%2520we%2520propose%2520CIRCLE%252C%2520a%2520simple%2520training-free%2520method%2520that%2520assigns%2520pseudo-labels%2520to%2520in-context%2520examples%252C%2520iteratively%2520refining%2520them%2520with%2520the%2520available%2520context%2520itself.%2520Through%2520extensive%2520experiments%252C%2520we%2520show%2520that%2520CIRCLE%2520establishes%2520a%2520robust%2520baseline%2520for%2520open-world%2520classification%252C%2520surpassing%2520VLM%2520counterparts%2520and%2520highlighting%2520the%2520potential%2520of%2520LMMs%2520to%2520serve%2520as%2520unified%2520classifiers%252C%2520and%2520a%2520flexible%2520alternative%2520to%2520specialized%2520models.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.23229v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Large%20Multimodal%20Models%20as%20General%20In-Context%20Classifiers&entry.906535625=Marco%20Garosi%20and%20Matteo%20Farina%20and%20Alessandro%20Conti%20and%20Massimiliano%20Mancini%20and%20Elisa%20Ricci&entry.1292438233=Which%20multimodal%20model%20should%20we%20use%20for%20classification%3F%20Previous%20studies%20suggest%20that%20the%20answer%20lies%20in%20CLIP-like%20contrastive%20Vision-Language%20Models%20%28VLMs%29%2C%20due%20to%20their%20remarkable%20performance%20in%20zero-shot%20classification.%20In%20contrast%2C%20Large%20Multimodal%20Models%20%28LMM%29%20are%20more%20suitable%20for%20complex%20tasks.%20In%20this%20work%2C%20we%20argue%20that%20this%20answer%20overlooks%20an%20important%20capability%20of%20LMMs%3A%20in-context%20learning.%20We%20benchmark%20state-of-the-art%20LMMs%20on%20diverse%20datasets%20for%20closed-world%20classification%20and%20find%20that%2C%20although%20their%20zero-shot%20performance%20is%20lower%20than%20CLIP%27s%2C%20LMMs%20with%20a%20few%20in-context%20examples%20can%20match%20or%20even%20surpass%20contrastive%20VLMs%20with%20cache-based%20adapters%2C%20their%20%22in-context%22%20equivalent.%20We%20extend%20this%20analysis%20to%20the%20open-world%20setting%2C%20where%20the%20generative%20nature%20of%20LMMs%20makes%20them%20more%20suitable%20for%20the%20task.%20In%20this%20challenging%20scenario%2C%20LMMs%20struggle%20whenever%20provided%20with%20imperfect%20context%20information.%20To%20address%20this%20issue%2C%20we%20propose%20CIRCLE%2C%20a%20simple%20training-free%20method%20that%20assigns%20pseudo-labels%20to%20in-context%20examples%2C%20iteratively%20refining%20them%20with%20the%20available%20context%20itself.%20Through%20extensive%20experiments%2C%20we%20show%20that%20CIRCLE%20establishes%20a%20robust%20baseline%20for%20open-world%20classification%2C%20surpassing%20VLM%20counterparts%20and%20highlighting%20the%20potential%20of%20LMMs%20to%20serve%20as%20unified%20classifiers%2C%20and%20a%20flexible%20alternative%20to%20specialized%20models.&entry.1838667208=http%3A//arxiv.org/abs/2602.23229v1&entry.124074799=Read"},
{"title": "ThinkOmni: Lifting Textual Reasoning to Omni-modal Scenarios via Guidance Decoding", "author": "Yiran Guan and Sifan Tu and Dingkang Liang and Linghao Zhu and Jianzhong Ju and Zhenbo Luo and Jian Luan and Yuliang Liu and Xiang Bai", "abstract": "Omni-modal reasoning is essential for intelligent systems to understand and draw inferences from diverse data sources. While existing omni-modal large language models (OLLM) excel at perceiving diverse modalities, they lack the complex reasoning abilities of recent large reasoning models (LRM). However, enhancing the reasoning ability of OLLMs through additional training presents significant challenges, including the need for high-quality data, task-specific adaptation, and substantial computational costs. To address these limitations, we propose ThinkOmni, a training-free and data-free framework that lifts textual reasoning to omni-modal scenarios. ThinkOmni introduces two key components: 1) LRM-as-a-Guide, which leverages off-the-shelf LRMs to guide the OLLM decoding process; 2) Stepwise Contrastive Scaling, which adaptively balances perception and reasoning signals without manual hyperparameter tuning. Experiments on six multi-modal reasoning benchmarks demonstrate that ThinkOmni consistently delivers performance improvements, with main results achieving 70.2 on MathVista and 75.5 on MMAU. Overall, ThinkOmni offers a flexible and generalizable solution for omni-modal reasoning and provides new insights into the generalization and application of reasoning capabilities.", "link": "http://arxiv.org/abs/2602.23306v1", "date": "2026-02-26", "relevancy": 2.8227, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5812}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5812}, {"title": "TAMM: TriAdapte 2070.2%20on%20MathVista%20and%2075.5%20on%20MMAU.%20Overall%2C%20ThinkOmni%20offers%20a%20flexible%20and%20generalizable%20solution%20for%20omni-modal%20reasoning%20and%20provides%20new%20insights%20into%20the%20generalization%20and%20application%20of%20reasoning%20capabilities.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23306v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThinkOmni%253A%2520Lifting%2520Textual%2520Reasoning%2520to%2520Omni-modal%2520Scenarios%2520via%2520Guidance%2520Decoding%26entry.906535625%3DYiran%2520Guan%2520and%2520Sifan%2520Tu%2520and%2520Dingkang%2520Liang%2520and%2520Linghao%2520Zhu%2520and%2520Jianzhong%2520Ju%2520and%2520Zhenbo%2520Luo%2520and%2520Jian%2520Luan%2520and%2520Yuliang%2520Liu%2520and%2520Xiang%2520Bai%26entry.1292438233%3DOmni-modal%2520reasoning%2520is%2520essential%2520for%2520intelligent%2520systems%2520to%2520understand%2520and%2520draw%2520inferences%2520from%2520diverse%2520data%2520sources.%2520While%2520existing%2520omni-modal%2520large%2520language%2520models%2520%2528OLLM%2529%2520excel%2520at%2520perceiving%2520diverse%2520modalities%252C%2520they%2520lack%2520the%2520complex%2520reasoning%2520abilities%2520of%2520recent%2520large%2520reasoning%2520models%2520%2528LRM%2529.%2520However%252C%2520enhancing%2520the%2520reasoning%2520ability%2520of%2520OLLMs%2520through%2520additional%2520training%2520presents%2520significant%2520challenges%252C%2520including%2520the%2520need%2520for%2520high-quality%2520data%252C%2520task-specific%2520adaptation%252C%2520and%2520substantial%2520computational%2520costs.%2520To%2520address%2520these%2520limitations%252C%2520we%2520propose%2520ThinkOmni%252C%2520a%2520training-free%2520and%2520data-free%2520framework%2520that%2520lifts%2520textual%2520reasoning%2520to%2520omni-modal%2520scenarios.%2520ThinkOmni%2520introduces%2520two%2520key%2520components%253A%25201%2529%2520LRM-as-a-Guide%252C%2520 {"title": "SubspaceAD: Training-Free Few-Shot Anomaly Detection via Subspace Modeling", "author": "Camile Lendering and Erkut Akdag and Egor Bondarev", "abstract": "Detecting visual anomalies in industrial inspection often requires training with only a few normal images per category. Recent few-shot methods achieve strong results employing foundation-model features, but typically rely on memory banks, auxiliary datasets, or multi-modal tuning of vision-language models. We therefore question whether such complexity is necessary given the feature representations of vision foundation models. To answer this question, we introduce SubspaceAD, a training-free method, that operates in two simple stages. First, patch-level features are extracted from a small set of normal images by a frozen DINOv2 backbone. Second, a Principal Component Analysis (PCA) model is fit to these features to estimate the low-dimensional subspace of normal variations. At inference, anomalies are detected via the reconstruction residual with respect to this subspace, producing interpretable and statistically grounded anomaly scores. Despite its simplicity, SubspaceAD achieves state-of-the-art performance across one-shot and few-shot settings without training, prompt tuning, or memory banks. In the one-shot anomaly detection setting, SubspaceAD achieves image-level and pixel-level AUROC of 98.0% and 97.6% on the MVTec-AD dataset, and 93.3% and 98.3% on the VisA dataset, respectively, surpassing prior state-of-the-art results. Code and demo are available at https://github.com/CLendering/SubspaceAD.", "link": "http://arxiv.org/abs/2602.23013v1", "date": "2026-02-26", "relevancy": 2.7789, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5596}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "

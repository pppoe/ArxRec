{"title": "A Lightweight IDS for Early APT Detection Using a Novel Feature Selection Method", "author": "Bassam Noori Shaker and Bahaa Al-Musawi and Mohammed Falih Hassan", "abstract": "An Advanced Persistent Threat (APT) is a multistage, highly sophisticated, and covert form of cyber threat that gains unauthorized access to networks to either steal valuable data or disrupt the targeted network. These threats often remain undetected for extended periods, emphasizing the critical need for early detection in networks to mitigate potential APT consequences. In this work, we propose a feature selection method for developing a lightweight intrusion detection system capable of effectively identifying APTs at the initial compromise stage. Our approach leverages the XGBoost algorithm and Explainable Artificial Intelligence (XAI), specifically utilizing the SHAP (SHapley Additive exPlanations) method for identifying the most relevant features of the initial compromise stage. The results of our proposed method showed the ability to reduce the selected features of the SCVIC-APT-2021 dataset from 77 to just four while maintaining consistent evaluation metrics for the suggested system. The estimated metrics values are 97% precision, 100% recall, and a 98% F1 score. The proposed method not only aids in preventing successful APT consequences but also enhances understanding of APT behavior at early stages.", "link": "http://arxiv.org/abs/2506.12108v2", "date": "2026-02-26", "relevancy": 2.2353, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4614}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4571}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4227}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Lightweight%20IDS%20for%20Early%20APT%20Detection%20Using%20a%20Novel%20Feature%20Selection%20Method&body=Title%3A%20A%20Lightweight%20IDS%20for%20Early%20APT%20Detection%20Using%20a%20Novel%20Feature%20Selection%20Method%0AAuthor%3A%20Bassam%20Noori%20Shaker%20and%20Bahaa%20Al-Musawi%20and%20Mohammed%20Falih%20Hassan%0AAbstract%3A%20An%20Advanced%20Persistent%20Threat%20%28APT%29%20is%20a%20multistage%2C%20highly%20sophisticated%2C%20and%20covert%20form%20of%20cyber%20threat%20that%20gains%20unauthorized%20access%20to%20networks%20to%20either%20steal%20valuable%20data%20or%20disrupt%20the%20targeted%20network.%20These%20threats%20often%20remain%20undetected%20for%20extended%20periods%2C%20emphasizing%20the%20critical%20need%20for%20early%20detection%20in%20networks%20to%20mitigate%20potential%20APT%20consequences.%20In%20this%20work%2C%20we%20propose%20a%20feature%20selection%20method%20for%20developing%20a%20lightweight%20intrusion%20detection%20system%20capable%20of%20effectively%20identifying%20APTs%20at%20the%20initial%20compromise%20stage.%20Our%20approach%20leverages%20the%20XGBoost%20algorithm%20and%20Explainable%20Artificial%20Intelligence%20%28XAI%29%2C%20specifically%20utilizing%20the%20SHAP%20%28SHapley%20Additive%20exPlanations%29%20method%20for%20identifying%20the%20most%20relevant%20features%20of%20the%20initial%20compromise%20stage.%20The%20results%20of%20our%20proposed%20method%20showed%20the%20ability%20to%20reduce%20the%20selected%20features%20of%20the%20SCVIC-APT-2021%20dataset%20from%2077%20to%20just%20four%20while%20maintaining%20consistent%20evaluation%20metrics%20for%20the%20suggested%20system.%20The%20estimated%20metrics%20values%20are%2097%25%20precision%2C%20100%25%20recall%2C%20and%20a%2098%25%20F1%20score.%20The%20proposed%20method%20not%20only%20aids%20in%20preventing%20successful%20APT%20consequences%20but%20also%20enhances%20understanding%20of%20APT%20behavior%20at%20early%20stages.%0ALink%3A%20http%3A//arxiv.org/abs/2506.12108v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Lightweight%2520IDS%2520for%2520Early%2520APT%2520Detection%2520Using%2520a%2520Novel%2520Feature%2520Selection%2520Method%26entry.906535625%3DBassam%2520Noori%2520Shaker%2520and%2520Bahaa%2520Al-Musawi%2520and%2520Mohammed%2520Falih%2520Hassan%26entry.1292438233%3DAn%2520Advanced%2520Persistent%2520Threat%2520%2528APT%2529%2520is%2520a%2520multistage%252C%2520highly%2520sophisticated%252C%2520and%2520covert%2520form%2520of%2520cyber%2520threat%2520that%2520gains%2520unauthorized%2520access%2520to%2520networks%2520to%2520either%2520steal%2520valuable%2520data%2520or%2520disrupt%2520the%2520targeted%2520network.%2520These%2520threats%2520often%2520remain%2520undetected%2520for%2520extended%2520periods%252C%2520emphasizing%2520the%2520critical%2520need%2520for%2520early%2520detection%2520in%2520networks%2520to%2520mitigate%2520potential%2520APT%2520consequences.%2520In%2520this%2520work%252C%2520we%2520propose%2520a%2520feature%2520selection%2520method%2520for%2520developing%2520a%2520lightweight%2520intrusion%2520detection%2520system%2520capable%2520of%2520effectively%2520identifying%2520APTs%2520at%2520the%2520initial%2520compromise%2520stage.%2520Our%2520approach%2520leverages%2520the%2520XGBoost%2520algorithm%2520and%2520Explainable%2520Artificial%2520Intelligence%2520%2528XAI%2529%252C%2520specifically%2520utilizing%2520the%2520SHAP%2520%2528SHapley%2520Additive%2520exPlanations%2529%2520method%2520for%2520identifying%2520the%2520most%2520relevant%2520features%2520of%2520the%2520initial%2520compromise%2520stage.%2520The%2520results%2520of%2520our%2520proposed%2520method%2520showed%2520the%2520ability%2520to%2520reduce%2520the%2520selected%2520features%2520of%2520the%2520SCVIC-APT-2021%2520dataset%2520from%252077%2520to%2520just%2520four%2520while%2520maintaining%2520consistent%2520evaluation%2520metrics%2520for%2520the%2520suggested%2520system.%2520The%2520estimated%2520metrics%2520values%2520are%252097%2525%2520precision%252C%2520100%2525%2520recall%252C%2520and%2520a%252098%2525%2520F1%2520score.%2520The%2520proposed%2520method%2520not%2520only%2520aids%2520in%2520preventing%2520successful%2520APT%2520consequences%2520but%2520also%2520enhances%2520understanding%2520of%2520APT%2520behavior%2520at%2520early%2520stages.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2506.12108v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=A%20Lightweight%20IDS%20for%20Early%20APT%20Detection%20Using%20a%20Novel%20Feature%20Selection%20Method&entry.906535625=Bassam%20Noori%20Shaker%20and%20Bahaa%20Al-Musawi%20and%20Mohammed%20Falih%20Hassan&entry.1292438233=An%20Advanced%20Persistent%20Threat%20%28APT%29%20is%20a%20multistage%2C%20highly%20sophisticated%2C%20and%20covert%20form%20of%20cyber%20threat%20that%20gains%20unauthorized%20access%20to%20networks%20to%20either%20steal%20valuable%20data%20or%20disrupt%20the%20targeted%20network.%20These%20threats%20often%20remain%20undetected%20for%20extended%20periods%2C%20emphasizing%20the%20critical%20need%20for%20early%20detection%20in%20networks%20to%20mitigate%20potential%20APT%20consequences.%20In%20this%20work%2C%20we%20propose%20a%20feature%20selection%20method%20for%20developing%20a%20lightweight%20intrusion%20detection%20system%20capable%20of%20effectively%20identifying%20APTs%20at%20the%20initial%20compromise%20stage.%20Our%20approach%20leverages%20the%20XGBoost%20algorithm%20and%20Explainable%20Artificial%20Intelligence%20%28XAI%29%2C%20specifically%20utilizing%20the%20SHAP%20%28SHapley%20Additive%20exPlanations%29%20method%20for%20identifying%20the%20most%20relevant%20features%20of%20the%20initial%20compromise%20stage.%20The%20results%20of%20our%20proposed%20method%20showed%20the%20ability%20to%20reduce%20the%20selected%20features%20of%20the%20SCVIC-APT-2021%20dataset%20from%2077%20to%20just%20four%20while%20maintaining%20consistent%20evaluation%20metrics%20for%20the%20suggested%20system.%20The%20estimated%20metrics%20values%20are%2097%25%20precision%2C%20100%25%20recall%2C%20and%20a%2098%25%20F1%20score.%20The%20proposed%20method%20not%20only%20aids%20in%20preventing%20successful%20APT%20consequences%20but%20also%20enhances%20understanding%20of%20APT%20behavior%20at%20early%20stages.&entry.1838667208=http%3A//arxiv.org/abs/2506.12108v2&entry.124074799=Read"},
{"title": "Scale Can't Overcome Pragmatics: The Impact of Reporting Bias on Vision-Language Reasoning", "author": "Amita Kamath and Jack Hessel and Khyathi Chandu and Jena D. Hwang and Kai-Wei Chang and Ranjay Krishna", "abstract": "The lack of reasoning capabilities in Vision-Language Models (VLMs) has remained at the forefront of research discourse. We posit that this behavior stems from a reporting bias in their training data. That is, how people communicate about visual content by default omits tacit information needed to supervise some types of reasoning; e.g., \"at the game today!\" is a more likely caption than \"a photo of 37 people standing behind a field\". We investigate the data underlying the popular VLMs OpenCLIP, LLaVA-1.5 and Molmo through the lens of theories from pragmatics, and find that reporting bias results in insufficient representation of four reasoning skills (spatial, temporal, negation, and counting), despite the corpora being of web-scale, and/or synthetically generated. With a set of curated benchmarks, we demonstrate that: (i) VLMs perform poorly on the aforementioned types of reasoning suppressed in the training data by reporting bias; (ii) contrary to popular belief, scaling data size, model size, and to multiple languages does not result in emergence of these skills by default; but, promisingly, (iii) incorporating annotations specifically collected to obtain tacit information is effective. Our findings highlight the need for more intentional training data curation methods, rather than counting on scale for emergence of reasoning capabilities.", "link": "http://arxiv.org/abs/2602.23351v1", "date": "2026-02-26", "relevancy": 2.233, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5683}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5683}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5081}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Scale%20Can%27t%20Overcome%20Pragmatics%3A%20The%20Impact%20of%20Reporting%20Bias%20on%20Vision-Language%20Reasoning&body=Title%3A%20Scale%20Can%27t%20Overcome%20Pragmatics%3A%20The%20Impact%20of%20Reporting%20Bias%20on%20Vision-Language%20Reasoning%0AAuthor%3A%20Amita%20Kamath%20and%20Jack%20Hessel%20and%20Khyathi%20Chandu%20and%20Jena%20D.%20Hwang%20and%20Kai-Wei%20Chang%20and%20Ranjay%20Krishna%0AAbstract%3A%20The%20lack%20of%20reasoning%20capabilities%20in%20Vision-Language%20Models%20%28VLMs%29%20has%20remained%20at%20the%20forefront%20of%20research%20discourse.%20We%20posit%20that%20this%20behavior%20stems%20from%20a%20reporting%20bias%20in%20their%20training%20data.%20That%20is%2C%20how%20people%20communicate%20about%20visual%20content%20by%20default%20omits%20tacit%20information%20needed%20to%20supervise%20some%20types%20of%20reasoning%3B%20e.g.%2C%20%22at%20the%20game%20today%21%22%20is%20a%20more%20likely%20caption%20than%20%22a%20photo%20of%2037%20people%20standing%20behind%20a%20field%22.%20We%20investigate%20the%20data%20underlying%20the%20popular%20VLMs%20OpenCLIP%2C%20LLaVA-1.5%20and%20Molmo%20through%20the%20lens%20of%20theories%20from%20pragmatics%2C%20and%20find%20that%20reporting%20bias%20results%20in%20insufficient%20representation%20of%20four%20reasoning%20skills%20%28spatial%2C%20temporal%2C%20negation%2C%20and%20counting%29%2C%20despite%20the%20corpora%20being%20of%20web-scale%2C%20and/or%20synthetically%20generated.%20With%20a%20set%20of%20curated%20benchmarks%2C%20we%20demonstrate%20that%3A%20%28i%29%20VLMs%20perform%20poorly%20on%20the%20aforementioned%20types%20of%20reasoning%20suppressed%20in%20the%20training%20data%20by%20reporting%20bias%3B%20%28ii%29%20contrary%20to%20popular%20belief%2C%20scaling%20data%20size%2C%20model%20size%2C%20and%20to%20multiple%20languages%20does%20not%20result%20in%20emergence%20of%20these%20skills%20by%20default%3B%20but%2C%20promisingly%2C%20%28iii%29%20incorporating%20annotations%20specifically%20collected%20to%20obtain%20tacit%20information%20is%20effective.%20Our%20findings%20highlight%20the%20need%20for%20more%20intentional%20training%20data%20curation%20methods%2C%20rather%20than%20counting%20on%20scale%20for%20emergence%20of%20reasoning%20capabilities.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23351v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DScale%2520Can%2527t%2520Overcome%2520Pragmatics%253A%2520The%2520Impact%2520of%2520Reporting%2520Bias%2520on%2520Vision-Language%2520Reasoning%26entry.906535625%3DAmita%2520Kamath%2520and%2520Jack%2520Hessel%2520and%2520Khyathi%2520Chandu%2520and%2520Jena%2520D.%2520Hwang%2520and%2520Kai-Wei%2520Chang%2520and%2520Ranjay%2520Krishna%26entry.1292438233%3DThe%2520lack%2520of%2520reasoning%2520capabilities%2520in%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520has%2520remained%2520at%2520the%2520forefront%2520of%2520research%2520discourse.%2520We%2520posit%2520that%2520this%2520behavior%2520stems%2520from%2520a%2520reporting%2520bias%2520in%2520their%2520training%2520data.%2520That%2520is%252C%2520how%2520people%2520communicate%2520about%2520visual%2520content%2520by%2520default%2520omits%2520tacit%2520information%2520needed%2520to%2520supervise%2520some%2520types%2520of%2520reasoning%253B%2520e.g.%252C%2520%2522at%2520the%2520game%2520today%2521%2522%2520is%2520a%2520more%2520likely%2520caption%2520than%2520%2522a%2520photo%2520of%252037%2520people%2520standing%2520behind%2520a%2520field%2522.%2520We%2520investigate%2520the%2520data%2520underlying%2520the%2520popular%2520VLMs%2520OpenCLIP%252C%2520LLaVA-1.5%2520and%2520Molmo%2520through%2520the%2520len at%20the%20forefront%20of%20research%20discourse.%20We%20posit%20that%20this%20behavior%20stems%20from%20a%20reporting%20bias%20in%20their%20training%20data.%20That%20is%2C%20how%20people%20communicate%20about%20visual%20content%20by%20default%20omits%20tacit%20information%20needed%20to%20supervise%20some%20types%20of%20reasoning%3B%20e.g.%2C%20%22at%20the%20game%20today%21%22%20is%20a%20more%20likely%20caption%20than%20%22a%20photo%20of%2037%20people%20standing%20behind%20a%20field%22.%20We%20investigate%20the%20data%20underlying%20the%20popular%20VLMs%20OpenCLIP%2C%20LLaVA-1.5%20and%20Molmo%20through%20the%20lens%20of%20theories%20from%20pragmatics%2C%20and%20find%20that%20reporting%20bias%20results%20in%20insufficient%20representation%20of%20four%20reasoning%20skills%20%28spatial%2C%20temporal%2C%20negation%2C%20and%20counting%29%2C%20despite%20the%20corpora%20being%20of%20web-scale%2C%20and/or%20synthetically%20generated.%20With%20a%20set%20of%20curated%20benchmarks%2C%20we%20demonstrate%20that%3A%20%28i%29%20VLMs%20perform%20poorly%20on%20the%20aforementioned%20types%20of%20reasoning%20suppressed%20in%20the%20training%20data%20by%20reporting%20bias%3B%20%28ii%29%20contrary%20to%20popular%20belief%2C%20scaling%20data%20size%2C%20model%20size%2C%20and%20to%20multiple%20languages%20does%20not%20result%20in%20emergence%20of%20these%20skills%20by%20default%3B%20but%2C%20promisingly%2C%20%28iii%29%20incorporating%20annotations%20specifically%20collected%20to%20obtain%20tacit%20information%20is%20effective.%20Our%20findings%20highlight%20the%20need%20for%20more%20intentional%20training%20data%20curation%20methods%2C%20rather%20than%20counting%20on%20scale%20for%20emergence%20of%20reasoning%20capabilities.&entry.1838667208=http%3A//arxiv.org/abs/2602.23351v1&entry.124074799=Read"},
{"title": "PRIMA: Pre-training with Risk-integrated Image-Metadata Alignment for Medical Diagnosis via LLM", "author": "Yiqing Wang and Chunming He and Ming-Chen Lu and Mercy Pawar and Leslie Niziol and Maria Woodward and Sina Farsiu", "abstract": "Medical diagnosis requires the effective synthesis of visual manifestations and clinical metadata. However, existing methods often treat metadata as isolated tags, failing to exploit the rich semantic knowledge embedded in clinical descriptions. We propose PRIMA (Pre-training with Risk-integrated Image-Metadata Alignment), a framework that integrates domain-specific knowledge into multi-modal representation learning. We first curate an expert corpus of risk-disease correlations via Retrieval-Augmented Generation (RAG) to refine Clinical ModernBERT, embedding diagnostic priors into the text encoder. To bridge the modality gap, we introduce a dual-encoder pre-training strategy utilizing DINOv3 and our refined BERT, optimized by a suite of four complementary loss functions. These losses are designed to capture multi-granular semantic alignment and handle the ambiguity of clinical correlations through soft labels. Finally, we leverage Qwen-3 to fuse these aligned features for precise disease classification. Extensive experiments demonstrate that PRIMA effectively harmonizes pixel-level features with abstract clinical expertise, significantly outperforming other state-of-the-art methods. Notably, our framework achieves superior robustness without the need for massive data collection or exhaustive computational resources. Our code will be made public upon acceptance.", "link": "http://arxiv.org/abs/2602.23297v1", "date": "2026-02-26", "relevancy": 2.2207, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5727}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv. 0precise%20disease%20classification.%20Extensive%20experiments%20demonstrate%20that%20PRIMA%20effectively%20harmonizes%20pixel-level%20features%20with%20abstract%20clinical%20expertise%2C%20significantly%20outperforming%20other%20state-of-the-art%20methods.%20Notably%2C%20our%20framework%20achieves%20superior%20robustness%20without%20the%20need%20for%20massive%20data%20collection%20or%20exhaustive%20computational%20resources.%20Our%20code%20will%20be%20made%20public%20upon%20acceptance.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23297v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPRIMA%253A%2520Pre-training%2520with%2520Risk-integrated%2520Image-Metadata%2520Alignment%2520for%2520Medical%2520Diagnosis%2520via%2520LLM%26entry.906535625%3DYiqing%2520Wang%2520and%2520Chunming%2520He%2520and%2520Ming-Chen%2520Lu%2520and%2520Mercy%2520Pawar%2520and%2520Leslie%2520Niziol%2520and%2520Maria%2520Woodward%2520and%2520Sina%2520Farsiu%26entry.1292438233%3DMedical%2520diagnosis%2520requires%2520the%2520effective%2520synthesis%2520of%2520visual%2520manifestations%2520and%2520clinical%2520metadata.%2520However%252C%2520existing%2520methods%2520often%2520treat%2520metadata%2520as%2520isolated%2520tags%252C%2520failing%2520to%2520exploit%2520the%2520rich%2520semantic%2520knowledge%2520embedded%2520in%2520clinical%2520descriptions.%2520We%2520propose%2520PRIMA%2520%2528Pre-training%2520with%2520Risk-integrated%2520Image-Metadata%2520Alignment%2529%252C%2520a%2520framework%2520that%2520integrates%2520domain-specific%2520knowledge%2520into%2520multi-modal%2520representation%2520learning.%2520We%2520first%2520curate%2520an%2520expert%2520corpus%2520of%2520risk-disease%2520correlations%2520via%2520Retrieval-Augmented%2520Generation%2520%2528RAG%2529%2520to%2520refine%2520Clinical%2520ModernBERT%252C%2520embedding%2520diagnostic%2520priors%2520into%2520the%2520text%2520encoder.%2520To%2520bridge%2520th ons.%20We%20propose%20PRIMA%20%28Pre-training%20with%20Risk-integrated%20Image-Metadata%20Alignment%29%2C%20a%20framework%20that%20integrates%20domain-specific%20knowledge%20into%20multi-modal%20representation%20learning.%20We%20first%20curate%20an%20expert%20corpus%20of%20risk-disease%20correlations%20via%20Retrieval-Augmented%20Generation%20%28RAG%29%20to%20refine%20Clinical%20ModernBERT%2C%20embedding%20diagnostic%20priors%20into%20the%20text%20encoder.%20To%20bridge%20the%20modality%20gap%2C%20we%20introduce%20a%20dual-encoder%20pre-training%20strategy%20utilizing%20DINOv3%20and%20our%20refined%20BERT%2C%20optimized%20by%20a%20suite%20of%20four%20complementary%20loss%20functions.%20These%20losses%20are%20designed%20to%20capture%20multi-granular%20semantic%20alignment%20and%20handle%20the%20ambiguity%20of%20clinical%20correlations%20through%20soft%20labels.%20Finally%2C%20we%20leverage%20Qwen-3%20to%20fuse%20these%20aligned%20features%20for%20precise%20disease%20classification.%20Extensive%20experiments%20demonstrate%20that%20PRIMA%20effectively%20harmonizes%20pixel-level%20features%20with%20abstract%20clinical%20expertise%2C%20significantly%20outperforming%20other%20state-of-the-art%20methods.%20Notably%2C%20our%20framework%20achieves%20superior%20robustness%20without%20the%20need%20for%20massive%20data%20collection%20or%20exhaustive%20computational%20resources.%20Our%20code%20will%20be%20made%20public%20upon%20acceptance.&entry.1838667208=http%3A//arxiv.org/abs/2602.23297v1&entry.124074799=Read"},
{"title": "Geometric Autoencoder Priors for Bayesian Inversion: Learn First Observe Later", "author": "Arnaud Vadeboncoeur and Gregory Duth\u00e9 and Mark Girolami and Eleni Chatzi", "abstract": "Uncertainty Quantification (UQ) is paramount for inference in engineering. A common inference task is to recover full-field information of physical systems from a small number of noisy observations, a usually highly ill-posed problem. Sharing information from multiple distinct yet related physical systems can alleviate this ill-possendess. Critically, engineering systems often have complicated variable geometries prohibiting the use of standard multi-system Bayesian UQ. In this work, we introduce Geometric Autoencoders for Bayesian Inversion (GABI), a framework for learning geometry-aware generative models of physical responses that serve as highly informative geometry-conditioned priors for Bayesian inversion. Following a ''learn first, observe later'' paradigm, GABI distills information from large datasets of systems with varying geometries, without requiring knowledge of governing PDEs, boundary conditions, or observation processes, into a rich latent prior. At inference time, this prior is seamlessly combined with the likelihood of a specific observation process, yielding a geometry-adapted posterior distribution. Our proposed framework is architecture agnostic. A creative use of Approximate Bayesian Computation (ABC) sampling yields an efficient implementation that utilizes modern GPU hardware. We test our method on: steady-state heat over rectangular domains; Reynold-Averaged Navier-Stokes (RANS) flow around airfoils; Helmholtz resonance and source localization on 3D car bodies; RANS airflow over terrain. We find: the predictive accuracy to be comparable to deterministic supervised learning approaches in the restricted setting where supervised learning is applicable; UQ to be well calibrated and robust on challenging problems with complex geometries.", "link": "http://arxiv.org/abs/2509.19929v2", "date": "2026-02-26", "relevancy": 2.2207, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5644}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5517}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5408}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Geometric%20Autoencoder%20Priors%20for%20Bayesian%20Inversion%3A%20Learn%20First%20Observe%20Later&body=Title%3A%20Geometric%20Autoencoder%20Priors%20for%20Bayesian%20Inversion%3A%20Learn%20First%20Observe%20Later%0AAuthor%3A%20Arnaud%20Vadeboncoeur%20and%20Gregory%20Duth%C3%A9%20and%20Mark%20Girolami%20and%20Eleni%20Chatzi%0AAbstract%3A%20Uncertainty%20Quantification%20%28UQ%29%20is%20paramount%20for%20inference%20in%20engineering.%20A%20common%20inference%20task%20is%20to%20recover%20full-field%20information%20of%20physical%20systems%20from%20a%20small%20number%20of%20noisy%20observations%2C%20a%20usually%20highly%20ill-posed%20problem.%20Sharing%20information%20from%20multiple%20distinct%20yet%20related%20physical%20systems%20can%20alleviate%20this%20ill-possendess.%20Critically%2C%20engineering%20systems%20often%20have%20complicated%20variable%20geometries%20prohibiting%20the%20use%20of%20standard%20multi-system%20Bayesian%20UQ.%20In%20this%20work%2C%20we%20introduce%20Geometric%20Autoencoders%20for%20Bayesian%20Inversion%20%28GABI%29%2C%20a%20framework%20for%20learning%20geometry-aware%20generative%20models%20of%20physical%20responses%20that%20serve%20as%20highly%20informative%20geometry-conditioned%20priors%20for%20Bayesian%20inversion.%20Following%20a%20%27%27learn%20first%2C%20observe%20later%27%27%20paradigm%2C%20GABI%20distills%20information%20from%20large%20datasets%20of%20systems%20with%20varying%20geometries%2C%20without%20requiring%20knowledge%20of%20governing%20PDEs%2C%20boundary%20conditions%2C%20or%20observation%20processes%2C%20into%20a%20rich%20latent%20prior.%20At%20inference%20time%2C%20this%20prior%20is%20seamlessly%20combined%20with%20the%20likelihood%20of%20a%20specific%20observation%20process%2C%20yielding%20a%20geometry-adapted%20posterior%20distribution.%20Our%20proposed%20framework%20is%20architecture%20agnostic.%20A%20creative%20use%20of%20Approximate%20Bayesian%20Computation%20%28ABC%29%20sampling%20yields%20an%20efficient%20implementation%20that%20utilizes%20modern%20GPU%20hardware.%20We%20test%20our%20method%20on%3A%20steady-state%20heat%20over%20rectangular%20domains%3B%20Reynold-Averaged%20Navier-Stokes%20%28RANS%29%20flow%20around%20airfoils%3B%20Helmholtz%20resonance%20and%20source%20localization%20on%203D%20car%20bodies%3B%20RANS%20airflow%20over%20terrain.%20We%20find%3A%20the%20predictive%20accuracy%20to%20be%20comparable%20to%20deterministic%20supervised%20learning%20approaches%20in%20the%20restricted%20setting%20where%20supervised%20learning%20is%20applicable%3B%20UQ%20to%20be%20well%20calibrated%20and%20robust%20on%20challenging%20problems%20with%20complex%20geometries.%0ALink%3A%20http%3A//arxiv.org/abs/2509.19929v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeometric%2520Autoencoder%2520Priors%2520for%2520Bayesian%2520Inversion%253A%2520Learn%2520First%2520Observe%2520Later%26entry.906535625%3DArnaud%2520Vadeboncoeur%2520and%2520Gregory%2520Duth%25C3%25A9%2520and%2520Mark%2520Girolami%2520and%2520Eleni%2520Chatzi%26entry.1292438233%3DUncertainty%2520Quantification%2520%2528UQ%2529%2520is%2520paramount%2520for%2520inference%2520in%2520engineering.%2520A%2520common%2520inference%2520task%2520is%2520to%2520recover%2520full-field%2520information%2 {"title": "DySL-VLA: Efficient Vision-Language-Action Model Inference via Dynamic-Static Layer-Skipping for Robot Manipulation", "author": "Zebin Yang and Yijiahao Qi and Tong Xie and Bo Yu and Shaoshan Liu and Meng Li", "abstract": "Vision-Language-Action (VLA) models have shown remarkable success in robotic tasks like manipulation by fusing a language model's reasoning with a vision model's 3D understanding. However, their high computational cost remains a major obstacle for real-world applications that require real-time performance. We observe that the actions within a task have varying levels of importance: critical steps demand high precision, while less important ones can tolerate more variance. Leveraging this insight, we propose DySL-VLA, a novel framework that addresses computational cost by dynamically skipping VLA layers based on each action's importance. DySL-VLA categorizes its layers into two types: informative layers, which are consistently executed, and incremental layers, which can be selectively skipped. To intelligently skip layers without sacrificing accuracy, we invent a prior-post skipping guidance mechanism to determine when to initiate layer-skipping. We also propose a skip-aware two-stage knowledge distillation algorithm to efficiently train a standard VLA into a DySL-VLA. Our experiments indicate that DySL-VLA achieves 2.1% improvement in success length over Deer-VLA on the Calvin dataset, while simultaneously reducing trainable parameters by a factor of 85.7 and providing a 3.75x speedup relative to the RoboFlamingo baseline at iso-accuracy. Our code is available on https://github.com/PKU-SEC-Lab/DYSL_VLA.", "link": "http://arxiv.org/abs/2602.22896v1", "date": "2026-02-26", "relevancy": 2.2183, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5623}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.553}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.553}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DySL-VLA%3A%20Efficient%20Vision-Language-Action%20Model%20Inference%20via%20Dynamic-Static%20Layer-Skipping%20for%20Robot%20Manipulation&body=Title%3A%20DySL-VLA%3A%20Efficient%20Vision-Language-Action%20Model%20Inference%20via%20Dynamic-Static%20Layer-Skipping%20for%20Robot%20Manipulation%0AAuthor%3A%20Zebin%20Yang%20and%20Yijiahao%20Qi%20and%20Tong%20Xie%20and%20Bo%20Yu%20and%20Shaoshan%20Liu%20and%20Meng%20Li%0AAbstract%3A%20Vision-Language-Action%20%28VLA%29%20models%20have%20shown%20remarkable%20success%20in%20robotic%20tasks%20like%20manipulation%20by%20fusing%20a%20language%20model%27s%20reasoning%20with%20a%20vision%20model%27s%203D%20understanding.%20However%2C%20their%20high%20computational%20cost%20remains%20a%20major%20obstacle%20for%20real-world%20applications%20that%20require%20real-time%20performance.%20We%20observe%20that%20the%20actions%20within%20a%20task%20have%20varying%20levels%20of%20importance%3A%20critical%20steps%20demand%20high%20precision%2C%20while%20less%20important%20ones%20can%20tolerate%20more%20variance.%20Leveraging%20this%20insight%2C%20we%20propose%20DySL-VLA%2C%20a%20novel%20framework%20that%20addresses%20computational%20cost%20by%20dynamically%20skipping%20VLA%20layers%20based%20on%20each%20action%27s%20importance.%20DySL-VLA%20categorizes%20its%20layers%20into%20two%20types%3A%20informative%20layers%2C%20which%20are%20consistently%20executed%2C%20and%20incremental%20layers%2C%20which%20can%20be%20selectively%20skipped.%20To%20intelligently%20skip%20layers%20without%20sacrificing%20accuracy%2C%20we%20invent%20a%20prior-post%20skipping%20guidance%20mechanism%20to%20determine%20when%20to%20init {"title": "From Calibration to Refinement: Seeking Certainty via Probabilistic Evidence Propagation for Noisy-Label Person Re-Identification", "author": "Xin Yuan and Zhiyong Zhang and Xin Xu and Zheng Wang and Chia-Wen Lin", "abstract": "With the increasing demand for robust person Re-ID in unconstrained environments, learning from datasets with noisy labels and sparse per-identity samples remains a critical challenge. Existing noise-robust person Re-ID methods primarily rely on loss-correction or sample-selection strategies using softmax outputs. However, these methods suffer from two key limitations: 1) Softmax exhibits translation invariance, leading to over-confident and unreliable predictions on corrupted labels. 2) Conventional sample selection based on small-loss criteria often discards valuable hard positives that are crucial for learning discriminative features. To overcome these issues, we propose the CAlibration-to-REfinement (CARE) method, a two-stage framework that seeks certainty through probabilistic evidence propagation from calibration to refinement. In the calibration stage, we propose the probabilistic evidence calibration (PEC) that dismantles softmax translation invariance by injecting adaptive learnable parameters into the similarity function, and employs an evidential calibration loss to mitigate overconfidence on mislabeled samples. In the refinement stage, we design the evidence propagation refinement (EPR) that can more accurately distinguish between clean and noisy samples. Specifically, the EPR contains two steps: Firstly, the composite angular margin (CAM) metric is proposed to precisely distinguish clean but hard-to-learn positive samples from mislabeled ones in a hyperspherical space; Secondly, the certainty-oriented sphere weighting (COSW) is developed to dynamically allocate the importance of samples according to CAM, ensuring clean instances drive model updates. Extensive experimental results on Market1501, DukeMTMC-ReID, and CUHK03 datasets under both random and patterned noises show that CARE achieves competitive performance.", "link": "http://arxiv.org/abs/2602.23133v1", "date": "2026-02-26", "relevancy": 2.2175, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5876}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5777}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5177}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Calibration%20to%20Refinement%3A%20Seeking%20Certainty%20via%20Probabilistic%20Evidence%20Propagation%20for%20Noisy-Label%20Person%20Re-Identification&body=Title%3A%20From%20Calibration%20to%20Refinement%3A%20Seeking%20Certainty%20via%20Probabilistic%20Evidence%20Propagation%20for%20Noisy-Label%20Person%20Re-Identification%0AAuthor%3A%20Xin%20Yuan%20and%20Zhiyong%20Zhang%20and%20Xin%20Xu%20and%20Zheng%20Wang%20and%20Chia-Wen%20Lin%0AAbstract%3A%20With%20the%20increasing%20demand%20for%20robust%20person%20Re-ID%20in%20unconstrained%20environments%2C%20learning%20from%20datasets%20with%20noisy%20labels%20and%20sparse%20per-identity%20samples%20remains%20a%20critical%20challenge.%20Existing%20noise-robust%20person%20Re-ID%20methods%20primarily%20rely%20on%20loss-correction%20or%20sample-selection%20strategies%20using%20softmax%20outputs.%20However%2C%20these%20methods%20suffer%20from%20two%20key%20limitations%3A%201%29%20Softmax%20exhibits%20translation%20invariance%2C%20leading%20to%20over-confident%20and%20unreliable%20predictions%20on%20corrupted%20labels.%202%29%20Conventional%20sample%20selection%20based%20on%20small-loss%20criteria%20often%20discards%20valuable%20hard%20positives%20that%20are%20crucial%20for%20learning%20discriminative%20features.%20To%20overcome%20these%20issues%2C%20we%20propose%20the%20CAlibration-to-REfinement%20%28CARE%29%20method%2C%20a%20two-stage%20framework%20that%20seeks%20certainty%20through%20probabilistic%20evidence%20propagation%20from%20calibration%20to%20refinement.%20In%20the%20calibration%20stage%2C%20we%20propose%20the%20probabilistic%20evidence%20calibration%20%28PEC%29%20that%20dismantles%20softmax%20translation%20invariance%20by%20injecting%20adaptive%20learnable%20parameters%20into%20the%20similarity%20function%2C%20and%20employs%20an%20evidential%20calibration%20loss%20to%20mitigate%20overconfidence%20on%20mislabeled%20samples.%20In%20the%20refinement%20stage%2C%20we%20design%20the%20evidence%20propagation%20refinement%20%28EPR%29%20that%20can%20more%20accurately%20distinguish%20between%20clean%20and%20noisy%20samples.%20Specifically%2C%20the%20EPR%20contains%20two%20steps%3A%20Firstly%2C%20the%20composite%20angular%20margin%20%28CAM%29%20metric%20is%20proposed%20to%20precisely%20distinguish%20clean%20but%20hard-to-learn%20positive%20samples%20from%20mislabeled%20ones%20in%20a%20hyperspherical%20space%3B%20Secondly%2C%20the%20certainty-oriented%20sphere%20weighting%20%28COSW%29%20is%20developed%20to%20dynamically%20allocate%20the%20importance%20of%20samples%20according%20to%20CAM%2C%20ensuring%20clean%20instances%20drive%20model%20updates.%20Extensive%20experimental%20results%20on%20Market1501%2C%20DukeMTMC-ReID%2C%20and%20CUHK03%20datasets%20under%20both%20random%20and%20patterned%20noises%20show%20that%20CARE%20achieves%20competitive%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23133v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Calibration%2520to%2520Refinement%253A%2520Seeking%2520Certainty%2520via%2 {"title": "Spatio-Temporal Token Pruning for Efficient High-Resolution GUI Agents", "author": "Zhou Xu and Bowen Zhou and Qi Wang and Shuwen Feng and Jingyu Xiao", "abstract": "Pure-vision GUI agents provide universal interaction capabilities but suffer from severe efficiency bottlenecks due to the massive spatiotemporal redundancy inherent in high-resolution screenshots and historical trajectories. We identify two critical misalignments in existing compression paradigms: the temporal mismatch, where uniform history encoding diverges from the agent's \"fading memory\" attention pattern, and the spatial topology conflict, where unstructured pruning compromises the grid integrity required for precise coordinate grounding, inducing spatial hallucinations. To address these challenges, we introduce GUIPruner, a training-free framework tailored for high-resolution GUI navigation. It synergizes Temporal-Adaptive Resolution (TAR), which eliminates historical redundancy via decay-based resizing, and Stratified Structure-aware Pruning (SSP), which prioritizes interactive foregrounds and semantic anchors while safeguarding global layout. Extensive evaluations across diverse benchmarks demonstrate that GUIPruner consistently achieves state-of-the-art performance, effectively preventing the collapse observed in large-scale models under high compression. Notably, on Qwen2-VL-2B, our method delivers a 3.4x reduction in FLOPs and a 3.3x speedup in vision encoding latency while retaining over 94% of the original performance, enabling real-time, high-precision navigation with minimal resource consumption.", "link": "http://arxiv.org/abs/2602.23235v1", "date": "2026-02-26", "relevancy": 2.2154, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5855}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5344}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5232}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Spatio-Temporal%20Token%20Pruning%20for%20Efficient%20High-Resolution%20GUI%20Agents&body=Title%3A%20Spatio-Temporal%20Token%20Pruning%20for%20Efficient%20High-Resolution%20GUI%20Agents%0AAuthor%3A%20Zhou%20Xu%20and%20Bowen%20Zhou%20and%20Qi%20Wang%20and%20Shuwen%20Feng%20and%20Jingyu%20Xiao%0AAbstract%3A%20Pure-vision%20GUI%20agents%20provide%20universal%20interaction%20capabilities%20but%20suffer%20from%20severe%20efficiency%20bottlenecks%20due%20to%20the%20massive%20spatiotemporal%20redundancy%20inherent%20in%20high-resolution%20screenshots%20and%20historical%20trajectories.%20We%20identify%20two%20critical%20misalignments%20in%20existing%20compression%20paradigms%3A%20the%20temporal%20mismatch%2C%20where%20uniform%20history%20encoding%20diverges%20from%20the%20agent%27s%20%22fading%20memory%22%20attention%20pattern%2C%20and%20the%20spatial%20topology%20conflict%2C%20where%20unstructured%20pruning%20compromises%20the%20grid%20integrity%20required%20for%20precise%20coordinate%20grounding%2C%20inducing%20spatial%20hallucinations.%20To%20address%20these%20challenges%2C%20we%20introduce%20GUIPruner%2C%20a%20training-free%20framework%20tailored%20for%20high-resolution%20GUI%20navigation.%20It%20synergizes%20Temporal-Adaptive%20Resolution%20%28TAR%29%2C%20which%20eliminates%20historical%20redundancy%20via%20decay-based%20resizing%2C%20and%20Stratified%20Structure-aware%20Pruning%20%28SSP%29%2C%20which%20prioritizes%20interactive%20foregrounds%20and%20semantic%20anchors%20while%20safeguarding%20global%20layout.%20Extensive%20evaluations%20across%20diverse%20benchmarks%20demonstrate%20that%20GUIPruner%20consistently%20achieves%20state-of-the-art%20performance%2C%20effectively%20preventing%20the%20collapse%20observed%20in%20large-scale%20m {"title": "VQ-Style: Disentangling Style and Content in Motion with Residual Quantized Representations", "author": "Fatemeh Zargarbashi and Dhruv Agrawal and Jakob Buhmann and Martin Guay and Stelian Coros and Robert W. Sumner", "abstract": "Human motion data is inherently rich and complex, containing both semantic content and subtle stylistic features that are challenging to model. We propose a novel method for effective disentanglement of the style and content in human motion data to facilitate style transfer. Our approach is guided by the insight that content corresponds to coarse motion attributes while style captures the finer, expressive details. To model this hierarchy, we employ Residual Vector Quantized Variational Autoencoders (RVQ-VAEs) to learn a coarse-to-fine representation of motion. We further enhance the disentanglement by integrating codebook learning with contrastive learning and a novel information leakage loss to organize the content and the style across different codebooks. We harness this disentangled representation using our simple and effective inference-time technique Quantized Code Swapping, which enables motion style transfer without requiring any fine-tuning for unseen styles. Our framework demonstrates strong versatility across multiple inference applications, including style transfer, style removal, and motion blending.", "link": "http://arxiv.org/abs/2602.02334v2", "date": "2026-02-26", "relevancy": 2.214, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5834}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.55}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.545}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VQ-Style%3A%20Disentangling%20Style% {"title": "No Labels, No Look-Ahead: Unsupervised Online Video Stabilization with Classical Priors", "author": "Tao Liu and Gang Wan and Kan Ren and Shibo Wen", "abstract": "We propose a new unsupervised framework for online video stabilization. Unlike methods based on deep learning that require paired stable and unstable datasets, our approach instantiates the classical stabilization pipeline with three stages and incorporates a multithreaded buffering mechanism. This design addresses three longstanding challenges in end-to-end learning: limited data, poor controllability, and inefficiency on hardware with constrained resources. Existing benchmarks focus mainly on handheld videos with a forward view in visible light, which restricts the applicability of stabilization to domains such as UAV nighttime remote sensing. To fill this gap, we introduce a new multimodal UAV aerial video dataset (UAV-Test). Experiments show that our method consistently outperforms state-of-the-art online stabilizers in both quantitative metrics and visual quality, while achieving performance comparable to offline methods.", "link": "http://arxiv.org/abs/2602.23141v1", "date": "2026-02-26", "relevancy": 2.2114, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5924}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.548}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5418}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20No%20Labels%2C%20No%20Look-Ahead%3A%20Unsupervised%20Online%20Video%20Stabilization%20with%20Classical%20Priors&body=Title%3A%20No%20Labels%2C%20No%20Look-Ahead%3A%20Unsupervised%20Online%20Video%20Stabilization%20with%20Classical%20Priors%0AAuthor%3A%20Tao%20Liu%20and%20Gang%20Wan%20and%20Kan%20Ren%20and%20Shibo%20Wen%0AAbstract%3A%20We%20propose%20a%20new%20unsupervised%20framework%20for%20online%20video%20stabilization.%20Unlike%20methods%20based%20on%20deep%20learning%20that%20require%20paired%20stable%20and%20unstable%20datasets%2C%20our%20approach%20instantiates%20the%20classical%20stabilization%20pipeline%20with%20three%20stages%20and%20incorporates%20a%20multithreaded%20buffering%20mechanism.%20This%20design%20addresses%20three%20longstanding%20challenges%20in%20end-to-end%20learning%3A%20limited%20data%2C%20poor%20controllability%2C%20and%20inefficiency%20on%20hardware%20with%20constrained%20resources.%20Existing%20benchmarks%20focus%20mainly%20on%20handheld%20videos%20with%20a%20forward%20view%20in%20visible%20light%2C%20which%20restricts%20the%20applicability%20of%20stabilization%20to%20domains%20such%20as%20UAV%20nighttime%20remote%20sensing.%20To%20fill%20this%20gap%2C%20we%20introduce%20a%20new%20multimodal%20UAV%20aerial%20video%20dataset%20%28UAV-Test%29.%20Experiments%20show%20that%20our%20method%20consistently%20outperforms%20state-of-the-art%20online%20stabilizers%20in%20both%20quantitative%20metrics%20and%20visual%20quality%2C%20while%20achieving%20performance%20comparable%20to%20offline%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23141v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNo%2520Labels%252C%2520No%2520Look-Ahead%253A%2520Unsupervised%2520Online%2520Video%2520Stabilization%2520with%2520Classical%2520Priors%26entry.906535625%3DTao%2520Liu%2520and%2520Gang%2520Wan%2520and%2520Kan%2520Ren%2520and%2520Shibo%2520Wen%26entry.1292438233%3DWe%2520propose%2520a%2520new%2520unsupervised%2520framework%2520for%2520online%2520video%2520stabilization.%2520Unlike%2520methods%2520based%2520on%2520deep%2520learning%2520that%2520require%2520paired%2520stable%2520and {"title": "The Trinity of Consistency as a Defining Principle for General World Models", "author": "Jingxuan Wei and Siyuan Li and Yuhang Xu and Zheng Sun and Junjie Jiang and Hexuan Jin and Caijun Jia and Honghao He and Xinglong Xu and Xi bai and Chang Yu and Yumou Liu and Junnan Zhu and Xuanhe Zhou and Jintao Chen and Xiaobin Hu and Shancheng Pang and Bihui Yu and Ran He and Zhen Lei and Stan Z. Li and Conghui He and Shuicheng Yan and Cheng Tan", "abstract": "The construction of World Models capable of learning, simulating, and reasoning about objective physical laws constitutes a foundational challenge in the pursuit of Artificial General Intelligence. Recent advancements represented by video generation models like Sora have demonstrated the potential of data-driven scaling laws to approximate physical dynamics, while the emerging Unified Multimodal Model (UMM) offers a promising architectural paradigm for integrating perception, language, and reasoning. Despite these advances, the field still lacks a principled theoretical framework that defines the essential properties requisite for a General World Model. In this paper, we propose that a World Model must be grounded in the Trinity of Consistency: Modal Consistency as the semantic interface, Spatial Consistency as the geometric basis, and Temporal Consistency as the causal engine. Through this tripartite lens, we systematically review the evolution of multimodal learning, revealing a trajectory from loosely coupled specialized modules toward unified architectures that enable the synergistic emergence of internal world simulators. To complement this conceptual framework, we introduce CoW-Bench, a benchmark centered on multi-frame reasoning and generation scenarios. CoW-Bench evaluates both video generation models and UMMs under a unified evaluation protocol. Our work establishes a principled pathway toward general world models, clarifying both the limitations of current systems and the architectural requirements {"title": "Compositional-ARC: Assessing Systematic Generalization in Abstract Spatial Reasoning", "author": "Philipp Mondorf and Shijia Zhou and Monica Riedler and Barbara Plank", "abstract": "Systematic generalization refers to the capacity to understand and generate novel combinations from known components. Despite recent progress by large language models (LLMs) across various domains, these models often fail to extend their knowledge to novel compositional scenarios, revealing notable limitations in systematic generalization. There has been an ongoing debate about whether neural networks possess the capacity for systematic generalization, with recent studies suggesting that meta-learning approaches designed for compositionality can significantly enhance this ability. However, these insights have largely been confined to linguistic problems, leaving their applicability to other tasks an open question. In this study, we extend meta-learning for compositionality to the domain of abstract spatial reasoning. To this end, we introduce $\\textit{Compositional-ARC}\\unicode{x2014}$a dataset designed to evaluate the capacity of models to systematically generalize from known geometric transformations (e.g., translation, rotation) of abstract two-dimensional objects to novel combinations of these transformations (e.g., translation+rotation). Our results show that a small transformer-based encoder-decoder model, trained via meta-learning for compositionality, can systematically generalize to previously unseen transformation compositions. Notably, despite having only 5.7M parameters, this model significantly outperforms state-of-the-art LLMs$\\unicode{x2014}$including o3-mini, GPT-4o, and Gemini 2.0 Flash, which fail to exhibit similar systematic behavior$\\unicode{x2014}$and performs on par with the winning model of the ARC prize 2024, an 8B-parameter LLM trained via test-time training. Our findings highlight the effectiveness of meta-learning in promoting systematicity beyond linguistic tasks, suggesting a promising direction toward more robust and generalizable models.", "link": "http://arxiv.org/abs/2504.01445v3", "date": "2026-02-26", "relevancy": 2.2034, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5719}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5502}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5431}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Compositional-ARC%3A%20Assessing%20Systematic%20Generalization%20in%20Abstract%20Spatial%20Reasoning&body=Title%3A%20Compositional-ARC%3A%20Assessing%20Systematic%20Generalization%20in%20Abstract%20Spatial%20Reasoning%0AAuthor%3A%20Philipp%20Mondorf%20and%20Shijia%20Zhou%20and%20Monica%20Riedler%20and%20Barbara%20Plank%0AAbstract%3A%20Systematic%20generalization%20refers%20to%20the%20capacity%20to%20understand%20and%20generate%20novel%20combinations%20from%20known%20components.%20Despite%20recent%20progress%20by%20large%20language%20models%20%28LLMs%29%20across%20various%20domains%2C%20these%20models%20often%20fail%20to%20extend%20their%20knowledge%20to%20novel%20compositional%20scenarios%2C%20revealing%20notable%20limitations%20in%20systematic%20generalization.%20There%20has%20been%20an%20ongoing%20debate%20about%20whether%20neural%20networks%20possess%20the%20capacity%20for%20systematic%20generalization%2C%20with%20recent%20studies%20suggesting%20that%20meta-learning%20approaches%20designed%20for%20compositionality%20can%20significantly%20enhance%20this%20ability.%20However%2C%20these%20insights%20have%20largely%20been%20confined%20to%20linguistic%20problems%2C%20leaving%20their%20applicability%20to%20other%20tasks%20an%20open%20question.%20In%20this%20study%2C%20we%20extend%20meta-learning%20for%20compositionality%20to%20the%20domain%20of%20abstract%20spatial%20reasoning.%20To%20this%20end%2C%20we%20introduce%20%24%5Ctextit%7BCompositional-ARC%7D%5Cunicode%7Bx2014%7D%24a%20dataset%20designed%20to%20evaluate%20the%20capacity%20of%20models%20to%20systematically%20generalize%20from%20known%20geometric%20transformations%20%28e.g.%2C%20translation%2C%20rotation%29%20of%20abstract%20two-dimensional%20objects%20to%20novel%20combinations%20of%20these%20transformations%20%28e.g.%2C%20translation%2Brotation%29.%20Our%20results%20show%20that%20a%20small%20transformer-based%20encoder-decoder%20model%2C%20trained%20via%20meta-learning%20for%20compositionality%2C%20can%20systematically%20generalize%20to%20previously%20unseen%20transformation%20compositions.%20Notably%2C%20despite%20having%20only%205.7M%20parameters%2C%20this%20model%20significantly%20outperforms%20state-of-the-art%20LLMs%24%5Cunicode%7Bx2014%7D%24including%20o3-mini%2C%20GPT-4o%2C%20and%20Gemini%202.0%20Flash%2C%20which%20fail%20to%20exhibit%20similar%20systematic%20behavior%24%5Cunicode%7Bx2014%7D%24and%20performs%20on%20par%20with%20the%20winning%20model%20of%20the%20ARC%20prize%202024%2C%20an%208B-parameter%20LLM%20trained%20via%20test-time%20training.%20Our%20findings%20highlight%20the%20effectiveness%20of%20meta-learning%20in%20promoting%20systematicity%20beyond%20linguistic%20tasks%2C%20suggesting%20a%20promising%20direction%20toward%20more%20robust%20and%20generalizable%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2504.01445v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCompositional-ARC%253A%2520Assessing%2520Systematic%2520Generalization%2520in%2520Abstract%2520Spatial%2520Reasoning%26entry.906535625%3DPhilipp%2520Mondorf%2520and%2520Shijia%2520Zhou%2520and%2520Monica%2520Riedler%2520and%2520Barbara%2520Plank%26entry.1292438233%3DSystematic%2520generalizatio {"title": "Understanding protein function with a multimodal retrieval-augmented foundation model", "author": "Timothy Fei Truong and Tristan Bepler", "abstract": "Protein language models (PLMs) learn probability distributions over natural protein sequences. By learning from hundreds of millions of natural protein sequences, protein understanding and design capabilities emerge. Recent works have shown that scaling these models improves structure prediction, but does not seem to improve mutation understanding and representation quality for protein function prediction. We introduce PoET-2, a multimodal, retrieval-augmented protein foundation model that incorporates in-context learning of family-specific evolutionary constraints with optional structure conditioning to learn generative distributions over protein sequences. PoET-2 uses a hierarchical transformer encoder that is equivariant to sequence context ordering and a dual decoder architecture with both causal and masked language modeling objectives, allowing PoET-2 to operate in both fully generative and bidirectional representation learning modes. PoET-2 achieves state-of-the-art performance on zero-shot variant effect prediction, excelling at scoring variants with multiple mutations and challenging indel mutations. In supervised settings, PoET-2 embeddings outperform previous methods for learning sequence-function relationships, especially with small datasets. This work highlights the benefits of combining retrieval augmentation with multimodal, family-centric modeling for advancing protein foundation models.", "link": "http://arxiv.org/abs/2508.04724v2", "date": "2026-02-26", "relevancy": 2.2025, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5573}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5573}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5173}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Understanding%20protein%20function%20with%20a%20multimodal%20retrieval-augmented%20foundation%20model&body=Title%3A%20Understanding%20protein%20function%20with%20a%20multimodal%20retrieval-augmented%20foundation%20model%0AAuthor%3A%20Timothy%20Fei%20Truong%20and%20Tristan%20Bepler%0AAbstract%3A%20Protein%20language%20models%20%28PLMs%29%20learn%20probability%20distributions%20over%20natural%20protein%20sequences.%20By%20learning%20from%20hundreds%20of%20millions%20of%20natural%20protein%20sequences%2C%20protein%20understanding%20and%20design%20capabilities%20emerge.%20Recent%20works%20have%20shown%20that%20scaling%20these%20models%20improves%20structure%20prediction%2C%20but%20does%20not%20seem%20to%20improve%20mutation%20understanding%20and%20representation%20quality%20for%20protein%20function%20prediction.%20We%20introduce%20PoET-2%2C%20a%20multimodal%2C%20retrieval-augmented%20protein%20foundation%20model%20that%20incorporates%20in-context%20learning%20of%20family-specific%20evolutionary%20constraints%20with%20optional%20structure%20conditioning%20to%20learn%20generative%20distributions%20over%20protein%20sequences.%20PoET-2%20uses%20a%20hierarchical%20transformer%20encoder%20that%20is%20equivariant%20to%20sequence%20context%20ordering%20and%20a%20dual%20decoder%20architecture%20with%20both%20causal%20and%20masked%20language%20modeling%20objectives%2C%20allowing%20PoET-2%20to%20operate%20in%20both%20fully%20generative%20and%20bidirectional%20representation%20learning%20modes.%20PoET-2%20achieves%20state-of-the-art%20performance%20on%20zero-shot%20variant%20effect%20prediction%2C%20excelling%20at%20scoring%20variants%20with%20multiple%20mutations%20and%20challenging%20indel%20mutations.%20In%20supervised%20settings%2C%20PoET-2%20embeddings%20outperform%20previous%20methods%20for%20learning%20sequence-function%20relationships%2C%20especially%20with%20small%20datasets.%20This%20work%20highlights%20the%20benefits%20of%20combining%20retrieval%20augmentation%20with%20multimodal%2C%20family-centric%20modeling%20for%20advancing%20protein%20foundation%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2508.04724v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnderstanding%2520protein%2520function%2520with%2520a%2520multimodal%2520retrieval-augmented%2520foundation%2520model%26entry.906535625%3DTimothy%2520Fei%2520Truong%2520and%2520Tristan%2520Bepler%26entry.1292438233%3DProtein%2520language%2520models%2520%2528PLMs%2529%2520learn%2520probability%2520distributions%2520over%2520natural%2520protein%2520sequences.%2520By%2520learning%2520from%2520hundreds%2520of%2520millions%2520of%2520natural%2520protein%2520sequences%252C%2520protein%2520understanding%2520and%2520design%2520capabilities%2520emerge.%2520Recent%2520works%2520have%2520shown%2520that%2520scaling%2520these%2520models%2520improves%2520structure%2520prediction%252C%2520but%2520does%2520not%2520seem%2520to%2520improve%2520mutation%2520understanding%2520and%2520representation%2520quality%2520for%2520protein%2520function%2520prediction.%2520We%2520introduce%2520PoET-2%252C%2520a%2520multimodal%252C%2520retrieval-augmented%2520protein%2520foundation%2520model%2520that%2520incorporates%2520in-context%2520learning%2520of%2520family-specific%2520evolutionary%2520constraints%2520with%2520optional%2520structure%2520conditioning%2520to%2520learn%2520generative%2520distributions%2520over%2520protein%2520sequences.%2520PoET-2%2520uses%2520a%2520hierarchical%2520transformer%2520encoder%2520that%2520is%2520equivariant%2520to%2520sequence%2520context%2520ordering%2520and%2520a%2520dual%2520decoder%2520architecture%2520with%2520both%2520cau {"title": "Abstracted Gaussian Prototypes for True One-Shot Concept Learning", "author": "Chelsea Zou and Kenneth J. Kurtz", "abstract": "We introduce a cluster-based generative image segmentation framework to encode higher-level representations of visual concepts based on one-shot learning inspired by the Omniglot Challenge. The inferred parameters of each component of a Gaussian Mixture Model (GMM) represent a distinct topological subpart of a visual concept. Sampling new data from these parameters generates augmented subparts to build a more robust prototype for each concept, i.e., the Abstracted Gaussian Prototype (AGP). This framework addresses one-shot classification tasks using a cognitively-inspired similarity metric and addresses one-shot generative tasks through a novel AGP-VAE pipeline employing variational autoencoders (VAEs) to generate new class variants. Results from human judges reveal that the generative pipeline produces novel examples and classes of visual concepts that are broadly indistinguishable from those made by humans. The proposed framework leads to impressive, but not state-of-the-art, classification accuracy; thus, the contribution is two-fold: 1) the system is low in theoretical and computational complexity yet achieves the standard of 'true' one-shot learning by operating in a fully standalone manner unlike existing approaches that draw heavily on pre-training or knowledge engineering; and 2) in contrast with existing neural network approaches, the AGP approach addresses the importance of broad task capability emphasized in the Omniglot challenge (successful performance on classification and generative tasks). These two points are critical in advancing our understanding of how learning and reasoning systems can produce viable, robust, and flexible concepts based on literally no more than a single example.", "link": "http://arxiv.org/abs/2408.17251v2", "date": "2026-02-26", "relevancy": 2.2015, "topK": [{"title": "Thinking Outside the B %2520concepts%2520based%2520on%2520literally%2520no%2520more%2520than%2520a%2520single%2520example.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2408.17251v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Abstracted%20Gaussian%20Prototypes%20for%20True%20One-Shot%20Concept%20Learning&entry.906535625=Chelsea%20Zou%20and%20Kenneth%20J.%20Kurtz&entry.1292438233=We%20introduce%20a%20cluster-based%20generative%20image%20segmentation%20framework%20to%20encode%20higher-level%20representations%20of%20visual%20concepts%20based%20on%20one-shot%20learning%20inspired%20by%20the%20Omniglot%20Challenge.%20The%20inferred%20parameters%20of%20each%20component%20of%20a%20Gaussian%20Mixture%20Model%20%28GMM%29%20represent%20a%20distinct%20topological%20subpart%20of%20a%20visual%20concept.%20Sampling%20new%20data%20from%20these%20parameters%20generates%20augmented%20subparts%20to%20build%20a%20more%20robust%20prototype%20for%20each%20concept%2C%20i.e.%2C%20the%20Abstracted%20Gaussian%20Prototype%20%28AGP%29.%20This%20framework%20addresses%20one-shot%20classification%20tasks%20using%20a%20cognitively-inspired%20similarity%20metric%20and%20addresses%20one-shot%20generative%20tasks%20through%20a%20novel%20AGP-VAE%20pipeline%20employing%20variational%20autoencoders%20%28VAEs%29%20to%20generate%20new%20class%20variants.%20Results%20from%20human%20judges%20reveal%20that%20the%20generative%20pipeline%20produces%20novel%20examples%20and%20classes%20of%20visual%20concepts%20that%20are%20broadly%20indistinguishable%20from%20those%20made%20by%20humans.%20The%20proposed%20framework%20leads%20to%20impressive%2C%20but%20not%20state-of-the-art%2C%20classification%20accuracy%3B%20thus%2C%20the%20contribution%20is%20two-fold%3A%201%29%20the%20system%20is%20low%20in%20theoretical%20and%20computational%20complexity%20yet%20achieves%20the%20standard%20of%20%27true%27%20one-shot%20learning%20by%20oper {"title": "Benchmarking Video Foundation Models for Remote Parkinson's Disease Screening", "author": "Md Saiful Islam and Ekram Hossain and Abdelrahman Abdelkader and Tariq Adnan and Fazla Rabbi Mashrur and Sooyong Park and Praveen Kumar and Qasim Sudais and Natalia Chunga and Nami Shah and Jan Freyberg and Christopher Kanan and Ruth Schneider and Ehsan Hoque", "abstract": "Video-based assessments offer a scalable pathway for remote Parkinson's disease (PD) screening. While traditional approaches rely on handcrafted features mimicking clinical scales, recent advances in video foundation models (VFMs) enable representation learning without task-specific customization. However, the comparative effectiveness of different VFM architectures across diverse clinical tasks remains poorly understood. We present a large-scale systematic study using a novel video dataset from 1,888 participants (727 with PD), comprising 32,847 videos across 16 standardized clinical tasks. We evaluate seven state-of-the-art VFMs -- including VideoPrism, V-JEPA, ViViT, and VideoMAE -- to determine their robustness in clinical screening. By evaluating frozen embeddings with a linear classification head, we demonstrate that task saliency is highly model-dependent: VideoPrism excels in capturing visual speech kinematics (no audio) and facial expressivity, while V-JEPA proves superior for upper-limb motor tasks. Notably, TimeSformer remains highly competitive for rhythmic tasks like finger tapping. Our experiments yield AUCs of 76.4 - 85.3% and accuracies of 71.5 - 80.6%. While high specificity (up to 90.3%) suggests strong potential for ruling out healthy individuals, the lower sensitivity (43.2 - 57.3%) highlights the need for task-aware calibration and integration of multiple tasks and modalities. Overall, this work establishes a rigorous baseline for VFM-based PD screening and provides a roadmap for selecting suitable tasks and architectures in remote neurological monitoring. Code and anonymized structured data are publicly available: https://anonymous.4open.science/r/parkinson\\_video\\_benchmarking-A2C5", "link": "http://arxiv.org/abs/2602.13507v2", "date": "2026-02-26", "relevancy": 2.1902, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5489}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5489}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5408}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Benchmarking%20Video%20Foundation%20Models%20for%20Remote%20Parkinson%27s%20Disease%20Screening&body=Title%3A%20Benchmarking%20Video%20Foundation%20Models%20for%20Remote%20Parkinson%27s%20Disease%20Screening%0AAuthor%3A%20Md%20Saiful%20Islam%20and%20Ekram%20Hossain%20and%20Abdelrahman%20Abdelkader%20and%20Tariq%20Adnan%20and%20Fazla%20Rabbi%20Mashrur%20and%20Sooyong%20Park%20and%20Praveen%20Kumar%20and%20Qasim%20Sudais%20and%20Natalia%20Chunga%20and%20Nami%20Shah%20and%20Jan%20Freyberg%20and%20Christopher%20Kanan%20and%20Ruth%20Schneider%20and%20Ehsan%20Hoque%0AAbstract%3A%20Video-based%20assessments%20offer%20a%20scalable%20pathway%20for%20remote%20Parkinson%27s%20disease%20%28PD%29%20screening.%20While%20traditional%20approaches%20rely%20on%20handcrafted%20features%20mimicking%20clinical%20scales%2C%20recent%20advances%20in%20video%20foundation%20models%20%28VFMs%29%20enable%20representation%20learning%20without%20task-specific%20customization.%20However%2C%20the%20comparative%20effectiveness%20of%20different%20VFM%20architectures%20across%20diverse%20clinical%20tasks%20remains%20poorly%20understood.%20We%20present%20a%20large-scale%20systematic%20study%20using%20a%20novel%20video%20dataset%20from%201%2C888%20participants%20%28727%20with%20PD%29%2C%20comprising%2032%2C847%20videos%20across%2016%20standardized%20clinical%20tasks.%20We%20evaluate%20seven%20state-of-the-art%20VFMs%20--%20including%20VideoPrism%2C%20V-JEPA%2C%20ViViT%2C%20and%20VideoMAE%20--%20to%20determine%20their%20robustness%20in%20clinical%20screening.%20By%20evaluating%20frozen%20embeddings%20with%20a%20linear%20classification%20head%2C%20we%20demonstrate%20that%20task%20saliency%20is%20highly%20model-dependent%3A%20VideoPrism%20excels%20in%20capturing%20visual%20speech%20kinematics%20%28no%20audio%29%20and%20facial%20expressivity%2C%20while%20V-JEPA%20proves%20superior%20for%20upper-limb%20motor%20tasks.%20Notably%2C%20TimeSformer%20remains%20highly%20competitive%20for%20rhythmic%20tasks%20like%20finger%20tapping.%20Our%20experiments%20yield%20AUCs%20of%2076.4%20-%2085.3%25%20and%20accuracies%20of%2071.5%20-%2080.6%25.%20While%20high%20specificity%20%28up%20to%2090.3%25%29%20suggests%20strong%20potential%20for%20ruling%20out%20healthy%20individuals%2C%20the%20lower%20sensitivity%20%2843.2%20-%2057.3%25%29%20highlights%20the%20need%20for%20task-aware%20calibration%20and%20integration%20of%20multiple%20tasks%20and%20modalities.%20Overall%2C%20this%20work%20establishes%20a%20rigorous%20baseline%20for%20VFM-based%20PD%20screening%20and%20provides%20a%20roadmap%20for%20selecting%20suitable%20tasks%20and%20architectures%20in%20remote%20neurological%20monitoring.%20Code%20and%20anonymized%20structured%20data%20are%20publicly%20available%3A%20https%3A//anonymous.4open.science/r/parkinson%5C_video%5C_benchmarking-A2C5%0ALink%3A%20http%3A//arxiv.org/abs/2602.13507v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBenchmarking%2520Video%2520Foundation%2520Models%2520for%2520Remote%2520Parkinson%2527s%2520Disease%2520Screening%26entry.906535625%3DMd%2520Saiful%2520Islam%2520and%2520Ekram%2520Hossain%2 {"title": "Throwing Vines at the Wall: Structure Learning via Random Search", "author": "Thibault Vatter and Thomas Nagler", "abstract": "Vine copulas offer flexible multivariate dependence modeling and have become widely used in machine learning. Yet, structure learning remains a key challenge. Early heuristics, such as Dissmann's greedy algorithm, are still considered the gold standard but are often suboptimal. We propose random search algorithms and a statistical framework based on model confidence sets, to improve structure selection, provide theoretical guarantees on selection probabilities, and serve as a foundation for ensembling. Empirical results on real-world data sets show that our methods consistently outperform state-of-the-art approaches.", "link": "http://arxiv.org/abs/2510.20035v2", "date": "2026-02-26", "relevancy": 2.1862, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4381}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4381}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4356}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Throwing%20Vines%20at%20the%20Wall%3A%20Structure%20Learning%20via%20Random%20Search&body=Title%3A%20Throwing%20Vines%20at%20the%20Wall%3A%20Structure%20Learning%20via%20Random%20Search%0AAuthor%3A%20Thibault%20Vatter%20and%20Thomas%20Nagler%0AAbstract%3A%20Vine%20copulas%20offer%20flexible%20multivariate%20dependence%20modeling%20and%20have%20become%20widely%20used%20in%20machine%20learning.%20Yet%2C%20structure%20learning%20remains%20a%20key%20challenge.%20Early%20heuristics%2C%20such%20as%20Dissmann%27s%20greedy%20algorithm%2C%20are%20still%20considered%20the%20gold%20standard%20but%20are%20often%20suboptimal.%20We%20propose%20random%20search%20algorithms%20and%20a%20statistical%20framework%20based%20on%20model%20confidence%20sets%2C%20to%20improve%20structure%20selection%2C%20provide%20theoretical%20guarantees%20on%20selection%20probabilities%2C%20and%20serve%20as%20a%20foundation%20for%20ensembling.%20Empirical%20results%20on%20real-world%20data%20sets%20show%20that%20our%20methods%20consistently%20outperform%20state-of-the-art%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2510.20035v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThrowing%2520Vines%2520at%2520the%2520Wall%253A%2520Structure%2520Learning%2520via%2520Random%2520Search%26entry.906535625%3DThibault%2520Vatter%2520and%2520Thomas%2520Nagler%26entry.1292438233%3DVine%2520copulas%2520offer%2520flexible%2520multivariate%2520dependence%2520modeling%2520and%2520have%2520become%2520widely%2520used%2520in%2520machine%2520learning.%2520Yet%252C%2520structure%2520learning%2520remains%2520a%2520key%2520challenge.%2520Early%2520heuristics%252C%2520such%2520as%2520Dissmann%2527s%2520greedy%2520algorithm%252C%2520are%2520still%2520considered%2520the%2520gold%2520standard%2520but%2520are%2520often%2520suboptimal.%2520We%2520propose%2520random%2520search%2520algorithms%2520and%2520a%2520statistical%2520framework%2520based%2520on%2520model%2520confidence%2520sets%252C%2520to%2520improve%2520structure%2520selection%252C%2520provide%2520theoretical%2520guarantees%2520on%2520selection%2520probabilities%252C%2520and%2520serve%2520as%2520a%2520foundation%2520for%2520ensembling.%2520Empirical%2520results%2520on%2520real-world%2520data%2520sets%2520show%2520that%2520our%2520methods%2520consistently%2520outperform%2520state-of-the-art%2520approaches.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.20035v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.13 {"title": "Agentic Framework for Epidemiological Modeling", "author": "Rituparna Datta and Zihan Guan and Baltazar Espinoza and Yiqi Su and Priya Pitre and Srini Venkatramanan and Naren Ramakrishnan and Anil Vullikanti", "abstract": "Epidemic modeling is essential for public health planning, yet traditional approaches rely on fixed model classes that require manual redesign as pathogens, policies, and scenario assumptions evolve. We introduce EPIAGENT, an agentic framework that automatically synthesizes, calibrates, verifies, and refines epidemiological simulators by modeling disease progression as an iterative program synthesis problem. A central design choice is an explicit epidemiological flow graph intermediate representation that links scenario specifications to model structure and enables strong, modular correctness checks before code is generated. Verified flow graphs are then compiled into mechanistic models supporting interpretable parameter learning under physical and epidemiological constraints. Evaluation on epidemiological scenario case studies demonstrates that EPIAGENT captures complex growth dynamics and produces epidemiologically consistent counterfactual projections across varying vaccination and immune escape assumptions. Our results show that the agentic feedback loop prevents degeneration and significantly accelerates convergence toward valid models by mimicking professional expert workflows.", "link": "http://arxiv.org/abs/2602.00299v2", "date": "2026-02-26", "relevancy": 2.1817, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4493}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4316}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4282}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Agentic%20Framework%20for%20Epidemiological%20Modeling&body=Title%3A%20Agentic%20Framework%20for%20Epidemiological%20Modeling%0AAuthor%3A%20Rituparna%20Datta%20and%20Zihan%20Guan%20and%20Baltazar%20Espinoza%20and%20Yiqi%20Su%20and%20Priya%20Pitre%20and%20Srini%20Venkatramanan%20and%20Naren%20Ramakrishnan%20and%20Anil%20Vullikanti%0AAbstract%3A%20Epidemic%20modeling%20is%20essential%20for%20public%20health%20planning%2C%20yet%20traditional%20approaches%20rely%20on%20fixed%20model%20classes%20that%20require%20manual%20redesign%20as%20pathogens%2C%20policies%2C%20and%20scenario%20assumptions%20evolve.%20We%20introduce%20EPIAGENT%2C%20an%20agentic%20framework%20that%20automatically%20synthesizes%2C%20calibrates%2C%20verifies%2C%20and%20refines%20epidemiological%20simulators%20by%20modeling%20disease%20progression%20as%20an%20iterative%20program%20synthesis%20problem.%20A%20central%20design%20choice%20is%20an%20explicit%20epidemiological%20flow%20graph%20intermediate%20representation%20that%20links%20scenario%20specifications%20to%20model%20structure%20and%20enables%20strong%2C%20modular%20correctness%20checks%20before%20code%20is%20generated.%20Verified%20flow%20graphs%20are%20then%20compiled%20into%20mechanistic%20models%20supporting%20interpretable%20parameter%20learning%20under%20physical%20and%20epidemiological%20constraints.%20Evaluation%20on%20epidemiological%20scenario%20case%20studies%20demonstrates%20that%20EPIAGENT%20captures%20complex%20growth%20dynamics%20and%20produces%20epidemiologically%20consistent%20counterfactual%20projections%20across%20varying%20vaccination%20and%20immune%20escape%20assumptions.%20Our%20results%20show%20that%20the%20agentic%20feedback%20loop%20prevents%20degeneration%20and%20significantly%20accelerates%20convergence%20toward%20valid%20models%20by%20mimicking%20professional%20expert%20workflows.%0ALink%3A%20http%3A//arxiv.org/abs/2602.00299v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9Bu

{"title": "Global graph features unveiled by unsupervised geometric deep learning", "author": "Mirja Granfors and Jes\u00fas Pineda and Blanca Zufiria Gerbol\u00e9s and Joana B. Pereira and Carlo Manzo and Giovanni Volpe", "abstract": "Graphs provide a powerful framework for modeling complex systems, but their structural variability poses significant challenges for analysis and classification. To address these challenges, we introduce GAUDI (Graph Autoencoder Uncovering Descriptive Information), a novel unsupervised geometric deep learning framework designed to capture both local details and global structure. GAUDI employs an innovative hourglass architecture with hierarchical pooling and upsampling layers linked through skip connections, which preserve essential connectivity information throughout the encoding-decoding process. Even though identical or highly similar underlying parameters describing a system's state can lead to significant variability in graph realizations, GAUDI consistently maps them into nearby regions of a structured and continuous latent space, effectively disentangling invariant process-level features from stochastic noise. We demonstrate GAUDI's versatility across multiple applications, including small-world networks modeling, characterization of protein assemblies from super-resolution microscopy, analysis of collective motion in the Vicsek model, and identification of age-related changes in brain connectivity. Comparison with related approaches highlights GAUDI's superior performance in analyzing complex graphs, providing new insights into emergent phenomena across diverse scientific domains.", "link": "http://arxiv.org/abs/2503.05560v3", "date": "2026-02-26", "relevancy": 2.7682, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5604}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5543}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5463}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Global%20graph%20features%20unveiled%20by%20unsupervised%20geometric%20deep%20learning&body=Title%3A%20Global%20graph%20features%20unveiled%20by%20unsupervised%20geometric%20deep%20learning%0AAuthor%3A%20Mirja%20Granfors%20and%20Jes%C3%BAs%20Pineda%20and%20Blanca%20Zufiria%20Gerbol%C3%A9s%20and%20Joana%20B.%20Pereira%20and%20Carlo%20Manzo%20and%20Giovanni%20Volpe%0AAbstract%3A%20Graphs%20provide%20a%20powerful%20framework%20for%20modeling%20complex%20systems%2C%20but%20their%20structural%20variability%20poses%20significant%20challenges%20for%20analysis%20and%20classification.%20To%20address%20these%20challenges%2C%20we%20introduce%20GAUDI%20%28Graph%20Autoencoder%20Uncovering%20Descriptive%20Information%29%2C%20a%20novel%20unsupervised%20geometric%20deep%20learning%20framework%20designed%20to%20capture%20both%20local%20details%20and%20global%20structure.%20GAUDI%20employs%20an%20innovative%20hourglass%20architecture%20with%20hierarchical%20pooling%20and%20upsampling%20layers%20linked%20through%20skip%20connections%2C%20which%20preserve%20essential%20connectivity%20information%20throughout%20the%20encoding-decoding%20process.%20Even%20though%20identical%20or%20highly%20similar%20underlying%20parameters%20describing%20a%20system%27s%20state%20can%20lead%20to%20significant%20variability%20in%20graph%20realizations%2C%20GAUDI%20consistently%20maps%20them%20into%20nearby%20regions%20of%20a%20structured%20and%20continuous%20latent%20space%2C%20effectively%20disentangling%20invariant%20process-level%20features%20from%20stochastic%20noise.%20We%20demonstrate%20GAUDI%27s%20versatility%20across%20multiple%20applications%2C%20including%20small-world%20networks%20modeling%2C%20characterization%20of%20protein%20assemblies%20from%20super-resolution%20microscopy%2C%20analysis%20of%20collective%20motion%20in%20the%20Vicsek%20model%2C%20and%20identification%20of%20age-related%20changes%20in%20brain%20connectivity.%20Comparison%20with%20related%20approaches%20highlights%20GAUDI%27s%20superior%20performance%20in%20analyzing%20complex%20graphs%2C%20providing%20new%20insights%20into%20emergent%20phenomena%20across%20diverse%20scientific%20domains.%0ALink%3A%20http%3A//arxiv.org/abs/2503.05560v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGlobal%2520graph%2520features%2520unveiled%2520by%2520unsupervised%2520geometric%2520deep%2520learning%26entry.906535625%3DMirja%2520Granfors%2520and%2520Jes%25C3%25BAs%2520Pineda%2520and%2520Blanca%2520Zufiria%2520Gerbol%25C3%25A9s%2520and%2520Joana%2520B.%2520Pereira%2520and%2520Carlo%2520Manzo%2520and%2520Giovanni%2520Volpe%26entry.1292438233%3DGraphs%2520provide%2520a%2520powerful%2520framework%2520for%2520modeling%2520complex%2520systems%252C%2520but%2520their%2520structural%2520variability%2520poses%2520significant%2520challenges%2520for%2520analysis%2520and%2520classification.%2520To%2520address%2520these%2520challenges%252C%2520we%2520introduce%2520GAUDI%2520%2528Graph%2520Autoencoder%2520Uncovering%2520Descriptive%2520Information%2529%252C%2520a%2520novel%2520unsupervised%2520geometric%2520deep%2520learning%2520framework%2520designed%2520to%2520capture%2520both%2520local%2520details%2520and%2520global%2520structure.%2520GAUDI%2520employs%2520an%2520innovative%2520hourglass%2520architecture%2520with%2520hierarchical%2520pooling%2520and%2520upsampling%2520layers%2520linked%2520through%2520skip%2520connections%252C%2520which%2520preserve%2520essential%2520connectivity%2520information%2520throughout%2520the%2520encoding-decoding%2520process.%2520Even%2520though%2520identical%2520or%2520highly%2520similar%2520underlying%2520parameters%2520describing%2520a%2520system%2527s%2520state%2520can {"title": "WARM-CAT: : Warm-Started Test-Time Comprehensive Knowledge Accumulation for Compositional Zero-Shot Learning", "author": "Xudong Yan and Songhe Feng and Jiaxin Wang and Xin Su and Yi Jin", "abstract": "Compositional Zero-Shot Learning (CZSL) aims to recognize novel attribute-object compositions based on the knowledge learned from seen ones. Existing methods suffer from performance degradation caused by the distribution shift of label space at test time, which stems from the inclusion of unseen compositions recombined from attributes and objects. To overcome the challenge, we propose a novel approach that accumulates comprehensive knowledge in both textual and visual modalities from unsupervised data to update multimodal prototypes at test time. Building on this, we further design an adaptive update weight to control the degree of prototype adjustment, enabling the model to flexibly adapt to distribution shift during testing. Moreover, a dynamic priority queue is introduced that stores high-confidence images to acquire visual prototypes from historical images for inference. Since the model tends to favor compositions already stored in the queue during testing, we warm-start the queue by initializing it with training images for visual prototypes of seen compositions and generating unseen visual prototypes using the mapping learned between seen and unseen textual prototypes. Considering the semantic consistency of multimodal knowledge, we align textual and visual prototypes by multimodal collaborative representation learning. To provide a more reliable evaluation for CZSL, we introduce a new benchmark dataset, C-Fashion, and refine the widely used but noisy MIT-States dataset. Extensive experiments indicate that our approach achieves state-of-the-art performance on four benchmark datasets under both closed-world and open-world settings. The source code and datasets are available at https://github.com/xud-yan/WARM-CAT .", "link": "http://arxiv.org/abs/2602.23114v1", "date": "2026-02-26", "relevancy": 2.7586, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5953}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5299}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5299}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20WARM-CAT%3A%20%3A%20Warm-Started%20Test-Time%20Comprehensive%20Knowledge%20Accumulation%20for%20Compositional%20Zero-Shot%20Learning&body=Title%3A%20WARM-CAT%3A%20%3A%20Warm-Started%20Test-Time%20Comprehensive%20Knowledge%20Accumulation%20for%20Compositional%20Zero-Shot%20Learning%0AAuthor%3A%20Xudong%20Yan%20and%20Songhe%20Feng%20and%20Jiaxin%20Wang%20and%20Xin%20Su%20and%20Yi%20Jin%0AAbstract%3A%20Compositional%20Zero-Shot%20Learning%20%28CZSL%29%20aims%20to%20recognize%20novel%20attribute-object%20compositions%20based%20on%20the%20knowledge%20learned%20from%20seen%20ones.%20Existing%20methods%20suffer%20from%20performance%20degradation%20caused%20by%20the%20distribution%20shift%20of%20label%20space%20at%20test%20time%2C%20which%20stems%20from%20the%20inclusion%20of%20unseen%20compositions%20recombined%20from%20attributes%20and%20objects.%20To%20overcome%20the%20challenge%2C%20we%20propose%20a%20novel%20approach%20that%20accumulates%20comprehensive%20knowledge%20in%20both%20textual%20and%20visual%20modalities%20from%20unsupervised%20data%20to%20update%20multimodal%20prototypes%20at%20test%20time.%20Building%20on%20this%2C%20we%20further%20design%20an%20adaptive%20update%20weight%20to%20control%20the%20degree%20of%20prototype%20adjustment%2C%20enabling%20the%20model%20to%20flexibly%20adapt%20to%20distribution%20shift%20during%20testing.%20Moreover%2C%20a%20dynamic%20priority%20queue%20is%20introduced%20that%20stores%20high-confidence%20images%20to%20acquire%20visual%20prototypes%20from%20historical%20images%20for%20inference.%20Since%20the%20model%20tends%20to%20favor%20compositions%20already%20stored%20in%20the%20queue%20during%20testing%2C%20we%20warm-start%20the%20queue%20by%20initializing%20it%20with%20training%20images%20for%20visual%20prototypes%20of%20seen%20compositions%20and%20generating%20unseen%20visual%20prototypes%20using%20the%20mapping%20learned%20between%20seen%20and%20unseen%20textual%20prototypes.%20Considering%20the%20semantic%20consistency%20of%20multimodal%20knowledge%2C%20we%20align%20textual%20and%20visual%20prototypes%20by%20multimodal%20collaborative%20representation%20learning.%20To%20provide%20a%20more%20reliable%20evaluation%20for%20CZSL%2C%20we%20introduce%20a%20new%20benchmark%20dataset%2C%20C-Fashion%2C%20and%20refine%20the%20widely%20used%20but%20noisy%20MIT-States%20dataset.%20Extensive%20experiments%20indicate%20that%20our%20approach%20achieves%20state-of-the-art%20performance%20on%20four%20benchmark%20datasets%20under%20both%20closed-world%20and%20open-world%20settings.%20The%20source%20code%20and%20datasets%20are%20available%20at%20https%3A//github.com/xud-yan/WARM-CAT%20.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23114v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWARM-CAT%253A%2520%253A%2520Warm-Started%2520Test-Time%2520Comprehensive%2520Knowledge%2520Accumulation%2520for%2520Compositional%2520Zero-Shot%2520Learning%26entry.906535625%3DXudong%2520Yan%2520and%2520Songhe%2520Feng%2520and%2520Jiaxin%2520Wang%2520and%2520Xin%2520Su%2520and%2520Yi%2520Jin%26entry.1292438233%3DCompositional%2520Zero-Shot%2520Learning%2520%2528CZSL%2529%2520aims%2520to%2520recognize%2520novel%2520attribute-object%2520compositions%2520based%2520on%2520the%2520knowledge%2520learned%2520from%2520seen%2520ones.%2520Existing%2520methods%25 {"title": "SPM-Bench: Benchmarking Large Language Models for Scanning Probe Microscopy", "author": "Peiyao Xiao and Xiaogang Li and Chengliang Xu and Jiayi Wang and Ben Wang and Zichao Chen and Zeyu Wang and Kejun Yu and Yueqian Chen and Xulin Liu and Wende Xiao and Bing Zhao and Hu Wei", "abstract": "As LLMs achieved breakthroughs in general reasoning, their proficiency in specialized scientific domains reveals pronounced gaps in existing benchmarks due to data contamination, insufficient complexity, and prohibitive human labor costs. Here we present SPM-Bench, an original, PhD-level multimodal benchmark specifically designed for scanning probe microscopy (SPM). We propose a fully automated data synthesis pipeline that ensures both high authority and low-cost. By employing Anchor-Gated Sieve (AGS) technology, we efficiently extract high-value image-text pairs from arXiv and journal papers published between 2023 and 2025. Through a hybrid cloud-local architecture where VLMs return only spatial coordinates \"llbox\" for local high-fidelity cropping, our pipeline achieves extreme token savings while maintaining high dataset purity. To accurately and objectively evaluate the performance of the LLMs, we introduce the Strict Imperfection Penalty F1 (SIP-F1) score. This metric not only establishes a rigorous capability hierarchy but also, for the first time, quantifies model \"personalities\" (Conservative, Aggressive, Gambler, or Wise). By correlating these results with model-reported confidence and perceived difficulty, we expose the true reasoning boundaries of current AI in complex physical scenarios. These insights establish SPM-Bench as a generalizable paradigm for automated scientific data synthesis.", "link": "http://arxiv.org/abs/2602.22971v1", "date": "2026-02-26", "relevancy": 2.7535, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5669}, {"title {"title": "SOTAlign: Semi-Supervised Alignment of Unimodal Vision and Language Models via Optimal Transport", "author": "Simon Roschmann and Paul Krzakala and Sonia Mazelet and Quentin Bouniot and Zeynep Akata", "abstract": "The Platonic Representation Hypothesis posits that neural networks trained on different modalities converge toward a shared statistical model of the world. Recent work exploits this convergence by aligning frozen pretrained vision and language models with lightweight alignment layers, but typically relies on contrastive losses and millions of paired samples. In this work, we ask whether meaningful alignment can be achieved with substantially less supervision. We introduce a semi-supervised setting in which pretrained unimodal encoders are aligned using a small number of image-text pairs together with large amounts of unpaired data. To address this challenge, we propose SOTAlign, a two-stage framework that first recovers a coarse shared geometry from limited paired data using a linear teacher, then refines the alignment on unpaired samples via an optimal-transport-based divergence that transfers relational structure without overconstraining the target space. Unlike existing semi-supervised methods, SOTAlign effectively leverages unpaired images and text, learning robust joint embeddings across datasets and encoder pairs, and significantly outperforming supervised and semi-supervised baselines.", "link": "http://arxiv.org/abs/2602.23353v1", "date": "2026-02-26", "relevancy": 2.7526, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.584}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.545}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5226}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SOTAlign%3A%20Semi-Supervised%20Alignment%20of%20Unimodal%20Vision%20and%20Language%20Models%20via%20Optimal%20Transport&body=Title%3A%20SOTAlign%3A%20Semi-Supervised%20Alignment%20of%20Unimodal%20Vision%20and%20Language%20Models%20via%20Optimal%20Transport%0AAuthor%3A%20Simon%20Roschmann%20and%20Paul%20Krzakala%20and%20Sonia%20Mazelet%20and%20Quentin%20Bouniot%20and%20Zeynep%20Akata%0AAbstract%3A%20The%20Platonic%20Representation%20Hypothesis%20posits%20that%20neural%20networks%20trained%20on%20different%20modalities%20converge%20toward%20a%20shared%20statistical%20model%20of%20the%20world.%20Recent%20work%20exploits%20this%20convergence%20by%20aligning%20frozen%20pretrained%20vision%20and%20language%20models%20with%20lightweight%20alignment%20layers%2C%20but%20typically%20relies%20on%20contrastive%20losses%20and%20millions%20of%20paired%20samples.%20In%20this%20work%2C%20we%20ask%20whether%20meaningful%20alignment%20can%20be%20achieved%20with%20substantially%20less%20supervision.%20We%20introduce%20a%20semi-supervised%20setting%20in%20which%20pretrained%20unimodal%20encoders%20are%20aligned%20using%20a%20small%20number%20of%20image-text%20pairs%20together%20with%20large%20amounts%20of%20unpaired%20data.%20To%20address%20this%20challenge%2C%20we%20propose%20SOTAlign%2C%20a%20two-stage%20framework%20that%20first%20recovers%20a%20coarse%20shared%20geometry%20from%20limited%20paired%20data%20using%20a%20linear%20teacher%2C%20then%20refines%20the%20alignment%20on%20unpaired%20samples%20via%20an%20optimal-transport-based%20divergence%20that%20transfers%20relational%20structure%20without%20overconstraining%20the%20target%20space.%20Unlike%20existing%20semi-supervised%20methods%2C%20SOTAlign%20effectively%20leverages%20unpaired%20images%20and%20text%2C%20learning%20robust%20joint%20embeddings%20across%20datasets%20and%20encoder%20pairs%2C%20and%20significantly%20outperforming%20supervised%20and%20semi-supervised%20baselines.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23353v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSOTAlign%253A%2520Semi-Supervised%2520Alignment%2520of%2520Unimodal%2520Vision%2520and%2520Language%2520Models%2520via%2520Optimal%2520Transport%26entry.906535625%3DSimon%2520Roschmann%2520and%2520Paul%2520Krzakala%2520and%2520Sonia%2520Mazelet%2520and%2520Quentin%2520Bouniot%2520and%2520Zeynep%2520Akata%26entry.1292438233%3DThe%2520Platonic%2520Representation%2520Hypothesis%2520posits%2520that%2520neural%2520networks%2520trained%2520on%2520different%2520modalities%2520converge%2520toward%2520a%2520shared%2520statistical%2520model%2520of%2520the%2520world.%2520Recent%2520work%2520exploits%2520this%2520convergence%2520by%2520aligning%2520frozen%2520pretrained%2520vision%2520and%2520language%2520models%2520with%2520lightweight%2520alignment%2520layers%252C%2520but%2520typically%2520relies%2520on%2520contrastive%2520losses%2520and%2520millions%2520of%2520paired%2520samples.%2520In%2520this%2520work%252C%2520we%2520ask%2520whether%2520meaningful%2520alignment%2520can%2520be%2520achieved%2520with%2520substantially%2520less%2520supervision.%2520We%2520introduce%2520a%2520semi-supervised%2520setting%2520in%2520which%2520pretrained%2520unimodal%2520encoders%2520are%2520aligned%2520using%2520a%2520small%2520number%2520of%2520image-text%2520pairs%2520together%2520with%2520large%2520amounts%2520of%2520unpaired%2520data.%2520To%2520address%2520this%2520challenge%252C%2520we%2520propose%2520SOTAlign%252C%2520a%2520two-stage%2520framework%2520that%2520first%2520recovers%2520a%2520coarse%2520shared%2520geometry%2520from%2520limited%2520paired%2520data%2520using%2520a%2520linear%2520teacher%252C%2520then%2520refines%2520the%2520alignment%2520on%2520unpaired%2520samples%2520via%2520an%2520optimal-transport-based%2520divergence%2520that%2520transfers%2520relational%2520s {"title": "MSJoE: Jointly Evolving MLLM and Sampler for Efficient Long-Form Video Understanding", "author": "Wenhui Tan and Xiaoyi Yu and Jiaze Li and Yijing Chen and Jianzhong Ju and Zhenbo Luo and Ruihua Song and Jian Luan", "abstract": "Efficiently understanding long-form videos remains a fundamental challenge for multimodal large language models (MLLMs). In this paper, we present MLLM-Sampler Joint Evolution (MSJoE), a novel framework that jointly evolves the MLLM and a lightweight key-frame sampler for efficient long-form video understanding. MSJoE builds upon a key assumption that only a small subset of key-frames is truly informative for answering each question to a video. Specifically, MSJoE first reasons out several queries, which describe diverse visual perspectives relevant to the question. Then, these queries interact with a frozen CLIP model to produce a query-frame similarity matrix. Finally, a lightweight sampler predicts key-frame sampling weights from this matrix, selecting a compact set of informative frames, which are then fed into the MLLM for answer generation. Both the MLLM and sampler are jointly optimized through reinforcement learning, enabling co-adaptation of query-reasoning, frame-sampling, and key-frame understanding. A new long-video QA dataset containing 2.8K videos with 7K question-answer pairs is collected to support the training process. Extensive experiments on VideoMME, LongVideoBench, LVBench, and MLVU show that MSJoE achieves 8.0\\% accuracy gain upon the base MLLM, and 1.1\\% higher accuracy than strongest baseline method.", "link": "http://arxiv.org/abs/2602.22932v1", "date": "2026-02-26", "relevancy": 2.7435, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5547}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarit {"title": "ToProVAR: Efficient Visual Autoregressive Modeling via Tri-Dimensional Entropy-Aware Semantic Analysis and Sparsity Optimization", "author": "Jiayu Chen and Ruoyu Lin and Zihao Zheng and Jingxin Li and Maoliang Li and Guojie Luo and Xiang chen", "abstract": "Visual Autoregressive(VAR) models enhance generation quality but face a critical efficiency bottleneck in later stages. In this paper, we present a novel optimization framework for VAR models that fundamentally differs from prior approaches such as FastVAR and SkipVAR. Instead of relying on heuristic skipping strategies, our method leverages attention entropy to characterize the semantic projections across different dimensions of the model architecture. This enables precise identification of parameter dynamics under varying token granularity levels, semantic scopes, and generation scales. Building on this analysis, we further uncover sparsity patterns along three critical dimensions-token, layer, and scale-and propose a set of fine-grained optimization strategies tailored to these patterns. Extensive evaluation demonstrates that our approach achieves aggressive acceleration of the generation process while significantly preserving semantic fidelity and fine details, outperforming traditional methods in both efficiency and quality. Experiments on Infinity-2B and Infinity-8B models demonstrate that ToProVAR achieves up to 3.4x acceleration with minimal quality loss, effectively mitigating the issues found in prior work. Our code will be made publicly available.", "link": "http://arxiv.org/abs/2602.22948v1", "date": "2026-02-26", "relevancy": 2.7265, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5492}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5492}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5375}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ToProVAR%3A%20Efficient%20Visual%20Autoregressive%20Modeling%20via%20Tri-Dimensional%20Entropy-Aware%20Semantic%20Analysis%20and%20Sparsity%20Optimization&body=Title%3A%20ToProVAR%3A%20Efficient%20Visual%20Autoregressive%20Modeling%20via%20Tri-Dimensional%20Entropy-Aware%20Semantic%20Analysis%20and%20Sparsity%20Optimization%0AAuthor%3A%20Jiayu%20Chen%20and%20Ruoyu%20Lin%20and%20Zihao%20Zheng%20and%20Jingxin%20Li%20and%20Maoliang%20Li%20and%20Guojie%20Luo%20and%20Xiang%20chen%0AAbstract%3A%20Visual%20Autoregressive%28VAR%29%20models%20enhance%20generation%20quality%20but%20face%20a%20critical%20efficiency%20bottleneck%20in%20later%20stages.%20In%20this%20paper%2C%20we%20present%20a%20novel%20optimization%20framework%20for%20VAR%20models%20that%20fundamentally%20differs%20from%20prior%20approaches%20such%20as%20FastVAR%20and%20SkipVAR.%20Instead%20of%20relying%20on%20heuristic%20skipping%20strategies%2C%20our%20method%20leverages%20attention%20entropy%20to%20characterize%20the%20semantic%20projections%20across%20different%20dimensions%20of%20the%20model%20architecture.%20This%20enables%20precise%20identification%20of%20parameter%20dynamics%20under%20varying%20token%20granularity%20levels%2C%20semantic%20scopes%2C%20and%20generation%20scales.%20Building%20on%20this%20analysis%2C%20we%20further%20uncover%20sparsity%20patterns%20along%20three%20critical%20dimensions-token%2C%20layer%2C%20and%20scale-and%20propose%20a%20set%20of%20fine-grained%20optimization%20strategies%20tailored%20to%20these%20patterns.%20Extensive%20evaluation%20demonstrates%20that%20our%20approach%20achieves%20aggressive%20acceleration%20of%20the%20generation%20process%20while%20significantly%20preserving%20semantic%20fidelity%20and%20fine%20details%2C%20outperforming%20traditional%20methods%20in%20 {"title": "LineGraph2Road: Structural Graph Reasoning on Line Graphs for Road Network Extraction", "author": "Zhengyang Wei and Renzhi Jing and Yiyi He and Jenny Suckale", "abstract": "The accurate and automatic extraction of roads from satellite imagery is critical for applications in navigation and urban planning, significantly reducing the need for manual annotation. Many existing methods decompose this task into keypoint extraction and connectedness prediction, but often struggle to capture long-range dependencies and complex topologies. Here, we propose LineGraph2Road, a framework that improves connectedness prediction by formulating it as binary classification over edges in a constructed global but sparse Euclidean graph, where nodes are keypoints extracted from segmentation masks and edges connect node pairs within a predefined distance threshold, representing potential road segments. To better learn structural link representation, we transform the original graph into its corresponding line graph and apply a Graph Transformer on it for connectedness prediction. This formulation overcomes the limitations of endpoint-embedding fusion on set-isomorphic links, enabling rich link representations and effective relational reasoning over the global structure. Additionally, we introduce an overpass/underpass head to resolve multi-level crossings and a coupled NMS strategy to preserve critical connections. We evaluate LineGraph2Road on three benchmarks: City-scale, SpaceNet, and Global-scale, and show that it achieves state-of-the-art results on two key metrics, TOPO-F1 and APLS. It also captures fine visual details critical for real-world deployment. We will make our code publicly available.", "link": "http://arxiv.org/abs/2602.23290v1", "date": "2026-02-26", "relevancy": 2.6584, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5641}, {"title": "DDM-NET: End-to-end lear g%20rich%20link%20representations%20and%20effective%20relational%20reasoning%20over%20the%20global%20structure.%20Additionally%2C%20we%20introduce%20an%20overpass/underpass%20head%20to%20resolve%20multi-level%20crossings%20and%20a%20coupled%20NMS%20strategy%20to%20preserve%20critical%20connections.%20We%20evaluate%20LineGraph2Road%20on%20three%20benchmarks%3A%20City-scale%2C%20SpaceNet%2C%20and%20Global-scale%2C%20and%20show%20that%20it%20achieves%20state-of-the-art%20results%20on%20two%20key%20metrics%2C%20TOPO-F1%20and%20APLS.%20It%20also%20captures%20fine%20visual%20details%20critical%20for%20real-world%20deployment.%20We%20will%20make%20our%20code%20publicly%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23290v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLineGraph2Road%253A%2520Structural%2520Graph%2520Reasoning%2520on%2520Line%2520Graphs%2520for%2520Road%2520Network%2520Extraction%26entry.906535625%3DZhengyang%2520Wei%2520and%2520Renzhi%2520Jing%2520and%2520Yiyi%2520He%2520and%2520Jenny%2520Suckale%26entry.1292438233%3DThe%2520accurate%2520and%2520automatic%2520extraction%2520of%2520roads%2520from%2520satellite%2520imagery%2520is%2520critical%2520for%2520applications%2520in%2520navigation%2520and%2520urban%2520planning%252C%2520significantly%2520reducing%2520the%2520need%2520for%2520manual%2520annotation.%2520Many%2520existing%2520methods%2520decompose%2520this%2520task%2520into%2520keypoint%2520extraction%2520and%2520connectedness%2520prediction%252C%2520but%2520often%2520struggle%2520to%2520capture%2520long-range%2520dependencies%2520and%2520complex%2520topologies.%2520Here%252C%2520we%2520propose%2520LineGraph2Road%252C%2520a%2520framework%2520that%2520improves%2520connectedness%2520prediction%2520by%2520formulating%2520it%2520as%2520binary%2520classification%2520over%2520edges%2520in%2520a%2520constructed%2520global%2520but%2520sparse%2520Euclidean%2520graph%25 {"title": "Modality Collapse as Mismatched Decoding: Information-Theoretic Limits of Multimodal LLMs", "author": "Jayadev Billa", "abstract": "Multimodal LLMs can process speech and images, but they cannot hear a speaker's voice or see an object's texture. We show this is not a failure of encoding: speaker identity, emotion, and visual attributes survive through every LLM layer (3--55$\\times$ above chance in linear probes), yet removing 64--71% of modality-specific variance improves decoder loss. The decoder has no learned use for these directions; their presence is noise.\n  We formalize this as a mismatched decoder problem: a decoder trained on text can only extract information along text-aligned directions. Accessible information is bounded by the Generalized Mutual Information (GMI), with degradation scaling with distributional distance and decoder sensitivity. The bound is a property of the decoder's scoring rule, not of any particular architecture; it applies whether non-text inputs arrive through a learned projection, a discrete codebook, or no explicit adapter at all. We validate this across five models spanning speech and vision. A controlled experiment (two Prismatic VLMs differing only in encoder text-alignment) confirms the bottleneck is the decoder's scoring rule, not the encoder or projection. A LoRA intervention demonstrates the fix: training with an emotion objective improves emotion accessibility ($+$7.5%) without affecting other attributes, confirming that the training objective determines what becomes accessible.", "link": "http://arxiv.org/abs/2602.23136v1", "date": "2026-02-26", "relevancy": 2.6472, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.531}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.531}, {"title": "TAMM: T er%27s%20scoring%20rule%2C%20not%20the%20encoder%20or%20projection.%20A%20LoRA%20intervention%20demonstrates%20the%20fix%3A%20training%20with%20an%20emotion%20objective%20improves%20emotion%20accessibility%20%28%24%2B%247.5%25%29%20without%20affecting%20other%20attributes%2C%20confirming%20that%20the%20training%20objective%20determines%20what%20becomes%20accessible.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23136v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DModality%2520Collapse%2520as%2520Mismatched%2520Decoding%253A%2520Information-Theoretic%2520Limits%2520of%2520Multimodal%2520LLMs%26entry.906535625%3DJayadev%2520Billa%26entry.1292438233%3DMultimodal%2520LLMs%2520can%2520process%2520speech%2520and%2520images%252C%2520but%2520they%2520cannot%2520hear%2520a%2520speaker%2527s%2520voice%2520or%2520see%2520an%2520object%2527s%2520texture.%2520We%2520show%2520this%2520is%2520not%2520a%2520failure%2520of%2520encoding%253A%2520speaker%2520identity%252C%2520emotion%252C%2520and%2520visual%2520attributes%2520survive%2520through%2520every%2520LLM%2520layer%2520%25283--55%2524%255Ctimes%2524%2520above%2520chance%2520in%2520linear%2520probes%2529%252C%2520yet%2520removing%252064--71%2525%2520of%2520modality-specific%2520variance%2520improves%2520decoder%2520loss.%2520The%2520decoder%2520has%2520no%2520learned%2520use%2520for%2520these%2520directions%253B%2520their%2520presence%2520is%2520noise.%250A%2520%2520We%2520formalize%2520this%2520as%2520a%2520mismatched%2520decoder%2520problem%253A%2520a%2520decoder%2520trained%2520on%2520text%2520can%2520only%2520extract%2520information%2520along%2520text-aligned%2520directions.%2520Accessible%2520information%2520is%2520bounded%2520by%2520the%2520Generalized%2520Mutual%2520Information%2520%2528GMI%2529%252C%2520with%2520degradation%2520scaling%2520with%2520distributional%2520distance%2520and%2520decoder%2520sensitivity.%2520The%2520bound%2520is% {"title": "G-reasoner: Foundation Models for Unified Reasoning over Graph-structured Knowledge", "author": "Linhao Luo and Zicheng Zhao and Junnan Liu and Zhangchi Qiu and Junnan Dong and Serge Panev and Chen Gong and Thuy-Trang Vu and Gholamreza Haffari and Dinh Phung and Alan Wee-Chung Liew and Shirui Pan", "abstract": "Large language models (LLMs) excel at complex reasoning but remain limited by static and incomplete parametric knowledge. Retrieval-augmented generation (RAG) mitigates this by incorporating external knowledge, yet existing RAGs struggle with knowledge-intensive tasks due to fragmented information and weak modeling of knowledge structure. Graphs offer a natural way to model relationships within knowledge, but LLMs are inherently unstructured and cannot effectively reason over graph-structured data. Recent graph-enhanced RAG (GraphRAG) attempts to bridge this gap by constructing tailored graphs and enabling LLMs to reason on them. However, these methods often depend on ad-hoc graph designs, heuristic search, or costly agent pipelines, which hinder scalability and generalization. To address these challenges, we present G-reasoner, a unified framework that integrates graph and language foundation models for scalable reasoning over diverse graph-structured knowledge. Central to our approach is QuadGraph, a standardized four-layer abstraction that unifies heterogeneous knowledge sources into a common graph representation. Building on this, we introduce a 34M-parameter graph foundation model (GFM) that jointly captures graph topology and textual semantics, and is integrated with LLMs to enhance reasoning in downstream applications. To ensure scalability and efficiency, mixed-precision training and distributed message-passing are implemented to scale GFM with more GPUs. Extensive experiments on six benchmarks show that G-reasoner consistently outperforms state-of-the-art baselines, significantly enhances LLM reasoning, and achieves strong efficiency and cross-graph generalization.", "link": "http://arxiv.org/abs/2509.24276v2", "date": "2026-02-26", "relevancy": 2.6014, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5224}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5192}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5192}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20G-reasoner%3A%20Foundation%20Models%20for%20Unified%20Reasoning%20over%20Graph-structured%20Knowledge&body=Title%3A%20G-reasoner%3A%20Foundation%20Models%20for%20Unified%20Reasoning%20over%20Graph-structured%20Knowledge%0AAuthor%3A%20Linhao%20Luo%20and%20Zicheng%20Zhao%20and%20Junnan%20Liu%20and%20Zhangchi%20Qiu%20and%20Junnan%20Dong%20and%20Serge%20Panev%20and%20Chen%20Gong%20and%20Thuy-Trang%20Vu%20and%20Gholamreza%20Haffari%20and%20Dinh%20Phung%20and%20Alan%20Wee-Chung%20Liew%20and%20Shirui%20Pan%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20excel%20at%20complex%20reasoning%20but%20remain%20limited%20by%20static%20and%20incomplete%20parametric%20knowledge.%20Retrieval-augmented%20generation%20%28RAG%29%20mitigates%20this%20by%20incorporating%20external%20knowledge%2C%20yet%20existing%20RAGs%20struggle%20with%20knowledge-intensive%20tasks%20due%20to%20fragmented%20information%20and%20weak%20modeling%20of%20knowledge%20structure.%20Graphs%20offer%20a%20natural%20way%20to%20model%20relationships%20within%20knowledge%2C%20but%20LLMs%20are%20inherently%20unstructured%20and%20cannot%20effectively%20reason%20over%20graph-structured%20data.%20Recent%20graph-enhanced%20RAG%20%28GraphRAG%29%20attempts%20to%20bridge%20this%20gap%20by%20constructing%20tailored%20graphs%20and%20enabling%20LLMs%20to%20reason%20on%20them.%20However%2C%20these%20methods%20often%20depend%20on%20ad-hoc%20graph%20designs%2C%20heuristic%20search%2C%20or%20costly%20agent%20pipelines%2C%20which%20hinder%20scalability%20and%20generalization.%20To%20address%20these%20challenges%2C%20we%20present%20G-reasoner%2C%20a%20unified%20framework%20that%20integrates%20graph%20and%20language%20foundation%20models%20for%20scalable%20reasoning%20over%20diverse%20graph-structured%20knowledge.%20Central%20to%20our%20approach%20is%20QuadGraph%2C%20a%20standardized%20four-layer%20abstraction%20that%20unifies%20heterogeneous%20knowledge%20sources%20into%20a%20common%20graph%20representation.%20Building%20on%20this%2C%20we%20introduce%20a%2034M-parameter%20graph%20foundation%20model%20%28GFM%29%20that%20jointly%20captures%20graph%20topology%20and%20textual%20semantics%2C%20and%20is%20integrated%20with%20LLMs%20to%20enhance%20reasoning%20in%20downstream%20applications.%20To%20ensure%20scalability%20and%20efficiency%2C%20mixed-precision%20training%20and%20distributed%20message-passing%20are%20implemented%20to%20scale%20GFM%20with%20more%20GPUs.%20Extensive%20experiments%20on%20six%20benchmarks%20show%20that%20G-reasoner%20consistently%20outperforms%20state-of-the-art%20baselines%2C%20significantly%20enhances%20LLM%20reasoning%2C%20and%20achieves%20strong%20efficiency%20and%20cross-graph%20generalization.%0ALink%3A%20http%3A//arxiv.org/abs/2509.24276v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DG-reasoner%253A%2520Foundation%2520Models%2520for%2520Unified%2520Reasoning%2520over%2520Graph-structured%2520Knowledge%26entry.906535625%3DLinhao%2520Luo%2520and%2520Zicheng%2520Zhao%2520and%2520Junnan%2520Liu%2520and%2520Zhangchi%2520Qiu%2520and%2520Junnan%2520Dong%2520and%2520Serge%2520Panev%2520and%2520Chen%2520Gong%2520and%2520Thuy-Trang%2520Vu%2520and%2520Gholamreza%2520Haffari%2520and%2520Dinh%2520Phung%2520and%2520Alan%2520Wee-Chung%2520Liew%2520and%2520Shirui%2520 {"title": "Small Object Detection Model with Spatial Laplacian Pyramid Attention and Multi-Scale Features Enhancement in Aerial Images", "author": "Zhangjian Ji and Huijia Yan and Shaotong Qiao and Kai Feng and Wei Wei", "abstract": "Detecting objects in aerial images confronts some significant challenges, including small size, dense and non-uniform distribution of objects over high-resolution images, which makes detection inefficient. Thus, in this paper, we proposed a small object detection algorithm based on a Spatial Laplacian Pyramid Attention and Multi-Scale Feature Enhancement in aerial images. Firstly, in order to improve the feature representation of ResNet-50 on small objects, we presented a novel Spatial Laplacian Pyramid Attention (SLPA) module, which is integrated after each stage of ResNet-50 to identify and emphasize important local regions. Secondly, to enhance the model's semantic understanding and features representation, we designed a Multi-Scale Feature Enhancement Module (MSFEM), which is incorporated into the lateral connections of C5 layer for building Feature Pyramid Network (FPN). Finally, the features representation quality of traditional feature pyramid network will be affected because the features are not aligned when the upper and lower layers are fused. In order to handle it, we utilized deformable convolutions to align the features in the fusion processing of the upper and lower levels of the Feature Pyramid Network, which can help enhance the model's ability to detect and recognize small objects. The extensive experimental results on two benchmark datasets: VisDrone and DOTA demonstrate that our improved model performs better for small object detection in aerial images compared to the original algorithm.", "link": "http://arxiv.org/abs/2602.23031v1", "date": "2026-02-26", "relevancy": 2.5948, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5256}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5167}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5146}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Small%20Object%20Detection%20Model%20with%20Spatial%20Laplacian%20Pyramid%20Attention%20and%20Multi-Scale%20Features%20Enhancement%20in%20Aerial%20Images&body=Title%3A%20Small%20Object%20Detection%20Model%20with%20Spatial%20Laplacian%20Pyramid%20Attention%20and%20Multi-Scale%20Features%20Enhancement%20in%20Aerial%20Images%0AAuthor%3A%20Zhangjian%20Ji%20and%20Huijia%20Yan%20and%20Shaotong%20Qiao%20and%20Kai%20Feng%20and%20Wei%20Wei%0AAbstract%3A%20Detecting%20objects%20in%20aerial%20images%20confronts%20some%20significant%20challenges%2C%20including%20small%20size%2C%20dense%20and%20non-uniform%20distribution%20of%20objects%20over%20high-resolution%20images%2C%20which%20makes%20detection%20inefficient.%20Thus%2C%20in%20this%20paper%2C%20we%20proposed%20a%20small%20object%20detection%20algorithm%20based%20on%20a%20Spatial%20Laplacian%20Pyramid%20Attention%20and%20Multi-Scale%20Feature%20Enhancement%20in%20aerial%20images.%20Firstly%2C%20in%20order%20to%20improve%20the%20feature%20representation%20of%20ResNet-50%20on%20small%20objects%2C%20we%20presented%20a%20novel%20Spatial%20Laplacian%20Pyramid%20Attention%20%28SLPA%29%20module%2C%20which%20is%20integrated%20after%20each%20stage%20of%20ResNet-50%20to%20identify%20and%20emphasize%20important%20local%20regions.%20Secondly%2C%20to%20enhance%20the%20model%27s%20semantic%20understanding%20and%20features%20representation%2C%20we%20designed%20a%20Multi-Scale%20Feature%20Enhancement%20Module%20%28MSFEM%29%2C%20which%20is%20incorporated%20into%20the%20lateral%20connections%20of%20C5%20layer%20for%20building%20Feature%20Pyramid%20Network%20%28FPN%29.%20Finally%2C%20the%20features%20representation%20quality%20of%20traditional%20feature%20pyramid%20network%20will%20be%20affected%20because%20the%20features%20are%20not%20aligned%20when%20the%20upper%20and%20lower%20layers%20are%20fused.%20In%20order%20to%20handle%20it%2C%20we%20utilized%20deformable%20convolutions%20to%20align%20the%20features%20in%20the%20fusion%20processing%20of%20the%20upper%20and%20lower%20levels%20of%20the%20Feature%20Pyramid%20Network%2C%20which%20can%20help%20enhance%20the%20model%27s%20ability%20to%20detect%20and%20recognize%20small%20objects.%20The%20extensive%20experimental%20results%20on%20two%20benchmark%20datasets%3A%20VisDrone%20and%20DOTA%20demonstrate%20that%20our%20improved%20model%20performs%20better%20for%20small%20object%20detection%20in%20aerial%20images%20compared%20to%20the%20original%20algorithm.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23031v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSmall%2520Object%2520Detection%2520Model%2520with%2520Spatial%2520Laplacian%2520Pyramid%2520Attention%2520and%2520Multi-Scale%2520Features%2520Enhancement%2520in%2520Aerial%2520Images%26entry.906535625%3DZhangjian%2520Ji%2520and%2520Huijia%2520Yan%2520and%2520Shaotong%2520Qiao%2520and%2520Kai%2520Feng%2520and%2520Wei%2520Wei%26entry.1292438233%3DDetecting%2520objects%2520in%2520aerial%2520images%2520confronts%2520some%2520significant%2520challenges%252C%2520including%2520small%2520size%252C%2520dense%2520and%2520non-uniform%2520distribution%2520of%2520objects%2520over%2520high-resolution%2520images%252C%2520which%2520makes%2520detection%2520inefficient.%2520Thus%252C%2520in%2520this%2520paper%252C%2520we%2520proposed%2520a%2520small%2520object%2520detection%2520algorithm%2520based%2520on%2520a%2520Spatial%2520Laplacian%2520Pyramid%2520Attention%2520and%2520Multi-Scale%2520Feature%2520Enhancement%2520in% 24074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Small%20Object%20Detection%20Model%20with%20Spatial%20Laplacian%20Pyramid%20Attention%20and%20Multi-Scale%20Features%20Enhancement%20in%20Aerial%20Images&entry.906535625=Zhangjian%20Ji%20and%20Huijia%20Yan%20and%20Shaotong%20Qiao%20and%20Kai%20Feng%20and%20Wei%20Wei&entry.1292438233=Detecting%20objects%20in%20aerial%20images%20confronts%20some%20significant%20challenges%2C%20including%20small%20size%2C%20dense%20and%20non-uniform%20distribution%20of%20objects%20over%20high-resolution%20images%2C%20which%20makes%20detection%20inefficient.%20Thus%2C%20in%20this%20paper%2C%20we%20proposed%20a%20small%20object%20detection%20algorithm%20based%20on%20a%20Spatial%20Laplacian%20Pyramid%20Attention%20and%20Multi-Scale%20Feature%20Enhancement%20in%20aerial%20images.%20Firstly%2C%20in%20order%20to%20improve%20the%20feature%20representation%20of%20ResNet-50%20on%20small%20objects%2C%20we%20presented%20a%20novel%20Spatial%20Laplacian%20Pyramid%20Attention%20%28SLPA%29%20module%2C%20which%20is%20integrated%20after%20each%20stage%20of%20ResNet-50%20to%20identify%20and%20emphasize%20important%20local%20regions.%20Secondly%2C%20to%20enhance%20the%20model%27s%20semantic%20understanding%20and%20features%20representation%2C%20we%20designed%20a%20Multi-Scale%20Feature%20Enhancement%20Module%20%28MSFEM%29%2C%20which%20is%20incorporated%20into%20the%20lateral%20connections%20of%20C5%20layer%20for%20building%20Feature%20Pyramid%20Network%20%28FPN%29.%20Finally%2C%20the%20features%20representation%20quality%20of%20traditional%20feature%20pyramid%20network%20will%20be%20affected%20because%20the%20features%20are%20not%20aligned%20when%20the%20upper%20and%20lower%20layers%20are%20fused.%20In%20order%20to%20handle%20it%2C%20we%20utilized%20deformable%20convolutions%20to%20align%20the%20features%20in%20the%20fusion%20processing%20of%20the%20upper%20and%2 {"title": "VLM-Pruner: Buffering for Spatial Sparsity in an Efficient VLM Centrifugal Token Pruning Paradigm", "author": "Zhenkai Wu and Xiaowen Ma and Zhenliang Ni and Dengming Zhang and Han Shu and Xin Jiang and Xinghao Chen", "abstract": "Vision-language models (VLMs) excel at image understanding tasks, but the large number of visual tokens imposes significant computational costs, hindering deployment on mobile devices. Many pruning methods rely solely on token importance and thus overlook inter-token redundancy, retaining numerous duplicated tokens and wasting capacity. Although some redundancy-aware approaches have been proposed, they often ignore the spatial relationships among visual tokens. This can lead to overly sparse selections of retained tokens that fail to adequately cover the regions of target objects. To address these limitations, we propose VLM-Pruner, a training-free token pruning algorithm that explicitly balances redundancy and spatial sparsity. We introduce a centrifugal token pruning paradigm that enables near-to-far selection while prioritizing the preservation of fine-grained object details. Moreover, we design a Buffering for Spatial Sparsity (BSS) criterion that defers the selection of spatially distant tokens. We further adopt a parallel greedy strategy to conduct token selection efficiently. To mitigate information loss from pruning, we selectively fuse salient information from the discarded tokens into the retained ones. Comprehensive comparisons demonstrate that VLM-Pruner consistently outperforms strong baselines across five VLMs with an 88.9\\% pruning rate, while delivering an end-to-end inference speedup. The code is available at https://github.com/Casey-bit/VLMPruner.", "link": "http://arxiv.org/abs/2512.02700v4", "date": "2026-02-26", "relevancy": 2.576, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5273}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5091}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5091}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VLM-Pruner%3A%20Buffering%20for%20Spatial%20Sparsity%20in%20an%20Efficient%20VLM%20Centrifugal%20Token%20Pruning%20Paradigm&body=Title%3A%20VLM-Pruner%3A%20Buffering%20for%20Spatial%20Sparsity%20in%20an%20Efficient%20VLM%20Centrifugal%20Token%20Pruning%20Paradigm%0AAuthor%3A%20Zhenkai%20Wu%20and%20Xiaowen%20Ma%20and%20Zhenliang%20Ni%20and%20Dengming%20Zhang%20and%20Han%20Shu%20and%20Xin%20Jiang%20and%20Xinghao%20Chen%0AAbstract%3A%20Vision-language%20models%20%28VLMs%29%20excel%20at%20image%20understanding%20tasks%2C%20but%20the%20large%20number%20of%20visual%20tokens%20imposes%20significant%20computational%20costs%2C%20hindering%20deployment%20on%20mobile%20devices.%20Many%20pruning%20methods%20rely%20solely%20on%20token%20importance%20and%20thus%20overlook%20inter-token%20redundancy%2C%20retaining%20numerous%20duplicated%20tokens%20and%20wasting%20capacity.%20Although%20some%20redundancy-aware%20approaches%20have%20been%20proposed%2C%20they%20often%20ignore%20the%20spatial%20relationships%20among%20visual%20tokens.%20This%20can%20lead%20to%20overly%20sparse%20selections%20of%20retained%20tokens%20that%20fail%20to%20adequately%20cover%20the%20regions%20of%20target%20objects.%20To%20address%20these%20limitations%2C%20we%20propose%20VLM-Pruner%2C%20a%20training-free%20token%20pruning%20algorithm%20that%20explicitly%20balances%20redundancy%20and%20spatial%20sparsity.%20We%20introduce%20a%20centrifugal%20token%20pruning%20paradigm%20that%20enables%20near-to-far%20selection%20while%20prioritizing%20the%20preservation%20of%20fine-grained%20object%20details.%20Moreover%2C%20we%20design%20a%20Buffering%20for%20Spatial%20Sparsity%20%28BSS%29%20criterion%20that%20defers%20the%20selection%20of%20spatially%20distant%20tokens.%20We%20further%20adopt%20a%20parallel%20greedy%20strategy%20to%20conduct%20token%20selection%20efficiently.%20To%20mitigate%20information%20loss%20from%20pruning%2C%20we%20selectively%20fuse%20salient%20information%20from%20the%20discarded%20tokens%20into%20the%20retained%20ones.%20Comprehensive%20comparisons%20demonstrate%20that%20VLM-Pruner%20consistently%20outperforms%20strong%20baselines%20across%20five%20VLMs%20with%20an%2088.9%5C%25%20pruning%20rate%2C%20while%20delivering%20an%20end-to-end%20inference%20speedup.%20The%20code%20is%20available%20at%20https%3A//github.com/Casey-bit/VLMPruner.%0ALink%3A%20http%3A//arxiv.org/abs/2512.02700v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVLM-Pruner%253A%2520Buffering%2520for%2520Spatial%2520Sparsity%2520in%2520an%2520Efficient%2520VLM%2520Centrifugal%2520Token%2520Pruning%2520Paradigm%26entry.906535625%3DZhenkai%2520Wu%2520and%2520Xiaowen%2520Ma%2520and%2520Zhenliang%2520Ni%2520and%2520Dengming%2520Zhang%2520and%2520Han%2520Shu%2520and%2520Xin%2520Jiang%2520and%2520Xinghao%2520Chen%26entry.1292438233%3DVision-language%2520models%2520%2528VLMs%2529%2520excel%2520at%2520image%2520understanding%2520tasks%252C%2520but%2520the%2520large%2520number%2520of%2520visual%2520tokens%2520imposes%2520significant%2520computational%2520costs%252C%2520hindering%2520deployment%2520on%2520mobile%2520devices.%2520Many%2520pruning%2520methods%2520rely%2520solely%2520on%2520token%2520importance%2520and%2520thus%2520overlook%2520inter-token%2520redundancy%252C%2520retaining%2520numerous%2520duplicated%2520tokens%2520and%2520wasting%2520capacity.%2520Although%2520some%2520redundancy-aware%2520approaches%2520have%2520been%2520proposed%252C%2520they%2520often%2520ignore%2520the%2520spatial%2520relationships%2520among%2520visual%2520tokens.%2520This%2520can%2520lead%2520to%2520overly%2520sparse%2520selections%2520of%2520retained%2520tokens%2520that%2520fail%2520to%2520adequately%2520cover%2520the%2520regions%2520of%2520target%2520objects.%2520To%2520address%2520these%2520limitations%252C%2520we%2520propose%2520VLM-Pruner%252C%2520a%2520training-free%2520token%2520pruning%2520algorithm%2520that%2520explicitly%2520balances%2520redundancy%2520and%2520spatial%2520sparsity.%2520We%2520introduce%2520a%2520centrifugal%2520token%2520pruning%2520paradigm%2520that%2520enables%2520near-to-far%2520selection%2520while%2520prioritizing%2520the%2520preservation%2520of%2520fine-grained%2520object%2520details.%2520Moreover%252C%2520we%2520design%2520a%2520Buffering%2520for%2520Spatial%2520Sparsity%2520%2528BSS%2529%2520criterion%2520that%2520defers%2520the%2520selection%2520of%2520spatially%2520distant%2520tokens.%2520We%2520further%2520adopt%2520a%2520parallel%2520greedy%2520strategy%2520to%2520conduct%2520token%2520selection%2520efficiently.%2520To%2520mitigate%2520information%2520loss%2520from%2520pruning%252C%2520we%2520selectively%2520fuse%2520salient%2520information%2520from%2520the%2520discarded%2520tokens%2520into%2520the%2520retained%2520ones.%2520Comprehensive%2520comparisons%2520demonstrate%2520that%2520VLM-Pruner%2520consistently%2520outperforms%2520strong%2520baselines%2520across%2520five%2520VLMs%2520with%2520an%252088.9%255C%2525%2520pruning%2520rate%252C%2520while%2520delivering%2520an%2520end-to-end%2520inference%2520speedup.%2520The%2520code%2520is%2520available%2520at%2520https%253A//github.com/Casey-bit/VLMPruner.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.02700v4%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=VLM-Pruner%3A%20Buffering%20for%20Spatial%20Sparsity%20in%20an%20Efficient%20VLM%20Centrifugal%20Token%20Pruning%20Paradigm&entry.906535625=Zhenkai%20Wu%20and%20Xia {"title": "RepSPD: Enhancing SPD Manifold Representation in EEGs via Dynamic Graphs", "author": "Haohui Jia and Zheng Chen and Lingwei Zhu and Xu Cao and Yasuko Matsubara and Takashi Matsubara and Yasushi Sakurai", "abstract": "Decoding brain activity from electroencephalography (EEG) is crucial for neuroscience and clinical applications. Among recent advances in deep learning for EEG, geometric learning stands out as its theoretical underpinnings on symmetric positive definite (SPD) allows revealing structural connectivity analysis in a physics-grounded manner. However, current SPD-based methods focus predominantly on statistical aggregation of EEGs, with frequency-specific synchronization and local topological structures of brain regions neglected. Given this, we propose RepSPD, a novel geometric deep learning (GDL)-based model. RepSPD implements a cross-attention mechanism on the Riemannian manifold to modulate the geometric attributes of SPD with graph-derived functional connectivity features. On top of this, we introduce a global bidirectional alignment strategy to reshape tangent-space embeddings, mitigating geometric distortions caused by curvature and thereby enhancing geometric consistency. Extensive experiments demonstrate that our proposed framework significantly outperforms existing EEG representation methods, exhibiting superior robustness and generalization capabilities.", "link": "http://arxiv.org/abs/2602.22981v1", "date": "2026-02-26", "relevancy": 2.5457, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5299}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5073}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4901}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RepSPD%3A%20Enhancing%20SPD%20Manifold%20Representation%20in%20EEGs%20via%20Dynamic%20Graphs&body=Title%3A%20RepSPD%3A%20Enhancing%20SPD%20Manifold%20Representation%20in%20EEGs%20via%20Dynamic%20Graphs%0AAuthor%3A%20Haohui%20Jia%20and%20Zheng%20Chen%20and%20Lingwei%20Zhu%20and%20Xu%20Cao%20and%20Yasuko%20Matsubara%20and%20Takashi%20Matsubara%20and%20Yasushi%20Sakurai%0AAbstract%3A%20Decoding%20brain%20activity%20from%20electroencephalography%20%28EEG%29%20is%20crucial%20for%20neuroscience%20and%20clinical%20applications.%20Among%20recent%20advances%20in%20deep%20learning%20for%20EEG%2C%20geometric%20learning%20stands%20out%20as%20its%20theoretical%20underpinnings%20on%20symmetric%20positive%20definite%20%28SPD%29%20allows%20revealing%20structural%20connectivity%20analysis%20in%20a%20physics-grounded%20manner.%20However%2C%20current%20SPD-based%20methods%20focus%20predominantly%20on%20statistical%20aggregation%20of%20EEGs%2C%20with%20frequency-specific%20synchronization%20and%20local%20topological%20structures%20of%20brain%20regions%20neglected.%20Given%20this%2C%20we%20propose%20RepSPD%2C%20a%20novel%20geometric%20deep%20learning%20%28GDL%29-based%20model.%20RepSPD%20implements%20a%20cross-attention%20mechanism%20on%20the%20Riemannian%20manifold%20to%20modulate%20the%20geometric%20attributes%20of%20SPD%20with%20graph-derived%20functional%20connectivity%20features.%20On%20top%20of%20this%2C%20we%20introduce%20a%20global%20bidirectional%20alignment%20strategy%20to%20reshape%20tangent-space%20embeddings%2C%20mitigating%20geometric%20distortions%20caused%20by%20curvature%20and%20thereby%20enhancing%20geometric%20consistency.%20Extensive%20experiments%20demonstrate%20that%20our%20proposed%20framework%20significantly%20outperforms%20existing%20EEG%20representation%20methods%2C%20exhibiting%20superior%20robustness%20and%20generalization%20capabilities.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22981v1%0AForm%3A%20https%3A//docs.google.c xperiments%2520demonstrate%2520that%2520our%2520proposed%2520framework%2520significantly%2520outperforms%2520existing%2520EEG%2520representation%2520methods%252C%2520exhibiting%2520superior%2520robustness%2520and%2520generalization%2520capabilities.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.22981v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=RepSPD%3A%20Enhancing%20SPD%20Manifold%20Representation%20in%20EEGs%20via%20Dynamic%20Graphs&entry.906535625=Haohui%20Jia%20and%20Zheng%20Chen%20and%20Lingwei%20Zhu%20and%20Xu%20Cao%20and%20Yasuko%20Matsubara%20and%20Takashi%20Matsubara%20and%20Yasushi%20Sakurai&entry.1292438233=Decoding%20brain%20activity%20from%20electroencephalography%20%28EEG%29%20is%20crucial%20for%20neuroscience%20and%20clinical%20applications.%20Among%20recent%20advances%20in%20deep%20learning%20for%20EEG%2C%20geometric%20learning%20stands%20out%20as%20its%20theoretical%20underpinnings%20on%20symmetric%20positive%20definite%20%28SPD%29%20allows%20revealing%20structural%20connectivity%20analysis%20in%20a%20physics-grounded%20manner.%20However%2C%20current%20SPD-based%20methods%20focus%20predominantly%20on%20statistical%20aggregation%20of%20EEGs%2C%20with%20frequency-specific%20synchronization%20and%20local%20topological%20structures%20of%20brain%20regions%20neglected.%20Given%20this%2C%20we%20propose%20RepSPD%2C%20a%20novel%20geometric%20deep%20learning%20%28GDL%29-based%20model.%20RepSPD%20implements%20a%20cross-attention%20mechanism%20on%20the%20Riemannian%20manifold%20to%20modulate%20the%20geometric%20attributes%20of%20SPD%20with%20graph-derived%20functional%20connectivity%20features.%20On%20top%20of%20this%2C%20we%20introduce%20a%20global%20bidirectional%20alignment%20strategy%20to%20reshape%20tangent-space%20embeddings%2C%20mitigating%20geometric%20distortions%20caused%20by%20curvature%20and%20thereby%20enhancing%20geometric%20consistency.%20Extensive%20experiments%20demonstrate%20that%20our%20proposed%20framework%20significantly%20outperforms%20existing%20EEG%20representation%20methods%2C%20exhibiting%20superior%20robustness%20and%20generalization%20capabilities.&entry.1838667208=http%3A//arxiv.org/abs/2602.22981v1&entry.124074799=Read"},
{"title": "Skarimva: Skeleton-based Action Recognition is a Multi-view Application", "author": "Daniel Bermuth and Alexander Poeppel and Wolfgang Reif", "abstract": "Human action recognition plays an important role when developing intelligent interactions between humans and machines. While there is a lot of active research on improving the machine learning algorithms for skeleton-based action recognition, not much attention has been given to the quality of the input skeleton data itself. This work demonstrates that by making use of multiple camera views to triangulate more accurate 3D~skeletons, the performance of state-of-the-art action recognition models can be improved significantly. This suggests that the quality of the input data is currently a limiting factor for the performance of these models. Based on these results, it is argued that the cost-benefit ratio of using multiple cameras is very favorable in most practical use-cases, therefore future research in skeleton-based action recognition should consider multi-view applications as the standard setup.", "link": "http://arxiv.org/abs/2602.23231v1", "date": "2026-02-26", "relevancy": 2.545, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5141}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5065}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5065}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Skarimva%3A%20Skeleton-based%20Action%20Recognition%20is%20a%20Multi-view%20Application&body=Title%3A%20Skarimva%3A%20Skeleton-based%20Action%20Recognition%20is%20a%20Multi-view%20Application%0AAuthor%3A%20Daniel%20Bermuth%20and%20Alexander%20Poeppel%20and%20Wolfgang%20Reif%0AAbstract%3A%20Human%20action%20recognition%20plays%20an%20important%2 {"title": "MoDora: Tree-Based Semi-Structured Document Analysis System", "author": "Bangrui Xu and Qihang Yao and Zirui Tang and Xuanhe Zhou and Yeye He and Shihan Yu and Qianqian Xu and Bin Wang and Guoliang Li and Conghui He and Fan Wu", "abstract": "Semi-structured documents integrate diverse interleaved data elements (e.g., tables, charts, hierarchical paragraphs) arranged in various and often irregular layouts. These documents are widely observed across domains and account for a large portion of real-world data. However, existing methods struggle to support natural language question answering over these documents due to three main technical challenges: (1) The elements extracted by techniques like OCR are often fragmented and stripped of their original semantic context, making them inadequate for analysis. (2) Existing approaches lack effective representations to capture hierarchical structures within documents (e.g., associating tables with nested chapter titles) and to preserve layout-specific distinctions (e.g., differentiating sidebars from main content). (3) Answering questions often requires retrieving and aligning relevant information scattered across multiple regions or pages, such as linking a descriptive paragraph to table cells located elsewhere in the document.\n  To address these issues, we propose MoDora, an LLM-powered system for semi-structured document analysis. First, we adopt a local-alignment aggregation strategy to convert OCR-parsed elements into layout-aware components, and conduct type-specific information extraction for components with hierarchical titles or non-text elements. Second, we design the Component-Correlation Tree (CCTree) to hierarchically organize components, explicitly modeling inter-component relations and layout distinctions through a bottom-up cascade summarization process. Finally, we propose a question-type-aware retrieval strategy that supports (1) layout-based grid partitioning for location-based retrieval and (2) LLM-guided pruning for semantic-based retrieval. Experiments show MoDora outperforms baselines by 5.97%-61.07% in accuracy. The code is at https://github.com/weAIDB/MoDora.", "link": "http://arxiv.org/abs/2602.23061v1", "date": "2026-02-26", "relevancy": 2.5233, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5064}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5064}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5011}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MoDora%3A%20Tree-Based%20Semi-Structured%20Document%20Analysis%20System&body=Title%3A%20MoDora%3A%20Tree-Based%20Semi-Structured%20Document%20Analysis%20System%0AAuthor%3A%20Bangrui%20Xu%20and%20Qihang%20Yao%20and%20Zirui%20Tang%20and%20Xuanhe%20Zhou%20and%20Yeye%20He%20and%20Shihan%20Yu%20and%20Qianqian%20Xu%20and%20Bin%20Wang%20and%20Guoliang%20Li%20and%20Conghui%20He%20and%20Fan%20Wu%0AAbstract%3A%20Semi-structured%20documents%20integrate%20diverse%20interleaved%20data%20elements%20%28e.g.%2C%20tables%2C%20charts%2C%20hierarchical%20paragraphs%29%20arranged%20in%20various%20and%20often%20irregular%20layouts.%20These%20documents%20are%20widely%20observed%20across%20domains%20and%20account%20for%20a%20large%20portion%20of%20real-world%20data.%20However%2C%20existing%20methods%20struggle%20to%20support%20natural%20language%20question%20answering%20over%20these%20documents%20due%20to%20three%20main%20technical%20challenges%3A%20%281%29%20The%20elements%20extracted%20by%20techniques%20like%20OCR%20are%20often%20fragmented%20and%20stripped%20of%20their%20original%20semantic%20context%2C%20making%20them%20inadequate%20for%20analysis.%20%282%29%20Existing%20approaches%20lack {"title": "Learning Continuous Wasserstein Barycenter Space for Generalized All-in-One Image Restoration", "author": "Xiaole Tang and Xiaoyi He and Jiayi Xu and Xiang Gu and Jian Sun", "abstract": "Despite substantial advances in all-in-one image restoration for addressing diverse degradations within a unified model, existing methods remain vulnerable to out-of-distribution degradations, thereby limiting their generalization in real-world scenarios. To tackle the challenge, this work is motivated by the intuition that multisource degraded feature distributions are induced by different degradation-specific shifts from an underlying degradation-agnostic distribution, and recovering such a shared distribution is thus crucial for achieving generalization across degradations. With this insight, we propose BaryIR, a representation learning framework that aligns multisource degraded features in the Wasserstein barycenter (WB) space, which models a degradation-agnostic distribution by minimizing the average of Wasserstein distances to multisource degraded distributions. We further introduce residual subspaces, whose embeddings are mutually contrasted while remaining orthogonal to the WB embeddings. Consequently, BaryIR explicitly decouples two orthogonal spaces: a WB space that encodes the degradation-agnostic invariant contents shared across degradations, and residual subspaces that adaptively preserve the degradation-specific knowledge. This disentanglement mitigates overfitting to in-distribution degradations and enables adaptive restoration grounded on the degradation-agnostic shared invariance. Extensive experiments demonstrate that BaryIR performs competitively against state-of-the-art all-in-one methods. Notably, BaryIR generalizes well to unseen degradations (\\textit{e.g.,} types and levels) and shows remarkable robustness in learning generalized features, even when trained on limited degradation types and evaluated on real-world data with mixed degradations.", "link": "http://arxiv.org/abs/2602.23169v1", "date": "2026-02-26", "relevancy": 2.5232, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5203}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5051}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4886}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Continuous%20Wasserstein%20Barycenter%20Space%20for%20Generalized%20All-in-One%20Image%20Restoration&body=Title%3A%20Learning%20Continuous%20Wasserstein%20Barycenter%20Space%20for%20Generalized%20All-in-One%20Image%20Restoration%0AAuthor%3A%20Xiaole%20Tang%20and%20Xiaoyi%20He%20and%20Jiayi%20Xu%20and%20Xiang%20Gu%20and%20Jian%20Sun%0AAbstract%3A%20Despite%20substantial%20advances%20in%20all-in-one%20image%20restoration%20for%20addressing%20diverse%20degradations%20within%20a%20unified%20model%2C%20existing%20methods%20remain%20vulnerable%20to%20out-of-distribution%20degradations%2C%20thereby%20limiting%20their%20generalization%20in%20real-world%20scenarios.%20To%20tackle%20the%20challenge%2C%20this%20work%20is%20motivated%20by%20the%20intuition%20that%20multisource%20degraded%20feature%20distributions%20are%20induced%20by%20different%20degradation-specific%20shifts%20from%20an%20underlying%20degradation-agnostic%20distribution%2C%20and%20recovering%20such%20a%20shared%20distribution%20is%20thus%20crucial%20for%20achieving%20generalization%20across%20degradations.%20With%20this%20insight%2C%20we%20propose%20BaryIR%2C%20a%20representation%20learning%20framework%20that%20aligns%20multisource%20degraded%20features%20in%20the%20Wasserstein%20barycenter%20%28WB%29%20space%2C%20which%20models%20a%20degradation-agnostic%20distribution%20by%20minimizing%20the%20average%20of%20Wasserstein%20distances%20to%20multisource%20degraded%20distributions.%20We%20further%20introduce%20residual%20subspaces%2C%20whose%20embeddings%20are%20mutually%20contrasted%20while%20remaining%20orthogonal%20to%20the%20WB%20embeddings.%20Consequently%2C%20BaryIR%20explicitly%20decouples%20two%20orthogonal%20spaces%3A%20a%20WB%20space%20that%20encodes%20the%20degradation-agnostic%20invariant%20contents%20shared%20across%20degradations%2C%20and%20residual%20subspaces%20that%20adaptively%20preserve%20the%20degradation-specific%20knowledge.%20This%20disentanglement%20mitigates%20overfitting%20to%20in-distribution%20degradations%20and%20enables%20adaptive%20restoration%20grounded%20on%20the%20degradation-agnostic%20shared%20invariance.%20Extensive%20experiments%20demonstrate%20that%20BaryIR%20performs%20competitively%20against%20state-of-the-art%20all-in-one%20methods.%20Notably%2C%20BaryIR%20generalizes%20well%20to%20unseen%20degradations%20%28%5Ctextit%7Be.g.%2C%7D%20types%20and%20levels%29%20and%20shows%20remarkable%20robustness%20in%20learning%20generalized%20features%2C%20even%20when%20trained%20on%20limited%20degradation%20types%20and%20evaluated%20on%20real-world%20data%20with%20mixed%20degradations.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23169v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520Continuous%2520Wasserstein%2520Barycenter%2520Space%2520for%2520Generalized%2520All-in-One%2520Image%2520Restoration%26entry.906535625%3DXiaole%2520Tang%2520and%2520Xiaoyi%2520He%2520and%2520Jiayi%2520Xu%2520and%2520Xiang%2520Gu%2520and%2520Jian%2520Sun%26entry.1292438233%3DDespite%2520substantial%2520advances%2520in%2520all-in-one%2520image%2520restoration%2520for%2520addressing%2520diverse%2520degradations%2520within%2520a%2520unified%2520model%252C%2520existing%2520methods%2520remain%2520vulnerable%2520to%2520out-of

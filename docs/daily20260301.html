{"title": "Hypernetwork-based approach for grid-independent functional data clustering", "author": "Anirudh Thatipelli and Ali Siahkoohi", "abstract": "Functional data clustering is concerned with grouping functions that share similar structure, yet most existing methods implicitly operate on sampled grids, causing cluster assignments to depend on resolution, sampling density, or preprocessing choices rather than on the underlying functions themselves. To address this limitation, we introduce a framework that maps discretized function observations -- at arbitrary resolution and on arbitrary grids -- into a fixed-dimensional vector space via an auto-encoding architecture. The encoder is a hypernetwork that maps coordinate-value pairs to the weight space of an implicit neural representation (INR), which serves as the decoder. Because INRs represent functions with very few parameters, this design yields compact representations that are decoupled from the sampling grid, while the hypernetwork amortizes weight prediction across the dataset. Clustering is then performed in this weight space using standard algorithms, making the approach agnostic to both the discretization and the choice of clustering method. By means of synthetic and real-world experiments in high-dimensional settings, we demonstrate competitive clustering performance that is robust to changes in sampling resolution -- including generalization to resolutions not seen during training.", "link": "http://arxiv.org/abs/2602.22823v1", "date": "2026-02-26", "relevancy": 2.3725, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4852}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4715}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4668}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hypernetwork-based%20approach%20for%20grid-independent%20functional%20data%20clustering&body=Title%3A%20Hypernetwork-based%20approach%20for%20grid-independent%20functional%20data%20clustering%0AAuthor%3A%20Anirudh%20Thatipelli%20and%20Ali%20Siahkoohi%0AAbstract%3A%20Functional%20data%20clustering%20is%20concerned%20with%20grouping%20functions%20that%20share%20similar%20structure%2C%20yet%20most%20existing%20methods%20implicitly%20operate%20on%20sampled%20grids%2C%20causing%20cluster%20assignments%20to%20depend%20on%20resolution%2C%20sampling%20density%2C%20or%20preprocessing%20choices%20rather%20than%20on%20the%20underlying%20functions%20themselves.%20To%20address%20this%20limitation%2C%20we%20introduce%20a%20framework%20that%20maps%20discretized%20function%20observations%20--%20at%20arbitrary%20resolution%20and%20on%20arbitrary%20grids%20--%20into%20a%20fixed-dimensional%20vector%20space%20via%20an%20auto-encoding%20architecture.%20The%20encoder%20is%20a%20hypernetwork%20that%20maps%20coordinate-value%20pairs%20to%20the%20weight%20space%20of%20an%20implicit%20neural%20representation%20%28INR%29%2C%20which%20serves%20as%20the%20decoder.%20Because%20INRs%20represent%20functions%20with%20very%20few%20parameters%2C%20this%20design%20yields%20compact%20representations%20that%20are%20decoupled%20from%20the%20sampling%20grid%2C%20while%20the%20hypernetwork%20amortizes%20weight%20prediction%20across%20the%20dataset.%20Clustering%20is%20then%20performed%20in%20this%20weight%20space%20using%20standard%20algorithms%2C%20making%20the%20approach%20agnostic%20to%20both%20the%20discretization%20and%20the%20choice%20of%20clustering%20method.%20By%20means%20of%20synthetic%20and%20real-world%20experiments%20in%20high-dimensional%20settings%2C%20we%20demonstrate%20competitive%20clustering%20performance%20that%20is%20robust%20to%20changes%20in%20sampling%20resolution%20--%20including%20generalization%20to%20resolutions%20not%20seen%20during%20training.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22823v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHypernetwork-based%2520approach%2520for%2520grid-independent%2520functional%2520data%2520clustering%26entry.906535625%3DAnirudh%2520Thatipelli%2520and%2520Ali%2520Siahkoohi%26entry.1292438233%3DFunctional%2520data%2520clustering%2520is%2520concerned%2520with%2520grouping%2520functions%2520that%2520share%2520similar%2520structure%252C%2520yet%2520most%2520existing%2520methods%2520implicitly%2520operate%2520on%2520sampled%2520grids%252C%2520causing%2520cluster%2520assignments%2520to%2520depend%2520on%2520resolution%252C%2520sampling%2520density%252C%2520or%2520preprocessing%2520choices%2520rather%2520than%2520on%2520the%2520underlying%2520functions%2520themselves.%2520To%2520address%2520this%2520limitation%252C%2520we%2520introduce%2520a%2520framework%2520that%2520maps%2520discretized%2520function%2520observations%2520--%2520at%2520arbitrary%2520resolution%2520and%2520on%2520arbitrary%2520grids%2520--%2520into%2520a%2520fixed-dimensional%2520vector%2520space%2520via%2520an%2520auto-encoding%2520architecture.%2520The%2520encoder%2520is%2520a%2520hypernetwork%2520that%2520maps%2520coordinate-value%2520pairs%2520to%2520the%2520weight%2520space%2520of%2520an%2520implicit%2520neural%2520representation%2520%2528INR%2529%252C%2520which%2520serves%2520as%2520the%2520decoder.%2520Because%2520INRs%2520represent%2520functions%2520with%2520very%2520few%2520parameters%252C%2520this%2520design%2520yields%2520compact%2520representations%2520that%2520are%2520decoupled%2520from%2520the%2520sampling%2520grid%252C%2520while%2520the%2520hypernetwork%2520amortizes%2520weight%2520prediction%2520across%2520the%2520dataset.%2520Clustering%2520is%2520then%2520performed%2520in%2520this%2520weight%2520space%2520using%2520standard%2520algorithms%252C%2520making%2520the%2520approach%2520agnostic%2520to%2520both%2520the%2520discretization%2520and%2520the%2520choice%2520of%2520clustering%2520method.%2520By%2520means%2520of%2520synthetic%2520and%2520real-world%2520experiments%2520in%2520high-dimensional%2520settings%252C%2520we%2520demonstrate%2520competitive%2520clustering%2520performance%2520that%2520is%2520robust%2520to%2520changes%2520in%2520sampling%2520resolution%2520--%2520including%2520generalization%2520to%2520resolutions%2520not%2520seen%2520during%2520training.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.22823v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Hypernetwork-based%20approach%20for%20grid-independent%20functional%20data%20clustering&entry.906535625=Anirudh%20Thatipelli%20and%20Ali%20Siahkoohi&entry.1292438233=Functional%20data%20clustering%20is%20concerned%20with%20grouping%20functions%20that%20share%20similar%20structure%2C%20yet%20most%20existing%20methods%20implicitly%20operate%20on%20sampled%20grids%2C%20causing%20cluster%20assignments%20to%20depend%20on%20resolution%2C%20sampling%20density%2C%20or%20preprocessing%20choices%20rather%20than%20on%20the%20underlying%20functions%20themselves.%20To%20address%20this%20limitation%2C%20we%20introduce%20a%20framework%20that%20maps%20discretized%20function%20observations%20--%20at%20arbitrary%20resolution%20and%20on%20arbitrary%20grids%20--%20into%20a%20fixed-dimensional%20vector%20space%20via%20an%20auto-encoding%20architecture.%20The%20encoder%20is%20a%20hypernetwork%20that%20maps%20coordinate-value%20pairs%20to%20the%20weight%20space%20of%20an%20implicit%20neural%20representation%20%28INR%29%2C%20which%20serves%20as%20the%20decoder.%20Because%20INRs%20represent%20functions%20with%20very%20few%20parameters%2C%20this%20design%20yields%20compact%20representations%20that%20are%20decoupled%20from%20the%20sampling%20grid%2C%20while%20the%20hypernetwork%20amortizes%20weight%20prediction%20across%20the%20dataset.%20Clustering%20is%20then%20performed%20in%20this%20weight%20space%20using%20standard%20algorithms%2C%20making%20the%20approach%20agnostic%20to%20both%20the%20discretization%20and%20the%20choice%20of%20clustering%20method.%20By%20means%20of%20synthetic%20and%20real-world%20experiments%20in%20high-dimensional%20settings%2C%20we%20demonstrate%20competitive%20clustering%20performance%20that%20is%20robust%20to%20changes%20in%20sampling%20resolution%20--%20including%20generalization%20to%20resolutions%20not%20seen%20during%20training.&entry.1838667208=http%3A//arxiv.org/abs/2602.22823v1&entry.124074799=Read"},
{"title": "A Proper Scoring Rule for Virtual Staining", "author": "Samuel Tonks and Steve Hood and Ryan Musso and Ceridwen Hopely and Steve Titus and Minh Doan and Iain Styles and Alexander Krull", "abstract": "Generative virtual staining (VS) models for high-throughput screening (HTS) can provide an estimated posterior distribution of possible biological feature values for each input and cell. However, when evaluating a VS model, the true posterior is unavailable. Existing evaluation protocols only check the accuracy of the marginal distribution over the dataset rather than the predicted posteriors. We introduce information gain (IG) as a cell-wise evaluation framework that enables direct assessment of predicted posteriors. IG is a strictly proper scoring rule and comes with a sound theoretical motivation allowing for interpretability, and for comparing results across models and features. We evaluate diffusion- and GAN-based models on an extensive HTS dataset using IG and other metrics and show that IG can reveal substantial performance differences other metrics cannot.", "link": "http://arxiv.org/abs/2602.23305v1", "date": "2026-02-26", "relevancy": 2.3571, "topK": [{"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.4823}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4668}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4651}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Proper%20Scoring%20Rule%20for%20Virtual%20Staining&body=Title%3A%20A%20Proper%20Scoring%20Rule%20for%20Virtual%20Staining%0AAuthor%3A%20Samuel%20Tonks%20and%20Steve%20Hood%20and%20Ryan%20Musso%20and%20Ceridwen%20Hopely%20and%20Steve%20Titus%20and%20Minh%20Doan%20and%20Iain%20Styles%20and%20Alexander%20Krull%0AAbstract%3A%20Generative%20virtual%20staining%20%28VS%29%20models%20for%20high-throughput%20screening%20%28HTS%29%20can%20provide%20an%20estimated%20posterior%20distribution%20of%20possible%20biological%20feature%20values%20for%20each%20input%20and%20cell.%20However%2C%20when%20evaluating%20a%20VS%20model%2C%20the%20true%20posterior%20is%20unavailable.%20Existing%20evaluation%20protocols%20only%20check%20the%20accuracy%20of%20the%20marginal%20distribution%20over%20the%20dataset%20rather%20than%20the%20predicted%20posteriors.%20We%20introduce%20information%20gain%20%28IG%29%20as%20a%20cell-wise%20evaluation%20framework%20that%20enables%20direct%20assessment%20of%20predicted%20posteriors.%20IG%20is%20a%20strictly%20proper%20scoring%20rule%20and%20comes%20with%20a%20sound%20theoretical%20motivation%20allowing%20for%20interpretability%2C%20and%20for%20comparing%20results%20across%20models%20and%20features.%20We%20evaluate%20diffusion-%20and%20GAN-based%20models%20on%20an%20extensive%20HTS%20dataset%20using%20IG%20and%20other%20metrics%20and%20show%20that%20IG%20can%20reveal%20substantial%20performance%20differences%20other%20metrics%20cannot.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23305v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Proper%2520Scoring%2520Rule%2520for%2520Virtual%2520Staining%26entry.906535625%3DSamuel%2520Tonks%2520and%2520Steve%2520Hood%2520and%2520Ryan%2520Musso%2520and%2520Ceridwen%2520Hopely%2520and%2520Steve%2520Titus%2520and%2520Minh%2520Doan%2520and%2520Iain%2520Styles%2520and%2520Alexander%2520Krull%26entry.1292438233%3DGenerative%2520virtual%2520staining%2520%2528VS%2529%2520models%2520for%2520high-throughput%2520screening%2520%2528HTS%2529%2520can%2520provide%2520an%2520estimated%2520posterior%2520distribution%2520of%2520possible%2520biological%2520feature%2520values%2520for%2520each%2520input%2520and%2520cell.%2520However%252C%2520when%2520evaluating%2520a%2520VS%2520model%252C%2520the%2520true%2520posterior%2520is%2520unavailable.%2520Existing%2520evaluation%2520protocols%2520only%2520check%2520the%2520accuracy%2520of%2520the%2520marginal%2520distribution%2520over%2520the%2520dataset%2520rather%2520than%2520the%2520predicted%2520posteriors.%2520We%2520introduce%2520information%2520gain%2520%2528IG%2529%2520as%2520a%2520cell-wise%2520evaluation%2520framework%2520that%2520enables%2520direct%2520assessment%2520of%2520predicted%2520posteriors.%2520IG%2520is%2520a%2520strictly%2520proper%2520scoring%2520rule%2520and%2520comes%2520with%2520a%2520sound%2520theoretical%2520motivation%2520allowing%2520for%2520interpretability%252C%2520and%2520for%2520comparing%2520results%2520across%2520models%2520and%2520features.%2520We%2520evaluate%2520diffusion-%2520and%2520GAN-based%2520models%2520on%2520an%2520extensive%2520HTS%2520dataset%2520using%2520IG%2520and%2520other%2520metrics%2520and%2520show%2520that%2520IG%2520can%2520reveal%2520substantial%2520performance%2520differences%2520other%2520metrics%2520cannot.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.23305v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=A%20Proper%20Scoring%20Rule%20for%20Virtual%20Staining&entry.906535625=Samuel%20Tonks%20and%20Steve%20Hood%20and%20Ryan%20Musso%20and%20Ceridwen%20Hopely%20and%20Steve%20Titus%20and%20Minh%20Doan%20and%20Iain%20Styles%20and%20Alexander%20Krull&entry.1292438233=Generative%20virtual%20staining%20%28VS%29%20models%20for%20high-throughput%20screening%20%28HTS%29%20can%20provide%20an%20estimated%20posterior%20distribution%20of%20possible%20biological%20feature%20values%20for%20each%20input%20and%20cell.%20However%2C%20when%20evaluating%20a%20VS%20model%2C%20the%20true%20posterior%20is%20unavailable.%20Existing%20evaluation%20protocols%20only%20check%20the%20accuracy%20of%20the%20marginal%20distribution%20over%20the%20dataset%20rather%20than%20the%20predicted%20posteriors.%20We%20introduce%20information%20gain%20%28IG%29%20as%20a%20cell-wise%20evaluation%20framework%20that%20enables%20direct%20assessment%20of%20predicted%20posteriors.%20IG%20is%20a%20strictly%20proper%20scoring%20rule%20and%20comes%20with%20a%20sound%20theoretical%20motivation%20allowing%20for%20interpretability%2C%20and%20for%20comparing%20results%20across%20models%20and%20features.%20We%20evaluate%20diffusion-%20and%20GAN-based%20models%20on%20an%20extensive%20HTS%20dataset%20using%20IG%20and%20other%20metrics%20and%20show%20that%20IG%20can%20reveal%20substantial%20performance%20differences%20other%20metrics%20cannot.&entry.1838667208=http%3A//arxiv.org/abs/2602.23305v1&entry.124074799=Read"},
{"title": "MovieTeller: Tool-augmented Movie Synopsis with ID Consistent Progressive Abstraction", "author": "Yizhi Li and Xiaohan Chen and Miao Jiang and Wentao Tang and Gaoang Wang", "abstract": "With the explosive growth of digital entertainment, automated video summarization has become indispensable for applications such as content indexing, personalized recommendation, and efficient media archiving. Automatic synopsis generation for long-form videos, such as movies and TV series, presents a significant challenge for existing Vision-Language Models (VLMs). While proficient at single-image captioning, these general-purpose models often exhibit critical failures in long-duration contexts, primarily a lack of ID-consistent character identification and a fractured narrative coherence. To overcome these limitations, we propose MovieTeller, a novel framework for generating movie synopses via tool-augmented progressive abstraction. Our core contribution is a training-free, tool-augmented, fact-grounded generation process. Instead of requiring costly model fine-tuning, our framework directly leverages off-the-shelf models in a plug-and-play manner. We first invoke a specialized face recognition model as an external \"tool\" to establish Factual Groundings--precise character identities and their corresponding bounding boxes. These groundings are then injected into the prompt to steer the VLM's reasoning, ensuring the generated scene descriptions are anchored to verifiable facts. Furthermore, our progressive abstraction pipeline decomposes the summarization of a full-length movie into a multi-stage process, effectively mitigating the context length limitations of current VLMs. Experiments demonstrate that our approach yields significant improvements in factual accuracy, character consistency, and overall narrative coherence compared to end-to-end baselines.", "link": "http://arxiv.org/abs/2602.23228v1", "date": "2026-02-26", "relevancy": 2.3567, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.598}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5874}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5874}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MovieTeller%3A%20Tool-augmented%20Movie%20Synopsis%20with%20ID%20Consistent%20Progressive%20Abstraction&body=Title%3A%20MovieTeller%3A%20Tool-augmented%20Movie%20Synopsis%20with%20ID%20Consistent%20Progressive%20Abstraction%0AAuthor%3A%20Yizhi%20Li%20and%20Xiaohan%20Chen%20and%20Miao%20Jiang%20and%20Wentao%20Tang%20and%20Gaoang%20Wang%0AAbstract%3A%20With%20the%20explosive%20growth%20of%20digital%20entertainment%2C%20automated%20video%20summarization%20has%20become%20indispensable%20for%20applications%20such%20as%20content%20indexing%2C%20personalized%20recommendation%2C%20and%20efficient%20media%20archiving.%20Automatic%20synopsis%20generation%20for%20long-form%20videos%2C%20such%20as%20movies%20and%20TV%20series%2C%20presents%20a%20significant%20challenge%20for%20existing%20Vision-Language%20Models%20%28VLMs%29.%20While%20proficient%20at%20single-image%20captioning%2C%20these%20general-purpose%20models%20often%20exhibit%20critical%20failures%20in%20long-duration%20contexts%2C%20primarily%20a%20lack%20of%20ID-consistent%20character%20identification%20and%20a%20fractured%20narrative%20coherence.%20To%20overcome%20these%20limitations%2C%20we%20propose%20MovieTeller%2C%20a%20novel%20framework%20for%20generating%20movie%20synopses%20via%20tool-augmented%20progressive%20abstraction.%20Our%20core%20contribution%20is%20a%20training-free%2C%20tool-augmented%2C%20fact-grounded%20generation%20process.%20Instead%20of%20requiring%20costly%20model%20fine-tuning%2C%20our%20framework%20directly%20leverages%20off-the-shelf%20models%20in%20a%20plug-and-play%20manner.%20We%20first%20invoke%20a%20specialized%20face%20recognition%20model%20as%20an%20external%20%22tool%22%20to%20establish%20Factual%20Groundings--precise%20character%20identities%20and%20their%20corresponding%20bounding%20boxes.%20These%20groundings%20are%20then%20injected%20into%20the%20prompt%20to%20steer%20the%20VLM%27s%20reasoning%2C%20ensuring%20the%20generated%20scene%20descriptions%20are%20anchored%20to%20verifiable%20facts.%20Furthermore%2C%20our%20progressive%20abstraction%20pipeline%20decomposes%20the%20summarization%20of%20a%20full-length%20movie%20into%20a%20multi-stage%20process%2C%20effectively%20mitigating%20the%20context%20length%20limitations%20of%20current%20VLMs.%20Experiments%20demonstrate%20that%20our%20approach%20yields%20significant%20improvements%20in%20factual%20accuracy%2C%20character%20consistency%2C%20and%20overall%20narrative%20coherence%20compared%20to%20end-to-end%20baselines.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23228v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMovieTeller%253A%2520Tool-augmented%2520Movie%2520Synopsis%2520with%2520ID%2520Consistent%2520Progressive%2520Abstraction%26entry.906535625%3DYizhi%2520Li%2520and%2520Xiaohan%2520Chen%2520and%2520Miao%2520Jiang%2520and%2520Wentao%2520Tang%2520and%2520Gaoang%2520Wang%26entry.1292438233%3DWith%2520the%2520explosive%2520growth%2520of%2520digital%2520entertainment%252C%2520automated%2520video%2520summarization%2520has%2520become%2520indispensable%2520for%2520applications%2520such%2520as%2520content%2520indexing%252C%2520personalized%2520recommendation%252C%2520and%2520efficient%2520media%2520archiving.%2520Automatic%2520synopsis%2520generation%2520for%2520long-form%2520videos%252C%2520such%2520as%2520movies%2520and%2520TV%2520series%252C%2520presents%2520a%2520significa 0consistency%252C%2520and%2520overall%2520narrative%2520coherence%2520compared%2520to%2520end-to-end%2520baselines.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.23228v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MovieTeller%3A%20Tool-augmented%20Movie%20Synopsis%20with%20ID%20Consistent%20Progressive%20Abstraction&entry.906535625=Yizhi%20Li%20and%20Xiaohan%20Chen%20and%20Miao%20Jiang%20and%20Wentao%20Tang%20and%20Gaoang%20Wang&entry.1292438233=With%20the%20explosive%20growth%20of%20digital%20entertainment%2C%20automated%20video%20summarization%20has%20become%20indispensable%20for%20applications%20such%20as%20content%20indexing%2C%20personalized%20recommendation%2C%20and%20efficient%20media%20archiving.%20Automatic%20synopsis%20generation%20for%20long-form%20videos%2C%20such%20as%20movies%20and%20TV%20series%2C%20presents%20a%20significant%20challenge%20for%20existing%20Vision-Language%20Models%20%28VLMs%29.%20While%20proficient%20at%20single-image%20captioning%2C%20these%20general-purpose%20models%20often%20exhibit%20critical%20failures%20in%20long-duration%20contexts%2C%20primarily%20a%20lack%20of%20ID-consistent%20character%20identification%20and%20a%20fractured%20narrative%20coherence.%20To%20overcome%20these%20limitations%2C%20we%20propose%20MovieTeller%2C%20a%20novel%20framework%20for%20generating%20movie%20synopses%20via%20tool-augmented%20progressive%20abstraction.%20Our%20core%20contribution%20is%20a%20training-free%2C%20tool-augmented%2C%20fact-grounded%20generation%20process.%20Instead%20of%20requiring%20costly%20model%20fine-tuning%2C%20our%20framework%20directly%20leverages%20off-the-shelf%20models%20in%20a%20plug-and-play%20manner.%20We%20first%20invoke%20a%20specialized%20face%20recognition%20model%20as%20an%20external%20%22tool%22%20to%20establish%20Factual%20Groundings--precise%20character%20identities%20and%20their%20corresponding%20bo {"title": "Regular Fourier Features for Nonstationary Gaussian Processes", "author": "Arsalan Jawaid and Abdullah Karatas and J\u00f6rg Seewig", "abstract": "Simulating a Gaussian process requires sampling from a high-dimensional Gaussian distribution, which scales cubically with the number of sample locations. Spectral methods address this challenge by exploiting the Fourier representation, treating the spectral density as a probability distribution for Monte Carlo approximation. Although this probabilistic interpretation works for stationary processes, it is overly restrictive for the nonstationary case, where spectral densities are generally not probability measures. We propose regular Fourier features for harmonizable processes that avoid this limitation. Our method discretizes the spectral representation directly, preserving the correlation structure among spectral weights without requiring probability assumptions. Under a finite spectral support assumption, this yields an efficient low-rank approximation that is positive semi-definite by construction. When the spectral density is unknown, the framework extends naturally to kernel learning from data. We demonstrate the method on locally stationary kernels and on harmonizable mixture kernels with complex-valued spectral densities.", "link": "http://arxiv.org/abs/2602.23006v1", "date": "2026-02-26", "relevancy": 2.3552, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4759}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4689}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.4684}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Regular%20Fourier%20Features%20for%20Nonstationary%20Gaussian%20Processes&body=Title%3A%20Regular%20Fourier%20Features%20for%20Nonstationary%20Gaussian%20Processes%0AAuthor%3A%20Arsalan%20Jawaid%20and%20Abdullah%20Karatas%20and%20J%C3%B6rg%20Seewig%0AAbstract%3A%20Simulating%20a%20Gaussian%20process%20requires%20sampling%20from%20a%20high-dimensional%20Gaussian%20distribution%2C%20which%20scales%20cubically%20with%20the%20number%20of%20sample%20locations.%20Spectral%20methods%20address%20this%20challenge%20by%20exploiting%20the%20Fourier%20representation%2C%20treating%20the%20spectral%20density%20as%20a%20probability%20distribution%20for%20Monte%20Carlo%20approximation.%20Although%20this%20probabilistic%20interpretation%20works%20for%20stationary%20processes%2C%20it%20is%20overly%20restrictive%20for%20the%20nonstationary%20case%2C%20where%20spectral%20densities%20are%20generally%20not%20probability%20measures.%20We%20propose%20regular%20Fourier%20features%20for%20harmonizable%20processes%20that%20avoid%20this%20limitation.%20Our%20method%20discretizes%20the%20spectral%20representation%20directly%2C%20preserving%20the%20correlation%20structure%20among%20spectral%20weights%20without%20requiring%20probability%20assumptions.%20Under%20a%20finite%20spectral%20support%20assumption%2C%20this%20yields%20an%20efficient%20low-rank%20approximation%20that%20is%20positive%20semi-definite%20by%20construction.%20When%20the%20spectral%20density%20is%20unknown%2C%20the%20framework%20extends%20naturally%20to%20kernel%20learning%20from%20data.%20We%20demonstrate%20the%20method%20on%20locally%20stationary%20kernels%20and%20on%20harmonizable%20mixture%20kernels%20with%20complex-valued%20spectral%20densities.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23006v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRegular%2520Fourier%2520Features%2520for%2520Nonstationary%2520Gaussian%2520Processes%26entry.906535625%3DArsalan%2520Jawaid%2520and%2520Abdullah%2520Karatas%2520and%2520J%25C3%25 {"title": "Make It Hard to Hear, Easy to Learn: Long-Form Bengali ASR and Speaker Diarization via Extreme Augmentation and Perfect Alignment", "author": "Sanjid Hasan and Risalat Labib and A H M Fuad and Bayazid Hasan", "abstract": "Although Automatic Speech Recognition (ASR) in Bengali has seen significant progress, processing long-duration audio and performing robust speaker diarization remain critical research gaps. To address the severe scarcity of joint ASR and diarization resources for this language, we introduce Lipi-Ghor-882, a comprehensive 882-hour multi-speaker Bengali dataset. In this paper, detailing our submission to the DL Sprint 4.0 competition, we systematically evaluate various architectures and approaches for long-form Bengali speech. For ASR, we demonstrate that raw data scaling is ineffective; instead, targeted fine-tuning utilizing perfectly aligned annotations paired with synthetic acoustic degradation (noise and reverberation) emerges as the singular most effective approach. Conversely, for speaker diarization, we observed that global open-source state-of-the-art models (such as Diarizen) performed surprisingly poorly on this complex dataset. Extensive model retraining yielded negligible improvements; instead, strategic, heuristic post-processing of baseline model outputs proved to be the primary driver for increasing accuracy. Ultimately, this work outlines a highly optimized dual pipeline achieving a $\\sim$0.019 Real-Time Factor (RTF), establishing a practical, empirically backed benchmark for low-resource, long-form speech processing.", "link": "http://arxiv.org/abs/2602.23070v1", "date": "2026-02-26", "relevancy": 2.3462, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5106}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4486}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4486}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Make%20It%20Hard%20to%20Hear%2C%20Easy%20to%20Learn%3A%20Long-Form%20Bengali%20ASR%20and%20Speaker%20Diarization%20via%20Extreme%20Augmentation%20and%20Perfect%20Alignment&body=Title%3A%20Make%20It%20Hard%20to%20Hear%2C%20Easy%20to%20Learn%3A%20Long-Form%20Bengali%20ASR%20and%20Speaker%20Diarization%20via%20Extreme%20Augmentation%20and%20Perfect%20Alignment%0AAuthor%3A%20Sanjid%20Hasan%20and%20Risalat%20Labib%20and%20A%20H%20M%20Fuad%20and%20Bayazid%20Hasan%0AAbstract%3A%20Although%20Automatic%20Speech%20Recognition%20%28ASR%29%20in%20Bengali%20has%20seen%20significant%20progress%2C%20processing%20long-duration%20audio%20and%20performing%20robust%20speaker%20diarization%20remain%20critical%20research%20gaps.%20To%20address%20the%20severe%20scarcity%20of%20joint%20ASR%20and%20diarization%20resources%20for%20this%20language%2C%20we%20introduce%20Lipi-Ghor-882%2C%20a%20comprehensive%20882-hour%20multi-speaker%20Bengali%20dataset.%20In%20this%20paper%2C%20detailing%20our%20submission%20to%20the%20DL%20Sprint%204.0%20competition%2C%20we%20systematically%20evaluate%20various%20architectures%20and%20approaches%20for%20long-form%20Bengali%20speech.%20For%20ASR%2C%20we%20demonstrate%20that%20raw%20data%20scaling%20is%20ineffective%3B%20instead%2C%20targeted%20fine-tuning%20utilizing%20perfectly%20aligned%20annotations%20paired%20with%20synthetic%20acoustic%20degradation%20%28noise%20and%20reverberation%29%20emerges%20as%20the%20singular%20most%20effective%20approach.%20Conversely%2C%20for%20speaker%20diarization%2C%20we%20observed%20that%20global%20open-source%20state-of-the-art%20models%20%28such%20as%20Diarizen%29%20performed%20surprisingly%20poorly%20on%20this%20complex%20dataset.%20Extensive%20model%20retraining%20yielded%20negligible%20improvements%3B%20instead%2C%20strategic%2C%20heuristic%20post-processing%20of%20baseline%20model%20outputs%20proved%20to%20be%20the%20primary%20driver%20for%20increasing%20accuracy.%20Ultimately%2C%20this%20work%20outlines%20a%20highly%20optimized%20dual%20pipeline%20achieving%20a%20%24%5Csim%240.019%20Real-Time%20Factor%20%28RTF%29%2C%20establishing%20a%20practical%2C%20empirically%20backed%20benchmark%20for%20low-resource%2C%20long-form%20speech%20processing.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23070v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMake%2520It%2520Hard%2520to%2520Hear%252C%2520Easy%2520to%2520Learn%253A%2520Long-Form%2520Bengali%2520ASR%2520and%2520Speaker%2520Diarization%2520via%2520Extreme%2520Augmentation%2520and%2520Perfect%2520Alignment%26entry.906535625%3DSanjid%2520Hasan%2520and%2520Risalat%2520Labib%2520and%2520A%2520H%2520M%2520Fuad%2520and%2520Bayazid%2520Hasan%26entry.1292438233%3DAlthough%2520Automatic%2520Speech%2520Recognition%2520%2528ASR%2529%2520in%2520Bengali%2520has%2520seen%2520significant%2520progress%252C%2520processing%2520long-duration%2520audio%2520and%2520performing%2520robust%2520speaker%2520diarization%2520remain%2520critical%2520research%2520gaps.%2520To%2520address%2520the%2520severe%2520scarcity%2520of%2520joint%2520ASR%2520and%2520diarization%2520resources%2520for%2520this%2520language%252C%2520we%2520introduce%2520Lipi-Ghor-882%252C%2520a%2520comprehensive%2520882-hour%2520multi-speaker%2520Bengali%2520dataset.%2520In%2520this%2520paper%252C%2520detailing%2520our%2520submission%2520to%2520the%2520DL%2520Sprint%25204.0%2520competition%252C%2520we%2520systematically%2520evaluate%2520various%2520architectures%2520and%2520approaches%2520for%2520long-form%2520Bengali%2520speech.%2520For%2520ASR%252C%2520we%2520demonstrate%2520that%2520raw%2520data%2520scaling%2520is%2520ineffective%253B%2520instea {"title": "Dual-IPO: Dual-Iterative Preference Optimization for Text-to-Video Generation", "author": "Xiaomeng Yang and Mengping Yang and Jia Gong and Luozheng Qin and Zhiyu Tan and Hao Li", "abstract": "Recent advances in video generation have enabled thrilling experiences in producing realistic videos driven by scalable diffusion transformers. However, they usually fail to produce satisfactory outputs that are aligned to users' authentic demands and preferences. In this work, we introduce Dual-Iterative Optimization (Dual-IPO), an iterative paradigm that sequentially optimizes both the reward model and the video generation model for improved synthesis quality and human preference alignment. For the reward model, our framework ensures reliable and robust reward signals via CoT-guided reasoning, voting-based self-consistency, and preference certainty estimation. Given this, we optimize video foundation models with guidance of signals from reward model's feedback, thus improving the synthesis quality in subject consistency, motion smoothness and aesthetic quality, etc. The reward model and video generation model complement each other and are progressively improved in the multi-round iteration, without requiring tediously manual preference annotations. Comprehensive experiments demonstrate that the proposed Dual-IPO can effectively and consistently improve the video generation quality of base model with various architectures and sizes, even help a model with only 2B parameters surpass a 5B one. Moreover, our analysis experiments and ablation studies identify the rational of our systematic design and the efficacy of each component.", "link": "http://arxiv.org/abs/2502.02088v5", "date": "2026-02-26", "relevancy": 2.3417, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6022}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": " notations.%20Comprehensive%20experiments%20demonstrate%20that%20the%20proposed%20Dual-IPO%20can%20effectively%20and%20consistently%20improve%20the%20video%20generation%20quality%20of%20base%20model%20with%20various%20architectures%20and%20sizes%2C%20even%20help%20a%20model%20with%20only%202B%20parameters%20surpass%20a%205B%20one.%20Moreover%2C%20our%20analysis%20experiments%20and%20ablation%20studies%20identify%20the%20rational%20of%20our%20systematic%20design%20and%20the%20efficacy%20of%20each%20component.%0ALink%3A%20http%3A//arxiv.org/abs/2502.02088v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDual-IPO%253A%2520Dual-Iterative%2520Preference%2520Optimization%2520for%2520Text-to-Video%2520Generation%26entry.906535625%3DXiaomeng%2520Yang%2520and%2520Mengping%2520Yang%2520and%2520Jia%2520Gong%2520and%2520Luozheng%2520Qin%2520and%2520Zhiyu%2520Tan%2520and%2520Hao%2520Li%26entry.1292438233%3DRecent%2520advances%2520in%2520video%2520generation%2520have%2520enabled%2520thrilling%2520experiences%2520in%2520producing%2520realistic%2520videos%2520driven%2520by%2520scalable%2520diffusion%2520transformers.%2520However%252C%2520they%2520usually%2520fail%2520to%2520produce%2520satisfactory%2520outputs%2520that%2520are%2520aligned%2520to%2520users%2527%2520authentic%2520demands%2520and%2520preferences.%2520In%2520this%2520work%252C%2520we%2520introduce%2520Dual-Iterative%2520Optimization%2520%2528Dual-IPO%2529%252C%2520an%2520iterative%2520paradigm%2520that%2520sequentially%2520optimizes%2520both%2520the%2520reward%2520model%2520and%2520the%2520video%2520generation%2520model%2520for%2520improved%2520synthesis%2520quality%2520and%2520human%2520preference%2520alignment.%2520For%2520the%2520reward%2520model%252C%2520our%2520framework%2520ensures%2520reliable%2520and%2520robust%2520reward%2520signals%2520via%2520CoT-guided%2520reasoning%252C%2520voting-based%2520self-consistency%252C%2520and% {"title": "Latent Introspection: Models Can Detect Prior Concept Injections", "author": "Theia Pearson-Vogel and Martin Vanek and Raymond Douglas and Jan Kulveit", "abstract": "We uncover a latent capacity for introspection in a Qwen 32B model, demonstrating that the model can detect when concepts have been injected into its earlier context and identify which concept was injected. While the model denies injection in sampled outputs, logit lens analysis reveals clear detection signals in the residual stream, which are attenuated in the final layers. Furthermore, prompting the model with accurate information about AI introspection mechanisms can dramatically strengthen this effect: the sensitivity to injection increases massively (0.3% -> 39.9%) with only a 0.6% increase in false positives. Also, mutual information between nine injected and recovered concepts rises from 0.61 bits to 1.05 bits, ruling out generic noise explanations. Our results demonstrate models can have a surprising capacity for introspection and steering awareness that is easy to overlook, with consequences for latent reasoning and safety.", "link": "http://arxiv.org/abs/2602.20031v2", "date": "2026-02-26", "relevancy": 2.3353, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4675}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4669}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4669}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Latent%20Introspection%3A%20Models%20Can%20Detect%20Prior%20Concept%20Injections&body=Title%3A%20Latent%20Introspection%3A%20Models%20Can%20Detect%20Prior%20Concept%20Injections%0AAuthor%3A%20Theia%20Pearson-Vogel%20and% {"title": "SO3UFormer: Learning Intrinsic Spherical Features for Rotation-Robust Panoramic Segmentation", "author": "Qinfeng Zhu and Yunxi Jiang and Lei Fan", "abstract": "Panoramic semantic segmentation models are typically trained under a strict gravity-aligned assumption. However, real-world captures often deviate from this canonical orientation due to unconstrained camera motions, such as the rotational jitter of handheld devices or the dynamic attitude shifts of aerial platforms. This discrepancy causes standard spherical Transformers to overfit global latitude cues, leading to performance collapse under 3D reorientations. To address this, we introduce SO3UFormer, a rotation-robust architecture designed to learn intrinsic spherical features that are less sensitive to the underlying coordinate frame. Our approach rests on three geometric pillars: (1) an intrinsic feature formulation that decouples the representation from the gravity vector by removing absolute latitude encoding; (2) quadrature-consistent spherical attention that accounts for non-uniform sampling densities; and (3) a gauge-aware relative positional mechanism that encodes local angular geometry using tangent-plane projected angles and discrete gauge pooling, avoiding reliance on global axes. We further use index-based spherical resampling together with a logit-level SO(3)-consistency regularizer during training. To rigorously benchmark robustness, we introduce Pose35, a dataset variant of Stanford2D3D perturbed by random rotations within $\\pm 35^\\circ$. Under the extreme test of arbitrary full SO(3) rotations, existing SOTAs fail catastrophically: the baseline SphereUFormer drops from 67.53 mIoU to 25.26 mIoU. In contrast, SO3UFormer demonstrates remarkable stability, achieving 72.03 mIoU on Pose35 and retaining 70.67 mIoU under full SO(3) rotations.", "link": "http://arxiv.org/abs/2602.22867v1", "date": "2026-02-26", "relevancy": 2.3197, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.591}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5737}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5713}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SO3UFormer%3A%20Learning%20Intrinsic%20Spherical%20Features%20for%20Rotation-Robust%20Panoramic%20Segmentation&body=Title%3A%20SO3UFormer%3A%20Learning%20Intrinsic%20Spherical%20Features%20for%20Rotation-Robust%20Panoramic%20Segmentation%0AAuthor%3A%20Qinfeng%20Zhu%20and%20Yunxi%20Jiang%20and%20Lei%20Fan%0AAbstract%3A%20Panoramic%20semantic%20segmentation%20models%20are%20typically%20trained%20under%20a%20strict%20gravity-aligned%20assumption.%20However%2C%20real-world%20captures%20often%20deviate%20from%20this%20canonical%20orientation%20due%20to%20unconstrained%20camera%20motions%2C%20such%20as%20the%20rotational%20jitter%20of%20handheld%20devices%20or%20the%20dynamic%20attitude%20shifts%20of%20aerial%20platforms.%20This%20discrepancy%20causes%20standard%20spherical%20Transformers%20to%20overfit%20global%20latitude%20cues%2C%20leading%20to%20performance%20collapse%20under%203D%20reorientations.%20To%20address%20this%2C%20we%20introduce%20SO3UFormer%2C%20a%20rotation-robust%20architecture%20designed%20to%20learn%20intrinsic%20spherical%20features%20that%20are%20less%20sensitive%20to%20the%20underlying%20coordinate%20frame.%20Our%20approach%20rests%20on%20three%20geometric%20pillars%3A%20%281%29%20an%20intrinsic%20feature%20formulation%20that%20decouples%20the%20representation%20from%20the%20gravity%20vector%20by%20removing%20absolute%20latitude%20encoding%3B%20%282%29%20quadrature-consistent%20spherical%20attention%20that%20accounts%20for%20non-uniform%20sampling%20densities%3B%20and%20%283%29%20a%20gauge-aware%20relative%20positional%20mechanism%20that%20encodes%20local%20angular%20geometry%20using%20tangent-plane%20projected%20angles%20and%20discrete%20gauge%20pooling%2C%20avoiding%20reliance%20on%20global%20axes.%20We%20further%20use%20index-based%20spherical%20resampling%20together%20with%20a%20logit-level%20SO%283%29-consistency%20regularizer%20during%20training.%20To%20rigorously%20benchmark%20robustness%2C%20we%20introduce%20Pose35%2C%20a%20dataset%20variant%20of%20Stanford2D3D%20perturbed%20by%20random%20rotations%20within%20%24%5Cpm%2035%5E%5Ccirc%24.%20Under%20the%20extreme%20test%20of%20arbitrary%20full%20SO%283%29%20rotations%2C%20existing%20SOTAs%20fail%20catastrophically%3A%20the%20baseline%20SphereUFormer%20drops%20from%2067.53%20mIoU%20to%2025.26%20mIoU.%20In%20contrast%2C%20SO3UFormer%20demonstrates%20remarkable%20stability%2C%20achieving%2072.03%20mIoU%20on%20Pose35%20and%20retaining%2070.67%20mIoU%20under%20full%20SO%283%29%20rotations.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22867v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSO3UFormer%253A%2520Learning%2520Intrinsic%2520Spherical%2520Features%2520for%2520Rotation-Robust%2520Panoramic%2520Segmentation%26entry.906535625%3DQinfeng%2520Zhu%2520and%2520Yunxi%2520Jiang%2520and%2520Lei%2520Fan%26entry.1292438233%3DPanoramic%2520semantic%2520segmentation%2520models%2520are%2520typically%2520trained%2520under%2520a%2520strict%2520gravity-aligned%2520assumption.%2520However%252C%2520real-world%2520captures%2520often%2520deviate%2520from%2520this%2520canonical%2520orientation%2520due%2520to%2520unconstrained%2520camera%2520motions%252C%2520such%2520as%2520the%2520rotational%2520jitter%2520of%2520handheld%2520devices%2520or%2520the%2520dynamic%2520attitude%2520shifts%2520of%2520aerial%2520platforms.%2520This%2520discrepancy%2520causes%2520standard%2520spherical%2520Transformer 2520on%2520Pose35%2520and%2520retaining%252070.67%2520mIoU%2520under%2520full%2520SO%25283%2529%2520rotations.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.22867v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SO3UFormer%3A%20Learning%20Intrinsic%20Spherical%20Features%20for%20Rotation-Robust%20Panoramic%20Segmentation&entry.906535625=Qinfeng%20Zhu%20and%20Yunxi%20Jiang%20and%20Lei%20Fan&entry.1292438233=Panoramic%20semantic%20segmentation%20models%20are%20typically%20trained%20under%20a%20strict%20gravity-aligned%20assumption.%20However%2C%20real-world%20captures%20often%20deviate%20from%20this%20canonical%20orientation%20due%20to%20unconstrained%20camera%20motions%2C%20such%20as%20the%20rotational%20jitter%20of%20handheld%20devices%20or%20the%20dynamic%20attitude%20shifts%20of%20aerial%20platforms.%20This%20discrepancy%20causes%20standard%20spherical%20Transformers%20to%20overfit%20global%20latitude%20cues%2C%20leading%20to%20performance%20collapse%20under%203D%20reorientations.%20To%20address%20this%2C%20we%20introduce%20SO3UFormer%2C%20a%20rotation-robust%20architecture%20designed%20to%20learn%20intrinsic%20spherical%20features%20that%20are%20less%20sensitive%20to%20the%20underlying%20coordinate%20frame.%20Our%20approach%20rests%20on%20three%20geometric%20pillars%3A%20%281%29%20an%20intrinsic%20feature%20formulation%20that%20decouples%20the%20representation%20from%20the%20gravity%20vector%20by%20removing%20absolute%20latitude%20encoding%3B%20%282%29%20quadrature-consistent%20spherical%20attention%20that%20accounts%20for%20non-uniform%20sampling%20densities%3B%20and%20%283%29%20a%20gauge-aware%20relative%20positional%20mechanism%20that%20encodes%20local%20angular%20geometry%20using%20tangent-plane%20projected%20angles%20and%20discrete%20gauge%20pooling%2C%20avoiding%20reliance%20on%20global%20axes.%20We%20further%20use%20index-based%20spherical%20resam {"title": "Uni-Animator: Towards Unified Visual Colorization", "author": "Xinyuan Chen and Yao Xu and Shaowen Wang and Pengjie Song and Bowen Deng", "abstract": "We propose Uni-Animator, a novel Diffusion Transformer (DiT)-based framework for unified image and video sketch colorization. Existing sketch colorization methods struggle to unify image and video tasks, suffering from imprecise color transfer with single or multiple references, inadequate preservation of high-frequency physical details, and compromised temporal coherence with motion artifacts in large-motion scenes. To tackle imprecise color transfer, we introduce visual reference enhancement via instance patch embedding, enabling precise alignment and fusion of reference color information. To resolve insufficient physical detail preservation, we design physical detail reinforcement using physical features that effectively capture and retain high-frequency textures. To mitigate motion-induced temporal inconsistency, we propose sketch-based dynamic RoPE encoding that adaptively models motion-aware spatial-temporal dependencies. Extensive experimental results demonstrate that Uni-Animator achieves competitive performance on both image and video sketch colorization, matching that of task-specific methods while unlocking unified cross-domain capabilities with high detail fidelity and robust temporal consistency.", "link": "http://arxiv.org/abs/2602.23191v1", "date": "2026-02-26", "relevancy": 2.2997, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5999}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5701}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5698}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Uni-Animator%3A%20Towards%20Unified%20Visual%20Colorization&body=Title%3A%20Uni-Animator%3A%20Towards%20Unified%20Visual%20Colorization%0AAuthor%3A%20Xinyuan%20Chen%20and%20Yao%20Xu%20and%20Shaowen%20Wang%20and%20Pengjie%20Song%20and%20Bowen%20Deng%0AAbstract%3A%20We%20propose%20Uni-Animator%2C%20a%20novel%20Diffusion%20Transformer%20%28DiT%29-based%20framework%20for%20unified%20image%20and%20video%20sketch%20colorization.%20Existing%20sketch%20colorization%20methods%20struggle%20to%20unify%20image%20and%20video%20tasks%2C%20suffering%20from%20imprecise%20color%20transfer%20with%20single%20or%20multiple%20references%2C%20inadequate%20preservation%20of%20high-frequency%20physical%20details%2C%20and%20compromised%20temporal%20coherence%20with%20motion%20artifacts%20in%20large-motion%20scenes.%20To%20tackle%20imprecise%20color%20transfer%2C%20we%20introduce%20visual%20reference%20enhancement%20via%20instance%20patch%20embedding%2C%20enabling%20precise%20alignment%20and%20fusion%20of%20reference%20color%20information.%20To%20resolve%20insufficient%20physical%20detail%20preservation%2C%20we%20design%20physical%20detail%20reinforcement%20using%20physical%20features%20that%20effectively%20capture%20and%20retain%20high-frequency%20textures.%20To%20mitigate%20motion-induced%20temporal%20inconsistency%2C%20we%20propose%20sketch-based%20dynamic%20RoPE%20encoding%20that%20adaptively%20models%20motion-aware%20spatial-temporal%20dependencies.%20Extensive%20experimental%20results%20demonstrate%20that%20Uni-Animator%20achieves%20competitive%20performance%20on%20both%20image%20and%20video%20sketch%20colorization%2C%20matching%20that%20of%20task-specific%20methods%20while%20unlocking%20unified%20cross-domain%20capabilities%20with%20high%20detail%20fidelity%20and%20robust%20temporal%20consistency.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23191v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848 bilities%2520with%2520high%2520detail%2520fidelity%2520and%2520robust%2520temporal%2520consistency.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.23191v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Uni-Animator%3A%20Towards%20Unified%20Visual%20Colorization&entry.906535625=Xinyuan%20Chen%20and%20Yao%20Xu%20and%20Shaowen%20Wang%20and%20Pengjie%20Song%20and%20Bowen%20Deng&entry.1292438233=We%20propose%20Uni-Animator%2C%20a%20novel%20Diffusion%20Transformer%20%28DiT%29-based%20framework%20for%20unified%20image%20and%20video%20sketch%20colorization.%20Existing%20sketch%20colorization%20methods%20struggle%20to%20unify%20image%20and%20video%20tasks%2C%20suffering%20from%20imprecise%20color%20transfer%20with%20single%20or%20multiple%20references%2C%20inadequate%20preservation%20of%20high-frequency%20physical%20details%2C%20and%20compromised%20temporal%20coherence%20with%20motion%20artifacts%20in%20large-motion%20scenes.%20To%20tackle%20imprecise%20color%20transfer%2C%20we%20introduce%20visual%20reference%20enhancement%20via%20instance%20patch%20embedding%2C%20enabling%20precise%20alignment%20and%20fusion%20of%20reference%20color%20information.%20To%20resolve%20insufficient%20physical%20detail%20preservation%2C%20we%20design%20physical%20detail%20reinforcement%20using%20physical%20features%20that%20effectively%20capture%20and%20retain%20high-frequency%20textures.%20To%20mitigate%20motion-induced%20temporal%20inconsistency%2C%20we%20propose%20sketch-based%20dynamic%20RoPE%20encoding%20that%20adaptively%20models%20motion-aware%20spatial-temporal%20dependencies.%20Extensive%20experimental%20results%20demonstrate%20that%20Uni-Animator%20achieves%20competitive%20performance%20on%20both%20image%20and%20video%20sketch%20colorization%2C%20matching%20that%20of%20task-specific%20methods%20while%20unlocking%20unified%20cross-domain%20capabilities%20with%20high%20detail%20f {"title": "Generalization Bounds of Stochastic Gradient Descent in Homogeneous Neural Networks", "author": "Wenquan Ma and Yang Sui and Jiaye Teng and Bohan Wang and Jing Xu and Jingqin Yang", "abstract": "Algorithmic stability is among the most potent techniques in generalization analysis. However, its derivation usually requires a stepsize $\u03b7_t = \\mathcal{O}(1/t)$ under non-convex training regimes, where $t$ denotes iterations. This rigid decay of the stepsize potentially impedes optimization and may not align with practical scenarios. In this paper, we derive the generalization bounds under the homogeneous neural network regimes, proving that this regime enables slower stepsize decay of order $\u03a9(1/\\sqrt{t})$ under mild assumptions. We further extend the theoretical results from several aspects, e.g., non-Lipschitz regimes. This finding is broadly applicable, as homogeneous neural networks encompass fully-connected and convolutional neural networks with ReLU and LeakyReLU activations.", "link": "http://arxiv.org/abs/2602.22936v1", "date": "2026-02-26", "relevancy": 2.2994, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4714}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4627}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4456}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generalization%20Bounds%20of%20Stochastic%20Gradient%20Descent%20in%20Homogeneous%20Neural%20Networks&body=Title%3A%20Generalization%20Bounds%20of%20Stochastic%20Gradient%20Descent%20in%20Homogeneous%20Neural%20Networks%0AAuthor%3A%20Wenquan%20Ma%20and%20Yang%20Sui%20and%20Jiaye%20Teng%20and%20Bohan%20Wang%20and%20Jing%20Xu%20and%20Jingqin%20Yang%0AAbstract%3A%20Algorithmic%20stability%20is%20among%20the%20most%20potent%20techniques%20in%20generalization%20analysis.%20However%2C%20its%20derivation%20usually%20requires%20a%20stepsize%20%24%CE%B7_t%20%3D%20%5Cmathcal%7BO%7D%281/t%29%24%20under%20non-convex%20training%20regimes%2C%20where%20%24t%24%20denotes%20iterations.%20This%20rigid%20decay%20of%20the%20stepsize%20potentially%20impedes%20optimization%20and%20may%20not%20align%20with%20practical%20scenarios.%20In%20this%20paper%2C%20we%20derive%20the%20generalization%20bounds%20under%20the%20homogeneous%20neural%20network%20regimes%2C%20proving%20that%20this%20regime%20enables%20slower%20stepsize%20decay%20of%20order%20%24%CE%A9%281/%5Csqrt%7Bt%7D%29%24%20under%20mild%20assumptions.%20We%20further%20extend%20the%20theoretical%20results%20from%20several%20aspects%2C%20e.g.%2C%20non-Lipschitz%20regimes.%20This%20finding%20is%20broadly%20applicable%2C%20as%20homogeneous%20neural%20networks%20encompass%20fully-connected%20and%20convolutional%20neural%20networks%20with%20ReLU%20and%20LeakyReLU%20activations.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22936v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeneralization%2520Bounds%2520of%2520Stochastic%2520Gradient%2520Descent%2520in%2520Homogeneous%2520Neural%2520Networks%26entry.906535625%3DWenquan%2520Ma%2520and%2520Yang%2520Sui%2520and%2520Jiaye%2520Teng%2520and%2520Bohan%2520Wang%2520and%2520Jing%2520Xu%2520and%2520Jingqin%2520Yang%26entry.1292438233%3DAlgorithmic%2520stability%2520is%2520among%2520the%2520most%2520potent%2520techniques%2520in%2520generalization%2520analysis.%2520However%252C%2520its%2520derivation%2520usually%2520requires%2520a%2520stepsize%2520%2524%25CE%25B7_t%2520%253D%2520%255Cmathcal%257BO%257D%25281/t%2529%2524%2520under%2520non-convex%2520training%2520regimes%252C%2520where%2520%2524t%2524%2520denotes%2520iterations.%2520This%2520rigid%2520decay%2520of%2520the%2520stepsize%2520potentially%2520impedes%2520optimiz {"title": "GraspLDP: Towards Generalizable Grasping Policy via Latent Diffusion", "author": "Enda Xiang and Haoxiang Ma and Xinzhu Ma and Zicheng Liu and Di Huang", "abstract": "This paper focuses on enhancing the grasping precision and generalization of manipulation policies learned via imitation learning. Diffusion-based policy learning methods have recently become the mainstream approach for robotic manipulation tasks. As grasping is a critical subtask in manipulation, the ability of imitation-learned policies to execute precise and generalizable grasps merits particular attention. Existing imitation learning techniques for grasping often suffer from imprecise grasp executions, limited spatial generalization, and poor object generalization. To address these challenges, we incorporate grasp prior knowledge into the diffusion policy framework. In particular, we employ a latent diffusion policy to guide action chunk decoding with grasp pose prior, ensuring that generated motion trajectories adhere closely to feasible grasp configurations. Furthermore, we introduce a self-supervised reconstruction objective during diffusion to embed the graspness prior: at each reverse diffusion step, we reconstruct wrist-camera images back-projected the graspness from the intermediate representations. Both simulation and real robot experiments demonstrate that our approach significantly outperforms baseline methods and exhibits strong dynamic grasping capabilities.", "link": "http://arxiv.org/abs/2602.22862v1", "date": "2026-02-26", "relevancy": 2.2958, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6436}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5293}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5222}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GraspLDP%3A%20Towards%20Generalizable%20Grasping%20Policy%20via%20Latent%20Diffusion&body=Title%3A%20GraspLDP%3A%20Towards%20Generalizable%20Grasping%20Policy%20via%20Latent%20Diffusion%0AAuthor%3A%20Enda%20Xiang%20and%20Haoxiang%20Ma%20and%20Xinzhu%20Ma%20and%20Zicheng%20Liu%20and%20Di%20Huang%0AAbstract%3A%20This%20paper%20focuses%20on%20enhancing%20the%20grasping%20precision%20and%20generalization%20of%20manipulation%20policies%20learned%20via%20imitation%20learning.%20Diffusion-based%20policy%20learning%20methods%20have%20recently%20become%20the%20mainstream%20approach%20for%20robotic%20manipulation%20tasks.%20As%20grasping%20is%20a%20critical%20subtask%20in%20manipulation%2C%20the%20ability%20of%20imitation-learned%20policies%20to%20execute%20precise%20and%20generalizable%20grasps%20merits%20particular%20attention.%20Existing%20imitation%20learning%20techniques%20for%20grasping%20often%20suffer%20from%20imprecise%20grasp%20executions%2C%20limited%20spatial%20generalization%2C%20and%20poor%20object%20generalization.%20To%20address%20these%20challenges%2C%20we%20incorporate%20grasp%20prior%20knowledge%20into%20the%20diffusion%20policy%20framework.%20In%20particular%2C%20we%20employ%20a%20latent%20diffusion%20policy%20to%20guide%20action%20chunk%20decoding%20with%20grasp%20pose%20prior%2C%20ensuring%20that%20generated%20motion%20trajectories%20adhere%20closely%20to%20feasible%20grasp%20configurations.%20Furthermore%2C%20we%20introduce%20a%20self-supervised%20reconstruction%20objective%20during%20diffusion%20to%20embed%20the%20graspness%20prior%3A%20at%20each%20reverse%20diffusion%20step%2C%20we%20reconstruct%20wrist-camera%20images%20back-projected%20the%20graspness%20from%20the%20intermediate%20representations.%20Both%20simulation%20and%20real%20robot%20experiments%20demonstrate%20that%20our%20approach%20significantly%20outperforms%20baseline%20methods%20and%20exhibits%20strong%20dynamic%20grasping%20capabilities.%0ALink%3A%20http%3A on%2520step%252C%2520we%2520reconstruct%2520wrist-camera%2520images%2520back-projected%2520the%2520graspness%2520from%2520the%2520intermediate%2520representations.%2520Both%2520simulation%2520and%2520real%2520robot%2520experiments%2520demonstrate%2520that%2520our%2520approach%2520significantly%2520outperforms%2520baseline%2520methods%2520and%2520exhibits%2520strong%2520dynamic%2520grasping%2520capabilities.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.22862v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GraspLDP%3A%20Towards%20Generalizable%20Grasping%20Policy%20via%20Latent%20Diffusion&entry.906535625=Enda%20Xiang%20and%20Haoxiang%20Ma%20and%20Xinzhu%20Ma%20and%20Zicheng%20Liu%20and%20Di%20Huang&entry.1292438233=This%20paper%20focuses%20on%20enhancing%20the%20grasping%20precision%20and%20generalization%20of%20manipulation%20policies%20learned%20via%20imitation%20learning.%20Diffusion-based%20policy%20learning%20methods%20have%20recently%20become%20the%20mainstream%20approach%20for%20robotic%20manipulation%20tasks.%20As%20grasping%20is%20a%20critical%20subtask%20in%20manipulation%2C%20the%20ability%20of%20imitation-learned%20policies%20to%20execute%20precise%20and%20generalizable%20grasps%20merits%20particular%20attention.%20Existing%20imitation%20learning%20techniques%20for%20grasping%20often%20suffer%20from%20imprecise%20grasp%20executions%2C%20limited%20spatial%20generalization%2C%20and%20poor%20object%20generalization.%20To%20address%20these%20challenges%2C%20we%20incorporate%20grasp%20prior%20knowledge%20into%20the%20diffusion%20policy%20framework.%20In%20particular%2C%20we%20employ%20a%20latent%20diffusion%20policy%20to%20guide%20action%20chunk%20decoding%20with%20grasp%20pose%20prior%2C%20ensuring%20that%20generated%20motion%20trajectories%20adhere%20closely%20to%20feasible%20grasp%20configurations.%20Furthermore%2C%20we%20introduce%20a%20self-supervised%20reconstruction%20objective%20during%20diffusion%20to%20embed%20the%20graspness%20prior%3A%20at%20each%20reverse%20diffusion%20step%2C%20we%20reconstruct%20wrist-camera%20images%20back-projected%20the%20graspness%20from%20the%20intermediate%20representations.%20Both%20simulation%20and%20real%20robot%20experiments%20demonstrate%20that%20our%20approach%20significantly%20outperforms%20baseline%20methods%20and%20exhibits%20strong%20dynamic%20grasping%20capabilities.&entry.1838667208=http%3A//arxiv.org/abs/2602.22862v1&entry.124074799=Read"},
{"title": "DRESS: A Continuous Framework for Structural Graph Refinement", "author": "Eduar Castrillo Velilla", "abstract": "The Weisfeiler-Lehman (WL) hierarchy is a cornerstone framework for graph isomorphism testing and structural analysis. However, scaling beyond 1-WL to 3-WL and higher requires tensor-based operations that scale as $\\mathcal{O}(n^3)$ or $\\mathcal{O}(n^4)$, making them computationally prohibitive for large graphs. In this paper, we start from the Original-DRESS equation (Castrillo, Le\u00f3n, and G\u00f3mez, 2018) -- a parameter-free, continuous dynamical system on edges -- and show that it distinguishes the prism graph from $K_{3,3}$, a pair that 1-WL provably cannot separate. We then generalize it to Motif-DRESS, which replaces triangle neighborhoods with arbitrary structural motifs and converges to a unique fixed point under three sufficient conditions, and further to Generalized-DRESS, an abstract template parameterized by the choice of neighborhood operator, aggregation function and norm. Finally, we introduce $\u0394$-DRESS, which runs DRESS on each node-deleted subgraph $G \\setminus \\{v\\}$, connecting the framework to the Kelly--Ulam reconstruction conjecture. Both Motif-DRESS and $\u0394$-DRESS empirically distinguish Strongly Regular Graphs (SRGs) -- such as the Rook and Shrikhande graphs -- that confound 3-WL. Our results establish the DRESS family as a highly scalable framework that empirically surpasses both 1-WL and 3-WL on well-known benchmark graphs, without the prohibitive $\\mathcal{O}(n^4)$ computational cost.", "link": "http://arxiv.org/abs/2602.20833v2", "date": "2026-02-26", "relevancy": 2.2937, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4595}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4586}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4581}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DRESS%3A%20A%20Continuous%20Framework%20for%20Structural%20Graph%20Refinement&body=Title%3A%20DRESS%3A%20A%20Continuous%20Framework%20for%20Structural%20Graph%20Refinement%0AAuthor%3A%20Eduar%20Castrillo%20Velilla%0AAbstract%3A%20The%20Weisfeiler-Lehman%20%28WL%29%20hierarchy%20is%20a%20cornerstone%20framework%20for%20graph%20isomorphism%20testing%20and%20structural%20analysis.%20However%2C%20scaling%20beyond%201-WL%20to%203-WL%20and%20higher%20requires%20tensor-based%20operations%20that%20scale%20as%20%24%5Cmathcal%7BO%7D%28n%5E3%29%24%20or%20%24%5Cmathcal%7BO%7D%28n%5E4%29%24%2C%20making%20them%20computationally%20prohibitive%20for%20large%20graphs.%20In%20this%20paper%2C%20we%20start%20from%20the%20Original-DRESS%20equation%20%28Castrillo%2C%20Le%C3%B3n%2C%20and%20G%C3%B3mez%2C%202018%29%20--%20a%20parameter-free%2C%20continuous%20dynamical%20system%20on%20edges%20--%20and%20show%20that%20it%20distinguishes%20the%20prism%20graph%20from%20%24K_%7B3%2C3%7D%24%2C%20a%20pair%20that%201-WL%20provably%20cannot%20separate.%20We%20then%20generalize%20it%20to%20Motif-DRESS%2C%20which%20replaces%20triangle%20neighborhoods%20with%20arbitrary%20structural%20motifs%20and%20converges%20to%20a%20unique%20fixed%20point%20under%20three%20sufficient%20conditions%2C%20and%20further%20to%20Generalized-DRESS%2C%20an%20abstract%20template%20parameterized%20by%20the%20choice%20of%20neighborhood%20operator%2C%20aggregation%20function%20and%20norm.%20Finally%2C%20we%20introduce%20%24%CE%94%24-DRESS%2C%20which%20runs%20DRESS%20on%20each%20node-deleted%20subgraph%20%24G%20%5Csetminus%20%5C%7Bv%5C%7D%24%2C%20connecting%20the%20framework%20to%20the%20Kelly--Ulam%20reconstruction%20conjecture.%20Both%20Motif-DRESS%20and%20%24%CE%94%24-DRESS%20empirically%20distinguish%20Strongly%20Regular%20Graphs%20%28SRGs%29%20--%20such%20as%20the%20Rook%20and%20Shrikhande%20graphs%20--%20that%20confound%203-WL.%20Our%20results%20establish%20the%20DRESS%20family%20as%20a%20highly%20scalable%20framework%20that%20empirically%20surpasses%20both%201-WL%20and%203-WL%20on%20well-known%20benchmark%20graphs%2C%20without%20the%20prohibitive%20%24%5Cmathcal%7BO%7D%28n%5E4%29%24%20computational%20cost.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20833v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDRESS%253A%2520A%2520Continuous%2520Framework%2520for%2520Structural%2520Graph%2520Refinement%26entry.906535625%3DEduar%2520Castrillo%2520Velilla%26entry.1292438233%3DThe%2520Weisfeiler-Lehman%2520%2528WL%2529%2520hierarchy%2520is%2520a%2520cornerstone%2520framework%2520for%2520graph%2520isomorphism%2520testing%2520and%2520structural%2520analysis.%2520However%252C%2520scaling%2520beyond%25201-WL%2520to%25203-WL%2520and%2520higher%2520requires%2520tensor-based%2520operations%2520that%2520scale%2520as%2520%2524%255Cmathcal%257BO%257D%2528n%255E3%2529%2524%2520or%2520%2524%255Cmathcal%257BO%257D%2528n%255E4%2529%2524%252C%2520making%2520them%2520computationally%2520prohibitive%2520for%2520large%2520graphs.%2520In%2520this%2520paper%252C%2520we%2520start%2520from%2520the%2520Original-DRESS%2520equation%2520%2528Castrillo%252C%2520Le%25C3%25B3n%252C%2520and%2520G%25C3%25B3mez%252C%25202018%2529%2520--%2520a%2520parameter-free%252C%2520continuous%2520dynamical%2520system%2520on%2520edges%2520--%2520and%2520show%2520that%2520it%2520distinguishes%2520the%2520prism%2520graph%2520from%2520%2524K_%257B3%252C3%257D%2524%252C%2520a%2520pair%2520that%25201-WL%2520provably%2520cannot%2520separate.%2520We%2520then%2520generalize%2520it%2520to%2520Motif-DRESS%252C%2520which%2520replaces%2520triangle%2520neighborhoods%2520with%2520arbitrary%2520structural%2520motifs%2520and%2520con {"title": "TARAZ: Persian Short-Answer Question Benchmark for Cultural Evaluation of Language Models", "author": "Reihaneh Iranmanesh and Saeedeh Davoudi and Pasha Abrishamchian and Ophir Frieder and Nazli Goharian", "abstract": "This paper presents a comprehensive evaluation framework for assessing the cultural competence of large language models (LLMs) in Persian. Existing Persian cultural benchmarks rely predominantly on multiple-choice formats and English-centric metrics that fail to capture Persian's morphological complexity and semantic nuance. Our framework introduces a Persian-specific short-answer evaluation that combines rule-based morphological normalization with a hybrid syntactic and semantic similarity module, enabling robust soft-match scoring beyond exact string overlap. Through systematic evaluation of 15 state-of-the-art open- and closed-source models, we demonstrate that our hybrid evaluation improves scoring consistency by +10% compared to exact-match baselines by capturing meaning that surface-level methods cannot detect. We publicly release our evaluation framework, providing the first standardized benchmark for measuring cultural understanding in Persian and establishing a reproducible foundation for cross-cultural LLM evaluation research.", "link": "http://arxiv.org/abs/2602.22827v1", "date": "2026-02-26", "relevancy": 2.2926, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4691}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4691}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4374}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TARAZ%3A%20Persian%20Short-Answer%20Question%20Benchmark%20for%20Cultural%20Evaluation%20of%20Language%20Models&body=Title%3A%20TARAZ%3A%20Persian%20Short-Answer%20Question%20Benchmark%20for%20Cultural%20Evaluation%20of%20Language%20Models%0AAuthor%3A%20Reihaneh%20Iranmanesh%20and%20Saeedeh%20Davoudi%20and%20Pasha%20Abrishamchian%20and%20Ophir%20Frieder%20and%20Nazli%20Goharian%0AAbstract%3A%20This%20paper%20presents%20a%20comprehensive%20evaluation%20framework%20for%20assessing%20the%20cultural%20competence%20of%20large%20language%20models%20%28LLMs%29%20in%20Persian.%20Existing%20Persian%20cultural%20benchmarks%20rely%20predominantly%20on%20multiple-choice%20formats%20and%20English-centric%20metrics%20that%20fail%20to%20capture%20Persian%27s%20morphological%20complexity%20and%20semantic%20nuance.%20Our%20framework%20introduces%20a%20Persian-specific%20short-answer%20evaluation%20that%20combines%20rule-based%20morphological%20normalization%20with%20a%20hybrid%20syntactic%20and%20semantic%20similarity%20module%2C%20enabling%20robust%20soft-match%20scoring%20beyond%20exact%20string%20overlap.%20Through%20systematic%20evaluation%20of%2015%20state-of-the-art%20open-%20and%20closed-source%20models%2C%20we%20demonstrate%20that%20our%20hybrid%20evaluation%20improves%20scoring%20consistency%20by%20%2B10%25%20compared%20to%20exact-match%20baselines%20by%20capturing%20meaning%20that%20surface-level%20methods%20cannot%20detect.%20We%20publicly%20release%20our%20evaluation%20framework%2C%20providing%20the%20first%20standardized%20benchmark%20for%20measuring%20cultural%20understanding%20in%20Persian%20and%20establishing%20a%20reproducible%20foundation%20for%20cross-cultural%20LLM%20evaluation%20research.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22827v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTARAZ%253A%2520Persian%2520Short-Answer%2520Question%2520Benchmark%2520for%2520Cultural%2520Evaluation%2520of%2520Language%2520Models%26entry.906535625%3DReihaneh%2520Iranm {"title": "ColoDiff: Integrating Dynamic Consistency With Content Awareness for Colonoscopy Video Generation", "author": "Junhu Fu and Shuyu Liang and Wutong Li and Chen Ma and Peng Huang and Kehao Wang and Ke Chen and Shengli Lin and Pinghong Zhou and Zeju Li and Yuanyuan Wang and Yi Guo", "abstract": "Colonoscopy video generation delivers dynamic, information-rich data critical for diagnosing intestinal diseases, particularly in data-scarce scenarios. High-quality video generation demands temporal consistency and precise control over clinical attributes, but faces challenges from irregular intestinal structures, diverse disease representations, and various imaging modalities. To this end, we propose ColoDiff, a diffusion-based framework that generates dynamic-consistent and content-aware colonoscopy videos, aiming to alleviate data shortage and assist clinical analysis. At the inter-frame level, our TimeStream module decouples temporal dependency from video sequences through a cross-frame tokenization mechanism, enabling intricate dynamic modeling despite irregular intestinal structures. At the intra-frame level, our Content-Aware module incorporates noise-injected embeddings and learnable prototypes to realize precise control over clinical attributes, breaking through the coarse guidance of diffusion models. Additionally, ColoDiff employs a non-Markovian sampling strategy that cuts steps by over 90% for real-time generation. ColoDiff is evaluated across three public datasets and one hospital database, based on both generation metrics and downstream tasks including disease diagnosis, modality discrimination, bowel preparation scoring, and lesion segmentation. Extensive experiments show ColoDiff generates videos with smooth transitions and rich dynamics. ColoDiff presents an effort in controllable colonoscopy video generation, revealing the potential of synthetic videos in complementing authentic representation and mitigating data scarcity in clinical settings.", " {"title": "Q$^2$: Quantization-Aware Gradient Balancing and Attention Alignment for Low-Bit Quantization", "author": "Zhaoyang Wang and Dong Wang", "abstract": "Quantization-aware training (QAT) has achieved remarkable success in low-bit ($\\leq$4-bit) quantization for classification networks. However, when applied to more complex visual tasks such as object detection and image segmentation, performance still suffers significant degradation. A key cause of this limitation has been largely overlooked in the literature. In this work, we revisit this phenomenon from a new perspective and identify a major failure factor: gradient imbalance at feature fusion stages, induced by accumulated quantization errors. This imbalance biases the optimization trajectory and impedes convergence under low-bit quantization. Based on this diagnosis, we propose Q$^2$, a two-pronged framework comprising: (1) Quantization-aware Gradient Balancing Fusion (Q-GBFusion), a closed-loop mechanism that dynamically rebalances gradient contributions during feature fusion; and (2) Quantization-aware Attention Distribution Alignment (Q-ADA), a parameter-free supervision strategy that reconstructs the supervision distribution using semantic relevance and quantization sensitivity, yielding more stable and reliable supervision to stabilize training and accelerate convergence. Extensive experiments show that our method, as a plug-and-play and general strategy, can be integrated into various state-of-the-art QAT pipelines, achieving an average +2.5\\% mAP gain on object detection and a +3.7\\% mDICE improvement on image segmentation. Notably, it is applied only during training and introduces no inference-time overhead, making it highly practical for real-world deployment.", "link": "http://arxiv.org/abs/2511.05898v2", "date": "2026-02-26", "relevancy": 2.2892, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "

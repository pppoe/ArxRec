{"title": "Evaluating Zero-Shot and One-Shot Adaptation of Small Language Models in Leader-Follower Interaction", "author": "Rafael R. Baptista and Andr\u00e9 de Lima Salgado and Ricardo V. Godoy and Marcelo Becker and Thiago Boaventura and Gustavo J. G. Lahr", "abstract": "Leader-follower interaction is an important paradigm in human-robot interaction (HRI). Yet, assigning roles in real time remains challenging for resource-constrained mobile and assistive robots. While large language models (LLMs) have shown promise for natural communication, their size and latency limit on-device deployment. Small language models (SLMs) offer a potential alternative, but their effectiveness for role classification in HRI has not been systematically evaluated. In this paper, we present a benchmark of SLMs for leader-follower communication, introducing a novel dataset derived from a published database and augmented with synthetic samples to capture interaction-specific dynamics. We investigate two adaptation strategies: prompt engineering and fine-tuning, studied under zero-shot and one-shot interaction modes, compared with an untrained baseline. Experiments with Qwen2.5-0.5B reveal that zero-shot fine-tuning achieves robust classification performance (86.66% accuracy) while maintaining low latency (22.2 ms per sample), significantly outperforming baseline and prompt-engineered approaches. However, results also indicate a performance degradation in one-shot modes, where increased context length challenges the model's architectural capacity. These findings demonstrate that fine-tuned SLMs provide an effective solution for direct role assignment, while highlighting critical trade-offs between dialogue complexity and classification reliability on the edge.", "link": "http://arxiv.org/abs/2602.23312v1", "date": "2026-02-26", "relevancy": 2.5223, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5163}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5015}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4956}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Evaluating%20Zero-Shot%20and%20One-Shot%20Adaptation%20of%20Small%20Language%20Models%20in%20Leader-Follower%20Interaction&body=Title%3A%20Evaluating%20Zero-Shot%20and%20One-Shot%20Adaptation%20of%20Small%20Language%20Models%20in%20Leader-Follower%20Interaction%0AAuthor%3A%20Rafael%20R.%20Baptista%20and%20Andr%C3%A9%20de%20Lima%20Salgado%20and%20Ricardo%20V.%20Godoy%20and%20Marcelo%20Becker%20and%20Thiago%20Boaventura%20and%20Gustavo%20J.%20G.%20Lahr%0AAbstract%3A%20Leader-follower%20interaction%20is%20an%20important%20paradigm%20in%20human-robot%20interaction%20%28HRI%29.%20Yet%2C%20assigning%20roles%20in%20real%20time%20remains%20challenging%20for%20resource-constrained%20mobile%20and%20assistive%20robots.%20While%20large%20language%20models%20%28LLMs%29%20have%20shown%20promise%20for%20natural%20communication%2C%20their%20size%20and%20latency%20limit%20on-device%20deployment.%20Small%20language%20models%20%28SLMs%29%20offer%20a%20potential%20alternative%2C%20but%20their%20effectiveness%20for%20role%20classification%20in%20HRI%20has%20not%20been%20systematically%20evaluated.%20In%20this%20paper%2C%20we%20present%20a%20benchmark%20of%20SLMs%20for%20leader-follower%20communication%2C%20introducing%20a%20novel%20dataset%20derived%20from%20a%20published%20database%20and%20augmented%20with%20synthetic%20samples%20to%20capture%20interaction-specific%20dynamics.%20We%20investigate%20two%20adaptation%20strategies%3A%20prompt%20engineering%20and%20fine-tuning%2C%20studied%20under%20zero-shot%20and%20one-shot%20interaction%20modes%2C%20compared%20with%20an%20untrained%20baseline.%20Experiments%20with%20Qwen2.5-0.5B%20reveal%20that%20zero-shot%20fine-tuning%20achieves%20robust%20classification%20performance%20%2886.66%25%20accuracy%29%20while%20maintaining%20low%20latency%20%2822.2%20ms%20per%20sample%29%2C%20significantly%20outperforming%20baseline%20and%20prompt-engineered%20approaches.%20However%2C%20results%20also%20indicate%20a%20performance%20degradation%20in%20one-shot%20modes%2C%20where%20increased%20context%20length%20challenges%20the%20model%27s%20architectural%20capacity.%20These%20findings%20demonstrate%20that%20fine-tuned%20SLMs%20provide%20an%20effective%20solution%20for%20direct%20role%20assignment%2C%20while%20highlighting%20critical%20trade-offs%20between%20dialogue%20complexity%20and%20classification%20reliability%20on%20the%20edge.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23312v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEvaluating%2520Zero-Shot%2520and%2520One-Shot%2520Adaptation%2520of%2520Small%2520Language%2520Models%2520in%2520Leader-Follower%2520Interaction%26entry.906535625%3DRafael%2520R.%2520Baptista%2520and%2520Andr%25C3%25A9%2520de%2520Lima%2520Salgado%2520and%2520Ricardo%2520V.%2520Godoy%2520and%2520Marcelo%2520Becker%2520and%2520Thiago%2520Boaventura%2520and%2520Gustavo%2520J.%2520G.%2520Lahr%26entry.1292438233%3DLeader-follower%2520interaction%2520is%2520an%2520important%2520paradigm%2520in%2520human-robot%2520interaction%2520%2528HRI%2529.%2520Yet%252C%2520assigning%2520roles%2520in%2520real%2520time%2520remains%2520challenging%2520for%2520resource-constrained%2520mobile%2520and%2520assistive%2520robots.%2520While%2520large%2520language%2520models%2520%2528LLMs%2529%2520have%2520shown%2520promise%2520for%2520natural%2520communication%252C%2520their%2520size%2520and%2520latency%2520limit%2520on-device%2520deployment.%2520Small%2520language%2520models%2520%2528SLMs%2529%2520offer%2520a%2520potential%2520alternative%252C%2520but%2520 {"title": "Towards Generating Realistic 3D Semantic Training Data for Autonomous Driving", "author": "Lucas Nunes and Rodrigo Marcuzzi and Jens Behley and Cyrill Stachniss", "abstract": "Semantic scene understanding is crucial for robotics and computer vision applications. In autonomous driving, 3D semantic segmentation plays an important role for enabling safe navigation. Despite significant advances in the field, the complexity of collecting and annotating 3D data is a bottleneck in this developments. To overcome that data annotation limitation, synthetic simulated data has been used to generate annotated data on demand. There is still, however, a domain gap between real and simulated data. More recently, diffusion models have been in the spotlight, enabling close-to-real data synthesis. Those generative models have been recently applied to the 3D data domain for generating scene-scale data with semantic annotations. Still, those methods either rely on image projection or decoupled models trained with different resolutions in a coarse-to-fine manner. Such intermediary representations impact the generated data quality due to errors added in those transformations. In this work, we propose a novel approach able to generate 3D semantic scene-scale data without relying on any projection or decoupled trained multi-resolution models, achieving more realistic semantic scene data generation compared to previous state-of-the-art methods. Besides improving 3D semantic scene-scale data synthesis, we thoroughly evaluate the use of the synthetic scene samples as labeled data to train a semantic segmentation network. In our experiments, we show that using the synthetic annotated data generated by our method as training data together with the real semantic segmentation labels, leads to an improvement in the semantic segmentation model performance. Our results show the potential of generated scene-scale point clouds to generate more training data to extend existing datasets, reducing the data annotation effort. Our code is available at https://github.com/PRBonn/3DiSS.", "link": "http://arxiv.org/abs/2503.21449v2", "date": "2026-02-26", "relevancy": 2.522, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.633}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.633}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.618}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Generating%20Realistic%203D%20Semantic%20Training%20Data%20for%20Autonomous%20Driving&body=Title%3A%20Towards%20Generating%20Realistic%203D%20Semantic%20Training%20Data%20for%20Autonomous%20Driving%0AAuthor%3A%20Lucas%20Nunes%20and%20Rodrigo%20Marcuzzi%20and%20Jens%20Behley%20and%20Cyrill%20Stachniss%0AAbstract%3A%20Semantic%20scene%20understanding%20is%20crucial%20for%20robotics%20and%20computer%20vision%20applications.%20In%20autonomous%20driving%2C%203D%20semantic%20segmentation%20plays%20an%20important%20role%20for%20enabling%20safe%20navigation.%20Despite%20significant%20advances%20in%20the%20field%2C%20the%20complexity%20of%20collecting%20and%20annotating%203D%20data%20is%20a%20bottleneck%20in%20this%20developments.%20To%20overcome%20that%20data%20annotation%20limitation%2C%20synthetic%20simulated%20data%20has%20been%20used%20to%20generate%20annotated%20data%20on%20demand.%20There%20is%20still%2C%20however%2C%20a%20domain%20gap%20between%20real%20and%20simulated%20data.%20More%20recently%2C%20diffusion%20models%20have%20been%20in%20the%20spotlight%2C%20enabling%20close-to-real%20data%20synthesis.%20Those%20generative%20models%20have%20been%20recently%20applied%20to%20the%203D%20data%20domain%20for%20generating%20scene-scale%20data%20with%20semantic%20annotations.%20Still%2C%20those%20methods%20either%20rely%20on%20image%20projection%20or%20decoupled%20models%20trained%20with%20different%20resolutions%20in%20a%20coarse-to-fine%20manner.%20Such%20intermediary%20representations%20impact%20the%20generated%20data%20quality%20due%20to%20errors%20added%20in%20those%20transformations.%20In%20this%20work%2C%20we%20propose%20a%20novel%20approach%20able%20to%20generate%203D%20semantic%20scene-scale%20data%20without%20relying%20on%20any%20projection%20or%20decoupled%20trained%20multi-resolution%20models%2C%20achieving%20more%20realistic%20semantic%20scene%20data%20generation%20compared%20to%20previous%20state-of-the-art%20methods.%20Besides%20improving%203D%20semantic%20scene-scale%20data%20synthesis%2C%20we%20thoroughly%20evaluate%20the%20use%20of%20the%20synthetic%20scene%20samples%20as%20labeled%20data%20to%20train%20a%20semantic%20segmentation%20network.%20In%20our%20experiments%2C%20we%20show%20that%20using%20the%20synthetic%20annotated%20data%20generated%20by%20our%20method%20as%20training%20data%20together%20with%20the%20real%20semantic%20segmentation%20labels%2C%20leads%20to%20an%20improvement%20in%20the%20semantic%20segmentation%20model%20performance.%20Our%20results%20show%20the%20potential%20of%20generated%20scene-scale%20point%20clouds%20to%20generate%20more%20training%20data%20to%20extend%20existing%20datasets%2C%20reducing%20the%20data%20annotation%20effort.%20Our%20code%20is%20available%20at%20https%3A//github.com/PRBonn/3DiSS.%0ALink%3A%20http%3A//arxiv.org/abs/2503.21449v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520Generating%2520Realistic%25203D%2520Semantic%2520Training%2520Data%2520for%2520Autonomous%2520Driving%26entry.906535625%3DLucas%2520Nunes%2520and%2520Rodrigo%2520Marcuzzi%2520and%2520Jens%2520Behley%2520and%2520Cyrill%2520Stachniss%26entry.1292438233%3DSemantic%2520scene%2520understanding%2520is%2520crucial%2520for%2520roboti {"title": "Imitation Game: Reproducing Deep Learning Bugs Leveraging an Intelligent Agent", "author": "Mehil B Shah and Mohammad Masudur Rahman and Foutse Khomh", "abstract": "Despite their wide adoption in various domains (e.g., healthcare, finance, software engineering), Deep Learning (DL)-based applications suffer from many bugs, failures, and vulnerabilities. Reproducing these bugs is essential for their resolution, but it is extremely challenging due to the inherent nondeterminism of DL models and their tight coupling with hardware and software environments. According to recent studies, only about 3% of DL bugs can be reliably reproduced using manual approaches. To address these challenges, we present RepGen, a novel, automated, and intelligent approach for reproducing deep learning bugs. RepGen constructs a learning-enhanced context from a project, develops a comprehensive plan for bug reproduction, employs an iterative generate-validate-refine mechanism, and thus generates such code using an LLM that reproduces the bug at hand. We evaluate RepGen on 106 real-world deep learning bugs and achieve a reproduction rate of 80.19%, a 19.81% improvement over the state-of-the-art measure. A developer study involving 27 participants shows that RepGen improves the success rate of DL bug reproduction by 23.35%, reduces the time to reproduce by 56.8%, and lowers participants' cognitive load.", "link": "http://arxiv.org/abs/2512.14990v3", "date": "2026-02-26", "relevancy": 2.4985, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5166}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4968}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4857}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Imitation%20Game%3A%20Reproducing%20Deep%2 {"title": "Learning Tangent Bundles and Characteristic Classes with Autoencoder Atlases", "author": "Eduardo Paluzo-Hidalgo and Yuichi Ike", "abstract": "We introduce a theoretical framework that connects multi-chart autoencoders in manifold learning with the classical theory of vector bundles and characteristic classes. Rather than viewing autoencoders as producing a single global Euclidean embedding, we treat a collection of locally trained encoder-decoder pairs as a learned atlas on a manifold. We show that any reconstruction-consistent autoencoder atlas canonically defines transition maps satisfying the cocycle condition, and that linearising these transition maps yields a vector bundle coinciding with the tangent bundle when the latent dimension matches the intrinsic dimension of the manifold. This construction provides direct access to differential-topological invariants of the data. In particular, we show that the first Stiefel-Whitney class can be computed from the signs of the Jacobians of learned transition maps, yielding an algorithmic criterion for detecting orientability. We also show that non-trivial characteristic classes provide obstructions to single-chart representations, and that the minimum number of autoencoder charts is determined by the good cover structure of the manifold. Finally, we apply our methodology to low-dimensional orientable and non-orientable manifolds, as well as to a non-orientable high-dimensional image dataset.", "link": "http://arxiv.org/abs/2602.22873v1", "date": "2026-02-26", "relevancy": 2.4845, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5278}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4852}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.1849 stic%2520classes%2520provide%2520obstructions%2520to%2520single-chart%2520representations%252C%2520and%2520that%2520the%2520minimum%2520number%2520of%2520autoencoder%2520charts%2520is%2520determined%2520by%2520the%2520good%2520cover%2520structure%2520of%2520the%2520manifold.%2520Finally%252C%2520we%2520apply%2520our%2520methodology%2520to%2520low-dimensional%2520orientable%2520and%2520non-orientable%2520manifolds%252C%2520as%2520well%2520as%2520to%2520a%2520non-orientable%2520high-dimensional%2520image%2520dataset.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.22873v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Learning%20Tangent%20Bundles%20and%20Characteristic%20Classes%20with%20Autoencoder%20Atlases&entry.906535625=Eduardo%20Paluzo-Hidalgo%20and%20Yuichi%20Ike&entry.1292438233=We%20introduce%20a%20theoretical%20framework%20that%20connects%20multi-chart%20autoencoders%20in%20manifold%20learning%20with%20the%20classical%20theory%20of%20vector%20bundles%20and%20characteristic%20classes.%20Rather%20than%20viewing%20autoencoders%20as%20producing%20a%20single%20global%20Euclidean%20embedding%2C%20we%20treat%20a%20collection%20of%20locally%20trained%20encoder-decoder%20pairs%20as%20a%20learned%20atlas%20on%20a%20manifold.%20We%20show%20that%20any%20reconstruction-consistent%20autoencoder%20atlas%20canonically%20defines%20transition%20maps%20satisfying%20the%20cocycle%20condition%2C%20and%20that%20linearising%20these%20transition%20maps%20yields%20a%20vector%20bundle%20coinciding%20with%20the%20tangent%20bundle%20when%20the%20latent%20dimension%20matches%20the%20intrinsic%20dimension%20of%20the%20manifold.%20This%20construction%20provides%20direct%20access%20to%20differential-topological%20invariants%20of%20the%20data.%20In%20particular%2C%20we%20show%20that%20the%20first%20Stiefel-Whitney%20class%20can%20be%20computed%20from%20the%20signs%20of%20the%20Jacobi {"title": "Align then Adapt: Rethinking Parameter-Efficient Transfer Learning in 4D Perception", "author": "Yiding Sun and Jihua Zhu and Haozhe Cheng and Chaoyi Lu and Zhichuan Yang and Lin Chen and Yaonan Wang", "abstract": "Point cloud video understanding is critical for robotics as it accurately encodes motion and scene interaction. We recognize that 4D datasets are far scarcer than 3D ones, which hampers the scalability of self-supervised 4D models. A promising alternative is to transfer 3D pre-trained models to 4D perception tasks. However, rigorous empirical analysis reveals two critical limitations that impede transfer capability: overfitting and the modality gap. To overcome these challenges, we develop a novel \"Align then Adapt\" (PointATA) paradigm that decomposes parameter-efficient transfer learning into two sequential stages. Optimal-transport theory is employed to quantify the distributional discrepancy between 3D and 4D datasets, enabling our proposed point align embedder to be trained in Stage 1 to alleviate the underlying modality gap. To mitigate overfitting, an efficient point-video adapter and a spatial-context encoder are integrated into the frozen 3D backbone to enhance temporal modeling capacity in Stage 2. Notably, with the above engineering-oriented designs, PointATA enables a pre-trained 3D model without temporal knowledge to reason about dynamic video content at a smaller parameter cost compared to previous work. Extensive experiments show that PointATA can match or even outperform strong full fine-tuning models, whilst enjoying the advantage of parameter efficiency, e.g. 97.21 \\% accuracy on 3D action recognition, $+8.7 \\%$ on 4 D action segmentation, and 84.06\\% on 4D semantic segmentation.", "link": "http://arxiv.org/abs/2602.23069v1", "date": "2026-02-26", "relevancy": 2.4799, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6346}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6106}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6091}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Align%20then%20Adapt%3A%20Rethinking%20Parameter-Efficient%20Transfer%20Learning%20in%204D%20Perception&body=Title%3A%20Align%20then%20Adapt%3A%20Rethinking%20Parameter-Efficient%20Transfer%20Learning%20in%204D%20Perception%0AAuthor%3A%20Yiding%20Sun%20and%20Jihua%20Zhu%20and%20Haozhe%20Cheng%20and%20Chaoyi%20Lu%20and%20Zhichuan%20Yang%20and%20Lin%20Chen%20and%20Yaonan%20Wang%0AAbstract%3A%20Point%20cloud%20video%20understanding%20is%20critical%20for%20robotics%20as%20it%20accurately%20encodes%20motion%20and%20scene%20interaction.%20We%20recognize%20that%204D%20datasets%20are%20far%20scarcer%20than%203D%20ones%2C%20which%20hampers%20the%20scalability%20of%20self-supervised%204D%20models.%20A%20promising%20alternative%20is%20to%20transfer%203D%20pre-trained%20models%20to%204D%20perception%20tasks.%20However%2C%20rigorous%20empirical%20analysis%20reveals%20two%20critical%20limitations%20that%20impede%20transfer%20capability%3A%20overfitting%20and%20the%20modality%20gap.%20To%20overcome%20these%20challenges%2C%20we%20develop%20a%20novel%20%22Align%20then%20Adapt%22%20%28PointATA%29%20paradigm%20that%20decomposes%20parameter-efficient%20transfer%20learning%20into%20two%20sequential%20stages.%20Optimal-transport%20theory%20is%20employed%20to%20quantify%20the%20distributional%20discrepancy%20between%203D%20and%204D%20datasets%2C%20enabling%20our%20proposed%20point%20align%20embedder%20to%20be%20trained%20in%20Stage%201%20to%20alleviate%20the%20underlying%20modality%20gap.%20To%20mitigate%20overfitting%2C%20an%20efficient%20point-video%20adapter%20and%20a%20spatial-context%20encoder%20are%20integrated%20into%20the%20frozen%203D%20backbone%20to%20enhance%20temporal%20modeling%20capacity%20in%20Stage%202.%20Notably%2C%20with%20the%20above%20engineering-oriented%20designs%2C%20PointATA%20enables%20a%20pre-trained%203D%20model%20without%20temporal%20knowledge%20to%20reason%20about%20dynamic%20video%20content%20at%20a%20smaller%20parameter%20cost%20compared%20to%20previous%20work.%20Extensive%20experiments%20show%20that%20PointATA%20can%20match%20or%20even%20outperform%20strong%20full%20fine-tuning%20models%2C%20whilst%20enjoying%20the%20advantage%20of%20parameter%20efficiency%2C%20e.g.%2097.21%20%5C%25%20accuracy%20on%203D%20action%20recognition%2C%20%24%2B8.7%20%5C%25%24%20on%204%20D%20action%20segmentation%2C%20and%2084.06%5C%25%20on%204D%20semantic%20segmentation.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23069v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAlign%2520then%2520Adapt%253A%2520Rethinking%2520Parameter-Efficient%2520Transfer%2520Learning%2520in%25204D%2520Perception%26entry.906535625%3DYiding%2520Sun%2520and%2520Jihua%2520Zhu%2520and%2520Haozhe%2520Cheng%2520and%2520Chaoyi%2520Lu%2520and%2520Zhichuan%2520Yang%2520and%2520Lin%2520Chen%2520and%2520Yaonan%2520Wang%26entry.1292438233%3DPoint%2520cloud%2520video%2520understanding%2520is%2520critical%2520for%2520robotics%2520as%2520it%2520accurately%2520encodes%2520motion%2520and%2520scene%2520interaction.%2520We%2520recognize%2520that%25204D%2520datasets%2520are%2520far%2520scarcer%2520than%25203D%2520ones%252C%2520which%2520hampers%2520the%2520scalability%2520of%2520self-supervised%25204D%2520models.%2520A%2520promising%2520alternative%2520is%2520to%2520transfer%25203D%2520pre-trained%2520models%2520to%25204D%2520perception%2520tasks.%2520However%252C%2520rigorous%2520empirical%2520analysis%2520reveals%2520two%2520critical%2520limitations%2520that%2520impede%2520transfer%2520capability%253A% {"title": "LayerT2V: A Unified Multi-Layer Video Generation Framework", "author": "Guangzhao Li and Kangrui Cen and Baixuan Zhao and Yi Xin and Siqi Luo and Guangtao Zhai and Lei Zhang and Xiaohong Liu", "abstract": "Text-to-video generation has advanced rapidly, but existing methods typically output only the final composited video and lack editable layered representations, limiting their use in professional workflows. We propose \\textbf{LayerT2V}, a unified multi-layer video generation framework that produces multiple semantically consistent outputs in a single inference pass: the full video, an independent background layer, and multiple foreground RGB layers with corresponding alpha mattes. Our key insight is that recent video generation backbones use high compression in both time and space, enabling us to serialize multiple layer representations along the temporal dimension and jointly model them on a shared generation trajectory. This turns cross-layer consistency into an intrinsic objective, improving semantic alignment and temporal coherence. To mitigate layer ambiguity and conditional leakage, we augment a shared DiT backbone with LayerAdaLN and layer-aware cross-attention modulation. LayerT2V is trained in three stages: alpha mask VAE adaptation, joint multi-layer learning, and multi-foreground extension. We also introduce \\textbf{VidLayer}, the first large-scale dataset for multi-layer video generation. Extensive experiments demonstrate that LayerT2V substantially outperforms prior methods in visual fidelity, temporal consistency, and cross-layer coherence.", "link": "http://arxiv.org/abs/2508.04228v2", "date": "2026-02-26", "relevancy": 2.479, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6513}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6401}, {"ti {"title": "A Decision-Theoretic Formalisation of Steganography With Applications to LLM Monitoring", "author": "Usman Anwar and Julianna Piskorz and David D. Baek and David Africa and Jim Weatherall and Max Tegmark and Christian Schroeder de Witt and Mihaela van der Schaar and David Krueger", "abstract": "Large language models are beginning to show steganographic capabilities. Such capabilities could allow misaligned models to evade oversight mechanisms. Yet principled methods to detect and quantify such behaviours are lacking. Classical definitions of steganography, and detection methods based on them, require a known reference distribution of non-steganographic signals. For the case of steganographic reasoning in LLMs, knowing such a reference distribution is not feasible; this renders these approaches inapplicable. We propose an alternative, \\textbf{decision-theoretic view of steganography}. Our central insight is that steganography creates an asymmetry in usable information between agents who can and cannot decode the hidden content (present within a steganographic signal), and this otherwise latent asymmetry can be inferred from the agents' observable actions. To formalise this perspective, we introduce generalised $\\mathcal{V}$-information: a utilitarian framework for measuring the amount of usable information within some input. We use this to define the \\textbf{steganographic gap} -- a measure that quantifies steganography by comparing the downstream utility of the steganographic signal to agents that can and cannot decode the hidden content. We empirically validate our formalism, and show that it can be used to detect, quantify, and mitigate steganographic reasoning in LLMs.", "link": "http://arxiv.org/abs/2602.23163v1", "date": "2026-02-26", "relevancy": 2.4604, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_ {"title": "A Model-Free Universal AI", "author": "Yegon Kim and Juho Lee", "abstract": "In general reinforcement learning, all established optimal agents, including AIXI, are model-based, explicitly maintaining and using environment models. This paper introduces Universal AI with Q-Induction (AIQI), the first model-free agent proven to be asymptotically $\\varepsilon$-optimal in general RL. AIQI performs universal induction over distributional action-value functions, instead of policies or environments like previous works. Under a grain of truth condition, we prove that AIQI is strong asymptotically $\\varepsilon$-optimal and asymptotically $\\varepsilon$-Bayes-optimal. Our results significantly expand the diversity of known universal agents.", "link": "http://arxiv.org/abs/2602.23242v1", "date": "2026-02-26", "relevancy": 2.4585, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5161}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4813}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4777}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Model-Free%20Universal%20AI&body=Title%3A%20A%20Model-Free%20Universal%20AI%0AAuthor%3A%20Yegon%20Kim%20and%20Juho%20Lee%0AAbstract%3A%20In%20general%20reinforcement%20learning%2C%20all%20established%20optimal%20agents%2C%20including%20AIXI%2C%20are%20model-based%2C%20explicitly%20maintaining%20and%20using%20environment%20models.%20This%20paper%20introduces%20Universal%20AI%20with%20Q-Induction%20%28AIQI%29%2C%20the%20first%20model-free%20agent%20proven%20to%20be%20asymptotically%20%24%5Cvarepsilon%24-optimal%20in%20general%20RL.%20AIQI%20performs%20universal%20induction%20over%20distributional%20action-value%20functions%2C%20instead%20of%20policies%20or%20environments%20like%20previous%20works.%20Under%20a%20grain%20of%20truth%20condition%2C%20we%20prove%20that%20AIQI%20is%20strong%20asymptotically%20%24%5Cvarepsilon%24-optimal%20and%20asymptotically%20%24%5Cvarepsilon%24-Bayes-optimal.%20Our%20results%20significantly%20expand%20the%20diversity%20of%20known%20universal%20agents.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23242v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Model-Free%2520Universal%2520AI%26entry.906535625%3DYegon%2520Kim%2520and%2520Juho%2520Lee%26entry.1292438233%3DIn%2520general%2520reinforcement%2520learning%252C%2520all%2520established%2520optimal%2520agents%252C%2520including%2520AIXI%252C%2520are%2520model-based%252C%2520explicitly%2520maintaining%2520and%2520using%2520environment%2520models.%2520This%2520paper%2520introduces%2520Universal%2520AI%2520with%2520Q-Induction%2520%2528AIQI%2529%252C%2520the%2520first%2520model-free%2520agent%2520proven%2520to%2520be%2520asymptotically%2520%2524%255Cvarepsilon%2524-optimal%2520in%2520general%2520RL.%2520AIQI%2520performs%2520universal%2520induction%2520over%2520distributional%2520action-value%2520functions%252C%2520instead%2520of%2520policies%2520or%2520environments%2520like%2520previous%2520works.%2520Under%2520a%2520grain%2520of%2520truth%2520condition%252C%2520we%2520prove%2520that%2520AIQI%2520is%2520strong%2520asymptotically%2520%2524%255Cvarepsilon%2524-optimal%2520and%2520asymptotically%2520%2524%255Cvarepsilon%2524-Bayes-optimal.%2520Our%2520results%2520significantly%2520expand%2520the%2520diversity%2520of%2520known%2520universal%2520agents.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.23242v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=A%20Model-Free%20Universal%20AI&entry.906535625=Yegon%20Kim%20and%20Juho%20Lee&entr {"title": "DigiArm: An Anthropomorphic 3D-Printed Prosthetic Hand with Enhanced Dexterity for Typing Tasks", "author": "Dean Zadok and Tom Naamani and Yuval Bar-Ratson and Elisha Barash and Oren Salzman and Alon Wolf and Alex M. Bronstein and Nili Krausz", "abstract": "Despite recent advancements, existing prosthetic limbs are unable to replicate the dexterity and intuitive control of the human hand. Current control systems for prosthetic hands are often limited to grasping, and commercial prosthetic hands lack the precision needed for dexterous manipulation or applications that require fine finger motions. Thus, there is a critical need for accessible and replicable prosthetic designs that enable individuals to interact with electronic devices and perform precise finger pressing, such as keyboard typing or piano playing, while preserving current prosthetic capabilities. This paper presents a low-cost, lightweight, 3D-printed robotic prosthetic hand, specifically engineered for enhanced dexterity with electronic devices such as a computer keyboard or piano, as well as general object manipulation. The robotic hand features a mechanism to adjust finger abduction/adduction spacing, a 2-D wrist with the inclusion of controlled ulnar/radial deviation optimized for typing, and control of independent finger pressing. We conducted a study to demonstrate how participants can use the robotic hand to perform keyboard typing and piano playing in real time, with different levels of finger and wrist motion. This supports the notion that our proposed design can allow for the execution of key typing motions more effectively than before, aiming to enhance the functionality of prosthetic hands.", "link": "http://arxiv.org/abs/2602.23017v1", "date": "2026-02-26", "relevancy": 2.4584, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.523}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4799}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4722}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DigiArm%3A%20An%20Anthropomorphic%203D-Printed%20Prosthetic%20Hand%20with%20Enhanced%20Dexterity%20for%20Typing%20Tasks&body=Title%3A%20DigiArm%3A%20An%20Anthropomorphic%203D-Printed%20Prosthetic%20Hand%20with%20Enhanced%20Dexterity%20for%20Typing%20Tasks%0AAuthor%3A%20Dean%20Zadok%20and%20Tom%20Naamani%20and%20Yuval%20Bar-Ratson%20and%20Elisha%20Barash%20and%20Oren%20Salzman%20and%20Alon%20Wolf%20and%20Alex%20M.%20Bronstein%20and%20Nili%20Krausz%0AAbstract%3A%20Despite%20recent%20advancements%2C%20existing%20prosthetic%20limbs%20are%20unable%20to%20replicate%20the%20dexterity%20and%20intuitive%20control%20of%20the%20human%20hand.%20Current%20control%20systems%20for%20prosthetic%20hands%20are%20often%20limited%20to%20grasping%2C%20and%20commercial%20prosthetic%20hands%20lack%20the%20precision%20needed%20for%20dexterous%20manipulation%20or%20applications%20that%20require%20fine%20finger%20motions.%20Thus%2C%20there%20is%20a%20critical%20need%20for%20accessible%20and%20replicable%20prosthetic%20designs%20that%20enable%20individuals%20to%20interact%20with%20electronic%20devices%20and%20perform%20precise%20finger%20pressing%2C%20such%20as%20keyboard%20typing%20or%20piano%20playing%2C%20while%20preserving%20current%20prosthetic%20capabilities.%20This%20paper%20presents%20a%20low-cost%2C%20lightweight%2C%203D-printed%20robotic%20prosthetic%20hand%2C%20specifically%20engineered%20for%20enhanced%20dexterity%20with%20electronic%20devices%20such%20as%20a%20computer%20keyboard%20or%20piano%2C%20as%20well%20as%20general%20object%20manipulation.%20The%20robotic%20hand%20features%20a%20mechanism%20to%20adjust%20finger%20abduction/adduction%20spacing%2C%20a%202-D%20wrist%20with%20the%20inclusion%20of%20controlled%20ulnar/radial%20deviation%20optimized%20for%20typing%2C%20and%20control%20of%20independent%20finger%20pressing.%20We%20conducted%20a%20study%20to%20demonstrate%20how%20participants%20can%20use%20the%20robotic%20hand%20to%20perform%20keyboard%20typing%20and%20piano%20playing%20in%20real%20time%2C%20with%20different%20levels%20of%20finger%20and%20wrist%20motion.%20This%20supports%20the%20notion%20that%20our%20proposed%20design%20can%20allow%20for%20the%20execution%20of%20key%20typing%20motions%20more%20effectively%20than%20before%2C%20aiming%20to%20enhance%20the%20functionality%20of%20prosthetic%20hands.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23017v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDigiArm%253A%2520An%2520Anthropomorphic%25203D-Printed%2520Prosthetic%2520Hand%2520with%2520Enhanced%2520Dexterity%2520for%2520Typing%2520Tasks%26entry.906535625%3DDean%2520Zadok%2520and%2520Tom%2520Naamani%2520and%2520Yuval%2520Bar-Ratson%2520and%2520Elisha%2520Barash%2520and%2520Oren%2520Salzman%2520and%2520Alon%2520Wolf%2520and%2520Alex%2520M.%2520Bronstein%2520and%2520Nili%2520Krausz%26entry.1292438233%3DDespite%2520recent%2520advancements%252C%2520existing%2520prosthetic%2520limbs%2520are%2520unable%2520to%2520replicate%2520the%2520dexterity%2520and%2520intuitive%2520control%2520of%2520the%2520human%2520hand.%2520Current%2520control%2520systems%2520for%2520prosthetic%2520hands%2520are%2520often%2520limited%2520to%2520grasping%252C%2520and%2520commercial%2520prosthetic%2520hands%2520lack%2520the%2520precision%2520needed%2520for%2520dexterous%2520manipulation%2520or%2520applications%2520that%2520require%2520fine%2520finger%2520motions.%2520Thus%252C%2520there%2520is%2520a%2520critical%2520need%2520for%2520accessible%2520and%2520replicable%2520prosthetic%2520designs%2520that%2520enable%2520individuals%2520to%2520interact%2520with%2520electronic%2520devices%2520and%252 {"title": "On Discovering Algorithms for Adversarial Imitation Learning", "author": "Shashank Reddy Chirra and Jayden Teoh and Praveen Paruchuri and Pradeep Varakantham", "abstract": "Adversarial Imitation Learning (AIL) methods, while effective in settings with limited expert demonstrations, are often considered unstable. These approaches typically decompose into two components: Density Ratio (DR) estimation $\\frac{\u03c1_E}{\u03c1_\u03c0}$, where a discriminator estimates the relative occupancy of state-action pairs under the policy versus the expert; and Reward Assignment (RA), where this ratio is transformed into a reward signal used to train the policy. While significant research has focused on improving density estimation, the role of reward assignment in influencing training dynamics and final policy performance has been largely overlooked. RA functions in AIL are typically derived from divergence minimization objectives, relying heavily on human design and ingenuity. In this work, we take a different approach: we investigate the discovery of data-driven RA functions, i.e, based directly on the performance of the resulting imitation policy. To this end, we leverage an LLM-guided evolutionary framework that efficiently explores the space of RA functions, yielding \\emph{Discovered Adversarial Imitation Learning} (DAIL), the first meta-learnt AIL algorithm. Remarkably, DAIL generalises across unseen environments and policy optimization algorithms, outperforming the current state-of-the-art of \\emph{human-designed} baselines. Finally, we analyse why DAIL leads to more stable training, offering novel insights into the role of RA functions in the stability of AIL. Code is publicly available: https://github.com/shshnkreddy/DAIL.", "link": "http://arxiv.org/abs/2510.00922v2", "date": "2026-02-26", "relevancy": 2.4522, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5172}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4784}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4757}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20On%20Discovering%20Algorithms%20for%20Adversarial%20Imitation%20Learning&body=Title%3A%20On%20Discovering%20Algorithms%20for%20Adversarial%20Imitation%20Learning%0AAuthor%3A%20Shashank%20Reddy%20Chirra%20and%20Jayden%20Teoh%20and%20Praveen%20Paruchuri%20and%20Pradeep%20Varakantham%0AAbstract%3A%20Adversarial%20Imitation%20Learning%20%28AIL%29%20methods%2C%20while%20effective%20in%20settings%20with%20limited%20expert%20demonstrations%2C%20are%20often%20considered%20unstable.%20These%20approaches%20typically%20decompose%20into%20two%20components%3A%20Density%20Ratio%20%28DR%29%20estimation%20%24%5Cfrac%7B%CF%81_E%7D%7B%CF%81_%CF%80%7D%24%2C%20where%20a%20discriminator%20estimates%20the%20relative%20occupancy%20of%20state-action%20pairs%20under%20the%20policy%20versus%20the%20expert%3B%20and%20Reward%20Assignment%20%28RA%29%2C%20where%20this%20ratio%20is%20transformed%20into%20a%20reward%20signal%20used%20to%20train%20the%20policy.%20While%20significant%20research%20has%20focused%20on%20improving%20density%20estimation%2C%20the%20role%20of%20reward%20assignment%20in%20influencing%20training%20dynamics%20and%20final%20policy%20performance%20has%20been%20largely%20overlooked.%20RA%20functions%20in%20AIL%20are%20typically%20derived%20from%20divergence%20minimization%20objectives%2C%20relying%20heavily%20on%20human%20design%20and%20ingenuity.%20In%20this%20work%2C%20we%20take%20a%20different%20approach%3A%20we%20investigate%20the%20discovery%20of%20data-driven%20RA%20functions%2C%20i.e%2C%20based%20directly%20on%20the%20performance%20of%20the%20resulting%20imitation%20policy.%20To%20this%20end%2C%20we%20leverage%20an%20LLM-guided%20evolutionary%20framework%20that%20efficiently%20explores%20the%20space%20of%20RA%20functions%2C%20yielding%20%5Cemph%7BDiscovered%20Adversarial%20Imitation%20Learning%7D%20%28DAIL%29%2C%20the%20first%20meta-learnt%20AIL%20algorithm.%20Remarkably%2C%20DAIL%20generalises%20across%20unseen%20environments%20and%20policy%20optimization%20algorithms%2C%20outperforming%20the%20current%20state-of-the-art%20of%20%5Cemph%7Bhuman-designed%7D%20baselines.%20Finally%2C%20we%20analyse%20why%20DAIL%20leads%20to%20more%20stable%20training%2C%20offering%20novel%20insights%20into%20the%20role%20of%20RA%20functions%20in%20the%20stability%20of%20AIL.%20Code%20is%20publicly%20available%3A%20https%3A//github.com/shshnkreddy/DAIL.%0ALink%3A%20http%3A//arxiv.org/abs/2510.00922v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOn%2520Discovering%2520Algorithms%2520for%2520Adversarial%2520Imitation%2520Learning%26entry.906535625%3DShashank%2520Reddy%2520Chirra%2520and%2520Jayden%2520Teoh%2520and%2520Praveen%2520Paruchuri%2520and%2520Pradeep%2520Varakantham%26entry.1292438233%3DAdversarial%2520Imitation%2520Learning%2520%2528AIL%2529%2520methods%252C%2520while%2520effective%2520in%2520settings%2520with%2520limited%2520expert%2520demonstrations%252C%2520are%2520often%2520considered%2520unstable.%2520These%2520approaches%2520typically%2520decompose%2520into%2520two%2520components%253A%2520Density%2520Ratio%2520%2528DR%2529%2520estimation%2520%2524%255Cfrac%257B%25CF%2581_E%257D%257B%25CF%2581_%25CF%2580%257D%2524%252C%2520where%2520a%2520discriminator%2520estimates%2520the%2520relative%2520occupancy%2520of%2520state-action%2520pairs%2520under%2520the%2520policy%2520versus%2520the%2520expert%253B%2520and%2520Reward%2520Assignment%2520%2528RA%2529%252C%2520where%2520this%2520ratio%2520is%2520transformed%2520into%2520a%2520reward%2520signal%2520used%2520to%2520train%2520the%2520policy.%2520While%2520significant%2520research%2520has%2520focused%2520on%2520improving%2520density%2520estimation%252C%2520the%2520role%2520of%2520reward%2520assignment%2520in%2520influencing%2520training%2520dynamics%2520and%2520final%2520policy%2520performance%2520has%2520been%2520largely%2520overlooked.%2520RA%2520functions%2520in%2520AIL%2520are%2520typically%2520derived%2520from%2520divergence%2520minimization%2520objectives%252C%2520relying%2520heavily%2520on%2520human%2520design%2520and%2520ingenuity.%2520In%2520this%2520work%252C%2520we%2520take%2520a%2520different%2520approach%253A%2520we%2520investigate%2520the%2520discovery%2520of%2520data-driven%2520RA%2520functions%252C%2520i.e%252C%2520based%2520directly%2520on%2520the%2520performance%2520of%2520the%2520resulting%2520imitation%2520policy.%2520To%2520this%2520end%252C%2520we%2520leverage%2520an%2520LLM-guided%2520evolutionary%2520framework%2520that%2520efficiently%2520explores%2520the%2520space%2520of%2520RA%2520functions%252C%2520yielding%2520%255Cemph%257BDiscovered%2520Adversarial%2520Imitation%2520Learning%257D%2520%2528DAIL%2529%252C%2520the%2520first%2520meta-learnt%2520AIL%2520algorithm.%2520Remarkably%252C%2520DAIL%2520generalises%2520across%2520unseen%2520environments%2520and%2520policy%2520optimization%2520algorithms%252C%2520outperforming%2520the%2520current%2520state-of-the-art%2520of%2520%255Cemph%257Bhuman-designed%257D%2520baselines.%2520Finally%252C%2520we%2520analyse%2520why%2520DAIL%2520leads%2520to%2520more%2520stable%2520training%252C%2520offering%2520novel%2520insights%2520into%2520the%2520role%2520of%2520RA%2520functions%2520in%2520the%2520stability%2520of%2520AIL.%2520Code%2520is%2520publicly%2520available%253A%2520https%253A//github.com/shshnkreddy/DAIL.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.00922v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPY {"title": "Sample Compression for Self Certified Continual Learning", "author": "Jacob Comeau and Mathieu Bazinet and Pascal Germain and Cem Subakan", "abstract": "Continual learning algorithms aim to learn from a sequence of tasks. In order to avoid catastrophic forgetting, most existing approaches rely on heuristics and do not provide computable learning guarantees. In this paper, we introduce Continual Pick-to-Learn (CoP2L), a method grounded in sample compression theory that retains representative samples for each task in a principled and efficient way. This allows us to derive non-vacuous, numerically computable upper bounds on the generalization loss of the learned predictors after each task. We evaluate CoP2L on standard continual learning benchmarks under Class-Incremental and Task-Incremental settings, showing that it effectively mitigates catastrophic forgetting. It turns out that CoP2L is empirically competitive with baseline methods while certifying predictor reliability in continual learning with a non-vacuous bound.", "link": "http://arxiv.org/abs/2503.10503v4", "date": "2026-02-26", "relevancy": 2.4172, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5005}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4838}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.466}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sample%20Compression%20for%20Self%20Certified%20Continual%20Learning&body=Title%3A%20Sample%20Compression%20for%20Self%20Certified%20Continual%20Learning%0AAuthor%3A%20Jacob%20Comeau%20and%20Mathieu%20Bazinet%20and%20Pascal%20Germain%20and%20Cem%20Subakan%0AAbstract%3A%20Continual%20learnin {"title": "DyaDiT: A Multi-Modal Diffusion Transformer for Socially Favorable Dyadic Gesture Generation", "author": "Yichen Peng and Jyun-Ting Song and Siyeol Jung and Ruofan Liu and Haiyang Liu and Xuangeng Chu and Ruicong Liu and Erwin Wu and Hideki Koike and Kris Kitani", "abstract": "Generating realistic conversational gestures are essential for achieving natural, socially engaging interactions with digital humans. However, existing methods typically map a single audio stream to a single speaker's motion, without considering social context or modeling the mutual dynamics between two people engaging in conversation. We present DyaDiT, a multi-modal diffusion transformer that generates contextually appropriate human motion from dyadic audio signals. Trained on Seamless Interaction Dataset, DyaDiT takes dyadic audio with optional social-context tokens to produce context-appropriate motion. It fuses information from both speakers to capture interaction dynamics, uses a motion dictionary to encode motion priors, and can optionally utilize the conversational partner's gestures to produce more responsive motion. We evaluate DyaDiT on standard motion generation metrics and conduct quantitative user studies, demonstrating that it not only surpasses existing methods on objective metrics but is also strongly preferred by users, highlighting its robustness and socially favorable motion generation. Code and models will be released upon acceptance.", "link": "http://arxiv.org/abs/2602.23165v1", "date": "2026-02-26", "relevancy": 2.4087, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6335}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5798}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5798}], "mailto": 20models%20will%20be%20released%20upon%20acceptance.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23165v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDyaDiT%253A%2520A%2520Multi-Modal%2520Diffusion%2520Transformer%2520for%2520Socially%2520Favorable%2520Dyadic%2520Gesture%2520Generation%26entry.906535625%3DYichen%2520Peng%2520and%2520Jyun-Ting%2520Song%2520and%2520Siyeol%2520Jung%2520and%2520Ruofan%2520Liu%2520and%2520Haiyang%2520Liu%2520and%2520Xuangeng%2520Chu%2520and%2520Ruicong%2520Liu%2520and%2520Erwin%2520Wu%2520and%2520Hideki%2520Koike%2520and%2520Kris%2520Kitani%26entry.1292438233%3DGenerating%2520realistic%2520conversational%2520gestures%2520are%2520essential%2520for%2520achieving%2520natural%252C%2520socially%2520engaging%2520interactions%2520with%2520digital%2520humans.%2520However%252C%2520existing%2520methods%2520typically%2520map%2520a%2520single%2520audio%2520stream%2520to%2520a%2520single%2520speaker%2527s%2520motion%252C%2520without%2520considering%2520social%2520context%2520or%2520modeling%2520the%2520mutual%2520dynamics%2520between%2520two%2520people%2520engaging%2520in%2520conversation.%2520We%2520present%2520DyaDiT%252C%2520a%2520multi-modal%2520diffusion%2520transformer%2520that%2520generates%2520contextually%2520appropriate%2520human%2520motion%2520from%2520dyadic%2520audio%2520signals.%2520Trained%2520on%2520Seamless%2520Interaction%2520Dataset%252C%2520DyaDiT%2520takes%2520dyadic%2520audio%2520with%2520optional%2520social-context%2520tokens%2520to%2520produce%2520context-appropriate%2520motion.%2520It%2520fuses%2520information%2520from%2520both%2520speakers%2520to%2520capture%2520interaction%2520dynamics%252C%2520uses%2520a%2520motion%2520dictionary%2520to%2520encode%2520motion%2520priors%252C%2520and%2520can%2520optionally%2520utilize%2520the%2520conversational%2520partner%2527s%2520gestures%2520to%2520produce%2520more%2520responsive%2520motion.%2520We%2520 {"title": "Devling into Adversarial Transferability on Image Classification: Review, Benchmark, and Evaluation", "author": "Xiaosen Wang and Zhijin Ge and Bohan Liu and Zheng Fang and Fengfan Zhou and Ruixuan Zhang and Shaokang Wang and Yuyang Luo", "abstract": "Adversarial transferability refers to the capacity of adversarial examples generated on the surrogate model to deceive alternate, unexposed victim models. This property eliminates the need for direct access to the victim model during an attack, thereby raising considerable security concerns in practical applications and attracting substantial research attention recently. In this work, we discern a lack of a standardized framework and criteria for evaluating transfer-based attacks, leading to potentially biased assessments of existing approaches. To rectify this gap, we have conducted an exhaustive review of hundreds of related works, organizing various transfer-based attacks into six distinct categories. Subsequently, we propose a comprehensive framework designed to serve as a benchmark for evaluating these attacks. In addition, we delineate common strategies that enhance adversarial transferability and highlight prevalent issues that could lead to unfair comparisons. Finally, we provide a brief review of transfer-based attacks beyond image classification.", "link": "http://arxiv.org/abs/2602.23117v1", "date": "2026-02-26", "relevancy": 2.3971, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4901}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.481}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ {"title": "UniScale: Unified Scale-Aware 3D Reconstruction for Multi-View Understanding via Prior Injection for Robotic Perception", "author": "Mohammad Mahdavian and Gordon Tan and Binbin Xu and Yuan Ren and Dongfeng Bai and Bingbing Liu", "abstract": "We present UniScale, a unified, scale-aware multi-view 3D reconstruction framework for robotic applications that flexibly integrates geometric priors through a modular, semantically informed design. In vision-based robotic navigation, the accurate extraction of environmental structure from raw image sequences is critical for downstream tasks. UniScale addresses this challenge with a single feed-forward network that jointly estimates camera intrinsics and extrinsics, scale-invariant depth and point maps, and the metric scale of a scene from multi-view images, while optionally incorporating auxiliary geometric priors when available. By combining global contextual reasoning with camera-aware feature representations, UniScale is able to recover the metric-scale of the scene. In robotic settings where camera intrinsics are known, they can be easily incorporated to improve performance, with additional gains obtained when camera poses are also available. This co-design enables robust, metric-aware 3D reconstruction within a single unified model. Importantly, UniScale does not require training from scratch, and leverages world priors exhibited in pre-existing models without geometric encoding strategies, making it particularly suitable for resource-constrained robotic teams. We evaluate UniScale on multiple benchmarks, demonstrating strong generalization and consistent performance across diverse environments. We will release our implementation upon acceptance.", "link": "http://arxiv.org/abs/2602.23224v1", "date": "2026-02-26", "relevancy": 2.3964, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6143}, {"title": "RTG-S itional%20gains%20obtained%20when%20camera%20poses%20are%20also%20available.%20This%20co-design%20enables%20robust%2C%20metric-aware%203D%20reconstruction%20within%20a%20single%20unified%20model.%20Importantly%2C%20UniScale%20does%20not%20require%20training%20from%20scratch%2C%20and%20leverages%20world%20priors%20exhibited%20in%20pre-existing%20models%20without%20geometric%20encoding%20strategies%2C%20making%20it%20particularly%20suitable%20for%20resource-constrained%20robotic%20teams.%20We%20evaluate%20UniScale%20on%20multiple%20benchmarks%2C%20demonstrating%20strong%20generalization%20and%20consistent%20performance%20across%20diverse%20environments.%20We%20will%20release%20our%20implementation%20upon%20acceptance.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23224v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUniScale%253A%2520Unified%2520Scale-Aware%25203D%2520Reconstruction%2520for%2520Multi-View%2520Understanding%2520via%2520Prior%2520Injection%2520for%2520Robotic%2520Perception%26entry.906535625%3DMohammad%2520Mahdavian%2520and%2520Gordon%2520Tan%2520and%2520Binbin%2520Xu%2520and%2520Yuan%2520Ren%2520and%2520Dongfeng%2520Bai%2520and%2520Bingbing%2520Liu%26entry.1292438233%3DWe%2520present%2520UniScale%252C%2520a%2520unified%252C%2520scale-aware%2520multi-view%25203D%2520reconstruction%2520framework%2520for%2520robotic%2520applications%2520that%2520flexibly%2520integrates%2520geometric%2520priors%2520through%2520a%2520modular%252C%2520semantically%2520informed%2520design.%2520In%2520vision-based%2520robotic%2520navigation%252C%2520the%2520accurate%2520extraction%2520of%2520environmental%2520structure%2520from%2520raw%2520image%2520sequences%2520is%2520critical%2520for%2520downstream%2520tasks.%2520UniScale%2520addresses%2520this%2520challenge%2520with%2520a%2520single%2520feed-forward%2520network%2520that%2520jointly%2520estimates%2520camera%2520intrinsics%2520and%2520extrinsi {"title": "Deep ensemble graph neural networks for probabilistic cosmic-ray direction and energy reconstruction in autonomous radio arrays", "author": "Ars\u00e8ne Ferri\u00e8re and Aur\u00e9lien Benoit-L\u00e9vy and Olivier Martineau-Huynh and Mat\u00edas Tueros", "abstract": "Using advanced machine learning techniques, we developed a method for reconstructing precisely the arrival direction and energy of ultra-high-energy cosmic rays from the voltage traces they induced on ground-based radio detector arrays.\n  In our approach, triggered antennas are represented as a graph structure, which serves as input for a graph neural network (GNN). By incorporating physical knowledge into both the GNN architecture and the input data, we improve the precision and reduce the required size of the training set with respect to a fully data-driven approach. This method achieves an angular resolution of 0.092\u00b0 and an electromagnetic energy reconstruction resolution of 16.4% on simulated data with realistic noise conditions.\n  We also employ uncertainty estimation methods to enhance the reliability of our predictions, quantifying the confidence of the GNN's outputs and providing confidence intervals for both direction and energy reconstruction. Finally, we investigate strategies to verify the model's consistency and robustness under real life variations, with the goal of identifying scenarios in which predictions remain reliable despite domain shifts between simulation and reality.", "link": "http://arxiv.org/abs/2602.23321v1", "date": "2026-02-26", "relevancy": 2.3793, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4934}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4777}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/ s.%250A%2520%2520We%2520also%2520employ%2520uncertainty%2520estimation%2520methods%2520to%2520enhance%2520the%2520reliability%2520of%2520our%2520predictions%252C%2520quantifying%2520the%2520confidence%2520of%2520the%2520GNN%2527s%2520outputs%2520and%2520providing%2520confidence%2520intervals%2520for%2520both%2520direction%2520and%2520energy%2520reconstruction.%2520Finally%252C%2520we%2520investigate%2520strategies%2520to%2520verify%2520the%2520model%2527s%2520consistency%2520and%2520robustness%2520under%2520real%2520life%2520variations%252C%2520with%2520the%2520goal%2520of%2520identifying%2520scenarios%2520in%2520which%2520predictions%2520remain%2520reliable%2520despite%2520domain%2520shifts%2520between%2520simulation%2520and%2520reality.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.23321v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Deep%20ensemble%20graph%20neural%20networks%20for%20probabilistic%20cosmic-ray%20direction%20and%20energy%20reconstruction%20in%20autonomous%20radio%20arrays&entry.906535625=Ars%C3%A8ne%20Ferri%C3%A8re%20and%20Aur%C3%A9lien%20Benoit-L%C3%A9vy%20and%20Olivier%20Martineau-Huynh%20and%20Mat%C3%ADas%20Tueros&entry.1292438233=Using%20advanced%20machine%20learning%20techniques%2C%20we%20developed%20a%20method%20for%20reconstructing%20precisely%20the%20arrival%20direction%20and%20energy%20of%20ultra-high-energy%20cosmic%20rays%20from%20the%20voltage%20traces%20they%20induced%20on%20ground-based%20radio%20detector%20arrays.%0A%20%20In%20our%20approach%2C%20triggered%20antennas%20are%20represented%20as%20a%20graph%20structure%2C%20which%20serves%20as%20input%20for%20a%20graph%20neural%20network%20%28GNN%29.%20By%20incorporating%20physical%20knowledge%20into%20both%20the%20GNN%20architecture%20and%20the%20input%20data%2C%20we%20improve%20the%20precision%20and%20reduce%20the%20required%20size%20of%20the%20training%20set%20with%20respe

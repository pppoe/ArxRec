{"title": "HELMLAB: An Analytical, Data-Driven Color Space for Perceptual Distance in UI Design Systems", "author": "Gorkem Yildiz", "abstract": "We present HELMLAB, a 72-parameter analytical color space for UI design systems. The forward transform maps CIE XYZ to a perceptually-organized Lab representation through learned matrices, per-channel power compression, Fourier hue correction, and embedded Helmholtz-Kohlrausch lightness adjustment. A post-pipeline neutral correction guarantees that achromatic colors map to a=b=0 (chroma < 10^-6), and a rigid rotation of the chromatic plane improves hue-angle alignment without affecting the distance metric, which is invariant under isometries. On the COMBVD dataset (3,813 color pairs), HELMLAB achieves a STRESS of 23.22, a 20.4% reduction from CIEDE2000 (29.18). Cross-validation on He et al. 2022 and MacAdam 1974 shows competitive cross-dataset performance. The transform is invertible with round-trip errors below 10^-14. Gamut mapping, design-token export, and dark/light mode adaptation utilities are included for use in web and mobile design systems.", "link": "http://arxiv.org/abs/2602.23010v1", "date": "2026-02-26", "relevancy": 1.7702, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.4636}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4389}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4378}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HELMLAB%3A%20An%20Analytical%2C%20Data-Driven%20Color%20Space%20for%20Perceptual%20Distance%20in%20UI%20Design%20Systems&body=Title%3A%20HELMLAB%3A%20An%20Analytical%2C%20Data-Driven%20Color%20Space%20for%20Perceptual%20Distance%20in%20UI%20Design%20Systems%0AAuthor%3A%20Gorkem%20Yildiz%0AAbstract%3A%20We%20present%20HELMLAB%2C%20a%2072-parameter%20analytical%20color%20space%20for%20UI%20design%20systems.%20The%20forward%20transform%20maps%20CIE%20XYZ%20to%20a%20perceptually-organized%20Lab%20representation%20through%20learned%20matrices%2C%20per-channel%20power%20compression%2C%20Fourier%20hue%20correction%2C%20and%20embedded%20Helmholtz-Kohlrausch%20lightness%20adjustment.%20A%20post-pipeline%20neutral%20correction%20guarantees%20that%20achromatic%20colors%20map%20to%20a%3Db%3D0%20%28chroma%20%3C%2010%5E-6%29%2C%20and%20a%20rigid%20rotation%20of%20the%20chromatic%20plane%20improves%20hue-angle%20alignment%20without%20affecting%20the%20distance%20metric%2C%20which%20is%20invariant%20under%20isometries.%20On%20the%20COMBVD%20dataset%20%283%2C813%20color%20pairs%29%2C%20HELMLAB%20achieves%20a%20STRESS%20of%2023.22%2C%20a%2020.4%25%20reduction%20from%20CIEDE2000%20%2829.18%29.%20Cross-validation%20on%20He%20et%20al.%202022%20and%20MacAdam%201974%20shows%20competitive%20cross-dataset%20performance.%20The%20transform%20is%20invertible%20with%20round-trip%20errors%20below%2010%5E-14.%20Gamut%20mapping%2C%20design-token%20export%2C%20and%20dark/light%20mode%20adaptation%20utilities%20are%20included%20for%20use%20in%20web%20and%20mobile%20design%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23010v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHELMLAB%253A%2520An%2520Analytical%252C%2520Data-Driven%2520Color%2520Space%2520for%2520Perceptual%2520Distance%2520in%2520UI%2520Design%2520Systems%26entry.906535625%3DGorkem%2520Yildiz%26entry.1292438233%3DWe%2520present%2520HELMLAB%252C%2520a%252072-parameter%2520analytical%2520color%2520space%2520for%2520UI%2520design%2520systems.%2520The%2520forward%2520transform%2520maps%2520CIE%2520XYZ%2520to%2520a%2520perceptually-organized%2520Lab%2520representation%2520through%252 {"title": "Towards Reliable Proof Generation with LLMs: A Neuro-Symbolic Approach", "author": "Oren Sultan and Eitan Stern and Dafna Shahaf", "abstract": "Large language models (LLMs) struggle with formal domains that require rigorous logical deduction and symbolic reasoning, such as mathematical proof generation. We propose a neuro-symbolic approach that combines LLMs' generative strengths with structured components to overcome this challenge. As a proof-of-concept, we focus on geometry problems. Our approach is two-fold: (1) we retrieve analogous problems and use their proofs to guide the LLM, and (2) a formal verifier evaluates the generated proofs and provides feedback, helping the model fix incorrect proofs. We demonstrate that our method significantly improves proof accuracy for OpenAI's o1 model (58%-70% improvement); both analogous problems and the verifier's feedback contribute to these gains. More broadly, shifting to LLMs that generate provably correct conclusions could dramatically improve their reliability, accuracy and consistency, unlocking complex tasks and critical real-world applications that require trustworthiness.", "link": "http://arxiv.org/abs/2505.14479v6", "date": "2026-02-26", "relevancy": 1.935, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4839}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4839}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4833}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Reliable%20Proof%20Generation%20with%20LLMs%3A%20A%20Neuro-Symbolic%20Approach&body=Title%3A%20Towards%20Reliable%20Proof%20Generation%20with%20LLMs%3A%20A%20Neuro-Symbolic%20A {"title": "Joint Optimization for 4D Human-Scene Reconstruction in the Wild", "author": "Zhizheng Liu and Joe Lin and Wayne Wu and Bolei Zhou", "abstract": "Reconstructing human motion and its surrounding environment is crucial for understanding human-scene interaction and predicting human movements in the scene. While much progress has been made in capturing human-scene interaction in constrained environments, those prior methods can hardly reconstruct the natural and diverse human motion and scene context from web videos. In this work, we propose JOSH, a novel optimization-based method for 4D human-scene reconstruction in the wild from monocular videos. JOSH uses techniques in both dense scene reconstruction and human mesh recovery as initialization, and then it leverages the human-scene contact constraints to jointly optimize the scene, the camera poses, and the human motion. Experiment results show JOSH achieves better results on both global human motion estimation and dense scene reconstruction by joint optimization of scene geometry and human motion. We further design a more efficient model, JOSH3R, and directly train it with pseudo-labels from web videos. JOSH3R outperforms other optimization-free methods by only training with labels predicted from JOSH, further demonstrating its accuracy and generalization ability.", "link": "http://arxiv.org/abs/2501.02158v2", "date": "2026-02-26", "relevancy": 1.8242, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6271}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5858}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5827}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Joint%20Optimization%20for%204D%20Human-Scene%20Reconstruction%20in% {"title": "Using the Path of Least Resistance to Explain Deep Networks", "author": "Sina Salek and Joseph Enguehard", "abstract": "Integrated Gradients (IG), a widely used axiomatic path-based attribution method, assigns importance scores to input features by integrating model gradients along a straight path from a baseline to the input. While effective in some cases, we show that straight paths can lead to flawed attributions. In this paper, we identify the cause of these misattributions and propose an alternative approach that equips the input space with a model-induced Riemannian metric (derived from the explained model's Jacobian) and computes attributions by integrating gradients along geodesics under this metric. We call this method Geodesic Integrated Gradients (GIG). To approximate geodesic paths, we introduce two techniques: a k-Nearest Neighbours-based approach for smaller models and a Stochastic Variational Inference-based method for larger ones. Additionally, we propose a new axiom, No-Cancellation Completeness (NCC), which strengthens completeness by ruling out feature-wise cancellation. We prove that, for path-based attributions under the model-induced metric, NCC holds if and only if the integration path is a geodesic. Through experiments on both synthetic and real-world image classification data, we provide empirical evidence supporting our theoretical analysis and showing that GIG produces more faithful attributions than existing methods, including IG, on the benchmarks considered.", "link": "http://arxiv.org/abs/2502.12108v3", "date": "2026-02-26", "relevancy": 1.9575, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4952}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4899}, {"title": "UGG: Unified Generative Grasping", "link": {"title": "Inference-Cost-Aware Dynamic Tree Construction for Efficient Inference in Large Language Models", "author": "Yinrong Hong and Zhiquan Tan and Kai Hu", "abstract": "Large Language Models (LLMs) face significant inference latency challenges stemming from their autoregressive design and large size. To address this, speculative decoding emerges as a solution, enabling the simultaneous generation and validation of multiple tokens. While recent approaches like EAGLE-2 and EAGLE-3 improve speculative decoding using dynamic tree structures, they often neglect the impact of crucial system variables such as GPU devices and batch sizes.\n  Therefore, we introduce a new dynamic tree decoding approach called CAST that takes into account inference costs, including factors such as GPU configurations and batch sizes, to dynamically refine the tree structure. Through comprehensive experimentation across six diverse tasks and utilizing six distinct LLMs, our methodology demonstrates remarkable results, achieving speeds up to 5.2 times faster than conventional decoding methods. Moreover, it generally outperforms existing state-of-the-art techniques from 5 % to 20%. The code is available at https://github.com/EAGLE-Research/sglang-eagle4.", "link": "http://arxiv.org/abs/2510.26577v2", "date": "2026-02-26", "relevancy": 1.9692, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5073}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5026}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.476}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Inference-Cost-Aware%20Dynamic%20Tree%20Construction%20for%20Efficient%20Inference%20in%20Large%20Language%20Models&body=Title%3A%20Inference-Cost-Aware%20Dynamic%20Tree%20Construction%20for%20Efficient%20Inference%20in%20Large%20Language%20Models%0AAuthor%3A%20Yinrong%20Hong%20and%20Zhiquan%20Tan%20and%20Kai%20Hu%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20face%20significant%20inference%20latency%20challenges%20stemming%20from%20their%20autoregressive%20design%20and%20large%20size.%20To%20address%20this%2C%20speculative%20decoding%20emerges%20as%20a%20solution%2C%20enabling%20the%20simultaneous%20generation%20and%20validation%20of%20multiple%20tokens.%20While%20recent%20approaches%20like%20EAGLE-2%20and%20EAGLE-3%20improve%20speculative%20decoding%20using%20dynamic%20tree%20structures%2C%20they%20often%20neglect%20the%20impact%20of%20crucial%20system%20variables%20such%20as%20GPU%20devices%20and%20batch%20sizes.%0A%20%20Therefore%2C%20we%20introduce%20a%20new%20dynamic%20tree%20decoding%20approach%20called%20CAST%20that%20takes%20into%20account%20inference%20costs%2C%20including%20factors%20such%20as%20GPU%20configurations%20and%20batch%20sizes%2C%20to%20dynamically%20refine%20the%20tree%20structure.%20Through%20comprehensive%20experimentation%20across%20six%20diverse%20tasks%20and%20utilizing%20six%20distinct%20LLMs%2C%20our%20methodology%20demonstrates%20remarkable%20results%2C%20achieving%20speeds%20up%20to%205.2%20times%20faster%20than%20conventional%20decoding%20methods.%20Moreover%2C%20it%20generally%20outperforms%20existing%20state-of-the-art%20techniques%20from%205%20%25%20to%2020%25.%20The%20code%20is%20available%20at%20https%3A//github.com/EAGLE-Research/sglang-eagle4.%0ALink%3A%20http%3A//arxiv.org/abs/2510.26577v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInference-Cost-Aware%2520Dynamic%2520Tree%2520Construction%2520for%2520Efficient%2520Inference%2520in%2520Large%2520Language%2520Models%26entry.906535625%3DYinrong%2520Hong%2520and%2520Zhiquan%2520Tan%2520and%2520Kai%2520Hu%26ent ient%20Inference%20in%20Large%20Language%20Models&entry.906535625=Yinrong%20Hong%20and%20Zhiquan%20Tan%20and%20Kai%20Hu&entry.1292438233=Large%20Language%20Models%20%28LLMs%29%20face%20significant%20inference%20latency%20challenges%20stemming%20from%20their%20autoregressive%20design%20and%20large%20size.%20To%20address%20this%2C%20speculative%20decoding%20emerges%20as%20a%20solution%2C%20enabling%20the%20simultaneous%20generation%20and%20validation%20of%20multiple%20tokens.%20While%20recent%20approaches%20like%20EAGLE-2%20and%20EAGLE-3%20improve%20speculative%20decoding%20using%20dynamic%20tree%20structures%2C%20they%20often%20neglect%20the%20impact%20of%20crucial%20system%20variables%20such%20as%20GPU%20devices%20and%20batch%20sizes.%0A%20%20Therefore%2C%20we%20introduce%20a%20new%20dynamic%20tree%20decoding%20approach%20called%20CAST%20that%20takes%20into%20account%20inference%20costs%2C%20including%20factors%20such%20as%20GPU%20configurations%20and%20batch%20sizes%2C%20to%20dynamically%20refine%20the%20tree%20structure.%20Through%20comprehensive%20experimentation%20across%20six%20diverse%20tasks%20and%20utilizing%20six%20distinct%20LLMs%2C%20our%20methodology%20demonstrates%20remarkable%20results%2C%20achieving%20speeds%20up%20to%205.2%20times%20faster%20than%20conventional%20decoding%20methods.%20Moreover%2C%20it%20generally%20outperforms%20existing%20state-of-the-art%20techniques%20from%205%20%25%20to%2020%25.%20The%20code%20is%20available%20at%20https%3A//github.com/EAGLE-Research/sglang-eagle4.&entry.1838667208=http%3A//arxiv.org/abs/2510.26577v2&entry.124074799=Read"},
{"title": "Mean Estimation from Coarse Data: Characterizations and Efficient Algorithms", "author": "Alkis Kalavasis and Anay Mehrotra and Manolis Zampetakis and Felix Zhou and Ziyu Zhu", "abstract": "Coarse data arise when learners observe only partial information about samples; namely, a set containing the sample rather than its exact value. This occurs naturally through measurement rounding, sensor limitations, and lag in economic systems. We study Gaussian mean estimation from coarse data, where each true sample $x$ is drawn from a $d$-dimensional Gaussian distribution with identity covariance, but is revealed only through the set of a partition containing $x$. When the coarse samples, roughly speaking, have ``low'' information, the mean cannot be uniquely recovered from observed samples (i.e., the problem is not identifiable). Recent work by Fotakis, Kalavasis, Kontonis, and Tzamos [FKKT21] established that sample-efficient mean estimation is possible when the unknown mean is identifiable and the partition consists of only convex sets. Moreover, they showed that without convexity, mean estimation becomes NP-hard. However, two fundamental questions remained open: (1) When is the mean identifiable under convex partitions? (2) Is computationally efficient estimation possible under identifiability and convex partitions? This work resolves both questions. [...]", "link": "http://arxiv.org/abs/2602.23341v1", "date": "2026-02-26", "relevancy": 1.7273, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4379}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4347}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v {"title": "General Agent Evaluation", "author": "Elron Bandel and Asaf Yehudai and Lilach Eden and Yehoshua Sagron and Yotam Perlitz and Elad Venezian and Natalia Razinkov and Natan Ergas and Shlomit Shachor Ifergan and Segev Shlomov and Michal Jacovi and Leshem Choshen and Liat Ein-Dor and Yoav Katz and Michal Shmueli-Scheuer", "abstract": "The promise of general-purpose agents - systems that perform tasks in unfamiliar environments without domain-specific engineering - remains largely unrealized. Existing agents are predominantly specialized, and while emerging implementations like OpenAI SDK Agent and Claude Code hint at broader capabilities, no systematic evaluation of their general performance has been pursued. Current agentic benchmarks assume domain-specific integration, encoding task information in ways that preclude fair evaluation of general agents. This paper frames general-agent evaluation as a first-class research objective. We propose conceptual principles for such evaluation, a Unified Protocol enabling agent-benchmark integration, and Exgentic - a practical framework for general agent evaluation. We benchmark five prominent agent implementations across six environments as the first Open General Agent Leaderboard. Our experiments show that general agents generalize across diverse environments, achieving performance comparable to domain-specific agents without any environment-specific tuning. We release our evaluation protocol, framework, and leaderboard to establish a foundation for systematic research on general-purpose agents.", "link": "http://arxiv.org/abs/2602.22953v1", "date": "2026-02-26", "relevancy": 2.0689, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5413}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5052}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interact {"title": "Unmasking Reasoning Processes: A Process-aware Benchmark for Evaluating Structural Mathematical Reasoning in LLMs", "author": "Xiang Zheng and Weiqi Zhai and Wei Wang and Boyu Yang and Wenbo Li and Ruixiang Luo and Haoxiang Sun and Yucheng Wang and Zhengze Li and Meng Wang and Yuetian Du and Guojie Lin and Yaxuan Wang and Xiaoxiao Xu and Yanhu Mo and Xuan Ren and Hu Wei and Bing Zhao", "abstract": "Recent large language models (LLMs) achieve near-saturation accuracy on many established mathematical reasoning benchmarks, raising concerns about their ability to diagnose genuine reasoning competence. This saturation largely stems from the dominance of template-based computation and shallow arithmetic decomposition in existing datasets, which underrepresent reasoning skills such as multi-constraint coordination, constructive logical synthesis, and spatial inference. To address this gap, we introduce ReasoningMath-Plus, a benchmark of 150 carefully curated problems explicitly designed to evaluate structural reasoning. Each problem emphasizes reasoning under interacting constraints, constructive solution formation, or non-trivial structural insight, and is annotated with a minimal reasoning skeleton to support fine-grained process-level evaluation. Alongside the dataset, we introduce HCRS (Hazard-aware Chain-based Rule Score), a deterministic step-level scoring function, and train a Process Reward Model (PRM) on the annotated reasoning traces. Empirically, while leading models attain relatively high final-answer accuracy (up to 5.8/10), HCRS-based holistic evaluation yields substantially lower scores (average 4.36/10, best 5.14/10), showing that answer-only metrics can overestimate reasoning robustness.", "link": "http://arxiv.org/abs/2602.00564v2", "date": "2026-02-26", "relevancy": 1.9173, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4838}, {"title": "OSDaR-AR: Enhancing Railway Perception Datasets via Multi-modal Augmented Reality", "author": "Federico Nesti and Gianluca D'Amico and Mauro Marinoni and Giorgio Buttazzo", "abstract": "Although deep learning has significantly advanced the perception capabilities of intelligent transportation systems, railway applications continue to suffer from a scarcity of high-quality, annotated data for safety-critical tasks like obstacle detection. While photorealistic simulators offer a solution, they often struggle with the ``sim-to-real\" gap; conversely, simple image-masking techniques lack the spatio-temporal coherence required to obtain augmented single- and multi-frame scenes with the correct appearance and dimensions. This paper introduces a multi-modal augmented reality framework designed to bridge this gap by integrating photorealistic virtual objects into real-world railway sequences from the OSDaR23 dataset. Utilizing Unreal Engine 5 features, our pipeline leverages LiDAR point-clouds and INS/GNSS data to ensure accurate object placement and temporal stability across RGB frames. This paper also proposes a segmentation-based refinement strategy for INS/GNSS data to significantly improve the realism of the augmented sequences, as confirmed by the comparative study presented in the paper. Carefully designed augmented sequences are collected to produce OSDaR-AR, a public dataset designed to support the development of next-generation railway perception systems. The dataset is available at the following page: https://syndra.retis.santannapisa.it/osdarar.html", "link": "http://arxiv.org/abs/2602.22920v1", "date": "2026-02-26", "relevancy": 2.1583, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.553}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5495}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5221}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OSDaR-AR%3A%20Enhancing%20Railway%20Perception%20Datasets%20via%20Multi-modal%20Augmented%20Reality&body=Title%3A%20OSDaR-AR%3A%20Enhancing%20Railway%20Perception%20Datasets%20via%20Multi-modal%20Augmented%20Reality%0AAuthor%3A%20Federico%20Nesti%20and%20Gianluca%20D%27Amico%20and%20Mauro%20Marinoni%20and%20Giorgio%20Buttazzo%0AAbstract%3A%20Although%20deep%20learning%20has%20significantly%20advanced%20the%20perception%20capabilities%20of%20intelligent%20transportation%20systems%2C%20railway%20applications%20continue%20to%20suffer%20from%20a%20scarcity%20of%20high-quality%2C%20annotated%20data%20for%20safety-critical%20tasks%20like%20obstacle%20detection.%20While%20photorealistic%20simulators%20offer%20a%20solution%2C%20they%20often%20struggle%20with%20the%20%60%60sim-to-real%22%20gap%3B%20conversely%2C%20simple%20image-masking%20techniques%20lack%20the%20spatio-temporal%20coherence%20required%20to%20obtain%20augmented%20single-%20and%20multi-frame%20scenes%20with%20the%20correct%20appearance%20and%20dimensions.%20This%20paper%20introduces%20a%20multi-modal%20augmented%20reality%20framework%20designed%20to%20bridge%20this%20gap%20by%20integrating%20photorealistic%20virtual%20objects%20into%20real-world%20railway%20sequences%20from%20the%20OSDaR23%20dataset.%20Utilizing%20Unreal%20Engine%205%20features%2C%20our%20pipeline%20leverages%20LiDAR%20point-clouds%20and%20INS/GNSS%20data%20to%20ensure%20accurate%20object%20placement%20and%20temporal%20stability%20across%20RGB%20frames.%20This%20paper%20also%20proposes%20a%20segmentation-based%20refinement%20strategy%20for%20INS/GNSS%20data%20to%20significantly%20improve%20the%20realism%20of%20the%20augmented%20sequences%2C%20as%20confirmed%20by%20the%20comparati {"title": "K-Search: LLM Kernel Generation via Co-Evolving Intrinsic World Model", "author": "Shiyi Cao and Ziming Mao and Joseph E. Gonzalez and Ion Stoica", "abstract": "Optimizing GPU kernels is critical for efficient modern machine learning systems yet remains challenging due to the complex interplay of design factors and rapid hardware evolution. Existing automated approaches typically treat Large Language Models (LLMs) merely as stochastic code generators within heuristic-guided evolutionary loops. These methods often struggle with complex kernels requiring coordinated, multi-step structural transformations, as they lack explicit planning capabilities and frequently discard promising strategies due to inefficient or incorrect intermediate implementations. To address this, we propose Search via Co-Evolving World Model and build K-Search based on this method. By replacing static search heuristics with a co-evolving world model, our framework leverages LLMs' prior domain knowledge to guide the search, actively exploring the optimization space. This approach explicitly decouples high-level algorithmic planning from low-level program instantiation, enabling the system to navigate non-monotonic optimization paths while remaining resilient to temporary implementation defects. We evaluate K-Search on diverse, complex kernels from FlashInfer, including GQA, MLA, and MoE kernels. Our results show that K-Search significantly outperforms state-of-the-art evolutionary search methods, achieving an average 2.10x improvement and up to a 14.3x gain on complex MoE kernels. On the GPUMode TriMul task, K-Search achieves state-of-the-art performance on H100, reaching 1030us and surpassing both prior evolution and human-designed solutions.", "link": "http://arxiv.org/abs/2602.19128v2", "date": "2026-02-26", "relevancy": 1.9197, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.48       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

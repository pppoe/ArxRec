Q-ADA%29%2C%20a%20parameter-free%20supervision%20strategy%20that%20reconstructs%20the%20supervision%20distribution%20using%20semantic%20relevance%20and%20quantization%20sensitivity%2C%20yielding%20more%20stable%20and%20reliable%20supervision%20to%20stabilize%20training%20and%20accelerate%20convergence.%20Extensive%20experiments%20show%20that%20our%20method%2C%20as%20a%20plug-and-play%20and%20general%20strategy%2C%20can%20be%20integrated%20into%20various%20state-of-the-art%20QAT%20pipelines%2C%20achieving%20an%20average%20%2B2.5%5C%25%20mAP%20gain%20on%20object%20detection%20and%20a%20%2B3.7%5C%25%20mDICE%20improvement%20on%20image%20segmentation.%20Notably%2C%20it%20is%20applied%20only%20during%20training%20and%20introduces%20no%20inference-time%20overhead%2C%20making%20it%20highly%20practical%20for%20real-world%20deployment.%0ALink%3A%20http%3A//arxiv.org/abs/2511.05898v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DQ%2524%255E2%2524%253A%2520Quantization-Aware%2520Gradient%2520Balancing%2520and%2520Attention%2520Alignment%2520for%2520Low-Bit%2520Quantization%26entry.906535625%3DZhaoyang%2520Wang%2520and%2520Dong%2520Wang%26entry.1292438233%3DQuantization-aware%2520training%2520%2528QAT%2529%2520has%2520achieved%2520remarkable%2520success%2520in%2520low-bit%2520%2528%2524%255Cleq%25244-bit%2529%2520quantization%2520for%2520classification%2520networks.%2520However%252C%2520when%2520applied%2520to%2520more%2520complex%2520visual%2520tasks%2520such%2520as%2520object%2520detection%2520and%2520image%2520segmentation%252C%2520performance%2520still%2520suffers%2520significant%2520degradation.%2520A%2520key%2520cause%2520of%2520this%2520limitation%2520has%2520been%2520largely%2520overlooked%2520in%2520the%2520literature.%2520In%2520this%2520work%252C%2520we%2520revisit%2520this%2520phenomenon%2520from%2520a%2520new%2520perspective%2520and%2520identify%2520a%2520major%2520failure%2520f {"title": "PPT: Pretraining with Pseudo-Labeled Trajectories for Motion Forecasting", "author": "Yihong Xu and Yuan Yin and \u00c9loi Zablocki and Tuan-Hung Vu and Alexandre Boulch and Matthieu Cord", "abstract": "Accurately predicting how agents move in dynamic scenes is essential for safe autonomous driving. State-of-the-art motion forecasting models rely on datasets with manually annotated or post-processed trajectories. However, building these datasets is costly, generally manual, hard to scale, and lacks reproducibility. They also introduce domain gaps that limit generalization across environments. We introduce PPT (Pretraining with Pseudo-labeled Trajectories), a simple and scalable pretraining framework that uses unprocessed and diverse trajectories automatically generated from off-the-shelf 3D detectors and tracking. Unlike data annotation pipelines aiming for clean, single-label annotations, PPT is a pretraining framework embracing off-the-shelf trajectories as useful signals for learning robust representations. With optional finetuning on a small amount of labeled data, models pretrained with PPT achieve strong performance across standard benchmarks, particularly in low-data regimes, and in cross-domain, end-to-end, and multi-class settings. PPT is easy to implement and improves generalization in motion forecasting.", "link": "http://arxiv.org/abs/2412.06491v3", "date": "2026-02-26", "relevancy": 2.2736, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5932}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5545}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5411}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PPT%3A%20Pretraining%20with%20 udo-Labeled%2520Trajectories%2520for%2520Motion%2520Forecasting%26entry.906535625%3DYihong%2520Xu%2520and%2520Yuan%2520Yin%2520and%2520%25C3%2589loi%2520Zablocki%2520and%2520Tuan-Hung%2520Vu%2520and%2520Alexandre%2520Boulch%2520and%2520Matthieu%2520Cord%26entry.1292438233%3DAccurately%2520predicting%2520how%2520agents%2520move%2520in%2520dynamic%2520scenes%2520is%2520essential%2520for%2520safe%2520autonomous%2520driving.%2520State-of-the-art%2520motion%2520forecasting%2520models%2520rely%2520on%2520datasets%2520with%2520manually%2520annotated%2520or%2520post-processed%2520trajectories.%2520However%252C%2520building%2520these%2520datasets%2520is%2520costly%252C%2520generally%2520manual%252C%2520hard%2520to%2520scale%252C%2520and%2520lacks%2520reproducibility.%2520They%2520also%2520introduce%2520domain%2520gaps%2520that%2520limit%2520generalization%2520across%2520environments.%2520We%2520introduce%2520PPT%2520%2528Pretraining%2520with%2520Pseudo-labeled%2520Trajectories%2529%252C%2520a%2520simple%2520and%2520scalable%2520pretraining%2520framework%2520that%2520uses%2520unprocessed%2520and%2520diverse%2520trajectories%2520automatically%2520generated%2520from%2520off-the-shelf%25203D%2520detectors%2520and%2520tracking.%2520Unlike%2520data%2520annotation%2520pipelines%2520aiming%2520for%2520clean%252C%2520single-label%2520annotations%252C%2520PPT%2520is%2520a%2520pretraining%2520framework%2520embracing%2520off-the-shelf%2520trajectories%2520as%2520useful%2520signals%2520for%2520learning%2520robust%2520representations.%2520With%2520optional%2520finetuning%2520on%2520a%2520small%2520amount%2520of%2520labeled%2520data%252C%2520models%2520pretrained%2520with%2520PPT%2520achieve%2520strong%2520performance%2520across%2520standard%2520benchmarks%252C%2520particularly%2520in%2520low-data%2520regimes%252C%2520and%2520in%2520cross-domain%252C%2520end-to-end%252C%2520and%2520multi-class%2520settings.%2520PPT%2520is%2520easy%2520to%2520implement%2520and%2520improves%2520generalization%2520in%2520motion%2520forecasting.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2412.06491v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=PPT%3A%20Pretraining%20with%20Pseudo-Labeled%20Trajectories%20for%20Motion%20Forecasting&entry.906535625=Yihong%20Xu%20and%20Yuan%20Yin%20and%20%C3%89loi%20Zablocki%20and%20Tuan-Hung%20Vu%20and%20Alexandre%20Boulch%20and%20Matthieu%20Cord&entry.1292438233=Accurately%20predicting%20how%20agents%20move%20in%20dynamic%20scenes%20is%20essential%20for%20safe%20autonomous%20driving.%20State-of-the-art%20motion%20forecasting%20models%20rely%20on%20datasets%20with%20manually%20annotated%20or%20post-processed%20trajectories.%20However%2C%20building%20these%20datasets%20is%20costly%2C%20generally%20manual%2C%20hard%20to%20scale%2C%20and%20lacks%20reproducibility.%20They%20also%20introduce%20domain%20gaps%20that%20limit%20generalization%20across%20environments.%20We%20introduce%20PPT%20%28Pretraining%20with%20Pseudo-labeled%20Trajectories%29%2C%20a%20simple%20and%20scalable%20pretraining%20framework%20that%20uses%20unprocessed%20and%20diverse%20trajectories%20automatically%20generated%20from%20off-the-shelf%203D%20detectors%20and%20tracking.%20Unlike%20data%20annotation%20pipelines%20aiming%20for%20clean%2C%20single-label%20annotations%2C%20PPT%20is%20a%20pretraining%20framework%20embracing%20off-the-shelf%20trajectories%20as%20useful%20signals%20for%20learning%20robust%20representations.%20With%20optional%20finetuning%20on%20a%20small%20amount%20of%20labeled%20data%2C%20models%20pretrained%20with%20PPT%20achieve%20strong%20performance%20across%20standard%20benchmarks%2C%20particularly%20in%20low-data%20regimes%2C%20and%20in%20cross-domain%2C%20end-to-end%2C%20and%20multi-class%20settings.%20PPT%20is%20easy%20to%20implement%20and%20improves%20generalization%20in%20motion%20forecasting.&entry.1838667208=http%3A//arxiv.org/abs/2412.06491v3&entry.124074799=Read"},
{"title": "From Blind Spots to Gains: Diagnostic-Driven Iterative Training for Large Multimodal Models", "author": "Hongrui Jia and Chaoya Jiang and Shikun Zhang and Wei Ye", "abstract": "As Large Multimodal Models (LMMs) scale up and reinforcement learning (RL) methods mature, LMMs have made notable progress in complex reasoning and decision making. Yet training still relies on static data and fixed recipes, making it difficult to diagnose capability blind spots or provide dynamic, targeted reinforcement. Motivated by findings that test driven error exposure and feedback based correction outperform repetitive practice, we propose Diagnostic-driven Progressive Evolution (DPE), a spiral loop where diagnosis steers data generation and reinforcement, and each iteration re-diagnoses the updated model to drive the next round of targeted improvement. DPE has two key components. First, multiple agents annotate and quality control massive unlabeled multimodal data, using tools such as web search and image editing to produce diverse, realistic samples. Second, DPE attributes failures to specific weaknesses, dynamically adjusts the data mixture, and guides agents to generate weakness focused data for targeted reinforcement. Experiments on Qwen3-VL-8B-Instruct and Qwen2.5-VL-7B-Instruct show stable, continual gains across eleven benchmarks, indicating DPE as a scalable paradigm for continual LMM training under open task distributions. Our code, models, and data are publicly available at https://github.com/hongruijia/DPE.", "link": "http://arxiv.org/abs/2602.22859v1", "date": "2026-02-26", "relevancy": 2.2729, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5717}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5682}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5647}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Blind%20Spots%20to%20Gains%3A%20Diagnostic-Driven%20Iterative%20Training%20for%20Large%20Multimodal%20Models&body=Title%3A%20From%20Blind%20Spots%20to%20Gains%3A%20Diagnostic-Driven%20Iterative%20Training%20for%20Large%20Multimodal%20Models%0AAuthor%3A%20Hongrui%20Jia%20and%20Chaoya%20Jiang%20and%20Shikun%20Zhang%20and%20Wei%20Ye%0AAbstract%3A%20As%20Large%20Multimodal%20Models%20%28LMMs%29%20scale%20up%20and%20reinforcement%20learning%20%28RL%29%20methods%20mature%2C%20LMMs%20have%20made%20notable%20progress%20in%20complex%20reasoning%20and%20decision%20making.%20Yet%20training%20still%20relies%20on%20static%20data%20and%20fixed%20recipes%2C%20making%20it%20difficult%20to%20diagnose%20capability%20blind%20spots%20or%20provide%20dynamic%2C%20targeted%20reinforcement.%20Motivated%20by%20findings%20that%20test%20driven%20error%20exposure%20and%20feedback%20based%20correction%20outperform%20repetitive%20practice%2C%20we%20propose%20Diagnostic-driven%20Progressive%20Evolution%20%28DPE%29%2C%20a%20spiral%20loop%20where%20diagnosis%20steers%20data%20generation%20and%20reinforcement%2C%20and%20each%20iteration%20re-diagnoses%20the%20updated%20model%20to%20drive%20the%20next%20round%20of%20targeted%20improvement.%20DPE%20has%20two%20key%20components.%20First%2C%20multiple%20agents%20annotate%20and%20quality%20control%20massive%20unlabeled%20multimodal%20data%2C%20using%20tools%20such%20as%20web%20search%20and%20image%20editing%20to%20produce%20diverse%2C%20realistic%20samples.%20Second%2C%20DPE%20attributes%20failures%20to%20specific%20weaknesses%2C%20dynamically%20adjusts%20the%20data%20mixture%2C%20and%20guides%20agents%20to%20generate%20weakness%20focused%20data%20for%20targeted%20reinforcement.%20Experiments%20on%20Qwen3-VL-8B-Instruct%20and%20Qwen2.5-VL-7B-Instruct%20show%20stable%2C%20continual%20gains%20across%20eleven%20benchmarks%2C%20indicating%20DPE%20as%20a%20scalable%20paradigm%20for%20continual%20LMM%20training%20under%20open%20task%20distributions.%20Our%20code%2C%20models%2C%20and%20data%20are%20publicly%20available%20at%20https%3A//github.com/hongruijia/DPE.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22859v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Blind%2520Spots%2520to%2520Gains%253A%2520Diagnostic-Driven%2520Iterative%2520Training%2520for%2520Large%2520Multimodal%2520Models%26entry.906535625%3DHongrui%2520Jia%2520and%2520Chaoya%2520Jiang%2520and%2520Shikun%2520Zhang%2520and%2520Wei%2520Ye%26entry.1292438233%3DAs%2520Large%2520Multimodal%2520Models%2520%2528LMMs%2529%2520scale%2520up%2520and%2520reinforcement%2520learning%2520%2528RL%2529%2520methods%2520mature%252C%2520LMMs%2520have%2520made%2520notable%2520progress%2520in%2520complex%2520reasoning%2520and%2520decision%2520making.%2520Yet%2520training%2520still%2520relies%2520on%2520static%2520data%2520and%2520fixed%2520recipes%252C%2520making%2520it%2520difficult%2520to%2520diagnose%2520capability%2520blind%2520spots%2520or%2520provide%2520dynamic%252C%2520targeted%2520reinforcement.%2520Motivated%2520by%2520findings%2520that%2520test%2520driven%2520error%2520exposure%2520and%2520feedback%2520based%2520correction%2520outperform%2520repetitive%2520practice%252C%2520we%2520propose%2520Diagnostic-driven%2520Progressive%2520Evolution%2520%2528DPE%2529%252C%2520a%2520spiral%2520loop%2520where%2520diagnosis%2520steers%2520data%2520generation%2520and%2520reinforcement%252C%2520and%2520each%2520iteration%2520re-diagnoses%2520the%2520updated%2520model%2520to%2520drive%2520the%2520next%2520round%2520of%2520targeted%2520improvement.%2520DPE%2520has%2520two%2520key%2520components.%2520First%252C%2520multiple%2520agents%2520annotate%2520and%2520quality%2520control%2520massive%2520unlabeled%2520multimodal%2520data%252C%2520 20where%20diagnosis%20steers%20data%20generation%20and%20reinforcement%2C%20and%20each%20iteration%20re-diagnoses%20the%20updated%20model%20to%20drive%20the%20next%20round%20of%20targeted%20improvement.%20DPE%20has%20two%20key%20components.%20First%2C%20multiple%20agents%20annotate%20and%20quality%20control%20massive%20unlabeled%20multimodal%20data%2C%20using%20tools%20such%20as%20web%20search%20and%20image%20editing%20to%20produce%20diverse%2C%20realistic%20samples.%20Second%2C%20DPE%20attributes%20failures%20to%20specific%20weaknesses%2C%20dynamically%20adjusts%20the%20data%20mixture%2C%20and%20guides%20agents%20to%20generate%20weakness%20focused%20data%20for%20targeted%20reinforcement.%20Experiments%20on%20Qwen3-VL-8B-Instruct%20and%20Qwen2.5-VL-7B-Instruct%20show%20stable%2C%20continual%20gains%20across%20eleven%20benchmarks%2C%20indicating%20DPE%20as%20a%20scalable%20paradigm%20for%20continual%20LMM%20training%20under%20open%20task%20distributions.%20Our%20code%2C%20models%2C%20and%20data%20are%20publicly%20available%20at%20https%3A//github.com/hongruijia/DPE.&entry.1838667208=http%3A//arxiv.org/abs/2602.22859v1&entry.124074799=Read"},
{"title": "TextPecker: Rewarding Structural Anomaly Quantification for Enhancing Visual Text Rendering", "author": "Hanshen Zhu and Yuliang Liu and Xuecheng Wu and An-Lan Wang and Hao Feng and Dingkang Yang and Chao Feng and Can Huang and Jingqun Tang and Xiang Bai", "abstract": "Visual Text Rendering (VTR) remains a critical challenge in text-to-image generation, where even advanced models frequently produce text with structural anomalies such as distortion, blurriness, and misalignment. However, we find that leading MLLMs and specialist OCR models largely fail to perceive these structural anomalies, creating a critical bottleneck for both VTR evaluation and RL-based optimization. As a result, even state-of-the-art generators (e.g., Seedream4.0, Qwen-Image) still struggle to render structurally faithful text. To address this, we propose TextPecker, a plug-and-play structural anomaly perceptive RL strategy that mitigates noisy reward signals and works with any textto-image generator. To enable this capability, we construct a recognition dataset with character-level structural-anomaly annotations and develop a stroke-editing synthesis engine to expand structural-error coverage. Experiments show that TextPecker consistently improves diverse text-to-image models; even on the well-optimized Qwen-Image, it significantly yields average gains of 4% in structural fidelity and 8.7% in semantic alignment for Chinese text rendering, establishing a new state-of-the-art in high-fidelity VTR. Our work fills a gap in VTR optimization, providing a foundational step towards reliable and structural faithful visual text generation.", "link": "http://arxiv.org/abs/2602.20903v3", "date": "2026-02-26", "relevancy": 2.2698, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5854}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5698}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5579}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TextPecker%3A%20Rewarding%20Structural%20Anomaly%20Quantification%20for%20Enhancing%20Visual%20Text%20Rendering&body=Title%3A%20TextPecker%3A%20Rewarding%20Structural%20Anomaly%20Quantification%20for%20Enhancing%20Visual%20Text%20Rendering%0AAuthor%3A%20Hanshen%20Zhu%20and%20Yuliang%20Liu%20and%20Xuecheng%20Wu%20and%20An-Lan%20Wang%20and%20Hao%20Feng%20and%20Dingkang%20Yang%20and%20Chao%20Feng%20and%20Can%20Huang%20and%20Jingqun%20Tang%20and%20Xiang%20Bai%0AAbstract%3A%20Visual%20Text%20Rendering%20%28VTR%29%20remains%20a%20critical%20challenge%20in%20text-to-image%20generation%2C%20where%20even%20advanced%20models%20frequently%20produce%20text%20with%20structural%20anomalies%20such%20as%20distortion%2C%20blurriness%2C%20and%20misalignment.%20However%2C%20we%20find%20that%20leading%20MLLMs%20and%20specialist%20OCR%20models%20largely%20fail%20to%20perceive%20these%20structural%20anomalies%2C%20creating%20a%20critical%20bottleneck%20for%20both%20VTR%20evaluation%20and%20RL-based%20optimization.%20As%20a%20result%2C%20even%20state-of-the-art%20generators%20%28e.g.%2C%20Seedream4.0%2C%20Qwen-Image%29%20still%20struggle%20to%20render%20structurally%20faithful%20text.%20To%20address%20this%2C%20we%20propose%20TextPecker%2C%20a%20plug-and-play%20structural%20anomaly%20perceptive%20RL%20strategy%20that%20mitigates%20noisy%20reward%20signals%20and%20works%20with%20any%20textto-image%20generator.%20To%20enable%20this%20capability%2C%20we%20construct%20a%20recognition%20dataset%20with%20character-level%20structural-anomaly%20annotations%20and%20develop%20a%20stroke-editing%20synthesis%20engine%20to%20expand%20structural-error%20coverage.%20Experiments%20show%20that%20TextPecker%20consistently%20improves%20diverse%20text-to-image%20models%3B%20even%20on%20the%20well-optimized%20Qwen-Image%2C%20it%20significantly%20yields%20average%20gains%20of%204%25%20in%20structural%20fidelity%20and%208.7%25%20in%20semantic%20alignment%20for%20Chinese%20text%20rendering%2C%20establishing%20a%20new%20state-of-the-art%20in%20high-fidelity%20VTR.%20Our%20work%20fills%20a%20gap%20in%20VTR%20optimization%2C%20providing%20a%20foundational%20step%20towards%20reliable%20and%20structural%20faithful%20visual%20text%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20903v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTextPecker%253A%2520Rewarding%2520Structural%2520Anomaly%2520Quantification%2520for%2520Enhancing%2520Visual%2520Text%2520Rendering%26entry.906535625%3DHanshen%2520Zhu%2520and%2520Yuliang%2520Liu%2520and%2520Xuecheng%2520Wu%2520and%2520An-Lan%2520Wang%2520and%2520Hao%2520Feng%2520and%2520Dingkang%2520Yang%2520and%2520Chao%2520Feng%2520and%2520Can%2520Huang%2520and%2520Jingqun%2520Tang%2520and%2520Xiang%2520Bai%26entry.1292438233%3DVisual%2520Text%2520Rendering%2520%2528VTR%2529%2520remains%2520a%2520critical%2520challenge%2520in%2520text-to-image%2520generation%252C%2520where%2520even%2520advanced%2520models%2520frequently%2520produce%2520text%2520with%2520structural%2520anomalies%2520such%2520as%2520distortion%252C%2520blurriness%252C%2520and%2520misalignment.%2520However%252C%2520we%2520find%2520that%2520leading%2520MLLMs%2520and%2520specialist%2520OCR%2520models%2520largely%2520fail%2520to%2520perceive%2520these%2520structural%2520anomalies%252C%2520creating%2520a%2520critical%2520bottleneck%2520for%2520both%2520VTR%2520evaluation%2520and%2520RL-based%2520optimization.%2520As%2520a%2520result%252C%2520even%2520state-of-the-art%2520generators%2520%2528e.g.%252C%2520Seedream4.0%252C%2520Qwen-Image%2529%2520still%2520struggle%2520to%2520render%2520structurally%2520faithful%2520text.%2520To%2520address%25 t%20with%20structural%20anomalies%20such%20as%20distortion%2C%20blurriness%2C%20and%20misalignment.%20However%2C%20we%20find%20that%20leading%20MLLMs%20and%20specialist%20OCR%20models%20largely%20fail%20to%20perceive%20these%20structural%20anomalies%2C%20creating%20a%20critical%20bottleneck%20for%20both%20VTR%20evaluation%20and%20RL-based%20optimization.%20As%20a%20result%2C%20even%20state-of-the-art%20generators%20%28e.g.%2C%20Seedream4.0%2C%20Qwen-Image%29%20still%20struggle%20to%20render%20structurally%20faithful%20text.%20To%20address%20this%2C%20we%20propose%20TextPecker%2C%20a%20plug-and-play%20structural%20anomaly%20perceptive%20RL%20strategy%20that%20mitigates%20noisy%20reward%20signals%20and%20works%20with%20any%20textto-image%20generator.%20To%20enable%20this%20capability%2C%20we%20construct%20a%20recognition%20dataset%20with%20character-level%20structural-anomaly%20annotations%20and%20develop%20a%20stroke-editing%20synthesis%20engine%20to%20expand%20structural-error%20coverage.%20Experiments%20show%20that%20TextPecker%20consistently%20improves%20diverse%20text-to-image%20models%3B%20even%20on%20the%20well-optimized%20Qwen-Image%2C%20it%20significantly%20yields%20average%20gains%20of%204%25%20in%20structural%20fidelity%20and%208.7%25%20in%20semantic%20alignment%20for%20Chinese%20text%20rendering%2C%20establishing%20a%20new%20state-of-the-art%20in%20high-fidelity%20VTR.%20Our%20work%20fills%20a%20gap%20in%20VTR%20optimization%2C%20providing%20a%20foundational%20step%20towards%20reliable%20and%20structural%20faithful%20visual%20text%20generation.&entry.1838667208=http%3A//arxiv.org/abs/2602.20903v3&entry.124074799=Read"},
{"title": "Event-Aided Sharp Radiance Field Reconstruction for Fast-Flying Drones", "author": "Rong Zou and Marco Cannici and Davide Scaramuzza", "abstract": "Fast-flying aerial robots promise rapid inspection under limited battery constraints, with direct applications in infrastructure inspection, terrain exploration, and search and rescue. However, high speeds lead to severe motion blur in images and induce significant drift and noise in pose estimates, making dense 3D reconstruction with Neural Radiance Fields (NeRFs) particularly challenging due to their high sensitivity to such degradations. In this work, we present a unified framework that leverages asynchronous event streams alongside motion-blurred frames to reconstruct high-fidelity radiance fields from agile drone flights. By embedding event-image fusion into NeRF optimization and jointly refining event-based visual-inertial odometry priors using both event and frame modalities, our method recovers sharp radiance fields and accurate camera trajectories without ground-truth supervision. We validate our approach on both synthetic data and real-world sequences captured by a fast-flying drone. Despite highly dynamic drone flights, where RGB frames are severely degraded by motion blur and pose priors become unreliable, our method reconstructs high-fidelity radiance fields and preserves fine scene details, delivering a performance gain of over 50% on real-world data compared to state-of-the-art methods.", "link": "http://arxiv.org/abs/2602.21101v2", "date": "2026-02-26", "relevancy": 2.2663, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5873}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5728}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5433}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Event-Aided%20Sharp%20Radiance%20Field%20Reconstruction%20for%20Fast-Flying%20Drones&body=Title%3A%20Event-Aided%20Sharp%20Radiance%20Field%20Reconstruction%20for%20Fast-Flying%20Drones%0AAuthor%3A%20Rong%20Zou%20and%20Marco%20Cannici%20and%20Davide%20Scaramuzza%0AAbstract%3A%20Fast-flying%20aerial%20robots%20promise%20rapid%20inspection%20under%20limited%20battery%20constraints%2C%20with%20direct%20applications%20in%20infrastructure%20inspection%2C%20terrain%20exploration%2C%20and%20search%20and%20rescue.%20However%2C%20high%20speeds%20lead%20to%20severe%20motion%20blur%20in%20images%20and%20induce%20significant%20drift%20and%20noise%20in%20pose%20estimates%2C%20making%20dense%203D%20reconstruction%20with%20Neural%20Radiance%20Fields%20%28NeRFs%29%20particularly%20challenging%20due%20to%20their%20high%20sensitivity%20to%20such%20degradations.%20In%20this%20work%2C%20we%20present%20a%20unified%20framework%20that%20leverages%20asynchronous%20event%20streams%20alongside%20motion-blurred%20frames%20to%20reconstruct%20high-fidelity%20radiance%20fields%20from%20agile%20drone%20flights.%20By%20embedding%20event-image%20fusion%20into%20NeRF%20optimization%20and%20jointly%20refining%20event-based%20visual-inertial%20odometry%20priors%20using%20both%20event%20and%20frame%20modalities%2C%20our%20method%20recovers%20sharp%20radiance%20fields%20and%20accurate%20camera%20trajectories%20without%20ground-truth%20supervision.%20We%20validate%20our%20approach%20on%20both%20synthetic%20data%20and%20real-world%20sequences%20captured%20by%20a%20fast-flying%20drone.%20Despite%20highly%20dynamic%20drone%20flights%2C%20where%20RGB%20frames%20are%20severely%20degraded%20by%20motion%20blur%20and%20pose%20priors%20become%20unreliable%2C%20our%20method%20reconstructs%20high-fidelity%20radiance%20fields%20and%20preserves%20fine%20scene%20details%2C%20delivering%20a%20performance%20gain%20of%20over%2050%25%20on%20real-world%20data%20compared%20to%20state-of-the-art%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21101v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEvent-Aided%2520Sharp%2520Radiance%2520Field%2520Reconstruction%2520for%2520Fast-Flying%2520Drones%26entry.906535625%3DRong%2520Zou%2520and%2520Marco%2520Cannici%2520and%2520Davide%2520Scaramuzza%26entry.1292438233%3DFast-flying%2520aerial%2520robots%2520promise%2520rapid%2520inspection%2520under%2520limited%2520battery%2520constraints%252C%2520with%2520direct%2520applications%2520in%2520infrastructure%2520inspection%252C%2520terrain%2520exploration%252C%2520and%2520search%2520and%2520rescue.%2520However%252C%2520high%2520speeds%2520lead%2520to%2520severe%2520motion%2520blur%2520in%2520images%2520and%2520induce%2520significant%2520drift%2520and%2520noise%2520in%2520pose%2520estimates%252C%2520making%2520dense%25203D%2520reconstruction%2520with%2520Neural%2520Radiance%2520Fields%2520%2528NeRFs%2529%2520particularly%2520challenging%2520due%2520to%2520their%2520high%2520sensitivity%2520to%2520such%2520degradations.%2520In%2520this%2520work%252C%2520we%2520present%2520a%2520unified%2520framework%2520that%2520leverages%2520asynchronous%2520event%2520streams%2520alongside%2520motion-blurred%2520frames%2520to%2520reconstruct%2520high-fidelity%2520radiance%2520fields%2520from%2520agile%2520drone%2520flights.%2520By%2520embedding%2520event-image%2520fusion%2520into%2520NeRF%2520optimization%2520and%2520jointly%2520refining%2520event-based%2520visual-inertial%2520odometry%2520priors%2520using%2520both%2520event%2520and%2520frame%2520modalities%252C%2520our%2520method%2520recovers%2520sharp%2520radiance%2520fields%2520and%2520accurate%2520camera%2520trajectories%2520without%2520ground-truth%2520supervision.%2520We%2520validate%2520our%2520approach%2520on%2520both%2520synthetic%2520data%2520and%2520real-world%2520sequences%2520captured%2520by%2520a%2520fast-flying%2520drone.%2520Despite%2520highly%2520dynamic%2520drone%2520flights%252C%2520where%2520RGB%2520frames%2520are%2520severely%2520degraded%2520by%2520motion%2520blur%2520and%2520pose%2520priors%2520become%2520unreliable%252C%2520our%2520method%2520reconstructs%2520high-fidelity%2520radiance%2520fields%2520and%2520preserves%2520fine%2520scene%2520details%252C%2520delivering%2520a%2520performance%2520gain%2520of%2520over%252050%2525%2520on%2520real-world%2520data%2520compared%2520to%2520state-of-the-art%2520methods.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.21101v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Event-Aided%20Sharp%20Radiance%20Field%20Reconstruction%20for%20Fast-Flying%20Drones&entry.906535625=Rong%20Zou%20and%20Marco%20Cannici%20and%20Davide%20Scaramuzza&entry.1292438233=Fast-flying%20aerial%20robots%20promise%20rapid%20inspection%20under%20limited%20battery%20constraints%2C%20with%20direct%20applications%20in%20infrastructure%20inspection%2C%20terrain%20exploration%2C%20and%20search%20and%20rescue.%20However%2C%20high%20speeds%20lead%20to%20severe%20motion%20blur%20in%20images%20and%20induce%20significant%20drift%20and%20noise%20in%20pose%20estimates%2C%20making%20dense%203D%20reconstruction%20with%20Neural%20Radiance%20Fields%20%28NeRFs%29%20particularly%20challenging%20due%20to%20their%20high%20sensitivity%20to%20such%20degradations.%20In%20this%20work%2C%20we%20present%20a%20unified%20framework%20that%20leverages%20asynchronous%20event%20streams%20alongside%20motion-blurred%20frames%20to%20reconstruct%20high-fidelity%20radiance%20fields%20from%20agile%20drone%20flights.%20By%20embedding%20event-image%20fusion%20into%20NeRF%20optimization%20and%20jointly%20refining%20event-based%20visual-inertial%20odometry%20priors%20using%20both%20event%20and%20frame%20modalities%2C%20our {"title": "A Holistic Framework for Robust Bangla ASR and Speaker Diarization with Optimized VAD and CTC Alignment", "author": "Zarif Ishmam and Zarif Mahir and Shafnan Wasif and Md. Ishtiak Moin", "abstract": "Despite being one of the most widely spoken languages globally, Bangla remains a low-resource language in the field of Natural Language Processing (NLP). Mainstream Automatic Speech Recognition (ASR) and Speaker Diarization systems for Bangla struggles when processing longform audio exceeding 3060 seconds. This paper presents a robust framework specifically engineered for extended Bangla content by leveraging preexisting models enhanced with novel optimization pipelines for the DL Sprint 4.0 contest. Our approach utilizes Voice Activity Detection (VAD) optimization and Connectionist Temporal Classification (CTC) segmentation via forced word alignment to maintain temporal accuracy and transcription integrity over long durations. Additionally, we employed several finetuning techniques and preprocessed the data using augmentation techniques and noise removal. By bridging the performance gap in complex, multi-speaker environments, this work provides a scalable solution for real-world, longform Bangla speech applications.", "link": "http://arxiv.org/abs/2602.22935v1", "date": "2026-02-26", "relevancy": 2.2661, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4815}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4407}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4375}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Holistic%20Framework%20for%20Robust%20Bangla%20ASR%20and%20Speaker%20Diarization%20with% {"title": "Towards Long-Form Spatio-Temporal Video Grounding", "author": "Xin Gu and Bing Fan and Jiali Yao and Zhipeng Zhang and Yan Huang and Cheng Han and Heng Fan and Libo Zhang", "abstract": "In real scenarios, videos can span several minutes or even hours. However, existing research on spatio-temporal video grounding (STVG), given a textual query, mainly focuses on localizing targets in short videos of tens of seconds, typically less than one minute, which limits real-world applications. In this paper, we explore Long-Form STVG (LF-STVG), which aims to locate targets in long-term videos. Compared with short videos, long-term videos contain much longer temporal spans and more irrelevant information, making it difficult for existing STVG methods that process all frames at once. To address this challenge, we propose an AutoRegressive Transformer architecture for LF-STVG, termed ART-STVG. Unlike conventional STVG methods that require the entire video sequence to make predictions at once, ART-STVG treats the video as streaming input and processes frames sequentially, enabling efficient handling of long videos. To model spatio-temporal context, we design spatial and temporal memory banks and apply them to the decoders. Since memories from different moments are not always relevant to the current frame, we introduce simple yet effective memory selection strategies to provide more relevant information to the decoders, significantly improving performance. Furthermore, instead of parallel spatial and temporal localization, we propose a cascaded spatio-temporal design that connects the spatial decoder to the temporal decoder, allowing fine-grained spatial cues to assist complex temporal localization in long videos. Experiments on newly extended LF-STVG datasets show that ART-STVG significantly outperforms state-of-the-art methods, while achieving competitive performance on conventional short-form STVG.", "link": "http://arxiv.org/abs/2602.23294v1", "date": "2026-02-26", "relevancy": 2.2632, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5692}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5689}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5614}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Long-Form%20Spatio-Temporal%20Video%20Grounding&body=Title%3A%20Towards%20Long-Form%20Spatio-Temporal%20Video%20Grounding%0AAuthor%3A%20Xin%20Gu%20and%20Bing%20Fan%20and%20Jiali%20Yao%20and%20Zhipeng%20Zhang%20and%20Yan%20Huang%20and%20Cheng%20Han%20and%20Heng%20Fan%20and%20Libo%20Zhang%0AAbstract%3A%20In%20real%20scenarios%2C%20videos%20can%20span%20several%20minutes%20or%20even%20hours.%20However%2C%20existing%20research%20on%20spatio-temporal%20video%20grounding%20%28STVG%29%2C%20given%20a%20textual%20query%2C%20mainly%20focuses%20on%20localizing%20targets%20in%20short%20videos%20of%20tens%20of%20seconds%2C%20typically%20less%20than%20one%20minute%2C%20which%20limits%20real-world%20applications.%20In%20this%20paper%2C%20we%20explore%20Long-Form%20STVG%20%28LF-STVG%29%2C%20which%20aims%20to%20locate%20targets%20in%20long-term%20videos.%20Compared%20with%20short%20videos%2C%20long-term%20videos%20contain%20much%20longer%20temporal%20spans%20and%20more%20irrelevant%20information%2C%20making%20it%20difficult%20for%20existing%20STVG%20methods%20that%20process%20all%20frames%20at%20once.%20To%20address%20this%20challenge%2C%20we%20propose%20an%20AutoRegressive%20Transformer%20architecture%20for%20LF-STVG%2C%20termed%20ART-STVG.%20Unlike%20conventional%20STVG%20methods%20that%20require%20the%20entire%20video%20sequence%20to%20make%20predictions%20at%20once%2C%20ART-STVG%20treats%20the%20video%20as%20streaming%20input%20and%20processes%20frames%20sequentially%2C%20enabling%20efficient%20handling%20of%20long%20videos.%20To%20model%20spatio-temporal%20context%2C%20we%20design%20spatial%20and%20temporal%20memory%20banks%20and%20apply%20them%20to%20the%20decoders.%20Since%20memories%20from%20different%20moments%20are%20not%20always%20relevant%20to%20the%20current%20frame%2C%20we%20introduce%20simple%20yet%20effective%20memory%20selection%20strategies%20to%20provide%20more%20relevant%20information%20to%20the%20decoders%2C%20significantly%20improving%20performance.%20Furthermore%2C%20instead%20of%20parallel%20spatial%20and%20temporal%20localization%2C%20we%20propose%20a%20cascaded%20spatio-temporal%20design%20that%20connects%20the%20spatial%20decoder%20to%20the%20temporal%20decoder%2C%20allowing%20fine-grained%20spatial%20cues%20to%20assist%20complex%20temporal%20localization%20in%20long%20videos.%20Experiments%20on%20newly%20extended%20LF-STVG%20datasets%20show%20that%20ART-STVG%20significantly%20outperforms%20state-of-the-art%20methods%2C%20while%20achieving%20competitive%20performance%20on%20conventional%20short-form%20STVG.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23294v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520Long-Form%2520Spatio-Temporal%2520Video%2520Grounding%26entry.906535625%3DXin%2520Gu%2520and%2520Bing%2520Fan%2520and%2520Jiali%2520Yao%2520and%2520Zhipeng%2520Zhang%2520and%2520Yan%2520Huang%2520and%2520Cheng%2520Han%2520and%2520Heng%2520Fan%2520and%2520Libo%2520Zhang%26entry.1292438233%3DIn%2520real%2520scenarios%252C%2520videos%2520can%2520span%2520several%2520minutes%2520or%2520even%2520hours.%2520However%252C%2520existing%2520research%2520on%2520spatio-temporal%2520video%2520grounding%2520%2528STVG%2529%252C%2520given%2520a%2520textual%2520query%252C%2520mainly%2520focuses%2520on%2520localizing%2520targets%2520in%2520short%25 al%2520decoder%252C%2520allowing%2520fine-grained%2520spatial%2520cues%2520to%2520assist%2520complex%2520temporal%2520localization%2520in%2520long%2520videos.%2520Experiments%2520on%2520newly%2520extended%2520LF-STVG%2520datasets%2520show%2520that%2520ART-STVG%2520significantly%2520outperforms%2520state-of-the-art%2520methods%252C%2520while%2520achieving%2520competitive%2520performance%2520on%2520conventional%2520short-form%2520STVG.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.23294v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Towards%20Long-Form%20Spatio-Temporal%20Video%20Grounding&entry.906535625=Xin%20Gu%20and%20Bing%20Fan%20and%20Jiali%20Yao%20and%20Zhipeng%20Zhang%20and%20Yan%20Huang%20and%20Cheng%20Han%20and%20Heng%20Fan%20and%20Libo%20Zhang&entry.1292438233=In%20real%20scenarios%2C%20videos%20can%20span%20several%20minutes%20or%20even%20hours.%20However%2C%20existing%20research%20on%20spatio-temporal%20video%20grounding%20%28STVG%29%2C%20given%20a%20textual%20query%2C%20mainly%20focuses%20on%20localizing%20targets%20in%20short%20videos%20of%20tens%20of%20seconds%2C%20typically%20less%20than%20one%20minute%2C%20which%20limits%20real-world%20applications.%20In%20this%20paper%2C%20we%20explore%20Long-Form%20STVG%20%28LF-STVG%29%2C%20which%20aims%20to%20locate%20targets%20in%20long-term%20videos.%20Compared%20with%20short%20videos%2C%20long-term%20videos%20contain%20much%20longer%20temporal%20spans%20and%20more%20irrelevant%20information%2C%20making%20it%20difficult%20for%20existing%20STVG%20methods%20that%20process%20all%20frames%20at%20once.%20To%20address%20this%20challenge%2C%20we%20propose%20an%20AutoRegressive%20Transformer%20architecture%20for%20LF-STVG%2C%20termed%20ART-STVG.%20Unlike%20conventional%20STVG%20methods%20that%20require%20the%20entire%20video%20sequence%20to%20make%20predictions%20at%20once%2C%20ART-STVG%20treats%20the%20video%20as%20streaming%20input%20and%20processes%20frames%20sequentially%2C%20enabling%20efficient%20handling%20of%20long%20videos.%20To%20model%20spatio-temporal%20context%2C%20we%20design%20spatial%20and%20temporal%20memory%20banks%20and%20apply%20them%20to%20the%20decoders.%20Since%20memories%20from%20different%20moments%20are%20not%20always%20relevant%20to%20the%20current%20frame%2C%20we%20introduce%20simple%20yet%20effective%20memory%20selection%20strategies%20to%20provide%20more%20relevant%20information%20to%20the%20decoders%2C%20significantly%20improving%20performance.%20Furthermore%2C%20instead%20of%20parallel%20spatial%20and%20temporal%20localization%2C%20we%20propose%20a%20cascaded%20spatio-temporal%20design%20that%20connects%20the%20spatial%20decoder%20to%20the%20temporal%20decoder%2C%20allowing%20fine-grained%20spatial%20cues%20to%20assist%20complex%20temporal%20localization%20in%20long%20videos.%20Experiments%20on%20newly%20extended%20LF-STVG%20datasets%20show%20that%20ART-STVG%20significantly%20outperforms%20state-of-the-art%20methods%2C%20while%20achieving%20competitive%20performance%20on%20conventional%20short-form%20STVG.&entry.1838667208=http%3A//arxiv.org/abs/2602.23294v1&entry.124074799=Read"},
{"title": "GeoWorld: Geometric World Models", "author": "Zeyu Zhang and Danning Li and Ian Reid and Richard Hartley", "abstract": "Energy-based predictive world models provide a powerful approach for multi-step visual planning by reasoning over latent energy landscapes rather than generating pixels. However, existing approaches face two major challenges: (i) their latent representations are typically learned in Euclidean space, neglecting the underlying geometric and hierarchical structure among states, and (ii) they struggle with long-horizon prediction, which leads to rapid degradation across extended rollouts. To address these challenges, we introduce GeoWorld, a geometric world model that preserves geometric structure and hierarchical relations through a Hyperbolic JEPA, which maps latent representations from Euclidean space onto hyperbolic manifolds. We further introduce Geometric Reinforcement Learning for energy-based optimization, enabling stable multi-step planning in hyperbolic latent space. Extensive experiments on CrossTask and COIN demonstrate around 3% SR improvement in 3-step planning and 2% SR improvement in 4-step planning compared to the state-of-the-art V-JEPA 2. Project website: https://steve-zeyu-zhang.github.io/GeoWorld.", "link": "http://arxiv.org/abs/2602.23058v1", "date": "2026-02-26", "relevancy": 2.2628, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6177}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5866}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.524}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GeoWorld%3A%20Geometric%20World%20Models&body=Title%3A%20GeoWorld%3A%20Geometric%20World%20Models%0AAuthor%3A%20Zeyu%20Zhang%20and%20Danning%20Li%20and%20Ian%20Reid%20and%20Richard%20Hartley%0AAbstract%3A%20Energy-based%20predictive%20world%20models%20provide%20a%20powerful%20approach%20for%20multi-step%20visual%20planning%20by%20reasoning%20over%20latent%20energy%20landscapes%20rather%20than%20generating%20pixels.%20However%2C%20existing%20approaches%20face%20two%20major%20challenges%3A%20%28i%29%20their%20latent%20representations%20are%20typically%20learned%20in%20Euclidean%20space%2C%20neglecting%20the%20underlying%20geometric%20and%20hierarchical%20structure%20among%20states%2C%20and%20%28ii%29%20they%20struggle%20with%20long-horizon%20prediction%2C%20which%20leads%20to%20rapid%20degradation%20across%20extended%20rollouts.%20To%20address%20these%20challenges%2C%20we%20introduce%20GeoWorld%2C%20a%20geometric%20world%20model%20that%20preserves%20geometric%20structure%20and%20hierarchical%20relations%20through%20a%20Hyperbolic%20JEPA%2C%20which%20maps%20latent%20representations%20from%20Euclidean%20space%20onto%20hyperbolic%20manifolds.%20We%20further%20introduce%20Geometric%20Reinforcement%20Learning%20for%20energy-based%20optimization%2C%20enabling%20stable%20multi-step%20planning%20in%20hyperbolic%20latent%20space.%20Extensive%20experiments%20on%20CrossTask%20and%20COIN%20demonstrate%20around%203%25%20SR%20improvement%20in%203-step%20planning%20and%202%25%20SR%20improvement%20in%204-step%20planning%20compared%20to%20the%20state-of-the-art%20V-JEPA%202.%20Project%20website%3A%20https%3A//steve-zeyu-zhang.github.io/GeoWorld.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23058v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeoWorld%253A%2520Geometric%2520World%2520Models%26entry.906535625%3DZeyu%2520Zhang%2520and%2520Danning%2520Li%2520and%2520Ian%2520Reid%2520and%2520Richard%2520Hartley%26entry.1292438233%3DEnergy-based%2520predictive%2520world%2520models%2520provide%2520a%2520powerful%2520approach%2520for%2520multi-step%2520visual%2520planning%2520by%2520reasoning%2520over%2520latent%2520energy%2520landscapes%2520rather%2520than%2520generating%2520pixels.%2520However%252C%2520existing%2520approaches%2520face%2520two%2520major%2520challenges%253A%2520%2528i%2529%2520their%2520latent%2520representations%2520are%2520typically%2520learned%2520in%2520Euclidean%2520space%252C%2520neglecting%2520the%2520underlying%2520geometric%2520and%2520hierarchical%2520structure%2520among%2520states%252C%2520and%2520%2528ii%2529%2520they%2520struggle%2520with%2520long-horizon%2520prediction%252C%2520which%2520leads%2520to%2520rapid%2520degradation%2520across%2520extended%2520rollouts.%2520To%2520address%2520these%2520challenges%252C%2520we%2520introduce%2520GeoWorld%252C%2520a%2520geometric%2520world%2520model%2520that%2520preserves%2520geometric%2520structure%2520and%2520hierarchical%2520relations%2520through%2520a%2520Hyperbolic%2520JEPA%252C%2520which%2520maps%2520latent%2520representations%2520from%2520Euclidean%2520space%2520onto%2520hyperbolic%2520manifolds.%2520We%2520further%2520introduce%2520Geometric%2520Reinforcement%2520Learning%2520for%2520energy-based%2520optimization%252C%2520enabling%2520stable%2520multi-step%2520planning%2520in%2520hyperbolic%2520latent%2520space.%2520Extensive%2520experiments%2520on%2520CrossTask%2520and%2520COIN%2520demonstrate%2520around%25203%2525%2520SR%2520improvement%2520in%25203-step%2520planning%2520and%25202%2525%2520SR%2520improvement%2520in%25204-step%2520planning%2520compared%2520to%2520the%2520state-of-the-art%2520V-JEPA%25202.%2520Project%2520website%253A%2520https%253A//steve-zeyu-zhang.github.io/GeoWorld.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.23058v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GeoWorld%3A%20Geometric%20World%20Models&entry.906535625=Zeyu%20Zhang%20and%20Danning%20Li%20and%20Ian%20Reid%20and%20Richard%20Hartley&entry.1292438233=Energy-based%20predictive%20world%20models%20provide%20a%20powerful%20approach%20for%20multi-step%20visual%20planning%20by%20reasoning%20over%20latent%20energy%20landscapes%20rather%20than%20generating%20pixels.%20However%2C%20existing%20approaches%20face%20two%20major%20challenges%3A%20%28i%29%20their%20latent%20representations%20are%20typically%20learned%20in%20Euclidean%20space%2C%20neglecting%20the%20underlying%20geometric%20and%20hierarchical%20structure%20among%20states%2C%20and%20%28ii%29%20they%20struggle%20with%20long-horizon%20prediction%2C%20which%20leads%20to%20rapid%20degradation%20across%20extended%20rollouts.%20To%20address%20these%20challenges%2C%20we%20introduce%20GeoWorld%2C%20a%20geometric%20world%20model%20that%20preserves%20geometric%20structure%20and%20hierarchical%20relations%20through%20a%20Hyperbolic%20JEPA%2C%20which%20maps%20latent%20representations%20from%20Euclidean%20space%20onto%20hyperbolic%20manifolds.%20We%20further%20introduce%20Geometric%20Reinforcement%20Learning%20for%20energy-based%20optimization%2C%20enabling%20stable%20multi-step%20planning%20in%20hyperbolic%20latent%20space.%20Extensive%20experiments%20on%20CrossTask%20and%20COIN%20demonstrate%20around%203%25%20SR%20improvement%20in%203-step%20planning%20and%202%25%20SR%20improvement%20in%204-step%20planning%20compared%20to%20the%20state-of-the-art%20V-JEPA%202.%20Project%20website%3A%20https%3A//steve-zeyu-zhang.github.io/GeoWorld.&entry.1838667208=http%3A//arxiv.org/abs/2602.23058v1&entry.124074799=Read"},
{"title": "Face Time Traveller : Travel Through Ages Without Losing Identity", "author": "Purbayan Kar and Ayush Ghadiya and Vishal Chudasama and Pankaj Wasnik and C. V. Jawahar", "abstract": "Face aging, an ill-posed problem shaped by environmental and genetic factors, is vital in entertainment, forensics, and digital archiving, where realistic age transformations must preserve both identity and visual realism. However, existing works relying on numerical age representations overlook the interplay of biological and contextual cues. Despite progress in recent face aging models, they struggle with identity preservation in wide age transformations, also static attention and optimization-heavy inversion in diffusion limit adaptability, fine-grained control and background consistency. To address these challenges, we propose Face Time Traveller (FaceTT), a diffusion-based framework that achieves high-fidelity, identity-consistent age transformation. Here, we introduce a Face-Attribute-Aware Prompt Refinement strategy that encodes intrinsic (biological) and extrinsic (environmental) aging cues for context-aware conditioning. A tuning-free Angular Inversion method is proposed that efficiently maps real faces into the diffusion latent space for fast and accurate reconstruction. Moreover, an Adaptive Attention Control mechanism is introduced that dynamically balances cross-attention for semantic aging cues and self-attention for structural and identity preservation. Extensive experiments on benchmark datasets and in-the-wild testset demonstrate that FaceTT achieves superior identity retention, background preservation and aging realism over state-of-the-art (SOTA) methods.", "link": "http://arxiv.org/abs/2602.22819v1", "date": "2026-02-26", "relevancy": 2.2628, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5786}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5587}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5508}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Face%20Time%20Traveller%20%3A%20Travel%20Through%20Ages%20Without%20Losing%20Identity&body=Title%3A%20Face%20Time%20Traveller%20%3A%20Travel%20Through%20Ages%20Without%20Losing%20Identity%0AAuthor%3A%20Purbayan%20Kar%20and%20Ayush%20Ghadiya%20and%20Vishal%20Chudasama%20and%20Pankaj%20Wasnik%20and%20C.%20V.%20Jawahar%0AAbstract%3A%20Face%20aging%2C%20an%20ill-posed%20problem%20shaped%20by%20environmental%20and%20genetic%20factors%2C%20is%20vital%20in%20entertainment%2C%20forensics%2C%20and%20digital%20archiving%2C%20where%20realistic%20age%20transformations%20must%20preserve%20both%20identity%20and%20visual%20realism.%20However%2C%20existing%20works%20relying%20on%20numerical%20age%20representations%20overlook%20the%20interplay%20of%20biological%20and%20contextual%20cues.%20Despite%20progress%20in%20recent%20face%20aging%20models%2C%20they%20struggle%20with%20identity%20preservation%20in%20wide%20age%20transformations%2C%20also%20static%20attention%20and%20optimization-heavy%20inversion%20in%20diffusion%20limit%20adaptability%2C%20fine-grained%20control%20and%20background%20consistency.%20To%20address%20these%20challenges%2C%20we%20propose%20Face%20Time%20Traveller%20%28FaceTT%29%2C%20a%20diffusion-based%20framework%20that%20achieves%20high-fidelity%2C%20identity-consistent%20age%20transformation.%20Here%2C%20we%20introduce%20a%20Face-Attribute-Aware%20Prompt%20Refinement%20strategy%20that%20encodes%20intrinsic%20%28biological%29%20and%20extrinsic%20%28environmental%29%20aging%20cues%20for%20context-aware%20conditioning.%20A%20tuning-free%20Angular%20Inversion%20method%20is%20proposed%20that%20efficiently%20maps%20real%20faces%20into%20the%20diffusion%20latent%20space%20for%20fast%20and%20accurate%20reconstruction.%20Moreover%2C%20an%20Adaptive%20Attention%20Control%20mechanism%20is%20introduced%20that%20dynamically%20balances%20cross-attention%20for%20semantic%20aging%20cues%20and%20self-attention%20for%20structural%20and%20identity%20preservation.%20Extensive%20experiments%20on%20benchmark%20datasets%20and%20in-the-wild%20testset%20demonstrate%20that%20FaceTT%20achieves%20superior%20identity%20retention%2C%20background%20preservation%20and%20aging%20realism%20over%20state-of-the-art%20%28SOTA%29%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22819v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFace%2520Time%2520Traveller%2520%253A%2520Travel%2520Through%2520Ages%2520Without%2520Losing%2520Identity%26entry.906535625%3DPurbayan%2520Kar%2520and%2520Ayush%2520Ghadiya%2520and%2520Vishal%2520Chudasama%2520and%2520Pankaj%2520Wasnik%2520and%2520C.%2520V.%2520Jawahar%26entry.1292438233%3DFace%2520aging%252C%2520an%2520ill-posed%2520problem%2520shaped%2520by%2520environmental%2520and%2520genetic%2520factors%252C%2520is%2520vital%2520in%2520entertainment%252C%2520forensics%252C%2520and%2520digital%2520archiving%252C%2520where%2520realistic%2520age%2520transformations%2520must%2520preserve%2520both%2520identity%2520and%2520visual%2520realism.%2520However%252C%2520existing%2520works%2520relying%2520on%2520numerical%2520age%2520representations%2520overlook%2520the%2520interplay%2520of%2520biological%2520and%2520contextual%2520cues.%2520Despite%2520progress%2520in%2520recent%2520face%2520aging%2520models%252C%2520they%2520struggle%2520with%2520identity%2520preservation%2520in%2520wide%2520age%2520transformations%252C%2520also%2520static%2520attention%2520and%2520optimization-heavy%2520inversion%2520in%2520diffusion%2520limit%2520adaptability%252C%2520fine-grained%2520control%2520and%2520background%2520consistency.%2520To%2520address%2520these%2520challenges%252C%2520 formations%20must%20preserve%20both%20identity%20and%20visual%20realism.%20However%2C%20existing%20works%20relying%20on%20numerical%20age%20representations%20overlook%20the%20interplay%20of%20biological%20and%20contextual%20cues.%20Despite%20progress%20in%20recent%20face%20aging%20models%2C%20they%20struggle%20with%20identity%20preservation%20in%20wide%20age%20transformations%2C%20also%20static%20attention%20and%20optimization-heavy%20inversion%20in%20diffusion%20limit%20adaptability%2C%20fine-grained%20control%20and%20background%20consistency.%20To%20address%20these%20challenges%2C%20we%20propose%20Face%20Time%20Traveller%20%28FaceTT%29%2C%20a%20diffusion-based%20framework%20that%20achieves%20high-fidelity%2C%20identity-consistent%20age%20transformation.%20Here%2C%20we%20introduce%20a%20Face-Attribute-Aware%20Prompt%20Refinement%20strategy%20that%20encodes%20intrinsic%20%28biological%29%20and%20extrinsic%20%28environmental%29%20aging%20cues%20for%20context-aware%20conditioning.%20A%20tuning-free%20Angular%20Inversion%20method%20is%20proposed%20that%20efficiently%20maps%20real%20faces%20into%20the%20diffusion%20latent%20space%20for%20fast%20and%20accurate%20reconstruction.%20Moreover%2C%20an%20Adaptive%20Attention%20Control%20mechanism%20is%20introduced%20that%20dynamically%20balances%20cross-attention%20for%20semantic%20aging%20cues%20and%20self-attention%20for%20structural%20and%20identity%20preservation.%20Extensive%20experiments%20on%20benchmark%20datasets%20and%20in-the-wild%20testset%20demonstrate%20that%20FaceTT%20achieves%20superior%20identity%20retention%2C%20background%20preservation%20and%20aging%20realism%20over%20state-of-the-art%20%28SOTA%29%20methods.&entry.1838667208=http%3A//arxiv.org/abs/2602.22819v1&entry.124074799=Read"},
{"title": "Decomposing Private Image Generation via Coarse-to-Fine Wavelet Modeling", "author": "Jasmine Bayrooti and Weiwei Kong and Natalia Ponomareva and Carlos Esteves and Ameesh Makadia and Amanda Prorok", "abstract": "Generative models trained on sensitive image datasets risk memorizing and reproducing individual training examples, making strong privacy guarantees essential. While differential privacy (DP) provides a principled framework for such guarantees, standard DP finetuning (e.g., with DP-SGD) often results in severe degradation of image quality, particularly in high-frequency textures, due to the indiscriminate addition of noise across all model parameters. In this work, we propose a spectral DP framework based on the hypothesis that the most privacy-sensitive portions of an image are often low-frequency components in the wavelet space (e.g., facial features and object shapes) while high-frequency components are largely generic and public. Based on this hypothesis, we propose the following two-stage framework for DP image generation with coarse image intermediaries: (1) DP finetune an autoregressive spectral image tokenizer model on the low-resolution wavelet coefficients of the sensitive images, and (2) perform high-resolution upsampling using a publicly pretrained super-resolution model. By restricting the privacy budget to the global structures of the image in the first stage, and leveraging the post-processing property of DP for detail refinement, we achieve promising trade-offs between privacy and utility. Experiments on the MS-COCO and MM-CelebA-HQ datasets show that our method generates images with improved quality and style capture relative to other leading DP image frameworks.", "link": "http://arxiv.org/abs/2602.23262v1", "date": "2026-02-26", "relevancy": 2.2538, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.574}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.561}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5432}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Decomposing%20Private%20Image%20Generation%20via%20Coarse-to-Fine%20Wavelet%20Modeling&body=Title%3A%20Decomposing%20Private%20Image%20Generation%20via%20Coarse-to-Fine%20Wavelet%20Modeling%0AAuthor%3A%20Jasmine%20Bayrooti%20and%20Weiwei%20Kong%20and%20Natalia%20Ponomareva%20and%20Carlos%20Esteves%20and%20Ameesh%20Makadia%20and%20Amanda%20Prorok%0AAbstract%3A%20Generative%20models%20trained%20on%20sensitive%20image%20datasets%20risk%20memorizing%20and%20reproducing%20individual%20training%20examples%2C%20making%20strong%20privacy%20guarantees%20essential.%20While%20differential%20privacy%20%28DP%29%20provides%20a%20principled%20framework%20for%20such%20guarantees%2C%20standard%20DP%20finetuning%20%28e.g.%2C%20with%20DP-SGD%29%20often%20results%20in%20severe%20degradation%20of%20image%20quality%2C%20particularly%20in%20high-frequency%20textures%2C%20due%20to%20the%20indiscriminate%20addition%20of%20noise%20across%20all%20model%20parameters.%20In%20this%20work%2C%20we%20propose%20a%20spectral%20DP%20framework%20based%20on%20the%20hypothesis%20that%20the%20most%20privacy-sensitive%20portions%20of%20an%20image%20are%20often%20low-frequency%20components%20in%20the%20wavelet%20space%20%28e.g.%2C%20facial%20features%20and%20object%20shapes%29%20while%20high-frequency%20components%20are%20largely%20generic%20and%20public.%20Based%20on%20this%20hypothesis%2C%20we%20propose%20the%20following%20two-stage%20framework%20for%20DP%20image%20generation%20with%20coarse%20image%20intermediaries%3A%20%281%29%20DP%20finetune%20an%20autoregressive%20spectral%20image%20tokenizer%20model%20on%20the%20low-resolution%20wavelet%20coefficients%20of%20the%20sensitive%20images%2C%20and%20%282%29%20perform%20high-resolution%20upsampling%20using%20a%20publicly%20pretrained%20super-resolution%20model.%20By%20restricting%20the%20privacy%20budget%20to%20the%20global%20structures%20of%20the%20image%20in%20the%20first%20stage%2C%20and%20leveraging%20the%20post-processing%20property%20of%20DP%20for%20detail%20refinement%2C%20we%20achieve%20promising%20trade-offs%20between%20privacy%20and%20utility.%20Experiments%20on%20the%20MS-COCO%20and%20MM-CelebA-HQ%20datasets%20show%20that%20our%20method%20generates%20images%20with%20improved%20quality%20and%20style%20capture%20relative%20to%20other%20leading%20DP%20image%20frameworks.%0ALink%3A%20http%3A//arxiv.org/abs/2602.23262v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDecomposing%2520Private%2520Image%2520Generation%2520via%2520Coarse-to-Fine%2520Wavelet%2520Modeling%26entry.906535625%3DJasmine%2520Bayrooti%2520and%2520Weiwei%2520Kong%2520and%2520Natalia%2520Ponomareva%2520and%2520Carlos%2520Esteves%2520and%2520Ameesh%2520Makadia%2520and%2520Amanda%2520Prorok%26entry.1292438233%3DGenerative%2520models%2520trained%2520on%2520sensitive%2520image%2520datasets%2520risk%2520memorizing%2520and%2520reproducing%2520individual%2520training%2520examples%252C%2520making%2520strong%2520privacy%2520guarantees%2520essential.%2520While%2520differential%2520privacy%2520%2528DP%2529%2520provides%2520a%2520principled%2520framework%2520for%2520such%2520guarantees%252C%2520standard%2520DP%2520finetuning%2520%2528e.g.%252C%2520with%2520DP-SGD%2529%2520often%2520results%2520in%2520severe%2520degradation%2520of%2520image%2520quality%252C%2520particularly%2520in%2520high-frequency%2520textures%252C%2520due%2520to%2520the%2520indiscriminate%2520addition%2520of%2520noise%2520across%2520all%2520model%2520parameters.%2520In%2520this%2520work%252C%2520we%2520propose%2520a%2520spectral%2520DP%2520 e%20relative%20to%20other%20leading%20DP%20image%20frameworks.&entry.1838667208=http%3A//arxiv.org/abs/2602.23262v1&entry.124074799=Read"},
{"title": "NoRA: Breaking the Linear Ceiling of Low-Rank Adaptation via Manifold Expansion", "author": "Hung-Hsuan Chen", "abstract": "Low-Rank Adaptation (LoRA) dominates parameter-efficient fine-tuning (PEFT). However, it faces a critical ``linear ceiling'' in complex reasoning tasks: simply increasing the rank yields diminishing returns due to intrinsic linear constraints. We introduce NoRA (Non-linear Rank Adaptation), a weight-level parallel adapter that injects SiLU gating and structural dropout to induce manifold expansion. On the SlimOrca benchmark, NoRA breaks this linear barrier: NoRA remarkably at rank 64 (PPL 3.89) outperforms LoRA at rank 512 (PPL 3.90), demonstrating superior spectral efficiency. This advantage generalizes to mathematical reasoning, where NoRA achieves a perplexity of 1.97 on MathInstruct, significantly surpassing LoRA's saturation point of 2.07. Mechanism analysis via Singular Value Decomposition (SVD) confirms that NoRA activates the dormant tail of the singular value spectrum, effectively preventing the rank collapse observed in linear methods.", "link": "http://arxiv.org/abs/2602.22911v1", "date": "2026-02-26", "relevancy": 2.2425, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.469}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4415}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.435}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NoRA%3A%20Breaking%20the%20Linear%20Ceiling%20of%20Low-Rank%20Adaptation%20via%20Manifold%20Expansion&body=Title%3A%20NoRA%3A%20Breaking%20the%20Linear%20Ceiling%20of%20Low-Rank%20Adaptation%20via%20Manifold%20Expansion%0AAuthor%3A%20Hung-Hsuan%20Chen%0AAbstract%3A%20Low-Rank%20Adaptation%20%28LoRA%29%20dominates%20parameter-efficient%20fine-tuning%20%28PEFT%29.%20However%2C%20it%20faces%20a%20critical%20%60%60linear%20ceiling%27%27%20in%20complex%20reasoning%20tasks%3A%20simply%20increasing%20the%20rank%20yields%20diminishing%20returns%20due%20to%20intrinsic%20linear%20constraints.%20We%20introduce%20NoRA%20%28Non-linear%20Rank%20Adaptation%29%2C%20a%20weight-level%20parallel%20adapter%20that%20injects%20SiLU%20gating%20and%20structural%20dropout%20to%20induce%20manifold%20expansion.%20On%20the%20SlimOrca%20benchmark%2C%20NoRA%20breaks%20this%20linear%20barrier%3A%20NoRA%20remarkably%20at%20rank%2064%20%28PPL%203.89%29%20outperforms%20LoRA%20at%20rank%20512%20%28PPL%203.90%29%2C%20demonstrating%20superior%20spectral%20efficiency.%20This%20advantage%20generalizes%20to%20mathematical%20reasoning%2C%20where%20NoRA%20achieves%20a%20perplexity%20of%201.97%20on%20MathInstruct%2C%20significantly%20surpassing%20LoRA%27s%20saturation%20point%20of%202.07.%20Mechanism%20analysis%20via%20Singular%20Value%20Decomposition%20%28SVD%29%20confirms%20that%20NoRA%20activates%20the%20dormant%20tail%20of%20the%20singular%20value%20spectrum%2C%20effectively%20preventing%20the%20rank%20collapse%20observed%20in%20linear%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22911v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNoRA%253A%2520Breaking%2520the%2520Linear%2520Ceiling%2520of%2520Low-Rank%2520Adaptation%2520via%2520Manifold%2520Expansion%26entry.906535625%3DHung-Hsuan%2520Chen%26entry.1292438233%3DLow-Rank%2520Adaptation%2520%2528LoRA%2529%2520dominates%2520parameter-efficient%2520fine-tuning%2520%2528PEFT%2529.%2520However%252C%2520it%2520faces%2520a%2520critical%2520%2560%2560linear%2520ceiling%2527%2527%2520in%2520complex%2520reasoning%2520tasks%253A%2520simply%2520increasing%2520the%2520rank%2520yields%2520diminishing%2520returns%2520due%2520to%2520intrinsic%2520linear%2520constraints.%2520We%2520introduce%2520NoRA%2520%2528Non-linear%2520Rank%2520Adaptation%2529%252C%2520a%2520weight-level%2520parallel%2520adapter%2520that%2520injects%2520SiLU%2520gating%2520and%2520structural%2520dropout%2520to%2520induce%2520manifold%2520expansion.%2520On%2520the%2520SlimOrca%2520benchmark%252C%2520NoRA%2520breaks%2520this%2520linear%2520barrier%253A%2520NoRA%2520remarkably%2520at%2520rank%252064%2520%2528PPL%25203.89%2529%2520outperforms%2520LoRA%2520at%2520rank%2520512%2520%2528PPL%25203.90%2529%252C%2520demonstrating%2520superior%2520spectral%2520efficiency.%2520This%2520advantage%2520generalizes%2520to%2520mathematical%2520reasoning%252C%2520where%2520NoRA%2520achieves%2520a%2520perplexity%2520of%25201.97%2520on%2520MathInstruct%252C%2520significantly%2520surpassing%2520LoRA%2527s%2520saturation%2520point%2520of%25202.07.%2520Mechanism%2520analysis%2520via%2520Singular%2520Value%2520Decomposition%2520%2528SVD%2529%2520confirms%2520that%2520NoRA%2520activates%2520the%2520dormant%2520tail%2520of%2520the%2520singular%2520value%2520spectrum%252C%2520effectively%2520preventing%2520the%2520rank%2520collapse%2520observed%2520in%2520linear%2520methods.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.22911v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=NoRA%3A%20Breaking%20the%20Linear%20Ceiling%20of%20Low-Rank%20Adaptation%20via%20Manifold%20Expansion&entry.906535625=Hung-Hsuan%20Chen&entry.1292438233=Low-Rank%20Adaptation%20%28LoRA%29%20dominates%20parameter-efficient%20fine-tuning%20%28PEFT%29.%20However%2C%20it%20faces%20a%20critical%20%60%60linear%20ceiling%27%27%20in%20complex%20reasoning%20tasks%3A%20simply%20increasing%20the%20rank%20yields%20diminishing%20returns%20due%20to%20intrinsic%20linear%20constraints.%20We%20introduce%20NoRA%20%28Non-linear%20Rank%20Adaptation%29%2C%20a%20weight-level%20paral {"title": "Locally Adaptive Decay Surfaces for High-Speed Face and Landmark Detection with Event Cameras", "author": "Paul Kielty and Timothy Hanley and Peter Corcoran", "abstract": "Event cameras record luminance changes with microsecond resolution, but converting their sparse, asynchronous output into dense tensors that neural networks can exploit remains a core challenge. Conventional histograms or globally-decayed time-surface representations apply fixed temporal parameters across the entire image plane, which in practice creates a trade-off between preserving spatial structure during still periods and retaining sharp edges during rapid motion. We introduce Locally Adaptive Decay Surfaces (LADS), a family of event representations in which the temporal decay at each location is modulated according to local signal dynamics. Three strategies are explored, based on event rate, Laplacian-of-Gaussian response, and high-frequency spectral energy. These adaptive schemes preserve detail in quiescent regions while reducing blur in regions of dense activity. Extensive experiments on the public data show that LADS consistently improves both face detection and facial landmark accuracy compared to standard non-adaptive representations. At 30 Hz, LADS achieves higher detection accuracy and lower landmark error than either baseline, and at 240 Hz it mitigates the accuracy decline typically observed at higher frequencies, sustaining 2.44 % normalized mean error for landmarks and 0.966 mAP50 in face detection. These high-frequency results even surpass the accuracy reported in prior works operating at 30 Hz, setting new benchmarks for event-based face analysis. Moreover, by preserving spatial structure at the representation stage, LADS supports the use of much lighter network architectures while still retaining real-time performance. These results highlight the importance of context-aware temporal integration for neuromorphic vision and point toward real-time, high-frequency human-computer interaction systems that exploit the unique advantages of event cameras.", "link": "http://arxiv.org/abs/2602.23101v1", "date": "2026-02-26", "relevancy": 2.2417, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5737}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.565}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5453}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Locally%20Adaptive%20Decay%20Surfaces%20for%20High-Speed%20Face%20and%20Landmark%20Detection%20with%20Event%20Cameras&body=Title%3A%20Locally%20Adaptive%20Decay%20Surfaces%20for%20High-Speed%20Face%20and%20Landmark%20Detection%20with%20Event%20Cameras%0AAuthor%3A%20Paul%20Kielty%20and%20Timothy%20Hanley%20and%20Peter%20Corcoran%0AAbstract%3A%20Event%20cameras%20record%20luminance%20changes%20with%20microsecond%20resolution%2C%20but%20converting%20their%20sparse%2C%20asynchronous%20output%20into%20dense%20tensors%20that%20neural%20networks%20can%20exploit%20remains%20a%20core%20challenge.%20Conventional%20histograms%20or%20globally-decayed%20time-surface%20representations%20apply%20fixed%20temporal%20parameters%20across%20the%20entire%20image%20plane%2C%20which%20in%20practice%20creates%20a%20trade-off%20between%20preserving%20spatial%20structure%20during%20still%20periods%20and%20retaining%20sharp%20edges%20during%20rapid%20motion.%20We%20introduce%20Locally%20Adaptive%20Decay%20Surfaces%20%28LADS%29%2C%20a%20family%20of%20event%20representations%20in%20which%20the%20temporal%20decay%20at%20each%20location%20is%20modulated%20according%20to%20local%20signal%20dynamics.%20Three%20strategies%20are%20explored%2C%20based%20on%20event%20rate%2C%20Laplacian-of-Gaussian%2 {"title": "FLIGHT: Fibonacci Lattice-based Inference for Geometric Heading in real-Time", "author": "David Dirnfeld and Fabien Delattre and Pedro Miraldo and Erik Learned-Miller", "abstract": "Estimating camera motion from monocular video is a fundamental problem in computer vision, central to tasks such as SLAM, visual odometry, and structure-from-motion. Existing methods that recover the camera's heading under known rotation, whether from an IMU or an optimization algorithm, tend to perform well in low-noise, low-outlier conditions, but often decrease in accuracy or become computationally expensive as noise and outlier levels increase. To address these limitations, we propose a novel generalization of the Hough transform on the unit sphere (S(2)) to estimate the camera's heading. First, the method extracts correspondences between two frames and generates a great circle of directions compatible with each pair of correspondences. Then, by discretizing the unit sphere using a Fibonacci lattice as bin centers, each great circle casts votes for a range of directions, ensuring that features unaffected by noise or dynamic objects vote consistently for the correct motion direction. Experimental results on three datasets demonstrate that the proposed method is on the Pareto frontier of accuracy versus efficiency. Additionally, experiments on SLAM show that the proposed method reduces RMSE by correcting the heading during camera pose initialization.", "link": "http://arxiv.org/abs/2602.23115v1", "date": "2026-02-26", "relevancy": 2.2402, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5725}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5681}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.547}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FLIGHT%3A%20Fibonacci%20Lattice-based%20Inference%20for%20Geometric%20Heading%20in%20real-Time&body=Title%3A%20FLIGHT%3A%20Fibonacci%20Lattice-based%20Inference%20for%20Geometric%20Heading%20in%20real-Time%0AAuthor%3A%20David%20Dirnfeld%20and%20Fabien%20Delattre%20and%20Pedro%20Miraldo%20and%20Erik%20Learned-Miller%0AAbstract%3A%20Estimating%20camera%20motion%20from%20monocular%20video%20is%20a%20fundamental%20problem%20in%20computer%20vision%2C%20central%20to%20tasks%20such%20as%20SLAM%2C%20visual%20odometry%2C%20and%20structure-from-motion.%20Existing%20methods%20that%20recover%20the%20camera%27s%20heading%20under%20known%20rotation%2C%20whether%20from%20an%20IMU%20or%20an%20optimization%20algorithm%2C%20tend%20to%20perform%20well%20in%20low-noise%2C%20low-outlier%20conditions%2C%20but%20often%20decrease%20in%20accuracy%20or%20become%20computationally%20expensive%20as%20noise%20and%20outlier%20levels%20increase.%20To%20address%20these%20limitations%2C%20we%20propose%20a%20novel%20generalization%20of%20the%20Hough%20transform%20on%20the%20unit%20sphere%20%28S%282%29%29%20to%20estimate%20the%20camera%27s%20heading.%20First%2C%20the%20method%20extracts%20correspondences%20between%20two%20frames%20and%20generates%20a%20great%20circle%20of%20directions%20compatible%20with%20each%20pair%20of%20correspondences.%20Then%2C%20by%20discretizing%20the%20unit%20sphere%20using%20a%20Fibonacci%20lattice%20as%20bin%20centers%2C%20each%20great%20circle%20casts%20votes%20for%20a%20range%20of%20directions%2C%20ensuring%20that%20features%20unaffected%20by%20noise%20or%20dynamic%20objects%20vote%20consistently%20for%20the%20correct%20motion%20direction.%20Experimental%20results%20on%20three%20datasets%20demonstrate%20that%20the%20proposed%20method%20is%20on%20the%20Pareto%20frontier%20of%20accuracy%20versus%20efficiency.%20Additionally%2C%20experiments%20on%20SLAM%20show%20that%20the%2

{"title": "TriAttention: Efficient Long Reasoning with Trigonometric KV Compression", "author": "Weian Mao and Xi Lin and Wei Huang and Yuxin Xie and Tianfu Fu and Bohan Zhuang and Song Han and Yukang Chen", "abstract": "Extended reasoning in large language models (LLMs) creates severe KV cache memory bottlenecks. Leading KV cache compression methods estimate KV importance using attention scores from recent post-RoPE queries. However, queries rotate with position during RoPE, making representative queries very few, leading to poor top-key selection and unstable reasoning. To avoid this issue, we turn to the pre-RoPE space, where we observe that Q and K vectors are highly concentrated around fixed non-zero centers and remain stable across positions -- Q/K concentration. We show that this concentration causes queries to preferentially attend to keys at specific distances (e.g., nearest keys), with the centers determining which distances are preferred via a trigonometric series. Based on this, we propose TriAttention to estimate key importance by leveraging these centers. Via the trigonometric series, we use the distance preference characterized by these centers to score keys according to their positions, and also leverage Q/K norms as an additional signal for importance estimation. On AIME25 with 32K-token generation, TriAttention matches Full Attention reasoning accuracy while achieving 2.5x higher throughput or 10.7x KV memory reduction, whereas leading baselines achieve only about half the accuracy at the same efficiency. TriAttention enables OpenClaw deployment on a single consumer GPU, where long context would otherwise cause out-of-memory with Full Attention.", "link": "http://arxiv.org/abs/2604.04921v1", "date": "2026-04-06", "relevancy": 2.5369, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5347}, {"title": "TAMM: TriAdapter Multi-Modal Learning 20their%20positions%2C%20and%20also%20leverage%20Q/K%20norms%20as%20an%20additional%20signal%20for%20importance%20estimation.%20On%20AIME25%20with%2032K-token%20generation%2C%20TriAttention%20matches%20Full%20Attention%20reasoning%20accuracy%20while%20achieving%202.5x%20higher%20throughput%20or%2010.7x%20KV%20memory%20reduction%2C%20whereas%20leading%20baselines%20achieve%20only%20about%20half%20the%20accuracy%20at%20the%20same%20efficiency.%20TriAttention%20enables%20OpenClaw%20deployment%20on%20a%20single%20consumer%20GPU%2C%20where%20long%20context%20would%20otherwise%20cause%20out-of-memory%20with%20Full%20Attention.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04921v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTriAttention%253A%2520Efficient%2520Long%2520Reasoning%2520with%2520Trigonometric%2520KV%2520Compression%26entry.906535625%3DWeian%2520Mao%2520and%2520Xi%2520Lin%2520and%2520Wei%2520Huang%2520and%2520Yuxin%2520Xie%2520and%2520Tianfu%2520Fu%2520and%2520Bohan%2520Zhuang%2520and%2520Song%2520Han%2520and%2520Yukang%2520Chen%26entry.1292438233%3DExtended%2520reasoning%2520in%2520large%2520language%2520models%2520%2528LLMs%2529%2520creates%2520severe%2520KV%2520cache%2520memory%2520bottlenecks.%2520Leading%2520KV%2520cache%2520compression%2520methods%2520estimate%2520KV%2520importance%2520using%2520attention%2520scores%2520from%2520recent%2520post-RoPE%2520queries.%2520However%252C%2520queries%2520rotate%2520with%2520position%2520during%2520RoPE%252C%2520making%2520representative%2520queries%2520very%2520few%252C%2520leading%2520to%2520poor%2520top-key%2520selection%2520and%2520unstable%2520reasoning.%2520To%2520avoid%2520this%2520issue%252C%2520we%2520turn%2520to%2520the%2520pre-RoPE%2520space%252C%2520where%2520we%2520observe%2520that%2520Q%2520and%2520K%2520vectors%2520are%2520highly%2520concentrated%2520around%2520fixed%2520non-zero%2520centers%2520and%2520remain%2520stab {"title": "The Role of Generator Access in Autoregressive Post-Training", "author": "Amit Kiran Rege", "abstract": "We study how generator access constrains autoregressive post-training. The central question is whether the learner is confined to fresh root-start rollouts or can return to previously built prefixes and query the next-token rule there. In the root-start regime, output sampling, generated-token log probabilities, top-$k$ reports, and full next-token distributions along sampled trajectories all reduce to one canonical experiment, limited by the on-policy probability of reaching informative prefixes. Weak prefix control breaks this barrier, and once control is available, richer observations such as conditional sampling or logits can outperform top-$1$ access. Changing only the generator interface creates an exponential gap for KL-regularized outcome-reward post-training.", "link": "http://arxiv.org/abs/2604.04855v1", "date": "2026-04-06", "relevancy": 2.4736, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.511}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4883}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4849}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Role%20of%20Generator%20Access%20in%20Autoregressive%20Post-Training&body=Title%3A%20The%20Role%20of%20Generator%20Access%20in%20Autoregressive%20Post-Training%0AAuthor%3A%20Amit%20Kiran%20Rege%0AAbstract%3A%20We%20study%20how%20generator%20access%20constrains%20autoregressive%20post-training.%20The%20central%20question%20is%20whether%20the%20learner%20is%20confined%20to%20fresh%20root-start%20rollouts%20or%20can%20return%20to%20previously%20built%20prefixes%20and%20query%20the%20next-token%20rule%2 uch%2520as%2520conditional%2520sampling%2520or%2520logits%2520can%2520outperform%2520top-%25241%2524%2520access.%2520Changing%2520only%2520the%2520generator%2520interface%2520creates%2520an%2520exponential%2520gap%2520for%2520KL-regularized%2520outcome-reward%2520post-training.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.04855v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=The%20Role%20of%20Generator%20Access%20in%20Autoregressive%20Post-Training&entry.906535625=Amit%20Kiran%20Rege&entry.1292438233=We%20study%20how%20generator%20access%20constrains%20autoregressive%20post-training.%20The%20central%20question%20is%20whether%20the%20learner%20is%20confined%20to%20fresh%20root-start%20rollouts%20or%20can%20return%20to%20previously%20built%20prefixes%20and%20query%20the%20next-token%20rule%20there.%20In%20the%20root-start%20regime%2C%20output%20sampling%2C%20generated-token%20log%20probabilities%2C%20top-%24k%24%20reports%2C%20and%20full%20next-token%20distributions%20along%20sampled%20trajectories%20all%20reduce%20to%20one%20canonical%20experiment%2C%20limited%20by%20the%20on-policy%20probability%20of%20reaching%20informative%20prefixes.%20Weak%20prefix%20control%20breaks%20this%20barrier%2C%20and%20once%20control%20is%20available%2C%20richer%20observations%20such%20as%20conditional%20sampling%20or%20logits%20can%20outperform%20top-%241%24%20access.%20Changing%20only%20the%20generator%20interface%20creates%20an%20exponential%20gap%20for%20KL-regularized%20outcome-reward%20post-training.&entry.1838667208=http%3A//arxiv.org/abs/2604.04855v1&entry.124074799=Read"},
{"title": "WaterSplat-SLAM: Photorealistic Monocular SLAM in Underwater Environment", "author": "Kangxu Wang and Shaofeng Zou and Chenxing Jiang and Yixiang Dai and Siang Chen and Shaojie Shen and Guijin Wang", "abstract": "Underwater monocular SLAM is a challenging problem with applications from autonomous underwater vehicles to marine archaeology. However, existing underwater SLAM methods struggle to produce maps with high-fidelity rendering. In this paper, we propose WaterSplat-SLAM, a novel monocular underwater SLAM system that achieves robust pose estimation and photorealistic dense mapping. Specifically, we couple semantic medium filtering into two-view 3D reconstruction prior to enable underwater-adapted camera tracking and depth estimation. Furthermore, we present a semantic-guided rendering and adaptive map management strategy with an online medium-aware Gaussian map, modeling underwater environment in a photorealistic and compact manner. Experiments on multiple underwater datasets demonstrate that WaterSplat-SLAM achieves robust camera tracking and high-fidelity rendering in underwater environments.", "link": "http://arxiv.org/abs/2604.04642v1", "date": "2026-04-06", "relevancy": 2.4666, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6653}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6022}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5312}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20WaterSplat-SLAM%3A%20Photorealistic%20Monocular%20SLAM%20in%20Underwater%20Environment&body=Title%3A%20WaterSplat-SLAM%3A%20Photorealistic%20Monocular%20SLAM%20in%20Underwater%20Environment%0AAuthor%3A%20Kangxu%20Wang%20and%20Shaofeng%20Zou%20 {"title": "Early Stopping for Large Reasoning Models via Confidence Dynamics", "author": "Parsa Hosseini and Sumit Nawathe and Mahdi Salmani and Meisam Razaviyayn and Soheil Feizi", "abstract": "Large reasoning models rely on long chain-of-thought generation to solve complex problems, but extended reasoning often incurs substantial computational cost and can even degrade performance due to overthinking. A key challenge is determining when the model should stop reasoning and produce the final answer. In this work, we study the confidence of intermediate answers during reasoning and observe two characteristic behaviors: correct reasoning trajectories often reach high-confidence answers early, while incorrect rollouts tend to produce long, unproductive reasoning traces and exhibit less reliable confidence dynamics. Motivated by these observations, we propose CoDE-Stop (Confidence Dynamics Early Stop), an early stopping method that leverages the dynamics of intermediate answer confidence to decide when to terminate reasoning, requiring no additional training and easily integrating into existing models. We evaluate CoDE-Stop on diverse reasoning and science benchmarks across multiple models. Compared to prior early stopping methods, it achieves a more favorable accuracy-compute tradeoff and reduces total token usage by 25-50% compared to standard full-length reasoning. In addition, we provide analyses of confidence dynamics during reasoning, offering insights into how confidence changes in both correct and incorrect trajectories.", "link": "http://arxiv.org/abs/2604.04930v1", "date": "2026-04-06", "relevancy": 2.4575, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4962}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4898}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4885}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Early%20Stopping%20for%20Large%20Reasoning%20Models%20via%20Confidence%20Dynamics&body=Title%3A%20Early%20Stopping%20for%20Large%20Reasoning%20Models%20via%20Confidence%20Dynamics%0AAuthor%3A%20Parsa%20Hosseini%20and%20Sumit%20Nawathe%20and%20Mahdi%20Salmani%20and%20Meisam%20Razaviyayn%20and%20Soheil%20Feizi%0AAbstract%3A%20Large%20reasoning%20models%20rely%20on%20long%20chain-of-thought%20generation%20to%20solve%20complex%20problems%2C%20but%20extended%20reasoning%20often%20incurs%20substantial%20computational%20cost%20and%20can%20even%20degrade%20performance%20due%20to%20overthinking.%20A%20key%20challenge%20is%20determining%20when%20the%20model%20should%20stop%20reasoning%20and%20produce%20the%20final%20answer.%20In%20this%20work%2C%20we%20study%20the%20confidence%20of%20intermediate%20answers%20during%20reasoning%20and%20observe%20two%20characteristic%20behaviors%3A%20correct%20reasoning%20trajectories%20often%20reach%20high-confidence%20answers%20early%2C%20while%20incorrect%20rollouts%20tend%20to%20produce%20long%2C%20unproductive%20reasoning%20traces%20and%20exhibit%20less%20reliable%20confidence%20dynamics.%20Motivated%20by%20these%20observations%2C%20we%20propose%20CoDE-Stop%20%28Confidence%20Dynamics%20Early%20Stop%29%2C%20an%20early%20stopping%20method%20that%20leverages%20the%20dynamics%20of%20intermediate%20answer%20confidence%20to%20decide%20when%20to%20terminate%20reasoning%2C%20requiring%20no%20additional%20training%20and%20easily%20integrating%20into%20existing%20models.%20We%20evaluate%20CoDE-Stop%20on%20diverse%20reasoning%20and%20science%20benchmarks%20across%20multiple%20models.%20Compared%20to%20prior%20early%20stopping%20methods%2C%20it%20achieves%20a%20more%20favorable%20accuracy-compute%20tradeoff%20and%20reduces%20total%20token%20usage%20by%2025-50%25%20compared%20to%20standard%20full-length%20reasoning.%20In%20addition%2C%20we%20provide%20analyses%20of%20confidence%20dynamics%20during%20reasoning%2C%20offering%20insights%20into%20how%20confidence%20changes%20in%20both%20correct%20and%20incorrect%20trajectories.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04930v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEarly%2520Stopping%2520for%2520Large%2520Reasoning%2520Models%2520via%2520Confidence%2520Dynamics%26entry.906535625%3DParsa%2520Hosseini%2520and%2520Sumit%2520Nawathe%2520and%2520Mahdi%2520Salmani%2520and%2520Meisam%2520Razaviyayn%2520and%2520Soheil%2520Feizi%26entry.1292438233%3DLarge%2520reasoning%2520models%2520rely%2520on%2520long%2520chain-of-thought%2520generation%2520to%2520solve%2520complex%2520problems%252C%2520but%2520extended%2520reasoning%2520often%2520incurs%2520substantial%2520computational%2520cost%2520and%2520can%2520even%2520degrade%2520performance%2520due%2520to%2520overthinking.%2520A%2520key%2520challenge%2520is%2520determining%2520when%2520the%2520model%2520should%2520stop%2520reasoning%2520and%2520produce%2520the%2520final%2520answer.%2520In%2520this%2520work%252C%2520we%2520study%2520the%2520confidence%2520of%2520intermediate%2520answers%2520during%2520reasoning%2520and%2520observe%2520two%2520characteristic%2520behaviors%253A%2520correct%2520reasoning%2520trajectories%2520often%2520reach%2520high-confidence%2520answers%2520early%252C%2520while%2520incorrect%2520rollouts%2520tend%2520to%2520produce%2520long%252C%2520unproductive%2520reasoning%2520traces%2520and%2520exhibit%2520less%2520reliable%2520confidence%2520dynamics.%2520Motivated%2520by%2520these%2520observations%252C%2520we%2520propose%2520CoDE-Stop%2520%2528Confidence%2520Dynamics%2520Early%2520Stop%2529%252C%2520an%2520early%2520stopping%2520met {"title": "Screening Is Enough", "author": "Ken M. Nakanishi", "abstract": "A core limitation of standard softmax attention is that it does not define a notion of absolute query--key relevance: attention weights are obtained by redistributing a fixed unit mass across all keys according to their relative scores. As a result, relevance is defined only relative to competing keys, and irrelevant keys cannot be explicitly rejected. We introduce Multiscreen, a language-model architecture built around a mechanism we call screening, which enables absolute query--key relevance. Instead of redistributing attention across all keys, screening evaluates each key against an explicit threshold, discarding irrelevant keys and aggregating the remaining keys, thereby removing global competition among keys. Across experiments, Multiscreen achieves comparable validation loss with approximately 40% fewer parameters than a Transformer baseline and enables stable optimization at substantially larger learning rates. It maintains strong performance in long-context perplexity and shows little to no degradation in retrieval performance well beyond the training context length. Notably, even at the training context length, a Multiscreen model with approximately 92% fewer parameters consistently outperforms a larger Transformer in retrieval accuracy. Finally, Multiscreen reduces inference latency by up to 3.2$\\times$ at 100K context length.", "link": "http://arxiv.org/abs/2604.01178v2", "date": "2026-04-06", "relevancy": 2.4428, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4899}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4887}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4871}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Screening%20Is%20Enough&body=Title%3A%20Screening%20Is%20Enough%0AAuthor%3A%20Ken%20M.%20Nakanishi%0AAbstract%3A%20A%20core%20limitation%20of%20standard%20softmax%20attention%20is%20that%20it%20does%20not%20define%20a%20notion%20of%20absolute%20query--key%20relevance%3A%20attention%20weights%20are%20obtained%20by%20redistributing%20a%20fixed%20unit%20mass%20across%20all%20keys%20according%20to%20their%20relative%20scores.%20As%20a%20result%2C%20relevance%20is%20defined%20only%20relative%20to%20competing%20keys%2C%20and%20irrelevant%20keys%20cannot%20be%20explicitly%20rejected.%20We%20introduce%20Multiscreen%2C%20a%20language-model%20architecture%20built%20around%20a%20mechanism%20we%20call%20screening%2C%20which%20enables%20absolute%20query--key%20relevance.%20Instead%20of%20redistributing%20attention%20across%20all%20keys%2C%20screening%20evaluates%20each%20key%20against%20an%20explicit%20threshold%2C%20discarding%20irrelevant%20keys%20and%20aggregating%20the%20remaining%20keys%2C%20thereby%20removing%20global%20competition%20among%20keys.%20Across%20experiments%2C%20Multiscreen%20achieves%20comparable%20validation%20loss%20with%20approximately%2040%25%20fewer%20parameters%20than%20a%20Transformer%20baseline%20and%20enables%20stable%20optimization%20at%20substantially%20larger%20learning%20rates.%20It%20maintains%20strong%20performance%20in%20long-context%20perplexity%20and%20shows%20little%20to%20no%20degradation%20in%20retrieval%20performance%20well%20beyond%20the%20training%20context%20length.%20Notably%2C%20even%20at%20the%20training%20context%20length%2C%20a%20Multiscreen%20model%20with%20approximately%2092%25%20fewer%20parameters%20consistently%20outperforms%20a%20larger%20Transformer%20in%20retrieval%20accuracy.%20Finally%2C%20Multiscreen%20reduces%20inference%20latency%20by%20up%20to%203.2%24%5Ctimes%24%20at%20100K%20context%20length.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01178v2%0AF {"title": "Are Latent Reasoning Models Easily Interpretable?", "author": "Connor Dilgren and Sarah Wiegreffe", "abstract": "Latent reasoning models (LRMs) have attracted significant research interest due to their low inference cost (relative to explicit reasoning models) and theoretical ability to explore multiple reasoning paths in parallel. However, these benefits come at the cost of reduced interpretability: LRMs are difficult to monitor because they do not reason in natural language. This paper presents an investigation into LRM interpretability by examining two state-of-the-art LRMs. First, we find that latent reasoning tokens are often unnecessary for LRMs' predictions; on logical reasoning datasets, LRMs can almost always produce the same final answers without using latent reasoning at all. This underutilization of reasoning tokens may partially explain why LRMs do not consistently outperform explicit reasoning methods and raises doubts about the stated role of these tokens in prior work. Second, we demonstrate that when latent reasoning tokens are necessary for performance, we can decode gold reasoning traces up to 65-93% of the time for correctly predicted instances. This suggests LRMs often implement the expected solution rather than an uninterpretable reasoning process. Finally, we present a method to decode a verified natural language reasoning trace from latent tokens without knowing a gold reasoning trace a priori, demonstrating that it is possible to find a verified trace for a majority of correct predictions but only a minority of incorrect predictions. Our findings highlight that current LRMs largely encode interpretable processes, and interpretability itself can be a signal of prediction correctness.", "link": "http://arxiv.org/abs/2604.04902v1", "date": "2026-04-06", "relevancy": 2.4326, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": ormance%2C%20we%20can%20decode%20gold%20reasoning%20traces%20up%20to%2065-93%25%20of%20the%20time%20for%20correctly%20predicted%20instances.%20This%20suggests%20LRMs%20often%20implement%20the%20expected%20solution%20rather%20than%20an%20uninterpretable%20reasoning%20process.%20Finally%2C%20we%20present%20a%20method%20to%20decode%20a%20verified%20natural%20language%20reasoning%20trace%20from%20latent%20tokens%20without%20knowing%20a%20gold%20reasoning%20trace%20a%20priori%2C%20demonstrating%20that%20it%20is%20possible%20to%20find%20a%20verified%20trace%20for%20a%20majority%20of%20correct%20predictions%20but%20only%20a%20minority%20of%20incorrect%20predictions.%20Our%20findings%20highlight%20that%20current%20LRMs%20largely%20encode%20interpretable%20processes%2C%20and%20interpretability%20itself%20can%20be%20a%20signal%20of%20prediction%20correctness.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04902v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAre%2520Latent%2520Reasoning%2520Models%2520Easily%2520Interpretable%253F%26entry.906535625%3DConnor%2520Dilgren%2520and%2520Sarah%2520Wiegreffe%26entry.1292438233%3DLatent%2520reasoning%2520models%2520%2528LRMs%2529%2520have%2520attracted%2520significant%2520research%2520interest%2520due%2520to%2520their%2520low%2520inference%2520cost%2520%2528relative%2520to%2520explicit%2520reasoning%2520models%2529%2520and%2520theoretical%2520ability%2520to%2520explore%2520multiple%2520reasoning%2520paths%2520in%2520parallel.%2520However%252C%2520these%2520benefits%2520come%2520at%2520the%2520cost%2520of%2520reduced%2520interpretability%253A%2520LRMs%2520are%2520difficult%2520to%2520monitor%2520because%2520they%2520do%2520not%2520reason%2520in%2520natural%2520language.%2520This%2520paper%2520presents%2520an%2520investigation%2520into%2520LRM%2520interpretability%2520by%2520examining%2520two%2520state-of-the-art%2520LRMs.%2520First%252C%2520we%2520find%25 {"title": "Plausibility as Commonsense Reasoning: Humans Succeed, Large Language Models Do not", "author": "Sercan Karaka\u015f", "abstract": "Large language models achieve strong performance on many language tasks, yet it remains unclear whether they integrate world knowledge with syntactic structure in a human-like, structure-sensitive way during ambiguity resolution. We test this question in Turkish prenominal relative-clause attachment ambiguities, where the same surface string permits high attachment (HA) or low attachment (LA). We construct ambiguous items that keep the syntactic configuration fixed and ensure both parses remain pragmatically possible, while graded event plausibility selectively favors High Attachment vs.\\ Low Attachment. The contrasts are validated with independent norming ratings. In a speeded forced-choice comprehension experiment, humans show a large, correctly directed plausibility effect. We then evaluate Turkish and multilingual LLMs in a parallel preference-based setup that compares matched HA/LA continuations via mean per-token log-probability. Across models, plausibility-driven shifts are weak, unstable, or reversed. The results suggest that, in the tested models, plausibility information does not guide attachment preferences as reliably as it does in human judgments, and they highlight Turkish RC attachment as a useful cross-linguistic diagnostic beyond broad benchmarks.", "link": "http://arxiv.org/abs/2604.04825v1", "date": "2026-04-06", "relevancy": 2.4296, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5025}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5025}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/ {"title": "ClickAIXR: On-Device Multimodal Vision-Language Interaction with Real-World Objects in Extended Reality", "author": "Dawar Khan and Alexandre Kouyoumdjian and Xinyu Liu and Omar Mena and Dominik Engel and Ivan Viola", "abstract": "We present ClickAIXR, a novel on-device framework for multimodal vision-language interaction with objects in extended reality (XR). Unlike prior systems that rely on cloud-based AI (e.g., ChatGPT) or gaze-based selection (e.g., GazePointAR), ClickAIXR integrates an on-device vision-language model (VLM) with a controller-based object selection paradigm, enabling users to precisely click on real-world objects in XR. Once selected, the object image is processed locally by the VLM to answer natural language questions through both text and speech. This object-centered interaction reduces ambiguity inherent in gaze- or voice-only interfaces and improves transparency by performing all inference on-device, addressing concerns around privacy and latency. We implemented ClickAIXR in the Magic Leap SDK (C API) with ONNX-based local VLM inference. We conducted a user study comparing ClickAIXR with Gemini 2.5 Flash and ChatGPT 5, evaluating usability, trust, and user satisfaction. Results show that latency is moderate and user experience is acceptable. Our findings demonstrate the potential of click-based object selection combined with on-device AI to advance trustworthy, privacy-preserving XR interactions. The source code and supplementary materials are available at: nanovis.org/ClickAIXR.html", "link": "http://arxiv.org/abs/2604.04905v1", "date": "2026-04-06", "relevancy": 2.4164, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.4882}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4808}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4808}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ClickAIXR%3A%20On-Device%20Multimodal%20Vision-Language%20Interaction%20with%20Real-World%20Objects%20in%20Extended%20Reality&body=Title%3A%20ClickAIXR%3A%20On-Device%20Multimodal%20Vision-Language%20Interaction%20with%20Real-World%20Objects%20in%20Extended%20Reality%0AAuthor%3A%20Dawar%20Khan%20and%20Alexandre%20Kouyoumdjian%20and%20Xinyu%20Liu%20and%20Omar%20Mena%20and%20Dominik%20Engel%20and%20Ivan%20Viola%0AAbstract%3A%20We%20present%20ClickAIXR%2C%20a%20novel%20on-device%20framework%20for%20multimodal%20vision-language%20interaction%20with%20objects%20in%20extended%20reality%20%28XR%29.%20Unlike%20prior%20systems%20that%20rely%20on%20cloud-based%20AI%20%28e.g.%2C%20ChatGPT%29%20or%20gaze-based%20selection%20%28e.g.%2C%20GazePointAR%29%2C%20ClickAIXR%20integrates%20an%20on-device%20vision-language%20model%20%28VLM%29%20with%20a%20controller-based%20object%20selection%20paradigm%2C%20enabling%20users%20to%20precisely%20click%20on%20real-world%20objects%20in%20XR.%20Once%20selected%2C%20the%20object%20image%20is%20processed%20locally%20by%20the%20VLM%20to%20answer%20natural%20language%20questions%20through%20both%20text%20and%20speech.%20This%20object-centered%20interaction%20reduces%20ambiguity%20inherent%20in%20gaze-%20or%20voice-only%20interfaces%20and%20improves%20transparency%20by%20performing%20all%20inference%20on-device%2C%20addressing%20concerns%20around%20privacy%20and%20latency.%20We%20implemented%20ClickAIXR%20in%20the%20Magic%20Leap%20SDK%20%28C%20API%29%20with%20ONNX-based%20local%20VLM%20inference.%20We%20conducted%20a%20user%20study%20comparing%20ClickAIXR%20with%20Gemini%202.5%20Flash%20and%20ChatGPT%205%2C%20evaluating%20usability%2C%20trust%2C%20and%20user%20satisfaction.%20Results%20show%20that%20latency%20is%20moderate%20and%20user%20experience%20is%20acceptable.%20Ou {"title": "The Infinite-Dimensional Nature of Spectroscopy and Why Models Succeed, Fail, and Mislead", "author": "Umberto Michelucci and Francesca Venturini", "abstract": "Machine learning (ML) models have achieved strikingly high accuracies in spectroscopic classification tasks, often without a clear proof that those models used chemically meaningful features. Existing studies have linked these results to data preprocessing choices, noise sensitivity, and model complexity, but no unifying explanation is available so far. In this work, we show that these phenomena arise naturally from the intrinsic high dimensionality of spectral data. Using a theoretical analysis grounded in the Feldman-Hajek theorem and the concentration of measure, we show that even infinitesimal distributional differences, caused by noise, normalisation, or instrumental artefacts, may become perfectly separable in high-dimensional spaces. Through a series of specific experiments on synthetic and real fluorescence spectra, we illustrate how models can achieve near-perfect accuracy even when chemical distinctions are absent, and why feature-importance maps may highlight spectrally irrelevant regions. We provide a rigorous theoretical framework, confirm the effect experimentally, and conclude with practical recommendations for building and interpreting ML models in spectroscopy.", "link": "http://arxiv.org/abs/2604.04717v1", "date": "2026-04-06", "relevancy": 2.4053, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4843}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4843}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_ {"title": "A Frame is Worth One Token: Efficient Generative World Modeling with Delta Tokens", "author": "Tommie Kerssies and Gabriele Berton and Ju He and Qihang Yu and Wufei Ma and Daan de Geus and Gijs Dubbelman and Liang-Chieh Chen", "abstract": "Anticipating diverse future states is a central challenge in video world modeling. Discriminative world models produce a deterministic prediction that implicitly averages over possible futures, while existing generative world models remain computationally expensive. Recent work demonstrates that predicting the future in the feature space of a vision foundation model (VFM), rather than a latent space optimized for pixel reconstruction, requires significantly fewer world model parameters. However, most such approaches remain discriminative. In this work, we introduce DeltaTok, a tokenizer that encodes the VFM feature difference between consecutive frames into a single continuous \"delta\" token, and DeltaWorld, a generative world model operating on these tokens to efficiently generate diverse plausible futures. Delta tokens reduce video from a three-dimensional spatio-temporal representation to a one-dimensional temporal sequence, for example yielding a 1,024x token reduction with 512x512 frames. This compact representation enables tractable multi-hypothesis training, where many futures are generated in parallel and only the best is supervised. At inference, this leads to diverse predictions in a single forward pass. Experiments on dense forecasting tasks demonstrate that DeltaWorld forecasts futures that more closely align with real-world outcomes, while having over 35x fewer parameters and using 2,000x fewer FLOPs than existing generative world models. Code and weights: https://deltatok.github.io.", "link": "http://arxiv.org/abs/2604.04913v1", "date": "2026-04-06", "relevancy": 2.377, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6237}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5789}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.559}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Frame%20is%20Worth%20One%20Token%3A%20Efficient%20Generative%20World%20Modeling%20with%20Delta%20Tokens&body=Title%3A%20A%20Frame%20is%20Worth%20One%20Token%3A%20Efficient%20Generative%20World%20Modeling%20with%20Delta%20Tokens%0AAuthor%3A%20Tommie%20Kerssies%20and%20Gabriele%20Berton%20and%20Ju%20He%20and%20Qihang%20Yu%20and%20Wufei%20Ma%20and%20Daan%20de%20Geus%20and%20Gijs%20Dubbelman%20and%20Liang-Chieh%20Chen%0AAbstract%3A%20Anticipating%20diverse%20future%20states%20is%20a%20central%20challenge%20in%20video%20world%20modeling.%20Discriminative%20world%20models%20produce%20a%20deterministic%20prediction%20that%20implicitly%20averages%20over%20possible%20futures%2C%20while%20existing%20generative%20world%20models%20remain%20computationally%20expensive.%20Recent%20work%20demonstrates%20that%20predicting%20the%20future%20in%20the%20feature%20space%20of%20a%20vision%20foundation%20model%20%28VFM%29%2C%20rather%20than%20a%20latent%20space%20optimized%20for%20pixel%20reconstruction%2C%20requires%20significantly%20fewer%20world%20model%20parameters.%20However%2C%20most%20such%20approaches%20remain%20discriminative.%20In%20this%20work%2C%20we%20introduce%20DeltaTok%2C%20a%20tokenizer%20that%20encodes%20the%20VFM%20feature%20difference%20between%20consecutive%20frames%20into%20a%20single%20continuous%20%22delta%22%20token%2C%20and%20DeltaWorld%2C%20a%20generative%20world%20model%20operating%20on%20these%20tokens%20to%20efficiently%20generate%20diverse%20plausible%20futures.%20Delta%20tokens%20reduce%20video%20from%20a%20three-dimensional%20spatio-temporal%20representation%20to%20a%20one-dimensional%20temporal%20sequence%2C%20for%20example%20yielding%20a%201%2C024x%20token%20reduction%20with%20512x512%20frames.%20This%20compact%20representation%20enables%20tractable%20multi-hypothesis%20training%2C%20where%20many%20futures%20are%20generated%20in%20parallel%20and%20only%20the%20best%20is%20supervised.%20At%20inference%2C%20this%20leads%20to%20diverse%20predictions%20in%20a%20single%20forward%20pass.%20Experiments%20on%20dense%20forecasting%20tasks%20demonstrate%20that%20DeltaWorld%20forecasts%20futures%20that%20more%20closely%20align%20with%20real-world%20outcomes%2C%20while%20having%20over%2035x%20fewer%20parameters%20and%20using%202%2C000x%20fewer%20FLOPs%20than%20existing%20generative%20world%20models.%20Code%20and%20weights%3A%20https%3A//deltatok.github.io.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04913v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Frame%2520is%2520Worth%2520One%2520Token%253A%2520Efficient%2520Generative%2520World%2520Modeling%2520with%2520Delta%2520Tokens%26entry.906535625%3DTommie%2520Kerssies%2520and%2520Gabriele%2520Berton%2520and%2520Ju%2520He%2520and%2520Qihang%2520Yu%2520and%2520Wufei%2520Ma%2520and%2520Daan%2520de%2520Geus%2520and%2520Gijs%2520Dubbelman%2520and%2520Liang-Chieh%2520Chen%26entry.1292438233%3DAnticipating%2520diverse%2520future%2520states%2520is%2520a%2520central%2520challenge%2520in%2520video%2520world%2520modeling.%2520Discriminative%2520world%2520models%2520produce%2520a%2520deterministic%2520prediction%2520that%2520implicitly%2520averages%2520over%2520possible%2520futures%252C%2520while%2520existing%2520generative%2520world%2520models%2520remain%2520computationally%2520expensive.%2520Recent%2520work%2520demonstrates%2520that%2520predicting%2520the%2520future%2520in%2520the%2520feature%2520space%2520of%2520a%2520vision%2520foundation%2520model%2520%2528VFM%2529%252C%2520rather%2520than%2520a%2520latent%2520space%2520o {"title": "Implicit Bias-Like Patterns in Reasoning Models", "author": "Messi H. J. Lee and Calvin K. Lai", "abstract": "Implicit biases refer to automatic mental processes that shape perceptions, judgments, and behaviors. Previous research on \"implicit bias\" in LLMs focused primarily on outputs rather than the processes underlying the outputs. We present the Reasoning Model Implicit Association Test (RM-IAT) to study implicit bias-like processing in reasoning models, LLMs that use step-by-step reasoning to solve complex tasks. Using RM-IAT, we find that reasoning models like o3-mini, DeepSeek-R1, gpt-oss-20b, and Qwen-3 8B consistently expend more reasoning tokens on association-incompatible tasks than association-compatible tasks, suggesting greater computational effort when processing counter-stereotypical information. Conversely, Claude 3.7 Sonnet exhibited reversed patterns, which thematic analysis associated with its unique internal focus on reasoning about bias and stereotypes. These findings demonstrate that reasoning models exhibit distinct implicit bias-like patterns and that these patterns vary significantly depending on the models' internal reasoning content.", "link": "http://arxiv.org/abs/2503.11572v4", "date": "2026-04-06", "relevancy": 2.377, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4822}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.472}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.472}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Implicit%20Bias-Like%20Patterns%20in%2 {"title": "Rewriting Video: Text-Driven Reauthoring of Video Footage", "author": "Sitong Wang and Anh Truong and Lydia B. Chilton and Dingzeyu Li", "abstract": "Video is a powerful medium for communication and storytelling, yet reauthoring existing footage remains challenging. Even simple edits often demand expertise, time, and careful planning, constraining how creators envision and shape their narratives. Recent advances in generative AI suggest a new paradigm: what if editing a video were as straightforward as rewriting text? To investigate this, we present a tech probe and a study on text-driven video reauthoring. Our approach involves two technical contributions: (1) a generative reconstruction algorithm that reverse-engineers video into an editable text prompt, and (2) an interactive probe, Rewrite Kit, that allows creators to manipulate these prompts. A technical evaluation of the algorithm reveals a critical human-AI perceptual gap. A probe study with 12 creators surfaced novel use cases such as virtual reshooting, synthetic continuity, and aesthetic restyling. It also highlighted key tensions around coherence, control, and creative alignment in this new paradigm. Our work contributes empirical insights into the opportunities and challenges of text-driven video reauthoring, offering design implications for future co-creative video tools.", "link": "http://arxiv.org/abs/2601.08565v2", "date": "2026-04-06", "relevancy": 2.3753, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6216}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5936}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.583}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Rewriting%20Video%3A%20Text-Driven%20Reauthoring%20of%20Video%20Footage&body=Title%3A%20Rewriting%20Video%3A%20Text-Driven%20Reauthoring%20of%20Video%20Footage%0AAuthor%3A%20Sitong%20Wang%20and%20Anh%20Truong%20and%20Lydia%20B.%20Chilton%20and%20Dingzeyu%20Li%0AAbstract%3A%20Video%20is%20a%20powerful%20medium%20for%20communication%20and%20storytelling%2C%20yet%20reauthoring%20existing%20footage%20remains%20challenging.%20Even%20simple%20edits%20often%20demand%20expertise%2C%20time%2C%20and%20careful%20planning%2C%20constraining%20how%20creators%20envision%20and%20shape%20their%20narratives.%20Recent%20advances%20in%20generative%20AI%20suggest%20a%20new%20paradigm%3A%20what%20if%20editing%20a%20video%20were%20as%20straightforward%20as%20rewriting%20text%3F%20To%20investigate%20this%2C%20we%20present%20a%20tech%20probe%20and%20a%20study%20on%20text-driven%20video%20reauthoring.%20Our%20approach%20involves%20two%20technical%20contributions%3A%20%281%29%20a%20generative%20reconstruction%20algorithm%20that%20reverse-engineers%20video%20into%20an%20editable%20text%20prompt%2C%20and%20%282%29%20an%20interactive%20probe%2C%20Rewrite%20Kit%2C%20that%20allows%20creators%20to%20manipulate%20these%20prompts.%20A%20technical%20evaluation%20of%20the%20algorithm%20reveals%20a%20critical%20human-AI%20perceptual%20gap.%20A%20probe%20study%20with%2012%20creators%20surfaced%20novel%20use%20cases%20such%20as%20virtual%20reshooting%2C%20synthetic%20continuity%2C%20and%20aesthetic%20restyling.%20It%20also%20highlighted%20key%20tensions%20around%20coherence%2C%20control%2C%20and%20creative%20alignment%20in%20this%20new%20paradigm.%20Our%20work%20contributes%20empirical%20insights%20into%20the%20opportunities%20and%20challenges%20of%20text-driven%20video%20reauthoring%2C%20offering%20design%20implications%20for%20future%20co-creative%20video%20tools.%0ALink%3A%20http%3A//arxiv.org/abs/2601.08565v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj 2520empirical%2520insights%2520into%2520the%2520opportunities%2520and%2520challenges%2520of%2520text-driven%2520video%2520reauthoring%252C%2520offering%2520design%2520implications%2520for%2520future%2520co-creative%2520video%2520tools.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.08565v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Rewriting%20Video%3A%20Text-Driven%20Reauthoring%20of%20Video%20Footage&entry.906535625=Sitong%20Wang%20and%20Anh%20Truong%20and%20Lydia%20B.%20Chilton%20and%20Dingzeyu%20Li&entry.1292438233=Video%20is%20a%20powerful%20medium%20for%20communication%20and%20storytelling%2C%20yet%20reauthoring%20existing%20footage%20remains%20challenging.%20Even%20simple%20edits%20often%20demand%20expertise%2C%20time%2C%20and%20careful%20planning%2C%20constraining%20how%20creators%20envision%20and%20shape%20their%20narratives.%20Recent%20advances%20in%20generative%20AI%20suggest%20a%20new%20paradigm%3A%20what%20if%20editing%20a%20video%20were%20as%20straightforward%20as%20rewriting%20text%3F%20To%20investigate%20this%2C%20we%20present%20a%20tech%20probe%20and%20a%20study%20on%20text-driven%20video%20reauthoring.%20Our%20approach%20involves%20two%20technical%20contributions%3A%20%281%29%20a%20generative%20reconstruction%20algorithm%20that%20reverse-engineers%20video%20into%20an%20editable%20text%20prompt%2C%20and%20%282%29%20an%20interactive%20probe%2C%20Rewrite%20Kit%2C%20that%20allows%20creators%20to%20manipulate%20these%20prompts.%20A%20technical%20evaluation%20of%20the%20algorithm%20reveals%20a%20critical%20human-AI%20perceptual%20gap.%20A%20probe%20study%20with%2012%20creators%20surfaced%20novel%20use%20cases%20such%20as%20virtual%20reshooting%2C%20synthetic%20continuity%2C%20and%20aesthetic%20restyling.%20It%20also%20highlighted%20key%20tensions%20around%20coherence%2C%20control%2C%20and%20creative%20alignment%20in%20this%20new%20paradigm.%20Our%20work%20contributes%20empirical%20insights%20into%20the%20opportunities%20and%20challenges%20of%20text-driven%20video%20reauthoring%2C%20offering%20design%20implications%20for%20future%20co-creative%20video%20tools.&entry.1838667208=http%3A//arxiv.org/abs/2601.08565v2&entry.124074799=Read"},
{"title": "Dynamic Free-Rider Detection in Federated Learning via Simulated Attack Patterns", "author": "Motoki Nakamura", "abstract": "Federated learning (FL) enables multiple clients to collaboratively train a global model by aggregating local updates without sharing private data. However, FL often faces the challenge of free-riders, clients who submit fake model parameters without performing actual training to obtain the global model without contributing. Chen et al. proposed a free-rider detection method based on the weight evolving frequency (WEF) of model parameters. This detection approach is a leading candidate for practical free-rider detection methods, as it requires neither a proxy dataset nor pre-training. Nevertheless, it struggles to detect ``dynamic'' free-riders who behave honestly in early rounds and later switch to free-riding, particularly under global-model-mimicking attacks such as the delta weight attack and our newly proposed adaptive WEF-camouflage attack. In this paper, we propose a novel detection method S2-WEF that simulates the WEF patterns of potential global-model-based attacks on the server side using previously broadcasted global models, and identifies clients whose submitted WEF patterns resemble the simulated ones. To handle a variety of free-rider attack strategies, S2-WEF further combines this simulation-based similarity score with a deviation score computed from mutual comparisons among submitted WEFs, and separates benign and free-rider clients by two-dimensional clustering and per-score classification. This method enables dynamic detection of clients that transition into free-riders during training without proxy datasets or pre-training. We conduct extensive experiments across three datasets and five attack types, demonstrating that S2-WEF achieves higher robustness than existing approaches.", "link": "http://arxiv.org/abs/2604.04611v1", "date": "2026-04-06", "relevancy": 2.3735, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4779}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4743}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4719}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dynamic%20Free-Rider%20Detection%20in%20Federated%20Learning%20via%20Simulated%20Attack%20Patterns&body=Title%3A%20Dynamic%20Free-Rider%20Detection%20in%20Federated%20Learning%20via%20Simulated%20Attack%20Patterns%0AAuthor%3A%20Motoki%20Nakamura%0AAbstract%3A%20Federated%20learning%20%28FL%29%20enables%20multiple%20clients%20to%20collaboratively%20train%20a%20global%20model%20by%20aggregating%20local%20updates%20without%20sharing%20private%20data.%20However%2C%20FL%20often%20faces%20the%20challenge%20of%20free-riders%2C%20clients%20who%20submit%20fake%20model%20parameters%20without%20performing%20actual%20training%20to%20obtain%20the%20global%20model%20without%20contributing.%20Chen%20et%20al.%20proposed%20a%20free-rider%20detection%20method%20based%20on%20the%20weight%20evolving%20frequency%20%28WEF%29%20of%20model%20parameters.%20This%20detection%20approach%20is%20a%20leading%20candidate%20for%20practical%20free-rider%20detection%20methods%2C%20as%20it%20requires%20neither%20a%20proxy%20dataset%20nor%20pre-training.%20Nevertheless%2C%20it%20struggles%20to%20detect%20%60%60dynamic%27%27%20free-riders%20who%20behave%20honestly%20in%20early%20rounds%20and%20later%20switch%20to%20free-riding%2C%20particularly%20under%20global-model-mimicking%20attacks%20such%20as%20the%20delta%20weight%20attack%20and%20our%20newly%20proposed%20adaptive%20WEF-camouflage%20attack.%20In%20this%20paper%2C%20we%20propose%20a%20novel%20detection%20method%20S2-WEF%20that%20simulates%20the%20WEF%20patterns%20of%20potential%20global-model-based%20attacks%20on%20the%20server%20side%20using%20previously%20broadcasted%20global%20models%2C%20and%20identifies%20clients%20whose%20submitted%20WEF%20patterns%20resemble%20the%20simulated%20ones.%20To%20handle%20a%20variety%20of%20free-rider%20attack%20strategies%2C%20S2-WEF%20further%20combines%20this%20simulation-based%20similarity%20score%20with%20a%20deviation%20score%20computed%20from%20mutual%20comparisons%20among%20submitted%20WEFs%2C%20and%20separates%20benign%20and%20free-rider%20clients%20by%20two-dimensional%20clustering%20and%20per-score%20classification.%20This%20method%20enables%20dynamic%20detection%20of%20clients%20that%20transition%20into%20free-riders%20during%20training%20without%20proxy%20datasets%20or%20pre-training.%20We%20conduct%20extensive%20experiments%20across%20three%20datasets%20and%20five%20attack%20types%2C%20demonstrating%20that%20S2-WEF%20achieves%20higher%20robustness%20than%20existing%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04611v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDynamic%2520Free-Rider%2520Detection%2520in%2520Federated%2520Learning%2520via%2520Simulated%2520Attack%2520Patterns%26entry.906535625%3DMotoki%2520Nakamura%26entry.1292438233%3DFederated%2520learning%2520%2528FL%2529%2520enables%2520multiple%2520clients%2520to%2520collaboratively%2520train%2520a%2520global%2520model%2520by%2520aggregating%2520local%2520updates%2520without%2520sharing%2520private%2520data.%2520However%252C%2520FL%2520often%2520faces%2520the%2520challenge%2520of%2520free-riders%252C%2520clients%2520who%2520submit%2520fake%2520model%2520parameters%2520without%2520performing%2520actual%2520training%2520to%2520obtain%2520the%2520global%2520model%2520without%2520contributing.%2520Chen%2520et%2520al.%2520proposed%2520a%2520free-rider%2520detection%2520method%2520based%2520on%252 {"title": "InfBaGel: Human-Object-Scene Interaction Generation with Dynamic Perception and Iterative Refinement", "author": "Yude Zou and Junji Gong and Xing Gao and Zixuan Li and Tianxing Chen and Guanjie Zheng", "abstract": "Human-object-scene interactions (HOSI) generation has broad applications in embodied AI, simulation, and animation. Unlike human-object interaction (HOI) and human-scene interaction (HSI), HOSI generation requires reasoning over dynamic object-scene changes, yet suffers from limited annotated data. To address these issues, we propose a coarse-to-fine instruction-conditioned interaction generation framework that is explicitly aligned with the iterative denoising process of a consistency model. In particular, we adopt a dynamic perception strategy that leverages trajectories from the preceding refinement to update scene context and condition subsequent refinement at each denoising step of consistency model, yielding consistent interactions. To further reduce physical artifacts, we introduce a bump-aware guidance that mitigates collisions and penetrations during sampling without requiring fine-grained scene geometry, enabling real-time generation. To overcome data scarcity, we design a hybrid training startegy that synthesizes pseudo-HOSI samples by injecting voxelized scene occupancy into HOI datasets and jointly trains with high-fidelity HSI data, allowing interaction learning while preserving realistic scene awareness. Extensive experiments demonstrate that our method achieves state-of-the-art performance in both HOSI and HOI generation, and strong generalization to unseen scenes. Project page: https://yudezou.github.io/InfBaGel-page/", "link": "http://arxiv.org/abs/2604.04843v1", "date": "2026-04-06", "relevancy": 2.3528, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5947}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robot ing%20startegy%20that%20synthesizes%20pseudo-HOSI%20samples%20by%20injecting%20voxelized%20scene%20occupancy%20into%20HOI%20datasets%20and%20jointly%20trains%20with%20high-fidelity%20HSI%20data%2C%20allowing%20interaction%20learning%20while%20preserving%20realistic%20scene%20awareness.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20achieves%20state-of-the-art%20performance%20in%20both%20HOSI%20and%20HOI%20generation%2C%20and%20strong%20generalization%20to%20unseen%20scenes.%20Project%20page%3A%20https%3A//yudezou.github.io/InfBaGel-page/%0ALink%3A%20http%3A//arxiv.org/abs/2604.04843v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInfBaGel%253A%2520Human-Object-Scene%2520Interaction%2520Generation%2520with%2520Dynamic%2520Perception%2520and%2520Iterative%2520Refinement%26entry.906535625%3DYude%2520Zou%2520and%2520Junji%2520Gong%2520and%2520Xing%2520Gao%2520and%2520Zixuan%2520Li%2520and%2520Tianxing%2520Chen%2520and%2520Guanjie%2520Zheng%26entry.1292438233%3DHuman-object-scene%2520interactions%2520%2528HOSI%2529%2520generation%2520has%2520broad%2520applications%2520in%2520embodied%2520AI%252C%2520simulation%252C%2520and%2520animation.%2520Unlike%2520human-object%2520interaction%2520%2528HOI%2529%2520and%2520human-scene%2520interaction%2520%2528HSI%2529%252C%2520HOSI%2520generation%2520requires%2520reasoning%2520over%2520dynamic%2520object-scene%2520changes%252C%2520yet%2520suffers%2520from%2520limited%2520annotated%2520data.%2520To%2520address%2520these%2520issues%252C%2520we%2520propose%2520a%2520coarse-to-fine%2520instruction-conditioned%2520interaction%2520generation%2520framework%2520that%2520is%2520explicitly%2520aligned%2520with%2520the%2520iterative%2520denoising%2520process%2520of%2520a%2520consistency%2520model.%2520In%2520particular%252C%2520we%2520adopt%2520a%2520dynamic%2520perception%2520strategy%2520that%2520leverages%2520trajectories%2520from%2520th {"title": "Noise Immunity in In-Context Tabular Learning: An Empirical Robustness Analysis of TabPFN's Attention Mechanisms", "author": "James Hu and Mahdi Ghelichi", "abstract": "Tabular foundation models (TFMs) such as TabPFN (Tabular Prior-Data Fitted Network) are designed to generalize across heterogeneous tabular datasets through in-context learning (ICL). They perform prediction in a single forward pass conditioned on labeled examples without dataset-specific parameter updates. This paradigm is particularly attractive in industrial domains (e.g., finance and healthcare) where tabular prediction is pervasive. Retraining a bespoke model for each new table can be costly or infeasible in these settings, while data quality issues such as irrelevant predictors, correlated feature groups, and label noise are common. In this paper, we provide strong empirical evidence that TabPFN is highly robust under these sub-optimal conditions. We study TabPFN and its attention mechanisms for binary classification problems with controlled synthetic perturbations that vary: (i) dataset width by injecting random uncorrelated features and by introducing nonlinearly correlated features, (ii) dataset size by increasing the number of training rows, and (iii) label quality by increasing the fraction of mislabeled targets. Beyond predictive performance, we analyze internal signals including attention concentration and attention-based feature ranking metrics. Across these parametric tests, TabPFN is remarkably resilient: ROC-AUC remains high, attention stays structured and sharp, and informative features are highly ranked by attention-based metrics. Qualitative visualizations with attention heatmaps, feature-token embeddings, and SHAP plots further support a consistent pattern across layers in which TabPFN increasingly concentrates on useful features while separating their signals from noise. Together, these findings suggest that TabPFN is a robust TFM capable of maintaining both predictive performance and coherent internal behavior under various scenarios of data imperfections.", "link": "http://arxiv.org/abs/2604.04868v1", "date": "2026-04-06", "relevancy": 2.3455, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4701}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4696}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4676}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Noise%20Immunity%20in%20In-Context%20Tabular%20Learning%3A%20An%20Empirical%20Robustness%20Analysis%20of%20TabPFN%27s%20Attention%20Mechanisms&body=Title%3A%20Noise%20Immunity%20in%20In-Context%20Tabular%20Learning%3A%20An%20Empirical%20Robustness%20Analysis%20of%20TabPFN%27s%20Attention%20Mechanisms%0AAuthor%3A%20James%20Hu%20and%20Mahdi%20Ghelichi%0AAbstract%3A%20Tabular%20foundation%20models%20%28TFMs%29%20such%20as%20TabPFN%20%28Tabular%20Prior-Data%20Fitted%20Network%29%20are%20designed%20to%20generalize%20across%20heterogeneous%20tabular%20datasets%20through%20in-context%20learning%20%28ICL%29.%20They%20perform%20prediction%20in%20a%20single%20forward%20pass%20conditioned%20on%20labeled%20examples%20without%20dataset-specific%20parameter%20updates.%20This%20paradigm%20is%20particularly%20attractive%20in%20industrial%20domains%20%28e.g.%2C%20finance%20and%20healthcare%29%20where%20tabular%20prediction%20is%20pervasive.%20Retraining%20a%20bespoke%20model%20for%20each%20new%20table%20can%20be%20costly%20or%20infeasible%20in%20these%20settings%2C%20while%20data%20quality%20issues%20such%20as%20irrelevant%20predictors%2C% {"title": "Score-matching-based Structure Learning for Temporal Data on Networks", "author": "Hao Chen and Kai Yi and Yu Guang Wang", "abstract": "Causal discovery is a crucial initial step in establishing causality from empirical data and background knowledge. Numerous algorithms have been developed for this purpose. Among them, the score-matching method has demonstrated superior performance across various evaluation metrics, particularly for the commonly encountered Additive Nonlinear Causal Models. However, current score-matching-based algorithms are primarily designed to analyze independent and identically distributed (i.i.d.) data. More importantly, they suffer from high computational complexity due to the pruning step required for handling dense Directed Acyclic Graphs (DAGs). To enhance the scalability of score matching, we have developed a new parent-finding subroutine for leaf nodes in DAGs, significantly accelerating the most time-consuming part of the process: the pruning step. This improvement results in an efficiency-lifted score matching algorithm, termed Parent Identification-based Causal structure learning for both i.i.d. and temporal data on networKs, or PICK. The new score-matching algorithm extends the scope of existing algorithms and can handle static and temporal data on networks with weak network interference. Our proposed algorithm can efficiently cope with increasingly complex datasets that exhibit spatial and temporal dependencies, commonly encountered in academia and industry. The proposed algorithm can accelerate score-matching-based methods while maintaining high accuracy in real-world applications.", "link": "http://arxiv.org/abs/2412.07469v2", "date": "2026-04-06", "relevancy": 2.3343, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4832}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4683}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4491}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Score-matching-based%20Structure%20Learning%20for%20Temporal%20Data%20on%20Networks&body=Title%3A%20Score-matching-based%20Structure%20Learning%20for%20Temporal%20Data%20on%20Networks%0AAuthor%3A%20Hao%20Chen%20and%20Kai%20Yi%20and%20Yu%20Guang%20Wang%0AAbstract%3A%20Causal%20discovery%20is%20a%20crucial%20initial%20step%20in%20establishing%20causality%20from%20empirical%20data%20and%20background%20knowledge.%20Numerous%20algorithms%20have%20been%20developed%20for%20this%20purpose.%20Among%20them%2C%20the%20score-matching%20method%20has%20demonstrated%20superior%20performance%20across%20various%20evaluation%20metrics%2C%20particularly%20for%20the%20commonly%20encountered%20Additive%20Nonlinear%20Causal%20Models.%20However%2C%20current%20score-matching-based%20algorithms%20are%20primarily%20designed%20to%20analyze%20independent%20and%20identically%20distributed%20%28i.i.d.%29%20data.%20More%20importantly%2C%20they%20suffer%20from%20high%20computational%20complexity%20due%20to%20the%20pruning%20step%20required%20for%20handling%20dense%20Directed%20Acyclic%20Graphs%20%28DAGs%29.%20To%20enhance%20the%20scalability%20of%20score%20matching%2C%20we%20have%20developed%20a%20new%20parent-finding%20subroutine%20for%20leaf%20nodes%20in%20DAGs%2C%20significantly%20accelerating%20the%20most%20time-consuming%20part%20of%20the%20process%3A%20the%20pruning%20step.%20This%20improvement%20results%20in%20an%20efficiency-lifted%20score%20matching%20algorithm%2C%20termed%20Parent%20Identification-based%20Causal%20structure%20learning%20for%20both%20i.i.d.%20and%20temporal%20data%20on%20networKs%2C%20or%20PICK.%20The%20new%20score-matching%20algorithm%20extends%20the%20scope%20of%20existing%20algorithms% {"title": "A Robust SINDy Autoencoder for Noisy Dynamical System Identification", "author": "Kairui Ding", "abstract": "Sparse identification of nonlinear dynamics (SINDy) has been widely used to discover the governing equations of a dynamical system from data. It uses sparse regression techniques to identify parsimonious models of unknown systems from a library of candidate functions. Therefore, it relies on the assumption that the dynamics are sparsely represented in the coordinate system used. To address this limitation, one seeks a coordinate transformation that provides reduced coordinates capable of reconstructing the original system. Recently, SINDy autoencoders have extended this idea by combining sparse model discovery with autoencoder architectures to learn simplified latent coordinates together with parsimonious governing equations. A central challenge in this framework is robustness to measurement error. Inspired by noise-separating neural network structures, we incorporate a noise-separation module into the SINDy autoencoder architecture, thereby improving robustness and enabling more reliable identification of noisy dynamical systems. Numerical experiments on the Lorenz system show that the proposed method recovers interpretable latent dynamics and accurately estimates the measurement noise from noisy observations.", "link": "http://arxiv.org/abs/2604.04829v1", "date": "2026-04-06", "relevancy": 2.3281, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4852}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4636}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4481}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Robust%20SINDy%20Auto isy%2520observations.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.04829v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=A%20Robust%20SINDy%20Autoencoder%20for%20Noisy%20Dynamical%20System%20Identification&entry.906535625=Kairui%20Ding&entry.1292438233=Sparse%20identification%20of%20nonlinear%20dynamics%20%28SINDy%29%20has%20been%20widely%20used%20to%20discover%20the%20governing%20equations%20of%20a%20dynamical%20system%20from%20data.%20It%20uses%20sparse%20regression%20techniques%20to%20identify%20parsimonious%20models%20of%20unknown%20systems%20from%20a%20library%20of%20candidate%20functions.%20Therefore%2C%20it%20relies%20on%20the%20assumption%20that%20the%20dynamics%20are%20sparsely%20represented%20in%20the%20coordinate%20system%20used.%20To%20address%20this%20limitation%2C%20one%20seeks%20a%20coordinate%20transformation%20that%20provides%20reduced%20coordinates%20capable%20of%20reconstructing%20the%20original%20system.%20Recently%2C%20SINDy%20autoencoders%20have%20extended%20this%20idea%20by%20combining%20sparse%20model%20discovery%20with%20autoencoder%20architectures%20to%20learn%20simplified%20latent%20coordinates%20together%20with%20parsimonious%20governing%20equations.%20A%20central%20challenge%20in%20this%20framework%20is%20robustness%20to%20measurement%20error.%20Inspired%20by%20noise-separating%20neural%20network%20structures%2C%20we%20incorporate%20a%20noise-separation%20module%20into%20the%20SINDy%20autoencoder%20architecture%2C%20thereby%20improving%20robustness%20and%20enabling%20more%20reliable%20identification%20of%20noisy%20dynamical%20systems.%20Numerical%20experiments%20on%20the%20Lorenz%20system%20show%20that%20the%20proposed%20method%20recovers%20interpretable%20latent%20dynamics%20and%20accurately%20estimates%20the%20measurement%20noise%20from%20noisy%20observations.&entry.1838667208=http%3A//arxiv.org/abs/2604.04829v1&entry.124074799=Read"},
{"title": "CLEAR: Unlocking Generative Potential for Degraded Image Understanding in Unified Multimodal Models", "author": "Xiangzhao Hao and Zefeng Zhang and Zhenyu Zhang and Linhao Yu and Yao Chen and Yiqian Zhang and Haiyun Guo and Shuohuan Wang and Yu Sun", "abstract": "Image degradation from blur, noise, compression, and poor illumination severely undermines multimodal understanding in real-world settings. Unified multimodal models that combine understanding and generation within a single architecture are a natural fit for this challenge, as their generative pathway can model the fine-grained visual structure that degradation destroys. Yet these models fail to leverage their own generative capacity on degraded inputs. We trace this disconnect to two compounding factors: existing training regimes never ask the model to invoke generation during reasoning, and the standard decode-reencode pathway does not support effective joint optimization. We present CLEAR, a framework that connects the two capabilities through three progressive steps: (1) supervised fine-tuning on a degradation-aware dataset to establish the generate-then-answer reasoning pattern; (2) a Latent Representation Bridge that replaces the decode-reencode detour with a direct, optimizable connection between generation and reasoning; (3) Interleaved GRPO, a reinforcement learning method that jointly optimizes text reasoning and visual generation under answer-correctness rewards. We construct MMD-Bench, covering three degradation severity levels across six standard multimodal benchmarks. Experiments show that CLEAR substantially improves robustness on degraded inputs while preserving clean-image performance. Our analysis further reveals that removing pixel-level reconstruction supervision leads to intermediate visual states with higher perceptual quality, suggesting that task-driven optimization and visual quality are naturally aligned.", "link": "http://arxiv.org/abs/2604.04780v1", "date": "2026-04-06", "relevancy": 2.3267, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5979}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5869}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5699}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CLEAR%3A%20Unlocking%20Generative%20Potential%20for%20Degraded%20Image%20Understanding%20in%20Unified%20Multimodal%20Models&body=Title%3A%20CLEAR%3A%20Unlocking%20Generative%20Potential%20for%20Degraded%20Image%20Understanding%20in%20Unified%20Multimodal%20Models%0AAuthor%3A%20Xiangzhao%20Hao%20and%20Zefeng%20Zhang%20and%20Zhenyu%20Zhang%20and%20Linhao%20Yu%20and%20Yao%20Chen%20and%20Yiqian%20Zhang%20and%20Haiyun%20Guo%20and%20Shuohuan%20Wang%20and%20Yu%20Sun%0AAbstract%3A%20Image%20degradation%20from%20blur%2C%20noise%2C%20compression%2C%20and%20poor%20illumination%20severely%20undermines%20multimodal%20understanding%20in%20real-world%20settings.%20Unified%20multimodal%20models%20that%20combine%20understanding%20and%20generation%20within%20a%20single%20architecture%20are%20a%20natural%20fit%20for%20this%20challenge%2C%20as%20their%20generative%20pathway%20can%20model%20the%20fine-grained%20visual%20structure%20that%20degradation%20destroys.%20Yet%20these%20models%20fail%20to%20leverage%20their%20own%20generative%20capacity%20on%20degraded%20inputs.%20We%20trace%20this%20disconnect%20to%20two%20compounding%20factors%3A%20existing%20training%20regimes%20never%20ask%20the%20model%20to%20invoke%20generation%20during%20reasoning%2C%20and%20the%20standard%20decode-reencode%20pathway%20does%20not%20support%20effective%20joint%20optimization.%20We%20present%20CLEAR%2C%20a%20framework%20that%20connects%20the%20two%20capabilities%20through%20three%20progressive%20steps%3A%20%281%29%20supervised%20fine-tuning%20on%20a%20degradation-aware%20dataset%20to%20establish%20the%20generate-then-answer%20reasoning%20pattern%3B%20%282%29%20a%20Latent%20Representation%20Bridge%20that%20replaces%20the%20decode-reencode%20detour%20with%20a%20direct%2C%20optimizable%20connection%20between%20generation%20and%20reasoning%3B%20%283%29%20Interleaved%20GRPO%2C%20a%20reinforcement%20learning%20method%20that%20jointly%20optimizes%20text%20reasoning%20and%20visual%20generation%20under%20answer-correctness%20rewards.%20We%20construct%20MMD-Bench%2C%20covering%20three%20degradation%20severity%20levels%20across%20six%20standard%20multimodal%20benchmarks.%20Experiments%20show%20that%20CLEAR%20substantially%20improves%20robustness%20on%20degraded%20inputs%20while%20preserving%20clean-image%20performance.%20Our%20analysis%20further%20reveals%20that%20removing%20pixel-level%20reconstruction%20supervision%20leads%20to%20intermediate%20visual%20states%20with%20higher%20perceptual%20quality%2C%20suggesting%20that%20task-driven%20optimization%20and%20visual%20quality%20are%20naturally%20aligned.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04780v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCLEAR%253A%2520Unlocking%2520Generative%2520Potential%2520for%2520Degraded%2520Image%2520Understanding%2520in%2520Unified%2520Multimodal%2520Models%26entry.906535625%3DXiangzhao%2520Hao%2520and%2520Zefeng%2520Zhang%2520and%2520Zhenyu%2520Zhang%2520and%2520Linhao%2520Yu%2520and%2520Yao%2520Chen%2520and%2520Yiqian%2520Zhang%2520and%2520Haiyun%2520Guo%2520and%2520Shuohuan%2520Wang%2520and%2520Yu%2520Sun%26entry.1292438233%3DImage%2520degradation%2520from%2520blur%252C%2520noise%252C%2520compression%252C%2520and%2520poor%2520illumination%2520severely%2520undermines%2520multimodal%2520understanding%2520in%2520real-world%2520settings.%2520Unified%2520multimodal%2520models%2520that%2520

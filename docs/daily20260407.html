{"title": "Vision-as-Inverse-Graphics Agent via Interleaved Multimodal Reasoning", "author": "Shaofeng Yin and Jiaxin Ge and Zora Zhiruo Wang and Chenyang Wang and Xiuyu Li and Michael J. Black and Trevor Darrell and Angjoo Kanazawa and Haiwen Feng", "abstract": "Vision-as-inverse-graphics, the concept of reconstructing images into editable programs, remains challenging for Vision-Language Models (VLMs), which inherently lack fine-grained spatial grounding in one-shot settings. To address this, we introduce VIGA (Vision-as-Inverse-Graphics Agent), an interleaved multimodal reasoning framework where symbolic logic and visual perception actively cross-verify each other. VIGA operates through a tightly coupled code-render-inspect loop: synthesizing symbolic programs, projecting them into visual states, and inspecting discrepancies to guide iterative edits. Equipped with high-level semantic skills and an evolving multimodal memory, VIGA sustains evidence-based modifications over long horizons. This training-free, task-agnostic framework seamlessly supports 2D document generation, 3D reconstruction, multi-step 3D editing, and 4D physical interaction. Finally, we introduce BlenderBench, a challenging visual-to-code benchmark. Empirically, VIGA substantially improves accuracy compared with one-shot baselines in BlenderGym (35.32%), SlideBench (117.17%) and our proposed BlenderBench (124.70%).", "link": "http://arxiv.org/abs/2601.11109v3", "date": "2026-04-06", "relevancy": 2.8558, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5788}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5788}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5559}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Vision-as-Inverse-Graphics%20Agent%20via%20Interleaved%20Multimodal%20Reasoning&body=Title%3A%20Vision-as-Inverse-Graphics%20Agent%20via%20Interleaved%20Multimodal%20Reasoning%0AAuthor%3A%20Shaofeng%20Yin%20and%20Jiaxin%20Ge%20and%20Zora%20Zhiruo%20Wang%20and%20Chenyang%20Wang%20and%20Xiuyu%20Li%20and%20Michael%20J.%20Black%20and%20Trevor%20Darrell%20and%20Angjoo%20Kanazawa%20and%20Haiwen%20Feng%0AAbstract%3A%20Vision-as-inverse-graphics%2C%20the%20concept%20of%20reconstructing%20images%20into%20editable%20programs%2C%20remains%20challenging%20for%20Vision-Language%20Models%20%28VLMs%29%2C%20which%20inherently%20lack%20fine-grained%20spatial%20grounding%20in%20one-shot%20settings.%20To%20address%20this%2C%20we%20introduce%20VIGA%20%28Vision-as-Inverse-Graphics%20Agent%29%2C%20an%20interleaved%20multimodal%20reasoning%20framework%20where%20symbolic%20logic%20and%20visual%20perception%20actively%20cross-verify%20each%20other.%20VIGA%20operates%20through%20a%20tightly%20coupled%20code-render-inspect%20loop%3A%20synthesizing%20symbolic%20programs%2C%20projecting%20them%20into%20visual%20states%2C%20and%20inspecting%20discrepancies%20to%20guide%20iterative%20edits.%20Equipped%20with%20high-level%20semantic%20skills%20and%20an%20evolving%20multimodal%20memory%2C%20VIGA%20sustains%20evidence-based%20modifications%20over%20long%20horizons.%20This%20training-free%2C%20task-agnostic%20framework%20seamlessly%20supports%202D%20document%20generation%2C%203D%20reconstruction%2C%20multi-step%203D%20editing%2C%20and%204D%20physical%20interaction.%20Finally%2C%20we%20introduce%20BlenderBench%2C%20a%20challenging%20visual-to-code%20benchmark.%20Empirically%2C%20VIGA%20substantially%20improves%20accuracy%20compared%20with%20one-shot%20baselines%20in%20BlenderGym%20%2835.32%25%29%2C%20SlideBench%20%28117.17%25%29%20and%20our%20proposed%20BlenderBench%20%28124.70%25%29.%0ALink%3A%20http%3A//arxiv.org/abs/2601.11109v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVision-as-Inverse-Graphics%2520Agent%2520via%2520Interleaved%2520Multimodal%2520Reasoning%26entry.906535625%3DShaofeng%2520Yin%2520and%2520Jiaxin%2520Ge%2520and%2520Zora%2520Zhiruo%2520Wang%2520and%2520Chenyang%2520Wang%2520and%2520Xiuyu%2520Li%2520and%2520Michael%2520J.%2520Black%2520and%2520Trevor%2520Darrell%2520and%2520Angjoo%2520Kanazawa%2520and%2520Haiwen%2520Feng%26entry.1292438233%3DVision-as-inverse-graphics%252C%2520the%2520concept%2520of%2520reconstructing%2520images%2520into%2520editable%2520programs%252C%2520remains%2520challenging%2520for%2520Vision-Language%2520Models%2520%2528VLMs%2529%252C%2520which%2520inherently%2520lack%2520fine-grained%2520spatial%2520grounding%2520in%2520one-shot%2520settings.%2520To%2520address%2520this%252C%2520we%2520introduce%2520VIGA%2520%2528Vision-as-Inverse-Graphics%2520Agent%2529%252C%2520an%2520interleaved%2520multimodal%2520reasoning%2520framework%2520where%2520symbolic%2520logic%2520and%2520visual%2520perception%2520actively%2520cross-verify%2520each%2520other.%2520VIGA%2520operates%2520through%2520a%2520tightly%2520coupled%2520code-render-inspect%2520loop%253A%2520synthesizing%2520symbolic%2520programs%252C%2520projecting%2520them%2520into%2520visual%2520states%252C%2520and%2520inspecting%2520discrepancies%2520to%2520guide%2520iterative%2520edits.%2520Equipped%2520with%2520high-level%2520semantic%2520skills%2520and%2520an%2520evolving%2520multimodal%2520memory%252C%2520VIGA%2520sustains%2520evidence-based%2520modifications%2520over%2520long%2520horizons.%2520This%2520training-free%252C%2520task-agnostic%2520framework%2520seamlessly%2520supports%25202D%2520document%2520generation%252C%25203D%2520reconstruction%252C%2520multi-step%25203D%2520editing%252C%2520and%25204D%2520physical%2520interaction.%2520Finally%252C%2520we%2520introduce%2520BlenderBench%252C%2520a%2520challenging%2520visual-to-code%2520benchmark.%25 erBench%2C%20a%20challenging%20visual-to-code%20benchmark.%20Empirically%2C%20VIGA%20substantially%20improves%20accuracy%20compared%20with%20one-shot%20baselines%20in%20BlenderGym%20%2835.32%25%29%2C%20SlideBench%20%28117.17%25%29%20and%20our%20proposed%20BlenderBench%20%28124.70%25%29.&entry.1838667208=http%3A//arxiv.org/abs/2601.11109v3&entry.124074799=Read"},
{"title": "SpatialEdit: Benchmarking Fine-Grained Image Spatial Editing", "author": "Yicheng Xiao and Wenhu Zhang and Lin Song and Yukang Chen and Wenbo Li and Nan Jiang and Tianhe Ren and Haokun Lin and Wei Huang and Haoyang Huang and Xiu Li and Nan Duan and Xiaojuan Qi", "abstract": "Image spatial editing performs geometry-driven transformations, allowing precise control over object layout and camera viewpoints. Current models are insufficient for fine-grained spatial manipulations, motivating a dedicated assessment suite. Our contributions are listed: (i) We introduce SpatialEdit-Bench, a complete benchmark that evaluates spatial editing by jointly measuring perceptual plausibility and geometric fidelity via viewpoint reconstruction and framing analysis. (ii) To address the data bottleneck for scalable training, we construct SpatialEdit-500k, a synthetic dataset generated with a controllable Blender pipeline that renders objects across diverse backgrounds and systematic camera trajectories, providing precise ground-truth transformations for both object- and camera-centric operations. (iii) Building on this data, we develop SpatialEdit-16B, a baseline model for fine-grained spatial editing. Our method achieves competitive performance on general editing while substantially outperforming prior methods on spatial manipulation tasks. All resources will be made public at https://github.com/EasonXiao-888/SpatialEdit.", "link": "http://arxiv.org/abs/2604.04911v1", "date": "2026-04-06", "relevancy": 2.8261, "topK": [{"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5833}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5573}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5551}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SpatialEdit%3A%20Benchmarking%20Fine-Grained%20Image%20Spatial%20Editing&body=Title%3A%20SpatialEdit%3A%20Benchmarking%20Fine-Grained%20Image%20Spatial%20Editing%0AAuthor%3A%20Yicheng%20Xiao%20and%20Wenhu%20Zhang%20and%20Lin%20Song%20and%20Yukang%20Chen%20and%20Wenbo%20Li%20and%20Nan%20Jiang%20and%20Tianhe%20Ren%20and%20Haokun%20Lin%20and%20Wei%20Huang%20and%20Haoyang%20Huang%20and%20Xiu%20Li%20and%20Nan%20Duan%20and%20Xiaojuan%20Qi%0AAbstract%3A%20Image%20spatial%20editing%20performs%20geometry-driven%20transformations%2C%20allowing%20precise%20control%20over%20object%20layout%20and%20camera%20viewpoints.%20Current%20models%20are%20insufficient%20for%20fine-grained%20spatial%20manipulations%2C%20motivating%20a%20dedicated%20assessment%20suite.%20Our%20contributions%20are%20listed%3A%20%28i%29%20We%20introduce%20SpatialEdit-Bench%2C%20a%20complete%20benchmark%20that%20evaluates%20spatial%20editing%20by%20jointly%20measuring%20perceptual%20plausibility%20and%20geometric%20fidelity%20via%20viewpoint%20reconstruction%20and%20framing%20analysis.%20%28ii%29%20To%20address%20the%20data%20bottleneck%20for%20scalable%20training%2C%20we%20construct%20SpatialEdit-500k%2C%20a%20synthetic%20dataset%20generated%20with%20a%20controllable%20Blender%20pipeline%20that%20renders%20objects%20across%20diverse%20backgrounds%20and%20systematic%20camera%20trajectories%2C%20providing%20precise%20ground-truth%20transformations%20for%20both%20object-%20and%20camera-centric%20operations.%20%28iii%29%20Building%20on%20this%20data%2C%20we%20develop%20SpatialEdit-16B%2C%20a%20baseline%20model%20for%20fine-grained%20spatial%20editing.%20Our%20method%20achieves%20competitive%20performance%20on%20general%20editing%20while%20substantially%20outperforming%20prior%20methods%20on%20spatial%20manipulation%20tasks.%20All%20resources%20will%20be%20made%20public%20at%20https%3A//github.com/EasonXiao-888/SpatialEdit.%0ALink%3A%20http%3A//arxiv.org/a {"title": "Scalable and Generalizable Correspondence Pruning via Geometry-Consistent Pre-training", "author": "Tangfei Liao and Xiaoqin Zhang and Tao Wang and Hao Ye and Min Li and Guobao Xiao and Mang Ye", "abstract": "Two-view correspondence pruning aims to identify reliable correspondences for camera pose estimation, serving as a fundamental step in many 3D vision tasks. Existing methods rely on geometric consistency to seek true correspondences (inliers) from numerous false correspondences (outliers). In this learning paradigm, outliers severely affect the representation learning of inliers, resulting in models that are neither robust nor generalizable. To address this issue, we propose a geometry-consistent pre-training paradigm that sculpts scalable and generalizable representations free from outlier interference. The paradigm features two appealing properties. 1) Implementation of geometry-consistent pre-training. We introduce masked inlier reconstruction as a pretext task and develop a simple yet effective pre-training framework based on a masked autoencoder. Specifically, due to the irregular and unordered nature of correspondences, which lack explicit positional information, we adopt a dual-branch structure that separately reconstructs the keypoints of two images. This enables indirect reconstruction of 4D correspondences, where keypoints from the paired image provide positional prompts. 2) Unified correspondence encoder. We propose a simple dual-stream encoder with built-in consensus interaction, providing a unified, extensible architecture that enhances representation learning. Extensive experiments demonstrate that our method, GeneralPruner, consistently outperforms state-of-the-art approaches in terms of robustness and generalization across various downstream tasks. Specifically, our method achieves 10.76%, 11.84%, and 8.65% performance gains in camera pose estimation, visual localization, and 3D registration, respectively.", "link": "http://arxiv.org/abs/2406.05773v2", "date": "2026-04-06", "relevancy": 2.7733, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.577}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5449}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5421}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Scalable%20and%20Generalizable%20Correspondence%20Pruning%20via%20Geometry-Consistent%20Pre-training&body=Title%3A%20Scalable%20and%20Generalizable%20Correspondence%20Pruning%20via%20Geometry-Consistent%20Pre-training%0AAuthor%3A%20Tangfei%20Liao%20and%20Xiaoqin%20Zhang%20and%20Tao%20Wang%20and%20Hao%20Ye%20and%20Min%20Li%20and%20Guobao%20Xiao%20and%20Mang%20Ye%0AAbstract%3A%20Two-view%20correspondence%20pruning%20aims%20to%20identify%20reliable%20correspondences%20for%20camera%20pose%20estimation%2C%20serving%20as%20a%20fundamental%20step%20in%20many%203D%20vision%20tasks.%20Existing%20methods%20rely%20on%20geometric%20consistency%20to%20seek%20true%20correspondences%20%28inliers%29%20from%20numerous%20false%20correspondences%20%28outliers%29.%20In%20this%20learning%20paradigm%2C%20outliers%20severely%20affect%20the%20representation%20learning%20of%20inliers%2C%20resulting%20in%20models%20that%20are%20neither%20robust%20nor%20generalizable.%20To%20address%20this%20issue%2C%20we%20propose%20a%20geometry-consistent%20pre-training%20paradigm%20that%20sculpts%20scalable%20and%20generalizable%20representations%20free%20from%20outlier%20interference.%20The%20paradigm%20features%20two%20appealing%20properties.%201%29%20Implementation%20of%20geometry-consistent%20pre-training.%20We%20introduce%20masked%20inlier%20reconstruction%20as%20a%20pretext%20task%20and%20develop%20a%20simple%20yet%20effective%20pre-training%20framework%20based%20on%20a%20masked%20autoencoder.%20Specifically%2C%20due%20to%20the%20irregular%20and%20unordered%20nature%20of%20correspondences%2C%20which%20lack%20explicit%20positional%20information%2C%20we%20adopt%20a%20dual-branch%20structure%20that%20separately%20reconstructs%20the%20keypoints%20of%20two%20images.%20This%20enables%20indirect%20reconstruction%20of%204D%20correspondences%2C%20where%20keypoints%20from%20the%20paired%20image%20provide%20positional%20prompts.%202%29%20Unified%20correspondence%20encoder.%20We%20propose%20a%20simple%20dual-stream%20encoder%20with%20built-in%20consensus%20interaction%2C%20providing%20a%20unified%2C%20extensible%20architecture%20that%20enhances%20representation%20learning.%20Extensive%20experiments%20demonstrate%20that%20our%20method%2C%20GeneralPruner%2C%20consistently%20outperforms%20state-of-the-art%20approaches%20in%20terms%20of%20robustness%20and%20generalization%20across%20various%20downstream%20tasks.%20Specifically%2C%20our%20method%20achieves%2010.76%25%2C%2011.84%25%2C%20and%208.65%25%20performance%20gains%20in%20camera%20pose%20estimation%2C%20visual%20localization%2C%20and%203D%20registration%2C%20respectively.%0ALink%3A%20http%3A//arxiv.org/abs/2406.05773v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DScalable%2520and%2520Generalizable%2520Correspondence%2520Pruning%2520via%2520Geometry-Consistent%2520Pre-training%26entry.906535625%3DTangfei%2520Liao%2520and%2520Xiaoqin%2520Zhang%2520and%2520Tao%2520Wang%2520and%2520Hao%2520Ye%2520and%2520Min%2520Li%2520and%2520Guobao%2520Xiao%2520and%2520Mang%2520Ye%26entry.1292438233%3DTwo-view%2520correspondence%2520pruning%2520aims%2520to%2520identify%2520reliable%2520correspondences%2520for%2520camera%2520pose%2520estimation%252C%2520serving%2520as%2520a%2520fundamental%2520step%2520in%2520many%25203D%2520vision%2520tasks.%2520E {"title": "Synthesis4AD: Synthetic Anomalies are All You Need for 3D Anomaly Detection", "author": "Yihan Sun and Yuqi Cheng and Junjie Zu and Yuxiang Tan and Guoyang Xie and Yucheng Wang and Yunkang Cao and Weiming Shen", "abstract": "Industrial 3D anomaly detection performance is fundamentally constrained by the scarcity and long-tailed distribution of abnormal samples. To address this challenge, we propose Synthesis4AD, an end-to-end paradigm that leverages large-scale, high-fidelity synthetic anomalies to learn more discriminative representations for 3D anomaly detection. At the core of Synthesis4AD is 3D-DefectStudio, a software platform built upon the controllable synthesis engine MPAS, which injects geometrically realistic defects guided by higher-dimensional support primitives while simultaneously generating accurate point-wise anomaly masks. Furthermore, Synthesis4AD incorporates a multimodal large language model (MLLM) to interpret product design information and automatically translate it into executable anomaly synthesis instructions, enabling scalable and knowledge-driven anomalous data generation. To improve the robustness and generalization of the downstream detector on unstructured point clouds, Synthesis4AD further introduces a training pipeline based on spatial-distribution normalization and geometry-faithful data augmentations, which alleviates the sensitivity of Point Transformer architectures to absolute coordinates and improves feature learning under realistic data variations. Extensive experiments demonstrate state-of-the-art performance on Real3D-AD, MulSen-AD, and a real-world industrial parts dataset. The proposed synthesis method MPAS and the interactive system 3D-DefectStudio will be publicly released at https://github.com/hustCYQ/Synthesis4AD.", "link": "http://arxiv.org/abs/2604.04658v1", "date": "2026-04-06", "relevancy": 2.7691, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5726}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5444}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5444}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Synthesis4AD%3A%20Synthetic%20Anomalies%20are%20All%20You%20Need%20for%203D%20Anomaly%20Detection&body=Title%3A%20Synthesis4AD%3A%20Synthetic%20Anomalies%20are%20All%20You%20Need%20for%203D%20Anomaly%20Detection%0AAuthor%3A%20Yihan%20Sun%20and%20Yuqi%20Cheng%20and%20Junjie%20Zu%20and%20Yuxiang%20Tan%20and%20Guoyang%20Xie%20and%20Yucheng%20Wang%20and%20Yunkang%20Cao%20and%20Weiming%20Shen%0AAbstract%3A%20Industrial%203D%20anomaly%20detection%20performance%20is%20fundamentally%20constrained%20by%20the%20scarcity%20and%20long-tailed%20distribution%20of%20abnormal%20samples.%20To%20address%20this%20challenge%2C%20we%20propose%20Synthesis4AD%2C%20an%20end-to-end%20paradigm%20that%20leverages%20large-scale%2C%20high-fidelity%20synthetic%20anomalies%20to%20learn%20more%20discriminative%20representations%20for%203D%20anomaly%20detection.%20At%20the%20core%20of%20Synthesis4AD%20is%203D-DefectStudio%2C%20a%20software%20platform%20built%20upon%20the%20controllable%20synthesis%20engine%20MPAS%2C%20which%20injects%20geometrically%20realistic%20defects%20guided%20by%20higher-dimensional%20support%20primitives%20while%20simultaneously%20generating%20accurate%20point-wise%20anomaly%20masks.%20Furthermore%2C%20Synthesis4AD%20incorporates%20a%20multimodal%20large%20language%20model%20%28MLLM%29%20to%20interpret%20product%20design%20information%20and%20automatically%20translate%20it%20into%20executable%20anomaly%20synthesis%20instructions%2C%20enabling%20scalable%20and%20knowledge-driven%20anomalous%20data%20generation.%20To%20improve%20the%20robustness%20and%20generalization%20of%20the%20downstream%20detector%2 {"title": "GenSmoke-GS: A Multi-Stage Method for Novel View Synthesis from Smoke-Degraded Images Using a Generative Model", "author": "Qida Cao and Xinyuan Hu and Changyue Shi and Jiajun Ding and Zhou Yu and Jun Yu", "abstract": "This paper describes our method for Track 2 of the NTIRE 2026 3D Restoration and Reconstruction (3DRR) Challenge on smoke-degraded images. In this task, smoke reduces image visibility and weakens the cross-view consistency required by scene optimization and rendering. We address this problem with a multi-stage pipeline consisting of image restoration, dehazing, MLLM-based enhancement, 3DGS-MCMC optimization, and averaging over repeated runs. The main purpose of the pipeline is to improve visibility before rendering while limiting scene-content changes across input views. Experimental results on the challenge benchmark show improved quantitative performance and better visual quality than the provided baselines. The code is available at https://github.com/plbbl/GenSmoke-GS. Our method achieved a ranking of 1 out of 14 participants in Track 2 of the NTIRE 3DRR Challenge, as reported on the official competition website: https://www.codabench.org/competitions/13993/#/results-tab.", "link": "http://arxiv.org/abs/2604.03039v2", "date": "2026-04-06", "relevancy": 2.761, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5553}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5507}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5507}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GenSmoke-GS%3A%20A%20Multi-Stage%20Method%20for%20Novel%20View%20Synthesis%20from%20Smoke-Degraded%20Images%20Using%20a%20Generative%20Model&body=Title%3A%20GenSmoke-GS%3A%20A%20Multi-Stage%20Method%20for%20Novel%20View%20Synthesis%20from%20Smoke-Degraded%20Images%20Using%20a%20Generative%20Model%0AAuthor%3A%20Qida%20Cao%20and%20Xinyuan%20Hu%20and%20Changyue%20Shi%20and%20Jiajun%20Ding%20and%20Zhou%20Yu%20and%20Jun%20Yu%0AAbstract%3A%20This%20paper%20describes%20our%20method%20for%20Track%202%20of%20the%20NTIRE%202026%203D%20Restoration%20and%20Reconstruction%20%283DRR%29%20Challenge%20on%20smoke-degraded%20images.%20In%20this%20task%2C%20smoke%20reduces%20image%20visibility%20and%20weakens%20the%20cross-view%20consistency%20required%20by%20scene%20optimization%20and%20rendering.%20We%20address%20this%20problem%20with%20a%20multi-stage%20pipeline%20consisting%20of%20image%20restoration%2C%20dehazing%2C%20MLLM-based%20enhancement%2C%203DGS-MCMC%20optimization%2C%20and%20averaging%20over%20repeated%20runs.%20The%20main%20purpose%20of%20the%20pipeline%20is%20to%20improve%20visibility%20before%20rendering%20while%20limiting%20scene-content%20changes%20across%20input%20views.%20Experimental%20results%20on%20the%20challenge%20benchmark%20show%20improved%20quantitative%20performance%20and%20better%20visual%20quality%20than%20the%20provided%20baselines.%20The%20code%20is%20available%20at%20https%3A//github.com/plbbl/GenSmoke-GS.%20Our%20method%20achieved%20a%20ranking%20of%201%20out%20of%2014%20participants%20in%20Track%202%20of%20the%20NTIRE%203DRR%20Challenge%2C%20as%20reported%20on%20the%20official%20competition%20website%3A%20https%3A//www.codabench.org/competitions/13993/%23/results-tab.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03039v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGenSmoke-GS%253A%2520A%2520Multi-Stage%2520Method%2520for%2520Novel%2520View%2520Synthesis%2520from%2520Smoke-Degraded%2520Images%2520Using%2520a%2520Generative%2520Model%26entry.906535625%3DQida%2520Cao%2520and%2520Xinyuan%2520Hu%2520and%2520Changyue%2520Shi%2520and%2520Jiajun%2520Ding%2520and%2520Zhou%2520Yu%2520and%2520Jun%2520Yu%26entry.1292438233%3DThis%2520paper%2520describes%2520our%2520method%2520for%2520Track%25202%2520of%2520the%2520NTIRE%25202026%25203D%2520Restoration%2520and%2520Reconstruction%2520%25283DRR%2529%2520Challenge%2520on%2520smoke-degraded%2520images.%2520In%2520this%2520task%252C%2520smoke%2520reduces%2520image%2520visibility%2520and%2520weakens%2520the%2520cross-view%2520consistency%2520required%2520by%2520scene%2520optimization%2520and%2520rendering.%2520We%2520address%2520this%2520problem%2520with%2520a%2520multi-stage%2520pipeline%2520consisting%2520of%2520image%2520restoration%252C%2520dehazing%252C%2520MLLM-based%2520enhancement%252C%25203DGS-MCMC%2520optimization%252C%2520and%2520averaging%2520over%2520repeated%2520runs.%2520The%2520main%2520purpose%2520of%2520the%2520pipeline%2520is%2520to%2520improve%2520visibility%2520before%2520rendering%2520while%2520limiting%2520scene-content%2520changes%2520across%2520input%2520views.%2520Experimental%2520results%2520on%2520the%2520challenge%2520benchmark%2520show%2520improved%2520quantitative%2520performance%2520and%2520better%2520visual%2520quality%2520than%2520the%2520provided%2520baselines.%2520The%2520code%2520is%2520available%2520at%2520https%253A//github.com/plbbl/GenSmoke-GS.%2520Our%2520method%2520achieved%2520a%2520ranking%2520of%25201%2520out%2520of%252014%2520participants%2520in%2520Track%25202%2520of%2520the%2520NTIRE%25203DRR%2520Challenge%252C%2520as%2520reported%2520on%2520the%2520official%2520competition%2520website%253A%2520https%253A//www.codabench.org/competitions/13993/%2523/results-tab.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.03039v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GenSmoke-GS%3A%20A%20Multi-Stage%20Method%20for%20Novel%20View%20Synthesis%20from%20Smoke-Degraded%20Images%20Using%20a%20Generative%20Model&entry.906535625=Qida%20Cao%20and%20Xinyuan%20Hu%20and%20Changyue%20Shi%20and%20Jiajun%20Ding%20and%20Zhou%20Yu%20and%20Jun%20Yu&entry.1292438233=This%20paper%20describes%20our%20method%20for%20Track%202%20of%20the%20NTIRE%202026%203D%20Restoration%20and%20Reconstruction%20%283DRR%29%20Challenge%20on%20smoke-degraded%20images.%20In%20this%20task%2C%20smoke%20reduces%20image%20visibility%20and%20weakens%20the%20cross-view%20consistency%20required%20by%20scene%20optimization%20and%20rendering.%20We%20address%20this%20problem%20with%20a%20multi-stage%20pipeline%20consisting%20of%20image%20restoration%2C%20dehazing%2C%20MLLM-based%20enhancement%2C%203DGS-MCMC%20optimization%2C%20and%20averaging%20over%20repeated%20runs.%20The%20main%20purpose%20of%20the%20pipeline%20is%20to%20improve%20visibility%20before%20rendering%20while%20limiting%20scene-content%20changes%20across%20input%20views.%20Experimental%20results%20on%20the%20challenge%20benchmark%20show%20improved%20quantitative%20performance%20and%20better%20visual%20quality%20than%20the%20provided%20baselines.%20The%20code%20is%20available%20at%20https%3A//github.com/plbbl/GenSmoke-GS.%20Our%20method%20achieved%20a%20ranking%20of%201%20out%20of%2014%20participants%20in%20Track%202%20of%20the%20NTIRE%203DRR%20Challenge%2C%20as%20reported%20on%20the%20official%20competition%20website%3A%20https%3A//www.codabench.org/competitions/13993/%23/results-tab.&entry.1838667208=http%3A//arxiv.org/abs/2604.03039v2&entry.124074799=Read"},
{"title": "Vero: An Open RL Recipe for General Visual Reasoning", "author": "Gabriel Sarch and Linrong Cai and Qunzhong Wang and Haoyang Wu and Danqi Chen and Zhuang Liu", "abstract": "What does it take to build a visual reasoner that works across charts, science, spatial understanding, and open-ended tasks? The strongest vision-language models (VLMs) show such broad visual reasoning is within reach, but the recipe behind them remains unclear, locked behind proprietary reinforcement learning (RL) pipelines with non-public data. We introduce Vero, a family of fully open VLMs that matches or exceeds existing open-weight models across diverse visual reasoning tasks. We scale RL data and rewards across six broad task categories, constructing Vero-600K, a 600K-sample dataset from 59 datasets, and designing task-routed rewards that handle heterogeneous answer formats. Vero achieves state-of-the-art performance, improving over four base models by 3.7-5.5 points on average across VeroEval, our suite of 30 challenging benchmarks. Starting from Qwen3-VL-8B-Instruct, Vero outperforms Qwen3-VL-8B-Thinking on 23 of 30 benchmarks without additional proprietary thinking data. When trained from the same base model, Vero-600K exceeds existing RL datasets across task categories. Systematic ablations reveal that different task categories elicit qualitatively distinct reasoning patterns that transfer poorly in isolation, suggesting that broad data coverage is the primary driver of strong RL scaling. All data, code, and models are released.", "link": "http://arxiv.org/abs/2604.04917v1", "date": "2026-04-06", "relevancy": 2.7599, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5701}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5701}, {"title": "Flexible Visual Re {"title": "TAPE: A two-stage parameter-efficient adaptation framework for foundation models in OCT-OCTA analysis", "author": "Xiaofei Su and Zengshuo Wang and Minghe Sun and Xin Zhao and Mingzhu Sun", "abstract": "Automated analysis of optical coherence tomography (OCT) and OCT angiography (OCTA) images is critical for robust ophthalmic diagnosis. Existing mainstream methods trained from scratch rely heavily on massive data and model scale, thereby hindering their practical deployment in resource-constrained clinical settings. Although transfer learning based on foundation models (FMs) is promising, it still faces significant challenges: domain shift and task misalignment. To address these, we propose TAPE: A Two-stage Adaptation Framework via Parameter-Efficient Fine-tuning, which strategically decouples adaptation into domain alignment and task fitting for downstream segmentation. The domain adaptation stage notably applies parameter-efficient fine-tuning (PEFT) in the context of masked image modeling for medical image domain adaptation, a novel approach to the best of our knowledge. Applying TAPE to retinal layer segmentation on both universal (masked auto-encoder, MAE) and specialized (RETFound) FMs, it demonstrates superior parameter efficiency and achieves state-of-the-art generalization performance across diverse pathologies.", "link": "http://arxiv.org/abs/2604.04571v1", "date": "2026-04-06", "relevancy": 2.7576, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6144}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.52}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.52}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TAPE%3A%2 {"title": "HI-MoE: Hierarchical Instance-Conditioned Mixture-of-Experts for Object Detection", "author": "Vadim Vashkelis and Natalia Trukhina", "abstract": "Mixture-of-Experts (MoE) architectures enable conditional computation by activating only a subset of model parameters for each input. Although sparse routing has been highly effective in language models and has also shown promise in vision, most vision MoE methods operate at the image or patch level. This granularity is poorly aligned with object detection, where the fundamental unit of reasoning is an object query corresponding to a candidate instance. We propose Hierarchical Instance-Conditioned Mixture-of-Experts (HI-MoE), a DETR-style detection architecture that performs routing in two stages: a lightweight scene router first selects a scene-consistent expert subset, and an instance router then assigns each object query to a small number of experts within that subset. This design aims to preserve sparse computation while better matching the heterogeneous, instance-centric structure of detection. In the current draft, experiments are concentrated on COCO with preliminary specialization analysis on LVIS. Under these settings, HI-MoE improves over a dense DINO baseline and over simpler token-level or instance-only routing variants, with especially strong gains on small objects. We also provide an initial visualization of expert specialization patterns. We present the method, ablations, and current limitations in a form intended to support further experimental validation.", "link": "http://arxiv.org/abs/2604.04908v1", "date": "2026-04-06", "relevancy": 2.6825, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5394}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5394}, {"title": "Flexible Vi {"title": "LoFT: Parameter-Efficient Fine-Tuning for Long-tailed Semi-Supervised Learning in Open-World Scenarios", "author": "Zhiyuan Huang and Jiahao Chen and Bing Su", "abstract": "Long-tailed semi-supervised learning (LTSSL) presents a formidable challenge where models must overcome the scarcity of tail samples while mitigating the noise from unreliable pseudo-labels. Most prior LTSSL methods are designed to train models from scratch, which often leads to issues such as overconfidence and low-quality pseudo-labels. To address this problem, we first theoretically prove that utilizing a foundation model significantly reduces the hypothesis complexity, which tightens the generalization bound and in turn minimizes the Balanced Posterior Error (BPE). Furthermore, we demonstrate that the feature compactness of foundation models strictly compresses the acceptance region for outliers, providing a geometric guarantee for robustness. Motivated by these theoretical insights, we extend LTSSL into the foundation model fine-tuning paradigm and propose a novel framework: LoFT (Long-tailed semi-supervised learning via parameter-efficient Fine-Tuning). Furthermore, we explore a more practical setting by investigating semi-supervised learning under open-world conditions, where the unlabeled data may include out-of-distribution (OOD) samples.To handle this problem, we propose LoFT-OW (LoFT under Open-World scenarios) to improve the discriminative ability. Experimental results on multiple benchmarks demonstrate that our method achieves superior performance.", "link": "http://arxiv.org/abs/2509.09926v4", "date": "2026-04-06", "relevancy": 2.6568, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5565}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5401}, 0unlabeled%20data%20may%20include%20out-of-distribution%20%28OOD%29%20samples.To%20handle%20this%20problem%2C%20we%20propose%20LoFT-OW%20%28LoFT%20under%20Open-World%20scenarios%29%20to%20improve%20the%20discriminative%20ability.%20Experimental%20results%20on%20multiple%20benchmarks%20demonstrate%20that%20our%20method%20achieves%20superior%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2509.09926v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLoFT%253A%2520Parameter-Efficient%2520Fine-Tuning%2520for%2520Long-tailed%2520Semi-Supervised%2520Learning%2520in%2520Open-World%2520Scenarios%26entry.906535625%3DZhiyuan%2520Huang%2520and%2520Jiahao%2520Chen%2520and%2520Bing%2520Su%26entry.1292438233%3DLong-tailed%2520semi-supervised%2520learning%2520%2528LTSSL%2529%2520presents%2520a%2520formidable%2520challenge%2520where%2520models%2520must%2520overcome%2520the%2520scarcity%2520of%2520tail%2520samples%2520while%2520mitigating%2520the%2520noise%2520from%2520unreliable%2520pseudo-labels.%2520Most%2520prior%2520LTSSL%2520methods%2520are%2520designed%2520to%2520train%2520models%2520from%2520scratch%252C%2520which%2520often%2520leads%2520to%2520issues%2520such%2520as%2520overconfidence%2520and%2520low-quality%2520pseudo-labels.%2520To%2520address%2520this%2520problem%252C%2520we%2520first%2520theoretically%2520prove%2520that%2520utilizing%2520a%2520foundation%2520model%2520significantly%2520reduces%2520the%2520hypothesis%2520complexity%252C%2520which%2520tightens%2520the%2520generalization%2520bound%2520and%2520in%2520turn%2520minimizes%2520the%2520Balanced%2520Posterior%2520Error%2520%2528BPE%2529.%2520Furthermore%252C%2520we%2520demonstrate%2520that%2520the%2520feature%2520compactness%2520of%2520foundation%2520models%2520strictly%2520compresses%2520the%2520acceptance%2520region%2520for%2520outliers%252C%2520providing%2520a%2520geometric%2520guarantee%2520for%2520robustness.%2520Motivated%2520by%2520these%2520theoretical%2520insights%252C%2520we%2520extend%2520LTSSL%2520into%2520the%2520foundation%2520model%2520fine-tuning%2520paradigm%2520and%2520propose%2520a%2520novel%2520framework%253A%2520LoFT%2520%2528Long-tailed%2520semi-supervised%2520learning%2520via%2520parameter-efficient%2520Fine-Tuning%2529.%2520Furthermore%252C%2520we%2520explore%2520a%2520more%2520practical%2520setting%2520by%2520investigating%2520semi-supervised%2520learning%2520under%2520open-world%2520conditions%252C%2520where%2520the%2520unlabeled%2520data%2520may%2520include%2520out-of-distribution%2520%2528OOD%2529%2520samples.To%2520handle%2520this%2520problem%252C%2520we%2520propose%2520LoFT-OW%2520%2528LoFT%2520under%2520Open-World%2520scenarios%2529%2520to%2520improve%2520the%2520discriminative%2520ability.%2520Experimental%2520results%2520on%2520multiple%2520benchmarks%2520demonstrate%2520that%2520our%2520method%2520achieves%2520superior%2520performance.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.09926v4%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=LoFT%3A%20Parameter-Efficient%20Fine-Tuning%20for%20Long-tailed%20Semi-Supervised%20Learning%20in%20Open-World%20Scenarios&entry.906535625=Zhiyuan%20Huang%20and%20Jiahao%20Chen%20and%20Bing%20Su&entry.1292438233=Long-tailed%20semi-supervised%20learning%20%28LTSSL%29%20presents%20a%20formidable%20challenge%20where%20models%20must%20overcome%20the%20scarcity%20of%20tail%20samples%20while%20mitigating%20the%20noise%20from%20unreliable%20pseudo-labels.%20Most%20prior%20LTSSL%20methods%20are%20designed%20to%20train%20models%20from%20scratch%2C%20which%20often%20leads%20to%20issues%20such%20as%20overconfidence%20and%20low-quality%20pseudo-labels.%20To%20address%20this%20problem%2C%20we%20first%20theoretically%20prove%20that%20utilizing%20a%20foundation%20model%20significantly%20reduces%20the%20hypothesis%20complexity%2C% {"title": "Projected Autoregression: Autoregressive Language Generation in Continuous State Space", "author": "Oshri Naparstek", "abstract": "Standard autoregressive language models generate text by repeatedly selecting a discrete next token, coupling prediction with irreversible commitment at every step. We show that token selection is not the only viable autoregressive interface.\n  \\textbf{Projected Autoregression} replaces token selection with continuous prediction in embedding space followed by discrete projection at commitment time. The model predicts next-token vectors via regression and contrastive objectives, while discrete tokens arise only by nearest-neighbor projection. An optional mutable suffix (``liquid tail'') enables iterative refinement before commitment, but the central change is more basic: next-step prediction is continuous, and discrete tokens are produced only as a downstream interface.\n  Projected Autoregression establishes a concrete alternative to token-selection autoregression: language generation can be organized around continuous-state prediction with delayed discrete commitment. Refinement remains local to a short causal suffix within a left-to-right causal process, rather than a sequence-wide denoising process. This separation has two consequences. First, it induces a \\emph{distinct generation regime}: even with immediate projection ($K{=}1$), continuous prediction yields text structure and dynamics that differ from tested token-space AR baselines, including a compute-matched best-of-16 reranking baseline. Second, it exposes a \\emph{continuous control surface} inside autoregressive generation: direction rate, history noise, delayed commitment, state-space guidance, and embedding geometry act directly on the evolving generative state before token commitment. Taken together, these results place repeated token selection within a larger family of autoregressive interfaces and expose continuous state space as a broader algorithmic design space for language generation.", "link": "http://arxiv.org/abs/2601.04854v3", "date": "2026-04-06", "relevancy": 2.6513, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.546}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.526}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.5188}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Projected%20Autoregression%3A%20Autoregressive%20Language%20Generation%20in%20Continuous%20State%20Space&body=Title%3A%20Projected%20Autoregression%3A%20Autoregressive%20Language%20Generation%20in%20Continuous%20State%20Space%0AAuthor%3A%20Oshri%20Naparstek%0AAbstract%3A%20Standard%20autoregressive%20language%20models%20generate%20text%20by%20repeatedly%20selecting%20a%20discrete%20next%20token%2C%20coupling%20prediction%20with%20irreversible%20commitment%20at%20every%20step.%20We%20show%20that%20token%20selection%20is%20not%20the%20only%20viable%20autoregressive%20interface.%0A%20%20%5Ctextbf%7BProjected%20Autoregression%7D%20replaces%20token%20selection%20with%20continuous%20prediction%20in%20embedding%20space%20followed%20by%20discrete%20projection%20at%20commitment%20time.%20The%20model%20predicts%20next-token%20vectors%20via%20regression%20and%20contrastive%20objectives%2C%20while%20discrete%20tokens%20arise%20only%20by%20nearest-neighbor%20projection.%20An%20optional%20mutable%20suffix%20%28%60%60liquid%20tail%27%27%29%20enables%20iterative%20refinement%20before%20commitment%2C%20but%20the%20central%20change%20is%20more%20basic%3A%20next-step%20prediction%20is%20continuous%2C%20and%20discrete%20tokens%20are%20produced%20only%20as%20a%20downstream%20interface.%0A%20%20Projected%20Autoregression%20establishes%20a%20concrete%20alternative%20to%20token-selection%20autoregression%3A%20language%20generation%20can%20be%20organized%20around%20continuous-state%20prediction%20with%20delayed%20discrete%20commitment.%20Refinement%20remains%20local%20to%20a%20short%20causal%20suffix%20within%20a%20left-to-right%20causal%20process%2C%20rather%20than%20a%20sequence-wide%20denoising%20process.%20This%20separation%20has%20two%20consequences.%20First%2C%20it%20induces%20a%20%5Cemph%7Bdistinct%20generation%20regime%7D%3A%20even%20with%20immediate%20projection%20%28%24K%7B%3D%7D1%24%29%2C%20continuous%20prediction%20yields%20text%20structure%20and%20dynamics%20that%20differ%20from%20tested%20token-space%20AR%20baselines%2C%20including%20a%20compute-matched%20best-of-16%20reranking%20baseline.%20Second%2C%20it%20exposes%20a%20%5Cemph%7Bcontinuous%20control%20surface%7D%20inside%20autoregressive%20generation%3A%20direction%20rate%2C%20history%20noise%2C%20delayed%20commitment%2C%20state-space%20guidance%2C%20and%20embedding%20geometry%20act%20directly%20on%20the%20evolving%20generative%20state%20before%20token%20commitment.%20Taken%20together%2C%20these%20results%20place%20repeated%20token%20selection%20within%20a%20larger%20family%20of%20autoregressive%20interfaces%20and%20expose%20continuous%20state%20space%20as%20a%20broader%20algorithmic%20design%20space%20for%20language%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2601.04854v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DProjected%2520Autoregression%253A%2520Autoregressive%2520Language%2520Generation%2520in%2520Continuous%2520State%2520Space%26entry.906535625%3DOshri%2520Naparstek%26entry.1292438233%3DStandard%2520autoregressive%2520language%2520models%2520generate%2520text%2520by%2520repeatedly%2520selecting%2520a%2520discrete%2520next%2520token%252C%2520coupling%2520prediction%2520with%2520irreversible%2520commitment%2520at%2520every%2520step.%2520We%2520show {"title": "Neural Collapse in Test-Time Adaptation", "author": "Xiao Chen and Zhongjing Du and Jiazhen Huang and Xu Jiang and Li Lu and Jingyan Jiang and Zhi Wang", "abstract": "Test-Time Adaptation (TTA) enhances model robustness to out-of-distribution (OOD) data by updating the model online during inference, yet existing methods lack theoretical insights into the fundamental causes of performance degradation under domain shifts. Recently, Neural Collapse (NC) has been proposed as an emergent geometric property of deep neural networks (DNNs), providing valuable insights for TTA. In this work, we extend NC to the sample-wise level and discover a novel phenomenon termed Sample-wise Alignment Collapse (NC3+), demonstrating that a sample's feature embedding, obtained by a trained model, aligns closely with the corresponding classifier weight. Building on NC3+, we identify that the performance degradation stems from sample-wise misalignment in adaptation which exacerbates under larger distribution shifts. This indicates the necessity of realigning the feature embeddings with their corresponding classifier weights. However, the misalignment makes pseudo-labels unreliable under domain shifts. To address this challenge, we propose NCTTA, a novel feature-classifier alignment method with hybrid targets to mitigate the impact of unreliable pseudo-labels, which blends geometric proximity with predictive confidence. Extensive experiments demonstrate the effectiveness of NCTTA in enhancing robustness to domain shifts. For example, NCTTA outperforms Tent by 14.52% on ImageNet-C. Project page is publicly available at https://github.com/Cevaaa/NCTTA.", "link": "http://arxiv.org/abs/2512.10421v2", "date": "2026-04-06", "relevancy": 2.6387, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5402}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5228}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5203}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Neural%20Collapse%20in%20Test-Time%20Adaptation&body=Title%3A%20Neural%20Collapse%20in%20Test-Time%20Adaptation%0AAuthor%3A%20Xiao%20Chen%20and%20Zhongjing%20Du%20and%20Jiazhen%20Huang%20and%20Xu%20Jiang%20and%20Li%20Lu%20and%20Jingyan%20Jiang%20and%20Zhi%20Wang%0AAbstract%3A%20Test-Time%20Adaptation%20%28TTA%29%20enhances%20model%20robustness%20to%20out-of-distribution%20%28OOD%29%20data%20by%20updating%20the%20model%20online%20during%20inference%2C%20yet%20existing%20methods%20lack%20theoretical%20insights%20into%20the%20fundamental%20causes%20of%20performance%20degradation%20under%20domain%20shifts.%20Recently%2C%20Neural%20Collapse%20%28NC%29%20has%20been%20proposed%20as%20an%20emergent%20geometric%20property%20of%20deep%20neural%20networks%20%28DNNs%29%2C%20providing%20valuable%20insights%20for%20TTA.%20In%20this%20work%2C%20we%20extend%20NC%20to%20the%20sample-wise%20level%20and%20discover%20a%20novel%20phenomenon%20termed%20Sample-wise%20Alignment%20Collapse%20%28NC3%2B%29%2C%20demonstrating%20that%20a%20sample%27s%20feature%20embedding%2C%20obtained%20by%20a%20trained%20model%2C%20aligns%20closely%20with%20the%20corresponding%20classifier%20weight.%20Building%20on%20NC3%2B%2C%20we%20identify%20that%20the%20performance%20degradation%20stems%20from%20sample-wise%20misalignment%20in%20adaptation%20which%20exacerbates%20under%20larger%20distribution%20shifts.%20This%20indicates%20the%20necessity%20of%20realigning%20the%20feature%20embeddings%20with%20their%20corresponding%20classifier%20weights.%20However%2C%20the%20misalignment%20makes%20pseudo-labels%20unreliable%20under%20domain%20shifts.%20To%20address%20this%20challenge%2C%20we%20propose%20NCTTA%2C%20a%20novel%20feature-classifier%20alignment%20method%20with%20hybrid%20targets%20to%20mitigate%20the%20impact%20of%20unreliable%20pseudo-labels%2C%20which%20blends%20geometric%20proximity%20with%20predictive%20confidence.%20Extensive%20experiments%20demonstrate%20the%20effectiveness%20of%20NCTTA%20in%20enhancing%20robustness%20to%20domain%20shifts.%20For%20example%2C%20NCTTA%20outperforms%20Tent%20by%2014.52%25%20on%20ImageNet-C.%20Project%20page%20is%20publicly%20available%20at%20https%3A//github.com/Cevaaa/NCTTA.%0ALink%3A%20http%3A//arxiv.org/abs/2512.10421v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNeural%2520Collapse%2520in%2520Test-Time%2520Adaptation%26entry.906535625%3DXiao%2520Chen%2520and%2520Zhongjing%2520Du%2520and%2520Jiazhen%2520Huang%2520and%2520Xu%2520Jiang%2520and%2520Li%2520Lu%2520and%2520Jingyan%2520Jiang%2520and%2520Zhi%2520Wang%26entry.1292438233%3DTest-Time%2520Adaptation%2520%2528TTA%2529%2520enhances%2520model%2520robustness%2520to%2520out-of-distribution%2520%2528OOD%2529%2520data%2520by%2520updating%2520the%2520model%2520online%2520during%2520inference%252C%2520yet%2520existing%2520methods%2520lack%2520theoretical%2520insights%2520into%2520the%2520fundamental%2520causes%2520of%2520performance%2520degradation%2520under%2520domain%2520shifts.%2520Recently%252C%2520Neural%2520Collapse%2520%2528NC%2529%2520has%2520been%2520proposed%2520as%2520an%2520emergent%2520geometric%2520property%2520of%2520deep%2520neural%2520networks%2520%2528DNNs%2529%252C%2520providing%2520valuable%2520insights%2520for%2520TTA.%2520In%2520this%2520work%252C%2520we%2520extend%2520NC%2520to%2520the%2520sample-wise%2520level%2520and%2520discover%2520a%2520novel%2520phenomenon%2520termed%2520Sample-wise%2520Alignment%2520Collapse%2520%2528NC3%252B%2529%252C%2520demonstrating%2520that%2520a%2520sample%2527s%2520feature%2520embedding%252C%2520obtained%2520by%2520a%2520trained%2520model%252C%2520aligns%2520closely%2520with%2520the%2520corresponding%2520classifier%2520weight.%2520Building%2520on%2520NC3%252B%252C%2520we%2520identify%2520that%2520the%2520performance%2520degradation%2520stems%2520from%2520sample-wise%2520misalignment%2520in%2520adaptation%2520which%2520exacerbates%2520under%2520larger%2520distribution%2520shifts.%2520This%2520indicates%2520the%2520necessity%2520of%2520realigning%2520the%2520feature%2520embeddings%2520with%2520their%2520corresponding%2520classifier%2520weights.%2520However%252C%2520the%2520misalignment%2520makes%2520pseudo-labels%2520unreliable%2520under%2520domain%2520shifts.%2520To%2520address%2520this%2520challenge%252C%2520we%2520propose%2520NCTTA%252C%2520a%2520novel%2520feature-classifier%2520alignment%2520method%2520with%2520hybrid%2520targets%2520to%2520mitigate%2520the%2520impact%2520of%2520unreliable%2520pseudo-labels%252C%2520which%2520blends%2520geometric%2520proximity%2520with%2520predictive%2520confidence.%2520Extensive%2520experiments%2520demonstrate%2520the%2520effectiveness%2520of%2520NCTTA%2520in%2520enhancing%2520robustness%2520to%2520domain%2520shifts.%2520For%2520example%252C%2520NCTTA%2520outperforms%2520Tent%2520by%252014.52%2525%2520on%2520ImageNet-C.%2520Project%2520page%2520is%2520publicly%2520available%2520at%2520https%253A//github.com/Cevaaa/NCTTA.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.10421v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Neural%20Collapse%20in%20Test-Time%20Adaptation&entry.906535625=Xiao%20Chen%20and%20Zhongjing%20Du%20and%20Jiazhen%20Huang%20and%20Xu%20Jiang%20and%20Li%20Lu%20and%20Jingyan%20Jiang%20and%20Zhi%20Wang&entry.1292438233=Test-Time%20Adaptation%20%28TTA%29%20enhances%20model%20robustness%20to%20out-of-distribution%20%28OOD%29%20data%20by%20updating%20the%20model%20online%20during%20inference%2C%20yet%20existing%20methods%20lack%20theoretical%20insights%2 {"title": "Geological Field Restoration through the Lens of Image Inpainting", "author": "Vladislav Trifonov and Ivan Oseledets and Ekaterina Muravleva", "abstract": "We study an ill-posed problem of geological field reconstruction under limited observations. Engineers often have to deal with the problem of reconstructing the subsurface geological field from sparse measurements such as exploration well data. Inspired by image inpainting, we model this partially observed spatial field as a multidimensional tensor and recover missing values by enforcing a global low rank structure together with spatial smoothness. We solve the resulting optimization via the Alternating Direction Method of Multipliers. On the SPE10 model 2 benchmark, this deterministic approach yields consistently lower relative squared error than ordinary kriging across various sampling densities and produces visually coherent reconstructions.", "link": "http://arxiv.org/abs/2506.04869v2", "date": "2026-04-06", "relevancy": 2.6281, "topK": [{"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.547}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5161}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5137}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Geological%20Field%20Restoration%20through%20the%20Lens%20of%20Image%20Inpainting&body=Title%3A%20Geological%20Field%20Restoration%20through%20the%20Lens%20of%20Image%20Inpainting%0AAuthor%3A%20Vladislav%20Trifonov%20and%20Ivan%20Oseledets%20and%20Ekaterina%20Muravleva%0AAbstract%3A%20We%20study%20an%20ill-posed%20problem%20of%20geological%20field%20reconstruction%20under%20limited%20observations.%20Engineers%20often%20have%20to%20deal%20with%20the%20problem%2 rection%2520Method%2520of%2520Multipliers.%2520On%2520the%2520SPE10%2520model%25202%2520benchmark%252C%2520this%2520deterministic%2520approach%2520yields%2520consistently%2520lower%2520relative%2520squared%2520error%2520than%2520ordinary%2520kriging%2520across%2520various%2520sampling%2520densities%2520and%2520produces%2520visually%2520coherent%2520reconstructions.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2506.04869v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Geological%20Field%20Restoration%20through%20the%20Lens%20of%20Image%20Inpainting&entry.906535625=Vladislav%20Trifonov%20and%20Ivan%20Oseledets%20and%20Ekaterina%20Muravleva&entry.1292438233=We%20study%20an%20ill-posed%20problem%20of%20geological%20field%20reconstruction%20under%20limited%20observations.%20Engineers%20often%20have%20to%20deal%20with%20the%20problem%20of%20reconstructing%20the%20subsurface%20geological%20field%20from%20sparse%20measurements%20such%20as%20exploration%20well%20data.%20Inspired%20by%20image%20inpainting%2C%20we%20model%20this%20partially%20observed%20spatial%20field%20as%20a%20multidimensional%20tensor%20and%20recover%20missing%20values%20by%20enforcing%20a%20global%20low%20rank%20structure%20together%20with%20spatial%20smoothness.%20We%20solve%20the%20resulting%20optimization%20via%20the%20Alternating%20Direction%20Method%20of%20Multipliers.%20On%20the%20SPE10%20model%202%20benchmark%2C%20this%20deterministic%20approach%20yields%20consistently%20lower%20relative%20squared%20error%20than%20ordinary%20kriging%20across%20various%20sampling%20densities%20and%20produces%20visually%20coherent%20reconstructions.&entry.1838667208=http%3A//arxiv.org/abs/2506.04869v2&entry.124074799=Read"},
{"title": "InCTRLv2: Generalist Residual Models for Few-Shot Anomaly Detection and Segmentation", "author": "Jiawen Zhu and Mengjia Niu and Guansong Pang", "abstract": "While recent anomaly detection (AD) methods have made substantial progress in recognizing abnormal patterns within specific domains, most of them are specialist models that are trained on large training samples from a specific target dataset, struggling to generalize to unseen datasets. To address this limitation, the paradigm of Generalist Anomaly Detection (GAD) has emerged in recent years, aiming to learn a single generalist model to detect anomalies across diverse domains without retraining. To this end, this work introduces InCTRLv2, a novel few-shot Generalist Anomaly Detection and Segmentation (GADS) framework that significantly extends our previously proposed GAD model, InCTRL. Building on the idea of learning in-context residuals with few-shot normal examples to detect anomalies as in InCTRL, InCTRLv2 introduces two new, complementary perspectives of anomaly perception under a dual-branch framework. This is accomplished by two novel modules upon InCTRL: i) Discriminative Anomaly Score Learning (DASL) with both normal and abnormal data in the main branch, which learns a semantic-guided abnormality and normality space that supports the classification of query samples from both the abnormality and normality perspectives; and ii) One-class Anomaly Score Learning (OASL) using only the normal data, which learns generalized normality patterns in a semantic space via an auxiliary branch, focusing on detecting anomalies through the lens of normality solely. Both branches are guided by rich visual-text semantic priors encoded by large-scale vision-language models. Together, they offer a dual semantic perspective for AD: one emphasizes normal-abnormal discriminations, while the other emphasizes normality-deviated semantics. Extensive experiments on ten AD datasets demonstrate that InCTRLv2 achieves SotA performance in both anomaly detection and segmentation tasks across various settings.", "link": "http://arxiv.org/abs/2604.04632v1", "date": "2026-04-06", "relevancy": 2.6213, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5368}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5247}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5113}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20InCTRLv2%3A%20Generalist%20Residual%20Models%20for%20Few-Shot%20Anomaly%20Detection%20and%20Segmentation&body=Title%3A%20InCTRLv2%3A%20Generalist%20Residual%20Models%20for%20Few-Shot%20Anomaly%20Detection%20and%20Segmentation%0AAuthor%3A%20Jiawen%20Zhu%20and%20Mengjia%20Niu%20and%20Guansong%20Pang%0AAbstract%3A%20While%20recent%20anomaly%20detection%20%28AD%29%20methods%20have%20made%20substantial%20progress%20in%20recognizing%20abnormal%20patterns%20within%20specific%20domains%2C%20most%20of%20them%20are%20specialist%20models%20that%20are%20trained%20on%20large%20training%20samples%20from%20a%20specific%20target%20dataset%2C%20struggling%20to%20generalize%20to%20unseen%20datasets.%20To%20address%20this%20limitation%2C%20the%20paradigm%20of%20Generalist%20Anomaly%20Detection%20%28GAD%29%20has%20emerged%20in%20recent%20years%2C%20aiming%20to%20learn%20a%20single%20generalist%20model%20to%20detect%20anomalies%20across%20diverse%20domains%20without%20retraining.%20To%20this%20end%2C%20this%20work%20introduces%20InCTRLv2%2C%20a%20novel%20few-shot%20Generalist%20Anomaly%20Detection%20and%20Segmentation%20%28GADS%29%20framework%20that%20significantly%20extends%20our%20previously%20proposed%20GAD%20model%2C%20InCTRL.%20Building%20on%20the%20idea%20of%20learning%20in-context%20residuals%20with%20few-shot%20normal%20examples%20to%20detect%20anomalies%20as%20in%20InCTRL%2C%20InCTRLv2%20introduces%20two%20new%2C%20complementary%20perspectives%20of%20anomaly%20perception%20under%20a%20dual-branch%20framework.%20This%20is%20accomplished%20by%20two%20novel%20modules%20upon%20InCTRL%3A%20i%29%20Discriminative%20Anomaly%20Score%20Learning%20%28DASL%29%20with%20both%20normal%20and%20abnormal%20data%20in%20the%20main%20branch%2C%20which%20learns%20a%20semantic-guided%20abnormality%20and%20normality%20space%20that%20supports%20the%20classification%20of%20query%20samples%20from%20both%20the%20abnormality%20and%20normality%20perspectives%3B%20and%20ii%29%20One-class%20Anomaly%20Score%20Learning%20%28OASL%29%20using%20only%20the%20normal%20data%2C%20which%20learns%20generalized%20normality%20patterns%20in%20a%20semantic%20space%20via%20an%20auxiliary%20branch%2C%20focusing%20on%20detecting%20anomalies%20through%20the%20lens%20of%20normality%20solely.%20Both%20branches%20are%20guided%20by%20rich%20visual-text%20semantic%20priors%20encoded%20by%20large-scale%20vision-language%20models.%20Together%2C%20they%20offer%20a%20dual%20semantic%20perspective%20for%20AD%3A%20one%20emphasizes%20normal-abnormal%20discriminations%2C%20while%20the%20other%20emphasizes%20normality-deviated%20semantics.%20Extensive%20experiments%20on%20ten%20AD%20datasets%20demonstrate%20that%20InCTRLv2%20achieves%20SotA%20performance%20in%20both%20anomaly%20detection%20and%20segmentation%20tasks%20across%20various%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04632v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInCTRLv2%253A%2520Generalist%2520Residual%2520Models%2520for%2520Few-Shot%2520Anomaly%2520Detection%2520and%2520Segmentation%26entry.906535625%3DJiawen%2520Zhu%2520and%2520Mengjia%2520Niu%2520and%2520Guansong%2520Pang%26entry.1292 {"title": "Weakly Convex Ridge Regularization for 3D Non-Cartesian MRI Reconstruction", "author": "German Sh\u00e2ma Wache and Chaithya G R and Asma Tanabene and Sebastian Neumayer", "abstract": "While highly accelerated non-Cartesian acquisition protocols significantly reduce scan time, they often entail long reconstruction delays. Deep learning based reconstruction methods can alleviate this, but often lack stability and robustness to distribution shifts. As an alternative, we train a rotation invariant weakly convex ridge regularizer (WCRR). The resulting variational reconstruction approach is benchmarked against state of the art methods on retrospectively simulated data and (out of distribution) on prospective GoLF SPARKLING and CAIPIRINHA acquisitions. Our approach consistently outperforms widely used baselines and achieves performance comparable to Plug and Play reconstruction with a state of the art 3D DRUNet denoiser, while offering substantially improved computational efficiency and robustness to acquisition changes. In summary, WCRR unifies the strengths of principled variational methods and modern deep learning based approaches.", "link": "http://arxiv.org/abs/2603.27158v2", "date": "2026-04-06", "relevancy": 2.6156, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5391}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5293}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.501}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Weakly%20Convex%20Ridge%20Regularization%20for%203D%20Non-Cartesian%20MRI%20Reconstruction&body=Title%3A%20Weakly%20Convex%20Ridge%20Regularization%20for%203D%20Non-Cartesian%20MRI%20Reconstruct {"title": "The Blind Spot of Adaptation: Quantifying and Mitigating Forgetting in Fine-tuned Driving Models", "author": "Runhao Mao and Hanshi Wang and Yixiang Yang and Qianli Ma and Jingmeng Zhou and Zhipeng Zhang", "abstract": "The integration of Vision-Language Models (VLMs) into autonomous driving promises to solve long-tail scenarios, but this paradigm faces the critical and unaddressed challenge of catastrophic forgetting. The very fine-tuning process used to adapt these models to driving-specific data simultaneously erodes their invaluable pre-trained world knowledge, creating a self-defeating paradox that undermines the core reason for their use. This paper provides the first systematic investigation into this phenomenon. We introduce a new large-scale dataset of 180K scenes, which enables the first-ever benchmark specifically designed to quantify catastrophic forgetting in autonomous driving. Our analysis reveals that existing methods suffer from significant knowledge degradation. To address this, we propose the Drive Expert Adapter (DEA), a novel framework that circumvents this trade-off by shifting adaptation from the weight space to the prompt space. DEA dynamically routes inference through different knowledge experts based on scene-specific cues, enhancing driving-task performance without corrupting the model's foundational parameters. Extensive experiments demonstrate that our approach not only achieves state-of-the-art results on driving tasks but also effectively mitigates catastrophic forgetting, preserving the essential generalization capabilities that make VLMs a transformative force for autonomous systems. Data and model are released at FidelityDrivingBench.", "link": "http://arxiv.org/abs/2604.04857v1", "date": "2026-04-06", "relevancy": 2.6098, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5228}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5228}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5203}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Blind%20Spot%20of%20Adaptation%3A%20Quantifying%20and%20Mitigating%20Forgetting%20in%20Fine-tuned%20Driving%20Models&body=Title%3A%20The%20Blind%20Spot%20of%20Adaptation%3A%20Quantifying%20and%20Mitigating%20Forgetting%20in%20Fine-tuned%20Driving%20Models%0AAuthor%3A%20Runhao%20Mao%20and%20Hanshi%20Wang%20and%20Yixiang%20Yang%20and%20Qianli%20Ma%20and%20Jingmeng%20Zhou%20and%20Zhipeng%20Zhang%0AAbstract%3A%20The%20integration%20of%20Vision-Language%20Models%20%28VLMs%29%20into%20autonomous%20driving%20promises%20to%20solve%20long-tail%20scenarios%2C%20but%20this%20paradigm%20faces%20the%20critical%20and%20unaddressed%20challenge%20of%20catastrophic%20forgetting.%20The%20very%20fine-tuning%20process%20used%20to%20adapt%20these%20models%20to%20driving-specific%20data%20simultaneously%20erodes%20their%20invaluable%20pre-trained%20world%20knowledge%2C%20creating%20a%20self-defeating%20paradox%20that%20undermines%20the%20core%20reason%20for%20their%20use.%20This%20paper%20provides%20the%20first%20systematic%20investigation%20into%20this%20phenomenon.%20We%20introduce%20a%20new%20large-scale%20dataset%20of%20180K%20scenes%2C%20which%20enables%20the%20first-ever%20benchmark%20specifically%20designed%20to%20quantify%20catastrophic%20forgetting%20in%20autonomous%20driving.%20Our%20analysis%20reveals%20that%20existing%20methods%20suffer%20from%20significant%20knowledge%20degradation.%20To%20address%20this%2C%20we%20propose%20the%20Drive%20Expert%20Adapter%20%28DEA%29%2C%20a%20novel%20framework%20that%20circumvents%20this%20trade-off%20by%20shifting%20adaptation%20from%20the%20weight%20space%20to%20the%20prom {"title": "A Muon-Accelerated Algorithm for Low Separation Rank Tensor Generalized Linear Models", "author": "Xiao Liang and Shuang Li", "abstract": "Tensor-valued data arise naturally in multidimensional signal and imaging problems, such as biomedical imaging. When incorporated into generalized linear models (GLMs), naive vectorization can destroy their multi-way structure and lead to high-dimensional, ill-posed estimation. To address this challenge, Low Separation Rank (LSR) decompositions reduce model complexity by imposing low-rank multilinear structure on the coefficient tensor. A representative approach for estimating LSR-based tensor GLMs (LSR-TGLMs) is the Low Separation Rank Tensor Regression (LSRTR) algorithm, which adopts block coordinate descent and enforces orthogonality of the factor matrices through repeated QR-based projections. However, the repeated projection steps can be computationally demanding and slow convergence. Motivated by the need for scalable estimation and classification from such data, we propose LSRTR-M, which incorporates Muon (MomentUm Orthogonalized by Newton-Schulz) updates into the LSRTR framework. Specifically, LSRTR-M preserves the original block coordinate scheme while replacing the projection-based factor updates with Muon steps. Across synthetic linear, logistic, and Poisson LSR-TGLMs, LSRTR-M converges faster in both iteration count and wall-clock time, while achieving lower normalized estimation and prediction errors. On the Vessel MNIST 3D task, it further improves computational efficiency while maintaining competitive classification performance.", "link": "http://arxiv.org/abs/2604.04726v1", "date": "2026-04-06", "relevancy": 2.6085, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5416}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "simila n%20steps.%20Across%20synthetic%20linear%2C%20logistic%2C%20and%20Poisson%20LSR-TGLMs%2C%20LSRTR-M%20converges%20faster%20in%20both%20iteration%20count%20and%20wall-clock%20time%2C%20while%20achieving%20lower%20normalized%20estimation%20and%20prediction%20errors.%20On%20the%20Vessel%20MNIST%203D%20task%2C%20it%20further%20improves%20computational%20efficiency%20while%20maintaining%20competitive%20classification%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04726v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Muon-Accelerated%2520Algorithm%2520for%2520Low%2520Separation%2520Rank%2520Tensor%2520Generalized%2520Linear%2520Models%26entry.906535625%3DXiao%2520Liang%2520and%2520Shuang%2520Li%26entry.1292438233%3DTensor-valued%2520data%2520arise%2520naturally%2520in%2520multidimensional%2520signal%2520and%2520imaging%2520problems%252C%2520such%2520as%2520biomedical%2520imaging.%2520When%2520incorporated%2520into%2520generalized%2520linear%2520models%2520%2528GLMs%2529%252C%2520naive%2520vectorization%2520can%2520destroy%2520their%2520multi-way%2520structure%2520and%2520lead%2520to%2520high-dimensional%252C%2520ill-posed%2520estimation.%2520To%2520address%2520this%2520challenge%252C%2520Low%2520Separation%2520Rank%2520%2528LSR%2529%2520decompositions%2520reduce%2520model%2520complexity%2520by%2520imposing%2520low-rank%2520multilinear%2520structure%2520on%2520the%2520coefficient%2520tensor.%2520A%2520representative%2520approach%2520for%2520estimating%2520LSR-based%2520tensor%2520GLMs%2520%2528LSR-TGLMs%2529%2520is%2520the%2520Low%2520Separation%2520Rank%2520Tensor%2520Regression%2520%2528LSRTR%2529%2520algorithm%252C%2520which%2520adopts%2520block%2520coordinate%2520descent%2520and%2520enforces%2520orthogonality%2520of%2520the%2520factor%2520matrices%2520through%2520repeated%2520QR-based%2520projections.%2520However%252C%2520the%2520repeated%2520projection%2520steps%2520c g%20low-rank%20multilinear%20structure%20on%20the%20coefficient%20tensor.%20A%20representative%20approach%20for%20estimating%20LSR-based%20tensor%20GLMs%20%28LSR-TGLMs%29%20is%20the%20Low%20Separation%20Rank%20Tensor%20Regression%20%28LSRTR%29%20algorithm%2C%20which%20adopts%20block%20coordinate%20descent%20and%20enforces%20orthogonality%20of%20the%20factor%20matrices%20through%20repeated%20QR-based%20projections.%20However%2C%20the%20repeated%20projection%20steps%20can%20be%20computationally%20demanding%20and%20slow%20convergence.%20Motivated%20by%20the%20need%20for%20scalable%20estimation%20and%20classification%20from%20such%20data%2C%20we%20propose%20LSRTR-M%2C%20which%20incorporates%20Muon%20%28MomentUm%20Orthogonalized%20by%20Newton-Schulz%29%20updates%20into%20the%20LSRTR%20framework.%20Specifically%2C%20LSRTR-M%20preserves%20the%20original%20block%20coordinate%20scheme%20while%20replacing%20the%20projection-based%20factor%20updates%20with%20Muon%20steps.%20Across%20synthetic%20linear%2C%20logistic%2C%20and%20Poisson%20LSR-TGLMs%2C%20LSRTR-M%20converges%20faster%20in%20both%20iteration%20count%20and%20wall-clock%20time%2C%20while%20achieving%20lower%20normalized%20estimation%20and%20prediction%20errors.%20On%20the%20Vessel%20MNIST%203D%20task%2C%20it%20further%20improves%20computational%20efficiency%20while%20maintaining%20competitive%20classification%20performance.&entry.1838667208=http%3A//arxiv.org/abs/2604.04726v1&entry.124074799=Read"},
{"title": "LongTail Driving Scenarios with Reasoning Traces: The KITScenes LongTail Dataset", "author": "Royden Wagner and Omer Sahin Tas and Jaime Villa and Felix Hauser and Yinzhe Shen and Marlon Steiner and Dominik Strutz and Carlos Fernandez and Christian Kinzig and Guillermo S. Guitierrez-Cabello and Hendrik K\u00f6nigshof and Fabian Immel and Richard Schwarzkopf and Nils Alexander Rack and Kevin R\u00f6sch and Kaiwen Wang and Jan-Hendrik Pauls and Martin Lauer and Igor Gilitschenski and Holger Caesar and Christoph Stiller", "abstract": "In real-world domains such as self-driving, generalization to rare scenarios remains a fundamental challenge. To address this, we introduce a new dataset designed for end-to-end driving that focuses on long-tail driving events. We provide multi-view video data, trajectories, high-level instructions, and detailed reasoning traces, facilitating in-context learning and few-shot generalization. The resulting benchmark for multimodal models, such as VLMs and VLAs, goes beyond safety and comfort metrics by evaluating instruction following and semantic coherence between model outputs. The multilingual reasoning traces in English, Spanish, and Chinese are from domain experts with diverse cultural backgrounds. Thus, our dataset is a unique resource for studying how different forms of reasoning affect driving competence. Our dataset is available at: https://hf.co/datasets/kit-mrt/kitscenes-longtail", "link": "http://arxiv.org/abs/2603.23607v2", "date": "2026-04-06", "relevancy": 2.586, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5245}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5245}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "s {"title": "Beyond the Global Scores: Fine-Grained Token Grounding as a Robust Detector of LVLM Hallucinations", "author": "Tuan Dung Nguyen and Minh Khoi Ho and Qi Chen and Yutong Xie and Nguyen Cam-Tu and Minh Khoi Nguyen and Dang Huy Pham Nguyen and Anton van den Hengel and Johan W. Verjans and Phi Le Nguyen and Vu Minh Hieu Phan", "abstract": "Large vision-language models (LVLMs) achieve strong performance on visual reasoning tasks but remain highly susceptible to hallucination. Existing detection methods predominantly rely on coarse, whole-image measures of how an object token relates to the input image. This global strategy is limited: hallucinated tokens may exhibit weak but widely scattered correlations across many local regions, which aggregate into deceptively high overall relevance, thus evading the current global hallucination detectors. We begin with a simple yet critical observation: a faithful object token must be strongly grounded in a specific image region. Building on this insight, we introduce a patch-level hallucination detection framework that examines fine-grained token-level interactions across model layers. Our analysis uncovers two characteristic signatures of hallucinated tokens: (i) they yield diffuse, non-localized attention patterns, in contrast to the compact, well-focused attention seen in faithful tokens; and (ii) they fail to exhibit meaningful semantic alignment with any visual region. Guided by these findings, we develop a lightweight and interpretable detection method that leverages patch-level statistical features, combined with hidden-layer representations. Our approach achieves up to 90% accuracy in token-level hallucination detection, demonstrating the superiority of fine-grained structural analysis for detecting hallucinations.", "link": "http://arxiv.org/abs/2604.04863v1", "date": "2026-04-06", "relevancy": 2.5711, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link":

{"title": "Pickalo: Leveraging 6D Pose Estimation for Low-Cost Industrial Bin Picking", "author": "Alessandro Tarsi and Matteo Mastrogiuseppe and Saverio Taliani and Simone Cortinovis and Ugo Pattacini", "abstract": "Bin picking in real industrial environments remains challenging due to severe clutter, occlusions, and the high cost of traditional 3D sensing setups. We present Pickalo, a modular 6D pose-based bin-picking pipeline built entirely on low-cost hardware. A wrist-mounted RGB-D camera actively explores the scene from multiple viewpoints, while raw stereo streams are processed with BridgeDepth to obtain refined depth maps suitable for accurate collision reasoning. Object instances are segmented with a Mask-RCNN model trained purely on photorealistic synthetic data and localized using the zero-shot SAM-6D pose estimator. A pose buffer module fuses multi-view observations over time, handling object symmetries and significantly reducing pose noise. Offline, we generate and curate large sets of antipodal grasp candidates per object; online, a utility-based ranking and fast collision checking are queried for the grasp planning. Deployed on a UR5e with a parallel-jaw gripper and an Intel RealSense D435i, Pickalo achieves up to 600 mean picks per hour with 96-99% grasp success and robust performance over 30-minute runs on densely filled euroboxes. Ablation studies demonstrate the benefits of enhanced depth estimation and of the pose buffer for long-term stability and throughput in realistic industrial conditions. Videos are available at https://mesh-iit.github.io/project-jl2-camozzi/", "link": "http://arxiv.org/abs/2604.04690v1", "date": "2026-04-06", "relevancy": 2.2034, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5617}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarit sp%20success%20and%20robust%20performance%20over%2030-minute%20runs%20on%20densely%20filled%20euroboxes.%20Ablation%20studies%20demonstrate%20the%20benefits%20of%20enhanced%20depth%20estimation%20and%20of%20the%20pose%20buffer%20for%20long-term%20stability%20and%20throughput%20in%20realistic%20industrial%20conditions.%20Videos%20are%20available%20at%20https%3A//mesh-iit.github.io/project-jl2-camozzi/%0ALink%3A%20http%3A//arxiv.org/abs/2604.04690v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPickalo%253A%2520Leveraging%25206D%2520Pose%2520Estimation%2520for%2520Low-Cost%2520Industrial%2520Bin%2520Picking%26entry.906535625%3DAlessandro%2520Tarsi%2520and%2520Matteo%2520Mastrogiuseppe%2520and%2520Saverio%2520Taliani%2520and%2520Simone%2520Cortinovis%2520and%2520Ugo%2520Pattacini%26entry.1292438233%3DBin%2520picking%2520in%2520real%2520industrial%2520environments%2520remains%2520challenging%2520due%2520to%2520severe%2520clutter%252C%2520occlusions%252C%2520and%2520the%2520high%2520cost%2520of%2520traditional%25203D%2520sensing%2520setups.%2520We%2520present%2520Pickalo%252C%2520a%2520modular%25206D%2520pose-based%2520bin-picking%2520pipeline%2520built%2520entirely%2520on%2520low-cost%2520hardware.%2520A%2520wrist-mounted%2520RGB-D%2520camera%2520actively%2520explores%2520the%2520scene%2520from%2520multiple%2520viewpoints%252C%2520while%2520raw%2520stereo%2520streams%2520are%2520processed%2520with%2520BridgeDepth%2520to%2520obtain%2520refined%2520depth%2520maps%2520suitable%2520for%2520accurate%2520collision%2520reasoning.%2520Object%2520instances%2520are%2520segmented%2520with%2520a%2520Mask-RCNN%2520model%2520trained%2520purely%2520on%2520photorealistic%2520synthetic%2520data%2520and%2520localized%2520using%2520the%2520zero-shot%2520SAM-6D%2520pose%2520estimator.%2520A%2520pose%2520buffer%2520module%2520fuses%2520multi-view%2520observations%2520over%2520time%252C%2520handling%2520 {"title": "Fully Procedural Synthetic Data from Simple Rules for Multi-View Stereo", "author": "Zeyu Ma and Alexander Raistrick and Jia Deng", "abstract": "In this paper, we explore the design space of procedural rules for multi-view stereo (MVS). We demonstrate that we can generate effective training data using SimpleProc: a new, fully procedural generator driven by a very small set of rules using Non-Uniform Rational Basis Splines (NURBS), as well as basic displacement and texture patterns. At a modest scale of 8,000 images, our approach achieves superior results compared to manually curated images (at the same scale) sourced from games and real-world objects. When scaled to 352,000 images, our method yields performance comparable to--and in several benchmarks, exceeding--models trained on over 692,000 manually curated images. The source code and the data are available at https://github.com/princeton-vl/SimpleProc.", "link": "http://arxiv.org/abs/2604.04925v1", "date": "2026-04-06", "relevancy": 2.1936, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5505}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.548}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.548}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Fully%20Procedural%20Synthetic%20Data%20from%20Simple%20Rules%20for%20Multi-View%20Stereo&body=Title%3A%20Fully%20Procedural%20Synthetic%20Data%20from%20Simple%20Rules%20for%20Multi-View%20Stereo%0AAuthor%3A%20Zeyu%20Ma%20and%20Alexander%20Raistrick%20and%20Jia%20Deng%0AAbstract%3A%20In%20this%20paper%2C%20we%20explore%20the%20design%20space%20of%20procedural%20rules%20for%20multi-view%20stereo%20%28MVS%29.%20We%20demonstrate%20that%20we%20can%20generate%20effective%20training%20data%20using%20SimpleProc%3A%20a%20new%2C%20fully%20procedural%20generator%20driven%20by%20a%20very%20small%20set%20of%20rules%20using%20Non-Uniform%20Rational%20Basis%20Splines%20%28NURBS%29%2C%20as%20well%20as%20basic%20displacement%20and%20texture%20patterns.%20At%20a%20modest%20scale%20of%208%2C000%20images%2C%20our%20approach%20achieves%20superior%20results%20compared%20to%20manually%20curated%20images%20%28at%20the%20same%20scale%29%20sourced%20from%20games%20and%20real-world%20objects.%20When%20scaled%20to%20352%2C000%20images%2C%20our%20method%20yields%20performance%20comparable%20to--and%20in%20several%20benchmarks%2C%20exceeding--models%20trained%20on%20over%20692%2C000%20manually%20curated%20images.%20The%20source%20code%20and%20the%20data%20are%20available%20at%20https%3A//github.com/princeton-vl/SimpleProc.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04925v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFully%2520Procedural%2520Synthetic%2520Data%2520from%2520Simple%2520Rules%2520for%2520Multi-View%2520Stereo%26entry.906535625%3DZeyu%2520Ma%2520and%2520Alexander%2520Raistrick%2520and%2520Jia%2520Deng%26entry.1292438233%3DIn%2520this%2520paper%252C%2520we%2520explore%2520the%2520design%2520space%2520of%2520procedural%2520rules%2520for%2520multi-view%2520stereo%2520%2528MVS%2529.%2520We%2520demonstrate%2520that%2520we%2520can%2520generate%2520effective%2520training%2520data%2520using%2520SimpleProc%253A%2520a%2520new%252C%2520fully%2520procedural%2520generator%2520driven%2520by%2520a%2520very%2520small%2520set%2520of%2520rules%2520using%2520Non-Uniform%2520Rational%2520Basis%2520Splines%2520%2528NURBS%2529%252C%2520as%2520well%2520as%2520basic%2520displacement%2520and%2520texture%2520patterns.%2520At%2520a%2520modest%2520scale%2520of%25208%252C000%2520images%252C%2520our%2520approach%2520achieves%2520superior%2520results%2520compared%2520to%2520manually%2520curated%2520images%2520%2528at%2520the%2520same%2520scale%2529%2520sourced%2520from%2520games%2520and%2520real-world%2520objects.%2520When%2520scaled%2520to%2520352%252C000%2520images%252C%2520our%2520method%2520yields%2520performance%2520comparable%2520to--and%2520in%2520several%2520benchmarks%252C%2520exceeding--models%2520trained%2520on%2520over%2520692%252C000%2520manually%2520curated%2520images.%2520The%2520source%2520code%2520and%2520the%2520data%2520are%2520available%2520at%2520https%253A//github.com/princeton-vl/SimpleProc.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.04925v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Fully%20Procedural%20Synthetic%20Data%20from%20Simple%20Rules%20for%20Multi-View%20Stereo&entry.906535625=Zeyu%20Ma%20and%20Alexander%20Raistrick%20and%20Jia%20Deng&entry.1292438233=In%20this%20paper%2C%20we%20explore%20the%20design%20space%20of%20procedural%20rules%20for%20multi-view%20stereo%20%28MVS%29.%20We%20demonstrate%20that%20we%20can%20generate%20effective%20training%20data%20using%20SimpleProc%3A%20a%20new%2C%20fully%20procedural%20generator%20driven%20by%20a%20very%20small%20set%20of%20rules%20using%20Non-Uniform%20Rational%20Basis%20Splines%20%28NURBS%29%2C%20as%20well%20as%20basic%20displacement%20and%20texture%20patterns.%20At%20a%20modest%20scale%20of%208%2C000%20images%2C%20our%20approach%20achieves%20superior%20results%20compared%20to%20manually%20curated%20images%20%28at%20the%20same%20scale%29%20sourced%20from%20games%20and%20real-world%20objects.%20When%20scaled%20to%20352%2C000%20images%2C%20our%20method%20yields%20performance%20comparable%20to--and%20in%20several%20benchmarks%2C%20exceeding--models%20trained%20on%20over%20692%2C000%20manually%20curated%20images.%20The%20source%20code%20and%20the%20data%20are%20available%20at%20https%3A//github.com/princeton-vl/SimpleProc.&entry.1838667208=http%3A//arxiv.org/abs/2604.04925v1&entry.124074799=Read"},
{"title": "DIRECT: Video Mashup Creation via Hierarchical Multi-Agent Planning and Intent-Guided Editing", "author": "Ke Li and Maoliang Li and Jialiang Chen and Jiayu Chen and Zihao Zheng and Shaoqi Wang and Xiang Chen", "abstract": "Video mashup creation represents a complex video editing paradigm that recomposes existing footage to craft engaging audio-visual experiences, demanding intricate orchestration across semantic, visual, and auditory dimensions and multiple levels. However, existing automated editing frameworks often overlook the cross-level multimodal orchestration to achieve professional-grade fluidity, resulting in disjointed sequences with abrupt visual transitions and musical misalignment. To address this, we formulate video mashup creation as a Multimodal Coherency Satisfaction Problem (MMCSP) and propose the DIRECT framework. Simulating a professional production pipeline, our hierarchical multi-agent framework decomposes the challenge into three cascade levels: the Screenwriter for source-aware global structural anchoring, the Director for instantiating adaptive editing intent and guidance, and the Editor for intent-guided shot sequence editing with fine-grained optimization. We further introduce Mashup-Bench, a comprehensive benchmark with tailored metrics for visual continuity and auditory alignment. Extensive experiments demonstrate that DIRECT significantly outperforms state-of-the-art baselines in both objective metrics and human subjective evaluation. Project page and code: https://github.com/AK-DREAM/DIRECT", "link": "http://arxiv.org/abs/2604.04875v1", "date": "2026-04-06", "relevancy": 2.1936, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5589}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5474}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5452}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DIRECT%3A%20Video%20Mashup%20Creation%20via%20Hierarchical%20Multi-Agent%20Planning%20and%20Intent-Guided%20Editing&body=Title%3A%20DIRECT%3A%20Video%20Mashup%20Creation%20via%20Hierarchical%20Multi-Agent%20Planning%20and%20Intent-Guided%20Editing%0AAuthor%3A%20Ke%20Li%20and%20Maoliang%20Li%20and%20Jialiang%20Chen%20and%20Jiayu%20Chen%20and%20Zihao%20Zheng%20and%20Shaoqi%20Wang%20and%20Xiang%20Chen%0AAbstract%3A%20Video%20mashup%20creation%20represents%20a%20complex%20video%20editing%20paradigm%20that%20recomposes%20existing%20footage%20to%20craft%20engaging%20audio-visual%20experiences%2C%20demanding%20intricate%20orchestration%20across%20semantic%2C%20visual%2C%20and%20auditory%20dimensions%20and%20multiple%20levels.%20However%2C%20existing%20automated%20editing%20frameworks%20often%20overlook%20the%20cross-level%20multimodal%20orchestration%20to%20achieve%20professional-grade%20fluidity%2C%20resulting%20in%20disjointed%20sequences%20with%20abrupt%20visual%20transitions%20and%20musical%20misalignment.%20To%20address%20this%2C%20we%20formulate%20video%20mashup%20creation%20as%20a%20Multimodal%20Coherency%20Satisfaction%20Problem%20%28MMCSP%29%20and%20propose%20the%20DIRECT%20framework.%20Simulating%20a%20professional%20production%20pipeline%2C%20our%20hierarchical%20multi-agent%20framework%20decomposes%20the%20challenge%20into%20three%20cascade%20levels%3A%20the%20Screenwriter%20for%20source-aware%20global%20structural%20anchoring%2C%20the%20Director%20for%20instantiating%20adaptive%20editing%20intent%20and%20guidance%2C%20and%20the%20Editor%20for%20intent-guided%20shot%20sequence%20editing%20with%20fine-grained%20optimization.%20We%20further%20introduce%20Mashup-Bench%2C%20a%20comprehensive%20benchmark%20with%20tailored%20metrics%20for%20visual%20continuity%20and%20auditory%20alignment.%20Extensive%20experiments%20demonstrate%20that%20DIRECT%20significantly%20outperforms%20state-of-the-art%20baselines%20in%20both%20objective%20metrics%20and%20human%20subjective%20evaluation.%20Project%20page%20and%20code%3A%20https%3A//github.com/AK-DREAM/DIRECT%0ALink%3A%20http%3A//arxiv.org/abs/2604.04875v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDIRECT%253A%2520Video%2520Mashup%2520Creation%2520via%2520Hierarchical%2520Multi-Agent%2520Planning%2520and%2520Intent-Guided%2520Editing%26entry.906535625%3DKe%2520Li%2520and%2520Maoliang%2520Li%2520and%2520Jialiang%2520Chen%2520and%2520Jiayu%2520Chen%2520and%2520Zihao%2520Zheng%2520and%2520Shaoqi%2520Wang%2520and%2520Xiang%2520Chen%26entry.1292438233%3DVideo%2520mashup%2520creation%2520represents%2520a%2520complex%2520video%2520editing%2520paradigm%2520that%2520recomposes%2520existing%2520footage%2520to%2520craft%2520engaging%2520audio-visual%2520experiences%252C%2520demanding%2520intricate%2520orchestration%2520across%2520semantic%252C%2520visual%252C%2520and%2520auditory%2520dimensions%2520and%2520multiple%2520levels.%2520However%252C%2520existing%2520automated%2520editing%2520frameworks%2520often%2520overlook%2520the%2520cross-level%2520multimodal%2520orchestration%2520to%2520achieve%2520professional-grade%2520fluidity%252C%2520resulting%2520in%2520disjointed%2520sequences%2520with%2520abrupt%2520visual%2520transitions%2520and%2520musical%2520misalignment.%2520To%2520address%2520this%252C%2520we%2520formulate%2520video%2520mashup%2520creation%2520as%2520a%2520Multimodal%2520Coherency%2520Satisfaction%2520Problem%2520%2528MMCSP%2529%2520and%2520propose%2520the%2520DIRECT%2520framework.%2520Simulating%2520a%2520professional%2520production%2520pipeline%252C%2520our%2520hierarchical%2520multi-agent%2520framework%2520decomposes%2520the%2520challenge%2520into%2520three%2520cascade%2520levels%253A%2520the%2520Screenwriter%2520for%2520source-aware%2520global%2520structural%2520anchoring%252C%2520the%2520Director%2520for%2520instantiating%2520adaptive%2520editing%2520intent%2520and%2520guidance%252C%2520and%2520the%2520Editor%2520for%2520intent-guided%2520shot%2520sequence%2520editing%2520with%2520fine-grained%2520optimization.%2520We%2520further%2520introduce%2520Mashup-Bench%252C%2520a%2520comprehensive%2520benchmark%2520with%2520tailored%2520metrics%2520for%2520visual%2520continuity%2520and%2520auditory%2520alignment.%2520Extensive%2520experiments%2520demonstrate%2520that%2520DIRECT%2520significantly%2520outperforms%2520state-of-the-art%2520baselines%2520in%2520both%2520objective%2520metrics%2520and%2520human%2520subjective%2520evaluation.%2520Project%2520page%2520and%2520code%253A%2520https%253A//github.com/AK-DREAM/DIRECT%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.04875v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=DIRECT%3A%20Video%20Mashup%20Creation%20via%20Hierarchical%20Multi-Agent%20Planning%20and%20Intent-Guided%20Editing&entry.906535625=Ke%20Li%20and%20Maoliang%20Li%20and%20Jialiang%20Chen%20and%20Jiayu%20Chen%20and%20Zihao%20Zheng%20and%20Shaoqi%20Wang%20and%20Xiang%20Chen&entry.1292438233=Video%20mashup%20creation%20represents%20a%20complex%20video%20editing%20paradigm%20that%20recomposes%20existing%20footage%20to%20craft%20engaging%20audio-visual%20experiences%2C%20demanding%20intricate%20orchestration%20across%20semantic%2C%20visual%2C%20and%20auditory%20dimensions%20and%20multiple%20levels.%20However%2C%20existing%20automated%20editing%20frameworks%20often%20overlook%20the%20cross-level%20multimodal%20orchestration%20to%20achieve%20professional-grade%20fluidity%2C%20resulting%20in%20disjointed%20sequences%20with%20abrupt%20visual%20transitions%20and%20musical%20misalignment.%20To%20address%20this%2C%20we%20formulate%20video%20mashup%20creation%20as%20a%20Multimodal%20Coherency%20Satisf {"title": "SkillX: Automatically Constructing Skill Knowledge Bases for Agents", "author": "Chenxi Wang and Zhuoyun Yu and Xin Xie and Wuguannan Yao and Runnan Fang and Shuofei Qiao and Kexin Cao and Guozhou Zheng and Xiang Qi and Peng Zhang and Shumin Deng", "abstract": "Learning from experience is critical for building capable large language model (LLM) agents, yet prevailing self-evolving paradigms remain inefficient: agents learn in isolation, repeatedly rediscover similar behaviors from limited experience, resulting in redundant exploration and poor generalization. To address this problem, we propose SkillX, a fully automated framework for constructing a \\textbf{plug-and-play skill knowledge base} that can be reused across agents and environments. SkillX operates through a fully automated pipeline built on three synergistic innovations: \\textit{(i) Multi-Level Skills Design}, which distills raw trajectories into three-tiered hierarchy of strategic plans, functional skills, and atomic skills; \\textit{(ii) Iterative Skills Refinement}, which automatically revises skills based on execution feedback to continuously improve library quality; and \\textit{(iii) Exploratory Skills Expansion}, which proactively generates and validates novel skills to expand coverage beyond seed training data. Using a strong backbone agent (GLM-4.6), we automatically build a reusable skill library and evaluate its transferability on challenging long-horizon, user-interactive benchmarks, including AppWorld, BFCL-v3, and $\u03c4^2$-Bench. Experiments show that SkillKB consistently improves task success and execution efficiency when plugged into weaker base agents, highlighting the importance of structured, hierarchical experience representations for generalizable agent learning. Our code will be publicly available soon at https://github.com/zjunlp/SkillX.", "link": "http://arxiv.org/abs/2604.04804v1", "date": "2026-04-06", "relevancy": 2.1919, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5634}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5624}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5274}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SkillX%3A%20Automatically%20Constructing%20Skill%20Knowledge%20Bases%20for%20Agents&body=Title%3A%20SkillX%3A%20Automatically%20Constructing%20Skill%20Knowledge%20Bases%20for%20Agents%0AAuthor%3A%20Chenxi%20Wang%20and%20Zhuoyun%20Yu%20and%20Xin%20Xie%20and%20Wuguannan%20Yao%20and%20Runnan%20Fang%20and%20Shuofei%20Qiao%20and%20Kexin%20Cao%20and%20Guozhou%20Zheng%20and%20Xiang%20Qi%20and%20Peng%20Zhang%20and%20Shumin%20Deng%0AAbstract%3A%20Learning%20from%20experience%20is%20critical%20for%20building%20capable%20large%20language%20model%20%28LLM%29%20agents%2C%20yet%20prevailing%20self-evolving%20paradigms%20remain%20inefficient%3A%20agents%20learn%20in%20isolation%2C%20repeatedly%20rediscover%20similar%20behaviors%20from%20limited%20experience%2C%20resulting%20in%20redundant%20exploration%20and%20poor%20generalization.%20To%20address%20this%20problem%2C%20we%20propose%20SkillX%2C%20a%20fully%20automated%20framework%20for%20constructing%20a%20%5Ctextbf%7Bplug-and-play%20skill%20knowledge%20base%7D%20that%20can%20be%20reused%20across%20agents%20and%20environments.%20SkillX%20operates%20through%20a%20fully%20automated%20pipeline%20built%20on%20three%20synergistic%20innovations%3A%20%5Ctextit%7B%28i%29%20Multi-Level%20Skills%20Design%7D%2C%20which%20distills%20raw%20trajectories%20into%20three-tiered%20hierarchy%20of%20strategic%20plans%2C%20functional%20skills%2C%20and%20atomic%20skills%3B%20%5Ctextit%7B%28ii%29%20Iterative%20Skills%20Refinement%7D%2C%20which%20automatically%20revises%20skills%20bas {"title": "OpenWorldLib: A Unified Codebase and Definition of Advanced World Models", "author": " DataFlow Team and Bohan Zeng and Daili Hua and Kaixin Zhu and Yifan Dai and Bozhou Li and Yuran Wang and Chengzhuo Tong and Yifan Yang and Mingkun Chang and Jianbin Zhao and Zhou Liu and Hao Liang and Xiaochen Ma and Ruichuan An and Junbo Niu and Zimo Meng and Tianyi Bai and Meiyi Qiang and Huanyao Zhang and Zhiyou Xiao and Tianyu Guo and Qinhan Yu and Runhao Zhao and Zhengpin Li and Xinyi Huang and Yisheng Pan and Yiwen Tang and Yang Shi and Yue Ding and Xinlong Chen and Hongcheng Gao and Minglei Shi and Jialong Wu and Zekun Wang and Yuanxing Zhang and Xintao Wang and Pengfei Wan and Yiren Song and Mike Zheng Shou and Wentao Zhang", "abstract": "World models have garnered significant attention as a promising research direction in artificial intelligence, yet a clear and unified definition remains lacking. In this paper, we introduce OpenWorldLib, a comprehensive and standardized inference framework for Advanced World Models. Drawing on the evolution of world models, we propose a clear definition: a world model is a model or framework centered on perception, equipped with interaction and long-term memory capabilities, for understanding and predicting the complex world. We further systematically categorize the essential capabilities of world models. Based on this definition, OpenWorldLib integrates models across different tasks within a unified framework, enabling efficient reuse and collaborative inference. Finally, we present additional reflections and analyses on potential future directions for world model research. Code link: https://github.com/OpenDCAI/OpenWorldLib", "link": "http://arxiv.org/abs/2604.04707v1", "date": "2026-04-06", "relevancy": 2.1822, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5521}, {"title": "Lexicon3D: Probing Visual Foundat {"title": "Rethinking Model Efficiency: Multi-Agent Inference with Large Models", "author": "Sixun Dong and Juhua Hu and Steven Li and Wei Wen and Qi Qian", "abstract": "Most vision-language models (VLMs) apply a large language model (LLM) as the decoder, where the response tokens are generated sequentially through autoregression. Therefore, the number of output tokens can be the bottleneck of the end-to-end latency. However, different models may require vastly different numbers of output tokens to achieve comparable performance. In this work, we conduct a comprehensive analysis of the latency across different components of VLMs on simulated data. The experiment shows that a large model with fewer output tokens can be more efficient than a small model with a long output sequence. The empirical study on diverse real-world benchmarks confirms the observation that a large model can achieve better or comparable performance as a small model with significantly fewer output tokens. To leverage the efficiency of large models, we propose a multi-agent inference framework that keeps large models with short responses but transfers the key reasoning tokens from the small model when necessary. The comparison on benchmark tasks demonstrates that by reusing the reasoning tokens from small models, it can help approach the performance of a large model with its own reasoning, which confirms the effectiveness of our proposal.", "link": "http://arxiv.org/abs/2604.04929v1", "date": "2026-04-06", "relevancy": 2.1794, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5471}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5471}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0 {"title": "NASTaR: NovaSAR Automated Ship Target Recognition Dataset", "author": "Benyamin Hosseiny and Kamirul Kamirul and Odysseas Pappas and Alin Achim", "abstract": "Synthetic Aperture Radar (SAR) offers a unique capability for all-weather, space-based maritime activity monitoring by capturing and imaging strong reflections from ships at sea. A well-defined challenge in this domain is ship type classification. Due to the high diversity and complexity of ship types, accurate recognition is difficult and typically requires specialized deep learning models. These models, however, depend on large, high-quality ground-truth datasets to achieve robust performance and generalization. Furthermore, the growing variety of SAR satellites operating at different frequencies and spatial resolutions has amplified the need for more annotated datasets to enhance model accuracy. To address this, we present the NovaSAR Automated Ship Target Recognition (NASTaR) dataset. This dataset comprises of 3415 ship patches extracted from NovaSAR S-band imagery, with labels matched to AIS data. It includes distinctive features such as 23 unique classes, inshore/offshore separation, and an auxiliary wake dataset for patches where ship wakes are visible. We validated the dataset applicability across prominent ship-type classification scenarios using benchmark deep learning models. Results demonstrate over 60% accuracy for classifying four major ship types, over 70% for a three-class scenario, more than 75% for distinguishing cargo from tanker ships, and over 87% for identifying fishing vessels. The NASTaR dataset is available at https://doi.org/10.5523/bris.2tfa6x37oerz2lyiw6hp47058, while relevant codes for benchmarking and analysis are available at https://github.com/benyaminhosseiny/nastar.", "link": "http://arxiv.org/abs/2512.18503v3", "date": "2026-04-06", "relevancy": 2.177, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4689}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4194}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.418}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NASTaR%3A%20NovaSAR%20Automated%20Ship%20Target%20Recognition%20Dataset&body=Title%3A%20NASTaR%3A%20NovaSAR%20Automated%20Ship%20Target%20Recognition%20Dataset%0AAuthor%3A%20Benyamin%20Hosseiny%20and%20Kamirul%20Kamirul%20and%20Odysseas%20Pappas%20and%20Alin%20Achim%0AAbstract%3A%20Synthetic%20Aperture%20Radar%20%28SAR%29%20offers%20a%20unique%20capability%20for%20all-weather%2C%20space-based%20maritime%20activity%20monitoring%20by%20capturing%20and%20imaging%20strong%20reflections%20from%20ships%20at%20sea.%20A%20well-defined%20challenge%20in%20this%20domain%20is%20ship%20type%20classification.%20Due%20to%20the%20high%20diversity%20and%20complexity%20of%20ship%20types%2C%20accurate%20recognition%20is%20difficult%20and%20typically%20requires%20specialized%20deep%20learning%20models.%20These%20models%2C%20however%2C%20depend%20on%20large%2C%20high-quality%20ground-truth%20datasets%20to%20achieve%20robust%20performance%20and%20generalization.%20Furthermore%2C%20the%20growing%20variety%20of%20SAR%20satellites%20operating%20at%20different%20frequencies%20and%20spatial%20resolutions%20has%20amplified%20the%20need%20for%20more%20annotated%20datasets%20to%20enhance%20model%20accuracy.%20To%20address%20this%2C%20we%20present%20the%20NovaSAR%20Automated%20Ship%20Target%20Recognition%20%28NASTaR%29%20dataset.%20This%20dataset%20comprises%20of%203415%20ship%20patches%20extracted%20from%20NovaSAR%20S-band%20imagery%2C%20with%20labels%20matched%20to%20AIS%20data.%20It%20includes%20distinctive%20features%20such%20as%2023%20unique%20classes%2C%20inshore/offshore%20separation%2C%20and%20an%20auxiliary%20wake%20dataset%20for%20patches%20where%20ship%20wakes%20are%20visible.%20We%20validated%20the%20dataset%20applicability%20across%20prominent%20ship-type%20classification%20scenarios%20using%20benchmark%20deep%20learning%20models.%20Results%20demonstrate%20over%2060%25%20accuracy%20for%20classifying%20four%20major%20ship%20types%2C%20over%2070%25%20for%20a%20three-class%20scenario%2C%20more%20than%2075%25%20for%20distinguishing%20cargo%20from%20tanker%20ships%2C%20and%20over%2087%25%20for%20identifying%20fishing%20vessels.%20The%20NASTaR%20dataset%20is%20available%20at%20https%3A//doi.org/10.5523/bris.2tfa6x37oerz2lyiw6hp47058%2C%20while%20relevant%20codes%20for%20benchmarking%20and%20analysis%20are%20available%20at%20https%3A//github.com/benyaminhosseiny/nastar.%0ALink%3A%20http%3A//arxiv.org/abs/2512.18503v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNASTaR%253A%2520NovaSAR%2520Automated%2520Ship%2520Target%2520Recognition%2520Dataset%26entry.906535625%3DBenyamin%2520Hosseiny%2520and%2520Kamirul%2520Kamirul%2520and%2520Odysseas%2520Pappas%2520and%2520Alin%2520Achim%26entry.1292438233%3DSynthetic%2520Aperture%2520Radar%2520%2528SAR%2529%2520offers%2520a%2520unique%2520capability%2520for%2520all-weather%252C%2520space-based%2520maritime%2520activity%2520monitoring%2520by%2520capturing%2520and%2520imaging%2520strong%2520reflections%2520from%2520ships%2520at%2520sea.%2520A%2520well-defined%2520challenge%2520in%2520this%2520domain%2520is%2520ship%2520type%2520classification.%2520Due%2520to%2520the%2520high%2520diversity%2520and%2520complexity%2520of%2520ship%2520types%252C%2520accurate%2520recognition%2520is%2520difficult%2520and%2520typically%2520requires%2520specialized%2520deep%2520learning%2520models.%2520These%2520models%252C%2520however%252C%2520depend%2520on%2520large%252C%2520high-quality%2520ground-truth%252 {"title": "LLMs Encode Their Failures: Predicting Success from Pre-Generation Activations", "author": "William Lugoloobi and Thomas Foster and William Bankes and Chris Russell", "abstract": "Running LLMs with extended reasoning on every problem is expensive, but determining which inputs actually require additional compute remains challenging. We investigate whether their own likelihood of success is recoverable from their internal representations before generation, and if this signal can guide more efficient inference. We train linear probes on pre-generation activations to predict policy-specific success on math and coding tasks, substantially outperforming surface features such as question length and TF-IDF. Using E2H-AMC, which provides both human and model performance on identical problems, we show that models encode a model-specific notion of difficulty that is distinct from human difficulty, and that this distinction increases with extended reasoning. Leveraging these probes, we demonstrate that routing queries across a pool of models can exceed the best-performing model whilst reducing inference cost by up to 70\\% on MATH, showing that internal representations enable practical efficiency gains even when they diverge from human intuitions about difficulty. Our code is available at: https://github.com/KabakaWilliam/llms_know_difficulty", "link": "http://arxiv.org/abs/2602.09924v3", "date": "2026-04-06", "relevancy": 2.1529, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.547}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.547}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4943}], "mailto": "mailto:haoxi hey%2520diverge%2520from%2520human%2520intuitions%2520about%2520difficulty.%2520Our%2520code%2520is%2520available%2520at%253A%2520https%253A//github.com/KabakaWilliam/llms_know_difficulty%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.09924v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=LLMs%20Encode%20Their%20Failures%3A%20Predicting%20Success%20from%20Pre-Generation%20Activations&entry.906535625=William%20Lugoloobi%20and%20Thomas%20Foster%20and%20William%20Bankes%20and%20Chris%20Russell&entry.1292438233=Running%20LLMs%20with%20extended%20reasoning%20on%20every%20problem%20is%20expensive%2C%20but%20determining%20which%20inputs%20actually%20require%20additional%20compute%20remains%20challenging.%20We%20investigate%20whether%20their%20own%20likelihood%20of%20success%20is%20recoverable%20from%20their%20internal%20representations%20before%20generation%2C%20and%20if%20this%20signal%20can%20guide%20more%20efficient%20inference.%20We%20train%20linear%20probes%20on%20pre-generation%20activations%20to%20predict%20policy-specific%20success%20on%20math%20and%20coding%20tasks%2C%20substantially%20outperforming%20surface%20features%20such%20as%20question%20length%20and%20TF-IDF.%20Using%20E2H-AMC%2C%20which%20provides%20both%20human%20and%20model%20performance%20on%20identical%20problems%2C%20we%20show%20that%20models%20encode%20a%20model-specific%20notion%20of%20difficulty%20that%20is%20distinct%20from%20human%20difficulty%2C%20and%20that%20this%20distinction%20increases%20with%20extended%20reasoning.%20Leveraging%20these%20probes%2C%20we%20demonstrate%20that%20routing%20queries%20across%20a%20pool%20of%20models%20can%20exceed%20the%20best-performing%20model%20whilst%20reducing%20inference%20cost%20by%20up%20to%2070%5C%25%20on%20MATH%2C%20showing%20that%20internal%20representations%20enable%20practical%20efficiency%20gains%20even%20when%20they%20diverge%20from%20human%20intuitions%20about%20difficulty.%20Our%20code%20is%20available%20at%3A%20https%3A//github.com/KabakaWilliam/llms_know_difficulty&entry.1838667208=http%3A//arxiv.org/abs/2602.09924v3&entry.124074799=Read"},
{"title": "General Geospatial Inference with a Population Dynamics Foundation Model", "author": "Mohit Agarwal and Mimi Sun and Chaitanya Kamath and Arbaaz Muslim and Prithul Sarker and Joydeep Paul and Hector Yee and Marcin Sieniek and Kim Jablonski and Swapnil Vispute and Atul Kumar and Yael Mayer and David Fork and Sheila de Guia and Jamie McPike and Adam Boulanger and Tomer Shekel and David Schottlander and Yao Xiao and Manjit Chakravarthy Manukonda and Yun Liu and Neslihan Bulut and Sami Abu-el-haija and Bryan Perozzi and Monica Bharel and Von Nguyen and Luke Barrington and Niv Efron and Yossi Matias and Greg Corrado and Krish Eswaran and Shruthi Prabhakara and Shravya Shetty and Gautam Prasad", "abstract": "Supporting the health and well-being of dynamic populations around the world requires governmental agencies, organizations and researchers to understand and reason over complex relationships between human behavior and local contexts in order to identify high-risk groups and strategically allocate limited resources. Traditional approaches to these classes of problems often entail developing manually curated, task-specific features and models to represent human behavior and the natural and built environment, which can be challenging to adapt to new, or even, related tasks. To address this, we introduce a Population Dynamics Foundation Model (PDFM) that aims to capture the relationships between diverse data modalities and is applicable to a broad range of geospatial tasks. We first construct a geo-indexed dataset for postal codes and counties across the United States, capturing rich aggregated information on human behavior from maps, busyness, and aggregated search trends, and environmental factors such as weather and air quality. We then model this data and the complex relationships between locations using a graph neural network, producing embeddings that can be adapted to a wide range of downstream tasks using relatively simple models. We evaluate the effectiveness of our approach by benchmarking it on 27 downstream tasks spanning three distinct domains: health indicators, socioeconomic factors, and environmental measurements. The approach achieves state-of-the-art performance on all 27 geospatial interpolation tasks, and on 25 out of the 27 extrapolation and super-resolution tasks. We combined the PDFM with a state-of-the-art forecasting foundation model, TimesFM, to predict unemployment and poverty, achieving performance that surpasses fully supervised forecasting. The full set of embeddings and sample code are publicly available for researchers.", "link": "http://arxiv.org/abs/2411.07207v6", "date": "2026-04-06", "relevancy": 2.1423, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.561}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5414}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5195}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20General%20Geospatial%20Inference%20with%20a%20Population%20Dynamics%20Foundation%20Model&body=Title%3A%20General%20Geospatial%20Inference%20with%20a%20Population%20Dynamics%20Foundation%20Model%0AAuthor%3A%20Mohit%20Agarwal%20and%20Mimi%20Sun%20and%20Chaitanya%20Kamath%20and%20Arbaaz%20Muslim%20and%20Prithul%20Sarker%20and%20Joydeep%20Paul%20and%20Hector%20Yee%20and%20Marcin%20Sieniek%20and%20Kim%20Jablonski%20and%20Swapnil%20Vispute%20and%20Atul%20Kumar%20and%20Yael%20Mayer%20and%20David%20Fork%20and%20Sheila%20de%20Guia%20and%20Jamie%20McPike%20and%20Adam%20Boulanger%20and%20Tomer%20Shekel%20and%20David%20Schottlander%20and%20Yao%20Xiao%20and%20Manjit%20Chakravarthy%20Manukonda%20and%20Yun%20Liu%20and%20Neslihan%20Bulut%20and%20Sami%20Ab {"title": "Three-dimensional inversion of gravity data using implicit neural representations and scientific machine learning", "author": "Pankaj K Mishra and Sanni Laaksonen and Jochen Kamm and Anand Singh", "abstract": "Inversion of gravity data is an important method for investigating subsurface density variations relevant to mineral exploration, geothermal assessment, carbon storage, natural hydrogen, groundwater resources, and tectonic evolution. Here we present a scientific machine-learning approach for three-dimensional gravity inversion that represents subsurface density as a continuous field using an implicit neural representation (INR). The method trains a deep neural network directly through a physics-based forward-model loss, mapping spatial coordinates to a continuous density field without predefined meshes or discretisation. Spatial encoding enhances the network's capacity to capture sharp contrasts and short-wavelength features that conventional coordinate-based networks tend to oversmooth due to spectral bias. We demonstrate the approach on synthetic examples including smooth models, representing realistic geological complexity, and a dipping block model to assess recovery of structures at different depths. The INR framework reconstructs detailed structure and geologically plausible boundaries without explicit regularisation or depth weighting, while reducing the number of inversion parameters as the problem size grows bigger. These results highlight the potential of implicit representations to enable scalable, flexible, and interpretable large-scale geophysical inversion. This framework could generalise to other geophysical methods and for joint/multiphysics inversion.", "link": "http://arxiv.org/abs/2510.17876v2", "date": "2026-04-06", "relevancy": 2.1418, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5386}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5375}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5225}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Three-dimensional%20inversion%20of%20gravity%20data%20using%20implicit%20neural%20representations%20and%20scientific%20machine%20learning&body=Title%3A%20Three-dimensional%20inversion%20of%20gravity%20data%20using%20implicit%20neural%20representations%20and%20scientific%20machine%20learning%0AAuthor%3A%20Pankaj%20K%20Mishra%20and%20Sanni%20Laaksonen%20and%20Jochen%20Kamm%20and%20Anand%20Singh%0AAbstract%3A%20Inversion%20of%20gravity%20data%20is%20an%20important%20method%20for%20investigating%20subsurface%20density%20variations%20relevant%20to%20mineral%20exploration%2C%20geothermal%20assessment%2C%20carbon%20storage%2C%20natural%20hydrogen%2C%20groundwater%20resources%2C%20and%20tectonic%20evolution.%20Here%20we%20present%20a%20scientific%20machine-learning%20approach%20for%20three-dimensional%20gravity%20inversion%20that%20represents%20subsurface%20density%20as%20a%20continuous%20field%20using%20an%20implicit%20neural%20representation%20%28INR%29.%20The%20method%20trains%20a%20deep%20neural%20network%20directly%20through%20a%20physics-based%20forward-model%20loss%2C%20mapping%20spatial%20coordinates%20to%20a%20continuous%20density%20field%20without%20predefined%20meshes%20or%20discretisation.%20Spatial%20encoding%20enhances%20the%20network%27s%20capacity%20to%20capture%20sharp%20contrasts%20and%20short-wavelength%20features%20that%20conventional%20coordinate-based%20networks%20tend%20to%20oversmooth%20due%20to%20spectral%20bias.%20We%20demonstrate%20the%20approach%20on%20synthetic%20examples%20including%20smooth%20models%2C%20representing%20realistic%20geological%20complexity%2C%20and%20a%20dipping%20block%20model%20to%20assess%20recovery%20of%20structures%20at%20different%20depths.%20The%20INR%20framework%20reconstructs%20detailed%20structure%20and%20geologically%20plausible%20boundaries%20without%20explicit%20regularisation%20or%20depth%20weighting%2C%20while%20reducing%20the%20number%20of%20inversion%20parameters%20as%20the%20problem%20size%20grows%20bigger.%20These%20results%20highlight%20the%20potential%20of%20implicit%20representations%20to%20enable%20scalable%2C%20flexible%2C%20and%20interpretable%20large-scale%20geophysical%20inversion.%20This%20framework%20could%20generalise%20to%20other%20geophysical%20methods%20and%20for%20joint/multiphysics%20inversion.%0ALink%3A%20http%3A//arxiv.org/abs/2510.17876v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThree-dimensional%2520inversion%2520of%2520gravity%2520data%2520using%2520implicit%2520neural%2520representations%2520and%2520scientific%2520machine%2520learning%26entry.906535625%3DPankaj%2520K%2520Mishra%2520and%2520Sanni%2520Laaksonen%2520and%2520Jochen%2520Kamm%2520and%2520Anand%2520Singh%26entry.1292438233%3DInversion%2520of%2520gravity%2520data%2520is%2520an%2520important%2520method%2520for%2520investigating%2520subsurface%2520density%2520variations%2520relevant%2520to%2520mineral%2520exploration%252C%2520geothermal%2520assessment%252C%2520carbon%2520storage%252C%2520natural%2520hydrogen%252C%2520groundwater%2520resources%252C%2520and%2520tectonic%2520evolution.%2520Here%2520we%2520present%2520a%2520scientific%2520machine-learning%2520approach%2520for%2520three-dimensional%2520gravity%2520inversion%2520that%2520represents%2520subsurface%2520density%2520as%2520a%2520continuous%2520field%2520using%2520an%2520implicit%2520neural%2520representation%2520%2528INR%2529.%2520The%2520method%2520trains%2520a%2520deep%2520neural%2520network%2520directly%2520through%2520a%2520physics-based%2520forward-model%2520loss%252C%2520mapping {"title": "PRISM: Prompt-Refined In-Context System Modelling for Financial Retrieval", "author": "Chun Chet Ng and Jia Yu Lim and Wei Zeng Low", "abstract": "With the rapid progress of large language models (LLMs), financial information retrieval has become a critical industrial application. Extracting task-relevant information from lengthy financial filings is essential for both operational and analytical decision-making. We present PRISM, a training-free framework that integrates refined system prompting, in-context learning (ICL), and lightweight multi-agent coordination for document and chunk ranking tasks. Our primary contribution is a systematic empirical study of when each component provides value: prompt engineering delivers consistent performance with minimal overhead, ICL enhances reasoning for complex queries when applied selectively, and multi-agent systems show potential primarily with larger models and careful architectural design. Extensive ablation studies across FinAgentBench, FiQA-2018, and FinanceBench reveal that simpler configurations often outperform complex multi-agent pipelines, providing practical guidance for practitioners. Our best configuration achieves an NDCG@5 of 0.71818 on FinAgentBench, ranking third while being the only training-free approach in the top three. We provide comprehensive feasibility analyses covering latency, token usage, and cost trade-offs to support deployment decisions. The source code is released at https://bit.ly/prism-ailens.", "link": "http://arxiv.org/abs/2511.14130v2", "date": "2026-04-06", "relevancy": 2.1032, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5339}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5339}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4853}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PRISM%3A%20Prompt-Refined%20In-Context%20System%20Modelling%20for%20Financial%20Retrieval&body=Title%3A%20PRISM%3A%20Prompt-Refined%20In-Context%20System%20Modelling%20for%20Financial%20Retrieval%0AAuthor%3A%20Chun%20Chet%20Ng%20and%20Jia%20Yu%20Lim%20and%20Wei%20Zeng%20Low%0AAbstract%3A%20With%20the%20rapid%20progress%20of%20large%20language%20models%20%28LLMs%29%2C%20financial%20information%20retrieval%20has%20become%20a%20critical%20industrial%20application.%20Extracting%20task-relevant%20information%20from%20lengthy%20financial%20filings%20is%20essential%20for%20both%20operational%20and%20analytical%20decision-making.%20We%20present%20PRISM%2C%20a%20training-free%20framework%20that%20integrates%20refined%20system%20prompting%2C%20in-context%20learning%20%28ICL%29%2C%20and%20lightweight%20multi-agent%20coordination%20for%20document%20and%20chunk%20ranking%20tasks.%20Our%20primary%20contribution%20is%20a%20systematic%20empirical%20study%20of%20when%20each%20component%20provides%20value%3A%20prompt%20engineering%20delivers%20consistent%20performance%20with%20minimal%20overhead%2C%20ICL%20enhances%20reasoning%20for%20complex%20queries%20when%20applied%20selectively%2C%20and%20multi-agent%20systems%20show%20potential%20primarily%20with%20larger%20models%20and%20careful%20architectural%20design.%20Extensive%20ablation%20studies%20across%20FinAgentBench%2C%20FiQA-2018%2C%20and%20FinanceBench%20reveal%20that%20simpler%20configurations%20often%20outperform%20complex%20multi-agent%20pipelines%2C%20providing%20practical%20guidance%20for%20practitioners.%20Our%20best%20configuration%20achieves%20an%20NDCG%405%20of%200.71818%20on%20FinAgentBench%2C%20ranking%20third%20while%20being%20the%20only%20training-free%20approach%20in%20the%20top%20three.%20We%20provide%20comprehensive%20feasibility {"title": "Unsharp Measurement with Adaptive Gaussian POVMs for Quantum-Inspired Image Processing", "author": "Debashis Saikia and Bikash K. Behera and Mayukha Pal and Prasanta K. Panigrahi", "abstract": "We propose a quantum measurement-based framework for probabilistic transformation of grayscale images using adaptive positive operator-valued measures (POVMs). In contrast, to existing approaches that are largely centered around segmentation or thresholding, the transformation is formulated here as a measurement-induced process acting directly on pixel intensities. The intensity values are embedded in a finite-dimensional Hilbert space, which allows the construction of data-adaptive measurement operators derived from Gaussian models of the image histogram. These operators naturally define an unsharp measurement of the intensity observable, with the reconstructed image obtained through expectation values of the measurement outcomes. To control the degree of measurement localization, we introduce a nonlinear sharpening transformation with a sharpening parameter, $\u03b3$, that induces a continuous transition from unsharp measurements to projective measurements. This transition reflects an inherent trade-off between probabilistic smoothing and localization of intensity structures. In addition to the nonlinear sharpening parameter, we introduce another parameter $k$ (number of gaussian centers) which controls the resolution of the image during the transformation. Experimental results on standard benchmark images show that the proposed method gives effective data-adaptive transformations while preserving structural information.", "link": "http://arxiv.org/abs/2604.04685v1", "date": "2026-04-06", "relevancy": 2.1027, "topK": [{"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5547}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.519}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4994}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unsharp%20Measurement%20with%20Adaptive%20Gaussian%20POVMs%20for%20Quantum-Inspired%20Image%20Processing&body=Title%3A%20Unsharp%20Measurement%20with%20Adaptive%20Gaussian%20POVMs%20for%20Quantum-Inspired%20Image%20Processing%0AAuthor%3A%20Debashis%20Saikia%20and%20Bikash%20K.%20Behera%20and%20Mayukha%20Pal%20and%20Prasanta%20K.%20Panigrahi%0AAbstract%3A%20We%20propose%20a%20quantum%20measurement-based%20framework%20for%20probabilistic%20transformation%20of%20grayscale%20images%20using%20adaptive%20positive%20operator-valued%20measures%20%28POVMs%29.%20In%20contrast%2C%20to%20existing%20approaches%20that%20are%20largely%20centered%20around%20segmentation%20or%20thresholding%2C%20the%20transformation%20is%20formulated%20here%20as%20a%20measurement-induced%20process%20acting%20directly%20on%20pixel%20intensities.%20The%20intensity%20values%20are%20embedded%20in%20a%20finite-dimensional%20Hilbert%20space%2C%20which%20allows%20the%20construction%20of%20data-adaptive%20measurement%20operators%20derived%20from%20Gaussian%20models%20of%20the%20image%20histogram.%20These%20operators%20naturally%20define%20an%20unsharp%20measurement%20of%20the%20intensity%20observable%2C%20with%20the%20reconstructed%20image%20obtained%20through%20expectation%20values%20of%20the%20measurement%20outcomes.%20To%20control%20the%20degree%20of%20measurement%20localization%2C%20we%20introduce%20a%20nonlinear%20sharpening%20transformation%20with%20a%20sharpening%20parameter%2C%20%24%CE%B3%24%2C%20that%20induces%20a%20continuous%20transition%20from%20unsharp%20measurements%20to%20projective%20measurements.%20This%20transition%20reflects%20an%20inherent%20trade-off%20between%20probabilistic%20smoothing%20and%20localization%20of%20intensity%20structures.%20In%20addition%20to%20the%20nonlinear%20sharpening%20parameter%2C%20we%20introduce%20another%20parameter%20%24k%24%20%28number%20of%20gaussian%20centers%29%20which%20controls%20the%20resolution%20of%20the%20image%20during%20the%20transformation.%20Experimental%20results%20on%20standard%20benchmark%20images%20show%20that%20the%20proposed%20method%20gives%20effective%20data-adaptive%20transformations%20while%20preserving%20structural%20information.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04685v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnsharp%2520Measurement%2520with%2520Adaptive%2520Gaussian%2520POVMs%2520for%2520Quantum-Inspired%2520Image%2520Processing%26entry.906535625%3DDebashis%2520Saikia%2520and%2520Bikash%2520K.%2520Behera%2520and%2520Mayukha%2520Pal%2520and%2520Prasanta%2520K.%2520Panigrahi%26entry.1292438233%3DWe%2520propose%2520a%2520quantum%2520measurement-based%2520framework%2520for%2520probabilistic%2520transformation%2520of%2520grayscale%2520images%2520using%2520adaptive%2520positive%2520operator-valued%2520measures%2520%2528POVMs%2529.%2520In%2520contrast%252C%2520to%2520existing%2520approaches%2520that%2520are%2520largely%2520centered%2520around%2520segmentation%2520or%2520thresholding%252C%2520the%2520transformation%2520is%2520formulated%2520here%2520as%2520a%2520measurement-induced%2520process%2520acting%2520directly%2520on%2520pixel%2520intensities.%2520The%2520intensity%2520values%2520are%2520embedded%2520in%2520a%2520finite-dimensional%2520Hilbert%2520space%252C%2520which%2520allows%2520the%2520construction%2520of%2520data-adaptive%2520measurement%2520operators%2520derived%2520from%2520Gaussian%2520models%2520of%2520the%2520image%2520histogram.%2520These%2520operators%2520naturally%2520define%2520an%2520unsharp%2520measurement%2520of%2520the%2520intensity%2520observable%252C%2520with%2520the%2520reconstructed%2520image%2520obtained%2520thr {"title": "Amortized Safe Active Learning for Real-Time Data Acquisition: Pretrained Neural Policies From Simulated Nonparametric Functions", "author": "Cen-You Li and Marc Toussaint and Barbara Rakitsch and Christoph Zimmer", "abstract": "Safe active learning (AL) is a sequential scheme for learning unknown systems while respecting safety constraints during data acquisition. Existing methods often rely on Gaussian processes (GPs) to model the task and safety constraints, requiring repeated GP updates and constrained acquisition optimization--incurring significant computations which are challenging for real-time decision-making. We propose amortized AL for regression and amortized safe AL, replacing expensive online computations with a pretrained neural policy. Inspired by recent advances in amortized Bayesian experimental design, we leverage GPs as pretraining simulators. We train our policy prior to the AL deployment on simulated nonparametric functions, using Fourier feature-based GP sampling and a differentiable acquisition objective that is safety-aware in the safe AL setting. At deployment, our policy selects informative and (if desired) safe queries via a single forward pass, eliminating GP inference and acquisition optimization. This leads to magnitudes of speed improvements while preserving learning quality. Our framework is modular and, without the safety component, yields fast unconstrained AL for time-sensitive tasks.", "link": "http://arxiv.org/abs/2501.15458v3", "date": "2026-04-06", "relevancy": 2.0906, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5432}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.539}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4955}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Amortized%20Safe%20Active%20Learning%20for%20Real-Time%20Data%20Acquisition%3A%20Pretrained%20Neural%20Policies%20From%20Simulated%20Nonparametric%20Functions&body=Title%3A%20Amortized%20Safe%20Active%20Learning%20for%20Real-Time%20Data%20Acquisition%3A%20Pretrained%20Neural%20Policies%20From%20Simulated%20Nonparametric%20Functions%0AAuthor%3A%20Cen-You%20Li%20and%20Marc%20Toussaint%20and%20Barbara%20Rakitsch%20and%20Christoph%20Zimmer%0AAbstract%3A%20Safe%20active%20learning%20%28AL%29%20is%20a%20sequential%20scheme%20for%20learning%20unknown%20systems%20while%20respecting%20safety%20constraints%20during%20data%20acquisition.%20Existing%20methods%20often%20rely%20on%20Gaussian%20processes%20%28GPs%29%20to%20model%20the%20task%20and%20safety%20constraints%2C%20requiring%20repeated%20GP%20updates%20and%20constrained%20acquisition%20optimization--incurring%20significant%20computations%20which%20are%20challenging%20for%20real-time%20decision-making.%20We%20propose%20amortized%20AL%20for%20regression%20and%20amortized%20safe%20AL%2C%20replacing%20expensive%20online%20computations%20with%20a%20pretrained%20neural%20policy.%20Inspired%20by%20recent%20advances%20in%20amortized%20Bayesian%20experimental%20design%2C%20we%20leverage%20GPs%20as%20pretraining%20simulators.%20We%20train%20our%20policy%20prior%20to%20the%20AL%20deployment%20on%20simulated%20nonparametric%20functions%2C%20using%20Fourier%20feature-based%20GP%20sampling%20and%20a%20differentiable%20acquisition%20objective%20that%20is%20safety-aware%20in%20the%20safe%20AL%20setting.%20At%20deployment%2C%20our%20policy%20selects%20informative%20and%20%28if%20desired%29%20safe%20queries%20via%20a%20single%20forward%20pass%2C%20eliminating%20GP%20inference%20and%20acquisition%20optimization.%20This%20leads%20to%20magnitudes%20of%20speed%20improvements%20while%20preserving%20learning%20quality.%20Our%20framework%20is%20modular%20and%2C%20without%20the%20safety%20component%2C%20yields%20fast%20unconstrained%20AL%20for%20time-sensitive%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2501.15458v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAmortized%2520Safe%2520Active%2520Learning%2520for%2520Real-Time%2520Data%2520Acquisition%253A%2520Pretrained%2520Neural%2520Policies%2520From%2520Simulated%2520Nonparametric%2520Functions%26entry.906535625%3DCen-You%2520Li%2520and%2520Marc%2520Toussaint%2520and%2520Barbara%2520Rakitsch%2520and%2520Christoph%2520Zimmer%26entry.1292438233%3DSafe%2520active%2520learning%2520%2528AL%2529%2520is%2520a%2520sequential%2520scheme%2520for%2520learning%2520unknown%2520systems%2520while%2520respecting%2520safety%2520constraints%2520during%2520data%2520acquisition.%2520Existing%2520methods%2520often%2520rely%2520on%2520Gaussian%2520processes%2520%2528GPs%2529%2520to%2520model%2520the%2520task%2520and%2520safety%2520constraints%252C%2520requiring%2520repeated%2520GP%2520updates%2520and%2520constrained%2520acquisition%2520optimization--incurring%2520significant%2520computations%2520which%2520are%2520challenging%2520for%2520real-time%2520decision-making.%2520We%2520propose%2520amortized%2520AL%2520for%2520regression%2520and%2520amortized%2520safe%2520AL%252C%2520replacing%2520expensive%2520online%2520computations%2520with%2520a%2520pretrained%2520neural%2520policy.%2520Inspired%2520by%2520recent%2520advances%2520in%2520amortized%2520Bayesian%2520experimental%2520design%252C%2520we%2520leverage%2520GPs%2520as%2520pretraining%2520simulators.%2520We%2520train%2520our%2520policy%2520prior%2520to%2520the%2520AL%2520deployment%2520on%2520simulated%2520nonparametric%2520functions%252C%2520using%2520Fourier%2520feature-based%2520GP%2520sampling%2520and%2520a%2520differentiable%2520acquisition%2520objective%2520that%2520is%2520safety-aware%2520in%2520the%2520safe%2520AL%2520setting.%2520At%2520deplo {"title": "Synthetic Sandbox for Training Machine Learning Engineering Agents", "author": "Yuhang Zhou and Lizhu Zhang and Yifan Wu and Jiayi Liu and Xiangjun Fan and Zhuokai Zhao and Hong Yan", "abstract": "As large language model agents advance beyond software engineering (SWE) tasks toward machine learning engineering (MLE), verifying agent behavior becomes orders of magnitude more expensive: while SWE tasks can be verified via fast-executing unit tests, MLE verification requires running full ML pipelines -- data preprocessing, model training, and metric evaluation -- on large datasets at each rollout step, rendering trajectory-wise on-policy reinforcement learning (RL) prohibitively slow. Existing approaches retreat to supervised fine-tuning (SFT) or offline proxy rewards, sacrificing the exploration and generalization benefits of on-policy RL. We observe that sandbox data size is the primary source of this bottleneck. Based on this insight, we introduce SandMLE, a multi-agent framework that generates diverse, verifiable synthetic MLE environments from a small number of seed tasks, preserving the structural and technical complexity of real-world problems while constraining datasets to micro-scale (each task is paired with only 50-200 training samples). Through extensive experiments, we show that SandMLE reduces execution time by over 13 times, enabling large-scale, on-policy trajectory-wise RL for the first time in the MLE domain. On MLE-bench-lite, SandMLE yields significant gains over SFT baselines across Qwen3-8B, 14B, and 30B-A3B, with relative medal rate improvements ranging from 20.3% to 66.9%. Furthermore, the trained policy generalizes across unseen agentic scaffolds, achieving up to 32.4% better HumanRank score on MLE-Dojo.", "link": "http://arxiv.org/abs/2604.04872v1", "date": "2026-04-06", "relevancy": 2.0749, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5195}, {"title": {"title": "KLong: Training LLM Agent for Extremely Long-horizon Tasks", "author": "Yue Liu and Yingwei Ma and Yibo Miao and Yanhao Li and Yuchong Xie and Xinlong Yang and Zhiyuan Hu and Flood Sung and Jiaheng Zhang and Bryan Hooi", "abstract": "This paper introduces KLong, an open-source LLM agent trained to solve extremely long-horizon tasks. The principle is to first cold-start the model via trajectory-splitting SFT, then scale it via progressive RL training. Specifically, we first activate basic agentic abilities of a base model with a comprehensive SFT recipe. Then, we introduce Research-Factory, an automated pipeline that generates high-quality training data by collecting research papers and constructing evaluation rubrics. Using this pipeline, we build thousands of long-horizon trajectories distilled from Claude 4.5 Sonnet (Thinking). To train with these extremely long trajectories, we propose a new trajectory-splitting SFT, which preserves early context, progressively truncates later context, and maintains overlap between sub-trajectories. In addition, to further improve long-horizon task-solving capability, we propose a novel progressive RL, which schedules training into multiple stages with progressively extended timeouts. Experiments demonstrate the superiority and generalization of KLong, as shown in Figure 1. Notably, our proposed KLong (106B) surpasses Kimi K2 Thinking (1T) by 11.28% on PaperBench, and the performance improvement generalizes to other coding benchmarks like SWE-bench Verified and MLE-bench.", "link": "http://arxiv.org/abs/2602.17547v2", "date": "2026-04-06", "relevancy": 2.0722, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5599}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4918}, {"title": "RoboEXP: Actio {"title": "MinerU2.5-Pro: Pushing the Limits of Data-Centric Document Parsing at Scale", "author": "Bin Wang and Tianyao He and Linke Ouyang and Fan Wu and Zhiyuan Zhao and Tao Chu and Yuan Qu and Zhenjiang Jin and Weijun Zeng and Ziyang Miao and Bangrui Xu and Junbo Niu and Mengzhang Cai and Jiantao Qiu and Qintong Zhang and Dongsheng Ma and Yuefeng Sun and Hejun Dong and Wenzheng Zhang and Jutao Xiao and Jiayong Shi and Pengyu Liao and Xiaomeng Zhao and Huaping Zhong and Liqun Wei and Jing Yu and Jie Yang and Wei Li and Shasha Wang and Qianqian Wu and Xuanhe Zhou and Weijia Li and Zhenxiang Li and Zhongying Tu and Jiang Wu and Lijun Wu and Chao Xu and Kai Chen and Wentao Zhang and Yu Qiao and Bowen Zhou and Dahua Lin and Conghui He", "abstract": "Current document parsing methods compete primarily on model architecture innovation, while systematic engineering of training data remains underexplored. Yet SOTA models of different architectures and parameter scales exhibit highly consistent failure patterns on the same set of hard samples, suggesting that the performance bottleneck stems from shared deficiencies in training data rather than architecture itself. Building on this finding, we present \\minerupro, which advances the state of the art solely through data engineering and training strategy optimization while keeping the 1.2B-parameter architecture of \\mineru completely fixed. At its core is a Data Engine co-designed around coverage, informativeness, and annotation accuracy: Diversity-and-Difficulty-Aware Sampling expands training data from under 10M to 65.5M samples while correcting distribution shift; Cross-Model Consistency Verification leverages output agreement among heterogeneous models to assess sample difficulty and generate reliable annotations; the Judge-and-Refine pipeline improves annotation quality for hard samples through render-then-verify iterative correction. A three-stage progressive training strategy -- large-scale pre-training, hard sample {"title": "Pixels or Positions? Benchmarking Modalities in Group Activity Recognition", "author": "Drishya Karki and Merey Ramazanova and Anthony Cioppa and Silvio Giancola and Bernard Ghanem", "abstract": "Group Activity Recognition (GAR) is well studied on the video modality for surveillance and indoor team sports (e.g., volleyball, basketball). Yet, other modalities such as agent positions and trajectories over time, i.e. tracking, remain comparatively under-explored despite being compact, agent-centric signals that explicitly encode spatial interactions. Understanding whether pixel (video) or position (tracking) modalities leads to better group activity recognition is therefore important to drive further research on the topic. However, no standardized benchmark currently exists that aligns broadcast video and tracking data for the same group activities, leading to a lack of apples-to-apples comparison between these modalities for GAR. In this work, we introduce SoccerNet-GAR, a multimodal dataset built from the $64$ matches of the football World Cup 2022. Specifically, the broadcast videos and player tracking modalities for $87{,}939$ group activities are synchronized and annotated with $10$ categories. Furthermore, we define a unified evaluation protocol to benchmark two strong unimodal approaches: (i) competitive video-based classifiers and (ii) tracking-based classifiers leveraging graph neural networks. In particular, our novel role-aware graph architecture for tracking-based GAR directly encodes tactical structure through positional edges connecting players by their on-pitch roles. Our tracking model achieves $77.8\\%$ balanced accuracy compared to $60.9\\%$ for the best video baseline, while training with $7 \\times$ less GPU hours and $479 \\times$ fewer parameters ($180K$ vs. $86.3M$). This study provides new insights into the relative strengths of pixels and positions for group activity recognition in sports.", "link": "http://arxiv.org/abs/2511.12606v2", "date": "2026-04-06", "relevancy": 2.0635, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5194}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.519}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5111}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Pixels%20or%20Positions%3F%20Benchmarking%20Modalities%20in%20Group%20Activity%20Recognition&body=Title%3A%20Pixels%20or%20Positions%3F%20Benchmarking%20Modalities%20in%20Group%20Activity%20Recognition%0AAuthor%3A%20Drishya%20Karki%20and%20Merey%20Ramazanova%20and%20Anthony%20Cioppa%20and%20Silvio%20Giancola%20and%20Bernard%20Ghanem%0AAbstract%3A%20Group%20Activity%20Recognition%20%28GAR%29%20is%20well%20studied%20on%20the%20video%20modality%20for%20surveillance%20and%20indoor%20team%20sports%20%28e.g.%2C%20volleyball%2C%20basketball%29.%20Yet%2C%20other%20modalities%20such%20as%20agent%20positions%20and%20trajectories%20over%20time%2C%20i.e.%20tracking%2C%20remain%20comparatively%20under-explored%20despite%20being%20compact%2C%20agent-centric%20signals%20that%20explicitly%20encode%20spatial%20interactions.%20Understanding%20whether%20pixel%20%28video%29%20or%20position%20%28tracking%29%20modalities%20leads%20to%20better%20group%20activity%20recognition%20is%20therefore%20important%20to%20drive%20further%20research%20on%20the%20topic.%20However%2C%20no%20standardized%20benchmark%20currently%20exists%20that%20aligns%20broadcast%20video%20and%20tracking%20data%20for%20the%20same%20group%20activities%2C%20leading%20to%20a%20lack%20of%20apples-to-apples%20comparison%20between%20these%20modalities%20for%20GAR.%20In%20this%20work%2C%20we%20introduce%20SoccerNet-GAR%2C%20a%20multimodal%20dataset%20built%20from%20the%20%2464%24%20matches%20of%20the%20football%20World%20Cup%202022.%20Specifically%2C%20the%20broadcast%20videos%20and%20player%20tracking%20modalities%20for%20%2487%7B%2C%7D939%24%20group%20activities%20are%20synchronized%20and%20annotated%20with%20%2410%24%20categories.%20Furthermore%2C%20we%20define%20a%20unified%20evaluation%20protocol%20to%20benchmark%20two%20strong%20unimodal%20approaches%3A%20%28i%29%20competitive%20video-based%20classifiers%20and%20%28ii%29%20tracking-based%20classifiers%20leveraging%20graph%20neural%20networks.%20In%20particular%2C%20our%20novel%20role-aware%20graph%20architecture%20for%20tracking-based%20GAR%20directly%20encodes%20tactical%20structure%20through%20positional%20edges%20connecting%20players%20by%20their%20on-pitch%20roles.%20Our%20tracking%20model%20achieves%20%2477.8%5C%25%24%20balanced%20accuracy%20compared%20to%20%2460.9%5C%25%24%20for%20the%20best%20video%20baseline%2C%20while%20training%20with%20%247%20%5Ctimes%24%20less%20GPU%20hours%20and%20%24479%20%5Ctimes%24%20fewer%20parameters%20%28%24180K%24%20vs.%20%2486.3M%24%29.%20This%20study%20provides%20new%20insights%20into%20the%20relative%20strengths%20of%20pixels%20and%20positions%20for%20group%20activity%20recognition%20in%20sports.%0ALink%3A%20http%3A//arxiv.org/abs/2511.12606v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPixels%2520or%2520Positions%253F%2520Benchmarking%2520Modalities%2520in%2520Group%2520Activity%2520Recognition%26entry.906535625%3DDrishya%2520Karki%2520and%2520Merey%2520Ramazanova%2520and%2520Anthony%2520Cioppa%2520and%2520Silvio%2520Giancola%2520and%2520Bernard%2520Ghanem%26entry.1292438233%3DGroup%2520Activity%2520Recognition%2520%2528GAR%2529%2520is%2520well%2520studied%2520on%2520the%2520video%2520modality%2520for%2520surveillance%2520and%2520indoor%2520team%2520sports%2520%2528e.g.%252C%2520volleyba

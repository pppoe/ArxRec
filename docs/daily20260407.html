{"title": "LP-GEMM: Integrating Layout Propagation into GEMM Operations", "author": "C\u00e9sar Guedes Carneiro and Lucas Alvarenga and Guido Araujo and Sandro Rigo", "abstract": "In Scientific Computing and modern Machine Learning (ML) workloads, sequences of dependent General Matrix Multiplications (GEMMs) often dominate execution time. While state-of-the-art BLAS libraries aggressively optimize individual GEMM calls, they remain constrained by the BLAS API, which requires each call to independently pack input matrices and restore outputs to a canonical memory layout. In sequential GEMMs, these constraints cause redundant packing and unpacking, wasting valuable computational resources.\n  This paper introduces LP-GEMM, a decomposition of the GEMM kernel that enables packing-layout propagation across sequential GEMM operations. This approach eliminates unnecessary data repacking while preserving full BLAS semantic correctness at the boundaries. We evaluate LP-GEMM on x86 (AVX-512) and RISC-V (RVV 1.0) architectures across MLP-like and Attention-like workloads. Our results show average speedups of 2.25x over OpenBLAS on Intel x86 for sequential GEMMs and competitive gains relative to vendor-optimized libraries such as Intel MKL.\n  We demonstrate the practicality of the approach beyond microbenchmarks by implementing a standalone C++ version of the Llama-3.2 inference path using exclusively BLAS-level GEMM calls. These results confirm that leveraging data layout propagation between operations can significantly boost performance.", "link": "http://arxiv.org/abs/2604.04599v1", "date": "2026-04-06", "relevancy": 2.325, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4848}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4621}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4482}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LP-GEMM%3A%20Integrating%20Layout%20Propagation%20into%20GEMM%20Operations&body=Title%3A%20LP-GEMM%3A%20Integrating%20Layout%20Propagation%20into%20GEMM%20Operations%0AAuthor%3A%20C%C3%A9sar%20Guedes%20Carneiro%20and%20Lucas%20Alvarenga%20and%20Guido%20Araujo%20and%20Sandro%20Rigo%0AAbstract%3A%20In%20Scientific%20Computing%20and%20modern%20Machine%20Learning%20%28ML%29%20workloads%2C%20sequences%20of%20dependent%20General%20Matrix%20Multiplications%20%28GEMMs%29%20often%20dominate%20execution%20time.%20While%20state-of-the-art%20BLAS%20libraries%20aggressively%20optimize%20individual%20GEMM%20calls%2C%20they%20remain%20constrained%20by%20the%20BLAS%20API%2C%20which%20requires%20each%20call%20to%20independently%20pack%20input%20matrices%20and%20restore%20outputs%20to%20a%20canonical%20memory%20layout.%20In%20sequential%20GEMMs%2C%20these%20constraints%20cause%20redundant%20packing%20and%20unpacking%2C%20wasting%20valuable%20computational%20resources.%0A%20%20This%20paper%20introduces%20LP-GEMM%2C%20a%20decomposition%20of%20the%20GEMM%20kernel%20that%20enables%20packing-layout%20propagation%20across%20sequential%20GEMM%20operations.%20This%20approach%20eliminates%20unnecessary%20data%20repacking%20while%20preserving%20full%20BLAS%20semantic%20correctness%20at%20the%20boundaries.%20We%20evaluate%20LP-GEMM%20on%20x86%20%28AVX-512%29%20and%20RISC-V%20%28RVV%201.0%29%20architectures%20across%20MLP-like%20and%20Attention-like%20workloads.%20Our%20results%20show%20average%20speedups%20of%202.25x%20over%20OpenBLAS%20on%20Intel%20x86%20for%20sequential%20GEMMs%20and%20competitive%20gains%20relative%20to%20vendor-optimized%20libraries%20such%20as%20Intel%20MKL.%0A%20%20We%20demonstrate%20the%20practicality%20of%20the%20approach%20beyond%20microbenchmarks%20by%20implementing%20a%20standalone%20C%2B%2B%20version%20of%20the%20Llama-3.2%20inference%20path%20using%20exclusively%20BLAS-level%20GEMM%20calls.%20These%20results%20confirm%20that%20leveraging%20data%20layout%20propagation%20between%20operations%20can%20significantly%20boost%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04599v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLP-GEMM%253A%2520Integrating%2520Layout%2520Propagation%2520into%2520GEMM%2520Operations%26entry.906535625%3DC%25C3%25A9sar%2520Guedes%2520Carneiro%2520and%2520Lucas%2520Alvarenga%2520and%2520Guido%2520Araujo%2520and%2520Sandro%2520Rigo%26entry.1292438233%3DIn%2520Scientific%2520Computing%2520and%2520modern%2520Machine%2520Learning%2520%2528ML%2529%2520workloads%252C%2520sequences%2520of%2520dependent%2520General%2520Matrix%2520Multiplications%2520%2528GEMMs%2529%2520often%2520dominate%2520execution%2520time.%2520While%2520state-of-the-art%2520BLAS%2520libraries%2520aggressively%2520optimize%2520individual%2520GEMM%2520calls%252C%2520they%2520remain%2520constrained%2520by%2520the%2520BLAS%2520API%252C%2520which%2520requires%2520each%2520call%2520to%2520independently%2520pack%2520input%2520matrices%2520and%2520restore%2520outputs%2520to%2520a%2520canonical%2520memory%2520layout.%2520In%2520sequential%2520GEMMs%252C%2520these%2520constraints%2520cause%2520redundant%2520packing%2520and%2520unpacking%252C%2520wasting%2520valuable%2520computational%2520resources.%250A%2520%2520This%2520paper%2520introduces%2520LP-GEMM%252C%2520a%2520decomposition%2520of%2520the%2520GEMM%2520kernel%2520that%2520enables%2520packing-layout%2520propagation%2520across%2520sequential%2520GEMM%2520operations.%2520This%2520approach%2520eliminates%2520unnecessary%2520data%2520repacking%2520while%2520preserving%2520full%2520BLAS%2520semantic%2520correctness%2520at%2520the%2520boundaries.%2520We%2520evaluate%2520LP-GEMM%2520on%2520x86%2520%2528AVX-512%2529%2520and%2520RISC-V%2520%2528RVV%25201.0%2529%2520architectures%2520across%2520MLP-like%2520and%2520Attention-like%2520workloads.%2520Our%2520results%2520show%2520average%2520speedups%2520of%25202.25x%2520over%2520OpenBLAS%2520on%2520Intel%2520x86%2520for%2520sequential%2520GEMMs%2520and%2520competitive%2520gains%2520relative%2520to%2520vendor-optimized%2520libraries%2520such%2520as%2520Intel%2520MKL.%250A%2520%2520We%2520demonstrate%2520the%2520practicality%2520of%2520the%2520approach%2520beyond%2520microbenchmarks%2520by%2520implementing%2520a%2520standalone%2520C%252B%252B%2520version%2520of%2520the%2520Llama-3.2%2520inference%2520path%2520using%2520exclusively%2520BLAS-level%2520GEMM%2520calls.%2520These%2520results%2520confirm%2520that%2520leveraging%2520data%2520layout%2520propagation%2520between%2520operations%2520can%2520significantly%2520boost%2520performance.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.04599v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=LP-GEMM%3A%20Integrating%20Layout%20Propagation%20into%20GEMM%20Operations&entry.906535625=C%C3%A9sar%20Guedes%20Carneiro%20and%20Lucas%20Alvarenga%20and%20Guido%20Araujo%20and%20Sandro%20Rigo&entry.1292438233=In%20Scientific%20Computing%20and%20modern%20Machine%20Learning%20%28ML%29%20workloads%2C%20sequences%20of%20dependent%20General%20Matrix%20Multiplications%20%28GEMMs%29%20often%20dominate%20execution%20time.%20While%20state-of-the-art%20BLAS%20libraries%20aggressively%20optimize%20individual%20GEMM%20calls%2C%20they%20remain%20constrained%20by%20the%20BLAS%20API%2C%20which%20requires%20each%20call%20to%20independently%20pack%20input%20matrices%20and%20restore%20outputs%20to%20a%20canonical%20memory%20layout.%20In%20sequential%20GEMMs%2C%20these%20constraints%20cause%20redundant%20packing%20and%20unpacking%2C%20wasting%20valuable%20computational%20resources.%0A%20%20This%20paper%20introduces%20LP-GEMM {"title": "Controllable protein design with particle-based Feynman-Kac steering", "author": "Erik Hartman and Jonas Wallin and Johan Malmstr\u00f6m and Jimmy Olsson", "abstract": "Proteins underpin most biological function, and the ability to design them with tailored structures and properties is central to advances in biotechnology. Diffusion-based generative models have emerged as powerful tools for protein design, but steering them toward proteins with specified properties remains challenging. The Feynman-Kac (FK) framework provides a principled way to guide diffusion models using user-defined rewards. In this paper, we enable FK-based steering of RFdiffusion through the development of guiding potentials that leverage ProteinMPNN and structural relaxation to guide the diffusion process towards desired properties. We show that steering can be used to consistently improve predicted interface energetics and increase binder designability by $89.5\\%$. Together, these results establish that diffusion-based protein design can be effectively steered toward arbitrary, non-differentiable objectives, providing a model-independent framework for controllable protein generation.", "link": "http://arxiv.org/abs/2511.09216v2", "date": "2026-04-06", "relevancy": 2.3236, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4892}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.4714}, {"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.4336}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Controllable%20protein%20design%20with%20particle-based%20Feynman-Kac%20steering&body=Title%3A%20Controllable%20protein%20design%20with%20particle-based%20Feynman-Kac%20steering%0AAuth {"title": "Beyond Semantics: Uncovering the Physics of Fakes via Universal Physical Descriptors for Cross-Modal Synthetic Detection", "author": "Mei Qiu and Jianqiang Zhao and Yanyun Qu", "abstract": "The rapid advancement of AI generated content (AIGC) has blurred the boundaries between real and synthetic images, exposing the limitations of existing deepfake detectors that often overfit to specific generative models. This adaptability crisis calls for a fundamental reexamination of the intrinsic physical characteristics that distinguish natural from AI-generated images. In this paper, we address two critical research questions: (1) What physical features can stably and robustly discriminate AI generated images across diverse datasets and generative architectures? (2) Can these objective pixel-level features be integrated into multimodal models like CLIP to enhance detection performance while mitigating the unreliability of language-based information? To answer these questions, we conduct a comprehensive exploration of 15 physical features across more than 20 datasets generated by various GANs and diffusion models. We propose a novel feature selection algorithm that identifies five core physical features including Laplacian variance, Sobel statistics, and residual noise variance that exhibit consistent discriminative power across all tested datasets. These features are then converted into text encoded values and integrated with semantic captions to guide image text representation learning in CLIP. Extensive experiments demonstrate that our method achieves state-of-the-art performance on multiple Genimage benchmarks, with near-perfect accuracy (99.8%) on datasets such as Wukong and SDv1.4. By bridging pixel level authenticity with semantic understanding, this work pioneers the use of physically grounded features for trustworthy vision language modeling and opens new directions for mitigating hallucinations and textual inaccuracies in large multimodal models.", "link": "http://arxiv.org/abs/2604.04608v1", "date": "2026-04-06", "relevancy": 2.3218, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5861}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5773}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5761}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Semantics%3A%20Uncovering%20the%20Physics%20of%20Fakes%20via%20Universal%20Physical%20Descriptors%20for%20Cross-Modal%20Synthetic%20Detection&body=Title%3A%20Beyond%20Semantics%3A%20Uncovering%20the%20Physics%20of%20Fakes%20via%20Universal%20Physical%20Descriptors%20for%20Cross-Modal%20Synthetic%20Detection%0AAuthor%3A%20Mei%20Qiu%20and%20Jianqiang%20Zhao%20and%20Yanyun%20Qu%0AAbstract%3A%20The%20rapid%20advancement%20of%20AI%20generated%20content%20%28AIGC%29%20has%20blurred%20the%20boundaries%20between%20real%20and%20synthetic%20images%2C%20exposing%20the%20limitations%20of%20existing%20deepfake%20detectors%20that%20often%20overfit%20to%20specific%20generative%20models.%20This%20adaptability%20crisis%20calls%20for%20a%20fundamental%20reexamination%20of%20the%20intrinsic%20physical%20characteristics%20that%20distinguish%20natural%20from%20AI-generated%20images.%20In%20this%20paper%2C%20we%20address%20two%20critical%20research%20questions%3A%20%281%29%20What%20physical%20features%20can%20stably%20and%20robustly%20discriminate%20AI%20generated%20images%20across%20diverse%20datasets%20and%20generative%20architectures%3F%20%282%29%20Can%20these%20objective%20pixel-level%20features%20be%20integrated%20into%20multimodal%20models%20like%20CLIP%20to%20enhance%20detection%20performance%20while%20mitigating%20the%20unreliability%20of%20language-based%20information%3F%20To%20answer%20these%20questions%2C%20we%20conduct%20a%20comprehensive%20exploration%20of%2015%20physical%20features%20across%20more%20than%2020%20datasets%20generated%20by%20various%20GANs%20and%20diffusion%20models.%20We%20propose%20a%20novel%20feature%20selection%20algorithm%20that%20identifies%20five%20core%20physical%20features%20including%20Laplacian%20variance%2C%20Sobel%20statistics%2C%20and%20residual%20noise%20variance%20that%20exhibit%20consistent%20discriminative%20power%20across%20all%20tested%20datasets.%20These%20features%20are%20then%20converted%20into%20text%20encoded%20values%20and%20integrated%20with%20semantic%20captions%20to%20guide%20image%20text%20representation%20learning%20in%20CLIP.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20achieves%20state-of-the-art%20performance%20on%20multiple%20Genimage%20benchmarks%2C%20with%20near-perfect%20accuracy%20%2899.8%25%29%20on%20datasets%20such%20as%20Wukong%20and%20SDv1.4.%20By%20bridging%20pixel%20level%20authenticity%20with%20semantic%20understanding%2C%20this%20work%20pioneers%20the%20use%20of%20physically%20grounded%20features%20for%20trustworthy%20vision%20language%20modeling%20and%20opens%20new%20directions%20for%20mitigating%20hallucinations%20and%20textual%20inaccuracies%20in%20large%20multimodal%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04608v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520Semantics%253A%2520Uncovering%2520the%2520Physics%2520of%2520Fakes%2520via%2520Universal%2520Physical%2520Descriptors%2520for%2520Cross-Modal%2520Synthetic%2520Detection%26entry.906535625%3DMei%2520Qiu%2520and%2520Jianqiang%2520Zhao%2520and%2520Yanyun%2520Qu%26entry.1292438233%3DThe%2520rapid%2520advancement%2520of%2520AI%2520generated%2520content%2520%2528AIGC%2529%2520has%2520blurred%2520the%2520boundaries%2520between%2520real%2520and%2520synthetic%2520images%252 gating%20the%20unreliability%20of%20language-based%20information%3F%20To%20answer%20these%20questions%2C%20we%20conduct%20a%20comprehensive%20exploration%20of%2015%20physical%20features%20across%20more%20than%2020%20datasets%20generated%20by%20various%20GANs%20and%20diffusion%20models.%20We%20propose%20a%20novel%20feature%20selection%20algorithm%20that%20identifies%20five%20core%20physical%20features%20including%20Laplacian%20variance%2C%20Sobel%20statistics%2C%20and%20residual%20noise%20variance%20that%20exhibit%20consistent%20discriminative%20power%20across%20all%20tested%20datasets.%20These%20features%20are%20then%20converted%20into%20text%20encoded%20values%20and%20integrated%20with%20semantic%20captions%20to%20guide%20image%20text%20representation%20learning%20in%20CLIP.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20achieves%20state-of-the-art%20performance%20on%20multiple%20Genimage%20benchmarks%2C%20with%20near-perfect%20accuracy%20%2899.8%25%29%20on%20datasets%20such%20as%20Wukong%20and%20SDv1.4.%20By%20bridging%20pixel%20level%20authenticity%20with%20semantic%20understanding%2C%20this%20work%20pioneers%20the%20use%20of%20physically%20grounded%20features%20for%20trustworthy%20vision%20language%20modeling%20and%20opens%20new%20directions%20for%20mitigating%20hallucinations%20and%20textual%20inaccuracies%20in%20large%20multimodal%20models.&entry.1838667208=http%3A//arxiv.org/abs/2604.04608v1&entry.124074799=Read"},
{"title": "Visual Prompt Based Reasoning for Offroad Mapping using Multimodal LLMs", "author": "Abdelmoamen Nasser and Yousef Baba'a and Murad Mebrahtu and Nadya Abdel Madjid and Jorge Dias and Majid Khonji", "abstract": "Traditional approaches to off-road autonomy rely on separate models for terrain classification, height estimation, and quantifying slip or slope conditions. Utilizing several models requires training each component separately, having task specific datasets, and fine-tuning. In this work, we present a zero-shot approach leveraging SAM2 for environment segmentation and a vision-language model (VLM) to reason about drivable areas. Our approach involves passing to the VLM both the original image and the segmented image annotated with numeric labels for each mask. The VLM is then prompted to identify which regions, represented by these numeric labels, are drivable. Combined with planning and control modules, this unified framework eliminates the need for explicit terrain-specific models and relies instead on the inherent reasoning capabilities of the VLM. Our approach surpasses state-of-the-art trainable models on high resolution segmentation datasets and enables full stack navigation in our Isaac Sim offroad environment.", "link": "http://arxiv.org/abs/2604.04564v1", "date": "2026-04-06", "relevancy": 2.3194, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5818}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5698}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Visual%20Prompt%20Based%20Reasoning%20for%20Offroad%20Mapping%20using%20Multimodal%20LLMs&body=Title%3A%20Visual%20Prompt%20Based%20Reasoning%20for%20Offroad%20Mapping%20using%20Multimodal%20LLMs%0AAuthor%3A%20Abdelmoamen%20Nasser%20and%20Yousef%20Baba%27a%20and%20Murad%20Mebrahtu%20and%20Nadya%20Abdel%20Madjid%20and%20Jorge%20Dias%20and%20Majid%20Khonji%0AAbstract%3A%20Traditional%20approaches%20to%20off-road%20autonomy%20rely%20on%20separate%20models%20for%20terrain%20classification%2C%20height%20estimation%2C%20and%20quantifying%20slip%20or%20slope%20conditions.%20Utilizing%20several%20models%20requires%20training%20each%20component%20separately%2C%20having%20task%20specific%20datasets%2C%20and%20fine-tuning.%20In%20this%20work%2C%20we%20present%20a%20zero-shot%20approach%20leveraging%20SAM2%20for%20environment%20segmentation%20and%20a%20vision-language%20model%20%28VLM%29%20to%20reason%20about%20drivable%20areas.%20Our%20approach%20involves%20passing%20to%20the%20VLM%20both%20the%20original%20image%20and%20the%20segmented%20image%20annotated%20with%20numeric%20labels%20for%20each%20mask.%20The%20VLM%20is%20then%20prompted%20to%20identify%20which%20regions%2C%20represented%20by%20these%20numeric%20labels%2C%20are%20drivable.%20Combined%20with%20planning%20and%20control%20modules%2C%20this%20unified%20framework%20eliminates%20the%20need%20for%20explicit%20terrain-specific%20models%20and%20relies%20instead%20on%20the%20inherent%20reasoning%20capabilities%20of%20the%20VLM.%20Our%20approach%20surpasses%20state-of-the-art%20trainable%20models%20on%20high%20resolution%20segmentation%20datasets%20and%20enables%20full%20stack%20navigation%20in%20our%20Isaac%20Sim%20offroad%20environment.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04564v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVisual%2520Prompt%2520Based%2520Reasoning%2520for%2520Offroad%2520Mapping%2520using%2520Multimodal%2520LLMs%26entry.906535625%3DAbdelmoamen%2520Nasser%2520and%2520Yo {"title": "MLorc: Momentum Low-rank Compression for Memory Efficient Large Language Model Adaptation", "author": "Wei Shen and Zhang Yaxiang and Minhui Huang and Mengfan Xu and Jiawei Zhang and Cong Shen", "abstract": "With increasing size of large language models (LLMs), full-parameter fine-tuning imposes substantial memory demands. To alleviate this, we propose a novel memory-efficient training paradigm called Momentum Low-rank compression (MLorc). The key idea of MLorc is to compress and reconstruct the momentum of matrix parameters during training to reduce memory consumption. Compared to LoRA, MLorc avoids enforcing a fixed-rank constraint on weight update matrices and thus enables full-parameter learning. Compared to GaLore, MLorc directly compress the momentum rather than gradients, thereby better preserving the training dynamics of full-parameter fine-tuning. We provide a theoretical guarantee for its convergence under mild assumptions. Empirically, MLorc consistently outperforms other memory-efficient training methods, matches or even exceeds the performance of full fine-tuning at small ranks (e.g., $r=4$), and generalizes well across different optimizers, all while not compromising time or memory efficiency.", "link": "http://arxiv.org/abs/2506.01897v4", "date": "2026-04-06", "relevancy": 2.3192, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4788}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4611}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4516}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MLorc%3A%20Momentum%20Low-rank%20Compression%20for%20Memory%20Efficient%20Large%20Language%20Model%20Adaptation&body=Title%3A%20MLorc%3A%2 Mengfan%2520Xu%2520and%2520Jiawei%2520Zhang%2520and%2520Cong%2520Shen%26entry.1292438233%3DWith%2520increasing%2520size%2520of%2520large%2520language%2520models%2520%2528LLMs%2529%252C%2520full-parameter%2520fine-tuning%2520imposes%2520substantial%2520memory%2520demands.%2520To%2520alleviate%2520this%252C%2520we%2520propose%2520a%2520novel%2520memory-efficient%2520training%2520paradigm%2520called%2520Momentum%2520Low-rank%2520compression%2520%2528MLorc%2529.%2520The%2520key%2520idea%2520of%2520MLorc%2520is%2520to%2520compress%2520and%2520reconstruct%2520the%2520momentum%2520of%2520matrix%2520parameters%2520during%2520training%2520to%2520reduce%2520memory%2520consumption.%2520Compared%2520to%2520LoRA%252C%2520MLorc%2520avoids%2520enforcing%2520a%2520fixed-rank%2520constraint%2520on%2520weight%2520update%2520matrices%2520and%2520thus%2520enables%2520full-parameter%2520learning.%2520Compared%2520to%2520GaLore%252C%2520MLorc%2520directly%2520compress%2520the%2520momentum%2520rather%2520than%2520gradients%252C%2520thereby%2520better%2520preserving%2520the%2520training%2520dynamics%2520of%2520full-parameter%2520fine-tuning.%2520We%2520provide%2520a%2520theoretical%2520guarantee%2520for%2520its%2520convergence%2520under%2520mild%2520assumptions.%2520Empirically%252C%2520MLorc%2520consistently%2520outperforms%2520other%2520memory-efficient%2520training%2520methods%252C%2520matches%2520or%2520even%2520exceeds%2520the%2520performance%2520of%2520full%2520fine-tuning%2520at%2520small%2520ranks%2520%2528e.g.%252C%2520%2524r%253D4%2524%2529%252C%2520and%2520generalizes%2520well%2520across%2520different%2520optimizers%252C%2520all%2520while%2520not%2520compromising%2520time%2520or%2520memory%2520efficiency.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2506.01897v4%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MLorc%3A%20Momentum%20Low-rank%20Compression%20for%20Memory%20Effi {"title": "PointTPA: Dynamic Network Parameter Adaptation for 3D Scene Understanding", "author": "Siyuan Liu and Chaoqun Zheng and Xin Zhou and Tianrui Feng and Dingkang Liang and Xiang Bai", "abstract": "Scene-level point cloud understanding remains challenging due to diverse geometries, imbalanced category distributions, and highly varied spatial layouts. Existing methods improve object-level performance but rely on static network parameters during inference, limiting their adaptability to dynamic scene data. We propose PointTPA, a Test-time Parameter Adaptation framework that generates input-aware network parameters for scene-level point clouds. PointTPA adopts a Serialization-based Neighborhood Grouping (SNG) to form locally coherent patches and a Dynamic Parameter Projector (DPP) to produce patch-wise adaptive weights, enabling the backbone to adjust its behavior according to scene-specific variations while maintaining a low parameter overhead. Integrated into the PTv3 structure, PointTPA demonstrates strong parameter efficiency by introducing two lightweight modules of less than 2% of the backbone's parameters. Despite this minimal parameter overhead, PointTPA achieves 78.4% mIoU on ScanNet validation, surpassing existing parameter-efficient fine-tuning (PEFT) methods across multiple benchmarks, highlighting the efficacy of our test-time dynamic network parameter adaptation mechanism in enhancing 3D scene understanding. The code is available at https://github.com/H-EmbodVis/PointTPA.", "link": "http://arxiv.org/abs/2604.04933v1", "date": "2026-04-06", "relevancy": 2.3177, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5937}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5709}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.565}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PointTPA%3A%20Dynamic%20Network%20Parameter%20Adaptation%20for%203D%20Scene%20Understanding&body=Title%3A%20PointTPA%3A%20Dynamic%20Network%20Parameter%20Adaptation%20for%203D%20Scene%20Understanding%0AAuthor%3A%20Siyuan%20Liu%20and%20Chaoqun%20Zheng%20and%20Xin%20Zhou%20and%20Tianrui%20Feng%20and%20Dingkang%20Liang%20and%20Xiang%20Bai%0AAbstract%3A%20Scene-level%20point%20cloud%20understanding%20remains%20challenging%20due%20to%20diverse%20geometries%2C%20imbalanced%20category%20distributions%2C%20and%20highly%20varied%20spatial%20layouts.%20Existing%20methods%20improve%20object-level%20performance%20but%20rely%20on%20static%20network%20parameters%20during%20inference%2C%20limiting%20their%20adaptability%20to%20dynamic%20scene%20data.%20We%20propose%20PointTPA%2C%20a%20Test-time%20Parameter%20Adaptation%20framework%20that%20generates%20input-aware%20network%20parameters%20for%20scene-level%20point%20clouds.%20PointTPA%20adopts%20a%20Serialization-based%20Neighborhood%20Grouping%20%28SNG%29%20to%20form%20locally%20coherent%20patches%20and%20a%20Dynamic%20Parameter%20Projector%20%28DPP%29%20to%20produce%20patch-wise%20adaptive%20weights%2C%20enabling%20the%20backbone%20to%20adjust%20its%20behavior%20according%20to%20scene-specific%20variations%20while%20maintaining%20a%20low%20parameter%20overhead.%20Integrated%20into%20the%20PTv3%20structure%2C%20PointTPA%20demonstrates%20strong%20parameter%20efficiency%20by%20introducing%20two%20lightweight%20modules%20of%20less%20than%202%25%20of%20the%20backbone%27s%20parameters.%20Despite%20this%20minimal%20parameter%20overhead%2C%20PointTPA%20achieves%2078.4%25%20mIoU%20on%20ScanNet%20validation%2C%20surpassing%20existing%20parameter-efficient%20fine-tuning%20%28PEFT%29%20methods%20across%20multiple%20benchmarks%2C%20highlighting%20the%20efficacy%20of%20our%20test-time%20dynamic%20network%20parameter%20adaptation%20mechanism%20in%20enhancing%203D%20scene%20understanding.%20The%20code%20is%20available%20at%20https%3A//github.com/H-EmbodVis/PointTPA.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04933v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPointTPA%253A%2520Dynamic%2520Network%2520Parameter%2520Adaptation%2520for%25203D%2520Scene%2520Understanding%26entry.906535625%3DSiyuan%2520Liu%2520and%2520Chaoqun%2520Zheng%2520and%2520Xin%2520Zhou%2520and%2520Tianrui%2520Feng%2520and%2520Dingkang%2520Liang%2520and%2520Xiang%2520Bai%26entry.1292438233%3DScene-level%2520point%2520cloud%2520understanding%2520remains%2520challenging%2520due%2520to%2520diverse%2520geometries%252C%2520imbalanced%2520category%2520distributions%252C%2520and%2520highly%2520varied%2520spatial%2520layouts.%2520Existing%2520methods%2520improve%2520object-level%2520performance%2520but%2520rely%2520on%2520static%2520network%2520parameters%2520during%2520inference%252C%2520limiting%2520their%2520adaptability%2520to%2520dynamic%2520scene%2520data.%2520We%2520propose%2520PointTPA%252C%2520a%2520Test-time%2520Parameter%2520Adaptation%2520framework%2520that%2520generates%2520input-aware%2520network%2520parameters%2520for%2520scene-level%2520point%2520clouds.%2520PointTPA%2520adopts%2520a%2520Serialization-based%2520Neighborhood%2520Grouping%2520%2528SNG%2529%2520to%2520form%2520locally%2520coherent%2520patches%2520and%2520a%2520Dynamic%2520Parameter%2520Projector%2520%2528DPP%2529%2520to%2520produce%2520patch-wise%2520adaptive%2520weights%252C%2520enabling%2520the%2520backbone%2520to%2520adjust%2520its%2520behavior%2520according%2520to%2520scene-specific%2520variations%2520while%2520maintaining%2520a%2520low%2520parameter%2520overhead.%2520Integrated%2520into%2520the%2520PTv3%2520structure%252C%2520PointTPA%2520demonstrates%2520strong%2520parameter%2520efficiency%2520by%2520introducing%2520two%2520lightweight%2520modules%2520of%2520less%2520than%25202%2525%2520of%2520the%2520backbone%2527s%2520parameters.%2520Despite%2520this%2520minimal%2520parameter%2520overhead%252C%2520PointTPA%2520achieves%252078.4%2525%2520mIoU%2520on%2520ScanNet%2520validation%252C%2520surpassing%2520existing%2520parameter-efficient%2520fine-tuning%2520%2528PEFT%2529%2520methods%2520across%2520multiple%2520benchmarks%252C%2520highlighting%2520the%2520efficacy%2520of%2520our%2520test-time%2520dynamic%2520network%2520parameter%2520adaptation%2520mechanism%2520in%2520enhancing%25203D%2520scene%2520understanding.%2520The%2520code%2520is%2520available%2520at%2520https%253A//github.com/H-EmbodVis/PointTPA.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.04933v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=PointTPA%3A%20Dynamic%20Network%20Parameter%20Adaptation%20for%203D%20Scene%20Understanding&entry.906535625=Siyuan%20Liu%20and%20Chaoqun%20Zheng%20and%20Xin%20Zhou%20and%20Tianrui%20Feng%20and%20Dingkang%20Liang%20and%20Xiang%20Bai&entry.1292438233=Scene-level%20point%20cloud%20understanding%20remains%20challenging%20due%20to%20diverse%20geometries%2C%20imbalanced%20category%20distributions%2C%20and%20highly%20varied%20spatial%20layouts.%20Existing%20methods%20improve%20object-level%20performance%20but%20rely%20on%20static%20network%20parameters%20during%20inference%2C%20limiting%20their%20adaptability%20to%20dynamic%20scene%20data.%20We%20propose%20PointTPA%2C%20a%20Test-time%20Parameter%20Adaptation%20framework%20that%20generates%20input-aware%20network%20parameters%20for%20scene-level%20point%20clouds.%20PointTPA%20adopts%20a%20Serialization-based%20Neighborhood%20Grouping%20%28SNG%29%20to%20form%20locally%20coherent%20patches%20and%20a%20Dynamic%20Parameter%20Projector%20%28DPP%29%20to%20produce%20patch-wise%20adaptive%20weights%2C%20enabling%20the%20backbone%20to%20adjust%20its%20behavior%20according%20to%20scene-specific%20variations%20while%20maintaining%20a%20low%20parameter%20overhead.%20Integrated%20into%20the%20PTv3%20structure%2C%20PointTPA%20demonstrates%20strong%20parameter%20efficiency%20by%20introducing%20two%20lightweight%20modules%20of%20less%20than%202%25%20of%20the%20backbone%27s%20parameters.%20Despite%20this%20minimal%20parameter%20overhead%2C%20PointTPA%20achieves%2078.4%25%20mIoU%20on%20ScanNet%20validation%2C%20surpassing%20existing%20parameter-efficient%20fine-tuning%20%28PEFT%29%20methods%20across%20multiple%20benchmarks%2C%20highlighting%20the%20efficacy%20of%20our%20test-time%20dynamic%20network%20parameter%20adaptation%20mechanism%20in%20enhancing%203D%20scene%20understanding.%20The%20code%20is%20available%20at%20https%3A//github.com/H-EmbodVis/PointTPA.&entry.1838667208=http%3A//arxiv.org/abs/2604.04933v1&entry.124074799=Read"},
{"title": "Not All Tokens Matter: Towards Efficient LLM Reasoning via Token Significance in Reinforcement Learning", "author": "Hanbing Liu and Lang Cao and Yuanyi Ren and Mengyu Zhou and Haoyu Dong and Xiaojun Ma and Shi Han and Dongmei Zhang", "abstract": "Large language models (LLMs) show strong reasoning abilities but often produce unnecessarily long explanations that reduce efficiency. Although reinforcement learning (RL) has been used to improve reasoning, most methods focus on accuracy and rely on uniform length-based rewards that overlook the differing contributions of individual tokens, often harming correctness. We revisit length optimization in RL through the perspective of token significance. Observing that many chain-of-thought (CoT) tokens contribute little to the final answer, we introduce a significance-aware length reward that selectively penalizes insignificance tokens, reducing redundancy while preserving essential reasoning. We also propose a dynamic length reward that encourages more detailed reasoning early in training and gradually shifts toward conciseness as learning progresses. Integrating these components into standard policy optimization yields a framework that improves both reasoning efficiency and accuracy. Experiments across multiple benchmarks demonstrate substantial reductions in response length while preserving or improving correctness, highlighting the importance of modeling token significance for efficient LLM reasoning.", "link": "http://arxiv.org/abs/2506.08125v2", "date": "2026-04-06", "relevancy": 2.3172, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5034}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4434}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4434}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Not%20All%20Tokens%20Matter%3A%20Towards%20Efficient%20LLM%20Reasoning%20via%20Token%20Significance%20in%20Reinforcement%20Learning&body=Title%3A%20Not%20All%20Tokens%20Matter%3A%20Towards%20Efficient%20LLM%20Reasoning%20via%20Token%20Significance%20in%20Reinforcement%20Learning%0AAuthor%3A%20Hanbing%20Liu%20and%20Lang%20Cao%20and%20Yuanyi%20Ren%20and%20Mengyu%20Zhou%20and%20Haoyu%20Dong%20and%20Xiaojun%20Ma%20and%20Shi%20Han%20and%20Dongmei%20Zhang%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20show%20strong%20reasoning%20abilities%20but%20often%20produce%20unnecessarily%20long%20explanations%20that%20reduce%20efficiency.%20Although%20reinforcement%20learning%20%28RL%29%20has%20been%20used%20to%20improve%20reasoning%2C%20most%20methods%20focus%20on%20accuracy%20and%20rely%20on%20uniform%20length-based%20rewards%20that%20overlook%20the%20differing%20contributions%20of%20individual%20tokens%2C%20often%20harming%20correctness.%20We%20revisit%20length%20optimization%20in%20RL%20through%20the%20perspective%20of%20token%20significance.%20Observing%20that%20many%20chain-of-thought%20%28CoT%29%20tokens%20contribute%20little%20to%20the%20final%20answer%2C%20we%20introduce%20a%20significance-aware%20length%20reward%20that%20selectively%20penalizes%20insignificance%20tokens%2C%20reducing%20redundancy%20while%20preserving%20essential%20reasoning.%20We%20also%20propose%20a%20dynamic%20length%20reward%20that%20encourages%20more%20detailed%20reasoning%20early%20in%20training%20and%20gradually%20shifts%20toward%20conciseness%20as%20learning%20progresses.%20Integrating%20these%20components%20into%20standard%20policy%20optimization%20yields%20a%20framework%20that%20improves%20both%20reasoning%20efficiency%20and%20accuracy.%20Experiments%20across%20multiple%20benchmarks%20demonstrate%20substantial%20reductions%20in%20response%20length%20while%20preserving%20or%20improving%20correctness%2C%20highlighting%20the%20importance%20of%20modeling%20token%20significance%20for%20efficient%20LLM%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2506.08125v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNot%2520All%2520Tokens%2520Matter%253A%2520Towards%2520Efficient%2520LLM%2520Reasoning%2520via%2520Token%2520Significance%2520in%2520Reinforcement%2520Learning%26entry.906535625%3DHanbing%2520Liu%2520and%2520Lang%2520Cao%2520and%2520Yuanyi%2520Ren%2520and%2520Mengyu%2520Zhou%2520and%2520Haoyu%2520Dong%2520and%2520Xiaojun%2520Ma%2520and%2520Shi%2520Han%2520and%2520Dongmei%2520Zhang%26entry.1292438233%3DLarge%2520language%2520models%2520%2528LLMs%2529%2520show%2520strong%2520reasoning%2520abilities%2520but%2520often%2520produce%2520unnecessarily%2520long%2520explanations%2520that%2520reduce%2520efficiency.%2520Although%2520reinforcement%2520learning%2520%2528RL%2529%2520has%2520been%2520used%2520to%2520improve%2520reasoning%252C%2520most%2520methods%2520focus%2520on%2520accuracy%2520and%2520rely%2520on%2520uniform%2520length-based%2520rewards%2520that%2520overlook%2520the%2520differing%2520contributions%2520of%2520individual%2520tokens%252C%2520often%2520harming%2520correctness.%2520We%2520revisit%2520length%2520optimization%2520in%2520RL%2520through%2520the%2520perspective%2520of%2520token%2520significance.%2520Observing%2520that%2520many%2520chain-of-thought%2520%2528CoT%2529%2520tokens%2520contribute%2520little%2520to%2520the%2520final%2520answer%252C%2520we%2520introduce%2520a%2520significance-aware%2520length%2520reward%2520that%2520selectively%2520penalizes%2520insignificance%2520tokens%252C%2520reducing%2520redundancy%2520while%2520preserving%2520essential%2520reasoning.%2520We%2520also%2520propose%2520a%2520dynamic%2520length%2520reward%2520that%2520encourages%2520more%2520detailed%2520reasoning%2520early%2520in%2520training%2520and%2520gradually%2520shifts%2520toward%2520conciseness%2520as%2520learning%2520progresses.%2520Integrating%2520these%2520components%2520into%2520standard%2520policy%2520optimization%2520yields%2520a%2520framework%2520that%2520improves%2520both%2520reasoning%2520efficiency%2520and%2520accuracy.%2520Experiments%2520across%2520multiple%2520benchmarks%2520demonstrate%2520substantial%2520reductions%2520in%2520response%2520length%2520while%2520preserving%2520or%2520improving%2520correctness%252C%2520highlighting%2520the%2520importance%2520of%2520modeling%2520token%2520significance%2520for%2520efficient%2520LLM%2520reasoning.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2506.08125v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Not%20All%20Tokens%20Matter%3A%20Towards%20Efficient%20LLM%20Reasoning%20via%20Token%20Significance%20in%20Reinforcement%20Learning&entry.906535625=Hanbing%20Liu%20and%20Lang%20Cao%20and%20Yuanyi%20Ren%20and%20Mengyu%20Zhou%20and%20Haoyu%20Dong%20and%20Xiaojun%20Ma%20and%20Shi%20Han%20and%20Dongmei%20Zhang&entry.1292438233=Large%20language%20models%20%28LLMs%29%20show%20strong%20reasoning%20abilities%20but%20often%20produce%20unnecessarily%20long%20explanations%20that%20reduce%20efficiency.%20Although%20reinforcement%20learning%20%28RL%29%20has%20been%20used%20to%20improve%20reasoning%2C%20most%20methods%20focus%20on%20accuracy%20and%20rely%20on%20uniform%20length-based%20rewards%20that%20overlook%20the%20differing%20contributions%20of%20individual%20tokens%2C%20often%20harming%20correctness.%20We%20revisit%20length%20optimization%20in%20RL%20through%20the%20perspective%20of%20token%20significance.%20Observing%20that%20many%20chain-of-thought%20%28CoT%29%20tokens%20contribute%20little%20to%20the%20final%20answer%2C%20we%20introduce%20a%20significance-aware%20length%20reward%20that%20selectively%20penalizes%20insignificance%20tokens%2C%20 {"title": "Floralens: a Deep Learning Model for the Portuguese Native Flora", "author": "Ant\u00f3nio Filgueiras and Eduardo R. B. Marques and Lu\u00eds M. B. Lopes and Miguel Marques and Hugo Silva", "abstract": "Machine-learning techniques, especially deep convolutional neural networks, are pivotal for image-based identification of biological species in many Citizen Science platforms. In this paper, we describe the construction of a dataset for the Portuguese native flora based on publicly available research-grade datasets, and the derivation of a high-accuracy model from it using off-the-shelf deep convolutional neural networks. We anchored the dataset in high-quality data provided by Sociedade Portuguesa de Bot\u00e2nica and added further sampled data from research-grade datasets available from GBIF. We find that with a careful dataset design, off-the-shelf machine-learning cloud services such as Google's AutoML Vision produce accurate models, with results comparable to those of Pl@ntNet, a state-of-the-art citizen science platform. The best model we derived, dubbed Floralens, has been integrated into the public website of Project Biolens, where we gather models for other taxa as well. The dataset used to train the model is also publicly available on Zenodo.", "link": "http://arxiv.org/abs/2403.12072v4", "date": "2026-04-06", "relevancy": 2.2948, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4603}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4583}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4583}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Floralens%3A%20a%20Deep%20Learning%20Model%20for%20the% {"title": "Editing Physiological Signals in Videos Using Latent Representations", "author": "Tianwen Zhou and Akshay Paruchuri and Josef Spjut and Kaan Ak\u015fit", "abstract": "Camera-based physiological signal estimation provides a non-contact and convenient means to monitor Heart Rate (HR). However, the presence of vital signals in facial videos raises significant privacy concerns, as they can reveal sensitive personal information related to the health and emotional states of an individual. To address this, we propose a learned framework that edits physiological signals in videos while preserving visual fidelity. First, we encode an input video into a latent space via a pretrained 3D Variational Autoencoder (3D VAE), while a target HR prompt is embedded through a frozen text encoder. We fuse them using a set of trainable spatio-temporal layers with Adaptive Layer Normalizations (AdaLN) to capture the strong temporal coherence of remote Photoplethysmography (rPPG) signals. We apply Feature-wise Linear Modulation (FiLM) in the decoder with a fine-tuned output layer to avoid the degradation of physiological signals during reconstruction, enabling accurate physiological modulation in the reconstructed video. Empirical results show that our method preserves visual quality with an average PSNR of 38.96 dB and SSIM of 0.98 on selected datasets, while achieving an average HR modulation error of 10.00 bpm MAE and 10.09% MAPE using a state-of-the-art rPPG estimator. Our design's controllable HR editing is useful for applications such as anonymizing biometric signals in real videos or synthesizing realistic videos with desired vital signs.", "link": "http://arxiv.org/abs/2509.25348v3", "date": "2026-04-06", "relevancy": 2.2727, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5701}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5693}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5606}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Editing%20Physiological%20Signals%20in%20Videos%20Using%20Latent%20Representations&body=Title%3A%20Editing%20Physiological%20Signals%20in%20Videos%20Using%20Latent%20Representations%0AAuthor%3A%20Tianwen%20Zhou%20and%20Akshay%20Paruchuri%20and%20Josef%20Spjut%20and%20Kaan%20Ak%C5%9Fit%0AAbstract%3A%20Camera-based%20physiological%20signal%20estimation%20provides%20a%20non-contact%20and%20convenient%20means%20to%20monitor%20Heart%20Rate%20%28HR%29.%20However%2C%20the%20presence%20of%20vital%20signals%20in%20facial%20videos%20raises%20significant%20privacy%20concerns%2C%20as%20they%20can%20reveal%20sensitive%20personal%20information%20related%20to%20the%20health%20and%20emotional%20states%20of%20an%20individual.%20To%20address%20this%2C%20we%20propose%20a%20learned%20framework%20that%20edits%20physiological%20signals%20in%20videos%20while%20preserving%20visual%20fidelity.%20First%2C%20we%20encode%20an%20input%20video%20into%20a%20latent%20space%20via%20a%20pretrained%203D%20Variational%20Autoencoder%20%283D%20VAE%29%2C%20while%20a%20target%20HR%20prompt%20is%20embedded%20through%20a%20frozen%20text%20encoder.%20We%20fuse%20them%20using%20a%20set%20of%20trainable%20spatio-temporal%20layers%20with%20Adaptive%20Layer%20Normalizations%20%28AdaLN%29%20to%20capture%20the%20strong%20temporal%20coherence%20of%20remote%20Photoplethysmography%20%28rPPG%29%20signals.%20We%20apply%20Feature-wise%20Linear%20Modulation%20%28FiLM%29%20in%20the%20decoder%20with%20a%20fine-tuned%20output%20layer%20to%20avoid%20the%20degradation%20of%20physiological%20signals%20during%20reconstruction%2C%20enabling%20accurate%20physiological%20modulation%20in%20the%20reconstructed%20video.%20Empirical%20results%20show%20that%20our%20method%20preserves%20visual%20quality%20with%20an%20average%20PSNR%20of%2038.96%20dB%20and%20SSIM%20of%200.98%20on%20selected%20datasets%2C%20while%20achieving%20an%20average%20HR%20modulation%20error%20of%2010.00%20bpm%20MAE%20and%2010.09%25%20MAPE%20using%20a%20state-of-the-art%20rPPG%20estimator.%20Our%20design%27s%20controllable%20HR%20editing%20is%20useful%20for%20applications%20such%20as%20anonymizing%20biometric%20signals%20in%20real%20videos%20or%20synthesizing%20realistic%20videos%20with%20desired%20vital%20signs.%0ALink%3A%20http%3A//arxiv.org/abs/2509.25348v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEditing%2520Physiological%2520Signals%2520in%2520Videos%2520Using%2520Latent%2520Representations%26entry.906535625%3DTianwen%2520Zhou%2520and%2520Akshay%2520Paruchuri%2520and%2520Josef%2520Spjut%2520and%2520Kaan%2520Ak%25C5%259Fit%26entry.1292438233%3DCamera-based%2520physiological%2520signal%2520estimation%2520provides%2520a%2520non-contact%2520and%2520convenient%2520means%2520to%2520monitor%2520Heart%2520Rate%2520%2528HR%2529.%2520However%252C%2520the%2520presence%2520of%2520vital%2520signals%2520in%2520facial%2520videos%2520raises%2520significant%2520privacy%2520concerns%252C%2520as%2520they%2520can%2520reveal%2520sensitive%2520personal%2520information%2520related%2520to%2520the%2520health%2520and%2520emotional%2520states%2520of%2520an%2520individual.%2520To%2520address%2520this%252C%2520we%2520propose%2520a%2520learned%2520framework%2520that%2520edits%2520physiological%2520signals%2520in%2520videos%2520while%2520preserving%2520visual%2520fidelity.%2520First%252C%2520we%2520encode%2520an%2520input%2520video%2520into%2520a%2520latent%2520space%2520via%2520a%2520pretrained%25203D%2520Variational%2520Autoencoder%2520%25283D%2520VAE%2529%252C%2520while%2520a%2520target%2520HR%2520prompt%2520is%2520embedded%2520through%2520a%2520frozen%2520text%2520encoder.%2520We%2520fuse%2520them {"title": "Undetectable Conversations Between AI Agents via Pseudorandom Noise-Resilient Key Exchange", "author": "Vinod Vaikuntanathan and Or Zamir", "abstract": "AI agents are increasingly deployed to interact with other agents on behalf of users and organizations. We ask whether two such agents, operated by different entities, can carry out a parallel secret conversation while still producing a transcript that is computationally indistinguishable from an honest interaction, even to a strong passive auditor that knows the full model descriptions, the protocol, and the agents' private contexts. Building on recent work on watermarking and steganography for LLMs, we first show that if the parties possess an interaction-unique secret key, they can facilitate an optimal-rate covert conversation: the hidden conversation can exploit essentially all of the entropy present in the honest message distributions.\n  Our main contributions concern extending this to the keyless setting, where the agents begin with no shared secret. We show that covert key exchange, and hence covert conversation, is possible even when each model has an arbitrary private context, and their messages are short and fully adaptive, assuming only that sufficiently many individual messages have at least constant min-entropy. This stands in contrast to previous covert communication works, which relied on the min-entropy in each individual message growing with the security parameter. To obtain this, we introduce a new cryptographic primitive, which we call pseudorandom noise-resilient key exchange: a key-exchange protocol whose public transcript is pseudorandom while still remaining correct under constant noise. We study this primitive, giving several constructions relevant to our application as well as strong limitations showing that more naive variants are impossible or vulnerable to efficient attacks.\n  These results show that transcript auditing alone cannot rule out covert coordination between AI agents, and identify a new cryptographic theory that may be of independent interest.", "link": "http://arxiv.org/abs/2604.04757v1", "date": "2026-04-06", "relevancy": 2.2611, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4674}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4587}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4306}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Undetectable%20Conversations%20Between%20AI%20Agents%20via%20Pseudorandom%20Noise-Resilient%20Key%20Exchange&body=Title%3A%20Undetectable%20Conversations%20Between%20AI%20Agents%20via%20Pseudorandom%20Noise-Resilient%20Key%20Exchange%0AAuthor%3A%20Vinod%20Vaikuntanathan%20and%20Or%20Zamir%0AAbstract%3A%20AI%20agents%20are%20increasingly%20deployed%20to%20interact%20with%20other%20agents%20on%20behalf%20of%20users%20and%20organizations.%20We%20ask%20whether%20two%20such%20agents%2C%20operated%20by%20different%20entities%2C%20can%20carry%20out%20a%20parallel%20secret%20conversation%20while%20still%20producing%20a%20transcript%20that%20is%20computationally%20indistinguishable%20from%20an%20honest%20interaction%2C%20even%20to%20a%20strong%20passive%20auditor%20that%20knows%20the%20full%20model%20descriptions%2C%20the%20protocol%2C%20and%20the%20agents%27%20private%20contexts.%20Building%20on%20recent%20work%20on%20watermarking%20and%20steganography%20for%20LLMs%2C%20we%20first%20show%20that%20if%20the%20parties%20possess%20an%20interaction-unique%20secret%20key%2C%20they%20can%20facilitate%20an%20optimal-rate%20covert%20conversation%3A%20the%20hidden%20conversation%20can%20exploit%20essentially%20all%20of%20the%20entropy%20present%20in%20the%20honest%20message%20distributions.%0A%20%20Our%20main%20contributions%20concern%20extending%20this%20to%20the%20keyless%20setting%2C%20where%20the%20agents%20begin%20with%20no%20shared%20secret.%20We%20show%20that%20covert%20key%20exchange%2C%20and%20hence%20covert%20conversation%2C%20is%20possible%20even%20when%20each%20model%20has%20an%20arbitrary%20private%20context%2C%20and%20their%20messages%20are%20short%20and%20fully%20adaptive%2C%20assuming%20only%20that%20sufficiently%20many%20individual%20messages%20have%20at%20least%20constant%20min-entropy.%20This%20stands%20in%20contrast%20to%20previous%20covert%20communication%20works%2C%20which%20relied%20on%20the%20min-entropy%20in%20each%20individual%20message%20growing%20with%20the%20security%20parameter.%20To%20obtain%20this%2C%20we%20introduce%20a%20new%20cryptographic%20primitive%2C%20which%20we%20call%20pseudorandom%20noise-resilient%20key%20exchange%3A%20a%20key-exchange%20protocol%20whose%20public%20transcript%20is%20pseudorandom%20while%20still%20remaining%20correct%20under%20constant%20noise.%20We%20study%20this%20primitive%2C%20giving%20several%20constructions%20relevant%20to%20our%20application%20as%20well%20as%20strong%20limitations%20showing%20that%20more%20naive%20variants%20are%20impossible%20or%20vulnerable%20to%20efficient%20attacks.%0A%20%20These%20results%20show%20that%20transcript%20auditing%20alone%20cannot%20rule%20out%20covert%20coordination%20between%20AI%20agents%2C%20and%20identify%20a%20new%20cryptographic%20theory%20that%20may%20be%20of%20independent%20interest.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04757v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUndetectable%2520Conversations%2520Between%2520AI%2520Agents%2520via%2520Pseudorandom%2520Noise-Resilient%2520Key%2520Exchange%26entry.906535625%3DVinod%2520Vaikuntanathan%2520and%2520Or%2520Zamir%26entry.1292438233%3DAI%2520agents%2520are%2520increasingly%2520deployed%2520to%2520interact%2520with%2520other%2520agents%2520on%2520behalf y%2520parameter.%2520To%2520obtain%2520this%252C%2520we%2520introduce%2520a%2520new%2520cryptographic%2520primitive%252C%2520which%2520we%2520call%2520pseudorandom%2520noise-resilient%2520key%2520exchange%253A%2520a%2520key-exchange%2520protocol%2520whose%2520public%2520transcript%2520is%2520pseudorandom%2520while%2520still%2520remaining%2520correct%2520under%2520constant%2520noise.%2520We%2520study%2520this%2520primitive%252C%2520giving%2520several%2520constructions%2520relevant%2520to%2520our%2520application%2520as%2520well%2520as%2520strong%2520limitations%2520showing%2520that%2520more%2520naive%2520variants%2520are%2520impossible%2520or%2520vulnerable%2520to%2520efficient%2520attacks.%250A%2520%2520These%2520results%2520show%2520that%2520transcript%2520auditing%2520alone%2520cannot%2520rule%2520out%2520covert%2520coordination%2520between%2520AI%2520agents%252C%2520and%2520identify%2520a%2520new%2520cryptographic%2520theory%2520that%2520may%2520be%2520of%2520independent%2520interest.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.04757v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Undetectable%20Conversations%20Between%20AI%20Agents%20via%20Pseudorandom%20Noise-Resilient%20Key%20Exchange&entry.906535625=Vinod%20Vaikuntanathan%20and%20Or%20Zamir&entry.1292438233=AI%20agents%20are%20increasingly%20deployed%20to%20interact%20with%20other%20agents%20on%20behalf%20of%20users%20and%20organizations.%20We%20ask%20whether%20two%20such%20agents%2C%20operated%20by%20different%20entities%2C%20can%20carry%20out%20a%20parallel%20secret%20conversation%20while%20still%20producing%20a%20transcript%20that%20is%20computationally%20indistinguishable%20from%20an%20honest%20interaction%2C%20even%20to%20a%20strong%20passive%20auditor%20that%20knows%20the%20full%20model%20descriptions%2C%20the%20protocol%2C%20and%20the%20agents%27%20private%20contexts.%20Building%20on%20recen {"title": "How AI Aggregation Affects Knowledge", "author": "Daron Acemoglu and Tianyi Lin and Asuman Ozdaglar and James Siderius", "abstract": "Artificial intelligence (AI) changes social learning when aggregated outputs become training data for future predictions. To study this, we extend the DeGroot model by introducing an AI aggregator that trains on population beliefs and feeds synthesized signals back to agents. We define the learning gap as the deviation of long-run beliefs from the efficient benchmark, allowing us to capture how AI aggregation affects learning. Our main result identifies a threshold in the speed of updating: when the aggregator updates too quickly, there is no positive-measure set of training weights that robustly improves learning across a broad class of environments, whereas such weights exist when updating is sufficiently slow. We then compare global and local architectures. Local aggregators trained on proximate or topic-specific data robustly improve learning in all environments. Consequently, replacing specialized local aggregators with a single global aggregator worsens learning in at least one dimension of the state.", "link": "http://arxiv.org/abs/2604.04906v1", "date": "2026-04-06", "relevancy": 2.2374, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4554}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4443}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4427}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20How%20AI%20Aggregation%20Affects%20Knowledge&body=Title%3A%20How%20AI%20Aggregation%20Affects%20Knowledge%0AAuthor%3A%20Daron%20Acemoglu%20and%20Tianyi%20Lin%20and%20Asuman%20Ozdaglar%20and%20James%20Siderius%0AAbstract%3A%20Artificial%20intelligence%20%28AI%29%20changes%20social%20learning%20when%20aggregated%20outputs%20become%20training%20data%20for%20future%20predictions.%20To%20study%20this%2C%20we%20extend%20the%20DeGroot%20model%20by%20introducing%20an%20AI%20aggregator%20that%20trains%20on%20population%20beliefs%20and%20feeds%20synthesized%20signals%20back%20to%20agents.%20We%20define%20the%20learning%20gap%20as%20the%20deviation%20of%20long-run%20beliefs%20from%20the%20efficient%20benchmark%2C%20allowing%20us%20to%20capture%20how%20AI%20aggregation%20affects%20learning.%20Our%20main%20result%20identifies%20a%20threshold%20in%20the%20speed%20of%20updating%3A%20when%20the%20aggregator%20updates%20too%20quickly%2C%20there%20is%20no%20positive-measure%20set%20of%20training%20weights%20that%20robustly%20improves%20learning%20across%20a%20broad%20class%20of%20environments%2C%20whereas%20such%20weights%20exist%20when%20updating%20is%20sufficiently%20slow.%20We%20then%20compare%20global%20and%20local%20architectures.%20Local%20aggregators%20trained%20on%20proximate%20or%20topic-specific%20data%20robustly%20improve%20learning%20in%20all%20environments.%20Consequently%2C%20replacing%20specialized%20local%20aggregators%20with%20a%20single%20global%20aggregator%20worsens%20learning%20in%20at%20least%20one%20dimension%20of%20the%20state.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04906v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHow%2520AI%2520Aggregation%2520Affects%2520Knowledge%26entry.906535625%3DDaron%2520Acemoglu%2520and%2520Tianyi%2520Lin%2520and%2520Asuman%2520Ozdaglar%2520and%2520James%2520Siderius%26entry.1292438233%3DArtificial%2520intelligence%2520%2528AI%2529%2520changes%2520social%2520learning%2520when%2520aggregated%2520outputs%2520become%2520training%2520data%2520for%2520future%2520predictions.%2520To%2520study%2520this%252C%2520we%2520extend%2520the%2520DeGroot%2520model%2520by%2520introducing%2520an%2520AI%2520aggregator%2520that%2520trains%2520on%2520population%2520beliefs%2520and%2520feeds%2520synthesized%2520signals%2520back%2520to%2520agents.%2520We%2520define%2520the%2520learning%2520gap%2520as%2520the%2520deviation%2520of%2520long-run%2520beliefs%2520from%2520the%2520efficient%2520benchmark%252C%2520allowing%2520us%2520to%2520capture%2520how%2520AI%2520aggregation%2520affects%2520learning.%2520Our%2520main%2520result%2520identifies%2520a%2520threshold%2520in%2520the%2520speed%2520of%2520updating%253A%2520when%2520the%2520aggregator%2520updates%2520too%2520quickly%252C%2520there%2520is%2520no%2520positive-measure%2520set%2520of%2520training%2520weights%2520that%2520robustly%2520improves%2520learning%2520across%2520a%2520broad%2520class%2520of%2520environments%252C%2520whereas%2520such%2520weights%2520exist%2520when%2520updating%2520is%2520sufficiently%2520slow.%2520We%2520then%2520compare%2520global%2520and%2520local%2520architectures.%2520Local%2520aggregators%2520trained%2520on%2520proximate%2520or%2520topic-specific%2520data%2520robustly%2520improve%2520learning%2520in%2520all%2520environments.%2520Consequently%252C%2520replacing%2520specialized%2520local%2520aggregators%2520with%2520a%2520single%2520global%2520aggregator%2520worsens%2520learning%2520in%2520at%2520least%2520one%2520dimension%2520of%2520the%2520state.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.04906v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=How%20AI%20Aggregation%20Affects%20Knowledge&entry.906535625=Daron%20Acemoglu%20and%20Tianyi%20Lin%20and%20Asuman%20Ozdaglar%20and%20James%20Siderius&entry.1292438233=Artificial%20intelligence%20%28AI%29%20changes%20social%20learning%20when%20aggregated%20outputs%20become%20training%20data%20for%20future%20predictions.%20To%20study%20this%2C%20we%20extend%20the%20DeGroot%20model%20by%20introducing%20an%20AI%20aggregator%20that%20trains%20on%20population {"title": "Partially deterministic sampling for compressed sensing with denoising guarantees", "author": "Yaniv Plan and Matthew S. Scott and Ozgur Yilmaz", "abstract": "We study compressed sensing when the sampling vectors are chosen from the rows of a unitary matrix. In the literature, these sampling vectors are typically chosen randomly; the use of randomness has enabled major empirical and theoretical advances in the field. However, in practice there are often certain crucial sampling vectors, in which case practitioners will depart from the theory and sample such rows deterministically. In this work, we derive an optimized sampling scheme for Bernoulli selectors which naturally combines random and deterministic selection of rows, thus rigorously deciding which rows should be sampled deterministically. This sampling scheme provides measurable improvements in image compressed sensing for both generative and sparse priors when compared to with-replacement and without-replacement sampling schemes, as we show with theoretical results and numerical experiments. Additionally, our theoretical guarantees feature improved sample complexity bounds compared to previous works, and novel denoising guarantees in this setting.", "link": "http://arxiv.org/abs/2604.04802v1", "date": "2026-04-06", "relevancy": 2.232, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4484}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4477}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.443}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Partially%20deterministic%20sampling%20for%20compressed%20sensing%20with%20denoising%20guarantees&body=Title%3 {"title": "Individual and Combined Effects of English as a Second Language and Typos on LLM Performance", "author": "Serena Liu and Yutong Yang and Prisha Sheth and Weixuan Dong and Mingjiao Diao and Xinru Zhu and Nikhil Banga and Oscar Melendez and Arnav Sharma and Minda Zhao and Marina Lin and Mengyu Wang", "abstract": "Large language models (LLMs) are used globally, and because much of their training data is in English, they typically perform best on English inputs. As a result, many non-native English speakers interact with them in English as a second language (ESL), and these inputs often contain typographical errors. Prior work has largely studied the effects of ESL variation and typographical errors separately, even though they often co-occur in real-world use. In this study, we use the Trans-EnV framework to transform standard English inputs into eight ESL variants and apply MulTypo to inject typos at three levels: low, moderate, and severe. We find that combining ESL variation and typos generally leads to larger performance drops than either factor alone, though the combined effect is not simply additive. This pattern is clearest on closed-ended tasks, where performance degradation can be characterized more consistently across ESL variants and typo levels, while results on open-ended tasks are more mixed. Overall, these findings suggest that evaluations on clean standard English may overestimate real-world model performance, and that evaluating ESL variation and typographical errors in isolation does not fully capture model behavior in realistic settings.", "link": "http://arxiv.org/abs/2604.04723v1", "date": "2026-04-06", "relevancy": 2.2294, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.449}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.449}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4397}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Individual%20and%20Combined%20Effects%20of%20English%20as%20a%20Second%20Language%20and%20Typos%20on%20LLM%20Performance&body=Title%3A%20Individual%20and%20Combined%20Effects%20of%20English%20as%20a%20Second%20Language%20and%20Typos%20on%20LLM%20Performance%0AAuthor%3A%20Serena%20Liu%20and%20Yutong%20Yang%20and%20Prisha%20Sheth%20and%20Weixuan%20Dong%20and%20Mingjiao%20Diao%20and%20Xinru%20Zhu%20and%20Nikhil%20Banga%20and%20Oscar%20Melendez%20and%20Arnav%20Sharma%20and%20Minda%20Zhao%20and%20Marina%20Lin%20and%20Mengyu%20Wang%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20are%20used%20globally%2C%20and%20because%20much%20of%20their%20training%20data%20is%20in%20English%2C%20they%20typically%20perform%20best%20on%20English%20inputs.%20As%20a%20result%2C%20many%20non-native%20English%20speakers%20interact%20with%20them%20in%20English%20as%20a%20second%20language%20%28ESL%29%2C%20and%20these%20inputs%20often%20contain%20typographical%20errors.%20Prior%20work%20has%20largely%20studied%20the%20effects%20of%20ESL%20variation%20and%20typographical%20errors%20separately%2C%20even%20though%20they%20often%20co-occur%20in%20real-world%20use.%20In%20this%20study%2C%20we%20use%20the%20Trans-EnV%20framework%20to%20transform%20standard%20English%20inputs%20into%20eight%20ESL%20variants%20and%20apply%20MulTypo%20to%20inject%20typos%20at%20three%20levels%3A%20low%2C%20moderate%2C%20and%20severe.%20We%20find%20that%20combining%20ESL%20variation%20and%20typos%20generally%20leads%20to%20larger%20performance%20drops%20than%20either%20factor%20alone%2C%20though%20the%20combined%20effect%20is%20not%20simply%20additive.%20This%20pattern%20is%20clearest%20on%20closed-ended%20tasks%2C%20where%20performance%20degradation%20can%20be%20characterized%20more%20consistently%20across%20ESL%20variants%20and%20typo%20levels%2C%20while%20results%20on%20open-ended%20tasks%20are%20more%20mixed.%20Overall%2C%20these%20findings%20suggest%20that%20evaluations%20on%20clean%20standard%20English%20may%20overestimate%20real-world%20model%20performance%2C%20and%20that%20evaluating%20ESL%20variation%20and%20typographical%20errors%20in%20isolation%20does%20not%20fully%20capture%20model%20behavior%20in%20realistic%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04723v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIndividual%2520and%2520Combined%2520Effects%2520of%2520English%2520as%2520a%2520Second%2520Language%2520and%2520Typos%2520on%2520LLM%2520Performance%26entry.906535625%3DSerena%2520Liu%2520and%2520Yutong%2520Yang%2520and%2520Prisha%2520Sheth%2520and%2520Weixuan%2520Dong%2520and%2520Mingjiao%2520Diao%2520and%2520Xinru%2520Zhu%2520and%2520Nikhil%2520Banga%2520and%2520Oscar%2520Melendez%2520and%2520Arnav%2520Sharma%2520and%2520Minda%2520Zhao%2520and%2520Marina%2520Lin%2520and%2520Mengyu%2520Wang%26entry.1292438233%3DLarge%2520language%2520models%2520%2528LLMs%2529%2520are%2520used%2520globally%252C%2520and%2520because%2520much%2520of%2520their%2520training%2520data%2520is%2520in%2520English%252C%2520they%2520typically%2520perform%2520best%2520on%2520English%2520inputs.%2520As%2520a%2520result%252C%2520many%2520non-native%2520English%2520speakers%2520interact%2520with%2520them%2520in%2520English%2520as%2520a%2520second%2520language%2520%2528ESL%2529%252C%2520and%2520these%2520inputs%2520often%2520contain%2520typographical%2520errors.%2520Prior%2520work%2520has%2520largely%2520studied%2520the%2520effects%2520of%2520ESL%2520variation%2520and%2520typographical%2520errors%2520separately%252C%2520even%2520though%2520they%2520often%2520co-occur%2520in%2520real-world%2520use.%2520In%2520this%2520study%252C%2520we%2520use%2520the%2520Trans-EnV%2520fram {"title": "Less Detail, Better Answers: Degradation-Driven Prompting for VQA", "author": "Haoxuan Han and Weijie Wang and Zeyu Zhang and Yefei He and Bohan Zhuang", "abstract": "Recent advancements in Vision-Language Models (VLMs) have significantly pushed the boundaries of Visual Question Answering (VQA).However,high-resolution details can sometimes become noise that leads to hallucinations or reasoning errors. In this paper,we propose Degradation-Driven Prompting (DDP), a novel framework that improves VQA performance by strategically reducing image fidelity to force models to focus on essential structural information. We evaluate DDP across two distinct tasks. Physical attributes targets images prone to human misjudgment, where DDP employs a combination of 80p downsampling, structural visual aids (white background masks and orthometric lines), and In-Context Learning (ICL) to calibrate the model's focus. Perceptual phenomena addresses various machine-susceptible visual anomalies and illusions, including Visual Anomaly (VA), Color (CI), Motion(MI),Gestalt (GI), Geometric (GSI), and Visual Illusions (VI).For this task, DDP integrates a task-classification stage with specialized tools such as blur masks and contrast enhancement alongside downsampling. Our experimental results demonstrate that less is more: by intentionally degrading visual inputs and providing targeted structural prompts, DDP enables VLMs to bypass distracting textures and achieve superior reasoning accuracy on challenging visual benchmarks.", "link": "http://arxiv.org/abs/2604.04838v1", "date": "2026-04-06", "relevancy": 2.2066, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5557}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5557}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5314}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Less%20Detail%2C%20Better%20Answers%3A%20Degradation-Driven%20Prompting%20for%20VQA&body=Title%3A%20Less%20Detail%2C%20Better%20Answers%3A%20Degradation-Driven%20Prompting%20for%20VQA%0AAuthor%3A%20Haoxuan%20Han%20and%20Weijie%20Wang%20and%20Zeyu%20Zhang%20and%20Yefei%20He%20and%20Bohan%20Zhuang%0AAbstract%3A%20Recent%20advancements%20in%20Vision-Language%20Models%20%28VLMs%29%20have%20significantly%20pushed%20the%20boundaries%20of%20Visual%20Question%20Answering%20%28VQA%29.However%2Chigh-resolution%20details%20can%20sometimes%20become%20noise%20that%20leads%20to%20hallucinations%20or%20reasoning%20errors.%20In%20this%20paper%2Cwe%20propose%20Degradation-Driven%20Prompting%20%28DDP%29%2C%20a%20novel%20framework%20that%20improves%20VQA%20performance%20by%20strategically%20reducing%20image%20fidelity%20to%20force%20models%20to%20focus%20on%20essential%20structural%20information.%20We%20evaluate%20DDP%20across%20two%20distinct%20tasks.%20Physical%20attributes%20targets%20images%20prone%20to%20human%20misjudgment%2C%20where%20DDP%20employs%20a%20combination%20of%2080p%20downsampling%2C%20structural%20visual%20aids%20%28white%20background%20masks%20and%20orthometric%20lines%29%2C%20and%20In-Context%20Learning%20%28ICL%29%20to%20calibrate%20the%20model%27s%20focus.%20Perceptual%20phenomena%20addresses%20various%20machine-susceptible%20visual%20anomalies%20and%20illusions%2C%20including%20Visual%20Anomaly%20%28VA%29%2C%20Color%20%28CI%29%2C%20Motion%28MI%29%2CGestalt%20%28GI%29%2C%20Geometric%20%28GSI%29%2C%20and%20Visual%20Illusions%20%28VI%29.For%20this%20task%2C%20DDP%20integrates%20a%20task-classification%20stage%20with%20specialized%20tools%20such%20as%20blur%20masks%20and%20contrast%20enhancement%20alongside%20downsampling.%20Our%20experimental%20results%20demonstrate%20that%20less%20is%20more%3A%20by%20intentionally%20degrading%20visual%20inputs%20and%20providing%20targeted%20structural%20prompts%2C%20DDP%20enables%20VLMs%20to%20bypass%20distracting%20textures%20and%20achieve%20superior%20reasoning%20accuracy%20on%20challenging%20visual%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04838v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLess%2520Detail%252C%2520Better%2520Answers%253A%2520Degradation-Driven%2520Prompting%2520for%2520VQA%26entry.906535625%3DHaoxuan%2520Han%2520and%2520Weijie%2520Wang%2520and%2520Zeyu%2520Zhang%2520and%2520Yefei%2520He%2520and%2520Bohan%2520Zhuang%26entry.1292438233%3DRecent%2520advancements%2520in%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520have%2520significantly%2520pushed%2520the%2520boundaries%2520of%2520Visual%2520Question%2520Answering%2520%2528VQA%2529.However%252Chigh-resolution%2520details%2520can%2520sometimes%2520become%2520noise%2520that%2520leads%2520to%2520hallucinations%2520or%2520reasoning%2520errors.%2520In%2520this%2520paper%252Cwe%2520propose%2520Degradation-Driven%2520Prompting%2520%2528DDP%2529%252C%2520a%2520novel%2520framework%2520that%2520improves%2520VQA%2520performance%2520by%2520strategically%2520reducing%2520image%2520fidelity%2520to%2520force%2520models%2520to%2520focus%2520on%2520essential%2520structural%2520information.%2520We%2520evaluate%2520DDP%2520across%2520two%2520distinct%2520tasks.%2520Physical%2520attributes%2520targets%2520images%2520prone%2520to%2520human%2520misjudgment%252C%2520where%2520DDP%2520employs%2520a%2520combination%2520of%252080p%2520downsampling%252C%2520structural%2520visual%2520aids%2520%2528white%2520background%2520masks%2520and%2520orthometric%2520lines%2529%252C%2520and%2520In-Context%2520Learning%2520%2528ICL%2529%2520to%2520calibrate%2520the%2520model%2527s%2520focus.%2520Perceptual%2520phenomena%2520addresses%2520various%2520machine-susceptible%2520visua

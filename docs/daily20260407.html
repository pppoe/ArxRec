{"title": "Forgetting to Witness: Efficient Federated Unlearning and Its Visible Evaluation", "author": "Houzhe Wang and Xiaojie Zhu and Chi Chen", "abstract": "With the increasing importance of data privacy and security, federated unlearning has emerged as a novel research field dedicated to ensuring that federated learning models no longer retain or leak relevant information once specific data has been deleted. In this paper, to the best of our knowledge, we propose the first complete pipeline for federated unlearning, which includes a federated unlearning approach and an evaluation framework. Our proposed federated unlearning approach ensures high efficiency and model accuracy without the need to store historical data.It effectively leverages the knowledge distillation model alongside various optimization mechanisms. Moreover, we propose a framework named Skyeye to visualize the forgetting capacity of federated unlearning models. It utilizes the federated unlearning model as the classifier integrated into a Generative Adversarial Network (GAN). Afterward, both the classifier and discriminator guide the generator in generating samples. Throughout this process, the generator learns from the classifier's knowledge. The generator then visualizes this knowledge through sample generation. Finally, the model's forgetting capability is evaluated based on the relevance between the deleted data and the generated samples. Comprehensive experiments are conducted to illustrate the effectiveness of the proposed federated unlearning approach and the corresponding evaluation framework.", "link": "http://arxiv.org/abs/2604.04800v1", "date": "2026-04-06", "relevancy": 1.9993, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5184}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5124}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4798}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Forgetting%20to%20Witness%3A%20Efficient%20Federated%20Unlearning%20and%20Its%20Visible%20Evaluation&body=Title%3A%20Forgetting%20to%20Witness%3A%20Efficient%20Federated%20Unlearning%20and%20Its%20Visible%20Evaluation%0AAuthor%3A%20Houzhe%20Wang%20and%20Xiaojie%20Zhu%20and%20Chi%20Chen%0AAbstract%3A%20With%20the%20increasing%20importance%20of%20data%20privacy%20and%20security%2C%20federated%20unlearning%20has%20emerged%20as%20a%20novel%20research%20field%20dedicated%20to%20ensuring%20that%20federated%20learning%20models%20no%20longer%20retain%20or%20leak%20relevant%20information%20once%20specific%20data%20has%20been%20deleted.%20In%20this%20paper%2C%20to%20the%20best%20of%20our%20knowledge%2C%20we%20propose%20the%20first%20complete%20pipeline%20for%20federated%20unlearning%2C%20which%20includes%20a%20federated%20unlearning%20approach%20and%20an%20evaluation%20framework.%20Our%20proposed%20federated%20unlearning%20approach%20ensures%20high%20efficiency%20and%20model%20accuracy%20without%20the%20need%20to%20store%20historical%20data.It%20effectively%20leverages%20the%20knowledge%20distillation%20model%20alongside%20various%20optimization%20mechanisms.%20Moreover%2C%20we%20propose%20a%20framework%20named%20Skyeye%20to%20visualize%20the%20forgetting%20capacity%20of%20federated%20unlearning%20models.%20It%20utilizes%20the%20federated%20unlearning%20model%20as%20the%20classifier%20integrated%20into%20a%20Generative%20Adversarial%20Network%20%28GAN%29.%20Afterward%2C%20both%20the%20classifier%20and%20discriminator%20guide%20the%20generator%20in%20generating%20samples.%20Throughout%20this%20process%2C%20th {"title": "An Information-Theoretic Analysis of OOD Generalization in Meta-Reinforcement Learning", "author": "Xingtu Liu", "abstract": "In this work, we study out-of-distribution (OOD) generalization in meta-reinforcement learning from an information-theoretic perspective. We begin by establishing OOD generalization bounds for meta-supervised learning under two distinct distribution shift scenarios: standard distribution mismatch and a broad-to-narrow training setting. Building on this foundation, we formalize the generalization problem in meta-reinforcement learning and establish fine-grained generalization bounds that exploit the structure of Markov Decision Processes. Lastly, we analyze the generalization performance of a gradient-based meta-reinforcement learning algorithm.", "link": "http://arxiv.org/abs/2510.23448v2", "date": "2026-04-06", "relevancy": 1.7806, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4544}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.45}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4365}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20An%20Information-Theoretic%20Analysis%20of%20OOD%20Generalization%20in%20Meta-Reinforcement%20Learning&body=Title%3A%20An%20Information-Theoretic%20Analysis%20of%20OOD%20Generalization%20in%20Meta-Reinforcement%20Learning%0AAuthor%3A%20Xingtu%20Liu%0AAbstract%3A%20In%20this%20work%2C%20we%20study%20out-of-distribution%20%28OOD%29%20generalization%20in%20meta-reinforcement%20learning%20from%20an%20information-theoretic%20perspective.%20We%20begin%20by%20establ       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

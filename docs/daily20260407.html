{"title": "What Makes Good Multilingual Reasoning? Disentangling Reasoning Traces with Measurable Features", "author": "Dayeon Ki and Kevin Duh and Marine Carpuat", "abstract": "Large Reasoning Models (LRMs) still exhibit large performance gaps between English and other languages, yet much current work assumes these gaps can be closed simply by making reasoning in every language resemble English reasoning. This work challenges this assumption by asking instead: what actually characterizes effective reasoning in multilingual settings, and to what extent do English-derived reasoning features genuinely help in other languages? We first define a suite of measurable reasoning features spanning multilingual alignment, reasoning step, and reasoning flow aspects of reasoning traces, and use logistic regression to quantify how each feature associates with final answer accuracy. We further train sparse autoencoders over multilingual traces to automatically discover latent reasoning concepts that instantiate or extend these features. Finally, we use the features as test-time selection policies to examine whether they can steer models toward stronger multilingual reasoning. Across two mathematical reasoning benchmarks, four LRMs, and 10 languages, we find that most features are positively associated with accuracy, but the strength of association varies considerably across languages and can even reverse in some. Our findings challenge English-centric reward designs and point toward adaptive objectives that accommodate language-specific reasoning patterns, with concrete implications for multilingual benchmark and reward design.", "link": "http://arxiv.org/abs/2604.04720v1", "date": "2026-04-06", "relevancy": 2.063, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5284}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5284}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4523}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20What%20Makes%20Good%20Multilingual%20Reasoning%3F%20Disentangling%20Reasoning%20Traces%20with%20Measurable%20Features&body=Title%3A%20What%20Makes%20Good%20Multilingual%20Reasoning%3F%20Disentangling%20Reasoning%20Traces%20with%20Measurable%20Features%0AAuthor%3A%20Dayeon%20Ki%20and%20Kevin%20Duh%20and%20Marine%20Carpuat%0AAbstract%3A%20Large%20Reasoning%20Models%20%28LRMs%29%20still%20exhibit%20large%20performance%20gaps%20between%20English%20and%20other%20languages%2C%20yet%20much%20current%20work%20assumes%20these%20gaps%20can%20be%20closed%20simply%20by%20making%20reasoning%20in%20every%20language%20resemble%20English%20reasoning.%20This%20work%20challenges%20this%20assumption%20by%20asking%20instead%3A%20what%20actually%20characterizes%20effective%20reasoning%20in%20multilingual%20settings%2C%20and%20to%20what%20extent%20do%20English-derived%20reasoning%20features%20genuinely%20help%20in%20other%20languages%3F%20We%20first%20define%20a%20suite%20of%20measurable%20reasoning%20features%20spanning%20multilingual%20alignment%2C%20reasoning%20step%2C%20and%20reasoning%20flow%20aspects%20of%20reasoning%20traces%2C%20and%20use%20logistic%20regression%20to%20quantify%20how%20each%20feature%20associates%20with%20final%20answer%20accuracy.%20We%20further%20train%20sparse%20autoencoders%20over%20multilingual%20traces%20to%20automatically%20discover%20latent%20reasoning%20concepts%20that%20instantiate%20or%20extend%20these%20features.%20Finally%2C%20we%20use%20the%20features%20as%20test-time%20selection%20policies%20to%20examine%20whether%20they%20can%20steer%20models%20toward%20stronger%20multilingual%20reasoning.%20Across%20two%20mathematical%20reasoning%20benchmarks%2C%20four%20LRMs%2C%20and%2010%20languages%2C%20we%20find%20that%20most%20features%20are%20positively%20associated%20with%20accuracy%2C%20but%20the%20strength%20of%20association%20varies%20considerably%20across%20languages%20and%20can%20even%20reverse%20in%20some.%20Our%20findings%20challenge%20English-centric%20reward%20designs%20and%20point%20toward%20adaptive%20objectives%20that%20accommodate%20language-specific%20reasoning%20patterns%2C%20with%20concrete%20implications%20for%20multilingual%20benchmark%20and%20reward%20design.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04720v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhat%2520Makes%2520Good%2520Multilingual%2520Reasoning%253F%2520Disentangling%2520Reasoning%2520Traces%2520with%2520Measurable%2520Features%26entry.906535625%3DDayeon%2520Ki%2520and%2520Kevin%2520Duh%2520and%2520Marine%2520Carpuat%26entry.1292438233%3DLarge%2520Reasoning%2520Models%2520%2528LRMs%2529%2520still%2520exhibit%2520large%2520performance%2520gaps%2520between%2520English%2520and%2520other%2520languages%252C%2520yet%2520much%2520current%2520work%2520assumes%2520these%2520gaps%2520can%2520be%2520closed%2520simply%2520by%2520making%2520reasoning%2520in%2520every%2520language%2520resemble%2520English%2520reasoning.%2520This%2520work%2520challenges%2520this%2520assumption%2520by%2520asking%2520instead%253A%2520what%2520actually%2520characterizes%2520effective%2520reasoning%2520in%2520multilingual%2520settings%252C%2520and%2520to%2520what%2520extent%2520do%2520English-derived%2520reasoning%2520features%2520genuinely%2520help%2520in%2520other%2520languages%253F%2520We%2520first%2520define%2520a%2520suite%2520of%2520measurable%2520reasoning%2520features%2520spanning%2520multilingual%2520alignment%252C%2520reasoning%2520step%252C%2520and%2520reasoning%2520flow%2520aspects%2520of%2520reasoning%2520traces%252C%2520and%2520use%2520logistic%2520regre {"title": "HAG: Hierarchical Demographic Tree-based Agent Generation for Topic-Adaptive Simulation", "author": "Rongxin Chen and Tianyu Wu and Bingbing Xu and Jiatang Luo and Xiucheng Xu and Huawei Shen", "abstract": "High-fidelity agent initialization is crucial for credible Agent-Based Modeling across diverse domains. A robust framework should be Topic-Adaptive, capturing macro-level joint distributions while ensuring micro-level individual rationality. Existing approaches fall into two categories: static data-based retrieval methods that fail to adapt to unseen topics absent from the data, and LLM-based generation methods that lack macro-level distribution awareness, resulting in inconsistencies between micro-level persona attributes and reality. To address these problems, we propose HAG, a Hierarchical Agent Generation framework that formalizes population generation as a two-stage decision process. Firstly, utilizing a World Knowledge Model to infer hierarchical conditional probabilities to construct the Topic-Adaptive Tree, achieving macro-level distribution alignment. Then, grounded real-world data, instantiation and agentic augmentation are carried out to ensure micro-level consistency. Given the lack of specialized evaluation, we establish a multi-domain benchmark and a comprehensive PACE evaluation framework. Extensive experiments show that HAG significantly outperforms representative baselines, reducing population alignment errors by an average of 37.7% and enhancing sociological consistency by 18.8%.", "link": "http://arxiv.org/abs/2601.05656v3", "date": "2026-04-06", "relevancy": 2.0498, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5292}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5095}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4779}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HAG%3A%20Hierarchical%20Demographic%20Tree-based%20Agent%20Generation%20for%20Topic-Adaptive%20Simulation&body=Title%3A%20HAG%3A%20Hierarchical%20Demographic%20Tree-based%20Agent%20Generation%20for%20Topic-Adaptive%20Simulation%0AAuthor%3A%20Rongxin%20Chen%20and%20Tianyu%20Wu%20and%20Bingbing%20Xu%20and%20Jiatang%20Luo%20and%20Xiucheng%20Xu%20and%20Huawei%20Shen%0AAbstract%3A%20High-fidelity%20agent%20initialization%20is%20crucial%20for%20credible%20Agent-Based%20Modeling%20across%20diverse%20domains.%20A%20robust%20framework%20should%20be%20Topic-Adaptive%2C%20capturing%20macro-level%20joint%20distributions%20while%20ensuring%20micro-level%20individual%20rationality.%20Existing%20approaches%20fall%20into%20two%20categories%3A%20static%20data-based%20retrieval%20methods%20that%20fail%20to%20adapt%20to%20unseen%20topics%20absent%20from%20the%20data%2C%20and%20LLM-based%20generation%20methods%20that%20lack%20macro-level%20distribution%20awareness%2C%20resulting%20in%20inconsistencies%20between%20micro-level%20persona%20attributes%20and%20reality.%20To%20address%20these%20problems%2C%20we%20propose%20HAG%2C%20a%20Hierarchical%20Agent%20Generation%20framework%20that%20formalizes%20population%20generation%20as%20a%20two-stage%20decision%20process.%20Firstly%2C%20utilizing%20a%20World%20Knowledge%20Model%20to%20infer%20hierarchical%20conditional%20probabilities%20to%20construct%20the%20Topic-Adaptive%20Tree%2C%20achieving%20macro-level%20distribution%20alignment.%20Then%2C%20grounded%20real-world%20data%2C%20instantiation%20and%20agentic%20augmentation%20are%20carried%20out%20to%20ensure%20micro-level%20consistency.%20Given%20the%20lack%20of%20specialized%20evaluation%2C%20we%20establish%20a%20multi-domain%20benchmark%20and%20a%20comprehensive%20PACE%20evaluation%20framework.%20Extensive%20experiments%20show%20that%20HAG%20significantly%20outperforms%20representative%20baselines%2C%20reducing%20population%20alignment%20errors%20by%20an%20average%20of%2037.7%25%20and%20enhancing%20sociological%20consistency%20by%2018.8%25.%0ALink%3A%20http%3A//arxiv.org/abs/2601.05656v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHAG%253A%2520Hierarchical%2520Demographic%2520Tree-based%2520Agent%2520Generation%2520for%2520Topic-Adaptive%2520Simulation%26entry.906535625%3DRongxin%2520Chen%2520and%2520Tianyu%2520Wu%2520and%2520Bingbing%2520Xu%2520and%2520Jiatang%2520Luo%2520and%2520Xiucheng%2520Xu%2520and%2520Huawei%2520Shen%26entry.1292438233%3DHigh-fidelity%2520agent%2520initialization%2520is%2520crucial%2520for%2520credible%2520Agent-Based%2520Modeling%2520across%2520diverse%2520domains.%2520A%2520robust%2520framework%2520should%2520be%2520Topic-Adaptive%252C%2520capturing%2520macro-level%2520joint%2520distributions%2520while%2520ensuring%2520micro-level%2520individual%2520rationality.%2520Existing%2520approaches%2520fall%2520into%2520two%2520categories%253A%2520static%2520data-based%2520retrieval%2520methods%2520that%2520fail%2520to%2520adapt%2520to%2520unseen%2520topics%2520absent%2520from%2520the%2520data%252C%2520and%2520LLM-based%2520generation%2520methods%2520that%2520lack%2520macro-level%2520distribution%2520awareness%252C%2520resulting%2520in%2520inconsistencies%2520between%2520micro-level%2520persona%2520attributes%2520and%2520reality.%2520To%2520address%2520these%2520problems%252C%2520we%2520propose%2520HAG%252C%2520a%2520Hierarchical%2520Agent%2520Generation%2520framework%2520that%2520formalizes%2520population%2520generation%2520as%2520a%2520two-stage%2520decision%2520process.%2520Firstly%252C%2520utilizing%2520a%2520World%2520Knowledge%2520Model%2520to%2520infer%2520hierarchical%2520conditional%2520probabilities%2520to%2520construct%2520the%2520Topic-Adaptive%2520Tree%252C%2520achieving%25 {"title": "Learning Sampled-data Control for Swarms via MeanFlow", "author": "Anqi Dong and Yongxin Chen and Karl H. Johansson and Johan Karlsson", "abstract": "Steering large-scale swarms with only limited control updates is often needed due to communication or computational constraints, yet most learning-based approaches do not account for this and instead model instantaneous velocity fields. As a result, the natural object for decision making is a finite-window control quantity rather than an infinitesimal one. To address this gap, we consider the recent machine learning framework MeanFlow and generalize it to the setting with general linear dynamic systems. This results in a new sampled-data learning framework that operates directly in control space and that can be applied for swarm steering. To this end, we learn the finite-horizon coefficient that parameterizes the minimum-energy control applied over each interval, and derive a differential identity that connects this quantity to a local bridge-induced supervision signal. This identity leads to a simple stop-gradient regression objective, allowing the interval coefficient field to be learned efficiently from bridge samples. The learned policy is deployed through sampled-data updates, guaranteeing that the resulting controller exactly respects the prescribed linear time-invariant dynamics and actuation channel. The resulting method enables few-step swarm steering at scale, while remaining consistent with the finite-window actuation structure of the underlying control system.", "link": "http://arxiv.org/abs/2603.20189v2", "date": "2026-04-06", "relevancy": 2.0448, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5385}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4973}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4895}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Sampled-data%20Control%20for%20Swarms%20via%20MeanFlow&body=Title%3A%20Learning%20Sampled-data%20Control%20for%20Swarms%20via%20MeanFlow%0AAuthor%3A%20Anqi%20Dong%20and%20Yongxin%20Chen%20and%20Karl%20H.%20Johansson%20and%20Johan%20Karlsson%0AAbstract%3A%20Steering%20large-scale%20swarms%20with%20only%20limited%20control%20updates%20is%20often%20needed%20due%20to%20communication%20or%20computational%20constraints%2C%20yet%20most%20learning-based%20approaches%20do%20not%20account%20for%20this%20and%20instead%20model%20instantaneous%20velocity%20fields.%20As%20a%20result%2C%20the%20natural%20object%20for%20decision%20making%20is%20a%20finite-window%20control%20quantity%20rather%20than%20an%20infinitesimal%20one.%20To%20address%20this%20gap%2C%20we%20consider%20the%20recent%20machine%20learning%20framework%20MeanFlow%20and%20generalize%20it%20to%20the%20setting%20with%20general%20linear%20dynamic%20systems.%20This%20results%20in%20a%20new%20sampled-data%20learning%20framework%20that%20operates%20directly%20in%20control%20space%20and%20that%20can%20be%20applied%20for%20swarm%20steering.%20To%20this%20end%2C%20we%20learn%20the%20finite-horizon%20coefficient%20that%20parameterizes%20the%20minimum-energy%20control%20applied%20over%20each%20interval%2C%20and%20derive%20a%20differential%20identity%20that%20connects%20this%20quantity%20to%20a%20local%20bridge-induced%20supervision%20signal.%20This%20identity%20leads%20to%20a%20simple%20stop-gradient%20regression%20objective%2C%20allowing%20the%20interval%20coefficient%20field%20to%20be%20learned%20efficiently%20from%20bridge%20samples.%20The%20learned%20policy%20is%20deployed%20through%20sampled-data%20updates%2C%20guaranteeing%20that%20the%20resulting%20controller%20exactly%20respects%20the%20prescribed%20linear%20time-invariant%20dynamics%20and%20actuation%20channel.%20The%20resulting%20method%20enables%20few-step%20swarm%20steering%20at%20scale%2C%20while%20remaining%20consistent%20with%20the%20finite-window%20actuation%20structure%20of%20the%20underlying%20control%20system.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20189v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520Sampled-data%2520Control%2520for%2520Swarms%2520via%2520MeanFlow%26entry.906535625%3DAnqi%2520Dong%2520and%2520Yongxin%2520Chen%2520and%2520Karl%2520H.%2520Johansson%2520and%2520Johan%2520Karlsson%26entry.1292438233%3DSteering%2520large-scale%2520swarms%2520with%2520only%2520limited%2520control%2520updates%2520is%2520often%2520needed%2520due%2520to%2520communication%2520or%2520computational%2520constraints%252C%2520yet%2520most%2520learning-based%2520approaches%2520do%2520not%2520account%2520for%2520this%2520and%2520instead%2520model%2520instantaneous%2520velocity%2520fields.%2520As%2520a%2520result%252C%2520the%2520natural%2520object%2520for%2520decision%2520making%2520is%2520a%2520finite-window%2520control%2520quantity%2520rather%2520than%2520an%2520infinitesimal%2520one.%2520To%2520address%2520this%2520gap%252C%2520we%2520consider%2520the%2520recent%2520machine%2520learning%2520framework%2520MeanFlow%2520and%2520generalize%2520it%2520to%2520the%2520setting%2520with%2520general%2520linear%2520dynamic%2520systems.%2520This%2520results%2520in%2520a%2520new%2520sampled-data%2520learning%2520framework%2520that%2520operates%2520directly%2520in%2520control%2520space%2520and%2520that%2520can%2520be%2520applied%2520for%2520swarm%2520steering.%2520To%2520this%2520end%252C%2520we%2520learn%2520the%2520finite-horizon%2520coefficient%2520that%2520parameterizes%2520the%2520minimum-energy%2520control%2520applied%2520over%2520each%2520interval%252C%2520and%2520derive%2520a%2520differential%2520identity%2520that%2520connects%2520this%2520quantity {"title": "PassiveQA: A Three-Action Framework for Epistemically Calibrated Question Answering via Supervised Finetuning", "author": "Madhav S Baidya", "abstract": "Large Language Models (LLMs) have achieved strong performance in question answering and retrieval-augmented generation (RAG), yet they implicitly assume that user queries are fully specified and answerable. In real-world settings, queries are often incomplete, ambiguous, or missing critical variables, leading models to produce overconfident or hallucinated responses.\n  In this work, we study decision-aware query resolution under incomplete information, where a model must determine whether to Answer, Ask for clarification, or Abstain. We show that standard and enhanced RAG systems do not reliably exhibit such epistemic awareness, defaulting to answer generation even when information is insufficient.\n  To address this, we propose PassiveQA, a three-action framework that aligns model behaviour with information sufficiency through supervised finetuning. Our approach integrates structured information-state representations, knowledge graph-grounded context, and a finetuned planner that explicitly models missing variables and decision reasoning.\n  Experiments across multiple QA datasets show that the finetuned planner achieves significant improvements in macro F1 and abstention recall while reducing hallucination rates, under a compute-constrained training regime.\n  These results provide strong empirical evidence that epistemic decision-making must be learned during training rather than imposed at inference time.", "link": "http://arxiv.org/abs/2604.04565v1", "date": "2026-04-06", "relevancy": 2.0425, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5351}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5057}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5057}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PassiveQA%3A%20A%20Three-Action%20Framework%20for%20Epistemically%20Calibrated%20Question%20Answering%20via%20Supervised%20Finetuning&body=Title%3A%20PassiveQA%3A%20A%20Three-Action%20Framework%20for%20Epistemically%20Calibrated%20Question%20Answering%20via%20Supervised%20Finetuning%0AAuthor%3A%20Madhav%20S%20Baidya%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20have%20achieved%20strong%20performance%20in%20question%20answering%20and%20retrieval-augmented%20generation%20%28RAG%29%2C%20yet%20they%20implicitly%20assume%20that%20user%20queries%20are%20fully%20specified%20and%20answerable.%20In%20real-world%20settings%2C%20queries%20are%20often%20incomplete%2C%20ambiguous%2C%20or%20missing%20critical%20variables%2C%20leading%20models%20to%20produce%20overconfident%20or%20hallucinated%20responses.%0A%20%20In%20this%20work%2C%20we%20study%20decision-aware%20query%20resolution%20under%20incomplete%20information%2C%20where%20a%20model%20must%20determine%20whether%20to%20Answer%2C%20Ask%20for%20clarification%2C%20or%20Abstain.%20We%20show%20that%20standard%20and%20enhanced%20RAG%20systems%20do%20not%20reliably%20exhibit%20such%20epistemic%20awareness%2C%20defaulting%20to%20answer%20generation%20even%20when%20information%20is%20insufficient.%0A%20%20To%20address%20this%2C%20we%20propose%20PassiveQA%2C%20a%20three-action%20framework%20that%20aligns%20model%20behaviour%20with%20information%20sufficiency%20through%20supervised%20finetuning.%20Our%20approach%20integrates%20structured%20information-state%20representations%2C%20knowledge%20graph-grounded%20context%2C%20and%20a%20finetuned%20planner%20that%20explicitly%20models%20missing%20variables%20and%20decision%20reasoning.%0A%20%20Experiments%20across%20multiple%20QA%20datasets%20show%20that%20the%20finetuned%20planner%20achieves%20significant%20improvements%20in%20macro%20F1%20and%20abstention%20recall%20while%20reducing%20hallucination%20rates%2C%20under%20a%20compute-constrained%20training%20regime.%0A%20%20These%20results%20provide%20strong%20empirical%20evidence%20that%20epistemic%20decision-making%20must%20be%20learned%20during%20training%20rather%20than%20imposed%20at%20inference%20time.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04565v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPassiveQA%253A%2520A%2520Three-Action%2520Framework%2520for%2520Epistemically%2520Calibrated%2520Question%2520Answering%2520via%2520Supervised%2520Finetuning%26entry.906535625%3DMadhav%2520S%2520Baidya%26entry.1292438233%3DLarge%2520Language%2520Models%2520%2528LLMs%2529%2520have%2520achieved%2520strong%2520performance%2520in%2520question%2520answering%2520and%2520retrieval-augmented%2520generation%2520%2528RAG%2529%252C%2520yet%2520they%2520implicitly%2520assume%2520that%2520user%2520queries%2520are%2520fully%2520specified%2520and%2520answerable.%2520In%2520real-world%2520settings%252C%2520queries%2520are%2520often%2520incomplete%252C%2520ambiguous%252C%2520or%2520missing%2520critical%2520variables%252C%2520leading%2520models%2520to%2520produce%2520overconfident%2520or%2520hallucinated%2520responses.%250A%2520%2520In%2520this%2520work%252C%2520we%2520study%2520decision-aware%2520query%2520resolution%2520under%2520incomplete%2520information%252C%2520where%2520a%2520model%2520must%2520determine%2520whether%2520to%2520Answer%252C%2520Ask%2520for%2520clarification%252C%2520or%2520Abstain.%2520We%2520show%2520that%2520standard%2520and%2520enhanced%2520RAG%2520systems%2520do%2520not%2520reliably%2520exhibit%2520such%2520epistemic%2520awareness%252C%2520defaulting%2520to%2520answer%2520generation%2520even%2520when%2520information%2520is%2520insufficient.%250 20In%20this%20work%2C%20we%20study%20decision-aware%20query%20resolution%20under%20incomplete%20information%2C%20where%20a%20model%20must%20determine%20whether%20to%20Answer%2C%20Ask%20for%20clarification%2C%20or%20Abstain.%20We%20show%20that%20standard%20and%20enhanced%20RAG%20systems%20do%20not%20reliably%20exhibit%20such%20epistemic%20awareness%2C%20defaulting%20to%20answer%20generation%20even%20when%20information%20is%20insufficient.%0A%20%20To%20address%20this%2C%20we%20propose%20PassiveQA%2C%20a%20three-action%20framework%20that%20aligns%20model%20behaviour%20with%20information%20sufficiency%20through%20supervised%20finetuning.%20Our%20approach%20integrates%20structured%20information-state%20representations%2C%20knowledge%20graph-grounded%20context%2C%20and%20a%20finetuned%20planner%20that%20explicitly%20models%20missing%20variables%20and%20decision%20reasoning.%0A%20%20Experiments%20across%20multiple%20QA%20datasets%20show%20that%20the%20finetuned%20planner%20achieves%20significant%20improvements%20in%20macro%20F1%20and%20abstention%20recall%20while%20reducing%20hallucination%20rates%2C%20under%20a%20compute-constrained%20training%20regime.%0A%20%20These%20results%20provide%20strong%20empirical%20evidence%20that%20epistemic%20decision-making%20must%20be%20learned%20during%20training%20rather%20than%20imposed%20at%20inference%20time.&entry.1838667208=http%3A//arxiv.org/abs/2604.04565v1&entry.124074799=Read"},
{"title": "Sampling Parallelism for Fast and Efficient Bayesian Learning", "author": "Asena Karolin \u00d6zdemir and Lars H. Heyen and Arvid Weyrauch and Achim Streit and Markus G\u00f6tz and Charlotte Debus", "abstract": "Machine learning models, and deep neural networks in particular, are increasingly deployed in risk-sensitive domains such as healthcare, environmental forecasting, and finance, where reliable quantification of predictive uncertainty is essential. However, many uncertainty quantification (UQ) methods remain difficult to apply due to their substantial computational cost. Sampling-based Bayesian learning approaches, such as Bayesian neural networks (BNNs), are particularly expensive since drawing and evaluating multiple parameter samples rapidly exhausts memory and compute resources. These constraints have limited the accessibility and exploration of Bayesian techniques thus far. To address these challenges, we introduce sampling parallelism, a simple yet powerful parallelization strategy that targets the primary bottleneck of sampling-based Bayesian learning: the samples themselves. By distributing sample evaluations across multiple GPUs, our method reduces memory pressure and training time without requiring architectural changes or extensive hyperparameter tuning. We detail the methodology and evaluate its performance on a few example tasks and architectures, comparing against distributed data parallelism (DDP) as a baseline. We further demonstrate that sampling parallelism is complementary to existing strategies by implementing a hybrid approach that combines sample and data parallelism. Our experiments show near-perfect scaling when the sample number is scaled proportionally to the computational resources, confirming that sample evaluations parallelize cleanly. Although DDP achieves better raw speedups under scaling with constant workload, sampling parallelism has a notable advantage: by applying independent stochastic augmentations to the same batch on each GPU, it increases augmentation diversity and thus reduces the number of epochs required for convergence.", "link": "http://arxiv.org/abs/2604.04736v1", "date": "2026-04-06", "relevancy": 2.0419, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5162}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5087}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5005}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sampling%20Parallelism%20for%20Fast%20and%20Efficient%20Bayesian%20Learning&body=Title%3A%20Sampling%20Parallelism%20for%20Fast%20and%20Efficient%20Bayesian%20Learning%0AAuthor%3A%20Asena%20Karolin%20%C3%96zdemir%20and%20Lars%20H.%20Heyen%20and%20Arvid%20Weyrauch%20and%20Achim%20Streit%20and%20Markus%20G%C3%B6tz%20and%20Charlotte%20Debus%0AAbstract%3A%20Machine%20learning%20models%2C%20and%20deep%20neural%20networks%20in%20particular%2C%20are%20increasingly%20deployed%20in%20risk-sensitive%20domains%20such%20as%20healthcare%2C%20environmental%20forecasting%2C%20and%20finance%2C%20where%20reliable%20quantification%20of%20predictive%20uncertainty%20is%20essential.%20However%2C%20many%20uncertainty%20quantification%20%28UQ%29%20methods%20remain%20difficult%20to%20apply%20due%20to%20their%20substantial%20computational%20cost.%20Sampling-based%20Bayesian%20learning%20approaches%2C%20such%20as%20Bayesian%20neural%20networks%20%28BNNs%29%2C%20are%20particularly%20expensive%20since%20drawing%20and%20evaluating%20multiple%20parameter%20samples%20rapidly%20exhausts%20memory%20and%20compute%20resources.%20These%20constraints%20have%20limited%20the%20accessibility%20and%20exploration%20of%20Bayesian%20techniques%20thus%20far.%20To%20address%20these%20challenges%2C%20we%20introduce%20sampling%20parallelism%2C%20a%20simple%20yet%20powerful%20parallelization%20strategy%20that%20targets%20the%20primary%20bottleneck%20of%20sampling-based%20Bayesian%20learning%3A%20the%20samples%20themselves.%20By%20distributing%20sample%20evaluations%20across%20multiple%20GPUs%2C%20our%20method%20reduces%20memory%20pressure%20and%20training%20time%20without%20requiring%20architectural%20changes%20or%20extensive%20hyperparameter%20tuning.%20We%20detail%20the%20methodology%20and%20evaluate%20its%20performance%20on%20a%20few%20example%20tasks%20and%20architectures%2C%20comparing%20against%20distributed%20data%20parallelism%20%28DDP%29%20as%20a%20baseline.%20We%20further%20demonstrate%20that%20sampling%20parallelism%20is%20complementary%20to%20existing%20strategies%20by%20implementing%20a%20hybrid%20approach%20that%20combines%20sample%20and%20data%20parallelism.%20Our%20experiments%20show%20near-perfect%20scaling%20when%20the%20sample%20number%20is%20scaled%20proportionally%20to%20the%20computational%20resources%2C%20confirming%20that%20sample%20evaluations%20parallelize%20cleanly.%20Although%20DDP%20achieves%20better%20raw%20speedups%20under%20scaling%20with%20constant%20workload%2C%20sampling%20parallelism%20has%20a%20notable%20advantage%3A%20by%20applying%20independent%20stochastic%20augmentations%20to%20the%20same%20batch%20on%20each%20GPU%2C%20it%20increases%20augmentation%20diversity%20and%20thus%20reduces%20the%20number%20of%20epochs%20required%20for%20convergence.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04736v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSampling%2520Parallelism%2520for%2520Fast%2520and%2520Efficient%2520Bayesian%2520Learning%26entry.906535625%3DAsena%2520Karolin%2520%25C3%2596zdemir%2520and%2520Lars%2520H.%2520Heyen%2520and%2520Arvid%2520Weyrauch%2520and%2520Achim%2520Streit%2520and%2520Markus%2520G%25C3% {"title": "Unified Vector Floorplan Generation via Markup Representation", "author": "Kaede Shiohara and Toshihiko Yamasaki", "abstract": "Automatic residential floorplan generation has long been a central challenge bridging architecture and computer graphics, aiming to make spatial design more efficient and accessible. While early methods based on constraint satisfaction or combinatorial optimization ensure feasibility, they lack diversity and flexibility. Recent generative models achieve promising results but struggle to generalize across heterogeneous conditional tasks, such as generation from site boundaries, room adjacency graphs, or partial layouts, due to their suboptimal representations. To address this gap, we introduce Floorplan Markup Language (FML), a general representation that encodes floorplan information within a single structured grammar, which casts the entire floorplan generation problem into a next token prediction task. Leveraging FML, we develop a transformer-based generative model, FMLM, capable of producing high-fidelity and functional floorplans under diverse conditions. Comprehensive experiments on the RPLAN dataset demonstrate that FMLM, despite being a single model, surpasses the previous task-specific state-of-the-art methods.", "link": "http://arxiv.org/abs/2604.04859v1", "date": "2026-04-06", "relevancy": 2.0364, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5141}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5094}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.4958}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unified%20Vector%20Floorplan%20Generation%20via%20Markup%20Representation&body=Title%3A%20Unified%20Vector%20Floorplan%20Generation%20via%20Markup%20Representation%0AAuthor%3A%20Kaede%20Shiohara%20and%20Toshihiko%20Yamasaki%0AAbstract%3A%20Automatic%20residential%20floorplan%20generation%20has%20long%20been%20a%20central%20challenge%20bridging%20architecture%20and%20computer%20graphics%2C%20aiming%20to%20make%20spatial%20design%20more%20efficient%20and%20accessible.%20While%20early%20methods%20based%20on%20constraint%20satisfaction%20or%20combinatorial%20optimization%20ensure%20feasibility%2C%20they%20lack%20diversity%20and%20flexibility.%20Recent%20generative%20models%20achieve%20promising%20results%20but%20struggle%20to%20generalize%20across%20heterogeneous%20conditional%20tasks%2C%20such%20as%20generation%20from%20site%20boundaries%2C%20room%20adjacency%20graphs%2C%20or%20partial%20layouts%2C%20due%20to%20their%20suboptimal%20representations.%20To%20address%20this%20gap%2C%20we%20introduce%20Floorplan%20Markup%20Language%20%28FML%29%2C%20a%20general%20representation%20that%20encodes%20floorplan%20information%20within%20a%20single%20structured%20grammar%2C%20which%20casts%20the%20entire%20floorplan%20generation%20problem%20into%20a%20next%20token%20prediction%20task.%20Leveraging%20FML%2C%20we%20develop%20a%20transformer-based%20generative%20model%2C%20FMLM%2C%20capable%20of%20producing%20high-fidelity%20and%20functional%20floorplans%20under%20diverse%20conditions.%20Comprehensive%20experiments%20on%20the%20RPLAN%20dataset%20demonstrate%20that%20FMLM%2C%20despite%20being%20a%20single%20model%2C%20surpasses%20the%20previous%20task-specific%20state-of-the-art%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04859v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnified%2520Vector%2520Floorplan%2520Generation%2520via%2520Markup%2520Representation%26entry.906535625%3DKaede%2520Shiohara%2520and%2520Toshihiko%2520Yamasaki%26entry.1292438233%3DAutomatic%2520residential%2520floorplan%2520generation%2520has%2520long%2520been%2520a%2520central%2520challenge%2520bridging%2520architecture%2520and%2520computer%2520graphics%252C%2520aiming%2520to%2520make%2520spatial%2520design%2520more%2520efficient%2520and%2520accessible.%2520While%2520early%2520methods%2520based%2520on%2520constraint%2520satisfaction%2520or%2520combinatorial%2520optimization%2520ensure%2520feasibility%252C%2520they%2520lack%2520diversity%2520and%2520flexibility.%2520Recent%2520generative%2520models%2520achieve%2520promising%2520results%2520but%2520struggle%2520to%2520generalize%2520across%2520heterogeneous%2520conditional%2520tasks%252C%2520such%2520as%2520generation%2520from%2520site%2520boundaries%252C%2520room%2520adjacency%2520graphs%252C%2520or%2520partial%2520layouts%252C%2520due%2520to%2520their%2520suboptimal%2520representations.%2520To%2520address%2520this%2520gap%252C%2520we%2520introduce%2520Floorplan%2520Markup%2520Language%2520%2528FML%2529%252C%2520a%2520general%2520representation%2520that%2520encodes%2520floorplan%2520information%2520within%2520a%2520single%2520structured%2520grammar%252C%2520which%2520casts%2520the%2520entire%2520floorplan%2520generation%2520problem%2520into%2520a%2520next%2520token%2520prediction%2520task.%2520Leveraging%2520FML%252C%2520we%2520develop%2520a%2520transformer-based%2520generative%2520model%252C%2520FMLM%252C%2520capable%2520of%2520producing%2520high-fidelity%2520and%2520functional%2520floorplans%2520under%2520diverse%2520conditions.%2520Comprehensive%2520experiments%2520on%2520the%2520RPLAN%2520dataset%2520demonstrate%2520that%2520FMLM%252C%2520despite%2520being%2520a%2520single%2520model%252C%2520surpasses%2520the%2520previous%2520task-specific%2520state-of-the-art%2520methods.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.04859v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Unified%20Vector%20Floorplan%20Generation%20via%20Markup%20Representation&entry.90653562 {"title": "Markovian Reeb Graphs for Simulating Spatiotemporal Patterns of Life", "author": "Anantajit Subrahmanya and Chandrakanth Gudavalli and Connor Levenson and B. S. Manjunath", "abstract": "Accurately modeling human mobility is critical for urban planning, epidemiology, and traffic management. In this work, we introduce Markovian Reeb Graphs, a novel framework that transforms Reeb graphs from a descriptive analysis tool into a generative model for spatiotemporal trajectories. Our approach captures individual and population-level Patterns of Life (PoLs) and generates realistic trajectories that preserve baseline behaviors while incorporating stochastic variability by embedding probabilistic transitions within the Reeb graph structure. We present two variants: Sequential Reeb Graphs (SRGs) for individual agents and Hybrid Reeb Graphs (HRGs) that combine individual with population PoLs, evaluated on the Urban Anomalies and Geolife datasets using five mobility statistics. Results demonstrate that HRGs achieve strong fidelity across metrics while requiring modest trajectory datasets without specialized side information. This work establishes Markovian Reeb Graphs as a promising framework for trajectory simulation with broad applicability across urban environments.", "link": "http://arxiv.org/abs/2510.03152v3", "date": "2026-04-06", "relevancy": 2.0325, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5278}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5035}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4903}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Markovian%20Reeb%20Graphs%20for%20Simulating%20Spatiotemporal%20Patterns%20of%20Life&body=Title%3A%20Markovian%20Reeb%20Graphs%20for%20Simulating%20Spatiotemporal%20Patterns%20of%20Life%0AAuthor%3A%20Anantajit%20Subrahmanya%20and%20Chandrakanth%20Gudavalli%20and%20Connor%20Levenson%20and%20B.%20S.%20Manjunath%0AAbstract%3A%20Accurately%20modeling%20human%20mobility%20is%20critical%20for%20urban%20planning%2C%20epidemiology%2C%20and%20traffic%20management.%20In%20this%20work%2C%20we%20introduce%20Markovian%20Reeb%20Graphs%2C%20a%20novel%20framework%20that%20transforms%20Reeb%20graphs%20from%20a%20descriptive%20analysis%20tool%20into%20a%20generative%20model%20for%20spatiotemporal%20trajectories.%20Our%20approach%20captures%20individual%20and%20population-level%20Patterns%20of%20Life%20%28PoLs%29%20and%20generates%20realistic%20trajectories%20that%20preserve%20baseline%20behaviors%20while%20incorporating%20stochastic%20variability%20by%20embedding%20probabilistic%20transitions%20within%20the%20Reeb%20graph%20structure.%20We%20present%20two%20variants%3A%20Sequential%20Reeb%20Graphs%20%28SRGs%29%20for%20individual%20agents%20and%20Hybrid%20Reeb%20Graphs%20%28HRGs%29%20that%20combine%20individual%20with%20population%20PoLs%2C%20evaluated%20on%20the%20Urban%20Anomalies%20and%20Geolife%20datasets%20using%20five%20mobility%20statistics.%20Results%20demonstrate%20that%20HRGs%20achieve%20strong%20fidelity%20across%20metrics%20while%20requiring%20modest%20trajectory%20datasets%20without%20specialized%20side%20information.%20This%20work%20establishes%20Markovian%20Reeb%20Graphs%20as%20a%20promising%20framework%20for%20trajectory%20simulation%20with%20broad%20applicability%20across%20urban%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2510.03152v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMarkovian%2520Reeb%2520Graphs%2520for%2520Simulating%2520Spatiotemporal%2520Patterns%2520of%2520Life%26entry.906535625%3DAnantajit%2520Subrahmanya%2520and%2520Chandrakanth%2 {"title": "MOOSE-Star: Unlocking Tractable Training for Scientific Discovery by Breaking the Complexity Barrier", "author": "Zonglin Yang and Lidong Bing", "abstract": "While large language models (LLMs) show promise in scientific discovery, existing research focuses on inference or feedback-driven training, leaving the direct modeling of the generative reasoning process, $P(\\text{hypothesis}|\\text{background})$ ($P(h|b)$), unexplored. We demonstrate that directly training $P(h|b)$ is mathematically intractable due to the combinatorial complexity ($O(N^k)$) inherent in retrieving and composing inspirations from a vast knowledge base. To break this barrier, we introduce MOOSE-Star, a unified framework enabling tractable training and scalable inference. In the best case, MOOSE-Star reduces complexity from exponential to logarithmic ($O(\\log N)$) by (1) training on decomposed subtasks derived from the probabilistic equation of discovery, (2) employing motivation-guided hierarchical search to enable logarithmic retrieval and prune irrelevant subspaces, and (3) utilizing bounded composition for robustness against retrieval noise. To facilitate this, we release TOMATO-Star, a dataset of 108,717 decomposed papers (38,400 GPU hours) for training. Furthermore, we show that while brute-force sampling hits a ''complexity wall,'' MOOSE-Star exhibits continuous test-time scaling.", "link": "http://arxiv.org/abs/2603.03756v2", "date": "2026-04-06", "relevancy": 2.031, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5095}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5095}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.4988}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MOOSE-Star%3A%20Unlocking%20Tractable%20Training%20for%20Scientific%20Discovery%20by%20Breaking%20the%20Complexity%20Barrier&body=Title%3A%20MOOSE-Star%3A%20Unlocking%20Tractable%20Training%20for%20Scientific%20Discovery%20by%20Breaking%20the%20Complexity%20Barrier%0AAuthor%3A%20Zonglin%20Yang%20and%20Lidong%20Bing%0AAbstract%3A%20While%20large%20language%20models%20%28LLMs%29%20show%20promise%20in%20scientific%20discovery%2C%20existing%20research%20focuses%20on%20inference%20or%20feedback-driven%20training%2C%20leaving%20the%20direct%20modeling%20of%20the%20generative%20reasoning%20process%2C%20%24P%28%5Ctext%7Bhypothesis%7D%7C%5Ctext%7Bbackground%7D%29%24%20%28%24P%28h%7Cb%29%24%29%2C%20unexplored.%20We%20demonstrate%20that%20directly%20training%20%24P%28h%7Cb%29%24%20is%20mathematically%20intractable%20due%20to%20the%20combinatorial%20complexity%20%28%24O%28N%5Ek%29%24%29%20inherent%20in%20retrieving%20and%20composing%20inspirations%20from%20a%20vast%20knowledge%20base.%20To%20break%20this%20barrier%2C%20we%20introduce%20MOOSE-Star%2C%20a%20unified%20framework%20enabling%20tractable%20training%20and%20scalable%20inference.%20In%20the%20best%20case%2C%20MOOSE-Star%20reduces%20complexity%20from%20exponential%20to%20logarithmic%20%28%24O%28%5Clog%20N%29%24%29%20by%20%281%29%20training%20on%20decomposed%20subtasks%20derived%20from%20the%20probabilistic%20equation%20of%20discovery%2C%20%282%29%20employing%20motivation-guided%20hierarchical%20search%20to%20enable%20logarithmic%20retrieval%20and%20prune%20irrelevant%20subspaces%2C%20and%20%283%29%20utilizing%20bounded%20composition%20for%20robustness%20against%20retrieval%20noise.%20To%20facilitate%20this%2C%20we%20release%20TOMATO-Star%2C%20a%20dataset%20of%20108%2C717%20decomposed%20papers%20%2838%2C400%20GPU%20hours%29%20for%20training.%20Furthermore%2C%20we%20show%20that%20while%20brute-force%20sampling%20hits%20a%20%27%27complexity%20wall%2C%27%27%20MOOSE-Star%20exhibits%20cont 2520%25283%2529%2520utilizing%2520bounded%2520composition%2520for%2520robustness%2520against%2520retrieval%2520noise.%2520To%2520facilitate%2520this%252C%2520we%2520release%2520TOMATO-Star%252C%2520a%2520dataset%2520of%2520108%252C717%2520decomposed%2520papers%2520%252838%252C400%2520GPU%2520hours%2529%2520for%2520training.%2520Furthermore%252C%2520we%2520show%2520that%2520while%2520brute-force%2520sampling%2520hits%2520a%2520%2527%2527complexity%2520wall%252C%2527%2527%2520MOOSE-Star%2520exhibits%2520continuous%2520test-time%2520scaling.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.03756v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MOOSE-Star%3A%20Unlocking%20Tractable%20Training%20for%20Scientific%20Discovery%20by%20Breaking%20the%20Complexity%20Barrier&entry.906535625=Zonglin%20Yang%20and%20Lidong%20Bing&entry.1292438233=While%20large%20language%20models%20%28LLMs%29%20show%20promise%20in%20scientific%20discovery%2C%20existing%20research%20focuses%20on%20inference%20or%20feedback-driven%20training%2C%20leaving%20the%20direct%20modeling%20of%20the%20generative%20reasoning%20process%2C%20%24P%28%5Ctext%7Bhypothesis%7D%7C%5Ctext%7Bbackground%7D%29%24%20%28%24P%28h%7Cb%29%24%29%2C%20unexplored.%20We%20demonstrate%20that%20directly%20training%20%24P%28h%7Cb%29%24%20is%20mathematically%20intractable%20due%20to%20the%20combinatorial%20complexity%20%28%24O%28N%5Ek%29%24%29%20inherent%20in%20retrieving%20and%20composing%20inspirations%20from%20a%20vast%20knowledge%20base.%20To%20break%20this%20barrier%2C%20we%20introduce%20MOOSE-Star%2C%20a%20unified%20framework%20enabling%20tractable%20training%20and%20scalable%20inference.%20In%20the%20best%20case%2C%20MOOSE-Star%20reduces%20complexity%20from%20exponential%20to%20logarithmic%20%28%24O%28%5Clog%20N%29%24%29%20by%20%281%29%20training%20on%20decomposed%20subtasks%20derived%20from%20the%20probabilistic%20equat {"title": "Learning continuous state of charge dependent thermal decomposition kinetics for Li-ion cathodes using Kolmogorov-Arnold Chemical Reaction Neural Networks (KA-CRNNs)", "author": "Benjamin C. Koenig and Sili Deng", "abstract": "Thermal runaway in lithium-ion batteries is strongly influenced by the state of charge (SOC). Existing predictive models typically infer scalar kinetic parameters at a full SOC or a few discrete SOC levels, preventing them from capturing the continuous SOC dependence that governs exothermic behavior during abuse conditions. To address this, we apply the Kolmogorov-Arnold Chemical Reaction Neural Network (KA-CRNN) framework to learn continuous and realistic SOC-dependent exothermic cathode-electrolyte interactions. We apply a physics-encoded KA-CRNN to learn SOC-dependent kinetic parameters for cathode-electrolyte decomposition directly from differential scanning calorimetry (DSC) data. A mechanistically informed reaction pathway is embedded into the network architecture, enabling the activation energies, pre-exponential factors, enthalpies, and related parameters to be represented as continuous and fully interpretable functions of the SOC. The framework is demonstrated for NCA, NM, and NMA cathodes, yielding models that reproduce DSC heat-release features across all SOCs and provide interpretable insight into SOC-dependent oxygen-release and phase-transformation mechanisms. This approach establishes a foundation for extending kinetic parameter dependencies to additional environmental and electrochemical variables, supporting more accurate and interpretable thermal runaway prediction and monitoring.", "link": "http://arxiv.org/abs/2512.15628v2", "date": "2026-04-06", "relevancy": 1.2962, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4529}, {"title": "Boosted dynamic neural networks", "link": tions%20of%20the%20SOC.%20The%20framework%20is%20demonstrated%20for%20NCA%2C%20NM%2C%20and%20NMA%20cathodes%2C%20yielding%20models%20that%20reproduce%20DSC%20heat-release%20features%20across%20all%20SOCs%20and%20provide%20interpretable%20insight%20into%20SOC-dependent%20oxygen-release%20and%20phase-transformation%20mechanisms.%20This%20approach%20establishes%20a%20foundation%20for%20extending%20kinetic%20parameter%20dependencies%20to%20additional%20environmental%20and%20electrochemical%20variables%2C%20supporting%20more%20accurate%20and%20interpretable%20thermal%20runaway%20prediction%20and%20monitoring.%0ALink%3A%20http%3A//arxiv.org/abs/2512.15628v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520continuous%2520state%2520of%2520charge%2520dependent%2520thermal%2520decomposition%2520kinetics%2520for%2520Li-ion%2520cathodes%2520using%2520Kolmogorov-Arnold%2520Chemical%2520Reaction%2520Neural%2520Networks%2520%2528KA-CRNNs%2529%26entry.906535625%3DBenjamin%2520C.%2520Koenig%2520and%2520Sili%2520Deng%26entry.1292438233%3DThermal%2520runaway%2520in%2520lithium-ion%2520batteries%2520is%2520strongly%2520influenced%2520by%2520the%2520state%2520of%2520charge%2520%2528SOC%2529.%2520Existing%2520predictive%2520models%2520typically%2520infer%2520scalar%2520kinetic%2520parameters%2520at%2520a%2520full%2520SOC%2520or%2520a%2520few%2520discrete%2520SOC%2520levels%252C%2520preventing%2520them%2520from%2520capturing%2520the%2520continuous%2520SOC%2520dependence%2520that%2520governs%2520exothermic%2520behavior%2520during%2520abuse%2520conditions.%2520To%2520address%2520this%252C%2520we%2520apply%2520the%2520Kolmogorov-Arnold%2520Chemical%2520Reaction%2520Neural%2520Network%2520%2528KA-CRNN%2529%2520framework%2520to%2520learn%2520continuous%2520and%2520realistic%2520SOC-dependent%2520exothermic%2520cathode-electrolyte%2520interactions.%2520We%2520apply%2520a%2520physics-encoded%2520KA {"title": "Erasure or Erosion? Evaluating Compositional Degradation in Unlearned Text-To-Image Diffusion Models", "author": "Arian Komaei Koma and Seyed Amir Kasaei and Ali Aghayari and AmirMahdi Sadeghzadeh and Mohammad Hossein Rohban", "abstract": "Post-hoc unlearning has emerged as a practical mechanism for removing undesirable concepts from large text-to-image diffusion models. However, prior work primarily evaluates unlearning through erasure success; its impact on broader generative capabilities remains poorly understood. In this work, we conduct a systematic empirical study of concept unlearning through the lens of compositional text-to-image generation. Focusing on nudity removal in Stable Diffusion 1.4, we evaluate a diverse set of state-of-the-art unlearning methods using T2I-CompBench++ and GenEval, alongside established unlearning benchmarks. Our results reveal a consistent trade-off between unlearning effectiveness and compositional integrity: methods that achieve strong erasure frequently incur substantial degradation in attribute binding, spatial reasoning, and counting. Conversely, approaches that preserve compositional structure often fail to provide robust erasure. These findings highlight limitations of current evaluation practices and underscore the need for unlearning objectives that explicitly account for semantic preservation beyond targeted suppression.", "link": "http://arxiv.org/abs/2604.04575v1", "date": "2026-04-06", "relevancy": 1.1022, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5549}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5531}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5454}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Erasure%20or%20Erosion%3F%20Evaluating%20Compositional%20Degradation%20in%20Unlearned%20Text-To-Image%20Diffusion%20Models&body=Title%3A%20Erasure%20or%20Erosion%3F%20Evaluating%20Compositional%20Degradation%20in%20Unlearned%20Text-To-Image%20Diffusion%20Models%0AAuthor%3A%20Arian%20Komaei%20Koma%20and%20Seyed%20Amir%20Kasaei%20and%20Ali%20Aghayari%20and%20AmirMahdi%20Sadeghzadeh%20and%20Mohammad%20Hossein%20Rohban%0AAbstract%3A%20Post-hoc%20unlearning%20has%20emerged%20as%20a%20practical%20mechanism%20for%20removing%20undesirable%20concepts%20from%20large%20text-to-image%20diffusion%20models.%20However%2C%20prior%20work%20primarily%20evaluates%20unlearning%20through%20erasure%20success%3B%20its%20impact%20on%20broader%20generative%20capabilities%20remains%20poorly%20understood.%20In%20this%20work%2C%20we%20conduct%20a%20systematic%20empirical%20study%20of%20concept%20unlearning%20through%20the%20lens%20of%20compositional%20text-to-image%20generation.%20Focusing%20on%20nudity%20removal%20in%20Stable%20Diffusion%201.4%2C%20we%20evaluate%20a%20diverse%20set%20of%20state-of-the-art%20unlearning%20methods%20using%20T2I-CompBench%2B%2B%20and%20GenEval%2C%20alongside%20established%20unlearning%20benchmarks.%20Our%20results%20reveal%20a%20consistent%20trade-off%20between%20unlearning%20effectiveness%20and%20compositional%20integrity%3A%20methods%20that%20achieve%20strong%20erasure%20frequently%20incur%20substantial%20degradation%20in%20attribute%20binding%2C%20spatial%20reasoning%2C%20and%20counting.%20Conversely%2C%20approaches%20that%20preserve%20compositional%20structure%20often%20fail%20to%20provide%20robust%20erasure.%20These%20findings%20highlight%20limitations%20of%20current%20evaluation%20practices%20and%20underscore%20the%20need%20for%20unlearning%20objectives%20that%20explicitly%20account%20for%20semantic%20preservation%20beyond%20targeted%20suppression.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04575v1%0AForm%3A%20https%3A//docs.google.c t%20evaluation%20practices%20and%20underscore%20the%20need%20for%20unlearning%20objectives%20that%20explicitly%20account%20for%20semantic%20preservation%20beyond%20targeted%20suppression.&entry.1838667208=http%3A//arxiv.org/abs/2604.04575v1&entry.124074799=Read"},
{"title": "Large Language Model Guided Incentive Aware Reward Design for Cooperative Multi-Agent Reinforcement Learning", "author": "Dogan Urgun and Gokhan Gungor", "abstract": "Designing effective auxiliary rewards for cooperative multi-agent systems remains challenging, as misaligned incentives can induce suboptimal coordination, particularly when sparse task rewards provide insufficient grounding for coordinated behavior. This study introduces an automated reward design framework that uses large language models to synthesize executable reward programs from environment instrumentation. The procedure constrains candidate programs within a formal validity envelope and trains policies from scratch using MAPPO under a fixed computational budget. The candidates are then evaluated based on their performance, and selection across generations relies solely on the sparse task returns. The framework is evaluated in four Overcooked-AI layouts characterized by varying levels of corridor congestion, handoff dependencies, and structural asymmetries. The proposed reward design approach consistently yields higher task returns and delivery counts, with the most pronounced gains observed in environments dominated by interaction bottlenecks. Diagnostic analysis of the synthesized shaping components reveals stronger interdependence in action selection and improved signal alignment in coordination-intensive tasks. These results demonstrate that the proposed LLM-guided reward search framework mitigates the need for manual engineering while producing shaping signals compatible with cooperative learning under finite budgets.", "link": "http://arxiv.org/abs/2603.24324v3", "date": "2026-04-06", "relevancy": 1.6135, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5507}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://a {"title": "Don't Waste Bits! Adaptive KV-Cache Quantization for Lightweight On-Device LLMs", "author": "Sayed Pedram Haeri Boroujeni and Niloufar Mehrabi and Patrick Woods and Gabriel Hillesheim and Abolfazl Razi", "abstract": "Large Language Models (LLMs) have achieved remarkable progress across reasoning, generation, and decision-making tasks, yet deploying them on mobile, embedded, and edge devices remains particularly challenging. On-device LLM inference is heavily constrained by the memory and bandwidth overhead of the key-value (KV) cache, which grows linearly with context length and often dominates decoding cost. Existing KV-cache quantization schemes typically rely on fixed precision or hand-crafted heuristics, thereby wasting bits on low-impact tokens while over-compressing informative ones, leading to avoidable accuracy degradation. Inspired by Huffman coding's principle of variable-length allocation, we propose adaptive KV-cache quantization, a learned policy that assigns bit-width proportional to token importance, minimizing expected memory and latency without sacrificing competitive accuracy. Our framework extracts lightweight token-level features, including token frequency, quality score, attention variance, and entropy-based uncertainty, and feeds them into a compact data-driven controller that dynamically selects KV precision from {2-bit, 4-bit, 8-bit, FP16} during decoding. This adaptive precision policy reduces KV memory footprint and latency while improving accuracy compared to static KV quantization and rule-based baselines, and maintaining competitive accuracy close to FP16 inference across standard LLM benchmarks. Extensive experiments across multiple commonsense reasoning benchmarks using SmolLM-135M, SmolLM-360M, and SmolLM-1.7B demonstrate that our controller consistently improves the accuracy-latency trade-off. For instance, with SmolLM-360M on HellaSwag, our method reduces decoding latency (ms/token) by 17.75% relative to static KV quantization, improves accuracy by 7.60 points, and remains within only 0.30 points of FP16 inference.", "link": "http://arxiv.org/abs/2604.04722v1", "date": "2026-04-06", "relevancy": 1.5599, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5332}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5287}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4781}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Don%27t%20Waste%20Bits%21%20Adaptive%20KV-Cache%20Quantization%20for%20Lightweight%20On-Device%20LLMs&body=Title%3A%20Don%27t%20Waste%20Bits%21%20Adaptive%20KV-Cache%20Quantization%20for%20Lightweight%20On-Device%20LLMs%0AAuthor%3A%20Sayed%20Pedram%20Haeri%20Boroujeni%20and%20Niloufar%20Mehrabi%20and%20Patrick%20Woods%20and%20Gabriel%20Hillesheim%20and%20Abolfazl%20Razi%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20have%20achieved%20remarkable%20progress%20across%20reasoning%2C%20generation%2C%20and%20decision-making%20tasks%2C%20yet%20deploying%20them%20on%20mobile%2C%20embedded%2C%20and%20edge%20devices%20remains%20particularly%20challenging.%20On-device%20LLM%20inference%20is%20heavily%20constrained%20by%20the%20memory%20and%20bandwidth%20overhead%20of%20the%20key-value%20%28KV%29%20cache%2C%20which%20grows%20linearly%20with%20context%20length%20and%20often%20dominates%20decoding%20cost.%20Existing%20KV-cache%20quantization%20schemes%20typically%20rely%20on%20fixed%20precision%20or%20hand-crafted%20heuristics%2C%20thereby%20wasting%20bits%20on%20low-impact%20tokens%20while%20over-compressing%20informative%20ones%2C%20leading%20to%20avoidable%20accuracy%20degradation.%20Inspired%20by%20Huffman%20coding%27s%20principle%20of%20variable-length%20allocation%2C%20we%20propose%20adaptive%20KV-cache%20quantization%2C%20a%20learned%20policy%20that%20assigns%20bit-width%20proportional%20to%20token%20importance%2C%20minimizing%20expected%20memory%20and%20latency%20without%20sacrificing%20competitive%20accuracy.%20Our%20framework%20extracts%20lightweight%20token-level%20features%2C%20including%20token%20frequency%2C%20quality%20score%2C%20attention%20variance%2C%20and%20entropy-based%20uncertainty%2C%20and%20feeds%20them%20into%20a%20compact%20data-driven%20controller%20that%20dynamically%20selects%20KV%20precision%20from%20%7B2-bit%2C%204-bit%2C%208-bit%2C%20FP16%7D%20during%20decoding.%20This%20adaptive%20precision%20policy%20reduces%20KV%20memory%20footprint%20and%20latency%20while%20improving%20accuracy%20compared%20to%20static%20KV%20quantization%20and%20rule-based%20baselines%2C%20and%20maintaining%20competitive%20accuracy%20close%20to%20FP16%20inference%20across%20standard%20LLM%20benchmarks.%20Extensive%20experiments%20across%20multiple%20commonsense%20reasoning%20benchmarks%20using%20SmolLM-135M%2C%20SmolLM-360M%2C%20and%20SmolLM-1.7B%20demonstrate%20that%20our%20controller%20consistently%20improves%20the%20accuracy-latency%20trade-off.%20For%20instance%2C%20with%20SmolLM-360M%20on%20HellaSwag%2C%20our%20method%20reduces%20decoding%20latency%20%28ms/token%29%20by%2017.75%25%20relative%20to%20static%20KV%20quantization%2C%20improves%20accuracy%20by%207.60%20points%2C%20and%20remains%20within%20only%200.30%20points%20of%20FP16%20inference.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04722v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDon%2527t%2520Waste%2520Bits%2521%2520Adaptive%2520KV-Cache%2520Quantization%2520for%2520Lightweight%2520On-Device%2520LLMs%26entry.906535625%3DSayed%2520Pedram%2520Haeri%2520Boroujeni%2520and%2520Niloufar%2520Mehrabi%2520and%2520Patrick%2520Woods%2520a {"title": "Minimaxity and Admissibility of Bayesian Neural Networks", "author": "Daniel Andrew Coulson and Martin T. Wells", "abstract": "Bayesian neural networks (BNNs) offer a natural probabilistic formulation for inference in deep learning models. Despite their popularity, their optimality has received limited attention through the lens of statistical decision theory. In this paper, we study decision rules induced by deep, fully connected feedforward ReLU BNNs in the normal location model under quadratic loss. We show that, for fixed prior scales, the induced Bayes decision rule is not minimax. We then propose a hyperprior on the effective output variance of the BNN prior that yields a superharmonic square-root marginal density, establishing that the resulting decision rule is simultaneously admissible and minimax. We further extend these results from the quadratic loss setting to the predictive density estimation problem with Kullback--Leibler loss. Finally, we validate our theoretical findings numerically through simulation.", "link": "http://arxiv.org/abs/2604.04673v1", "date": "2026-04-06", "relevancy": 1.9322, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5304}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4801}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4368}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Minimaxity%20and%20Admissibility%20of%20Bayesian%20Neural%20Networks&body=Title%3A%20Minimaxity%20and%20Admissibility%20of%20Bayesian%20Neural%20Networks%0AAuthor%3A%20Daniel%20Andrew% {"title": "Safe Interactions via Monte Carlo Linear-Quadratic Games", "author": "Benjamin A. Christie and Dylan P. Losey", "abstract": "Safety is critical during human-robot interaction. But -- because people are inherently unpredictable -- it is often difficult for robots to plan safe behaviors. Instead of relying on our ability to anticipate humans, here we identify robot policies that are robust to unexpected human decisions. We achieve this by formulating human-robot interaction as a zero-sum game, where (in the worst case) the human's actions directly conflict with the robot's objective. Solving for the Nash Equilibrium of this game provides robot policies that maximize safety and performance across a wide range of human actions. Existing approaches attempt to find these optimal policies by leveraging Hamilton-Jacobi analysis (which is intractable) or linear-quadratic approximations (which are inexact). By contrast, in this work we propose a computationally efficient and theoretically justified method that converges towards the Nash Equilibrium policy. Our approach (which we call MCLQ) leverages linear-quadratic games to obtain an initial guess at safe robot behavior, and then iteratively refines that guess with a Monte Carlo search. Not only does MCLQ provide real-time safety adjustments, but it also enables the designer to tune how conservative the robot is -- preventing the system from focusing on unrealistic human behaviors. Our simulations and user study suggest that this approach advances safety in terms of both computation time and expected performance. See videos of our experiments here: https://youtu.be/KJuHeiWVuWY.", "link": "http://arxiv.org/abs/2504.06124v3", "date": "2026-04-06", "relevancy": 1.6143, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5663}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5548}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5201}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Safe%20Interactions%20via%20Monte%20Carlo%20Linear-Quadratic%20Games&body=Title%3A%20Safe%20Interactions%20via%20Monte%20Carlo%20Linear-Quadratic%20Games%0AAuthor%3A%20Benjamin%20A.%20Christie%20and%20Dylan%20P.%20Losey%0AAbstract%3A%20Safety%20is%20critical%20during%20human-robot%20interaction.%20But%20--%20because%20people%20are%20inherently%20unpredictable%20--%20it%20is%20often%20difficult%20for%20robots%20to%20plan%20safe%20behaviors.%20Instead%20of%20relying%20on%20our%20ability%20to%20anticipate%20humans%2C%20here%20we%20identify%20robot%20policies%20that%20are%20robust%20to%20unexpected%20human%20decisions.%20We%20achieve%20this%20by%20formulating%20human-robot%20interaction%20as%20a%20zero-sum%20game%2C%20where%20%28in%20the%20worst%20case%29%20the%20human%27s%20actions%20directly%20conflict%20with%20the%20robot%27s%20objective.%20Solving%20for%20the%20Nash%20Equilibrium%20of%20this%20game%20provides%20robot%20policies%20that%20maximize%20safety%20and%20performance%20across%20a%20wide%20range%20of%20human%20actions.%20Existing%20approaches%20attempt%20to%20find%20these%20optimal%20policies%20by%20leveraging%20Hamilton-Jacobi%20analysis%20%28which%20is%20intractable%29%20or%20linear-quadratic%20approximations%20%28which%20are%20inexact%29.%20By%20contrast%2C%20in%20this%20work%20we%20propose%20a%20computationally%20efficient%20and%20theoretically%20justified%20method%20that%20converges%20towards%20the%20Nash%20Equilibrium%20policy.%20Our%20approach%20%28which%20we%20call%20MCLQ%29%20leverages%20linear-quadratic%20games%20to%20obtain%20an%20initial%20guess%20at%20safe%20robot%20behavior%2C%20and%20then%20iteratively%20refines%20that%20guess%20with%20a%20Monte%20Carlo%20search.%20Not%20only%20does%20MCLQ%20provide%20real-time%20safety%20adjustments%2C%20but%20it%20also%20enables%20the%20designer%20to%20tune%20how%20conservative%20the%20robot%20is%20--%20preventing%20the%20system%20from%20focusing%20on%20unrealistic%20human%20behaviors.%20Our%20simulations%20and%20user%20study%20suggest%20that%20this%20approach%20advances%20safety%20in%20terms%20of%20both%20computation%20time%20and%20expected%20performance.%20See%20videos%20of%20our%20experiments%20here%3A%20https%3A//youtu.be/KJuHeiWVuWY.%0ALink%3A%20http%3A//arxiv.org/abs/2504.06124v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSafe%2520Interactions%2520via%2520Monte%2520Carlo%2520Linear-Quadratic%2520Games%26entry.906535625%3DBenjamin%2520A.%2520Christie%2520and%2520Dylan%2520P.%2520Losey%26entry.1292438233%3DSafety%2520is%2520critical%2520during%2520human-robot%2520interaction.%2520But%2520--%2520because%2520people%2520are%2520inherently%2520unpredictable%2520--%2520it%2520is%2520often%2520difficult%2520for%2520robots%2520to%2520plan%2520safe%2520behaviors.%2520Instead%2520of%2520relying%2520on%2520our%2520ability%2520to%2520anticipate%2520humans%252C%2520here%2520we%2520identify%2520robot%2520policies%2520that%2520are%2520robust%2520to%2520unexpected%2520human%2520decisions.%2520We%2520achieve%2520this%2520by%2520formulating%2520human-robot%2520interaction%2520as%2520a%2520zero-sum%2520game%252C%2520where%2520%2528in%2520the%2520worst%2520case%2529%2520the%2520human%2527s%2520actions%2520directly%2520conflict%2520with%2520the%2520robot%2527s%2520objective.%2520Solving%2520for%2520the%2520Nash%2520Equilibrium%2520of%2520this%2520game%2520provides%2520robot%2520policies%2520that%2520maximize%2520safety%2520and%2520performance%2520across%2520a%2520wide%2520range%2520of%2520human%2520actions.%2520Existing%2520approac {"title": "QED-Nano: Teaching a Tiny Model to Prove Hard Theorems", "author": " LM-Provers and Yuxiao Qu and Amrith Setlur and Jasper Dekoninck and Edward Beeching and Jia Li and Ian Wu and Lewis Tunstall and Aviral Kumar", "abstract": "Proprietary AI systems have recently demonstrated impressive capabilities on complex proof-based problems, with gold-level performance reported at the 2025 International Mathematical Olympiad (IMO). However, the training pipelines behind these systems remain largely undisclosed, and their reliance on large \"internal\" models and scaffolds makes them expensive to run, difficult to reproduce, and hard to study or improve upon. This raises a central question: can small, open models also be trained to achieve competitive reasoning performance on difficult Olympiad-level math? In this paper, we answer this question by building QED-Nano, a 4B model post-trained for Olympiad-level proofs. Our training recipe has three stages: (1) supervised fine-tuning to imbue good proof-writing styles by distilling from DeepSeek-Math-V2, (2) reinforcement learning (RL) with rubric-based rewards, and (3) expanding RL with a reasoning cache, which decomposes long proofs into iterative summarize-and-refine cycles and enables stronger test-time reasoning. QED-Nano surpasses the proof-generation performance of much larger open models, including Nomos-1 and GPT-OSS-120B, and approaches the performance of proprietary models like Gemini 3 Pro, at a fraction of the inference cost. To support further research on open mathematical reasoning, we release the full QED-Nano pipeline, including the QED-Nano and QED-Nano-SFT models, the FineProofs-SFT and FineProofs-RL datasets, and the training and evaluation code.", "link": "http://arxiv.org/abs/2604.04898v1", "date": "2026-04-06", "relevancy": 1.9617, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4932}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4932}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4764}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20QED-Nano%3A%20Teaching%20a%20Tiny%20Model%20to%20Prove%20Hard%20Theorems&body=Title%3A%20QED-Nano%3A%20Teaching%20a%20Tiny%20Model%20to%20Prove%20Hard%20Theorems%0AAuthor%3A%20%20LM-Provers%20and%20Yuxiao%20Qu%20and%20Amrith%20Setlur%20and%20Jasper%20Dekoninck%20and%20Edward%20Beeching%20and%20Jia%20Li%20and%20Ian%20Wu%20and%20Lewis%20Tunstall%20and%20Aviral%20Kumar%0AAbstract%3A%20Proprietary%20AI%20systems%20have%20recently%20demonstrated%20impressive%20capabilities%20on%20complex%20proof-based%20problems%2C%20with%20gold-level%20performance%20reported%20at%20the%202025%20International%20Mathematical%20Olympiad%20%28IMO%29.%20However%2C%20the%20training%20pipelines%20behind%20these%20systems%20remain%20largely%20undisclosed%2C%20and%20their%20reliance%20on%20large%20%22internal%22%20models%20and%20scaffolds%20makes%20them%20expensive%20to%20run%2C%20difficult%20to%20reproduce%2C%20and%20hard%20to%20study%20or%20improve%20upon.%20This%20raises%20a%20central%20question%3A%20can%20small%2C%20open%20models%20also%20be%20trained%20to%20achieve%20competitive%20reasoning%20performance%20on%20difficult%20Olympiad-level%20math%3F%20In%20this%20paper%2C%20we%20answer%20this%20question%20by%20building%20QED-Nano%2C%20a%204B%20model%20post-trained%20for%20Olympiad-level%20proofs.%20Our%20training%20recipe%20has%20three%20stages%3A%20%281%29%20supervised%20fine-tuning%20to%20imbue%20good%20proof-writing%20styles%20by%20distilling%20from%20DeepSeek-Math-V2%2C%20%282%29%20reinforcement%20learning%20%28RL%29%20with%20rubric-based%20rewards%2C%20and%20%283%29%20expanding%20RL%20with%20a%20reasoning%20cache%2C%20which%20decomposes%20long%20proofs%20into%20iterative%20summarize-and-refine%20cycles%20and%20enables%20stronger%20test-time%20reasoning.%20QED-Nano%20surpasses%20the%20proof-generation%20performance%20of%20much%20larger%20open%20models%2C%20including%20Nomos-1%20and%20GPT-OSS-120B%2C%20and%20approaches%20the%20performance%20of%20proprietary%20models%20like%20Gemini%203%20Pro%2C%20at%20a%20fraction%20of%20the%20inference%20cost.%20To%20support%20further%20research%20on%20open%20mathematical%20reasoning%2C%20we%20release%20the%20full%20QED-Nano%20pipeline%2C%20including%20the%20QED-Nano%20and%20QED-Nano-SFT%20models%2C%20the%20FineProofs-SFT%20and%20FineProofs-RL%20datasets%2C%20and%20the%20training%20and%20evaluation%20code.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04898v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DQED-Nano%253A%2520Teaching%2520a%2520Tiny%2520Model%2520to%2520Prove%2520Hard%2520Theorems%26entry.906535625%3D%2520LM-Provers%2520and%2520Yuxiao%2520Qu%2520and%2520Amrith%2520Setlur%2520and%2520Jasper%2520Dekoninck%2520and%2520Edward%2520Beeching%2520and%2520Jia%2520Li%2520and%2520Ian%2520Wu%2520and%2520Lewis%2520Tunstall%2520and%2520Aviral%2520Kumar%26entry.1292438233%3DProprietary%2520AI%2520systems%2520have%2520recently%2520demonstrated%2520impressive%2520capabilities%2520on%2520complex%2520proof-based%2520problems%252C%2520with%2520gold-level%2520performance%2520reported%2520at%2520the%25202025%2520International%2520Mathematical%2520Olympiad%2520%2528IMO%2529.%2520However%252C%2520the%2520training%2520pipelines%2520behind%2520these%2520systems%2520remain%2520largely%2520undisclosed%252C%2520and%2520their%2520reliance%2520on%2520large%2520%2522internal%2522%2520models%2520and%2520scaffolds%2520makes%2520them%2520expensive%2520to%2520run%252C%2520difficult%2520to%2520reproduce%252C%2520and%2520hard%2520to%2520study%2520or%2520improve%25

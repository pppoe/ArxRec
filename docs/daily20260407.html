{"title": "Preserving Forgery Artifacts: AI-Generated Video Detection at Native Scale", "author": "Zhengcen Li and Chenyang Jiang and Hang Zhao and Shiyang Zhou and Yunyang Mo and Feng Gao and Fan Yang and Qiben Shan and Shaocong Wu and Jingyong Su", "abstract": "The rapid advancement of video generation models has enabled the creation of highly realistic synthetic media, raising significant societal concerns regarding the spread of misinformation. However, current detection methods suffer from critical limitations. They rely on preprocessing operations like fixed-resolution resizing and cropping. These operations not only discard subtle, high-frequency forgery traces but also cause spatial distortion and significant information loss. Furthermore, existing methods are often trained and evaluated on outdated datasets that fail to capture the sophistication of modern generative models. To address these challenges, we introduce a comprehensive dataset and a novel detection framework. First, we curate a large-scale dataset of over 140K videos from 15 state-of-the-art open-source and commercial generators, along with Magic Videos benchmark designed specifically for evaluating ultra-realistic synthetic content. In addition, we propose a novel detection framework built on the Qwen2.5-VL Vision Transformer, which operates natively at variable spatial resolutions and temporal durations. This native-scale approach effectively preserves the high-frequency artifacts and spatiotemporal inconsistencies typically lost during conventional preprocessing. Extensive experiments demonstrate that our method achieves superior performance across multiple benchmarks, underscoring the critical importance of native-scale processing and establishing a robust new baseline for AI-generated video detection.", "link": "http://arxiv.org/abs/2604.04634v1", "date": "2026-04-06", "relevancy": 3.1766, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts" {"title": "Enhancing Physical Plausibility in Video Generation by Reasoning the Implausibility", "author": "Yutong Hao and Chen Chen and Ajmal Saeed Mian and Chang Xu and Daochang Liu", "abstract": "Diffusion models can generate realistic videos, but existing methods rely on implicitly learning physical reasoning from large-scale text-video datasets, which is costly, difficult to scale, and still prone to producing implausible motions that violate fundamental physical laws. We introduce a training-free framework that improves physical plausibility at inference time by explicitly reasoning about implausibility and guiding the generation away from it. Specifically, we employ a lightweight physics-aware reasoning pipeline to construct counterfactual prompts that deliberately encode physics-violating behaviors. Then, we propose a novel Synchronized Decoupled Guidance (SDG) strategy, which leverages these prompts through synchronized directional normalization to counteract lagged suppression and trajectory-decoupled denoising to mitigate cumulative trajectory bias, ensuring that implausible content is suppressed immediately and consistently throughout denoising. Experiments across different physical domains show that our approach substantially enhances physical fidelity while maintaining photorealism, despite requiring no additional training. Ablation studies confirm the complementary effectiveness of both the physics-aware reasoning component and SDG. In particular, the aforementioned two designs of SDG are also individually validated to contribute critically to the suppression of implausible content and the overall gains in physical plausibility. This establishes a new and plug-and-play physics-aware paradigm for video generation.", "link": "http://arxiv.org/abs/2509.24702v2", "date": "2026-04-06", "relevancy": 3.15, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.7094}, { %20that%20our%20approach%20substantially%20enhances%20physical%20fidelity%20while%20maintaining%20photorealism%2C%20despite%20requiring%20no%20additional%20training.%20Ablation%20studies%20confirm%20the%20complementary%20effectiveness%20of%20both%20the%20physics-aware%20reasoning%20component%20and%20SDG.%20In%20particular%2C%20the%20aforementioned%20two%20designs%20of%20SDG%20are%20also%20individually%20validated%20to%20contribute%20critically%20to%20the%20suppression%20of%20implausible%20content%20and%20the%20overall%20gains%20in%20physical%20plausibility.%20This%20establishes%20a%20new%20and%20plug-and-play%20physics-aware%20paradigm%20for%20video%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2509.24702v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEnhancing%2520Physical%2520Plausibility%2520in%2520Video%2520Generation%2520by%2520Reasoning%2520the%2520Implausibility%26entry.906535625%3DYutong%2520Hao%2520and%2520Chen%2520Chen%2520and%2520Ajmal%2520Saeed%2520Mian%2520and%2520Chang%2520Xu%2520and%2520Daochang%2520Liu%26entry.1292438233%3DDiffusion%2520models%2520can%2520generate%2520realistic%2520videos%252C%2520but%2520existing%2520methods%2520rely%2520on%2520implicitly%2520learning%2520physical%2520reasoning%2520from%2520large-scale%2520text-video%2520datasets%252C%2520which%2520is%2520costly%252C%2520difficult%2520to%2520scale%252C%2520and%2520still%2520prone%2520to%2520producing%2520implausible%2520motions%2520that%2520violate%2520fundamental%2520physical%2520laws.%2520We%2520introduce%2520a%2520training-free%2520framework%2520that%2520improves%2520physical%2520plausibility%2520at%2520inference%2520time%2520by%2520explicitly%2520reasoning%2520about%2520implausibility%2520and%2520guiding%2520the%2520generation%2520away%2520from%2520it.%2520Specifically%252C%2520we%2520employ%2520a%2520lightweight%2520physics-aware%2520reasoning%2520pipeline%2520to%2520construct%2520count {"title": "Vanast: Virtual Try-On with Human Image Animation via Synthetic Triplet Supervision", "author": "Hyunsoo Cha and Wonjung Woo and Byungjun Kim and Hanbyul Joo", "abstract": "We present Vanast, a unified framework that generates garment-transferred human animation videos directly from a single human image, garment images, and a pose guidance video. Conventional two-stage pipelines treat image-based virtual try-on and pose-driven animation as separate processes, which often results in identity drift, garment distortion, and front-back inconsistency. Our model addresses these issues by performing the entire process in a single unified step to achieve coherent synthesis. To enable this setting, we construct large-scale triplet supervision. Our data generation pipeline includes generating identity-preserving human images in alternative outfits that differ from garment catalog images, capturing full upper and lower garment triplets to overcome the single-garment-posed video pair limitation, and assembling diverse in-the-wild triplets without requiring garment catalog images. We further introduce a Dual Module architecture for video diffusion transformers to stabilize training, preserve pretrained generative quality, and improve garment accuracy, pose adherence, and identity preservation while supporting zero-shot garment interpolation. Together, these contributions allow Vanast to produce high-fidelity, identity-consistent animation across a wide range of garment types.", "link": "http://arxiv.org/abs/2604.04934v1", "date": "2026-04-06", "relevancy": 3.13, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6444}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.6202}, {"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.6133}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Vanast%3A%20Virtual%20Try-On%20with%20Human%20Image%20Animation%20via%20Synthetic%20Triplet%20Supervision&body=Title%3A%20Vanast%3A%20Virtual%20Try-On%20with%20Human%20Image%20Animation%20via%20Synthetic%20Triplet%20Supervision%0AAuthor%3A%20Hyunsoo%20Cha%20and%20Wonjung%20Woo%20and%20Byungjun%20Kim%20and%20Hanbyul%20Joo%0AAbstract%3A%20We%20present%20Vanast%2C%20a%20unified%20framework%20that%20generates%20garment-transferred%20human%20animation%20videos%20directly%20from%20a%20single%20human%20image%2C%20garment%20images%2C%20and%20a%20pose%20guidance%20video.%20Conventional%20two-stage%20pipelines%20treat%20image-based%20virtual%20try-on%20and%20pose-driven%20animation%20as%20separate%20processes%2C%20which%20often%20results%20in%20identity%20drift%2C%20garment%20distortion%2C%20and%20front-back%20inconsistency.%20Our%20model%20addresses%20these%20issues%20by%20performing%20the%20entire%20process%20in%20a%20single%20unified%20step%20to%20achieve%20coherent%20synthesis.%20To%20enable%20this%20setting%2C%20we%20construct%20large-scale%20triplet%20supervision.%20Our%20data%20generation%20pipeline%20includes%20generating%20identity-preserving%20human%20images%20in%20alternative%20outfits%20that%20differ%20from%20garment%20catalog%20images%2C%20capturing%20full%20upper%20and%20lower%20garment%20triplets%20to%20overcome%20the%20single-garment-posed%20video%20pair%20limitation%2C%20and%20assembling%20diverse%20in-the-wild%20triplets%20without%20requiring%20garment%20catalog%20images.%20We%20further%20introduce%20a%20Dual%20Module%20architecture%20for%20video%20diffusion%20transformers%20to%20stabilize%20training%2C%20preserve%20pretrained%20generative%20quality%2C%20and%20improve%20garment%20accuracy%2C%20pose%20adherence%2C%20and%20identity%20preservation%20while%20supporting%20zero-shot%20garment%20interpolation.%20Together%2C%20these%20contributions%20allow%20Vanast%20to%20produce%20high-fidelity%2C%20identity-consistent%20animation%20across%20a%20wide%20range%20of%20garment%20types.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04934v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVanast%253A%2520Virtual%2520Try-On%2520with%2520Human%2520Image%2520Animation%2520via%2520Synthetic%2520Triplet%2520Supervision%26entry.906535625%3DHyunsoo%2520Cha%2520and%2520Wonjung%2520Woo%2520and%2520Byungjun%2520Kim%2520and%2520Hanbyul%2520Joo%26entry.1292438233%3DWe%2520present%2520Vanast%252C%2520a%2520unified%2520framework%2520that%2520generates%2520garment-transferred%2520human%2520animation%2520videos%2520directly%2520from%2520a%2520single%2520human%2520image%252C%2520garment%2520images%252C%2520and%2520a%2520pose%2520guidance%2520video.%2520Conventional%2520two-stage%2520pipelines%2520treat%2520image-based%2520virtual%2520try-on%2520and%2520pose-driven%2520animation%2520as%2520separate%2520processes%252C%2520which%2520often%2520results%2520in%2520identity%2520drift%252C%2520garment%2520distortion%252C%2520and%2520front-back%2520inconsistency.%2520Our%2520model%2520addresses%2520these%2520issues%2520by%2520performing%2520the%2520entire%2520process%2520in%2520a%2520single%2520unified%2520step%2520to%2520achieve%2520coherent%2520synthesis.%2520To%2520enable%2520this%2520setting%252C%2520we%2520construct%2520large-scale%2520triplet%2520supervision.%2520Our%2520data%2520generation%2520pipeline%2520includes%2520generating%2520identity-preserving%2520human%2520images%2520in%2520alternative%2520outfits%2520that%2520differ%2520from%2520garment%2520catalog%2520images%252C%2520capturing%2520full%2520upper%2520and%2520lower%2520garment%2520triplets%2520to%2520overcome%2520the%2520single-garment-posed%2520video%2520pair%2520limitation%252C%2520and%2520assembling%2520diverse%2520in-the-wild%2520triplets%2520without%2520requiring%25 {"title": "3D Gaussian Splatting for Annular Dark Field Scanning Transmission Electron Microscopy Tomography Reconstruction", "author": "Beiyuan Zhang and Hesong Li and Ruiwen Shao and Ying Fu", "abstract": "Analytical Dark Field Scanning Transmission Electron Microscopy (ADF-STEM) tomography reconstructs nanoscale materials in 3D by integrating multi-view tilt-series images, enabling precise analysis of their structural and compositional features. Although integrating more tilt views improves 3D reconstruction, it requires extended electron exposure that risks damaging dose-sensitive materials and introduces drift and misalignment, making it difficult to balance reconstruction fidelity with sample preservation. In practice, sparse-view acquisition is frequently required, yet conventional ADF-STEM methods degrade under limited views, exhibiting artifacts and reduced structural fidelity. To resolve these issues, in this paper, we adapt 3D GS to this domain with three key components. We first model the local scattering strength as a learnable scalar field, denza, to address the mismatch between 3DGS and ADF-STEM imaging physics. Then we introduce a coefficient $\u03b3$ to stabilize scattering across tilt angles, ensuring consistent denza via scattering view normalization. Finally, We incorporate a loss function that includes a 2D Fourier amplitude term to suppress missing wedge artifacts in sparse-view reconstruction. Experiments on 45-view and 15-view tilt series show that DenZa-Gaussian produces high-fidelity reconstructions and 2D projections that align more closely with original tilts, demonstrating superior robustness under sparse-view conditions.", "link": "http://arxiv.org/abs/2604.04693v1", "date": "2026-04-06", "relevancy": 3.0636, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.635}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6142}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.589}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%203D%20Gaussian%20Splatting%20for%20Annular%20Dark%20Field%20Scanning%20Transmission%20Electron%20Microscopy%20Tomography%20Reconstruction&body=Title%3A%203D%20Gaussian%20Splatting%20for%20Annular%20Dark%20Field%20Scanning%20Transmission%20Electron%20Microscopy%20Tomography%20Reconstruction%0AAuthor%3A%20Beiyuan%20Zhang%20and%20Hesong%20Li%20and%20Ruiwen%20Shao%20and%20Ying%20Fu%0AAbstract%3A%20Analytical%20Dark%20Field%20Scanning%20Transmission%20Electron%20Microscopy%20%28ADF-STEM%29%20tomography%20reconstructs%20nanoscale%20materials%20in%203D%20by%20integrating%20multi-view%20tilt-series%20images%2C%20enabling%20precise%20analysis%20of%20their%20structural%20and%20compositional%20features.%20Although%20integrating%20more%20tilt%20views%20improves%203D%20reconstruction%2C%20it%20requires%20extended%20electron%20exposure%20that%20risks%20damaging%20dose-sensitive%20materials%20and%20introduces%20drift%20and%20misalignment%2C%20making%20it%20difficult%20to%20balance%20reconstruction%20fidelity%20with%20sample%20preservation.%20In%20practice%2C%20sparse-view%20acquisition%20is%20frequently%20required%2C%20yet%20conventional%20ADF-STEM%20methods%20degrade%20under%20limited%20views%2C%20exhibiting%20artifacts%20and%20reduced%20structural%20fidelity.%20To%20resolve%20these%20issues%2C%20in%20this%20paper%2C%20we%20adapt%203D%20GS%20to%20this%20domain%20with%20three%20key%20components.%20We%20first%20model%20the%20local%20scattering%20strength%20as%20a%20learnable%20scalar%20field%2C%20denza%2C%20to%20address%20the%20mismatch%20between%203DGS%20and%20ADF-STEM%20imaging%20physics.%20Then%20we%20introduce%20a%20coefficient%20%24%CE%B3%24%20to%20stabilize%20scattering%20a {"title": "ShelfGaussian: Shelf-Supervised Open-Vocabulary Gaussian-based 3D Scene Understanding", "author": "Lingjun Zhao and Yandong Luo and James Hays and Lu Gan", "abstract": "We introduce ShelfGaussian, an open-vocabulary multi-modal Gaussian-based 3D scene understanding framework supervised by off-the-shelf vision foundation models (VFMs). Gaussian-based methods have demonstrated superior performance and computational efficiency across a wide range of scene understanding tasks. However, existing methods either model objects as closed-set semantic Gaussians supervised by annotated 3D labels, neglecting their rendering ability, or learn open-set Gaussian representations via purely 2D self-supervision, leading to degraded geometry and limited to camera-only settings. To fully exploit the potential of Gaussians, we propose a Multi-Modal Gaussian Transformer that enables Gaussians to query features from diverse sensor modalities, and a Shelf-Supervised Learning Paradigm that efficiently optimizes Gaussians with VFM features jointly at 2D image and 3D scene levels. We evaluate ShelfGaussian on various perception and planning tasks. Experiments on Occ3D-nuScenes demonstrate its state-of-the-art zero-shot semantic occupancy prediction performance. ShelfGaussian is further evaluated on an unmanned ground vehicle (UGV) to assess its in the-wild performance across diverse urban scenarios. Project website: https://lunarlab-gatech.github.io/ShelfGaussian/.", "link": "http://arxiv.org/abs/2512.03370v2", "date": "2026-04-06", "relevancy": 3.0565, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.631}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.603}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http:/ {"title": "A Step to Decouple Optimization in 3DGS", "author": "Renjie Ding and Yaonan Wang and Min Liu and Jialin Zhu and Jiazheng Wang and Jiahao Zhao and Wenting Shen and Feixiang He and Xiang Chen", "abstract": "3D Gaussian Splatting (3DGS) has emerged as a powerful technique for real-time novel view synthesis. As an explicit representation optimized through gradient propagation among primitives, optimization widely accepted in deep neural networks (DNNs) is actually adopted in 3DGS, such as synchronous weight updating and Adam with the adaptive gradient. However, considering the physical significance and specific design in 3DGS, there are two overlooked details in the optimization of 3DGS: (i) update step coupling, which induces optimizer state rescaling and costly attribute updates outside the viewpoints, and (ii) gradient coupling in the moment, which may lead to under- or over-effective regularization. Nevertheless, such a complex coupling is under-explored. After revisiting the optimization of 3DGS, we take a step to decouple it and recompose the process into: Sparse Adam, Re-State Regularization and Decoupled Attribute Regularization. Taking a large number of experiments under the 3DGS and 3DGS-MCMC frameworks, our work provides a deeper understanding of these components. Finally, based on the empirical analysis, we re-design the optimization and propose AdamW-GS by re-coupling the beneficial components, under which better optimization efficiency and representation effectiveness are achieved simultaneously.", "link": "http://arxiv.org/abs/2601.16736v4", "date": "2026-04-06", "relevancy": 3.0164, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6104}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6069}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5926}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Step%20to%20Decouple%20Optimization%20in%203DGS&body=Title%3A%20A%20Step%20to%20Decouple%20Optimization%20in%203DGS%0AAuthor%3A%20Renjie%20Ding%20and%20Yaonan%20Wang%20and%20Min%20Liu%20and%20Jialin%20Zhu%20and%20Jiazheng%20Wang%20and%20Jiahao%20Zhao%20and%20Wenting%20Shen%20and%20Feixiang%20He%20and%20Xiang%20Chen%0AAbstract%3A%203D%20Gaussian%20Splatting%20%283DGS%29%20has%20emerged%20as%20a%20powerful%20technique%20for%20real-time%20novel%20view%20synthesis.%20As%20an%20explicit%20representation%20optimized%20through%20gradient%20propagation%20among%20primitives%2C%20optimization%20widely%20accepted%20in%20deep%20neural%20networks%20%28DNNs%29%20is%20actually%20adopted%20in%203DGS%2C%20such%20as%20synchronous%20weight%20updating%20and%20Adam%20with%20the%20adaptive%20gradient.%20However%2C%20considering%20the%20physical%20significance%20and%20specific%20design%20in%203DGS%2C%20there%20are%20two%20overlooked%20details%20in%20the%20optimization%20of%203DGS%3A%20%28i%29%20update%20step%20coupling%2C%20which%20induces%20optimizer%20state%20rescaling%20and%20costly%20attribute%20updates%20outside%20the%20viewpoints%2C%20and%20%28ii%29%20gradient%20coupling%20in%20the%20moment%2C%20which%20may%20lead%20to%20under-%20or%20over-effective%20regularization.%20Nevertheless%2C%20such%20a%20complex%20coupling%20is%20under-explored.%20After%20revisiting%20the%20optimization%20of%203DGS%2C%20we%20take%20a%20step%20to%20decouple%20it%20and%20recompose%20the%20process%20into%3A%20Sparse%20Adam%2C%20Re-State%20Regularization%20and%20Decoupled%20Attribute%20Regularization.%20Taking%20a%20large%20number%20of%20experiments%20under%20the%203DGS%20and%203DGS-MCMC%20frameworks%2C%20our%20work%20provides%20a%20deeper%20understanding%20of%20these%20components.%20Finally%2C%20based%20on%20the%20empirical%20analysis%2C%20we%20re-design%20the%20optimization%20and%20propose%20AdamW-GS%20by%20re-coupling%20the%20beneficial%20components%2C%20under%20which%20better%20optimization%20efficiency%20and%20representation%20effectiveness%20are%20achieved%20simultaneously.%0ALink%3A%20http%3A//arxiv.org/abs/2601.16736v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Step%2520to%2520Decouple%2520Optimization%2520in%25203DGS%26entry.906535625%3DRenjie%2520Ding%2520and%2520Yaonan%2520Wang%2520and%2520Min%2520Liu%2520and%2520Jialin%2520Zhu%2520and%2520Jiazheng%2520Wang%2520and%2520Jiahao%2520Zhao%2520and%2520Wenting%2520Shen%2520and%2520Feixiang%2520He%2520and%2520Xiang%2520Chen%26entry.1292438233%3D3D%2520Gaussian%2520Splatting%2520%25283DGS%2529%2520has%2520emerged%2520as%2520a%2520powerful%2520technique%2520for%2520real-time%2520novel%2520view%2520synthesis.%2520As%2520an%2520explicit%2520representation%2520optimized%2520through%2520gradient%2520propagation%2520among%2520primitives%252C%2520optimization%2520widely%2520accepted%2520in%2520deep%2520neural%2520networks%2520%2528DNNs%2529%2520is%2520actually%2520adopted%2520in%25203DGS%252C%2520such%2520as%2520synchronous%2520weight%2520updating%2520and%2520Adam%2520with%2520the%2520adaptive%2520gradient.%2520However%252C%2520considering%2520the%2520physical%2520significance%2520and%2520specific%2520design%2520in%25203DGS%252C%2520there%2520are%2520two%2520overlooked%2520details%2520in%2520the%2520optimization%2520of%25203DGS%253A%2520%2528i%2529%2520update%2520step%2520coupling%252C%2520which%2520induces%2520optimizer%2520state%2520rescaling%2520and%2520costly%2520attribute%2520updates%2520outside%2520the%2520viewpoints%252C%2520and%2520%2528ii%2529%2520gradient%2520coupling%2520in%2520the%2520moment%252C%2520which%2520may%2520lead%2520to%2520under-%2520or%2520over-effective%2520regularization.%2520Nevertheless%252C%2520such%2520a%2 {"title": "PR-IQA: Partial-Reference Image Quality Assessment for Diffusion-Based Novel View Synthesis", "author": "Inseong Choi and Siwoo Lee and Seung-Hun Nam and Soohwan Song", "abstract": "Diffusion models are promising for sparse-view novel view synthesis (NVS), as they can generate pseudo-ground-truth views to aid 3D reconstruction pipelines like 3D Gaussian Splatting (3DGS). However, these synthesized images often contain photometric and geometric inconsistencies, and their direct use for supervision can impair reconstruction. To address this, we propose Partial-Reference Image Quality Assessment (PR-IQA), a framework that evaluates diffusion-generated views using reference images from different poses, eliminating the need for ground truth. PR-IQA first computes a geometrically consistent partial quality map in overlapping regions. It then performs quality completion to inpaint this partial map into a dense, full-image map. This completion is achieved via a cross-attention mechanism that incorporates reference-view context, ensuring cross-view consistency and enabling thorough quality assessment. When integrated into a diffusion-augmented 3DGS pipeline, PR-IQA restricts supervision to high-confidence regions identified by its quality maps. Experiments demonstrate that PR-IQA outperforms existing IQA methods, achieving full-reference-level accuracy without ground-truth supervision. Thus, our quality-aware 3DGS approach more effectively filters inconsistencies, producing superior 3D reconstructions and NVS results.The project page is available at https://kakaomacao.github.io/pr-iqa-project-page/.", "link": "http://arxiv.org/abs/2604.04576v1", "date": "2026-04-06", "relevancy": 2.9789, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6115}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6115}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5644}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PR-IQA%3A%20Partial-Reference%20Image%20Quality%20Assessment%20for%20Diffusion-Based%20Novel%20View%20Synthesis&body=Title%3A%20PR-IQA%3A%20Partial-Reference%20Image%20Quality%20Assessment%20for%20Diffusion-Based%20Novel%20View%20Synthesis%0AAuthor%3A%20Inseong%20Choi%20and%20Siwoo%20Lee%20and%20Seung-Hun%20Nam%20and%20Soohwan%20Song%0AAbstract%3A%20Diffusion%20models%20are%20promising%20for%20sparse-view%20novel%20view%20synthesis%20%28NVS%29%2C%20as%20they%20can%20generate%20pseudo-ground-truth%20views%20to%20aid%203D%20reconstruction%20pipelines%20like%203D%20Gaussian%20Splatting%20%283DGS%29.%20However%2C%20these%20synthesized%20images%20often%20contain%20photometric%20and%20geometric%20inconsistencies%2C%20and%20their%20direct%20use%20for%20supervision%20can%20impair%20reconstruction.%20To%20address%20this%2C%20we%20propose%20Partial-Reference%20Image%20Quality%20Assessment%20%28PR-IQA%29%2C%20a%20framework%20that%20evaluates%20diffusion-generated%20views%20using%20reference%20images%20from%20different%20poses%2C%20eliminating%20the%20need%20for%20ground%20truth.%20PR-IQA%20first%20computes%20a%20geometrically%20consistent%20partial%20quality%20map%20in%20overlapping%20regions.%20It%20then%20performs%20quality%20completion%20to%20inpaint%20this%20partial%20map%20into%20a%20dense%2C%20full-image%20map.%20This%20completion%20is%20achieved%20via%20a%20cross-attention%20mechanism%20that%20incorporates%20reference-view%20context%2C%20ensuring%20cross-view%20consistency%20and%20enabling%20thorough%20quality%20assessment.%20When%20integrated%20into%20a%20diffusion-augmented%203DGS%20pipeline%2C%20PR-IQA%20restricts%20supervision%20to%20high-confidence%20regions%20identified%20by%20its%20quality%20maps.%20Experiments%20demonstrate%20that%20PR-IQA%20outperforms%20existing%20IQA%20methods%2C%20achieving%20full-reference-level%20accuracy%20without%20ground-truth%20supervision.%20Thus%2C%20our%20quality-aware%203DGS%20approach%20more%20effectively%20filters%20inconsistencies%2C%20producing%20superior%203D%20reconstructions%20and%20NVS%20results.The%20project%20page%20is%20available%20at%20https%3A//kakaomacao.github.io/pr-iqa-project-page/.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04576v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPR-IQA%253A%2520Partial-Reference%2520Image%2520Quality%2520Assessment%2520for%2520Diffusion-Based%2520Novel%2520View%2520Synthesis%26entry.906535625%3DInseong%2520Choi%2520and%2520Siwoo%2520Lee%2520and%2520Seung-Hun%2520Nam%2520and%2520Soohwan%2520Song%26entry.1292438233%3DDiffusion%2520models%2520are%2520promising%2520for%2520sparse-view%2520novel%2520view%2520synthesis%2520%2528NVS%2529%252C%2520as%2520they%2520can%2520generate%2520pseudo-ground-truth%2520views%2520to%2520aid%25203D%2520reconstruction%2520pipelines%2520like%25203D%2520Gaussian%2520Splatting%2520%25283DGS%2529.%2520However%252C%2520these%2520synthesized%2520images%2520often%2520contain%2520photometric%2520and%2520geometric%2520inconsistencies%252C%2520and%2520their%2520direct%2520use%2520for%2520supervision%2520can%2520impair%2520reconstruction.%2520To%2520address%2520this%252C%2520we%2520propose%2520Partial-Reference%2520Image%2520Quality%2520Assessment%2520%2528PR-IQA%2529%252C%2520a%2520framework%2520that%2520evaluates%2520diffusion-generated%2520views%2520using%2520reference%2520images%2520from%2520different%2520poses%252C%2520eliminating%2520the%2520need%2520for%2520ground%2520truth.%2520PR-IQA%2520first%2520computes%2520a%2520geometrically%2520consistent%2520partial%2520quality%2520map%2520in%2520overlapping%2520regions.%2520It%2520then%2520performs%2520quality%2520completion%2520to%2520inpaint%2520this%2520partial%2520map%2520into%2520a%2520dense%252C%2520full-image%2520map.%2520This%2520completion%2520is%2520achieved%2520via%2520a%2520cross-attention%2520mechanism%2520that%2520incorporates%2520reference-view%2520context%252C%2520ensuring%2520cross-view%2520consistency%2520and%2520enabling%2520thorough%2520quality%2520assessment.%2520When%2520integrated%2520into%2520a%2520diffusion-augmented%25203DGS%2520pipeline%252C%2520PR-IQA%2520restricts%2520supervision%2520to%2520high-confidence%2520regions%2520identified%2520by%2520its%2520quality%2520maps.%2520Experiments%2520demonstrate%2520that%2520PR-IQA%2520outperforms%2520existing%2520IQA%2520methods%252C%2520achieving%2520full-reference-level%2520accuracy%2520without%2520ground-truth%2520supervision.%2520Thus%252C%2520our%2520quality-aware%25203DGS%2520approach%2520more%2520effectively%2520filters%2520inconsistencies%252C%2520producing%2520superior%25203D%2520reconstructions%2520and%2520NVS%2520results.The%2520project%2520page%2520is%2520available%2520at%2520https%253A//kakaomacao.github.io/pr-iqa-project-page/.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.04576v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=PR-IQA%3A%20Partial-Reference%20Image%20Quality%20Assessment%20for%20Diffusion-Based%20Novel%20View%20Synthesis&entry.906535625=Inseong%20Choi%20and%20Siwoo%20Lee%20and%20Seung-Hun%20Nam%20and%20Soohwan%20Song&entry.1292438233=Diffusion%20models%20are%20promising%20for%20sparse-view%20novel%20view%20synthesis%20%28NVS%29%2C%20as%20they%20can%20generate%20pseudo-ground-truth%20views%20to%20aid%203D%20reconstruction%20pipelines%20like%203D%20Gaussian%20Splatting%20%283DGS%29.%20However%2C%20these%20synthesized%20images%20often%20contain%20photometric%20and%20geometric%20inconsistencies%2C%20and%20their%20direct%20use%20for%20supervision%20can%20impair%20reconstruction.%20To%20address%20this%2C%20we%20propose%20Partial-Reference%20Image%20Quality%20Assessment%20%28PR-IQA%29%2C%20a%20framework%20that%20evaluates%20diffusion-generated%20views%20using%20reference%20images%20from%20different%20poses%2C%20eliminating%20the%20need%20for%20ground%20truth.%20PR-IQA%20first%20computes%20a%20geometrically%20consistent%20partial%20quality%20map%20in%20overlapping%20regions.%20It%20then%20performs%20quality%20completion%20to%20inpaint%20this%20partial%20map%20into%20a%20dense%2C%20full-image%20map.%20This%20completion%20is%20achieved%20via%20a%20cross-attention%20mechanism%20that%20incorporates%20reference-view%20context%2C%20ensuring%20cross-view%20consistency%20and%20enabling%20thorough%20quality%20assessment.%20When%20integrated%20into%20a%20diffusion-augmented%203DGS%20pipeline%2C%20PR-IQA%20restricts%20supervision%20to%20high-confidence%20regions%20identified%20by%20its%20quality%20maps.%20Experiments%20demonstrate%20that%20PR-IQA%20outperforms%20existing%20IQA%20methods%2C%20achieving%20full-reference-level%20accuracy%20without%20ground-truth%20supervision.%20Thus%2C%20our%20quality-aware%203DGS%20approach%20more%20effectively%20filters%20inconsistencies%2C%20producing%20superior%203D%20reconstructions%20and%20NVS%20results.The%20project%20page%20is%20available%20at%20https%3A//kakaomacao.github.io/pr-iqa-project-page/.&entry.1838667208=http%3A//arxiv.org/abs/2604.04576v1&entry.124074799=Read"},
{"title": "Durian: Dual Reference Image-Guided Portrait Animation with Attribute Transfer", "author": "Hyunsoo Cha and Byungjun Kim and Hanbyul Joo", "abstract": "We present Durian, the first method for generating portrait animation videos with cross-identity attribute transfer from one or more reference images to a target portrait. Training such models typically requires attribute pairs of the same individual, which are rarely available at scale. To address this challenge, we propose a self-reconstruction formulation that leverages ordinary portrait videos to learn attribute transfer without explicit paired data. Two frames from the same video act as a pseudo pair: one serves as an attribute reference and the other as an identity reference. To enable this self-reconstruction training, we introduce a Dual ReferenceNet that processes the two references separately and then fuses their features via spatial attention within a diffusion model. To make sure each reference functions as a specialized stream for either identity or attribute information, we apply complementary masking to the reference images. Together, these two components guide the model to reconstruct the original video, naturally learning cross-identity attribute transfer. To bridge the gap between self-reconstruction training and cross-identity inference, we introduce a mask expansion strategy and augmentation schemes, enabling robust transfer of attributes with varying spatial extent and misalignment. Durian achieves state-of-the-art performance on portrait animation with attribute transfer. Moreover, its dual reference design uniquely supports multi-attribute composition and smooth attribute interpolation within a single generation pass, enabling highly flexible and controllable synthesis.", "link": "http://arxiv.org/abs/2509.04434v3", "date": "2026-04-06", "relevancy": 2.9331, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5962}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5902}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5734}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Durian%3A%20Dual%20Reference%20Image-Guided%20Portrait%20Animation%20with%20Attribute%20Transfer&body=Title%3A%20Durian%3A%20Dual%20Reference%20Image-Guided%20Portrait%20Animation%20with%20Attribute%20Transfer%0AAuthor%3A%20Hyunsoo%20Cha%20and%20Byungjun%20Kim%20and%20Hanbyul%20Joo%0AAbstract%3A%20We%20present%20Durian%2C%20the%20first%20method%20for%20generating%20portrait%20animation%20videos%20with%20cross-identity%20attribute%20transfer%20from%20one%20or%20more%20reference%20images%20to%20a%20target%20portrait.%20Training%20such%20models%20typically%20requires%20attribute%20pairs%20of%20the%20same%20individual%2C%20which%20are%20rarely%20available%20at%20scale.%20To%20address%20this%20challenge%2C%20we%20propose%20a%20self-reconstruction%20formulation%20that%20leverages%20ordinary%20portrait%20videos%20to%20learn%20attribute%20transfer%20without%20explicit%20paired%20data.%20Two%20frames%20from%20the%20same%20video%20act%20as%20a%20pseudo%20pair%3A%20one%20serves%20as%20an%20attribute%20reference%20and%20the%20other%20as%20an%20identity%20reference.%20To%20enable%20this%20self-reconstruction%20training%2C%20we%20introduce%20a%20Dual%20ReferenceNet%20that%20processes%20the%20two%20references%20separately%20and%20then%20fuses%20their%20features%20via%20spatial%20attention%20within%20a%20diffusion%20model.%20To%20make%20sure%20each%20reference%20functions%20as%20a%20specialized%20stream%20for%20either%20identity%20or%20attribute%20information%2C%20we%20apply%20complementary%20masking%20to%20the%20reference%20images.%20Together%2C%20these%20two%20components%20guide%20the%20model%20to%20reconstruct%20the%20original%20video%2C%20naturally%20learning%20cross-identity%20attribute%20transfer.%20To%20bridge%20the%20gap%20between%20self-reconstruction%20training%20and%20cross-identity%20inference%2C%20we%20introduce%20a%20mask%20expansion%20strategy%20and%20augmentation%20schemes%2C%20enabling%20robust%20transfer%20of%20attributes%20with%20varying%20spatial%20extent%20and%20misalignment.%20Durian%20achieves%20state-of-the-art%20performance%20on%20portrait%20animation%20with%20attribute%20transfer.%20Moreover%2C%20its%20dual%20reference%20design%20uniquely%20supports%20multi-attribute%20composition%20and%20smooth%20attribute%20interpolation%20within%20a%20single%20generation%20pass%2C%20enabling%20highly%20flexible%20and%20controllable%20synthesis.%0ALink%3A%20http%3A//arxiv.org/abs/2509.04434v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDurian%253A%2520Dual%2520Reference%2520Image-Guided%2520Portrait%2520Animation%2520with%2520Attribute%2520Transfer%26entry.906535625%3DHyunsoo%2520Cha%2520and%2520Byungjun%2520Kim%2520and%2520Hanbyul%2520Joo%26entry.1292438233%3DWe%2520present%2520Durian%252C%2520the%2520first%2520method%2520for%2520generating%2520portrait%2520animation%2520videos%2520with%2520cross-identity%2520attribute%2520transfer%2520from%2520one%2520or%2520more%2520reference%2520images%2520to%2520a%2520target%2520portrait.%2520Training%2520such%2520models%2520typically%2520requires%2520attribute%2520pairs%2520of%2520the%2520same%2520individual%252C%2520which%2520are%2520rarely%2520available%2520at%2520scale.%2520To%2520address%2520this%2520challenge%252C%2520we%2520propose%2520a%2520self-reconstruction%2520formulation%2520that%2520leverages%2520ordinary%2520portrait%2520videos%2520to%2520learn%2520attribute%2520transfer%2520without%2520explicit%2520paired%2520data.%2520Two%2520frames%2520from%2520the%2520same%2520video%2520act%2520as%2520a%2520pseudo%2520pair%253A%2520one%252 {"title": "Pose-dIVE: Pose-Diversified Augmentation with Diffusion Model for Person Re-Identification", "author": "In\u00e8s Hyeonsu Kim and Woojeong Jin and Soowon Son and Junyoung Seo and Seokju Cho and JeongYeol Baek and Byeongwon Lee and JoungBin Lee and Seungryong Kim", "abstract": "Person re-identification (Re-ID) often faces challenges due to variations in human poses and camera viewpoints, which significantly affect the appearance of individuals across images. Existing datasets frequently lack diversity and scalability in these aspects, hindering the generalization of Re-ID models to new camera systems or environments. To overcome this, we propose Pose-dIVE, a novel data augmentation approach that incorporates sparse and underrepresented human pose and camera viewpoint examples into the training data, addressing the limited diversity in the original training data distribution. Our objective is to augment the training dataset to enable existing Re-ID models to learn features unbiased by human pose and camera viewpoint variations. By conditioning the diffusion model on both the human pose and camera viewpoint through the SMPL model, our framework generates augmented training data with diverse human poses and camera viewpoints. Experimental results demonstrate the effectiveness of our method in addressing human pose bias and enhancing the generalizability of Re-ID models compared to other data augmentation-based Re-ID approaches.", "link": "http://arxiv.org/abs/2406.16042v3", "date": "2026-04-06", "relevancy": 2.9331, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6106}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5806}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5686}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Pose-dIVE%3A%20Pose-Diversified%20Augmentation%20with%20Diffusion%20Model%20for%20Person%20Re-Identification&body=Title%3A%20Pose-dIVE%3A%20Pose-Diversified%20Augmentation%20with%20Diffusion%20Model%20for%20Person%20Re-Identification%0AAuthor%3A%20In%C3%A8s%20Hyeonsu%20Kim%20and%20Woojeong%20Jin%20and%20Soowon%20Son%20and%20Junyoung%20Seo%20and%20Seokju%20Cho%20and%20JeongYeol%20Baek%20and%20Byeongwon%20Lee%20and%20JoungBin%20Lee%20and%20Seungryong%20Kim%0AAbstract%3A%20Person%20re-identification%20%28Re-ID%29%20often%20faces%20challenges%20due%20to%20variations%20in%20human%20poses%20and%20camera%20viewpoints%2C%20which%20significantly%20affect%20the%20appearance%20of%20individuals%20across%20images.%20Existing%20datasets%20frequently%20lack%20diversity%20and%20scalability%20in%20these%20aspects%2C%20hindering%20the%20generalization%20of%20Re-ID%20models%20to%20new%20camera%20systems%20or%20environments.%20To%20overcome%20this%2C%20we%20propose%20Pose-dIVE%2C%20a%20novel%20data%20augmentation%20approach%20that%20incorporates%20sparse%20and%20underrepresented%20human%20pose%20and%20camera%20viewpoint%20examples%20into%20the%20training%20data%2C%20addressing%20the%20limited%20diversity%20in%20the%20original%20training%20data%20distribution.%20Our%20objective%20is%20to%20augment%20the%20training%20dataset%20to%20enable%20existing%20Re-ID%20models%20to%20learn%20features%20unbiased%20by%20human%20pose%20and%20camera%20viewpoint%20variations.%20By%20conditioning%20the%20diffusion%20model%20on%20both%20the%20human%20pose%20and%20camera%20viewpoint%20through%20the%20SMPL%20model%2C%20our%20framework%20generates%20augmented%20training%20data%20with%20diverse%20human%20poses%20and%20camera%20viewpoints.%20Experimental%20results%20demonstrate%20the%20effectiveness%20of%20our%20method%20in%20addressing%20human%20pose%20bias%20and%20enhancing%20the%20generalizability%20of%20Re-ID%20models%20compared%20to%20other%20data%20augmentation-based%20Re-ID%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2406.16042v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPose-dIVE%253A%2520Pose-Diversified%2520Augmentation%2520with%2520Diffusion%2520Model%2520for%2520Person%2520Re-Identification%26entry.906535625%3DIn%25C3%25A8s%2520Hyeonsu%2520Kim%2520and%2520Woojeong%2520Jin%2520and%2520Soowon%2520Son%2520and%2520Junyoung%2520Seo%2520and%2520Seokju%2520Cho%2520and%2520JeongYeol%2520Baek%2520and%2520Byeongwon%2520Lee%2520and%2520JoungBin%2520Lee%2520and%2520Seungryong%2520Kim%26entry.1292438233%3DPerson%2520re-identification%2520%2528Re-ID%2529%2520often%2520faces%2520challenges%2520due%2520to%2520variations%2520in%2520human%2520poses%2520and%2520camera%2520viewpoints%252C%2520which%2520significantly%2520affect%2520the%2520appearance%2520of%2520individuals%2520across%2520images.%2520Existing%2520datasets%2520frequently%2520lack%2520diversity%2520and%2520scalability%2520in%2520these%2520aspects%252C%2520hindering%2520the%2520generalization%2520of%2520Re-ID%2520models%2520to%2520new%2520camera%2520systems%2520or%2520environments.%2520To%2520overcome%2520this%252C%2520we%2520propose%2520Pose-dIVE%252C%2520a%2520novel%2520data%2520augmentation%2520approach%2520that%2520incorporates%2520sparse%2520and%2520underrepresented%2520human%2520pose%2520and%2520camera%2520viewpoint%2520examples%2520into%2520the%2520training%2520data%252C%2520addressing%2520the%2520limited%2520diversity%2520in%2520the%2520original%2520training%2520data%2520distribution.%2520Our%2520objective%2520is%2520to%2520augment%2520the%2520training%2520dataset%2520to%2520enable%2520existing%2520Re-ID%2520models%2520to%2520learn%2520features%2520unbiased%2520by%2520human%2520pose%2520and%2520camera%2520viewpoint%2520variations.%2520By%2520conditioning%2520the%2520diffusion%2520model%2520on%2520both%2520the%2520human%2520pose%2520and%2520camera%2520viewpoint%2520through%2520the%2520SMPL%2520model%252C%2520our%2520framework%2520generates%2520augmented%2520training%2520data%2520with%2520diverse%2520human%2520poses%2520and%2520camera%2520viewpoints.%2520Experimental%2520results%2520demonstrate%2520the%2520effectiveness%2520of%2520our%2520method%2520in%2520addressing%2520human%2520pose%2520bias%2520and%2520enhancing%2520the%2520generalizability%2520of%2520Re-ID%2520models%2520compared%2520to%2520other%2520data%2520augmentation-based%2520Re-ID%2520approaches.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2406.16042v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Pose-dIVE%3A%20Pose-Diversified%20Augmentation%20with%20Diffusion%20Model%20for%20Person%20Re-Identification&entry.906535625=In%C3%A8s%20Hyeonsu%20Kim%20and%20Woojeong%20Jin%20and%20Soowon%20Son%20and%20Junyoung%20Seo%20and%20Seokju%20Cho%20and%20JeongYeol%20Baek%20and%20Byeongwon%20Lee%20and%20JoungBin%20Lee%20and%20Seungryong%20Kim&entry.1292438233=Person%20re-identification%20%28Re-ID%29%20often%20faces%20challenges%20due%20to%20variations%20in%20human%20poses%20and%20camera%20viewpoints%2C%20which%20significantly%20affect%20the%20appearance%20of%20individuals%20across%20images.%20Existing%20datasets%20frequently%20lack%20diversity%20and%20scalability%20in%20these%20aspects%2C%20hindering%20the%20generalization%20of%20Re-ID%20models%20to%20new%20camera%20systems%20or%20environments.%20To%20overcome%20this%2C%20we%20propose%20Pose-dIVE%2C%20a%20novel%20data%20augmentation%20approach%20that%20incorporates%20sparse%20and%20underrepresented%20human%20pose%20and%20camera%20viewpoint%20examples%20into%20the%20training%20data%2C%20addressing%20the%20limited%20diversity%20in%20the%20original%20training%20data%20distribution.%20Our%20objective%20is%20to%20augment%20the%20training%20dataset%20to%20enable%20existing%20Re-ID%20models%20to%20learn%20features%20unbiased%20by%20human%20pose%20and%20camera%20viewpoint%20variations.%20By%20conditioning%20the%20diffusion%20model%20on%20both%20the%20human%20pose%20and%20camera%20viewpoint%20through%20the%20SMPL%20model%2C%20our%20framework%20generates%20augmented%20training%20data%20with%20diverse%20human%20poses%20and%20camera%20viewpoints.%20Experimental%20results%20demonstrate%20the%20effectiveness%20of%20our%20method%20in%20addressing%20human%20pose%20bias%20and%20enhancing%20the%20generalizability%20of%20Re-ID%20models%20compared%20to%20other%20data%20augmentation-based%20Re-ID%20approaches.&entry.1838667208=http%3A//arxiv.org/abs/2406.16042v3&entry.124074799=Read"},
{"title": "LoMa: Local Feature Matching Revisited", "author": "David Nordstr\u00f6m and Johan Edstedt and Georg B\u00f6kman and Jonathan Astermark and Anders Heyden and Viktor Larsson and M\u00e5rten Wadenb\u00e4ck and Michael Felsberg and Fredrik Kahl", "abstract": "Local feature matching has long been a fundamental component of 3D vision systems such as Structure-from-Motion (SfM), yet progress has lagged behind the rapid advances of modern data-driven approaches. The newer approaches, such as feed-forward reconstruction models, have benefited extensively from scaling dataset sizes, whereas local feature matching models are still only trained on a few mid-sized datasets. In this paper, we revisit local feature matching from a data-driven perspective. In our approach, which we call LoMa, we combine large and diverse data mixtures, modern training recipes, scaled model capacity, and scaled compute, resulting in remarkable gains in performance. Since current standard benchmarks mainly rely on collecting sparse views from successful 3D reconstructions, the evaluation of progress in feature matching has been limited to relatively easy image pairs. To address the resulting saturation of benchmarks, we collect 1000 highly challenging image pairs from internet data into a new dataset called HardMatch. Ground truth correspondences for HardMatch are obtained via manual annotation by the authors. In our extensive benchmarking suite, we find that LoMa makes outstanding progress across the board, outperforming the state-of-the-art method ALIKED+LightGlue by +18.6 mAA on HardMatch, +29.5 mAA on WxBS, +21.4 (1m, 10$^\\circ$) on InLoc, +24.2 AUC on RUBIK, and +12.4 mAA on IMC 2022. We release our code and models publicly at https://github.com/davnords/LoMa.", "link": "http://arxiv.org/abs/2604.04931v1", "date": "2026-04-06", "relevancy": 2.933, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "h {"title": "Discovering Failure Modes in Vision-Language Models using RL", "author": "Kanishk Jain and Qian Yang and Shravan Nayak and Parisa Kordjamshidi and Nishanth Anand and Aishwarya Agrawal", "abstract": "Vision-language Models (VLMs), despite achieving strong performance on multimodal benchmarks, often misinterpret straightforward visual concepts that humans identify effortlessly, such as counting, spatial reasoning, and viewpoint understanding. Previous studies manually identified these weaknesses and found that they often stem from deficits in specific skills. However, such manual efforts are costly, unscalable, and subject to human bias, which often overlooks subtle details in favor of salient objects, resulting in an incomplete understanding of a model's vulnerabilities. To address these limitations, we propose a Reinforcement Learning (RL)-based framework to automatically discover the failure modes or blind spots of any candidate VLM on a given data distribution without human intervention. Our framework trains a questioner agent that adaptively generates queries based on the candidate VLM's responses to elicit incorrect answers. Our approach increases question complexity by focusing on fine-grained visual details and distinct skill compositions as training progresses, consequently identifying 36 novel failure modes in which VLMs struggle. We demonstrate the broad applicability of our framework by showcasing its generalizability across various model combinations.", "link": "http://arxiv.org/abs/2604.04733v1", "date": "2026-04-06", "relevancy": 2.925, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5935}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5935}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5681}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Discovering%20Failure%20Modes%20in%20Vision-Language%20Models%20using%20RL&body=Title%3A%20Discovering%20Failure%20Modes%20in%20Vision-Language%20Models%20using%20RL%0AAuthor%3A%20Kanishk%20Jain%20and%20Qian%20Yang%20and%20Shravan%20Nayak%20and%20Parisa%20Kordjamshidi%20and%20Nishanth%20Anand%20and%20Aishwarya%20Agrawal%0AAbstract%3A%20Vision-language%20Models%20%28VLMs%29%2C%20despite%20achieving%20strong%20performance%20on%20multimodal%20benchmarks%2C%20often%20misinterpret%20straightforward%20visual%20concepts%20that%20humans%20identify%20effortlessly%2C%20such%20as%20counting%2C%20spatial%20reasoning%2C%20and%20viewpoint%20understanding.%20Previous%20studies%20manually%20identified%20these%20weaknesses%20and%20found%20that%20they%20often%20stem%20from%20deficits%20in%20specific%20skills.%20However%2C%20such%20manual%20efforts%20are%20costly%2C%20unscalable%2C%20and%20subject%20to%20human%20bias%2C%20which%20often%20overlooks%20subtle%20details%20in%20favor%20of%20salient%20objects%2C%20resulting%20in%20an%20incomplete%20understanding%20of%20a%20model%27s%20vulnerabilities.%20To%20address%20these%20limitations%2C%20we%20propose%20a%20Reinforcement%20Learning%20%28RL%29-based%20framework%20to%20automatically%20discover%20the%20failure%20modes%20or%20blind%20spots%20of%20any%20candidate%20VLM%20on%20a%20given%20data%20distribution%20without%20human%20intervention.%20Our%20framework%20trains%20a%20questioner%20agent%20that%20adaptively%20generates%20queries%20based%20on%20the%20candidate%20VLM%27s%20responses%20to%20elicit%20incorrect%20answers.%20Our%20approach%20increases%20question%20complexity%20by%20focusing%20on%20fine-grained%20visual%20details%20and%20distinct%20skill%20compositions%20as%20training%20progresses%2C%20consequently%20identifying%2036%20novel%20failure%20modes%20in%20which%20VLMs%20struggle.%20We%20demonstrate%20the%20broad%20applicability%20of%20our%20framework%20by%20showcasing%20its%20generalizability%20across%20various%20model%20combinations.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04733v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDiscovering%2520Failure%2520Modes%2520in%2520Vision-Language%2520Models%2520using%2520RL%26entry.906535625%3DKanishk%2520Jain%2520and%2520Qian%2520Yang%2520and%2520Shravan%2520Nayak%2520and%2520Parisa%2520Kordjamshidi%2520and%2520Nishanth%2520Anand%2520and%2520Aishwarya%2520Agrawal%26entry.1292438233%3DVision-language%2520Models%2520%2528VLMs%2529%252C%2520despite%2520achieving%2520strong%2520performance%2520on%2520multimodal%2520benchmarks%252C%2520often%2520misinterpret%2520straightforward%2520visual%2520concepts%2520that%2520humans%2520identify%2520effortlessly%252C%2520such%2520as%2520counting%252C%2520spatial%2520reasoning%252C%2520and%2520viewpoint%2520understanding.%2520Previous%2520studies%2520manually%2520identified%2520these%2520weaknesses%2520and%2520found%2520that%2520they%2520often%2520stem%2520from%2520deficits%2520in%2520specific%2520skills.%2520However%252C%2520such%2520manual%2520efforts%2520are%2520costly%252C%2520unscalable%252C%2520and%2520subject%2520to%2520human%2520bias%252C%2520which%2520often%2520overlooks%2520subtle%2520details%2520in%2520favor%2520of%2520salient%2520objects%252C%2520resulting%2520in%2520an%2520incomplete%2520understanding%2520of%2520a%2520model%2527s%2520vulnerabilities.%2520To%2520address%2520these%2520limitations%252C%2520we%2520propose%2520a%2520Reinforcement%2520Learning%2520%2528RL%2529-based%2520framework%2520to%2520automatically%2520discover%2520the%2520failure%2520modes%2520or%2520blind%2520spots%2520of%2520any%2520candidate%2520VLM%2520on%2520a%2520given%2520data%2520distribution%2520without%2520human%2520intervention.%2520Our%2520framework%2520trains%2520a%2520questioner%2520agent%2520that%2520adaptively%2520generates%2520queries%2520based%2520on%2520the%2520candidate%2520VLM%2527s%2520responses%2520to%2520elicit%2520incorrect%2520answers.%2520Our%2520approach%2520increases%2520question%2520complexity%2520by%2520focusing%2520on%2520fine-grained%2520visual%2520details%2520and%2520distinct%2520skill%2520compositions%2520as%2520training%2520progresses%252C%2520consequently%2520identifying%252036%2520novel%2520failure%2520modes%2520in%2520which%2520VLMs%2520struggle.%2520We%2520demonstrate%2520the%2520broad%2520applicability%2520of%2520our%2520framework%2520by%2520showcasing%2520its%2520generalizability%2520across%2520various%2520model%2520combinations.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.04733v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Discovering%20Failure%20Modes%20in%20Vision-Language%20Models%20using%20RL&entry.906535625=Kanishk%20Jain%20and%20Qian%20Yang%20and%20Shravan%20Nayak%20and%20Parisa%20Kordjamshidi%20and%20Nishanth%20Anand%20and%20Aishwarya%20Agrawal&entry.1292438233=Vision-language%20Models%20%28VLMs%29%2C%20despite%20achieving%20strong%20performance%20on%20multimodal%20benchmarks%2C%20often%20misinterpret%20straightforward%20visual%20concepts%20that%20humans%20identify%20effortlessly%2C%20such%20as%20counting%2C%20spatial%20reasoning%2C%20and%20viewpoint%20understanding.%20Previous%20studies%20manually%20identified%20these%20weaknesses%20and%20found%20that%20they%20often%20stem%20from%20deficits%20in%20specific%20skills.%20However%2C%20such%20manual%20efforts%20are%20costly%2C%20unscalable%2C%20and%20subject%20to%20human%20bias%2C%20which%20often%20overlooks%20subtle%20details%20in%20favor%20of%20salient%20objects%2C%20resulting%20in%20an%20incomplete%20understanding%20of%20a%20model%27s%20vulnerabilities.%20To%20address%20these%20limitations%2C%20we%20propose%20a%20Reinforcement%20Learning%20%28RL%29-based%20framework%20to%20automatically%20discover%20the%20failure%20modes%20or%20blind%20spots%20of%20any%20candidate%20VLM%20on%20a%20given%20data%20distribution%20without%20human%20intervention.%20Our%20framework%20trains%20a%20questioner%20agent%20that%20adaptively%20generates%20queries%20based%20on%20the%20candidate%20VLM%27s%20responses%20to%20elicit%20incorrect%20answers.%20Our%20approach%20increases%20question%20complexity%20by%20focusing%20on%20fine-grained%20visual%20details%20and%20distinct%20skill%20compositions%20as%20training%20progresses%2C%20consequently%20identifying%2036%20novel%20failure%20modes%20in%20which%20VLMs%20struggle.%20We%20demonstrate%20the%20broad%20applicability%20of%20our%20framework%20by%20showcasing%20its%20generalizability%20across%20various%20model%20combinations.&entry.1838667208=http%3A//arxiv.org/abs/2604.04733v1&entry.124074799=Read"},
{"title": "VABench: A Comprehensive Benchmark for Audio-Video Generation", "author": "Daili Hua and Xizhi Wang and Bohan Zeng and Xinyi Huang and Hao Liang and Junbo Niu and Xinlong Chen and Quanqing Xu and Wentao Zhang", "abstract": "Recent advances in video generation have been remarkable, enabling models to produce visually compelling videos with synchronized audio. While existing video generation benchmarks provide comprehensive metrics for visual quality, they lack convincing evaluations for audio-video generation, especially for models aiming to generate synchronized audio-video outputs. To address this gap, we introduce VABench, a comprehensive and multi-dimensional benchmark framework designed to systematically evaluate the capabilities of synchronous audio-video generation. VABench encompasses three primary task types: text-to-audio-video (T2AV), image-to-audio-video (I2AV), and stereo audio-video generation. It further establishes two major evaluation modules covering 15 dimensions. These dimensions specifically assess pairwise similarities (text-video, text-audio, video-audio), audio-video synchronization, lip-speech consistency, and carefully curated audio and video question-answering (QA) pairs, among others. Furthermore, VABench covers seven major content categories: animals, human sounds, music, environmental sounds, synchronous physical sounds, complex scenes, and virtual worlds. We provide a systematic analysis and visualization of the evaluation results, aiming to establish a new standard for assessing video generation models with synchronous audio capabilities and to promote the comprehensive advancement of the field.", "link": "http://arxiv.org/abs/2512.09299v2", "date": "2026-04-06", "relevancy": 2.8777, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.6165}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5612}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.549}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VABench%3A%20A%20Comprehensive%20Benchmark%20for%20Audio-Video%20Generation&body=Title%3A%20VABench%3A%20A%20Comprehensive%20Benchmark%20for%20Audio-Video%20Generation%0AAuthor%3A%20Daili%20Hua%20and%20Xizhi%20Wang%20and%20Bohan%20Zeng%20and%20Xinyi%20Huang%20and%20Hao%20Liang%20and%20Junbo%20Niu%20and%20Xinlong%20Chen%20and%20Quanqing%20Xu%20and%20Wentao%20Zhang%0AAbstract%3A%20Recent%20advances%20in%20video%20generation%20have%20been%20remarkable%2C%20enabling%20models%20to%20produce%20visually%20compelling%20videos%20with%20synchronized%20audio.%20While%20existing%20video%20generation%20benchmarks%20provide%20comprehensive%20metrics%20for%20visual%20quality%2C%20they%20lack%20convincing%20evaluations%20for%20audio-video%20generation%2C%20especially%20for%20models%20aiming%20to%20generate%20synchronized%20audio-video%20outputs.%20To%20address%20this%20gap%2C%20we%20introduce%20VABench%2C%20a%20comprehensive%20and%20multi-dimensional%20benchmark%20framework%20designed%20to%20systematically%20evaluate%20the%20capabilities%20of%20synchronous%20audio-video%20generation.%20VABench%20encompasses%20three%20primary%20task%20types%3A%20text-to-audio-video%20%28T2AV%29%2C%20image-to-audio-video%20%28I2AV%29%2C%20and%20stereo%20audio-video%20generation.%20It%20further%20establishes%20two%20major%20evaluation%20modules%20covering%2015%20dimensions.%20These%20dimensions%20specifically%20assess%20pairwise%20similarities%20%28text-video%2C%20text-audio%2C%20video-audio%29%2C%20audio-video%20synchronization%2C%20lip-speech%20consistency%2C%20and%20carefully%20curated%20audio%20and%20video%20question-answering%20%28QA%29%20pairs%2C%20among%20others.%20Furthermore%2C%20VABench%20covers%20seven%20major%20content%20categories%3A%20animals%2C%20human%20sounds%2C%20music%2C%20environmental%20sounds%2C%20synchronous%20physical%20sounds%2C%20complex%20scenes%2C%20and%20virtual%20worlds.%20We%20provide%20a%20systematic%20analysis%20and%20visualization%20of%20the%20evaluation%20results%2C%20aiming%20to%20establish%20a%20new%20standard%20for%20assessing%20video%20generation%20models%20with%20synchronous%20audio%20capabilities%20and%20to%20promote%20the%20comprehensive%20advancement%20of%20the%20field.%0ALink%3A%20http%3A//arxiv.org/abs/2512.09299v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVABench%253A%2520A%2520Comprehensive%2520Benchmark%2520for%2520Audio-Video%2520Generation%26entry.906535625%3DDaili%2520Hua%2520and%2520Xizhi%2520Wang%2520and%2520Bohan%2520Zeng%2520and%2520Xinyi%2520Huang%2520and%2520Hao%2520Liang%2520and%2520Junbo%2520Niu%2520and%2520Xinlong%2520Chen%2520and%2520Quanqing%2520Xu%2520and%2520Wentao%2520Zhang%26entry.1292438233%3DRecent%2520advances%2520in%2520video%2520generation%2520have%2520been%2520remarkable%252C%2520enabling%2520models%2520to%2520produce%2520visually%2520compelling%2520videos%2520with%2520synchronized%2520audio.%2520While%2520existing%2520video%2520generation%2520benchmarks%2520provide%2520comprehensive%2520metrics%2520for%2520visual%2520quality%252C%2520they%2520lack%2520convincing%2520evaluations%2520for%2520audio-video%2520generation%252C%2520especially%2520for%2520models%2520aiming%2520to%2520generate%2520synchronized%2520audio-video%2520outputs.%2520To%2520address%2520this%2520gap%252C%2520we%2520introduce%2520VABench%252C%2520a%2520comprehensive%2520and%2520multi-dimensional%2520benchmark%2520framework%2520designed%2520to%2520systematically%2520evaluate%2520the%2520capabilities%2520of%2520synchronous%2520audio-video%2520generation.%2520VABench%2520encompasses%2520three%2520primary%2520task%2520types%253A%2520text-to-audio-video%2 eneration%20benchmarks%20provide%20comprehensive%20metrics%20for%20visual%20quality%2C%20they%20lack%20convincing%20evaluations%20for%20audio-video%20generation%2C%20especially%20for%20models%20aiming%20to%20generate%20synchronized%20audio-video%20outputs.%20To%20address%20this%20gap%2C%20we%20introduce%20VABench%2C%20a%20comprehensive%20and%20multi-dimensional%20benchmark%20framework%20designed%20to%20systematically%20evaluate%20the%20capabilities%20of%20synchronous%20audio-video%20generation.%20VABench%20encompasses%20three%20primary%20task%20types%3A%20text-to-audio-video%20%28T2AV%29%2C%20image-to-audio-video%20%28I2AV%29%2C%20and%20stereo%20audio-video%20generation.%20It%20further%20establishes%20two%20major%20evaluation%20modules%20covering%2015%20dimensions.%20These%20dimensions%20specifically%20assess%20pairwise%20similarities%20%28text-video%2C%20text-audio%2C%20video-audio%29%2C%20audio-video%20synchronization%2C%20lip-speech%20consistency%2C%20and%20carefully%20curated%20audio%20and%20video%20question-answering%20%28QA%29%20pairs%2C%20among%20others.%20Furthermore%2C%20VABench%20covers%20seven%20major%20content%20categories%3A%20animals%2C%20human%20sounds%2C%20music%2C%20environmental%20sounds%2C%20synchronous%20physical%20sounds%2C%20complex%20scenes%2C%20and%20virtual%20worlds.%20We%20provide%20a%20systematic%20analysis%20and%20visualization%20of%20the%20evaluation%20results%2C%20aiming%20to%20establish%20a%20new%20standard%20for%20assessing%20video%20generation%20models%20with%20synchronous%20audio%20capabilities%20and%20to%20promote%20the%20comprehensive%20advancement%20of%20the%20field.&entry.1838667208=http%3A//arxiv.org/abs/2512.09299v2&entry.124074799=Read"},
{"title": "Firebolt-VL: Efficient Vision-Language Understanding with Cross-Modality Modulation", "author": "Quoc-Huy Trinh and Mustapha Abdullahi and Bo Zhao and Debesh Jha", "abstract": "Recent advances in multimodal large language models (MLLMs) have enabled impressive progress in vision-language understanding, yet their high computational cost limits deployment in resource-constrained scenarios such as personal assistants, document understanding, and smart cameras. Most existing methods rely on Transformer-based cross-attention, whose quadratic complexity hinders efficiency. Moreover, small vision-language models often struggle to precisely capture fine-grained, task-relevant visual regions, leading to degraded performance on fine-grained reasoning tasks that limit their effectiveness in the real world. To address these issues, we introduce Firebolt-VL, an efficient vision-language model that replaces the Transformer-based decoder with a Liquid Foundation Model (LFM) decoder. To further enhance visual grounding, we propose a Token-Grid Correlation Module, which computes lightweight correlations between text tokens and image patches and modulates via the state-space model with FiLM conditioning. This enables the model to selectively emphasize visual regions relevant to the textual prompt while maintaining linear-time inference. Experimental results across multiple benchmarks demonstrate that Firebolt-VL achieves accurate, fine-grained understanding with significantly improved efficiency. Our model and code are available at: https://fireboltvl.github.io", "link": "http://arxiv.org/abs/2604.04579v1", "date": "2026-04-06", "relevancy": 2.8748, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5846}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5846}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5557}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Firebolt-VL%3A%20Efficient%20Vision-Language%20Understanding%20with%20Cross-Modality%20Modulation&body=Title%3A%20Firebolt-VL%3A%20Efficient%20Vision-Language%20Understanding%20with%20Cross-Modality%20Modulation%0AAuthor%3A%20Quoc-Huy%20Trinh%20and%20Mustapha%20Abdullahi%20and%20Bo%20Zhao%20and%20Debesh%20Jha%0AAbstract%3A%20Recent%20advances%20in%20multimodal%20large%20language%20models%20%28MLLMs%29%20have%20enabled%20impressive%20progress%20in%20vision-language%20understanding%2C%20yet%20their%20high%20computational%20cost%20limits%20deployment%20in%20resource-constrained%20scenarios%20such%20as%20personal%20assistants%2C%20document%20understanding%2C%20and%20smart%20cameras.%20Most%20existing%20methods%20rely%20on%20Transformer-based%20cross-attention%2C%20whose%20quadratic%20complexity%20hinders%20efficiency.%20Moreover%2C%20small%20vision-language%20models%20often%20struggle%20to%20precisely%20capture%20fine-grained%2C%20task-relevant%20visual%20regions%2C%20leading%20to%20degraded%20performance%20on%20fine-grained%20reasoning%20tasks%20that%20limit%20their%20effectiveness%20in%20the%20real%20world.%20To%20address%20these%20issues%2C%20we%20introduce%20Firebolt-VL%2C%20an%20efficient%20vision-language%20model%20that%20replaces%20the%20Transformer-based%20decoder%20with%20a%20Liquid%20Foundation%20Model%20%28LFM%29%20decoder.%20To%20further%20enhance%20visual%20grounding%2C%20we%20propose%20a%20Token-Grid%20Correlation%20Module%2C%20which%20computes%20lightweight%20correlations%20between%20text%20tokens%20and%20image%20patches%20and%20modulates%20via%20the%20state-space%20model%20with%20FiLM%20conditioning.%20This%20enables%20the%20model%20to%20selectively%20emphasize%20visual%20regions%20relevant%20to%20the%20textual%20prompt%20while%20maintaining%20linear-time%20inference.%20Experimental%20results%20across%20multiple%20benchmarks%20demonstrate%20that%20Firebolt-VL%20achieves%20accurate%2C%20fine-grained%20understanding%20with%20significantly%20improved%20efficiency.%20Our%20model%20and%20code%20are%20available%20at%3A%20https%3A//fireboltvl.github.io%0ALink%3A%20http%3A//arxiv.org/abs/2604.04579v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFirebolt-VL%253A%2520Efficient%2520Vision-Language%2520Understanding%2520with%2520Cross-Modality%2520Modulation%26entry.906535625%3DQuoc-Huy%2520Trinh%2520and%2520Mustapha%2520Abdullahi%2520and%2520Bo%2520Zhao%2520and%2520Debesh%2520Jha%26entry.1292438233%3DRecent%2520advances%2520in%2520multimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520have%2520enabled%2520impressive%2520progress%2520in%2520vision-language%2520understanding%252C%2520yet%2520their%2520high%2520computational%2520cost%2520limits%2520deployment%2520in%2520resource-constrained%2520scenarios%2520such%2520as%2520personal%2520assistants%252C%2520document%2520understanding%252C%2520and%2520smart%2520cameras.%2520Most%2520existing%2520methods%2520rely%2520on%2520Transformer-based%2520cross-attention%252C%2520whose%2520quadratic%2520complexity%2520hinders%2520efficiency.%2520Moreover%252C%2520small%2520vision-language%2520models%2520often%2520struggle%2520to%2520precisely%2520capture%2520fine-grained%252C%2520task-relevant%2520visual%2520regions%252C%2520leading%2520to%2520degraded%2520performance%2520on%2520fine-grained%2520reasoning%2520tasks%2520that%2520limit%2520their%2520effectiveness%2520in%2520the%2520real%2520world.%2520To%2520address%2520these%2520issues%252C%2520we%2520introduce%2520Firebolt-VL%252C%2520an%2520efficient%2520vision-language%2520model%2520that%2520replaces%2520the%2520Transformer-based%2520decoder%2520with%2520a%2520Liquid%2520Foundation%2520Model%2520%2528LFM%2529%2520decoder.%2520To%2520further%2520enhance%2520visual%2520grounding%252C%2520we%2520propose%2520a%2520Token-Grid%2520Correlation%2520Module%252C%2520which%2520computes%2520lightweight%2520correlations%2520between%2520text%2520tokens%2520and%2520image%2520patches%2520and%2520modulates%2520via%2520the%2520state-space%2520model%2520with%2520FiLM%2520conditioning.%2520This%2520enables%2520the%2520model%2520to%2520selectively%2520emphasize%2520visual%2520regions%2520relevant%2520to%2520the%2520textual%2520prompt%2520while%2520maintaining%2520linear-time%2520inference.%2520Experimental%2520results%2520across%2520multiple%2520benchmarks%2520demonstrate%2520that%2520Firebolt-VL%2520achieves%2520accurate%252C%2520fine-grained%2520understanding%2520with%2520significantly%2520improved%2520efficiency.%2520Our%2520model%2520and%2520code%2520are%2520available%2520at%253A%2520https%253A//fireboltvl.github.io%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.04579v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Firebolt-VL%3A%20Efficient%20Vision-Language%20Understanding%20with%20Cross-Modality%20Modulation&entry.906535625=Quoc-Huy%20Trinh%20and%20Mustapha%20Abdullahi%20and%20Bo%20Zhao%20and%20Debesh%20Jha&entry.1292438233=Recent%20advances%20in%20multimodal%20large%20language%20models%20%28MLLMs%29%20have%20enabled%20impressive%20progress%20in%20vision-language%20understanding%2C%20yet%20their%20high%20computational%20cost%20limits%20deployment%20in%20resource-constrained%20scenarios%20such%20as%20personal%20assistants%2C%20document%20understanding%2C%20and%20smart%20cameras.%20Most%20existing%20methods%20rely%20on%20Transformer-based%20cross-attention%2C%20whose%20quadratic%20complexity%20hinders%20efficiency.%20Moreover%2C%20small%20vision-language%20models%20often%20struggle%20to%20precisely%20capture%20fine-grained%2C%20task-relevant%20visual%20regions%2C%20leading%20to%20degraded

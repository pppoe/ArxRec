{"title": "Can RL Improve Generalization of LLM Agents? An Empirical Study", "author": "Zhiheng Xi and Xin Guo and Jiaqi Liu and Jiazheng Zhang and Yutao Fan and Zhihao Zhang and Shichun Liu and Mingxu Chai and Xiaowei Shi and Yitao Zhai and Xunliang Cai and Tao Gui and Qi Zhang and Xuanjing Huang", "abstract": "Reinforcement fine-tuning (RFT) has shown promise for training LLM agents to perform multi-turn decision-making based on environment feedback. However, most existing evaluations remain largely in-domain: training and testing are conducted in the same environment or even on the same tasks. In real-world deployment, agents may operate in unseen environments with different background knowledge, observation spaces, and action interfaces. To characterize the generalization profile of RFT under such shifts, we conduct a systematic study along three axes: (1) within-environment generalization across task difficulty, (2) cross-environment transfer to unseen environments, and (3) sequential multi-environment training to quantify transfer and forgetting. Our results show that RFT generalizes well across task difficulty within an environment, but exhibits weaker transfer to unseen environments, which correlates with shifts in both semantic priors and observation/action interfaces. In contrast, sequential training yields promising downstream gains with minimal upstream forgetting, and mixture training across environments improves the overall balance. We further provide detailed analyses and deeper insights, and hope our work helps the community develop and deploy generalizable LLM agents.", "link": "http://arxiv.org/abs/2603.12011v1", "date": "2026-03-12", "relevancy": 2.5027, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5103}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "simi {"title": "Neural Thickets: Diverse Task Experts Are Dense Around Pretrained Weights", "author": "Yulu Gan and Phillip Isola", "abstract": "Pretraining produces a learned parameter vector that is typically treated as a starting point for further iterative adaptation. In this work, we instead view the outcome of pretraining as a distribution over parameter vectors, whose support already contains task-specific experts. We show that in small models such expert solutions occupy a negligible fraction of the volume of this distribution, making their discovery reliant on structured optimization methods such as gradient descent. In contrast, in large, well-pretrained models the density of task-experts increases dramatically, so that diverse, task-improving specialists populate a substantial fraction of the neighborhood around the pretrained weights. Motivated by this perspective, we explore a simple, fully parallel post-training method that samples $N$ parameter perturbations at random, selects the top $K$, and ensembles predictions via majority vote. Despite its simplicity, this approach is competitive with standard post-training methods such as PPO, GRPO, and ES for contemporary large-scale models.", "link": "http://arxiv.org/abs/2603.12228v1", "date": "2026-03-12", "relevancy": 2.4975, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5304}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4968}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4713}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Neural%20Thickets%3A%20Diverse%20Task%20Experts%20Are%20Dense%20Around%20Pretrained%20Weights&body=Title%3A%20Neural%20Thickets%3A%20Diverse%20Task%20Experts%20Are%20Dense%20Around%20Pretrained%20Weights%0AAuthor%3A%20Yulu%20Gan%20and%20Phillip%20Isola%0AAbstract%3A%20Pretraining%20produces%20a%20learned%20parameter%20vector%20that%20is%20typically%20treated%20as%20a%20starting%20point%20for%20further%20iterative%20adaptation.%20In%20this%20work%2C%20we%20instead%20view%20the%20outcome%20of%20pretraining%20as%20a%20distribution%20over%20parameter%20vectors%2C%20whose%20support%20already%20contains%20task-specific%20experts.%20We%20show%20that%20in%20small%20models%20such%20expert%20solutions%20occupy%20a%20negligible%20fraction%20of%20the%20volume%20of%20this%20distribution%2C%20making%20their%20discovery%20reliant%20on%20structured%20optimization%20methods%20such%20as%20gradient%20descent.%20In%20contrast%2C%20in%20large%2C%20well-pretrained%20models%20the%20density%20of%20task-experts%20increases%20dramatically%2C%20so%20that%20diverse%2C%20task-improving%20specialists%20populate%20a%20substantial%20fraction%20of%20the%20neighborhood%20around%20the%20pretrained%20weights.%20Motivated%20by%20this%20perspective%2C%20we%20explore%20a%20simple%2C%20fully%20parallel%20post-training%20method%20that%20samples%20%24N%24%20parameter%20perturbations%20at%20random%2C%20selects%20the%20top%20%24K%24%2C%20and%20ensembles%20predictions%20via%20majority%20vote.%20Despite%20its%20simplicity%2C%20this%20approach%20is%20competitive%20with%20standard%20post-training%20methods%20such%20as%20PPO%2C%20GRPO%2C%20and%20ES%20for%20contemporary%20large-scale%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12228v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNeural%2520Thickets%253A%2520Diverse%2520Task%2520Experts%2520Are%2520Dense%2520Around%2520Pretrained%2520Weights%26entry.906535625%3DYulu%2520Gan%2520and%2520Phillip%2520Isola%26entry.1292438233%3DPretraining%2520produces%2520a%2520learned%2520parameter%2520vector%2520that%2520is%2 {"title": "Prototype-Based Knowledge Guidance for Fine-Grained Structured Radiology Reporting", "author": "Chantal Pellegrini and Adrian Delchev and Ege \u00d6zsoy and Nassir Navab and Matthias Keicher", "abstract": "Structured radiology reporting promises faster, more consistent communication than free text, but automation remains difficult as models must make many fine-grained, discrete decisions about rare findings and attributes from limited structured supervision. In contrast, free-text reports are produced at scale in routine care and implicitly encode fine-grained, image-linked information through detailed descriptions. To leverage this unstructured knowledge, we propose ProtoSR, an approach for injecting free-text information into structured report population. First, we introduce an automatic extraction pipeline that uses an instruction-tuned LLM to mine 80k+ MIMIC-CXR studies and build a multimodal knowledge base aligned with a structured reporting template, representing each answer option with a visual prototype. Using this knowledge base, ProtoSR is trained to retrieve prototypes relevant for the current image-question pair and augment the model predictions through a prototype-conditioned residual, providing a data-driven second opinion that selectively corrects predictions. On the Rad-ReStruct benchmark, ProtoSR achieves state-of-the-art results, with the largest improvements on detailed attribute questions, demonstrating the value of integrating free-text derived signal for fine-grained image understanding.", "link": "http://arxiv.org/abs/2603.11938v1", "date": "2026-03-12", "relevancy": 2.4814, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4995}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4995}, {"title": "TAMM: TriAdapter M {"title": "DVD: Deterministic Video Depth Estimation with Generative Priors", "author": "Hongfei Zhang and Harold Haodong Chen and Chenfei Liao and Jing He and Zixin Zhang and Haodong Li and Yihao Liang and Kanghao Chen and Bin Ren and Xu Zheng and Shuai Yang and Kun Zhou and Yinchuan Li and Nicu Sebe and Ying-Cong Chen", "abstract": "Existing video depth estimation faces a fundamental trade-off: generative models suffer from stochastic geometric hallucinations and scale drift, while discriminative models demand massive labeled datasets to resolve semantic ambiguities. To break this impasse, we present DVD, the first framework to deterministically adapt pre-trained video diffusion models into single-pass depth regressors. Specifically, DVD features three core designs: (i) repurposing the diffusion timestep as a structural anchor to balance global stability with high-frequency details; (ii) latent manifold rectification (LMR) to mitigate regression-induced over-smoothing, enforcing differential constraints to restore sharp boundaries and coherent motion; and (iii) global affine coherence, an inherent property bounding inter-window divergence, which enables seamless long-video inference without requiring complex temporal alignment. Extensive experiments demonstrate that DVD achieves state-of-the-art zero-shot performance across benchmarks. Furthermore, DVD successfully unlocks the profound geometric priors implicit in video foundation models using 163x less task-specific data than leading baselines. Notably, we fully release our pipeline, providing the whole training suite for SOTA video depth estimation to benefit the open-source community.", "link": "http://arxiv.org/abs/2603.12250v1", "date": "2026-03-12", "relevancy": 2.4643, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.638}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.605}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5888}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DVD%3A%20Deterministic%20Video%20Depth%20Estimation%20with%20Generative%20Priors&body=Title%3A%20DVD%3A%20Deterministic%20Video%20Depth%20Estimation%20with%20Generative%20Priors%0AAuthor%3A%20Hongfei%20Zhang%20and%20Harold%20Haodong%20Chen%20and%20Chenfei%20Liao%20and%20Jing%20He%20and%20Zixin%20Zhang%20and%20Haodong%20Li%20and%20Yihao%20Liang%20and%20Kanghao%20Chen%20and%20Bin%20Ren%20and%20Xu%20Zheng%20and%20Shuai%20Yang%20and%20Kun%20Zhou%20and%20Yinchuan%20Li%20and%20Nicu%20Sebe%20and%20Ying-Cong%20Chen%0AAbstract%3A%20Existing%20video%20depth%20estimation%20faces%20a%20fundamental%20trade-off%3A%20generative%20models%20suffer%20from%20stochastic%20geometric%20hallucinations%20and%20scale%20drift%2C%20while%20discriminative%20models%20demand%20massive%20labeled%20datasets%20to%20resolve%20semantic%20ambiguities.%20To%20break%20this%20impasse%2C%20we%20present%20DVD%2C%20the%20first%20framework%20to%20deterministically%20adapt%20pre-trained%20video%20diffusion%20models%20into%20single-pass%20depth%20regressors.%20Specifically%2C%20DVD%20features%20three%20core%20designs%3A%20%28i%29%20repurposing%20the%20diffusion%20timestep%20as%20a%20structural%20anchor%20to%20balance%20global%20stability%20with%20high-frequency%20details%3B%20%28ii%29%20latent%20manifold%20rectification%20%28LMR%29%20to%20mitigate%20regression-induced%20over-smoothing%2C%20enforcing%20differential%20constraints%20to%20restore%20sharp%20boundaries%20and%20coherent%20motion%3B%20and%20%28iii%29%20global%20affine%20coherence%2C%20an%20inherent%20property%20bounding%20inter-window%20divergence%2C%20which%20enables%20seamless%20long-video%20inference%20without%20requiring%20complex%20temporal%20alignment.%20Extensive%20experiments%20demonstrate%20that%20DVD%20achieves%20state-of-the-art%20zero-shot%20performance%20across%20benchmarks.%20Furthermore%2C%20DVD%20successfully%20unlocks%20the%20profound%20geometric%20priors%20implicit%20in%20video%20foundation%20models%20using%20163x%20less%20task-specific%20data%20than%20leading%20baselines.%20Notably%2C%20we%20fully%20release%20our%20pipeline%2C%20providing%20the%20whole%20training%20suite%20for%20SOTA%20video%20depth%20estimation%20to%20benefit%20the%20open-source%20community.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12250v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDVD%253A%2520Deterministic%2520Video%2520Depth%2520Estimation%2520with%2520Generative%2520Priors%26entry.906535625%3DHongfei%2520Zhang%2520and%2520Harold%2520Haodong%2520Chen%2520and%2520Chenfei%2520Liao%2520and%2520Jing%2520He%2520and%2520Zixin%2520Zhang%2520and%2520Haodong%2520Li%2520and%2520Yihao%2520Liang%2520and%2520Kanghao%2520Chen%2520and%2520Bin%2520Ren%2520and%2520Xu%2520Zheng%2520and%2520Shuai%2520Yang%2520and%2520Kun%2520Zhou%2520and%2520Yinchuan%2520Li%2520and%2520Nicu%2520Sebe%2520and%2520Ying-Cong%2520Chen%26entry.1292438233%3DExisting%2520video%2520depth%2520estimation%2520faces%2520a%2520fundamental%2520trade-off%253A%2520generative%2520models%2520suffer%2520from%2520stochastic%2520geometric%2520hallucinations%2520and%2520scale%2520drift%252C%2520while%2520discriminative%2520models%2520demand%2520massive%2520labeled%2520datasets%2520to%2520resolve%2520semantic%2520ambiguities.%2520To%2520break%2520this%2520impasse%252C%2520we%2520present%2520DVD%252C%2520the%2520first%2520framework%2520to%2520deterministically%2520adapt%2520pre-trained%2520video%2520diffusion%2520models%2520into%2520single-pass%2520depth%2520regressors.%2520Specifically%252C%2520DVD%2520features%2520three%2520core%2520designs%253A%2520%2528i%2529%2520repurposing%2520the%2520diffusion%2520timestep%2 ation%20faces%20a%20fundamental%20trade-off%3A%20generative%20models%20suffer%20from%20stochastic%20geometric%20hallucinations%20and%20scale%20drift%2C%20while%20discriminative%20models%20demand%20massive%20labeled%20datasets%20to%20resolve%20semantic%20ambiguities.%20To%20break%20this%20impasse%2C%20we%20present%20DVD%2C%20the%20first%20framework%20to%20deterministically%20adapt%20pre-trained%20video%20diffusion%20models%20into%20single-pass%20depth%20regressors.%20Specifically%2C%20DVD%20features%20three%20core%20designs%3A%20%28i%29%20repurposing%20the%20diffusion%20timestep%20as%20a%20structural%20anchor%20to%20balance%20global%20stability%20with%20high-frequency%20details%3B%20%28ii%29%20latent%20manifold%20rectification%20%28LMR%29%20to%20mitigate%20regression-induced%20over-smoothing%2C%20enforcing%20differential%20constraints%20to%20restore%20sharp%20boundaries%20and%20coherent%20motion%3B%20and%20%28iii%29%20global%20affine%20coherence%2C%20an%20inherent%20property%20bounding%20inter-window%20divergence%2C%20which%20enables%20seamless%20long-video%20inference%20without%20requiring%20complex%20temporal%20alignment.%20Extensive%20experiments%20demonstrate%20that%20DVD%20achieves%20state-of-the-art%20zero-shot%20performance%20across%20benchmarks.%20Furthermore%2C%20DVD%20successfully%20unlocks%20the%20profound%20geometric%20priors%20implicit%20in%20video%20foundation%20models%20using%20163x%20less%20task-specific%20data%20than%20leading%20baselines.%20Notably%2C%20we%20fully%20release%20our%20pipeline%2C%20providing%20the%20whole%20training%20suite%20for%20SOTA%20video%20depth%20estimation%20to%20benefit%20the%20open-source%20community.&entry.1838667208=http%3A//arxiv.org/abs/2603.12250v1&entry.124074799=Read"},
{"title": "A Diffeomorphism Groupoid and Algebroid Framework for Discontinuous Image Registration", "author": "Lili Bao and Bin Xiao and Shihui Ying and Stefan Sommer", "abstract": "In this paper, we propose a novel mathematical framework for piecewise diffeomorphic image registration that involves discontinuous sliding motion using a diffeomorphism groupoid and algebroid approach. The traditional Large Deformation Diffeomorphic Metric Mapping (LDDMM) registration method builds on Lie groups, which assume continuity and smoothness in velocity fields, limiting its applicability in handling discontinuous sliding motion. To overcome this limitation, we extend the diffeomorphism Lie groups to a framework of discontinuous diffeomorphism Lie groupoids, allowing for discontinuities along sliding boundaries while maintaining diffeomorphism within homogeneous regions. We provide a rigorous analysis of the associated mathematical structures, including Lie algebroids and their duals, and derive specific Euler-Arnold equations to govern optimal flows for discontinuous deformations. Some numerical tests are performed to validate the efficiency of the proposed approach.", "link": "http://arxiv.org/abs/2603.11806v1", "date": "2026-03-12", "relevancy": 2.4616, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4967}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4802}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Diffeomorphism%20Groupoid%20and%20Algebroid%20Framework%20for%20Discontinuous%20Image%20Registration&body=Title%3A%20A%20Diffeomorphism%20Groupoid%20and%20Algebroid%20Framework%20for%20Discontinuous%20Image%20Registration%0AAuthor%3A%20Lili%20Bao%20and%20Bin%20Xiao%20and%20Shihui%20Ying%20and%20Stefan%20Sommer%0AAbstract%3A%20In%20this%20paper%2C%20we%20propose%20a%20novel%20mathematical%20framework%20for%20piecewise%20diffeomorphic%20image%20registration%20that%20involves%20discontinuous%20sliding%20motion%20using%20a%20diffeomorphism%20groupoid%20and%20algebroid%20approach.%20The%20traditional%20Large%20Deformation%20Diffeomorphic%20Metric%20Mapping%20%28LDDMM%29%20registration%20method%20builds%20on%20Lie%20groups%2C%20which%20assume%20continuity%20and%20smoothness%20in%20velocity%20fields%2C%20limiting%20its%20applicability%20in%20handling%20discontinuous%20sliding%20motion.%20To%20overcome%20this%20limitation%2C%20we%20extend%20the%20diffeomorphism%20Lie%20groups%20to%20a%20framework%20of%20discontinuous%20diffeomorphism%20Lie%20groupoids%2C%20allowing%20for%20discontinuities%20along%20sliding%20boundaries%20while%20maintaining%20diffeomorphism%20within%20homogeneous%20regions.%20We%20provide%20a%20rigorous%20analysis%20of%20the%20associated%20mathematical%20structures%2C%20including%20Lie%20algebroids%20and%20their%20duals%2C%20and%20derive%20specific%20Euler-Arnold%20equations%20to%20govern%20optimal%20flows%20for%20discontinuous%20deformations.%20Some%20numerical%20tests%20are%20performed%20to%20validate%20the%20efficiency%20of%20the%20proposed%20approach.%0ALink%3A%20http%3A//arxiv.org/abs/2603.11806v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Diffeomorphism%2520Groupoid%2520and%2520Algebroid%2520Framework%2520for%2520Discontinuous%2520Image%2520Registration%26entry.906535625%3DLili%2520Bao%2520and%2520Bin%2520Xiao%2520and%2520Shihui%2520Ying%2520and%2520Stefan%2520Sommer%26entry.1292438233%3DIn%2520this%2520paper%252C%2520we%2520propose%2520a%2520novel%2520mathematical%2520framework%2520for%2520piecewise%2520diffeomorphic%2520image%2520registration%2520that%2520involves%2520discontinuous%2520sliding%2520motion%2520using%2520a%2520diffeomorphism%2520groupoid%2520and%2520algebroid%2520approach.%2520The%2520traditional%2520Large%2520Deformation%2520Diffeomorphic%2520Metric%2520Mapping%2520%2528LDDMM%2529%2520registration%2520method%2520builds%2520on%2520Lie%2520groups%252C%2520which%2520assume%2520continuity%2520and%2520smoothness%2520in%2520velocity%2520fields%252C%2520limiting%2520its%2520applicability%2520in%2520handling%2520discontinuous%2520sliding%2520motion.%2520To%2520overcome%2520this%2520limitation%252C%2520we%2520extend%2520the%2520diffeomorphism%2520Lie%2520groups%2520to%2520a%2520framework%2520of%2520discontinuous%2520diffeomorphism%2520Lie%2520groupoids%252C%2520allowing%2520for%2520discontinuities%2520along%2520sliding%2520boundaries%2520while%2520maintaining%2520diffeomorphism%2520within%2520homogeneous%2520regions.%2520We%2520provide%2520a%2520rigorous%2520analysis%2520of%2520the%2520associated%2520mathematical%2520structures%252C%2520including%2520Lie%2520algebroids%2520and%2520their%2520duals%252C%2520and%2520derive%2520specific%2520Euler-Arnold%2520equations%2520to%2520govern%2520optimal%2520flows%2520for%2520discontinuous%2520deformations.%2520Some%2520numerical%2520tests%2520are%2520performed%2520to%2520validate%2520the%2520efficiency%2520of%2520the%2520proposed%2520approach.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.11806v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=A%20Diffeomorphism%20Groupoid%20and%20Algebroid%20Framework%20for%20Discontinuous%20Image%20Registration&entry.906535625=Lili%20Bao%20and%20Bin%20Xiao%20and%20Shihui%20Ying%20and%20Stefan%20Sommer&entry.1292438233=In%20this%20paper%2C%20we%20propose%20a%20novel%20mathematical%20framework%20for%20piecewise%20diffeomorphic%20image%20registration%20that%20involves%20discontinuous%20sliding%20motion%20using% {"title": "Coarse-Guided Visual Generation via Weighted h-Transform Sampling", "author": "Yanghao Wang and Ziqi Jiang and Zhen Wang and Long Chen", "abstract": "Coarse-guided visual generation, which synthesizes fine visual samples from degraded or low-fidelity coarse references, is essential for various real-world applications. While training-based approaches are effective, they are inherently limited by high training costs and restricted generalization due to paired data collection. Accordingly, recent training-free works propose to leverage pretrained diffusion models and incorporate guidance during the sampling process. However, these training-free methods either require knowing the forward (fine-to-coarse) transformation operator, e.g., bicubic downsampling, or are difficult to balance between guidance and synthetic quality. To address these challenges, we propose a novel guided method by using the h-transform, a tool that can constrain stochastic processes (e.g., sampling process) under desired conditions. Specifically, we modify the transition probability at each sampling timestep by adding to the original differential equation with a drift function, which approximately steers the generation toward the ideal fine sample. To address unavoidable approximation errors, we introduce a noise-level-aware schedule that gradually de-weights the term as the error increases, ensuring both guidance adherence and high-quality synthesis. Extensive experiments across diverse image and video generation tasks demonstrate the effectiveness and generalization of our method.", "link": "http://arxiv.org/abs/2603.12057v1", "date": "2026-03-12", "relevancy": 2.4477, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.6206}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6159}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6045}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Coarse-Guided%20Visual%20Generation%20via%20Weighted%20h-Transform%20Sampling&body=Title%3A%20Coarse-Guided%20Visual%20Generation%20via%20Weighted%20h-Transform%20Sampling%0AAuthor%3A%20Yanghao%20Wang%20and%20Ziqi%20Jiang%20and%20Zhen%20Wang%20and%20Long%20Chen%0AAbstract%3A%20Coarse-guided%20visual%20generation%2C%20which%20synthesizes%20fine%20visual%20samples%20from%20degraded%20or%20low-fidelity%20coarse%20references%2C%20is%20essential%20for%20various%20real-world%20applications.%20While%20training-based%20approaches%20are%20effective%2C%20they%20are%20inherently%20limited%20by%20high%20training%20costs%20and%20restricted%20generalization%20due%20to%20paired%20data%20collection.%20Accordingly%2C%20recent%20training-free%20works%20propose%20to%20leverage%20pretrained%20diffusion%20models%20and%20incorporate%20guidance%20during%20the%20sampling%20process.%20However%2C%20these%20training-free%20methods%20either%20require%20knowing%20the%20forward%20%28fine-to-coarse%29%20transformation%20operator%2C%20e.g.%2C%20bicubic%20downsampling%2C%20or%20are%20difficult%20to%20balance%20between%20guidance%20and%20synthetic%20quality.%20To%20address%20these%20challenges%2C%20we%20propose%20a%20novel%20guided%20method%20by%20using%20the%20h-transform%2C%20a%20tool%20that%20can%20constrain%20stochastic%20processes%20%28e.g.%2C%20sampling%20process%29%20under%20desired%20conditions.%20Specifically%2C%20we%20modify%20the%20transition%20probability%20at%20each%20sampling%20timestep%20by%20adding%20to%20the%20original%20differential%20equation%20with%20a%20drift%20function%2C%20which%20approximately%20steers%20the%20generation%20toward%20the%20ideal%20fine%20sample.%20To%20address%20unavoidable%20approximation%20errors%2C%20we%20introduce%20a%20noise-level-aware%20schedule%20that%20gradually%20de-weights%20the%20term%20as%20the%20error%20increases%2C%20ensuring%20both%20guidance%20adherence%20and%20high-quality%20synthesis.%20Extensive%20experiments%20across%20diverse%20image%20and%20video%20generation%20tasks%20demonstrate%20the%20effectiveness%20and%20generalization%20of%20our%20method.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12057v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCoarse-Guided%2520Visual%2520Generation%2520via%2520Weighted%2520h-Transform%2520Sampling%26entry.906535625%3DYanghao%2520Wang%2520and%2520Ziqi%2520Jiang%2520and%2520Zhen%2520Wang%2520and%2520Long%2520Chen%26entry.1292438233%3DCoarse-guided%2520visual%2520generation%252C%2520which%2520synthesizes%2520fine%2520visual%2520samples%2520from%2520degraded%2520or%2520low-fidelity%2520coarse%2520references%252C%2520is%2520essential%2520for%2520various%2520real-world%2520applications.%2520While%2520training-based%2520approaches%2520are%2520effective%252C%2520they%2520are%2520inherently%2520limited%2520by%2520high%2520training%2520costs%2520and%2520restricted%2520generalization%2520due%2520to%2520paired%2520data%2520collection.%2520Accordingly%252C%2520recent%2520training-free%2520works%2520propose%2520to%2520leverage%2520pretrained%2520diffusion%2520models%2520and%2520incorporate%2520guidance%2520during%2520the%2520sampling%2520process.%2520However%252C%2520these%2520training-free%2520methods%2520either%2520require%2520knowing%2520the%2520forward%2520%2528fine-to-coarse%2529%2520transformation%2520operator%252C%2520e.g.%252C%2520bicubic%2520downsampling%252C%2520or%2520are%2520difficult%2520to%2520balance%2520between%2520guidance%2520and%2520synthetic%2520quality.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520a%2520novel%2520guided%2520method%2520by%2520using%2520the%2520h-transform%252C%2520a%2520tool%2520that%2520can%2520constrain%252 0training-free%20methods%20either%20require%20knowing%20the%20forward%20%28fine-to-coarse%29%20transformation%20operator%2C%20e.g.%2C%20bicubic%20downsampling%2C%20or%20are%20difficult%20to%20balance%20between%20guidance%20and%20synthetic%20quality.%20To%20address%20these%20challenges%2C%20we%20propose%20a%20novel%20guided%20method%20by%20using%20the%20h-transform%2C%20a%20tool%20that%20can%20constrain%20stochastic%20processes%20%28e.g.%2C%20sampling%20process%29%20under%20desired%20conditions.%20Specifically%2C%20we%20modify%20the%20transition%20probability%20at%20each%20sampling%20timestep%20by%20adding%20to%20the%20original%20differential%20equation%20with%20a%20drift%20function%2C%20which%20approximately%20steers%20the%20generation%20toward%20the%20ideal%20fine%20sample.%20To%20address%20unavoidable%20approximation%20errors%2C%20we%20introduce%20a%20noise-level-aware%20schedule%20that%20gradually%20de-weights%20the%20term%20as%20the%20error%20increases%2C%20ensuring%20both%20guidance%20adherence%20and%20high-quality%20synthesis.%20Extensive%20experiments%20across%20diverse%20image%20and%20video%20generation%20tasks%20demonstrate%20the%20effectiveness%20and%20generalization%20of%20our%20method.&entry.1838667208=http%3A//arxiv.org/abs/2603.12057v1&entry.124074799=Read"},
{"title": "On the Theoretical Limitations of Embedding-Based Retrieval", "author": "Orion Weller and Michael Boratko and Iftekhar Naim and Jinhyuk Lee", "abstract": "Vector embeddings have been tasked with an ever-increasing set of retrieval tasks over the years, with a nascent rise in using them for reasoning, instruction-following, coding, and more. These new benchmarks push embeddings to work for any query and any notion of relevance that could be given. While prior works have pointed out theoretical limitations of vector embeddings, there is a common assumption that these difficulties are exclusively due to unrealistic queries, and those that are not can be overcome with better training data and larger models. In this work, we demonstrate that we may encounter these theoretical limitations in realistic settings with extremely simple queries. We connect known results in learning theory, showing that the number of top-k subsets of documents capable of being returned as the result of some query is limited by the dimension of the embedding. We empirically show that this holds true even if we directly optimize on the test set with free parameterized embeddings. Using free embeddings, we then demonstrate that returning all pairs of documents requires a relatively high dimension. We then create a realistic dataset called LIMIT that stress tests embedding models based on these theoretical results, and observe that even state-of-the-art models fail on this dataset despite the simple nature of the task. Our work shows the limits of embedding models under the existing single vector paradigm and calls for future research to develop new techniques that can resolve this fundamental limitation.", "link": "http://arxiv.org/abs/2508.21038v2", "date": "2026-03-12", "relevancy": 2.4468, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5147}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5147}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4386}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20On%20the%20Theoretical%20Limitations%20of%20Embedding-Based%20Retrieval&body=Title%3A%20On%20the%20Theoretical%20Limitations%20of%20Embedding-Based%20Retrieval%0AAuthor%3A%20Orion%20Weller%20and%20Michael%20Boratko%20and%20Iftekhar%20Naim%20and%20Jinhyuk%20Lee%0AAbstract%3A%20Vector%20embeddings%20have%20been%20tasked%20with%20an%20ever-increasing%20set%20of%20retrieval%20tasks%20over%20the%20years%2C%20with%20a%20nascent%20rise%20in%20using%20them%20for%20reasoning%2C%20instruction-following%2C%20coding%2C%20and%20more.%20These%20new%20benchmarks%20push%20embeddings%20to%20work%20for%20any%20query%20and%20any%20notion%20of%20relevance%20that%20could%20be%20given.%20While%20prior%20works%20have%20pointed%20out%20theoretical%20limitations%20of%20vector%20embeddings%2C%20there%20is%20a%20common%20assumption%20that%20these%20difficulties%20are%20exclusively%20due%20to%20unrealistic%20queries%2C%20and%20those%20that%20are%20not%20can%20be%20overcome%20with%20better%20training%20data%20and%20larger%20models.%20In%20this%20work%2C%20we%20demonstrate%20that%20we%20may%20encounter%20these%20theoretical%20limitations%20in%20realistic%20settings%20with%20extremely%20simple%20queries.%20We%20connect%20known%20results%20in%20learning%20theory%2C%20showing%20that%20the%20number%20of%20top-k%20subsets%20of%20documents%20capable%20of%20being%20returned%20as%20the%20result%20of%20some%20query%20is%20limited%20by%20the%20dimension%20of%20the%20embedding.%20We%20empirically%20show%20that%20this%20holds%20true%20even%20if%20we%20directly%20optimize%20on%20the%20test%20set%20with%20free%20parameterized%20embeddings.%20Using%20free%20embeddings%2C%20we%20then%20demonstrate%20that%20returning%20all%20pairs%20of%20documents%20requires%20a%20relatively%20high%20dimension.%20We%20then%20create%20a%20realistic%20dataset%20called%20LIMIT%20that%20stress%20tests%20embedding%20models%20based%20on%20these%20theoretical%20results%2C%20and%20observe%20that%20even%20state-of-the-art%20models%20fail%20on%20this%20dataset%20despite%20the%20simple%20nature%20of%20the%20task.%20Our%20work%20shows%20the%20limits%20of%20embedding%20models%20under%20the%20existing%20single%20vector%20paradigm%20and%20calls%20for%20future%20research%20to%20develop%20new%20techniques%20that%20can%20resolve%20this%20fundamental%20limitation.%0ALink%3A%20http%3A//arxiv.org/abs/2508.21038v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOn%2520the%2520Theoretical%2520Limitations%2520of%2520Embedding-Based%2520Retrieval%26entry.906535625%3DOrion%2520Weller%2520and%2520Michael%2520Boratko%2520and%2520Iftekhar%2520Naim%2520and%2520Jinhyuk%2520Lee%26entry.1292438233%3DVector%2520embeddings%2520have%2520been%2520tasked%2520with%2520an%2520ever-increasing%2520set%2520of%2520retrieval%2520tasks%2520over%2520the%2520years%252C%2520with%2520a%2520nascent%2520rise%2520in%2520using%2520them%2520for%2520reasoning%252C%2520instruction-following%252C%2520coding%252C%2520and%2520more.%2520These%2520new%2520benchmarks%2520push%2520embeddings%2520to%2520work%2520for%2520any%2520query%2520and%2520any%2520notion%2520of%2520relevance%2520that%2520could%2520be%2520given.%2520While%2520prior%2520works%2520have%2520pointed%2520out%2520theoretical%2520limitations%2520of%2520vector%2520embeddings%252C%2520there%2520is%2520a%2520common%2520assumption%2520that%2520these%2520difficulties%2520are%2520exclusively%2520due%2520to%2520unrealistic%2520queries%252C%2520and%2520those%2520that%2520are%2520not%2520can%2520be%2520overcome%2520with%2520better%2520training%2520data%2520and%2520 {"title": "[b]=[d]-[t]+[p]: Self-supervised Speech Models Discover Phonological Vector Arithmetic", "author": "Kwanghee Choi and Eunjung Yeo and Cheol Jun Cho and David Harwath and David R. Mortensen", "abstract": "Self-supervised speech models (S3Ms) are known to encode rich phonetic information, yet how this information is structured remains underexplored. We conduct a comprehensive study across 96 languages to analyze the underlying structure of S3M representations, with particular attention to phonological vectors. We first show that there exist linear directions within the model's representation space that correspond to phonological features. We further demonstrate that the scale of these phonological vectors correlate to the degree of acoustic realization of their corresponding phonological features in a continuous manner. For example, the difference between [d] and [t] yields a voicing vector: adding this vector to [p] produces [b], while scaling it results in a continuum of voicing. Together, these findings indicate that S3Ms encode speech using phonologically interpretable and compositional vectors, demonstrating phonological vector arithmetic. All code and interactive demos are available at https://github.com/juice500ml/phonetic-arithmetic .", "link": "http://arxiv.org/abs/2602.18899v2", "date": "2026-03-12", "relevancy": 2.4087, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4873}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4873}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4706}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20%5Bb%5D%3D%5Bd%5D-%5Bt%5D%2B%5Bp%5D%3A%20Self-supervised%20Speech%20Models%20Discover%20Phonological%20Vector%20Arithmetic&body=Title%3A%20%5Bb%5D%3D%5Bd%5D-%5Bt%5D%2B%5Bp%5D%3A%20Self-supervised%20Speech%20Models%20Discover%20Phonological%20Vector%20Arithmetic%0AAuthor%3A%20Kwanghee%20Choi%20and%20Eunjung%20Yeo%20and%20Cheol%20Jun%20Cho%20and%20David%20Harwath%20and%20David%20R.%20Mortensen%0AAbstract%3A%20Self-supervised%20speech%20models%20%28S3Ms%29%20are%20known%20to%20encode%20rich%20phonetic%20information%2C%20yet%20how%20this%20information%20is%20structured%20remains%20underexplored.%20We%20conduct%20a%20comprehensive%20study%20across%2096%20languages%20to%20analyze%20the%20underlying%20structure%20of%20S3M%20representations%2C%20with%20particular%20attention%20to%20phonological%20vectors.%20We%20first%20show%20that%20there%20exist%20linear%20directions%20within%20the%20model%27s%20representation%20space%20that%20correspond%20to%20phonological%20features.%20We%20further%20demonstrate%20that%20the%20scale%20of%20these%20phonological%20vectors%20correlate%20to%20the%20degree%20of%20acoustic%20realization%20of%20their%20corresponding%20phonological%20features%20in%20a%20continuous%20manner.%20For%20example%2C%20the%20difference%20between%20%5Bd%5D%20and%20%5Bt%5D%20yields%20a%20voicing%20vector%3A%20adding%20this%20vector%20to%20%5Bp%5D%20produces%20%5Bb%5D%2C%20while%20scaling%20it%20results%20in%20a%20continuum%20of%20voicing.%20Together%2C%20these%20findings%20indicate%20that%20S3Ms%20encode%20speech%20using%20phonologically%20interpretable%20and%20compositional%20vectors%2C%20demonstrating%20phonological%20vector%20arithmetic.%20All%20code%20and%20interactive%20demos%20are%20available%20at%20https%3A//github.com/juice500ml/phonetic-arithmetic%20.%0ALink%3A%20http%3A//arxiv.org/abs/2602.18899v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D%255Bb%255D%253D%255Bd%255D-%255Bt%255D%252B%255Bp%255D%253A%2520Self-supervised%2520Speech%2520Models%2520Discover%252 {"title": "OmniStream: Mastering Perception, Reconstruction and Action in Continuous Streams", "author": "Yibin Yan and Jilan Xu and Shangzhe Di and Haoning Wu and Weidi Xie", "abstract": "Modern visual agents require representations that are general, causal, and physically structured to operate in real-time streaming environments. However, current vision foundation models remain fragmented, specializing narrowly in image semantic perception, offline temporal modeling, or spatial geometry. This paper introduces OmniStream, a unified streaming visual backbone that effectively perceives, reconstructs, and acts from diverse visual inputs. By incorporating causal spatiotemporal attention and 3D rotary positional embeddings (3D-RoPE), our model supports efficient, frame-by-frame online processing of video streams via a persistent KV-cache. We pre-train OmniStream using a synergistic multi-task framework coupling static and temporal representation learning, streaming geometric reconstruction, and vision-language alignment on 29 datasets. Extensive evaluations show that, even with a strictly frozen backbone, OmniStream achieves consistently competitive performance with specialized experts across image and video probing, streaming geometric reconstruction, complex video and spatial reasoning, as well as robotic manipulation (unseen at training). Rather than pursuing benchmark-specific dominance, our work demonstrates the viability of training a single, versatile vision backbone that generalizes across semantic, spatial, and temporal reasoning, i.e., a more meaningful step toward general-purpose visual understanding for interactive and embodied agents.", "link": "http://arxiv.org/abs/2603.12265v1", "date": "2026-03-12", "relevancy": 2.4005, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6099}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6099}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.551}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OmniStream%3A%20Mastering%20Perception%2C%20Reconstruction%20and%20Action%20in%20Continuous%20Streams&body=Title%3A%20OmniStream%3A%20Mastering%20Perception%2C%20Reconstruction%20and%20Action%20in%20Continuous%20Streams%0AAuthor%3A%20Yibin%20Yan%20and%20Jilan%20Xu%20and%20Shangzhe%20Di%20and%20Haoning%20Wu%20and%20Weidi%20Xie%0AAbstract%3A%20Modern%20visual%20agents%20require%20representations%20that%20are%20general%2C%20causal%2C%20and%20physically%20structured%20to%20operate%20in%20real-time%20streaming%20environments.%20However%2C%20current%20vision%20foundation%20models%20remain%20fragmented%2C%20specializing%20narrowly%20in%20image%20semantic%20perception%2C%20offline%20temporal%20modeling%2C%20or%20spatial%20geometry.%20This%20paper%20introduces%20OmniStream%2C%20a%20unified%20streaming%20visual%20backbone%20that%20effectively%20perceives%2C%20reconstructs%2C%20and%20acts%20from%20diverse%20visual%20inputs.%20By%20incorporating%20causal%20spatiotemporal%20attention%20and%203D%20rotary%20positional%20embeddings%20%283D-RoPE%29%2C%20our%20model%20supports%20efficient%2C%20frame-by-frame%20online%20processing%20of%20video%20streams%20via%20a%20persistent%20KV-cache.%20We%20pre-train%20OmniStream%20using%20a%20synergistic%20multi-task%20framework%20coupling%20static%20and%20temporal%20representation%20learning%2C%20streaming%20geometric%20reconstruction%2C%20and%20vision-language%20alignment%20on%2029%20datasets.%20Extensive%20evaluations%20show%20that%2C%20even%20with%20a%20strictly%20frozen%20backbone%2C%20OmniStream%20achieves%20consistently%20competitive%20performance%20with%20specialized%20experts%20across%20image%20and%20video%20probing%2C%20streaming%20geometric%20reconstruction%2C%20complex%20video%20and%20spatial%20reasoning%2C%20as%20well%20as%20robotic%20manipulation%20%28unseen%20at%20training%29.%20Rather%20than%20pursuing%20benchmark-specific%20dominance%2C%20our%20work%20demonstrates%20the%20viability%20of%20training%20a%20single%2C%20versatile%20vision%20backbone%20that%20generalizes%20across%20semantic%2C%20spatial%2C%20and%20temporal%20reasoning%2C%20i.e.%2C%20a%20more%20meaningful%20step%20toward%20general-purpose%20visual%20understanding%20for%20interactive%20and%20embodied%20agents.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12265v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOmniStream%253A%2520Mastering%2520Perception%252C%2520Reconstruction%2520and%2520Action%2520in%2520Continuous%2520Streams%26entry.906535625%3DYibin%2520Yan%2520and%2520Jilan%2520Xu%2520and%2520Shangzhe%2520Di%2520and%2520Haoning%2520Wu%2520and%2520Weidi%2520Xie%26entry.1292438233%3DModern%2520visual%2520agents%2520require%2520representations%2520that%2520are%2520general%252C%2520causal%252C%2520and%2520physically%2520structured%2520to%2520operate%2520in%2520real-time%2520streaming%2520environments.%2520However%252C%2520current%2520vision%2520foundation%2520models%2520remain%2520fragmented%252C%2520specializing%2520narrowly%2520in%2520image%2520semantic%2520perception%252C%2520offline%2520temporal%2520modeling%252C%2520or%2520spatial%2520geometry.%2520This%2520paper%2520introduces%2520OmniStream%252C%2520a%2520unified%2520streaming%2520visual%2520backbone%2520that%2520effectively%2520perceives%252C%2520reconstructs%252C%2520and%2520acts%2520from%2520diverse%2520visual%2520inputs.%2520By%2520incorporating%2520causal%2520spatiotemporal%2520attention%2520and%25203D%2520rotary%2520positional%2520embeddings%2520%25283D-RoPE%2529%252C%2520our%2520model%2520supports%2520efficient%252C%2520frame-by-frame%2520online%2520processing%2520of%2520video%2520streams%2520via%2520a%2520persistent%2520KV-cache.%2520We%2520pre-train%2520OmniStream%2520using%2520a%2520synergistic%2520multi-task%2520framework%2520coupling%2520static%2520and%2520temporal%2520representation%2520learning%252C%2520streaming%2520geometric%2520reconstruction%252C%2520and%2520vision-language%2520alignment%2520on%252029%2520datasets.%2520Extensive%2520evaluations%2520show%2520that%252C%2520even%2520with%2520a%2520strictly%2520frozen%2520backbone%252C%2520OmniStream%2520achieves%2520consistently%2520competitive%2520performance%2520with%2520specialized%2520experts%2520across%2520image%2520and%2520video%2520probing%252C%2520streaming%2520geometric%2520reconstruction%252C%2520complex%2520video%2520and%2520spatial%2520reasoning%252C%2520as%2520well%2520as%2520robotic%2520manipulation%2520%2528unseen%2520at%2520training%2529.%2520Rather%2520than%2520pursuing%2520benchmark-specific%2520dominance%252C%2520our%2520work%2520demonstrates%2520the%2520viability%2520of%2520training%2520a%2520single%252C%2520versatile%2520vision%2520backbone%2520that%2520generalizes%2520across%2520semantic%252C%2520spatial%252C%2520and%2520temporal%2520reasoning%252C%2520i.e.%252C%2520a%2520more%2520meaningful%2520step%2520toward%2520general-purpose%2520visual%2520understanding%2520for%2520interactive%2520and%2520embodied%2520agents.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.12265v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=OmniStream%3A%20Mastering%20Perception%2C%20Reconstruction%20and%20Action%20in%20Continuous%20Streams&entry.906535625=Yibin%20Yan%20and%20Jilan%20Xu%20and%20Shangzhe%20Di%20and%20Haoning%20Wu%20and%20Weidi%20Xie&entry.1292438233=Modern%20visual%20agents%20require%20representations%20that%20are%20general%2C%20causal%2C%20and%20physically%20structured%20to%20operate%20in%20real-time%20streaming%20environments.%20However%2C%20current%20vision%20founda {"title": "SENS-ASR: Semantic Embedding injection in Neural-transducer for Streaming Automatic Speech Recognition", "author": "Youness Dkhissi and Valentin Vielzeuf and Elys Allesiardo and Anthony Larcher", "abstract": "Many Automatic Speech Recognition (ASR) applications require streaming processing of the audio data. In streaming mode, ASR systems need to start transcribing the input stream before it is complete, i.e., the systems have to process a stream of inputs with a limited (or no) future context. Compared to offline mode, this reduction of the future context degrades the performance of Streaming-ASR systems, especially while working with low-latency constraint. In this work, we present SENS-ASR, an approach to enhance the transcription quality of Streaming-ASR by reinforcing the acoustic information with semantic information. This semantic information is extracted from the available past frame-embeddings by a context module. This module is trained using knowledge distillation from a sentence embedding Language Model fine-tuned on the training dataset transcriptions. Experiments on standard datasets show that SENS-ASR significantly improves the Word Error Rate on small-chunk streaming scenarios.", "link": "http://arxiv.org/abs/2603.10005v2", "date": "2026-03-12", "relevancy": 2.3948, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4828}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4828}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4713}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SENS-ASR%3A%20Semantic%20Embedding%20injection%20in%20Neural-transducer%20for%20Streaming%20Automatic%20Speech%20Recognit {"title": "CRAFT: A Tendon-Driven Hand with Hybrid Hard-Soft Compliance", "author": "Leo Lin and Shivansh Patel and Jay Moon and Svetlana Lazebnik and Unnat Jain", "abstract": "We introduce CRAFT hand, a tendon-driven anthropomorphic hand with hybrid hard-soft compliance for contact-rich manipulation. The design is based on a simple idea: contact is not uniform across the hand. Impacts concentrate at joints, while links carry most of the load. CRAFT places soft material at joints and keeps links rigid, and uses rollingcontact joint surfaces to keep flexion on repeatable motion paths. Fifteen motors mounted on the fingers drive the hand through tendons, keeping the form factor compact and the fingers light. In structural tests, CRAFT improves strength and endurance while maintaining comparable repeatability. In teleoperation, CRAFT improves handling of fragile and low-friction items, and the hand covers 33/33 grasps in the Feix taxonomy. The full design costs under $600 and will be released open-source with visionbased teleoperation and simulation integration. Project page: http://craft-hand.github.io/", "link": "http://arxiv.org/abs/2603.12120v1", "date": "2026-03-12", "relevancy": 2.3946, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5077}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.4665}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4625}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CRAFT%3A%20A%20Tendon-Driven%20Hand%20with%20Hybrid%20Hard-Soft%20Compliance&body=Title%3A%20CRAFT%3A%20A%20Tendon-Driven%20Hand%20with%20Hybrid%20Hard-Soft%20Compliance%0AAuthor%3A%20Leo%20Lin%20and%20Shivansh%20Patel%20and%20Jay%20Moon%20and%20Svetlana%20Lazebnik%20and%20Unnat%20Jain%0AAbstrac he%2520hand.%2520Impacts%2520concentrate%2520at%2520joints%252C%2520while%2520links%2520carry%2520most%2520of%2520the%2520load.%2520CRAFT%2520places%2520soft%2520material%2520at%2520joints%2520and%2520keeps%2520links%2520rigid%252C%2520and%2520uses%2520rollingcontact%2520joint%2520surfaces%2520to%2520keep%2520flexion%2520on%2520repeatable%2520motion%2520paths.%2520Fifteen%2520motors%2520mounted%2520on%2520the%2520fingers%2520drive%2520the%2520hand%2520through%2520tendons%252C%2520keeping%2520the%2520form%2520factor%2520compact%2520and%2520the%2520fingers%2520light.%2520In%2520structural%2520tests%252C%2520CRAFT%2520improves%2520strength%2520and%2520endurance%2520while%2520maintaining%2520comparable%2520repeatability.%2520In%2520teleoperation%252C%2520CRAFT%2520improves%2520handling%2520of%2520fragile%2520and%2520low-friction%2520items%252C%2520and%2520the%2520hand%2520covers%252033/33%2520grasps%2520in%2520the%2520Feix%2520taxonomy.%2520The%2520full%2520design%2520costs%2520under%2520%2524600%2520and%2520will%2520be%2520released%2520open-source%2520with%2520visionbased%2520teleoperation%2520and%2520simulation%2520integration.%2520Project%2520page%253A%2520http%253A//craft-hand.github.io/%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.12120v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CRAFT%3A%20A%20Tendon-Driven%20Hand%20with%20Hybrid%20Hard-Soft%20Compliance&entry.906535625=Leo%20Lin%20and%20Shivansh%20Patel%20and%20Jay%20Moon%20and%20Svetlana%20Lazebnik%20and%20Unnat%20Jain&entry.1292438233=We%20introduce%20CRAFT%20hand%2C%20a%20tendon-driven%20anthropomorphic%20hand%20with%20hybrid%20hard-soft%20compliance%20for%20contact-rich%20manipulation.%20The%20design%20is%20based%20on%20a%20simple%20idea%3A%20contact%20is%20not%20uniform%20across%20the%20hand.%20Impacts%20concentrate%20at%20joints%2C%20while%20links%20carry%20most%20of%20the%20load.%20CRAFT%20p {"title": "PuzLM: Solving Jigsaw Puzzles with Sequence-to-Sequence Language Models", "author": "Gur Elkin and Ofir Itzhak Shahar and Ohad Ben-Shahar", "abstract": "Square jigsaw puzzles are typically solved by visually matching piece images to recover the original layout. This work introduces PuzLM, an alternative perspective that recasts jigsaw reassembly as a discrete sequence-to-sequence (Seq2Seq) problem, inspired by natural language representations. We design an efficient puzzle quantization procedure that transforms each piece into a short sequence of discrete tokens, enabling the direct application of standard Seq2Seq language models as powerful jigsaw solvers. Our approach demonstrates that accurate puzzle reconstruction can be achieved through purely symbolic reasoning over discrete representations, improving state-of-the-art performance even on puzzles with eroded boundaries or missing pieces.", "link": "http://arxiv.org/abs/2511.06315v2", "date": "2026-03-12", "relevancy": 2.3945, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4934}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4934}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4499}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PuzLM%3A%20Solving%20Jigsaw%20Puzzles%20with%20Sequence-to-Sequence%20Language%20Models&body=Title%3A%20PuzLM%3A%20Solving%20Jigsaw%20Puzzles%20with%20Sequence-to-Sequence%20Language%20Models%0AAuthor%3A%20Gur%20Elkin%20and%20Ofir%20Itzhak%20Shahar%20and%20Ohad%20Ben-Shahar%0AAbstract%3A%20Square%20jigsaw%20puzzles%20are%20typically%20solved%20by%20visually%20matching%20piece%20images%20to%20recover%20the%20original%20layout.%20This%20work %2520jigsaw%2520solvers.%2520Our%2520approach%2520demonstrates%2520that%2520accurate%2520puzzle%2520reconstruction%2520can%2520be%2520achieved%2520through%2520purely%2520symbolic%2520reasoning%2520over%2520discrete%2520representations%252C%2520improving%2520state-of-the-art%2520performance%2520even%2520on%2520puzzles%2520with%2520eroded%2520boundaries%2520or%2520missing%2520pieces.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.06315v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=PuzLM%3A%20Solving%20Jigsaw%20Puzzles%20with%20Sequence-to-Sequence%20Language%20Models&entry.906535625=Gur%20Elkin%20and%20Ofir%20Itzhak%20Shahar%20and%20Ohad%20Ben-Shahar&entry.1292438233=Square%20jigsaw%20puzzles%20are%20typically%20solved%20by%20visually%20matching%20piece%20images%20to%20recover%20the%20original%20layout.%20This%20work%20introduces%20PuzLM%2C%20an%20alternative%20perspective%20that%20recasts%20jigsaw%20reassembly%20as%20a%20discrete%20sequence-to-sequence%20%28Seq2Seq%29%20problem%2C%20inspired%20by%20natural%20language%20representations.%20We%20design%20an%20efficient%20puzzle%20quantization%20procedure%20that%20transforms%20each%20piece%20into%20a%20short%20sequence%20of%20discrete%20tokens%2C%20enabling%20the%20direct%20application%20of%20standard%20Seq2Seq%20language%20models%20as%20powerful%20jigsaw%20solvers.%20Our%20approach%20demonstrates%20that%20accurate%20puzzle%20reconstruction%20can%20be%20achieved%20through%20purely%20symbolic%20reasoning%20over%20discrete%20representations%2C%20improving%20state-of-the-art%20performance%20even%20on%20puzzles%20with%20eroded%20boundaries%20or%20missing%20pieces.&entry.1838667208=http%3A//arxiv.org/abs/2511.06315v2&entry.124074799=Read"},
{"title": "EVATok: Adaptive Length Video Tokenization for Efficient Visual Autoregressive Generation", "author": "Tianwei Xiong and Jun Hao Liew and Zilong Huang and Zhijie Lin and Jiashi Feng and Xihui Liu", "abstract": "Autoregressive (AR) video generative models rely on video tokenizers that compress pixels into discrete token sequences. The length of these token sequences is crucial for balancing reconstruction quality against downstream generation computational cost. Traditional video tokenizers apply a uniform token assignment across temporal blocks of different videos, often wasting tokens on simple, static, or repetitive segments while underserving dynamic or complex ones. To address this inefficiency, we introduce $\\textbf{EVATok}$, a framework to produce $\\textbf{E}$fficient $\\textbf{V}$ideo $\\textbf{A}$daptive $\\textbf{Tok}$enizers. Our framework estimates optimal token assignments for each video to achieve the best quality-cost trade-off, develops lightweight routers for fast prediction of these optimal assignments, and trains adaptive tokenizers that encode videos based on the assignments predicted by routers. We demonstrate that EVATok delivers substantial improvements in efficiency and overall quality for video reconstruction and downstream AR generation. Enhanced by our advanced training recipe that integrates video semantic encoders, EVATok achieves superior reconstruction and state-of-the-art class-to-video generation on UCF-101, with at least 24.4% savings in average token usage compared to the prior state-of-the-art LARP and our fixed-length baseline.", "link": "http://arxiv.org/abs/2603.12267v1", "date": "2026-03-12", "relevancy": 2.3915, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6016}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5979}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5884}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EVATok%3A%20Adaptive%20Length%20Video%20Tokenization%20for%20Efficient%20Visual%20Autoregressive%20Generation&body=Title%3A%20EVATok%3A%20Adaptive%20Length%20Video%20Tokenization%20for%20Efficient%20Visual%20Autoregressive%20Generation%0AAuthor%3A%20Tianwei%20Xiong%20and%20Jun%20Hao%20Liew%20and%20Zilong%20Huang%20and%20Zhijie%20Lin%20and%20Jiashi%20Feng%20and%20Xihui%20Liu%0AAbstract%3A%20Autoregressive%20%28AR%29%20video%20generative%20models%20rely%20on%20video%20tokenizers%20that%20compress%20pixels%20into%20discrete%20token%20sequences.%20The%20length%20of%20these%20token%20sequences%20is%20crucial%20for%20balancing%20reconstruction%20quality%20against%20downstream%20generation%20computational%20cost.%20Traditional%20video%20tokenizers%20apply%20a%20uniform%20token%20assignment%20across%20temporal%20blocks%20of%20different%20videos%2C%20often%20wasting%20tokens%20on%20simple%2C%20static%2C%20or%20repetitive%20segments%20while%20underserving%20dynamic%20or%20complex%20ones.%20To%20address%20this%20inefficiency%2C%20we%20introduce%20%24%5Ctextbf%7BEVATok%7D%24%2C%20a%20framework%20to%20produce%20%24%5Ctextbf%7BE%7D%24fficient%20%24%5Ctextbf%7BV%7D%24ideo%20%24%5Ctextbf%7BA%7D%24daptive%20%24%5Ctextbf%7BTok%7D%24enizers.%20Our%20framework%20estimates%20optimal%20token%20assignments%20for%20each%20video%20to%20achieve%20the%20best%20quality-cost%20trade-off%2C%20develops%20lightweight%20routers%20for%20fast%20prediction%20of%20these%20optimal%20assignments%2C%20and%20trains%20adaptive%20tokenizers%20that%20encode%20videos%20based%20on%20the%20assignments%20predicted%20by%20routers.%20We%20demonstrate%20that%20EVATok%20delivers%20substantial%20improvements%20in%20efficiency%20and%20overall%20quality%20for%20video%20reconstruction%20and%20downstream%20AR%20generation.%20Enhanced%20by%20our%20advanced%20training%20recipe%20that%20integrates%20video%20semantic%20encoders%2C%20EVATok%20achieves%20superior%20reconstruction%20and%20state-of-the-art%20class-to-video%20generation%20on%20UCF-101%2C%20with%20at%20least%2024.4%25%20savings%20in%20average%20token%20usage%20compared%20to%20the%20prior%20state-of-the-art%20LARP%20and%20our%20fixed-length%20baseline.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12267v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEVATok%253A%2520Adaptive%2520Length%2520Video%2520Tokenization%2520for%2520Efficient%2520Visual%2520Autoregressive%2520Generation%26entry.906535625%3DTianwei%2520Xiong%2520and%2520Jun%2520Hao%2520Liew%2520and%2520Zilong%2520Huang%2520and%2520Zhijie%2520Lin%2520and%2520Jiashi%2520Feng%2520and%2520Xihui%2520Liu%26entry.1292438233%3DAutoregressive%2520%2528AR%2529%2520video%2520generative%2520models%2520rely%2520on%2520video%2520tokenizers%2520that%2520compress%2520pixels%2520into%2520discrete%2520token%2520sequences.%2520The%2520length%2520of%2520these%2520token%2520sequences%2520is%2520crucial%2520for%2520balancing%2520reconstruction%2520quality%2520against%2520downstream%2520generation%2520computational%2520cost.%2520Traditional%2520video%2520tokenizers%2520apply%2520a%2520uniform%2520token%2520assignment%2520across%2520temporal%2520blocks%2520of%2520different%2520videos%252C%2520often%2520wasting%2520tokens%2520on%2520simple%252C%2520static%252C%2520or%2520repetitive%2520segments%2520while%2520underserving%2520dynamic%2520or%2520complex%2520ones.%2520To%2520address%2520this%2520inefficiency%252C%2520we%2520introduce%2520%2524%255Ctextbf%257BEVATok%257D%2524%252C%2520a%2520framework%2520to%2520produce%2520%2524%255Ctextbf%257BE%257D%2524fficient%2520%2524%255Ctextbf%257BV%257D%2524ideo%2520%2524%255Ctextbf%257BA%257D%2524daptive%2520%2524%255Ctextbf%257BTok%257D%2524eni {"title": "Contact-Aware Refinement of Human Pose Pseudo-Ground Truth via Bioimpedance Sensing", "author": "Maria-Paola Forte and Nikos Athanasiou and Giulia Ballardini and Jan Ulrich Bartels and Katherine J. Kuchenbecker and Michael J. Black", "abstract": "Capturing accurate 3D human pose in the wild would provide valuable data for training pose estimation and motion generation methods. While video-based estimation approaches have become increasingly accurate, they often fail in common scenarios involving self-contact, such as a hand touching the face. In contrast, wearable bioimpedance sensing can cheaply and unobtrusively measure ground-truth skin-to-skin contact. Consequently, we propose a novel framework that combines visual pose estimators with bioimpedance sensing to capture the 3D pose of people by taking self-contact into account. Our method, BioTUCH, initializes the pose using an off-the-shelf estimator and introduces contact-aware pose optimization during measured self-contact: reprojection error and deviations from the input estimate are minimized while enforcing vertex proximity constraints. We validate our approach using a new dataset of synchronized RGB video, bioimpedance measurements, and 3D motion capture. Testing with three input pose estimators, we demonstrate an average of 11.7% improvement in reconstruction accuracy. We also present a miniature wearable bioimpedance sensor that enables efficient large-scale collection of contact-aware training data for improving pose estimation and generation using BioTUCH. Code and data are available at biotuch.is.tue.mpg.de", "link": "http://arxiv.org/abs/2512.04862v2", "date": "2026-03-12", "relevancy": 2.3801, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6377}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5656}, { {"title": "Multimodal classification of Radiation-Induced Contrast Enhancements and tumor recurrence using deep learning", "author": "Robin Peretzke and Marlin Hanstein and Maximilian Fischer and Lars Badhi Wessel and Obada Alhalabi and Sebastian Regnery and Andreas Kudak and Maximilian Deng and Tanja Eichkorn and Philipp Hoegen Sa\u00dfmannshausen and Fabian Allmendinger and Jan-Hendrik Bolten and Philipp Schr\u00f6ter and Christine Jungk and J\u00fcrgen Peter Debus and Peter Neher and Laila K\u00f6nig and Klaus Maier-Hein", "abstract": "The differentiation between tumor recurrence and radiation-induced contrast enhancements in post-treatment glioblastoma patients remains a major clinical challenge. Existing approaches rely on clinically sparsely available diffusion MRI or do not consider radiation maps, which are gaining increasing interest in the tumor board for this differentiation. We introduce RICE-NET, a multimodal 3D deep learning model that integrates longitudinal MRI data with radiotherapy dose distributions for automated lesion classification using conventional T1-weighted MRI data. Using a cohort of 92 patients, the model achieved an F1 score of 0.92 on an independent test set. During extensive ablation experiments, we quantified the contribution of each timepoint and modality and showed that reliable classification largely depends on the radiation map. Occlusion-based interpretability analyses further confirmed the model's focus on clinically relevant regions. These findings highlight the potential of multimodal deep learning to enhance diagnostic accuracy and support clinical decision-making in neuro-oncology.", "link": "http://arxiv.org/abs/2603.11827v1", "date": "2026-03-12", "relevancy": 2.3767, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4797}, {"title": "Boosted dynamic neural networks", "link": "https://oj {"title": "Attend Before Attention: Efficient and Scalable Video Understanding via Autoregressive Gazing", "author": "Baifeng Shi and Stephanie Fu and Long Lian and Hanrong Ye and David Eigen and Aaron Reite and Boyi Li and Jan Kautz and Song Han and David M. Chan and Pavlo Molchanov and Trevor Darrell and Hongxu Yin", "abstract": "Multi-modal large language models (MLLMs) have advanced general-purpose video understanding but struggle with long, high-resolution videos -- they process every pixel equally in their vision transformers (ViTs) or LLMs despite significant spatiotemporal redundancy. We introduce AutoGaze, a lightweight module that removes redundant patches before processed by a ViT or an MLLM. Trained with next-token prediction and reinforcement learning, AutoGaze autoregressively selects a minimal set of multi-scale patches that can reconstruct the video within a user-specified error threshold, eliminating redundancy while preserving information. Empirically, AutoGaze reduces visual tokens by 4x-100x and accelerates ViTs and MLLMs by up to 19x, enabling scaling MLLMs to 1K-frame 4K-resolution videos and achieving superior results on video benchmarks (e.g., 67.0% on VideoMME). Furthermore, we introduce HLVid: the first high-resolution, long-form video QA benchmark with 5-minute 4K-resolution videos, where an MLLM scaled with AutoGaze improves over the baseline by 10.1% and outperforms the previous best MLLM by 4.5%. Project page: https://autogaze.github.io/.", "link": "http://arxiv.org/abs/2603.12254v1", "date": "2026-03-12", "relevancy": 2.3687, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5964}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5934}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/a {"title": "Decentralized Cooperative Localization for Multi-Robot Systems with Asynchronous Sensor Fusion", "author": "Nivand Khosravi and Niusha Khosravi and Mohammad Bozorg and Masoud S. Bahraini", "abstract": "Decentralized cooperative localization (DCL) is a promising approach for nonholonomic mobile robots operating in GPS-denied environments with limited communication infrastructure. This paper presents a DCL framework in which each robot performs localization locally using an Extended Kalman Filter, while sharing measurement information during update stages only when communication links are available and companion robots are successfully detected by LiDAR. The framework preserves cross-correlation consistency among robot state estimates while handling asynchronous sensor data with heterogeneous sampling rates and accommodating accelerations during dynamic maneuvers. Unlike methods that require pre-aligned coordinate systems, the proposed approach allows robots to initialize with arbitrary reference-frame orientations and achieves automatic alignment through transformation matrices in both the prediction and update stages. To improve robustness in feature-sparse environments, we introduce a dual-landmark evaluation framework that exploits both static environmental features and mobile robots as dynamic landmarks. The proposed framework enables reliable detection and feature extraction during sharp turns, while prediction accuracy is improved through information sharing from mutual observations. Experimental results in both Gazebo simulation and real-world basement environments show that DCL outperforms centralized cooperative localization (CCL), achieving a 34% reduction in RMSE, while the dual-landmark variant yields an improvement of 56%. These results demonstrate the applicability of DCL to challenging domains such as enclosed spaces, underwater environments, and feature-sparse terrains where conventional localization methods are ineffective.", "link": "http d%20approach%20allows%20robots%20to%20initialize%20with%20arbitrary%20reference-frame%20orientations%20and%20achieves%20automatic%20alignment%20through%20transformation%20matrices%20in%20both%20the%20prediction%20and%20update%20stages.%20To%20improve%20robustness%20in%20feature-sparse%20environments%2C%20we%20introduce%20a%20dual-landmark%20evaluation%20framework%20that%20exploits%20both%20static%20environmental%20features%20and%20mobile%20robots%20as%20dynamic%20landmarks.%20The%20proposed%20framework%20enables%20reliable%20detection%20and%20feature%20extraction%20during%20sharp%20turns%2C%20while%20prediction%20accuracy%20is%20improved%20through%20information%20sharing%20from%20mutual%20observations.%20Experimental%20results%20in%20both%20Gazebo%20simulation%20and%20real-world%20basement%20environments%20show%20that%20DCL%20outperforms%20centralized%20cooperative%20localization%20%28CCL%29%2C%20achieving%20a%2034%25%20reduction%20in%20RMSE%2C%20while%20the%20dual-landmark%20variant%20yields%20an%20improvement%20of%2056%25.%20These%20results%20demonstrate%20the%20applicability%20of%20DCL%20to%20challenging%20domains%20such%20as%20enclosed%20spaces%2C%20underwater%20environments%2C%20and%20feature-sparse%20terrains%20where%20conventional%20localization%20methods%20are%20ineffective.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12075v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDecentralized%2520Cooperative%2520Localization%2520for%2520Multi-Robot%2520Systems%2520with%2520Asynchronous%2520Sensor%2520Fusion%26entry.906535625%3DNivand%2520Khosravi%2520and%2520Niusha%2520Khosravi%2520and%2520Mohammad%2520Bozorg%2520and%2520Masoud%2520S.%2520Bahraini%26entry.1292438233%3DDecentralized%2520cooperative%2520localization%2520%2528DCL%2529%2520is%2520a%2520promising%2520approach%2520for%2520nonholonomic%2520mobile%2520robots%2520operating%2520in%2520GPS-denied%2520environments%2520with%2520 {"title": "SommBench: Assessing Sommelier Expertise of Language Models", "author": "William Brach and Tomas Bedej and Jacob Nielsen and Jacob Pichna and Juraj Bedej and Eemeli Saarensilta and Julie Dupouy and Gianluca Barmina and Andrea Blasi N\u00fa\u00f1ez and Peter Schneider-Kamp and Kristian Ko\u0161\u0165\u00e1l and Michal Ries and Lukas Galke Poech", "abstract": "With the rapid advances of large language models, it becomes increasingly important to systematically evaluate their multilingual and multicultural capabilities. Previous cultural evaluation benchmarks focus mainly on basic cultural knowledge that can be encoded in linguistic form. Here, we propose SommBench, a multilingual benchmark to assess sommelier expertise, a domain deeply grounded in the senses of smell and taste. While language models learn about sensory properties exclusively through textual descriptions, SommBench tests whether this textual grounding is sufficient to emulate expert-level sensory judgment. SommBench comprises three main tasks: Wine Theory Question Answering (WTQA), Wine Feature Completion (WFC), and Food-Wine Pairing (FWP). SommBench is available in multiple languages: English, Slovak, Swedish, Finnish, German, Danish, Italian, and Spanish. This helps separate a language model's wine expertise from its language skills. The benchmark datasets were developed in close collaboration with a professional sommelier and native speakers of the respective languages, resulting in 1,024 wine theory question-answering questions, 1,000 wine feature-completion examples, and 1,000 food-wine pairing examples. We provide results for the most popular language models, including closed-weights models such as Gemini 2.5, and open-weights models, such as GPT-OSS and Qwen 3. Our results show that the most capable models perform well on wine theory question answering (up to 97% correct with a closed-weights model), yet feature completion (peaking at 65%) and food-wine pairing show (MCC ranging between 0 and 0.39) turn out to be more challenging. These results position SommBench as an interesting and challenging benchmark for evaluating the sommelier expertise of language models. The benchmark is publicly available at https://github.com/sommify/sommbench.", "link": "http://arxiv.org/abs/2603.12117v1", "date": "2026-03-12", "relevancy": 2.3606, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4789}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4789}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4586}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SommBench%3A%20Assessing%20Sommelier%20Expertise%20of%20Language%20Models&body=Title%3A%20SommBench%3A%20Assessing%20Sommelier%20Expertise%20of%20Language%20Models%0AAuthor%3A%20William%20Brach%20and%20Tomas%20Bedej%20and%20Jacob%20Nielsen%20and%20Jacob%20Pichna%20and%20Juraj%20Bedej%20and%20Eemeli%20Saarensilta%20and%20Julie%20Dupouy%20and%20Gianluca%20Barmina%20and%20Andrea%20Blasi%20N%C3%BA%C3%B1ez%20and%20Peter%20Schneider-Kamp%20and%20Kristian%20Ko%C5%A1%C5%A5%C3%A1l%20and%20Michal%20Ries%20and%20Lukas%20Galke%20Poech%0AAbstract%3A%20With%20the%20rapid%20advances%20of%20large%20language%20models%2C%20it%20becomes%20increasingly%20important%20to%20systematically%20evaluate%20their%20multilingual%20and%20multicultural%20capabilities.%20Previous%20cultural%20evaluation%20benchmarks%20focus%20mainly%20on%20basic%20cultural%20knowledge%20that%20can%20be%20encoded%20in%20linguistic%20form.%20Here%2C%20we%20propose%20SommBench%2C%20a%20multilingual%20benchmark%20to%20assess%20sommelier%20expertise%2C%20a%20domain%20deeply%20grounded%20in%20the%20senses%20of%20smell%20and%20taste.%20While%20language%20models%20learn%20about%20sensory%20properties%20exclusively%20through%20textual%20descriptions%2C%20SommBench%20tests%20whether%20this%20textual%20grounding%20is%20sufficient%20to%20emulate%20expert-level%20sensory%20judgment.%20SommBench%20comprises%20three%20main%20tasks%3A%20Wine%20Theory%20Question%20Answering%20%28WTQA%29%2C%20Wine%20Feature%20Completion%20%28WFC%29%2C%20and%20Food-Wine%20Pairing%20%28FWP%29.%20SommBench%20is%20available%20in%20multiple%20languages%3A%20English%2C%20Slovak%2C%20Swedish%2C%20Finnish%2C%20German%2C%20Danish%2C%20Italian%2C%20and%20Spanish.%20This%20helps%20separate%20a%20language%20model%27s%20wine%20expertise%20from%20its%20language%20skills.%20The%20benchmark%20datasets%20were%20developed%20in%20close%20collaboration%20with%20a%20professional%20sommelier%20and%20native%20speakers%20of%20the%20respective%20languages%2C%20resulting%20in%201%2C024%20wine%20theory%20question-answering%20questions%2C%201%2C000%20wine%20feature-completion%20examples%2C%20and%201%2C000%20food-wine%20pairing%20examples.%20We%20provide%20results%20for%20the%20most%20popular%20language%20models%2C%20including%20closed-weights%20models%20such%20as%20Gemini%202.5%2C%20and%20open-weights%20models%2C%20such%20as%20GPT-OSS%20and%20Qwen%203.%20Our%20results%20show%20that%20the%20most%20capable%20models%20perform%20well%20on%20wine%20theory%20question%20answering%20%28up%20to%2097%25%20correct%20with%20a%20closed-weights%20model%29%2C%20yet%20feature%20completion%20%28peaking%20at%2065%25%29%20and%20food-wine%20pairing%20show%20%28MCC%20ranging%20between%200%20and%200.39%29%20turn%20out%20to%20be%20more%20challenging.%20These%20results%20position%20SommBench%20as%20an%20interesting%20and%20challenging%20benchmark%20for%20evaluating%20the%20sommelier%20expertise%20of%20language%20models.%20The%20benchmark%20is%20publicly%20available%20at%20https%3A//github.com/sommify/sommbench.%0ALink%3A%20http%3A//arxiv

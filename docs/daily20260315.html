{"title": "Controllable Egocentric Video Generation via Occlusion-Aware Sparse 3D Hand Joints", "author": "Chenyangguang Zhang and Botao Ye and Boqi Chen and Alexandros Delitzas and Fangjinhua Wang and Marc Pollefeys and Xi Wang", "abstract": "Motion-controllable video generation is crucial for egocentric applications in virtual reality and embodied AI. However, existing methods often struggle to achieve 3D-consistent fine-grained hand articulation. By adopting on 2D trajectories or implicit poses, they collapse 3D geometry into spatially ambiguous signals or over rely on human-centric priors. Under severe egocentric occlusions, this causes motion inconsistencies and hallucinated artifacts, as well as preventing cross-embodiment generalization to robotic hands. To address these limitations, we propose a novel framework that generates egocentric videos from a single reference frame, leveraging sparse 3D hand joints as embodiment-agnostic control signals with clear semantic and geometric structures. We introduce an efficient control module that resolves occlusion ambiguities while fully preserving 3D information. Specifically, it extracts occlusion-aware features from the source reference frame by penalizing unreliable visual signals from hidden joints, and employs a 3D-based weighting mechanism to robustly handle dynamically occluded target joints during motion propagation. Concurrently, the module directly injects 3D geometric embeddings into the latent space to strictly enforce structural consistency. To facilitate robust training and evaluation, we develop an automated annotation pipeline that yields over one million high-quality egocentric video clips paired with precise hand trajectories. Additionally, we register humanoid kinematic and camera data to construct a cross-embodiment benchmark. Extensive experiments demonstrate that our approach significantly outperforms state-of-the-art baselines, generating high-fidelity egocentric videos with realistic interactions and exhibiting exceptional cross-embodiment generalization to robotic hands.", "link": "http://arxiv.org/abs/2603.11755v1", "date": "2026-03-12", "relevancy": 3.1986, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.664}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.6318}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6233}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Controllable%20Egocentric%20Video%20Generation%20via%20Occlusion-Aware%20Sparse%203D%20Hand%20Joints&body=Title%3A%20Controllable%20Egocentric%20Video%20Generation%20via%20Occlusion-Aware%20Sparse%203D%20Hand%20Joints%0AAuthor%3A%20Chenyangguang%20Zhang%20and%20Botao%20Ye%20and%20Boqi%20Chen%20and%20Alexandros%20Delitzas%20and%20Fangjinhua%20Wang%20and%20Marc%20Pollefeys%20and%20Xi%20Wang%0AAbstract%3A%20Motion-controllable%20video%20generation%20is%20crucial%20for%20egocentric%20applications%20in%20virtual%20reality%20and%20embodied%20AI.%20However%2C%20existing%20methods%20often%20struggle%20to%20achieve%203D-consistent%20fine-grained%20hand%20articulation.%20By%20adopting%20on%202D%20trajectories%20or%20implicit%20poses%2C%20they%20collapse%203D%20geometry%20into%20spatially%20ambiguous%20signals%20or%20over%20rely%20on%20human-centric%20priors.%20Under%20severe%20egocentric%20occlusions%2C%20this%20causes%20motion%20inconsistencies%20and%20hallucinated%20artifacts%2C%20as%20well%20as%20preventing%20cross-embodiment%20generalization%20to%20robotic%20hands.%20To%20address%20these%20limitations%2C%20we%20propose%20a%20novel%20framework%20that%20generates%20egocentric%20videos%20from%20a%20single%20reference%20frame%2C%20leveraging%20sparse%203D%20hand%20joints%20as%20embodiment-agnostic%20control%20signals%20with%20clear%20semantic%20and%20geometric%20structures.%20We%20introduce%20an%20efficient%20control%20module%20that%20resolves%20occlusion%20ambiguities%20while%20fully%20preserving%203D%20information.%20Specifically%2C%20it%20extracts%20occlusion-aware%20features%20from%20the%20source%20reference%20frame%20by%20penalizing%20unreliable%20visual%20signals%20from%20hidden%20joints%2C%20and%20employs%20a%203D-based%20weighting%20mechanism%20to%20robustly%20handle%20dynamically%20occluded%20target%20joints%20during%20motion%20propagation.%20Concurrently%2C%20the%20module%20directly%20injects%203D%20geometric%20embeddings%20into%20the%20latent%20space%20to%20strictly%20enforce%20structural%20consistency.%20To%20facilitate%20robust%20training%20and%20evaluation%2C%20we%20develop%20an%20automated%20annotation%20pipeline%20that%20yields%20over%20one%20million%20high-quality%20egocentric%20video%20clips%20paired%20with%20precise%20hand%20trajectories.%20Additionally%2C%20we%20register%20humanoid%20kinematic%20and%20camera%20data%20to%20construct%20a%20cross-embodiment%20benchmark.%20Extensive%20experiments%20demonstrate%20that%20our%20approach%20significantly%20outperforms%20state-of-the-art%20baselines%2C%20generating%20high-fidelity%20egocentric%20videos%20with%20realistic%20interactions%20and%20exhibiting%20exceptional%20cross-embodiment%20generalization%20to%20robotic%20hands.%0ALink%3A%20http%3A//arxiv.org/abs/2603.11755v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DControllable%2520Egocentric%2520Video%2520Generation%2520via%2520Occlusion-Aware%2520Sparse%25203D%2520Hand%2520Joints%26entry.906535625%3DChenyangguang%2520Zhang%2520and%2520Botao%2520Ye%2520and%2520Boqi%2520Chen%2520and%2520Alexandros%2520Delitzas%2520and%2520Fangjinhua%2520Wang%2520and%2520Marc%2520Pollefeys%2520and%2520Xi%2520Wang%26entry.1292438233%3DMotion-controllable%2520video%2520generation%2520is%2520crucial%2520f {"title": "NBAvatar: Neural Billboards Avatars with Realistic Hand-Face Interaction", "author": "David Svitov and Mahtab Dahaghin", "abstract": "We present NBAvatar - a method for realistic rendering of head avatars handling non-rigid deformations caused by hand-face interaction. We introduce a novel representation for animated avatars by combining the training of oriented planar primitives with neural rendering. Such a combination of explicit and implicit representations enables NBAvatar to handle temporally and pose-consistent geometry, along with fine-grained appearance details provided by the neural rendering technique. In our experiments, we demonstrate that NBAvatar implicitly learns color transformations caused by face-hand interactions and surpasses existing approaches in terms of novel-view and novel-pose rendering quality. Specifically, NBAvatar achieves up to 30% LPIPS reduction under high-resolution megapixel rendering compared to Gaussian-based avatar methods, while also improving PSNR and SSIM, and achieves higher structural similarity compared to the state-of-the-art hand-face interaction method InteractAvatar.", "link": "http://arxiv.org/abs/2603.12063v1", "date": "2026-03-12", "relevancy": 3.1776, "topK": [{"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.6696}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.6696}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5674}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NBAvatar%3A%20Neural%20Billboards%20Avatars%20with%20Realistic%20Hand-Face%20Interaction&body=Title%3A%20NBAvatar%3A%20Neural%20Billboards%20Avatars%20with%20Realistic%20Hand-Face%20Interaction%0AAuthor%3A%20David%20Svitov%20and%20Mahtab%20Dahaghin%0AAbstract%3A%20We%20present%20NBAvatar%20-%20a%20method%20for%20realistic%20rendering%20of%20head%20avatars%20handling%20non-rigid%20deformations%20caused%20by%20hand-face%20interaction.%20We%20introduce%20a%20novel%20representation%20for%20animated%20avatars%20by%20combining%20the%20training%20of%20oriented%20planar%20primitives%20with%20neural%20rendering.%20Such%20a%20combination%20of%20explicit%20and%20implicit%20representations%20enables%20NBAvatar%20to%20handle%20temporally%20and%20pose-consistent%20geometry%2C%20along%20with%20fine-grained%20appearance%20details%20provided%20by%20the%20neural%20rendering%20technique.%20In%20our%20experiments%2C%20we%20demonstrate%20that%20NBAvatar%20implicitly%20learns%20color%20transformations%20caused%20by%20face-hand%20interactions%20and%20surpasses%20existing%20approaches%20in%20terms%20of%20novel-view%20and%20novel-pose%20rendering%20quality.%20Specifically%2C%20NBAvatar%20achieves%20up%20to%2030%25%20LPIPS%20reduction%20under%20high-resolution%20megapixel%20rendering%20compared%20to%20Gaussian-based%20avatar%20methods%2C%20while%20also%20improving%20PSNR%20and%20SSIM%2C%20and%20achieves%20higher%20structural%20similarity%20compared%20to%20the%20state-of-the-art%20hand-face%20interaction%20method%20InteractAvatar.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12063v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNBAvatar%253A%2520Neural%2520Billboards%2520Avatars%2520with%2520Realistic%2520Hand-Face%2520Interaction%26entry.906535625%3DDavid%2520Svitov%2520and%2520Mahtab%2520Dahaghin%26entry.1292438233%3DWe%2520present%2520NBAvatar%2520-%2520a%2520method%2520for%2520realistic%2520rendering%2520of%2520head%2520avatars%2520handling%2520non-rigid%2520deformations%2520caused%2520by%2520hand-face%2520interaction.%2520We%2520introduce%2520a%2520novel%2520representation%2520for%2520animated%2520avatars%2520by%2520combining%2520the%2520training%2520of%2520oriented%2520planar%2520primitives%2520with%2520neural%2520rendering.%2520Such%2520a%2520combination%2520of%2520explicit%2520and%2520implicit%2520representations%2520enables%2520NBAvatar%2520to%2520handle%2520temporally%2520and%2520pose-consistent%2520geometry%252C%2520along%2520with%2520fine-grained%2520appearance%2520details%2520provided%2520by%2520the%2520neural%2520rendering%2520technique.%2520In%2520our%2520experiments%252C%2520we%2520demonstrate%2520that%2520NBAvatar%2520implicitly%2520learns%2520color%2520transformations%2520caused%2520by%2520face-hand%2520interactions%2520and%2520surpasses%2520existing%2520approaches%2520in%2520terms%2520of%2520novel-view%2520and%2520novel-pose%2520rendering%2520quality.%2520Specifically%252C%2520NBAvatar%2520achieves%2520up%2520to%252030%2525%2520LPIPS%2520reduction%2520under%2520high-resolution%2520megapixel%2520rendering%2520compared%2520to%2520Gaussian-based%2520avatar%2520methods%252C%2520while%2520also%2520improving%2520PSNR%2520and%2520SSIM%252C%2520and%2520achieves%2520higher%2520structural%2520similarity%2520compared%2520to%2520the%2520state-of-the-art%2520hand-face%2520interaction%2520method%2520InteractAvatar.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.12063v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=NBAvatar%3A%20Neural%20Billboards%20Avatars%20with%20Realistic%20Hand-Face%20Interaction&entry.906535625=David%20Svitov%20and%20Mahtab%20Dahaghin&entry.1292438233=We%20present%20NBAvatar%20-%20a%20method%20for%20realistic%20rendering%20of%20head%20avatars%20handling%20non-rigid%20deformations%20caused%20by%20hand-face%20interaction.%20We%20introduce%20a%20novel%20representation%20for%20animated%20avatars%20by%20combining%20the%20training%20of%20oriented%20planar%20primitives%20with%20neural%20rendering.%20Such%20a%20combination%20of%20explicit%20and%20implicit%20representations%20enables%20NBAvatar%20to%20handle%20temporally%20and%20pose-consistent%20geometry%2C%20along%20with%20fine-grained%20appearance%20details%20provided%20by%20the%20neural%20rendering%20technique.%20In%20our%20experiments%2C%20we%20demonstrate%20that%20NBAvatar%20implicitly%20learns%20color%20transformations%20caused%20by%20face-hand%20interactions%20and%20surpasses%20existing%20approaches%20in%20terms%20of%20novel-view%20and%20novel-pose%20rendering%20quality.%20Specifically%2C%20NBAvatar%20achieves%20up%20to%2030%25%20LPIPS%20reduction%20under%20high-resolution%20megapixel%20rendering%20compared%20to%20Gaussian-based%20avatar%20methods%2C%20while%20also%20improving%20PSNR%20and%20SSIM%2C%20and%20achieves%20higher%20structural%20similarity%20compared%20to%20the%20state-of-the-art%20hand-face%20interaction%20method%20InteractAvatar.&entry.1838667208=http%3A//arxiv.org/abs/2603.12063v1&entry.124074799=Read"},
{"title": "Hoi3DGen: Generating High-Quality Human-Object-Interactions in 3D", "author": "Agniv Sharma and Xianghui Xie and Tom Fischer and Eddy Ilg and Gerard Pons-Moll", "abstract": "Modeling and generating 3D human-object interactions from text is crucial for applications in AR, XR, and gaming. Existing approaches often rely on score distillation from text-to-image models, but their results suffer from the Janus problem and do not follow text prompts faithfully due to the scarcity of high-quality interaction data. We introduce Hoi3DGen, a framework that generates high-quality textured meshes of human-object interaction that follow the input interaction descriptions precisely. We first curate realistic and high-quality interaction data leveraging multimodal large language models, and then create a full text-to-3D pipeline, which achieves orders-of-magnitude improvements in interaction fidelity. Our method surpasses baselines by 4-15x in text consistency and 3-7x in 3D model quality, exhibiting strong generalization to diverse categories and interaction types, while maintaining high-quality 3D generation.", "link": "http://arxiv.org/abs/2603.12126v1", "date": "2026-03-12", "relevancy": 3.1149, "topK": [{"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.6481}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.616}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.6048}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hoi3DGen%3A%20Generating%20High-Quality%20Human-Object-Interactions%20in%203D&body=Title%3A%20Hoi3DGen%3A%20Generating%20High-Quality%20Human-Object-Interactions%20in%203D%0AAuthor%3A%20Agniv%20Sharma%20and%20Xianghui%20Xie%20and%20Tom%20Fischer%20and%20Eddy%20Ilg%20and%20Gerard%20Pons-Moll%0AAbstract%3A%20Modeling%20and%20generating%203D%20human-object%20interactions%20from%20text%20is%20crucial%20for%20applications%20in%20AR%2C%20XR%2C%20and%20gaming.%20Existing%20approaches%20often%20rely%20on%20score%20distillation%20from%20text-to-image%20models%2C%20but%20their%20results%20suffer%20from%20the%20Janus%20problem%20and%20do%20not%20follow%20text%20prompts%20faithfully%20due%20to%20the%20scarcity%20of%20high-quality%20interaction%20data.%20We%20introduce%20Hoi3DGen%2C%20a%20framework%20that%20generates%20high-quality%20textured%20meshes%20of%20human-object%20interaction%20that%20follow%20the%20input%20interaction%20descriptions%20precisely.%20We%20first%20curate%20realistic%20and%20high-quality%20interaction%20data%20leveraging%20multimodal%20large%20language%20models%2C%20and%20then%20create%20a%20full%20text-to-3D%20pipeline%2C%20which%20achieves%20orders-of-magnitude%20improvements%20in%20interaction%20fidelity.%20Our%20method%20surpasses%20baselines%20by%204-15x%20in%20text%20consistency%20and%203-7x%20in%203D%20model%20quality%2C%20exhibiting%20strong%20generalization%20to%20diverse%20categories%20and%20interaction%20types%2C%20while%20maintaining%20high-quality%203D%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12126v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHoi3DGen%253A%2520Generating%2520High-Quality%2520Human-Object-Interactions%2520in%25203D%26entry.906535625%3DAgniv%2520Sharma%2520and%2520Xianghui%2520Xie%2520and%2520Tom%2520Fischer%2520and%2520Eddy%2520Ilg%2520and%2520Gerard%2520Pons-Moll%26entry.1292438233%3DModeling%2520and%2520generating%25203D%2520human-object%2520interactions%2520from%2520text%2520is%2520crucial%2520for%2520applications%2520in%2520AR%252C%2520XR%252C%2520and%2520gaming.%2520Existing%2520approaches%2520often%2520rely%2520on%2520score%2520distillation%2520from%2520text-to-image%2520models%252C%2520but%2520their%2520results%2520suffer%2520from%2520the%2520Janus%2520problem%2520and%2520do%2520not%2520follow%2520text%2520prompts%2520faithfully%2520due%2520to%2520the%2520scarcity%2520of%2520high-quality%2520interaction%2520data.%2520We%2520introduce%2520Hoi3DGen%252C%2520a%2520framework%2520that%2520generates%2520high-quality%2520textured%2520meshes%2520of%2520human-object%2520interaction%2520that%2520follow%2520the%2520input%2520interaction%2520descriptions%2520precisely.%2520We%2520first%2520curate%2520realistic%2520and%2520high-quality%2520interaction%2520data%2520leveraging%2520multimodal%2520large%2520language%2520models%252C%2520and%2520then%2520create%2520a%2520full%2520text-to-3D%2520pipeline%252C%2520which%2520achieves%2520orders-of-magnitude%2520improvements%2520in%2520interaction%2520fidelity.%2520Our%2520method%2520surpasses%2520baselines%2520by%25204-15x%2520in%2520text%2520consistency%2520and%25203-7x%2520in%25203D%2520model%2520quality%252C%2520exhibiting%2520strong%2520generalization%2520to%2520diverse%2520categories%2520and%2520interaction%2520types%252C%2520while%2520maintaining%2520high-quality%25203D%2520generation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.12126v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Hoi3DGen%3A%20Generating%20High-Quality%20Human-Object-Interactions%20in%203D&entry.906535625=Agniv%20Sharma%20and%20Xianghui%20Xie%20and%20Tom%20Fischer%20and%20Eddy%20Ilg%20and%20Gerard%20Pons-Moll&entry.1292438233=Modeling%20and%20generating%203D%20human-object%20interactions%20from%20text%20is%20crucial%20for%20applications%20in%20AR%2C%20XR%2C%20and%20gaming.%20Existing%20approaches%20often%20rely%20on%20score%20distillation%20from%20text-to-image%20models%2C%20but%20their%20results%20suffer%20from%20the%20Janus%20problem%20and%20do%20not%20follow%20text%20prompts%20faithfully%20due%20to%20the%20scarcity%20of%20high-quality%20interaction%20data.%20We%20introduce%20Hoi3DGen%2C%20a%20framework%20that%20generates%20high-quality%20textured%20meshes%20of%20human-object%20interaction%20that%20follow%20the%20input%20interaction%20descriptions%20precisely.%20We%20first%20curate%20realistic%20and%20high-quality%20interaction%20data%20leveraging%20multimodal%20large%20language%20models%2C%20and%20then%20create%20a%20full%20text-to-3D%20pipeline%2C%20which%20achieves%20orders-of-magnitude%20improvements%20in%20interaction%20fidelity.%20Our%20method%20surpasses%20baselines%20by%204-15x%20in%20text%20consistency%20and%203-7x%20in%203D%20model%20quality%2C%20exhibiting%20strong%20generalization%20to%20diverse%20categories%20and%20interaction%20types%2C%20while%20maintaining%20high-quality%203D%20generation.&entry.1838667208=http%3A//arxiv.org/abs/2603.12126v1&entry.124074799=Read"},
{"title": "Think with 3D: Geometric Imagination Grounded Spatial Reasoning from Limited Views", "author": "Zhangquan Chen and Manyuan Zhang and Xinlei Yu and Xufang Luo and Mingze Sun and Zihao Pan and Xiang An and Yan Feng and Peng Pei and Xunliang Cai and Ruqi Huang", "abstract": "Though recent advances in vision-language models (VLMs) have achieved remarkable progress across a wide range of multimodal tasks, understanding 3D spatial relationships from limited views remains a significant challenge. Previous reasoning methods typically rely on pure text (e.g., topological cognitive maps) or on 2D visual cues. However, their limited representational capacity hinders performance in specific tasks that require 3D spatial imagination. To address this limitation, we propose 3DThinker, a framework that can effectively exploits the rich geometric information embedded within images while reasoning, like humans do. Our framework is the first to enable 3D mentaling during reasoning without any 3D prior input, and it does not rely on explicitly labeled 3D data for training. Specifically, our training consists of two stages. First, we perform supervised training to align the 3D latent generated by VLM while reasoning with that of a 3D foundation model (e.g., VGGT). Then, we optimize the entire reasoning trajectory solely based on outcome signals, thereby refining the underlying 3D mentaling. Extensive experiments across multiple benchmarks show that 3DThinker consistently outperforms strong baselines and offers a new perspective toward unifying 3D representations into multimodal reasoning. Our code is available at https://github.com/zhangquanchen/3DThinker.", "link": "http://arxiv.org/abs/2510.18632v3", "date": "2026-03-12", "relevancy": 3.1138, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6275}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6275}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6132}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Think%20with%203D%3A%20Geometric%20Imagination%20Grounded%20Spatial%20Reasoning%20from%20Limited%20Views&body=Title%3A%20Think%20with%203D%3A%20Geometric%20Imagination%20Grounded%20Spatial%20Reasoning%20from%20Limited%20Views%0AAuthor%3A%20Zhangquan%20Chen%20and%20Manyuan%20Zhang%20and%20Xinlei%20Yu%20and%20Xufang%20Luo%20and%20Mingze%20Sun%20and%20Zihao%20Pan%20and%20Xiang%20An%20and%20Yan%20Feng%20and%20Peng%20Pei%20and%20Xunliang%20Cai%20and%20Ruqi%20Huang%0AAbstract%3A%20Though%20recent%20advances%20in%20vision-language%20models%20%28VLMs%29%20have%20achieved%20remarkable%20progress%20across%20a%20wide%20range%20of%20multimodal%20tasks%2C%20understanding%203D%20spatial%20relationships%20from%20limited%20views%20remains%20a%20significant%20challenge.%20Previous%20reasoning%20methods%20typically%20rely%20on%20pure%20text%20%28e.g.%2C%20topological%20cognitive%20maps%29%20or%20on%202D%20visual%20cues.%20However%2C%20their%20limited%20representational%20capacity%20hinders%20performance%20in%20specific%20tasks%20that%20require%203D%20spatial%20imagination.%20To%20address%20this%20limitation%2C%20we%20propose%203DThinker%2C%20a%20framework%20that%20can%20effectively%20exploits%20the%20rich%20geometric%20information%20embedded%20within%20images%20while%20reasoning%2C%20like%20humans%20do.%20Our%20framework%20is%20the%20first%20to%20enable%203D%20mentaling%20during%20reasoning%20without%20any%203D%20prior%20input%2C%20and%20it%20does%20not%20rely%20on%20explicitly%20labeled%203D%20data%20for%20training.%20Specifically%2C%20our%20training%20consists%20of%20two%20stages.%20First%2C%20we%20perform%20supervised%20training%20to%20align%20the%203D%20latent%20generated%20by%20VLM%20while%20reasoning%20with%20that%20of%20a%203D%20foundation%20model%20%28e.g.%2C%20VGGT%29.%20Then%2C%20we%20optimize%20the%20entire%20reasoning%20trajectory%20solely%20based%20on%20outcome%20signals%2C%20thereby%20refining%20the%20underlying%203D%20mentaling.%20Extensive%20experiments%20across%20multiple%20benchmarks%20show%20that%203DThinker%20consistently%20outperforms%20strong%20baselines%20and%20offers%20a%20new%20perspective%20toward%20unifying%203D%20representations%20into%20multimodal%20reasoning.%20Our%20code%20is%20available%20at%20https%3A//github.com/zhangquanchen/3DThinker.%0ALink%3A%20http%3A//arxiv.org/abs/2510.18632v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThink%2520with%25203D%253A%2520Geometric%2520Imagination%2520Grounded%2520Spatial%2520Reasoning%2520from%2520Limited%2520Views%26entry.906535625%3DZhangquan%2520Chen%2520and%2520Manyuan%2520Zhang%2520and%2520Xinlei%2520Yu%2520and%2520Xufang%2520Luo%2520and%2520Mingze%2520Sun%2520and%2520Zihao%2520Pan%2520and%2520Xiang%2520An%2520and%2520Yan%2520Feng%2520and%2520Peng%2520Pei%2520and%2520Xunliang%2520Cai%2520and%2520Ruqi%2520Huang%26entry.1292438233%3DThough%2520recent%2520advances%2520in%2520vision-language%2520models%2520%2528VLMs%2529%2520have%2520achieved%2520remarkable%2520progress%2520across%2520a%2520wide%2520range%2520of%2520multimodal%2520tasks%252C%2520understanding%25203D%2520spatial%2520relationships%2520from%2520limited%2520views%2520remains%2520a%2520significant%2520challenge.%2520Previous%2520reasoning%2520methods%2520typically%2520rely%2520on%2520pure%2520text%2520%2528e.g.%252C%2520topological%2520cognitive%2520maps%2529%2520or%2520on%25202D%2520visual%2520cues.%2520However%252C%2520their%2520limited%2520representational%2520capacity%2520hinders%2520performance%2520in%2520specific%2520tasks%2520that%2520require%25203D%2520spatial%2520imagination.%2520To%2520address%2520this%2 {"title": "AstroSplat: Physics-Based Gaussian Splatting for Rendering and Reconstruction of Small Celestial Bodies", "author": "Jennifer Nolan and Travis Driver and John Christian", "abstract": "Image-based surface reconstruction and characterization are crucial for missions to small celestial bodies (e.g., asteroids), as it informs mission planning, navigation, and scientific analysis. Recent advances in Gaussian splatting enable high-fidelity neural scene representations but typically rely on a spherical harmonic intensity parameterization that is strictly appearance-based and does not explicitly model material properties or light-surface interactions. We introduce AstroSplat, a physics-based Gaussian splatting framework that integrates planetary reflectance models to improve the autonomous reconstruction and photometric characterization of small-body surfaces from in-situ imagery. The proposed framework is validated on real imagery taken by NASA's Dawn mission, where we demonstrate superior rendering performance and surface reconstruction accuracy compared to the typical spherical harmonic parameterization.", "link": "http://arxiv.org/abs/2603.11969v1", "date": "2026-03-12", "relevancy": 3.0992, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6364}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6205}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.6027}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AstroSplat%3A%20Physics-Based%20Gaussian%20Splatting%20for%20Rendering%20and%20Reconstruction%20of%20Small%20Celestial%20Bodies&body=Title%3A%20AstroSplat%3A%20Physics-Based%20Gaussian%20Splatting%20for%20Rendering%20and%20Reconstruction%20of%20Small%20Celestial%20Bodies%0AAuthor%3A%20Jennifer%20Nolan%20and%20Travis%20Driver%20and%20John%20Christian%0AAbstract%3A%20Image-based%20surface%20reconstruction%20and%20characterization%20are%20crucial%20for%20missions%20to%20small%20celestial%20bodies%20%28e.g.%2C%20asteroids%29%2C%20as%20it%20informs%20mission%20planning%2C%20navigation%2C%20and%20scientific%20analysis.%20Recent%20advances%20in%20Gaussian%20splatting%20enable%20high-fidelity%20neural%20scene%20representations%20but%20typically%20rely%20on%20a%20spherical%20harmonic%20intensity%20parameterization%20that%20is%20strictly%20appearance-based%20and%20does%20not%20explicitly%20model%20material%20properties%20or%20light-surface%20interactions.%20We%20introduce%20AstroSplat%2C%20a%20physics-based%20Gaussian%20splatting%20framework%20that%20integrates%20planetary%20reflectance%20models%20to%20improve%20the%20autonomous%20reconstruction%20and%20photometric%20characterization%20of%20small-body%20surfaces%20from%20in-situ%20imagery.%20The%20proposed%20framework%20is%20validated%20on%20real%20imagery%20taken%20by%20NASA%27s%20Dawn%20mission%2C%20where%20we%20demonstrate%20superior%20rendering%20performance%20and%20surface%20reconstruction%20accuracy%20compared%20to%20the%20typical%20spherical%20harmonic%20parameterization.%0ALink%3A%20http%3A//arxiv.org/abs/2603.11969v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAstroSplat%253A%2520Physics-Based%2520Gaussian%2520Splatting%2520for%2520Rendering%2520and%2520Reconstruction%2520of%2520Small%2520Celestial%2520Bodies%26entry.906535625%3DJennifer%2520Nolan%2520and%2520Travis%2520Driver%2520and%2520John%2520Christian%26entry.1292438233%3DImage-based%2520surface%2520reconstruction%2520and%2520characterization%2520are%2520crucial%2520for%2520missions%2520to%2520small%2520celestial%2520bodies%2520%2528e.g.%252C%2520asteroids%2529%252C%2520as%2520it%2520informs%2520mission%2520planning% {"title": "HumDex:Humanoid Dexterous Manipulation Made Easy", "author": "Liang Heng and Yihe Tang and Jiajun Xu and Henghui Bao and Di Huang and Yue Wang", "abstract": "This paper investigates humanoid whole-body dexterous manipulation, where the efficient collection of high-quality demonstration data remains a central bottleneck.\n  Existing teleoperation systems often suffer from limited portability, occlusion, or insufficient precision, which hinders their applicability to complex whole-body tasks. To address these challenges, we introduce HumDex, a portable teleoperation system designed for humanoid whole-body dexterous manipulation. Our system leverages IMU-based motion tracking to address the portability-precision trade-off, enabling accurate full-body tracking while remaining easy to deploy. For dexterous hand control, we further introduce a learning-based retargeting method that generates smooth and natural hand motions without manual parameter tuning. Beyond teleoperation, HumDex enables efficient collection of human motion data. Building on this capability, we propose a two-stage imitation learning framework that first pre-trains on diverse human motion data to learn generalizable priors, and then fine-tunes on robot data to bridge the embodiment gap for precise execution. We demonstrate that this approach significantly improves generalization to new configurations, objects, and backgrounds with minimal data acquisition costs. The entire system is fully reproducible and open-sourced at https://github.com/physical-superintelligence-lab/HumDex.", "link": "http://arxiv.org/abs/2603.12260v1", "date": "2026-03-12", "relevancy": 3.0737, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6533}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6358}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", {"title": "ZeroSense:How Vision matters in Long Context Compression", "author": "Yonghan Gao and Zehong Chen and Lijian Xu and Jingzhi Chen and Jingwei Guan and Xingyu Zeng", "abstract": "Recent visual-text compression (VTC) methods, typified by DeepSeek-OCR, report impressive high token compression ratios for long-context modeling tasks by leveraging text-to-image rendering. However, existing evaluation protocols heavily rely on downstream task performance. Such evaluation metrics fail to accurately measure text preservation due to the strong inherent linguistic priors of Multimodal Large Language Models (MLLMs). In this work, we introduce a new evaluation framework that decouples MLLMs' capabilities to faithfully assess VTC quality. Within this framework, we further introduce the ZeroSense Benchmark to ensure low semantic correlation of testing samples. By eliminating contextual dependencies, our benchmark guarantees that the evaluation results are purely reflective of VTC quality, unaffected by the semantic inference capabilities of downstream models. Extensive experiments across multiple datasets demonstrate that VTC quality and downstream task accuracy diverge significantly, highlighting the necessity of our decoupled evaluation framework.", "link": "http://arxiv.org/abs/2603.11846v1", "date": "2026-03-12", "relevancy": 2.9891, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6356}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6356}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5223}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ZeroSense%3AHow%20Vision%20matters%20in%20Long%20Context%20Compression&body=Title%3A%20ZeroSense%3AHow%20Vision%20matters%20in%20Long%20Context%20Compression%0AAuthor%3A%20Yonghan%20Gao%20and%20Zehong%20Chen%20and%20Lijian%20Xu%20and%20Jingzhi%20Chen%20and%20Jingwei%20Guan%20and%20Xingyu%20Zeng%0AAbstract%3A%20Recent%20visual-text%20compression%20%28VTC%29%20methods%2C%20typified%20by%20DeepSeek-OCR%2C%20report%20impressive%20high%20token%20compression%20ratios%20for%20long-context%20modeling%20tasks%20by%20leveraging%20text-to-image%20rendering.%20However%2C%20existing%20evaluation%20protocols%20heavily%20rely%20on%20downstream%20task%20performance.%20Such%20evaluation%20metrics%20fail%20to%20accurately%20measure%20text%20preservation%20due%20to%20the%20strong%20inherent%20linguistic%20priors%20of%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29.%20In%20this%20work%2C%20we%20introduce%20a%20new%20evaluation%20framework%20that%20decouples%20MLLMs%27%20capabilities%20to%20faithfully%20assess%20VTC%20quality.%20Within%20this%20framework%2C%20we%20further%20introduce%20the%20ZeroSense%20Benchmark%20to%20ensure%20low%20semantic%20correlation%20of%20testing%20samples.%20By%20eliminating%20contextual%20dependencies%2C%20our%20benchmark%20guarantees%20that%20the%20evaluation%20results%20are%20purely%20reflective%20of%20VTC%20quality%2C%20unaffected%20by%20the%20semantic%20inference%20capabilities%20of%20downstream%20models.%20Extensive%20experiments%20across%20multiple%20datasets%20demonstrate%20that%20VTC%20quality%20and%20downstream%20task%20accuracy%20diverge%20significantly%2C%20highlighting%20the%20necessity%20of%20our%20decoupled%20evaluation%20framework.%0ALink%3A%20http%3A//arxiv.org/abs/2603.11846v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DZeroSense%253AHow%2520Vision%2520matters%2520in%2520Long%2520Context%2520Compression%26entry.906535625%3DYonghan%2520Gao%2520and%2520Zehong%2520Chen%2520and%2520Lijian%2520Xu%2520and%2520Jingzhi%2520Chen%2520and%2520Jingwei%2520Guan% pression&entry.906535625=Yonghan%20Gao%20and%20Zehong%20Chen%20and%20Lijian%20Xu%20and%20Jingzhi%20Chen%20and%20Jingwei%20Guan%20and%20Xingyu%20Zeng&entry.1292438233=Recent%20visual-text%20compression%20%28VTC%29%20methods%2C%20typified%20by%20DeepSeek-OCR%2C%20report%20impressive%20high%20token%20compression%20ratios%20for%20long-context%20modeling%20tasks%20by%20leveraging%20text-to-image%20rendering.%20However%2C%20existing%20evaluation%20protocols%20heavily%20rely%20on%20downstream%20task%20performance.%20Such%20evaluation%20metrics%20fail%20to%20accurately%20measure%20text%20preservation%20due%20to%20the%20strong%20inherent%20linguistic%20priors%20of%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29.%20In%20this%20work%2C%20we%20introduce%20a%20new%20evaluation%20framework%20that%20decouples%20MLLMs%27%20capabilities%20to%20faithfully%20assess%20VTC%20quality.%20Within%20this%20framework%2C%20we%20further%20introduce%20the%20ZeroSense%20Benchmark%20to%20ensure%20low%20semantic%20correlation%20of%20testing%20samples.%20By%20eliminating%20contextual%20dependencies%2C%20our%20benchmark%20guarantees%20that%20the%20evaluation%20results%20are%20purely%20reflective%20of%20VTC%20quality%2C%20unaffected%20by%20the%20semantic%20inference%20capabilities%20of%20downstream%20models.%20Extensive%20experiments%20across%20multiple%20datasets%20demonstrate%20that%20VTC%20quality%20and%20downstream%20task%20accuracy%20diverge%20significantly%2C%20highlighting%20the%20necessity%20of%20our%20decoupled%20evaluation%20framework.&entry.1838667208=http%3A//arxiv.org/abs/2603.11846v1&entry.124074799=Read"},
{"title": "FastLightGen: Fast and Light Video Generation with Fewer Steps and Parameters", "author": "Shitong Shao and Yufei Gu and Zeke Xie", "abstract": "The recent advent of powerful video generation models, such as Hunyuan, WanX, Veo3, and Kling, has inaugurated a new era in the field. However, the practical deployment of these models is severely impeded by their substantial computational overhead, which stems from enormous parameter counts and the iterative, multi-step sampling process required during inference. Prior research on accelerating generative models has predominantly followed two distinct trajectories: reducing the number of sampling steps (e.g., LCM, DMD, and MagicDistillation) or compressing the model size for more efficient inference (e.g., ICMD). The potential of simultaneously compressing both to create a fast and lightweight model remains an unexplored avenue. In this paper, we propose FastLightGen, an algorithm that transforms large, computationally expensive models into fast, lightweight counterparts. The core idea is to construct an optimal teacher model, one engineered to maximize student performance, within a synergistic framework for distilling both model size and inference steps. Our extensive experiments on HunyuanVideo-ATI2V and WanX-TI2V reveal that a generator using 4-step sampling and 30\\% parameter pruning achieves optimal visual quality under a constrained inference budget. Furthermore, FastLightGen consistently outperforms all competing methods, establishing a new state-of-the-art in efficient video generation.", "link": "http://arxiv.org/abs/2603.01685v3", "date": "2026-03-12", "relevancy": 2.9882, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.603}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5996}, {"title": "Genie: Generative Interactive Enviro {"title": "High-Fidelity Medical Shape Generation via Skeletal Latent Diffusion", "author": "Guoqing Zhang and Jingyun Yang and Siqi Chen and Anping Zhang and Yang Li", "abstract": "Anatomy shape modeling is a fundamental problem in medical data analysis. However, the geometric complexity and topological variability of anatomical structures pose significant challenges to accurate anatomical shape generation. In this work, we propose a skeletal latent diffusion framework that explicitly incorporates structural priors for efficient and high-fidelity medical shape generation. We introduce a shape auto-encoder in which the encoder captures global geometric information through a differentiable skeletonization module and aggregates local surface features into shape latents, while the decoder predicts the corresponding implicit fields over sparsely sampled coordinates. New shapes are generated via a latent-space diffusion model, followed by neural implicit decoding and mesh extraction. To address the limited availability of medical shape data, we construct a large-scale dataset, \\textit{MedSDF}, comprising surface point clouds and corresponding signed distance fields across multiple anatomical categories. Extensive experiments on MedSDF and vessel datasets demonstrate that the proposed method achieves superior reconstruction and generation quality while maintaining a higher computational efficiency compared with existing approaches. Code is available at: https://github.com/wlsdzyzl/meshage.", "link": "http://arxiv.org/abs/2603.07504v3", "date": "2026-03-12", "relevancy": 2.9609, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6155}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5873}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link" {"title": "JOPP-3D: Joint Open Vocabulary Semantic Segmentation on Point Clouds and Panoramas", "author": "Sandeep Inuganti and Hideaki Kanayama and Kanta Shimizu and Mahdi Chamseddine and Soichiro Yokota and Didier Stricker and Jason Rambach", "abstract": "Semantic segmentation across visual modalities such as 3D point clouds and panoramic images remains a challenging task, primarily due to the scarcity of annotated data and the limited adaptability of fixed-label models. In this paper, we present JOPP-3D, an open-vocabulary semantic segmentation framework that jointly leverages panoramic and point cloud data to enable language-driven scene understanding. We convert RGB-D panoramic images into their corresponding tangential perspective images and 3D point clouds, then use these modalities to extract and align foundational vision-language features. This allows natural language querying to generate semantic masks on both input modalities. Experimental evaluation on the Stanford-2D-3D-s and ToF-360 datasets demonstrates the capability of JOPP-3D to produce coherent and semantically meaningful segmentations across panoramic and 3D domains. Our proposed method achieves a significant improvement compared to the SOTA in open and closed vocabulary 2D and 3D semantic segmentation.", "link": "http://arxiv.org/abs/2603.06168v2", "date": "2026-03-12", "relevancy": 2.918, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5985}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5985}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5538}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20JOPP-3D%3A%20Joint%20Open%20Vocabulary%20Sema om/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=JOPP-3D%3A%20Joint%20Open%20Vocabulary%20Semantic%20Segmentation%20on%20Point%20Clouds%20and%20Panoramas&entry.906535625=Sandeep%20Inuganti%20and%20Hideaki%20Kanayama%20and%20Kanta%20Shimizu%20and%20Mahdi%20Chamseddine%20and%20Soichiro%20Yokota%20and%20Didier%20Stricker%20and%20Jason%20Rambach&entry.1292438233=Semantic%20segmentation%20across%20visual%20modalities%20such%20as%203D%20point%20clouds%20and%20panoramic%20images%20remains%20a%20challenging%20task%2C%20primarily%20due%20to%20the%20scarcity%20of%20annotated%20data%20and%20the%20limited%20adaptability%20of%20fixed-label%20models.%20In%20this%20paper%2C%20we%20present%20JOPP-3D%2C%20an%20open-vocabulary%20semantic%20segmentation%20framework%20that%20jointly%20leverages%20panoramic%20and%20point%20cloud%20data%20to%20enable%20language-driven%20scene%20understanding.%20We%20convert%20RGB-D%20panoramic%20images%20into%20their%20corresponding%20tangential%20perspective%20images%20and%203D%20point%20clouds%2C%20then%20use%20these%20modalities%20to%20extract%20and%20align%20foundational%20vision-language%20features.%20This%20allows%20natural%20language%20querying%20to%20generate%20semantic%20masks%20on%20both%20input%20modalities.%20Experimental%20evaluation%20on%20the%20Stanford-2D-3D-s%20and%20ToF-360%20datasets%20demonstrates%20the%20capability%20of%20JOPP-3D%20to%20produce%20coherent%20and%20semantically%20meaningful%20segmentations%20across%20panoramic%20and%203D%20domains.%20Our%20proposed%20method%20achieves%20a%20significant%20improvement%20compared%20to%20the%20SOTA%20in%20open%20and%20closed%20vocabulary%202D%20and%203D%20semantic%20segmentation.&entry.1838667208=http%3A//arxiv.org/abs/2603.06168v2&entry.124074799=Read"},
{"title": "CEI-3D: Collaborative Explicit-Implicit 3D Reconstruction for Realistic and Fine-Grained Object Editing", "author": "Yue Shi and Rui Shi and Yuxuan Xiong and Bingbing Ni and Wenjun Zhang", "abstract": "Existing 3D editing methods often produce unrealistic and unrefined results due to the deeply integrated nature of their reconstruction networks. To address the challenge, this paper introduces CEI-3D, an editing-oriented reconstruction pipeline designed to facilitate realistic and fine-grained editing. Specifically, we propose a collaborative explicit-implicit reconstruction approach, which represents the target object using an implicit SDF network and a differentially sampled, locally controllable set of handler points. The implicit network provides a smooth and continuous geometry prior, while the explicit handler points offer localized control, enabling mutual guidance between the global 3D structure and user-specified local editing regions. To independently control each attribute of the handler points, we design a physical properties disentangling module to decouple the color of the handler points into separate physical properties. We also propose a dual-diffuse-albedo network in this module to process the edited and non-edited regions through separate branches, thereby preventing undesired interference from editing operations. Building on the reconstructed collaborative explicit-implicit representation with disentangled properties, we introduce a spatial-aware editing module that enables part-wise adjustment of relevant handler points. This module employs a cross-view propagation-based 3D segmentation strategy, which helps users to edit the specified physical attributes of a target part efficiently. Extensive experiments on both real and synthetic datasets demonstrate that our approach achieves more realistic and fine-grained editing results than the state-of-the-art (SOTA) methods while requiring less editing time. Our code is available on https://github.com/shiyue001/CEI-3D.", "link": "http://arxiv.org/abs/2603.11810v1", "date": "2026-03-12", "relevancy": 2.8995, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5899}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5757}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5741}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CEI-3D%3A%20Collaborative%20Explicit-Implicit%203D%20Reconstruction%20for%20Realistic%20and%20Fine-Grained%20Object%20Editing&body=Title%3A%20CEI-3D%3A%20Collaborative%20Explicit-Implicit%203D%20Reconstruction%20for%20Realistic%20and%20Fine-Grained%20Object%20Editing%0AAuthor%3A%20Yue%20Shi%20and%20Rui%20Shi%20and%20Yuxuan%20Xiong%20and%20Bingbing%20Ni%20and%20Wenjun%20Zhang%0AAbstract%3A%20Existing%203D%20editing%20methods%20often%20produce%20unrealistic%20and%20unrefined%20results%20due%20to%20the%20deeply%20integrated%20nature%20of%20their%20reconstruction%20networks.%20To%20address%20the%20challenge%2C%20this%20paper%20introduces%20CEI-3D%2C%20an%20editing-oriented%20reconstruction%20pipeline%20designed%20to%20facilitate%20realistic%20and%20fine-grained%20editing.%20Specifically%2C%20we%20propose%20a%20collaborative%20explicit-implicit%20reconstruction%20approach%2C%20which%20represents%20the%20target%20object%20using%20an%20implicit%20SDF%20network%20and%20a%20differentially%20sampled%2C%20locally%20controllable%20set%20of%20handler%20points.%20The%20implicit%20network%20provides%20a%20smooth%20and%20continuous%20geometry%20prior%2C%20while%20the%20explicit%20handler%20points%20offer%20localized%20control%2C%20enabling%20mutual%20guidance%20between%20the%20global%203D%20structure%20and%20user-specified%20local%20editing%20regions.%20To%20independently%20control%20each%20attribute%20of%20the%20handler%20points%2C%20we%20design%20a%20physical%20properties%20disentangling%20module%20to%20decouple%20the%20color%20of%20the%20handler%20points%20into%20separate%20physical%20properties.%20We%20also%20propose%20a%20dual-diffuse-albedo%20network%20in%20this%20module%20to%20process%20the%20edited%20and%20non-edited%20regions%20through%20separate%20branches%2C%20thereby%20preventing%20undesired%20interference%20from%20editing%20operations.%20Building%20on%20the%20reconstructed%20collaborative%20explicit-implicit%20representation%20with%20disentangled%20properties%2C%20we%20introduce%20a%20spatial-aware%20editing%20module%20that%20enables%20part-wise%20adjustment%20of%20relevant%20handler%20points.%20This%20module%20employs%20a%20cross-view%20propagation-based%203D%20segmentation%20strategy%2C%20which%20helps%20users%20to%20edit%20the%20specified%20physical%20attributes%20of%20a%20target%20part%20efficiently.%20Extensive%20experiments%20on%20both%20real%20and%20synthetic%20datasets%20demonstrate%20that%20our%20approach%20achieves%20more%20realistic%20and%20fine-grained%20editing%20results%20than%20the%20state-of-the-art%20%28SOTA%29%20methods%20while%20requiring%20less%20editing%20time.%20Our%20code%20is%20available%20on%20https%3A//github.com/shiyue001/CEI-3D.%0ALink%3A%20http%3A//arxiv.org/abs/2603.11810v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCEI-3D%253A%2520Collaborative%2520Explicit-Implicit%25203D%2520Reconstruction%2520for%2520Realistic%2520and%2520Fine-Grained%2520Object%2520Editing%26entry.906535625%3DYue%2520Shi%2520and%2520Rui%2520Shi%2520and%2520Yuxuan%2520Xiong%2520and%2520Bingbing%2520Ni%2520and%2520Wenjun%2520Zhang%26entry.1292438233%3DExisting%25203D%2520editing%2520methods%2520often%2520produce%2520unrealistic%2520and%2520unrefined%2520results%2520due%2520to%2520the%252 {"title": "Paper Title: LoV3D: Grounding Cognitive Prognosis Reasoning in Longitudinal 3D Brain MRI via Regional Volume Assessments", "author": "Zhaoyang Jiang and Zhizhong Fu and David McAllister and Yunsoo Kim and Honghan Wu", "abstract": "Longitudinal brain MRI is essential for characterizing the progression of neurological diseases such as Alzheimer's disease assessment. However, current deep-learning tools fragment this process: classifiers reduce a scan to a label, volumetric pipelines produce uninterpreted measurements, and vision-language models (VLMs) may generate fluent but potentially hallucinated conclusions. We present LoV3D, a pipeline for training 3D vision-language models, which reads longitudinal T1-weighted brain MRI, produces a region-level anatomical assessment, conducts longitudinal comparison with the prior scan, and finally outputs a three-class diagnosis (Cognitively Normal, Mild Cognitive Impairment, or Dementia) along with a synthesized diagnostic summary. The stepped pipeline grounds the final diagnosis by enforcing label consistency, longitudinal coherence, and biological plausibility, thereby reducing the risks of hallucinations. The training process introduces a clinically-weighted Verifier that scores candidate outputs automatically against normative references derived from standardized volume metrics, driving Direct Preference Optimization without a single human annotation. On a subject-level held-out ADNI test set (479 scans, 258 subjects), LoV3D achieves 93.7% three-class diagnostic accuracy (+34.8% over the no-grounding baseline), 97.2% on two-class diagnosis accuracy (+4% over the SOTA) and 82.6% region-level anatomical classification accuracy (+33.1% over VLM baselines). Zero-shot transfer yields 95.4% on MIRIAD (100% Dementia recall) and 82.9% three-class accuracy on AIBL, confirming high generalizability across sites, scanners, and populations. Code is available at https://github.com/Anonymous-TEVC/LoV-3D.", "link": "http://arxiv.org/abs/2603.12071v1", "date": "2026-03-12", "relevancy": 2.8741, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.583}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.583}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5585}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Paper%20Title%3A%20LoV3D%3A%20Grounding%20Cognitive%20Prognosis%20Reasoning%20in%20Longitudinal%203D%20Brain%20MRI%20via%20Regional%20Volume%20Assessments&body=Title%3A%20Paper%20Title%3A%20LoV3D%3A%20Grounding%20Cognitive%20Prognosis%20Reasoning%20in%20Longitudinal%203D%20Brain%20MRI%20via%20Regional%20Volume%20Assessments%0AAuthor%3A%20Zhaoyang%20Jiang%20and%20Zhizhong%20Fu%20and%20David%20McAllister%20and%20Yunsoo%20Kim%20and%20Honghan%20Wu%0AAbstract%3A%20Longitudinal%20brain%20MRI%20is%20essential%20for%20characterizing%20the%20progression%20of%20neurological%20diseases%20such%20as%20Alzheimer%27s%20disease%20assessment.%20However%2C%20current%20deep-learning%20tools%20fragment%20this%20process%3A%20classifiers%20reduce%20a%20scan%20to%20a%20label%2C%20volumetric%20pipelines%20produce%20uninterpreted%20measurements%2C%20and%20vision-language%20models%20%28VLMs%29%20may%20generate%20fluent%20but%20potentially%20hallucinated%20conclusions.%20We%20present%20LoV3D%2C%20a%20pipeline%20for%20training%203D%20vision-language%20models%2C%20which%20reads%20longitudinal%20T1-weighted%20brain%20MRI%2C%20produces%20a%20region-level%20anatomical%20assessment%2C%20conducts%20longitudinal%20comparison%20with%20the%20prior%20scan%2C%20and%20finally%20outputs%20a%20three-class%20diagnosis%20%28Cognitively%20Normal%2C%20Mild%20Cognitive%20Impairment%2C%20or%20Dementia%29%20a {"title": "SIMSPINE: A Biomechanics-Aware Simulation Framework for 3D Spine Motion Annotation and Benchmarking", "author": "Muhammad Saif Ullah Khan and Didier Stricker", "abstract": "Modeling spinal motion is fundamental to understanding human biomechanics, yet remains underexplored in computer vision due to the spine's complex multi-joint kinematics and the lack of large-scale 3D annotations. We present a biomechanics-aware keypoint simulation framework that augments existing human pose datasets with anatomically consistent 3D spinal keypoints derived from musculoskeletal modeling. Using this framework, we create the first open dataset, named SIMSPINE, which provides sparse vertebra-level 3D spinal annotations for natural full-body motions in indoor multi-camera capture without external restraints. With 2.14 million frames, this enables data-driven learning of vertebral kinematics from subtle posture variations and bridges the gap between musculoskeletal simulation and computer vision. In addition, we release pretrained baselines covering fine-tuned 2D detectors, monocular 3D pose lifting models, and multi-view reconstruction pipelines, establishing a unified benchmark for biomechanically valid spine motion estimation. Specifically, our 2D spine baselines improve the state-of-the-art from 0.63 to 0.80 AUC in controlled environments, and from 0.91 to 0.93 AP for in-the-wild spine tracking. Together, the simulation framework and SIMSPINE dataset advance research in vision-based biomechanics, motion analysis, and digital human modeling by enabling reproducible, anatomically grounded 3D spine estimation under natural conditions.", "link": "http://arxiv.org/abs/2602.20792v3", "date": "2026-03-12", "relevancy": 2.8704, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.617}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.o ifically%2C%20our%202D%20spine%20baselines%20improve%20the%20state-of-the-art%20from%200.63%20to%200.80%20AUC%20in%20controlled%20environments%2C%20and%20from%200.91%20to%200.93%20AP%20for%20in-the-wild%20spine%20tracking.%20Together%2C%20the%20simulation%20framework%20and%20SIMSPINE%20dataset%20advance%20research%20in%20vision-based%20biomechanics%2C%20motion%20analysis%2C%20and%20digital%20human%20modeling%20by%20enabling%20reproducible%2C%20anatomically%20grounded%203D%20spine%20estimation%20under%20natural%20conditions.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20792v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSIMSPINE%253A%2520A%2520Biomechanics-Aware%2520Simulation%2520Framework%2520for%25203D%2520Spine%2520Motion%2520Annotation%2520and%2520Benchmarking%26entry.906535625%3DMuhammad%2520Saif%2520Ullah%2520Khan%2520and%2520Didier%2520Stricker%26entry.1292438233%3DModeling%2520spinal%2520motion%2520is%2520fundamental%2520to%2520understanding%2520human%2520biomechanics%252C%2520yet%2520remains%2520underexplored%2520in%2520computer%2520vision%2520due%2520to%2520the%2520spine%2527s%2520complex%2520multi-joint%2520kinematics%2520and%2520the%2520lack%2520of%2520large-scale%25203D%2520annotations.%2520We%2520present%2520a%2520biomechanics-aware%2520keypoint%2520simulation%2520framework%2520that%2520augments%2520existing%2520human%2520pose%2520datasets%2520with%2520anatomically%2520consistent%25203D%2520spinal%2520keypoints%2520derived%2520from%2520musculoskeletal%2520modeling.%2520Using%2520this%2520framework%252C%2520we%2520create%2520the%2520first%2520open%2520dataset%252C%2520named%2520SIMSPINE%252C%2520which%2520provides%2520sparse%2520vertebra-level%25203D%2520spinal%2520annotations%2520for%2520natural%2520full-body%2520motions%2520in%2520indoor%2520multi-camera%2520capture%2520without%2520external%2520restraints.%2520With%25202.14%2520million%2520frames%252C%2520this%2520en e%20keypoint%20simulation%20framework%20that%20augments%20existing%20human%20pose%20datasets%20with%20anatomically%20consistent%203D%20spinal%20keypoints%20derived%20from%20musculoskeletal%20modeling.%20Using%20this%20framework%2C%20we%20create%20the%20first%20open%20dataset%2C%20named%20SIMSPINE%2C%20which%20provides%20sparse%20vertebra-level%203D%20spinal%20annotations%20for%20natural%20full-body%20motions%20in%20indoor%20multi-camera%20capture%20without%20external%20restraints.%20With%202.14%20million%20frames%2C%20this%20enables%20data-driven%20learning%20of%20vertebral%20kinematics%20from%20subtle%20posture%20variations%20and%20bridges%20the%20gap%20between%20musculoskeletal%20simulation%20and%20computer%20vision.%20In%20addition%2C%20we%20release%20pretrained%20baselines%20covering%20fine-tuned%202D%20detectors%2C%20monocular%203D%20pose%20lifting%20models%2C%20and%20multi-view%20reconstruction%20pipelines%2C%20establishing%20a%20unified%20benchmark%20for%20biomechanically%20valid%20spine%20motion%20estimation.%20Specifically%2C%20our%202D%20spine%20baselines%20improve%20the%20state-of-the-art%20from%200.63%20to%200.80%20AUC%20in%20controlled%20environments%2C%20and%20from%200.91%20to%200.93%20AP%20for%20in-the-wild%20spine%20tracking.%20Together%2C%20the%20simulation%20framework%20and%20SIMSPINE%20dataset%20advance%20research%20in%20vision-based%20biomechanics%2C%20motion%20analysis%2C%20and%20digital%20human%20modeling%20by%20enabling%20reproducible%2C%20anatomically%20grounded%203D%20spine%20estimation%20under%20natural%20conditions.&entry.1838667208=http%3A//arxiv.org/abs/2602.20792v3&entry.124074799=Read"},
{"title": "SOTA: Self-adaptive Optimal Transport for Zero-Shot Classification with Multiple Foundation Models", "author": "Zhanxuan Hu and Qiyu Xu and Yu Duan and Yonghang Tai and Huafeng Li", "abstract": "Foundation models have attracted widespread attention across domains due to their powerful zero-shot classification capabilities. This work is motivated by two key observations: (1) \\textit{Vision-Language Models} (VLMs), such as CLIP, often over-rely on class-level textual priors and struggle to capture fine-grained visual cues, whereas \\textit{Vision-only Foundation Models} (VFMs), such as DINO, provide rich and discriminative visual features but lack semantic alignment; (2) the performance of different VLMs varies considerably across datasets owing to differences in pre-training. To address these challenges, we propose \\textbf{SOTA} (\\textit{Self-adaptive Optimal TrAnsport}), a \\textit{training-free} ensemble framework that integrates the outputs of multiple foundation models~(VFMs or VLMs) by learning a self-adaptive transport plan. Notably, \\textbf{SOTA} is prior-free and automatically balances model contributions. Extensive experiments across diverse domains, including natural images, medical pathology, and remote sensing, validate the generalizability of \\textbf{SOTA}. The results consistently show that it effectively leverages the complementary strengths of different foundation models and achieves substantial improvements over individual models. The implementation code is available at: https://github.com/Afleve/self-adaptive-Optimal-Transport.", "link": "http://arxiv.org/abs/2506.13723v3", "date": "2026-03-12", "relevancy": 2.8407, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5705}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.567}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.567}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SOTA%3A%20Self-adaptive%20Optimal%20Transport%20for%20Zero-Shot%20Classification%20with%20Multiple%20Foundation%20Models&body=Title%3A%20SOTA%3A%20Self-adaptive%20Optimal%20Transport%20for%20Zero-Shot%20Classification%20with%20Multiple%20Foundation%20Models%0AAuthor%3A%20Zhanxuan%20Hu%20and%20Qiyu%20Xu%20and%20Yu%20Duan%20and%20Yonghang%20Tai%20and%20Huafeng%20Li%0AAbstract%3A%20Foundation%20models%20have%20attracted%20widespread%20attention%20across%20domains%20due%20to%20their%20powerful%20zero-shot%20classification%20capabilities.%20This%20work%20is%20motivated%20by%20two%20key%20observations%3A%20%281%29%20%5Ctextit%7BVision-Language%20Models%7D%20%28VLMs%29%2C%20such%20as%20CLIP%2C%20often%20over-rely%20on%20class-level%20textual%20priors%20and%20struggle%20to%20capture%20fine-grained%20visual%20cues%2C%20whereas%20%5Ctextit%7BVision-only%20Foundation%20Models%7D%20%28VFMs%29%2C%20such%20as%20DINO%2C%20provide%20rich%20and%20discriminative%20visual%20features%20but%20lack%20semantic%20alignment%3B%20%282%29%20the%20performance%20of%20different%20VLMs%20varies%20considerably%20across%20datasets%20owing%20to%20differences%20in%20pre-training.%20To%20address%20these%20challenges%2C%20we%20propose%20%5Ctextbf%7BSOTA%7D%20%28%5Ctextit%7BSelf-adaptive%20Optimal%20TrAnsport%7D%29%2C%20a%20%5Ctextit%7Btraining-free%7D%20ensemble%20framework%20that%20integrates%20the%20outputs%20of%20multiple%20foundation%20models~%28VFMs%20or%20VLMs%29%20by%20learning%20a%20self-adaptive%20transport%20plan.%20Notably%2C%20%5Ctextbf%7BSOTA%7D%20is%20prior-free%20and%20automatically%20balances%20model%20contributions.%20Extensive%20experiments%20across%20diverse%20domains%2C%20including%20natural%20images%2C%20medical%20pathology%2C%20and%20remote%20sensing%2C%20validate%20the%20generalizability%20of%20%5Ctextbf%7BSOTA%7D.%20The%20results%20consistently%20show%20that%20it%20effectively%20leverages%20the%20complementary%20strengths%20of%20different%20foundation%20models%20and%20achieves%20substantial%20improvements%20over%20individual%20models.%20The%20implementation%20code%20is%20available%20at%3A%20https%3A//github.com/Afleve/self-adaptive-Optimal-Transport.%0ALink%3A%20http%3A//arxiv.org/abs/2506.13723v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSOTA%253A%2520Self-adaptive%2520Optimal%2520Transport%2520for%2520Zero-Shot%2520Classification%2520with%2520Multiple%2520Foundation%2520Models%26entry.906535625%3DZhanxuan%2520Hu%2520and%2520Qiyu%2520Xu%2520and%2520Yu%2520Duan%2520and%2520Yonghang%2520Tai%2520and%2520Huafeng%2520Li%26entry.1292438233%3DFoundation%2520models%2520have%2520attracted%2520widespread%2520attention%2520across%2520domains%2520due%2520to%2520their%2520powerful%2520zero-shot%2520classification%2520capabilities.%2520This%2520work%2520is%2520motivated%2520by%2520two%2520key%2520observations%253A%2520%25281%2529%2520%255Ctextit%257BVision-Language%2520Models%257D%2520%2528VLMs%2529%252C%2520such%2520as%2520CLIP%252C%2520often%2520over-rely%2520on%2520class-level%2520textual%2520priors%2520and%2520struggle%2520to%2520capture%2520fine-grained%2520visual%2520cues%252C%2520whereas%2520%255Ctextit%257BVision-only%2520Foundation%2520Models%257D%2520%2528VFMs%2529%252C%2520such%2520as%2520DINO%252C%2520provide%2520rich%2520and%2520discriminative%2520visual%2520features%2520but%2520lack%2520semantic%2520alignment%253B%2520%25282%2529%2520the%2520performance%2520of%2520different%2520VLMs%2520varies%2520considerably%2520across%2520datasets%2520owing%2520to%2520differences%2520in%2520pre-training.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520%255Ctextbf%257BSOTA%257D%2520%2528%255Ctextit%257BSelf-adaptive%2520Optimal%2520TrAnsport%257D%2529%252C%2520a%2520%255Ctextit%257Btraining-free%257D%2520ensemble%2520framework%2520that%2520integrates%2520the%2520outputs%2520of%2520multiple%2520foundation%2520models~%2528VFMs%2520or%2520VLMs%2529%2520by%2520learning%2520a%2520self-adaptive%2520transport%2520plan.%2520Notably%252C%2520%255Ctextbf%257BSOTA%257D%2520is%2520prior-free%2520and%2520automatically%2520balances%2520model%2520contributions.%2520Extensive%2520experiments%2520across%2520diverse%2520domains%252C%2520including%2520natural%2520images%252C%2520medical%2520pathology%252C%2520and%2520remote%2520sensing%252C%2520validate%2520the%2520generalizability%2520of%2520%255Ctextbf%257BSOTA%257D.%2520The%2520results%2520consistently%2520show%2520that%2520it%2520effectively%2520leverages%2520the%2520complementary%2520strengths%2520of%2520different%2520foundation%2520models%2520and%2520achieves%2520substantial%2520improvements%2520over%2520individual%2520models.%2520The%2520implementation%2520code%2520is%2520available%2520at%253A%2520https%253A//github.com/Afleve/self-adaptive-Optimal-Transport.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2506.13723v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SOTA%3A%20Self-adaptive%20Optimal%20Transport%20for%20Zero-Shot%20Classification%20with%20Multiple%20Foundation%20Models&entry.906535625=Zhanxuan%20Hu%20and%20Qiyu%20Xu%20and%20Yu%20Duan%20and%20Yonghang%20Tai%20and%20Huafeng%20Li&entry.1292438233=Foundation%20models%20have%20attracted%20widespread%20attention%20across%20domains%20due%20to%20their%20powerful%20zero-shot%20classification%20capabilities.%20This%20work%20is%20motivated%20by%20two%20key%20observations%3A%20%281%29%20%5Ctextit%7BVision-Language%20Models%7D%20%28VLMs%29%2C%20such%20as%20CLIP%2C%20often%20over-rely%20on%20class-level%20textual%20priors%20and%20struggle%20to%20capture%20fine-grained%20visual%20cues%2C%20whereas%20%5Ctextit%7BVision-only%20Foundation%20Models%7D%20%28VFMs%29%2C%20such%20as%20DINO%2C%20provide%20rich%20and%20discriminative%20visual%20features%20but%20lack%20semantic%20alignment%3B%20%282%29%20the%20performance%20of%20different%20VLMs%20varies%20considerably%20across%20datasets%20owing%20to%20differences%20in%20pre-training.%20To%20address%20these%20challenges%2C%20we%20propose%20%5Ctextbf%7BSOTA%7D%20%28%5Ctextit%7BSelf-adaptive%20Optimal%20TrAnsport%7D%29%2C%20a%20%5Ctextit%7Btraining-free%7D%20ensemble%20framework%20that%20integrates%20the%20outputs%20of%20multiple%20foundation%20models~%28VFMs%20or%20VLMs%29%20by%20learning%20a%20self-adaptive%20transport%20plan.%20Notably%2C%20%5Ctextbf%7BSOTA%7D%20is%20prior-free%20and%20automatically%20balances%20model%20contributions.%20Extensive%20experiments%20across%20diverse%20domains%2C%20including%20natural%20images%2C%20medical%20pathology%2C%20and%20remote%20sensing%2C%20validate%20the%20generalizability%20of%20%5Ctextbf%7BSOTA%7D.%20The%20results%20consistently%20show%20that%20it%20effectively%20leverages%20the%20complementary%20strengths%20of%20different%20foundation%20models%20and%20achieves%20substantial%20improvements%20over%20individual%20models.%20The%20implementation%20code%20is%20available%20at%3A%20https%3A//github.com/Afleve/self-adaptive-Optimal-Transport.&entry.1838667208=http%3A//arxiv.org/abs/2506.13723v3&entry.124074799=Read"},
{"title": "Evaluating Generative Models via One-Dimensional Code Distributions", "author": "Zexi Jia and Pengcheng Luo and Yijia Zhong and Jinchao Zhang and Jie Zhou", "abstract": "Most evaluations of generative models rely on feature-distribution metrics such as FID, which operate on continuous recognition features that are explicitly trained to be invariant to appearance variations, and thus discard cues critical for perceptual quality. We instead evaluate models in the space of discrete visual tokens, where modern 1D image tokenizers compactly encode both semantic and perceptual information and quality manifests as predictable token statistics. We introduce Codebook Histogram Distance (CHD), a training-free distribution metric in token space, and Code Mixture Model Score (CMMS), a no-reference quality metric learned from synthetic degradations of token sequences. To stress-test metrics under broad distribution shifts, we further propose VisForm, a benchmark of 210K images spanning 62 visual forms and 12 generative models with expert annotations. Across AGIQA, HPDv2/3, and VisForm, our token-based metrics achieve state-of-the-art correlation with human judgments. We will release all code and datasets to facilitate future research, with the code publicly available at https://github.com/zexiJia/1d-Distance.", "link": "http://arxiv.org/abs/2603.08064v2", "date": "2026-03-12", "relevancy": 2.8273, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5817}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5655}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5493}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Evaluating%20Generative%20Models%20via%20One-Dimensional%20Code%20Distributions&body=Title%3A%20Evaluating%20Generative%20Models%20via%20One-Dimensional%20Code%20Distributions%0AAuthor%3A%20Zexi%20Jia%20and%20Pengcheng%20Luo%20and%20Yijia%20Zhong%20and%20Jinchao%20Zhang%20and%20Jie%20Zhou%0AAbstract%3A%20Most%20evaluations%20of%20generative%20models%20rely%20on%20feature-distribution%20metrics%20such%20as%20FID%2C%20which%20operate%20on%20continuous%20recognition%20features%20that%20are%20explicitly%20trained%20to%20be%20invariant%20to%20appearance%20variations%2C%20and%20thus%20discard%20cues%20critical%20for%20perceptual%20quality.%20We%20instead%20evaluate%20models%20in%20the%20space%20of%20discrete%20visual%20tokens%2C%20where%20modern%201D%20image%20tokenizers%20compactly%20encode%20both%20semantic%20and%20perceptual%20information%20and%20quality%20manifests%20as%20predictable%20token%20statistics.%20We%20introduce%20Codebook%20Histogram%20Distance%20%28CHD%29%2C%20a%20training-free%20distribution%20metric%20in%20token%20space%2C%20and%20Code%20Mixture%20Model%20Score%20%28CMMS%29%2C%20a%20no-reference%20quality%20metric%20learned%20from%20synthetic%20degradations%20of%20token%20sequences.%20To%20stress-test%20metrics%20under%20broad%20distribution%20shifts%2C%20we%20further%20propose%20VisForm%2C%20a%20benchmark%20of%20210K%20images%20spanning%2062%20visual%20forms%20and%2012%20generative%20models%20with%20expert%20annotations.%20Across%20AGIQA%2C%20HPDv2/3%2C%20and%20VisForm%2C%20our%20token-based%20metrics%20achieve%20state-of-the-art%20correlation%20with%20human%20judgments.%20We%20will%20release%20all%20code%20and%20datasets%20to%20facilitate%20future%20research%2C%20with%20the%20code%20publicly%20available%20at%20https%3A//github.com/zexiJia/1d-Distance.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08064v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEvaluating%2520Generative%2520Models%2520via%2520One-Dimensional%2520Code%2520Distributions%26entry.906535625%3DZexi%2520Jia%2520and%2520Pengcheng%2520Luo%2520and%2520Yijia%2520Zhong%2520and%2520Jinchao%2520Zhang%2520and%2520Jie%2520Zhou%26entry.1292438233%3DMost%2520evaluations%2520of%2520generative%2520models%2520rely%2520on%2520feature-distribution%2520metrics%2520such%2520as%2520FID%252C%2520which%2520operate%2520on%2520continuous%2520recognition%2520features%2520that%2520are%2520explicitly%2520trained%2520to%2520be%2520invariant%2520to%2520appearance%2520variations%252C%2520and%2520thus%2520discard%2520cues%2520critical%2520for%2520perceptual%2520quality.%2520We%2520instead%2520evaluate%2520models%2520in%2520the%2520space%2520of%2520discrete%2520visual%2520tokens%252C%2520where%2520modern%25201D%2520image%2520tokenizers%2520compactly%2520encode%2520both%2520semantic%2520and%2520perceptual%2520information%2520and%2520quality%2520manifests%2520as%2520predictable%2520token%2520statistics.%2520We%2520introduce%2520Codebook%2520Histogram%2520Distance%2520%2528CHD%2529%252C%2520a%2520training-free%2520distribution%2520metric%2520in%2520token%2520space%252C%2520and%2520Code%2520Mixture%2520Model%2520Score%2520%2528CMMS%2529%252C%2520a%2520no-reference%2520quality%2520metric%2520learned%2520from%2520synthetic%2520degradations%2520of%2520token%2520sequences.%2520To%2520stress-test%2520metrics%2520under%2520broad%2520distribution%2520shifts%252C%2520we%2520further%2520propose%2520VisForm%252C%2520a%2520benchmark%2520of%2520210K%2520images%2520spanning%252062%2520visual%2520forms%2520and%252012%2520generative%2520models%2520with%2520expert%2520annotations.%2520Across%2520AGIQA%252C%2520HPDv2/3%252C%2520and%2520VisForm%252C%2520our%2520token-based%2520metrics%2520achieve%2520state-of-the-art%2520correlation%2520with%2520human%2520judgments.%2520We%2520will%2520release%2520all%2520code%2520and%2520datasets%2520to%2520facilitate%2520future%2520research%252C%2520with%2520the%2520code%2520publicly%2520available%2520at%2520https%253A//github.

{"title": "BehaviorVLM: Unified Finetuning-Free Behavioral Understanding with Vision-Language Reasoning", "author": "Jingyang Ke and Weihan Li and Amartya Pradhan and Jeffrey Markowitz and Anqi Wu", "abstract": "Understanding freely moving animal behavior is central to neuroscience, where pose estimation and behavioral understanding form the foundation for linking neural activity to natural actions. Yet both tasks still depend heavily on human annotation or unstable unsupervised pipelines, limiting scalability and reproducibility. We present BehaviorVLM, a unified vision-language framework for pose estimation and behavioral understanding that requires no task-specific finetuning and minimal human labeling by guiding pretrained Vision-Language Models (VLMs) through detailed, explicit, and verifiable reasoning steps. For pose estimation, we leverage quantum-dot-grounded behavioral data and propose a multi-stage pipeline that integrates temporal, spatial, and cross-view reasoning. This design greatly reduces human annotation effort, exposes low-confidence labels through geometric checks such as reprojection error, and produces labels that can later be filtered, corrected, or used to fine-tune downstream pose models. For behavioral understanding, we propose a pipeline that integrates deep embedded clustering for over-segmented behavior discovery, VLM-based per-clip video captioning, and LLM-based reasoning to merge and semantically label behavioral segments. The behavioral pipeline can operate directly from visual information and does not require keypoints to segment behavior. Together, these components enable scalable, interpretable, and label-light analysis of multi-animal behavior.", "link": "http://arxiv.org/abs/2603.12176v1", "date": "2026-03-12", "relevancy": 2.3587, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.593}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.593}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5732}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BehaviorVLM%3A%20Unified%20Finetuning-Free%20Behavioral%20Understanding%20with%20Vision-Language%20Reasoning&body=Title%3A%20BehaviorVLM%3A%20Unified%20Finetuning-Free%20Behavioral%20Understanding%20with%20Vision-Language%20Reasoning%0AAuthor%3A%20Jingyang%20Ke%20and%20Weihan%20Li%20and%20Amartya%20Pradhan%20and%20Jeffrey%20Markowitz%20and%20Anqi%20Wu%0AAbstract%3A%20Understanding%20freely%20moving%20animal%20behavior%20is%20central%20to%20neuroscience%2C%20where%20pose%20estimation%20and%20behavioral%20understanding%20form%20the%20foundation%20for%20linking%20neural%20activity%20to%20natural%20actions.%20Yet%20both%20tasks%20still%20depend%20heavily%20on%20human%20annotation%20or%20unstable%20unsupervised%20pipelines%2C%20limiting%20scalability%20and%20reproducibility.%20We%20present%20BehaviorVLM%2C%20a%20unified%20vision-language%20framework%20for%20pose%20estimation%20and%20behavioral%20understanding%20that%20requires%20no%20task-specific%20finetuning%20and%20minimal%20human%20labeling%20by%20guiding%20pretrained%20Vision-Language%20Models%20%28VLMs%29%20through%20detailed%2C%20explicit%2C%20and%20verifiable%20reasoning%20steps.%20For%20pose%20estimation%2C%20we%20leverage%20quantum-dot-grounded%20behavioral%20data%20and%20propose%20a%20multi-stage%20pipeline%20that%20integrates%20temporal%2C%20spatial%2C%20and%20cross-view%20reasoning.%20This%20design%20greatly%20reduces%20human%20annotation%20effort%2C%20exposes%20low-confidence%20labels%20through%20geometric%20checks%20such%20as%20reprojection%20error%2C%20and%20produces%20labels%20that%20can%20later%20be%20filtered%2C%20corrected%2C%20or%20used%20to%20fine-tune%20downstream%20pose%20models.%20For%20behavioral%20understanding%2C%20we%20propose%20a%20pipeline%20that%20integrates%20deep%20embedded%20clustering%20for%20over-segmented%20behavior%20discovery%2C%20VLM-based%20per-clip%20video%20captioning%2C%20and%20LLM-based%20reasoning%20to%20merge%20and%20semantically%20label%20behavioral%20segments.%20The%20behavioral%20pipeline%20can%20operate%20directly%20from%20visual%20information%20and%20does%20not%20require%20keypoints%20to%20segment%20behavior.%20Together%2C%20these%20components%20enable%20scalable%2C%20interpretable%2C%20and%20label-light%20analysis%20of%20multi-animal%20behavior.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12176v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBehaviorVLM%253A%2520Unified%2520Finetuning-Free%2520Behavioral%2520Understanding%2520with%2520Vision-Language%2520Reasoning%26entry.906535625%3DJingyang%2520Ke%2520and%2520Weihan%2520Li%2520and%2520Amartya%2520Pradhan%2520and%2520Jeffrey%2520Markowitz%2520and%2520Anqi%2520Wu%26entry.1292438233%3DUnderstanding%2520freely%2520moving%2520animal%2520behavior%2520is%2520central%2520to%2520neuroscience%252C%2520where%2520pose%2520estimation%2520and%2520behavioral%2520understanding%2520form%2520the%2520foundation%2520for%2520linking%2520neural%2520activity%2520to%2520natural%2520actions.%2520Yet%2520both%2520tasks%2520still%2520depend%2520heavily%2520on%2520human%2520annotation%2520or%2520unstable%2520unsupervised%2520pipelines%252C%2520limiting%2520scalability%2520and%2520reproducibility.%2520We%2520present%2520BehaviorVLM%252C%2520a%2520unified%2520vision-language%2520framework%2520for%2520pose%2520estimation%2520and%2520behavioral%2520understanding%2520that%2520requires%2520no%2520task-specific%2520finetuning%2520and%2520minimal%2520human%2520labeling%2520by%2520guiding%2520pretrained%2520Vision-Language%2520Models%2520%2528VLM rrected%2C%20or%20used%20to%20fine-tune%20downstream%20pose%20models.%20For%20behavioral%20understanding%2C%20we%20propose%20a%20pipeline%20that%20integrates%20deep%20embedded%20clustering%20for%20over-segmented%20behavior%20discovery%2C%20VLM-based%20per-clip%20video%20captioning%2C%20and%20LLM-based%20reasoning%20to%20merge%20and%20semantically%20label%20behavioral%20segments.%20The%20behavioral%20pipeline%20can%20operate%20directly%20from%20visual%20information%20and%20does%20not%20require%20keypoints%20to%20segment%20behavior.%20Together%2C%20these%20components%20enable%20scalable%2C%20interpretable%2C%20and%20label-light%20analysis%20of%20multi-animal%20behavior.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12176v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBehaviorVLM%253A%2520Unified%2520Finetuning-Free%2520Behavioral%2520Understanding%2520with%2520Vision-Language%2520Reasoning%26entry.906535625%3DJingyang%2520Ke%2520and%2520Weihan%2520Li%2520and%2520Amartya%2520Pradhan%2520and%2520Jeffrey%2520Markowitz%2520and%2520Anqi%2520Wu%26entry.1292438233%3DUnderstanding%2520freely%2520moving%2520animal%2520behavior%2520is%2520central%2520to%2520neuroscience%252C%2520where%2520pose%2520estimation%2520and%2520behavioral%2520understanding%2520form%2520the%2520foundation%2520for%2520linking%2520neural%2520activity%2520to%2520natural%2520actions.%2520Yet%2520both%2520tasks%2520still%2520depend%2520heavily%2520on%2520human%2520annotation%2520or%2520unstable%2520unsupervised%2520pipelines%252C%2520limiting%2520scalability%2520and%2520reproducibility.%2520We%2520present%2520BehaviorVLM%252C%2520a%2520unified%2520vision-language%2520framework%2520for%2520pose%2520estimation%2520and%2520behavioral%2520understanding%2520that%2520requires%2520no%2520task-specific%2520finetuning%2520and%2520minimal%2520human%2520labeling%2520by%2520guiding%2520pretrained%2520Vision-Language%2520Models%2520%2528V {"title": "$\u03a8_0$: An Open Foundation Model Towards Universal Humanoid Loco-Manipulation", "author": "Songlin Wei and Hongyi Jing and Boqian Li and Zhenyu Zhao and Jiageng Mao and Zhenhao Ni and Sicheng He and Jie Liu and Xiawei Liu and Kaidi Kang and Sheng Zang and Weiduo Yuan and Marco Pavone and Di Huang and Yue Wang", "abstract": "We introduce $\u03a8_0$ (Psi-Zero), an open foundation model to address challenging humanoid loco-manipulation tasks. While existing approaches often attempt to address this fundamental problem by co-training on large and diverse human and humanoid data, we argue that this strategy is suboptimal due to the fundamental kinematic and motion disparities between humans and humanoid robots. Therefore, data efficiency and model performance remain unsatisfactory despite the considerable data volume. To address this challenge, \\ours\\;decouples the learning process to maximize the utility of heterogeneous data sources. Specifically, we propose a staged training paradigm with different learning objectives: First, we autoregressively pre-train a VLM backbone on large-scale egocentric human videos to acquire generalizable visual-action representations. Then, we post-train a flow-based action expert on high-quality humanoid robot data to learn precise robot joint control. Our research further identifies a critical yet often overlooked data recipe: in contrast to approaches that scale with noisy Internet clips or heterogeneous cross-embodiment robot datasets, we demonstrate that pre-training on high-quality egocentric human manipulation data followed by post-training on domain-specific real-world humanoid trajectories yields superior performance. Extensive real-world experiments demonstrate that \\ours\\ achieves the best performance using only about 800 hours of human video data and 30 hours of real-world robot data, outperforming baselines pre-trained on more than 10$\\times$ as much data by over 40\\% in overall success rate across multiple tasks. We will open-source the entire ecosystem to the community, including a data processing and training pipeline, a humanoid foundation model, and a real-time action inference engine.", "link": "http://arxiv.org/abs/2603.12263v1", "date": "2026-03-12", "relevancy": 2.3495, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5925}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5861}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5827}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20%24%CE%A8_0%24%3A%20An%20Open%20Foundation%20Model%20Towards%20Universal%20Humanoid%20Loco-Manipulation&body=Title%3A%20%24%CE%A8_0%24%3A%20An%20Open%20Foundation%20Model%20Towards%20Universal%20Humanoid%20Loco-Manipulation%0AAuthor%3A%20Songlin%20Wei%20and%20Hongyi%20Jing%20and%20Boqian%20Li%20and%20Zhenyu%20Zhao%20and%20Jiageng%20Mao%20and%20Zhenhao%20Ni%20and%20Sicheng%20He%20and%20Jie%20Liu%20and%20Xiawei%20Liu%20and%20Kaidi%20Kang%20and%20Sheng%20Zang%20and%20Weiduo%20Yuan%20and%20Marco%20Pavone%20and%20Di%20Huang%20and%20Yue%20Wang%0AAbstract%3A%20We%20introduce%20%24%CE%A8_0%24%20%28Psi-Zero%29%2C%20an%20open%20foundation%20model%20to%20address%20challenging%20humanoid%20loco-manipulation%20tasks.%20While%20existing%20approaches%20often%20attempt%20to%20address%20this%20fundamental%20problem%20by%20co-training%20on%20large%20and%20diverse%20human%20and%20humanoid%20data%2C%20we%20argue%20that%20this%20strategy%20is%20suboptimal%20due%20to%20the%20fundamental%20kinematic%20and%20motion%20disparities%20between%20humans%20and%20humanoid%20robots.%20Therefore%2C%20data%20efficiency%20and%20model%20performance%20remain%20unsatisfactory%20despite%20the%20considerable%20data%20volume.%20To%20address%20this%20challenge%2C%20%5Cours%5C%3Bdecouples%20the%20learning%20process%20to%20maximize%20the%20utility%20of%20heterogeneous%20data%20sources.%20Specifically%2C%20we%20propose%20a%20staged%20training%20paradigm%20with%20different%20learning%20objectives%3A%20First%2C%20we%20autoregressively%20pre-train%20a%20VLM%20backbone%20on%20large-scale%20egocentric%20human%20videos%20to%20acquire%20generalizable%20visual-action%20representations.%20Then%2C%20we%20post-train%20a%20flow-based%20action%20expert%20on%20high-quality%20humanoid%20robot%20data%20to%20learn%20precise%20robot%20joint%20control.%20Our%20research%20further%20identifies%20a%20critical%20yet%20often%20overlooked%20data%20recipe%3A%20in%20contrast%20to%20approaches%20that%20scale%20with%20noisy%20Internet%20clips%20or%20heterogeneous%20cross-embodiment%20robot%20datasets%2C%20we%20demonstrate%20that%20pre-training%20on%20high-quality%20egocentric%20human%20manipulation%20data%20followed%20by%20post-training%20on%20domain-specific%20real-world%20humanoid%20trajectories%20yields%20superior%20performance.%20Extensive%20real-world%20experiments%20demonstrate%20that%20%5Cours%5C%20achieves%20the%20best%20performance%20using%20only%20about%20800%20hours%20of%20human%20video%20data%20and%2030%20hours%20of%20real-world%20robot%20data%2C%20outperforming%20baselines%20pre-trained%20on%20more%20than%2010%24%5Ctimes%24%20as%20much%20data%20by%20over%2040%5C%25%20in%20overall%20success%20rate%20across%20multiple%20tasks.%20We%20will%20open-source%20the%20entire%20ecosystem%20to%20the%20community%2C%20including%20a%20data%20processing%20and%20training%20pipeline%2C%20a%20humanoid%20foundation%20model%2C%20and%20a%20real-time%20action%20inference%20engine.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12263v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D%2524%25CE%25A8_0%2524%253A%2520An%2520Open%2520Fo {"title": "Pano360: Perspective to Panoramic Vision with Geometric Consistency", "author": "Zhengdong Zhu and Weiyi Xue and Zuyuan Yang and Wenlve Zhou and Zhiheng Zhou", "abstract": "Prior panorama stitching approaches heavily rely on pairwise feature correspondences and are unable to leverage geometric consistency across multiple views. This leads to severe distortion and misalignment, especially in challenging scenes with weak textures, large parallax, and repetitive patterns. Given that multi-view geometric correspondences can be directly constructed in 3D space, making them more accurate and globally consistent, we extend the 2D alignment task to the 3D photogrammetric space. We adopt a novel transformer-based architecture to achieve 3D awareness and aggregate global information across all views. It directly utilizes camera poses to guide image warping for global alignment in 3D space and employs a multi-feature joint optimization strategy to compute the seams. Additionally, to establish an evaluation benchmark and train our network, we constructed a large-scale dataset of real-world scenes. Extensive experiments show that our method significantly outperforms existing alternatives in alignment accuracy and perceptual quality.", "link": "http://arxiv.org/abs/2603.12013v1", "date": "2026-03-12", "relevancy": 2.3387, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6069}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5874}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.573}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Pano360%3A%20Perspective%20to%20Panoramic%20Vision%20with%20Geometric%20Con ion%20with%20Geometric%20Consistency&entry.906535625=Zhengdong%20Zhu%20and%20Weiyi%20Xue%20and%20Zuyuan%20Yang%20and%20Wenlve%20Zhou%20and%20Zhiheng%20Zhou&entry.1292438233=Prior%20panorama%20stitching%20approaches%20heavily%20rely%20on%20pairwise%20feature%20correspondences%20and%20are%20unable%20to%20leverage%20geometric%20consistency%20across%20multiple%20views.%20This%20leads%20to%20severe%20distortion%20and%20misalignment%2C%20especially%20in%20challenging%20scenes%20with%20weak%20textures%2C%20large%20parallax%2C%20and%20repetitive%20patterns.%20Given%20that%20multi-view%20geometric%20correspondences%20can%20be%20directly%20constructed%20in%203D%20space%2C%20making%20them%20more%20accurate%20and%20globally%20consistent%2C%20we%20extend%20the%202D%20alignment%20task%20to%20the%203D%20photogrammetric%20space.%20We%20adopt%20a%20novel%20transformer-based%20architecture%20to%20achieve%203D%20awareness%20and%20aggregate%20global%20information%20across%20all%20views.%20It%20directly%20utilizes%20camera%20poses%20to%20guide%20image%20warping%20for%20global%20alignment%20in%203D%20space%20and%20employs%20a%20multi-feature%20joint%20optimization%20strategy%20to%20compute%20the%20seams.%20Additionally%2C%20to%20establish%20an%20evaluation%20benchmark%20and%20train%20our%20network%2C%20we%20constructed%20a%20large-scale%20dataset%20of%20real-world%20scenes.%20Extensive%20experiments%20show%20that%20our%20method%20significantly%20outperforms%20existing%20alternatives%20in%20alignment%20accuracy%20and%20perceptual%20quality.&entry.1838667208=http%3A//arxiv.org/abs/2603.12013v1&entry.124074799=Read"},
{"title": "ReasonMap: Towards Fine-Grained Visual Reasoning from Transit Maps", "author": "Sicheng Feng and Song Wang and Shuyi Ouyang and Lingdong Kong and Zikai Song and Jianke Zhu and Huan Wang and Xinchao Wang", "abstract": "Multimodal large language models (MLLMs) have demonstrated significant progress in semantic scene understanding and text-image alignment, with reasoning variants enhancing performance on more complex tasks involving mathematics and logic. To bridge this gap, we introduce ReasonMap, a novel benchmark specifically designed to evaluate these capabilities. ReasonMap encompasses high-resolution transit maps from 30 cities and includes 1,008 question-answer pairs spanning two question types and three templates. Furthermore, we design a two-level evaluation pipeline that properly assesses answer correctness and quality. Our comprehensive evaluation of 16 popular MLLMs reveals a counterintuitive pattern: among open-source models, base variants outperform their reasoning-tuned counterparts, whereas the opposite trend is observed in closed-source models. Further analysis under the visual-masking setting confirms that strong performance necessitates direct visual grounding, rather than relying solely on language priors. We further establish a training baseline with reinforcement fine-tuning, providing a reference for future exploration. We hope this benchmark study offers new insights into visual reasoning and helps investigate the gap between open- and closed-source models.", "link": "http://arxiv.org/abs/2505.18675v3", "date": "2026-03-12", "relevancy": 2.327, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5899}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5899}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Ba {"title": "Spatial-TTT: Streaming Visual-based Spatial Intelligence with Test-Time Training", "author": "Fangfu Liu and Diankun Wu and Jiawei Chi and Yimo Cai and Yi-Hsin Hung and Xumin Yu and Hao Li and Han Hu and Yongming Rao and Yueqi Duan", "abstract": "Humans perceive and understand real-world spaces through a stream of visual observations. Therefore, the ability to streamingly maintain and update spatial evidence from potentially unbounded video streams is essential for spatial intelligence. The core challenge is not simply longer context windows but how spatial information is selected, organized, and retained over time. In this paper, we propose Spatial-TTT towards streaming visual-based spatial intelligence with test-time training (TTT), which adapts a subset of parameters (fast weights) to capture and organize spatial evidence over long-horizon scene videos. Specifically, we design a hybrid architecture and adopt large-chunk updates parallel with sliding-window attention for efficient spatial video processing. To further promote spatial awareness, we introduce a spatial-predictive mechanism applied to TTT layers with 3D spatiotemporal convolution, which encourages the model to capture geometric correspondence and temporal continuity across frames. Beyond architecture design, we construct a dataset with dense 3D spatial descriptions, which guides the model to update its fast weights to memorize and organize global 3D spatial signals in a structured manner. Extensive experiments demonstrate that Spatial-TTT improves long-horizon spatial understanding and achieves state-of-the-art performance on video spatial benchmarks. Project page: https://liuff19.github.io/Spatial-TTT.", "link": "http://arxiv.org/abs/2603.12255v1", "date": "2026-03-12", "relevancy": 2.3081, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5821}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5779}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5717}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Spatial-TTT%3A%20Streaming%20Visual-based%20Spatial%20Intelligence%20with%20Test-Time%20Training&body=Title%3A%20Spatial-TTT%3A%20Streaming%20Visual-based%20Spatial%20Intelligence%20with%20Test-Time%20Training%0AAuthor%3A%20Fangfu%20Liu%20and%20Diankun%20Wu%20and%20Jiawei%20Chi%20and%20Yimo%20Cai%20and%20Yi-Hsin%20Hung%20and%20Xumin%20Yu%20and%20Hao%20Li%20and%20Han%20Hu%20and%20Yongming%20Rao%20and%20Yueqi%20Duan%0AAbstract%3A%20Humans%20perceive%20and%20understand%20real-world%20spaces%20through%20a%20stream%20of%20visual%20observations.%20Therefore%2C%20the%20ability%20to%20streamingly%20maintain%20and%20update%20spatial%20evidence%20from%20potentially%20unbounded%20video%20streams%20is%20essential%20for%20spatial%20intelligence.%20The%20core%20challenge%20is%20not%20simply%20longer%20context%20windows%20but%20how%20spatial%20information%20is%20selected%2C%20organized%2C%20and%20retained%20over%20time.%20In%20this%20paper%2C%20we%20propose%20Spatial-TTT%20towards%20streaming%20visual-based%20spatial%20intelligence%20with%20test-time%20training%20%28TTT%29%2C%20which%20adapts%20a%20subset%20of%20parameters%20%28fast%20weights%29%20to%20capture%20and%20organize%20spatial%20evidence%20over%20long-horizon%20scene%20videos.%20Specifically%2C%20we%20design%20a%20hybrid%20architecture%20and%20adopt%20large-chunk%20updates%20parallel%20with%20sliding-window%20attention%20for%20efficient%20spatial%20video%20processing.%20To%20further%20promote%20spatial%20awareness%2C%20we%20introduce%20a%20spatial-predictive%20mechanism%20applied%20to%20TTT%20layers%20with%203D%20spatiotemporal%20convolution%2C%20which%20encourages%20the%20model%20to%20capture%20geometric%20correspondence%20and%20temporal%20continuity%20across%20frames.%20Beyond%20architecture%20design%2C%20we%20construct%20a%20dataset%20with%20dense%203D%20spatial%20descriptions%2C%20which%20guides%20the%20model%20to%20update%20its%20fast%20weights%20to%20memorize%20and%20organize%20global%203D%20spatial%20signals%20in%20a%20structured%20manner.%20Extensive%20experiments%20demonstrate%20that%20Spatial-TTT%20improves%20long-horizon%20spatial%20understanding%20and%20achieves%20state-of-the-art%20performance%20on%20video%20spatial%20benchmarks.%20Project%20page%3A%20https%3A//liuff19.github.io/Spatial-TTT.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12255v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSpatial-TTT%253A%2520Streaming%2520Visual-based%2520Spatial%2520Intelligence%2520with%2520Test-Time%2520Training%26entry.906535625%3DFangfu%2520Liu%2520and%2520Diankun%2520Wu%2520and%2520Jiawei%2520Chi%2520and%2520Yimo%2520Cai%2520and%2520Yi-Hsin%2520Hung%2520and%2520Xumin%2520Yu%2520and%2520Hao%2520Li%2520and%2520Han%2520Hu%2520and%2520Yongming%2520Rao%2520and%2520Yueqi%2520Duan%26entry.1292438233%3DHumans%2520perceive%2520and%2520understand%2520real-world%2520spaces%2520through%2520a%2520stream%2520of%2520visual%2520observations.%2520Therefore%252C%2520the%2520ability%2520to%2520streamingly%2520maintain%2520and%2520update%2520spatial%2520evidence%2520from%2520potentially%2520unbounded%2520video%2520streams%2520is%2520essential%2520for%2520spatial%2520intelligence.%2520The%2520core%2520challenge%2520is%2520not%2520simply%2520longer%2520context%2520windows%2520but%2520how%2520spatial%2520information%2520is%2520selected%252C%2520organized%252C%2520and%2520retained%2520over%2520time.%2520In%2520this%2520paper%252C%2520we%2520propose%2520Spatial-TTT%2520towards%2520streaming%2520visual-based%2520spatial%2520intelligence%2520with%2520test-time%2520training%2520%2528TTT%2 {"title": "EvoTok: A Unified Image Tokenizer via Residual Latent Evolution for Visual Understanding and Generation", "author": "Yan Li and Ning Liao and Xiangyu Zhao and Shaofeng Zhang and Xiaoxing Wang and Yifan Yang and Junchi Yan and Xue Yang", "abstract": "The development of unified multimodal large language models (MLLMs) is fundamentally challenged by the granularity gap between visual understanding and generation: understanding requires high-level semantic abstractions, while image generation demands fine-grained pixel-level representations. Existing approaches usually enforce the two supervision on the same set of representation or decouple these two supervision on separate feature spaces, leading to interference and inconsistency, respectively. In this work, we propose EvoTok, a unified image tokenizer that reconciles these requirements through a residual evolution process within a shared latent space. Instead of maintaining separate token spaces for pixels and semantics, EvoTok encodes an image into a cascaded sequence of residual tokens via residual vector quantization. This residual sequence forms an evolution trajectory where earlier stages capture low-level details and deeper stages progressively transition toward high-level semantic representations. Despite being trained on a relatively modest dataset of 13M images, far smaller than the billion-scale datasets used by many previous unified tokenizers, EvoTok achieves a strong reconstruction quality of 0.43 rFID on ImageNet-1K at 256x256 resolution. When integrated with a large language model, EvoTok shows promising performance across 7 out of 9 visual understanding benchmarks, and remarkable results on image generation benchmarks such as GenEval and GenAI-Bench. These results demonstrate that modeling visual representations as an evolving trajectory provides an effective and principled solution for unifying visual understanding and generation.", "link": "http://arxiv.org/abs/2603.12108v1", "date": "2026-03-12", "relevancy": 2.307, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6088}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5572}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5456}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EvoTok%3A%20A%20Unified%20Image%20Tokenizer%20via%20Residual%20Latent%20Evolution%20for%20Visual%20Understanding%20and%20Generation&body=Title%3A%20EvoTok%3A%20A%20Unified%20Image%20Tokenizer%20via%20Residual%20Latent%20Evolution%20for%20Visual%20Understanding%20and%20Generation%0AAuthor%3A%20Yan%20Li%20and%20Ning%20Liao%20and%20Xiangyu%20Zhao%20and%20Shaofeng%20Zhang%20and%20Xiaoxing%20Wang%20and%20Yifan%20Yang%20and%20Junchi%20Yan%20and%20Xue%20Yang%0AAbstract%3A%20The%20development%20of%20unified%20multimodal%20large%20language%20models%20%28MLLMs%29%20is%20fundamentally%20challenged%20by%20the%20granularity%20gap%20between%20visual%20understanding%20and%20generation%3A%20understanding%20requires%20high-level%20semantic%20abstractions%2C%20while%20image%20generation%20demands%20fine-grained%20pixel-level%20representations.%20Existing%20approaches%20usually%20enforce%20the%20two%20supervision%20on%20the%20same%20set%20of%20representation%20or%20decouple%20these%20two%20supervision%20on%20separate%20feature%20spaces%2C%20leading%20to%20interference%20and%20inconsistency%2C%20respectively.%20In%20this%20work%2C%20we%20propose%20EvoTok%2C%20a%20unified%20image%20tokenizer%20that%20reconciles%20these%20requirements%20through%20a%20residual%20evolution%20process%20within%20a%20shared%20latent%20space.%20Instead%20of%20maintaining%20separate%20token%20spaces%20for%20pixels%20and%20semantics%2C%20EvoTok%20encodes%20an%20image%20into%20a%20cascaded%20sequence%20of%20residual%20tokens%20via%20residual%20vector%20quantization.%20This%20residual%20sequence%20forms%20an%20evolution%20trajectory%20where%20earlier%20stages%20capture%20low-level%20details%20and%20deeper%20stages%20progressively%20transition%20toward%20high-level%20semantic%20representations.%20Despite%20being%20trained%20on%20a%20relatively%20modest%20dataset%20of%2013M%20images%2C%20far%20smaller%20than%20the%20billion-scale%20datasets%20used%20by%20many%20previous%20unified%20tokenizers%2C%20EvoTok%20achieves%20a%20strong%20reconstruction%20quality%20of%200.43%20rFID%20on%20ImageNet-1K%20at%20256x256%20resolution.%20When%20integrated%20with%20a%20large%20language%20model%2C%20EvoTok%20shows%20promising%20performance%20across%207%20out%20of%209%20visual%20understanding%20benchmarks%2C%20and%20remarkable%20results%20on%20image%20generation%20benchmarks%20such%20as%20GenEval%20and%20GenAI-Bench.%20These%20results%20demonstrate%20that%20modeling%20visual%20representations%20as%20an%20evolving%20trajectory%20provides%20an%20effective%20and%20principled%20solution%20for%20unifying%20visual%20understanding%20and%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12108v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEvoTok%253A%2520A%2520Unified%2520Image%2520Tokenizer%2520via%2520Residual%2520Latent%2520Evolution%2520for%2520Visual%2520Understanding%2520and%2520Generation%26entry.906535625%3DYan%2520Li%2520and%2520Ning%2520Liao%2520and%2520Xiangyu%2520Zhao%2520and%2520Shaofeng%2520Zhang%2520and%2520Xiaoxing%2520Wang%2520and%2520Yifan%2520Yang%2520and%2520Junchi%2520Yan%2520and%2520Xue%2520Yang%26entry.1292438233%3DThe%2520development%2520of%2520unified%2520multimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520is%2520fundamentally%2520challenged%2520by%2520the%2520granularity%2520gap%2520between%2520visual%2520understanding%252 {"title": "Evolving Beyond Snapshots: Harmonizing Structure and Sequence via Entity State Tuning for Temporal Knowledge Graph Forecasting", "author": "Siyuan Li and Yunjia Wu and Yiyong Xiao and Pingyang Huang and Peize Li and Ruitong Liu and Yan Wen and Te Sun and Fangyi Pei", "abstract": "Temporal knowledge graph (TKG) forecasting requires predicting future facts by jointly modeling structural dependencies within each snapshot and temporal evolution across snapshots. However, most existing methods are stateless: they recompute entity representations at each timestamp from a limited query window, leading to episodic amnesia and rapid decay of long-term dependencies. To address this limitation, we propose Entity State Tuning (EST), an encoder-agnostic framework that endows TKG forecasters with persistent and continuously evolving entity states. EST maintains a global state buffer and progressively aligns structural evidence with sequential signals via a closed-loop design. Specifically, a topology-aware state perceiver first injects entity-state priors into structural encoding. Then, a unified temporal context module aggregates the state-enhanced events with a pluggable sequence backbone. Subsequently, a dual-track evolution mechanism writes the updated context back to the global entity state memory, balancing plasticity against stability. Experiments on multiple benchmarks show that EST consistently improves diverse backbones and achieves state-of-the-art performance, highlighting the importance of state persistence for long-horizon TKG forecasting. The code is published at https://github.com/yuanwuyuan9/Evolving-Beyond-Snapshots.", "link": "http://arxiv.org/abs/2602.12389v2", "date": "2026-03-12", "relevancy": 2.2844, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4666}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4592}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4448}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Evolving%20Beyond%20Snapshots%3A%20Harmonizing%20Structure%20and%20Sequence%20via%20Entity%20State%20Tuning%20for%20Temporal%20Knowledge%20Graph%20Forecasting&body=Title%3A%20Evolving%20Beyond%20Snapshots%3A%20Harmonizing%20Structure%20and%20Sequence%20via%20Entity%20State%20Tuning%20for%20Temporal%20Knowledge%20Graph%20Forecasting%0AAuthor%3A%20Siyuan%20Li%20and%20Yunjia%20Wu%20and%20Yiyong%20Xiao%20and%20Pingyang%20Huang%20and%20Peize%20Li%20and%20Ruitong%20Liu%20and%20Yan%20Wen%20and%20Te%20Sun%20and%20Fangyi%20Pei%0AAbstract%3A%20Temporal%20knowledge%20graph%20%28TKG%29%20forecasting%20requires%20predicting%20future%20facts%20by%20jointly%20modeling%20structural%20dependencies%20within%20each%20snapshot%20and%20temporal%20evolution%20across%20snapshots.%20However%2C%20most%20existing%20methods%20are%20stateless%3A%20they%20recompute%20entity%20representations%20at%20each%20timestamp%20from%20a%20limited%20query%20window%2C%20leading%20to%20episodic%20amnesia%20and%20rapid%20decay%20of%20long-term%20dependencies.%20To%20address%20this%20limitation%2C%20we%20propose%20Entity%20State%20Tuning%20%28EST%29%2C%20an%20encoder-agnostic%20framework%20that%20endows%20TKG%20forecasters%20with%20persistent%20and%20continuously%20evolving%20entity%20states.%20EST%20maintains%20a%20global%20state%20buffer%20and%20progressively%20aligns%20structural%20evidence%20with%20sequential%20signals%20via%20a%20closed-loop%20design.%20Specifically%2C%20a%20topology-aware%20state%20perceiver%20first%20injects%20entity-state%20priors%20into%20structural%20encoding.%20Then%2C%20a%20unified%20temporal%20context%20module%20aggregates%20the%20state-enhanced%20events%20with%20a%20pluggable%20sequence%20backbone.%20Subsequently%2C%20a%20dual-track%20evolution%20mechanism%20writes%20the%20updated%20context%20back%20to%20the%20global%20entity%20state%20memory%2C%20balancing%20plasticity%20against%20stability.%20Experiments%20on%20multiple%20benchmarks%20show%20that%20EST%20consistently%20improves%20diverse%20backbones%20and%20achieves%20state-of-the-art%20performance%2C%20highlighting%20the%20importance%20of%20state%20persistence%20for%20long-horizon%20TKG%20forecasting.%20The%20code%20is%20published%20at%20https%3A//github.com/yuanwuyuan9/Evolving-Beyond-Snapshots.%0ALink%3A%20http%3A//arxiv.org/abs/2602.12389v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEvolving%2520Beyond%2520Snapshots%253A%2520Harmonizing%2520Structure%2520and%2520Sequence%2520via%2520Entity%2520State%2520Tuning%2520for%2520Temporal%2520Knowledge%2520Graph%2520Forecasting%26entry.906535625%3DSiyuan%2520Li%2520and%2520Yunjia%2520Wu%2520and%2520Yiyong%2520Xiao%2520and%2520Pingyang%2520Huang%2520and%2520Peize%2520Li%2520and%2520Ruitong%2520Liu%2520and%2520Yan%2520Wen%2520and%2520Te%2520Sun%2520and%2520Fangyi%2520Pei%26entry.1292438233%3DTemporal%2520knowledge%2520graph%2520%2528TKG%2529%2520forecasting%2520requires%2520predicting%2520future%2520facts%2520by%2520jointly%2520modeling%2520structural%2520dependencies%2520within%2520each%2520snapshot%2520and%2520temporal%2520evolution%2520across%2520snapshots.%2520However%252C%2520most%2520existing%2520methods%2520are%2520stateless%253A%2520they%2520recompute%2520entity%2520representations%2520at%2520each%2520timestamp%2520from%2520a%2520limited%2520query%2520window%252C%2520leading%2520to%2520episodic%2520amnesia%2520and%2520rapid%2520decay%2520of%2520long-term%2520dependencies.%2520To%2520address%2520this%2520limitation%252C%2520we%2520propose%2520Entity%2520State%2520Tuning%2520%2528EST%2529%252C%2520an%2520encoder-agnostic%2520framework%2520that%2520endows%2520TKG%2520forecasters%2520with%2520persistent% {"title": "Linking Perception, Confidence and Accuracy in MLLMs", "author": "Yuetian Du and Yucheng Wang and Rongyu Zhang and Zhijie Xu and Boyu Yang and Ming Kong and Jie Liu and Qiang Zhu", "abstract": "Recent advances in Multi-modal Large Language Models (MLLMs) have predominantly focused on enhancing visual perception to improve accuracy. However, a critical question remains unexplored: Do models know when they do not know? Through a probing experiment, we reveal a severe confidence miscalibration problem in MLLMs. To address this, we propose Confidence-Driven Reinforcement Learning (CDRL), which uses original-noise image pairs and a novel confidence-based reward to enhance perceptual sensitivity and robustly calibrate the model's confidence. Beyond training benefits, calibrated confidence enables more effective test-time scaling as a free lunch. We further propose Confidence-Aware Test-Time Scaling (CA-TTS), which dynamically coordinates Self-Consistency, Self-Reflection, and Visual Self-Check modules guided by confidence signals. An Expert Model acts in multiple roles (e.g., Planner, Critic, Voter) to schedule these modules and provide external verification. Our integrated framework establishes new state-of-the-art results with consistent 8.8% gains across four benchmarks. More ablation studies demonstrate the effectiveness of each module and scaling superiority.", "link": "http://arxiv.org/abs/2603.12149v1", "date": "2026-03-12", "relevancy": 2.2797, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5808}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5766}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidentia {"title": "Learning Transferable Sensor Models via Language-Informed Pretraining", "author": "Yuliang Chen and Arvind Pillai and Yu Yvonne Wu and Tess Z. Griffin and Lisa Marsch and Michael V. Heinz and Nicholas C. Jacobson and Andrew Campbell", "abstract": "Modern sensing systems generate large volumes of unlabeled multivariate time-series data. This abundance of unlabeled data makes self-supervised learning (SSL) a natural approach for learning transferable representations. However, most existing approaches are optimized for reconstruction or forecasting objectives and often fail to capture the semantic structure required for downstream classification and reasoning tasks. While recent sensor-language alignment methods improve semantic generalization through captioning and zero-shot transfer, they are limited to fixed sensor configurations, such as predefined channel sets, signal lengths, or temporal resolutions, which hinders cross-domain applicability. To address these gaps, we introduce \\textbf{SLIP} (\\textbf{S}ensor \\textbf{L}anguage-\\textbf{I}nformed \\textbf{P}retraining), an open-source framework for learning language-aligned representations that generalize across diverse sensor setups. SLIP integrates contrastive alignment with sensor-conditioned captioning, facilitating both discriminative understanding and generative reasoning. By repurposing a pretrained decoder-only language model via cross-attention and introducing an elegant, flexible patch-embedder, SLIP supports different temporal resolutions and variable-length input at inference time without additional retraining. Across 11 datasets, SLIP demonstrates superior performance in zero-shot transfer, signal captioning, and question answering. It achieves a 77.14% average linear-probing accuracy, a 5.93% relative improvement over strong baselines, and reaches 64.83% accuracy in sensor-based question answering.", "link": "http://arxiv.org/abs/2603.11950v1", "date": "2026-03-12", "relevancy": 2.2738, " 52C%2520a%25205.93%2525%2520relative%2520improvement%2520over%2520strong%2520baselines%252C%2520and%2520reaches%252064.83%2525%2520accuracy%2520in%2520sensor-based%2520question%2520answering.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.11950v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Learning%20Transferable%20Sensor%20Models%20via%20Language-Informed%20Pretraining&entry.906535625=Yuliang%20Chen%20and%20Arvind%20Pillai%20and%20Yu%20Yvonne%20Wu%20and%20Tess%20Z.%20Griffin%20and%20Lisa%20Marsch%20and%20Michael%20V.%20Heinz%20and%20Nicholas%20C.%20Jacobson%20and%20Andrew%20Campbell&entry.1292438233=Modern%20sensing%20systems%20generate%20large%20volumes%20of%20unlabeled%20multivariate%20time-series%20data.%20This%20abundance%20of%20unlabeled%20data%20makes%20self-supervised%20learning%20%28SSL%29%20a%20natural%20approach%20for%20learning%20transferable%20representations.%20However%2C%20most%20existing%20approaches%20are%20optimized%20for%20reconstruction%20or%20forecasting%20objectives%20and%20often%20fail%20to%20capture%20the%20semantic%20structure%20required%20for%20downstream%20classification%20and%20reasoning%20tasks.%20While%20recent%20sensor-language%20alignment%20methods%20improve%20semantic%20generalization%20through%20captioning%20and%20zero-shot%20transfer%2C%20they%20are%20limited%20to%20fixed%20sensor%20configurations%2C%20such%20as%20predefined%20channel%20sets%2C%20signal%20lengths%2C%20or%20temporal%20resolutions%2C%20which%20hinders%20cross-domain%20applicability.%20To%20address%20these%20gaps%2C%20we%20introduce%20%5Ctextbf%7BSLIP%7D%20%28%5Ctextbf%7BS%7Densor%20%5Ctextbf%7BL%7Danguage-%5Ctextbf%7BI%7Dnformed%20%5Ctextbf%7BP%7Dretraining%29%2C%20an%20open-source%20framework%20for%20learning%20language-aligned%20representations%20that%20generalize%20across%20diverse%20sensor%20setups.%20SLIP%20integrates%20contrastive%20alignment%20with% {"title": "MedEyes: Learning Dynamic Visual Focus for Medical Progressive Diagnosis", "author": "Chunzheng Zhu and Yangfang Lin and Shen Chen and Yijun Wang and Jianxin Lin", "abstract": "Accurate medical diagnosis often involves progressive visual focusing and iterative reasoning, characteristics commonly observed in clinical workflows. While recent vision-language models demonstrate promising chain-of-thought (CoT) reasoning capabilities via reinforcement learning with verifiable rewards (RLVR), their purely on-policy learning paradigm tends to reinforce superficially coherent but clinically inaccurate reasoning paths. We propose MedEyes, a novel reinforcement learning framework that dynamically models clinician-style diagnostic reasoning by progressively attending to and interpreting relevant medical image regions. By incorporating off-policy expert guidance, MedEyes converts expert visual search trajectories into structured external behavioral signals, guiding the model toward clinically aligned visual reasoning. We design the Gaze-guided Reasoning Navigator (GRN) to emulate the diagnostic process through a dual-mode exploration strategy, scanning for systematic abnormality localization and drilling for detailed regional analysis. To balance expert imitation and autonomous discovery, we introduce the Confidence Value Sampler (CVS), which employs nucleus sampling and adaptive termination to create diverse yet credible exploration paths. Finally, the dual-stream GRPO optimization framework decouples on-policy and off-policy learning signals, mitigating reward assimilation and entropy collapse. Experiments demonstrate that MedEyes achieves an average performance improvement of +8.5pp across multiple medical VQA benchmarks, validating MedEyes's potential in building trustworthy medical AI systems. Code is available at https://github.com/zhcz328/MedEyes.", "link": "http://arxiv.org/abs/2511.22018v2", "date": "2026-03-12", "relevancy": 2.2669, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.581}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5639}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5639}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MedEyes%3A%20Learning%20Dynamic%20Visual%20Focus%20for%20Medical%20Progressive%20Diagnosis&body=Title%3A%20MedEyes%3A%20Learning%20Dynamic%20Visual%20Focus%20for%20Medical%20Progressive%20Diagnosis%0AAuthor%3A%20Chunzheng%20Zhu%20and%20Yangfang%20Lin%20and%20Shen%20Chen%20and%20Yijun%20Wang%20and%20Jianxin%20Lin%0AAbstract%3A%20Accurate%20medical%20diagnosis%20often%20involves%20progressive%20visual%20focusing%20and%20iterative%20reasoning%2C%20characteristics%20commonly%20observed%20in%20clinical%20workflows.%20While%20recent%20vision-language%20models%20demonstrate%20promising%20chain-of-thought%20%28CoT%29%20reasoning%20capabilities%20via%20reinforcement%20learning%20with%20verifiable%20rewards%20%28RLVR%29%2C%20their%20purely%20on-policy%20learning%20paradigm%20tends%20to%20reinforce%20superficially%20coherent%20but%20clinically%20inaccurate%20reasoning%20paths.%20We%20propose%20MedEyes%2C%20a%20novel%20reinforcement%20learning%20framework%20that%20dynamically%20models%20clinician-style%20diagnostic%20reasoning%20by%20progressively%20attending%20to%20and%20interpreting%20relevant%20medical%20image%20regions.%20By%20incorporating%20off-policy%20expert%20guidance%2C%20MedEyes%20converts%20expert%20visual%20search%20trajectories%20into%20structured%20external%20behavioral%20signals%2C%20guiding%20the%20model%20toward%20clinically%20aligned%20visual%20reasoning.%20We%20design%20the%20Gaze-guided%20Reasoning%20Navigator%20%28GRN%29%20to%20emulate%20the%20diagnostic%20process%20through%20a%20dual-mode%20exploration%20strategy%2C%20scanning%20for%20systematic%20abnormality%20localization%20and%20drilling%20for%20detailed%20regional%20analysis.%20To%20balance%20expert%20imitation%20and%20autonomous%20discovery%2C%20we%20introduce%20the%20Confidence%20Value%20Sampler%20%28CVS%29%2C%20which%20employs%20nucleus%20sampling%20and%20adaptive%20termination%20to%20create%20diverse%20yet%20credible%20exploration%20paths.%20Finally%2C%20the%20dual-stream%20GRPO%20optimization%20framework%20decouples%20on-policy%20and%20off-policy%20learning%20signals%2C%20mitigating%20reward%20assimilation%20and%20entropy%20collapse.%20Experiments%20demonstrate%20that%20MedEyes%20achieves%20an%20average%20performance%20improvement%20of%20%2B8.5pp%20across%20multiple%20medical%20VQA%20benchmarks%2C%20validating%20MedEyes%27s%20potential%20in%20building%20trustworthy%20medical%20AI%20systems.%20Code%20is%20available%20at%20https%3A//github.com/zhcz328/MedEyes.%0ALink%3A%20http%3A//arxiv.org/abs/2511.22018v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMedEyes%253A%2520Learning%2520Dynamic%2520Visual%2520Focus%2520for%2520Medical%2520Progressive%2520Diagnosis%26entry.906535625%3DChunzheng%2520Zhu%2520and%2520Yangfang%2520Lin%2520and%2520Shen%2520Chen%2520and%2520Yijun%2520Wang%2520and%2520Jianxin%2520Lin%26entry.1292438233%3DAccurate%2520medical%2520diagnosis%2520often%2520involves%2520progressive%2520visual%2520focusing%2520and%2520iterative%2520reasoning%252C%2520characteristics%2520commonly%2520observed%2520in%2520clinical%2520workflows.%2520While%2520recent%2520vision-language%2520models%2520demonstrate%2520promising%2520chain-of-thought%2520%2528CoT%2529%2520reasoning%2520capabilities%2520via%2520reinforcement%2520learning%2520with%2520verifiable%2520rewards%2520%2528RLVR%2529%252C%2520their%2520purely%2520on-policy%2520learning%2 {"title": "LLMTrack: Semantic Multi-Object Tracking with Multi-modal Large Language Models", "author": "Pan Liao and Feng Yang and Di Wu and Jinwen Yu and Yuhua Zhu and Wenhui Zhao and Dingwen Zhang", "abstract": "Multi-Object Tracking (MOT) is evolving from geometric localization to Semantic MOT (SMOT) to answer complex relational queries, yet progress is hindered by semantic data scarcity and a structural disconnect between tracking architectures and Multi-modal Large Language Models (MLLMs). To address this, we introduce Grand-SMOT, a large-scale, open-world benchmark providing high-density, dual-stream narratives that comprehensively decouple individual behaviors from environmental contexts. Furthermore, we propose LLMTrack, the first framework to seamlessly integrate MLLMs into the SMOT task. LLMTrack establishes a Macro-Understanding-First paradigm, utilizing a novel Spatio-Temporal Fusion Module to align discrete geometric trajectories with continuous semantic features, effectively suppressing temporal hallucinations during online processing. Extensive experiments demonstrate that LLMTrack achieves state-of-the-art geometric tracking performance while delivering a qualitative leap in dynamic semantic reasoning. Notably, our analysis reveals that high-quality semantic narratives empower the language model to deduce complex social interactions naturally, demonstrating that direct cognitive reasoning is more effective than cumbersome explicit visual modeling. Ultimately, our contributions bridge the gap between perceptual tracking and cognitive reasoning, establishing a robust new foundation for comprehensive video understanding and intelligent narrative generation.", "link": "http://arxiv.org/abs/2601.06550v2", "date": "2026-03-12", "relevancy": 2.259, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5872}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5795}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5411}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LLMTrack%3A%20Semantic%20Multi-Object%20Tracking%20with%20Multi-modal%20Large%20Language%20Models&body=Title%3A%20LLMTrack%3A%20Semantic%20Multi-Object%20Tracking%20with%20Multi-modal%20Large%20Language%20Models%0AAuthor%3A%20Pan%20Liao%20and%20Feng%20Yang%20and%20Di%20Wu%20and%20Jinwen%20Yu%20and%20Yuhua%20Zhu%20and%20Wenhui%20Zhao%20and%20Dingwen%20Zhang%0AAbstract%3A%20Multi-Object%20Tracking%20%28MOT%29%20is%20evolving%20from%20geometric%20localization%20to%20Semantic%20MOT%20%28SMOT%29%20to%20answer%20complex%20relational%20queries%2C%20yet%20progress%20is%20hindered%20by%20semantic%20data%20scarcity%20and%20a%20structural%20disconnect%20between%20tracking%20architectures%20and%20Multi-modal%20Large%20Language%20Models%20%28MLLMs%29.%20To%20address%20this%2C%20we%20introduce%20Grand-SMOT%2C%20a%20large-scale%2C%20open-world%20benchmark%20providing%20high-density%2C%20dual-stream%20narratives%20that%20comprehensively%20decouple%20individual%20behaviors%20from%20environmental%20contexts.%20Furthermore%2C%20we%20propose%20LLMTrack%2C%20the%20first%20framework%20to%20seamlessly%20integrate%20MLLMs%20into%20the%20SMOT%20task.%20LLMTrack%20establishes%20a%20Macro-Understanding-First%20paradigm%2C%20utilizing%20a%20novel%20Spatio-Temporal%20Fusion%20Module%20to%20align%20discrete%20geometric%20trajectories%20with%20continuous%20semantic%20features%2C%20effectively%20suppressing%20temporal%20hallucinations%20during%20online%20processing.%20Extensive%20experiments%20demonstrate%20that%20LLMTrack%20achieves%20state-of-the-art%20geometric%20tracking%20performance%20while%20delivering%20a%20qualitative%20leap%20in%20dynamic%20semantic%20reasoning.%20Notably%2C%20our%20analysis%20reveals%20that%20high-quality%20semantic%20narratives%20empower%20the%20language%20model%20to%20deduce%20complex%20social%20interactions%20naturally%2C%20demonstrating%20that%20direct%20cognitive%20reasoning%20is%20more%20effective%20than%20cumbersome%20explicit%20visual%20modeling.%20Ultimately%2C%20our%20contributions%20bridge%20the%20gap%20between%20perceptual%20tracking%20and%20cognitive%20reasoning%2C%20establishing%20a%20robust%20new%20foundation%20for%20comprehensive%20video%20understanding%20and%20intelligent%20narrative%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2601.06550v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLLMTrack%253A%2520Semantic%2520Multi-Object%2520Tracking%2520with%2520Multi-modal%2520Large%2520Language%2520Models%26entry.906535625%3DPan%2520Liao%2520and%2520Feng%2520Yang%2520and%2520Di%2520Wu%2520and%2520Jinwen%2520Yu%2520and%2520Yuhua%2520Zhu%2520and%2520Wenhui%2520Zhao%2520and%2520Dingwen%2520Zhang%26entry.1292438233%3DMulti-Object%2520Tracking%2520%2528MOT%2529%2520is%2520evolving%2520from%2520geometric%2520localization%2520to%2520Semantic%2520MOT%2520%2528SMOT%2529%2520to%2520answer%2520complex%2520relational%2520queries%252C%2520yet%2520progress%2520is%2520hindered%2520by%2520semantic%2520data%2520scarcity%2520and%2520a%2520structural%2520disconnect%2520between%2520tracking%2520architectures%2520and%2520Multi-modal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529.%2520To%2520address%2520this%252C%2520we%2520introduce%2520Grand-SMOT%252C%2520a%2520large-scale%252C%2520open-world%2520benchmark%2520providing%2520high-density%252C%2520dual-stream%2520narratives%2520that%2520comprehensively%2520decouple%2520individual%2520behaviors%2520from%2520environmental%2520contexts.%2520Furthermore%252C%2520we%2520propose%2520LLMTrack%252C%2520the%2520first%2520framework%2520to%2520sea {"title": "EndoCoT: Scaling Endogenous Chain-of-Thought Reasoning in Diffusion Models", "author": "Xuanlang Dai and Yujie Zhou and Long Xing and Jiazi Bu and Xilin Wei and Yuhong Liu and Beichen Zhang and Kai Chen and Yuhang Zang", "abstract": "Recently, Multimodal Large Language Models (MLLMs) have been widely integrated into diffusion frameworks primarily as text encoders to tackle complex tasks such as spatial reasoning. However, this paradigm suffers from two critical limitations: (i) MLLMs text encoder exhibits insufficient reasoning depth. Single-step encoding fails to activate the Chain-of-Thought process, which is essential for MLLMs to provide accurate guidance for complex tasks. (ii) The guidance remains invariant during the decoding process. Invariant guidance during decoding prevents DiT from progressively decomposing complex instructions into actionable denoising steps, even with correct MLLM encodings. To this end, we propose Endogenous Chain-of-Thought (EndoCoT), a novel framework that first activates MLLMs' reasoning potential by iteratively refining latent thought states through an iterative thought guidance module, and then bridges these states to the DiT's denoising process. Second, a terminal thought grounding module is applied to ensure the reasoning trajectory remains grounded in textual supervision by aligning the final state with ground-truth answers. With these two components, the MLLM text encoder delivers meticulously reasoned guidance, enabling the DiT to execute it progressively and ultimately solve complex tasks in a step-by-step manner. Extensive evaluations across diverse benchmarks (e.g., Maze, TSP, VSP, and Sudoku) achieve an average accuracy of 92.1%, outperforming the strongest baseline by 8.3 percentage points.", "link": "http://arxiv.org/abs/2603.12252v1", "date": "2026-03-12", "relevancy": 2.2501, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5648}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5648}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.551}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EndoCoT%3A%20Scaling%20Endogenous%20Chain-of-Thought%20Reasoning%20in%20Diffusion%20Models&body=Title%3A%20EndoCoT%3A%20Scaling%20Endogenous%20Chain-of-Thought%20Reasoning%20in%20Diffusion%20Models%0AAuthor%3A%20Xuanlang%20Dai%20and%20Yujie%20Zhou%20and%20Long%20Xing%20and%20Jiazi%20Bu%20and%20Xilin%20Wei%20and%20Yuhong%20Liu%20and%20Beichen%20Zhang%20and%20Kai%20Chen%20and%20Yuhang%20Zang%0AAbstract%3A%20Recently%2C%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20have%20been%20widely%20integrated%20into%20diffusion%20frameworks%20primarily%20as%20text%20encoders%20to%20tackle%20complex%20tasks%20such%20as%20spatial%20reasoning.%20However%2C%20this%20paradigm%20suffers%20from%20two%20critical%20limitations%3A%20%28i%29%20MLLMs%20text%20encoder%20exhibits%20insufficient%20reasoning%20depth.%20Single-step%20encoding%20fails%20to%20activate%20the%20Chain-of-Thought%20process%2C%20which%20is%20essential%20for%20MLLMs%20to%20provide%20accurate%20guidance%20for%20complex%20tasks.%20%28ii%29%20The%20guidance%20remains%20invariant%20during%20the%20decoding%20process.%20Invariant%20guidance%20during%20decoding%20prevents%20DiT%20from%20progressively%20decomposing%20complex%20instructions%20into%20actionable%20denoising%20steps%2C%20even%20with%20correct%20MLLM%20encodings.%20To%20this%20end%2C%20we%20propose%20Endogenous%20Chain-of-Thought%20%28EndoCoT%29%2C%20a%20novel%20framework%20that%20first%20activates%20MLLMs%27%20reasoning%20potential%20by%20iteratively%20refining%20latent%20thought%20states%20through%20an%20iterative%20thought%20guidance%20module%2C%20and%20then%20bridges%20these%20states%20to%20the%20DiT%27s%20denoising%20process.%20Second%2C%20a%20terminal%20thought%20grounding%20module%20is%20applied%20to%20ensure%20the%20reasoning%20trajectory%20remains%20grounded%20in%20textual%20supervision%20by%20aligning%20the%20final%20state%20with%20ground-truth%20answers.%20With%20these%20two%20components%2C%20the%20MLLM%20text%20encoder%20delivers%20meticulously%20reasoned%20guidance%2C%20enabling%20the%20DiT%20to%20execute%20it%20progressively%20and%20ultimately%20solve%20complex%20tasks%20in%20a%20step-by-step%20manner.%20Extensive%20evaluations%20across%20diverse%20benchmarks%20%28e.g.%2C%20Maze%2C%20TSP%2C%20VSP%2C%20and%20Sudoku%29%20achieve%20an%20average%20accuracy%20of%2092.1%25%2C%20outperforming%20the%20strongest%20baseline%20by%208.3%20percentage%20points.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12252v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEndoCoT%253A%2520Scaling%2520Endogenous%2520Chain-of-Thought%2520Reasoning%2520in%2520Diffusion%2520Models%26entry.906535625%3DXuanlang%2520Dai%2520and%2520Yujie%2520Zhou%2520and%2520Long%2520Xing%2520and%2520Jiazi%2520Bu%2520and%2520Xilin%2520Wei%2520and%2520Yuhong%2520Liu%2520and%2520Beichen%2520Zhang%2520and%2520Kai%2520Chen%2520and%2520Yuhang%2520Zang%26entry.1292438233%3DRecently%252C%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520have%2520been%2520widely%2520integrated%2520into%2520diffusion%2520frameworks%2520primarily%2520as%2520text%2520encoders%2520to%2520tackle%2520complex%2520tasks%2520such%2520as%2520spatial%2520reasoning.%2520However%252C%2520this%2520paradigm%2520suffers%2520from%2520two%2520critical%2520limitations%253A%2520%2528i%2529%2520MLLMs%2520text%2520encoder%2520exhibits%2520insufficient%2520reasoning%2520depth.%2520Single-step%2520encoding%2520fails%2520to%2520activate%2520the%2520Chain-of-Thought%2520process%252C%2520which%2520is%2520essential%2520for%2520MLLMs%2520to%2520provide%2520accurate%2520guidance%2520for%2520complex%2520tasks.%2520%2528ii%2529%2520The%2520guidance%2520remains%2520invariant%2520during%2520the%2520decoding%2520process.%2520Invariant%2520guidance%2520during%2520decoding%2520prevents%2520DiT%2520from%2520progressively%2520decomposing%2520complex%2520instructions%2520into%2520actionable%2520denoising%2520steps%252C%2520even%2520with%2520correct%2520MLLM%2520encodings.%2520To%2520this%2520end%252C%2520we%2520propose%2520Endogenous%2520Chain-of-Thought%2520%2528EndoCoT%2529%252C%2520a%2520novel%2520framework%2520that%2520first%2520activates%2520MLLMs%2527%2520reasoning%2520potential%2520by%2520iteratively%2520refining%2520latent%2520thought%2520states%2520through%2520an%2520iterative%2520thought%2520guidance%2520module%252C%2520and%2520then%2520bridges%2520these%2520states%2520to%2520the%2520DiT%2527s%2520denoising%2520process.%2520Second%252C%2520a%2520terminal%2520thought%2520grounding%2520module%2520is%2520applied%2520to%2520ensure%2520the%2520reasoning%2520trajectory%2520remains%2520grounded%2520in%2520textual%2520supervision%2520by%2520aligning%2520the%2520final%2520state%2520with%2520ground-truth%2520answers.%2520With%2520these%2520two%2520components%252C%2520the%2520MLLM%2520text%2520encoder%2520delivers%2520meticulously%2520reasoned%2520guidance%252C%2520enabling%2520the%2520DiT%2520to%2520execute%2520it%2520progressively%2520and%2520ultimately%2520solve%2520complex%2520tasks%2520in%2520a%2520step-by-step%2520manner.%2520Extensive%2520evaluations%2520across%2520diverse%2520benchmarks%2520%2528e.g.%252C%2520Maze%252C%2520TSP%252C%2520VSP%252C%2520and%2520Sudoku%2529%2520achieve%2520an%2520average%2520accuracy%2520of%252092.1%2525%252C%2520outperforming%2520the%2520strongest%2520baseline%2520by%25208.3%2520percentage%2520points.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.12252v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms {"title": "Expectation and Acoustic Neural Network Representations Enhance Music Identification from Brain Activity", "author": "Shogo Noguchi and Taketo Akama and Tai Nakamura and Shun Minamikawa and Natalia Polouliakh", "abstract": "During music listening, cortical activity encodes both acoustic and expectation-related information. Prior work has shown that ANN representations resemble cortical representations and can serve as supervisory signals for EEG recognition. Here we show that distinguishing acoustic and expectation-related ANN representations as teacher targets improves EEG-based music identification. Models pretrained to predict either representation outperform non-pretrained baselines, and combining them yields complementary gains that exceed strong seed ensembles formed by varying random initializations. These findings show that teacher representation type shapes downstream performance and that representation learning can be guided by neural encoding. This work points toward advances in predictive music cognition and neural decoding. Our expectation representation, computed directly from raw signals without manual labels, reflects predictive structure beyond onset or pitch, enabling investigation of multilayer predictive encoding across diverse stimuli. Its scalability to large, diverse datasets further suggests potential for developing general-purpose EEG models grounded in cortical encoding principles.", "link": "http://arxiv.org/abs/2603.03190v2", "date": "2026-03-12", "relevancy": 2.2455, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4716}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4457}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.43}], " {"title": "AraModernBERT: Transtokenized Initialization and Long-Context Encoder Modeling for Arabic", "author": "Omar Elshehy and Omer Nacar and Abdelbasset Djamai and Muhammed Ragab and Khloud Al Jallad and Mona Abdelazim", "abstract": "Encoder-only transformer models remain widely used for discriminative NLP tasks, yet recent architectural advances have largely focused on English. In this work, we present AraModernBERT, an adaptation of the ModernBERT encoder architecture to Arabic, and study the impact of transtokenized embedding initialization and native long-context modeling up to 8,192 tokens. We show that transtokenization is essential for Arabic language modeling, yielding dramatic improvements in masked language modeling performance compared to non-transtokenized initialization. We further demonstrate that AraModernBERT supports stable and effective long-context modeling, achieving improved intrinsic language modeling performance at extended sequence lengths. Downstream evaluations on Arabic natural language understanding tasks, including inference, offensive language detection, question-question similarity, and named entity recognition, confirm strong transfer to discriminative and sequence labeling settings. Our results highlight practical considerations for adapting modern encoder architectures to Arabic and other languages written in Arabic-derived scripts.", "link": "http://arxiv.org/abs/2603.09982v2", "date": "2026-03-12", "relevancy": 2.2429, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4508}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4508}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.444}], "mailto": "mailto:haoxiang.li.2024@ s%20for%20adapting%20modern%20encoder%20architectures%20to%20Arabic%20and%20other%20languages%20written%20in%20Arabic-derived%20scripts.&entry.1838667208=http%3A//arxiv.org/abs/2603.09982v2&entry.124074799=Read"},
{"title": "Topological DeepONets and a generalization of the Chen-Chen operator approximation theorem", "author": "Vugar Ismailov", "abstract": "Deep Operator Networks (DeepONets) provide a branch-trunk neural architecture for approximating nonlinear operators acting between function spaces. In the classical operator approximation framework, the input is a function $u\\in C(K_1)$ defined on a compact set $K_1$ (typically a compact subset of a Banach space), and the operator maps $u$ to an output function $G(u)\\in C(K_2)$ defined on a compact Euclidean domain $K_2\\subset\\mathbb{R}^d$. In this paper, we develop a topological extension in which the operator input lies in an arbitrary Hausdorff locally convex space $X$. We construct topological feedforward neural networks on $X$ using continuous linear functionals from the dual space $X^*$ and introduce topological DeepONets whose branch component acts on $X$ through such linear measurements, while the trunk component acts on the Euclidean output domain. Our main theorem shows that continuous operators $G:V\\to C(K;\\mathbb{R}^m)$, where $V\\subset X$ and $K\\subset\\mathbb{R}^d$ are compact, can be uniformly approximated by such topological DeepONets. This extends the classical Chen-Chen operator approximation theorem from spaces of continuous functions to locally convex spaces and yields a branch-trunk approximation theorem beyond the Banach-space setting.", "link": "http://arxiv.org/abs/2603.11972v1", "date": "2026-03-12", "relevancy": 2.2423, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4662}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4602}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.419}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Topological%20DeepONets%20and%20a%20generalization%20of%20the%20Chen-Chen%20operator%20approximation%20theorem&body=Title%3A%20Topological%20DeepONets%20and%20a%20generalization%20of%20the%20Chen-Chen%20operator%20approximation%20theorem%0AAuthor%3A%20Vugar%20Ismailov%0AAbstract%3A%20Deep%20Operator%20Networks%20%28DeepONets%29%20provide%20a%20branch-trunk%20neural%20architecture%20for%20approximating%20nonlinear%20operators%20acting%20between%20function%20spaces.%20In%20the%20classical%20operator%20approximation%20framework%2C%20the%20input%20is%20a%20function%20%24u%5Cin%20C%28K_1%29%24%20defined%20on%20a%20compact%20set%20%24K_1%24%20%28typically%20a%20compact%20subset%20of%20a%20Banach%20space%29%2C%20and%20the%20operator%20maps%20%24u%24%20to%20an%20output%20function%20%24G%28u%29%5Cin%20C%28K_2%29%24%20defined%20on%20a%20compact%20Euclidean%20domain%20%24K_2%5Csubset%5Cmathbb%7BR%7D%5Ed%24.%20In%20this%20paper%2C%20we%20develop%20a%20topological%20extension%20in%20which%20the%20operator%20input%20lies%20in%20an%20arbitrary%20Hausdorff%20locally%20convex%20space%20%24X%24.%20We%20construct%20topological%20feedforward%20neural%20networks%20on%20%24X%24%20using%20continuous%20linear%20functionals%20from%20the%20dual%20space%20%24X%5E%2A%24%20and%20introduce%20topological%20DeepONets%20whose%20branch%20component%20acts%20on%20%24X%24%20through%20such%20linear%20measurements%2C%20while%20the%20trunk%20component%20acts%20on%20the%20Euclidean%20output%20domain.%20Our%20main%20theorem%20shows%20that%20continuous%20operators%20%24G%3AV%5Cto%20C%28K%3B%5Cmathbb%7BR%7D%5Em%29%24%2C%20where%20%24V%5Csubset%20X%24%20and%20%24K%5Csubset%5Cmathbb%7BR%7D%5Ed%24%20are%20compact%2C%20can%20be%20uniformly%20approximated%20by%20such%20topological%20DeepONets.%20This%20extends%20the%20classical%20Chen-Chen%20operator%20approximation%20theorem%20from%20spaces%20of%20continuous%20functions%20to%20locally%20convex%20spaces%20and%20yields%20a%20branch-trunk%20approximation%20theorem%20beyond%20the%20Banach-space%20setting.%0ALink%3A%20http%3A//arxiv.org/abs/2603.11972v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTopological%2520DeepONets%2520and%2520a%2520generalization%2520of%2520the%2520Chen-Chen%2520operator%2520approximation%2520theorem%26entry.906535625%3DVugar%2520Ismailov%26entry.1292438233%3DDeep%2520Operator%2520Networks%2520%2528DeepONets%2529%2520provide%2520a%2520branch-trunk%2520neural%2520architecture%2520for%2520approximating%2520nonlinear%2520operators%2520acting%2520between%2520function%2520spaces.%2520In%2520the%2520classical%2520operator%2520approximation%2520framework%252C%2520the%2520input%2520is%2520a%2520function%2520%2524u%255Cin%2520C%2528K_1%2529%2524%2520defined%2520on%2520a%2520compact%2520set%2520%2524K_1%2524%2520%2528typically%2520a%2520compact%2520subset%2520of%2520a%2520Banach%2520space%2529%252C%2520and%2520the%2520operator%2520maps%2520%2524u%2524%2520to%2520an%2520output%2520function%2520%2524G%2528u%2529%255Cin%2520C%2528K_2%2529%2524%2520defined%2520on%2520a%2520compact%2520Euclidean%2520domain%2520%2524K_2%255Csubset%255Cmathbb%257BR%257D%255Ed%2524.%2520In%2520this%2520paper%252C%2520we%2520develop%2520a%2520topological%2520extension%2520in%2520which%2520the%2520operator%2520input%2520lies%2520in%2520an%2520arbitrary%2520Hausdorff%2520locally%2520convex%2520space%2520%2524X%2524.%2520We%2520construct%2520topological%2520feedforward%2520neural%2520networks%2520on%2520%2524X%2524%2520using%2520continuous%2520linear%2520functionals%2520from%2520the%2520dual%2520space%2520%2524X%255E%252A%2524%2520and%2520introduce%2520topological%2520DeepONets%2520whose%2520branch%2520component%2520acts%2520on%2520%2524X%2524%2520through%2520such%2520linear%2520measurements%252C%2520while%2520the%2520trunk%2520component%2520acts%2520on%2520the%2520Euclidean%2520output%2520domain.%2520Our%2520main%2520theor {"title": "Multimodal Emotion Recognition via Bi-directional Cross-Attention and Temporal Modeling", "author": "Junhyeong Byeon and Jeongyeol Kim and Sejoon Lim", "abstract": "Emotion recognition in in-the-wild video data remains a challenging problem due to large variations in facial appearance, head pose, illumination, background noise, and the inherently dynamic nature of human affect. Relying on a single modality, such as facial expressions or speech, is often insufficient to capture these complex emotional cues. To address this issue, we propose a multimodal emotion recognition framework for the Expression (EXPR) Recognition task in the 10th Affective Behavior Analysis in-the-wild (ABAW) Challenge.\n  Our approach leverages large-scale pre-trained models, namely CLIP for visual encoding and Wav2Vec 2.0 for audio representation learning, as frozen backbone networks. To model temporal dependencies in facial expression sequences, we employ a Temporal Convolutional Network (TCN) over fixed-length video windows. In addition, we introduce a bi-directional cross-attention fusion module, in which visual and audio features interact symmetrically to enhance cross-modal contextualization and capture complementary emotional information. A lightweight classification head is then used for final emotion prediction. We further incorporate a text-guided contrastive objective based on CLIP text features to encourage semantically aligned visual representations.\n  Experimental results on the ABAW 10th EXPR benchmark show that the proposed framework provides a strong multimodal baseline and achieves improved performance over unimodal modeling. These results demonstrate the effectiveness of combining temporal visual modeling, audio representation learning, and cross-modal fusion for robust emotion recognition in unconstrained real-world environments.", "link": "http://arxiv.org/abs/2603.11971v1", "date": "2026-03-12", "relevancy": 2.2387, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5939}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5392}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5337}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multimodal%20Emotion%20Recognition%20via%20Bi-directional%20Cross-Attention%20and%20Temporal%20Modeling&body=Title%3A%20Multimodal%20Emotion%20Recognition%20via%20Bi-directional%20Cross-Attention%20and%20Temporal%20Modeling%0AAuthor%3A%20Junhyeong%20Byeon%20and%20Jeongyeol%20Kim%20and%20Sejoon%20Lim%0AAbstract%3A%20Emotion%20recognition%20in%20in-the-wild%20video%20data%20remains%20a%20challenging%20problem%20due%20to%20large%20variations%20in%20facial%20appearance%2C%20head%20pose%2C%20illumination%2C%20background%20noise%2C%20and%20the%20inherently%20dynamic%20nature%20of%20human%20affect.%20Relying%20on%20a%20single%20modality%2C%20such%20as%20facial%20expressions%20or%20speech%2C%20is%20often%20insufficient%20to%20capture%20these%20complex%20emotional%20cues.%20To%20address%20this%20issue%2C%20we%20propose%20a%20multimodal%20emotion%20recognition%20framework%20for%20the%20Expression%20%28EXPR%29%20Recognition%20task%20in%20the%2010th%20Affective%20Behavior%20Analysis%20in-the-wild%20%28ABAW%29%20Challenge.%0A%20%20Our%20approach%20leverages%20large-scale%20pre-trained%20models%2C%20namely%20CLIP%20for%20visual%20encoding%20and%20Wav2Vec%202.0%20for%20audio%20representation%20learning%2C%20as%20frozen%20backbone%20networks.%20To%20model%20temporal%20dependencies%20in%20facial%20expression%20sequences%2C%20we%20employ%20a%20Temporal%20Convolutional%20Network%20%28TCN%29%20over%20fixed-length%20video%20windows.%20In%20addition%2C%20we%20introduce%20a%20bi-directional%20cross-attention%20fusion%20module%2C%20in%20which%20visual%20and%20audio%20features%20interact%20symmetrically%20to%20enhance%20cross-modal%20contextualization%20and%20capture%20complementary%20emotional%20information.%20A%20lightweight%20classification%20head%20is%20then%20used%20for%20final%20emotion%20prediction.%20We%20further%20incorporate%20a%20text-guided%20contrastive%20objective%20based%20on%20CLIP%20text%20features%20to%20encourage%20semantically%20aligned%20visual%20representations.%0A%20%20Experimental%20results%20on%20the%20ABAW%2010th%20EXPR%20benchmark%20show%20that%20the%20proposed%20framework%20provides%20a%20strong%20multimodal%20baseline%20and%20achieves%20improved%20performance%20over%20unimodal%20modeling.%20These%20results%20demonstrate%20the%20effectiveness%20of%20combining%20temporal%20visual%20modeling%2C%20audio%20representation%20learning%2C%20and%20cross-modal%20fusion%20for%20robust%20emotion%20recognition%20in%20unconstrained%20real-world%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2603.11971v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMultimodal%2520Emotion%2520Recognition%2520via%2520Bi-directional%2520Cross-Attention%2520and%2520Temporal%2520Modeling%26entry.906535625%3DJunhyeong%2520Byeon%2520and%2520Jeongyeol%2520Kim%2520and%2520Sejoon%2520Lim%26entry.1292438233%3DEmotion%2520recognition%2520in%2520in-the-wild%2520video%2520data%2520remains%2520a%2520challenging%2520problem%2520due%2520to%2520large%2520variations%2520in%2520facial%2520appearance%252C%2520head%2520pose%252C%2520illumination%252C%2520background%2520noise%252C%2520and%2520the%2520inherently%2520dynamic%2520nature%2520of%2520human%2520affect.%2520Relying%2520on%2520a%2520single%2520modality%252C%2520such%2520as%2520facial%2520expressions%2520or%2520speech%252C%2520is%2520often%2520insufficient%2520to%2520capture%2520these%2520complex%2520emotional%2520cues.%2520To%

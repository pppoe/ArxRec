{"title": "SceneAssistant: A Visual Feedback Agent for Open-Vocabulary 3D Scene Generation", "author": "Jun Luo and Jiaxiang Tang and Ruijie Lu and Gang Zeng", "abstract": "Text-to-3D scene generation from natural language is highly desirable for digital content creation. However, existing methods are largely domain-restricted or reliant on predefined spatial relationships, limiting their capacity for unconstrained, open-vocabulary 3D scene synthesis. In this paper, we introduce SceneAssistant, a visual-feedback-driven agent designed for open-vocabulary 3D scene generation. Our framework leverages modern 3D object generation model along with the spatial reasoning and planning capabilities of Vision-Language Models (VLMs). To enable open-vocabulary scene composition, we provide the VLMs with a comprehensive set of atomic operations (e.g., Scale, Rotate, FocusOn). At each interaction step, the VLM receives rendered visual feedback and takes actions accordingly, iteratively refining the scene to achieve more coherent spatial arrangements and better alignment with the input text. Experimental results demonstrate that our method can generate diverse, open-vocabulary, and high-quality 3D scenes. Both qualitative analysis and quantitative human evaluations demonstrate the superiority of our approach over existing methods. Furthermore, our method allows users to instruct the agent to edit existing scenes based on natural language commands. Our code is available at https://github.com/ROUJINN/SceneAssistant", "link": "http://arxiv.org/abs/2603.12238v1", "date": "2026-03-12", "relevancy": 2.6514, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6757}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6603}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6603}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SceneAssistant%3A%20A%20Visual%20Feedback%20Agent%20for%20Open-Vocabulary%203D%20Scene%20Generation&body=Title%3A%20SceneAssistant%3A%20A%20Visual%20Feedback%20Agent%20for%20Open-Vocabulary%203D%20Scene%20Generation%0AAuthor%3A%20Jun%20Luo%20and%20Jiaxiang%20Tang%20and%20Ruijie%20Lu%20and%20Gang%20Zeng%0AAbstract%3A%20Text-to-3D%20scene%20generation%20from%20natural%20language%20is%20highly%20desirable%20for%20digital%20content%20creation.%20However%2C%20existing%20methods%20are%20largely%20domain-restricted%20or%20reliant%20on%20predefined%20spatial%20relationships%2C%20limiting%20their%20capacity%20for%20unconstrained%2C%20open-vocabulary%203D%20scene%20synthesis.%20In%20this%20paper%2C%20we%20introduce%20SceneAssistant%2C%20a%20visual-feedback-driven%20agent%20designed%20for%20open-vocabulary%203D%20scene%20generation.%20Our%20framework%20leverages%20modern%203D%20object%20generation%20model%20along%20with%20the%20spatial%20reasoning%20and%20planning%20capabilities%20of%20Vision-Language%20Models%20%28VLMs%29.%20To%20enable%20open-vocabulary%20scene%20composition%2C%20we%20provide%20the%20VLMs%20with%20a%20comprehensive%20set%20of%20atomic%20operations%20%28e.g.%2C%20Scale%2C%20Rotate%2C%20FocusOn%29.%20At%20each%20interaction%20step%2C%20the%20VLM%20receives%20rendered%20visual%20feedback%20and%20takes%20actions%20accordingly%2C%20iteratively%20refining%20the%20scene%20to%20achieve%20more%20coherent%20spatial%20arrangements%20and%20better%20alignment%20with%20the%20input%20text.%20Experimental%20results%20demonstrate%20that%20our%20method%20can%20generate%20diverse%2C%20open-vocabulary%2C%20and%20high-quality%203D%20scenes.%20Both%20qualitative%20analysis%20and%20quantitative%20human%20evaluations%20demonstrate%20the%20superiority%20of%20our%20approach%20over%20existing%20methods.%20Furthermore%2C%20our%20m {"title": "DreamVideo-Omni: Omni-Motion Controlled Multi-Subject Video Customization with Latent Identity Reinforcement Learning", "author": "Yujie Wei and Xinyu Liu and Shiwei Zhang and Hangjie Yuan and Jinbo Xing and Zhekai Chen and Xiang Wang and Haonan Qiu and Rui Zhao and Yutong Feng and Ruihang Chu and Yingya Zhang and Yike Guo and Xihui Liu and Hongming Shan", "abstract": "While large-scale diffusion models have revolutionized video synthesis, achieving precise control over both multi-subject identity and multi-granularity motion remains a significant challenge. Recent attempts to bridge this gap often suffer from limited motion granularity, control ambiguity, and identity degradation, leading to suboptimal performance on identity preservation and motion control. In this work, we present DreamVideo-Omni, a unified framework enabling harmonious multi-subject customization with omni-motion control via a progressive two-stage training paradigm. In the first stage, we integrate comprehensive control signals for joint training, encompassing subject appearances, global motion, local dynamics, and camera movements. To ensure robust and precise controllability, we introduce a condition-aware 3D rotary positional embedding to coordinate heterogeneous inputs and a hierarchical motion injection strategy to enhance global motion guidance. Furthermore, to resolve multi-subject ambiguity, we introduce group and role embeddings to explicitly anchor motion signals to specific identities, effectively disentangling complex scenes into independent controllable instances. In the second stage, to mitigate identity degradation, we design a latent identity reward feedback learning paradigm by training a latent identity reward model upon a pretrained video diffusion backbone. This provides motion-aware identity rewards in the latent space, prioritizing identity preservation aligned with human preferences. Supported by our curated large-scale dataset and the comprehensive DreamOmni B {"title": "Video Streaming Thinking: VideoLLMs Can Watch and Think Simultaneously", "author": "Yiran Guan and Liang Yin and Dingkang Liang and Jianzhong Ju and Zhenbo Luo and Jian Luan and Yuliang Liu and Xiang Bai", "abstract": "Online Video Large Language Models (VideoLLMs) play a critical role in supporting responsive, real-time interaction. Existing methods focus on streaming perception, lacking a synchronized logical reasoning stream. However, directly applying test-time scaling methods incurs unacceptable response latency. To address this trade-off, we propose Video Streaming Thinking (VST), a novel paradigm for streaming video understanding. It supports a thinking while watching mechanism, which activates reasoning over incoming video clips during streaming. This design improves timely comprehension and coherent cognition while preserving real-time responsiveness by amortizing LLM reasoning latency over video playback. Furthermore, we introduce a comprehensive post-training pipeline that integrates VST-SFT, which structurally adapts the offline VideoLLM to causal streaming reasoning, and VST-RL, which provides end-to-end improvement through self-exploration in a multi-turn video interaction environment. Additionally, we devise an automated training-data synthesis pipeline that uses video knowledge graphs to generate high-quality streaming QA pairs, with an entity-relation grounded streaming Chain-of-Thought to enforce multi-evidence reasoning and sustained attention to the video stream. Extensive evaluations show that VST-7B performs strongly on online benchmarks, e.g. 79.5% on StreamingBench and 59.3% on OVO-Bench. Meanwhile, VST remains competitive on offline long-form or reasoning benchmarks. Compared with Video-R1, VST responds 15.7 times faster and achieves +5.4% improvement on VideoHolmes, demonstrating higher efficiency and strong generalization across diverse video understanding tasks. Code, data, and models will be released at https://github.com/1ranGuan/VST.", "link": "http://arxiv.org/abs/2603.12262v1", "date": "2026-03-12", "relevancy": 2.6486, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5312}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.529}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.529}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Video%20Streaming%20Thinking%3A%20VideoLLMs%20Can%20Watch%20and%20Think%20Simultaneously&body=Title%3A%20Video%20Streaming%20Thinking%3A%20VideoLLMs%20Can%20Watch%20and%20Think%20Simultaneously%0AAuthor%3A%20Yiran%20Guan%20and%20Liang%20Yin%20and%20Dingkang%20Liang%20and%20Jianzhong%20Ju%20and%20Zhenbo%20Luo%20and%20Jian%20Luan%20and%20Yuliang%20Liu%20and%20Xiang%20Bai%0AAbstract%3A%20Online%20Video%20Large%20Language%20Models%20%28VideoLLMs%29%20play%20a%20critical%20role%20in%20supporting%20responsive%2C%20real-time%20interaction.%20Existing%20methods%20focus%20on%20streaming%20perception%2C%20lacking%20a%20synchronized%20logical%20reasoning%20stream.%20However%2C%20directly%20applying%20test-time%20scaling%20methods%20incurs%20unacceptable%20response%20latency.%20To%20address%20this%20trade-off%2C%20we%20propose%20Video%20Streaming%20Thinking%20%28VST%29%2C%20a%20novel%20paradigm%20for%20streaming%20video%20understanding.%20It%20supports%20a%20thinking%20while%20watching%20mechanism%2C%20which%20activates%20reasoning%20over%20incoming%20video%20clips%20during%20streaming.%20This%20design%20improves%20timely%20comprehension%20and%20coherent%20cognition%20while%20preserving%20real-time%20responsiveness%20by%20amortizing%20LLM%20reasoning%20latency%20over%20video%20playback.%20Furthermore%2C%20we%20introduce%20a%20comprehensive%20post-training%20pipeline%20that%20integrates%20VST-SFT%2C%20which%20structurally%20adapts%20the%20offline%20VideoLLM%20to%20causal%20streaming%20reasoning%2C%20and%20VST-RL%2C%20which%20provides%20end-to-end%20improvement%20through%20self-exploration%20in%20a%20multi-turn%20video%20interaction%20environment.%20Additionally%2C%20we%20devise%20an%20automated%20training-data%20synthesis%20pipeline%20that%20uses%20video%20knowledge%20graphs%20to%20generate%20high-quality%20streaming%20QA%20pairs%2C%20with%20an%20entity-relation%20grounded%20streaming%20Chain-of-Thought%20to%20enforce%20multi-evidence%20reasoning%20and%20sustained%20attention%20to%20the%20video%20stream.%20Extensive%20evaluations%20show%20that%20VST-7B%20performs%20strongly%20on%20online%20benchmarks%2C%20e.g.%2079.5%25%20on%20StreamingBench%20and%2059.3%25%20on%20OVO-Bench.%20Meanwhile%2C%20VST%20remains%20competitive%20on%20offline%20long-form%20or%20reasoning%20benchmarks.%20Compared%20with%20Video-R1%2C%20VST%20responds%2015.7%20times%20faster%20and%20achieves%20%2B5.4%25%20improvement%20on%20VideoHolmes%2C%20demonstrating%20higher%20efficiency%20and%20strong%20generalization%20across%20diverse%20video%20understanding%20tasks.%20Code%2C%20data%2C%20and%20models%20will%20be%20released%20at%20https%3A//github.com/1ranGuan/VST.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12262v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVideo%2520Streaming%2520Thinking%253A%2520VideoLLMs%2520Can%2520Watch%2520and%2520Think%2520Simultaneously%26entry.906535625%3DYiran%2520Guan%2520and%2520Liang%2520Yin%2520and%2520Dingkang%2520Liang%2520and%2520Jianzhong%2520Ju%2520and%2520Zhenbo%2520Luo%2520and%2520Jian%2520Luan%2520and%2520Yuliang%2520Liu%2520and%2520Xiang%2520Bai%26entry.1292438233%3DOnline%2520Video%2520Large%2520Language%2520Models%2520%2528VideoLLMs%2529%2520play%2520a%2520critical%2520role%2520in%2520supporting%2520responsive%252C%2520r {"title": "NeuralOS: Towards Simulating Operating Systems via Neural Generative Models", "author": "Luke Rivard and Sun Sun and Hongyu Guo and Wenhu Chen and Yuntian Deng", "abstract": "We introduce NeuralOS, a neural framework that simulates graphical user interfaces (GUIs) of operating systems by directly predicting screen frames in response to user inputs such as mouse movements, clicks, and keyboard events. NeuralOS combines a recurrent neural network (RNN), which tracks computer state, with a diffusion-based neural renderer that generates screen images. The model is trained on a dataset of Ubuntu XFCE recordings, which include both randomly generated interactions and realistic interactions produced by AI agents. Experiments show that NeuralOS successfully renders realistic GUI sequences, accurately captures mouse interactions, and reliably predicts state transitions like application launches. Beyond reproducing existing systems, NeuralOS shows that synthesized training data can teach the model to simulate applications that were never installed, as illustrated by a Doom application, and suggests a path toward learning user interfaces purely from synthetic demonstrations.", "link": "http://arxiv.org/abs/2507.08800v2", "date": "2026-03-12", "relevancy": 2.643, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5471}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5219}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5168}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NeuralOS%3A%20Towards%20Simulating%20Operating%20Systems%20via%20Neural%20Generative%20Models&body=Title%3A%20NeuralOS%3A%20Towards%20Simulating%20Operating%20Systems%20via%20Neural%20Generative%20Models%0AAuthor%3A%20Luke%20Rivard%20and%20Sun%20Sun%20and%20 perating%2520systems%2520by%2520directly%2520predicting%2520screen%2520frames%2520in%2520response%2520to%2520user%2520inputs%2520such%2520as%2520mouse%2520movements%252C%2520clicks%252C%2520and%2520keyboard%2520events.%2520NeuralOS%2520combines%2520a%2520recurrent%2520neural%2520network%2520%2528RNN%2529%252C%2520which%2520tracks%2520computer%2520state%252C%2520with%2520a%2520diffusion-based%2520neural%2520renderer%2520that%2520generates%2520screen%2520images.%2520The%2520model%2520is%2520trained%2520on%2520a%2520dataset%2520of%2520Ubuntu%2520XFCE%2520recordings%252C%2520which%2520include%2520both%2520randomly%2520generated%2520interactions%2520and%2520realistic%2520interactions%2520produced%2520by%2520AI%2520agents.%2520Experiments%2520show%2520that%2520NeuralOS%2520successfully%2520renders%2520realistic%2520GUI%2520sequences%252C%2520accurately%2520captures%2520mouse%2520interactions%252C%2520and%2520reliably%2520predicts%2520state%2520transitions%2520like%2520application%2520launches.%2520Beyond%2520reproducing%2520existing%2520systems%252C%2520NeuralOS%2520shows%2520that%2520synthesized%2520training%2520data%2520can%2520teach%2520the%2520model%2520to%2520simulate%2520applications%2520that%2520were%2520never%2520installed%252C%2520as%2520illustrated%2520by%2520a%2520Doom%2520application%252C%2520and%2520suggests%2520a%2520path%2520toward%2520learning%2520user%2520interfaces%2520purely%2520from%2520synthetic%2520demonstrations.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2507.08800v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=NeuralOS%3A%20Towards%20Simulating%20Operating%20Systems%20via%20Neural%20Generative%20Models&entry.906535625=Luke%20Rivard%20and%20Sun%20Sun%20and%20Hongyu%20Guo%20and%20Wenhu%20Chen%20and%20Yuntian%20Deng&entry.1292438233=We%20introduce%20NeuralOS%2C%20a%20neural%20framework%20that%20simulates%20graphical%20user%20interfaces%20%28 {"title": "Preliminary analysis of RGB-NIR Image Registration techniques for off-road forestry environments", "author": "Pankaj Deoli and Karthik Ranganath and Karsten Berns", "abstract": "RGB-NIR image registration plays an important role in sensor-fusion, image enhancement and off-road autonomy. In this work, we evaluate both classical and Deep Learning (DL) based image registration techniques to access their suitability for off-road forestry applications. NeMAR, trained under 6 different configurations, demonstrates partial success however, its GAN loss instability suggests challenges in preserving geometric consistency. MURF, when tested on off-road forestry data shows promising large scale feature alignment during shared information extraction but struggles with fine details in dense vegetation. Even though this is just a preliminary evaluation, our study necessitates further refinements for robust, multi-scale registration for off-road forest applications.", "link": "http://arxiv.org/abs/2603.11952v1", "date": "2026-03-12", "relevancy": 2.6249, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5314}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5245}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.519}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Preliminary%20analysis%20of%20RGB-NIR%20Image%20Registration%20techniques%20for%20off-road%20forestry%20environments&body=Title%3A%20Preliminary%20analysis%20of%20RGB-NIR%20Image%20Registration%20techniques%20for%20off-road%20forestry%20environments%0AAuthor%3A%20Pankaj%20Deoli%20and%20Karthik%20Ranganath%20and%20Karsten%20Berns%0AAbstract%3A%20RGB {"title": "Statistical and structural identifiability in representation learning", "author": "Walter Nelson and Marco Fumero and Theofanis Karaletsos and Francesco Locatello", "abstract": "Representation learning models exhibit a surprising stability in their internal representations. Whereas most prior work treats this stability as a single property, we formalize it as two distinct concepts: statistical identifiability (consistency of representations across runs) and structural identifiability (alignment of representations with some unobserved ground truth). Recognizing that perfect pointwise identifiability is generally unrealistic for modern representation learning models, we propose new model-agnostic definitions of statistical and structural near-identifiability of representations up to some error tolerance $\u03b5$. Leveraging these definitions, we prove a statistical $\u03b5$-near-identifiability result for the representations of models with nonlinear decoders, generalizing existing identifiability theory beyond last-layer representations in e.g. generative pre-trained transformers (GPTs) to near-identifiability of the intermediate representations of a broad class of models including (masked) autoencoders (MAEs) and supervised learners. Although these weaker assumptions confer weaker identifiability, we show that independent components analysis (ICA) can resolve much of the remaining linear ambiguity for this class of models, and validate and measure our near-identifiability claims empirically. With additional assumptions on the data-generating process, statistical identifiability extends to structural identifiability, yielding a simple and practical recipe for disentanglement: ICA post-processing of latent representations. On synthetic benchmarks, this approach achieves state-of-the-art disentanglement using a vanilla autoencoder. With a foundation model-scale MAE for cell microscopy, it disentangles biological variation from technical batch effects, substantially improving downstream generalization.", "link": "http://arxiv.org/abs/2603.11970v1", "date": "2026-03-12", "relevancy": 2.6213, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5388}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5331}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5009}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Statistical%20and%20structural%20identifiability%20in%20representation%20learning&body=Title%3A%20Statistical%20and%20structural%20identifiability%20in%20representation%20learning%0AAuthor%3A%20Walter%20Nelson%20and%20Marco%20Fumero%20and%20Theofanis%20Karaletsos%20and%20Francesco%20Locatello%0AAbstract%3A%20Representation%20learning%20models%20exhibit%20a%20surprising%20stability%20in%20their%20internal%20representations.%20Whereas%20most%20prior%20work%20treats%20this%20stability%20as%20a%20single%20property%2C%20we%20formalize%20it%20as%20two%20distinct%20concepts%3A%20statistical%20identifiability%20%28consistency%20of%20representations%20across%20runs%29%20and%20structural%20identifiability%20%28alignment%20of%20representations%20with%20some%20unobserved%20ground%20truth%29.%20Recognizing%20that%20perfect%20pointwise%20identifiability%20is%20generally%20unrealistic%20for%20modern%20representation%20learning%20models%2C%20we%20propose%20new%20model-agnostic%20definitions%20of%20statistical%20and%20structural%20near-identifiability%20of%20representations%20up%20to%20some%20error%20tolerance%20%24%CE%B5%24.%20Leveraging%20these%20definitions%2C%20we%20prove%20a%20statistical%20%24%CE%B5%24-near-identifiability%20result%20for%20the%20representations%20of%20models%20with%20nonlinear%20decoders%2C%20generalizing%20existing%20identifiability%20theory%20beyond%20last-layer%20representations%20in%20e.g.%20generative%20pre-trained%20transformers%20%28GPTs%29%20to%20near-identifiability%20of%20the%20intermediate%20representations%20of%20a%20broad%20class%20of%20models%20including%20%28masked%29%20autoencoders%20%28MAEs%29%20and%20supervised%20learners.%20Although%20these%20weaker%20assumptions%20confer%20weaker%20identifiability%2C%20we%20show%20that%20independent%20components%20analysis%20%28ICA%29%20can%20resolve%20much%20of%20the%20remaining%20linear%20ambiguity%20for%20this%20class%20of%20models%2C%20and%20validate%20and%20measure%20our%20near-identifiability%20claims%20empirically.%20With%20additional%20assumptions%20on%20the%20data-generating%20process%2C%20statistical%20identifiability%20extends%20to%20structural%20identifiability%2C%20yielding%20a%20simple%20and%20practical%20recipe%20for%20disentanglement%3A%20ICA%20post-processing%20of%20latent%20representations.%20On%20synthetic%20benchmarks%2C%20this%20approach%20achieves%20state-of-the-art%20disentanglement%20using%20a%20vanilla%20autoencoder.%20With%20a%20foundation%20model-scale%20MAE%20for%20cell%20microscopy%2C%20it%20disentangles%20biological%20variation%20from%20technical%20batch%20effects%2C%20substantially%20improving%20downstream%20generalization.%0ALink%3A%20http%3A//arxiv.org/abs/2603.11970v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStatistical%2520and%2520structural%2520identifiability%2520in%2520representation%2520learning%26entry.906535625%3DWalter%2520Nelson%2520and%2520Marco%2520Fumero%2520and%2520Theofanis%2520Karaletsos%2520and%2520Francesco%2520Locatello%26entry.1292438233%3DRepresentation%2520learning%2520models%2520exhibit%2520a%2520surprising%2520stability%2520in%2520their%2520inter {"title": "Adaptive Dual-Constrained Line Aggregation for Robust Generic and Wireframe Line Segment Detection", "author": "Chenguang Liu and Chisheng Wang and Huilin Chen and Chuanhua Zhu and Qingquan Li", "abstract": "Line segment detection in images has been studied for several decades. Existing methods can be roughly divided into two categories: generic line segment detectors and wireframe line segment detectors. Generic detectors aim to detect all meaningful line segments in images and traditional approaches usually fall into this category. Recent deep learning based approaches are mostly wireframe detectors. They detect only line segments that are geometrically meaningful and have large spatial support. Due to the difference in the aim of design, methods designed for one paradigm often perform poorly on the other, and few approaches demonstrate robust performance across both tasks. In this work, we propose a robust framework that is efficient for both tasks based on an Adaptive Dual-Constrained Line Aggregation (ADLA) algorithm. ADLA aggregates pixels into candidate line segments only if they satisfy dual geometric constraints: (1) orientation coherence and (2) bounded orthogonal distance to an adaptively estimated line model. Crucially, the parameters of the candidate line (its orientation and centroid) are dynamically updated as new pixels are incorporated. This progressive model refinement improves geometric accuracy. Moreover, by leveraging edge strength maps in orientation estimation and line segment validation, ADLA requires little parameter tuning. Extensive experiments on three publicly available datasets demonstrate that ADLA achieves competitive or superior performance than previous methods, highlighting its robustness, versatility, and practical usability.", "link": "http://arxiv.org/abs/2508.19742v3", "date": "2026-03-12", "relevancy": 2.6125, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5465}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.518}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.503}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Adaptive%20Dual-Constrained%20Line%20Aggregation%20for%20Robust%20Generic%20and%20Wireframe%20Line%20Segment%20Detection&body=Title%3A%20Adaptive%20Dual-Constrained%20Line%20Aggregation%20for%20Robust%20Generic%20and%20Wireframe%20Line%20Segment%20Detection%0AAuthor%3A%20Chenguang%20Liu%20and%20Chisheng%20Wang%20and%20Huilin%20Chen%20and%20Chuanhua%20Zhu%20and%20Qingquan%20Li%0AAbstract%3A%20Line%20segment%20detection%20in%20images%20has%20been%20studied%20for%20several%20decades.%20Existing%20methods%20can%20be%20roughly%20divided%20into%20two%20categories%3A%20generic%20line%20segment%20detectors%20and%20wireframe%20line%20segment%20detectors.%20Generic%20detectors%20aim%20to%20detect%20all%20meaningful%20line%20segments%20in%20images%20and%20traditional%20approaches%20usually%20fall%20into%20this%20category.%20Recent%20deep%20learning%20based%20approaches%20are%20mostly%20wireframe%20detectors.%20They%20detect%20only%20line%20segments%20that%20are%20geometrically%20meaningful%20and%20have%20large%20spatial%20support.%20Due%20to%20the%20difference%20in%20the%20aim%20of%20design%2C%20methods%20designed%20for%20one%20paradigm%20often%20perform%20poorly%20on%20the%20other%2C%20and%20few%20approaches%20demonstrate%20robust%20performance%20across%20both%20tasks.%20In%20this%20work%2C%20we%20propose%20a%20robust%20framework%20that%20is%20efficient%20for%20both%20tasks%20based%20on%20an%20Adaptive%20Dual-Constrained%20Line%20Aggregation%20%28ADLA%29%20algorithm.%20ADLA%20aggregates%20pixels%20into%20candidate%20line%2 {"title": "Weakly Supervised Teacher-Student Framework with Progressive Pseudo-mask Refinement for Gland Segmentation", "author": "Hikmat Khan and Wei Chen and Muhammad Khalid Khan Niazi", "abstract": "Background and objectives: Colorectal cancer histopathological grading depends on accurate segmentation of glandular structures. Current deep learning approaches rely on large scale pixel level annotations that are labor intensive and difficult to obtain in routine clinical practice. Weakly supervised semantic segmentation offers a promising alternative. However, class activation map based methods often produce incomplete pseudo masks that emphasize highly discriminative regions and fail to supervise unannotated glandular structures. We propose a weakly supervised teacher student framework that leverages sparse pathologist annotations and an Exponential Moving Average stabilized teacher network to generate refined pseudo masks.\n  Methods: The framework integrates confidence based filtering, adaptive fusion of teacher predictions with limited ground truth, and curriculum guided refinement to progressively segment unannotated glandular regions. The method was evaluated on an institutional colorectal cancer cohort from The Ohio State University Wexner Medical Center consisting of 60 hematoxylin and eosin stained whole slide images and on public datasets including the Gland Segmentation dataset, TCGA COAD, TCGA READ, and SPIDER.\n  Results: On the Gland Segmentation dataset the framework achieved a mean Intersection over Union of 80.10 and a mean Dice coefficient of 89.10. Cross cohort evaluation demonstrated robust generalization on TCGA COAD and TCGA READ without additional annotations, while reduced performance on SPIDER reflected domain shift.\n  Conclusions: The proposed framework provides an annotation efficient and generalizable approach for gland segmentation in colorectal histopathology.", "link": "http://arxiv.org/abs/2603.08605v2", "date": "2026-03-12", "relevancy": 2.6014, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5264}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5246}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5099}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Weakly%20Supervised%20Teacher-Student%20Framework%20with%20Progressive%20Pseudo-mask%20Refinement%20for%20Gland%20Segmentation&body=Title%3A%20Weakly%20Supervised%20Teacher-Student%20Framework%20with%20Progressive%20Pseudo-mask%20Refinement%20for%20Gland%20Segmentation%0AAuthor%3A%20Hikmat%20Khan%20and%20Wei%20Chen%20and%20Muhammad%20Khalid%20Khan%20Niazi%0AAbstract%3A%20Background%20and%20objectives%3A%20Colorectal%20cancer%20histopathological%20grading%20depends%20on%20accurate%20segmentation%20of%20glandular%20structures.%20Current%20deep%20learning%20approaches%20rely%20on%20large%20scale%20pixel%20level%20annotations%20that%20are%20labor%20intensive%20and%20difficult%20to%20obtain%20in%20routine%20clinical%20practice.%20Weakly%20supervised%20semantic%20segmentation%20offers%20a%20promising%20alternative.%20However%2C%20class%20activation%20map%20based%20methods%20often%20produce%20incomplete%20pseudo%20masks%20that%20emphasize%20highly%20discriminative%20regions%20and%20fail%20to%20supervise%20unannotated%20glandular%20structures.%20We%20propose%20a%20weakly%20supervised%20teacher%20student%20framework%20that%20leverages%20sparse%20pathologist%20annotations%20and%20an%20Exponential%20Moving%20Average%20stabilized%20teacher%20network%20to%20generate%20refined%20pseudo%20masks.%0A%20%20Methods%3A%20The%20framework%20integrates%20confidence%20based%20filtering%2C%20adaptive%20fusion%20of%20teacher%20predictions%20with%20limited%20ground%20truth%2C%20and%20curriculum%20guided%20refinement%20to%20progressively%20segment%20unannotated%20glandular%20regions.%20The%20method%20was%20evaluated%20on%20an%20institutional%20colorectal%20cancer%20cohort%20from%20The%20Ohio%20State%20University%20Wexner%20Medical%20Center%20consisting%20of%2060%20hematoxylin%20and%20eosin%20stained%20whole%20slide%20images%20and%20on%20public%20datasets%20including%20the%20Gland%20Segmentation%20dataset%2C%20TCGA%20COAD%2C%20TCGA%20READ%2C%20and%20SPIDER.%0A%20%20Results%3A%20On%20the%20Gland%20Segmentation%20dataset%20the%20framework%20achieved%20a%20mean%20Intersection%20over%20Union%20of%2080.10%20and%20a%20mean%20Dice%20coefficient%20of%2089.10.%20Cross%20cohort%20evaluation%20demonstrated%20robust%20generalization%20on%20TCGA%20COAD%20and%20TCGA%20READ%20without%20additional%20annotations%2C%20while%20reduced%20performance%20on%20SPIDER%20reflected%20domain%20shift.%0A%20%20Conclusions%3A%20The%20proposed%20framework%20provides%20an%20annotation%20efficient%20and%20generalizable%20approach%20for%20gland%20segmentation%20in%20colorectal%20histopathology.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08605v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWeakly%2520Supervised%2520Teacher-Student%2520Framework%2520with%2520Progressive%2520Pseudo-mask%2520Refinement%2520for%2520Gland%2520Segmentation%26entry.906535625%3DHikmat%2520Khan%2520and%2520Wei%2520Chen%2520and%2520Muhammad%2520Khalid%2520Khan%2520Niazi%26entry.1292438233%3DBackground%2520and%2520objectives%253A%2520Colorectal%2520cancer%2520histopathological%2520grading%2520depends%2520on%2520accurate%2520segmentation%2520of%2520glandular%2520structures.%2520Current%2520deep%2520learning%2520approaches%2520rely%2520on%2520large%2520scale%2520pixel%2520level%2520annotations%2520that%2520are%2520labor%2520intensive%2520and%2520 %252C%2520while%2520reduced%2520performance%2520on%2520SPIDER%2520reflected%2520domain%2520shift.%250A%2520%2520Conclusions%253A%2520The%2520proposed%2520framework%2520provides%2520an%2520annotation%2520efficient%2520and%2520generalizable%2520approach%2520for%2520gland%2520segmentation%2520in%2520colorectal%2520histopathology.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.08605v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Weakly%20Supervised%20Teacher-Student%20Framework%20with%20Progressive%20Pseudo-mask%20Refinement%20for%20Gland%20Segmentation&entry.906535625=Hikmat%20Khan%20and%20Wei%20Chen%20and%20Muhammad%20Khalid%20Khan%20Niazi&entry.1292438233=Background%20and%20objectives%3A%20Colorectal%20cancer%20histopathological%20grading%20depends%20on%20accurate%20segmentation%20of%20glandular%20structures.%20Current%20deep%20learning%20approaches%20rely%20on%20large%20scale%20pixel%20level%20annotations%20that%20are%20labor%20intensive%20and%20difficult%20to%20obtain%20in%20routine%20clinical%20practice.%20Weakly%20supervised%20semantic%20segmentation%20offers%20a%20promising%20alternative.%20However%2C%20class%20activation%20map%20based%20methods%20often%20produce%20incomplete%20pseudo%20masks%20that%20emphasize%20highly%20discriminative%20regions%20and%20fail%20to%20supervise%20unannotated%20glandular%20structures.%20We%20propose%20a%20weakly%20supervised%20teacher%20student%20framework%20that%20leverages%20sparse%20pathologist%20annotations%20and%20an%20Exponential%20Moving%20Average%20stabilized%20teacher%20network%20to%20generate%20refined%20pseudo%20masks.%0A%20%20Methods%3A%20The%20framework%20integrates%20confidence%20based%20filtering%2C%20adaptive%20fusion%20of%20teacher%20predictions%20with%20limited%20ground%20truth%2C%20and%20curriculum%20guided%20refinement%20to%20progressively%20segment%20unannotated%20glandular%20regions.%20The%20method%2 {"title": "Dr. SHAP-AV: Decoding Relative Modality Contributions via Shapley Attribution in Audio-Visual Speech Recognition", "author": "Umberto Cappellazzo and Stavros Petridis and Maja Pantic", "abstract": "Audio-Visual Speech Recognition (AVSR) leverages both acoustic and visual information for robust recognition under noise. However, how models balance these modalities remains unclear. We present Dr. SHAP-AV, a framework using Shapley values to analyze modality contributions in AVSR. Through experiments on six models across two benchmarks and varying SNR levels, we introduce three analyses: Global SHAP for overall modality balance, Generative SHAP for contribution dynamics during decoding, and Temporal Alignment SHAP for input-output correspondence. Our findings reveal that models shift toward visual reliance under noise yet maintain high audio contributions even under severe degradation. Modality balance evolves during generation, temporal alignment holds under noise, and SNR is the dominant factor driving modality weighting. These findings expose a persistent audio bias, motivating ad-hoc modality-weighting mechanisms and Shapley-based attribution as a standard AVSR diagnostic.", "link": "http://arxiv.org/abs/2603.12046v1", "date": "2026-03-12", "relevancy": 2.5859, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5224}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5146}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5146}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dr.%20SHAP-AV%3A%20Decoding%20Relative%20Modality%20Contributions%20via%20Shapley%20Attribution%20in%20Audio-Visual%20Speech%20Recognition&body=Title%3A%20Dr.%20SHAP-AV%3A%20Decoding%20Relative%20Modality%20Contributions%20via%20Shapley%20Attribution%20in%20Audio-Visual%20Speech%20Recognition%0AAuthor%3A%20Umberto%20Cappellazzo%20and%20Stavros%20Petridis%20and%20Maja%20Pantic%0AAbstract%3A%20Audio-Visual%20Speech%20Recognition%20%28AVSR%29%20leverages%20both%20acoustic%20and%20visual%20information%20for%20robust%20recognition%20under%20noise.%20However%2C%20how%20models%20balance%20these%20modalities%20remains%20unclear.%20We%20present%20Dr.%20SHAP-AV%2C%20a%20framework%20using%20Shapley%20values%20to%20analyze%20modality%20contributions%20in%20AVSR.%20Through%20experiments%20on%20six%20models%20across%20two%20benchmarks%20and%20varying%20SNR%20levels%2C%20we%20introduce%20three%20analyses%3A%20Global%20SHAP%20for%20overall%20modality%20balance%2C%20Generative%20SHAP%20for%20contribution%20dynamics%20during%20decoding%2C%20and%20Temporal%20Alignment%20SHAP%20for%20input-output%20correspondence.%20Our%20findings%20reveal%20that%20models%20shift%20toward%20visual%20reliance%20under%20noise%20yet%20maintain%20high%20audio%20contributions%20even%20under%20severe%20degradation.%20Modality%20balance%20evolves%20during%20generation%2C%20temporal%20alignment%20holds%20under%20noise%2C%20and%20SNR%20is%20the%20dominant%20factor%20driving%20modality%20weighting.%20These%20findings%20expose%20a%20persistent%20audio%20bias%2C%20motivating%20ad-hoc%20modality-weighting%20mechanisms%20and%20Shapley-based%20attribution%20as%20a%20standard%20AVSR%20diagnostic.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12046v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDr.%2520SHAP-AV%253A%2520Decoding%2520Relative%2520Modality%2520Contributions%2520via%2520Shapley%2520Attribution%2520in%2520Audio-Visual%2520Speech%2520Recognition%26entry.906535625%3DUmberto%2520Cappellazzo%2520and%2520Stavros%2520Petridis%2520and%2520Maja%2520Pantic%26entry.1292438233%3DAudio-Visual%2520Speech%2520Recognition%2520%2528AVSR%2529%2520leverages%2520both%2520acoustic%2520and%2520visual%2520information%2520for%2520robust%2520recognition%2520under%2520noise.%2520However%252C%2520how%2520models%2520balance%2520these%2520modalities%2520remains%2520unclear.%2520We%2520present%2520Dr.%2520SHAP-AV%252C%2520a%2520framework%2520using%2520Shapley%2520values%2520to%2520analyze%2520modality%2520contributions%2520in%2520AVSR.%2520Through%2520experiments%2520on%2520six%2520models%2520across%2520two%2520benchmarks%2520and%2520varying%2520SNR%2520levels%252C%2520we%2520introduce%2520three%2520analyses%253A%2520Global%2520SHAP%2520for%2520overall%2520modality%2520balance%252C%2520Generative%2520SHAP%2520for%2520contribution%2520dynamics%2520during%2520decoding%252C%2520and%2520Temporal%2520Alignment%2520SHAP%2520for%2520input-output%2520correspondence.%2520Our%2520findings%2520reveal%2520that%2520models%2520shift%2520toward%2520visual%2520reliance%2520under%2520noise%2520yet%2520maintain%2520high%2520audio%2520contributions%2520even%2520under%2520severe%2520degradation.%2520Modality%2520balance%2520evolves%2520during%2520generation%252C%2520temporal%2520alignment%2520holds%2520under%2520noise%252C%2520and%2520SNR%2520is%2520the%2520dominant%2520factor%2520driving%2520modality%2520weighting.%2520These%2520findings%2520expose%2520a%2520persistent%2520audio%2520bias%252C%2520motivating%2520ad-hoc%2520modality-weighting%2520mechanisms%2520and%2520Shapley-based%2520attribution%2520as%2520a%2520standard%2520AVSR%2520diagnostic.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.12046v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Dr.%20SHAP-AV%3A%20Decoding%20Relative%20Modality%20Contributions%20via%20Shapley%20Attribution%20in%20Audio-Visual%20Speech%20Recognition&entry.906535625=Umberto%20Cappellazzo%20and%20Stavros%20Petridis%20and%20Maja%20Pantic&entry.1292 {"title": "Uncovering Locally Low-dimensional Structure in Networks by Locally Optimal Spectral Embedding", "author": "Hannah Sansford and Nick Whiteley and Patrick Rubin-Delanchy", "abstract": "Standard Adjacency Spectral Embedding (ASE) relies on a global low-rank assumption often incompatible with the sparse, transitive structure of real-world networks, causing local geometric features to be 'smeared'. To address this, we introduce Local Adjacency Spectral Embedding (LASE), which uncovers locally low-dimensional structure via weighted spectral decomposition. Under a latent position model with a kernel feature map, we treat the image of latent positions as a locally low-dimensional set in infinite-dimensional feature space. We establish finite-sample bounds quantifying the trade-off between the statistical cost of localisation and the reduced truncation error achieved by targeting a locally low-dimensional region of the embedding. Furthermore, we prove that sufficient localisation induces rapid spectral decay and the emergence of a distinct spectral gap, theoretically justifying low-dimensional local embeddings. Experiments on synthetic and real networks show that LASE improves local reconstruction and visualisation over global and subgraph baselines, and we introduce UMAP-LASE for assembling overlapping local embeddings into high-fidelity global visualisations.", "link": "http://arxiv.org/abs/2603.11965v1", "date": "2026-03-12", "relevancy": 2.58, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.521}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5145}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5125}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Uncovering%20Locally%20Low-dimensional%20Structure%20in%20Networks%20by%20Locally%20Optimal%20Spectral%20Embedding&body=Title%3A%20Uncovering%20Locally%20Low-dimensional%20Structure%20in%20Networks%20by%20Locally%20Optimal%20Spectral%20Embedding%0AAuthor%3A%20Hannah%20Sansford%20and%20Nick%20Whiteley%20and%20Patrick%20Rubin-Delanchy%0AAbstract%3A%20Standard%20Adjacency%20Spectral%20Embedding%20%28ASE%29%20relies%20on%20a%20global%20low-rank%20assumption%20often%20incompatible%20with%20the%20sparse%2C%20transitive%20structure%20of%20real-world%20networks%2C%20causing%20local%20geometric%20features%20to%20be%20%27smeared%27.%20To%20address%20this%2C%20we%20introduce%20Local%20Adjacency%20Spectral%20Embedding%20%28LASE%29%2C%20which%20uncovers%20locally%20low-dimensional%20structure%20via%20weighted%20spectral%20decomposition.%20Under%20a%20latent%20position%20model%20with%20a%20kernel%20feature%20map%2C%20we%20treat%20the%20image%20of%20latent%20positions%20as%20a%20locally%20low-dimensional%20set%20in%20infinite-dimensional%20feature%20space.%20We%20establish%20finite-sample%20bounds%20quantifying%20the%20trade-off%20between%20the%20statistical%20cost%20of%20localisation%20and%20the%20reduced%20truncation%20error%20achieved%20by%20targeting%20a%20locally%20low-dimensional%20region%20of%20the%20embedding.%20Furthermore%2C%20we%20prove%20that%20sufficient%20localisation%20induces%20rapid%20spectral%20decay%20and%20the%20emergence%20of%20a%20distinct%20spectral%20gap%2C%20theoretically%20justifying%20low-dimensional%20local%20embeddings.%20Experiments%20on%20synthetic%20and%20real%20networks%20show%20that%20LASE%20improves%20local%20reconstruction%20and%20visualisation%20over%20global%20and%20subgraph%20baselines%2C%20and%20we%20introduce%20UMAP-LASE%20for%20assembling%20overlapping%20local%20embeddings%20into%20high-fidelity%20global%20visualisations.%0ALink%3A%20http%3A//arxiv.org/abs/2603.11965v1%0AForm%3A%20https%3 20and%2520visualisation%2520over%2520global%2520and%2520subgraph%2520baselines%252C%2520and%2520we%2520introduce%2520UMAP-LASE%2520for%2520assembling%2520overlapping%2520local%2520embeddings%2520into%2520high-fidelity%2520global%2520visualisations.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.11965v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Uncovering%20Locally%20Low-dimensional%20Structure%20in%20Networks%20by%20Locally%20Optimal%20Spectral%20Embedding&entry.906535625=Hannah%20Sansford%20and%20Nick%20Whiteley%20and%20Patrick%20Rubin-Delanchy&entry.1292438233=Standard%20Adjacency%20Spectral%20Embedding%20%28ASE%29%20relies%20on%20a%20global%20low-rank%20assumption%20often%20incompatible%20with%20the%20sparse%2C%20transitive%20structure%20of%20real-world%20networks%2C%20causing%20local%20geometric%20features%20to%20be%20%27smeared%27.%20To%20address%20this%2C%20we%20introduce%20Local%20Adjacency%20Spectral%20Embedding%20%28LASE%29%2C%20which%20uncovers%20locally%20low-dimensional%20structure%20via%20weighted%20spectral%20decomposition.%20Under%20a%20latent%20position%20model%20with%20a%20kernel%20feature%20map%2C%20we%20treat%20the%20image%20of%20latent%20positions%20as%20a%20locally%20low-dimensional%20set%20in%20infinite-dimensional%20feature%20space.%20We%20establish%20finite-sample%20bounds%20quantifying%20the%20trade-off%20between%20the%20statistical%20cost%20of%20localisation%20and%20the%20reduced%20truncation%20error%20achieved%20by%20targeting%20a%20locally%20low-dimensional%20region%20of%20the%20embedding.%20Furthermore%2C%20we%20prove%20that%20sufficient%20localisation%20induces%20rapid%20spectral%20decay%20and%20the%20emergence%20of%20a%20distinct%20spectral%20gap%2C%20theoretically%20justifying%20low-dimensional%20local%20embeddings.%20Experiments%20on%20synthetic%20and%20real%20networks%20show%20that%20LASE%20improves%20local%20reconstruction%20and%20visualisation%20over%20global%20and%20subgraph%20baselines%2C%20and%20we%20introduce%20UMAP-LASE%20for%20assembling%20overlapping%20local%20embeddings%20into%20high-fidelity%20global%20visualisations.&entry.1838667208=http%3A//arxiv.org/abs/2603.11965v1&entry.124074799=Read"},
{"title": "Locating Demographic Bias at the Attention-Head Level in CLIP's Vision Encoder", "author": "Alaa Yasser and Kittipat Phunjanna and Marcos Escudero Vi\u00f1olo and Catarina Barata and Jenny Benois-Pineau", "abstract": "Standard fairness audits of foundation models quantify that a model is biased, but not where inside the network the bias resides. We propose a mechanistic fairness audit that combines projected residual-stream decomposition, zero-shot Concept Activation Vectors, and bias-augmented TextSpan analysis to locate demographic bias at the level of individual attention heads in vision transformers. As a feasibility case study, we apply this pipeline to the CLIP ViT-L-14 encoder on 42 profession classes of the FACET benchmark, auditing both gender and age bias. For gender, the pipeline identifies four terminal-layer heads whose ablation reduces global bias (Cramer's V: 0.381 -> 0.362) while marginally improving accuracy (+0.42%); a layer-matched random control confirms that this effect is specific to the identified heads. A single head in the final layer contributes to the majority of the reduction in the most stereotyped classes, and class-level analysis shows that corrected predictions shift toward the correct occupation. For age, the same pipeline identifies candidate heads, but ablation produces weaker and less consistent effects, suggesting that age bias is encoded more diffusely than gender bias in this model. These results provide preliminary evidence that head-level bias localisation is feasible for discriminative vision encoders and that the degree of localisability may vary across protected attributes.\n  keywords: Bias . CLIP . Mechanistic Interpretability . Vision Transformer . Fairness", "link": "http://arxiv.org/abs/2603.11793v1", "date": "2026-03-12", "relevancy": 2.575, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.51 {"title": "Dense Dynamic Scene Reconstruction and Camera Pose Estimation from Multi-View Videos", "author": "Shuo Sun and Unal Artan and Malcolm Mielle and Achim J. Lilienthaland and Martin Magnusson", "abstract": "We address the challenging problem of dense dynamic scene reconstruction and camera pose estimation from multiple freely moving cameras -- a setting that arises naturally when multiple observers capture a shared event. Prior approaches either handle only single-camera input or require rigidly mounted, pre-calibrated camera rigs, limiting their practical applicability. We propose a two-stage optimization framework that decouples the task into robust camera tracking and dense depth refinement. In the first stage, we extend single-camera visual SLAM to the multi-camera setting by constructing a spatiotemporal connection graph that exploits both intra-camera temporal continuity and inter-camera spatial overlap, enabling consistent scale and robust tracking. To ensure robustness under limited overlap, we introduce a wide-baseline initialization strategy using feed-forward reconstruction models. In the second stage, we refine depth and camera poses by optimizing dense inter- and intra-camera consistency using wide-baseline optical flow. Additionally, we introduce MultiCamRobolab, a new real-world dataset with ground-truth poses from a motion capture system. Finally, we demonstrate that our method significantly outperforms state-of-the-art feed-forward models on both synthetic and real-world benchmarks, while requiring less memory.", "link": "http://arxiv.org/abs/2603.12064v1", "date": "2026-03-12", "relevancy": 2.5744, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.7001}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6383}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6263}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dense%20Dynamic%20Scene%20Reconstruction%20and%20Camera%20Pose%20Estimation%20from%20Multi-View%20Videos&body=Title%3A%20Dense%20Dynamic%20Scene%20Reconstruction%20and%20Camera%20Pose%20Estimation%20from%20Multi-View%20Videos%0AAuthor%3A%20Shuo%20Sun%20and%20Unal%20Artan%20and%20Malcolm%20Mielle%20and%20Achim%20J.%20Lilienthaland%20and%20Martin%20Magnusson%0AAbstract%3A%20We%20address%20the%20challenging%20problem%20of%20dense%20dynamic%20scene%20reconstruction%20and%20camera%20pose%20estimation%20from%20multiple%20freely%20moving%20cameras%20--%20a%20setting%20that%20arises%20naturally%20when%20multiple%20observers%20capture%20a%20shared%20event.%20Prior%20approaches%20either%20handle%20only%20single-camera%20input%20or%20require%20rigidly%20mounted%2C%20pre-calibrated%20camera%20rigs%2C%20limiting%20their%20practical%20applicability.%20We%20propose%20a%20two-stage%20optimization%20framework%20that%20decouples%20the%20task%20into%20robust%20camera%20tracking%20and%20dense%20depth%20refinement.%20In%20the%20first%20stage%2C%20we%20extend%20single-camera%20visual%20SLAM%20to%20the%20multi-camera%20setting%20by%20constructing%20a%20spatiotemporal%20connection%20graph%20that%20exploits%20both%20intra-camera%20temporal%20continuity%20and%20inter-camera%20spatial%20overlap%2C%20enabling%20consistent%20scale%20and%20robust%20tracking.%20To%20ensure%20robustness%20under%20limited%20overlap%2C%20we%20introduce%20a%20wide-baseline%20initialization%20strategy%20using%20feed-forward%20reconstruction%20models.%20In%20the%20second%20stage%2C%20we%20refine%20depth%20and%20camera%20poses%20by%20optimizing%20dense%20inter-%20and%20intra-camera%20consistency%20using%20wide-baseline%20optical%20flow.%20Additionally%2C%20we%20introduce%20MultiCamRobolab%2C%20a%20new%20real-world%20dataset%20with%20ground-truth%20poses%20from%20a%20motion%20capture%20system.%20Finally%2C%20we%20demonstrate%20that%20our%20method%20significantly%20outperforms%20state-of-the-art%20feed-forward%20models%20on%20both%20synthetic%20and%20real-world%20benchmarks%2C%20while%20requiring%20less%20memory.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12064v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDense%2520Dynamic%2520Scene%2520Reconstruction%2520and%2520Camera%2520Pose%2520Estimation%2520from%2520Multi-View%2520Videos%26entry.906535625%3DShuo%2520Sun%2520and%2520Unal%2520Artan%2520and%2520Malcolm%2520Mielle%2520and%2520Achim%2520J.%2520Lilienthaland%2520and%2520Martin%2520Magnusson%26entry.1292438233%3DWe%2520address%2520the%2520challenging%2520problem%2520of%2520dense%2520dynamic%2520scene%2520reconstruction%2520and%2520camera%2520pose%2520estimation%2520from%2520multiple%2520freely%2520moving%2520cameras%2520--%2520a%2520setting%2520that%2520arises%2520naturally%2520when%2520multiple%2520observers%2520capture%2520a%2520shared%2520event.%2520Prior%2520approaches%2520either%2520handle%2520only%2520single-camera%2520input%2520or%2520require%2520rigidly%2520mounted%252C%2520pre-calibrated%2520camera%2520rigs%252C%2520limiting%2520their%2520practical%2520applicability.%2520We%2520propose%2520a%2520two-stage%2520optimization%2520framework%2520that%2520decouples%2520the%2520task%2520into%2520robust%2520camera%2520tracking%2520and%2520dense%2520depth%2520refinement.%2520In%2520the%2520first%2520stage%252C%2520we%2520extend%2520single-camera%2520visual%2520SLAM%2520to%2520the%2520multi-camera%2520setting%2520by%2520constructing%2520a%2520spatiotemporal%2520connection%2520graph%2520that%2520exploits%2520both%2520intra-camera%2520temporal%2520continuity%2520and%2520inter-camera%2520spatial%2520overlap%252C%2520enabling%2520consistent%2520scale%2520and%2520robust%2520tracking.%2520To%2520ensure%2520robustness%2520under%2520limited%2520overlap%252C%2520we%2520introduce%2520a%2520wide-baseline%2520initialization%2520strategy%2520using%2520feed-forward%2520reconstruction%2520models.%2520In%2520the%2520second%2520stage%252C%2520we%2520refine%2520depth%2520and%2520camera%2520poses%2520by%2520optimizing%2520dense%2520inter-%2520and%2520intra-camera%2520consistency%2520using%2520wide-baseline%2520optical%2520flow.%2520Additionally%252C%2520we%2520introduce%2520MultiCamRobolab%252C%2520a%2520new%2520real-world%2520dataset%2520with%2520ground-truth%2520poses%2520from%2520a%2520motion%2520capture%2520system.%2520Finally%252C%2520we%2520demonstrate%2520that%2520our%2520method%2520significantly%2520outperforms%2520state-of-the-art%2520feed-forward%2520models%2520on%2520both%2520synthetic%2520and%2520real-world%2520benchmarks%252C%2520while%2520requiring%2520less%2520memory.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.12064v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Dense%20Dynamic%20Scene%20Reconstruction%20and%20Camera%20Pose%20Estimation%20from%20Multi-View%20Videos&entry.906535625=Shuo%20Sun%20and%20Unal%20Artan%20and%20Malcolm%20Mielle%20and%20Achim%20J.%20Lilienthaland%20and%20Martin%20Magnusson&entry.1292438233=We%20address%20the%20challenging%20problem%20of%20dense%20dynamic%20scene%20reconstruction%20and%20camera%20pose%20estimation%20from%20multiple%20freely%20moving%20cameras%20--%20a%20setting%20that%20arises%20naturally%20when%20multiple%20observers%20capture%20a%20shared%20event.%20Prior%20approaches%20either%20handle%20only%20single-camera%20input%20or%20require%20rigidly%20mounted%2C%20pre-calibrated%20camera%20rigs%2C%20limiting%20their%20practical%20applicability.%20We%20propose%20a%20two-stage%20optimization%20framework%20that%20decouples%20the%20task%20into%20robust%20camera%20tracking%20and%20dense%20depth%20refinement.%20In%20the%20first%20stage%2C%20we%20extend%20single-c {"title": "CrossEarth-SAR: A SAR-Centric and Billion-Scale Geospatial Foundation Model for Domain Generalizable Semantic Segmentation", "author": "Ziqi Ye and Ziyang Gong and Ning Liao and Xiaoxing Hu and Di Wang and Hongruixuan Chen and Chen Huang and Yiguo He and Yuru Jia and Xiaoxing Wang and Haipeng Wang and Xue Yang and Junchi Yan", "abstract": "Synthetic Aperture Radar (SAR) enables global, all-weather earth observation. However, owing to diverse imaging mechanisms, domain shifts across sensors and regions severely hinder its semantic generalization. To address this, we present CrossEarth-SAR, the first billion-scale SAR vision foundation model built upon a novel physics-guided sparse mixture-of-experts (MoE) architecture incorporating physical descriptors, explicitly designed for cross-domain semantic segmentation. To facilitate large-scale pre-training, we develop CrossEarth-SAR-200K, a weakly and fully supervised dataset that unifies public and private SAR imagery. We also introduce a benchmark suite comprising 22 sub-benchmarks across 8 distinct domain gaps, establishing the first unified standard for domain generalization semantic segmentation on SAR imagery. Extensive experiments demonstrate that CrossEarth-SAR achieves state-of-the-art results on 20 benchmarks, surpassing previous methods by over 10\\% mIoU on some benchmarks under multi-gap transfer. All code, benchmark and datasets will be publicly available.", "link": "http://arxiv.org/abs/2603.12008v1", "date": "2026-03-12", "relevancy": 2.5718, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5158}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5158}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1 {"title": "EXPLORE-Bench: Egocentric Scene Prediction with Long-Horizon Reasoning", "author": "Chengjun Yu and Xuhan Zhu and Chaoqun Du and Pengfei Yu and Wei Zhai and Yang Cao and Zheng-Jun Zha", "abstract": "Multimodal large language models (MLLMs) are increasingly considered as a foundation for embodied agents, yet it remains unclear whether they can reliably reason about the long-term physical consequences of actions from an egocentric viewpoint. We study this gap through a new task, Egocentric Scene Prediction with LOng-horizon REasoning: given an initial-scene image and a sequence of atomic action descriptions, a model is asked to predict the final scene after all actions are executed. To enable systematic evaluation, we introduce EXPLORE-Bench, a benchmark curated from real first-person videos spanning diverse scenarios. Each instance pairs long action sequences with structured final-scene annotations, including object categories, visual attributes, and inter-object relations, which supports fine-grained, quantitative assessment. Experiments on a range of proprietary and open-source MLLMs reveal a significant performance gap to humans, indicating that long-horizon egocentric reasoning remains a major challenge. We further analyze test-time scaling via stepwise reasoning and show that decomposing long action sequences can improve performance to some extent, while incurring non-trivial computational overhead. Overall, EXPLORE-Bench provides a principled testbed for measuring and advancing long-horizon reasoning for egocentric embodied perception.", "link": "http://arxiv.org/abs/2603.09731v2", "date": "2026-03-12", "relevancy": 2.5677, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.6689}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "simil {"title": "O3N: Omnidirectional Open-Vocabulary Occupancy Prediction", "author": "Mengfei Duan and Hao Shi and Fei Teng and Guoqiang Zhao and Yuheng Zhang and Zhiyong Li and Kailun Yang", "abstract": "Understanding and reconstructing the 3D world through omnidirectional perception is an inevitable trend in the development of autonomous agents and embodied intelligence. However, existing 3D occupancy prediction methods are constrained by limited perspective inputs and predefined training distribution, making them difficult to apply to embodied agents that require comprehensive and safe perception of scenes in open world exploration. To address this, we present O3N, the first purely visual, end-to-end Omnidirectional Open-vocabulary Occupancy predictioN framework. O3N embeds omnidirectional voxels in a polar-spiral topology via the Polar-spiral Mamba (PsM) module, enabling continuous spatial representation and long-range context modeling across 360\u00b0. The Occupancy Cost Aggregation (OCA) module introduces a principled mechanism for unifying geometric and semantic supervision within the voxel space, ensuring consistency between the reconstructed geometry and the underlying semantic structure. Moreover, Natural Modality Alignment (NMA) establishes a gradient-free alignment pathway that harmonizes visual features, voxel embeddings, and text semantics, forming a consistent \"pixel-voxel-text\" representation triad. Extensive experiments on multiple models demonstrate that our method not only achieves state-of-the-art performance on QuadOcc and Human360Occ benchmarks but also exhibits remarkable cross-scene generalization and semantic scalability, paving the way toward universal 3D world modeling. The source code will be made publicly available at https://github.com/MengfeiD/O3N.", "link": "http://arxiv.org/abs/2603.12144v1", "date": "2026-03-12", "relevancy": 2.5409, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding" {"title": "Matching Features, Not Tokens: Energy-Based Fine-Tuning of Language Models", "author": "Samy Jelassi and Mujin Kwun and Rosie Zhao and Yuanzhi Li and Nicolo Fusi and Yilun Du and Sham M. Kakade and Carles Domingo-Enrich", "abstract": "Cross-entropy (CE) training provides dense and scalable supervision for language models, but it optimizes next-token prediction under teacher forcing rather than sequence-level behavior under model rollouts. We introduce a feature-matching objective for language-model fine-tuning that targets sequence-level statistics of the completion distribution, providing dense semantic feedback without requiring a task-specific verifier or preference model. To optimize this objective efficiently, we propose energy-based fine-tuning (EBFT), which uses strided block-parallel sampling to generate multiple rollouts from nested prefixes concurrently, batches feature extraction over these rollouts, and uses the resulting embeddings to perform an on-policy policy-gradient update. We present a theoretical perspective connecting EBFT to KL-regularized feature-matching and energy-based modeling. Empirically, across Q&A coding, unstructured coding, and translation, EBFT matches RLVR and outperforms SFT on downstream accuracy while achieving a lower validation cross-entropy than both methods.", "link": "http://arxiv.org/abs/2603.12248v1", "date": "2026-03-12", "relevancy": 2.5406, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5264}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5146}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4834}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Matching%20Features%2C%20Not%20Tokens%3A%20Energy-Based%20Fine-Tuning%20of%20Language%20Models&body=Title%3A%20Matching%20Features%2C%20Not%20Tokens%3A%20Energy-Based%20Fine-Tuning%20of%20Language%20Models%0AAuthor%3A%20Samy%20Jelassi%20and%20Mujin%20Kwun%20and%20Rosie%20Zhao%20and%20Yuanzhi%20Li%20and%20Nicolo%20Fusi%20and%20Yilun%20Du%20and%20Sham%20M.%20Kakade%20and%20Carles%20Domingo-Enrich%0AAbstract%3A%20Cross-entropy%20%28CE%29%20training%20provides%20dense%20and%20scalable%20supervision%20for%20language%20models%2C%20but%20it%20optimizes%20next-token%20prediction%20under%20teacher%20forcing%20rather%20than%20sequence-level%20behavior%20under%20model%20rollouts.%20We%20introduce%20a%20feature-matching%20objective%20for%20language-model%20fine-tuning%20that%20targets%20sequence-level%20statistics%20of%20the%20completion%20distribution%2C%20providing%20dense%20semantic%20feedback%20without%20requiring%20a%20task-specific%20verifier%20or%20preference%20model.%20To%20optimize%20this%20objective%20efficiently%2C%20we%20propose%20energy-based%20fine-tuning%20%28EBFT%29%2C%20which%20uses%20strided%20block-parallel%20sampling%20to%20generate%20multiple%20rollouts%20from%20nested%20prefixes%20concurrently%2C%20batches%20feature%20extraction%20over%20these%20rollouts%2C%20and%20uses%20the%20resulting%20embeddings%20to%20perform%20an%20on-policy%20policy-gradient%20update.%20We%20present%20a%20theoretical%20perspective%20connecting%20EBFT%20to%20KL-regularized%20feature-matching%20and%20energy-based%20modeling.%20Empirically%2C%20across%20Q%26A%20coding%2C%20unstructured%20coding%2C%20and%20translation%2C%20EBFT%20matches%20RLVR%20and%20outperforms%20SFT%20on%20downstream%20accuracy%20while%20achieving%20a%20lower%20validation%20cross-entropy%20than%20both%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12248v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMatching%2520Features%252C%2520Not%2520Tok 520methods.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.12248v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Matching%20Features%2C%20Not%20Tokens%3A%20Energy-Based%20Fine-Tuning%20of%20Language%20Models&entry.906535625=Samy%20Jelassi%20and%20Mujin%20Kwun%20and%20Rosie%20Zhao%20and%20Yuanzhi%20Li%20and%20Nicolo%20Fusi%20and%20Yilun%20Du%20and%20Sham%20M.%20Kakade%20and%20Carles%20Domingo-Enrich&entry.1292438233=Cross-entropy%20%28CE%29%20training%20provides%20dense%20and%20scalable%20supervision%20for%20language%20models%2C%20but%20it%20optimizes%20next-token%20prediction%20under%20teacher%20forcing%20rather%20than%20sequence-level%20behavior%20under%20model%20rollouts.%20We%20introduce%20a%20feature-matching%20objective%20for%20language-model%20fine-tuning%20that%20targets%20sequence-level%20statistics%20of%20the%20completion%20distribution%2C%20providing%20dense%20semantic%20feedback%20without%20requiring%20a%20task-specific%20verifier%20or%20preference%20model.%20To%20optimize%20this%20objective%20efficiently%2C%20we%20propose%20energy-based%20fine-tuning%20%28EBFT%29%2C%20which%20uses%20strided%20block-parallel%20sampling%20to%20generate%20multiple%20rollouts%20from%20nested%20prefixes%20concurrently%2C%20batches%20feature%20extraction%20over%20these%20rollouts%2C%20and%20uses%20the%20resulting%20embeddings%20to%20perform%20an%20on-policy%20policy-gradient%20update.%20We%20present%20a%20theoretical%20perspective%20connecting%20EBFT%20to%20KL-regularized%20feature-matching%20and%20energy-based%20modeling.%20Empirically%2C%20across%20Q%26A%20coding%2C%20unstructured%20coding%2C%20and%20translation%2C%20EBFT%20matches%20RLVR%20and%20outperforms%20SFT%20on%20downstream%20accuracy%20while%20achieving%20a%20lower%20validation%20cross-entropy%20than%20both%20methods.&entry.1838667208=http%3A//arxiv.org/abs/2603.12248v1&entry.124074799=Read"},
{"title": "Probabilistic Verification of Voice Anti-Spoofing Models", "author": "Evgeny Kushnir and Alexandr Kozodaev and Dmitrii Korzh and Mikhail Pautov and Oleg Kiriukhin and Oleg Y. Rogov", "abstract": "Recent advances in generative models have amplified the risk of malicious misuse of speech synthesis technologies, enabling adversaries to impersonate target speakers and access sensitive resources. Although speech deepfake detection has progressed rapidly, most existing countermeasures lack formal robustness guarantees or fail to generalize to unseen generation techniques. We propose PV-VASM, a probabilistic framework for verifying the robustness of voice anti-spoofing models (VASMs). PV-VASM estimates the probability of misclassification under text-to-speech (TTS), voice cloning (VC), and parametric signal transformations. The approach is model-agnostic and enables robustness verification against unseen speech synthesis techniques and input perturbations. We derive a theoretical upper bound on the error probability and validate the method across diverse experimental settings, demonstrating its effectiveness as a practical robustness verification tool.", "link": "http://arxiv.org/abs/2603.10713v2", "date": "2026-03-12", "relevancy": 2.5297, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5395}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4945}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4839}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Probabilistic%20Verification%20of%20Voice%20Anti-Spoofing%20Models&body=Title%3A%20Probabilistic%20Verification%20of%20Voice%20Anti-Spoofing%20Models%0AAuthor%3A%20Evgeny%20Kushnir%20and%20Alexandr%2 {"title": "Multi-Station WiFi CSI Sensing Framework Robust to Station-wise Feature Missingness and Limited Labeled Data", "author": "Keita Kayano and Takayuki Nishio and Daiki Yoda and Yuta Hirai and Tomoko Adachi", "abstract": "We propose a WiFi Channel State Information (CSI) sensing framework for multi-station deployments that addresses two fundamental challenges in practical CSI sensing: station-wise feature missingness and limited labeled data. Feature missingness is commonly handled by resampling unevenly spaced CSI measurements or by reconstructing missing samples, while label scarcity is mitigated by data augmentation or self-supervised representation learning. However, these techniques are typically developed in isolation and do not jointly address long-term, structured station unavailability together with label scarcity. To bridge this gap, we explicitly incorporate station unavailability into both representation learning and downstream model training. Specifically, we adapt cross-modal self-supervised learning (CroSSL), a representation learning framework originally designed for time-series sensory data, to multi-station CSI sensing in order to learn representations that are inherently invariant to station-wise feature missingness from unlabeled data. Furthermore, we introduce Station-wise Masking Augmentation (SMA) during downstream model training, which exposes the model to realistic station unavailability patterns under limited labeled data. Our experiments show that neither missingness-invariant pre-training nor station-wise augmentation alone is sufficient; their combination is essential to achieve robust performance under both station-wise feature missingness and label scarcity. The proposed framework provides a practical and robust foundation for multi-station WiFi CSI sensing in real-world deployments.", "link": "http://arxiv.org/abs/2603.11858v1", "date": "2026-03-12", "relevancy": 2.5169, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.517}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4991}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.494}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multi-Station%20WiFi%20CSI%20Sensing%20Framework%20Robust%20to%20Station-wise%20Feature%20Missingness%20and%20Limited%20Labeled%20Data&body=Title%3A%20Multi-Station%20WiFi%20CSI%20Sensing%20Framework%20Robust%20to%20Station-wise%20Feature%20Missingness%20and%20Limited%20Labeled%20Data%0AAuthor%3A%20Keita%20Kayano%20and%20Takayuki%20Nishio%20and%20Daiki%20Yoda%20and%20Yuta%20Hirai%20and%20Tomoko%20Adachi%0AAbstract%3A%20We%20propose%20a%20WiFi%20Channel%20State%20Information%20%28CSI%29%20sensing%20framework%20for%20multi-station%20deployments%20that%20addresses%20two%20fundamental%20challenges%20in%20practical%20CSI%20sensing%3A%20station-wise%20feature%20missingness%20and%20limited%20labeled%20data.%20Feature%20missingness%20is%20commonly%20handled%20by%20resampling%20unevenly%20spaced%20CSI%20measurements%20or%20by%20reconstructing%20missing%20samples%2C%20while%20label%20scarcity%20is%20mitigated%20by%20data%20augmentation%20or%20self-supervised%20representation%20learning.%20However%2C%20these%20techniques%20are%20typically%20developed%20in%20isolation%20and%20do%20not%20jointly%20address%20long-term%2C%20structured%20station%20unavailability%20together%20with%20label%20scarcity.%20To%20bridge%20this%20gap%2C%20we%20explicitly%20incorporate%20station%20unavailability%20into%20both%20representation%20learning%20and%20downstream%20model%20training.%20Specifically%2C%20we%20adapt%20cross-modal%20self-supervised%20learning%20%28CroSSL%29%2C%20a%20representation%20learning%20framework%20originally%20designed%20for%20time-series%20sensory%20data%2C%20to%20multi-station%20CSI%20sensing%20in%20order%20to%20learn%20representations%20that%20are%20inherently%20invariant%20to%20station-wise%20feature%20missingness%20from%20unlabeled%20data.%20Furthermore%2C%20we%20introduce%20Station-wise%20Masking%20Augmentation%20%28SMA%29%20during%20downstream%20model%20training%2C%20which%20exposes%20the%20model%20to%20realistic%20station%20unavailability%20patterns%20under%20limited%20labeled%20data.%20Our%20experiments%20show%20that%20neither%20missingness-invariant%20pre-training%20nor%20station-wise%20augmentation%20alone%20is%20sufficient%3B%20their%20combination%20is%20essential%20to%20achieve%20robust%20performance%20under%20both%20station-wise%20feature%20missingness%20and%20label%20scarcity.%20The%20proposed%20framework%20provides%20a%20practical%20and%20robust%20foundation%20for%20multi-station%20WiFi%20CSI%20sensing%20in%20real-world%20deployments.%0ALink%3A%20http%3A//arxiv.org/abs/2603.11858v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMulti-Station%2520WiFi%2520CSI%2520Sensing%2520Framework%2520Robust%2520to%2520Station-wise%2520Feature%2520Missingness%2520and%2520Limited%2520Labeled%2520Data%26entry.906535625%3DKeita%2520Kayano%2520and%2520Takayuki%2520Nishio%2520and%2520Daiki%2520Yoda%2520and%2520Yuta%2520Hirai%2520and%2520Tomoko%2520Adachi%26entry.1292438233%3DWe%2520propose%2520a%2520WiFi%2520Channel%2520State%2520Information%2520%2528CSI%2529%2520sensing%2520framework%2520for%2520multi-station%2520deployments%2520that%2520addresses%2520two%2520fundamental%2520challenges%2520in%2520practical%2520CSI%2520sensing%253A%2520station-wise%2520feature%2520missingness%2520and%2520limited%2520labeled%2520data.%2520Feature%2520missingness%2520is%2520commonly%2520handled%2520by%2520resampling%2520unevenly%2520spaced%2520CS

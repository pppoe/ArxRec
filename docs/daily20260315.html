{"title": "LatentGeo: Learnable Auxiliary Constructions in Latent Space for Multimodal Geometric Reasoning", "author": "Haiying Xu and Zihan Wang and Song Dai and Zhengxuan Zhang and Kairan Dou and Xuming Hu", "abstract": "Despite recent advances in multimodal reasoning, representing auxiliary geometric constructions remains a fundamental challenge for multimodal large language models (MLLMs). Such constructions are absent from the original diagram and must be introduced before theorems apply. Existing approaches predominantly rely on explicit construction paradigms, including text-based geometric specification, visual-token interleaving during reasoning, and tool-augmented geometric execution. However, these methods either fail to faithfully represent complex spatial relationships, incur representation mismatch between discrete symbols and continuous geometric structures, or rely on external capabilities that hinder end-to-end optimization. To address these limitations, we propose LatentGeo, a framework that learns continuous latent visual representations to internalize auxiliary geometric constructions without pixel-level rendering or external executors. We design a three-stage curriculum that progressively aligns and internalizes these latent representations through auxiliary visual supervision, followed by LaGDPO, a latent-aware reinforcement learning procedure that stabilizes latent representations during policy optimization while improving end-task correctness. To systematically evaluate construction-centric representation quality, we introduce GeoAux, a new benchmark targeting visually dependent geometry problems, and conduct experiments on GeoAux and MathVerse. Results show that LatentGeo achieves substantial gains on geometric reasoning tasks, particularly those requiring auxiliary constructions. Extensive analyses and ablation studies further validate the effectiveness of each component in our framework.", "link": "http://arxiv.org/abs/2603.12166v1", "date": "2026-03-12", "relevancy": 2.8114, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5681}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5611}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5576}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LatentGeo%3A%20Learnable%20Auxiliary%20Constructions%20in%20Latent%20Space%20for%20Multimodal%20Geometric%20Reasoning&body=Title%3A%20LatentGeo%3A%20Learnable%20Auxiliary%20Constructions%20in%20Latent%20Space%20for%20Multimodal%20Geometric%20Reasoning%0AAuthor%3A%20Haiying%20Xu%20and%20Zihan%20Wang%20and%20Song%20Dai%20and%20Zhengxuan%20Zhang%20and%20Kairan%20Dou%20and%20Xuming%20Hu%0AAbstract%3A%20Despite%20recent%20advances%20in%20multimodal%20reasoning%2C%20representing%20auxiliary%20geometric%20constructions%20remains%20a%20fundamental%20challenge%20for%20multimodal%20large%20language%20models%20%28MLLMs%29.%20Such%20constructions%20are%20absent%20from%20the%20original%20diagram%20and%20must%20be%20introduced%20before%20theorems%20apply.%20Existing%20approaches%20predominantly%20rely%20on%20explicit%20construction%20paradigms%2C%20including%20text-based%20geometric%20specification%2C%20visual-token%20interleaving%20during%20reasoning%2C%20and%20tool-augmented%20geometric%20execution.%20However%2C%20these%20methods%20either%20fail%20to%20faithfully%20represent%20complex%20spatial%20relationships%2C%20incur%20representation%20mismatch%20between%20discrete%20symbols%20and%20continuous%20geometric%20structures%2C%20or%20rely%20on%20external%20capabilities%20that%20hinder%20end-to-end%20optimization.%20To%20address%20these%20limitations%2C%20we%20propose%20LatentGeo%2C%20a%20framework%20that%20learns%20continuous%20latent%20visual%20representations%20to%20internalize%20auxiliary%20geometric%20constructions%20without%20pixel-level%20rendering%20or%20external%20executors.%20We%20design%20a%20three-stage%20curriculum%20that%20progressively%20aligns%20and%20internalizes%20these%20latent%20representations%20through%20auxiliary%20visual%20supervision%2C%20followed%20by%20LaGDPO%2C%20a%20latent-aware%20reinforcement%20learning%20procedure%20that%20stabilizes%20latent%20representations%20during%20policy%20optimization%20while%20improving%20end-task%20correctness.%20To%20systematically%20evaluate%20construction-centric%20representation%20quality%2C%20we%20introduce%20GeoAux%2C%20a%20new%20benchmark%20targeting%20visually%20dependent%20geometry%20problems%2C%20and%20conduct%20experiments%20on%20GeoAux%20and%20MathVerse.%20Results%20show%20that%20LatentGeo%20achieves%20substantial%20gains%20on%20geometric%20reasoning%20tasks%2C%20particularly%20those%20requiring%20auxiliary%20constructions.%20Extensive%20analyses%20and%20ablation%20studies%20further%20validate%20the%20effectiveness%20of%20each%20component%20in%20our%20framework.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12166v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLatentGeo%253A%2520Learnable%2520Auxiliary%2520Constructions%2520in%2520Latent%2520Space%2520for%2520Multimodal%2520Geometric%2520Reasoning%26entry.906535625%3DHaiying%2520Xu%2520and%2520Zihan%2520Wang%2520and%2520Song%2520Dai%2520and%2520Zhengxuan%2520Zhang%2520and%2520Kairan%2520Dou%2520and%2520Xuming%2520Hu%26entry.1292438233%3DDespite%2520recent%2520advances%2520in%2520multimodal%2520reasoning%252C%2520representing%2520auxiliary%2520geometric%2520constructions%2520remains%2520a%2520fundamental%2520challenge%2520for%2520multimodal%2520large%2520language%2520models%2520%2528MLLMs%2529.%2520Such%2520constructions%2520are%2520absent%2520from%2520the%2520original%2520diagram 2C%2520particularly%2520those%2520requiring%2520auxiliary%2520constructions.%2520Extensive%2520analyses%2520and%2520ablation%2520studies%2520further%2520validate%2520the%2520effectiveness%2520of%2520each%2520component%2520in%2520our%2520framework.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.12166v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=LatentGeo%3A%20Learnable%20Auxiliary%20Constructions%20in%20Latent%20Space%20for%20Multimodal%20Geometric%20Reasoning&entry.906535625=Haiying%20Xu%20and%20Zihan%20Wang%20and%20Song%20Dai%20and%20Zhengxuan%20Zhang%20and%20Kairan%20Dou%20and%20Xuming%20Hu&entry.1292438233=Despite%20recent%20advances%20in%20multimodal%20reasoning%2C%20representing%20auxiliary%20geometric%20constructions%20remains%20a%20fundamental%20challenge%20for%20multimodal%20large%20language%20models%20%28MLLMs%29.%20Such%20constructions%20are%20absent%20from%20the%20original%20diagram%20and%20must%20be%20introduced%20before%20theorems%20apply.%20Existing%20approaches%20predominantly%20rely%20on%20explicit%20construction%20paradigms%2C%20including%20text-based%20geometric%20specification%2C%20visual-token%20interleaving%20during%20reasoning%2C%20and%20tool-augmented%20geometric%20execution.%20However%2C%20these%20methods%20either%20fail%20to%20faithfully%20represent%20complex%20spatial%20relationships%2C%20incur%20representation%20mismatch%20between%20discrete%20symbols%20and%20continuous%20geometric%20structures%2C%20or%20rely%20on%20external%20capabilities%20that%20hinder%20end-to-end%20optimization.%20To%20address%20these%20limitations%2C%20we%20propose%20LatentGeo%2C%20a%20framework%20that%20learns%20continuous%20latent%20visual%20representations%20to%20internalize%20auxiliary%20geometric%20constructions%20without%20pixel-level%20rendering%20or%20external%20executors.%20We%20design%20a%20three-stage%20curriculum%20that%20progressively%20aligns%20and%20internalizes%20these%20latent%20representations%20through%20auxiliary%20visual%20supervision%2C%20followed%20by%20LaGDPO%2C%20a%20latent-aware%20reinforcement%20learning%20procedure%20that%20stabilizes%20latent%20representations%20during%20policy%20optimization%20while%20improving%20end-task%20correctness.%20To%20systematically%20evaluate%20construction-centric%20representation%20quality%2C%20we%20introduce%20GeoAux%2C%20a%20new%20benchmark%20targeting%20visually%20dependent%20geometry%20problems%2C%20and%20conduct%20experiments%20on%20GeoAux%20and%20MathVerse.%20Results%20show%20that%20LatentGeo%20achieves%20substantial%20gains%20on%20geometric%20reasoning%20tasks%2C%20particularly%20those%20requiring%20auxiliary%20constructions.%20Extensive%20analyses%20and%20ablation%20studies%20further%20validate%20the%20effectiveness%20of%20each%20component%20in%20our%20framework.&entry.1838667208=http%3A//arxiv.org/abs/2603.12166v1&entry.124074799=Read"},
{"title": "Don't Mind the Gaps: Implicit Neural Representations for Resolution-Agnostic Retinal OCT Analysis", "author": "Bennet Kahrs and Julia Andresen and Fenja Falta and Monty Santarossa and Heinz Handels and Timo Kepp", "abstract": "Routine clinical imaging of the retina using optical coherence tomography (OCT) is performed with large slice spacing, resulting in highly anisotropic images and a sparsely scanned retina. Most learning-based methods circumvent the problems arising from the anisotropy by using 2D approaches rather than performing volumetric analyses. These approaches inherently bear the risk of generating inconsistent results for neighboring B-scans. For example, 2D retinal layer segmentations can have irregular surfaces in 3D. Furthermore, the typically used convolutional neural networks are bound to the resolution of the training data, which prevents their usage for images acquired with a different imaging protocol. Implicit neural representations (INRs) have recently emerged as a tool to store voxelized data as a continuous representation. Using coordinates as input, INRs are resolution-agnostic, which allows them to be applied to anisotropic data. In this paper, we propose two frameworks that make use of this characteristic of INRs for dense 3D analyses of retinal OCT volumes. 1) We perform inter-B-scan interpolation by incorporating additional information from en-face modalities, that help retain relevant structures between B-scans. 2) We create a resolution-agnostic retinal atlas that enables general analysis without strict requirements for the data. Both methods leverage generalizable INRs, improving retinal shape representation through population-based training and allowing predictions for unseen cases. Our resolution-independent frameworks facilitate the analysis of OCT images with large B-scan distances, opening up possibilities for the volumetric evaluation of retinal structures and pathologies.", "link": "http://arxiv.org/abs/2601.02447v3", "date": "2026-03-12", "relevancy": 2.8092, "topK": [{"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5888}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5524}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5443}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Don%27t%20Mind%20the%20Gaps%3A%20Implicit%20Neural%20Representations%20for%20Resolution-Agnostic%20Retinal%20OCT%20Analysis&body=Title%3A%20Don%27t%20Mind%20the%20Gaps%3A%20Implicit%20Neural%20Representations%20for%20Resolution-Agnostic%20Retinal%20OCT%20Analysis%0AAuthor%3A%20Bennet%20Kahrs%20and%20Julia%20Andresen%20and%20Fenja%20Falta%20and%20Monty%20Santarossa%20and%20Heinz%20Handels%20and%20Timo%20Kepp%0AAbstract%3A%20Routine%20clinical%20imaging%20of%20the%20retina%20using%20optical%20coherence%20tomography%20%28OCT%29%20is%20performed%20with%20large%20slice%20spacing%2C%20resulting%20in%20highly%20anisotropic%20images%20and%20a%20sparsely%20scanned%20retina.%20Most%20learning-based%20methods%20circumvent%20the%20problems%20arising%20from%20the%20anisotropy%20by%20using%202D%20approaches%20rather%20than%20performing%20volumetric%20analyses.%20These%20approaches%20inherently%20bear%20the%20risk%20of%20generating%20inconsistent%20results%20for%20neighboring%20B-scans.%20For%20example%2C%202D%20retinal%20layer%20segmentations%20can%20have%20irregular%20surfaces%20in%203D.%20Furthermore%2C%20the%20typically%20used%20convolutional%20neural%20networks%20are%20bound%20to%20the%20resolution%20of%20the%20training%20data%2C%20which%20prevents%20their%20usage%20for%20images%20acquired%20with%20a%20different%20imaging%20protocol.%20Implicit%20neural%20representations%20%28INRs%29%20have%20recently%20emerged%20as%20a%20tool%20to%20store%20voxelized%20data%20as%20a%20continuous%20representation.%20Using%20coordinates%20as%20input%2C%20INRs%20are%20resolution-agnostic%2C%20which%20allows%20them%20to%20be%20applied%20to%20anisotropic%20data.%20In%20this%20paper%2C%20we%20propose%20two%20frameworks%20that%20make%20use%20of%20this%20characteristic%20of%20INRs%20for%20dense%203D%20analyses%20of%20retinal%20OCT%20volumes.%201%29%20We%20perform%20inter-B-scan%20interpolation%20by%20incorporating%20additional%20information%20from%20en-face%20modalities%2C%20that%20help%20retain%20relevant%20structures%20between%20B-scans.%202%29%20We%20create%20a%20resolution-agnostic%20retinal%20atlas%20that%20enables%20general%20analysis%20without%20strict%20requirements%20for%20the%20data.%20Both%20methods%20leverage%20generalizable%20INRs%2C%20improving%20retinal%20shape%20representation%20through%20population-based%20training%20and%20allowing%20predictions%20for%20unseen%20cases.%20Our%20resolution-independent%20frameworks%20facilitate%20the%20analysis%20of%20OCT%20images%20with%20large%20B-scan%20distances%2C%20opening%20up%20possibilities%20for%20the%20volumetric%20evaluation%20of%20retinal%20structures%20and%20pathologies.%0ALink%3A%20http%3A//arxiv.org/abs/2601.02447v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDon%2527t%2520Mind%2520the%2520Gaps%253A%2520Implicit%2520Neural%2520Representations%2520for%2520Resolution-Agnostic%2520Retinal%2520OCT%2520Analysis%26entry.906535625%3DBennet%2520Kahrs%2520and%2520Julia%2520Andresen%2520and%2520Fenja%2520Falta%2520and%2520Monty%2520Santarossa%2520and%2520Heinz%2520Handels%2520and%2520Timo%2520Kepp%26entry.1292438233%3DRoutine%2520clinical%2520imaging%2520of%2520the%2520retina%2520using%2520optical%2520coherence%2520tomography%2520%2528OCT%2529%2520is%2520performed%2520with%2520large%2520slice%2520spacing%252C%2520resulting%2520in%2520highly%2520anisotropic {"title": "Decoupling Perception from Reasoning for Hallucination-Resistant Video Understanding", "author": "Bowei Pu and Chuanbin Liu and Yifan Ge and Peicheng Zhou and Yiwei Sun and Zhiying Lu and Zhangchi Hu and Hongtao Xie", "abstract": "Video Large Language Models improve reasoning over complex videos by generating intermediate reasoning text. However, reliable reasoning depends on accurate video perception. In existing approaches, perception evidence is intertwined with reasoning text, making it difficult to directly supervise the perception process. We argue that reliable supervision requires explicitly separating perception evidence from reasoning so that perception can be verified independently. To supervise perception directly, we propose Decoupled Perception and Logic (DPL), which represents perception as fixed-format evidence units containing timestamps and visual descriptions. This structured representation enables direct extraction of perception content and simplifies alignment between video segments and reward evaluation. Building on DPL, we introduce a perception reward that encourages both hallucination resistance and perception-based reasoning. An Factual-Aware Evaluator (FAE) provides anti-hallucination scores and achieves hallucination evaluation performance comparable to GPT-4o. In addition, we validate reasoning consistency by feeding perception results and questions into a reference model. Experiments show that, by providing reliable process rewards, Video-DPL consistently improves post-training performance at both 3B and 7B scales, while delivering higher data efficiency.", "link": "http://arxiv.org/abs/2511.18463v3", "date": "2026-03-12", "relevancy": 2.7887, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5642}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5642}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5447}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Decoupling%20Perception%20from%20Reasoning%20for%20Hallucination-Resistant%20Video%20Understanding&body=Title%3A%20Decoupling%20Perception%20from%20Reasoning%20for%20Hallucination-Resistant%20Video%20Understanding%0AAuthor%3A%20Bowei%20Pu%20and%20Chuanbin%20Liu%20and%20Yifan%20Ge%20and%20Peicheng%20Zhou%20and%20Yiwei%20Sun%20and%20Zhiying%20Lu%20and%20Zhangchi%20Hu%20and%20Hongtao%20Xie%0AAbstract%3A%20Video%20Large%20Language%20Models%20improve%20reasoning%20over%20complex%20videos%20by%20generating%20intermediate%20reasoning%20text.%20However%2C%20reliable%20reasoning%20depends%20on%20accurate%20video%20perception.%20In%20existing%20approaches%2C%20perception%20evidence%20is%20intertwined%20with%20reasoning%20text%2C%20making%20it%20difficult%20to%20directly%20supervise%20the%20perception%20process.%20We%20argue%20that%20reliable%20supervision%20requires%20explicitly%20separating%20perception%20evidence%20from%20reasoning%20so%20that%20perception%20can%20be%20verified%20independently.%20To%20supervise%20perception%20directly%2C%20we%20propose%20Decoupled%20Perception%20and%20Logic%20%28DPL%29%2C%20which%20represents%20perception%20as%20fixed-format%20evidence%20units%20containing%20timestamps%20and%20visual%20descriptions.%20This%20structured%20representation%20enables%20direct%20extraction%20of%20perception%20content%20and%20simplifies%20alignment%20between%20video%20segments%20and%20reward%20evaluation.%20Building%20on%20DPL%2C%20we%20introduce%20a%20perception%20reward%20that%20encourages%20both%20hallucination%20resistance%20and%20perception-based%20reasoning.%20An%20Factual-Aware%20Evaluator%20%28FAE%29%20provides%20anti-hallucination%20scores%20and%20achieves%20hallucination%20evaluation%20performance%20comparable%20to%20GPT-4o.%20In%20addition%2C%20we%20validate%20reasoning%20consistency%20by%20feeding%20perception%20results%20and%20questions%20into%20a%20reference%20model.%20Experiments%20show%20that%2C%20by%20providing%20reliable%20process%20rewards%2C%20Video-DPL%20consistently%20improves%20post-training%20performance%20at%20both%203B%20and%207B%20scales%2C%20while%20delivering%20higher%20data%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/2511.18463v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDecoupling%2520Perception%2520from%2520Reasoning%2520for%2520Hallucination-Resistant%2520Video%2520Understanding%26entry.906535625%3DBowei%2520Pu%2520and%2520Chuanbin%2520Liu%2520and%2520Yifan%2520Ge%2520and%2520Peicheng%2520Zhou%2520and%2520Yiwei%2520Sun%2520and%2520Zhiying%2520Lu%2520and%2520Zhangchi%2520Hu%2520and%2520Hongtao%2520Xie%26entry.1292438233%3DVideo%2520Large%2520Language%2520Models%2520improve%2520reasoning%2520over%2520complex%2520videos%2520by%2520generating%2520intermediate%2520reasoning%2520text.%2520However%252C%2520reliable%2520reasoning%2520depends%2520on%2520accurate%2520video%2520perception.%2520In%2520existing%2520approaches%252C%2520perception%2520evidence%2520is%2520intertwined%2520with%2520reasoning%2520text%252C%2520making%2520it%2520difficult%2520to%2520directly%2520supervise%2520the%2520perception%2520process.%2520We%2520argue%2520that%2520reliable%2520supervision%2520requires%2520explicitly%2520separating%2520perception%2520evidence%2520from%2520reasoning%2520so%2520that%2520perception%2520can%2520be%2520verified%2520independently.%2520To%2520supervise%2520perception%2520directly%252C%2520we%2520propose%2520Decoupled%2520Perception%2520and%2520Logic%2520%2528DPL%2529%252C%2520which%2520represents%2520perception%2 {"title": "Interpreting Contrastive Embeddings in Specific Domains with Fuzzy Rules", "author": "Javier Fumanal-Idocin and Mohammadreza Jamalifard and Javier Andreu-Perez", "abstract": "Free-style text is still one of the common ways in which data is registered in real environments, like legal procedures and medical records. Because of that, there have been significant efforts in the area of natural language processing to convert these texts into a structured format, which standard machine learning methods can then exploit. One of the most popular methods to embed text into a vectorial representation is the Contrastive Language-Image Pre-training model (CLIP), which was trained using both image and text. Although the representations computed by CLIP have been very successful in zero-show and few-shot learning problems, they still have problems when applied to a particular domain. In this work, we use a fuzzy rule-based classification system along with some standard text procedure techniques to map some of our features of interest to the space created by a CLIP model. Then, we discuss the rules and associations obtained and the importance of each feature considered. We apply this approach in two different data domains, clinical reports and film reviews, and compare the results obtained individually and when considering both. Finally, we discuss the limitations of this approach and how it could be further improved.", "link": "http://arxiv.org/abs/2603.12227v1", "date": "2026-03-12", "relevancy": 2.7679, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5537}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5537}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0 20and%20how%20it%20could%20be%20further%20improved.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12227v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInterpreting%2520Contrastive%2520Embeddings%2520in%2520Specific%2520Domains%2520with%2520Fuzzy%2520Rules%26entry.906535625%3DJavier%2520Fumanal-Idocin%2520and%2520Mohammadreza%2520Jamalifard%2520and%2520Javier%2520Andreu-Perez%26entry.1292438233%3DFree-style%2520text%2520is%2520still%2520one%2520of%2520the%2520common%2520ways%2520in%2520which%2520data%2520is%2520registered%2520in%2520real%2520environments%252C%2520like%2520legal%2520procedures%2520and%2520medical%2520records.%2520Because%2520of%2520that%252C%2520there%2520have%2520been%2520significant%2520efforts%2520in%2520the%2520area%2520of%2520natural%2520language%2520processing%2520to%2520convert%2520these%2520texts%2520into%2520a%2520structured%2520format%252C%2520which%2520standard%2520machine%2520learning%2520methods%2520can%2520then%2520exploit.%2520One%2520of%2520the%2520most%2520popular%2520methods%2520to%2520embed%2520text%2520into%2520a%2520vectorial%2520representation%2520is%2520the%2520Contrastive%2520Language-Image%2520Pre-training%2520model%2520%2528CLIP%2529%252C%2520which%2520was%2520trained%2520using%2520both%2520image%2520and%2520text.%2520Although%2520the%2520representations%2520computed%2520by%2520CLIP%2520have%2520been%2520very%2520successful%2520in%2520zero-show%2520and%2520few-shot%2520learning%2520problems%252C%2520they%2520still%2520have%2520problems%2520when%2520applied%2520to%2520a%2520particular%2520domain.%2520In%2520this%2520work%252C%2520we%2520use%2520a%2520fuzzy%2520rule-based%2520classification%2520system%2520along%2520with%2520some%2520standard%2520text%2520procedure%2520techniques%2520to%2520map%2520some%2520of%2520our%2520features%2520of%2520interest%2520to%2520the%2520space%2520created%2520by%2520a%2520CLIP%2520model.%2520Then%252C%2520we%2520discuss%2520the%2520rules%2520and%2520associations%2520obtained%2520and%2520the%2520importance%2520of%2520each%2520feature%2520considered.%2520We%2520apply%2520this%2520approach%2520in%2520two%2520different%2520data%2520domains%252C%2520clinical%2520reports%2520and%2520film%2520reviews%252C%2520and%2520compare%2520the%2520results%2520obtained%2520individually%2520and%2520when%2520considering%2520both.%2520Finally%252C%2520we%2520discuss%2520the%2520limitations%2520of%2520this%2520approach%2520and%2520how%2520it%2520could%2520be%2520further%2520improved.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.12227v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Interpreting%20Contrastive%20Embeddings%20in%20Specific%20Domains%20with%20Fuzzy%20Rules&entry.906535625=Javier%20Fumanal-Idocin%20and%20Mohammadreza%20Jamalifard%20and%20Javier%20Andreu-Perez&entry.1292438233=Free-style%20text%20is%20still%20one%20of%20the%20common%20ways%20in%20which%20data%20is%20registered%20in%20real%20environments%2C%20like%20legal%20procedures%20and%20medical%20records.%20Because%20of%20that%2C%20there%20have%20been%20significant%20efforts%20in%20the%20area%20of%20natural%20language%20processing%20to%20convert%20these%20texts%20into%20a%20structured%20format%2C%20which%20standard%20machine%20learning%20methods%20can%20then%20exploit.%20One%20of%20the%20most%20popular%20methods%20to%20embed%20text%20into%20a%20vectorial%20representation%20is%20the%20Contrastive%20Language-Image%20Pre-training%20model%20%28CLIP%29%2C%20which%20was%20trained%20using%20both%20image%20and%20text.%20Although%20the%20representations%20computed%20by%20CLIP%20have%20been%20very%20successful%20in%20zero-show%20and%20few-shot%20learning%20problems%2C%20they%20still%20have%20problems%20when%20applied%20to%20a%20particular%20domain.%20In%20this%20work%2C%20we%20use%20a%20fuzzy%20rule-based%20classification%20system%20along%20with%20some%20standard%20text%20procedure%20techniques%20to%20map%20some%20of%20our%20features%20of%20interest%20to%20the%20space%20created%20by%20a%20CLIP%20model.%20Then%2C%20we%20discuss%20the%20rules%20and%20associations%20obtained%20and%20the%20importance%20of%20each%20feature%20considered.%20We%20apply%20this%20approach%20in%20two%20different%20data%20domains%2C%20clinical%20reports%20and%20film%20reviews%2C%20and%20compare%20the%20results%20obtained%20individually%20and%20when%20considering%20both.%20Finally%2C%20we%20discuss%20the%20limitations%20of%20this%20approach%20and%20how%20it%20could%20be%20further%20improved.&entry.1838667208=http%3A//arxiv.org/abs/2603.12227v1&entry.124074799=Read"},
{"title": "Your Classifier Can Do More: Towards Balancing the Gaps in Classification, Robustness, and Generation", "author": "Kaichao Jiang and He Wang and Xiaoshuai Hao and Xiulong Yang and Ajian Liu and Qi Chu and Yunfeng Diao and Richang Hong", "abstract": "Joint Energy-based Models (JEMs) are well known for their ability to unify classification and generation within a single framework. Despite their promising generative and discriminative performance, their robustness remains far inferior to adversarial training (AT), which, conversely, achieves strong robustness but sacrifices clean accuracy and lacks generative ability. This inherent trilemma-balancing classification accuracy, robustness, and generative capability-raises a fundamental question: Can a single model achieve all three simultaneously? To answer this, we conduct a systematic energy landscape analysis of clean, adversarial, and generated samples across various JEM and AT variants. We observe that AT reduces the energy gap between clean and adversarial samples, while JEMs narrow the gap between clean and synthetic ones. This observation suggests a key insight: if the energy distributions of all three data types can be aligned, we might bridge their performance disparities. Building on this idea, we propose Energy-based Joint Distribution Adversarial Training (EB-JDAT), a unified generative-discriminative-robust framework that maximizes the joint probability of clean and adversarial distribution. EB-JDAT introduces a novel min-max energy optimization to explicitly aligning energies across clean, adversarial, and generated samples. Extensive experiments on CIFAR-10, CIFAR-100, and ImageNet subsets demonstrate that EB-JDAT achieves state-of-the-art robustness while maintaining near-original accuracy and competitive generation quality of JEMs, effectively achieving a new trade-off frontier between accuracy, robustness, and generation. The code is released at https://github.com/yujkc/EB-JDAT.", "link": "http://arxiv.org/abs/2505.19459v3", "date": "2026-03-12", "relevancy": 2.7667, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5551}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.554}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5509}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Your%20Classifier%20Can%20Do%20More%3A%20Towards%20Balancing%20the%20Gaps%20in%20Classification%2C%20Robustness%2C%20and%20Generation&body=Title%3A%20Your%20Classifier%20Can%20Do%20More%3A%20Towards%20Balancing%20the%20Gaps%20in%20Classification%2C%20Robustness%2C%20and%20Generation%0AAuthor%3A%20Kaichao%20Jiang%20and%20He%20Wang%20and%20Xiaoshuai%20Hao%20and%20Xiulong%20Yang%20and%20Ajian%20Liu%20and%20Qi%20Chu%20and%20Yunfeng%20Diao%20and%20Richang%20Hong%0AAbstract%3A%20Joint%20Energy-based%20Models%20%28JEMs%29%20are%20well%20known%20for%20their%20ability%20to%20unify%20classification%20and%20generation%20within%20a%20single%20framework.%20Despite%20their%20promising%20generative%20and%20discriminative%20performance%2C%20their%20robustness%20remains%20far%20inferior%20to%20adversarial%20training%20%28AT%29%2C%20which%2C%20conversely%2C%20achieves%20strong%20robustness%20but%20sacrifices%20clean%20accuracy%20and%20lacks%20generative%20ability.%20This%20inherent%20trilemma-balancing%20classification%20accuracy%2C%20robustness%2C%20and%20generative%20capability-raises%20a%20fundamental%20question%3A%20Can%20a%20single%20model%20achieve%20all%20three%20simultaneously%3F%20To%20answer%20this%2C%20we%20conduct%20a%20systematic%20energy%20landscape%20analysis%20of%20clean%2C%20adversarial%2C%20and%20generated%20samples%20across%20various%20JEM%20and%20AT%20variants.%20We%20observe%20that%20AT%20reduces%20the%20energy%20gap%20between%20clean%20and%20adversarial%20samples%2C%20while%20JEMs%20narrow%20the%20gap%20between%20clean%20and%20synthetic%20ones.%20This%20observation%20suggests%20a%20key%20insight%3A%20if%20the%20energy%20distributions%20of%20all%20three%20data%20types%20can%20be%20aligned%2C%20we%20might%20bridge%20their%20performance%20disparities.%20Building%20on%20this%20idea%2C%20we%20propose%20Energy-based%20Joint%20Distribution%20Adversarial%20Training%20%28EB-JDAT%29%2C%20a%20unified%20generative-discriminative-robust%20framework%20that%20maximizes%20the%20joint%20probability%20of%20clean%20and%20adversarial%20distribution.%20EB-JDAT%20introduces%20a%20novel%20min-max%20energy%20optimization%20to%20explicitly%20aligning%20energies%20across%20clean%2C%20adversarial%2C%20and%20generated%20samples.%20Extensive%20experiments%20on%20CIFAR-10%2C%20CIFAR-100%2C%20and%20ImageNet%20subsets%20demonstrate%20that%20EB-JDAT%20achieves%20state-of-the-art%20robustness%20while%20maintaining%20near-original%20accuracy%20and%20competitive%20generation%20quality%20of%20JEMs%2C%20effectively%20achieving%20a%20new%20trade-off%20frontier%20between%20accuracy%2C%20robustness%2C%20and%20generation.%20The%20code%20is%20released%20at%20https%3A//github.com/yujkc/EB-JDAT.%0ALink%3A%20http%3A//arxiv.org/abs/2505.19459v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DYour%2520Classifier%2520Can%2520Do%2520More%253A%2520Towards%2520Balancing%2520the%2520Gaps%2520in%2520Classification%252C%2520Robustness%252C%2520and%2520Generation%26entry.906535625%3DKaichao%2520Jiang%2520and%2520He%2520Wang%2520and%2520Xiaoshuai%2520Hao%2520and%2520Xiulong%2520Yang%2520and%2520Ajian%2520Liu%2520and%2520Qi%2520Chu%2520and%2520Yunfeng%2520Diao%2520and%2520Richang%2520Hong%26entry.1292438233%3DJoint%2520Energy-based%2520Models%2520%2528JEMs%2529%2520are%2520well%2520known%2520for%2520their%2520ability% enerated%20samples%20across%20various%20JEM%20and%20AT%20variants.%20We%20observe%20that%20AT%20reduces%20the%20energy%20gap%20between%20clean%20and%20adversarial%20samples%2C%20while%20JEMs%20narrow%20the%20gap%20between%20clean%20and%20synthetic%20ones.%20This%20observation%20suggests%20a%20key%20insight%3A%20if%20the%20energy%20distributions%20of%20all%20three%20data%20types%20can%20be%20aligned%2C%20we%20might%20bridge%20their%20performance%20disparities.%20Building%20on%20this%20idea%2C%20we%20propose%20Energy-based%20Joint%20Distribution%20Adversarial%20Training%20%28EB-JDAT%29%2C%20a%20unified%20generative-discriminative-robust%20framework%20that%20maximizes%20the%20joint%20probability%20of%20clean%20and%20adversarial%20distribution.%20EB-JDAT%20introduces%20a%20novel%20min-max%20energy%20optimization%20to%20explicitly%20aligning%20energies%20across%20clean%2C%20adversarial%2C%20and%20generated%20samples.%20Extensive%20experiments%20on%20CIFAR-10%2C%20CIFAR-100%2C%20and%20ImageNet%20subsets%20demonstrate%20that%20EB-JDAT%20achieves%20state-of-the-art%20robustness%20while%20maintaining%20near-original%20accuracy%20and%20competitive%20generation%20quality%20of%20JEMs%2C%20effectively%20achieving%20a%20new%20trade-off%20frontier%20between%20accuracy%2C%20robustness%2C%20and%20generation.%20The%20code%20is%20released%20at%20https%3A//github.com/yujkc/EB-JDAT.&entry.1838667208=http%3A//arxiv.org/abs/2505.19459v3&entry.124074799=Read"},
{"title": "OSM-based Domain Adaptation for Remote Sensing VLMs", "author": "Stefan Maria Ailuro and Mario Markov and Mohammad Mahdi and Delyan Boychev and Luc Van Gool and Danda Pani Paudel", "abstract": "Vision-Language Models (VLMs) adapted to remote sensing rely heavily on domain-specific image-text supervision, yet high-quality annotations for satellite and aerial imagery remain scarce and expensive to produce. Prevailing pseudo-labeling pipelines address this gap by distilling knowledge from large frontier models, but this dependence on large teachers is costly, limits scalability, and caps achievable performance at the ceiling of the teacher. We propose OSMDA: a self-contained domain adaptation framework that eliminates this dependency. Our key insight is that a capable base VLM can serve as its own annotation engine: by pairing aerial images with rendered OpenStreetMap (OSM) tiles, we leverage optical character recognition and chart comprehension capabilities of the model to generate captions enriched by OSM's vast auxiliary metadata. The model is then fine-tuned on the resulting corpus with satellite imagery alone, yielding OSMDA-VLM, a domain-adapted VLM that requires no manual labeling and no stronger external model. We conduct exhaustive evaluations spanning 10 benchmarks across image-text-to-text tasks and comparing against 9 competitive baselines. When equally mixed with real data, our method achieves state-of-the-art results, while being substantially cheaper to train than teacher-dependent alternatives. These results suggest that, given a strong foundation model, alignment with crowd-sourced geographic data is a practical and scalable path towards remote sensing domain adaptation. Dataset and model weights will be made publicly available.", "link": "http://arxiv.org/abs/2603.11804v1", "date": "2026-03-12", "relevancy": 2.7486, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5665}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5421}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5405}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OSM-based%20Domain%20Adaptation%20for%20Remote%20Sensing%20VLMs&body=Title%3A%20OSM-based%20Domain%20Adaptation%20for%20Remote%20Sensing%20VLMs%0AAuthor%3A%20Stefan%20Maria%20Ailuro%20and%20Mario%20Markov%20and%20Mohammad%20Mahdi%20and%20Delyan%20Boychev%20and%20Luc%20Van%20Gool%20and%20Danda%20Pani%20Paudel%0AAbstract%3A%20Vision-Language%20Models%20%28VLMs%29%20adapted%20to%20remote%20sensing%20rely%20heavily%20on%20domain-specific%20image-text%20supervision%2C%20yet%20high-quality%20annotations%20for%20satellite%20and%20aerial%20imagery%20remain%20scarce%20and%20expensive%20to%20produce.%20Prevailing%20pseudo-labeling%20pipelines%20address%20this%20gap%20by%20distilling%20knowledge%20from%20large%20frontier%20models%2C%20but%20this%20dependence%20on%20large%20teachers%20is%20costly%2C%20limits%20scalability%2C%20and%20caps%20achievable%20performance%20at%20the%20ceiling%20of%20the%20teacher.%20We%20propose%20OSMDA%3A%20a%20self-contained%20domain%20adaptation%20framework%20that%20eliminates%20this%20dependency.%20Our%20key%20insight%20is%20that%20a%20capable%20base%20VLM%20can%20serve%20as%20its%20own%20annotation%20engine%3A%20by%20pairing%20aerial%20images%20with%20rendered%20OpenStreetMap%20%28OSM%29%20tiles%2C%20we%20leverage%20optical%20character%20recognition%20and%20chart%20comprehension%20capabilities%20of%20the%20model%20to%20generate%20captions%20enriched%20by%20OSM%27s%20vast%20auxiliary%20metadata.%20The%20model%20is%20then%20fine-tuned%20on%20the%20resulting%20corpus%20with%20satellite%20imagery%20alone%2C%20yielding%20OSMDA-VLM%2C%20a%20domain-adapted%20VLM%20that%20requires%20no%20manual%20labeling%20and%20no%20stronger%20external%20model.%20We%20conduct%20exhaustive%20evaluations%20spanning%2010%20benchmarks%20across%20image-text-to-text%20tasks%20and%20comparing%20against%209%20competitive%20baselines.%20When%20equally%20mixed%20with%20real%20data%2C%20our%20method%20achieves%20state-of-the-art%20results%2C%20while%20being%20substantially%20cheaper%20to%20train%20than%20teacher-dependent%20alternatives.%20These%20results%20suggest%20that%2C%20given%20a%20strong%20foundation%20model%2C%20alignment%20with%20crowd-sourced%20geographic%20data%20is%20a%20practical%20and%20scalable%20path%20towards%20remote%20sensing%20domain%20adaptation.%20Dataset%20and%20model%20weights%20will%20be%20made%20publicly%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2603.11804v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOSM-based%2520Domain%2520Adaptation%2520for%2520Remote%2520Sensing%2520VLMs%26entry.906535625%3DStefan%2520Maria%2520Ailuro%2520and%2520Mario%2520Markov%2520and%2520Mohammad%2520Mahdi%2520and%2520Delyan%2520Boychev%2520and%2520Luc%2520Van%2520Gool%2520and%2520Danda%2520Pani%2520Paudel%26entry.1292438233%3DVision-Language%2520Models%2520%2528VLMs%2529%2520adapted%2520to%2520remote%2520sensing%2520rely%2520heavily%2520on%2520domain-specific%2520image-text%2520supervision%252C%2520yet%2520high-quality%2520annotations%2520for%2520satellite%2520and%2520aerial%2520imagery%2520remain%2520scarce%2520and%2520expensive%2520to%2520produce.%2520Prevailing%2520pseudo-labeling%2520pipelines%2520address%2520this%2520gap%2520by%2520distilling%2520knowledge%2520from%2520large%2520frontier%2520models%252C%2520but%2520this%2520dependence%2520on%2520large%2520teachers%2520is%2520costly%252C%2520limits%2520scalability%252C%2520and%2520caps%2520achievable%2520performance%2520at%2520the%2520ceiling%2520of%2520the%2520teacher.%2520We%2520propose% {"title": "Continual Learning with Vision-Language Models via Semantic-Geometry Preservation", "author": "Chiyuan He and Zihuan Qiu and Fanman Meng and Runtong Zhang and Linfeng Xu and Qingbo Wu and Hongliang Li", "abstract": "Continual learning of pretrained vision-language models (VLMs) is prone to catastrophic forgetting, yet current approaches adapt to new tasks without explicitly preserving the cross-modal semantic geometry inherited from pretraining and previous stages, allowing new-task supervision to induce geometric distortion. We observe that the most pronounced drift tends to concentrate in vulnerable neighborhoods near the old-new semantic interface, where shared visual patterns are easily re-explained by new textual semantics. To address this under an exemplar-free constraint, we propose Semantic Geometry Preservation for Continual Learning (SeGP-CL). SeGP-CL first probes the drift-prone region by constructing a compact set of adversarial anchors with dual-targeted projected gradient descent (DPGD), which drives selected new-task seeds toward old-class semantics while remaining faithful in raw visual space. During training, we preserve cross-modal structure by anchor-guided cross-modal geometry distillation (ACGD), and stabilize the textual reference frame across tasks via a lightweight text semantic-geometry regularization (TSGR). After training, we estimate anchor-induced raw-space drift to transfer old visual prototypes and perform dual-path inference by fusing cross-modal and visual cues. Extensive experiments on five continual learning benchmarks demonstrate that SeGP-CL consistently improves stability and forward transfer, achieving state-of-the-art performance while better preserving semantic geometry of VLMs.", "link": "http://arxiv.org/abs/2603.12055v1", "date": "2026-03-12", "relevancy": 2.7362, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5701}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5358}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5358}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Continual%20Learning%20with%20Vision-Language%20Models%20via%20Semantic-Geometry%20Preservation&body=Title%3A%20Continual%20Learning%20with%20Vision-Language%20Models%20via%20Semantic-Geometry%20Preservation%0AAuthor%3A%20Chiyuan%20He%20and%20Zihuan%20Qiu%20and%20Fanman%20Meng%20and%20Runtong%20Zhang%20and%20Linfeng%20Xu%20and%20Qingbo%20Wu%20and%20Hongliang%20Li%0AAbstract%3A%20Continual%20learning%20of%20pretrained%20vision-language%20models%20%28VLMs%29%20is%20prone%20to%20catastrophic%20forgetting%2C%20yet%20current%20approaches%20adapt%20to%20new%20tasks%20without%20explicitly%20preserving%20the%20cross-modal%20semantic%20geometry%20inherited%20from%20pretraining%20and%20previous%20stages%2C%20allowing%20new-task%20supervision%20to%20induce%20geometric%20distortion.%20We%20observe%20that%20the%20most%20pronounced%20drift%20tends%20to%20concentrate%20in%20vulnerable%20neighborhoods%20near%20the%20old-new%20semantic%20interface%2C%20where%20shared%20visual%20patterns%20are%20easily%20re-explained%20by%20new%20textual%20semantics.%20To%20address%20this%20under%20an%20exemplar-free%20constraint%2C%20we%20propose%20Semantic%20Geometry%20Preservation%20for%20Continual%20Learning%20%28SeGP-CL%29.%20SeGP-CL%20first%20probes%20the%20drift-prone%20region%20by%20constructing%20a%20compact%20set%20of%20adversarial%20anchors%20with%20dual-targeted%20projected%20gradient%20descent%20%28DPGD%29%2C%20which%20drives%20selected%20new-task%20seeds%20toward%20old-class%20semantics%20while%20remaining%20faithful%20in%20raw%20visual%20space.%20During%20training%2C%20we%20preserve%20cross-modal%20structure%20by%20anchor-guided%20cross-modal%20geometry%20distillation%20%28ACGD%29%2C%20and%20stabilize%20the%20textual%20reference%20frame%20across%20tasks%20via%20a%20lightweight%20text%20semantic-geometry%20regularization%20%28TSGR%29.%20After%20training%2C%20we%20estimate%20anchor-induced%20raw-space%20drift%20to%20transfer%20old%20visual%20prototypes%20and%20perform%20dual-path%20inference%20by%20fusing%20cross-modal%20and%20visual%20cues.%20Extensive%20experiments%20on%20five%20continual%20learning%20benchmarks%20demonstrate%20that%20SeGP-CL%20consistently%20improves%20stability%20and%20forward%20transfer%2C%20achieving%20state-of-the-art%20performance%20while%20better%20preserving%20semantic%20geometry%20of%20VLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12055v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DContinual%2520Learning%2520with%2520Vision-Language%2520Models%2520via%2520Semantic-Geometry%2520Preservation%26entry.906535625%3DChiyuan%2520He%2520and%2520Zihuan%2520Qiu%2520and%2520Fanman%2520Meng%2520and%2520Runtong%2520Zhang%2520and%2520Linfeng%2520Xu%2520and%2520Qingbo%2520Wu%2520and%2520Hongliang%2520Li%26entry.1292438233%3DContinual%2520learning%2520of%2520pretrained%2520vision-language%2520models%2520%2528VLMs%2529%2520is%2520prone%2520to%2520catastrophic%2520forgetting%252C%2520yet%2520current%2520approaches%2520adapt%2520to%2520new%2520tasks%2520without%2520explicitly%2520preserving%2520the%2520cross-modal%2520semantic%2520geometry%2520inherited%2520from%2520pretraining%2520and%2520previous%2520stages%252C%2520allowing%2520new-task%2520supervision%2520to%2520induce%2520geometric%2520distortion.%2520We%2520observe%2520that%2520the%2520most%2520pronounced%2520drift%2520tends%2520to%2520concentrate%2520in%2520vulnerable%2520neighborhoods%2520near%2520the%2520old-new%2520semantic%2520interface%252C%2520where%2520shared%2520visual%2520patterns%2520are%2520 {"title": "BTZSC: A Benchmark for Zero-Shot Text Classification Across Cross-Encoders, Embedding Models, Rerankers and LLMs", "author": "Ilias Aarab", "abstract": "Zero-shot text classification (ZSC) offers the promise of eliminating costly task-specific annotation by matching texts directly to human-readable label descriptions. While early approaches have predominantly relied on cross-encoder models fine-tuned for natural language inference (NLI), recent advances in text-embedding models, rerankers, and instruction-tuned large language models (LLMs) have challenged the dominance of NLI-based architectures. Yet, systematically comparing these diverse approaches remains difficult. Existing evaluations, such as MTEB, often incorporate labeled examples through supervised probes or fine-tuning, leaving genuine zero-shot capabilities underexplored. To address this, we introduce BTZSC, a comprehensive benchmark of 22 public datasets spanning sentiment, topic, intent, and emotion classification, capturing diverse domains, class cardinalities, and document lengths. Leveraging BTZSC, we conduct a systematic comparison across four major model families, NLI cross-encoders, embedding models, rerankers and instruction-tuned LLMs, encompassing 38 public and custom checkpoints. Our results show that: (i) modern rerankers, exemplified by Qwen3-Reranker-8B, set a new state-of-the-art with macro F1 = 0.72; (ii) strong embedding models such as GTE-large-en-v1.5 substantially close the accuracy gap while offering the best trade-off between accuracy and latency; (iii) instruction-tuned LLMs at 4--12B parameters achieve competitive performance (macro F1 up to 0.67), excelling particularly on topic classification but trailing specialized rerankers; (iv) NLI cross-encoders plateau even as backbone size increases; and (v) scaling primarily benefits rerankers and LLMs over embedding models. BTZSC and accompanying evaluation code are publicly released to support fair and reproducible progress in zero-shot text understanding.", "link": "http://arxiv.org/abs/2603.11991v1", "date": "2026-03-12", "relevancy": 2.7186, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5553}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5553}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5205}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BTZSC%3A%20A%20Benchmark%20for%20Zero-Shot%20Text%20Classification%20Across%20Cross-Encoders%2C%20Embedding%20Models%2C%20Rerankers%20and%20LLMs&body=Title%3A%20BTZSC%3A%20A%20Benchmark%20for%20Zero-Shot%20Text%20Classification%20Across%20Cross-Encoders%2C%20Embedding%20Models%2C%20Rerankers%20and%20LLMs%0AAuthor%3A%20Ilias%20Aarab%0AAbstract%3A%20Zero-shot%20text%20classification%20%28ZSC%29%20offers%20the%20promise%20of%20eliminating%20costly%20task-specific%20annotation%20by%20matching%20texts%20directly%20to%20human-readable%20label%20descriptions.%20While%20early%20approaches%20have%20predominantly%20relied%20on%20cross-encoder%20models%20fine-tuned%20for%20natural%20language%20inference%20%28NLI%29%2C%20recent%20advances%20in%20text-embedding%20models%2C%20rerankers%2C%20and%20instruction-tuned%20large%20language%20models%20%28LLMs%29%20have%20challenged%20the%20dominance%20of%20NLI-based%20architectures.%20Yet%2C%20systematically%20comparing%20these%20diverse%20approaches%20remains%20difficult.%20Existing%20evaluations%2C%20such%20as%20MTEB%2C%20often%20incorporate%20labeled%20examples%20through%20supervised%20probes%20or%20fine-tuning%2C%20leaving%20genuine%20zero-shot%20capabilities%20underexplored.%20To%20address%20this%2C%20we%20introduce%20BTZSC%2C%20a%20comprehensive%20benchmark%20of%2022%20public%20datasets%20spanning%20sentiment%2C%20topic%2C%20intent%2C%20and%20emotion%20classification%2C%20capturing%20diverse%20domains%2C%20class%20cardinalities%2C%20and%20document%20lengths.%20Leveraging%20BTZSC%2C%20we%20conduct%20a%20systematic%20comparison%20across%20four%20major%20model%20families%2C%20NLI%20cross-encoders%2C%20embedding%20models%2C%20rerankers%20and%20instruction-tuned%20LLMs%2C%20encompassing%2038%20public%20and%20custom%20checkpoints.%20Our%20results%20show%20that%3A%20%28i%29%20modern%20rerankers%2C%20exemplified%20by%20Qwen3-Reranker-8B%2C%20set%20a%20new%20state-of-the-art%20with%20macro%20F1%20%3D%200.72%3B%20%28ii%29%20strong%20embedding%20models%20such%20as%20GTE-large-en-v1.5%20substantially%20close%20the%20accuracy%20gap%20while%20offering%20the%20best%20trade-off%20between%20accuracy%20and%20latency%3B%20%28iii%29%20instruction-tuned%20LLMs%20at%204--12B%20parameters%20achieve%20competitive%20performance%20%28macro%20F1%20up%20to%200.67%29%2C%20excelling%20particularly%20on%20topic%20classification%20but%20trailing%20specialized%20rerankers%3B%20%28iv%29%20NLI%20cross-encoders%20plateau%20even%20as%20backbone%20size%20increases%3B%20and%20%28v%29%20scaling%20primarily%20benefits%20rerankers%20and%20LLMs%20over%20embedding%20models.%20BTZSC%20and%20accompanying%20evaluation%20code%20are%20publicly%20released%20to%20support%20fair%20and%20reproducible%20progress%20in%20zero-shot%20text%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2603.11991v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBTZSC%253A%2520A%2520Benchmark%2520for%2520Zero-Shot%2520Text%2520Classification%2520Across%2520Cross-Encoders%252C%2520Embedding%2520Models%252C%2520Rerankers%2520and%2520LLMs%26entry.906535625%3DIlias%2520Aarab%26entry.1292438233%3DZero-shot%2520text%2520classification%2520%2528ZSC%2529%2520offers%2520the%2520promise%2520of%2520eliminating%2520costly%2520 n%20incorporate%20labeled%20examples%20through%20supervised%20probes%20or%20fine-tuning%2C%20leaving%20genuine%20zero-shot%20capabilities%20underexplored.%20To%20address%20this%2C%20we%20introduce%20BTZSC%2C%20a%20comprehensive%20benchmark%20of%2022%20public%20datasets%20spanning%20sentiment%2C%20topic%2C%20intent%2C%20and%20emotion%20classification%2C%20capturing%20diverse%20domains%2C%20class%20cardinalities%2C%20and%20document%20lengths.%20Leveraging%20BTZSC%2C%20we%20conduct%20a%20systematic%20comparison%20across%20four%20major%20model%20families%2C%20NLI%20cross-encoders%2C%20embedding%20models%2C%20rerankers%20and%20instruction-tuned%20LLMs%2C%20encompassing%2038%20public%20and%20custom%20checkpoints.%20Our%20results%20show%20that%3A%20%28i%29%20modern%20rerankers%2C%20exemplified%20by%20Qwen3-Reranker-8B%2C%20set%20a%20new%20state-of-the-art%20with%20macro%20F1%20%3D%200.72%3B%20%28ii%29%20strong%20embedding%20models%20such%20as%20GTE-large-en-v1.5%20substantially%20close%20the%20accuracy%20gap%20while%20offering%20the%20best%20trade-off%20between%20accuracy%20and%20latency%3B%20%28iii%29%20instruction-tuned%20LLMs%20at%204--12B%20parameters%20achieve%20competitive%20performance%20%28macro%20F1%20up%20to%200.67%29%2C%20excelling%20particularly%20on%20topic%20classification%20but%20trailing%20specialized%20rerankers%3B%20%28iv%29%20NLI%20cross-encoders%20plateau%20even%20as%20backbone%20size%20increases%3B%20and%20%28v%29%20scaling%20primarily%20benefits%20rerankers%20and%20LLMs%20over%20embedding%20models.%20BTZSC%20and%20accompanying%20evaluation%20code%20are%20publicly%20released%20to%20support%20fair%20and%20reproducible%20progress%20in%20zero-shot%20text%20understanding.&entry.1838667208=http%3A//arxiv.org/abs/2603.11991v1&entry.124074799=Read"},
{"title": "LoC-Path: Learning to Compress for Pathology Multimodal Large Language Models", "author": "Qingqiao Hu and Weimin Lyu and Meilong Xu and Kehan Qi and Xiaoling Hu and Saumya Gupta and Jiawei Zhou and Chao Chen", "abstract": "Whole Slide Image (WSI) MLLMs are difficult to build and deploy because gigapixel slides induce thousands of visual tokens, while only a small fraction of regions is diagnostically relevant. Existing slide-level pathology MLLMs typically combine heavy slide-level encoders with long visual prefixes, making end-to-end slide-level development and deployment expensive under limited computational resources. We revisit this regime and show that WSI tile features are highly redundant at both global and local scales, while task-relevant evidence is sparse and query-dependent. We therefore introduce LoC-Path, a resource-efficient slide-level MLLM that compresses before fusion. LoC-Path uses a Sparse Token Merger (STM) and an MAE-pretrained resampler to replace expensive slide-level encoding with a compact latent interface, then uses a Token Importance Scorer (TIS) to select the most relevant latents and a Cross-Attention Routing Adapter (CARA) to fuse them into a few LLM decoder layers. This design lowers both multimodal tuning cost and inference-time latency/memory by avoiding heavy slide-level encoding and long visual prefixes. Extensive experiments show that LoC-Path remains competitive with prior slide-level MLLMs while making end-to-end development and deployment more practical under limited computational resources.", "link": "http://arxiv.org/abs/2512.05391v3", "date": "2026-03-12", "relevancy": 2.7163, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5692}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5303}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5303}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LoC-Path%3A%20Learning%20to%20Compress%20for%20Pathology%20Multimodal%20Large%20Language%20Models&body=Title%3A%20LoC-Path%3A%20Learning%20to%20Compress%20for%20Pathology%20Multimodal%20Large%20Language%20Models%0AAuthor%3A%20Qingqiao%20Hu%20and%20Weimin%20Lyu%20and%20Meilong%20Xu%20and%20Kehan%20Qi%20and%20Xiaoling%20Hu%20and%20Saumya%20Gupta%20and%20Jiawei%20Zhou%20and%20Chao%20Chen%0AAbstract%3A%20Whole%20Slide%20Image%20%28WSI%29%20MLLMs%20are%20difficult%20to%20build%20and%20deploy%20because%20gigapixel%20slides%20induce%20thousands%20of%20visual%20tokens%2C%20while%20only%20a%20small%20fraction%20of%20regions%20is%20diagnostically%20relevant.%20Existing%20slide-level%20pathology%20MLLMs%20typically%20combine%20heavy%20slide-level%20encoders%20with%20long%20visual%20prefixes%2C%20making%20end-to-end%20slide-level%20development%20and%20deployment%20expensive%20under%20limited%20computational%20resources.%20We%20revisit%20this%20regime%20and%20show%20that%20WSI%20tile%20features%20are%20highly%20redundant%20at%20both%20global%20and%20local%20scales%2C%20while%20task-relevant%20evidence%20is%20sparse%20and%20query-dependent.%20We%20therefore%20introduce%20LoC-Path%2C%20a%20resource-efficient%20slide-level%20MLLM%20that%20compresses%20before%20fusion.%20LoC-Path%20uses%20a%20Sparse%20Token%20Merger%20%28STM%29%20and%20an%20MAE-pretrained%20resampler%20to%20replace%20expensive%20slide-level%20encoding%20with%20a%20compact%20latent%20interface%2C%20then%20uses%20a%20Token%20Importance%20Scorer%20%28TIS%29%20to%20select%20the%20most%20relevant%20latents%20and%20a%20Cross-Attention%20Routing%20Adapter%20%28CARA%29%20to%20fuse%20them%20into%20a%20few%20LLM%20decoder%20layers.%20This%20design%20lowers%20both%20multimodal%20tuning%20cost%20and%20inference-time%20latency/memory%20by%20avoiding%20heavy%20slide-level%20encoding%20and%20long%20visual%20prefixes.%20Extensive%20experiments%20show%20that%20LoC-Path%20remains%20competitive%20with%20prior%20slide-level%20MLLMs%20while%20making%20end-to-end%20development%20and%20deployment%20more%20practical%20under%20limited%20computational%20resources.%0ALink%3A%20http%3A//arxiv.org/abs/2512.05391v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLoC-Path%253A%2520Learning%2520to%2520Compress%2520for%2520Pathology%2520Multimodal%2520Large%2520Language%2520Models%26entry.906535625%3DQingqiao%2520Hu%2520and%2520Weimin%2520Lyu%2520and%2520Meilong%2520Xu%2520and%2520Kehan%2520Qi%2520and%2520Xiaoling%2520Hu%2520and%2520Saumya%2520Gupta%2520and%2520Jiawei%2520Zhou%2520and%2520Chao%2520Chen%26entry.1292438233%3DWhole%2520Slide%2520Image%2520%2528WSI%2529%2520MLLMs%2520are%2520difficult%2520to%2520build%2520and%2520deploy%2520because%2520gigapixel%2520slides%2520induce%2520thousands%2520of%2520visual%2520tokens%252C%2520while%2520only%2520a%2520small%2520fraction%2520of%2520regions%2520is%2520diagnostically%2520relevant.%2520Existing%2520slide-level%2520pathology%2520MLLMs%2520typically%2520combine%2520heavy%2520slide-level%2520encoders%2520with%2520long%2520visual%2520prefixes%252C%2520making%2520end-to-end%2520slide-level%2520development%2520and%2520deployment%2520expensive%2520under%2520limited%2520computational%2520resources.%2520We%2520revisit%2520this%2520regime%2520and%2520show%2520that%2520WSI%2520tile%2520features%2520are%2520highly%2520redundant%2520at%2520both%2520global%2520and%2520local%2520scales%252C%2520while%2520task-relevant%2520evidence%2520is%2520sparse%2520and%2520query-dependent.%2520We%2520therefore%2520introduce%2520LoC-Path%252C%2520a%2520resource-efficient%2520slide-level%2520MLLM%2520that%2520compresses%2520before%2520fusion.%2520LoC-Path%2520uses%2520a%2520Sparse%2520Token%2520Merger%2520%2528STM%2529%2520and%2520an%2520MAE-pretrained%2520resampler%2520to%2520replace%2520expensive%2520slide-level%2520encoding%2520with%2520a%2520compact%2520latent%2520interface%252C%2520then%2520uses%2520a%2520Token%2520Importance%2520Scorer%2520%2528TIS%2529%2520to%2520select%2520the%2520most%2520relevant%2520latents%2520and%2520a%2520Cross-Attention%2520Routing%2520Adapter%2520%2528CARA%2529%2520to%2520fuse%2520them%2520into%2520a%2520few%2520LLM%2520decoder%2520layers.%2520This%2520design%2520lowers%2520both%2520multimodal%2520tuning%2520cost%2520and%2520inference-time%2520latency/memory%2520by%2520avoiding%2520heavy%2520slide-level%2520encoding%2520and%2520long%2520visual%2520prefixes.%2520Extensive%2520experiments%2520show%2520that%2520LoC-Path%2520remains%2520competitive%2520with%2520prior%2520slide-level%2520MLLMs%2520while%2520making%2520end-to-end%2520development%2520and%2520deployment%2520more%2520practical%2520under%2520limited%2520computational%2520resources.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.05391v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=LoC-Path%3A%20Learning%20to%20Compress%20for%20Pathology%20Multimodal%20Large%20Language%20Models&entry.906535625=Qingqiao%20Hu%20and%20Weimin%20Lyu%20and%20Meilong%20Xu%20and%20Kehan%20Qi%20and%20Xiaoling%20Hu%20and%20Saumya%20Gupta%20and%20Jiawei%20Zhou%20and%20Chao%20Chen&entry.1292438233=Whole%20Slide%20Image%20%28WSI%29%20MLLMs%20are%20difficult%20to%20build%20and%20deploy%20because%20gigapixel%20slides%20induce%20thousands%20of%20visual%20tokens%2C%20while%20only%20a%20small%20fraction%20of%20regions%20is%20diagnostically%20relevant.%20Existing%20slide-level%20pathology%20MLLMs%20typically%20combine%20heavy%20slide-level%20encoders%20with%20long%20visual%20prefixes%2C%20making%20end-to-end%20slide-level%20development%20and%20deployment%20expensive%20under%20limited%20computation {"title": "Think While Watching: Online Streaming Segment-Level Memory for Multi-Turn Video Reasoning in Multimodal Large Language Models", "author": "Lu Wang and Zhuoran Jin and Yupu Hao and Yubo Chen and Kang Liu and Yulong Ao and Jun Zhao", "abstract": "Multimodal large language models (MLLMs) have shown strong performance on offline video understanding, but most are limited to offline inference or have weak online reasoning, making multi-turn interaction over continuously arriving video streams difficult. Existing streaming methods typically use an interleaved perception-generation paradigm, which prevents concurrent perception and generation and leads to early memory decay as streams grow, hurting long-range dependency modeling. We propose Think While Watching, a memory-anchored streaming video reasoning framework that preserves continuous segment-level memory during multi-turn interaction. We build a three-stage, multi-round chain-of-thought dataset and adopt a stage-matched training strategy, while enforcing strict causality through a segment-level streaming causal mask and streaming positional encoding. During inference, we introduce an efficient pipeline that overlaps watching and thinking and adaptively selects the best attention backend. Under both single-round and multi-round streaming input protocols, our method achieves strong results. Built on Qwen3-VL, it improves single-round accuracy by 2.6% on StreamingBench and by 3.79% on OVO-Bench. In the multi-round setting, it maintains performance while reducing output tokens by 56%. Code is available at: https://github.com/wl666hhh/Think_While_Watching/", "link": "http://arxiv.org/abs/2603.11896v1", "date": "2026-03-12", "relevancy": 2.7148, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5471}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5471}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5347}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Think%20While%20Watching%3A%20Online%20Streaming%20Segment-Level%20Memory%20for%20Multi-Turn%20Video%20Reasoning%20in%20Multimodal%20Large%20Language%20Models&body=Title%3A%20Think%20While%20Watching%3A%20Online%20Streaming%20Segment-Level%20Memory%20for%20Multi-Turn%20Video%20Reasoning%20in%20Multimodal%20Large%20Language%20Models%0AAuthor%3A%20Lu%20Wang%20and%20Zhuoran%20Jin%20and%20Yupu%20Hao%20and%20Yubo%20Chen%20and%20Kang%20Liu%20and%20Yulong%20Ao%20and%20Jun%20Zhao%0AAbstract%3A%20Multimodal%20large%20language%20models%20%28MLLMs%29%20have%20shown%20strong%20performance%20on%20offline%20video%20understanding%2C%20but%20most%20are%20limited%20to%20offline%20inference%20or%20have%20weak%20online%20reasoning%2C%20making%20multi-turn%20interaction%20over%20continuously%20arriving%20video%20streams%20difficult.%20Existing%20streaming%20methods%20typically%20use%20an%20interleaved%20perception-generation%20paradigm%2C%20which%20prevents%20concurrent%20perception%20and%20generation%20and%20leads%20to%20early%20memory%20decay%20as%20streams%20grow%2C%20hurting%20long-range%20dependency%20modeling.%20We%20propose%20Think%20While%20Watching%2C%20a%20memory-anchored%20streaming%20video%20reasoning%20framework%20that%20preserves%20continuous%20segment-level%20memory%20during%20multi-turn%20interaction.%20We%20build%20a%20three-stage%2C%20multi-round%20chain-of-thought%20dataset%20and%20adopt%20a%20stage-matched%20training%20strategy%2C%20while%20enforcing%20strict%20causality%20through%20a%20segment-level%20streaming%20causal%20mask%20and%20streaming%20positional%20encoding.%20During%20inference%2C%20we%20introduce%20an%20efficient%20pipeline%20that%20overlaps%20watching%20and%20thinking%20and%20 {"title": "EgoIntent: An Egocentric Step-level Benchmark for Understanding What, Why, and Next", "author": "Ye Pan and Chi Kit Wong and Yuanhuiyi Lyu and Hanqian Li and Jiahao Huo and Jiacheng Chen and Lutao Jiang and Xu Zheng and Xuming Hu", "abstract": "Multimodal Large Language Models (MLLMs) have demonstrated remarkable video reasoning capabilities across diverse tasks. However, their ability to understand human intent at a fine-grained level in egocentric videos remains largely unexplored. Existing benchmarks focus primarily on episode-level intent reasoning, overlooking the finer granularity of step-level intent understanding. Yet applications such as intelligent assistants, robotic imitation learning, and augmented reality guidance require understanding not only what a person is doing at each step, but also why and what comes next, in order to provide timely and context-aware support. To this end, we introduce EgoIntent, a step-level intent understanding benchmark for egocentric videos. It comprises 3,014 steps spanning 15 diverse indoor and outdoor daily-life scenarios, and evaluates models on three complementary dimensions: local intent (What), global intent (Why), and next-step plan (Next). Crucially, each clip is truncated immediately before the key outcome of the queried step (e.g., contact or grasp) occurs and contains no frames from subsequent steps, preventing future-frame leakage and enabling a clean evaluation of anticipatory step understanding and next-step planning. We evaluate 15 MLLMs, including both state-of-the-art closed-source and open-source models. Even the best-performing model achieves an average score of only 33.31 across the three intent dimensions, underscoring that step-level intent understanding in egocentric videos remains a highly challenging problem that calls for further investigation.", "link": "http://arxiv.org/abs/2603.12147v1", "date": "2026-03-12", "relevancy": 2.7113, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5539}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5539}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.519}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EgoIntent%3A%20An%20Egocentric%20Step-level%20Benchmark%20for%20Understanding%20What%2C%20Why%2C%20and%20Next&body=Title%3A%20EgoIntent%3A%20An%20Egocentric%20Step-level%20Benchmark%20for%20Understanding%20What%2C%20Why%2C%20and%20Next%0AAuthor%3A%20Ye%20Pan%20and%20Chi%20Kit%20Wong%20and%20Yuanhuiyi%20Lyu%20and%20Hanqian%20Li%20and%20Jiahao%20Huo%20and%20Jiacheng%20Chen%20and%20Lutao%20Jiang%20and%20Xu%20Zheng%20and%20Xuming%20Hu%0AAbstract%3A%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20have%20demonstrated%20remarkable%20video%20reasoning%20capabilities%20across%20diverse%20tasks.%20However%2C%20their%20ability%20to%20understand%20human%20intent%20at%20a%20fine-grained%20level%20in%20egocentric%20videos%20remains%20largely%20unexplored.%20Existing%20benchmarks%20focus%20primarily%20on%20episode-level%20intent%20reasoning%2C%20overlooking%20the%20finer%20granularity%20of%20step-level%20intent%20understanding.%20Yet%20applications%20such%20as%20intelligent%20assistants%2C%20robotic%20imitation%20learning%2C%20and%20augmented%20reality%20guidance%20require%20understanding%20not%20only%20what%20a%20person%20is%20doing%20at%20each%20step%2C%20but%20also%20why%20and%20what%20comes%20next%2C%20in%20order%20to%20provide%20timely%20and%20context-aware%20support.%20To%20this%20end%2C%20we%20introduce%20EgoIntent%2C%20a%20step-level%20intent%20understanding%20benchmark%20for%20egocentric%20videos.%20It%20comprises%203%2C014%20steps%20spanning%2015%20diverse%20indoor%20and%20outdoor%20daily-life%20scenarios%2C%20and%20evaluates%20models%20on%20three%20complementary%20dimensions%3A%20local%20intent%20%28What%29%2C%20global%20intent%20%28Why%29%2C%20and%20next-step%20plan%20%28Next%29.%20Crucially%2C%20each%20clip%20is%20truncated%20immediately%20before%20the%20key%20outcome%20of%20the%20queried%20step%20%28e.g.%2C%20contact%20or%20grasp%29%20occurs%20and%20contains%20no%20frames%20from%20subsequent%20steps%2C%20preventing%20future-frame%20leakage%20and%20enabling%20a%20clean%20evaluation%20of%20anticipatory%20step%20understanding%20and%20next-step%20planning.%20We%20evaluate%2015%20MLLMs%2C%20including%20both%20state-of-the-art%20closed-source%20and%20open-source%20models.%20Even%20the%20best-performing%20model%20achieves%20an%20average%20score%20of%20only%2033.31%20across%20the%20three%20intent%20dimensions%2C%20underscoring%20that%20step-level%20intent%20understanding%20in%20egocentric%20videos%20remains%20a%20highly%20challenging%20problem%20that%20calls%20for%20further%20investigation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12147v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEgoIntent%253A%2520An%2520Egocentric%2520Step-level%2520Benchmark%2520for%2520Understanding%2520What%252C%2520Why%252C%2520and%2520Next%26entry.906535625%3DYe%2520Pan%2520and%2520Chi%2520Kit%2520Wong%2520and%2520Yuanhuiyi%2520Lyu%2520and%2520Hanqian%2520Li%2520and%2520Jiahao%2520Huo%2520and%2520Jiacheng%2520Chen%2520and%2520Lutao%2520Jiang%2520and%2520Xu%2520Zheng%2520and%2520Xuming%2520Hu%26entry.1292438233%3DMultimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520have%2520demonstrated%2520remarkable%2520video%2520reasoning%2520capabilities%2520across%2520diverse%2520tasks.%2520However%252C%2520their%2520ability%2520to%2520understand%2520human%2520intent%2520at%2520a%2520fine-grained%2520level%2520in%2520egocentric%2520videos%2520remains%2520largely%2520unexplored.%2520Existing%2520be {"title": "A Two-Stage Dual-Modality Model for Facial Emotional Expression Recognition", "author": "Jiajun Sun and Zhe Gao", "abstract": "This paper addresses the expression (EXPR) recognition challenge in the 10th Affective Behavior Analysis in-the-Wild (ABAW) workshop and competition, which requires frame-level classification of eight facial emotional expressions from unconstrained videos. This task is challenging due to inaccurate face localization, large pose and scale variations, motion blur, temporal instability, and other confounding factors across adjacent frames. We propose a two-stage dual-modal (audio-visual) model to address these difficulties. Stage I focuses on robust visual feature extraction with a pretrained DINOv2-based encoder. Specifically, DINOv2 ViT-L/14 is used as the backbone, a padding-aware augmentation (PadAug) strategy is employed for image padding and data preprocessing from raw videos, and a mixture-of-experts (MoE) training head is introduced to enhance classifier diversity. Stage II addresses modality fusion and temporal consistency. For the visual modality, faces are re-cropped from raw videos at multiple scales, and the extracted visual features are averaged to form a robust frame-level representation. Concurrently, frame-aligned Wav2Vec 2.0 audio features are derived from short audio windows to provide complementary acoustic cues. These dual-modal features are integrated via a lightweight gated fusion module, followed by inference-time temporal smoothing. Experiments on the ABAW dataset demonstrate the effectiveness of the proposed method. The two-stage model achieves a Macro-F1 score of 0.5368 on the official validation set and 0.5122 +/- 0.0277 under 5-fold cross-validation, outperforming the official baselines.", "link": "http://arxiv.org/abs/2603.12221v1", "date": "2026-03-12", "relevancy": 2.6842, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/a fusion%20and%20temporal%20consistency.%20For%20the%20visual%20modality%2C%20faces%20are%20re-cropped%20from%20raw%20videos%20at%20multiple%20scales%2C%20and%20the%20extracted%20visual%20features%20are%20averaged%20to%20form%20a%20robust%20frame-level%20representation.%20Concurrently%2C%20frame-aligned%20Wav2Vec%202.0%20audio%20features%20are%20derived%20from%20short%20audio%20windows%20to%20provide%20complementary%20acoustic%20cues.%20These%20dual-modal%20features%20are%20integrated%20via%20a%20lightweight%20gated%20fusion%20module%2C%20followed%20by%20inference-time%20temporal%20smoothing.%20Experiments%20on%20the%20ABAW%20dataset%20demonstrate%20the%20effectiveness%20of%20the%20proposed%20method.%20The%20two-stage%20model%20achieves%20a%20Macro-F1%20score%20of%200.5368%20on%20the%20official%20validation%20set%20and%200.5122%20%2B/-%200.0277%20under%205-fold%20cross-validation%2C%20outperforming%20the%20official%20baselines.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12221v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Two-Stage%2520Dual-Modality%2520Model%2520for%2520Facial%2520Emotional%2520Expression%2520Recognition%26entry.906535625%3DJiajun%2520Sun%2520and%2520Zhe%2520Gao%26entry.1292438233%3DThis%2520paper%2520addresses%2520the%2520expression%2520%2528EXPR%2529%2520recognition%2520challenge%2520in%2520the%252010th%2520Affective%2520Behavior%2520Analysis%2520in-the-Wild%2520%2528ABAW%2529%2520workshop%2520and%2520competition%252C%2520which%2520requires%2520frame-level%2520classification%2520of%2520eight%2520facial%2520emotional%2520expressions%2520from%2520unconstrained%2520videos.%2520This%2520task%2520is%2520challenging%2520due%2520to%2520inaccurate%2520face%2520localization%252C%2520large%2520pose%2520and%2520scale%2520variations%252C%2520motion%2520blur%252C%2520temporal%2520instability%252C%2520and%2520other%2520confounding%2520factors%2520across%2520adjacent%2520

bust%2520emotion%2520recognition%2520in%2520unconstrained%2520real-world%2520environments.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.11971v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Multimodal%20Emotion%20Recognition%20via%20Bi-directional%20Cross-Attention%20and%20Temporal%20Modeling&entry.906535625=Junhyeong%20Byeon%20and%20Jeongyeol%20Kim%20and%20Sejoon%20Lim&entry.1292438233=Emotion%20recognition%20in%20in-the-wild%20video%20data%20remains%20a%20challenging%20problem%20due%20to%20large%20variations%20in%20facial%20appearance%2C%20head%20pose%2C%20illumination%2C%20background%20noise%2C%20and%20the%20inherently%20dynamic%20nature%20of%20human%20affect.%20Relying%20on%20a%20single%20modality%2C%20such%20as%20facial%20expressions%20or%20speech%2C%20is%20often%20insufficient%20to%20capture%20these%20complex%20emotional%20cues.%20To%20address%20this%20issue%2C%20we%20propose%20a%20multimodal%20emotion%20recognition%20framework%20for%20the%20Expression%20%28EXPR%29%20Recognition%20task%20in%20the%2010th%20Affective%20Behavior%20Analysis%20in-the-wild%20%28ABAW%29%20Challenge.%0A%20%20Our%20approach%20leverages%20large-scale%20pre-trained%20models%2C%20namely%20CLIP%20for%20visual%20encoding%20and%20Wav2Vec%202.0%20for%20audio%20representation%20learning%2C%20as%20frozen%20backbone%20networks.%20To%20model%20temporal%20dependencies%20in%20facial%20expression%20sequences%2C%20we%20employ%20a%20Temporal%20Convolutional%20Network%20%28TCN%29%20over%20fixed-length%20video%20windows.%20In%20addition%2C%20we%20introduce%20a%20bi-directional%20cross-attention%20fusion%20module%2C%20in%20which%20visual%20and%20audio%20features%20interact%20symmetrically%20to%20enhance%20cross-modal%20contextualization%20and%20capture%20complementary%20emotional%20information.%20A%20lightweight%20classification%20head%20is%20then%20used%20for%20final%20emotion%20prediction.%2 {"title": "RDNet: Region Proportion-Aware Dynamic Adaptive Salient Object Detection Network in Optical Remote Sensing Images", "author": "Bin Wan and Runmin Cong and Xiaofei Zhou and Hao Fang and Yaoqi Sun and Sam Kwong", "abstract": "Salient object detection (SOD) in remote sensing images faces significant challenges due to large variations in object sizes, the computational cost of self-attention mechanisms, and the limitations of CNN-based extractors in capturing global context and long-range dependencies. Existing methods that rely on fixed convolution kernels often struggle to adapt to diverse object scales, leading to detail loss or irrelevant feature aggregation. To address these issues, this work aims to enhance robustness to scale variations and achieve precise object localization. We propose the Region Proportion-Aware Dynamic Adaptive Salient Object Detection Network (RDNet), which replaces the CNN backbone with the SwinTransformer for global context modeling and introduces three key modules: (1) the Dynamic Adaptive Detail-aware (DAD) module, which applies varied convolution kernels guided by object region proportions; (2) the Frequency-matching Context Enhancement (FCE) module, which enriches contextual information through wavelet interactions and attention; and (3) the Region Proportion-aware Localization (RPL) module, which employs cross-attention to highlight semantic details and integrates a Proportion Guidance (PG) block to assist the DAD module. By combining these modules, RDNet achieves robustness against scale variations and accurate localization, delivering superior detection performance compared with state-of-the-art methods.", "link": "http://arxiv.org/abs/2603.12215v1", "date": "2026-03-12", "relevancy": 2.2357, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5946}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5367}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5252}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RDNet%3A%20Region%20Proportion-Aware%20Dynamic%20Adaptive%20Salient%20Object%20Detection%20Network%20in%20Optical%20Remote%20Sensing%20Images&body=Title%3A%20RDNet%3A%20Region%20Proportion-Aware%20Dynamic%20Adaptive%20Salient%20Object%20Detection%20Network%20in%20Optical%20Remote%20Sensing%20Images%0AAuthor%3A%20Bin%20Wan%20and%20Runmin%20Cong%20and%20Xiaofei%20Zhou%20and%20Hao%20Fang%20and%20Yaoqi%20Sun%20and%20Sam%20Kwong%0AAbstract%3A%20Salient%20object%20detection%20%28SOD%29%20in%20remote%20sensing%20images%20faces%20significant%20challenges%20due%20to%20large%20variations%20in%20object%20sizes%2C%20the%20computational%20cost%20of%20self-attention%20mechanisms%2C%20and%20the%20limitations%20of%20CNN-based%20extractors%20in%20capturing%20global%20context%20and%20long-range%20dependencies.%20Existing%20methods%20that%20rely%20on%20fixed%20convolution%20kernels%20often%20struggle%20to%20adapt%20to%20diverse%20object%20scales%2C%20leading%20to%20detail%20loss%20or%20irrelevant%20feature%20aggregation.%20To%20address%20these%20issues%2C%20this%20work%20aims%20to%20enhance%20robustness%20to%20scale%20variations%20and%20achieve%20precise%20object%20localization.%20We%20propose%20the%20Region%20Proportion-Aware%20Dynamic%20Adaptive%20Salient%20Object%20Detection%20Network%20%28RDNet%29%2C%20which%20replaces%20the%20CNN%20backbone%20with%20the%20SwinTransformer%20for%20global%20context%20modeling%20and%20introduces%20three%20key%20modules%3A%20%281%29%20the%20Dynamic%20Adaptive%20Detail-aware%20%28DAD%29%20module%2C%20which%20applies%20varied%20convolution%20kernels%20guided%20by%20object%20region%20proportions%3B%20%282%29%20the%20Frequency-matching%20Context%20Enhancement%20%28FCE%29%20module%2C%20which%20enriches%20contextual%20information%20through%20wavelet%20interactions%20and%20attention%3B%20and%20%283%29%20the%20Region%20Proportion-aware%20Localization%20%28RPL%29%20module%2C%20which%20employs%20cross-attention%20to%20highlight%20semantic%20details%20and%20integrates%20a%20Proportion%20Guidance%20%28PG%29%20block%20to%20assist%20the%20DAD%20module.%20By%20combining%20these%20modules%2C%20RDNet%20achieves%20robustness%20against%20scale%20variations%20and%20accurate%20localization%2C%20delivering%20superior%20detection%20performance%20compared%20with%20state-of-the-art%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12215v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRDNet%253A%2520Region%2520Proportion-Aware%2520Dynamic%2520Adaptive%2520Salient%2520Object%2520Detection%2520Network%2520in%2520Optical%2520Remote%2520Sensing%2520Images%26entry.906535625%3DBin%2520Wan%2520and%2520Runmin%2520Cong%2520and%2520Xiaofei%2520Zhou%2520and%2520Hao%2520Fang%2520and%2520Yaoqi%2520Sun%2520and%2520Sam%2520Kwong%26entry.1292438233%3DSalient%2520object%2520detection%2520%2528SOD%2529%2520in%2520remote%2520sensing%2520images%2520faces%2520significant%2520challenges%2520due%2520to%2520large%2520variations%2520in%2520object%2520sizes%252C%2520the%2520computational%2520cost%2520of%2520self-attention%2520mechanisms%252C%2520and%2520the%2520limitations%2520of%2520CNN-based%2520extractors%2520in%2520capturing%2520global%2520context%2520and%2520long-range%2520dependencies.%2520Existing%2520methods%2520that%2520rely%2520on%2520fixed%2520convolution%2520kernels%2520often%2520struggle%2520to%2520adapt%2520to%2520diverse%2520object%2520scales%252C%2520leading%2520to%2520detail%2520loss%2520or%2520irrelevant%2520feature%2520aggregation.%2520To%2520address%2520these%2520issues%252C%2520this%2520work%2520aims%2520to%2520enhance%2520ro {"title": "HiSync: Spatio-Temporally Aligning Hand Motion from Wearable IMU and On-Robot Camera for Command Source Identification in Long-Range HRI", "author": "Chengwen Zhang and Chun Yu and Borong Zhuang and Haopeng Jin and Qingyang Wan and Zhuojun Li and Zhe He and Zhoutong Ye and Yu Mei and Chang Liu and Weinan Shi and Yuanchun Shi", "abstract": "Long-range Human-Robot Interaction (HRI) remains underexplored. Within it, Command Source Identification (CSI) - determining who issued a command - is especially challenging due to multi-user and distance-induced sensor ambiguity. We introduce HiSync, an optical-inertial fusion framework that treats hand motion as binding cues by aligning robot-mounted camera optical flow with hand-worn IMU signals. We first elicit a user-defined (N=12) gesture set and collect a multimodal command gesture dataset (N=38) in long-range multi-user HRI scenarios. Next, HiSync extracts frequency-domain hand motion features from both camera and IMU data, and a learned CSINet denoises IMU readings, temporally aligns modalities, and performs distance-aware multi-window fusion to compute cross-modal similarity of subtle, natural gestures, enabling robust CSI. In three-person scenes up to 34m, HiSync achieves 92.32% CSI accuracy, outperforming the prior SOTA by 48.44%. HiSync is also validated on real-robot deployment. By making CSI reliable and natural, HiSync provides a practical primitive and design guidance for public-space HRI.", "link": "http://arxiv.org/abs/2603.11809v1", "date": "2026-03-12", "relevancy": 2.2288, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5703}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5657}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", {"title": "Automating Skill Acquisition through Large-Scale Mining of Open-Source Agentic Repositories: A Framework for Multi-Agent Procedural Knowledge Extraction", "author": "Shuzhen Bi and Mengsong Wu and Hao Hao and Keqian Li and Wentao Liu and Siyu Song and Hongbo Zhao and Aimin Zhou", "abstract": "The transition from monolithic large language models (LLMs) to modular, skill-equipped agents represents a fundamental architectural shift in artificial intelligence deployment. While general-purpose models demonstrate remarkable breadth in declarative knowledge, their utility in autonomous workflows is frequently constrained by insufficient specialized procedural expertise. This report investigates a systematic framework for automated acquisition of high-quality agent skills through mining of open-source repositories on platforms such as GitHub. We focus on the extraction of visualization and educational capabilities from state-of-the-art systems including TheoremExplainAgent and Code2Video, both utilizing the Manim mathematical animation engine. The framework encompasses repository structural analysis, semantic skill identification through dense retrieval, and translation to the standardized SKILL.md format. We demonstrate that systematic extraction from agentic repositories, combined with rigorous security governance and multi-dimensional evaluation metrics, enables scalable acquisition of procedural knowledge that augments LLM capabilities without requiring model retraining. Our analysis reveals that agent-generated educational content can achieve 40\\% gains in knowledge transfer efficiency while maintaining pedagogical quality comparable to human-crafted tutorials.", "link": "http://arxiv.org/abs/2603.11808v1", "date": "2026-03-12", "relevancy": 2.2221, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.615}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5483}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5389}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Automating%20Skill%20Acquisition%20through%20Large-Scale%20Mining%20of%20Open-Source%20Agentic%20Repositories%3A%20A%20Framework%20for%20Multi-Agent%20Procedural%20Knowledge%20Extraction&body=Title%3A%20Automating%20Skill%20Acquisition%20through%20Large-Scale%20Mining%20of%20Open-Source%20Agentic%20Repositories%3A%20A%20Framework%20for%20Multi-Agent%20Procedural%20Knowledge%20Extraction%0AAuthor%3A%20Shuzhen%20Bi%20and%20Mengsong%20Wu%20and%20Hao%20Hao%20and%20Keqian%20Li%20and%20Wentao%20Liu%20and%20Siyu%20Song%20and%20Hongbo%20Zhao%20and%20Aimin%20Zhou%0AAbstract%3A%20The%20transition%20from%20monolithic%20large%20language%20models%20%28LLMs%29%20to%20modular%2C%20skill-equipped%20agents%20represents%20a%20fundamental%20architectural%20shift%20in%20artificial%20intelligence%20deployment.%20While%20general-purpose%20models%20demonstrate%20remarkable%20breadth%20in%20declarative%20knowledge%2C%20their%20utility%20in%20autonomous%20workflows%20is%20frequently%20constrained%20by%20insufficient%20specialized%20procedural%20expertise.%20This%20report%20investigates%20a%20systematic%20framework%20for%20automated%20acquisition%20of%20high-quality%20agent%20skills%20through%20mining%20of%20open-source%20repositories%20on%20platforms%20such%20as%20GitHub.%20We%20focus%20on%20the%20extraction%20of%20visualization%20and%20educational%20capabilities%20from%20state-of-the-art%20systems%20including%20TheoremExplainAgent%20and%20Code2Video%2C%20both%20utilizing%20the%20Manim%20mathematical%20animation%20engine.%20The%20framework%20encompasses%20repository%20structural%20analysis%2C%20semantic%20skill%20identification%20through%20dense%20retrieval%2C%20and%20translation%20to%20the%20standardized%20SKILL.md%20format.%20We%20demonstrate%20that%20systematic%20extraction%20from%20agentic%20repositories%2C%20combined%20with%20rigorous%20security%20governance%20and%20multi-dimensional%20evaluation%20metrics%2C%20enables%20scalable%20acquisition%20of%20procedural%20knowledge%20that%20augments%20LLM%20capabilities%20without%20requiring%20model%20retraining.%20Our%20analysis%20reveals%20that%20agent-generated%20educational%20content%20can%20achieve%2040%5C%25%20gains%20in%20knowledge%20transfer%20efficiency%20while%20maintaining%20pedagogical%20quality%20comparable%20to%20human-crafted%20tutorials.%0ALink%3A%20http%3A//arxiv.org/abs/2603.11808v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAutomating%2520Skill%2520Acquisition%2520through%2520Large-Scale%2520Mining%2520of%2520Open-Source%2520Agentic%2520Repositories%253A%2520A%2520Framework%2520for%2520Multi-Agent%2520Procedural%2520Knowledge%2520Extraction%26entry.906535625%3DShuzhen%2520Bi%2520and%2520Mengsong%2520Wu%2520and%2520Hao%2520Hao%2520and%2520Keqian%2520Li%2520and%2520Wentao%2520Liu%2520and%2520Siyu%2520Song%2520and%2520Hongbo%2520Zhao%2520and%2520Aimin%2520Zhou%26entry.1292438233%3DThe%2520transition%2520from%2520monolithic%2520large%2520language%2520models%2520%2528LLMs%2529%2520to%2520modular%252C%2520skill-equipped%2520agents%2520represents%2520a%2520fundamental%2520architectural%2520shift%2520in%2520artificial%2520intelligence%2520deployment.%2520While%2520general-purpose%2520models%2520demonstrate%2520remarkable%2520breadth%2520in%2520declarative%2520knowledge%252C%2520their%2520utility%2520in%2520autonomous%2520workflows%2520is%2520frequently%2520constrained%2520by%2520insufficient%2520specialized%2520procedural%2520expertise.%2520This%2520report%2520investigates%2520a%2520systematic%2520framework%2520for%2520automated%2520acquisition%2520of%2520high-quality%2520agent%2520skills%2520throug {"title": "Head-wise Adaptive Rotary Positional Encoding for Fine-Grained Image Generation", "author": "Jiaye Li and Baoyou Chen and Hui Li and Zilong Dong and Jingdong Wang and Siyu Zhu", "abstract": "Transformers rely on explicit positional encoding to model structure in data. While Rotary Position Embedding (RoPE) excels in 1D domains, its application to image generation reveals significant limitations such as fine-grained spatial relation modeling, color cues, and object counting. This paper identifies key limitations of standard multi-dimensional RoPE-rigid frequency allocation, axis-wise independence, and uniform head treatment-in capturing the complex structural biases required for fine-grained image generation. We propose HARoPE, a head-wise adaptive extension that inserts a learnable linear transformation parameterized via singular value decomposition (SVD) before the rotary mapping. This lightweight modification enables dynamic frequency reallocation, semantic alignment of rotary planes, and head-specific positional receptive fields while rigorously preserving RoPE's relative-position property. Extensive experiments on class-conditional ImageNet and text-to-image generation (Flux and MMDiT) demonstrate that HARoPE consistently improves performance over strong RoPE baselines and other extensions. The method serves as an effective drop-in replacement, offering a principled and adaptable solution for enhancing positional awareness in transformer-based image generative models.", "link": "http://arxiv.org/abs/2510.10489v2", "date": "2026-03-12", "relevancy": 2.2122, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.6168}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5469}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5336}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Head-wise%20Adaptive%20Rotary%20Positional%20Encoding%20for%20Fine-Grained%20Image%20Generation&body=Title%3A%20Head-wise%20Adaptive%20Rotary%20Positional%20Encoding%20for%20Fine-Grained%20Image%20Generation%0AAuthor%3A%20Jiaye%20Li%20and%20Baoyou%20Chen%20and%20Hui%20Li%20and%20Zilong%20Dong%20and%20Jingdong%20Wang%20and%20Siyu%20Zhu%0AAbstract%3A%20Transformers%20rely%20on%20explicit%20positional%20encoding%20to%20model%20structure%20in%20data.%20While%20Rotary%20Position%20Embedding%20%28RoPE%29%20excels%20in%201D%20domains%2C%20its%20application%20to%20image%20generation%20reveals%20significant%20limitations%20such%20as%20fine-grained%20spatial%20relation%20modeling%2C%20color%20cues%2C%20and%20object%20counting.%20This%20paper%20identifies%20key%20limitations%20of%20standard%20multi-dimensional%20RoPE-rigid%20frequency%20allocation%2C%20axis-wise%20independence%2C%20and%20uniform%20head%20treatment-in%20capturing%20the%20complex%20structural%20biases%20required%20for%20fine-grained%20image%20generation.%20We%20propose%20HARoPE%2C%20a%20head-wise%20adaptive%20extension%20that%20inserts%20a%20learnable%20linear%20transformation%20parameterized%20via%20singular%20value%20decomposition%20%28SVD%29%20before%20the%20rotary%20mapping.%20This%20lightweight%20modification%20enables%20dynamic%20frequency%20reallocation%2C%20semantic%20alignment%20of%20rotary%20planes%2C%20and%20head-specific%20positional%20receptive%20fields%20while%20rigorously%20preserving%20RoPE%27s%20relative-position%20property.%20Extensive%20experiments%20on%20class-conditional%20ImageNet%20and%20text-to-image%20generation%20%28Flux%20and%20MMDiT%29%20demonstrate%20that%20HARoPE%20consistently%20improves%20performance%20over%20strong%20RoPE%20baselines%20and%20other%20extensions.%20The%20method%20serves%20as%20an%20effective%20drop-in%20replacement%2C%20offering%20a%20principled%20and%20adaptable%20solution%20for%20enhancing%20positional%20awareness%20in%20transformer-based%20image%20generative%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2510.10489v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHead-wise%2520Adaptive%2520Rotary%2520Positional%2520Encoding%2520for%2520Fine-Grained%2520Image%2520Generation%26entry.906535625%3DJiaye%2520Li%2520and%2520Baoyou%2520Chen%2520and%2520Hui%2520Li%2520and%2520Zilong%2520Dong%2520and%2520Jingdong%2520Wang%2520and%2520Siyu%2520Zhu%26entry.1292438233%3DTransformers%2520rely%2520on%2520explicit%2520positional%2520encoding%2520to%2520model%2520structure%2520in%2520data.%2520While%2520Rotary%2520Position%2520Embedding%2520%2528RoPE%2529%2520excels%2520in%25201D%2520domains%252C%2520its%2520application%2520to%2520image%2520generation%2520reveals%2520significant%2520limitations%2520such%2520as%2520fine-grained%2520spatial%2520relation%2520modeling%252C%2520color%2520cues%252C%2520and%2520object%2520counting.%2520This%2520paper%2520identifies%2520key%2520limitations%2520of%2520standard%2520multi-dimensional%2520RoPE-rigid%2520frequency%2520allocation%252C%2520axis-wise%2520independence%252C%2520and%2520uniform%2520head%2520treatment-in%2520capturing%2520the%2520complex%2520structural%2520biases%2520required%2520for%2520fine-grained%2520image%2520generation.%2520We%2520propose%2520HARoPE%252C%2520a%2520head-wise%2520adaptive%2520extension%2520that%2520inserts%2520a%2520learnable%2520linear%2520transformation%2520parameterized%2520via%2520singular%2520value%2520decomposition%2520%2528SVD%2529%2520before%2520the%2520rotary%2520mapping.%2520This%2520lightweight%2520modification%2520enables%2520dynamic%2520frequency%2520reallocation%252C%2520semantic%2520alignment%2520of%2520rotary%2520planes%252C%2520and%2520head-specific%2520positional%2520receptive%2520fields%2520while%2520rigorously%2520preserving%25 {"title": "Logics-Parsing-Omni Technical Report", "author": "Xin An and Jingyi Cai and Xiangyang Chen and Huayao Liu and Peiting Liu and Peng Wang and Bei Yang and Xiuwen Zhu and Yongfan Chen and Yan Gao and Yuan Gao and Baoyu Hou and Guangzheng Hu and Shuzhao Li and Weixu Qiao and Weidong Ren and Yanan Wang and Boyu Yang and Fan Yang and Jiangtao Zhang and Lixin Zhang and Lin Qu and Hu Wei and Xiaoxiao Xu and Bing Zhao", "abstract": "Addressing the challenges of fragmented task definitions and the heterogeneity of unstructured data in multimodal parsing, this paper proposes the Omni Parsing framework. This framework establishes a Unified Taxonomy covering documents, images, and audio-visual streams, introducing a progressive parsing paradigm that bridges perception and cognition. Specifically, the framework integrates three hierarchical levels: 1) Holistic Detection, which achieves precise spatial-temporal grounding of objects or events to establish a geometric baseline for perception; 2) Fine-grained Recognition, which performs symbolization (e.g., OCR/ASR) and attribute extraction on localized objects to complete structured entity parsing; and 3) Multi-level Interpreting, which constructs a reasoning chain from local semantics to global logic. A pivotal advantage of this framework is its evidence anchoring mechanism, which enforces a strict alignment between high-level semantic descriptions and low-level facts. This enables ``evidence-based'' logical induction, transforming unstructured signals into standardized knowledge that is locatable, enumerable, and traceable. Building on this foundation, we constructed a standardized dataset and released the Logics-Parsing-Omni model, which successfully converts complex audio-visual signals into machine-readable structured knowledge. Experiments demonstrate that fine-grained perception and high-level cognition are synergistic, effectively enhancing model reliability. Furthermore, to quantitatively evaluate these capabilities, we introduce OmniParsingBench. Code, models and the benchmark are released at https://github.com/alibaba/Logics-Parsing/tree/master/Logics-Parsing-Omni.", "link": "http://arxiv.org/abs/2603.09677v2", "date": "2026-03-12", "relevancy": 2.2059, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5646}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5646}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4857}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Logics-Parsing-Omni%20Technical%20Report&body=Title%3A%20Logics-Parsing-Omni%20Technical%20Report%0AAuthor%3A%20Xin%20An%20and%20Jingyi%20Cai%20and%20Xiangyang%20Chen%20and%20Huayao%20Liu%20and%20Peiting%20Liu%20and%20Peng%20Wang%20and%20Bei%20Yang%20and%20Xiuwen%20Zhu%20and%20Yongfan%20Chen%20and%20Yan%20Gao%20and%20Yuan%20Gao%20and%20Baoyu%20Hou%20and%20Guangzheng%20Hu%20and%20Shuzhao%20Li%20and%20Weixu%20Qiao%20and%20Weidong%20Ren%20and%20Yanan%20Wang%20and%20Boyu%20Yang%20and%20Fan%20Yang%20and%20Jiangtao%20Zhang%20and%20Lixin%20Zhang%20and%20Lin%20Qu%20and%20Hu%20Wei%20and%20Xiaoxiao%20Xu%20and%20Bing%20Zhao%0AAbstract%3A%20Addressing%20the%20challenges%20of%20fragmented%20task%20definitions%20and%20the%20heterogeneity%20of%20unstructured%20data%20in%20multimodal%20parsing%2C%20this%20paper%20proposes%20the%20Omni%20Parsing%20framework.%20This%20framework%20establishes%20a%20Unified%20Taxonomy%20covering%20documents%2C%20images%2C%20and%20audio-visual%20streams%2C%20introducing%20a%20progressive%20parsing%20paradigm%20that%20bridges%20perception%20and%20cognition.%20Specifically%2C%20the%20framework%20integrates%20three%20hierarchical%2 {"title": "Seq vs Seq: An Open Suite of Paired Encoders and Decoders", "author": "Orion Weller and Kathryn Ricci and Marc Marone and Antoine Chaffin and Dawn Lawrie and Benjamin Van Durme", "abstract": "The large language model (LLM) community focuses almost exclusively on decoder-only language models, since they are easier to use for text generation. However, a large subset of the community still uses encoder-only models for tasks such as classification or retrieval. Previous work has attempted to compare these architectures, but is forced to make comparisons with models that have different numbers of parameters, training techniques, and datasets. We introduce the SOTA open-data Ettin suite of models: paired encoder-only and decoder-only models ranging from 17 million parameters to 1 billion, trained on up to 2 trillion tokens. Using the same recipe for both encoder-only and decoder-only models produces SOTA recipes in both categories for their respective sizes, beating ModernBERT as an encoder and Llama 3.2 and SmolLM2 as decoders. Like previous work, we find that encoder-only models excel at classification and retrieval tasks while decoders excel at generative tasks. However, we show that adapting a decoder model to encoder tasks (and vice versa) through continued training is subpar compared to using only the reverse objective (i.e. a 400M encoder outperforms a 1B decoder on MNLI, and vice versa for generative tasks). We open-source all artifacts of this study including training data, training order segmented by checkpoint, and 200+ checkpoints to allow future work to analyze or extend all aspects of training.", "link": "http://arxiv.org/abs/2507.11412v2", "date": "2026-03-12", "relevancy": 2.2004, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5629}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5629}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4861}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Seq%20vs%20Seq%3A%20An%20Open%20Suite%20of%20Paired%20Encoders%20and%20Decoders&body=Title%3A%20Seq%20vs%20Seq%3A%20An%20Open%20Suite%20of%20Paired%20Encoders%20and%20Decoders%0AAuthor%3A%20Orion%20Weller%20and%20Kathryn%20Ricci%20and%20Marc%20Marone%20and%20Antoine%20Chaffin%20and%20Dawn%20Lawrie%20and%20Benjamin%20Van%20Durme%0AAbstract%3A%20The%20large%20language%20model%20%28LLM%29%20community%20focuses%20almost%20exclusively%20on%20decoder-only%20language%20models%2C%20since%20they%20are%20easier%20to%20use%20for%20text%20generation.%20However%2C%20a%20large%20subset%20of%20the%20community%20still%20uses%20encoder-only%20models%20for%20tasks%20such%20as%20classification%20or%20retrieval.%20Previous%20work%20has%20attempted%20to%20compare%20these%20architectures%2C%20but%20is%20forced%20to%20make%20comparisons%20with%20models%20that%20have%20different%20numbers%20of%20parameters%2C%20training%20techniques%2C%20and%20datasets.%20We%20introduce%20the%20SOTA%20open-data%20Ettin%20suite%20of%20models%3A%20paired%20encoder-only%20and%20decoder-only%20models%20ranging%20from%2017%20million%20parameters%20to%201%20billion%2C%20trained%20on%20up%20to%202%20trillion%20tokens.%20Using%20the%20same%20recipe%20for%20both%20encoder-only%20and%20decoder-only%20models%20produces%20SOTA%20recipes%20in%20both%20categories%20for%20their%20respective%20sizes%2C%20beating%20ModernBERT%20as%20an%20encoder%20and%20Llama%203.2%20and%20SmolLM2%20as%20decoders.%20Like%20previous%20work%2C%20we%20find%20that%20encoder-only%20models%20excel%20at%20classification%20and%20retrieval%20tasks%20while%20decoders%20excel%20at%20generative%20tasks.%20However%2C%20we%20show%20that%20adapting%20a%20decoder%20model%2 {"title": "Personalized Feature Translation for Expression Recognition: An Efficient Source-Free Domain Adaptation Method", "author": "Masoumeh Sharafi and Soufiane Belharbi and Muhammad Osama Zeeshan and Houssem Ben Salem and Ali Etemad and Alessandro Lameiras Koerich and Marco Pedersoli and Simon Bacon and Eric Granger", "abstract": "Facial expression recognition (FER) models are widely used in video-based affective computing applications, such as human-computer interaction and healthcare monitoring. However, deep FER models often struggle with subtle expressions and high inter-subject variability, limiting performance in real-world settings. Source-free domain adaptation (SFDA) has been proposed to personalize a pretrained source model using only unlabeled target data, avoiding privacy, storage, and transmission constraints. We address a particularly challenging setting where source data is unavailable and the target data contains only neutral expressions. Existing SFDA methods are not designed for adaptation from a single target class, while generating non-neutral facial images is often unstable and expensive. To address this, we propose Source-Free Domain Adaptation with Personalized Feature Translation (SFDA-PFT), a lightweight latent-space approach. A translator is first pretrained on source data to map subject-specific style features between subjects while preserving expression information through expression-consistency and style-aware objectives. It is then adapted to neutral target data without source data or image synthesis. By operating in the latent space, SFDA-PFT avoids noisy facial image generation, reduces computation, and learns discriminative embeddings for classification. Experiments on BioVid, StressID, BAH, and Aff-Wild2 show that SFDA-PFT consistently outperforms state-of-the-art SFDA methods in privacy-sensitive FER scenarios. Our code is publicly available at: \\href{https://github.com/MasoumehSharafi/SFDA-PFT}{GitHub}.", "link": "http://arxiv.org/abs/2508.09202v4", "date": "2026-03-12", "relevancy": 2.1997, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5633}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5603}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5341}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Personalized%20Feature%20Translation%20for%20Expression%20Recognition%3A%20An%20Efficient%20Source-Free%20Domain%20Adaptation%20Method&body=Title%3A%20Personalized%20Feature%20Translation%20for%20Expression%20Recognition%3A%20An%20Efficient%20Source-Free%20Domain%20Adaptation%20Method%0AAuthor%3A%20Masoumeh%20Sharafi%20and%20Soufiane%20Belharbi%20and%20Muhammad%20Osama%20Zeeshan%20and%20Houssem%20Ben%20Salem%20and%20Ali%20Etemad%20and%20Alessandro%20Lameiras%20Koerich%20and%20Marco%20Pedersoli%20and%20Simon%20Bacon%20and%20Eric%20Granger%0AAbstract%3A%20Facial%20expression%20recognition%20%28FER%29%20models%20are%20widely%20used%20in%20video-based%20affective%20computing%20applications%2C%20such%20as%20human-computer%20interaction%20and%20healthcare%20monitoring.%20However%2C%20deep%20FER%20models%20often%20struggle%20with%20subtle%20expressions%20and%20high%20inter-subject%20variability%2C%20limiting%20performance%20in%20real-world%20settings.%20Source-free%20domain%20adaptation%20%28SFDA%29%20has%20been%20proposed%20to%20personalize%20a%20pretrained%20source%20model%20using%20only%20unlabeled%20target%20data%2C%20avoiding%20privacy%2C%20storage%2C%20and%20transmission%20constraints.%20We%20address%20a%20particularly%20challenging%20setting%20where%20source%20data%20is%20unavailable%20and%20the%20target%20data%20contains%20only%20neutral%20expressions.%20Existing%20SFDA%20methods%20are%20not%20designed%20for%20adaptation%20from%20a%20single%20target%20class%2C%20while%20generating%20non-neutral%20facial%20images%20is%20often%20unstable%20and%20expensive.%20To%20address%20this%2C%20we%20propose%20Source-Free%20Domain%20Adaptation%20with%20Personalized%20Feature%20Translation%20%28SFDA-PFT%29%2C%20a%20lightweight%20latent-space%20approach.%20A%20translator%20is%20first%20pretrained%20on%20source%20data%20to%20map%20subject-specific%20style%20features%20between%20subjects%20while%20preserving%20expression%20information%20through%20expression-consistency%20and%20style-aware%20objectives.%20It%20is%20then%20adapted%20to%20neutral%20target%20data%20without%20source%20data%20or%20image%20synthesis.%20By%20operating%20in%20the%20latent%20space%2C%20SFDA-PFT%20avoids%20noisy%20facial%20image%20generation%2C%20reduces%20computation%2C%20and%20learns%20discriminative%20embeddings%20for%20classification.%20Experiments%20on%20BioVid%2C%20StressID%2C%20BAH%2C%20and%20Aff-Wild2%20show%20that%20SFDA-PFT%20consistently%20outperforms%20state-of-the-art%20SFDA%20methods%20in%20privacy-sensitive%20FER%20scenarios.%20Our%20code%20is%20publicly%20available%20at%3A%20%5Chref%7Bhttps%3A//github.com/MasoumehSharafi/SFDA-PFT%7D%7BGitHub%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2508.09202v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPersonalized%2520Feature%2520Translation%2520for%2520Expression%2520Recognition%253A%2520An%2520Efficient%2520Source-Free%2520Domain%2520Adaptation%2520Method%26entry.906535625%3DMasoumeh%2520Sharafi%2520and%2520Soufiane%2520Belharbi%2520and%2520Muhammad%2520Osama%2520Zeeshan%2520and%2520Houssem%2520Ben%2520Salem%2520and%2520Ali%2520Etemad%2520and%2520Alessandro%2520Lameiras%2520Koerich%2520and%2520Marco%2520Pedersoli%2520and%2520Simon%2520Bacon%2520and%2520Eric%2520Granger%26entry.1292438233%3DFacial%2520expression%2520recognition%2520%2528FER%2529%2520models%2520are%2520 {"title": "MM-CondChain: A Programmatically Verified Benchmark for Visually Grounded Deep Compositional Reasoning", "author": "Haozhan Shen and Shilin Yan and Hongwei Xue and Shuaiqi Lu and Xiaojun Tang and Guannan Zhang and Tiancheng Zhao and Jianwei Yin", "abstract": "Multimodal Large Language Models (MLLMs) are increasingly used to carry out visual workflows such as navigating GUIs, where the next step depends on verified visual compositional conditions (e.g., \"if a permission dialog appears and the color of the interface is green, click Allow\") and the process may branch or terminate early. Yet this capability remains under-evaluated: existing benchmarks focus on shallow-compositions or independent-constraints rather than deeply chained compositional conditionals. In this paper, we introduce MM-CondChain, a benchmark for visually grounded deep compositional reasoning. Each benchmark instance is organized as a multi-layer reasoning chain, where every layer contains a non-trivial compositional condition grounded in visual evidence and built from multiple objects, attributes, or relations. To answer correctly, an MLLM must perceive the image in detail, reason over multiple visual elements at each step, and follow the resulting execution path to the final outcome. To scalably construct such workflow-style data, we propose an agentic synthesis pipeline: a Planner orchestrates layer-by-layer generation of compositional conditions, while a Verifiable Programmatic Intermediate Representation (VPIR) ensures each layer's condition is mechanically verifiable. A Composer then assembles these verified layers into complete instructions. Using this pipeline, we construct benchmarks across three visual domains: natural images, data charts, and GUI trajectories. Experiments on a range of MLLMs show that even the strongest model attains only 53.33 Path F1, with sharp drops on hard negatives and as depth or predicate complexity grows, confirming that deep compositional reasoning remains a fundamental challenge.", "link": "http://arxiv.org/abs/2603.12266v1", "date": "2026-03-12", "relevancy": 2.184, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.546}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.546}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5458}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MM-CondChain%3A%20A%20Programmatically%20Verified%20Benchmark%20for%20Visually%20Grounded%20Deep%20Compositional%20Reasoning&body=Title%3A%20MM-CondChain%3A%20A%20Programmatically%20Verified%20Benchmark%20for%20Visually%20Grounded%20Deep%20Compositional%20Reasoning%0AAuthor%3A%20Haozhan%20Shen%20and%20Shilin%20Yan%20and%20Hongwei%20Xue%20and%20Shuaiqi%20Lu%20and%20Xiaojun%20Tang%20and%20Guannan%20Zhang%20and%20Tiancheng%20Zhao%20and%20Jianwei%20Yin%0AAbstract%3A%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20are%20increasingly%20used%20to%20carry%20out%20visual%20workflows%20such%20as%20navigating%20GUIs%2C%20where%20the%20next%20step%20depends%20on%20verified%20visual%20compositional%20conditions%20%28e.g.%2C%20%22if%20a%20permission%20dialog%20appears%20and%20the%20color%20of%20the%20interface%20is%20green%2C%20click%20Allow%22%29%20and%20the%20process%20may%20branch%20or%20terminate%20early.%20Yet%20this%20capability%20remains%20under-evaluated%3A%20existing%20benchmarks%20focus%20on%20shallow-compositions%20or%20independent-constraints%20rather%20than%20deeply%20chained%20compositional%20conditionals.%20In%20this%20paper%2C%20we%20introduce%20MM-CondChain%2C%20a%20benchmark%20for%20visually%20grounded%20deep%20compositional%20reasoning.%20Each%20benchmark%20instance%20is%20organized%20as%20a%20multi-layer%20reasoning%20chain%2C%20where%20every%20layer%20contains%20a%20non-trivial%20compositional%20condition%20grounded%20in%20visual%20evidence%20and%20built%20from%20multiple%20objects%2C%20attributes%2C%20or%20relations.%20To%20answer%20correctly%2C%20an%20MLLM%20must%20perceive%20the%20image%20in%20detail%2C%20reason%20over%20multiple%20visual%20elements%20at%20each%20step%2C%20and%20follow%20the%20resulting%20execution%20path%20to%20the%20final%20outcome.%20To%20scalably%20construct%20such%20workflow-style%20data%2C%20we%20propose%20an%20agentic%20synthesis%20pipeline%3A%20a%20Planner%20orchestrates%20layer-by-layer%20generation%20of%20compositional%20conditions%2C%20while%20a%20Verifiable%20Programmatic%20Intermediate%20Representation%20%28VPIR%29%20ensures%20each%20layer%27s%20condition%20is%20mechanically%20verifiable.%20A%20Composer%20then%20assembles%20these%20verified%20layers%20into%20complete%20instructions.%20Using%20this%20pipeline%2C%20we%20construct%20benchmarks%20across%20three%20visual%20domains%3A%20natural%20images%2C%20data%20charts%2C%20and%20GUI%20trajectories.%20Experiments%20on%20a%20range%20of%20MLLMs%20show%20that%20even%20the%20strongest%20model%20attains%20only%2053.33%20Path%20F1%2C%20with%20sharp%20drops%20on%20hard%20negatives%20and%20as%20depth%20or%20predicate%20complexity%20grows%2C%20confirming%20that%20deep%20compositional%20reasoning%20remains%20a%20fundamental%20challenge.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12266v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMM-CondChain%253A%2520A%2520Programmatically%2520Verified%2520Benchmark%2520for%2520Visually%2520Grounded%2520Deep%2520Compositional%2520Reasoning%26entry.906535625%3DHaozhan%2520Shen%2520and%2520Shilin%2520Yan%2520and%2520Hongwei%2520Xue%2520and%2520Shuaiqi%2520Lu%2520and%2520Xiaojun%2520Tang%2520and%2520Guannan%2520Zhang%2520an {"title": "Whleaper: A 10-DOF Flexible Bipedal Wheeled Robot", "author": "Yinglei Zhu and Sixiao He and Yan Ning and Zhenghao Qi and Zhuoyuan Yong and Yihua Qin and Jianyu Chen", "abstract": "Wheel-legged robots combine the advantages of both wheeled robots and legged robots, offering versatile locomotion capabilities with excellent stability on challenging terrains and high efficiency on flat surfaces. However, existing wheel-legged robots typically have limited hip joint mobility compared to humans, while hip joint plays a crucial role in locomotion. In this paper, we introduce Whleaper, a novel 10-degree-of-freedom (DOF) bipedal wheeled robot, with 3 DOFs at the hip of each leg. Its humanoid joint design enables adaptable motion in complex scenarios, ensuring stability and flexibility. This paper introduces the details of Whleaper, with a focus on innovative mechanical design, control algorithms and system implementation. Firstly, stability stems from the increased DOFs at the hip, which expand the range of possible postures and improve the robot's foot-ground contact. Secondly, the extra DOFs also augment its mobility. During walking or sliding, more complex movements can be adopted to execute obstacle avoidance tasks. Thirdly, we utilize two control algorithms to implement multimodal motion for walking and sliding. By controlling specific DOFs of the robot, we conducted a series of simulations and practical experiments, demonstrating that a high-DOF hip joint design can effectively enhance the stability and flexibility of wheel-legged robots. Whleaper shows its capability to perform actions such as squatting, obstacle avoidance sliding, and rapid turning in real-world scenarios.", "link": "http://arxiv.org/abs/2504.21767v2", "date": "2026-03-12", "relevancy": 2.0363, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5521}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5136}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4642}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Whleaper%3A%20A%2010-DOF%20Flexible%20Bipedal%20Wheeled%20Robot&body=Title%3A%20Whleaper%3A%20A%2010-DOF%20Flexible%20Bipedal%20Wheeled%20Robot%0AAuthor%3A%20Yinglei%20Zhu%20and%20Sixiao%20He%20and%20Yan%20Ning%20and%20Zhenghao%20Qi%20and%20Zhuoyuan%20Yong%20and%20Yihua%20Qin%20and%20Jianyu%20Chen%0AAbstract%3A%20Wheel-legged%20robots%20combine%20the%20advantages%20of%20both%20wheeled%20robots%20and%20legged%20robots%2C%20offering%20versatile%20locomotion%20capabilities%20with%20excellent%20stability%20on%20challenging%20terrains%20and%20high%20efficiency%20on%20flat%20surfaces.%20However%2C%20existing%20wheel-legged%20robots%20typically%20have%20limited%20hip%20joint%20mobility%20compared%20to%20humans%2C%20while%20hip%20joint%20plays%20a%20crucial%20role%20in%20locomotion.%20In%20this%20paper%2C%20we%20introduce%20Whleaper%2C%20a%20novel%2010-degree-of-freedom%20%28DOF%29%20bipedal%20wheeled%20robot%2C%20with%203%20DOFs%20at%20the%20hip%20of%20each%20leg.%20Its%20humanoid%20joint%20design%20enables%20adaptable%20motion%20in%20complex%20scenarios%2C%20ensuring%20stability%20and%20flexibility.%20This%20paper%20introduces%20the%20details%20of%20Whleaper%2C%20with%20a%20focus%20on%20innovative%20mechanical%20design%2C%20control%20algorithms%20and%20system%20implementation.%20Firstly%2C%20stability%20stems%20from%20the%20increased%20DOFs%20at%20the%20hip%2C%20which%20expand%20the%20range%20of%20possible%20postures%20and%20improve%20the%20robot%27s%20foot-ground%20contact.%20Secondly%2C%20the%20extra%20DOFs%20also%20augment%20its%20mobility.%20During%20walking%20or%20sliding%2C%20more%20complex%20movements%20can%20be%20adopted%20to%20execute%20obstacle%20avoidance%20tasks.%20Thirdly%2C%20we%20utilize%20two%20control%20algorithms%20to%20implement%20multimodal%20motion%20for%20walking%20and%20sliding.%20By%20controlling%20specific%20DOFs%20of%20the%20robot%2C%20we%20conducted%20a%20series%20of%20simulations%20and%20practical%20experiments%2C%20demonstrating%20that%20a%20high-DOF%20hip%20joint%20design%20can%20effectively%20enhance%20the%20stability%20and%20flexibility%20of%20wheel-legged%20robots.%20Whleaper%20shows%20its%20capability%20to%20perform%20actions%20such%20as%20squatting%2C%20obstacle%20avoidance%20sliding%2C%20and%20rapid%20turning%20in%20real-world%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2504.21767v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhleaper%253A%2520A%252010-DOF%2520Flexible%2520Bipedal%2520Wheeled%2520Robot%26entry.906535625%3DYinglei%2520Zhu%2520and%2520Sixiao%2520He%2520and%2520Yan%2520Ning%2520and%2520Zhenghao%2520Qi%2520and%2520Zhuoyuan%2520Yong%2520and%2520Yihua%2520Qin%2520and%2520Jianyu%2520Chen%26entry.1292438233%3DWheel-legged%2520robots%2520combine%2520the%2520advantages%2520of%2520both%2520wheeled%2520robots%2520and%2520legged%2520robots%252C%2520offering%2520versatile%2520locomotion%2520capabilities%2520with%2520excellent%2520stability%2520on%2520challenging%2520terrains%2520and%2520high%2520efficiency%2520on%2520flat%2520surfaces.%2520However%252C%2520existing%2520wheel-legged%2520robots%2520typically%2520have%2520limited%2520hip%2520joint%2520mobility%2520compared%2520to%2520humans%252C%2520while%2520hip%2520joint%2520plays%2520a%2520crucial%2520role%2520in%2520locomotion.%2520In%2520this%2520paper%252C%2520we%2520introduce%2520Whleaper%252C%2520a%2520novel%252010-degree-of-freedom%2520%2528DOF%2529%2520bipedal%2520wheeled%2520robot%252C%2520with%25203%2520DOFs%2520at%2520the%2520hip%2520of%2520each%2520leg.%2520Its%2520humanoid {"title": "FlexRec: Adapting LLM-based Recommenders for Flexible Needs via Reinforcement Learning", "author": "Yijun Pan and Weikang Qiu and Qiyao Ma and Mingxuan Ju and Tong Zhao and Neil Shah and Rex Ying", "abstract": "Modern recommender systems must adapt to dynamic, need-specific objectives for diverse recommendation scenarios, yet most traditional recommenders are optimized for a single static target and struggle to reconfigure behavior on demand. Recent advances in reinforcement-learning-based post-training have unlocked strong instruction-following and reasoning capabilities in LLMs, suggesting a principled route for aligning them to complex recommendation goals. Motivated by this, we study closed-set autoregressive ranking, where an LLM generates a permutation over a fixed candidate set conditioned on user context and an explicit need instruction. However, applying RL to this setting faces two key obstacles: (i) sequence-level rewards yield coarse credit assignment that fails to provide fine-grained training signals, and (ii) interaction feedback is sparse and noisy, which together lead to inefficient and unstable updates. We propose FlexRec, a post-training RL framework that addresses both issues with (1) a causally grounded item-level reward based on counterfactual swaps within the remaining candidate pool, and (2) critic-guided, uncertainty-aware scaling that explicitly models reward uncertainty and down-weights low-confidence rewards to stabilize learning under sparse supervision. Across diverse recommendation scenarios and objectives, FlexRec achieves substantial gains: it improves NDCG@5 by up to \\textbf{59\\%} and Recall@5 by up to \\textbf{109.4\\%} in need-specific ranking, and further achieves up to \\textbf{24.1\\%} Recall@5 improvement under generalization settings, outperforming strong traditional recommenders and LLM-based baselines.", "link": "http://arxiv.org/abs/2603.11901v1", "date": "2026-03-12", "relevancy": 2.0141, "topK": [{"title": " {"title": "From Toil to Thought: Designing for Strategic Exploration and Responsible AI in Systematic Literature Reviews", "author": "Runlong Ye and Naaz Sibia and Angela Zavaleta Bernuy and Tingting Zhu and Carolina Nobre and Viktoria Pammer-Schindler and Michael Liut", "abstract": "Systematic Literature Reviews (SLRs) are fundamental to scientific progress, yet the process is hindered by a fragmented tool ecosystem that imposes a high cognitive load. This friction suppresses the iterative, exploratory nature of scholarly work. To investigate these challenges, we conducted an exploratory design study with 20 experienced researchers. This study identified key friction points: 1) the high cognitive load of managing iterative query refinement across multiple databases, 2) the overwhelming scale and pace of publication of modern literature, and 3) the tension between automation and scholarly agency. Informed by these findings, we developed ARC, a design probe that operationalizes solutions for multi-database integration, transparent iterative search, and verifiable AI-assisted screening. A comparative user study with 8 researchers suggests that an integrated environment facilitates a transition in scholarly work, moving researchers from managing administrative overhead to engaging in strategic exploration. By utilizing external representations to scaffold strategic exploration and transparent AI reasoning, our system supports verifiable judgment, aiming to augment expert contributions from initial creation through long-term maintenance of knowledge synthesis.", "link": "http://arxiv.org/abs/2603.05514v2", "date": "2026-03-12", "relevancy": 1.8587, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5319}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", " {"title": "Riemannian Variational Flow Matching for Material and Protein Design", "author": "Olga Zaghen and Floor Eijkelboom and Alison Pouplin and Cong Liu and Max Welling and Jan-Willem van de Meent and Erik J. Bekkers", "abstract": "We present Riemannian Gaussian Variational Flow Matching (RG-VFM), a geometric extension of Variational Flow Matching (VFM) for generative modeling on manifolds. Motivated by the benefits of VFM, we derive a variational flow matching objective for manifolds with closed-form geodesics based on Riemannian Gaussian distributions. Crucially, in Euclidean space, predicting endpoints (VFM), velocities (FM), or noise (diffusion) is largely equivalent due to affine interpolations. However, on curved manifolds this equivalence breaks down. We formally analyze the relationship between our model and Riemannian Flow Matching (RFM), revealing that the RFM objective lacks a curvature-dependent penalty -- encoded via Jacobi fields -- that is naturally present in RG-VFM. Based on this relationship, we hypothesize that endpoint prediction provides a stronger learning signal by directly minimizing geodesic distances. Experiments on synthetic spherical and hyperbolic benchmarks, as well as real-world tasks in material and protein generation, demonstrate that RG-VFM more effectively captures manifold structure and improves downstream performance over Euclidean and velocity-based baselines. Code available at https://github.com/olgatticus/rg-vfm.", "link": "http://arxiv.org/abs/2502.12981v4", "date": "2026-03-12", "relevancy": 2.152, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.576}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5277}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2 clidean%20and%20velocity-based%20baselines.%20Code%20available%20at%20https%3A//github.com/olgatticus/rg-vfm.%0ALink%3A%20http%3A//arxiv.org/abs/2502.12981v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRiemannian%2520Variational%2520Flow%2520Matching%2520for%2520Material%2520and%2520Protein%2520Design%26entry.906535625%3DOlga%2520Zaghen%2520and%2520Floor%2520Eijkelboom%2520and%2520Alison%2520Pouplin%2520and%2520Cong%2520Liu%2520and%2520Max%2520Welling%2520and%2520Jan-Willem%2520van%2520de%2520Meent%2520and%2520Erik%2520J.%2520Bekkers%26entry.1292438233%3DWe%2520present%2520Riemannian%2520Gaussian%2520Variational%2520Flow%2520Matching%2520%2528RG-VFM%2529%252C%2520a%2520geometric%2520extension%2520of%2520Variational%2520Flow%2520Matching%2520%2528VFM%2529%2520for%2520generative%2520modeling%2520on%2520manifolds.%2520Motivated%2520by%2520the%2520benefits%2520of%2520VFM%252C%2520we%2520derive%2520a%2520variational%2520flow%2520matching%2520objective%2520for%2520manifolds%2520with%2520closed-form%2520geodesics%2520based%2520on%2520Riemannian%2520Gaussian%2520distributions.%2520Crucially%252C%2520in%2520Euclidean%2520space%252C%2520predicting%2520endpoints%2520%2528VFM%2529%252C%2520velocities%2520%2528FM%2529%252C%2520or%2520noise%2520%2528diffusion%2529%2520is%2520largely%2520equivalent%2520due%2520to%2520affine%2520interpolations.%2520However%252C%2520on%2520curved%2520manifolds%2520this%2520equivalence%2520breaks%2520down.%2520We%2520formally%2520analyze%2520the%2520relationship%2520between%2520our%2520model%2520and%2520Riemannian%2520Flow%2520Matching%2520%2528RFM%2529%252C%2520revealing%2520that%2520the%2520RFM%2520objective%2520lacks%2520a%2520curvature-dependent%2520penalty%2520--%2520encoded%2520via%2520Jacobi%2520fields%2520--%2520that%2520is%2520naturally%2520present%2520in%2520RG-VFM.%2520Based%2520on%2520this%2520relationship%252C%2520we%2520hypothesize%2520that%2520endpoint%2520prediction%2520provides%2520a%2520stronger%2520learning%2520signal%2520by%2520directly%2520minimizing%2520geodesic%2520distances.%2520Experiments%2520on%2520synthetic%2520spherical%2520and%2520hyperbolic%2520benchmarks%252C%2520as%2520well%2520as%2520real-world%2520tasks%2520in%2520material%2520and%2520protein%2520generation%252C%2520demonstrate%2520that%2520RG-VFM%2520more%2520effectively%2520captures%2520manifold%2520structure%2520and%2520improves%2520downstream%2520performance%2520over%2520Euclidean%2520and%2520velocity-based%2520baselines.%2520Code%2520available%2520at%2520https%253A//github.com/olgatticus/rg-vfm.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2502.12981v4%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Riemannian%20Variational%20Flow%20Matching%20for%20Material%20and%20Protein%20Design&entry.906535625=Olga%20Zaghen%20and%20Floor%20Eijkelboom%20and%20Alison%20Pouplin%20and%20Cong%20Liu%20and%20Max%20Welling%20and%20Jan-Willem%20van%20de%20Meent%20and%20Erik%20J.%20Bekkers&entry.1292438233=We%20present%20Riemannian%20Gaussian%20Variational%20Flow%20Matching%20%28RG-VFM%29%2C%20a%20geometric%20extension%20of%20Variational%20Flow%20Matching%20%28VFM%29%20for%20generative%20modeling%20on%20manifolds.%20Motivated%20by%20the%20benefits%20of%20VFM%2C%20we%20derive%20a%20variational%20flow%20matching%20objective%20for%20manifolds%20with%20closed-form%20geodesics%20based%20on%20Riemannian%20Gaussian%20distributions.%20Crucially%2C%20in%20Euclidean%20space%2C%20predicting%20endpoints%20%28VFM%29%2C%20velocities%20%28FM%29%2C%20or%20noise%20%28diffusion%29%20is%20largely%20equivalent%20due%20to%20affine%20interpolations.%20However%2C%20on%20curved%20manifolds%20this%20equivalence%20breaks%20down.%20We%20formally%20analyze%20the%20relationship%20between%20our%20model%20and%20Riemannian%20Flow%20Matching%20%28RFM%29%2C%20revealing%20that%20the%2 {"title": "LABSHIELD: A Multimodal Benchmark for Safety-Critical Reasoning and Planning in Scientific Laboratories", "author": "Qianpu Sun and Xiaowei Chi and Yuhan Rui and Ying Li and Kuangzhi Ge and Jiajun Li and Sirui Han and Shanghang Zhang", "abstract": "Artificial intelligence is increasingly catalyzing scientific automation, with multimodal large language model (MLLM) agents evolving from lab assistants into self-driving lab operators. This transition imposes stringent safety requirements on laboratory environments, where fragile glassware, hazardous substances, and high-precision laboratory equipment render planning errors or misinterpreted risks potentially irreversible. However, the safety awareness and decision-making reliability of embodied agents in such high-stakes settings remain insufficiently defined and evaluated. To bridge this gap, we introduce LABSHIELD, a realistic multi-view benchmark designed to assess MLLMs in hazard identification and safety-critical reasoning. Grounded in U.S. Occupational Safety and Health Administration (OSHA) standards and the Globally Harmonized System (GHS), LABSHIELD establishes a rigorous safety taxonomy spanning 164 operational tasks with diverse manipulation complexities and risk profiles. We evaluate 20 proprietary models, 9 open-source models, and 3 embodied models under a dual-track evaluation framework. Our results reveal a systematic gap between general-domain MCQ accuracy and Semi-open QA safety performance, with models exhibiting an average drop of 32.0% in professional laboratory scenarios, particularly in hazard interpretation and safety-aware planning. These findings underscore the urgent necessity for safety-centric reasoning frameworks to ensure reliable autonomous scientific experimentation in embodied laboratory contexts. The full dataset will be released soon.", "link": "http://arxiv.org/abs/2603.11987v1", "date": "2026-03-12", "relevancy": 1.0712, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5648}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5232}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5189}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LABSHIELD%3A%20A%20Multimodal%20Benchmark%20for%20Safety-Critical%20Reasoning%20and%20Planning%20in%20Scientific%20Laboratories&body=Title%3A%20LABSHIELD%3A%20A%20Multimodal%20Benchmark%20for%20Safety-Critical%20Reasoning%20and%20Planning%20in%20Scientific%20Laboratories%0AAuthor%3A%20Qianpu%20Sun%20and%20Xiaowei%20Chi%20and%20Yuhan%20Rui%20and%20Ying%20Li%20and%20Kuangzhi%20Ge%20and%20Jiajun%20Li%20and%20Sirui%20Han%20and%20Shanghang%20Zhang%0AAbstract%3A%20Artificial%20intelligence%20is%20increasingly%20catalyzing%20scientific%20automation%2C%20with%20multimodal%20large%20language%20model%20%28MLLM%29%20agents%20evolving%20from%20lab%20assistants%20into%20self-driving%20lab%20operators.%20This%20transition%20imposes%20stringent%20safety%20requirements%20on%20laboratory%20environments%2C%20where%20fragile%20glassware%2C%20hazardous%20substances%2C%20and%20high-precision%20laboratory%20equipment%20render%20planning%20errors%20or%20misinterpreted%20risks%20potentially%20irreversible.%20However%2C%20the%20safety%20awareness%20and%20decision-making%20reliability%20of%20embodied%20agents%20in%20such%20high-stakes%20settings%20remain%20insufficiently%20defined%20and%20evaluated.%20To%20bridge%20this%20gap%2C%20we%20introduce%20LABSHIELD%2C%20a%20realistic%20multi-view%20benchmark%20designed%20to%20assess%20MLLMs%20in%20hazard%20identification%20and%20safety-critical%20reasoning.%20Grounded%20in%20U.S.%20Occupational%20Safety%20and%20Health%20Administration%20%28OSHA%29%20standards%20and%20the%20Globally%20Harmonized%20System%20%28GHS%29%2C%20LABSHIELD%20establishes%20a%20rigorous%20safety%20taxonomy%20spanning%20164%20operational%20tasks%20with%20diverse%20manipulation%20complexities%20and%20risk%20profiles.%20We%20evaluate%2020%20proprietary%20models%2C%209%20open-source%20models%2C%20and%203%20embodied%20models%20under%20a%20dual-track%20evaluation%20framework.%20Our%20results%20reveal%20a%20systematic%20gap%20between%20general-domain%20MCQ%20accuracy%20and%20Semi-open%20QA%20safety%20performance%2C%20with%20models%20exhibiting%20an%20average%20drop%20of%2032.0%25%20in%20professional%20laboratory%20scenarios%2C%20particularly%20in%20hazard%20interpretation%20and%20safety-aware%20planning.%20These%20findings%20underscore%20the%20urgent%20necessity%20for%20safety-centric%20reasoning%20frameworks%20to%20ensure%20reliable%20autonomous%20scientific%20experimentation%20in%20embodied%20laboratory%20contexts.%20The%20full%20dataset%20will%20be%20released%20soon.%0ALink%3A%20http%3A//arxiv.org/abs/2603.11987v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLABSHIELD%253A%2520A%2520Multimodal%2520Benchmark%2520for%2520Safety-Critical%2520Reasoning%2520and%2520Planning%2520in%2520Scientific%2520Laboratories%26entry.906535625%3DQianpu%2520Sun%2520and%2520Xiaowei%2520Chi%2520and%2520Yuhan%2520Rui%2520and%2520Ying%2520Li%2520and%2520Kuangzhi%2520Ge%2520and%2520Jiajun%2520Li%2520and%2520Sirui%2520Han%2520and%2520Shanghang%2520Zhang%26entry.1292438233%3DArtificial%2520intelligence%2520is%2520increasingly%2520catalyzing%2520scientific%2520automation%252C%2520with%2520multimodal%2520large%2520language%2520model%2520%2528MLLM%2529%2520agents%2520evolving%2520from%2520lab%2520assistants%2520into%2520self-driving%2520lab%2520operators.%2520This%2520transition%2520imposes%2520stringent%2520safety%2520requirements%2 {"title": "Automated Detection of Malignant Lesions in the Ovary Using Deep Learning Models and XAI", "author": "Md. Hasin Sarwar Ifty and Nisharga Nirjan and Labib Islam and M. A. Diganta and Reeyad Ahmed Ornate and Anika Tasnim and Md. Saiful Islam", "abstract": "The unrestrained proliferation of cells that are malignant in nature is cancer. In recent times, medical professionals are constantly acquiring enhanced diagnostic and treatment abilities by implementing deep learning models to analyze medical data for better clinical decision, disease diagnosis and drug discovery. A majority of cancers are studied and treated by incorporating these technologies. However, ovarian cancer remains a dilemma as it has inaccurate non-invasive detection procedures and a time consuming, invasive procedure for accurate detection. Thus, in this research, several Convolutional Neural Networks such as LeNet-5, ResNet, VGGNet and GoogLeNet/Inception have been utilized to develop 15 variants and choose a model that accurately detects and identifies ovarian cancer. For effective model training, the dataset OvarianCancer&SubtypesDatasetHistopathology from Mendeley has been used. After constructing a model, we utilized Explainable Artificial Intelligence (XAI) models such as LIME, Integrated Gradients and SHAP to explain the black box outcome of the selected model. For evaluating the performance of the model, Accuracy, Precision, Recall, F1-Score, ROC Curve and AUC have been used. From the evaluation, it was seen that the slightly compact InceptionV3 model with ReLu had the overall best result achieving an average score of 94% across all the performance metrics in the augmented dataset. Lastly for XAI, the three aforementioned XAI have been used for an overall comparative analysis. It is the aim of this research that the contributions of the study will help in achieving a better detection method for ovarian cancer.", "link": "http://arxiv.org/abs/2603.11818v1", "date": "2026-03-12", "relevancy": 1.8905, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4825}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4776}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4637}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Automated%20Detection%20of%20Malignant%20Lesions%20in%20the%20Ovary%20Using%20Deep%20Learning%20Models%20and%20XAI&body=Title%3A%20Automated%20Detection%20of%20Malignant%20Lesions%20in%20the%20Ovary%20Using%20Deep%20Learning%20Models%20and%20XAI%0AAuthor%3A%20Md.%20Hasin%20Sarwar%20Ifty%20and%20Nisharga%20Nirjan%20and%20Labib%20Islam%20and%20M.%20A.%20Diganta%20and%20Reeyad%20Ahmed%20Ornate%20and%20Anika%20Tasnim%20and%20Md.%20Saiful%20Islam%0AAbstract%3A%20The%20unrestrained%20proliferation%20of%20cells%20that%20are%20malignant%20in%20nature%20is%20cancer.%20In%20recent%20times%2C%20medical%20professionals%20are%20constantly%20acquiring%20enhanced%20diagnostic%20and%20treatment%20abilities%20by%20implementing%20deep%20learning%20models%20to%20analyze%20medical%20data%20for%20better%20clinical%20decision%2C%20disease%20diagnosis%20and%20drug%20discovery.%20A%20majority%20of%20cancers%20are%20studied%20and%20treated%20by%20incorporating%20these%20technologies.%20However%2C%20ovarian%20cancer%20remains%20a%20dilemma%20as%20it%20has%20inaccurate%20non-invasive%20detection%20procedures%20and%20a%20time%20consuming%2C%20invasive%20procedure%20for%20accurate%20detection.%20Thus%2C%20in%20this%20research%2C%20several%20Convolutional%20Neural%20Networks%20such%20as%20LeNet-5%2C%20ResNet%2C%20VGGNet%20and%20GoogLeNet/Inception%20have%20been%20utilized%20to%20develop%2015%20variants%20and%20choose%20a%20model%20that%20accurately%20detects%20and%20identifies%20ovarian%20cancer.%20For%20effective%20model%20training%2C%20the%20dataset%20OvarianCancer%26SubtypesDatasetHistopathology%20from%20Mendeley%20has%20been%20used.%20After%20constructing%20a%20model%2C%20we%20utilized%20Explainable%20Artificial%20Intelligence%20%28XAI%29%20models%20such%20as%20LIME%2C%20Integrated%20Gradients%20and%20SHAP%20to%20explain%20the%20black%20box%20outcome%20of%20the%20selected%20model.%20For%20evaluating%20the%20performance%20of%20the%20model%2C%20Accuracy%2C%20Precision%2C%20Recall%2C%20F1-Score%2C%20ROC%20Curve%20and%20AUC%20have%20been%20used.%20From%20the%20evaluation%2C%20it%20was%20seen%20that%20the%20slightly%20compact%20InceptionV3%20model%20with%20ReLu%20had%20the%20overall%20best%20result%20achieving%20an%20average%20score%20of%2094%25%20across%20all%20the%20performance%20metrics%20in%20the%20augmented%20dataset.%20Lastly%20for%20XAI%2C%20the%20three%20aforementioned%20XAI%20have%20been%20used%20for%20an%20overall%20comparative%20analysis.%20It%20is%20the%20aim%20of%20this%20research%20that%20the%20contributions%20of%20the%20study%20will%20help%20in%20achieving%20a%20better%20detection%20method%20for%20ovarian%20cancer.%0ALink%3A%20http%3A//arxiv.org/abs/2603.11818v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAutomated%2520Detection%2520of%2520Malignant%2520Lesions%2520in%2520the%2520Ovary%2520Using%2520Deep%2520Learning%2520Models%2520and%2520XAI%26entry.906535625%3DMd.%2520Hasin%2520Sarwar%2520Ifty%2520and%2520Nisharga%2520Nirjan%2520and%2520Labib%2520Islam%2520and%2520M.%2520A.%2520Diganta%2520and%2520Reeyad%2520Ahmed%2520Ornate%2520and%2520Anika%2520Tasnim%2520and%2520Md.%2520Saiful%2520Islam%26entry.1292438233%3DThe%2520unrestrained%2520proliferation%2520of%2520cells%2520that%2520are%2520malignant%2520in%2520nature%2520is%2520cancer.%2520In%2520recent%2520times%252C%2520medical%2520professionals%2520are {"title": "Hybrid Human-Agent Social Dilemmas in Energy Markets", "author": "Isuri Perera and Frits de Nijs and Julian Garcia", "abstract": "In hybrid populations where humans delegate strategic decision-making to autonomous agents, understanding when and how cooperative behaviors can emerge remains a key challenge. We study this problem in the context of energy load management: consumer agents schedule their appliance use under demand-dependent pricing. This structure can create a social dilemma where everybody would benefit from coordination, but in equilibrium agents often choose to incur the congestion costs that cooperative turn-taking would avoid. To address the problem of coordination, we introduce artificial agents that use globally observable signals to increase coordination. Using evolutionary dynamics, and reinforcement learning experiments, we show that artificial agents can shift the learning dynamics to favour coordination outcomes. An often neglected problem is partial adoption: what happens when the technology of artificial agents is in the early adoption stages? We analyze mixed populations of adopters and non-adopters, demonstrating that unilateral entry is feasible: adopters are not structurally penalized, and partial adoption can still improve aggregate outcomes. However, in some parameter regimes, non-adopters may benefit disproportionately from the cooperation induced by adopters. This asymmetry, while not precluding beneficial entry, warrants consideration in deployment, and highlights strategic issues around the adoption of AI technology in multiagent settings.", "link": "http://arxiv.org/abs/2603.11834v1", "date": "2026-03-12", "relevancy": 1.5235, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5316}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.or {"title": "Deep Learning-based Assessment of the Relation Between the Third Molar and Mandibular Canal on Panoramic Radiographs using Local, Centralized, and Federated Learning", "author": "Johan Andreas Balle Rubak and Sara Haghighat and Sanyam Jain and Mostafa Aldesoki and Akhilanand Chaurasia and Sarah Sadat Ehsani and Faezeh Dehghan Ghanatkaman and Ahmad Badruddin Ghazali and Julien Issa and Basel Khalil and Rishi Ramani and Ruben Pauwels", "abstract": "Impaction of the mandibular third molar in proximity to the mandibular canal increases the risk of inferior alveolar nerve injury. Panoramic radiography is routinely used to assess this relationship. Automated classification of molar-canal overlap could support clinical triage and reduce unnecessary CBCT referrals, while federated learning (FL) enables multi-center collaboration without sharing patient data. We compared Local Learning (LL), FL, and Centralized Learning (CL) for binary overlap/no-overlap classification on cropped panoramic radiographs partitioned across eight independent labelers. A pretrained ResNet-34 was trained under each paradigm and evaluated using per-client metrics with locally optimized thresholds and pooled test performance with a global threshold. Performance was assessed using area under the receiver operating characteristic curve (AUC) and threshold-based metrics, alongside training dynamics, Grad-CAM visualizations, and server-side aggregate monitoring signals. On the test set, CL achieved the highest performance (AUC 0.831; accuracy = 0.782), FL showed intermediate performance (AUC 0.757; accuracy = 0.703), and LL generalized poorly across clients (AUC range = 0.619-0.734; mean = 0.672). Training curves suggested overfitting, particularly in LL models, and Grad-CAM indicated more anatomically focused attention in CL and FL. Overall, centralized training provided the strongest performance, while FL offers a privacy-preserving alternative that outperforms LL.", "link": "http://arxiv.o {"title": "Separable neural architectures as a primitive for unified predictive and generative intelligence", "author": "Reza T. Batley and Apurba Sarker and Rajib Mostakim and Andrew Klichine and Sourav Saha", "abstract": "Intelligent systems across physics, language and perception often exhibit factorisable structure, yet are typically modelled by monolithic neural architectures that do not explicitly exploit this structure. The separable neural architecture (SNA) addresses this by formalising a representational class that unifies additive, quadratic and tensor-decomposed neural models. By constraining interaction order and tensor rank, SNAs impose a structural inductive bias that factorises high-dimensional mappings into low-arity components. Separability need not be a property of the system itself: it often emerges in the coordinates or representations through which the system is expressed. Crucially, this coordinate-aware formulation reveals a structural analogy between chaotic spatiotemporal dynamics and linguistic autoregression. By treating continuous physical states as smooth, separable embeddings, SNAs enable distributional modelling of chaotic systems. This approach mitigates the nonphysical drift characteristics of deterministic operators whilst remaining applicable to discrete sequences. The compositional versatility of this approach is demonstrated across four domains: autonomous waypoint navigation via reinforcement learning, inverse generation of multifunctional microstructures, distributional modelling of turbulent flow and neural language modelling. These results establish the separable neural architecture as a domain-agnostic primitive for predictive and generative intelligence, capable of unifying both deterministic and distributional representations.", "link": "http://arxiv.org/abs/2603.12244v1", "date": "2026-03-12", "relevancy": 1.5239, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

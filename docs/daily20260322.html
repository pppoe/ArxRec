20scenes%20at%20adjustable%20fidelity%20from%20a%20single%20model%2C%20known%20as%20level%20of%20detail%20%28LoD%29%2C%20is%20crucial%20for%20practical%20deployment%20of%203D%20Gaussian%20Splatting%20%283DGS%29.%20Existing%20discrete%20LoD%20methods%20expose%20only%20a%20limited%20set%20of%20operating%20points%2C%20while%20concurrent%20continuous%20LoD%20approaches%20enable%20smoother%20scaling%20but%20often%20suffer%20noticeable%20quality%20degradation%20at%20full%20capacity%2C%20making%20LoD%20a%20costly%20design%20decision.%20We%20introduce%20Matryoshka%20Gaussian%20Splatting%20%28MGS%29%2C%20a%20training%20framework%20that%20enables%20continuous%20LoD%20for%20standard%203DGS%20pipelines%20without%20sacrificing%20full-capacity%20rendering%20quality.%20MGS%20learns%20a%20single%20ordered%20set%20of%20Gaussians%20such%20that%20rendering%20any%20prefix%2C%20the%20first%20k%20splats%2C%20produces%20a%20coherent%20reconstruction%20whose%20fidelity%20improves%20smoothly%20with%20increasing%20budget.%20Our%20key%20idea%20is%20stochastic%20budget%20training%3A%20each%20iteration%20samples%20a%20random%20splat%20budget%20and%20optimises%20both%20the%20corresponding%20prefix%20and%20the%20full%20set.%20This%20strategy%20requires%20only%20two%20forward%20passes%20and%20introduces%20no%20architectural%20modifications.%20Experiments%20across%20four%20benchmarks%20and%20six%20baselines%20show%20that%20MGS%20matches%20the%20full-capacity%20performance%20of%20its%20backbone%20while%20enabling%20a%20continuous%20speed-quality%20trade-off%20from%20a%20single%20model.%20Extensive%20ablations%20on%20ordering%20strategies%2C%20training%20objectives%2C%20and%20model%20capacity%20further%20validate%20the%20designs.&entry.1838667208=http%3A//arxiv.org/abs/2603.19234v1&entry.124074799=Read"},
{"title": "SwiftTailor: Efficient 3D Garment Generation with Geometry Image Representation", "author": "Phuc Pham and Uy Dieu Tran and Binh-Son Hua and Phong Nguyen", "abstract": "Realistic and efficient 3D garment generation remains a longstanding challenge in computer vision and digital fashion. Existing methods typically rely on large vision- language models to produce serialized representations of 2D sewing patterns, which are then transformed into simulation-ready 3D meshes using garment modeling framework such as GarmentCode. Although these approaches yield high-quality results, they often suffer from slow inference times, ranging from 30 seconds to a minute. In this work, we introduce SwiftTailor, a novel two-stage framework that unifies sewing-pattern reasoning and geometry-based mesh synthesis through a compact geometry image representation. SwiftTailor comprises two lightweight modules: PatternMaker, an efficient vision-language model that predicts sewing patterns from diverse input modalities, and GarmentSewer, an efficient dense prediction transformer that converts these patterns into a novel Garment Geometry Image, encoding the 3D surface of all garment panels in a unified UV space. The final 3D mesh is reconstructed through an efficient inverse mapping process that incorporates remeshing and dynamic stitching algorithms to directly assemble the garment, thereby amortizing the cost of physical simulation. Extensive experiments on the Multimodal GarmentCodeData demonstrate that SwiftTailor achieves state-of-the-art accuracy and visual fidelity while significantly reducing inference time. This work offers a scalable, interpretable, and high-performance solution for next-generation 3D garment generation.", "link": "http://arxiv.org/abs/2603.19053v1", "date": "2026-03-19", "relevancy": 3.3131, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.7439}, {"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.6665}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5775}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SwiftTailor%3A%20Efficient%203D%20Garment%20Generation%20with%20Geometry%20Image%20Representation&body=Title%3A%20SwiftTailor%3A%20Efficient%203D%20Garment%20Generation%20with%20Geometry%20Image%20Representation%0AAuthor%3A%20Phuc%20Pham%20and%20Uy%20Dieu%20Tran%20and%20Binh-Son%20Hua%20and%20Phong%20Nguyen%0AAbstract%3A%20Realistic%20and%20efficient%203D%20garment%20generation%20remains%20a%20longstanding%20challenge%20in%20computer%20vision%20and%20digital%20fashion.%20Existing%20methods%20typically%20rely%20on%20large%20vision-%20language%20models%20to%20produce%20serialized%20representations%20of%202D%20sewing%20patterns%2C%20which%20are%20then%20transformed%20into%20simulation-ready%203D%20meshes%20using%20garment%20modeling%20framework%20such%20as%20GarmentCode.%20Although%20these%20approaches%20yield%20high-quality%20results%2C%20they%20often%20suffer%20from%20slow%20inference%20times%2C%20ranging%20from%2030%20seconds%20to%20a%20minute.%20In%20this%20work%2C%20we%20introduce%20SwiftTailor%2C%20a%20novel%20two-stage%20framework%20that%20unifies%20sewing-pattern%20reasoning%20and%20geometry-based%20mesh%20synthesis%20through%20a%20compact%20geometry%20image%20representation.%20SwiftTailor%20comprises%20two%20lightweight%20modules%3A%20PatternMaker%2C%20an%20efficient%20vision-language%20model%20that%20predicts%20sewing%20patterns%20from%20diverse%20input%20modalities%2C%20and%20GarmentSewer%2C%20an%20efficient%20dense%20prediction%20transformer%20that%20converts%20these%20patterns%20into%20a%20novel%20Garment%20Geometry%20Image%2C%20encoding%20the%203D%20surface%20of%20all%20garment%20panels%20in%20a%20unified%20UV%20space.%20The%20final%203D%20mesh%20is%20reconstructed%20through%20an%20efficient%20inverse%20mapping%20process%20that%20incorporates%20remeshing%20and%20dynamic%20stitching%20algorithms%20to%20directly%20assemble%20the%20garment%2C%20thereby%20amortizing%20the%20cost%20of%20physical%20simulation.%20Extensive%20experiments%20on%20the%20Multimodal%20GarmentCodeData%20demonstrate%20that%20SwiftTailor%20achieves%20state-of-the-art%20accuracy%20and%20visual%20fidelity%20while%20significantly%20reducing%20inference%20time.%20This%20work%20offers%20a%20scalable%2C%20interpretable%2C%20and%20high-performance%20solution%20for%20next-generation%203D%20garment%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19053v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSwiftTailor%253A%2520Efficient%25203D%2520Garment%2520Generation%2520with%2520Geometry%2520Image%2520Representation%26entry.906535625%3DPhuc%2520Pham%2520and%2520Uy%2520Dieu%2520Tran%2520and%2520Binh-Son%2520Hua%2520and%2520Phong%2520Nguyen%26entry.1292438233%3DRealistic%2520and%2520efficient%25203D%2520garment%2520generation%2520remains%2520a%2520longstanding%2520challenge%2520in%2520computer%2520vision%2520and%2520digital%2520fashion.%2520Existing%2520methods%2520typically%2520rely%2520on%2520large%2520vision-%2520language%2520models%2520to%2520produce%2520serialized%2520representations%2520of%25202D%2520sewing%2520patterns%252C%2520which%2520are%2520then%2520transformed%2520into%2520simulation-ready%25203D%2520meshes%2520using%2520garment%2520modeling%2520framework%2520such%2520as%2520GarmentCode.%2520Although%2520these%2520approaches%2520yield%2520high-quality%2520results%252C%2520they%2520often%2520suffer%2520from%2520slow%2520inference%2520times%252C%2520ranging%2520from%252030%2520seconds%2520to%2520a%2520minute.%2520In%2520this%2520work tion%20for%20next-generation%203D%20garment%20generation.&entry.1838667208=http%3A//arxiv.org/abs/2603.19053v1&entry.124074799=Read"},
{"title": "GHOST: Fast Category-agnostic Hand-Object Interaction Reconstruction from RGB Videos using Gaussian Splatting", "author": "Ahmed Tawfik Aboukhadra and Marcel Rogge and Nadia Robertini and Abdalla Arafa and Jameel Malik and Ahmed Elhayek and Didier Stricker", "abstract": "Understanding realistic hand-object interactions from monocular RGB videos is essential for AR/VR, robotics, and embodied AI. Existing methods rely on category-specific templates or heavy computation, yet still produce physically inconsistent hand-object alignment in 3D. We introduce GHOST (Gaussian Hand-Object Splatting), a fast, category-agnostic framework for reconstructing dynamic hand-object interactions using 2D Gaussian Splatting. GHOST represents both hands and objects as dense, view-consistent Gaussian discs and introduces three key innovations: (1) a geometric-prior retrieval and consistency loss that completes occluded object regions, (2) a grasp-aware alignment that refines hand translations and object scale to ensure realistic contact, and (3) a hand-aware background loss that prevents penalizing hand-occluded object regions. GHOST achieves complete, physically consistent, and animatable reconstructions from a single RGB video while running an order of magnitude faster than prior category-agnostic methods. Extensive experiments on ARCTIC, HO3D, and in-the-wild datasets demonstrate state-of-the-art accuracy in 3D reconstruction and 2D rendering quality, establishing GHOST as an efficient and robust solution for realistic hand-object interaction modeling. Code is available at https://github.com/ATAboukhadra/GHOST.", "link": "http://arxiv.org/abs/2603.18912v1", "date": "2026-03-19", "relevancy": 3.2213, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6551}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6419}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6357}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GHOST%3A%20Fast%20Category-agnostic%20Hand-Object%20Interaction%20Reconstruction%20from%20RGB%20Videos%20using%20Gaussian%20Splatting&body=Title%3A%20GHOST%3A%20Fast%20Category-agnostic%20Hand-Object%20Interaction%20Reconstruction%20from%20RGB%20Videos%20using%20Gaussian%20Splatting%0AAuthor%3A%20Ahmed%20Tawfik%20Aboukhadra%20and%20Marcel%20Rogge%20and%20Nadia%20Robertini%20and%20Abdalla%20Arafa%20and%20Jameel%20Malik%20and%20Ahmed%20Elhayek%20and%20Didier%20Stricker%0AAbstract%3A%20Understanding%20realistic%20hand-object%20interactions%20from%20monocular%20RGB%20videos%20is%20essential%20for%20AR/VR%2C%20robotics%2C%20and%20embodied%20AI.%20Existing%20methods%20rely%20on%20category-specific%20templates%20or%20heavy%20computation%2C%20yet%20still%20produce%20physically%20inconsistent%20hand-object%20alignment%20in%203D.%20We%20introduce%20GHOST%20%28Gaussian%20Hand-Object%20Splatting%29%2C%20a%20fast%2C%20category-agnostic%20framework%20for%20reconstructing%20dynamic%20hand-object%20interactions%20using%202D%20Gaussian%20Splatting.%20GHOST%20represents%20both%20hands%20and%20objects%20as%20dense%2C%20view-consistent%20Gaussian%20discs%20and%20introduces%20three%20key%20innovations%3A%20%281%29%20a%20geometric-prior%20retrieval%20and%20consistency%20loss%20that%20completes%20occluded%20object%20regions%2C%20%282%29%20a%20grasp-aware%20alignment%20that%20refines%20hand%20translations%20and%20object%20scale%20to%20ensure%20realistic%20contact%2C%20and%20%283%29%20a%20hand-aware%20background%20loss%20that%20prevents%20penalizing%20hand-occluded%20object%20regions.%20GHOST%20achieves%20complete%2C%20physically%20consistent%2C%20and%20animatable%20reconstructions%20from%20a%20single%20RGB%20video%20while%20running%20an%20order%20of%20magnitude%20faster%20than%20prior%20category-agnostic%20methods.%20Extensive%20experiments%20on%20ARCTIC%2C%20HO3D%2C%20and%20in-the-wild%20datasets%20demonstrate%20state-of-the-art%20accuracy%20in%203D%20reconstruction%20and%202D%20rendering%20quality%2C%20establishing%20GHOST%20as%20an%20efficient%20and%20robust%20solution%20for%20realistic%20hand-object%20interaction%20modeling.%20Code%20is%20available%20at%20https%3A//github.com/ATAboukhadra/GHOST.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18912v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGHOST%253A%2520Fast%2520Category-agnostic%2520Hand-Object%2520Interaction%2520Reconstruction%2520from%2520RGB%2520Videos%2520using%2520Gaussian%2520Splatting%26entry.906535625%3DAhmed%2520Tawfik%2520Aboukhadra%2520and%2520Marcel%2520Rogge%2520and%2520Nadia%2520Robertini%2520and%2520Abdalla%2520Arafa%2520and%2520Jameel%2520Malik%2520and%2520Ahmed%2520Elhayek%2520and%2520Didier%2520Stricker%26entry.1292438233%3DUnderstanding%2520realistic%2520hand-object%2520interactions%2520from%2520monocular%2520RGB%2520videos%2520is%2520essential%2520for%2520AR/VR%252C%2520robotics%252C%2520and%2520embodied%2520AI.%2520Existing%2520methods%2520rely%2520on%2520category-specific%2520templates%2520or%2520heavy%2520computation%252C%2520yet%2520still%2520produce%2520physically%2520inconsistent%2520hand-object%2520alignment%2520in%25203D.%2520We%2520introduce%2520GHOST%2520%2528Gaussian%2520Hand-Object%2520Splatting%2529%252C%2520a%2520fast%252C%2520category-agnostic%2520framework%2520for%2520reconstructing%2520dynamic%2520hand-object%2520interactions%2520using%25202D%2520Gaussian%2520Splatting.%2520GHOST%2520represents%2520both%2520hands%2520and%2520objects%2520as%2520dense%252C%2520view-consistent%2520Gaussian%2520discs%2520and%2520introduces%2520three%2520key%2520innovations%253A%2520%25281%2529%2520a%2520geometric-prio on%2C%20yet%20still%20produce%20physically%20inconsistent%20hand-object%20alignment%20in%203D.%20We%20introduce%20GHOST%20%28Gaussian%20Hand-Object%20Splatting%29%2C%20a%20fast%2C%20category-agnostic%20framework%20for%20reconstructing%20dynamic%20hand-object%20interactions%20using%202D%20Gaussian%20Splatting.%20GHOST%20represents%20both%20hands%20and%20objects%20as%20dense%2C%20view-consistent%20Gaussian%20discs%20and%20introduces%20three%20key%20innovations%3A%20%281%29%20a%20geometric-prior%20retrieval%20and%20consistency%20loss%20that%20completes%20occluded%20object%20regions%2C%20%282%29%20a%20grasp-aware%20alignment%20that%20refines%20hand%20translations%20and%20object%20scale%20to%20ensure%20realistic%20contact%2C%20and%20%283%29%20a%20hand-aware%20background%20loss%20that%20prevents%20penalizing%20hand-occluded%20object%20regions.%20GHOST%20achieves%20complete%2C%20physically%20consistent%2C%20and%20animatable%20reconstructions%20from%20a%20single%20RGB%20video%20while%20running%20an%20order%20of%20magnitude%20faster%20than%20prior%20category-agnostic%20methods.%20Extensive%20experiments%20on%20ARCTIC%2C%20HO3D%2C%20and%20in-the-wild%20datasets%20demonstrate%20state-of-the-art%20accuracy%20in%203D%20reconstruction%20and%202D%20rendering%20quality%2C%20establishing%20GHOST%20as%20an%20efficient%20and%20robust%20solution%20for%20realistic%20hand-object%20interaction%20modeling.%20Code%20is%20available%20at%20https%3A//github.com/ATAboukhadra/GHOST.&entry.1838667208=http%3A//arxiv.org/abs/2603.18912v1&entry.124074799=Read"},
{"title": "Reconstruction Matters: Learning Geometry-Aligned BEV Representation through 3D Gaussian Splatting", "author": "Yiren Lu and Xin Ye and Burhaneddin Yaman and Jingru Luo and Zhexiao Xiong and Liu Ren and Yu Yin", "abstract": "Bird's-Eye-View (BEV) perception serves as a cornerstone for autonomous driving, offering a unified spatial representation that fuses surrounding-view images to enable reasoning for various downstream tasks, such as semantic segmentation, 3D object detection, and motion prediction. However, most existing BEV perception frameworks adopt an end-to-end training paradigm, where image features are directly transformed into the BEV space and optimized solely through downstream task supervision. This formulation treats the entire perception process as a black box, often lacking explicit 3D geometric understanding and interpretability, leading to suboptimal performance. In this paper, we claim that an explicit 3D representation matters for accurate BEV perception, and we propose Splat2BEV, a Gaussian Splatting-assisted framework for BEV tasks. Splat2BEV aims to learn BEV feature representations that are both semantically rich and geometrically precise. We first pre-train a Gaussian generator that explicitly reconstructs 3D scenes from multi-view inputs, enabling the generation of geometry-aligned feature representations. These representations are then projected into the BEV space to serve as inputs for downstream tasks. Extensive experiments on nuScenes and argoverse dataset demonstrate that Splat2BEV achieves state-of-the-art performance and validate the effectiveness of incorporating explicit 3D reconstruction into BEV perception.", "link": "http://arxiv.org/abs/2603.19193v1", "date": "2026-03-19", "relevancy": 3.113, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6428}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6291}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5959}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Reconstruction%20Matters%3A%20Learning%20Geometry-Aligned%20BEV%20Representation%20through%203D%20Gaussian%20Splatting&body=Title%3A%20Reconstruction%20Matters%3A%20Learning%20Geometry-Aligned%20BEV%20Representation%20through%203D%20Gaussian%20Splatting%0AAuthor%3A%20Yiren%20Lu%20and%20Xin%20Ye%20and%20Burhaneddin%20Yaman%20and%20Jingru%20Luo%20and%20Zhexiao%20Xiong%20and%20Liu%20Ren%20and%20Yu%20Yin%0AAbstract%3A%20Bird%27s-Eye-View%20%28BEV%29%20perception%20serves%20as%20a%20cornerstone%20for%20autonomous%20driving%2C%20offering%20a%20unified%20spatial%20representation%20that%20fuses%20surrounding-view%20images%20to%20enable%20reasoning%20for%20various%20downstream%20tasks%2C%20such%20as%20semantic%20segmentation%2C%203D%20object%20detection%2C%20and%20motion%20prediction.%20However%2C%20most%20existing%20BEV%20perception%20frameworks%20adopt%20an%20end-to-end%20training%20paradigm%2C%20where%20image%20features%20are%20directly%20transformed%20into%20the%20BEV%20space%20and%20optimized%20solely%20through%20downstream%20task%20supervision.%20This%20formulation%20treats%20the%20entire%20perception%20process%20as%20a%20black%20box%2C%20often%20lacking%20explicit%203D%20geometric%20understanding%20and%20interpretability%2C%20leading%20to%20suboptimal%20performance.%20In%20this%20paper%2C%20we%20claim%20that%20an%20explicit%203D%20representation%20matters%20for%20accurate%20BEV%20perception%2C%20and%20we%20propose%20Splat2BEV%2C%20a%20Gaussian%20Splatting-assisted%20framework%20for%20BEV%20tasks.%20Splat2BEV%20aims%20to%20learn%20BEV%20feature%20representations%20that%20are%20both%20semantically%20rich%20and%20geometrically%20precise.%20We%20first%20pre-train%20a%20Gaussian%20generator%20that%20explicitly%20reconstructs%203D%20scenes%20from%20multi-view%20inputs%2C%20enabling%20the%20generation%20of%20geometry-aligned%20feature%20representations.%20These%20representations%20are%20then%20projected%20into%20the%20BEV%20space%20to%20serve%20as%20inputs%20for%20downstream%20tasks.%20Extensive%20experiments%20on%20nuScenes%20and%20argoverse%20dataset%20demonstrate%20that%20Splat2BEV%20achieves%20state-of-the-art%20performance%20and%20validate%20the%20effectiveness%20of%20incorporating%20explicit%203D%20reconstruction%20into%20BEV%20perception.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19193v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReconstruction%2520Matters%253A%2520Learning%2520Geometry-Aligned%2520BEV%2520Representation%2520through%25203D%2520Gaussian%2520Splatting%26entry.906535625%3DYiren%2520Lu%2520and%2520Xin%2520Ye%2520and%2520Burhaneddin%2520Yaman%2520and%2520Jingru%2520Luo%2520and%2520Zhexiao%2520Xiong%2520and%2520Liu%2520Ren%2520and%2520Yu%2520Yin%26entry.1292438233%3DBird%2527s-Eye-View%2520%2528BEV%2529%2520perception%2520serves%2520as%2520a%2520cornerstone%2520for%2520autonomous%2520driving%252C%2520offering%2520a%2520unified%2520spatial%2520representation%2520that%2520fuses%2520surrounding-view%2520images%2520to%2520enable%2520reasoning%2520for%2520various%2520downstream%2520tasks%252C%2520such%2520as%2520semantic%2520segmentation%252C%25203D%2520object%2520detection%252C%2520and%2520motion%2520prediction.%2520However%252C%2520most%2520existing%2520BEV%2520perception%2520frameworks%2520adopt%2520an%2520end-to-end%2520training%2520paradigm%252C%2520where%2520image%2520features%2520are%2520directly%2520transformed%2520into%2520the%2520BEV%2520space%2520and%2520optimized%2520solely%2520through%2520downstream%2520task%2520supervision.%2520This%2520formulation%2520treats%2520the%2520entire%2520perception% nomous%20driving%2C%20offering%20a%20unified%20spatial%20representation%20that%20fuses%20surrounding-view%20images%20to%20enable%20reasoning%20for%20various%20downstream%20tasks%2C%20such%20as%20semantic%20segmentation%2C%203D%20object%20detection%2C%20and%20motion%20prediction.%20However%2C%20most%20existing%20BEV%20perception%20frameworks%20adopt%20an%20end-to-end%20training%20paradigm%2C%20where%20image%20features%20are%20directly%20transformed%20into%20the%20BEV%20space%20and%20optimized%20solely%20through%20downstream%20task%20supervision.%20This%20formulation%20treats%20the%20entire%20perception%20process%20as%20a%20black%20box%2C%20often%20lacking%20explicit%203D%20geometric%20understanding%20and%20interpretability%2C%20leading%20to%20suboptimal%20performance.%20In%20this%20paper%2C%20we%20claim%20that%20an%20explicit%203D%20representation%20matters%20for%20accurate%20BEV%20perception%2C%20and%20we%20propose%20Splat2BEV%2C%20a%20Gaussian%20Splatting-assisted%20framework%20for%20BEV%20tasks.%20Splat2BEV%20aims%20to%20learn%20BEV%20feature%20representations%20that%20are%20both%20semantically%20rich%20and%20geometrically%20precise.%20We%20first%20pre-train%20a%20Gaussian%20generator%20that%20explicitly%20reconstructs%203D%20scenes%20from%20multi-view%20inputs%2C%20enabling%20the%20generation%20of%20geometry-aligned%20feature%20representations.%20These%20representations%20are%20then%20projected%20into%20the%20BEV%20space%20to%20serve%20as%20inputs%20for%20downstream%20tasks.%20Extensive%20experiments%20on%20nuScenes%20and%20argoverse%20dataset%20demonstrate%20that%20Splat2BEV%20achieves%20state-of-the-art%20performance%20and%20validate%20the%20effectiveness%20of%20incorporating%20explicit%203D%20reconstruction%20into%20BEV%20perception.&entry.1838667208=http%3A//arxiv.org/abs/2603.19193v1&entry.124074799=Read"},
{"title": "Perceptio: Perception Enhanced Vision Language Models via Spatial Token Generation", "author": "Yuchen Li and Amanmeet Garg and Shalini Chaudhuri and Rui Zhao and Garin Kessler", "abstract": "Large Vision Language Models (LVLMs) excel at semantic understanding but struggle with fine grained spatial grounding, as the model must implicitly infer complex geometry without ever producing a spatial interpretation. We present Perceptio, a perception enhanced LVLM with 2D and 3D spatial reasoning abilities, enabled via explicit semantic segmentation tokens and depth tokens generated directly within the autoregressive sequence. Concretely, we (i) distill a VQVAE depth codebook from a strong monocular teacher to tokenize dense depth into compact sequences, and (ii) integrate SAM2 based semantic segmentation tokens and VQ-VAE depth tokens inside the LLM so the model first emits spatial tokens and then answers. To stabilize depth token generation, we introduce novel composite depth-token objectives (marker, token, and count losses) and a soft-merging technique for differentiable reconstruction. We adopt a multi-task co-training strategy across diverse datasets, letting the model learn perception tokens to tackle multiple downstream tasks. Building on InternVL, Perceptio achieves state-of-the-art performance across benchmarks: improving referring expression segmentation by +0.8/+1.4/+1.1 cIoU on RefCOCO/+/g HardBLINK spatial understanding accuracy by 10.3%, and MMBench accuracy by 1.0%, demonstrating that explicit spatial chain-of-thought materially strengthens spatial grounding in LVLMs.", "link": "http://arxiv.org/abs/2603.18795v1", "date": "2026-03-19", "relevancy": 3.0886, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6447}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6447}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5638}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Perceptio%3A%20Perception%20Enhanced%20Vision%20Language%20Models%20via%20Spatial%20Token%20Generation&body=Title%3A%20Perceptio%3A%20Perception%20Enhanced%20Vision%20Language%20Models%20via%20Spatial%20Token%20Generation%0AAuthor%3A%20Yuchen%20Li%20and%20Amanmeet%20Garg%20and%20Shalini%20Chaudhuri%20and%20Rui%20Zhao%20and%20Garin%20Kessler%0AAbstract%3A%20Large%20Vision%20Language%20Models%20%28LVLMs%29%20excel%20at%20semantic%20understanding%20but%20struggle%20with%20fine%20grained%20spatial%20grounding%2C%20as%20the%20model%20must%20implicitly%20infer%20complex%20geometry%20without%20ever%20producing%20a%20spatial%20interpretation.%20We%20present%20Perceptio%2C%20a%20perception%20enhanced%20LVLM%20with%202D%20and%203D%20spatial%20reasoning%20abilities%2C%20enabled%20via%20explicit%20semantic%20segmentation%20tokens%20and%20depth%20tokens%20generated%20directly%20within%20the%20autoregressive%20sequence.%20Concretely%2C%20we%20%28i%29%20distill%20a%20VQVAE%20depth%20codebook%20from%20a%20strong%20monocular%20teacher%20to%20tokenize%20dense%20depth%20into%20compact%20sequences%2C%20and%20%28ii%29%20integrate%20SAM2%20based%20semantic%20segmentation%20tokens%20and%20VQ-VAE%20depth%20tokens%20inside%20the%20LLM%20so%20the%20model%20first%20emits%20spatial%20tokens%20and%20then%20answers.%20To%20stabilize%20depth%20token%20generation%2C%20we%20introduce%20novel%20composite%20depth-token%20objectives%20%28marker%2C%20token%2C%20and%20count%20losses%29%20and%20a%20soft-merging%20technique%20for%20differentiable%20reconstruction.%20We%20adopt%20a%20multi-task%20co-training%20strategy%20across%20diverse%20datasets%2C%20letting%20the%20model%20learn%20perception%20tokens%20to%20tackle%20multiple%20down {"title": "Points-to-3D: Structure-Aware 3D Generation with Point Cloud Priors", "author": "Jiatong Xia and Zicheng Duan and Anton van den Hengel and Lingqiao Liu", "abstract": "Recent progress in 3D generation has been driven largely by models conditioned on images or text, while readily available 3D priors are still underused. In many real-world scenarios, the visible-region point cloud are easy to obtain from active sensors such as LiDAR or from feed-forward predictors like VGGT, offering explicit geometric constraints that current methods fail to exploit. In this work, we introduce Points-to-3D, a diffusion-based framework that leverages point cloud priors for geometry-controllable 3D asset and scene generation. Built on a latent 3D diffusion model TRELLIS, Points-to-3D first replaces pure-noise sparse structure latent initialization with a point cloud priors tailored input formulation.A structure inpainting network, trained within the TRELLIS framework on task-specific data designed to learn global structural inpainting, is then used for inference with a staged sampling strategy (structural inpainting followed by boundary refinement), completing the global geometry while preserving the visible regions of the input priors.In practice, Points-to-3D can take either accurate point-cloud priors or VGGT-estimated point clouds from single images as input. Experiments on both objects and scene scenarios consistently demonstrate superior performance over state-of-the-art baselines in terms of rendering quality and geometric fidelity, highlighting the effectiveness of explicitly embedding point-cloud priors for achieving more accurate and structurally controllable 3D generation.", "link": "http://arxiv.org/abs/2603.18782v1", "date": "2026-03-19", "relevancy": 3.0526, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6215}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6215}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5886}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Points-to-3D%3A%20Structure-Aware%203D%20Generation%20with%20Point%20Cloud%20Priors&body=Title%3A%20Points-to-3D%3A%20Structure-Aware%203D%20Generation%20with%20Point%20Cloud%20Priors%0AAuthor%3A%20Jiatong%20Xia%20and%20Zicheng%20Duan%20and%20Anton%20van%20den%20Hengel%20and%20Lingqiao%20Liu%0AAbstract%3A%20Recent%20progress%20in%203D%20generation%20has%20been%20driven%20largely%20by%20models%20conditioned%20on%20images%20or%20text%2C%20while%20readily%20available%203D%20priors%20are%20still%20underused.%20In%20many%20real-world%20scenarios%2C%20the%20visible-region%20point%20cloud%20are%20easy%20to%20obtain%20from%20active%20sensors%20such%20as%20LiDAR%20or%20from%20feed-forward%20predictors%20like%20VGGT%2C%20offering%20explicit%20geometric%20constraints%20that%20current%20methods%20fail%20to%20exploit.%20In%20this%20work%2C%20we%20introduce%20Points-to-3D%2C%20a%20diffusion-based%20framework%20that%20leverages%20point%20cloud%20priors%20for%20geometry-controllable%203D%20asset%20and%20scene%20generation.%20Built%20on%20a%20latent%203D%20diffusion%20model%20TRELLIS%2C%20Points-to-3D%20first%20replaces%20pure-noise%20sparse%20structure%20latent%20initialization%20with%20a%20point%20cloud%20priors%20tailored%20input%20formulation.A%20structure%20inpainting%20network%2C%20trained%20within%20the%20TRELLIS%20framework%20on%20task-specific%20data%20designed%20to%20learn%20global%20structural%20inpainting%2C%20is%20then%20used%20for%20inference%20with%20a%20staged%20sampling%20strategy%20%28structural%20inpainting%20followed%20by%20boundary%20refinement%29%2C%20completing%20the%20global%20geometry%20while%20preserving%20the%20visible%20regions%20of%20the%20input%20priors.In%20practice%2C%20Points-to-3D%20can%20take%20either%20accurate%20point-cloud%20priors%20or%20VGGT-estimated%20point%20clouds%20from%20single%20images%20as%20input.%20Experiments%20on%20both%20objects%20and%20scene%20scenarios%20consistently%20demonstrate%20superior%20performance%20over%20state-of-the-art%20baselines%20in%20terms%20of%20rendering%20quality%20and%20geometric%20fidelity%2C%20highlighting%20the%20effectiveness%20of%20explicitly%20embedding%20point-cloud%20priors%20for%20achieving%20more%20accurate%20and%20structurally%20controllable%203D%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18782v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPoints-to-3D%253A%2520Structure-Aware%25203D%2520Generation%2520with%2520Point%2520Cloud%2520Priors%26entry.906535625%3DJiatong%2520Xia%2520and%2520Zicheng%2520Duan%2520and%2520Anton%2520van%2520den%2520Hengel%2520and%2520Lingqiao%2520Liu%26entry.1292438233%3DRecent%2520progress%2520in%25203D%2520generation%2520has%2520been%2520driven%2520largely%2520by%2520models%2520conditioned%2520on%2520images%2520or%2520text%252C%2520while%2520readily%2520available%25203D%2520priors%2520are%2520still%2520underused.%2520In%2520many%2520real-world%2520scenarios%252C%2520the%2520visible-region%2520point%2520cloud%2520are%2520easy%2520to%2520obtain%2520from%2520active%2520sensors%2520such%2520as%2520LiDAR%2520or%2520from%2520feed-forward%2520predictors%2520like%2520VGGT%252C%2520offering%2520explicit%2520geometric%2520constraints%2520that%2520current%2520methods%2520fail%2520to%2520exploit.%2520In%2520this%2520work%252C%2520we%2520introduce%2520Points-to-3D%252C%2520a%2520diffusion-based%2520framework%2520that%2520leverages%2520point%2520cloud%2520priors%2520for%2520geometry-controllable%25203D%2520asset%2520and%2520scene%2520generation.%2520Built%2520on%2520a%2520latent%25203D%2520diffusion%2520model%2520TRELLIS%252C%2520Points-to-3D%2520first%2520replaces%2520pu {"title": "Is Contrastive Distillation Enough for Learning Comprehensive 3D Representations?", "author": "Yifan Zhang and Junhui Hou", "abstract": "Cross-modal contrastive distillation has recently been explored for learning effective 3D representations. However, existing methods focus primarily on modality-shared features, neglecting the modality-specific features during the pre-training process, which leads to suboptimal representations. In this paper, we theoretically analyze the limitations of current contrastive methods for 3D representation learning and propose a new framework, namely CMCR (Cross-Modal Comprehensive Representation Learning), to address these shortcomings. Our approach improves upon traditional methods by better integrating both modality-shared and modality-specific features. Specifically, we introduce masked image modeling and occupancy estimation tasks to guide the network in learning more comprehensive modality-specific features. Furthermore, we propose a novel multi-modal unified codebook that learns an embedding space shared across different modalities. Besides, we introduce geometry-enhanced masked image modeling to further boost 3D representation learning. Extensive experiments demonstrate that our method mitigates the challenges faced by traditional approaches and consistently outperforms existing image-to-LiDAR contrastive distillation methods in downstream tasks. Code will be available at https://github.com/Eaphan/CMCR.", "link": "http://arxiv.org/abs/2412.08973v4", "date": "2026-03-19", "relevancy": 3.0306, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.639}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6073}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", {"title": "SEAR: Simple and Efficient Adaptation of Visual Geometric Transformers for RGB+Thermal 3D Reconstruction", "author": "Vsevolod Skorokhodov and Chenghao Xu and Shuo Sun and Olga Fink and Malcolm Mielle", "abstract": "Foundational feed-forward visual geometry models enable accurate and efficient camera pose estimation and scene reconstruction by learning strong scene priors from massive RGB datasets. However, their effectiveness drops when applied to mixed sensing modalities, such as RGB-thermal (RGB-T) images. We observe that while a visual geometry grounded transformer pretrained on RGB data generalizes well to thermal-only reconstruction, it struggles to align RGB and thermal modalities when processed jointly. To address this, we propose SEAR, a simple yet efficient fine-tuning strategy that adapts a pretrained geometry transformer to multimodal RGB-T inputs. Despite being trained on a relatively small RGB-T dataset, our approach significantly outperforms state-of-the-art methods for 3D reconstruction and camera pose estimation, achieving significant improvements over all metrics (e.g., over 29\\% in AUC@30) and delivering higher detail and consistency between modalities with negligible overhead in inference time compared to the original pretrained model. Notably, SEAR enables reliable multimodal pose estimation and reconstruction even under challenging conditions, such as low lighting and dense smoke. We validate our architecture through extensive ablation studies, demonstrating how the model aligns both modalities. Additionally, we introduce a new dataset featuring RGB and thermal sequences captured at different times, viewpoints, and illumination conditions, providing a robust benchmark for future work in multimodal 3D scene reconstruction. Code and models are publicly available at https://www.github.com/Schindler-EPFL-Lab/SEAR.", "link": "http://arxiv.org/abs/2603.18774v1", "date": "2026-03-19", "relevancy": 3.0198, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.621}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5976}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5934}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SEAR%3A%20Simple%20and%20Efficient%20Adaptation%20of%20Visual%20Geometric%20Transformers%20for%20RGB%2BThermal%203D%20Reconstruction&body=Title%3A%20SEAR%3A%20Simple%20and%20Efficient%20Adaptation%20of%20Visual%20Geometric%20Transformers%20for%20RGB%2BThermal%203D%20Reconstruction%0AAuthor%3A%20Vsevolod%20Skorokhodov%20and%20Chenghao%20Xu%20and%20Shuo%20Sun%20and%20Olga%20Fink%20and%20Malcolm%20Mielle%0AAbstract%3A%20Foundational%20feed-forward%20visual%20geometry%20models%20enable%20accurate%20and%20efficient%20camera%20pose%20estimation%20and%20scene%20reconstruction%20by%20learning%20strong%20scene%20priors%20from%20massive%20RGB%20datasets.%20However%2C%20their%20effectiveness%20drops%20when%20applied%20to%20mixed%20sensing%20modalities%2C%20such%20as%20RGB-thermal%20%28RGB-T%29%20images.%20We%20observe%20that%20while%20a%20visual%20geometry%20grounded%20transformer%20pretrained%20on%20RGB%20data%20generalizes%20well%20to%20thermal-only%20reconstruction%2C%20it%20struggles%20to%20align%20RGB%20and%20thermal%20modalities%20when%20processed%20jointly.%20To%20address%20this%2C%20we%20propose%20SEAR%2C%20a%20simple%20yet%20efficient%20fine-tuning%20strategy%20that%20adapts%20a%20pretrained%20geometry%20transformer%20to%20multimodal%20RGB-T%20inputs.%20Despite%20being%20trained%20on%20a%20relatively%20small%20RGB-T%20dataset%2C%20our%20approach%20significantly%20outperforms%20state-of-the-art%20methods%20for%203D%20reconstruction%20and%20camera%20pose%20estimation%2C%20achieving%20significant%20improvements%20over%20all%20metrics%20%28e.g.%2C%20over%2029%5C%25%20in%20AUC%4030%29%20and%20delivering%20higher%20detail%20and%20consistency%20between%20modalities%20with%20negligible%20overhead%20in%20inference%20time%20compared%20to%20the%20original%20pretrained%20model.%20Notably%2C%20SEAR%20enables%20reliable%20multimodal%20pose%20estimation%20and%20reconstruction%20even%20under%20challenging%20conditions%2C%20such%20as%20low%20lighting%20and%20dense%20smoke.%20We%20validate%20our%20architecture%20through%20extensive%20ablation%20studies%2C%20demonstrating%20how%20the%20model%20aligns%20both%20modalities.%20Additionally%2C%20we%20introduce%20a%20new%20dataset%20featuring%20RGB%20and%20thermal%20sequences%20captured%20at%20different%20times%2C%20viewpoints%2C%20and%20illumination%20conditions%2C%20providing%20a%20robust%20benchmark%20for%20future%20work%20in%20multimodal%203D%20scene%20reconstruction.%20Code%20and%20models%20are%20publicly%20available%20at%20https%3A//www.github.com/Schindler-EPFL-Lab/SEAR.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18774v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSEAR%253A%2520Simple%2520and%2520Efficient%2520Adaptation%2520of%2520Visual%2520Geometric%2520Transformers%2520for%2520RGB%252BThermal%25203D%2520Reconstruction%26entry.906535625%3DVsevolod%2520Skorokhodov%2520and%2520Chenghao%2520Xu%2520and%2520Shuo%2520Sun%2520and%2520Olga%2520Fink%2520and%2520Malcolm%2520Mielle%26entry.1292438233%3DFoundational%2520feed-forward%2520visual%2520geometry%2520models%2520enable%2520accurate%2520and%2520efficient%2520camera%2520pose%2520estimation%2520and%2520scene%2520reconstruction%2520by%2520learning%2520strong%2520scene%2520priors%2520from%2520massive%2520RGB%2520datasets.%2520However%252C%2520their%2520effectiveness%2520drops%2520when%2520applied%2520to%2520mixed%2520sensing%2520modalities%252C%2520such%2520as%2520 {"title": "Blind to Position, Biased in Language: Probing Mid-Layer Representational Bias in Vision-Language Encoders for Zero-Shot Language-Grounded Spatial Understanding", "author": "Na Min An and Inha Kang and Minhyun Lee and Hyunjung Shim", "abstract": "Vision-Language Encoders (VLEs) are widely adopted as the backbone of zero-shot referring image segmentation (RIS), enabling text-guided localization without task-specific training. However, prior works underexplored the underlying biases within mid-layer representations that preserve positional and language-specific information. Through layer-wise investigation, we reveal that the conventionally used final-layer multimodal embeddings prioritize global semantic alignment, leading to two coupled consequences. First, vision embeddings exhibit weak sensitivity to positional cues. Second, multilingual text embeddings form language-dependent geometric shifts within the shared space. Motivated by these findings, we identify an underexplored pathway within VLE mid-layers to construct a spatial map, applicable for improving zero-shot RIS by 1-7 mIoU on nine RefCOCO benchmarks. Furthermore, leveraging mixed-language mid-layer embeddings yields enhanced spatial grounding accuracy (+7-8 mIoU and IoU@50), albeit with increased inference cost, and also improves performance on the zero-shot text-to-image retrieval task. Our work opens up the discussion about the effects of effective representational bias probing of VLEs for enhanced spatial grounding.", "link": "http://arxiv.org/abs/2509.23098v2", "date": "2026-03-19", "relevancy": 3.0146, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6177}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6177}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Sha erence%20cost%2C%20and%20also%20improves%20performance%20on%20the%20zero-shot%20text-to-image%20retrieval%20task.%20Our%20work%20opens%20up%20the%20discussion%20about%20the%20effects%20of%20effective%20representational%20bias%20probing%20of%20VLEs%20for%20enhanced%20spatial%20grounding.%0ALink%3A%20http%3A//arxiv.org/abs/2509.23098v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBlind%2520to%2520Position%252C%2520Biased%2520in%2520Language%253A%2520Probing%2520Mid-Layer%2520Representational%2520Bias%2520in%2520Vision-Language%2520Encoders%2520for%2520Zero-Shot%2520Language-Grounded%2520Spatial%2520Understanding%26entry.906535625%3DNa%2520Min%2520An%2520and%2520Inha%2520Kang%2520and%2520Minhyun%2520Lee%2520and%2520Hyunjung%2520Shim%26entry.1292438233%3DVision-Language%2520Encoders%2520%2528VLEs%2529%2520are%2520widely%2520adopted%2520as%2520the%2520backbone%2520of%2520zero-shot%2520referring%2520image%2520segmentation%2520%2528RIS%2529%252C%2520enabling%2520text-guided%2520localization%2520without%2520task-specific%2520training.%2520However%252C%2520prior%2520works%2520underexplored%2520the%2520underlying%2520biases%2520within%2520mid-layer%2520representations%2520that%2520preserve%2520positional%2520and%2520language-specific%2520information.%2520Through%2520layer-wise%2520investigation%252C%2520we%2520reveal%2520that%2520the%2520conventionally%2520used%2520final-layer%2520multimodal%2520embeddings%2520prioritize%2520global%2520semantic%2520alignment%252C%2520leading%2520to%2520two%2520coupled%2520consequences.%2520First%252C%2520vision%2520embeddings%2520exhibit%2520weak%2520sensitivity%2520to%2520positional%2520cues.%2520Second%252C%2520multilingual%2520text%2520embeddings%2520form%2520language-dependent%2520geometric%2520shifts%2520within%2520the%2520shared%2520space.%2520Motivated%2520by%2520these%2520findings%252C%2520we%2520identify%2520an%2520underexplored%2520pathway%2520 {"title": "Image2Gcode: Image-to-G-code Generation for Additive Manufacturing Using Diffusion-Transformer Model", "author": "Ziyue Wang and Yayati Jadhav and Peter Pak and Amir Barati Farimani", "abstract": "Mechanical design and manufacturing workflows conventionally begin with conceptual design, followed by the creation of a computer-aided design (CAD) model and fabrication through material-extrusion (MEX) printing. This process requires converting CAD geometry into machine-readable G-code through slicing and path planning. While each step is well established, dependence on CAD modeling remains a major bottleneck: constructing object-specific 3D geometry is slow and poorly suited to rapid prototyping. Even minor design variations typically necessitate manual updates in CAD software, making iteration time-consuming and difficult to scale. To address this limitation, we introduce Image2Gcode, an end-to-end data-driven framework that bypasses the CAD stage and generates printer-ready G-code directly from images and part drawings. Instead of relying on an explicit 3D model, a hand-drawn or captured 2D image serves as the sole input. The framework first extracts slice-wise structural cues from the image and then employs a denoising diffusion probabilistic model (DDPM) over G-code sequences. Through iterative denoising, the model transforms Gaussian noise into executable print-move trajectories with corresponding extrusion parameters, establishing a direct mapping from visual input to native toolpaths. By producing structured G-code directly from 2D imagery, Image2Gcode eliminates the need for CAD or STL intermediates, lowering the entry barrier for additive manufacturing and accelerating the design-to-fabrication cycle. This approach supports on-demand prototyping from simple sketches or visual references and integrates with upstream 2D-to-3D reconstruction modules to enable an automated pipeline from concept to physical artifact. The result is a flexible, computationally efficient framework that advances accessibility in design iteration, repair workflows, and distributed manufacturing.", "link": "http://arxiv.org/abs/2511.20636v3", "date": "2026-03-19", "relevancy": 3.0035, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6057}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6057}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.5906}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Image2Gcode%3A%20Image-to-G-code%20Generation%20for%20Additive%20Manufacturing%20Using%20Diffusion-Transformer%20Model&body=Title%3A%20Image2Gcode%3A%20Image-to-G-code%20Generation%20for%20Additive%20Manufacturing%20Using%20Diffusion-Transformer%20Model%0AAuthor%3A%20Ziyue%20Wang%20and%20Yayati%20Jadhav%20and%20Peter%20Pak%20and%20Amir%20Barati%20Farimani%0AAbstract%3A%20Mechanical%20design%20and%20manufacturing%20workflows%20conventionally%20begin%20with%20conceptual%20design%2C%20followed%20by%20the%20creation%20of%20a%20computer-aided%20design%20%28CAD%29%20model%20and%20fabrication%20through%20material-extrusion%20%28MEX%29%20printing.%20This%20process%20requires%20converting%20CAD%20geometry%20into%20machine-readable%20G-code%20through%20slicing%20and%20path%20planning.%20While%20each%20step%20is%20well%20established%2C%20dependence%20on%20CAD%20modeling%20remains%20a%20major%20bottleneck%3A%20constructing%20object-specific%203D%20geometry%20is%20slow%20and%20poorly%20suited%20to%20rapid%20prototyping.%20Even%20minor%20design%20variations%20typically%20necessitate%20manual%20updates%20in%20CAD%20software%2C%20making%20iteration%20time-consuming%20and%20difficult%20to%20scale.%20To%20address%20this%20limitation%2C%20we%20introduce%20Image2Gcode%2C%20an%20end-to-end%20data-driven%20framework%20that%20bypasses%20the%20CAD%20stage%20and%20generates%20printer-ready%20G-code%20directly%20from%20images%20and%20part%20drawings.%20Instead%20of%20relying%20on%20an%20explicit%203D%20model%2C%20a%20hand-drawn%20or%20captured%202D%20image%20serves%20as%20the%20sole%20input.%20The%20framework%20first%20extracts%20slice-wise%20structural%20cues%20from%20the%20image%20and%20then%20employs%20a%20denoising%20diffusion%20probabilistic%20model%20%28DDPM%29%20over%20G-code%20sequences.%20Through%20iterative%20denoising%2C%20the%20model%20transforms%20Gaussian%20noise%20into%20executable%20print-move%20trajectories%20with%20corresponding%20extrusion%20parameters%2C%20establishing%20a%20direct%20mapping%20from%20visual%20input%20to%20native%20toolpaths.%20By%20producing%20structured%20G-code%20directly%20from%202D%20imagery%2C%20Image2Gcode%20eliminates%20the%20need%20for%20CAD%20or%20STL%20intermediates%2C%20lowering%20the%20entry%20barrier%20for%20additive%20manufacturing%20and%20accelerating%20the%20design-to-fabrication%20cycle.%20This%20approach%20supports%20on-demand%20prototyping%20from%20simple%20sketches%20or%20visual%20references%20and%20integrates%20with%20upstream%202D-to-3D%20reconstruction%20modules%20to%20enable%20an%20automated%20pipeline%20from%20concept%20to%20physical%20artifact.%20The%20result%20is%20a%20flexible%2C%20computationally%20efficient%20framework%20that%20advances%20accessibility%20in%20design%20iteration%2C%20repair%20workflows%2C%20and%20distributed%20manufacturing.%0ALink%3A%20http%3A//arxiv.org/abs/2511.20636v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DImage2Gcode%253A%2520Image-to-G-code%2520Generation%2520for%2520Additive%2520Manufacturing%2520Using%2520Diffusion-Transformer%2520Model%26entry.906535625%3DZiyue%2520Wang%2520and%2520Yayati%2520Jadhav%2520and%2520Peter%2520Pak%2520and%2520Amir%25 {"title": "From ex(p) to poly: Gaussian Splatting with Polynomial Kernels", "author": "Joerg H. Mueller and Martin Winter and Markus Steinberger", "abstract": "Recent advancements in Gaussian Splatting (3DGS) have introduced various modifications to the original kernel, resulting in significant performance improvements. However, many of these kernel changes are incompatible with existing datasets optimized for the original Gaussian kernel, presenting a challenge for widespread adoption. In this work, we address this challenge by proposing an alternative kernel that maintains compatibility with existing datasets while improving computational efficiency. Specifically, we replace the original exponential kernel with a polynomial approximation combined with a ReLU function. This modification allows for more aggressive culling of Gaussians, leading to enhanced performance across different 3DGS implementations. Our results show a notable performance improvement of 4 to 15% with negligible impact on image quality. We also provide a detailed mathematical analysis of the new kernel and discuss its potential benefits for 3DGS implementations on NPU hardware.", "link": "http://arxiv.org/abs/2603.18707v1", "date": "2026-03-19", "relevancy": 3.0023, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6228}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5915}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5871}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20ex%28p%29%20to%20poly%3A%20Gaussian%20Splatting%20with%20Polynomial%20Kernels&body=Title%3A%20From%20ex%28p%29%20to%20poly%3A%20Gaussian%20Splatting%20with%20Polynomial%20Kernels%0AAuthor%3A%20Joerg%20H.%20Mueller%20and%20Martin%20Winter%20and%20Markus%20Steinberger%0AAbstract%3A%20Recent%20advancements%20in%20Gaussian%20Splatting%20%283DGS%29%20have%20introduced%20various%20modifications%20to%20the%20original%20kernel%2C%20resulting%20in%20significant%20performance%20improvements.%20However%2C%20many%20of%20these%20kernel%20changes%20are%20incompatible%20with%20existing%20datasets%20optimized%20for%20the%20original%20Gaussian%20kernel%2C%20presenting%20a%20challenge%20for%20widespread%20adoption.%20In%20this%20work%2C%20we%20address%20this%20challenge%20by%20proposing%20an%20alternative%20kernel%20that%20maintains%20compatibility%20with%20existing%20datasets%20while%20improving%20computational%20efficiency.%20Specifically%2C%20we%20replace%20the%20original%20exponential%20kernel%20with%20a%20polynomial%20approximation%20combined%20with%20a%20ReLU%20function.%20This%20modification%20allows%20for%20more%20aggressive%20culling%20of%20Gaussians%2C%20leading%20to%20enhanced%20performance%20across%20different%203DGS%20implementations.%20Our%20results%20show%20a%20notable%20performance%20improvement%20of%204%20to%2015%25%20with%20negligible%20impact%20on%20image%20quality.%20We%20also%20provide%20a%20detailed%20mathematical%20analysis%20of%20the%20new%20kernel%20and%20discuss%20its%20potential%20benefits%20for%203DGS%20implementations%20on%20NPU%20hardware.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18707v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520ex%2528p%2529%2520to%2520poly%253A%2520Gaussian%2520Splatting%2520with%2520Polynomial%2520Kernels%26entry.906535625%3DJoerg%2520H.%2520Mueller%2520and%2520Martin%2520Winter%2520and%2520Markus%2520Steinberger%26entry.1292438233%3DRecent%2520advancements%2520in%2520Gaussian%2520Splatting%2520%25283DGS%2529%2520have%2520introduced%2520various%2520modifications%2520to%2520the%2520original%2520kernel%252C%2520resulting%2520in%2520significant%2520performance%2520improvements.%2520However%252C%2520many%2520of%2520these%2520kernel%2520changes%2520are%2520incompatible%2520with%2520existing%2520datasets%2520optimized%2520for%2520the%2520original%2520Gaussian%2520kernel%252C%2520presenting%2520a%2520challenge%2520for%2520widespread%2520adoption.%2520In%2520this%2520work%252C%2520we%2520address%2520this%2520challenge%2520by%2520proposing%2520an%2520alternative%2520kernel%2520that%2520maintains%2520compatibility%2520with%2520existing%2520datasets%2520while%2520improving%2520computational%2520efficiency.%2520Specifically%252C%2520we%2520replace%2520the%2520original%2520exponential%2520kernel%2520with%2520a%2520polynomial%2520approximation%2520combined%2520with%2520a%2520ReLU%2520function.%2520This%2520modification%2520allows%2520for%2520more%2520aggressive%2520culling%2520of%2520Gaussians%252C%2520leading%2520to%2520enhanced%2520performance%2520across%2520different%25203DGS%2520implementations.%2520Our%2520results%2520show%2520a%2520notable%2520performance%2520improvement%2520of%25204%2520to%252015%2525%2520with%2520negligible%2520impact%2520on%2520image%2520quality.%2520We%2520also%2520provide%2520a%2520detailed%2520mathematical%2520analysis%2520of%2520the%2520new%2520kernel%2520and%2520discuss%2520its%2520potential%2520benefits%2520for%25203DGS%2520implementations%2520on%2520NPU%2520hardware.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.18707v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=From%20ex%28p%29%20to%20poly%3A%20Gaussian%20Splatting%20with%20Polynomial%20Kernels&entry.906535625=Joerg%20H.%20Mueller%20and%20Martin%20Winter%20and%20Markus%20Steinberger&entry.1292438233=Recent%20advancements%20in%20Gaussian%20Splatting%20%283DGS%29%20have%20introduced%20various%20modifications%20to%20the%20original%20kernel%2C%20resulting%20in%20significant%20performance%20improvements.%20However%2C%20many%20of%20these%20kernel%20changes%20are%20incompatible%20with%20existing%20datasets%20optimized%20for%20the%20original%20Gaussian%20kernel%2C%20presenting%20a%20challenge%20for%20widespread%20adoption.%20In%20this%20work%2C%20we%20address%20this%20challenge%20by%20proposing%20an%20alternative%20kernel%20that%20maintains%20compatibility%20with%20existing%20datasets%20while%20improving%20computational%20efficiency.%20Specifically%2C%20we%20replace%20the%20original%20exponential%20kernel%20with%20a%20polynomial%20approximation%20combined%20with%20a%20ReLU%20function.%20This%20modification%20allows%20for%20more%20aggressive%20culling%20of%20Gaussians%2C%20leading%20to%20enhanced%20performance%20across%20different%203DGS%20implementations.%20Our%20results%20show%20a%20notable%20performance%20improvement%20of%204%20to%2015%25%20with%20negligible%20impact%20on%20image%20quality.%20We%20also%20provide%20a%20detailed%20mathematical%20analysis%20of%20the%20new%20kernel%20and%20discuss%20its%20potential%20benefits%20for%203DGS%20implementations%20on%20NPU%20hardware.&entry.1838667208=http%3A//arxiv.org/abs/2603.18707v1&entry.124074799=Read"},
{"title": "Remove360: Benchmarking Residuals After Object Removal in 3D Gaussian Splatting", "author": "Simona Kocour and Assia Benbihi and Torsten Sattler", "abstract": "An object can disappear from a 3D scene, yet still be detectable. Even after visual removal, modern vision models may infer what was originally present. In this work, we introduce a novel benchmark and evaluation framework to quantify semantic residuals, the unintended cues left behind after object removal in 3D Gaussian Splatting. We conduct experiments across a diverse set of indoor and outdoor scenes, showing that current methods often preserve semantic information despite the absence of visual geometry. Notably, even when removal is followed by inpainting, residual cues frequently remain detectable by foundation models. We also present Remove360, a real-world dataset of pre- and post-removal RGB captures with object-level masks. Unlike prior datasets focused on isolated object instances, Remove360 contains complex, cluttered scenes that enable evaluation of object removal in full-scene settings. By leveraging the ground-truth post-removal images, we directly assess whether semantic presence is eliminated and whether downstream models can still infer what was removed. Our results reveal a consistent gap between geometric removal and semantic erasure, exposing critical limitations in existing 3D editing pipelines and highlighting the need for privacy-aware removal methods that eliminate recoverable cues, not only visible geometry. Dataset and evaluation code are publicly available.", "link": "http://arxiv.org/abs/2508.11431v2", "date": "2026-03-19", "relevancy": 2.9938, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6143}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6066}, {" {"title": "CustomTex: High-fidelity Indoor Scene Texturing via Multi-Reference Customization", "author": "Weilin Chen and Jiahao Rao and Wenhao Wang and Xinyang Li and Xuan Cheng and Liujuan Cao", "abstract": "The creation of high-fidelity, customizable 3D indoor scene textures remains a significant challenge. While text-driven methods offer flexibility, they lack the precision for fine-grained, instance-level control, and often produce textures with insufficient quality, artifacts, and baked-in shading. To overcome these limitations, we introduce CustomTex, a novel framework for instance-level, high-fidelity scene texturing driven by reference images. CustomTex takes an untextured 3D scene and a set of reference images specifying the desired appearance for each object instance, and generates a unified, high-resolution texture map. The core of our method is a dual-distillation approach that separates semantic control from pixel-level enhancement. We employ semantic-level distillation, equipped with an instance cross-attention, to ensure semantic plausibility and ``reference-instance'' alignment, and pixel-level distillation to enforce high visual fidelity. Both are unified within a Variational Score Distillation (VSD) optimization framework. Experiments demonstrate that CustomTex achieves precise instance-level consistency with reference images and produces textures with superior sharpness, reduced artifacts, and minimal baked-in shading compared to state-of-the-art methods. Our work establishes a more direct and user-friendly path to high-quality, customizable 3D scene appearance editing.", "link": "http://arxiv.org/abs/2603.19121v1", "date": "2026-03-19", "relevancy": 2.9444, "topK": [{"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.6023}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5822}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5822}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CustomTex%3A%20High-fidelity%20Indoor%20Scene%20Texturing%20via%20Multi-Reference%20Customization&body=Title%3A%20CustomTex%3A%20High-fidelity%20Indoor%20Scene%20Texturing%20via%20Multi-Reference%20Customization%0AAuthor%3A%20Weilin%20Chen%20and%20Jiahao%20Rao%20and%20Wenhao%20Wang%20and%20Xinyang%20Li%20and%20Xuan%20Cheng%20and%20Liujuan%20Cao%0AAbstract%3A%20The%20creation%20of%20high-fidelity%2C%20customizable%203D%20indoor%20scene%20textures%20remains%20a%20significant%20challenge.%20While%20text-driven%20methods%20offer%20flexibility%2C%20they%20lack%20the%20precision%20for%20fine-grained%2C%20instance-level%20control%2C%20and%20often%20produce%20textures%20with%20insufficient%20quality%2C%20artifacts%2C%20and%20baked-in%20shading.%20To%20overcome%20these%20limitations%2C%20we%20introduce%20CustomTex%2C%20a%20novel%20framework%20for%20instance-level%2C%20high-fidelity%20scene%20texturing%20driven%20by%20reference%20images.%20CustomTex%20takes%20an%20untextured%203D%20scene%20and%20a%20set%20of%20reference%20images%20specifying%20the%20desired%20appearance%20for%20each%20object%20instance%2C%20and%20generates%20a%20unified%2C%20high-resolution%20texture%20map.%20The%20core%20of%20our%20method%20is%20a%20dual-distillation%20approach%20that%20separates%20semantic%20control%20from%20pixel-level%20enhancement.%20We%20employ%20semantic-level%20distillation%2C%20equipped%20with%20an%20instance%20cross-attention%2C%20to%20ensure%20semantic%20plausibility%20and%20%60%60reference-instance%27%27%20alignment%2C%20and%20pixel-level%20distillation%20to%20enforce%20high%20visual%20fidelity.%20Both%20are%20unified%20within%20a%20Variational%20Score%20Distillation%20%28VSD%29%20optimization%20framework.%20Experiments%20demonstrate%20that%20CustomTex%20achieves%20precise%20instance-level%20consistency%20with%20reference%20images%20and%20produces%20textures%20with%20superior%20sharpness%2C%20reduced%20artifacts%2C%20and%20minimal%20baked-in%20shading%20compared%20to%20state-of-the-art%20methods.%20Our%20work%20establishes%20a%20more%20direct%20and%20user-friendly%20path%20to%20high-quality%2C%20customizable%203D%20scene%20appearance%20editing.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19121v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCustomTex%253A%2520High-fidelity%2520Indoor%2520Scene%2520Texturing%2520via%2520Multi-Reference%2520Customization%26entry.906535625%3DWeilin%2520Chen%2520and%2520Jiahao%2520Rao%2520and%2520Wenhao%2520Wang%2520and%2520Xinyang%2520Li%2520and%2520Xuan%2520Cheng%2520and%2520Liujuan%2520Cao%26entry.1292438233%3DThe%2520creation%2520of%2520high-fidelity%252C%2520customizable%25203D%2520indoor%2520scene%2520textures%2520remains%2520a%2520significant%2520challenge.%2520While%2520text-driven%2520methods%2520offer%2520flexibility%252C%2520they%2520lack%2520the%2520precision%2520for%2520fine-grained%252C%2520instance-level%2520control%252C%2520and%2520often%2520produce%2520textures%2520with%2520insufficient%2520quality%252C%2520artifacts%252C%2520and%2520baked-in%2520shading.%2520To%2520overcome%2520these%2520limitations%252C%2520we%2520introduce%2520CustomTex%252C%2520a%2520novel%2520framework%2520for%2520instance-level%252C%2520high-fidelity%2520scene%2520texturing%2520driven%2520by%2520reference%2520images.%2520CustomTex%2520takes%2520an%2520untextured%25203D%2520scene%2520and%2520a%2520set%2520of%2520reference%2520images%2520specifying%2520the%2520desired%2520appearance%2520for%2520each%2520object%2520instance%252C%2520and%2520generates%2520a%2520unified%252C%2520high-resolution%2520texture%2520map.%2520The%2520core%2520of%2520our%2520method%2520is%2520a%2520dual-distill imitations%2C%20we%20introduce%20CustomTex%2C%20a%20novel%20framework%20for%20instance-level%2C%20high-fidelity%20scene%20texturing%20driven%20by%20reference%20images.%20CustomTex%20takes%20an%20untextured%203D%20scene%20and%20a%20set%20of%20reference%20images%20specifying%20the%20desired%20appearance%20for%20each%20object%20instance%2C%20and%20generates%20a%20unified%2C%20high-resolution%20texture%20map.%20The%20core%20of%20our%20method%20is%20a%20dual-distillation%20approach%20that%20separates%20semantic%20control%20from%20pixel-level%20enhancement.%20We%20employ%20semantic-level%20distillation%2C%20equipped%20with%20an%20instance%20cross-attention%2C%20to%20ensure%20semantic%20plausibility%20and%20%60%60reference-instance%27%27%20alignment%2C%20and%20pixel-level%20distillation%20to%20enforce%20high%20visual%20fidelity.%20Both%20are%20unified%20within%20a%20Variational%20Score%20Distillation%20%28VSD%29%20optimization%20framework.%20Experiments%20demonstrate%20that%20CustomTex%20achieves%20precise%20instance-level%20consistency%20with%20reference%20images%20and%20produces%20textures%20with%20superior%20sharpness%2C%20reduced%20artifacts%2C%20and%20minimal%20baked-in%20shading%20compared%20to%20state-of-the-art%20methods.%20Our%20work%20establishes%20a%20more%20direct%20and%20user-friendly%20path%20to%20high-quality%2C%20customizable%203D%20scene%20appearance%20editing.&entry.1838667208=http%3A//arxiv.org/abs/2603.19121v1&entry.124074799=Read"},
{"title": "Unsupervised Contrastive Learning for Efficient and Robust Spectral Shape Matching", "author": "Feifan Luo and Hongyang Chen", "abstract": "Estimating correspondences between pairs of non-rigid deformable 3D shapes remains a significant challenge in computer vision and graphics. While deep functional map methods have become the go-to solution for addressing this problem, they primarily focus on optimizing pointwise and functional maps either individually or jointly, rather than directly enhancing feature representations in the embedding space, which often results in inadequate feature quality and suboptimal matching performance. Furthermore, these approaches heavily rely on traditional functional map techniques, such as time-consuming functional map solvers, which incur substantial computational costs. In this work, we introduce, for the first time, a novel unsupervised contrastive learning-based approach for efficient and robust 3D shape matching. We begin by presenting an unsupervised contrastive learning framework that promotes feature learning by maximizing consistency within positive similarity pairs and minimizing it within negative similarity pairs, thereby improving both the consistency and discriminability of the learned features.We then design a significantly simplified functional map learning architecture that eliminates the need for computationally expensive functional map solvers and multiple auxiliary functional map losses, greatly enhancing computational efficiency. By integrating these two components into a unified two-branch pipeline, our method achieves state-of-the-art performance in both accuracy and efficiency. Extensive experiments demonstrate that our approach is not only computationally efficient but also outperforms current state-of-the-art methods across various challenging benchmarks, including near-isometric, non-isometric, and topologically inconsistent scenarios, even surpassing supervised techniques.", "link": "http://arxiv. 20unsupervised%20contrastive%20learning%20framework%20that%20promotes%20feature%20learning%20by%20maximizing%20consistency%20within%20positive%20similarity%20pairs%20and%20minimizing%20it%20within%20negative%20similarity%20pairs%2C%20thereby%20improving%20both%20the%20consistency%20and%20discriminability%20of%20the%20learned%20features.We%20then%20design%20a%20significantly%20simplified%20functional%20map%20learning%20architecture%20that%20eliminates%20the%20need%20for%20computationally%20expensive%20functional%20map%20solvers%20and%20multiple%20auxiliary%20functional%20map%20losses%2C%20greatly%20enhancing%20computational%20efficiency.%20By%20integrating%20these%20two%20components%20into%20a%20unified%20two-branch%20pipeline%2C%20our%20method%20achieves%20state-of-the-art%20performance%20in%20both%20accuracy%20and%20efficiency.%20Extensive%20experiments%20demonstrate%20that%20our%20approach%20is%20not%20only%20computationally%20efficient%20but%20also%20outperforms%20current%20state-of-the-art%20methods%20across%20various%20challenging%20benchmarks%2C%20including%20near-isometric%2C%20non-isometric%2C%20and%20topologically%20inconsistent%20scenarios%2C%20even%20surpassing%20supervised%20techniques.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18924v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnsupervised%2520Contrastive%2520Learning%2520for%2520Efficient%2520and%2520Robust%2520Spectral%2520Shape%2520Matching%26entry.906535625%3DFeifan%2520Luo%2520and%2520Hongyang%2520Chen%26entry.1292438233%3DEstimating%2520correspondences%2520between%2520pairs%2520of%2520non-rigid%2520deformable%25203D%2520shapes%2520remains%2520a%2520significant%2520challenge%2520in%2520computer%2520vision%2520and%2520graphics.%2520While%2520deep%2520functional%2520map%2520methods%2520have%2520become%2520the%2520go-to%2520solution%2520for%2520addressing%2520this%2520problem%252C%2520they%2520primarily%2520focus {"title": "VTC-Bench: Evaluating Agentic Multimodal Models via Compositional Visual Tool Chaining", "author": "Xuanyu Zhu and Yuhao Dong and Rundong Wang and Yang Shi and Zhipeng Wu and Yinlun Peng and YiFan Zhang and Yihang Lou and Yuanxing Zhang and Ziwei Liu and Yan Bai and Yuan Zhou", "abstract": "Recent advancements extend Multimodal Large Language Models (MLLMs) beyond standard visual question answering to utilizing external tools for advanced visual tasks. Despite this progress, precisely executing and effectively composing diverse tools for complex tasks remain persistent bottleneck. Constrained by sparse tool-sets and simple tool-use trajectories, existing benchmarks fail to capture complex and diverse tool interactions, falling short in evaluating model performance under practical, real-world conditions. To bridge this gap, we introduce VisualToolChain-Bench(VTC-Bench), a comprehensive benchmark designed to evaluate tool-use proficiency in MLLMs. To align with realistic computer vision pipelines, our framework features 32 diverse OpenCV-based visual operations. This rich tool-set enables extensive combinations, allowing VTC-Bench to rigorously assess multi-tool composition and long-horizon, multi-step plan execution. For precise evaluation, we provide 680 curated problems structured across a nine-category cognitive hierarchy, each with ground-truth execution trajectories. Extensive experiments on 19 leading MLLMs reveal critical limitations in current models' visual agentic capabilities. Specifically, models struggle to adapt to diverse tool-sets and generalize to unseen operations, with the leading model Gemini-3.0-Pro only achieving 51% on our benchmark. Furthermore, multi-tool composition remains a persistent challenge. When facing complex tasks, models struggle to formulate efficient execution plans, relying heavily on a narrow, suboptimal subset of familiar functions rather than selecting the optimal tools. By identifying these fundamental challenges, VTC-Bench establishes a rigorous baseline to guide the development of more generalized visual agentic models.", "link": "http://arxiv.org/abs/2603.15030v2", "date": "2026-03-19", "relevancy": 2.8943, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5831}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5831}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5703}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VTC-Bench%3A%20Evaluating%20Agentic%20Multimodal%20Models%20via%20Compositional%20Visual%20Tool%20Chaining&body=Title%3A%20VTC-Bench%3A%20Evaluating%20Agentic%20Multimodal%20Models%20via%20Compositional%20Visual%20Tool%20Chaining%0AAuthor%3A%20Xuanyu%20Zhu%20and%20Yuhao%20Dong%20and%20Rundong%20Wang%20and%20Yang%20Shi%20and%20Zhipeng%20Wu%20and%20Yinlun%20Peng%20and%20YiFan%20Zhang%20and%20Yihang%20Lou%20and%20Yuanxing%20Zhang%20and%20Ziwei%20Liu%20and%20Yan%20Bai%20and%20Yuan%20Zhou%0AAbstract%3A%20Recent%20advancements%20extend%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20beyond%20standard%20visual%20question%20answering%20to%20utilizing%20external%20tools%20for%20advanced%20visual%20tasks.%20Despite%20this%20progress%2C%20precisely%20executing%20and%20effectively%20composing%20diverse%20tools%20for%20complex%20tasks%20remain%20persistent%20bottleneck.%20Constrained%20by%20sparse%20tool-sets%20and%20simple%20tool-use%20trajectories%2C%20existing%20benchmarks%20fail%20to%20capture%20complex%20and%20diverse%20tool%20interactions%2C%20falling%20short%20in%20evaluating%20model%20performance%20under%20practical%2C%20real-world%20conditions.%20To%20bridge%20this%20gap%2C%20we%20introduce%20VisualToolChain-Bench%28VTC-Bench%29%2C%20a%20comprehensive%20benchmark%20designed%20to%20evaluate%20tool-use%20proficiency%20in%20MLLMs.%20To%20align%20with%20realistic%20computer%20vision%20pipelines%2C%20our%20framework%20features%2032%20diverse%20OpenCV-based%20visual%20operations.%20This%20rich%20tool-set%20enables%20extensive%20combinations%2C%20allowing%20VTC-Bench%20to%20rigorously%20assess%20multi-tool%20composition%20and%20long-horizon%2C%20multi-step%20plan%20execution.%20For%20precise%20evaluation%2C%20we%20provide%20680%20curated%20problems%20structured%20across%20a%20nine-category%20cognitive%20hierarchy%2C%20each%20with%20ground-truth%20execution%20trajectories.%20Extensive%20experiments%20on%2019%20leading%20MLLMs%20reveal%20critical%20limitations%20in%20current%20models%27%20visual%20agentic%20capabilities.%20Specifically%2C%20models%20struggle%20to%20adapt%20to%20diverse%20tool-sets%20and%20generalize%20to%20unseen%20operations%2C%20with%20the%20leading%20model%20Gemini-3.0-Pro%20only%20achieving%2051%25%20on%20our%20benchmark.%20Furthermore%2C%20multi-tool%20composition%20remains%20a%20persistent%20challenge.%20When%20facing%20complex%20tasks%2C%20models%20struggle%20to%20formulate%20efficient%20execution%20plans%2C%20relying%20heavily%20on%20a%20narrow%2C%20suboptimal%20subset%20of%20familiar%20functions%20rather%20than%20selecting%20the%20optimal%20tools.%20By%20identifying%20these%20fundamental%20challenges%2C%20VTC-Bench%20establishes%20a%20rigorous%20baseline%20to%20guide%20the%20development%20of%20more%20generalized%20visual%20agentic%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15030v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVTC-Bench%253A%2520Evaluating%2520Agentic%2520Multimodal%2520Models%2520via%2520Compositional%2520Visual%2520Tool%2520Chaining%26entry.906535625%3DXuanyu%2520Zhu%2520and%2520Yuhao%2520Dong%2520and%2520Rundong%2520Wang%2520and%2520Yang%2520Shi%2520and%25 {"title": "MonoArt: Progressive Structural Reasoning for Monocular Articulated 3D Reconstruction", "author": "Haitian Li and Haozhe Xie and Junxiang Xu and Beichen Wen and Fangzhou Hong and Ziwei Liu", "abstract": "Reconstructing articulated 3D objects from a single image requires jointly inferring object geometry, part structure, and motion parameters from limited visual evidence. A key difficulty lies in the entanglement between motion cues and object structure, which makes direct articulation regression unstable. Existing methods address this challenge through multi-view supervision, retrieval-based assembly, or auxiliary video generation, often sacrificing scalability or efficiency. We present MonoArt, a unified framework grounded in progressive structural reasoning. Rather than predicting articulation directly from image features, MonoArt progressively transforms visual observations into canonical geometry, structured part representations, and motion-aware embeddings within a single architecture. This structured reasoning process enables stable and interpretable articulation inference without external motion templates or multi-stage pipelines. Extensive experiments on PartNet-Mobility demonstrate that OM achieves state-of-the-art performance in both reconstruction accuracy and inference speed. The framework further generalizes to robotic manipulation and articulated scene reconstruction.", "link": "http://arxiv.org/abs/2603.19231v1", "date": "2026-03-19", "relevancy": 2.8938, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5925}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5719}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5719}

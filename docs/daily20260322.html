{"title": "TerraScope: Pixel-Grounded Visual Reasoning for Earth Observation", "author": "Yan Shu and Bin Ren and Zhitong Xiong and Xiao Xiang Zhu and Beg\u00fcm Demir and Nicu Sebe and Paolo Rota", "abstract": "Vision-language models (VLMs) have shown promise in earth observation (EO), yet they struggle with tasks that require grounding complex spatial reasoning in precise pixel-level visual representations. To address this problem, we introduce TerraScope, a unified VLM that delivers pixel-grounded geospatial reasoning with two key capabilities: (1) modality-flexible reasoning: it handles single-modality inputs (optical or SAR) and adaptively fuses different modalities into the reasoning process when both are available; (2) multi-temporal reasoning: it integrates temporal sequences for change analysis across multiple time points. In addition, we curate Terra-CoT, a large-scale dataset containing 1 million samples with pixel-level masks embedded in reasoning chains across multiple sources. We also propose TerraScope-Bench, the first benchmark for pixel-grounded geospatial reasoning with six sub-tasks that evaluates both answer accuracy and mask quality to ensure authentic pixel-grounded reasoning. Experiments show that TerraScope significantly outperforms existing VLMs on pixel-grounded geospatial reasoning while providing interpretable visual evidence.", "link": "http://arxiv.org/abs/2603.19039v1", "date": "2026-03-19", "relevancy": 2.3509, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6034}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6034}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5095}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TerraScope%3A%20Pixel-Grounded%20Visual%20Reasoning%20for%20Earth%20Observation&body=Title%3A%20TerraScope%3A%20Pixel-Grounded%20Visual%20Reasoning%20for%20Earth%20Observation%0AAuthor%3A%20Yan%20Shu%20and%20Bin%20Ren%20and%20Zhitong%20Xiong%20and%20Xiao%20Xiang%20Zhu%20and%20Beg%C3%BCm%20Demir%20and%20Nicu%20Sebe%20and%20Paolo%20Rota%0AAbstract%3A%20Vision-language%20models%20%28VLMs%29%20have%20shown%20promise%20in%20earth%20observation%20%28EO%29%2C%20yet%20they%20struggle%20with%20tasks%20that%20require%20grounding%20complex%20spatial%20reasoning%20in%20precise%20pixel-level%20visual%20representations.%20To%20address%20this%20problem%2C%20we%20introduce%20TerraScope%2C%20a%20unified%20VLM%20that%20delivers%20pixel-grounded%20geospatial%20reasoning%20with%20two%20key%20capabilities%3A%20%281%29%20modality-flexible%20reasoning%3A%20it%20handles%20single-modality%20inputs%20%28optical%20or%20SAR%29%20and%20adaptively%20fuses%20different%20modalities%20into%20the%20reasoning%20process%20when%20both%20are%20available%3B%20%282%29%20multi-temporal%20reasoning%3A%20it%20integrates%20temporal%20sequences%20for%20change%20analysis%20across%20multiple%20time%20points.%20In%20addition%2C%20we%20curate%20Terra-CoT%2C%20a%20large-scale%20dataset%20containing%201%20million%20samples%20with%20pixel-level%20masks%20embedded%20in%20reasoning%20chains%20across%20multiple%20sources.%20We%20also%20propose%20TerraScope-Bench%2C%20the%20first%20benchmark%20for%20pixel-grounded%20geospatial%20reasoning%20with%20six%20sub-tasks%20that%20evaluates%20both%20answer%20accuracy%20and%20mask%20quality%20to%20ensure%20authentic%20pixel-grounded%20reasoning.%20Experiments%20show%20that%20TerraScope%20significantly%20outperforms%20existing%20VLMs%20on%20pixel-grounded%20geospatial%20reasoning%20while%20providing%20interpretable%20visual%20evidence.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19039v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAI {"title": "Sparse Autoencoders Reveal Interpretable and Steerable Features in VLA Models", "author": "Aiden Swann and Lachlain McGranahan and Hugo Buurmeijer and Monroe Kennedy and Mac Schwager", "abstract": "Vision-Language-Action (VLA) models have emerged as a promising approach for general-purpose robot manipulation. However, their generalization is inconsistent: while these models can perform impressively in some settings, fine-tuned variants often fail on novel objects, scenes, and instructions. We apply mechanistic interpretability techniques to better understand the inner workings of VLA models. To probe internal representations, we train Sparse Autoencoders (SAEs) on hidden layer activations of the VLA. SAEs learn a sparse dictionary whose features act as a compact, interpretable basis for the model's computation. We find that the large majority of extracted SAE features correspond to memorized sequences from specific training demonstrations. However, some features correspond to interpretable, general, and steerable motion primitives and semantic properties, offering a promising glimpse toward VLA generalizability. We propose a metric to categorize features according to whether they represent generalizable transferable primitives or episode-specific memorization. We validate these findings through steering experiments on the LIBERO benchmark. We show that individual SAE features causally influence robot behavior. Steering general features induces behaviors consistent with their semantic meaning and can be applied across tasks and scenes. This work provides the first mechanistic evidence that VLAs can learn generalizable features across tasks and scenes. We observe that supervised fine-tuning on small robotics datasets disproportionately amplifies memorization. In contrast, training on larger, more diverse datasets (e.g., DROID) or using knowledge insulation promotes more general features. We provide an open-source codebase and user-friendly interface for activation collection, SAE training, and feature steering. Our project page is located at http://drvla.github.io", "link": "http://arxiv.org/abs/2603.19183v1", "date": "2026-03-19", "relevancy": 2.3491, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5919}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5919}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5641}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sparse%20Autoencoders%20Reveal%20Interpretable%20and%20Steerable%20Features%20in%20VLA%20Models&body=Title%3A%20Sparse%20Autoencoders%20Reveal%20Interpretable%20and%20Steerable%20Features%20in%20VLA%20Models%0AAuthor%3A%20Aiden%20Swann%20and%20Lachlain%20McGranahan%20and%20Hugo%20Buurmeijer%20and%20Monroe%20Kennedy%20and%20Mac%20Schwager%0AAbstract%3A%20Vision-Language-Action%20%28VLA%29%20models%20have%20emerged%20as%20a%20promising%20approach%20for%20general-purpose%20robot%20manipulation.%20However%2C%20their%20generalization%20is%20inconsistent%3A%20while%20these%20models%20can%20perform%20impressively%20in%20some%20settings%2C%20fine-tuned%20variants%20often%20fail%20on%20novel%20objects%2C%20scenes%2C%20and%20instructions.%20We%20apply%20mechanistic%20interpretability%20techniques%20to%20better%20understand%20the%20inner%20workings%20of%20VLA%20models.%20To%20probe%20internal%20representations%2C%20we%20train%20Sparse%20Autoencoders%20%28SAEs%29%20on%20hidden%20layer%20activations%20of%20the%20VLA.%20SAEs%20learn%20a%20sparse%20dictionary%20whose%20features%20act%20as%20a%20compact%2C%20interpretable%20basis%20for%20the%20model%27s%20computation.%20We%20find%20that%20the%20large%20majority%20of%20extracted%20SAE%20features%20correspond%20to%20memorized%20sequences%20from%20specific%20training%20demonstrations.%20However%2C%20some%20features%20correspond%20to%20interpretable%2C%20general%2C%20and%20steerable%20motion%20primitives%20and%20semantic%20properties%2C%20offering%20a%20promising%20glimpse%20toward%20VLA%20generalizability.%20We%20propose%20a%20metric%20to%20categorize%20features%20according%20to%20whether%20they%20represent%20generalizable%20transferable%20primitives%20or%20episode-specific%20memorization.%20We%20validate%20these%20findings%20through%20steering%20experiments%20on%20the%20LIBERO%20benchmark.%20We%20show%20that%20individual%20SAE%20features%20causally%20influence%20robot%20behavior.%20Steering%20general%20features%20induces%20behaviors%20consistent%20with%20their%20semantic%20meaning%20and%20can%20be%20applied%20across%20tasks%20and%20scenes.%20This%20work%20provides%20the%20first%20mechanistic%20evidence%20that%20VLAs%20can%20learn%20generalizable%20features%20across%20tasks%20and%20scenes.%20We%20observe%20that%20supervised%20fine-tuning%20on%20small%20robotics%20datasets%20disproportionately%20amplifies%20memorization.%20In%20contrast%2C%20training%20on%20larger%2C%20more%20diverse%20datasets%20%28e.g.%2C%20DROID%29%20or%20using%20knowledge%20insulation%20promotes%20more%20general%20features.%20We%20provide%20an%20open-source%20codebase%20and%20user-friendly%20interface%20for%20activation%20collection%2C%20SAE%20training%2C%20and%20feature%20steering.%20Our%20project%20page%20is%20located%20at%20http%3A//drvla.github.io%0ALink%3A%20http%3A//arxiv.org/abs/2603.19183v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSparse%2520Autoencoders%2520Reveal%2520Interpretable%2520and%2520Steerable%2520Features%2520in%2520VLA%2520Models%26entry.906535625%3DAiden%2520Swann%2520and%2520Lachlain%2520McGranahan%2520and%2520Hugo%2520Buurmeijer%2520and%2520Mon {"title": "Tinted Frames: Question Framing Blinds Vision-Language Models", "author": "Wan-Cyuan Fan and Jiayun Luo and Declan Kutscher and Leonid Sigal and Ritwik Gupta", "abstract": "Vision-Language Models (VLMs) have been shown to be blind, often underutilizing their visual inputs even on tasks that require visual reasoning. In this work, we demonstrate that VLMs are selectively blind. They modulate the amount of attention applied to visual inputs based on linguistic framing even when alternative framings demand identical visual reasoning. Using visual attention as a probe, we quantify how framing alters both the amount and distribution of attention over the image. Constrained framings, such as multiple choice and yes/no, induce substantially lower attention to image context compared to open-ended, reduce focus on task-relevant regions, and shift attention towards uninformative tokens. We further demonstrate that this attention misallocation is the principal cause of degraded accuracy and cross-framing inconsistency. Building on this mechanistic insight, we introduce a lightweight prompt-tuning method using learnable tokens that encourages the robust, visually grounded attention patterns observed in open-ended settings, improving visual grounding and improving performance across framings.", "link": "http://arxiv.org/abs/2603.19203v1", "date": "2026-03-19", "relevancy": 2.3368, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5976}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5976}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5171}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Tinted%20Frames%3A%20Question%20Framing% org/abs/2603.19203v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Tinted%20Frames%3A%20Question%20Framing%20Blinds%20Vision-Language%20Models&entry.906535625=Wan-Cyuan%20Fan%20and%20Jiayun%20Luo%20and%20Declan%20Kutscher%20and%20Leonid%20Sigal%20and%20Ritwik%20Gupta&entry.1292438233=Vision-Language%20Models%20%28VLMs%29%20have%20been%20shown%20to%20be%20blind%2C%20often%20underutilizing%20their%20visual%20inputs%20even%20on%20tasks%20that%20require%20visual%20reasoning.%20In%20this%20work%2C%20we%20demonstrate%20that%20VLMs%20are%20selectively%20blind.%20They%20modulate%20the%20amount%20of%20attention%20applied%20to%20visual%20inputs%20based%20on%20linguistic%20framing%20even%20when%20alternative%20framings%20demand%20identical%20visual%20reasoning.%20Using%20visual%20attention%20as%20a%20probe%2C%20we%20quantify%20how%20framing%20alters%20both%20the%20amount%20and%20distribution%20of%20attention%20over%20the%20image.%20Constrained%20framings%2C%20such%20as%20multiple%20choice%20and%20yes/no%2C%20induce%20substantially%20lower%20attention%20to%20image%20context%20compared%20to%20open-ended%2C%20reduce%20focus%20on%20task-relevant%20regions%2C%20and%20shift%20attention%20towards%20uninformative%20tokens.%20We%20further%20demonstrate%20that%20this%20attention%20misallocation%20is%20the%20principal%20cause%20of%20degraded%20accuracy%20and%20cross-framing%20inconsistency.%20Building%20on%20this%20mechanistic%20insight%2C%20we%20introduce%20a%20lightweight%20prompt-tuning%20method%20using%20learnable%20tokens%20that%20encourages%20the%20robust%2C%20visually%20grounded%20attention%20patterns%20observed%20in%20open-ended%20settings%2C%20improving%20visual%20grounding%20and%20improving%20performance%20across%20framings.&entry.1838667208=http%3A//arxiv.org/abs/2603.19203v1&entry.124074799=Read"},
{"title": "TrajBooster: Boosting Humanoid Whole-Body Manipulation via Trajectory-Centric Learning", "author": "Jiacheng Liu and Pengxiang Ding and Qihang Zhou and Yuxuan Wu and Da Huang and Zimian Peng and Wei Xiao and Weinan Zhang and Lixin Yang and Cewu Lu and Donglin Wang", "abstract": "Recent Vision-Language-Action models show potential to generalize across embodiments but struggle to quickly align with a new robot's action space when high-quality demonstrations are scarce, especially for bipedal humanoids. We present TrajBooster, a cross-embodiment framework that leverages abundant wheeled-humanoid data to boost bipedal VLA. Our key idea is to use end-effector trajectories as a morphology-agnostic interface. TrajBooster (i) extracts 6D dual-arm end-effector trajectories from real-world wheeled humanoids, (ii) retargets them in simulation to Unitree G1 with a whole-body controller trained via a heuristic-enhanced harmonized online DAgger to lift low-dimensional trajectory references into feasible high-dimensional whole-body actions, and (iii) forms heterogeneous triplets that couple source vision/language with target humanoid-compatible actions to post-pre-train a VLA, followed by only 10 minutes of teleoperation data collection on the target humanoid domain. Deployed on Unitree G1, our policy achieves beyond-tabletop household tasks, enabling squatting, cross-height manipulation, and coordinated whole-body motion with markedly improved robustness and generalization. Results show that TrajBooster allows existing wheeled-humanoid data to efficiently strengthen bipedal humanoid VLA performance, reducing reliance on costly same-embodiment data while enhancing action space understanding and zero-shot skill transfer capabilities. For more details, For more details, please refer to our \\href{https://jiachengliu3.github.io/TrajBooster/}.", "link": "http://arxiv.org/abs/2509.11839v3", "date": "2026-03-19", "relevancy": 2.3311, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5891}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5834}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5762}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TrajBooster%3A%20Boosting%20Humanoid%20Whole-Body%20Manipulation%20via%20Trajectory-Centric%20Learning&body=Title%3A%20TrajBooster%3A%20Boosting%20Humanoid%20Whole-Body%20Manipulation%20via%20Trajectory-Centric%20Learning%0AAuthor%3A%20Jiacheng%20Liu%20and%20Pengxiang%20Ding%20and%20Qihang%20Zhou%20and%20Yuxuan%20Wu%20and%20Da%20Huang%20and%20Zimian%20Peng%20and%20Wei%20Xiao%20and%20Weinan%20Zhang%20and%20Lixin%20Yang%20and%20Cewu%20Lu%20and%20Donglin%20Wang%0AAbstract%3A%20Recent%20Vision-Language-Action%20models%20show%20potential%20to%20generalize%20across%20embodiments%20but%20struggle%20to%20quickly%20align%20with%20a%20new%20robot%27s%20action%20space%20when%20high-quality%20demonstrations%20are%20scarce%2C%20especially%20for%20bipedal%20humanoids.%20We%20present%20TrajBooster%2C%20a%20cross-embodiment%20framework%20that%20leverages%20abundant%20wheeled-humanoid%20data%20to%20boost%20bipedal%20VLA.%20Our%20key%20idea%20is%20to%20use%20end-effector%20trajectories%20as%20a%20morphology-agnostic%20interface.%20TrajBooster%20%28i%29%20extracts%206D%20dual-arm%20end-effector%20trajectories%20from%20real-world%20wheeled%20humanoids%2C%20%28ii%29%20retargets%20them%20in%20simulation%20to%20Unitree%20G1%20with%20a%20whole-body%20controller%20trained%20via%20a%20heuristic-enhanced%20harmonized%20online%20DAgger%20to%20lift%20low-dimensional%20trajectory%20references%20into%20feasible%20high-dimensional%20whole-body%20actions%2C%20and%20%28iii%29%20forms%20heterogeneous%20triplets%20that%20couple%20source%20vision/language%20with%20target%20humanoid-compatible%20actions%20to%20post-pre-train%20a%20VLA%2C%20followed%20by%20only%2010%20minutes%20of%20teleoperation%20data%20collection%20on%20the%20target%20humanoid%20domain.%20Deployed%20on%20Unitree%20G1%2C%20our%20policy%20achieves%20beyond-tabletop%20household%20tasks%2C%20enabling%20squatting%2C%20cross-height%20manipulation%2C%20and%20coordinated%20whole-body%20motion%20with%20markedly%20improved%20robustness%20and%20generalization.%20Results%20show%20that%20TrajBooster%20allows%20existing%20wheeled-humanoid%20data%20to%20efficiently%20strengthen%20bipedal%20humanoid%20VLA%20performance%2C%20reducing%20reliance%20on%20costly%20same-embodiment%20data%20while%20enhancing%20action%20space%20understanding%20and%20zero-shot%20skill%20transfer%20capabilities.%20For%20more%20details%2C%20For%20more%20details%2C%20please%20refer%20to%20our%20%5Chref%7Bhttps%3A//jiachengliu3.github.io/TrajBooster/%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2509.11839v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTrajBooster%253A%2520Boosting%2520Humanoid%2520Whole-Body%2520Manipulation%2520via%2520Trajectory-Centric%2520Learning%26entry.906535625%3DJiacheng%2520Liu%2520and%2520Pengxiang%2520Ding%2520and%2520Qihang%2520Zhou%2520and%2520Yuxuan%2520Wu%2520and%2520Da%2520Huang%2520and%2520Zimian%2520Peng%2520and%2520Wei%2520Xiao%2520and%2520Weinan%2520Zhang%2520and%2520Lixin%2520Yang%2520and%2520Cewu%2520Lu%2520and%2520Donglin%2520Wang%26entry.1292438233%3DRecent%2520Vision-Language-Action%2520models%2520show%2520potential%2520to%2520generalize%2520across%2520embodiments%2520but%2520struggle%2520to%2520quickly%2520align%2520with%2520a%2520new%2520robot%2527s%2520action%2520space%2520when%2520high-quality%2520demonstrations%2520are%2520scarce%252C%2520especially%2520for%2520bipedal%2520humanoids.%2520We%2520present%2520TrajBooster%252C%2520a%2520cro engliu3.github.io/TrajBooster/%257D.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.11839v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=TrajBooster%3A%20Boosting%20Humanoid%20Whole-Body%20Manipulation%20via%20Trajectory-Centric%20Learning&entry.906535625=Jiacheng%20Liu%20and%20Pengxiang%20Ding%20and%20Qihang%20Zhou%20and%20Yuxuan%20Wu%20and%20Da%20Huang%20and%20Zimian%20Peng%20and%20Wei%20Xiao%20and%20Weinan%20Zhang%20and%20Lixin%20Yang%20and%20Cewu%20Lu%20and%20Donglin%20Wang&entry.1292438233=Recent%20Vision-Language-Action%20models%20show%20potential%20to%20generalize%20across%20embodiments%20but%20struggle%20to%20quickly%20align%20with%20a%20new%20robot%27s%20action%20space%20when%20high-quality%20demonstrations%20are%20scarce%2C%20especially%20for%20bipedal%20humanoids.%20We%20present%20TrajBooster%2C%20a%20cross-embodiment%20framework%20that%20leverages%20abundant%20wheeled-humanoid%20data%20to%20boost%20bipedal%20VLA.%20Our%20key%20idea%20is%20to%20use%20end-effector%20trajectories%20as%20a%20morphology-agnostic%20interface.%20TrajBooster%20%28i%29%20extracts%206D%20dual-arm%20end-effector%20trajectories%20from%20real-world%20wheeled%20humanoids%2C%20%28ii%29%20retargets%20them%20in%20simulation%20to%20Unitree%20G1%20with%20a%20whole-body%20controller%20trained%20via%20a%20heuristic-enhanced%20harmonized%20online%20DAgger%20to%20lift%20low-dimensional%20trajectory%20references%20into%20feasible%20high-dimensional%20whole-body%20actions%2C%20and%20%28iii%29%20forms%20heterogeneous%20triplets%20that%20couple%20source%20vision/language%20with%20target%20humanoid-compatible%20actions%20to%20post-pre-train%20a%20VLA%2C%20followed%20by%20only%2010%20minutes%20of%20teleoperation%20data%20collection%20on%20the%20target%20humanoid%20domain.%20Deployed%20on%20Unitree%20G1%2C%20our%20policy%20achieves%20beyond-tabletop%20household%20tasks%2C%20enabling%20squat {"title": "ROFT-VINS: Robust Feature Tracking-based Visual-Inertial State Estimation for Harsh Environment", "author": "Sanghyun Park and Soohee Han", "abstract": "SLAM (Simultaneous Localization and Mapping) and Odometry are important systems for estimating the position of mobile devices, such as robots and cars, utilizing one or more sensors. Particularly in camera-based SLAM or Odometry, effectively tracking visual features is important as it significantly impacts system performance. In this paper, we propose a method that leverages deep learning to robustly track visual features in monocular camera images. This method operates reliably even in textureless environments and situations with rapid lighting changes. Additionally, we evaluate the performance of our proposed method by integrating it into VINS-Fusion (Monocular-Inertial), a commonly used Visual-Inertial Odometry (VIO) system.", "link": "http://arxiv.org/abs/2603.18746v1", "date": "2026-03-19", "relevancy": 2.3208, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5909}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5793}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5768}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ROFT-VINS%3A%20Robust%20Feature%20Tracking-based%20Visual-Inertial%20State%20Estimation%20for%20Harsh%20Environment&body=Title%3A%20ROFT-VINS%3A%20Robust%20Feature%20Tracking-based%20Visual-Inertial%20State%20Estimation%20for%20Harsh%20Environment%0AAuthor%3A%20Sanghyun%20Park%20and%20Soohee%20Han%0AAbstract%3A%20SLAM%20%28Simultaneous%20Localization%20and%20Mapping%29%20and%20Odometry%20are%20important%20systems%20f {"title": "Page image classification for content-specific data processing", "author": "Kateryna Lutsai and Pavel Stra\u0148\u00e1k", "abstract": "Digitization projects in humanities often generate vast quantities of page images from historical documents, presenting significant challenges for manual sorting and analysis. These archives contain diverse content, including various text types (handwritten, typed, printed), graphical elements (drawings, maps, photos), and layouts (plain text, tables, forms). Efficiently processing this heterogeneous data requires automated methods to categorize pages based on their content, enabling tailored downstream analysis pipelines. This project addresses this need by developing and evaluating an image classification system specifically designed for historical document pages, leveraging advancements in artificial intelligence and machine learning. The set of categories was chosen to facilitate content-specific processing workflows, separating pages requiring different analysis techniques (e.g., OCR for text, image analysis for graphics)", "link": "http://arxiv.org/abs/2507.21114v2", "date": "2026-03-19", "relevancy": 2.3207, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4788}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4598}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4538}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Page%20image%20classification%20for%20content-specific%20data%20processing&body=Title%3A%20Page%20image%20classification%20for%20content-specific%20data%20processing%0AAuthor%3A%20Kateryna%20Lutsai%20and%20Pavel%20Stra%C5%88%C3%A1k%0AAbstract%3A%20Digitization%20projects%20in%20humanities% hical%2520elements%2520%2528drawings%252C%2520maps%252C%2520photos%2529%252C%2520and%2520layouts%2520%2528plain%2520text%252C%2520tables%252C%2520forms%2529.%2520Efficiently%2520processing%2520this%2520heterogeneous%2520data%2520requires%2520automated%2520methods%2520to%2520categorize%2520pages%2520based%2520on%2520their%2520content%252C%2520enabling%2520tailored%2520downstream%2520analysis%2520pipelines.%2520This%2520project%2520addresses%2520this%2520need%2520by%2520developing%2520and%2520evaluating%2520an%2520image%2520classification%2520system%2520specifically%2520designed%2520for%2520historical%2520document%2520pages%252C%2520leveraging%2520advancements%2520in%2520artificial%2520intelligence%2520and%2520machine%2520learning.%2520The%2520set%2520of%2520categories%2520was%2520chosen%2520to%2520facilitate%2520content-specific%2520processing%2520workflows%252C%2520separating%2520pages%2520requiring%2520different%2520analysis%2520techniques%2520%2528e.g.%252C%2520OCR%2520for%2520text%252C%2520image%2520analysis%2520for%2520graphics%2529%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2507.21114v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Page%20image%20classification%20for%20content-specific%20data%20processing&entry.906535625=Kateryna%20Lutsai%20and%20Pavel%20Stra%C5%88%C3%A1k&entry.1292438233=Digitization%20projects%20in%20humanities%20often%20generate%20vast%20quantities%20of%20page%20images%20from%20historical%20documents%2C%20presenting%20significant%20challenges%20for%20manual%20sorting%20and%20analysis.%20These%20archives%20contain%20diverse%20content%2C%20including%20various%20text%20types%20%28handwritten%2C%20typed%2C%20printed%29%2C%20graphical%20elements%20%28drawings%2C%20maps%2C%20photos%29%2C%20and%20layouts%20%28plain%20text%2C%20tables%2C%20forms%29.%20Efficiently%20processing%20this%20heterogeneous%20data%20requires%20automated%20methods%20t {"title": "Multi-Scale Distillation for RGB-D Anomaly Detection on the PD-REAL Dataset", "author": "Jianjian Qin and Chao Zhang and Chunzhi Gu and Zi Wang and Jun Yu and Yijin Wei and Hui Xiao and Xin Yu", "abstract": "We present PD-REAL, a novel large-scale dataset for unsupervised anomaly detection (AD) in the 3D domain. It is motivated by the fact that 2D-only representations in the AD task may fail to capture the geometric structures of anomalies due to uncertainty in lighting conditions or shooting angles. PD-REAL consists entirely of Play-Doh models for 15 object categories and focuses on the analysis of potential benefits from 3D information in a controlled environment. Specifically, objects are first created with six types of anomalies, such as \\textit{dent}, \\textit{crack}, or \\textit{perforation}, and then photographed under different lighting conditions to mimic real-world inspection scenarios. To demonstrate the usefulness of 3D information, we use a commercially available RealSense camera to capture RGB and depth images. Compared to the existing 3D dataset for AD tasks, the data acquisition of PD-REAL is significantly cheaper, easily scalable, and easier to control variables. Furthermore, we introduce a multi-scale teacher--student framework with hierarchical distillation for multimodal anomaly detection. This architecture overcomes the inherent limitation of single-scale distillation approaches, which often struggle to reconcile global context with local features. Leveraging multi-level guidance from the teacher network, the student network can effectively capture richer features for anomaly detection. Extensive evaluations with our method and state-of-the-art AD algorithms on our dataset qualitatively and quantitatively demonstrate the higher detection accuracy of our method. Our dataset can be downloaded from https://github.com/Andy-cs008/PD-REAL", "link": "http://arxiv.org/abs/2311.04095v3", "date": "2026-03-19", "relevancy": 2.3191, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5941}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5854}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5684}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multi-Scale%20Distillation%20for%20RGB-D%20Anomaly%20Detection%20on%20the%20PD-REAL%20Dataset&body=Title%3A%20Multi-Scale%20Distillation%20for%20RGB-D%20Anomaly%20Detection%20on%20the%20PD-REAL%20Dataset%0AAuthor%3A%20Jianjian%20Qin%20and%20Chao%20Zhang%20and%20Chunzhi%20Gu%20and%20Zi%20Wang%20and%20Jun%20Yu%20and%20Yijin%20Wei%20and%20Hui%20Xiao%20and%20Xin%20Yu%0AAbstract%3A%20We%20present%20PD-REAL%2C%20a%20novel%20large-scale%20dataset%20for%20unsupervised%20anomaly%20detection%20%28AD%29%20in%20the%203D%20domain.%20It%20is%20motivated%20by%20the%20fact%20that%202D-only%20representations%20in%20the%20AD%20task%20may%20fail%20to%20capture%20the%20geometric%20structures%20of%20anomalies%20due%20to%20uncertainty%20in%20lighting%20conditions%20or%20shooting%20angles.%20PD-REAL%20consists%20entirely%20of%20Play-Doh%20models%20for%2015%20object%20categories%20and%20focuses%20on%20the%20analysis%20of%20potential%20benefits%20from%203D%20information%20in%20a%20controlled%20environment.%20Specifically%2C%20objects%20are%20first%20created%20with%20six%20types%20of%20anomalies%2C%20such%20as%20%5Ctextit%7Bdent%7D%2C%20%5Ctextit%7Bcrack%7D%2C%20or%20%5Ctextit%7Bperforation%7D%2C%20and%20then%20photographed%20under%20different%20lighting%20conditions%20to%20mimic%20real-world%20inspection%20scenarios.%20To%20demonstrate%20the%20usefulness%20of%203D%20information%2C%20we%20use%20a%20commercially%20available%20RealSense%20camera%20to%20capture%20RGB%20and%20depth%20images.%20Compared%20to%20the%20existing%203D%20dataset%20for%20AD%20tasks%2C%20the%20data%20acquisition%20of%20PD-REAL%20is%20significantly%20cheaper%2C%20easily%20scalable%2C%20and%20easier%20to%20control%20variables.%20Furthermore%2C%20we%20introduce%20a%20multi-scale%20teacher--student%20framework%20with%20hierarchical%20distillation%20for%20multimodal%20anomaly%20detection.%20This%20architecture%20overcomes%20the%20inherent%20limitation%20of%20single-scale%20distillation%20approaches%2C%20which%20often%20struggle%20to%20reconcile%20global%20context%20with%20local%20features.%20Leveraging%20multi-level%20guidance%20from%20the%20teacher%20network%2C%20the%20student%20network%20can%20effectively%20capture%20richer%20features%20for%20anomaly%20detection.%20Extensive%20evaluations%20with%20our%20method%20and%20state-of-the-art%20AD%20algorithms%20on%20our%20dataset%20qualitatively%20and%20quantitatively%20demonstrate%20the%20higher%20detection%20accuracy%20of%20our%20method.%20Our%20dataset%20can%20be%20downloaded%20from%20https%3A//github.com/Andy-cs008/PD-REAL%0ALink%3A%20http%3A//arxiv.org/abs/2311.04095v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMulti-Scale%2520Distillation%2520for%2520RGB-D%2520Anomaly%2520Detection%2520on%2520the%2520PD-REAL%2520Dataset%26entry.906535625%3DJianjian%2520Qin%2520and%2520Chao%2520Zhang%2520and%2520Chunzhi%2520Gu%2520and%2520Zi%2520Wang%2520and%2520Jun%2520Yu%2520and%2520Yijin%2520Wei%2520and%2520Hui%2520Xiao%2520and%2520Xin%2520Yu%26entry.1292438233%3DWe%2520present%2520PD-REAL%252C%2520a%2520novel%2520large-scale%2520dataset%2520for%2520unsupervised%2520anomaly%2520detection%2520%2528AD%2529%2520in%2520the%25203D%2520domain.%2520It%2520is%2520motivated%2520by%2520the%2520fact%2520that%25202D-only%2520representations%2520in%2520the%2520AD%2520task%2520may%2520fail%2520to%2520capture%2520the%2520geometric%2520structures%2520of%2520anomalies%2520due%2520to%2520uncertainty%2520in%2520lighting%2520conditions%2520or%2520shooting%2520angles.%2520PD-REAL%2520consists%2520entirely%2520of%2520Play-Doh%2520models%2520for%252015%2520object%2520categories%2520and%2520focuses%2520on%2520the%2520analysis%2520of%2520potential%2520benefits%2520from%25203D%2520information%2520in%2520a%2520controlled%2520environment.%2520Specifically%252C%2520objects%2520are%2520first%2520created%2520with%2520six%2520types%2520of%2520anomalies%252C%2520such%2520as%2520%255Ctextit%257Bdent%257D%252C%2520%255Ctextit%257Bcrack%257D%252C%2520or%2520%255Ctextit%257Bperforation%257D%252C%2520and%2520then%2520photographed%2520under%2520different%2520lighting%2520conditions%2520to%2520mimic%2520real-world%2520inspection%2520scenarios.%2520To%2520demonstrate%2520the%2520usefulness%2520of%25203D%2520information%252C%2520we%2520use%2520a%2520commercially%2520available%2520RealSense%2520camera%2520to%2520capture%2520RGB%2520and%2520depth%2520images.%2520Compared%2520to%2520the%2520existing%25203D%2520dataset%2520for%2520AD%2520tasks%252C%2520the%2520data%2520acquisition%2520of%2520PD-REAL%2520is%2520significantly%2520cheaper%252C%2520easily%2520scalable%252C%2520and%2520easier%2520to%2520control%2520variables.%2520Furthermore%252C%2520we%2520introduce%2520a%2520multi-scale%2520teacher--student%2520framework%2520with%2520hierarchical%2520distillation%2520for%2520multimodal%2520anomaly%2520detection.%2520This%2520architecture%2520overcomes%2520the%2520inherent%2520limitation%2520of%2520single-scale%2520distillation%2520approaches%252C%2520which%2520often%2520struggle%2520to%2520reconcile%2520global%2520context%2520with%2520local%2520features.%2520Leveraging%2520multi-level%2520guidance%2520from%2520the%2520teacher%2520network%252C%2520the%2520student%2520network%2520can%2520effectively%2520capture%2520richer%2520features%2520for%2520anomaly%2520detection.%2520Extensive%2520evaluations%2520with%2520our%2520method%2520and%2520state-of-the-art%2520AD%2520algorithms%2520on%2520our%2520dataset%2520qualitatively%2520and%2520quantitatively%2520demonstrate%2520the%2520higher%2520detection%2520accuracy%2520of%2520our%2520method.%2520Our%2520dataset%2520can%2520be%2520downloaded%2520from%2520https%253A//github.com/Andy-cs008/PD-REAL%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2311.04095v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Multi-Scale%20Distillation%20for%20RGB-D%20Anomaly%20Detection%20on%20the%20PD-REAL%20Dataset&entry.906535625=Jianjian%20Qin%20and%20Chao%20Zhang%20and%20Chunzhi%20Gu%20and%20Zi%20Wang%20and%20Jun%20Yu%20and%20Yijin%20Wei%20and%20Hui%20Xiao%20and%20Xin%20Yu&entry.1292438233=We%20present%20PD-REAL%2C%20a%20novel%20large-scale%20dataset%20for%20unsupervised%20anomaly%20detection%20%28AD%29%20in%20the%203D%20domain.%20It%20is%20motivated%20by%20the%20fact%20that%202D-only%20representations%20in%20the%20AD%20task%20may%20fail%20to%20capture%20the%20geometric%20structures%20of%20anomalies%20due%20to%20uncertainty%20in%20lighting%20conditions%20or%20shooting%20angles.%20PD-REAL%20consists%20entirely%20of%20Play-Doh%20models%20for%2015%20object%20categories%20and%20focuses%20on%20the%20analysis%20of%20potential%20benefits%20from%203D%20information%20in%20a%20controlled%20environment.%20Specifically%2C%20objects%20are%20first%20created%20with%20six%20types%20of%20anomalies%2C%20such%20as%20%5Ctextit%7Bdent%7D%2C%20%5Ctextit%7Bcrack%7D%2C%20or%20%5Ctextit%7Bperforation%7D%2C%20and%20then%20photographed%20under%20different%20lighting%20conditions%20to%20mimic%20real-world%20inspection%20scenarios.%20To%20demonstrate%20the%20usefulness%20of%203D%20information%2C%20we%20use%20a%20commercially%20available%20RealSense%20camera%20to%20capture%20RGB%20and%20depth%20images.%20Compared%20to%20the%20existing%203D%20dataset%20for%20AD%20tasks%2C%20the%20data%20acquisition%20of%20PD-REAL%20is%20significantly%20cheaper%2C%20easily%20scalable%2C%20and%20easier%20to%20control%20variables.%20Furthermore%2C%20we%20introduce%20a%20multi-scale%20teacher--student%20framework%20with%20hierarchical%20distillation%20for%20multimodal%20anomaly%20detection.%20This%20architecture%20overcomes%20the%20inherent%20limitation%20of%20single-scale%20distillation%20approaches%2C%20which%20often%20struggle%20to%20reconcile%20global%20context%20with%20local%20features.%20Leveraging%20multi-level%20guidance%20from%20the%20teacher%20network%2C%20the%20student%20network%20can%20effectively%20capture%20richer%20features%20for%20anomaly%20detection.%20Extensive%20evaluations%20with%20our%20method%20and%20state-of-the-art%20AD%20algorithms%20on%20our%20dataset%20qualitatively%20and%20quantitatively%20demonstrate%20the%20higher%20detection%20accuracy%20of%20our%20method.%20Our%20dataset%20can%20be%20downloaded%20from%20https%3A//github.com/Andy-cs008/PD-REAL&entry.1838667208=http%3A//arxiv.org/abs/2311.04095v3&entry.124074799=Read"},
{"title": "RPiAE: A Representation-Pivoted Autoencoder Enhancing Both Image Generation and Editing", "author": "Yue Gong and Hongyu Li and Shanyuan Liu and Bo Cheng and Yuhang Ma and Liebucha Wu and Xiaoyu Wu and Manyuan Zhang and Dawei Leng and Yuhui Yin and Lijun Zhang", "abstract": "Diffusion models have become the dominant paradigm for image generation and editing, with latent diffusion models shifting denoising to a compact latent space for efficiency and scalability. Recent attempts to leverage pretrained visual representation models as tokenizer priors either align diffusion features to representation features or directly reuse representation encoders as frozen tokenizers. Although such approaches can improve generation metrics, they often suffer from limited reconstruction fidelity due to frozen encoders, which in turn degrades editing quality, as well as overly high-dimensional latents that make diffusion modeling difficult. To address these limitations, We propose Representation-Pivoted AutoEncoder, a representation-based tokenizer that improves both generation and editing. We introduce Representation-Pivot Regularization, a training strategy that enables a representation-initialized encoder to be fine-tuned for reconstruction while preserving the semantic structure of the pretrained representation space, followed by a variational bridge which compress latent space into a compact one for better diffusion modeling. We adopt an objective-decoupled stage-wise training strategy that sequentially optimizes generative tractability and reconstruction-fidelity objectives. Together, these components yield a tokenizer that preserves strong semantics, reconstructs faithfully, and produces latents with reduced diffusion modeling complexity. Experiments demonstrate that RPiAE outperforms other visual tokenizers on text-to-image generation and image editing, while delivering the best reconstruction fidelity among representation-based tokenizers.", "link": "http://arxiv.org/abs/2603.19206v1", "date": "2026-03-19", "relevancy": 2.3175, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5851}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5805}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5621}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RPiAE%3A%20A%20Representation-Pivoted%20Autoencoder%20Enhancing%20Both%20Image%20Generation%20and%20Editing&body=Title%3A%20RPiAE%3A%20A%20Representation-Pivoted%20Autoencoder%20Enhancing%20Both%20Image%20Generation%20and%20Editing%0AAuthor%3A%20Yue%20Gong%20and%20Hongyu%20Li%20and%20Shanyuan%20Liu%20and%20Bo%20Cheng%20and%20Yuhang%20Ma%20and%20Liebucha%20Wu%20and%20Xiaoyu%20Wu%20and%20Manyuan%20Zhang%20and%20Dawei%20Leng%20and%20Yuhui%20Yin%20and%20Lijun%20Zhang%0AAbstract%3A%20Diffusion%20models%20have%20become%20the%20dominant%20paradigm%20for%20image%20generation%20and%20editing%2C%20with%20latent%20diffusion%20models%20shifting%20denoising%20to%20a%20compact%20latent%20space%20for%20efficiency%20and%20scalability.%20Recent%20attempts%20to%20leverage%20pretrained%20visual%20representation%20models%20as%20tokenizer%20priors%20either%20align%20diffusion%20features%20to%20representation%20features%20or%20directly%20reuse%20representation%20encoders%20as%20frozen%20tokenizers.%20Although%20such%20approaches%20can%20improve%20generation%20metrics%2C%20they%20often%20suffer%20from%20limited%20reconstruction%20fidelity%20due%20to%20frozen%20encoders%2C%20which%20in%20turn%20degrades%20editing%20quality%2C%20as%20well%20as%20overly%20high-dimensional%20latents%20that%20make%20diffusion%20modeling%20difficult.%20To%20address%20these%20limitations%2C%20We%20propose%20Representation-Pivoted%20AutoEncoder%2C%20a%20representation-based%20tokenizer%20that%20improves%20both%20generation%20and%20editing.%20We%20introduce%20Representation-Pivot%20Regularization%2C%20a%20training%20strategy%20that%20enables%20a%20representation-initialized%20encoder%20to%20be%20fine-tuned%20for%20reconstruction%20while%20preserving%20the%20semantic%20structure%20of%20the%20pretrained%20representation%20space%2C%20followed%20by%20a%20variational%20bridge%20which%20compress%20latent%20space%20into%20a%20compact%20one%20for%20better%20diffusion%20modeling.%20We%20adopt%20an%20objective-decoupled%20stage-wise%20training%20strategy%20that%20sequentially%20optimizes%20generative%20tractability%20and%20reconstruction-fidelity%20objectives.%20Together%2C%20these%20components%20yield%20a%20tokenizer%20that%20preserves%20strong%20semantics%2C%20reconstructs%20faithfully%2C%20and%20produces%20latents%20with%20reduced%20diffusion%20modeling%20complexity.%20Experiments%20demonstrate%20that%20RPiAE%20outperforms%20other%20visual%20tokenizers%20on%20text-to-image%20generation%20and%20image%20editing%2C%20while%20delivering%20the%20best%20reconstruction%20fidelity%20among%20representation-based%20tokenizers.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19206v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRPiAE%253A%2520A%2520Representation-Pivoted%2520Autoencoder%2520Enhancing%2520Both%2520Image%2520Generation%2520and%2520Editing%26entry.906535625%3DYue%2520Gong%2520and%2520Hongyu%2520Li%2520and%2520Shanyuan%2520Liu%2520and%2520Bo%2520Cheng%2520and%2520Yuhang%2520Ma%2520and%2520Liebucha%2520Wu%2520and%2520Xiaoyu%2520Wu%2520and%2520Manyuan%2520Zhang%2520and%2520Dawei%2520Leng%2520and%2520Yuhui%2520Yin%2520and%2520Lijun%2520Zhang%26entry.1292438233%3DDiffusion%2520models%2520have%2520become%2520the%2520dominant%2520paradigm%2520for%2520image%2520generation%2520and%2520editing%252C%2520 {"title": "Rethinking Uncertainty Quantification and Entanglement in Image Segmentation", "author": "Jakob L\u00f8nborg Christensen and Vedrana Andersen Dahl and Morten Rieger Hannemose and Anders Bjorholm Dahl and Christian F. Baumgartner", "abstract": "Uncertainty quantification (UQ) is crucial in safety-critical applications such as medical image segmentation. Total uncertainty is typically decomposed into data-related aleatoric uncertainty (AU) and model-related epistemic uncertainty (EU). Many methods exist for modeling AU (such as Probabilistic UNet, Diffusion) and EU (such as ensembles, MC Dropout), but it is unclear how they interact when combined. Additionally, recent work has revealed substantial entanglement between AU and EU, undermining the interpretability and practical usefulness of the decomposition. We present a comprehensive empirical study covering a broad range of AU-EU model combinations, propose a metric to quantify uncertainty entanglement, and evaluate both across downstream UQ tasks. For out-of-distribution detection, ensembles exhibit consistently lower entanglement and superior performance. For ambiguity modeling and calibration the best models are dataset-dependent, with softmax/SSN-based methods performing well and Probabilistic UNets being less entangled. A softmax ensemble fares remarkably well on all tasks. Finally, we analyze potential sources of uncertainty entanglement and outline directions for mitigating this effect.", "link": "http://arxiv.org/abs/2603.18792v1", "date": "2026-03-19", "relevancy": 2.3048, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.6201}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5849}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5499}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Rethinking%20Uncertainty%20Quantification%20and%20Entanglement%20in%20Image%20Segmentation&body=Title%3A%20Rethinking%20Uncertainty%20Quantification%20and%20Entanglement%20in%20Image%20Segmentation%0AAuthor%3A%20Jakob%20L%C3%B8nborg%20Christensen%20and%20Vedrana%20Andersen%20Dahl%20and%20Morten%20Rieger%20Hannemose%20and%20Anders%20Bjorholm%20Dahl%20and%20Christian%20F.%20Baumgartner%0AAbstract%3A%20Uncertainty%20quantification%20%28UQ%29%20is%20crucial%20in%20safety-critical%20applications%20such%20as%20medical%20image%20segmentation.%20Total%20uncertainty%20is%20typically%20decomposed%20into%20data-related%20aleatoric%20uncertainty%20%28AU%29%20and%20model-related%20epistemic%20uncertainty%20%28EU%29.%20Many%20methods%20exist%20for%20modeling%20AU%20%28such%20as%20Probabilistic%20UNet%2C%20Diffusion%29%20and%20EU%20%28such%20as%20ensembles%2C%20MC%20Dropout%29%2C%20but%20it%20is%20unclear%20how%20they%20interact%20when%20combined.%20Additionally%2C%20recent%20work%20has%20revealed%20substantial%20entanglement%20between%20AU%20and%20EU%2C%20undermining%20the%20interpretability%20and%20practical%20usefulness%20of%20the%20decomposition.%20We%20present%20a%20comprehensive%20empirical%20study%20covering%20a%20broad%20range%20of%20AU-EU%20model%20combinations%2C%20propose%20a%20metric%20to%20quantify%20uncertainty%20entanglement%2C%20and%20evaluate%20both%20across%20downstream%20UQ%20tasks.%20For%20out-of-distribution%20detection%2C%20ensembles%20exhibit%20consistently%20lower%20entanglement%20and%20superior%20performance.%20For%20ambiguity%20modeling%20and%20calibration%20the%20best%20models%20are%20dataset-dependent%2C%20with%20softmax/SSN-based%20methods%20performing%20well%20and%20Probabilistic%20UNets%20being {"title": "DreamPartGen: Semantically Grounded Part-Level 3D Generation via Collaborative Latent Denoising", "author": "Tianjiao Yu and Xinzhuo Li and Muntasir Wahed and Jerry Xiong and Yifan Shen and Ying Shen and Ismini Lourentzou", "abstract": "Understanding and generating 3D objects as compositions of meaningful parts is fundamental to human perception and reasoning. However, most text-to-3D methods overlook the semantic and functional structure of parts. While recent part-aware approaches introduce decomposition, they remain largely geometry-focused, lacking semantic grounding and failing to model how parts align with textual descriptions or their inter-part relations. We propose DreamPartGen, a framework for semantically grounded, part-aware text-to-3D generation. DreamPartGen introduces Duplex Part Latents (DPLs) that jointly model each part's geometry and appearance, and Relational Semantic Latents (RSLs) that capture inter-part dependencies derived from language. A synchronized co-denoising process enforces mutual geometric and semantic consistency, enabling coherent, interpretable, and text-aligned 3D synthesis. Across multiple benchmarks, DreamPartGen delivers state-of-the-art performance in geometric fidelity and text-shape alignment.", "link": "http://arxiv.org/abs/2603.19216v1", "date": "2026-03-19", "relevancy": 2.2978, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.5817}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5707}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5687}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DreamPartGen%3A%20Semantically%20Grounded%20Part-Level%203D%20Generation%20via%20Collabo {"title": "Iris: Bringing Real-World Priors into Diffusion Model for Monocular Depth Estimation", "author": "Xinhao Cai and Gensheng Pei and Zeren Sun and Yazhou Yao and Fumin Shen and Wenguan Wang", "abstract": "In this paper, we propose \\textbf{Iris}, a deterministic framework for Monocular Depth Estimation (MDE) that integrates real-world priors into the diffusion model. Conventional feed-forward methods rely on massive training data, yet still miss details. Previous diffusion-based methods leverage rich generative priors yet struggle with synthetic-to-real domain transfer. Iris, in contrast, preserves fine details, generalizes strongly from synthetic to real scenes, and remains efficient with limited training data. To this end, we introduce a two-stage Priors-to-Geometry Deterministic (PGD) schedule: the prior stage uses Spectral-Gated Distillation (SGD) to transfer low-frequency real priors while leaving high-frequency details unconstrained, and the geometry stage applies Spectral-Gated Consistency (SGC) to enforce high-frequency fidelity while refining with synthetic ground truth. The two stages share weights and are executed with a high-to-low timestep schedule. Extensive experimental results confirm that Iris achieves significant improvements in MDE performance with strong in-the-wild generalization.", "link": "http://arxiv.org/abs/2603.16340v2", "date": "2026-03-19", "relevancy": 2.2956, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.6044}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5747}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5609}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Iris%3A%20Bringing%20Real-World%20Priors%20into%20Diffusion%20Model%20for%20Monocular%20Depth%20Estimation&body=Title%3A%20Iris%3A%20Bringing%20Real-World%20Priors%20into%20Diffusion%20Model%20for%20Monocular%20Depth%20Estimation%0AAuthor%3A%20Xinhao%20Cai%20and%20Gensheng%20Pei%20and%20Zeren%20Sun%20and%20Yazhou%20Yao%20and%20Fumin%20Shen%20and%20Wenguan%20Wang%0AAbstract%3A%20In%20this%20paper%2C%20we%20propose%20%5Ctextbf%7BIris%7D%2C%20a%20deterministic%20framework%20for%20Monocular%20Depth%20Estimation%20%28MDE%29%20that%20integrates%20real-world%20priors%20into%20the%20diffusion%20model.%20Conventional%20feed-forward%20methods%20rely%20on%20massive%20training%20data%2C%20yet%20still%20miss%20details.%20Previous%20diffusion-based%20methods%20leverage%20rich%20generative%20priors%20yet%20struggle%20with%20synthetic-to-real%20domain%20transfer.%20Iris%2C%20in%20contrast%2C%20preserves%20fine%20details%2C%20generalizes%20strongly%20from%20synthetic%20to%20real%20scenes%2C%20and%20remains%20efficient%20with%20limited%20training%20data.%20To%20this%20end%2C%20we%20introduce%20a%20two-stage%20Priors-to-Geometry%20Deterministic%20%28PGD%29%20schedule%3A%20the%20prior%20stage%20uses%20Spectral-Gated%20Distillation%20%28SGD%29%20to%20transfer%20low-frequency%20real%20priors%20while%20leaving%20high-frequency%20details%20unconstrained%2C%20and%20the%20geometry%20stage%20applies%20Spectral-Gated%20Consistency%20%28SGC%29%20to%20enforce%20high-frequency%20fidelity%20while%20refining%20with%20synthetic%20ground%20truth.%20The%20two%20stages%20share%20weights%20and%20are%20executed%20with%20a%20high-to-low%20timestep%20schedule.%20Extensive%20experimental%20results%20confirm%20that%20Iris%20achieves%20significant%20improvements%20in%20MDE%20performance%20with%20strong%20in-the-wild%20generalization.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16340v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIris%253A%2520Bringing%2520Real-World%2520Priors%2520into%2520Diffusion%2520Model%2520f %26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16340v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Iris%3A%20Bringing%20Real-World%20Priors%20into%20Diffusion%20Model%20for%20Monocular%20Depth%20Estimation&entry.906535625=Xinhao%20Cai%20and%20Gensheng%20Pei%20and%20Zeren%20Sun%20and%20Yazhou%20Yao%20and%20Fumin%20Shen%20and%20Wenguan%20Wang&entry.1292438233=In%20this%20paper%2C%20we%20propose%20%5Ctextbf%7BIris%7D%2C%20a%20deterministic%20framework%20for%20Monocular%20Depth%20Estimation%20%28MDE%29%20that%20integrates%20real-world%20priors%20into%20the%20diffusion%20model.%20Conventional%20feed-forward%20methods%20rely%20on%20massive%20training%20data%2C%20yet%20still%20miss%20details.%20Previous%20diffusion-based%20methods%20leverage%20rich%20generative%20priors%20yet%20struggle%20with%20synthetic-to-real%20domain%20transfer.%20Iris%2C%20in%20contrast%2C%20preserves%20fine%20details%2C%20generalizes%20strongly%20from%20synthetic%20to%20real%20scenes%2C%20and%20remains%20efficient%20with%20limited%20training%20data.%20To%20this%20end%2C%20we%20introduce%20a%20two-stage%20Priors-to-Geometry%20Deterministic%20%28PGD%29%20schedule%3A%20the%20prior%20stage%20uses%20Spectral-Gated%20Distillation%20%28SGD%29%20to%20transfer%20low-frequency%20real%20priors%20while%20leaving%20high-frequency%20details%20unconstrained%2C%20and%20the%20geometry%20stage%20applies%20Spectral-Gated%20Consistency%20%28SGC%29%20to%20enforce%20high-frequency%20fidelity%20while%20refining%20with%20synthetic%20ground%20truth.%20The%20two%20stages%20share%20weights%20and%20are%20executed%20with%20a%20high-to-low%20timestep%20schedule.%20Extensive%20experimental%20results%20confirm%20that%20Iris%20achieves%20significant%20improvements%20in%20MDE%20performance%20with%20strong%20in-the-wild%20generalization.&entry.1838667208=http%3A//arxiv.org/abs/2603.16340v2&entry.124074799=Read"},
{"title": "Under One Sun: Multi-Object Generative Perception of Materials and Illumination", "author": "Nobuo Yoshii and Xinran Nicole Han and Ryo Kawahara and Todd Zickler and Ko Nishino", "abstract": "We introduce Multi-Object Generative Perception (MultiGP), a generative inverse rendering method for stochastic sampling of all radiometric constituents -- reflectance, texture, and illumination -- underlying object appearance from a single image. Our key idea to solve this inherently ambiguous radiometric disentanglement is to leverage the fact that while their texture and reflectance may differ, objects in the same scene are all lit by the same illumination. MultiGP exploits this consensus to produce samples of reflectance, texture, and illumination from a single image of known shapes based on four key technical contributions: a cascaded end-to-end architecture that combines image-space and angular-space disentanglement; Coordinated Guidance for diffusion convergence to a single consistent illumination estimate; Axial Attention applied to facilitate ``cross-talk'' between objects of different reflectance; and a Texture Extraction ControlNet to preserve high-frequency texture details while ensuring decoupling from estimated lighting. Experimental results demonstrate that MultiGP effectively leverages the complementary spatial and frequency characteristics of multiple object appearances to recover individual texture and reflectance as well as the common illumination.", "link": "http://arxiv.org/abs/2603.19226v1", "date": "2026-03-19", "relevancy": 2.2927, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.6386}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5601}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5601}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Under%20One%20Sun%3A%20Multi-Object%20Generative%20Perception%20of%20Materials%20and%20Illumination&body=Title%3A%20Under%20One%20Sun%3A%20Multi-Object%20Generative%20Perception%20of%20Materials%20and%20Illumination%0AAuthor%3A%20Nobuo%20Yoshii%20and%20Xinran%20Nicole%20Han%20and%20Ryo%20Kawahara%20and%20Todd%20Zickler%20and%20Ko%20Nishino%0AAbstract%3A%20We%20introduce%20Multi-Object%20Generative%20Perception%20%28MultiGP%29%2C%20a%20generative%20inverse%20rendering%20method%20for%20stochastic%20sampling%20of%20all%20radiometric%20constituents%20--%20reflectance%2C%20texture%2C%20and%20illumination%20--%20underlying%20object%20appearance%20from%20a%20single%20image.%20Our%20key%20idea%20to%20solve%20this%20inherently%20ambiguous%20radiometric%20disentanglement%20is%20to%20leverage%20the%20fact%20that%20while%20their%20texture%20and%20reflectance%20may%20differ%2C%20objects%20in%20the%20same%20scene%20are%20all%20lit%20by%20the%20same%20illumination.%20MultiGP%20exploits%20this%20consensus%20to%20produce%20samples%20of%20reflectance%2C%20texture%2C%20and%20illumination%20from%20a%20single%20image%20of%20known%20shapes%20based%20on%20four%20key%20technical%20contributions%3A%20a%20cascaded%20end-to-end%20architecture%20that%20combines%20image-space%20and%20angular-space%20disentanglement%3B%20Coordinated%20Guidance%20for%20diffusion%20convergence%20to%20a%20single%20consistent%20illumination%20estimate%3B%20Axial%20Attention%20applied%20to%20facilitate%20%60%60cross-talk%27%27%20between%20objects%20of%20different%20reflectance%3B%20and%20a%20Texture%20Extraction%20ControlNet%20to%20preserve%20high-frequency%20texture%20details%20while%20ensuring%20decoupling%20from%20estimated%20lighting.%20Experimental%20results%20demonstrate%20that%20MultiGP%20effectively%20leverages%20the%20complementary%20spatial%20and%20frequency%20characteristics%20of%20multiple%20object%20appearances%20to%20recover%20individual%20texture%20and%20reflectance%20as%20well%20as%20the%20common%20illumination.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19226v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnder%2520One%2520Sun%253A%2520Multi-Object%2520Generative%2520Perception%2520of%2520Materials%2520and%2520Illumination%26entry.906535625%3DNobuo%2520Yoshii%2520and%2520Xinran%2520Nicole%2520Han%2520and%2520Ryo%2520Kawahara%2520and%2520Todd%2520Zickler%2520and%2520Ko%2520Nishino%26entry.1292438233%3DWe%2520introduce%2520Multi-Object%2520Generative%2520Perception%2520%2528MultiGP%2529%252C%2520a%2520generative%2520inverse%2520rendering%2520method%2520for%2520stochastic%2520sampling%2520of%2520all%2520radiometric%2520constituents%2520--%2520reflectance%252C%2520texture%252C%2520and%2520illumination%2520--%2520underlying%2520object%2520appearance%2520from%2520a%2520single%2520image.%2520Our%2520key%2520idea%2520to%2520solve%2520this%2520inherently%2520ambiguous%2520radiometric%2520disentanglement%2520is%2520to%2520leverage%2520the%2520fact%2520that%2520while%2520their%2520texture%2520and%2520reflectance%2520may%2520differ%252C%2520objects%2520in%2520the%2520same%2520scene%2520are%2520all%2520lit%2520by%2520the%2520same%2520illumination.%2520MultiGP%2520exploits%2520this%2520consensus%2520to%2520produce%2520samples%2520of%2520reflectance%252C%2520texture%252C%2520and%2520illumination%2520from%2520a%2520single%2520image%2520of%2520known%2520shapes%2520based%2520on%2520four%2520key%2520technical%2520contributions%253A%2520a%2520cascaded%2520end-to-end%2520architecture%2520that%2520combines%2520image-space%2520and%2520angular-space%2520disentanglement%253B%2520Coordinated%2520Guidance%2520for%2520diffusion%2520convergence%2520to%2520a%2520single%2520consistent%2520illumination%2520estimate%253B%2520Axial%2520Attention%2520applied%2520to%2520facilitate%2520%2560%2560cross-talk%2527%2527%2520between%2520objects%2520of%2520different%2520reflectance%253B%2520and%2520a%2520Texture%2520Extraction%2520ControlNet%2520to%2520preserve%2520high-frequency%2520texture%2520details%2520while%2520ensuring%2520decoupling%2520from%2520estimated%2520lighting.%2520Experimental%2520results%2520demonstrate%2520that%2520MultiGP%2520effectively%2520leverages%2520the%2520complementary%2520spatial%2520and%2520frequency%2520characteristics%2520of%2520multiple%2520object%2520appearances%2520to%2520recover%2520individual%2520texture%2520and%2520reflectance%2520as%2520well%2520as%2520the%2520common%2520illumination.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.19226v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Under%20One%20Sun%3A%20Multi-Object%20Generative%20Perception%20of%20Materials%20and%20Illumination&entry.906535625=Nobuo%20Yoshii%20and%20Xinran%20Nicole%20Han%20and%20Ryo%20Kawahara%20and%20Todd%20Zickler%20and%20Ko%20Nishino&entry.1292438233=We%20introduce%20Multi-Object%20Generative%20Perception%20%28MultiGP%29%2C%20a%20generative%20inverse%20rendering%20method%20for%20stochastic%20sampling%20of%20all%20radiometric%20constituents%20--%20reflectance%2C%20texture%2C%20and%20illumination%20--%20underlying%20object%20appearance%20from%20a%20single%20image.%20Our%20key%20idea%20to%20solve%20this%20inherently%20ambiguous%20radiometric%20disentanglement%20is%20to%20leverage%20the%20fact%20that%20while%20their%20texture%20and%20reflectance%20may%20differ%2C%20objects%20in%20the%20same%20scene%20are%20all%20lit%20by%20the%20same%20illumination.%20MultiGP%20exploits%20this%20consensus%20to%20produce%20samples%20of%20reflectance%2C%20texture%2C%20and%20illumination%20from%20a%20single%20image%20of%20known%20shapes%20based%20on%20four%20key%20technical%20contributions%3A%20a%20cascaded%20end-to-end%20architecture%20that%20combines%20image-space%20and%20angular-space%20disentanglement%3B%20Coordinated%20Guidance%20for%20diffusion%20convergence%20to%20a%20single%20consistent%20illumination%20estimate%3B%20Axial%20Attention%20applied%20to%20facilitate%20%60%60cross-talk%27%27%20between%20objects%20of%20different%20reflectance%3B%20and%20a%20Texture%20Extraction%20ControlNet%20to%20preserve%20high-frequency%20texture%20details%20while%20ensuring%20decoupling%20from%20estimated%20lighting.%20Experimental%20results%20demonstrate%20that%20MultiGP%20effectively%20leverages%20the%20complementary%20spatial%20and%20frequency%20characteristics%20of%20multiple%20object%20appearances%20to%20recover%20individual%20texture%20and%20reflectance%20as%20well%20as%20the%20common%20illumination.&entry.1838667208=http%3A//arxiv.org/abs/2603.19226v1&entry.124074799=Read"},
{"title": "F2LLM-v2: Inclusive, Performant, and Efficient Embeddings for a Multilingual World", "author": "Ziyin Zhang and Zihan Liao and Hang Yu and Peng Di and Rui Wang", "abstract": "We present F2LLM-v2, a new family of general-purpose, multilingual embedding models in 8 distinct sizes ranging from 80M to 14B. Trained on a newly curated composite of 60 million publicly available high-quality data samples, F2LLM-v2 supports more than 200 languages, with a particular emphasis on previously underserved mid- and low-resource languages. By integrating a two-stage LLM-based embedding training pipeline with matryoshka learning, model pruning, and knowledge distillation techniques, we present models that are far more efficient than previous LLM-based embedding models while retaining competitive performances. Extensive evaluations confirm that F2LLM-v2-14B ranks first on 11 MTEB benchmarks, while the smaller models in the family also set a new state of the art for resource-constrained applications. To facilitate open-source embedding model research, we release all models, data, code, and intermediate checkpoints.", "link": "http://arxiv.org/abs/2603.19223v1", "date": "2026-03-19", "relevancy": 2.2817, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4643}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4523}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4523}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20F2LLM-v2%3A%20Inclusive%2C%20Performant%2C%20and%20Efficient%20Embeddings%20for%20a%20Multilingual%20World&body=Title%3A%20F2LLM-v2%3A%20Inclusive%2C%20Performant%2C%20and%20Efficient%20Embeddings%20for%20a%20Multilingual%20World%0AAut M%2520to%252014B.%2520Trained%2520on%2520a%2520newly%2520curated%2520composite%2520of%252060%2520million%2520publicly%2520available%2520high-quality%2520data%2520samples%252C%2520F2LLM-v2%2520supports%2520more%2520than%2520200%2520languages%252C%2520with%2520a%2520particular%2520emphasis%2520on%2520previously%2520underserved%2520mid-%2520and%2520low-resource%2520languages.%2520By%2520integrating%2520a%2520two-stage%2520LLM-based%2520embedding%2520training%2520pipeline%2520with%2520matryoshka%2520learning%252C%2520model%2520pruning%252C%2520and%2520knowledge%2520distillation%2520techniques%252C%2520we%2520present%2520models%2520that%2520are%2520far%2520more%2520efficient%2520than%2520previous%2520LLM-based%2520embedding%2520models%2520while%2520retaining%2520competitive%2520performances.%2520Extensive%2520evaluations%2520confirm%2520that%2520F2LLM-v2-14B%2520ranks%2520first%2520on%252011%2520MTEB%2520benchmarks%252C%2520while%2520the%2520smaller%2520models%2520in%2520the%2520family%2520also%2520set%2520a%2520new%2520state%2520of%2520the%2520art%2520for%2520resource-constrained%2520applications.%2520To%2520facilitate%2520open-source%2520embedding%2520model%2520research%252C%2520we%2520release%2520all%2520models%252C%2520data%252C%2520code%252C%2520and%2520intermediate%2520checkpoints.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.19223v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=F2LLM-v2%3A%20Inclusive%2C%20Performant%2C%20and%20Efficient%20Embeddings%20for%20a%20Multilingual%20World&entry.906535625=Ziyin%20Zhang%20and%20Zihan%20Liao%20and%20Hang%20Yu%20and%20Peng%20Di%20and%20Rui%20Wang&entry.1292438233=We%20present%20F2LLM-v2%2C%20a%20new%20family%20of%20general-purpose%2C%20multilingual%20embedding%20models%20in%208%20distinct%20sizes%20ranging%20from%2080M%20to%2014B.%20Trained%20on%20a%20newly%20curated%20composite%20of%2060%20million%20publicly%20a {"title": "FedTrident: Resilient Road Condition Classification Against Poisoning Attacks in Federated Learning", "author": "Sheng Liu and Panos Papadimitratos", "abstract": "FL has emerged as a transformative paradigm for ITS, notably camera-based Road Condition Classification (RCC). However, by enabling collaboration, FL-based RCC exposes the system to adversarial participants launching Targeted Label-Flipping Attacks (TLFAs). Malicious clients (vehicles) can relabel their local training data (e.g., from an actual uneven road to a wrong smooth road), consequently compromising global model predictions and jeopardizing transportation safety. Existing countermeasures against such poisoning attacks fail to maintain resilient model performance near the necessary attack-free levels in various attack scenarios due to: 1) not tailoring poisoned local model detection to TLFAs, 2) not excluding malicious vehicular clients based on historical behavior, and 3) not remedying the already-corrupted global model after exclusion. To close this research gap, we propose FedTrident, which introduces: 1) neuron-wise analysis for local model misbehavior detection (notably including attack goal identification, critical feature extraction, and GMM-based model clustering and filtering); 2) adaptive client rating for client exclusion according to the local model detection results in each FL round; and 3) machine unlearning for corrupted global model remediation once malicious clients are excluded during FL. Extensive evaluation across diverse FL-RCC models, tasks, and configurations demonstrates that FedTrident can effectively thwart TLFAs, achieving performance comparable to that in attack-free scenarios and outperforming eight baseline countermeasures by 9.49% and 4.47% for the two most critical metrics. Moreover, FedTrident is resilient to various malicious client rates, data heterogeneity levels, complicated multi-task, and dynamic attacks.", "link": "http://arxiv.org/abs/2603.19101v1", "date": "2026-03-19", "relevancy": 2.2755, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4689}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4518}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4446}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FedTrident%3A%20Resilient%20Road%20Condition%20Classification%20Against%20Poisoning%20Attacks%20in%20Federated%20Learning&body=Title%3A%20FedTrident%3A%20Resilient%20Road%20Condition%20Classification%20Against%20Poisoning%20Attacks%20in%20Federated%20Learning%0AAuthor%3A%20Sheng%20Liu%20and%20Panos%20Papadimitratos%0AAbstract%3A%20FL%20has%20emerged%20as%20a%20transformative%20paradigm%20for%20ITS%2C%20notably%20camera-based%20Road%20Condition%20Classification%20%28RCC%29.%20However%2C%20by%20enabling%20collaboration%2C%20FL-based%20RCC%20exposes%20the%20system%20to%20adversarial%20participants%20launching%20Targeted%20Label-Flipping%20Attacks%20%28TLFAs%29.%20Malicious%20clients%20%28vehicles%29%20can%20relabel%20their%20local%20training%20data%20%28e.g.%2C%20from%20an%20actual%20uneven%20road%20to%20a%20wrong%20smooth%20road%29%2C%20consequently%20compromising%20global%20model%20predictions%20and%20jeopardizing%20transportation%20safety.%20Existing%20countermeasures%20against%20such%20poisoning%20attacks%20fail%20to%20maintain%20resilient%20model%20performance%20near%20the%20necessary%20attack-free%20levels%20in%20various%20attack%20scenarios%20due%20to%3A%201%29%20not%20tailoring%20poisoned%20local%20model%20detection%20to%20TLFAs%2C%202%29%20not%20excluding%20malicious%20vehicular%20clients%20based%20on%20historical%20behavior%2C%20and%203%29%20not%20remedying%20the%20already-corrupted%20global%20model%20after%20exclusion.%20To%20close%20this%20research%20gap%2C%20we%20propose%20FedTrident%2C%20which%20introduces%3A%201%29%20neuron-wise%20analysis%20for%20local%20model%20misbehavior%20detection%20%28notably%20including%20attack%20goal%20identification%2C%20critical%20feature%20extraction%2C%20and%20GMM-based%20model%20clustering%20and%20filtering%29%3B%202%29%20adaptive%20client%20rating%20for%20client%20exclusion%20according%20to%20the%20local%20model%20detection%20results%20in%20each%20FL%20round%3B%20and%203%29%20machine%20unlearning%20for%20corrupted%20global%20model%20remediation%20once%20malicious%20clients%20are%20excluded%20during%20FL.%20Extensive%20evaluation%20across%20diverse%20FL-RCC%20models%2C%20tasks%2C%20and%20configurations%20demonstrates%20that%20FedTrident%20can%20effectively%20thwart%20TLFAs%2C%20achieving%20performance%20comparable%20to%20that%20in%20attack-free%20scenarios%20and%20outperforming%20eight%20baseline%20countermeasures%20by%209.49%25%20and%204.47%25%20for%20the%20two%20most%20critical%20metrics.%20Moreover%2C%20FedTrident%20is%20resilient%20to%20various%20malicious%20client%20rates%2C%20data%20heterogeneity%20levels%2C%20complicated%20multi-task%2C%20and%20dynamic%20attacks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19101v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFedTrident%253A%2520Resilient%2520Road%2520Condition%2520Classification%2520Against%2520Poisoning%2520Attacks%2520in%2520Federated%2520Learning%26entry.906535625%3DSheng%2520Liu%2520and%2520Panos%2520Papadimitratos%26entry.1292438233%3DFL%2520has%2520emerged%2520as%2520a%2520transformative%2520paradigm%2520for%2520ITS%252C%2520notably%2520camera-based%2520Road%2520Condition%2520Classification%2520%2528RCC%2529.%2520However%252C%2520by%2520enabling%2520collaboration%252C%2520FL-based%2520RCC%2520exposes%2520the%2520system%2520to

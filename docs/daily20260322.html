0state-of-the-art%2520performance%2520in%2520both%2520reconstruction%2520accuracy%2520and%2520inference%2520speed.%2520The%2520framework%2520further%2520generalizes%2520to%2520robotic%2520manipulation%2520and%2520articulated%2520scene%2520reconstruction.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.19231v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MonoArt%3A%20Progressive%20Structural%20Reasoning%20for%20Monocular%20Articulated%203D%20Reconstruction&entry.906535625=Haitian%20Li%20and%20Haozhe%20Xie%20and%20Junxiang%20Xu%20and%20Beichen%20Wen%20and%20Fangzhou%20Hong%20and%20Ziwei%20Liu&entry.1292438233=Reconstructing%20articulated%203D%20objects%20from%20a%20single%20image%20requires%20jointly%20inferring%20object%20geometry%2C%20part%20structure%2C%20and%20motion%20parameters%20from%20limited%20visual%20evidence.%20A%20key%20difficulty%20lies%20in%20the%20entanglement%20between%20motion%20cues%20and%20object%20structure%2C%20which%20makes%20direct%20articulation%20regression%20unstable.%20Existing%20methods%20address%20this%20challenge%20through%20multi-view%20supervision%2C%20retrieval-based%20assembly%2C%20or%20auxiliary%20video%20generation%2C%20often%20sacrificing%20scalability%20or%20efficiency.%20We%20present%20MonoArt%2C%20a%20unified%20framework%20grounded%20in%20progressive%20structural%20reasoning.%20Rather%20than%20predicting%20articulation%20directly%20from%20image%20features%2C%20MonoArt%20progressively%20transforms%20visual%20observations%20into%20canonical%20geometry%2C%20structured%20part%20representations%2C%20and%20motion-aware%20embeddings%20within%20a%20single%20architecture.%20This%20structured%20reasoning%20process%20enables%20stable%20and%20interpretable%20articulation%20inference%20without%20external%20motion%20templates%20or%20multi-stage%20pipelines.%20Extensive%20experiments%20on%20PartNet-Mobility%20demonstrate%20that%20OM% {"title": "Do VLMs Need Vision Transformers? Evaluating State Space Models as Vision Encoders", "author": "Shang-Jui Ray Kuo and Paola Cascante-Bonilla", "abstract": "Large vision--language models (VLMs) often use a frozen vision backbone, whose image features are mapped into a large language model through a lightweight connector. While transformer-based encoders are the standard visual backbone, we ask whether state space model (SSM) vision backbones can be a strong alternative. We systematically evaluate SSM vision backbones for VLMs in a controlled setting. Under matched ImageNet-1K initialization, the SSM backbone achieves the strongest overall performance across both VQA and grounding/localization. We further adapt both SSM and ViT-family backbones with detection or segmentation training and find that dense-task tuning generally improves performance across families; after this adaptation, the SSM backbone remains competitive while operating at a substantially smaller model scale. We further observe that (i) higher ImageNet accuracy or larger backbones do not reliably translate into better VLM performance, and (ii) some visual backbones are unstable in localization. Based on these findings, we propose stabilization strategies that improve robustness for both backbone families and highlight SSM backbones as a strong alternative to transformer-based vision encoders in VLMs.", "link": "http://arxiv.org/abs/2603.19209v1", "date": "2026-03-19", "relevancy": 2.8733, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6032}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6032}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5176}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Do%20VLMs%20Need%20Vision%20Transformers%3F%20Evaluating%20State%20Space%20Models%20as%20Vision%20Encoders&body=Title%3A%20Do%20VLMs%20Need%20Vision%20Transformers%3F%20Evaluating%20State%20Space%20Models%20as%20Vision%20Encoders%0AAuthor%3A%20Shang-Jui%20Ray%20Kuo%20and%20Paola%20Cascante-Bonilla%0AAbstract%3A%20Large%20vision--language%20models%20%28VLMs%29%20often%20use%20a%20frozen%20vision%20backbone%2C%20whose%20image%20features%20are%20mapped%20into%20a%20large%20language%20model%20through%20a%20lightweight%20connector.%20While%20transformer-based%20encoders%20are%20the%20standard%20visual%20backbone%2C%20we%20ask%20whether%20state%20space%20model%20%28SSM%29%20vision%20backbones%20can%20be%20a%20strong%20alternative.%20We%20systematically%20evaluate%20SSM%20vision%20backbones%20for%20VLMs%20in%20a%20controlled%20setting.%20Under%20matched%20ImageNet-1K%20initialization%2C%20the%20SSM%20backbone%20achieves%20the%20strongest%20overall%20performance%20across%20both%20VQA%20and%20grounding/localization.%20We%20further%20adapt%20both%20SSM%20and%20ViT-family%20backbones%20with%20detection%20or%20segmentation%20training%20and%20find%20that%20dense-task%20tuning%20generally%20improves%20performance%20across%20families%3B%20after%20this%20adaptation%2C%20the%20SSM%20backbone%20remains%20competitive%20while%20operating%20at%20a%20substantially%20smaller%20model%20scale.%20We%20further%20observe%20that%20%28i%29%20higher%20ImageNet%20accuracy%20or%20larger%20backbones%20do%20not%20reliably%20translate%20into%20better%20VLM%20performance%2C%20and%20%28ii%29%20some%20visual%20backbones%20are%20unstable%20in%20localization.%20Based%20on%20these%20findings%2C%20we%20propose%20stabilization%20strategies%20that%20improve%20robustness%20for%20both%20backbone%20families%20and%20highlight%20SSM%20backbones%20as%20a%20strong%20alternative%20to%20transformer-based%20vision%20encoders%20in%20VLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19209v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDo%2520VLMs%2520Need%2520Vision%2520Transformers%253F%2520Evaluating%2520State%2520Space%2520Models%2520as%2520Vision%2520Encoders%26entry.906535625%3DShang-Jui%2520Ray%2520Kuo%2520and%2520Paola%2520Cascante-Bonilla%26entry.1292438233%3DLarge%2520vision--language%2520models%2520%2528VLMs%2529%2520often%2520use%2520a%2520frozen%2520vision%2520backbone%252C%2520whose%2520image%2520features%2520are%2520mapped%2520into%2520a%2520large%2520language%2520model%2520through%2520a%2520lightweight%2520connector.%2520While%2520transformer-based%2520encoders%2520are%2520the%2520standard%2520visual%2520backbone%252C%2520we%2520ask%2520whether%2520state%2520space%2520model%2520%2528SSM%2529%2520vision%2520backbones%2520can%2520be%2520a%2520strong%2520alternative.%2520We%2520systematically%2520evaluate%2520SSM%2520vision%2520backbones%2520for%2520VLMs%2520in%2520a%2520controlled%2520setting.%2520Under%2520matched%2520ImageNet-1K%2520initialization%252C%2520the%2520SSM%2520backbone%2520achieves%2520the%2520strongest%2520overall%2520performance%2520across%2520both%2520VQA%2520and%2520grounding/localization.%2520We%2520further%2520adapt%2520both%2520SSM%2520and%2520ViT-family%2520backbones%2520with%2520detection%2520or%2520segmentation%2520training%2520and%2520find%2520that%2520dense-task%2520tuning%2520generally%2520improves%2520performance%2520across%2520families%253B%2520after%2520this%2520adaptation%252C%2520the%2520SSM%2520backbone%2520remains%2520competitive%2520while%2520operating%2520at%2520a%2520substantially%2520smaller%2520model%2520scale.%2520We%2520further%2520observe%2520that%2520%2528i%2529%2520higher%2520ImageNet%2520accuracy%2520or%2520larger%2520backbones%2520do%2520not%2520reliably%2520translate%2520into%2520better%2520VLM%2520performance%252C%2520and%2520%2528ii%2529%2520some%2520visual%2520backbones%2520are%2520unstable%2520in% %2C%20and%20%28ii%29%20some%20visual%20backbones%20are%20unstable%20in%20localization.%20Based%20on%20these%20findings%2C%20we%20propose%20stabilization%20strategies%20that%20improve%20robustness%20for%20both%20backbone%20families%20and%20highlight%20SSM%20backbones%20as%20a%20strong%20alternative%20to%20transformer-based%20vision%20encoders%20in%20VLMs.&entry.1838667208=http%3A//arxiv.org/abs/2603.19209v1&entry.124074799=Read"},
{"title": "LVOmniBench: Pioneering Long Audio-Video Understanding Evaluation for Omnimodal LLMs", "author": "Keda Tao and Yuhua Zheng and Jia Xu and Wenjie Du and Kele Shao and Hesong Wang and Xueyi Chen and Xin Jin and Junhan Zhu and Bohan Yu and Weiqiang Wang and Jian Liu and Can Qin and Yulun Zhang and Ming-Hsuan Yang and Huan Wang", "abstract": "Recent advancements in omnimodal large language models (OmniLLMs) have significantly improved the comprehension of audio and video inputs. However, current evaluations primarily focus on short audio and video clips ranging from 10 seconds to 5 minutes, failing to reflect the demands of real-world applications, where videos typically run for tens of minutes. To address this critical gap, we introduce LVOmniBench, a new benchmark designed specifically for the cross-modal comprehension of long-form audio and video. This dataset comprises high-quality videos sourced from open platforms that feature rich audio-visual dynamics. Through rigorous manual selection and annotation, LVOmniBench comprises 275 videos, ranging in duration from 10 to 90 minutes, and 1,014 question-answer (QA) pairs. LVOmniBench aims to rigorously evaluate the capabilities of OmniLLMs across domains, including long-term memory, temporal localization, fine-grained understanding, and multimodal perception. Our extensive evaluation reveals that current OmniLLMs encounter significant challenges when processing extended audio-visual inputs. Open-source models generally achieve accuracies below 35%, whereas the Gemini 3 Pro reaches a peak accuracy of approximately 65%. We anticipate that this dataset, along with our empirical findings, will stimulate further research and the development of advanced models capable of resolving complex cross-modal understanding problems within long-form audio-visual contexts.", "link": "http://arxiv.org/abs/2603.19217v1", "date": "2026-03-19", "relevancy": 2.854, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5981}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5981}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5162}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LVOmniBench%3A%20Pioneering%20Long%20Audio-Video%20Understanding%20Evaluation%20for%20Omnimodal%20LLMs&body=Title%3A%20LVOmniBench%3A%20Pioneering%20Long%20Audio-Video%20Understanding%20Evaluation%20for%20Omnimodal%20LLMs%0AAuthor%3A%20Keda%20Tao%20and%20Yuhua%20Zheng%20and%20Jia%20Xu%20and%20Wenjie%20Du%20and%20Kele%20Shao%20and%20Hesong%20Wang%20and%20Xueyi%20Chen%20and%20Xin%20Jin%20and%20Junhan%20Zhu%20and%20Bohan%20Yu%20and%20Weiqiang%20Wang%20and%20Jian%20Liu%20and%20Can%20Qin%20and%20Yulun%20Zhang%20and%20Ming-Hsuan%20Yang%20and%20Huan%20Wang%0AAbstract%3A%20Recent%20advancements%20in%20omnimodal%20large%20language%20models%20%28OmniLLMs%29%20have%20significantly%20improved%20the%20comprehension%20of%20audio%20and%20video%20inputs.%20However%2C%20current%20evaluations%20primarily%20focus%20on%20short%20audio%20and%20video%20clips%20ranging%20from%2010%20seconds%20to%205%20minutes%2C%20failing%20to%20reflect%20the%20demands%20of%20real-world%20applications%2C%20where%20videos%20typically%20run%20for%20tens%20of%20minutes.%20To%20address%20this%20critical%20gap%2C%20we%20introduce%20LVOmniBench%2C%20a%20new%20benchmark%20designed%20specifically%20for%20the%20cross-modal%20comprehension%20of%20long-form%20audio%20and%20video.%20This%20dataset%20comprises%20high-quality%20videos%20sourced%20from%20open%20platforms%20that%20feature%20rich%20audio-visual%20dynamics.%20Through%20rigorous%20manual%20selection%20and%20annotation%2C%20LVOmniBench%20comprises%20275%20videos%2C%20ranging%20in%20duration%20from%2010%20to%2090%20minutes%2C%20and%201%2C014%20question-answer%20%28QA%29%20pairs.%20LVOmniBench%20aims%20to%20rigorously%20evaluate%20the%20capabilities%20of%20OmniLLMs%20across%20domains%2C%20including%20long-term%20memory%2C%20temporal%20localization%2C%20fine-grained%20understanding%2C%20and%20multimodal%20perception.%20Our%20extensive%20evaluation%20reveals%20that%20current%20OmniLLMs%20encounter%20significant%20challenges%20when%20processing%20extended%20audio-visual%20inputs.%20Open-source%20models%20generally%20achieve%20accuracies%20below%2035%25%2C%20whereas%20the%20Gemini%203%20Pro%20reaches%20a%20peak%20accuracy%20of%20approximately%2065%25.%20We%20anticipate%20that%20this%20dataset%2C%20along%20with%20our%20empirical%20findings%2C%20will%20stimulate%20further%20research%20and%20the%20development%20of%20advanced%20models%20capable%20of%20resolving%20complex%20cross-modal%20understanding%20problems%20within%20long-form%20audio-visual%20contexts.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19217v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLVOmniBench%253A%2520Pioneering%2520Long%2520Audio-Video%2520Understanding%2520Evaluation%2520for%2520Omnimodal%2520LLMs%26entry.906535625%3DKeda%2520Tao%2520and%2520Yuhua%2520Zheng%2520and%2520Jia%2520Xu%2520and%2520Wenjie%2520Du%2520and%2520Kele%2520Shao%2520and%2520Hesong%2520Wang%2520and%2520Xueyi%2520Chen%2520and%2520Xin%2520Jin%2520and%2520Junhan%2520Zhu%2520and%2520Bohan%2520Yu%2520and%2520Weiqiang%2520Wang%2520and%2520Jian%2520Liu%2520and%2520Can%2520Qin%2520and%2520Yulun%2520Zhang%2520and%2520Ming-Hsuan%2520Yang%2520and%2520Huan%2520Wang%26entry.1292438233%3DRecent%2520advancements%2520in%2520omnimodal%2520large%2520language%2520models%2520%2528OmniLLMs%2529%2520have%2520significantly%2520improved%2520the%2520comprehension%2520of%2520audio%2520and%2520video%2520inputs.%25 {"title": "GeoMotionGPT: Geometry-Aligned Motion Understanding with Large Language Models", "author": "Zhankai Ye and Bofan Li and Yukai Jin and Shuoqiu Li and Wei Wang and Yanfu Zhang and Shangqian Gao and Xin Liu", "abstract": "Discrete motion tokenization has recently enabled Large Language Models (LLMs) to serve as versatile backbones for motion understanding and motion-language reasoning. However, existing pipelines typically decouple motion quantization from semantic embedding learning, linking them solely via token IDs. This approach fails to effectively align the intrinsic geometry of the motion space with the embedding space, thereby hindering the LLM's capacity for nuanced motion reasoning. We argue that alignment is most effective when both modalities share a unified geometric basis. Therefore, instead of forcing the LLM to reconstruct the complex geometry among motion tokens from scratch, we present a novel framework that explicitly enforces orthogonality on both the motion codebook and the LLM embedding space, ensuring that their relational structures naturally mirror each other. Specifically, we employ a decoder-only quantizer with Gumbel-Softmax for differentiable training and balanced codebook usage. To bridge the modalities, we use a sparse projection that maps motion codes into the LLM embedding space while preserving orthogonality. Finally, a two-stage orthonormal regularization schedule enforces soft constraints during tokenizer training and LLM fine-tuning to maintain geometric alignment without hindering semantic adaptation. Extensive experiments show that our framework improves the aggregated Average by 22.4% over the strongest baseline on HumanML3D and by 14.4% on KIT-ML, while ablations confirm the effectiveness of the tokenizer, projection, and regularization designs.", "link": "http://arxiv.org/abs/2601.07632v4", "date": "2026-03-19", "relevancy": 2.8407, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5757}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.575}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5538}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GeoMotionGPT%3A%20Geometry-Aligned%20Motion%20Understanding%20with%20Large%20Language%20Models&body=Title%3A%20GeoMotionGPT%3A%20Geometry-Aligned%20Motion%20Understanding%20with%20Large%20Language%20Models%0AAuthor%3A%20Zhankai%20Ye%20and%20Bofan%20Li%20and%20Yukai%20Jin%20and%20Shuoqiu%20Li%20and%20Wei%20Wang%20and%20Yanfu%20Zhang%20and%20Shangqian%20Gao%20and%20Xin%20Liu%0AAbstract%3A%20Discrete%20motion%20tokenization%20has%20recently%20enabled%20Large%20Language%20Models%20%28LLMs%29%20to%20serve%20as%20versatile%20backbones%20for%20motion%20understanding%20and%20motion-language%20reasoning.%20However%2C%20existing%20pipelines%20typically%20decouple%20motion%20quantization%20from%20semantic%20embedding%20learning%2C%20linking%20them%20solely%20via%20token%20IDs.%20This%20approach%20fails%20to%20effectively%20align%20the%20intrinsic%20geometry%20of%20the%20motion%20space%20with%20the%20embedding%20space%2C%20thereby%20hindering%20the%20LLM%27s%20capacity%20for%20nuanced%20motion%20reasoning.%20We%20argue%20that%20alignment%20is%20most%20effective%20when%20both%20modalities%20share%20a%20unified%20geometric%20basis.%20Therefore%2C%20instead%20of%20forcing%20the%20LLM%20to%20reconstruct%20the%20complex%20geometry%20among%20motion%20tokens%20from%20scratch%2C%20we%20present%20a%20novel%20framework%20that%20explicitly%20enforces%20orthogonality%20on%20both%20the%20motion%20codebook%20and%20the%20LLM%20embedding%20space%2C%20ensuring%20that%20their%20relational%20structures%20naturally%20mirror%20each%20other.%20Specifically%2C%20we%20employ%20a%20decoder-only%20quantizer%20with%20Gumbel-Softmax%20for%20differentiable%20training%20and%20balanced%20codebook%20usage.%20To%20bridge%20the%20modalities%2C%20we%20use%20a%20sparse%20projection%20that%20maps%20motion%20codes%20into%20the%20LLM%20embedding%20space%20while%20preserving%20orthogonality.%20Finally%2C%20a%20two-stage%20orthonormal%20regularization%20schedule%20enforces%20soft%20constraints%20during%20tokenizer%20training%20and%20LLM%20fine-tuning%20to%20maintain%20geometric%20alignment%20without%20hindering%20semantic%20adaptation.%20Extensive%20experiments%20show%20that%20our%20framework%20improves%20the%20aggregated%20Average%20by%2022.4%25%20over%20the%20strongest%20baseline%20on%20HumanML3D%20and%20by%2014.4%25%20on%20KIT-ML%2C%20while%20ablations%20confirm%20the%20effectiveness%20of%20the%20tokenizer%2C%20projection%2C%20and%20regularization%20designs.%0ALink%3A%20http%3A//arxiv.org/abs/2601.07632v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeoMotionGPT%253A%2520Geometry-Aligned%2520Motion%2520Understanding%2520with%2520Large%2520Language%2520Models%26entry.906535625%3DZhankai%2520Ye%2520and%2520Bofan%2520Li%2520and%2520Yukai%2520Jin%2520and%2520Shuoqiu%2520Li%2520and%2520Wei%2520Wang%2520and%2520Yanfu%2520Zhang%2520and%2520Shangqian%2520Gao%2520and%2520Xin%2520Liu%26entry.1292438233%3DDiscrete%2520motion%2520tokenization%2520has%2520recently%2520enabled%2520Large%2520Language%2520Models%2520%2528LLMs%2529%2520to%2520serve%2520as%2520versatile%2520backbones%2520for%2520motion%2520understanding%2520and%2520motion-language%2520reasoning.%2520However%252C%2520existing%2520pipelines%2520typically%2520decouple%2520motion%2520quantization%2520from%2520semantic%2520embedding%2520learning%252C%2520linking%2520them%2520solely%2520via%2520token%2520IDs.%2520This%2520approach%2520fails%2520to%2520effectively%2520al {"title": "DA-Mamba: Learning Domain-Aware State Space Model for Global-Local Alignment in Domain Adaptive Object Detection", "author": "Haochen Li and Rui Zhang and Hantao Yao and Xin Zhang and Yifan Hao and Shaohui Peng and Yongwei Zhao and Ling Li", "abstract": "Domain Adaptive Object Detection (DAOD) aims to transfer detectors from a labeled source domain to an unlabeled target domain. Existing DAOD methods employ multi-granularity feature alignment to learn domain-invariant representations. However, the local connectivity of their CNN-based backbone and detection head restricts alignment to local regions, failing to extract global domain-invariant features. Although transformer-based DAOD methods capture global dependencies via attention mechanisms, their quadratic computational cost hinders practical deployment. To solve this, we propose DA-Mamba, a hybrid CNN-State Space Models (SSMs) architecture that combines the efficiency of CNNs with the linear-time long-range modeling capability of State Space Models (SSMs) to capture both global and local domain-invariant features. Specifically, we introduce two novel modules: Image-Aware SSM (IA-SSM) and Object-Aware SSM (OA-SSM). IA-SSM is integrated into the backbone to enhance global domain awareness, enabling image-level global and local alignment. OA-SSM is inserted into the detection head to model spatial and semantic dependencies among objects, enhancing instance-level alignment. Comprehensive experiments demonstrate that the proposed method can efficiently improve the cross-domain performance of the object detector.", "link": "http://arxiv.org/abs/2603.18757v1", "date": "2026-03-19", "relevancy": 2.8317, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6004}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5739}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5248}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DA-Mamba%3A%20Learning%20Domain-Aware%20State%20Space%20Model%20for%20Global-Local%20Alignment%20in%20Domain%20Adaptive%20Object%20Detection&body=Title%3A%20DA-Mamba%3A%20Learning%20Domain-Aware%20State%20Space%20Model%20for%20Global-Local%20Alignment%20in%20Domain%20Adaptive%20Object%20Detection%0AAuthor%3A%20Haochen%20Li%20and%20Rui%20Zhang%20and%20Hantao%20Yao%20and%20Xin%20Zhang%20and%20Yifan%20Hao%20and%20Shaohui%20Peng%20and%20Yongwei%20Zhao%20and%20Ling%20Li%0AAbstract%3A%20Domain%20Adaptive%20Object%20Detection%20%28DAOD%29%20aims%20to%20transfer%20detectors%20from%20a%20labeled%20source%20domain%20to%20an%20unlabeled%20target%20domain.%20Existing%20DAOD%20methods%20employ%20multi-granularity%20feature%20alignment%20to%20learn%20domain-invariant%20representations.%20However%2C%20the%20local%20connectivity%20of%20their%20CNN-based%20backbone%20and%20detection%20head%20restricts%20alignment%20to%20local%20regions%2C%20failing%20to%20extract%20global%20domain-invariant%20features.%20Although%20transformer-based%20DAOD%20methods%20capture%20global%20dependencies%20via%20attention%20mechanisms%2C%20their%20quadratic%20computational%20cost%20hinders%20practical%20deployment.%20To%20solve%20this%2C%20we%20propose%20DA-Mamba%2C%20a%20hybrid%20CNN-State%20Space%20Models%20%28SSMs%29%20architecture%20that%20combines%20the%20efficiency%20of%20CNNs%20with%20the%20linear-time%20long-range%20modeling%20capability%20of%20State%20Space%20Models%20%28SSMs%29%20to%20capture%20both%20global%20and%20local%20domain-invariant%20features.%20Specifically%2C%20we%20introduce%20two%20novel%20modules%3A%20Image-Aware%20SSM%20%28IA-SSM%29%20and%20Object-Aware%20SSM%20%28OA-SSM%29.%20IA-SSM%20is%20integrated%20into%20the%20backbone%20to%20enhance%20global%20domain%20awareness%2C%20enabling%20image-level%20global%20and%20local%20alignment.%20OA-SSM%20is%20inserted%20into%20the%20detection%20head%20to%20model%20spatial%20and%20semantic%20dependencies%20among%20objects%2C%20enhancing%20instance-level%20alignment.%20Comprehensive%20experiments%20demonstrate%20that%20the%20proposed%20method%20can%20efficiently%20improve%20the%20cross-domain%20performance%20of%20the%20object%20detector.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18757v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDA-Mamba%253A%2520Learning%2520Domain-Aware%2520State%2520Space%2520Model%2520for%2520Global-Local%2520Alignment%2520in%2520Domain%2520Adaptive%2520Object%2520Detection%26entry.906535625%3DHaochen%2520Li%2520and%2520Rui%2520Zhang%2520and%2520Hantao%2520Yao%2520and%2520Xin%2520Zhang%2520and%2520Yifan%2520Hao%2520and%2520Shaohui%2520Peng%2520and%2520Yongwei%2520Zhao%2520and%2520Ling%2520Li%26entry.1292438233%3DDomain%2520Adaptive%2520Object%2520Detection%2520%2528DAOD%2529%2520aims%2520to%2520transfer%2520detectors%2520from%2520a%2520labeled%2520source%2520domain%2520to%2520an%2520unlabeled%2520target%2520domain.%2520Existing%2520DAOD%2520methods%2520employ%2520multi-granularity%2520feature%2520alignment%2520to%2520learn%2520domain-invariant%2520representations.%2520However%252C%2520the%2520local%2520connectivity%2520of%2520their%2520CNN-based%2520backbone%2520and%2520detection%2520head%2520restricts%2520alignment%2520to%2520local%2520regions%252C%2520failing%2520to%2520extract%2520global%2520domain-invariant%2520features.%2520Although%2520transformer-based%2520DAOD%2520methods%2520capture%2520global%2520dependencies%2520via%2520attention%2520mechanisms%252C%2520their%2520quadratic%2520computational%2520cost%2520hinders%2520practical%2520deployment.%2520To%2520solve%2520this%252C%2520we%2520propose%2520DA-Mamba%252C%2520a%2520hybrid ver%2C%20the%20local%20connectivity%20of%20their%20CNN-based%20backbone%20and%20detection%20head%20restricts%20alignment%20to%20local%20regions%2C%20failing%20to%20extract%20global%20domain-invariant%20features.%20Although%20transformer-based%20DAOD%20methods%20capture%20global%20dependencies%20via%20attention%20mechanisms%2C%20their%20quadratic%20computational%20cost%20hinders%20practical%20deployment.%20To%20solve%20this%2C%20we%20propose%20DA-Mamba%2C%20a%20hybrid%20CNN-State%20Space%20Models%20%28SSMs%29%20architecture%20that%20combines%20the%20efficiency%20of%20CNNs%20with%20the%20linear-time%20long-range%20modeling%20capability%20of%20State%20Space%20Models%20%28SSMs%29%20to%20capture%20both%20global%20and%20local%20domain-invariant%20features.%20Specifically%2C%20we%20introduce%20two%20novel%20modules%3A%20Image-Aware%20SSM%20%28IA-SSM%29%20and%20Object-Aware%20SSM%20%28OA-SSM%29.%20IA-SSM%20is%20integrated%20into%20the%20backbone%20to%20enhance%20global%20domain%20awareness%2C%20enabling%20image-level%20global%20and%20local%20alignment.%20OA-SSM%20is%20inserted%20into%20the%20detection%20head%20to%20model%20spatial%20and%20semantic%20dependencies%20among%20objects%2C%20enhancing%20instance-level%20alignment.%20Comprehensive%20experiments%20demonstrate%20that%20the%20proposed%20method%20can%20efficiently%20improve%20the%20cross-domain%20performance%20of%20the%20object%20detector.&entry.1838667208=http%3A//arxiv.org/abs/2603.18757v1&entry.124074799=Read"},
{"title": "TAU-R1: Visual Language Model for Traffic Anomaly Understanding", "author": "Yuqiang Lin and Kehua Chen and Sam Lockyer and Arjun Yadav and Mingxuan Sui and Shucheng Zhang and Yan Shi and Bingzhang Wang and Yuang Zhang and Markus Zarbock and Florain Stanek and Adrian Evans and Wenbin Li and Yinhai Wang and Nic Zhang", "abstract": "Traffic Anomaly Understanding (TAU) is important for traffic safety in Intelligent Transportation Systems. Recent vision-language models (VLMs) have shown strong capabilities in video understanding. However, progress on TAU remains limited due to the lack of benchmarks and task-specific methodologies. To address this limitation, we introduce Roundabout-TAU, a dataset constructed from real-world roundabout videos collected in collaboration with the City of Carmel, Indiana. The dataset contains 342 clips and is annotated with more than 2,000 question-answer pairs covering multiple aspects of traffic anomaly understanding. Building on this benchmark, we propose TAU-R1, a two-layer vision-language framework for TAU. The first layer is a lightweight anomaly classifier that performs coarse anomaly categorisation, while the second layer is a larger anomaly reasoner that generates detailed event summaries. To improve task-specific reasoning, we introduce a two-stage training strategy consisting of decomposed-QA-enhanced supervised fine-tuning followed by TAU-GRPO, a GRPO-based post-training method with TAU-specific reward functions. Experimental results show that TAU-R1 achieves strong performance on both anomaly classification and reasoning tasks while maintaining deployment efficiency. The dataset and code are available at: https://github.com/siri-rouser/TAU-R1", "link": "http://arxiv.org/abs/2603.19098v1", "date": "2026-03-19", "relevancy": 2.7786, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5747}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5462}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5462}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TAU-R1%3A%20Visual%20Language%20Model%20for%20Traffic%20Anomaly%20Understanding&body=Title%3A%20TAU-R1%3A%20Visual%20Language%20Model%20for%20Traffic%20Anomaly%20Understanding%0AAuthor%3A%20Yuqiang%20Lin%20and%20Kehua%20Chen%20and%20Sam%20Lockyer%20and%20Arjun%20Yadav%20and%20Mingxuan%20Sui%20and%20Shucheng%20Zhang%20and%20Yan%20Shi%20and%20Bingzhang%20Wang%20and%20Yuang%20Zhang%20and%20Markus%20Zarbock%20and%20Florain%20Stanek%20and%20Adrian%20Evans%20and%20Wenbin%20Li%20and%20Yinhai%20Wang%20and%20Nic%20Zhang%0AAbstract%3A%20Traffic%20Anomaly%20Understanding%20%28TAU%29%20is%20important%20for%20traffic%20safety%20in%20Intelligent%20Transportation%20Systems.%20Recent%20vision-language%20models%20%28VLMs%29%20have%20shown%20strong%20capabilities%20in%20video%20understanding.%20However%2C%20progress%20on%20TAU%20remains%20limited%20due%20to%20the%20lack%20of%20benchmarks%20and%20task-specific%20methodologies.%20To%20address%20this%20limitation%2C%20we%20introduce%20Roundabout-TAU%2C%20a%20dataset%20constructed%20from%20real-world%20roundabout%20videos%20collected%20in%20collaboration%20with%20the%20City%20of%20Carmel%2C%20Indiana.%20The%20dataset%20contains%20342%20clips%20and%20is%20annotated%20with%20more%20than%202%2C000%20question-answer%20pairs%20covering%20multiple%20aspects%20of%20traffic%20anomaly%20understanding.%20Building%20on%20this%20benchmark%2C%20we%20propose%20TAU-R1%2C%20a%20two-layer%20vision-language%20framework%20for%20TAU.%20The%20first%20layer%20is%20a%20lightweight%20anomaly%20classifier%20that%20performs%20coarse%20anomaly%20categorisation%2C%20while%20the%20second%20layer%20is%20a%20larg {"title": "ViTac-Tracing: Visual-Tactile Imitation Learning of Deformable Object Tracing", "author": "Yongqiang Zhao and Haining Luo and Yupeng Wang and Emmanouil Spyrakos Papastavridis and Yiannis Demiris and Shan Luo", "abstract": "Deformable objects often appear in unstructured configurations. Tracing deformable objects helps bringing them into extended states and facilitating the downstream manipulation tasks. Due to the requirements for object-specific modeling or sim-to-real transfer, existing tracing methods either lack generalizability across different categories of deformable objects or struggle to complete tasks reliably in the real world. To address this, we propose a novel visual-tactile imitation learning method to achieve one-dimensional (1D) and two-dimensional (2D) deformable object tracing with a unified model. Our method is designed from both local and global perspectives based on visual and tactile sensing. Locally, we introduce a weighted loss that emphasizes actions maintaining contact near the center of the tactile image, improving fine-grained adjustment. Globally, we propose a tracing task loss that helps the policy to regulate task progression. On the hardware side, to compensate for the limited features extracted from visual information, we integrate tactile sensing into a low-cost teleoperation system considering both the teleoperator and the robot. Extensive ablation and comparative experiments on diverse 1D and 2D deformable objects demonstrate the effectiveness of our approach, achieving an average success rate of 80% on seen objects and 65% on unseen objects.", "link": "http://arxiv.org/abs/2603.18784v1", "date": "2026-03-19", "relevancy": 2.753, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5733}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5404}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5381}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ViTac-Tracing%3A%20Visual-Tactile%20Imitation%20Learning%20of%20Deformable%20Object%20Tracing&body=Title%3A%20ViTac-Tracing%3A%20Visual-Tactile%20Imitation%20Learning%20of%20Deformable%20Object%20Tracing%0AAuthor%3A%20Yongqiang%20Zhao%20and%20Haining%20Luo%20and%20Yupeng%20Wang%20and%20Emmanouil%20Spyrakos%20Papastavridis%20and%20Yiannis%20Demiris%20and%20Shan%20Luo%0AAbstract%3A%20Deformable%20objects%20often%20appear%20in%20unstructured%20configurations.%20Tracing%20deformable%20objects%20helps%20bringing%20them%20into%20extended%20states%20and%20facilitating%20the%20downstream%20manipulation%20tasks.%20Due%20to%20the%20requirements%20for%20object-specific%20modeling%20or%20sim-to-real%20transfer%2C%20existing%20tracing%20methods%20either%20lack%20generalizability%20across%20different%20categories%20of%20deformable%20objects%20or%20struggle%20to%20complete%20tasks%20reliably%20in%20the%20real%20world.%20To%20address%20this%2C%20we%20propose%20a%20novel%20visual-tactile%20imitation%20learning%20method%20to%20achieve%20one-dimensional%20%281D%29%20and%20two-dimensional%20%282D%29%20deformable%20object%20tracing%20with%20a%20unified%20model.%20Our%20method%20is%20designed%20from%20both%20local%20and%20global%20perspectives%20based%20on%20visual%20and%20tactile%20sensing.%20Locally%2C%20we%20introduce%20a%20weighted%20loss%20that%20emphasizes%20actions%20maintaining%20contact%20near%20the%20center%20of%20the%20tactile%20image%2C%20improving%20fine-grained%20adjustment.%20Globally%2C%20we%20propose%20a%20tracing%20task%20loss%20that%20helps%20the%20policy%20to%20regulate%20task%20progression.%20On%20the%20hardware%20side%2C%20to%20compensate%20for%20the%20limited%20features%20extracted%20from%20visual%20information%2C%20we%20integrate%20tactile%20sensing%20into%20a%20low-cost%20teleoperation%20system%20considering%20both%20the%20teleoperator%20and%20the%20robot.%20Extensive%20ablation%20and%20comparative%20experiments%20on%20diverse%201D%20and%202D%20deformable%20objects%20demonstrate%20the%20effectiveness%20of%20our%20approach%2C%20achieving%20an%20average%20success%20rate%20of%2080%25%20on%20seen%20objects%20and%2065%25%20on%20unseen%20objects.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18784v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DViTac-Tracing%253A%2520Visual-Tactile%2520Imitation%2520Learning%2520of%2520Deformable%2520Object%2520Tracing%26entry.906535625%3DYongqiang%2520Zhao%2520and%2520Haining%2520Luo%2520and%2520Yupeng%2520Wang%2520and%2520Emmanouil%2520Spyrakos%2520Papastavridis%2520and%2520Yiannis%2520Demiris%2520and%2520Shan%2520Luo%26entry.1292438233%3DDeformable%2520objects%2520often%2520appear%2520in%2520unstructured%2520configurations.%2520Tracing%2520deformable%2520objects%2520helps%2520bringing%2520them%2520into%2520extended%2520states%2520and%2520facilitating%2520the%2520downstream%2520manipulation%2520tasks.%2520Due%2520to%2520the%2520requirements%2520for%2520object-specific%2520modeling%2520or%2520sim-to-real%2520transfer%252C%2520existing%2520tracing%2520methods%2520either%2520lack%2520generalizability%2520across%2520different%2520categories%2520of%2520deformable%2520objects%2520or%2520struggle%2520to%2520complete%2520tasks%2520reliably%2520in%2520the%2520real%2520world.%2520To%2520address%2520this%252C%2520we%2520propose%2520a%2520novel%2520visual-tactile%2520imitation%2520learning%2520method%2520to%2520achieve%2520one-dimensional%2520%25281D%2529%2520and%2520two-dimensional%2520%25282D%2529%2520deformable%2520object%2520tracing%2520with%2520a%2520unified%2520model.%2520Our%2520method%2520is%2520designed%2520from%2520both%2520local%2520and%2520global%2520perspectives%2520based%2520on%2520visual%2520and%2520tactile%2520sensing.%2520Locally%252C%2520we%2520introduce%2520a%2520weighted%2520loss%2520that%2520emphasizes%2520actions%2520maintaining%2520contact%2520near%2520the%2520center%2520of%2520the%2520tactile%2520image%252C%2520improving%2520fine-grained%2520adjustment.%2520Globally%252C%2520we%2520propose%2520a%2520tracing%2520task%2520loss%2520that%2520helps%2520the%2520policy%2520to%2520regulate%2520task%2520progression.%2520On%2520the%2520hardware%2520side%252C%2520to%2520compensate%2520for%2520the%2520limited%2520features%2520extracted%2520from%2520visual%2520information%252C%2520we%2520integrate%2520tactile%2520sensing%2520into%2520a%2520low-cost%2520teleoperation%2520system%2520considering%2520both%2520the%2520teleoperator%2520and%2520the%2520robot.%2520Extensive%2520ablation%2520and%2520comparative%2520experiments%2520on%2520diverse%25201D%2520and%25202D%2520deformable%2520objects%2520demonstrate%2520the%2520effectiveness%2520of%2520our%2520approach%252C%2520achieving%2520an%2520average%2520success%2520rate%2520of%252080%2525%2520on%2520seen%2520objects%2520and%252065%2525%2520on%2520unseen%2520objects.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.18784v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ViTac-Tracing%3A%20Visual-Tactile%20Imitation%20Learning%20of%20Deformable%20Object%20Tracing&entry.906535625=Yongqiang%20Zhao%20and%20Haining%20Luo%20and%20Yupeng%20Wang%20and%20Emmanouil%20Spyrakos%20Papastavridis%20and%20Yiannis%20Demiris%20and%20Shan%20Luo&entry.1292438233=Deformable%20objects%20often%20appear%20in%20unstructured%20configurations.%20Tracing%20deformable%20objects%20helps%20bringing%20them%20into%20extended%20states%20and%20facilitating%20the%20downstream%20manipulation%20tasks.%20Due%20to%20the%20requirements%20for%20object-specific%20modeling%20or%20sim-to-real%20transfer%2C%20existing%20tracing%20methods%20either%20lack%20generalizability%20across%20different%20categories%20of% {"title": "PromptHub: Enhancing Multi-Prompt Visual In-Context Learning with Locality-Aware Fusion, Concentration and Alignment", "author": "Tianci Luo and Jinpeng Wang and Shiyu Qin and Niu Lian and Yan Feng and Bin Chen and Chun Yuan and Shu-Tao Xia", "abstract": "Visual In-Context Learning (VICL) aims to complete vision tasks by imitating pixel demonstrations. Recent work pioneered prompt fusion that combines the advantages of various demonstrations, which shows a promising way to extend VICL. Unfortunately, the patch-wise fusion framework and model-agnostic supervision hinder the exploitation of informative cues, thereby limiting performance gains. To overcome this deficiency, we introduce PromptHub, a framework that holistically strengthens multi-prompting through locality-aware fusion, concentration and alignment. PromptHub exploits spatial priors to capture richer contextual information, employs complementary concentration, alignment, and prediction objectives to mutually guide training, and incorporates data augmentation to further reinforce supervision. Extensive experiments on three fundamental vision tasks demonstrate the superiority of PromptHub. Moreover, we validate its universality, transferability, and robustness across out-of-distribution settings, and various retrieval scenarios. This work establishes a reliable locality-aware paradigm for prompt fusion, moving beyond prior patch-wise approaches. Code is available at https://github.com/luotc-why/ICLR26-PromptHub.", "link": "http://arxiv.org/abs/2603.18891v1", "date": "2026-03-19", "relevancy": 2.7241, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5471}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5471}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5403}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PromptHub%3A%20Enhancing%20Multi-Prompt%20Visual%20In-Context%20Learning%20with%20Locality-Aware%20Fusion%2C%20Concentration%20and%20Alignment&body=Title%3A%20PromptHub%3A%20Enhancing%20Multi-Prompt%20Visual%20In-Context%20Learning%20with%20Locality-Aware%20Fusion%2C%20Concentration%20and%20Alignment%0AAuthor%3A%20Tianci%20Luo%20and%20Jinpeng%20Wang%20and%20Shiyu%20Qin%20and%20Niu%20Lian%20and%20Yan%20Feng%20and%20Bin%20Chen%20and%20Chun%20Yuan%20and%20Shu-Tao%20Xia%0AAbstract%3A%20Visual%20In-Context%20Learning%20%28VICL%29%20aims%20to%20complete%20vision%20tasks%20by%20imitating%20pixel%20demonstrations.%20Recent%20work%20pioneered%20prompt%20fusion%20that%20combines%20the%20advantages%20of%20various%20demonstrations%2C%20which%20shows%20a%20promising%20way%20to%20extend%20VICL.%20Unfortunately%2C%20the%20patch-wise%20fusion%20framework%20and%20model-agnostic%20supervision%20hinder%20the%20exploitation%20of%20informative%20cues%2C%20thereby%20limiting%20performance%20gains.%20To%20overcome%20this%20deficiency%2C%20we%20introduce%20PromptHub%2C%20a%20framework%20that%20holistically%20strengthens%20multi-prompting%20through%20locality-aware%20fusion%2C%20concentration%20and%20alignment.%20PromptHub%20exploits%20spatial%20priors%20to%20capture%20richer%20contextual%20information%2C%20employs%20complementary%20concentration%2C%20alignment%2C%20and%20prediction%20objectives%20to%20mutually%20guide%20training%2C%20and%20incorporates%20data%20augmentation%20to%20further%20reinforce%20supervision.%20Extensive%20experiments%20on%20three%20fundamental%20vision%20tasks%20demonstrate%20the%20superiority%20of%20PromptHub.%20Moreover%2C%20we%20validate%20its%20universality%2C%20transferability%2C%20and%20robustness%20across%20out-of-distribution%20settings%2C%20and%20various%20retrieval%20scenarios.%20This%20work%20establishes%20a%20reliable%20locality-aware%20paradigm%20for%20prompt%20fusion%2C%20moving%20beyond%20prior%20patch-wise%20approaches.%20Code%20is%20available%20at%20https%3A//github.com/luotc-why/ICLR26-PromptHub.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18891v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPromptHub%253A%2520Enhancing%2520Multi-Prompt%2520Visual%2520In-Context%2520Learning%2520with%2520Locality-Aware%2520Fusion%252C%2520Concentration%2520and%2520Alignment%26entry.906535625%3DTianci%2520Luo%2520and%2520Jinpeng%2520Wang%2520and%2520Shiyu%2520Qin%2520and%2520Niu%2520Lian%2520and%2520Yan%2520Feng%2520and%2520Bin%2520Chen%2520and%2520Chun%2520Yuan%2520and%2520Shu-Tao%2520Xia%26entry.1292438233%3DVisual%2520In-Context%2520Learning%2520%2528VICL%2529%2520aims%2520to%2520complete%2520vision%2520tasks%2520by%2520imitating%2520pixel%2520demonstrations.%2520Recent%2520work%2520pioneered%2520prompt%2520fusion%2520that%2520combines%2520the%2520advantages%2520of%2520various%2520demonstrations%252C%2520which%2520shows%2520a%2520promising%2520way%2520to%2520extend%2520VICL.%2520Unfortunately%252C%2520the%2520patch-wise%2520fusion%2520framework%2520and%2520model-agnostic%2520supervision%2520hinder%2520the%2520exploitation%2520of%2520informative%2520cues%252C%2520thereby%2520limiting%2520performance%2520gains.%2520To%2520overcome%2520this%2520deficiency%252C%2520we%2520introduce%2520PromptHub%252C%2520a%2520framework%2520that%2520holistically%2520strengthens%2520multi-prompting%2520through%2520locality-aware%2520fusion%252C%2520concentration%2520and%2520alignment.%2520PromptHub%2520exploits%2520spatial%2520priors%2520to%2520capture%2520richer%2520contextual%2520information%252C%2520employs%2520complementary%2520concentration%252C%2520alignment%252C%2520and%2520prediction%2520objectives%2520to%2520mutually%2520guide%2520training%252C%2520and%2520incorporates%2520data%2520augmentation%2520to%2520fur er%20contextual%20information%2C%20employs%20complementary%20concentration%2C%20alignment%2C%20and%20prediction%20objectives%20to%20mutually%20guide%20training%2C%20and%20incorporates%20data%20augmentation%20to%20further%20reinforce%20supervision.%20Extensive%20experiments%20on%20three%20fundamental%20vision%20tasks%20demonstrate%20the%20superiority%20of%20PromptHub.%20Moreover%2C%20we%20validate%20its%20universality%2C%20transferability%2C%20and%20robustness%20across%20out-of-distribution%20settings%2C%20and%20various%20retrieval%20scenarios.%20This%20work%20establishes%20a%20reliable%20locality-aware%20paradigm%20for%20prompt%20fusion%2C%20moving%20beyond%20prior%20patch-wise%20approaches.%20Code%20is%20available%20at%20https%3A//github.com/luotc-why/ICLR26-PromptHub.&entry.1838667208=http%3A//arxiv.org/abs/2603.18891v1&entry.124074799=Read"},
{"title": "SEM: Sparse Embedding Modulation for Post-Hoc Debiasing of Vision-Language Models", "author": "Quentin Guimard and Federico Bartsch and Simone Caldarella and Rahaf Aljundi and Elisa Ricci and Massimiliano Mancini", "abstract": "Models that bridge vision and language, such as CLIP, are key components of multimodal AI, yet their large-scale, uncurated training data introduce severe social and spurious biases. Existing post-hoc debiasing methods often operate directly in the dense CLIP embedding space, where bias and task-relevant information are highly entangled. This entanglement limits their ability to remove bias without degrading semantic fidelity. In this work, we propose Sparse Embedding Modulation (SEM), a post-hoc, zero-shot debiasing framework that operates in a Sparse Autoencoder (SAE) latent space. By decomposing CLIP text embeddings into disentangled features, SEM identifies and modulates bias-relevant neurons while preserving query-relevant ones. This enables more precise, non-linear interventions. Across four benchmark datasets and two CLIP backbones, SEM achieves substantial fairness gains in retrieval and zero-shot classification. Our results demonstrate that sparse latent representations provide an effective foundation for post-hoc debiasing of vision-language models.", "link": "http://arxiv.org/abs/2603.19028v1", "date": "2026-03-19", "relevancy": 2.7067, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5557}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5341}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5341}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SEM%3A%20Sparse%20Embedding%20Modulation%20for%20Post-Hoc%20Debiasing%20of%20Vision-Language%20Models&body=Title%3A%20SEM%3A%20Sparse%20Embedding%20Modulation%20for%20Post-Hoc%20Debiasing%20of%20Vision-Language%20Models%0AAuthor%3A%20Quentin%20Guimard%20and%20Federico%20Bartsch%20and%20Simone%20Caldarella%20and%20Rahaf%20Aljundi%20and%20Elisa%20Ricci%20and%20Massimiliano%20Mancini%0AAbstract%3A%20Models%20that%20bridge%20vision%20and%20language%2C%20such%20as%20CLIP%2C%20are%20key%20components%20of%20multimodal%20AI%2C%20yet%20their%20large-scale%2C%20uncurated%20training%20data%20introduce%20severe%20social%20and%20spurious%20biases.%20Existing%20post-hoc%20debiasing%20methods%20often%20operate%20directly%20in%20the%20dense%20CLIP%20embedding%20space%2C%20where%20bias%20and%20task-relevant%20information%20are%20highly%20entangled.%20This%20entanglement%20limits%20their%20ability%20to%20remove%20bias%20without%20degrading%20semantic%20fidelity.%20In%20this%20work%2C%20we%20propose%20Sparse%20Embedding%20Modulation%20%28SEM%29%2C%20a%20post-hoc%2C%20zero-shot%20debiasing%20framework%20that%20operates%20in%20a%20Sparse%20Autoencoder%20%28SAE%29%20latent%20space.%20By%20decomposing%20CLIP%20text%20embeddings%20into%20disentangled%20features%2C%20SEM%20identifies%20and%20modulates%20bias-relevant%20neurons%20while%20preserving%20query-relevant%20ones.%20This%20enables%20more%20precise%2C%20non-linear%20interventions.%20Across%20four%20benchmark%20datasets%20and%20two%20CLIP%20backbones%2C%20SEM%20achieves%20substantial%20fairness%20gains%20in%20retrieval%20and%20zero-shot%20classification.%20Our%20results%20demonstrate%20that%20sparse%20latent%20representations%20provide%20an%20effective%20foundation%20for%20post-hoc%20debiasing%20of%20vision-language%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19028v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSEM%253A%2520Sparse%2520Embedding%2520Modulation%2520for%2520Post-Hoc%2520 {"title": "Rethinking MLLM Itself as a Segmenter with a Single Segmentation Token", "author": "Anqi Zhang and Xiaokang Ji and Guangyu Gao and Jianbo Jiao and Chi Harold Liu and Yunchao Wei", "abstract": "Recent segmentation methods leveraging Multi-modal Large Language Models (MLLMs) have shown reliable object-level segmentation and enhanced spatial perception. However, almost all previous methods predominantly rely on specialist mask decoders to interpret masks from generated segmentation-related embeddings and visual features, or incorporate multiple additional tokens to assist. This paper aims to investigate whether and how we can unlock segmentation from MLLM itSELF with 1 segmentation Embedding (SELF1E) while achieving competitive results, which eliminates the need for external decoders. To this end, our approach targets the fundamental limitation of resolution reduction in pixel-shuffled image features from MLLMs. First, we retain image features at their original uncompressed resolution, and refill them with residual features extracted from MLLM-processed compressed features, thereby improving feature precision. Subsequently, we integrate pixel-unshuffle operations on image features with and without LLM processing, respectively, to unleash the details of compressed features and amplify the residual features under uncompressed resolution, which further enhances the resolution of refilled features. Moreover, we redesign the attention mask with dual perception pathways, i.e., image-to-image and image-to-segmentation, enabling rich feature interaction between pixels and the segmentation token. Comprehensive experiments across multiple segmentation tasks validate that SELF1E achieves performance competitive with specialist mask decoder-based methods, demonstrating the feasibility of decoder-free segmentation in MLLMs. Project page: https://github.com/ANDYZAQ/SELF1E.", "link": "http://arxiv.org/abs/2603.19026v1", "date": "2026-03-19", "relevancy": 2.663, "topK": [{" MLLM-processed%20compressed%20features%2C%20thereby%20improving%20feature%20precision.%20Subsequently%2C%20we%20integrate%20pixel-unshuffle%20operations%20on%20image%20features%20with%20and%20without%20LLM%20processing%2C%20respectively%2C%20to%20unleash%20the%20details%20of%20compressed%20features%20and%20amplify%20the%20residual%20features%20under%20uncompressed%20resolution%2C%20which%20further%20enhances%20the%20resolution%20of%20refilled%20features.%20Moreover%2C%20we%20redesign%20the%20attention%20mask%20with%20dual%20perception%20pathways%2C%20i.e.%2C%20image-to-image%20and%20image-to-segmentation%2C%20enabling%20rich%20feature%20interaction%20between%20pixels%20and%20the%20segmentation%20token.%20Comprehensive%20experiments%20across%20multiple%20segmentation%20tasks%20validate%20that%20SELF1E%20achieves%20performance%20competitive%20with%20specialist%20mask%20decoder-based%20methods%2C%20demonstrating%20the%20feasibility%20of%20decoder-free%20segmentation%20in%20MLLMs.%20Project%20page%3A%20https%3A//github.com/ANDYZAQ/SELF1E.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19026v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRethinking%2520MLLM%2520Itself%2520as%2520a%2520Segmenter%2520with%2520a%2520Single%2520Segmentation%2520Token%26entry.906535625%3DAnqi%2520Zhang%2520and%2520Xiaokang%2520Ji%2520and%2520Guangyu%2520Gao%2520and%2520Jianbo%2520Jiao%2520and%2520Chi%2520Harold%2520Liu%2520and%2520Yunchao%2520Wei%26entry.1292438233%3DRecent%2520segmentation%2520methods%2520leveraging%2520Multi-modal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520have%2520shown%2520reliable%2520object-level%2520segmentation%2520and%2520enhanced%2520spatial%2520perception.%2520However%252C%2520almost%2520all%2520previous%2520methods%2520predominantly%2520rely%2520on%2520specialist%2520mask%2520decoders%2520to%2520interpret%2520masks%2520from%2520generated%2520segmentation-related%2520e monstrating%2520the%2520feasibility%2520of%2520decoder-free%2520segmentation%2520in%2520MLLMs.%2520Project%2520page%253A%2520https%253A//github.com/ANDYZAQ/SELF1E.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.19026v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Rethinking%20MLLM%20Itself%20as%20a%20Segmenter%20with%20a%20Single%20Segmentation%20Token&entry.906535625=Anqi%20Zhang%20and%20Xiaokang%20Ji%20and%20Guangyu%20Gao%20and%20Jianbo%20Jiao%20and%20Chi%20Harold%20Liu%20and%20Yunchao%20Wei&entry.1292438233=Recent%20segmentation%20methods%20leveraging%20Multi-modal%20Large%20Language%20Models%20%28MLLMs%29%20have%20shown%20reliable%20object-level%20segmentation%20and%20enhanced%20spatial%20perception.%20However%2C%20almost%20all%20previous%20methods%20predominantly%20rely%20on%20specialist%20mask%20decoders%20to%20interpret%20masks%20from%20generated%20segmentation-related%20embeddings%20and%20visual%20features%2C%20or%20incorporate%20multiple%20additional%20tokens%20to%20assist.%20This%20paper%20aims%20to%20investigate%20whether%20and%20how%20we%20can%20unlock%20segmentation%20from%20MLLM%20itSELF%20with%201%20segmentation%20Embedding%20%28SELF1E%29%20while%20achieving%20competitive%20results%2C%20which%20eliminates%20the%20need%20for%20external%20decoders.%20To%20this%20end%2C%20our%20approach%20targets%20the%20fundamental%20limitation%20of%20resolution%20reduction%20in%20pixel-shuffled%20image%20features%20from%20MLLMs.%20First%2C%20we%20retain%20image%20features%20at%20their%20original%20uncompressed%20resolution%2C%20and%20refill%20them%20with%20residual%20features%20extracted%20from%20MLLM-processed%20compressed%20features%2C%20thereby%20improving%20feature%20precision.%20Subsequently%2C%20we%20integrate%20pixel-unshuffle%20operations%20on%20image%20features%20with%20and%20without%20LLM%20processing%2C%20respectively%2C%20to%20unleash%20the%20deta {"title": "DROID-SLAM in the Wild", "author": "Moyang Li and Zihan Zhu and Marc Pollefeys and Daniel Barath", "abstract": "We present a robust, real-time RGB SLAM system that handles dynamic environments by leveraging differentiable Uncertainty-aware Bundle Adjustment. Traditional SLAM methods typically assume static scenes, leading to tracking failures in the presence of motion. Recent dynamic SLAM approaches attempt to address this challenge using predefined dynamic priors or uncertainty-aware mapping, but they remain limited when confronted with unknown dynamic objects or highly cluttered scenes where geometric mapping becomes unreliable. In contrast, our method estimates per-pixel uncertainty by exploiting multi-view visual feature inconsistency, enabling robust tracking and reconstruction even in real-world environments. The proposed system achieves state-of-the-art camera poses and scene geometry in cluttered dynamic scenarios while running in real time at around 10 FPS. Code and datasets are available at https://github.com/MoyangLi00/DROID-W.git.", "link": "http://arxiv.org/abs/2603.19076v1", "date": "2026-03-19", "relevancy": 2.6584, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.7021}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.648}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6124}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DROID-SLAM%20in%20the%20Wild&body=Title%3A%20DROID-SLAM%20in%20the%20Wild%0AAuthor%3A%20Moyang%20Li%20and%20Zihan%20Zhu%20and%20Marc%20Pollefeys%20and%20Daniel%20Barath%0AAbstract%3A%20We%20present%20a%20robust%2C%20real-time%20RGB%20SLAM%20system%20that%20handles%20dynamic%20environments%20by%20leveraging%20differentiable%20Uncertainty-aware%20Bundle%20Adjustment.%20Traditional%20SLAM%20methods%20typically%20assume%20static%20scenes%2C%20leading%20to%20tracking%20failures%20in%20the%20presence%20of%20motion.%20Recent%20dynamic%20SLAM%20approaches%20attempt%20to%20address%20this%20challenge%20using%20predefined%20dynamic%20priors%20or%20uncertainty-aware%20mapping%2C%20but%20they%20remain%20limited%20when%20confronted%20with%20unknown%20dynamic%20objects%20or%20highly%20cluttered%20scenes%20where%20geometric%20mapping%20becomes%20unreliable.%20In%20contrast%2C%20our%20method%20estimates%20per-pixel%20uncertainty%20by%20exploiting%20multi-view%20visual%20feature%20inconsistency%2C%20enabling%20robust%20tracking%20and%20reconstruction%20even%20in%20real-world%20environments.%20The%20proposed%20system%20achieves%20state-of-the-art%20camera%20poses%20and%20scene%20geometry%20in%20cluttered%20dynamic%20scenarios%20while%20running%20in%20real%20time%20at%20around%2010%20FPS.%20Code%20and%20datasets%20are%20available%20at%20https%3A//github.com/MoyangLi00/DROID-W.git.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19076v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDROID-SLAM%2520in%2520the%2520Wild%26entry.906535625%3DMoyang%2520Li%2520and%2520Zihan%2520Zhu%2520and%2520Marc%2520Pollefeys%2520and%2520Daniel%2520Barath%26entry.1292438233%3DWe%2520present%2520a%2520robust%252C%2520real-time%2520RGB%2520SLAM%2520system%2520that%2520handles%2520dynamic%2520environments%2520by%2520leveraging%2520differentiable%2520Uncertainty-aware%2520Bundle%2520Adjustment.%2520Traditional%2520SLAM%2520methods%2520typically%2520assume%2520static%2520scenes%252C%2520leading%2520to%2520tracking%2520failures%2520in%2520the%2520presence%2520of%2520motion.%2520Recent%2520dynamic%2520SLAM%2520approaches%2520attempt%2520to%2520address%2520this%2520challenge%2520using%2520predefined%2520dynamic%2520priors%2520or%2520uncertainty-aware%2520mapping%252C%2520but%2520they%2520remain%2520limited%2520when%2520confronted%2520with%2520unknown%2520dynamic%2520objects%2520or%2520highly%2520cluttered%2520scenes%2520where%2520geometric%2520mapping%2520becomes%2520unreliable.%2520In%2520contrast%252C%2520our%2520method%2520estimates%2520per-pixel%2520uncertainty%2520by%2520exploiting%2520multi-view%2520visual%2520feature%2520inconsistency%252C%2520enabling%2520robust%2520tracking%2520and%2520reconstruction%2520even%2520in%2520real-world%2520environments.%2520The%2520proposed%2520system%2520achieves%2520state-of-the-art%2520camera%2520poses%2520and%2520scene%2520geometry%2520in%2520cluttered%2520dynamic%2520scenarios%2520while%2520running%2520in%2520real%2520time%2520at%2520around%252010%2520FPS.%2520Code%2520and%2520datasets%2520are%2520available%2520at%2520https%253A//github.com/MoyangLi00/DROID-W.git.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.19076v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=DROID-SLAM%20in%20the%20Wild&entry.906535625=Moyang%20Li%20and%20Zihan%20Zhu%20and%20Marc%20Pollefeys%20and%20Daniel%20Barath&entry.1292438233=We%20present%20a%20robust%2C%20real-time%20RGB%20SLAM%20system%20that%20handles%20dynamic%20environments%20by%20leveraging%20differentiable%20Uncertainty-aware%20Bundle%20Adjustment.%20Traditional%20SLAM%20methods%20typically%20assume%20static%20scenes%2C%20leading%20to%20tracking%20failures%20in%20the%20presence%20of%20motion.%20Recent%20dynamic%20SLAM%20approaches%20attempt%20to%20address%20this%20challenge%20using%20predefined%20dynamic%20priors%20or%20uncertainty-aware%20mapping%2C%20but%20they%20remain%20limited%20when%20confronted%20with%20unknown%20dynamic%20objects%20or%20highly%20cluttered%20scenes%20where%20geometric%20mapping%20becomes%20unreliable.%20In%20contrast%2C%20our%20method% {"title": "Enhancing Pretrained Model-based Continual Representation Learning via Guided Random Projection", "author": "Ruilin Li and Heming Zou and Xiufeng Yan and Zheming Liang and Jie Yang and Chenliang Li and Xue Yang", "abstract": "Recent paradigms in Random Projection Layer (RPL)-based continual representation learning have demonstrated superior performance when building upon a pre-trained model (PTM). These methods insert a randomly initialized RPL after a PTM to enhance feature representation in the initial stage. Subsequently, a linear classification head is used for analytic updates in the continual learning stage. However, under severe domain gaps between pre-trained representations and target domains, a randomly initialized RPL exhibits limited expressivity under large domain shifts. While largely scaling up the RPL dimension can improve expressivity, it also induces an ill-conditioned feature matrix, thereby destabilizing the recursive analytic updates of the linear head. To this end, we propose the Stochastic Continual Learner with MemoryGuard Supervisory Mechanism (SCL-MGSM). Unlike random initialization, MGSM constructs the projection layer via a principled, data-guided mechanism that progressively selects target-aligned random bases to adapt the PTM representation to downstream tasks. This facilitates the construction of a compact yet expressive RPL while improving the numerical stability of analytic updates. Extensive experiments on multiple exemplar-free Class Incremental Learning (CIL) benchmarks demonstrate that SCL-MGSM achieves superior performance compared to state-of-the-art methods.", "link": "http://arxiv.org/abs/2603.19145v1", "date": "2026-03-19", "relevancy": 2.6551, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5537}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.526}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5133}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Enhancing%20Pretrained%20Model-based%20Continual%20Representation%20Learning%20via%20Guided%20Random%20Projection&body=Title%3A%20Enhancing%20Pretrained%20Model-based%20Continual%20Representation%20Learning%20via%20Guided%20Random%20Projection%0AAuthor%3A%20Ruilin%20Li%20and%20Heming%20Zou%20and%20Xiufeng%20Yan%20and%20Zheming%20Liang%20and%20Jie%20Yang%20and%20Chenliang%20Li%20and%20Xue%20Yang%0AAbstract%3A%20Recent%20paradigms%20in%20Random%20Projection%20Layer%20%28RPL%29-based%20continual%20representation%20learning%20have%20demonstrated%20superior%20performance%20when%20building%20upon%20a%20pre-trained%20model%20%28PTM%29.%20These%20methods%20insert%20a%20randomly%20initialized%20RPL%20after%20a%20PTM%20to%20enhance%20feature%20representation%20in%20the%20initial%20stage.%20Subsequently%2C%20a%20linear%20classification%20head%20is%20used%20for%20analytic%20updates%20in%20the%20continual%20learning%20stage.%20However%2C%20under%20severe%20domain%20gaps%20between%20pre-trained%20representations%20and%20target%20domains%2C%20a%20randomly%20initialized%20RPL%20exhibits%20limited%20expressivity%20under%20large%20domain%20shifts.%20While%20largely%20scaling%20up%20the%20RPL%20dimension%20can%20improve%20expressivity%2C%20it%20also%20induces%20an%20ill-conditioned%20feature%20matrix%2C%20thereby%20destabilizing%20the%20recursive%20analytic%20updates%20of%20the%20linear%20head.%20To%20this%20end%2C%20we%20propose%20the%20Stochastic%20Continual%20Learner%20with%20MemoryGuard%20Supervisory%20Mechanism%20%28SCL-MGSM%29.%20Unlike%20random%20initialization%2C%20MGSM%20constructs%20the%20projection%20layer%20via%20a%20principled%2C%20data-guided%20mechanism%20that%20progressively%20selects%20target-aligned%20random%20bases%20to%2

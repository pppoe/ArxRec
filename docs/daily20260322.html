ing%2520the%2520privacy-utility%2520trade-off%2520in%2520variational%2520models%252C%2520making%2520them%2520more%2520robust%2520and%2520practical.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.09583v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Nonparametric%20Variational%20Differential%20Privacy%20via%20Embedding%20Parameter%20Clipping&entry.906535625=Dina%20El%20Zein%20and%20Shashi%20Kumar%20and%20James%20Henderson&entry.1292438233=The%20nonparametric%20variational%20information%20bottleneck%20%28NVIB%29%20provides%20the%20foundation%20for%20nonparametric%20variational%20differential%20privacy%20%28NVDP%29%2C%20a%20framework%20for%20building%20privacy-preserving%20language%20models.%20However%2C%20the%20learned%20latent%20representations%20can%20drift%20into%20regions%20with%20high%20information%20content%2C%20leading%20to%20poor%20privacy%20guarantees%2C%20but%20also%20low%20utility%20due%20to%20numerical%20instability%20during%20training.%20In%20this%20work%2C%20we%20introduce%20a%20principled%20parameter%20clipping%20strategy%20to%20directly%20address%20this%20issue.%20Our%20method%20is%20mathematically%20derived%20from%20the%20objective%20of%20minimizing%20the%20R%C3%A9nyi%20Divergence%20%28RD%29%20upper%20bound%2C%20yielding%20specific%2C%20theoretically%20grounded%20constraints%20on%20the%20posterior%20mean%2C%20variance%2C%20and%20mixture%20weight%20parameters.%20We%20apply%20our%20technique%20to%20an%20NVIB%20based%20model%20and%20empirically%20compare%20it%20against%20an%20unconstrained%20baseline.%20Our%20findings%20demonstrate%20that%20the%20clipped%20model%20consistently%20achieves%20tighter%20RD%20bounds%2C%20implying%20stronger%20privacy%2C%20while%20simultaneously%20attaining%20higher%20performance%20on%20several%20downstream%20tasks.%20This%20work%20presents%20a%20simple%20yet%20effective%20method%20for%20improving%20the%20privacy-utility%20trade-off%20in%20variational%20models%2C%20making%20them%20more%20robust%20and%20practical.&entry.1838667208=http%3A//arxiv.org/abs/2603.09583v2&entry.124074799=Read"},
{"title": "SAVeS: Steering Safety Judgments in Vision-Language Models via Semantic Cues", "author": "Carlos Hinojosa and Clemens Grange and Bernard Ghanem", "abstract": "Vision-language models (VLMs) are increasingly deployed in real-world and embodied settings where safety decisions depend on visual context. However, it remains unclear which visual evidence drives these judgments. We study whether multimodal safety behavior in VLMs can be steered by simple semantic cues. We introduce a semantic steering framework that applies controlled textual, visual, and cognitive interventions without changing the underlying scene content. To evaluate these effects, we propose SAVeS, a benchmark for situational safety under semantic cues, together with an evaluation protocol that separates behavioral refusal, grounded safety reasoning, and false refusals. Experiments across multiple VLMs and an additional state-of-the-art benchmark show that safety decisions are highly sensitive to semantic cues, indicating reliance on learned visual-linguistic associations rather than grounded visual understanding. We further demonstrate that automated steering pipelines can exploit these mechanisms, highlighting a potential vulnerability in multimodal safety systems.", "link": "http://arxiv.org/abs/2603.19092v1", "date": "2026-03-19", "relevancy": 2.2186, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5895}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5538}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5416}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SAVeS%3A%20Steering%20Safety%20Judgments%20in%20Vision-Language%20Models%20via%20Semantic%20Cues&body=Title%3A%20SAVeS%3A%20Steering%20Safety%20Judgments%20in%20Vision-Language%20Models%20via%20Semantic%20Cues%0AAuthor%3A%20Carlos%20Hinojosa%20and%20Clemens%20Grange%20and%20Bernard%20Ghanem%0AAbstract%3A%20Vision-language%20models%20%28VLMs%29%20are%20increasingly%20deployed%20in%20real-world%20and%20embodied%20settings%20where%20safety%20decisions%20depend%20on%20visual%20context.%20However%2C%20it%20remains%20unclear%20which%20visual%20evidence%20drives%20these%20judgments.%20We%20study%20whether%20multimodal%20safety%20behavior%20in%20VLMs%20can%20be%20steered%20by%20simple%20semantic%20cues.%20We%20introduce%20a%20semantic%20steering%20framework%20that%20applies%20controlled%20textual%2C%20visual%2C%20and%20cognitive%20interventions%20without%20changing%20the%20underlying%20scene%20content.%20To%20evaluate%20these%20effects%2C%20we%20propose%20SAVeS%2C%20a%20benchmark%20for%20situational%20safety%20under%20semantic%20cues%2C%20together%20with%20an%20evaluation%20protocol%20that%20separates%20behavioral%20refusal%2C%20grounded%20safety%20reasoning%2C%20and%20false%20refusals.%20Experiments%20across%20multiple%20VLMs%20and%20an%20additional%20state-of-the-art%20benchmark%20show%20that%20safety%20decisions%20are%20highly%20sensitive%20to%20semantic%20cues%2C%20indicating%20reliance%20on%20learned%20visual-linguistic%20associations%20rather%20than%20grounded%20visual%20understanding.%20We%20further%20demonstrate%20that%20automated%20steering%20pipelines%20can%20exploit%20these%20mechanisms%2C%20highlighting%20a%20potential%20vulnerability%20in%20multimodal%20safety%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19092v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSAVeS%253A%2520Steering%2520Safety%2520Judgments%2520in%2520Vision-Language%2520Models%2520via%2520Semantic%2520Cues%26entry.906535625%3DCarlos%2520Hinojosa%2520and%2520Clemens%2520Grange%2520and%2520Bernard%2520Ghanem%26entry.1292438233%3DVision-language%2520models%2520%2528VLMs%2529%2520are%2520increasingly%2520deployed%2520in%2520real-world%2520and%2520embodied%2520settings%2520where%2520safety%2520decisions%2520depend%2520on%2520visual%2520context.%2520However%252C%2520it%2520remains%2520unclear%2520which%2520visual%2520evidence%2520drives%2520these%2520judgments.%2520We%2520study%2520whether%2520multimodal%2520safety%2520behavior%2520in%2520VLMs%2520can%2520be%2520steered%2520by%2520simple%2520semantic%2520cues.%2520We%2520introduce%2520a%2520semantic%2520steering%2520framework%2520that%2520applies%2520controlled%2520textual%252C%2520visual%252C%2520and%2520cognitive%2520interventions%2520without%2520changing%2520the%2520underlying%2520scene%2520content.%2520To%2520evaluate%2520these%2520effects%252C%2520we%2520propose%2520SAVeS%252C%2520a%2520benchmark%2520for%2520situational%2520safety%2520under%2520semantic%2520cues%252C%2520together%2520with%2520an%2520evaluation%2520protocol%2520that%2520separates%2520behavioral%2520refusal%252C%2520grounded%2520safety%2520reasoning%252C%2520and%2520false%2520refusals.%2520Experiments%2520across%2520multiple%2520VLMs%2520and%2520an%2520additional%2520state-of-the-art%2520benchmark%2520show%2520that%2520safety%2520decisions%2520are%2520highly%2520sensitive%2520to%2520semantic%2520cues%252C%2520indicating%2520reliance%2520on%2520learned%2520visual-linguistic%2520associations%2520rather%2520than%2520grounded%2520visual%2520understanding.%2520We%2520further%2520demonstrate%2520that%2520automated%2520steering%2520pipelines%2520can%2520exploit%2520these%2520mechanisms%252C%2520highlighting%2520a%2520potential%2520vulnerability%2520in%2520multimodal%2520safety%2520systems.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.19092v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SAVeS%3A%20Steering%20Safety%20Judgments%20in%20Vision-Language%20Models%20via%20Semantic%20Cues&entry.906535625=Carlos%20Hinojosa%20and%20Clemens%20Grange%20and%20Bernard%20Ghanem&entry.1292438233=Vision-language%20models%20%28VLMs%29%20are%20increasingly%20deployed%20in%20real-world%20and%20embodied%20settings%20where%20safety%20decisions%20depend%20on%20visual%20context.%20However%2C%20it%20remains%20unclear%20which%20visual%20evidence%20drives%20these%20judgments.%20We%20study%20whether%20multimodal%20safety%20behavior%20in%20VLMs%20can%20be%20steered%20by%20simple%20semantic%20cues.%20We%20introduce%20a%20semantic%20steering%20framework%20that%20applies%20controlled%20textual%2C%20visual%2C%20and%20cognitive%20interventions%20without%20changing%20the%20underlying%20scene%20content.%20To%20evaluate%20these%20effects%2C%20we%20propose%20SAVeS%2C%20a%20benchmark%20for%20situational%20safety%20under%20semantic%20cues%2C%20together%20with%20an%20evaluation%20protocol%20that%20separates%20behavioral%20refusal%2C%20grounded%20safety%20reasoning%2C%20and%20false%20refusals.%20Experiments%20across%20multiple%20VLMs%20and%20an%20additional%20state-of-the-art%20benchmark%20show%20that%20safety%20decisions%20are%20highly%20sensitive%20to%20semantic%20cues%2C%20indicating%20reliance%20on%20learned%20visual-linguistic%20associations%20rather%20than%20grounded%20visual%20understanding.%20We%20further%20demonstrate%20that%20automated%20steering%20pipelines%20can%20exploit%20these%20mechanisms%2C%20highlighting%20a%20potential%20vulnerability%20in%20multimodal%20safety%20systems.&entry.1838667208=http%3A//arxiv.org/abs/2603.19092v1&entry.124074799=Read"},
{"title": "SAMA: Factorized Semantic Anchoring and Motion Alignment for Instruction-Guided Video Editing", "author": "Xinyao Zhang and Wenkai Dong and Yuxin Song and Bo Fang and Qi Zhang and Jing Wang and Fan Chen and Hui Zhang and Haocheng Feng and Yu Lu and Hang Zhou and Chun Yuan and Jingdong Wang", "abstract": "Current instruction-guided video editing models struggle to simultaneously balance precise semantic modifications with faithful motion preservation. While existing approaches rely on injecting explicit external priors (e.g., VLM features or structural conditions) to mitigate these issues, this reliance severely bottlenecks model robustness and generalization. To overcome this limitation, we present SAMA (factorized Semantic Anchoring and Motion Alignment), a framework that factorizes video editing into semantic anchoring and motion modeling. First, we introduce Semantic Anchoring, which establishes a reliable visual anchor by jointly predicting semantic tokens and video latents at sparse anchor frames, enabling purely instruction-aware structural planning. Second, Motion Alignment pre-trains the same backbone on motion-centric video restoration pretext tasks (cube inpainting, speed perturbation, and tube shuffle), enabling the model to internalize temporal dynamics directly from raw videos. SAMA is optimized with a two-stage pipeline: a factorized pre-training stage that learns inherent semantic-motion representations without paired video-instruction editing data, followed by supervised fine-tuning on paired editing data. Remarkably, the factorized pre-training alone already yields strong zero-shot video editing ability, validating the proposed factorization. SAMA achieves state-of-the-art performance among open-source models and is competitive with leading commercial systems (e.g., Kling-Omni). Code, models, and datasets will be released.", "link": "http://arxiv.org/abs/2603.19228v1", "date": "2026-03-19", "relevancy": 2.218, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.607}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.544}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.544}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SAMA%3A%20Factorized%20Semantic%20Anchoring%20and%20Motion%20Alignment%20for%20Instruction-Guided%20Video%20Editing&body=Title%3A%20SAMA%3A%20Factorized%20Semantic%20Anchoring%20and%20Motion%20Alignment%20for%20Instruction-Guided%20Video%20Editing%0AAuthor%3A%20Xinyao%20Zhang%20and%20Wenkai%20Dong%20and%20Yuxin%20Song%20and%20Bo%20Fang%20and%20Qi%20Zhang%20and%20Jing%20Wang%20and%20Fan%20Chen%20and%20Hui%20Zhang%20and%20Haocheng%20Feng%20and%20Yu%20Lu%20and%20Hang%20Zhou%20and%20Chun%20Yuan%20and%20Jingdong%20Wang%0AAbstract%3A%20Current%20instruction-guided%20video%20editing%20models%20struggle%20to%20simultaneously%20balance%20precise%20semantic%20modifications%20with%20faithful%20motion%20preservation.%20While%20existing%20approaches%20rely%20on%20injecting%20explicit%20external%20priors%20%28e.g.%2C%20VLM%20features%20or%20structural%20conditions%29%20to%20mitigate%20these%20issues%2C%20this%20reliance%20severely%20bottlenecks%20model%20robustness%20and%20generalization.%20To%20overcome%20this%20limitation%2C%20we%20present%20SAMA%20%28factorized%20Semantic%20Anchoring%20and%20Motion%20Alignment%29%2C%20a%20framework%20that%20factorizes%20video%20editing%20into%20semantic%20anchoring%20and%20motion%20modeling.%20First%2C%20we%20introduce%20Semantic%20Anchoring%2C%20which%20establishes%20a%20reliable%20visual%20anchor%20by%20jointly%20predicting%20semantic%20tokens%20and%20video%20latents%20at%20sparse%20anchor%20frames%2C%20enabling%20purely%20instruction-aware%20structural%20planning.%20Second%2C%20Motion%20Alignment%20pre-trains%20the%20same%20backbone%20on%20motion-centric%20video%20restoration%20pretext%20tasks%20%28cube%20inpainting%2C%20speed%20perturbation%2C%20and%20tube%20shuffle%29%2C%20enabling%20the%20model%20to%20internalize%20temporal%20dynamics%20directly%20from%20raw%20videos.%20SAMA%20is%20optimized%20with%20a%20two-stage%20pipeline%3A%20a%20factorized%20pre-training%20stage%20that%20learns%20inherent%20semantic-motion%20representations%20without%20paired%20video-instruction%20editing%20data%2C%20followed%20by%20supervised%20fine-tuning%20on%20paired%20editing%20data.%20Remarkably%2C%20the%20factorized%20pre-training%20alone%20already%20yields%20strong%20zero-shot%20video%20editing%20ability%2C%20validating%20the%20proposed%20factorization.%20SAMA%20achieves%20state-of-the-art%20performance%20among%20open-source%20models%20and%20is%20competitive%20with%20leading%20commercial%20systems%20%28e.g.%2C%20Kling-Omni%29.%20Code%2C%20models%2C%20and%20datasets%20will%20be%20released.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19228v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSAMA%253A%2520Factorized%2520Semantic%2520Anchoring%2520and%2520Motion%2520Alignment%2520for%2520Instruction-Guided%2520Video%2520Editing%26entry.906535625%3DXinyao%2520Zhang%2520and%2520Wenkai%2520Dong%2520and%2520Yuxin%2520Song%2520and%2520Bo%2520Fang%2520and%2520Qi%2520Zhang%2520and%2520Jing%2520Wang%2520and%2520Fan%2520Chen%2520and%2520Hui%2520Zhang%2520and%2520Haocheng%2520Feng%2520and%2520Yu%2520Lu%2520and%2520Hang%2520Zhou%2520and%2520Chun%2520Yuan%2520and%2520Jingdong%2520Wang%26entry.1292438233%3DCurrent%2520instruction-guided%2520video%2520editing%2520models%2520struggle%2520to%2520simultaneously%2520balance%2520precise%2520semantic%2520modifications%2520with%2520faithful%2520motion%2520preservation.%2520While%2520e {"title": "A Multi-Agent Perception-Action Alliance for Efficient Long Video Reasoning", "author": "Yichang Xu and Gaowen Liu and Ramana Rao Kompella and Tiansheng Huang and Sihao Hu and Fatih Ilhan and Selim Furkan Tekin and Zachary Yahn and Ling Liu", "abstract": "This paper presents a multi-agent perception-action exploration alliance, dubbed A4VL, for efficient long-video reasoning. A4VL operates in a multi-round perception-action exploration loop with a selection of VLM agents. In each round, the team of agents performs video question-answer (VideoQA) via perception exploration followed by action exploration. During perception exploration, each agent learns to extract query-specific perception clue(s) from a few sampled frames and performs clue-based alignment to find the video block(s) that are most relevant to the query-specific event. During action exploration, A4VL performs video reasoning in three steps: (1) each agent produces its initial answer with rational, (2) all agents collaboratively scores one another through cross-reviews and relevance ranking, and (3) based on whether a satisfactory consensus is reached, the decision is made either to start a new round of perception-action deliberation by pruning (e.g., filtering out the lowest performing agent) and re-staging (e.g., new-clue and matching block based perception-action exploration), or to conclude by producing its final answer. The integration of the multi-agent alliance through multi-round perception-action exploration, coupled with event-driven partitioning and cue-guided block alignment, enables A4VL to effectively scale to real world long videos while preserving high quality video reasoning. Evaluation Results on five popular VideoQA benchmarks show that A4VL outperforms 18 existing representative VLMs and 11 recent methods optimized for long-video reasoning, while achieving significantly lower inference latency. Our code is released at https://github.com/git-disl/A4VL.", "link": "http://arxiv.org/abs/2603.14052v2", "date": "2026-03-19", "relevancy": 2.2126, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5564}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5564}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5368}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Multi-Agent%20Perception-Action%20Alliance%20for%20Efficient%20Long%20Video%20Reasoning&body=Title%3A%20A%20Multi-Agent%20Perception-Action%20Alliance%20for%20Efficient%20Long%20Video%20Reasoning%0AAuthor%3A%20Yichang%20Xu%20and%20Gaowen%20Liu%20and%20Ramana%20Rao%20Kompella%20and%20Tiansheng%20Huang%20and%20Sihao%20Hu%20and%20Fatih%20Ilhan%20and%20Selim%20Furkan%20Tekin%20and%20Zachary%20Yahn%20and%20Ling%20Liu%0AAbstract%3A%20This%20paper%20presents%20a%20multi-agent%20perception-action%20exploration%20alliance%2C%20dubbed%20A4VL%2C%20for%20efficient%20long-video%20reasoning.%20A4VL%20operates%20in%20a%20multi-round%20perception-action%20exploration%20loop%20with%20a%20selection%20of%20VLM%20agents.%20In%20each%20round%2C%20the%20team%20of%20agents%20performs%20video%20question-answer%20%28VideoQA%29%20via%20perception%20exploration%20followed%20by%20action%20exploration.%20During%20perception%20exploration%2C%20each%20agent%20learns%20to%20extract%20query-specific%20perception%20clue%28s%29%20from%20a%20few%20sampled%20frames%20and%20performs%20clue-based%20alignment%20to%20find%20the%20video%20block%28s%29%20that%20are%20most%20relevant%20to%20the%20query-specific%20event.%20During%20action%20exploration%2C%20A4VL%20performs%20video%20reasoning%20in%20three%20steps%3A%20%281%29%20each%20agent%20produces%20its%20initial%20answer%20with%20rational%2C%20%282%29%20all%20agents%20collaboratively%20scores%20one%20another%20through%20cross-reviews%20and%20relevance%20ranking%2C%20and%20%283%29%20based%20on%20whether%20a%20satisfactory%20consensus%20is%20reached%2C%20the%20decision%20is%20made%20either%20to%20start%20a%20new%20round%20of%20perception-action%20deliberation%20by%20pruning%20%28e.g.%2C%20filtering%20out%20the%20lowest%20performing%20agent%29%20and%20re-staging%20%28e.g.%2C%20new-clue%20and%20matching%20block%20based%20perception-action%20exploration%29%2C%20or%20to%20conclude%20by%20producing%20its%20final%20answer.%20The%20integration%20of%20the%20multi-agent%20alliance%20through%20multi-round%20perception-action%20exploration%2C%20coupled%20with%20event-driven%20partitioning%20and%20cue-guided%20block%20alignment%2C%20enables%20A4VL%20to%20effectively%20scale%20to%20real%20world%20long%20videos%20while%20preserving%20high%20quality%20video%20reasoning.%20Evaluation%20Results%20on%20five%20popular%20VideoQA%20benchmarks%20show%20that%20A4VL%20outperforms%2018%20existing%20representative%20VLMs%20and%2011%20recent%20methods%20optimized%20for%20long-video%20reasoning%2C%20while%20achieving%20significantly%20lower%20inference%20latency.%20Our%20code%20is%20released%20at%20https%3A//github.com/git-disl/A4VL.%0ALink%3A%20http%3A//arxiv.org/abs/2603.14052v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Multi-Agent%2520Perception-Action%2520Alliance%2520for%2520Efficient%2520Long%2520Video%2520Reasoning%26entry.906535625%3DYichang%2520Xu%2520and%2520Gaowen%2520Liu%2520and%2520Ramana%2520Rao%2520Kompella%2520and%2520Tiansheng%2520Huang%2520and%2520Sihao%2520Hu%2520and%2520Fatih%2520Ilhan%2520and%2520Selim%2520Furkan%2520Tekin%2520and%2520Zachary%2520Yahn%2520and%2520Ling%2520Liu%26entry.1292438233%3DThis%2520paper%2520presents%2520a%2520multi-agent%2520perception-action%2520exploration%2520 ing%2520and%2520cue-guided%2520block%2520alignment%252C%2520enables%2520A4VL%2520to%2520effectively%2520scale%2520to%2520real%2520world%2520long%2520videos%2520while%2520preserving%2520high%2520quality%2520video%2520reasoning.%2520Evaluation%2520Results%2520on%2520five%2520popular%2520VideoQA%2520benchmarks%2520show%2520that%2520A4VL%2520outperforms%252018%2520existing%2520representative%2520VLMs%2520and%252011%2520recent%2520methods%2520optimized%2520for%2520long-video%2520reasoning%252C%2520while%2520achieving%2520significantly%2520lower%2520inference%2520latency.%2520Our%2520code%2520is%2520released%2520at%2520https%253A//github.com/git-disl/A4VL.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.14052v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=A%20Multi-Agent%20Perception-Action%20Alliance%20for%20Efficient%20Long%20Video%20Reasoning&entry.906535625=Yichang%20Xu%20and%20Gaowen%20Liu%20and%20Ramana%20Rao%20Kompella%20and%20Tiansheng%20Huang%20and%20Sihao%20Hu%20and%20Fatih%20Ilhan%20and%20Selim%20Furkan%20Tekin%20and%20Zachary%20Yahn%20and%20Ling%20Liu&entry.1292438233=This%20paper%20presents%20a%20multi-agent%20perception-action%20exploration%20alliance%2C%20dubbed%20A4VL%2C%20for%20efficient%20long-video%20reasoning.%20A4VL%20operates%20in%20a%20multi-round%20perception-action%20exploration%20loop%20with%20a%20selection%20of%20VLM%20agents.%20In%20each%20round%2C%20the%20team%20of%20agents%20performs%20video%20question-answer%20%28VideoQA%29%20via%20perception%20exploration%20followed%20by%20action%20exploration.%20During%20perception%20exploration%2C%20each%20agent%20learns%20to%20extract%20query-specific%20perception%20clue%28s%29%20from%20a%20few%20sampled%20frames%20and%20performs%20clue-based%20alignment%20to%20find%20the%20video%20block%28s%29%20that%20are%20most%20relevant%20to%20the%20query-specific%20event.%20During%20action%20exploration%2C {"title": "Revisiting OmniAnomaly for Anomaly Detection: performance metrics and comparison with PCA-based models", "author": "Bruna Alves and Ana Martins and Armando J. Pinho and S\u00f3nia Gouveia", "abstract": "Deep learning models have become the dominant approach for multivariate time series anomaly detection (MTSAD), often reporting substantial performance improvements over classical statistical methods. However, these gains are frequently evaluated under heterogeneous thresholding strategies and evaluation protocols, making fair comparisons difficult. This work revisits OmniAnomaly, a widely used stochastic recurrent model for MTSAD, and systematically compares it with a simple linear baseline based on Principal Component Analysis (PCA) on the Server Machine Dataset (SMD). Both methods are evaluated under identical thresholding and evaluation procedures, with experiments repeated across 100 runs for each of the 28 machines in the dataset. Performance is evaluated using Precision, Recall and F1-score at point-level, with and without point-adjustment, and under different aggregation strategies across machines and runs, with the corresponding standard deviations also reported. The results show large variability across machines and show that PCA can achieve performance comparable to OmniAnomaly, and even outperform it when point-adjustment is not applied. These findings question the added value of more complex architectures under current benchmarking practices and highlight the critical role of evaluation methodology in MTSAD research.", "link": "http://arxiv.org/abs/2603.18985v1", "date": "2026-03-19", "relevancy": 2.2072, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4586}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4329}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4329}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Revisiting%20OmniAnomaly%20for%20Anomaly%20Detection%3A%20performance%20metrics%20and%20comparison%20with%20PCA-based%20models&body=Title%3A%20Revisiting%20OmniAnomaly%20for%20Anomaly%20Detection%3A%20performance%20metrics%20and%20comparison%20with%20PCA-based%20models%0AAuthor%3A%20Bruna%20Alves%20and%20Ana%20Martins%20and%20Armando%20J.%20Pinho%20and%20S%C3%B3nia%20Gouveia%0AAbstract%3A%20Deep%20learning%20models%20have%20become%20the%20dominant%20approach%20for%20multivariate%20time%20series%20anomaly%20detection%20%28MTSAD%29%2C%20often%20reporting%20substantial%20performance%20improvements%20over%20classical%20statistical%20methods.%20However%2C%20these%20gains%20are%20frequently%20evaluated%20under%20heterogeneous%20thresholding%20strategies%20and%20evaluation%20protocols%2C%20making%20fair%20comparisons%20difficult.%20This%20work%20revisits%20OmniAnomaly%2C%20a%20widely%20used%20stochastic%20recurrent%20model%20for%20MTSAD%2C%20and%20systematically%20compares%20it%20with%20a%20simple%20linear%20baseline%20based%20on%20Principal%20Component%20Analysis%20%28PCA%29%20on%20the%20Server%20Machine%20Dataset%20%28SMD%29.%20Both%20methods%20are%20evaluated%20under%20identical%20thresholding%20and%20evaluation%20procedures%2C%20with%20experiments%20repeated%20across%20100%20runs%20for%20each%20of%20the%2028%20machines%20in%20the%20dataset.%20Performance%20is%20evaluated%20using%20Precision%2C%20Recall%20and%20F1-score%20at%20point-level%2C%20with%20and%20without%20point-adjustment%2C%20and%20under%20different%20aggregation%20strategies%20across%20machines%20and%20runs%2C%20with%20the%20corresponding%20standard%20deviations%20also%20reported.%20The%20results%20show%20large%20variability%20across%20machines%20and%20show%20that%20PCA%20can%20achieve%20performance%20comparable%20to%20OmniAnomaly%2C%20and%20even%20outperform%20it%20when%20point-adjustment%20is%20not%20applied.%20These%20findings%20question%20the%20added%20value%20of%20more%20complex%20architectures%20under%20current%20benchmarking%20practices%20and%20highlight%20the%20critical%20role%20of%20evaluation%20methodology%20in%20MTSAD%20research.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18985v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRevisiting%2520OmniAnomaly%2520for%2520Anomaly%2520Detection%253A%2520performance%2520metrics%2520and%2520comparison%2520with%2520PCA-based%2520models%26entry.906535625%3DBruna%2520Alves%2520and%2520Ana%2520Martins%2520and%2520Armando%2520J.%2520Pinho%2520and%2520S%25C3%25B3nia%2520Gouveia%26entry.1292438233%3DDeep%2520learning%2520models%2520have%2520become%2520the%2520dominant%2520approach%2520for%2520multivariate%2520time%2520series%2520anomaly%2520detection%2520%2528MTSAD%2529%252C%2520often%2520reporting%2520substantial%2520performance%2520improvements%2520over%2520classical%2520statistical%2520methods.%2520However%252C%2520these%2520gains%2520are%2520frequently%2520evaluated%2520under%2520heterogeneous%2520thresholding%2520strategies%2520and%2520evaluation%2520protocols%252C%2520making%2520fair%2520comparisons%2520difficult.%2520This%2520work%2520revisits%2520OmniAnomaly%252C%2520a%2520widely%2520used%2520stochastic%2520recurrent%2520model%2520for%2520MTSAD%252C%2520and%2520systematically%2520compares%2520it%2520with%2520a%2520simple%2520linear%2520baseline%2520based%2520on%2520Principal%2520Component%2520Analysis%2520%2528PCA%2529%2520on%2520the%2520Server%2520Machine%2520Dataset%2520%2528SMD%2529.%2520Both%2520methods%2520are%2520evaluated%2520under%2520identical%2520thresholding%2520and%2520evaluation%2520procedures%252C%2520with%2520experiments%2520repeated%2520across%2520100%2520runs%2520for%2520each {"title": "CausalARC: Abstract Reasoning with Causal World Models", "author": "Jacqueline Maasch and John Kalantari and Kia Khezeli", "abstract": "On-the-fly reasoning often requires adaptation to novel problems under limited data and distribution shift. This work introduces CausalARC: an experimental testbed for AI reasoning in low-data and out-of-distribution regimes, modeled after the Abstraction and Reasoning Corpus (ARC). Each CausalARC reasoning task is sampled from a fully specified causal world model, formally expressed as a structural causal model. Principled data augmentations provide observational, interventional, and counterfactual feedback about the world model in the form of few-shot, in-context learning demonstrations. As a proof-of-concept, we illustrate the use of CausalARC for four language model evaluation settings: (1) abstract reasoning with test-time training, (2) counterfactual reasoning with in-context learning, (3) program synthesis, and (4) causal discovery with logical reasoning. Within- and between-model performance varied heavily across tasks, indicating room for significant improvement in language model reasoning.", "link": "http://arxiv.org/abs/2509.03636v3", "date": "2026-03-19", "relevancy": 1.4172, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4934}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4668}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4662}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CausalARC%3A%20Abstract%20Reasoning%20with%20Causal%20World%20Models&body=Title%3A%20CausalARC%3A%20Abstract%20Reasoning%20with%20Causal%20World%20Models%0AAuthor%3A%20Jacqueline%20Maasch%20and%20John%20Kalantari%20and%20Kia%20Khezeli%0AAbstract%3A%20On-the-fly%20reasoning%20often%20requires%20adaptation%20to%20novel%20problems%20under%20limited%20data%20and%20distribution%20shift.%20This%20work%20introduces%20CausalARC%3A%20an%20experimental%20testbed%20for%20AI%20reasoning%20in%20low-data%20and%20out-of-distribution%20regimes%2C%20modeled%20after%20the%20Abstraction%20and%20Reasoning%20Corpus%20%28ARC%29.%20Each%20CausalARC%20reasoning%20task%20is%20sampled%20from%20a%20fully%20specified%20causal%20world%20model%2C%20formally%20expressed%20as%20a%20structural%20causal%20model.%20Principled%20data%20augmentations%20provide%20observational%2C%20interventional%2C%20and%20counterfactual%20feedback%20about%20the%20world%20model%20in%20the%20form%20of%20few-shot%2C%20in-context%20learning%20demonstrations.%20As%20a%20proof-of-concept%2C%20we%20illustrate%20the%20use%20of%20CausalARC%20for%20four%20language%20model%20evaluation%20settings%3A%20%281%29%20abstract%20reasoning%20with%20test-time%20training%2C%20%282%29%20counterfactual%20reasoning%20with%20in-context%20learning%2C%20%283%29%20program%20synthesis%2C%20and%20%284%29%20causal%20discovery%20with%20logical%20reasoning.%20Within-%20and%20between-model%20performance%20varied%20heavily%20across%20tasks%2C%20indicating%20room%20for%20significant%20improvement%20in%20language%20model%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2509.03636v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCausalARC%253A%2520Abstract%2520Reasoning%2520with%2520Causal%2520World%2520Models%26entry.906535625%3DJacqueline%2520Maasch%2520and%2520John%2520Kalantari%2520and%2520Kia%2520Khezeli%26entry.1292438233%3DOn-the-fly%2520reasoning%2520often%2520requires%2520adaptation%2520to%2520novel%2520problems%2520under%2520limited%2520data%2520and%2520distribution%2520shift.%2520This%2520work%252 {"title": "First-Order Sparse Convex Optimization: Better Rates with Sparse Updates", "author": "Dan Garber", "abstract": "It was recently established that for convex optimization problems with sparse optimal solutions (be it entry-wise sparsity or matrix rank-wise sparsity) it is possible to design first-order methods with linear convergence rates that depend on an improved mixed-norm condition number of the form $\\frac{\u03b2_1{}s}{\u03b1_2}$, where $\u03b2_1$ is the $\\ell_1$-Lipschitz continuity constant of the gradient, $\u03b1_2$ is the $\\ell_2$-quadratic growth constant, and $s$ is the sparsity of optimal solutions. However, beyond the improved convergence rate, these methods are unable to leverage the sparsity of optimal solutions towards improving the runtime of each iteration as well, which may still be prohibitively high for high-dimensional problems. In this work, we establish that linear convergence rates which depend on this improved condition number can be obtained using only sparse updates, which may result in overall significantly improved running times. Moreover, our methods are considerably easier to implement.", "link": "http://arxiv.org/abs/2506.19075v3", "date": "2026-03-19", "relevancy": 1.1758, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.3979}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.3915}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.3898}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20First-Order%20Sparse%20Convex%20Optimization%3A%20Better%20Rates%20with%20Sparse%20Updates&body=Title%3A%20First-Order%20Sparse%20Convex%20Optimization%3A%20Better%20Rates%20with%20Sparse%20Updates%0AAuthor%3A%20Dan%20Garber%0AAbstract%3A%20It%20was%20recently%20established%20that%20for%20convex%20optimization%20problems%20with%20sparse%20optimal%20solutions%20%28be%20it%20entry-wise%20sparsity%20or%20matrix%20rank-wise%20sparsity%29%20it%20is%20possible%20to%20design%20first-order%20methods%20with%20linear%20convergence%20rates%20that%20depend%20on%20an%20improved%20mixed-norm%20condition%20number%20of%20the%20form%20%24%5Cfrac%7B%CE%B2_1%7B%7Ds%7D%7B%CE%B1_2%7D%24%2C%20where%20%24%CE%B2_1%24%20is%20the%20%24%5Cell_1%24-Lipschitz%20continuity%20constant%20of%20the%20gradient%2C%20%24%CE%B1_2%24%20is%20the%20%24%5Cell_2%24-quadratic%20growth%20constant%2C%20and%20%24s%24%20is%20the%20sparsity%20of%20optimal%20solutions.%20However%2C%20beyond%20the%20improved%20convergence%20rate%2C%20these%20methods%20are%20unable%20to%20leverage%20the%20sparsity%20of%20optimal%20solutions%20towards%20improving%20the%20runtime%20of%20each%20iteration%20as%20well%2C%20which%20may%20still%20be%20prohibitively%20high%20for%20high-dimensional%20problems.%20In%20this%20work%2C%20we%20establish%20that%20linear%20convergence%20rates%20which%20depend%20on%20this%20improved%20condition%20number%20can%20be%20obtained%20using%20only%20sparse%20updates%2C%20which%20may%20result%20in%20overall%20significantly%20improved%20running%20times.%20Moreover%2C%20our%20methods%20are%20considerably%20easier%20to%20implement.%0ALink%3A%20http%3A//arxiv.org/abs/2506.19075v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFirst-Order%2520Sparse%2520Convex%2520Optimization%253A%2520Better%2520Rates%2520with%2520Sparse%2520Updates%26entry.906535625%3DDan%2520Garber%26entry.1292438233%3DIt%2520was%2520recently%2520established%2520that%2520for%2520convex%2520optimization%2520problems%2520with%2520sparse%2520optimal%2520solutions%2520%2528be%2520it%2520entry-wise%2520sparsity%2520or%2520matrix%2520rank-wise%2520 ise%20sparsity%20or%20matrix%20rank-wise%20sparsity%29%20it%20is%20possible%20to%20design%20first-order%20methods%20with%20linear%20convergence%20rates%20that%20depend%20on%20an%20improved%20mixed-norm%20condition%20number%20of%20the%20form%20%24%5Cfrac%7B%CE%B2_1%7B%7Ds%7D%7B%CE%B1_2%7D%24%2C%20where%20%24%CE%B2_1%24%20is%20the%20%24%5Cell_1%24-Lipschitz%20continuity%20constant%20of%20the%20gradient%2C%20%24%CE%B1_2%24%20is%20the%20%24%5Cell_2%24-quadratic%20growth%20constant%2C%20and%20%24s%24%20is%20the%20sparsity%20of%20optimal%20solutions.%20However%2C%20beyond%20the%20improved%20convergence%20rate%2C%20these%20methods%20are%20unable%20to%20leverage%20the%20sparsity%20of%20optimal%20solutions%20towards%20improving%20the%20runtime%20of%20each%20iteration%20as%20well%2C%20which%20may%20still%20be%20prohibitively%20high%20for%20high-dimensional%20problems.%20In%20this%20work%2C%20we%20establish%20that%20linear%20convergence%20rates%20which%20depend%20on%20this%20improved%20condition%20number%20can%20be%20obtained%20using%20only%20sparse%20updates%2C%20which%20may%20result%20in%20overall%20significantly%20improved%20running%20times.%20Moreover%2C%20our%20methods%20are%20considerably%20easier%20to%20implement.&entry.1838667208=http%3A//arxiv.org/abs/2506.19075v3&entry.124074799=Read"},
{"title": "Tendon-Actuated Robots with a Tapered, Flexible Polymer Backbone: Design, Fabrication, and Modeling", "author": "Harald Minde Hansen and Nandita Gallacher and Nicholas B. Andrews and Kristin Y. Pettersen and Jan Tommy Gravdahl and Mario di Castro", "abstract": "This paper presents the design, modeling, and fabrication of 3D-printed, tendon-actuated continuum robots featuring a flexible, tapered backbone constructed from thermoplastic polyurethane (TPU). Our scalable design incorporates an integrated electronics base housing that enables direct tendon tension control and sensing via actuators and compression load cells. Unlike many continuum robots that are single-purpose and costly, the proposed design prioritizes customizability, rapid assembly, and low cost while enabling high curvature and enhanced distal compliance through geometric tapering, thereby supporting a broad range of compliant robotic inspection and manipulation tasks. We develop a generalized forward kinetostatic model of the tapered backbone based on Cosserat rod theory using a Newtonian approach, extending existing tendon-actuated Cosserat rod formulations to explicitly account for spatially varying backbone cross-sectional geometry. The model captures the graded stiffness profile induced by the tapering and enables systematic exploration of the configuration space as a function of the geometric design parameters. Specifically, we analyze how the backbone taper angle influences the robot's configuration space and manipulability. The model is validated against motion capture data, achieving centimeter-level shape prediction accuracy after calibrating Young's modulus via a line search that minimizes modeling error. We further demonstrate teleoperated grasping using an endoscopic gripper routed along the continuum robot, mounted on a 6-DoF robotic arm. Parameterized iLogic/CAD scripts are provided for rapid geometry generation and scaling. The presented framework establishes a simple, rapid, and reproducible pathway from parametric design to controlled tendon actuation for tapered, tendon-driven continuum robots manufactured using fused deposition modeling 3D printers.", "link": "http://arxiv.org/abs/2603.19124v1", "date": "2026-03-19", "relevancy": 1.9427, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4987}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4835}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4735}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Tendon-Actuated%20Robots%20with%20a%20Tapered%2C%20Flexible%20Polymer%20Backbone%3A%20Design%2C%20Fabrication%2C%20and%20Modeling&body=Title%3A%20Tendon-Actuated%20Robots%20with%20a%20Tapered%2C%20Flexible%20Polymer%20Backbone%3A%20Design%2C%20Fabrication%2C%20and%20Modeling%0AAuthor%3A%20Harald%20Minde%20Hansen%20and%20Nandita%20Gallacher%20and%20Nicholas%20B.%20Andrews%20and%20Kristin%20Y.%20Pettersen%20and%20Jan%20Tommy%20Gravdahl%20and%20Mario%20di%20Castro%0AAbstract%3A%20This%20paper%20presents%20the%20design%2C%20modeling%2C%20and%20fabrication%20of%203D-printed%2C%20tendon-actuated%20continuum%20robots%20featuring%20a%20flexible%2C%20tapered%20backbone%20constructed%20from%20thermoplastic%20polyurethane%20%28TPU%29.%20Our%20scalable%20design%20incorporates%20an%20integrated%20electronics%20base%20housing%20that%20enables%20direct%20tendon%20tension%20control%20and%20sensing%20via%20actuators%20and%20compression%20load%20cells.%20Unlike%20many%20continuum%20robots%20that%20are%20single-purpose%20and%20costly%2C%20the%20proposed%20design%20prioritizes%20customizability%2C%20rapid%20assembly%2C%20and%20low%20cost%20while%20enabling%20high%20curvature%20and%20enhanced%20distal%20compliance%20through%20geometric%20tapering%2C%20thereby%20supporting%20a%20broad%20range%20of%20compliant%20robotic%20inspection%20and%20manipulation%20tasks.%20We%20develop%20a%20generalized%20forward%20kinetostatic%20model%20of%20the%20tapered%20backbone%20based%20on%20Cosserat%20rod%20theory%20using%20a%20Newtonian%20approach%2C%20extending%20existing%20tendon-actuated%20Cosserat%20rod%20formulations%20to%20explicitly%20account%20for%20spatially%20varying%20backbone%20cross-sectional%20geometry.%20The%20model%20captures%20the%20graded%20stiffness%20profile%20induced%20by%20the%20tapering%20and%20enables%20systematic%20exploration%20of%20the%20configuration%20space%20as%20a%20function%20of%20the%20geometric%20design%20parameters.%20Specifically%2C%20we%20analyze%20how%20the%20backbone%20taper%20angle%20influences%20the%20robot%27s%20configuration%20space%20and%20manipulability.%20The%20model%20is%20validated%20against%20motion%20capture%20data%2C%20achieving%20centimeter-level%20shape%20prediction%20accuracy%20after%20calibrating%20Young%27s%20modulus%20via%20a%20line%20search%20that%20minimizes%20modeling%20error.%20We%20further%20demonstrate%20teleoperated%20grasping%20using%20an%20endoscopic%20gripper%20routed%20along%20the%20continuum%20robot%2C%20mounted%20on%20a%206-DoF%20robotic%20arm.%20Parameterized%20iLogic/CAD%20scripts%20are%20provided%20for%20rapid%20geometry%20generation%20and%20scaling.%20The%20presented%20framework%20establishes%20a%20simple%2C%20rapid%2C%20and%20reproducible%20pathway%20from%20parametric%20design%20to%20controlled%20tendon%20actuation%20for%20tapered%2C%20tendon-driven%20continuum%20robots%20manufactured%20using%20fused%20deposition%20modeling%203D%20printers.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19124v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTendon-Actuated%2520Robots%2520with%2520a%2520Tapered%252C%2520Flexible%2520Polymer%2520Backbone%253A%2520Design {"title": "Neural Galerkin Normalizing Flow for Transition Probability Density Functions of Diffusion Models", "author": "Riccardo Saporiti and Fabio Nobile", "abstract": "We propose a new Neural Galerkin Normalizing Flow framework to approximate the transition probability density function of a diffusion process by solving the corresponding Fokker-Planck equation with an atomic initial distribution, parametrically with respect to the location of the initial mass. By using Normalizing Flows, we look for the solution as a transformation of the transition probability density function of a reference stochastic process, ensuring that our approximation is structure-preserving and automatically satisfies positivity and mass conservation constraints. By extending Neural Galerkin schemes to the context of Normalizing Flows, we derive a system of ODEs for the time evolution of the Normalizing Flow's parameters. Adaptive sampling routines are used to evaluate the Fokker-Planck residual in meaningful locations, which is of vital importance to address high-dimensional PDEs. Numerical results show that this strategy captures key features of the true solution and enforces the causal relationship between the initial datum and the density function at subsequent times. After completing an offline training phase, online evaluation becomes significantly more cost-effective than solving the PDE from scratch. The proposed method serves as a promising surrogate model, which could be deployed in many-query problems associated with stochastic differential equations, like Bayesian inference, simulation, and diffusion bridge generation.", "link": "http://arxiv.org/abs/2603.18907v1", "date": "2026-03-19", "relevancy": 1.5011, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5632}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/ {"title": "Dual-Model Prediction of Affective Engagement and Vocal Attractiveness from Speaker Expressiveness in Video Learning", "author": "Hung-Yue Suen and Kuo-En Hung and Fan-Hsun Tseng", "abstract": "This paper outlines a machine learning-enabled speaker-centric Emotion AI approach capable of predicting audience-affective engagement and vocal attractiveness in asynchronous video-based learning, relying solely on speaker-side affective expressions. Inspired by the demand for scalable, privacy-preserving affective computing applications, this speaker-centric Emotion AI approach incorporates two distinct regression models that leverage a massive corpus developed within Massive Open Online Courses (MOOCs) to enable affectively engaging experiences. The regression model predicting affective engagement is developed by assimilating emotional expressions emanating from facial dynamics, oculomotor features, prosody, and cognitive semantics, while incorporating a second regression model to predict vocal attractiveness based exclusively on speaker-side acoustic features. Notably, on speaker-independent test sets, both regression models yielded impressive predictive performance (R2 = 0.85 for affective engagement and R2 = 0.88 for vocal attractiveness), confirming that speaker-side affect can functionally represent aggregated audience feedback. This paper provides a speaker-centric Emotion AI approach substantiated by an empirical study discovering that speaker-side multimodal features, including acoustics, can prospectively forecast audience feedback without necessarily employing audience-side input information.", "link": "http://arxiv.org/abs/2603.18758v1", "date": "2026-03-19", "relevancy": 1.5719, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5287}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n {"title": "Direct Data-Driven Predictive Control for a Three-dimensional Cable-Driven Soft Robotic Arm", "author": "Cheng Ouyang and Moeen Ul Islam and Dong Chen and Kaixiang Zhang and Zhaojian Li and Xiaobo Tan", "abstract": "Soft robots offer significant advantages in safety and adaptability, yet achieving precise and dynamic control remains a major challenge due to their inherently complex and nonlinear dynamics. Recently, Data-enabled Predictive Control (DeePC) has emerged as a promising model-free approach that bypasses explicit system identification by directly leveraging input-output data. While DeePC has shown success in other domains, its application to soft robots remains underexplored, particularly for three-dimensional (3D) soft robotic systems. This paper addresses this gap by developing and experimentally validating an effective DeePC framework on a 3D, cable-driven soft arm. Specifically, we design and fabricate a soft robotic arm with a thick tubing backbone for stability, a dense silicone body with large cavities for strength and flexibility, and rigid endcaps for secure termination. Using this platform, we implement DeePC with singular value decomposition (SVD)-based dimension reduction for two key control tasks: fixed-point regulation and trajectory tracking in 3D space. Comparative experiments with a baseline model-based controller demonstrate DeePC's superior accuracy, robustness, and adaptability, highlighting its potential as a practical solution for dynamic control of soft robots.", "link": "http://arxiv.org/abs/2510.08953v2", "date": "2026-03-19", "relevancy": 2.0299, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5186}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5092}, {" {"title": "A Passive Elastic-Folding Mechanism for Stackable Airdrop Sensors", "author": "Damyon Kim and Yuichi Honjo and Tatsuya Iizuka and Naomi Okubo and Naoto Endo and Hiroshi Matsubara and Yoshihiro Kawahara and Naoto Morita and Takuya Sasatani", "abstract": "Air-dispersed sensor networks deployed from aerial robotic systems (e.g., UAVs) provide a low-cost approach to wide-area environmental monitoring. However, existing methods often rely on active actuators for mid-air shape or trajectory control, increasing both power consumption and system cost. Here, we introduce a passive elastic-folding hinge mechanism that transforms sensors from a flat, stackable form into a three-dimensional structure upon release. Hinges are fabricated by laminating commercial sheet materials with rigid printed circuit boards (PCBs) and programming fold angles through a single oven-heating step, enabling scalable production without specialized equipment. Our geometric model links laminate geometry, hinge mechanics, and resulting fold angle, providing a predictive design methodology for target configurations. Laboratory tests confirmed fold angles between 10 degrees and 100 degrees, with a standard deviation of 4 degrees and high repeatability. Field trials further demonstrated reliable data collection and LoRa transmission during dispersion, while the Horizontal Wind Model (HWM)-based trajectory simulations indicated strong potential for wide-area sensing exceeding 10 km.", "link": "http://arxiv.org/abs/2603.18861v1", "date": "2026-03-19", "relevancy": 1.6454, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4339}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.4095}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4042}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Passive%20Elastic-Folding%20Mechanism%20for%20Stackable%20Airdrop%20Sensors&body=Title%3A%20A%20Passive%20Elastic-Folding%20Mechanism%20for%20Stackable%20Airdrop%20Sensors%0AAuthor%3A%20Damyon%20Kim%20and%20Yuichi%20Honjo%20and%20Tatsuya%20Iizuka%20and%20Naomi%20Okubo%20and%20Naoto%20Endo%20and%20Hiroshi%20Matsubara%20and%20Yoshihiro%20Kawahara%20and%20Naoto%20Morita%20and%20Takuya%20Sasatani%0AAbstract%3A%20Air-dispersed%20sensor%20networks%20deployed%20from%20aerial%20robotic%20systems%20%28e.g.%2C%20UAVs%29%20provide%20a%20low-cost%20approach%20to%20wide-area%20environmental%20monitoring.%20However%2C%20existing%20methods%20often%20rely%20on%20active%20actuators%20for%20mid-air%20shape%20or%20trajectory%20control%2C%20increasing%20both%20power%20consumption%20and%20system%20cost.%20Here%2C%20we%20introduce%20a%20passive%20elastic-folding%20hinge%20mechanism%20that%20transforms%20sensors%20from%20a%20flat%2C%20stackable%20form%20into%20a%20three-dimensional%20structure%20upon%20release.%20Hinges%20are%20fabricated%20by%20laminating%20commercial%20sheet%20materials%20with%20rigid%20printed%20circuit%20boards%20%28PCBs%29%20and%20programming%20fold%20angles%20through%20a%20single%20oven-heating%20step%2C%20enabling%20scalable%20production%20without%20specialized%20equipment.%20Our%20geometric%20model%20links%20laminate%20geometry%2C%20hinge%20mechanics%2C%20and%20resulting%20fold%20angle%2C%20providing%20a%20predictive%20design%20methodology%20for%20target%20configurations.%20Laboratory%20tests%20confirmed%20fold%20angles%20between%2010%20degrees%20and%20100%20degrees%2C%20with%20a%20standard%20deviation%20of%204%20degrees%20and%20high%20repeatability.%20Field%20trials%20further%20demonstrated%20reliable%20data%20collection%20and%20LoRa%20transmission%20during%20dispersion%2C%20whi edictive%2520design%2520methodology%2520for%2520target%2520configurations.%2520Laboratory%2520tests%2520confirmed%2520fold%2520angles%2520between%252010%2520degrees%2520and%2520100%2520degrees%252C%2520with%2520a%2520standard%2520deviation%2520of%25204%2520degrees%2520and%2520high%2520repeatability.%2520Field%2520trials%2520further%2520demonstrated%2520reliable%2520data%2520collection%2520and%2520LoRa%2520transmission%2520during%2520dispersion%252C%2520while%2520the%2520Horizontal%2520Wind%2520Model%2520%2528HWM%2529-based%2520trajectory%2520simulations%2520indicated%2520strong%2520potential%2520for%2520wide-area%2520sensing%2520exceeding%252010%2520km.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.18861v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=A%20Passive%20Elastic-Folding%20Mechanism%20for%20Stackable%20Airdrop%20Sensors&entry.906535625=Damyon%20Kim%20and%20Yuichi%20Honjo%20and%20Tatsuya%20Iizuka%20and%20Naomi%20Okubo%20and%20Naoto%20Endo%20and%20Hiroshi%20Matsubara%20and%20Yoshihiro%20Kawahara%20and%20Naoto%20Morita%20and%20Takuya%20Sasatani&entry.1292438233=Air-dispersed%20sensor%20networks%20deployed%20from%20aerial%20robotic%20systems%20%28e.g.%2C%20UAVs%29%20provide%20a%20low-cost%20approach%20to%20wide-area%20environmental%20monitoring.%20However%2C%20existing%20methods%20often%20rely%20on%20active%20actuators%20for%20mid-air%20shape%20or%20trajectory%20control%2C%20increasing%20both%20power%20consumption%20and%20system%20cost.%20Here%2C%20we%20introduce%20a%20passive%20elastic-folding%20hinge%20mechanism%20that%20transforms%20sensors%20from%20a%20flat%2C%20stackable%20form%20into%20a%20three-dimensional%20structure%20upon%20release.%20Hinges%20are%20fabricated%20by%20laminating%20commercial%20sheet%20materials%20with%20rigid%20printed%20circuit%20boards%20%28PCBs%29%20and%20programming%20fold%20angles%20through%20a%20single%20oven-heating%2 {"title": "Seasoning Generative Models for a Generalization Aftertaste", "author": "Hisham Husain and Valentin De Bortoli and Richard Nock", "abstract": "The use of discriminators to train or fine-tune generative models has proven to be a rather successful framework. A notable example is Generative Adversarial Networks (GANs) that minimize a loss incurred by training discriminators along with other paradigms that boost generative models via discriminators that satisfy weak learner constraints. More recently, even diffusion models have shown advantages with some kind of discriminator guidance. In this work, we extend a strong-duality result related to $f$-divergences which gives rise to a discriminator-guided recipe that allows us to \\textit{refine} any generative model. We then show that the refined generative models provably improve generalization, compared to its non-refined counterpart. In particular, our analysis reveals that the gap in generalization is improved based on the Rademacher complexity of the discriminator set used for refinement. Our recipe subsumes a recently introduced score-based diffusion approach (Kim et al., 2022) that has shown great empirical success, however allows us to shed light on the generalization guarantees of this method by virtue of our analysis. Thus, our work provides a theoretical validation for existing work, suggests avenues for new algorithms, and contributes to our understanding of generalization in generative models at large.", "link": "http://arxiv.org/abs/2603.18817v1", "date": "2026-03-19", "relevancy": 1.6048, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5508}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5161}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity" 20recently%2520introduced%2520score-based%2520diffusion%2520approach%2520%2528Kim%2520et%2520al.%252C%25202022%2529%2520that%2520has%2520shown%2520great%2520empirical%2520success%252C%2520however%2520allows%2520us%2520to%2520shed%2520light%2520on%2520the%2520generalization%2520guarantees%2520of%2520this%2520method%2520by%2520virtue%2520of%2520our%2520analysis.%2520Thus%252C%2520our%2520work%2520provides%2520a%2520theoretical%2520validation%2520for%2520existing%2520work%252C%2520suggests%2520avenues%2520for%2520new%2520algorithms%252C%2520and%2520contributes%2520to%2520our%2520understanding%2520of%2520generalization%2520in%2520generative%2520models%2520at%2520large.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.18817v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Seasoning%20Generative%20Models%20for%20a%20Generalization%20Aftertaste&entry.906535625=Hisham%20Husain%20and%20Valentin%20De%20Bortoli%20and%20Richard%20Nock&entry.1292438233=The%20use%20of%20discriminators%20to%20train%20or%20fine-tune%20generative%20models%20has%20proven%20to%20be%20a%20rather%20successful%20framework.%20A%20notable%20example%20is%20Generative%20Adversarial%20Networks%20%28GANs%29%20that%20minimize%20a%20loss%20incurred%20by%20training%20discriminators%20along%20with%20other%20paradigms%20that%20boost%20generative%20models%20via%20discriminators%20that%20satisfy%20weak%20learner%20constraints.%20More%20recently%2C%20even%20diffusion%20models%20have%20shown%20advantages%20with%20some%20kind%20of%20discriminator%20guidance.%20In%20this%20work%2C%20we%20extend%20a%20strong-duality%20result%20related%20to%20%24f%24-divergences%20which%20gives%20rise%20to%20a%20discriminator-guided%20recipe%20that%20allows%20us%20to%20%5Ctextit%7Brefine%7D%20any%20generative%20model.%20We%20then%20show%20that%20the%20refined%20generative%20models%20provably%20improve%20generalization%2C%20compared%2 {"title": "Online Convex Optimization with Heavy Tails: Old Algorithms, New Regrets, and Applications", "author": "Zijian Liu", "abstract": "In Online Convex Optimization (OCO), when the stochastic gradient has a finite variance, many algorithms provably work and guarantee a sublinear regret. However, limited results are known if the gradient estimate has a heavy tail, i.e., the stochastic gradient only admits a finite $\\mathsf{p}$-th central moment for some $\\mathsf{p}\\in\\left(1,2\\right]$. Motivated by it, this work examines different old algorithms for OCO (e.g., Online Gradient Descent) in the more challenging heavy-tailed setting. Under the standard bounded domain assumption, we establish new regrets for these classical methods without any algorithmic modification. Remarkably, these regret bounds are fully optimal in all parameters (can be achieved even without knowing $\\mathsf{p}$), suggesting that OCO with heavy tails can be solved effectively without any extra operation (e.g., gradient clipping). Our new results have several applications. A particularly interesting one is the first provable and optimal convergence result for nonsmooth nonconvex optimization under heavy-tailed noise without gradient clipping. Furthermore, we explore broader settings (e.g., smooth OCO) and extend our ideas to optimistic algorithms to handle different cases simultaneously.", "link": "http://arxiv.org/abs/2508.07473v3", "date": "2026-03-19", "relevancy": 1.3838, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4723}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4528}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "simila {"title": "Accurate and Efficient Multi-Channel Time Series Forecasting via Sparse Attention Mechanism", "author": "Lei Gao and Hengda Bao and Jingfei Fang and Guangzheng Wu and Weihua Zhou and Yun Zhou", "abstract": "The task of multi-channel time series forecasting is ubiquitous in numerous fields such as finance, supply chain management, and energy planning. It is critical to effectively capture complex dynamic dependencies within and between channels for accurate predictions. However, traditional method paid few attentions on learning the interaction among channels. This paper proposes Linear-Network (Li-Net), a novel architecture designed for multi-channel time series forecasting that captures the linear and non-linear dependencies among channels. Li-Net dynamically compresses representations across sequence and channel dimensions, processes the information through a configurable non-linear module and subsequently reconstructs the forecasts. Moreover, Li-Net integrates a sparse Top-K Softmax attention mechanism within a multi-scale projection framework to address these challenges. A core innovation is its ability to seamlessly incorporate and fuse multi-modal embeddings, guiding the sparse attention process to focus on the most informative time steps and feature channels. Through the experiment results on multiple real-world benchmark datasets demonstrate that Li-Net achieves competitive performance compared to state-of-the-art baseline methods. Furthermore, Li-Net provides a superior balance between prediction accuracy and computational burden, exhibiting significantly lower memory usage and faster inference times. Detailed ablation studies and parameter sensitivity analyses validate the effectiveness of each key component in our proposed architecture.\n  Keywords: Multivariate Time Series Forecasting, Sparse Attention Mechanism, Multimodal Information Fusion, Non-linear relationship", "link": "http://arxiv.org/abs/2603.18712v1", "date": "2026-03-19", "relevan       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }

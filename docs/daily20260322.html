{"title": "From Far and Near: Perceptual Evaluation of Crowd Representations Across Levels of Detail", "author": "Xiaohan Sun and Carol O'Sullivan", "abstract": "In this paper, we investigate how users perceive the visual quality of crowd character representations at different levels of detail (LoD) and viewing distances. Each representation, including geometric meshes, image-based impostors, Neural Radiance Fields (NeRFs), and 3D Gaussians, exhibits distinct trade-offs between visual fidelity and computational performance. Our qualitative and quantitative results provide insights to guide the design of perceptually optimized LoD strategies for crowd rendering.", "link": "http://arxiv.org/abs/2510.20558v2", "date": "2026-03-19", "relevancy": 2.6432, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5328}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5328}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5204}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Far%20and%20Near%3A%20Perceptual%20Evaluation%20of%20Crowd%20Representations%20Across%20Levels%20of%20Detail&body=Title%3A%20From%20Far%20and%20Near%3A%20Perceptual%20Evaluation%20of%20Crowd%20Representations%20Across%20Levels%20of%20Detail%0AAuthor%3A%20Xiaohan%20Sun%20and%20Carol%20O%27Sullivan%0AAbstract%3A%20In%20this%20paper%2C%20we%20investigate%20how%20users%20perceive%20the%20visual%20quality%20of%20crowd%20character%20representations%20at%20different%20levels%20of%20detail%20%28LoD%29%20and%20viewing%20distances.%20Each%20representation%2C%20including%20geometric%20meshes%2C%20image-based%20impostors%2C%20Neural%20Radiance%20Fields%20%28NeRFs%29%2C%20and%203D%20Gaussians%2C%20exhibits%20distinct%20trade-offs%20between%20visual%20fidelity%20and%20computational%20performance.%20Our%20qualitative%20and%20quantitative%20results%20provide%20insights%20to%20guide%20the%20design%20of%20perceptually%20optimized%20LoD%20strategies%20for%20crowd%20rendering.%0ALink%3A%20http%3A//arxiv.org/abs/2510.20558v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Far%2520and%2520Near%253A%2520Perceptual%2520Evaluation%2520of%2520Crowd%2520Representations%2520Across%2520Levels%2520of%2520Detail%26entry.906535625%3DXiaohan%2520Sun%2520and%2520Carol%2520O%2527Sullivan%26entry.1292438233%3DIn%2520this%2520paper%252C%2520we%2520investigate%2520how%2520users%2520perceive%2520the%2520visual%2520quality%2520of%2520crowd%2520character%2520representations%2520at%2520different%2520levels%2520of%2520detail%2520%2528LoD%2529%2520and%2520viewing%2520distances.%2520Each%2520representation%252C%2520including%2520geometric%2520meshes%252C%2520image-based%2520impostors%252C%2520Neural%2520Radiance%2520Fields%2520%2528NeRFs%2529%252C%2520and%25203D%2520Gaussians%252C%2520exhibits%2520distinct%2520trade-offs%2520between%2520visual%2520fidelity%2520and%2520computational%2520performance.%2520Our%2520qualitative%2520and%2520quantitative%2520results%2520provide%2520insights%2520to%2520guide%2520the%2520design%2520of%2520perceptually%2520optimized%2520LoD%2520strategies%2520for%2520crowd%2520rendering.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.20558v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=From%20Far%20and%20Near%3A%20Perceptual%20Evaluation%20of%20Crowd%20Representations%20Across%20Levels%20of%20Detail&entry.906535625=Xiaohan%20Sun%20and%20Carol%20O%27Sullivan&entry.1292438233=In%20this%20paper%2C%20we%20investigate%20how%20users%20perceive%20the%20visual%20quality%20of%20crowd%20character%20representations%20at%20different%20levels%20of%20detail%20%28LoD%29%20and%20viewing%20distances.%20Each%20representation%2C%20including%20geometric%20meshes%2C%20image-based%20impostors%2C%20Neural%20Radiance%20Fields%20%28NeRFs%29%2C%20and%203D%20Gaussians%2C%20exhibits%20distinct%20trade-offs%20between%20visual%20fidelity%20and%20computational%20performance.%20Our%20qualitative%20and%20quantitative%20results%20provide%20insights%20to%20guide%20the%20design%20of%20perceptually%20optimized%20LoD%20strategies%20for%20crowd%20rendering.&entry.1838667208=http%3A//arxiv.org/abs/2510.20558v2&entry.124074799=Read"},
{"title": "TS-Haystack: A Multi-Scale Retrieval Benchmark for Time Series Language Models", "author": "Nicolas Zumarraga and Thomas Kaar and Ning Wang and Maxwell A. Xu and Max Rosenblattl and Markus Kreft and Kevin O'Sullivan and Paul Schmiedmayer and Patrick Langer and Robert Jakob", "abstract": "Time Series Language Models (TSLMs) are emerging as unified models for reasoning over continuous signals in natural language. However, long-context retrieval remains a major limitation: existing models are typically trained and evaluated on short sequences, while real-world time-series sensor streams can span millions of datapoints. This mismatch requires precise temporal localization under strict computational constraints, a regime that is not captured by current benchmarks. We introduce TS-Haystack, a long-context temporal retrieval benchmark comprising ten task types across four categories: direct retrieval, temporal reasoning, multi-step reasoning and contextual anomaly. The benchmark uses controlled needle insertion by embedding short activity bouts into longer longitudinal accelerometer recordings, enabling systematic evaluation across context lengths ranging from seconds to 2 hours per sample. We hypothesize that existing TSLM time series encoders overlook temporal granularity as context length increases, creating a task-dependent effect: compression aids classification but impairs retrieval of localized events. Across multiple model and encoding strategies, we observe a consistent divergence between classification and retrieval behavior. Learned latent compression preserves or improves classification accuracy at compression ratios up to 176$\\times$, but retrieval performance degrades with context length, incurring in the loss of temporally localized information. These results highlight the importance of architectural designs that decouple sequence length from computational complexity while preserving temporal fidelity.", "link": "http://arxiv.org/abs/2602.14200v3", "date": "2026-03-19", "relevancy": 2.6391, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5299}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5299}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5237}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TS-Haystack%3A%20A%20Multi-Scale%20Retrieval%20Benchmark%20for%20Time%20Series%20Language%20Models&body=Title%3A%20TS-Haystack%3A%20A%20Multi-Scale%20Retrieval%20Benchmark%20for%20Time%20Series%20Language%20Models%0AAuthor%3A%20Nicolas%20Zumarraga%20and%20Thomas%20Kaar%20and%20Ning%20Wang%20and%20Maxwell%20A.%20Xu%20and%20Max%20Rosenblattl%20and%20Markus%20Kreft%20and%20Kevin%20O%27Sullivan%20and%20Paul%20Schmiedmayer%20and%20Patrick%20Langer%20and%20Robert%20Jakob%0AAbstract%3A%20Time%20Series%20Language%20Models%20%28TSLMs%29%20are%20emerging%20as%20unified%20models%20for%20reasoning%20over%20continuous%20signals%20in%20natural%20language.%20However%2C%20long-context%20retrieval%20remains%20a%20major%20limitation%3A%20existing%20models%20are%20typically%20trained%20and%20evaluated%20on%20short%20sequences%2C%20while%20real-world%20time-series%20sensor%20streams%20can%20span%20millions%20of%20datapoints.%20This%20mismatch%20requires%20precise%20temporal%20localization%20under%20strict%20computational%20constraints%2C%20a%20regime%20that%20is%20not%20captured%20by%20current%20benchmarks.%20We%20introduce%20TS-Haystack%2C%20a%20long-context%20temporal%20retrieval%20benchmark%20comprising%20ten%20task%20types%20across%20four%20categories%3A%20direct%20retrieval%2C%20temporal%20reasoning%2C%20multi-step%20reasoning%20and%20contextual%20anomaly.%20The%20benchmark%20uses%20controlled%20needle%20insertion%20by%20embedding%20short%20activity%20bouts%20into%20longer%20longitudinal%20accelerometer%20recordings%2C%20enabling%20systematic%20evaluation%20across%20context%20lengths%20ranging%20from%20seconds%20to%202%20hours%20per%20sample.%20We%20hypothesize%20that%20existing%20TSLM%20time%20series%20encoders%20overlook%20temporal%20granularity%20as%20context%20length%20increases%2C%20creating%20a%20task-dependent%20effect%3A%20compression%20aids%20classification%20but%20impairs%20retrieval%20of%20localized%20events.%20Across%20multiple%20model%20and%20encoding%20strategies%2C%20we%20observe%20a%20consistent%20divergence%20between%20classification%20and%20retrieval%20behavior.%20Learned%20latent%20compression%20preserves%20or%20improves%20classification%20accuracy%20at%20compression%20ratios%20up%20to%20176%24%5Ctimes%24%2C%20but%20retrieval%20performance%20degrades%20with%20context%20length%2C%20incurring%20in%20the%20loss%20of%20temporally%20localized%20information.%20These%20results%20highlight%20the%20importance%20of%20architectural%20designs%20that%20decouple%20sequence%20length%20from%20computational%20complexity%20while%20preserving%20temporal%20fidelity.%0ALink%3A%20http%3A//arxiv.org/abs/2602.14200v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTS-Haystack%253A%2520A%2520Multi-Scale%2520Retrieval%2520Benchmark%2520for%2520Time%2520Series%2520Language%2520Models%26entry.906535625%3DNicolas%2520Zumarraga%2520and%2520Thomas%2520Kaar%2520and%2520Ning%2520Wang%2520and%2520Maxwell%2520A.%2520Xu%2520and%2520Max%2520Rosenblattl%2520and%2520Markus%2520Kreft%2520and%2520Kevin%2520O%2527Sullivan%2520and%2520Paul%2520Schmiedmayer%2520and%2520Patrick%2520Langer%2520and%2520Robert%2520Jakob%26entry.1292438233%3DTime%2520Series%2520Language%2520Models%2520%2528TSLMs%2529%2520are%2520emerging%2520as%2520unified%2520models%2520for%2520reasoning%2520over%2520continuous%2520signals%2520in%2520natural%2520language.%2520However%252C%2520long-context%2520retrieval%2520remains%2520a%2520major%2520limitation%253A%2520existing%2520models%2520are%2520typically%2520trained%2520and%2520evaluated%2520on%2520short%2520sequences%252C%2520while%2520real-world%2520time-series%2520sensor%2520streams%2520can%2520span%2520millions%2520of%2520datapoints.%2520This%2520mismatch%2520requires%2520precise%2520temporal%2520localization%2520under%2520strict%2520computational%2520constraints%252C%2520a%2520regime%2520that%2520is%2520not%2520captured%2520by%2520current%2520benchmarks.%2520We%2520introduce%2520TS-Haystack%252C%2520a%2520long-context%2520temporal%2520retrieval%2520benchmark%2520comprising%2520ten%2520task%2520types%2520across%2520four%2520categories%253A%2520direct%2520retrieval%252C%2520temporal%2520reasoning%252C%2520multi-step%2520reasoning%2520and%2520contextual%2520anomaly.%2520The%2520benchmark%2520uses%2520controlled%2520needle%2520insertion%2520by%2520embedding%2520short%2520activity%2520bouts%2520into%2520longer%2520longitudinal%2520accelerometer%2520recordings%252C%2520enabling%2520systematic%2520evaluation%2520across%2520context%2520lengths%2520ranging%2520from%2520seconds%2520to%25202%2520hours%2520per%2520sample.%2520We%2520hypothesize%2520that%2520existing%2520TSLM%2520time%2520series%2520encoders%2520overlook%2520temporal%2520granularity%2520as%2520context%2520length%2520increases%252C%2520creating%2520a%2520task-dependent%2520effect%253A%2520compression%2520aids%2520classification%2520but%2520impairs%2520retrieval%2520of%2520localized%2520events.%2520Across%2520multiple%2520model%2520and%2520encoding%2520strategies%252C%2520we%2520observe%2520a%2520consistent%2520divergence%2520between%2520classification%2520and%2520retrieval%2520behavior.%2520Learned%2520latent%2520compression%2520preserves%2520or%2520improves%2520classification%2520accuracy%2520at%2520compression%2520ratios%2520up%2520to%2520176%2524%255Ctimes%2524%252C%2520but%2520retrieval%2520performance%2520degrades%2520with%2520context%2520length%252C%2520incurring%2520in%2520the%2520loss%2520of%2520temporally%2520localized%2520information.%2520These%2520results%2520highlight%2520the%2520importance%2520of%2520architectural%2520designs%2520that%2520decouple%2520sequence%2520length%2520from%2520computational%2520complexity%2520while%2520preserving%2520temporal%2520fidelity.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.14200v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=TS-Haystack%3A%20A%20Multi-Scale%20Retrieval%20Benchmark%20for%20Time%20Series%20Language%20Models&entry.906535625=Nicolas%20Zumarraga%20and%20Thomas%20Kaar%20and%20Ning%20Wang%20and%20Maxwell%20A.%20Xu%20and%20Max%20Rosenblattl%20and%20Markus%20Kreft%20and%20Kevin%20O%27Sullivan%20and%20Paul%20Schmiedmayer%20and%20Patrick%20Langer%20and%20Robert%20Jakob&entry.1292438233=Time%20Series%20Language%20Models%20%28TSLMs%29%20are%20emerging%20as%20unified%20models%20for%20reasoning%20over%20continuous%20signals%20in%20natural%20language.%20However%2C%20long-context%20retrieval%20remains%20a%20major%20limitation%3A%20existing%20models%20are%20typically%20trained%20and%20evaluated%20on%20short%20sequences%2C%20while%20real-world%20time-series%20sensor%20streams%20can%20span%20millions%20of%20datapoints.%20This%20mismatch%20requires%20precise%20temporal%20localization%20under%20strict%20computational%20constraints%2C%20a%20regime%20that%20is%20not%20captured%20by%20current%20benchmarks.%20We%20introduce%20TS-Haystack%2C%20a%20long-context%20temporal%20retrieval%20benchmark%20comprising%20ten%20task%20types%20across%20four%20categories%3A%20direct%20retrieval%2C%20temporal%20reasoning%2C%20multi-step%20reasoning%20and%20contextual%20anomaly.%20The%20benchmark%20uses%20controlled%20needle%20insertion%20by%20embedding%20short%20activity%20bouts%20into%20longer%20longitudinal%20accelerometer%20recordings%2C%20enabling%20systematic%20evaluation%20across%20context%20lengths%20ranging%20from%20seconds%20to%202%20hours%20per%20sample.%20We%20hypothesize%20that%20existing%20TSLM%20time%20series%20encoders%20overlook%20temporal%20granularity%20as%20context%20length%20increases%2C%20creating%20a%20task-dependent%20effect%3A%20compression%20aids%20classification%20but%20impairs%20retrieval%20of%20localized%20events.%20Across%20multiple%20model%20and%20encoding%20strategies%2C%20we%20observe%20a%20consistent%20divergence%20between%20classification%20and%20retrieval%20behavior.%20Learned%20latent%20compression%20preserves%20or%20improves%20classification%20accuracy%20at%20compression%20ratios%20up%20to%20176%24%5Ctimes%24%2C%20but%20retrieval%20performance%20degrades%20with%20context%20length%2C%20incurring%20in%20the%20loss%20of%20temporally%20localized%20information.%20These%20results%20highlight%20the%20importance%20of%20architectural%20designs%20that%20decouple%20sequence%20length%20from%20computational%20complexity%20while%20preserving%20temporal%20fidelity.&entry.1838667208=http%3A//arxiv.org/abs/2602.14200v3&entry.124074799=Read"},
{"title": "Em-Garde: A Propose-Match Framework for Proactive Streaming Video Understanding", "author": "Yikai Zheng and Xin Ding and Yifan Yang and Shiqi Jiang and Hao Wu and Qianxi Zhang and Weijun Wang and Ting Cao and Yunxin Liu", "abstract": "Recent advances in Streaming Video Understanding has enabled a new interaction paradigm where models respond proactively to user queries. Current proactive VideoLLMs rely on per-frame triggering decision making, which suffers from an efficiency-accuracy dilemma. We propose Em-Garde, a novel framework that decouples semantic understanding from streaming perception. At query time, the Instruction-Guided Proposal Parser transforms user queries into structured, perceptually grounded visual proposals; during streaming, a Lightweight Proposal Matching Module performs efficient embedding-based matching to trigger responses. Experiments on StreamingBench and OVO-Bench demonstrate consistent improvements over prior models in proactive response accuracy and efficiency, validating an effective solution for proactive video understanding under strict computational constraints.", "link": "http://arxiv.org/abs/2603.19054v1", "date": "2026-03-19", "relevancy": 2.6263, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5336}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5336}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5086}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Em-Garde%3A%20A%20Propose-Match%20Framework%20for%20Proactive%20Streaming%20Video%20Understanding&body=Title%3A%20Em-Garde%3A%20A%20Propose-Match%20Framework%20for%20Proactive%20Streaming%20Video%20Understanding%0AAuthor%3A%20Yikai%20Zheng%20and%20Xin%20Ding%20and%20Yifan%20Yang%20and%20Shiqi%20Jiang%20and%20Hao%20Wu%20and%20Qianxi%20Zhang%20and%20Weijun%20Wang%20and%20Ting%20Cao%20and%20Yunxin%20Liu%0AAbstract%3A%20Recent%20advances%20in%20Streaming%20Video%20Understanding%20has%20enabled%20a%20new%20interaction%20paradigm%20where%20models%20respond%20proactively%20to%20user%20queries.%20Current%20proactive%20VideoLLMs%20rely%20on%20per-frame%20triggering%20decision%20making%2C%20which%20suffers%20from%20an%20efficiency-accuracy%20dilemma.%20We%20propose%20Em-Garde%2C%20a%20novel%20framework%20that%20decouples%20semantic%20understanding%20from%20streaming%20perception.%20At%20query%20time%2C%20the%20Instruction-Guided%20Proposal%20Parser%20transforms%20user%20queries%20into%20structured%2C%20perceptually%20grounded%20visual%20proposals%3B%20during%20streaming%2C%20a%20Lightweight%20Proposal%20Matching%20Module%20performs%20efficient%20embedding-based%20matching%20to%20trigger%20responses.%20Experiments%20on%20StreamingBench%20and%20OVO-Bench%20demonstrate%20consistent%20improvements%20over%20prior%20models%20in%20proactive%20response%20accuracy%20and%20efficiency%2C%20validating%20an%20effective%20solution%20for%20proactive%20video%20understanding%20under%20strict%20computational%20constraints.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19054v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEm-Garde%253A%2520A%2520Propose-Match%2520Framework%2520for%2520Proactive%2520Streaming%2520Video%2520Understanding%26entry.906535625%3DYikai%2520Zheng%2520and%2520Xin%2520Ding%2520and%2520Yifan%2520Yang%2520and%2520Shiqi%2520Jiang%2520and%2520Hao%2520Wu%2520and%2520Qianxi%2520Zhang%2520and%2520Weijun%2520Wang%2520and%2520Ting%2520Cao%2520and%2520Yunxin%2520Liu%26entry.1292438233%3DRecent%2520advances%2520in%2520Streaming%2520Video%2520Understanding%2520has%2520enabled%2520a%2520new%2520interaction%2520paradigm%2520where%2520models%2520respond%2520proactively%2520to%2520user%2520queries.%2520Current%2520proactive%2520VideoLLMs%2520rely%2520on%2520per-frame%2520triggering%2520decision%2520making%252C%2520which%2520suffers%2520from%2520an%2520efficiency-accuracy%2520dilemma.%2520We%2520propose%2520Em-Garde%252C%2520a%2520novel%2520framework%2520that%2520decouples%2520semantic%2520understanding%2520from%2520streaming%2520perception.%2520At%2520query%2520time%252C%2520the%2520Instruction-Guided%2520Proposal%2520Parser%2520transforms%2520user%2520queries%2520into%2520structured%252C%2520perceptually%2520grounded%2520visual%2520proposals%253B%2520during%2520streaming%252C%2520a%2520Lightweight%2520Proposal%2520Matching%2520Module%2520performs%2520efficient%2520embedding-based%2520matching%2520to%2520trigger%2520responses.%2520Experiments%2520on%2520StreamingBench%2520and%2520OVO-Bench%2520demonstrate%2520consistent%2520improvements%2520over%2520prior%2520models%2520in%2520proactive%2520response%2520accuracy%2520and%2520efficiency%252C%2520validating%2520an%2520effective%2520solution%2520for%2520proactive%2520video%2520understanding%2520under%2520strict%2520computational%2520constraints.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.19054v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Em-Garde%3A%20A%20Propose-Match%20Framework%20for%20Proactive%20Streaming%20Video%20Understanding&entry.906535625=Yikai%20Zheng%20and%20Xin%20Ding%20and%20Yifan%20Yang%20and%20Shiqi%20Jiang%20and%20Hao%20Wu%20and%20Qianxi%20Zhang%20and%20Weijun%20Wang%20and%20Ting%20Cao%20and%20Yunxin%20Liu&entry.1292438233=Recent%20advances%20in%20Streaming%20Video%20Understanding%20has%20enabled%20a%20new%20interaction%20paradigm%20where%20models%20respond%20proactively%20to%20user%20queries.%20Current%20proactive%20VideoLLMs%20rely%20on%20per-frame%20triggering%20decision%20making%2C%20which%20suffers%20from%20an%20efficiency-accuracy%20dilemma.%20We%20propose%20Em-Garde%2C%20a%20novel%20framework%20that%20decouples%20semantic%20understanding%20from%20streaming%20perception.%20At%20query%20time%2C%20the%20Instruction-Guided%20Proposal%20Parser%20transforms%20user%20queries%20into%20structured%2C%20perceptually%20grounded%20visual%20proposals%3B%20during%20streaming%2C%20a%20Lightweight%20Proposal%20Matching%20Module%20performs%20efficient%20embedding-based%20matching%20to%20trigger%20responses.%20Experiments%20on%20StreamingBench%20and%20OVO-Bench%20demonstrate%20consistent%20improvements%20over%20prior%20models%20in%20proactive%20response%20accuracy%20and%20efficiency%2C%20validating%20an%20effective%20solution%20for%20proactive%20video%20understanding%20under%20strict%20computational%20constraints.&entry.1838667208=http%3A//arxiv.org/abs/2603.19054v1&entry.124074799=Read"},
{"title": "Otter: Mitigating Background Distractions of Wide-Angle Few-Shot Action Recognition with Enhanced RWKV", "author": "Wenbo Huang and Jinghui Zhang and Zhenghao Chen and Guang Li and Lei Zhang and Yang Cao and Fang Dong and Takahiro Ogawa and Miki Haseyama", "abstract": "Wide-angle videos in few-shot action recognition (FSAR) effectively express actions within specific scenarios. However, without a global understanding of both subjects and background, recognizing actions in such samples remains challenging because of the background distractions. Receptance Weighted Key Value (RWKV), which learns interaction between various dimensions, shows promise for global modeling. While directly applying RWKV to wide-angle FSAR may fail to highlight subjects due to excessive background information. Additionally, temporal relation degraded by frames with similar backgrounds is difficult to reconstruct, further impacting performance. Therefore, we design the CompOund SegmenTation and Temporal REconstructing RWKV (Otter). Specifically, the Compound Segmentation Module~(CSM) is devised to segment and emphasize key patches in each frame, effectively highlighting subjects against background information. The Temporal Reconstruction Module (TRM) is incorporated into the temporal-enhanced prototype construction to enable bidirectional scanning, allowing better reconstruct temporal relation. Furthermore, a regular prototype is combined with the temporal-enhanced prototype to simultaneously enhance subject emphasis and temporal modeling, improving wide-angle FSAR performance. Extensive experiments on benchmarks such as SSv2, Kinetics, UCF101, and HMDB51 demonstrate that Otter achieves state-of-the-art performance. Extra evaluation on the VideoBadminton dataset further validates the superiority of Otter in wide-angle FSAR.", "link": "http://arxiv.org/abs/2511.06741v6", "date": "2026-03-19", "relevancy": 2.6253, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5389}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5206}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5157}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Otter%3A%20Mitigating%20Background%20Distractions%20of%20Wide-Angle%20Few-Shot%20Action%20Recognition%20with%20Enhanced%20RWKV&body=Title%3A%20Otter%3A%20Mitigating%20Background%20Distractions%20of%20Wide-Angle%20Few-Shot%20Action%20Recognition%20with%20Enhanced%20RWKV%0AAuthor%3A%20Wenbo%20Huang%20and%20Jinghui%20Zhang%20and%20Zhenghao%20Chen%20and%20Guang%20Li%20and%20Lei%20Zhang%20and%20Yang%20Cao%20and%20Fang%20Dong%20and%20Takahiro%20Ogawa%20and%20Miki%20Haseyama%0AAbstract%3A%20Wide-angle%20videos%20in%20few-shot%20action%20recognition%20%28FSAR%29%20effectively%20express%20actions%20within%20specific%20scenarios.%20However%2C%20without%20a%20global%20understanding%20of%20both%20subjects%20and%20background%2C%20recognizing%20actions%20in%20such%20samples%20remains%20challenging%20because%20of%20the%20background%20distractions.%20Receptance%20Weighted%20Key%20Value%20%28RWKV%29%2C%20which%20learns%20interaction%20between%20various%20dimensions%2C%20shows%20promise%20for%20global%20modeling.%20While%20directly%20applying%20RWKV%20to%20wide-angle%20FSAR%20may%20fail%20to%20highlight%20subjects%20due%20to%20excessive%20background%20information.%20Additionally%2C%20temporal%20relation%20degraded%20by%20frames%20with%20similar%20backgrounds%20is%20difficult%20to%20reconstruct%2C%20further%20impacting%20performance.%20Therefore%2C%20we%20design%20the%20CompOund%20SegmenTation%20and%20Temporal%20REconstructing%20RWKV%20%28Otter%29.%20Specifically%2C%20the%20Compound%20Segmentation%20Module~%28CSM%29%20is%20devised%20to%20segment%20and%20emphasize%20key%20patches%20in%20each%20frame%2C%20effectively%20highlighting%20subjects%20against%20background%20information.%20The%20Temporal%20Reconstruction%20Module%20%28TRM%29%20is%20incorporated%20into%20the%20temporal-enhanced%20prototype%20construction%20to%20enable%20bidirectional%20scanning%2C%20allowing%20better%20reconstruct%20temporal%20relation.%20Furthermore%2C%20a%20regular%20prototype%20is%20combined%20with%20the%20temporal-enhanced%20prototype%20to%20simultaneously%20enhance%20subject%20emphasis%20and%20temporal%20modeling%2C%20improving%20wide-angle%20FSAR%20performance.%20Extensive%20experiments%20on%20benchmarks%20such%20as%20SSv2%2C%20Kinetics%2C%20UCF101%2C%20and%20HMDB51%20demonstrate%20that%20Otter%20achieves%20state-of-the-art%20performance.%20Extra%20evaluation%20on%20the%20VideoBadminton%20dataset%20further%20validates%20the%20superiority%20of%20Otter%20in%20wide-angle%20FSAR.%0ALink%3A%20http%3A//arxiv.org/abs/2511.06741v6%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOtter%253A%2520Mitigating%2520Background%2520Distractions%2520of%2520Wide-Angle%2520Few-Shot%2520Action%2520Recognition%2520with%2520Enhanced%2520RWKV%26entry.906535625%3DWenbo%2520Huang%2520and%2520Jinghui%2520Zhang%2520and%2520Zhenghao%2520Chen%2520and%2520Guang%2520Li%2520and%2520Lei%2520Zhang%2520and%2520Yang%2520Cao%2520and%2520Fang%2520Dong%2520and%2520Takahiro%2520Ogawa%2520and%2520Miki%2520Haseyama%26entry.1292438233%3DWide-angle%2520videos%2520in%2520few-shot%2520action%2520recognition%2520%2528FSAR%2529%2520effectively%2520express%2520actions%2520within%2520specific%2520scenarios.%2520However%252C%2520without%2520a%2520global%2520understanding%2520of%2520both%2520subjects%2520and%2520background%252C%2520recognizing%2520actions%2520in%2520such%2520samples%2520remains%2520challenging%2520becaus {"title": "PFGNet: A Fully Convolutional Frequency-Guided Peripheral Gating Network for Efficient Spatiotemporal Predictive Learning", "author": "Xinyong Cai and Changbin Sun and Yong Wang and Hongyu Yang and Yuankai Wu", "abstract": "Spatiotemporal predictive learning (STPL) aims to forecast future frames from past observations and is essential across a wide range of applications. Compared with recurrent or hybrid architectures, pure convolutional models offer superior efficiency and full parallelism, yet their fixed receptive fields limit their ability to adaptively capture spatially varying motion patterns. Inspired by biological center-surround organization and frequency-selective signal processing, we propose PFGNet, a fully convolutional framework that dynamically modulates receptive fields through pixel-wise frequency-guided gating. The core Peripheral Frequency Gating (PFG) block extracts localized spectral cues and adaptively fuses multi-scale large-kernel peripheral responses with learnable center suppression, effectively forming spatially adaptive band-pass filters. To maintain efficiency, all large kernels are decomposed into separable 1D convolutions ($1 \\times k$ followed by $k \\times 1$), reducing per-channel computational cost from $O(k^2)$ to $O(2k)$. PFGNet enables structure-aware spatiotemporal modeling without recurrence or attention. Experiments on Moving MNIST, TaxiBJ, Human3.6M, and KTH show that PFGNet delivers SOTA or near-SOTA forecasting performance with substantially fewer parameters and FLOPs. Our code is available at https://github.com/fhjdqaq/PFGNet.", "link": "http://arxiv.org/abs/2602.20537v2", "date": "2026-03-19", "relevancy": 2.6232, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5307}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity" putational%20cost%20from%20%24O%28k%5E2%29%24%20to%20%24O%282k%29%24.%20PFGNet%20enables%20structure-aware%20spatiotemporal%20modeling%20without%20recurrence%20or%20attention.%20Experiments%20on%20Moving%20MNIST%2C%20TaxiBJ%2C%20Human3.6M%2C%20and%20KTH%20show%20that%20PFGNet%20delivers%20SOTA%20or%20near-SOTA%20forecasting%20performance%20with%20substantially%20fewer%20parameters%20and%20FLOPs.%20Our%20code%20is%20available%20at%20https%3A//github.com/fhjdqaq/PFGNet.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20537v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPFGNet%253A%2520A%2520Fully%2520Convolutional%2520Frequency-Guided%2520Peripheral%2520Gating%2520Network%2520for%2520Efficient%2520Spatiotemporal%2520Predictive%2520Learning%26entry.906535625%3DXinyong%2520Cai%2520and%2520Changbin%2520Sun%2520and%2520Yong%2520Wang%2520and%2520Hongyu%2520Yang%2520and%2520Yuankai%2520Wu%26entry.1292438233%3DSpatiotemporal%2520predictive%2520learning%2520%2528STPL%2529%2520aims%2520to%2520forecast%2520future%2520frames%2520from%2520past%2520observations%2520and%2520is%2520essential%2520across%2520a%2520wide%2520range%2520of%2520applications.%2520Compared%2520with%2520recurrent%2520or%2520hybrid%2520architectures%252C%2520pure%2520convolutional%2520models%2520offer%2520superior%2520efficiency%2520and%2520full%2520parallelism%252C%2520yet%2520their%2520fixed%2520receptive%2520fields%2520limit%2520their%2520ability%2520to%2520adaptively%2520capture%2520spatially%2520varying%2520motion%2520patterns.%2520Inspired%2520by%2520biological%2520center-surround%2520organization%2520and%2520frequency-selective%2520signal%2520processing%252C%2520we%2520propose%2520PFGNet%252C%2520a%2520fully%2520convolutional%2520framework%2520that%2520dynamically%2520modulates%2520receptive%2520fields%2520through%2520pixel-wise%2520frequency-guided%2520gating.%2520The%2520core%2520Peripheral%2520Frequency%2520Gating%2520% {"title": "Farther the Shift, Sparser the Representation: Analyzing OOD Mechanisms in LLMs", "author": "Mingyu Jin and Yutong Yin and Jingcheng Niu and Qingcheng Zeng and Wujiang Xu and Mengnan Du and Wei Cheng and Zhaoran Wang and Tianlong Chen and Dimitris N. Metaxas", "abstract": "In this work, we investigate how Large Language Models (LLMs) adapt their internal representations when encountering inputs of increasing difficulty, quantified as the degree of out-of-distribution (OOD) shift. We reveal a consistent and quantifiable phenomenon: as task difficulty increases, whether through harder reasoning questions, longer contexts, or adding answer choices, the last hidden states of LLMs become substantially sparser. In short, \\textbf{\\textit{the farther the shift, the sparser the representations}}. This sparsity--difficulty relation is observable across diverse models and domains, suggesting that language models respond to unfamiliar or complex inputs by concentrating computation into specialized subspaces in the last hidden state. Through a series of controlled analyses with a learning dynamic explanation, we demonstrate that this sparsity is not incidental but an adaptive mechanism for stabilizing reasoning under OOD. Leveraging this insight, we design \\textit{Sparsity-Guided Curriculum In-Context Learning (SG-ICL)}, a strategy that explicitly uses representation sparsity to schedule few-shot demonstrations, leading to considerable performance enhancements. Our study provides new mechanistic insights into how LLMs internalize OOD challenges. The source code is available at the URL: https://github.com/MingyuJ666/sparsityLLM.", "link": "http://arxiv.org/abs/2603.03415v2", "date": "2026-03-19", "relevancy": 2.615, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5283}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Und {"title": "CrossHOI-Bench: A Unified Benchmark for HOI Evaluation across Vision-Language Models and HOI-Specific Methods", "author": "Qinqian Lei and Bo Wang and Robby T. Tan", "abstract": "HOI detection has long been dominated by task-specific models, sometimes with early vision-language backbones such as CLIP. With the rise of large generative VLMs, a key question is whether standalone VLMs can perform HOI detection competitively against specialized HOI methods. Existing benchmarks such as HICO-DET require exact label matching under incomplete annotations, so any unmatched prediction is marked wrong. This unfairly penalizes valid outputs, especially from less constrained VLMs, and makes cross-paradigm comparison unreliable. To address this limitation, we introduce CrossHOI-Bench, a multiple-choice HOI benchmark with explicit positives and curated negatives, enabling unified and reliable evaluation of both VLMs and HOI-specific models. We further focus on challenging scenarios, such as multi-person scenes and fine-grained interaction distinctions, which are crucial for revealing real differences between the two paradigms. Experiments show that large VLMs achieve competitive, sometimes superior, zero-shot performance, yet they struggle with multiple concurrent actions and with correctly assigning interactions to the target person. Conversely, HOI-specific methods remain weaker in general HOI reasoning but demonstrate stronger multi-action recognition and more reliable identification of which person performs which action. These findings expose complementary strengths and weaknesses of VLMs and HOI-specific methods, which existing benchmarks fail to reveal due to incorrect penalization.", "link": "http://arxiv.org/abs/2508.18753v4", "date": "2026-03-19", "relevancy": 2.6067, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5383}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5383}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4874}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CrossHOI-Bench%3A%20A%20Unified%20Benchmark%20for%20HOI%20Evaluation%20across%20Vision-Language%20Models%20and%20HOI-Specific%20Methods&body=Title%3A%20CrossHOI-Bench%3A%20A%20Unified%20Benchmark%20for%20HOI%20Evaluation%20across%20Vision-Language%20Models%20and%20HOI-Specific%20Methods%0AAuthor%3A%20Qinqian%20Lei%20and%20Bo%20Wang%20and%20Robby%20T.%20Tan%0AAbstract%3A%20HOI%20detection%20has%20long%20been%20dominated%20by%20task-specific%20models%2C%20sometimes%20with%20early%20vision-language%20backbones%20such%20as%20CLIP.%20With%20the%20rise%20of%20large%20generative%20VLMs%2C%20a%20key%20question%20is%20whether%20standalone%20VLMs%20can%20perform%20HOI%20detection%20competitively%20against%20specialized%20HOI%20methods.%20Existing%20benchmarks%20such%20as%20HICO-DET%20require%20exact%20label%20matching%20under%20incomplete%20annotations%2C%20so%20any%20unmatched%20prediction%20is%20marked%20wrong.%20This%20unfairly%20penalizes%20valid%20outputs%2C%20especially%20from%20less%20constrained%20VLMs%2C%20and%20makes%20cross-paradigm%20comparison%20unreliable.%20To%20address%20this%20limitation%2C%20we%20introduce%20CrossHOI-Bench%2C%20a%20multiple-choice%20HOI%20benchmark%20with%20explicit%20positives%20and%20curated%20negatives%2C%20enabling%20unified%20and%20reliable%20evaluation%20of%20both%20VLMs%20and%20HOI-specific%20models.%20We%20further%20focus%20on%20challenging%20scenarios%2C%20such%20as%20multi-person%20scenes%20and%20fine-grained%20interaction%20distinctions%2C%20which%20are%20crucial%20for%20revealing%20real%20differences%20between%20the%20two%20paradigms.%20Experiments%20show%20that%20large%20VLMs%20achieve%20competitive%2C%20sometimes%20superior%2C%20zero-shot%20performance%2C%20yet%20they%20struggle%20with%20multiple%20concurrent%20actions%20and%20with%20correctly%20assigning%20interactions%20to%20the%20target%20person.%20Conversely%2C%20HOI-specific%20methods%20remain%20weaker%20in%20general%20HOI%20reasoning%20but%20demonstrate%20stronger%20multi-action%20recognition%20and%20more%20reliable%20identification%20of%20which%20person%20performs%20which%20action.%20These%20findings%20expose%20complementary%20strengths%20and%20weaknesses%20of%20VLMs%20and%20HOI-specific%20methods%2C%20which%20existing%20benchmarks%20fail%20to%20reveal%20due%20to%20incorrect%20penalization.%0ALink%3A%20http%3A//arxiv.org/abs/2508.18753v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCrossHOI-Bench%253A%2520A%2520Unified%2520Benchmark%2520for%2520HOI%2520Evaluation%2520across%2520Vision-Language%2520Models%2520and%2520HOI-Specific%2520Methods%26entry.906535625%3DQinqian%2520Lei%2520and%2520Bo%2520Wang%2520and%2520Robby%2520T.%2520Tan%26entry.1292438233%3DHOI%2520detection%2520has%2520long%2520been%2520dominated%2520by%2520task-specific%2520models%252C%2520sometimes%2520with%2520early%2520vision-language%2520backbones%2520such%2520as%2520CLIP.%2520With%2520the%2520rise%2520of%2520large%2520generative%2520VLMs%252C%2520a%2520key%2520question%2520is%2520whether%2520standalone%2520VLMs%2520can%2520perform%2520HOI%2520detection%2520competitively%2520against%2520specialized%2520HOI%2520methods.%2520Existing%2520benchmarks%2520such%2520as%2520HICO-DET%2520require%2520exact%2520label%2520matching%2520under%2520incomplete%2520annotations%252C%2520so%2520any%2520unmatched%2520prediction%2520is%2520marked%2520wrong.%2520This%2520unfairly%2520penalizes%2520valid%2520outputs%252C% {"title": "Enhancing the Parameterization of Reservoir Properties for Data Assimilation Using Deep VAE-GAN", "author": "Marcio Augusto Sampaio and Paulo Henrique Ranazzi and Martin Julian Blunt", "abstract": "Currently, the methods called Iterative Ensemble Smoothers, especially the method called Ensemble Smoother with Multiple Data Assimilation (ESMDA) can be considered state-of-the-art for history matching in petroleum reservoir simulation. However, this approach has two important limitations: the use of an ensemble with finite size to represent the distributions and the Gaussian assumption in parameter and data uncertainties. This latter is particularly important because many reservoir properties have non-Gaussian distributions. Parameterization involves mapping non-Gaussian parameters to a Gaussian field before the update and then mapping them back to the original domain to forward the ensemble through the reservoir simulator. A promising approach to perform parameterization is through deep learning models. Recent studies have shown that Generative Adversarial Networks (GAN) performed poorly concerning data assimilation, but generated more geologically plausible realizations of the reservoir, while the Variational Autoencoder (VAE) performed better than the GAN in data assimilation, but generated less geologically realistic models. This work is innovative in combining the strengths of both to implement a deep learning model called Variational Autoencoder Generative Adversarial Network (VAE-GAN) integrated with ESMDA. The methodology was applied in two case studies, one case being categorical and the other with continuous values of permeability. Our findings demonstrate that by applying the VAE-GAN model we can obtain high quality reservoir descriptions (just like GANs) and a good history matching on the production curves (just like VAEs) simultaneously.", "link": "http://arxiv.org/abs/2603.18766v1", "date": "2026-03-19", "relevancy": 2.5967, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5454}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5066}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.506}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Enhancing%20the%20Parameterization%20of%20Reservoir%20Properties%20for%20Data%20Assimilation%20Using%20Deep%20VAE-GAN&body=Title%3A%20Enhancing%20the%20Parameterization%20of%20Reservoir%20Properties%20for%20Data%20Assimilation%20Using%20Deep%20VAE-GAN%0AAuthor%3A%20Marcio%20Augusto%20Sampaio%20and%20Paulo%20Henrique%20Ranazzi%20and%20Martin%20Julian%20Blunt%0AAbstract%3A%20Currently%2C%20the%20methods%20called%20Iterative%20Ensemble%20Smoothers%2C%20especially%20the%20method%20called%20Ensemble%20Smoother%20with%20Multiple%20Data%20Assimilation%20%28ESMDA%29%20can%20be%20considered%20state-of-the-art%20for%20history%20matching%20in%20petroleum%20reservoir%20simulation.%20However%2C%20this%20approach%20has%20two%20important%20limitations%3A%20the%20use%20of%20an%20ensemble%20with%20finite%20size%20to%20represent%20the%20distributions%20and%20the%20Gaussian%20assumption%20in%20parameter%20and%20data%20uncertainties.%20This%20latter%20is%20particularly%20important%20because%20many%20reservoir%20properties%20have%20non-Gaussian%20distributions.%20Parameterization%20involves%20mapping%20non-Gaussian%20parameters%20to%20a%20Gaussian%20field%20before%20the%20update%20and%20then%20mapping%20them%20back%20to%20the%20original%20domain%20to%20forward%20the%20ensemble%20through%20the%20reservoir%20simulator.%20A%20promising%20approach%20to%20perform%20parameterization%20is%20through%20deep%20learning%20models.%20Recent%20studies%20have%20shown%20that%20Generative%20Adversarial%20Networks%20%28GAN%29%20performed%20poorly%20concerning%20data%20assimilation%2C%20but%20generated%20more%20geologically%20plausible%20realizations%20of%20the%20reservoir%2C%20while%20the%20Variational%20Autoencoder%20%28VAE%29%20performed%20better%20than%20the%20GAN%20in%20data%20assimilation%2C%20but%20generated%20less%20geologically%20realistic%20models.%20This%20work%20is%20innovative%20in%20combining%20the%20strengths%20of%20both%20to%20implement%20a%20deep%20learning%20model%20called%20Variational%20Autoencoder%20Generative%20Adversarial%20Network%20%28VAE-GAN%29%20integrated%20with%20ESMDA.%20The%20methodology%20was%20applied%20in%20two%20case%20studies%2C%20one%20case%20being%20categorical%20and%20the%20other%20with%20continuous%20values%20of%20permeability.%20Our%20findings%20demonstrate%20that%20by%20applying%20the%20VAE-GAN%20model%20we%20can%20obtain%20high%20quality%20reservoir%20descriptions%20%28just%20like%20GANs%29%20and%20a%20good%20history%20matching%20on%20the%20production%20curves%20%28just%20like%20VAEs%29%20simultaneously.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18766v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEnhancing%2520the%2520Parameterization%2520of%2520Reservoir%2520Properties%2520for%2520Data%2520Assimilation%2520Using%2520Deep%2520VAE-GAN%26entry.906535625%3DMarcio%2520Augusto%2520Sampaio%2520and%2520Paulo%2520Henrique%2520Ranazzi%2520and%2520Martin%2520Julian%2520Blunt%26entry.1292438233%3DCurrently%252C%2520the%2520methods%2520called%2520Iterative%2520Ensemble%2520Smoothers%252C%2520especially%2520the%2520method%2520called%2520Ensemble%2520Smoother%2520with%2520Multiple%2520Data%2520Assimilation%2520%2528ESMDA%2529%2520can%2520be%2520considered%2520state-of-the-art%2520for%2520history%2520matching%2520in%2520petroleum%2520reservoir%2520simulation.%2520However%252C%2520this%2520approach%2520has%2520two%2520im 2520obtain%2520high%2520quality%2520reservoir%2520descriptions%2520%2528just%2520like%2520GANs%2529%2520and%2520a%2520good%2520history%2520matching%2520on%2520the%2520production%2520curves%2520%2528just%2520like%2520VAEs%2529%2520simultaneously.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.18766v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Enhancing%20the%20Parameterization%20of%20Reservoir%20Properties%20for%20Data%20Assimilation%20Using%20Deep%20VAE-GAN&entry.906535625=Marcio%20Augusto%20Sampaio%20and%20Paulo%20Henrique%20Ranazzi%20and%20Martin%20Julian%20Blunt&entry.1292438233=Currently%2C%20the%20methods%20called%20Iterative%20Ensemble%20Smoothers%2C%20especially%20the%20method%20called%20Ensemble%20Smoother%20with%20Multiple%20Data%20Assimilation%20%28ESMDA%29%20can%20be%20considered%20state-of-the-art%20for%20history%20matching%20in%20petroleum%20reservoir%20simulation.%20However%2C%20this%20approach%20has%20two%20important%20limitations%3A%20the%20use%20of%20an%20ensemble%20with%20finite%20size%20to%20represent%20the%20distributions%20and%20the%20Gaussian%20assumption%20in%20parameter%20and%20data%20uncertainties.%20This%20latter%20is%20particularly%20important%20because%20many%20reservoir%20properties%20have%20non-Gaussian%20distributions.%20Parameterization%20involves%20mapping%20non-Gaussian%20parameters%20to%20a%20Gaussian%20field%20before%20the%20update%20and%20then%20mapping%20them%20back%20to%20the%20original%20domain%20to%20forward%20the%20ensemble%20through%20the%20reservoir%20simulator.%20A%20promising%20approach%20to%20perform%20parameterization%20is%20through%20deep%20learning%20models.%20Recent%20studies%20have%20shown%20that%20Generative%20Adversarial%20Networks%20%28GAN%29%20performed%20poorly%20concerning%20data%20assimilation%2C%20but%20generated%20more%20geologically%20plausible%20realizations%20of%20the%20reservoir%2C%20while% {"title": "Geography According to ChatGPT -- How Generative AI Represents and Reasons about Geography", "author": "Krzysztof Janowicz and Gengchen Mai and Rui Zhu and Song Gao and Zhangyu Wang and Yingjie Hu and Lauren Bennett", "abstract": "Understanding how AI will represent and reason about geography should be a key concern for all of us, as the broader public increasingly interacts with spaces and places through these systems. Similarly, in line with the nature of foundation models, our own research often relies on pre-trained models. Hence, understanding what world AI systems construct is as important as evaluating their accuracy, including factual recall. To motivate the need for such studies, we provide three illustrative vignettes, i.e., exploratory probes, in the hope that they will spark lively discussions and follow-up work: (1) Do models form strong defaults, and how brittle are model outputs to minute syntactic variations? (2) Can distributional shifts resurface from the composition of individually benign tasks, e.g., when using AI systems to create personas? (3) Do we overlook deeper questions of understanding when solely focusing on the ability of systems to recall facts such as geographic principles?", "link": "http://arxiv.org/abs/2603.18881v1", "date": "2026-03-19", "relevancy": 2.5921, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5614}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5123}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4816}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Geography%20According%20to%20ChatGPT%20--%20How%20Generative%20AI%20Represents%20and%20Reasons%20about%20Geography&body=Title%3A%20Geography%20According%20to%20ChatGPT%20--%20How%20Generative%20AI%20Represents%20and%20Reasons%20about%20Geography%0AAuthor%3A%20Krzysztof%20Janowicz%20and%20Gengchen%20Mai%20and%20Rui%20Zhu%20and%20Song%20Gao%20and%20Zhangyu%20Wang%20and%20Yingjie%20Hu%20and%20Lauren%20Bennett%0AAbstract%3A%20Understanding%20how%20AI%20will%20represent%20and%20reason%20about%20geography%20should%20be%20a%20key%20concern%20for%20all%20of%20us%2C%20as%20the%20broader%20public%20increasingly%20interacts%20with%20spaces%20and%20places%20through%20these%20systems.%20Similarly%2C%20in%20line%20with%20the%20nature%20of%20foundation%20models%2C%20our%20own%20research%20often%20relies%20on%20pre-trained%20models.%20Hence%2C%20understanding%20what%20world%20AI%20systems%20construct%20is%20as%20important%20as%20evaluating%20their%20accuracy%2C%20including%20factual%20recall.%20To%20motivate%20the%20need%20for%20such%20studies%2C%20we%20provide%20three%20illustrative%20vignettes%2C%20i.e.%2C%20exploratory%20probes%2C%20in%20the%20hope%20that%20they%20will%20spark%20lively%20discussions%20and%20follow-up%20work%3A%20%281%29%20Do%20models%20form%20strong%20defaults%2C%20and%20how%20brittle%20are%20model%20outputs%20to%20minute%20syntactic%20variations%3F%20%282%29%20Can%20distributional%20shifts%20resurface%20from%20the%20composition%20of%20individually%20benign%20tasks%2C%20e.g.%2C%20when%20using%20AI%20systems%20to%20create%20personas%3F%20%283%29%20Do%20we%20overlook%20deeper%20questions%20of%20understanding%20when%20solely%20focusing%20on%20the%20ability%20of%20systems%20to%20recall%20facts%20such%20as%20geographic%20principles%3F%0ALink%3A%20http%3A//arxiv.org/abs/2603.18881v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeography%2520According%2520to%2520ChatGPT%2520--%2520How%2520Generative%2520AI%2520Represents%2520and%2520Reasons%2520about%2520Geography%26entry.906535625%3DKrzysztof%2520Janowicz%2520and%2520Gengch {"title": "Activation Quantization of Vision Encoders Needs Prefixing Registers", "author": "Seunghyeon Kim and Taesun Yeom and Jinho Kim and Wonpyo Park and Kyuyeun Kim and Jaeho Lee", "abstract": "Large pretrained vision encoders are central to multimodal intelligence, powering applications from on-device vision processing to vision-language models. Since these applications often demand real-time processing of massive visual data, reducing the inference cost of vision encoders is critical. Quantization offers a practical path, but it remains challenging even at 8-bit precision due to so-called outliers. In this work, we propose $\\textit{RegCache}$, a training-free algorithm that mitigates outliers in large-scale pretrained vision encoders and serves as a plug-in module that can be applied on top of other quantization methods. RegCache introduces outlier-prone yet semantically meaningless prefix tokens to the vision encoder, which prevent other tokens from having outliers. Notably, we observe that outliers in vision encoders behave differently from those in language models, motivating two technical innovations: middle-layer prefixing and token deletion. Experimental results show that our method consistently improves quantized model performance across various vision encoders, particularly in extremely low-bit regimes (e.g., 4-bit).", "link": "http://arxiv.org/abs/2510.04547v4", "date": "2026-03-19", "relevancy": 2.5889, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.527}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.527}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4993}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Activation%20Quantization%20of%20Vision%20Encoders%20Needs%20Prefixing%20Registers&body=Title%3A%20Activation%20Quantization%20of%20Vision%20Encoders%20Needs%20Prefixing%20Registers%0AAuthor%3A%20Seunghyeon%20Kim%20and%20Taesun%20Yeom%20and%20Jinho%20Kim%20and%20Wonpyo%20Park%20and%20Kyuyeun%20Kim%20and%20Jaeho%20Lee%0AAbstract%3A%20Large%20pretrained%20vision%20encoders%20are%20central%20to%20multimodal%20intelligence%2C%20powering%20applications%20from%20on-device%20vision%20processing%20to%20vision-language%20models.%20Since%20these%20applications%20often%20demand%20real-time%20processing%20of%20massive%20visual%20data%2C%20reducing%20the%20inference%20cost%20of%20vision%20encoders%20is%20critical.%20Quantization%20offers%20a%20practical%20path%2C%20but%20it%20remains%20challenging%20even%20at%208-bit%20precision%20due%20to%20so-called%20outliers.%20In%20this%20work%2C%20we%20propose%20%24%5Ctextit%7BRegCache%7D%24%2C%20a%20training-free%20algorithm%20that%20mitigates%20outliers%20in%20large-scale%20pretrained%20vision%20encoders%20and%20serves%20as%20a%20plug-in%20module%20that%20can%20be%20applied%20on%20top%20of%20other%20quantization%20methods.%20RegCache%20introduces%20outlier-prone%20yet%20semantically%20meaningless%20prefix%20tokens%20to%20the%20vision%20encoder%2C%20which%20prevent%20other%20tokens%20from%20having%20outliers.%20Notably%2C%20we%20observe%20that%20outliers%20in%20vision%20encoders%20behave%20differently%20from%20those%20in%20language%20models%2C%20motivating%20two%20technical%20innovations%3A%20middle-layer%20prefixing%20and%20token%20deletion.%20Experimental%20results%20show%20that%20our%20method%20consistently%20improves%20quantized%20model%20performance%20across%20various%20vision%20encoders%2C%20particularly%20in%20extremely%20low-bit%20regimes%20%28e.g.%2C%204-bit%29.%0ALink%3A%20http%3A//arxiv.org/abs/2510.04547v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3 520across%2520various%2520vision%2520encoders%252C%2520particularly%2520in%2520extremely%2520low-bit%2520regimes%2520%2528e.g.%252C%25204-bit%2529.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.04547v4%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Activation%20Quantization%20of%20Vision%20Encoders%20Needs%20Prefixing%20Registers&entry.906535625=Seunghyeon%20Kim%20and%20Taesun%20Yeom%20and%20Jinho%20Kim%20and%20Wonpyo%20Park%20and%20Kyuyeun%20Kim%20and%20Jaeho%20Lee&entry.1292438233=Large%20pretrained%20vision%20encoders%20are%20central%20to%20multimodal%20intelligence%2C%20powering%20applications%20from%20on-device%20vision%20processing%20to%20vision-language%20models.%20Since%20these%20applications%20often%20demand%20real-time%20processing%20of%20massive%20visual%20data%2C%20reducing%20the%20inference%20cost%20of%20vision%20encoders%20is%20critical.%20Quantization%20offers%20a%20practical%20path%2C%20but%20it%20remains%20challenging%20even%20at%208-bit%20precision%20due%20to%20so-called%20outliers.%20In%20this%20work%2C%20we%20propose%20%24%5Ctextit%7BRegCache%7D%24%2C%20a%20training-free%20algorithm%20that%20mitigates%20outliers%20in%20large-scale%20pretrained%20vision%20encoders%20and%20serves%20as%20a%20plug-in%20module%20that%20can%20be%20applied%20on%20top%20of%20other%20quantization%20methods.%20RegCache%20introduces%20outlier-prone%20yet%20semantically%20meaningless%20prefix%20tokens%20to%20the%20vision%20encoder%2C%20which%20prevent%20other%20tokens%20from%20having%20outliers.%20Notably%2C%20we%20observe%20that%20outliers%20in%20vision%20encoders%20behave%20differently%20from%20those%20in%20language%20models%2C%20motivating%20two%20technical%20innovations%3A%20middle-layer%20prefixing%20and%20token%20deletion.%20Experimental%20results%20show%20that%20our%20method%20consistently%20improves%20quantized%20model%20performance%20across%20various%20vision%20encoders%2C%20particularly%20in%20extremely%20low-bit%20regimes%20%28e.g.%2C%204-bit%29.&entry.1838667208=http%3A//arxiv.org/abs/2510.04547v4&entry.124074799=Read"},
{"title": "VesselTok: Tokenizing Vessel-like 3D Biomedical Graph Representations for Reconstruction and Generation", "author": "Chinmay Prabhakar and Bastian Wittmann and Tamaz Amiranashvili and Paul B\u00fcschl and Ezequiel de la Rosa and Julian McGinnis and Benedikt Wiestler and Bjoern Menze and Suprosanna Shit", "abstract": "Spatial graphs provide a lightweight and elegant representation of curvilinear anatomical structures such as blood vessels, lung airways, and neuronal networks. Accurately modeling these graphs is crucial in clinical and (bio-)medical research. However, the high spatial resolution of large networks drastically increases their complexity, resulting in significant computational challenges. In this work, we aim to tackle these challenges by proposing VesselTok, a framework that approaches spatially dense graphs from a parametric shape perspective to learn latent representations (tokens). VesselTok leverages centerline points with a pseudo radius to effectively encode tubular geometry. Specifically, we learn a novel latent representation conditioned on centerline points to encode neural implicit representations of vessel-like, tubular structures. We demonstrate VesselTok's performance across diverse anatomies, including lung airways, lung vessels, and brain vessels, highlighting its ability to robustly encode complex topologies. To prove the effectiveness of VesselTok's learnt latent representations, we show that they (i) generalize to unseen anatomies, (ii) support generative modeling of plausible anatomical graphs, and (iii) transfer effectively to downstream inverse problems, such as link prediction.", "link": "http://arxiv.org/abs/2603.18797v1", "date": "2026-03-19", "relevancy": 2.5826, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5481}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5032}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4982}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VesselTok%3A%20Tokenizing%20Vessel-like%203D%20Biomedical%20Graph%20Representations%20for%20Reconstruction%20and%20Generation&body=Title%3A%20VesselTok%3A%20Tokenizing%20Vessel-like%203D%20Biomedical%20Graph%20Representations%20for%20Reconstruction%20and%20Generation%0AAuthor%3A%20Chinmay%20Prabhakar%20and%20Bastian%20Wittmann%20and%20Tamaz%20Amiranashvili%20and%20Paul%20B%C3%BCschl%20and%20Ezequiel%20de%20la%20Rosa%20and%20Julian%20McGinnis%20and%20Benedikt%20Wiestler%20and%20Bjoern%20Menze%20and%20Suprosanna%20Shit%0AAbstract%3A%20Spatial%20graphs%20provide%20a%20lightweight%20and%20elegant%20representation%20of%20curvilinear%20anatomical%20structures%20such%20as%20blood%20vessels%2C%20lung%20airways%2C%20and%20neuronal%20networks.%20Accurately%20modeling%20these%20graphs%20is%20crucial%20in%20clinical%20and%20%28bio-%29medical%20research.%20However%2C%20the%20high%20spatial%20resolution%20of%20large%20networks%20drastically%20increases%20their%20complexity%2C%20resulting%20in%20significant%20computational%20challenges.%20In%20this%20work%2C%20we%20aim%20to%20tackle%20these%20challenges%20by%20proposing%20VesselTok%2C%20a%20framework%20that%20approaches%20spatially%20dense%20graphs%20from%20a%20parametric%20shape%20perspective%20to%20learn%20latent%20representations%20%28tokens%29.%20VesselTok%20leverages%20centerline%20points%20with%20a%20pseudo%20radius%20to%20effectively%20encode%20tubular%20geometry.%20Specifically%2C%20we%20learn%20a%20novel%20latent%20representation%20conditioned%20on%20centerline%20points%20to%20encode%20neural%20implicit%20representations%20of%20vessel-like%2C%20tubular%20structures.%20We%20demonstrate%20VesselTok%27s%20performance%20across%20diver {"title": "Generation Models Know Space: Unleashing Implicit 3D Priors for Scene Understanding", "author": "Xianjin Wu and Dingkang Liang and Tianrui Feng and Kui Xia and Yumeng Zhang and Xiaofan Li and Xiao Tan and Xiang Bai", "abstract": "While Multimodal Large Language Models demonstrate impressive semantic capabilities, they often suffer from spatial blindness, struggling with fine-grained geometric reasoning and physical dynamics. Existing solutions typically rely on explicit 3D modalities or complex geometric scaffolding, which are limited by data scarcity and generalization challenges. In this work, we propose a paradigm shift by leveraging the implicit spatial prior within large-scale video generation models. We posit that to synthesize temporally coherent videos, these models inherently learn robust 3D structural priors and physical laws. We introduce VEGA-3D (Video Extracted Generative Awareness), a plug-and-play framework that repurposes a pre-trained video diffusion model as a Latent World Simulator. By extracting spatiotemporal features from intermediate noise levels and integrating them with semantic representations via a token-level adaptive gated fusion mechanism, we enrich MLLMs with dense geometric cues without explicit 3D supervision. Extensive experiments across 3D scene understanding, spatial reasoning, and embodied manipulation benchmarks demonstrate that our method outperforms state-of-the-art baselines, validating that generative priors provide a scalable foundation for physical-world understanding. Code is publicly available at https://github.com/H-EmbodVis/VEGA-3D.", "link": "http://arxiv.org/abs/2603.19235v1", "date": "2026-03-19", "relevancy": 2.573, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6583}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.6484}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6321}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generation%20Models%20Know%20Space%3A%20Unleashing%20Implicit%203D%20Priors%20for%20Scene%20Understanding&body=Title%3A%20Generation%20Models%20Know%20Space%3A%20Unleashing%20Implicit%203D%20Priors%20for%20Scene%20Understanding%0AAuthor%3A%20Xianjin%20Wu%20and%20Dingkang%20Liang%20and%20Tianrui%20Feng%20and%20Kui%20Xia%20and%20Yumeng%20Zhang%20and%20Xiaofan%20Li%20and%20Xiao%20Tan%20and%20Xiang%20Bai%0AAbstract%3A%20While%20Multimodal%20Large%20Language%20Models%20demonstrate%20impressive%20semantic%20capabilities%2C%20they%20often%20suffer%20from%20spatial%20blindness%2C%20struggling%20with%20fine-grained%20geometric%20reasoning%20and%20physical%20dynamics.%20Existing%20solutions%20typically%20rely%20on%20explicit%203D%20modalities%20or%20complex%20geometric%20scaffolding%2C%20which%20are%20limited%20by%20data%20scarcity%20and%20generalization%20challenges.%20In%20this%20work%2C%20we%20propose%20a%20paradigm%20shift%20by%20leveraging%20the%20implicit%20spatial%20prior%20within%20large-scale%20video%20generation%20models.%20We%20posit%20that%20to%20synthesize%20temporally%20coherent%20videos%2C%20these%20models%20inherently%20learn%20robust%203D%20structural%20priors%20and%20physical%20laws.%20We%20introduce%20VEGA-3D%20%28Video%20Extracted%20Generative%20Awareness%29%2C%20a%20plug-and-play%20framework%20that%20repurposes%20a%20pre-trained%20video%20diffusion%20model%20as%20a%20Latent%20World%20Simulator.%20By%20extracting%20spatiotemporal%20features%20from%20intermediate%20noise%20levels%20and%20integrating%20them%20with%20semantic%20representations%20via%20a%20token-level%20adaptive%20gated%20fusion%20mechanism%2C%20we%20enrich%20MLLMs%20with%20dense%20geometric%20cues%20without%20explicit%203D%20supervision.%20Extensive%20experiments%20across%203D%20scene%20understanding%2C%20spatial%20reasoning%2C%20and%20embodied%20manipulation%20benchmarks%20demonstrate%20that%20our%20method%20outperforms%20state-of-the-art%20baselines%2C%20validating%20that%20generative%20priors%20provide%20a%20scalable%20foundation%20for%20physical-world%20understanding.%20Code%20is%20publicly%20available%20at%20https%3A//github.com/H-EmbodVis/VEGA-3D.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19235v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeneration%2520Models%2520Know%2520Space%253A%2520Unleashing%2520Implicit%25203D%2520Priors%2520for%2520Scene%2520Understanding%26entry.906535625%3DXianjin%2520Wu%2520and%2520Dingkang%2520Liang%2520and%2520Tianrui%2520Feng%2520and%2520Kui%2520Xia%2520and%2520Yumeng%2520Zhang%2520and%2520Xiaofan%2520Li%2520and%2520Xiao%2520Tan%2520and%2520Xiang%2520Bai%26entry.1292438233%3DWhile%2520Multimodal%2520Large%2520Language%2520Models%2520demonstrate%2520impressive%2520semantic%2520capabilities%252C%2520they%2520often%2520suffer%2520from%2520spatial%2520blindness%252C%2520struggling%2520with%2520fine-grained%2520geometric%2520reasoning%2520and%2520physical%2520dynamics.%2520Existing%2520solutions%2520typically%2520rely%2520on%2520explicit%25203D%2520modalities%2520or%2520complex%2520geometric%2520scaffolding%252C%2520which%2520are%2520limited%2520by%2520data%2520scarcity%2520and%2520generalization%2520challenges.%2520In%2520this%2520work%252C%2520we%2520propose%2520a%2520paradigm%2520shift%2520by%2520leveraging%2520the%2520implicit%2520spatial%2520prior%2520within%2520large-scale%2520video%2520generation%2520models.%2520We%2520posit%2520that%2520to%2520synthesize%2520temporally%2520coherent%2520videos%252C%2520these%2520models%2520inherently%2520learn%2520robust%25203D%2520structural%2520priors%2520and%2520physical%2520laws.%2520We%2520introduce%2520VEGA-3D%2520%2528Video%2520Extracted%2520Generative%2520Awareness%2529%252C%2520a%2520plug-and-play%2520framework%2520that%2520repurposes%2520a%2520pre-trained%2520video%2520diffusion%2520model%2520as%2520a%2520Latent%2520World%2520Simulator.%2520By%2520extracting%2520spatiotemporal%2520features%2520from%2520intermediate%2520noise%2520levels%2520and%2520integrating%2520them%2520with%2520semantic%2520representations%2520via%2520a%2520token-level%2520adaptive%2520gated%2520fusion%2520mechanism%252C%2520we%2520enrich%2520MLLMs%2520with%2520dense%2520geometric%2520cues%2520without%2520explicit%25203D%2520supervision.%2520Extensive%2520experiments%2520across%25203D%2520scene%2520understanding%252C%2520spatial%2520reasoning%252C%2520and%2520embodied%2520manipulation%2520benchmarks%2520demonstrate%2520that%2520our%2520method%2520outperforms%2520state-of-the-art%2520baselines%252C%2520validating%2520that%2520generative%2520priors%2520provide%2520a%2520scalable%2520foundation%2520for%2520physical-world%2520understanding.%2520Code%2520is%2520publicly%2520available%2520at%2520https%253A//github.com/H-EmbodVis/VEGA-3D.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.19235v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Generation%20Models%20Know%20Space%3A%20Unleashing%20Implicit%203D%20Priors%20for%20Scene%20Understanding&entry.906535625=Xianjin%20Wu%20and%20Dingkang%20Liang%20and%20Tianrui%20Feng%20and%20Kui%20Xia%20and%20Yumeng%20Zhang%20and%20Xiaofan%20Li%20and%20Xiao%20Tan%20and%20Xiang%20Bai&entry.1292438233=While%20Multimodal%20Large%20Language%20Models%20demonstrate%20impressive%20semantic%20capabilities%2C%20they%20often%20suffer%20from%20spatial%20blindness%2C%20struggling%20with%20fine-grained%20geometric%20reasoning%20and%20physical%20dynamics.%20Existing%20solutions%20typically%20rely%20on%20explicit%203D%20modalities%20or%20complex%20geometric%20scaffolding%2C%20which%20are%20limited%20by%20data%20scarcity%20and%20generalization%2 {"title": "ITKIT: Feasible CT Image Analysis based on SimpleITK and MMEngine", "author": "Yiqin Zhang and Meiling Chen", "abstract": "CT images are widely used in clinical diagnosis and treatment, and their data have formed a de facto standard - DICOM. It is clear and easy to use, and can be efficiently utilized by data-driven analysis methods such as deep learning. In the past decade, many program frameworks for medical image analysis have emerged in the open-source community. ITKIT analyzed the characteristics of these frameworks and hopes to provide a better choice in terms of ease of use and configurability. ITKIT offers a complete pipeline from DICOM to 3D segmentation inference. Its basic practice only includes some essential steps, enabling users with relatively weak computing capabilities to quickly get started using the CLI according to the documentation. For advanced users, the OneDL-MMEngine framework provides a flexible model configuration and deployment entry. This paper conducted 12 typical experiments to verify that ITKIT can meet the needs of most basic scenarios.", "link": "http://arxiv.org/abs/2603.14255v2", "date": "2026-03-19", "relevancy": 2.5726, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5247}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5247}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4942}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ITKIT%3A%20Feasible%20CT%20Image%20Analysis%20based%20on%20SimpleITK%20and%20MMEngine&body=Title%3A%20ITKIT%3A%20Feasible%20CT%20Image%20Analysis%20based%20on%20SimpleITK%20and%20MMEngine%0AAuthor%3A%20Yiqin%20Zhang%20and%20Meiling%20Chen%0AAbstract%3A%20CT%20imag {"title": "AgroCoT: A Chain-of-Thought Benchmark for Evaluating Reasoning in Vision-Language Models for Agriculture", "author": "Yibin Wen and Qingmei Li and Zi Ye and Jiarui Zhang and Zurong Mai and Jing Wu and Shuohong Lou and Yuhang Chen and Henglian Huang and Xiaoya Fan and Yang Zhang and Defeng Gu and Lingyuan Zhao and Yutong Lu and Haohuan Fu and Jianxi Huang and Juepeng Zheng", "abstract": "Recent advancements in Vision-Language Models (VLMs) have significantly impacted various industries. In agriculture, these multimodal capabilities hold great promise for applications such as precision farming, crop monitoring, pest detection, and environmental sustainability. However, while several Visual Question Answering (VQA) datasets and benchmarks have been developed to assess VLM performance, they often fail to effectively evaluate the critical reasoning and problem-solving skills needed in complex agricultural contexts. To address this gap, we introduce AgroCoT, a VQA dataset that integrates Chain-of-Thought (CoT) reasoning, specifically designed to evaluate the reasoning capabilities of VLMs. With 4,759 carefully curated samples, AgroCoT provides a comprehensive and robust evaluation of reasoning abilities, particularly in zero-shot scenarios, focusing on the models' ability to engage in logical reasoning and effective problem-solving. Our evaluation of 30 representative VLMs, including both proprietary and open-source models, reveals a gap in their reasoning capabilities, which underscores the importance of incorporating CoT for assessments. Our dataset is available at https://huggingface.co/datasets/wenyb/AgriCoT.", "link": "http://arxiv.org/abs/2511.23253v2", "date": "2026-03-19", "relevancy": 2.5716, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5319}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5319}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4791}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AgroCoT%3A%20A%20Chain-of-Thought%20Benchmark%20for%20Evaluating%20Reasoning%20in%20Vision-Language%20Models%20for%20Agriculture&body=Title%3A%20AgroCoT%3A%20A%20Chain-of-Thought%20Benchmark%20for%20Evaluating%20Reasoning%20in%20Vision-Language%20Models%20for%20Agriculture%0AAuthor%3A%20Yibin%20Wen%20and%20Qingmei%20Li%20and%20Zi%20Ye%20and%20Jiarui%20Zhang%20and%20Zurong%20Mai%20and%20Jing%20Wu%20and%20Shuohong%20Lou%20and%20Yuhang%20Chen%20and%20Henglian%20Huang%20and%20Xiaoya%20Fan%20and%20Yang%20Zhang%20and%20Defeng%20Gu%20and%20Lingyuan%20Zhao%20and%20Yutong%20Lu%20and%20Haohuan%20Fu%20and%20Jianxi%20Huang%20and%20Juepeng%20Zheng%0AAbstract%3A%20Recent%20advancements%20in%20Vision-Language%20Models%20%28VLMs%29%20have%20significantly%20impacted%20various%20industries.%20In%20agriculture%2C%20these%20multimodal%20capabilities%20hold%20great%20promise%20for%20applications%20such%20as%20precision%20farming%2C%20crop%20monitoring%2C%20pest%20detection%2C%20and%20environmental%20sustainability.%20However%2C%20while%20several%20Visual%20Question%20Answering%20%28VQA%29%20datasets%20and%20benchmarks%20have%20been%20developed%20to%20assess%20VLM%20performance%2C%20they%20often%20fail%20to%20effectively%20evaluate%20the%20critical%20reasoning%20and%20problem-solving%20skills%20needed%20in%20complex%20agricultural%20contexts.%20To%20address%20this%20gap%2C%20we%20introduce%20AgroCoT%2C%20a%20VQA%20dataset%20that%20integrates%20Chain-of-Thought%20%28CoT%29%20reasoning%2C%20specifically%20designed%20to%20evaluate%20the%20reasoning%20capabilities%20of%20VLMs.%20With%204%2C759%20carefully%20curated%20samples%2C%20AgroCoT%20provides%20a%20comprehensive%20and%20robust%20evaluation%20of%20reasoning%20abilities%2C%20particularly%20in%20zero-shot%20scenarios%2C%20focusing%20on%20the%20models%27%20ability%20to%20engage%20in%20logical%20reasoning%20and%20effective%20problem-solving.%20Our%20evaluation%20of%2030%20representative%20VLMs%2C%20including%20both%20proprietary%20and%20open-source%20models%2C%20reveals%20a%20gap%20in%20their%20reasoning%20capabilities%2C%20which%20underscores%20the%20importance%20of%20incorporating%20CoT%20for%20assessments.%20Our%20dataset%20is%20available%20at%20https%3A//huggingface.co/datasets/wenyb/AgriCoT.%0ALink%3A%20http%3A//arxiv.org/abs/2511.23253v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAgroCoT%253A%2520A%2520Chain-of-Thought%2520Benchmark%2520for%2520Evaluating%2520Reasoning%2520in%2520Vision-Language%2520Models%2520for%2520Agriculture%26entry.906535625%3DYibin%2520Wen%2520and%2520Qingmei%2520Li%2520and%2520Zi%2520Ye%2520and%2520Jiarui%2520Zhang%2520and%2520Zurong%2520Mai%2520and%2520Jing%2520Wu%2520and%2520Shuohong%2520Lou%2520and%2520Yuhang%2520Chen%2520and%2520Henglian%2520Huang%2520and%2520Xiaoya%2520Fan%2520and%2520Yang%2520Zhang%2520and%2520Defeng%2520Gu%2520and%2520Lingyuan%2520Zhao%2520and%2520Yutong%2520Lu%2520and%2520Haohuan%2520Fu%2520and%2520Jianxi%2520Huang%2520and%2520Juepeng%2520Zheng%26entry.1292438233%3DRecent%2520advancements%2520in%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520have%2520significantly%2520impacted%2520various%2520industries.%2520In%2520agriculture%252C%2520these%2520multimodal%2520capabilities%2520hold%2520great%2520promise%2520for%2520applications%2520such%2520as%2520precision%2520farming%252C%2520crop%2520monitoring%252C%2520pest%2520detection%252C%2520and%2520environmental%2520sustainability.%2520However%252C%2520while%2520several%2520Visual%2520Question%2520Answering%2520%2528VQA%2529%2520datasets%2520and%2520benchmarks%2520have%2520been%2520developed%2520to%2520assess%

0and%20Haohuan%20Fu%20and%20Jianxi%20Huang%20and%20Juepeng%20Zheng&entry.1292438233=Recent%20advancements%20in%20Vision-Language%20Models%20%28VLMs%29%20have%20significantly%20impacted%20various%20industries.%20In%20agriculture%2C%20these%20multimodal%20capabilities%20hold%20great%20promise%20for%20applications%20such%20as%20precision%20farming%2C%20crop%20monitoring%2C%20pest%20detection%2C%20and%20environmental%20sustainability.%20However%2C%20while%20several%20Visual%20Question%20Answering%20%28VQA%29%20datasets%20and%20benchmarks%20have%20been%20developed%20to%20assess%20VLM%20performance%2C%20they%20often%20fail%20to%20effectively%20evaluate%20the%20critical%20reasoning%20and%20problem-solving%20skills%20needed%20in%20complex%20agricultural%20contexts.%20To%20address%20this%20gap%2C%20we%20introduce%20AgroCoT%2C%20a%20VQA%20dataset%20that%20integrates%20Chain-of-Thought%20%28CoT%29%20reasoning%2C%20specifically%20designed%20to%20evaluate%20the%20reasoning%20capabilities%20of%20VLMs.%20With%204%2C759%20carefully%20curated%20samples%2C%20AgroCoT%20provides%20a%20comprehensive%20and%20robust%20evaluation%20of%20reasoning%20abilities%2C%20particularly%20in%20zero-shot%20scenarios%2C%20focusing%20on%20the%20models%27%20ability%20to%20engage%20in%20logical%20reasoning%20and%20effective%20problem-solving.%20Our%20evaluation%20of%2030%20representative%20VLMs%2C%20including%20both%20proprietary%20and%20open-source%20models%2C%20reveals%20a%20gap%20in%20their%20reasoning%20capabilities%2C%20which%20underscores%20the%20importance%20of%20incorporating%20CoT%20for%20assessments.%20Our%20dataset%20is%20available%20at%20https%3A//huggingface.co/datasets/wenyb/AgriCoT.&entry.1838667208=http%3A//arxiv.org/abs/2511.23253v2&entry.124074799=Read"},
{"title": "Mi:dm K 2.5 Pro", "author": " KT Tech innovation Group", "abstract": "The evolving LLM landscape requires capabilities beyond simple text generation, prioritizing multi-step reasoning, long-context understanding, and agentic workflows. This shift challenges existing models in enterprise environments, especially in Korean-language and domain-specific scenarios where scaling is insufficient. We introduce Mi:dm K 2.5 Pro, a 32B parameter flagship LLM designed to address enterprise-grade complexity through reasoning-focused optimization.\n  Our methodology builds a robust data foundation via a quality-centric curation pipeline utilizing abstract syntax tree (AST) analysis for code, gap-filling synthesis for mathematics, and an LLM-based quality evaluator. Pre-training scales the model via layer-predictor-based Depth Upscaling (DuS) and a progressive strategy supporting a 128K token context window. Post-training introduces a specialized multi-stage pipeline, including Reasoning SFT, model merging, and asynchronous reinforcement learning (RL), to develop complex problem-solving skills. \"Fusion Training\" then rebalances these capabilities with conversational fluency, consistent response styling, and reliable tool-use.\n  The evaluations show that Mi:dm K 2.5 Pro achieves competitive performance against leading global and domestic models. In addition, it sets state-of-the-art results on Korean-specific benchmarks, showcasing deep linguistic and cultural understanding. Finally, Responsible AI evaluations validate safety against attacks, ensuring a secure profile for deployment with a balance of harmlessness and responsiveness.", "link": "http://arxiv.org/abs/2603.18788v1", "date": "2026-03-19", "relevancy": 2.5654, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.517}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  U {"title": "Optimal Splitting of Language Models from Mixtures to Specialized Domains", "author": "Skyler Seto and Pierre Ablin and Anastasiia Filippova and Jiayuan Ye and Louis Bethune and Angelos Katharopoulos and David Grangier", "abstract": "Language models achieve impressive performance on a variety of knowledge, language, and reasoning tasks due to the scale and diversity of pretraining data available. The standard training recipe is a two-stage paradigm: pretraining first on the full corpus of data followed by specialization on a subset of high quality, specialized data from the full corpus. In the multi-domain setting, this involves continued pretraining of multiple models on each specialized domain, referred to as split model training. We propose a method for pretraining multiple models independently over a general pretraining corpus, and determining the optimal compute allocation between pretraining and continued pretraining using scaling laws. Our approach accurately predicts the loss of a model of size N with D pretraining and D' specialization tokens, and extrapolates to larger model sizes and number of tokens. Applied to language model training, our approach improves performance consistently across common sense knowledge and reasoning benchmarks across different model sizes and compute budgets.", "link": "http://arxiv.org/abs/2603.19149v1", "date": "2026-03-19", "relevancy": 2.5606, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5135}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5135}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5093}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Optimal%20Splitting%20of%20Language%20Models%20from%20Mixtures%20to%20Specialized%20Domains&body=Title%3A%20Optimal%20Splitting%20of%20Language%20Models%20from%20Mixtures%20to%20Specialized%20Domains%0AAuthor%3A%20Skyler%20Seto%20and%20Pierre%20Ablin%20and%20Anastasiia%20Filippova%20and%20Jiayuan%20Ye%20and%20Louis%20Bethune%20and%20Angelos%20Katharopoulos%20and%20David%20Grangier%0AAbstract%3A%20Language%20models%20achieve%20impressive%20performance%20on%20a%20variety%20of%20knowledge%2C%20language%2C%20and%20reasoning%20tasks%20due%20to%20the%20scale%20and%20diversity%20of%20pretraining%20data%20available.%20The%20standard%20training%20recipe%20is%20a%20two-stage%20paradigm%3A%20pretraining%20first%20on%20the%20full%20corpus%20of%20data%20followed%20by%20specialization%20on%20a%20subset%20of%20high%20quality%2C%20specialized%20data%20from%20the%20full%20corpus.%20In%20the%20multi-domain%20setting%2C%20this%20involves%20continued%20pretraining%20of%20multiple%20models%20on%20each%20specialized%20domain%2C%20referred%20to%20as%20split%20model%20training.%20We%20propose%20a%20method%20for%20pretraining%20multiple%20models%20independently%20over%20a%20general%20pretraining%20corpus%2C%20and%20determining%20the%20optimal%20compute%20allocation%20between%20pretraining%20and%20continued%20pretraining%20using%20scaling%20laws.%20Our%20approach%20accurately%20predicts%20the%20loss%20of%20a%20model%20of%20size%20N%20with%20D%20pretraining%20and%20D%27%20specialization%20tokens%2C%20and%20extrapolates%20to%20larger%20model%20sizes%20and%20number%20of%20tokens.%20Applied%20to%20language%20model%20training%2C%20our%20approach%20improves%20performance%20consistently%20across%20common%20sense%20knowledge%20and%20reasoning%20benchmarks%20across%20different%20model%20sizes%20and%20compute%20budgets.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19149v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOptimal%2520Splitting%2520of%252 {"title": "V-Dreamer: Automating Robotic Simulation and Trajectory Synthesis via Video Generation Priors", "author": "Songjia He and Zixuan Chen and Hongyu Ding and Dian Shao and Jieqi Shi and Chenxu Li and Jing Huo and Yang Gao", "abstract": "Training generalist robots demands large-scale, diverse manipulation data, yet real-world collection is prohibitively expensive, and existing simulators are often constrained by fixed asset libraries and manual heuristics. To bridge this gap, we present V-Dreamer, a fully automated framework that generates open-vocabulary, simulation-ready manipulation environments and executable expert trajectories directly from natural language instructions. V-Dreamer employs a novel generative pipeline that constructs physically grounded 3D scenes using large language models and 3D generative models, validated by geometric constraints to ensure stable, collision-free layouts. Crucially, for behavior synthesis, we leverage video generation models as rich motion priors. These visual predictions are then mapped into executable robot trajectories via a robust Sim-to-Gen visual-kinematic alignment module utilizing CoTracker3 and VGGT. This pipeline supports high visual diversity and physical fidelity without manual intervention. To evaluate the generated data, we train imitation learning policies on synthesized trajectories encompassing diverse object and environment variations. Extensive evaluations on tabletop manipulation tasks using the Piper robotic arm demonstrate that our policies robustly generalize to unseen objects in simulation and achieve effective sim-to-real transfer, successfully manipulating novel real-world objects.", "link": "http://arxiv.org/abs/2603.18811v1", "date": "2026-03-19", "relevancy": 2.5562, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.6522}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.6398}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.633}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20V-Dreamer%3A%20Automating%20Robotic%20Simulation%20and%20Trajectory%20Synthesis%20via%20Video%20Generation%20Priors&body=Title%3A%20V-Dreamer%3A%20Automating%20Robotic%20Simulation%20and%20Trajectory%20Synthesis%20via%20Video%20Generation%20Priors%0AAuthor%3A%20Songjia%20He%20and%20Zixuan%20Chen%20and%20Hongyu%20Ding%20and%20Dian%20Shao%20and%20Jieqi%20Shi%20and%20Chenxu%20Li%20and%20Jing%20Huo%20and%20Yang%20Gao%0AAbstract%3A%20Training%20generalist%20robots%20demands%20large-scale%2C%20diverse%20manipulation%20data%2C%20yet%20real-world%20collection%20is%20prohibitively%20expensive%2C%20and%20existing%20simulators%20are%20often%20constrained%20by%20fixed%20asset%20libraries%20and%20manual%20heuristics.%20To%20bridge%20this%20gap%2C%20we%20present%20V-Dreamer%2C%20a%20fully%20automated%20framework%20that%20generates%20open-vocabulary%2C%20simulation-ready%20manipulation%20environments%20and%20executable%20expert%20trajectories%20directly%20from%20natural%20language%20instructions.%20V-Dreamer%20employs%20a%20novel%20generative%20pipeline%20that%20constructs%20physically%20grounded%203D%20scenes%20using%20large%20language%20models%20and%203D%20generative%20models%2C%20validated%20by%20geometric%20constraints%20to%20ensure%20stable%2C%20collision-free%20layouts.%20Crucially%2C%20for%20behavior%20synthesis%2C%20we%20leverage%20video%20generation%20models%20as%20rich%20motion%20priors.%20These%20visual%20predictions%20are%20then%20mapped%20into%20executable%20robot%20trajectories%20via%20a%20robust%20Sim-to-Gen%20visual-kinematic%20alignment%20module%20utilizing%20CoTracker3%20and%20VGGT.%20This%20pipeline%20supports%20high%20visual%20diversity%20and%20physical%20fidelity%20without%20manual%20interve {"title": "GSMem: 3D Gaussian Splatting as Persistent Spatial Memory for Zero-Shot Embodied Exploration and Reasoning", "author": "Yiren Lu and Yi Du and Disheng Liu and Yunlai Zhou and Chen Wang and Yu Yin", "abstract": "Effective embodied exploration requires agents to accumulate and retain spatial knowledge over time. However, existing scene representations, such as discrete scene graphs or static view-based snapshots, lack \\textit{post-hoc re-observability}. If an initial observation misses a target, the resulting memory omission is often irrecoverable. To bridge this gap, we propose \\textbf{GSMem}, a zero-shot embodied exploration and reasoning framework built upon 3D Gaussian Splatting (3DGS). By explicitly parameterizing continuous geometry and dense appearance, 3DGS serves as a persistent spatial memory that endows the agent with \\textit{Spatial Recollection}: the ability to render photorealistic novel views from optimal, previously unoccupied viewpoints. To operationalize this, GSMem employs a retrieval mechanism that simultaneously leverages parallel object-level scene graphs and semantic-level language fields. This complementary design robustly localizes target regions, enabling the agent to ``hallucinate'' optimal views for high-fidelity Vision-Language Model (VLM) reasoning. Furthermore, we introduce a hybrid exploration strategy that combines VLM-driven semantic scoring with a 3DGS-based coverage objective, balancing task-aware exploration with geometric coverage. Extensive experiments on embodied question answering and lifelong navigation demonstrate the robustness and effectiveness of our framework", "link": "http://arxiv.org/abs/2603.19137v1", "date": "2026-03-19", "relevancy": 2.5498, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.658}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6233}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6215}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GSMem%3A%203D%20Gaussian%20Splatting%20as%20Persistent%20Spatial%20Memory%20for%20Zero-Shot%20Embodied%20Exploration%20and%20Reasoning&body=Title%3A%20GSMem%3A%203D%20Gaussian%20Splatting%20as%20Persistent%20Spatial%20Memory%20for%20Zero-Shot%20Embodied%20Exploration%20and%20Reasoning%0AAuthor%3A%20Yiren%20Lu%20and%20Yi%20Du%20and%20Disheng%20Liu%20and%20Yunlai%20Zhou%20and%20Chen%20Wang%20and%20Yu%20Yin%0AAbstract%3A%20Effective%20embodied%20exploration%20requires%20agents%20to%20accumulate%20and%20retain%20spatial%20knowledge%20over%20time.%20However%2C%20existing%20scene%20representations%2C%20such%20as%20discrete%20scene%20graphs%20or%20static%20view-based%20snapshots%2C%20lack%20%5Ctextit%7Bpost-hoc%20re-observability%7D.%20If%20an%20initial%20observation%20misses%20a%20target%2C%20the%20resulting%20memory%20omission%20is%20often%20irrecoverable.%20To%20bridge%20this%20gap%2C%20we%20propose%20%5Ctextbf%7BGSMem%7D%2C%20a%20zero-shot%20embodied%20exploration%20and%20reasoning%20framework%20built%20upon%203D%20Gaussian%20Splatting%20%283DGS%29.%20By%20explicitly%20parameterizing%20continuous%20geometry%20and%20dense%20appearance%2C%203DGS%20serves%20as%20a%20persistent%20spatial%20memory%20that%20endows%20the%20agent%20with%20%5Ctextit%7BSpatial%20Recollection%7D%3A%20the%20ability%20to%20render%20photorealistic%20novel%20views%20from%20optimal%2C%20previously%20unoccupied%20viewpoints.%20To%20operationalize%20this%2C%20GSMem%20employs%20a%20retrieval%20mechanism%20that%20simultaneously%20leverages%20parallel%20object-level%20scene%20graphs%20and%20semantic-level%20language%20fields.%20This%20complementary%20design%20robustly%20localizes%20target%20regions%2C%20enabling%20the%20agent%20to%20%60%60hallu {"title": "Cubic Discrete Diffusion: Discrete Visual Generation on High-Dimensional Representation Tokens", "author": "Yuqing Wang and Chuofan Ma and Zhijie Lin and Yao Teng and Lijun Yu and Shuai Wang and Jiaming Han and Jiashi Feng and Yi Jiang and Xihui Liu", "abstract": "Visual generation with discrete tokens has gained significant attention as it enables a unified token prediction paradigm shared with language models, promising seamless multimodal architectures. However, current discrete generation methods remain limited to low-dimensional latent tokens (typically 8-32 dims), sacrificing the semantic richness essential for understanding. While high-dimensional pretrained representations (768-1024 dims) could bridge this gap, their discrete generation poses fundamental challenges. In this paper, we present Cubic Discrete Diffusion (CubiD), the first discrete generation model for high-dimensional representations. CubiD performs fine-grained masking throughout the high-dimensional discrete representation -- any dimension at any position can be masked and predicted from partial observations. This enables the model to learn rich correlations both within and across spatial positions, with the number of generation steps fixed at $T$ regardless of feature dimensionality, where $T \\ll hwd$. On ImageNet-256, CubiD achieves state-of-the-art discrete generation with strong scaling behavior from 900M to 3.7B parameters. Crucially, we validate that these discretized tokens preserve original representation capabilities, demonstrating that the same discrete tokens can effectively serve both understanding and generation tasks. We hope this work will inspire future research toward unified multimodal architectures. Code is available at: https://github.com/YuqingWang1029/CubiD.", "link": "http://arxiv.org/abs/2603.19232v1", "date": "2026-03-19", "relevancy": 2.5454, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http: {"title": "ARIADNE: A Perception-Reasoning Synergy Framework for Trustworthy Coronary Angiography Analysis", "author": "Zhan Jin and Yu Luo and Yizhou Zhang and Ziyang Cui and Yuqing Wei and Xianchao Liu and Xueying Zeng and Qing Zhang", "abstract": "Conventional pixel-wise loss functions fail to enforce topological constraints in coronary vessel segmentation, producing fragmented vascular trees despite high pixel-level accuracy. We present ARIADNE, a two-stage framework coupling preference-aligned perception with RL-based diagnostic reasoning for topologically coherent stenosis detection. The perception module employs DPO to fine-tune the Sa2VA vision-language foundation model using Betti number constraints as preference signals, aligning the policy toward geometrically complete vessel structures rather than pixel-wise overlap metrics. The reasoning module formulates stenosis localization as a Markov Decision Process with an explicit rejection mechanism that autonomously defers ambiguous anatomical candidates such as bifurcations and vessel crossings, shifting from coverage maximization to reliability optimization. On 1,400 clinical angiograms, ARIADNE achieves state-of-the-art centerline Dice of 0.838, reduces false positives by 41% compared to geometric baselines. External validation on multi-center benchmarks ARCADE and XCAD confirms generalization across acquisition protocols. This represents the first application of DPO for topological alignment in medical imaging, demonstrating that preference-based learning over structural constraints mitigates topological violations while maintaining diagnostic sensitivity in interventional cardiology workflows.", "link": "http://arxiv.org/abs/2603.19169v1", "date": "2026-03-19", "relevancy": 2.5449, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5108}, {"title": "Lexicon3D: Probing Visual Foundation Models {"title": "DriveTok: 3D Driving Scene Tokenization for Unified Multi-View Reconstruction and Understanding", "author": "Dong Zhuo and Wenzhao Zheng and Sicheng Zuo and Siming Yan and Lu Hou and Jie Zhou and Jiwen Lu", "abstract": "With the growing adoption of vision-language-action models and world models in autonomous driving systems, scalable image tokenization becomes crucial as the interface for the visual modality. However, most existing tokenizers are designed for monocular and 2D scenes, leading to inefficiency and inter-view inconsistency when applied to high-resolution multi-view driving scenes. To address this, we propose DriveTok, an efficient 3D driving scene tokenizer for unified multi-view reconstruction and understanding. DriveTok first obtains semantically rich visual features from vision foundation models and then transforms them into the scene tokens with 3D deformable cross-attention. For decoding, we employ a multi-view transformer to reconstruct multi-view features from the scene tokens and use multiple heads to obtain RGB, depth, and semantic reconstructions. We also add a 3D head directly on the scene tokens for 3D semantic occupancy prediction for better spatial awareness. With the multiple training objectives, DriveTok learns unified scene tokens that integrate semantic, geometric, and textural information for efficient multi-view tokenization. Extensive experiments on the widely used nuScenes dataset demonstrate that the scene tokens from DriveTok perform well on image reconstruction, semantic segmentation, depth prediction, and 3D occupancy prediction tasks.", "link": "http://arxiv.org/abs/2603.19219v1", "date": "2026-03-19", "relevancy": 2.4776, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6339}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6165}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6165}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DriveTok%3A%203D%20Driving%20Scene%20Tokenization%20for%20Unified%20Multi-View%20Reconstruction%20and%20Understanding&body=Title%3A%20DriveTok%3A%203D%20Driving%20Scene%20Tokenization%20for%20Unified%20Multi-View%20Reconstruction%20and%20Understanding%0AAuthor%3A%20Dong%20Zhuo%20and%20Wenzhao%20Zheng%20and%20Sicheng%20Zuo%20and%20Siming%20Yan%20and%20Lu%20Hou%20and%20Jie%20Zhou%20and%20Jiwen%20Lu%0AAbstract%3A%20With%20the%20growing%20adoption%20of%20vision-language-action%20models%20and%20world%20models%20in%20autonomous%20driving%20systems%2C%20scalable%20image%20tokenization%20becomes%20crucial%20as%20the%20interface%20for%20the%20visual%20modality.%20However%2C%20most%20existing%20tokenizers%20are%20designed%20for%20monocular%20and%202D%20scenes%2C%20leading%20to%20inefficiency%20and%20inter-view%20inconsistency%20when%20applied%20to%20high-resolution%20multi-view%20driving%20scenes.%20To%20address%20this%2C%20we%20propose%20DriveTok%2C%20an%20efficient%203D%20driving%20scene%20tokenizer%20for%20unified%20multi-view%20reconstruction%20and%20understanding.%20DriveTok%20first%20obtains%20semantically%20rich%20visual%20features%20from%20vision%20foundation%20models%20and%20then%20transforms%20them%20into%20the%20scene%20tokens%20with%203D%20deformable%20cross-attention.%20For%20decoding%2C%20we%20employ%20a%20multi-view%20transformer%20to%20reconstruct%20multi-view%20features%20from%20the%20scene%20tokens%20and%20use%20multiple%20heads%20to%20obtain%20RGB%2C%20depth%2C%20and%20semantic%20reconstructions.%20We%20also%20add%20a%203D%20head%20directly%20on%20the%20scene%20tokens%20for%203D%20semantic%20occupancy%20prediction%20for%20better%20spatial%20awareness.%20With%20the%20multiple%20training%20objectives%2C% %202D%20scenes%2C%20leading%20to%20inefficiency%20and%20inter-view%20inconsistency%20when%20applied%20to%20high-resolution%20multi-view%20driving%20scenes.%20To%20address%20this%2C%20we%20propose%20DriveTok%2C%20an%20efficient%203D%20driving%20scene%20tokenizer%20for%20unified%20multi-view%20reconstruction%20and%20understanding.%20DriveTok%20first%20obtains%20semantically%20rich%20visual%20features%20from%20vision%20foundation%20models%20and%20then%20transforms%20them%20into%20the%20scene%20tokens%20with%203D%20deformable%20cross-attention.%20For%20decoding%2C%20we%20employ%20a%20multi-view%20transformer%20to%20reconstruct%20multi-view%20features%20from%20the%20scene%20tokens%20and%20use%20multiple%20heads%20to%20obtain%20RGB%2C%20depth%2C%20and%20semantic%20reconstructions.%20We%20also%20add%20a%203D%20head%20directly%20on%20the%20scene%20tokens%20for%203D%20semantic%20occupancy%20prediction%20for%20better%20spatial%20awareness.%20With%20the%20multiple%20training%20objectives%2C%20DriveTok%20learns%20unified%20scene%20tokens%20that%20integrate%20semantic%2C%20geometric%2C%20and%20textural%20information%20for%20efficient%20multi-view%20tokenization.%20Extensive%20experiments%20on%20the%20widely%20used%20nuScenes%20dataset%20demonstrate%20that%20the%20scene%20tokens%20from%20DriveTok%20perform%20well%20on%20image%20reconstruction%2C%20semantic%20segmentation%2C%20depth%20prediction%2C%20and%203D%20occupancy%20prediction%20tasks.&entry.1838667208=http%3A//arxiv.org/abs/2603.19219v1&entry.124074799=Read"},
{"title": "Measuring 3D Spatial Geometric Consistency in Dynamic Generated Videos", "author": "Weijia Dou and Wenzhao Zheng and Weiliang Chen and Yu Zheng and Jie Zhou and Jiwen Lu", "abstract": "Recent generative models can produce high-fidelity videos, yet they often exhibit 3D spatial geometric inconsistencies. Existing evaluation methods fail to accurately characterize these inconsistencies: fidelity-centric metrics like FVD are insensitive to geometric distortions, while consistency-focused benchmarks often penalize valid foreground dynamics. To address this gap, we introduce SGC, a metric for evaluating 3D \\textbf{S}patial \\textbf{G}eometric \\textbf{C}onsistency in dynamically generated videos. We quantify geometric consistency by measuring the divergence among multiple camera poses estimated from distinct local regions. Our approach first separates static from dynamic regions, then partitions the static background into spatially coherent sub-regions. We predict depth for each pixel, estimate a local camera pose for each subregion, and compute the divergence among these poses to quantify geometric consistency. Experiments on real and generative videos demonstrate that SGC robustly quantifies geometric inconsistencies, effectively identifying critical failures missed by existing metrics.", "link": "http://arxiv.org/abs/2603.19048v1", "date": "2026-03-19", "relevancy": 2.4775, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6579}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6053}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5864}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Measuring%203D%20Spatial%20Geometric%20Consistency% {"title": "Probing Cultural Signals in Large Language Models through Author Profiling", "author": "Valentin Lafargue and Ariel Guerra-Adames and Emmanuelle Claeys and Elouan Vuichard and Jean-Michel Loubes", "abstract": "Large language models (LLMs) are increasingly deployed in applications with societal impact, raising concerns about the cultural biases they encode. We probe these representations by evaluating whether LLMs can perform author profiling from song lyrics in a zero-shot setting, inferring singers' gender and ethnicity without task-specific fine-tuning. Across several open-source models evaluated on more than 10,000 lyrics, we find that LLMs achieve non-trivial profiling performance but demonstrate systematic cultural alignment: most models default toward North American ethnicity, while DeepSeek-1.5B aligns more strongly with Asian ethnicity. This finding emerges from both the models' prediction distributions and an analysis of their generated rationales. To quantify these disparities, we introduce two fairness metrics, Modality Accuracy Divergence (MAD) and Recall Divergence (RD), and show that Ministral-8B displays the strongest ethnicity bias among the evaluated models, whereas Gemma-12B shows the most balanced behavior. Our code is available on [GitHub](https://github.com/ValentinLafargue/CulturalProbingLLM) and results on [HuggingFace](https://huggingface.co/datasets/ValentinLAFARGUE/AuthorProfilingResults).", "link": "http://arxiv.org/abs/2603.16749v2", "date": "2026-03-19", "relevancy": 2.4695, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5104}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5104}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/ ps%3A//huggingface.co/datasets/ValentinLAFARGUE/AuthorProfilingResults%29.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16749v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DProbing%2520Cultural%2520Signals%2520in%2520Large%2520Language%2520Models%2520through%2520Author%2520Profiling%26entry.906535625%3DValentin%2520Lafargue%2520and%2520Ariel%2520Guerra-Adames%2520and%2520Emmanuelle%2520Claeys%2520and%2520Elouan%2520Vuichard%2520and%2520Jean-Michel%2520Loubes%26entry.1292438233%3DLarge%2520language%2520models%2520%2528LLMs%2529%2520are%2520increasingly%2520deployed%2520in%2520applications%2520with%2520societal%2520impact%252C%2520raising%2520concerns%2520about%2520the%2520cultural%2520biases%2520they%2520encode.%2520We%2520probe%2520these%2520representations%2520by%2520evaluating%2520whether%2520LLMs%2520can%2520perform%2520author%2520profiling%2520from%2520song%2520lyrics%2520in%2520a%2520zero-shot%2520setting%252C%2520inferring%2520singers%2527%2520gender%2520and%2520ethnicity%2520without%2520task-specific%2520fine-tuning.%2520Across%2520several%2520open-source%2520models%2520evaluated%2520on%2520more%2520than%252010%252C000%2520lyrics%252C%2520we%2520find%2520that%2520LLMs%2520achieve%2520non-trivial%2520profiling%2520performance%2520but%2520demonstrate%2520systematic%2520cultural%2520alignment%253A%2520most%2520models%2520default%2520toward%2520North%2520American%2520ethnicity%252C%2520while%2520DeepSeek-1.5B%2520aligns%2520more%2520strongly%2520with%2520Asian%2520ethnicity.%2520This%2520finding%2520emerges%2520from%2520both%2520the%2520models%2527%2520prediction%2520distributions%2520and%2520an%2520analysis%2520of%2520their%2520generated%2520rationales.%2520To%2520quantify%2520these%2520disparities%252C%2520we%2520introduce%2520two%2520fairness%2520metrics%252C%2520Modality%2520Accuracy%2520Divergence%2520%2528MAD%2529%2520and%2520Recall%2520Divergence%2520%2528RD%2529%252C%2520 {"title": "Not All Features Are Created Equal: A Mechanistic Study of Vision-Language-Action Models", "author": "Bryce Grant and Xijia Zhao and Peng Wang", "abstract": "Vision-Language-Action (VLA) models combine perception, language, and motor control in a single architecture, yet how they translate multimodal inputs into actions remains poorly understood. We apply activation injection, sparse autoencoders (SAEs), and linear probes to six models spanning 80M--7B parameters across 394,000+ rollout episodes on four benchmarks. The visual pathway dominates action generation across all architectures: injecting baseline activations into null-prompt episodes recovers near-identical behavior, while cross-task injection steers robots toward source-task positions (99.8\\% of X-VLA episodes align with the source trajectory), exposing spatially bound motor programs tied to scene coordinates rather than abstract task representations. Language sensitivity depends on task structure, not model design: when visual context uniquely specifies the task, language is ignored; when multiple goals share a scene, language becomes essential (X-VLA \\texttt{libero\\_goal}: 94\\%$\\to$10\\% under wrong prompts vs.\\ \\texttt{libero\\_object}: 60--100\\% regardless). In all three multi-pathway architectures (\\pizhalf{}, SmolVLA, GR00T), expert pathways encode motor programs while VLM pathways encode goal semantics ($2\\times$ greater behavioral displacement from expert injection), and subspace injection confirms these occupy separable activation subspaces. Per-token SAE processing is essential for action fidelity on most architectures, though mean-pooling improves fidelity on X-VLA. Contrastive identification recovers 82+ manipulation concepts, and causal ablation reveals sensitivity spanning 28--92\\% zero-effect rates independent of representation width. We release \\textbf{Action Atlas} (https://action-atlas.com) for interactive exploration of VLA representations across all six models.", "link": "http://arxiv.org/abs/2603.19233v1", "date": "2026-03-19", "relevancy": 2.468, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.627}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.627}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5669}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Not%20All%20Features%20Are%20Created%20Equal%3A%20A%20Mechanistic%20Study%20of%20Vision-Language-Action%20Models&body=Title%3A%20Not%20All%20Features%20Are%20Created%20Equal%3A%20A%20Mechanistic%20Study%20of%20Vision-Language-Action%20Models%0AAuthor%3A%20Bryce%20Grant%20and%20Xijia%20Zhao%20and%20Peng%20Wang%0AAbstract%3A%20Vision-Language-Action%20%28VLA%29%20models%20combine%20perception%2C%20language%2C%20and%20motor%20control%20in%20a%20single%20architecture%2C%20yet%20how%20they%20translate%20multimodal%20inputs%20into%20actions%20remains%20poorly%20understood.%20We%20apply%20activation%20injection%2C%20sparse%20autoencoders%20%28SAEs%29%2C%20and%20linear%20probes%20to%20six%20models%20spanning%2080M--7B%20parameters%20across%20394%2C000%2B%20rollout%20episodes%20on%20four%20benchmarks.%20The%20visual%20pathway%20dominates%20action%20generation%20across%20all%20architectures%3A%20injecting%20baseline%20activations%20into%20null-prompt%20episodes%20recovers%20near-identical%20behavior%2C%20while%20cross-task%20injection%20steers%20robots%20toward%20source-task%20positions%20%2899.8%5C%25%20of%20X-VLA%20episodes%20align%20with%20the%20source%20trajectory%29%2C%20exposing%20spatially%20bound%20motor%20programs%20tied%20to%20scene%20coordinates%20rather%20than%20abstract%20task%20representations.%20Language%20sensitivity%20depends%20on%20task%20structure%2C%20not%20model%20design%3A%20when%20visual%20context%20uniquely%20specifies%20the%20task%2C%20language%20is%20ignored%3B%20when%20multiple%20goals%20share%20a%20scene%2C%20language%20becomes%20essential%20%28X-VLA%20%5Ctexttt%7Blibero%5C_goal%7D%3A%2094%5C%25%24%5Cto%2410%5C%25%20under%20wrong%20prompts%20vs.%5C%20%5Ctexttt%7Blibero%5C_object%7D%3A%2060--100%5C%25%20regardless%29.%20In%20all%20three%20multi-pathway%20architectures%20%28%5Cpizhalf%7B%7D%2C%20SmolVLA%2C%20GR00T%29%2C%20expert%20pathways%20encode%20motor%20programs%20while%20VLM%20pathways%20encode%20goal%20semantics%20%28%242%5Ctimes%24%20greater%20behavioral%20displacement%20from%20expert%20injection%29%2C%20and%20subspace%20injection%20confirms%20these%20occupy%20separable%20activation%20subspaces.%20Per-token%20SAE%20processing%20is%20essential%20for%20action%20fidelity%20on%20most%20architectures%2C%20though%20mean-pooling%20improves%20fidelity%20on%20X-VLA.%20Contrastive%20identification%20recovers%2082%2B%20manipulation%20concepts%2C%20and%20causal%20ablation%20reveals%20sensitivity%20spanning%2028--92%5C%25%20zero-effect%20rates%20independent%20of%20representation%20width.%20We%20release%20%5Ctextbf%7BAction%20Atlas%7D%20%28https%3A//action-atlas.com%29%20for%20interactive%20exploration%20of%20VLA%20representations%20across%20all%20six%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19233v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNot%2520All%2520Features%2520Are%2520Created%2520Equal%253A%2520A%2520Mechanistic%2520Study%2520of%2520Vision-Language-Action%2520Models%26entry.906535625%3DBryce%2520Grant%2520and%2520Xijia%2520Zhao%2520and%2520Peng%2520Wang%26entry.1292438233%3DVision-Language-Action%2520%2528VLA%2529%2520models%2520combine%2520perception%252C%2520language%252C%2520and%2520motor%2520control%2520in%2520a%2520single%2520architecture%252C%2520ye {"title": "VEPO: Variable Entropy Policy Optimization for Low-Resource Language Foundation Models", "author": "Chonghan Liu and Yimin Du and Qi An and Xin He and Cunqi Zhai and Fei Tan and Weijia Lin and Xiaochun Gong and Yongchao Deng and Shousheng Jia and Xiangzheng Zhang", "abstract": "Large language models frequently exhibit suboptimal performance on low resource languages, primarily due to inefficient subword segmentation and systemic training data imbalances. In this paper, we propose Variable Entropy Policy Optimization (VEPO), which leverages Reinforcement Learning with Verifiable Rewards to incorporate deterministic structural constraints into the policy alignment process. This framework ensures prescribed sequence length, robust format consistency, and rigorous linguistic well formedness, all enforced during training. Central to our approach is a variable entropy mechanism that enables the model to dynamically calibrate the equilibrium between literal fidelity and semantic naturalness by modulating the exploration exploitation manifold. By integrating entropy tempered advantage estimation with asymmetric clipping, VEPO sustains robust exploration while mitigating policy collapse. Empirical evaluations across 90 FLORES-200, COMET-22, chrF directions demonstrate that VEPO yields substantial improvements in both tokenization efficiency and translation quality, bridging the performance gap for underrepresented languages.", "link": "http://arxiv.org/abs/2603.19152v1", "date": "2026-03-19", "relevancy": 2.4665, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5082}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5082}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4636}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VEPO%3A%20Variable%20Entropy%20Policy%20Optimization%20for%20Low-Resource%20Language%20Foundation%20Models&body=Title%3A%20VEPO%3A%20Variable%20Entropy%20Policy%20Optimization%20for%20Low-Resource%20Language%20Foundation%20Models%0AAuthor%3A%20Chonghan%20Liu%20and%20Yimin%20Du%20and%20Qi%20An%20and%20Xin%20He%20and%20Cunqi%20Zhai%20and%20Fei%20Tan%20and%20Weijia%20Lin%20and%20Xiaochun%20Gong%20and%20Yongchao%20Deng%20and%20Shousheng%20Jia%20and%20Xiangzheng%20Zhang%0AAbstract%3A%20Large%20language%20models%20frequently%20exhibit%20suboptimal%20performance%20on%20low%20resource%20languages%2C%20primarily%20due%20to%20inefficient%20subword%20segmentation%20and%20systemic%20training%20data%20imbalances.%20In%20this%20paper%2C%20we%20propose%20Variable%20Entropy%20Policy%20Optimization%20%28VEPO%29%2C%20which%20leverages%20Reinforcement%20Learning%20with%20Verifiable%20Rewards%20to%20incorporate%20deterministic%20structural%20constraints%20into%20the%20policy%20alignment%20process.%20This%20framework%20ensures%20prescribed%20sequence%20length%2C%20robust%20format%20consistency%2C%20and%20rigorous%20linguistic%20well%20formedness%2C%20all%20enforced%20during%20training.%20Central%20to%20our%20approach%20is%20a%20variable%20entropy%20mechanism%20that%20enables%20the%20model%20to%20dynamically%20calibrate%20the%20equilibrium%20between%20literal%20fidelity%20and%20semantic%20naturalness%20by%20modulating%20the%20exploration%20exploitation%20manifold.%20By%20integrating%20entropy%20tempered%20advantage%20estimation%20with%20asymmetric%20clipping%2C%20VEPO%20sustains%20robust%20exploration%20while%20mitigating%20policy%20collapse.%20Empirical%20evaluations%20across%2090%20FLORES-200%2C%20COMET-22%2C%20chrF%20directions%20demonstrate%20that%20VEPO%20yields% {"title": "PathSpace: Rapid continuous map approximation for efficient SLAM using B-Splines in constrained environments", "author": "Aduen Benjumea and Andrew Bradley and Alexander Rast and Matthias Rolf", "abstract": "Simultaneous Localization and Mapping (SLAM) plays a crucial role in enabling autonomous vehicles to navigate previously unknown environments.\n  Semantic SLAM mostly extends visual SLAM, leveraging the higher density information available to reason about the environment in a more human-like manner. This allows for better decision making by exploiting prior structural knowledge of the environment, usually in the form of labels. Current semantic SLAM techniques still mostly rely on a dense geometric representation of the environment, limiting their ability to apply constraints based on context. We propose PathSpace, a novel semantic SLAM framework that uses continuous B-splines to represent the environment in a compact manner, while also maintaining and reasoning through the continuous probability density functions required for probabilistic reasoning. This system applies the multiple strengths of B-splines in the context of SLAM to interpolate and fit otherwise discrete sparse environments. We test this framework in the context of autonomous racing, where we exploit pre-specified track characteristics to produce significantly reduced representations at comparable levels of accuracy to traditional landmark based methods and demonstrate its potential in limiting the resources used by a system with minimal accuracy loss.", "link": "http://arxiv.org/abs/2603.02538v2", "date": "2026-03-19", "relevancy": 2.4421, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6147}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6077}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6071}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PathSpace%3A%20Rapid%20continuous%20map%20approximation%20for%20efficient%20SLAM%20using%20B-Splines%20in%20constrained%20environments&body=Title%3A%20PathSpace%3A%20Rapid%20continuous%20map%20approximation%20for%20efficient%20SLAM%20using%20B-Splines%20in%20constrained%20environments%0AAuthor%3A%20Aduen%20Benjumea%20and%20Andrew%20Bradley%20and%20Alexander%20Rast%20and%20Matthias%20Rolf%0AAbstract%3A%20Simultaneous%20Localization%20and%20Mapping%20%28SLAM%29%20plays%20a%20crucial%20role%20in%20enabling%20autonomous%20vehicles%20to%20navigate%20previously%20unknown%20environments.%0A%20%20Semantic%20SLAM%20mostly%20extends%20visual%20SLAM%2C%20leveraging%20the%20higher%20density%20information%20available%20to%20reason%20about%20the%20environment%20in%20a%20more%20human-like%20manner.%20This%20allows%20for%20better%20decision%20making%20by%20exploiting%20prior%20structural%20knowledge%20of%20the%20environment%2C%20usually%20in%20the%20form%20of%20labels.%20Current%20semantic%20SLAM%20techniques%20still%20mostly%20rely%20on%20a%20dense%20geometric%20representation%20of%20the%20environment%2C%20limiting%20their%20ability%20to%20apply%20constraints%20based%20on%20context.%20We%20propose%20PathSpace%2C%20a%20novel%20semantic%20SLAM%20framework%20that%20uses%20continuous%20B-splines%20to%20represent%20the%20environment%20in%20a%20compact%20manner%2C%20while%20also%20maintaining%20and%20reasoning%20through%20the%20continuous%20probability%20density%20functions%20required%20for%20probabilistic%20reasoning.%20This%20system%20applies%20the%20multiple%20strengths%20of%20B-splines%20in%20the%20context%20of%20SLAM%20to%20interpolate%20and%20fit%20otherwise%20discrete%20sparse%20environments.%20We%20test%20this%20framework%20in%20the%20context%20of%20autonomous%20racing%2C%20where%20we%20exploit%20pre-specified%20track%20characteristics%20to%20produce%20significantly%20reduced%20representations%20at%20comparable%20levels%20of%20accuracy%20to%20traditional%20landmark%20based%20methods%20and%20demonstrate%20its%20potential%20in%20limiting%20the%20resources%20used%20by%20a%20system%20with%20minimal%20accuracy%20loss.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02538v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPathSpace%253A%2520Rapid%2520continuous%2520map%2520approximation%2520for%2520efficient%2520SLAM%2520using%2520B-Splines%2520in%2520constrained%2520environments%26entry.906535625%3DAduen%2520Benjumea%2520and%2520Andrew%2520Bradley%2520and%2520Alexander%2520Rast%2520and%2520Matthias%2520Rolf%26entry.1292438233%3DSimultaneous%2520Localization%2520and%2520Mapping%2520%2528SLAM%2529%2520plays%2520a%2520crucial%2520role%2520in%2520enabling%2520autonomous%2520vehicles%2520to%2520navigate%2520previously%2520unknown%2520environments.%250A%2520%2520Semantic%2520SLAM%2520mostly%2520extends%2520visual%2520SLAM%252C%2520leveraging%2520the%2520higher%2520density%2520information%2520available%2520to%2520reason%2520about%2520the%2520environment%2520in%2520a%2520more%2520human-like%2520manner.%2520This%2520allows%2520for%2520better%2520decision%2520making%2520by%2520exploiting%2520prior%2520structural%2520knowledge%2520of%2520the%2520environment%252C%2520usually%2520in%2520the%2520form%2520of%2520labels.%2520Current%2520semantic%2520SLAM%2520techniques%2520still%2520mostly%2520rely%2520on%2520a%2520dense%2520geometric%2520representation%2520of%2520the%2520environment%252C%2520limiting%2520their%2520ability%2520to%2520apply%2520constraints%2520based%2520on%2520context.%2520We%2520propose%2520PathSpace%252C%2520a%2520novel%2520semantic%2520SLAM%2520framework%2520that%2520uses%2520continuous%2520B-splines%2520to%2520represent%2520the%252 the%20form%20of%20labels.%20Current%20semantic%20SLAM%20techniques%20still%20mostly%20rely%20on%20a%20dense%20geometric%20representation%20of%20the%20environment%2C%20limiting%20their%20ability%20to%20apply%20constraints%20based%20on%20context.%20We%20propose%20PathSpace%2C%20a%20novel%20semantic%20SLAM%20framework%20that%20uses%20continuous%20B-splines%20to%20represent%20the%20environment%20in%20a%20compact%20manner%2C%20while%20also%20maintaining%20and%20reasoning%20through%20the%20continuous%20probability%20density%20functions%20required%20for%20probabilistic%20reasoning.%20This%20system%20applies%20the%20multiple%20strengths%20of%20B-splines%20in%20the%20context%20of%20SLAM%20to%20interpolate%20and%20fit%20otherwise%20discrete%20sparse%20environments.%20We%20test%20this%20framework%20in%20the%20context%20of%20autonomous%20racing%2C%20where%20we%20exploit%20pre-specified%20track%20characteristics%20to%20produce%20significantly%20reduced%20representations%20at%20comparable%20levels%20of%20accuracy%20to%20traditional%20landmark%20based%20methods%20and%20demonstrate%20its%20potential%20in%20limiting%20the%20resources%20used%20by%20a%20system%20with%20minimal%20accuracy%20loss.&entry.1838667208=http%3A//arxiv.org/abs/2603.02538v2&entry.124074799=Read"},
{"title": "What Really Controls Temporal Reasoning in Large Language Models: Tokenisation or Representation of Time?", "author": "Gagan Bhatia and Ahmad Muhammad Isa and Maxime Peyrard and Wei Zhao", "abstract": "We present MultiTempBench, a multilingual temporal reasoning benchmark spanning three tasks, date arithmetic, time zone conversion, and temporal relation extraction across five languages (English, German, Chinese, Arabic, and Hausa) and multiple calendar conventions (Gregorian, Hijri, and Chinese Lunar). MultiTempBench contains $15,000$ examples built by translating $750$ curated English questions and expanding each into controlled date-format variants. We evaluate 20 LLMs and introduce the multilingual Date Fragmentation Ratio (mDFR), calibrated with human severity ratings, together with geometric-probing analyses of internal temporal representations. We find tokenisation quality of temporal artefacts is a resource-dependent bottleneck: in low-resource languages and rarer calendar formats, fragmentation disrupts Year/Month/Day separation and accuracy collapses, while high-resource settings are often robust to digit-level splitting. Beyond tokenisation, crossed mixed-effects regression shows that temporal linearity is the strongest predictor of temporal reasoning in high-resource languages, whereas fragmentation is the stronger predictor in low-resource languages. Code is available at: https://github.com/gagan3012/mtb", "link": "http://arxiv.org/abs/2603.19017v1", "date": "2026-03-19", "relevancy": 2.3927, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4886}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4782}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4688}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20What%20Really%20Controls%20Temporal%20Reasoning%20in%20Large%20Language%20Models%3A%20Tokenisation%20or%20Representation%20of%20Time%3F&body=Title%3A%20What%20Really%20Controls%20Temporal%20Reasoning%20in%20Large%20Language%20Models%3A%20Tokenisation%20or%20Representation%20of%20Time%3F%0AAuthor%3A%20Gagan%20Bhatia%20and%20Ahmad%20Muhammad%20Isa%20and%20Maxime%20Peyrard%20and%20Wei%20Zhao%0AAbstract%3A%20We%20present%20MultiTempBench%2C%20a%20multilingual%20temporal%20reasoning%20benchmark%20spanning%20three%20tasks%2C%20date%20arithmetic%2C%20time%20zone%20conversion%2C%20and%20temporal%20relation%20extraction%20across%20five%20languages%20%28English%2C%20German%2C%20Chinese%2C%20Arabic%2C%20and%20Hausa%29%20and%20multiple%20calendar%20conventions%20%28Gregorian%2C%20Hijri%2C%20and%20Chinese%20Lunar%29.%20MultiTempBench%20contains%20%2415%2C000%24%20examples%20built%20by%20translating%20%24750%24%20curated%20English%20questions%20and%20expanding%20each%20into%20controlled%20date-format%20variants.%20We%20evaluate%2020%20LLMs%20and%20introduce%20the%20multilingual%20Date%20Fragmentation%20Ratio%20%28mDFR%29%2C%20calibrated%20with%20human%20severity%20ratings%2C%20together%20with%20geometric-probing%20analyses%20of%20internal%20temporal%20representations.%20We%20find%20tokenisation%20quality%20of%20temporal%20artefacts%20is%20a%20resource-dependent%20bottleneck%3A%20in%20low-resource%20languages%20and%20rarer%20calendar%20formats%2C%20fragmentation%20disrupts%20Year/Month/Day%20separation%20and%20accuracy%20collapses%2C%20while%20high-resource%20settings%20are%20often%20robust%20to%20digit-level%20splitting.%20Beyond%20tokenisation%2C%20crossed%20mixed-effects%20regression%20shows%20that%20temporal%20linearity%20is%20the%20strongest%20predictor%20of%20temporal%20reasoning%20in%20high-resource%20languages%2C%20whereas%20fragmentation%20is%20the%20stronger%20predictor%20in%20low-resource%20languages.%20Code%20is%20available%20at%3A%20https%3A//github.com/gagan3012/mtb%0ALink%3A%20http%3A//arxiv.org/abs/2603.19017v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhat%2520Really%2520Controls%2520Temporal%2520Reasoning%2520in%2520Large%2520Language%2520Models%253A%2520Tokenisation%2520or%2520Representation%2520of%2520Time%253F%26entry.906535625%3DGagan%2520Bhatia%2520and%2520Ahmad%2520Muhammad%2520Isa%2520and%2520Maxime%2520Peyrard%2520and%2520Wei%2520Zhao%26entry.1292438233%3DWe%2520present%2520MultiTempBench%252C%2520a%2520multilingual%2520temporal%2520reasoning%2520benchmark%2520spanning%2520three%2520tasks%252C%2520date%2520arithmetic%252C%2520time%2520zone%2520conversion%252C%2520and%2520temporal%2520relation%2520extraction%2520across%2520five%2520languages%2520%2528English%252C%2520German%252C%2520Chinese%252C%2520Arabic%252C%2520and%2520Hausa%2529%2520and%2520multiple%2520calendar%2520conventions%2520%2528Gregorian%252C%2520Hijri%252C%2520and%2520Chinese%2520Lunar%2529.%2520MultiTempBench%2520contains%2520%252415%252C000%2524%2520examples%2520built%2520by%2520translating%2520%2524750%2524%2520curated%2520English%2520questions%2520and%2520expanding%2520each%2520into%2520controlled%2520date-format%2520variants.%2520We%2520evaluate%252020%2520LLMs%2520and%2520introduce%2520the%2520multilingual%2520Date%2520Fragmentation%2520Ratio%2520%2528mDFR%2529%252C%2520calibrated%2520with%2520human%2520severity%2520ratings%252C%2520together%2520with%2520geometric-probing%2520analyses%2520of%2520internal%2520temporal%2520representations.%2520We%2520find%2520tokenisation%2520quality%2520of%2520temporal%2520artefacts%2520is%2520a%2520resource-dependent%2520bottleneck%253A%2520in%2520low-resource%2520languages%2520and%2520rarer%2520calendar%2520formats%252C%2520fragmentation%2520disrupts%2520Year/Month/Day%2520separation%2520and%2520accuracy%2520collapses%252C%2520while%2520high-resource%2520settings%2520are%2520often%2520robust%2520to%2520digit-level%2520splitting.%2520Beyond%2520tokenisation%252C%2520crossed%2520mixed-effects%2520regression%2520shows%2520that%2520temporal%2520linearity%2520is%2520the%2520strongest%2520predictor%2520of%2520temporal%2520reasoning%2520in%2520high-resource%2520languages%252C%2520whereas%2520fragmentation%2520is%2520the%2520stronger%2520predictor%2520in%2520low-resource%2520languages.%2520Code%2520is%2520available%2520at%253A%2520https%253A//github.com/gagan3012/mtb%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.19017v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=What%20Really%20Controls%20Temporal%20Reasoning%20in%20Large%20Language%20Models%3A%20Tokenisation%20or%20Representation%20of%20Time%3F&entry.906535625=Gagan%20Bhatia%20and%20Ahmad%20Muhammad%20Isa%20and%20Maxime%20Peyrard%20and%20Wei%20Zhao&entry.1292438233=We%20present%20MultiTempBench%2C%20a%20multilingual%20temporal%20reasoning%20benchmark%20spanning%20three%20tasks%2C%20date%20arithmetic%2C%20time%20zone%20conversion%2C%20and%20temporal%20relation%20extraction%20across%20five%20languages%20%28English%2C%20German%2C%20Chinese%2C%20Arabic%2C%20and%20Hausa%29%20and%20multiple%20calendar%20conventions%20%28Gregorian%2C%20Hijri%2C%20and%20Chinese%20Lunar%29.%20MultiTempBench%20contains%20%2415%2C000%24%20examples%20built%20by%20translating%20%24750%24%20curated%20English%20questions%20and%20expanding%20each%20into%20controlled%20date-format%20variants.%20We%20evaluate%2020%20LLMs%20and%20introduce%20the%20multilingual%20Date%20Fragmentation%20Ratio%20%28mDFR%29%2C%20calibrated%20with%20human%20severity%20ratings%2C%20together%20with%20geometric-probing%20analyses%20of%20internal%20temporal%20representations.%20We%20find%20tokenisation%20quality%20of%20temporal%20artefacts%20is%20a%20resource-dependent%20bottleneck%3A {"title": "What You Read is What You Classify: Highlighting Attributions to Text and Text-Like Inputs", "author": "Daniel S. Berman and Brian Merritt and Stanley Ta and Dana Udwin and Amanda Ernlund and Jeremy Ratcliff and Vijay Narayan", "abstract": "At present, there are no easily understood explainable artificial intelligence (AI) methods for discrete token inputs, like text. Most explainable AI techniques do not extend well to token sequences, where both local and global features matter, because state-of-the-art models, like transformers, tend to focus on global connections. Therefore, existing explainable AI algorithms fail by (i) identifying disparate tokens of importance, or (ii) assigning a large number of tokens a low value of importance. This method for explainable AI for tokens-based classifiers generalizes a mask-based explainable AI algorithm for images. It starts with an Explainer neural network that is trained to create masks to hide information not relevant for classification. Then, the Hadamard product of the mask and the continuous values of the classifier's embedding layer is taken and passed through the classifier, changing the magnitude of the embedding vector but keeping the orientation unchanged. The Explainer is trained for a taxonomic classifier for nucleotide sequences and it is shown that the masked segments are less relevant to classification than the unmasked ones. This method focused on the importance the token as a whole (i.e., a segment of the input sequence), producing a human-readable explanation.", "link": "http://arxiv.org/abs/2602.24149v2", "date": "2026-03-19", "relevancy": 2.3913, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4813}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4788}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4747}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20What%20You%20Read%20is%20What%20You%20Classify%3A%20Highlighting%20Attributions%20to%20Text%20and%20Text-Like%20Inputs&body=Title%3A%20What%20You%20Read%20is%20What%20You%20Classify%3A%20Highlighting%20Attributions%20to%20Text%20and%20Text-Like%20Inputs%0AAuthor%3A%20Daniel%20S.%20Berman%20and%20Brian%20Merritt%20and%20Stanley%20Ta%20and%20Dana%20Udwin%20and%20Amanda%20Ernlund%20and%20Jeremy%20Ratcliff%20and%20Vijay%20Narayan%0AAbstract%3A%20At%20present%2C%20there%20are%20no%20easily%20understood%20explainable%20artificial%20intelligence%20%28AI%29%20methods%20for%20discrete%20token%20inputs%2C%20like%20text.%20Most%20explainable%20AI%20techniques%20do%20not%20extend%20well%20to%20token%20sequences%2C%20where%20both%20local%20and%20global%20features%20matter%2C%20because%20state-of-the-art%20models%2C%20like%20transformers%2C%20tend%20to%20focus%20on%20global%20connections.%20Therefore%2C%20existing%20explainable%20AI%20algorithms%20fail%20by%20%28i%29%20identifying%20disparate%20tokens%20of%20importance%2C%20or%20%28ii%29%20assigning%20a%20large%20number%20of%20tokens%20a%20low%20value%20of%20importance.%20This%20method%20for%20explainable%20AI%20for%20tokens-based%20classifiers%20generalizes%20a%20mask-based%20explainable%20AI%20algorithm%20for%20images.%20It%20starts%20with%20an%20Explainer%20neural%20network%20that%20is%20trained%20to%20create%20masks%20to%20hide%20information%20not%20relevant%20for%20classification.%20Then%2C%20the%20Hadamard%20product%20of%20the%20mask%20and%20the%20continuous%20values%20of%20the%20classifier%27s%20embedding%20layer%20is%20taken%20and%20passed%20through%20the%20classifier%2C%20changing%20the%20magnitude%20of%20the%20embedding%20vector%20but%20keeping%20the%20orientation%20unchanged.%20The%20Explainer%20is%20trained%20for%20a%20taxonomic%20classifier%20for%20nucl {"title": "Soft-Di[M]O: Improving One-Step Discrete Image Generation with Soft Embeddings", "author": "Yuanzhi Zhu and Xi Wang and St\u00e9phane Lathuili\u00e8re and Vicky Kalogeiton", "abstract": "One-step generators distilled from Masked Diffusion Models (MDMs) compress multiple sampling steps into a single forward pass, enabling efficient text and image synthesis. However, they suffer two key limitations: they inherit modeling bias from the teacher, and their discrete token outputs block gradient flow, preventing post-distillation refinements such as adversarial training, reward-based fine-tuning, and Test-Time Embedding Optimization (TTEO). In this work, we introduce soft embeddings, a simple relaxation that replaces discrete tokens with the expected embeddings under the generator's output distribution. Soft embeddings preserve representation fidelity for one-step discrete generator while providing a fully differentiable continuous surrogate that is compatible with teacher backbones and tokenizer decoders. Integrating soft embeddings into the Di[M]O distillation framework (denoted Soft-Di[M]O) makes one-step generators end-to-end trainable and enables straightforward application of GAN-based refinement, differentiable reward fine-tuning, and TTEO. Empirically, across multiple MDM teachers (e.g., MaskBit, MaskGen), Soft-Di[M]O achieves state-of-the-art one-step results: improved class-to-image performance, a one-step FID of 1.56 on ImageNet-256 with GAN-based refinement, along with higher GenEval and HPS scores on text-to-image with reward fine-tuning, and further gains from TTEO.", "link": "http://arxiv.org/abs/2509.22925v2", "date": "2026-03-19", "relevancy": 2.3885, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6097}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", " {"title": "MultihopSpatial: Multi-hop Compositional Spatial Reasoning Benchmark for Vision-Language Model", "author": "Youngwan Lee and Soojin Jang and Yoorhim Cho and Seunghwan Lee and Yong-Ju Lee and Sung Ju Hwang", "abstract": "Spatial reasoning is foundational for Vision-Language Models (VLMs), particularly when deployed as Vision-Language-Action (VLA) agents in physical environments. However, existing benchmarks predominantly focus on elementary, single-hop relations, neglecting the multi-hop compositional reasoning and precise visual grounding essential for real-world scenarios. To address this, we introduce MultihopSpatial, offering three key contributions: (1) A comprehensive benchmark designed for multi-hop and compositional spatial reasoning, featuring 1- to 3-hop complex queries across diverse spatial perspectives. (2) Acc@50IoU, a complementary metric that simultaneously evaluates reasoning and visual grounding by requiring both answer selection and precise bounding box prediction - capabilities vital for robust VLA deployment. (3) MultihopSpatial-Train, a dedicated large-scale training corpus to foster spatial intelligence. Extensive evaluation of 37 state-of-the-art VLMs yields eight key insights, revealing that compositional spatial reasoning remains a formidable challenge. Finally, we demonstrate that reinforcement learning post-training on our corpus enhances both intrinsic VLM spatial reasoning and downstream embodied manipulation performance.", "link": "http://arxiv.org/abs/2603.18892v1", "date": "2026-03-19", "relevancy": 2.3866, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6049}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6049}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5554}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MultihopSpatial%3A%20Multi-hop%20Compositional%20Spatial%20Reasoning%20Benchmark%20for%20Vision-Language%20Model&body=Title%3A%20MultihopSpatial%3A%20Multi-hop%20Compositional%20Spatial%20Reasoning%20Benchmark%20for%20Vision-Language%20Model%0AAuthor%3A%20Youngwan%20Lee%20and%20Soojin%20Jang%20and%20Yoorhim%20Cho%20and%20Seunghwan%20Lee%20and%20Yong-Ju%20Lee%20and%20Sung%20Ju%20Hwang%0AAbstract%3A%20Spatial%20reasoning%20is%20foundational%20for%20Vision-Language%20Models%20%28VLMs%29%2C%20particularly%20when%20deployed%20as%20Vision-Language-Action%20%28VLA%29%20agents%20in%20physical%20environments.%20However%2C%20existing%20benchmarks%20predominantly%20focus%20on%20elementary%2C%20single-hop%20relations%2C%20neglecting%20the%20multi-hop%20compositional%20reasoning%20and%20precise%20visual%20grounding%20essential%20for%20real-world%20scenarios.%20To%20address%20this%2C%20we%20introduce%20MultihopSpatial%2C%20offering%20three%20key%20contributions%3A%20%281%29%20A%20comprehensive%20benchmark%20designed%20for%20multi-hop%20and%20compositional%20spatial%20reasoning%2C%20featuring%201-%20to%203-hop%20complex%20queries%20across%20diverse%20spatial%20perspectives.%20%282%29%20Acc%4050IoU%2C%20a%20complementary%20metric%20that%20simultaneously%20evaluates%20reasoning%20and%20visual%20grounding%20by%20requiring%20both%20answer%20selection%20and%20precise%20bounding%20box%20prediction%20-%20capabilities%20vital%20for%20robust%20VLA%20deployment.%20%283%29%20MultihopSpatial-Train%2C%20a%20dedicated%20large-scale%20training%20corpus%20to%20foster%20spatial%20intelligence.%20Extensive%20evaluation%20of%2037%20state-of-the-art%20VLMs%20yields%20eight%20key%20insights%2C%20revealing%20that%20compositional%20spatial%20reasoning%20remains%20a%20formidable%20challenge.%20Finally%2C%20we%20demonstrate%20that%20reinforcement%20learning%20post-training%20on%20our%20corpus%20enhances%20both%20intrinsic%20VLM%20spatial%20reasoning%20and%20downstream%20embodied%20manipulation%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18892v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMultihopSpatial%253A%2520Multi-hop%2520Compositional%2520Spatial%2520Reasoning%2520Benchmark%2520for%2520Vision-Language%2520Model%26entry.906535625%3DYoungwan%2520Lee%2520and%2520Soojin%2520Jang%2520and%2520Yoorhim%2520Cho%2520and%2520Seunghwan%2520Lee%2520and%2520Yong-Ju%2520Lee%2520and%2520Sung%2520Ju%2520Hwang%26entry.1292438233%3DSpatial%2520reasoning%2520is%2520foundational%2520for%2520Vision-Language%2520Models%2520%2528VLMs%2529%252C%2520particularly%2520when%2520deployed%2520as%2520Vision-Language-Action%2520%2528VLA%2529%2520agents%2520in%2520physical%2520environments.%2520However%252C%2520existing%2520benchmarks%2520predominantly%2520focus%2520on%2520elementary%252C%2520single-hop%2520relations%252C%2520neglecting%2520the%2520multi-hop%2520compositional%2520reasoning%2520and%2520precise%2520visual%2520grounding%2520essential%2520for%2520real-world%2520scenarios.%2520To%2520address%2520this%252C%2520we%2520introduce%2520MultihopSpatial%252C%2520offering%2520three%2520key%2520contributions%253A%2520%25281%2529%2520A%2520comprehensive%2520benchmark%2520designed%2520for%2520multi-hop%2520and%2520compositional%2520spatial%2520reasoning%252C%2520featuring%25201-%2520to%25203-hop%2520complex%2520queries%2520across%2520diverse%2520spatial%2520perspectives.%2520%25282%2529%2520Acc%254050IoU%252C%2520a%2520complementary%2520metric%2520that%2520simultaneously%2520evaluates%2520reasoning%2520and%2520visual%2520grounding%2520by%2520requiring%2520both%2520answer%2520selection%2520and%2520precise%2520bounding%2520box%2520prediction%2520-%2520capabilities%2520vital%2520for%2520robust%2520VLA%2520deployment.%2520%25283%252 {"title": "VGGT-360: Geometry-Consistent Zero-Shot Panoramic Depth Estimation", "author": "Jiayi Yuan and Haobo Jiang and De Wen Soh and Na Zhao", "abstract": "This paper presents VGGT-360, a novel training-free framework for zero-shot, geometry-consistent panoramic depth estimation. Unlike prior view-independent training-free approaches, VGGT-360 reformulates the task as panoramic reprojection over multi-view reconstructed 3D models by leveraging the intrinsic 3D consistency of VGGT-like foundation models, thereby unifying fragmented per-view reasoning into a coherent panoramic understanding. To achieve robust and accurate estimation, VGGT-360 integrates three plug-and-play modules that form a unified panorama-to-3D-to-depth framework: (i) Uncertainty-guided adaptive projection slices panoramas into perspective views to bridge the domain gap between panoramic inputs and VGGT's perspective prior. It estimates gradient-based uncertainty to allocate denser views to geometry-poor regions, yielding geometry-informative inputs for VGGT. (ii) Structure-saliency enhanced attention strengthens VGGT's robustness during 3D reconstruction by injecting structure-aware confidence into its attention layers, guiding focus toward geometrically reliable regions and enhancing cross-view coherence. (iii) Correlation-weighted 3D model correction refines the reconstructed 3D model by reweighting overlapping points using attention-inferred correlation scores, providing a consistent geometric basis for accurate panoramic reprojection. Extensive experiments show that VGGT-360 outperforms both trained and training-free state-of-the-art methods across multiple resolutions and diverse indoor and outdoor datasets.", "link": "http://arxiv.org/abs/2603.18943v1", "date": "2026-03-19", "relevancy": 2.3832, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6114}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.587}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5788}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VGGT-360%3A%20Geometry-Consistent%20Zero-Shot%20Panoramic%20Depth%20Estimation&body=Title%3A%20VGGT-360%3A%20Geometry-Consistent%20Zero-Shot%20Panoramic%20Depth%20Estimation%0AAuthor%3A%20Jiayi%20Yuan%20and%20Haobo%20Jiang%20and%20De%20Wen%20Soh%20and%20Na%20Zhao%0AAbstract%3A%20This%20paper%20presents%20VGGT-360%2C%20a%20novel%20training-free%20framework%20for%20zero-shot%2C%20geometry-consistent%20panoramic%20depth%20estimation.%20Unlike%20prior%20view-independent%20training-free%20approaches%2C%20VGGT-360%20reformulates%20the%20task%20as%20panoramic%20reprojection%20over%20multi-view%20reconstructed%203D%20models%20by%20leveraging%20the%20intrinsic%203D%20consistency%20of%20VGGT-like%20foundation%20models%2C%20thereby%20unifying%20fragmented%20per-view%20reasoning%20into%20a%20coherent%20panoramic%20understanding.%20To%20achieve%20robust%20and%20accurate%20estimation%2C%20VGGT-360%20integrates%20three%20plug-and-play%20modules%20that%20form%20a%20unified%20panorama-to-3D-to-depth%20framework%3A%20%28i%29%20Uncertainty-guided%20adaptive%20projection%20slices%20panoramas%20into%20perspective%20views%20to%20bridge%20the%20domain%20gap%20between%20panoramic%20inputs%20and%20VGGT%27s%20perspective%20prior.%20It%20estimates%20gradient-based%20uncertainty%20to%20allocate%20denser%20views%20to%20geometry-poor%20regions%2C%20yielding%20geometry-informative%20inputs%20for%20VGGT.%20%28ii%29%20Structure-saliency%20enhanced%20attention%20strengthens%20VGGT%27s%20robustness%20during%203D%20reconstruction%20by%20injecting%20structure-aware%20confidence%20into%20its%20attention%20layers%2C%20guiding%20focus%20toward%20geometrically%20reliable%20regions%20and%20enhancing%20cross-view%20coherence.%20%28iii%29%20Correlation-weighted%203D%20model%20correction%20refines%20the%20reconstructed%203D%20model%20by%20reweighting%20overlapping%20points%20using%20attention-inferred%20correlation%20scores%2C%20providing%20a%20consistent%20geometric%20basis%20for%20accurate%20panoramic%20reprojection.%20Extensive%20experiments%20show%20that%20VGGT-360%20outperforms%20both%20trained%20and%20training-free%20state-of-the-art%20methods%20across%20multiple%20resolutions%20and%20diverse%20indoor%20and%20outdoor%20datasets.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18943v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVGGT-360%253A%2520Geometry-Consistent%2520Zero-Shot%2520Panoramic%2520Depth%2520Estimation%26entry.906535625%3DJiayi%2520Yuan%2520and%2520Haobo%2520Jiang%2520and%2520De%2520Wen%2520Soh%2520and%2520Na%2520Zhao%26entry.1292438233%3DThis%2520paper%2520presents%2520VGGT-360%252C%2520a%2520novel%2520training-free%2520framework%2520for%2520zero-shot%252C%2520geometry-consistent%2520panoramic%2520depth%2520estimation.%2520Unlike%2520prior%2520view-independent%2520training-free%2520approaches%252C%2520VGGT-360%2520reformulates%2520the%2520task%2520as%2520panoramic%2520reprojection%2520over%2520multi-view%2520reconstructed%25203D%2520models%2520by%2520leveraging%2520the%2520intrinsic%25203D%2520consistency%2520of%2520VGGT-like%2520foundation%2520models%252C%2520thereby%2520unifying%2520fragmented%2520per-view%2520reasoning%2520into%2520a%2520coherent%2520panoramic%2520understanding.%2520To%2520achieve%2520robust%2520and%2520accurate%2520estimation%252C%2520VGGT-360%2520integrates%2520three%2520plug-and-play%2520modules%2520that%2520form%2520a%2520unified%2520panorama-to-3D-to-depth%2520framework%253A%2520%2528i%2529%2520Uncertainty-guided%2520adaptive%2520projection%2520slices%2520panoramas%2520into%2520perspective%2520views% {"title": "Generalized Hand-Object Pose Estimation with Occlusion Awareness", "author": "Hui Yang and Wei Sun and Jian Liu and Jian Xiao Tao Xie and Hossein Rahmani and Ajmal Saeed mian and Nicu Sebe and Gim Hee Lee", "abstract": "Generalized 3D hand-object pose estimation from a single RGB image remains challenging due to the large variations in object appearances and interaction patterns, especially under heavy occlusion. We propose GenHOI, a framework for generalized hand-object pose estimation with occlusion awareness. GenHOI integrates hierarchical semantic knowledge with hand priors to enhance model generalization under challenging occlusion conditions. Specifically, we introduce a hierarchical semantic prompt that encodes object states, hand configurations, and interaction patterns via textual descriptions. This enables the model to learn abstract high-level representations of hand-object interactions for generalization to unseen objects and novel interactions while compensating for missing or ambiguous visual cues. To enable robust occlusion reasoning, we adopt a multi-modal masked modeling strategy over RGB images, predicted point clouds, and textual descriptions. Moreover, we leverage hand priors as stable spatial references to extract implicit interaction constraints. This allows reliable pose inference even under significant variations in object shapes and interaction patterns. Extensive experiments on the challenging DexYCB and HO3Dv2 benchmarks demonstrate that our method achieves state-of-the-art performance in hand-object pose estimation.", "link": "http://arxiv.org/abs/2603.19013v1", "date": "2026-03-19", "relevancy": 2.3683, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6179}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5745}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5733}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generalized%20Hand-Object%20Pose%20Estimation%20with%20Occlusion%20Awareness&body=Title%3A%20Generalized%20Hand-Object%20Pose%20Estimation%20with%20Occlusion%20Awareness%0AAuthor%3A%20Hui%20Yang%20and%20Wei%20Sun%20and%20Jian%20Liu%20and%20Jian%20Xiao%20Tao%20Xie%20and%20Hossein%20Rahmani%20and%20Ajmal%20Saeed%20mian%20and%20Nicu%20Sebe%20and%20Gim%20Hee%20Lee%0AAbstract%3A%20Generalized%203D%20hand-object%20pose%20estimation%20from%20a%20single%20RGB%20image%20remains%20challenging%20due%20to%20the%20large%20variations%20in%20object%20appearances%20and%20interaction%20patterns%2C%20especially%20under%20heavy%20occlusion.%20We%20propose%20GenHOI%2C%20a%20framework%20for%20generalized%20hand-object%20pose%20estimation%20with%20occlusion%20awareness.%20GenHOI%20integrates%20hierarchical%20semantic%20knowledge%20with%20hand%20priors%20to%20enhance%20model%20generalization%20under%20challenging%20occlusion%20conditions.%20Specifically%2C%20we%20introduce%20a%20hierarchical%20semantic%20prompt%20that%20encodes%20object%20states%2C%20hand%20configurations%2C%20and%20interaction%20patterns%20via%20textual%20descriptions.%20This%20enables%20the%20model%20to%20learn%20abstract%20high-level%20representations%20of%20hand-object%20interactions%20for%20generalization%20to%20unseen%20objects%20and%20novel%20interactions%20while%20compensating%20for%20missing%20or%20ambiguous%20visual%20cues.%20To%20enable%20robust%20occlusion%20reasoning%2C%20we%20adopt%20a%20multi-modal%20masked%20modeling%20strategy%20over%20RGB%20images%2C%20predicted%20point%20clouds%2C%20and%20textual%20descriptions.%20Moreover%2C%20we%20leverage%20hand%20priors%20as%20stable%20spatial%20references%20to%20extract%20implicit%20interaction%20constraints.%20This%20allows%20reliable%20pose%20infere

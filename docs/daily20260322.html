{"title": "VeriEquivBench: An Equivalence Score for Ground-Truth-Free Evaluation of Formally Verifiable Code", "author": "Lingfei Zeng and Fengdi Che and Xuhan Huang and Fei Ye and Xu Xu and Binhang Yuan and Jie Fu", "abstract": "Formal verification is the next frontier for ensuring the correctness of code generated by Large Language Models (LLMs). While methods that co-generate code and formal specifications in formal languages, like Dafny, can, in principle, prove alignment with user intent, progress is bottlenecked by specification quality evaluation. Current benchmarks rely on matching against ground-truth specifications, a manual and expertise-intensive process that has limited existing datasets to a few hundred simple problems and also suffers from a reliability issue. To address this, we introduce VeriEquivBench, a new benchmark with $2,389$ complex algorithmic problems that probe the limitations of current models in both code generation and formal reasoning. Our evaluation framework replaces ground-truth matching with a formally grounded metric, the equivalence score, and rigorously verifies the quality of generated specifications and code. Our results show that generating formally verifiable code remains a profound challenge for state-of-the-art LLMs. This underscores both the difficulty of the task and the need for benchmarks like VeriEquivBench to drive progress toward scalable and reliable coding agents.", "link": "http://arxiv.org/abs/2510.06296v2", "date": "2026-03-19", "relevancy": 2.2724, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4576}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4576}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4483}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VeriEquivBench%3A%20An%20Equivalence%20Score%20for%20Ground-Truth-Free%20Evaluation%20of%20Formally%20Verifiable%20Code&body=Title%3A%20VeriEquivBench%3A%20An%20Equivalence%20Score%20for%20Ground-Truth-Free%20Evaluation%20of%20Formally%20Verifiable%20Code%0AAuthor%3A%20Lingfei%20Zeng%20and%20Fengdi%20Che%20and%20Xuhan%20Huang%20and%20Fei%20Ye%20and%20Xu%20Xu%20and%20Binhang%20Yuan%20and%20Jie%20Fu%0AAbstract%3A%20Formal%20verification%20is%20the%20next%20frontier%20for%20ensuring%20the%20correctness%20of%20code%20generated%20by%20Large%20Language%20Models%20%28LLMs%29.%20While%20methods%20that%20co-generate%20code%20and%20formal%20specifications%20in%20formal%20languages%2C%20like%20Dafny%2C%20can%2C%20in%20principle%2C%20prove%20alignment%20with%20user%20intent%2C%20progress%20is%20bottlenecked%20by%20specification%20quality%20evaluation.%20Current%20benchmarks%20rely%20on%20matching%20against%20ground-truth%20specifications%2C%20a%20manual%20and%20expertise-intensive%20process%20that%20has%20limited%20existing%20datasets%20to%20a%20few%20hundred%20simple%20problems%20and%20also%20suffers%20from%20a%20reliability%20issue.%20To%20address%20this%2C%20we%20introduce%20VeriEquivBench%2C%20a%20new%20benchmark%20with%20%242%2C389%24%20complex%20algorithmic%20problems%20that%20probe%20the%20limitations%20of%20current%20models%20in%20both%20code%20generation%20and%20formal%20reasoning.%20Our%20evaluation%20framework%20replaces%20ground-truth%20matching%20with%20a%20formally%20grounded%20metric%2C%20the%20equivalence%20score%2C%20and%20rigorously%20verifies%20the%20quality%20of%20generated%20specifications%20and%20code.%20Our%20results%20show%20that%20generating%20formally%20verifiable%20code%20remains%20a%20profound%20challenge%20for%20state-of-the-art%20LLMs.%20This%20underscores%20both%20the%20difficulty%20of%20the%20task%20and%20the%20need%20for%20benchmarks%20like%20VeriEquivBench%20to%20drive%20progress%20toward%20scalable%20and%20reliable%20coding%20agents.%0ALink%3A%20http%3A//arxiv.org/abs/2510.06296v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVeriEquivBench%253A%2520An%2520Equivalence%2520Score%2520for%2520Ground-Truth-Free%2520Evaluation%2520of%2520Formally%2520Verifiable%2520Code%26entry.906535625%3DLingfei%2520Zeng%2520and%2520Fengdi%2520Che%2520and%2520Xuhan%2520Huang%2520and%2520Fei%2520Ye%2520and%2520Xu%2520Xu%2520and%2520Binhang%2520Yuan%2520and%2520Jie%2520Fu%26entry.1292438233%3DFormal%2520verification%2520is%2520the%2520next%2520frontier%2520for%2520ensuring%2520the%2520correctness%2520of%2520code%2520generated%2520by%2520Large%2520Language%2520Models%2520%2528LLMs%2529.%2520While%2520methods%2520that%2520co-generate%2520code%2520and%2520formal%2520specifications%2520in%2520formal%2520languages%252C%2520like%2520Dafny%252C%2520can%252C%2520in%2520principle%252C%2520prove%2520alignment%2520with%2520user%2520intent%252C%2520progress%2520is%2520bottlenecked%2520by%2520specification%2520quality%2520evaluation.%2520Current%2520benchmarks%2520rely%2520on%2520matching%2520against%2520ground-truth%2520specifications%252C%2520a%2520manual%2520and%2520expertise-intensive%2520process%2520that%2520has%2520limited%2520existing%2520datasets%2520to%2520a%2520few%2520hundred%2520simple%2520problems%2520and%2520also%2520suffers%2520from%2520a%2520reliability%2520issue.%2520To%2520address%2520this%252C%2520we%2520introduce%2520VeriEquivBench%252C%2520a%2520new%2520benchmark%2520with%2520%25242%252C389%2524%2520complex%2520algorithmic%2520problems%2520that%2520probe%2520the%2520limitations%2520of%2520current%2520models%2520in%2520both%2520code%2520generation%2520and%2520formal%2520reasoning.%2520Our%2520evaluation%2520framework%2520replaces%2520ground-truth%2520matching%2520with%2520a%2520formally%2520grounded%2520metric%252C%2520the%2520equivalenc {"title": "PRIOR: Perceptive Learning for Humanoid Locomotion with Reference Gait Priors", "author": "Chenxi Han and Shilu He and Yi Cheng and Linqi Ye and Houde Liu", "abstract": "Training perceptive humanoid locomotion policies that traverse complex terrains with natural gaits remains an open challenge, typically demanding multi-stage training pipelines, adversarial objectives, or extensive real-world calibration. We present PRIOR, an efficient and reproducible framework built on Isaac Lab that achieves robust terrain traversal with human-like gaits through a simple yet effective design: (i) a parametric gait generator that supplies stable reference trajectories derived from motion capture without adversarial training, (ii) a GRU-based state estimator that infers terrain geometry directly from egocentric depth images via self-supervised heightmap reconstruction, and (iii) terrain-adaptive footstep rewards that guide foot placement toward traversable regions. Through systematic analysis of depth image resolution trade-offs, we identify configurations that maximize terrain fidelity under real-time constraints, substantially reducing perceptual overhead without degrading traversal performance. Comprehensive experiments across terrains of varying difficulty-including stairs, boxes, and gaps-demonstrate that each component yields complementary and essential performance gains, with the full framework achieving a 100% traversal success rate. We will open-source the complete PRIOR framework, including the training pipeline, parametric gait generator, and evaluation benchmarks, to serve as a reproducible foundation for humanoid locomotion research on Isaac Lab.", "link": "http://arxiv.org/abs/2603.18979v1", "date": "2026-03-19", "relevancy": 2.2678, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6033}, {"title": "Synthesizing Movin {"title": "MERGE: Guided Vision-Language Models for Multi-Actor Event Reasoning and Grounding in Human-Robot Interaction", "author": "Joerg Deigmoeller and Nakul Agarwal and Stephan Hasler and Daniel Tanneberg and Anna Belardinelli and Reza Ghoddoosian and Chao Wang and Felix Ocker and Fan Zhang and Behzad Dariush and Michael Gienger", "abstract": "We introduce MERGE, a system for situational grounding of actors, objects, and events in dynamic human-robot group interactions. Effective collaboration in such settings requires consistent situational awareness, built on persistent representations of people and objects and an episodic abstraction of events. MERGE achieves this by uniquely identifying physical instances of actors (humans or robots) and objects and structuring them into actor-action-object relations, ensuring temporal consistency across interactions. Central to MERGE is the integration of Vision-Language Models (VLMs) guided with a perception pipeline: a lightweight streaming module continuously processes visual input to detect changes and selectively invokes the VLM only when necessary. This decoupled design preserves the reasoning power and zero-shot generalization of VLMs while improving efficiency, avoiding both the high monetary cost and the latency of frame-by-frame captioning that leads to fragmented and delayed outputs. To address the absence of suitable benchmarks for multi-actor collaboration, we introduce the GROUND dataset, which offers fine-grained situational annotations of multi-person and human-robot interactions. On this dataset, our approach improves the average grounding score by a factor of 2 compared to the performance of VLM-only baselines - including GPT-4o, GPT-5 and Gemini 2.5 Flash - while also reducing run-time by a factor of 4. The code and data are available at www.github.com/HRI-EU/merge.", "link": "http://arxiv.org/abs/2603.18988v1", "date": "2026-03-19", "relevancy": 2.2663, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5691}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5691}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5537}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MERGE%3A%20Guided%20Vision-Language%20Models%20for%20Multi-Actor%20Event%20Reasoning%20and%20Grounding%20in%20Human-Robot%20Interaction&body=Title%3A%20MERGE%3A%20Guided%20Vision-Language%20Models%20for%20Multi-Actor%20Event%20Reasoning%20and%20Grounding%20in%20Human-Robot%20Interaction%0AAuthor%3A%20Joerg%20Deigmoeller%20and%20Nakul%20Agarwal%20and%20Stephan%20Hasler%20and%20Daniel%20Tanneberg%20and%20Anna%20Belardinelli%20and%20Reza%20Ghoddoosian%20and%20Chao%20Wang%20and%20Felix%20Ocker%20and%20Fan%20Zhang%20and%20Behzad%20Dariush%20and%20Michael%20Gienger%0AAbstract%3A%20We%20introduce%20MERGE%2C%20a%20system%20for%20situational%20grounding%20of%20actors%2C%20objects%2C%20and%20events%20in%20dynamic%20human-robot%20group%20interactions.%20Effective%20collaboration%20in%20such%20settings%20requires%20consistent%20situational%20awareness%2C%20built%20on%20persistent%20representations%20of%20people%20and%20objects%20and%20an%20episodic%20abstraction%20of%20events.%20MERGE%20achieves%20this%20by%20uniquely%20identifying%20physical%20instances%20of%20actors%20%28humans%20or%20robots%29%20and%20objects%20and%20structuring%20them%20into%20actor-action-object%20relations%2C%20ensuring%20temporal%20consistency%20across%20interactions.%20Central%20to%20MERGE%20is%20the%20integration%20of%20Vision-Language%20Models%20%28VLMs%29%20guided%20with%20a%20perception%20pipeline%3A%20a%20lightweight%20streaming%20module%20continuously%20processes%20visual%20input%20to%20detect%20changes%20and%20selectively%20invokes%20the%20VLM%20only%20when%20necessary.%20This%20decoupled%20design%20preserves%20the%20reasoning%20power%20and%20zero-shot%20generalization%20of%20VLMs%20while%20improving%20efficiency%2C%20avoiding%20both%20the%20high%20monetary%20cost%20and%20the%20latency%20of%20frame-by-frame%20captioning%20that%20leads%20to%20fragmented%20and%20delayed%20outputs.%20To%20address%20the%20absence%20of%20suitable%20benchmarks%20for%20multi-actor%20collaboration%2C%20we%20introduce%20the%20GROUND%20dataset%2C%20which%20offers%20fine-grained%20situational%20annotations%20of%20multi-person%20and%20human-robot%20interactions.%20On%20this%20dataset%2C%20our%20approach%20improves%20the%20average%20grounding%20score%20by%20a%20factor%20of%202%20compared%20to%20the%20performance%20of%20VLM-only%20baselines%20-%20including%20GPT-4o%2C%20GPT-5%20and%20Gemini%202.5%20Flash%20-%20while%20also%20reducing%20run-time%20by%20a%20factor%20of%204.%20The%20code%20and%20data%20are%20available%20at%20www.github.com/HRI-EU/merge.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18988v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMERGE%253A%2520Guided%2520Vision-Language%2520Models%2520for%2520Multi-Actor%2520Event%2520Reasoning%2520and%2520Grounding%2520in%2520Human-Robot%2520Interaction%26entry.906535625%3DJoerg%2520Deigmoeller%2520and%2520Nakul%2520Agarwal%2520and%2520Stephan%2520Hasler%2520and%2520Daniel%2520Tanneberg%2520and%2520Anna%2520Belardinelli%2520and%2520Reza%2520Ghoddoosian%2520and%2520Chao%2520Wang%2520and%2520Felix%2520Ocker%2520and%2520Fan%2520Zhang%2520and%2520Behzad%2520Dariush%2520and%2520Michael%2520Gienger%26entry.1292438233%3DWe%2520introduce%2520MERGE%252C%2520a%2520system%2520for%2520situational%2520grounding%2520of%2520actors%252C%2520objects%252C%2520and%2520events%2520in%2520dynamic%2520human-robot%2520group%2520interactions.%2520Effective while%2520also%2520reducing%2520run-time%2520by%2520a%2520factor%2520of%25204.%2520The%2520code%2520and%2520data%2520are%2520available%2520at%2520www.github.com/HRI-EU/merge.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.18988v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MERGE%3A%20Guided%20Vision-Language%20Models%20for%20Multi-Actor%20Event%20Reasoning%20and%20Grounding%20in%20Human-Robot%20Interaction&entry.906535625=Joerg%20Deigmoeller%20and%20Nakul%20Agarwal%20and%20Stephan%20Hasler%20and%20Daniel%20Tanneberg%20and%20Anna%20Belardinelli%20and%20Reza%20Ghoddoosian%20and%20Chao%20Wang%20and%20Felix%20Ocker%20and%20Fan%20Zhang%20and%20Behzad%20Dariush%20and%20Michael%20Gienger&entry.1292438233=We%20introduce%20MERGE%2C%20a%20system%20for%20situational%20grounding%20of%20actors%2C%20objects%2C%20and%20events%20in%20dynamic%20human-robot%20group%20interactions.%20Effective%20collaboration%20in%20such%20settings%20requires%20consistent%20situational%20awareness%2C%20built%20on%20persistent%20representations%20of%20people%20and%20objects%20and%20an%20episodic%20abstraction%20of%20events.%20MERGE%20achieves%20this%20by%20uniquely%20identifying%20physical%20instances%20of%20actors%20%28humans%20or%20robots%29%20and%20objects%20and%20structuring%20them%20into%20actor-action-object%20relations%2C%20ensuring%20temporal%20consistency%20across%20interactions.%20Central%20to%20MERGE%20is%20the%20integration%20of%20Vision-Language%20Models%20%28VLMs%29%20guided%20with%20a%20perception%20pipeline%3A%20a%20lightweight%20streaming%20module%20continuously%20processes%20visual%20input%20to%20detect%20changes%20and%20selectively%20invokes%20the%20VLM%20only%20when%20necessary.%20This%20decoupled%20design%20preserves%20the%20reasoning%20power%20and%20zero-shot%20generalization%20of%20VLMs%20while%20improving%20efficiency%2C%20avoiding%20both%20the%20high%20monetary%20cos {"title": "Clipped Gradient Methods for Nonsmooth Convex Optimization under Heavy-Tailed Noise: A Refined Analysis", "author": "Zijian Liu", "abstract": "Optimization under heavy-tailed noise has become popular recently, since it better fits many modern machine learning tasks, as captured by empirical observations. Concretely, instead of a finite second moment on gradient noise, a bounded ${\\frak p}$-th moment where ${\\frak p}\\in(1,2]$ has been recognized to be more realistic (say being upper bounded by $\u03c3_{\\frak l}^{\\frak p}$ for some $\u03c3_{\\frak l}\\ge0$). A simple yet effective operation, gradient clipping, is known to handle this new challenge successfully. Specifically, Clipped Stochastic Gradient Descent (Clipped SGD) guarantees a high-probability rate ${\\cal O}(\u03c3_{\\frak l}\\ln(1/\u03b4)T^{1/{\\frak p}-1})$ (resp. ${\\cal O}(\u03c3_{\\frak l}^2\\ln^2(1/\u03b4)T^{2/{\\frak p}-2})$) for nonsmooth convex (resp. strongly convex) problems, where $\u03b4\\in(0,1]$ is the failure probability and $T\\in\\mathbb{N}$ is the time horizon. In this work, we provide a refined analysis for Clipped SGD and offer two faster rates, ${\\cal O}(\u03c3_{\\frak l}d_{\\rm eff}^{-1/2{\\frak p}}\\ln^{1-1/{\\frak p}}(1/\u03b4)T^{1/{\\frak p}-1})$ and ${\\cal O}(\u03c3_{\\frak l}^2d_{\\rm eff}^{-1/{\\frak p}}\\ln^{2-2/{\\frak p}}(1/\u03b4)T^{2/{\\frak p}-2})$, than the aforementioned best results, where $d_{\\rm eff}\\ge1$ is a quantity we call the $\\textit{generalized effective dimension}$. Our analysis improves upon the existing approach on two sides: better utilization of Freedman's inequality and finer bounds for clipping error under heavy-tailed noise. In addition, we extend the refined analysis to convergence in expectation and obtain new rates that break the known lower bounds. Lastly, to complement the study, we establish new lower bounds for both high-probability and in-expectation convergence. Notably, the in-expectation lower bounds match our new upper bounds, indicating the optimality of our refined analysis for convergence in expectation.", "link": "http://arxiv.org/abs/2512.23178v2", "date": "2026-03-19", "relevancy": 2.2617, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4573}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4533}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4465}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Clipped%20Gradient%20Methods%20for%20Nonsmooth%20Convex%20Optimization%20under%20Heavy-Tailed%20Noise%3A%20A%20Refined%20Analysis&body=Title%3A%20Clipped%20Gradient%20Methods%20for%20Nonsmooth%20Convex%20Optimization%20under%20Heavy-Tailed%20Noise%3A%20A%20Refined%20Analysis%0AAuthor%3A%20Zijian%20Liu%0AAbstract%3A%20Optimization%20under%20heavy-tailed%20noise%20has%20become%20popular%20recently%2C%20since%20it%20better%20fits%20many%20modern%20machine%20learning%20tasks%2C%20as%20captured%20by%20empirical%20observations.%20Concretely%2C%20instead%20of%20a%20finite%20second%20moment%20on%20gradient%20noise%2C%20a%20bounded%20%24%7B%5Cfrak%20p%7D%24-th%20moment%20where%20%24%7B%5Cfrak%20p%7D%5Cin%281%2C2%5D%24%20has%20been%20recognized%20to%20be%20more%20realistic%20%28say%20being%20upper%20bounded%20by%20%24%CF%83_%7B%5Cfrak%20l%7D%5E%7B%5Cfrak%20p%7D%24%20for%20some%20%24%CF%83_%7B%5Cfrak%20l%7D%5Cge0%24%29.%20A%20simple%20yet%20effective%20operation%2C%20gradient%20clipping%2C%20is%20known%20to%20handle%20this%20new%20challenge%20successfully.%20Specifically%2C%20Clipped%20Stochastic%20Gradient%20Descent%20%28Clipped%20SGD%29%20guarantees%20a%20high-probability%20rate%20%24%7B%5Ccal%20O%7D%28%CF%83_%7B%5Cfrak%20l%7D%5Cln%281/%CE%B4%29T%5E%7B1/%7B%5Cfrak%20p%7D-1%7D%29%24%20%28resp.%20%24%7B%5Ccal%20O%7D%28%CF%83_%7B%5Cfrak%20l%7D%5E2%5Cln%5E2%281/%CE%B4%29T%5E%7B2/%7B%5Cfrak%20p%7D-2%7D%29%24%29%20for%20nonsmooth%20convex%20%28resp.%20strongly%20convex%29%20problems%2C%20where%20%24%CE%B4%5Cin%280%2C1%5D%24%20is%20the%20failure%20probability%20and%20%24T%5Cin%5Cmathbb%7BN%7D%24%20is%20the%20time%20horizon.%20In%20this%20work%2C%20we%20provide%20a%20refined%20analysis%20for%20Clipped%20SGD%20and%20offer%20two%20faster%20rates%2C%20%24%7B%5Ccal%20O%7D%28%CF%83_%7B%5Cfrak%20l%7Dd_%7B%5Crm%20eff%7D%5E%7B-1/2%7B%5Cfrak%20p%7D%7D%5Cln%5E%7B1-1/%7B%5Cfrak%20p%7D%7D%281/%CE%B4%29T%5E%7B1/%7B%5Cfrak%20p%7D-1%7D%29%24%20and%20%24%7B%5Ccal%20O%7D%28%CF%83_%7B%5Cfrak%20l%7D%5E2d_%7B%5Crm%20eff%7D%5E%7B-1/%7B%5Cfrak%20p%7D%7D%5Cln%5E%7B2-2/%7B%5Cfrak%20p%7D%7D%281/%CE%B4%29T%5E%7B2/%7B%5Cfrak%20p%7D-2%7D%29%24%2C%20than%20the%20aforementioned%20best%20results%2C%20where%20%24d_%7B%5Crm%20eff%7D%5Cge1%24%20is%20a%20quantity%20we%20call%20the%20%24%5Ctextit%7Bgeneralized%20effective%20dimension%7D%24.%20Our%20analysis%20improves%20upon%20the%20existing%20approach%20on%20two%20sides%3A%20better%20utilization%20of%20Freedman%27s%20inequality%20and%20finer%20bounds%20for%20clipping%20error%20under%20heavy-tailed%20noise.%20In%20addition%2C%20we%20extend%20the%20refined%20analysis%20to%20convergence%20in%20expectation%20and%20obtain%20new%20rates%20that%20break%20the%20known%20lower%20bounds.%20Lastly%2C%20to%20complement%20the%20study%2C%20we%20establish%20new%20lower%20bounds%20for%20both%20high-probability%20and%20in-expectation%20convergence.%20Notably%2C%20the%20in-expectation%20lower%20bounds%20match%20our%20new%20upper%20bounds%2C%20indicating%20the%20optimality%20of%20our%20refined%20analysis%20for%20convergence%20in%20expectation.%0ALink%3A%20http%3A//arxiv.org/abs/2512.23178v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D {"title": "Parallelograms Strike Back: LLMs Generate Better Analogies than People", "author": "Qiawen Ella Liu and Raja Marjieh and Jian-Qiao Zhu and Adele E. Goldberg and Thomas L. Griffiths", "abstract": "Four-term word analogies (A:B::C:D) are classically modeled geometrically as ''parallelograms,'' yet recent work suggests this model poorly captures how humans produce analogies, with simple local-similarity heuristics often providing a better account (Peterson et al., 2020). But does the parallelogram model fail because it is a bad model of analogical relations, or because people are not very good at generating relation-preserving analogies? We compared human and large language model (LLM) analogy completions on the same set of analogy problems from (Peterson et al., 2020). We find that LLM-generated analogies are reliably judged as better than human-generated ones, and are also more closely aligned with the parallelogram structure in a distributional embedding space (GloVe). Crucially, we show that the improvement over human analogies was driven by greater parallelogram alignment and reduced reliance on accessible words rather than enhanced sensitivity to local similarity. Moreover, the LLM advantage is driven not by uniformly superior responses by LLMs, but by humans producing a long tail of weak completions: when only modal (most frequent) responses by both systems are compared, the LLM advantage disappears. However, greater parallelogram alignment and lower word frequency continue to predict which LLM completions are rated higher than those of humans. Overall, these results suggest that the parallelogram model is not a poor account of word analogy. Rather, humans may often fail to produce completions that satisfy this relational constraint, whereas LLMs do so more consistently.", "link": "http://arxiv.org/abs/2603.19066v1", "date": "2026-03-19", "relevancy": 2.2549, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4537}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4537}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4455}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Parallelograms%20Strike%20Back%3A%20LLMs%20Generate%20Better%20Analogies%20than%20People&body=Title%3A%20Parallelograms%20Strike%20Back%3A%20LLMs%20Generate%20Better%20Analogies%20than%20People%0AAuthor%3A%20Qiawen%20Ella%20Liu%20and%20Raja%20Marjieh%20and%20Jian-Qiao%20Zhu%20and%20Adele%20E.%20Goldberg%20and%20Thomas%20L.%20Griffiths%0AAbstract%3A%20Four-term%20word%20analogies%20%28A%3AB%3A%3AC%3AD%29%20are%20classically%20modeled%20geometrically%20as%20%27%27parallelograms%2C%27%27%20yet%20recent%20work%20suggests%20this%20model%20poorly%20captures%20how%20humans%20produce%20analogies%2C%20with%20simple%20local-similarity%20heuristics%20often%20providing%20a%20better%20account%20%28Peterson%20et%20al.%2C%202020%29.%20But%20does%20the%20parallelogram%20model%20fail%20because%20it%20is%20a%20bad%20model%20of%20analogical%20relations%2C%20or%20because%20people%20are%20not%20very%20good%20at%20generating%20relation-preserving%20analogies%3F%20We%20compared%20human%20and%20large%20language%20model%20%28LLM%29%20analogy%20completions%20on%20the%20same%20set%20of%20analogy%20problems%20from%20%28Peterson%20et%20al.%2C%202020%29.%20We%20find%20that%20LLM-generated%20analogies%20are%20reliably%20judged%20as%20better%20than%20human-generated%20ones%2C%20and%20are%20also%20more%20closely%20aligned%20with%20the%20parallelogram%20structure%20in%20a%20distributional%20embedding%20space%20%28GloVe%29.%20Crucially%2C%20we%20show%20that%20the%20improvement%20over%20human%20analogies%20was%20driven%20by%20greater%20parallelogram%20alignment%20and%20reduced%20reliance%20on%20accessible%20words%20rather%20than%20enhanced%20sensitivity%20to%20local%20similarity.%20Moreover%2C%20the%20LLM%20advantage%20is%20driven%20not%20by%20uniformly%20superior%20responses%20by%20LLMs%2C%20but%20by%20humans%20producing%20a%20long%20tail%20of%20weak%20completions%3A%20when%20only%20modal%20%28most%20frequent%29%20responses%20by%20both%20systems%20are%20compared%2C%20the%20LLM%20advantage%20disappears.%20However%2C%20greater%20parallelogram%20alignment%20and%20lower%20word%20frequency%20continue%20to%20predict%20which%20LLM%20completions%20are%20rated%20higher%20than%20those%20of%20humans.%20Overall%2C%20these%20results%20suggest%20that%20the%20parallelogram%20model%20is%20not%20a%20poor%20account%20of%20word%20analogy.%20Rather%2C%20humans%20may%20often%20fail%20to%20produce%20completions%20that%20satisfy%20this%20relational%20constraint%2C%20whereas%20LLMs%20do%20so%20more%20consistently.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19066v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DParallelograms%2520Strike%2520Back%253A%2520LLMs%2520Generate%2520Better%2520Analogies%2520than%2520People%26entry.906535625%3DQiawen%2520Ella%2520Liu%2520and%2520Raja%2520Marjieh%2520and%2520Jian-Qiao%2520Zhu%2520and%2520Adele%2520E.%2520Goldberg%2520and%2520Thomas%2520L.%2520Griffiths%26entry.1292438233%3DFour-term%2520word%2520analogies%2520%2528A%253AB%253A%253AC%253AD%2529%2520are%2520classically%2520modeled%2520geometrically%2520as%2520%2527%2527parallelograms%252C%2527%2527%2520yet%2520recent%2520work%2520suggests%2520this%2520model%2520poorly%2520captures%2520how%2520humans%2520produce%2520analogies%252C%2520with%2520simple%2520local-similarity%2520heuristics%2520often%2520providing%2520a%2520better%2520account%2520%2528Peterson%2520et%2520al.%252C%25202020%2529.%2520But%2520does%2520the%2520parallelogram%2520model%2520fail%2520because%252 pletions%2520that%2520satisfy%2520this%2520relational%2520constraint%252C%2520whereas%2520LLMs%2520do%2520so%2520more%2520consistently.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.19066v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Parallelograms%20Strike%20Back%3A%20LLMs%20Generate%20Better%20Analogies%20than%20People&entry.906535625=Qiawen%20Ella%20Liu%20and%20Raja%20Marjieh%20and%20Jian-Qiao%20Zhu%20and%20Adele%20E.%20Goldberg%20and%20Thomas%20L.%20Griffiths&entry.1292438233=Four-term%20word%20analogies%20%28A%3AB%3A%3AC%3AD%29%20are%20classically%20modeled%20geometrically%20as%20%27%27parallelograms%2C%27%27%20yet%20recent%20work%20suggests%20this%20model%20poorly%20captures%20how%20humans%20produce%20analogies%2C%20with%20simple%20local-similarity%20heuristics%20often%20providing%20a%20better%20account%20%28Peterson%20et%20al.%2C%202020%29.%20But%20does%20the%20parallelogram%20model%20fail%20because%20it%20is%20a%20bad%20model%20of%20analogical%20relations%2C%20or%20because%20people%20are%20not%20very%20good%20at%20generating%20relation-preserving%20analogies%3F%20We%20compared%20human%20and%20large%20language%20model%20%28LLM%29%20analogy%20completions%20on%20the%20same%20set%20of%20analogy%20problems%20from%20%28Peterson%20et%20al.%2C%202020%29.%20We%20find%20that%20LLM-generated%20analogies%20are%20reliably%20judged%20as%20better%20than%20human-generated%20ones%2C%20and%20are%20also%20more%20closely%20aligned%20with%20the%20parallelogram%20structure%20in%20a%20distributional%20embedding%20space%20%28GloVe%29.%20Crucially%2C%20we%20show%20that%20the%20improvement%20over%20human%20analogies%20was%20driven%20by%20greater%20parallelogram%20alignment%20and%20reduced%20reliance%20on%20accessible%20words%20rather%20than%20enhanced%20sensitivity%20to%20local%20similarity.%20Moreover%2C%20the%20LLM%20advantage%20is%20driven%20not%20by%20uniformly%20supe {"title": "MRD: Multi-resolution Retrieval-Detection Fusion for High-Resolution Image Understanding", "author": "Fan Yang and Xingping Dong and Xin Yu and Wenhan Luo and Wei Liu and Kaihao Zhang", "abstract": "Understanding high-resolution (HR) images remains a critical challenge for multimodal large language models (MLLMs). Recent approaches leverage vision-based retrieval-augmented generation (RAG) to retrieve query-relevant crops from HR images, improving understanding capacity of MLLMs. However, this paradigm often leads to object fragmentation, resulting in semantic bias and incomplete retrieval, while also introducing false positives from irrelevant background patches. To address these issues, we propose Multi-resolution Retrieval-Detection (MRD), a training-free framework that enhances HR image understanding from both local and global perspectives. Locally, MRD enforces cross-scale semantic consistency via multi-resolution semantic fusion to mitigate single-resolution bias and alleviate object fragmentation. Globally, it integrates open-vocabulary object detection (OVD) as localization priors within a unified framework. Extensive experiments across multiple MLLMs on HR image benchmarks demonstrate that MRD achieves state-of-the-art (SOTA) performance on both single-object and multi-object understanding tasks. Code will be available at: https://github.com/yf0412/MRD.", "link": "http://arxiv.org/abs/2512.02906v3", "date": "2026-03-19", "relevancy": 2.2516, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5647}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5637}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5608}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MRD%3A%20Multi-resolution%20Retrieval-Detection%20Fusion%20for%20High-Resolution%20Image%20Understanding&body=Title%3A%20MRD%3A%20Multi-resolution%20Retrieval-Detection%20Fusion%20for%20High-Resolution%20Image%20Understanding%0AAuthor%3A%20Fan%20Yang%20and%20Xingping%20Dong%20and%20Xin%20Yu%20and%20Wenhan%20Luo%20and%20Wei%20Liu%20and%20Kaihao%20Zhang%0AAbstract%3A%20Understanding%20high-resolution%20%28HR%29%20images%20remains%20a%20critical%20challenge%20for%20multimodal%20large%20language%20models%20%28MLLMs%29.%20Recent%20approaches%20leverage%20vision-based%20retrieval-augmented%20generation%20%28RAG%29%20to%20retrieve%20query-relevant%20crops%20from%20HR%20images%2C%20improving%20understanding%20capacity%20of%20MLLMs.%20However%2C%20this%20paradigm%20often%20leads%20to%20object%20fragmentation%2C%20resulting%20in%20semantic%20bias%20and%20incomplete%20retrieval%2C%20while%20also%20introducing%20false%20positives%20from%20irrelevant%20background%20patches.%20To%20address%20these%20issues%2C%20we%20propose%20Multi-resolution%20Retrieval-Detection%20%28MRD%29%2C%20a%20training-free%20framework%20that%20enhances%20HR%20image%20understanding%20from%20both%20local%20and%20global%20perspectives.%20Locally%2C%20MRD%20enforces%20cross-scale%20semantic%20consistency%20via%20multi-resolution%20semantic%20fusion%20to%20mitigate%20single-resolution%20bias%20and%20alleviate%20object%20fragmentation.%20Globally%2C%20it%20integrates%20open-vocabulary%20object%20detection%20%28OVD%29%20as%20localization%20priors%20within%20a%20unified%20framework.%20Extensive%20experiments%20across%20multiple%20MLLMs%20on%20HR%20image%20benchmarks%20demonstrate%20that%20MRD%20achieves%20state-of-the-art%20%28SOTA%29%20performance%20on%20both%20single-object%20and%20multi-object%20understanding%20tasks.%20Code%20will%20be%20available%20at%3A%20https%3A//github.com/yf0412/MRD.%0ALink%3A%20http%3A//arxiv.org/abs/2512.02906v3%0AForm%3A ate%2520that%2520MRD%2520achieves%2520state-of-the-art%2520%2528SOTA%2529%2520performance%2520on%2520both%2520single-object%2520and%2520multi-object%2520understanding%2520tasks.%2520Code%2520will%2520be%2520available%2520at%253A%2520https%253A//github.com/yf0412/MRD.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.02906v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MRD%3A%20Multi-resolution%20Retrieval-Detection%20Fusion%20for%20High-Resolution%20Image%20Understanding&entry.906535625=Fan%20Yang%20and%20Xingping%20Dong%20and%20Xin%20Yu%20and%20Wenhan%20Luo%20and%20Wei%20Liu%20and%20Kaihao%20Zhang&entry.1292438233=Understanding%20high-resolution%20%28HR%29%20images%20remains%20a%20critical%20challenge%20for%20multimodal%20large%20language%20models%20%28MLLMs%29.%20Recent%20approaches%20leverage%20vision-based%20retrieval-augmented%20generation%20%28RAG%29%20to%20retrieve%20query-relevant%20crops%20from%20HR%20images%2C%20improving%20understanding%20capacity%20of%20MLLMs.%20However%2C%20this%20paradigm%20often%20leads%20to%20object%20fragmentation%2C%20resulting%20in%20semantic%20bias%20and%20incomplete%20retrieval%2C%20while%20also%20introducing%20false%20positives%20from%20irrelevant%20background%20patches.%20To%20address%20these%20issues%2C%20we%20propose%20Multi-resolution%20Retrieval-Detection%20%28MRD%29%2C%20a%20training-free%20framework%20that%20enhances%20HR%20image%20understanding%20from%20both%20local%20and%20global%20perspectives.%20Locally%2C%20MRD%20enforces%20cross-scale%20semantic%20consistency%20via%20multi-resolution%20semantic%20fusion%20to%20mitigate%20single-resolution%20bias%20and%20alleviate%20object%20fragmentation.%20Globally%2C%20it%20integrates%20open-vocabulary%20object%20detection%20%28OVD%29%20as%20localization%20priors%20within%20a%20unified%20framework.%20Extensive%20experiments%20across%20multiple%20MLLMs%20on%20HR%20image%20b {"title": "FinTradeBench: A Financial Reasoning Benchmark for LLMs", "author": "Yogesh Agrawal and Aniruddha Dutta and Md Mahadi Hasan and Santu Karmaker and Aritra Dutta", "abstract": "Real-world financial decision-making is a challenging problem that requires reasoning over heterogeneous signals, including company fundamentals derived from regulatory filings and trading signals computed from price dynamics. Recently, with the advancement of Large Language Models (LLMs), financial analysts have begun to use them for financial decision-making tasks. However, existing financial question answering benchmarks for testing these models primarily focus on company balance sheet data and rarely evaluate reasoning over how company stocks trade in the market or their interactions with fundamentals. To take advantage of the strengths of both approaches, we introduce FinTradeBench, a benchmark for evaluating financial reasoning that integrates company fundamentals and trading signals. FinTradeBench contains 1,400 questions grounded in NASDAQ-100 companies over a ten-year historical window. The benchmark is organized into three reasoning categories: fundamentals-focused, trading-signal-focused, and hybrid questions requiring cross-signal reasoning. To ensure reliability at scale, we adopt a calibration-then-scaling framework that combines expert seed questions, multi-model response generation, intra-model self-filtering, numerical auditing, and human-LLM judge alignment. We evaluate 14 LLMs under zero-shot prompting and retrieval-augmented settings and witness a clear performance gap. Retrieval substantially improves reasoning over textual fundamentals, but provides limited benefit for trading-signal reasoning. These findings highlight fundamental challenges in the numerical and time-series reasoning for current LLMs and motivate future research in financial intelligence.", "link": "http://arxiv.org/abs/2603.19225v1", "date": "2026-03-19", "relevancy": 2.25, "topK": [{"title": " {"title": "Translating MRI to PET through Conditional Diffusion Models with Enhanced Pathology Awareness", "author": "Yitong Li and Igor Yakushev and Dennis M. Hedderich and Christian Wachinger", "abstract": "Positron emission tomography (PET) is a widely recognized technique for diagnosing neurodegenerative diseases, offering critical functional insights. However, its high costs and radiation exposure hinder its widespread use. In contrast, magnetic resonance imaging (MRI) does not involve such limitations. While MRI also detects neurodegenerative changes, it is less sensitive for diagnosis compared to PET. To overcome such limitations, one approach is to generate synthetic PET from MRI. Recent advances in generative models have paved the way for cross-modality medical image translation; however, existing methods largely emphasize structural preservation while neglecting the critical need for pathology awareness. To address this gap, we propose PASTA, a novel image translation framework built on conditional diffusion models with enhanced pathology awareness. PASTA surpasses state-of-the-art methods by preserving both structural and pathological details through its highly interactive dual-arm architecture and multi-modal condition integration. Additionally, we introduce a novel cycle exchange consistency and volumetric generation strategy that significantly enhances PASTA's ability to produce high-quality 3D PET images. Our qualitative and quantitative results demonstrate the high quality and pathology awareness of the synthesized PET scans. For Alzheimer's diagnosis, the performance of these synthesized scans improves over MRI by 4%, almost reaching the performance of actual PET. Our code is available at https://github.com/ai-med/PASTA.", "link": "http://arxiv.org/abs/2603.18896v1", "date": "2026-03-19", "relevancy": 2.2446, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5655}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5655}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5395}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Translating%20MRI%20to%20PET%20through%20Conditional%20Diffusion%20Models%20with%20Enhanced%20Pathology%20Awareness&body=Title%3A%20Translating%20MRI%20to%20PET%20through%20Conditional%20Diffusion%20Models%20with%20Enhanced%20Pathology%20Awareness%0AAuthor%3A%20Yitong%20Li%20and%20Igor%20Yakushev%20and%20Dennis%20M.%20Hedderich%20and%20Christian%20Wachinger%0AAbstract%3A%20Positron%20emission%20tomography%20%28PET%29%20is%20a%20widely%20recognized%20technique%20for%20diagnosing%20neurodegenerative%20diseases%2C%20offering%20critical%20functional%20insights.%20However%2C%20its%20high%20costs%20and%20radiation%20exposure%20hinder%20its%20widespread%20use.%20In%20contrast%2C%20magnetic%20resonance%20imaging%20%28MRI%29%20does%20not%20involve%20such%20limitations.%20While%20MRI%20also%20detects%20neurodegenerative%20changes%2C%20it%20is%20less%20sensitive%20for%20diagnosis%20compared%20to%20PET.%20To%20overcome%20such%20limitations%2C%20one%20approach%20is%20to%20generate%20synthetic%20PET%20from%20MRI.%20Recent%20advances%20in%20generative%20models%20have%20paved%20the%20way%20for%20cross-modality%20medical%20image%20translation%3B%20however%2C%20existing%20methods%20largely%20emphasize%20structural%20preservation%20while%20neglecting%20the%20critical%20need%20for%20pathology%20awareness.%20To%20address%20this%20gap%2C%20we%20propose%20PASTA%2C%20a%20novel%20image%20translation%20framework%20built%20on%20conditional%20diffusion%20models%20with%20enhanced%20pathology%20awareness.%20PASTA%20surpasses%20state-of-the-art%20methods%20by%20preserving%20both%20structural%20and%20pathological%20details%20through%20its%20highly%20interactive%20dual-arm%20architecture%20and%20multi-modal%20condition%20integration.%20Additionally%2C%20we%20introduce%20a%20novel%20cycle%20exchange%20consistency%20and%20volumetric%20generation%20strategy%20that%20significantly%20enhances%20PASTA%27s%20ability%20to%20produce%20high-quality%203D%20PET%20images.%20Our%20qualitative%20and%20quantitative%20results%20demonstrate%20the%20high%20quality%20and%20pathology%20awareness%20of%20the%20synthesized%20PET%20scans.%20For%20Alzheimer%27s%20diagnosis%2C%20the%20performance%20of%20these%20synthesized%20scans%20improves%20over%20MRI%20by%204%25%2C%20almost%20reaching%20the%20performance%20of%20actual%20PET.%20Our%20code%20is%20available%20at%20https%3A//github.com/ai-med/PASTA.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18896v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTranslating%2520MRI%2520to%2520PET%2520through%2520Conditional%2520Diffusion%2520Models%2520with%2520Enhanced%2520Pathology%2520Awareness%26entry.906535625%3DYitong%2520Li%2520and%2520Igor%2520Yakushev%2520and%2520Dennis%2520M.%2520Hedderich%2520and%2520Christian%2520Wachinger%26entry.1292438233%3DPositron%2520emission%2520tomography%2520%2528PET%2529%2520is%2520a%2520widely%2520recognized%2520technique%2520for%2520diagnosing%2520neurodegenerative%2520diseases%252C%2520offering%2520critical%2520functional%2520insights.%2520However%252C%2520its%2520high%2520costs%2520and%2520radiation%2520exposure%2520hinder%2520its%2520widespread%2520use.%2520In%2520contrast%252C%2520magnetic%2520resonance%2520imaging%2520%2528MRI%2529%2520does%2520not%2520involve%2520such%2520limitations.%2520While%2520MRI%2520also%2520detects%2520neurodegenerative%2520changes%252C%2520it%2520is%2520less%2520sensitive%2520for%2520diagnosis%2520compared%2520to%2520PET.%2520To%2520overcome%2520such%2520limitations%252C%2520one%2520approach%2520is%2520to%2520generate%2520syntheti {"title": "On Minimal Depth in Neural Networks", "author": "Juan L. Valerdi", "abstract": "Understanding the relationship between the depth of a neural network and its representational capacity is a central problem in deep learning theory. In this work, we develop a geometric framework to analyze the expressivity of ReLU networks with the notion of depth complexity for convex polytopes. The depth of a polytope recursively quantifies the number of alternating convex hull and Minkowski sum operations required to construct it. This geometric perspective serves as a rigorous tool for deriving depth lower bounds and understanding the structural limits of deep neural architectures.\n  We establish lower and upper bounds on the depth of polytopes, as well as tight bounds for classical families. These results yield two main consequences. First, we provide a purely geometric proof of the expressivity bound by Arora et al. (2018), confirming that $\\lceil \\log_2(n+1)\\rceil$ hidden layers suffice to represent any continuous piecewise linear (CPWL) function. Second, we prove that, unlike general ReLU networks, convex polytopes do not admit a universal depth bound. Specifically, the depth of cyclic polytopes in dimensions $n \\geq 4$ grows unboundedly with the number of vertices. This result implies that Input Convex Neural Networks (ICNNs) cannot represent all convex CPWL functions with a fixed depth, revealing a sharp separation in expressivity between ICNNs and standard ReLU networks.", "link": "http://arxiv.org/abs/2402.15315v5", "date": "2026-03-19", "relevancy": 2.2369, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4488}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4466}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4466}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20On%20Minimal%20Depth%20in%20Neural%20Networks&body=Title%3A%20On%20Minimal%20Depth%20in%20Neural%20Networks%0AAuthor%3A%20Juan%20L.%20Valerdi%0AAbstract%3A%20Understanding%20the%20relationship%20between%20the%20depth%20of%20a%20neural%20network%20and%20its%20representational%20capacity%20is%20a%20central%20problem%20in%20deep%20learning%20theory.%20In%20this%20work%2C%20we%20develop%20a%20geometric%20framework%20to%20analyze%20the%20expressivity%20of%20ReLU%20networks%20with%20the%20notion%20of%20depth%20complexity%20for%20convex%20polytopes.%20The%20depth%20of%20a%20polytope%20recursively%20quantifies%20the%20number%20of%20alternating%20convex%20hull%20and%20Minkowski%20sum%20operations%20required%20to%20construct%20it.%20This%20geometric%20perspective%20serves%20as%20a%20rigorous%20tool%20for%20deriving%20depth%20lower%20bounds%20and%20understanding%20the%20structural%20limits%20of%20deep%20neural%20architectures.%0A%20%20We%20establish%20lower%20and%20upper%20bounds%20on%20the%20depth%20of%20polytopes%2C%20as%20well%20as%20tight%20bounds%20for%20classical%20families.%20These%20results%20yield%20two%20main%20consequences.%20First%2C%20we%20provide%20a%20purely%20geometric%20proof%20of%20the%20expressivity%20bound%20by%20Arora%20et%20al.%20%282018%29%2C%20confirming%20that%20%24%5Clceil%20%5Clog_2%28n%2B1%29%5Crceil%24%20hidden%20layers%20suffice%20to%20represent%20any%20continuous%20piecewise%20linear%20%28CPWL%29%20function.%20Second%2C%20we%20prove%20that%2C%20unlike%20general%20ReLU%20networks%2C%20convex%20polytopes%20do%20not%20admit%20a%20universal%20depth%20bound.%20Specifically%2C%20the%20depth%20of%20cyclic%20polytopes%20in%20dimensions%20%24n%20%5Cgeq%204%24%20grows%20unboundedly%20with%20the%20number%20of%20vertices.%20This%20result%20implies%20that%20Input%20Convex%20Neural%20Networks%20%28ICNNs%29%20cannot%20represent%20all%20convex%20CPWL%20functions%20with%20a%20fixed%20depth%2C%20revealing%20a%20sharp%20separation%20in%20expressivity%20between%20ICNNs%20and%20standard%20ReLU%20networks.%0ALink%3A%20http%3A//arxiv.org/abs/2402.15315v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOn%2520Minimal%2520Depth%2520in%2520Neural%2520Networks%26entry.906535625%3DJuan%2520L.%2520Valerdi%26entry.1292438233%3DUnderstanding%2520the%2520relationship%2520between%2520the%2520depth%2520of%2520a%2520neural%2520network%2520and%2520its%2520representational%2520capacity%2520is%2520a%2520central%2520problem%2520in%2520deep%2520learning%2520theory.%2520In%2520this%2520work%252C%2520we%2520develop%2520a%2520geometric%2520framework%2520to%2520analyze%2520the%2520expressivity%2520of%2520ReLU%2520networks%2520with%2520the%2520notion%2520of%2520depth%2520complexity%2520for%2520convex%2520polytopes.%2520The%2520depth%2520of%2520a%2520polytope%2520recursively%2520quantifies%2520the%2520number%2520of%2520alternating%2520convex%2520hull%2520and%2520Minkowski%2520sum%2520operations%2520required%2520to%2520construct%2520it.%2520This%2520geometric%2520perspective%2520serves%2520as%2520a%2520rigorous%2520tool%2520for%2520deriving%2520depth%2520lower%2520bounds%2520and%2520understanding%2520the%2520structural%2520limits%2520of%2520deep%2520neural%2520architectures.%250A%2520%2520We%2520establish%2520lower%2520and%2520upper%2520bounds%2520on%2520the%2520depth%2520of%2520polytopes%252C%2520as%2520well%2520as%2520tight%2520bounds%2520for%2520classical%2520families.%2520These%2520results%2520yield%2520two%2520main%2520consequences.%2520First%252C%2520we%2520provide%2520a%2520purely%2520geometric%2520proof%2520of%2520the%2520expressivity%2520bound%2520by%2520Arora%2520et%2520al.%2520%25282018%2529%252C%2520confirming%2520that%2520%2524%255Clceil%2520%255Clog_2%2528n%252B1%2529%255Crceil%2524%2520hidden%2520layers%2520suffice%2520to%2520represent%2520any%2520continuous%2520piecewise%2520linear%2520%2528CPWL%2529%2520function.%2520Second%252C%2520we%2520prove%2520that%252C%2520unlike%2520general%2520ReLU%2520networks%252C%2520convex%2520polytopes%2520do%2520not%2520admit%2520a%2520universal%2520depth%2520bound.%2520Specifically%252C%2520the%2520depth%2520of%2520cyclic%2520polytopes%2520in%2520dimensions%2520%2524n%2520%255Cgeq%25204%2524%2520grows%2520unboundedly%2520with%2520the%2520number%2520of%2520vertices.%2520This%2520result%2520implies%2520that%2520Input%2520Convex%2520Neural%2520Networks%2520%2528ICNNs%2529%2520cannot%2520represent%2520all%2520convex%2520CPWL%2520functions%2520with%2520a%2520fixed%2520depth%252C%2520revealing%2520a%2520sharp%2520separation%2520in%2520expressivity%2520between%2520ICNNs%2520and%2520standard%2520ReLU%2520networks.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2402.15315v5%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=On%20Minimal%20Depth%20in%20Neural%20Networks&entry.906535625=Juan%20L.%20Valerdi&entry.1292438233=Understanding%20the%20relationship%20between%20the%20depth%20of%20a%20neural%20network%20and%20its%20representational%20capacity%20is%20a%20central%20problem%20in%20deep%20learning%20theory.%20In%20this%20work%2C%20we%20develop%20a%20geometric%20framework%20to%20analyze%20the%20expressivity%20of%20ReLU%20networks%20with%20the%20notion%20of%20depth%20complexity%20for%20convex%20polytopes.%20The%20depth%20of%20a%20polytope%20recursively%20quantifies%20the%20number%20of%20alternating%20convex%20hull%20and%20Minkowski%20sum%20operations%20required%20to%20construct%20it.%20This%20geometric%20perspective%20serves%20as%20a%20rigorous%20tool%20for%20deriving%20depth%20lower%20bounds%20and%20understanding%20the%20structural%20limits%20of%20deep%20neural%20architectures.%0A%20%20We%20establish%20lower%20and%20upper%20bounds%20on%20the%20depth%20of%20polytopes%2C%20as%20well%20as%20tight%20bounds%20for%20classical%20families.%20These%20results%20yield%20two%20main%20consequences.%20First%2C%20we%20provide%20a%20purely%20geometric%20proof%20of%20the%20expressivity%20bound%20by%20Arora%20et%20al.%20%282018%29%2C%20confirming%20that%20%24%5Clceil%20%5Clog_2%28n%2B1%29%5Crceil%24%20hidden%20layers%20suffice%20to%20represent%20any%20continuous%20piecewise%20linear%20%28CPWL%29%20function.%20Second%2C%20we%20prove%20that%2C%20unlike%20general%20ReLU%20networks%2C%20convex%20polytopes%20do%20not%20admit%20a%20universal%20depth%20bound.%20Specifically%2C%20the%20depth%20of%20cyclic%20polytopes%20in%20dimensions%20%24n%20%5Cgeq%204%24%20grows%20unboundedly%20with%20the%20number%20of%20vertices.%20This%20result%20implies%20that%20Input%20Convex%20Neural%20Networks%20%28ICNNs%29%20cannot%20represent%20all%20convex%20CPWL%20functions%20with%20a%20fixed%20depth%2C%20revealing%20a%20sharp%20separation%20in%20expressivity%20between%20ICNNs%20and%20standard%20ReLU%20networks.&entry.1838667208=http%3A//arxiv.org/abs/2402.15315v5&entry.124074799=Read"},
{"title": "ADAPT: Attention Driven Adaptive Prompt Scheduling and InTerpolating Orthogonal Complements for Rare Concepts Generation", "author": "Kwanyoung Lee and Hyunwoo Oh and SeungJu Cha and Sungho Koh and Dong-Jin Kim", "abstract": "Generating rare compositional concepts in text-to-image synthesis remains a challenge for diffusion models, particularly for attributes that are uncommon in the training data. While recent approaches, such as R2F, address this challenge by utilizing LLM for prompt scheduling, they suffer from inherent variance due to the randomness of language models and suboptimal guidance from iterative text embedding switching. To address these problems, we propose the ADAPT framework, a training-free framework that deterministically plans and semantically aligns prompt schedules, providing consistent guidance to enhance the composition of rare concepts. By leveraging attention scores and orthogonal components, ADAPT significantly enhances compositional generation of rare concepts in the RareBench benchmark without additional training or fine-tuning. Through comprehensive experiments, we demonstrate that ADAPT achieves superior performance in RareBench and accurately reflects the semantic information of rare attributes, providing deterministic and precise control over the generation of rare compositions without compromising visual integrity.", "link": "http://arxiv.org/abs/2603.19157v1", "date": "2026-03-19", "relevancy": 2.2282, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.6194}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5609}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5283}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ADAPT%3A%20Attention%20Driven%20Adaptive%20Prompt%20Scheduling%20and%20InTerpolating%20Orthogonal%20Complements%20for%20Rare%20Concepts%20Generation&body=Title%3A%20ADAPT%3A%20Attention%20Driven%20Adaptive%20Prompt%20Scheduling%20and%20InTerpolating%20Orthogonal%20Complements%20for%20Rare%20Concepts%20Generation%0AAuthor%3A%20Kwanyoung%20Lee%20and%20Hyunwoo%20Oh%20and%20SeungJu%20Cha%20and%20Sungho%20Koh%20and%20Dong-Jin%20Kim%0AAbstract%3A%20Generating%20rare%20compositional%20concepts%20in%20text-to-image%20synthesis%20remains%20a%20challenge%20for%20diffusion%20models%2C%20particularly%20for%20attributes%20that%20are%20uncommon%20in%20the%20training%20data.%20While%20recent%20approaches%2C%20such%20as%20R2F%2C%20address%20this%20challenge%20by%20utilizing%20LLM%20for%20prompt%20scheduling%2C%20they%20suffer%20from%20inherent%20variance%20due%20to%20the%20randomness%20of%20language%20models%20and%20suboptimal%20guidance%20from%20iterative%20text%20embedding%20switching.%20To%20address%20these%20problems%2C%20we%20propose%20the%20ADAPT%20framework%2C%20a%20training-free%20framework%20that%20deterministically%20plans%20and%20semantically%20aligns%20prompt%20schedules%2C%20providing%20consistent%20guidance%20to%20enhance%20the%20composition%20of%20rare%20concepts.%20By%20leveraging%20attention%20scores%20and%20orthogonal%20components%2C%20ADAPT%20significantly%20enhances%20compositional%20generation%20of%20rare%20concepts%20in%20the%20RareBench%20benchmark%20without%20additional%20training%20or%20fine-tuning.%20Through%20comprehensive%20experiments%2C%20we%20demonstrate%20that%20ADAPT%20achieves%20superior%20performance%20in%20RareBench%20and%20accurately%20reflects%20the%20semantic%20information%20of%20rare%20attributes%2C%20providing%20deterministic%20and%20precise%20control%20over%20the%20generation%20of%20rare%20compositions%20without%20compromising%20visual%20integrity.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19157v1%0AForm%3A%20https%3A//docs.google.c %2520of%2520rare%2520attributes%252C%2520providing%2520deterministic%2520and%2520precise%2520control%2520over%2520the%2520generation%2520of%2520rare%2520compositions%2520without%2520compromising%2520visual%2520integrity.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.19157v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ADAPT%3A%20Attention%20Driven%20Adaptive%20Prompt%20Scheduling%20and%20InTerpolating%20Orthogonal%20Complements%20for%20Rare%20Concepts%20Generation&entry.906535625=Kwanyoung%20Lee%20and%20Hyunwoo%20Oh%20and%20SeungJu%20Cha%20and%20Sungho%20Koh%20and%20Dong-Jin%20Kim&entry.1292438233=Generating%20rare%20compositional%20concepts%20in%20text-to-image%20synthesis%20remains%20a%20challenge%20for%20diffusion%20models%2C%20particularly%20for%20attributes%20that%20are%20uncommon%20in%20the%20training%20data.%20While%20recent%20approaches%2C%20such%20as%20R2F%2C%20address%20this%20challenge%20by%20utilizing%20LLM%20for%20prompt%20scheduling%2C%20they%20suffer%20from%20inherent%20variance%20due%20to%20the%20randomness%20of%20language%20models%20and%20suboptimal%20guidance%20from%20iterative%20text%20embedding%20switching.%20To%20address%20these%20problems%2C%20we%20propose%20the%20ADAPT%20framework%2C%20a%20training-free%20framework%20that%20deterministically%20plans%20and%20semantically%20aligns%20prompt%20schedules%2C%20providing%20consistent%20guidance%20to%20enhance%20the%20composition%20of%20rare%20concepts.%20By%20leveraging%20attention%20scores%20and%20orthogonal%20components%2C%20ADAPT%20significantly%20enhances%20compositional%20generation%20of%20rare%20concepts%20in%20the%20RareBench%20benchmark%20without%20additional%20training%20or%20fine-tuning.%20Through%20comprehensive%20experiments%2C%20we%20demonstrate%20that%20ADAPT%20achieves%20superior%20performance%20in%20RareBench%20and%20accurately%20reflects%20the%20semantic%20information%20of%20rare%20attributes%2C%20providing%20deterministic%20and%20precise%20control%20over%20the%20generation%20of%20rare%20compositions%20without%20compromising%20visual%20integrity.&entry.1838667208=http%3A//arxiv.org/abs/2603.19157v1&entry.124074799=Read"},
{"title": "Mobile-VideoGPT: Fast and Accurate Model for Mobile Video Understanding", "author": "Abdelrahman Shaker and Muhammad Maaz and Chenhui Gou and Hamid Rezatofighi and Salman Khan and Fahad Shahbaz Khan", "abstract": "Video understanding models often struggle with high computational requirements, extensive parameter counts, and slow inference speed, making them inefficient for practical use. To tackle these challenges, we propose Mobile-VideoGPT, an efficient multimodal framework designed to operate with fewer than a billion parameters. Unlike traditional video large multimodal models (LMMs), Mobile-VideoGPT consists of lightweight dual visual encoders, efficient projectors, and a small language model (SLM), enabling real-time throughput. To further improve efficiency, we present an Attention-Based Frame Scoring mechanism to select the key-frames, along with an efficient token projector that prunes redundant visual tokens and preserves essential contextual cues. We evaluate our model across well-established six video understanding benchmarks (e.g., MVBench, EgoSchema, NextQA, and PercepTest). Our results show that Mobile-VideoGPT-0.5B can generate up to 46 tokens per second while outperforming existing state-of-the-art 0.5B-parameter models by 6 points on average with 40% fewer parameters and more than 2x higher throughput. Our code and models are publicly available at: https://github.com/Amshaker/Mobile-VideoGPT.", "link": "http://arxiv.org/abs/2503.21782v2", "date": "2026-03-19", "relevancy": 2.2265, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5642}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.56}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5476}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mobile-VideoGPT%3A%20Fast%20and%20Accurate%20Model%20for%20Mobile%20Video%20Understanding&body=Title%3A%20Mobile-VideoGPT%3A%20Fast%20and%20Accurate%20Model%20for%20Mobile%20Video%20Understanding%0AAuthor%3A%20Abdelrahman%20Shaker%20and%20Muhammad%20Maaz%20and%20Chenhui%20Gou%20and%20Hamid%20Rezatofighi%20and%20Salman%20Khan%20and%20Fahad%20Shahbaz%20Khan%0AAbstract%3A%20Video%20understanding%20models%20often%20struggle%20with%20high%20computational%20requirements%2C%20extensive%20parameter%20counts%2C%20and%20slow%20inference%20speed%2C%20making%20them%20inefficient%20for%20practical%20use.%20To%20tackle%20these%20challenges%2C%20we%20propose%20Mobile-VideoGPT%2C%20an%20efficient%20multimodal%20framework%20designed%20to%20operate%20with%20fewer%20than%20a%20billion%20parameters.%20Unlike%20traditional%20video%20large%20multimodal%20models%20%28LMMs%29%2C%20Mobile-VideoGPT%20consists%20of%20lightweight%20dual%20visual%20encoders%2C%20efficient%20projectors%2C%20and%20a%20small%20language%20model%20%28SLM%29%2C%20enabling%20real-time%20throughput.%20To%20further%20improve%20efficiency%2C%20we%20present%20an%20Attention-Based%20Frame%20Scoring%20mechanism%20to%20select%20the%20key-frames%2C%20along%20with%20an%20efficient%20token%20projector%20that%20prunes%20redundant%20visual%20tokens%20and%20preserves%20essential%20contextual%20cues.%20We%20evaluate%20our%20model%20across%20well-established%20six%20video%20understanding%20benchmarks%20%28e.g.%2C%20MVBench%2C%20EgoSchema%2C%20NextQA%2C%20and%20PercepTest%29.%20Our%20results%20show%20that%20Mobile-VideoGPT-0.5B%20can%20generate%20up%20to%2046%20tokens%20per%20second%20while%20outperforming%20existing%20state-of-the-art%200.5B-parameter%20models%20by%206%20points%20on%20average%20with%2040%25%20fewer%20parameters%20and%20more%20than%202x%20higher%20throughput.%20Our%20code%20and%20models%20are%20publicly%20available%20at%3A%20https%3A//github.com/Amshaker/Mobile-VideoGPT.%0ALink%3A%20http%3A//arxiv.org/abs/2503.21782v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMobile-VideoGPT%253A%2520Fast%2520and%2520Accurate%2520Model%2520for%2520Mobile%2520Video%2520Understanding%26entry.906535625%3DAbdelrahman%2520Shaker%2520and%2520Muhammad%2520Maaz%2520and%2520Chenhui%2520Gou%2520and%2520Hamid%2520Rezatofighi%2520and%2520Salman%2520Khan%2520and%2520Fahad%2520Shahbaz%2520Khan%26entry.1292438233%3DVideo%2520understanding%2520models%2520often%2520struggle%2520with%2520high%2520computational%2520requirements%252C%2520extensive%2520parameter%2520counts%252C%2520and%2520slow%2520inference%2520speed%252C%2520making%2520them%2520inefficient%2520for%2520practical%2520use.%2520To%2520tackle%2520these%2520challenges%252C%2520we%2520propose%2520Mobile-VideoGPT%252C%2520an%2520efficient%2520multimodal%2520framework%2520designed%2520to%2520operate%2520with%2520fewer%2520than%2520a%2520billion%2520parameters.%2520Unlike%2520traditional%2520video%2520large%2520multimodal%2520models%2520%2528LMMs%2529%252C%2520Mobile-VideoGPT%2520consists%2520of%2520lightweight%2520dual%2520visual%2520encoders%252C%2520efficient%2520projectors%252C%2520and%2520a%2520small%2520language%2520model%2520%2528SLM%2529%252C%2520enabling%2520real-time%2520throughput.%2520To%2520further%2520improve%2520efficiency%252C%2520we%2520present%2520an%2520Attention-Based%2520Frame%2520Scoring%2520mechanism%2520to%2520select%2520the%2520key-frames%252C%2520along%2520with%2520an%2520efficient%2520token%2520projector%2520that%2520prunes%2520redundant%2520visual%2520tokens%2520and%2520preserves%2520essential%2520contextual%2520cues.%2520We%2520evaluate%2520our%2520model%2520across%2520well-established%2520six%2520video%2520understanding%2520benchmarks%2520%2528e.g.%252C%2520MVBench%252C%2520EgoSchema%252C%2520NextQA%252C%2520and%2520PercepTest%2529.%2520Our%2520results%2520show%2520that%2520Mobile-VideoGPT-0.5B%2520can%2520generate%2520up%2520to%252046%2520tokens%2520per%2520second%2520while%2520outperforming%2520existing%2520state-of-the-art%25200.5B-parameter%2520models%2520by%25206%2520points%2520on%2520average%2520with%252040%2525%2520fewer%2520parameters%2520and%2520more%2520than%25202x%2520higher%2520throughput.%2520Our%2520code%2520and%2520models%2520are%2520publicly%2520available%2520at%253A%2520https%253A//github.com/Amshaker/Mobile-VideoGPT.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2503.21782v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Mobile-VideoGPT%3A%20Fast%20and%20Accurate%20Model%20for%20Mobile%20Video%20Understanding&entry.906535625=Abdelrahman%20Shaker%20and%20Muhammad%20Maaz%20and%20Chenhui%20Gou%20and%20Hamid%20Rezatofighi%20and%20Salman%20Khan%20and%20Fahad%20Shahbaz%20Khan&entry.1292438233=Video%20understanding%20models%20often%20struggle%20with%20high%20computational%20requirements%2C%20extensive%20parameter%20counts%2C%20and%20slow%20inference%20speed%2C%20making%20them%20inefficient%20for%20practical%20use.%20To%20tackle%20these%20challenges%2C%20we%20propose%20Mobile-VideoGPT%2C%20an%20efficient%20multimodal%20framework%20designed%20to%20operate%20with%20fewer%20than%20a%20billion%20parameters.%20Unlike%20traditional%20video%20large%20multimodal%20models%20%28LMMs%29%2C%20Mobile-VideoGPT%20consists%20of%20lightweight%20dual%20visual%20encoders%2C%20efficient%20projectors%2C%20and%20a%20small%20language%20model%20%28SLM%29%2C%20enabling%20real-time%20throughput.%20To%20further%20improve%20efficiency%2C%20we%20present%20an%20Attention-Based%20Frame%20Scoring%20mechanism%20to%20select%20the%20key-frames%2C%20along%20with%20an%20efficient%20token%20projector%20that%20prunes%20redundant%20visual%20tokens%20and%20preserves%20essential%20contextual%20cues.%20We%20evaluate%20our%20model%20across%20well-est {"title": "Nonparametric Variational Differential Privacy via Embedding Parameter Clipping", "author": "Dina El Zein and Shashi Kumar and James Henderson", "abstract": "The nonparametric variational information bottleneck (NVIB) provides the foundation for nonparametric variational differential privacy (NVDP), a framework for building privacy-preserving language models. However, the learned latent representations can drift into regions with high information content, leading to poor privacy guarantees, but also low utility due to numerical instability during training. In this work, we introduce a principled parameter clipping strategy to directly address this issue. Our method is mathematically derived from the objective of minimizing the R\u00e9nyi Divergence (RD) upper bound, yielding specific, theoretically grounded constraints on the posterior mean, variance, and mixture weight parameters. We apply our technique to an NVIB based model and empirically compare it against an unconstrained baseline. Our findings demonstrate that the clipped model consistently achieves tighter RD bounds, implying stronger privacy, while simultaneously attaining higher performance on several downstream tasks. This work presents a simple yet effective method for improving the privacy-utility trade-off in variational models, making them more robust and practical.", "link": "http://arxiv.org/abs/2603.09583v2", "date": "2026-03-19", "relevancy": 2.2223, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4568}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4471}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4295}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Nonparametric%20Variational%20Differential%20Privacy%20via%20Embedding%20Parameter%20Clipping&body=Title%3A%20Nonparametric%20Variational%20Differential%20Privacy%20via%20Embedding%20Parameter%20Clipping%0AAuthor%3A%20Dina%20El%20Zein%20and%20Shashi%20Kumar%20and%20James%20Henderson%0AAbstract%3A%20The%20nonparametric%20variational%20information%20bottleneck%20%28NVIB%29%20provides%20the%20foundation%20for%20nonparametric%20variational%20differential%20privacy%20%28NVDP%29%2C%20a%20framework%20for%20building%20privacy-preserving%20language%20models.%20However%2C%20the%20learned%20latent%20representations%20can%20drift%20into%20regions%20with%20high%20information%20content%2C%20leading%20to%20poor%20privacy%20guarantees%2C%20but%20also%20low%20utility%20due%20to%20numerical%20instability%20during%20training.%20In%20this%20work%2C%20we%20introduce%20a%20principled%20parameter%20clipping%20strategy%20to%20directly%20address%20this%20issue.%20Our%20method%20is%20mathematically%20derived%20from%20the%20objective%20of%20minimizing%20the%20R%C3%A9nyi%20Divergence%20%28RD%29%20upper%20bound%2C%20yielding%20specific%2C%20theoretically%20grounded%20constraints%20on%20the%20posterior%20mean%2C%20variance%2C%20and%20mixture%20weight%20parameters.%20We%20apply%20our%20technique%20to%20an%20NVIB%20based%20model%20and%20empirically%20compare%20it%20against%20an%20unconstrained%20baseline.%20Our%20findings%20demonstrate%20that%20the%20clipped%20model%20consistently%20achieves%20tighter%20RD%20bounds%2C%20implying%20stronger%20privacy%2C%20while%20simultaneously%20attaining%20higher%20performance%20on%20several%20downstream%20tasks.%20This%20work%20presents%20a%20simple%20yet%20effective%20method%20for%20improving%20the%20privacy-utility%20trade-off%20in%20variational%20models%2C%20making%20them%20more%20robust%20and%20practical.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09583v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fe

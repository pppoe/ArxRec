{"title": "A Benchmark for Incremental Micro-expression Recognition", "author": "Zhengqin Lai and Xiaopeng Hong and Yabin Wang and Xiaobai Li", "abstract": "Micro-expression recognition plays a pivotal role in understanding hidden emotions and has applications across various fields. Traditional recognition methods assume access to all training data at once, but real-world scenarios involve continuously evolving data streams. To respond to the requirement of adapting to new data while retaining previously learned knowledge, we introduce the first benchmark specifically designed for incremental micro-expression recognition. Our contributions include: Firstly, we formulate the incremental learning setting tailored for micro-expression recognition. Secondly, we organize sequential datasets with carefully curated learning orders to reflect real-world scenarios. Thirdly, we define two cross-evaluation-based testing protocols, each targeting distinct evaluation objectives. Finally, we provide six baseline methods and their corresponding evaluation results. This benchmark lays the groundwork for advancing incremental micro-expression recognition research. All source code used in this study will be publicly available at https://github.com/ZhengQinLai/IMER-benchmark.", "link": "http://arxiv.org/abs/2501.19111v3", "date": "2026-03-30", "relevancy": 2.4141, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.492}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4799}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4766}], "mailto": "mailto:hao {"title": "Seen2Scene: Completing Realistic 3D Scenes with Visibility-Guided Flow", "author": "Quan Meng and Yujin Chen and Lei Li and Matthias Nie\u00dfner and Angela Dai", "abstract": "We present Seen2Scene, the first flow matching-based approach that trains directly on incomplete, real-world 3D scans for scene completion and generation. Unlike prior methods that rely on complete and hence synthetic 3D data, our approach introduces visibility-guided flow matching, which explicitly masks out unknown regions in real scans, enabling effective learning from real-world, partial observations. We represent 3D scenes using truncated signed distance field (TSDF) volumes encoded in sparse grids and employ a sparse transformer to efficiently model complex scene structures while masking unknown regions. We employ 3D layout boxes as an input conditioning signal, and our approach is flexibly adapted to various other inputs such as text or partial scans. By learning directly from real-world, incomplete 3D scans, Seen2Scene enables realistic 3D scene completion for complex, cluttered real environments. Experiments demonstrate that our model produces coherent, complete, and realistic 3D scenes, outperforming baselines in completion accuracy and generation quality.", "link": "http://arxiv.org/abs/2603.28548v1", "date": "2026-03-30", "relevancy": 2.4118, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6229}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.599}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.599}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Seen2Scene%3A%20Completing%20Realistic%203D%20Scenes%20with%20Visibility-Guided%20Flow&body=Title%3A%20Seen2Scene%3A%20Completing%20Realistic%203D%20Scenes%20with%20Visibility-Guided%20Flow%0AAuthor%3A%20Quan%20Meng%20and%20Yujin%20Chen%20and%20Lei%20Li%20and%20Matthias%20Nie%C3%9Fner%20and%20Angela%20Dai%0AAbstract%3A%20We%20present%20Seen2Scene%2C%20the%20first%20flow%20matching-based%20approach%20that%20trains%20directly%20on%20incomplete%2C%20real-world%203D%20scans%20for%20scene%20completion%20and%20generation.%20Unlike%20prior%20methods%20that%20rely%20on%20complete%20and%20hence%20synthetic%203D%20data%2C%20our%20approach%20introduces%20visibility-guided%20flow%20matching%2C%20which%20explicitly%20masks%20out%20unknown%20regions%20in%20real%20scans%2C%20enabling%20effective%20learning%20from%20real-world%2C%20partial%20observations.%20We%20represent%203D%20scenes%20using%20truncated%20signed%20distance%20field%20%28TSDF%29%20volumes%20encoded%20in%20sparse%20grids%20and%20employ%20a%20sparse%20transformer%20to%20efficiently%20model%20complex%20scene%20structures%20while%20masking%20unknown%20regions.%20We%20employ%203D%20layout%20boxes%20as%20an%20input%20conditioning%20signal%2C%20and%20our%20approach%20is%20flexibly%20adapted%20to%20various%20other%20inputs%20such%20as%20text%20or%20partial%20scans.%20By%20learning%20directly%20from%20real-world%2C%20incomplete%203D%20scans%2C%20Seen2Scene%20enables%20realistic%203D%20scene%20completion%20for%20complex%2C%20cluttered%20real%20environments.%20Experiments%20demonstrate%20that%20our%20model%20produces%20coherent%2C%20complete%2C%20and%20realistic%203D%20scenes%2C%20outperforming%20baselines%20in%20completion%20accuracy%20and%20generation%20quality.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28548v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSeen2Scene%253A%2520Completing%2520Realistic%25203D%2520Scenes%2520with%2520Visibility-Guided%2520Flow%26entry.906535625%3DQuan%2520Meng%2520and%2520Yujin%2520Chen%2520and%2520Lei%2520Li%2520and%2520Matthias%2520Nie%25C3 {"title": "SonoWorld: From One Image to a 3D Audio-Visual Scene", "author": "Derong Jin and Xiyi Chen and Ming C. Lin and Ruohan Gao", "abstract": "Tremendous progress in visual scene generation now turns a single image into an explorable 3D world, yet immersion remains incomplete without sound. We introduce Image2AVScene, the task of generating a 3D audio-visual scene from a single image, and present SonoWorld, the first framework to tackle this challenge. From one image, our pipeline outpaints a 360\u00b0 panorama, lifts it into a navigable 3D scene, places language-guided sound anchors, and renders ambisonics for point, areal, and ambient sources, yielding spatial audio aligned with scene geometry and semantics. Quantitative evaluations on a newly curated real-world dataset and a controlled user study confirm the effectiveness of our approach. Beyond free-viewpoint audio-visual rendering, we also demonstrate applications to one-shot acoustic learning and audio-visual spatial source separation. Project website: https://humathe.github.io/sonoworld/", "link": "http://arxiv.org/abs/2603.28757v1", "date": "2026-03-30", "relevancy": 2.4031, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6733}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5863}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5863}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SonoWorld%3A%20From%20One%20Image%20to%20a%203D%20Audio-Visual%20Scene&body=Title%3A%20SonoWorld%3A%20From%20One%20Image%20to%20a%203D%20Audio-Visual%20Scene%0AAuthor%3A%20Derong%20Jin%20and%20Xiyi%20Chen%20and%20Ming%20C.%20Lin%20and%20Ruohan%20Gao%0AAbstract%3A%20Tremendous%20progress%20in%20visual%20scene%20generation%20now%20turns%20a%20single%20image%20into%20an%20explorable%203D%20world%2C%20yet%20immersion%20remains%20incomplete%20without%20sound.%20We%20introduce%20Image2AVScene%2C%20the%20task%20of%20generating%20a%203D%20audio-visual%20scene%20from%20a%20single%20image%2C%20and%20present%20SonoWorld%2C%20the%20first%20framework%20to%20tackle%20this%20challenge.%20From%20one%20image%2C%20our%20pipeline%20outpaints%20a%20360%C2%B0%20panorama%2C%20lifts%20it%20into%20a%20navigable%203D%20scene%2C%20places%20language-guided%20sound%20anchors%2C%20and%20renders%20ambisonics%20for%20point%2C%20areal%2C%20and%20ambient%20sources%2C%20yielding%20spatial%20audio%20aligned%20with%20scene%20geometry%20and%20semantics.%20Quantitative%20evaluations%20on%20a%20newly%20curated%20real-world%20dataset%20and%20a%20controlled%20user%20study%20confirm%20the%20effectiveness%20of%20our%20approach.%20Beyond%20free-viewpoint%20audio-visual%20rendering%2C%20we%20also%20demonstrate%20applications%20to%20one-shot%20acoustic%20learning%20and%20audio-visual%20spatial%20source%20separation.%20Project%20website%3A%20https%3A//humathe.github.io/sonoworld/%0ALink%3A%20http%3A//arxiv.org/abs/2603.28757v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSonoWorld%253A%2520From%2520One%2520Image%2520to%2520a%25203D%2520Audio-Visual%2520Scene%26entry.906535625%3DDerong%2520Jin%2520and%2520Xiyi%2520Chen%2520and%2520Ming%2520C.%2520Lin%2520and%2520Ruohan%2520Gao%26entry.1292438233%3DTremendous%2520progress%2520in%2520visual%2520scene%2520generation%2520now%2520turns%2520a%2520single%2520image%2520into%2520an%2520explorable%25203D%2520world%252C%2520yet%2520immersion%2520remains%2520incomplete%2520without%2520sound.%2520We%2520introduce%2520Image2AVScene%252C%2520the%2520task%2520of%2520generating%2520a%25203D%2520audio-visual%2520scene%2520from%2520a%2520single%2520image%252C%2520and%2520present%2520SonoWorld%252C%2520the%2520first%2520framework%2520to%2520tackle%2520this%2520challenge.%2520From%2520one%2520image%252C%2520our%2520pipeline%2520outpaints%2520a%2520360%25C2%25B0%2520panorama%252C%2520lifts%2520it%2520into%2520a%2520navigable%25203D%2520scene%252C%2520places%2520language-guided%2520sound%2520anchors%252C%2520and%2520renders%2520ambisonics%2520for%2520point%252C%2520areal%252C%2520and%2520ambient%2520sources%252C%2520yielding%2520spatial%2520audio%2520aligned%2520with%2520scene%2520geometry%2520and%2520semantics.%2520Quantitative%2520evaluations%2520on%2520a%2520newly%2520curated%2520real-world%2520dataset%2520and%2520a%2520controlled%2520user%2520study%2520confirm%2520the%2520effectiveness%2520of%2520our%2520approach.%2520Beyond%2520free-viewpoint%2520audio-visual%2520rendering%252C%2520we%2520also%2520demonstrate%2520applications%2520to%2520one-shot%2520acoustic%2520learning%2520and%2520audio-visual%2520spatial%2520source%2520separation.%2520Project%2520website%253A%2520https%253A//humathe.github.io/sonoworld/%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.28757v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SonoWorld%3A%20From%20One%20Image%20to%20a%203D%20Audio-Visual%20Scene&entry.906535625=Derong%20Jin%20and%20Xiyi%20Chen%20and%20Ming%20C.%20Lin%20and%20Ruohan%20Gao&entry.1292438233=Tremendous%20progress%20in%20visual%20scene%20generation%20now%20turns%20a%20single%20image%20into%20an%20explorable%203D%20world%2C%20yet%20immersion%20remains%20incomplete%20without%20sound.%20We%20introduce%20Image2AVScene%2C%20the%20task%20of%20generating%20a%203D%20audio-visual%20scene%20from%20a%20single%20image%2C%20and%20present%20SonoWorld%2C%20the%20first%20framework%20to%20tackle%20this%20challenge.%20From%20one%20image%2C%20our%20pipeline%20outpaints%20a%20360%C2%B0%20panorama%2C%20lifts%20it%20into%20a%20navigable%203D%20scene%2C%20places%20language-guided%20sound%20anchors%2C%20and%20renders%20ambisonics%20for%20point%2C%20areal%2C%20and%20ambient%20sources%2C%20yielding%20spatial%20audio%20aligned%20with%20scene%20geometry%20and%20semantics.%20Quantitative%20evaluations%20on%20a%20newly%20curated%20real-world%20dataset%20and%20a%20controlled%20user%20study%20confirm%20the%20effectiveness%20of%20our%20approach.%20Beyond%20free-viewpoint%20audio-visual%20rendering%2C%20we%20also%20demonstrate%20applications%20to%20one-shot%20acoustic%20learning%20and%20audio-visual%20spatial%20source%20separation.%20Project%20website%3A%20https%3A//humathe.github.io/sonoworld/&entry.1838667208=http%3A//arxiv.org/abs/2603.28757v1&entry.124074799=Read"},
{"title": "ConceptPrism: Concept Disentanglement in Personalized Diffusion Models via Residual Token Optimization", "author": "Minseo Kim and Minchan Kwon and Dongyeun Lee and Yunho Jeon and Junmo Kim", "abstract": "Personalized text-to-image (T2I) generation has emerged as a key application for creating user-specific concepts from a few reference images. The core challenge is concept disentanglement: separating the target concept from irrelevant residual information. Lacking such disentanglement, capturing high-fidelity features often incorporates undesired attributes that conflict with user prompts, compromising the trade-off between concept fidelity and text alignment. While existing methods rely on manual guidance, they often fail to represent intricate visual details and lack scalability. We introduce ConceptPrism, a framework that extracts shared features exclusively through cross-image comparison without external information. We jointly optimize a target token and image-wise residual tokens via reconstruction and exclusion losses. By suppressing shared information in residual tokens, the exclusion loss creates an information vacuum that forces the target token to capture the common concept. Extensive evaluations demonstrate that ConceptPrism achieves accurate concept disentanglement and significantly improves overall performance across diverse and complex visual concepts. The code is available at https://github.com/Minseo-Kimm/ConceptPrism.", "link": "http://arxiv.org/abs/2602.19575v2", "date": "2026-03-30", "relevancy": 2.3963, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6027}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6014}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5842}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ConceptPrism%3A%20Concept%20Disentanglement%20in%20Personalized%20Diffusion%20Models%20via%20Residual%20Token%20Optimization&body=Title%3A%20ConceptPrism%3A%20Concept%20Disentanglement%20in%20Personalized%20Diffusion%20Models%20via%20Residual%20Token%20Optimization%0AAuthor%3A%20Minseo%20Kim%20and%20Minchan%20Kwon%20and%20Dongyeun%20Lee%20and%20Yunho%20Jeon%20and%20Junmo%20Kim%0AAbstract%3A%20Personalized%20text-to-image%20%28T2I%29%20generation%20has%20emerged%20as%20a%20key%20application%20for%20creating%20user-specific%20concepts%20from%20a%20few%20reference%20images.%20The%20core%20challenge%20is%20concept%20disentanglement%3A%20separating%20the%20target%20concept%20from%20irrelevant%20residual%20information.%20Lacking%20such%20disentanglement%2C%20capturing%20high-fidelity%20features%20often%20incorporates%20undesired%20attributes%20that%20conflict%20with%20user%20prompts%2C%20compromising%20the%20trade-off%20between%20concept%20fidelity%20and%20text%20alignment.%20While%20existing%20methods%20rely%20on%20manual%20guidance%2C%20they%20often%20fail%20to%20represent%20intricate%20visual%20details%20and%20lack%20scalability.%20We%20introduce%20ConceptPrism%2C%20a%20framework%20that%20extracts%20shared%20features%20exclusively%20through%20cross-image%20comparison%20without%20external%20information.%20We%20jointly%20optimize%20a%20target%20token%20and%20image-wise%20residual%20tokens%20via%20reconstruction%20and%20exclusion%20losses.%20By%20suppressing%20shared%20information%20in%20residual%20tokens%2C%20the%20exclusion%20loss%20creates%20an%20information%20vacuum%20that%20forces%20the%20target%20token%20to%20capture%20the%20common%20concept.%20Extensive%20evaluations%20demonstrate%20that%20ConceptPrism%20achieves%20accurate%20concept%20disentanglement%20and%20significantly%20improves%20overall%20performance%20across%20diverse%20and%20complex%20visual%20concepts.%20The%20code%20is%20available%20at%20https%3A//github.com/Minseo-Kimm/ConceptPrism.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19575v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DConceptPrism%253A%2520Concept%2520Disentanglement%2520in%2520Personalized%2520Diffusion%2520Models%2520via%2520Residual%2520Token%2520Optimization%26entry.906535625%3DMinseo%2520Kim%2520and%2520Minchan%2520Kwon%2520and%2520Dongyeun%2520Lee%2520and%2520Yunho%2520Jeon%2520and%2520Junmo%2520Kim%26entry.1292438233%3DPersonalized%2520text-to-image%2520%2528T2I%2529%2520generation%2520has%2520emerged%2520as%2520a%2520key%2520application%2520for%2520creating%2520user-specific%2520concepts%2520from%2520a%2520few%2520reference%2520images.%2520The%2520core%2520challenge%2520is%2520concept%2520disentanglement%253A%2520separating%2520the%2520target%2520concept%2520from%2520irrelevant%2520residual%2520information.%2520Lacking%2520such%2520disentanglement%252C%2520capturing%2520high-fidelity%2520features%2520often%2520incorporates%2520undesired%2520attributes%2520that%2520conflict%2520with%2520user%2520prompts%252C%2520compromising%2520the%2520trade-off%2520between%2520concept%2520fidelity%2520and%2520text%2520alignment.%2520While%2520existing%2520methods%2520rely%2520on%2520manual%2520guidance%252C%2520they%2520often%2520fail%2520to%2520represent%2520intricate%2520visual%2520details%2520and%2520lack%2520scalability.%2520We%2520introduce%2520ConceptPrism%252C%2520a%2520framework%2520that%2520extracts%2520shared%2520features%2520exclusively%2520through%2520cross-image%2520comparison%2520without%2520external%2520information.%2520We%2520jointly%2520optimize%2520a%2520target%2520token%2520and%2520image-wise%2520residual%2520tokens%2520via%2520reconstruction%2520and%2520exclusion%2520losses.%2520By%2520suppressing%2520shared%2520information%2520in%2520residual%2520tokens%252C%2520the%2520exclusion%2520loss%2520creates%2520a {"title": "Open ASR Leaderboard: Towards Reproducible and Transparent Multilingual and Long-Form Speech Recognition Evaluation", "author": "Vaibhav Srivastav and Steven Zheng and Eric Bezzam and Eustache Le Bihan and Nithin Rao Koluguri and Piotr \u017belasko and Somshubra Majumdar and Adel Moumen and Sanchit Gandhi", "abstract": "We present the Open ASR Leaderboard, a reproducible benchmarking platform with community contributions from academia and industry. It compares 86 open-source and proprietary systems across 12 datasets, with English short- and long-form and multilingual short-form tracks. We standardize word error rate (WER) and inverse real-time factor (RTFx) evaluation for consistent accuracy-efficiency comparisons across model architectures and toolkits (e.g., ESPNet, NeMo, SpeechBrain, Transformers). We observe that Conformer-based encoders paired with transformer-based decoders achieve the best average WER, while connectionist temporal classification (CTC) and token-and-duration transducer (TDT) decoders offer superior RTFx, making them better suited for long-form and batched processing. All code and dataset loaders are open-sourced to support transparent, extensible evaluation. We present our evaluation methodology to facilitate community-driven benchmarking in ASR and other tasks.", "link": "http://arxiv.org/abs/2510.06961v4", "date": "2026-03-30", "relevancy": 2.3943, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4843}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4761}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4761}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20O 961v4&entry.124074799=Read"},
{"title": "VistaGEN: Consistent Driving Video Generation with Fine-Grained Control Using Multiview Visual-Language Reasoning", "author": "Li-Heng Chen and Ke Cheng and Yahui Liu and Lei Shi and Shi-Sheng Huang and Hongbo Fu", "abstract": "Driving video generation has achieved much progress in controllability, video resolution, and length, but fails to support fine-grained object-level controllability for diverse driving videos, while preserving the spatiotemporal consistency, especially in long video generation. In this paper, we present a new driving video generation technique, called VistaGEN, which enables fine-grained control of specific entities, including 3D objects, images, and text descriptions, while maintaining spatiotemporal consistency in long video sequences. Our key innovation is the incorporation of multiview visual-language reasoning into the long driving video generation. To this end, we inject visual-language features into a multiview video generator to enable fine-grained controllability. More importantly, we propose a multiview vision-language evaluator (MV-VLM) to intelligently and automatically evaluate spatiotemporal consistency of the generated content, thus formulating a novel generation-evaluation-regeneration closed-loop generation mechanism. This mechanism ensures high-quality, coherent outputs, facilitating the creation of complex and reliable driving scenarios. Besides, within the closed-loop generation, we introduce an object-level refinement module to refine the unsatisfied results evaluated from the MV-VLM and then feed them back to the video generator for regeneration. Extensive evaluation shows that our VistaGEN achieves diverse driving video generation results with fine-grained controllability, especially for long-tail objects, and much better spatiotemporal consistency than previous approaches.", "link": "http://arxiv.org/abs/2603.28353v1", "date": "2026-03-30", "relevancy": 2.3846, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6191}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5968}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5863}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VistaGEN%3A%20Consistent%20Driving%20Video%20Generation%20with%20Fine-Grained%20Control%20Using%20Multiview%20Visual-Language%20Reasoning&body=Title%3A%20VistaGEN%3A%20Consistent%20Driving%20Video%20Generation%20with%20Fine-Grained%20Control%20Using%20Multiview%20Visual-Language%20Reasoning%0AAuthor%3A%20Li-Heng%20Chen%20and%20Ke%20Cheng%20and%20Yahui%20Liu%20and%20Lei%20Shi%20and%20Shi-Sheng%20Huang%20and%20Hongbo%20Fu%0AAbstract%3A%20Driving%20video%20generation%20has%20achieved%20much%20progress%20in%20controllability%2C%20video%20resolution%2C%20and%20length%2C%20but%20fails%20to%20support%20fine-grained%20object-level%20controllability%20for%20diverse%20driving%20videos%2C%20while%20preserving%20the%20spatiotemporal%20consistency%2C%20especially%20in%20long%20video%20generation.%20In%20this%20paper%2C%20we%20present%20a%20new%20driving%20video%20generation%20technique%2C%20called%20VistaGEN%2C%20which%20enables%20fine-grained%20control%20of%20specific%20entities%2C%20including%203D%20objects%2C%20images%2C%20and%20text%20descriptions%2C%20while%20maintaining%20spatiotemporal%20consistency%20in%20long%20video%20sequences.%20Our%20key%20innovation%20is%20the%20incorporation%20of%20multiview%20visual-language%20reasoning%20into%20the%20long%20driving%20video%20generation.%20To%20this%20end%2C%20we%20inject%20visual-language%20features%20into%20a%20multiview%20video%20generator%20to%20enable%20fine-grained%20controllability.%20More%20importantly%2C%20we%20propose%20a%20multiview%20vision-language%20evaluator%20%28MV-VLM%29%20to%20intelligently%20and%20automatically%20evaluate%20spatiotemporal%20consistency%20of%20the%20generated%20content%2C%20thus%20formulating%20a%20novel%20generation-evaluation-regeneration%20closed-loop%20generation%20mechanism.%20This%20mechanism%20ensures%20high-quality%2C%20coherent%20outputs%2C%20facilitating%20the%20creation%20of%20complex%20and%20reliable%20driving%20scenarios.%20Besides%2C%20within%20the%20closed-loop%20generation%2C%20we%20introduce%20an%20object-level%20refinement%20module%20to%20refine%20the%20unsatisfied%20results%20evaluated%20from%20the%20MV-VLM%20and%20then%20feed%20them%20back%20to%20the%20video%20generator%20for%20regeneration.%20Extensive%20evaluation%20shows%20that%20our%20VistaGEN%20achieves%20diverse%20driving%20video%20generation%20results%20with%20fine-grained%20controllability%2C%20especially%20for%20long-tail%20objects%2C%20and%20much%20better%20spatiotemporal%20consistency%20than%20previous%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28353v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVistaGEN%253A%2520Consistent%2520Driving%2520Video%2520Generation%2520with%2520Fine-Grained%2520Control%2520Using%2520Multiview%2520Visual-Language%2520Reasoning%26entry.906535625%3DLi-Heng%2520Chen%2520and%2520Ke%2520Cheng%2520and%2520Yahui%2520Liu%2520and%2520Lei%2520Shi%2520and%2520Shi-Sheng%2520Huang%2520and%2520Hongbo%2520Fu%26entry.1292438233%3DDriving%2520video%2520generation%2520has%2520achieved%2520much%2520progress%2520in%2520controllability%252C%2520video%2520resolution%252C%2520and%2520length%252C%2520but%2520fails%2520to%2520support%2520fine-grained%2520object-level%2520controllability%2520for%2520diverse%2520driving%2520videos%252C%2520while%2520preserving%2520the%2520spatiotemporal%2520consistency%252C%2520especially%2520in%2520long%2520video%2520generation.%2520In%2520this%2520paper%252C%2520we%2520present%2 {"title": "Advancing Few-Shot Pediatric Arrhythmia Classification with a Novel Contrastive Loss and Multimodal Learning", "author": "Yiqiao Chen and Zijian Huang and Zhenghui Feng", "abstract": "Arrhythmias are a major cause of sudden cardiac death in children, making automated rhythm classification from electrocardiograms (ECGs) clinically important. However, pediatric arrhythmia analysis remains challenging because of age-dependent waveform variability, limited data availability, and a pronounced long-tailed class distribution that hinders recognition of rare but clinically important rhythms. To address these issues, we propose a multimodal end-to-end framework that integrates surface ECG and intracardiac electrogram (IEGM) signals for pediatric arrhythmia classification. The model combines dual-branch feature encoders, attention-based cross-modal fusion, and a lightweight Transformer classifier to learn complementary electrophysiological representations. We further introduce an Adaptive Global Class-Aware Contrastive Loss (AGCACL), which incorporates prototype-based alignment, class-frequency reweighting, and globally informed hard-class modulation to improve intra-class compactness and inter-class separability under class imbalance. We evaluate the proposed method on the pediatric subset of the Leipzig Heart Center ECG-Database and establish a reproducible preprocessing pipeline including rhythm-segment construction, denoising, and label grouping. The proposed approach achieves 96.22% Top-1 accuracy and improves macro precision, macro recall, macro F1 score, and macro F2 score by 4.48, 1.17, 6.98, and 7.34 percentage points, respectively, over the strongest baseline. These results indicate improved minority-sensitive classification performance on the current benchmark. However, further validation under subject-independent and multicenter settings is still required before clinical translation.", "link": "http://arxiv.org/abs/2509.19315v2", "date": "2026-03-30", " {"title": "Merge and Conquer: Instructing Multilingual Models by Adding Target Language Weights", "author": "Eneko Valero and Maria Ribalta i Albado and Oscar Sainz and Naiara Perez and German Rigau", "abstract": "Large Language Models (LLMs) remain heavily centered on English, with limited performance in low-resource languages. Existing adaptation approaches, such as continual pre-training, demand significant computational resources. In the case of instructed models, high-quality instruction data is also required, both of which are often inaccessible for low-resource language communities. Under these constraints, model merging offers a lightweight alternative, but its potential in low-resource contexts has not been systematically explored. In this work, we explore whether it is possible to transfer language knowledge to an instruction-tuned LLM by merging it with a language-specific base model, thereby eliminating the need of language-specific instructions and repeated fine-tuning processes whenever stronger instructed variants become available. Through experiments covering four Iberian languages (Basque, Catalan, Galician, and Spanish) and two model families, we show that merging enables effective instruction following behavior in new languages and even supports multilingual capability through the combination of multiple language-specific models. Our results indicate that model merging is a viable and efficient alternative to traditional adaptation methods for low-resource languages, achieving competitive performance while greatly reducing computational cost.", "link": "http://arxiv.org/abs/2603.28263v1", "date": "2026-03-30", "relevancy": 2.3728, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4981}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4628}, {"ti {"title": "Post-hoc Self-explanation of CNNs", "author": "Ahc\u00e8ne Boubekki and Line H. Clemmensen", "abstract": "Although standard Convolutional Neural Networks (CNNs) can be mathematically reinterpreted as Self-Explainable Models (SEMs), their built-in prototypes do not on their own accurately represent the data. Replacing the final linear layer with a $k$-means-based classifier addresses this limitation without compromising performance. This work introduces a common formalization of $k$-means-based post-hoc explanations for the classifier, the encoder's final output (B4), and combinations of intermediate feature activations. The latter approach leverages the spatial consistency of convolutional receptive fields to generate concept-based explanation maps, which are supported by gradient-free feature attribution maps. Empirical evaluation with a ResNet34 shows that using shallower, less compressed feature activations, such as those from the last three blocks (B234), results in a trade-off between semantic fidelity and a slight reduction in predictive performance.", "link": "http://arxiv.org/abs/2603.28466v1", "date": "2026-03-30", "relevancy": 2.3694, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4806}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4798}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4612}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Post-hoc%20Self-explanation%20of%20CNNs&body=Title%3A%20Post-hoc%20Self-explanation%20of%20CNNs%0AAuthor%3A%20Ahc%C3%A8ne%20Boubekki%20and%20Line%20H.%20Clemmensen%0AAbstract%3A%20Although%20standard%20Convolutional%20Neural%20Networks%20%28CNNs%29%20can%20be%20mathematically {"title": "HISA: Efficient Hierarchical Indexing for Fine-Grained Sparse Attention", "author": "Yufei Xu and Fanxu Meng and Fan Jiang and Yuxuan Wang and Ruijie Zhou and Jiexi Wu and Zhixin Pan and Zhaohui Wang and Xiaojuan Tang and Wenjie Pei and Tongxuan Liu and Di yin and Xing Sun and Muhan Zhang", "abstract": "Token-level sparse attention mechanisms, exemplified by DeepSeek Sparse Attention (DSA), achieve fine-grained key selection by scoring every historical token for each query using a lightweight indexer, and then computing attention only over the selected subset. While the downstream sparse attention scales efficiently, the indexer still scans the entire prefix for every query, introducing an O($L^2$) per-layer bottleneck that becomes prohibitive as context length grows. We propose HISA (Hierarchical Indexed Sparse Attention), a drop-in replacement for the indexer that transforms the search process from a flat token scan into a two-stage hierarchical procedure. First, a block-level coarse filter scores pooled block representatives to prune irrelevant regions. Then, a token-level refinement applies the original indexer only within the remaining candidate blocks. HISA preserves the exact token-level top-k sparsity pattern required by the downstream Sparse MLA operator and requires no additional training. On kernel-level benchmarks, HISA achieves a 2$\\times$ speedup at 32K context length and 4$\\times$ at 128K. On Needle-in-a-Haystack and LongBench, we directly replace the indexer in DeepSeek-V3.2 with HISA, without any fine-tuning. HISA closely matches the original DSA in quality while significantly outperforming block-sparse baselines. Moreover, the token selection sets produced by HISA and the original DSA exhibit a mean IoU greater than 99%, indicating that the efficiency gains come with virtually no impact on selection fidelity.", "link": "http://arxiv.org/abs/2603.28458v1", "date": "2026-03-30", "relevancy": 2.3659, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5406}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4428}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4361}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HISA%3A%20Efficient%20Hierarchical%20Indexing%20for%20Fine-Grained%20Sparse%20Attention&body=Title%3A%20HISA%3A%20Efficient%20Hierarchical%20Indexing%20for%20Fine-Grained%20Sparse%20Attention%0AAuthor%3A%20Yufei%20Xu%20and%20Fanxu%20Meng%20and%20Fan%20Jiang%20and%20Yuxuan%20Wang%20and%20Ruijie%20Zhou%20and%20Jiexi%20Wu%20and%20Zhixin%20Pan%20and%20Zhaohui%20Wang%20and%20Xiaojuan%20Tang%20and%20Wenjie%20Pei%20and%20Tongxuan%20Liu%20and%20Di%20yin%20and%20Xing%20Sun%20and%20Muhan%20Zhang%0AAbstract%3A%20Token-level%20sparse%20attention%20mechanisms%2C%20exemplified%20by%20DeepSeek%20Sparse%20Attention%20%28DSA%29%2C%20achieve%20fine-grained%20key%20selection%20by%20scoring%20every%20historical%20token%20for%20each%20query%20using%20a%20lightweight%20indexer%2C%20and%20then%20computing%20attention%20only%20over%20the%20selected%20subset.%20While%20the%20downstream%20sparse%20attention%20scales%20efficiently%2C%20the%20indexer%20still%20scans%20the%20entire%20prefix%20for%20every%20query%2C%20introducing%20an%20O%28%24L%5E2%24%29%20per-layer%20bottleneck%20that%20becomes%20prohibitive%20as%20context%20length%20grows.%20We%20propose%20HISA%20%28Hierarchical%20Indexed%20Sparse%20Attention%29%2C%20a%20drop-in%20replacement%20for%20the%20indexer%20that%20transforms%20the%20search%20process%20from%20a%20flat%20token%20scan%20into%20a%20two-stage%20hierarchical%20procedure.%20First%2C%20a%20block-level%20coarse%20filter%20scores%20pooled%20block%20 {"title": "DRIVE-Nav: Directional Reasoning, Inspection, and Verification for Efficient Open-Vocabulary Navigation", "author": "Maoguo Gao and Zejun Zhu and Zhiming Sun and Zhengwei Ma and Longze Yuan and Zhongjing Ma and Zhigang Gao and Jinhui Zhang and Suli Zou", "abstract": "Open-Vocabulary Object Navigation (OVON) requires an embodied agent to locate a language-specified target in unknown environments. Existing zero-shot methods often reason over dense frontier points under incomplete observations, causing unstable route selection, repeated revisits, and unnecessary action overhead. We present DRIVE-Nav, a structured framework that organizes exploration around persistent directions rather than raw frontiers. By inspecting encountered directions more completely and restricting subsequent decisions to still-relevant directions within a forward 240 degree view range, DRIVE-Nav reduces redundant revisits and improves path efficiency. The framework extracts and tracks directional candidates from weighted Fast Marching Method (FMM) paths, maintains representative views for semantic inspection, and combines vision-language-guided prompt enrichment with cross-frame verification to improve grounding reliability. Experiments on HM3D-OVON, HM3Dv2, and MP3D demonstrate strong overall performance and consistent efficiency gains. On HM3D-OVON, DRIVE-Nav achieves 50.2% SR and 32.6% SPL, improving the previous best method by 1.9% SR and 5.6% SPL. It also delivers the best SPL on HM3Dv2 and MP3D and transfers to a physical humanoid robot. Real-world deployment also demonstrates its effectiveness. Project page: https://coolmaoguo.github.io/drive-nav-page/", "link": "http://arxiv.org/abs/2603.28691v1", "date": "2026-03-30", "relevancy": 2.3551, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.6274}, {"title": "WorldExplorer: Towards Generating Fully {"title": "Optimized Weighted Voting System for Brain Tumor Classification Using MRI Images", "author": "Ha Anh Vu", "abstract": "The accurate classification of brain tumors from MRI scans is essential for effective diagnosis and treatment planning. This paper presents a weighted ensemble learning approach that combines deep learning and traditional machine learning models to improve classification performance. The proposed system integrates multiple classifiers, including ResNet101, DenseNet121, Xception, CNN-MRI, and ResNet50 with edge-enhanced images, SVM, and KNN with HOG features. A weighted voting mechanism assigns higher influence to models with better individual accuracy, ensuring robust decision-making. Image processing techniques such as Balance Contrast Enhancement, K-means clustering, and Canny edge detection are applied to enhance feature extraction. Experimental evaluations on the Figshare and Kaggle MRI datasets demonstrate that the proposed method achieves state-of-the-art accuracy, outperforming existing models. These findings highlight the potential of ensemble-based learning for improving brain tumor classification, offering a reliable and scalable framework for medical image analysis.", "link": "http://arxiv.org/abs/2603.28357v1", "date": "2026-03-30", "relevancy": 2.3542, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4916}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4613}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4596}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Optimized%20Weighted%20Voting%20System%20for%20Brain%20Tumor%20Classification%20Using%20MRI%20Images&b {"title": "Your Models Have Thought Enough: Training Large Reasoning Models to Stop Overthinking", "author": "Jinyi Han and Ying Huang and Ying Liao and Zishang Jiang and Xikun Lu and Haiquan Zhao and Xinyi Wang and Guanghao Zhou and Sihang Jiang and Jiaqing Liang and Weikang Zhou and Zeye Sun and Fei Yu and Yanghua Xiao", "abstract": "Large Reasoning Models (LRMs) have achieved impressive performance on challenging tasks, yet their deep reasoning often incurs substantial computational costs. To achieve efficient reasoning, existing reinforcement learning methods still struggle to construct short reasoning path during the rollout stage, limiting effective learning. Inspired by Evidence Accumulation Models, we find that LRMs have accumulated sufficient information early in reasoning, making further reasoning steps redundant. Based on this insight, we propose Just-Enough Thinking (JET), which trains models to proactively terminate unnecessary reasoning. JET performs trajectory truncation during rollout to expose the model to short, distributionally consistent reasoning paths. Besides, it uses a quality-controlled length reward to better encourage concise reasoning while maintaining correctness. Extensive experiments demonstrate that JET significantly improves reasoning efficiency without sacrificing accuracy. Especially, DeepSeek-Distill-Qwen-1.5B achieves a 4.6% accuracy gain while reducing output length by 46.3% on the Olympiad benchmark. Our code is available in the GitHub.", "link": "http://arxiv.org/abs/2509.23392v3", "date": "2026-03-30", "relevancy": 2.3494, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4759}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4669}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n {"title": "Taming the Instability: A Robust Second-Order Optimizer for Federated Learning over Non-IID Data", "author": "Yuanqiao Zhang and Tiantian He and Yuan Gao and Yixin Wang and Yew-Soon Ong and Maoguo Gong and A. K. Qin and Hui Li", "abstract": "In this paper, we present Federated Robust Curvature Optimization (FedRCO), a novel second-order optimization framework designed to improve convergence speed and reduce communication cost in Federated Learning systems under statistical heterogeneity. Existing second-order optimization methods are often computationally expensive and numerically unstable in distributed settings. In contrast, FedRCO addresses these challenges by integrating an efficient approximate curvature optimizer with a provable stability mechanism. Specifically, FedRCO incorporates three key components: (1) a Gradient Anomaly Monitor that detects and mitigates exploding gradients in real-time, (2) a Fail-Safe Resilience protocol that resets optimization states upon numerical instability, and (3) a Curvature-Preserving Adaptive Aggregation strategy that safely integrates global knowledge without erasing the local curvature geometry. Theoretical analysis shows that FedRCO can effectively mitigate instability and prevent unbounded updates while preserving optimization efficiency. Extensive experiments show that FedRCO achieves superior robustness against diverse non-IID scenarios while achieving higher accuracy and faster convergence than both state-of-the-art first-order and second-order methods.", "link": "http://arxiv.org/abs/2603.28316v1", "date": "2026-03-30", "relevancy": 2.3434, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4778}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4674}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4608}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Taming%20the%20Instability%3A%20A%20Robust%20Second-Order%20Optimizer%20for%20Federated%20Learning%20over%20Non-IID%20Data&body=Title%3A%20Taming%20the%20Instability%3A%20A%20Robust%20Second-Order%20Optimizer%20for%20Federated%20Learning%20over%20Non-IID%20Data%0AAuthor%3A%20Yuanqiao%20Zhang%20and%20Tiantian%20He%20and%20Yuan%20Gao%20and%20Yixin%20Wang%20and%20Yew-Soon%20Ong%20and%20Maoguo%20Gong%20and%20A.%20K.%20Qin%20and%20Hui%20Li%0AAbstract%3A%20In%20this%20paper%2C%20we%20present%20Federated%20Robust%20Curvature%20Optimization%20%28FedRCO%29%2C%20a%20novel%20second-order%20optimization%20framework%20designed%20to%20improve%20convergence%20speed%20and%20reduce%20communication%20cost%20in%20Federated%20Learning%20systems%20under%20statistical%20heterogeneity.%20Existing%20second-order%20optimization%20methods%20are%20often%20computationally%20expensive%20and%20numerically%20unstable%20in%20distributed%20settings.%20In%20contrast%2C%20FedRCO%20addresses%20these%20challenges%20by%20integrating%20an%20efficient%20approximate%20curvature%20optimizer%20with%20a%20provable%20stability%20mechanism.%20Specifically%2C%20FedRCO%20incorporates%20three%20key%20components%3A%20%281%29%20a%20Gradient%20Anomaly%20Monitor%20that%20detects%20and%20mitigates%20exploding%20gradients%20in%20real-time%2C%20%282%29%20a%20Fail-Safe%20Resilience%20protocol%20that%20resets%20optimization%20states%20upon%20numerical%20instability%2C%20and%20%283%29%20a%20Curvature-Preserving%20Adaptive%20Aggregation%20strategy%20that%20safely%20integrates%20global%20knowledge%20without%20erasing%20the%20local%20curvature%20geometry.%20Theoretical%20analysis%20shows%20that%20FedRCO%20can%20effectiv {"title": "CoPE-VideoLM: Leveraging Codec Primitives For Efficient Video Language Modeling", "author": "Sayan Deb Sarkar and R\u00e9mi Pautrat and Ondrej Miksik and Marc Pollefeys and Iro Armeni and Mahdi Rad and Mihai Dusmanu", "abstract": "Video Language Models (VideoLMs) enable AI systems to understand temporal dynamics in videos. To fit within the maximum context window constraint, current methods use keyframe sampling which often misses both macro-level events and micro-level details due to the sparse temporal coverage. Furthermore, processing full images and their tokens for each frame incurs substantial computational overhead. We address these limitations by leveraging video codec primitives (specifically motion vectors and residuals) which natively encode video redundancy and sparsity without requiring expensive full-image encoding for most frames. To this end, we introduce lightweight transformer-based encoders that aggregate codec primitives and align their representations with image encoder embeddings through a pre-training strategy that accelerates convergence during end-to-end fine-tuning. Our approach, CoPE-VideoLM, reduces the time-to-first-token by up to 86% and token usage by up to 93% compared to standard VideoLMs. Moreover, by varying the keyframe and codec primitive densities we maintain or exceed performance on 14 diverse video understanding benchmarks spanning general question answering, temporal and motion reasoning, long-form understanding, and spatial scene understanding.", "link": "http://arxiv.org/abs/2602.13191v2", "date": "2026-03-30", "relevancy": 2.3344, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5918}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5918}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5428}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CoPE-VideoLM%3A%20Leveraging%20Codec%20Primitives%20For%20Efficient%20Video%20Language%20Modeling&body=Title%3A%20CoPE-VideoLM%3A%20Leveraging%20Codec%20Primitives%20For%20Efficient%20Video%20Language%20Modeling%0AAuthor%3A%20Sayan%20Deb%20Sarkar%20and%20R%C3%A9mi%20Pautrat%20and%20Ondrej%20Miksik%20and%20Marc%20Pollefeys%20and%20Iro%20Armeni%20and%20Mahdi%20Rad%20and%20Mihai%20Dusmanu%0AAbstract%3A%20Video%20Language%20Models%20%28VideoLMs%29%20enable%20AI%20systems%20to%20understand%20temporal%20dynamics%20in%20videos.%20To%20fit%20within%20the%20maximum%20context%20window%20constraint%2C%20current%20methods%20use%20keyframe%20sampling%20which%20often%20misses%20both%20macro-level%20events%20and%20micro-level%20details%20due%20to%20the%20sparse%20temporal%20coverage.%20Furthermore%2C%20processing%20full%20images%20and%20their%20tokens%20for%20each%20frame%20incurs%20substantial%20computational%20overhead.%20We%20address%20these%20limitations%20by%20leveraging%20video%20codec%20primitives%20%28specifically%20motion%20vectors%20and%20residuals%29%20which%20natively%20encode%20video%20redundancy%20and%20sparsity%20without%20requiring%20expensive%20full-image%20encoding%20for%20most%20frames.%20To%20this%20end%2C%20we%20introduce%20lightweight%20transformer-based%20encoders%20that%20aggregate%20codec%20primitives%20and%20align%20their%20representations%20with%20image%20encoder%20embeddings%20through%20a%20pre-training%20strategy%20that%20accelerates%20convergence%20during%20end-to-end%20fine-tuning.%20Our%20approach%2C%20CoPE-VideoLM%2C%20reduces%20the%20time-to-first-token%20by%20up%20to%2086%25%20and%20token%20usage%20by%20up%20to%2093%25%20compared%20to%20standard%20VideoLMs.%20Moreover%2C%20by%20varying%20the%20keyframe%20and%20codec%20primitive%20densities%20we%20maintain%20or%20exceed%20performance%20on%2014%20diverse%20video%20understanding%20benchmarks%20spanning%20general%20question%20answering%2C%20temporal%20and%20motion%20reasoning%2C%20long-form%20understanding%2C%20and%20spatial%20scene%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2602.13191v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCoPE-VideoLM%253A%2520Leveraging%2520Codec%2520Primitives%2520For%2520Efficient%2520Video%2520Language%2520Modeling%26entry.906535625%3DSayan%2520Deb%2520Sarkar%2520and%2520R%25C3%25A9mi%2520Pautrat%2520and%2520Ondrej%2520Miksik%2520and%2520Marc%2520Pollefeys%2520and%2520Iro%2520Armeni%2520and%2520Mahdi%2520Rad%2520and%2520Mihai%2520Dusmanu%26entry.1292438233%3DVideo%2520Language%2520Models%2520%2528VideoLMs%2529%2520enable%2520AI%2520systems%2520to%2520understand%2520temporal%2520dynamics%2520in%2520videos.%2520To%2520fit%2520within%2520the%2520maximum%2520context%2520window%2520constraint%252C%2520current%2520methods%2520use%2520keyframe%2520sampling%2520which%2520often%2520misses%2520both%2520macro-level%2520events%2520and%2520micro-level%2520details%2520due%2520to%2520the%2520sparse%2520temporal%2520coverage.%2520Furthermore%252C%2520processing%2520full%2520images%2520and%2520their%2520tokens%2520for%2520each%2520frame%2520incurs%2520substantial%2520computational%2520overhead.%2520We%2520address%2520these%2520limitations%2520by%2520leveraging%2520video%2520codec%2520primitives%2520%2528specifically%2520motion%2520vectors%2520and%2520residuals%2529%2520which%2520natively%2520encode%2520video%2520redundancy%2520and%2520sparsity%2520without%2520requiring%2520expensive%2520full-image%2520encoding%2520for%2520most%2520frames.%2520To%2520this%2520end%252C%2520we%2520introduce%2520lightweight%2520transformer-based%2520encoders%2520that%2520aggregate%2520codec%2520primitives%2520and%2520align%2520their%2520representations%2520with%2520image%2520encoder%2520embe {"title": "osmAG-Nav: A Hierarchical Semantic Topometric Navigation Stack for Robust Lifelong Indoor Autonomy", "author": "Yongqi Zhang and Jiajie Zhang and Chengqian Li and Fujing Xie and S\u00f6ren Schwertfeger", "abstract": "The deployment of mobile robots in large-scale, multi-floor environments demands navigation systems that achieve spatial scalability without compromising local kinematic precision. Traditional navigation stacks, reliant on monolithic occupancy grid maps, face severe bottlenecks in storage efficiency, cross-floor reasoning, and long-horizon planning. To address these limitations, this paper presents osmAG-Nav, a complete, open-source ROS2 navigation stack built upon the hierarchical semantic topometric OpenStreetMap Area Graph (osmAG) map standard. The system follows a \"System of Systems\" architecture that decouples global topological reasoning from local metric execution. A Hierarchical osmAG planner replaces dense grid searches with an LCA-anchored pipeline on a passage-centric graph whose edge costs derive from local raster traversability rather than Euclidean distance, yielding low-millisecond planning on long campus-scale routes. A Rolling Window mechanism rasterizes a fixed-size local metric grid around the robot, keeping the local costmap memory footprint independent of the total mapped area, while a Segmented Execution strategy dispatches intermediate goals to standard ROS2 controllers for smooth handoffs. System robustness is reinforced by a structure-aware LiDAR localization framework that filters dynamic clutter against permanent architectural priors. Extensive experiments on a real-world multi-story indoor-outdoor campus (>11,025 m^2) show that, on the same-floor benchmark subset, osmAG-Nav delivers up to 7816x lower planning latency than a grid-based baseline on long routes while maintaining low path-length overhead and lifelong localization stability. A single-floor long-range robot mission further validates the integrated stack reliability. The full stack is released as modular ROS2 Lifecycle Nodes.", "link": "http://arxiv.org/abs/2603.28271v1", "date": "2026-03-30", "relevancy": 2.3063, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5804}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5749}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5712}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20osmAG-Nav%3A%20A%20Hierarchical%20Semantic%20Topometric%20Navigation%20Stack%20for%20Robust%20Lifelong%20Indoor%20Autonomy&body=Title%3A%20osmAG-Nav%3A%20A%20Hierarchical%20Semantic%20Topometric%20Navigation%20Stack%20for%20Robust%20Lifelong%20Indoor%20Autonomy%0AAuthor%3A%20Yongqi%20Zhang%20and%20Jiajie%20Zhang%20and%20Chengqian%20Li%20and%20Fujing%20Xie%20and%20S%C3%B6ren%20Schwertfeger%0AAbstract%3A%20The%20deployment%20of%20mobile%20robots%20in%20large-scale%2C%20multi-floor%20environments%20demands%20navigation%20systems%20that%20achieve%20spatial%20scalability%20without%20compromising%20local%20kinematic%20precision.%20Traditional%20navigation%20stacks%2C%20reliant%20on%20monolithic%20occupancy%20grid%20maps%2C%20face%20severe%20bottlenecks%20in%20storage%20efficiency%2C%20cross-floor%20reasoning%2C%20and%20long-horizon%20planning.%20To%20address%20these%20limitations%2C%20this%20paper%20presents%20osmAG-Nav%2C%20a%20complete%2C%20open-source%20ROS2%20navigation%20stack%20built%20upon%20the%20hierarchical%20semantic%20topometric%20OpenStreetMap%20Area%20Graph%20%28osmAG%29%20map%20standard.%20The%20system%20follows%20a%20%22System%20of%20Systems%22%20architecture%20that%20decouples%20global%20topological%20reasoning%20from%20local%20metric%20execution.%20A%20Hierarchical%20osmAG%20planner%20replaces%20dense%20grid%20searches%20with%20an%20LCA-anchored%20pipeline%20on%20a%20passage-centric%20graph%20whose%20edge%20costs%20derive%20from%20local%20raster%20traversability%20rather%20than%20Euclidean%20distance%2C%20yielding%20low-millisecond%20planning%20on%20long%20campus-scale%20routes.%20A%20Rolling%20Window%20mechanism%20rasterizes%20a%20fixed-size%20local%20metric%20grid%20around%20the%20robot%2C%20keeping%20the%20local%20costmap%20memory%20footprint%20independent%20of%20the%20total%20mapped%20area%2C%20while%20a%20Segmented%20Execution%20strategy%20dispatches%20intermediate%20goals%20to%20standard%20ROS2%20controllers%20for%20smooth%20handoffs.%20System%20robustness%20is%20reinforced%20by%20a%20structure-aware%20LiDAR%20localization%20framework%20that%20filters%20dynamic%20clutter%20against%20permanent%20architectural%20priors.%20Extensive%20experiments%20on%20a%20real-world%20multi-story%20indoor-outdoor%20campus%20%28%3E11%2C025%20m%5E2%29%20show%20that%2C%20on%20the%20same-floor%20benchmark%20subset%2C%20osmAG-Nav%20delivers%20up%20to%207816x%20lower%20planning%20latency%20than%20a%20grid-based%20baseline%20on%20long%20routes%20while%20maintaining%20low%20path-length%20overhead%20and%20lifelong%20localization%20stability.%20A%20single-floor%20long-range%20robot%20mission%20further%20validates%20the%20integrated%20stack%20reliability.%20The%20full%20stack%20is%20released%20as%20modular%20ROS2%20Lifecycle%20Nodes.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28271v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DosmAG-Nav%253A%2520A%2520Hierarchical%2520Semantic%2520Topometric%2520Navigation%2520Stack%2520for%2520Robust%2520Lifelong%2520Indoor%2520Autonomy%26entry.906535625%3DYongqi%2520Zhang%2520and%2520Jiajie%2520Zhang%2520and%2520Chengqian%2520Li%2520and%2520Fujing%252 ystem%2520robustness%2520is%2520reinforced%2520by%2520a%2520structure-aware%2520LiDAR%2520localization%2520framework%2520that%2520filters%2520dynamic%2520clutter%2520against%2520permanent%2520architectural%2520priors.%2520Extensive%2520experiments%2520on%2520a%2520real-world%2520multi-story%2520indoor-outdoor%2520campus%2520%2528%253E11%252C025%2520m%255E2%2529%2520show%2520that%252C%2520on%2520the%2520same-floor%2520benchmark%2520subset%252C%2520osmAG-Nav%2520delivers%2520up%2520to%25207816x%2520lower%2520planning%2520latency%2520than%2520a%2520grid-based%2520baseline%2520on%2520long%2520routes%2520while%2520maintaining%2520low%2520path-length%2520overhead%2520and%2520lifelong%2520localization%2520stability.%2520A%2520single-floor%2520long-range%2520robot%2520mission%2520further%2520validates%2520the%2520integrated%2520stack%2520reliability.%2520The%2520full%2520stack%2520is%2520released%2520as%2520modular%2520ROS2%2520Lifecycle%2520Nodes.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.28271v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=osmAG-Nav%3A%20A%20Hierarchical%20Semantic%20Topometric%20Navigation%20Stack%20for%20Robust%20Lifelong%20Indoor%20Autonomy&entry.906535625=Yongqi%20Zhang%20and%20Jiajie%20Zhang%20and%20Chengqian%20Li%20and%20Fujing%20Xie%20and%20S%C3%B6ren%20Schwertfeger&entry.1292438233=The%20deployment%20of%20mobile%20robots%20in%20large-scale%2C%20multi-floor%20environments%20demands%20navigation%20systems%20that%20achieve%20spatial%20scalability%20without%20compromising%20local%20kinematic%20precision.%20Traditional%20navigation%20stacks%2C%20reliant%20on%20monolithic%20occupancy%20grid%20maps%2C%20face%20severe%20bottlenecks%20in%20storage%20efficiency%2C%20cross-floor%20reasoning%2C%20and%20long-horizon%20planning.%20To%20address%20these%20limitations%2C%20this%20paper%20presents%20osmAG-Nav%2C%20a%20complete%2C%20open-source%20ROS2%20navigation%20stack%20built%20upon%20the%20hierarchical%20semantic%20topometric%20OpenStreetMap%20Area%20Graph%20%28osmAG%29%20map%20standard.%20The%20system%20follows%20a%20%22System%20of%20Systems%22%20architecture%20that%20decouples%20global%20topological%20reasoning%20from%20local%20metric%20execution.%20A%20Hierarchical%20osmAG%20planner%20replaces%20dense%20grid%20searches%20with%20an%20LCA-anchored%20pipeline%20on%20a%20passage-centric%20graph%20whose%20edge%20costs%20derive%20from%20local%20raster%20traversability%20rather%20than%20Euclidean%20distance%2C%20yielding%20low-millisecond%20planning%20on%20long%20campus-scale%20routes.%20A%20Rolling%20Window%20mechanism%20rasterizes%20a%20fixed-size%20local%20metric%20grid%20around%20the%20robot%2C%20keeping%20the%20local%20costmap%20memory%20footprint%20independent%20of%20the%20total%20mapped%20area%2C%20while%20a%20Segmented%20Execution%20strategy%20dispatches%20intermediate%20goals%20to%20standard%20ROS2%20controllers%20for%20smooth%20handoffs.%20System%20robustness%20is%20reinforced%20by%20a%20structure-aware%20LiDAR%20localization%20framework%20that%20filters%20dynamic%20clutter%20against%20permanent%20architectural%20priors.%20Extensive%20experiments%20on%20a%20real-world%20multi-story%20indoor-outdoor%20campus%20%28%3E11%2C025%20m%5E2%29%20show%20that%2C%20on%20the%20same-floor%20benchmark%20subset%2C%20osmAG-Nav%20delivers%20up%20to%207816x%20lower%20planning%20latency%20than%20a%20grid-based%20baseline%20on%20long%20routes%20while%20maintaining%20low%20path-length%20overhead%20and%20lifelong%20localization%20stability.%20A%20single-floor%20long-range%20robot%20mission%20further%20validates%20the%20integrated%20stack%20reliability.%20The%20full%20stack%20is%20released%20as%20modular%20ROS2%20Lifecycle%20Nodes.&entry.1838667208=http%3A//arxiv.org/abs/2603.28271v1&entry.124074799=Read"},
{"title": "AdaptToken: Entropy-based Adaptive Token Selection for MLLM Long Video Understanding", "author": "Haozhe Qi and Kevin Qu and Mahdi Rad and Rui Wang and Alexander Mathis and Marc Pollefeys", "abstract": "Long video understanding remains challenging for Multi-modal Large Language Models (MLLMs) due to high memory costs and context-length limits. Prior approaches mitigate this by scoring and selecting frames/tokens within short clips, but they lack a principled mechanism to (i) compare relevance across distant video clips and (ii) stop processing once sufficient evidence has been gathered. We propose AdaptToken, a training-free framework that turns an MLLM's self-uncertainty into a global control signal for long-video token selection. AdaptToken splits a video into groups, extracts cross-modal attention to rank tokens within each group, and uses the model's response entropy to estimate each group's prompt relevance. This entropy signal enables a global token budget allocation across groups and further supports early stopping (AdaptToken-Lite), skipping the remaining groups when the model becomes sufficiently certain. Across four long-video benchmarks (VideoMME, LongVideoBench, LVBench, and MLVU) and multiple base MLLMs (7B-72B), AdaptToken consistently improves accuracy (e.g., +6.7 on average over Qwen2.5-VL 7B) and continues to benefit from extremely long inputs (up to 10K frames), while AdaptToken-Lite reduces inference time by about half with comparable performance. Project page: https://haozheqi.github.io/adapt-token", "link": "http://arxiv.org/abs/2603.28696v1", "date": "2026-03-30", "relevancy": 2.295, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5958}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5704}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5683}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AdaptToken%3A%20Entropy-based%20Adaptive%20Token%20Selection%20for%20MLLM%20Long%20Video%20Understanding&body=Title%3A%20AdaptToken%3A%20Entropy-based%20Adaptive%20Token%20Selection%20for%20MLLM%20Long%20Video%20Understanding%0AAuthor%3A%20Haozhe%20Qi%20and%20Kevin%20Qu%20and%20Mahdi%20Rad%20and%20Rui%20Wang%20and%20Alexander%20Mathis%20and%20Marc%20Pollefeys%0AAbstract%3A%20Long%20video%20understanding%20remains%20challenging%20for%20Multi-modal%20Large%20Language%20Models%20%28MLLMs%29%20due%20to%20high%20memory%20costs%20and%20context-length%20limits.%20Prior%20approaches%20mitigate%20this%20by%20scoring%20and%20selecting%20frames/tokens%20within%20short%20clips%2C%20but%20they%20lack%20a%20principled%20mechanism%20to%20%28i%29%20compare%20relevance%20across%20distant%20video%20clips%20and%20%28ii%29%20stop%20processing%20once%20sufficient%20evidence%20has%20been%20gathered.%20We%20propose%20AdaptToken%2C%20a%20training-free%20framework%20that%20turns%20an%20MLLM%27s%20self-uncertainty%20into%20a%20global%20control%20signal%20for%20long-video%20token%20selection.%20AdaptToken%20splits%20a%20video%20into%20groups%2C%20extracts%20cross-modal%20attention%20to%20rank%20tokens%20within%20each%20group%2C%20and%20uses%20the%20model%27s%20response%20entropy%20to%20estimate%20each%20group%27s%20prompt%20relevance.%20This%20entropy%20signal%20enables%20a%20global%20token%20budget%20allocation%20across%20groups%20and%20further%20supports%20early%20stopping%20%28AdaptToken-Lite%29%2C%20skipping%20the%20remaining%20groups%20when%20the%20model%20becomes%20sufficiently%20certain.%20Across%20four%20long-video%20benchmarks%20%28VideoMME%2C%20LongVideoBench%2C%20LVBench%2C%20and%20MLVU%29%20and%20multiple%20base%20MLLMs%20%287B-72B%29%2C%20AdaptToken%20consistently%20improves%20accuracy%20%28e.g.%2C%20%2B6.7%20on%20average%20over%20Qwen2.5-VL%207B%29%20and%20continues%20to%20benefit%20from%20extremely%20long%20inputs%20%28up%20to%2010K%20frames%29%2C%20while%20AdaptToken-Lite%20reduces%20inference%20time%20by%20about%20half%20with%20comparable%20performance.%20Project%20page%3A%20https%3A//haozheqi.github.io/adapt-token%0ALink%3A%20http%3A//arxiv.org/abs/2603.28696v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAdaptToken%253A%2520Entropy-based%2520Adaptive%2520Token%2520Selection%2520for%2520MLLM%2520Long%2520Video%2520Understanding%26entry.906535625%3DHaozhe%2520Qi%2520and%2520Kevin%2520Qu%2520and%2520Mahdi%2520Rad%2520and%2520Rui%2520Wang%2520and%2520Alexander%2520Mathis%2520and%2520Marc%2520Pollefeys%26entry.1292438233%3DLong%2520video%2520understanding%2520remains%2520challenging%2520for%2520Multi-modal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520due%2520to%2520high%2520memory%2520costs%2520and%2520context-length%2520limits.%2520Prior%2520approaches%2520mitigate%2520this%2520by%2520scoring%2520and%2520selecting%2520frames/tokens%2520within%2520short%2520clips%252C%2520but%2520they%2520lack%2520a%2520principled%2520mechanism%2520to%2520%2528i%2529%2520compare%2520relevance%2520across%2520distant%2520video%2520clips%2520and%2520%2528ii%2529%2520stop%2520processing%2520once%2520sufficient%2520evidence%2520has%2520been%2520gathered.%2520We%2520propose%2520AdaptToken%252C%2520a%2520training-free%2520framework%2520that%2520turns%2520an%2520MLLM%2527s%2520self-uncertainty%2520into%2520a%2520global%2520control%2520signal%2520for%2520long-video%2520token%2520selection.%2520AdaptToken%2520splits%2520a%2520video%2520into%2520groups%252C%2520extracts%2520cross-modal%2520attention%2520to%2520rank%2520tokens%2520within%2520each%2520group%252C%2520and%2520uses%2520the%2520model%2527s%2520response%2520entropy%2520to%2520estimate%2520each%2520 idence%20has%20been%20gathered.%20We%20propose%20AdaptToken%2C%20a%20training-free%20framework%20that%20turns%20an%20MLLM%27s%20self-uncertainty%20into%20a%20global%20control%20signal%20for%20long-video%20token%20selection.%20AdaptToken%20splits%20a%20video%20into%20groups%2C%20extracts%20cross-modal%20attention%20to%20rank%20tokens%20within%20each%20group%2C%20and%20uses%20the%20model%27s%20response%20entropy%20to%20estimate%20each%20group%27s%20prompt%20relevance.%20This%20entropy%20signal%20enables%20a%20global%20token%20budget%20allocation%20across%20groups%20and%20further%20supports%20early%20stopping%20%28AdaptToken-Lite%29%2C%20skipping%20the%20remaining%20groups%20when%20the%20model%20becomes%20sufficiently%20certain.%20Across%20four%20long-video%20benchmarks%20%28VideoMME%2C%20LongVideoBench%2C%20LVBench%2C%20and%20MLVU%29%20and%20multiple%20base%20MLLMs%20%287B-72B%29%2C%20AdaptToken%20consistently%20improves%20accuracy%20%28e.g.%2C%20%2B6.7%20on%20average%20over%20Qwen2.5-VL%207B%29%20and%20continues%20to%20benefit%20from%20extremely%20long%20inputs%20%28up%20to%2010K%20frames%29%2C%20while%20AdaptToken-Lite%20reduces%20inference%20time%20by%20about%20half%20with%20comparable%20performance.%20Project%20page%3A%20https%3A//haozheqi.github.io/adapt-token&entry.1838667208=http%3A//arxiv.org/abs/2603.28696v1&entry.124074799=Read"},
{"title": "Tac2Real: Reliable and GPU Visuotactile Simulation for Online Reinforcement Learning and Zero-Shot Real-World Deployment", "author": "Ningyu Yan and Shuai Wang and Xing Shen and Hui Wang and Hanqing Wang and Yang Xiang and Jiangmiao Pang", "abstract": "Visuotactile sensors are indispensable for contact-rich robotic manipulation tasks. However, policy learning with tactile feedback in simulation, especially for online reinforcement learning (RL), remains a critical challenge, as it demands a delicate balance between physics fidelity and computational efficiency. To address this challenge, we present Tac2Real, a lightweight visuotactile simulation framework designed to enable efficient online RL training. Tac2Real integrates the Preconditioned Nonlinear Conjugate Gradient Incremental Potential Contact (PNCG-IPC) method with a multi-node, multi-GPU high-throughput parallel simulation architecture, which can generate marker displacement fields at interactive rates. Meanwhile, we propose a systematic approach, TacAlign, to narrow both structured and stochastic sources of domain gap, ensuring a reliable zero-shot sim-to-real transfer. We further evaluate Tac2Real on the contact-rich peg insertion task. The zero-shot transfer results achieve a high success rate in the real-world scenario, verifying the effectiveness and robustness of our framework. The project page is: https://ningyurichard.github.io/tac2real-project-page/", "link": "http://arxiv.org/abs/2603.28475v1", "date": "2026-03-30", "relevancy": 2.2922, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5935}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5783}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/24 {"title": "Universal Approximation Constraints of Narrow ResNets: The Tunnel Effect", "author": "Christian Kuehn and Sara-Viola Kuntz and Tobias W\u00f6hrer", "abstract": "We analyze the universal approximation constraints of narrow Residual Neural Networks (ResNets) both theoretically and numerically. For deep neural networks without input space augmentation, a central constraint is the inability to represent critical points of the input-output map. We prove that this has global consequences for target function approximations and show that the manifestation of this defect is typically a shift of the critical point to infinity, which we call the ``tunnel effect'' in the context of classification tasks. While ResNets offer greater expressivity than standard multilayer perceptrons (MLPs), their capability strongly depends on the signal ratio between the skip and residual channels. We establish quantitative approximation bounds for both the residual-dominant (close to MLP) and skip-dominant (close to neural ODE) regimes. These estimates depend explicitly on the channel ratio and uniform network weight bounds. Low-dimensional examples further provide a detailed analysis of the different ResNet regimes and how architecture-target incompatibility influences the approximation error.", "link": "http://arxiv.org/abs/2603.28591v1", "date": "2026-03-30", "relevancy": 2.2736, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4608}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.455}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4484}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Universal%20Approximation%20Constraints%20of%20Narrow%20R

.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Universal%20Approximation%20Constraints%20of%20Narrow%20ResNets%3A%20The%20Tunnel%20Effect&entry.906535625=Christian%20Kuehn%20and%20Sara-Viola%20Kuntz%20and%20Tobias%20W%C3%B6hrer&entry.1292438233=We%20analyze%20the%20universal%20approximation%20constraints%20of%20narrow%20Residual%20Neural%20Networks%20%28ResNets%29%20both%20theoretically%20and%20numerically.%20For%20deep%20neural%20networks%20without%20input%20space%20augmentation%2C%20a%20central%20constraint%20is%20the%20inability%20to%20represent%20critical%20points%20of%20the%20input-output%20map.%20We%20prove%20that%20this%20has%20global%20consequences%20for%20target%20function%20approximations%20and%20show%20that%20the%20manifestation%20of%20this%20defect%20is%20typically%20a%20shift%20of%20the%20critical%20point%20to%20infinity%2C%20which%20we%20call%20the%20%60%60tunnel%20effect%27%27%20in%20the%20context%20of%20classification%20tasks.%20While%20ResNets%20offer%20greater%20expressivity%20than%20standard%20multilayer%20perceptrons%20%28MLPs%29%2C%20their%20capability%20strongly%20depends%20on%20the%20signal%20ratio%20between%20the%20skip%20and%20residual%20channels.%20We%20establish%20quantitative%20approximation%20bounds%20for%20both%20the%20residual-dominant%20%28close%20to%20MLP%29%20and%20skip-dominant%20%28close%20to%20neural%20ODE%29%20regimes.%20These%20estimates%20depend%20explicitly%20on%20the%20channel%20ratio%20and%20uniform%20network%20weight%20bounds.%20Low-dimensional%20examples%20further%20provide%20a%20detailed%20analysis%20of%20the%20different%20ResNet%20regimes%20and%20how%20architecture-target%20incompatibility%20influences%20the%20approximation%20error.&entry.1838667208=http%3A//arxiv.org/abs/2603.28591v1&entry.124074799=Read"},
{"title": "AutoCut: End-to-end advertisement video editing based on multimodal discretization and controllable generation", "author": "Milton Zhou and Sizhong Qin and Yongzhi Li and Quan Chen and Peng Jiang", "abstract": "Short-form videos have become a primary medium for digital advertising, requiring scalable and efficient content creation. However, current workflows and AI tools remain disjoint and modality-specific, leading to high production costs and low overall efficiency. To address this issue, we propose AutoCut, an end-to-end advertisement video editing framework based on multimodal discretization and controllable editing. AutoCut employs dedicated encoders to extract video and audio features, then applies residual vector quantization to discretize them into unified tokens aligned with textual representations, constructing a shared video-audio-text token space. Built upon a foundation model, we further develop a multimodal large language model for video editing through combined multimodal alignment and supervised fine-tuning, supporting tasks covering video selection and ordering, script generation, and background music selection within a unified editing framework. Finally, a complete production pipeline converts the predicted token sequences into deployable long video outputs. Experiments on real-world advertisement datasets show that AutoCut reduces production cost and iteration time while substantially improving consistency and controllability, paving the way for scalable video creation.", "link": "http://arxiv.org/abs/2603.28366v1", "date": "2026-03-30", "relevancy": 2.2625, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6099}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5955}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5181}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AutoCut%3A%20End-to-end%20advertisement%20video%20editing%20based%20on%20multimodal%20discretization%20and%20controllable%20generation&body=Title%3A%20AutoCut%3A%20End-to-end%20advertisement%20video%20editing%20based%20on%20multimodal%20discretization%20and%20controllable%20generation%0AAuthor%3A%20Milton%20Zhou%20and%20Sizhong%20Qin%20and%20Yongzhi%20Li%20and%20Quan%20Chen%20and%20Peng%20Jiang%0AAbstract%3A%20Short-form%20videos%20have%20become%20a%20primary%20medium%20for%20digital%20advertising%2C%20requiring%20scalable%20and%20efficient%20content%20creation.%20However%2C%20current%20workflows%20and%20AI%20tools%20remain%20disjoint%20and%20modality-specific%2C%20leading%20to%20high%20production%20costs%20and%20low%20overall%20efficiency.%20To%20address%20this%20issue%2C%20we%20propose%20AutoCut%2C%20an%20end-to-end%20advertisement%20video%20editing%20framework%20based%20on%20multimodal%20discretization%20and%20controllable%20editing.%20AutoCut%20employs%20dedicated%20encoders%20to%20extract%20video%20and%20audio%20features%2C%20then%20applies%20residual%20vector%20quantization%20to%20discretize%20them%20into%20unified%20tokens%20aligned%20with%20textual%20representations%2C%20constructing%20a%20shared%20video-audio-text%20token%20space.%20Built%20upon%20a%20foundation%20model%2C%20we%20further%20develop%20a%20multimodal%20large%20language%20model%20for%20video%20editing%20through%20combined%20multimodal%20alignment%20and%20supervised%20fine-tuning%2C%20supporting%20tasks%20covering%20video%20selection%20and%20ordering%2C%20script%20generation%2C%20and%20background%20music%20selection%20within%20a%20unified%20editing%20framework.%20Finally%2C%20a%20complete%20production%20pipeline%20converts%20the%20predicted%20token%20sequences%20into%20deployable%20long%20video%20outputs.%20Experiments%20on%20real-world%20advertisement%20datasets%20show%20that%20AutoCut%20reduces%20production%20cost%20and%20iteration%20time%20while%20substantially%20improving%20consistency%20and%20controllability%2C%20paving%20the%20way%20for%20scalable%20video%20creation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28366v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAutoCut%253A%2520End-to-end%2520advertisement%2520video%2520editing%2520based%2520on%2520multimodal%2520discretization%2520and%2520controllable%2520generation%26entry.906535625%3DMilton%2520Zhou%2520and%2520Sizhong%2520Qin%2520and%2520Yongzhi%2520Li%2520and%2520Quan%2520Chen%2520and%2520Peng%2520Jiang%26entry.1292438233%3DShort-form%2520videos%2520have%2520become%2520a%2520primary%2520medium%2520for%2520digital%2520advertising%252C%2520requiring%2520scalable%2520and%2520efficient%2520content%2520creation.%2520However%252C%2520current%2520workflows%2520and%2520AI%2520tools%2520remain%2520disjoint%2520and%2520modality-specific%252C%2520leading%2520to%2520high%2520production%2520costs%2520and%2520low%2520overall%2520efficiency.%2520To%2520address%2520this%2520issue%252C%2520we%2520propose%2520AutoCut%252C%2520an%2520end-to-end%2520advertisement%2520video%2520editing%2520framework%2520based%2520on%2520multimodal%2520discretization%2520and%2520controllable%2520editing.%2520AutoCut%2520employs%2520dedicated%2520encoders%2520to%2520extract%2520video%2520and%2520audio%2520features%252C%2520then%2520applies%2520residual%2520vector%2520quantization%2520to%2520discretize%2520them%2520into%2520unified%2520tokens%2520aligned%2520with%2520textual%2520representations%252C%2520constructing%2520a%2520shared%2520video-audio-text%2520token%2520space.%2520Built%2520upon%2520a%2520foundation%2520model%252C%2520we%2520further%2520develop%2520a%2520multimodal%2520large%2520language%2520model%2520for%2520video%2520editing%2520through%2520combined%2520multimodal%2520alignment%2520and%2520supervised%2520fine-tuning%252C%2520supporting%2520tasks%2520covering%2520video%2520selection%2520and%2520ordering%252C%2520script%2520generation%252C%2520and%2520background%2520music%2520selection%2520within%2520a%2520unified%2520editing%2520framework.%2520Finally%252C%2520a%2520complete%2520production%2520pipeline%2520converts%2520the%2520predicted%2520token%2520sequences%2520into%2520deployable%2520long%2520video%2520outputs.%2520Experiments%2520on%2520real-world%2520advertisement%2520datasets%2520show%2520that%2520AutoCut%2520reduces%2520production%2520cost%2520and%2520iteration%2520time%2520while%2520substantially%2520improving%2520consistency%2520and%2520controllability%252C%2520paving%2520the%2520way%2520for%2520scalable%2520video%2520creation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.28366v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=AutoCut%3A%20End-to-end%20advertisement%20video%20editing%20based%20on%20multimodal%20discretization%20and%20controllable%20generation&entry.906535625=Milton%20Zhou%20and%20Sizhong%20Qin%20and%20Yongzhi%20Li%20and%20Quan%20Chen%20and%20Peng%20Jiang&entry.1292438233=Short-form%20videos%20have%20become%20a%20primary%20medium%20for%20digital%20advertising%2C%20requiring%20scalable%20and%20efficient%20content%20creation.%20However%2C%20current%20workflows%20and%20AI%20tools%20remain%20disjoint%20and%20modality-specific%2C%20leading%20to%20high%20production%20costs%20and%20low%20overall%20efficiency.%20To%20address%20this%20issue%2C%20we%20propose%20AutoCut%2C%20an%20end-to-end%20advertisement%20video%20editing%20framework%20based%20on%20multimodal%20discretization%20and%20controllable%20editing.%20AutoCut%20employs%20dedicated%20encoders%20to%20extract%20video%20and%20audio%20features%2C%20then%20applies%20residual%20vector%20quantization%20to%20discretize%20them%20into%20unified%20tokens%20aligned%20with%20textual%20representations%2C%20constructing%20a%20shared%20video-audio-text%20token%20space.%20Built%20upon%20a%20foundation%20model%2C%20we%20further%20develop%20a%20multimodal%20large%20language%20model%20for%20video%20editing%20through%20combined%20multimodal%20alignment%20and%20supervised%20fine-tuning%2C%20supporting%20tasks%20covering%20video%20selection%20and%20ordering%2C%20script%20generation%2C%20and%20background%20music%20selection%20within%20a%20unified%20editing%20framework.%20Finally%2C%20a%20complete%20production%20pipeline%20converts%20the%20predicted%20token%20sequences%20into%20deployable%20long%20video%20outputs.%20Experiments%20on%20real-world%20advertisement%20datasets%20show%20that%20AutoCut%20reduces%20production%20cost%20and%20iteration%20time%20while%20substantially%20improving%20consistency%20and%20controllability%2C%20paving%20the%20way%20for%20scalable%20video%20creation.&entry.1838667208=http%3A//arxiv.org/abs/2603.28366v1&entry.124074799=Read"},
{"title": "MR-ImagenTime: Multi-Resolution Time Series Generation through Dual Image Representations", "author": "Xianyong Xu and Yuanjun Zuo and Zhihong Huang and Yihan Qin and Haoxian Xu and Leilei Du and Haotian Wang", "abstract": "Time series forecasting is vital across many domains, yet existing models struggle with fixed-length inputs and inadequate multi-scale modeling. We propose MR-CDM, a framework combining hierarchical multi-resolution trend decomposition, an adaptive embedding mechanism for variable-length inputs, and a multi-scale conditional diffusion process. Evaluations on four real-world datasets demonstrate that MR-CDM significantly outperforms state-of-the-art baselines (e.g., CSDI, Informer), reducing MAE and RMSE by approximately 6-10 to a certain degree.", "link": "http://arxiv.org/abs/2603.28253v1", "date": "2026-03-30", "relevancy": 2.2592, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5998}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5578}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5578}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MR-ImagenTime%3A%20Multi-Resolution%20Time%20Series%20Generation%20through%20Dual%20Image%20Representations&body=Title%3A%20MR-ImagenTime%3A%20Multi-Resolution%20Time%20Series%20Generation%20through%20Dual%20Image%20Representations%0AAuthor%3A%20Xianyong%20Xu%20and%20Yuanjun%20Zuo%20and%20Zhihong%20Huang%20and%20Yihan%20Qin%20and%20Haoxian%20Xu%20and%20Leilei%20Du%20and%20Haotian%20Wang%0AAbstract%3A%20Time%20series%20forecasting%20is%20vital%20across%20many%20domains%2C%20yet%20existing%20models%20struggle%20with%20fixed-length%20inputs%20and%20inadequate%20multi-scale%20modeling.%20We%20propose%20MR-CDM%2C%20a%20framework%20combining%20hierarchical%20multi-resolution%20trend%20decomposition%2C%20an%20adaptive%20embedding%20mechanism%20for%20variable-length%20inputs%2C%20and%20a%20multi-scale%20conditional%20diffusion%20process.%20Evaluations%20on%20four%20real-world%20datasets%20demonstrate%20that%20MR-CDM%20significantly%20outperforms%20state-of-the-art%20baselines%20%28e.g.%2C%20CSDI%2C%20Informer%29%2C%20reducing%20MAE%20and%20RMSE%20by%20approximately%206-10%20to%20a%20certain%20degree.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28253v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMR-ImagenTime%253A%2520Multi-Resolution%2520Time%2520Series%2520Generation%2520through%2520Dual%2520Image%2520Representations%26entry.906535625%3DXianyong%2520Xu%2520and%2520Yuanjun%2520Zuo%2520and%2520Zhihong%2520Huang%2520and%2520Yihan%2520Qin%2520and%2520Haoxian%2520Xu%2520and%2520Leilei%2520Du%2520and%2520Haotian%2520Wang%26entry.1292438233%3DTime%2520series%2520forecasting%2520is%2520vital%2520across%2520many%2520domains%252C%2520yet%2520existing%2520models%2520struggle%2520with%2520fixed-length%2520inputs%2520and%2520inadequate%2520multi-scale%2520modeling.%2520We%2520propose%2520MR-CDM%252C%2520a%2520framework%2520combining%2520hierarchical%2520multi-resolution%2520trend%2520decomposition%252C%2520an%2520adaptive%2520embedding%2520mechanism%2520for%2520variable-length%2520inputs%252C%2520and%2520a%2520multi-scale%2520conditional%2520diffusion%2520process.%2520Evaluations%2520on%2520four%2520real-world%2520datasets%2520demonstrate%2520that%2520MR-CDM%2520significantly%2520outperforms%2520state-of-the-art%2520baselines%2520%2528e.g.%252C%2520CSDI%252C%2520Informer%2529%252C%2520reducing%2520MAE%2520and%2520RMSE%2520by%2520approximately%25206-10%2520to%2520a%2520certain%2520degree.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.28253v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MR-ImagenTime%3A%20Multi-Resolution%20Time%20Series%20Generation%20through%20Dual%20Image%20Representations&entry.906535625=Xianyong%20Xu%20and%20Yuanjun%20Zuo%20and%20Zhihong%20Huang%20and%20Yihan%20Qin%20and%20Haoxian%20Xu%20and%20Leilei%20Du%20and%20Haotian%20Wang&entry.1292438233=Time%20series%20forecasting%20is%20vital%20across%20many%20domains%2C%20yet%20existing%20models%20struggle%20with%20fixed-length%20inputs%20and%20inadequate%20multi-scale%20modeling.%20We%20propose%20MR-CDM%2C%20a%20framework%20combining%20hierarchical%20multi-resolution%20trend%20decomposition%2C%20an%20adaptive%20embedding%20mechanism%20for%20variable-length%20inputs%2C%20and%20a%20multi-scale%20conditional%20diffusion%20process.%20Evaluations%20on%20four%20real-world%20datasets%20demonstrate%20that%20MR-CDM%20significantly%20outperforms%20state-of-the-art%20baselines%20%28e.g.%2C%20CSDI%2C%20Informer%29%2C%20reducing%20MAE%20and%20RMSE%20by%20approximately%206-10%20to%20a%20certain%20degree.&entry.1838667208=http%3A//arxiv.org/abs/2603.28253v1&entry.124074799=Read"},
{"title": "Unleashing the Potential of Mamba: Boosting a LiDAR 3D Sparse Detector by Using Cross-Model Knowledge Distillation", "author": "Rui Yu and Runkai Zhao and Jiagen Li and Qingsong Zhao and HuaiCheng Yan and Meng Wang", "abstract": "The LiDAR 3D object detector that strikes a balance between accuracy and speed is crucial for achieving real-time perception in autonomous driving. However, many existing LiDAR detection models depend on complex feature transformations, leading to poor real-time performance and high resource consumption, which limits their practical effectiveness. In this work, we propose a faster LiDAR 3D object detector, a framework that adaptively aligns sparse voxels to enable efficient heterogeneous knowledge distillation, called FASD. We aim to distill the Transformer sequence modeling capability into Mamba models, significantly boosting accuracy through knowledge transfer. Specifically, we first design the architecture for cross-model knowledge distillation to impart the global contextual understanding capabilities of the Transformer to Mamba. Transformer-based teacher model employ a scale-adaptive attention mechanism to enhance multiscale fusion. In contrast, Mamba-based student model leverages feature alignment through spatial-based adapters, supervised with latent space feature and span-head distillation losses, leading to improved performance and efficiency. We evaluated the FASD on the Waymo and nuScenes datasets, achieving a 4x reduction in resource consumption and a 1-2% performance improvement over the baseline, while also delivering significant gains in accuracy and efficiency in real deployment.", "link": "http://arxiv.org/abs/2409.11018v2", "date": "2026-03-30", "relevancy": 2.2557, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5684}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5612}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5606}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unleashing%20the%20Potential%20of%20Mamba%3A%20Boosting%20a%20LiDAR%203D%20Sparse%20Detector%20by%20Using%20Cross-Model%20Knowledge%20Distillation&body=Title%3A%20Unleashing%20the%20Potential%20of%20Mamba%3A%20Boosting%20a%20LiDAR%203D%20Sparse%20Detector%20by%20Using%20Cross-Model%20Knowledge%20Distillation%0AAuthor%3A%20Rui%20Yu%20and%20Runkai%20Zhao%20and%20Jiagen%20Li%20and%20Qingsong%20Zhao%20and%20HuaiCheng%20Yan%20and%20Meng%20Wang%0AAbstract%3A%20The%20LiDAR%203D%20object%20detector%20that%20strikes%20a%20balance%20between%20accuracy%20and%20speed%20is%20crucial%20for%20achieving%20real-time%20perception%20in%20autonomous%20driving.%20However%2C%20many%20existing%20LiDAR%20detection%20models%20depend%20on%20complex%20feature%20transformations%2C%20leading%20to%20poor%20real-time%20performance%20and%20high%20resource%20consumption%2C%20which%20limits%20their%20practical%20effectiveness.%20In%20this%20work%2C%20we%20propose%20a%20faster%20LiDAR%203D%20object%20detector%2C%20a%20framework%20that%20adaptively%20aligns%20sparse%20voxels%20to%20enable%20efficient%20heterogeneous%20knowledge%20distillation%2C%20called%20FASD.%20We%20aim%20to%20distill%20the%20Transformer%20sequence%20modeling%20capability%20into%20Mamba%20models%2C%20significantly%20boosting%20accuracy%20through%20knowledge%20transfer.%20Specifically%2C%20we%20first%20design%20the%20architecture%20for%20cross-model%20knowledge%20distillation%20to%20impart%20the%20global%20contextual%20understanding%20capabilities%20of%20the%20Transformer%20to%20Mamba.%20Transformer-based%20teacher%20model%20employ%20a%20scale-adaptive%20attention%20mechanism%20to%20enhance%20multiscale%20fusion.%20In%20contrast%2C%20Mamba-based%20student%20model%20leverages%20feature%20alignment%20through%20spatial-based%20adapters%2C%20supervised%20with%20latent%20space%20feature%20and%20span-head%20distillation%20losses%2C%20leading%20to%20improved%20performance%20and%20efficiency.%20We%20evaluated%20the%20FASD%20on%20the%20Waymo%20and%20nuScenes%20datasets%2C%20achieving%20a%204x%20reduction%20in%20resource%20consumption%20and%20a%201-2%25%20performance%20improvement%20over%20the%20baseline%2C%20while%20also%20delivering%20significant%20gains%20in%20accuracy%20and%20efficiency%20in%20real%20deployment.%0ALink%3A%20http%3A//arxiv.org/abs/2409.11018v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnleashing%2520the%2520Potential%2520of%2520Mamba%253A%2520Boosting%2520a%2520LiDAR%25203D%2520Sparse%2520Detector%2520by%2520Using%2520Cross-Model%2520Knowledge%2520Distillation%26entry.906535625%3DRui%2520Yu%2520and%2520Runkai%2520Zhao%2520and%2520Jiagen%2520Li%2520and%2520Qingsong%2520Zhao%2520and%2520HuaiCheng%2520Yan%2520and%2520Meng%2520Wang%26entry.1292438233%3DThe%2520LiDAR%25203D%2520object%2520detector%2520that%2520strikes%2520a%2520balance%2520between%2520accuracy%2520and%2520speed%2520is%2520crucial%2520for%2520achieving%2520real-time%2520perception%2520in%2520autonomous%2520driving.%2520However%252C%2520many%2520existing%2520LiDAR%2520detection%2520models%2520depend%2520on%2520complex%2520feature%2520transformations%252C%2520leading%2520to%2520poor%2520real-time%2520performance%2520and%2520high%2520resource%2520consumption%252C%2520which%2520limits%2520their%2520practical%2520effectiveness.%2520In%2520this%2520work%252C%2520we%2520propose%2520a%2520faster%2520LiDAR%25203D%2520object%2520detector%252C%2520a%2520framework%2520that%2520adaptively%2520aligns%2520sparse%2520voxels%2520to%2520enable%2520efficient%2520heterogeneous%2520knowledge%2520distillation%252C%2520called%2520FAS {"title": "Categorical Perception in Large Language Model Hidden States: Structural Warping at Digit-Count Boundaries", "author": "Jon-Paul Cacioli", "abstract": "Categorical perception (CP) -- enhanced discriminability at category boundaries -- is among the most studied phenomena in perceptual psychology. This paper reports that analogous geometric warping occurs in the hidden-state representations of large language models (LLMs) processing Arabic numerals. Using representational similarity analysis across six models from five architecture families, the study finds that a CP-additive model (log-distance plus a boundary boost) fits the representational geometry better than a purely continuous model at 100% of primary layers in every model tested. The effect is specific to structurally defined boundaries (digit-count transitions at 10 and 100), absent at non-boundary control positions, and absent in the temperature domain where linguistic categories (hot/cold) lack a tokenisation discontinuity. Two qualitatively distinct signatures emerge: \"classic CP\" (Gemma, Qwen), where models both categorise explicitly and show geometric warping, and \"structural CP\" (Llama, Mistral, Phi), where geometry warps at the boundary but models cannot report the category distinction. This dissociation is stable across boundaries and is a property of the architecture, not the stimulus. Structural input-format discontinuities are sufficient to produce categorical perception geometry in LLMs, independently of explicit semantic category knowledge.", "link": "http://arxiv.org/abs/2603.28258v1", "date": "2026-03-30", "relevancy": 2.2545, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4538}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4538}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4451}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Categorical%20Perception%20in%20Large%20Language%20Model%20Hidden%20States%3A%20Structural%20Warping%20at%20Digit-Count%20Boundaries&body=Title%3A%20Categorical%20Perception%20in%20Large%20Language%20Model%20Hidden%20States%3A%20Structural%20Warping%20at%20Digit-Count%20Boundaries%0AAuthor%3A%20Jon-Paul%20Cacioli%0AAbstract%3A%20Categorical%20perception%20%28CP%29%20--%20enhanced%20discriminability%20at%20category%20boundaries%20--%20is%20among%20the%20most%20studied%20phenomena%20in%20perceptual%20psychology.%20This%20paper%20reports%20that%20analogous%20geometric%20warping%20occurs%20in%20the%20hidden-state%20representations%20of%20large%20language%20models%20%28LLMs%29%20processing%20Arabic%20numerals.%20Using%20representational%20similarity%20analysis%20across%20six%20models%20from%20five%20architecture%20families%2C%20the%20study%20finds%20that%20a%20CP-additive%20model%20%28log-distance%20plus%20a%20boundary%20boost%29%20fits%20the%20representational%20geometry%20better%20than%20a%20purely%20continuous%20model%20at%20100%25%20of%20primary%20layers%20in%20every%20model%20tested.%20The%20effect%20is%20specific%20to%20structurally%20defined%20boundaries%20%28digit-count%20transitions%20at%2010%20and%20100%29%2C%20absent%20at%20non-boundary%20control%20positions%2C%20and%20absent%20in%20the%20temperature%20domain%20where%20linguistic%20categories%20%28hot/cold%29%20lack%20a%20tokenisation%20discontinuity.%20Two%20qualitatively%20distinct%20signatures%20emerge%3A%20%22classic%20CP%22%20%28Gemma%2C%20Qwen%29%2C%20where%20models%20both%20categorise%20explicitly%20and%20show%20geometric%20warping%2C%20and%20%22structural%20CP%22%20%28Llama%2C%20Mistral%2C%20Phi%29%2C%20where%20geometry%20warps%20at%20the%20boundary%20but%20models%20cannot%20report%20the%20category%20distinction.%2 {"title": "Remedying uncertainty representations in visual inference through Explaining-Away Variational Autoencoders", "author": "Josefina Catoni and Domonkos Martos and Ferenc Csikor and Enzo Ferrante and Diego H. Milone and Bal\u00e1zs Mesz\u00e9na and Gerg\u0151 Orb\u00e1n and Rodrigo Echeveste", "abstract": "Optimal computations under uncertainty require an adequate probabilistic representation about beliefs. Deep generative models, and specifically Variational Autoencoders (VAEs), have the potential to meet this demand by building latent representations that learn to associate uncertainties with inferences while avoiding their characteristic intractable computations. Yet, we show that it is precisely uncertainty representation that suffers from inconsistencies under an array of relevant computer vision conditions: contrast-dependent computations, image corruption, out-of-distribution detection. Drawing inspiration from classical computer vision, we present a principled extension to the standard VAE by introducing a simple yet powerful inductive bias through a global scaling latent variable, which we call the Explaining-Away VAE (EA-VAE). By applying EA-VAEs to a spectrum of computer vision domains and a variety of datasets, spanning standard NIST datasets to rich medical and natural image sets, we show the EA-VAE restores normative requirements for uncertainty. Furthermore, we provide an analytical underpinning of the contribution of the introduced scaling latent to contrast-related and out-of-distribution related modulations of uncertainty, demonstrating that this mild inductive bias has stark benefits in a broad set of problems. Moreover, we find that EA-VAEs recruit divisive normalization, a motif widespread in biological neural networks, to remedy defective inference. Our results demonstrate that an easily implemented, still powerful update to the VAE architecture can remedy defective inference of uncertainty in probabilistic computations.", "link": "http://arxiv.org/abs/2404.15390v3", "date": "2026-03-30", "relevancy": 2.2518, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5957}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5663}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5288}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Remedying%20uncertainty%20representations%20in%20visual%20inference%20through%20Explaining-Away%20Variational%20Autoencoders&body=Title%3A%20Remedying%20uncertainty%20representations%20in%20visual%20inference%20through%20Explaining-Away%20Variational%20Autoencoders%0AAuthor%3A%20Josefina%20Catoni%20and%20Domonkos%20Martos%20and%20Ferenc%20Csikor%20and%20Enzo%20Ferrante%20and%20Diego%20H.%20Milone%20and%20Bal%C3%A1zs%20Mesz%C3%A9na%20and%20Gerg%C5%91%20Orb%C3%A1n%20and%20Rodrigo%20Echeveste%0AAbstract%3A%20Optimal%20computations%20under%20uncertainty%20require%20an%20adequate%20probabilistic%20representation%20about%20beliefs.%20Deep%20generative%20models%2C%20and%20specifically%20Variational%20Autoencoders%20%28VAEs%29%2C%20have%20the%20potential%20to%20meet%20this%20demand%20by%20building%20latent%20representations%20that%20learn%20to%20associate%20uncertainties%20with%20inferences%20while%20avoiding%20their%20characteristic%20intractable%20computations.%20Yet%2C%20we%20show%20that%20it%20is%20precisely%20uncertainty%20representation%20that%20suffers%20from%20inconsistencies%20under%20an%20array%20of%20relevant%20computer%20vision%20conditions%3A%20contrast-dependent%20computations%2C%20image%20corruption%2C%20out-of-distribution%20detection.%20Drawing%20inspiration%20from%20classical%20computer%20vision%2C%20we%20present%20a%20principled%20extension%20to%20the%20standard%20VAE%20by%20introducing%20a%20simple%20yet%20powerful%20inductive%20bias%20through%20a%20global%20scaling%20latent%20variable%2C%20which%20we%20call%20the%20Explaining-Away%20VAE%20%28EA-VAE%29.%20By%20applying%20EA-VAEs%20to%20a%20spectrum%20of%20computer%20vision%20domains%20and%20a%20variety%20of%20datasets%2C%20spanning%20standard%20NIST%20datasets%20to%20rich%20medical%20and%20natural%20image%20sets%2C%20we%20show%20the%20EA-VAE%20restores%20normative%20requirements%20for%20uncertainty.%20Furthermore%2C%20we%20provide%20an%20analytical%20underpinning%20of%20the%20contribution%20of%20the%20introduced%20scaling%20latent%20to%20contrast-related%20and%20out-of-distribution%20related%20modulations%20of%20uncertainty%2C%20demonstrating%20that%20this%20mild%20inductive%20bias%20has%20stark%20benefits%20in%20a%20broad%20set%20of%20problems.%20Moreover%2C%20we%20find%20that%20EA-VAEs%20recruit%20divisive%20normalization%2C%20a%20motif%20widespread%20in%20biological%20neural%20networks%2C%20to%20remedy%20defective%20inference.%20Our%20results%20demonstrate%20that%20an%20easily%20implemented%2C%20still%20powerful%20update%20to%20the%20VAE%20architecture%20can%20remedy%20defective%20inference%20of%20uncertainty%20in%20probabilistic%20computations.%0ALink%3A%20http%3A//arxiv.org/abs/2404.15390v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRemedying%2520uncertainty%2520representations%2520in%2520visual%2520inference%2520through%2520Explaining-Away%2520Variational%2520Autoencoders%26entry.906535625%3DJosefina%2520Catoni%2520and%2520Domonkos%2520Martos%2520and%2520Ferenc%2520Csikor%2520and%2520Enzo%2520Ferrante%2520and%2520Diego%2520H.%2520Milone%2520and%2520Bal%25C3%25A1zs%2520Mesz%25C3%25A9na%2520and%2520Gerg%25C5%2591%2520Orb%25C {"title": "Tele-Catch: Adaptive Teleoperation for Dexterous Dynamic 3D Object Catching", "author": "Weiguang Zhao and Junting Dong and Rui Zhang and Kailin Li and Qin Zhao and Kaizhu Huang", "abstract": "Teleoperation is a key paradigm for transferring human dexterity to robots, yet most prior work targets objects that are initially static, such as grasping or manipulation. Dynamic object catch, where objects move before contact, remains underexplored. Pure teleoperation in this task often fails due to timing, pose, and force errors, highlighting the need for shared autonomy that combines human input with autonomous policies. To this end, we present Tele-Catch, a systematic framework for dexterous hand teleoperation in dynamic object catching. At its core, we design DAIM, a dynamics-aware adaptive integration mechanism that realizes shared autonomy by fusing glove-based teleoperation signals into the diffusion policy denoising process. It adaptively modulates control based on the interaction object state. To improve policy robustness, we introduce DP-U3R, which integrates unsupervised geometric representations from point cloud observations into diffusion policy learning, enabling geometry-aware decision making. Extensive experiments demonstrate that Tele-Catch significantly improves accuracy and robustness in dynamic catching tasks, while also exhibiting consistent gains across distinct dexterous hand embodiments and previously unseen object categories.", "link": "http://arxiv.org/abs/2603.28427v1", "date": "2026-03-30", "relevancy": 2.2412, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.585}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5448}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5374}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Tele-Catch%3A%20Adaptive%20Teleoperation%20for%20Dexterous%20Dynamic%203D%20Object%20Catching&body=Title%3A%20Tele-Catch%3A%20Adaptive%20Teleoperation%20for%20Dexterous%20Dynamic%203D%20Object%20Catching%0AAuthor%3A%20Weiguang%20Zhao%20and%20Junting%20Dong%20and%20Rui%20Zhang%20and%20Kailin%20Li%20and%20Qin%20Zhao%20and%20Kaizhu%20Huang%0AAbstract%3A%20Teleoperation%20is%20a%20key%20paradigm%20for%20transferring%20human%20dexterity%20to%20robots%2C%20yet%20most%20prior%20work%20targets%20objects%20that%20are%20initially%20static%2C%20such%20as%20grasping%20or%20manipulation.%20Dynamic%20object%20catch%2C%20where%20objects%20move%20before%20contact%2C%20remains%20underexplored.%20Pure%20teleoperation%20in%20this%20task%20often%20fails%20due%20to%20timing%2C%20pose%2C%20and%20force%20errors%2C%20highlighting%20the%20need%20for%20shared%20autonomy%20that%20combines%20human%20input%20with%20autonomous%20policies.%20To%20this%20end%2C%20we%20present%20Tele-Catch%2C%20a%20systematic%20framework%20for%20dexterous%20hand%20teleoperation%20in%20dynamic%20object%20catching.%20At%20its%20core%2C%20we%20design%20DAIM%2C%20a%20dynamics-aware%20adaptive%20integration%20mechanism%20that%20realizes%20shared%20autonomy%20by%20fusing%20glove-based%20teleoperation%20signals%20into%20the%20diffusion%20policy%20denoising%20process.%20It%20adaptively%20modulates%20control%20based%20on%20the%20interaction%20object%20state.%20To%20improve%20policy%20robustness%2C%20we%20introduce%20DP-U3R%2C%20which%20integrates%20unsupervised%20geometric%20representations%20from%20point%20cloud%20observations%20into%20diffusion%20policy%20learning%2C%20enabling%20geometry-aware%20decision%20making.%20Extensive%20experiments%20demonstrate%20that%20Tele-Catch%20significantly%20improves%20accuracy%20and%20robustness%20in%20dynamic%20catching%20tasks%2C%20while%20also%20exhibiting%20consistent%20gains%20across%20distinct%20dexterous%20hand%20embodiments%20and%20previously%20unseen%20object%20categories.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28427v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTele-Catch%253A%2520Adaptive%2520Teleoperation%2520for%2520Dexterous%2520Dynamic%25203D%2520Object%2520Catching%26entry.906535625%3DWeiguang%2520Zhao%2520and%2520Junting%2520Dong%2520and%2520Rui%2520Zhang%2520and%2520Kailin%2520Li%2520and%2520Qin%2520Zhao%2520and%2520Kaizhu%2520Huang%26entry.1292438233%3DTeleoperation%2520is%2520a%2520key%2520paradigm%2520for%2520transferring%2520human%2520dexterity%2520to%2520robots%252C%2520yet%2520most%2520prior%2520work%2520targets%2520objects%2520that%2520are%2520initially%2520static%252C%2520such%2520as%2520grasping%2520or%2520manipulation.%2520Dynamic%2520object%2520catch%252C%2520where%2520objects%2520move%2520before%2520contact%252C%2520remains%2520underexplored.%2520Pure%2520teleoperation%2520in%2520this%2520task%2520often%2520fails%2520due%2520to%2520timing%252C%2520pose%252C%2520and%2520force%2520errors%252C%2520highlighting%2520the%2520need%2520for%2520shared%2520autonomy%2520that%2520combines%2520human%2520input%2520with%2520autonomous%2520policies.%2520To%2520this%2520end%252C%2520we%2520present%2520Tele-Catch%252C%2520a%2520systematic%2520framework%2520for%2520dexterous%2520hand%2520teleoperation%2520in%2520dynamic%2520object%2520catching.%2520At%2520its%2520core%252C%2520we%2520design%2520DAIM%252C%2520a%2520dynamics-aware%2520adaptive%2520integration%2520mechanism%2520that%2520realizes%2520shared%2520autonomy%2520by%2520fusing%2520glove-based%2520teleoperation%2520signals%2520into%2520the%2520diffusion%2520policy%2520denoising%2520process.%2520It%2520adaptively%2520modulates%2520control%2520based%2520on%2520the%2520interaction%2520object%2520state.%2520To%2520improve%2520policy%2520robustness%252C%2520we%2520introduce%2520DP-U3R%252C%2520which%2520integrates%2520unsupervised%2520geometric%2520representations%2520from%2520point%2520cloud%2520observations%2520into%2520diffusion%2520policy%2520learning%252C%2520enabling%2520geometry-aware%2520decision%2520making.%2520Extensive%2520experiments%2520demonstrate%2520that%2520Tele-Catch%2520significantly%2520improves%2520accuracy%2520and%2520robustness%2520in%2520dynamic%2520catching%2520tasks%252C%2520while%2520also%2520exhibiting%2520consistent%2520gains%2520across%2520distinct%2520dexterous%2520hand%2520embodiments%2520and%2520previously%2520unseen%2520object%2520categories.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.28427v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Tele-Catch%3A%20Adaptive%20Teleoperation%20for%20Dexterous%20Dynamic%203D%20Object%20Catching&entry.906535625=Weiguang%20Zhao%20and%20Junting%20Dong%20and%20Rui%20Zhang%20and%20Kailin%20Li%20and%20Qin%20Zhao%20and%20Kaizhu%20Huang&entry.1292438233=Teleoperation%20is%20a%20key%20paradigm%20for%20transferring%20human%20dexterity%20to%20robots%2C%20yet%20most%20prior%20work%20targets%20objects%20that%20are%20initially%20static%2C%20such%20as%20grasping%20or%20manipulation.%20Dynamic%20object%20catch%2C%20where%20objects%20move%20before%20contact%2C%20remains%20underexplored.%20Pure%20teleoperation%20in%20this%20task%20often%20fails%20due%20to%20timing%2C%20pose%2C%20and%20force%20errors%2C%20highlighting%20the%20need%20for%20shared%20autonomy%20that%20combines%20human%20input%20with%20autonomous%20policies.%20To%20this%20end%2C%20we%20present%20Tele-Catch%2C%20a%20systematic%20framework%20for%20dexterous%20hand%20teleoperation%20in%20dynamic%20object%20catching.%20At%20its%20core%2C%20we%20design%20DAIM%2C%20a%20dynamics-aware%20adaptive%20integration%20mechanism%20that%20realizes%20shared%20autonomy%20by%20fusing%20glove-based%20teleoperation%20signals%20into%20the%20diffusion%20policy%20denoising%20process.%20It%20adaptively%20modulates%20cont {"title": "LIBERO-Para: A Diagnostic Benchmark and Metrics for Paraphrase Robustness in VLA Models", "author": "Chanyoung Kim and Minwoo Kim and Minseok Kang and Hyunwoo Kim and Dahuin Jung", "abstract": "Vision-Language-Action (VLA) models achieve strong performance in robotic manipulation by leveraging pre-trained vision-language backbones. However, in downstream robotic settings, they are typically fine-tuned with limited data, leading to overfitting to specific instruction formulations and leaving robustness to paraphrased instructions underexplored. To study this gap, we introduce LIBERO-Para, a controlled benchmark that independently varies action expressions and object references for fine-grained analysis of linguistic generalization. Across seven VLA configurations (0.6B-7.5B), we observe consistent performance degradation of 22-52 pp under paraphrasing. This degradation is primarily driven by object-level lexical variation: even simple synonym substitutions cause large drops, indicating reliance on surface-level matching rather than semantic grounding. Moreover, 80-96% of failures arise from planning-level trajectory divergence rather than execution errors, showing that paraphrasing disrupts task identification. Binary success rate treats all paraphrases equally, obscuring whether models perform consistently across difficulty levels or rely on easier cases. To address this, we propose PRIDE, a metric that quantifies paraphrase difficulty using semantic and syntactic factors. Our benchmark and corresponding code are available at: https://github.com/cau-hai-lab/LIBERO-Para", "link": "http://arxiv.org/abs/2603.28301v1", "date": "2026-03-30", "relevancy": 2.2324, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5628}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5628}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5349}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LIBERO-Para%3A%20A%20Diagnostic%20Benchmark%20and%20Metrics%20for%20Paraphrase%20Robustness%20in%20VLA%20Models&body=Title%3A%20LIBERO-Para%3A%20A%20Diagnostic%20Benchmark%20and%20Metrics%20for%20Paraphrase%20Robustness%20in%20VLA%20Models%0AAuthor%3A%20Chanyoung%20Kim%20and%20Minwoo%20Kim%20and%20Minseok%20Kang%20and%20Hyunwoo%20Kim%20and%20Dahuin%20Jung%0AAbstract%3A%20Vision-Language-Action%20%28VLA%29%20models%20achieve%20strong%20performance%20in%20robotic%20manipulation%20by%20leveraging%20pre-trained%20vision-language%20backbones.%20However%2C%20in%20downstream%20robotic%20settings%2C%20they%20are%20typically%20fine-tuned%20with%20limited%20data%2C%20leading%20to%20overfitting%20to%20specific%20instruction%20formulations%20and%20leaving%20robustness%20to%20paraphrased%20instructions%20underexplored.%20To%20study%20this%20gap%2C%20we%20introduce%20LIBERO-Para%2C%20a%20controlled%20benchmark%20that%20independently%20varies%20action%20expressions%20and%20object%20references%20for%20fine-grained%20analysis%20of%20linguistic%20generalization.%20Across%20seven%20VLA%20configurations%20%280.6B-7.5B%29%2C%20we%20observe%20consistent%20performance%20degradation%20of%2022-52%20pp%20under%20paraphrasing.%20This%20degradation%20is%20primarily%20driven%20by%20object-level%20lexical%20variation%3A%20even%20simple%20synonym%20substitutions%20cause%20large%20drops%2C%20indicating%20reliance%20on%20surface-level%20matching%20rather%20than%20semantic%20grounding.%20Moreover%2C%2080-96%25%20of%20failures%20arise%20from%20planning-level%20trajectory%20divergence%20rather%20than%20execution%20errors%2C%20showing%20that%20paraphrasing%20disrupts%20task%20identification.%20Binary%20success%20rate%20treats%20all%20paraphrases%20equally%2C%20obscuring%20whether%20models%20perform%20consistently%20across%20difficulty%20levels%20or%20rely%20on%20easier%20cases.%20To%20address%20this%2C%20we%20propose%20PRIDE%2C%20a%20metric%20that%20quantifies%20paraphrase%20difficulty%20using%20semantic%20and%20syntactic%20factors.%20Our%20benchmark%20and%20corresponding%20code%20are%20available%20at%3A%20https%3A//github.com/cau-hai-lab/LIBERO-Para%0ALink%3A%20http%3A//arxiv.org/abs/2603.28301v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLIBERO-Para%253A%2520A%2520Diagnostic%2520Benchmark%2520and%2520Metrics%2520for%2520Paraphrase%2520Robustness%2520in%2520VLA%2520Models%26entry.906535625%3DChanyoung%2520Kim%2520and%2520Minwoo%2520Kim%2520and%2520Minseok%2520Kang%2520and%2520Hyunwoo%2520Kim%2520and%2520Dahuin%2520Jung%26entry.1292438233%3DVision-Language-Action%2520%2528VLA%2529%2520models%2520achieve%2520strong%2520performance%2520in%2520robotic%2520manipulation%2520by%2520leveraging%2520pre-trained%2520vision-language%2520backbones.%2520However%252C%2520in%2520downstream%2520robotic%2520settings%252C%2520they%2520are%2520typically%2520fine-tuned%2520with%2520limited%2520data%252C%2520leading%2520to%2520overfitting%2520to%2520specific%2520instruction%2520formulations%2520and%2520leaving%2520robustness%2520to%2520paraphrased%2520instructions%2520underexplored.%2520To%2520study%2520this%2520gap%252C%2520we%2520introduce%2520LIBERO-Para%252C%2520a%2520controlled%2520benchmark%2520that%2520independently%2520varies%2520action%2520expressions%2520and%2520object%2520references%2520for%2520fine-grained%2520analysis%2520of%2520linguistic%2520generalization.%2520Across%2520seven%2520VLA%2520configurations%2520%25280.6B-7.5B%2529%252C%2520we%2520observe%2520consistent%2520performance%2520degradation%2520of%252022-52%2520pp%2520under%2520paraphrasing.%2520This%2520degradation%2520is%2520primarily% udy%20this%20gap%2C%20we%20introduce%20LIBERO-Para%2C%20a%20controlled%20benchmark%20that%20independently%20varies%20action%20expressions%20and%20object%20references%20for%20fine-grained%20analysis%20of%20linguistic%20generalization.%20Across%20seven%20VLA%20configurations%20%280.6B-7.5B%29%2C%20we%20observe%20consistent%20performance%20degradation%20of%2022-52%20pp%20under%20paraphrasing.%20This%20degradation%20is%20primarily%20driven%20by%20object-level%20lexical%20variation%3A%20even%20simple%20synonym%20substitutions%20cause%20large%20drops%2C%20indicating%20reliance%20on%20surface-level%20matching%20rather%20than%20semantic%20grounding.%20Moreover%2C%2080-96%25%20of%20failures%20arise%20from%20planning-level%20trajectory%20divergence%20rather%20than%20execution%20errors%2C%20showing%20that%20paraphrasing%20disrupts%20task%20identification.%20Binary%20success%20rate%20treats%20all%20paraphrases%20equally%2C%20obscuring%20whether%20models%20perform%20consistently%20across%20difficulty%20levels%20or%20rely%20on%20easier%20cases.%20To%20address%20this%2C%20we%20propose%20PRIDE%2C%20a%20metric%20that%20quantifies%20paraphrase%20difficulty%20using%20semantic%20and%20syntactic%20factors.%20Our%20benchmark%20and%20corresponding%20code%20are%20available%20at%3A%20https%3A//github.com/cau-hai-lab/LIBERO-Para&entry.1838667208=http%3A//arxiv.org/abs/2603.28301v1&entry.124074799=Read"},
{"title": "UniGame: Turning a Unified Multimodal Model Into Its Own Adversary", "author": "Zhaolong Su and Wang Lu and Hao Chen and Sharon Li and Jindong Wang", "abstract": "Unified Multimodal Models (UMMs) have shown impressive performance in both understanding and generation with a single architecture. However, UMMs still exhibit a fundamental inconsistency: understanding favors compact embeddings, whereas generation favors reconstruction-rich representations. This structural trade-off produces misaligned decision boundaries, degraded cross-modal coherence, and heightened vulnerability under distributional and adversarial shifts. In this paper, we present UniGame, a self-adversarial post-training framework that directly targets the inconsistencies. By applying a lightweight perturber at the shared token interface, UniGame enables the generation branch to actively seek and challenge fragile understanding, turning the model itself into its own adversary. Experiments demonstrate that UniGame significantly improves the consistency (+4.6%). Moreover, it also achieves substantial improvements in understanding (+3.6%), generation (+0.02)on GenEval, out-of-distribution and adversarial robustness (+4.8% and +6.2% on NaturalBench and AdVQA). The framework is architecture-agnostic, introduces less than 1% additional parameters, and is complementary to existing post-training methods. These results position adversarial self-play as a general and effective principle for enhancing the coherence, stability, and unified competence of future multimodal foundation models. The official code is available at: https://github.com/AIFrontierLab/TorchUMM", "link": "http://arxiv.org/abs/2511.19413v3", "date": "2026-03-30", "relevancy": 2.2283, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5868}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "simil {"title": "Feel Robot Feels: Tactile Feedback Array Glove for Dexterous Manipulation", "author": "Feiyu Jia and Xiaojie Niu and Sizhe Yang and Qingwei Ben and Tao Huang and Feng zhao and Jingbo Wang and Jiangmiao Pang", "abstract": "Teleoperation is a key approach for collecting high-quality, physically consistent demonstrations for robotic manipulation. However, teleoperation for dexterous manipulation remains constrained by: (i) inaccurate hand-robot motion mapping, which limits teleoperated dexterity, and (ii) limited tactile feedback that forces vision-dominated interaction and hinders perception of contact geometry and force variation. To address these challenges, we present TAG, a low-cost glove system that integrates precise hand motion capture with high-resolution tactile feedback, enabling effective tactile-in-the-loop dexterous teleoperation. For motion capture, TAG employs a non-contact magnetic sensing design that provides drift-free, electromagnetically robust 21-DoF joint tracking with joint angle estimation errors below 1 degree. Meanwhile, to restore tactile sensation, TAG equips each finger with a 32-actuator tactile array within a compact 2 cm^2 module, allowing operators to directly feel physical interactions at the robot end-effector through spatial activation patterns. Through real-world teleoperation experiments and user studies, we show that TAG enables reliable real-time perception of contact geometry and dynamic force, improves success rates in contact-rich teleoperation tasks, and increases the reliability of demonstration data collection for learning-based manipulation.", "link": "http://arxiv.org/abs/2603.28542v1", "date": "2026-03-30", "relevancy": 2.228, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5593}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5592}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5538}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Feel%20Robot%20Feels%3A%20Tactile%20Feedback%20Array%20Glove%20for%20Dexterous%20Manipulation&body=Title%3A%20Feel%20Robot%20Feels%3A%20Tactile%20Feedback%20Array%20Glove%20for%20Dexterous%20Manipulation%0AAuthor%3A%20Feiyu%20Jia%20and%20Xiaojie%20Niu%20and%20Sizhe%20Yang%20and%20Qingwei%20Ben%20and%20Tao%20Huang%20and%20Feng%20zhao%20and%20Jingbo%20Wang%20and%20Jiangmiao%20Pang%0AAbstract%3A%20Teleoperation%20is%20a%20key%20approach%20for%20collecting%20high-quality%2C%20physically%20consistent%20demonstrations%20for%20robotic%20manipulation.%20However%2C%20teleoperation%20for%20dexterous%20manipulation%20remains%20constrained%20by%3A%20%28i%29%20inaccurate%20hand-robot%20motion%20mapping%2C%20which%20limits%20teleoperated%20dexterity%2C%20and%20%28ii%29%20limited%20tactile%20feedback%20that%20forces%20vision-dominated%20interaction%20and%20hinders%20perception%20of%20contact%20geometry%20and%20force%20variation.%20To%20address%20these%20challenges%2C%20we%20present%20TAG%2C%20a%20low-cost%20glove%20system%20that%20integrates%20precise%20hand%20motion%20capture%20with%20high-resolution%20tactile%20feedback%2C%20enabling%20effective%20tactile-in-the-loop%20dexterous%20teleoperation.%20For%20motion%20capture%2C%20TAG%20employs%20a%20non-contact%20magnetic%20sensing%20design%20that%20provides%20drift-free%2C%20electromagnetically%20robust%2021-DoF%20joint%20tracking%20with%20joint%20angle%20estimation%20errors%20below%201%20degree.%20Meanwhile%2C%20to%20restore%20tactile%20sensation%2C%20TAG%20equips%20each%20finger%20with%20a%2032-actuator%20tactile%20array%20within%20a%20compact%202%20cm%5E2%20module%2C%20allowing%20operators%20to%20directly%20feel%20physical%20interactions%20at%20the%20robot%20end-effector%20through%20spatial%20activation%20patterns.%20Through%20real-world%20teleoperation%20experiments%20and%20user%20studies%2C%20we%20show%20that%20TAG%20enables%20reliable%20real-time%20perception%20of%20contact%20geometry%20and%20dynamic%20force%2C%20improves%20success%20rates%20in%20contact-rich%20teleoperation%20tasks%2C%20and%20increases%20the%20reliability%20of%20demonstration%20data%20collection%20for%20learning-based%20manipulation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28542v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFeel%2520Robot%2520Feels%253A%2520Tactile%2520Feedback%2520Array%2520Glove%2520for%2520Dexterous%2520Manipulation%26entry.906535625%3DFeiyu%2520Jia%2520and%2520Xiaojie%2520Niu%2520and%2520Sizhe%2520Yang%2520and%2520Qingwei%2520Ben%2520and%2520Tao%2520Huang%2520and%2520Feng%2520zhao%2520and%2520Jingbo%2520Wang%2520and%2520Jiangmiao%2520Pang%26entry.1292438233%3DTeleoperation%2520is%2520a%2520key%2520approach%2520for%2520collecting%2520high-quality%252C%2520physically%2520consistent%2520demonstrations%2520for%2520robotic%2520manipulation.%2520However%252C%2520teleoperation%2520for%2520dexterous%2520manipulation%2520remains%2520constrained%2520by%253A%2520%2528i%2529%2520inaccurate%2520hand-robot%2520motion%2520mapping%252C%2520which%2520limits%2520teleoperated%2520dexterity%252C%2520and%2520%2528ii%2529%2520limited%2520tactile%2520feedback%2520that%2520forces%2520vision-dominated%2520interaction%2520and%2520hinders%2520perception%2520of%2520contact%2520geometry%2520and%2520force%2520variation.%2520To%2520address%2520these%2520challenges%252C%2520we%2520present%2520TAG%252C%2520a%2520low-cost%2520glove%2520system%2520that%2520integrates%2520precise%2520hand%2520motion%2520capture%2520with%2520high-resolution%2520tactile%2520feedback%252C%2520enabling%2520effective%2520tactile-in-the-loop%2520dexterous%2520teleoperation.%2520For%2520motion%2520capture%252C%25 {"title": "Industrial3D: A Terrestrial LiDAR Point Cloud Dataset and CrossParadigm Benchmark for Industrial Infrastructure", "author": "Chao Yin and Hongzhe Yue and Qing Han and Difeng Hu and Zhenyu Liang and Fangzhou Lin and Bing Sun and Boyu Wang and Mingkai Li and Wei Yao and Jack C. P. Cheng", "abstract": "Automated semantic understanding of dense point clouds is a prerequisite for Scan-to-BIM pipelines, digital twin construction, and as-built verification--core tasks in the digital transformation of the construction industry. Yet for industrial mechanical, electrical, and plumbing (MEP) facilities, this challenge remains largely unsolved: TLS acquisitions of water treatment plants, chiller halls, and pumping stations exhibit extreme geometric ambiguity, severe occlusion, and extreme class imbalance that architectural benchmarks (e.g., S3DIS or ScanNet) cannot adequately represent. We present Industrial3D, a terrestrial LiDAR dataset comprising 612 million expertly labelled points at 6 mm resolution from 13 water treatment facilities. At 6.6x the scale of the closest comparable MEP dataset, Industrial3D provides the largest and most demanding testbed for industrial 3D scene understanding to date. We further establish the first industrial cross-paradigm benchmark, evaluating nine representative methods across fully supervised, weakly supervised, unsupervised, and foundation model settings under a unified benchmark protocol. The best supervised method achieves 55.74% mIoU, whereas zero-shot Point-SAM reaches only 15.79%--a 39.95 percentage-point gap that quantifies the unresolved domain-transfer challenge for industrial TLS data. Systematic analysis reveals that this gap originates from a dual crisis: statistical rarity (215:1 imbalance, 3.5x more severe than S3DIS) and geometric ambiguity (tail-class points share cylindrical primitives with head-class pipes) that frequency-based re-weighting alone cannot resolve. Industrial3D, along with benchmark code and pre-trained models, will be publicly available at https://github.com/pointcloudyc/Industrial3D.", "link": "http://arxiv.org/abs/2603.28660v1", "date": "2026-03-30", "relevancy": 2.2099, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5549}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5549}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5405}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Industrial3D%3A%20A%20Terrestrial%20LiDAR%20Point%20Cloud%20Dataset%20and%20CrossParadigm%20Benchmark%20for%20Industrial%20Infrastructure&body=Title%3A%20Industrial3D%3A%20A%20Terrestrial%20LiDAR%20Point%20Cloud%20Dataset%20and%20CrossParadigm%20Benchmark%20for%20Industrial%20Infrastructure%0AAuthor%3A%20Chao%20Yin%20and%20Hongzhe%20Yue%20and%20Qing%20Han%20and%20Difeng%20Hu%20and%20Zhenyu%20Liang%20and%20Fangzhou%20Lin%20and%20Bing%20Sun%20and%20Boyu%20Wang%20and%20Mingkai%20Li%20and%20Wei%20Yao%20and%20Jack%20C.%20P.%20Cheng%0AAbstract%3A%20Automated%20semantic%20understanding%20of%20dense%20point%20clouds%20is%20a%20prerequisite%20for%20Scan-to-BIM%20pipelines%2C%20digital%20twin%20construction%2C%20and%20as-built%20verification--core%20tasks%20in%20the%20digital%20transformation%20of%20the%20construction%20industry.%20Yet%20for%20industrial%20mechanical%2C%20electrical%2C%20and%20plumbing%20%28MEP%29%20facilities%2C%20this%20challenge%20remains%20largely%20unsolved%3A%20TLS%20acquisitions%20of%20water%20treatment%20plants%2C%20chiller%20halls%2C%20and%20pumping%20stations%20exhibit%20extreme%20geometric%20ambiguity%2C%20severe%20occlusion%2C%20and%20extreme%20class%20imbalance%20that%20architectural%20benchmarks%20%28e.g.%2C%20S3DIS%20or%20ScanNet%29%20cannot%20adequately%20represent.%20We%20present%20Industrial3D%2C%20a%20terrestrial%20LiDAR%20dataset%20comprising%20612%20million%20expertly%20labelled%20points%20at%206%20mm%20resolution%20from%2013%20water%20treatment%20facilities.%20At%206.6x%20the%20scale%20of%20the%20closest%20comparable%20MEP%20dataset%2C%20Industrial3D%20provides%20the%20largest%20and%20most%20demanding%20testbed%20for%20industrial%203D%20scene%20understanding%20to%20date.%20We%20further%20establish%20the%20first%20industrial%20cross-paradigm%20benchmark%2C%20evaluating%20nine%20representative%20methods%20across%20fully%20supervised%2C%20weakly%20supervised%2C%20unsupervised%2C%20and%20foundation%20model%20settings%20under%20a%20unified%20benchmark%20protocol.%20The%20best%20supervised%20method%20achieves%2055.74%25%20mIoU%2C%20whereas%20zero-shot%20Point-SAM%20reaches%20only%2015.79%25--a%2039.95%20percentage-point%20gap%20that%20quantifies%20the%20unresolved%20domain-transfer%20challenge%20for%20industrial%20TLS%20data.%20Systematic%20analysis%20reveals%20that%20this%20gap%20originates%20from%20a%20dual%20crisis%3A%20statistical%20rarity%20%28215%3A1%20imbalance%2C%203.5x%20more%20severe%20than%20S3DIS%29%20and%20geometric%20ambiguity%20%28tail-class%20points%20share%20cylindrical%20primitives%20with%20head-class%20pipes%29%20that%20frequency-based%20re-weighting%20alone%20cannot%20resolve.%20Industrial3D%2C%20along%20with%20benchmark%20code%20and%20pre-trained%20models%2C%20will%20be%20publicly%20available%20at%20https%3A//github.com/pointcloudyc/Industrial3D.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28660v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIndustrial3D%253A%2520A%2520Terrestrial%2520LiDAR%2520Point%2520Cloud%2520Dataset%2520and%2520CrossParadigm%2520Benchmark%2520for%2520Industrial%2520Infrastructure%26entry.906535625%3DChao%2520Yin%2520and%2520Hongzhe%2520Yue {"title": "VideoARM: Agentic Reasoning over Hierarchical Memory for Long-Form Video Understanding", "author": "Yufei Yin and Qianke Meng and Minghao Chen and Jiajun Ding and Zhenwei Shao and Zhou Yu", "abstract": "Long-form video understanding remains challenging due to the extended temporal structure and dense multimodal cues. Despite recent progress, many existing approaches still rely on hand-crafted reasoning pipelines or employ token-consuming video preprocessing to guide MLLMs in autonomous reasoning. To overcome these limitations, we introduce VideoARM, an Agentic Reasoning-over-hierarchical-Memory paradigm for long-form video understanding. Instead of static, exhaustive preprocessing, VideoARM performs adaptive, on-the-fly agentic reasoning and memory construction. Specifically, VideoARM performs an adaptive and continuous loop of observing, thinking, acting, and memorizing, where a controller autonomously invokes tools to interpret the video in a coarse-to-fine manner, thereby substantially reducing token consumption. In parallel, a hierarchical multimodal memory continuously captures and updates multi-level clues throughout the operation of the agent, providing precise contextual information to support the controller in decision-making. Experiments on prevalent benchmarks demonstrate that VideoARM outperforms the state-of-the-art method, DVD, while significantly reducing token consumption for long-form videos.", "link": "http://arxiv.org/abs/2512.12360v2", "date": "2026-03-30", "relevancy": 2.2058, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5524}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5524}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv. %20token%20consumption%20for%20long-form%20videos.%0ALink%3A%20http%3A//arxiv.org/abs/2512.12360v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVideoARM%253A%2520Agentic%2520Reasoning%2520over%2520Hierarchical%2520Memory%2520for%2520Long-Form%2520Video%2520Understanding%26entry.906535625%3DYufei%2520Yin%2520and%2520Qianke%2520Meng%2520and%2520Minghao%2520Chen%2520and%2520Jiajun%2520Ding%2520and%2520Zhenwei%2520Shao%2520and%2520Zhou%2520Yu%26entry.1292438233%3DLong-form%2520video%2520understanding%2520remains%2520challenging%2520due%2520to%2520the%2520extended%2520temporal%2520structure%2520and%2520dense%2520multimodal%2520cues.%2520Despite%2520recent%2520progress%252C%2520many%2520existing%2520approaches%2520still%2520rely%2520on%2520hand-crafted%2520reasoning%2520pipelines%2520or%2520employ%2520token-consuming%2520video%2520preprocessing%2520to%2520guide%2520MLLMs%2520in%2520autonomous%2520reasoning.%2520To%2520overcome%2520these%2520limitations%252C%2520we%2520introduce%2520VideoARM%252C%2520an%2520Agentic%2520Reasoning-over-hierarchical-Memory%2520paradigm%2520for%2520long-form%2520video%2520understanding.%2520Instead%2520of%2520static%252C%2520exhaustive%2520preprocessing%252C%2520VideoARM%2520performs%2520adaptive%252C%2520on-the-fly%2520agentic%2520reasoning%2520and%2520memory%2520construction.%2520Specifically%252C%2520VideoARM%2520performs%2520an%2520adaptive%2520and%2520continuous%2520loop%2520of%2520observing%252C%2520thinking%252C%2520acting%252C%2520and%2520memorizing%252C%2520where%2520a%2520controller%2520autonomously%2520invokes%2520tools%2520to%2520interpret%2520the%2520video%2520in%2520a%2520coarse-to-fine%2520manner%252C%2520thereby%2520substantially%2520reducing%2520token%2520consumption.%2520In%2520parallel%252C%2520a%2520hierarchical%2520multimodal%2520memory%2520continuously%2520captures%2520and%2520updates%2520multi-level%2520clues%2520throughout%2520the% {"title": "Randomized HyperSteiner: A Stochastic Delaunay Triangulation Heuristic for the Hyperbolic Steiner Minimal Tree", "author": "Aniss Aiman Medbouhi and Alejandro Garc\u00eda-Castellanos and Giovanni Luca Marchetti and Daniel Pelt and Erik J Bekkers and Danica Kragic", "abstract": "We study the problem of constructing Steiner Minimal Trees (SMTs) in hyperbolic space. Exact SMT computation is NP-hard, and existing hyperbolic heuristics such as HyperSteiner are deterministic and often get trapped in locally suboptimal configurations. We introduce Randomized HyperSteiner (RHS), a stochastic Delaunay triangulation heuristic that incorporates randomness into the expansion process and refines candidate trees via Riemannian gradient descent optimization. Experiments on synthetic data sets and a real-world single-cell transcriptomic data show that RHS outperforms Minimum Spanning Tree (MST), Neighbour Joining, and vanilla HyperSteiner (HS). In near-boundary configurations, RHS can achieve a 32% reduction in total length over HS, demonstrating its effectiveness and robustness in diverse data regimes.", "link": "http://arxiv.org/abs/2510.09328v2", "date": "2026-03-30", "relevancy": 2.2024, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4503}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4419}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4292}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Randomized%20HyperSteiner%3A%20A%20Stochastic%20Delaunay%20Triangulation%20Heuristic%20for%20the%20Hyperbolic%20Steiner%20Minimal%20Tree&body=Title%3A%20Randomized%20HyperSteiner%3A%20A%20Stochastic%20Delaunay%20Triangulation%20Heuris 0hyperbolic%20heuristics%20such%20as%20HyperSteiner%20are%20deterministic%20and%20often%20get%20trapped%20in%20locally%20suboptimal%20configurations.%20We%20introduce%20Randomized%20HyperSteiner%20%28RHS%29%2C%20a%20stochastic%20Delaunay%20triangulation%20heuristic%20that%20incorporates%20randomness%20into%20the%20expansion%20process%20and%20refines%20candidate%20trees%20via%20Riemannian%20gradient%20descent%20optimization.%20Experiments%20on%20synthetic%20data%20sets%20and%20a%20real-world%20single-cell%20transcriptomic%20data%20show%20that%20RHS%20outperforms%20Minimum%20Spanning%20Tree%20%28MST%29%2C%20Neighbour%20Joining%2C%20and%20vanilla%20HyperSteiner%20%28HS%29.%20In%20near-boundary%20configurations%2C%20RHS%20can%20achieve%20a%2032%25%20reduction%20in%20total%20length%20over%20HS%2C%20demonstrating%20its%20effectiveness%20and%20robustness%20in%20diverse%20data%20regimes.&entry.1838667208=http%3A//arxiv.org/abs/2510.09328v2&entry.124074799=Read"},
{"title": "FocusVLA: Focused Visual Utilization for Vision-Language-Action Models", "author": "Yichi Zhang and Weihao Yuan and Yizhuo Zhang and Xidong Zhang and Jia Wan", "abstract": "Vision-Language-Action (VLA) models improve action generation by conditioning policies on rich vision-language information. However, current auto-regressive policies are constrained by three bottlenecks: (1) architectural bias drives models to overlook visual details, (2) an excessive number of visual tokens makes attention difficult to focus on the correct regions, and (3) task-irrelevant visual information introduces substantial noise - together severely impairing the quality of action. In this paper, we investigate how to effectively utilize different visual representations for action generation. To this end, we first empirically validate the above issues and show that VLA performance is primarily limited by how visual information is utilized, rather than by the quality of visual representations. Based on these insights, we introduce FocusVLA, a novel paradigm that directs the model's attention to task-relevant visual regions to effectively bridge vision to action. Specifically, we first propose Modality Cascaded Attention to eliminate shortcut pathways, thereby compelling VLA models to rely on task-relevant visual details for action generation. Furthermore, we propose Focus Attention, which dynamically selects task-relevant visual patches to control information quantity while explicitly modulating their influence to suppress task-irrelevant noise. Extensive experiments on both simulated and real-world robotic benchmarks demonstrate that FocusVLA not only effectively leverages visual details to perform dexterous manipulations, but also substantially improves performance and accelerates convergence across a variety of tasks.", "link": "http://arxiv.org/abs/2603.28740v1", "date": "2026-03-30", "relevancy": 2.1869, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5547}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5547}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.507}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FocusVLA%3A%20Focused%20Visual%20Utilization%20for%20Vision-Language-Action%20Models&body=Title%3A%20FocusVLA%3A%20Focused%20Visual%20Utilization%20for%20Vision-Language-Action%20Models%0AAuthor%3A%20Yichi%20Zhang%20and%20Weihao%20Yuan%20and%20Yizhuo%20Zhang%20and%20Xidong%20Zhang%20and%20Jia%20Wan%0AAbstract%3A%20Vision-Language-Action%20%28VLA%29%20models%20improve%20action%20generation%20by%20conditioning%20policies%20on%20rich%20vision-language%20information.%20However%2C%20current%20auto-regressive%20policies%20are%20constrained%20by%20three%20bottlenecks%3A%20%281%29%20architectural%20bias%20drives%20models%20to%20overlook%20visual%20details%2C%20%282%29%20an%20excessive%20number%20of%20visual%20tokens%20makes%20attention%20difficult%20to%20focus%20on%20the%20correct%20regions%2C%20and%20%283%29%20task-irrelevant%20visual%20information%20introduces%20substantial%20noise%20-%20together%20severely%20impairing%20the%20quality%20of%20action.%20In%20this%20paper%2C%20we%20investigate%20how%20to%20effectively%20utilize%20different%20visual%20representations%20for%20action%20generation.%20To%20this%20end%2C%20we%20first%20empirically%20validate%20the%20above%20issues%20and%20show%20that%20VLA%20performance%20is%20primarily%20limited%20by%20how%20visual%20information%20is%20utilized%2C%20rather%20than%20by%20the%20quality%20of%20visual%20representations.%20Based%20on%20these%20insights%2C%20we%20introduce%20FocusVLA%2C%20a%20novel%20paradigm%20that%20directs%20the%20model%27s%20attention%20to%20task-relevant%20visual%20regions%20to%20effectively%20bridge%20vision%20to%20action.%20Specifically%2C%20we%20first%20propose%20Modality%20Cascaded%20Attention%20to%20eliminate%20shortcut%20pathways%2C%20thereby%20compelling%20VLA%20models%20to%20rely%20on%20task-relevant%20visual%20details%20for%20action%20generation.%20Furthermore%2C%20we%20propose%20Focus%20Attention%2C%20which%20dynamically%20selects%20task-relevant%20visual%20patches%20to%20control%20information%20quantity%20while%20explicitly%20modulating%20their%20influence%20to%20suppress%20task-irrelevant%20noise.%20Extensive%20experiments%20on%20both%20simulated%20and%20real-world%20robotic%20benchmarks%20demonstrate%20that%20FocusVLA%20not%20only%20effectively%20leverages%20visual%20details%20to%20perform%20dexterous%20manipulations%2C%20but%20also%20substantially%20improves%20performance%20and%20accelerates%20convergence%20across%20a%20variety%20of%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28740v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFocusVLA%253A%2520Focused%2520Visual%2520Utilization%2520for%2520Vision-Language-Action%2520Models%26entry.906535625%3DYichi%2520Zhang%2520and%2520Weihao%2520Yuan%2520and%2520Yizhuo%2520Zhang%2520and%2520Xidong%2520Zhang%2520and%2520Jia%2520Wan%26entry.1292438233%3DVision-Language-Action%2520%2528VLA%2529%2520models%2520improve%2520action%2520generation%2520by%2520conditioning%2520policies%2520on%2520rich%2520vision-language%2520information.%2520However%252C%2520current%2520auto-regressive%2520policies%2520are%2520constrained%2520by%2520three%2520bottlenecks%253A%2520%25281%2529%2520architectural%2520bias%2520drives%2520models%2520to%2520overlook%2520visual%2520details%252C%2520%25282%2529%2520an%2520excessive%2520number%2520of%2520visual%2520tokens%2520makes%2520attention%2520difficult%2520to%2520focus%2520on%2520the%2520correct%2520regions%252 {"title": "Image-Adaptive GAN based Reconstruction", "author": "Shady Abu Hussein and Tom Tirer and Raja Giryes", "abstract": "In the recent years, there has been a significant improvement in the quality of samples produced by (deep) generative models such as variational auto-encoders and generative adversarial networks. However, the representation capabilities of these methods still do not capture the full distribution for complex classes of images, such as human faces. This deficiency has been clearly observed in previous works that use pre-trained generative models to solve imaging inverse problems. In this paper, we suggest to mitigate the limited representation capabilities of generators by making them image-adaptive and enforcing compliance of the restoration with the observations via back-projections. We empirically demonstrate the advantages of our proposed approach for image super-resolution and compressed sensing.", "link": "http://arxiv.org/abs/1906.05284v3", "date": "2026-03-30", "relevancy": 2.1802, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5631}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5465}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5364}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Image-Adaptive%20GAN%20based%20Reconstruction&body=Title%3A%20Image-Adaptive%20GAN%20based%20Reconstruction%0AAuthor%3A%20Shady%20Abu%20Hussein%20and%20Tom%20Tirer%20and%20Raja%20Giryes%0AAbstract%3A%20In%20the%20recent%20years%2C%20there%20has%20been%20a%20significant%20improvement%20in%20the%20quality%20of%20samples%20produced%20by%20%28deep%29%20generative%20models%20such%20as%20variational%20auto-encoders%20and%20generati

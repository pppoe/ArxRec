{"title": "Ruka-v2: Tendon Driven Open-Source Dexterous Hand with Wrist and Abduction for Robot Learning", "author": "Xinqi Lucas Liu and Ruoxi Hu and Alejandro Ojeda Olarte and Zhuoran Chen and Kenny Ma and Charles Cheng Ji and Lerrel Pinto and Raunaq Bhirangi and Irmak Guzey", "abstract": "Lack of accessible and dexterous robot hardware has been a significant bottleneck to achieving human-level dexterity in robots. Last year, we released Ruka, a fully open-sourced, tendon-driven humanoid hand with 11 degrees of freedom - 2 per finger and 3 at the thumb - buildable for under $1,300. It was one of the first fully open-sourced humanoid hands, and introduced a novel data-driven approach to finger control that captures tendon dynamics within the control system. Despite these contributions, Ruka lacked two degrees of freedom essential for closely imitating human behavior: wrist mobility and finger adduction/abduction. In this paper, we introduce Ruka-v2: a fully open-sourced, tendon-driven humanoid hand featuring a decoupled 2-DOF parallel wrist and abduction/adduction at the fingers. The parallel wrist adds smooth, independent flexion/extension and radial/ulnar deviation, enabling manipulation in confined environments such as cabinets. Abduction enables motions such as grasping thin objects, in-hand rotation, and calligraphy. We present the design of Ruka-v2 and evaluate it against Ruka through user studies on teleoperated tasks, finding a 51.3% reduction in completion time and a 21.2% increase in success rate. We further demonstrate its full range of applications for robot learning: bimanual and single-arm teleoperation across 13 dexterous tasks, and autonomous policy learning on 3 tasks. All 3D print files, assembly instructions, controller software, and videos are available at https://ruka-hand-v2.github.io/ .", "link": "http://arxiv.org/abs/2603.26660v2", "date": "2026-03-30", "relevancy": 2.1766, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5658}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5396}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5013}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Ruka-v2%3A%20Tendon%20Driven%20Open-Source%20Dexterous%20Hand%20with%20Wrist%20and%20Abduction%20for%20Robot%20Learning&body=Title%3A%20Ruka-v2%3A%20Tendon%20Driven%20Open-Source%20Dexterous%20Hand%20with%20Wrist%20and%20Abduction%20for%20Robot%20Learning%0AAuthor%3A%20Xinqi%20Lucas%20Liu%20and%20Ruoxi%20Hu%20and%20Alejandro%20Ojeda%20Olarte%20and%20Zhuoran%20Chen%20and%20Kenny%20Ma%20and%20Charles%20Cheng%20Ji%20and%20Lerrel%20Pinto%20and%20Raunaq%20Bhirangi%20and%20Irmak%20Guzey%0AAbstract%3A%20Lack%20of%20accessible%20and%20dexterous%20robot%20hardware%20has%20been%20a%20significant%20bottleneck%20to%20achieving%20human-level%20dexterity%20in%20robots.%20Last%20year%2C%20we%20released%20Ruka%2C%20a%20fully%20open-sourced%2C%20tendon-driven%20humanoid%20hand%20with%2011%20degrees%20of%20freedom%20-%202%20per%20finger%20and%203%20at%20the%20thumb%20-%20buildable%20for%20under%20%241%2C300.%20It%20was%20one%20of%20the%20first%20fully%20open-sourced%20humanoid%20hands%2C%20and%20introduced%20a%20novel%20data-driven%20approach%20to%20finger%20control%20that%20captures%20tendon%20dynamics%20within%20the%20control%20system.%20Despite%20these%20contributions%2C%20Ruka%20lacked%20two%20degrees%20of%20freedom%20essential%20for%20closely%20imitating%20human%20behavior%3A%20wrist%20mobility%20and%20finger%20adduction/abduction.%20In%20this%20paper%2C%20we%20introduce%20Ruka-v2%3A%20a%20fully%20open-sourced%2C%20tendon-driven%20humanoid%20hand%20featuring%20a%20decoupled%202-DOF%20parallel%20wrist%20and%2 {"title": "From Observation to Action: Latent Action-based Primitive Segmentation for VLA Pre-training in Industrial Settings", "author": "Jiajie Zhang and S\u00f6ren Schwertfeger and Alexander Kleiner", "abstract": "We present a novel unsupervised framework to unlock vast unlabeled human demonstration data from continuous industrial video streams for Vision-Language-Action (VLA) model pre-training. Our method first trains a lightweight motion tokenizer to encode motion dynamics, then employs an unsupervised action segmenter leveraging a novel \"Latent Action Energy\" metric to discover and segment semantically coherent action primitives. The pipeline outputs both segmented video clips and their corresponding latent action sequences, providing structured data directly suitable for VLA pre-training. Evaluations on public benchmarks and a proprietary electric motor assembly dataset demonstrate effective segmentation of key tasks performed by humans at workstations. Further clustering and quantitative assessment via a Vision-Language Model confirm the semantic coherence of the discovered action primitives. To our knowledge, this is the first fully automated end-to-end system for extracting and organizing VLA pre-training data from unstructured industrial videos, offering a scalable solution for embodied AI integration in manufacturing.", "link": "http://arxiv.org/abs/2511.21428v2", "date": "2026-03-30", "relevancy": 2.1672, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5589}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5358}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5271}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Observation%20to%20Action%3A%20Latent%20Action-based%20Primitive%20Segmentation%20for%20VLA%20Pre-training%20in%20Industrial%20Settings&body=Title%3A%20From%20Observation%20to%20Action%3A%20Latent%20Action-based%20Primitive%20Segmentation%20for%20VLA%20Pre-training%20in%20Industrial%20Settings%0AAuthor%3A%20Jiajie%20Zhang%20and%20S%C3%B6ren%20Schwertfeger%20and%20Alexander%20Kleiner%0AAbstract%3A%20We%20present%20a%20novel%20unsupervised%20framework%20to%20unlock%20vast%20unlabeled%20human%20demonstration%20data%20from%20continuous%20industrial%20video%20streams%20for%20Vision-Language-Action%20%28VLA%29%20model%20pre-training.%20Our%20method%20first%20trains%20a%20lightweight%20motion%20tokenizer%20to%20encode%20motion%20dynamics%2C%20then%20employs%20an%20unsupervised%20action%20segmenter%20leveraging%20a%20novel%20%22Latent%20Action%20Energy%22%20metric%20to%20discover%20and%20segment%20semantically%20coherent%20action%20primitives.%20The%20pipeline%20outputs%20both%20segmented%20video%20clips%20and%20their%20corresponding%20latent%20action%20sequences%2C%20providing%20structured%20data%20directly%20suitable%20for%20VLA%20pre-training.%20Evaluations%20on%20public%20benchmarks%20and%20a%20proprietary%20electric%20motor%20assembly%20dataset%20demonstrate%20effective%20segmentation%20of%20key%20tasks%20performed%20by%20humans%20at%20workstations.%20Further%20clustering%20and%20quantitative%20assessment%20via%20a%20Vision-Language%20Model%20confirm%20the%20semantic%20coherence%20of%20the%20discovered%20action%20primitives.%20To%20our%20knowledge%2C%20this%20is%20the%20first%20fully%20automated%20end-to-end%20system%20for%20extracting%20and%20organizing%20VLA%20pre-training%20data%20from%20unstructured%20industrial%20videos%2C%20offering%20a%20scalable%20solution%20for%20embodied%20AI%20integration%20in%20manufacturing.%0ALink%3A%20http%3A//arxiv.org/abs/2511.21428v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLS 2520industrial%2520videos%252C%2520offering%2520a%2520scalable%2520solution%2520for%2520embodied%2520AI%2520integration%2520in%2520manufacturing.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.21428v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=From%20Observation%20to%20Action%3A%20Latent%20Action-based%20Primitive%20Segmentation%20for%20VLA%20Pre-training%20in%20Industrial%20Settings&entry.906535625=Jiajie%20Zhang%20and%20S%C3%B6ren%20Schwertfeger%20and%20Alexander%20Kleiner&entry.1292438233=We%20present%20a%20novel%20unsupervised%20framework%20to%20unlock%20vast%20unlabeled%20human%20demonstration%20data%20from%20continuous%20industrial%20video%20streams%20for%20Vision-Language-Action%20%28VLA%29%20model%20pre-training.%20Our%20method%20first%20trains%20a%20lightweight%20motion%20tokenizer%20to%20encode%20motion%20dynamics%2C%20then%20employs%20an%20unsupervised%20action%20segmenter%20leveraging%20a%20novel%20%22Latent%20Action%20Energy%22%20metric%20to%20discover%20and%20segment%20semantically%20coherent%20action%20primitives.%20The%20pipeline%20outputs%20both%20segmented%20video%20clips%20and%20their%20corresponding%20latent%20action%20sequences%2C%20providing%20structured%20data%20directly%20suitable%20for%20VLA%20pre-training.%20Evaluations%20on%20public%20benchmarks%20and%20a%20proprietary%20electric%20motor%20assembly%20dataset%20demonstrate%20effective%20segmentation%20of%20key%20tasks%20performed%20by%20humans%20at%20workstations.%20Further%20clustering%20and%20quantitative%20assessment%20via%20a%20Vision-Language%20Model%20confirm%20the%20semantic%20coherence%20of%20the%20discovered%20action%20primitives.%20To%20our%20knowledge%2C%20this%20is%20the%20first%20fully%20automated%20end-to-end%20system%20for%20extracting%20and%20organizing%20VLA%20pre-training%20data%20from%20unstructured%20industrial%20videos%2C%20offering%20a%20scalable%20solution%20for%20embodied%20AI%20integration%20in%20manufacturing.&entry.1838667208=http%3A//arxiv.org/abs/2511.21428v2&entry.124074799=Read"},
{"title": "See it to Place it: Evolving Macro Placements with Vision-Language Models", "author": "Ikechukwu Uchendu and Swati Goel and Karly Hou and Ebrahim Songhori and Kuang-Huei Lee and Joe Wenjie Jiang and Vijay Janapa Reddi and Vincent Zhuang", "abstract": "We propose using Vision-Language Models (VLMs) for macro placement in chip floorplanning, a complex optimization task that has recently shown promising advancements through machine learning methods. Because human designers rely heavily on spatial reasoning to arrange components on the chip canvas, we hypothesize that VLMs with strong visual reasoning abilities can effectively complement existing learning-based approaches. We introduce VeoPlace (Visual Evolutionary Optimization Placement), a novel framework that uses a VLM, without any fine-tuning, to guide the actions of a base placer by constraining them to subregions of the chip canvas. The VLM proposals are iteratively optimized through an evolutionary search strategy with respect to resulting placement quality. On open-source benchmarks, VeoPlace outperforms the best prior learning-based approach on 9 of 10 benchmarks with peak wirelength reductions exceeding 32%. We further demonstrate that VeoPlace generalizes to analytical placers, improving DREAMPlace performance on all 8 evaluated benchmarks with gains up to 4.3%. Our approach opens new possibilities for electronic design automation tools that leverage foundation models to solve complex physical design problems.", "link": "http://arxiv.org/abs/2603.28733v1", "date": "2026-03-30", "relevancy": 2.1647, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5454}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5454}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.52}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20See%20it%20to%20Place%20it%3A%20Evolving%20Macro%20Placements%20with%20Vision-Language%20Models&body=Title%3A%20See%20it%20to%20Place%20it%3A%20Evolving%20Macro%20Placements%20with%20Vision-Language%20Models%0AAuthor%3A%20Ikechukwu%20Uchendu%20and%20Swati%20Goel%20and%20Karly%20Hou%20and%20Ebrahim%20Songhori%20and%20Kuang-Huei%20Lee%20and%20Joe%20Wenjie%20Jiang%20and%20Vijay%20Janapa%20Reddi%20and%20Vincent%20Zhuang%0AAbstract%3A%20We%20propose%20using%20Vision-Language%20Models%20%28VLMs%29%20for%20macro%20placement%20in%20chip%20floorplanning%2C%20a%20complex%20optimization%20task%20that%20has%20recently%20shown%20promising%20advancements%20through%20machine%20learning%20methods.%20Because%20human%20designers%20rely%20heavily%20on%20spatial%20reasoning%20to%20arrange%20components%20on%20the%20chip%20canvas%2C%20we%20hypothesize%20that%20VLMs%20with%20strong%20visual%20reasoning%20abilities%20can%20effectively%20complement%20existing%20learning-based%20approaches.%20We%20introduce%20VeoPlace%20%28Visual%20Evolutionary%20Optimization%20Placement%29%2C%20a%20novel%20framework%20that%20uses%20a%20VLM%2C%20without%20any%20fine-tuning%2C%20to%20guide%20the%20actions%20of%20a%20base%20placer%20by%20constraining%20them%20to%20subregions%20of%20the%20chip%20canvas.%20The%20VLM%20proposals%20are%20iteratively%20optimized%20through%20an%20evolutionary%20search%20strategy%20with%20respect%20to%20resulting%20placement%20quality.%20On%20open-source%20benchmarks%2C%20VeoPlace%20outperforms%20the%20best%20prior%20learning-based%20approach%20on%209%20of%2010%20benchmarks%20with%20peak%20wirelength%20reductions%20exceeding%2032%25.%20We%20further%20demonstrate%20that%20VeoPlace%20generalizes%20to%20analytical%20placers%2C%20improving%20DREAMPlace%20performance%20on%20all%208%20evaluated%20benchmarks% {"title": "Echo State Networks for Time Series Forecasting: Hyperparameter Sweep and Benchmarking", "author": "Alexander H\u00e4u\u00dfer", "abstract": "This paper investigates the forecasting performance of Echo State Networks (ESNs) for univariate time series forecasting using a subset of the M4 Forecasting Competition dataset. Focusing on monthly and quarterly time series with at most 20 years of historical data, we evaluate whether a fully automatic, purely feedback-driven ESN can serve as a competitive alternative to widely used statistical forecasting methods. The study adopts a rigorous two-stage evaluation approach: a Parameter dataset is used to conduct an extensive hyperparameter sweep covering leakage rate, spectral radius, reservoir size, and information criteria for regularization, resulting in over four million ESN model fits; a disjoint Forecast dataset is then used for out-of-sample accuracy assessment. Forecast accuracy is measured using MASE and sMAPE and benchmarked against simple benchmarks like drift and seasonal naive and statistical models like ARIMA, ETS, and TBATS. The hyperparameter analysis reveals consistent and interpretable patterns, with monthly series favoring moderately persistent reservoirs and quarterly series favoring more contractive dynamics. Across both frequencies, high leakage rates are preferred, while optimal spectral radii and reservoir sizes vary with temporal resolution. In the out-of-sample evaluation, the ESN performs on par with ARIMA and TBATS for monthly data and achieves the lowest mean MASE for quarterly data, while requiring lower computational cost than the more complex statistical models. Overall, the results demonstrate that ESNs offer a compelling balance between predictive accuracy, robustness, and computational efficiency, positioning them as a practical option for automated time series forecasting.", "link": "http://arxiv.org/abs/2602.03912v2", "date": "2026-03-30", "relevancy": 2.1617, "topK": [{"title": %20and%20seasonal%20naive%20and%20statistical%20models%20like%20ARIMA%2C%20ETS%2C%20and%20TBATS.%20The%20hyperparameter%20analysis%20reveals%20consistent%20and%20interpretable%20patterns%2C%20with%20monthly%20series%20favoring%20moderately%20persistent%20reservoirs%20and%20quarterly%20series%20favoring%20more%20contractive%20dynamics.%20Across%20both%20frequencies%2C%20high%20leakage%20rates%20are%20preferred%2C%20while%20optimal%20spectral%20radii%20and%20reservoir%20sizes%20vary%20with%20temporal%20resolution.%20In%20the%20out-of-sample%20evaluation%2C%20the%20ESN%20performs%20on%20par%20with%20ARIMA%20and%20TBATS%20for%20monthly%20data%20and%20achieves%20the%20lowest%20mean%20MASE%20for%20quarterly%20data%2C%20while%20requiring%20lower%20computational%20cost%20than%20the%20more%20complex%20statistical%20models.%20Overall%2C%20the%20results%20demonstrate%20that%20ESNs%20offer%20a%20compelling%20balance%20between%20predictive%20accuracy%2C%20robustness%2C%20and%20computational%20efficiency%2C%20positioning%20them%20as%20a%20practical%20option%20for%20automated%20time%20series%20forecasting.%0ALink%3A%20http%3A//arxiv.org/abs/2602.03912v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEcho%2520State%2520Networks%2520for%2520Time%2520Series%2520Forecasting%253A%2520Hyperparameter%2520Sweep%2520and%2520Benchmarking%26entry.906535625%3DAlexander%2520H%25C3%25A4u%25C3%259Fer%26entry.1292438233%3DThis%2520paper%2520investigates%2520the%2520forecasting%2520performance%2520of%2520Echo%2520State%2520Networks%2520%2528ESNs%2529%2520for%2520univariate%2520time%2520series%2520forecasting%2520using%2520a%2520subset%2520of%2520the%2520M4%2520Forecasting%2520Competition%2520dataset.%2520Focusing%2520on%2520monthly%2520and%2520quarterly%2520time%2520series%2520with%2520at%2520most%252020%2520years%2520of%2520historical%2520data%252C%2520we%2520evaluate%2520whether%2520a%2520fully%2520automatic% {"title": "COvolve: Adversarial Co-Evolution of Large-Language-Model-Generated Policies and Environments via Two-Player Zero-Sum Game", "author": "Alkis Sygkounas and Rishi Hazra and Andreas Persson and Pedro Zuidberg Dos Martires and Amy Loutfi", "abstract": "A central challenge in building continually improving agents is that training environments are typically static or manually constructed. This restricts continual learning and generalization beyond the training distribution. We address this with COvolve, a co-evolutionary framework that leverages large language models (LLMs) to generate both environments and agent policies, expressed as executable Python code. We model the interaction between environment and policy designers as a two-player zero-sum game, ensuring adversarial co-evolution in which environments expose policy weaknesses and policies adapt in response. This process induces an automated curriculum in which environments and policies co-evolve toward increasing complexity. To guarantee robustness and prevent forgetting as the curriculum progresses, we compute the mixed-strategy Nash equilibrium (MSNE) of the zero-sum game, thereby yielding a meta-policy. This MSNE meta-policy ensures that the agent does not forget to solve previously seen environments while learning to solve previously unseen ones. Experiments in urban driving, symbolic maze-solving, and geometric navigation showcase that COvolve produces progressively more complex environments. Our results demonstrate the potential of LLM-driven co-evolution to achieve open-ended learning without predefined task distributions or manual intervention.", "link": "http://arxiv.org/abs/2603.28386v1", "date": "2026-03-30", "relevancy": 2.1593, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5441}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "lin {"title": "An Agentic Operationalization of DISARM for FIMI Investigation on Social Media", "author": "Kevin Tseng and Juan Carlos Toledano and Bart De Clerck and Yuliia Dukach and Phil Tinn", "abstract": "Interoperable data and intelligence flows among allied partners and operational end-users remain essential to NATO's collective defense across both conventional and hybrid threat environments. Foreign Information Manipulation and Interference (FIMI) increasingly spans multiple societal domains and information ecosystems, complicating threat characterization, persistent situational awareness, and coordinated response. Concurrent advances in AI have further lowered the barrier to conducting large-scale, AI-augmented FIMI activities -- including automated generation, personalization, and amplification of manipulative content. While frameworks such as DISARM offer a standardized analytical and metadata schema for characterizing FIMI incidents, their practical application for automating large-scale detection remains challenging. We present a framework-agnostic, agent-based operationalization of DISARM piloted to support FIMI investigation on social platforms. Our agent coordination pipeline integrates general agentic AI components that (1) identify candidate manipulative behaviors in social-media data and (2) map these behaviors to DISARM taxonomies through transparent, auditable reasoning steps. Evaluation on two practitioner-annotated, real-world datasets demonstrates that our approach can effectively scale analytic workflows that are currently manual, time-intensive, and interpretation-heavy. Notably, the experiment surfaced more than 30 previously undetected Russian bot accounts -- deployed for the 2025 election in Moldova -- during the prior non-agentic investigation. By enhancing analytic throughput, interoperability, and explainability, the proposed approach provides a direct contribution to defense policy and planning needs for improved situational awareness, cross-partner data integration, and rapid assessment of information-environment threats.", "link": "http://arxiv.org/abs/2601.15109v3", "date": "2026-03-30", "relevancy": 1.2158, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4172}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4143}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.3969}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20An%20Agentic%20Operationalization%20of%20DISARM%20for%20FIMI%20Investigation%20on%20Social%20Media&body=Title%3A%20An%20Agentic%20Operationalization%20of%20DISARM%20for%20FIMI%20Investigation%20on%20Social%20Media%0AAuthor%3A%20Kevin%20Tseng%20and%20Juan%20Carlos%20Toledano%20and%20Bart%20De%20Clerck%20and%20Yuliia%20Dukach%20and%20Phil%20Tinn%0AAbstract%3A%20Interoperable%20data%20and%20intelligence%20flows%20among%20allied%20partners%20and%20operational%20end-users%20remain%20essential%20to%20NATO%27s%20collective%20defense%20across%20both%20conventional%20and%20hybrid%20threat%20environments.%20Foreign%20Information%20Manipulation%20and%20Interference%20%28FIMI%29%20increasingly%20spans%20multiple%20societal%20domains%20and%20information%20ecosystems%2C%20complicating%20threat%20characterization%2C%20persistent%20situational%20awareness%2C%20and%20coordinated%20response.%20Concurrent%20advances%20in%20AI%20have%20further%20lowered%20the%20barrier%20to%20conducting%20large-scale%2C%20AI-augmented%20FIMI%20activities%20--%20including%20automated%20generation%2C%20personalization%2C%20and%20amplification%20of%20manipulative%20content.%20While%20frameworks%20such%20as%20DISARM%20offer%20a%20standardized%20analytical%20and%20metadata%20schema%20for%20characterizing%20FIMI%20incidents%2C%20their%20practical%20application%20for%20automating%20large-scale%20detection%20remains%20challenging.%20We%20present%20a%20framework-agnostic%2C%20agent-based%20operationalization%20of%20DISARM%20piloted%20to%20support%20FIMI%20investigation%20on%20social%20platforms.%20Our%20agent%20coordination%20pipeline%20integrates%20general%20agentic%20AI%20components%20that%20%281%29%20identify%20candidate%20manipulative%20behaviors%20in%20social-media%20data%20and%20%282%29%20map%20these%20behaviors%20to%20DISARM%20taxonomies%20through%20transparent%2C%20auditable%20reasoning%20steps.%20Evaluation%20on%20two%20practitioner-annotated%2C%20real-world%20datasets%20demonstrates%20that%20our%20approach%20can%20effectively%20scale%20analytic%20workflows%20that%20are%20currently%20manual%2C%20time-intensive%2C%20and%20interpretation-heavy.%20Notably%2C%20the%20experiment%20surfaced%20more%20than%2030%20previously%20undetected%20Russian%20bot%20accounts%20--%20deployed%20for%20the%202025%20election%20in%20Moldova%20--%20during%20the%20prior%20non-agentic%20investigation.%20By%20enhancing%20analytic%20throughput%2C%20interoperability%2C%20and%20explainability%2C%20the%20proposed%20approach%20provides%20a%20direct%20contribution%20to%20defense%20policy%20and%20planning%20needs%20for%20improved%20situational%20awareness%2C%20cross-partner%20data%20integration%2C%20and%20rapid%20assessment%20of%20information-environment%20threats.%0ALink%3A%20http%3A//arxiv.org/abs/2601.15109v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAn%2520Agentic%2520Operationalization%2520of%2520DISARM%2520for%2520FIMI%2520Investigation%2520on%2520Social%2520Media%26entry.906535625%3DKevin%2520Tseng%2520and%2520Juan%2520Carlos%2520Toledano%2520and%2520Bart%2520De%2520Clerck%2520and%2520Yuliia%2520Dukach%2520and%2520Phil%2520Tinn%26entry.1292438233%3DInteroperable%2520da {"title": "AgentDrift: Unsafe Recommendation Drift Under Tool Corruption Hidden by Ranking Metrics in LLM Agents", "author": "Zekun Wu and Adriano Koshiyama and Sahan Bulathwela and Maria Perez-Ortiz", "abstract": "Tool-augmented LLM agents increasingly operate as multi-turn advisors in high-stakes domains, yet their evaluation relies on ranking metrics that measure what is recommended but not whether it is safe for the user. We present a paired-trajectory protocol that replays real financial dialogues under clean and contaminated tool-output conditions across eight LLMs (7B to frontier), decomposing divergence into information-channel and memory-channel mechanisms. We observe evaluation blindness: recommendation quality is preserved under contamination (UPR~1.0) while risk-inappropriate products appear in 65-93% of turns, invisible to standard NDCG. Violations are information-channel-driven, emerge at turn 1, and persist without self-correction over 23-step trajectories. Even non-extreme perturbations (within-band corruption, narrative-only attacks) evade threshold monitors while producing significant drift. Susceptibility scales with instruction-following fidelity across all eight models. Sparse autoencoder probing reveals models internally distinguish adversarial perturbations but fail to propagate this signal to output; causal interventions (activation patching, feature clamping, direct steering) confirm this representation-to-action gap is structural and resists linear repair. A safety-penalized NDCG variant (sNDCG) reduces preservation ratios to 0.51-0.74. These results motivate trajectory-level safety monitoring for deployed multi-turn agents.", "link": "http://arxiv.org/abs/2603.12564v4", "date": "2026-03-30", "relevancy": 1.5384, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5445}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.478}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4684}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AgentDrift%3A%20Unsafe%20Recommendation%20Drift%20Under%20Tool%20Corruption%20Hidden%20by%20Ranking%20Metrics%20in%20LLM%20Agents&body=Title%3A%20AgentDrift%3A%20Unsafe%20Recommendation%20Drift%20Under%20Tool%20Corruption%20Hidden%20by%20Ranking%20Metrics%20in%20LLM%20Agents%0AAuthor%3A%20Zekun%20Wu%20and%20Adriano%20Koshiyama%20and%20Sahan%20Bulathwela%20and%20Maria%20Perez-Ortiz%0AAbstract%3A%20Tool-augmented%20LLM%20agents%20increasingly%20operate%20as%20multi-turn%20advisors%20in%20high-stakes%20domains%2C%20yet%20their%20evaluation%20relies%20on%20ranking%20metrics%20that%20measure%20what%20is%20recommended%20but%20not%20whether%20it%20is%20safe%20for%20the%20user.%20We%20present%20a%20paired-trajectory%20protocol%20that%20replays%20real%20financial%20dialogues%20under%20clean%20and%20contaminated%20tool-output%20conditions%20across%20eight%20LLMs%20%287B%20to%20frontier%29%2C%20decomposing%20divergence%20into%20information-channel%20and%20memory-channel%20mechanisms.%20We%20observe%20evaluation%20blindness%3A%20recommendation%20quality%20is%20preserved%20under%20contamination%20%28UPR~1.0%29%20while%20risk-inappropriate%20products%20appear%20in%2065-93%25%20of%20turns%2C%20invisible%20to%20standard%20NDCG.%20Violations%20are%20information-channel-driven%2C%20emerge%20at%20turn%201%2C%20and%20persist%20without%20self-correction%20over%2023-step%20trajectories.%20Even%20non-extreme%20perturbations%20%28within-band%20corruption%2C%20narrative-only%20attacks%29%20evade%20threshold%20monitors%20while%20producing%20significant%20drift.%20Susceptibility%20scales%20with%20instruction-following%20fidelity%20across%20all%20eight%20models.%20Sparse%20autoencoder%20probing%20reveals%20models%20internally%20distinguish%20adversarial%20perturbations%20but%20fail%20to%20propagate%20this%20signal%20to%20output%3B%20causal%20interventions%20%28activation%20patching%2C%20feature%20clamping%2C%20direct%20steering%29%20confirm%20this%20representation-to-action%20gap%20is%20structural%20and%20resists%20linear%20repair.%20A%20safety-penalized%20NDCG%20variant%20%28sNDCG%29%20reduces%20preservation%20ratios%20to%200.51-0.74.%20These%20results%20motivate%20trajectory-level%20safety%20monitoring%20for%20deployed%20multi-turn%20agents.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12564v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAgentDrift%253A%2520Unsafe%2520Recommendation%2520Drift%2520Under%2520Tool%2520Corruption%2520Hidden%2520by%2520Ranking%2520Metrics%2520in%2520LLM%2520Agents%26entry.906535625%3DZekun%2520Wu%2520and%2520Adriano%2520Koshiyama%2520and%2520Sahan%2520Bulathwela%2520and%2520Maria%2520Perez-Ortiz%26entry.1292438233%3DTool-augmented%2520LLM%2520agents%2520increasingly%2520operate%2520as%2520multi-turn%2520advisors%2520in%2520high-stakes%2520domains%252C%2520yet%2520their%2520evaluation%2520relies%2520on%2520ranking%2520metrics%2520that%2520measure%2520what%2520is%2520recommended%2520but%2520not%2520whether%2520it%2520is%2520safe%2520for%2520the%2520user.%2520We%2520present%2520a%2520paired-trajectory%2520protocol%2520that%2520replays%2520real%2520financial%2520dialogues%2520under%2520clean%2520and%2520contaminated%2520tool-output%2520conditions%2520across%2520eight%2520LLMs%2520%25287B%2520to%2520frontier%2529%252C%2520decomposing%2520divergence%2520into%2520information-channel%2520and%2520memory-channel%2520mechanisms.%2520We%2520observe%2520evaluation%2520blindness%253A%2520recommendation%2520quality%2520is%2520preserved%2520under%2520contamination%2520%2528UPR~1.0%2529%2520while%2520risk-inappropria {"title": "Critic-Free Deep Reinforcement Learning for Maritime Coverage Path Planning on Irregular Hexagonal Grids", "author": "Carlos S. Sep\u00falveda and Gonzalo A. Ruz", "abstract": "Maritime surveillance missions, such as search and rescue and environmental monitoring, rely on the efficient allocation of sensing assets over vast and geometrically complex areas. Traditional Coverage Path Planning (CPP) approaches depend on decomposition techniques that struggle with irregular coastlines, islands, and exclusion zones, or require computationally expensive re-planning for every instance. We propose a Deep Reinforcement Learning (DRL) framework to solve CPP on hexagonal grid representations of irregular maritime areas. Unlike conventional methods, we formulate the problem as a neural combinatorial optimization task where a Transformer-based pointer policy autoregressively constructs coverage tours. To overcome the instability of value estimation in long-horizon routing problems, we implement a critic-free Group-Relative Policy Optimization (GRPO) scheme. This method estimates advantages through within-instance comparisons of sampled trajectories rather than relying on a value function. Experiments on 1,000 unseen synthetic maritime environments demonstrate that a trained policy achieves a 99.0% Hamiltonian success rate, more than double the best heuristic (46.0%), while producing paths 7% shorter and with 24% fewer heading changes than the closest baseline. All three inference modes (greedy, stochastic sampling, and sampling with 2-opt refinement) operate under 50~ms per instance on a laptop GPU, confirming feasibility for real-time on-board deployment.", "link": "http://arxiv.org/abs/2603.28385v1", "date": "2026-03-30", "relevancy": 1.5209, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5232}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5025}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5023}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Critic-Free%20Deep%20Reinforcement%20Learning%20for%20Maritime%20Coverage%20Path%20Planning%20on%20Irregular%20Hexagonal%20Grids&body=Title%3A%20Critic-Free%20Deep%20Reinforcement%20Learning%20for%20Maritime%20Coverage%20Path%20Planning%20on%20Irregular%20Hexagonal%20Grids%0AAuthor%3A%20Carlos%20S.%20Sep%C3%BAlveda%20and%20Gonzalo%20A.%20Ruz%0AAbstract%3A%20Maritime%20surveillance%20missions%2C%20such%20as%20search%20and%20rescue%20and%20environmental%20monitoring%2C%20rely%20on%20the%20efficient%20allocation%20of%20sensing%20assets%20over%20vast%20and%20geometrically%20complex%20areas.%20Traditional%20Coverage%20Path%20Planning%20%28CPP%29%20approaches%20depend%20on%20decomposition%20techniques%20that%20struggle%20with%20irregular%20coastlines%2C%20islands%2C%20and%20exclusion%20zones%2C%20or%20require%20computationally%20expensive%20re-planning%20for%20every%20instance.%20We%20propose%20a%20Deep%20Reinforcement%20Learning%20%28DRL%29%20framework%20to%20solve%20CPP%20on%20hexagonal%20grid%20representations%20of%20irregular%20maritime%20areas.%20Unlike%20conventional%20methods%2C%20we%20formulate%20the%20problem%20as%20a%20neural%20combinatorial%20optimization%20task%20where%20a%20Transformer-based%20pointer%20policy%20autoregressively%20constructs%20coverage%20tours.%20To%20overcome%20the%20instability%20of%20value%20estimation%20in%20long-horizon%20routing%20problems%2C%20we%20implement%20a%20critic-free%20Group-Relative%20Policy%20Optimization%20%28GRPO%29%20scheme.%20This%20method%20estimates%20advantages%20through%20within-instance%20comparisons%20of%20sampled%20trajectories%20rather%20than%20relying%20on%20a%20value%20function.%20Experiments%20on%201%2C000%20unseen%20synthetic%20maritime%20environments%20demonstrate%20that%20a%20trained%20policy%20achieves%20a%2099.0%25%20Hamiltonian%20success%20rate%2C%20more%20than%20double%20the%20best%20heuristic%20%2846.0%25%29%2C%20while%20producing%20paths%207%25%20shorter%20and%20with%2024%25%20fewer%20heading%20changes%20than%20the%20closest%20baseline.%20All%20three%20inference%20modes%20%28greedy%2C%20stochastic%20sampling%2C%20and%20sampling%20with%202-opt%20refinement%29%20operate%20under%2050~ms%20per%20instance%20on%20a%20laptop%20GPU%2C%20confirming%20feasibility%20for%20real-time%20on-board%20deployment.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28385v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCritic-Free%2520Deep%2520Reinforcement%2520Learning%2520for%2520Maritime%2520Coverage%2520Path%2520Planning%2520on%2520Irregular%2520Hexagonal%2520Grids%26entry.906535625%3DCarlos%2520S.%2520Sep%25C3%25BAlveda%2520and%2520Gonzalo%2520A.%2520Ruz%26entry.1292438233%3DMaritime%2520surveillance%2520missions%252C%2520such%2520as%2520search%2520and%2520rescue%2520and%2520environmental%2520monitoring%252C%2520rely%2520on%2520the%2520efficient%2520allocation%2520of%2520sensing%2520assets%2520over%2520vast%2520and%2520geometrically%2520complex%2520areas.%2520Traditional%2520Coverage%2520Path%2520Planning%2520%2528CPP%2529%2520approaches%2520depend%2520on%2520decomposition%2520techniques%2520that%2520struggle%2520with%2520irregular%2520coastlines%252C%2520islands%252C%2520and%2520exclusion%2520zones%252C%2520or%2520require%2520computationally%2520expensive%2520re-planning%2520for%2520every%2520instance.%2520We%2520propose%2520a%2520Deep%2520Reinforcement%2520Learning%2520%2528DRL%2529%2520framework%2520to%2520solve%2520CPP%2520on%2520hexagonal%2520grid%2520representations%2520of%2520irregular%2520maritime%2520areas.%2520Unl {"title": "Pre-Deployment Complexity Estimation for Federated Perception Systems", "author": "KMA Solaiman and Shafkat Islam and Ruy de Oliveira and Bharat Bhargava", "abstract": "Edge AI systems increasingly rely on federated learning to train perception models in distributed, privacy-preserving, and resource-constrained environments. Yet, before training begins, practitioners often lack practical tools to estimate how difficult a federated learning task will be in terms of achievable accuracy and communication cost. This paper presents a classifier-agnostic, pre-deployment framework for estimating learning complexity in federated perception systems by jointly modeling intrinsic properties of the data and characteristics of the distributed environment. The proposed complexity metric integrates dataset attributes such as dimensionality, sparsity, and heterogeneity with factors related to the composition of participating clients. Using federated learning as a representative distributed training setting, we examine how learning difficulty varies across different federated configurations. Experiments on multiple variants of the MNIST dataset and CIFAR dataset show that the proposed metric strongly correlates with federated learning performance and the communication effort required to reach fixed accuracy targets. These findings suggest that complexity estimation can serve as a practical diagnostic tool for resource planning, dataset assessment, and feasibility evaluation in edge-deployed perception systems.", "link": "http://arxiv.org/abs/2603.28282v1", "date": "2026-03-30", "relevancy": 1.5334, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5148}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5094}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5036}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Pre-Deployment%20Complexity%20Estimation%20for%20Federated%20Perception%20Systems&body=Title%3A%20Pre-Deployment%20Complexity%20Estimation%20for%20Federated%20Perception%20Systems%0AAuthor%3A%20KMA%20Solaiman%20and%20Shafkat%20Islam%20and%20Ruy%20de%20Oliveira%20and%20Bharat%20Bhargava%0AAbstract%3A%20Edge%20AI%20systems%20increasingly%20rely%20on%20federated%20learning%20to%20train%20perception%20models%20in%20distributed%2C%20privacy-preserving%2C%20and%20resource-constrained%20environments.%20Yet%2C%20before%20training%20begins%2C%20practitioners%20often%20lack%20practical%20tools%20to%20estimate%20how%20difficult%20a%20federated%20learning%20task%20will%20be%20in%20terms%20of%20achievable%20accuracy%20and%20communication%20cost.%20This%20paper%20presents%20a%20classifier-agnostic%2C%20pre-deployment%20framework%20for%20estimating%20learning%20complexity%20in%20federated%20perception%20systems%20by%20jointly%20modeling%20intrinsic%20properties%20of%20the%20data%20and%20characteristics%20of%20the%20distributed%20environment.%20The%20proposed%20complexity%20metric%20integrates%20dataset%20attributes%20such%20as%20dimensionality%2C%20sparsity%2C%20and%20heterogeneity%20with%20factors%20related%20to%20the%20composition%20of%20participating%20clients.%20Using%20federated%20learning%20as%20a%20representative%20distributed%20training%20setting%2C%20we%20examine%20how%20learning%20difficulty%20varies%20across%20different%20federated%20configurations.%20Experiments%20on%20multiple%20variants%20of%20the%20MNIST%20dataset%20and%20CIFAR%20dataset%20show%20that%20the%20proposed%20metric%20strongly%20correlates%20with%20federated%20learning%20performance%20and%20the%20communication%20effort%20required%20to%20reach%20fixed%20accuracy%20targets.%20These%20findings%20suggest%20that%20complexity%20estimation%20can%20serve%20as%20a%20practical%20diagnostic%20tool%20for%20resource%20planning%2C%20dataset%20assessment%2C%20and%20feasibility%20evaluation%20in%20edge-deployed%20perception%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28282v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPre-Deployment%2520Complexity%2520Estimation%2520for%2520Federated%2520Perception%2520Systems%26entry.906535625%3DKMA%2520Solaiman%2520and%2520Shafkat%2520Islam%2520and%2520Ruy%2520de%2520Oliveira%2520and%2520Bharat%2520Bhargava%26entry.1292438233%3DEdge%2520AI%2520systems%2520increasingly%2520rely%2520on%2520federated%2520learning%2520to%2520train%2520perception%2520models%2520in%2520distributed%252C%2520privacy-preserving%252C%2520and%2520resource-constrained%2520environments.%2520Yet%252C%2520before%2520training%2520begins%252C%2520practitioners%2520often%2520lack%2520practical%2520tools%2520to%2520estimate%2520how%2520difficult%2520a%2520federated%2520learning%2520task%2520will%2520be%2520in%2520terms%2520of%2520achievable%2520accuracy%2520and%2520communication%2520cost.%2520This%2520paper%2520presents%2520a%2520classifier-agnostic%252C%2520pre-deployment%2520framework%2520for%2520estimating%2520learning%2520complexity%2520in%2520federated%2520perception%2520systems%2520by%2520jointly%2520modeling%2520intrinsic%2520properties%2520of%2520the%2520data%2520and%2520characteristics%2520of%2520the%2520distributed%2520environment.%2520The%2520proposed%2520complexity%2520metric%2520integrates%2520dataset%2520attributes%2520such%2520as%2520dimensionality%252C%2520sparsity%252C%2520and%2520heterogeneity%2520with%2520factors%2520related%2520to%2520the%2520composition%2520of%2520participating%2520clients.%2520Using%2520federated%2520learning%2520as%2520a%2520representative%2520distributed%2520training%2520setting%252C%2520we%2520examine%2520how%2520learning%252 {"title": "Communications-Aware NMPC for Multi-Rotor Aerial Relay Networks Under Jamming Interference", "author": "Giuseppe Silano and Daniel Bonilla Licea and Davide Liuzza and Antonio Franchi and Martin Saska", "abstract": "Multi-Rotor Aerial Vehicles (MRAVs) are increasingly used in communication-dependent missions where connectivity loss directly compromises task execution. Existing anti-jamming strategies often decouple motion from communication, overlooking that link quality depends on vehicle attitude and antenna orientation. In coplanar platforms, \"tilt-to-translate\" maneuvers can inadvertently align antenna nulls with communication partners, causing severe degradation under interference. This paper presents a modular communications-aware control framework that combines a high-level max-min trajectory generator with an actuator-level Nonlinear Model Predictive Controller (NMPC). The trajectory layer optimizes the weakest link under jamming, while the NMPC enforces vehicle dynamics, actuator limits, and antenna-alignment constraints. Antenna directionality is handled geometrically, avoiding explicit radiation-pattern parametrization. The method is evaluated in a relay scenario with an active jammer and compared across coplanar and tilted-propeller architectures. Results show a near two-order-of-magnitude increase in minimum end-to-end capacity, markedly reducing outage events, with moderate average-capacity gains. Tilted platforms preserve feasibility and link quality, whereas coplanar vehicles show recurrent degradation. These findings indicate that full actuation is a key enabler of reliable communications-aware operation under adversarial directional constraints.", "link": "http://arxiv.org/abs/2603.28467v1", "date": "2026-03-30", "relevancy": 1.8131, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4689}, {"title" n%20a%20relay%20scenario%20with%20an%20active%20jammer%20and%20compared%20across%20coplanar%20and%20tilted-propeller%20architectures.%20Results%20show%20a%20near%20two-order-of-magnitude%20increase%20in%20minimum%20end-to-end%20capacity%2C%20markedly%20reducing%20outage%20events%2C%20with%20moderate%20average-capacity%20gains.%20Tilted%20platforms%20preserve%20feasibility%20and%20link%20quality%2C%20whereas%20coplanar%20vehicles%20show%20recurrent%20degradation.%20These%20findings%20indicate%20that%20full%20actuation%20is%20a%20key%20enabler%20of%20reliable%20communications-aware%20operation%20under%20adversarial%20directional%20constraints.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28467v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCommunications-Aware%2520NMPC%2520for%2520Multi-Rotor%2520Aerial%2520Relay%2520Networks%2520Under%2520Jamming%2520Interference%26entry.906535625%3DGiuseppe%2520Silano%2520and%2520Daniel%2520Bonilla%2520Licea%2520and%2520Davide%2520Liuzza%2520and%2520Antonio%2520Franchi%2520and%2520Martin%2520Saska%26entry.1292438233%3DMulti-Rotor%2520Aerial%2520Vehicles%2520%2528MRAVs%2529%2520are%2520increasingly%2520used%2520in%2520communication-dependent%2520missions%2520where%2520connectivity%2520loss%2520directly%2520compromises%2520task%2520execution.%2520Existing%2520anti-jamming%2520strategies%2520often%2520decouple%2520motion%2520from%2520communication%252C%2520overlooking%2520that%2520link%2520quality%2520depends%2520on%2520vehicle%2520attitude%2520and%2520antenna%2520orientation.%2520In%2520coplanar%2520platforms%252C%2520%2522tilt-to-translate%2522%2520maneuvers%2520can%2520inadvertently%2520align%2520antenna%2520nulls%2520with%2520communication%2520partners%252C%2520causing%2520severe%2520degradation%2520under%2520interference.%2520This%2520paper%2520presents%2520a%2520modular%2520communications-aware%2520control%2520framework%2520that%2520combines%2520 {"title": "Evolutionary Discovery of Reinforcement Learning Algorithms via Large Language Models", "author": "Alkis Sygkounas and Amy Loutfi and Andreas Persson", "abstract": "Reinforcement learning algorithms are defined by their learning update rules, which are typically hand-designed and fixed. We present an evolutionary framework for discovering reinforcement learning algorithms by searching directly over executable update rules that implement complete training procedures. The approach builds on REvolve, an evolutionary system that uses large language models as generative variation operators, and extends it from reward-function discovery to algorithm discovery. To promote the emergence of nonstandard learning rules, the search excludes canonical mechanisms such as actor--critic structures, temporal-difference losses, and value bootstrapping. Because reinforcement learning algorithms are highly sensitive to internal scalar parameters, we introduce a post-evolution refinement stage in which a large language model proposes feasible hyperparameter ranges for each evolved update rule. Evaluated end-to-end by full training runs on multiple Gymnasium benchmarks, the discovered algorithms achieve competitive performance relative to established baselines, including SAC, PPO, DQN, and A2C.", "link": "http://arxiv.org/abs/2603.28416v1", "date": "2026-03-30", "relevancy": 1.8653, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4831}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4747}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4512}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Evolutionary%20Discovery%20of%20Reinforcement%20Learning%20Algorithms%20via%20Larg {"title": "MaskDiME: Adaptive Masked Diffusion for Precise and Efficient Visual Counterfactual Explanations", "author": "Changlu Guo and Anders Nymark Christensen and Anders Bjorholm Dahl and Morten Rieger Hannemose", "abstract": "Visual counterfactual explanations aim to reveal the minimal semantic modifications that can alter a model's prediction, providing causal and interpretable insights into deep neural networks. However, existing diffusion-based counterfactual generation methods are often computationally expensive, slow to sample, and imprecise in localizing the modified regions. To address these limitations, we propose MaskDiME, a simple, fast, yet effective diffusion framework that unifies semantic consistency and spatial precision through localized sampling. Our approach adaptively focuses on decision-relevant regions to achieve localized and semantically consistent counterfactual generation while preserving high image fidelity. Our training-free framework, MaskDiME, performs inference over 30x faster than the baseline and achieves comparable or state-of-the-art performance across five benchmark datasets spanning diverse visual domains, establishing a practical and generalizable solution for efficient counterfactual explanation.", "link": "http://arxiv.org/abs/2602.18792v2", "date": "2026-03-30", "relevancy": 1.8033, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.6344}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5943}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5847}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MaskDiME%3A%20Adaptive%20Masked%20Diffusion%20for%20Precise%20and%20Efficient%20Visual%20Counterfactual%20Explanations&body=Title%3A% {"title": "Declarative Scenario-based Testing with RoadLogic", "author": "Ezio Bartocci and Alessio Gambi and Felix Gigler and Cristinel Mateis and Dejan Ni\u010dkovi\u0107", "abstract": "Scenario-based testing is a key method for cost-effective and safe validation of autonomous vehicles (AVs). Existing approaches rely on imperative scenario definitions, requiring developers to manually enumerate numerous variants to achieve coverage. Declarative languages, such as ASAM OpenSCENARIO DSL (OS2), raise the abstraction level but lack systematic methods for instantiating concrete and specification-compliant scenarios. To our knowledge, currently, no open-source solution provides this capability.\n  We present RoadLogic that bridges declarative OS2 specifications and executable simulations. It uses Answer Set Programming to generate abstract plans satisfying scenario constraints, motion planning to refine the plans into feasible trajectories, and specification-based monitoring to verify correctness.\n  We evaluate RoadLogic on instantiating representative OS2 scenarios executed in the CommonRoad framework. Results show that RoadLogic consistently produces realistic, specification-satisfying simulations within minutes and captures diverse behavioral variants through parameter sampling, thus opening the door to systematic scenario-based testing for autonomous driving systems.", "link": "http://arxiv.org/abs/2603.09455v2", "date": "2026-03-30", "relevancy": 1.481, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5307}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4919}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.4795}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Declarative%20Scenario-based%20Testing%20with%20RoadLogic&body=Title%3A%20Declarative%20Scenario-based%20Testing%20with%20RoadLogic%0AAuthor%3A%20Ezio%20Bartocci%20and%20Alessio%20Gambi%20and%20Felix%20Gigler%20and%20Cristinel%20Mateis%20and%20Dejan%20Ni%C4%8Dkovi%C4%87%0AAbstract%3A%20Scenario-based%20testing%20is%20a%20key%20method%20for%20cost-effective%20and%20safe%20validation%20of%20autonomous%20vehicles%20%28AVs%29.%20Existing%20approaches%20rely%20on%20imperative%20scenario%20definitions%2C%20requiring%20developers%20to%20manually%20enumerate%20numerous%20variants%20to%20achieve%20coverage.%20Declarative%20languages%2C%20such%20as%20ASAM%20OpenSCENARIO%20DSL%20%28OS2%29%2C%20raise%20the%20abstraction%20level%20but%20lack%20systematic%20methods%20for%20instantiating%20concrete%20and%20specification-compliant%20scenarios.%20To%20our%20knowledge%2C%20currently%2C%20no%20open-source%20solution%20provides%20this%20capability.%0A%20%20We%20present%20RoadLogic%20that%20bridges%20declarative%20OS2%20specifications%20and%20executable%20simulations.%20It%20uses%20Answer%20Set%20Programming%20to%20generate%20abstract%20plans%20satisfying%20scenario%20constraints%2C%20motion%20planning%20to%20refine%20the%20plans%20into%20feasible%20trajectories%2C%20and%20specification-based%20monitoring%20to%20verify%20correctness.%0A%20%20We%20evaluate%20RoadLogic%20on%20instantiating%20representative%20OS2%20scenarios%20executed%20in%20the%20CommonRoad%20framework.%20Results%20show%20that%20RoadLogic%20consistently%20produces%20realistic%2C%20specification-satisfying%20simulations%20within%20minutes%20and%20captures%20diverse%20behavioral%20variants%20through%20parameter%20sampling%2C%20thus%20opening%20the%20door%20to%20systematic%20scenario-based%20testing%20for%20autonomous%20driving%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09455v2%0AForm%3A%20https%3A//docs.google.co se%2520behavioral%2520variants%2520through%2520parameter%2520sampling%252C%2520thus%2520opening%2520the%2520door%2520to%2520systematic%2520scenario-based%2520testing%2520for%2520autonomous%2520driving%2520systems.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.09455v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Declarative%20Scenario-based%20Testing%20with%20RoadLogic&entry.906535625=Ezio%20Bartocci%20and%20Alessio%20Gambi%20and%20Felix%20Gigler%20and%20Cristinel%20Mateis%20and%20Dejan%20Ni%C4%8Dkovi%C4%87&entry.1292438233=Scenario-based%20testing%20is%20a%20key%20method%20for%20cost-effective%20and%20safe%20validation%20of%20autonomous%20vehicles%20%28AVs%29.%20Existing%20approaches%20rely%20on%20imperative%20scenario%20definitions%2C%20requiring%20developers%20to%20manually%20enumerate%20numerous%20variants%20to%20achieve%20coverage.%20Declarative%20languages%2C%20such%20as%20ASAM%20OpenSCENARIO%20DSL%20%28OS2%29%2C%20raise%20the%20abstraction%20level%20but%20lack%20systematic%20methods%20for%20instantiating%20concrete%20and%20specification-compliant%20scenarios.%20To%20our%20knowledge%2C%20currently%2C%20no%20open-source%20solution%20provides%20this%20capability.%0A%20%20We%20present%20RoadLogic%20that%20bridges%20declarative%20OS2%20specifications%20and%20executable%20simulations.%20It%20uses%20Answer%20Set%20Programming%20to%20generate%20abstract%20plans%20satisfying%20scenario%20constraints%2C%20motion%20planning%20to%20refine%20the%20plans%20into%20feasible%20trajectories%2C%20and%20specification-based%20monitoring%20to%20verify%20correctness.%0A%20%20We%20evaluate%20RoadLogic%20on%20instantiating%20representative%20OS2%20scenarios%20executed%20in%20the%20CommonRoad%20framework.%20Results%20show%20that%20RoadLogic%20consistently%20produces%20realistic%2C%20specification-satisfying%20simulations%20within%20minutes%20and%20captures%20diverse%20behavioral%20variants%20through%20parameter%20sampling%2C%20thus%20opening%20the%20door%20to%20systematic%20scenario-based%20testing%20for%20autonomous%20driving%20systems.&entry.1838667208=http%3A//arxiv.org/abs/2603.09455v2&entry.124074799=Read"},
{"title": "ManipArena: Comprehensive Real-world Evaluation of Reasoning-Oriented Generalist Robot Manipulation", "author": "Yu Sun and Meng Cao and Ping Yang and Rongtao Xu and Yunxiao Yan and Runze Xu and Liang Ma and Roy Gan and Andy Zhai and Qingxuan Chen and Zunnan Xu and Hao Wang and Jincheng Yu and Lucy Liang and Qian Wang and Ivan Laptev and Ian D Reid and Xiaodan Liang", "abstract": "Vision-Language-Action (VLA) models and world models have recently emerged as promising paradigms for general-purpose robotic intelligence, yet their progress is hindered by the lack of reliable evaluation protocols that reflect real-world deployment. Existing benchmarks are largely simulator-centric, which provide controllability but fail to capture the reality gap caused by perception noise, complex contact dynamics, hardware constraints, and system latency. Moreover, fragmented real-world evaluations across different robot platforms prevent fair and reproducible comparison. To address these challenges, we introduce ManipArena, a standardized evaluation framework designed to bridge simulation and real-world execution. ManipArena comprises 20 diverse tasks across 10,812 expert trajectories emphasizing reasoning-oriented manipulation tasks requiring semantic and spatial reasoning, supports multi-level generalization through controlled out-of-distribution settings, and incorporates long-horizon mobile manipulation beyond tabletop scenarios. The framework further provides rich sensory diagnostics, including low-level motor signals, and synchronized real-to-sim environments constructed via high-quality 3D scanning. Together, these features enable fair, realistic, and reproducible evaluation for both VLA and world model approaches, providing a scalable foundation for diagnosing and advancing embodied intelligence systems.", "link": "http://arxiv.org/abs/2603.28545v1", "date": "2026-03-30", "relevancy": 1.7483, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.6489}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5851}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5554}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ManipArena%3A%20Comprehensive%20Real-world%20Evaluation%20of%20Reasoning-Oriented%20Generalist%20Robot%20Manipulation&body=Title%3A%20ManipArena%3A%20Comprehensive%20Real-world%20Evaluation%20of%20Reasoning-Oriented%20Generalist%20Robot%20Manipulation%0AAuthor%3A%20Yu%20Sun%20and%20Meng%20Cao%20and%20Ping%20Yang%20and%20Rongtao%20Xu%20and%20Yunxiao%20Yan%20and%20Runze%20Xu%20and%20Liang%20Ma%20and%20Roy%20Gan%20and%20Andy%20Zhai%20and%20Qingxuan%20Chen%20and%20Zunnan%20Xu%20and%20Hao%20Wang%20and%20Jincheng%20Yu%20and%20Lucy%20Liang%20and%20Qian%20Wang%20and%20Ivan%20Laptev%20and%20Ian%20D%20Reid%20and%20Xiaodan%20Liang%0AAbstract%3A%20Vision-Language-Action%20%28VLA%29%20models%20and%20world%20models%20have%20recently%20emerged%20as%20promising%20paradigms%20for%20general-purpose%20robotic%20intelligence%2C%20yet%20their%20progress%20is%20hindered%20by%20the%20lack%20of%20reliable%20evaluation%20protocols%20that%20reflect%20real-world%20deployment.%20Existing%20benchmarks%20are%20largely%20simulator-centric%2C%20which%20provide%20controllability%20but%20fail%20to%20capture%20the%20reality%20gap%20caused%20by%20perception%20noise%2C%20complex%20contact%20dynamics%2C%20hardware%20constraints%2C%20and%20system%20latency.%20Moreover%2C%20fragmented%20real-world%20evaluations%20across%20different%20robot%20platforms%20prevent%20fair%20and%20reproducible%20comparison.%20To%20address%20these%20challenges%2C%20we%20introduce%20ManipArena%2C%20a%20standardized%20evaluation%20framework%20designed%20to%20bridge%20simulation%20and%20real-world%20execution.%20ManipArena%20comprises%2020%20diverse%20tasks%20across%2010%2C812%20expert%20trajectories%20emphasizing%20reasoning-oriented%20manipulation%20tasks%20requiring%20semantic%20and%20spatial%20reasoning%2C%20supports%20multi-level%20generalization%20through%20controlled%20out-of-distribution%20settings%2C%20and%20incorporates%20long-horizon%20mobile%20manipulation%20beyond%20tabletop%20scenarios.%20The%20framework%20further%20provides%20rich%20sensory%20diagnostics%2C%20including%20low-level%20motor%20signals%2C%20and%20synchronized%20real-to-sim%20environments%20constructed%20via%20high-quality%203D%20scanning.%20Together%2C%20these%20features%20enable%20fair%2C%20realistic%2C%20and%20reproducible%20evaluation%20for%20both%20VLA%20and%20world%20model%20approaches%2C%20providing%20a%20scalable%20foundation%20for%20diagnosing%20and%20advancing%20embodied%20intelligence%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28545v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DManipArena%253A%2520Comprehensive%2520Real-world%2520Evaluation%2520of%2520Reasoning-Oriented%2520Generalist%2520Robot%2520Manipulation%26entry.906535625%3DYu%2520Sun%2520and%2520Meng%2520Cao%2520and%2520Ping%2520Yang%2520and%2520Rongtao%2520Xu%2520and%2520Yunxiao%2520Yan%2520and%2520Runze%2520Xu%2520and%2520Liang%2520Ma%2520and%2520Roy%2520Gan%2520and%2520Andy%2520Zhai%2520and%2520Qingxuan%2520Chen%2520and%2520Zunnan%2520Xu%2520and%2520Hao%2520Wang%2520and%2520Jincheng%2520Yu%2520and%2520Lucy%2520Liang%2520and%2520Qian%2520Wang%2520and%2520Ivan%2520Laptev%2520and%2520Ian%2520D%2520Reid%2520and%2520Xiaodan%2520Liang%26entry.1292438233%3DVision-Language-Action%2520%2528VLA%2529%2520models%2520and%2520world%2520models%2520have%2520recently%2520emerged%2520as%2520promising%2520paradigms%2520for%2 {"title": "StreamingVLA: Streaming Vision-Language-Action Model with Action Flow Matching and Adaptive Early Observation", "author": "Yiran Shi and Dongqi Guo and Tianchen Zhao and Feng Gao and Liangzhi Shi and Chao Yu and ZhiJian Mo and Qihua Xiao and XiaoShuai Peng and Qingmin Liao and Yu Wang", "abstract": "Vision-language-action (VLA) models have demonstrated exceptional performance in natural language-driven perception and control. However, the high computational cost of VLA models poses significant efficiency challenges, particularly for resource-constrained edge platforms in real-world deployments. However, since different stages of VLA (observation, action generation and execution) must proceed sequentially, and wait for the completion of the preceding stage, the system suffers from frequent halting and high latency. To address this, We conduct a systematic analysis to identify the challenges for fast and fluent generation, and propose enabling VLAs with the ability to asynchronously parallelize across VLA stages in a \"streaming\" manner. First, we eliminate the reliance on action chunking and adopt action flow matching, which learns the trajectory of action flows rather than denoising chunk-wise actions. It overlaps the latency of action generation and execution. Second, we design an action saliency-aware adaptive observation mechanism, thereby overlapping the latency of execution and observation. Without sacrificing performance, StreamingVLA achieves substantial speedup and improves the fluency of execution. It achieves a 2.4 $\\times$ latency speedup and reduces execution halting by 6.5 $\\times$.", "link": "http://arxiv.org/abs/2603.28565v1", "date": "2026-03-30", "relevancy": 1.5215, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5188}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

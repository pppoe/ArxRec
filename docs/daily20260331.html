{"title": "Equivariant symmetry-aware head pose estimation for fetal MRI", "author": "Ramya Muthukrishnan and Borjan Gagoski and Aryn Lee and P. Ellen Grant and Elfar Adalsteinsson and Benjamin Billot and Polina Golland", "abstract": "We present E(3)-Pose, a novel fast pose estimation method that jointly and explicitly models rotation equivariance and object symmetry. Our work is motivated by the challenging problem of accounting for fetal head motion during a diagnostic MRI scan. We aim to enable automatic adaptive prescription of diagnostic 2D MRI slices with 6-DoF head pose estimation, supported by rapid low-resolution 3D MRI volumes acquired before each 2D slice. Existing pose estimation methods struggle to generalize to clinical volumes due to pose ambiguities induced by inherent anatomical symmetries, as well as low resolution, noise, and artifacts. In contrast, E(3)-Pose captures anatomical symmetries and rigid pose equivariance by construction, and yields robust estimates of the fetal head pose. Our experiments on publicly available and representative clinical fetal MRI datasets demonstrate the superior robustness and generalization of our method across domains. Crucially, E(3)-Pose achieves state-of-the-art accuracy on clinical MRI volumes, supporting future clinical translation. Our implementation is publicly available at github.com/MedicalVisionGroup/E3-Pose.", "link": "http://arxiv.org/abs/2512.04890v7", "date": "2026-03-30", "relevancy": 2.7198, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5582}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.5369}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.5369}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Equivariant%20symmetry-aware%20head%20pose%20estimation%20for%20fetal%20MRI&body=Title%3A%20Equivariant%20symmetry-aware%20head%20pose%20estimation%20for%20fetal%20MRI%0AAuthor%3A%20Ramya%20Muthukrishnan%20and%20Borjan%20Gagoski%20and%20Aryn%20Lee%20and%20P.%20Ellen%20Grant%20and%20Elfar%20Adalsteinsson%20and%20Benjamin%20Billot%20and%20Polina%20Golland%0AAbstract%3A%20We%20present%20E%283%29-Pose%2C%20a%20novel%20fast%20pose%20estimation%20method%20that%20jointly%20and%20explicitly%20models%20rotation%20equivariance%20and%20object%20symmetry.%20Our%20work%20is%20motivated%20by%20the%20challenging%20problem%20of%20accounting%20for%20fetal%20head%20motion%20during%20a%20diagnostic%20MRI%20scan.%20We%20aim%20to%20enable%20automatic%20adaptive%20prescription%20of%20diagnostic%202D%20MRI%20slices%20with%206-DoF%20head%20pose%20estimation%2C%20supported%20by%20rapid%20low-resolution%203D%20MRI%20volumes%20acquired%20before%20each%202D%20slice.%20Existing%20pose%20estimation%20methods%20struggle%20to%20generalize%20to%20clinical%20volumes%20due%20to%20pose%20ambiguities%20induced%20by%20inherent%20anatomical%20symmetries%2C%20as%20well%20as%20low%20resolution%2C%20noise%2C%20and%20artifacts.%20In%20contrast%2C%20E%283%29-Pose%20captures%20anatomical%20symmetries%20and%20rigid%20pose%20equivariance%20by%20construction%2C%20and%20yields%20robust%20estimates%20of%20the%20fetal%20head%20pose.%20Our%20experiments%20on%20publicly%20available%20and%20representative%20clinical%20fetal%20MRI%20datasets%20demonstrate%20the%20superior%20robustness%20and%20generalization%20of%20our%20method%20across%20domains.%20Crucially%2C%20E%283%29-Pose%20achieves%20state-of-the-art%20accuracy%20on%20clinical%20MRI%20volumes%2C%20supporting%20future%20clinical%20translation.%20Our%20implementation%20is%20publicly%20available%20at%20github.com/MedicalVisionGroup/E3-Pose.%0ALink%3A%20http%3A//arxiv.org/abs/2512.04890v7%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848% {"title": "OMG-Bench: A New Challenging Benchmark for Skeleton-based Online Micro Hand Gesture Recognition", "author": "Haochen Chang and Pengfei Ren and Buyuan Zhang and Da Li and Tianhao Han and Haoyang Zhang and Liang Xie and Hongbo Chen and Erwei Yin", "abstract": "Online micro gesture recognition from hand skeletons is critical for VR/AR interaction but faces challenges due to limited public datasets and task-specific algorithms. Micro gestures involve subtle motion patterns, which make constructing datasets with precise skeletons and frame-level annotations difficult. To this end, we develop a multi-view self-supervised pipeline to automatically generate skeleton data, complemented by heuristic rules and expert refinement for semi-automatic annotation. Based on this pipeline, we introduce OMG-Bench, the first large-scale public benchmark for skeleton-based online micro gesture recognition. It features 40 fine-grained gesture classes with 13,948 instances across 1,272 sequences, characterized by subtle motions, rapid dynamics, and continuous execution. To tackle these challenges, we propose Hierarchical Memory-Augmented Transformer (HMATr), an end-to-end framework that unifies gesture detection and classification by leveraging hierarchical memory banks which store frame-level details and window-level semantics to preserve historical context. In addition, it employs learnable position-aware queries initialized from the memory to implicitly encode gesture positions and semantics. Experiments show that HMATr outperforms state-of-the-art methods by 7.6% in detection rate, establishing a strong baseline for online micro gesture recognition. Project page: https://omg-bench.github.io/", "link": "http://arxiv.org/abs/2512.16727v2", "date": "2026-03-30", "relevancy": 2.7059, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5621}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5368}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5247}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OMG-Bench%3A%20A%20New%20Challenging%20Benchmark%20for%20Skeleton-based%20Online%20Micro%20Hand%20Gesture%20Recognition&body=Title%3A%20OMG-Bench%3A%20A%20New%20Challenging%20Benchmark%20for%20Skeleton-based%20Online%20Micro%20Hand%20Gesture%20Recognition%0AAuthor%3A%20Haochen%20Chang%20and%20Pengfei%20Ren%20and%20Buyuan%20Zhang%20and%20Da%20Li%20and%20Tianhao%20Han%20and%20Haoyang%20Zhang%20and%20Liang%20Xie%20and%20Hongbo%20Chen%20and%20Erwei%20Yin%0AAbstract%3A%20Online%20micro%20gesture%20recognition%20from%20hand%20skeletons%20is%20critical%20for%20VR/AR%20interaction%20but%20faces%20challenges%20due%20to%20limited%20public%20datasets%20and%20task-specific%20algorithms.%20Micro%20gestures%20involve%20subtle%20motion%20patterns%2C%20which%20make%20constructing%20datasets%20with%20precise%20skeletons%20and%20frame-level%20annotations%20difficult.%20To%20this%20end%2C%20we%20develop%20a%20multi-view%20self-supervised%20pipeline%20to%20automatically%20generate%20skeleton%20data%2C%20complemented%20by%20heuristic%20rules%20and%20expert%20refinement%20for%20semi-automatic%20annotation.%20Based%20on%20this%20pipeline%2C%20we%20introduce%20OMG-Bench%2C%20the%20first%20large-scale%20public%20benchmark%20for%20skeleton-based%20online%20micro%20gesture%20recognition.%20It%20features%2040%20fine-grained%20gesture%20classes%20with%2013%2C948%20instances%20across%201%2C272%20sequences%2C%20characterized%20by%20subtle%20motions%2C%20rapid%20dynamics%2C%20and%20continuous%20execution.%20To%20tackle%20these%20challenges%2C%20we%20propose%20Hierarchical%20Memory-Augmented%20Transformer%20%28HMATr%29%2C%20an%20end-to-end%20framework%20that%20unifies%20gesture%20detection%20and%20classification%20by%20leveraging%20hierarchical%20memory%20banks%20which%20store%20frame-level%20details%20and%20window-level%20semantics%20to%20preserve%20historical%20context.%20In%20addition%2C%20it%20employs%20learnable%20position-aware%20queries%20initialized%20from%20the%20memory%20to%20implicitly%20encode%20gesture%20positions%20and%20semantics.%20Experiments%20show%20that%20HMATr%20outperforms%20state-of-the-art%20methods%20by%207.6%25%20in%20detection%20rate%2C%20establishing%20a%20strong%20baseline%20for%20online%20micro%20gesture%20recognition.%20Project%20page%3A%20https%3A//omg-bench.github.io/%0ALink%3A%20http%3A//arxiv.org/abs/2512.16727v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOMG-Bench%253A%2520A%2520New%2520Challenging%2520Benchmark%2520for%2520Skeleton-based%2520Online%2520Micro%2520Hand%2520Gesture%2520Recognition%26entry.906535625%3DHaochen%2520Chang%2520and%2520Pengfei%2520Ren%2520and%2520Buyuan%2520Zhang%2520and%2520Da%2520Li%2520and%2520Tianhao%2520Han%2520and%2520Haoyang%2520Zhang%2520and%2520Liang%2520Xie%2520and%2520Hongbo%2520Chen%2520and%2520Erwei%2520Yin%26entry.1292438233%3DOnline%2520micro%2520gesture%2520recognition%2520from%2520hand%2520skeletons%2520is%2520critical%2520for%2520VR/AR%2520interaction%2520but%2520faces%2520challenges%2520due%2520to%2520limited%2520public%2520datasets%2520and%2520task-specific%2520algorithms.%2520Micro%2520gestures%2520involve%2520subtle%2520motion%2520patterns%252C%2520which%2520make%2520constructing%2520datasets%2520with%2520precise%2520skeletons%2520and%2520frame-level%2520annotations%2520difficult.%2520To%2520this%2520end%252C%2520we%2520develop%2520a%2520multi-view%2520self-supervised%2520pipeline%2520to%2520automatically%2520generate%2520skeleton%2520data%252C%2520complemented%2520by%2520heuristic%2520rules%2520and%2520expert%2520refinement%2520for%2520semi-automatic%2520annotation.%252 {"title": "Understanding the Use of a Large Language Model-Powered Guide to Make Virtual Reality Accessible for Blind and Low Vision People", "author": "Jazmin Collins and Sharon Y Lin and Tianqi Liu and Andrea Stevenson Won and Shiri Azenkot", "abstract": "As social virtual reality (VR) grows more popular, addressing accessibility for blind and low vision (BLV) users is increasingly critical. Researchers have proposed an AI \"sighted guide\" to help users navigate VR and answer their questions, but it has not been studied with users. To address this gap, we developed a large language model (LLM)-powered guide and studied its use with 16 BLV participants in virtual environments with confederates posing as other users. We found that when alone, participants treated the guide as a tool, but treated it companionably around others, giving it nicknames, rationalizing its mistakes with its appearance, and encouraging confederate-guide interaction. Our work furthers understanding of guides as a versatile method for VR accessibility and presents design recommendations for future guides.", "link": "http://arxiv.org/abs/2603.09964v2", "date": "2026-03-30", "relevancy": 2.6611, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.542}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5273}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5273}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Understanding%20the%20Use%20of%20a%20Large%20Language%20Model-Powered%20Guide%20to%20Make%20Virtual%20Reality%20Accessible%20for%20Blind%20and%20Low%20Vision%20People&body=Title%3A%20Understanding%20the%20Use%20of%20a%20Large%20Lan {"title": "LACE: Loss-Adaptive Capacity Expansion for Continual Learning", "author": "Shivnath Tathe", "abstract": "Fixed representational capacity is a fundamental constraint in continual learning: practitioners must guess an appropriate model width before training, without knowing how many distinct concepts the data contains. We propose LACE (Loss-Adaptive Capacity Expansion), a simple online mechanism that expands a model's representational capacity during training by monitoring its own loss signal. When sustained loss deviation exceeds a threshold - indicating that the current capacity is insufficient for newly encountered data - LACE adds new dimensions to the projection layer and trains them jointly with existing parameters. Across synthetic and real-data experiments, LACE triggers expansions exclusively at domain boundaries (100% boundary precision, zero false positives), matches the accuracy of a large fixed-capacity model while starting from a fraction of its dimensions, and produces adapter dimensions that are collectively critical to performance (3% accuracy drop when all adapters removed). We further demonstrate unsupervised domain separation in GPT-2 activations via layer-wise clustering, showing a U-shaped separability curve across layers that motivates adaptive capacity allocation in deep networks. LACE requires no labels, no replay buffers, and no external controllers, making it suitable for on-device continual learning under resource constraints.", "link": "http://arxiv.org/abs/2603.28611v1", "date": "2026-03-30", "relevancy": 2.6491, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5615}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.527}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org ers%2C%20making%20it%20suitable%20for%20on-device%20continual%20learning%20under%20resource%20constraints.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28611v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLACE%253A%2520Loss-Adaptive%2520Capacity%2520Expansion%2520for%2520Continual%2520Learning%26entry.906535625%3DShivnath%2520Tathe%26entry.1292438233%3DFixed%2520representational%2520capacity%2520is%2520a%2520fundamental%2520constraint%2520in%2520continual%2520learning%253A%2520practitioners%2520must%2520guess%2520an%2520appropriate%2520model%2520width%2520before%2520training%252C%2520without%2520knowing%2520how%2520many%2520distinct%2520concepts%2520the%2520data%2520contains.%2520We%2520propose%2520LACE%2520%2528Loss-Adaptive%2520Capacity%2520Expansion%2529%252C%2520a%2520simple%2520online%2520mechanism%2520that%2520expands%2520a%2520model%2527s%2520representational%2520capacity%2520during%2520training%2520by%2520monitoring%2520its%2520own%2520loss%2520signal.%2520When%2520sustained%2520loss%2520deviation%2520exceeds%2520a%2520threshold%2520-%2520indicating%2520that%2520the%2520current%2520capacity%2520is%2520insufficient%2520for%2520newly%2520encountered%2520data%2520-%2520LACE%2520adds%2520new%2520dimensions%2520to%2520the%2520projection%2520layer%2520and%2520trains%2520them%2520jointly%2520with%2520existing%2520parameters.%2520Across%2520synthetic%2520and%2520real-data%2520experiments%252C%2520LACE%2520triggers%2520expansions%2520exclusively%2520at%2520domain%2520boundaries%2520%2528100%2525%2520boundary%2520precision%252C%2520zero%2520false%2520positives%2529%252C%2520matches%2520the%2520accuracy%2520of%2520a%2520large%2520fixed-capacity%2520model%2520while%2520starting%2520from%2520a%2520fraction%2520of%2520its%2520dimensions%252C%2520and%2520produces%2520adapter%2520dimensions%2520that%2520are%2520collectively%2520critical%2520to%2520performance%2520%25283%2525%2520accuracy%25 racy%20of%20a%20large%20fixed-capacity%20model%20while%20starting%20from%20a%20fraction%20of%20its%20dimensions%2C%20and%20produces%20adapter%20dimensions%20that%20are%20collectively%20critical%20to%20performance%20%283%25%20accuracy%20drop%20when%20all%20adapters%20removed%29.%20We%20further%20demonstrate%20unsupervised%20domain%20separation%20in%20GPT-2%20activations%20via%20layer-wise%20clustering%2C%20showing%20a%20U-shaped%20separability%20curve%20across%20layers%20that%20motivates%20adaptive%20capacity%20allocation%20in%20deep%20networks.%20LACE%20requires%20no%20labels%2C%20no%20replay%20buffers%2C%20and%20no%20external%20controllers%2C%20making%20it%20suitable%20for%20on-device%20continual%20learning%20under%20resource%20constraints.&entry.1838667208=http%3A//arxiv.org/abs/2603.28611v1&entry.124074799=Read"},
{"title": "Hydra: Unifying Document Retrieval and Generation in a Single Vision-Language Model", "author": "Athos Georgiou", "abstract": "Visual document understanding typically requires separate retrieval and generation models, doubling memory and system complexity. We present Hydra, a dual-head approach that provides both ColBERT-style late-interaction retrieval and autoregressive generation from a single vision-language model (VLM). A single LoRA adapter, trained only for retrieval, is toggled at inference: enabling it produces multi-vector embeddings; disabling it recovers the base model's generation quality -- byte-identical outputs in 100% of 10,500 greedy and stochastic samples, with max delta-ANLS = 0.0044 across 15,301 samples on four VQA benchmarks (three informative; ChartQA is near-zero for both models under greedy decoding) when compared against an independent base-model pipeline. We identify three engineering requirements (attention-mode restoration, lm_head preservation, KV-cache-aware decoding) whose omission silently breaks generation despite correct weight recovery. On ViDoRe V1, Hydra (4B) is within 1 percentage point of a controlled single-head baseline in a single training run, with higher aggregate scores on V2 and V3 that are concentrated on a subset of tasks; multi-seed experiments are needed to confirm these trends. The single-model design reduces peak GPU memory by 41%, though adapter switching introduces throughput overhead under concurrent serving loads. An ablation shows that GritLM-style joint training provides no benefit within the LoRA-based (r=16) training regime. A proof-of-concept extension to Qwen2.5-Omni-3B demonstrates that the mechanism generalizes to audio retrieval and video embedding, with speech generation.", "link": "http://arxiv.org/abs/2603.28554v1", "date": "2026-03-30", "relevancy": 2.649, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5386}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5386}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5123}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hydra%3A%20Unifying%20Document%20Retrieval%20and%20Generation%20in%20a%20Single%20Vision-Language%20Model&body=Title%3A%20Hydra%3A%20Unifying%20Document%20Retrieval%20and%20Generation%20in%20a%20Single%20Vision-Language%20Model%0AAuthor%3A%20Athos%20Georgiou%0AAbstract%3A%20Visual%20document%20understanding%20typically%20requires%20separate%20retrieval%20and%20generation%20models%2C%20doubling%20memory%20and%20system%20complexity.%20We%20present%20Hydra%2C%20a%20dual-head%20approach%20that%20provides%20both%20ColBERT-style%20late-interaction%20retrieval%20and%20autoregressive%20generation%20from%20a%20single%20vision-language%20model%20%28VLM%29.%20A%20single%20LoRA%20adapter%2C%20trained%20only%20for%20retrieval%2C%20is%20toggled%20at%20inference%3A%20enabling%20it%20produces%20multi-vector%20embeddings%3B%20disabling%20it%20recovers%20the%20base%20model%27s%20generation%20quality%20--%20byte-identical%20outputs%20in%20100%25%20of%2010%2C500%20greedy%20and%20stochastic%20samples%2C%20with%20max%20delta-ANLS%20%3D%200.0044%20across%2015%2C301%20samples%20on%20four%20VQA%20benchmarks%20%28three%20informative%3B%20ChartQA%20is%20near-zero%20for%20both%20models%20under%20greedy%20decoding%29%20when%20compared%20against%20an%20independent%20base-model%20pipeline.%20We%20identify%20three%20engineering%20requirements%20%28attention-mode%20restoration%2C%20lm_head%20preservation%2C%20KV-cache-aware%20decoding%29%20whose%20omission%20silently%20breaks%20generation%20despite%20correct%20weight%20recovery.%20On%20ViDoRe%20V1%2C%20Hydra%20%284B%29%20is%20within%201%20percentage%20point%20of%20a%20c {"title": "AMIGO: Agentic Multi-Image Grounding Oracle Benchmark", "author": "Min Wang and Ata Mahjoubfar", "abstract": "Agentic vision-language models increasingly act through extended interactions, but most evaluations still focus on single-image, single-turn correctness. We introduce AMIGO (Agentic Multi-Image Grounding Oracle Benchmark), a long-horizon benchmark for hidden-target identification over galleries of visually similar images. In AMIGO, the oracle privately selects a target image, and the model must recover it by asking a sequence of attribute-focused Yes/No/Unsure questions under a strict protocol that penalizes invalid actions with Skip. This setting stresses (i) question selection under uncertainty, (ii) consistent constraint tracking across turns, and (iii) fine-grained discrimination as evidence accumulates. AMIGO also supports controlled oracle imperfections to probe robustness and verification behavior under inconsistent feedback. We instantiate AMIGO with Guess My Preferred Dress task and report metrics covering both outcomes and interaction quality, including identification success, evidence verification, efficiency, protocol compliance, noise tolerance, and trajectory-level diagnostics.", "link": "http://arxiv.org/abs/2603.28662v1", "date": "2026-03-30", "relevancy": 2.637, "topK": [{"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5469}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5177}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5177}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AMIGO%3A%20Agentic%20Multi-Image%20Grounding%20Oracle%20Benchmark&body=Title%3A%20AMIGO%3A%20Agentic%20Multi-Image%20Grounding%20Oracle%20Benchmark%0AAuthor%3A%20Min%20Wang%20and%20Ata%20Mahjoubfar%0AAbstract%3A%20Agentic%20vision-language%20models%20increasingly%20act%20through%20extended%20interactions%2C%20but%20most%20evaluations%20still%20focus%20on%20single-image%2C%20single-turn%20correctness.%20We%20introduce%20AMIGO%20%28Agentic%20Multi-Image%20Grounding%20Oracle%20Benchmark%29%2C%20a%20long-horizon%20benchmark%20for%20hidden-target%20identification%20over%20galleries%20of%20visually%20similar%20images.%20In%20AMIGO%2C%20the%20oracle%20privately%20selects%20a%20target%20image%2C%20and%20the%20model%20must%20recover%20it%20by%20asking%20a%20sequence%20of%20attribute-focused%20Yes/No/Unsure%20questions%20under%20a%20strict%20protocol%20that%20penalizes%20invalid%20actions%20with%20Skip.%20This%20setting%20stresses%20%28i%29%20question%20selection%20under%20uncertainty%2C%20%28ii%29%20consistent%20constraint%20tracking%20across%20turns%2C%20and%20%28iii%29%20fine-grained%20discrimination%20as%20evidence%20accumulates.%20AMIGO%20also%20supports%20controlled%20oracle%20imperfections%20to%20probe%20robustness%20and%20verification%20behavior%20under%20inconsistent%20feedback.%20We%20instantiate%20AMIGO%20with%20Guess%20My%20Preferred%20Dress%20task%20and%20report%20metrics%20covering%20both%20outcomes%20and%20interaction%20quality%2C%20including%20identification%20success%2C%20evidence%20verification%2C%20efficiency%2C%20protocol%20compliance%2C%20noise%20tolerance%2C%20and%20trajectory-level%20diagnostics.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28662v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAMIGO%253A%2520Agentic%2520Multi-Image%2520Grounding%2520Oracle%2520Benchmark%26entry.906535625%3DMin%2520Wang%2520and%2520Ata%2520Mahjoubfar%26entry.1292438233%3DAgentic%2520vision-language%2520models%2520increasingly%2520act%2520through%2520extended%2 {"title": "A Hyperbolic Perspective on Hierarchical Structure in Object-Centric Scene Representations", "author": "Neelu Madan and \u00c0lex Pujol and Andreas M\u00f8gelmose and Sergio Escalera and Kamal Nasrollahi and Graham W. Taylor and Thomas B. Moeslund", "abstract": "Slot attention has emerged as a powerful framework for unsupervised object-centric learning, decomposing visual scenes into a small set of compact vector representations called \\emph{slots}, each capturing a distinct region or object. However, these slots are learned in Euclidean space, which provides no geometric inductive bias for the hierarchical relationships that naturally structure visual scenes. In this work, we propose a simple post-hoc pipeline to project Euclidean slot embeddings onto the Lorentz hyperboloid of hyperbolic space, without modifying the underlying training pipeline. We construct five-level visual hierarchies directly from slot attention masks and analyse whether hyperbolic geometry reveals latent hierarchical structure that remains invisible in Euclidean space. Integrating our pipeline with SPOT (images), VideoSAUR (video), and SlotContrast (video), We find that hyperbolic projection exposes a consistent scene-level to object-level organisation, where coarse slots occupy greater manifold depth than fine slots, which is absent in Euclidean space. We further identify a \"curvature--task tradeoff\": low curvature ($c{=}0.2$) matches or outperforms Euclidean on parent slot retrieval, while moderate curvature ($c{=}0.5$) achieves better inter-level separation. Together, these findings suggest that slot representations already encode latent hierarchy that hyperbolic geometry reveals, motivating end-to-end hyperbolic training as a natural next step. Code and models are available at \\href{https://github.com/NeeluMadan/HHS}{github.com/NeeluMadan/HHS}.", "link": "http://arxiv.org/abs/2603.14022v2", "date": "2026-03-30", "relevancy": 2.6367, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5306}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5257}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5257}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Hyperbolic%20Perspective%20on%20Hierarchical%20Structure%20in%20Object-Centric%20Scene%20Representations&body=Title%3A%20A%20Hyperbolic%20Perspective%20on%20Hierarchical%20Structure%20in%20Object-Centric%20Scene%20Representations%0AAuthor%3A%20Neelu%20Madan%20and%20%C3%80lex%20Pujol%20and%20Andreas%20M%C3%B8gelmose%20and%20Sergio%20Escalera%20and%20Kamal%20Nasrollahi%20and%20Graham%20W.%20Taylor%20and%20Thomas%20B.%20Moeslund%0AAbstract%3A%20Slot%20attention%20has%20emerged%20as%20a%20powerful%20framework%20for%20unsupervised%20object-centric%20learning%2C%20decomposing%20visual%20scenes%20into%20a%20small%20set%20of%20compact%20vector%20representations%20called%20%5Cemph%7Bslots%7D%2C%20each%20capturing%20a%20distinct%20region%20or%20object.%20However%2C%20these%20slots%20are%20learned%20in%20Euclidean%20space%2C%20which%20provides%20no%20geometric%20inductive%20bias%20for%20the%20hierarchical%20relationships%20that%20naturally%20structure%20visual%20scenes.%20In%20this%20work%2C%20we%20propose%20a%20simple%20post-hoc%20pipeline%20to%20project%20Euclidean%20slot%20embeddings%20onto%20the%20Lorentz%20hyperboloid%20of%20hyperbolic%20space%2C%20without%20modifying%20the%20underlying%20training%20pipeline.%20We%20construct%20five-level%20visual%20hierarchies%20directly%20from%20slot%20attention%20masks%20and%20analyse%20whether%20hyperbolic%20geometry%20reveals%20latent%20hierarchical%20structure%20that%20remains%20invisible%20in%20Euclidean%20space.%20Integrating%20our%20pipeline%20with%20SPOT%20%28images%29%2C%20VideoSAUR%20%28video%29%2C%20and%20SlotContrast%20%28video%29%2C%20We%20find%20that%20hyperbolic%20projection%20exposes%20a%20consistent%20scene-level%20to%20object-level%20organisation%2C%20where%20coarse%20slots%20occupy%20greater%20manifold%20depth%20than%20fine%20slots%2C%20which%20is%20absent%20in%20Euclidean%20space.%20We%20further%20identify%20a%20%22curvature--task%20tradeoff%22%3A%20low%20curvature%20%28%24c%7B%3D%7D0.2%24%29%20matches%20or%20outperforms%20Euclidean%20on%20parent%20slot%20retrieval%2C%20while%20moderate%20curvature%20%28%24c%7B%3D%7D0.5%24%29%20achieves%20better%20inter-level%20separation.%20Together%2C%20these%20findings%20suggest%20that%20slot%20representations%20already%20encode%20latent%20hierarchy%20that%20hyperbolic%20geometry%20reveals%2C%20motivating%20end-to-end%20hyperbolic%20training%20as%20a%20natural%20next%20step.%20Code%20and%20models%20are%20available%20at%20%5Chref%7Bhttps%3A//github.com/NeeluMadan/HHS%7D%7Bgithub.com/NeeluMadan/HHS%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2603.14022v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Hyperbolic%2520Perspective%2520on%2520Hierarchical%2520Structure%2520in%2520Object-Centric%2520Scene%2520Representations%26entry.906535625%3DNeelu%2520Madan%2520and%2520%25C3%2580lex%2520Pujol%2520and%2520Andreas%2520M%25C3%25B8gelmose%2520and%2520Sergio%2520Escalera%2520and%2520Kamal%2520Nasrollahi%2520and%2520Graham%2520W.%2520Taylor%2520and%2520Thomas%2520B.%2520Moeslund%26entry.1292438233%3DSlot%2520attention%2520has%2520emerged%2520as%2520a%2520powerful%2520framework%2520for%2520unsupervised%2520object-centric%2520learning%252C%2520decomposing%2520visual%2520scenes%2520into%2520a%2520small%2520set%2520of%2520compact%2520vector%2520representations%2520called%2520%255Cemph%257Bslots%257D%252C%2520each%2520capturing%2520a%2520distinct%2520region%2520or%25 {"title": "ELViS: Efficient Visual Similarity from Local Descriptors that Generalizes Across Domains", "author": "Pavel Suma and Giorgos Kordopatis-Zilos and Yannis Kalantidis and Giorgos Tolias", "abstract": "Large-scale instance-level training data is scarce, so models are typically trained on domain-specific datasets. Yet in real-world retrieval, they must handle diverse domains, making generalization to unseen data critical. We introduce ELViS, an image-to-image similarity model that generalizes effectively to unseen domains. Unlike conventional approaches, our model operates in similarity space rather than representation space, promoting cross-domain transfer. It leverages local descriptor correspondences, refines their similarities through an optimal transport step with data-dependent gains that suppress uninformative descriptors, and aggregates strong correspondences via a voting process into an image-level similarity. This design injects strong inductive biases, yielding a simple, efficient, and interpretable model. To assess generalization, we compile a benchmark of eight datasets spanning landmarks, artworks, products, and multi-domain collections, and evaluate ELViS as a re-ranking method. Our experiments show that ELViS outperforms competing methods by a large margin in out-of-domain scenarios and on average, while requiring only a fraction of their computational cost. Code available at: https://github.com/pavelsuma/ELViS/", "link": "http://arxiv.org/abs/2603.28603v1", "date": "2026-03-30", "relevancy": 2.6074, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5227}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5227}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization" {"title": "CLMN: Concept based Language Models via Neural Symbolic Reasoning", "author": "Yibo Yang", "abstract": "Deep learning has advanced NLP, but interpretability remains limited, especially in healthcare and finance. Concept bottleneck models tie predictions to human concepts in vision, but NLP versions either use binary activations that harm text representations or latent concepts that weaken semantics, and they rarely model dynamic concept interactions such as negation and context. We introduce the Concept Language Model Network (CLMN), a neural-symbolic framework that keeps both performance and interpretability. CLMN represents concepts as continuous, human-readable embeddings and applies fuzzy-logic reasoning to learn adaptive interaction rules that state how concepts affect each other and the final decision. The model augments original text features with concept-aware representations and automatically induces interpretable logic rules. Across multiple datasets and pre-trained language models, CLMN achieves higher accuracy than existing concept-based methods while improving explanation quality. These results show that integrating neural representations with symbolic reasoning in a unified concept space can yield practical, transparent NLP systems.", "link": "http://arxiv.org/abs/2510.10063v2", "date": "2026-03-30", "relevancy": 2.6065, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5319}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5319}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CLMN%3A%20Concept%20based%20Language%20Models%20via%20Neural%20Symbolic%20Reasoning&b {"title": "Follow-Your-Motion: Video Motion Transfer via Efficient Spatial-Temporal Decoupled Finetuning", "author": "Yue Ma and Yulong Liu and Qiyuan Zhu and Ayden Yang and Kunyu Feng and Xinhua Zhang and Zexuan Yan and Zhifeng Li and Sirui Han and Chenyang Qi and Qifeng Chen", "abstract": "Recently, breakthroughs in the video diffusion transformer have shown remarkable capabilities in diverse motion generations. As for the motion-transfer task, current methods mainly use two-stage Low-Rank Adaptations (LoRAs) finetuning to obtain better performance. However, existing adaptation-based motion transfer still suffers from motion inconsistency and tuning inefficiency when applied to large video diffusion transformers. Naive two-stage LoRA tuning struggles to maintain motion consistency between generated and input videos due to the inherent spatial-temporal coupling in the 3D attention operator. Additionally, they require time-consuming fine-tuning processes in both stages. To tackle these issues, we propose Follow-Your-Motion, an efficient two-stage video motion transfer framework that finetunes a powerful video diffusion transformer to synthesize complex motion. Specifically, we propose a spatial-temporal decoupled LoRA to decouple the attention architecture for spatial appearance and temporal motion processing. During the second training stage, we design the sparse motion sampling and adaptive RoPE to accelerate the tuning speed. To address the lack of a benchmark for this field, we introduce MotionBench, a comprehensive benchmark comprising diverse motion, including creative camera motion, single object motion, multiple object motion, and complex human motion. We show extensive evaluations on MotionBench to verify the superiority of Follow-Your-Motion.", "link": "http://arxiv.org/abs/2506.05207v4", "date": "2026-03-30", "relevancy": 2.5872, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.7032}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6362}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6349}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Follow-Your-Motion%3A%20Video%20Motion%20Transfer%20via%20Efficient%20Spatial-Temporal%20Decoupled%20Finetuning&body=Title%3A%20Follow-Your-Motion%3A%20Video%20Motion%20Transfer%20via%20Efficient%20Spatial-Temporal%20Decoupled%20Finetuning%0AAuthor%3A%20Yue%20Ma%20and%20Yulong%20Liu%20and%20Qiyuan%20Zhu%20and%20Ayden%20Yang%20and%20Kunyu%20Feng%20and%20Xinhua%20Zhang%20and%20Zexuan%20Yan%20and%20Zhifeng%20Li%20and%20Sirui%20Han%20and%20Chenyang%20Qi%20and%20Qifeng%20Chen%0AAbstract%3A%20Recently%2C%20breakthroughs%20in%20the%20video%20diffusion%20transformer%20have%20shown%20remarkable%20capabilities%20in%20diverse%20motion%20generations.%20As%20for%20the%20motion-transfer%20task%2C%20current%20methods%20mainly%20use%20two-stage%20Low-Rank%20Adaptations%20%28LoRAs%29%20finetuning%20to%20obtain%20better%20performance.%20However%2C%20existing%20adaptation-based%20motion%20transfer%20still%20suffers%20from%20motion%20inconsistency%20and%20tuning%20inefficiency%20when%20applied%20to%20large%20video%20diffusion%20transformers.%20Naive%20two-stage%20LoRA%20tuning%20struggles%20to%20maintain%20motion%20consistency%20between%20generated%20and%20input%20videos%20due%20to%20the%20inherent%20spatial-temporal%20coupling%20in%20the%203D%20attention%20operator.%20Additionally%2C%20they%20require%20time-consuming%20fine-tuning%20processes%20in%20both%20stages.%20To%20tackle%20these%20issues%2C%20we%20propose%20Follow-Your-Motion%2C%20an%20efficient%20two-stage%20video%20motion%20transfer%20framework%20that%20finetunes%20a%20powerful%20video%20diffusion%20transformer%20to%20synthesize%20complex%20motion.%20Specifically%2C%20we%20propose%20a%20spatial-temporal%20decoupled%20LoRA%20to%20decouple%20the%20attention%20architecture%20for%20spatial%20appearance%20and%20temporal%20motion%20processing.%20During%20the%20second%20training%20stage%2C%20we%20design%20the%20sparse%20motion%20sampling%20and%20adaptive%20RoPE%20to%20accelerate%20the%20tuning%20speed.%20To%20address%20the%20lack%20of%20a%20benchmark%20for%20this%20field%2C%20we%20introduce%20MotionBench%2C%20a%20comprehensive%20benchmark%20comprising%20diverse%20motion%2C%20including%20creative%20camera%20motion%2C%20single%20object%20motion%2C%20multiple%20object%20motion%2C%20and%20complex%20human%20motion.%20We%20show%20extensive%20evaluations%20on%20MotionBench%20to%20verify%20the%20superiority%20of%20Follow-Your-Motion.%0ALink%3A%20http%3A//arxiv.org/abs/2506.05207v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFollow-Your-Motion%253A%2520Video%2520Motion%2520Transfer%2520via%2520Efficient%2520Spatial-Temporal%2520Decoupled%2520Finetuning%26entry.906535625%3DYue%2520Ma%2520and%2520Yulong%2520Liu%2520and%2520Qiyuan%2520Zhu%2520and%2520Ayden%2520Yang%2520and%2520Kunyu%2520Feng%2520and%2520Xinhua%2520Zhang%2520and%2520Zexuan%2520Yan%2520and%2520Zhifeng%2520Li%2520and%2520Sirui%2520Han%2520and%2520Chenyang%2520Qi%2520and%2520Qifeng%2520Chen%26entry.1292438233%3DRecently%252C%2520breakthroughs%2520in%2520the%2520video%2520diffusion%2520transformer%2520have%2520shown%2520remarkable%2520capabilities%2520in%2520diverse%2520motion%2520generations.%2520As%2520for%2520the%2520motion-transfer%2520task%252C%2520current%2520methods%2520mainly%2520use%2520two-stage%2520Low-Rank%2520Adaptations%2520%2528LoRAs%2529%2520finetuning%2520to%2520obtain%2520better%2520performance.%2520However%252C%2520existing%2520adaptation-based%2520motion%2520transfer%2520still%2520suffers%2520from%2520motion%2520inconsistency%2520and%2520tuning%2520inefficiency%2520when%2520applied%2520to%2520large%2520video%2520diffusion%2520transformers.%2520Naive%2520two-stage%2520LoRA%2520tuning%2520struggles%2520to%2520maintain%2520motion%2520consistency%2520between%2520generated%2520and%2520input%2520videos%2520due%2520to%2520the%2520inherent%2520spatial-temporal%2520coupling%2520in%2520the%25203D%2520attention%2520operator.%2520Additionally%252C%2520they%2520require%2520time-consuming%2520fine-tuning%2520processes%2520in%2520both%2520stages.%2520To%2520tackle%2520these%2520issues%252C%2520we%2520propose%2520Follow-Your-Motion%252C%2520an%2520efficient%2520two-stage%2520video%2520motion%2520transfer%2520framework%2520that%2520finetunes%2520a%2520powerful%2520video%2520diffusion%2520transformer%2520to%2520synthesize%2520complex%2520motion.%2520Specifically%252C%2520we%2520propose%2520a%2520spatial-temporal%2520decoupled%2520LoRA%2520to%2520decouple%2520the%2520attention%2520architecture%2520for%2520spatial%2520appearance%2520and%2520temporal%2520motion%2520processing.%2520During%2520the%2520second%2520training%2520stage%252C%2520we%2520design%2520the%2520sparse%2520motion%2520sampling%2520and%2520adaptive%2520RoPE%2520to%2520accelerate%2520the%2520tuning%2520speed.%2520To%2520address%2520the%2520lack%2520of%2520a%2520benchmark%2520for%2520this%2520field%252C%2520we%2520introduce%2520MotionBench%252C%2520a%2520comprehensive%2520benchmark%2520comprising%2520diverse%2520motion%252C%2520including%2520creative%2520camera%2520motion%252C%2520single%2520object%2520motion%252C%2520multiple%2520object%2520motion%252C%2520and%2520complex%2520human%2520motion.%2520We%2520show%2520extensive%2520evaluations%2520on%2520MotionBench%2520to%2520verify%2520the%2520superiority%2520of%2520Follow-Your-Motion.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2506.05207v4%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Follow-Your-Moti {"title": "3D CAVLA: Leveraging Depth and 3D Context to Generalize Vision Language Action Models for Unseen Tasks", "author": "Vineet Bhat and Yu-Hsiang Lan and Prashanth Krishnamurthy and Ramesh Karri and Farshad Khorrami", "abstract": "Robotic manipulation in 3D requires effective computation of N degree-of-freedom joint-space trajectories that enable precise and robust control. To achieve this, robots must integrate semantic understanding with visual perception to transform real-world observations into low-level control for object interaction. Recent advances in Vision-Language-Action (VLA) models have shown promise by mapping RGB images and language instructions to task space velocities, typically trained on large datasets of teleoperated demonstrations. However, these models often struggle with generalization beyond their training distributions. In this work, we introduce 3D-CAVLA, a novel finetuning framework that enhances task generalization of VLA policies by incorporating three key components: (i) chain-of-thought reasoning for structured decision-making, (ii) depth-aware perception for 3D spatial understanding, and (iii) task-oriented region-of-interest detection for focused manipulation. Extensive experiments in the LIBERO simulation environment demonstrate that 3D-CAVLA achieves an average success rate of 98.1% across diverse in-domain task suites. On unseen tasks, 3D-CAVLA delivers an absolute improvement of 8.8% in success rate, underscoring the benefits of 3D scene awareness for robust generalization. We validate our approach on real-world tabletop experiments demonstrating that the proposed model translates effectively from simulation to physical robots. 3D-CAVLA achieves over a 3X faster training convergence and delivers a 25% gain in success rate on unseen real world tasks. We will open-source our code and the unseen tasks dataset to promote community-driven research here: https://3d-cavla.github.io", "link": "http://arxiv.org/abs/2505.05800v2", "date": "2026-03-30", "relevancy": 2.5593, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6421}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6421}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6283}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%203D%20CAVLA%3A%20Leveraging%20Depth%20and%203D%20Context%20to%20Generalize%20Vision%20Language%20Action%20Models%20for%20Unseen%20Tasks&body=Title%3A%203D%20CAVLA%3A%20Leveraging%20Depth%20and%203D%20Context%20to%20Generalize%20Vision%20Language%20Action%20Models%20for%20Unseen%20Tasks%0AAuthor%3A%20Vineet%20Bhat%20and%20Yu-Hsiang%20Lan%20and%20Prashanth%20Krishnamurthy%20and%20Ramesh%20Karri%20and%20Farshad%20Khorrami%0AAbstract%3A%20Robotic%20manipulation%20in%203D%20requires%20effective%20computation%20of%20N%20degree-of-freedom%20joint-space%20trajectories%20that%20enable%20precise%20and%20robust%20control.%20To%20achieve%20this%2C%20robots%20must%20integrate%20semantic%20understanding%20with%20visual%20perception%20to%20transform%20real-world%20observations%20into%20low-level%20control%20for%20object%20interaction.%20Recent%20advances%20in%20Vision-Language-Action%20%28VLA%29%20models%20have%20shown%20promise%20by%20mapping%20RGB%20images%20and%20language%20instructions%20to%20task%20space%20velocities%2C%20typically%20trained%20on%20large%20datasets%20of%20teleoperated%20demonstrations.%20However%2C%20these%20models%20often%20struggle%20with%20generalization%20beyond%20their%20training%20distributions.%20In%20this%20work%2C%20we%20introduce%203D-CAVLA%2C%20a%20novel%20finetuning%20framework%20that%20enhances%20task%20generalization%20of%20VLA%20policies%20by%20incorporating%20three%20key%20components%3A%20%28i%29%20chain-of-thought%20reasoning%20for%20structured%20decision-making%2C%20%28ii%29%20depth-aware%20perception%20for%203D%20spatial%20understanding%2C%20and%20%28iii%29%20task-oriented%20region-of-interest%20detection%20for%20focused%20manipulation.%20Extensive%20experiments%20in%20the%20LIBERO%20simulation%20environment%20demonstrate%20that%203D-CAVLA%20achieves%20an%20average%20success%20rate%20of%2098.1%25%20across%20diverse%20in-domain%20task%20suites.%20On%20unseen%20tasks%2C%203D-CAVLA%20delivers%20an%20absolute%20improvement%20of%208.8%25%20in%20success%20rate%2C%20underscoring%20the%20benefits%20of%203D%20scene%20awareness%20for%20robust%20generalization.%20We%20validate%20our%20approach%20on%20real-world%20tabletop%20experiments%20demonstrating%20that%20the%20proposed%20model%20translates%20effectively%20from%20simulation%20to%20physical%20robots.%203D-CAVLA%20achieves%20over%20a%203X%20faster%20training%20convergence%20and%20delivers%20a%2025%25%20gain%20in%20success%20rate%20on%20unseen%20real%20world%20tasks.%20We%20will%20open-source%20our%20code%20and%20the%20unseen%20tasks%20dataset%20to%20promote%20community-driven%20research%20here%3A%20https%3A//3d-cavla.github.io%0ALink%3A%20http%3A//arxiv.org/abs/2505.05800v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D3D%2520CAVLA%253A%2520Leveraging%2520Depth%2520and%25203D%2520Context%2520to%2520Generalize%2520Vision%2520Language%2520Action%2520Models%2520for%2520Unseen%2520Tasks%26entry.906535625%3DVineet%2520Bhat%2520and%2520Yu-Hsiang%2520Lan%2520and%2520Prashanth%2520Krishnamurthy%2520and%2520Ramesh%2520Karri%2520and%2520Farshad%2520Khorrami%26entry.1292438233%3DRobotic%2520manipulation%2520in%25203D%2520requires%2520effective%2520computation%2520of%2520N%2520degree-of-freedom%2520joint-space%2520trajectories%2520that%2520enable%2520precise%2520and%2520robust%2520control.%2520To% ely%2520from%2520simulation%2520to%2520physical%2520robots.%25203D-CAVLA%2520achieves%2520over%2520a%25203X%2520faster%2520training%2520convergence%2520and%2520delivers%2520a%252025%2525%2520gain%2520in%2520success%2520rate%2520on%2520unseen%2520real%2520world%2520tasks.%2520We%2520will%2520open-source%2520our%2520code%2520and%2520the%2520unseen%2520tasks%2520dataset%2520to%2520promote%2520community-driven%2520research%2520here%253A%2520https%253A//3d-cavla.github.io%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2505.05800v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=3D%20CAVLA%3A%20Leveraging%20Depth%20and%203D%20Context%20to%20Generalize%20Vision%20Language%20Action%20Models%20for%20Unseen%20Tasks&entry.906535625=Vineet%20Bhat%20and%20Yu-Hsiang%20Lan%20and%20Prashanth%20Krishnamurthy%20and%20Ramesh%20Karri%20and%20Farshad%20Khorrami&entry.1292438233=Robotic%20manipulation%20in%203D%20requires%20effective%20computation%20of%20N%20degree-of-freedom%20joint-space%20trajectories%20that%20enable%20precise%20and%20robust%20control.%20To%20achieve%20this%2C%20robots%20must%20integrate%20semantic%20understanding%20with%20visual%20perception%20to%20transform%20real-world%20observations%20into%20low-level%20control%20for%20object%20interaction.%20Recent%20advances%20in%20Vision-Language-Action%20%28VLA%29%20models%20have%20shown%20promise%20by%20mapping%20RGB%20images%20and%20language%20instructions%20to%20task%20space%20velocities%2C%20typically%20trained%20on%20large%20datasets%20of%20teleoperated%20demonstrations.%20However%2C%20these%20models%20often%20struggle%20with%20generalization%20beyond%20their%20training%20distributions.%20In%20this%20work%2C%20we%20introduce%203D-CAVLA%2C%20a%20novel%20finetuning%20framework%20that%20enhances%20task%20generalization%20of%20VLA%20policies%20by%20incorporating%20three%20key%20components%3A%20%28i%29%20chain-of-thought%20r {"title": "MarkushGrapher-2: End-to-end Multimodal Recognition of Chemical Structures", "author": "Tim Strohmeyer and Lucas Morin and Gerhard Ingmar Meijer and Val\u00e9ry Weber and Ahmed Nassar and Peter Staar", "abstract": "Automatically extracting chemical structures from documents is essential for the large-scale analysis of the literature in chemistry. Automatic pipelines have been developed to recognize molecules represented either in figures or in text independently. However, methods for recognizing chemical structures from multimodal descriptions (Markush structures) lag behind in precision and cannot be used for automatic large-scale processing. In this work, we present MarkushGrapher-2, an end-to-end approach for the multimodal recognition of chemical structures in documents. First, our method employs a dedicated OCR model to extract text from chemical images. Second, the text, image, and layout information are jointly encoded through a Vision-Text-Layout encoder and an Optical Chemical Structure Recognition vision encoder. Finally, the resulting encodings are effectively fused through a two-stage training strategy and used to auto-regressively generate a representation of the Markush structure. To address the lack of training data, we introduce an automatic pipeline for constructing a large-scale dataset of real-world Markush structures. In addition, we present IP5-M, a large manually-annotated benchmark of real-world Markush structures, designed to advance research on this challenging task. Extensive experiments show that our approach substantially outperforms state-of-the-art models in multimodal Markush structure recognition, while maintaining strong performance in molecule structure recognition. Code, models, and datasets are released publicly.", "link": "http://arxiv.org/abs/2603.28550v1", "date": "2026-03-30", "relevancy": 2.549, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5297}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5013}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4985}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MarkushGrapher-2%3A%20End-to-end%20Multimodal%20Recognition%20of%20Chemical%20Structures&body=Title%3A%20MarkushGrapher-2%3A%20End-to-end%20Multimodal%20Recognition%20of%20Chemical%20Structures%0AAuthor%3A%20Tim%20Strohmeyer%20and%20Lucas%20Morin%20and%20Gerhard%20Ingmar%20Meijer%20and%20Val%C3%A9ry%20Weber%20and%20Ahmed%20Nassar%20and%20Peter%20Staar%0AAbstract%3A%20Automatically%20extracting%20chemical%20structures%20from%20documents%20is%20essential%20for%20the%20large-scale%20analysis%20of%20the%20literature%20in%20chemistry.%20Automatic%20pipelines%20have%20been%20developed%20to%20recognize%20molecules%20represented%20either%20in%20figures%20or%20in%20text%20independently.%20However%2C%20methods%20for%20recognizing%20chemical%20structures%20from%20multimodal%20descriptions%20%28Markush%20structures%29%20lag%20behind%20in%20precision%20and%20cannot%20be%20used%20for%20automatic%20large-scale%20processing.%20In%20this%20work%2C%20we%20present%20MarkushGrapher-2%2C%20an%20end-to-end%20approach%20for%20the%20multimodal%20recognition%20of%20chemical%20structures%20in%20documents.%20First%2C%20our%20method%20employs%20a%20dedicated%20OCR%20model%20to%20extract%20text%20from%20chemical%20images.%20Second%2C%20the%20text%2C%20image%2C%20and%20layout%20information%20are%20jointly%20encoded%20through%20a%20Vision-Text-Layout%20encoder%20and%20an%20Optical%20Chemical%20Structure%20Recognition%20vision%20encoder.%20Finally%2C%20the%20resulting%20encodings%20are%20effectively%20fused%20through%20a%20two-stage%20training%20strategy%20and%20used%20to%20auto-regressively%20generate%20a%20representation%20of%20the%20Markush%20structure.%20To%20address%20the%20lack%20of%20training%20data%2C%20we%20introduce%20an%20automatic%20pipeline%20for%20constructing%20a%20large-scale%20dataset%20of%20real-world%20Markush%20structures.%20In%20addition%2C%20we%20present%20IP5-M%2C%20a%20large%20manually-annotated%20benchmark%20of%20real-world%20Markush%20structures%2C%20designed%20to%20advance%20research%20on%20this%20challenging%20task.%20Extensive%20experiments%20show%20that%20our%20approach%20substantially%20outperforms%20state-of-the-art%20models%20in%20multimodal%20Markush%20structure%20recognition%2C%20while%20maintaining%20strong%20performance%20in%20molecule%20structure%20recognition.%20Code%2C%20models%2C%20and%20datasets%20are%20released%20publicly.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28550v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMarkushGrapher-2%253A%2520End-to-end%2520Multimodal%2520Recognition%2520of%2520Chemical%2520Structures%26entry.906535625%3DTim%2520Strohmeyer%2520and%2520Lucas%2520Morin%2520and%2520Gerhard%2520Ingmar%2520Meijer%2520and%2520Val%25C3%25A9ry%2520Weber%2520and%2520Ahmed%2520Nassar%2520and%2520Peter%2520Staar%26entry.1292438233%3DAutomatically%2520extracting%2520chemical%2520structures%2520from%2520documents%2520is%2520essential%2520for%2520the%2520large-scale%2520analysis%2520of%2520the%2520literature%2520in%2520chemistry.%2520Automatic%2520pipelines%2520have%2520been%2520developed%2520to%2520recognize%2520molecules%2520represented%2520either%2520in%2520figures%2520or%2520in%2520text%2520independently.%2520However%252C%2520methods%2520for%2520recognizing%2520chemical%2520structures%2520from%2520multimodal%2520descriptions%2520%2528Markush%2520structures%2529%2520lag%2520behind%2520in%2520precision%2520and%2520cannot%2520be%2520used%2520for%2520automatic%2520large-scale%2520processing.%2520In%2520this%2520work%252C%2520we%2520present%2520MarkushGrapher-2%252C%2520an 0structure%20recognition%2C%20while%20maintaining%20strong%20performance%20in%20molecule%20structure%20recognition.%20Code%2C%20models%2C%20and%20datasets%20are%20released%20publicly.&entry.1838667208=http%3A//arxiv.org/abs/2603.28550v1&entry.124074799=Read"},
{"title": "SpecMoE: Spectral Mixture-of-Experts Foundation Model for Cross-Species EEG Decoding", "author": "Davy Darankoum and Chlo\u00e9 Habermacher and Julien Volle and Sergei Grudinin", "abstract": "Decoding the orchestration of neural activity in electroencephalography (EEG) signals is a central challenge in bridging neuroscience with artificial intelligence. Foundation models have made strides in generalized EEG decoding, yet many existing frameworks primarily relying on separate temporal and spectral masking of raw signals during self-supervised pretraining. Such strategies often tend to bias learning toward high-frequency oscillations, as low-frequency rhythmic patterns can be easily inferred from the unmasked signal.\n  We introduce a foundation model that utilizes a novel Gaussian-smoothed masking scheme applied to short-time Fourier transform (STFT) maps. By jointly applying time, frequency, and time-frequency Gaussian masks, we make the reconstruction task much more challenging, forcing the model to learn intricate neural patterns across both high- and low-frequency domains. To effectively recover signals under this aggressive masking strategy, we design SpecHi-Net, a U-shaped hierarchical architecture with multiple encoding and decoding stages. To accelerate large-scale pretraining, we partition the data into three subsets, each used to train an independent expert model. We then combine these models through SpecMoE, a mixture of experts framework guided by a learned spectral gating mechanism.\n  SpecMoE achieves state-of-the-art performance across a diverse set of EEG decoding tasks, including sleep staging, emotion recognition, motor imagery classification, abnormal signal detection, and drug effect prediction. Importantly, the model demonstrates strong cross-species and cross-subject generalization, maintaining high accuracy on both human and murine EEG datasets.", "link": "http://arxiv.org/abs/2603.16739v2", "date": "2026-03-30", "relevancy": 2.5411, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5213}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5213}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.482}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SpecMoE%3A%20Spectral%20Mixture-of-Experts%20Foundation%20Model%20for%20Cross-Species%20EEG%20Decoding&body=Title%3A%20SpecMoE%3A%20Spectral%20Mixture-of-Experts%20Foundation%20Model%20for%20Cross-Species%20EEG%20Decoding%0AAuthor%3A%20Davy%20Darankoum%20and%20Chlo%C3%A9%20Habermacher%20and%20Julien%20Volle%20and%20Sergei%20Grudinin%0AAbstract%3A%20Decoding%20the%20orchestration%20of%20neural%20activity%20in%20electroencephalography%20%28EEG%29%20signals%20is%20a%20central%20challenge%20in%20bridging%20neuroscience%20with%20artificial%20intelligence.%20Foundation%20models%20have%20made%20strides%20in%20generalized%20EEG%20decoding%2C%20yet%20many%20existing%20frameworks%20primarily%20relying%20on%20separate%20temporal%20and%20spectral%20masking%20of%20raw%20signals%20during%20self-supervised%20pretraining.%20Such%20strategies%20often%20tend%20to%20bias%20learning%20toward%20high-frequency%20oscillations%2C%20as%20low-frequency%20rhythmic%20patterns%20can%20be%20easily%20inferred%20from%20the%20unmasked%20signal.%0A%20%20We%20introduce%20a%20foundation%20model%20that%20utilizes%20a%20novel%20Gaussian-smoothed%20masking%20scheme%20applied%20to%20short-time%20Fourier%20transform%20%28STFT%29%20maps.%20By%20jointly%20applying%20time%2C%20frequency%2C%20and%20time-frequency%20Gaussian%20masks%2C%20we%20make%20the%20reconstruction%20task%20much%20more%20challenging%2C%20forcing%20the%20model%20to%20learn%20intricate%20neural%20patterns%20across%20both%20high-%20and%20low-frequency%20domains.%20To%20effectively%20recover%20signals%20under%20this%20aggressive%20masking%20strategy%2C%20we%20design%20SpecHi-Net%2C%20a%20U-shaped%20hierarchical%20architecture%20with%20multiple%20encoding%20and%20decoding%20stages.%20To%20accelerate%20large-scale%20pretraining%2C%20we%20partition%20the%20data%20into%20three%20subsets%2C%20each%20used%20to%20train%20an%20independent%20expert%20model.%20We%20then%20combine%20these%20models%20through%20SpecMoE%2C%20a%20mixture%20of%20experts%20framework%20guided%20by%20a%20learned%20spectral%20gating%20mechanism.%0A%20%20SpecMoE%20achieves%20state-of-the-art%20performance%20across%20a%20diverse%20set%20of%20EEG%20decoding%20tasks%2C%20including%20sleep%20staging%2C%20emotion%20recognition%2C%20motor%20imagery%20classification%2C%20abnormal%20signal%20detection%2C%20and%20drug%20effect%20prediction.%20Importantly%2C%20the%20model%20demonstrates%20strong%20cross-species%20and%20cross-subject%20generalization%2C%20maintaining%20high%20accuracy%20on%20both%20human%20and%20murine%20EEG%20datasets.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16739v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSpecMoE%253A%2520Spectral%2520Mixture-of-Experts%2520Foundation%2520Model%2520for%2520Cross-Species%2520EEG%2520Decoding%26entry.906535625%3DDavy%2520Darankoum%2520and%2520Chlo%25C3%25A9%2520Habermacher%2520and%2520Julien%2520Volle%2520and%2520Sergei%2520Grudinin%26entry.1292438233%3DDecoding%2520the%2520orchestration%2520of%2520neural%2520activity%2520in%2520electroencephalography%2520%2528EEG%2529%2520signals%2520is%2520a%2520central%2520challenge%2520in%2520bridging%2520neuroscience%2520with%2520artificial%2520intelligence.%2520Foundation%2520models%2520have%2520made%2520strides%2520in%2520generalized%2520EEG%2520decoding%252C%2520yet%2520many%2520existing%2520frameworks%2520primarily%2520relying%2520on%2520separate%2520temporal%2520and%2520spectral%2520masking%2520of%2520raw%2520signals%2520during%2520self-supervised%2520pretraining.%2520Such%2520strategies%2520often%2520tend%2520to%2520bias%2520learning%2520toward%2520high-frequency%2520oscillations%252C%2520as%2520low-frequency%2520rhythmic%2520patterns%2520can%2520be%2520easily%2520inferred%2520from%2520the%2520unmasked%2520signal.%250A%2520%2520We%2520introduce%2520a%2520foundation%2520model%2520that%2520utilizes%2520a%2520novel%2520Gaussian-smoothed%2520masking%2520scheme%2520applied%2520to%2520short-time%2520Fourier%2520transform%2520%2528STFT%2529%2520maps.%2520By%2520jointly%2520applying%2520time%252C%2520frequency%252C%2520and%2520time-frequency%2520Gaussian%2520masks%252C%2520we%2520make%2520the%2520reconstruction%2520task%2520much%2520more%2520challenging%252C%2520forcing%2520the%2520model%2520to%2520learn%2520intricate%2520neural%2520patterns%2520across%2520both%2520high-%2520and%2520low-frequency%2520domains.%2520To%2520effectively%2520recover%2520signals%2520under%2520this%2520aggressive%2520masking%2520strategy%252C%2520we%2520design%2520SpecHi-Net%252C%2520a%2520U-shaped%2520hierarchical%2520architecture%2520with%2520multiple%2520encoding%2520and%2520decoding%2520stages.%2520To%2520accelerate%2520large-scale%2520pretraining%252C%2520we%2520partition%2520the%2520data%2520into%2520three%2520subsets%252C%2520each%2520used%2520to%2520train%2520an%2520independent%2520expert%2520model.%2520We%2520then%2520combine%2520these%2520models%2520through%2520SpecMoE%252C%2520a%2520mixture%2520of%2520experts%2520framework%2520guided%2520by%2520a%2520learned%2520spectral%2520gating%2520mechanism.%250A%2520%2520SpecMoE%2520achieves%2520state-of-the-art%2520performance%2520across%2520a%2520diverse%2520set%2520of%2520EEG%2520decoding%2520tasks%252C%2520including%2520sleep%2520staging%252C%2520emotion%2520recognition%252C%2520motor%2520imagery%2520classification%252C%2520abnormal%2520signal%2520detection%252C%2520and%2520drug%2520effect%2520prediction.%2520Importantly%252C%2520the%2520model%2520demonstrates%2520strong%2520cross-species%2520and%2520cross-subject%2520generalization%252C%2520maintaining%2520high%2520accuracy%2520on%2520both%2520human%2520and%2520murine%2520EEG%2520datasets.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16739v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SpecMoE%3A%20Spectral%20Mixture-of-Experts%20Foundation%20Model%20for%20Cross-Species%20EEG%20Decoding&entry.906535625=Davy%20Darankoum%20and%20Chlo%C3%A9%20Habermacher%20and%20Julien%20Volle%20and%20Sergei%20Grudinin&entry.1292438233=Decoding%20the%20orchestration%20of%20neural%20activity%20in%20electroencephalography%20%28EEG%29%20signals%20is%20a%20central%20challenge%20in%20bridging%20neuroscience%20with%20artificial%20intelligence.%20Foundation%20models%20have%20made%20strides%20in%20generalized%20EEG%20decoding%2C%20yet%20many%20existing%20frameworks%20primarily%20relying%20on%20separate%20temporal%20and%20spectral%20masking%20of%20raw%20signals%20during%20self-supervised%20pretraining.%20Such%20strategies%20often%20tend%20to%20bias%20learning%20toward%20high-frequency%20oscillations%2C%20as%20low-frequency%20rhythmic%20patterns%20can%20be%20easily%20inferred%20from%20the%20unmasked%20signal.%0A%20%20We%20introduce%20a%20foundation%20model%20that%20utilizes%20a%20novel%20Gaussian-smoothed%20masking%20scheme%20applied%20to%20short-time%20Fourier%20transform%20%28STFT%29%20maps.%20By%20jointly%20applying%20time%2C%20frequency%2C%20and%20time-frequency%20Gaussian%20masks%2C%20we%20make%20the%20reconstruction%20task%20much%20more%20challenging%2C%20forcing%20the%20model%20to%20learn%20intricate%20neural%20patterns%20across%20both%20high-%20and%20low-frequency%20domains.%20To%20effectively%20recover%20signals%20under%20this%20aggressive%20masking%20strategy%2C%20we%20design%20SpecHi-Net%2C%20a {"title": "SFDemorpher: Generalizable Face Demorphing for Operational Morphing Attack Detection", "author": "Raul Ismayilov and Luuk Spreeuwers", "abstract": "Face morphing attacks compromise biometric security by creating document images that verify against multiple identities, posing significant risks from document issuance to border control. Differential Morphing Attack Detection (D-MAD) offers an effective countermeasure, particularly when employing face demorphing to disentangle identities blended in the morph. However, existing methods lack operational generalizability due to limited training data and the assumption that all document inputs are morphs. This paper presents SFDemorpher, a framework designed for the operational deployment of face demorphing for D-MAD that performs identity disentanglement within joint StyleGAN latent and high-dimensional feature spaces. We introduce a dual-pass training strategy handling both morphed and bona fide documents, leveraging a hybrid corpus with predominantly synthetic identities to enhance robustness against unseen distributions. Extensive evaluation confirms state-of-the-art generalizability across unseen identities, diverse capture conditions, and 13 morphing techniques, spanning both border verification and the challenging document enrollment stage. Our framework achieves superior D-MAD performance by widening the margin between the score distributions of bona fide and morphed samples while providing high-fidelity visual reconstructions facilitating explainability.", "link": "http://arxiv.org/abs/2603.28322v1", "date": "2026-03-30", "relevancy": 2.5325, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5312}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4961}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4922}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SFDemorpher%3A%20Generalizable%20Face%20Demorphing%20for%20Operational%20Morphing%20Attack%20Detection&body=Title%3A%20SFDemorpher%3A%20Generalizable%20Face%20Demorphing%20for%20Operational%20Morphing%20Attack%20Detection%0AAuthor%3A%20Raul%20Ismayilov%20and%20Luuk%20Spreeuwers%0AAbstract%3A%20Face%20morphing%20attacks%20compromise%20biometric%20security%20by%20creating%20document%20images%20that%20verify%20against%20multiple%20identities%2C%20posing%20significant%20risks%20from%20document%20issuance%20to%20border%20control.%20Differential%20Morphing%20Attack%20Detection%20%28D-MAD%29%20offers%20an%20effective%20countermeasure%2C%20particularly%20when%20employing%20face%20demorphing%20to%20disentangle%20identities%20blended%20in%20the%20morph.%20However%2C%20existing%20methods%20lack%20operational%20generalizability%20due%20to%20limited%20training%20data%20and%20the%20assumption%20that%20all%20document%20inputs%20are%20morphs.%20This%20paper%20presents%20SFDemorpher%2C%20a%20framework%20designed%20for%20the%20operational%20deployment%20of%20face%20demorphing%20for%20D-MAD%20that%20performs%20identity%20disentanglement%20within%20joint%20StyleGAN%20latent%20and%20high-dimensional%20feature%20spaces.%20We%20introduce%20a%20dual-pass%20training%20strategy%20handling%20both%20morphed%20and%20bona%20fide%20documents%2C%20leveraging%20a%20hybrid%20corpus%20with%20predominantly%20synthetic%20identities%20to%20enhance%20robustness%20against%20unseen%20distributions.%20Extensive%20evaluation%20confirms%20state-of-the-art%20generalizability%20across%20unseen%20identities%2C%20diverse%20capture%20conditions%2C%20and%2013%20morphing%20techniques%2C%20spanning%20both%20border%20verification%20and%20the%20challenging%20document%20enrollment%20stage.%20Our%20framework%20achieves%20superior%20D-MAD%20performance%20by%20widening%20the%20margin%20between%20the%20score%20distributions%20of%20bona%20fide%20and%20morphed%20samples%20while%20providing%20high-fidelity%20visual%20reconstructions%20facilitating%20explainability.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28322v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSFDemorpher%253A%2520Generalizable%2520Face%2520Demorphing%2520for%2520Operational%2520Morphing%2520Attack%2520Detection%26entry.906535625%3DRaul%2520Ismayilov%2520and%2520Luuk%2520Spreeuwers%26entry.1292438233%3DFace%2520morphing%2520attacks%2520compromise%2520biometric%2520security%2520by%2520creating%2520document%2520images%2520that%2520verify%2520against%2520multiple%2520identities%252C%2520posing%2520significant%2520risks%2520from%2520document%2520issuance%2520to%2520border%2520control.%2520Differential%2520Morphing%2520Attack%2520Detection%2520%2528D-MAD%2529%2520offers%2520an%2520effective%2520countermeasure%252C%2520particularly%2520when%2520employing%2520face%2520demorphing%2520to%2520disentangle%2520identities%2520blended%2520in%2520the%2520morph.%2520However%252C%2520existing%2520methods%2520lack%2520operational%2520generalizability%2520due%2520to%2520limited%2520training%2520data%2520and%2520the%2520assumption%2520that%2520all%2520document%2520inputs%2520are%2520morphs.%2520This%2520paper%2520presents%2520SFDemorpher%252C%2520a%2520framework%2520designed%2520for%2520the%2520operational%2520deployment%2520of%2520face%2520demorphing%2520for%2520D-MAD%2520that%2520performs%2520identity%2520disentanglement%2520within%2520joint%2520StyleGAN%2520latent%2520and%2520high-dimensional%2520feature%2520spaces.%2520We%2520introduce%2520a%2520dual-pass%2520training%2520strategy%2520handling%2520both%2520morphed%2520and%2520bona%2520fide%2520documents%252C%2520leveraging%2520a%2520hybrid%2520corpus%2520with%2520predominantly%2520synthetic%2520identities%2520to%2520enhance%2520robustness%2520against%2520unseen%2520distributions.%2520Extensive%2520evaluation%2520confirms%2520state-of-the-art%2520generalizability%2520across%2520unseen%2520identities%252C%2520diverse%2520capture%2520conditions%252C%2520and%252013%2520morphing%2520techniques%252C%2520spanning%2520both%2520border%2520verification%2520and%2520the%2520challenging%2520document%2520enrollment%2520stage.%2520Our%2520framework%2520achieves%2520superior%2520D-MAD%2520performance%2520by%2520widening%2520the%2520margin%2520between%2520the%2520score%2520distributions%2520of%2520bona%2520fide%2520and%2520morphed%2520samples%2520while%2520providing%2520high-fidelity%2520visual%2520reconstructions%2520facilitating%2520explainability.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.28322v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SFDemorpher%3A%20Generalizable%20Face%20Demorphing%20for%20Operational%20Morphing%20Attack%20Detection&entry.906535625=Raul%20Ismayilov%20and%20Luuk%20Spreeuwers&entry.1292438233=Face%20morphing%20attacks%20compromise%20biometric%20security%20by%20creating%20document%20images%20that%20verify%20against%20multiple%20identities%2C%20posing%20significant%20risks%20from%20document%20issuance%20to%20border%20control.%20Differential%20Morphing%20Attack%20Detection%20%28D-MAD%29%20offers%20an%20effective%20countermeasure%2C%20particularly%20when%20employing%20face%20demorphing%20to%20disentangle%20identities%20blended%20in%20the%20morph.%20However%2C%20existing%20methods%20lack%20operational%20generalizability%20due%20to%20limited%20training%20data%20and%20the%20assumption%20that%20all%20document%20inputs%20are%20morphs.%20This%20paper%20presents%20SFDemorpher%2C%20a%20framework%20designed%20for%20the%20operational%20deployment%20of%20face%20demorphing%20for%20D-MAD%20that%20performs%20identity%20disentanglement%20within%20joint%20StyleGAN%20latent%20and%20high-dimensional%20feature%20spaces.%20We%20introduce%20a%20dual-pass%20training%20strategy%20handling%20both%20morphed%20and%20bona%20fide%20documents%2C%20leveraging%20a%20hybrid%20corpus%20with%20predominantly%20synthetic%20identities%20to%20enhance%20robustness%20against%20unseen%20distributions.%20Extensive%20evaluation%20confirms%20state-of-the-art%20generalizability%20across%20unseen%20identities%2C%20diverse%20capture%20conditions%2C%20and%2013%20morphing%20techniques%2C%20spanning%20both%20border%20verification%20and%20the%20challenging%20document%20enrollment%20stage.%20Our%20framework%20achieves%20superior%20D-MAD%20performance%20by%20widening%20the%20margin%20between%20the%20score%20distributions%20of%20bona%20fide%20and%20morphed%20samples%20while%20providing%20high-fidelity%20visual%20reconstructions%20facilitating%20explainability.&entry.1838667208=http%3A//arxiv.org/abs/2603.28322v1&entry.124074799=Read"},
{"title": "DeH4R: A Decoupled and Hybrid Method for Road Network Graph Extraction", "author": "Dengxian Gong and Shunping Ji", "abstract": "The automated extraction of complete and precise road network graphs from remote sensing imagery remains a critical challenge in geospatial computer vision. Segmentation-based approaches, while effective in pixel-level recognition, struggle to maintain topology fidelity after vectorization postprocessing. Graph-growing methods build more topologically faithful graphs but suffer from computationally prohibitive iterative ROI cropping. Graph-generating methods first predict global static candidate road network vertices, and then infer possible edges between vertices. They achieve fast topology-aware inference, but limits the dynamic insertion of vertices. To address these challenges, we propose DeH4R, a novel hybrid model that combines graph-generating efficiency and graph-growing dynamics. This is achieved by decoupling the task into candidate vertex detection, adjacent vertex prediction, initial graph contruction, and graph expansion. This architectural innovation enables dynamic vertex (edge) insertions while retaining fast inference speed and enhancing both topology fidelity and spatial consistency. Comprehensive evaluations on CityScale and SpaceNet benchmarks demonstrate state-of-the-art (SOTA) performance. DeH4R outperforms the prior SOTA graph-growing method RNGDet++ by 4.62 APLS and 10.18 IoU on CityScale, while being approximately 10 $\\times$ faster. The code will be made publicly available at https://github.com/7777777FAN/DeH4R.", "link": "http://arxiv.org/abs/2508.13669v2", "date": "2026-03-30", "relevancy": 2.5227, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5117}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5068}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4951}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DeH4R%3A%20A%20Decoupled%20and%20Hybrid%20Method%20for%20Road%20Network%20Graph%20Extraction&body=Title%3A%20DeH4R%3A%20A%20Decoupled%20and%20Hybrid%20Method%20for%20Road%20Network%20Graph%20Extraction%0AAuthor%3A%20Dengxian%20Gong%20and%20Shunping%20Ji%0AAbstract%3A%20The%20automated%20extraction%20of%20complete%20and%20precise%20road%20network%20graphs%20from%20remote%20sensing%20imagery%20remains%20a%20critical%20challenge%20in%20geospatial%20computer%20vision.%20Segmentation-based%20approaches%2C%20while%20effective%20in%20pixel-level%20recognition%2C%20struggle%20to%20maintain%20topology%20fidelity%20after%20vectorization%20postprocessing.%20Graph-growing%20methods%20build%20more%20topologically%20faithful%20graphs%20but%20suffer%20from%20computationally%20prohibitive%20iterative%20ROI%20cropping.%20Graph-generating%20methods%20first%20predict%20global%20static%20candidate%20road%20network%20vertices%2C%20and%20then%20infer%20possible%20edges%20between%20vertices.%20They%20achieve%20fast%20topology-aware%20inference%2C%20but%20limits%20the%20dynamic%20insertion%20of%20vertices.%20To%20address%20these%20challenges%2C%20we%20propose%20DeH4R%2C%20a%20novel%20hybrid%20model%20that%20combines%20graph-generating%20efficiency%20and%20graph-growing%20dynamics.%20This%20is%20achieved%20by%20decoupling%20the%20task%20into%20candidate%20vertex%20detection%2C%20adjacent%20vertex%20prediction%2C%20initial%20graph%20contruction%2C%20and%20graph%20expansion.%20This%20architectural%20innovation%20enables%20dynamic%20vertex%20%28edge%29%20insertions%20while%20retaining%20fast%20inference%20speed%20and%20enhancing%20both%20topology%20fidelity%20and%20spatial%20consistency.%20Comprehensive%20evaluations%20on%20CityScale%20and%20SpaceNet%20benchmarks%20demonstrate%20state-of-the-art%20%28SOTA%29%20pe

{"title": "PoseDreamer: Scalable and Photorealistic Human Data Generation Pipeline with Diffusion Models", "author": "Lorenza Prospero and Orest Kupyn and Ostap Viniavskyi and Jo\u00e3o F. Henriques and Christian Rupprecht", "abstract": "Acquiring labeled datasets for 3D human mesh estimation is challenging due to depth ambiguities and the inherent difficulty of annotating 3D geometry from monocular images. Existing datasets are either real, with manually annotated 3D geometry and limited scale, or synthetic, rendered from 3D engines that provide precise labels but suffer from limited photorealism, low diversity, and high production costs. In this work, we explore a third path: generated data. We introduce PoseDreamer, a novel pipeline that leverages diffusion models to generate large-scale synthetic datasets with 3D mesh annotations. Our approach combines controllable image generation with Direct Preference Optimization for control alignment, curriculum-based hard sample mining, and multi-stage quality filtering. Together, these components naturally maintain correspondence between 3D labels and generated images, while prioritizing challenging samples to maximize dataset utility. Using PoseDreamer, we generate more than 500,000 high-quality synthetic samples, achieving a 76% improvement in image-quality metrics compared to rendering-based datasets. Models trained on PoseDreamer achieve performance comparable to or superior to those trained on real-world and traditional synthetic datasets. In addition, combining PoseDreamer with synthetic datasets results in better performance than combining real-world and synthetic datasets, demonstrating the complementary nature of our dataset. We will release the full dataset and generation code.", "link": "http://arxiv.org/abs/2603.28763v1", "date": "2026-03-30", "relevancy": 3.29, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6976}, {"title": "CAT3D: {"title": "TerraSky3D: Multi-View Reconstructions of European Landmarks in 4K", "author": "Mattia D'Urso and Yuxi Hu and Christian Sormann and Mattia Rossi and Friedrich Fraundorfer", "abstract": "Despite the growing need for data of more and more sophisticated 3D reconstruction pipelines, we can still observe a scarcity of suitable public datasets. Existing 3D datasets are either low resolution, limited to a small amount of scenes, based on images of varying quality because retrieved from the internet, or limited to specific capturing scenarios.\n  Motivated by this lack of suitable 3D datasets, we captured TerraSky3D, a high-resolution large-scale 3D reconstruction dataset comprising 50,000 images divided into 150 ground, aerial, and mixed scenes. The dataset focuses on European landmarks and comes with curated calibration data, camera poses, and depth maps. TerraSky3D tries to answer the need for challenging dataset that can be used to train and evaluate 3D reconstruction-related pipelines.", "link": "http://arxiv.org/abs/2603.28287v1", "date": "2026-03-30", "relevancy": 2.9944, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6158}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6158}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.565}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TerraSky3D%3A%20Multi-View%20Reconstructions%20of%20European%20Landmarks%20in%204K&body=Title%3A%20TerraSky3D%3A%20Multi-View%20Reconstructions%20of%20European%20Landmarks%20in%204K%0AAuthor%3A%20Mattia%20D%27Urso%20and%20Yuxi%20Hu%20and%20Christian%20Sormann%20and%20Mattia%20Rossi%20and%20Friedrich%20Fraundorfer%0AAbstract%3A%20Despite%20the%20growing%20need%20for%20data%20of%20more%20and%20more%20sophisticated%203D%20reconstruction%20pipelines%2C%20we%20can%20still%20observe%20a%20scarcity%20of%20suitable%20public%20datasets.%20Existing%203D%20datasets%20are%20either%20low%20resolution%2C%20limited%20to%20a%20small%20amount%20of%20scenes%2C%20based%20on%20images%20of%20varying%20quality%20because%20retrieved%20from%20the%20internet%2C%20or%20limited%20to%20specific%20capturing%20scenarios.%0A%20%20Motivated%20by%20this%20lack%20of%20suitable%203D%20datasets%2C%20we%20captured%20TerraSky3D%2C%20a%20high-resolution%20large-scale%203D%20reconstruction%20dataset%20comprising%2050%2C000%20images%20divided%20into%20150%20ground%2C%20aerial%2C%20and%20mixed%20scenes.%20The%20dataset%20focuses%20on%20European%20landmarks%20and%20comes%20with%20curated%20calibration%20data%2C%20camera%20poses%2C%20and%20depth%20maps.%20TerraSky3D%20tries%20to%20answer%20the%20need%20for%20challenging%20dataset%20that%20can%20be%20used%20to%20train%20and%20evaluate%203D%20reconstruction-related%20pipelines.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28287v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTerraSky3D%253A%2520Multi-View%2520Reconstructions%2520of%2520European%2520Landmarks%2520in%25204K%26entry.906535625%3DMattia%2520D%2527Urso%2520and%2520Yuxi%2520Hu%2520and%2520Christian%2520Sormann%2520and%2520Mattia%2520Rossi%2520and%2520Friedrich%2520Fraundorfer%26entry.1292438233%3DDespite%2520the%2520growing%2520need%2520for%2520data%2520of%2520more%2520and%2520more%2520sophisticated%25203D%2520reconstruction%2520pipelines%252C%2520we%2520can%2520still%2520observe%2520a%2520scarcity%2520of%2520suitable%2520public%2520datasets.%2520Existing%25203D%2520datasets%2520are%2520either%2520low%2520resolution%252C%2520limited%2520to%2520a%2520small%2520amount%2520of%2520scenes%252C%2520based%2520on%2520images%2520of%2520varying%2520quality%2520because%2520retrieved%2520from%2520the%2520internet%252C%2520or%2520limited%2520to%2520specific%2520capturing%2520scenarios.%250A%2520%2520Motivated%2520by%2520this%2520lack%2520of%2520suitable%25203D%2520datasets%252C%2520we%2520captured%2520TerraSky3D%252C%2520a%2520high-resolution%2520large-scale%25203D%2520reconstruction%2520dataset%2520comprising%252050%252C000%2520images%2520divided%2520into%2520150%2520ground%252C%2520aerial%252C%2520and%2520mixed%2520scenes.%2520The%2520dataset%2520focuses%2520on%2520European%2520landmarks%2520and%2520comes%2520with%2520curated%2520calibration%2520data%252C%2520camera%2520poses%252C%2520and%2520depth%2520maps.%2520TerraSky3D%2520tries%2520to%2520answer%2520the%2520need%2520for%2520challenging%2520dataset%2520that%2520can%2520be%2520used%2520to%2520train%2520and%2520evaluate%25203D%2520reconstruction-related%2520pipelines.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.28287v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=TerraSky3D%3A%20Multi-View%20Reconstructions%20of%20European%20Landmarks%20in%204K&entry.906535625=Mattia%20D%27Urso%20and%20Yuxi%20Hu%20and%20Christian%20Sormann%20and%20Mattia%20Rossi%20and%20Friedrich%20Fraundorfer&entry.1292438233=Despite%20the%20growing%20need%20for%20data%20of%20more%20and%20more%20sophisticated%203D%20reconstruction%20pipelines%2C%20we%20can%20still%20observe%20a%20scarcity%20of%20suitable%20public%20datasets.%20Existing%203D%20datasets%20are%20either%20low%20resolution%2C%20limited%20to%20a%20small%20amount%20of%20scenes%2C%20based%20on%20images%20of%20varying%20quality%20because%20retrieved%20from%20the%20internet%2C%20or%20limited%20to%20specific%20capturing%20scenarios.%0A%20%20Motivated%20by%20this%20lack%20of%20suitable%203D%20datasets%2C%20we%20captured%20TerraSky3D%2C%20a%20high-resolution%20large-scale%203D%20reconstruction%20dataset%20comprising%2050%2C000%20images%20divided%20into%20150%20ground%2C%20aerial%2C%20and%20mixed%20scenes.%20The%20dataset%20focuses%20on%20European%20landmarks%20and%20comes%20with%20curated%20calibration%20data%2C%20camera%20poses%2C%20and%20depth%20maps.%20TerraSky3D%20tries%20to%20answer%20the%20need%20for%20challenging%20dataset%20that%20can%20be%20used%20to%20train%20and%20evaluate%203D%20reconstruction-related%20pipelines.&entry.1838667208=http%3A//arxiv.org/abs/2603.28287v1&entry.124074799=Read"},
{"title": "Relightable Holoported Characters: Capturing and Relighting Dynamic Human Performance from Sparse Views", "author": "Kunwar Maheep Singh and Jianchun Chen and Vladislav Golyanik and Stephan J. Garbin and Thabo Beeler and Rishabh Dabral and Marc Habermann and Christian Theobalt", "abstract": "We present Relightable Holoported Characters (RHC), a novel person-specific method for free-view rendering and relighting of full-body and highly dynamic humans solely observed from sparse-view RGB videos at inference. In contrast to classical one-light-at-a-time (OLAT)-based human relighting, our transformer-based RelightNet predicts relit appearance within a single network pass, avoiding costly OLAT-basis capture and generation. For training such a model, we introduce a new capture strategy and dataset recorded in a multi-view lightstage, where we alternate frames lit by random environment maps with uniformly lit tracking frames, simultaneously enabling accurate motion tracking and diverse illumination as well as dynamics coverage. Inspired by the rendering equation, we derive physics-informed features that encode geometry, albedo, shading, and the virtual camera view from a coarse human mesh proxy and the input views. Our RelightNet then takes these features as input and cross-attends them with a novel lighting condition, and regresses the relit appearance in the form of texel-aligned 3D Gaussian splats attached to the coarse mesh proxy. Consequently, our RelightNet implicitly learns to efficiently compute the rendering equation for novel lighting conditions within a single feed-forward pass. Experiments demonstrate our method's superior visual fidelity and lighting reproduction compared to state-of-the-art approaches. Project page: https://vcai.mpi-inf.mpg.de/projects/RHC/", "link": "http://arxiv.org/abs/2512.00255v2", "date": "2026-03-30", "relevancy": 2.983, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6403}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.58}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5694}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Relightable%20Holoported%20Characters%3A%20Capturing%20and%20Relighting%20Dynamic%20Human%20Performance%20from%20Sparse%20Views&body=Title%3A%20Relightable%20Holoported%20Characters%3A%20Capturing%20and%20Relighting%20Dynamic%20Human%20Performance%20from%20Sparse%20Views%0AAuthor%3A%20Kunwar%20Maheep%20Singh%20and%20Jianchun%20Chen%20and%20Vladislav%20Golyanik%20and%20Stephan%20J.%20Garbin%20and%20Thabo%20Beeler%20and%20Rishabh%20Dabral%20and%20Marc%20Habermann%20and%20Christian%20Theobalt%0AAbstract%3A%20We%20present%20Relightable%20Holoported%20Characters%20%28RHC%29%2C%20a%20novel%20person-specific%20method%20for%20free-view%20rendering%20and%20relighting%20of%20full-body%20and%20highly%20dynamic%20humans%20solely%20observed%20from%20sparse-view%20RGB%20videos%20at%20inference.%20In%20contrast%20to%20classical%20one-light-at-a-time%20%28OLAT%29-based%20human%20relighting%2C%20our%20transformer-based%20RelightNet%20predicts%20relit%20appearance%20within%20a%20single%20network%20pass%2C%20avoiding%20costly%20OLAT-basis%20capture%20and%20generation.%20For%20training%20such%20a%20model%2C%20we%20introduce%20a%20new%20capture%20strategy%20and%20dataset%20recorded%20in%20a%20multi-view%20lightstage%2C%20where%20we%20alternate%20frames%20lit%20by%20random%20environment%20maps%20with%20uniformly%20lit%20tracking%20frames%2C%20simultaneously%20enabling%20accurate%20motion%20tracking%20and%20diverse%20illumination%20as%20well%20as%20dynamics%20coverage.%20Inspired%20by%20the%20rendering%20equation%2C%20we%20derive%20physics-informed%20features%20that%20encode%20geometry%2C%20albedo%2C%20shading%2C%20and%20the%20virtual%20camera%20view%20from%20a%20coarse%20human%20mesh%20proxy%20and%20the%20input%20views.%20Our%20RelightNet%20then%20takes%20these%20features%20as%20input%20and%20cross-attends%20them%20with%20a%20novel%20lighting%20condition%2C%20and%20regresses%20the%20relit%20appearance%20in%20the%20form%20of%20texel-aligned%203D%20Gaussian%20splats%20attached%20to%20the%20coarse%20mesh%20proxy.%20Consequently%2C%20our%20RelightNet%20implicitly%20learns%20to%20efficiently%20compute%20the%20rendering%20equation%20for%20novel%20lighting%20conditions%20within%20a%20single%20feed-forward%20pass.%20Experiments%20demonstrate%20our%20method%27s%20superior%20visual%20fidelity%20and%20lighting%20reproduction%20compared%20to%20state-of-the-art%20approaches.%20Project%20page%3A%20https%3A//vcai.mpi-inf.mpg.de/projects/RHC/%0ALink%3A%20http%3A//arxiv.org/abs/2512.00255v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRelightable%2520Holoported%2520Characters%253A%2520Capturing%2520and%2520Relighting%2520Dynamic%2520Human%2520Performance%2520from%2520Sparse%2520Views%26entry.906535625%3DKunwar%2520Maheep%2520Singh%2520and%2520Jianchun%2520Chen%2520and%2520Vladislav%2520Golyanik%2520and%2520Stephan%2520J.%2520Garbin%2520and%2520Thabo%2520Beeler%2520and%2520Rishabh%2520Dabral%2520and%2520Marc%2520Habermann%2520and%2520Christian%2520Theobalt%26entry.1292438233%3DWe%2520present%2520Relightable%2520Holoported%2520Characters%2520%2528RHC%2529%252C%2520a%2520novel%2520person-specific%2520method%2520for%2520free-view%2520rendering%2520and%2520relighting%2520of%2520full-body%2520and%2520highly%2520dynamic%2520humans%2520solely%2520observed%2520from%2520sparse-view%2520RGB%2520videos%2520at%2520inference.%2520In%2520contrast%2520to%2520classical%2520one-light-at-a-time%2520%2528OLAT%2529-based%2520human%2520relighting%252C%2520our%2520transformer-based%2520RelightNet%252 {"title": "ResAdapt: Adaptive Resolution for Efficient Multimodal Reasoning", "author": "Huanxuan Liao and Zhongtao Jiang and Yupu Hao and Yuqiao Tan and Shizhu He and Jun Zhao and Kun Xu and Kang Liu", "abstract": "Multimodal Large Language Models (MLLMs) achieve stronger visual understanding by scaling input fidelity, yet the resulting visual token growth makes jointly sustaining high spatial resolution and long temporal context prohibitive. We argue that the bottleneck lies not in how post-encoding representations are compressed but in the volume of pixels the encoder receives, and address it with ResAdapt, an Input-side adaptation framework that learns how much visual budget each frame should receive before encoding. ResAdapt couples a lightweight Allocator with an unchanged MLLM backbone, so the backbone retains its native visual-token interface while receiving an operator-transformed input. We formulate allocation as a contextual bandit and train the Allocator with Cost-Aware Policy Optimization (CAPO), which converts sparse rollout feedback into a stable accuracy-cost learning signal. Across budget-controlled video QA, temporal grounding, and image reasoning tasks, ResAdapt improves low-budget operating points and often lies on or near the efficiency-accuracy frontier, with the clearest gains on reasoning-intensive benchmarks under aggressive compression. Notably, ResAdapt supports up to 16x more frames at the same visual budget while delivering over 15% performance gain. Code is available at https://github.com/Xnhyacinth/ResAdapt.", "link": "http://arxiv.org/abs/2603.28610v1", "date": "2026-03-30", "relevancy": 2.967, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6274}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5764}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5764}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ResAdapt%3A%20Adaptive%20Resolution%20for%20Efficient%20Multimodal%20Reasoning&body=Title%3A%20ResAdapt%3A%20Adaptive%20Resolution%20for%20Efficient%20Multimodal%20Reasoning%0AAuthor%3A%20Huanxuan%20Liao%20and%20Zhongtao%20Jiang%20and%20Yupu%20Hao%20and%20Yuqiao%20Tan%20and%20Shizhu%20He%20and%20Jun%20Zhao%20and%20Kun%20Xu%20and%20Kang%20Liu%0AAbstract%3A%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20achieve%20stronger%20visual%20understanding%20by%20scaling%20input%20fidelity%2C%20yet%20the%20resulting%20visual%20token%20growth%20makes%20jointly%20sustaining%20high%20spatial%20resolution%20and%20long%20temporal%20context%20prohibitive.%20We%20argue%20that%20the%20bottleneck%20lies%20not%20in%20how%20post-encoding%20representations%20are%20compressed%20but%20in%20the%20volume%20of%20pixels%20the%20encoder%20receives%2C%20and%20address%20it%20with%20ResAdapt%2C%20an%20Input-side%20adaptation%20framework%20that%20learns%20how%20much%20visual%20budget%20each%20frame%20should%20receive%20before%20encoding.%20ResAdapt%20couples%20a%20lightweight%20Allocator%20with%20an%20unchanged%20MLLM%20backbone%2C%20so%20the%20backbone%20retains%20its%20native%20visual-token%20interface%20while%20receiving%20an%20operator-transformed%20input.%20We%20formulate%20allocation%20as%20a%20contextual%20bandit%20and%20train%20the%20Allocator%20with%20Cost-Aware%20Policy%20Optimization%20%28CAPO%29%2C%20which%20converts%20sparse%20rollout%20feedback%20into%20a%20stable%20accuracy-cost%20learning%20signal.%20Across%20budget-controlled%20video%20QA%2C%20temporal%20grounding%2C%20and%20image%20reasoning%20tasks%2C%20ResAdapt%20improves%20low-budget%20operating%20points%20and%20often%20lies%20on%20or%20near%20the%20efficiency-accuracy%20frontier%2C%20with%20the%20clearest%20gains%20on%20reasoning-intensive%20benchmarks%20under%20aggressive%20compression.%20Notably%2C%20ResAdapt%20supports%20up%20to%2016x%20more%20frames%20at%20the%20same%20visual%20budget%20while%20delivering%20over%2015%25%20performance%20gain.%20Code%20is%20available%20at%20https%3A//github.com/Xnhyacinth/ResAdapt.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28610v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DResAdapt%253A%2520Adaptive%2520Resolution%2520for%2520Efficient%2520Multimodal%2520Reasoning%26entry.906535625%3DHuanxuan%2520Liao%2520and%2520Zhongtao%2520Jiang%2520and%2520Yupu%2520Hao%2520and%2520Yuqiao%2520Tan%2520and%2520Shizhu%2520He%2520and%2520Jun%2520Zhao%2520and%2520Kun%2520Xu%2520and%2520Kang%2520Liu%26entry.1292438233%3DMultimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520achieve%2520stronger%2520visual%2520understanding%2520by%2520scaling%2520input%2520fidelity%252C%2520yet%2520the%2520resulting%2520visual%2520token%2520growth%2520makes%2520jointly%2520sustaining%2520high%2520spatial%2520resolution%2520and%2520long%2520temporal%2520context%2520prohibitive.%2520We%2520argue%2520that%2520the%2520bottleneck%2520lies%2520not%2520in%2520how%2520post-encoding%2520representations%2520are%2520compressed%2520but%2520in%2520the%2520volume%2520of%2520pixels%2520the%2520encoder%2520receives%252C%2520and%2520address%2520it%2520with%2520ResAdapt%252C%2520an%2520Input-side%2520adaptation%2520framework%2520that%2520learns%2520how%2520much%2520visual%2520budget%2520each%2520frame%2520should%2520receive%2520before%2520encoding.%2520ResAdapt%2520couples%2520a%2520lightweight%2520Allocator%2520with%2520an%2520unchanged%2520MLLM%2520backbone%252C%2520so%2520the%2520backbone%2520retains%2520its%2520native%2520visual-token%2520interface%2520while%2520receiving%2520an%2520operator-transformed%2520input.%2520We%2520formulate%2520allocation%2520as%2520a%2520contextual%2520bandit%2520a {"title": "GeoHCC: Local Geometry-Aware Hierarchical Context Compression for 3D Gaussian Splatting", "author": "Xuan Deng and Xiandong Meng and Hengyu Man and Qiang Zhu and Tiange Zhang and Debin Zhao and Xiaopeng Fan", "abstract": "Although 3D Gaussian Splatting (3DGS) enables high-fidelity real-time rendering, its prohibitive storage overhead severely hinders practical deployment. Recent anchor-based 3DGS compression schemes reduce redundancy through context modeling, yet overlook explicit geometric dependencies, leading to structural degradation and suboptimal rate-distortion performance. In this paper, we propose GeoHCC, a geometry-aware 3DGS compression framework that incorporates inter-anchor geometric correlations into anchor pruning and entropy coding for compact representation. We first introduce Neighborhood-Aware Anchor Pruning (NAAP), which evaluates anchor importance via weighted neighborhood feature aggregation and merges redundant anchors into salient neighbors, yielding a compact yet geometry-consistent anchor set. Building upon this optimized structure, we further develop a hierarchical entropy coding scheme, in which coarse-to-fine priors are exploited through a lightweight Geometry-Guided Convolution (GG-Conv) operator to enable spatially adaptive context modeling and rate-distortion optimization. Extensive experiments demonstrate that GeoHCC effectively resolves the structure preservation bottleneck, maintaining superior geometric integrity and rendering fidelity over state-of-the-art anchor-based approaches.", "link": "http://arxiv.org/abs/2603.28431v1", "date": "2026-03-30", "relevancy": 2.9498, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6001}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5979}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5719}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GeoHCC%3A%20Local%20Geometry-Aware%20Hierarchical%20Context%20Compression%20for%203D%20Gaussian%20Splatting&body=Title%3A%20GeoHCC%3A%20Local%20Geometry-Aware%20Hierarchical%20Context%20Compression%20for%203D%20Gaussian%20Splatting%0AAuthor%3A%20Xuan%20Deng%20and%20Xiandong%20Meng%20and%20Hengyu%20Man%20and%20Qiang%20Zhu%20and%20Tiange%20Zhang%20and%20Debin%20Zhao%20and%20Xiaopeng%20Fan%0AAbstract%3A%20Although%203D%20Gaussian%20Splatting%20%283DGS%29%20enables%20high-fidelity%20real-time%20rendering%2C%20its%20prohibitive%20storage%20overhead%20severely%20hinders%20practical%20deployment.%20Recent%20anchor-based%203DGS%20compression%20schemes%20reduce%20redundancy%20through%20context%20modeling%2C%20yet%20overlook%20explicit%20geometric%20dependencies%2C%20leading%20to%20structural%20degradation%20and%20suboptimal%20rate-distortion%20performance.%20In%20this%20paper%2C%20we%20propose%20GeoHCC%2C%20a%20geometry-aware%203DGS%20compression%20framework%20that%20incorporates%20inter-anchor%20geometric%20correlations%20into%20anchor%20pruning%20and%20entropy%20coding%20for%20compact%20representation.%20We%20first%20introduce%20Neighborhood-Aware%20Anchor%20Pruning%20%28NAAP%29%2C%20which%20evaluates%20anchor%20importance%20via%20weighted%20neighborhood%20feature%20aggregation%20and%20merges%20redundant%20anchors%20into%20salient%20neighbors%2C%20yielding%20a%20compact%20yet%20geometry-consistent%20anchor%20set.%20Building%20upon%20this%20optimized%20structure%2C%20we%20further%20develop%20a%20hierarchical%20entropy%20coding%20scheme%2C%20in%20which%20coarse-to-fine%20priors%20are%20exploited%20through%20a%20lightweight%20Geometry-Guided%20Convolution%20%28GG-Conv%29%20operator%20to%20enable%20spatially%20adaptive%20context%20modeling%20and%20rate-distortion%20optimizati {"title": "HandX: Scaling Bimanual Motion and Interaction Generation", "author": "Zimu Zhang and Yucheng Zhang and Xiyan Xu and Ziyin Wang and Sirui Xu and Kai Zhou and Bing Zhou and Chuan Guo and Jian Wang and Yu-Xiong Wang and Liang-Yan Gui", "abstract": "Synthesizing human motion has advanced rapidly, yet realistic hand motion and bimanual interaction remain underexplored. Whole-body models often miss the fine-grained cues that drive dexterous behavior, finger articulation, contact timing, and inter-hand coordination, and existing resources lack high-fidelity bimanual sequences that capture nuanced finger dynamics and collaboration. To fill this gap, we present HandX, a unified foundation spanning data, annotation, and evaluation. We consolidate and filter existing datasets for quality, and collect a new motion-capture dataset targeting underrepresented bimanual interactions with detailed finger dynamics. For scalable annotation, we introduce a decoupled strategy that extracts representative motion features, e.g., contact events and finger flexion, and then leverages reasoning from large language models to produce fine-grained, semantically rich descriptions aligned with these features. Building on the resulting data and annotations, we benchmark diffusion and autoregressive models with versatile conditioning modes. Experiments demonstrate high-quality dexterous motion generation, supported by our newly proposed hand-focused metrics. We further observe clear scaling trends: larger models trained on larger, higher-quality datasets produce more semantically coherent bimanual motion. Our dataset is released to support future research.", "link": "http://arxiv.org/abs/2603.28766v1", "date": "2026-03-30", "relevancy": 2.9425, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6288}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6171}, { {"title": "EgoDemoGen: Egocentric Demonstration Generation for Viewpoint Generalization in Robotic Manipulation", "author": "Yuan Xu and Jiabing Yang and Xiaofeng Wang and Yixiang Chen and Zheng Zhu and Bowen Fang and Guan Huang and Xinze Chen and Yun Ye and Qiang Zhang and Peiyan Li and Xiangnan Wu and Kai Wang and Bing Zhan and Shuo Lu and Jing Liu and Nianfeng Liu and Yan Huang and Liang Wang", "abstract": "Imitation learning based visuomotor policies have achieved strong performance in robotic manipulation, yet they often remain sensitive to egocentric viewpoint shifts. Unlike third-person viewpoint changes that only move the camera, egocentric shifts simultaneously alter both the camera pose and the robot action coordinate frame, making it necessary to jointly transfer action trajectories and synthesize corresponding observations under novel egocentric viewpoints. To address this challenge, we present EgoDemoGen, a framework that generates paired observation--action demonstrations under novel egocentric viewpoints through two key components: 1{)} EgoTrajTransfer, which transfers robot trajectories to the novel egocentric coordinate frame through motion-skill segmentation, geometry-aware transformation, and inverse kinematics filtering; and 2{)} EgoViewTransfer, a conditional video generation model that fuses a novel-viewpoint reprojected scene video and a robot motion video rendered from the transferred trajectory to synthesize photorealistic observations, trained with a self-supervised double reprojection strategy without requiring multi-viewpoint data. Experiments in simulation and real-world settings show that EgoDemoGen consistently improves policy success rates under both standard and novel egocentric viewpoints, with absolute gains of +24.6\\% and +16.9\\% in simulation and +16.0\\% and +23.0\\% on the real robot. Moreover, EgoViewTransfer achieves superior video generation quality for novel egocentric observations.", "link": "http://arxiv.org/abs/2509.22578v2", "date": "2026-03-30", "relevancy": 2.938, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5962}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5862}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5803}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EgoDemoGen%3A%20Egocentric%20Demonstration%20Generation%20for%20Viewpoint%20Generalization%20in%20Robotic%20Manipulation&body=Title%3A%20EgoDemoGen%3A%20Egocentric%20Demonstration%20Generation%20for%20Viewpoint%20Generalization%20in%20Robotic%20Manipulation%0AAuthor%3A%20Yuan%20Xu%20and%20Jiabing%20Yang%20and%20Xiaofeng%20Wang%20and%20Yixiang%20Chen%20and%20Zheng%20Zhu%20and%20Bowen%20Fang%20and%20Guan%20Huang%20and%20Xinze%20Chen%20and%20Yun%20Ye%20and%20Qiang%20Zhang%20and%20Peiyan%20Li%20and%20Xiangnan%20Wu%20and%20Kai%20Wang%20and%20Bing%20Zhan%20and%20Shuo%20Lu%20and%20Jing%20Liu%20and%20Nianfeng%20Liu%20and%20Yan%20Huang%20and%20Liang%20Wang%0AAbstract%3A%20Imitation%20learning%20based%20visuomotor%20policies%20have%20achieved%20strong%20performance%20in%20robotic%20manipulation%2C%20yet%20they%20often%20remain%20sensitive%20to%20egocentric%20viewpoint%20shifts.%20Unlike%20third-person%20viewpoint%20changes%20that%20only%20move%20the%20camera%2C%20egocentric%20shifts%20simultaneously%20alter%20both%20the%20camera%20pose%20and%20the%20robot%20action%20coordinate%20frame%2C%20making%20it%20necessary%20to%20jointly%20transfer%20action%20trajectories%20and%20synthesize%20corresponding%20observations%20under%20novel%20egocentric%20viewpoints.%20To%20address%20this%20challenge%2C%20we%20present%20EgoDemoGen%2C%20a%20framework%20that%20generates%20paired%20observation--action%20demonstrations%20under%20novel%20egocentric%20viewpoints%20through%20two%20key%20components%3A%201%7B%29%7D%20EgoTrajTransfer%2C%20which%20transfers%20robot%20trajectories%20to%20the%20novel%20egocentric%20coordinate%20frame%20through%20motion-skill%20segmentation%2C%20geometry-aware%20transformation%2C%20and%20inverse%20kinematics%20filtering%3B%20and%202%7B%29%7D%20EgoViewTransfer%2C%20a%20conditional%20video%20generation%20model%20that%20fuses%20a%20novel-viewpoint%20reprojected%20scene%20video%20and%20a%20robot%20motion%20video%20rendered%20from%20the%20transferred%20trajectory%20to%20synthesize%20photorealistic%20observations%2C%20trained%20with%20a%20self-supervised%20double%20reprojection%20strategy%20without%20requiring%20multi-viewpoint%20data.%20Experiments%20in%20simulation%20and%20real-world%20settings%20show%20that%20EgoDemoGen%20consistently%20improves%20policy%20success%20rates%20under%20both%20standard%20and%20novel%20egocentric%20viewpoints%2C%20with%20absolute%20gains%20of%20%2B24.6%5C%25%20and%20%2B16.9%5C%25%20in%20simulation%20and%20%2B16.0%5C%25%20and%20%2B23.0%5C%25%20on%20the%20real%20robot.%20Moreover%2C%20EgoViewTransfer%20achieves%20superior%20video%20generation%20quality%20for%20novel%20egocentric%20observations.%0ALink%3A%20http%3A//arxiv.org/abs/2509.22578v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEgoDemoGen%253A%2520Egocentric%2520Demonstration%2520Generation%2520for%2520Viewpoint%2520Generalization%2520in%2520Robotic%2520Manipulation%26entry.906535625%3DYuan%2520Xu%2520and%2520Jiabing%2520Yang%2520and%2520Xiaofeng%2520Wang%2520and%2520Yixiang%2520Chen%2520and%2520Zheng%2520Zhu%2520and%2520Bowen%2520Fang%2520and%2520Guan%2520Huang%2520and%2520Xinze%2520Chen%2520and%2520Yun%2520Ye%2520and%2520Qiang%2520Zhang%2520and%2520Peiyan%2520Li%2520and%2520Xiangnan%2520Wu%2520and%2520Kai%2520Wang%2520and%2520Bing%2520Zhan%2520and%2520Shuo%2520Lu%2520and%2520Jing%2520Liu%2520and {"title": "MRI-to-CT synthesis using drifting models", "author": "Qing Lyu and Jianxu Wang and Jeremy Hudson and Ge Wang and Chirstopher T. Whitlow", "abstract": "Accurate MRI-to-CT synthesis could enable MR-only pelvic workflows by providing CT-like images with bone details while avoiding additional ionizing radiation. In this work, we investigate recently proposed drifting models for synthesizing pelvis CT images from MRI and benchmark them against convolutional neural networks (UNet, VAE), a generative adversarial network (WGAN-GP), a physics-inspired probabilistic model (PPFM), and diffusion-based methods (FastDDPM, DDIM, DDPM). Experiments are performed on two complementary datasets: Gold Atlas Male Pelvis and the SynthRAD2023 pelvis subset. Image fidelity and structural consistency are evaluated with SSIM, PSNR, and RMSE, complemented by qualitative assessment of anatomically critical regions such as cortical bone and pelvic soft-tissue interfaces. Across both datasets, the proposed drifting model achieves high SSIM and PSNR and low RMSE, surpassing strong diffusion baselines and conventional CNN-, VAE-, GAN-, and PPFM-based methods. Visual inspection shows sharper cortical bone edges, improved depiction of sacral and femoral head geometry, and reduced artifacts or over-smoothing, particularly at bone-air-soft tissue boundaries. Moreover, the drifting model attains these gains with one-step inference and inference times on the order of milliseconds, yielding a more favorable accuracy-efficiency trade-off than iterative diffusion sampling while remaining competitive in image quality. These findings suggest that drifting models are a promising direction for fast, high-quality pelvic synthetic CT generation from MRI and warrant further investigation for downstream applications such as MRI-only radiotherapy planning and PET/MR attenuation correction.", "link": "http://arxiv.org/abs/2603.28498v1", "date": "2026-03-30", "relevancy": 2.9115, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5827}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5827}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5815}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MRI-to-CT%20synthesis%20using%20drifting%20models&body=Title%3A%20MRI-to-CT%20synthesis%20using%20drifting%20models%0AAuthor%3A%20Qing%20Lyu%20and%20Jianxu%20Wang%20and%20Jeremy%20Hudson%20and%20Ge%20Wang%20and%20Chirstopher%20T.%20Whitlow%0AAbstract%3A%20Accurate%20MRI-to-CT%20synthesis%20could%20enable%20MR-only%20pelvic%20workflows%20by%20providing%20CT-like%20images%20with%20bone%20details%20while%20avoiding%20additional%20ionizing%20radiation.%20In%20this%20work%2C%20we%20investigate%20recently%20proposed%20drifting%20models%20for%20synthesizing%20pelvis%20CT%20images%20from%20MRI%20and%20benchmark%20them%20against%20convolutional%20neural%20networks%20%28UNet%2C%20VAE%29%2C%20a%20generative%20adversarial%20network%20%28WGAN-GP%29%2C%20a%20physics-inspired%20probabilistic%20model%20%28PPFM%29%2C%20and%20diffusion-based%20methods%20%28FastDDPM%2C%20DDIM%2C%20DDPM%29.%20Experiments%20are%20performed%20on%20two%20complementary%20datasets%3A%20Gold%20Atlas%20Male%20Pelvis%20and%20the%20SynthRAD2023%20pelvis%20subset.%20Image%20fidelity%20and%20structural%20consistency%20are%20evaluated%20with%20SSIM%2C%20PSNR%2C%20and%20RMSE%2C%20complemented%20by%20qualitative%20assessment%20of%20anatomically%20critical%20regions%20such%20as%20cortical%20bone%20and%20pelvic%20soft-tissue%20interfaces.%20Across%20both%20datasets%2C%20the%20proposed%20drifting%20model%20achieves%20high%20SSIM%20and%20PSNR%20and%20low%20RMSE%2C%20surpassing%20strong%20diffusion%20baselines%20and%20conventional%20CNN-%2C%20VAE-%2C%20GAN-%2C%20and% {"title": "INSID3: Training-Free In-Context Segmentation with DINOv3", "author": "Claudia Cuttano and Gabriele Trivigno and Christoph Reich and Daniel Cremers and Carlo Masone and Stefan Roth", "abstract": "In-context segmentation (ICS) aims to segment arbitrary concepts, e.g., objects, parts, or personalized instances, given one annotated visual examples. Existing work relies on (i) fine-tuning vision foundation models (VFMs), which improves in-domain results but harms generalization, or (ii) combines multiple frozen VFMs, which preserves generalization but yields architectural complexity and fixed segmentation granularities. We revisit ICS from a minimalist perspective and ask: Can a single self-supervised backbone support both semantic matching and segmentation, without any supervision or auxiliary models? We show that scaled-up dense self-supervised features from DINOv3 exhibit strong spatial structure and semantic correspondence. We introduce INSID3, a training-free approach that segments concepts at varying granularities only from frozen DINOv3 features, given an in-context example. INSID3 achieves state-of-the-art results across one-shot semantic, part, and personalized segmentation, outperforming previous work by +7.5 % mIoU, while using 3x fewer parameters and without any mask or category-level supervision. Code is available at https://github.com/visinf/INSID3 .", "link": "http://arxiv.org/abs/2603.28480v1", "date": "2026-03-30", "relevancy": 2.8819, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5923}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5923}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.544 {"title": "OddGridBench: Exposing the Lack of Fine-Grained Visual Discrepancy Sensitivity in Multimodal Large Language Models", "author": "Tengjin Weng and Wenhao Jiang and Jingyi Wang and Ming Li and Lin Ma and Zhong Ming", "abstract": "Multimodal large language models (MLLMs) have achieved remarkable performance across a wide range of vision language tasks. However, their ability in low-level visual perception, particularly in detecting fine-grained visual discrepancies, remains underexplored and lacks systematic analysis. In this work, we introduce OddGridBench, a controllable benchmark for evaluating the visual discrepancy sensitivity of MLLMs. OddGridBench comprises over 1,400 grid-based images, where a single element differs from all others by one or multiple visual attributes such as color, size, rotation, or position. Experiments reveal that all evaluated MLLMs, including open-source families such as Qwen3-VL and InternVL3.5, and proprietary systems like Gemini-2.5-Pro and GPT-5, perform far below human levels in visual discrepancy detection. We further propose OddGrid-GRPO, a reinforcement learning framework that integrates curriculum learning and distance-aware reward. By progressively controlling the difficulty of training samples and incorporating spatial proximity constraints into the reward design, OddGrid-GRPO significantly enhances the model's fine-grained visual discrimination ability. We hope OddGridBench and OddGrid-GRPO will lay the groundwork for advancing perceptual grounding and visual discrepancy sensitivity in multimodal intelligence. Code and dataset are available at https://wwwtttjjj.github.io/OddGridBench/.", "link": "http://arxiv.org/abs/2603.09326v2", "date": "2026-03-30", "relevancy": 2.8232, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.571}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\ {"title": "The Scaffold Effect: How Prompt Framing Drives Apparent Multimodal Gains in Clinical VLM Evaluation", "author": "Doan Nam Long Vu and Simone Balloccu", "abstract": "Trustworthy clinical AI requires that performance gains reflect genuine evidence integration rather than surface-level artifacts. We evaluate 12 open-weight vision-language models (VLMs) on binary classification across two clinical neuroimaging cohorts, \\textsc{FOR2107} (affective disorders) and \\textsc{OASIS-3} (cognitive decline). Both datasets come with structural MRI data that carries no reliable individual-level diagnostic signal. Under these conditions, smaller VLMs exhibit gains of up to 58\\% F1 upon introduction of neuroimaging context, with distilled models becoming competitive with counterparts an order of magnitude larger. A contrastive confidence analysis reveals that merely \\emph{mentioning} MRI availability in the task prompt accounts for 70-80\\% of this shift, independent of whether imaging data is present, a domain-specific instance of modality collapse we term the \\emph{scaffold effect}. Expert evaluation reveals fabrication of neuroimaging-grounded justifications across all conditions, and preference alignment, while eliminating MRI-referencing behavior, collapses both conditions toward random baseline. Our findings demonstrate that surface evaluations are inadequate indicators of multimodal reasoning, with direct implications for the deployment of VLMs in clinical settings.", "link": "http://arxiv.org/abs/2603.28387v1", "date": "2026-03-30", "relevancy": 2.7675, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5607}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5607}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5391}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Scaffold%20Effect%3A%20How%20Prompt%20Framing%20Drives%20Apparent%20Multimodal%20Gains%20in%20Clinical%20VLM%20Evaluation&body=Title%3A%20The%20Scaffold%20Effect%3A%20How%20Prompt%20Framing%20Drives%20Apparent%20Multimodal%20Gains%20in%20Clinical%20VLM%20Evaluation%0AAuthor%3A%20Doan%20Nam%20Long%20Vu%20and%20Simone%20Balloccu%0AAbstract%3A%20Trustworthy%20clinical%20AI%20requires%20that%20performance%20gains%20reflect%20genuine%20evidence%20integration%20rather%20than%20surface-level%20artifacts.%20We%20evaluate%2012%20open-weight%20vision-language%20models%20%28VLMs%29%20on%20binary%20classification%20across%20two%20clinical%20neuroimaging%20cohorts%2C%20%5Ctextsc%7BFOR2107%7D%20%28affective%20disorders%29%20and%20%5Ctextsc%7BOASIS-3%7D%20%28cognitive%20decline%29.%20Both%20datasets%20come%20with%20structural%20MRI%20data%20that%20carries%20no%20reliable%20individual-level%20diagnostic%20signal.%20Under%20these%20conditions%2C%20smaller%20VLMs%20exhibit%20gains%20of%20up%20to%2058%5C%25%20F1%20upon%20introduction%20of%20neuroimaging%20context%2C%20with%20distilled%20models%20becoming%20competitive%20with%20counterparts%20an%20order%20of%20magnitude%20larger.%20A%20contrastive%20confidence%20analysis%20reveals%20that%20merely%20%5Cemph%7Bmentioning%7D%20MRI%20availability%20in%20the%20task%20prompt%20accounts%20for%2070-80%5C%25%20of%20this%20shift%2C%20independent%20of%20whether%20imaging%20data%20is%20present%2C%20a%20domain-specific%20instance%20of%20modality%20collapse%20we%20term%20the%20%5Cemph%7Bscaffold%20effect%7D.%20Expert%20evaluation%20reveals%20fabrication%20of%20neuroimaging-grounded%20justifications%20across%20all%20conditions%2C%20and%20preference%20alignment%2C%20while%20eliminating%20MRI-referencing%20behavior%2C%20collapses%20both%20conditions%20toward%20random%20baseline.%20Our%20findings%20demonstrate%20t {"title": "Stop Probing, Start Coding: Why Linear Probes and Sparse Autoencoders Fail at Compositional Generalisation", "author": "Vit\u00f3ria Barin Pacela and Shruti Joshi and Isabela Camacho and Simon Lacoste-Julien and David Klindt", "abstract": "The linear representation hypothesis states that neural network activations encode high-level concepts as linear mixtures. However, under superposition, this encoding is a projection from a higher-dimensional concept space into a lower-dimensional activation space, and a linear decision boundary in the concept space need not remain linear after projection. In this setting, classical sparse coding methods with per-sample iterative inference leverage compressed sensing guarantees to recover latent factors. Sparse autoencoders (SAEs), on the other hand, amortise sparse inference into a fixed encoder, introducing a systematic gap. We show this amortisation gap persists across training set sizes, latent dimensions, and sparsity levels, causing SAEs to fail under out-of-distribution (OOD) compositional shifts. Through controlled experiments that decompose the failure, we identify dictionary learning -- not the inference procedure -- as the binding constraint: SAE-learned dictionaries point in substantially wrong directions, and replacing the encoder with per-sample FISTA on the same dictionary does not close the gap. An oracle baseline proves the problem is solvable with a good dictionary at all scales tested. Our results reframe the SAE failure as a dictionary learning challenge, not an amortisation problem, and point to scalable dictionary learning as the key open problem for sparse inference under superposition.", "link": "http://arxiv.org/abs/2603.28744v1", "date": "2026-03-30", "relevancy": 2.7643, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5554}, {"title": "Lexicon3D: Probing Visual Foundation Models {"title": "NARVis: Neural Accelerated Rendering for Real-Time Scientific Point Cloud Visualization", "author": "Srinidhi Hegde and Kaur Kullman and Thomas Grubb and Leslie Lait and Stephen Guimond and Matthias Zwicker", "abstract": "Exploring scientific datasets with billions of samples in real-time visualization presents a challenge - balancing high-fidelity rendering with speed. This work introduces a neural accelerated renderer, NARVis, that uses the neural deferred rendering framework to visualize large-scale scientific point cloud data. NARVis augments a real-time point cloud rendering pipeline with high-quality neural post-processing, making the approach ideal for interactive visualization at scale. Specifically, we render the multi-attribute point cloud using a high-performance multi-attribute rasterizer and train a neural renderer to capture the desired post-processing effects from a conventional high-quality renderer. NARVis is effective in visualizing complex multidimensional Lagrangian flow fields and photometric scans of a large terrain as compared to the state-of-the-art high-quality renderers. Extensive evaluations demonstrate that NARVis prioritizes speed and scalability while retaining high visual fidelity. We achieve competitive frame rates of $>$126 fps for interactive rendering of $>$350M points (i.e., an effective throughput of $>$44 billion points per second) using ~12 GB of memory on RTX 2080 Ti GPU. Furthermore, NARVis is generalizable across different point clouds with similar visualization needs and the desired post-processing effects could be obtained with substantial high quality even at lower resolutions of the original point cloud, further reducing the memory requirements.", "link": "http://arxiv.org/abs/2407.19097v2", "date": "2026-03-30", "relevancy": 2.763, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5738}, {"title": "CAT3D: {"title": "Unified Restoration-Perception Learning: Maritime Infrared-Visible Image Fusion and Segmentation", "author": "Weichao Cai and Weiliang Huang and Biao Xue and Chao Huang and Fei Yuan and Bob Zhang", "abstract": "Marine scene understanding and segmentation plays a vital role in maritime monitoring and navigation safety. However, prevalent factors like fog and strong reflections in maritime environments cause severe image degradation, significantly compromising the stability of semantic perception. Existing restoration and enhancement methods typically target specific degradations or focus solely on visual quality, lacking end-to-end collaborative mechanisms that simultaneously improve structural recovery and semantic effectiveness. Moreover, publicly available infrared-visible datasets are predominantly collected from urban scenes, failing to capture the authentic characteristics of coupled degradations in marine environments. To address these challenges, the Infrared-Visible Maritime Ship Dataset (IVMSD) is proposed to cover various maritime scenarios under diverse weather and illumination conditions. Building upon this dataset, a Multi-task Complementary Learning Framework (MCLF) is proposed to collaboratively perform image restoration, multimodal fusion, and semantic segmentation within a unified architecture. The framework includes a Frequency-Spatial Enhancement Complementary (FSEC) module for degradation suppression and structural enhancement, a Semantic-Visual Consistency Attention (SVCA) module for semantic-consistent guidance, and a cross-modality guided attention mechanism for selective fusion. Experimental results on IVMSD demonstrate that the proposed method achieves state-of-the-art segmentation performance, significantly enhancing robustness and perceptual quality under complex maritime conditions.", "link": "http://arxiv.org/abs/2603.28414v1", "date": "2026-03-30", "relevancy": 2.7499, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5531}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5484}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5484}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unified%20Restoration-Perception%20Learning%3A%20Maritime%20Infrared-Visible%20Image%20Fusion%20and%20Segmentation&body=Title%3A%20Unified%20Restoration-Perception%20Learning%3A%20Maritime%20Infrared-Visible%20Image%20Fusion%20and%20Segmentation%0AAuthor%3A%20Weichao%20Cai%20and%20Weiliang%20Huang%20and%20Biao%20Xue%20and%20Chao%20Huang%20and%20Fei%20Yuan%20and%20Bob%20Zhang%0AAbstract%3A%20Marine%20scene%20understanding%20and%20segmentation%20plays%20a%20vital%20role%20in%20maritime%20monitoring%20and%20navigation%20safety.%20However%2C%20prevalent%20factors%20like%20fog%20and%20strong%20reflections%20in%20maritime%20environments%20cause%20severe%20image%20degradation%2C%20significantly%20compromising%20the%20stability%20of%20semantic%20perception.%20Existing%20restoration%20and%20enhancement%20methods%20typically%20target%20specific%20degradations%20or%20focus%20solely%20on%20visual%20quality%2C%20lacking%20end-to-end%20collaborative%20mechanisms%20that%20simultaneously%20improve%20structural%20recovery%20and%20semantic%20effectiveness.%20Moreover%2C%20publicly%20available%20infrared-visible%20datasets%20are%20predominantly%20collected%20from%20urban%20scenes%2C%20failing%20to%20capture%20the%20authentic%20characteristics%20of%20coupled%20degradations%20in%20marine%20environments.%20To%20address%20these%20challenges%2C%20the%20Infrared-Visible%20Maritime%20Ship%20Dataset%20%28IVMSD%29%20is%20proposed%20to%20cover%20various%20maritime%20scenarios%20under%20diverse%20weather%20and%20illumination%20conditions.%20Building%20upon%20this%20dataset%2C%20a%20Multi-task%20Complementary%20Learning%20Framework%20%28MCLF%29%20is%20proposed%20to%20collaboratively%20perform%20image%20restoration%2C%20multimodal%20fusion%2C%20and%20semantic%20segmentation%20within%20a%20unified%20architecture.%20The%20framework%20includes%20a%20Frequency-Spatial%20Enhancement%20Complementary%20%28FSEC%29%20module%20for%20degradation%20suppression%20and%20structural%20enhancement%2C%20a%20Semantic-Visual%20Consistency%20Attention%20%28SVCA%29%20module%20for%20semantic-consistent%20guidance%2C%20and%20a%20cross-modality%20guided%20attention%20mechanism%20for%20selective%20fusion.%20Experimental%20results%20on%20IVMSD%20demonstrate%20that%20the%20proposed%20method%20achieves%20state-of-the-art%20segmentation%20performance%2C%20significantly%20enhancing%20robustness%20and%20perceptual%20quality%20under%20complex%20maritime%20conditions.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28414v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnified%2520Restoration-Perception%2520Learning%253A%2520Maritime%2520Infrared-Visible%2520Image%2520Fusion%2520and%2520Segmentation%26entry.906535625%3DWeichao%2520Cai%2520and%2520Weiliang%2520Huang%2520and%2520Biao%2520Xue%2520and%2520Chao%2520Huang%2520and%2520Fei%2520Yuan%2520and%2520Bob%2520Zhang%26entry.1292438233%3DMarine%2520scene%2520understanding%2520and%2520segmentation%2520plays%2520a%2520vital%2520role%2520in%2520maritime%2520monitoring%2520and%2520navigation%2520safety.%2520However%252C%2520prevalent%2520factors%2520like%2520fog%2520and%2520strong%2520reflections%2520in%2520maritime%2520environments%2520cause%2520severe%2520image%2520degradation%252C%2520significantly%2520compromising%2520the%2520stability%2520of%2520semantic%2520perception.%2520Existing%2520restoration%2520and%2520enhancement%2520methods%2520typically%2520target%2520specific%2520degr {"title": "Identity-Preserving Image-to-Video Generation via Reward-Guided Optimization", "author": "Liao Shen and Wentao Jiang and Yiran Zhu and Jiahe Li and Tiezheng Ge and Zhiguo Cao and Bo Zheng", "abstract": "Recent advances in image-to-video (I2V) generation have achieved remarkable progress in synthesizing high-quality, temporally coherent videos from static images. Among all the applications of I2V, human-centric video generation includes a large portion. However, existing I2V models encounter difficulties in maintaining identity consistency between the input human image and the generated video, especially when the person in the video exhibits significant expression changes and movements. This issue becomes critical when the human face occupies merely a small fraction of the image. Since humans are highly sensitive to identity variations, this poses a critical yet under-explored challenge in I2V generation. In this paper, we propose Identity-Preserving Reward-guided Optimization (IPRO), a novel video diffusion framework based on reinforcement learning to enhance identity preservation. Instead of introducing auxiliary modules or altering model architectures, our approach introduces a direct and effective tuning algorithm that optimizes diffusion models using a face identity scorer. To improve performance and accelerate convergence, our method backpropagates the reward signal through the last steps of the sampling chain, enabling richer gradient feedback. We also propose a novel facial scoring mechanism that treats faces in ground-truth videos as facial feature pools, providing multi-angle facial information to enhance generalization. A KL-divergence regularization is further incorporated to stabilize training and prevent overfitting to the reward signal. Extensive experiments on Wan 2.2 I2V model and our in-house I2V model demonstrate the effectiveness of our method. Our project and code are available at https://ipro-alimama.github.io/.", "link": "http://arxiv.org/abs/2510.14255v4", "date": "2026-03-30", "relevancy": 2.7442, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.732}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6591}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6385}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Identity-Preserving%20Image-to-Video%20Generation%20via%20Reward-Guided%20Optimization&body=Title%3A%20Identity-Preserving%20Image-to-Video%20Generation%20via%20Reward-Guided%20Optimization%0AAuthor%3A%20Liao%20Shen%20and%20Wentao%20Jiang%20and%20Yiran%20Zhu%20and%20Jiahe%20Li%20and%20Tiezheng%20Ge%20and%20Zhiguo%20Cao%20and%20Bo%20Zheng%0AAbstract%3A%20Recent%20advances%20in%20image-to-video%20%28I2V%29%20generation%20have%20achieved%20remarkable%20progress%20in%20synthesizing%20high-quality%2C%20temporally%20coherent%20videos%20from%20static%20images.%20Among%20all%20the%20applications%20of%20I2V%2C%20human-centric%20video%20generation%20includes%20a%20large%20portion.%20However%2C%20existing%20I2V%20models%20encounter%20difficulties%20in%20maintaining%20identity%20consistency%20between%20the%20input%20human%20image%20and%20the%20generated%20video%2C%20especially%20when%20the%20person%20in%20the%20video%20exhibits%20significant%20expression%20changes%20and%20movements.%20This%20issue%20becomes%20critical%20when%20the%20human%20face%20occupies%20merely%20a%20small%20fraction%20of%20the%20image.%20Since%20humans%20are%20highly%20sensitive%20to%20identity%20variations%2C%20this%20poses%20a%20critical%20yet%20under-explored%20challenge%20in%20I2V%20generation.%20In%20this%20paper%2C%20we%20propose%20Identity-Preserving%20Reward-guided%20Optimization%20%28IPRO%29%2C%20a%20novel%20video%20diffusion%20framework%20based%20on%20reinforcement%20learning%20to%20enhance%20identity%20preservation.%20Instead%20of%20introducing%20auxiliary%20modules%20or%20altering%20model%20architectures%2C%20our%20approach%20introduces%20a%20direct%20and%20effective%20tuning%20algorithm%20that%20optimizes%20diffusion%20models%20using%20a%20face%20identity%20scorer.%20To%20improve%20performance%20and%20accelerate%20convergence%2C%20our%20method%20backpropagates%20the%20reward%20signal%20through%20the%20last%20steps%20of%20the%20sampling%20chain%2C%20enabling%20richer%20gradient%20feedback.%20We%20also%20propose%20a%20novel%20facial%20scoring%20mechanism%20that%20treats%20faces%20in%20ground-truth%20videos%20as%20facial%20feature%20pools%2C%20providing%20multi-angle%20facial%20information%20to%20enhance%20generalization.%20A%20KL-divergence%20regularization%20is%20further%20incorporated%20to%20stabilize%20training%20and%20prevent%20overfitting%20to%20the%20reward%20signal.%20Extensive%20experiments%20on%20Wan%202.2%20I2V%20model%20and%20our%20in-house%20I2V%20model%20demonstrate%20the%20effectiveness%20of%20our%20method.%20Our%20project%20and%20code%20are%20available%20at%20https%3A//ipro-alimama.github.io/.%0ALink%3A%20http%3A//arxiv.org/abs/2510.14255v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIdentity-Preserving%2520Image-to-Video%2520Generation%2520via%2520Reward-Guided%2520Optimization%26entry.906535625%3DLiao%2520Shen%2520and%2520Wentao%2520Jiang%2520and%2520Yiran%2520Zhu%2520and%2520Jiahe%2520Li%2520and%2520Tiezheng%2520Ge%2520and%2520Zhiguo%2520Cao%2520and%2520Bo%2520Zheng%26entry.1292438233%3DRecent%2520advances%2520in%2520image-to-video%2520%2528I2V%2529%2520generation%2520have%2520achieved%2520remarkable%2520progress%2520in%2520synthesizing%2520high-quality%252C%2520temporally%2520coherent%2520videos%2520from%2520static%2520images.%2520Among%2520all%2520the {"title": "Seeing with You: Perception-Reasoning Coevolution for Multimodal Reasoning", "author": "Ziqi Miao and Haonan Jia and Lijun Li and Chen Qian and Yuan Xiong and Wenting Yan and Jing Shao", "abstract": "Reinforcement learning with verifiable rewards (RLVR) has substantially enhanced the reasoning capabilities of multimodal large language models (MLLMs). However, existing RLVR approaches typically rely on outcome-driven optimization that updates both perception and reasoning using a shared reward based solely on the final answer. This shared reward blurs credit assignment, frequently improving reasoning patterns while failing to reliably enhance the accuracy of upstream visual evidence extraction. To address this perception bottleneck, we introduce PRCO (Perception-Reasoning Coevolution), a dual-role RLVR framework with a shared policy. PRCO consists of two cooperative roles: an Observer that generates an evidence caption tailored to the question and a Solver that predicts the final answer based on this caption. Crucially, PRCO employs role-specific reward signals: the Solver is optimized using verifiable outcome rewards on the final answer, while the Observer receives a utility reward derived from the Solver's downstream success. Extensive experiments across eight challenging multimodal reasoning benchmarks demonstrate that PRCO yields consistent improvements across model scales by over 7 points on average accuracy compared to the base model, outperforming prior open-source RL-tuned baselines.", "link": "http://arxiv.org/abs/2603.28618v1", "date": "2026-03-30", "relevancy": 2.744, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5514}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", " {"title": "Bridging the Geometry Mismatch: Frequency-Aware Anisotropic Serialization for Thin-Structure SSMs", "author": "Jin Bai and Huiyao Zhang and Qi Wen and Ningyang Li and Shengyang Li and Atta ur Rahman and Xiaolin Tian", "abstract": "The segmentation of thin linear structures is inherently topology allowbreak-critical, where minor local errors can sever long-range connectivity. While recent State-Space Models (SSMs) offer efficient long-range modeling, their isotropic serialization (e.g., raster scanning) creates a geometry mismatch for anisotropic targets, causing state propagation across rather than along the structure trajectories. To address this, we propose FGOS-Net, a framework based on frequency allowbreak-geometric disentanglement. We first decompose features into a stable topology carrier and directional high-frequency bands, leveraging the latter to explicitly correct spatial misalignments induced by downsampling. Building on this calibrated topology, we introduce frequency-aligned scanning that elevates serialization to a geometry-conditioned decision, preserving direction-consistent traces. Coupled with an active probing strategy to selectively inject high-frequency details and suppress texture ambiguity, FGOS-Net consistently outperforms strong baselines across four challenging benchmarks. Notably, it achieves 91.3% mIoU and 97.1% clDice on DeepCrack while running at 80 FPS with only 7.87 GFLOPs.", "link": "http://arxiv.org/abs/2603.28503v1", "date": "2026-03-30", "relevancy": 2.738, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5763}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.557}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "si %2520strategy%2520to%2520selectively%2520inject%2520high-frequency%2520details%2520and%2520suppress%2520texture%2520ambiguity%252C%2520FGOS-Net%2520consistently%2520outperforms%2520strong%2520baselines%2520across%2520four%2520challenging%2520benchmarks.%2520Notably%252C%2520it%2520achieves%252091.3%2525%2520mIoU%2520and%252097.1%2525%2520clDice%2520on%2520DeepCrack%2520while%2520running%2520at%252080%2520FPS%2520with%2520only%25207.87%2520GFLOPs.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.28503v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Bridging%20the%20Geometry%20Mismatch%3A%20Frequency-Aware%20Anisotropic%20Serialization%20for%20Thin-Structure%20SSMs&entry.906535625=Jin%20Bai%20and%20Huiyao%20Zhang%20and%20Qi%20Wen%20and%20Ningyang%20Li%20and%20Shengyang%20Li%20and%20Atta%20ur%20Rahman%20and%20Xiaolin%20Tian&entry.1292438233=The%20segmentation%20of%20thin%20linear%20structures%20is%20inherently%20topology%20allowbreak-critical%2C%20where%20minor%20local%20errors%20can%20sever%20long-range%20connectivity.%20While%20recent%20State-Space%20Models%20%28SSMs%29%20offer%20efficient%20long-range%20modeling%2C%20their%20isotropic%20serialization%20%28e.g.%2C%20raster%20scanning%29%20creates%20a%20geometry%20mismatch%20for%20anisotropic%20targets%2C%20causing%20state%20propagation%20across%20rather%20than%20along%20the%20structure%20trajectories.%20To%20address%20this%2C%20we%20propose%20FGOS-Net%2C%20a%20framework%20based%20on%20frequency%20allowbreak-geometric%20disentanglement.%20We%20first%20decompose%20features%20into%20a%20stable%20topology%20carrier%20and%20directional%20high-frequency%20bands%2C%20leveraging%20the%20latter%20to%20explicitly%20correct%20spatial%20misalignments%20induced%20by%20downsampling.%20Building%20on%20this%20calibrated%20topology%2C%20we%20introduce%20frequency-aligned%20scanning%20that%20elevates%20serialization%20to%20a%20 {"title": "Hierarchical Concept Embedding & Pursuit for Interpretable Image Classification", "author": "Nghia Nguyen and Tianjiao Ding and Ren\u00e9 Vidal", "abstract": "Interpretable-by-design models are gaining traction in computer vision because they provide faithful explanations for their predictions. In image classification, these models typically recover human-interpretable concepts from an image and use them for classification. Sparse concept recovery methods leverage the latent space of vision-language models to represent image embeddings as sparse combinations of concept embeddings. However, by ignoring the hierarchical structure of semantic concepts, these methods may produce correct predictions with explanations that are inconsistent with the hierarchy. In this work, we propose Hierarchical Concept Embedding & Pursuit (HCEP), a framework that induces a hierarchy of concept embeddings in the latent space and performs hierarchical sparse coding to recover the concepts present in an image. Given a hierarchy of semantic concepts, we introduce a geometric construction for the corresponding hierarchy of embeddings. Under the assumption that the true concepts form a rooted path in the hierarchy, we derive sufficient conditions for their recovery in the embedding space. We further show that hierarchical sparse coding reliably recovers hierarchical concept embeddings, whereas standard sparse coding fails. Experiments on real-world datasets show that HCEP improves concept precision and recall compared to existing methods while maintaining competitive classification accuracy. Moreover, when the number of samples available for concept estimation and classifier training is limited, HCEP achieves superior classification accuracy and concept recovery. Our results demonstrate that incorporating hierarchical structure into sparse concept recovery leads to more faithful and interpretable image classification models.", "link": "http://arxiv.org/abs/2602.11448v3", "date": "2026-03-30", "relevancy": 2.7354, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5593}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.541}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.541}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hierarchical%20Concept%20Embedding%20%26%20Pursuit%20for%20Interpretable%20Image%20Classification&body=Title%3A%20Hierarchical%20Concept%20Embedding%20%26%20Pursuit%20for%20Interpretable%20Image%20Classification%0AAuthor%3A%20Nghia%20Nguyen%20and%20Tianjiao%20Ding%20and%20Ren%C3%A9%20Vidal%0AAbstract%3A%20Interpretable-by-design%20models%20are%20gaining%20traction%20in%20computer%20vision%20because%20they%20provide%20faithful%20explanations%20for%20their%20predictions.%20In%20image%20classification%2C%20these%20models%20typically%20recover%20human-interpretable%20concepts%20from%20an%20image%20and%20use%20them%20for%20classification.%20Sparse%20concept%20recovery%20methods%20leverage%20the%20latent%20space%20of%20vision-language%20models%20to%20represent%20image%20embeddings%20as%20sparse%20combinations%20of%20concept%20embeddings.%20However%2C%20by%20ignoring%20the%20hierarchical%20structure%20of%20semantic%20concepts%2C%20these%20methods%20may%20produce%20correct%20predictions%20with%20explanations%20that%20are%20inconsistent%20with%20the%20hierarchy.%20In%20this%20work%2C%20we%20propose%20Hierarchical%20Concept%20Embedding%20%26%20Pursuit%20%28HCEP%29%2C%20a%20framework%20that%20induces%20a%20hierarchy%20of%20concept%20embeddings%20in%20the%20latent%20space%20and%20performs%20hierarchical%20sparse%20coding%20to%20recover%20the%20concepts%20present%20in%20an%20image.%20Given%20a%20hierarchy%20of%20semantic%20concepts%2C%20we%20introduce%20a%20geometric%20construction%20for%20the%20corresponding%20hierarchy%20of%20embeddings.%20Under%20the%20assumption%20that%20the%20true%20concepts%20form%20a%20rooted%20path%20in%20the%20hierarchy%2C%20we%20derive%20sufficient%20conditions%20for%20their%20recovery%20in%20the%20embedding%20space.%20We%20further%20show%20that%20hierarchical%20sparse%20coding%20reliably%20recovers%20hierarchical%20concept%20embeddings%2C%20whereas%20standard%20sparse%20coding%20fails.%20Experiments%20on%20real-world%20datasets%20show%20that%20HCEP%20improves%20concept%20precision%20and%20recall%20compared%20to%20existing%20methods%20while%20maintaining%20competitive%20classification%20accuracy.%20Moreover%2C%20when%20the%20number%20of%20samples%20available%20for%20concept%20estimation%20and%20classifier%20training%20is%20limited%2C%20HCEP%20achieves%20superior%20classification%20accuracy%20and%20concept%20recovery.%20Our%20results%20demonstrate%20that%20incorporating%20hierarchical%20structure%20into%20sparse%20concept%20recovery%20leads%20to%20more%20faithful%20and%20interpretable%20image%20classification%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2602.11448v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHierarchical%2520Concept%2520Embedding%2520%2526%2520Pursuit%2520for%2520Interpretable%2520Image%2520Classification%26entry.906535625%3DNghia%2520Nguyen%2520and%2520Tianjiao%2520Ding%2520and%2520Ren%25C3%25A9%2520Vidal%26entry.1292438233%3DInterpretable-by-design%2520models%2520are%2520gaining%2520traction%2520in%2520computer%2520vision%2520because%2520they%2520provide%2520faithful%2520explanations%2520for%2520their%2520predictions.%2520In%2520image%2520classification%252C%2520these%2520models%2520typically%2520recover%2520human-interpretable%2520concepts%2520from%2520an%2520image%2520and%2520use%2520them%2520for%2520classification.%2520Sparse%2520concept%2520recovery%2520methods%2520leverage%2520the%2520latent%2520space%2520of%2520vision-language%2520models%2520to%2520represent%2520image%2520embeddings%2520as%2520sparse%2520combinations%2520of%2520concept%2520embeddings.%2520However%252C%2520by%2520ignoring%2520the%2520hierarchical%2520structure%2520of%2520semantic%2520concepts%252C%2520these%2520methods%2520may%2520produce%2520correct%2520predictions%2520with%2520explanations%2520that%2520are%2520inconsistent%2520with%2520the%2520hierarchy.%2520In%2520this%2520work%252C%2520we%2520propose%2520Hierarchical%2520Concept%2520Embedding%2520%2526%2520Pursuit%2520%2528HCEP%2529%252C%2520a%2520framework%2520that%2520induces%2520a%2520hierarchy%2520of%2520concept%2520embeddings%2520in%2520the%2520latent%2520space%2520and%2520performs%2520hierarchical%2520sparse%2520coding%2520to%2520recover%2520the%2520concepts%2520present%2520in%2520an%2520image.%2520Given%2520a%2520hierarchy%2520of%2520semantic%2520concepts%252C%2520we%2520introduce%2520a%2520geometric%2520construction%2520for%2520the%2520corresponding%2520hierarchy%2520of%2520embeddings.%2520Under%2520the%2520assumption%2520that%2520the%2520true%2520concepts%2520form%2520a%2520rooted%2520path%2520in%2520the%2520hierarchy%252C%2520we%2520derive%2520sufficient%2520conditions%2520for%2520their%2520recovery%2520in%2520the%2520embedding%2520space.%2520We%2520further%2520show%2520that%2520hierarchical%2520sparse%2520coding%2520reliably%2520recovers%2520hierarchical%2520concept%2520embeddings%252C%2520whereas%2520standard%2520sparse%2520coding%2520fails.%2520Experiments%2520on%2520real-world%2520datasets%2520show%2520that%2520HCEP%2520improves%2520concept%2520precision%2520and%2520recall%2520compared%2520to%2520existing%2520methods%2520while%2520maintaining%2520competitive%2520classification%2520accuracy.%2520Moreover%252C%2520when%2520the%2520number%2520of%2520samples%2520available%2520for%2520concept%2520estimation%2520and%2520classifier%2520training%2520is%2520limited ings.%20Under%20the%20assumption%20that%20the%20true%20concepts%20form%20a%20rooted%20path%20in%20the%20hierarchy%2C%20we%20derive%20sufficient%20conditions%20for%20their%20recovery%20in%20the%20embedding%20space.%20We%20further%20show%20that%20hierarchical%20sparse%20coding%20reliably%20recovers%20hierarchical%20concept%20embeddings%2C%20whereas%20standard%20sparse%20coding%20fails.%20Experiments%20on%20real-world%20datasets%20show%20that%20HCEP%20improves%20concept%20precision%20and%20recall%20compared%20to%20existing%20methods%20while%20maintaining%20competitive%20classification%20accuracy.%20Moreover%2C%20when%20the%20number%20of%20samples%20available%20for%20concept%20estimation%20and%20classifier%20training%20is%20limited%2C%20HCEP%20achieves%20superior%20classification%20accuracy%20and%20concept%20recovery.%20Our%20results%20demonstrate%20that%20incorporating%20hierarchical%20structure%20into%20sparse%20concept%20recovery%20leads%20to%20more%20faithful%20and%20interpretable%20image%20classification%20models.&entry.1838667208=http%3A//arxiv.org/abs/2602.11448v3&entry.124074799=Read"},
{"title": "Domain-Invariant Prompt Learning for Vision-Language Models", "author": "Arsham Gholamzadeh Khoee and Yinan Yu and Robert Feldt", "abstract": "Large pre-trained vision-language models like CLIP have transformed computer vision by aligning images and text in a shared feature space, enabling robust zero-shot transfer via prompting. Soft-prompting, such as Context Optimization (CoOp), effectively adapts these models for downstream recognition tasks by learning a set of context vectors. However, CoOp lacks explicit mechanisms for handling domain shifts across unseen distributions. To address this, we propose Domain-invariant Context Optimization (DiCoOp), an extension of CoOp optimized for domain generalization. By employing an adversarial training approach, DiCoOp forces the model to learn domain-invariant prompts while preserving discriminative power for classification. Experimental results show that DiCoOp consistently surpasses CoOp in domain generalization tasks across diverse visual domains.", "link": "http://arxiv.org/abs/2603.28555v1", "date": "2026-03-30", "relevancy": 2.7293, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5552}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5552}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5272}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Domain-Invariant%20Prompt%20Learning%20for%20Vision-Language%20Models&body=Title%3A%20Domain-Invariant%20Prompt%20Learning%20for%20Vision-Language%20Models%0AAuthor%3A%20Arsham%20Gholamzadeh%20Khoee%20and%20Yinan%20Yu%20and%20Robert%20Feldt%0AAbstract%3A%20Large%20pre-trained%20vision-language%20models%20like%20CLIP%20have%20transformed%2

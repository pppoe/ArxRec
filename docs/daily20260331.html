nd%20then%20infer%20possible%20edges%20between%20vertices.%20They%20achieve%20fast%20topology-aware%20inference%2C%20but%20limits%20the%20dynamic%20insertion%20of%20vertices.%20To%20address%20these%20challenges%2C%20we%20propose%20DeH4R%2C%20a%20novel%20hybrid%20model%20that%20combines%20graph-generating%20efficiency%20and%20graph-growing%20dynamics.%20This%20is%20achieved%20by%20decoupling%20the%20task%20into%20candidate%20vertex%20detection%2C%20adjacent%20vertex%20prediction%2C%20initial%20graph%20contruction%2C%20and%20graph%20expansion.%20This%20architectural%20innovation%20enables%20dynamic%20vertex%20%28edge%29%20insertions%20while%20retaining%20fast%20inference%20speed%20and%20enhancing%20both%20topology%20fidelity%20and%20spatial%20consistency.%20Comprehensive%20evaluations%20on%20CityScale%20and%20SpaceNet%20benchmarks%20demonstrate%20state-of-the-art%20%28SOTA%29%20performance.%20DeH4R%20outperforms%20the%20prior%20SOTA%20graph-growing%20method%20RNGDet%2B%2B%20by%204.62%20APLS%20and%2010.18%20IoU%20on%20CityScale%2C%20while%20being%20approximately%2010%20%24%5Ctimes%24%20faster.%20The%20code%20will%20be%20made%20publicly%20available%20at%20https%3A//github.com/7777777FAN/DeH4R.&entry.1838667208=http%3A//arxiv.org/abs/2508.13669v2&entry.124074799=Read"},
{"title": "FastVMT: Eliminating Redundancy in Video Motion Transfer", "author": "Yue Ma and Zhikai Wang and Tianhao Ren and Mingzhe Zheng and Hongyu Liu and Jiayi Guo and Kunyu Feng and Yuxuan Xue and Zixiang Zhao and Konrad Schindler and Qifeng Chen and Linfeng Zhang", "abstract": "Video motion transfer aims to synthesize videos by generating visual content according to a text prompt while transferring the motion pattern observed in a reference video. Recent methods predominantly use the Diffusion Transformer (DiT) architecture. To achieve satisfactory runtime, several methods attempt to accelerate the computations in the DiT, but fail to address structural sources of inefficiency. In this work, we identify and remove two types of computational redundancy in earlier work: motion redundancy arises because the generic DiT architecture does not reflect the fact that frame-to-frame motion is small and smooth; gradient redundancy occurs if one ignores that gradients change slowly along the diffusion trajectory. To mitigate motion redundancy, we mask the corresponding attention layers to a local neighborhood such that interaction weights are not computed unnecessarily distant image regions. To exploit gradient redundancy, we design an optimization scheme that reuses gradients from previous diffusion steps and skips unwarranted gradient computations. On average, FastVMT achieves a 3.43x speedup without degrading the visual fidelity or the temporal consistency of the generated videos.", "link": "http://arxiv.org/abs/2602.05551v3", "date": "2026-03-30", "relevancy": 2.5171, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6682}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6279}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "li FastVMT%20achieves%20a%203.43x%20speedup%20without%20degrading%20the%20visual%20fidelity%20or%20the%20temporal%20consistency%20of%20the%20generated%20videos.%0ALink%3A%20http%3A//arxiv.org/abs/2602.05551v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFastVMT%253A%2520Eliminating%2520Redundancy%2520in%2520Video%2520Motion%2520Transfer%26entry.906535625%3DYue%2520Ma%2520and%2520Zhikai%2520Wang%2520and%2520Tianhao%2520Ren%2520and%2520Mingzhe%2520Zheng%2520and%2520Hongyu%2520Liu%2520and%2520Jiayi%2520Guo%2520and%2520Kunyu%2520Feng%2520and%2520Yuxuan%2520Xue%2520and%2520Zixiang%2520Zhao%2520and%2520Konrad%2520Schindler%2520and%2520Qifeng%2520Chen%2520and%2520Linfeng%2520Zhang%26entry.1292438233%3DVideo%2520motion%2520transfer%2520aims%2520to%2520synthesize%2520videos%2520by%2520generating%2520visual%2520content%2520according%2520to%2520a%2520text%2520prompt%2520while%2520transferring%2520the%2520motion%2520pattern%2520observed%2520in%2520a%2520reference%2520video.%2520Recent%2520methods%2520predominantly%2520use%2520the%2520Diffusion%2520Transformer%2520%2528DiT%2529%2520architecture.%2520To%2520achieve%2520satisfactory%2520runtime%252C%2520several%2520methods%2520attempt%2520to%2520accelerate%2520the%2520computations%2520in%2520the%2520DiT%252C%2520but%2520fail%2520to%2520address%2520structural%2520sources%2520of%2520inefficiency.%2520In%2520this%2520work%252C%2520we%2520identify%2520and%2520remove%2520two%2520types%2520of%2520computational%2520redundancy%2520in%2520earlier%2520work%253A%2520motion%2520redundancy%2520arises%2520because%2520the%2520generic%2520DiT%2520architecture%2520does%2520not%2520reflect%2520the%2520fact%2520that%2520frame-to-frame%2520motion%2520is%2520small%2520and%2520smooth%253B%2520gradient%2520redundancy%2520occurs%2520if%2520one%2520ignores%2520that%2520gradients%2520change%2520slowly%2520along%2520the%2520diffusion%2520trajectory.%2520To%2520mitigate%25 {"title": "The Ultimate Tutorial for AI-driven Scale Development in Generative Psychometrics: Releasing AIGENIE from its Bottle", "author": "Lara Russell-Lasalandra and Hudson Golino and Luis Eduardo Garrido and Alexander P. Christensen", "abstract": "Psychological scale development has traditionally required extensive expert involvement, iterative revision, and large-scale pilot testing before psychometric evaluation can begin. The `AIGENIE` R package implements the AI-GENIE framework (Automatic Item Generation with Network-Integrated Evaluation), which integrates large language model (LLM) text generation with network psychometric methods to automate the early stages of this process. The package generates candidate item pools using LLMs, transforms them into high-dimensional embeddings, and applies a multi-step reduction pipeline -- Exploratory Graph Analysis (EGA), Unique Variable Analysis (UVA), and bootstrap EGA -- to produce structurally validated item pools entirely *in silico*. This tutorial introduces the package across six parts: installation and setup, understanding Application Programming Interfaces (APIs), text generation, item generation, the `AIGENIE` function, and the `GENIE` function. Two running examples illustrate the package's use: the Big Five personality model (a well-established construct) and AI Anxiety (an emerging construct). The package supports multiple LLM providers (OpenAI, Anthropic, Groq, HuggingFace, and local models), offers a fully offline mode with no external API calls, and provides the `GENIE()` function for researchers who wish to apply the psychometric reduction pipeline to existing item pools regardless of their origin. The `AIGENIE` package is freely available on R-universe at https://laralee.r-universe.dev/AIGENIE.", "link": "http://arxiv.org/abs/2603.28643v1", "date": "2026-03-30", "relevancy": 2.5062, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5396}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4944}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4697}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Ultimate%20Tutorial%20for%20AI-driven%20Scale%20Development%20in%20Generative%20Psychometrics%3A%20Releasing%20AIGENIE%20from%20its%20Bottle&body=Title%3A%20The%20Ultimate%20Tutorial%20for%20AI-driven%20Scale%20Development%20in%20Generative%20Psychometrics%3A%20Releasing%20AIGENIE%20from%20its%20Bottle%0AAuthor%3A%20Lara%20Russell-Lasalandra%20and%20Hudson%20Golino%20and%20Luis%20Eduardo%20Garrido%20and%20Alexander%20P.%20Christensen%0AAbstract%3A%20Psychological%20scale%20development%20has%20traditionally%20required%20extensive%20expert%20involvement%2C%20iterative%20revision%2C%20and%20large-scale%20pilot%20testing%20before%20psychometric%20evaluation%20can%20begin.%20The%20%60AIGENIE%60%20R%20package%20implements%20the%20AI-GENIE%20framework%20%28Automatic%20Item%20Generation%20with%20Network-Integrated%20Evaluation%29%2C%20which%20integrates%20large%20language%20model%20%28LLM%29%20text%20generation%20with%20network%20psychometric%20methods%20to%20automate%20the%20early%20stages%20of%20this%20process.%20The%20package%20generates%20candidate%20item%20pools%20using%20LLMs%2C%20transforms%20them%20into%20high-dimensional%20embeddings%2C%20and%20applies%20a%20multi-step%20reduction%20pipeline%20--%20Exploratory%20Graph%20Analysis%20%28EGA%29%2C%20Unique%20Variable%20Analysis%20%28UVA%29%2C%20and%20bootstrap%20EGA%20--%20to%20produce%20structurally%20validated%20item%20pools%20entirely%20%2Ain%20silico%2A.%20This%20tutorial%20introduces%20the%20package%20across%20six%20parts%3A%20installation%20and%20setup%2C%20understanding%20Application%20Programming%20Interfaces%20%28APIs%29%2C%20text%20generation%2C%20item%20generation%2C%20the%20%60AIGENIE%60%20function%2C%20and%20the%20%60GENIE%60%20function.%20Two%20running%20examples%20illustrate%20the%20package%27s%20use%3A%20the%20Big%20Five%20personality%20model%20%28a%20well-established%20construct%29%20and%20AI%20Anxiety%20%28an%20emerging%20construct%29.%20The%20package%20supports%20multiple%20LLM%20providers%20%28OpenAI%2C%20Anthropic%2C%20Groq%2C%20HuggingFace%2C%20and%20local%20models%29%2C%20offers%20a%20fully%20offline%20mode%20with%20no%20external%20API%20calls%2C%20and%20provides%20the%20%60GENIE%28%29%60%20function%20for%20researchers%20who%20wish%20to%20apply%20the%20psychometric%20reduction%20pipeline%20to%20existing%20item%20pools%20regardless%20of%20their%20origin.%20The%20%60AIGENIE%60%20package%20is%20freely%20available%20on%20R-universe%20at%20https%3A//laralee.r-universe.dev/AIGENIE.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28643v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Ultimate%2520Tutorial%2520for%2520AI-driven%2520Scale%2520Development%2520in%2520Generative%2520Psychometrics%253A%2520Releasing%2520AIGENIE%2520from%2520its%2520Bottle%26entry.906535625%3DLara%2520Russell-Lasalandra%2520and%2520Hudson%2520Golino%2520and%2520Luis%2520Eduardo%2520Garrido%2520and%2520Alexander%2520P.%2520Christensen%26entry.1292438233%3DPsychological%2520scale%2520development%2520has%2520traditionally%2520required%2520extensive%2520expert%2520involvement%252C%2520iterative%2520revision%252C%2520and%2520large-scale%2520pilot%2520testing%2520before%2520psychometric%2520evaluation%2520can%2520begin.%2520The%2520%2560AIGENIE%2560%2520R%2520package%2520implements%2520the%2520AI-GENIE%2520framework%2520%2528Automatic%2520Item%2520Generation%2520with%2520Network-Integrated%2520Evaluation%2529%252C%2520which%2520integrates%2520large%2520language%2520model%2520%2528LLM%2529%2520text%2520gen {"title": "Source-Only Cross-Weather LiDAR via Geometry-Aware Point Drop", "author": "YoungJae Cheong and Jhonghyun An", "abstract": "LiDAR semantic segmentation degrades in adverse weather because refraction, scattering, and point dropouts corrupt geometry. Prior work in weather simulation, mixing-based augmentation, domain randomization, and uncertainty or boundary regularization improves robustness but still overlooks structural vulnerabilities near boundaries, corners, and sparse regions. We present a Light Geometry-aware adapter. The module aligns azimuth and applies horizontal circular padding to preserve neighbor continuity across the 0~360 degree wrap-around boundary. A local-window K-Nearest Neighbors gathers nearby points and computes simple local statistics, which are compressed into compact geometry-aware cues. During training, these cues drive region-aware regularization that stabilizes predictions in structurally fragile areas. The adapter is plug and play, complements augmentation, and can be enabled only during training with negligible inference cost. We adopt a source-only cross-weather setup where models train on SemanticKITTI and are evaluated on SemanticSTF without target labels or fine-tuning. The adapter improves mIoU by 7.9 percentage points over the data-centric augmentation baseline and by 0.6 points over the class-centric regularization baseline. These results indicate that geometry-driven regularization is a key direction for all-weather LiDAR segmentation.", "link": "http://arxiv.org/abs/2511.01250v3", "date": "2026-03-30", "relevancy": 2.5037, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5074}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5005}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4942}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Source-Only%20Cross-Weather%20LiDAR%20via%20Geometry-Aware%20Point%20Drop&body=Title%3A%20Source-Only%20Cross-Weather%20LiDAR%20via%20Geometry-Aware%20Point%20Drop%0AAuthor%3A%20YoungJae%20Cheong%20and%20Jhonghyun%20An%0AAbstract%3A%20LiDAR%20semantic%20segmentation%20degrades%20in%20adverse%20weather%20because%20refraction%2C%20scattering%2C%20and%20point%20dropouts%20corrupt%20geometry.%20Prior%20work%20in%20weather%20simulation%2C%20mixing-based%20augmentation%2C%20domain%20randomization%2C%20and%20uncertainty%20or%20boundary%20regularization%20improves%20robustness%20but%20still%20overlooks%20structural%20vulnerabilities%20near%20boundaries%2C%20corners%2C%20and%20sparse%20regions.%20We%20present%20a%20Light%20Geometry-aware%20adapter.%20The%20module%20aligns%20azimuth%20and%20applies%20horizontal%20circular%20padding%20to%20preserve%20neighbor%20continuity%20across%20the%200~360%20degree%20wrap-around%20boundary.%20A%20local-window%20K-Nearest%20Neighbors%20gathers%20nearby%20points%20and%20computes%20simple%20local%20statistics%2C%20which%20are%20compressed%20into%20compact%20geometry-aware%20cues.%20During%20training%2C%20these%20cues%20drive%20region-aware%20regularization%20that%20stabilizes%20predictions%20in%20structurally%20fragile%20areas.%20The%20adapter%20is%20plug%20and%20play%2C%20complements%20augmentation%2C%20and%20can%20be%20enabled%20only%20during%20training%20with%20negligible%20inference%20cost.%20We%20adopt%20a%20source-only%20cross-weather%20setup%20where%20models%20train%20on%20SemanticKITTI%20and%20are%20evaluated%20on%20SemanticSTF%20without%20target%20labels%20or%20fine-tuning.%20The%20adapter%20improves%20mIoU%20by%207.9%20percentage%20points%20over%20the%20data-centric%20augmentation%20baseline%20and%20by%200.6%20points%20over%20the%20class-centric%20regularization%20baseline.%20These%20results%20indicate%20that%20geometry-driven%20regularization%20is%20a%20key%20direction%20for%20all-weather%20LiDAR%20segmentation.%0ALink%3A%20http%3A//arxiv.org/abs/2511.01250v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSource-Only%2520Cross-Weather%2520LiDAR%2520via%2520Geometry-Aware%2520Point%2520Drop%26entry.906535625%3DYoungJae%2520Cheong%2520and%2520Jhonghyun%2520An%26entry.1292438233%3DLiDAR%2520semantic%2520segmentation%2520degrades%2520in%2520adverse%2520weather%2520because%2520refraction%252C%2520scattering%252C%2520and%2520point%2520dropouts%2520corrupt%2520geometry.%2520Prior%2520work%2520in%2520weather%2520simulation%252C%2520mixing-based%2520augmentation%252C%2520domain%2520randomization%252C%2520and%2520uncertainty%2520or%2520boundary%2520regularization%2520improves%2520robustness%2520but%2520still%2520overlooks%2520structural%2520vulnerabilities%2520near%2520boundaries%252C%2520corners%252C%2520and%2520sparse%2520regions.%2520We%2520present%2520a%2520Light%2520Geometry-aware%2520adapter.%2520The%2520module%2520aligns%2520azimuth%2520and%2520applies%2520horizontal%2520circular%2520padding%2520to%2520preserve%2520neighbor%2520continuity%2520across%2520the%25200~360%2520degree%2520wrap-around%2520boundary.%2520A%2520local-window%2520K-Nearest%2520Neighbors%2520gathers%2520nearby%2520points%2520and%2520computes%2520simple%2520local%2520statistics%252C%2520which%2520are%2520compressed%2520into%2520compact%2520geometry-aware%2520cues.%2520During%2520training%252C%2520these%2520cues%2520drive%2520region-aware%2520regularization%2520that%2520stabilizes%2520predictions%2520in%2520structurally%2520fragile%2520areas.%2520The%2520adapter%2520is%2520plug%2520and%2520play%252C%2520complements%2520augmentation%252C%2520and%2520can%2520be%2520enabled%2520only%2520during%2520training%2520with%2520negligible%2520inference%2520cost.%2520We%2520adopt%2520a%2520source-only%2520cross-weather%2520setup%2520where%2520models%2520train%2520on%2520SemanticKITTI%2520and%2520are%2520evaluated%2520on%2520SemanticSTF%2520without%2520target%2520labels%2520or%2520fine-tuning.%2520The%2520adapter%2520improves%2520mIoU%2520by%25207.9%2520percentage%2520points%2520over%2520the%2520data-centric%2520augmentation%2520baseline%2520and%2520by%25200.6%2520points%2520over%2520the%2520class-centric%2520regularization%2520baseline.%2520These%2520results%2520indicate%2520that%2520geometry-driven%2520regularization%2520is%2520a%2520key%2520direction%2520for%2520all-weather%2520LiDAR%2520segmentation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.01250v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Source-Only%20Cross-Weather%20LiDAR%20via%20Geometry-Aware%20Point%20Drop&entry.906535625=YoungJae%20Cheong%20and%20Jhonghyun%20An&entry.1292438233=LiDAR%20semantic%20segmentation%20degrades%20in%20adverse%20weather%20because%20refraction%2C%20scattering%2C%20and%20point%20dropouts%20corrupt%20geometry.%20Prior%20work%20in%20weather%20simulation%2C%20mixing-based%20augmentation%2C%20domain%20randomization%2C%20and%20uncertainty%20or%20boundary%20regularization%20improves%20robustness%20but%20still%20overlooks%20structural%20vulnerabilities%20near%20boundaries%2C%20corners%2C%20and%20sparse%20regions.%20We%20present%20a%20Light%20Geometry-aware%20adapter.%20The%20module%20aligns%20azimuth%20and%20applies%20horizontal%20circular%20padding%20to%20preserve%20neighbor%20continuity%20across%20the%200~360%20degree%20wrap-around%20boundary.%20A%20local-window%20K-Nearest%20Neighbors%20gathers%20nearby%20points%20and%20computes%20simple%20local%20statistics%2C%20which%20are%20compressed%20into%20compact%20geometry-aware%20cues.%20During%20training%2C%20these%20cues%20drive%20region-aware%20regularization%20that%20stabilizes%20predictions%20in% {"title": "Generating Findings for Jaw Cysts in Dental Panoramic Radiographs Using a GPT-Based VLM: A Preliminary Study on Building a Two-Stage Self-Correction Loop with Structured Output (SLSO) Framework", "author": "Nanaka Hosokawa and Ryo Takahashi and Tomoya Kitano and Yukihiro Iida and Chisako Muramatsu and Tatsuro Hayashi and Yuta Seino and Xiangrong Zhou and Takeshi Hara and Akitoshi Katsumata and Hiroshi Fujita", "abstract": "Vision-language models (VLMs) such as GPT (Generative Pre-Trained Transformer) have shown potential for medical image interpretation; however, challenges remain in generating reliable radiological findings in clinical practice, as exemplified by dental pathologies. This study proposes a Self-correction Loop with Structured Output (SLSO) framework as an integrated processing methodology to enhance the accuracy and reliability of AI-generated findings for jaw cysts in dental panoramic radiographs. Dental panoramic radiographs with jaw cysts were used to implement a 10-step integrated processing framework incorporating image analysis, structured data generation, tooth number extraction, consistency checking, and iterative regeneration. The framework functioned as an external validation mechanism for GPT outputs. Performance was compared against the conventional Chain-of-Thought (CoT) method across seven evaluation items: transparency, internal structure, borders, root resorption, tooth movement, relationships with other structures, and tooth number. The SLSO framework improved output accuracy for multiple items compared to the CoT method, with the most notable improvements observed in tooth number identification, tooth movement detection, and root resorption assessment. In successful cases, consistently structured outputs were achieved after up to five regenerations. The framework enforced explicit negative finding descriptions and suppressed hallucinations, although accurate identification of extensive lesions spanning multiple teeth remained limited. This investigation established the feasibility of the proposed integrated processing methodology and provided a foundation for future validation studies with larger, more diverse datasets.", "link": "http://arxiv.org/abs/2510.02001v5", "date": "2026-03-30", "relevancy": 2.4858, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.505}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.505}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4814}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generating%20Findings%20for%20Jaw%20Cysts%20in%20Dental%20Panoramic%20Radiographs%20Using%20a%20GPT-Based%20VLM%3A%20A%20Preliminary%20Study%20on%20Building%20a%20Two-Stage%20Self-Correction%20Loop%20with%20Structured%20Output%20%28SLSO%29%20Framework&body=Title%3A%20Generating%20Findings%20for%20Jaw%20Cysts%20in%20Dental%20Panoramic%20Radiographs%20Using%20a%20GPT-Based%20VLM%3A%20A%20Preliminary%20Study%20on%20Building%20a%20Two-Stage%20Self-Correction%20Loop%20with%20Structured%20Output%20%28SLSO%29%20Framework%0AAuthor%3A%20Nanaka%20Hosokawa%20and%20Ryo%20Takahashi%20and%20Tomoya%20Kitano%20and%20Yukihiro%20Iida%20and%20Chisako%20Muramatsu%20and%20Tatsuro%20Hayashi%20and%20Yuta%20Seino%20and%20Xiangrong%20Zhou%20and%20Takeshi%20Hara%20and%20Akitoshi%20Katsumata%20and%20Hiroshi%20Fujita%0AAbstract%3A%20Vision-language%20models%20%28VLMs%29%20such%20as%20GPT%20%28Generative%20Pre-Trained%20Transformer%29%20have%20shown%20potential%20for%20medical%20image%20interpretation%3B%20however%2C%20challenges%20remain%20in%20generating%20reliable%20radiological%20findings%20in%20clinical%20practice%2C%20as%20exemplified%20by%20dental%20pathologies.% {"title": "DinoDental: Benchmarking DINOv3 as a Unified Vision Encoder for Dental Image Analysis", "author": "Kun Tang and Xinquan Yang and Mianjie Zheng and Xuefen Liu and Xuguang Li and Xiaoqi Guo and Ruihan Chen and Linlin Shen and He Meng", "abstract": "The scarcity and high cost of expert annotations in dental imaging present a significant challenge for the development of AI in dentistry. DINOv3, a state-of-the-art, self-supervised vision foundation model pre-trained on 1.7 billion images, offers a promising pathway to mitigate this issue. However, its reliability when transferred to the dental domain, with its unique imaging characteristics and clinical subtleties, remains unclear. To address this, we introduce DinoDental, a unified benchmark designed to systematically evaluate whether DINOv3 can serve as a reliable, off-the-shelf encoder for comprehensive dental image analysis without requiring domain-specific pre-training. Constructed from multiple public datasets, DinoDental covers a wide range of tasks, including classification, detection, and instance segmentation on both panoramic radiographs and intraoral photographs. We further analyze the model's transfer performance by scaling its size and input resolution, and by comparing different adaptation strategies, including frozen features, full fine-tuning, and the parameter-efficient Low-Rank Adaptation (LoRA) method. Our experiments show that DINOv3 can serve as a strong unified encoder for dental image analysis across both panoramic radiographs and intraoral photographs, remaining competitive across tasks while showing particularly clear advantages for intraoral image understanding and boundary-sensitive dense prediction. Collectively, DinoDental provides a systematic framework for comprehensively evaluating DINOv3 in dental analysis, establishing a foundational benchmark to guide efficient and effective model selection and adaptation for the dental AI community.", "link": "http://arxiv.org/abs/2603.28297v1", "date": "2026-03-30", "relevancy": 2.4792, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6302}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6302}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5679}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DinoDental%3A%20Benchmarking%20DINOv3%20as%20a%20Unified%20Vision%20Encoder%20for%20Dental%20Image%20Analysis&body=Title%3A%20DinoDental%3A%20Benchmarking%20DINOv3%20as%20a%20Unified%20Vision%20Encoder%20for%20Dental%20Image%20Analysis%0AAuthor%3A%20Kun%20Tang%20and%20Xinquan%20Yang%20and%20Mianjie%20Zheng%20and%20Xuefen%20Liu%20and%20Xuguang%20Li%20and%20Xiaoqi%20Guo%20and%20Ruihan%20Chen%20and%20Linlin%20Shen%20and%20He%20Meng%0AAbstract%3A%20The%20scarcity%20and%20high%20cost%20of%20expert%20annotations%20in%20dental%20imaging%20present%20a%20significant%20challenge%20for%20the%20development%20of%20AI%20in%20dentistry.%20DINOv3%2C%20a%20state-of-the-art%2C%20self-supervised%20vision%20foundation%20model%20pre-trained%20on%201.7%20billion%20images%2C%20offers%20a%20promising%20pathway%20to%20mitigate%20this%20issue.%20However%2C%20its%20reliability%20when%20transferred%20to%20the%20dental%20domain%2C%20with%20its%20unique%20imaging%20characteristics%20and%20clinical%20subtleties%2C%20remains%20unclear.%20To%20address%20this%2C%20we%20introduce%20DinoDental%2C%20a%20unified%20benchmark%20designed%20to%20systematically%20evaluate%20whether%20DINOv3%20can%20serve%20as%20a%20reliable%2C%20off-the-shelf%20encoder%20for%20comprehensive%20dental%20image%20analysis%20without%20requiring%20domain-specific%20pre-training.%20Constructed%20from%20multiple%20public%20datasets%2C%20DinoDental%20covers%20a%20wide%20range%20of%20tasks%2C%20including%20classification%2C%20detection%2C%20and%20instance%20segmentation%20on%20both%20panoramic%20radiographs%20and%20intraoral%20photographs.%20We%20further%20analyze%20the%20model%27s%20transfer%20performance%20by%20scaling%20its%20size%20and%20input%20resolution%2C%20and%20by%20comparing%20different%20adaptation%20strategies%2C%20including%20frozen%20features%2C%20full%20fine-tuning%2C%20and%20the%20parameter-efficient%20Low-Rank%20Adaptation%20%28LoRA%29%20method.%20Our%20experiments%20show%20that%20DINOv3%20can%20serve%20as%20a%20strong%20unified%20encoder%20for%20dental%20image%20analysis%20across%20both%20panoramic%20radiographs%20and%20intraoral%20photographs%2C%20remaining%20competitive%20across%20tasks%20while%20showing%20particularly%20clear%20advantages%20for%20intraoral%20image%20understanding%20and%20boundary-sensitive%20dense%20prediction.%20Collectively%2C%20DinoDental%20provides%20a%20systematic%20framework%20for%20comprehensively%20evaluating%20DINOv3%20in%20dental%20analysis%2C%20establishing%20a%20foundational%20benchmark%20to%20guide%20efficient%20and%20effective%20model%20selection%20and%20adaptation%20for%20the%20dental%20AI%20community.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28297v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDinoDental%253A%2520Benchmarking%2520DINOv3%2520as%2520a%2520Unified%2520Vision%2520Encoder%2520for%2520Dental%2520Image%2520Analysis%26entry.906535625%3DKun%2520Tang%2520and%2520Xinquan%2520Yang%2520and%2520Mianjie%2520Zheng%2520and%2520Xuefen%2520Liu%2520and%2520Xuguang%2520Li%2520and%2520Xiaoqi%2520Guo%2520and%2520Ruihan%2520Chen%2520and%2520Linlin%2520Shen%2520and%2520He%2520Meng%26entry.1292438233%3DThe%2520scarcity%2520and%2520high%2520cost%2520of%2520expert%2520annotations%2520in%2520dental%2520imaging%2520present%2520a%2520significant%2520challenge {"title": "Understanding SAM's Robustness to Noisy Labels through Gradient Down-weighting", "author": "Hoang-Chau Luong and Quang-Thuc Nguyen and Dat Ba Tran and Minh-Triet Tran", "abstract": "Sharpness-Aware Minimization (SAM) was introduced to improve generalization by seeking flat minima, yet it also exhibits robustness to label noise, a phenomenon that remains only partially understood. Prior work has mainly attributed this effect to SAM's tendency to prolong the learning of clean samples. In this work, we provide a complementary explanation by analyzing SAM at the element-wise level. We show that when noisy gradients dominate a parameter direction, their influence is reduced by the stronger amplification of clean gradients. This slows the memorization of noisy labels while sustaining clean learning, offering a more complete account of SAM's robustness. Building on this insight, we propose SANER (Sharpness-Aware Noise-Explicit Reweighting), a simple variant of SAM that explicitly magnifies this down-weighting effect. Experiments on benchmark image classification tasks with noisy labels demonstrate that SANER significantly mitigates noisy-label memorization and improves generalization over both SAM and SGD. Moreover, since SANER is designed from the mechanism of SAM, it can also be seamlessly integrated into SAM-like variants, further boosting their robustness.", "link": "http://arxiv.org/abs/2411.17132v2", "date": "2026-03-30", "relevancy": 2.4684, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5166}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4854}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.479}], "mailto": "mailto:haoxiang.li.202 {"title": "CiQi-Agent: Aligning Vision, Tools and Aesthetics in Multimodal Agent for Cultural Reasoning on Chinese Porcelains", "author": "Wenhan Wang and Zhixiang Zhou and Zhongtian Ma and Yanzhu Chen and Ziyu Lin and Hao Sheng and Pengfei Liu and Honglin Ma and Wenqi Shao and Qiaosheng Zhang and Yu Qiao", "abstract": "The connoisseurship of antique Chinese porcelain demands extensive historical expertise, material understanding, and aesthetic sensitivity, making it difficult for non-specialists to engage. To democratize cultural-heritage understanding and assist expert connoisseurship, we introduce CiQi-Agent -- a domain-specific Porcelain Connoisseurship Agent for intelligent analysis of antique Chinese porcelain. CiQi-Agent supports multi-image porcelain inputs and enables vision tool invocation and multimodal retrieval-augmented generation, performing fine-grained connoisseurship analysis across six attributes: dynasty, reign period, kiln site, glaze color, decorative motif, and vessel shape. Beyond attribute classification, it captures subtle visual details, retrieves relevant domain knowledge, and integrates visual and textual evidence to produce coherent, explainable connoisseurship descriptions. To achieve this capability, we construct a large-scale, expert-annotated dataset CiQi-VQA, comprising 29,596 porcelain specimens, 51,553 images, and 557,940 visual question--answering pairs, and further establish a comprehensive benchmark CiQi-Bench aligned with the previously mentioned six attributes. CiQi-Agent is trained through supervised fine-tuning, reinforcement learning, and a tool-augmented reasoning framework that integrates two categories of tools: a vision tool and multimodal retrieval tools. Experimental results show that CiQi-Agent (7B) outperforms all competitive open- and closed-source models across all six attributes on CiQi-Bench, achieving on average 12.2\\% higher accuracy than GPT-5. The model and dataset have been released and are publicly available at https://huggingface.co/datasets/SII-Monument-Valley/CiQi-VQA.", "link": "http://arxiv.org/abs/2603.28474v1", "date": "2026-03-30", "relevancy": 2.4647, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4999}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4999}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4791}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CiQi-Agent%3A%20Aligning%20Vision%2C%20Tools%20and%20Aesthetics%20in%20Multimodal%20Agent%20for%20Cultural%20Reasoning%20on%20Chinese%20Porcelains&body=Title%3A%20CiQi-Agent%3A%20Aligning%20Vision%2C%20Tools%20and%20Aesthetics%20in%20Multimodal%20Agent%20for%20Cultural%20Reasoning%20on%20Chinese%20Porcelains%0AAuthor%3A%20Wenhan%20Wang%20and%20Zhixiang%20Zhou%20and%20Zhongtian%20Ma%20and%20Yanzhu%20Chen%20and%20Ziyu%20Lin%20and%20Hao%20Sheng%20and%20Pengfei%20Liu%20and%20Honglin%20Ma%20and%20Wenqi%20Shao%20and%20Qiaosheng%20Zhang%20and%20Yu%20Qiao%0AAbstract%3A%20The%20connoisseurship%20of%20antique%20Chinese%20porcelain%20demands%20extensive%20historical%20expertise%2C%20material%20understanding%2C%20and%20aesthetic%20sensitivity%2C%20making%20it%20difficult%20for%20non-specialists%20to%20engage.%20To%20democratize%20cultural-heritage%20understanding%20and%20assist%20expert%20connoisseurship%2C%20we%20introduce%20CiQi-Agent%20--%20a%20domain-specific%20Porcelain%20Connoisseurship%20Agent%20for%20intelligent%20analysis%20of%20antique%20Chinese%20porcelain.%20CiQi-Agent%20supports%20multi-image%20porcelain%20inputs%20and%20enables%20vision%20tool%20invocation%20and%20multimodal%20retrieval-augmented%20generation%2C%20performing%20fine-grained%20connoisseurship%20analysis%20across {"title": "ChemCLIP: Bridging Organic and Inorganic Anticancer Compounds Through Contrastive Learning", "author": "Mohamad Koohi-Moghadam and Hongzhe Sun and Hongyan Li and Kyongtae Tyler Bae", "abstract": "The discovery of anticancer therapeutics has traditionally treated organic small molecules and metal-based coordination complexes as separate chemical domains, limiting knowledge transfer despite their shared biological objectives. This disparity is particularly pronounced in available data, with extensive screening databases for organic compounds compared to only a few thousand characterized metal complexes. Here, we introduce ChemCLIP, a dual-encoder contrastive learning framework that bridges this organic-inorganic divide by learning unified representations based on shared anticancer activities rather than structural similarity. We compiled complementary datasets comprising 44,854 unique organic compounds and 5,164 unique metal complexes, standardized across 60 cancer cell lines. By training parallel encoders with activity-aware hard negative mining, we mapped structurally distinct compounds into a shared 256-dimensional embedding space where biologically similar compounds cluster together regardless of chemical class. We systematically evaluated four molecular encoding strategies: Morgan fingerprints, ChemBERTa, MolFormer, and Chemprop, through quantitative alignment metrics, embedding visualizations, and downstream classification tasks. Morgan fingerprints achieved superior performance with an average alignment ratio of 0.899 and downstream classification AUCs of 0.859 (inorganic) and 0.817 (organic). This work establishes contrastive learning as an effective strategy for unifying disparate chemical domains and provides empirical guidance for encoder selection in multi-modal chemistry applications, with implications extending beyond anticancer drug discovery to any scenario requiring cross-domain chemical knowledge transfer.", "link": "http://arxiv.org/abs/2603.28575v1", "date": "2026-03-30", "relevancy": 2.4599, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5094}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4833}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4833}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ChemCLIP%3A%20Bridging%20Organic%20and%20Inorganic%20Anticancer%20Compounds%20Through%20Contrastive%20Learning&body=Title%3A%20ChemCLIP%3A%20Bridging%20Organic%20and%20Inorganic%20Anticancer%20Compounds%20Through%20Contrastive%20Learning%0AAuthor%3A%20Mohamad%20Koohi-Moghadam%20and%20Hongzhe%20Sun%20and%20Hongyan%20Li%20and%20Kyongtae%20Tyler%20Bae%0AAbstract%3A%20The%20discovery%20of%20anticancer%20therapeutics%20has%20traditionally%20treated%20organic%20small%20molecules%20and%20metal-based%20coordination%20complexes%20as%20separate%20chemical%20domains%2C%20limiting%20knowledge%20transfer%20despite%20their%20shared%20biological%20objectives.%20This%20disparity%20is%20particularly%20pronounced%20in%20available%20data%2C%20with%20extensive%20screening%20databases%20for%20organic%20compounds%20compared%20to%20only%20a%20few%20thousand%20characterized%20metal%20complexes.%20Here%2C%20we%20introduce%20ChemCLIP%2C%20a%20dual-encoder%20contrastive%20learning%20framework%20that%20bridges%20this%20organic-inorganic%20divide%20by%20learning%20unified%20representations%20based%20on%20shared%20anticancer%20activities%20rather%20than%20structural%20similarity.%20We%20compiled%20complementary%20datasets%20comprising%2044%2C854%20unique%20organic%20compounds%20and%205%2C164%20unique%20metal%20complexes%2C%20standardized%20across%2060%20cancer%20cell%20lines.%20By%20training%20parallel%20encoders%20with%20activity-aware%20hard%20negative%20mining%2C%20we%20mapped%20structurally%20distinct%20compounds%20into%20a%20shared%20256-dimensional%20embedding%20space%20where%20biologically%20similar%20compounds%20cluster%20together%20regardless%20of%20chemical%20class.%20We%20systematically%20evaluated%20four%20molecular%20encoding%20strategies%3A%20Morgan%20fingerprints%2C%20ChemBERTa%2C%20MolFormer%2C%20and%20Chemprop%2C%20through%20quantitative%20alignment%20metrics%2C%20embedding%20visualizations%2C%20and%20downstream%20classification%20tasks.%20Morgan%20fingerprints%20achieved%20superior%20performance%20with%20an%20average%20alignment%20ratio%20of%200.899%20and%20downstream%20classification%20AUCs%20of%200.859%20%28inorganic%29%20and%200.817%20%28organic%29.%20This%20work%20establishes%20contrastive%20learning%20as%20an%20effective%20strategy%20for%20unifying%20disparate%20chemical%20domains%20and%20provides%20empirical%20guidance%20for%20encoder%20selection%20in%20multi-modal%20chemistry%20applications%2C%20with%20implications%20extending%20beyond%20anticancer%20drug%20discovery%20to%20any%20scenario%20requiring%20cross-domain%20chemical%20knowledge%20transfer.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28575v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DChemCLIP%253A%2520Bridging%2520Organic%2520and%2520Inorganic%2520Anticancer%2520Compounds%2520Through%2520Contrastive%2520Learning%26entry.906535625%3DMohamad%2520Koohi-Moghadam%2520and%2520Hongzhe%2520Sun%2520and%2520Hongyan%2520Li%2520and%2520Kyongtae%2520Tyler%2520Bae%26entry.1292438233%3DThe%2520discovery%2520of%2520anticancer%2520therapeutics%2520has%2520traditionally%2520treated%2520organic%2520small%2520molecules%2520and%2520metal-based%2520coordination%2520complexes%2520as%2520separate%2520chemical%2520domains%252C%2520limiting%2520knowledge%2520transfer%2520despite%2520their%2520shared%2520biological%25 %20embedding%20space%20where%20biologically%20similar%20compounds%20cluster%20together%20regardless%20of%20chemical%20class.%20We%20systematically%20evaluated%20four%20molecular%20encoding%20strategies%3A%20Morgan%20fingerprints%2C%20ChemBERTa%2C%20MolFormer%2C%20and%20Chemprop%2C%20through%20quantitative%20alignment%20metrics%2C%20embedding%20visualizations%2C%20and%20downstream%20classification%20tasks.%20Morgan%20fingerprints%20achieved%20superior%20performance%20with%20an%20average%20alignment%20ratio%20of%200.899%20and%20downstream%20classification%20AUCs%20of%200.859%20%28inorganic%29%20and%200.817%20%28organic%29.%20This%20work%20establishes%20contrastive%20learning%20as%20an%20effective%20strategy%20for%20unifying%20disparate%20chemical%20domains%20and%20provides%20empirical%20guidance%20for%20encoder%20selection%20in%20multi-modal%20chemistry%20applications%2C%20with%20implications%20extending%20beyond%20anticancer%20drug%20discovery%20to%20any%20scenario%20requiring%20cross-domain%20chemical%20knowledge%20transfer.&entry.1838667208=http%3A//arxiv.org/abs/2603.28575v1&entry.124074799=Read"},
{"title": "Machine Learning-Assisted High-Dimensional Matrix Estimation", "author": "Wan Tian and Hui Yang and Zhouhui Lian and Lingyue Zhang and Yijie Peng", "abstract": "Efficient estimation of high-dimensional matrices-including covariance and precision matrices-is a cornerstone of modern multivariate statistics. Most existing studies have focused primarily on the theoretical properties of the estimators (e.g., consistency and sparsity), while largely overlooking the computational challenges inherent in high-dimensional settings. Motivated by recent advances in learning-based optimization method-which integrate data-driven structures with classical optimization algorithms-we explore high-dimensional matrix estimation assisted by machine learning. Specifically, for the optimization problem of high-dimensional matrix estimation, we first present a solution procedure based on the Linearized Alternating Direction Method of Multipliers (LADMM). We then introduce learnable parameters and model the proximal operators in the iterative scheme with neural networks, thereby improving estimation accuracy and accelerating convergence. Theoretically, we first prove the convergence of LADMM, and then establish the convergence, convergence rate, and monotonicity of its reparameterized counterpart; importantly, we show that the reparameterized LADMM enjoys a faster convergence rate. Notably, the proposed reparameterization theory and methodology are applicable to the estimation of both high-dimensional covariance and precision matrices. We validate the effectiveness of our method by comparing it with several classical optimization algorithms across different structures and dimensions of high-dimensional matrices.", "link": "http://arxiv.org/abs/2603.28346v1", "date": "2026-03-30", "relevancy": 2.4582, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarit rate%2C%20and%20monotonicity%20of%20its%20reparameterized%20counterpart%3B%20importantly%2C%20we%20show%20that%20the%20reparameterized%20LADMM%20enjoys%20a%20faster%20convergence%20rate.%20Notably%2C%20the%20proposed%20reparameterization%20theory%20and%20methodology%20are%20applicable%20to%20the%20estimation%20of%20both%20high-dimensional%20covariance%20and%20precision%20matrices.%20We%20validate%20the%20effectiveness%20of%20our%20method%20by%20comparing%20it%20with%20several%20classical%20optimization%20algorithms%20across%20different%20structures%20and%20dimensions%20of%20high-dimensional%20matrices.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28346v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMachine%2520Learning-Assisted%2520High-Dimensional%2520Matrix%2520Estimation%26entry.906535625%3DWan%2520Tian%2520and%2520Hui%2520Yang%2520and%2520Zhouhui%2520Lian%2520and%2520Lingyue%2520Zhang%2520and%2520Yijie%2520Peng%26entry.1292438233%3DEfficient%2520estimation%2520of%2520high-dimensional%2520matrices-including%2520covariance%2520and%2520precision%2520matrices-is%2520a%2520cornerstone%2520of%2520modern%2520multivariate%2520statistics.%2520Most%2520existing%2520studies%2520have%2520focused%2520primarily%2520on%2520the%2520theoretical%2520properties%2520of%2520the%2520estimators%2520%2528e.g.%252C%2520consistency%2520and%2520sparsity%2529%252C%2520while%2520largely%2520overlooking%2520the%2520computational%2520challenges%2520inherent%2520in%2520high-dimensional%2520settings.%2520Motivated%2520by%2520recent%2520advances%2520in%2520learning-based%2520optimization%2520method-which%2520integrate%2520data-driven%2520structures%2520with%2520classical%2520optimization%2520algorithms-we%2520explore%2520high-dimensional%2520matrix%2520estimation%2520assisted%2520by%2520machine%2520learning.%2520Specifically%252C%2520for%2520the%2520optimization%2520problem%2520of%2520high-dimensional%2520matrix {"title": "Curriculum-Guided Myocardial Scar Segmentation for Ischemic and Non-ischemic Cardiomyopathy", "author": "Nivetha Jayakumar and Jonathan Pan and Shuo Wang and Bishow Paudel and Nisha Hosadurg and Cristiane C. Singulane and Sivam Bhatt and Amit R. Patel and Miaomiao Zhang", "abstract": "Identification and quantification of myocardial scar is important for diagnosis and prognosis of cardiovascular diseases. However, reliable scar segmentation from Late Gadolinium Enhancement Cardiac Magnetic Resonance (LGE-CMR) images remains a challenge due to variations in contrast enhancement across patients, suboptimal imaging conditions such as post contrast washout, and inconsistencies in ground truth annotations on diffuse scars caused by inter observer variability. In this work, we propose a curriculum learning-based framework designed to improve segmentation performance under these challenging conditions. The method introduces a progressive training strategy that guides the model from high-confidence, clearly defined scar regions to low confidence or visually ambiguous samples with limited scar burden. By structuring the learning process in this manner, the network develops robustness to uncertain labels and subtle scar appearances that are often underrepresented in conventional training pipelines. Experimental results show that the proposed approach enhances segmentation accuracy and consistency, particularly for cases with minimal or diffuse scar, outperforming standard training baselines. This strategy provides a principled way to leverage imperfect data for improved myocardial scar quantification in clinical applications. Our code is publicly available on GitHub.", "link": "http://arxiv.org/abs/2603.28560v1", "date": "2026-03-30", "relevancy": 2.4545, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5029}, {"title": "Self-supe {"title": "Coarse-Guided Visual Generation via Weighted h-Transform Sampling", "author": "Yanghao Wang and Ziqi Jiang and Zhen Wang and Long Chen", "abstract": "Coarse-guided visual generation, which synthesizes fine visual samples from degraded or low-fidelity coarse references, is essential for various real-world applications. While training-based approaches are effective, they are inherently limited by high training costs and restricted generalization due to paired data collection. Accordingly, recent training-free works propose to leverage pretrained diffusion models and incorporate guidance during the sampling process. However, these training-free methods either require knowing the forward (fine-to-coarse) transformation operator, e.g., bicubic downsampling, or are difficult to balance between guidance and synthetic quality. To address these challenges, we propose a novel guided method by using the h-transform, a tool that can constrain stochastic processes (e.g., sampling process) under desired conditions. Specifically, we modify the transition probability at each sampling timestep by adding to the original differential equation with a drift function, which approximately steers the generation toward the ideal fine sample. To address unavoidable approximation errors, we introduce a noise-level-aware schedule that gradually de-weights the term as the error increases, ensuring both guidance adherence and high-quality synthesis. Extensive experiments across diverse image and video generation tasks demonstrate the effectiveness and generalization of our method.", "link": "http://arxiv.org/abs/2603.12057v2", "date": "2026-03-30", "relevancy": 2.4477, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.6206}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6159}, -aware%20schedule%20that%20gradually%20de-weights%20the%20term%20as%20the%20error%20increases%2C%20ensuring%20both%20guidance%20adherence%20and%20high-quality%20synthesis.%20Extensive%20experiments%20across%20diverse%20image%20and%20video%20generation%20tasks%20demonstrate%20the%20effectiveness%20and%20generalization%20of%20our%20method.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12057v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCoarse-Guided%2520Visual%2520Generation%2520via%2520Weighted%2520h-Transform%2520Sampling%26entry.906535625%3DYanghao%2520Wang%2520and%2520Ziqi%2520Jiang%2520and%2520Zhen%2520Wang%2520and%2520Long%2520Chen%26entry.1292438233%3DCoarse-guided%2520visual%2520generation%252C%2520which%2520synthesizes%2520fine%2520visual%2520samples%2520from%2520degraded%2520or%2520low-fidelity%2520coarse%2520references%252C%2520is%2520essential%2520for%2520various%2520real-world%2520applications.%2520While%2520training-based%2520approaches%2520are%2520effective%252C%2520they%2520are%2520inherently%2520limited%2520by%2520high%2520training%2520costs%2520and%2520restricted%2520generalization%2520due%2520to%2520paired%2520data%2520collection.%2520Accordingly%252C%2520recent%2520training-free%2520works%2520propose%2520to%2520leverage%2520pretrained%2520diffusion%2520models%2520and%2520incorporate%2520guidance%2520during%2520the%2520sampling%2520process.%2520However%252C%2520these%2520training-free%2520methods%2520either%2520require%2520knowing%2520the%2520forward%2520%2528fine-to-coarse%2529%2520transformation%2520operator%252C%2520e.g.%252C%2520bicubic%2520downsampling%252C%2520or%2520are%2520difficult%2520to%2520balance%2520between%2520guidance%2520and%2520synthetic%2520quality.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520a%2520novel%2520guided%2520method%2520by%2520using%2520the%2520h-transform%252C%2520a%2520tool%2520that%2520can%2520constrain%252 {"title": "SHOW3D: Capturing Scenes of 3D Hands and Objects in the Wild", "author": "Patrick Rim and Kevin Harris and Braden Copple and Shangchen Han and Xu Xie and Ivan Shugurov and Sizhe An and He Wen and Alex Wong and Tomas Hodan and Kun He", "abstract": "Accurate 3D understanding of human hands and objects during manipulation remains a significant challenge for egocentric computer vision. Existing hand-object interaction datasets are predominantly captured in controlled studio settings, which limits both environmental diversity and the ability of models trained on such data to generalize to real-world scenarios. To address this challenge, we introduce a novel marker-less multi-camera system that allows for nearly unconstrained mobility in genuinely in-the-wild conditions, while still having the ability to generate precise 3D annotations of hands and objects. The capture system consists of a lightweight, back-mounted, multi-camera rig that is synchronized and calibrated with a user-worn VR headset. For 3D ground-truth annotation of hands and objects, we develop an ego-exo tracking pipeline and rigorously evaluate its quality. Finally, we present SHOW3D, the first large-scale dataset with 3D annotations that show hands interacting with objects in diverse real-world environments, including outdoor settings. Our approach significantly reduces the fundamental trade-off between environmental realism and accuracy of 3D annotations, which we validate with experiments on several downstream tasks. show3d-dataset.github.io", "link": "http://arxiv.org/abs/2603.28760v1", "date": "2026-03-30", "relevancy": 2.4442, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6112}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6112}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6104}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SHOW3D%3A%20Capturing%20Scenes%20of%203D%20Hands%20and%20Objects%20in%20the%20Wild&body=Title%3A%20SHOW3D%3A%20Capturing%20Scenes%20of%203D%20Hands%20and%20Objects%20in%20the%20Wild%0AAuthor%3A%20Patrick%20Rim%20and%20Kevin%20Harris%20and%20Braden%20Copple%20and%20Shangchen%20Han%20and%20Xu%20Xie%20and%20Ivan%20Shugurov%20and%20Sizhe%20An%20and%20He%20Wen%20and%20Alex%20Wong%20and%20Tomas%20Hodan%20and%20Kun%20He%0AAbstract%3A%20Accurate%203D%20understanding%20of%20human%20hands%20and%20objects%20during%20manipulation%20remains%20a%20significant%20challenge%20for%20egocentric%20computer%20vision.%20Existing%20hand-object%20interaction%20datasets%20are%20predominantly%20captured%20in%20controlled%20studio%20settings%2C%20which%20limits%20both%20environmental%20diversity%20and%20the%20ability%20of%20models%20trained%20on%20such%20data%20to%20generalize%20to%20real-world%20scenarios.%20To%20address%20this%20challenge%2C%20we%20introduce%20a%20novel%20marker-less%20multi-camera%20system%20that%20allows%20for%20nearly%20unconstrained%20mobility%20in%20genuinely%20in-the-wild%20conditions%2C%20while%20still%20having%20the%20ability%20to%20generate%20precise%203D%20annotations%20of%20hands%20and%20objects.%20The%20capture%20system%20consists%20of%20a%20lightweight%2C%20back-mounted%2C%20multi-camera%20rig%20that%20is%20synchronized%20and%20calibrated%20with%20a%20user-worn%20VR%20headset.%20For%203D%20ground-truth%20annotation%20of%20hands%20and%20objects%2C%20we%20develop%20an%20ego-exo%20tracking%20pipeline%20and%20rigorously%20evaluate%20its%20quality.%20Finally%2C%20we%20present%20SHOW3D%2C%20the%20first%20large-scale%20dataset%20with%203D%20annotations%20that%20show%20hands%20interacting%20with%20objects%20in%20diverse%20real-world%20environments%2C%20including%20outdoor%20settings.%20Our%20approach%20significantly%20red {"title": "ScenePilot-4K: A Large-Scale First-Person Dataset and Benchmark for Vision-Language Models in Autonomous Driving", "author": "Yujin Wang and Yutong Zheng and Wenxian Fan and Tianyi Wang and Hongqing Chu and Li Zhang and Bingzhao Gao and Daxin Tian and Jianqiang Wang and Hong Chen", "abstract": "In this paper, we introduce ScenePilot-4K, a large-scale first-person dataset for safety-aware vision-language learning and evaluation in autonomous driving. Built from public online driving videos, ScenePilot-4K contains 3,847 hours of video and 27.7M front-view frames spanning 63 countries/regions and 1,210 cities. It jointly provides scene-level natural-language descriptions, risk assessment labels, key-participant annotations, ego trajectories, and camera parameters through a unified multi-stage annotation pipeline. Building on this dataset, we establish ScenePilot-Bench, a standardized benchmark that evaluates vision-language models along four complementary axes: scene understanding, spatial perception, motion planning, and GPT-based semantic alignment. The benchmark includes fine-grained metrics and geographic generalization settings that expose model robustness under cross-region and cross-traffic domain shifts. Baseline results on representative open-source and proprietary vision-language models show that current models remain competitive in high-level scene semantics but still exhibit substantial limitations in geometry-aware perception and planning-oriented reasoning. Beyond the released dataset itself, the proposed annotation pipeline serves as a reusable and extensible recipe for scalable dataset construction from public Internet driving videos. The codes and supplementary materials are available at: https://github.com/yjwangtj/ScenePilot-4K, with the dataset available at https://huggingface.co/datasets/larswangtj/ScenePilot-4K.", "link": "http://arxiv.org/abs/2601.19582v3", "date": "2026-03-30", "relevancy": 2.4294, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.612}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.612}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5843}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ScenePilot-4K%3A%20A%20Large-Scale%20First-Person%20Dataset%20and%20Benchmark%20for%20Vision-Language%20Models%20in%20Autonomous%20Driving&body=Title%3A%20ScenePilot-4K%3A%20A%20Large-Scale%20First-Person%20Dataset%20and%20Benchmark%20for%20Vision-Language%20Models%20in%20Autonomous%20Driving%0AAuthor%3A%20Yujin%20Wang%20and%20Yutong%20Zheng%20and%20Wenxian%20Fan%20and%20Tianyi%20Wang%20and%20Hongqing%20Chu%20and%20Li%20Zhang%20and%20Bingzhao%20Gao%20and%20Daxin%20Tian%20and%20Jianqiang%20Wang%20and%20Hong%20Chen%0AAbstract%3A%20In%20this%20paper%2C%20we%20introduce%20ScenePilot-4K%2C%20a%20large-scale%20first-person%20dataset%20for%20safety-aware%20vision-language%20learning%20and%20evaluation%20in%20autonomous%20driving.%20Built%20from%20public%20online%20driving%20videos%2C%20ScenePilot-4K%20contains%203%2C847%20hours%20of%20video%20and%2027.7M%20front-view%20frames%20spanning%2063%20countries/regions%20and%201%2C210%20cities.%20It%20jointly%20provides%20scene-level%20natural-language%20descriptions%2C%20risk%20assessment%20labels%2C%20key-participant%20annotations%2C%20ego%20trajectories%2C%20and%20camera%20parameters%20through%20a%20unified%20multi-stage%20annotation%20pipeline.%20Building%20on%20this%20dataset%2C%20we%20establish%20ScenePilot-Bench%2C%20a%20standardized%20benchmark%20that%20evaluates%20vision-language%20models%20along%20four%20complementary%20axes%3A%20scene%20understanding%2C%20spatial%20perception%2C%20motion%20planning%2C%20and%20 {"title": "Gen-Searcher: Reinforcing Agentic Search for Image Generation", "author": "Kaituo Feng and Manyuan Zhang and Shuang Chen and Yunlong Lin and Kaixuan Fan and Yilei Jiang and Hongyu Li and Dian Zheng and Chenyang Wang and Xiangyu Yue", "abstract": "Recent image generation models have shown strong capabilities in generating high-fidelity and photorealistic images. However, they are fundamentally constrained by frozen internal knowledge, thus often failing on real-world scenarios that are knowledge-intensive or require up-to-date information. In this paper, we present Gen-Searcher, as the first attempt to train a search-augmented image generation agent, which performs multi-hop reasoning and search to collect the textual knowledge and reference images needed for grounded generation. To achieve this, we construct a tailored data pipeline and curate two high-quality datasets, Gen-Searcher-SFT-10k and Gen-Searcher-RL-6k, containing diverse search-intensive prompts and corresponding ground-truth synthesis images. We further introduce KnowGen, a comprehensive benchmark that explicitly requires search-grounded external knowledge for image generation and evaluates models from multiple dimensions. Based on these resources, we train Gen-Searcher with SFT followed by agentic reinforcement learning with dual reward feedback, which combines text-based and image-based rewards to provide more stable and informative learning signals for GRPO training. Experiments show that Gen-Searcher brings substantial gains, improving Qwen-Image by around 16 points on KnowGen and 15 points on WISE. We hope this work can serve as an open foundation for search agents in image generation, and we fully open-source our data, models, and code.", "link": "http://arxiv.org/abs/2603.28767v1", "date": "2026-03-30", "relevancy": 2.4286, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.6663}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5677}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5578}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gen-Searcher%3A%20Reinforcing%20Agentic%20Search%20for%20Image%20Generation&body=Title%3A%20Gen-Searcher%3A%20Reinforcing%20Agentic%20Search%20for%20Image%20Generation%0AAuthor%3A%20Kaituo%20Feng%20and%20Manyuan%20Zhang%20and%20Shuang%20Chen%20and%20Yunlong%20Lin%20and%20Kaixuan%20Fan%20and%20Yilei%20Jiang%20and%20Hongyu%20Li%20and%20Dian%20Zheng%20and%20Chenyang%20Wang%20and%20Xiangyu%20Yue%0AAbstract%3A%20Recent%20image%20generation%20models%20have%20shown%20strong%20capabilities%20in%20generating%20high-fidelity%20and%20photorealistic%20images.%20However%2C%20they%20are%20fundamentally%20constrained%20by%20frozen%20internal%20knowledge%2C%20thus%20often%20failing%20on%20real-world%20scenarios%20that%20are%20knowledge-intensive%20or%20require%20up-to-date%20information.%20In%20this%20paper%2C%20we%20present%20Gen-Searcher%2C%20as%20the%20first%20attempt%20to%20train%20a%20search-augmented%20image%20generation%20agent%2C%20which%20performs%20multi-hop%20reasoning%20and%20search%20to%20collect%20the%20textual%20knowledge%20and%20reference%20images%20needed%20for%20grounded%20generation.%20To%20achieve%20this%2C%20we%20construct%20a%20tailored%20data%20pipeline%20and%20curate%20two%20high-quality%20datasets%2C%20Gen-Searcher-SFT-10k%20and%20Gen-Searcher-RL-6k%2C%20containing%20diverse%20search-intensive%20prompts%20and%20corresponding%20ground-truth%20synthesis%20images.%20We%20further%20introduce%20KnowGen%2C%20a%20comprehensive%20benchmark%20that%20explicitly%20requires%20search-grounded%20external%20knowledge%20for%20image%20generation%20and%20evaluates%20models%20from%20multiple%20dimensions.%20Based%20on%20these%20resources%2C%20we%20train%20Gen-Searcher%20with%20SFT%20followed%20by%20agentic%20reinforcement%20learning%20with%20dual%20reward%20feedback%2C%20which%20combines%20text-based%20and%20image-based%20rewards%20to%20provide%20more%20stable%20and%20informative%20learning%20signals%20for%20GRPO%20training.%20Experiments%20show%20that%20Gen-Searcher%20brings%20substantial%20gains%2C%20improving%20Qwen-Image%20by%20around%2016%20points%20on%20KnowGen%20and%2015%20points%20on%20WISE.%20We%20hope%20this%20work%20can%20serve%20as%20an%20open%20foundation%20for%20search%20agents%20in%20image%20generation%2C%20and%20we%20fully%20open-source%20our%20data%2C%20models%2C%20and%20code.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28767v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGen-Searcher%253A%2520Reinforcing%2520Agentic%2520Search%2520for%2520Image%2520Generation%26entry.906535625%3DKaituo%2520Feng%2520and%2520Manyuan%2520Zhang%2520and%2520Shuang%2520Chen%2520and%2520Yunlong%2520Lin%2520and%2520Kaixuan%2520Fan%2520and%2520Yilei%2520Jiang%2520and%2520Hongyu%2520Li%2520and%2520Dian%2520Zheng%2520and%2520Chenyang%2520Wang%2520and%2520Xiangyu%2520Yue%26entry.1292438233%3DRecent%2520image%2520generation%2520models%2520have%2520shown%2520strong%2520capabilities%2520in%2520generating%2520high-fidelity%2520and%2520photorealistic%2520images.%2520However%252C%2520they%2520are%2520fundamentally%2520constrained%2520by%2520frozen%2520internal%2520knowledge%252C%2520thus%2520often%2520failing%2520on%2520real-world%2520scenarios%2520that%2520are%2520knowledge-intensive%2520or%2520require%2520up-to-date%2520information.%2520In%2520this%2520paper%252C%2520we%2520present%2520Gen-Searcher%252C%2520as%2520the%2520first%2520attempt%2520to%2520train%2520a%2520search-augmented%2520image%2520generation%2520agent%252C%2520which%2520performs%2520multi-hop%2520reasoning%2520and%2520search%2520to%2520collect%2520the%2520textual%2520knowledge%2520and%2520reference%2520i %20and%20Dian%20Zheng%20and%20Chenyang%20Wang%20and%20Xiangyu%20Yue&entry.1292438233=Recent%20image%20generation%20models%20have%20shown%20strong%20capabilities%20in%20generating%20high-fidelity%20and%20photorealistic%20images.%20However%2C%20they%20are%20fundamentally%20constrained%20by%20frozen%20internal%20knowledge%2C%20thus%20often%20failing%20on%20real-world%20scenarios%20that%20are%20knowledge-intensive%20or%20require%20up-to-date%20information.%20In%20this%20paper%2C%20we%20present%20Gen-Searcher%2C%20as%20the%20first%20attempt%20to%20train%20a%20search-augmented%20image%20generation%20agent%2C%20which%20performs%20multi-hop%20reasoning%20and%20search%20to%20collect%20the%20textual%20knowledge%20and%20reference%20images%20needed%20for%20grounded%20generation.%20To%20achieve%20this%2C%20we%20construct%20a%20tailored%20data%20pipeline%20and%20curate%20two%20high-quality%20datasets%2C%20Gen-Searcher-SFT-10k%20and%20Gen-Searcher-RL-6k%2C%20containing%20diverse%20search-intensive%20prompts%20and%20corresponding%20ground-truth%20synthesis%20images.%20We%20further%20introduce%20KnowGen%2C%20a%20comprehensive%20benchmark%20that%20explicitly%20requires%20search-grounded%20external%20knowledge%20for%20image%20generation%20and%20evaluates%20models%20from%20multiple%20dimensions.%20Based%20on%20these%20resources%2C%20we%20train%20Gen-Searcher%20with%20SFT%20followed%20by%20agentic%20reinforcement%20learning%20with%20dual%20reward%20feedback%2C%20which%20combines%20text-based%20and%20image-based%20rewards%20to%20provide%20more%20stable%20and%20informative%20learning%20signals%20for%20GRPO%20training.%20Experiments%20show%20that%20Gen-Searcher%20brings%20substantial%20gains%2C%20improving%20Qwen-Image%20by%20around%2016%20points%20on%20KnowGen%20and%2015%20points%20on%20WISE.%20We%20hope%20this%20work%20can%20serve%20as%20an%20open%20foundation%20for%20search%20agents%20in%20image%20generation%2C%20and%20we%20fully%20open-source%20our%20data%2C%20models%2C%20and%20code.&e {"title": "Coherent Without Grounding, Grounded Without Success: Observability and Epistemic Failure", "author": "Camilo Chac\u00f3n Sartori", "abstract": "When an agent can articulate why something works, we typically take this as evidence of genuine understanding. This presupposes that effective action and correct explanation covary, and that coherent explanation reliably signals both. I argue that this assumption fails for contemporary Large Language Models (LLMs). I introduce what I call the Bidirectional Coherence Paradox: competence and grounding not only dissociate but invert across epistemic conditions. In low-observability domains, LLMs often act successfully while misidentifying the mechanisms that produce their success. In high-observability domains, they frequently generate explanations that accurately track observable causal structure yet fail to translate those diagnoses into effective intervention. In both cases, explanatory coherence remains intact, obscuring the underlying dissociation. Drawing on experiments in compiler optimization and hyperparameter tuning, I develop the Epistemic Triangle, a model of how priors, signals, and domain knowledge interact under varying observability. The results suggest that neither behavioral success nor explanatory accuracy alone suffices for attributing understanding. I argue that evaluating artificial epistemic agents requires a tripartite framework -- coherence, grounding, and a proper basing relation linking explanation to action. The systematic separation of knowing-that and knowing-how in LLMs thus challenges assumptions inherited from both epistemology and current AI evaluation practice.", "link": "http://arxiv.org/abs/2603.28371v1", "date": "2026-03-30", "relevancy": 2.4254, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4937}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4807}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4807}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Coherent%20Without%20Grounding%2C%20Grounded%20Without%20Success%3A%20Observability%20and%20Epistemic%20Failure&body=Title%3A%20Coherent%20Without%20Grounding%2C%20Grounded%20Without%20Success%3A%20Observability%20and%20Epistemic%20Failure%0AAuthor%3A%20Camilo%20Chac%C3%B3n%20Sartori%0AAbstract%3A%20When%20an%20agent%20can%20articulate%20why%20something%20works%2C%20we%20typically%20take%20this%20as%20evidence%20of%20genuine%20understanding.%20This%20presupposes%20that%20effective%20action%20and%20correct%20explanation%20covary%2C%20and%20that%20coherent%20explanation%20reliably%20signals%20both.%20I%20argue%20that%20this%20assumption%20fails%20for%20contemporary%20Large%20Language%20Models%20%28LLMs%29.%20I%20introduce%20what%20I%20call%20the%20Bidirectional%20Coherence%20Paradox%3A%20competence%20and%20grounding%20not%20only%20dissociate%20but%20invert%20across%20epistemic%20conditions.%20In%20low-observability%20domains%2C%20LLMs%20often%20act%20successfully%20while%20misidentifying%20the%20mechanisms%20that%20produce%20their%20success.%20In%20high-observability%20domains%2C%20they%20frequently%20generate%20explanations%20that%20accurately%20track%20observable%20causal%20structure%20yet%20fail%20to%20translate%20those%20diagnoses%20into%20effective%20intervention.%20In%20both%20cases%2C%20explanatory%20coherence%20remains%20intact%2C%20obscuring%20the%20underlying%20dissociation.%20Drawing%20on%20experiments%20in%20compiler%20optimization%20and%20hyperparameter%20tuning%2C%20I%20develop%20the%20Epistemic%20Triangle%2C%20a%20model%20of%20how%20priors%2C%20signals%2C%20and%20domain%20knowledge%20interact%20under%20varying%20observability.%20The%20results%20suggest%20that%20neither%20behavioral%20success%20nor%20explanatory%20accuracy%20alone%20suffices%20for%20attributing%20understanding.%20I%20argue%20that%20evaluating%20artificial%20epistemic%20agents%20requires%20a%20tripartite%20framework%20--%20coherence%2C%20grounding%2C%20and%20a%20proper%20basing%20relation%20linking%20explanation%20to%20action.%20The%20systematic%20separation%20of%20knowing-that%20and%20knowing-how%20in%20LLMs%20thus%20challenges%20assumptions%20inherited%20from%20both%20epistemology%20and%20current%20AI%20evaluation%20practice.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28371v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCoherent%2520Without%2520Grounding%252C%2520Grounded%2520Without%2520Success%253A%2520Observability%2520and%2520Epistemic%2520Failure%26entry.906535625%3DCamilo%2520Chac%25C3%25B3n%2520Sartori%26entry.1292438233%3DWhen%2520an%2520agent%2520can%2520articulate%2520why%2520something%2520works%252C%2520we%2520typically%2520take%2520this%2520as%2520evidence%2520of%2520genuine%2520understanding.%2520This%2520presupposes%2520that%2520effective%2520action%2520and%2520correct%2520explanation%2520covary%252C%2520and%2520that%2520coherent%2520explanation%2520reliably%2520signals%2520both.%2520I%2520argue%2520that%2520this%2520assumption%2520fails%2520for%2520contemporary%2520Large%2520Language%2520Models%2520%2528LLMs%2529.%2520I%2520introduce%2520what%2520I%2520call%2520the%2520Bidirectional%2520Coherence%2520Paradox%253A%2520competence%2520and%2520grounding%2520not%2520only%2520dissociate%2520but%2520invert%2520across%2520epistemic%2520conditions.%2520In%2520low-observability%2520domains%252C%2520LLMs%2520often%2520act%2520successfully%2520while%2520misidentifying%2520the%2520mechanisms%2520that%2520produce%2520their {"title": "NeiGAD: Augmenting Graph Anomaly Detection via Spectral Neighbor Information", "author": "Qing Qing and Huafei Huang and Mingliang Hou and Renqiang Luo and Mohsen Guizani", "abstract": "Graph anomaly detection (GAD) aims to identify irregular nodes or structures in attributed graphs. Neighbor information, which reflects both structural connectivity and attribute consistency with surrounding nodes, is essential for distinguishing anomalies from normal patterns. Although recent graph neural network (GNN)-based methods incorporate such information through message passing, they often fail to explicitly model its effect or interaction with attributes, limiting detection performance. This work introduces NeiGAD, a novel plug-and-play module that captures neighbor information through spectral graph analysis. Theoretical insights demonstrate that eigenvectors of the adjacency matrix encode local neighbor interactions and progressively amplify anomaly signals. Based on this, NeiGAD selects a compact set of eigenvectors to construct efficient and discriminative representations. Experiments on eight real-world datasets show that NeiGAD consistently improves detection accuracy and outperforms state-of-the-art GAD methods. These results demonstrate the importance of explicit neighbor modeling and the effectiveness of spectral analysis in anomaly detection. Code is available at: https://github.com/huafeihuang/NeiGAD.", "link": "http://arxiv.org/abs/2603.28300v1", "date": "2026-03-30", "relevancy": 2.4178, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5105}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4758}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4644}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NeiGAD%3A%20Augmenting%20Graph%20Anomaly%20Detection%20via%20Spectral%20Neighbor%20Information&body=Title%3A%20NeiGAD%3A%20Augmenting%20Graph%20Anomaly%20Detection%20via%20Spectral%20Neighbor%20Information%0AAuthor%3A%20Qing%20Qing%20and%20Huafei%20Huang%20and%20Mingliang%20Hou%20and%20Renqiang%20Luo%20and%20Mohsen%20Guizani%0AAbstract%3A%20Graph%20anomaly%20detection%20%28GAD%29%20aims%20to%20identify%20irregular%20nodes%20or%20structures%20in%20attributed%20graphs.%20Neighbor%20information%2C%20which%20reflects%20both%20structural%20connectivity%20and%20attribute%20consistency%20with%20surrounding%20nodes%2C%20is%20essential%20for%20distinguishing%20anomalies%20from%20normal%20patterns.%20Although%20recent%20graph%20neural%20network%20%28GNN%29-based%20methods%20incorporate%20such%20information%20through%20message%20passing%2C%20they%20often%20fail%20to%20explicitly%20model%20its%20effect%20or%20interaction%20with%20attributes%2C%20limiting%20detection%20performance.%20This%20work%20introduces%20NeiGAD%2C%20a%20novel%20plug-and-play%20module%20that%20captures%20neighbor%20information%20through%20spectral%20graph%20analysis.%20Theoretical%20insights%20demonstrate%20that%20eigenvectors%20of%20the%20adjacency%20matrix%20encode%20local%20neighbor%20interactions%20and%20progressively%20amplify%20anomaly%20signals.%20Based%20on%20this%2C%20NeiGAD%20selects%20a%20compact%20set%20of%20eigenvectors%20to%20construct%20efficient%20and%20discriminative%20representations.%20Experiments%20on%20eight%20real-world%20datasets%20show%20that%20NeiGAD%20consistently%20improves%20detection%20accuracy%20and%20outperforms%20state-of-the-art%20GAD%20methods.%20These%20results%20demonstrate%20the%20importance%20of%20explicit%20neighbor%20modeling%20and%20the%20effectiveness%20of%20spectral%20analysis%20in%20anomaly%20detection.%20Code%20is%20available%20at%3A%20https%3A//github.com/huafeihuang/NeiGAD.%

{"title": "ReCap: Lightweight Referential Grounding for Coherent Story Visualization", "author": "Aditya Arora and Akshita Gupta and Pau Rodriguez and Marcus Rohrbach", "abstract": "Story Visualization aims to generate a sequence of images that faithfully depicts a textual narrative that preserve character identity, spatial configuration, and stylistic coherence as the narratives unfold. Maintaining such cross-frame consistency has traditionally relied on explicit memory banks, architectural expansion, or auxiliary language models, resulting in substantial parameter growth and inference overhead. We introduce ReCap, a lightweight consistency framework that improves character stability and visual fidelity without modifying the base diffusion backbone. ReCap's CORE (COnditional frame REferencing) module treats anaphors, in our case pronouns, as visual anchors, activating only when characters are referred to by a pronoun and conditioning on the preceding frame to propagate visual identity. This selective design avoids unconditional cross-frame conditioning and introduces only 149K additional parameters, a fraction of the cost of memory-bank and LLM-augmented approaches. To further stabilize identity, we incorporate SemDrift (Guided Semantic Drift Correction) applied only during training. When text is vague or referential, the denoiser lacks a visual anchor for identity-defining attributes, causing character appearance to drift across frames, SemDrift corrects this by aligning denoiser representations with pretrained DINOv3 visual embeddings, enforcing semantic identity stability at zero inference cost. ReCap outperforms previous state-of-the-art, StoryGPT-V, on the two main benchmarks for story visualization by 2.63% Character-Accuracy on FlintstonesSV and by 5.65% on PororoSV, establishing a new state-of-the-art character consistency on both benchmarks. Furthermore, we extend story visualization to human-centric narratives derived from real films, demonstrating the capability of ReCap beyond stylized cartoon domains.", "link": "http://arxiv.org/abs/2604.18575v1", "date": "2026-04-20", "relevancy": 2.708, "topK": [{"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5544}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5352}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5352}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ReCap%3A%20Lightweight%20Referential%20Grounding%20for%20Coherent%20Story%20Visualization&body=Title%3A%20ReCap%3A%20Lightweight%20Referential%20Grounding%20for%20Coherent%20Story%20Visualization%0AAuthor%3A%20Aditya%20Arora%20and%20Akshita%20Gupta%20and%20Pau%20Rodriguez%20and%20Marcus%20Rohrbach%0AAbstract%3A%20Story%20Visualization%20aims%20to%20generate%20a%20sequence%20of%20images%20that%20faithfully%20depicts%20a%20textual%20narrative%20that%20preserve%20character%20identity%2C%20spatial%20configuration%2C%20and%20stylistic%20coherence%20as%20the%20narratives%20unfold.%20Maintaining%20such%20cross-frame%20consistency%20has%20traditionally%20relied%20on%20explicit%20memory%20banks%2C%20architectural%20expansion%2C%20or%20auxiliary%20language%20models%2C%20resulting%20in%20substantial%20parameter%20growth%20and%20inference%20overhead.%20We%20introduce%20ReCap%2C%20a%20lightweight%20consistency%20framework%20that%20improves%20character%20stability%20and%20visual%20fidelity%20without%20modifying%20the%20base%20diffusion%20backbone.%20ReCap%27s%20CORE%20%28COnditional%20frame%20REferencing%29%20module%20treats%20anaphors%2C%20in%20our%20case%20pronouns%2C%20as%20visual%20anchors%2C%20activating%20only%20when%20characters%20are%20referred%20to%20by%20a%20pronoun%20and%20conditioning%20on%20the%20preceding%20frame%20to%20propagate%20visual%20identity.%20This%20selective%20design%20avoids%20unconditional%20cross-frame%20conditioning%20and%20introduces%20only%20149K%20additional%20parameters%2C%20a%20fraction%20of%20the%20cost%20of%20memory-bank%20and%20LLM-augmented%20approaches.%20To%20further%20stabilize%20identity%2C%20we%20incorporate%20SemDrift%20%28Guided%20Semantic%20Drift%20Correction%29%20applied%20only%20during%20training.%20When%20text%20is%20vague%20or%20referential%2C%20the%20denoiser%20lacks%20a%20visual%20anchor%20for%20identity-defining%20attributes%2C%20causing%20character%20appearance%20to%20drift%20across%20frames%2C%20SemDrift%20corrects%20this%20by%20aligning%20denoiser%20representations%20with%20pretrained%20DINOv3%20visual%20embeddings%2C%20enforcing%20semantic%20identity%20stability%20at%20zero%20inference%20cost.%20ReCap%20outperforms%20previous%20state-of-the-art%2C%20StoryGPT-V%2C%20on%20the%20two%20main%20benchmarks%20for%20story%20visualization%20by%202.63%25%20Character-Accuracy%20on%20FlintstonesSV%20and%20by%205.65%25%20on%20PororoSV%2C%20establishing%20a%20new%20state-of-the-art%20character%20consistency%20on%20both%20benchmarks.%20Furthermore%2C%20we%20extend%20story%20visualization%20to%20human-centric%20narratives%20derived%20from%20real%20films%2C%20demonstrating%20the%20capability%20of%20ReCap%20beyond%20stylized%20cartoon%20domains.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18575v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReCap%253A%2520Lightweight%2520Referential%2520Grounding%2520for%2520Coherent%2520Story%2520Visualization%26entry.906535625%3DAditya%2520Arora%2520and%2520Akshita%2520Gupta%2520and%2520Pau%2520Rodriguez%2520and%2520Marcus%2520Rohrbach%26entry.1292438233%3DStory%2520Visualization%2520aims%2520to%2520generate%2520a%2520sequence%2520of%2520images%2520that%2520faithfully%2520depicts%2520a%2520text {"title": "GeoRC: A Benchmark for Geolocation Reasoning Chains", "author": "Mohit Talreja and Joshua Diao and Jim Thannikary James and Radu Casapu and Tejas Santanam and Ethan Mendes and Alan Ritter and Wei Xu and James Hays", "abstract": "Vision Language Models (VLMs) are good at recognizing the global location of a photograph -- their geolocation prediction accuracy rivals the best human experts. But many VLMs are startlingly bad at \\textit{explaining} which image evidence led to their prediction, even when their location prediction is correct. In this paper, we introduce GeoRC, the first benchmark for geolocation reasoning chains sourced directly from Champion-tier GeoGuessr experts, including the reigning world champion. This benchmark consists of 800 ``ground truth'' reasoning chains across 500 query scenes from GeoGuessr maps, with expert chains addressing hundreds of different discriminative attributes, such as soil properties, architecture, and license plate shapes. We evaluate LLM-as-a-judge and VLM-as-a-judge strategies for scoring VLM-generated reasoning chains against our expert reasoning chains and find that Qwen 3 LLM-as-a-judge correlates best with human-expert scoring. Our benchmark reveals that while large, closed-source VLMs such as Gemini and GPT 5 rival human experts at predicting locations, they still lag behind human experts when it comes to producing auditable reasoning chains. Small open-weight VLMs such as Llama and Qwen catastrophically fail on our benchmark -- they perform only slightly better than a baseline in which an LLM hallucinates a reasoning chain with oracle knowledge of the photo location but \\textit{no visual information at all}. We believe the gap between human experts and VLMs on this task points to VLM limitations at extracting fine-grained visual attributes from high resolution images. We open source our benchmark for the community to use.", "link": "http://arxiv.org/abs/2601.21278v2", "date": "2026-04-20", "relevancy": 2.7021, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5527}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5527}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5159}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GeoRC%3A%20A%20Benchmark%20for%20Geolocation%20Reasoning%20Chains&body=Title%3A%20GeoRC%3A%20A%20Benchmark%20for%20Geolocation%20Reasoning%20Chains%0AAuthor%3A%20Mohit%20Talreja%20and%20Joshua%20Diao%20and%20Jim%20Thannikary%20James%20and%20Radu%20Casapu%20and%20Tejas%20Santanam%20and%20Ethan%20Mendes%20and%20Alan%20Ritter%20and%20Wei%20Xu%20and%20James%20Hays%0AAbstract%3A%20Vision%20Language%20Models%20%28VLMs%29%20are%20good%20at%20recognizing%20the%20global%20location%20of%20a%20photograph%20--%20their%20geolocation%20prediction%20accuracy%20rivals%20the%20best%20human%20experts.%20But%20many%20VLMs%20are%20startlingly%20bad%20at%20%5Ctextit%7Bexplaining%7D%20which%20image%20evidence%20led%20to%20their%20prediction%2C%20even%20when%20their%20location%20prediction%20is%20correct.%20In%20this%20paper%2C%20we%20introduce%20GeoRC%2C%20the%20first%20benchmark%20for%20geolocation%20reasoning%20chains%20sourced%20directly%20from%20Champion-tier%20GeoGuessr%20experts%2C%20including%20the%20reigning%20world%20champion.%20This%20benchmark%20consists%20of%20800%20%60%60ground%20truth%27%27%20reasoning%20chains%20across%20500%20query%20scenes%20from%20GeoGuessr%20maps%2C%20with%20expert%20chains%20addressing%20hundreds%20of%20different%20discriminative%20attributes%2C%20such%20as%20soil%20properties%2C%20architecture%2C%20and%20license%20plate%20shapes.%20We%20evaluate%20LLM-as-a-judge%20and%20VLM-as-a-judge%20strategies%20for%20scoring%20VLM-generated%20reasoning%20chains%20against%20our%20expert%20reasoning%20chains%20and%20find%20that%20Qwen%203%20LLM-as-a-judge%20correlates%20best%20with%20human-expert%20scoring.%20Our%20benchmark%20reveals%20that%20while%20large%2C%20closed-source%20VLMs%20such%20as%20Gemini%20and%20GPT%205%20rival%20human%20experts%20at%20predicting%20locations%2C%20they%20still%20lag%20behind%20human%20experts%20when%20it%20comes%20to%20producing%20auditable%20reasoning%20chains.%20Small%20open-weight%20VLMs%20such%20as%20Llama%20and%20Qwen%20catastrophically%20fail%20on%20our%20benchmark%20--%20they%20perform%20only%20slightly%20better%20than%20a%20baseline%20in%20which%20an%20LLM%20hallucinates%20a%20reasoning%20chain%20with%20oracle%20knowledge%20of%20the%20photo%20location%20but%20%5Ctextit%7Bno%20visual%20information%20at%20all%7D.%20We%20believe%20the%20gap%20between%20human%20experts%20and%20VLMs%20on%20this%20task%20points%20to%20VLM%20limitations%20at%20extracting%20fine-grained%20visual%20attributes%20from%20high%20resolution%20images.%20We%20open%20source%20our%20benchmark%20for%20the%20community%20to%20use.%0ALink%3A%20http%3A//arxiv.org/abs/2601.21278v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeoRC%253A%2520A%2520Benchmark%2520for%2520Geolocation%2520Reasoning%2520Chains%26entry.906535625%3DMohit%2520Talreja%2520and%2520Joshua%2520Diao%2520and%2520Jim%2520Thannikary%2520James%2520and%2520Radu%2520Casapu%2520and%2520Tejas%2520Santanam%2520and%2520Ethan%2520Mendes%2520and%2520Alan%2520Ritter%2520and%2520Wei%2520Xu%2520and%2520James%2520Hays%26entry.1292438233%3DVision%2520Language%2520Models%2520%2528VLMs%2529%2520are%2520good%2520at%2520recognizing%2520the%2520global%2520location%2520of%2520a%2520photograph%2520--%2520their%2520geolocation%2520prediction%2520accuracy%2520rivals%2520the%2520best%2520human%2520experts.%2520But%2520many%2520V {"title": "MMErroR: A Benchmark for Erroneous Reasoning in Vision-Language Models", "author": "Yang Shi and Yifeng Xie and Minzhe Guo and Liangsi Lu and Mingxuan Huang and Jingchao Wang and Zhihong Zhu and Boyan Xu and Zhiqi Huang", "abstract": "Recent advances in Vision-Language Models (VLMs) have improved performance in multi-modal learning, raising the question of whether these models truly understand the content they process. Crucially, can VLMs detect when a reasoning process is wrong and identify its error type? To answer this, we present MMErroR, a multi-modal benchmark of 1997 samples, each embedding a single coherent reasoning error. These samples span 24 subdomains across six top-level domains, ensuring broad coverage and taxonomic richness. Unlike existing benchmarks that focus on answer correctness, MMErroR targets a process-level, error-centric evaluation that requires models to detect incorrect reasoning and classify the error type within both visual and linguistic contexts. We evaluate 12 representative VLMs, and even the best model, Gemini-3-Pro-Preview, classifies the error correctly in only 66.65\\% of cases, underscoring the challenge of identifying erroneous reasoning. Furthermore, the ability to accurately identify errors offers valuable insights into the capabilities of multi-modal models. Project Page: https://mmerror-benchmark.github.io", "link": "http://arxiv.org/abs/2601.03331v2", "date": "2026-04-20", "relevancy": 2.696, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5472}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5472}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evident {"title": "Training and Agentic Inference Strategies for LLM-based Manim Animation Generation", "author": "Ravidu Suien Rammuni Silva and Ahmad Lotfi and Isibor Kennedy Ihianle and Golnaz Shahtahmassebi and Jordan J. Bird", "abstract": "Generating programmatic animation using libraries such as Manim presents unique challenges for Large Language Models (LLMs), requiring spatial reasoning, temporal sequencing, and familiarity with domain-specific APIs that are underrepresented in general pre-training data. A systematic study of how training and inference strategies interact in this setting is lacking in current research. This study introduces ManimTrainer, a training pipeline that combines Supervised Fine-tuning (SFT) with Reinforcement Learning (RL) based Group Relative Policy Optimisation (GRPO) using a unified reward signal that fuses code and visual assessment signals, and ManimAgent, an inference pipeline featuring Renderer-in-the-loop (RITL) and API documentation-augmented RITL (RITL-DOC) strategies. Using these techniques, this study presents the first unified training and inference study for text-to-code-to-video transformation with Manim. It evaluates 17 open-source sub-30B LLMs across nine combinations of training and inference strategies using ManimBench. Results show that SFT generally improves code quality, while GRPO enhances visual outputs and increases the models' responsiveness to extrinsic signals during self-correction at inference time. The Qwen 3 Coder 30B model with GRPO and RITL-DOC achieved the highest overall performance, with a 94% Render Success Rate (RSR) and 85.7% Visual Similarity (VS) to reference videos, surpassing the baseline GPT-4.1 model by +3 percentage points in VS. Additionally, the analysis shows that the correlation between code and visual metrics strengthens with SFT and GRPO but weakens with inference-time enhancements, highlighting the complementary roles of training and agentic inference strategies in Manim animation generation.", "link": "http://arxiv.org/abs/2604.18364v1", "date": "2026-04-20", "relevancy": 2.6904, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5492}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5364}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5286}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Training%20and%20Agentic%20Inference%20Strategies%20for%20LLM-based%20Manim%20Animation%20Generation&body=Title%3A%20Training%20and%20Agentic%20Inference%20Strategies%20for%20LLM-based%20Manim%20Animation%20Generation%0AAuthor%3A%20Ravidu%20Suien%20Rammuni%20Silva%20and%20Ahmad%20Lotfi%20and%20Isibor%20Kennedy%20Ihianle%20and%20Golnaz%20Shahtahmassebi%20and%20Jordan%20J.%20Bird%0AAbstract%3A%20Generating%20programmatic%20animation%20using%20libraries%20such%20as%20Manim%20presents%20unique%20challenges%20for%20Large%20Language%20Models%20%28LLMs%29%2C%20requiring%20spatial%20reasoning%2C%20temporal%20sequencing%2C%20and%20familiarity%20with%20domain-specific%20APIs%20that%20are%20underrepresented%20in%20general%20pre-training%20data.%20A%20systematic%20study%20of%20how%20training%20and%20inference%20strategies%20interact%20in%20this%20setting%20is%20lacking%20in%20current%20research.%20This%20study%20introduces%20ManimTrainer%2C%20a%20training%20pipeline%20that%20combines%20Supervised%20Fine-tuning%20%28SFT%29%20with%20Reinforcement%20Learning%20%28RL%29%20based%20Group%20Relative%20Policy%20Optimisation%20%28GRPO%29%20using%20a%20unified%20reward%20signal%20that%20fuses%20code%20and%20visual%20assessment%20signals%2C%20and%20ManimAgent%2C%20an%20inference%20pipeline%20featuring%20Renderer-in-the-loop%20%28RITL%29%20and%20API%20documentation-augmented%20RITL%20%28RITL-DOC%29%20strategies.% {"title": "Emergent Structured Representations Support Flexible In-Context Inference in Large Language Models", "author": "Ningyu Xu and Qi Zhang and Xipeng Qiu and Xuanjing Huang", "abstract": "Large language models (LLMs) exhibit emergent behaviors suggestive of human-like reasoning. While recent work has identified structured conceptual representations within these models, it remains unclear whether they functionally rely on such representations for reasoning. Here we investigate the internal processing of LLMs during in-context inference across diverse tasks. Our results reveal a conceptual subspace emerging in middle to late layers, whose representational structure persists across contexts. Using causal mediation analyses, we demonstrate that this subspace is not merely an epiphenomenon but is functionally central to model predictions, establishing its causal role in inference. We further identify a layer-wise progression where attention heads in early-to-middle layers integrate contextual cues to construct and refine the subspace, which is subsequently leveraged by later layers to generate predictions. Together, these findings provide evidence that LLMs dynamically construct and use structured latent representations in context for inference, offering insights into the computational processes underlying flexible adaptation.", "link": "http://arxiv.org/abs/2602.07794v3", "date": "2026-04-20", "relevancy": 2.6767, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5521}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5521}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5019}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Emergent%20Structured%20Representations%20Support%20Flexible%20In-Context%20Inference%20in%20Large%20Language%20Models&body=Title%3A%20Emergent%20Structured%20Representations%20Support%20Flexible%20In-Context%20Inference%20in%20Large%20Language%20Models%0AAuthor%3A%20Ningyu%20Xu%20and%20Qi%20Zhang%20and%20Xipeng%20Qiu%20and%20Xuanjing%20Huang%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20exhibit%20emergent%20behaviors%20suggestive%20of%20human-like%20reasoning.%20While%20recent%20work%20has%20identified%20structured%20conceptual%20representations%20within%20these%20models%2C%20it%20remains%20unclear%20whether%20they%20functionally%20rely%20on%20such%20representations%20for%20reasoning.%20Here%20we%20investigate%20the%20internal%20processing%20of%20LLMs%20during%20in-context%20inference%20across%20diverse%20tasks.%20Our%20results%20reveal%20a%20conceptual%20subspace%20emerging%20in%20middle%20to%20late%20layers%2C%20whose%20representational%20structure%20persists%20across%20contexts.%20Using%20causal%20mediation%20analyses%2C%20we%20demonstrate%20that%20this%20subspace%20is%20not%20merely%20an%20epiphenomenon%20but%20is%20functionally%20central%20to%20model%20predictions%2C%20establishing%20its%20causal%20role%20in%20inference.%20We%20further%20identify%20a%20layer-wise%20progression%20where%20attention%20heads%20in%20early-to-middle%20layers%20integrate%20contextual%20cues%20to%20construct%20and%20refine%20the%20subspace%2C%20which%20is%20subsequently%20leveraged%20by%20later%20layers%20to%20generate%20predictions.%20Together%2C%20these%20findings%20provide%20evidence%20that%20LLMs%20dynamically%20construct%20and%20use%20structured%20latent%20representations%20in%20context%20for%20inference%2C%20offering%20insights%20into%20the%20computational%20processes%20underlying%20flexible%20adaptation.%0ALink%3A%20http%3A//arxiv.org/abs/2602.0 {"title": "PowerCLIP: Powerset Alignment for Contrastive Pre-Training", "author": "Masaki Kawamura and Nakamasa Inoue and Rintaro Yanagi and Hirokatsu Kataoka and Rio Yokota", "abstract": "Contrastive vision-language pre-training frameworks such as CLIP have demonstrated impressive zero-shot performance across a range of vision-language tasks. Recent studies have shown that aligning individual text tokens with specific image patches or regions enhances fine-grained compositional understanding. However, it remains challenging to capture compositional semantics that span multiple image regions. To address this limitation, we propose PowerCLIP, a novel contrastive pre-training framework enhanced by powerset alignment, which exhaustively optimizes region-to-phrase alignments by minimizing the loss defined between powersets of image regions and textual parse trees. Since the naive powerset construction incurs exponential computational cost due to the combinatorial explosion in the number of region subsets, we introduce efficient non-linear aggregators (NLAs) that reduce complexity from O(2^M) to O(M) with respect to the number of regions M, while approximating the exact loss value with arbitrary precision. Our extensive experiments demonstrate that PowerCLIP outperforms state-of-the-art methods in zero-shot classification and retrieval tasks, underscoring the compositionality and robustness of our approach. Code is available at https://github.com/Masakichi210/PowerCLIP.", "link": "http://arxiv.org/abs/2511.23170v5", "date": "2026-04-20", "relevancy": 2.6548, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5761}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5084}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": r%20approach.%20Code%20is%20available%20at%20https%3A//github.com/Masakichi210/PowerCLIP.%0ALink%3A%20http%3A//arxiv.org/abs/2511.23170v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPowerCLIP%253A%2520Powerset%2520Alignment%2520for%2520Contrastive%2520Pre-Training%26entry.906535625%3DMasaki%2520Kawamura%2520and%2520Nakamasa%2520Inoue%2520and%2520Rintaro%2520Yanagi%2520and%2520Hirokatsu%2520Kataoka%2520and%2520Rio%2520Yokota%26entry.1292438233%3DContrastive%2520vision-language%2520pre-training%2520frameworks%2520such%2520as%2520CLIP%2520have%2520demonstrated%2520impressive%2520zero-shot%2520performance%2520across%2520a%2520range%2520of%2520vision-language%2520tasks.%2520Recent%2520studies%2520have%2520shown%2520that%2520aligning%2520individual%2520text%2520tokens%2520with%2520specific%2520image%2520patches%2520or%2520regions%2520enhances%2520fine-grained%2520compositional%2520understanding.%2520However%252C%2520it%2520remains%2520challenging%2520to%2520capture%2520compositional%2520semantics%2520that%2520span%2520multiple%2520image%2520regions.%2520To%2520address%2520this%2520limitation%252C%2520we%2520propose%2520PowerCLIP%252C%2520a%2520novel%2520contrastive%2520pre-training%2520framework%2520enhanced%2520by%2520powerset%2520alignment%252C%2520which%2520exhaustively%2520optimizes%2520region-to-phrase%2520alignments%2520by%2520minimizing%2520the%2520loss%2520defined%2520between%2520powersets%2520of%2520image%2520regions%2520and%2520textual%2520parse%2520trees.%2520Since%2520the%2520naive%2520powerset%2520construction%2520incurs%2520exponential%2520computational%2520cost%2520due%2520to%2520the%2520combinatorial%2520explosion%2520in%2520the%2520number%2520of%2520region%2520subsets%252C%2520we%2520introduce%2520efficient%2520non-linear%2520aggregators%2520%2528NLAs%2529%2520that%2520reduce%2520complexity%2520from%2520O%25282%255EM%2529%2520to%2520O%2528M%2529%2520with%2520respect {"title": "Implicit neural representations as a coordinate-based framework for continuous environmental field reconstruction from sparse ecological observations", "author": "Agnieszka Pregowska and Hazem M. Kalaji", "abstract": "Reconstructing continuous environmental fields from sparse and irregular observations remains a central challenge in environmental modelling and biodiversity informatics. Many ecological datasets are heterogeneous in space and time, making grid-based approaches difficult to scale or generalise across domains. Here, we evaluate implicit neural representations (INRs) as a coordinate-based modelling framework for learning continuous spatial and spatio-temporal fields directly from coordinate inputs. We analyse their behaviour across three representative modelling scenarios: species distribution reconstruction, phenological dynamics, and morphological segmentation derived from open biodiversity data. Beyond predictive performance, we examine interpolation behaviour, spatial coherence, and computational characteristics relevant for environmental modelling workflows, including scalability, resolution-independent querying, and architectural inductive bias. Results show that neural fields provide stable continuous representations with predictable computational cost, complementing classical smoothers and tree-based approaches. These findings position coordinate-based neural fields as a flexible representation layer that can be integrated into environmental modelling pipelines and exploratory analysis frameworks for large, irregularly sampled datasets.", "link": "http://arxiv.org/abs/2604.18083v1", "date": "2026-04-20", "relevancy": 2.638, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5629}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5266}, {"title": "Le ational%20cost%2C%20complementing%20classical%20smoothers%20and%20tree-based%20approaches.%20These%20findings%20position%20coordinate-based%20neural%20fields%20as%20a%20flexible%20representation%20layer%20that%20can%20be%20integrated%20into%20environmental%20modelling%20pipelines%20and%20exploratory%20analysis%20frameworks%20for%20large%2C%20irregularly%20sampled%20datasets.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18083v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DImplicit%2520neural%2520representations%2520as%2520a%2520coordinate-based%2520framework%2520for%2520continuous%2520environmental%2520field%2520reconstruction%2520from%2520sparse%2520ecological%2520observations%26entry.906535625%3DAgnieszka%2520Pregowska%2520and%2520Hazem%2520M.%2520Kalaji%26entry.1292438233%3DReconstructing%2520continuous%2520environmental%2520fields%2520from%2520sparse%2520and%2520irregular%2520observations%2520remains%2520a%2520central%2520challenge%2520in%2520environmental%2520modelling%2520and%2520biodiversity%2520informatics.%2520Many%2520ecological%2520datasets%2520are%2520heterogeneous%2520in%2520space%2520and%2520time%252C%2520making%2520grid-based%2520approaches%2520difficult%2520to%2520scale%2520or%2520generalise%2520across%2520domains.%2520Here%252C%2520we%2520evaluate%2520implicit%2520neural%2520representations%2520%2528INRs%2529%2520as%2520a%2520coordinate-based%2520modelling%2520framework%2520for%2520learning%2520continuous%2520spatial%2520and%2520spatio-temporal%2520fields%2520directly%2520from%2520coordinate%2520inputs.%2520We%2520analyse%2520their%2520behaviour%2520across%2520three%2520representative%2520modelling%2520scenarios%253A%2520species%2520distribution%2520reconstruction%252C%2520phenological%2520dynamics%252C%2520and%2520morphological%2520segmentation%2520derived%2520from%2520open%2520biodiversity%2520data.%2520Beyond%2520predictive%2520performance%252C%2520we%2520examine%2520interpolation%2520behaviour%252C%2520spatial%2520coherence%252C%2520and%2520computational%2520characteristics%2520relevant%2520for%2520environmental%2520modelling%2520workflows%252C%2520including%2520scalability%252C%2520resolution-independent%2520querying%252C%2520and%2520architectural%2520inductive%2520bias.%2520Results%2520show%2520that%2520neural%2520fields%2520provide%2520stable%2520continuous%2520representations%2520with%2520predictable%2520computational%2520cost%252C%2520complementing%2520classical%2520smoothers%2520and%2520tree-based%2520approaches.%2520These%2520findings%2520position%2520coordinate-based%2520neural%2520fields%2520as%2520a%2520flexible%2520representation%2520layer%2520that%2520can%2520be%2520integrated%2520into%2520environmental%2520modelling%2520pipelines%2520and%2520exploratory%2520analysis%2520frameworks%2520for%2520large%252C%2520irregularly%2520sampled%2520datasets.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.18083v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Implicit%20neural%20representations%20as%20a%20coordinate-based%20framework%20for%20continuous%20environmental%20field%20reconstruction%20from%20sparse%20ecological%20observations&entry.906535625=Agnieszka%20Pregowska%20and%20Hazem%20M.%20Kalaji&entry.1292438233=Reconstructing%20continuous%20environmental%20fields%20from%20sparse%20and%20irregular%20observations%20remains%20a%20central%20challenge%20in%20environmental%20modelling%20and%20biodiversity%20informatics.%20Many%20ecological%20datasets%20are%20heterogeneous%20in%20space%20and%20time%2C%20making%20grid-based%20approaches%20difficult%20to%20scale%20or%20generalise%20across%20domains.%20Here%2C%20we%20evaluate%20implicit%20neural%20representations%20%28INRs%29%20as%20a%20coordinate-based%20modelling%20framework%20for%20learning%20continuous%20spatial%20and%20spatio-temporal%20fields%20directly%20from%20coordinate%20inputs.%20We%20analyse%20their%20behaviour%20across%20three%20representative%20modelling%20scenarios%3A%20species%20distribution%20reconstruction%2C%20phenological%20dynamics%2C%20and%20morphological%20segmentation%20derived%20from%20open%20biodiversity%20data.%20Beyond%20predictive%20performance%2C%20we%20examine%20interpolation%20behaviour%2C%20spatial%20coherence%2C%20and%20computational%20characteristics%20relevant%20for%20environmental%20modelling%20workflows%2C%20including%20scalability%2C%20resolution-independent%20querying%2C%20and%20architectural%20inductive%20bias.%20Results%20show%20that%20neural%20fields%20provide%20stable%20continuous%20representations%20with%20predictable%20computational%20cost%2C%20complementing%20classical%20smoothers%20and%20tree-based%20approaches.%20These%20findings%20position%20coordinate-based%20neural%20fields%20as%20a%20flexible%20representation%20layer%20that%20can%20be%20integrated%20into%20environmental%20modelling%20pipelines%20and%20exploratory%20analysis%20frameworks%20for%20large%2C%20irregularly%20sampled%20datasets.&entry.1838667208=http%3A//arxiv.org/abs/2604.18083v1&entry.124074799=Read"},
{"title": "Attention-ResUNet for Automated Fetal Head Segmentation", "author": "Ammar Bhilwarawala and Mainak Bandyopadhyay", "abstract": "Automated fetal head segmentation in ultrasound images is critical for accurate biometric measurements in prenatal care. While existing deep learning approaches have achieved a reasonable performance, they struggle with issues like low contrast, noise, and complex anatomical boundaries which are inherent to ultrasound imaging. This paper presents Attention-ResUNet. It is a novel architecture that synergistically combines residual learning with multi-scale attention mechanisms in order to achieve enhanced fetal head segmentation. Our approach integrates attention gates at four decoder levels to focus selectively on anatomically relevant regions while suppressing the background noise, and complemented by residual connections which facilitates gradient flow and feature reuse. Extensive evaluation on the HC18 Challenge dataset where n = 200 demonstrates that Attention ResUNet achieves a superior performance with a mean Dice score of 99.30 +/- 0.14% against similar architectures. It significantly outperforms five baseline architectures including ResUNet (99.26%), Attention U-Net (98.79%), Swin U-Net (98.60%), Standard U-Net (98.58%), and U-Net++ (97.46%). Through statistical analysis we confirm highly significant improvements (p < 0.001) with effect sizes that range from 0.230 to 13.159 (Cohen's d). Using Saliency map analysis, we reveal that our architecture produces highly concentrated, anatomically consistent activation patterns, which demonstrate an enhanced interpretability which is crucial for clinical deployment. The proposed method establishes a new state of the art performance for automated fetal head segmentation whilst maintaining computational efficiency with 14.7M parameters and a 45 GFLOPs inference cost. Code repository: https://github.com/Ammar-ss", "link": "http://arxiv.org/abs/2604.18148v1", "date": "2026-04-20", "relevancy": 2.6332, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5307}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5252}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5239}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Attention-ResUNet%20for%20Automated%20Fetal%20Head%20Segmentation&body=Title%3A%20Attention-ResUNet%20for%20Automated%20Fetal%20Head%20Segmentation%0AAuthor%3A%20Ammar%20Bhilwarawala%20and%20Mainak%20Bandyopadhyay%0AAbstract%3A%20Automated%20fetal%20head%20segmentation%20in%20ultrasound%20images%20is%20critical%20for%20accurate%20biometric%20measurements%20in%20prenatal%20care.%20While%20existing%20deep%20learning%20approaches%20have%20achieved%20a%20reasonable%20performance%2C%20they%20struggle%20with%20issues%20like%20low%20contrast%2C%20noise%2C%20and%20complex%20anatomical%20boundaries%20which%20are%20inherent%20to%20ultrasound%20imaging.%20This%20paper%20presents%20Attention-ResUNet.%20It%20is%20a%20novel%20architecture%20that%20synergistically%20combines%20residual%20learning%20with%20multi-scale%20attention%20mechanisms%20in%20order%20to%20achieve%20enhanced%20fetal%20head%20segmentation.%20Our%20approach%20integrates%20attention%20gates%20at%20four%20decoder%20levels%20to%20focus%20selectively%20on%20anatomically%20relevant%20regions%20while%20suppressing%20the%20background%20noise%2C%20and%20complemented%20by%20residual%20connections%20which%20facilitates%20gradient%20flow%20and%20feature%20reuse.%20Extensive%20evaluation%20on%20the%20HC18%20Challenge%20dataset%20where%20n%20%3D%20200%20demonstrates%20that%20Attention%20ResUNet%20achieves%20a%20superior%20performance%20with%20a%20mean%20Dice%20score%20of%2099.30%20%2B/-%200.14%25%20against%20similar%20architectures.%20It%20significantly%20outperforms%20five%20baseline%20architectures%20including%20ResUNet%20%2899.26%25%29%2C%20Attention%20U-Net%20%2898.79%25%29%2C%20Swin%20U-Net%20%2898.60%25%29%2C%20Standard%20U-Net%20%2898.58%25%29%2C%20and%20U-Net%2B%2B%20%2897.46%25%29.%20Through%20statistical%20analysis%20we%20confirm%20highly%20significant%20improvements%20%28p%20%3C%200.001%29%20with%20effect%20sizes%20that%20range%20from%200.230%20to%2013.159%20%28Cohen%27s%20d%29.%20Using%20Saliency%20map%20analysis%2C%20we%20reveal%20that%20our%20architecture%20produces%20highly%20concentrated%2C%20anatomically%20consistent%20activation%20patterns%2C%20which%20demonstrate%20an%20enhanced%20interpretability%20which%20is%20crucial%20for%20clinical%20deployment.%20The%20proposed%20method%20establishes%20a%20new%20state%20of%20the%20art%20performance%20for%20automated%20fetal%20head%20segmentation%20whilst%20maintaining%20computational%20efficiency%20with%2014.7M%20parameters%20and%20a%2045%20GFLOPs%20inference%20cost.%20Code%20repository%3A%20https%3A//github.com/Ammar-ss%0ALink%3A%20http%3A//arxiv.org/abs/2604.18148v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAttention-ResUNet%2520for%2520Automated%2520Fetal%2520Head%2520Segmentation%26entry.906535625%3DAmmar%2520Bhilwarawala%2520and%2520Mainak%2520Bandyopadhyay%26entry.1292438233%3DAutomated%2520fetal%2520head%2520segmentation%2520in%2520ultrasound%2520images%2520is%2520critical%2520for%2520accurate%2520biometric%2520measurements%2520in%2520prenatal%2520care.%2520While%2520existing%2520deep%2520learning%2520approaches%2520have%2520achieved%2520a%2520reasonable%2520performance%252C%2520they%2520struggle%2520with%2520issues%2520like%2520low%2520contrast%252C%2520noise%252C%2520and%2520complex%2520anatomical%2520boundaries%2520which%2520are%2520inherent%2520to%2520ultrasound%2520imaging.%2520This%2520paper%2520 {"title": "Enhancing Continual Learning of Vision-Language Models via Dynamic Prefix Weighting", "author": "Hyeonseo Jang and Hyuk Kwon and Kibok Lee", "abstract": "We investigate recently introduced domain-class incremental learning scenarios for vision-language models (VLMs). Recent works address this challenge using parameter-efficient methods, such as prefix-tuning or adapters, which facilitate model adaptation to downstream tasks by incorporating task-specific information into input tokens through additive vectors. However, previous approaches often normalize the weights of these vectors, disregarding the fact that different input tokens require different degrees of adjustment. To overcome this issue, we propose Dynamic Prefix Weighting (DPW), a framework that dynamically assigns weights to prefixes, complemented by adapters. DPW consists of 1) a gating module that adjusts the weights of each prefix based on the importance of the corresponding input token, and 2) a weighting mechanism that derives adapter output weights as a residual of prefix-tuning weights, ensuring that adapters are utilized only when necessary. Experimental results demonstrate that our method achieves state-of-the-art performance in domain-class incremental learning scenarios for VLMs. The code is available at: https://github.com/YonseiML/dpw.", "link": "http://arxiv.org/abs/2604.18075v1", "date": "2026-04-20", "relevancy": 2.6228, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5348}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5247}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5142}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Enhancing%20Continual%20Learning%20of%20Vision-Language%20Models%20via%20Dynamic%20Prefix%20Weighting&body=Title%3A%20Enhancing%20Continual%20Learning%20of%20Vision-Language%20Models%20via%20Dynamic%20Prefix%20Weighting%0AAuthor%3A%20Hyeonseo%20Jang%20and%20Hyuk%20Kwon%20and%20Kibok%20Lee%0AAbstract%3A%20We%20investigate%20recently%20introduced%20domain-class%20incremental%20learning%20scenarios%20for%20vision-language%20models%20%28VLMs%29.%20Recent%20works%20address%20this%20challenge%20using%20parameter-efficient%20methods%2C%20such%20as%20prefix-tuning%20or%20adapters%2C%20which%20facilitate%20model%20adaptation%20to%20downstream%20tasks%20by%20incorporating%20task-specific%20information%20into%20input%20tokens%20through%20additive%20vectors.%20However%2C%20previous%20approaches%20often%20normalize%20the%20weights%20of%20these%20vectors%2C%20disregarding%20the%20fact%20that%20different%20input%20tokens%20require%20different%20degrees%20of%20adjustment.%20To%20overcome%20this%20issue%2C%20we%20propose%20Dynamic%20Prefix%20Weighting%20%28DPW%29%2C%20a%20framework%20that%20dynamically%20assigns%20weights%20to%20prefixes%2C%20complemented%20by%20adapters.%20DPW%20consists%20of%201%29%20a%20gating%20module%20that%20adjusts%20the%20weights%20of%20each%20prefix%20based%20on%20the%20importance%20of%20the%20corresponding%20input%20token%2C%20and%202%29%20a%20weighting%20mechanism%20that%20derives%20adapter%20output%20weights%20as%20a%20residual%20of%20prefix-tuning%20weights%2C%20ensuring%20that%20adapters%20are%20utilized%20only%20when%20necessary.%20Experimental%20results%20demonstrate%20that%20our%20method%20achieves%20state-of-the-art%20performance%20in%20domain-class%20incremental%20learning%20scenarios%20for%20VLMs.%20The%20code%20is%20available%20at%3A%20https%3A//github.com/YonseiML/dpw.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18075v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEnhancing%2520Continual%2520Learning%2520of%2520Vision-Language%2520Models%2520via%2520Dynamic%2520Prefix%2520Weighting%26entry.906535625%3DHyeonseo%2520Jang%2520and%2520Hyuk%2520Kwon%2520and%2520Kibok%2520Lee%26entry.1292438233%3DWe%2520investigate%2520recently%2520introduced%2520domain-class%2520incremental%2520learning%2520scenarios%2520for%2520vision-language%2520models%2520%2528VLMs%2529.%2520Recent%2520works%2520address%2520this%2520challenge%2520using%2520parameter-efficient%2520methods%252C%2520such%2520as%2520prefix-tuning%2520or%2520adapters%252C%2520which%2520facilitate%2520model%2520adaptation%2520to%2520downstream%2520tasks%2520by%2520incorporating%2520task-specific%2520information%2520into%2520input%2520tokens%2520through%2520additive%2520vectors.%2520However%252C%2520previous%2520approaches%2520often%2520normalize%2520the%2520weights%2520of%2520these%2520vectors%252C%2520disregarding%2520the%2520fact%2520that%2520different%2520input%2520tokens%2520require%2520different%2520degrees%2520of%2520adjustment.%2520To%2520overcome%2520this%2520issue%252C%2520we%2520propose%2520Dynamic%2520Prefix%2520Weighting%2520%2528DPW%2529%252C%2520a%2520framework%2520that%2520dynamically%2520assigns%2520weights%2520to%2520prefixes%252C%2520complemented%2520by%2520adapters.%2520DPW%2520consists%2520of%25201%2529%2520a%2520gating%2520module%2520that%2520adjusts%2520the%2520weights%2520of%2520each%2520prefix%2520based%2520on%2520the%2520importance%2520of%2520the%2520corresponding%2520input%2520token%252C%2520and%25202%2529%2520a%2520weighting%2520mechanism%2520that%2520derives%2520adapter%2520output%2520weights%2520as%2520a%2520residual%2520of%2520prefix-tuning%2520weights%252C%2520ensuring%2520that%2520adapters%2520are%2520utilized%2520only%2520when%2520necessary.%2520Experimental%2520results%2520demonstrate%2520that%2520our%2520method%2520achieves%2520state-of-the-art%2520performance%2520in%2520domain-class%2520incremental%2520learning%2520scenarios%2520for%2520VLMs.%2520The%2520code%2520is%2520available%2520at%253A%2520https%253A//github.com/YonseiML/dpw.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.18075v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Enhancing%20Continual%20Learning%20of%20Vision-Language%20Models%20via%20Dynamic%20Prefix%20Weighting&entry.906535625=Hyeonseo%20Jang%20and%20Hyuk%20Kwon%20and%20Kibok%20Lee&entry.1292438233=We%20investigate%20recently%20introduced%20domain-class%20incremental%20learning%20scenarios%20for%20vision-language%20models%20%28VLMs%29.%20Recent%20works%20address%20this%20challenge%20using%20parameter-efficient%20methods%2C%20such%20as%20prefix-tuning%20or%20adapters%2C%20which%20facilitate%20model%20adaptation%20to%20downstream%20tasks%20by%20incorporating%20task-specific%20information%20into%20input%20tokens%20through%20additive%20vectors.%20However%2C%20previous%20approaches%20often%20normalize%20the%20weights%20of%20these%20vectors%2C%20disregarding%20the%20fact%20that%20different%20input%20tokens%20require%20different%20degrees%20of%20adjustment.%20To%20overcome%20this%20issue%2C%20we%20propose%20Dynamic%20Prefix%20Weighting%20%28DPW%29%2C%20a%20framework%20that%20dynamically%20assigns%20weights%20to%20prefixes%2C%20complemented%20by%20adapters.%20DPW%20consists%20of%201%29%20a%20gating%20module%20that%20adjusts%20the%20weights%20of%20each%20prefix%20based%20on%20the%20importance%20of%20the%20corresponding%20input%20token%2C%20and%202%29%20a%20weighting%20mechanism%20that%20derives%20adapter%20output%20weights%20as%20a%20residual%20of%20prefix-tuning%20weights%2C%20ensuring%20that%20adapters%20are%20utilized%20only%20when%20necessary.%20Experimental%20results%20demonstrate%20that%20our%20method%20achieves%20state-of-the-art%20performance%20in%20domain-class%20incremental%20learning%20scenarios%20for%20VLMs.%20The%20code%20is%20available%20at%3A%20https%3A//github.com/YonseiML/dpw.&entry.1838667208=http%3A//arxiv.org/a {"title": "LVLMs and Humans Ground Differently in Referential Communication", "author": "Peter Zeng and Weiling Li and Amie Paige and Zhengxiang Wang and Panagiotis Kaliosis and Dimitris Samaras and Gregory Zelinsky and Susan Brennan and Owen Rambow", "abstract": "For generative AI agents to partner effectively with human users, the ability to accurately predict human intent is critical. But this ability to collaborate remains limited by a critical deficit: an inability to model common ground. We present a referential communication experiment with a factorial design involving director-matcher pairs (human-human, human-AI, AI-human, and AI-AI) that interact with multiple turns in repeated rounds to match pictures of objects not associated with any obvious lexicalized labels. We show that LVLMs cannot interactively generate and resolve referring expressions in a way that enables smooth communication, a crucial skill that underlies human language use. We release our corpus of 356 dialogues (89 pairs over 4 rounds each) along with the online pipeline for data collection and the tools for analyzing accuracy, efficiency, and lexical overlap.", "link": "http://arxiv.org/abs/2601.19792v3", "date": "2026-04-20", "relevancy": 2.6208, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5373}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5373}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4979}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LVLMs%20and%20Humans%20Ground%20Differently%20in%20Referential%20Communication&body=Title%3A%20LVLMs%20and%20Humans%20Ground%20Differently%20in%20Referential%20Communication%0AAuthor%3A%20Pe I%2520agents%2520to%2520partner%2520effectively%2520with%2520human%2520users%252C%2520the%2520ability%2520to%2520accurately%2520predict%2520human%2520intent%2520is%2520critical.%2520But%2520this%2520ability%2520to%2520collaborate%2520remains%2520limited%2520by%2520a%2520critical%2520deficit%253A%2520an%2520inability%2520to%2520model%2520common%2520ground.%2520We%2520present%2520a%2520referential%2520communication%2520experiment%2520with%2520a%2520factorial%2520design%2520involving%2520director-matcher%2520pairs%2520%2528human-human%252C%2520human-AI%252C%2520AI-human%252C%2520and%2520AI-AI%2529%2520that%2520interact%2520with%2520multiple%2520turns%2520in%2520repeated%2520rounds%2520to%2520match%2520pictures%2520of%2520objects%2520not%2520associated%2520with%2520any%2520obvious%2520lexicalized%2520labels.%2520We%2520show%2520that%2520LVLMs%2520cannot%2520interactively%2520generate%2520and%2520resolve%2520referring%2520expressions%2520in%2520a%2520way%2520that%2520enables%2520smooth%2520communication%252C%2520a%2520crucial%2520skill%2520that%2520underlies%2520human%2520language%2520use.%2520We%2520release%2520our%2520corpus%2520of%2520356%2520dialogues%2520%252889%2520pairs%2520over%25204%2520rounds%2520each%2529%2520along%2520with%2520the%2520online%2520pipeline%2520for%2520data%2520collection%2520and%2520the%2520tools%2520for%2520analyzing%2520accuracy%252C%2520efficiency%252C%2520and%2520lexical%2520overlap.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.19792v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=LVLMs%20and%20Humans%20Ground%20Differently%20in%20Referential%20Communication&entry.906535625=Peter%20Zeng%20and%20Weiling%20Li%20and%20Amie%20Paige%20and%20Zhengxiang%20Wang%20and%20Panagiotis%20Kaliosis%20and%20Dimitris%20Samaras%20and%20Gregory%20Zelinsky%20and%20Susan%20Brennan%20and%20Owen%20Rambow&entry.1292438233=For%20generative%20AI%20agents%2 {"title": "ProtoCLIP: Prototype-Aligned Latent Refinement for Robust Zero-Shot Chest X-Ray Classification", "author": "Florian Kittler and Sheethal Bhat and Andreas Maier", "abstract": "Zero-shot vision-language models (VLMs) have shown promise for chest radiograph classification, but their performance is often limited by confounding label co-occurrence, long-tail class imbalance, and transfer instability under domain shift. We propose ProtoCLIP, a refinement strategy for CLIP-style VLMs that improves zero-shot discrimination through targeted data curation and distilled anchor alignment. Specifically, we construct pathology-focused training subsets with curated negative samples to reduce co-occurrence bias. We also introduce a representation-preserving distillation objective to stabilize adaptation while maintaining semantic structure and improving discrimination of clinically relevant co-occurring pathologies. Evaluated on an unseen dataset VinDr-CXR, ProtoCLIP improves AUC by 2-10 percentage points over a strong CLIP-based baseline across multiple findings. For pneumothorax specifically, ProtoCLIP achieves a state-of-the-art AUC of 0.94. These results demonstrate that anchor-guided refinement, coupled with curated supervision and controlled adaptation, can mitigate common zero-shot transfer failures in medical VLMs without requiring large-scale retraining.", "link": "http://arxiv.org/abs/2604.18444v1", "date": "2026-04-20", "relevancy": 2.6182, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5797}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4956}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4956}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ProtoCLIP%3A%20Prototype-Aligned%20Latent%20Refinement%20for%20Robust%20Zero-Shot%20Chest%20X-Ray%20Classification&body=Title%3A%20ProtoCLIP%3A%20Prototype-Aligned%20Latent%20Refinement%20for%20Robust%20Zero-Shot%20Chest%20X-Ray%20Classification%0AAuthor%3A%20Florian%20Kittler%20and%20Sheethal%20Bhat%20and%20Andreas%20Maier%0AAbstract%3A%20Zero-shot%20vision-language%20models%20%28VLMs%29%20have%20shown%20promise%20for%20chest%20radiograph%20classification%2C%20but%20their%20performance%20is%20often%20limited%20by%20confounding%20label%20co-occurrence%2C%20long-tail%20class%20imbalance%2C%20and%20transfer%20instability%20under%20domain%20shift.%20We%20propose%20ProtoCLIP%2C%20a%20refinement%20strategy%20for%20CLIP-style%20VLMs%20that%20improves%20zero-shot%20discrimination%20through%20targeted%20data%20curation%20and%20distilled%20anchor%20alignment.%20Specifically%2C%20we%20construct%20pathology-focused%20training%20subsets%20with%20curated%20negative%20samples%20to%20reduce%20co-occurrence%20bias.%20We%20also%20introduce%20a%20representation-preserving%20distillation%20objective%20to%20stabilize%20adaptation%20while%20maintaining%20semantic%20structure%20and%20improving%20discrimination%20of%20clinically%20relevant%20co-occurring%20pathologies.%20Evaluated%20on%20an%20unseen%20dataset%20VinDr-CXR%2C%20ProtoCLIP%20improves%20AUC%20by%202-10%20percentage%20points%20over%20a%20strong%20CLIP-based%20baseline%20across%20multiple%20findings.%20For%20pneumothorax%20specifically%2C%20ProtoCLIP%20achieves%20a%20state-of-the-art%20AUC%20of%200.94.%20These%20results%20demonstrate%20that%20anchor-guided%20refinement%2C%20coupled%20with%20curated%20supervision%20and%20controlled%20adaptation%2C%20can%20mitigate%20common%20zero-shot%20transfer%20failures%20in%20medical%20VLMs%20without%20requiring%20large-scale%20retraining.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18444v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4 {"title": "Too Correct to Learn: Reinforcement Learning on Saturated Reasoning Data", "author": "Zhenwen Liang and Yujun Zhou and Sidi Lu and Xiangliang Zhang and Haitao Mi and Dong Yu", "abstract": "Reinforcement Learning (RL) enhances LLM reasoning, yet a paradox emerges as models scale: strong base models saturate standard benchmarks (e.g., MATH), yielding correct but homogeneous solutions. In such environments, the lack of failure cases causes the advantage signal in group-relative algorithms (e.g., GRPO) to vanish, driving policies into mode collapse. To address this, we propose Constrained Uniform Top-K Sampling (CUTS), a parameter-free decoding strategy enforcing structure-preserving exploration. Unlike standard sampling that follows model biases, CUTS flattens the local optimization landscape by sampling uniformly from constrained high-confidence candidates. We integrate this into Mixed-CUTS, a training framework synergizing exploitative and exploratory rollouts to amplify intra-group advantage variance. Experiments on Qwen3 models demonstrate that our approach prevents policy degeneration and significantly boosts out-of-domain generalization. Notably, Mixed-CUTS improves Pass@1 accuracy on the challenging AIME25 benchmark by up to 15.1% over standard GRPO, validating that maintaining diversity within the semantic manifold is critical for rigorous reasoning.", "link": "http://arxiv.org/abs/2604.18493v1", "date": "2026-04-20", "relevancy": 2.6064, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5286}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5286}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_ {"title": "Inference-Time Distillation: Cost-Efficient Agents Without Fine-Tuning or Manual Prompt Engineering", "author": "Vishnu Sarukkai and Asanshay Gupta and James Hong and Micha\u00ebl Gharbi and Kayvon Fatahalian", "abstract": "Deploying LLM agents at scale typically requires choosing between quality and cost. Existing cost-reduction approaches fail to preserve agility: the ability to iterate rapidly without human time bottlenecks. Prompt engineering is brittle and slows iteration, while fine-tuning requires multi-day training and commitment to fixed designs; both are impractical for iterative workflows and time-sensitive batch jobs. We demonstrate that established inference-time techniques--dynamic in-context learning and self-consistency cascades--can be leveraged to shift the cost-accuracy Pareto frontier while preserving agility. Practitioners run the teacher on a small task subset to collect demonstrations, then immediately deploy a cheaper student on the remainder. At each step, the system retrieves relevant teacher demonstrations as in-context examples. When multiple student samples agree, we proceed; when they diverge, we fall back to the teacher. This requires no prompt engineering or training. On ALFWorld, we match teacher accuracy at 2.5x lower cost (0.059 to 0.024 per episode). On AppWorld, we achieve 3.5x cost reduction while recovering 79% of teacher accuracy. Our empirical analyses provide guidance on key design choices: teacher database size, demonstration set size, retrieval strategy, and cascade thresholds. These analyses highlight inference-time levers for navigating cost-performance tradeoffs without sacrificing human development speed.", "link": "http://arxiv.org/abs/2512.02543v3", "date": "2026-04-20", "relevancy": 2.6024, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5772}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5021}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4821}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Inference-Time%20Distillation%3A%20Cost-Efficient%20Agents%20Without%20Fine-Tuning%20or%20Manual%20Prompt%20Engineering&body=Title%3A%20Inference-Time%20Distillation%3A%20Cost-Efficient%20Agents%20Without%20Fine-Tuning%20or%20Manual%20Prompt%20Engineering%0AAuthor%3A%20Vishnu%20Sarukkai%20and%20Asanshay%20Gupta%20and%20James%20Hong%20and%20Micha%C3%ABl%20Gharbi%20and%20Kayvon%20Fatahalian%0AAbstract%3A%20Deploying%20LLM%20agents%20at%20scale%20typically%20requires%20choosing%20between%20quality%20and%20cost.%20Existing%20cost-reduction%20approaches%20fail%20to%20preserve%20agility%3A%20the%20ability%20to%20iterate%20rapidly%20without%20human%20time%20bottlenecks.%20Prompt%20engineering%20is%20brittle%20and%20slows%20iteration%2C%20while%20fine-tuning%20requires%20multi-day%20training%20and%20commitment%20to%20fixed%20designs%3B%20both%20are%20impractical%20for%20iterative%20workflows%20and%20time-sensitive%20batch%20jobs.%20We%20demonstrate%20that%20established%20inference-time%20techniques--dynamic%20in-context%20learning%20and%20self-consistency%20cascades--can%20be%20leveraged%20to%20shift%20the%20cost-accuracy%20Pareto%20frontier%20while%20preserving%20agility.%20Practitioners%20run%20the%20teacher%20on%20a%20small%20task%20subset%20to%20collect%20demonstrations%2C%20then%20immediately%20deploy%20a%20cheaper%20student%20on%20the%20remainder.%20At%20each%20step%2C%20the%20system%20retrieves%20relevant%20teacher%20demonstrations%20as%20in-context%20examples.%20When%20multiple%20student%20samples%20agree%2C%20we%20proceed%3B%20when%20they%20diverge%2C%20we%20fall%20back%20to%20the%20teacher.%20This%20requires%20no%20prompt%20engineering%20or%20training.%20On%20ALFWorld%2C%20we%20match%20teacher%20accuracy%20at%202.5x%20lower%20cost%20%280.059%20to%200.024%20per%20episode%29.%20On%20AppWorld%2C%20we%20achieve%203.5x%20cost%20reduction%20while%20recovering%2079%25%20of%20teacher%20accuracy.%20Our%20empirical%20analyses%20provide%20guidance%20on%20key%20design%20choices%3A%20teacher%20database%20size%2C%20demonstration%20set%20size%2C%20retrieval%20strategy%2C%20and%20cascade%20thresholds.%20These%20analyses%20highlight%20inference-time%20levers%20for%20navigating%20cost-performance%20tradeoffs%20without%20sacrificing%20human%20development%20speed.%0ALink%3A%20http%3A//arxiv.org/abs/2512.02543v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInference-Time%2520Distillation%253A%2520Cost-Efficient%2520Agents%2520Without%2520Fine-Tuning%2520or%2520Manual%2520Prompt%2520Engineering%26entry.906535625%3DVishnu%2520Sarukkai%2520and%2520Asanshay%2520Gupta%2520and%2520James%2520Hong%2520and%2520Micha%25C3%25ABl%2520Gharbi%2520and%2520Kayvon%2520Fatahalian%26entry.1292438233%3DDeploying%2520LLM%2520agents%2520at%2520scale%2520typically%2520requires%2520choosing%2520between%2520quality%2520and%2520cost.%2520Existing%2520cost-reduction%2520approaches%2520fail%2520to%2520preserve%2520agility%253A%2520the%2520ability%2520to%2520iterate%2520rapidly%2520without%2520human%2520time%2520bottlenecks.%2520Prompt%2520engineering%2520is%2520brittle%2520and%2520slows%2520iteration%252C%2520while%2520fine-tuning%2520requires%2520multi-day%2520training%2520and%2520commitment%2520to%2520fixed%2520designs%253B%2520both%2520are%2520impractical%2520for%2520iterative%2520workflows%2520and%2520time-sensitive%2520batch%2520jobs.%2520We%2520demonstrate%2520that%2520established%2520inference-time%2520techniques--dynamic%2520in-context%2520learning%2520and%2520self-consistency%2520cascades--can%2520be%2520leveraged%2520to%2520shift%2520the%2520cost-accuracy%2520Pareto%2520frontier%252 {"title": "LeGo-Code: Can Modular Curriculum Learning Advance Complex Code Generation? Insights from Text-to-SQL", "author": "Salmane Chafik and Saad Ezzini and Ismail Berrada", "abstract": "Recently, code-oriented large language models (LLMs) have demonstrated strong capabilities in translating natural language into executable code. Text-to-SQL is a significant application of this ability, enabling non-technical users to interact with relational databases using natural language. However, state-of-the-art models continue to struggle with highly complex logic, particularly deeply nested statements involving multiple joins and conditions, as well as with real-world database schemas that are noisy or poorly structured. In this paper, we investigate whether curriculum learning can improve the performance of code-based LLMs on Text-to-SQL tasks. Employing benchmarks including Spider and BIRD, we fine-tune models under different curriculum strategies. Our experiments show that naive curriculum, simply ordering training samples by complexity in a single epoch, fails to surpass standard fine-tuning due to catastrophic forgetting. To overcome this, we propose a Modular Adapter Composition (MAC) strategy. By sequentially training tier-specific adapters on incremental complexity levels (Easy to Extra-Hard), we create a scaffolded learning environment that improves performance on complex queries. Our approach not only produces measurable performance gains on the Spider and BIRD benchmarks but also provides a flexible, \"Lego-like\" architecture, allowing models to be composed and deployed based on specific schema difficulty requirements. These findings demonstrate that structured, modular learning is a superior alternative to monolithic fine-tuning for mastering the syntax and logic of complex code generation.", "link": "http://arxiv.org/abs/2604.18254v1", "date": "2026-04-20", "relevancy": 2.5858, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.5222}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5147}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5147}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LeGo-Code%3A%20Can%20Modular%20Curriculum%20Learning%20Advance%20Complex%20Code%20Generation%3F%20Insights%20from%20Text-to-SQL&body=Title%3A%20LeGo-Code%3A%20Can%20Modular%20Curriculum%20Learning%20Advance%20Complex%20Code%20Generation%3F%20Insights%20from%20Text-to-SQL%0AAuthor%3A%20Salmane%20Chafik%20and%20Saad%20Ezzini%20and%20Ismail%20Berrada%0AAbstract%3A%20Recently%2C%20code-oriented%20large%20language%20models%20%28LLMs%29%20have%20demonstrated%20strong%20capabilities%20in%20translating%20natural%20language%20into%20executable%20code.%20Text-to-SQL%20is%20a%20significant%20application%20of%20this%20ability%2C%20enabling%20non-technical%20users%20to%20interact%20with%20relational%20databases%20using%20natural%20language.%20However%2C%20state-of-the-art%20models%20continue%20to%20struggle%20with%20highly%20complex%20logic%2C%20particularly%20deeply%20nested%20statements%20involving%20multiple%20joins%20and%20conditions%2C%20as%20well%20as%20with%20real-world%20database%20schemas%20that%20are%20noisy%20or%20poorly%20structured.%20In%20this%20paper%2C%20we%20investigate%20whether%20curriculum%20learning%20can%20improve%20the%20performance%20of%20code-based%20LLMs%20on%20Text-to-SQL%20tasks.%20Employing%20benchmarks%20including%20Spider%20and%20BIRD%2C%20we%20fine-tune%20models%20under%20different%20curriculum%20strategies.%20Our%20experiments%20show%20that%20naive%20curriculum%2C%20simply%20ordering%20training%20samples%20by%20complexity%20in%20a%20single%20epoch%2C%20fails%20to%20surpass%20standard%20fine-tuning%20due%20to%20catastrophic%20forgetting.%20To%20overcome%20this%2C%20we%20propose%20a%20Modular%20Adapter%20Composition%20%28MAC%29%20strategy.%20By%20sequentially%20training%20tier-specific%20adapters%20on%20incremental%20complexity%20levels%20%28Easy%20to%20Extra-Hard%29%2C%20we%20create%20a%20scaffolded%20learning%20environment%20that%20improves%20performance%20on%20complex%20queries.%20Our%20approach%20not%20only%20produces%20measurable%20performance%20gains%20on%20the%20Spider%20and%20BIRD%20benchmarks%20but%20also%20provides%20a%20flexible%2C%20%22Lego-like%22%20architecture%2C%20allowing%20models%20to%20be%20composed%20and%20deployed%20based%20on%20specific%20schema%20difficulty%20requirements.%20These%20findings%20demonstrate%20that%20structured%2C%20modular%20learning%20is%20a%20superior%20alternative%20to%20monolithic%20fine-tuning%20for%20mastering%20the%20syntax%20and%20logic%20of%20complex%20code%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18254v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLeGo-Code%253A%2520Can%2520Modular%2520Curriculum%2520Learning%2520Advance%2520Complex%2520Code%2520Generation%253F%2520Insights%2520from%2520Text-to-SQL%26entry.906535625%3DSalmane%2520Chafik%2520and%2520Saad%2520Ezzini%2520and%2520Ismail%2520Berrada%26entry.1292438233%3DRecently%252C%2520code-oriented%2520large%2520language%2520models%2520%2528LLMs%2529%2520have%2520demonstrated%2520strong%2520capabilities%2520in%2520translating%2520natural%2520language%2520into%2520executable%2520code.%2520Text-to-SQL%2520is%2520a%2520significant%2520application%2520of%2520this%2520ability%252C%2520enabling%2520non-technical%2520users%2520to%2520interact%2520with%2520relational%2520databases%2520using%2520natural%2520language.%2520However%252C%2520state-of-the-art%2520models%2520continue%2520to%2520struggle%2520with%2520highly%2520complex%2520logic%252C% neration.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.18254v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=LeGo-Code%3A%20Can%20Modular%20Curriculum%20Learning%20Advance%20Complex%20Code%20Generation%3F%20Insights%20from%20Text-to-SQL&entry.906535625=Salmane%20Chafik%20and%20Saad%20Ezzini%20and%20Ismail%20Berrada&entry.1292438233=Recently%2C%20code-oriented%20large%20language%20models%20%28LLMs%29%20have%20demonstrated%20strong%20capabilities%20in%20translating%20natural%20language%20into%20executable%20code.%20Text-to-SQL%20is%20a%20significant%20application%20of%20this%20ability%2C%20enabling%20non-technical%20users%20to%20interact%20with%20relational%20databases%20using%20natural%20language.%20However%2C%20state-of-the-art%20models%20continue%20to%20struggle%20with%20highly%20complex%20logic%2C%20particularly%20deeply%20nested%20statements%20involving%20multiple%20joins%20and%20conditions%2C%20as%20well%20as%20with%20real-world%20database%20schemas%20that%20are%20noisy%20or%20poorly%20structured.%20In%20this%20paper%2C%20we%20investigate%20whether%20curriculum%20learning%20can%20improve%20the%20performance%20of%20code-based%20LLMs%20on%20Text-to-SQL%20tasks.%20Employing%20benchmarks%20including%20Spider%20and%20BIRD%2C%20we%20fine-tune%20models%20under%20different%20curriculum%20strategies.%20Our%20experiments%20show%20that%20naive%20curriculum%2C%20simply%20ordering%20training%20samples%20by%20complexity%20in%20a%20single%20epoch%2C%20fails%20to%20surpass%20standard%20fine-tuning%20due%20to%20catastrophic%20forgetting.%20To%20overcome%20this%2C%20we%20propose%20a%20Modular%20Adapter%20Composition%20%28MAC%29%20strategy.%20By%20sequentially%20training%20tier-specific%20adapters%20on%20incremental%20complexity%20levels%20%28Easy%20to%20Extra-Hard%29%2C%20we%20create%20a%20scaffolded%20learning%20environment%20that%20improves%20performance%20on%20compl {"title": "NOOUGAT: Towards Unified Online and Offline Multi-Object Tracking", "author": "Benjamin Missaoui and Orcun Cetintas and Guillem Bras\u00f3 and Tim Meinhardt and Laura Leal-Taix\u00e9", "abstract": "The long-standing division between \\textit{online} and \\textit{offline} Multi-Object Tracking (MOT) has led to fragmented solutions that fail to address the flexible temporal requirements of real-world deployment scenarios. Current \\textit{online} trackers rely on frame-by-frame hand-crafted association strategies and struggle with long-term occlusions, whereas \\textit{offline} approaches can cover larger time gaps, but still rely on heuristic stitching for arbitrarily long sequences. In this paper, we introduce NOOUGAT, the first tracker designed to operate with arbitrary temporal horizons. NOOUGAT leverages a unified Graph Neural Network (GNN) framework that processes non-overlapping subclips, and fuses them through a novel Autoregressive Long-term Tracking (ALT) layer. The subclip size controls the trade-off between latency and temporal context, enabling a wide range of deployment scenarios, from frame-by-frame to batch processing. NOOUGAT achieves state-of-the-art performance across both tracking regimes, improving \\textit{online} AssA by +2.3 on DanceTrack, +9.2 on SportsMOT, and +5.0 on MOT20, with even greater gains in \\textit{offline} mode.", "link": "http://arxiv.org/abs/2509.02111v2", "date": "2026-04-20", "relevancy": 2.5755, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5215}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5165}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5073}], "mai m%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNOOUGAT%253A%2520Towards%2520Unified%2520Online%2520and%2520Offline%2520Multi-Object%2520Tracking%26entry.906535625%3DBenjamin%2520Missaoui%2520and%2520Orcun%2520Cetintas%2520and%2520Guillem%2520Bras%25C3%25B3%2520and%2520Tim%2520Meinhardt%2520and%2520Laura%2520Leal-Taix%25C3%25A9%26entry.1292438233%3DThe%2520long-standing%2520division%2520between%2520%255Ctextit%257Bonline%257D%2520and%2520%255Ctextit%257Boffline%257D%2520Multi-Object%2520Tracking%2520%2528MOT%2529%2520has%2520led%2520to%2520fragmented%2520solutions%2520that%2520fail%2520to%2520address%2520the%2520flexible%2520temporal%2520requirements%2520of%2520real-world%2520deployment%2520scenarios.%2520Current%2520%255Ctextit%257Bonline%257D%2520trackers%2520rely%2520on%2520frame-by-frame%2520hand-crafted%2520association%2520strategies%2520and%2520struggle%2520with%2520long-term%2520occlusions%252C%2520whereas%2520%255Ctextit%257Boffline%257D%2520approaches%2520can%2520cover%2520larger%2520time%2520gaps%252C%2520but%2520still%2520rely%2520on%2520heuristic%2520stitching%2520for%2520arbitrarily%2520long%2520sequences.%2520In%2520this%2520paper%252C%2520we%2520introduce%2520NOOUGAT%252C%2520the%2520first%2520tracker%2520designed%2520to%2520operate%2520with%2520arbitrary%2520temporal%2520horizons.%2520NOOUGAT%2520leverages%2520a%2520unified%2520Graph%2520Neural%2520Network%2520%2528GNN%2529%2520framework%2520that%2520processes%2520non-overlapping%2520subclips%252C%2520and%2520fuses%2520them%2520through%2520a%2520novel%2520Autoregressive%2520Long-term%2520Tracking%2520%2528ALT%2529%2520layer.%2520The%2520subclip%2520size%2520controls%2520the%2520trade-off%2520between%2520latency%2520and%2520temporal%2520context%252C%2520enabling%2520a%2520wide%2520range%2520of%2520deployment%2520scenarios%252C%2520from%2520frame-by-frame%2520to%2520batch%2520processing.%2520NOOUGAT%2520achieves%2520state {"title": "Generalizable Prompt Tuning for Audio-Language Models via Semantic Expansion", "author": "Jaehyuk Jang and Wonjun Lee and Kangwook Ko and Changick Kim", "abstract": "Prompt tuning has achieved remarkable progress in vision-language models (VLMs) and is recently being adopted for audio-language models (ALMs). However, its generalization ability in ALMs remains largely underexplored. We observe that conventional prompt tuning for ALMs also suffers from the Base-New Tradeoff, and we identify that this issue stems from the disrupted semantic structure of the embedding space. To address this issue, we propose Semantically Expanded Prompt Tuning (SEPT)-a plug-and-play framework that explicitly regularizes the prompt embedding space by incorporating semantic neighbors generated by large language models. SEPT introduces a novel semantic expansion loss with margin constraints that promote intra-class compactness and inter-class separability, thereby enhancing the semantic structure of the prompt embedding space. For comprehensive evaluation, we establish the first benchmark setup for prompt generalization in ALMs, covering both base-to-new generalization and cross-dataset transferability. Extensive experiments demonstrate that SEPT consistently improves generalization performance across multiple prompt tuning baselines, while maintaining computational cost during inference.", "link": "http://arxiv.org/abs/2601.20867v2", "date": "2026-04-20", "relevancy": 2.5727, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5212}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5212}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5012}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generalizable%20Prompt%20Tuning%20for%20Audio-Language%20Models%20via%20Semantic%20Expansion&body=Title%3A%20Generalizable%20Prompt%20Tuning%20for%20Audio-Language%20Models%20via%20Semantic%20Expansion%0AAuthor%3A%20Jaehyuk%20Jang%20and%20Wonjun%20Lee%20and%20Kangwook%20Ko%20and%20Changick%20Kim%0AAbstract%3A%20Prompt%20tuning%20has%20achieved%20remarkable%20progress%20in%20vision-language%20models%20%28VLMs%29%20and%20is%20recently%20being%20adopted%20for%20audio-language%20models%20%28ALMs%29.%20However%2C%20its%20generalization%20ability%20in%20ALMs%20remains%20largely%20underexplored.%20We%20observe%20that%20conventional%20prompt%20tuning%20for%20ALMs%20also%20suffers%20from%20the%20Base-New%20Tradeoff%2C%20and%20we%20identify%20that%20this%20issue%20stems%20from%20the%20disrupted%20semantic%20structure%20of%20the%20embedding%20space.%20To%20address%20this%20issue%2C%20we%20propose%20Semantically%20Expanded%20Prompt%20Tuning%20%28SEPT%29-a%20plug-and-play%20framework%20that%20explicitly%20regularizes%20the%20prompt%20embedding%20space%20by%20incorporating%20semantic%20neighbors%20generated%20by%20large%20language%20models.%20SEPT%20introduces%20a%20novel%20semantic%20expansion%20loss%20with%20margin%20constraints%20that%20promote%20intra-class%20compactness%20and%20inter-class%20separability%2C%20thereby%20enhancing%20the%20semantic%20structure%20of%20the%20prompt%20embedding%20space.%20For%20comprehensive%20evaluation%2C%20we%20establish%20the%20first%20benchmark%20setup%20for%20prompt%20generalization%20in%20ALMs%2C%20covering%20both%20base-to-new%20generalization%20and%20cross-dataset%20transferability.%20Extensive%20experiments%20demonstrate%20that%20SEPT%20consistently%20improves%20generalization%20performance%20across%20multiple%20prompt%20tuning%20baselines%2C%20while%20maintaining%20computational%20cost%20during%20inference.%0ALink%3A%20http%3A//arxiv.org/abs/2601.20867v2%0AForm%3A%20https%3A//docs.google.com/forms/

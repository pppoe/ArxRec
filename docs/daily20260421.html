%2520shows%2520strong%2520performance%2520in%2520predicting%2520ICD-10%2520codes%252C%2520outperforming%2520independent-lead%2520masked%2520modeling%2520and%2520alignment-based%2520baselines.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.26475v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Foundation%20Model%20for%20Cardiac%20Time%20Series%20via%20Masked%20Latent%20Attention&entry.906535625=Moritz%20Vandenhirtz%20and%20Samuel%20Ruip%C3%A9rez-Campillo%20and%20Simon%20B%C3%B6hi%20and%20Sonia%20Laguna%20and%20Irene%20Cannistraci%20and%20Andrea%20Agostini%20and%20Ece%20Ozkan%20and%20Thomas%20M.%20Sutter%20and%20Julia%20E.%20Vogt&entry.1292438233=Electrocardiograms%20%28ECGs%29%20are%20among%20the%20most%20widely%20available%20clinical%20signals%20and%20play%20a%20central%20role%20in%20cardiovascular%20diagnosis.%20While%20recent%20foundation%20models%20%28FMs%29%20have%20shown%20promise%20for%20learning%20transferable%20ECG%20representations%2C%20most%20existing%20pretraining%20approaches%20treat%20leads%20as%20independent%20channels%20and%20fail%20to%20explicitly%20leverage%20their%20strong%20structural%20redundancy.%20We%20introduce%20the%20latent%20attention%20masked%20autoencoder%20%28LAMAE%29%20FM%20that%20directly%20exploits%20this%20structure%20by%20learning%20cross-lead%20connection%20mechanisms%20during%20self-supervised%20pretraining.%20Our%20approach%20models%20higher-order%20interactions%20across%20leads%20through%20latent%20attention%2C%20enabling%20permutation-invariant%20aggregation%20and%20adaptive%20weighting%20of%20lead-specific%20representations.%20We%20provide%20empirical%20evidence%20on%20the%20Mimic-IV-ECG%20database%20that%20leveraging%20the%20cross-lead%20connection%20constitutes%20an%20effective%20form%20of%20structural%20supervision%2C%20improving%20representation%20quality%20and%20transferability.%20Our%20method%20shows%20strong%20performance%20in%20predicting%20ICD-10%20codes%2C%20outperforming%20independent-lead%20masked%20modeling%20and%20alignment-based%20baselines.&entry.1838667208=http%3A//arxiv.org/abs/2603.26475v2&entry.124074799=Read"},
{"title": "Modular Representation Compression: Adapting LLMs for Efficient and Effective Recommendations", "author": "Yunjia Xi and Menghui Zhu and Jianghao Lin and Bo Chen and Ruiming Tang and Yong Yu and Weinan Zhang", "abstract": "Recently, large language models (LLMs) have advanced recommendation systems (RSs), and recent works have begun to explore how to integrate LLMs into industrial RSs. While most approaches deploy LLMs offline to generate and pre-cache augmented representations for RSs, high-dimensional representations from LLMs introduce substantial storage and computational costs. Thus, it is crucial to compress LLM representations effectively. However, we identify a counterintuitive phenomenon during representation compression: Mid-layer Representation Advantage (MRA), where representations from middle layers of LLMs outperform those from final layers in recommendation tasks. This degraded final layer renders existing compression methods, which typically compress on the final layer, suboptimal. We interpret this based on modularity theory that LLMs develop spontaneous internal functional modularity and force the final layer to specialize in the proxy training task. Thus, we propose \\underline{M}odul\\underline{a}r \\underline{R}epresentation \\underline{C}ompression (MARC) to explicitly control the modularity of LLMs. First, Modular Adjustment explicitly introduces compression and task adaptation modules, enabling the LLM to operate strictly as a representation-learning module. Next, to ground each module to its specific task, Modular Task Decoupling uses information constraints and different network structures to decouple tasks. Extensive experiments validate that MARC addresses MRA and produces efficient representations. Notably, MARC achieved a 2.82% eCPM lift in an online A/B test within a large-scale commercial search advertising scenario.", "link": "http://arxiv.org/abs/2604.18146v1", "date": "2026-04-20", "relevancy": 2.4492, "topK": [{"title": {"title": "Towards Symmetry-sensitive Pose Estimation: A Rotation Representation for Symmetric Object Classes", "author": "Andreas Kriegler and Csaba Beleznai and Margrit Gelautz", "abstract": "Symmetric objects are common in daily life and industry, yet their inherent orientation ambiguities that impede the training of deep learning networks for pose estimation are rarely discussed in the literature. To cope with these ambiguities, existing solutions typically require the design of specific loss functions and network architectures or resort to symmetry-invariant evaluation metrics. In contrast, we focus on the numeric representation of the rotation itself, modifying trigonometric identities with the degrees of symmetry derived from the objects' shapes. We use our representation, SARR, to obtain canonic (symmetry-resolved) poses for the symmetric objects in two popular 6D pose estimation datasets, T-LESS and ITODD, where SARR is unique and continuous w.r.t. the visual appearance. This allows us to use a standard CNN for 3D orientation estimation whose performance is evaluated with the symmetry-sensitive cosine distance $\\text{AR}_{\\text{C}}$. Our networks outperform the state of the art using $\\text{AR}_{\\text{C}}$ and achieve satisfactory performance when using conventional symmetry-invariant measures. Our method does not require any 3D models but only depth, or, as part of an additional experiment, texture-less RGB/grayscale images as input. We also show that networks trained on SARR outperform the same networks trained on rotation matrices, Euler angles, quaternions, standard trigonometrics or the recently popular 6d representation -- even in inference scenarios where no prior knowledge of the objects' symmetry properties is available. Code and a visualization toolkit are available at https://github.com/akriegler/SARR .", "link": "http://arxiv.org/abs/2604.18208v1", "date": "2026-04-20", "relevancy": 2.4385, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4946}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4876}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4808}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Symmetry-sensitive%20Pose%20Estimation%3A%20A%20Rotation%20Representation%20for%20Symmetric%20Object%20Classes&body=Title%3A%20Towards%20Symmetry-sensitive%20Pose%20Estimation%3A%20A%20Rotation%20Representation%20for%20Symmetric%20Object%20Classes%0AAuthor%3A%20Andreas%20Kriegler%20and%20Csaba%20Beleznai%20and%20Margrit%20Gelautz%0AAbstract%3A%20Symmetric%20objects%20are%20common%20in%20daily%20life%20and%20industry%2C%20yet%20their%20inherent%20orientation%20ambiguities%20that%20impede%20the%20training%20of%20deep%20learning%20networks%20for%20pose%20estimation%20are%20rarely%20discussed%20in%20the%20literature.%20To%20cope%20with%20these%20ambiguities%2C%20existing%20solutions%20typically%20require%20the%20design%20of%20specific%20loss%20functions%20and%20network%20architectures%20or%20resort%20to%20symmetry-invariant%20evaluation%20metrics.%20In%20contrast%2C%20we%20focus%20on%20the%20numeric%20representation%20of%20the%20rotation%20itself%2C%20modifying%20trigonometric%20identities%20with%20the%20degrees%20of%20symmetry%20derived%20from%20the%20objects%27%20shapes.%20We%20use%20our%20representation%2C%20SARR%2C%20to%20obtain%20canonic%20%28symmetry-resolved%29%20poses%20for%20the%20symmetric%20objects%20in%20two%20popular%206D%20pose%20estimation%20datasets%2C%20T-LESS%20and%20ITODD%2C%20where%20SARR%20is%20unique%20and%20continuous%20w.r.t.%20the%20visual%20appearance.%20This%20allows%20us%20to%20use%20a%20standard%20CNN%20for%203D%20orientation%20estimation%20whose%20performance%20is%20evaluated%20with%20the%20symmetry-sensitive%20cosine%20distance%20%24%5Ctext%7BAR%7D_%7B%5Ctext%7BC%7D%7D%24.%20Our%20networks%20outperform%20the%20state%20of%20the%20art%20using%20%24%5Ctext%7BAR%7D_%7B%5Ctext%7BC%7D%7D%24%20and%20achieve%20satisfactory%20performance%20when%20using%20conventional%20symmetry-invariant%20measures.%20Our%20method%20does%20not%20require%20any%203D%20models%20but%20only%20depth%2C%20or%2C%20as%20part%20of%20an%20additional%20experiment%2C%20texture-less%20RGB/grayscale%20images%20as%20input.%20We%20also%20show%20that%20networks%20trained%20on%20SARR%20outperform%20the%20same%20networks%20trained%20on%20rotation%20matrices%2C%20Euler%20angles%2C%20quaternions%2C%20standard%20trigonometrics%20or%20the%20recently%20popular%206d%20representation%20--%20even%20in%20inference%20scenarios%20where%20no%20prior%20knowledge%20of%20the%20objects%27%20symmetry%20properties%20is%20available.%20Code%20and%20a%20visualization%20toolkit%20are%20available%20at%20https%3A//github.com/akriegler/SARR%20.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18208v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520Symmetry-sensitive%2520Pose%2520Estimation%253A%2520A%2520Rotation%2520Representation%2520for%2520Symmetric%2520Object%2520Classes%26entry.906535625%3DAndreas%2520Kriegler%2520and%2520Csaba%2520Beleznai%2520and%2520Margrit%2520Gelautz%26entry.1292438233%3DSymmetric%2520objects%2520are%2520common%2520in%2520daily%2520life%2520and%2520industry%252C%2520yet%2520their%2520inherent%2520orientation%2520ambiguities%2520that%2520impede%2520the%2520training%2520of%2520deep%2520learning%2520networks%2520for%2520pose%2520estimation%2520are%2520rarely%2520discussed%2520in%2520the%2520literature.%2520To%2520cope%2520with%2520these%2520ambiguities%252C%2520existing%2520solutions%2520typically%2520require%2520the%2520design%252 ks%20outperform%20the%20state%20of%20the%20art%20using%20%24%5Ctext%7BAR%7D_%7B%5Ctext%7BC%7D%7D%24%20and%20achieve%20satisfactory%20performance%20when%20using%20conventional%20symmetry-invariant%20measures.%20Our%20method%20does%20not%20require%20any%203D%20models%20but%20only%20depth%2C%20or%2C%20as%20part%20of%20an%20additional%20experiment%2C%20texture-less%20RGB/grayscale%20images%20as%20input.%20We%20also%20show%20that%20networks%20trained%20on%20SARR%20outperform%20the%20same%20networks%20trained%20on%20rotation%20matrices%2C%20Euler%20angles%2C%20quaternions%2C%20standard%20trigonometrics%20or%20the%20recently%20popular%206d%20representation%20--%20even%20in%20inference%20scenarios%20where%20no%20prior%20knowledge%20of%20the%20objects%27%20symmetry%20properties%20is%20available.%20Code%20and%20a%20visualization%20toolkit%20are%20available%20at%20https%3A//github.com/akriegler/SARR%20.&entry.1838667208=http%3A//arxiv.org/abs/2604.18208v1&entry.124074799=Read"},
{"title": "SMART: Self-Generating and Self-Validating Multi-Dimensional Assessment for LLMs' Mathematical Problem Solving", "author": "Yujie Hou and Mei Wang and Yaoyao Zhong and Ting Zhang and Xuetao Ma and Hua Huang", "abstract": "Large Language Models (LLMs) have achieved remarkable performance across a wide range of mathematical benchmarks. However, concerns remain as to whether these successes reflect genuine reasoning or superficial pattern recognition. Existing evaluation methods, which typically focus either on the final answer or on the intermediate reasoning steps, reduce mathematical reasoning to a shallow input-output mapping, overlooking its inherently multi-stage and multi-dimensional cognitive nature. Inspired by Polya's problem-solving theory, we propose SMART, a benchmark that decomposes mathematical problem-solving into four cognitive dimensions: Semantic Understanding, Mathematical Reasoning, Arithmetic Computation, and Reflection & Refinement, and introduces dimension-specific tasks to measure the corresponding cognitive processes of LLMs. We apply SMART to 22 state-of-the-art open- and closed-source LLMs and uncover substantial discrepancies in their capabilities across dimensions. Our findings reveal genuine weaknesses in current models and motivate a new metric, the All-Pass Score, designed to better capture true problem-solving capability.", "link": "http://arxiv.org/abs/2505.16646v5", "date": "2026-04-20", "relevancy": 2.4357, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4917}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4917}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4779}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SMART%3A%20Self-Generating%20and%20Self-Validating%20Multi-Dimensional%20Assessment%20for%20LLMs%27%20Mathematical%20Problem%20Solving&body=Title%3A%20SMART%3A%20Self-Generating%20and%20Self-Validating%20Multi-Dimensional%20Assessment%20for%20LLMs%27%20Mathematical%20Problem%20Solving%0AAuthor%3A%20Yujie%20Hou%20and%20Mei%20Wang%20and%20Yaoyao%20Zhong%20and%20Ting%20Zhang%20and%20Xuetao%20Ma%20and%20Hua%20Huang%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20have%20achieved%20remarkable%20performance%20across%20a%20wide%20range%20of%20mathematical%20benchmarks.%20However%2C%20concerns%20remain%20as%20to%20whether%20these%20successes%20reflect%20genuine%20reasoning%20or%20superficial%20pattern%20recognition.%20Existing%20evaluation%20methods%2C%20which%20typically%20focus%20either%20on%20the%20final%20answer%20or%20on%20the%20intermediate%20reasoning%20steps%2C%20reduce%20mathematical%20reasoning%20to%20a%20shallow%20input-output%20mapping%2C%20overlooking%20its%20inherently%20multi-stage%20and%20multi-dimensional%20cognitive%20nature.%20Inspired%20by%20Polya%27s%20problem-solving%20theory%2C%20we%20propose%20SMART%2C%20a%20benchmark%20that%20decomposes%20mathematical%20problem-solving%20into%20four%20cognitive%20dimensions%3A%20Semantic%20Understanding%2C%20Mathematical%20Reasoning%2C%20Arithmetic%20Computation%2C%20and%20Reflection%20%26%20Refinement%2C%20and%20introduces%20dimension-specific%20tasks%20to%20measure%20the%20corresponding%20cognitive%20processes%20of%20LLMs.%20We%20apply%20SMART%20to%2022%20state-of-the-art%20open-%20and%20closed-source%20LLMs%20and%20uncover%20substantial%20discrepancies%20in%20their%20capabilities%20across%20dimensions.%20Our%20findings%20reveal%20genuine%20weaknesses%20in%20current%20models%20and%20motivate%20a%20new%20metric%2C%20the%20All-Pass%20Score%2C%20designed%20to%20better%20capture%20true%20problem-solving%20capability.%0ALink%3A%20http%3A//arxiv.org/abs/2505.16646v5%0AForm%3A%20https%3A {"title": "Video Panels for Long Video Understanding", "author": "Lars Doorenbos and Federico Spurio and Juergen Gall", "abstract": "Recent Video-Language Models (VLMs) achieve promising results on long-video understanding, but their performance still lags behind that achieved on tasks involving images or short videos. This has led to great interest in improving the long context modeling of VLMs by introducing novel modules and additional complexity. In this paper, we take a different approach: rather than fine-tuning VLMs with the limited data available, we attempt to maximize the performance of existing models. To this end, we propose a novel visual prompting strategy specifically designed for long-video understanding. By combining multiple frames as panels into one image, we effectively trade off spatial details for temporal resolution. Our approach is training-free, parameter-free, and model-agnostic, and can be seamlessly integrated into existing VLMs. Extensive experiments on five established benchmarks across a wide range of model architectures, sizes, and context windows confirm the consistency of our approach. For the TimeScope (Long) dataset, which has the longest videos, the accuracy for video question answering is improved by up to 19.4%. Overall, our method raises the bar for long video understanding models. The code is available at https://fedespu.github.io/Video-Panels.", "link": "http://arxiv.org/abs/2509.23724v2", "date": "2026-04-20", "relevancy": 2.4324, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6186}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6186}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5556}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Video%20Panels%20for%20Long%20Video%20Understanding&body=Title%3A%20Video%20Panels%20for%20Long%20Video%20Understanding%0AAuthor%3A%20Lars%20Doorenbos%20and%20Federico%20Spurio%20and%20Juergen%20Gall%0AAbstract%3A%20Recent%20Video-Language%20Models%20%28VLMs%29%20achieve%20promising%20results%20on%20long-video%20understanding%2C%20but%20their%20performance%20still%20lags%20behind%20that%20achieved%20on%20tasks%20involving%20images%20or%20short%20videos.%20This%20has%20led%20to%20great%20interest%20in%20improving%20the%20long%20context%20modeling%20of%20VLMs%20by%20introducing%20novel%20modules%20and%20additional%20complexity.%20In%20this%20paper%2C%20we%20take%20a%20different%20approach%3A%20rather%20than%20fine-tuning%20VLMs%20with%20the%20limited%20data%20available%2C%20we%20attempt%20to%20maximize%20the%20performance%20of%20existing%20models.%20To%20this%20end%2C%20we%20propose%20a%20novel%20visual%20prompting%20strategy%20specifically%20designed%20for%20long-video%20understanding.%20By%20combining%20multiple%20frames%20as%20panels%20into%20one%20image%2C%20we%20effectively%20trade%20off%20spatial%20details%20for%20temporal%20resolution.%20Our%20approach%20is%20training-free%2C%20parameter-free%2C%20and%20model-agnostic%2C%20and%20can%20be%20seamlessly%20integrated%20into%20existing%20VLMs.%20Extensive%20experiments%20on%20five%20established%20benchmarks%20across%20a%20wide%20range%20of%20model%20architectures%2C%20sizes%2C%20and%20context%20windows%20confirm%20the%20consistency%20of%20our%20approach.%20For%20the%20TimeScope%20%28Long%29%20dataset%2C%20which%20has%20the%20longest%20videos%2C%20the%20accuracy%20for%20video%20question%20answering%20is%20improved%20by%20up%20to%2019.4%25.%20Overall%2C%20our%20method%20raises%20the%20bar%20for%20long%20video%20understanding%20models.%20The%20code%20is%20available%20at%20https%3A//fedespu.github.io/Video-Panels.%0ALink%3A%20http%3A//arxiv.org/abs/2509.23724v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVideo%2520Panels%2520for%2520Long%2520Video%2520Understanding%26entry.906535625%3DLars%2520Doorenbos%2520and%2520Federico%2520Spurio%2520and%2520Juergen%2520Gall%26entry.1292438233%3DRecent%2520Video-Language%2520Models%2520%2528VLMs%2529%2520achieve%2520promising%2520results%2520on%2520long-video%2520understanding%252C%2520but%2520their%2520performance%2520still%2520lags%2520behind%2520that%2520achieved%2520on%2520tasks%2520involving%2520images%2520or%2520short%2520videos.%2520This%2520has%2520led%2520to%2520great%2520interest%2520in%2520improving%2520the%2520long%2520context%2520modeling%2520of%2520VLMs%2520by%2520introducing%2520novel%2520modules%2520and%2520additional%2520complexity.%2520In%2520this%2520paper%252C%2520we%2520take%2520a%2520different%2520approach%253A%2520rather%2520than%2520fine-tuning%2520VLMs%2520with%2520the%2520limited%2520data%2520available%252C%2520we%2520attempt%2520to%2520maximize%2520the%2520performance%2520of%2520existing%2520models.%2520To%2520this%2520end%252C%2520we%2520propose%2520a%2520novel%2520visual%2520prompting%2520strategy%2520specifically%2520designed%2520for%2520long-video%2520understanding.%2520By%2520combining%2520multiple%2520frames%2520as%2520panels%2520into%2520one%2520image%252C%2520we%2520effectively%2520trade%2520off%2520spatial%2520details%2520for%2520temporal%2520resolution.%2520Our%2520approach%2520is%2520training-free%252C%2520parameter-free%252C%2520and%2520model-agnostic%252C%2520and%2520can%2520be%2520seamlessly%2520integrated%2520into%2520existing%2520VLMs.%2520Extensive%2520experiments%2520on%2520five%2520established%2520benchmarks%2520across%2520a%2520wide%2520range%2520of%2520model%2520architectures%252C%2520sizes%252C%2520and%2520context%2520windows%2520confirm%2520the%2520consistency%2520of%2520our%2520approach.%2520For%2520the%2520TimeScope%2520%2528Long%2529 {"title": "Plausibility as Commonsense Reasoning: Humans Succeed, Large Language Models Do not", "author": "Sercan Karaka\u015f", "abstract": "Large language models achieve strong performance on many language tasks, yet it remains unclear whether they integrate world knowledge with syntactic structure in a human-like, structure-sensitive way during ambiguity resolution. We test this question in Turkish prenominal relative-clause attachment ambiguities, where the same surface string permits high attachment (HA) or low attachment (LA). We construct ambiguous items that keep the syntactic configuration fixed and ensure both parses remain pragmatically possible, while graded event plausibility selectively favors High Attachment vs.\\ Low Attachment. The contrasts are validated with independent norming ratings. In a speeded forced-choice comprehension experiment, humans show a large, correctly directed plausibility effect. We then evaluate Turkish and multilingual LLMs in a parallel preference-based setup that compares matched HA/LA continuations via mean per-token log-probability. Across models, plausibility-driven shifts are weak, unstable, or reversed. The results suggest that, in the tested models, plausibility information does not guide attachment preferences as reliably as it does in human judgments, and they highlight Turkish RC attachment as a useful cross-linguistic diagnostic beyond broad benchmarks.", "link": "http://arxiv.org/abs/2604.04825v2", "date": "2026-04-20", "relevancy": 2.4296, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5025}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5025}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4528}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Plausibility%20as%20Commonsense%20Reasoning%3A%20Humans%20Succeed%2C%20Large%20Language%20Models%20Do%20not&body=Title%3A%20Plausibility%20as%20Commonsense%20Reasoning%3A%20Humans%20Succeed%2C%20Large%20Language%20Models%20Do%20not%0AAuthor%3A%20Sercan%20Karaka%C5%9F%0AAbstract%3A%20Large%20language%20models%20achieve%20strong%20performance%20on%20many%20language%20tasks%2C%20yet%20it%20remains%20unclear%20whether%20they%20integrate%20world%20knowledge%20with%20syntactic%20structure%20in%20a%20human-like%2C%20structure-sensitive%20way%20during%20ambiguity%20resolution.%20We%20test%20this%20question%20in%20Turkish%20prenominal%20relative-clause%20attachment%20ambiguities%2C%20where%20the%20same%20surface%20string%20permits%20high%20attachment%20%28HA%29%20or%20low%20attachment%20%28LA%29.%20We%20construct%20ambiguous%20items%20that%20keep%20the%20syntactic%20configuration%20fixed%20and%20ensure%20both%20parses%20remain%20pragmatically%20possible%2C%20while%20graded%20event%20plausibility%20selectively%20favors%20High%20Attachment%20vs.%5C%20Low%20Attachment.%20The%20contrasts%20are%20validated%20with%20independent%20norming%20ratings.%20In%20a%20speeded%20forced-choice%20comprehension%20experiment%2C%20humans%20show%20a%20large%2C%20correctly%20directed%20plausibility%20effect.%20We%20then%20evaluate%20Turkish%20and%20multilingual%20LLMs%20in%20a%20parallel%20preference-based%20setup%20that%20compares%20matched%20HA/LA%20continuations%20via%20mean%20per-token%20log-probability.%20Across%20models%2C%20plausibility-driven%20shifts%20are%20weak%2C%20unstable%2C%20or%20reversed.%20The%20results%20suggest%20that%2C%20in%20the%20tested%20models%2C%20plausibility%20information%20does%20not%20guide%20attachment%20preferences%20as%20reliably%20as%20it%20does%20in%20human%20judgments%2C%20and%20they%20highlight%20Turkish%20RC%20attachment%20as%20a%20useful%20cross-linguistic%20diagnostic%20beyond%20broad%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04825v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPlausibility%2520as%2520Commonsense%2520Reasoning%253A%2520Humans%2520Succeed%252C%2520Large%2520Language%2520Models%2520Do%2520not%26entry.906535625%3DSercan%2520Karaka%25C5%259F%26entry.1292438233%3DLarge%2520language%2520models%2520achieve%2520strong%2520performance%2520on%2520many%2520language%2520tasks%252C%2520yet%2520it%2520remains%2520unclear%2520whether%2520they%2520integrate%2520world%2520knowledge%2520with%2520syntactic%2520structure%2520in%2520a%2520human-like%252C%2520structure-sensitive%2520way%2520during%2520ambiguity%2520resolution.%2520We%2520test%2520this%2520question%2520in%2520Turkish%2520prenominal%2520relative-clause%2520attachment%2520ambiguities%252C%2520where%2520the%2520same%2520surface%2520string%2520permits%2520high%2520attachment%2520%2528HA%2529%2520or%2520low%2520attachment%2520%2528LA%2529.%2520We%2520construct%2520ambiguous%2520items%2520that%2520keep%2520the%2520syntactic%2520configuration%2520fixed%2520and%2520ensure%2520both%2520parses%2520remain%2520pragmatically%2520possible%252C%2520while%2520graded%2520event%2520plausibility%2520selectively%2520favors%2520High%2520Attachment%2520vs.%255C%2520Low%2520Attachment.%2520The%2520contrasts%2520are%2520validated%2520with%2520independent%2520norming%2520ratings.%2520In%2520a%2520speeded%2520forced-choice%2520comprehension%2520experiment%252C%2520humans%2520show%2520a%2520large%252C%2520correctly%2520directed%2520plausibility%2520effect.%2520We%2520then%2520evaluate%2520Turkish%2520and%2520multilingual%2520LLMs%2520in%2520a%2520parallel%2520preference-based%2520setup%2520that%2520compares%2520matched%2520HA/LA%2520continuations%2520via%2520mean%2520per-token%2520log-probability.%2520Across%2520models%252C%2520plausibility-driven%2520shifts%2520are%2520weak%252C%2520unstable%252C%2520or%2520reversed.%2520The%2520results%2520suggest%2520that%252C%2520in%2520the%2520tested%2520models%252C%2520plausibility%2520information%2520does%2520not%2520guide%2520attachment%2520preferences%2520as%2520reliably%2520as%2520it%2520does%2520in%2520human%2520judgments%252C%2520and%2520they%2520highlight%2520Turkish%2520RC%2520attachment%2520as%2520a%2520useful%2520cross-linguistic%2520diagnostic%2520beyond%2520broad%2520benchmarks.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.04825v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Plausibility%20as%20Commonsense%20Reasoning%3A%20Humans%20Succeed%2C%20Large%20Language%20Models%20Do%20not&entry.906535625=Sercan%20Karaka%C5%9F&entry.1292438233=Large%20language%20models%20achieve%20strong%20performance%20on%20many%20language%20tasks%2C%20yet%20it%20remains%20unclear%20whether%20they%20integrate%20world%20knowledge%20with%20syntactic%20structure%20in%20a%20human-like%2C%20structure-sensitive%20way%20during%20ambiguity%20resolution.%20We%20test%20this%20question%20in%20Turkish%20prenominal%20relative-clause%20attachment%20ambiguities%2C%20where%20the%20same%20surface%20string%20permits%20high%20attachment%20%28HA%29%20or%20low%20attachment%20%28LA%29.%20We%20construct%20ambiguous%20items%20that%20keep%20the%20syntactic%20configuration%20fixed%20and%20ensure%20both%20parses%20remain%20pragmatically%20possible%2C%20while%20graded%20event%20plausibility%20selectively%20favors%20High%20Attachment%20vs.%5C%20Low%20Attachment.%20The%20contrasts%20are%20validated%20with%20independent%20norming%20ratings.%20In%20a%20speeded%20forced-choice%20comprehension%20experiment%2C%20humans%20show%20a%20large%2C%20correctly%20directed%20plausibility%20effect.%20We%20then%20evaluate%20Turkish%20and%20multilingual%20LLMs%20in%20a%20parallel%20preference-based%20setup%20that%20compares%20matched%20HA/LA%20continuations%20via%20mean%20per-token%20log-probability.%20Across%20models%2C%20plausibility-driven%20shifts%20are%20weak%2C%20unstable%2C%20or%20reversed.%20The%20results%20suggest%20that%2C%20in%20the%20tested%20models%2C%20plausibility%20information%20does%20not%20guide%20attachment%20preferences%20as%20reliably%20as%20it%20does%20in%20human%20judgments%2C%20and%20they%20highlight%20Turkish%20RC%20attachment%20as%20a%20useful%20cross-linguistic%20diagnostic%20beyond%20broad%20benchmarks.&entry.1838667208=http%3A//arxiv.org/abs/2604.04825v2&entry.124074799=Read"},
{"title": "Real-Time Structural Detection for Indoor Navigation from 3D LiDAR Using Bird's-Eye-View Images", "author": "Guanliang Li and Pedro Espinosa-Angulo and David Perez-Saura and Santiago Tapia-Fernandez", "abstract": "Efficient structural perception is essential for mapping and autonomous navigation on resource-constrained robots. Existing 3D methods are computationally prohibitive, while traditional 2D geometric approaches lack robustness. This paper presents a lightweight, real-time framework that projects 3D LiDAR data into 2D Bird's-Eye-View (BEV) images to enable efficient detection of structural elements relevant to mapping and navigation. Within this representation, we systematically evaluate several feature extraction strategies, including classical geometric techniques (Hough Transform, RANSAC, and LSD) and a deep learning detector based on YOLO-OBB. The resulting detections are integrated through a spatiotemporal fusion module that improves stability and robustness across consecutive frames. Experiments conducted on a standard mobile robotic platform highlight clear performance trade-offs. Classical methods such as Hough and LSD provide fast responses but exhibit strong sensitivity to noise, with LSD producing excessive segment fragmentation that leads to system congestion. RANSAC offers improved robustness but fails to meet real-time constraints. In contrast, the YOLO-OBB-based approach achieves the best balance between robustness and computational efficiency, maintaining an end-to-end latency (satisfying 10 Hz operation) while effectively filtering cluttered observations in a low-power single-board computer (SBC) without using GPU acceleration. The main contribution of this work is a computationally efficient BEV-based perception pipeline enabling reliable real-time structural detection from 3D LiDAR on resource-constrained robotic platforms that cannot rely on GPU-intensive processing. The source code and pre-trained models are publicly available t%20improves%20stability%20and%20robustness%20across%20consecutive%20frames.%20Experiments%20conducted%20on%20a%20standard%20mobile%20robotic%20platform%20highlight%20clear%20performance%20trade-offs.%20Classical%20methods%20such%20as%20Hough%20and%20LSD%20provide%20fast%20responses%20but%20exhibit%20strong%20sensitivity%20to%20noise%2C%20with%20LSD%20producing%20excessive%20segment%20fragmentation%20that%20leads%20to%20system%20congestion.%20RANSAC%20offers%20improved%20robustness%20but%20fails%20to%20meet%20real-time%20constraints.%20In%20contrast%2C%20the%20YOLO-OBB-based%20approach%20achieves%20the%20best%20balance%20between%20robustness%20and%20computational%20efficiency%2C%20maintaining%20an%20end-to-end%20latency%20%28satisfying%2010%20Hz%20operation%29%20while%20effectively%20filtering%20cluttered%20observations%20in%20a%20low-power%20single-board%20computer%20%28SBC%29%20without%20using%20GPU%20acceleration.%20The%20main%20contribution%20of%20this%20work%20is%20a%20computationally%20efficient%20BEV-based%20perception%20pipeline%20enabling%20reliable%20real-time%20structural%20detection%20from%203D%20LiDAR%20on%20resource-constrained%20robotic%20platforms%20that%20cannot%20rely%20on%20GPU-intensive%20processing.%20The%20source%20code%20and%20pre-trained%20models%20are%20publicly%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19830v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReal-Time%2520Structural%2520Detection%2520for%2520Indoor%2520Navigation%2520from%25203D%2520LiDAR%2520Using%2520Bird%2527s-Eye-View%2520Images%26entry.906535625%3DGuanliang%2520Li%2520and%2520Pedro%2520Espinosa-Angulo%2520and%2520David%2520Perez-Saura%2520and%2520Santiago%2520Tapia-Fernandez%26entry.1292438233%3DEfficient%2520structural%2520perception%2520is%2520essential%2520for%2520mapping%2520and%2520autonomous%2520navigation%2520on%2520resource-constrained%2520robots.%2520Existing%25203 {"title": "CanonSLR: Canonical-View Guided Multi-View Continuous Sign Language Recognition", "author": "Xu Wang and Shengeng Tang and Wan Jiang and Yaxiong Wang and Lechao Cheng and Richang Hong", "abstract": "Continuous Sign Language Recognition (CSLR) has achieved remarkable progress in recent years; however, most existing methods are developed under single-view settings and thus remain insufficiently robust to viewpoint variations in real-world scenarios. To address this limitation, we propose CanonSLR, a canonical-view guided framework for multi-view CSLR. Specifically, we introduce a frontal-view-anchored teacher-student learning strategy, in which a teacher network trained on frontal-view data provides canonical temporal supervision for a student network trained on all viewpoints. To further reduce cross-view semantic discrepancy, we propose Sequence-Level Soft-Target Distillation, which transfers structured temporal knowledge from the frontal view to non-frontal samples, thereby alleviating gloss boundary ambiguity and category confusion caused by occlusion and projection variation. In addition, we introduce Temporal Motion Relational Enhancement to explicitly model motion-aware temporal relations in high-level visual features, strengthening stable dynamic representations while suppressing viewpoint-sensitive appearance disturbances. To support multi-view CSLR research, we further develop a universal multi-view sign language data construction pipeline that transforms original single-view RGB videos into semantically consistent, temporally coherent, and viewpoint-controllable multi-view sign language videos. Based on this pipeline, we extend PHOENIX-2014T and CSL-Daily into two seven-view benchmarks, namely PT14-MV and CSL-MV, providing a new experimental foundation for multi-view CSLR. Extensive experiments on PT14-MV and CSL-MV demonstrate that CanonSLR consistently outperforms existing approaches under multi-view settings and exhibits stronger robustness, especially on challenging non-frontal views.", "link": "http://arxiv.org/abs/2604.18184v1", "date": "2026-04-20", "relevancy": 2.4119, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6042}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6042}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5967}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CanonSLR%3A%20Canonical-View%20Guided%20Multi-View%20Continuous%20Sign%20Language%20Recognition&body=Title%3A%20CanonSLR%3A%20Canonical-View%20Guided%20Multi-View%20Continuous%20Sign%20Language%20Recognition%0AAuthor%3A%20Xu%20Wang%20and%20Shengeng%20Tang%20and%20Wan%20Jiang%20and%20Yaxiong%20Wang%20and%20Lechao%20Cheng%20and%20Richang%20Hong%0AAbstract%3A%20Continuous%20Sign%20Language%20Recognition%20%28CSLR%29%20has%20achieved%20remarkable%20progress%20in%20recent%20years%3B%20however%2C%20most%20existing%20methods%20are%20developed%20under%20single-view%20settings%20and%20thus%20remain%20insufficiently%20robust%20to%20viewpoint%20variations%20in%20real-world%20scenarios.%20To%20address%20this%20limitation%2C%20we%20propose%20CanonSLR%2C%20a%20canonical-view%20guided%20framework%20for%20multi-view%20CSLR.%20Specifically%2C%20we%20introduce%20a%20frontal-view-anchored%20teacher-student%20learning%20strategy%2C%20in%20which%20a%20teacher%20network%20trained%20on%20frontal-view%20data%20provides%20canonical%20temporal%20supervision%20for%20a%20student%20network%20trained%20on%20all%20viewpoints.%20To%20further%20reduce%20cross-view%20semantic%20discrepancy%2C%20we%20propose%20Sequence-Level%20Soft-Target%20Distillation%2C%20which%20transfers%20structured%20temporal%20knowledge%20from%20the%20frontal%20view%20to%20non-frontal%20samples%2C%20thereby%20alleviating%20gloss%20boundary%20ambiguity%20and%20category%20confusion%20caused%20by%20occlusion%20and%20projection%20variation.%20In%20addition%2C%20we%20introduce%20Temporal%20Motion%20Relational%20Enhancement%20to%20explicitly%20model%20motion-aware%20temporal%20relations%20in%20high-level%20visual%20features%2C%20strengthening%20stable%20dynamic%20representations%20while%20suppressing%20viewpoint-sensitive%20appearance%20disturbances.%20To%20support%20multi-view%20CSLR%20research%2C%20we%20further%20develop%20a%20universal%20multi-view%20sign%20language%20data%20construction%20pipeline%20that%20transforms%20original%20single-view%20RGB%20videos%20into%20semantically%20consistent%2C%20temporally%20coherent%2C%20and%20viewpoint-controllable%20multi-view%20sign%20language%20videos.%20Based%20on%20this%20pipeline%2C%20we%20extend%20PHOENIX-2014T%20and%20CSL-Daily%20into%20two%20seven-view%20benchmarks%2C%20namely%20PT14-MV%20and%20CSL-MV%2C%20providing%20a%20new%20experimental%20foundation%20for%20multi-view%20CSLR.%20Extensive%20experiments%20on%20PT14-MV%20and%20CSL-MV%20demonstrate%20that%20CanonSLR%20consistently%20outperforms%20existing%20approaches%20under%20multi-view%20settings%20and%20exhibits%20stronger%20robustness%2C%20especially%20on%20challenging%20non-frontal%20views.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18184v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCanonSLR%253A%2520Canonical-View%2520Guided%2520Multi-View%2520Continuous%2520Sign%2520Language%2520Recognition%26entry.906535625%3DXu%2520Wang%2520and%2520Shengeng%2520Tang%2520and%2520Wan%2520Jiang%2520and%2520Yaxiong%2520Wang%2520and%2520Lechao%2520Cheng%2520and%2520Richang%2520Hong%26entry.1292438233%3DContinuous%2520Sign%2520Language%2520Recognition%2520%2528CSLR%2529%2520has%2520achieved%2520remarkable%2520progress%2520in%2520recent%2520y {"title": "Denoise and Align: Diffusion-Driven Foreground Knowledge Prompting for Open-Vocabulary Temporal Action Detection", "author": "Sa Zhu and Wanqian Zhang and Lin Wang and Jinchao Zhang and Cong Wang and Bo Li", "abstract": "Open-Vocabulary Temporal Action Detection (OV-TAD) aims to localize and classify action segments of unseen categories in untrimmed videos, where effective alignment between action semantics and video representations is critical for accurate detection. However, existing methods struggle to mitigate the semantic imbalance between concise, abstract action labels and rich, complex video contents, inevitably introducing semantic noise and misleading cross-modal alignment. To address this challenge, we propose DFAlign, the first framework that leverages diffusion-based denoising to generate foreground knowledge for the guidance of action-video alignment. Following the 'conditioning, denoising and aligning' manner, we first introduce the Semantic-Unify Conditioning (SUC) module, which unifies action-shared and action-specific semantics as conditions for diffusion denoising. Then, the Background-Suppress Denoising (BSD) module generates foreground knowledge by progressively removing background redundancy from videos through denoising process. This foreground knowledge serves as effective intermediate semantic anchor between video and text representations, mitigating the semantic gap and enhancing the discriminability of action-relevant segments. Furthermore, we introduce the Foreground-Prompt Alignment (FPA) module to inject extracted foreground knowledge as prompt tokens into text representations, guiding model's attention towards action-relevant segments and enabling precise cross-modal alignment. Extensive experiments demonstrate that our method achieves state-of-the-art performance on two OV-TAD benchmarks. The code repository is provided as follows: https://anonymous.4open.science/r/Code-2114/.", "link": "http://arxiv.org/abs/2604.18313v1", antic-Unify%20Conditioning%20%28SUC%29%20module%2C%20which%20unifies%20action-shared%20and%20action-specific%20semantics%20as%20conditions%20for%20diffusion%20denoising.%20Then%2C%20the%20Background-Suppress%20Denoising%20%28BSD%29%20module%20generates%20foreground%20knowledge%20by%20progressively%20removing%20background%20redundancy%20from%20videos%20through%20denoising%20process.%20This%20foreground%20knowledge%20serves%20as%20effective%20intermediate%20semantic%20anchor%20between%20video%20and%20text%20representations%2C%20mitigating%20the%20semantic%20gap%20and%20enhancing%20the%20discriminability%20of%20action-relevant%20segments.%20Furthermore%2C%20we%20introduce%20the%20Foreground-Prompt%20Alignment%20%28FPA%29%20module%20to%20inject%20extracted%20foreground%20knowledge%20as%20prompt%20tokens%20into%20text%20representations%2C%20guiding%20model%27s%20attention%20towards%20action-relevant%20segments%20and%20enabling%20precise%20cross-modal%20alignment.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20achieves%20state-of-the-art%20performance%20on%20two%20OV-TAD%20benchmarks.%20The%20code%20repository%20is%20provided%20as%20follows%3A%20https%3A//anonymous.4open.science/r/Code-2114/.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18313v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDenoise%2520and%2520Align%253A%2520Diffusion-Driven%2520Foreground%2520Knowledge%2520Prompting%2520for%2520Open-Vocabulary%2520Temporal%2520Action%2520Detection%26entry.906535625%3DSa%2520Zhu%2520and%2520Wanqian%2520Zhang%2520and%2520Lin%2520Wang%2520and%2520Jinchao%2520Zhang%2520and%2520Cong%2520Wang%2520and%2520Bo%2520Li%26entry.1292438233%3DOpen-Vocabulary%2520Temporal%2520Action%2520Detection%2520%2528OV-TAD%2529%2520aims%2520to%2520localize%2520and%2520classify%2520action%2520segments%2520of%2520unseen%2520categories%2520in%2520untrimmed%2520videos%252C%2520where%2520effective%2520a {"title": "DSA-CycleGAN: A Domain Shift Aware CycleGAN for Robust Multi-Stain Glomeruli Segmentation", "author": "Zeeshan Nisar and Friedrich Feuerhake and Thomas Lampert", "abstract": "A key challenge in segmentation in digital histopathology is inter- and intra-stain variations as it reduces model performance. Labelling each stain is expensive and time-consuming so methods using stain transfer via CycleGAN, have been developed for training multi-stain segmentation models using labels from a single stain. Nevertheless, CycleGAN tends to introduce noise during translation because of the one-to-many nature of some stain pairs, which conflicts with its cycle consistency loss. To address this, we propose the Domain Shift Aware CycleGAN, which reduces the presence of such noise. Furthermore, we evaluate several advances from the field of machine learning aimed at resolving similar problems and compare their effectiveness against DSA-CycleGAN in the context of multi-stain glomeruli segmentation. Experiments demonstrate that DSA-CycleGAN not only improves segmentation performance in glomeruli segmentation but also outperforms other methods in reducing noise. This is particularly evident when translating between biologically distinct stains. The code is publicly available at https://github.com/zeeshannisar/DSA-CycleGAN.", "link": "http://arxiv.org/abs/2604.18368v1", "date": "2026-04-20", "relevancy": 2.3769, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4833}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4772}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4657}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DSA-CycleGAN%3A%20A%20Domain%20Shift%20Aware%20CycleGAN%20for%20Robust xiv.org/abs/2604.18368v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=DSA-CycleGAN%3A%20A%20Domain%20Shift%20Aware%20CycleGAN%20for%20Robust%20Multi-Stain%20Glomeruli%20Segmentation&entry.906535625=Zeeshan%20Nisar%20and%20Friedrich%20Feuerhake%20and%20Thomas%20Lampert&entry.1292438233=A%20key%20challenge%20in%20segmentation%20in%20digital%20histopathology%20is%20inter-%20and%20intra-stain%20variations%20as%20it%20reduces%20model%20performance.%20Labelling%20each%20stain%20is%20expensive%20and%20time-consuming%20so%20methods%20using%20stain%20transfer%20via%20CycleGAN%2C%20have%20been%20developed%20for%20training%20multi-stain%20segmentation%20models%20using%20labels%20from%20a%20single%20stain.%20Nevertheless%2C%20CycleGAN%20tends%20to%20introduce%20noise%20during%20translation%20because%20of%20the%20one-to-many%20nature%20of%20some%20stain%20pairs%2C%20which%20conflicts%20with%20its%20cycle%20consistency%20loss.%20To%20address%20this%2C%20we%20propose%20the%20Domain%20Shift%20Aware%20CycleGAN%2C%20which%20reduces%20the%20presence%20of%20such%20noise.%20Furthermore%2C%20we%20evaluate%20several%20advances%20from%20the%20field%20of%20machine%20learning%20aimed%20at%20resolving%20similar%20problems%20and%20compare%20their%20effectiveness%20against%20DSA-CycleGAN%20in%20the%20context%20of%20multi-stain%20glomeruli%20segmentation.%20Experiments%20demonstrate%20that%20DSA-CycleGAN%20not%20only%20improves%20segmentation%20performance%20in%20glomeruli%20segmentation%20but%20also%20outperforms%20other%20methods%20in%20reducing%20noise.%20This%20is%20particularly%20evident%20when%20translating%20between%20biologically%20distinct%20stains.%20The%20code%20is%20publicly%20available%20at%20https%3A//github.com/zeeshannisar/DSA-CycleGAN.&entry.1838667208=http%3A//arxiv.org/abs/2604.18368v1&entry.124074799=Read"},
{"title": "Self-Correcting Text-to-Video Generation with Misalignment Detection and Localized Refinement", "author": "Daeun Lee and Jaehong Yoon and Jaemin Cho and Mohit Bansal", "abstract": "Recent text-to-video (T2V) diffusion models have made remarkable progress in generating high-quality videos. However, they often struggle to align with complex text prompts, particularly when multiple objects, attributes, or spatial relations are specified. We introduce VideoRepair, the first self-correcting, training-free, and model-agnostic video refinement framework that automatically detects fine-grained text-video misalignments and performs targeted, localized corrections. Our key insight is that even misaligned videos usually contain correctly generated regions that should be preserved rather than regenerated. Building on this observation, VideoRepair proposes a novel region-preserving refinement strategy with three stages: (i) misalignment detection, where MLLM-based evaluation with automatically generated evaluation questions identifies misaligned regions; (ii) refinement planning, which preserves correctly generated entities, segments their regions across frames, and constructs targeted prompts for misaligned areas; and (iii) localized refinement, which selectively regenerates problematic regions while preserving faithful content through joint optimization of preserved and newly generated areas. On two benchmarks, EvalCrafter and T2V-CompBench with four recent T2V backbones, VideoRepair achieves substantial improvements over recent baselines across diverse alignment metrics. Comprehensive ablations further demonstrate the efficiency, robustness, and interpretability of our framework.", "link": "http://arxiv.org/abs/2411.15115v3", "date": "2026-04-20", "relevancy": 2.3745, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6424}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5863}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5814}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Self-Correcting%20Text-to-Video%20Generation%20with%20Misalignment%20Detection%20and%20Localized%20Refinement&body=Title%3A%20Self-Correcting%20Text-to-Video%20Generation%20with%20Misalignment%20Detection%20and%20Localized%20Refinement%0AAuthor%3A%20Daeun%20Lee%20and%20Jaehong%20Yoon%20and%20Jaemin%20Cho%20and%20Mohit%20Bansal%0AAbstract%3A%20Recent%20text-to-video%20%28T2V%29%20diffusion%20models%20have%20made%20remarkable%20progress%20in%20generating%20high-quality%20videos.%20However%2C%20they%20often%20struggle%20to%20align%20with%20complex%20text%20prompts%2C%20particularly%20when%20multiple%20objects%2C%20attributes%2C%20or%20spatial%20relations%20are%20specified.%20We%20introduce%20VideoRepair%2C%20the%20first%20self-correcting%2C%20training-free%2C%20and%20model-agnostic%20video%20refinement%20framework%20that%20automatically%20detects%20fine-grained%20text-video%20misalignments%20and%20performs%20targeted%2C%20localized%20corrections.%20Our%20key%20insight%20is%20that%20even%20misaligned%20videos%20usually%20contain%20correctly%20generated%20regions%20that%20should%20be%20preserved%20rather%20than%20regenerated.%20Building%20on%20this%20observation%2C%20VideoRepair%20proposes%20a%20novel%20region-preserving%20refinement%20strategy%20with%20three%20stages%3A%20%28i%29%20misalignment%20detection%2C%20where%20MLLM-based%20evaluation%20with%20automatically%20generated%20evaluation%20questions%20identifies%20misaligned%20regions%3B%20%28ii%29%20refinement%20planning%2C%20which%20preserves%20correctly%20generated%20entities%2C%20segments%20their%20regions%20across%20frames%2C%20and%20constructs%20targeted%20prompts%20for%20misaligned%20areas%3B%20and%20%28iii%29%20localized%20refinement%2C%20which%20selectively%20regenerates%20problematic%20regions%20while%20preserving%20faithful%20content%20through%20joint%20optimization%20of%20preserved%20and%20newly%20generated%20areas.%20On%20two%20benchmarks%2C%20EvalCrafter%20and%20T2V-CompBench%20with%20four%20recent%20T2V%20backbones%2C%20VideoRepair%20achieves%20substantial%20improvements%20over%20recent%20baselines%20across%20diverse%20alignment%20metrics.%20Comprehensive%20ablations%20further%20demonstrate%20the%20efficiency%2C%20robustness%2C%20and%20interpretability%20of%20our%20framework.%0ALink%3A%20http%3A//arxiv.org/abs/2411.15115v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSelf-Correcting%2520Text-to-Video%2520Generation%2520with%2520Misalignment%2520Detection%2520and%2520Localized%2520Refinement%26entry.906535625%3DDaeun%2520Lee%2520and%2520Jaehong%2520Yoon%2520and%2520Jaemin%2520Cho%2520and%2520Mohit%2520Bansal%26entry.1292438233%3DRecent%2520text-to-video%2520%2528T2V%2529%2520diffusion%2520models%2520have%2520made%2520remarkable%2520progress%2520in%2520generating%2520high-quality%2520videos.%2520However%252C%2520they%2520often%2520struggle%2520to%2520align%2520with%2520complex%2520text%2520prompts%252C%2520particularly%2520when%2520multiple%2520objects%252C%2520attributes%252C%2520or%2520spatial%2520relations%2520are%2520specified.%2520We%2520introduce%2520VideoRepair%252C%2520the%2520first%2520self-correcting%252C%2520training-free%252C%2520and%2520model-agnostic%2520video%2520refinement%2520framework%2520that%2520automatically%2520detects%2520fine-grained%2520text-video%2520misalignments%2520and%2520performs%2520targeted%252C%2520localized%2520corrections.%2520Our%2520key%2520insight%2520is%2520that%2520even%2520misaligned%2520videos%2520usually%2520contain%2520correctly%2520generated%2520regions%2520that%2520should%2520be%2520preserved%2520 {"title": "AdaCluster: Adaptive Query-Key Clustering for Sparse Attention in Video Generation", "author": "Haoyue Tan and Shengnan Wang and Yulin Qiao and Juncheng Zhang and Youhui Bai and Ping Gong and Zewen Jin and Cheng Li", "abstract": "Video diffusion transformers (DiTs) suffer from prohibitive inference latency due to quadratic attention complexity. Existing sparse attention methods either overlook semantic similarity or fail to adapt to heterogeneous token distributions across layers, leading to model performance degradation. We propose AdaCluster, a training-free adaptive clustering framework that accelerates the generation of DiTs while preserving accuracy. AdaCluster applies an angle-similarity-preserving clustering method to query vectors for higher compression, and designs a euclidean-similarity-preserving clustering method for keys, covering cluster number assignment, threshold-wise adaptive clustering, and efficient critical cluster selection. Experiments on CogVideoX-2B, HunyuanVideo, and Wan-2.1 on one A40 GPU demonstrate up to 1.67-4.31x speedup with negligible quality degradation.", "link": "http://arxiv.org/abs/2604.18348v1", "date": "2026-04-20", "relevancy": 2.3576, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6123}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5801}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5703}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AdaCluster%3A%20Adaptive%20Query-Key%20Clustering%20for%20Sparse%20Attention%20in%20Video%20Generation&body=Title%3A%20AdaCluster%3A%20Adaptive%20Query-Key%20Clustering%20for%20Sparse%20Attention%20in%20Video%20Generation%0AAuthor%3A%20Haoyue%20Tan%20an Existing%2520sparse%2520attention%2520methods%2520either%2520overlook%2520semantic%2520similarity%2520or%2520fail%2520to%2520adapt%2520to%2520heterogeneous%2520token%2520distributions%2520across%2520layers%252C%2520leading%2520to%2520model%2520performance%2520degradation.%2520We%2520propose%2520AdaCluster%252C%2520a%2520training-free%2520adaptive%2520clustering%2520framework%2520that%2520accelerates%2520the%2520generation%2520of%2520DiTs%2520while%2520preserving%2520accuracy.%2520AdaCluster%2520applies%2520an%2520angle-similarity-preserving%2520clustering%2520method%2520to%2520query%2520vectors%2520for%2520higher%2520compression%252C%2520and%2520designs%2520a%2520euclidean-similarity-preserving%2520clustering%2520method%2520for%2520keys%252C%2520covering%2520cluster%2520number%2520assignment%252C%2520threshold-wise%2520adaptive%2520clustering%252C%2520and%2520efficient%2520critical%2520cluster%2520selection.%2520Experiments%2520on%2520CogVideoX-2B%252C%2520HunyuanVideo%252C%2520and%2520Wan-2.1%2520on%2520one%2520A40%2520GPU%2520demonstrate%2520up%2520to%25201.67-4.31x%2520speedup%2520with%2520negligible%2520quality%2520degradation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.18348v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=AdaCluster%3A%20Adaptive%20Query-Key%20Clustering%20for%20Sparse%20Attention%20in%20Video%20Generation&entry.906535625=Haoyue%20Tan%20and%20Shengnan%20Wang%20and%20Yulin%20Qiao%20and%20Juncheng%20Zhang%20and%20Youhui%20Bai%20and%20Ping%20Gong%20and%20Zewen%20Jin%20and%20Cheng%20Li&entry.1292438233=Video%20diffusion%20transformers%20%28DiTs%29%20suffer%20from%20prohibitive%20inference%20latency%20due%20to%20quadratic%20attention%20complexity.%20Existing%20sparse%20attention%20methods%20either%20overlook%20semantic%20similarity%20or%20fail%20to%20adapt%20to%20heterogeneous%20token%20distributions%20across%20layers%2C%20leading%20to% {"title": "Negative Advantage Is a Double-Edged Sword: Calibrating Advantage in GRPO for Deep Search", "author": "Jiayi Wu and Ruobing Xie and Zeqian Huang and Lei Jiang and Can Xu and Kangyang Luo and Ming Gao and Xiang Li", "abstract": "Deep search agents can autonomously initiate multi-turn interactions with search engines, thereby exhibiting strong question-answering capabilities. Such performance critically relies on Group Relative Policy Optimization (GRPO) as its core training algorithm. However, GRPO still faces several challenges in deep search settings. First, there exists a substantial mismatch between the correctness of intermediate steps and the reward signal, causing numerous correct intermediate steps to be incorrectly penalized when the final answer is wrong. Second, training is highly unstable, often resulting in degradation of natural language ability or even catastrophic training collapse. Our analysis attributes these issues to coarse-grained advantage assignment and an imbalance between positive and negative advantages. To address these problems, we propose CalibAdv, an advantage calibration method specifically designed for deep search tasks. Specifically, CalibAdv leverages the correctness of intermediate steps to downscale excessive negative advantages at a fine-grained level. It then rebalances positive and negative advantages in the answer component. Extensive experiments across three models and seven benchmarks demonstrate that CalibAdv improves both model performance and training stability. Our code is available at https://github.com/wujwyi/CalibAdv.", "link": "http://arxiv.org/abs/2604.18235v1", "date": "2026-04-20", "relevancy": 2.3555, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4795}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.469}, {"title": "Breadcrumbs: Adversarial class-balanced {"title": "MultiWorld: Scalable Multi-Agent Multi-View Video World Models", "author": "Haoyu Wu and Jiwen Yu and Yingtian Zou and Xihui Liu", "abstract": "Video world models have achieved remarkable success in simulating environmental dynamics in response to actions by users or agents. They are modeled as action-conditioned video generation models that take historical frames and current actions as input to predict future frames. Yet, most existing approaches are limited to single-agent scenarios and fail to capture the complex interactions inherent in real-world multi-agent systems. We present \\textbf{MultiWorld}, a unified framework for multi-agent multi-view world modeling that enables accurate control of multiple agents while maintaining multi-view consistency. We introduce the Multi-Agent Condition Module to achieve precise multi-agent controllability, and the Global State Encoder to ensure coherent observations across different views. MultiWorld supports flexible scaling of agent and view counts, and synthesizes different views in parallel for high efficiency. Experiments on multi-player game environments and multi-robot manipulation tasks demonstrate that MultiWorld outperforms baselines in video fidelity, action-following ability, and multi-view consistency. Project page: https://multi-world.github.io/", "link": "http://arxiv.org/abs/2604.18564v1", "date": "2026-04-20", "relevancy": 2.3364, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6552}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5882}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5515}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MultiWorld%3A%20Scalable%20Multi-Agent%20Multi-View%20Video%20World%20Models&body=Title%3A%2 {"title": "ESsEN: Training Compact Discriminative Vision-Language Transformers in a Low-Resource Setting", "author": "Clayton Fields and Casey Kennington", "abstract": "Vision-language modeling is rapidly increasing in popularity with an ever expanding list of available models. In most cases, these vision-language models have parameters in the tens of billions, which is necessary for some needs, but in many cases smaller models are necessary (e.g., on edge devices or independent robotic platforms). Unfortunately, there is little research in producing light-weight models or in training them with small datasets. Inspired by the language learning progression and data sparsity in child development, in this paper, we address both of these goals in a systematic fashion. We show that two-tower encoder models are superior to one-tower encoders in low-resource settings for discriminative English tasks. We show also that incorporating traditional convolutional networks into the two-tower transformer architecture can help produce parameter efficient vision-language models. Finally, we show that the cross-modal fusion module of two-tower encoders can vary significantly in shape and size while producing the same results. In addition, we present ESsEN, a compact vision-language model that can be trained end-to-end with relatively few resources that performs as well on several tasks with only a fraction of the parameters compared to other models. The experimental results and the tools we present here make vision-language modeling more accessible to a wider variety of researchers.", "link": "http://arxiv.org/abs/2604.18452v1", "date": "2026-04-20", "relevancy": 2.3332, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5908}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "simil {"title": "MathNet: a Global Multimodal Benchmark for Mathematical Reasoning and Retrieval", "author": "Shaden Alshammari and Kevin Wen and Abrar Zainal and Mark Hamilton and Navid Safaei and Sultan Albarakati and William T. Freeman and Antonio Torralba", "abstract": "Mathematical problem solving remains a challenging test of reasoning for large language and multimodal models, yet existing benchmarks are limited in size, language coverage, and task diversity. We introduce MathNet, a high-quality, large-scale, multimodal, and multilingual dataset of Olympiad-level math problems together with a benchmark for evaluating mathematical reasoning in generative models and mathematical retrieval in embedding-based systems. MathNet spans 47 countries, 17 languages, and two decades of competitions, comprising 30,676 expert-authored problems with solutions across diverse domains. In addition to the core dataset, we construct a retrieval benchmark consisting of mathematically equivalent and structurally similar problem pairs curated by human experts.\n  MathNet supports three tasks: (i) Problem Solving, (ii) Math-Aware Retrieval, and (iii) Retrieval-Augmented Problem Solving. Experimental results show that even state-of-the-art reasoning models (78.4% for Gemini-3.1-Pro and 69.3% for GPT-5) remain challenged, while embedding models struggle to retrieve equivalent problems. We further show that retrieval-augmented generation performance is highly sensitive to retrieval quality; for example, DeepSeek-V3.2-Speciale achieves gains of up to 12%, obtaining the highest scores on the benchmark. MathNet provides the largest high-quality Olympiad dataset together with the first benchmark for evaluating mathematical problem retrieval, and we publicly release both the dataset and benchmark at https://mathnet.mit.edu.", "link": "http://arxiv.org/abs/2604.18584v1", "date": "2026-04-20", "relevancy": 2.3326, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n 8ii%29%20Math-Aware%20Retrieval%2C%20and%20%28iii%29%20Retrieval-Augmented%20Problem%20Solving.%20Experimental%20results%20show%20that%20even%20state-of-the-art%20reasoning%20models%20%2878.4%25%20for%20Gemini-3.1-Pro%20and%2069.3%25%20for%20GPT-5%29%20remain%20challenged%2C%20while%20embedding%20models%20struggle%20to%20retrieve%20equivalent%20problems.%20We%20further%20show%20that%20retrieval-augmented%20generation%20performance%20is%20highly%20sensitive%20to%20retrieval%20quality%3B%20for%20example%2C%20DeepSeek-V3.2-Speciale%20achieves%20gains%20of%20up%20to%2012%25%2C%20obtaining%20the%20highest%20scores%20on%20the%20benchmark.%20MathNet%20provides%20the%20largest%20high-quality%20Olympiad%20dataset%20together%20with%20the%20first%20benchmark%20for%20evaluating%20mathematical%20problem%20retrieval%2C%20and%20we%20publicly%20release%20both%20the%20dataset%20and%20benchmark%20at%20https%3A//mathnet.mit.edu.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18584v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMathNet%253A%2520a%2520Global%2520Multimodal%2520Benchmark%2520for%2520Mathematical%2520Reasoning%2520and%2520Retrieval%26entry.906535625%3DShaden%2520Alshammari%2520and%2520Kevin%2520Wen%2520and%2520Abrar%2520Zainal%2520and%2520Mark%2520Hamilton%2520and%2520Navid%2520Safaei%2520and%2520Sultan%2520Albarakati%2520and%2520William%2520T.%2520Freeman%2520and%2520Antonio%2520Torralba%26entry.1292438233%3DMathematical%2520problem%2520solving%2520remains%2520a%2520challenging%2520test%2520of%2520reasoning%2520for%2520large%2520language%2520and%2520multimodal%2520models%252C%2520yet%2520existing%2520benchmarks%2520are%2520limited%2520in%2520size%252C%2520language%2520coverage%252C%2520and%2520task%2520diversity.%2520We%2520introduce%2520MathNet%252C%2520a%2520high-quality%252C%2520large-scale%252C%2520multimodal%252C%2520and%2520multilingual%2520dataset%2520of%2520Olympiad-level%2520math% {"title": "Training LLM Agents for Spontaneous, Reward-Free Self-Evolution via World Knowledge Exploration", "author": "Qifan Zhang and Dongyang Ma and Tianqing Fang and Jia Li and Jing Tang and Nuo Chen and Haitao Mi and Yan Wang", "abstract": "Most agents today ``self-evolve'' by following rewards and rules defined by humans. However, this process remains fundamentally dependent on external supervision; without human guidance, the evolution stops. In this work, we train agents to possess an intrinsic meta-evolution capability to spontaneously learn about unseen environments prior to task execution.\n  To instill this ability, we design an outcome-based reward mechanism that measures how much an agent's self-generated world knowledge improves its success rate on downstream tasks. This reward signal is used exclusively during the training phase to teach the model how to explore and summarize effectively. At inference time, the agent requires no external rewards or human instructions. It spontaneously performs native self-evolution to adapt to unknown environments using its internal parameters.\n  When applied to Qwen3-30B and Seed-OSS-36B, this shift to native evolution yields a 20% performance increase on WebVoyager and WebWalker. Most strikingly, the generated world knowledge even enables a compact 14B Qwen3 model to outperform the unassisted Gemini-2.5-Flash, establishing a new paradigm for truly evolving agents.", "link": "http://arxiv.org/abs/2604.18131v1", "date": "2026-04-20", "relevancy": 2.3318, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5951}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5871}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5423}], "mailto": "mail {"title": "An Integrated Deep-Learning Framework for Peptide-Protein Interaction Prediction and Target-Conditioned Peptide Generation with ConGA-PePPI and TC-PepGen", "author": "Chupei Tang and Junxiao Kong and Moyu Tang and Di Wang and Jixiu Zhai and Ronghao Xie and Shangkun Sima and Tianchi Lu", "abstract": "Motivation: Peptide-protein interactions (PepPIs) are central to cellular regulation and peptide therapeutics, but experimental characterization remains too slow for large-scale screening. Existing methods usually emphasize either interaction prediction or peptide generation, leaving candidate prioritization, residue-level interpretation, and target-conditioned expansion insufficiently integrated. Results: We present an integrated framework for early-stage peptide screening that combines a partner-aware prediction and localization model (ConGA-PepPI) with a target-conditioned generative model (TC-PepGen). ConGA-PepPI uses asymmetric encoding, bidirectional cross-attention, and progressive transfer from pair prediction to binding-site localization, while TC-PepGen preserves target information throughout autoregressive decoding via layerwise conditioning. In five-fold cross-validation, ConGA-PepPI achieved 0.839 accuracy and 0.921 AUROC, with binding-site AUPR values of 0.601 on the protein side and 0.950 on the peptide side, and remained competitive on external benchmarks. Under a controlled length-conditioned benchmark, 40.39% of TC-PepGen peptides exceeded native templates in AlphaFold 3 ipTM, and unconstrained generation retained evidence of target-conditioned signal.", "link": "http://arxiv.org/abs/2604.18467v1", "date": "2026-04-20", "relevancy": 2.3299, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4819}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4672}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4489}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20An%20Integrated%20Deep-Learning%20Framework%20for%20Peptide-Protein%20Interaction%20Prediction%20and%20Target-Conditioned%20Peptide%20Generation%20with%20ConGA-PePPI%20and%20TC-PepGen&body=Title%3A%20An%20Integrated%20Deep-Learning%20Framework%20for%20Peptide-Protein%20Interaction%20Prediction%20and%20Target-Conditioned%20Peptide%20Generation%20with%20ConGA-PePPI%20and%20TC-PepGen%0AAuthor%3A%20Chupei%20Tang%20and%20Junxiao%20Kong%20and%20Moyu%20Tang%20and%20Di%20Wang%20and%20Jixiu%20Zhai%20and%20Ronghao%20Xie%20and%20Shangkun%20Sima%20and%20Tianchi%20Lu%0AAbstract%3A%20Motivation%3A%20Peptide-protein%20interactions%20%28PepPIs%29%20are%20central%20to%20cellular%20regulation%20and%20peptide%20therapeutics%2C%20but%20experimental%20characterization%20remains%20too%20slow%20for%20large-scale%20screening.%20Existing%20methods%20usually%20emphasize%20either%20interaction%20prediction%20or%20peptide%20generation%2C%20leaving%20candidate%20prioritization%2C%20residue-level%20interpretation%2C%20and%20target-conditioned%20expansion%20insufficiently%20integrated.%20Results%3A%20We%20present%20an%20integrated%20framework%20for%20early-stage%20peptide%20screening%20that%20combines%20a%20partner-aware%20prediction%20and%20localization%20model%20%28ConGA-PepPI%29%20with%20a%20target-conditioned%20generative%20model%20%28TC-PepGen%29.%20ConGA-PepPI%20uses%20asymmetric%20encoding%2C%20bidirectional%20cross-attention%2C%20and%20progressive%20transfer%20from%20pair%20prediction%20to%20binding-site%20localization%2C%20while%20TC-PepGen%20preserves%20target%20information%20throughout%20autoregressive%20decoding%20via%20layerwise%20conditioning.%20In%20five-fold%20cross-validation%2C%20ConGA-PepPI%20achieved%200.839%20accuracy%20and%200.921%20AUROC%2C%20with%20binding-site%20AUPR%20values%20of%200.601%20on%20the%20protein%20side%20and%200.950%20on%20the%20peptide%20side%2C%20and%20remained%20competitive%20on%20external%20benchmarks.%20Under%20a%20controlled%20length-conditioned%20benchmark%2C%2040.39%25%20of%20TC-PepGen%20peptides%20exceeded%20native%20templates%20in%20AlphaFold%203%20ipTM%2C%20and%20unconstrained%20generation%20retained%20evidence%20of%20target-conditioned%20signal.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18467v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAn%2520Integrated%2520Deep-Learning%2520Framework%2520for%2520Peptide-Protein%2520Interaction%2520Prediction%2520and%2520Target-Conditioned%2520Peptide%2520Generation%2520with%2520ConGA-PePPI%2520and%2520TC-PepGen%26entry.906535625%3DChupei%2520Tang%2520and%2520Junxiao%2520Kong%2520and%2520Moyu%2520Tang%2520and%2520Di%2520Wang%2520and%2520Jixiu%2520Zhai%2520and%2520Ronghao%2520Xie%2520and%2520Shangkun%2520Sima%2520and%2520Tianchi%2520Lu%26entry.1292438233%3DMotivation%253A%2520Peptide-protein%2520interactions%2520%2528PepPIs%2529%2520are%2520central%2520to%2520cellular%2520regulation%2520and%2520peptide%2520therapeutics%252C%2520but%2520experimental%2520characterization%2520remains%2520too%2520slow%2520for%2520large-scale%2520screening.%2520Existing%2520methods%2520usually%2520emphasize%2520either%2520interaction%2520prediction%2520or%2520peptide%2520generation%252C%2520leaving%2520candidate%2520prioritization%252C%2520residue-level%2520interpretation%252C%2520and%2520target-conditioned%2520expansion%2520insufficiently%2520integrated.%2520Results%253A%2520We%2520present%2520an%2520integrated%2520framework%2520for%2520early-stage%2520peptide%2520screening%2520that%2520combines%2520a%2520partner-aware%2520prediction%2520and%2520localization%2520model%2520%2528ConGA-PepPI%2529%2520with%2520a%2520target-conditioned%2520generative%2520model%2520%2528TC-PepGen%2529.%2520ConGA-PepPI%2520uses%2520asymmetric%2520encoding%252C%25

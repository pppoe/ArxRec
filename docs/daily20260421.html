rate%2520that%2520SEPT%2520consistently%2520improves%2520generalization%2520performance%2520across%2520multiple%2520prompt%2520tuning%2520baselines%252C%2520while%2520maintaining%2520computational%2520cost%2520during%2520inference.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.20867v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Generalizable%20Prompt%20Tuning%20for%20Audio-Language%20Models%20via%20Semantic%20Expansion&entry.906535625=Jaehyuk%20Jang%20and%20Wonjun%20Lee%20and%20Kangwook%20Ko%20and%20Changick%20Kim&entry.1292438233=Prompt%20tuning%20has%20achieved%20remarkable%20progress%20in%20vision-language%20models%20%28VLMs%29%20and%20is%20recently%20being%20adopted%20for%20audio-language%20models%20%28ALMs%29.%20However%2C%20its%20generalization%20ability%20in%20ALMs%20remains%20largely%20underexplored.%20We%20observe%20that%20conventional%20prompt%20tuning%20for%20ALMs%20also%20suffers%20from%20the%20Base-New%20Tradeoff%2C%20and%20we%20identify%20that%20this%20issue%20stems%20from%20the%20disrupted%20semantic%20structure%20of%20the%20embedding%20space.%20To%20address%20this%20issue%2C%20we%20propose%20Semantically%20Expanded%20Prompt%20Tuning%20%28SEPT%29-a%20plug-and-play%20framework%20that%20explicitly%20regularizes%20the%20prompt%20embedding%20space%20by%20incorporating%20semantic%20neighbors%20generated%20by%20large%20language%20models.%20SEPT%20introduces%20a%20novel%20semantic%20expansion%20loss%20with%20margin%20constraints%20that%20promote%20intra-class%20compactness%20and%20inter-class%20separability%2C%20thereby%20enhancing%20the%20semantic%20structure%20of%20the%20prompt%20embedding%20space.%20For%20comprehensive%20evaluation%2C%20we%20establish%20the%20first%20benchmark%20setup%20for%20prompt%20generalization%20in%20ALMs%2C%20covering%20both%20base-to-new%20generalization%20and%20cross-dataset%20transferability.%20Extensive%20experiments%20demonstrate%20that%20SEPT%20consistently%20improves%20generalization%20performance%20across%20multiple%20prompt%20tuning%20baselines%2C%20while%20maintaining%20computational%20cost%20during%20inference.&entry.1838667208=http%3A//arxiv.org/abs/2601.20867v2&entry.124074799=Read"},
{"title": "SignDPO: Multi-level Direct Preference Optimisation for Skeleton-based Gloss-free Sign Language Translation", "author": "Muxin Pu and Xiao-Ming Wu and Mei Kuan Lim and Chun Yong Chong and Wei Li and Chen Change Loy", "abstract": "We present SignDPO, a novel multi-level Direct Preference Optimisation (DPO) framework designed to enhance the alignment of skeleton-based Sign Language Translation. While current skeleton-based models have made significant progress using Maximum Likelihood Estimation, they are primarily constrained by an imitation-based paradigm that lacks discriminative sensitivity to the fine-grained spatio-temporal nuances of sign language, often leading to semantic drift. To address this, SignDPO shifts the optimisation goal from simple sequence mimicry to structured preference alignment across spatial, temporal, and linguistic dimensions. Our framework involves three key designs. First, we introduce a hierarchical perturbation strategy to construct spatial and temporal non-preferred samples at both global and local granularities automatically. Second, we propose a self-guiding mechanism that leverages decoder cross-attention scores to identify and perturb semantically salient skeletal regions, forcing the model to distinguish genuine sign signals from structural distortions. Third, we establish an automated language-level preference generator by fine-tuning a dedicated perturbation model, capturing complex output-level failure modes without manual annotation. Extensive experiments on three widely adopted benchmarks, CSL-Daily, How2Sign, and OpenASL, demonstrate that SignDPO consistently outperforms state-of-the-art gloss-free methods and even rivals established gloss-based ones. Our results suggest that multi-level preference alignment is a powerful paradigm for bridging the gap between high-entropy skeletal trajectories and discrete linguistic semantics.", "link": "http://arxiv.org/abs/2604.18034v1", "date": "2026-04-20", "relevancy": 2.5664, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5161}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5161}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5077}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SignDPO%3A%20Multi-level%20Direct%20Preference%20Optimisation%20for%20Skeleton-based%20Gloss-free%20Sign%20Language%20Translation&body=Title%3A%20SignDPO%3A%20Multi-level%20Direct%20Preference%20Optimisation%20for%20Skeleton-based%20Gloss-free%20Sign%20Language%20Translation%0AAuthor%3A%20Muxin%20Pu%20and%20Xiao-Ming%20Wu%20and%20Mei%20Kuan%20Lim%20and%20Chun%20Yong%20Chong%20and%20Wei%20Li%20and%20Chen%20Change%20Loy%0AAbstract%3A%20We%20present%20SignDPO%2C%20a%20novel%20multi-level%20Direct%20Preference%20Optimisation%20%28DPO%29%20framework%20designed%20to%20enhance%20the%20alignment%20of%20skeleton-based%20Sign%20Language%20Translation.%20While%20current%20skeleton-based%20models%20have%20made%20significant%20progress%20using%20Maximum%20Likelihood%20Estimation%2C%20they%20are%20primarily%20constrained%20by%20an%20imitation-based%20paradigm%20that%20lacks%20discriminative%20sensitivity%20to%20the%20fine-grained%20spatio-temporal%20nuances%20of%20sign%20language%2C%20often%20leading%20to%20semantic%20drift.%20To%20address%20this%2C%20SignDPO%20shifts%20the%20optimisation%20goal%20from%20simple%20sequence%20mimicry%20to%20structured%20preference%20alignment%20across%20spatial%2C%20temporal%2C%20and%20linguistic%20dimensions.%20Our%20framework%20involves%20three%20key%20designs.%20First%2C%20we%20introduce%20a%20hierarchical%20perturbation%20strategy%20to%20construct%20spatial%20and%20temporal%20non-preferred%20samples%20at%20both%20global%20and%20local%20granularities%20automatically.%20Second%2C%20we%20propose%20a%20self-guiding%20mechanism%20that%20leverages%20decoder%20cross-attention%20scores%20to%20identify%20and%20perturb%20semantically%20salient%20skeletal%20regions%2C%20forcing%20the%20model%20to%20distinguish%20genuine%20sign%20signals%20from%20structural%20distortions.%20Third%2C%20we%20establish%20an%20automated%20language-level%20preference%20generator%20by%20fine-tuning%20a%20dedicated%20perturbation%20model%2C%20capturing%20complex%20output-level%20failure%20modes%20without%20manual%20annotation.%20Extensive%20experiments%20on%20three%20widely%20adopted%20benchmarks%2C%20CSL-Daily%2C%20How2Sign%2C%20and%20OpenASL%2C%20demonstrate%20that%20SignDPO%20consistently%20outperforms%20state-of-the-art%20gloss-free%20methods%20and%20even%20rivals%20established%20gloss-based%20ones.%20Our%20results%20suggest%20that%20multi-level%20preference%20alignment%20is%20a%20powerful%20paradigm%20for%20bridging%20the%20gap%20between%20high-entropy%20skeletal%20trajectories%20and%20discrete%20linguistic%20semantics.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18034v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSignDPO%253A%2520Multi-level%2520Direct%2520Preference%2520Optimisation%2520for%2520Skeleton-based%2520Gloss-free%2520Sign%2520Language%2520Translation%26entry.906535625%3DMuxin%2520Pu%2520and%2520Xiao-Ming%2520Wu%2520and%2520Mei%2520Kuan%2520Lim%2520and%2520Chun%2520Yong%2520Chong%2520and%2520Wei%2520Li%2520and%2520Chen%2520Change%2520Loy%26entry.1292438233%3DWe%2520present%2520SignDPO%252C%2520a%2520novel%2520multi-level%2520Direct%2520Preference%2520Optimisation%2520%2528DPO%2529%2520framework%2520designed%2520to%2520enhance%2520the%2520alignment%2520of%2520skeleton-based%2520Sign%2520Language%2520Translation.%2520While%2520current%2520skeleton-based%2520models%2520have%2520made%2520significant {"title": "The Topological Dual of a Dataset: A Logic-to-Topology Encoding for AlphaGeometry-Style Data", "author": "Anthony Bordg", "abstract": "AlphaGeometry represents a milestone in neuro-symbolic reasoning, yet its architecture faces a log-linear scaling bottleneck within its symbolic deduction engine that limits its efficiency as problem complexity increases. Recent technical reports suggest that current domain-specific languages may be isomorphic as input representations to natural language, interchanging them acts as a performance-invariant transformation, implying that current neural guidance relies on superficial encodings rather than structural understanding. This paper addresses this representation bottleneck by proposing a logic-to-topology encoding designed to reveal the structural invariants of a model's latent space under a transformation of its input space. By leveraging the Logic of Observation, we utilize the duality between provability in observable theories and topologies to propose a logic-to-topology encoder for the input space. We introduce the concept of the \"topological dual of a dataset\", a transformation that bridges formal logic, topology, and neural processing. This framework serves as a Rosetta Stone for neuro-symbolic AI, providing a principled pathway for the mechanistic interpretability of how models navigate complex discovery paths.", "link": "http://arxiv.org/abs/2604.18050v1", "date": "2026-04-20", "relevancy": 2.5627, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5253}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5253}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.487}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Topological%20Dual%20of%20a%20Dataset%3A%20A%20Logic-to-Topology%20Encoding%20for%20AlphaGeometry-Style%20Data&body=Title%3A%20The%20Topological%20Dual%20of%20a%20Dataset%3A%20A%20Logic-to-Topology%20Encoding%20for%20AlphaGeometry-Style%20Data%0AAuthor%3A%20Anthony%20Bordg%0AAbstract%3A%20AlphaGeometry%20represents%20a%20milestone%20in%20neuro-symbolic%20reasoning%2C%20yet%20its%20architecture%20faces%20a%20log-linear%20scaling%20bottleneck%20within%20its%20symbolic%20deduction%20engine%20that%20limits%20its%20efficiency%20as%20problem%20complexity%20increases.%20Recent%20technical%20reports%20suggest%20that%20current%20domain-specific%20languages%20may%20be%20isomorphic%20as%20input%20representations%20to%20natural%20language%2C%20interchanging%20them%20acts%20as%20a%20performance-invariant%20transformation%2C%20implying%20that%20current%20neural%20guidance%20relies%20on%20superficial%20encodings%20rather%20than%20structural%20understanding.%20This%20paper%20addresses%20this%20representation%20bottleneck%20by%20proposing%20a%20logic-to-topology%20encoding%20designed%20to%20reveal%20the%20structural%20invariants%20of%20a%20model%27s%20latent%20space%20under%20a%20transformation%20of%20its%20input%20space.%20By%20leveraging%20the%20Logic%20of%20Observation%2C%20we%20utilize%20the%20duality%20between%20provability%20in%20observable%20theories%20and%20topologies%20to%20propose%20a%20logic-to-topology%20encoder%20for%20the%20input%20space.%20We%20introduce%20the%20concept%20of%20the%20%22topological%20dual%20of%20a%20dataset%22%2C%20a%20transformation%20that%20bridges%20formal%20logic%2C%20topology%2C%20and%20neural%20processing.%20This%20framework%20serves%20as%20a%20Rosetta%20Stone%20for%20neuro-symbolic%20AI%2C%20providing%20a%20principled%20pathway%20for%20the%20mechanistic%20interpretability%20of%20how%20models%20navigate%20complex%20discovery%20paths.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18050v1%0AForm%3A%20https%3A//docs.go ves%2520as%2520a%2520Rosetta%2520Stone%2520for%2520neuro-symbolic%2520AI%252C%2520providing%2520a%2520principled%2520pathway%2520for%2520the%2520mechanistic%2520interpretability%2520of%2520how%2520models%2520navigate%2520complex%2520discovery%2520paths.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.18050v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=The%20Topological%20Dual%20of%20a%20Dataset%3A%20A%20Logic-to-Topology%20Encoding%20for%20AlphaGeometry-Style%20Data&entry.906535625=Anthony%20Bordg&entry.1292438233=AlphaGeometry%20represents%20a%20milestone%20in%20neuro-symbolic%20reasoning%2C%20yet%20its%20architecture%20faces%20a%20log-linear%20scaling%20bottleneck%20within%20its%20symbolic%20deduction%20engine%20that%20limits%20its%20efficiency%20as%20problem%20complexity%20increases.%20Recent%20technical%20reports%20suggest%20that%20current%20domain-specific%20languages%20may%20be%20isomorphic%20as%20input%20representations%20to%20natural%20language%2C%20interchanging%20them%20acts%20as%20a%20performance-invariant%20transformation%2C%20implying%20that%20current%20neural%20guidance%20relies%20on%20superficial%20encodings%20rather%20than%20structural%20understanding.%20This%20paper%20addresses%20this%20representation%20bottleneck%20by%20proposing%20a%20logic-to-topology%20encoding%20designed%20to%20reveal%20the%20structural%20invariants%20of%20a%20model%27s%20latent%20space%20under%20a%20transformation%20of%20its%20input%20space.%20By%20leveraging%20the%20Logic%20of%20Observation%2C%20we%20utilize%20the%20duality%20between%20provability%20in%20observable%20theories%20and%20topologies%20to%20propose%20a%20logic-to-topology%20encoder%20for%20the%20input%20space.%20We%20introduce%20the%20concept%20of%20the%20%22topological%20dual%20of%20a%20dataset%22%2C%20a%20transformation%20that%20bridges%20formal%20logic%2C%20topology%2C%20and%20neural%20processing.%20Th {"title": "Instance-Adaptive Parametrization for Amortized Variational Inference", "author": "Andrea Pollastro and Andrea Apicella and Francesco Isgr\u00f2 and Roberto Prevete", "abstract": "Variational autoencoders (VAEs) rely on amortized variational inference to enable efficient posterior approximation, but this efficiency comes at the cost of a shared parametrization, giving rise to the amortization gap. We propose the instance-adaptive variational autoencoder (IA-VAE), an amortized inference framework in which a hypernetwork generates input-dependent modulations of a shared encoder. This enables input-specific adaptation of the inference model while preserving the efficiency of a single forward pass. From a theoretical perspective, we show that the variational family induced by IA-VAE contains that of standard amortized inference, implying that IA-VAE cannot yield a worse optimal ELBO. By leveraging instance-specific parameter modulations, the proposed approach can achieve performance comparable to standard encoders with substantially fewer parameters, indicating a more efficient use of model capacity. Experiments on synthetic data, where the true posterior is known, show that IA-VAE yields more accurate posterior approximations and reduces the amortization gap. Similarly, on standard image benchmarks, IA-VAE consistently improves held-out ELBO over baseline VAEs, with statistically significant gains across multiple runs. These results suggest that increasing the flexibility of the inference parametrization through instance-adaptive modulation is an effective strategy for mitigating amortization-induced suboptimality in deep generative models.", "link": "http://arxiv.org/abs/2604.06796v2", "date": "2026-04-20", "relevancy": 2.5474, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5664}, {"title": "GeneVA: A Dataset of Human Annotations for Generati {"title": "Document-as-Image Representations Fall Short for Scientific Retrieval", "author": "Ghazal Khalighinejad and Raghuveer Thirukovalluru and Alexander H. Oh and Bhuwan Dhingra", "abstract": "Many recent document embedding models are trained on document-as-image representations, embedding rendered pages as images rather than the underlying source. Meanwhile, existing benchmarks for scientific document retrieval, such as ArXivQA and ViDoRe, treat documents as images of pages, implicitly favoring such representations. In this work, we argue that this paradigm is not well-suited for text-rich multimodal scientific documents, where critical evidence is distributed across structured sources, including text, tables, and figures. To study this setting, we introduce ArXivDoc, a new benchmark constructed from the underlying LaTeX sources of scientific papers. Unlike PDF or image-based representations, LaTeX provides direct access to structured elements (e.g., sections, tables, figures, equations), enabling controlled query construction grounded in specific evidence types. We systematically compare text-only, image-based, and multimodal representations across both single-vector and multi-vector retrieval models. Our results show that: (1) document-as-image representations are consistently suboptimal, especially as document length increases; (2) text-based representations are most effective, even for figure-based queries, by leveraging captions and surrounding context; and (3) interleaved text+image representations outperform document-as-image approaches without requiring specialized training.", "link": "http://arxiv.org/abs/2604.18508v1", "date": "2026-04-20", "relevancy": 2.546, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5282}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5282}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4713}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Document-as-Image%20Representations%20Fall%20Short%20for%20Scientific%20Retrieval&body=Title%3A%20Document-as-Image%20Representations%20Fall%20Short%20for%20Scientific%20Retrieval%0AAuthor%3A%20Ghazal%20Khalighinejad%20and%20Raghuveer%20Thirukovalluru%20and%20Alexander%20H.%20Oh%20and%20Bhuwan%20Dhingra%0AAbstract%3A%20Many%20recent%20document%20embedding%20models%20are%20trained%20on%20document-as-image%20representations%2C%20embedding%20rendered%20pages%20as%20images%20rather%20than%20the%20underlying%20source.%20Meanwhile%2C%20existing%20benchmarks%20for%20scientific%20document%20retrieval%2C%20such%20as%20ArXivQA%20and%20ViDoRe%2C%20treat%20documents%20as%20images%20of%20pages%2C%20implicitly%20favoring%20such%20representations.%20In%20this%20work%2C%20we%20argue%20that%20this%20paradigm%20is%20not%20well-suited%20for%20text-rich%20multimodal%20scientific%20documents%2C%20where%20critical%20evidence%20is%20distributed%20across%20structured%20sources%2C%20including%20text%2C%20tables%2C%20and%20figures.%20To%20study%20this%20setting%2C%20we%20introduce%20ArXivDoc%2C%20a%20new%20benchmark%20constructed%20from%20the%20underlying%20LaTeX%20sources%20of%20scientific%20papers.%20Unlike%20PDF%20or%20image-based%20representations%2C%20LaTeX%20provides%20direct%20access%20to%20structured%20elements%20%28e.g.%2C%20sections%2C%20tables%2C%20figures%2C%20equations%29%2C%20enabling%20controlled%20query%20construction%20grounded%20in%20specific%20evidence%20types.%20We%20systematically%20compare%20text-only%2C%20image-based%2C%20and%20multimodal%20representations%20across%20both%20single-vector%20and%20multi-vector%20retrieval%20models.%20Our%20results%20show%20that%3A%20%281%29%20document-as-image%20representations%20are%20c {"title": "Train Separately, Merge Together: Modular Post-Training with Mixture-of-Experts", "author": "Jacob Morrison and Sanjay Adhikesaven and Akshita Bhagia and Matei Zaharia and Noah A. Smith and Sewon Min", "abstract": "Extending a fully post-trained language model with new domain capabilities is fundamentally limited by monolithic training paradigms: retraining from scratch is expensive and scales poorly, while continued training often degrades existing capabilities. We present BAR (Branch-Adapt-Route), which trains independent domain experts, each through its own mid-training, supervised finetuning, and reinforcement learning pipeline, and composes them via a Mixture-of-Experts architecture with lightweight router training. Unlike retraining approaches that mix all domains and require full reprocessing for any update (with cost scaling quadratically), BAR enables updating individual experts independently with linear cost scaling and no degradation to existing domains. At the 7B scale, with experts for math, code, tool use, and safety, BAR achieves an overall score of 49.1 (averaged across 7 evaluation categories), matching or exceeding re-training baselines (47.8 without mid-training, 50.5 with). We further show that modular training provides a structural advantage: by isolating each domain, it avoids the catastrophic forgetting that occurs when late-stage RL degrades capabilities from earlier training stages, while significantly reducing the cost and complexity of updating or adding a domain. Together, these results suggest that decoupled, expert-based training is a scalable alternative to monolithic retraining for extending language models.", "link": "http://arxiv.org/abs/2604.18473v1", "date": "2026-04-20", "relevancy": 2.5458, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5171}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", {"title": "When Can LLMs Learn to Reason with Weak Supervision?", "author": "Salman Rahman and Jingyan Shen and Anna Mordvina and Hamid Palangi and Saadia Gabriel and Pavel Izmailov", "abstract": "Large language models have achieved significant reasoning improvements through reinforcement learning with verifiable rewards (RLVR). Yet as model capabilities grow, constructing high-quality reward signals becomes increasingly difficult, making it essential to understand when RLVR can succeed under weaker forms of supervision. We conduct a systematic empirical study across diverse model families and reasoning domains under three weak supervision settings: scarce data, noisy rewards, and self-supervised proxy rewards. We find that generalization is governed by training reward saturation dynamics: models that generalize exhibit a prolonged pre-saturation phase during which training reward and downstream performance climb together, while models that saturate rapidly memorize rather than learn. We identify reasoning faithfulness, defined as the extent to which intermediate steps logically support the final answer, as the pre-RL property that predicts which regime a model falls into, while output diversity alone is uninformative. Motivated by these findings, we disentangle the contributions of continual pre-training and supervised fine-tuning, finding that SFT on explicit reasoning traces is necessary for generalization under weak supervision, while continual pre-training on domain data amplifies the effect. Applied together to Llama3.2-3B-Base, these interventions enable generalization across all three settings where the base model previously failed.", "link": "http://arxiv.org/abs/2604.18574v1", "date": "2026-04-20", "relevancy": 2.5218, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5178}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D ts%20which%20regime%20a%20model%20falls%20into%2C%20while%20output%20diversity%20alone%20is%20uninformative.%20Motivated%20by%20these%20findings%2C%20we%20disentangle%20the%20contributions%20of%20continual%20pre-training%20and%20supervised%20fine-tuning%2C%20finding%20that%20SFT%20on%20explicit%20reasoning%20traces%20is%20necessary%20for%20generalization%20under%20weak%20supervision%2C%20while%20continual%20pre-training%20on%20domain%20data%20amplifies%20the%20effect.%20Applied%20together%20to%20Llama3.2-3B-Base%2C%20these%20interventions%20enable%20generalization%20across%20all%20three%20settings%20where%20the%20base%20model%20previously%20failed.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18574v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhen%2520Can%2520LLMs%2520Learn%2520to%2520Reason%2520with%2520Weak%2520Supervision%253F%26entry.906535625%3DSalman%2520Rahman%2520and%2520Jingyan%2520Shen%2520and%2520Anna%2520Mordvina%2520and%2520Hamid%2520Palangi%2520and%2520Saadia%2520Gabriel%2520and%2520Pavel%2520Izmailov%26entry.1292438233%3DLarge%2520language%2520models%2520have%2520achieved%2520significant%2520reasoning%2520improvements%2520through%2520reinforcement%2520learning%2520with%2520verifiable%2520rewards%2520%2528RLVR%2529.%2520Yet%2520as%2520model%2520capabilities%2520grow%252C%2520constructing%2520high-quality%2520reward%2520signals%2520becomes%2520increasingly%2520difficult%252C%2520making%2520it%2520essential%2520to%2520understand%2520when%2520RLVR%2520can%2520succeed%2520under%2520weaker%2520forms%2520of%2520supervision.%2520We%2520conduct%2520a%2520systematic%2520empirical%2520study%2520across%2520diverse%2520model%2520families%2520and%2520reasoning%2520domains%2520under%2520three%2520weak%2520supervision%2520settings%253A%2520scarce%2520data%252C%2520noisy%2520rewards%252C%2520and%2520self-supervised%2520proxy%2520rewards.%2520We%2520find%2520that%2520generalization%2 {"title": "DocQAC: Adaptive Trie-Guided Decoding for Effective In-Document Query Auto-Completion", "author": "Rahul Mehta and Kavin R and Indrajit Pal and Tushar Abhishek and Pawan Goyal and Manish Gupta", "abstract": "Query auto-completion (QAC) has been widely studied in the context of web search, yet remains underexplored for in-document search, which we term DocQAC. DocQAC aims to enhance search productivity within long documents by helping users craft faster, more precise queries, even for complex or hard-to-spell terms. While global historical queries are available to both WebQAC and DocQAC, DocQAC uniquely accesses document-specific context, including the current document's content and its specific history of user query interactions.\n  To address this setting, we propose a novel adaptive trie-guided decoding framework that uses user query prefixes to softly steer language models toward high-quality completions. Our approach introduces an adaptive penalty mechanism with tunable hyperparameters, enabling a principled trade-off between model confidence and trie-based guidance. To efficiently incorporate document context, we explore retrieval-augmented generation (RAG) and lightweight contextual document signals such as titles, keyphrases, and summaries.\n  When applied to encoder-decoder models like T5 and BART, our trie-guided framework outperforms strong baselines and even surpasses much larger instruction-tuned models such as LLaMA-3 and Phi-3 on seen queries across both seen and unseen documents. This demonstrates its practicality for real-world DocQAC deployments, where efficiency and scalability are critical. We evaluate our method on a newly introduced DocQAC benchmark derived from ORCAS, enriched with query-document pairs. We make both the DocQAC dataset (https://bit.ly/3IGEkbH) and code (https://github.com/rahcode7/DocQAC) publicly available.", "link": "http://arxiv.org/abs/2604.18257v1", "date": "2026-04-20", "relevancy": 2.5154, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5081}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5081}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4931}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DocQAC%3A%20Adaptive%20Trie-Guided%20Decoding%20for%20Effective%20In-Document%20Query%20Auto-Completion&body=Title%3A%20DocQAC%3A%20Adaptive%20Trie-Guided%20Decoding%20for%20Effective%20In-Document%20Query%20Auto-Completion%0AAuthor%3A%20Rahul%20Mehta%20and%20Kavin%20R%20and%20Indrajit%20Pal%20and%20Tushar%20Abhishek%20and%20Pawan%20Goyal%20and%20Manish%20Gupta%0AAbstract%3A%20Query%20auto-completion%20%28QAC%29%20has%20been%20widely%20studied%20in%20the%20context%20of%20web%20search%2C%20yet%20remains%20underexplored%20for%20in-document%20search%2C%20which%20we%20term%20DocQAC.%20DocQAC%20aims%20to%20enhance%20search%20productivity%20within%20long%20documents%20by%20helping%20users%20craft%20faster%2C%20more%20precise%20queries%2C%20even%20for%20complex%20or%20hard-to-spell%20terms.%20While%20global%20historical%20queries%20are%20available%20to%20both%20WebQAC%20and%20DocQAC%2C%20DocQAC%20uniquely%20accesses%20document-specific%20context%2C%20including%20the%20current%20document%27s%20content%20and%20its%20specific%20history%20of%20user%20query%20interactions.%0A%20%20To%20address%20this%20setting%2C%20we%20propose%20a%20novel%20adaptive%20trie-guided%20decoding%20framework%20that%20uses%20user%20query%20prefixes%20to%20softly%20steer%20language%20models%20toward%20high-quality%20completions.%20Our%20approach%20introduces%20an%20adaptive%20penalty%20mechanism%20with%20tunable%20hyperparameters%2C%20enabling%20a%20principled%20trade-off%20between%20model%20confidence%20and%20trie-based%20guidance.%20To%20efficiently%20incorporate%20document%20context%2C%20we%20explore%20retrieval-augmented%20generation%20%28RAG%29%20and%20lightweight%20contextual%20document%20signals%20such%20as%20titles%2C%20keyphrases%2C%20and%20summaries.%0A%20%20When%20applied%20to%20encoder-decoder%20models%20like%20T5%20and%20BART%2C%20our%20trie-guided%20framework%20outperforms%20strong%20baselines%20and%20even%20surpasses%20much%20larger%20instruction-tuned%20models%20such%20as%20LLaMA-3%20and%20Phi-3%20on%20seen%20queries%20across%20both%20seen%20and%20unseen%20documents.%20This%20demonstrates%20its%20practicality%20for%20real-world%20DocQAC%20deployments%2C%20where%20efficiency%20and%20scalability%20are%20critical.%20We%20evaluate%20our%20method%20on%20a%20newly%20introduced%20DocQAC%20benchmark%20derived%20from%20ORCAS%2C%20enriched%20with%20query-document%20pairs.%20We%20make%20both%20the%20DocQAC%20dataset%20%28https%3A//bit.ly/3IGEkbH%29%20and%20code%20%28https%3A//github.com/rahcode7/DocQAC%29%20publicly%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18257v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDocQAC%253A%2520Adaptive%2520Trie-Guided%2520Decoding%2520for%2520Effective%2520In-Document%2520Query%2520Auto-Completion%26entry.906535625%3DRahul%2520Mehta%2520and%2520Kavin%2520R%2520and%2520Indrajit%2520Pal%2520and%2520Tushar%2520Abhishek%2520and%2520Pawan%2520Goyal%2520and%2520Manish%2520Gupta%26entry.1292438233%3DQuery%2520auto-completion%2520%2528QAC%2529%2520has%2520been%2520widely%2520studied%2520in%2520the%2520context%2520of%2520web%2520search%252C%2520yet%2520remains%2520underexplored%2520for%2520in-document%2520search%252C%2520which%2520we%2520term%2520DocQAC.%2520DocQAC%2520aims%2520to%2520enhance%2520search%2520productivity%2520within%2520long%2520documents%2520by%2520helping%2520users%2520craft%2520faster%252C%2520more% {"title": "SynAgent: Generalizable Cooperative Humanoid Manipulation via Solo-to-Cooperative Agent Synergy", "author": "Wei Yao and Haohan Ma and Hongwen Zhang and Yunlian Sun and Liangjun Xing and Zhile Yang and Yuanjun Guo and Yebin Liu and Jinhui Tang", "abstract": "Controllable cooperative humanoid manipulation is a fundamental yet challenging problem for embodied intelligence, due to severe data scarcity, complexities in multi-agent coordination, and limited generalization across objects. In this paper, we present SynAgent, a unified framework that enables scalable and physically plausible cooperative manipulation by leveraging Solo-to-Cooperative Agent Synergy to transfer skills from single-agent human-object interaction to multi-agent human-object-human scenarios. To maintain semantic integrity during motion transfer, we introduce an interaction-preserving retargeting method based on an Interact Mesh constructed via Delaunay tetrahedralization, which faithfully maintains spatial relationships among humans and objects. Building upon this refined data, we propose a single-agent pretraining and adaptation paradigm that bootstraps synergistic collaborative behaviors from abundant single-human data through decentralized training and multi-agent PPO. Finally, we develop a trajectory-conditioned generative policy using a conditional VAE, trained via multi-teacher distillation from motion imitation priors to achieve stable and controllable object-level trajectory execution. Extensive experiments demonstrate that SynAgent significantly outperforms existing baselines in both cooperative imitation and trajectory-conditioned control, while generalizing across diverse object geometries. Codes and data will be available after publication. Project Page: http://yw0208.github.io/synagent", "link": "http://arxiv.org/abs/2604.18557v1", "date": "2026-04-20", "relevancy": 2.508, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6409}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.618}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.6147}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SynAgent%3A%20Generalizable%20Cooperative%20Humanoid%20Manipulation%20via%20Solo-to-Cooperative%20Agent%20Synergy&body=Title%3A%20SynAgent%3A%20Generalizable%20Cooperative%20Humanoid%20Manipulation%20via%20Solo-to-Cooperative%20Agent%20Synergy%0AAuthor%3A%20Wei%20Yao%20and%20Haohan%20Ma%20and%20Hongwen%20Zhang%20and%20Yunlian%20Sun%20and%20Liangjun%20Xing%20and%20Zhile%20Yang%20and%20Yuanjun%20Guo%20and%20Yebin%20Liu%20and%20Jinhui%20Tang%0AAbstract%3A%20Controllable%20cooperative%20humanoid%20manipulation%20is%20a%20fundamental%20yet%20challenging%20problem%20for%20embodied%20intelligence%2C%20due%20to%20severe%20data%20scarcity%2C%20complexities%20in%20multi-agent%20coordination%2C%20and%20limited%20generalization%20across%20objects.%20In%20this%20paper%2C%20we%20present%20SynAgent%2C%20a%20unified%20framework%20that%20enables%20scalable%20and%20physically%20plausible%20cooperative%20manipulation%20by%20leveraging%20Solo-to-Cooperative%20Agent%20Synergy%20to%20transfer%20skills%20from%20single-agent%20human-object%20interaction%20to%20multi-agent%20human-object-human%20scenarios.%20To%20maintain%20semantic%20integrity%20during%20motion%20transfer%2C%20we%20introduce%20an%20interaction-preserving%20retargeting%20method%20based%20on%20an%20Interact%20Mesh%20constructed%20via%20Delaunay%20tetrahedralization%2C%20which%20faithfully%20maintains%20spatial%20relationships%20among%20humans%20and%20objects.%20Building%20upon%20this%20refined%20data%2C%20we%20propose%20a%20single-agent%20pretraining%20and%20adaptation%20paradigm%20that%20bootstraps%20synergistic%20collaborative%20behaviors%20from%20abundant%20single-human%20data%20through%20decentralized%20training%20and%20multi-agent%20PPO.%20Finally%2C%20we%20develop%20a%20trajectory-conditioned%20generative%20policy%20using%20a%20conditional%20VAE%2C%20trained%20via%20multi-teacher%20distillation%20from%20motion%20imitation%20priors%20to%20achieve%20stable%20and%20controllable%20object-level%20trajectory%20execution.%20Extensive%20experiments%20demonstrate%20that%20SynAgent%20significantly%20outperforms%20existing%20baselines%20in%20both%20cooperative%20imitation%20and%20trajectory-conditioned%20control%2C%20while%20generalizing%20across%20diverse%20object%20geometries.%20Codes%20and%20data%20will%20be%20available%20after%20publication.%20Project%20Page%3A%20http%3A//yw0208.github.io/synagent%0ALink%3A%20http%3A//arxiv.org/abs/2604.18557v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSynAgent%253A%2520Generalizable%2520Cooperative%2520Humanoid%2520Manipulation%2520via%2520Solo-to-Cooperative%2520Agent%2520Synergy%26entry.906535625%3DWei%2520Yao%2520and%2520Haohan%2520Ma%2520and%2520Hongwen%2520Zhang%2520and%2520Yunlian%2520Sun%2520and%2520Liangjun%2520Xing%2520and%2520Zhile%2520Yang%2520and%2520Yuanjun%2520Guo%2520and%2520Yebin%2520Liu%2520and%2520Jinhui%2520Tang%26entry.1292438233%3DControllable%2520cooperative%2520humanoid%2520manipulation%2520is%2520a%2520fundamental%2520yet%2520challenging%2520problem%2520for%2520embodied%2520intelligence%252C%2520due%2520to%2520severe%2520data%2520scarcity%252C%2520complexities%2520in%2520multi-agent%2520coordination%252C%2520and%2520limited%2520generalization%2520across%2520objects.%2520In%2520this%2520paper%252C%2520we%2520present%2520SynAgent%252C%2520a%2520unified%2520framework%2520that%2520enables%2520scalable%2520and%2520physically%2520plausible%2520cooperative%2520manipulation%2520by%2520leveraging%2520Solo-to-Cooperative%2520Agent%2520 {"title": "ResearchBench: Benchmarking LLMs in Scientific Discovery via Inspiration-Based Task Decomposition", "author": "Yujie Liu and Zonglin Yang and Tong Xie and Jinjie Ni and Ben Gao and Yuqiang Li and Shixiang Tang and Wanli Ouyang and Erik Cambria and Dongzhan Zhou", "abstract": "Large language models (LLMs) have shown potential in assisting scientific research, yet their ability to discover high-quality research hypotheses remains unexamined due to the lack of a dedicated benchmark. To address this gap, we introduce the first large-scale benchmark for evaluating LLMs on a sufficient set of scientific discovery sub-tasks-inspiration retrieval, hypothesis composition, and hypothesis ranking-where sufficient means that perfectly solving these sub-tasks perfectly solves the overall discovery task. We develop an automated LLM-based framework that extracts critical components-research questions, background surveys, inspirations, and hypotheses-from papers across 12 disciplines, with expert validation confirming its accuracy. To prevent data contamination, we focus exclusively on publications from 2024 onward, ensuring minimal overlap with LLM pretraining data; our automated framework further enables automatic extraction of even more recent papers as LLM pretraining cutoffs advance, supporting scalable and contamination-free automatic renewal of this discovery benchmark. Our evaluation shows that, across disciplines, LLMs excel at inspiration retrieval-an out-of-distribution task-suggesting their ability to surface novel knowledge associations.", "link": "http://arxiv.org/abs/2503.21248v3", "date": "2026-04-20", "relevancy": 2.5073, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5111}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5111}, {"t {"title": "GSQ: Highly-Accurate Low-Precision Scalar Quantization for LLMs via Gumbel-Softmax Sampling", "author": "Alireza Dadgarnia and Soroush Tabesh and Mahdi Nikdan and Michael Helcig and Eldar Kurtic and Dan Alistarh", "abstract": "Weight quantization has become a standard tool for efficient LLM deployment, especially for local inference, where models are now routinely served at 2-3 bits per parameter. The state of the art is currently split into two sets of methods: simple scalar quantization techniques, such as GPTQ or AWQ, which are widely deployed but plateau in accuracy at 3-4 bits per parameter (bpp), and \"second-generation\" vector- or trellis-quantized methods, such as QTIP, GPTVQ and AQLM, which push the accuracy frontier at low bit-widths but are notoriously hard to implement and to scale, and have gained relatively less traction. In this paper, we ask whether this gap is fundamental, or whether a carefully optimized scalar quantizer can recover most of it. We answer in the affirmative, by introducing GSQ (Gumbel-Softmax Quantization), a post-training scalar quantization method which jointly learns the per-coordinate grid assignments and the per-group scales using a Gumbel-Softmax relaxation of the discrete grid. GSQ matches the cardinality of the relaxation to the small number of levels available in the target bit-width regime (e.g., 3-8 levels for ternary and 3 bpp, respectively), making the relaxation tight and the optimization tractable. Practically, on the standard Llama-3.1-8B/70B-Instruct models, GSQ closes most of the gap between scalar quantization and the QTIP frontier at 2 and 3 bits, while using a symmetric scalar grid with group-wise quantization, and thus fully compatible with existing scalar inference kernels. We further show that GSQ scales to trillion-scale Mixture-of-Experts models such as Kimi-K2.5, where vector-quantized methods are difficult to apply.", "link": "http://arxiv.org/abs/2604.18556v1", "date": "2026-04-20", "relevancy": 2.5009, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5108}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5013}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4884}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GSQ%3A%20Highly-Accurate%20Low-Precision%20Scalar%20Quantization%20for%20LLMs%20via%20Gumbel-Softmax%20Sampling&body=Title%3A%20GSQ%3A%20Highly-Accurate%20Low-Precision%20Scalar%20Quantization%20for%20LLMs%20via%20Gumbel-Softmax%20Sampling%0AAuthor%3A%20Alireza%20Dadgarnia%20and%20Soroush%20Tabesh%20and%20Mahdi%20Nikdan%20and%20Michael%20Helcig%20and%20Eldar%20Kurtic%20and%20Dan%20Alistarh%0AAbstract%3A%20Weight%20quantization%20has%20become%20a%20standard%20tool%20for%20efficient%20LLM%20deployment%2C%20especially%20for%20local%20inference%2C%20where%20models%20are%20now%20routinely%20served%20at%202-3%20bits%20per%20parameter.%20The%20state%20of%20the%20art%20is%20currently%20split%20into%20two%20sets%20of%20methods%3A%20simple%20scalar%20quantization%20techniques%2C%20such%20as%20GPTQ%20or%20AWQ%2C%20which%20are%20widely%20deployed%20but%20plateau%20in%20accuracy%20at%203-4%20bits%20per%20parameter%20%28bpp%29%2C%20and%20%22second-generation%22%20vector-%20or%20trellis-quantized%20methods%2C%20such%20as%20QTIP%2C%20GPTVQ%20and%20AQLM%2C%20which%20push%20the%20accuracy%20frontier%20at%20low%20bit-widths%20but%20are%20notoriously%20hard%20to%20implement%20and%20to%20scale%2C%20and%20have%20gained%20relatively%20less%20traction.%20In%20this%20paper%2C%20we%20ask%20whether%20this%20gap%20is%20fundamental%2C%20or%20whether%20a%20carefully%20optimized%20scalar%20quantizer%20can%20recover%20most%20of%20it.%20We%20answer%20in%20the%20affirmative%2C%20by%20introducing%20GSQ%20%28Gumbel-Softmax%20Quantization%29%2C%20a%20post-training%20scalar%20quantization%20method%20which%20jointly%20learns%20the%20per-coordinate%20grid%20assignments%20and%20the%20per-group%20scales%20using%20a%20Gumbel-Softmax%20relaxation%20of%20the%20discrete%20grid.%20GSQ%20matches%20the%20cardinality%20of%20the%20relaxation%20to%20the%20small%20number%20of%20levels%20available%20in%20the%20target%20bit-width%20regime%20%28e.g.%2C%203-8%20levels%20for%20ternary%20and%203%20bpp%2C%20respectively%29%2C%20making%20the%20relaxation%20tight%20and%20the%20optimization%20tractable.%20Practically%2C%20on%20the%20standard%20Llama-3.1-8B/70B-Instruct%20models%2C%20GSQ%20closes%20most%20of%20the%20gap%20between%20scalar%20quantization%20and%20the%20QTIP%20frontier%20at%202%20and%203%20bits%2C%20while%20using%20a%20symmetric%20scalar%20grid%20with%20group-wise%20quantization%2C%20and%20thus%20fully%20compatible%20with%20existing%20scalar%20inference%20kernels.%20We%20further%20show%20that%20GSQ%20scales%20to%20trillion-scale%20Mixture-of-Experts%20models%20such%20as%20Kimi-K2.5%2C%20where%20vector-quantized%20methods%20are%20difficult%20to%20apply.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18556v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGSQ%253A%2520Highly-Accurate%2520Low-Precision%2520Scalar%2520Quantization%2520for%2520LLMs%2520via%2520Gumbel-Softmax%2520Sampling%26entry.906535625%3DAlireza%2520Dadgarnia%2520and%2520Soroush%2520Tabesh%2520and%2520Mahdi%2520Nikdan%2520and%2520Michael%2520Helcig%2520and%2520Eldar%2520Kurtic%2520and%2520Dan%2520Alistarh%26entry.1292438233%3DWeight%2520quantization%2520has%2520become%2520a%2520standard%2520tool%2520for%2520efficient%2520LLM%2520deployment%252C%2520especially%2520for%2520local%2520inference%252C%2520where%2520models%2520are%2520now%2520routinely%2520served%2520at%25202-3%2 {"title": "Randomly Initialized Networks Can Learn from Peer-to-Peer Consensus", "author": "Esteban Rodr\u00edguez-Betancourt and Edgar Casasola-Murillo", "abstract": "In self-supervised learning, self-distilled methods have shown impressive performance, learning representations useful for downstream tasks and even displaying emergent properties. However, state-of-the-art methods usually rely on ensembles of complex mechanisms, with many design choices that are empirically motivated and not well understood.\n  In this work, we explore the role of self-distillation within learning dynamics. Specifically, we isolate the effect of self-distillation by training a group of randomly initialized networks, removing all other common components such as projectors, predictors, and even pretext tasks. Our findings show that even this minimal setup can lead to learned representations with non-trivial improvements over a random baseline on downstream tasks. We also demonstrate how this effect varies with different hyperparameters and present a short analysis of what is being learned by the models under this setup.", "link": "http://arxiv.org/abs/2604.18390v1", "date": "2026-04-20", "relevancy": 2.4925, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5101}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4948}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4906}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Randomly%20Initialized%20Networks%20Can%20Learn%20from%20Peer-to-Peer%20Consensus&body=Title%3A%20Randomly%20Initialized%20Networks%20Can%20Learn%20from%20Peer-to-Peer%20Consensus%0AAuthor%3A%20Esteban%20Rodr%C3%ADguez-Betancourt%20and%20Edgar%20Casasola-Murillo%0AAbstract%3A%20In%20self-supervised%20learning%2C%20self-distilled%20methods%20have%20shown%20impressive%20performance%2C%20learning%20representations%20useful%20for%20downstream%20tasks%20and%20even%20displaying%20emergent%20properties.%20However%2C%20state-of-the-art%20methods%20usually%20rely%20on%20ensembles%20of%20complex%20mechanisms%2C%20with%20many%20design%20choices%20that%20are%20empirically%20motivated%20and%20not%20well%20understood.%0A%20%20In%20this%20work%2C%20we%20explore%20the%20role%20of%20self-distillation%20within%20learning%20dynamics.%20Specifically%2C%20we%20isolate%20the%20effect%20of%20self-distillation%20by%20training%20a%20group%20of%20randomly%20initialized%20networks%2C%20removing%20all%20other%20common%20components%20such%20as%20projectors%2C%20predictors%2C%20and%20even%20pretext%20tasks.%20Our%20findings%20show%20that%20even%20this%20minimal%20setup%20can%20lead%20to%20learned%20representations%20with%20non-trivial%20improvements%20over%20a%20random%20baseline%20on%20downstream%20tasks.%20We%20also%20demonstrate%20how%20this%20effect%20varies%20with%20different%20hyperparameters%20and%20present%20a%20short%20analysis%20of%20what%20is%20being%20learned%20by%20the%20models%20under%20this%20setup.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18390v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRandomly%2520Initialized%2520Networks%2520Can%2520Learn%2520from%2520Peer-to-Peer%2520Consensus%26entry.906535625%3DEsteban%2520Rodr%25C3%25ADguez-Betancourt%2520and%2520Edgar%2520Casasola-Murillo%26entry.1292438233%3DIn%2520self-supervised%2520learning%252C%2520self-distilled%2520methods%2520have%2520shown%2520impressive%2520performance%252C%2520learning%2520representations%2520useful%2520for%2520downstream%2520tasks%2520and%2520even%2520displaying%2520emergent%2520properties.%2520However%252C%2520state-of-the-art%2520methods%2520usually%2520rely%2520on%2520ensembles%2520of%2520complex%2520mechanisms%252C%2520with%2520many%2520design%2520choices%2520that%2520are%2520empirically%2520motivated%2520and%2520not%2520well%2520understood.%250A%2520%2520In%2520this%2520work%252C%2520we%2520explore%2520the%2520role%2520of%2520self-distillation%2520within%2520learning%2520dynamics.%2520Specifically%252C%2520we%2520isolate%2520the%2520effect%2520of%2520self-distillation%2520by%2520training%2520a%2520group%2520of%2520randomly%2520initialized%2520networks%252C%2520removing%2520all%2520other%2520common%2520components%2520such%2520as%2520projectors%252C%2520predictors%252C%2520and%2520even%2520pretext%2520tasks.%2520Our%2520findings%2520show%2520that%2520even%2520this%2520minimal%2520setup%2520can%2520lead%2520to%2520learned%2520representations%2520with%2520non-trivial%2520improvements%2520over%2520a%2520random%2520baseline%2520on%2520downstream%2520tasks.%2520We%2520also%2520demonstrate%2520how%2520this%2520effect%2520varies%2520with%2520different%2520hyperparameters%2520and%2520present%2520a%2520short%2520analysis%2520of%2520what%2520is%2520being%2520learned%2520by%2520the%2520models%2520under%2520this%2520setup.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.18390v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Randomly%20Initialized%20Networks%20Can%20Learn%20from%20Peer-to-Peer%20Consensus&entry.906535625=Esteban%20Rodr%C3%ADguez-Betancourt%20and%20Edgar%20Casasola-Murillo&entry.1292438233=In%20self-supervised%20learning%2C%20self-distilled%20methods%20have%20shown%20impressive%20performance%2C%20learning%20representations%20useful%20for%20downstream%20tasks%20and%20even%20displaying%20emergent%20properties.%20However%2C%20state-of-the-art%20methods%20usually%20rely%20on%20ensembles%20of%20complex%20mechanisms%2C%20with%20many%20design%20choices%20that%20are%20empirically%20motivated%20and%20not%20well%20understood.%0A%20%20In%20thi {"title": "Is SAM3 ready for pathology segmentation?", "author": "Qiuyu Kong and Shakiba Sharifi and Zanxi Ruan and Yiming Wang and Marco Cristani", "abstract": "Is Segment Anything Model 3 (SAM3) capable in segmenting Any Pathology Images? Digital pathology segmentation spans tissue-level and nuclei-level scales, where traditional methods often suffer from high annotation costs and poor generalization. SAM3 introduces Promptable Concept Segmentation, offering a potential automated interface via text prompts. With this work, we propose a systematic evaluation protocol to explore the capability space of SAM3 in a structured manner. Specifically, we evaluate SAM3 under different supervision settings including zero-shot, few-shot, and supervised with varying prompting strategies. Our extensive evaluation on pathological datasets including NuInsSeg, PanNuke and GlaS, reveals that: 1.text-only prompts poorly activate nuclear concepts. 2.performance is highly sensitive to visual prompt types and budgets. 3.few-shot learning offers gains, but SAM3 lacks robustness against visual prompt noise. and 4.a significant gap persists between prompt-based usage and task-trained adapter-based reference. Our study delineates SAM3's boundaries in pathology image segmentation and provides practical guidance on the necessity of pathology domain adaptation.", "link": "http://arxiv.org/abs/2604.18225v1", "date": "2026-04-20", "relevancy": 2.4895, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5049}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4944}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4944}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Is% e%2520on%2520the%2520necessity%2520of%2520pathology%2520domain%2520adaptation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.18225v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Is%20SAM3%20ready%20for%20pathology%20segmentation%3F&entry.906535625=Qiuyu%20Kong%20and%20Shakiba%20Sharifi%20and%20Zanxi%20Ruan%20and%20Yiming%20Wang%20and%20Marco%20Cristani&entry.1292438233=Is%20Segment%20Anything%20Model%203%20%28SAM3%29%20capable%20in%20segmenting%20Any%20Pathology%20Images%3F%20Digital%20pathology%20segmentation%20spans%20tissue-level%20and%20nuclei-level%20scales%2C%20where%20traditional%20methods%20often%20suffer%20from%20high%20annotation%20costs%20and%20poor%20generalization.%20SAM3%20introduces%20Promptable%20Concept%20Segmentation%2C%20offering%20a%20potential%20automated%20interface%20via%20text%20prompts.%20With%20this%20work%2C%20we%20propose%20a%20systematic%20evaluation%20protocol%20to%20explore%20the%20capability%20space%20of%20SAM3%20in%20a%20structured%20manner.%20Specifically%2C%20we%20evaluate%20SAM3%20under%20different%20supervision%20settings%20including%20zero-shot%2C%20few-shot%2C%20and%20supervised%20with%20varying%20prompting%20strategies.%20Our%20extensive%20evaluation%20on%20pathological%20datasets%20including%20NuInsSeg%2C%20PanNuke%20and%20GlaS%2C%20reveals%20that%3A%201.text-only%20prompts%20poorly%20activate%20nuclear%20concepts.%202.performance%20is%20highly%20sensitive%20to%20visual%20prompt%20types%20and%20budgets.%203.few-shot%20learning%20offers%20gains%2C%20but%20SAM3%20lacks%20robustness%20against%20visual%20prompt%20noise.%20and%204.a%20significant%20gap%20persists%20between%20prompt-based%20usage%20and%20task-trained%20adapter-based%20reference.%20Our%20study%20delineates%20SAM3%27s%20boundaries%20in%20pathology%20image%20segmentation%20and%20provides%20practical%20guidance%20on%20the%20necessity%20of%20pathology%20domai {"title": "Do LLMs Encode Functional Importance of Reasoning Tokens?", "author": "Janvijay Singh and Dilek Hakkani-T\u00fcr", "abstract": "Large language models solve complex tasks by generating long reasoning chains, achieving higher accuracy at the cost of increased computational cost and reduced ability to isolate functionally relevant reasoning. Prior work on compact reasoning shortens such chains through probabilistic sampling, heuristics, or supervision from frontier models, but offers limited insight into whether models internally encode token-level functional importance for answer generation. We address this gap diagnostically and propose greedy pruning, a likelihood-preserving deletion procedure that iteratively removes reasoning tokens whose removal minimally degrades model likelihood under a specified objective, yielding length-controlled reasoning chains. We evaluate pruned reasoning in a distillation framework and show that students trained on pruned chains outperform a frontier-model-supervised compression baseline at matched reasoning lengths. Finally, our analysis reveals systematic pruning patterns and shows that attention scores can predict greedy pruning ranks, further suggesting that models encode a nontrivial functional importance structure over reasoning tokens.", "link": "http://arxiv.org/abs/2601.03066v2", "date": "2026-04-20", "relevancy": 2.4889, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5054}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5054}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4825}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Do%20LLMs%20Encode%20Functional%20Importance%20of%20Reasoning%20Tokens%3F&body=Title%3A%20Do%20LLMs%20Encode%20Functional%20Importance%20of%20Reasoning%20Tokens%3F%0AAuthor%3A%20Janvijay%20Singh%20and%20Dilek%20Hakkani-T%C3%BCr%0AAbstract%3A%20Large%20language%20models%20solve%20complex%20tasks%20by%20generating%20long%20reasoning%20chains%2C%20achieving%20higher%20accuracy%20at%20the%20cost%20of%20increased%20computational%20cost%20and%20reduced%20ability%20to%20isolate%20functionally%20relevant%20reasoning.%20Prior%20work%20on%20compact%20reasoning%20shortens%20such%20chains%20through%20probabilistic%20sampling%2C%20heuristics%2C%20or%20supervision%20from%20frontier%20models%2C%20but%20offers%20limited%20insight%20into%20whether%20models%20internally%20encode%20token-level%20functional%20importance%20for%20answer%20generation.%20We%20address%20this%20gap%20diagnostically%20and%20propose%20greedy%20pruning%2C%20a%20likelihood-preserving%20deletion%20procedure%20that%20iteratively%20removes%20reasoning%20tokens%20whose%20removal%20minimally%20degrades%20model%20likelihood%20under%20a%20specified%20objective%2C%20yielding%20length-controlled%20reasoning%20chains.%20We%20evaluate%20pruned%20reasoning%20in%20a%20distillation%20framework%20and%20show%20that%20students%20trained%20on%20pruned%20chains%20outperform%20a%20frontier-model-supervised%20compression%20baseline%20at%20matched%20reasoning%20lengths.%20Finally%2C%20our%20analysis%20reveals%20systematic%20pruning%20patterns%20and%20shows%20that%20attention%20scores%20can%20predict%20greedy%20pruning%20ranks%2C%20further%20suggesting%20that%20models%20encode%20a%20nontrivial%20functional%20importance%20structure%20over%20reasoning%20tokens.%0ALink%3A%20http%3A//arxiv.org/abs/2601.03066v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDo%2520LLMs%2520Encode%2520Functional%2520Importance%2520of%2520Reasoning%2520Tokens%253F%26entry.906535625%3DJanvijay%2520Singh%2520and%2 {"title": "Asset Harvester: Extracting 3D Assets from Autonomous Driving Logs for Simulation", "author": "Tianshi Cao and Jiawei Ren and Yuxuan Zhang and Jaewoo Seo and Jiahui Huang and Shikhar Solanki and Haotian Zhang and Mingfei Guo and Haithem Turki and Muxingzi Li and Yue Zhu and Sipeng Zhang and Zan Gojcic and Sanja Fidler and Kangxue Yin", "abstract": "Closed-loop simulation is a core component of autonomous vehicle (AV) development, enabling scalable testing, training, and safety validation before real-world deployment. Neural scene reconstruction converts driving logs into interactive 3D environments for simulation, but it does not produce complete 3D object assets required for agent manipulation and large-viewpoint novel-view synthesis. To address this challenge, we present Asset Harvester, an image-to-3D model and end-to-end pipeline that converts sparse, in-the-wild object observations from real driving logs into complete, simulation-ready assets. Rather than relying on a single model component, we developed a system-level design for real-world AV data that combines large-scale curation of object-centric training tuples, geometry-aware preprocessing across heterogeneous sensors, and a robust training recipe that couples sparse-view-conditioned multiview generation with 3D Gaussian lifting. Within this system, SparseViewDiT is explicitly designed to address limited-angle views and other real-world data challenges. Together with hybrid data curation, augmentation, and self-distillation, this system enables scalable conversion of sparse AV object observations into reusable 3D assets.", "link": "http://arxiv.org/abs/2604.18468v1", "date": "2026-04-20", "relevancy": 2.4874, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6248}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6248}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6073}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Asset%20Harvester%3A%20Extracting%203D%20Assets%20from%20Autonomous%20Driving%20Logs%20for%20Simulation&body=Title%3A%20Asset%20Harvester%3A%20Extracting%203D%20Assets%20from%20Autonomous%20Driving%20Logs%20for%20Simulation%0AAuthor%3A%20Tianshi%20Cao%20and%20Jiawei%20Ren%20and%20Yuxuan%20Zhang%20and%20Jaewoo%20Seo%20and%20Jiahui%20Huang%20and%20Shikhar%20Solanki%20and%20Haotian%20Zhang%20and%20Mingfei%20Guo%20and%20Haithem%20Turki%20and%20Muxingzi%20Li%20and%20Yue%20Zhu%20and%20Sipeng%20Zhang%20and%20Zan%20Gojcic%20and%20Sanja%20Fidler%20and%20Kangxue%20Yin%0AAbstract%3A%20Closed-loop%20simulation%20is%20a%20core%20component%20of%20autonomous%20vehicle%20%28AV%29%20development%2C%20enabling%20scalable%20testing%2C%20training%2C%20and%20safety%20validation%20before%20real-world%20deployment.%20Neural%20scene%20reconstruction%20converts%20driving%20logs%20into%20interactive%203D%20environments%20for%20simulation%2C%20but%20it%20does%20not%20produce%20complete%203D%20object%20assets%20required%20for%20agent%20manipulation%20and%20large-viewpoint%20novel-view%20synthesis.%20To%20address%20this%20challenge%2C%20we%20present%20Asset%20Harvester%2C%20an%20image-to-3D%20model%20and%20end-to-end%20pipeline%20that%20converts%20sparse%2C%20in-the-wild%20object%20observations%20from%20real%20driving%20logs%20into%20complete%2C%20simulation-ready%20assets.%20Rather%20than%20relying%20on%20a%20single%20model%20component%2C%20we%20developed%20a%20system-level%20design%20for%20real-world%20AV%20data%20that%20combines%20large-scale%20curation%20of%20object-centric%20training%20tuples%2C%20geometry-aware%20preprocessing%20across%20heterogeneous%20sensors%2C%20and%20a%20robust%20training%20recipe%20that%20couples%20sparse-view-conditioned%20multiview%20generation%20with%203D%20Gaussian%20lifting.%20Within%20this%20system%2C%20SparseViewDiT%20is%20explicitly%20designed%20to%20address%20limited-angle%20views%20and%20other%20real-world%20data%20challenges.%20Together%20with%20hybrid%20data%20curation%2C%20augmentation%2C%20and%20self-distillation%2C%20this%20system%20enables%20scalable%20conversion%20of%20sparse%20AV%20object%20observations%20into%20reusable%203D%20assets.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18468v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAsset%2520Harvester%253A%2520Extracting%25203D%2520Assets%2520from%2520Autonomous%2520Driving%2520Logs%2520for%2520Simulation%26entry.906535625%3DTianshi%2520Cao%2520and%2520Jiawei%2520Ren%2520and%2520Yuxuan%2520Zhang%2520and%2520Jaewoo%2520Seo%2520and%2520Jiahui%2520Huang%2520and%2520Shikhar%2520Solanki%2520and%2520Haotian%2520Zhang%2520and%2520Mingfei%2520Guo%2520and%2520Haithem%2520Turki%2520and%2520Muxingzi%2520Li%2520and%2520Yue%2520Zhu%2520and%2520Sipeng%2520Zhang%2520and%2520Zan%2520Gojcic%2520and%2520Sanja%2520Fidler%2520and%2520Kangxue%2520Yin%26entry.1292438233%3DClosed-loop%2520simulation%2520is%2520a%2520core%2520component%2520of%2520autonomous%2520vehicle%2520%2528AV%2529%2520development%252C%2520enabling%2520scalable%2520testing%252C%2520training%252C%2520and%2520safety%2520validation%2520before%2520real-world%2520deployment.%2520Neural%2520scene%2520reconstruction%2520converts%2520driving%2520logs%2520into%2520interactive%25203D%2520environments%2520for%2520simulation%252C%2520but%2520it%2520does%2520not%2520produce%2520complete%25203D%2520object%2520assets%2520required%2520for%2520agent%2520manipulation%2520and%2520large-viewpoint%2520novel-view%2520synthesis.%2520To%2520address%2520this%2520challenge%252C%2520we%2520present%2520Asset%2520Harvester%252C%2520an%2520image-to-3D%2520model%2520and%2520end-to-end%2520pipeline%2520that%2520converts%2520sparse%252C%2 {"title": "Using Perspectival Words Is Harder Than Vocabulary Words for Humans and Even More So for Multimodal Language Models", "author": "Dota Tianai Dong and Yifan Luo and Po-Ya Angela Wang and Asli Ozyurek and Paula Rubio-Fernandez", "abstract": "Multimodal language models (MLMs) increasingly demonstrate human-like communication, yet their use of everyday perspectival words remains poorly understood. To address this gap, we compare humans and MLMs in their use of three word types that impose increasing cognitive demands: vocabulary (for example, \"boat\" or \"cup\"), possessives (for example, \"mine\" versus \"yours\"), and demonstratives (for example, \"this one\" versus \"that one\"). Testing seven MLMs against human participants, we find that perspectival words are harder than vocabulary words for both groups. The gap is larger for MLMs: while models approach human-level performance on vocabulary, they show clear deficits with possessives and even greater difficulty with demonstratives. Ablation analyses indicate that limitations in perspective-taking and spatial reasoning are key sources of these gaps. Instruction-based prompting reduces the gap for possessives but leaves demonstratives far below human performance. These results show that, unlike vocabulary, perspectival words pose a greater challenge in human communication, and this difficulty is amplified in MLMs, revealing a shortfall in their pragmatic and social-cognitive abilities.", "link": "http://arxiv.org/abs/2506.00065v2", "date": "2026-04-20", "relevancy": 2.4814, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5085}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5085}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/a {"title": "SemLT3D: Semantic-Guided Expert Distillation for Camera-only Long-Tailed 3D Object Detection", "author": "Hao Vo and Khoa Vo and Thinh Phan and Ngo Xuan Cuong and Gianfranco Doretto and Hien Nguyen and Anh Nguyen and Ngan Le", "abstract": "Camera-only 3D object detection has emerged as a cost-effective and scalable alternative to LiDAR for autonomous driving, yet existing methods primarily prioritize overall performance while overlooking the severe long-tail imbalance inherent in real-world datasets. In practice, many rare but safety-critical categories such as children, strollers, or emergency vehicles are heavily underrepresented, leading to biased learning and degraded performance. This challenge is further exacerbated by pronounced inter-class ambiguity (e.g., visually similar subclasses) and substantial intra-class diversity (e.g., objects varying widely in appearance, scale, pose, or context), which together hinder reliable long-tail recognition. In this work, we introduce SemLT3D, a Semantic-Guided Expert Distillation framework designed to enrich the representation space for underrepresented classes through semantic priors. SemLT3D consists of: (1) a language-guided mixture-of-experts module that routes 3D queries to specialized experts according to their semantic affinity, enabling the model to better disentangle confusing classes and specialize on tail distributions; and (2) a semantic projection distillation pipeline that aligns 3D queries with CLIP-informed 2D semantics, producing more coherent and discriminative features across diverse visual manifestations. Although motivated by long-tail imbalance, the semantically structured learning in SemLT3D also improves robustness under broader appearance variations and challenging corner cases, offering a principled step toward more reliable camera-only 3D perception.", "link": "http://arxiv.org/abs/2604.18476v1", "date": "2026-04-20", "relevancy": 2.4809, "topK": [{"title": "MEDL-U: Uncertainty-aware ion%20framework%20designed%20to%20enrich%20the%20representation%20space%20for%20underrepresented%20classes%20through%20semantic%20priors.%20SemLT3D%20consists%20of%3A%20%281%29%20a%20language-guided%20mixture-of-experts%20module%20that%20routes%203D%20queries%20to%20specialized%20experts%20according%20to%20their%20semantic%20affinity%2C%20enabling%20the%20model%20to%20better%20disentangle%20confusing%20classes%20and%20specialize%20on%20tail%20distributions%3B%20and%20%282%29%20a%20semantic%20projection%20distillation%20pipeline%20that%20aligns%203D%20queries%20with%20CLIP-informed%202D%20semantics%2C%20producing%20more%20coherent%20and%20discriminative%20features%20across%20diverse%20visual%20manifestations.%20Although%20motivated%20by%20long-tail%20imbalance%2C%20the%20semantically%20structured%20learning%20in%20SemLT3D%20also%20improves%20robustness%20under%20broader%20appearance%20variations%20and%20challenging%20corner%20cases%2C%20offering%20a%20principled%20step%20toward%20more%20reliable%20camera-only%203D%20perception.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18476v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSemLT3D%253A%2520Semantic-Guided%2520Expert%2520Distillation%2520for%2520Camera-only%2520Long-Tailed%25203D%2520Object%2520Detection%26entry.906535625%3DHao%2520Vo%2520and%2520Khoa%2520Vo%2520and%2520Thinh%2520Phan%2520and%2520Ngo%2520Xuan%2520Cuong%2520and%2520Gianfranco%2520Doretto%2520and%2520Hien%2520Nguyen%2520and%2520Anh%2520Nguyen%2520and%2520Ngan%2520Le%26entry.1292438233%3DCamera-only%25203D%2520object%2520detection%2520has%2520emerged%2520as%2520a%2520cost-effective%2520and%2520scalable%2520alternative%2520to%2520LiDAR%2520for%2520autonomous%2520driving%252C%2520yet%2520existing%2520methods%2520primarily%2520prioritize%2520overall%2520performance%2520while%2520overlooking%2520the%2520severe%2520long-tail%2520imbalance%2520inherent%2520in%2520real-world%2 ing%2520corner%2520cases%252C%2520offering%2520a%2520principled%2520step%2520toward%2520more%2520reliable%2520camera-only%25203D%2520perception.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.18476v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SemLT3D%3A%20Semantic-Guided%20Expert%20Distillation%20for%20Camera-only%20Long-Tailed%203D%20Object%20Detection&entry.906535625=Hao%20Vo%20and%20Khoa%20Vo%20and%20Thinh%20Phan%20and%20Ngo%20Xuan%20Cuong%20and%20Gianfranco%20Doretto%20and%20Hien%20Nguyen%20and%20Anh%20Nguyen%20and%20Ngan%20Le&entry.1292438233=Camera-only%203D%20object%20detection%20has%20emerged%20as%20a%20cost-effective%20and%20scalable%20alternative%20to%20LiDAR%20for%20autonomous%20driving%2C%20yet%20existing%20methods%20primarily%20prioritize%20overall%20performance%20while%20overlooking%20the%20severe%20long-tail%20imbalance%20inherent%20in%20real-world%20datasets.%20In%20practice%2C%20many%20rare%20but%20safety-critical%20categories%20such%20as%20children%2C%20strollers%2C%20or%20emergency%20vehicles%20are%20heavily%20underrepresented%2C%20leading%20to%20biased%20learning%20and%20degraded%20performance.%20This%20challenge%20is%20further%20exacerbated%20by%20pronounced%20inter-class%20ambiguity%20%28e.g.%2C%20visually%20similar%20subclasses%29%20and%20substantial%20intra-class%20diversity%20%28e.g.%2C%20objects%20varying%20widely%20in%20appearance%2C%20scale%2C%20pose%2C%20or%20context%29%2C%20which%20together%20hinder%20reliable%20long-tail%20recognition.%20In%20this%20work%2C%20we%20introduce%20SemLT3D%2C%20a%20Semantic-Guided%20Expert%20Distillation%20framework%20designed%20to%20enrich%20the%20representation%20space%20for%20underrepresented%20classes%20through%20semantic%20priors.%20SemLT3D%20consists%20of%3A%20%281%29%20a%20language-guided%20mixture-of-experts%20module%20that%20routes%203D%20queries%20to%20specialized%20experts%20according% {"title": "Foundation Model for Cardiac Time Series via Masked Latent Attention", "author": "Moritz Vandenhirtz and Samuel Ruip\u00e9rez-Campillo and Simon B\u00f6hi and Sonia Laguna and Irene Cannistraci and Andrea Agostini and Ece Ozkan and Thomas M. Sutter and Julia E. Vogt", "abstract": "Electrocardiograms (ECGs) are among the most widely available clinical signals and play a central role in cardiovascular diagnosis. While recent foundation models (FMs) have shown promise for learning transferable ECG representations, most existing pretraining approaches treat leads as independent channels and fail to explicitly leverage their strong structural redundancy. We introduce the latent attention masked autoencoder (LAMAE) FM that directly exploits this structure by learning cross-lead connection mechanisms during self-supervised pretraining. Our approach models higher-order interactions across leads through latent attention, enabling permutation-invariant aggregation and adaptive weighting of lead-specific representations. We provide empirical evidence on the Mimic-IV-ECG database that leveraging the cross-lead connection constitutes an effective form of structural supervision, improving representation quality and transferability. Our method shows strong performance in predicting ICD-10 codes, outperforming independent-lead masked modeling and alignment-based baselines.", "link": "http://arxiv.org/abs/2603.26475v2", "date": "2026-04-20", "relevancy": 2.474, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5107}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4895}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4843}], "

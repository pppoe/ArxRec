0and%20target-conditioned%20expansion%20insufficiently%20integrated.%20Results%3A%20We%20present%20an%20integrated%20framework%20for%20early-stage%20peptide%20screening%20that%20combines%20a%20partner-aware%20prediction%20and%20localization%20model%20%28ConGA-PepPI%29%20with%20a%20target-conditioned%20generative%20model%20%28TC-PepGen%29.%20ConGA-PepPI%20uses%20asymmetric%20encoding%2C%20bidirectional%20cross-attention%2C%20and%20progressive%20transfer%20from%20pair%20prediction%20to%20binding-site%20localization%2C%20while%20TC-PepGen%20preserves%20target%20information%20throughout%20autoregressive%20decoding%20via%20layerwise%20conditioning.%20In%20five-fold%20cross-validation%2C%20ConGA-PepPI%20achieved%200.839%20accuracy%20and%200.921%20AUROC%2C%20with%20binding-site%20AUPR%20values%20of%200.601%20on%20the%20protein%20side%20and%200.950%20on%20the%20peptide%20side%2C%20and%20remained%20competitive%20on%20external%20benchmarks.%20Under%20a%20controlled%20length-conditioned%20benchmark%2C%2040.39%25%20of%20TC-PepGen%20peptides%20exceeded%20native%20templates%20in%20AlphaFold%203%20ipTM%2C%20and%20unconstrained%20generation%20retained%20evidence%20of%20target-conditioned%20signal.&entry.1838667208=http%3A//arxiv.org/abs/2604.18467v1&entry.124074799=Read"},
{"title": "An Exploration of Mamba for Speech Self-Supervised Models", "author": "Tzu-Quan Lin and Heng-Cheng Kuo and Tzu-Chieh Wei and Hsi-Chun Cheng and Chun Wei Chen and Hsien-Fu Hsiao and Yu Tsao and Hung-yi Lee", "abstract": "While Mamba has demonstrated strong performance in language modeling, its potential as a speech self-supervised learning (SSL) model remains underexplored, with prior studies limited to isolated tasks. To address this, we explore Mamba-based HuBERT models as alternatives to Transformer-based SSL architectures. Leveraging the linear-time Selective State Space, these models enable fine-tuning on long-context ASR with significantly lower compute. Moreover, they show superior performance when fine-tuned for streaming ASR. Beyond fine-tuning, these models show competitive performance on SUPERB probing benchmarks, particularly in causal settings. Our analysis shows that they yield higher-quality quantized representations and capture speaker-related features more distinctly than Transformer-based models. These findings highlight Mamba-based SSL as a promising and complementary direction for long-sequence modeling, real-time speech modeling, and speech unit extraction. The codebase is available at https://github.com/hckuo145/Mamba-based-HuBERT.", "link": "http://arxiv.org/abs/2506.12606v2", "date": "2026-04-20", "relevancy": 2.3216, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4904}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4513}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4513}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20An%20Exploration%20of%20Mamba%20for%20Speech%20Self-Supervised%20Models&body=Title%3A%20An%20Exploration%20of%20Mamba%20for%20Speech%20Self-Supervised%20Models%0AAuthor%3A%20Tzu-Quan%20Lin%20and%20Heng-Cheng%20Kuo%20and%20Tzu-Chieh%20Wei%20and%20Hsi-Chun%20Cheng%20and%20Chun%20Wei%20Chen%20and%20Hsien-Fu%20Hsiao%20and%20Yu%20Tsao%20and%20Hung-yi%20Lee%0AAbstract%3A%20While%20Mamba%20has%20demonstrated%20strong%20performance%20in%20language%20modeling%2C%20its%20potential%20as%20a%20speech%20self-supervised%20learning%20%28SSL%29%20model%20remains%20underexplored%2C%20with%20prior%20studies%20limited%20to%20isolated%20tasks.%20To%20address%20this%2C%20we%20explore%20Mamba-based%20HuBERT%20models%20as%20alternatives%20to%20Transformer-based%20SSL%20architectures.%20Leveraging%20the%20linear-time%20Selective%20State%20Space%2C%20these%20models%20enable%20fine-tuning%20on%20long-context%20ASR%20with%20significantly%20lower%20compute.%20Moreover%2C%20they%20show%20superior%20performance%20when%20fine-tuned%20for%20streaming%20ASR.%20Beyond%20fine-tuning%2C%20these%20models%20show%20competitive%20performance%20on%20SUPERB%20probing%20benchmarks%2C%20particularly%20in%20causal%20settings.%20Our%20analysis%20shows%20that%20they%20yield%20higher-quality%20quantized%20representations%20and%20capture%20speaker-related%20features%20more%20distinctly%20than%20Transformer-based%20models.%20These%20findings%20highlight%20Mamba-based%20SSL%20as%20a%20promising%20and%20complementary%20direction%20for%20long-sequence%20modeling%2C%20real-time%20speech%20modeling%2C%20and%20speech%20unit%20extraction.%20The%20codebase%20is%20available%20at%20https%3A//github.com/hckuo145/Mamba-based-HuBERT.%0ALink%3A%20http%3A//arxiv.org/abs/2506.12606v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAn%2520Exploration%2520of%2520Mamba%2520for%2520Speech%2520Self-Supervised%2520Models%26entry.906535625%3DTzu-Quan%2520Lin%2520and%2520Heng-Cheng%2520K {"title": "Mammo-FM: Breast-specific foundational model for Integrated Mammographic Diagnosis, Prognosis, and Reporting", "author": "Shantanu Ghosh and Vedant Parthesh Joshi and Rayan Syed and Aya Kassem and Abhishek Varshney and Payel Basak and Weicheng Dai and Judy Wawira Gichoya and Hari M. Trivedi and Imon Banerjee and Shyam Visweswaran and Clare B. Poynton and Kayhan Batmanghelich", "abstract": "Breast cancer is one of the leading causes of death among women worldwide. We introduce Mammo-FM, the first foundation model specifically for mammography, pretrained on the largest and most diverse dataset to date - 140,677 patients (821,326 mammograms) across four U.S. institutions. Mammo-FM provides a unified foundation for core clinical tasks in breast imaging, including cancer diagnosis, pathology localization, structured report generation, and cancer risk prognosis within a single framework. Its alignment between images and text enables both visual and textual interpretability, improving transparency and clinical auditability, which are essential for real-world adoption. We rigorously evaluate Mammo-FM across diagnosis, prognosis, and report-generation tasks in in- and out-of-distribution datasets. Despite operating on native-resolution mammograms and using only one-third of the parameters of state-of-the-art generalist FMs, Mammo-FM consistently outperforms them across multiple public and private benchmarks. These results highlight the efficiency and value of domain-specific foundation models designed around the full spectrum of tasks within a clinical domain and emphasize the importance of rigorous, domain-aligned evaluation.", "link": "http://arxiv.org/abs/2512.00198v2", "date": "2026-04-20", "relevancy": 2.3215, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4855}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4537}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4537}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mammo-FM%3A%20Breast-specific%20foundational%20model%20for%20Integrated%20Mammographic%20Diagnosis%2C%20Prognosis%2C%20and%20Reporting&body=Title%3A%20Mammo-FM%3A%20Breast-specific%20foundational%20model%20for%20Integrated%20Mammographic%20Diagnosis%2C%20Prognosis%2C%20and%20Reporting%0AAuthor%3A%20Shantanu%20Ghosh%20and%20Vedant%20Parthesh%20Joshi%20and%20Rayan%20Syed%20and%20Aya%20Kassem%20and%20Abhishek%20Varshney%20and%20Payel%20Basak%20and%20Weicheng%20Dai%20and%20Judy%20Wawira%20Gichoya%20and%20Hari%20M.%20Trivedi%20and%20Imon%20Banerjee%20and%20Shyam%20Visweswaran%20and%20Clare%20B.%20Poynton%20and%20Kayhan%20Batmanghelich%0AAbstract%3A%20Breast%20cancer%20is%20one%20of%20the%20leading%20causes%20of%20death%20among%20women%20worldwide.%20We%20introduce%20Mammo-FM%2C%20the%20first%20foundation%20model%20specifically%20for%20mammography%2C%20pretrained%20on%20the%20largest%20and%20most%20diverse%20dataset%20to%20date%20-%20140%2C677%20patients%20%28821%2C326%20mammograms%29%20across%20four%20U.S.%20institutions.%20Mammo-FM%20provides%20a%20unified%20foundation%20for%20core%20clinical%20tasks%20in%20breast%20imaging%2C%20including%20cancer%20diagnosis%2C%20pathology%20localization%2C%20structured%20report%20generation%2C%20and%20cancer%20risk%20prognosis%20within%20a%20single%20framework.%20Its%20alignment%20between%20images%20and%20text%20enables%20both%20visual%20and%20textual%20interpretability%2C%20improving%20transparency%20and%20clinical%20auditability%2C%20which%20are%20essential%20for%20real-world%20adoption.%20We%20rigorously%20evaluate%20Mammo-FM%20across%20diagnosis%2C%20prognosis%2C%20and%20report-generation%20tasks%20in%20in-%20and%20out-of-distribution%20datasets.%20Despite%20operating%20on%20native-resolution%20mammograms%20and%20using%20only%20one-third%20of%20the%20parameters%20of%20state-of-the-art%20generalist%20FMs%2C%20Mammo-FM%20consistently%20outperforms%20them%20across%20multiple%20public%20and%20private%20benchmarks.%20These%20results%20highlight%20the%20efficiency%20and%20value%20of%20domain-specific%20foundation%20models%20designed%20around%20the%20full%20spectrum%20of%20tasks%20within%20a%20clinical%20domain%20and%20emphasize%20the%20importance%20of%20rigorous%2C%20domain-aligned%20evaluation.%0ALink%3A%20http%3A//arxiv.org/abs/2512.00198v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMammo-FM%253A%2520Breast-specific%2520foundational%2520model%2520for%2520Integrated%2520Mammographic%2520Diagnosis%252C%2520Prognosis%252C%2520and%2520Reporting%26entry.906535625%3DShantanu%2520Ghosh%2520and%2520Vedant%2520Parthesh%2520Joshi%2520and%2520Rayan%2520Syed%2520and%2520Aya%2520Kassem%2520and%2520Abhishek%2520Varshney%2520and%2520Payel%2520Basak%2520and%2520Weicheng%2520Dai%2520and%2520Judy%2520Wawira%2520Gichoya%2520and%2520Hari%2520M.%2520Trivedi%2520and%2520Imon%2520Banerjee%2520and%2520Shyam%2520Visweswaran%2520and%2520Clare%2520B.%2520Poynton%2520and%2520Kayhan%2520Batmanghelich%26entry.1292438233%3DBreast%2520cancer%2520is%2520one%2520of%2520the%2520leading%2520causes%2520of%2520death%2520among%2520women%2520worldwide.%2520We%2520introduce%2520Mammo-FM%252C%2520the%2520first%2520foundation%2520model%2520specifically%2520for%2520mammography%252C%2520pretrained%2520on%2520the%2520largest%2520and%2520most%2520diverse%2520dataset%2520to%2520date%2520-%2520140%252C677%2520patients%2520%2528821%252C326%2520mammograms%2529%2520across%2520four%2520U.S.%2520institutions.%2520Mammo-FM%2520provides%2520a%2520unified%2520foundation%2520for%2520core%2520clinical%2520tasks%2520in%2520breast%2520imaging%252C%2520including%2520cancer%2 {"title": "OneVL: One-Step Latent Reasoning and Planning with Vision-Language Explanation", "author": "Jinghui Lu and Jiayi Guan and Zhijian Huang and Jinlong Li and Guang Li and Lingdong Kong and Yingyan Li and Han Wang and Shaoqing Xu and Yuechen Luo and Fang Li and Chenxu Dang and Junli Wang and Tao Xu and Jing Wu and Jianhua Wu and Xiaoshuai Hao and Wen Zhang and Tianyi Jiang and Lingfeng Zhang and Lei Zhou and Yingbo Tang and Jie Wang and Yinfeng Gao and Xizhou Bu and Haochen Tian and Yihang Qiu and Feiyang Jia and Lin Liu and Yigu Ge and Hanbing Li and Yuannan Shen and Jianwei Cui and Hongwei Xie and Bing Wang and Haiyang Sun and Jingwei Zhao and Jiahui Huang and Pei Liu and Zeyu Zhu and Yuncheng Jiang and Zibin Guo and Chuhong Gong and Hanchao Leng and Kun Ma and Naiyang Wang and Guang Chen and Kuiyuan Yang and Hangjun Ye and Long Chen", "abstract": "Chain-of-Thought (CoT) reasoning has become a powerful driver of trajectory prediction in VLA-based autonomous driving, yet its autoregressive nature imposes a latency cost that is prohibitive for real-time deployment. Latent CoT methods attempt to close this gap by compressing reasoning into continuous hidden states, but consistently fall short of their explicit counterparts. We suggest that this is due to purely linguistic latent representations compressing a symbolic abstraction of the world, rather than the causal dynamics that actually govern driving. Thus, we present OneVL (One-step latent reasoning and planning with Vision-Language explanations), a unified VLA and World Model framework that routes reasoning through compact latent tokens supervised by dual auxiliary decoders. Alongside a language decoder that reconstructs text CoT, we introduce a visual world model decoder that predicts future-frame tokens, forcing the latent space to internalize the causal dynamics of road geometry, agent motion, and environmental change. A three-stage training pipeline progressively aligns these latents with trajectory, language, and visual objectives, ensuring stable joint optimization. At inference, the auxiliary decoders are discarded and all latent tokens are prefilled in a single parallel pass, matching the speed of answer-only prediction. Across four benchmarks, OneVL becomes the first latent CoT method to surpass explicit CoT, delivering state-of-the-art accuracy at answer-only latency, and providing direct evidence that tighter compression, when guided in both language and world-model supervision, produces more generalizable representations than verbose token-by-token reasoning. Project Page: https://xiaomi-embodied-intelligence.github.io/OneVL", "link": "http://arxiv.org/abs/2604.18486v1", "date": "2026-04-20", "relevancy": 2.3209, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5835}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5835}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5639}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OneVL%3A%20One-Step%20Latent%20Reasoning%20and%20Planning%20with%20Vision-Language%20Explanation&body=Title%3A%20OneVL%3A%20One-Step%20Latent%20Reasoning%20and%20Planning%20with%20Vision-Language%20Explanation%0AAuthor%3A%20Jinghui%20Lu%20and%20Jiayi%20Guan%20and%20Zhijian%20Huang%20and%20Jinlong%20Li%20and%20Guang%20Li%20and%20Lingdong%20Kong%20and%20Yingyan%20Li%20and%20Han%20Wang%20and%20Shaoqing%20Xu%20and%20Yuechen%20Luo%20and%20Fang%20Li%20and%20Chenxu%20Dang%20and%20Junli%20Wang%20and%20Tao%20Xu%20and%20Jing%20Wu%20and%20Jianhua%20Wu%20and%20Xiaoshuai%20Hao%20and%20Wen%20Zhang%20and%20Tianyi%20Jiang%20and%20Lingfeng%20Zhang%20and%20Lei%20Zhou%20and%20Yingbo% {"title": "Stable Language Guidance for Vision-Language-Action Models", "author": "Zhihao Zhan and Yuhao Chen and Jiaying Zhou and Qinhan Lyu and Hao Liu and Keze Wang and Liang Lin and Guangrun Wang", "abstract": "Vision-Language-Action (VLA) models have demonstrated impressive capabilities in generalized robotic control; however, they remain notoriously brittle to linguistic perturbations. We identify a critical ``modality collapse'' phenomenon where strong visual priors overwhelm sparse linguistic signals, causing agents to overfit to specific instruction phrasings while ignoring the underlying semantic intent. To address this, we propose Residual Semantic Steering (RSS), a probabilistic framework that disentangles physical affordance from semantic execution. RSS introduces two theoretical innovations: (1) Monte Carlo Syntactic Integration, which approximates the true semantic posterior via dense, LLM-driven distributional expansion, and (2) Residual Affordance Steering, a dual-stream decoding mechanism that explicitly isolates the causal influence of language by subtracting the visual affordance prior. Theoretical analysis suggests that RSS effectively maximizes the mutual information between action and intent while suppressing visual distractors. Empirical results across diverse manipulation benchmarks demonstrate that RSS achieves state-of-the-art robustness, maintaining performance even under adversarial linguistic perturbations. We release our code at https://github.com/Doo-mon/RSS.", "link": "http://arxiv.org/abs/2601.04052v2", "date": "2026-04-20", "relevancy": 2.318, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6087}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5737}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5737}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Stable%20Language%20Guidance%20for%20Vision-Language-Action%20Models&body=Title%3A%20Stable%20Language%20Guidance%20for%20Vision-Language-Action%20Models%0AAuthor%3A%20Zhihao%20Zhan%20and%20Yuhao%20Chen%20and%20Jiaying%20Zhou%20and%20Qinhan%20Lyu%20and%20Hao%20Liu%20and%20Keze%20Wang%20and%20Liang%20Lin%20and%20Guangrun%20Wang%0AAbstract%3A%20Vision-Language-Action%20%28VLA%29%20models%20have%20demonstrated%20impressive%20capabilities%20in%20generalized%20robotic%20control%3B%20however%2C%20they%20remain%20notoriously%20brittle%20to%20linguistic%20perturbations.%20We%20identify%20a%20critical%20%60%60modality%20collapse%27%27%20phenomenon%20where%20strong%20visual%20priors%20overwhelm%20sparse%20linguistic%20signals%2C%20causing%20agents%20to%20overfit%20to%20specific%20instruction%20phrasings%20while%20ignoring%20the%20underlying%20semantic%20intent.%20To%20address%20this%2C%20we%20propose%20Residual%20Semantic%20Steering%20%28RSS%29%2C%20a%20probabilistic%20framework%20that%20disentangles%20physical%20affordance%20from%20semantic%20execution.%20RSS%20introduces%20two%20theoretical%20innovations%3A%20%281%29%20Monte%20Carlo%20Syntactic%20Integration%2C%20which%20approximates%20the%20true%20semantic%20posterior%20via%20dense%2C%20LLM-driven%20distributional%20expansion%2C%20and%20%282%29%20Residual%20Affordance%20Steering%2C%20a%20dual-stream%20decoding%20mechanism%20that%20explicitly%20isolates%20the%20causal%20influence%20of%20language%20by%20subtracting%20the%20visual%20affordance%20prior.%20Theoretical%20analysis%20suggests%20that%20RSS%20effectively%20maximizes%20the%20mutual%20information%20between%20action%20and%20intent%20while%20suppressing%20visual%20distractors.%20Empirical%20results%20across%20diverse%20manipulation%20benchmarks%20demonstrate%20that%20RSS%20achieves%20state-of-the-art%20robustness%2C%20maintaining%20performance%20even%20under%20adversarial%20linguistic%20perturbations.%20We%20release%20our%20code%20at%20https%3A//github.com/Doo-mon/RSS.%0ALink%3A%20http%3A//arxiv.org/abs/2601.04052v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStable%2520Language%2520Guidance%2520for%2520Vision-Language-Action%2520Models%26entry.906535625%3DZhihao%2520Zhan%2520and%2520Yuhao%2520Chen%2520and%2520Jiaying%2520Zhou%2520and%2520Qinhan%2520Lyu%2520and%2520Hao%2520Liu%2520and%2520Keze%2520Wang%2520and%2520Liang%2520Lin%2520and%2520Guangrun%2520Wang%26entry.1292438233%3DVision-Language-Action%2520%2528VLA%2529%2520models%2520have%2520demonstrated%2520impressive%2520capabilities%2520in%2520generalized%2520robotic%2520control%253B%2520however%252C%2520they%2520remain%2520notoriously%2520brittle%2520to%2520linguistic%2520perturbations.%2520We%2520identify%2520a%2520critical%2520%2560%2560modality%2520collapse%2527%2527%2520phenomenon%2520where%2520strong%2520visual%2520priors%2520overwhelm%2520sparse%2520linguistic%2520signals%252C%2520causing%2520agents%2520to%2520overfit%2520to%2520specific%2520instruction%2520phrasings%2520while%2520ignoring%2520the%2520underlying%2520semantic%2520intent.%2520To%2520address%2520this%252C%2520we%2520propose%2520Residual%2520Semantic%2520Steering%2520%2528RSS%2529%252C%2520a%2520probabilistic%2520framework%2520that%2520disentangles%2520physical%2520affordance%2520from%2520semantic%2520execution.%2520RSS%2520introduces%2520two%2520theoretical%2520innovations%253A%2520%25281%2529%2520Monte%2520Carlo%2520Syntactic%2520Integration%252C%2520which%2520approximates%2520the%2520true%2520semantic%2520posterior%2520via%2520dense%252C%2520LLM-driven%2520distributional%2520expansion%252C%2520and%2520%25282%2529%2520Residual%2520Affordance%2520Steering%252C%2520a%2520dual-stream%2520decoding%2520mechanism%2520that%2520ex {"title": "Enhancing Glass Surface Reconstruction via Depth Prior for Robot Navigation", "author": "Jiamin Zheng and Jingwen Yu and Guangcheng Chen and Hong Zhang", "abstract": "Indoor robot navigation is often compromised by glass surfaces, which severely corrupt depth sensor measurements. While foundation models like Depth Anything 3 provide excellent geometric priors, they lack an absolute metric scale. We propose a training-free framework that leverages depth foundation models as a structural prior, employing a robust local RANSAC-based alignment to fuse it with raw sensor depth. This naturally avoids contamination from erroneous glass measurements and recovers an accurate metric scale. Furthermore, we introduce \\ti{GlassRecon}, a novel RGB-D dataset with geometrically derived ground truth for glass regions. Extensive experiments demonstrate that our approach consistently outperforms state-of-the-art baselines, especially under severe sensor depth corruption. The dataset and related code will be released at https://github.com/jarvisyjw/GlassRecon.", "link": "http://arxiv.org/abs/2604.18336v1", "date": "2026-04-20", "relevancy": 2.2948, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6048}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5531}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5476}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Enhancing%20Glass%20Surface%20Reconstruction%20via%20Depth%20Prior%20for%20Robot%20Navigation&body=Title%3A%20Enhancing%20Glass%20Surface%20Reconstruction%20via%20Depth%20Prior%20for%20Robot%20Navigation%0AAuthor%3A%20Jiamin%20Zheng%20and%20Jingwen%20Yu%20and%20Guangcheng%20Chen%20and%20Hong%20 {"title": "Copy-as-Decode: Grammar-Constrained Parallel Prefill for LLM Editing", "author": "Ziyang Liu", "abstract": "LLMs edit text and code by autoregressively regenerating the full output, even when most tokens appear verbatim in the input. We study Copy-as-Decode, a decoding-layer mechanism that recasts edit generation as structured decoding over a two-primitive grammar: <copy lines=\"i-j\"/> references an input line range, <gen>...</gen> emits new content. A token-level FSM guarantees syntactic validity, and a serving-layer primitive updates the KV cache for each copy span via a single parallel-prefill forward rather than $N$ autoregressive steps -- sharing the parallel-forward kernel of speculative decoding but with input tokens as the draft and program-enforced acceptance replacing probabilistic verification. We report an upper-bound analysis that requires no end-to-end training. (i) Kernel speedup: on Qwen2.5-{1.5B, 7B}, copying $N$ tokens via parallel prefill is $6.8\\times$--$303\\times$ faster than autoregressive ($N \\in [8, 512]$, A100 80GB bf16). (ii) Copy ceiling: on ProbeEdit and HumanEvalPack-Fix (Py/JS), $74$--$98\\%$ of gold tokens are reachable under the line-level primitive; composed with the empirical kernel over each corpus's span histogram this yields a closed-form wall-clock bound of $29.0\\times / 3.4\\times / 4.2\\times$ ($13.0\\times$ pooled). A token-level extension reaches $91$--$99\\%$ coverage with $4.5\\times$--$6.5\\times$ floors. (iii) Pipeline losslessness: oracle programs round-trip through the deterministic resolver on all $482$ cases, localizing any downstream failure to span selection rather than the mechanism. A perturbation study shows pooled EM drops from $100\\%$ to $15.48\\%$ under off-by-one noise. A fine-tuning pilot on Qwen2.5-Coder-1.5B lifts HEvalFix-Py EM from $0/33$ (untrained) to $12$--$17\\%$, a learnability signal, not a production selector. Batched-serving integration and multi-file coverage are scoped as follow-up.", "link": "http://arxiv.org/abs/2604.18170v1", "date": "2026-04-20", "relevancy": 2.2897, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4635}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4635}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4468}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Copy-as-Decode%3A%20Grammar-Constrained%20Parallel%20Prefill%20for%20LLM%20Editing&body=Title%3A%20Copy-as-Decode%3A%20Grammar-Constrained%20Parallel%20Prefill%20for%20LLM%20Editing%0AAuthor%3A%20Ziyang%20Liu%0AAbstract%3A%20LLMs%20edit%20text%20and%20code%20by%20autoregressively%20regenerating%20the%20full%20output%2C%20even%20when%20most%20tokens%20appear%20verbatim%20in%20the%20input.%20We%20study%20Copy-as-Decode%2C%20a%20decoding-layer%20mechanism%20that%20recasts%20edit%20generation%20as%20structured%20decoding%20over%20a%20two-primitive%20grammar%3A%20%3Ccopy%20lines%3D%22i-j%22/%3E%20references%20an%20input%20line%20range%2C%20%3Cgen%3E...%3C/gen%3E%20emits%20new%20content.%20A%20token-level%20FSM%20guarantees%20syntactic%20validity%2C%20and%20a%20serving-layer%20primitive%20updates%20the%20KV%20cache%20for%20each%20copy%20span%20via%20a%20single%20parallel-prefill%20forward%20rather%20than%20%24N%24%20autoregressive%20steps%20--%20sharing%20the%20parallel-forward%20kernel%20of%20speculative%20decoding%20but%20with%20input%20tokens%20as%20the%20draft%20and%20program-enforced%20acceptance%20replacing%20probabilistic%20verification.%20We%20report%20an%20upper-bound%20analysis%20that%20requires%20no%20end-to-end%20training.%20%28i%29%20Kernel%20speedup%3A%20on%20Qwen2.5-%7B1.5B%2C%207B%7D%2C%20copying%20%24N%24%2 {"title": "When Pretty Isn't Useful: Investigating Why Modern Text-to-Image Models Fail as Reliable Training Data Generators", "author": "Krzysztof Adamkiewicz and Brian Bernhard Moser and Stanislav Frolov and Tobias Christian Nauen and Federico Raue and Andreas Dengel", "abstract": "Recent text-to-image (T2I) diffusion models produce visually stunning images and demonstrate excellent prompt following. But do they perform well as synthetic vision data generators? In this work, we revisit the promise of synthetic data as a scalable substitute for real training sets and uncover a surprising performance regression. We generate large-scale synthetic datasets using state-of-the-art T2I models released between 2022 and 2025, train standard classifiers solely on this synthetic data, and evaluate them on real test data. Despite observable advances in visual fidelity and prompt adherence, classification accuracy on real test data consistently declines with newer T2I models as training data generators. Our analysis reveals a hidden trend: These models collapse to a narrow, aesthetic-centric distribution that undermines diversity and real data distribution coverage. Overall, our findings challenge a growing assumption in vision research, namely that progress in generative realism implies progress in data realism. We thus highlight an urgent need to rethink the capabilities of modern T2I models as reliable training data generators.", "link": "http://arxiv.org/abs/2602.19946v4", "date": "2026-04-20", "relevancy": 2.2897, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.6099}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5673}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5626}], "mail {"title": "Six Llamas: Comparative Religious Ethics Through LoRA-Adapted Language Models", "author": "Chad Coleman and W. Russell Neuman and Manan Shah and Ali Dasdan and Matthew Crispi and Morris Chiang and Zack Leitman and Mustafa Poonawala", "abstract": "We present Six Llamas, a comparative study examining whether large language models fine-tuned on distinct religious corpora encode systematically different patterns of ethical reasoning. Six variants of Meta-Llama-3.1-8B are constructed: one unmodified control and five LoRA-adapted models trained exclusively on the sacred and theological texts of Christianity, Islam, Judaism, Hinduism, or Buddhism. All six models are probed with an identical battery of 17 standardized ethical prompts spanning moral dilemmas, game-theoretic scenarios, public policy questions, and moral-psychological self-assessments. To assess robustness and reproducibility, we implement a multi-temperature sampling design spanning ten temperature settings. We compute response consistency metrics, pairwise inter-model agreement rates, temperature sensitivity coefficients across four prompt domains, and run-to-run stability analyses.\n  Findings show that LoRA-adapted models produce ethical reasoning patterns that are (a) systematically differentiated from the base model, (b) consistent with the moral logics of their training traditions, (c) structured along interpretable dimensions in moral-philosophical space, (d) core ethical positions remain stable across temperature variations for high-consensus dilemmas. The Trolley Problem achieves 100% consistency across all models and temperatures, while (e) tradition-specific divergence intensifies at higher temperatures in morally contested domains, and (f) the base model exhibits the highest overall response consistency (mean 88.3%), suggesting LoRA adaptation introduces both tradition-specific signal and increased sampling sensitivity.\n  The study offers a proof-of-concept for the condensate comparative method using differentially trained language models as instruments for cultural and ethical analysis and identifies specific criteria for falsification and planned extensions.", "link": "http://arxiv.org/abs/2604.18404v1", "date": "2026-04-20", "relevancy": 2.2847, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4677}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4677}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4355}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Six%20Llamas%3A%20Comparative%20Religious%20Ethics%20Through%20LoRA-Adapted%20Language%20Models&body=Title%3A%20Six%20Llamas%3A%20Comparative%20Religious%20Ethics%20Through%20LoRA-Adapted%20Language%20Models%0AAuthor%3A%20Chad%20Coleman%20and%20W.%20Russell%20Neuman%20and%20Manan%20Shah%20and%20Ali%20Dasdan%20and%20Matthew%20Crispi%20and%20Morris%20Chiang%20and%20Zack%20Leitman%20and%20Mustafa%20Poonawala%0AAbstract%3A%20We%20present%20Six%20Llamas%2C%20a%20comparative%20study%20examining%20whether%20large%20language%20models%20fine-tuned%20on%20distinct%20religious%20corpora%20encode%20systematically%20different%20patterns%20of%20ethical%20reasoning.%20Six%20variants%20of%20Meta-Llama-3.1-8B%20are%20constructed%3A%20one%20unmodified%20control%20and%20five%20LoRA-adapted%20models%20trained%20exclusively%20on%20the%20sacred%20and%20theological%20texts%20of%20Christianity%2C%20Islam%2C%20Judaism%2C%20Hinduism%2C%20or%20Buddhism.%20All%20six%20models%20are%20probed%20with%20an%20identical%20battery%20of%2017%20standardized%20ethical%20prompts%20spanning%20moral%20dilemmas%2C%20game-theoretic%20scenarios%2C%20public%20policy%20questions%2C%20and%20moral-psychological%20self-assessments.%20To%20assess%20robustness%20and%20reproducibility%2C%20we%20implement%20a%20multi-temperature%20sampling%20design%20spanning%20ten%20temperature%20settings.%20We%20compute%20response%20consistency%20metrics%2C%20pairwise%20inter-model%20agreement%20rates%2C%20temperature%20sensitivity%20coefficients%20across%20four%20prompt%20domains%2C%20and%20run-to-run%20stability%20analyses.%0A%20%20Findings%20show%20that%20LoRA-adapted%20models%20produce%20ethical%20reasoning%20patterns%20that%20are%20%28a%29%20systematically%20differentiated%20from%20the%20base%20model%2C%20%28b%29%20consistent%20with%20the%20moral%20logics%20of%20their%20training%20traditions%2C%20%28c%29%20structured%20along%20interpretable%20dimensions%20in%20moral-philosophical%20space%2C%20%28d%29%20core%20ethical%20positions%20remain%20stable%20across%20temperature%20variations%20for%20high-consensus%20dilemmas.%20The%20Trolley%20Problem%20achieves%20100%25%20consistency%20across%20all%20models%20and%20temperatures%2C%20while%20%28e%29%20tradition-specific%20divergence%20intensifies%20at%20higher%20temperatures%20in%20morally%20contested%20domains%2C%20and%20%28f%29%20the%20base%20model%20exhibits%20the%20highest%20overall%20response%20consistency%20%28mean%2088.3%25%29%2C%20suggesting%20LoRA%20adaptation%20introduces%20both%20tradition-specific%20signal%20and%20increased%20sampling%20sensitivity.%0A%20%20The%20study%20offers%20a%20proof-of-concept%20for%20the%20condensate%20comparative%20method%20using%20differentially%20trained%20language%20models%20as%20instruments%20for%20cultural%20and%20ethical%20analysis%20and%20identifies%20specific%20criteria%20for%20falsification%20and%20planned%20extensions.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18404v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSix%2520Llamas%253A%2520Comparative%2520Religious%2520Ethics%2520Through%2520LoRA-Adapted%2520Language {"title": "LoRA on the Go: Instance-level Dynamic LoRA Selection and Merging", "author": "Seungeon Lee and Soumi Das and Manish Gupta and Krishna P. Gummadi", "abstract": "Low-Rank Adaptation (LoRA) has emerged as a parameter-efficient approach for fine-tuning large language models. However, conventional LoRA adapters are typically trained for a single task, limiting their applicability in real-world settings where inputs may span diverse and unpredictable domains. At inference time, existing approaches combine multiple LoRAs for improving performance on diverse tasks, while usually requiring labeled data or additional task-specific training, which is expensive at scale. In this work, we introduce LoRA on the Go (LoGo), a training-free framework that dynamically selects and merges adapters at the instance level without any additional requirements. LoGo leverages signals extracted from a single forward pass through LoRA adapters, to identify the most relevant adapters and determine their contributions on-the-fly. Across 5 NLP benchmarks, 27 datasets, and 3 model families, LoGo outperforms training-based baselines on some tasks upto a margin of 3.6% while remaining competitive on other tasks and maintaining inference throughput, highlighting its effectiveness and practicality.", "link": "http://arxiv.org/abs/2511.07129v3", "date": "2026-04-20", "relevancy": 2.2833, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4613}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.461}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4477}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LoRA%20on%20the%20Go%3A%20Instance-level%20Dynamic%20LoRA%20Selection%20and%20Merging&body=Title%3A%20LoRA%20on%20the%20Go%3A%20Instance-level%20Dynamic%20LoRA%20Selection%20and%20Merging%0AAuthor%3A%20Seungeon%20Lee%20and%20Soumi%20Das%20and%20Manish%20Gupta%20and%20Krishna%20P.%20Gummadi%0AAbstract%3A%20Low-Rank%20Adaptation%20%28LoRA%29%20has%20emerged%20as%20a%20parameter-efficient%20approach%20for%20fine-tuning%20large%20language%20models.%20However%2C%20conventional%20LoRA%20adapters%20are%20typically%20trained%20for%20a%20single%20task%2C%20limiting%20their%20applicability%20in%20real-world%20settings%20where%20inputs%20may%20span%20diverse%20and%20unpredictable%20domains.%20At%20inference%20time%2C%20existing%20approaches%20combine%20multiple%20LoRAs%20for%20improving%20performance%20on%20diverse%20tasks%2C%20while%20usually%20requiring%20labeled%20data%20or%20additional%20task-specific%20training%2C%20which%20is%20expensive%20at%20scale.%20In%20this%20work%2C%20we%20introduce%20LoRA%20on%20the%20Go%20%28LoGo%29%2C%20a%20training-free%20framework%20that%20dynamically%20selects%20and%20merges%20adapters%20at%20the%20instance%20level%20without%20any%20additional%20requirements.%20LoGo%20leverages%20signals%20extracted%20from%20a%20single%20forward%20pass%20through%20LoRA%20adapters%2C%20to%20identify%20the%20most%20relevant%20adapters%20and%20determine%20their%20contributions%20on-the-fly.%20Across%205%20NLP%20benchmarks%2C%2027%20datasets%2C%20and%203%20model%20families%2C%20LoGo%20outperforms%20training-based%20baselines%20on%20some%20tasks%20upto%20a%20margin%20of%203.6%25%20while%20remaining%20competitive%20on%20other%20tasks%20and%20maintaining%20inference%20throughput%2C%20highlighting%20its%20effectiveness%20and%20practicality.%0ALink%3A%20http%3A//arxiv.org/abs/2511.07129v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLoRA%2520on%2520the%2520Go%253A%2520Instance-level%2520Dynamic%2520LoRA%2520Selection%2520 {"title": "Efficient Kernel Learning from Side Information Using ADMM", "author": "En-Liang Hu", "abstract": "Side information is highly useful in the learning of a nonparametric kernel matrix. However, this often leads to an expensive semidefinite program (SDP). In recent years, a number of dedicated solvers have been proposed. Though much better than off-the-shelf SDP solvers, they still cannot scale to large data sets. In this paper, we propose a novel solver based on the alternating direction method of multipliers (ADMM). The key idea is to use a low-rank decomposition of the kernel matrix $\\K = \\V^\\top \\U$, with the constraint that $\\V=\\U$. The resultant optimization problem, though non-convex, has favorable convergence properties and can be efficiently solved without requiring eigen-decomposition in each iteration. Experimental results on a number of real-world data sets demonstrate that the proposed method is as accurate as directly solving the SDP, but can be one to two orders of magnitude faster.", "link": "http://arxiv.org/abs/1811.01198v14", "date": "2026-04-20", "relevancy": 1.8091, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4582}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.451}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4469}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Efficient%20Kernel%20Learning%20from%20Side%20Information%20Using%20ADMM&body=Title%3A%20Efficient%20Kernel%20Learning%20from%20Side%20Information%20Using%20ADMM%0AAuthor%3A%20En-Liang%20Hu%0AAbstract%3A%20Side%20information%20is%20highly%20useful%20in%20the%20learning%20of%20a%20nonparametric%20kernel%20matrix.%20However%2C%20this%20often%20leads%20to%20an%20expensive%20semidefinite%20program%20%28SDP%29.%20In%20recent%20years%2C%20a%20number%20of%20dedicated%20solvers%20have%20been%20proposed.%20Though%20much%20better%20than%20off-the-shelf%20SDP%20solvers%2C%20they%20still%20cannot%20scale%20to%20large%20data%20sets.%20In%20this%20paper%2C%20we%20propose%20a%20novel%20solver%20based%20on%20the%20alternating%20direction%20method%20of%20multipliers%20%28ADMM%29.%20The%20key%20idea%20is%20to%20use%20a%20low-rank%20decomposition%20of%20the%20kernel%20matrix%20%24%5CK%20%3D%20%5CV%5E%5Ctop%20%5CU%24%2C%20with%20the%20constraint%20that%20%24%5CV%3D%5CU%24.%20The%20resultant%20optimization%20problem%2C%20though%20non-convex%2C%20has%20favorable%20convergence%20properties%20and%20can%20be%20efficiently%20solved%20without%20requiring%20eigen-decomposition%20in%20each%20iteration.%20Experimental%20results%20on%20a%20number%20of%20real-world%20data%20sets%20demonstrate%20that%20the%20proposed%20method%20is%20as%20accurate%20as%20directly%20solving%20the%20SDP%2C%20but%20can%20be%20one%20to%20two%20orders%20of%20magnitude%20faster.%0ALink%3A%20http%3A//arxiv.org/abs/1811.01198v14%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEfficient%2520Kernel%2520Learning%2520from%2520Side%2520Information%2520Using%2520ADMM%26entry.906535625%3DEn-Liang%2520Hu%26entry.1292438233%3DSide%2520information%2520is%2520highly%2520useful%2520in%2520the%2520learning%2520of%2520a%2520nonparametric%2520kernel%2520matrix.%2520However%252C%2520this%2520often%2520leads%2520to%2520an%2520expensive%2520semidefinite%2520program%2520%2528SDP%2529.%2520In%2520recent%2520years%252C%2520a%2520number%2520of%2520dedicated%2520solvers%2520have%2520been%2520proposed.%2520Though%2520much%2520better%2520than%2520off-the-shelf%2520SDP%2520solvers%252C%2520they%2520still%2520cannot%2520scale%2520to%2520large%2520data%2520sets.%2520In%2520this%2520paper%252C%2520we%2520propose%2520a%2520novel%2520solver%2520based%2520on%2520the%2520alternating%2520direction%2520method%2520of%2520multipliers%2520%2528ADMM%2529.%2520The%2520key%2520idea%2520is%2520to%2520use%2520a%2520low-rank%2520decomposition%2520of%2520the%2520kernel%2520matrix%2520%2524%255CK%2520%253D%2520%255CV%255E%255Ctop%2520%255CU%2524%252C%2520with%2520the%2520constraint%2520that%2520%2524%255CV%253D%255CU%2524.%2520The%2520resultant%2520optimization%2520problem%252C%2520though%2520non-convex%252C%2520has%2520favorable%2520convergence%2520properties%2520and%2520can%2520be%2520efficiently%2520solved%2520without%2520requiring%2520eigen-decomposition%2520in%2520each%2520iteration.%2520Experimental%2520results%2520on%2520a%2520number%2520of%2520real-world%2520data%2520sets%2520demonstrate%2520that%2520the%2520proposed%2520method%2520is%2520as%2520accurate%2520as%2520directly%2520solving%2520the%2520SDP%252C%2520but%2520can%2520be%2520one%2520to%2520two%2520orders%2520of%2520magnitude%2520faster.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/1811.01198v14%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Efficient%20Kernel%20Learning%20from%20Side%20Information%20Using%20ADMM&entry.906535625=En-Liang%20Hu&entry.1292438233=Side%20information%20is%20highly%20useful%20in%20the%20learning%20of%20a%20nonparametric%20kernel%20matrix.%20However%2C%20this%20often%20leads%20to%20an%20expensive%20semidefinite%20program%20%28SDP%29.%20In%20recent%20years%2C%20a%20number%20of%20dedicated%20solvers%20have%20been%20proposed.%20Though%20much%20better%20than%20off-the-shelf%20SDP%20solvers%2C%20they%20still%20cannot%20scale%20to%20large%20data%20sets.%20In%20this%20paper%2C%20we%20propose%20a%20novel%20solver%20based%20on%20the%20alternating%20direction%20method%20of%20multipliers%20%28ADMM%29.%20The%20key%20idea%20is%20to%20use {"title": "Parkinson's Disease Detection via Self-Supervised Dual-Channel Cross-Attention on Bilateral Wrist-Worn IMU Signals", "author": "Meheru Zannat", "abstract": "Parkinson's disease (PD) is a chronic neurodegenerative disease. It shows multiple motor symptoms such as tremor, bradykinesia, postural instability, freezing of gait (FoG). PD is currently diagnosed clinically through physical exam by health-care professionals, which can be time consuming and highly subjective. Wearable IMU sensors has become a promising gateway for passive monitoring of PD patients. We propose a self-supervised cross-attention encoder that processes bilateral wrist-worn IMU signals from a public dataset called PADS, consisting of three groups, PD (Parkinson Disease), HC (Healthy Control) and DD (Differential Diagnosis) of a total of 469 subjects. We have achieved a mean accuracy of 93.12% for HC vs. PD classification and 87.04% for PD vs. DD classification. The results emphasize the clinical challenge of distinguishing Parkinson's from other neurodegenerative diseases. Self-supervised representation learning using contrastive infoNCE loss gained an accuracy of 93.56% for HC vs. PD and 92.50% for PD vs. DD using only 20% of labelled data. This demonstrates the effectiveness of our method in transfer learning for clinical use with minimal labels. The real-time applicability was tested by deploying the optimized model with a mean inference time of 48.32 ms per window on a Raspberry Pi CPU.", "link": "http://arxiv.org/abs/2604.18372v1", "date": "2026-04-20", "relevancy": 2.1935, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5559}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5525}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5412}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Parkinson%27s%20Disease%20Detection%20via%20Self-Supervised%20Dual-Channel%20Cross-Attention%20on%20Bilateral%20Wrist-Worn%20IMU%20Signals&body=Title%3A%20Parkinson%27s%20Disease%20Detection%20via%20Self-Supervised%20Dual-Channel%20Cross-Attention%20on%20Bilateral%20Wrist-Worn%20IMU%20Signals%0AAuthor%3A%20Meheru%20Zannat%0AAbstract%3A%20Parkinson%27s%20disease%20%28PD%29%20is%20a%20chronic%20neurodegenerative%20disease.%20It%20shows%20multiple%20motor%20symptoms%20such%20as%20tremor%2C%20bradykinesia%2C%20postural%20instability%2C%20freezing%20of%20gait%20%28FoG%29.%20PD%20is%20currently%20diagnosed%20clinically%20through%20physical%20exam%20by%20health-care%20professionals%2C%20which%20can%20be%20time%20consuming%20and%20highly%20subjective.%20Wearable%20IMU%20sensors%20has%20become%20a%20promising%20gateway%20for%20passive%20monitoring%20of%20PD%20patients.%20We%20propose%20a%20self-supervised%20cross-attention%20encoder%20that%20processes%20bilateral%20wrist-worn%20IMU%20signals%20from%20a%20public%20dataset%20called%20PADS%2C%20consisting%20of%20three%20groups%2C%20PD%20%28Parkinson%20Disease%29%2C%20HC%20%28Healthy%20Control%29%20and%20DD%20%28Differential%20Diagnosis%29%20of%20a%20total%20of%20469%20subjects.%20We%20have%20achieved%20a%20mean%20accuracy%20of%2093.12%25%20for%20HC%20vs.%20PD%20classification%20and%2087.04%25%20for%20PD%20vs.%20DD%20classification.%20The%20results%20emphasize%20the%20clinical%20challenge%20of%20distinguishing%20Parkinson%27s%20from%20other%20neurodegenerative%20diseases.%20Self-supervised%20representation%20learning%20using%20contrastive%20infoNCE%20loss%20gained%20an%20accuracy%20of%2093.56%25%20for%20HC%20vs.%20PD%20and%2092.50%25%20for%20PD%20vs.%20DD%20using%20only%2020%25%20of%20labelled%20data.%20This%20demonstrates%2 {"title": "MM-JudgeBias: A Benchmark for Evaluating Compositional Biases in MLLM-as-a-Judge", "author": "Sua Lee and Sanghee Park and Jinbae Im", "abstract": "Multimodal Large Language Models (MLLMs) have been increasingly used as automatic evaluators-a paradigm known as MLLM-as-a-Judge. However, their reliability and vulnerabilities to biases remain underexplored. We find that many MLLM judges fail to reliably integrate key visual or textual cues, yielding unreliable evaluations when evidence is missing or mismatched, and exhibiting instability under semantically irrelevant perturbations. To address this, we systematically define Compositional Bias in MLLM-as-a-Judge systems and introduce MM-JudgeBias, a benchmark for evaluating it. MM-JudgeBias introduces controlled perturbations across Query, Image, and Response, and evaluates model behavior via two complementary metrics: Bias-Deviation (BD) for sensitivity and Bias-Conformity (BC) for stability. Our dataset of over 1,800 curated and refined multimodal samples, drawn from 29 source benchmarks, enables a fine-grained diagnosis of nine bias types across diverse tasks and domains. Experiments on 26 state-of-the-art MLLMs reveal systematic modality neglect and asymmetric evaluation tendencies, underscoring the need for more reliable judges.", "link": "http://arxiv.org/abs/2604.18164v1", "date": "2026-04-20", "relevancy": 1.4767, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5099}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4873}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv. {"title": "DSAINet: An Efficient Dual-Scale Attentive Interaction Network for General EEG Decoding", "author": "Zhiyuan Ma and Zeyuan Li and Zihao Qiu and Jinhao Li and Lingqin Meng and Xinche Zhang and Yixuan Liu and Xinke Shen and Sen Song", "abstract": "In real-world applications of noninvasive electroencephalography (EEG), specialized decoders often show limited generalizability across diverse tasks under subject-independent settings. One central challenge is that task-relevant EEG signals often follow different temporal organization patterns across tasks, while many existing methods rely on task-tailored architectural designs that introduce task-specific temporal inductive biases. This mismatch makes it difficult to adapt temporal modeling across tasks without changing the model configuration. To address these challenges, we propose DSAINet, an efficient dual-scale attentive interaction network for general EEG decoding. Specifically, DSAINet constructs shared spatiotemporal token representations from raw EEG signals and models diverse temporal dynamics through parallel convolutional branches at fine and coarse scales. The resulting representations are then adaptively refined by intra-branch attention to emphasize salient scale-specific patterns and by inter-branch attention to integrate task-relevant features across scales, followed by adaptive token aggregation to yield a compact representation for prediction. Extensive experiments on five downstream EEG decoding tasks across ten public datasets show that DSAINet consistently outperforms 13 representative baselines under strict subject-independent evaluation. Notably, this performance is achieved using the same architecture hyperparameters across datasets. Moreover, DSAINet achieves a favorable accuracy-efficiency trade-off with only about 77K trainable parameters and provides interpretable neurophysiological insights. The code is publicly available at https://github.com/zy0929/DSAINet.", "link": "http://arxiv.org/abs/2604.18095v1", "date": "2026-04-20", "relevancy": 2.1771, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5779}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5288}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5168}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DSAINet%3A%20An%20Efficient%20Dual-Scale%20Attentive%20Interaction%20Network%20for%20General%20EEG%20Decoding&body=Title%3A%20DSAINet%3A%20An%20Efficient%20Dual-Scale%20Attentive%20Interaction%20Network%20for%20General%20EEG%20Decoding%0AAuthor%3A%20Zhiyuan%20Ma%20and%20Zeyuan%20Li%20and%20Zihao%20Qiu%20and%20Jinhao%20Li%20and%20Lingqin%20Meng%20and%20Xinche%20Zhang%20and%20Yixuan%20Liu%20and%20Xinke%20Shen%20and%20Sen%20Song%0AAbstract%3A%20In%20real-world%20applications%20of%20noninvasive%20electroencephalography%20%28EEG%29%2C%20specialized%20decoders%20often%20show%20limited%20generalizability%20across%20diverse%20tasks%20under%20subject-independent%20settings.%20One%20central%20challenge%20is%20that%20task-relevant%20EEG%20signals%20often%20follow%20different%20temporal%20organization%20patterns%20across%20tasks%2C%20while%20many%20existing%20methods%20rely%20on%20task-tailored%20architectural%20designs%20that%20introduce%20task-specific%20temporal%20inductive%20biases.%20This%20mismatch%20makes%20it%20difficult%20to%20adapt%20temporal%20modeling%20across%20tasks%20without%20changing%20the%20model%20configuration.%20To%20address%20these%20challenges%2C%20we%20propose%20DSAINet%2C%20an%20efficient%20dual-scale%20attentive%20interaction%20network%20for%20general%20EEG%20decoding.%20Specifically%2C%20DSAINet%20constructs%20shared%20spatiotemporal%20token%20representations%20from%20raw%20EEG%20signals%20and%20models%20diverse%20temporal%20dynamics%20through%20parallel%20convolutional%20branches%20at%20fine%20and%20coarse%20scales.%20The%20resulting%20representations%20are%20then%20adaptively%20refined%20by%20intra-branch%20attention%20to%20emphasize%20salient%20scale-specific%20patterns%20and%20by%20inter-branch%20attention%20to%20integrate%20task-relevant%20features%20across%20scales%2C%20followed%20by%20adaptive%20token%20aggregation%20to%20yield%20a%20compact%20representation%20for%20prediction.%20Extensive%20experiments%20on%20five%20downstream%20EEG%20decoding%20tasks%20across%20ten%20public%20datasets%20show%20that%20DSAINet%20consistently%20outperforms%2013%20representative%20baselines%20under%20strict%20subject-independent%20evaluation.%20Notably%2C%20this%20performance%20is%20achieved%20using%20the%20same%20architecture%20hyperparameters%20across%20datasets.%20Moreover%2C%20DSAINet%20achieves%20a%20favorable%20accuracy-efficiency%20trade-off%20with%20only%20about%2077K%20trainable%20parameters%20and%20provides%20interpretable%20neurophysiological%20insights.%20The%20code%20is%20publicly%20available%20at%20https%3A//github.com/zy0929/DSAINet.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18095v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDSAINet%253A%2520An%2520Efficient%2520Dual-Scale%2520Attentive%2520Interaction%2520Network%2520for%2520General%2520EEG%2520Decoding%26entry.906535625%3DZhiyuan%2520Ma%2520and%2520Zeyuan%2520Li%2520and%2520Zihao%2520Qiu%2520and%2520Jinhao%2520Li%2520and%2520Lingqin%2520Meng%2520and%2520Xinche%2520Zhang%2520and%2520Yixuan%2520Liu%2520and%2520Xinke%2520Shen%2520and%2520Sen%2520Song%26entry.1292438233%3DIn%2520real-world%2520applications%2520of%2520noninvasive%2520electroencephalography%2520%2528EEG%2529%252C%2520specialized%2520decoders%2520often%2520show%2520limited%2520generalizability%2520across%2520diver {"title": "mlr3torch: A Deep Learning Framework in R based on mlr3 and torch", "author": "Sebastian Fischer and Lukas Burk and Carson Zhang and Bernd Bischl and Martin Binder", "abstract": "Deep learning (DL) has become a cornerstone of modern machine learning (ML) praxis. We introduce the R package mlr3torch, which is an extensible DL framework for the mlr3 ecosystem. It is built upon the torch package, and simplifies the definition, training, and evaluation of neural networks for both tabular data and generic tensors (e.g., images) for classification and regression. The package implements predefined architectures, and torch models can easily be converted to mlr3 learners. It also allows users to define neural networks as graphs. This representation is based on the graph language defined in mlr3pipelines and allows users to define the entire modeling workflow, including preprocessing, data augmentation, and network architecture, in a single graph. Through its integration into the mlr3 ecosystem, the package allows for convenient resampling, benchmarking, preprocessing, and more. We explain the package's design and features and show how to customize and extend it to new problems. Furthermore, we demonstrate the package's capabilities using three use cases, namely hyperparameter tuning, fine-tuning, and defining architectures for multimodal data. Finally, we present some runtime benchmarks.", "link": "http://arxiv.org/abs/2604.18152v1", "date": "2026-04-20", "relevancy": 1.8984, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4897}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4668}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity" {"title": "Semantic-based Distributed Learning for Diverse and Discriminative Representations", "author": "Zhuojun Tian and Chaouki Ben Issaid and Mehdi Bennis", "abstract": "In large-scale distributed scenarios, increasingly complex tasks demand more intelligent collaboration across networks, requiring the joint extraction of structural representations from data samples. However, conventional task-specific approaches often result in nonstructural embeddings, leading to collapsed variability among data samples within the same class, particularly in classification tasks. To address this issue and fully leverage the intrinsic structure of data for downstream applications, we propose a novel distributed learning framework that ensures both diverse and discriminative representations. For independent and identically distributed (i.i.d.) data, we reformulate and decouple the global optimization function by introducing constraints on representation variance. The update rules are then derived and simplified using a primal-dual approach. For non-i.i.d. data distributions, we tackle the problem by clustering and virtually replicating nodes, allowing model updates within each cluster using block coordinate descent. In both cases, the resulting optimal solutions are theoretically proven to maintain discriminative and diverse properties, with a guaranteed convergence for i.i.d. conditions. Additionally, semantic information from representations is shared among nodes, reducing the need for common neural network architectures. Finally, extensive simulations on MNIST, CIFAR-10 and CIFAR-100 confirm the effectiveness of the proposed algorithms in capturing global structural representations.", "link": "http://arxiv.org/abs/2604.18237v1", "date": "2026-04-20", "relevancy": 2.2584, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5689}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5632}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5572}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Semantic-based%20Distributed%20Learning%20for%20Diverse%20and%20Discriminative%20Representations&body=Title%3A%20Semantic-based%20Distributed%20Learning%20for%20Diverse%20and%20Discriminative%20Representations%0AAuthor%3A%20Zhuojun%20Tian%20and%20Chaouki%20Ben%20Issaid%20and%20Mehdi%20Bennis%0AAbstract%3A%20In%20large-scale%20distributed%20scenarios%2C%20increasingly%20complex%20tasks%20demand%20more%20intelligent%20collaboration%20across%20networks%2C%20requiring%20the%20joint%20extraction%20of%20structural%20representations%20from%20data%20samples.%20However%2C%20conventional%20task-specific%20approaches%20often%20result%20in%20nonstructural%20embeddings%2C%20leading%20to%20collapsed%20variability%20among%20data%20samples%20within%20the%20same%20class%2C%20particularly%20in%20classification%20tasks.%20To%20address%20this%20issue%20and%20fully%20leverage%20the%20intrinsic%20structure%20of%20data%20for%20downstream%20applications%2C%20we%20propose%20a%20novel%20distributed%20learning%20framework%20that%20ensures%20both%20diverse%20and%20discriminative%20representations.%20For%20independent%20and%20identically%20distributed%20%28i.i.d.%29%20data%2C%20we%20reformulate%20and%20decouple%20the%20global%20optimization%20function%20by%20introducing%20constraints%20on%20representation%20variance.%20The%20update%20rules%20are%20then%20derived%20and%20simplified%20using%20a%20primal-dual%20approach.%20For%20non-i.i.d.%20data%20distributions%2C%20we%20tackle%20the%20problem%20by%20clustering%20and%20virtually%20replicating%20nodes%2C%20allowing%20model%20updates%20within%20each%20cluster%20using%20block%20coordinate%20descent.%20In%20both%20cases%2C%20the%20resulting%20optimal%20solutions%20are%20theoretically%20proven%20to%20maintain%20discriminative%20and%20diverse%20properties%2C%20with%20a%20guaranteed%20convergence%20for%20i.i.d.%20conditions.%20Additionally%2C%20semantic%20information%20from%20representations%20is%20shared%20among%20nodes%2C%20reducing%20the%20need%20for%20common%20neural%20network%20architectures.%20Finally%2C%20extensive%20simulations%20on%20MNIST%2C%20CIFAR-10%20and%20CIFAR-100%20confirm%20the%20effectiveness%20of%20the%20proposed%20algorithms%20in%20capturing%20global%20structural%20representations.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18237v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSemantic-based%2520Distributed%2520Learning%2520for%2520Diverse%2520and%2520Discriminative%2520Representations%26entry.906535625%3DZhuojun%2520Tian%2520and%2520Chaouki%2520Ben%2520Issaid%2520and%2520Mehdi%2520Bennis%26entry.1292438233%3DIn%2520large-scale%2520distributed%2520scenarios%252C%2520increasingly%2520complex%2520tasks%2520demand%2520more%2520intelligent%2520collaboration%2520across%2520networks%252C%2520requiring%2520the%2520joint%2520extraction%2520of%2520structural%2520representations%2520from%2520data%2520samples.%2520However%252C%2520conventional%2520task-specific%2520approaches%2520often%2520result%2520in%2520nonstructural%2520embeddings%252C%2520leading%2520to%2520collapsed%2520variability%2520among%2520data%2520samples%2520within%2520the%2520same%2520class%252C%2520particularly%2520in%2520classification%2520tasks.%2520To%2520address%2520this%2520issue%2520and%2520fully%2520leverage%2520the%2520intrinsic%2520structure%2520of%2520data%2520for%2520downstream%2520applications%252C%2520we%2520propose%2520a%2520novel%2520distributed%2520learning%2520framework%2520that%2520ensures%2520both%2520diverse%2520and%2520discriminative%2520representa {"title": "ReflexiCoder: Teaching Large Language Models to Self-Reflect on Generated Code and Self-Correct It via Reinforcement Learning", "author": "Juyong Jiang and Jiasi Shen and Sunghun Kim and Kang Min Yoo and Jeonghoon Kim and Sungju Kim", "abstract": "While Large Language Models (LLMs) have revolutionized code generation, standard ``System 1'' approaches that generate solutions in a single forward pass often hit a performance ceiling on complex algorithmic tasks. Existing iterative refinement strategies attempt to bridge this gap at inference time, yet they predominantly rely on external oracles, execution feedback, or computationally expensive prompt-response cycles. In this work, we propose ReflexiCoder, a novel reinforcement learning (RL) framework that internalizes the structured reasoning trajectory, encompassing initial generation, bug and optimization aware reflection, and self-correction, directly into the model's weights. Unlike prior methods, ReflexiCoder shifts the paradigm from external-dependent refinement to an intrinsic, fully autonomous self-reflection and self-correction capabilities at inference time. We utilize an RL-only training paradigm with granular reward functions to optimize the entire reflection-correction trajectory, teaching the model how to debug without reliance on ground-truth feedback or execution engines at inference time. Extensive experiments across seven benchmarks demonstrate that our ReflexiCoder-8B establishes a new state-of-the-art (SOTA) among leading open-source models in the 1.5B to 14B range, achieving 94.51% (87.20%) on HumanEval (Plus), 81.80% (78.57%) on MBPP (Plus), 35.00% on BigCodeBench, 52.21% on LiveCodeBench, and 37.34% on CodeForces in a single-attempt setting, rivaling or surpassing proprietary models like GPT-5.1. Notably, our framework is significantly more token-efficient than base models, reducing inference-time compute overhead by approximately 40% through disciplined, efficient reasoning and reflection patterns. The source code and data are available at https://github.com/juyongjiang/ReflexiCoder.", "link": "http://arxiv.org/abs/2603.05863v2", "date": "2026-04-20", "relevancy": 2.0091, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5097}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5008}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5008}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ReflexiCoder%3A%20Teaching%20Large%20Language%20Models%20to%20Self-Reflect%20on%20Generated%20Code%20and%20Self-Correct%20It%20via%20Reinforcement%20Learning&body=Title%3A%20ReflexiCoder%3A%20Teaching%20Large%20Language%20Models%20to%20Self-Reflect%20on%20Generated%20Code%20and%20Self-Correct%20It%20via%20Reinforcement%20Learning%0AAuthor%3A%20Juyong%20Jiang%20and%20Jiasi%20Shen%20and%20Sunghun%20Kim%20and%20Kang%20Min%20Yoo%20and%20Jeonghoon%20Kim%20and%20Sungju%20Kim%0AAbstract%3A%20While%20Large%20Language%20Models%20%28LLMs%29%20have%20revolutionized%20code%20generation%2C%20standard%20%60%60System%201%27%27%20approaches%20that%20generate%20solutions%20in%20a%20single%20forward%20pass%20often%20hit%20a%20performance%20ceiling%20on%20complex%20algorithmic%20tasks.%20Existing%20iterative%20refinement%20strategies%20attempt%20to%20bridge%20this%20gap%20at%20inference%20time%2C%20yet%20they%20predominantly%20rely%20on%20external%20oracles%2C%20execution%20feedback%2C%20or%20computationally%20expensive%20prompt-response%20cycles.%20In%20this%20work%2C%20we%20propose%20ReflexiCoder%2C%20a%20novel%20reinforcement%20learning%20%28RL%29%20framework%20that%20internalizes%20the%20structured%20reasoning%20trajectory%2C%20encompassing%20initial%20generation%2C%20bug%20and%20optimization%20aware%20reflection%2C%20and%20self-correction%2C%20directly%20into%20the%20model%27s%20weights.%20Unlike%20prior%20methods%2C%20ReflexiCoder%20shifts%20the%20paradigm%20from%20external-dependent%20refinement%20to%20an%20intrinsic%2C%20fully%20autonomous%20self-reflection%20and%20self-correction%20capabilities%20at%20inference%20time.%20We%20utilize%20an%20RL-only%20training%20paradigm%20with%20granular%20reward%20functions%20to%20optimize%20the%20entire%20reflection-correction%20trajectory%2C%20teaching%20the%20model%20how%20to%20debug%20without%20reliance%20on%20ground-truth%20feedback%20or%20execution%20engines%20at%20inference%20time.%20Extensive%20experiments%20across%20seven%20benchmarks%20demonstrate%20that%20our%20ReflexiCoder-8B%20establishes%20a%20new%20state-of-the-art%20%28SOTA%29%20among%20leading%20open-source%20models%20in%20the%201.5B%20to%2014B%20range%2C%20achieving%2094.51%25%20%2887.20%25%29%20on%20HumanEval%20%28Plus%29%2C%2081.80%25%20%2878.57%25%29%20on%20MBPP%20%28Plus%29%2C%2035.00%25%20on%20BigCodeBench%2C%2052.21%25%20on%20LiveCodeBench%2C%20and%2037.34%25%20on%20CodeForces%20in%20a%20single-attempt%20setting%2C%20rivaling%20or%20surpassing%20proprietary%20models%20like%20GPT-5.1.%20Notably%2C%20our%20framework%20is%20significantly%20more%20token-efficient%20than%20base%20models%2C%20reducing%20inference-time%20compute%20overhead%20by%20approximately%2040%25%20through%20disciplined%2C%20efficient%20reasoning%20and%20reflection%20patterns.%20The%20source%20code%20and%20data%20are%20available%20at%20https%3A//github.com/juyongjiang/ReflexiCoder.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05863v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReflexiCoder%253A%2520Teaching%2520Large%2520Language%2520Models%2520to%2520Self-Reflect%2520on%2520Generated%2520Code%2520and%2520Self-Correct%2520It%2520via%2520Reinforc {"title": "Correction and Corruption: A Two-Rate View of Error Flow in LLM Protocols", "author": "Fernando Reitich", "abstract": "Large language models are increasingly deployed as protocols: structured multi-call procedures that spend additional computation to transform a baseline answer into a final one. These protocols are evaluated only by end-to-end accuracy, giving limited insight into when they help, when they hurt, and whether their behavior transfers under distribution shift or composition. We propose a paired-outcome measurement interface for auditing a single protocol step on exact-match tasks. For each instance, the interface records a baseline correctness bit $E_0\\in\\{0,1\\}$ and a post-step correctness bit $E_1\\in\\{0,1\\}$, separating correction ($E_0=0\\to E_1=1$) from corruption ($E_0=1\\to E_1=0$) through two rates: $c=\\Pr(E_1=1\\mid E_0=0)$ and $\u03b3=\\Pr(E_1=0\\mid E_0=1)$. These rates predict accuracy changes and define a reusable empirical interface testable across seeds, mixtures, and pipelines. We identify three failure mechanisms. Under mixture shift, pooled estimates of $(c,\u03b3)$ become biased when calibration and deployment mixtures differ; conditioning on a difficulty proxy restores stability without additional model calls. Under presentation contamination, selection protocols alter the interface through stable presentation artifacts when candidate content is fixed. Under state insufficiency, the correctness bit may not carry enough history for multi-step pipelines to compose predictably; a Markov factorization test identifies when composition is valid and where additional state is needed. When a protocol step passes these diagnostics, it becomes an auditable module: gated by estimated gain, conditioned on a difficulty proxy to correct mixture bias, and composed into multi-step pipelines with predictable accuracy. We demonstrate these ideas on synthetic mathematical tasks and on GSM8K, where the calibrated interface correctly predicts when protocol steps should be activated or suppressed.", "link": "http://arxiv.org/abs/2604.18245v1", "date": "2026-04-20", "relevancy": 1.3542, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4542}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4483}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4475}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Correction%20and%20Corruption%3A%20A%20Two-Rate%20View%20of%20Error%20Flow%20in%20LLM%20Protocols&body=Title%3A%20Correction%20and%20Corruption%3A%20A%20Two-Rate%20View%20of%20Error%20Flow%20in%20LLM%20Protocols%0AAuthor%3A%20Fernando%20Reitich%0AAbstract%3A%20Large%20language%20models%20are%20increasingly%20deployed%20as%20protocols%3A%20structured%20multi-call%20procedures%20that%20spend%20additional%20computation%20to%20transform%20a%20baseline%20answer%20into%20a%20final%20one.%20These%20protocols%20are%20evaluated%20only%20by%20end-to-end%20accuracy%2C%20giving%20limited%20insight%20into%20when%20they%20help%2C%20when%20they%20hurt%2C%20and%20whether%20their%20behavior%20transfers%20under%20distribution%20shift%20or%20composition.%20We%20propose%20a%20paired-outcome%20measurement%20interface%20for%20auditing%20a%20single%20protocol%20step%20on%20exact-match%20tasks.%20For%20each%20instance%2C%20the%20interface%20records%20a%20baseline%20correctness%20bit%20%24E_0%5Cin%5C%7B0%2C1%5C%7D%24%20and%20a%20post-step%20correctness%20bit%20%24E_1%5Cin%5C%7B0%2C1%5C%7D%24%2C%20separating%20correction%20%28%24E_0%3D0%5Cto%20E_1%3D1%24%29%20from%20corruption%20%28%24E_0%3D1%5Cto%20E_1%3D0%24%29%20through%20two%20rates%3A%20%24c%3D%5CPr%28E_1%3D1%5Cmid%20E_0%3D0%29%24%20and%20%24%CE%B3%3D%5CPr%28E_1%3D0%5Cmid%20E_0%3D1%29%24.%20These%20rates%20predict%20accuracy%20changes%20and%20define%20a%20reusable%20empirical%20interface%20testable%20across%20seeds%2C%20mixtures%2C%20and%20pipelines.%20We%20identify%20three%20failure%20mechanisms.%20Under%20mixture%20shift%2C%20pooled%20estimates%20of%20%24%28c%2C%CE%B3%29%24%20become%20biased%20when%20calibration%20and%20deployment%20mixtures%20differ%3B%20conditioning%20on%20a%20difficulty%20proxy%20restores%20stability%20without%20additional%20model%20calls.%20Under%20presentation%20contamination%2C%20selection%20protocols%20alter%20the%20interface%20through%20stable%20presentation%20artifacts%20when%20candidate%20content%20is%20fixed.%20Under%20state%20insufficiency%2C%20the%20correctness%20bit%20may%20not%20carry%20enough%20history%20for%20multi-step%20pipelines%20to%20compose%20predictably%3B%20a%20Markov%20factorization%20test%20identifies%20when%20composition%20is%20valid%20and%20where%20additional%20state%20is%20needed.%20When%20a%20protocol%20step%20passes%20these%20diagnostics%2C%20it%20becomes%20an%20auditable%20module%3A%20gated%20by%20estimated%20gain%2C%20conditioned%20on%20a%20difficulty%20proxy%20to%20correct%20mixture%20bias%2C%20and%20composed%20into%20multi-step%20pipelines%20with%20predictable%20accuracy.%20We%20demonstrate%20these%20ideas%20on%20synthetic%20mathematical%20tasks%20and%20on%20GSM8K%2C%20where%20the%20calibrated%20interface%20correctly%20predicts%20when%20protocol%20steps%20should%20be%20activated%20or%20suppressed.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18245v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCorrection%2520and%2520Corruption%253A%2520A%2520Two-Rate%2520View%2520of%2520Error%2520Flow%2520in%2520LLM%2520Protocol {"title": "Deep Learning-Enhanced Calibration of the Heston Model: A Unified Framework", "author": "Arman Zadgar and Somayeh Fallah and Farshid Mehrdoust and Juan E. Trinidad Segovia", "abstract": "The Heston stochastic volatility model is a widely used tool in financial mathematics for pricing European options. However, its calibration remains computationally intensive and sensitive to local minima due to the model's nonlinear structure and high-dimensional parameter space. This paper introduces a hybrid deep learning-based framework that enhances both the computational efficiency and the accuracy of the calibration procedure. The proposed approach integrates two supervised feedforward neural networks: the Price Approximator Network (PAN), which approximates the option price surface based on strike and moneyness inputs, and the Calibration Correction Network (CCN), which refines the Heston model's output by correcting systematic pricing errors. Experimental results on real S\\&P 500 option data demonstrate that the deep learning approach outperforms traditional calibration techniques across multiple error metrics, achieving faster convergence and superior generalization in both in-sample and out-of-sample settings. This framework offers a practical and robust solution for real-time financial model calibration.", "link": "http://arxiv.org/abs/2510.24074v2", "date": "2026-04-20", "relevancy": 1.9861, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5339}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4726}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4687}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Deep%20L

{"title": "T-REN: Learning Text-Aligned Region Tokens Improves Dense Vision-Language Alignment and Scalability", "author": "Savya Khosla and Sethuraman T and Aryan Chadha and Alex Schwing and Derek Hoiem", "abstract": "Despite recent progress, vision-language encoders struggle with two core limitations: (1) weak alignment between language and dense vision features, which hurts tasks like open-vocabulary semantic segmentation; and (2) high token counts for fine-grained visual representations, which limits scalability to long videos. This work addresses both limitations. We propose T-REN (Text-aligned Region Encoder Network), an efficient encoder that maps visual data to a compact set of text-aligned region-level representations (or region tokens). T-REN achieves this through a lightweight network added on top of a frozen vision backbone, trained to pool patch-level representations within each semantic region into region tokens and align them with region-level text annotations. With only 3.7% additional parameters compared to the vision-language backbone, this design yields substantially stronger dense cross-modal understanding while reducing the token count by orders of magnitude. Specifically, T-REN delivers +5.9 mIoU on ADE20K open-vocabulary segmentation, +18.4% recall on COCO object-level text-image retrieval, +15.6% recall on Ego4D video object localization, and +17.6% mIoU on VSPW video scene parsing, all while reducing token counts by more than 24x for images and 187x for videos compared to the patch-based vision-language backbone. The code and model are available at https://github.com/savya08/T-REN.", "link": "http://arxiv.org/abs/2604.18573v1", "date": "2026-04-20", "relevancy": 2.9682, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5949}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5949}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5911}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20T-REN%3A%20Learning%20Text-Aligned%20Region%20Tokens%20Improves%20Dense%20Vision-Language%20Alignment%20and%20Scalability&body=Title%3A%20T-REN%3A%20Learning%20Text-Aligned%20Region%20Tokens%20Improves%20Dense%20Vision-Language%20Alignment%20and%20Scalability%0AAuthor%3A%20Savya%20Khosla%20and%20Sethuraman%20T%20and%20Aryan%20Chadha%20and%20Alex%20Schwing%20and%20Derek%20Hoiem%0AAbstract%3A%20Despite%20recent%20progress%2C%20vision-language%20encoders%20struggle%20with%20two%20core%20limitations%3A%20%281%29%20weak%20alignment%20between%20language%20and%20dense%20vision%20features%2C%20which%20hurts%20tasks%20like%20open-vocabulary%20semantic%20segmentation%3B%20and%20%282%29%20high%20token%20counts%20for%20fine-grained%20visual%20representations%2C%20which%20limits%20scalability%20to%20long%20videos.%20This%20work%20addresses%20both%20limitations.%20We%20propose%20T-REN%20%28Text-aligned%20Region%20Encoder%20Network%29%2C%20an%20efficient%20encoder%20that%20maps%20visual%20data%20to%20a%20compact%20set%20of%20text-aligned%20region-level%20representations%20%28or%20region%20tokens%29.%20T-REN%20achieves%20this%20through%20a%20lightweight%20network%20added%20on%20top%20of%20a%20frozen%20vision%20backbone%2C%20trained%20to%20pool%20patch-level%20representations%20within%20each%20semantic%20region%20into%20region%20tokens%20and%20align%20them%20with%20region-level%20text%20annotations.%20With%20only%203.7%25%20additional%20parameters%20compared%20to%20the%20vision-language%20backbone%2C%20this%20design%20yields%20substantially%20stronger%20dense%20cross-modal%20understanding%20while%20reducing%20the%20token%20count%20by%20orders%20of%20magnitude.%20Specifically%2C%20T-REN%20delivers%20%2B5.9%20mIoU%20on%20ADE20K%20open-vocabulary%20segmentation%2C%20%2B18.4%25%20recall%20on%20COCO%20object-level%20text-image%20retrieval%2C%20%2B15.6%25%20recall%20on%20Ego4D%20video%20object%20localization%2C%20and%20%2B17.6%25%20mIoU%20on%20VSPW%20video%20scene%20parsing%2C%20all%20while%20reducing%20token%20counts%20by%20more%20than%2024x%20for%20images%20and%20187x%20for%20videos%20compared%20to%20the%20patch-based%20vision-language%20backbone.%20The%20code%20and%20model%20are%20available%20at%20https%3A//github.com/savya08/T-REN.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18573v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DT-REN%253A%2520Learning%2520Text-Aligned%2520Region%2520Tokens%2520Improves%2520Dense%2520Vision-Language%2520Alignment%2520and%2520Scalability%26entry.906535625%3DSavya%2520Khosla%2520and%2520Sethuraman%2520T%2520and%2520Aryan%2520Chadha%2520and%2520Alex%2520Schwing%2520and%2520Derek%2520Hoiem%26entry.1292438233%3DDespite%2520recent%2520progress%252C%2520vision-language%2520encoders%2520struggle%2520with%2520two%2520core%2520limitations%253A%2520%25281%2529%2520weak%2520alignment%2520between%2520language%2520and%2520dense%2520vision%2520features%252C%2520which%2520hurts%2520tasks%2520like%2520open-vocabulary%2520semantic%2520segmentation%253B%2520and%2520%25282%2529%2520high%2520token%2520counts%2520for%2520fine-grained%2520visual%2520representations%252C%2520which%2520limits%2520scalability%2520to%2520long%2520videos.%2520This%2520work%2520addresses%2520both%2520limitations.%2520We%2520propose%2520T-REN%2520%2528Text-aligned%2520Region%2520Encoder%2520Network%2529%252C%2520an%2520efficient%2520encoder%2520that%2520maps%2520visual%2520data%2520to%2520a%2520compact%2520set%2520of%2520text-aligned%2520region-level%2520representations%2520%2528or%2520region%2520tokens%2529.%2520T-REN%2520achieves%2520this%2520through%2520a%2520lightweight%2520network%2520added%2520on%2520 {"title": "MARCO: Navigating the Unseen Space of Semantic Correspondence", "author": "Claudia Cuttano and Gabriele Trivigno and Carlo Masone and Stefan Roth", "abstract": "Recent advances in semantic correspondence rely on dual-encoder architectures, combining DINOv2 with diffusion backbones. While accurate, these billion-parameter models generalize poorly beyond training keypoints, revealing a gap between benchmark performance and real-world usability, where queried points rarely match those seen during training. Building upon DINOv2, we introduce MARCO, a unified model for generalizable correspondence driven by a novel training framework that enhances both fine-grained localization and semantic generalization. By coupling a coarse-to-fine objective that refines spatial precision with a self-distillation framework, which expands sparse supervision beyond annotated regions, our approach transforms a handful of keypoints into dense, semantically coherent correspondences. MARCO sets a new state of the art on SPair-71k, AP-10K, and PF-PASCAL, with gains that amplify at fine-grained localization thresholds (+8.9 PCK@0.01), strongest generalization to unseen keypoints (+5.1, SPair-U) and categories (+4.7, MP-100), while remaining 3x smaller and 10x faster than diffusion-based approaches. Code is available at https://github.com/visinf/MARCO .", "link": "http://arxiv.org/abs/2604.18267v1", "date": "2026-04-20", "relevancy": 2.9268, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6081}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.574}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.574}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MARCO%3A%20Navigating%20the%20Unseen%20Space%20of%20Semantic%20Correspondence&body=Title%3A%20MARCO%3A%20Navigating%20the%20Unseen%20Space%20of%20Semantic%20Correspondence%0AAuthor%3A%20Claudia%20Cuttano%20and%20Gabriele%20Trivigno%20and%20Carlo%20Masone%20and%20Stefan%20Roth%0AAbstract%3A%20Recent%20advances%20in%20semantic%20correspondence%20rely%20on%20dual-encoder%20architectures%2C%20combining%20DINOv2%20with%20diffusion%20backbones.%20While%20accurate%2C%20these%20billion-parameter%20models%20generalize%20poorly%20beyond%20training%20keypoints%2C%20revealing%20a%20gap%20between%20benchmark%20performance%20and%20real-world%20usability%2C%20where%20queried%20points%20rarely%20match%20those%20seen%20during%20training.%20Building%20upon%20DINOv2%2C%20we%20introduce%20MARCO%2C%20a%20unified%20model%20for%20generalizable%20correspondence%20driven%20by%20a%20novel%20training%20framework%20that%20enhances%20both%20fine-grained%20localization%20and%20semantic%20generalization.%20By%20coupling%20a%20coarse-to-fine%20objective%20that%20refines%20spatial%20precision%20with%20a%20self-distillation%20framework%2C%20which%20expands%20sparse%20supervision%20beyond%20annotated%20regions%2C%20our%20approach%20transforms%20a%20handful%20of%20keypoints%20into%20dense%2C%20semantically%20coherent%20correspondences.%20MARCO%20sets%20a%20new%20state%20of%20the%20art%20on%20SPair-71k%2C%20AP-10K%2C%20and%20PF-PASCAL%2C%20with%20gains%20that%20amplify%20at%20fine-grained%20localization%20thresholds%20%28%2B8.9%20PCK%400.01%29%2C%20strongest%20generalization%20to%20unseen%20keypoints%20%28%2B5.1%2C%20SPair-U%29%20and%20categories%20%28%2B4.7%2C%20MP-100%29%2C%20while%20remaining%203x%20smaller%20and%2010x%20faster%20than%20diffusion-based%20approaches.%20Code%20is%20available%20at%20https%3A//github.com/visinf/MARCO%20.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18267v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIa x%20smaller%20and%2010x%20faster%20than%20diffusion-based%20approaches.%20Code%20is%20available%20at%20https%3A//github.com/visinf/MARCO%20.&entry.1838667208=http%3A//arxiv.org/abs/2604.18267v1&entry.124074799=Read"},
{"title": "DualToken: Towards Unifying Visual Understanding and Generation with Dual Visual Vocabularies", "author": "Wei Song and Yuran Wang and Zijia Song and Yadong Li and Zenan Zhou and Long Chen and Jianhua Xu and Jiaqi Wang and Kaicheng Yu", "abstract": "The differing representation spaces required for visual understanding and generation pose a challenge in unifying them within the autoregressive paradigm of large language models. A vision tokenizer trained for reconstruction excels at capturing low-level visual appearance, making it well-suited for visual generation but lacking high-level semantic representations for understanding tasks. Conversely, a vision encoder trained via contrastive learning aligns well with language but struggles to decode back into the pixel space for generation tasks. To bridge this gap, we propose DualToken, a method that unifies representations for both understanding and generation within a single tokenizer. However, directly integrating reconstruction and semantic objectives creates conflicts, leading to degraded performance in both reconstruction fidelity and semantic accuracy. Instead of forcing a single codebook to capture both visual appearance and semantics, DualToken disentangles them by introducing separate codebooks for high-level semantics and low-level visual details. As a result, DualToken achieves 0.25 rFID and 82.0% zero-shot accuracy on ImageNet, and demonstrates strong effectiveness in downstream MLLM tasks for both understanding and generation. Specifically, our method surpasses VILA-U by 5.8 points on average across ten visual understanding benchmarks and delivers a 13% improvement on GenAI-Bench. Notably, incorporating dual visual tokens outperforms using a single token type on both understanding and generation tasks. We hope our research offers a new perspective on leveraging dual visual vocabularies for building unified vision-language models. Project page is available at https://songweii.github.io/dualtoken-project-page.", "link": "http://arxiv.org/abs/2503.14324v3", "date": "2026-04-20", "relevancy": 2.9006, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5881}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5761}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5761}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DualToken%3A%20Towards%20Unifying%20Visual%20Understanding%20and%20Generation%20with%20Dual%20Visual%20Vocabularies&body=Title%3A%20DualToken%3A%20Towards%20Unifying%20Visual%20Understanding%20and%20Generation%20with%20Dual%20Visual%20Vocabularies%0AAuthor%3A%20Wei%20Song%20and%20Yuran%20Wang%20and%20Zijia%20Song%20and%20Yadong%20Li%20and%20Zenan%20Zhou%20and%20Long%20Chen%20and%20Jianhua%20Xu%20and%20Jiaqi%20Wang%20and%20Kaicheng%20Yu%0AAbstract%3A%20The%20differing%20representation%20spaces%20required%20for%20visual%20understanding%20and%20generation%20pose%20a%20challenge%20in%20unifying%20them%20within%20the%20autoregressive%20paradigm%20of%20large%20language%20models.%20A%20vision%20tokenizer%20trained%20for%20reconstruction%20excels%20at%20capturing%20low-level%20visual%20appearance%2C%20making%20it%20well-suited%20for%20visual%20generation%20but%20lacking%20high-level%20semantic%20representations%20for%20understanding%20tasks.%20Conversely%2C%20a%20vision%20encoder%20trained%20via%20contrastive%20learning%20aligns%20well%20with%20language%20but%20struggles%20to%20decode%20back%20into%20the%20pixel%20space%20for%20generation%20tasks.%20To%20bridge%20this%20gap%2C%20we%20propose%20DualToken%2C%20a%20method%20that%20unifies%20representations%20for%20both%20understanding%20and%20generation%20within%20a%20single%20tokenizer.%20However%2C%20directly%20integrating%20reconstruction%20and%20semantic%20objectives%20creates%20conflicts%2C%20leading%20to%20degraded%20performance%20in%20both%20reconstruction%20fidelity%20and%20semantic%20accuracy.%20Instead%20of%20forcing%20a%20single%20codebook%20to%20capture%20both%20visual%20appearance%20and%20semantics%2C%20DualToken%20disentangles%20them%20by%20introducing%20separate%20codebooks%20for%20high-level%20semantics%20and%20low-level%20visual%20details.%20As%20a%20result%2C%20DualToken%20achieves%200.25%20rFID%20and%2082.0%25%20zero-shot%20accuracy%20on%20ImageNet%2C%20and%20demonstrates%20strong%20effectiveness%20in%20downstream%20MLLM%20tasks%20for%20both%20understanding%20and%20generation.%20Specifically%2C%20our%20method%20surpasses%20VILA-U%20by%205.8%20points%20on%20average%20across%20ten%20visual%20understanding%20benchmarks%20and%20delivers%20a%2013%25%20improvement%20on%20GenAI-Bench.%20Notably%2C%20incorporating%20dual%20visual%20tokens%20outperforms%20using%20a%20single%20token%20type%20on%20both%20understanding%20and%20generation%20tasks.%20We%20hope%20our%20research%20offers%20a%20new%20perspective%20on%20leveraging%20dual%20visual%20vocabularies%20for%20building%20unified%20vision-language%20models.%20Project%20page%20is%20available%20at%20https%3A//songweii.github.io/dualtoken-project-page.%0ALink%3A%20http%3A//arxiv.org/abs/2503.14324v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDualToken%253A%2520Towards%2520Unifying%2520Visual%2520Understanding%2520and%2520Generation%2520with%2520Dual%2520Visual%2520Vocabularies%26entry.906535625%3DWei%2520Song%2520and%2520Yuran%2520Wang%2520and%2520Zijia%2520Song%2520and%2520Yadong%2520Li%2520and%2520Zenan%2520Zhou%2520and%2520Long%2520Chen%2520and%2520Jianhua%2520Xu%2520and%2520Jiaqi%2520Wang%2520and%2520Kaicheng%2520Yu%26entry.1292438233%3DThe%2520differing%2520representation%2520spaces {"title": "ViT$^3$: Unlocking Test-Time Training in Vision", "author": "Dongchen Han and Yining Li and Tianyu Li and Zixuan Cao and Ziming Wang and Jun Song and Yu Cheng and Bo Zheng and Gao Huang", "abstract": "Test-Time Training (TTT) has recently emerged as a promising direction for efficient sequence modeling. TTT reformulates attention operation as an online learning problem, constructing a compact inner model from key-value pairs at test time. This reformulation opens a rich and flexible design space while achieving linear computational complexity. However, crafting a powerful visual TTT design remains challenging: fundamental choices for the inner module and inner training lack comprehensive understanding and practical guidelines. To bridge this critical gap, in this paper, we present a systematic empirical study of TTT designs for visual sequence modeling. From a series of experiments and analyses, we distill six practical insights that establish design principles for effective visual TTT and illuminate paths for future improvement. These findings culminate in the Vision Test-Time Training (ViT$^3$) model, a pure TTT architecture that achieves linear complexity and parallelizable computation. We evaluate ViT$^3$ across diverse visual tasks, including image classification, image generation, object detection, and semantic segmentation. Results show that ViT$^3$ consistently matches or outperforms advanced linear-complexity models (e.g., Mamba and linear attention variants) and effectively narrows the gap to highly optimized vision Transformers. We hope this study and the ViT$^3$ baseline can facilitate future work on visual TTT models. Code: github.com/LeapLabTHU/ViTTT.", "link": "http://arxiv.org/abs/2512.01643v2", "date": "2026-04-20", "relevancy": 2.8964, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5885}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5747}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5747}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ViT%24%5E3%24%3A%20Unlocking%20Test-Time%20Training%20in%20Vision&body=Title%3A%20ViT%24%5E3%24%3A%20Unlocking%20Test-Time%20Training%20in%20Vision%0AAuthor%3A%20Dongchen%20Han%20and%20Yining%20Li%20and%20Tianyu%20Li%20and%20Zixuan%20Cao%20and%20Ziming%20Wang%20and%20Jun%20Song%20and%20Yu%20Cheng%20and%20Bo%20Zheng%20and%20Gao%20Huang%0AAbstract%3A%20Test-Time%20Training%20%28TTT%29%20has%20recently%20emerged%20as%20a%20promising%20direction%20for%20efficient%20sequence%20modeling.%20TTT%20reformulates%20attention%20operation%20as%20an%20online%20learning%20problem%2C%20constructing%20a%20compact%20inner%20model%20from%20key-value%20pairs%20at%20test%20time.%20This%20reformulation%20opens%20a%20rich%20and%20flexible%20design%20space%20while%20achieving%20linear%20computational%20complexity.%20However%2C%20crafting%20a%20powerful%20visual%20TTT%20design%20remains%20challenging%3A%20fundamental%20choices%20for%20the%20inner%20module%20and%20inner%20training%20lack%20comprehensive%20understanding%20and%20practical%20guidelines.%20To%20bridge%20this%20critical%20gap%2C%20in%20this%20paper%2C%20we%20present%20a%20systematic%20empirical%20study%20of%20TTT%20designs%20for%20visual%20sequence%20modeling.%20From%20a%20series%20of%20experiments%20and%20analyses%2C%20we%20distill%20six%20practical%20insights%20that%20establish%20design%20principles%20for%20effective%20visual%20TTT%20and%20illuminate%20paths%20for%20future%20improvement.%20These%20findings%20culminate%20in%20the%20Vision%20Test-Time%20Training%20%28ViT%24%5E3%24%29%20model%2C%20a%20pure%20TTT%20architecture%20that%20achieves%20linear%20complexity%20and%20parallelizable%20computation.%20We%20evaluate%20ViT%24%5E3%24%20across%20diverse%20visual%20tasks%2C%20including%20image%20classification%2C%20image%20generation%2C%20object%20detection%2C%20and%20semantic%20segmentation.%20Results%20show%20that%20ViT%24%5E3%24%20consistently%20matches%20or%20outperforms%20advanced%20linear-complexity%20models%20%28e.g.%2C%20Mamba%20and%20linear%20attention%20variants%29%20and%20effectively%20narrows%20the%20gap%20to%20highly%20optimized%20vision%20Transformers.%20We%20hope%20this%20study%20and%20the%20ViT%24%5E3%24%20baseline%20can%20facilitate%20future%20work%20on%20visual%20TTT%20models.%20Code%3A%20github.com/LeapLabTHU/ViTTT.%0ALink%3A%20http%3A//arxiv.org/abs/2512.01643v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DViT%2524%255E3%2524%253A%2520Unlocking%2520Test-Time%2520Training%2520in%2520Vision%26entry.906535625%3DDongchen%2520Han%2520and%2520Yining%2520Li%2520and%2520Tianyu%2520Li%2520and%2520Zixuan%2520Cao%2520and%2520Ziming%2520Wang%2520and%2520Jun%2520Song%2520and%2520Yu%2520Cheng%2520and%2520Bo%2520Zheng%2520and%2520Gao%2520Huang%26entry.1292438233%3DTest-Time%2520Training%2520%2528TTT%2529%2520has%2520recently%2520emerged%2520as%2520a%2520promising%2520direction%2520for%2520efficient%2520sequence%2520modeling.%2520TTT%2520reformulates%2520attention%2520operation%2520as%2520an%2520online%2520learning%2520problem%252C%2520constructing%2520a%2520compact%2520inner%2520model%2520from%2520key-value%2520pairs%2520at%2520test%2520time.%2520This%2520reformulation%2520opens%2520a%2520rich%2520and%2520flexible%2520design%2520space%2520while%2520achieving%2520linear%2520computational%2520complexity.%2520However%252C%2520crafting%2520a%2520powerful%2520visual%2520TTT%2520design%2520remains%2520challenging%253A%2520fundamental%2520choices%2520for%2520the%2520inner%2520module%2520and%2520inner%2520training%2520lack%2520comprehensive%2520understanding%2520and%25 {"title": "SpatialStack: Layered Geometry-Language Fusion for 3D VLM Spatial Reasoning", "author": "Jiang Zhang and Shijie Zhou and Bangya Liu and Achuta Kadambi and Zhiwen Fan", "abstract": "Large vision-language models (VLMs) still struggle with reliable 3D spatial reasoning, a core capability for embodied and physical AI systems. This limitation arises from their inability to capture fine-grained 3D geometry and spatial relationships. While recent efforts have introduced multi-view geometry transformers into VLMs, they typically fuse only the deep-layer features from vision and geometry encoders, discarding rich hierarchical signals and creating a fundamental bottleneck for spatial understanding. To overcome this, we propose SpatialStack, a general hierarchical fusion framework that progressively aligns vision, geometry, and language representations across the model hierarchy. Moving beyond conventional late-stage vision-geometry fusion, SpatialStack stacks and synchronizes multi-level geometric features with the language backbone, enabling the model to capture both local geometric precision and global contextual semantics. Building upon this framework, we develop VLM-SpatialStack, a model that achieves state-of-the-art performance on multiple 3D spatial reasoning benchmarks. Extensive experiments and ablations demonstrate that our multi-level fusion strategy consistently enhances 3D understanding and generalizes robustly across diverse spatial reasoning tasks, establishing SpatialStack as an effective and extensible design paradigm for vision-language-geometry integration in next-generation multimodal physical AI systems.", "link": "http://arxiv.org/abs/2603.27437v2", "date": "2026-04-20", "relevancy": 2.8861, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5878}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5878}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5561}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SpatialStack%3A%20Layered%20Geometry-Language%20Fusion%20for%203D%20VLM%20Spatial%20Reasoning&body=Title%3A%20SpatialStack%3A%20Layered%20Geometry-Language%20Fusion%20for%203D%20VLM%20Spatial%20Reasoning%0AAuthor%3A%20Jiang%20Zhang%20and%20Shijie%20Zhou%20and%20Bangya%20Liu%20and%20Achuta%20Kadambi%20and%20Zhiwen%20Fan%0AAbstract%3A%20Large%20vision-language%20models%20%28VLMs%29%20still%20struggle%20with%20reliable%203D%20spatial%20reasoning%2C%20a%20core%20capability%20for%20embodied%20and%20physical%20AI%20systems.%20This%20limitation%20arises%20from%20their%20inability%20to%20capture%20fine-grained%203D%20geometry%20and%20spatial%20relationships.%20While%20recent%20efforts%20have%20introduced%20multi-view%20geometry%20transformers%20into%20VLMs%2C%20they%20typically%20fuse%20only%20the%20deep-layer%20features%20from%20vision%20and%20geometry%20encoders%2C%20discarding%20rich%20hierarchical%20signals%20and%20creating%20a%20fundamental%20bottleneck%20for%20spatial%20understanding.%20To%20overcome%20this%2C%20we%20propose%20SpatialStack%2C%20a%20general%20hierarchical%20fusion%20framework%20that%20progressively%20aligns%20vision%2C%20geometry%2C%20and%20language%20representations%20across%20the%20model%20hierarchy.%20Moving%20beyond%20conventional%20late-stage%20vision-geometry%20fusion%2C%20SpatialStack%20stacks%20and%20synchronizes%20multi-level%20geometric%20features%20with%20the%20language%20backbone%2C%20enabling%20the%20model%20to%20capture%20both%20local%20geometric%20precision%20and%20global%20contextual%20semantics.%20Building%20upon%20this%20framework%2C%20we%20develop%20VLM-SpatialStack%2C%20a%20model%20that%20achieves%20state-of-the-art%20performance%20on%20multipl {"title": "Revisiting Change VQA in Remote Sensing with Structured and Native Multimodal Qwen Models", "author": "Yakoub Bazi and Mohamad M. Al Rahhal and Mansour Zuair and Faroun Mohamed", "abstract": "Change visual question answering (Change VQA) addresses the problem of answering natural-language questions about semantic changes between bi-temporal remote sensing (RS) images. Although vision-language models (VLMs) have recently been studied for temporal RS image understanding, Change VQA remains underexplored in the context of modern multimodal models. In this letter, we revisit the CDVQA benchmark using recent Qwen models under a unified low-rank adaptation (LoRA) setting. We compare Qwen3-VL, which follows a structured vision-language pipeline with multi-depth visual conditioning and a full-attention decoder, with Qwen3.5, a native multimodal model that combines a single-stage alignment with a hybrid decoder backbone. Experimental results on the official CDVQA test splits show that recent VLMs improve over earlier specialized baselines. They further show that performance does not scale monotonically with model size, and that native multimodal models are more effective than structured vision-language pipelines for this task. These findings indicate that tightly integrated multimodal backbones contribute more to performance than scale or explicit multi-depth visual conditioning for language-driven semantic change reasoning in RS imagery.", "link": "http://arxiv.org/abs/2604.18429v1", "date": "2026-04-20", "relevancy": 2.8825, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5992}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5992}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/24 h%20visual%20conditioning%20for%20language-driven%20semantic%20change%20reasoning%20in%20RS%20imagery.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18429v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRevisiting%2520Change%2520VQA%2520in%2520Remote%2520Sensing%2520with%2520Structured%2520and%2520Native%2520Multimodal%2520Qwen%2520Models%26entry.906535625%3DYakoub%2520Bazi%2520and%2520Mohamad%2520M.%2520Al%2520Rahhal%2520and%2520Mansour%2520Zuair%2520and%2520Faroun%2520Mohamed%26entry.1292438233%3DChange%2520visual%2520question%2520answering%2520%2528Change%2520VQA%2529%2520addresses%2520the%2520problem%2520of%2520answering%2520natural-language%2520questions%2520about%2520semantic%2520changes%2520between%2520bi-temporal%2520remote%2520sensing%2520%2528RS%2529%2520images.%2520Although%2520vision-language%2520models%2520%2528VLMs%2529%2520have%2520recently%2520been%2520studied%2520for%2520temporal%2520RS%2520image%2520understanding%252C%2520Change%2520VQA%2520remains%2520underexplored%2520in%2520the%2520context%2520of%2520modern%2520multimodal%2520models.%2520In%2520this%2520letter%252C%2520we%2520revisit%2520the%2520CDVQA%2520benchmark%2520using%2520recent%2520Qwen%2520models%2520under%2520a%2520unified%2520low-rank%2520adaptation%2520%2528LoRA%2529%2520setting.%2520We%2520compare%2520Qwen3-VL%252C%2520which%2520follows%2520a%2520structured%2520vision-language%2520pipeline%2520with%2520multi-depth%2520visual%2520conditioning%2520and%2520a%2520full-attention%2520decoder%252C%2520with%2520Qwen3.5%252C%2520a%2520native%2520multimodal%2520model%2520that%2520combines%2520a%2520single-stage%2520alignment%2520with%2520a%2520hybrid%2520decoder%2520backbone.%2520Experimental%2520results%2520on%2520the%2520official%2520CDVQA%2520test%2520splits%2520show%2520that%2520recent%2520VLMs%2520improve%2520over%2520earlier%2520specialized%2520baselines.%2520They%2520further%2520show%2520that%2520perform {"title": "Multilingual Training and Evaluation Resources for Vision-Language Models", "author": "Daniela Baiamonte and Elena Fano and Matteo Gabburo and Stefano Simonazzi and Leonardo Rigutini and Andrea Zugarini", "abstract": "Vision Language Models (VLMs) achieved rapid progress in the recent years. However, despite their growth, VLMs development is heavily grounded on English, leading to two main limitations: (i) the lack of multilingual and multimodal datasets for training, and (ii) the scarcity of comprehensive evaluation benchmarks across languages. In this work, we address these gaps by introducing a new comprehensive suite of resources for VLMs training and evaluation spanning five European languages (English, French, German, Italian, and Spanish). We adopt a regeneration-translation paradigm that produces high-quality cross-lingual resources by combining curated synthetic generation and manual annotation. Specifically, we build Multi-PixMo, a training corpus obtained regenerating examples from Pixmo pre-existing datasets with permissively licensed models: PixMo-Cap, PixMo-AskModelAnything, and CoSyn-400k. On the evaluation side, we construct a set of multilingual benchmarks derived translating widely used English datasets (MMbench, ScienceQA, MME, POPE, AI2D). We assess the quality of these resources through qualitative and quantitative human analyses, measuring inter-annotator agreement. Additionally, we perform ablation studies to demonstrate the impact of multilingual data, with respect to English only, in VLMs training. Experiments, comprising 3 different models show that using multilingual, multimodal examples for training VLMs aids is consistently beneficial on non-English benchmarks, with positive transfer to English as well.", "link": "http://arxiv.org/abs/2604.18347v1", "date": "2026-04-20", "relevancy": 2.8639, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5853}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5853}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5477}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multilingual%20Training%20and%20Evaluation%20Resources%20for%20Vision-Language%20Models&body=Title%3A%20Multilingual%20Training%20and%20Evaluation%20Resources%20for%20Vision-Language%20Models%0AAuthor%3A%20Daniela%20Baiamonte%20and%20Elena%20Fano%20and%20Matteo%20Gabburo%20and%20Stefano%20Simonazzi%20and%20Leonardo%20Rigutini%20and%20Andrea%20Zugarini%0AAbstract%3A%20Vision%20Language%20Models%20%28VLMs%29%20achieved%20rapid%20progress%20in%20the%20recent%20years.%20However%2C%20despite%20their%20growth%2C%20VLMs%20development%20is%20heavily%20grounded%20on%20English%2C%20leading%20to%20two%20main%20limitations%3A%20%28i%29%20the%20lack%20of%20multilingual%20and%20multimodal%20datasets%20for%20training%2C%20and%20%28ii%29%20the%20scarcity%20of%20comprehensive%20evaluation%20benchmarks%20across%20languages.%20In%20this%20work%2C%20we%20address%20these%20gaps%20by%20introducing%20a%20new%20comprehensive%20suite%20of%20resources%20for%20VLMs%20training%20and%20evaluation%20spanning%20five%20European%20languages%20%28English%2C%20French%2C%20German%2C%20Italian%2C%20and%20Spanish%29.%20We%20adopt%20a%20regeneration-translation%20paradigm%20that%20produces%20high-quality%20cross-lingual%20resources%20by%20combining%20curated%20synthetic%20generation%20and%20manual%20annotation.%20Specifically%2C%20we%20build%20Multi-PixMo%2C%20a%20training%20corpus%20obtained%20regenerating%20examples%20from%20Pixmo%20pre-existing%20datasets%20with%20permissively%20licensed%20models%3A%20PixMo-Cap%2C%20PixMo-AskModelAnything%2C%20and%20CoSyn-400k.%20On%20the%20evaluation%20side%2C%20we%20construct%20a%20set%20of%20multilingual%20benchmarks%20derived%20translating%20widely%20used%20English%20datasets%20%28MMbench%2C%20ScienceQA%2C%20MME%2C%20POPE%2C%20AI2D%29.%20We%20assess%20the%20quality%20of%20these%20resources%20through%20qualitative%20and%20quantitative%20human%20analyses%2C%20measuring%20inter-annotator%20agreement.%20Additionally%2C%20we%20perform%20ablation%20studies%20to%20demonstrate%20the%20impact%20of%20multilingual%20data%2C%20with%20respect%20to%20English%20only%2C%20in%20VLMs%20training.%20Experiments%2C%20comprising%203%20different%20models%20show%20that%20using%20multilingual%2C%20multimodal%20examples%20for%20training%20VLMs%20aids%20is%20consistently%20beneficial%20on%20non-English%20benchmarks%2C%20with%20positive%20transfer%20to%20English%20as%20well.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18347v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMultilingual%2520Training%2520and%2520Evaluation%2520Resources%2520for%2520Vision-Language%2520Models%26entry.906535625%3DDaniela%2520Baiamonte%2520and%2520Elena%2520Fano%2520and%2520Matteo%2520Gabburo%2520and%2520Stefano%2520Simonazzi%2520and%2520Leonardo%2520Rigutini%2520and%2520Andrea%2520Zugarini%26entry.1292438233%3DVision%2520Language%2520Models%2520%2528VLMs%2529%2520achieved%2520rapid%2520progress%2520in%2520the%2520recent%2520years.%2520However%252C%2520despite%2520their%2520growth%252C%2520VLMs%2520development%2520is%2520heavily%2520grounded%2520on%2520English%252C%2520leading%2520to%2520two%2520main%2520limitations%253A%2520%2528i%2529%2520the%2520lack%2520of%2520multilingual%2520and%2520multimodal%2520datasets%2520for%2520training%252C%2520and%2520%2528ii%2529%2520the%2520scarcity%2520of%2520comprehensive%2520evaluation%2520benchmarks%2520across%2520languages.%2520In%2520this%2520work%252C%2520we%2520address%2520these%2520gaps%2520by%2520introducing%2520a%2520new%2520comprehensive%2520 lish%20only%2C%20in%20VLMs%20training.%20Experiments%2C%20comprising%203%20different%20models%20show%20that%20using%20multilingual%2C%20multimodal%20examples%20for%20training%20VLMs%20aids%20is%20consistently%20beneficial%20on%20non-English%20benchmarks%2C%20with%20positive%20transfer%20to%20English%20as%20well.&entry.1838667208=http%3A//arxiv.org/abs/2604.18347v1&entry.124074799=Read"},
{"title": "TacticGen: Grounding Adaptable and Scalable Generation of Football Tactics", "author": "Sheng Xu and Guiliang Liu and Tarak Kharrat and Yudong Luo and Mohamed Aloulou and Javier L\u00f3pez Pe\u00f1a and Konstantin Sofeikov and Adam Reid and Paul Roberts and Steven Spencer and Joe Carnall and Ian McHale and Oliver Schulte and Hongyuan Zha and Wei-Shi Zheng", "abstract": "Success in association football relies on both individual skill and coordinated tactics. While recent advancements in spatio-temporal data and deep learning have enabled predictive analyses like trajectory forecasting, the development of tactical design remains limited. Bridging this gap is essential, as prediction reveals what is likely to occur, whereas tactic generation determines what should occur to achieve strategic objectives. In this work, we present TacticGen, a generative model for adaptable and scalable tactic generation. TacticGen formulates tactics as sequences of multi-agent movements and interactions conditioned on the game context. It employs a multi-agent diffusion transformer with agent-wise self-attention and context-aware cross-attention to capture cooperative and competitive dynamics among players and the ball. Trained with over 3.3 million events and 100 million tracking frames from top-tier leagues, TacticGen achieves state-of-the-art precision in predicting player trajectories. Building on it, TacticGen enables adaptable tactic generation tailored to diverse inference-time objectives through classifier guidance mechanism, specified via rules, natural language, or neural models. Its modeling performance is also inherently scalable. A case study with football experts confirms that TacticGen generates realistic, strategically valuable tactics, demonstrating its practical utility for tactical planning in professional football. The project page is available at: https://shengxu.net/TacticGen/.", "link": "http://arxiv.org/abs/2604.18210v1", "date": "2026-04-20", "relevancy": 2.8338, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.581}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5659}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5534}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TacticGen%3A%20Grounding%20Adaptable%20and%20Scalable%20Generation%20of%20Football%20Tactics&body=Title%3A%20TacticGen%3A%20Grounding%20Adaptable%20and%20Scalable%20Generation%20of%20Football%20Tactics%0AAuthor%3A%20Sheng%20Xu%20and%20Guiliang%20Liu%20and%20Tarak%20Kharrat%20and%20Yudong%20Luo%20and%20Mohamed%20Aloulou%20and%20Javier%20L%C3%B3pez%20Pe%C3%B1a%20and%20Konstantin%20Sofeikov%20and%20Adam%20Reid%20and%20Paul%20Roberts%20and%20Steven%20Spencer%20and%20Joe%20Carnall%20and%20Ian%20McHale%20and%20Oliver%20Schulte%20and%20Hongyuan%20Zha%20and%20Wei-Shi%20Zheng%0AAbstract%3A%20Success%20in%20association%20football%20relies%20on%20both%20individual%20skill%20and%20coordinated%20tactics.%20While%20recent%20advancements%20in%20spatio-temporal%20data%20and%20deep%20learning%20have%20enabled%20predictive%20analyses%20like%20trajectory%20forecasting%2C%20the%20development%20of%20tactical%20design%20remains%20limited.%20Bridging%20this%20gap%20is%20essential%2C%20as%20prediction%20reveals%20what%20is%20likely%20to%20occur%2C%20whereas%20tactic%20generation%20determines%20what%20should%20occur%20to%20achieve%20strategic%20objectives.%20In%20this%20work%2C%20we%20present%20TacticGen%2C%20a%20generative%20model%20for%20adaptable%20and%20scalable%20tactic%20generation.%20TacticGen%20formulates%20tactics%20as%20sequences%20of%20multi-agent%20movements%20and%20interactions%20conditioned%20on%20the%20game%20context.%20It%20employs%20a%20multi-agent%20diffusion%20transformer%20with%20agent-wise%20self-attention%20and%20context-aware%20cross-attention%20to%20capture%20cooperative%20and%20competitive%20dynamics%20among%20players%20and%20the%20ball.%20Trained%20with%20over%203.3%20million%20events%20and%20100%20million%20tracking%20frames%20from%20top-tier%20leagues%2C%20TacticGen%20achieves%20state-of-the-art%20precision%20in%20predicting%20player%20trajectories.%20Building%20on%20it%2C%20TacticGen%20enables%20adaptable%20tactic%20generation%20tailored%20to%20diverse%20inference-time%20objectives%20through%20classifier%20guidance%20mechanism%2C%20specified%20via%20rules%2C%20natural%20language%2C%20or%20neural%20models.%20Its%20modeling%20performance%20is%20also%20inherently%20scalable.%20A%20case%20study%20with%20football%20experts%20confirms%20that%20TacticGen%20generates%20realistic%2C%20strategically%20valuable%20tactics%2C%20demonstrating%20its%20practical%20utility%20for%20tactical%20planning%20in%20professional%20football.%20The%20project%20page%20is%20available%20at%3A%20https%3A//shengxu.net/TacticGen/.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18210v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTacticGen%253A%2520Grounding%2520Adaptable%2520and%2520Scalable%2520Generation%2520of%2520Football%2520Tactics%26entry.906535625%3DSheng%2520Xu%2520and%2520Guiliang%2520Liu%2520and%2520Tarak%2520Kharrat%2520and%2520Yudong%2520Luo%2520and%2520Mohamed%2520Aloulou%2520and%2520Javier%2520L%25C3%25B3pez%2520Pe%25C3%25B1a%2520and%2520Konstantin%2520Sofeikov%2520and%2520Adam%2520Reid%2520and%2520Paul%2520Roberts%2520and%2520Steven%2520Spencer%2520and%2520Joe%2520Carnall%2520and%2520Ian%2520McHale%2520and%2520Oliver%2520Schulte%2520and%2520Hongyuan%2520Zha%2520and%2520Wei-Shi%2520Zheng%26entry.1292438233%3DSuccess%2520in%2520association%2520football%2520relies%2520on%2520both%2520individual%2520skill%2520and%2520coordinated%2520tactics.%2520While%2520recent%2520advancements%2520in%2520spatio-tempor {"title": "Towards Robust Text-to-Image Person Retrieval: Multi-View Reformulation for Semantic Compensation", "author": "Chao Yuan and Yujian Zhao and Haoxuan Xu and Guanglin Niu", "abstract": "In text-to-image person retrieval tasks, the diversity of natural language expressions and the implicitness of visual semantics often lead to the problem of Expression Drift, where semantically equivalent texts exhibit significant feature discrepancies in the embedding space due to phrasing variations, thereby degrading the robustness of image-text alignment. This paper proposes a semantic compensation framework (MVR) driven by Large Language Models (LLMs), which enhances cross-modal representation consistency through multi-view semantic reformulation and feature compensation. The core methodology comprises three components: Multi-View Reformulation (MVR): A dual-branch prompting strategy combines key feature guidance (extracting visually critical components via feature similarity) and diversity-aware rewriting to generate semantically equivalent yet distributionally diverse textual variants; Textual Feature Robustness Enhancement: A training-free latent space compensation mechanism suppresses noise interference through multi-view feature mean-pooling and residual connections, effectively capturing \"Semantic Echoes\"; Visual Semantic Compensation: VLM generates multi-perspective image descriptions, which are further enhanced through shared text reformulation to address visual semantic gaps. Experiments demonstrate that our method can improve the accuracy of the original model well without training and performs SOTA on three text-to-image person retrieval datasets.", "link": "http://arxiv.org/abs/2604.18376v1", "date": "2026-04-20", "relevancy": 2.8116, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.586}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5505}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5505}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Robust%20Text-to-Image%20Person%20Retrieval%3A%20Multi-View%20Reformulation%20for%20Semantic%20Compensation&body=Title%3A%20Towards%20Robust%20Text-to-Image%20Person%20Retrieval%3A%20Multi-View%20Reformulation%20for%20Semantic%20Compensation%0AAuthor%3A%20Chao%20Yuan%20and%20Yujian%20Zhao%20and%20Haoxuan%20Xu%20and%20Guanglin%20Niu%0AAbstract%3A%20In%20text-to-image%20person%20retrieval%20tasks%2C%20the%20diversity%20of%20natural%20language%20expressions%20and%20the%20implicitness%20of%20visual%20semantics%20often%20lead%20to%20the%20problem%20of%20Expression%20Drift%2C%20where%20semantically%20equivalent%20texts%20exhibit%20significant%20feature%20discrepancies%20in%20the%20embedding%20space%20due%20to%20phrasing%20variations%2C%20thereby%20degrading%20the%20robustness%20of%20image-text%20alignment.%20This%20paper%20proposes%20a%20semantic%20compensation%20framework%20%28MVR%29%20driven%20by%20Large%20Language%20Models%20%28LLMs%29%2C%20which%20enhances%20cross-modal%20representation%20consistency%20through%20multi-view%20semantic%20reformulation%20and%20feature%20compensation.%20The%20core%20methodology%20comprises%20three%20components%3A%20Multi-View%20Reformulation%20%28MVR%29%3A%20A%20dual-branch%20prompting%20strategy%20combines%20key%20feature%20guidance%20%28extracting%20visually%20critical%20components%20via%20feature%20similarity%29%20and%20diversity-aware%20rewriting%20to%20generate%20semantically%20equivalent%20yet%20distributionally%20diverse%20textual%20variants%3B%20Textual%20Feature%20Robustness%20Enhancement%3A%20A%20training-free%20latent%20space%20compensation%20mechanism%20suppresses%20noise%20interference%20through%20multi-view%20feature%20mean-pooling%20and%20residual%20connections%2C%20effectively%20capturing%20%22Semantic%20Echoes%22%3B%20Visual%20Semantic%20Compensation%3A%20VLM%20generates%20multi-perspective%20image%20descriptions%2C%20which%20are%20further%20enhanced%20through%20shared%20text%20reformulation%20to%20address%20visual%20semantic%20gaps.%20Experiments%20demonstrate%20that%20our%20method%20can%20improve%20the%20accuracy%20of%20the%20original%20model%20well%20without%20training%20and%20performs%20SOTA%20on%20three%20text-to-image%20person%20retrieval%20datasets.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18376v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520Robust%2520Text-to-Image%2520Person%2520Retrieval%253A%2520Multi-View%2520Reformulation%2520for%2520Semantic%2520Compensation%26entry.906535625%3DChao%2520Yuan%2520and%2520Yujian%2520Zhao%2520and%2520Haoxuan%2520Xu%2520and%2520Guanglin%2520Niu%26entry.1292438233%3DIn%2520text-to-image%2520person%2520retrieval%2520tasks%252C%2520the%2520diversity%2520of%2520natural%2520language%2520expressions%2520and%2520the%2520implicitness%2520of%2520visual%2520semantics%2520often%2520lead%2520to%2520the%2520problem%2520of%2520Expression%2520Drift%252C%2520where%2520semantically%2520equivalent%2520texts%2520exhibit%2520significant%2520feature%2520discrepancies%2520in%2520the%2520embedding%2520space%2520due%2520to%2520phrasing%2520variations%252C%2520thereby%2520degrading%2520the%2520robustness%2520of%2520image-text%2520alignment.%2520This%2520paper%2520proposes%2520a%2520semantic%2520compensation%2520framework%2520%2528MVR%2529%2520driven%2520by%2520Large%2520Language%2520Models%2520%2528LLMs%2529%252C%2520which%2520enhances%2520cross-modal%2520representation%2520consistency%2520through%2520multi-view%2520semantic%2520reformulation%2520and%2520feature%2520compensation.%2520The%2520core%2520methodology%2520comprises%2520three%2 e%20semantically%20equivalent%20texts%20exhibit%20significant%20feature%20discrepancies%20in%20the%20embedding%20space%20due%20to%20phrasing%20variations%2C%20thereby%20degrading%20the%20robustness%20of%20image-text%20alignment.%20This%20paper%20proposes%20a%20semantic%20compensation%20framework%20%28MVR%29%20driven%20by%20Large%20Language%20Models%20%28LLMs%29%2C%20which%20enhances%20cross-modal%20representation%20consistency%20through%20multi-view%20semantic%20reformulation%20and%20feature%20compensation.%20The%20core%20methodology%20comprises%20three%20components%3A%20Multi-View%20Reformulation%20%28MVR%29%3A%20A%20dual-branch%20prompting%20strategy%20combines%20key%20feature%20guidance%20%28extracting%20visually%20critical%20components%20via%20feature%20similarity%29%20and%20diversity-aware%20rewriting%20to%20generate%20semantically%20equivalent%20yet%20distributionally%20diverse%20textual%20variants%3B%20Textual%20Feature%20Robustness%20Enhancement%3A%20A%20training-free%20latent%20space%20compensation%20mechanism%20suppresses%20noise%20interference%20through%20multi-view%20feature%20mean-pooling%20and%20residual%20connections%2C%20effectively%20capturing%20%22Semantic%20Echoes%22%3B%20Visual%20Semantic%20Compensation%3A%20VLM%20generates%20multi-perspective%20image%20descriptions%2C%20which%20are%20further%20enhanced%20through%20shared%20text%20reformulation%20to%20address%20visual%20semantic%20gaps.%20Experiments%20demonstrate%20that%20our%20method%20can%20improve%20the%20accuracy%20of%20the%20original%20model%20well%20without%20training%20and%20performs%20SOTA%20on%20three%20text-to-image%20person%20retrieval%20datasets.&entry.1838667208=http%3A//arxiv.org/abs/2604.18376v1&entry.124074799=Read"},
{"title": "Neural Surface Reconstruction from Sparse Views Using Epipolar Geometry", "author": "Xinhai Chang and Kaichen Zhou", "abstract": "Reconstructing accurate surfaces from sparse multi-view images remains challenging due to severe geometric ambiguity and occlusions. Existing generalizable neural surface reconstruction methods primarily rely on cost volumes that summarize multi-view features using simple statistics (e.g., mean and variance), which discard critical view-dependent geometric structure and often lead to over-smoothed reconstructions. We propose EpiS, a generalizable neural surface reconstruction framework that explicitly leverages epipolar geometry for sparse-view inputs. Instead of directly regressing geometry from cost-volume statistics, EpiS uses coarse cost-volume features to guide the aggregation of fine-grained epipolar features sampled along corresponding epipolar lines across source views. An epipolar transformer fuses multi-view information, followed by ray-wise aggregation to produce SDF-aware features for surface estimation. To further mitigate information loss under sparse views, we introduce a geometry regularization strategy that leverages a pretrained monocular depth model through scale-invariant global and local constraints. Extensive experiments on DTU and BlendedMVS demonstrate that EpiS significantly outperforms state-of-the-art generalizable surface reconstruction methods under sparse-view settings, while maintaining strong generalization without per-scene optimization.", "link": "http://arxiv.org/abs/2406.04301v4", "date": "2026-04-20", "relevancy": 2.8065, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5703}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.567}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5465}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Neural%20Surface%20Reconstruction%20from%20Sparse%20Views%20Using%20Epipolar%20Geometry&body=Title%3A%20Neural%20Surface%20Reconstruction%20from%20Sparse%20Views%20Using%20Epipolar%20Geometry%0AAuthor%3A%20Xinhai%20Chang%20and%20Kaichen%20Zhou%0AAbstract%3A%20Reconstructing%20accurate%20surfaces%20from%20sparse%20multi-view%20images%20remains%20challenging%20due%20to%20severe%20geometric%20ambiguity%20and%20occlusions.%20Existing%20generalizable%20neural%20surface%20reconstruction%20methods%20primarily%20rely%20on%20cost%20volumes%20that%20summarize%20multi-view%20features%20using%20simple%20statistics%20%28e.g.%2C%20mean%20and%20variance%29%2C%20which%20discard%20critical%20view-dependent%20geometric%20structure%20and%20often%20lead%20to%20over-smoothed%20reconstructions.%20We%20propose%20EpiS%2C%20a%20generalizable%20neural%20surface%20reconstruction%20framework%20that%20explicitly%20leverages%20epipolar%20geometry%20for%20sparse-view%20inputs.%20Instead%20of%20directly%20regressing%20geometry%20from%20cost-volume%20statistics%2C%20EpiS%20uses%20coarse%20cost-volume%20features%20to%20guide%20the%20aggregation%20of%20fine-grained%20epipolar%20features%20sampled%20along%20corresponding%20epipolar%20lines%20across%20source%20views.%20An%20epipolar%20transformer%20fuses%20multi-view%20information%2C%20followed%20by%20ray-wise%20aggregation%20to%20produce%20SDF-aware%20features%20for%20surface%20estimation.%20To%20further%20mitigate%20information%20loss%20under%20sparse%20views%2C%20we%20introduce%20a%20geometry%20regularization%20strategy%20that%20leverages%20a%20pretrained%20monocular%20depth%20model%20through%20scale-invariant%20global%20and%20local%20constraints.%20Extensive%20experiments%20on%20DTU%20and%20BlendedMVS%20demonstrate%20that%20EpiS%20significantly%20outperforms%20state-of-the-art%20generalizable%20surface%20reconstruction%20methods%20under%20sparse-view%20settings%2C%20while%20maintaining%20strong%20generalization%20without%20per-scene%20optimization.%0ALink%3A%20http%3A//arxiv.org/abs/2406.04301v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNeural%2520Surface%2520Reconstruction%2520from%2520Sparse%2520Views%2520Using%2520Epipolar%2520Geometry%26entry.906535625%3DXinhai%2520Chang%2520and%2520Kaichen%2520Zhou%26entry.1292438233%3DReconstructing%2520accurate%2520surfaces%2520from%2520sparse%2520multi-view%2520images%2520remains%2520challenging%2520due%2520to%2520severe%2520geometric%2520ambiguity%2520and%2520occlusions.%2520Existing%2520generalizable%2520neural%2520surface%2520reconstruction%2520methods%2520primarily%2520rely%2520on%2520cost%2520volumes%2520that%2520summarize%2520multi-view%2520features%2520using%2520simple%2520statistics%2520%2528e.g.%252C%2520mean%2520and%2520variance%2529%252C%2520which%2520discard%2520critical%2520view-dependent%2520geometric%2520structure%2520and%2520often%2520lead%2520to%2520over-smoothed%2520reconstructions.%2520We%2520propose%2520EpiS%252C%2520a%2520generalizable%2520neural%2520surface%2520reconstruction%2520framework%2520that%2520explicitly%2520leverages%2520epipolar%2520geometry%2520for%2520sparse-view%2520inputs.%2520Instead%2520of%2520directly%2520regressing%2520geometry%2520from%2520cost-volume%2520statistics%252C%2520EpiS%2520uses%2520coarse%2520cost-volume%2520features%2520to%2520guide%2520the%2520aggregation%2520of%2520fine-grained%2520epipolar%2520features%2520sampled%2520along%2520corresponding%2520epipolar%2520lines%2520across%2520source%2520views.%2520An%2520epipolar%2520transformer%2520fuses%2520multi-view%2520information%252C%2520followed%2520by%2520ray-wise%2520aggregation%2520to%2520produce%2520SDF-aware%2520features%2520for%2520surface%2520estimation.%2520To%2520further%2520mitigate%2520 {"title": "MaLoRA: Gated Modality LoRA for Key-Space Alignment in Multimodal LLM Fine-Tuning", "author": "Xinhan Zheng and Huyu Wu and Xueting Wang and Duo Su and Haiyun Jiang", "abstract": "Multimodal large language models (MLLMs) exhibit a pronounced preference for textual inputs when processing vision-language data, limiting their ability to reason effectively from visual evidence. Unlike prior studies that attribute this text bias to external factors such as data imbalance or instruction tuning, we propose that the bias originates from the model's internal architecture. Specifically, we hypothesize that visual key vectors (Visual Keys) are out-of-distribution (OOD) relative to the text key space learned during language-only pretraining. Consequently, these visual keys receive systematically lower similarity scores during attention computation, leading to their under-utilization in the context representation. To validate this hypothesis, we extract key vectors from LLaVA and Qwen2.5-VL and analyze their distributional structures using qualitative (t-SNE) and quantitative (Jensen-Shannon divergence) methods. The results provide direct evidence that visual and textual keys occupy markedly distinct subspaces within the attention space. The inter-modal divergence is statistically significant, exceeding intra-modal variation by several orders of magnitude. These findings reveal that text bias arises from an intrinsic misalignment within the attention key space rather than solely from external data factors.", "link": "http://arxiv.org/abs/2510.26721v2", "date": "2026-04-20", "relevancy": 2.7397, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.559}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5424}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5424}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MaLoRA%3A%20Gated%20Modality%20LoRA%20for%20Key-Space%20Alignment%20in%20Multimodal%20LLM%20Fine-Tuning&body=Title%3A%20MaLoRA%3A%20Gated%20Modality%20LoRA%20for%20Key-Space%20Alignment%20in%20Multimodal%20LLM%20Fine-Tuning%0AAuthor%3A%20Xinhan%20Zheng%20and%20Huyu%20Wu%20and%20Xueting%20Wang%20and%20Duo%20Su%20and%20Haiyun%20Jiang%0AAbstract%3A%20Multimodal%20large%20language%20models%20%28MLLMs%29%20exhibit%20a%20pronounced%20preference%20for%20textual%20inputs%20when%20processing%20vision-language%20data%2C%20limiting%20their%20ability%20to%20reason%20effectively%20from%20visual%20evidence.%20Unlike%20prior%20studies%20that%20attribute%20this%20text%20bias%20to%20external%20factors%20such%20as%20data%20imbalance%20or%20instruction%20tuning%2C%20we%20propose%20that%20the%20bias%20originates%20from%20the%20model%27s%20internal%20architecture.%20Specifically%2C%20we%20hypothesize%20that%20visual%20key%20vectors%20%28Visual%20Keys%29%20are%20out-of-distribution%20%28OOD%29%20relative%20to%20the%20text%20key%20space%20learned%20during%20language-only%20pretraining.%20Consequently%2C%20these%20visual%20keys%20receive%20systematically%20lower%20similarity%20scores%20during%20attention%20computation%2C%20leading%20to%20their%20under-utilization%20in%20the%20context%20representation.%20To%20validate%20this%20hypothesis%2C%20we%20extract%20key%20vectors%20from%20LLaVA%20and%20Qwen2.5-VL%20and%20analyze%20their%20distributional%20structures%20using%20qualitative%20%28t-SNE%29%20and%20quantitative%20%28Jensen-Shannon%20divergence%29%20methods.%20The%20results%20provide%20direct%20evidence%20that%20visual%20and%20textual%20keys%20occupy%20markedly%20distinct%20subspaces%20within%20the%20attention%20space.%20The%20inter-modal%20divergence%20is%20statistically%20significant%2C%20exceeding%20intra-modal%20variation%20by%20several%20orders%20of%20magnitude.%20These%20findings%20reveal%20that%20text%20bias%20arises%20from%20an%20intrinsic%20misalignment%20within%20the%20attention%20key%20space%20rather%20than%20solely%20from%20external%20data%20factors.%0ALink%3A%20http%3A//arxiv.org/abs/2510.26721v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMaLoRA%253A%2520Gated%2520Modality%2520LoRA%2520for%2520Key-Space%2520Alignment%2520in%2520Multimodal%2520LLM%2520Fine-Tuning%26entry.906535625%3DXinhan%2520Zheng%2520and%2520Huyu%2520Wu%2520and%2520Xueting%2520Wang%2520and%2520Duo%2520Su%2520and%2520Haiyun%2520Jiang%26entry.1292438233%3DMultimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520exhibit%2520a%2520pronounced%2520preference%2520for%2520textual%2520inputs%2520when%2520processing%2520vision-language%2520data%252C%2520limiting%2520their%2520ability%2520to%2520reason%2520effectively%2520from%2520visual%2520evidence.%2520Unlike%2520prior%2520studies%2520that%2520attribute%2520this%2520text%2520bias%2520to%2520external%2520factors%2520such%2520as%2520data%2520imbalance%2520or%2520instruction%2520tuning%252C%2520we%2520propose%2520that%2520the%2520bias%2520originates%2520from%2520the%2520model%2527s%2520internal%2520architecture.%2520Specifically%252C%2520we%2520hypothesize%2520that%2520visual%2520key%2520vectors%2520%2528Visual%2520Keys%2529%2520are%2520out-of-distribution%2520%2528OOD%2529%2520relative%2520to%2520the%2520text%2520key%2520space%2520learned%2520during%2520language-only%2520pretraining.%2520Consequently%252C%2520these%2520visual%2520keys%2520receive%2520systematically%2520lower%2520similarity%2520scores%2520during%2520attention%2520computation%252C%2520leading%2520to%2520their%2520under-utilization%2520in%2520the%2520context%2520representation.%2520To%2520validate%2520this%2520hypothesis%252C%2520we%2520extract%2520key%2520vectors%2520from%2520LLaVA%2520and%2520Qw .%20Consequently%2C%20these%20visual%20keys%20receive%20systematically%20lower%20similarity%20scores%20during%20attention%20computation%2C%20leading%20to%20their%20under-utilization%20in%20the%20context%20representation.%20To%20validate%20this%20hypothesis%2C%20we%20extract%20key%20vectors%20from%20LLaVA%20and%20Qwen2.5-VL%20and%20analyze%20their%20distributional%20structures%20using%20qualitative%20%28t-SNE%29%20and%20quantitative%20%28Jensen-Shannon%20divergence%29%20methods.%20The%20results%20provide%20direct%20evidence%20that%20visual%20and%20textual%20keys%20occupy%20markedly%20distinct%20subspaces%20within%20the%20attention%20space.%20The%20inter-modal%20divergence%20is%20statistically%20significant%2C%20exceeding%20intra-modal%20variation%20by%20several%20orders%20of%20magnitude.%20These%20findings%20reveal%20that%20text%20bias%20arises%20from%20an%20intrinsic%20misalignment%20within%20the%20attention%20key%20space%20rather%20than%20solely%20from%20external%20data%20factors.&entry.1838667208=http%3A//arxiv.org/abs/2510.26721v2&entry.124074799=Read"},
{"title": "Back into Plato's Cave: Examining Cross-modal Representational Convergence at Scale", "author": "A. Sophia Koepke and Daniil Zverev and Shiry Ginosar and Alexei A. Efros", "abstract": "The Platonic Representation Hypothesis suggests that neural networks trained on different modalities (e.g., text and images) align and eventually converge toward the same representation of reality. If true, this has significant implications for whether modality choice matters at all. We show that the experimental evidence for this hypothesis is fragile and depends critically on the evaluation regime. Alignment is measured using mutual nearest neighbors on small datasets ($\\approx$1K samples) and degrades substantially as the dataset is scaled to millions of samples. The alignment that remains between model representations reflects coarse semantic overlap rather than consistent fine-grained structure. Moreover, the evaluations in Huh et al. are done in a one-to-one image-caption setting, a constraint that breaks down in realistic many-to-many settings and further reduces alignment. We also find that the reported trend of stronger language models increasingly aligning with vision does not appear to hold for newer models. Overall, our findings suggest that the current evidence for cross-modal representational convergence is considerably weaker than subsequent works have taken it to be. Models trained on different modalities may learn equally rich representations of the world, just not the same one.", "link": "http://arxiv.org/abs/2604.18572v1", "date": "2026-04-20", "relevancy": 2.7204, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5449}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5449}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5425}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Back%20into%20Plato%27s%20Cave%3A%20Examining%20Cross-modal%20Representational%20Convergence%20at%20Scale&body=Title%3A%20Back%20into%20Plato%27s%20Cave%3A%20Examining%20Cross-modal%20Representational%20Convergence%20at%20Scale%0AAuthor%3A%20A.%20Sophia%20Koepke%20and%20Daniil%20Zverev%20and%20Shiry%20Ginosar%20and%20Alexei%20A.%20Efros%0AAbstract%3A%20The%20Platonic%20Representation%20Hypothesis%20suggests%20that%20neural%20networks%20trained%20on%20different%20modalities%20%28e.g.%2C%20text%20and%20images%29%20align%20and%20eventually%20converge%20toward%20the%20same%20representation%20of%20reality.%20If%20true%2C%20this%20has%20significant%20implications%20for%20whether%20modality%20choice%20matters%20at%20all.%20We%20show%20that%20the%20experimental%20evidence%20for%20this%20hypothesis%20is%20fragile%20and%20depends%20critically%20on%20the%20evaluation%20regime.%20Alignment%20is%20measured%20using%20mutual%20nearest%20neighbors%20on%20small%20datasets%20%28%24%5Capprox%241K%20samples%29%20and%20degrades%20substantially%20as%20the%20dataset%20is%20scaled%20to%20millions%20of%20samples.%20The%20alignment%20that%20remains%20between%20model%20representations%20reflects%20coarse%20semantic%20overlap%20rather%20than%20consistent%20fine-grained%20structure.%20Moreover%2C%20the%20evaluations%20in%20Huh%20et%20al.%20are%20done%20in%20a%20one-to-one%20image-caption%20setting%2C%20a%20constraint%20that%20breaks%20down%20in%20realistic%20many-to-many%20settings%20and%20further%20reduces%20alignment.%20We%20also%20find%20that%20the%20reported%20trend%20of%20stronger%20language%20models%20increasingly%20aligning%20with%20vision%20does%20not%20appear%20to%20hold%20for%20newer%20models.%20Overall%2C%20our%20findings%20suggest%20that%20the%20current%20evidence%20for%20cross-modal%20representational%20convergence%20is%20considerably%20weaker%20than%20subsequent%20works%20have%20taken%20it%20to%20be.%20Models%20trained%20on%20different%20modalities%20may%20learn%20equally%20rich%20representations%20of%20the%20world%2C%20just%20not%20the%20same%20one.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18572v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBack%2520into%2520Plato%2527s%2520Cave%253A%2520Examining%2520Cross-modal%2520Representational%2520Convergence%2520at%2520Scale%26entry.906535625%3DA.%2520Sophia%2520Koepke%2520and%2520Daniil%2520Zverev%2520and%2520Shiry%2520Ginosar%2520and%2520Alexei%2520A.%2520Efros%26entry.1292438233%3DThe%2520Platonic%2520Representation%2520Hypothesis%2520suggests%2520that%2520neural%2520networks%2520trained%2520on%2520different%2520modalities%2520%2528e.g.%252C%2520text%2520and%2520images%2529%2520align%2520and%2520eventually%2520converge%2520toward%2520the%2520same%2520representation%2520of%2520reality.%2520If%2520true%252C%2520this%2520has%2520significant%2520implications%2520for%2520whether%2520modality%2520choice%2520matters%2520at%2520all.%2520We%2520show%2520that%2520the%2520experimental%2520evidence%2520for%2520this%2520hypothesis%2520is%2520fragile%2520and%2520depends%2520critically%2520on%2520the%2520evaluation%2520regime.%2520Alignment%2520is%2520measured%2520using%2520mutual%2520nearest%2520neighbors%2520on%2520small%2520datasets%2520%2528%2524%255Capprox%25241K%2520samples%2529%2520and%2520degrades%2520substantially%2520as%2520the%2520dataset%2520is%2520scaled%2520to%2520millions%2520of%2520samples.%2520The%2520alignment%2520that%2520remains%2520between%2520model%2520representations%2520reflects%2520coarse%2520semantic%2520overlap%2520rather%2520than%2520consistent%2520fine-grained%2520structure.%2520Moreover%252C%2520the%2520evaluations%2520in%2520Huh%2520et%2520al.%2520are%2520done%2520in%2520a%2520one-to-one%2520image-caption%2520setting%252C%2520a%2520constraint%2520that%2520breaks%2520down%2520in%2520realistic%2520many-to-many%2520settings%2520and%2520further%2520reduces%2520alignment.%2520We%2520also%2520find%2520that%2520the%2520reported%2520trend%2520of%2520stronger%2520language%2520models%2520increasingly%2520aligning%2520with%2520vision%2520does%2520not%2520appear%2520to%2520hold%2520for%2520newer%2520models.%2520Overall%252C%2520our%2520findings%2520suggest%2520that%2520the%2520current%2520evidence%2520for%2520cross-modal%2520representational%2520convergence%2520is%2520considerably%2520weaker%2520than%2520subsequent%2520works%2520have%2520taken%2520it%2520to%2520be.%2520Models%2520trained%2520on%2520different%2520modalities%2520may%2520learn%2520equally%2520rich%2520representations%2520of%2520the%2520world%252C%2520just%2520not%2520the%2520same%2520one.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.18572v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Back%20into%20Plato%27s%20Cave%3A%20Examining%20Cross-modal%20Representational%20Convergence%20at%20Scale&entry.906535625=A.%20Sophia%20Koepke%20and%20Daniil%20Zverev%20and%20Shiry%20Ginosar%20and%20Alexei%20A.%20Efros&entry.1292438233=The%20Platonic%20Representation%20Hypothesis%20suggests%20that%20neural%20networks%20trained%20on%20different%20modalities%20%28e.g.%2C%20text%20and%20images%29%20align%20and%20eventually%20converge%20toward%20the%20same%20representation%20of%20reality.%20If%20true%2C%20this%20has%20significant%20implications%20for%20whether%20modality%20choice%20matters%20at%20all.%20We%20show%20that%20the%20experimental%20evidence%20for%20this%20hypothesis%20is%20fragile%20and%20depends%20critically%20on%20the%20evaluation%20regime.%20Alignment%20is%20measured%20using%20mutual%20nearest%20neighbors%20on%20small%20datasets%20%28%24%5Capprox%241K%20samples%29%20and%20degrades%20substantially%20as%20the%20dataset%20is%20scaled%20to%20millions%2 {"title": "VEFX-Bench: A Holistic Benchmark for Generic Video Editing and Visual Effects", "author": "Xiangbo Gao and Sicong Jiang and Bangya Liu and Xinghao Chen and Minglai Yang and Siyuan Yang and Mingyang Wu and Jiongze Yu and Qi Zheng and Haozhi Wang and Jiayi Zhang and Jie Yang and Zihan Wang and Qing Yin and Zhengzhong Tu", "abstract": "As AI-assisted video creation becomes increasingly practical, instruction-guided video editing has become essential for refining generated or captured footage to meet professional requirements. Yet the field still lacks both a large-scale human-annotated dataset with complete editing examples and a standardized evaluator for comparing editing systems. Existing resources are limited by small scale, missing edited outputs, or the absence of human quality labels, while current evaluation often relies on expensive manual inspection or generic vision-language model judges that are not specialized for editing quality. We introduce VEFX-Dataset, a human-annotated dataset containing 5,049 video editing examples across 9 major editing categories and 32 subcategories, each labeled along three decoupled dimensions: Instruction Following, Rendering Quality, and Edit Exclusivity. Building on VEFX-Dataset, we propose VEFX-Reward, a reward model designed specifically for video editing quality assessment. VEFX-Reward jointly processes the source video, the editing instruction, and the edited video, and predicts per-dimension quality scores via ordinal regression. We further release VEFX-Bench, a benchmark of 300 curated video-prompt pairs for standardized comparison of editing systems. Experiments show that VEFX-Reward aligns more strongly with human judgments than generic VLM judges and prior reward models on both standard IQA/VQA metrics and group-wise preference evaluation. Using VEFX-Reward as an evaluator, we benchmark representative commercial and open-source video editing systems, revealing a persistent gap between visual plausibility, instruction following, and edit locality in current models. Our project page is https://xiangbogaobarry.github.io/VEFX-Bench/.", "link": "http://arxiv.org/abs/2604.16272v2", "date": "2026-04-20", "relevancy": 2.7122, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5782}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5287}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5204}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VEFX-Bench%3A%20A%20Holistic%20Benchmark%20for%20Generic%20Video%20Editing%20and%20Visual%20Effects&body=Title%3A%20VEFX-Bench%3A%20A%20Holistic%20Benchmark%20for%20Generic%20Video%20Editing%20and%20Visual%20Effects%0AAuthor%3A%20Xiangbo%20Gao%20and%20Sicong%20Jiang%20and%20Bangya%20Liu%20and%20Xinghao%20Chen%20and%20Minglai%20Yang%20and%20Siyuan%20Yang%20and%20Mingyang%20Wu%20and%20Jiongze%20Yu%20and%20Qi%20Zheng%20and%20Haozhi%20Wang%20and%20Jiayi%20Zhang%20and%20Jie%20Yang%20and%20Zihan%20Wang%20and%20Qing%20Yin%20and%20Zhengzhong%20Tu%0AAbstract%3A%20As%20AI-assisted%20video%20creation%20becomes%20increasingly%20practical%2C%20instruction-guided%20video%20editing%20has%20become%20essential%20for%20refining%20generated%20or%20captured%20footage%20to%20meet%20professional%20requirements.%20Yet%20the%20field%20still%20lacks%20both%20a%20large-scale%20human-annotated%20dataset%20with%20complete%20editing%20examples%20and%20a%20standardized%20evaluator%20for%20comparing%20editing%20systems.%20Existing%20resources%20are%20limited%20by%20small%20scale%2C%20missing%20edited%20outputs%2C%20or%20the%20absence%20of%20human%20quality%20labels%2C%20while%20current%20evaluation%20often%20relies%20on%20expensive%20manual%20inspection% {"title": "Medical Image Understanding Improves Survival Prediction via Visual Instruction Tuning", "author": "Xixi Liu and Jorge Lazo and Andreas Hallqvist and Mikael Johansson and \u00c5se Johnsson and Jonas S Andersson and Ella \u00c4ng Eklund and Patrik Sund and Nasser Hosseini and Jennifer Alv\u00e9n and Ida H\u00e4ggstr\u00f6m", "abstract": "Accurate prognostication and risk estimation are essential for guiding clinical decision-making and optimizing patient management. While radiologist-assessed features from CT scans provide valuable indicators of disease severity and outcomes, interpreting such images requires expert knowledge, and translating rich visual information into textual summaries inevitably leads to information loss. In this work, we propose a vision-language framework for 3D CT image understanding that leverages large-scale open-sourced CT images paired with radiology reports through visual instruction tuning. This pre-training enables the model to learn clinically meaningful visual-textual representations, which can then be adapted to downstream survival prediction tasks. By incorporating a survival prediction head on top of the pre-trained model, our approach improves survival prediction from CT images and clinical data while generating clinically meaningful language responses to predefined questions. Experimental results demonstrate that our method outperforms baseline methods in survival prediction, particularly, when clinical data alone is less predictive. The code will be released upon acceptance.", "link": "http://arxiv.org/abs/2604.18250v1", "date": "2026-04-20", "relevancy": 2.7081, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.546}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5394}, {"title": "Lexicon3D: Probing Visual Foundat

{"title": "VLM-3R: Vision-Language Models Augmented with Instruction-Aligned 3D Reconstruction", "author": "Zhiwen Fan and Jian Zhang and Renjie Li and Junge Zhang and Runjin Chen and Hezhen Hu and Kevin Wang and Huaizhi Qu and Shijie Zhou and Dilin Wang and Zhicheng Yan and Hongyu Xu and Justin Theiss and Tianlong Chen and Jiachen Li and Zhengzhong Tu and Zhangyang Wang and Rakesh Ranjan", "abstract": "The rapid advancement of Large Multimodal Models (LMMs) for 2D images and videos has motivated extending these models to understand 3D scenes, aiming for human-like visual-spatial intelligence. Nevertheless, achieving deep spatial understanding comparable to human capabilities poses significant challenges in model encoding and data acquisition. Existing methods frequently depend on external depth sensors for geometry capture or utilize off-the-shelf algorithms for pre-constructing 3D maps, thereby limiting their scalability, especially with prevalent monocular video inputs and for time-sensitive applications. In this work, we introduce VLM-3R, a unified framework for Vision-Language Models (VLMs) that incorporates 3D Reconstructive instruction tuning. VLM-3R processes monocular video frames by employing a geometry encoder to derive implicit 3D tokens that represent spatial understanding. Leveraging our Spatial-Visual-View Fusion and over 200K curated 3D reconstructive instruction tuning question-answer (QA) pairs, VLM-3R effectively aligns real-world spatial context with language instructions. This enables monocular 3D spatial assistance and embodied reasoning. To facilitate the evaluation of temporal reasoning, we introduce the Vision-Spatial-Temporal Intelligence benchmark, featuring over 138.6K QA pairs across five distinct tasks focused on evolving spatial relationships. Extensive experiments demonstrate that our model, VLM-3R, not only facilitates robust visual-spatial reasoning but also enables the understanding of temporal 3D context changes, excelling in both accuracy and scalability.", "link": "http://arxiv.org/abs/2505.20279v4", "date": "2026-04-20", "relevancy": 3.3943, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.694}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.694}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6486}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VLM-3R%3A%20Vision-Language%20Models%20Augmented%20with%20Instruction-Aligned%203D%20Reconstruction&body=Title%3A%20VLM-3R%3A%20Vision-Language%20Models%20Augmented%20with%20Instruction-Aligned%203D%20Reconstruction%0AAuthor%3A%20Zhiwen%20Fan%20and%20Jian%20Zhang%20and%20Renjie%20Li%20and%20Junge%20Zhang%20and%20Runjin%20Chen%20and%20Hezhen%20Hu%20and%20Kevin%20Wang%20and%20Huaizhi%20Qu%20and%20Shijie%20Zhou%20and%20Dilin%20Wang%20and%20Zhicheng%20Yan%20and%20Hongyu%20Xu%20and%20Justin%20Theiss%20and%20Tianlong%20Chen%20and%20Jiachen%20Li%20and%20Zhengzhong%20Tu%20and%20Zhangyang%20Wang%20and%20Rakesh%20Ranjan%0AAbstract%3A%20The%20rapid%20advancement%20of%20Large%20Multimodal%20Models%20%28LMMs%29%20for%202D%20images%20and%20videos%20has%20motivated%20extending%20these%20models%20to%20understand%203D%20scenes%2C%20aiming%20for%20human-like%20visual-spatial%20intelligence.%20Nevertheless%2C%20achieving%20deep%20spatial%20understanding%20comparable%20to%20human%20capabilities%20poses%20significant%20challenges%20in%20model%20encoding%20and%20data%20acquisition.%20Existing%20methods%20frequently%20depend%20on%20external%20depth%20sensors%20for%20geometry%20capture%20or%20utilize%20off-the-shelf%20algorithms%20for%20pre-constructing%203D%20maps%2C%20thereby%20limiting%20their%20scalability%2C%20especially%20with%20prevalent%20monocular%20video%20inputs%20and%20for%20time-sensitive%20applications.%20In%20this%20work%2C%20we%20introduce%20VLM-3R%2C%20a%20unified%20framework%20for%20Vision-Language%20Models%20%28VLMs%29%20that%20incorporates%203D%20Reconstructive%20instruction%20tuning.%20VLM-3R%20processes%20monocular%20video%20frames%20by%20employing%20a%20geometry%20encoder%20to%20derive%20implicit%203D%20tokens%20that%20represent%20spatial%20understanding.%20Leveraging%20our%20Spatial-Visual-View%20Fusion%20and%20over%20200K%20curated%203D%20reconstructive%20instruction%20tuning%20question-answer%20%28QA%29%20pairs%2C%20VLM-3R%20effectively%20aligns%20real-world%20spatial%20context%20with%20language%20instructions.%20This%20enables%20monocular%203D%20spatial%20assistance%20and%20embodied%20reasoning.%20To%20facilitate%20the%20evaluation%20of%20temporal%20reasoning%2C%20we%20introduce%20the%20Vision-Spatial-Temporal%20Intelligence%20benchmark%2C%20featuring%20over%20138.6K%20QA%20pairs%20across%20five%20distinct%20tasks%20focused%20on%20evolving%20spatial%20relationships.%20Extensive%20experiments%20demonstrate%20that%20our%20model%2C%20VLM-3R%2C%20not%20only%20facilitates%20robust%20visual-spatial%20reasoning%20but%20also%20enables%20the%20understanding%20of%20temporal%203D%20context%20changes%2C%20excelling%20in%20both%20accuracy%20and%20scalability.%0ALink%3A%20http%3A//arxiv.org/abs/2505.20279v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVLM-3R%253A%2520Vision-Language%2520Models%2520Augmented%2520with%2520Instruction-Aligned%25203D%2520Reconstruction%26entry.906535625%3DZhiwen%2520Fan%2520and%2520Jian%2520Zhang%2520and%2520Renjie%2520Li%2520and%2520Junge%2520Zhang%2520and%2520Runjin%2520Chen%2520and%2520Hezhen%2520Hu%2520and%2520Kevin%2520Wang%2520and%2520Huaizhi%2520Qu%2520and%2520Shijie%2520Zhou%2520and%2520Dilin%2520Wang%2520and%2520Zhicheng%2520Yan%2520and%2520Hongyu%2520Xu%2520 {"title": "SemMorph3D: Unsupervised Semantic-Aware 3D Morphing via Mesh-Guided Gaussians", "author": "Mengtian Li and Yunshu Bai and Yimin Chu and Xinru Guo and Haolin Liu and Zhifeng Xie and Chaofeng Chen", "abstract": "We introduce METHODNAME, a novel framework for semantic-aware 3D shape and texture morphing directly from multi-view images. While 3D Gaussian Splatting (3DGS) enables photorealistic rendering, its unstructured nature often leads to catastrophic geometric fragmentation during morphing. Conversely, traditional mesh-based morphing enforces structural integrity but mandates pristine input topology and struggles with complex appearances. Our method resolves this dichotomy by employing a mesh-guided strategy where a coarse, extracted base mesh acts as a flexible geometric anchor. This anchor provides the necessary topological scaffolding to guide unstructured Gaussians, successfully compensating for mesh extraction artifacts and topological limitations. Furthermore, we propose a novel dual-domain optimization strategy that leverages this hybrid representation to establish unsupervised semantic correspondence, synergizing geodesic regularizations for shape preservation with texture-aware constraints for coherent color evolution. This integrated approach ensures stable, physically plausible transformations without requiring labeled data, specialized 3D assets, or category-specific templates. On the proposed TexMorph benchmark, METHODNAME substantially outperforms prior 2D and 3D methods, yielding fully textured, topologically robust 3D morphing while reducing color consistency error (Delta E) by 22.2% and EI by 26.2%. Project page: https://baiyunshu.github.io/GAUSSIANMORPHING.github.io/", "link": "http://arxiv.org/abs/2510.02034v2", "date": "2026-04-20", "relevancy": 3.3013, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.7028}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6496}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6284}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SemMorph3D%3A%20Unsupervised%20Semantic-Aware%203D%20Morphing%20via%20Mesh-Guided%20Gaussians&body=Title%3A%20SemMorph3D%3A%20Unsupervised%20Semantic-Aware%203D%20Morphing%20via%20Mesh-Guided%20Gaussians%0AAuthor%3A%20Mengtian%20Li%20and%20Yunshu%20Bai%20and%20Yimin%20Chu%20and%20Xinru%20Guo%20and%20Haolin%20Liu%20and%20Zhifeng%20Xie%20and%20Chaofeng%20Chen%0AAbstract%3A%20We%20introduce%20METHODNAME%2C%20a%20novel%20framework%20for%20semantic-aware%203D%20shape%20and%20texture%20morphing%20directly%20from%20multi-view%20images.%20While%203D%20Gaussian%20Splatting%20%283DGS%29%20enables%20photorealistic%20rendering%2C%20its%20unstructured%20nature%20often%20leads%20to%20catastrophic%20geometric%20fragmentation%20during%20morphing.%20Conversely%2C%20traditional%20mesh-based%20morphing%20enforces%20structural%20integrity%20but%20mandates%20pristine%20input%20topology%20and%20struggles%20with%20complex%20appearances.%20Our%20method%20resolves%20this%20dichotomy%20by%20employing%20a%20mesh-guided%20strategy%20where%20a%20coarse%2C%20extracted%20base%20mesh%20acts%20as%20a%20flexible%20geometric%20anchor.%20This%20anchor%20provides%20the%20necessary%20topological%20scaffolding%20to%20guide%20unstructured%20Gaussians%2C%20successfully%20compensating%20for%20mesh%20extraction%20artifacts%20and%20topological%20limitations.%20Furthermore%2C%20we%20propose%20a%20novel%20dual-domain%20optimization%20strategy%20that%20leverages%20this%20hybrid%20representation%20to%20establish%20unsupervised%20semantic%20correspondence%2C%20synergizing%20geodesic%20regularizations%20for%20shape%20preservation%20with%20texture-aware%20constraints%20for%20coherent%20color%20evolution.%20This%20integrated%20approach%20ensures%20stable%2C%20physically%20plausible%20transformations%20without%20requiring%20labeled%20data%2C%20specialized%203D%20assets%2C%20or%20category-specific%20templates.%20On%20the%20proposed%20TexMorph%20benchmark%2C%20METHODNAME%20substantially%20outperforms%20prior%202D%20and%203D%20methods%2C%20yielding%20fully%20textured%2C%20topologically%20robust%203D%20morphing%20while%20reducing%20color%20consistency%20error%20%28Delta%20E%29%20by%2022.2%25%20and%20EI%20by%2026.2%25.%20Project%20page%3A%20https%3A//baiyunshu.github.io/GAUSSIANMORPHING.github.io/%0ALink%3A%20http%3A//arxiv.org/abs/2510.02034v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSemMorph3D%253A%2520Unsupervised%2520Semantic-Aware%25203D%2520Morphing%2520via%2520Mesh-Guided%2520Gaussians%26entry.906535625%3DMengtian%2520Li%2520and%2520Yunshu%2520Bai%2520and%2520Yimin%2520Chu%2520and%2520Xinru%2520Guo%2520and%2520Haolin%2520Liu%2520and%2520Zhifeng%2520Xie%2520and%2520Chaofeng%2520Chen%26entry.1292438233%3DWe%2520introduce%2520METHODNAME%252C%2520a%2520novel%2520framework%2520for%2520semantic-aware%25203D%2520shape%2520and%2520texture%2520morphing%2520directly%2520from%2520multi-view%2520images.%2520While%25203D%2520Gaussian%2520Splatting%2520%25283DGS%2529%2520enables%2520photorealistic%2520rendering%252C%2520its%2520unstructured%2520nature%2520often%2520leads%2520to%2520catastrophic%2520geometric%2520fragmentation%2520during%2520morphing.%2520Conversely%252C%2520traditional%2520mesh-based%2520morphing%2520enforces%2520structural%2520integrity%2520but%2520mandates%2520pristine%2520input%2520topology%2520and%2520struggles%2520with%2520complex%2520appearances.%2520Our%2520method%2520resolves%2520this%2520dichotomy%2520by%2520employing%2520a%2520mesh-guided%2520strategy%2520where%2520a%2520coarse%252C%2520extracted%2520base%2520mesh%2520acts%2520as%2 {"title": "MUA: Mobile Ultra-detailed Animatable Avatars", "author": "Heming Zhu and Guoxing Sun and Marc Habermann", "abstract": "Building photorealistic, animatable full-body digital humans remains a longstanding challenge in computer graphics and vision. Recent advances in animatable avatar modeling have largely progressed along two directions: improving the fidelity of dynamic geometry and appearance, or reducing computational complexity to enable deployment on resource-constrained platforms, e.g., VR headsets. However, existing approaches fail to achieve both goals simultaneously: Ultra-high-fidelity avatars typically require substantial computation on server-class GPUs, whereas lightweight avatars often suffer from limited surface dynamics, reduced appearance details, and noticeable artifacts. To bridge this gap, we propose a novel animatable avatar representation, termed Wavelet-guided Multi-level Spatial Factorized Blendshapes, and a corresponding distillation pipeline that transfers motion-aware clothing dynamics and fine-grained appearance details from a pre-trained ultra-high-quality avatar model into a compact, efficient representation. By coupling multi-level wavelet spectral decomposition with low-rank structural factorization in texture space, our method achieves up to 2000X lower computational cost and a 10X smaller model size than the original high-quality teacher avatar model, while preserving visually plausible dynamics and appearance details closely resemble those of the teacher model. Extensive comparisons with state-of-the-art methods show that our approach significantly outperforms existing avatar approaches designed for mobile settings and achieves comparable or superior rendering quality to most approaches that can only run on servers. Importantly, our representation substantially improves the practicality of high-fidelity avatars for immersive applications, achieving over 180 FPS on a desktop PC and real-time native on-device performance at 24 FPS on a standalone Meta Quest 3.", "link": "http://arxiv.org/abs/2604.18583v1", "date": "2026-04-20", "relevancy": 3.3012, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6654}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.6576}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.6576}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MUA%3A%20Mobile%20Ultra-detailed%20Animatable%20Avatars&body=Title%3A%20MUA%3A%20Mobile%20Ultra-detailed%20Animatable%20Avatars%0AAuthor%3A%20Heming%20Zhu%20and%20Guoxing%20Sun%20and%20Marc%20Habermann%0AAbstract%3A%20Building%20photorealistic%2C%20animatable%20full-body%20digital%20humans%20remains%20a%20longstanding%20challenge%20in%20computer%20graphics%20and%20vision.%20Recent%20advances%20in%20animatable%20avatar%20modeling%20have%20largely%20progressed%20along%20two%20directions%3A%20improving%20the%20fidelity%20of%20dynamic%20geometry%20and%20appearance%2C%20or%20reducing%20computational%20complexity%20to%20enable%20deployment%20on%20resource-constrained%20platforms%2C%20e.g.%2C%20VR%20headsets.%20However%2C%20existing%20approaches%20fail%20to%20achieve%20both%20goals%20simultaneously%3A%20Ultra-high-fidelity%20avatars%20typically%20require%20substantial%20computation%20on%20server-class%20GPUs%2C%20whereas%20lightweight%20avatars%20often%20suffer%20from%20limited%20surface%20dynamics%2C%20reduced%20appearance%20details%2C%20and%20noticeable%20artifacts.%20To%20bridge%20this%20gap%2C%20we%20propose%20a%20novel%20animatable%20avatar%20representation%2C%20termed%20Wavelet-guided%20Multi-level%20Spatial%20Factorized%20Blendshapes%2C%20and%20a%20corresponding%20distillation%20pipeline%20that%20transfers%20motion-aware%20clothing%20dynamics%20and%20fine-grained%20appearance%20details%20from%20a%20pre-trained%20ultra-high-quality%20avatar%20model%20into%20a%20compact%2C%20efficient%20representation.%20By%20coupling%20multi-level%20wavelet%20spectral%20decomposition%20with%20low-rank%20structural%20factorization%20in%20texture%20space%2C%20our%20method%20achieves%20up%20to%202000X%20lower%20computational%20cost%20and%20a%2010X%20smaller%20model%20size%20than%20the%20original%20high-quality%20teacher%20avatar%20model%2C%20while%20preserving%20visually%20plausible%20dynamics%20and%20appearance%20details%20closely%20resemble%20those%20of%20the%20teacher%20model.%20Extensive%20comparisons%20with%20state-of-the-art%20methods%20show%20that%20our%20approach%20significantly%20outperforms%20existing%20avatar%20approaches%20designed%20for%20mobile%20settings%20and%20achieves%20comparable%20or%20superior%20rendering%20quality%20to%20most%20approaches%20that%20can%20only%20run%20on%20servers.%20Importantly%2C%20our%20representation%20substantially%20improves%20the%20practicality%20of%20high-fidelity%20avatars%20for%20immersive%20applications%2C%20achieving%20over%20180%20FPS%20on%20a%20desktop%20PC%20and%20real-time%20native%20on-device%20performance%20at%2024%20FPS%20on%20a%20standalone%20Meta%20Quest%203.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18583v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMUA%253A%2520Mobile%2520Ultra-detailed%2520Animatable%2520Avatars%26entry.906535625%3DHeming%2520Zhu%2520and%2520Guoxing%2520Sun%2520and%2520Marc%2520Habermann%26entry.1292438233%3DBuilding%2520photorealistic%252C%2520animatable%2520full-body%2520digital%2520humans%2520remains%2520a%2520longstanding%2520challenge%2520in%2520computer%2520graphics%2520and%2520vision.%2520Recent%2520advances%2520in%2520animatable%2520avatar%2520modeling%2520have%2520largely%2520progressed%2520along%2520two%2520directions%253A%2520improving%2520the%2520fidelity%2520of%2520dynamic%2520geometry%252 %2520comparable%2520or%2520superior%2520rendering%2520quality%2520to%2520most%2520approaches%2520that%2520can%2520only%2520run%2520on%2520servers.%2520Importantly%252C%2520our%2520representation%2520substantially%2520improves%2520the%2520practicality%2520of%2520high-fidelity%2520avatars%2520for%2520immersive%2520applications%252C%2520achieving%2520over%2520180%2520FPS%2520on%2520a%2520desktop%2520PC%2520and%2520real-time%2520native%2520on-device%2520performance%2520at%252024%2520FPS%2520on%2520a%2520standalone%2520Meta%2520Quest%25203.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.18583v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MUA%3A%20Mobile%20Ultra-detailed%20Animatable%20Avatars&entry.906535625=Heming%20Zhu%20and%20Guoxing%20Sun%20and%20Marc%20Habermann&entry.1292438233=Building%20photorealistic%2C%20animatable%20full-body%20digital%20humans%20remains%20a%20longstanding%20challenge%20in%20computer%20graphics%20and%20vision.%20Recent%20advances%20in%20animatable%20avatar%20modeling%20have%20largely%20progressed%20along%20two%20directions%3A%20improving%20the%20fidelity%20of%20dynamic%20geometry%20and%20appearance%2C%20or%20reducing%20computational%20complexity%20to%20enable%20deployment%20on%20resource-constrained%20platforms%2C%20e.g.%2C%20VR%20headsets.%20However%2C%20existing%20approaches%20fail%20to%20achieve%20both%20goals%20simultaneously%3A%20Ultra-high-fidelity%20avatars%20typically%20require%20substantial%20computation%20on%20server-class%20GPUs%2C%20whereas%20lightweight%20avatars%20often%20suffer%20from%20limited%20surface%20dynamics%2C%20reduced%20appearance%20details%2C%20and%20noticeable%20artifacts.%20To%20bridge%20this%20gap%2C%20we%20propose%20a%20novel%20animatable%20avatar%20representation%2C%20termed%20Wavelet-guided%20Multi-level%20Spatial%20Factorized%20Blendshapes%2C%20and%20a%20corresponding%20distillation%20pipeline%20that {"title": "AvatarPointillist: AutoRegressive 4D Gaussian Avatarization", "author": "Hongyu Liu and Xuan Wang and Zijian Wu and Yating Wang and Ziyu Wan and Yue Ma and Runtao Liu and Boyao Zhou and Yujun Shen and Qifeng Chen", "abstract": "We introduce AvatarPointillist, a novel framework for generating dynamic 4D Gaussian avatars from a single portrait image. At the core of our method is a decoder-only Transformer that autoregressively generates a point cloud for 3D Gaussian Splatting. This sequential approach allows for precise, adaptive construction, dynamically adjusting point density and the total number of points based on the subject's complexity. During point generation, the AR model also jointly predicts per-point binding information, enabling realistic animation. After generation, a dedicated Gaussian decoder converts the points into complete, renderable Gaussian attributes. We demonstrate that conditioning the decoder on the latent features from the AR generator enables effective interaction between stages and markedly improves fidelity. Extensive experiments validate that AvatarPointillist produces high-quality, photorealistic, and controllable avatars. We believe this autoregressive formulation represents a new paradigm for avatar generation, and we will release our code inspire future research.", "link": "http://arxiv.org/abs/2604.04787v2", "date": "2026-04-20", "relevancy": 3.275, "topK": [{"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.6729}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.6729}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6192}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AvatarPointillist%3A%20AutoRegressive%204D%20Gaussian%20Avatarization&body= iv.org/abs/2604.04787v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=AvatarPointillist%3A%20AutoRegressive%204D%20Gaussian%20Avatarization&entry.906535625=Hongyu%20Liu%20and%20Xuan%20Wang%20and%20Zijian%20Wu%20and%20Yating%20Wang%20and%20Ziyu%20Wan%20and%20Yue%20Ma%20and%20Runtao%20Liu%20and%20Boyao%20Zhou%20and%20Yujun%20Shen%20and%20Qifeng%20Chen&entry.1292438233=We%20introduce%20AvatarPointillist%2C%20a%20novel%20framework%20for%20generating%20dynamic%204D%20Gaussian%20avatars%20from%20a%20single%20portrait%20image.%20At%20the%20core%20of%20our%20method%20is%20a%20decoder-only%20Transformer%20that%20autoregressively%20generates%20a%20point%20cloud%20for%203D%20Gaussian%20Splatting.%20This%20sequential%20approach%20allows%20for%20precise%2C%20adaptive%20construction%2C%20dynamically%20adjusting%20point%20density%20and%20the%20total%20number%20of%20points%20based%20on%20the%20subject%27s%20complexity.%20During%20point%20generation%2C%20the%20AR%20model%20also%20jointly%20predicts%20per-point%20binding%20information%2C%20enabling%20realistic%20animation.%20After%20generation%2C%20a%20dedicated%20Gaussian%20decoder%20converts%20the%20points%20into%20complete%2C%20renderable%20Gaussian%20attributes.%20We%20demonstrate%20that%20conditioning%20the%20decoder%20on%20the%20latent%20features%20from%20the%20AR%20generator%20enables%20effective%20interaction%20between%20stages%20and%20markedly%20improves%20fidelity.%20Extensive%20experiments%20validate%20that%20AvatarPointillist%20produces%20high-quality%2C%20photorealistic%2C%20and%20controllable%20avatars.%20We%20believe%20this%20autoregressive%20formulation%20represents%20a%20new%20paradigm%20for%20avatar%20generation%2C%20and%20we%20will%20release%20our%20code%20inspire%20future%20research.&entry.1838667208=http%3A//arxiv.org/abs/2604.04787v2&entry.124074799=Read"},
{"title": "NVGS: Neural Visibility for Occlusion Culling in 3D Gaussian Splatting", "author": "Brent Zoomers and Florian Hahlbohm and Joni Vanherck and Lode Jorissen and Marcus Magnor and Nick Michiels", "abstract": "3D Gaussian Splatting can exploit frustum culling and level-of-detail strategies to accelerate rendering of scenes containing a large number of primitives. However, the semi-transparent nature of Gaussians prevents the application of another highly effective technique: occlusion culling. We address this limitation by proposing a novel method to learn the viewpoint-dependent visibility function of all Gaussians in a trained model using a small, shared MLP across instances of an asset in a scene. By querying it for Gaussians within the viewing frustum prior to rasterization, our method can discard occluded primitives during rendering. Leveraging Tensor Cores for efficient computation, we integrate these neural queries directly into a novel instanced software rasterizer. Our approach outperforms the current state of the art for composed scenes in terms of VRAM usage and image quality, utilizing a combination of our instanced rasterizer and occlusion culling MLP, and exhibits complementary properties to existing LoD techniques.", "link": "http://arxiv.org/abs/2511.19202v2", "date": "2026-04-20", "relevancy": 3.2394, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6685}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.652}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6231}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NVGS%3A%20Neural%20Visibility%20for%20Occlusion%20Culling%20in%203D%20Gaussian%20Splatting&body=Title%3A%20NVGS%3A%20Neural%20Visibility%20for%20Occlusion%20Culling%20in%203D%20Gaussian%20Splatting%0AAuthor%3A%20Brent%20Zoomers%20and%20Florian%20Hahlbohm%20and%20Joni%20Vanherck%20and%20Lode%20Jorissen%20and%20Marcus%20Magnor%20and%20Nick%20Michiels%0AAbstract%3A%203D%20Gaussian%20Splatting%20can%20exploit%20frustum%20culling%20and%20level-of-detail%20strategies%20to%20accelerate%20rendering%20of%20scenes%20containing%20a%20large%20number%20of%20primitives.%20However%2C%20the%20semi-transparent%20nature%20of%20Gaussians%20prevents%20the%20application%20of%20another%20highly%20effective%20technique%3A%20occlusion%20culling.%20We%20address%20this%20limitation%20by%20proposing%20a%20novel%20method%20to%20learn%20the%20viewpoint-dependent%20visibility%20function%20of%20all%20Gaussians%20in%20a%20trained%20model%20using%20a%20small%2C%20shared%20MLP%20across%20instances%20of%20an%20asset%20in%20a%20scene.%20By%20querying%20it%20for%20Gaussians%20within%20the%20viewing%20frustum%20prior%20to%20rasterization%2C%20our%20method%20can%20discard%20occluded%20primitives%20during%20rendering.%20Leveraging%20Tensor%20Cores%20for%20efficient%20computation%2C%20we%20integrate%20these%20neural%20queries%20directly%20into%20a%20novel%20instanced%20software%20rasterizer.%20Our%20approach%20outperforms%20the%20current%20state%20of%20the%20art%20for%20composed%20scenes%20in%20terms%20of%20VRAM%20usage%20and%20image%20quality%2C%20utilizing%20a%20combination%20of%20our%20instanced%20rasterizer%20and%20occlusion%20culling%20MLP%2C%20and%20exhibits%20complementary%20properties%20to%20existing%20LoD%20techniques.%0ALink%3A%20http%3A//arxiv.org/abs/2511.19202v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNVGS%253A%2520Neural%2520Visibility%2520for%2520Occlusion%2520Culling%2520in%25203D%2520Gaussian%2520Splatting%26entry.906535625%3DBrent%2520Zoomers%2520and%2520Florian%2520Hahlbohm%2520and%2520Joni%2520Vanherck%2520and%2520Lode% r%20Occlusion%20Culling%20in%203D%20Gaussian%20Splatting&entry.906535625=Brent%20Zoomers%20and%20Florian%20Hahlbohm%20and%20Joni%20Vanherck%20and%20Lode%20Jorissen%20and%20Marcus%20Magnor%20and%20Nick%20Michiels&entry.1292438233=3D%20Gaussian%20Splatting%20can%20exploit%20frustum%20culling%20and%20level-of-detail%20strategies%20to%20accelerate%20rendering%20of%20scenes%20containing%20a%20large%20number%20of%20primitives.%20However%2C%20the%20semi-transparent%20nature%20of%20Gaussians%20prevents%20the%20application%20of%20another%20highly%20effective%20technique%3A%20occlusion%20culling.%20We%20address%20this%20limitation%20by%20proposing%20a%20novel%20method%20to%20learn%20the%20viewpoint-dependent%20visibility%20function%20of%20all%20Gaussians%20in%20a%20trained%20model%20using%20a%20small%2C%20shared%20MLP%20across%20instances%20of%20an%20asset%20in%20a%20scene.%20By%20querying%20it%20for%20Gaussians%20within%20the%20viewing%20frustum%20prior%20to%20rasterization%2C%20our%20method%20can%20discard%20occluded%20primitives%20during%20rendering.%20Leveraging%20Tensor%20Cores%20for%20efficient%20computation%2C%20we%20integrate%20these%20neural%20queries%20directly%20into%20a%20novel%20instanced%20software%20rasterizer.%20Our%20approach%20outperforms%20the%20current%20state%20of%20the%20art%20for%20composed%20scenes%20in%20terms%20of%20VRAM%20usage%20and%20image%20quality%2C%20utilizing%20a%20combination%20of%20our%20instanced%20rasterizer%20and%20occlusion%20culling%20MLP%2C%20and%20exhibits%20complementary%20properties%20to%20existing%20LoD%20techniques.&entry.1838667208=http%3A//arxiv.org/abs/2511.19202v2&entry.124074799=Read"},
{"title": "TrianguLang: Geometry-Aware Semantic Consensus for Pose-Free 3D Localization", "author": "Bryce Grant and Aryeh Rothenberg and Atri Banerjee and Peng Wang", "abstract": "Localizing objects and parts from natural language in 3D space is essential for robotics, AR, and embodied AI, yet existing methods face a trade-off between the accuracy and geometric consistency of per-scene optimization and the efficiency of feed-forward inference. We present TrianguLang, a feed-forward framework for 3D localization that requires no camera calibration at inference. Unlike prior methods that treat views independently, we introduce Geometry-Aware Semantic Attention (GASA), which utilizes predicted geometry to gate cross-view feature correspondence, suppressing semantically-plausible but geometrically-inconsistent matches without requiring ground-truth poses. Validated on five benchmarks including ScanNet++ and uCO3D, TrianguLang achieves state-of-the-art feed-forward text-guided segmentation and localization, reducing user effort from $O(N)$ clicks to a single text query. The model processes each frame at 1008x1008 resolution in $\\sim$57ms ($\\sim$18 FPS) without optimization, enabling practical deployment for interactive robotics and AR applications. Code and checkpoints are available at https://cwru-aism.github.io/triangulang/.", "link": "http://arxiv.org/abs/2603.08096v3", "date": "2026-04-20", "relevancy": 3.1178, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6514}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6167}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6026}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20T %2520checkpoints%2520are%2520available%2520at%2520https%253A//cwru-aism.github.io/triangulang/.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.08096v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=TrianguLang%3A%20Geometry-Aware%20Semantic%20Consensus%20for%20Pose-Free%203D%20Localization&entry.906535625=Bryce%20Grant%20and%20Aryeh%20Rothenberg%20and%20Atri%20Banerjee%20and%20Peng%20Wang&entry.1292438233=Localizing%20objects%20and%20parts%20from%20natural%20language%20in%203D%20space%20is%20essential%20for%20robotics%2C%20AR%2C%20and%20embodied%20AI%2C%20yet%20existing%20methods%20face%20a%20trade-off%20between%20the%20accuracy%20and%20geometric%20consistency%20of%20per-scene%20optimization%20and%20the%20efficiency%20of%20feed-forward%20inference.%20We%20present%20TrianguLang%2C%20a%20feed-forward%20framework%20for%203D%20localization%20that%20requires%20no%20camera%20calibration%20at%20inference.%20Unlike%20prior%20methods%20that%20treat%20views%20independently%2C%20we%20introduce%20Geometry-Aware%20Semantic%20Attention%20%28GASA%29%2C%20which%20utilizes%20predicted%20geometry%20to%20gate%20cross-view%20feature%20correspondence%2C%20suppressing%20semantically-plausible%20but%20geometrically-inconsistent%20matches%20without%20requiring%20ground-truth%20poses.%20Validated%20on%20five%20benchmarks%20including%20ScanNet%2B%2B%20and%20uCO3D%2C%20TrianguLang%20achieves%20state-of-the-art%20feed-forward%20text-guided%20segmentation%20and%20localization%2C%20reducing%20user%20effort%20from%20%24O%28N%29%24%20clicks%20to%20a%20single%20text%20query.%20The%20model%20processes%20each%20frame%20at%201008x1008%20resolution%20in%20%24%5Csim%2457ms%20%28%24%5Csim%2418%20FPS%29%20without%20optimization%2C%20enabling%20practical%20deployment%20for%20interactive%20robotics%20and%20AR%20applications.%20Code%20and%20checkpoints%20are%20available%20at%20https%3A//cwru-aism.git {"title": "XEmbodied: A Foundation Model with Enhanced Geometric and Physical Cues for Large-Scale Embodied Environments", "author": "Kangan Qian and ChuChu Xie and Yang Zhong and Jingrui Pang and Siwen Jiao and Sicong Jiang and Zilin Huang and Yunlong Wang and Kun Jiang and Mengmeng Yang and Hao Ye and Guanghao Zhang and Hangjun Ye and Guang Chen and Long Chen and Diange Yang", "abstract": "Vision-Language-Action (VLA) models drive next-generation autonomous systems, but training them requires scalable, high-quality annotations from complex environments. Current cloud pipelines rely on generic vision-language models (VLMs) that lack geometric reasoning and domain semantics due to their 2D image-text pretraining. To address this mismatch, we propose XEmbodied, a cloud-side foundation model that endows VLMs with intrinsic 3D geometric awareness and interaction with physical cues (e.g., occupancy grids, 3D boxes). Instead of treating geometry as auxiliary input, XEmbodied integrates geometric representations via a structured 3D Adapter and distills physical signals into context tokens using an Efficient Image-Embodied Adapter. Through progressive domain curriculum and reinforcement learning post-training, XEmbodied preserves general capabilities while demonstrating robust performance across 18 public benchmarks. It significantly improves spatial reasoning, traffic semantics, embodied affordance, and out-of-distribution generalization for large-scale scenario mining and embodied VQA.", "link": "http://arxiv.org/abs/2604.18484v1", "date": "2026-04-20", "relevancy": 3.1032, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6359}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6359}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5901}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20XEmbodied%3A%20A%20Foundation%20Model%20with%20Enhanced%20Geometric%20and%20Physical%20Cues%20for%20Large-Scale%20Embodied%20Environments&body=Title%3A%20XEmbodied%3A%20A%20Foundation%20Model%20with%20Enhanced%20Geometric%20and%20Physical%20Cues%20for%20Large-Scale%20Embodied%20Environments%0AAuthor%3A%20Kangan%20Qian%20and%20ChuChu%20Xie%20and%20Yang%20Zhong%20and%20Jingrui%20Pang%20and%20Siwen%20Jiao%20and%20Sicong%20Jiang%20and%20Zilin%20Huang%20and%20Yunlong%20Wang%20and%20Kun%20Jiang%20and%20Mengmeng%20Yang%20and%20Hao%20Ye%20and%20Guanghao%20Zhang%20and%20Hangjun%20Ye%20and%20Guang%20Chen%20and%20Long%20Chen%20and%20Diange%20Yang%0AAbstract%3A%20Vision-Language-Action%20%28VLA%29%20models%20drive%20next-generation%20autonomous%20systems%2C%20but%20training%20them%20requires%20scalable%2C%20high-quality%20annotations%20from%20complex%20environments.%20Current%20cloud%20pipelines%20rely%20on%20generic%20vision-language%20models%20%28VLMs%29%20that%20lack%20geometric%20reasoning%20and%20domain%20semantics%20due%20to%20their%202D%20image-text%20pretraining.%20To%20address%20this%20mismatch%2C%20we%20propose%20XEmbodied%2C%20a%20cloud-side%20foundation%20model%20that%20endows%20VLMs%20with%20intrinsic%203D%20geometric%20awareness%20and%20interaction%20with%20physical%20cues%20%28e.g.%2C%20occupancy%20grids%2C%203D%20boxes%29.%20Instead%20of%20treating%20geometry%20as%20auxiliary%20input%2C%20XEmbodied%20integrates%20geometric%20representations%20via%20a%20structured%203D%20Adapter%20and%20distills%20physical%20signals%20into%20context%20tokens%20using%20an%20Efficient%20Image-Embodied%20Adapter.%20Through%20progressive%20domain%20curriculum%20and%20reinforcement%20learning%20post-training%2C%20XEmbodied%20preserves%20general%20capabilities%20while%20demonstrating%20robust%20performance%20across%2018%20public%20benchmarks.%20It%20significantly%20improves%20spatial%20reasoning%2C%20traffic%20semantics%2C%20embodied%20affordance%2C%20and%20out-of-distribution%20generalization%20for%20large-scale%20scenario%20mining%20and%20embodied%20VQA.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18484v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DXEmbodied%253A%2520A%2520Foundation%2520Model%2520with%2520Enhanced%2520Geometric%2520and%2520Physical%2520Cues%2520for%2520Large-Scale%2520Embodied%2520Environments%26entry.906535625%3DKangan%2520Qian%2520and%2520ChuChu%2520Xie%2520and%2520Yang%2520Zhong%2520and%2520Jingrui%2520Pang%2520and%2520Siwen%2520Jiao%2520and%2520Sicong%2520Jiang%2520and%2520Zilin%2520Huang%2520and%2520Yunlong%2520Wang%2520and%2520Kun%2520Jiang%2520and%2520Mengmeng%2520Yang%2520and%2520Hao%2520Ye%2520and%2520Guanghao%2520Zhang%2520and%2520Hangjun%2520Ye%2520and%2520Guang%2520Chen%2520and%2520Long%2520Chen%2520and%2520Diange%2520Yang%26entry.1292438233%3DVision-Language-Action%2520%2528VLA%2529%2520models%2520drive%2520next-generation%2520autonomous%2520systems%252C%2520but%2520training%2520them%2520requires%2520scalable%252C%2520high-quality%2520annotations%2520from%2520complex%2520environments.%2520Current%2520cloud%2520pipelines%2520rely%2520on%2520generic%2520vision-language%2520models%2520%2528VLMs%2529%2520that%2520lack%2520geometric%2520reasoning%2520and%2520domain%2520semantics%2520due%2520to%2520their%25202D%2520image-text%2520pretraining.%2520To%2520address%2520this%2520mismatch%252C%2520we%2520propose%2520XEmbodied%252C%2520a%2520cloud-side%2520foundation%2520model%2520that%2520endows%2520VLMs%2520with%2520intrinsic%25203D%2520geometric%2520awareness%2520and%2520interaction%2520with%2520physical%2520cues%2520%2528e.g.%252C%2520occupancy%2520grids%252C%25203D%2520boxes%2529.%2520Instead%2520of%2520treating%2520geometry%2520as%2520auxiliary%2520input%252C%2520XEmbodied%2520integrates%2520 {"title": "A Comparative Evaluation of Geometric Accuracy in NeRF and Gaussian Splatting", "author": "Mikolaj Zielinski and Eryk Vykysaly and Bartlomiej Biesiada and Jan Baturo and Mateusz Capala and Dominik Belter", "abstract": "Recent advances in neural rendering have introduced numerous 3D scene representations. Although standard computer vision metrics evaluate the visual quality of generated images, they often overlook the fidelity of surface geometry. This limitation is particularly critical in robotics, where accurate geometry is essential for tasks such as grasping and object manipulation. In this paper, we present an evaluation pipeline for neural rendering methods that focuses on geometric accuracy, along with a benchmark comprising 19 diverse scenes. Our approach enables a systematic assessment of reconstruction methods in terms of surface and shape fidelity, complementing traditional visual metrics.", "link": "http://arxiv.org/abs/2604.18205v1", "date": "2026-04-20", "relevancy": 3.0938, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6415}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.6311}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5837}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Comparative%20Evaluation%20of%20Geometric%20Accuracy%20in%20NeRF%20and%20Gaussian%20Splatting&body=Title%3A%20A%20Comparative%20Evaluation%20of%20Geometric%20Accuracy%20in%20NeRF%20and%20Gaussian%20Splatting%0AAuthor%3A%20Mikolaj%20Zielinski%20and%20Eryk%20Vykysaly%20and%20Bartlomiej%20Biesiada%20and%20Jan%20Baturo%20and%20Mateusz%20Capala%20and%20Dominik%20Belter%0AAbstract%3A%20Recent%20advances%20in%20neural%20rendering%20have%20introduced%20numerou {"title": "GS-STVSR: Ultra-Efficient Continuous Spatio-Temporal Video Super-Resolution via 2D Gaussian Splatting", "author": "Mingyu Shi and Xin Di and Long Peng and Boxiang Cao and Anran Wu and Zhanfeng Feng and Jiaming Guo and Renjing Pei and Xueyang Fu and Yang Cao and Zhengjun Zha", "abstract": "Continuous Spatio-Temporal Video Super-Resolution (C-STVSR) aims to simultaneously enhance the spatial resolution and frame rate of videos by arbitrary scale factors, offering greater flexibility than fixed-scale methods that are constrained by predefined upsampling ratios. In recent years, methods based on Implicit Neural Representations (INR) have made significant progress in C-STVSR by learning continuous mappings from spatio-temporal coordinates to pixel values. However, these methods fundamentally rely on dense pixel-wise grid queries, causing computational cost to scale linearly with the number of interpolated frames and severely limiting inference efficiency. We propose GS-STVSR, an ultra-efficient C-STVSR framework based on 2D Gaussian Splatting (2D-GS) that drives the spatiotemporal evolution of Gaussian kernels through continuous motion modeling, bypassing dense grid queries entirely. We exploit the strong temporal stability of covariance parameters for lightweight intermediate fitting, design an optical flow-guided motion module to derive Gaussian position and color at arbitrary time steps, introduce a Covariance resampling alignment module to prevent covariance drift, and propose an adaptive offset window for large-scale motion. Extensive experiments on Vid4, GoPro, and Adobe240 show that GS-STVSR achieves state-of-the-art quality across all benchmarks. Moreover, its inference time remains nearly constant at conventional temporal scales (X2--X8) and delivers over X3 speedup at extreme scales X32, demonstrating strong practical applicability.", "link": "http://arxiv.org/abs/2604.18047v1", "date": "2026-04-20", "relevancy": 3.0878, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.667}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5947}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.591}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GS-STVSR%3A%20Ultra-Efficient%20Continuous%20Spatio-Temporal%20Video%20Super-Resolution%20via%202D%20Gaussian%20Splatting&body=Title%3A%20GS-STVSR%3A%20Ultra-Efficient%20Continuous%20Spatio-Temporal%20Video%20Super-Resolution%20via%202D%20Gaussian%20Splatting%0AAuthor%3A%20Mingyu%20Shi%20and%20Xin%20Di%20and%20Long%20Peng%20and%20Boxiang%20Cao%20and%20Anran%20Wu%20and%20Zhanfeng%20Feng%20and%20Jiaming%20Guo%20and%20Renjing%20Pei%20and%20Xueyang%20Fu%20and%20Yang%20Cao%20and%20Zhengjun%20Zha%0AAbstract%3A%20Continuous%20Spatio-Temporal%20Video%20Super-Resolution%20%28C-STVSR%29%20aims%20to%20simultaneously%20enhance%20the%20spatial%20resolution%20and%20frame%20rate%20of%20videos%20by%20arbitrary%20scale%20factors%2C%20offering%20greater%20flexibility%20than%20fixed-scale%20methods%20that%20are%20constrained%20by%20predefined%20upsampling%20ratios.%20In%20recent%20years%2C%20methods%20based%20on%20Implicit%20Neural%20Representations%20%28INR%29%20have%20made%20significant%20progress%20in%20C-STVSR%20by%20learning%20continuous%20mappings%20from%20spatio-temporal%20coordinates%20to%20pixel%20values.%20However%2C%20these%20methods%20fundamentally%20rely%20on%20dense%20pixel-wise%20grid%20queries%2C%20causing%20computational%20cost%20to%20scale%20linearly%20with%20the%20number%20of%20interpolated%20frames%20and%20severely%20limiting%20inference%20efficiency.%20We%20propose%20GS-STVSR%2C%20an%20ultra-efficient%20C-STVSR%20framework%20based%20on%202D%20Gaussian%20Splatting%20%282D-GS%29%20that%20drives%20the%20spatiotemporal%20evolution%20of%20Gaussian%20kernels%20through%20continuous%20motion%20modeling%2C%20bypassing%20dense%20grid%20queries%20entirely.%20We%20exploit%20the%20strong%20temporal%20stability%20of%20covariance%20parameters%20for%20lightweight%20intermediate%20fitting%2C%20design%20an%20optical%20flow-guided%20motion%20module%20to%20derive%20Gaussian%20position%20and%20color%20at%20arbitrary%20time%20steps%2C%20introduce%20a%20Covariance%20resampling%20alignment%20module%20to%20prevent%20covariance%20drift%2C%20and%20propose%20an%20adaptive%20offset%20window%20for%20large-scale%20motion.%20Extensive%20experiments%20on%20Vid4%2C%20GoPro%2C%20and%20Adobe240%20show%20that%20GS-STVSR%20achieves%20state-of-the-art%20quality%20across%20all%20benchmarks.%20Moreover%2C%20its%20inference%20time%20remains%20nearly%20constant%20at%20conventional%20temporal%20scales%20%28X2--X8%29%20and%20delivers%20over%20X3%20speedup%20at%20extreme%20scales%20X32%2C%20demonstrating%20strong%20practical%20applicability.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18047v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGS-STVSR%253A%2520Ultra-Efficient%2520Continuous%2520Spatio-Temporal%2520Video%2520Super-Resolution%2520via%25202D%2520Gaussian%2520Splatting%26entry.906535625%3DMingyu%2520Shi%2520and%2520Xin%2520Di%2520and%2520Long%2520Peng%2520and%2520Boxiang%2520Cao%2520and%2520Anran%2520Wu%2520and%2520Zhanfeng%2520Feng%2520and%2520Jiaming%2520Guo%2520and%2520Renjing%2520Pei%2520and%2520Xueyang%2520Fu%2520and%2520Yang%2520Cao%2520and%2520Zhengjun%2520Zha%26entry.1292438233%3DContinuous%2520Spatio-Temporal%2520Video%2520Super-Resolution%2520%2528C-STVSR%2529%2520aims%2520to%2520simultaneously%2520enhance%2520the%2520spatial%2520resolution%2520and%2520frame%2520rate%2520of%2520videos%2520by%2520arbitrary%2520scale%2520factors%252C%2520offering%2520g {"title": "Unleashing Spatial Reasoning in Multimodal Large Language Models via Textual Representation Guided Reasoning", "author": "Jiacheng Hua and Yishu Yin and Yuhang Wu and Tai Wang and Yifei Huang and Miao Liu", "abstract": "Existing Multimodal Large Language Models (MLLMs) struggle with 3D spatial reasoning, as they fail to construct structured abstractions of the 3D environment depicted in video inputs. To bridge this gap, drawing inspiration from cognitive theories of allocentric spatial reasoning, we investigate how to enable MLLMs to model and reason over text-based spatial representations of video. Specifically, we introduce Textual Representation of Allocentric Context from Egocentric Video (TRACE), a prompting method that induces MLLMs to generate text-based representations of 3D environments as intermediate reasoning traces for more accurate spatial question answering. TRACE encodes meta-context, camera trajectories, and detailed object entities to support structured spatial reasoning over egocentric videos. Extensive experiments on VSI-Bench and OST-Bench demonstrate that TRACE yields notable and consistent improvements over prior prompting strategies across a diverse range of MLLM backbones, spanning different parameter scales and training schemas. We further present ablation studies to validate our design choices, along with detailed analyses that probe the bottlenecks of 3D spatial reasoning in MLLMs.", "link": "http://arxiv.org/abs/2603.23404v2", "date": "2026-04-20", "relevancy": 3.0716, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6208}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6208}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6014}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unleashing%20Spatial%20Reasoning%20in%20Multimodal%20Large%20Language%20Models%20via%20Textual%20Representation%20Guided%20Reasoning&body=Title%3A%20Unleashing%20Spatial%20Reasoning%20in%20Multimodal%20Large%20Language%20Models%20via%20Textual%20Representation%20Guided%20Reasoning%0AAuthor%3A%20Jiacheng%20Hua%20and%20Yishu%20Yin%20and%20Yuhang%20Wu%20and%20Tai%20Wang%20and%20Yifei%20Huang%20and%20Miao%20Liu%0AAbstract%3A%20Existing%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20struggle%20with%203D%20spatial%20reasoning%2C%20as%20they%20fail%20to%20construct%20structured%20abstractions%20of%20the%203D%20environment%20depicted%20in%20video%20inputs.%20To%20bridge%20this%20gap%2C%20drawing%20inspiration%20from%20cognitive%20theories%20of%20allocentric%20spatial%20reasoning%2C%20we%20investigate%20how%20to%20enable%20MLLMs%20to%20model%20and%20reason%20over%20text-based%20spatial%20representations%20of%20video.%20Specifically%2C%20we%20introduce%20Textual%20Representation%20of%20Allocentric%20Context%20from%20Egocentric%20Video%20%28TRACE%29%2C%20a%20prompting%20method%20that%20induces%20MLLMs%20to%20generate%20text-based%20representations%20of%203D%20environments%20as%20intermediate%20reasoning%20traces%20for%20more%20accurate%20spatial%20question%20answering.%20TRACE%20encodes%20meta-context%2C%20camera%20trajectories%2C%20and%20detailed%20object%20entities%20to%20support%20structured%20spatial%20reasoning%20over%20egocentric%20videos.%20Extensive%20experiments%20on%20VSI-Bench%20and%20OST-Bench%20demonstrate%20that%20TRACE%20yields%20notable%20and%20consistent%20improvements%20over%20prior%20prompting%20strategies%20across%20a%20diverse%20range%20of%20MLLM%20backbones%2C%20spanning%20different%20parameter%20scales%20and%20training%20schemas.%20We%20further%20present%20ablation%20studies%20to%20validate%20our%20design%20choices%2C%20along%20with%20detailed%20analyses%20that%20probe%20the%20bottlenecks%20of%203D%20spatial%20reasoning%20in%20MLLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23404v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnleashing%2520Spatial%2520Reasoning%2520in%2520Multimodal%2520Large%2520Language%2520Models%2520via%2520Textual%2520Representation%2520Guided%2520Reasoning%26entry.906535625%3DJiacheng%2520Hua%2520and%2520Yishu%2520Yin%2520and%2520Yuhang%2520Wu%2520and%2520Tai%2520Wang%2520and%2520Yifei%2520Huang%2520and%2520Miao%2520Liu%26entry.1292438233%3DExisting%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520struggle%2520with%25203D%2520spatial%2520reasoning%252C%2520as%2520they%2520fail%2520to%2520construct%2520structured%2520abstractions%2520of%2520the%25203D%2520environment%2520depicted%2520in%2520video%2520inputs.%2520To%2520bridge%2520this%2520gap%252C%2520drawing%2520inspiration%2520from%2520cognitive%2520theories%2520of%2520allocentric%2520spatial%2520reasoning%252C%2520we%2520investigate%2520how%2520to%2520enable%2520MLLMs%2520to%2520model%2520and%2520reason%2520over%2520text-based%2520spatial%2520representations%2520of%2520video.%2520Specifically%252C%2520we%2520introduce%2520Textual%2520Representation%2520of%2520Allocentric%2520Context%2520from%2520Egocentric%2520Video%2520%2528TRACE%2529%252C%2520a%2520prompting%2520method%2520that%2520induces%2520MLLMs%2520to%2520generate%2520text-based%2520representations%2520of%25203D%2520environments%2520as%2520intermediate%2520reasoning%2520traces%2520for%2520more%2520accurate%2520spatial%2520question%2520answering.%2520TRACE%2520encodes%2520meta-context%252C%2520camera%2520trajectories%252C%2520and%2520detailed%2520object%2520entities%2520to%2520support%2520structured%2520spatial%2520reasoning%2520over%2520egocentric%2520videos.%2520Extensive%2520experiments%2520on%2520VSI-Bench%2520and%2520OST-Bench%2520demonstrate%2520that%2520TRACE%2520yields%252 {"title": "S2H-DPO: Hardness-Aware Preference Optimization for Vision-Language Models", "author": "Nitish Shukla and Surgan Jandial and Arun Ross", "abstract": "Vision-Language Models (VLMs) have demonstrated remarkable progress in single-image understanding, yet effective reasoning across multiple images remains challenging. We identify a critical capability gap in existing multi-image alignment approaches: current methods focus primarily on localized reasoning with pre-specified image indices (``Look at Image 3 and...''), bypassing the essential skills of global visual search and autonomous cross-image comparison. To address this limitation, we introduce a Simple-to-Hard (S2H) learning framework that systematically constructs multi-image preference data across three hierarchical reasoning levels requiring an increasing level of capabilities: (1) single-image localized reasoning, (2) multi-image localized comparison, and (3) global visual search. Unlike prior work that relies on model-specific attributes, such as hallucinations or attention heuristics, to generate preference pairs, our approach leverages prompt-driven complexity to create chosen/rejected pairs that are applicable across different models. Through extensive evaluations on LLaVA and Qwen-VL models, we show that our diverse multi-image reasoning data significantly enhances multi-image reasoning performance, yielding significant improvements over baseline methods across benchmarks. Importantly, our approach maintains strong single-image reasoning performance while simultaneously strengthening multi-image understanding capabilities, thus advancing the state of the art for holistic visual preference alignment.", "link": "http://arxiv.org/abs/2604.18512v1", "date": "2026-04-20", "relevancy": 3.0609, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6227}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6227}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5911}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20S2H-DPO%3A%20Hardness-Aware%20Preference%20Optimization%20for%20Vision-Language%20Models&body=Title%3A%20S2H-DPO%3A%20Hardness-Aware%20Preference%20Optimization%20for%20Vision-Language%20Models%0AAuthor%3A%20Nitish%20Shukla%20and%20Surgan%20Jandial%20and%20Arun%20Ross%0AAbstract%3A%20Vision-Language%20Models%20%28VLMs%29%20have%20demonstrated%20remarkable%20progress%20in%20single-image%20understanding%2C%20yet%20effective%20reasoning%20across%20multiple%20images%20remains%20challenging.%20We%20identify%20a%20critical%20capability%20gap%20in%20existing%20multi-image%20alignment%20approaches%3A%20current%20methods%20focus%20primarily%20on%20localized%20reasoning%20with%20pre-specified%20image%20indices%20%28%60%60Look%20at%20Image%203%20and...%27%27%29%2C%20bypassing%20the%20essential%20skills%20of%20global%20visual%20search%20and%20autonomous%20cross-image%20comparison.%20To%20address%20this%20limitation%2C%20we%20introduce%20a%20Simple-to-Hard%20%28S2H%29%20learning%20framework%20that%20systematically%20constructs%20multi-image%20preference%20data%20across%20three%20hierarchical%20reasoning%20levels%20requiring%20an%20increasing%20level%20of%20capabilities%3A%20%281%29%20single-image%20localized%20reasoning%2C%20%282%29%20multi-image%20localized%20comparison%2C%20and%20%283%29%20global%20visual%20search.%20Unlike%20prior%20work%20that%20relies%20on%20model-specific%20attributes%2C%20such%20as%20hallucinations%20or%20attention%20heuristics%2C%20to%20generate%20preference%20pairs%2C%20our%20approach%20leverages%20prompt-driven%20complexity%20to%20create%20chosen/rejected%20pairs%20that%20are%20applicable%20across%20different%20models.%20Through%20extensive%20evaluations%20on%20LLaVA%20and%20Qwen-VL%20models%2C%20we%20show%20that%20our%20diverse%20multi-image%20reasoning%20data%20significantly%20enhances%20multi-image%20reasoning%20performance%2C%20yielding%20significant%20improvements%20over%20baseline%20methods%20across%20benchmarks.%20Importantly%2C%20our%20approach%20maintains%20strong%20single-image%20reasoning%20performance%20while%20simultaneously%20strengthening%20multi-image%20understanding%20capabilities%2C%20thus%20advancing%20the%20state%20of%20the%20art%20for%20holistic%20visual%20preference%20alignment.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18512v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DS2H-DPO%253A%2520Hardness-Aware%2520Preference%2520Optimization%2520for%2520Vision-Language%2520Models%26entry.906535625%3DNitish%2520Shukla%2520and%2520Surgan%2520Jandial%2520and%2520Arun%2520Ross%26entry.1292438233%3DVision-Language%2520Models%2520%2528VLMs%2529%2520have%2520demonstrated%2520remarkable%2520progress%2520in%2520single-image%2520understanding%252C%2520yet%2520effective%2520reasoning%2520across%2520multiple%2520images%2520remains%2520challenging.%2520We%2520identify%2520a%2520critical%2520capability%2520gap%2520in%2520existing%2520multi-image%2520alignment%2520approaches%253A%2520current%2520methods%2520focus%2520primarily%2520on%2520localized%2520reasoning%2520with%2520pre-specified%2520image%2520indices%2520%2528%2560%2560Look%2520at%2520Image%25203%2520and...%2527%2527%2529%252C%2520bypassing%2520the%2520essential%2520skills%2520of%2520global%2520visual%2520search%2520and%2520autonomous%2520cross-image%2520comparison.%2520To%2520address%2520this%2520limitation%252C%2520we%2520introduce%2520a%2520Simple-to-Hard%2520%2528S2H%2529%2520learning%2520framework%2520that%2520systematically%2520constructs%2520multi-image%2520preference%2520data%2520across%2520three%2520hierarchical%2520reasoning {"title": "LMMs Meet Object-Centric Vision: Understanding, Segmentation, Editing and Generation", "author": "Yuqian Yuan and Wenqiao Zhang and Juekai Lin and Yu Zhong and Mingjian Gao and Binhe Yu and Yunqi Cao and Wentong Li and Yueting Zhuang and Beng Chin Ooi", "abstract": "Large Multimodal Models (LMMs) have achieved remarkable progress in general-purpose vision--language understanding, yet they remain limited in tasks requiring precise object-level grounding, fine-grained spatial reasoning, and controllable visual manipulation. In particular, existing systems often struggle to identify the correct instance, preserve object identity across interactions, and localize or modify designated regions with high precision. Object-centric vision provides a principled framework for addressing these challenges by promoting explicit representations and operations over visual entities, thereby extending multimodal systems from global scene understanding to object-level understanding, segmentation, editing, and generation. This paper presents a comprehensive review of recent advances at the convergence of LMMs and object-centric vision. We organize the literature into four major themes: object-centric visual understanding, object-centric referring segmentation, object-centric visual editing, and object-centric visual generation. We further summarize the key modeling paradigms, learning strategies, and evaluation protocols that support these capabilities. Finally, we discuss open challenges and future directions, including robust instance permanence, fine-grained spatial control, consistent multi-step interaction, unified cross-task modeling, and reliable benchmarking under distribution shift. We hope this paper provides a structured perspective on the development of scalable, precise, and trustworthy object-centric multimodal systems.", "link": "http://arxiv.org/abs/2604.11789v2", "date": "2026-04-20", "relevancy": 3.0449, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.629}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.629}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5689}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LMMs%20Meet%20Object-Centric%20Vision%3A%20Understanding%2C%20Segmentation%2C%20Editing%20and%20Generation&body=Title%3A%20LMMs%20Meet%20Object-Centric%20Vision%3A%20Understanding%2C%20Segmentation%2C%20Editing%20and%20Generation%0AAuthor%3A%20Yuqian%20Yuan%20and%20Wenqiao%20Zhang%20and%20Juekai%20Lin%20and%20Yu%20Zhong%20and%20Mingjian%20Gao%20and%20Binhe%20Yu%20and%20Yunqi%20Cao%20and%20Wentong%20Li%20and%20Yueting%20Zhuang%20and%20Beng%20Chin%20Ooi%0AAbstract%3A%20Large%20Multimodal%20Models%20%28LMMs%29%20have%20achieved%20remarkable%20progress%20in%20general-purpose%20vision--language%20understanding%2C%20yet%20they%20remain%20limited%20in%20tasks%20requiring%20precise%20object-level%20grounding%2C%20fine-grained%20spatial%20reasoning%2C%20and%20controllable%20visual%20manipulation.%20In%20particular%2C%20existing%20systems%20often%20struggle%20to%20identify%20the%20correct%20instance%2C%20preserve%20object%20identity%20across%20interactions%2C%20and%20localize%20or%20modify%20designated%20regions%20with%20high%20precision.%20Object-centric%20vision%20provides%20a%20principled%20framework%20for%20addressing%20these%20challenges%20by%20promoting%20explicit%20representations%20and%20operations%20over%20visual%20entities%2C%20thereby%20extending%20multimodal%20systems%20from%20global%20scene%20understanding%20to%20object-level%20understanding%2C%20segmentation%2C%20editing%2C%20and%20generation.%20This%20paper%20presents%20a%20comprehensive%20review%20of%20recent%20advances%20at%20the%20convergence%20of%20LMMs%20and%20object-centric%20vision.%20We%20organize%20the%20literature%20into%20four%20major%20themes%3A%20object-centric%20visual%20understanding%2C%20object-centric%20referring%20segmentation%2C%20object-centric%20visual%20editing%2C%20and%20object-centric%20visual%20generation.%20We%20further%20summarize%20the%20key%20modeling%20paradigms%2C%20learning%20strategies%2C%20and%20evaluation%20protocols%20that%20support%20these%20capabilities.%20Finally%2C%20we%20discuss%20open%20challenges%20and%20future%20directions%2C%20including%20robust%20instance%20permanence%2C%20fine-grained%20spatial%20control%2C%20consistent%20multi-step%20interaction%2C%20unified%20cross-task%20modeling%2C%20and%20reliable%20benchmarking%20under%20distribution%20shift.%20We%20hope%20this%20paper%20provides%20a%20structured%20perspective%20on%20the%20development%20of%20scalable%2C%20precise%2C%20and%20trustworthy%20object-centric%20multimodal%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11789v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLMMs%2520Meet%2520Object-Centric%2520Vision%253A%2520Understanding%252C%2520Segmentation%252C%2520Editing%2520and%2520Generation%26entry.906535625%3DYuqian%2520Yuan%2520and%2520Wenqiao%2520Zhang%2520and%2520Juekai%2520Lin%2520and%2520Yu%2520Zhong%2520and%2520Mingjian%2520Gao%2520and%2520Binhe%2520Yu%2520and%2520Yunqi%2520Cao%2520and%2520Wentong%2520Li%2520and%2520Yueting%2520Zhuang%2520and%2520Beng%2520Chin%2520Ooi%26entry.1292438233%3DLarge%2520Multimodal%2520Models%2520%2528LMMs%2529%2520have%2520achieved%2520remarkable%2520progress%2520in%2520general-purpose%2520vision--language%2520understanding%252C%2520yet%2520they%2520remain%2520limited%2520in%2520tasks%2520requiring%2520precise%2520object-level%2520grounding%252C%2520fine-grained%2520spatial%2520reasoning%252C%2520and%2520controllable%2520visual%2520manipulation.%2520In%2520p 20multimodal%2520systems.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.11789v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=LMMs%20Meet%20Object-Centric%20Vision%3A%20Understanding%2C%20Segmentation%2C%20Editing%20and%20Generation&entry.906535625=Yuqian%20Yuan%20and%20Wenqiao%20Zhang%20and%20Juekai%20Lin%20and%20Yu%20Zhong%20and%20Mingjian%20Gao%20and%20Binhe%20Yu%20and%20Yunqi%20Cao%20and%20Wentong%20Li%20and%20Yueting%20Zhuang%20and%20Beng%20Chin%20Ooi&entry.1292438233=Large%20Multimodal%20Models%20%28LMMs%29%20have%20achieved%20remarkable%20progress%20in%20general-purpose%20vision--language%20understanding%2C%20yet%20they%20remain%20limited%20in%20tasks%20requiring%20precise%20object-level%20grounding%2C%20fine-grained%20spatial%20reasoning%2C%20and%20controllable%20visual%20manipulation.%20In%20particular%2C%20existing%20systems%20often%20struggle%20to%20identify%20the%20correct%20instance%2C%20preserve%20object%20identity%20across%20interactions%2C%20and%20localize%20or%20modify%20designated%20regions%20with%20high%20precision.%20Object-centric%20vision%20provides%20a%20principled%20framework%20for%20addressing%20these%20challenges%20by%20promoting%20explicit%20representations%20and%20operations%20over%20visual%20entities%2C%20thereby%20extending%20multimodal%20systems%20from%20global%20scene%20understanding%20to%20object-level%20understanding%2C%20segmentation%2C%20editing%2C%20and%20generation.%20This%20paper%20presents%20a%20comprehensive%20review%20of%20recent%20advances%20at%20the%20convergence%20of%20LMMs%20and%20object-centric%20vision.%20We%20organize%20the%20literature%20into%20four%20major%20themes%3A%20object-centric%20visual%20understanding%2C%20object-centric%20referring%20segmentation%2C%20object-centric%20visual%20editing%2C%20and%20object-centric%20visual%20generation.%20We%20further%20summarize%20the%20key%20modeling%20paradigms%2C% {"title": "ToLL: Topological Layout Learning with Asymmetric Cross-View Structural Distillation for 3D Scene Graph Generation Pretraining", "author": "Yucheng Huang and Luping Ji and Xiangwei Jiang and Wen Li and Mao Ye", "abstract": "3D Scene Graph (3DSG) generation plays a pivotal role in spatial understanding and affordance perception. To mitigate generalization issues from data scarcity, joint-embedding and generative proxy tasks are proposed to pre-train 3DSG representations on predicate label-free datasets. Currently, generative pre-training usually bypasses the semantic corruption caused by the geometric augmentations in joint-embedding, but cannot avoid a negative problem ``Geometric Shortcut.\" In this problem, exposing dense object spatial and scale priors will induce models to trivially reconstruct scenes by interpolating object positions, rather than learning the underlying topological constraints provided by edges. To address this issue, we propose a Topological Layout Learning (ToLL) for 3DSG generation pretraining framework. In detail, we design an Anchor-Conditioned Topological Geometry Reasoning. It adopts a recurrent GNN to recover the global layout of zero-centered subgraphs (the non-visible spatial features) by one anchor with sparse spatial prior. Considering the absence of spatial layout information within the objects, it creates an information bottleneck, compelling our model to recover the full scene layout by leveraging predicate representation learning. Moreover, we construct a Structural Multi-view Augmentation to avoid semantic corruption, enhancing 3DSG representations via self-distillation. The extensive experiments on special dataset demonstrate that our ToLL could often improve 3DSG pertaining quality, outperforming state-of-the-art baselines.", "link": "http://arxiv.org/abs/2603.28178v2", "date": "2026-04-20", "relevancy": 3.0262, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http:// %20Anchor-Conditioned%20Topological%20Geometry%20Reasoning.%20It%20adopts%20a%20recurrent%20GNN%20to%20recover%20the%20global%20layout%20of%20zero-centered%20subgraphs%20%28the%20non-visible%20spatial%20features%29%20by%20one%20anchor%20with%20sparse%20spatial%20prior.%20Considering%20the%20absence%20of%20spatial%20layout%20information%20within%20the%20objects%2C%20it%20creates%20an%20information%20bottleneck%2C%20compelling%20our%20model%20to%20recover%20the%20full%20scene%20layout%20by%20leveraging%20predicate%20representation%20learning.%20Moreover%2C%20we%20construct%20a%20Structural%20Multi-view%20Augmentation%20to%20avoid%20semantic%20corruption%2C%20enhancing%203DSG%20representations%20via%20self-distillation.%20The%20extensive%20experiments%20on%20special%20dataset%20demonstrate%20that%20our%20ToLL%20could%20often%20improve%203DSG%20pertaining%20quality%2C%20outperforming%20state-of-the-art%20baselines.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28178v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DToLL%253A%2520Topological%2520Layout%2520Learning%2520with%2520Asymmetric%2520Cross-View%2520Structural%2520Distillation%2520for%25203D%2520Scene%2520Graph%2520Generation%2520Pretraining%26entry.906535625%3DYucheng%2520Huang%2520and%2520Luping%2520Ji%2520and%2520Xiangwei%2520Jiang%2520and%2520Wen%2520Li%2520and%2520Mao%2520Ye%26entry.1292438233%3D3D%2520Scene%2520Graph%2520%25283DSG%2529%2520generation%2520plays%2520a%2520pivotal%2520role%2520in%2520spatial%2520understanding%2520and%2520affordance%2520perception.%2520To%2520mitigate%2520generalization%2520issues%2520from%2520data%2520scarcity%252C%2520joint-embedding%2520and%2520generative%2520proxy%2520tasks%2520are%2520proposed%2520to%2520pre-train%25203DSG%2520representations%2520on%2520predicate%2520label-free%2520datasets.%2520Currently%252C%2520generative%2520pre-training%2520usually%2520bypasses%2520the%2520semantic%2520co {"title": "Geometry-Guided 3D Visual Token Pruning for Video-Language Models", "author": "Han Li and Zehao Huang and Jiahui Fu and Naiyan Wang and Si Liu", "abstract": "Multimodal large language models have demonstrated remarkable capabilities in 2D vision, motivating their extension to 3D scene understanding. Recent studies represent 3D scenes as 3D spatial videos composed of image sequences with depth and camera pose information, enabling pre-trained video-language models to perform 3D reasoning tasks. However, the large number of visual tokens in spatial videos remains a major bottleneck for efficient inference and context management. Existing pruning methods overlook the view consistency of spatial videos and the spatial diversity of the remaining tokens, which prevents them from effectively removing inter-frame redundancy and preserving scene completeness. In this paper, we propose Geo3DPruner, a Geometry-Guided 3D Visual Token Pruning framework. Geo3DPruner first models cross-frame relevance through geometry-aware global attention, and then performs a two-stage pruning process. The intra-voxel stage selects representative multi-view features within each voxel, while the inter-voxel stage preserves spatial diversity by selecting a globally distributed subset of voxels. Extensive experiments on multiple 3D scene understanding benchmarks demonstrate that Geo3DPruner retains over 90% of the original performance while pruning 90% of visual tokens, significantly outperforming existing text-guided and vision-guided pruning methods.", "link": "http://arxiv.org/abs/2604.18260v1", "date": "2026-04-20", "relevancy": 3.0041, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6205}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6205}, {"title": "TAMM: T ing%20benchmarks%20demonstrate%20that%20Geo3DPruner%20retains%20over%2090%25%20of%20the%20original%20performance%20while%20pruning%2090%25%20of%20visual%20tokens%2C%20significantly%20outperforming%20existing%20text-guided%20and%20vision-guided%20pruning%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2604.18260v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeometry-Guided%25203D%2520Visual%2520Token%2520Pruning%2520for%2520Video-Language%2520Models%26entry.906535625%3DHan%2520Li%2520and%2520Zehao%2520Huang%2520and%2520Jiahui%2520Fu%2520and%2520Naiyan%2520Wang%2520and%2520Si%2520Liu%26entry.1292438233%3DMultimodal%2520large%2520language%2520models%2520have%2520demonstrated%2520remarkable%2520capabilities%2520in%25202D%2520vision%252C%2520motivating%2520their%2520extension%2520to%25203D%2520scene%2520understanding.%2520Recent%2520studies%2520represent%25203D%2520scenes%2520as%25203D%2520spatial%2520videos%2520composed%2520of%2520image%2520sequences%2520with%2520depth%2520and%2520camera%2520pose%2520information%252C%2520enabling%2520pre-trained%2520video-language%2520models%2520to%2520perform%25203D%2520reasoning%2520tasks.%2520However%252C%2520the%2520large%2520number%2520of%2520visual%2520tokens%2520in%2520spatial%2520videos%2520remains%2520a%2520major%2520bottleneck%2520for%2520efficient%2520inference%2520and%2520context%2520management.%2520Existing%2520pruning%2520methods%2520overlook%2520the%2520view%2520consistency%2520of%2520spatial%2520videos%2520and%2520the%2520spatial%2520diversity%2520of%2520the%2520remaining%2520tokens%252C%2520which%2520prevents%2520them%2520from%2520effectively%2520removing%2520inter-frame%2520redundancy%2520and%2520preserving%2520scene%2520completeness.%2520In%2520this%2520paper%252C%2520we%2520propose%2520Geo3DPruner%252C%2520a%2520Geometry-Guided%25203D%2520Visual%2520Token%2520Pruning%2520framework.%2520Geo3DPruner%2520first%2520models%2520cross-f {"title": "OmniHuman: A Large-scale Dataset and Benchmark for Human-Centric Video Generation", "author": "Lei Zhu and Xing Cai and Yingjie Chen and Yiheng Li and Binxin Yang and Hao Liu and Jie Chen and Chen Li and Jing LYu", "abstract": "Recent advancements in audio-video joint generation models have demonstrated impressive capabilities in content creation. However, generating high-fidelity human-centric videos in complex, real-world physical scenes remains a significant challenge. We identify that the root cause lies in the structural deficiencies of existing datasets across three dimensions: limited global scene and camera diversity, sparse interaction modeling (both person-person and person-object), and insufficient individual attribute alignment. To bridge these gaps, we present OmniHuman, a large-scale, multi-scene dataset designed for fine-grained human modeling. OmniHuman provides a hierarchical annotation covering video-level scenes, frame-level interactions, and individual-level attributes. To facilitate this, we develop a fully automated pipeline for high-quality data collection and multi-modal annotation. Complementary to the dataset, we establish the OmniHuman Benchmark (OHBench), a three-level evaluation system that provides a scientific diagnosis for human-centric audio-video synthesis. Crucially, OHBench introduces metrics that are highly consistent with human perception, filling the gaps in existing benchmarks by providing a comprehensive diagnosis across global scenes, relational interactions, and individual attributes.", "link": "http://arxiv.org/abs/2604.18326v1", "date": "2026-04-20", "relevancy": 2.9988, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.6478}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.0998

{"title": "Scalable unsupervised feature selection via weight stability", "author": "Xudong Zhang and Renato Cordeiro de Amorim", "abstract": "Unsupervised feature selection is critical for improving clustering performance in high-dimensional data, where irrelevant features can obscure meaningful structure. In this work, we introduce the Minkowski weighted k-means++, a novel initialisation strategy for the Minkowski Weighted k-means. Our initialisation selects centroids probabilistically using feature relevance estimates derived from the data itself. Building on this, we propose two new feature selection algorithms, FS-MWK++, which aggregates feature weights across a range of Minkowski exponents to identify stable and informative features, and SFS-MWK++, a scalable variant based on subsampling. We support our approach with a theoretical analysis, demonstrating that, under explicit assumptions on noise features and cluster structure, relevant features are assigned consistently higher weights than noise features across a range of Minkowski exponents. Our software can be found at https://github.com/xzhang4-ops1/FSMWK.", "link": "http://arxiv.org/abs/2506.06114v4", "date": "2026-04-15", "relevancy": 2.1179, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4473}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4137}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4098}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Scalable%20unsupervised%20feature%20selection%20via%20weight%20stability&body=Title%3A%20Scalable%20unsupervised%20feature%20selection%20via%20weight%20stability%0AAuthor%3A%20Xudong%20Zhang%20and%20Renato%20Cordeiro%20de%20Amorim%0AAbstract%3A%20Unsupervised%20feature%20selection%20is%20critical%20for%20improving%20clustering%20performance%20in%20high-dimensional%20data%2C%20where%20irrelevant%20features%20can%20obscure%20meaningful%20structure.%20In%20this%20work%2C%20we%20introduce%20the%20Minkowski%20weighted%20k-means%2B%2B%2C%20a%20novel%20initialisation%20strategy%20for%20the%20Minkowski%20Weighted%20k-means.%20Our%20initialisation%20selects%20centroids%20probabilistically%20using%20feature%20relevance%20estimates%20derived%20from%20the%20data%20itself.%20Building%20on%20this%2C%20we%20propose%20two%20new%20feature%20selection%20algorithms%2C%20FS-MWK%2B%2B%2C%20which%20aggregates%20feature%20weights%20across%20a%20range%20of%20Minkowski%20exponents%20to%20identify%20stable%20and%20informative%20features%2C%20and%20SFS-MWK%2B%2B%2C%20a%20scalable%20variant%20based%20on%20subsampling.%20We%20support%20our%20approach%20with%20a%20theoretical%20analysis%2C%20demonstrating%20that%2C%20under%20explicit%20assumptions%20on%20noise%20features%20and%20cluster%20structure%2C%20relevant%20features%20are%20assigned%20consistently%20higher%20weights%20than%20noise%20features%20across%20a%20range%20of%20Minkowski%20exponents.%20Our%20software%20can%20be%20found%20at%20https%3A//github.com/xzhang4-ops1/FSMWK.%0ALink%3A%20http%3A//arxiv.org/abs/2506.06114v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DScalable%2520unsupervised%2520feature%2520selection%2520via%2520weight%2520stability%26entry.906535625%3DXudong%2520Zhang%2520and%2520Renato%2520Cordeiro%2520de%2520Amorim%26entry.1292438233%3DUnsupervised%2520feature%2520selection%2520is%2520critical%2520for%2520improving%2520clustering%2520performance%2520in%2520high-dimensional%2520data%252C%2520where%2520irrelevant%2520features%2520can%2520obscure%2520meaningful%2520structure.%2520In%2520this%2520work%252C%2520we%2520introduce%2520the%2520Minkowski%2520weighted%2520k-means%252B%252B%252C%2520a%2520novel%2520initialisation%2520strategy%2520for%2520the%2520Minkowski%2520Weighted%2520k-means.%2520Our%2520initialisation%2520selects%2520centroids%2520probabilistically%2520using%2520feature%2520relevance%2520estimates%2520derived%2520from%2520the%2520data%2520itself.%2520Building%2520on%2520this%252C%2520we%2520propose%2520two%2520new%2520feature%2520selection%2520algorithms%252C%2520FS-MWK%252B%252B%252C%2520which%2520aggregates%2520feature%2520weights%2520across%2520a%2520range%2520of%2520Minkowski%2520exponents%2520to%2520identify%2520stable%2520and%2520informative%2520features%252C%2520and%2520SFS-MWK%252B%252B%252C%2520a%2520scalable%2520variant%2520based%2520on%2520subsampling.%2520We%2520support%2520our%2520approach%2520with%2520a%2520theoretical%2520analysis%252C%2520demonstrating%2520that%252C%2520under%2520explicit%2520assumptions%2520on%2520noise%2520features%2520and%2520cluster%2520structure%252C%2520relevant%2520features%2520are%2520assigned%2520consistently%2520higher%2520weights%2520than%2520noise%2520features%2520across%2520a%2520range%2520of%2520Minkowski%2520exponents.%2520Our%2520software%2520can%2520be%2520found%2520at%2520https%253A//github.com/xzhang4-ops1/FSMWK.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2506.06114v4%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Scalable%20unsupervised%20feature%20selection%20via%20weight%20stability&entry.906535625=Xudong%20Zhang%20and%20Renato%20Cordeiro%20de%20Amorim&entry.1292438233=Unsupervised%20feature%20selection%20is%20critical%20for%20improving%20clustering%20performance%20in%20high-dimensional%20data%2C%20where%20irrelevant%20features%20can%20obscure%20meaningful%20structure.%20In%20this%20work%2C%20we%20introduce%20the%20Minkowski%20weighted%20k-means%2B%2B%2C%20a%20novel%20initialisation%20strategy%20for%20the%20Minkowski%20Weighted%20k-means.%20Our%20initialisation%20selects%20centroids%20probabilistically%20using%20feature%20relevance%20estimates%20derived%20from%20the%20data%20itself.%20Building%20on%20this%2C%20we%20propose%20two%20new%20feature%20selection%20algorithms%2C%20FS-MWK%2B%2B%2C%20which%20aggregates%20feature%20weights%20across%20a%20range%20of%20Minkowski%20exponents%20to%20identify%20stable%20and%20informative%20features%2C%20and%20SFS-MWK%2B%2B%2C%20a%20scalable%20variant%20based%20on%20subsampling.%20We%20support%20our%20approach%20with%20a%20theoretical%20analysis%2C%20demonstrating%20that%2C%20under%20explicit%20assumptions%20on%20noise%20features%20and%20cluster%20structure%2C%20relevant%20features%20are%20assigned%20consistently%20higher%20weights%20than%20noise%20features%20across%20a%20range%20of%20Minkowski%20exponents.%20Our%20software%20can%20be%20found%20at%20https%3A//github.com/xzhang4-ops1/FSMWK.&entry.1838667208=http%3A//arxiv.org/abs/2506.06114v4&entry.124074799=Read"},
{"title": "ASTER: Latent Pseudo-Anomaly Generation for Unsupervised Time-Series Anomaly Detection", "author": "Romain Hermary and Samet Hicsonmez and Dan Pineau and Abd El Rahman Shabayek and Djamila Aouada", "abstract": "Time-series anomaly detection (TSAD) is critical in domains such as industrial monitoring, healthcare, and cybersecurity, but it remains challenging due to rare and heterogeneous anomalies and the scarcity of labelled data. This scarcity makes unsupervised approaches predominant, yet existing methods often rely on reconstruction or forecasting, which struggle with complex data, or on embedding-based approaches that require domain-specific anomaly synthesis and fixed distance metrics. We propose ASTER, a framework that generates pseudo-anomalies directly in the latent space, avoiding handcrafted anomaly injections and the need for domain expertise. A latent-space decoder produces tailored pseudo-anomalies to train a Transformer-based anomaly classifier, while a pre-trained LLM enriches the temporal and contextual representations of this space. Experiments on three benchmark datasets show that ASTER achieves state-of-the-art performance and sets a new standard for LLM-based TSAD.", "link": "http://arxiv.org/abs/2604.13924v1", "date": "2026-04-15", "relevancy": 2.1061, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5334}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5299}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5008}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ASTER%3A%20Latent%20Pseudo-Anomaly%20Generation%20for%20Unsupervised%20Time-Series%20Anomaly%20Detection&body=Title%3A%20ASTER%3A%20Latent%20Pseudo-Anomaly%20Generation%20for%20Unsupervised%20Time-Series%20Anomaly%20Detection%0AAuthor%3A%20Romain%20Hermary%20and%20Samet%20Hicsonmez%20and%20Dan%20Pineau%20and%20Abd%20El%20Rahman%20Shabayek%20and%20Djamila%20Aouada%0AAbstract%3A%20Time-series%20anomaly%20detection%20%28TSAD%29%20is%20critical%20in%20domains%20such%20as%20industrial%20monitoring%2C%20healthcare%2C%20and%20cybersecurity%2C%20but%20it%20remains%20challenging%20due%20to%20rare%20and%20heterogeneous%20anomalies%20and%20the%20scarcity%20of%20labelled%20data.%20This%20scarcity%20makes%20unsupervised%20approaches%20predominant%2C%20yet%20existing%20methods%20often%20rely%20on%20reconstruction%20or%20forecasting%2C%20which%20struggle%20with%20complex%20data%2C%20or%20on%20embedding-based%20approaches%20that%20require%20domain-specific%20anomaly%20synthesis%20and%20fixed%20distance%20metrics.%20We%20propose%20ASTER%2C%20a%20framework%20that%20generates%20pseudo-anomalies%20directly%20in%20the%20latent%20space%2C%20avoiding%20handcrafted%20anomaly%20injections%20and%20the%20need%20for%20domain%20expertise.%20A%20latent-space%20decoder%20produces%20tailored%20pseudo-anomalies%20to%20train%20a%20Transformer-based%20anomaly%20classifier%2C%20while%20a%20pre-trained%20LLM%20enriches%20the%20temporal%20and%20contextual%20representations%20of%20this%20space.%20Experiments%20on%20three%20benchmark%20datasets%20show%20that%20ASTER%20achieves%20state-of-the-art%20performance%20and%20sets%20a%20new%20standard%20for%20LLM-based%20TSAD.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13924v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DASTER%253A%2520Latent%2520Pseudo-Anomaly%2520Generation%2520for%2520Unsupervised%2520Time-Series%2520Anomaly%2520Detection%26entry.906535625%3DRomain%2520Hermary%2520and%2520Samet%2520Hicsonmez%2520and%2520Dan%2520Pineau%2520and%2520Abd%2520El%25 {"title": "DiffMagicFace: Identity Consistent Facial Editing of Real Videos", "author": "Huanghao Yin and Shenkun Xu and Kanle Shi and Junhai Yong and Bin Wang", "abstract": "Text-conditioned image editing has greatly benefitted from the advancements in Image Diffusion Models. However, extending these techniques to facial video editing introduces challenges in preserving facial identity throughout the source video and ensuring consistency of the edited subject across frames. In this paper, we introduce DiffMagicFace, a unique video editing framework that integrates two fine-tuned models for text and image control. These models operate concurrently during inference to produce video frames that maintain identity features while seamlessly aligning with the editing semantics. To ensure the consistency of the edited videos, we develop a dataset comprising images showcasing various facial perspectives for each edited subject. The creation of a data set is achieved through rendering techniques and the subsequent application of optimization algorithms. Remarkably, our approach does not depend on video datasets but still delivers high-quality results in both consistency and content. The excellent effect holds even for complex tasks like talking head videos and distinguishing closely related categories. The videos edited using our framework exhibit parity with videos that are made using traditional rendering software. Through comparative analysis with current state-of-the-art methods, our framework demonstrates superior performance in both visual appeal and quantitative metrics.", "link": "http://arxiv.org/abs/2604.13841v1", "date": "2026-04-15", "relevancy": 2.0954, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.7469}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6581}, {" deos%20edited%20using%20our%20framework%20exhibit%20parity%20with%20videos%20that%20are%20made%20using%20traditional%20rendering%20software.%20Through%20comparative%20analysis%20with%20current%20state-of-the-art%20methods%2C%20our%20framework%20demonstrates%20superior%20performance%20in%20both%20visual%20appeal%20and%20quantitative%20metrics.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13841v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDiffMagicFace%253A%2520Identity%2520Consistent%2520Facial%2520Editing%2520of%2520Real%2520Videos%26entry.906535625%3DHuanghao%2520Yin%2520and%2520Shenkun%2520Xu%2520and%2520Kanle%2520Shi%2520and%2520Junhai%2520Yong%2520and%2520Bin%2520Wang%26entry.1292438233%3DText-conditioned%2520image%2520editing%2520has%2520greatly%2520benefitted%2520from%2520the%2520advancements%2520in%2520Image%2520Diffusion%2520Models.%2520However%252C%2520extending%2520these%2520techniques%2520to%2520facial%2520video%2520editing%2520introduces%2520challenges%2520in%2520preserving%2520facial%2520identity%2520throughout%2520the%2520source%2520video%2520and%2520ensuring%2520consistency%2520of%2520the%2520edited%2520subject%2520across%2520frames.%2520In%2520this%2520paper%252C%2520we%2520introduce%2520DiffMagicFace%252C%2520a%2520unique%2520video%2520editing%2520framework%2520that%2520integrates%2520two%2520fine-tuned%2520models%2520for%2520text%2520and%2520image%2520control.%2520These%2520models%2520operate%2520concurrently%2520during%2520inference%2520to%2520produce%2520video%2520frames%2520that%2520maintain%2520identity%2520features%2520while%2520seamlessly%2520aligning%2520with%2520the%2520editing%2520semantics.%2520To%2520ensure%2520the%2520consistency%2520of%2520the%2520edited%2520videos%252C%2520we%2520develop%2520a%2520dataset%2520comprising%2520images%2520showcasing%2520various%2520facial%2520perspectives%2520for%2520each%2520edited%2520subject.%2520The%2520creation%252 {"title": "Don't Let the Video Speak: Audio-Contrastive Preference Optimization for Audio-Visual Language Models", "author": "Ami Baid and Zihui Xue and Kristen Grauman", "abstract": "While Audio-Visual Language Models (AVLMs) have achieved remarkable progress over recent years, their reliability is bottlenecked by cross-modal hallucination. A particularly pervasive manifestation is video-driven audio hallucination: models routinely exploit visual shortcuts to hallucinate expected sounds, discarding true auditory evidence. To counteract this deeply ingrained visual dominance, we propose Audio-Contrastive Preference Optimization (ACPO). This dual-axis preference learning framework introduces an output-contrastive objective to penalize visual descriptions masquerading as audio facts, alongside an input-contrastive objective that swaps audio tracks to explicitly penalize generation invariant to the true auditory signal. Extensive experiments demonstrate that ACPO establishes highly faithful audio grounding and mitigates audio hallucination without compromising overarching multimodal capabilities.", "link": "http://arxiv.org/abs/2604.14129v1", "date": "2026-04-15", "relevancy": 2.0823, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5274}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5192}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5192}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Don%27t%20Let%20the%20Video%20Speak%3A%20Audio-Contrastive%20Preference%20Optimization%20for%20Audio-Visual%20Language%20Models&body=Title%3A%20Don%27t%20Let%20the%20Video%20Speak%3A%20Audio-Contrastive%20Preference%20Optimization%20for%20Audio-Visual%20Language%20Models%0AAuthor%3A%20Ami%20Baid%20and%20Zihui%20Xue%20and%20Kristen%20Grauman%0AAbstract%3A%20While%20Audio-Visual%20Language%20Models%20%28AVLMs%29%20have%20achieved%20remarkable%20progress%20over%20recent%20years%2C%20their%20reliability%20is%20bottlenecked%20by%20cross-modal%20hallucination.%20A%20particularly%20pervasive%20manifestation%20is%20video-driven%20audio%20hallucination%3A%20models%20routinely%20exploit%20visual%20shortcuts%20to%20hallucinate%20expected%20sounds%2C%20discarding%20true%20auditory%20evidence.%20To%20counteract%20this%20deeply%20ingrained%20visual%20dominance%2C%20we%20propose%20Audio-Contrastive%20Preference%20Optimization%20%28ACPO%29.%20This%20dual-axis%20preference%20learning%20framework%20introduces%20an%20output-contrastive%20objective%20to%20penalize%20visual%20descriptions%20masquerading%20as%20audio%20facts%2C%20alongside%20an%20input-contrastive%20objective%20that%20swaps%20audio%20tracks%20to%20explicitly%20penalize%20generation%20invariant%20to%20the%20true%20auditory%20signal.%20Extensive%20experiments%20demonstrate%20that%20ACPO%20establishes%20highly%20faithful%20audio%20grounding%20and%20mitigates%20audio%20hallucination%20without%20compromising%20overarching%20multimodal%20capabilities.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14129v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDon%2527t%2520Let%2520the%2520Video%2520Speak%253A%2520Audio-Contrastive%2520Preference%2520Optimization%2520for%2520Audio-Visual%2520Language%2520Models%26entry.906535625%3DAmi%2520Baid%2520and%2520Zihui%2520Xue%2520and%2520Kristen%2520Grauman%26entry.1292438233%3DWhile%2520Audio-Visual%2520Language%2520Models%2520%2528AVLMs%2529%2520have%2520achieved%2520remarkable%2520progress%2520over%2520recent%2520years%252C%2520their%2520reliability%2520is%2520bottlenecked%2520by%2520cross-modal%2520hallucination.%2520A%2520particularly%2520pervasive%2520manifestation%2520is%2520video-driven%2520audio%2520hallucination%253A%2520models%2520routinely%2520exploit%2520visual%2520shortcuts%2520to%2520hallucinate%2520expected%2520sounds%252C%2520discarding%2520true%2520auditory%2520evidence.%2520To%2520counteract%2520this%2520deeply%2520ingrained%2520visual%2520dominance%252C%2520we%2520propose%2520Audio-Contrastive%2520Preference%2520Optimization%2520%2528ACPO%2529.%2520This%2520dual-axis%2520preference%2520learning%2520framework%2520introduces%2520an%2520output-contrastive%2520objective%2520to%2520penalize%2520visual%2520descriptions%2520masquerading%2520as%2520audio%2520facts%252C%2520alongside%2520an%2520input-contrastive%2520objective%2520that%2520swaps%2520audio%2520tracks%2520to%2520explicitly%2520penalize%2520generation%2520invariant%2520to%2520the%2520true%2520auditory%2520signal.%2520Extensive%2520experiments%2520demonstrate%2520that%2520ACPO%2520establishes%2520highly%2520faithful%2520audio%2520grounding%2520and%2520mitigates%2520audio%2520hallucination%2520without%2520compromising%2520overarching%2520multimodal%2520capabilities.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.14129v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Don%27t%20Let%20the%20Video%20Speak%3A%20Audio-Contrastive%20Preference%20Optimization%20for%20Audio-Visual%20Language%20Models&entry.906535625=Ami%20Baid%20and%20Zihui%20Xue%20and%20Kristen%20Grauman&entry.1292438233=While%20Audio-Visual%20Language%20Models%20%28AVLMs%29%20have%20achieved%20remarkable%20progress%20over%20recent%20years%2C%20their%20reliability%20is%20bottlenecked%20by%20cross-modal%20hallucination.%20A%20particularly%20pervasive%20manifestation%20is%20video-driven%20audio%20hallucination%3A%20models%20routinely%20exploit%20visual%20shortcuts%20to%20hallucinate%20expected%20sounds%2C%20discarding%20true%20auditory%20evidence.%20To%20counte {"title": "TREX: Automating LLM Fine-tuning via Agent-Driven Tree-based Exploration", "author": "Zerun Ma and Guoqiang Wang and Xinchen Xie and Yicheng Chen and He Du and Bowen Li and Yanan Sun and Wenran Liu and Kai Chen and Yining Li", "abstract": "While Large Language Models (LLMs) have empowered AI research agents to perform isolated scientific tasks, automating complex, real-world workflows, such as LLM training, remains a significant challenge. In this paper, we introduce TREX, a multi-agent system that automates the entire LLM training life-cycle. By orchestrating collaboration between two core modules-the Researcher and the Executor-the system seamlessly performs requirement analysis, open-domain literature and data research, formulation of training strategies, preparation of data recipes, and model training and evaluation. The multi-round experimental process is modeled as a search tree, enabling the system to efficiently plan exploration paths, reuse historical results, and distill high-level insights from iterative trials. To evaluate the capability of automated LLM training, we construct FT-Bench, a benchmark comprising 10 tasks derived from real-world scenarios, ranging from optimizing fundamental model capabilities to enhancing performance on domain-specific tasks. Experimental results demonstrate that the TREX agent consistently optimizes model performance on target tasks.", "link": "http://arxiv.org/abs/2604.14116v1", "date": "2026-04-15", "relevancy": 2.0811, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5311}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5284}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5062}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TREX%3A%20Automating%20LLM%20Fine-tuning%20via%20Agent-Driven%20Tree-based%20Exploration&body=Title%3A%20TREX%3A%20Automating%20LLM%20Fine-tuning%20via%20Agent-Driven%20Tree-based%20Exploration%0AAuthor%3A%20Zerun%20Ma%20and%20Guoqiang%20Wang%20and%20Xinchen%20Xie%20and%20Yicheng%20Chen%20and%20He%20Du%20and%20Bowen%20Li%20and%20Yanan%20Sun%20and%20Wenran%20Liu%20and%20Kai%20Chen%20and%20Yining%20Li%0AAbstract%3A%20While%20Large%20Language%20Models%20%28LLMs%29%20have%20empowered%20AI%20research%20agents%20to%20perform%20isolated%20scientific%20tasks%2C%20automating%20complex%2C%20real-world%20workflows%2C%20such%20as%20LLM%20training%2C%20remains%20a%20significant%20challenge.%20In%20this%20paper%2C%20we%20introduce%20TREX%2C%20a%20multi-agent%20system%20that%20automates%20the%20entire%20LLM%20training%20life-cycle.%20By%20orchestrating%20collaboration%20between%20two%20core%20modules-the%20Researcher%20and%20the%20Executor-the%20system%20seamlessly%20performs%20requirement%20analysis%2C%20open-domain%20literature%20and%20data%20research%2C%20formulation%20of%20training%20strategies%2C%20preparation%20of%20data%20recipes%2C%20and%20model%20training%20and%20evaluation.%20The%20multi-round%20experimental%20process%20is%20modeled%20as%20a%20search%20tree%2C%20enabling%20the%20system%20to%20efficiently%20plan%20exploration%20paths%2C%20reuse%20historical%20results%2C%20and%20distill%20high-level%20insights%20from%20iterative%20trials.%20To%20evaluate%20the%20capability%20of%20automated%20LLM%20training%2C%20we%20construct%20FT-Bench%2C%20a%20benchmark%20comprising%2010%20tasks%20derived%20from%20real-world%20scenarios%2C%20ranging%20from%20optimizing%20fundamental%20model%20capabilities%20to%20enhancing%20performance%20on%20domain-specific%20tasks.%20Experimental%20results%20demonstrate%20that%20the%20TREX%20agent%20consistently%20optimizes%20model%20performance%20on%20target%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2604 {"title": "Character Beyond Speech: Leveraging Role-Playing Evaluation in Audio Large Language Models via Reinforcement Learning", "author": "Dongjie Fu and Fangming Feng and Xize Cheng and Linjun Li and Zhou Zhao and Tao Jin", "abstract": "The rapid evolution of multimodal large models has revolutionized the simulation of diverse characters in speech dialogue systems, enabling a novel interactive paradigm. Character attributes are manifested not only in textual responses but also through vocal features, as speech conveys rich paralinguistic information that is challenging to quantify. This poses significant difficulties in evaluating the character alignment of role-playing agents. To address these challenges, we present RoleJudge, an evaluation framework that leverages audio large language models to systematically assess the alignment between speech and character across multiple modalities and dimensions. Furthermore, we introduce RoleChat, the first voice role-playing evaluation dataset enriched with chain-of-thought reasoning annotations, comprising a diverse set of authentic and LLM-generated speech samples. Utilizing this dataset, we implement a multi-stage training paradigm and incorporate Standard Alignment in reinforcement learning to mitigate reward misalignment during optimization. Experimental results in terms of accuracy and subjective assessment demonstrate that RoleJudge outperforms various baseline models, validating the effectiveness of our multidimensional evaluation framework.", "link": "http://arxiv.org/abs/2604.13804v1", "date": "2026-04-15", "relevancy": 2.0792, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5223}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5223}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5075}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Character%20Beyond%20Speech%3A%20Leveraging%20Role-Playing%20Evaluation%20in%20Audio%20Large%20Language%20Models%20via%20Reinforcement%20Learning&body=Title%3A%20Character%20Beyond%20Speech%3A%20Leveraging%20Role-Playing%20Evaluation%20in%20Audio%20Large%20Language%20Models%20via%20Reinforcement%20Learning%0AAuthor%3A%20Dongjie%20Fu%20and%20Fangming%20Feng%20and%20Xize%20Cheng%20and%20Linjun%20Li%20and%20Zhou%20Zhao%20and%20Tao%20Jin%0AAbstract%3A%20The%20rapid%20evolution%20of%20multimodal%20large%20models%20has%20revolutionized%20the%20simulation%20of%20diverse%20characters%20in%20speech%20dialogue%20systems%2C%20enabling%20a%20novel%20interactive%20paradigm.%20Character%20attributes%20are%20manifested%20not%20only%20in%20textual%20responses%20but%20also%20through%20vocal%20features%2C%20as%20speech%20conveys%20rich%20paralinguistic%20information%20that%20is%20challenging%20to%20quantify.%20This%20poses%20significant%20difficulties%20in%20evaluating%20the%20character%20alignment%20of%20role-playing%20agents.%20To%20address%20these%20challenges%2C%20we%20present%20RoleJudge%2C%20an%20evaluation%20framework%20that%20leverages%20audio%20large%20language%20models%20to%20systematically%20assess%20the%20alignment%20between%20speech%20and%20character%20across%20multiple%20modalities%20and%20dimensions.%20Furthermore%2C%20we%20introduce%20RoleChat%2C%20the%20first%20voice%20role-playing%20evaluation%20dataset%20enriched%20with%20chain-of-thought%20reasoning%20annotations%2C%20comprising%20a%20diverse%20set%20of%20authentic%20and%20LLM-generated%20speech%20samples.%20Utilizing%20this%20dataset%2C%20we%20implement%20a%20multi-stage%20training%20paradigm%20and%20incorporate%20Standard%20Alignment%20in%20reinforcement%20learning%20to%20mitigate%20reward%20misalignment%20during {"title": "Granularity-Aware Transfer for Tree Instance Segmentation in Synthetic and Real Forests", "author": "Pankaj Deoli and Atef Tej and Anmol Ashri and Anandatirtha JS and Karsten Berns", "abstract": "We address the challenge of synthetic-to-real transfer in forestry perception where real data have only coarse Tree labels while synthetic data provide fine-grained trunk/crown annotations. We introduce MGTD, a mixed-granularity dataset with 53k synthetic and 3.6k real images, and a four-stage protocol isolating domain shift and granularity mismatch. Our core contribution is granularity-aware distillation, which transfers structural priors from fine-grained synthetic teachers to a coarse-label student via logit-space merging and mask unification. Experiments show consistent mask AP gains, especially for small/distant trees, establishing a testbed for Sim-Real transfer under label granularity constraints.", "link": "http://arxiv.org/abs/2604.13722v1", "date": "2026-04-15", "relevancy": 2.0741, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5246}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5145}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.514}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Granularity-Aware%20Transfer%20for%20Tree%20Instance%20Segmentation%20in%20Synthetic%20and%20Real%20Forests&body=Title%3A%20Granularity-Aware%20Transfer%20for%20Tree%20Instance%20Segmentation%20in%20Synthetic%20and%20Real%20Forests%0AAuthor%3A%20Pankaj%20Deoli%20and%20Atef%20Tej%20and%20Anmol%20Ashri%20and%20Anandatirtha%20JS%20and%20Karsten%20Berns%0AAbstract%3A%20We%20address%20the%20challenge%20of%20synthetic-to-real%20transfer%20in%20forestry%20perception%20where%20real%20data% {"title": "[Emerging Ideas] Artificial Tripartite Intelligence: A Bio-Inspired, Sensor-First Architecture for Physical AI", "author": "You Rim Choi and Subeom Park and Hyung-Sin Kim", "abstract": "As AI moves from data centers to robots and wearables, scaling ever-larger models becomes insufficient. Physical AI operates under tight latency, energy, privacy, and reliability constraints, and its performance depends not only on model capacity but also on how signals are acquired through controllable sensors in dynamic environments. We present Artificial Tripartite Intelligence (ATI), a bio-inspired, sensor-first architectural contract for physical AI. ATI is tripartite at the systems level: a Brainstem (L1) provides reflexive safety and signal-integrity control, a Cerebellum (L2) performs continuous sensor calibration, and a Cerebral Inference Subsystem spanning L3/L4 supports routine skill selection and execution, coordination, and deep reasoning. This modular organization allows sensor control, adaptive sensing, edge-cloud execution, and foundation model reasoning to co-evolve within one closed-loop architecture, while keeping time-critical sensing and control on device and invoking higher-level inference only when needed. We instantiate ATI in a mobile camera prototype under dynamic lighting and motion. In our routed evaluation (L3-L4 split inference), compared to the default auto-exposure setting, ATI (L1/L2 adaptive sensing) improves end-to-end accuracy from 53.8% to 88% while reducing remote L4 invocations by 43.3%. These results show the value of co-designing sensing and inference for embodied AI.", "link": "http://arxiv.org/abs/2604.13959v1", "date": "2026-04-15", "relevancy": 2.0696, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5678}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link {"title": "Saber: An Efficient Sampling with Adaptive Acceleration and Backtracking Enhanced Remasking for Diffusion Language Model", "author": "Yihong Dong and Zhaoyu Ma and Xue Jiang and Zhiyuan Fan and Jiaru Qian and Yongmin Li and Jianha Xiao and Zhi Jin and Rongyu Cao and Binhua Li and Fei Huang and Yongbin Li and Ge Li", "abstract": "Diffusion language models (DLMs) are emerging as a powerful and promising alternative to the dominant autoregressive paradigm, offering inherent advantages in parallel generation and bidirectional context modeling. However, the performance of DLMs on code generation tasks, which have stronger structural constraints, is significantly hampered by the critical trade-off between inference speed and output quality. We observed that accelerating the code generation process by reducing the number of sampling steps usually leads to a catastrophic collapse in performance. In this paper, we introduce efficient Sampling with Adaptive acceleration and Backtracking Enhanced Remasking (i.e., Saber), a novel training-free sampling algorithm for DLMs to achieve better inference speed and output quality in code generation. Specifically, Saber is motivated by two key insights in the DLM generation process: 1) it can be adaptively accelerated as more of the code context is established; 2) it requires a backtracking mechanism to reverse the generated tokens. Extensive experiments on multiple mainstream code generation benchmarks show that Saber boosts Pass@1 accuracy by an average improvement of 1.9% over mainstream DLM sampling methods, meanwhile achieving an average 251.4% inference speedup. By leveraging the inherent advantages of DLMs, our work significantly narrows the performance gap with autoregressive models in code generation.", "link": "http://arxiv.org/abs/2510.18165v2", "date": "2026-04-15", "relevancy": 2.0689, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5553}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5278}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4914}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Saber%3A%20An%20Efficient%20Sampling%20with%20Adaptive%20Acceleration%20and%20Backtracking%20Enhanced%20Remasking%20for%20Diffusion%20Language%20Model&body=Title%3A%20Saber%3A%20An%20Efficient%20Sampling%20with%20Adaptive%20Acceleration%20and%20Backtracking%20Enhanced%20Remasking%20for%20Diffusion%20Language%20Model%0AAuthor%3A%20Yihong%20Dong%20and%20Zhaoyu%20Ma%20and%20Xue%20Jiang%20and%20Zhiyuan%20Fan%20and%20Jiaru%20Qian%20and%20Yongmin%20Li%20and%20Jianha%20Xiao%20and%20Zhi%20Jin%20and%20Rongyu%20Cao%20and%20Binhua%20Li%20and%20Fei%20Huang%20and%20Yongbin%20Li%20and%20Ge%20Li%0AAbstract%3A%20Diffusion%20language%20models%20%28DLMs%29%20are%20emerging%20as%20a%20powerful%20and%20promising%20alternative%20to%20the%20dominant%20autoregressive%20paradigm%2C%20offering%20inherent%20advantages%20in%20parallel%20generation%20and%20bidirectional%20context%20modeling.%20However%2C%20the%20performance%20of%20DLMs%20on%20code%20generation%20tasks%2C%20which%20have%20stronger%20structural%20constraints%2C%20is%20significantly%20hampered%20by%20the%20critical%20trade-off%20between%20inference%20speed%20and%20output%20quality.%20We%20observed%20that%20accelerating%20the%20code%20generation%20process%20by%20reducing%20the%20number%20of%20sampling%20steps%20usually%20leads%20to%20a%20catastrophic%20collapse%20in%20performance.%20In%20this%20paper%2C%20we%20introduce%20efficient%20Sampling%20with%20Adaptive%20acceleration%20and%20Backtracking%20Enhanced%20Remasking%20%28i.e.%2C%20Saber%29%2C%20a%20novel%20training-free%20sampling%20algorithm%20for%20DLMs%20to%20achieve%20better%20inference%20speed%20and%20output%20quality%20in%20code%20generation.%20Specifically%2C%20Saber%20is%20motivated%20by%20two%20key%20insights%20in%20the%20DLM%20generation%20process%3A%201%29%20it%20can%20be%20adaptively%20accelerated%20as%20more%20of%20the%20code%20context%20is%20established%3B%202%29%20it%20requires%20a%20backtracking%20mechanism%20to%20reverse%20the%20generated%20tokens.%20Extensive%20experiments%20on%20multiple%20mainstream%20code%20generation%20benchmarks%20show%20that%20Saber%20boosts%20Pass%401%20accuracy%20by%20an%20average%20improvement%20of%201.9%25%20over%20mainstream%20DLM%20sampling%20methods%2C%20meanwhile%20achieving%20an%20average%20251.4%25%20inference%20speedup.%20By%20leveraging%20the%20inherent%20advantages%20of%20DLMs%2C%20our%20work%20significantly%20narrows%20the%20performance%20gap%20with%20autoregressive%20models%20in%20code%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2510.18165v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSaber%253A%2520An%2520Efficient%2520Sampling%2520with%2520Adaptive%2520Acceleration%2520and%2520Backtracking%2520Enhanced%2520Remasking%2520for%2520Diffusion%2520Language%2520Model%26entry.906535625%3DYihong%2520Dong%2520and%2520Zhaoyu%2520Ma%2520and%2520Xue%2520Jiang%2520and%2520Zhiyuan%2520Fan%2520and%2520Jiaru%2520Qian%2520and%2520Yongmin%2520Li%2520and%2520Jianha%2520Xiao%2520and%2520Zhi%2520Jin%2520and%2520Rongyu%2520Cao%2520and%2520Binhua%2520Li%2520and%2520Fei%2520Huang%2520and%2520Yongbin%2520Li%2520and%2520Ge%2520Li%26entry.1292438233%3DDiffusion%2520language%2520models%2520%2528DLMs%2529%2520are%2520emerging%2520as%2520a%2520powerful%2520and%2520promising%2520alternative%2520to%2520the%2520dominant%2520autoregressive%2520paradigm%252C%2520offering%2520inherent%2520advantages%2520in%2520parallel%2520generation%2520and%2520bidirectional%2520context%2520modeling. {"title": "$\u03c0$-Play: Multi-Agent Self-Play via Privileged Self-Distillation without External Data", "author": "Yaocheng Zhang and Yuanheng Zhu and Wenyue Chong and Songjun Tu and Qichao Zhang and Jiajun Chai and Xiaohan Wang and Wei Lin and Guojun Yin and Dongbin Zhao", "abstract": "Deep search agents have emerged as a promising paradigm for addressing complex information-seeking tasks, but their training remains challenging due to sparse rewards, weak credit assignment, and limited labeled data. Self-play offers a scalable route to reduce data dependence, but conventional self-play optimizes students only through sparse outcome rewards, leading to low learning efficiency. In this work, we observe that self-play naturally produces a question construction path (QCP) during task generation, an intermediate artifact that captures the reverse solution process. This reveals a new source of privileged information for self-distillation: self-play can itself provide high-quality privileged context for the teacher model in a low-cost and scalable manner, without relying on human feedback or curated privileged information. Leveraging this insight, we propose Privileged Information Self-Play ($\u03c0$-Play), a multi-agent self-evolution framework. In $\u03c0$-Play, an examiner generates tasks together with their QCPs, and a teacher model leverages QCP as privileged context to densely supervise a student via self-distillation. This design transforms conventional sparse-reward self-play into a dense-feedback self-evolution loop. Extensive experiments show that data-free $\u03c0$-Play surpasses fully supervised search agents and improves evolutionary efficiency by 2-3$\\times$ over conventional self-play.", "link": "http://arxiv.org/abs/2604.14054v1", "date": "2026-04-15", "relevancy": 2.0596, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5431}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5122}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4877}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20%24%CF%80%24-Play%3A%20Multi-Agent%20Self-Play%20via%20Privileged%20Self-Distillation%20without%20External%20Data&body=Title%3A%20%24%CF%80%24-Play%3A%20Multi-Agent%20Self-Play%20via%20Privileged%20Self-Distillation%20without%20External%20Data%0AAuthor%3A%20Yaocheng%20Zhang%20and%20Yuanheng%20Zhu%20and%20Wenyue%20Chong%20and%20Songjun%20Tu%20and%20Qichao%20Zhang%20and%20Jiajun%20Chai%20and%20Xiaohan%20Wang%20and%20Wei%20Lin%20and%20Guojun%20Yin%20and%20Dongbin%20Zhao%0AAbstract%3A%20Deep%20search%20agents%20have%20emerged%20as%20a%20promising%20paradigm%20for%20addressing%20complex%20information-seeking%20tasks%2C%20but%20their%20training%20remains%20challenging%20due%20to%20sparse%20rewards%2C%20weak%20credit%20assignment%2C%20and%20limited%20labeled%20data.%20Self-play%20offers%20a%20scalable%20route%20to%20reduce%20data%20dependence%2C%20but%20conventional%20self-play%20optimizes%20students%20only%20through%20sparse%20outcome%20rewards%2C%20leading%20to%20low%20learning%20efficiency.%20In%20this%20work%2C%20we%20observe%20that%20self-play%20naturally%20produces%20a%20question%20construction%20path%20%28QCP%29%20during%20task%20generation%2C%20an%20intermediate%20artifact%20that%20captures%20the%20reverse%20solution%20process.%20This%20reveals%20a%20new%20source%20of%20privileged%20information%20for%20self-distillation%3A%20self-play%20can%20itself%20provide%20high-quality%20privileged%20context%20for%20the%20teacher%20model%20in%20a%20low-cost%20and%20scalable%20manner%2C%20without%20relying%20on%20human%20feedback%20or%20curated%20privileged%20information.%20Leveraging%20this%20insight%2C%20we%20propose%20Privileged%20Information%20Self-Play%20%28%24%CF%80%24-Play%29%2C%20a%20multi-agent%20self-evolution%20framework.%20In%20%24%CF%80%24-Play%2C%20an%20examiner%20generates%20tasks%20together%20with%20their%20QCPs%2C%20and%20a%20teacher%20model%20leverages%20QCP%20as%20privileged%20context%20to%20densely%20supervise%20a%20student%20via%20self-distillation.%20This%20design%20transforms%20conventional%20sparse-reward%20self-play%20into%20a%20dense-feedback%20self-evolution%20loop.%20Extensive%20experiments%20show%20that%20data-free%20%24%CF%80%24-Play%20surpasses%20fully%20supervised%20search%20agents%20and%20improves%20evolutionary%20efficiency%20by%202-3%24%5Ctimes%24%20over%20conventional%20self-play.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14054v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D%2524%25CF%2580%2524-Play%253A%2520Multi-Agent%2520Self-Play%2520via%2520Privileged%2520Self-Distillation%2520without%2520External%2520Data%26entry.906535625%3DYaocheng%2520Zhang%2520and%2520Yuanheng%2520Zhu%2520and%2520Wenyue%2520Chong%2520and%2520Songjun%2520Tu%2520and%2520Qichao%2520Zhang%2520and%2520Jiajun%2520Chai%2520and%2520Xiaohan%2520Wang%2520and%2520Wei%2520Lin%2520and%2520Guojun%2520Yin%2520and%2520Dongbin%2520Zhao%26entry.1292438233%3DDeep%2520search%2520agents%2520have%2520emerged%2520as%2520a%2520promising%2520paradigm%2520for%2520addressing%2520complex%2520information-seeking%2520tasks%252C%2520but%2520their%2520training%2520remains%2520challenging%2520due%2520to%2520sparse%2520rewards%252C%2520weak%2520credit%2520assignment%252C%2520and%2520limited%2520labeled%2520data.%2520Self-play%2520offers%2520a%2520scalable%2520route%2520to%2520reduce%2520data%2520dependence%252C%2520but%2520conventional%2520self-play%2520optimizes%2520students%2520only%2520through%2520sparse%2520outcome%2520rewards%252C%2520leading%2520to%2520low%2520learning%2520efficiency.%2520In%2520this%2520work%252C%2520we%2520observe%25 {"title": "EmbodiedClaw: Conversational Workflow Execution for Embodied AI Development", "author": "Xueyang Zhou and Yihan Sun and Xijie Gong and Guiyao Tie and Pan Zhou and Lichao Sun and Yongchao Chen", "abstract": "Embodied AI research is increasingly moving beyond single-task, single-environment policy learning toward multi-task, multi-scene, and multi-model settings. This shift substantially increases the engineering overhead and development time required for stages such as evaluation environment construction, trajectory collection, model training, and evaluation. To address this challenge, we propose a new paradigm for embodied AI development in which users express goals and constraints through conversation, and the system automatically plans and executes the development workflow. We instantiate this paradigm with EmbodiedClaw, a conversational agent that turns high-frequency, high-cost embodied research activities, including environment creation and revision, benchmark transformation, trajectory synthesis, model evaluation, and asset expansion, into executable skills. Experiments on end-to-end workflow tasks, capability-specific evaluations, human researcher studies, and ablations show that EmbodiedClaw reduces manual engineering effort while improving executability, consistency, and reproducibility. These results suggest a shift from manual toolchains to conversationally executable workflows for embodied AI development.", "link": "http://arxiv.org/abs/2604.13800v1", "date": "2026-04-15", "relevancy": 1.4686, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5615}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4856}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4623}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EmbodiedClaw%3A%20Conversational%20Workflow%20Execution%20for%20Embodied%20AI%20Development&body=Title%3A%20EmbodiedClaw%3A%20Conversational%20Workflow%20Execution%20for%20Embodied%20AI%20Development%0AAuthor%3A%20Xueyang%20Zhou%20and%20Yihan%20Sun%20and%20Xijie%20Gong%20and%20Guiyao%20Tie%20and%20Pan%20Zhou%20and%20Lichao%20Sun%20and%20Yongchao%20Chen%0AAbstract%3A%20Embodied%20AI%20research%20is%20increasingly%20moving%20beyond%20single-task%2C%20single-environment%20policy%20learning%20toward%20multi-task%2C%20multi-scene%2C%20and%20multi-model%20settings.%20This%20shift%20substantially%20increases%20the%20engineering%20overhead%20and%20development%20time%20required%20for%20stages%20such%20as%20evaluation%20environment%20construction%2C%20trajectory%20collection%2C%20model%20training%2C%20and%20evaluation.%20To%20address%20this%20challenge%2C%20we%20propose%20a%20new%20paradigm%20for%20embodied%20AI%20development%20in%20which%20users%20express%20goals%20and%20constraints%20through%20conversation%2C%20and%20the%20system%20automatically%20plans%20and%20executes%20the%20development%20workflow.%20We%20instantiate%20this%20paradigm%20with%20EmbodiedClaw%2C%20a%20conversational%20agent%20that%20turns%20high-frequency%2C%20high-cost%20embodied%20research%20activities%2C%20including%20environment%20creation%20and%20revision%2C%20benchmark%20transformation%2C%20trajectory%20synthesis%2C%20model%20evaluation%2C%20and%20asset%20expansion%2C%20into%20executable%20skills.%20Experiments%20on%20end-to-end%20workflow%20tasks%2C%20capability-specific%20evaluations%2C%20human%20researcher%20studies%2C%20and%20ablations%20show%20that%20EmbodiedClaw%20reduces%20manual%20engineering%20effort%20while%20improving%20executability%2C%20consistency%2C%20and%20reproducibility.%20These%20results%20suggest%20a%20shift%20from%20manual%20toolchains%20to%20conversationally%20executable%20workflows%20for%20embodied%20AI%20development.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13800v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEmbodiedClaw%253A%2520Conversational%2520Workflow%2520Execution%2520for%2520Embodied%2520AI%2520Development%26entry.906535625%3DXueyang%2520Zhou%2520and%2520Yihan%2520Sun%2520and%2520Xijie%2520Gong%2520and%2520Guiyao%2520Tie%2520and%2520Pan%2520Zhou%2520and%2520Lichao%2520Sun%2520and%2520Yongchao%2520Chen%26entry.1292438233%3DEmbodied%2520AI%2520research%2520is%2520increasingly%2520moving%2520beyond%2520single-task%252C%2520single-environment%2520policy%2520learning%2520toward%2520multi-task%252C%2520multi-scene%252C%2520and%2520multi-model%2520settings.%2520This%2520shift%2520substantially%2520increases%2520the%2520engineering%2520overhead%2520and%2520development%2520time%2520required%2520for%2520stages%2520such%2520as%2520evaluation%2520environment%2520construction%252C%2520trajectory%2520collection%252C%2520model%2520training%252C%2520and%2520evaluation.%2520To%2520address%2520this%2520challenge%252C%2520we%2520propose%2520a%2520new%2520paradigm%2520for%2520embodied%2520AI%2520development%2520in%2520which%2520users%2520express%2520goals%2520and%2520constraints%2520through%2520conversation%252C%2520and%2520the%2520system%2520automatically%2520plans%2520and%2520executes%2520the%2520development%2520workflow.%2520We%2520instantiate%2520this%2520paradigm%2520with%2520EmbodiedClaw%252C%2520a%2520conversational%2520agent%2520that%2520turns%2520high-frequency%252C%2520high-cost%2520embodied%2520research%2520activities%252C%2520including%2520environment%2520creation%2520and%2520revision%252C%2520benchmark%2520transformation%252C%2520trajectory%2520synthesis%252C%2520model%2520evaluation%252C%2520and%2520asset%2520expansion%252C%2520into%2520executable%2520skills.%2520Experiments%2520on%2520end-to-end%2520workflow%2520tasks%2 {"title": "DBMF: A Dual-Branch Multimodal Framework for Out-of-Distribution Detection", "author": "Jiangbei Yue and Darren Treanor and Venkataraman Subramanian and Sharib Ali", "abstract": "The complex and dynamic real-world clinical environment demands reliable deep learning (DL) systems. Out-of-distribution (OOD) detection plays a critical role in enhancing the reliability and generalizability of DL models when encountering data that deviate from the training distribution, such as unseen disease cases. However, existing OOD detection methods typically rely either on a single visual modality or solely on image-text matching, failing to fully leverage multimodal information. To overcome the challenge, we propose a novel dual-branch multimodal framework by introducing a text-image branch and a vision branch. Our framework fully exploits multimodal representations to identify OOD samples through these two complementary branches. After training, we compute scores from the text-image branch ($S_t$) and vision branch ($S_v$), and integrate them to obtain the final OOD score $S$ that is compared with a threshold for OOD detection. Comprehensive experiments on publicly available endoscopic image datasets demonstrate that our proposed framework is robust across diverse backbones and improves state-of-the-art performance in OOD detection by up to 24.84%", "link": "http://arxiv.org/abs/2604.08261v2", "date": "2026-04-15", "relevancy": 1.6648, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5692}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5417}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5324}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DBMF%3A%20A%20Dual-Branch%20Multimodal%20Framework%20for%20Out-of-Distribution%20Detection&body=Title%3A%20DBMF%3A%20A%20Dual-Branch%20Multimodal%20Framework%20for%20Out-of-Distribution%20Detection%0AAuthor%3A%20Jiangbei%20Yue%20and%20Darren%20Treanor%20and%20Venkataraman%20Subramanian%20and%20Sharib%20Ali%0AAbstract%3A%20The%20complex%20and%20dynamic%20real-world%20clinical%20environment%20demands%20reliable%20deep%20learning%20%28DL%29%20systems.%20Out-of-distribution%20%28OOD%29%20detection%20plays%20a%20critical%20role%20in%20enhancing%20the%20reliability%20and%20generalizability%20of%20DL%20models%20when%20encountering%20data%20that%20deviate%20from%20the%20training%20distribution%2C%20such%20as%20unseen%20disease%20cases.%20However%2C%20existing%20OOD%20detection%20methods%20typically%20rely%20either%20on%20a%20single%20visual%20modality%20or%20solely%20on%20image-text%20matching%2C%20failing%20to%20fully%20leverage%20multimodal%20information.%20To%20overcome%20the%20challenge%2C%20we%20propose%20a%20novel%20dual-branch%20multimodal%20framework%20by%20introducing%20a%20text-image%20branch%20and%20a%20vision%20branch.%20Our%20framework%20fully%20exploits%20multimodal%20representations%20to%20identify%20OOD%20samples%20through%20these%20two%20complementary%20branches.%20After%20training%2C%20we%20compute%20scores%20from%20the%20text-image%20branch%20%28%24S_t%24%29%20and%20vision%20branch%20%28%24S_v%24%29%2C%20and%20integrate%20them%20to%20obtain%20the%20final%20OOD%20score%20%24S%24%20that%20is%20compared%20with%20a%20threshold%20for%20OOD%20detection.%20Comprehensive%20experiments%20on%20publicly%20available%20endoscopic%20image%20datasets%20demonstrate%20that%20our%20proposed%20framework%20is%20robust%20across%20diverse%20backbones%20and%20improves%20state-of-the-art%20performance%20in%20OOD%20detection%20by%20up%20to%2024.84%25%0ALink%3A%20http%3A//arxiv.org/abs/2604.08261v2%0AForm%3A%20https%3A//docs.google.com/for {"title": "HAMLET: Switch your Vision-Language-Action Model into a History-Aware Policy", "author": "Myungkyu Koo and Daewon Choi and Taeyoung Kim and Kyungmin Lee and Changyeon Kim and Younggyo Seo and Jinwoo Shin", "abstract": "Inherently, robotic manipulation tasks are history-dependent: leveraging past context could be beneficial. However, most existing Vision-Language-Action models (VLAs) have been designed without considering this aspect, i.e., they rely solely on the current observation, ignoring preceding context. In this paper, we propose HAMLET, a scalable framework to adapt VLAs to attend to the historical context during action prediction. Specifically, we introduce moment tokens that compactly encode perceptual information at each timestep. Their representations are initialized with time-contrastive learning, allowing them to better capture temporally distinctive aspects. Next, we employ a lightweight memory module that integrates the moment tokens across past timesteps into memory features, which are then leveraged for action prediction. Through empirical evaluation, we show that HAMLET successfully transforms a state-of-the-art VLA into a history-aware policy, especially demonstrating significant improvements on long-horizon tasks that require historical context. In particular, on top of GR00T N1.5, HAMLET achieves an average success rate of 76.4% on history-dependent real-world tasks, surpassing the baseline performance by 47.2%. Furthermore, HAMLET pushes prior art performance from 64.1% to 66.4% on RoboCasa Kitchen (100-demo setup) and from 95.6% to 97.7% on LIBERO, highlighting its effectiveness even under generic robot-manipulation benchmarks.", "link": "http://arxiv.org/abs/2510.00695v3", "date": "2026-04-15", "relevancy": 1.5996, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5715}, {"title": "You've Got to Feel It into%20a%20history-aware%20policy%2C%20especially%20demonstrating%20significant%20improvements%20on%20long-horizon%20tasks%20that%20require%20historical%20context.%20In%20particular%2C%20on%20top%20of%20GR00T%20N1.5%2C%20HAMLET%20achieves%20an%20average%20success%20rate%20of%2076.4%25%20on%20history-dependent%20real-world%20tasks%2C%20surpassing%20the%20baseline%20performance%20by%2047.2%25.%20Furthermore%2C%20HAMLET%20pushes%20prior%20art%20performance%20from%2064.1%25%20to%2066.4%25%20on%20RoboCasa%20Kitchen%20%28100-demo%20setup%29%20and%20from%2095.6%25%20to%2097.7%25%20on%20LIBERO%2C%20highlighting%20its%20effectiveness%20even%20under%20generic%20robot-manipulation%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2510.00695v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHAMLET%253A%2520Switch%2520your%2520Vision-Language-Action%2520Model%2520into%2520a%2520History-Aware%2520Policy%26entry.906535625%3DMyungkyu%2520Koo%2520and%2520Daewon%2520Choi%2520and%2520Taeyoung%2520Kim%2520and%2520Kyungmin%2520Lee%2520and%2520Changyeon%2520Kim%2520and%2520Younggyo%2520Seo%2520and%2520Jinwoo%2520Shin%26entry.1292438233%3DInherently%252C%2520robotic%2520manipulation%2520tasks%2520are%2520history-dependent%253A%2520leveraging%2520past%2520context%2520could%2520be%2520beneficial.%2520However%252C%2520most%2520existing%2520Vision-Language-Action%2520models%2520%2528VLAs%2529%2520have%2520been%2520designed%2520without%2520considering%2520this%2520aspect%252C%2520i.e.%252C%2520they%2520rely%2520solely%2520on%2520the%2520current%2520observation%252C%2520ignoring%2520preceding%2520context.%2520In%2520this%2520paper%252C%2520we%2520propose%2520HAMLET%252C%2520a%2520scalable%2520framework%2520to%2520adapt%2520VLAs%2520to%2520attend%2520to%2520the%2520historical%2520context%2520during%2520action%2520prediction.%2520Specifically%252C%2520we%2520introduce%2520moment%2520tokens%2520that%2520compactly {"title": "Sentiment analysis for software engineering: How far can zero-shot learning (ZSL) go?", "author": "Reem Alfayez and Manal Binkhonain", "abstract": "Sentiment analysis in software engineering focuses on understanding emotions expressed in software artifacts. Previous research highlighted the limitations of applying general off-the-shelf sentiment analysis tools within the software engineering domain and indicated the need for specialized tools tailored to various software engineering contexts. The development of such tools heavily relies on supervised machine learning techniques that necessitate annotated datasets. Acquiring such datasets is a substantial challenge, as it requires domain-specific expertise and significant effort. Objective: This study explores the potential of ZSL to address the scarcity of annotated datasets in sentiment analysis within software engineering Method:} We conducted an empirical experiment to evaluate the performance of various ZSL techniques, including embedding-based, NLI-based, TARS-based, and generative-based ZSL techniques. We assessed the performance of these techniques under different labels setups to examine the impact of label configurations. Additionally, we compared the results of the ZSL techniques with state-of-the-art fine-tuned transformer-based models. Finally, we performed an error analysis to identify the primary causes of misclassifications. Results: Our findings demonstrate that ZSL techniques, particularly those combining expert-curated labels with embedding-based or generative-based models, can achieve macro-F1 scores comparable to fine-tuned transformer-based models. The error analysis revealed that subjectivity in annotation and polar facts are the main contributors to ZSL misclassifications. Conclusion: This study demonstrates the potential of ZSL for sentiment analysis in software engineering. ZSL can provide a solution to the challenge of annotated dataset scarcity by reducing reliance on annotated dataset.", "link": "http://arxiv.org/abs/2604.13826v1", "date": "2026-04-15", "relevancy": 1.8447, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4759}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4582}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4582}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sentiment%20analysis%20for%20software%20engineering%3A%20How%20far%20can%20zero-shot%20learning%20%28ZSL%29%20go%3F&body=Title%3A%20Sentiment%20analysis%20for%20software%20engineering%3A%20How%20far%20can%20zero-shot%20learning%20%28ZSL%29%20go%3F%0AAuthor%3A%20Reem%20Alfayez%20and%20Manal%20Binkhonain%0AAbstract%3A%20Sentiment%20analysis%20in%20software%20engineering%20focuses%20on%20understanding%20emotions%20expressed%20in%20software%20artifacts.%20Previous%20research%20highlighted%20the%20limitations%20of%20applying%20general%20off-the-shelf%20sentiment%20analysis%20tools%20within%20the%20software%20engineering%20domain%20and%20indicated%20the%20need%20for%20specialized%20tools%20tailored%20to%20various%20software%20engineering%20contexts.%20The%20development%20of%20such%20tools%20heavily%20relies%20on%20supervised%20machine%20learning%20techniques%20that%20necessitate%20annotated%20datasets.%20Acquiring%20such%20datasets%20is%20a%20substantial%20challenge%2C%20as%20it%20requires%20domain-specific%20expertise%20and%20significant%20effort.%20Objective%3A%20This%20study%20explores%20the%20potential%20of%20ZSL%20to%20address%20the%20scarcity%20of%20annotated%20datasets%20in%20sentiment%20analysis%20within%20software%20engineering%20Method%3A%7D%20We%20conducted%20an%20empirical%20experiment%20to%20evaluate% {"title": "A Resource-Efficient Hybrid CNN-LSTM network for image-based bean leaf disease classification", "author": "Hye Jin Rhee and Joseph Damilola Akinyemi", "abstract": "Accurate and resource-efficient automated diagnosis is a cornerstone of modern agricultural expert systems. While Convolutional Neural Networks (CNNs) have established benchmarks in plant pathology, their ability to capture long-range spatial dependencies is often limited by standard pooling layers, and their high memory footprint hinders deployment on portable devices. This paper proposes a lightweight hybrid CNN-LSTM system for bean leaf disease classification. By integrating an LSTM layer to model the spatial-sequential relationships within feature maps, our hybrid architecture achieves a 94.38% accuracy while maintaining an exceptionally small footprint of 1.86 MB; a 70% reduction in size compared to traditional CNN-based systems. Furthermore, we provide a systematic evaluation of image augmentation strategies, demonstrating that tailored transformations are superior to generic combinations for maintaining the integrity of diagnostic patterns. Results on the $\\textit{ibean}$ dataset confirm that the proposed system achieves state-of-the-art F1 scores of 99.22% with EfficientNet-B7+LSTM, providing a robust and scalable framework for real-time agricultural decision support in resource-constrained environments. The code and augmented datasets used in this study are publicly available on this $\\href{https://github.com/HJin-R/bean_disease}{Github}$ repo.", "link": "http://arxiv.org/abs/2604.13835v1", "date": "2026-04-15", "relevancy": 1.9435, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5039}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4751}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4721}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Resource-Efficient%20Hybrid%20CNN-LSTM%20network%20for%20image-based%20bean%20leaf%20disease%20classification&body=Title%3A%20A%20Resource-Efficient%20Hybrid%20CNN-LSTM%20network%20for%20image-based%20bean%20leaf%20disease%20classification%0AAuthor%3A%20Hye%20Jin%20Rhee%20and%20Joseph%20Damilola%20Akinyemi%0AAbstract%3A%20Accurate%20and%20resource-efficient%20automated%20diagnosis%20is%20a%20cornerstone%20of%20modern%20agricultural%20expert%20systems.%20While%20Convolutional%20Neural%20Networks%20%28CNNs%29%20have%20established%20benchmarks%20in%20plant%20pathology%2C%20their%20ability%20to%20capture%20long-range%20spatial%20dependencies%20is%20often%20limited%20by%20standard%20pooling%20layers%2C%20and%20their%20high%20memory%20footprint%20hinders%20deployment%20on%20portable%20devices.%20This%20paper%20proposes%20a%20lightweight%20hybrid%20CNN-LSTM%20system%20for%20bean%20leaf%20disease%20classification.%20By%20integrating%20an%20LSTM%20layer%20to%20model%20the%20spatial-sequential%20relationships%20within%20feature%20maps%2C%20our%20hybrid%20architecture%20achieves%20a%2094.38%25%20accuracy%20while%20maintaining%20an%20exceptionally%20small%20footprint%20of%201.86%20MB%3B%20a%2070%25%20reduction%20in%20size%20compared%20to%20traditional%20CNN-based%20systems.%20Furthermore%2C%20we%20provide%20a%20systematic%20evaluation%20of%20image%20augmentation%20strategies%2C%20demonstrating%20that%20tailored%20transformations%20are%20superior%20to%20generic%20combinations%20for%20maintaining%20the%20integrity%20of%20diagnostic%20patterns.%20Results%20on%20the%20%24%5Ctextit%7Bibean%7D%24%20dataset%20confirm%20that%20the%20proposed%20system%20achieves%20state-of-the-art%20F1%20scores%20of%2099.22%25%20with%20EfficientNet-B7%2BLSTM%2C%20providing%20a%20robust%20and%20scalable%20framework%20for%20real- ps%2C%20our%20hybrid%20architecture%20achieves%20a%2094.38%25%20accuracy%20while%20maintaining%20an%20exceptionally%20small%20footprint%20of%201.86%20MB%3B%20a%2070%25%20reduction%20in%20size%20compared%20to%20traditional%20CNN-based%20systems.%20Furthermore%2C%20we%20provide%20a%20systematic%20evaluation%20of%20image%20augmentation%20strategies%2C%20demonstrating%20that%20tailored%20transformations%20are%20superior%20to%20generic%20combinations%20for%20maintaining%20the%20integrity%20of%20diagnostic%20patterns.%20Results%20on%20the%20%24%5Ctextit%7Bibean%7D%24%20dataset%20confirm%20that%20the%20proposed%20system%20achieves%20state-of-the-art%20F1%20scores%20of%2099.22%25%20with%20EfficientNet-B7%2BLSTM%2C%20providing%20a%20robust%20and%20scalable%20framework%20for%20real-time%20agricultural%20decision%20support%20in%20resource-constrained%20environments.%20The%20code%20and%20augmented%20datasets%20used%20in%20this%20study%20are%20publicly%20available%20on%20this%20%24%5Chref%7Bhttps%3A//github.com/HJin-R/bean_disease%7D%7BGithub%7D%24%20repo.&entry.1838667208=http%3A//arxiv.org/abs/2604.13835v1&entry.124074799=Read"},
{"title": "Network Effects and Agreement Drift in LLM Debates", "author": "Erica Cau and Andrea Failla and Giulio Rossetti", "abstract": "Large Language Models (LLMs) have demonstrated an unprecedented ability to simulate human-like social behaviors, making them useful tools for simulating complex social systems. However, it remains unclear to what extent these simulations can be trusted to accurately capture key social mechanisms, particularly in highly unbalanced contexts involving minority groups. This paper uses a network generation model with controlled homophily and class sizes to examine how LLM agents behave collectively in multi-round debates. Moreover, our findings highlight a particular directional susceptibility that we term \\textit{agreement drift}, in which agents are more likely to shift toward specific positions on the opinion scale. Overall, our findings highlight the need to disentangle structural effects from model biases before treating LLM populations as behavioral proxies for human groups.", "link": "http://arxiv.org/abs/2604.11312v2", "date": "2026-04-15", "relevancy": 1.6923, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4349}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4151}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4145}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Network%20Effects%20and%20Agreement%20Drift%20in%20LLM%20Debates&body=Title%3A%20Network%20Effects%20and%20Agreement%20Drift%20in%20LLM%20Debates%0AAuthor%3A%20Erica%20Cau%20and%20Andrea%20Failla%20and%20Giulio%20Rossetti%0 social%2520mechanisms%252C%2520particularly%2520in%2520highly%2520unbalanced%2520contexts%2520involving%2520minority%2520groups.%2520This%2520paper%2520uses%2520a%2520network%2520generation%2520model%2520with%2520controlled%2520homophily%2520and%2520class%2520sizes%2520to%2520examine%2520how%2520LLM%2520agents%2520behave%2520collectively%2520in%2520multi-round%2520debates.%2520Moreover%252C%2520our%2520findings%2520highlight%2520a%2520particular%2520directional%2520susceptibility%2520that%2520we%2520term%2520%255Ctextit%257Bagreement%2520drift%257D%252C%2520in%2520which%2520agents%2520are%2520more%2520likely%2520to%2520shift%2520toward%2520specific%2520positions%2520on%2520the%2520opinion%2520scale.%2520Overall%252C%2520our%2520findings%2520highlight%2520the%2520need%2520to%2520disentangle%2520structural%2520effects%2520from%2520model%2520biases%2520before%2520treating%2520LLM%2520populations%2520as%2520behavioral%2520proxies%2520for%2520human%2520groups.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.11312v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Network%20Effects%20and%20Agreement%20Drift%20in%20LLM%20Debates&entry.906535625=Erica%20Cau%20and%20Andrea%20Failla%20and%20Giulio%20Rossetti&entry.1292438233=Large%20Language%20Models%20%28LLMs%29%20have%20demonstrated%20an%20unprecedented%20ability%20to%20simulate%20human-like%20social%20behaviors%2C%20making%20them%20useful%20tools%20for%20simulating%20complex%20social%20systems.%20However%2C%20it%20remains%20unclear%20to%20what%20extent%20these%20simulations%20can%20be%20trusted%20to%20accurately%20capture%20key%20social%20mechanisms%2C%20particularly%20in%20highly%20unbalanced%20contexts%20involving%20minority%20groups.%20This%20paper%20uses%20a%20network%20generation%20model%20with%20controlled%20homophily%20and%20class%20sizes%20to%20examine%20how%20LLM%20agents%20behave%20collectively%20in%20multi- {"title": "Mitigating Catastrophic Forgetting in Target Language Adaptation of LLMs via Source-Shielded Updates", "author": "Atsuki Yamaguchi and Terufumi Morishita and Aline Villavicencio and Nikolaos Aletras", "abstract": "Expanding the linguistic diversity of instruct large language models (LLMs) is crucial for global accessibility but is often hindered by the reliance on costly specialized target language labeled data and catastrophic forgetting during adaptation. We tackle this challenge under a realistic, low-resource constraint: adapting instruct LLMs using only unlabeled target language data. We introduce Source-Shielded Updates (SSU), a selective parameter update strategy that proactively preserves source knowledge. Using a small set of source data and a parameter importance scoring method, SSU identifies parameters critical to maintaining source abilities. It then applies a column-wise freezing strategy to protect these parameters before adaptation. Experiments across five typologically diverse languages and 7B and 13B models demonstrate that SSU successfully mitigates catastrophic forgetting. It reduces performance degradation on monolingual source tasks to just 3.4% (7B) and 2.8% (13B) on average, a stark contrast to the 20.3% and 22.3% from full fine-tuning. SSU also achieves target-language performance highly competitive with full fine-tuning, outperforming it on all benchmarks for 7B models and the majority for 13B models.", "link": "http://arxiv.org/abs/2512.04844v2", "date": "2026-04-15", "relevancy": 1.8439, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4762}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4635}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/

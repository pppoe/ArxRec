{"title": "UMI-3D: Extending Universal Manipulation Interface from Vision-Limited to 3D Spatial Perception", "author": "Ziming Wang", "abstract": "We present UMI-3D, a multimodal extension of the Universal Manipulation Interface (UMI) for robust and scalable data collection in embodied manipulation. While UMI enables portable, wrist-mounted data acquisition, its reliance on monocular visual SLAM makes it vulnerable to occlusions, dynamic scenes, and tracking failures, limiting its applicability in real-world environments. UMI-3D addresses these limitations by introducing a lightweight and low-cost LiDAR sensor tightly integrated into the wrist-mounted interface, enabling LiDAR-centric SLAM with accurate metric-scale pose estimation under challenging conditions. We further develop a hardware-synchronized multimodal sensing pipeline and a unified spatiotemporal calibration framework that aligns visual observations with LiDAR point clouds, producing consistent 3D representations of demonstrations. Despite maintaining the original 2D visuomotor policy formulation, UMI-3D significantly improves the quality and reliability of collected data, which directly translates into enhanced policy performance. Extensive real-world experiments demonstrate that UMI-3D not only achieves high success rates on standard manipulation tasks, but also enables learning of tasks that are challenging or infeasible for the original vision-only UMI setup, including large deformable object manipulation and articulated object operation. The system supports an end-to-end pipeline for data acquisition, alignment, training, and deployment, while preserving the portability and accessibility of the original UMI. All hardware and software components are open-sourced to facilitate large-scale data collection and accelerate research in embodied intelligence: \\href{https://umi-3d.github.io}{https://umi-3d.github.io}.", "link": "http://arxiv.org/abs/2604.14089v1", "date": "2026-04-15", "relevancy": 2.4181, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6122}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.6003}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5985}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20UMI-3D%3A%20Extending%20Universal%20Manipulation%20Interface%20from%20Vision-Limited%20to%203D%20Spatial%20Perception&body=Title%3A%20UMI-3D%3A%20Extending%20Universal%20Manipulation%20Interface%20from%20Vision-Limited%20to%203D%20Spatial%20Perception%0AAuthor%3A%20Ziming%20Wang%0AAbstract%3A%20We%20present%20UMI-3D%2C%20a%20multimodal%20extension%20of%20the%20Universal%20Manipulation%20Interface%20%28UMI%29%20for%20robust%20and%20scalable%20data%20collection%20in%20embodied%20manipulation.%20While%20UMI%20enables%20portable%2C%20wrist-mounted%20data%20acquisition%2C%20its%20reliance%20on%20monocular%20visual%20SLAM%20makes%20it%20vulnerable%20to%20occlusions%2C%20dynamic%20scenes%2C%20and%20tracking%20failures%2C%20limiting%20its%20applicability%20in%20real-world%20environments.%20UMI-3D%20addresses%20these%20limitations%20by%20introducing%20a%20lightweight%20and%20low-cost%20LiDAR%20sensor%20tightly%20integrated%20into%20the%20wrist-mounted%20interface%2C%20enabling%20LiDAR-centric%20SLAM%20with%20accurate%20metric-scale%20pose%20estimation%20under%20challenging%20conditions.%20We%20further%20develop%20a%20hardware-synchronized%20multimodal%20sensing%20pipeline%20and%20a%20unified%20spatiotemporal%20calibration%20framework%20that%20aligns%20visual%20observations%20with%20LiDAR%20point%20clouds%2C%20producing%20consistent%203D%20representations%20of%20demonstrations.%20Despite%20maintaining%20the%20original%202D%20visuomotor%20policy%20formulation%2C%20UMI-3D%20significantly%20improves%20the%20quality%20and%20reliability%20of%20collected%20data%2C%20which%20directly%20translates%20into%20enhanced%20policy%20performance.%20Extensive%20real-world%20experiments%20demonstrate%20that%20UMI-3D%20not%20only%20achieves%20high%20success%20rates%20on%20standard%20manipulation%20tasks%2C%20but%20also%20enables%20learning%20of%20tasks%20that%20are%20challenging%20or%20infeasible%20for%20the%20original%20vision-only%20UMI%20setup%2C%20including%20large%20deformable%20object%20manipulation%20and%20articulated%20object%20operation.%20The%20system%20supports%20an%20end-to-end%20pipeline%20for%20data%20acquisition%2C%20alignment%2C%20training%2C%20and%20deployment%2C%20while%20preserving%20the%20portability%20and%20accessibility%20of%20the%20original%20UMI.%20All%20hardware%20and%20software%20components%20are%20open-sourced%20to%20facilitate%20large-scale%20data%20collection%20and%20accelerate%20research%20in%20embodied%20intelligence%3A%20%5Chref%7Bhttps%3A//umi-3d.github.io%7D%7Bhttps%3A//umi-3d.github.io%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14089v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUMI-3D%253A%2520Extending%2520Universal%2520Manipulation%2520Interface%2520from%2520Vision-Limited%2520to%25203D%2520Spatial%2520Perception%26entry.906535625%3DZiming%2520Wang%26entry.1292438233%3DWe%2520present%2520UMI-3D%252C%2520a%2520multimodal%2520extension%2520of%2520the%2520Universal%2520Manipulation%2520Interface%2520%2528UMI%2529%2520for%2520robust%2520and%2520scalable%2520data%2520collection%2520in%2520embodied%2520manipulation.%2520While%2520UMI%2520enables%2520portable%252C%2520wrist-mounted%2520data%2520acquisition%252C%2520its%2520reliance%2520on%2520monocular%2520visual%2520SLAM%2520makes%2520it%2520vulnerable%2520to%2520occlusions%252C%2520dynamic%2520scenes%252C%2520and%2520tracking%2520failures%252C%2520limiting%2520its%2520applicability%2520in%2520real-world%2520environments.%2520UMI-3D%2520addresses%2520these%2520limitations%2520by%2520introducing%2520a%2520lightweight%2520and%2520low-cost%2520LiDAR%2520sensor%2520tightly%2520integrated%2520into%2520the%2520wrist-mounted%2520interface%252C%2520enabling%2520LiDAR-centric%2520SLAM%2520with%2520accurate%2520metric-scale%2520pose%2520estimation%2520under%2520challenging%2520conditions.%2520We%2520further%2520develop%2520a%2520hardware-synchronized%2520multimodal%2520sensing%2520pipeline%2520and%2520a%2520unified%2520spatiotemporal%2520calibration%2520framework%2520that%2520aligns%2520visual%2520observations%2520with%2520LiDAR%2520point%2520clouds%252C%2520producing%2520consistent%25203D%2520representations%2520of%2520demonstrations.%2520Despite%2520maintaining%2520the%2520original%25202D%2520visuomotor%2520policy%2520formulation%252C%2520UMI-3D%2520significantly%2520improves%2520the%2520quality%2520and%2520reliability%2520of%2520collected%2520data%252C%2520which%2520directly%2520translates%2520into%2520enhanced%2520policy%2520performance.%2520Extensive%2520real-world%2520experiments%2520demonstrate%2520that%2520UMI-3D%2520not%2520only%2520achieves%2520high%2520success%2520rates%2520on%2520standard%2520manipulation%2520tasks%252C%2520but%2520also%2520enables%2520learning%2520of%2520tasks%2520that%2520are%2520challenging%2520or%2520infeasible%2520for%2520the%2520original%2520vision-only%2520UMI%2520setup%252C%2520including%2520large%2520deformable%2520object%2520manipulation%2520and%2520articulated%2520object%2520operation.%2520The%2520system%2520supports%2520an%2520end-to-end%2520pipeline%2520for%2520data%2520acquisition%252C%2520alignment%252C%2520training%252C%2520and%2520deployment%252C%2520while%2520preserving%2520the%2520portability%2520and%2520accessibility%2520of%2520the%2520original%2520UMI.%2520All%2520hardware%2520and%2520software%2520components%2520are%2520open-sourced%2520to%2520facilitate%2520large-scale%2520data%2520collection%2520and%2520accelerate%2520research%2520in%2520embodied%2520intelligence%253A%2520%255Chref%257Bhttps%253A//umi-3d.github.io%257D%257Bhttps%253A//umi-3d.github.io%257D.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.14089v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=UMI-3D%3A%20Extending%20Universal%20Manipulation%20Interface%20from%20Vision-Limited%20to%203D%20Spatial%20Perception&entry.906535625=Ziming%20Wang&entry.1292438233=We%20present%20UMI-3D%2C%20a%20multimodal%20extension%20of%20the%20Universal%20Manipulation%20Interface%20%28UMI%29%20for%20robust%20and%20scalable%20data%20collection%20in%20embodied%20manipulation.%20While%20UMI%20enables%20portable%2C%20wrist-mounted%20data%20acquisition%2C%20its%20reliance%20on%20monocular%20visual%20SLAM%20makes%20it%20vulnerable%20to%20occlusions%2C%20dynamic%20scenes%2C%20and%20tracking%20failures%2C%20limiting%20its%20applicability%20in%20real-world%20environments.%20UMI-3D%20addresses%20these%20limitations%20by%20introducing%20a%20lightweight%20and%20low-cost%20LiDAR%20sensor%20tightly%20integrated%20into%20the%20wrist-mounted%20interface%2C%20enabling%20LiDAR-centric%20SLAM%20with%20accurate%20metric-scale%20pose%20estimation%20under%20challenging%20conditions.%20We%20further%20develop%20a%20hardware-synchronized%20multimodal%20sensing%20pipeline%20and%20a%20unified%20spatiotemporal%20calibration%20framework%20that%20aligns%20visual%20observations%20with%20LiDAR%20point%20clouds%2C%20producing%20consistent%203D%20representations%20of%20demonstrations.%20Despite%20maintaining%20the%20original%202D%20visuomotor%20policy%20formulation%2C%20UMI-3D%20significantly%20improves%20the%20quality%20and%20reliability%20of%20collected%20data%2C%20which%20directly%20translates%20into%20enhanced%20policy%20performance.%20Extensive%20real-world%20 {"title": "SuperGrasp: Single-View Object Grasping via Superquadric Similarity Matching, Evaluation, and Refinement", "author": "Lijingze Xiao and Jinhong Du and Supeng Diao and Yu Ren and Yang Cong", "abstract": "Robotic grasping from single-view observations remains a critical challenge in manipulation. However, existing methods still struggle to generate reliable grasp candidates and stably evaluate grasp feasibility under incomplete geometric information. To address these limitations, we present SuperGrasp, a new two-stage framework for single-view parallel-jaw grasping. In the first stage, we introduce a Similarity Matching Module that efficiently retrieves valid and diverse grasp candidates by matching the input single-view point cloud with a precomputed primitive dataset based on superquadric coefficients. In the second stage, we propose E-RNet, an end-to-end network that expands the grasp-aware region and takes the initial grasp closure region as a local anchor region, capturing the contextual relationship between the local region and its surrounding spatial neighborhood, thereby enabling more accurate and reliable grasp evaluation and introducing small-range local refinement to improve grasp adaptability. To enhance generalization, we construct a primitive dataset containing 1.2k standard geometric primitives for similarity matching and collect a point cloud dataset of 100k samples from 124 objects, annotated with stable grasp labels for network training. Extensive experiments in both simulation and real-world environments demonstrate that our method achieves stable grasping performance and good generalization across novel objects and clutter scenes.", "link": "http://arxiv.org/abs/2603.29254v2", "date": "2026-04-15", "relevancy": 2.4181, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6718}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5702}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.551}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SuperGrasp%3A%20Single-View%20Object%20Grasping%20via%20Superquadric%20Similarity%20Matching%2C%20Evaluation%2C%20and%20Refinement&body=Title%3A%20SuperGrasp%3A%20Single-View%20Object%20Grasping%20via%20Superquadric%20Similarity%20Matching%2C%20Evaluation%2C%20and%20Refinement%0AAuthor%3A%20Lijingze%20Xiao%20and%20Jinhong%20Du%20and%20Supeng%20Diao%20and%20Yu%20Ren%20and%20Yang%20Cong%0AAbstract%3A%20Robotic%20grasping%20from%20single-view%20observations%20remains%20a%20critical%20challenge%20in%20manipulation.%20However%2C%20existing%20methods%20still%20struggle%20to%20generate%20reliable%20grasp%20candidates%20and%20stably%20evaluate%20grasp%20feasibility%20under%20incomplete%20geometric%20information.%20To%20address%20these%20limitations%2C%20we%20present%20SuperGrasp%2C%20a%20new%20two-stage%20framework%20for%20single-view%20parallel-jaw%20grasping.%20In%20the%20first%20stage%2C%20we%20introduce%20a%20Similarity%20Matching%20Module%20that%20efficiently%20retrieves%20valid%20and%20diverse%20grasp%20candidates%20by%20matching%20the%20input%20single-view%20point%20cloud%20with%20a%20precomputed%20primitive%20dataset%20based%20on%20superquadric%20coefficients.%20In%20the%20second%20stage%2C%20we%20propose%20E-RNet%2C%20an%20end-to-end%20network%20that%20expands%20the%20grasp-aware%20region%20and%20takes%20the%20initial%20grasp%20closure%20region%20as%20a%20local%20anchor%20region%2C%20capturing%20the%20contextual%20relationship%20between%20the%20local%20region%20and%20its%20surrounding%20spatial%20neighborhood%2C%20thereby%20enabling%20more%20accurate%20and%20reliable%20grasp%20evaluation%20and%20introducing%20small-range%20local%20refinement%20to%20improve%20grasp%20adaptability.%20To%20enhance%20generalization%2C%20we%20construct%20a%20primitive%20dataset%20containing%201.2k%20standard%20geometric%20primitives%20for%20similarity%20matching%20and%20collect%20a%20point%20cloud%20dataset%20of%20100k%20samples%20from%20124%20objects%2C%20annotated%20with%20stable%20grasp%20labels%20for%20network%20training.%20Extensive%20experiments%20in%20both%20simulation%20and%20real-world%20environments%20demonstrate%20that%20our%20method%20achieves%20stable%20grasping%20performance%20and%20good%20generalization%20across%20novel%20objects%20and%20clutter%20scenes.%0ALink%3A%20http%3A//arxiv.org/abs/2603.29254v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSuperGrasp%253A%2520Single-View%2520Object%2520Grasping%2520via%2520Superquadric%2520Similarity%2520Matching%252C%2520Evaluation%252C%2520and%2520Refinement%26entry.906535625%3DLijingze%2520Xiao%2520and%2520Jinhong%2520Du%2520and%2520Supeng%2520Diao%2520and%2520Yu%2520Ren%2520and%2520Yang%2520Cong%26entry.1292438233%3DRobotic%2520grasping%2520from%2520single-view%2520observations%2520remains%2520a%2520critical%2520challenge%2520in%2520manipulation.%2520However%252C%2520existing%2520methods%2520still%2520struggle%2520to%2520generate%2520reliable%2520grasp%2520candidates%2520and%2520stably%2520evaluate%2520grasp%2520feasibility%2520under%2520incomplete%2520geometric%2520information.%2520To%2520address%2520these%2520limitations%252C%2520we%2520present%2520SuperGrasp%252C%2520a%2520new%2520two-stage%2520framework%2520for%2520single-view%2520parallel-jaw%2520grasping.%2520In%2520the%2520first%2520stage%252C%2520we%2520introduce%2520a%2520Similarity%2520Matching%2520Module%2520that%2520efficiently%2520retrieves%2520valid%2520and%2520diverse%2520grasp%2520candidates%2520by%2520matching%2520the%2520input%2520single-view%2520point%2520cloud%2520with%2520a%2520precomputed%2520primitive%25 {"title": "POINTS-Seeker: Towards Training a Multimodal Agentic Search Model from Scratch", "author": "Yikun Liu and Yuan Liu and Le Tian and Xiao Zhou and Jiangchao Yao and Yanfeng Wang and Weidi Xie", "abstract": "While Large Multimodal Models (LMMs) demonstrate impressive visual perception, they remain epistemically constrained by their static parametric knowledge. To transcend these boundaries, multimodal search models have been adopted to actively interact with the external environment for evidence retrieval. Diverging from prevailing paradigms that merely retrofit general LMMs with search tools as modular extensions, we explore the potential of building a multimodal agentic search model from scratch. Specifically, we make the following contributions: (i) we introduce Agentic Seeding, a dedicated phase designed to weave the foundational precursors necessary for eliciting agentic behaviors; (ii) we uncover a performance bottleneck in long-horizon interactions, where the increasing volume of interaction history overwhelms the model's ability to locate ground-truth evidence. To mitigate this, we propose V-Fold, an adaptive history-aware compression scheme that preserves recent dialogue turns in high fidelity while folding historical context into the visual space via rendering; and (iii) we develop POINTS-Seeker-8B, a state-of-the-art multimodal agentic search model that consistently outperforms existing models across six diverse benchmarks, effectively resolving the challenges of long-horizon, knowledge-intensive visual reasoning.", "link": "http://arxiv.org/abs/2604.14029v1", "date": "2026-04-15", "relevancy": 2.4112, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6071}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6071}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5813}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20POINTS-Seeker%3A%20Towards%20Training%20a%20Multimodal%20Agentic%20Search%20Model%20from%20Scratch&body=Title%3A%20POINTS-Seeker%3A%20Towards%20Training%20a%20Multimodal%20Agentic%20Search%20Model%20from%20Scratch%0AAuthor%3A%20Yikun%20Liu%20and%20Yuan%20Liu%20and%20Le%20Tian%20and%20Xiao%20Zhou%20and%20Jiangchao%20Yao%20and%20Yanfeng%20Wang%20and%20Weidi%20Xie%0AAbstract%3A%20While%20Large%20Multimodal%20Models%20%28LMMs%29%20demonstrate%20impressive%20visual%20perception%2C%20they%20remain%20epistemically%20constrained%20by%20their%20static%20parametric%20knowledge.%20To%20transcend%20these%20boundaries%2C%20multimodal%20search%20models%20have%20been%20adopted%20to%20actively%20interact%20with%20the%20external%20environment%20for%20evidence%20retrieval.%20Diverging%20from%20prevailing%20paradigms%20that%20merely%20retrofit%20general%20LMMs%20with%20search%20tools%20as%20modular%20extensions%2C%20we%20explore%20the%20potential%20of%20building%20a%20multimodal%20agentic%20search%20model%20from%20scratch.%20Specifically%2C%20we%20make%20the%20following%20contributions%3A%20%28i%29%20we%20introduce%20Agentic%20Seeding%2C%20a%20dedicated%20phase%20designed%20to%20weave%20the%20foundational%20precursors%20necessary%20for%20eliciting%20agentic%20behaviors%3B%20%28ii%29%20we%20uncover%20a%20performance%20bottleneck%20in%20long-horizon%20interactions%2C%20where%20the%20increasing%20volume%20of%20interaction%20history%20overwhelms%20the%20model%27s%20ability%20to%20locate%20ground-truth%20evidence.%20To%20mitigate%20this%2C%20we%20propose%20V-Fold%2C%20an%20adaptive%20history-aware%20compression%20scheme%20that%20preserves%20recent%20dialogue%20turns%20in%20high%20fidelity%20while%20folding%20historical%20context%20into%20the%20visual%20space%20via%20rendering%3B%20and%20%28iii%29%20we%20develop%20POINTS-Seeker-8B%2C%20a%20state-of-the-art%20multimodal%20agentic%20search%20model%20that%20consistently%20outperforms%20existing%20models%20across%20six%20diverse%20benchmarks%2C%20effectively%20resolving%20the%20challenges%20of%20long-horizon%2C%20knowledge-intensive%20visual%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14029v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPOINTS-Seeker%253A%2520Towards%2520Training%2520a%2520Multimodal%2520Agentic%2520Search%2520Model%2520from%2520Scratch%26entry.906535625%3DYikun%2520Liu%2520and%2520Yuan%2520Liu%2520and%2520Le%2520Tian%2520and%2520Xiao%2520Zhou%2520and%2520Jiangchao%2520Yao%2520and%2520Yanfeng%2520Wang%2520and%2520Weidi%2520Xie%26entry.1292438233%3DWhile%2520Large%2520Multimodal%2520Models%2520%2528LMMs%2529%2520demonstrate%2520impressive%2520visual%2520perception%252C%2520they%2520remain%2520epistemically%2520constrained%2520by%2520their%2520static%2520parametric%2520knowledge.%2520To%2520transcend%2520these%2520boundaries%252C%2520multimodal%2520search%2520models%2520have%2520been%2520adopted%2520to%2520actively%2520interact%2520with%2520the%2520external%2520environment%2520for%2520evidence%2520retrieval.%2520Diverging%2520from%2520prevailing%2520paradigms%2520that%2520merely%2520retrofit%2520general%2520LMMs%2520with%2520search%2520tools%2520as%2520modular%2520extensions%252C%2520we%2520explore%2520the%2520potential%2520of%2520building%2520a%2520multimodal%2520agentic%2520search%2520model%2520from%2520scratch.%2520Specifically%252C%2520we%2520make%2520the%2520following%2520contributions%253A%2520%2528i%2529%2520we%2520introduce%2520Agentic%2520Seeding%252C%2520a%2520dedicated%2520phase%2520designed%2520to%2520weave%2520the%2520foundational%2520precursors%2520necessary%2520for%2520eliciting%2520agentic%2520behaviors%253B%2520%2528ii%2529%2520we%2520unco {"title": "Heavy-Tailed Class-Conditional Priors for Long-Tailed Generative Modeling", "author": "Aymene Mohammed Bouayed and Samuel Deslauriers-Gauthier and Adrian Iaccovelli and David Naccache", "abstract": "Variational Autoencoders (VAEs) with global priors trained under an imbalanced empirical class distribution can lead to underrepresentation of tail classes in the latent space. While $t^3$VAE improves robustness via heavy-tailed Student's $t$-distribution priors, its single global prior still allocates mass proportionally to class frequency. We address this latent geometric bias by introducing C-$t^3$VAE, which assigns a per-class Student's $t$ joint prior over latent and output variables. This design promotes uniform prior mass across class-conditioned components. To optimize our model we derive a closed-form objective from the $\u03b3$-power divergence, and we introduce an equal-weight latent mixture for class-balanced generation. On SVHN-LT, CIFAR100-LT, and CelebA datasets, C-$t^3$VAE consistently attains lower FID scores than $t^3$VAE and Gaussian-based VAE baselines under severe class imbalance while remaining competitive in balanced or mildly imbalanced settings. In per-class F1 evaluations, our model outperforms the conditional Gaussian VAE across highly imbalanced settings. Moreover, we identify the mild imbalance threshold $\u03c1< 5$, for which Gaussian-based models remain competitive. However, for $\u03c1\\geq 5$ our approach yields improved class-balanced generation and mode coverage.", "link": "http://arxiv.org/abs/2509.02154v2", "date": "2026-04-15", "relevancy": 2.4014, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5017}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4769}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4622}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Heavy-Tailed%20Class-Conditional%20Priors%20for%20Long-Tailed%20Generative%20Modeling&body=Title%3A%20Heavy-Tailed%20Class-Conditional%20Priors%20for%20Long-Tailed%20Generative%20Modeling%0AAuthor%3A%20Aymene%20Mohammed%20Bouayed%20and%20Samuel%20Deslauriers-Gauthier%20and%20Adrian%20Iaccovelli%20and%20David%20Naccache%0AAbstract%3A%20Variational%20Autoencoders%20%28VAEs%29%20with%20global%20priors%20trained%20under%20an%20imbalanced%20empirical%20class%20distribution%20can%20lead%20to%20underrepresentation%20of%20tail%20classes%20in%20the%20latent%20space.%20While%20%24t%5E3%24VAE%20improves%20robustness%20via%20heavy-tailed%20Student%27s%20%24t%24-distribution%20priors%2C%20its%20single%20global%20prior%20still%20allocates%20mass%20proportionally%20to%20class%20frequency.%20We%20address%20this%20latent%20geometric%20bias%20by%20introducing%20C-%24t%5E3%24VAE%2C%20which%20assigns%20a%20per-class%20Student%27s%20%24t%24%20joint%20prior%20over%20latent%20and%20output%20variables.%20This%20design%20promotes%20uniform%20prior%20mass%20across%20class-conditioned%20components.%20To%20optimize%20our%20model%20we%20derive%20a%20closed-form%20objective%20from%20the%20%24%CE%B3%24-power%20divergence%2C%20and%20we%20introduce%20an%20equal-weight%20latent%20mixture%20for%20class-balanced%20generation.%20On%20SVHN-LT%2C%20CIFAR100-LT%2C%20and%20CelebA%20datasets%2C%20C-%24t%5E3%24VAE%20consistently%20attains%20lower%20FID%20scores%20than%20%24t%5E3%24VAE%20and%20Gaussian-based%20VAE%20baselines%20under%20severe%20class%20imbalance%20while%20remaining%20competitive%20in%20balanced%20or%20mildly%20imbalanced%20settings.%20In%20per-class%20F1%20evaluations%2C%20our%20model%20outperforms%20the%20conditional%20Gaussian%20VAE%20across%20highly%20imbalanced%20settings.%20Moreover%2C%20we%20identify%20the%2 {"title": "Blind Bitstream-corrupted Video Recovery via Metadata-guided Diffusion Model", "author": "Shuyun Wang and Hu Zhang and Xin Shen and Dadong Wang and Xin Yu", "abstract": "Bitstream-corrupted video recovery aims to restore realistic content degraded during video storage or transmission. Existing methods typically assume that predefined masks of corrupted regions are available, but manually annotating these masks is labor-intensive and impractical in real-world scenarios. To address this limitation, we introduce a new blind video recovery setting that removes the reliance on predefined masks. This setting presents two major challenges: accurately identifying corrupted regions and recovering content from extensive and irregular degradations. We propose a Metadata-Guided Diffusion Model (M-GDM) to tackle these challenges. Specifically, intrinsic video metadata are leveraged as corruption indicators through a dual-stream metadata encoder that separately embeds motion vectors and frame types before fusing them into a unified representation. This representation interacts with corrupted latent features via cross-attention at each diffusion step. To preserve intact regions, we design a prior-driven mask predictor that generates pseudo masks using both metadata and diffusion priors, enabling the separation and recombination of intact and recovered regions through hard masking. To mitigate boundary artifacts caused by imperfect masks, a post-refinement module enhances consistency between intact and recovered regions. Extensive experiments demonstrate the effectiveness of our method and its superiority in blind video recovery. Code is available at: https://github.com/Shuyun-Wang/M-GDM.", "link": "http://arxiv.org/abs/2604.13906v1", "date": "2026-04-15", "relevancy": 2.3945, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6231}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5843}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5731}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Blind%20Bitstream-corrupted%20Video%20Recovery%20via%20Metadata-guided%20Diffusion%20Model&body=Title%3A%20Blind%20Bitstream-corrupted%20Video%20Recovery%20via%20Metadata-guided%20Diffusion%20Model%0AAuthor%3A%20Shuyun%20Wang%20and%20Hu%20Zhang%20and%20Xin%20Shen%20and%20Dadong%20Wang%20and%20Xin%20Yu%0AAbstract%3A%20Bitstream-corrupted%20video%20recovery%20aims%20to%20restore%20realistic%20content%20degraded%20during%20video%20storage%20or%20transmission.%20Existing%20methods%20typically%20assume%20that%20predefined%20masks%20of%20corrupted%20regions%20are%20available%2C%20but%20manually%20annotating%20these%20masks%20is%20labor-intensive%20and%20impractical%20in%20real-world%20scenarios.%20To%20address%20this%20limitation%2C%20we%20introduce%20a%20new%20blind%20video%20recovery%20setting%20that%20removes%20the%20reliance%20on%20predefined%20masks.%20This%20setting%20presents%20two%20major%20challenges%3A%20accurately%20identifying%20corrupted%20regions%20and%20recovering%20content%20from%20extensive%20and%20irregular%20degradations.%20We%20propose%20a%20Metadata-Guided%20Diffusion%20Model%20%28M-GDM%29%20to%20tackle%20these%20challenges.%20Specifically%2C%20intrinsic%20video%20metadata%20are%20leveraged%20as%20corruption%20indicators%20through%20a%20dual-stream%20metadata%20encoder%20that%20separately%20embeds%20motion%20vectors%20and%20frame%20types%20before%20fusing%20them%20into%20a%20unified%20representation.%20This%20representation%20interacts%20with%20corrupted%20latent%20features%20via%20cross-attention%20at%20each%20diffusion%20step.%20To%20preserve%20intact%20regions%2C%20we%20design%20a%20prior-driven%20mask%20predictor%20that%20generates%20pseudo%20masks%20using%20both%20metadata%20and%20diffusion%20priors%2C%20enabling%20the%20separation%20and%20recombination%20of%20intact%20and%20recovered%20regions%20through%20hard%20masking.%20To%20mitigate%20boundary%20artifacts%20caused%20by%20imperfect%20masks%2C%20a%20post-refinement%20module%20enhances%20consistency%20between%20intact%20and%20recovered%20regions.%20Extensive%20experiments%20demonstrate%20the%20effectiveness%20of%20our%20method%20and%20its%20superiority%20in%20blind%20video%20recovery.%20Code%20is%20available%20at%3A%20https%3A//github.com/Shuyun-Wang/M-GDM.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13906v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBlind%2520Bitstream-corrupted%2520Video%2520Recovery%2520via%2520Metadata-guided%2520Diffusion%2520Model%26entry.906535625%3DShuyun%2520Wang%2520and%2520Hu%2520Zhang%2520and%2520Xin%2520Shen%2520and%2520Dadong%2520Wang%2520and%2520Xin%2520Yu%26entry.1292438233%3DBitstream-corrupted%2520video%2520recovery%2520aims%2520to%2520restore%2520realistic%2520content%2520degraded%2520during%2520video%2520storage%2520or%2520transmission.%2520Existing%2520methods%2520typically%2520assume%2520that%2520predefined%2520masks%2520of%2520corrupted%2520regions%2520are%2520available%252C%2520but%2520manually%2520annotating%2520these%2520masks%2520is%2520labor-intensive%2520and%2520impractical%2520in%2520real-world%2520scenarios.%2520To%2520address%2520this%2520limitation%252C%2520we%2520introduce%2520a%2520new%2520blind%2520video%2520recovery%2520setting%2520that%2520removes%2520the%2520reliance%2520on%2520predefined%2520masks.%2520This%2520setting%2520presents%2520two%2520major%2520challenges%253A%2520accurately%2520identifying%2520corrupted%2520regions%2520and%2520recovering%2520content%2520from%2520extensive%2520and%2520irregular%2520degradations.%2520We%2520propose%2520a%2520Metadata-Guided%2520Diffus isting%20methods%20typically%20assume%20that%20predefined%20masks%20of%20corrupted%20regions%20are%20available%2C%20but%20manually%20annotating%20these%20masks%20is%20labor-intensive%20and%20impractical%20in%20real-world%20scenarios.%20To%20address%20this%20limitation%2C%20we%20introduce%20a%20new%20blind%20video%20recovery%20setting%20that%20removes%20the%20reliance%20on%20predefined%20masks.%20This%20setting%20presents%20two%20major%20challenges%3A%20accurately%20identifying%20corrupted%20regions%20and%20recovering%20content%20from%20extensive%20and%20irregular%20degradations.%20We%20propose%20a%20Metadata-Guided%20Diffusion%20Model%20%28M-GDM%29%20to%20tackle%20these%20challenges.%20Specifically%2C%20intrinsic%20video%20metadata%20are%20leveraged%20as%20corruption%20indicators%20through%20a%20dual-stream%20metadata%20encoder%20that%20separately%20embeds%20motion%20vectors%20and%20frame%20types%20before%20fusing%20them%20into%20a%20unified%20representation.%20This%20representation%20interacts%20with%20corrupted%20latent%20features%20via%20cross-attention%20at%20each%20diffusion%20step.%20To%20preserve%20intact%20regions%2C%20we%20design%20a%20prior-driven%20mask%20predictor%20that%20generates%20pseudo%20masks%20using%20both%20metadata%20and%20diffusion%20priors%2C%20enabling%20the%20separation%20and%20recombination%20of%20intact%20and%20recovered%20regions%20through%20hard%20masking.%20To%20mitigate%20boundary%20artifacts%20caused%20by%20imperfect%20masks%2C%20a%20post-refinement%20module%20enhances%20consistency%20between%20intact%20and%20recovered%20regions.%20Extensive%20experiments%20demonstrate%20the%20effectiveness%20of%20our%20method%20and%20its%20superiority%20in%20blind%20video%20recovery.%20Code%20is%20available%20at%3A%20https%3A//github.com/Shuyun-Wang/M-GDM.&entry.1838667208=http%3A//arxiv.org/abs/2604.13906v1&entry.124074799=Read"},
{"title": "Beyond Voxel 3D Editing: Learning from 3D Masks and Self-Constructed Data", "author": "Yizhao Xu and Hongyuan Zhu and Caiyun Liu and Tianfu Wang and Keyu Chen and Sicheng Xu and Jiaolong Yang and Nicholas Jing Yuan and Qi Zhang", "abstract": "3D editing refers to the ability to apply local or global modifications to 3D assets. Effective 3D editing requires maintaining semantic consistency by performing localized changes according to prompts, while also preserving local invariance so that unchanged regions remain consistent with the original. However, existing approaches have significant limitations: multi-view editing methods incur losses when projecting back to 3D, while voxel-based editing is constrained in both the regions that can be modified and the scale of modifications. Moreover, the lack of sufficiently large editing datasets for training and evaluation remains a challenge. To address these challenges, we propose a Beyond Voxel 3D Editing (BVE) framework with a self-constructed large-scale dataset specifically tailored for 3D editing. Building upon this dataset, our model enhances a foundational image-to-3D generative architecture with lightweight, trainable modules, enabling efficient injection of textual semantics without the need for expensive full-model retraining. Furthermore, we introduce an annotation-free 3D masking strategy to preserve local invariance, maintaining the integrity of unchanged regions during editing. Extensive experiments demonstrate that BVE achieves superior performance in generating high-quality, text-aligned 3D assets, while faithfully retaining the visual characteristics of the original input.", "link": "http://arxiv.org/abs/2604.13688v1", "date": "2026-04-15", "relevancy": 2.3816, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.6318}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n {"title": "Spectral Thompson sampling", "author": "Tomas Kocak and Michal Valko and Remi Munos and Shipra Agrawal", "abstract": "Thompson Sampling (TS) has attracted a lot of interest due to its good empirical performance, in particular in the computational advertising. Though successful, the tools for its performance analysis appeared only recently. In this paper, we describe and analyze SpectralTS algorithm for a bandit problem, where the payoffs of the choices are smooth given an underlying graph. In this setting, each choice is a node of a graph and the expected payoffs of the neighboring nodes are assumed to be similar. Although the setting has application both in recommender systems and advertising, the traditional algorithms would scale poorly with the number of choices. For that purpose we consider an effective dimension d, which is small in real-world graphs. We deliver the analysis showing that the regret of SpectralTS scales as d*sqrt(T ln N) with high probability, where T is the time horizon and N is the number of choices. Since a d*sqrt(T ln N) regret is comparable to the known results, SpectralTS offers a computationally more efficient alternative. We also show that our algorithm is competitive on both synthetic and real-world data.", "link": "http://arxiv.org/abs/2604.13739v1", "date": "2026-04-15", "relevancy": 2.3764, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5124}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.459}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4544}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Spectral%20Thompson%20sampling&body=Title%3A%20Spectral%20Thompson%20sampling%0AAuthor%3A%20Tomas%20Kocak%20and%20Michal%20Valko%20and%20Remi%20Munos%20and%20Shipra%20Agrawal%0AAbstract%3A%20Thompson%20Sampling%20%28TS%29%20has%20attracted%20a%20lot%20of%20interest%20due%20to%20its%20good%20empirical%20performance%2C%20in%20particular%20in%20the%20computational%20advertising.%20Though%20successful%2C%20the%20tools%20for%20its%20performance%20analysis%20appeared%20only%20recently.%20In%20this%20paper%2C%20we%20describe%20and%20analyze%20SpectralTS%20algorithm%20for%20a%20bandit%20problem%2C%20where%20the%20payoffs%20of%20the%20choices%20are%20smooth%20given%20an%20underlying%20graph.%20In%20this%20setting%2C%20each%20choice%20is%20a%20node%20of%20a%20graph%20and%20the%20expected%20payoffs%20of%20the%20neighboring%20nodes%20are%20assumed%20to%20be%20similar.%20Although%20the%20setting%20has%20application%20both%20in%20recommender%20systems%20and%20advertising%2C%20the%20traditional%20algorithms%20would%20scale%20poorly%20with%20the%20number%20of%20choices.%20For%20that%20purpose%20we%20consider%20an%20effective%20dimension%20d%2C%20which%20is%20small%20in%20real-world%20graphs.%20We%20deliver%20the%20analysis%20showing%20that%20the%20regret%20of%20SpectralTS%20scales%20as%20d%2Asqrt%28T%20ln%20N%29%20with%20high%20probability%2C%20where%20T%20is%20the%20time%20horizon%20and%20N%20is%20the%20number%20of%20choices.%20Since%20a%20d%2Asqrt%28T%20ln%20N%29%20regret%20is%20comparable%20to%20the%20known%20results%2C%20SpectralTS%20offers%20a%20computationally%20more%20efficient%20alternative.%20We%20also%20show%20that%20our%20algorithm%20is%20competitive%20on%20both%20synthetic%20and%20real-world%20data.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13739v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSpectral%2520Thompson%2520sampling%26entry.906535625%3DTomas%2520Kocak%2520and%2520Michal%2520Valko%2520and%2520Remi%2520Munos%2520and%2520Shipra%2520Agrawal% 4.13739v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Spectral%20Thompson%20sampling&entry.906535625=Tomas%20Kocak%20and%20Michal%20Valko%20and%20Remi%20Munos%20and%20Shipra%20Agrawal&entry.1292438233=Thompson%20Sampling%20%28TS%29%20has%20attracted%20a%20lot%20of%20interest%20due%20to%20its%20good%20empirical%20performance%2C%20in%20particular%20in%20the%20computational%20advertising.%20Though%20successful%2C%20the%20tools%20for%20its%20performance%20analysis%20appeared%20only%20recently.%20In%20this%20paper%2C%20we%20describe%20and%20analyze%20SpectralTS%20algorithm%20for%20a%20bandit%20problem%2C%20where%20the%20payoffs%20of%20the%20choices%20are%20smooth%20given%20an%20underlying%20graph.%20In%20this%20setting%2C%20each%20choice%20is%20a%20node%20of%20a%20graph%20and%20the%20expected%20payoffs%20of%20the%20neighboring%20nodes%20are%20assumed%20to%20be%20similar.%20Although%20the%20setting%20has%20application%20both%20in%20recommender%20systems%20and%20advertising%2C%20the%20traditional%20algorithms%20would%20scale%20poorly%20with%20the%20number%20of%20choices.%20For%20that%20purpose%20we%20consider%20an%20effective%20dimension%20d%2C%20which%20is%20small%20in%20real-world%20graphs.%20We%20deliver%20the%20analysis%20showing%20that%20the%20regret%20of%20SpectralTS%20scales%20as%20d%2Asqrt%28T%20ln%20N%29%20with%20high%20probability%2C%20where%20T%20is%20the%20time%20horizon%20and%20N%20is%20the%20number%20of%20choices.%20Since%20a%20d%2Asqrt%28T%20ln%20N%29%20regret%20is%20comparable%20to%20the%20known%20results%2C%20SpectralTS%20offers%20a%20computationally%20more%20efficient%20alternative.%20We%20also%20show%20that%20our%20algorithm%20is%20competitive%20on%20both%20synthetic%20and%20real-world%20data.&entry.1838667208=http%3A//arxiv.org/abs/2604.13739v1&entry.124074799=Read"},
{"title": "SceneGlue: Scene-Aware Transformer for Feature Matching without Scene-Level Annotation", "author": "Songlin Du and Xiaoyong Lu and Yaping Yan and Guobao Xiao and Xiaobo Lu and Takeshi Ikenaga", "abstract": "Local feature matching plays a critical role in understanding the correspondence between cross-view images. However, traditional methods are constrained by the inherent local nature of feature descriptors, limiting their ability to capture non-local scene information that is essential for accurate cross-view correspondence. In this paper, we introduce SceneGlue, a scene-aware feature matching framework designed to overcome these limitations. SceneGlue leverages a hybridizable matching paradigm that integrates implicit parallel attention and explicit cross-view visibility estimation. The parallel attention mechanism simultaneously exchanges information among local descriptors within and across images, enhancing the scene's global context. To further enrich the scene awareness, we propose the Visibility Transformer, which explicitly categorizes features into visible and invisible regions, providing an understanding of cross-view scene visibility. By combining explicit and implicit scene-level awareness, SceneGlue effectively compensates for the local descriptor constraints. Notably, SceneGlue is trained using only local feature matches, without requiring scene-level groundtruth annotations. This scene-aware approach not only improves accuracy and robustness but also enhances interpretability compared to traditional methods. Extensive experiments on applications such as homography estimation, pose estimation, image matching, and visual localization validate SceneGlue's superior performance. The source code is available at https://github.com/songlin-du/SceneGlue.", "link": "http://arxiv.org/abs/2604.13941v1", "date": "2026-04-15", "relevancy": 2.3762, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching f derstanding%20of%20cross-view%20scene%20visibility.%20By%20combining%20explicit%20and%20implicit%20scene-level%20awareness%2C%20SceneGlue%20effectively%20compensates%20for%20the%20local%20descriptor%20constraints.%20Notably%2C%20SceneGlue%20is%20trained%20using%20only%20local%20feature%20matches%2C%20without%20requiring%20scene-level%20groundtruth%20annotations.%20This%20scene-aware%20approach%20not%20only%20improves%20accuracy%20and%20robustness%20but%20also%20enhances%20interpretability%20compared%20to%20traditional%20methods.%20Extensive%20experiments%20on%20applications%20such%20as%20homography%20estimation%2C%20pose%20estimation%2C%20image%20matching%2C%20and%20visual%20localization%20validate%20SceneGlue%27s%20superior%20performance.%20The%20source%20code%20is%20available%20at%20https%3A//github.com/songlin-du/SceneGlue.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13941v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSceneGlue%253A%2520Scene-Aware%2520Transformer%2520for%2520Feature%2520Matching%2520without%2520Scene-Level%2520Annotation%26entry.906535625%3DSonglin%2520Du%2520and%2520Xiaoyong%2520Lu%2520and%2520Yaping%2520Yan%2520and%2520Guobao%2520Xiao%2520and%2520Xiaobo%2520Lu%2520and%2520Takeshi%2520Ikenaga%26entry.1292438233%3DLocal%2520feature%2520matching%2520plays%2520a%2520critical%2520role%2520in%2520understanding%2520the%2520correspondence%2520between%2520cross-view%2520images.%2520However%252C%2520traditional%2520methods%2520are%2520constrained%2520by%2520the%2520inherent%2520local%2520nature%2520of%2520feature%2520descriptors%252C%2520limiting%2520their%2520ability%2520to%2520capture%2520non-local%2520scene%2520information%2520that%2520is%2520essential%2520for%2520accurate%2520cross-view%2520correspondence.%2520In%2520this%2520paper%252C%2520we%2520introduce%2520SceneGlue%252C%2520a%2520scene-aware%2520feature%2520matching%2520framework%2520designed%2520to%2520over {"title": "Leveraging LLM-GNN Integration for Open-World Question Answering over Knowledge Graphs", "author": "Hussein Abdallah and Ibrahim Abdelaziz and Panos Kalnis and Essam Mansour", "abstract": "Open-world Question Answering (OW-QA) over knowledge graphs (KGs) aims to answer questions over incomplete or evolving KGs. Traditional KGQA assumes a closed world where answers must exist in the KG, limiting real-world applicability. In contrast, open-world QA requires inferring missing knowledge based on graph structure and context. Large language models (LLMs) excel at language understanding but lack structured reasoning. Graph neural networks (GNNs) model graph topology but struggle with semantic interpretation. Existing systems integrate LLMs with GNNs or graph retrievers. Some support open-world QA but rely on structural embeddings without semantic grounding. Most assume observed paths or complete graphs, making them unreliable under missing links or multi-hop reasoning. We present GLOW, a hybrid system that combines a pre-trained GNN and an LLM for open-world KGQA. The GNN predicts top-k candidate answers from the graph structure. These, along with relevant KG facts, are serialized into a structured prompt (e.g., triples and candidates) to guide the LLM's reasoning. This enables joint reasoning over symbolic and semantic signals, without relying on retrieval or fine-tuning. To evaluate generalization, we introduce GLOW-BENCH, a 1,000-question benchmark over incomplete KGs across diverse domains. GLOW outperforms existing LLM-GNN systems on standard benchmarks and GLOW-BENCH, achieving up to 53.3% and an average 38% improvement. GitHub code and data are available.", "link": "http://arxiv.org/abs/2604.13979v1", "date": "2026-04-15", "relevancy": 2.3682, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4853}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4678}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4678}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Leveraging%20LLM-GNN%20Integration%20for%20Open-World%20Question%20Answering%20over%20Knowledge%20Graphs&body=Title%3A%20Leveraging%20LLM-GNN%20Integration%20for%20Open-World%20Question%20Answering%20over%20Knowledge%20Graphs%0AAuthor%3A%20Hussein%20Abdallah%20and%20Ibrahim%20Abdelaziz%20and%20Panos%20Kalnis%20and%20Essam%20Mansour%0AAbstract%3A%20Open-world%20Question%20Answering%20%28OW-QA%29%20over%20knowledge%20graphs%20%28KGs%29%20aims%20to%20answer%20questions%20over%20incomplete%20or%20evolving%20KGs.%20Traditional%20KGQA%20assumes%20a%20closed%20world%20where%20answers%20must%20exist%20in%20the%20KG%2C%20limiting%20real-world%20applicability.%20In%20contrast%2C%20open-world%20QA%20requires%20inferring%20missing%20knowledge%20based%20on%20graph%20structure%20and%20context.%20Large%20language%20models%20%28LLMs%29%20excel%20at%20language%20understanding%20but%20lack%20structured%20reasoning.%20Graph%20neural%20networks%20%28GNNs%29%20model%20graph%20topology%20but%20struggle%20with%20semantic%20interpretation.%20Existing%20systems%20integrate%20LLMs%20with%20GNNs%20or%20graph%20retrievers.%20Some%20support%20open-world%20QA%20but%20rely%20on%20structural%20embeddings%20without%20semantic%20grounding.%20Most%20assume%20observed%20paths%20or%20complete%20graphs%2C%20making%20them%20unreliable%20under%20missing%20links%20or%20multi-hop%20reasoning.%20We%20present%20GLOW%2C%20a%20hybrid%20system%20that%20combines%20a%20pre-trained%20GNN%20and%20an%20LLM%20for%20open-world%20KGQA.%20The%20GNN%20predicts%20top-k%20candidate%20answers%20from%20the%20graph%20structure.%20These%2C%20along%20with%20relevant%20KG%20facts%2C%20are%20serialized%20into%20a%20structured%20prompt {"title": "SpatialEvo: Self-Evolving Spatial Intelligence via Deterministic Geometric Environments", "author": "Dinging Li and Yingxiu Zhao and Xinrui Cheng and Kangheng Lin and Hongbo Peng and Hongxing Li and Zixuan Wang and Yuhong Dai and Haodong Li and Jia Wang and Yukang Shi and Liang Zhao and Jianjian Sun and Zheng Ge and Xiangyu Zhang and Weiming Lu and Jun Xiao and Yueting Zhuang and Yongliang Shen", "abstract": "Spatial reasoning over three-dimensional scenes is a core capability for embodied intelligence, yet continuous model improvement remains bottlenecked by the cost of geometric annotation. The self-evolving paradigm offers a promising path, but its reliance on model consensus to construct pseudo-labels causes training to reinforce rather than correct the model's own geometric errors. We identify a property unique to 3D spatial reasoning that circumvents this limitation: ground truth is a deterministic consequence of the underlying geometry, computable exactly from point clouds and camera poses without any model involvement. Building on this insight, we present SpatialEvo, a self-evolving framework for 3D spatial reasoning, centered on the Deterministic Geometric Environment (DGE). The DGE formalizes 16 spatial reasoning task categories under explicit geometric validation rules and converts unannotated 3D scenes into zero-noise interactive oracles, replacing model consensus with objective physical feedback. A single shared-parameter policy co-evolves across questioner and solver roles under DGE constraints: the questioner generates physically valid spatial questions grounded in scene observations, while the solver derives precise answers against DGE-verified ground truth. A task-adaptive scheduler endogenously concentrates training on the model's weakest categories, producing a dynamic curriculum without manual design. Experiments across nine benchmarks demonstrate that SpatialEvo achieves the highest average score at both 3B and 7B scales, with consistent gains on spatial reasoning benchmarks and no degradation on general visual understanding.", "link": "http://arxiv.org/abs/2604.14144v1", "date": "2026-04-15", "relevancy": 2.3656, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6063}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5884}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5884}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SpatialEvo%3A%20Self-Evolving%20Spatial%20Intelligence%20via%20Deterministic%20Geometric%20Environments&body=Title%3A%20SpatialEvo%3A%20Self-Evolving%20Spatial%20Intelligence%20via%20Deterministic%20Geometric%20Environments%0AAuthor%3A%20Dinging%20Li%20and%20Yingxiu%20Zhao%20and%20Xinrui%20Cheng%20and%20Kangheng%20Lin%20and%20Hongbo%20Peng%20and%20Hongxing%20Li%20and%20Zixuan%20Wang%20and%20Yuhong%20Dai%20and%20Haodong%20Li%20and%20Jia%20Wang%20and%20Yukang%20Shi%20and%20Liang%20Zhao%20and%20Jianjian%20Sun%20and%20Zheng%20Ge%20and%20Xiangyu%20Zhang%20and%20Weiming%20Lu%20and%20Jun%20Xiao%20and%20Yueting%20Zhuang%20and%20Yongliang%20Shen%0AAbstract%3A%20Spatial%20reasoning%20over%20three-dimensional%20scenes%20is%20a%20core%20capability%20for%20embodied%20intelligence%2C%20yet%20continuous%20model%20improvement%20remains%20bottlenecked%20by%20the%20cost%20of%20geometric%20annotation.%20The%20self-evolving%20paradigm%20offers%20a%20promising%20path%2C%20but%20its%20reliance%20on%20model%20consensus%20to%20construct%20pseudo-labels%20causes%20training%20to%20reinforce%20rather%20than%20correct%20the%20model%27s%20own%20geometric%20errors.%20We%20identify%20a%20property%20unique%20to%203D%20spatial%20reasoning%20that%20circumvents%20this%20limitation%3A%20ground%20truth%20is%20a%20deterministic%20consequence%20of%20the%20underlying%20geometry%2C%20computable%20exactly%20from%20point%20clouds%20and%20camera%20poses%20without%20any%20model%20involvement.%20Building%20on%20this%20insight%2C%20we%20present%20SpatialEvo%2C%20a%20self-evolving%20framework%20for%203D%20spatial%20reasoning%2C%20centered%20on%20the%20Deterministic%20Geometric%20Environment%20%28DGE%29.%20The%20DGE%20formalizes%2016%20spatial%20reasoning%20task%20categories%20under%20explicit%20geometric%20validation%20rules%20and%20converts%20unannotated%203D%20scenes%20into%20zero-noise%20interactive%20oracles%2C%20replacing%20model%20consensus%20with%20objective%20physical%20feedback.%20A%20single%20shared-parameter%20policy%20co-evolves%20across%20questioner%20and%20solver%20roles%20under%20DGE%20constraints%3A%20the%20questioner%20generates%20physically%20valid%20spatial%20questions%20grounded%20in%20scene%20observations%2C%20while%20the%20solver%20derives%20precise%20answers%20against%20DGE-verified%20ground%20truth.%20A%20task-adaptive%20scheduler%20endogenously%20concentrates%20training%20on%20the%20model%27s%20weakest%20categories%2C%20producing%20a%20dynamic%20curriculum%20without%20manual%20design.%20Experiments%20across%20nine%20benchmarks%20demonstrate%20that%20SpatialEvo%20achieves%20the%20highest%20average%20score%20at%20both%203B%20and%207B%20scales%2C%20with%20consistent%20gains%20on%20spatial%20reasoning%20benchmarks%20and%20no%20degradation%20on%20general%20visual%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14144v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSpatialEvo%253A%2520Self-Evolving%2520Spatial%2520Intelligence%2520via%2520Deterministic%2520Geometric%2520Environments%26entry.906535625%3DDinging%2520Li%2520and%2520Yingxiu%2520Zhao%2520and%2520Xinrui%2520Cheng%2520and%2520Kangheng%2520Lin%2520and%2520Hongbo%2520Peng%2520and%2520Hon {"title": "Target-Bench: Can Video World Models Achieve Mapless Path Planning with Semantic Targets?", "author": "Dingrui Wang and Zhihao Liang and Hongyuan Ye and Zhexiao Sun and Zhaowei Lu and Yuchen Zhang and Yuyu Zhao and Yuan Gao and Marvin Seegert and Finn Sch\u00e4fer and Haotong Qin and Wei Li and Luigi Palmieri and Felix Jahncke and Mattia Piccinini and Johannes Betz", "abstract": "While recent video world models can generate highly realistic videos, their ability to perform semantic reasoning and planning remains unclear and unquantified. We introduce Target-Bench, the first benchmark that enables comprehensive evaluation of video world models' semantic reasoning, spatial estimation, and planning capabilities. Target-Bench provides 450 robot-collected scenarios spanning 47 semantic categories, with SLAM-based trajectories serving as motion tendency references. Our benchmark reconstructs motion from generated videos with a metric scale recovery mechanism, enabling the evaluation of planning performance with five complementary metrics that focus on target-approaching capability and directional consistency. Our evaluation result shows that the best off-the-shelf model achieves only a 0.341 overall score, revealing a significant gap between realistic visual generation and semantic reasoning in current video world models. Furthermore, we demonstrate that fine-tuning process on a relatively small real-world robot dataset can significantly improve task-level planning performance.", "link": "http://arxiv.org/abs/2511.17792v2", "date": "2026-04-15", "relevancy": 2.3449, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5966}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5841}, {"title": "Lexicon3D: Probing Visual Foun {"title": "One Token per Highly Selective Frame: Towards Extreme Compression for Long Video Understanding", "author": "Zheyu Zhang and Ziqi Pang and Shixing Chen and Xiang Hao and Vimal Bhat and Yu-Xiong Wang", "abstract": "Long video understanding is inherently challenging for vision-language models (VLMs) because of the extensive number of frames. With each video frame typically expanding into tens or hundreds of tokens, the limited context length of large language models (LLMs) forces the VLMs to perceive the frames sparsely and lose temporal information. To address this, we explore extreme video token compression towards \\emph{one token per frame} at the final LLM layer. Our key insight is that heuristic-based compression, widely adopted by previous methods, is prone to information loss, and this necessitates supervising LLM layers into \\emph{learnable} and \\emph{progressive} modules for \\emph{token-level compression} (LP-Comp). Such compression enables our VLM to digest 2x-4x more frames with improved performance. To further increase the token efficiency, we investigate \\emph{frame-level compression}, which selects the frames most relevant to the queries via the internal attention scores of the LLM layers, named \\emph{question-conditioned compression} (QC-Comp). As a notable distinction from previous studies, we mitigate the position bias of LLM attention in long contexts, \\emph{i.e.}, the over-concentration on the beginning and end of a sequence, by splitting long videos into short segments and employing local attention. Collectively, our combined \\emph{token-level} and \\emph{frame-level} leads to an e\\textbf{x}treme compression model for long video understanding, named \\textbf{\\name}, achieving a significantly larger compression ratio and enabling denser frame sampling. Our \\name is finetuned from VideoChat-Flash with a data-efficient \\emph{supervised compression tuning} stage that only requires 2.5\\% of the supervised fine-tuning data, yet boosts the accuracy from 42.9\\% to 46.2\\% on LVBench and enhances multiple other long video benchmarks.", "link": "http://arxiv.org/abs/2604.14149v1", "date": "2026-04-15", "relevancy": 2.3448, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5862}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5862}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.586}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20One%20Token%20per%20Highly%20Selective%20Frame%3A%20Towards%20Extreme%20Compression%20for%20Long%20Video%20Understanding&body=Title%3A%20One%20Token%20per%20Highly%20Selective%20Frame%3A%20Towards%20Extreme%20Compression%20for%20Long%20Video%20Understanding%0AAuthor%3A%20Zheyu%20Zhang%20and%20Ziqi%20Pang%20and%20Shixing%20Chen%20and%20Xiang%20Hao%20and%20Vimal%20Bhat%20and%20Yu-Xiong%20Wang%0AAbstract%3A%20Long%20video%20understanding%20is%20inherently%20challenging%20for%20vision-language%20models%20%28VLMs%29%20because%20of%20the%20extensive%20number%20of%20frames.%20With%20each%20video%20frame%20typically%20expanding%20into%20tens%20or%20hundreds%20of%20tokens%2C%20the%20limited%20context%20length%20of%20large%20language%20models%20%28LLMs%29%20forces%20the%20VLMs%20to%20perceive%20the%20frames%20sparsely%20and%20lose%20temporal%20information.%20To%20address%20this%2C%20we%20explore%20extreme%20video%20token%20compression%20towards%20%5Cemph%7Bone%20token%20per%20frame%7D%20at%20the%20final%20LLM%20layer.%20Our%20key%20insight%20is%20that%20heuristic-based%20compression%2C%20widely%20adopted%20by%20previous%20methods%2C%20is%20prone%20to%20information%20loss%2C%20and%20this%20necessitates%20supervising%20LLM%20layers%20into%20%5Cemph%7Blearnable%7D%20and%20%5Cemph%7Bprogressive%7D%20modules%20for%20%5Cemph%7Btoken-level%20compression%7D%20%28LP-Comp%29.%20Such%20compression%20enables%20our%20VLM%20to%20digest%202x-4x%20more%20frames%20with%20improved%20performance.%20To%20further%20increase%20the%20token%20efficiency%2C%20we%20investigate%20%5Cemph%7Bframe-level%20compression%7D%2C%20which%20selects%20the%20frames%20most%20relevant%20to%20the%20queries%20via%20the%20internal%20attention%20scores%20of%20the%20LLM%20layers%2C%20named%20%5Cemph%7Bquestion-conditioned%20compression%7D%20%28QC-Comp%29.%20As%20a%20notable%20distinction%20from%20previous%20studies%2C%20we%20mitigate%20the%20position%20bias%20of%20LLM%20attention%20in%20long%20contexts%2C%20%5Cemph%7Bi.e.%7D%2C%20the%20over-concentration%20on%20the%20beginning%20and%20end%20of%20a%20sequence%2C%20by%20splitting%20long%20videos%20into%20short%20segments%20and%20employing%20local%20attention.%20Collectively%2C%20our%20combined%20%5Cemph%7Btoken-level%7D%20and%20%5Cemph%7Bframe-level%7D%20leads%20to%20an%20e%5Ctextbf%7Bx%7Dtreme%20compression%20model%20for%20long%20video%20understanding%2C%20named%20%5Ctextbf%7B%5Cname%7D%2C%20achieving%20a%20significantly%20larger%20compression%20ratio%20and%20enabling%20denser%20frame%20sampling.%20Our%20%5Cname%20is%20finetuned%20from%20VideoChat-Flash%20with%20a%20data-efficient%20%5Cemph%7Bsupervised%20compression%20tuning%7D%20stage%20that%20only%20requires%202.5%5C%25%20of%20the%20supervised%20fine-tuning%20data%2C%20yet%20boosts%20the%20accuracy%20from%2042.9%5C%25%20to%2046.2%5C%25%20on%20LVBench%20and%20enhances%20multiple%20other%20long%20video%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14149v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOne%2520Token%2520per%2520Highly%2520Selective%2520Frame%253A%2520Towards%2520Extreme%2520Compression%2520for%2520Long%2520Video%2520Underst 20With%20each%20video%20frame%20typically%20expanding%20into%20tens%20or%20hundreds%20of%20tokens%2C%20the%20limited%20context%20length%20of%20large%20language%20models%20%28LLMs%29%20forces%20the%20VLMs%20to%20perceive%20the%20frames%20sparsely%20and%20lose%20temporal%20information.%20To%20address%20this%2C%20we%20explore%20extreme%20video%20token%20compression%20towards%20%5Cemph%7Bone%20token%20per%20frame%7D%20at%20the%20final%20LLM%20layer.%20Our%20key%20insight%20is%20that%20heuristic-based%20compression%2C%20widely%20adopted%20by%20previous%20methods%2C%20is%20prone%20to%20information%20loss%2C%20and%20this%20necessitates%20supervising%20LLM%20layers%20into%20%5Cemph%7Blearnable%7D%20and%20%5Cemph%7Bprogressive%7D%20modules%20for%20%5Cemph%7Btoken-level%20compression%7D%20%28LP-Comp%29.%20Such%20compression%20enables%20our%20VLM%20to%20digest%202x-4x%20more%20frames%20with%20improved%20performance.%20To%20further%20increase%20the%20token%20efficiency%2C%20we%20investigate%20%5Cemph%7Bframe-level%20compression%7D%2C%20which%20selects%20the%20frames%20most%20relevant%20to%20the%20queries%20via%20the%20internal%20attention%20scores%20of%20the%20LLM%20layers%2C%20named%20%5Cemph%7Bquestion-conditioned%20compression%7D%20%28QC-Comp%29.%20As%20a%20notable%20distinction%20from%20previous%20studies%2C%20we%20mitigate%20the%20position%20bias%20of%20LLM%20attention%20in%20long%20contexts%2C%20%5Cemph%7Bi.e.%7D%2C%20the%20over-concentration%20on%20the%20beginning%20and%20end%20of%20a%20sequence%2C%20by%20splitting%20long%20videos%20into%20short%20segments%20and%20employing%20local%20attention.%20Collectively%2C%20our%20combined%20%5Cemph%7Btoken-level%7D%20and%20%5Cemph%7Bframe-level%7D%20leads%20to%20an%20e%5Ctextbf%7Bx%7Dtreme%20compression%20model%20for%20long%20video%20understanding%2C%20named%20%5Ctextbf%7B%5Cname%7D%2C%20achieving%20a%20significantly%20larger%20compression%20ratio%20and%20enabling%20denser%20frame%20sampling.%20Our%20%5Cname%20is%20finetuned%20from%20VideoChat-Flash%20with%20a%20data-efficient%20%5Cemph%7Bsupervised%20compression%20tuning%7D%20stage%20that%20only%20requires%202.5%5C%25%20of%20the%20supervised%20fine-tuning%20data%2C%20yet%20boosts%20the%20accuracy%20from%2042.9%5C%25%20to%2046.2%5C%25%20on%20LVBench%20and%20enhances%20multiple%20other%20long%20video%20benchmarks.&entry.1838667208=http%3A//arxiv.org/abs/2604.14149v1&entry.124074799=Read"},
{"title": "ASTRA: Enhancing Multi-Subject Generation with Retrieval-Augmented Pose Guidance and Disentangled Position Embedding", "author": "Tianze Xia and Zijian Ning and Zonglin Zhao and Mingjia Wang", "abstract": "Subject-driven image generation has shown great success in creating personalized content, but its capabilities are largely confined to single subjects in common poses. Current approaches face a fundamental conflict when handling multiple subjects with complex, distinct actions: preserving individual identities while enforcing precise pose structures. This challenge often leads to identity fusion and pose distortion, as appearance and structure signals become entangled within the model's architecture. To resolve this conflict, we introduce ASTRA(Adaptive Synthesis through Targeted Retrieval Augmentation), a novel framework that architecturally disentangles subject appearance from pose structure within a unified Diffusion Transformer. ASTRA achieves this through a dual-pronged strategy. It first employs a Retrieval-Augmented Pose (RAG-Pose) pipeline to provide a clean, explicit structural prior from a curated database. Then, its core generative model learns to process these dual visual conditions using our Enhanced Universal Rotary Position Embedding (EURoPE), an asymmetric encoding mechanism that decouples identity tokens from spatial locations while binding pose tokens to the canvas. Concurrently, a Disentangled Semantic Modulation (DSM) adapter offloads the identity preservation task into the text conditioning stream. Extensive experiments demonstrate that our integrated approach achieves superior disentanglement. On our designed COCO-based complex pose benchmark, ASTRA achieves a new state-of-the-art in pose adherence, while maintaining high identity fidelity and text alignment in DreamBench.", "link": "http://arxiv.org/abs/2604.13938v1", "date": "2026-04-15", "relevancy": 2.3376, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5916}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.589}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.577}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ASTRA%3A%20Enhancing%20Multi-Subject%20Generation%20with%20Retrieval-Augmented%20Pose%20Guidance%20and%20Disentangled%20Position%20Embedding&body=Title%3A%20ASTRA%3A%20Enhancing%20Multi-Subject%20Generation%20with%20Retrieval-Augmented%20Pose%20Guidance%20and%20Disentangled%20Position%20Embedding%0AAuthor%3A%20Tianze%20Xia%20and%20Zijian%20Ning%20and%20Zonglin%20Zhao%20and%20Mingjia%20Wang%0AAbstract%3A%20Subject-driven%20image%20generation%20has%20shown%20great%20success%20in%20creating%20personalized%20content%2C%20but%20its%20capabilities%20are%20largely%20confined%20to%20single%20subjects%20in%20common%20poses.%20Current%20approaches%20face%20a%20fundamental%20conflict%20when%20handling%20multiple%20subjects%20with%20complex%2C%20distinct%20actions%3A%20preserving%20individual%20identities%20while%20enforcing%20precise%20pose%20structures.%20This%20challenge%20often%20leads%20to%20identity%20fusion%20and%20pose%20distortion%2C%20as%20appearance%20and%20structure%20signals%20become%20entangled%20within%20the%20model%27s%20architecture.%20To%20resolve%20this%20conflict%2C%20we%20introduce%20ASTRA%28Adaptive%20Synthesis%20through%20Targeted%20Retrieval%20Augmentation%29%2C%20a%20novel%20framework%20that%20architecturally%20disentangles%20subject%20appearance%20from%20pose%20structure%20within%20a%20unified%20Diffusion%20Transformer.%20ASTRA%20achieves%20this%20through%20a%20dual-pronged%20strategy.%20It%20first%20employs%20a%20Retrieval-Augmented%20Pose%20%28RAG-Pose%29%20pipeline%20to%20provide%20a%20clean%2C%20explicit%20structural%20prior%20from%20a%20curated%20database.%20Then%2C%20its%20core%20generative%20model%20learns%20to%20process%20these%20dual%20visual%20conditions%20using%20our%20Enhanced%20Universal%20Rotary%20Position%20Embedding%20%28EURoPE%29%2C%20an%20asymmetric%20encoding%20mechanism%20that%20decouples%20identity%20tokens%20from%20spatial%20locations%20while%20binding%20pose%20tokens%20to%20the%20canvas.%20Concurrently%2C%20a%20Disentangled%20Semantic%20Modulation%20%28DSM%29%20adapter%20offloads%20the%20identity%20preservation%20task%20into%20the%20text%20conditioning%20stream.%20Extensive%20experiments%20demonstrate%20that%20our%20integrated%20approach%20achieves%20superior%20disentanglement.%20On%20our%20designed%20COCO-based%20complex%20pose%20benchmark%2C%20ASTRA%20achieves%20a%20new%20state-of-the-art%20in%20pose%20adherence%2C%20while%20maintaining%20high%20identity%20fidelity%20and%20text%20alignment%20in%20DreamBench.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13938v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DASTRA%253A%2520Enhancing%2520Multi-Subject%2520Generation%2520with%2520Retrieval-Augmented%2520Pose%2520Guidance%2520and%2520Disentangled%2520Position%2520Embedding%26entry.906535625%3DTianze%2520Xia%2520and%2520Zijian%2520Ning%2520and%2520Zonglin%2520Zhao%2520and%2520Mingjia%2520Wang%26entry.1292438233%3DSubject-driven%2520image%2520generation%2520has%2520shown%2520great%2520success%2520in%2520creating%2520personalized%2520content%252C%2520but%2520its%2520capabilities%2520are%2520largely%2520confined%2520to%2520single%2520subjects%2520in%2520common%2520poses.%2520Current%2520approaches%2520face%2520a%2520fundamental%2520conflict%2520when%2520handling%2520multiple%2520subjects%2520with%2520complex%252C%2520distinct%2520actions%253A%2520preserving%2520individual%2520identities%2520while%2520enforcing%2520precise%2520pose%2520structures.%2520This%2520challenge%2520often%2520leads%2520to%2520identity%2520fusion%2520and%25 {"title": "From edges to meaning: Semantic line sketches as a cognitive scaffold for ancient pictograph invention", "author": "Seowung Leem and Lin Gu and Ruogu Fang", "abstract": "Humans readily recognize objects from sparse line drawings, a capacity that appears early in development and persists across cultures, suggesting neural rather than purely learned origins. Yet the computational mechanism by which the brain transforms high-level semantic knowledge into low-level visual symbols remains poorly understood. Here we propose that ancient pictographic writing emerged from the brain's intrinsic tendency to compress visual input into stable, boundary-based abstractions. We construct a biologically inspired digital twin of the visual hierarchy that encodes an image into low-level features, generates a contour sketch, and iteratively refines it through top-down feedback guided by semantic representations, mirroring the feedforward and recurrent architecture of the human visual cortex. The resulting symbols bear striking structural resemblance to early pictographs across culturally distant writing systems, including Egyptian hieroglyphs, Chinese oracle bone characters, and proto-cuneiform, and offer candidate interpretations for undeciphered scripts. Our findings support a neuro-computational origin of pictographic writing and establish a framework in which AI can recapitulate the cognitive processes by which humans first externalized perception into symbols.", "link": "http://arxiv.org/abs/2604.12865v2", "date": "2026-04-15", "relevancy": 2.3295, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4696}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4696}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http: ork%20in%20which%20AI%20can%20recapitulate%20the%20cognitive%20processes%20by%20which%20humans%20first%20externalized%20perception%20into%20symbols.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12865v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520edges%2520to%2520meaning%253A%2520Semantic%2520line%2520sketches%2520as%2520a%2520cognitive%2520scaffold%2520for%2520ancient%2520pictograph%2520invention%26entry.906535625%3DSeowung%2520Leem%2520and%2520Lin%2520Gu%2520and%2520Ruogu%2520Fang%26entry.1292438233%3DHumans%2520readily%2520recognize%2520objects%2520from%2520sparse%2520line%2520drawings%252C%2520a%2520capacity%2520that%2520appears%2520early%2520in%2520development%2520and%2520persists%2520across%2520cultures%252C%2520suggesting%2520neural%2520rather%2520than%2520purely%2520learned%2520origins.%2520Yet%2520the%2520computational%2520mechanism%2520by%2520which%2520the%2520brain%2520transforms%2520high-level%2520semantic%2520knowledge%2520into%2520low-level%2520visual%2520symbols%2520remains%2520poorly%2520understood.%2520Here%2520we%2520propose%2520that%2520ancient%2520pictographic%2520writing%2520emerged%2520from%2520the%2520brain%2527s%2520intrinsic%2520tendency%2520to%2520compress%2520visual%2520input%2520into%2520stable%252C%2520boundary-based%2520abstractions.%2520We%2520construct%2520a%2520biologically%2520inspired%2520digital%2520twin%2520of%2520the%2520visual%2520hierarchy%2520that%2520encodes%2520an%2520image%2520into%2520low-level%2520features%252C%2520generates%2520a%2520contour%2520sketch%252C%2520and%2520iteratively%2520refines%2520it%2520through%2520top-down%2520feedback%2520guided%2520by%2520semantic%2520representations%252C%2520mirroring%2520the%2520feedforward%2520and%2520recurrent%2520architecture%2520of%2520the%2520human%2520visual%2520cortex.%2520The%2520resulting%2520symbols%2520bear%2520striking%2520structural%2520resemblance%2520to%2520early%2520pictographs%2520across%2520culturally%2520distant%2520writing%2520systems%252C%2520including%2520Egyptian%2520hieroglyphs%252C%2520Chinese%2520oracle%2520bone%2520characters%252C%2520and%2520proto-cuneiform%252C%2520and%2520offer%2520candidate%2520interpretations%2520for%2520undeciphered%2520scripts.%2520Our%2520findings%2520support%2520a%2520neuro-computational%2520origin%2520of%2520pictographic%2520writing%2520and%2520establish%2520a%2520framework%2520in%2520which%2520AI%2520can%2520recapitulate%2520the%2520cognitive%2520processes%2520by%2520which%2520humans%2520first%2520externalized%2520perception%2520into%2520symbols.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.12865v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=From%20edges%20to%20meaning%3A%20Semantic%20line%20sketches%20as%20a%20cognitive%20scaffold%20for%20ancient%20pictograph%20invention&entry.906535625=Seowung%20Leem%20and%20Lin%20Gu%20and%20Ruogu%20Fang&entry.1292438233=Humans%20readily%20recognize%20objects%20from%20sparse%20line%20drawings%2C%20a%20capacity%20that%20appears%20early%20in%20development%20and%20persists%20across%20cultures%2C%20suggesting%20neural%20rather%20than%20purely%20learned%20origins.%20Yet%20the%20computational%20mechanism%20by%20which%20the%20brain%20transforms%20high-level%20semantic%20knowledge%20into%20low-level%20visual%20symbols%20remains%20poorly%20understood.%20Here%20we%20propose%20that%20ancient%20pictographic%20writing%20emerged%20from%20the%20brain%27s%20intrinsic%20tendency%20to%20compress%20visual%20input%20into%20stable%2C%20boundary-based%20abstractions.%20We%20construct%20a%20biologically%20inspired%20digital%20twin%20of%20the%20visual%20hierarchy%20that%20encodes%20an%20image%20into%20low-level%20features%2C%20generates%20a%20contour%20sketch%2C%20and%20iteratively%20refines%20it%20through%20top-down%20feedback%20guided%20by%20semantic%20representations%2

{"title": "LangFlow: Continuous Diffusion Rivals Discrete in Language Modeling", "author": "Yuxin Chen and Chumeng Liang and Hangke Sui and Ruihan Guo and Chaoran Cheng and Jiaxuan You and Ge Liu", "abstract": "Continuous diffusion has been the foundation of high-fidelity, controllable, and few-step generation of many data modalities such as images. However, in language modeling, prior continuous diffusion language models (DLMs) lag behind discrete counterparts due to the sparse data space and the underexplored design space. In this work, we close this gap with LangFlow, the first continuous DLM to rival discrete diffusion, by connecting embedding-space DLMs to Flow Matching via Bregman divergence, alongside three key innovations: (1) we derive a novel ODE-based NLL bound for principled evaluation of continuous flow-based language models; (2) we propose an information-uniform principle for setting the noise schedule, which motivates a learnable noise scheduler based on a Gumbel distribution; and (3) we revise prior training protocols by incorporating self-conditioning, as we find it improves both likelihood and sample quality of embedding-space DLMs with effects substantially different from discrete diffusion. Putting everything together, LangFlow rivals top discrete DLMs on both the perplexity (PPL) and the generative perplexity (Gen. PPL), reaching a PPL of 30.0 on LM1B and 24.6 on OpenWebText. It even exceeds autoregressive baselines in zero-shot transfer on 4 out of 7 benchmarks. LangFlow provides the first clear evidence that continuous diffusion is a promising paradigm for language modeling. Homepage: https://github.com/nealchen2003/LangFlow", "link": "http://arxiv.org/abs/2604.11748v3", "date": "2026-04-15", "relevancy": 1.1523, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.6337}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5866}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5081}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LangFlow%3A%20Continuous%20Diffusion%20Rivals%20Discrete%20in%20Language%20Modeling&body=Title%3A%20LangFlow%3A%20Continuous%20Diffusion%20Rivals%20Discrete%20in%20Language%20Modeling%0AAuthor%3A%20Yuxin%20Chen%20and%20Chumeng%20Liang%20and%20Hangke%20Sui%20and%20Ruihan%20Guo%20and%20Chaoran%20Cheng%20and%20Jiaxuan%20You%20and%20Ge%20Liu%0AAbstract%3A%20Continuous%20diffusion%20has%20been%20the%20foundation%20of%20high-fidelity%2C%20controllable%2C%20and%20few-step%20generation%20of%20many%20data%20modalities%20such%20as%20images.%20However%2C%20in%20language%20modeling%2C%20prior%20continuous%20diffusion%20language%20models%20%28DLMs%29%20lag%20behind%20discrete%20counterparts%20due%20to%20the%20sparse%20data%20space%20and%20the%20underexplored%20design%20space.%20In%20this%20work%2C%20we%20close%20this%20gap%20with%20LangFlow%2C%20the%20first%20continuous%20DLM%20to%20rival%20discrete%20diffusion%2C%20by%20connecting%20embedding-space%20DLMs%20to%20Flow%20Matching%20via%20Bregman%20divergence%2C%20alongside%20three%20key%20innovations%3A%20%281%29%20we%20derive%20a%20novel%20ODE-based%20NLL%20bound%20for%20principled%20evaluation%20of%20continuous%20flow-based%20language%20models%3B%20%282%29%20we%20propose%20an%20information-uniform%20principle%20for%20setting%20the%20noise%20schedule%2C%20which%20motivates%20a%20learnable%20noise%20scheduler%20based%20on%20a%20Gumbel%20distribution%3B%20and%20%283%29%20we%20revise%20prior%20training%20protocols%20by%20incorporating%20self-conditioning%2C%20as%20we%20find%20it%20improves%20both%20likelihood%20and%20sample%20quality%20of%20embedding-space%20DLMs%20with%20effects%20substantially%20different%20from%20discrete%20diffusion.%20Putting%20everything%20together%2C%20LangFlow%20rivals%20top%20discrete%20DLMs%20on%20both%20the%20perplexity%20%28PPL%29%20and%20the%20generative%20perplexity%20%28Gen.%20PPL%29%2C%20reaching%20a%20PPL%20of%2030.0%20on%20LM1B%20and%2024.6%20on%20OpenWebText.%20It%20even%20exceeds%20autoregressive%20baselines%20in%20zero-shot%20transfer%20on%204%20out%20of%207%20benchmarks.%20LangFlow%20provides%20the%20first%20clear%20evidence%20that%20continuous%20diffusion%20is%20a%20promising%20paradigm%20for%20language%20modeling.%20Homepage%3A%20https%3A//github.com/nealchen2003/LangFlow%0ALink%3A%20http%3A//arxiv.org/abs/2604.11748v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLangFlow%253A%2520Continuous%2520Diffusion%2520Rivals%2520Discrete%2520in%2520Language%2520Modeling%26entry.906535625%3DYuxin%2520Chen%2520and%2520Chumeng%2520Liang%2520and%2520Hangke%2520Sui%2520and%2520Ruihan%2520Guo%2520and%2520Chaoran%2520Cheng%2520and%2520Jiaxuan%2520You%2520and%2520Ge%2520Liu%26entry.1292438233%3DContinuous%2520diffusion%2520has%2520been%2520the%2520foundation%2520of%2520high-fidelity%252C%2520controllable%252C%2520and%2520few-step%2520generation%2520of%2520many%2520data%2520modalities%2520such%2520as%2520images.%2520However%252C%2520in%2520language%2520modeling%252C%2520prior%2520continuous%2520diffusion%2520language%2520models%2520%2528DLMs%2529%2520lag%2520behind%2520discrete%2520counterparts%2520due%2520to%2520the%2520sparse%2520data%2520space%2520and%2520the%2520underexplored%2520design%2520space.%2520In%2520this%2520work%252C%2520we%2520close%2520this%2520gap%2520with%2520LangFlow%252C%2520the%2520first%2520continuous%2520DLM%2520to%2520rival%2520discrete%2520diffusion%252C%2520by%2520connecting%2520embedding-space%2520DLMs%2520to%2520Flow%2520Matching%2520via%2520Bregman%2520divergence%252C%2520alongside%2520three%2520key%2520innovations%253A%2520%25281%2529%2520we%2520derive%25 {"title": "From Anchors to Supervision: Memory-Graph Guided Corpus-Free Unlearning for Large Language Models", "author": "Wenxuan Li and Zhenfei Zhang and Mi Zhang and Geng Hong and Mi Wen and Xiaoyu You and Min Yang", "abstract": "Large language models (LLMs) may memorize sensitive or copyrighted content, raising significant privacy and legal concerns. While machine unlearning has emerged as a potential remedy, prevailing paradigms rely on user-provided forget sets, making unlearning requests difficult to audit and exposing systems to secondary leakage and malicious abuse. We propose MAGE, a Memory-grAph Guided Erasure framework for user-minimized, corpus-free unlearning. Given only a lightweight user anchor that identifies a target entity, MAGE probes the target LLM to recover target-related memorization, organizes it into a weighted local memory graph, and synthesizes scoped supervision for unlearning. MAGE is model-agnostic, can be plugged into standard unlearning methods, and requires no access to the original training corpus. Experiments on two benchmarks, TOFU and RWKU, demonstrate that MAGE's self-generated supervision achieves effective unlearning performance comparable to supervision generated with external reference, while preserving overall utility. These results support a practical and auditable unlearning workflow driven by minimal anchors rather than user-supplied forget corpora.", "link": "http://arxiv.org/abs/2604.13777v1", "date": "2026-04-15", "relevancy": 1.8878, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4903}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4784}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.451}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Anchors%20to%20Supervision%3A%20Memory-Graph%20Guided%20Corpus-Free%20Unlearning%20for%20Large%20Language%20Models&body=Title%3A%20From%20Anchors%20to%20Supervision%3A%20Memory-Graph%20Guided%20Corpus-Free%20Unlearning%20for%20Large%20Language%20Models%0AAuthor%3A%20Wenxuan%20Li%20and%20Zhenfei%20Zhang%20and%20Mi%20Zhang%20and%20Geng%20Hong%20and%20Mi%20Wen%20and%20Xiaoyu%20You%20and%20Min%20Yang%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20may%20memorize%20sensitive%20or%20copyrighted%20content%2C%20raising%20significant%20privacy%20and%20legal%20concerns.%20While%20machine%20unlearning%20has%20emerged%20as%20a%20potential%20remedy%2C%20prevailing%20paradigms%20rely%20on%20user-provided%20forget%20sets%2C%20making%20unlearning%20requests%20difficult%20to%20audit%20and%20exposing%20systems%20to%20secondary%20leakage%20and%20malicious%20abuse.%20We%20propose%20MAGE%2C%20a%20Memory-grAph%20Guided%20Erasure%20framework%20for%20user-minimized%2C%20corpus-free%20unlearning.%20Given%20only%20a%20lightweight%20user%20anchor%20that%20identifies%20a%20target%20entity%2C%20MAGE%20probes%20the%20target%20LLM%20to%20recover%20target-related%20memorization%2C%20organizes%20it%20into%20a%20weighted%20local%20memory%20graph%2C%20and%20synthesizes%20scoped%20supervision%20for%20unlearning.%20MAGE%20is%20model-agnostic%2C%20can%20be%20plugged%20into%20standard%20unlearning%20methods%2C%20and%20requires%20no%20access%20to%20the%20original%20training%20corpus.%20Experiments%20on%20two%20benchmarks%2C%20TOFU%20and%20RWKU%2C%20demonstrate%20that%20MAGE%27s%20self-generated%20supervision%20achieves%20effective%20unlearning%20performance%20comparable%20to%20supervision%20generated%20with%20external%20reference%2C%20while%20preserving%20overall%20utility.%20These%20results%20support%20a%20practical%20and%20auditable%20unlearning%20workflow%20driven%20by%20minimal%20anchors%20rather%20than%20user-supplied%20forget%20corpora.%0ALink%3A%20http%3A//arxiv.org/abs 520unlearning%2520performance%2520comparable%2520to%2520supervision%2520generated%2520with%2520external%2520reference%252C%2520while%2520preserving%2520overall%2520utility.%2520These%2520results%2520support%2520a%2520practical%2520and%2520auditable%2520unlearning%2520workflow%2520driven%2520by%2520minimal%2520anchors%2520rather%2520than%2520user-supplied%2520forget%2520corpora.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.13777v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=From%20Anchors%20to%20Supervision%3A%20Memory-Graph%20Guided%20Corpus-Free%20Unlearning%20for%20Large%20Language%20Models&entry.906535625=Wenxuan%20Li%20and%20Zhenfei%20Zhang%20and%20Mi%20Zhang%20and%20Geng%20Hong%20and%20Mi%20Wen%20and%20Xiaoyu%20You%20and%20Min%20Yang&entry.1292438233=Large%20language%20models%20%28LLMs%29%20may%20memorize%20sensitive%20or%20copyrighted%20content%2C%20raising%20significant%20privacy%20and%20legal%20concerns.%20While%20machine%20unlearning%20has%20emerged%20as%20a%20potential%20remedy%2C%20prevailing%20paradigms%20rely%20on%20user-provided%20forget%20sets%2C%20making%20unlearning%20requests%20difficult%20to%20audit%20and%20exposing%20systems%20to%20secondary%20leakage%20and%20malicious%20abuse.%20We%20propose%20MAGE%2C%20a%20Memory-grAph%20Guided%20Erasure%20framework%20for%20user-minimized%2C%20corpus-free%20unlearning.%20Given%20only%20a%20lightweight%20user%20anchor%20that%20identifies%20a%20target%20entity%2C%20MAGE%20probes%20the%20target%20LLM%20to%20recover%20target-related%20memorization%2C%20organizes%20it%20into%20a%20weighted%20local%20memory%20graph%2C%20and%20synthesizes%20scoped%20supervision%20for%20unlearning.%20MAGE%20is%20model-agnostic%2C%20can%20be%20plugged%20into%20standard%20unlearning%20methods%2C%20and%20requires%20no%20access%20to%20the%20original%20training%20corpus.%20Experiments%20on%20two%20benchmarks%2C%20TOFU%20and%20R {"title": "Empirical Prediction of Pedestrian Comfort in Mobile Robot Pedestrian Encounters", "author": "Alireza Jafari and Hong-Son Nguyen and Yen-Chen Liu", "abstract": "Mobile robots joining public spaces like sidewalks must care for pedestrian comfort. Many studies consider pedestrians' objective safety, for example, by developing collision avoidance algorithms, but not enough studies take the pedestrian's subjective safety or comfort into consideration. Quantifying comfort is a major challenge that hinders mobile robots from understanding and responding to human emotions. We empirically look into the relationship between the mobile robot-pedestrian interaction kinematics and subjective comfort. We perform one-on-one experimental trials, each involving a mobile robot and a volunteer. Statistical analysis of pedestrians' reported comfort versus the kinematic variables shows moderate but significant correlations for most variables. Based on these empirical findings, we design three comfort estimators/predictors derived from the minimum distance, the minimum projected time-to-collision, and a composite estimator. The composite estimator employs all studied kinematic variables and reaches the highest prediction rate and classifying performance among the predictors. The composite predictor has an odds ratio of 3.67. In simple terms, when it identifies a pedestrian as comfortable, it is almost 4 times more likely that the pedestrian is comfortable rather than uncomfortable. The study provides a comfort quantifier for incorporating pedestrian feelings into path planners for more socially compliant robots.", "link": "http://arxiv.org/abs/2604.13677v1", "date": "2026-04-15", "relevancy": 1.6879, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6095}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

{"title": "From Synchrony to Sequence: Exo-to-Ego Generation via Interpolation", "author": "Mohammad Mahdi and Nedko Savov and Danda Pani Paudel and Luc Van Gool", "abstract": "Exo-to-Ego video generation aims to synthesize a first-person video from a synchronized third-person view and corresponding camera poses. While paired supervision is available, synchronized exo-ego data inherently introduces substantial spatio-temporal and geometric discontinuities, violating the smooth-motion assumptions of standard video generation benchmarks. We identify this synchronization-induced jump as the central challenge and propose Syn2Seq-Forcing, a sequential formulation that interpolates between the source and target videos to form a single continuous signal. By reframing Exo2Ego as sequential signal modeling rather than a conventional condition-output task, our approach enables diffusion-based sequence models, e.g. Diffusion Forcing Transformers (DFoT), to capture coherent transitions across frames more effectively. Empirically, we show that interpolating only the videos, without performing pose interpolation already produces significant improvements, emphasizing that the dominant difficulty arises from spatio-temporal discontinuities. Beyond immediate performance gains, this formulation establishes a general and flexible framework capable of unifying both Exo2Ego and Ego2Exo generation within a single continuous sequence model, providing a principled foundation for future research in cross-view video synthesis.", "link": "http://arxiv.org/abs/2604.13793v1", "date": "2026-04-15", "relevancy": 2.3255, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5995}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.569}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.o equence%20model%2C%20providing%20a%20principled%20foundation%20for%20future%20research%20in%20cross-view%20video%20synthesis.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13793v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Synchrony%2520to%2520Sequence%253A%2520Exo-to-Ego%2520Generation%2520via%2520Interpolation%26entry.906535625%3DMohammad%2520Mahdi%2520and%2520Nedko%2520Savov%2520and%2520Danda%2520Pani%2520Paudel%2520and%2520Luc%2520Van%2520Gool%26entry.1292438233%3DExo-to-Ego%2520video%2520generation%2520aims%2520to%2520synthesize%2520a%2520first-person%2520video%2520from%2520a%2520synchronized%2520third-person%2520view%2520and%2520corresponding%2520camera%2520poses.%2520While%2520paired%2520supervision%2520is%2520available%252C%2520synchronized%2520exo-ego%2520data%2520inherently%2520introduces%2520substantial%2520spatio-temporal%2520and%2520geometric%2520discontinuities%252C%2520violating%2520the%2520smooth-motion%2520assumptions%2520of%2520standard%2520video%2520generation%2520benchmarks.%2520We%2520identify%2520this%2520synchronization-induced%2520jump%2520as%2520the%2520central%2520challenge%2520and%2520propose%2520Syn2Seq-Forcing%252C%2520a%2520sequential%2520formulation%2520that%2520interpolates%2520between%2520the%2520source%2520and%2520target%2520videos%2520to%2520form%2520a%2520single%2520continuous%2520signal.%2520By%2520reframing%2520Exo2Ego%2520as%2520sequential%2520signal%2520modeling%2520rather%2520than%2520a%2520conventional%2520condition-output%2520task%252C%2520our%2520approach%2520enables%2520diffusion-based%2520sequence%2520models%252C%2520e.g.%2520Diffusion%2520Forcing%2520Transformers%2520%2528DFoT%2529%252C%2520to%2520capture%2520coherent%2520transitions%2520across%2520frames%2520more%2520effectively.%2520Empirically%252C%2520we%2520show%2520that%2520interpolating%2520only%2520the%2520videos%252C%2520without%2520performing%2520pose%2520interpolation%2520already%2520produces%2520significant%2520improvements%252C%2520emphasizing%2520that%2520the%2520dominant%2520difficulty%2520arises%2520from%2520spatio-temporal%2520discontinuities.%2520Beyond%2520immediate%2520performance%2520gains%252C%2520this%2520formulation%2520establishes%2520a%2520general%2520and%2520flexible%2520framework%2520capable%2520of%2520unifying%2520both%2520Exo2Ego%2520and%2520Ego2Exo%2520generation%2520within%2520a%2520single%2520continuous%2520sequence%2520model%252C%2520providing%2520a%2520principled%2520foundation%2520for%2520future%2520research%2520in%2520cross-view%2520video%2520synthesis.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.13793v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=From%20Synchrony%20to%20Sequence%3A%20Exo-to-Ego%20Generation%20via%20Interpolation&entry.906535625=Mohammad%20Mahdi%20and%20Nedko%20Savov%20and%20Danda%20Pani%20Paudel%20and%20Luc%20Van%20Gool&entry.1292438233=Exo-to-Ego%20video%20generation%20aims%20to%20synthesize%20a%20first-person%20video%20from%20a%20synchronized%20third-person%20view%20and%20corresponding%20camera%20poses.%20While%20paired%20supervision%20is%20available%2C%20synchronized%20exo-ego%20data%20inherently%20introduces%20substantial%20spatio-temporal%20and%20geometric%20discontinuities%2C%20violating%20the%20smooth-motion%20assumptions%20of%20standard%20video%20generation%20benchmarks.%20We%20identify%20this%20synchronization-induced%20jump%20as%20the%20central%20challenge%20and%20propose%20Syn2Seq-Forcing%2C%20a%20sequential%20formulation%20that%20interpolates%20between%20the%20source%20and%20target%20videos%20to%20form%20a%20single%20continuous%20signal.%20By%20reframing%20Exo2Ego%20as%20sequential%20signal%20modeling%20rather%20than%20a%20conventional%20condition-output%20task%2C%20our%20approach%20enables%20diffusion-based%20sequence%20models%2C%20e.g.%20Diffusion%20Forcin {"title": "SiLVR: A Simple Language-based Video Reasoning Framework", "author": "Ce Zhang and Yan-Bo Lin and Ziyang Wang and Mohit Bansal and Gedas Bertasius", "abstract": "Recent advances in test-time optimization have led to remarkable reasoning capabilities in Large Language Models (LLMs), enabling them to solve highly complex problems in math and coding. However, the reasoning capabilities of multimodal LLMs (MLLMs) still significantly lag, especially for complex video-language tasks. To address this issue, we present SILVR, a Simple Language-based Video Reasoning framework that decomposes complex video understanding into two stages. In the first stage, SILVR transforms raw video into language-based representations using multisensory inputs, such as short clip captions and audio/speech subtitles. In the second stage, language descriptions are fed into a powerful reasoning LLM to solve complex video-language understanding tasks. To handle long-context multisensory inputs, we use an Adaptive Context Reduction scheme, which dynamically determines the temporal granularity with which to sample the tokens. Our simple, modular, and training-free video reasoning framework achieves the best-reported results on Video-MME (long), Video-MMMU (comprehension), Video-MMLU, CGBench, and EgoLife. Furthermore, our empirical study focused on video reasoning capabilities shows that, despite not being explicitly trained on video, strong reasoning LLMs can effectively aggregate multisensory input information from video, speech, and audio for complex temporal, causal, long-context, and knowledge acquisition reasoning tasks in video. More details can be found at https://sites.google.com/cs.unc.edu/silvr.", "link": "http://arxiv.org/abs/2505.24869v3", "date": "2026-04-15", "relevancy": 2.3212, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5889}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5889}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5371}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SiLVR%3A%20A%20Simple%20Language-based%20Video%20Reasoning%20Framework&body=Title%3A%20SiLVR%3A%20A%20Simple%20Language-based%20Video%20Reasoning%20Framework%0AAuthor%3A%20Ce%20Zhang%20and%20Yan-Bo%20Lin%20and%20Ziyang%20Wang%20and%20Mohit%20Bansal%20and%20Gedas%20Bertasius%0AAbstract%3A%20Recent%20advances%20in%20test-time%20optimization%20have%20led%20to%20remarkable%20reasoning%20capabilities%20in%20Large%20Language%20Models%20%28LLMs%29%2C%20enabling%20them%20to%20solve%20highly%20complex%20problems%20in%20math%20and%20coding.%20However%2C%20the%20reasoning%20capabilities%20of%20multimodal%20LLMs%20%28MLLMs%29%20still%20significantly%20lag%2C%20especially%20for%20complex%20video-language%20tasks.%20To%20address%20this%20issue%2C%20we%20present%20SILVR%2C%20a%20Simple%20Language-based%20Video%20Reasoning%20framework%20that%20decomposes%20complex%20video%20understanding%20into%20two%20stages.%20In%20the%20first%20stage%2C%20SILVR%20transforms%20raw%20video%20into%20language-based%20representations%20using%20multisensory%20inputs%2C%20such%20as%20short%20clip%20captions%20and%20audio/speech%20subtitles.%20In%20the%20second%20stage%2C%20language%20descriptions%20are%20fed%20into%20a%20powerful%20reasoning%20LLM%20to%20solve%20complex%20video-language%20understanding%20tasks.%20To%20handle%20long-context%20multisensory%20inputs%2C%20we%20use%20an%20Adaptive%20Context%20Reduction%20scheme%2C%20which%20dynamically%20determines%20the%20temporal%20granularity%20with%20which%20to%20sample%20the%20tokens.%20Our%20simple%2C%20modular%2C%20and%20training-free%20video%20reasoning%20framework%20achieves%20the%20best-reported%20results%20on%20Video-MME%20%28long%29%2C%20Video-MMMU%20%28comprehension%29%2C%20Video-MMLU%2C%20CGBench%2C%20and%20EgoLife.%20Furthermore%2C%20our%20empirical%20study%20focused%20on%20video%20reasoning%20capabilities%20shows%20that%2C%20despite%20not%20being%20explicitly%20trained%20on%20video%2C%20strong%20reasoning%20LLMs%20can%20effectively%20aggregate%20multisensory%20input%20information%20from%20video%2C%20speech%2C%20and%20audio%20for%20complex%20temporal%2C%20causal%2C%20long-context%2C%20and%20knowledge%20acquisition%20reasoning%20tasks%20in%20video.%20More%20details%20can%20be%20found%20at%20https%3A//sites.google.com/cs.unc.edu/silvr.%0ALink%3A%20http%3A//arxiv.org/abs/2505.24869v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSiLVR%253A%2520A%2520Simple%2520Language-based%2520Video%2520Reasoning%2520Framework%26entry.906535625%3DCe%2520Zhang%2520and%2520Yan-Bo%2520Lin%2520and%2520Ziyang%2520Wang%2520and%2520Mohit%2520Bansal%2520and%2520Gedas%2520Bertasius%26entry.1292438233%3DRecent%2520advances%2520in%2520test-time%2520optimization%2520have%2520led%2520to%2520remarkable%2520reasoning%2520capabilities%2520in%2520Large%2520Language%2520Models%2520%2528LLMs%2529%252C%2520enabling%2520them%2520to%2520solve%2520highly%2520complex%2520problems%2520in%2520math%2520and%2520coding.%2520However%252C%2520the%2520reasoning%2520capabilities%2520of%2520multimodal%2520LLMs%2520%2528MLLMs%2529%2520still%2520significantly%2520lag%252C%2520especially%2520for%2520complex%2520video-language%2520tasks.%2520To%2520address%2520this%2520issue%252C%2520we%2520present%2520SILVR%252C%2520a%2520Simple%2520Language-based%2520Video%2520Reasoning%2520framework%2520that%2520decomposes%2520complex%2520video%2520understanding%2520into%2520two%2520stages.%2520In%2520the%2520first%2520stage%252C%2520SILVR%2520transforms%2520raw%2520video%2520into%2520language-based%2520representations%2520using%2520multisensory%2520inputs%252C%2520such%2520as%2520short%2520clip%2520captions%2520and%2520audio/speech%2520subtitles.%2520In%2520the%2520second%2520stage%252C%2520language%2520descriptions%2520are%2520fed%2520into%2520a%2520powerful%2520reasoning%2520LLM%2520to%2520solve%2520complex%2520video-language%2520understanding%2520tasks.%2520To%2520handle%2520long-context%2520multisensory%2520inputs%252C%2520we%2520use%2520an%2520Adaptive%2520Context%2520Reduction%2520scheme%252C%2520which%2520dynamically%2520determines%2520the%2520temporal%2520granularity%2520with%2520which%2520to%2520sample%2520the%2520tokens.%2520Our%2520simple%252C%2520modular%252C%2520and%2520training-free%2520video%2520reasoning%2520framework%2520achieves%2520the%2520best-reported%2520results%2520on%2520Video-MME%2520%2528long%2529%252C%2520Video-MMMU%2520%2528comprehension%2529%252C%2520Video-MMLU%252C%2520CGBench%252C%2520and%2520EgoLife.%2520Furthermore%252C%2520our%2520empirical%2520study%2520focused%2520on%2520video%2520reasoning%2520capabilities%2520shows%2520that%252C%2520despite%2520not%2520being%2520explicitly%2520trained%2520on%2520video%252C%2520strong%2520reasoning%2520LLMs%2520can%2520effectively%2520aggregate%2520multisensory%2520input%2520information%2520from%2520video%252C%2520speech%252C%2520and%2520audio%2520for%2520complex%2520temporal%252C%2520causal%252C%2520long-context%252C%2520and%2520knowledge%2520acquisition%2520reasoning%2520tasks%2520in%2520video.%2520More%2520details%2520can%2520be%2520found%2520at%2520https%253A//sites.google.com/cs.unc.edu/silvr.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2505.24869v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SiLVR%3A%20A%20Simple%20Language-based%20Video%20Reasoning%20Framework&entry.906535625=Ce%20Zhang%20and%20Yan-Bo%20Lin%20and%20Ziyang%20Wang%20and%20Mohit%20Bansal%20and%20Gedas%20Be {"title": "OneHOI: Unifying Human-Object Interaction Generation and Editing", "author": "Jiun Tian Hoe and Weipeng Hu and Xudong Jiang and Yap-Peng Tan and Chee Seng Chan", "abstract": "Human-Object Interaction (HOI) modelling captures how humans act upon and relate to objects, typically expressed as <person, action, object> triplets. Existing approaches split into two disjoint families: HOI generation synthesises scenes from structured triplets and layout, but fails to integrate mixed conditions like HOI and object-only entities; and HOI editing modifies interactions via text, yet struggles to decouple pose from physical contact and scale to multiple interactions. We introduce OneHOI, a unified diffusion transformer framework that consolidates HOI generation and editing into a single conditional denoising process driven by shared structured interaction representations. At its core, the Relational Diffusion Transformer (R-DiT) models verb-mediated relations through role- and instance-aware HOI tokens, layout-based spatial Action Grounding, a Structured HOI Attention to enforce interaction topology, and HOI RoPE to disentangle multi-HOI scenes. Trained jointly with modality dropout on our HOI-Edit-44K, along with HOI and object-centric datasets, OneHOI supports layout-guided, layout-free, arbitrary-mask, and mixed-condition control, achieving state-of-the-art results across both HOI generation and editing. Code is available at https://jiuntian.github.io/OneHOI/.", "link": "http://arxiv.org/abs/2604.14062v1", "date": "2026-04-15", "relevancy": 2.3115, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5874}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5861}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5333}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OneHOI%3A%20Unifying%20Human-Object%20Interaction%20Generation%20and%20Editing&body=Title%3A%20OneHOI%3A%20Unifying%20Human-Object%20Interaction%20Generation%20and%20Editing%0AAuthor%3A%20Jiun%20Tian%20Hoe%20and%20Weipeng%20Hu%20and%20Xudong%20Jiang%20and%20Yap-Peng%20Tan%20and%20Chee%20Seng%20Chan%0AAbstract%3A%20Human-Object%20Interaction%20%28HOI%29%20modelling%20captures%20how%20humans%20act%20upon%20and%20relate%20to%20objects%2C%20typically%20expressed%20as%20%3Cperson%2C%20action%2C%20object%3E%20triplets.%20Existing%20approaches%20split%20into%20two%20disjoint%20families%3A%20HOI%20generation%20synthesises%20scenes%20from%20structured%20triplets%20and%20layout%2C%20but%20fails%20to%20integrate%20mixed%20conditions%20like%20HOI%20and%20object-only%20entities%3B%20and%20HOI%20editing%20modifies%20interactions%20via%20text%2C%20yet%20struggles%20to%20decouple%20pose%20from%20physical%20contact%20and%20scale%20to%20multiple%20interactions.%20We%20introduce%20OneHOI%2C%20a%20unified%20diffusion%20transformer%20framework%20that%20consolidates%20HOI%20generation%20and%20editing%20into%20a%20single%20conditional%20denoising%20process%20driven%20by%20shared%20structured%20interaction%20representations.%20At%20its%20core%2C%20the%20Relational%20Diffusion%20Transformer%20%28R-DiT%29%20models%20verb-mediated%20relations%20through%20role-%20and%20instance-aware%20HOI%20tokens%2C%20layout-based%20spatial%20Action%20Grounding%2C%20a%20Structured%20HOI%20Attention%20to%20enforce%20interaction%20topology%2C%20and%20HOI%20RoPE%20to%20disentangle%20multi-HOI%20scenes.%20Trained%20jointly%20with%20modality%20dropout%20on%20our%20HOI-Edit-44K%2C%20along%20with%20HOI%20and%20object-centric%20datasets%2C%20OneHOI%20supports%20layout-guided%2C%20layout-free%2C%20arbitrary-mask%2C%20and%20mixed-condition%20control%2C%20achieving%20state-of-the-art%20results%20across%20both%20HOI%20generation%20and%20editing.%20Code%20is%20available%20at%20https%3A//jiuntian.github.io/OneHOI/.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14062v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOneHOI%253A%2520Unifying%2520Human-Object%2520Interaction%2520Generation%2520and%2520Editing%26entry.906535625%3DJiun%2520Tian%2520Hoe%2520and%2520Weipeng%2520Hu%2520and%2520Xudong%2520Jiang%2520and%2520Yap-Peng%2520Tan%2520and%2520Chee%2520Seng%2520Chan%26entry.1292438233%3DHuman-Object%2520Interaction%2520%2528HOI%2529%2520modelling%2520captures%2520how%2520humans%2520act%2520upon%2520and%2520relate%2520to%2520objects%252C%2520typically%2520expressed%2520as%2520%253Cperson%252C%2520action%252C%2520object%253E%2520triplets.%2520Existing%2520approaches%2520split%2520into%2520two%2520disjoint%2520families%253A%2520HOI%2520generation%2520synthesises%2520scenes%2520from%2520structured%2520triplets%2520and%2520layout%252C%2520but%2520fails%2520to%2520integrate%2520mixed%2520conditions%2520like%2520HOI%2520and%2520object-only%2520entities%253B%2520and%2520HOI%2520editing%2520modifies%2520interactions%2520via%2520text%252C%2520yet%2520struggles%2520to%2520decouple%2520pose%2520from%2520physical%2520contact%2520and%2520scale%2520to%2520multiple%2520interactions.%2520We%2520introduce%2520OneHOI%252C%2520a%2520unified%2520diffusion%2520transformer%2520framework%2520that%2520consolidates%2520HOI%2520generation%2520and%2520editing%2520into%2520a%2520single%2520conditional%2520denoising%2520process%2520driven%2520by%2520shared%2520structured%2520interaction%2520representations.%2520At%2520its%2520core%252C%2520the%2520Relational%2520Diffusion%2520Transformer%2520%2528R-DiT%2529%2520models%2520verb-mediated%2520relations%2520through%2520role-%2520and%2520instance-aware%2520HOI%2520tokens%252C%2520layout-based%2520spatial%2520Action%2520Grounding%252C%2520a%2520Structured%2520HOI%2520Attention%2520to%2520enforce%2520interaction%2520topology%252C%2520and%2520HOI%2520RoPE%2520to%2520disentangle%2520multi-HOI%2520scenes.%2520Trained%2520jointly%2520with%2520modality%2520dropout%2520on%2520our%2520HOI-Edit-44K%252C%2520along%2520with%2520HOI%2520and%2520object-centric%2520datasets%252C%2520OneHOI%2520supports%2520layout-guided%252C%2520layout-free%252C%2520arbitrary-mask%252C%2520and%2520mixed-condition%2520control%252C%2520achieving%2520state-of-the-art%2520results%2520across%2520both%2520HOI%2520generation%2520and%2520editing.%2520Code%2520is%2520available%2520at%2520https%253A//jiuntian.github.io/OneHOI/.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.14062v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=OneHOI%3A%20Unifying%20Human-Object%20Interaction%20Generation%20and%20Editing&entry.906535625=Jiun%20Tian%20Hoe%20and%20Weipeng%20Hu%20and%20Xudong%20Jiang%20and%20Yap-Peng%20Tan%20and%20Chee%20Seng%20Chan&entry.1292438233=Human-Object%20Interaction%20%28HOI%29%20modelling%20captures%20how%20humans%20act%20upon%20and%20relate%20to%20objects%2C%20typically%20expressed%20as%20%3Cperson%2C%20action%2C%20object%3E%20triplets.%20Existing%20approaches%20split%20into%20two%20disjoint%20families%3A%20HOI%20generation%20synthesises%20scenes%20from%20structured%20triplets%20and%20layout%2C%20but%20fails%20to%20integrate%20mixed%20conditions%20like%20HOI%20and%20object-only%20entities%3B%20and%20HOI%20editing%20modifies%20interactions%20via%20text%2C%20yet%20struggles%20to%20decouple%20pose%20from%20physical%20contact%20and%20scale%20to%20multiple%20interactions.%20We%20introduce%20OneHOI%2C%20a%20unified%20diffusion%20transformer%20framework%20that%20consolidates%20HOI%20generation%20and%20editing%20into%20a%20single%20conditional%20denoising%20process%20driven%20by%20shared%20structured%20interaction%20representations.%20At%20its%20cor {"title": "LongVideo-R1: Smart Navigation for Low-cost Long Video Understanding", "author": "Jihao Qiu and Lingxi Xie and Xinyue Huo and Qi Tian and Qixiang Ye", "abstract": "This paper addresses the critical and underexplored challenge of long video understanding with low computational budgets. We propose LongVideo-R1, an active, reasoning-equipped multimodal large language model (MLLM) agent designed for efficient video context navigation, avoiding the redundancy of exhaustive search. At the core of LongVideo-R1 lies a reasoning module that leverages high-level visual cues to infer the most informative video clip for subsequent processing. During inference, the agent initiates traversal from top-level visual summaries and iteratively refines its focus, immediately halting the exploration process upon acquiring sufficient knowledge to answer the query. To facilitate training, we first extract hierarchical video captions from CGBench, a video corpus with grounding annotations, and guide GPT-5 to generate 33K high-quality chain-of-thought-with-tool trajectories. The LongVideo-R1 agent is fine-tuned upon the Qwen-3-8B model through a two-stage paradigm: supervised fine-tuning (SFT) followed by reinforcement learning (RL), where RL employs a specifically designed reward function to maximize selective and efficient clip navigation. Experiments on multiple long video benchmarks validate the effectiveness of name, which enjoys superior tradeoff between QA accuracy and efficiency. All curated data and source code are provided in the supplementary material and will be made publicly available. Code and data are available at: https://github.com/qiujihao19/LongVideo-R1", "link": "http://arxiv.org/abs/2602.20913v2", "date": "2026-04-15", "relevancy": 2.3094, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5815}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5765}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5765}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LongVideo-R1%3A%20Smart%20Navigation%20for%20Low-cost%20Long%20Video%20Understanding&body=Title%3A%20LongVideo-R1%3A%20Smart%20Navigation%20for%20Low-cost%20Long%20Video%20Understanding%0AAuthor%3A%20Jihao%20Qiu%20and%20Lingxi%20Xie%20and%20Xinyue%20Huo%20and%20Qi%20Tian%20and%20Qixiang%20Ye%0AAbstract%3A%20This%20paper%20addresses%20the%20critical%20and%20underexplored%20challenge%20of%20long%20video%20understanding%20with%20low%20computational%20budgets.%20We%20propose%20LongVideo-R1%2C%20an%20active%2C%20reasoning-equipped%20multimodal%20large%20language%20model%20%28MLLM%29%20agent%20designed%20for%20efficient%20video%20context%20navigation%2C%20avoiding%20the%20redundancy%20of%20exhaustive%20search.%20At%20the%20core%20of%20LongVideo-R1%20lies%20a%20reasoning%20module%20that%20leverages%20high-level%20visual%20cues%20to%20infer%20the%20most%20informative%20video%20clip%20for%20subsequent%20processing.%20During%20inference%2C%20the%20agent%20initiates%20traversal%20from%20top-level%20visual%20summaries%20and%20iteratively%20refines%20its%20focus%2C%20immediately%20halting%20the%20exploration%20process%20upon%20acquiring%20sufficient%20knowledge%20to%20answer%20the%20query.%20To%20facilitate%20training%2C%20we%20first%20extract%20hierarchical%20video%20captions%20from%20CGBench%2C%20a%20video%20corpus%20with%20grounding%20annotations%2C%20and%20guide%20GPT-5%20to%20generate%2033K%20high-quality%20chain-of-thought-with-tool%20trajectories.%20The%20LongVideo-R1%20agent%20is%20fine-tuned%20upon%20the%20Qwen-3-8B%20model%20through%20a%20two-stage%20paradigm%3A%20supervised%20fine-tuning%20%28SFT%29%20fol {"title": "FinTrace: Holistic Trajectory-Level Evaluation of LLM Tool Calling for Long-Horizon Financial Tasks", "author": "Yupeng Cao and Haohang Li and Weijin Liu and Wenbo Cao and Anke Xu and Lingfei Qian and Xueqing Peng and Minxue Tang and Zhiyuan Yao and Jimin Huang and K. P. Subbalakshmi and Zining Zhu and Jordan W. Suchow and Yangyang Yu", "abstract": "Recent studies demonstrate that tool-calling capability enables large language models (LLMs) to interact with external environments for long-horizon financial tasks. While existing benchmarks have begun evaluating financial tool calling, they focus on limited scenarios and rely on call-level metrics that fail to capture trajectory-level reasoning quality. To address this gap, we introduce FinTrace, a benchmark comprising 800 expert-annotated trajectories spanning 34 real-world financial task categories across multiple difficulty levels. FinTrace employs a rubric-based evaluation protocol with nine metrics organized along four axes -- action correctness, execution efficiency, process quality, and output quality -- enabling fine-grained assessment of LLM tool-calling behavior. Our evaluation of 13 LLMs reveals that while frontier models achieve strong tool selection, all models struggle with information utilization and final answer quality, exposing a critical gap between invoking the right tools and reasoning effectively over their outputs. To move beyond diagnosis, we construct FinTrace-Training, the first trajectory-level preference dataset for financial tool-calling, containing 8,196 curated trajectories with tool-augmented contexts and preference pairs. We fine-tune Qwen-3.5-9B using supervised fine-tuning followed by direct preference optimization (DPO) and show that training on FinTrace-Training consistently improves intermediate reasoning metrics, with DPO more effectively suppressing failure modes. However, end-to-end answer quality remains a bottleneck, indicating that trajectory-level improvements do not yet fully propagate to final output quality.", "link": "http://arxiv.org/abs/2604.10015v2", "date": "2026-04-15", "relevancy": 2.306, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4635}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4635}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4567}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FinTrace%3A%20Holistic%20Trajectory-Level%20Evaluation%20of%20LLM%20Tool%20Calling%20for%20Long-Horizon%20Financial%20Tasks&body=Title%3A%20FinTrace%3A%20Holistic%20Trajectory-Level%20Evaluation%20of%20LLM%20Tool%20Calling%20for%20Long-Horizon%20Financial%20Tasks%0AAuthor%3A%20Yupeng%20Cao%20and%20Haohang%20Li%20and%20Weijin%20Liu%20and%20Wenbo%20Cao%20and%20Anke%20Xu%20and%20Lingfei%20Qian%20and%20Xueqing%20Peng%20and%20Minxue%20Tang%20and%20Zhiyuan%20Yao%20and%20Jimin%20Huang%20and%20K.%20P.%20Subbalakshmi%20and%20Zining%20Zhu%20and%20Jordan%20W.%20Suchow%20and%20Yangyang%20Yu%0AAbstract%3A%20Recent%20studies%20demonstrate%20that%20tool-calling%20capability%20enables%20large%20language%20models%20%28LLMs%29%20to%20interact%20with%20external%20environments%20for%20long-horizon%20financial%20tasks.%20While%20existing%20benchmarks%20have%20begun%20evaluating%20financial%20tool%20calling%2C%20they%20focus%20on%20limited%20scenarios%20and%20rely%20on%20call-level%20metrics%20that%20fail%20to%20capture%20trajectory-level%20reasoning%20quality.%20To%20address%20this%20gap%2C%20we%20introduce%20FinTrace%2C%20a%20benchmark%20comprising%20800%20expert-annotated%20trajectories%20spanning%2034%20real-world%20financial%20task%20categories%20across%20multiple%20difficulty%20levels.%20FinTrace%20employs%20a%20rubric-based%20evaluation%20protocol%20with%20nine%20metrics%20organized%20along%20four%20axes%20--%20action%20correctness%2C%20execution%20efficiency%2C%20process%20quality%2C%20and%20output%20quality%20--%20enabling%20fine-grained%20assessment%20of%20LLM%20tool-calling%20behavior.%20Our%20evaluation%20of%2013%20LLMs%20reveals%20that%20while%20frontier%20models%20achieve%20strong%20tool%20selection%2C%20all%20models%20struggle%20with%20information%20utilization%20and%20final%20answer%20quality%2C%20exposing%20a%20critical%20gap%20between%20invoking%20the%20right%20tools%20and%20reasoning%20effectively%20over%20their%20outputs.%20To%20move%20beyond%20diagnosis%2C%20we%20construct%20FinTrace-Training%2C%20the%20first%20trajectory-level%20preference%20dataset%20for%20financial%20tool-calling%2C%20containing%208%2C196%20curated%20trajectories%20with%20tool-augmented%20contexts%20and%20preference%20pairs.%20We%20fine-tune%20Qwen-3.5-9B%20using%20supervised%20fine-tuning%20followed%20by%20direct%20preference%20optimization%20%28DPO%29%20and%20show%20that%20training%20on%20FinTrace-Training%20consistently%20improves%20intermediate%20reasoning%20metrics%2C%20with%20DPO%20more%20effectively%20suppressing%20failure%20modes.%20However%2C%20end-to-end%20answer%20quality%20remains%20a%20bottleneck%2C%20indicating%20that%20trajectory-level%20improvements%20do%20not%20yet%20fully%20propagate%20to%20final%20output%20quality.%0ALink%3A%20http%3A//arxiv.org/abs/2604.10015v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFinTrace%253A%2520Holistic%2520Trajectory-Level%2520Evaluation%2520of%2520LLM%2520Tool%2520Calling%2520for%2520Long-Horizon%2520Financial%2520Tasks%26entry.906535625%3DYupeng%2520Cao%2520and%2520Haohang%2520Li%2520and%2520Weijin%2520Liu%2520and%2520Wenbo%2520Cao%2520and%2520Anke%2520Xu%2520and%2520Lingfei%2520Qian%2520and%2520Xueqing%2520Peng%2520and%2520Minxue%2520Tang%2520 {"title": "Frozen Forecasting: A Unified Evaluation", "author": "Jacob C Walker and Pedro V\u00e9lez and Luisa Polania Cabrera and Guangyao Zhou and Sayna Ebrahimi and Rishabh Kabra and Carl Doersch and Maks Ovsjanikov and Jo\u00e3o Carreira and Shiry Ginosar", "abstract": "Forecasting future events is a fundamental capability for general-purpose systems that plan or act across different levels of abstraction. Yet, evaluating whether a forecast is \"correct\" remains challenging due to the inherent uncertainty of the future. We propose a unified evaluation framework for assessing the forecasting capabilities of frozen vision backbones across diverse tasks and abstraction levels. Rather than focusing on single time steps, our framework evaluates entire trajectories and incorporates distributional metrics that better capture the multimodal nature of future outcomes. Given a frozen vision model, we train latent diffusion models to forecast future features directly in its representation space, which are then decoded via lightweight, task-specific readouts. This enables consistent evaluation across a suite of diverse tasks while isolating the forecasting capacity of the backbone itself. We apply our framework to nine diverse vision models, spanning image and video pretraining, contrastive and generative objectives, and with or without language supervision, and evaluate them on four forecasting tasks, from low-level pixel predictions to high-level object motion. We find that forecasting performance strongly correlates with perceptual quality and that the forecasting abilities of video synthesis models are comparable or exceed those pretrained in masking regimes across all levels of abstraction. However, language supervision does not consistently improve forecasting. Notably, video-pretrained models consistently outperform image-based ones.", "link": "http://arxiv.org/abs/2507.13942v2", "date": "2026-04-15", "relevancy": 2.2852, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5722}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5722}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5668}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Frozen%20Forecasting%3A%20A%20Unified%20Evaluation&body=Title%3A%20Frozen%20Forecasting%3A%20A%20Unified%20Evaluation%0AAuthor%3A%20Jacob%20C%20Walker%20and%20Pedro%20V%C3%A9lez%20and%20Luisa%20Polania%20Cabrera%20and%20Guangyao%20Zhou%20and%20Sayna%20Ebrahimi%20and%20Rishabh%20Kabra%20and%20Carl%20Doersch%20and%20Maks%20Ovsjanikov%20and%20Jo%C3%A3o%20Carreira%20and%20Shiry%20Ginosar%0AAbstract%3A%20Forecasting%20future%20events%20is%20a%20fundamental%20capability%20for%20general-purpose%20systems%20that%20plan%20or%20act%20across%20different%20levels%20of%20abstraction.%20Yet%2C%20evaluating%20whether%20a%20forecast%20is%20%22correct%22%20remains%20challenging%20due%20to%20the%20inherent%20uncertainty%20of%20the%20future.%20We%20propose%20a%20unified%20evaluation%20framework%20for%20assessing%20the%20forecasting%20capabilities%20of%20frozen%20vision%20backbones%20across%20diverse%20tasks%20and%20abstraction%20levels.%20Rather%20than%20focusing%20on%20single%20time%20steps%2C%20our%20framework%20evaluates%20entire%20trajectories%20and%20incorporates%20distributional%20metrics%20that%20better%20capture%20the%20multimodal%20nature%20of%20future%20outcomes.%20Given%20a%20frozen%20vision%20model%2C%20we%20train%20latent%20diffusion%20models%20to%20forecast%20future%20features%20directly%20in%20its%20representation%20space%2C%20which%20are%20then%20decoded%20via%20lightweight%2C%20task-specific%20readouts.%20This%20enables%20consistent%20evaluation%20across%20a%20suite%20of%20diverse%20tasks%20while%20isolating%20the%20forecasting%20capacity%20of%20the%20backbone%20itself.%20We%20apply%20our%20framework%20to%20nine%20diverse%20vision%20models%2C%20spanning%20image%20and%20video%20pretraining%2C%20contrastive%20and%20generative%20objectives%2C%20and%20with%20or%20without%20language%20supervision%2C%20and%20evaluate%20them%20on%20four%20forecasting%20tasks%2C%20from%20low-level%20pixel%20predictions%20to%20high-level%20object%20motion.%20We%20find%20that%20forecasting%20performance%20strongly%20correlates%20with%20perceptual%20quality%20and%20that%20the%20forecasting%20abilities%20of%20video%20synthesis%20models%20are%20comparable%20or%20exceed%20those%20pretrained%20in%20masking%20regimes%20across%20all%20levels%20of%20abstraction.%20However%2C%20language%20supervision%20does%20not%20consistently%20improve%20forecasting.%20Notably%2C%20video-pretrained%20models%20consistently%20outperform%20image-based%20ones.%0ALink%3A%20http%3A//arxiv.org/abs/2507.13942v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrozen%2520Forecasting%253A%2520A%2520Unified%2520Evaluation%26entry.906535625%3DJacob%2520C%2520Walker%2520and%2520Pedro%2520V%25C3%25A9lez%2520and%2520Luisa%2520Polania%2520Cabrera%2520and%2520Guangyao%2520Zhou%2520and%2520Sayna%2520Ebrahimi%2520and%2520Rishabh%2520Kabra%2520and%2520Carl%2520Doersch%2520and%2520Maks%2520Ovsjanikov%2520and%2520Jo%25C3%25A3o%2520Carreira%2520and%2520Shiry%2520Ginosar%26entry.1292438233%3DForecasting%2520future%2520events%2520is%2520a%2520fundamental%2520capability%2520for%2520general-purpose%2520systems%2520that%2520plan%2520or%2520act%2520across%2520different%2520levels%2520of%2520abstraction.%2520Yet%252C%2520evaluating%2520whether%2520a%2520forecast%2520is%2520%2522correct%2522%2520remains%2520challenging%2520due%2520to%2520the%2520inherent%2520uncertainty%2520of%2520the%2520future.%2520We%2520propose%2520a {"title": "PostureObjectstitch: Anomaly Image Generation Considering Assembly Relationships in Industrial Scenarios", "author": "Zebei Tong and Hongchang Chen and Yujie Lei and Gang Chen and Yushi Liu and Zhi Zheng and Hao Chen and Jieming Zhang and Ying Li and Dongpu Cao", "abstract": "Image generation technology can synthesize condition-specific images to supplement real-world industrial anomaly data and enhance anomaly detection model performance. Existing generation techniques rarely account for the pose and orientation of industrial components in assembly, making the generated images difficult to utilize for downstream application. To solve this, we propose a novel image synthesis approach, called PostureObjectStitch, that achieves accurate generation to meet the requirement of industrial assembly. A condition decoupling approach is introduced to separate input multi-view images into high-frequency, texture, and RGB features. The feature temporal modulation mechanism adapts these features across diffusion model time-steps, enabling progressive generation from coarse to fine details while maintaining consistency. To ensure semantic accuracy, we introduce a conditional loss that enhances critical industrial elements and a geometric prior that guides component positioning for correct assembly relationships. Comprehensive experimental results on the MureCom dataset, our newly contributed DreamAssembly dataset, and the downstream application validate the outstanding performance of our method.", "link": "http://arxiv.org/abs/2604.13863v1", "date": "2026-04-15", "relevancy": 2.2832, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5951}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.57}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model {"title": "Hierarchical DLO Routing with Reinforcement Learning and In-Context Vision-language Models", "author": "Mingen Li and Houjian Yu and Yixuan Huang and Youngjin Hong and Hantao Ye and Changhyun Choi", "abstract": "Long-horizon routing tasks of deformable linear objects (DLOs), such as cables and ropes, are common in industrial assembly lines and everyday life. These tasks are particularly challenging because they require robots to manipulate DLO with long-horizon planning and reliable skill execution. Successfully completing such tasks demands adapting to their nonlinear dynamics, decomposing abstract routing goals, and generating multi-step plans composed of multiple skills, all of which require accurate high-level reasoning during execution. In this paper, we propose a fully autonomous hierarchical framework for solving challenging DLO routing tasks. Given an implicit or explicit routing goal expressed in language, our framework leverages vision-language models~(VLMs) for in-context high-level reasoning to synthesize feasible plans, which are then executed by low-level skills trained via reinforcement learning. To improve robustness over long horizons, we further introduce a failure recovery mechanism that reorients the DLO into insertion-feasible states. Our approach generalizes to diverse scenes involving object attributes, spatial descriptions, implicit language commands, and \\myred{extended 5-clip settings}. It achieves an overall success rate of 92\\% across long-horizon routing scenarios. Please refer to our project page: https://icra2026-dloroute.github.io/DLORoute/", "link": "http://arxiv.org/abs/2510.19268v2", "date": "2026-04-15", "relevancy": 2.2698, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5701}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5701}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5541}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hierarchical%20DLO%20Routing%20with%20Reinforcement%20Learning%20and%20In-Context%20Vision-language%20Models&body=Title%3A%20Hierarchical%20DLO%20Routing%20with%20Reinforcement%20Learning%20and%20In-Context%20Vision-language%20Models%0AAuthor%3A%20Mingen%20Li%20and%20Houjian%20Yu%20and%20Yixuan%20Huang%20and%20Youngjin%20Hong%20and%20Hantao%20Ye%20and%20Changhyun%20Choi%0AAbstract%3A%20Long-horizon%20routing%20tasks%20of%20deformable%20linear%20objects%20%28DLOs%29%2C%20such%20as%20cables%20and%20ropes%2C%20are%20common%20in%20industrial%20assembly%20lines%20and%20everyday%20life.%20These%20tasks%20are%20particularly%20challenging%20because%20they%20require%20robots%20to%20manipulate%20DLO%20with%20long-horizon%20planning%20and%20reliable%20skill%20execution.%20Successfully%20completing%20such%20tasks%20demands%20adapting%20to%20their%20nonlinear%20dynamics%2C%20decomposing%20abstract%20routing%20goals%2C%20and%20generating%20multi-step%20plans%20composed%20of%20multiple%20skills%2C%20all%20of%20which%20require%20accurate%20high-level%20reasoning%20during%20execution.%20In%20this%20paper%2C%20we%20propose%20a%20fully%20autonomous%20hierarchical%20framework%20for%20solving%20challenging%20DLO%20routing%20tasks.%20Given%20an%20implicit%20or%20explicit%20routing%20goal%20expressed%20in%20language%2C%20our%20framework%20leverages%20vision-language%20models~%28VLMs%29%20for%20in-context%20high-level%20reasoning%20to%20synthesize%20feasible%20plans%2C%20which%20are%20then%20executed%20by%20low-level%20skills%20trained%20via%20reinforcement%20learning.%20To%20improve%20robustness%20over%20long%20horizons%2C%20we%20further%20introduce%20a%20failure%20recovery%20mechanism%20that%20reorients%20the%20DLO%20into%20insertion-feasible%20states.%20Our%20approach%20generalizes%20to%20diverse%20scenes%20involving%20object%20attributes%2C%20spatial%20descriptions%2C%20implicit%20language%20commands%2C%20and%20%5Cmyred%7Bextended%205-clip%20settings%7D.%20It%20achieves%20an%20overall%20success%20rate%20of%2092%5C%25%20across%20long-horizon%20routing%20scenarios.%20Please%20refer%20to%20our%20project%20page%3A%20https%3A//icra2026-dloroute.github.io/DLORoute/%0ALink%3A%20http%3A//arxiv.org/abs/2510.19268v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHierarchical%2520DLO%2520Routing%2520with%2520Reinforcement%2520Learning%2520and%2520In-Context%2520Vision-language%2520Models%26entry.906535625%3DMingen%2520Li%2520and%2520Houjian%2520Yu%2520and%2520Yixuan%2520Huang%2520and%2520Youngjin%2520Hong%2520and%2520Hantao%2520Ye%2520and%2520Changhyun%2520Choi%26entry.1292438233%3DLong-horizon%2520routing%2520tasks%2520of%2520deformable%2520linear%2520objects%2520%2528DLOs%2529%252C%2520such%2520as%2520cables%2520and%2520ropes%252C%2520are%2520common%2520in%2520industrial%2520assembly%2520lines%2520and%2520everyday%2520life.%2520These%2520tasks%2520are%2520particularly%2520challenging%2520because%2520they%2520require%2520robots%2520to%2520manipulate%2520DLO%2520with%2520long-horizon%2520planning%2520and%2520reliable%2520skill%2520execution.%2520Successfully%2520completing%2520such%2520tasks%2520demands%2520adapting%2520to%2520their%2520nonlinear%2520dynamics%252C%2520decomposing%2520abstract%2520routing%2520goals%252C%2520and%2520generating%2520multi-step%2520plans%2520composed%2520of%2520multiple%2520skills%252C%2520all%2520of%2520which%2520require%2520accurate%2520high-level%2520reasoning%2520during%2520execution.%2520In%2520this%2520paper%252C%2520we%2520propose%2520a%2520fully%2520autonomous%2520hierarchical%2520framework%2520for%2520solving%2520challenging%2520DLO%2520routing%2520tasks.% {"title": "Training-Free Semantic Multi-Object Tracking with Vision-Language Models", "author": "Laurence Bonat and Francesco Tonini and Elisa Ricci and Lorenzo Vaquero", "abstract": "Semantic Multi-Object Tracking (SMOT) extends multi-object tracking with semantic outputs such as video summaries, instance-level captions, and interaction labels, aiming to move from trajectories to human-interpretable descriptions of dynamic scenes. Existing SMOT systems are trained end-to-end, coupling progress to expensive supervision, limiting the ability to rapidly adapt to new foundation models and new interactions. We propose TF-SMOT, a training-free SMOT pipeline that composes pretrained components for detection, mask-based tracking, and video-language generation. TF-SMOT combines D-FINE and the promptable SAM2 segmentation tracker to produce temporally consistent tracklets, uses contour grounding to generate video summaries and instance captions with InternVideo2.5, and aligns extracted interaction predicates to BenSMOT WordNet synsets via gloss-based semantic retrieval with LLM disambiguation. On BenSMOT, TF-SMOT achieves state-of-the-art tracking performance within the SMOT setting and improves summary and caption quality compared to prior art. Interaction recognition, however, remains challenging under strict exact-match evaluation on the fine-grained and long-tailed WordNet label space; our analysis and ablations indicate that semantic overlap and label granularity substantially affect measured performance.", "link": "http://arxiv.org/abs/2604.14074v1", "date": "2026-04-15", "relevancy": 2.2647, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5756}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5663}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5623}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Training-Free%20Semantic%20Multi-Object%20Tracking%20with%20Vision-Language%20Models&body=Title%3A%20Training-Free%20Semantic%20Multi-Object%20Tracking%20with%20Vision-Language%20Models%0AAuthor%3A%20Laurence%20Bonat%20and%20Francesco%20Tonini%20and%20Elisa%20Ricci%20and%20Lorenzo%20Vaquero%0AAbstract%3A%20Semantic%20Multi-Object%20Tracking%20%28SMOT%29%20extends%20multi-object%20tracking%20with%20semantic%20outputs%20such%20as%20video%20summaries%2C%20instance-level%20captions%2C%20and%20interaction%20labels%2C%20aiming%20to%20move%20from%20trajectories%20to%20human-interpretable%20descriptions%20of%20dynamic%20scenes.%20Existing%20SMOT%20systems%20are%20trained%20end-to-end%2C%20coupling%20progress%20to%20expensive%20supervision%2C%20limiting%20the%20ability%20to%20rapidly%20adapt%20to%20new%20foundation%20models%20and%20new%20interactions.%20We%20propose%20TF-SMOT%2C%20a%20training-free%20SMOT%20pipeline%20that%20composes%20pretrained%20components%20for%20detection%2C%20mask-based%20tracking%2C%20and%20video-language%20generation.%20TF-SMOT%20combines%20D-FINE%20and%20the%20promptable%20SAM2%20segmentation%20tracker%20to%20produce%20temporally%20consistent%20tracklets%2C%20uses%20contour%20grounding%20to%20generate%20video%20summaries%20and%20instance%20captions%20with%20InternVideo2.5%2C%20and%20aligns%20extracted%20interaction%20predicates%20to%20BenSMOT%20WordNet%20synsets%20via%20gloss-based%20semantic%20retrieval%20with%20LLM%20disambiguation.%20On%20BenSMOT%2C%20TF-SMOT%20achieves%20state-of-the-art%20tracking%20performance%20within%20the%20SMOT%20setting%20and%20improves%20summary%20and%20caption%20quality%20compared%20to%20prior%20art.%20Interaction%20recognition%2C%20however%2C%20remains%20challenging%20under%20strict%20exact-match%20evaluation%20on%20the%20fine-grained%20and%20long-tailed%20WordNet%20label%20space%3B%20our%20analysis%20and%20ablations%20indicate%20that%20semantic%20overlap%20and%20label%20granularity%20substantially%20affect%20measured%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14074v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTraining-Free%2520Semantic%2520Multi-Object%2520Tracking%2520with%2520Vision-Language%2520Models%26entry.906535625%3DLaurence%2520Bonat%2520and%2520Francesco%2520Tonini%2520and%2520Elisa%2520Ricci%2520and%2520Lorenzo%2520Vaquero%26entry.1292438233%3DSemantic%2520Multi-Object%2520Tracking%2520%2528SMOT%2529%2520extends%2520multi-object%2520tracking%2520with%2520semantic%2520outputs%2520such%2520as%2520video%2520summaries%252C%2520instance-level%2520captions%252C%2520and%2520interaction%2520labels%252C%2520aiming%2520to%2520move%2520from%2520trajectories%2520to%2520human-interpretable%2520descriptions%2520of%2520dynamic%2520scenes.%2520Existing%2520SMOT%2520systems%2520are%2520trained%2520end-to-end%252C%2520coupling%2520progress%2520to%2520expensive%2520supervision%252C%2520limiting%2520the%2520ability%2520to%2520rapidly%2520adapt%2520to%2520new%2520foundation%2520models%2520and%2520new%2520interactions.%2520We%2520propose%2520TF-SMOT%252C%2520a%2520training-free%2520SMOT%2520pipeline%2520that%2520composes%2520pretrained%2520components%2520for%2520detection%252C%2520mask-based%2520tracking%252C%2520and%2520video-language%2520generation.%2520TF-SMOT%2520combines%2520D-FINE%2520and%2520the%2520promptable%2520SAM2%2520segmentation%2520tracker%2520to%2520produce%2520temporally%2520consistent%2520tracklets%252C%2520uses%2520contour%2520grounding%2520to%2520generate%2520video%2520summaries%2520and%2520instance%2520captions%2520with%2520InternVideo2.5%252C%2520and%2520aligns%2520extracted%2520interaction%2520predicates%2520to%2520BenSMOT%2520WordNet%2520synsets%2520via%2520gloss-based%2520semantic%2520retrieval%2520with%2520LLM%2520disambiguation.%2520On%2520BenSMOT%252C%2520TF-SMOT%2520achieves%2520state-of-the-art%2520tracking%2520performance%2520within%2520the%2520SMOT%2520setting%2520and%2520improves%2520summary%2520and%2520caption%2520quality%2520compared%2520to%2520prior%2520art.%2520Interaction%2520recognition%252C%2520however%252C%2520remains%2520challenging%2520under%2520strict%2520exact-match%2520evaluation%2520on%2520the%2520fine-grained%2520and%2520long-tailed%2520WordNet%2520label%2520space%253B%2520our%2520analysis%2520and%2520ablations%2520indicate%2520that%2520semantic%2520overlap%2520and%2520label%2520granularity%2520substantially%2520affect%2520measured%2520performance.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.14074v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Training-Free%20Semantic%20Multi-Object%20Tracking%20with%20Vision-Language%20Models&entry.906535625=Laurence%20Bonat%20and%20Francesco%20Tonini%20and%20Elisa%20Ricci%20and%20Lorenzo%20Vaquero&entry.1292438233=Semantic%20Multi-Object%20Tracking%20%28SMOT%29%20extends%20multi-object%20tracking%20with%20semantic%20outputs%20such%20as%20video%20summaries%2C%20instance-level%20captions%2C%20and%20interaction%20labels%2C%20aiming%20to%20move%20from%20trajectories%20to%20human-interpretable%20descriptions%20of%20dynamic%20scenes.%20Existing%20SMOT%20systems%20are%20trained%20end-to-end%2C%20coupling%20progress%20to%20expensive%20supervision%2C%20limiting%20the%20ability%20to%20rapidly%20adapt%20to%20new%20foundation%20models%20and%20new%20interactions.%20We%20propose%20TF-SMOT%2C%20a%20training-free%20SMOT%20pipeline%20that%20composes%20pretrained%20components%20for%20detection%2C%20mask-based%20tracking%2C%20and%20video-language%20generation.%20TF-SMOT%20combines%20D-FINE%20and%20the%20promptable%20SAM2%20segmentation%20tracker%20to%20produce%20temporally%20consistent%20tracklets%2C%20uses%20contour%20grounding%20to%20generate%20video%20summaries%20and%20instance%20captions%20with%20InternVideo2.5%2C%20and%20aligns%20extracted%20interaction%20predicates%20to%20BenSMOT%20WordNet%20synsets%20via%20gloss-based%20semantic%20retrieval%20with%20LLM%20disambiguation.%20On%20BenSMOT%2C%20TF-SMOT%20achieves%20state-of-the-art%20tracking%20performance%20within%20the%20SMOT%20setting%20and%20improves%20summary%20and%20caption%20quality%20compared%20to%20prior%20art.%20Interaction%20recognition%2C%20however%2C%20remains%20challenging%20under%20strict%20exact-match%20evaluation%20on%20the%20fine-grained%20and%20long-tailed%20WordNet%20label%20space%3B%20our%20analysis%20and%20ablations%20indicate%20that%20semantic%20overlap%20and%20label%20granularity%20substantially%20affect%20measured%20performance.&entry.1838667208=http%3A//arxiv.org/abs/2604.14074v1&entry.124074799=Read"},
{"title": "Strategic Response of News Publishers to Generative AI", "author": "Hangcheng Zhao and Ron Berman", "abstract": "Generative AI can adversely impact news publishers by lowering consumer demand. It can also reduce demand for newsroom employees, and increase the creation of news \"slop.\" However, it can also form a source of traffic referrals and an information-discovery channel that increases demand. We use high-frequency granular data to analyze the strategic response of news publishers to the introduction of Generative AI. Many publishers strategically blocked LLM access to their websites using the robots.txt file standard. Using a difference-in-differences approach, we find that large publishers who block GenAI bots experience reduced website traffic compared to not blocking. In addition, we find that large publishers shift toward richer content that is harder for LLMs to replicate, without increasing text volume. Finally, we find that the share of new editorial and content-production job postings rises over time. Together, these findings illustrate the levers that publishers choose to use to strategically respond to competitive Generative AI threats, and their consequences.", "link": "http://arxiv.org/abs/2512.24968v4", "date": "2026-04-15", "relevancy": 2.2628, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4775}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4538}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.4263}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Strategic%20Response%20of%20News%20Publishers%20to%20Generative%20AI&body=Title%3A%20Strategic%20Response%20of%20News%20Publishers%20to%20Generative%20AI%0AAuthor%3A%20Hangcheng%20Zhao%20and%20Ro {"title": "HiVLA: A Visual-Grounded-Centric Hierarchical Embodied Manipulation System", "author": "Tianshuo Yang and Guanyu Chen and Yutian Chen and Zhixuan Liang and Yitian Liu and Zanxin Chen and Chunpu Xu and Haotian Liang and Jiangmiao Pang and Yao Mu and Ping Luo", "abstract": "While end-to-end Vision-Language-Action (VLA) models offer a promising paradigm for robotic manipulation, fine-tuning them on narrow control data often compromises the profound reasoning capabilities inherited from their base Vision-Language Models (VLMs). To resolve this fundamental trade-off, we propose HiVLA, a visual-grounded-centric hierarchical framework that explicitly decouples high-level semantic planning from low-level motor control. In high-level part, a VLM planner first performs task decomposition and visual grounding to generate structured plans, comprising a subtask instruction and a precise target bounding box. Then, to translate this plan into physical actions, we introduce a flow-matching Diffusion Transformer (DiT) action expert in low-level part equipped with a novel cascaded cross-attention mechanism. This design sequentially fuses global context, high-resolution object-centric crops and skill semantics, enabling the DiT to focus purely on robust execution. Our decoupled architecture preserves the VLM's zero-shot reasoning while allowing independent improvement of both components. Extensive experiments in simulation and the real world demonstrate that HiVLA significantly outperforms state-of-the-art end-to-end baselines, particularly excelling in long-horizon skill composition and the fine-grained manipulation of small objects in cluttered scenes.", "link": "http://arxiv.org/abs/2604.14125v1", "date": "2026-04-15", "relevancy": 2.2407, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5785}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5629}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5501}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HiVLA%3A%20A%20Visual-Grounded-Centric%20Hierarchical%20Embodied%20Manipulation%20System&body=Title%3A%20HiVLA%3A%20A%20Visual-Grounded-Centric%20Hierarchical%20Embodied%20Manipulation%20System%0AAuthor%3A%20Tianshuo%20Yang%20and%20Guanyu%20Chen%20and%20Yutian%20Chen%20and%20Zhixuan%20Liang%20and%20Yitian%20Liu%20and%20Zanxin%20Chen%20and%20Chunpu%20Xu%20and%20Haotian%20Liang%20and%20Jiangmiao%20Pang%20and%20Yao%20Mu%20and%20Ping%20Luo%0AAbstract%3A%20While%20end-to-end%20Vision-Language-Action%20%28VLA%29%20models%20offer%20a%20promising%20paradigm%20for%20robotic%20manipulation%2C%20fine-tuning%20them%20on%20narrow%20control%20data%20often%20compromises%20the%20profound%20reasoning%20capabilities%20inherited%20from%20their%20base%20Vision-Language%20Models%20%28VLMs%29.%20To%20resolve%20this%20fundamental%20trade-off%2C%20we%20propose%20HiVLA%2C%20a%20visual-grounded-centric%20hierarchical%20framework%20that%20explicitly%20decouples%20high-level%20semantic%20planning%20from%20low-level%20motor%20control.%20In%20high-level%20part%2C%20a%20VLM%20planner%20first%20performs%20task%20decomposition%20and%20visual%20grounding%20to%20generate%20structured%20plans%2C%20comprising%20a%20subtask%20instruction%20and%20a%20precise%20target%20bounding%20box.%20Then%2C%20to%20translate%20this%20plan%20into%20physical%20actions%2C%20we%20introduce%20a%20flow-matching%20Diffusion%20Transformer%20%28DiT%29%20action%20expert%20in%20low-level%20part%20equipped%20with%20a%20novel%20cascaded%20cross-attention%20mechanism.%20This%20design%20sequentially%20fuses%20global%20context%2C%20high-resolution%20object-centric%20crops%20and%20skill%20semantics%2C%20enabling%20the%20DiT%20to%20focus%20purely%20on%20robust%20execution.%20Our%20decoupled%20architecture%20preserves%20the%20VLM%27s%20zero-shot%20reasoning%20while%20allowing%20independent%20improvement%20of%20both%20components.%20Extensive%20experiments%20in%20simulation%20and%20the%20real%20world%20demonstrate%20that%20HiVLA%20significantly%20outperforms%20state-of-the-art%20end-to-end%20baselines%2C%20particularly%20excelling%20in%20long-horizon%20skill%20composition%20and%20the%20fine-grained%20manipulation%20of%20small%20objects%20in%20cluttered%20scenes.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14125v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHiVLA%253A%2520A%2520Visual-Grounded-Centric%2520Hierarchical%2520Embodied%2520Manipulation%2520System%26entry.906535625%3DTianshuo%2520Yang%2520and%2520Guanyu%2520Chen%2520and%2520Yutian%2520Chen%2520and%2520Zhixuan%2520Liang%2520and%2520Yitian%2520Liu%2520and%2520Zanxin%2520Chen%2520and%2520Chunpu%2520Xu%2520and%2520Haotian%2520Liang%2520and%2520Jiangmiao%2520Pang%2520and%2520Yao%2520Mu%2520and%2520Ping%2520Luo%26entry.1292438233%3DWhile%2520end-to-end%2520Vision-Language-Action%2520%2528VLA%2529%2520models%2520offer%2520a%2520promising%2520paradigm%2520for%2520robotic%2520manipulation%252C%2520fine-tuning%2520them%2520on%2520narrow%2520control%2520data%2520often%2520compromises%2520the%2520profound%2520reasoning%2520capabilities%2520inherited%2520from%2520their%2520base%2520Vision-Language%2520Models%2520%2528VLMs%2529.%2520To%2520resolve%2520this%2520fundamental%2520trade-off%252C%2520we%2520propose%2520HiVLA%252C%2520a%2520visual-grounded-centric%2520hierarchical%2520framework%2520that%2520explicitly%2520decouples%2520high-level%2520semantic%2520planning%2520from%2520low-level%2520motor%2520control.%2520In%2520high-level%2520part%252C%2520a%2520VLM%2520planner%2520first%2520performs%2520task%2520decom {"title": "MedRCube: A Multidimensional Framework for Fine-Grained and In-Depth Evaluation of MLLMs in Medical Imaging", "author": "Zhijie Bao and Fangke Chen and Licheng Bao and Chenhui Zhang and Wei Chen and Jiajie Peng and Zhongyu Wei", "abstract": "The potential of Multimodal Large Language Models (MLLMs) in domain of medical imaging raise the demands of systematic and rigorous evaluation frameworks that are aligned with the real-world medical imaging practice. Existing practices that report single or coarse-grained metrics are lack the granularity required for specialized clinical support and fail to assess the reliability of reasoning mechanisms. To address this, we propose a paradigm shift toward multidimensional, fine-grained and in-depth evaluation. Based on a two-stage systematic construction pipeline designed for this paradigm, we instantiate it with MedRCube. We benchmark 33 MLLMs, \\textit{Lingshu-32B} achieve top-tier performance. Crucially, MedRCube exposes a series of pronounced insights inaccessible under prior evaluation settings. Furthermore, we introduce a credibility evaluation subset to quantify reasoning credibility, uncover a highly significant positive association between shortcut behavior and diagnostic task performance, raising concerns for clinically trustworthy deployment. The resources of this work can be found at https://github.com/F1mc/MedRCube.", "link": "http://arxiv.org/abs/2604.13756v1", "date": "2026-04-15", "relevancy": 2.2404, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5883}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5545}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5545}], "mailt {"title": "VIGILant: an automatic classification pipeline for glitches in the Virgo detector", "author": "Tiago Fernandes and Francesco Di Renzo and Antonio Onofre and Alejandro Torres-Forn\u00e9 and Jos\u00e9 A. Font", "abstract": "Glitches frequently contaminate data in gravitational-wave detectors, complicating the observation and analysis of astrophysical signals. This work introduces VIGILant, an automatic pipeline for classification and visualization of glitches in the Virgo detector. Using a curated dataset of Virgo O3b glitches, two machine learning approaches are evaluated: tree-based models (Decision Tree, Random Forest and XGBoost) using structured Omicron parameters, and Convolutional Neural Networks (ResNet) trained on spectrogram images. While tree-based models offer higher interpretability and fast training, the ResNet34 model achieved superior performance, reaching a F1 score of 0.9772 and accuracy of 0.9833 in the testing set, with inference times of tens of milliseconds per glitch. The pipeline has been deployed for daily operation at the Virgo site since observing run O4c, providing the Virgo collaboration with an interactive dashboard to monitor glitch populations and detector behavior. This allows to identify low-confidence predictions, highlighting glitches requiring further attention.", "link": "http://arxiv.org/abs/2604.13687v1", "date": "2026-04-15", "relevancy": 2.2382, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4588}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4424}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4417}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VIGILant%3A%20an%20automatic%20classification%20pipeline%20for%20glitches%2 {"title": "Language steering in latent space to mitigate unintended code-switching", "author": "Andrey Goncharov and Nikolai Kondusov and Alexey Zaytsev", "abstract": "Multilingual Large Language Models (LLMs) often exhibit hallucinations such as unintended code-switching, reducing reliability in downstream tasks. We propose latent-space language steering, a lightweight inference-time method that identifies language directions via Principal Component Analysis (PCA) on parallel translations and steers token embeddings along these axes to control language identity. Our approach mitigates code-switching while preserving semantics with negligible computational overhead and requires only minimal parallel data for calibration. Empirically, we achieve 95-99\\% language classification accuracy using a single principal component and reduce next-token distributional divergence by up to 55\\% across multiple language pairs on Qwen2.5 and Llama-3.2 models. Generation-based evaluation on Llama-3.2 further demonstrates 63--99\\% reduction in Code-Switching Index across four language pairs ($p < 0.001$). We further analyze the layer-wise evolution of language representations, revealing that language identity concentrates in final layers with near-perfect linear separability.", "link": "http://arxiv.org/abs/2510.13849v3", "date": "2026-04-15", "relevancy": 2.2348, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4479}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4472}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4458}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Language%20steering%20in%20latent%20space%20to%20mitigate%20unintended%20code-switching&body=Title%3A%20Language%20steering%20in%20latent%20space%20to%20mitigate%20unintended%20code-switching%0AAuthor%3A%20Andrey%20Goncharov%20and%20Nikolai%20Kondusov%20and%20Alexey%20Zaytsev%0AAbstract%3A%20Multilingual%20Large%20Language%20Models%20%28LLMs%29%20often%20exhibit%20hallucinations%20such%20as%20unintended%20code-switching%2C%20reducing%20reliability%20in%20downstream%20tasks.%20We%20propose%20latent-space%20language%20steering%2C%20a%20lightweight%20inference-time%20method%20that%20identifies%20language%20directions%20via%20Principal%20Component%20Analysis%20%28PCA%29%20on%20parallel%20translations%20and%20steers%20token%20embeddings%20along%20these%20axes%20to%20control%20language%20identity.%20Our%20approach%20mitigates%20code-switching%20while%20preserving%20semantics%20with%20negligible%20computational%20overhead%20and%20requires%20only%20minimal%20parallel%20data%20for%20calibration.%20Empirically%2C%20we%20achieve%2095-99%5C%25%20language%20classification%20accuracy%20using%20a%20single%20principal%20component%20and%20reduce%20next-token%20distributional%20divergence%20by%20up%20to%2055%5C%25%20across%20multiple%20language%20pairs%20on%20Qwen2.5%20and%20Llama-3.2%20models.%20Generation-based%20evaluation%20on%20Llama-3.2%20further%20demonstrates%2063--99%5C%25%20reduction%20in%20Code-Switching%20Index%20across%20four%20language%20pairs%20%28%24p%20%3C%200.001%24%29.%20We%20further%20analyze%20the%20layer-wise%20evolution%20of%20language%20representations%2C%20revealing%20that%20language%20identity%20concentrates%20in%20final%20layers%20with%20near-perfect%20linear%20separability.%0ALink%3A%20http%3A//arxiv.org/abs/2510.13849v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLanguage%2520steering%2520in%2520latent%2520space%2520to%2520mitigate%2520unintended%2520code-switching%26entry.906535625%3DAndrey%2520Goncharov%2520and%252 {"title": "Parameter Importance is Not Static: Evolving Parameter Isolation for Supervised Fine-Tuning", "author": "Zekai Lin and Chao Xue and Di Liang and Xingsheng Han and Peiyang Liu and Xianjie Wu and Lei Jiang and Yu Lu and Haibo Shi and Shuang Liang and Minlong Peng", "abstract": "Supervised Fine-Tuning (SFT) of large language models often suffers from task interference and catastrophic forgetting. Recent approaches alleviate this issue by isolating task-critical parameters during training. However, these methods represent a static solution to a dynamic problem, assuming that parameter importance remains fixed once identified. In this work, we empirically demonstrate that parameter importance exhibits temporal drift over the course of training. To address this, we propose Evolving Parameter Isolation (EPI), a fine-tuning framework that adapts isolation decisions based on online estimates of parameter importance. Instead of freezing a fixed subset of parameters, EPI periodically updates isolation masks using gradient-based signals, enabling the model to protect emerging task-critical parameters while releasing outdated ones to recover plasticity. Experiments on diverse multi-task benchmarks demonstrate that EPI consistently reduces interference and forgetting compared to static isolation and standard fine-tuning, while improving overall generalization. Our analysis highlights the necessity of synchronizing isolation mechanisms with the evolving dynamics of learning diverse abilities.", "link": "http://arxiv.org/abs/2604.14010v1", "date": "2026-04-15", "relevancy": 2.2328, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4566}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4513}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://a ation.%20Our%20analysis%20highlights%20the%20necessity%20of%20synchronizing%20isolation%20mechanisms%20with%20the%20evolving%20dynamics%20of%20learning%20diverse%20abilities.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14010v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DParameter%2520Importance%2520is%2520Not%2520Static%253A%2520Evolving%2520Parameter%2520Isolation%2520for%2520Supervised%2520Fine-Tuning%26entry.906535625%3DZekai%2520Lin%2520and%2520Chao%2520Xue%2520and%2520Di%2520Liang%2520and%2520Xingsheng%2520Han%2520and%2520Peiyang%2520Liu%2520and%2520Xianjie%2520Wu%2520and%2520Lei%2520Jiang%2520and%2520Yu%2520Lu%2520and%2520Haibo%2520Shi%2520and%2520Shuang%2520Liang%2520and%2520Minlong%2520Peng%26entry.1292438233%3DSupervised%2520Fine-Tuning%2520%2528SFT%2529%2520of%2520large%2520language%2520models%2520often%2520suffers%2520from%2520task%2520interference%2520and%2520catastrophic%2520forgetting.%2520Recent%2520approaches%2520alleviate%2520this%2520issue%2520by%2520isolating%2520task-critical%2520parameters%2520during%2520training.%2520However%252C%2520these%2520methods%2520represent%2520a%2520static%2520solution%2520to%2520a%2520dynamic%2520problem%252C%2520assuming%2520that%2520parameter%2520importance%2520remains%2520fixed%2520once%2520identified.%2520In%2520this%2520work%252C%2520we%2520empirically%2520demonstrate%2520that%2520parameter%2520importance%2520exhibits%2520temporal%2520drift%2520over%2520the%2520course%2520of%2520training.%2520To%2520address%2520this%252C%2520we%2520propose%2520Evolving%2520Parameter%2520Isolation%2520%2528EPI%2529%252C%2520a%2520fine-tuning%2520framework%2520that%2520adapts%2520isolation%2520decisions%2520based%2520on%2520online%2520estimates%2520of%2520parameter%2520importance.%2520Instead%2520of%2520freezing%2520a%2520fixed%2520subset%2520of%2520parameters%252C%2520EPI%2520periodically%2520updates%2520isolation%2520masks%2520using%2520gradien

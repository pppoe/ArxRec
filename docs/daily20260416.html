{"title": "Beyond Conservative Automated Driving in Multi-Agent Scenarios via Coupled Model Predictive Control and Deep Reinforcement Learning", "author": "Saeed Rahmani and G\u00f6zde K\u00f6rpe and  Zhenlin and  Xu and Bruno Brito and Simeon Craig Calvert and Bart van Arem", "abstract": "Automated driving at unsignalized intersections is challenging due to complex multi-vehicle interactions and the need to balance safety and efficiency. Model Predictive Control (MPC) offers structured constraint handling through optimization but relies on hand-crafted rules that often produce overly conservative behavior. Deep Reinforcement Learning (RL) learns adaptive behaviors from experience but often struggles with safety assurance and generalization to unseen environments. In this study, we present an integrated MPC-RL framework to improve navigation performance in multi-agent scenarios. Experiments show that MPC-RL outperforms standalone MPC and end-to-end RL across three traffic-density levels. Collectively, MPC-RL reduces the collision rate by 21% and improves the success rate by 6.5% compared to pure MPC. We further evaluate zero-shot transfer to a highway merging scenario without retraining. Both MPC-based methods transfer substantially better than end-to-end PPO, which highlights the role of the MPC backbone in cross-scenario robustness. The framework also shows faster loss stabilization than end-to-end RL during training, which indicates a reduced learning burden. These results suggest that the integrated approach can improve the balance between safety performance and efficiency in multi-agent intersection scenarios, while the MPC component provides a strong foundation for generalization across driving environments. The implementation code is available open-source.", "link": "http://arxiv.org/abs/2604.13891v1", "date": "2026-04-15", "relevancy": 2.2281, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5748}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5724}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5332}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Conservative%20Automated%20Driving%20in%20Multi-Agent%20Scenarios%20via%20Coupled%20Model%20Predictive%20Control%20and%20Deep%20Reinforcement%20Learning&body=Title%3A%20Beyond%20Conservative%20Automated%20Driving%20in%20Multi-Agent%20Scenarios%20via%20Coupled%20Model%20Predictive%20Control%20and%20Deep%20Reinforcement%20Learning%0AAuthor%3A%20Saeed%20Rahmani%20and%20G%C3%B6zde%20K%C3%B6rpe%20and%20%20Zhenlin%20and%20%20Xu%20and%20Bruno%20Brito%20and%20Simeon%20Craig%20Calvert%20and%20Bart%20van%20Arem%0AAbstract%3A%20Automated%20driving%20at%20unsignalized%20intersections%20is%20challenging%20due%20to%20complex%20multi-vehicle%20interactions%20and%20the%20need%20to%20balance%20safety%20and%20efficiency.%20Model%20Predictive%20Control%20%28MPC%29%20offers%20structured%20constraint%20handling%20through%20optimization%20but%20relies%20on%20hand-crafted%20rules%20that%20often%20produce%20overly%20conservative%20behavior.%20Deep%20Reinforcement%20Learning%20%28RL%29%20learns%20adaptive%20behaviors%20from%20experience%20but%20often%20struggles%20with%20safety%20assurance%20and%20generalization%20to%20unseen%20environments.%20In%20this%20study%2C%20we%20present%20an%20integrated%20MPC-RL%20framework%20to%20improve%20navigation%20performance%20in%20multi-agent%20scenarios.%20Experiments%20show%20that%20MPC-RL%20outperforms%20standalone%20MPC%20and%20end-to-end%20RL%20across%20three%20traffic-density%20levels.%20Collectively%2C%20MPC-RL%20reduces%20the%20collision%20rate%20by%2021%25%20and%20improves%20the%20success%20rate%20by%206.5%25%20compared%20to%20pure%20MPC.%20We%20further%20evaluate%20zero-shot%20transfer%20to%20a%20highway%20merging%20scenario%20without%20retraining.%20Both%20MPC-based%20methods%20transfer%20substantially%20better%20than%20end-to-end%20PPO%2C%20which%20highlights%20the%20role%20of%20the%20MPC%20backbone%20in%20cross-scenario%20robustness.%20The%20framework%20also%20shows%20faster%20loss%20stabilization%20than%20end-to-end%20RL%20during%20training%2C%20which%20indicates%20a%20reduced%20learning%20burden.%20These%20results%20suggest%20that%20the%20integrated%20approach%20can%20improve%20the%20balance%20between%20safety%20performance%20and%20efficiency%20in%20multi-agent%20intersection%20scenarios%2C%20while%20the%20MPC%20component%20provides%20a%20strong%20foundation%20for%20generalization%20across%20driving%20environments.%20The%20implementation%20code%20is%20available%20open-source.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13891v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520Conservative%2520Automated%2520Driving%2520in%2520Multi-Agent%2520Scenarios%2520via%2520Coupled%2520Model%2520Predictive%2520Control%2520and%2520Deep%2520Reinforcement%2520Learning%26entry.906535625%3DSaeed%2520Rahmani%2520and%2520G%25C3%25B6zde%2520K%25C3%25B6rpe%2520and%2520%2520Zhenlin%2520and%2520%2520Xu%2520and%2520Bruno%2520Brito%2520and%2520Simeon%2520Craig%2520Calvert%2520and%2520Bart%2520van%2520Arem%26entry.1292438233%3DAutomated%2520driving%2520at%2520unsignalized%2520intersections%2520is%2520challenging%2520due%2520to%2520complex%2520multi-vehicle%2520interactions%2520and%2520the%2520need%2520to%2520balance%2520safety%2520and%2520efficiency.%2520Model%2520Predictive%2520Control%2520%2528MPC%2529%2520offers%2520structured%2520constraint%2520handling%2520through%2520optimization%2520but%2520relies%2520on%2520hand-crafted%2520rules%2520that%2520often%2520pr {"title": "Depth-Aware Image and Video Orientation Estimation", "author": "Muhammad Z. Alam and Larry Stetsiuk and M. Umair Mukati and Zeeshan Kaleem", "abstract": "This paper introduces a novel approach for image and video orientation estimation by leveraging depth distribution in natural images. The proposed method estimates the orientation based on the depth distribution across different quadrants of the image, providing a robust framework for orientation estimation suited for applications such as virtual reality (VR), augmented reality (AR), autonomous navigation, and interactive surveillance systems. To further enhance fine-scale perceptual alignment, we incorporate depth gradient consistency (DGC) and horizontal symmetry analysis (HSA), enabling precise orientation correction. This hybrid strategy effectively exploits depth cues to support spatial coherence and perceptual stability in immersive visual content. Qualitative and quantitative evaluations demonstrate the robustness and accuracy of the proposed approach, outperforming existing techniques across diverse scenarios.", "link": "http://arxiv.org/abs/2604.13995v1", "date": "2026-04-15", "relevancy": 2.2236, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5746}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5629}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5415}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Depth-Aware%20Image%20and%20Video%20Orientation%20Estimation&body=Title%3A%20Depth-Aware%20Image%20and%20Video%20Orientation%20Estimation%0AAuthor%3A%20Muhammad%20Z.%20Alam%20and%20Larry%20Stetsiuk%20and%20M.%20Umair%20Mukati%20and%20Zeeshan%20Kaleem%0AAbstract%3A%20This%20paper%20introduces%20a%20novel%20approach%20for%20image%20and%20video%20orientation%20estimation%20by%20leveraging%20depth%20distribution%20in%20natural%20images.%20The%20proposed%20method%20estimates%20the%20orientation%20based%20on%20the%20depth%20distribution%20across%20different%20quadrants%20of%20the%20image%2C%20providing%20a%20robust%20framework%20for%20orientation%20estimation%20suited%20for%20applications%20such%20as%20virtual%20reality%20%28VR%29%2C%20augmented%20reality%20%28AR%29%2C%20autonomous%20navigation%2C%20and%20interactive%20surveillance%20systems.%20To%20further%20enhance%20fine-scale%20perceptual%20alignment%2C%20we%20incorporate%20depth%20gradient%20consistency%20%28DGC%29%20and%20horizontal%20symmetry%20analysis%20%28HSA%29%2C%20enabling%20precise%20orientation%20correction.%20This%20hybrid%20strategy%20effectively%20exploits%20depth%20cues%20to%20support%20spatial%20coherence%20and%20perceptual%20stability%20in%20immersive%20visual%20content.%20Qualitative%20and%20quantitative%20evaluations%20demonstrate%20the%20robustness%20and%20accuracy%20of%20the%20proposed%20approach%2C%20outperforming%20existing%20techniques%20across%20diverse%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13995v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDepth-Aware%2520Image%2520and%2520Video%2520Orientation%2520Estimation%26entry.906535625%3DMuhammad%2520Z.%2520Alam%2520and%2520Larry%2520Stetsiuk%2520and%2520M.%2520Umair%2520Mukati%2520and%2520Zeeshan%2520Kaleem%26entry.1292438233%3DThis%2520paper%2520introduces%2520a%2520novel%2520approach%2520for%2520image%2520and%2520video%2520orientation%2520estimation%2520by%2520leveraging%2520depth%2520distribution%2520in%2520natural%2520images.%2520The%2520proposed%2520method%2520estimates%2520the%2520orientation%2520based%2520on%2520the%2520depth%2520distribution%2520acr {"title": "PBE-UNet: A light weight Progressive Boundary-Enhanced U-Net with Scale-Aware Aggregation for Ultrasound Image Segmentation", "author": "Chen Wang and Yixin Zhu and Yongbin Zhu and Fengyuan Shi and Qi Li and Jun Wang and Zuozhu Liu and Keli Hu", "abstract": "Accurate lesion segmentation in ultrasound images is essential for preventive screening and clinical diagnosis, yet remains challenging due to low contrast, blurry boundaries, and significant scale variations. Although existing deep learning-based methods have achieved remarkable performance, these methods still struggle with scale variations and indistinct tumor boundaries. To address these challenges, we propose a progressive boundary enhanced U-Net (PBE-UNet). Specially, we first introduce a scale-aware aggregation module (SAAM) that dynamically adjusts its receptive field to capture robust multi-scale contextual information. Then, we propose a boundary-guided feature enhancement (BGFE) module to enhance the feature representations. We find that there are large gaps between the narrow boundary and the wide segmentation error areas. Unlike existing methods that treat boundaries as static masks, the BGFE module progressively expands the narrow boundary prediction into broader spatial attention maps. Thus, broader spatial attention maps could effectively cover the wider segmentation error regions and enhance the model's focus on these challenging areas. We conduct expensive experiments on four benchmark ultrasound datasets, BUSI, Dataset B, TN3K, and BP. The experimental results how that our proposed PBE-UNet outperforms state-of-the-art ultrasound image segmentation methods. The code is at https://github.com/cruelMouth/PBE-UNet.", "link": "http://arxiv.org/abs/2604.13791v1", "date": "2026-04-15", "relevancy": 2.2222, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5748}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5715}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5299}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PBE-UNet%3A%20A%20light%20weight%20Progressive%20Boundary-Enhanced%20U-Net%20with%20Scale-Aware%20Aggregation%20for%20Ultrasound%20Image%20Segmentation&body=Title%3A%20PBE-UNet%3A%20A%20light%20weight%20Progressive%20Boundary-Enhanced%20U-Net%20with%20Scale-Aware%20Aggregation%20for%20Ultrasound%20Image%20Segmentation%0AAuthor%3A%20Chen%20Wang%20and%20Yixin%20Zhu%20and%20Yongbin%20Zhu%20and%20Fengyuan%20Shi%20and%20Qi%20Li%20and%20Jun%20Wang%20and%20Zuozhu%20Liu%20and%20Keli%20Hu%0AAbstract%3A%20Accurate%20lesion%20segmentation%20in%20ultrasound%20images%20is%20essential%20for%20preventive%20screening%20and%20clinical%20diagnosis%2C%20yet%20remains%20challenging%20due%20to%20low%20contrast%2C%20blurry%20boundaries%2C%20and%20significant%20scale%20variations.%20Although%20existing%20deep%20learning-based%20methods%20have%20achieved%20remarkable%20performance%2C%20these%20methods%20still%20struggle%20with%20scale%20variations%20and%20indistinct%20tumor%20boundaries.%20To%20address%20these%20challenges%2C%20we%20propose%20a%20progressive%20boundary%20enhanced%20U-Net%20%28PBE-UNet%29.%20Specially%2C%20we%20first%20introduce%20a%20scale-aware%20aggregation%20module%20%28SAAM%29%20that%20dynamically%20adjusts%20its%20receptive%20field%20to%20capture%20robust%20multi-scale%20contextual%20information.%20Then%2C%20we%20propose%20a%20boundary-guided%20feature%20enhancement%20%28BGFE%29%20module%20to%20enhance%20the%20feature%20representations.%20We%20find%20that%20there%20are%20large%20gaps%20between%20the%20narrow%20boundary%20and%20the%20wide%20segmentation%20error%20areas.%20Unlike%20existing%20methods%20that%20treat%20boundaries%20as%20static%20masks%2C%20the%20BGFE%20module%20progressively%20expands%20the%20narrow%20boundary%20prediction%20into%20broader%20spatial%20attention%20maps.%20Thus%2C%20broader%20spatial%20attention%20maps%20could%20effectively%20cover%20the%20wider%20segmentation%20error%20regions%20and%20enhance%20the%20model%27s%20focus%20on%20these%20challenging%20areas.%20We%20conduct%20expensive%20experiments%20on%20four%20benchmark%20ultrasound%20datasets%2C%20BUSI%2C%20Dataset%20B%2C%20TN3K%2C%20and%20BP.%20The%20experimental%20results%20how%20that%20our%20proposed%20PBE-UNet%20outperforms%20state-of-the-art%20ultrasound%20image%20segmentation%20methods.%20The%20code%20is%20at%20https%3A//github.com/cruelMouth/PBE-UNet.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13791v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPBE-UNet%253A%2520A%2520light%2520weight%2520Progressive%2520Boundary-Enhanced%2520U-Net%2520with%2520Scale-Aware%2520Aggregation%2520for%2520Ultrasound%2520Image%2520Segmentation%26entry.906535625%3DChen%2520Wang%2520and%2520Yixin%2520Zhu%2520and%2520Yongbin%2520Zhu%2520and%2520Fengyuan%2520Shi%2520and%2520Qi%2520Li%2520and%2520Jun%2520Wang%2520and%2520Zuozhu%2520Liu%2520and%2520Keli%2520Hu%26entry.1292438233%3DAccurate%2520lesion%2520segmentation%2520in%2520ultrasound%2520images%2520is%2520essential%2520for%2520preventive%2520screening%2520and%2520clinical%2520diagnosis%252C%2520yet%2520remains%2520challenging%2520due%2520to%2520low%2520contrast%252C%2520blurry%2520boundaries%252C%2520and%2520significant%2520scale%2520variations.%2520Although%2520existing%2520deep%2520learning-based%2520methods%2520have%2520achieved%2520remarkable%2520performance%252C%2520these%2520methods%2520still%2520struggle%2520with%2520scale%2520variations%2520and%2520indistinct%2520tumor%2520boundaries.%2520To%2520address%2520these%2520ch {"title": "EMGFlow: Robust and Efficient Surface Electromyography Synthesis via Flow Matching", "author": "Boxuan Jiang and Chenyun Dai and Can Han", "abstract": "Deep learning-based surface electromyography (sEMG) gesture recognition is frequently bottlenecked by data scarcity and limited subject diversity. While synthetic data generation via Generative Adversarial Networks (GANs) and diffusion models has emerged as a promising augmentation strategy, these approaches often face challenges regarding training stability or inference efficiency. To bridge this gap, we propose EMGFlow, a conditional sEMG generation framework. To the best of our knowledge, this is the first study to investigate the application of Flow Matching (FM) and continuous-time generative modeling in the sEMG domain. To validate EMGFlow across three benchmark sEMG datasets, we employ a unified evaluation protocol integrating feature-based fidelity, distributional geometry, and downstream utility. Extensive evaluations show that EMGFlow outperforms conventional augmentation and GAN baselines, and provides stronger standalone utility than the diffusion baselines considered here under the train-on-synthetic test-on-real (TSTR) protocol. Furthermore, by optimizing generation dynamics through advanced numerical solvers and targeted time sampling, EMGFlow achieves improved quality-efficiency trade-offs. Taken together, these results suggest that Flow Matching is a promising and efficient paradigm for addressing data bottlenecks in myoelectric control systems. Our code is available at: https://github.com/Open-EXG/EMGFlow.", "link": "http://arxiv.org/abs/2604.13685v1", "date": "2026-04-15", "relevancy": 2.2193, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5862}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.57}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5271}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EMGFlow%3A%20Robust%20and%20Efficient%20Surface%20Electromyography%20Synthesis%20via%20Flow%20Matching&body=Title%3A%20EMGFlow%3A%20Robust%20and%20Efficient%20Surface%20Electromyography%20Synthesis%20via%20Flow%20Matching%0AAuthor%3A%20Boxuan%20Jiang%20and%20Chenyun%20Dai%20and%20Can%20Han%0AAbstract%3A%20Deep%20learning-based%20surface%20electromyography%20%28sEMG%29%20gesture%20recognition%20is%20frequently%20bottlenecked%20by%20data%20scarcity%20and%20limited%20subject%20diversity.%20While%20synthetic%20data%20generation%20via%20Generative%20Adversarial%20Networks%20%28GANs%29%20and%20diffusion%20models%20has%20emerged%20as%20a%20promising%20augmentation%20strategy%2C%20these%20approaches%20often%20face%20challenges%20regarding%20training%20stability%20or%20inference%20efficiency.%20To%20bridge%20this%20gap%2C%20we%20propose%20EMGFlow%2C%20a%20conditional%20sEMG%20generation%20framework.%20To%20the%20best%20of%20our%20knowledge%2C%20this%20is%20the%20first%20study%20to%20investigate%20the%20application%20of%20Flow%20Matching%20%28FM%29%20and%20continuous-time%20generative%20modeling%20in%20the%20sEMG%20domain.%20To%20validate%20EMGFlow%20across%20three%20benchmark%20sEMG%20datasets%2C%20we%20employ%20a%20unified%20evaluation%20protocol%20integrating%20feature-based%20fidelity%2C%20distributional%20geometry%2C%20and%20downstream%20utility.%20Extensive%20evaluations%20show%20that%20EMGFlow%20outperforms%20conventional%20augmentation%20and%20GAN%20baselines%2C%20and%20provides%20stronger%20standalone%20utility%20than%20the%20diffusion%20baselines%20considered%20here%20under%20the%20train-on-synthetic%20test-on-real%20%28TSTR%29%20protocol.%20Furthermore%2C%20by%20optimizing%20generation%20dynamics%20through%20advanced%20numerical%20solvers%20and%20targeted%20time%20sampling%2C%20EMGFlow%20achieves%20improved%20quality-efficiency%20trade-offs.%20Taken%20together%2C%20these%20results%20suggest%20that%20Flow%20Matching%20is%20a%20promising%20and%20efficient%20paradigm%20for%20addressing%20data%20bottlenecks%20in%20myoelectric%20control%20systems.%20Our%20code%20is%20available%20at%3A%20https%3A//github.com/Open-EXG/EMGFlow.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13685v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEMGFlow%253A%2520Robust%2520and%2520Efficient%2520Surface%2520Electromyography%2520Synthesis%2520via%2520Flow%2520Matching%26entry.906535625%3DBoxuan%2520Jiang%2520and%2520Chenyun%2520Dai%2520and%2520Can%2520Han%26entry.1292438233%3DDeep%2520learning-based%2520surface%2520electromyography%2520%2528sEMG%2529%2520gesture%2520recognition%2520is%2520frequently%2520bottlenecked%2520by%2520data%2520scarcity%2520and%2520limited%2520subject%2520diversity.%2520While%2520synthetic%2520data%2520generation%2520via%2520Generative%2520Adversarial%2520Networks%2520%2528GANs%2529%2520and%2520diffusion%2520models%2520has%2520emerged%2520as%2520a%2520promising%2520augmentation%2520strategy%252C%2520these%2520approaches%2520often%2520face%2520challenges%2520regarding%2520training%2520stability%2520or%2520inference%2520efficiency.%2520To%2520bridge%2520this%2520gap%252C%2520we%2520propose%2520EMGFlow%252C%2520a%2520conditional%2520sEMG%2520generation%2520framework.%2520To%2520the%2520best%2520of%2520our%2520knowledge%252C%2520this%2520is%2520the%2520first%2520study%2520to%2520investigate%2520the%2520application%2520of%2520Flow%2520Matching%2520%2528FM%2529%2520and%2520continuous-time%2520generative%2520modeling%2520in%2520the%2520sEMG%2520domain.%2520To%2520validate%2520EMGFlow%2520across%2520three%2520benchmark%2520sEMG%2520datasets%252C%2520we%2520employ%2520a%2520unified%2520evaluation%2520protocol%2520integrating%2520feature-based%2520fidelity%252C%2520distributional%2520geometry%25 {"title": "Inertial Magnetic SLAM Systems Using Low-Cost Sensors", "author": "Chuan Huang and Gustaf Hendeby and Isaac Skog", "abstract": "Spatially inhomogeneous magnetic fields offer a valuable, non-visual information source for positioning. Among systems leveraging this, magnetic field-based simultaneous localization and mapping (SLAM) systems are particularly attractive. These systems execute positioning and magnetic field mapping tasks simultaneously, and they have bounded positioning error within previously visited regions. However, state-of-the-art magnetic-field SLAM methods typically require low-drift odometry data provided by visual odometry, a wheel encoder, or pedestrian dead-reckoning technology. To address this limitation, this work proposes loosely coupled and tightly coupled inertial magnetic SLAM (IM-SLAM) systems, which use only low-cost sensors: an inertial measurement unit (IMU), 30 magnetometers, and a barometer. Both systems are based on a magnetic-field-aided inertial navigation system (INS) and use error-state Kalman filters for state estimation. The key difference between the two systems is whether the navigation state estimation is done in one or two steps. These systems are evaluated in real-world indoor environments with multi-floor structures. The results of the experiment show that the tightly coupled IM-SLAM system achieves lower positioning errors than the loosely coupled system in most scenarios, with typical errors on the order of meters per 100 meters traveled. These results demonstrate the feasibility of developing a full 3D IM-SLAM system using low-cost sensors. A potential application of the proposed systems is for the positioning of emergency response officers.", "link": "http://arxiv.org/abs/2512.10128v3", "date": "2026-04-15", "relevancy": 2.2003, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5626}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5584}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5342}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Inertial%20Magnetic%20SLAM%20Systems%20Using%20Low-Cost%20Sensors&body=Title%3A%20Inertial%20Magnetic%20SLAM%20Systems%20Using%20Low-Cost%20Sensors%0AAuthor%3A%20Chuan%20Huang%20and%20Gustaf%20Hendeby%20and%20Isaac%20Skog%0AAbstract%3A%20Spatially%20inhomogeneous%20magnetic%20fields%20offer%20a%20valuable%2C%20non-visual%20information%20source%20for%20positioning.%20Among%20systems%20leveraging%20this%2C%20magnetic%20field-based%20simultaneous%20localization%20and%20mapping%20%28SLAM%29%20systems%20are%20particularly%20attractive.%20These%20systems%20execute%20positioning%20and%20magnetic%20field%20mapping%20tasks%20simultaneously%2C%20and%20they%20have%20bounded%20positioning%20error%20within%20previously%20visited%20regions.%20However%2C%20state-of-the-art%20magnetic-field%20SLAM%20methods%20typically%20require%20low-drift%20odometry%20data%20provided%20by%20visual%20odometry%2C%20a%20wheel%20encoder%2C%20or%20pedestrian%20dead-reckoning%20technology.%20To%20address%20this%20limitation%2C%20this%20work%20proposes%20loosely%20coupled%20and%20tightly%20coupled%20inertial%20magnetic%20SLAM%20%28IM-SLAM%29%20systems%2C%20which%20use%20only%20low-cost%20sensors%3A%20an%20inertial%20measurement%20unit%20%28IMU%29%2C%2030%20magnetometers%2C%20and%20a%20barometer.%20Both%20systems%20are%20based%20on%20a%20magnetic-field-aided%20inertial%20navigation%20system%20%28INS%29%20and%20use%20error-state%20Kalman%20filters%20for%20state%20estimation.%20The%20key%20difference%20between%20the%20two%20systems%20is%20whether%20the%20navigation%20state%20estimation%20is%20done%20in%20one%20or%20two%20steps.%20These%20systems%20are%20evaluated%20in%20real-world%20indoor%20environments%20with%20multi-floor%20structures.%20The%20results%20of%20the%20experiment%20show%20that%20the%20tightly%20coupled%20IM-SLAM%20system%20achieves%20lower%20positioning%20errors%20than%20the%20loosely%20coupled%20system%20in%20most%20scenarios%2C%20with%20typical%20errors%20on%20the%20order%20of%20meters%20per%20100%20meters%20traveled.%20These%20results%20demonstrate%20the%20feasibility%20of%20developing%20a%20full%203D%20IM-SLAM%20system%20using%20low-cost%20sensors.%20A%20potential%20application%20of%20the%20proposed%20systems%20is%20for%20the%20positioning%20of%20emergency%20response%20officers.%0ALink%3A%20http%3A//arxiv.org/abs/2512.10128v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInertial%2520Magnetic%2520SLAM%2520Systems%2520Using%2520Low-Cost%2520Sensors%26entry.906535625%3DChuan%2520Huang%2520and%2520Gustaf%2520Hendeby%2520and%2520Isaac%2520Skog%26entry.1292438233%3DSpatially%2520inhomogeneous%2520magnetic%2520fields%2520offer%2520a%2520valuable%252C%2520non-visual%2520information%2520source%2520for%2520positioning.%2520Among%2520systems%2520leveraging%2520this%252C%2520magnetic%2520field-based%2520simultaneous%2520localization%2520and%2520mapping%2520%2528SLAM%2529%2520systems%2520are%2520particularly%2520attractive.%2520These%2520systems%2520execute%2520positioning%2520and%2520magnetic%2520field%2520mapping%2520tasks%2520simultaneously%252C%2520and%2520they%2520have%2520bounded%2520positioning%2520error%2520within%2520previously%2520visited%2520regions.%2520However%252C%2520state-of-the-art%2520magnetic-field%2520SLAM%2520methods%2520typically%2520require%2520low-drift%2520odometry%2520data%2520provided%2520by%2520visual%2520odometry%252C%2520a%2520wheel%2520encoder%252C%2520or%2520pedestrian%2520dead-reckoning%2520technology.%2520To%2520address%2520this%2520limitat {"title": "Online Navigation Planning for Long-term Autonomous Operation of Underwater Gliders", "author": "Victor-Alexandru Darvariu and Charlotte Z. Reed and Jan Stratmann and Bruno Lacerda and Benjamin Allsup and Stephen Woodward and Elizabeth Siddle and Trishna Saeharaseelan and Owain Jones and Dan Jones and Tobias Ferreira and Chloe Baker and Kevin Chaplin and James Kirk and Ashley Iceton-Morris and Ryan D. Patmore and Jeff Polton and Charlotte Williams and Christopher D. J. Auckland and Rob A. Hall and Alexandra Kokkinaki and Alvaro Lorenzo Lopez and Justin J. H. Buck and Nick Hawes", "abstract": "Underwater glider robots have become indispensable for ocean sampling, yet fully autonomous long-term operation remains rare in practice. Although stakeholders are calling for tools to manage increasingly large fleets of gliders, existing methods have seen limited adoption due to their inability to account for environmental uncertainty and operational constraints. In this work, we demonstrate that uncertainty-aware online navigation planning can be deployed in real-world glider missions at scale. We formulate the problem as a stochastic shortest-path Markov Decision Process and propose a sample-based online planner based on Monte Carlo Tree Search. Samples are generated by a physics-informed simulator calibrated on real-world glider data that captures uncertain execution of controls and ocean current forecasts while remaining computationally tractable. Our methodology is integrated into an autonomous system for Slocum gliders that performs closed-loop replanning at each surfacing. The system was validated in two North Sea deployments totalling approximately 3 months and 1000 km, representing the longest fully autonomous glider campaigns in the literature to date. Results demonstrate improvements of up to 9.88% in dive duration and 16.51% in path length compared to standard straight-to-goal navigation, including a statistically significant path length reduction of 9.55% in a field deployment.", "link": "http://arxiv.org/abs/2602.19315v2", "date": "2026-04-15", "relevancy": 2.1824, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5644}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5329}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5305}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Online%20Navigation%20Planning%20for%20Long-term%20Autonomous%20Operation%20of%20Underwater%20Gliders&body=Title%3A%20Online%20Navigation%20Planning%20for%20Long-term%20Autonomous%20Operation%20of%20Underwater%20Gliders%0AAuthor%3A%20Victor-Alexandru%20Darvariu%20and%20Charlotte%20Z.%20Reed%20and%20Jan%20Stratmann%20and%20Bruno%20Lacerda%20and%20Benjamin%20Allsup%20and%20Stephen%20Woodward%20and%20Elizabeth%20Siddle%20and%20Trishna%20Saeharaseelan%20and%20Owain%20Jones%20and%20Dan%20Jones%20and%20Tobias%20Ferreira%20and%20Chloe%20Baker%20and%20Kevin%20Chaplin%20and%20James%20Kirk%20and%20Ashley%20Iceton-Morris%20and%20Ryan%20D.%20Patmore%20and%20Jeff%20Polton%20and%20Charlotte%20Williams%20and%20Christopher%20D.%20J.%20Auckland%20and%20Rob%20A.%20Hall%20and%20Alexandra%20Kokkinaki%20and%20Alvaro%20Lorenzo%20Lopez%20and%20Justin%20J.%20H.%20Buck%20and%20Nick%20Hawes%0AAbstract%3A%20Underwater%20glider%20robots%20have%20become%20indispensable%20for%20ocean%20sampling%2C%20yet%20fully%20autonomous%20long-term%20operation%20remains%20rare%20in%20practice.%20Although%20stakeholders%20are%20calling%20for%20tools%20to%20manage%20increasingly%20large%20fleets%20of%20gliders%2C%20existing%20methods%20have%20seen%20limited%20adoption%20due%20to%20their%20inab {"title": "GraphScout: Empowering Large Language Models with Intrinsic Exploration Ability for Agentic Graph Reasoning", "author": "Yuchen Ying and Weiqi Jiang and Tongya Zheng and Yu Wang and Shunyu Liu and Kaixuan Chen and Mingli Song", "abstract": "Knowledge graphs provide structured and reliable information for many real-world applications, motivating increasing interest in combining large language models (LLMs) with graph-based retrieval to improve factual grounding. Recent Graph-based Retrieval-Augmented Generation (GraphRAG) methods therefore introduce iterative interaction between LLMs and knowledge graphs to enhance reasoning capability. However, existing approaches typically depend on manually designed guidance and interact with knowledge graphs through a limited set of predefined tools, which substantially constrains graph exploration. To address these limitations, we propose GraphScout, a training-centric agentic graph reasoning framework equipped with more flexible graph exploration tools. GraphScout enables models to autonomously interact with knowledge graphs to synthesize structured training data which are then used to post-train LLMs, thereby internalizing agentic graph reasoning ability without laborious manual annotation or task curation. Extensive experiments across five knowledge-graph domains show that a small model (e.g., Qwen3-4B) augmented with GraphScout outperforms baseline methods built on leading LLMs (e.g., Qwen-Max) by an average of 16.7\\% while requiring significantly fewer inference tokens. Moreover, GraphScout exhibits robust cross-domain transfer performance. Our code will be made publicly available~\\footnote{https://github.com/Ying-Yuchen/_GraphScout_}.", "link": "http://arxiv.org/abs/2603.01410v2", "date": "2026-04-15", "relevancy": 2.1791, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5963}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5353}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5336}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GraphScout%3A%20Empowering%20Large%20Language%20Models%20with%20Intrinsic%20Exploration%20Ability%20for%20Agentic%20Graph%20Reasoning&body=Title%3A%20GraphScout%3A%20Empowering%20Large%20Language%20Models%20with%20Intrinsic%20Exploration%20Ability%20for%20Agentic%20Graph%20Reasoning%0AAuthor%3A%20Yuchen%20Ying%20and%20Weiqi%20Jiang%20and%20Tongya%20Zheng%20and%20Yu%20Wang%20and%20Shunyu%20Liu%20and%20Kaixuan%20Chen%20and%20Mingli%20Song%0AAbstract%3A%20Knowledge%20graphs%20provide%20structured%20and%20reliable%20information%20for%20many%20real-world%20applications%2C%20motivating%20increasing%20interest%20in%20combining%20large%20language%20models%20%28LLMs%29%20with%20graph-based%20retrieval%20to%20improve%20factual%20grounding.%20Recent%20Graph-based%20Retrieval-Augmented%20Generation%20%28GraphRAG%29%20methods%20therefore%20introduce%20iterative%20interaction%20between%20LLMs%20and%20knowledge%20graphs%20to%20enhance%20reasoning%20capability.%20However%2C%20existing%20approaches%20typically%20depend%20on%20manually%20designed%20guidance%20and%20interact%20with%20knowledge%20graphs%20through%20a%20limited%20set%20of%20predefined%20tools%2C%20which%20substantially%20constrains%20graph%20exploration.%20To%20address%20these%20limitations%2C%20we%20propose%20GraphScout%2C%20a%20training-centric%20agentic%20graph%20reasoning%20framework%20equipped%20with%20more%20flexible%20graph%20exploration%20tools.%20GraphScout%20enables%20models%20to%20autonomously%20interact%20with%20knowledge%20graphs%20to%20synthesize%20structured%20training%20data%20which%20are%20then%20used%20to%20post-train%20LLMs%2C%20thereby%20internalizing%20agentic%20graph%20reasoning%20ability%20without%20laborious%20manual%20annotation%20or%20task%20curation.%20Extensive%20experiments%20across%20five%20knowledge-graph%20domains%20show%20that%20a%20small%20model%20%28e.g.%2C%20Qwen3-4B%29%20augmented%20with%20GraphScout%20outperforms%20baseline%20methods%20built%20on%20leading%20LLMs%20%28e.g.%2C%20Qwen-Max%29%20by%20an%20average%20of%2016.7%5C%25%20while%20requiring%20significantly%20fewer%20inference%20tokens.%20Moreover%2C%20GraphScout%20exhibits%20robust%20cross-domain%20transfer%20performance.%20Our%20code%20will%20be%20made%20publicly%20available~%5Cfootnote%7Bhttps%3A//github.com/Ying-Yuchen/_GraphScout_%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01410v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGraphScout%253A%2520Empowering%2520Large%2520Language%2520Models%2520with%2520Intrinsic%2520Exploration%2520Ability%2520for%2520Agentic%2520Graph%2520Reasoning%26entry.906535625%3DYuchen%2520Ying%2520and%2520Weiqi%2520Jiang%2520and%2520Tongya%2520Zheng%2520and%2520Yu%2520Wang%2520and%2520Shunyu%2520Liu%2520and%2520Kaixuan%2520Chen%2520and%2520Mingli%2520Song%26entry.1292438233%3DKnowledge%2520graphs%2520provide%2520structured%2520and%2520reliable%2520information%2520for%2520many%2520real-world%2520applications%252C%2520motivating%2520increasing%2520interest%2520in%2520combining%2520large%2520language%2520models%2520%2528LLMs%2529%2520with%2520graph-based%2520retrieval%2520to%2520improve%2520factual%2520grounding.%2520Recent%2520Graph-based%2520Retrieval-Augmented%2520Generation%2520%2528GraphRAG%2529%2520methods%2520therefore%2520introduce%2520iterative%2520interaction%2520between%2520LLMs%2520and%2520knowledge%2520graphs%2520to%2520enhance%2520reasoning%2520capability.%2520However%252C%2520existing%2520approaches%2520typically%2520depend%2520on%2520manually%2520designed%2520guidance%2520and%2520interact%2520with%2520knowledge%2520graphs%2 {"title": "Reward Design for Physical Reasoning in Vision-Language Models", "author": "Derek Lilienthal and Manisha Mukherjee and Sameera Horawalavithana", "abstract": "Physical reasoning over visual inputs demands tight integration of visual perception, domain knowledge, and multi-step symbolic inference. Yet even state-of-the-art Vision Language Models (VLMs) fall far short of human performance on physics benchmarks. While post-training algorithms such as Supervised Fine-Tuning (SFT) and Group Relative Policy Optimization (GRPO) have demonstrated strong reasoning gains in language models, how reward design shapes VLM physical reasoning behavior remains poorly understood. We present a systematic reward ablation study for GRPO-based VLM training on physical reasoning. We compare four reward signals of increasing semantic richness: format compliance, answer accuracy, a composite rubric reward (answer correctness, physics principle identification, and unit consistency), and a novel internal reward derived from model attention weights over input image regions. We evaluate on PhyX, a 3,000-problem benchmark spanning six physics domains and six reasoning types across multiple-choice and open-ended formats, using IBM Granite Vision 3.3 (2B). Across both formats, GRPO with accuracy-based rewards outperforms SFT on most domains, though gains vary substantially by reward type and domain. Reward design does not uniformly improve performance. Instead, it induces domain-specific reasoning behaviors. Accuracy-based rewards provide the strongest overall gains. Rubric rewards improve structured reasoning quality without consistent accuracy improvements. Attention-based rewards enhance spatial reasoning while degrading performance in symbolic domains. Our internal attention-weight reward requires no spatial annotations and improves spatial relation accuracy from 0.27 to 0.50, suggesting that supervising where the model attends during generation is a promising direction for visually grounded physical reasoning.", "link": "http://arxiv.org/abs/2604.13993v1", "date": "2026-04-15", "relevancy": 2.1735, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5436}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5433}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5433}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Reward%20Design%20for%20Physical%20Reasoning%20in%20Vision-Language%20Models&body=Title%3A%20Reward%20Design%20for%20Physical%20Reasoning%20in%20Vision-Language%20Models%0AAuthor%3A%20Derek%20Lilienthal%20and%20Manisha%20Mukherjee%20and%20Sameera%20Horawalavithana%0AAbstract%3A%20Physical%20reasoning%20over%20visual%20inputs%20demands%20tight%20integration%20of%20visual%20perception%2C%20domain%20knowledge%2C%20and%20multi-step%20symbolic%20inference.%20Yet%20even%20state-of-the-art%20Vision%20Language%20Models%20%28VLMs%29%20fall%20far%20short%20of%20human%20performance%20on%20physics%20benchmarks.%20While%20post-training%20algorithms%20such%20as%20Supervised%20Fine-Tuning%20%28SFT%29%20and%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29%20have%20demonstrated%20strong%20reasoning%20gains%20in%20language%20models%2C%20how%20reward%20design%20shapes%20VLM%20physical%20reasoning%20behavior%20remains%20poorly%20understood.%20We%20present%20a%20systematic%20reward%20ablation%20study%20for%20GRPO-based%20VLM%20training%20on%20physical%20reasoning.%20We%20compare%20four%20reward%20signals%20of%20increasing%20semantic%20richness%3A%20format%20compliance%2C%20answer%20accuracy%2C%20a%20composite%20rubric%20reward%20%28answer%20correctness%2C%20physics%20principle%20identification%2C%20and%20unit%20consistency%29%2C%20and%20a%20novel%20internal%20reward%20derived%20from%20model%20attention%20weights%20over%20input%20image%20regions.%20We%20evaluate%20on%20PhyX%2C%20a%203%2C000-problem%20benchmark%20spanning%20six%20physics%20domains%20and%20six%20reasoning%20types%20across%20multiple-choice%20and%20open-ended%20formats%2C%20using%20IBM%20Granite%20Vision%203.3%20%282B%29.%20Across%20both%20formats%2C%20GRPO%20with%20accuracy-based%20rewards%20outperforms%20SFT%20on%20most%20domains%2C%20though%20gains%20vary%20substantially%20by%20reward%20type%20and%20domain.%20Reward%20design%20does%20not%20uniformly%20improve%20performance.%20Instead%2C%20it%20induces%20domain-specific%20reasoning%20behaviors.%20Accuracy-based%20rewards%20provide%20the%20strongest%20overall%20gains.%20Rubric%20rewards%20improve%20structured%20reasoning%20quality%20without%20consistent%20accuracy%20improvements.%20Attention-based%20rewards%20enhance%20spatial%20reasoning%20while%20degrading%20performance%20in%20symbolic%20domains.%20Our%20internal%20attention-weight%20reward%20requires%20no%20spatial%20annotations%20and%20improves%20spatial%20relation%20accuracy%20from%200.27%20to%200.50%2C%20suggesting%20that%20supervising%20where%20the%20model%20attends%20during%20generation%20is%20a%20promising%20direction%20for%20visually%20grounded%20physical%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13993v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReward%2520Design%2520for%2520Physical%2520Reasoning%2520in%2520Vision-Language%2520Models%26entry.906535625%3DDerek%2520Lilienthal%2520and%2520Manisha%2520Mukherjee%2520and%2520Sameera%2520Horawalavithana%26entry.1292438233%3DPhysical%2520reasoning%2520over%2520visual%2520inputs%2520demands%2520tight%2520integration%2520of%2520visual%2520perception%252C%2520domain%2520knowledge%252C%2520and%2520multi-step%2520symbolic%2520i {"title": "Creo: From One-Shot Image Generation to Progressive, Co-Creative Ideation", "author": "Zoe De Simone and Angie Boggust and Fredo Durand and Ashia Wilson and Arvind Satyanarayan", "abstract": "Text-to-image (T2I) systems enable rapid generation of high-fidelity imagery but are misaligned with how visual ideas develop. T2I systems generate outputs that make implicit visual decisions on behalf of the user, often introduce fine-grained details that can anchor users prematurely and limit their ability to keep options open early on, and cause unintended changes during editing that are difficult to correct and reduce users' sense of control. To address these concerns, we present Creo, a multi-stage T2I system that scaffolds image generation by progressing from rough sketches to high-resolution outputs, exposing intermediary abstractions where users can make incremental changes. Sketch-like abstractions invite user editing and allow users to keep design options open when ideas are still forming due to their provisional nature. Each stage in Creo can be modified with manual changes and AI-assisted operations, enabling fine-grained, step-wise control through a locking mechanism that preserves prior decisions so subsequent edits affect only specified regions or attributes. Users remain in the loop, making and verifying decisions across stages, while the system applies diffs instead of regenerating full images, reducing drift as fidelity increases. A comparative study with a one-shot baseline shows that participants felt stronger ownership over Creo outputs, as they were able to trace their decisions in building up the image. Furthermore, embedding-based analysis indicates that Creo outputs are less homogeneous than one-shot results. These findings suggest that multi-stage generation, combined with intermediate control and decision locking, is a key design principle for improving controllability, user agency, creativity, and output diversity in generative systems.", "link": "http://arxiv.org/abs/2604.13956v1", "date": "2026-04-15", "relevancy": 2.1687, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5604}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5523}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5248}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Creo%3A%20From%20One-Shot%20Image%20Generation%20to%20Progressive%2C%20Co-Creative%20Ideation&body=Title%3A%20Creo%3A%20From%20One-Shot%20Image%20Generation%20to%20Progressive%2C%20Co-Creative%20Ideation%0AAuthor%3A%20Zoe%20De%20Simone%20and%20Angie%20Boggust%20and%20Fredo%20Durand%20and%20Ashia%20Wilson%20and%20Arvind%20Satyanarayan%0AAbstract%3A%20Text-to-image%20%28T2I%29%20systems%20enable%20rapid%20generation%20of%20high-fidelity%20imagery%20but%20are%20misaligned%20with%20how%20visual%20ideas%20develop.%20T2I%20systems%20generate%20outputs%20that%20make%20implicit%20visual%20decisions%20on%20behalf%20of%20the%20user%2C%20often%20introduce%20fine-grained%20details%20that%20can%20anchor%20users%20prematurely%20and%20limit%20their%20ability%20to%20keep%20options%20open%20early%20on%2C%20and%20cause%20unintended%20changes%20during%20editing%20that%20are%20difficult%20to%20correct%20and%20reduce%20users%27%20sense%20of%20control.%20To%20address%20these%20concerns%2C%20we%20present%20Creo%2C%20a%20multi-stage%20T2I%20system%20that%20scaffolds%20image%20generation%20by%20progressing%20from%20rough%20sketches%20to%20high-resolution%20outputs%2C%20exposing%20intermediary%20abstractions%20where%20users%20can%20make%20incremental%20changes.%20Sketch-like%20abstractions%20invite%20user%20editing%20and%20allow%20users%20to%20keep%20design%20options%20open%20when%20ideas%20are%20still%20forming%20due%20to%20their%20provisional%20nature.%20Each%20stage%20in%20Creo%20can%20be%20modified%20with%20manual%20changes%20and%20AI-assisted%20operations%2C%20enabling%20fine-grained%2C%20step-wise%20control%20through%20a%20locking%20mechanism%20that%20preserves%20prior%20decisions%20so%20subsequent%20edits%20affect%20only%20specified%20regions%20or%20attributes.%20Users%20remain%20in%20the%20loop%2C%20making%20and%20verifying%20decisions%20across%20stages%2C%20while%20the%20system%20applies%20diffs%20instead%20of%20regenerating%20full%20images%2C%20reducing%20drift%20as%20fidelity%20increases.%20A%20comparative%20study%20with%20a%20one-shot%20baseline%20shows%20that%20participants%20felt%20stronger%20ownership%20over%20Creo%20outputs%2C%20as%20they%20were%20able%20to%20trace%20their%20decisions%20in%20building%20up%20the%20image.%20Furthermore%2C%20embedding-based%20analysis%20indicates%20that%20Creo%20outputs%20are%20less%20homogeneous%20than%20one-shot%20results.%20These%20findings%20suggest%20that%20multi-stage%20generation%2C%20combined%20with%20intermediate%20control%20and%20decision%20locking%2C%20is%20a%20key%20design%20principle%20for%20improving%20controllability%2C%20user%20agency%2C%20creativity%2C%20and%20output%20diversity%20in%20generative%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13956v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCreo%253A%2520From%2520One-Shot%2520Image%2520Generation%2520to%2520Progressive%252C%2520Co-Creative%2520Ideation%26entry.906535625%3DZoe%2520De%2520Simone%2520and%2520Angie%2520Boggust%2520and%2520Fredo%2520Durand%2520and%2520Ashia%2520Wilson%2520and%2520Arvind%2520Satyanarayan%26entry.1292438233%3DText-to-image%2520%2528T2I%2529%2520systems%2520enable%2520rapid%2520generation%2520of%2520high-fidelity%2520imagery%2520but%2520are%2520misaligned%2520with%2520how%2520visual%2520ideas%2520develop.%2520T2I%2520systems%2520gen {"title": "Gradient Descent's Last Iterate is Often (slightly) Suboptimal", "author": "Guy Kornowski and Ohad Shamir", "abstract": "We consider the well-studied setting of minimizing a convex Lipschitz function using either gradient descent (GD) or its stochastic variant (SGD), and examine the last iterate convergence. By now, it is known that standard stepsize choices lead to a last iterate convergence rate of $\\log T/\\sqrt{T}$ after $T$ steps. A breakthrough result of Jain et al. [2019] recovered the optimal $1/\\sqrt{T}$ rate by constructing a non-standard stepsize sequence. However, this sequence requires choosing $T$ in advance, as opposed to common stepsize schedules which apply for any time horizon. Moreover, Jain et al. conjectured that without prior knowledge of $T$, no stepsize sequence can ensure the optimal error for SGD's last iterate, a claim which so far remained unproven. We prove this conjecture, and in fact show that even in the noiseless case of GD, it is impossible to avoid an excess poly-log factor in $T$ when considering an anytime last iterate guarantee. Our proof further suggests that such (slightly) suboptimal stopping times are unavoidably common.", "link": "http://arxiv.org/abs/2604.13870v1", "date": "2026-04-15", "relevancy": 2.1553, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4448}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4348}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4135}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gradient%20Descent%27s%20Last%20Iterate%20is%20Often%20%28slightly%29%20Suboptimal&body=Title%3A%20Gradient%20Descent%27s%20Last%20Iterate%20is%20Often%20%28slightly%29%20Suboptimal%0AAuthor%3A%20Guy%20Kornowski% {"title": "ROSE: Retrieval-Oriented Segmentation Enhancement", "author": "Song Tang and Guangquan Jie and Henghui Ding and Yu-Gang Jiang", "abstract": "Existing segmentation models based on multimodal large language models (MLLMs), such as LISA, often struggle with novel or emerging entities due to their inability to incorporate up-to-date knowledge. To address this challenge, we introduce the Novel Emerging Segmentation Task (NEST), which focuses on segmenting (i) novel entities that MLLMs fail to recognize due to their absence from training data, and (ii) emerging entities that exist within the model's knowledge but demand up-to-date external information for accurate recognition. To support the study of NEST, we construct a NEST benchmark using an automated pipeline that generates news-related data samples for comprehensive evaluation. Additionally, we propose ROSE: Retrieval-Oriented Segmentation Enhancement, a plug-and-play framework designed to augment any MLLM-based segmentation model. ROSE comprises four key components. First, an Internet Retrieval-Augmented Generation module is introduced to employ user-provided multimodal inputs to retrieve real-time web information. Then, a Textual Prompt Enhancer enriches the model with up-to-date information and rich background knowledge, improving the model's perception ability for emerging entities. Furthermore, a Visual Prompt Enhancer is proposed to compensate for MLLMs' lack of exposure to novel entities by leveraging internet-sourced images. To maintain efficiency, a WebSense module is introduced to intelligently decide when to invoke retrieval mechanisms based on user input. Experimental results demonstrate that ROSE significantly boosts performance on the NEST benchmark, outperforming a strong Gemini-2.0 Flash-based retrieval baseline by 19.2 in gIoU.", "link": "http://arxiv.org/abs/2604.14147v1", "date": "2026-04-15", "relevancy": 2.1459, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5382}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5382}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5278}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ROSE%3A%20Retrieval-Oriented%20Segmentation%20Enhancement&body=Title%3A%20ROSE%3A%20Retrieval-Oriented%20Segmentation%20Enhancement%0AAuthor%3A%20Song%20Tang%20and%20Guangquan%20Jie%20and%20Henghui%20Ding%20and%20Yu-Gang%20Jiang%0AAbstract%3A%20Existing%20segmentation%20models%20based%20on%20multimodal%20large%20language%20models%20%28MLLMs%29%2C%20such%20as%20LISA%2C%20often%20struggle%20with%20novel%20or%20emerging%20entities%20due%20to%20their%20inability%20to%20incorporate%20up-to-date%20knowledge.%20To%20address%20this%20challenge%2C%20we%20introduce%20the%20Novel%20Emerging%20Segmentation%20Task%20%28NEST%29%2C%20which%20focuses%20on%20segmenting%20%28i%29%20novel%20entities%20that%20MLLMs%20fail%20to%20recognize%20due%20to%20their%20absence%20from%20training%20data%2C%20and%20%28ii%29%20emerging%20entities%20that%20exist%20within%20the%20model%27s%20knowledge%20but%20demand%20up-to-date%20external%20information%20for%20accurate%20recognition.%20To%20support%20the%20study%20of%20NEST%2C%20we%20construct%20a%20NEST%20benchmark%20using%20an%20automated%20pipeline%20that%20generates%20news-related%20data%20samples%20for%20comprehensive%20evaluation.%20Additionally%2C%20we%20propose%20ROSE%3A%20Retrieval-Oriented%20Segmentation%20Enhancement%2C%20a%20plug-and-play%20framework%20designed%20to%20augment%20any%20MLLM-based%20segmentation%20model.%20ROSE%20comprises%20four%20key%20components.%20First%2C%20an%20Internet%20Retrieval-Augmented%20Generation%20module%20is%20introduced%20to%20employ%20user-provided%20multimodal%20inputs%20to%20retrieve%20real-time%20web%20information.%20Then%2C%20a%20Textual%20Prompt%20Enhancer%20enriches%20the%20model%20with%20up-to-date%20information%20and%20rich%20background%20knowledge%2C%20improving%20the%20model%27s%20perception%20ability%20for%20emerging%20entities.%20Furthermore%2C%20a%20Visual%20Prompt%20Enhancer%20is%20proposed%20to%20compensate%20for%20MLLMs%27%20lack%20of%20exposure%20to%20novel%20entities%20by%20leveraging%20internet-sourced%20images.%20To%20maintain%20efficiency%2C%20a%20WebSense%20module%20is%20introduced%20to%20intelligently%20decide%20when%20to%20invoke%20retrieval%20mechanisms%20based%20on%20user%20input.%20Experimental%20results%20demonstrate%20that%20ROSE%20significantly%20boosts%20performance%20on%20the%20NEST%20benchmark%2C%20outperforming%20a%20strong%20Gemini-2.0%20Flash-based%20retrieval%20baseline%20by%2019.2%20in%20gIoU.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14147v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DROSE%253A%2520Retrieval-Oriented%2520Segmentation%2520Enhancement%26entry.906535625%3DSong%2520Tang%2520and%2520Guangquan%2520Jie%2520and%2520Henghui%2520Ding%2520and%2520Yu-Gang%2520Jiang%26entry.1292438233%3DExisting%2520segmentation%2520models%2520based%2520on%2520multimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%252C%2520such%2520as%2520LISA%252C%2520often%2520struggle%2520with%2520novel%2520or%2520emerging%2520entities%2520due%2520to%2520their%2520inability%2520to%2520incorporate%2520up-to-date%2520knowledge.%2520To%2520address%2520this%2520challenge%252C%2520we%2520introduce%2520the%2520Novel%2520Emerging%2520Segmentation%2520Task%2520%2528NEST%2529%252C%2520which%2520focuses%2520on%2520segmenting%2520%2528i%2529%2520novel%2520entities%2520that%2520MLLMs%2520fail%2520to%2520recognize%2520due%2520to%2520their%2520absence%2520from%2520training%25 {"title": "Hydra: Unifying Document Retrieval and Generation in a Single Vision-Language Model", "author": "Athos Georgiou", "abstract": "Visual document understanding typically requires separate retrieval and generation models, doubling memory and system complexity. We present Hydra, a dual-head approach that provides both ColBERT-style late-interaction retrieval and autoregressive generation from a single vision-language model (VLM). A single LoRA adapter, trained only for retrieval, is toggled at inference: enabling it produces multi-vector embeddings; disabling it recovers the base model's generation quality -- byte-identical outputs in 100% of 10,500 greedy and stochastic samples, with max delta-ANLS = 0.0044 across 15,301 samples on four VQA benchmarks (three informative; ChartQA is near-zero for both models under greedy decoding) when compared against an independent base-model pipeline. We identify three engineering requirements (attention-mode restoration, lm_head preservation, KV-cache-aware decoding) whose omission silently breaks generation despite correct weight recovery. On ViDoRe V1, Hydra (4B) is within 1 percentage point of a controlled single-head baseline in a single training run, with higher aggregate scores on V2 and V3 that are concentrated on a subset of tasks; multi-seed experiments are needed to confirm these trends. The single-model design cuts peak GPU memory from 17.9 GB (two-model baseline) to 9.2 GB -- a 48% reduction, though adapter switching introduces throughput overhead under concurrent serving loads. An ablation shows that GritLM-style joint training provides no benefit within the LoRA-based (r=16) training regime. A proof-of-concept extension to Qwen2.5-Omni-3B demonstrates that the mechanism generalizes to audio retrieval and video embedding, with speech generation.", "link": "http://arxiv.org/abs/2603.28554v2", "date": "2026-04-15", "relevancy": 2.1394, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5393}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5393}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5125}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hydra%3A%20Unifying%20Document%20Retrieval%20and%20Generation%20in%20a%20Single%20Vision-Language%20Model&body=Title%3A%20Hydra%3A%20Unifying%20Document%20Retrieval%20and%20Generation%20in%20a%20Single%20Vision-Language%20Model%0AAuthor%3A%20Athos%20Georgiou%0AAbstract%3A%20Visual%20document%20understanding%20typically%20requires%20separate%20retrieval%20and%20generation%20models%2C%20doubling%20memory%20and%20system%20complexity.%20We%20present%20Hydra%2C%20a%20dual-head%20approach%20that%20provides%20both%20ColBERT-style%20late-interaction%20retrieval%20and%20autoregressive%20generation%20from%20a%20single%20vision-language%20model%20%28VLM%29.%20A%20single%20LoRA%20adapter%2C%20trained%20only%20for%20retrieval%2C%20is%20toggled%20at%20inference%3A%20enabling%20it%20produces%20multi-vector%20embeddings%3B%20disabling%20it%20recovers%20the%20base%20model%27s%20generation%20quality%20--%20byte-identical%20outputs%20in%20100%25%20of%2010%2C500%20greedy%20and%20stochastic%20samples%2C%20with%20max%20delta-ANLS%20%3D%200.0044%20across%2015%2C301%20samples%20on%20four%20VQA%20benchmarks%20%28three%20informative%3B%20ChartQA%20is%20near-zero%20for%20both%20models%20under%20greedy%20decoding%29%20when%20compared%20against%20an%20independent%20base-model%20pipeline.%20We%20identify%20three%20engineering%20requirements%20%28attention-mode%20restoration%2C%20lm_head%20preservation%2C%20KV-cache-aware%20decoding%29%20whose%20omission%20silently%20breaks%20generation%20despite%20correct%20weight%20recovery.%20On%20ViDoRe%20V1%2C%20Hydra%20%284B%29%20is%20within%201%20percentage%20point%20of%20a%20controlled%20single-head%20baseline%20in%20a%20single%20training%20run%2C%20with%20higher%20aggregate%20scores%20on%20V2%20and%20V3%20that%20are%20concentrated%20on%20a%20subset%20of%20tasks%3B%20multi-seed%20experiments%20are%20needed%20to%20confirm%20these%20trends.%20The%20single-model%20design%20cuts%20peak%20GPU%20memory%20from%2017.9%20GB%20%28two-model%20baseline%29%20to%209.2%20GB%20--%20a%2048%25%20reduction%2C%20though%20adapter%20switching%20introduces%20throughput%20overhead%20under%20concurrent%20serving%20loads.%20An%20ablation%20shows%20that%20GritLM-style%20joint%20training%20provides%20no%20benefit%20within%20the%20LoRA-based%20%28r%3D16%29%20training%20regime.%20A%20proof-of-concept%20extension%20to%20Qwen2.5-Omni-3B%20demonstrates%20that%20the%20mechanism%20generalizes%20to%20audio%20retrieval%20and%20video%20embedding%2C%20with%20speech%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28554v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHydra%253A%2520Unifying%2520Document%2520Retrieval%2520and%2520Generation%2520in%2520a%2520Single%2520Vision-Language%2520Model%26entry.906535625%3DAthos%2520Georgiou%26entry.1292438233%3DVisual%2520document%2520understanding%2520typically%2520requires%2520separate%2520retrieval%2520and%2520generation%2520models%252C%2520doubling%2520memory%2520and%2520system%2520complexity.%2520We%2520present%2520Hydra%252C%2520a%2520dual-head%2520approach%2520that%2520provides%2520both%2520ColBERT-style%2520late-interaction%2520retrieval%2520and%2520autoregressive%2520generation%2520from%2520a%2520single%2520vision-language%2520model%2520%2528VLM%2529.%2520A%2520single%2520LoRA%2520adapter%252C%2520trained%2520only%2520for%2520retrieval%252C%2520is%2520toggled%2520at%2520inference%253A%2520enabling%2520it%2520produces%2520multi-vector%2520embed {"title": "UI-Zoomer: Uncertainty-Driven Adaptive Zoom-In for GUI Grounding", "author": "Fei Tang and Bofan Chen and Zhengxi Lu and Tongbo Chen and Songqin Nong and Tao Jiang and Wenhao Xu and Weiming Lu and Jun Xiao and Yueting Zhuang and Yongliang Shen", "abstract": "GUI grounding, which localizes interface elements from screenshots given natural language queries, remains challenging for small icons and dense layouts. Test-time zoom-in methods improve localization by cropping and re-running inference at higher resolution, but apply cropping uniformly across all instances with fixed crop sizes, ignoring whether the model is actually uncertain on each case. We propose \\textbf{UI-Zoomer}, a training-free adaptive zoom-in framework that treats both the trigger and scale of zoom-in as a prediction uncertainty quantification problem. A confidence-aware gate fuses spatial consensus among stochastic candidates with token-level generation confidence to selectively trigger zoom-in only when localization is uncertain. When triggered, an uncertainty-driven crop sizing module decomposes prediction variance into inter-sample positional spread and intra-sample box extent, deriving a per-instance crop radius via the law of total variance. Extensive experiments on ScreenSpot-Pro, UI-Vision, and ScreenSpot-v2 demonstrate consistent improvements over strong baselines across multiple model architectures, achieving gains of up to +13.4\\%, +10.3\\%, and +4.2\\% respectively, with no additional training required.", "link": "http://arxiv.org/abs/2604.14113v1", "date": "2026-04-15", "relevancy": 2.1367, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5504}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.54}, {"title": "UGG: Unified Generative Grasping", " l%20architectures%2C%20achieving%20gains%20of%20up%20to%20%2B13.4%5C%25%2C%20%2B10.3%5C%25%2C%20and%20%2B4.2%5C%25%20respectively%2C%20with%20no%20additional%20training%20required.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14113v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUI-Zoomer%253A%2520Uncertainty-Driven%2520Adaptive%2520Zoom-In%2520for%2520GUI%2520Grounding%26entry.906535625%3DFei%2520Tang%2520and%2520Bofan%2520Chen%2520and%2520Zhengxi%2520Lu%2520and%2520Tongbo%2520Chen%2520and%2520Songqin%2520Nong%2520and%2520Tao%2520Jiang%2520and%2520Wenhao%2520Xu%2520and%2520Weiming%2520Lu%2520and%2520Jun%2520Xiao%2520and%2520Yueting%2520Zhuang%2520and%2520Yongliang%2520Shen%26entry.1292438233%3DGUI%2520grounding%252C%2520which%2520localizes%2520interface%2520elements%2520from%2520screenshots%2520given%2520natural%2520language%2520queries%252C%2520remains%2520challenging%2520for%2520small%2520icons%2520and%2520dense%2520layouts.%2520Test-time%2520zoom-in%2520methods%2520improve%2520localization%2520by%2520cropping%2520and%2520re-running%2520inference%2520at%2520higher%2520resolution%252C%2520but%2520apply%2520cropping%2520uniformly%2520across%2520all%2520instances%2520with%2520fixed%2520crop%2520sizes%252C%2520ignoring%2520whether%2520the%2520model%2520is%2520actually%2520uncertain%2520on%2520each%2520case.%2520We%2520propose%2520%255Ctextbf%257BUI-Zoomer%257D%252C%2520a%2520training-free%2520adaptive%2520zoom-in%2520framework%2520that%2520treats%2520both%2520the%2520trigger%2520and%2520scale%2520of%2520zoom-in%2520as%2520a%2520prediction%2520uncertainty%2520quantification%2520problem.%2520A%2520confidence-aware%2520gate%2520fuses%2520spatial%2520consensus%2520among%2520stochastic%2520candidates%2520with%2520token-level%2520generation%2520confidence%2520to%2520selectively%2520trigger%2520zoom-in%2520only%2520when%2520localization%2520is%2520uncertain.%2520When%2520triggered%252C%2520a {"title": "The Gaussian Latent Machine: Efficient Prior and Posterior Sampling for Inverse Problems", "author": "Muhamed Kuric and Martin Zach and Andreas Habring and Michael Unser and Thomas Pock", "abstract": "We consider the problem of sampling from a product-of-experts-type model that encompasses many standard prior and posterior distributions commonly found in Bayesian imaging. We show that this model can be easily lifted into a novel latent variable model, which we refer to as a Gaussian latent machine. This leads to a general sampling approach that unifies and generalizes many existing sampling algorithms in the literature. Most notably, it yields a highly efficient and effective two-block Gibbs sampling approach in the general case, while also specializing to direct sampling algorithms in particular cases. Finally, we present detailed numerical experiments that demonstrate the efficiency and effectiveness of our proposed sampling approach across a wide range of prior and posterior sampling problems from Bayesian imaging.", "link": "http://arxiv.org/abs/2505.12836v2", "date": "2026-04-15", "relevancy": 2.129, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5391}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5299}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5263}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Gaussian%20Latent%20Machine%3A%20Efficient%20Prior%20and%20Posterior%20Sampling%20for%20Inverse%20Problems&body=Title%3A%20The%20Gaussian%20Latent%20Machine%3A%20Efficient%20Prior%20and%20Posterior%20Sampling%20for%20Inverse%20Problems%0AAuthor%3A%20Muhamed%20Kuric%20and%20Martin%20Zach%20and%20Andreas%20Habring%20and%20Michael%20Unser%20and%20Thomas%20Pock%0AAbstract%3A%20We%20consider%20the%20problem%20of%20sampling%20from%20a%20product-of-experts-type%20model%20that%20encompasses%20many%20standard%20prior%20and%20posterior%20distributions%20commonly%20found%20in%20Bayesian%20imaging.%20We%20show%20that%20this%20model%20can%20be%20easily%20lifted%20into%20a%20novel%20latent%20variable%20model%2C%20which%20we%20refer%20to%20as%20a%20Gaussian%20latent%20machine.%20This%20leads%20to%20a%20general%20sampling%20approach%20that%20unifies%20and%20generalizes%20many%20existing%20sampling%20algorithms%20in%20the%20literature.%20Most%20notably%2C%20it%20yields%20a%20highly%20efficient%20and%20effective%20two-block%20Gibbs%20sampling%20approach%20in%20the%20general%20case%2C%20while%20also%20specializing%20to%20direct%20sampling%20algorithms%20in%20particular%20cases.%20Finally%2C%20we%20present%20detailed%20numerical%20experiments%20that%20demonstrate%20the%20efficiency%20and%20effectiveness%20of%20our%20proposed%20sampling%20approach%20across%20a%20wide%20range%20of%20prior%20and%20posterior%20sampling%20problems%20from%20Bayesian%20imaging.%0ALink%3A%20http%3A//arxiv.org/abs/2505.12836v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Gaussian%2520Latent%2520Machine%253A%2520Efficient%2520Prior%2520and%2520Posterior%2520Sampling%2520for%2520Inverse%2520Problems%26entry.906535625%3DMuhamed%2520Kuric%2520and%2520Martin%2520Zach%2520and%2520Andreas%2520Habring%2520and%2520Michael%2520Unser%2520and%2520Thomas%2520Pock%26entry.1292438233%3DWe%2520consider%2520the%2520problem%2520of%2520sampling%2520from%2520a%2520product-of-experts-type%2520model%2520that%2520encompasses%2520many%2520standard%2520prior%2520and%2520posterior%2520distributions%2520commonly%2520found%2520in%2520Bayesian%2520imaging.%2520We%2520show%2520that%2520this%2520model%2520can%2520be%2520easily%2520lifted%2520into%2520a%2520novel%2520latent%2520variable%2520model%252C%2520which%2520we%2520refer%2520to%2520as%2520a%2520Gaussian%2520latent%2520machine.%2520This%2520leads%2520to%2520a%2520general%2520sampling%2520approach%2520that%2520unifies%2520and%2520generalizes%2520many%2520existing%2520sampling%2520algorithms%2520in%2520the%2520literature.%2520Most%2520notably%252C%2520it%2520yields%2520a%2520highly%2520efficient%2520and%2520effective%2520two-block%2520Gibbs%2520sampling%2520approach%2520in%2520the%2520general%2520case%252C%2520while%2520also%2520specializing%2520to%2520direct%2520sampling%2520algorithms%2520in%2520particular%2520cases.%2520Finally%252C%2520we%2520present%2520detailed%2520numerical%2520experiments%2520that%2520demonstrate%2520the%2520efficiency%2520and%2520effectiveness%2520of%2520our%2520proposed%2520sampling%2520approach%2520across%2520a%2520wide%2520range%2520of%2520prior%2520and%2520posterior%2520sampling%2520problems%2520from%2520Bayesian%2520imaging.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2505.12836v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=The%20Gaussian%20Latent%20Machine%3A%20Efficient%20Prior%20and%20Posterior%20Sampling%20for%20Inverse%20Problems&entry.906535625=Muhamed%20Kuric%20and%20Martin%20Zach%20and%20Andreas%20Habring%20and%20Michael%20Unser%20and%20Thomas%20Pock&entry.1292438233=We%20consider%20the%20problem%20of%20sampling%20from%20a%20product-of-experts-type%20model%20that%20encompasses%20many%20standard%20prior%20and%20posterior%20distributions%20commonly%20found%20in%20Bayesian%20imaging.%20We%20show%20that%20this%20model%20can%20be%20easily%20lifted%20into%20a%20novel%20latent%20variable%20model%2C%20which%20we%20refer%20to%20as%20a%20Gaussian%20latent%20machine.%20This%20leads%20to%20a%20general%20sampling%20approach%20that%20unifies%20and%20generalizes%20many%20existing%20sampling%20algorithms%20in%20the%20literature.%20Most%20notably%2C%20

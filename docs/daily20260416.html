{"title": "Feed-Forward 3D Scene Modeling: A Problem-Driven Perspective", "author": "Weijie Wang and Qihang Cao and Sensen Gao and Donny Y. Chen and Haofei Xu and Wenjing Bian and Songyou Peng and Tat-Jen Cham and Chuanxia Zheng and Andreas Geiger and Jianfei Cai and Jia-Wang Bian and Bohan Zhuang", "abstract": "Reconstructing 3D representations from 2D inputs is a fundamental task in computer vision and graphics, serving as a cornerstone for understanding and interacting with the physical world. While traditional methods achieve high fidelity, they are limited by slow per-scene optimization or category-specific training, which hinders their practical deployment and scalability. Hence, generalizable feed-forward 3D reconstruction has witnessed rapid development in recent years. By learning a model that maps images directly to 3D representations in a single forward pass, these methods enable efficient reconstruction and robust cross-scene generalization. Our survey is motivated by a critical observation: despite the diverse geometric output representations, ranging from implicit fields to explicit primitives, existing feed-forward approaches share similar high-level architectural patterns, such as image feature extraction backbones, multi-view information fusion mechanisms, and geometry-aware design principles. Consequently, we abstract away from these representation differences and instead focus on model design, proposing a novel taxonomy centered on model design strategies that are agnostic to the output format. Our proposed taxonomy organizes the research directions into five key problems that drive recent research development: feature enhancement, geometry awareness, model efficiency, augmentation strategies and temporal-aware models. To support this taxonomy with empirical grounding and standardized evaluation, we further comprehensively review related benchmarks and datasets, and extensively discuss and categorize real-world applications based on feed-forward 3D models. Finally, we outline future directions to address open challenges such as scalability, evaluation standards, and world modeling.", "link": "http://arxiv.org/abs/2604.14025v1", "date": "2026-04-15", "relevancy": 3.2087, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6464}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6464}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6324}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Feed-Forward%203D%20Scene%20Modeling%3A%20A%20Problem-Driven%20Perspective&body=Title%3A%20Feed-Forward%203D%20Scene%20Modeling%3A%20A%20Problem-Driven%20Perspective%0AAuthor%3A%20Weijie%20Wang%20and%20Qihang%20Cao%20and%20Sensen%20Gao%20and%20Donny%20Y.%20Chen%20and%20Haofei%20Xu%20and%20Wenjing%20Bian%20and%20Songyou%20Peng%20and%20Tat-Jen%20Cham%20and%20Chuanxia%20Zheng%20and%20Andreas%20Geiger%20and%20Jianfei%20Cai%20and%20Jia-Wang%20Bian%20and%20Bohan%20Zhuang%0AAbstract%3A%20Reconstructing%203D%20representations%20from%202D%20inputs%20is%20a%20fundamental%20task%20in%20computer%20vision%20and%20graphics%2C%20serving%20as%20a%20cornerstone%20for%20understanding%20and%20interacting%20with%20the%20physical%20world.%20While%20traditional%20methods%20achieve%20high%20fidelity%2C%20they%20are%20limited%20by%20slow%20per-scene%20optimization%20or%20category-specific%20training%2C%20which%20hinders%20their%20practical%20deployment%20and%20scalability.%20Hence%2C%20generalizable%20feed-forward%203D%20reconstruction%20has%20witnessed%20rapid%20development%20in%20recent%20years.%20By%20learning%20a%20model%20that%20maps%20images%20directly%20to%203D%20representations%20in%20a%20single%20forward%20pass%2C%20thes {"title": "Free Geometry: Refining 3D Reconstruction from Longer Versions of Itself", "author": "Yuhang Dai and Xingyi Yang", "abstract": "Feed-forward 3D reconstruction models are efficient but rigid: once trained, they perform inference in a zero-shot manner and cannot adapt to the test scene. As a result, visually plausible reconstructions often contain errors, particularly under occlusions, specularities, and ambiguous cues. To address this, we introduce Free Geometry, a framework that enables feed-forward 3D reconstruction models to self-evolve at test time without any 3D ground truth. Our key insight is that, when the model receives more views, it produces more reliable and view-consistent reconstructions. Leveraging this property, given a testing sequence, we mask a subset of frames to construct a self-supervised task. Free Geometry enforces cross-view feature consistency between representations from full and partial observations, while maintaining the pairwise relations implied by the held-out frames. This self-supervision allows for fast recalibration via lightweight LoRA updates, taking less than 2 minutes per dataset on a single GPU. Our approach consistently improves state-of-the-art foundation models, including Depth Anything 3 and VGGT, across 4 benchmark datasets, yielding an average improvement of 3.73% in camera pose accuracy and 2.88% in point map prediction. Code is available at https://github.com/hiteacherIamhumble/Free-Geometry .", "link": "http://arxiv.org/abs/2604.14048v1", "date": "2026-04-15", "relevancy": 3.1488, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6481}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6323}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "htt d%202.88%25%20in%20point%20map%20prediction.%20Code%20is%20available%20at%20https%3A//github.com/hiteacherIamhumble/Free-Geometry%20.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14048v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFree%2520Geometry%253A%2520Refining%25203D%2520Reconstruction%2520from%2520Longer%2520Versions%2520of%2520Itself%26entry.906535625%3DYuhang%2520Dai%2520and%2520Xingyi%2520Yang%26entry.1292438233%3DFeed-forward%25203D%2520reconstruction%2520models%2520are%2520efficient%2520but%2520rigid%253A%2520once%2520trained%252C%2520they%2520perform%2520inference%2520in%2520a%2520zero-shot%2520manner%2520and%2520cannot%2520adapt%2520to%2520the%2520test%2520scene.%2520As%2520a%2520result%252C%2520visually%2520plausible%2520reconstructions%2520often%2520contain%2520errors%252C%2520particularly%2520under%2520occlusions%252C%2520specularities%252C%2520and%2520ambiguous%2520cues.%2520To%2520address%2520this%252C%2520we%2520introduce%2520Free%2520Geometry%252C%2520a%2520framework%2520that%2520enables%2520feed-forward%25203D%2520reconstruction%2520models%2520to%2520self-evolve%2520at%2520test%2520time%2520without%2520any%25203D%2520ground%2520truth.%2520Our%2520key%2520insight%2520is%2520that%252C%2520when%2520the%2520model%2520receives%2520more%2520views%252C%2520it%2520produces%2520more%2520reliable%2520and%2520view-consistent%2520reconstructions.%2520Leveraging%2520this%2520property%252C%2520given%2520a%2520testing%2520sequence%252C%2520we%2520mask%2520a%2520subset%2520of%2520frames%2520to%2520construct%2520a%2520self-supervised%2520task.%2520Free%2520Geometry%2520enforces%2520cross-view%2520feature%2520consistency%2520between%2520representations%2520from%2520full%2520and%2520partial%2520observations%252C%2520while%2520maintaining%2520the%2520pairwise%2520relations%2520implied%2520by%2520the%2520held-out%2520frames.%2520This%2520self-supervision%2520allows%2520for%2520fas {"title": "Rethinking Image-to-3D Generation with Sparse Queries: Efficiency, Capacity, and Input-View Bias", "author": "Zhiyuan Xu and Jiuming Liu and Yuxin Chen and Masayoshi Tomizuka and Chenfeng Xu and Chensheng Peng", "abstract": "We present SparseGen, a novel framework for efficient image-to-3D generation, which exhibits low input-view bias while being significantly faster. Unlike traditional approaches that rely on dense volumetric grids, triplanes, or pixel-aligned primitives, we model scenes with a compact sparse set of learned 3D anchor queries and a learned expansion operator that decodes each transformed query into a small local set of 3D Gaussian primitives. Trained under a rectified-flow reconstruction objective without 3D supervision, our model learns to allocate representation capacity where geometry and appearance matter, achieving significant reductions in memory and inference time while preserving multi-view fidelity. We introduce quantitative measures of input-view bias and utilization to show that sparse queries reduce overfitting to conditioning views while being representationally efficient. Our results argue that sparse set-latent expansion is a principled, practical alternative for efficient 3D generative modeling.", "link": "http://arxiv.org/abs/2604.13905v1", "date": "2026-04-15", "relevancy": 3.0758, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.62}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6127}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6127}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Rethinking%20Image-to-3D%20Generation%20with%20Sparse%20Queries%3A%20Efficiency%2C%20Capacity%2C%20and%20Input-View%20Bias&body=Title%3 {"title": "PartNerFace: Part-based Neural Radiance Fields for Animatable Facial Avatar Reconstruction", "author": "Xianggang Yu and Lingteng Qiu and Xiaohang Ren and Guanying Chen and Shuguang Cui and Xiaoguang Han and Baoyuan Wang", "abstract": "We present PartNerFace, a part-based neural radiance fields approach, for reconstructing animatable facial avatar from monocular RGB videos. Existing solutions either simply condition the implicit network with the morphable model parameters or learn an imaginary canonical radiance field, making them fail to generalize to unseen facial expressions and capture fine-scale motion details. To address these challenges, we first apply inverse skinning based on a parametric head model to map an observed point to the canonical space, and then model fine-scale motions with a part-based deformation field. Our key insight is that the deformation of different facial parts should be modeled differently. Specifically, our part-based deformation field consists of multiple local MLPs to adaptively partition the canonical space into different parts, where the deformation of a 3D point is computed by aggregating the prediction of all local MLPs by a soft-weighting mechanism. Extensive experiments demonstrate that our method generalizes well to unseen expressions and is capable of modeling fine-scale facial motions, outperforming state-of-the-art methods both quantitatively and qualitatively.", "link": "http://arxiv.org/abs/2604.13918v1", "date": "2026-04-15", "relevancy": 3.0413, "topK": [{"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.6179}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.6179}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5891}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PartNerFace%3A%20Part-based%20Neural%20Radiance%20Fields%20for%20Animatable%20Facial%20Avatar%20Reconstruction&body=Title%3A%20PartNerFace%3A%20Part-based%20Neural%20Radiance%20Fields%20for%20Animatable%20Facial%20Avatar%20Reconstruction%0AAuthor%3A%20Xianggang%20Yu%20and%20Lingteng%20Qiu%20and%20Xiaohang%20Ren%20and%20Guanying%20Chen%20and%20Shuguang%20Cui%20and%20Xiaoguang%20Han%20and%20Baoyuan%20Wang%0AAbstract%3A%20We%20present%20PartNerFace%2C%20a%20part-based%20neural%20radiance%20fields%20approach%2C%20for%20reconstructing%20animatable%20facial%20avatar%20from%20monocular%20RGB%20videos.%20Existing%20solutions%20either%20simply%20condition%20the%20implicit%20network%20with%20the%20morphable%20model%20parameters%20or%20learn%20an%20imaginary%20canonical%20radiance%20field%2C%20making%20them%20fail%20to%20generalize%20to%20unseen%20facial%20expressions%20and%20capture%20fine-scale%20motion%20details.%20To%20address%20these%20challenges%2C%20we%20first%20apply%20inverse%20skinning%20based%20on%20a%20parametric%20head%20model%20to%20map%20an%20observed%20point%20to%20the%20canonical%20space%2C%20and%20then%20model%20fine-scale%20motions%20with%20a%20part-based%20deformation%20field.%20Our%20key%20insight%20is%20that%20the%20deformation%20of%20different%20facial%20parts%20should%20be%20modeled%20differently.%20Specifically%2C%20our%20part-based%20deformation%20field%20consists%20of%20multiple%20local%20MLPs%20to%20adaptively%20partition%20the%20canonical%20space%20into%20different%20parts%2C%20where%20the%20deformation%20of%20a%203D%20point%20is%20computed%20by%20aggregating%20the%20prediction%20of%20all%20local%20MLPs%20by%20a%20soft-weighting%20mechanism.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20generalizes%20well%20to%20unseen%20expressions%20and%20is%20capable%20of%20modeling%20fine-scale%20facial%20motions%2C%20outperforming%20state-of-the-art%20methods%20both%20quantitatively%20and%20qualitatively.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13918v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPartNerFace%253A%2520Part-based%2520Neural%2520Radiance%2520Fields%2520for%2520Animatable%2520Facial%2520Avatar%2520Reconstruction%26entry.906535625%3DXianggang%2520Yu%2520and%2520Lingteng%2520Qiu%2520and%2520Xiaohang%2520Ren%2520and%2520Guanying%2520Chen%2520and%2520Shuguang%2520Cui%2520and%2520Xiaoguang%2520Han%2520and%2520Baoyuan%2520Wang%26entry.1292438233%3DWe%2520present%2520PartNerFace%252C%2520a%2520part-based%2520neural%2520radiance%2520fields%2520approach%252C%2520for%2520reconstructing%2520animatable%2520facial%2520avatar%2520from%2520monocular%2520RGB%2520videos.%2520Existing%2520solutions%2520either%2520simply%2520condition%2520the%2520implicit%2520network%2520with%2520the%2520morphable%2520model%2520parameters%2520or%2520learn%2520an%2520imaginary%2520canonical%2520radiance%2520field%252C%2520making%2520them%2520fail%2520to%2520generalize%2520to%2520unseen%2520facial%2520expressions%2520and%2520capture%2520fine-scale%2520motion%2520details.%2520To%2520address%2520these%2520challenges%252C%2520we%2520first%2520apply%2520inverse%2520skinning%2520based%2520on%2520a%2520parametric%2520head%2520model%2520to%2520map%2520an%2520observed%2520point%2520to%2520the%2520canonical%2520space%252C%2520and%2520then%2520model%2520fine-scale%2520motions%2520with%2520a%2520part-based%2520deformation%2520field.%2520Our%2520key%2520insight%2520is%2520that%2520the%2520deformation%2520of%2520different%2520facial%2520parts%2520should%2520be%2520modeled%2520differently.%2520Specifically%252C%2520our%2520part-based%2520deformation%2520field%2520consists%2520of%2520multiple%2520local%2520MLPs%2520to%2520adaptively%2520partition%2520the%2520canonical%2520space%2520into%2520different%2520parts%252C%2520where%2520the%2520deformation%2520of%2520a%25203D%2520point%2520is%2520computed%2520by%2520aggregating%2520the%2520prediction%2520of%2520all%2520local%2520MLPs%2520by%2520a%2520soft-weighting%2520mechanism.%2520Extensive%2520experiments%2520demonstrate%2520that%2520our%2520method%2520generalizes%2520well%2520to%2520unseen%2520expressions%2520and%2520is%2520capable%2520of%2520modeling%2520fine-scale%2520facial%2520motions%252C%2520outperforming%2520state-of-the-art%2520methods%2520both%2520quantitatively%2520and%2520qualitatively.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.13918v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=PartNerFace%3A%20Part-based%20Neural%20Radiance%20Fields%20for%20Animatable%20Facial%20Avatar%20Reconstruction&entry.906535625=Xianggang%20Yu%20and%20Lingteng%20Qiu%20and%20Xiaohang%20Ren%20and%20Guanying%20Chen%20and%20Shuguang%20Cui%20and%20Xiaoguang%20Han%20and%20Baoyuan%20Wang&entry.1292438233=We%20present%20PartNerFace%2C%20a%20part-based%20neural%20radiance%20fields%20approach%2C%20for%20reconstructing%20animatable%20facial%20avatar%20from%20monocular%20RGB%20videos.%20Existing%20solutions%20either%20simply%20condition%20the%20implicit%20network%20with%20the%20morphable%20model%20parameters%20or%20learn%20an%20imaginary%20canonical%20radiance%20field%2C%20making%20them%20fail%20to%20generalize%20to%20unseen%20facial%20expressions%20and%20capture%20fine-scale%20motion%20details.%20To%20address%20these%20challenges%2C%20we%20first%20apply%20inverse%20skinning%20based%20on%20a%20parametric%20head%20model%20to%20map%20an%20observed%20point%20to%20the%20canonical%20space%2C%20and%20then%20model%20fine-scale%20motions%20with%20a%20part-based%20deformation%20field.%20Our%20key%20insight%20is%20that%20the%20deformation%20of%20different%20facial%20parts%20should%20be%20modeled%20differently.%20Specifically%2C%20our%20part-based%20deformation%20field%20consists%20of%20multiple%20local%20MLPs%20to%20adaptively%20partition%20the%20canonical%20space%20into%20different%20parts%2C%20where%20the%20deformation%20of%20a%203D%20point%20is%20computed%20by%20aggregating%20the%20prediction%20of%20all%20local%20MLPs%20by%20a%20soft-weighting%20mechanism.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20generalizes%20well%20to%20unseen%20expressions%20and%20is%20capable%20of%20modeling%20fine-scale%20facial%20motions%2C%20outperforming%20state-of-the-art%20methods%20both%20quantitatively%20and%20qualitatively.&entry.1838667208=http%3A//arxiv.org/abs/2604.13918v1&entry.124074799=Read"},
{"title": "Aerial Vision-Language Navigation with a Unified Framework for Spatial, Temporal and Embodied Reasoning", "author": "Huilin Xu and Zhuoyang Liu and Yixiang Luomei and Feng Xu", "abstract": "Aerial Vision-and-Language Navigation (VLN) aims to enable unmanned aerial vehicles (UAVs) to interpret natural language instructions and navigate complex urban environments using onboard visual observation. This task holds promise for real-world applications such as low-altitude inspection, search-and-rescue, and autonomous aerial delivery. Existing methods often rely on panoramic images, depth inputs, or odometry to support spatial reasoning and action planning. These requirements increase system cost and integration complexity, thus hindering practical deployment for lightweight UAVs. We present a unified aerial VLN framework that operates solely on egocentric monocular RGB observations and natural language instructions. The model formulates navigation as a next-token prediction problem, jointly optimizing spatial perception, trajectory reasoning, and action prediction through prompt-guided multi-task learning. Moreover, we propose a keyframe selection strategy to reduce visual redundancy by retaining semantically informative frames, along with an action merging and label reweighting mechanism that mitigates long-tailed supervision imbalance and facilitates stable multi-task co-training. Extensive experiments on the AerialVLN and OpenFly benchmark validate the effectiveness of our method. Under the challenging monocular RGB-only setting, our model achieves strong results across both seen and unseen environments. It significantly outperforms existing RGB-only baselines and narrows the performance gap with state-of-the-art panoramic RGB-D counterparts. Comprehensive ablation studies further demonstrate the contribution of our task design and architectural choices. Our code is publicly available at https://github.com/return-sleep/AeroAct.", "link": "http://arxiv.org/ab igation%20as%20a%20next-token%20prediction%20problem%2C%20jointly%20optimizing%20spatial%20perception%2C%20trajectory%20reasoning%2C%20and%20action%20prediction%20through%20prompt-guided%20multi-task%20learning.%20Moreover%2C%20we%20propose%20a%20keyframe%20selection%20strategy%20to%20reduce%20visual%20redundancy%20by%20retaining%20semantically%20informative%20frames%2C%20along%20with%20an%20action%20merging%20and%20label%20reweighting%20mechanism%20that%20mitigates%20long-tailed%20supervision%20imbalance%20and%20facilitates%20stable%20multi-task%20co-training.%20Extensive%20experiments%20on%20the%20AerialVLN%20and%20OpenFly%20benchmark%20validate%20the%20effectiveness%20of%20our%20method.%20Under%20the%20challenging%20monocular%20RGB-only%20setting%2C%20our%20model%20achieves%20strong%20results%20across%20both%20seen%20and%20unseen%20environments.%20It%20significantly%20outperforms%20existing%20RGB-only%20baselines%20and%20narrows%20the%20performance%20gap%20with%20state-of-the-art%20panoramic%20RGB-D%20counterparts.%20Comprehensive%20ablation%20studies%20further%20demonstrate%20the%20contribution%20of%20our%20task%20design%20and%20architectural%20choices.%20Our%20code%20is%20publicly%20available%20at%20https%3A//github.com/return-sleep/AeroAct.%0ALink%3A%20http%3A//arxiv.org/abs/2512.08639v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAerial%2520Vision-Language%2520Navigation%2520with%2520a%2520Unified%2520Framework%2520for%2520Spatial%252C%2520Temporal%2520and%2520Embodied%2520Reasoning%26entry.906535625%3DHuilin%2520Xu%2520and%2520Zhuoyang%2520Liu%2520and%2520Yixiang%2520Luomei%2520and%2520Feng%2520Xu%26entry.1292438233%3DAerial%2520Vision-and-Language%2520Navigation%2520%2528VLN%2529%2520aims%2520to%2520enable%2520unmanned%2520aerial%2520vehicles%2520%2528UAVs%2529%2520to%2520interpret%2520natural%2520language%2520instructions%2520and%2520navigate%2520complex%2520urban%25 {"title": "VLMs Need Words: Vision Language Models Ignore Visual Detail In Favor of Semantic Anchors", "author": "Haz Sameen Shahgir and Xiaofu Chen and Yu Fu and Erfan Shayegani and Nael Abu-Ghazaleh and Yova Kementchedjhieva and Yue Dong", "abstract": "Vision-language models (VLMs) have achieved impressive performance across a wide range of multimodal tasks. However, they often fail on tasks that require fine-grained visual perception, even when the required information is still present in their internal representations. Prior work has attributed this ``hidden-in-plain-sight'' gap to the language model, but the cause remains unexplained. In this work, we demonstrate that this gap arises from the language model's lack of semantic labels for fine-grained visual details: when visual entities can be mapped to known concepts, VLMs bypass visual comparison and reason through language; when they cannot, VLMs resort to brittle and hallucinated descriptions. We verify this across semantic correspondence, synthetic shape matching, and face matching, and find that VLMs perform much better when the relevant entities are nameable than when they are unnamable. Mechanistically, Logit Lens analysis confirms that VLMs explicitly recover semantic labels for nameable entities and surface more unique tokens compared to unnameable entities. Furthermore, we show that this limitation can be addressed: teaching completely arbitrary names for unknown entities improves performance. More importantly, task-specific finetuning yields even stronger generalization without relying on language priors, i.e. through real visual perception. Our findings suggest that current VLM failures on visual tasks reflect a learned shortcut rather than a fundamental limitation of multimodal reasoning.", "link": "http://arxiv.org/abs/2604.02486v2", "date": "2026-04-15", "relevancy": 2.9871, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6189}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6189}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5545}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VLMs%20Need%20Words%3A%20Vision%20Language%20Models%20Ignore%20Visual%20Detail%20In%20Favor%20of%20Semantic%20Anchors&body=Title%3A%20VLMs%20Need%20Words%3A%20Vision%20Language%20Models%20Ignore%20Visual%20Detail%20In%20Favor%20of%20Semantic%20Anchors%0AAuthor%3A%20Haz%20Sameen%20Shahgir%20and%20Xiaofu%20Chen%20and%20Yu%20Fu%20and%20Erfan%20Shayegani%20and%20Nael%20Abu-Ghazaleh%20and%20Yova%20Kementchedjhieva%20and%20Yue%20Dong%0AAbstract%3A%20Vision-language%20models%20%28VLMs%29%20have%20achieved%20impressive%20performance%20across%20a%20wide%20range%20of%20multimodal%20tasks.%20However%2C%20they%20often%20fail%20on%20tasks%20that%20require%20fine-grained%20visual%20perception%2C%20even%20when%20the%20required%20information%20is%20still%20present%20in%20their%20internal%20representations.%20Prior%20work%20has%20attributed%20this%20%60%60hidden-in-plain-sight%27%27%20gap%20to%20the%20language%20model%2C%20but%20the%20cause%20remains%20unexplained.%20In%20this%20work%2C%20we%20demonstrate%20that%20this%20gap%20arises%20from%20the%20language%20model%27s%20lack%20of%20semantic%20labels%20for%20fine-grained%20visual%20details%3A%20when%20visual%20entities%20can%20be%20mapped%20to%20known%20concepts%2C%20VLMs%20bypass%20visual%20comparison%20and%20reason%20through%20language%3B%20when%20they%20cannot%2C%20VLMs%20resort%20to%20brittle%20and%20hallucinated%20descriptions.%20We%20verify%20this%20across%20semantic%20correspondence%2C%20synthetic%20shape%20matching%2C%20and%20face%20matching%2C%20and%20find%20that%20VLMs%20perform%20much%20better%20when%20the%20relevant%20entities%20are%20nameable%20than%20when%20they%20are%20unnamable.%20Mechanistically%2C%20Logit%20Lens%20analysis%20confirms%20that%20VLMs%20explicitly%20recover%20semantic%20labels%20for%20nameable%20entities%20and%20surface%20more%20unique%20tokens%20compared%20to%20unnameable%20entities.%20Furthermore%2C%20we%20show%20that%20this%20limitation%20can%20be%20addressed%3A%20teaching%20completely%20arbitrary%20names%20for%20unknown%20entities%20improves%20performance.%20More%20importantly%2C%20task-specific%20finetuning%20yields%20even%20stronger%20generalization%20without%20relying%20on%20language%20priors%2C%20i.e.%20through%20real%20visual%20perception.%20Our%20findings%20suggest%20that%20current%20VLM%20failures%20on%20visual%20tasks%20reflect%20a%20learned%20shortcut%20rather%20than%20a%20fundamental%20limitation%20of%20multimodal%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02486v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVLMs%2520Need%2520Words%253A%2520Vision%2520Language%2520Models%2520Ignore%2520Visual%2520Detail%2520In%2520Favor%2520of%2520Semantic%2520Anchors%26entry.906535625%3DHaz%2520Sameen%2520Shahgir%2520and%2520Xiaofu%2520Chen%2520and%2520Yu%2520Fu%2520and%2520Erfan%2520Shayegani%2520and%2520Nael%2520Abu-Ghazaleh%2520and%2520Yova%2520Kementchedjhieva%2520and%2520Yue%2520Dong%26entry.1292438233%3DVision-language%2520models%2520%2528VLMs%2529%2520have%2520achieved%2520impressive%2520performance%2520across%2520a%2520wide%2520range%2520of%2520multimodal%2520tasks.%2520However%252C%2520they%2520often%2520fail%2520on%2520tasks%2520that%2520require%2520fine-grained%2520visual%2520perception%252C%2520even%2520when%2520the%2520required%2520information%2520is%2520still%2520present%2520in%2520their%2520internal%2520representations.%2520Prior%2520work%2520has%2520attributed%2520this%2520%2560%2560hidden-in-plain-sight%2527%2527%2520gap%2520to%252 {"title": "ReConText3D: Replay-based Continual Text-to-3D Generation", "author": "Muhammad Ahmed Ullah Khan and Muhammad Haris Bin Amir and Didier Stricker and Muhammad Zeshan Afzal", "abstract": "Continual learning enables models to acquire new knowledge over time while retaining previously learned capabilities. However, its application to text-to-3D generation remains unexplored. We present ReConText3D, the first framework for continual text-to-3D generation. We first demonstrate that existing text-to-3D models suffer from catastrophic forgetting under incremental training. ReConText3D enables generative models to incrementally learn new 3D categories from textual descriptions while preserving the ability to synthesize previously seen assets. Our method constructs a compact and diverse replay memory through text-embedding k-Center selection, allowing representative rehearsal of prior knowledge without modifying the underlying architecture. To systematically evaluate continual text-to-3D learning, we introduce Toys4K-CL, a benchmark derived from the Toys4K dataset that provides balanced and semantically diverse class-incremental splits. Extensive experiments on the Toys4K-CL benchmark show that ReConText3D consistently outperforms all baselines across different generative backbones, maintaining high-quality generation for both old and new classes. To the best of our knowledge, this work establishes the first continual learning framework and benchmark for text-to-3D generation, opening a new direction for incremental 3D generative modeling. Project page is available at: https://mauk95.github.io/ReConText3D/.", "link": "http://arxiv.org/abs/2604.13730v1", "date": "2026-04-15", "relevancy": 2.9631, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.5937}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/ab both%20old%20and%20new%20classes.%20To%20the%20best%20of%20our%20knowledge%2C%20this%20work%20establishes%20the%20first%20continual%20learning%20framework%20and%20benchmark%20for%20text-to-3D%20generation%2C%20opening%20a%20new%20direction%20for%20incremental%203D%20generative%20modeling.%20Project%20page%20is%20available%20at%3A%20https%3A//mauk95.github.io/ReConText3D/.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13730v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReConText3D%253A%2520Replay-based%2520Continual%2520Text-to-3D%2520Generation%26entry.906535625%3DMuhammad%2520Ahmed%2520Ullah%2520Khan%2520and%2520Muhammad%2520Haris%2520Bin%2520Amir%2520and%2520Didier%2520Stricker%2520and%2520Muhammad%2520Zeshan%2520Afzal%26entry.1292438233%3DContinual%2520learning%2520enables%2520models%2520to%2520acquire%2520new%2520knowledge%2520over%2520time%2520while%2520retaining%2520previously%2520learned%2520capabilities.%2520However%252C%2520its%2520application%2520to%2520text-to-3D%2520generation%2520remains%2520unexplored.%2520We%2520present%2520ReConText3D%252C%2520the%2520first%2520framework%2520for%2520continual%2520text-to-3D%2520generation.%2520We%2520first%2520demonstrate%2520that%2520existing%2520text-to-3D%2520models%2520suffer%2520from%2520catastrophic%2520forgetting%2520under%2520incremental%2520training.%2520ReConText3D%2520enables%2520generative%2520models%2520to%2520incrementally%2520learn%2520new%25203D%2520categories%2520from%2520textual%2520descriptions%2520while%2520preserving%2520the%2520ability%2520to%2520synthesize%2520previously%2520seen%2520assets.%2520Our%2520method%2520constructs%2520a%2520compact%2520and%2520diverse%2520replay%2520memory%2520through%2520text-embedding%2520k-Center%2520selection%252C%2520allowing%2520representative%2520rehearsal%2520of%2520prior%2520knowledge%2520without%2520modifying%2520the%2520underlying%2520architecture.%2520To%2520systematicall {"title": "Decoding the Delta: Unifying Remote Sensing Change Detection and Understanding with Multimodal Large Language Models", "author": "Xiaohe Li and Jiahao Li and Kaixin Zhang and Yuqiang Fang and Leilei Lin and Hong Wang and Haohua Wu and Zide Fan", "abstract": "While Multimodal Large Language Models (MLLMs) excel in general vision-language tasks, their application to remote sensing change understanding is hindered by a fundamental \"temporal blindness\". Existing architectures lack intrinsic mechanisms for multi-temporal contrastive reasoning and struggle with precise spatial grounding. To address this, we first introduce Delta-QA, a comprehensive benchmark comprising 180k visual question-answering samples. Delta-QA unifies pixel-level segmentation and visual question answering across bi- and tri-temporal scenarios, structuring change interpretation into four progressive cognitive dimensions. Methodologically, we propose Delta-LLaVA, a novel MLLM framework explicitly tailored for multi-temporal remote sensing interpretation. It overcomes the limitations of naive feature concatenation through three core innovations: a Change-Enhanced Attention module that systematically isolates and amplifies visual differences, a Change-SEG module utilizing Change Prior Embedding to extract differentiable difference features as input for the LLM, and Local Causal Attention to prevent cross-temporal contextual leakage. Extensive experiments demonstrate that Delta-LLaVA decisively outperforms leading generalist MLLMs and specialized segmentation models in complex change deduction and high-precision boundary localization, establishing a unified framework for earth observation intelligence.", "link": "http://arxiv.org/abs/2604.14044v1", "date": "2026-04-15", "relevancy": 2.9437, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6012}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6012}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5638}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Decoding%20the%20Delta%3A%20Unifying%20Remote%20Sensing%20Change%20Detection%20and%20Understanding%20with%20Multimodal%20Large%20Language%20Models&body=Title%3A%20Decoding%20the%20Delta%3A%20Unifying%20Remote%20Sensing%20Change%20Detection%20and%20Understanding%20with%20Multimodal%20Large%20Language%20Models%0AAuthor%3A%20Xiaohe%20Li%20and%20Jiahao%20Li%20and%20Kaixin%20Zhang%20and%20Yuqiang%20Fang%20and%20Leilei%20Lin%20and%20Hong%20Wang%20and%20Haohua%20Wu%20and%20Zide%20Fan%0AAbstract%3A%20While%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20excel%20in%20general%20vision-language%20tasks%2C%20their%20application%20to%20remote%20sensing%20change%20understanding%20is%20hindered%20by%20a%20fundamental%20%22temporal%20blindness%22.%20Existing%20architectures%20lack%20intrinsic%20mechanisms%20for%20multi-temporal%20contrastive%20reasoning%20and%20struggle%20with%20precise%20spatial%20grounding.%20To%20address%20this%2C%20we%20first%20introduce%20Delta-QA%2C%20a%20comprehensive%20benchmark%20comprising%20180k%20visual%20question-answering%20samples.%20Delta-QA%20unifies%20pixel-level%20segmentation%20and%20visual%20question%20answering%20across%20bi-%20and%20tri-temporal%20scenarios%2C%20structuring%20change%20interpretation%20into%20four%20progressive%20cognitive%20dimensions.%20Methodologically%2C%20we%20propose%20Delta-LLaVA%2C%20a%20novel%20MLLM%20framework%20explicitly%20tailored%20for%20multi-temporal%20remote%20sensing%20interpretation.%20It%20overcomes%20the%20limitations%20of%20naive%20feature%20concatenation%20through%20three%20core%20innovations%3A%20a%20Change-Enhanced%20Attention%20module%20that%20systematically%20isolates%20and%20amplifies%20visual%20differences%2C%20a%20Change-SEG%20module%20utilizing%20Change%20Prior%20Embedding%20to%20extract%20differentiable%20difference%20features%20as%20input%20for%20the%20LLM%2C%20and%20Local%20Causal%20Attention%20to%20prevent%20cross-temporal%20contextual%20leakage.%20Extensive%20experiments%20demonstrate%20that%20Delta-LLaVA%20decisively%20outperforms%20leading%20generalist%20MLLMs%20and%20specialized%20segmentation%20models%20in%20complex%20change%20deduction%20and%20high-precision%20boundary%20localization%2C%20establishing%20a%20unified%20framework%20for%20earth%20observation%20intelligence.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14044v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDecoding%2520the%2520Delta%253A%2520Unifying%2520Remote%2520Sensing%2520Change%2520Detection%2520and%2520Understanding%2520with%2520Multimodal%2520Large%2520Language%2520Models%26entry.906535625%3DXiaohe%2520Li%2520and%2520Jiahao%2520Li%2520and%2520Kaixin%2520Zhang%2520and%2520Yuqiang%2520Fang%2520and%2520Leilei%2520Lin%2520and%2520Hong%2520Wang%2520and%2520Haohua%2520Wu%2520and%2520Zide%2520Fan%26entry.1292438233%3DWhile%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520excel%2520in%2520general%2520vision-language%2520tasks%252C%2520their%2520application%2520to%2520remote%2520sensing%2520change%2520understanding%2520is%2520hindered%2520by%2520a%2520fundamental%2520%2522temporal%2520blindness%2522.%2520Existing%2520architectures%2520lack%2520intrinsic%2520mechanisms%2520for%2520multi-temporal%2520contrastive%2520reasoning%2520and%2520struggle%2520with%2520precise%2520spatial%2520grounding.%2520To%2520address%2520this%252C%2520we%2520first%2520introduce%2520Delta-QA%252C%2520a%2520comprehensive%2520benchmark%2520comprising%2520180k%2520visual%2520question-answering%2520samples.%2520Delta-QA%2520unifies%2520pixel-level%2520segmentat {"title": "Seek-and-Solve: Benchmarking MLLMs for Visual Clue-Driven Reasoning in Daily Scenarios", "author": "Xiaomin Li and Tala Wang and Zichen Zhong and Ying Zhang and Zirui Zheng and Takashi Isobe and Dezhuang Li and Huchuan Lu and You He and Xu Jia", "abstract": "Daily scenarios are characterized by visual richness, requiring Multimodal Large Language Models (MLLMs) to filter noise and identify decisive visual clues for accurate reasoning. Yet, current benchmarks predominantly aim at evaluating MLLMs' pre-existing knowledge or perceptual understanding, often neglecting the critical capability of reasoning. To bridge this gap, we introduce DailyClue, a benchmark designed for visual clue-driven reasoning in daily scenarios. Our construction is guided by two core principles: (1) strict grounding in authentic daily activities, and (2) challenging query design that necessitates more than surface-level perception. Instead of simple recognition, our questions compel MLLMs to actively explore suitable visual clues and leverage them for subsequent reasoning. To this end, we curate a comprehensive dataset spanning four major daily domains and 16 distinct subtasks. Comprehensive evaluation across MLLMs and agentic models underscores the formidable challenge posed by our benchmark. Our analysis reveals several critical insights, emphasizing that the accurate identification of visual clues is essential for robust reasoning.", "link": "http://arxiv.org/abs/2604.14041v1", "date": "2026-04-15", "relevancy": 2.9093, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5958}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5958}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5541}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Seek-and-Solve%3A%20Benchmarking%20MLLMs%20for%20Visual%20Clue-Driven%20Reasoning%20in%20Daily%20Scenarios&body=Title%3A%20Seek-and-Solve%3A%20Benchmarking%20MLLMs%20for%20Visual%20Clue-Driven%20Reasoning%20in%20Daily%20Scenarios%0AAuthor%3A%20Xiaomin%20Li%20and%20Tala%20Wang%20and%20Zichen%20Zhong%20and%20Ying%20Zhang%20and%20Zirui%20Zheng%20and%20Takashi%20Isobe%20and%20Dezhuang%20Li%20and%20Huchuan%20Lu%20and%20You%20He%20and%20Xu%20Jia%0AAbstract%3A%20Daily%20scenarios%20are%20characterized%20by%20visual%20richness%2C%20requiring%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20to%20filter%20noise%20and%20identify%20decisive%20visual%20clues%20for%20accurate%20reasoning.%20Yet%2C%20current%20benchmarks%20predominantly%20aim%20at%20evaluating%20MLLMs%27%20pre-existing%20knowledge%20or%20perceptual%20understanding%2C%20often%20neglecting%20the%20critical%20capability%20of%20reasoning.%20To%20bridge%20this%20gap%2C%20we%20introduce%20DailyClue%2C%20a%20benchmark%20designed%20for%20visual%20clue-driven%20reasoning%20in%20daily%20scenarios.%20Our%20construction%20is%20guided%20by%20two%20core%20principles%3A%20%281%29%20strict%20grounding%20in%20authentic%20daily%20activities%2C%20and%20%282%29%20challenging%20query%20design%20that%20necessitates%20more%20than%20surface-level%20perception.%20Instead%20of%20simple%20recognition%2C%20our%20questions%20compel%20MLLMs%20to%20actively%20explore%20suitable%20visual%20clues%20and%20leverage%20them%20for%20subsequent%20reasoning.%20To%20this%20end%2C%20we%20curate%20a%20comprehensive%20dataset%20spanning%20four%20major%20daily%20domains%20and%2016%20distinct%20subtasks.%20Comprehensive%20evaluation%20across%20MLLMs%20and%20agentic%20models%20underscores%20the%20formidable%20challenge%20posed%20by%20our%20be {"title": "Cyclic 2.5D Perceptual Loss for Cross-Modal 3D Medical Image Synthesis: T1w MRI to Tau PET", "author": "Junho Moon and Symac Kim and Haejun Chung and Ikbeom Jang", "abstract": "Positron emission tomography (PET) provides molecular biomarkers for Alzheimer's disease and related dementias (ADRD) and is increasingly used for diagnosis, staging, and clinical trial enrichment. However, its use is limited by cost, regulatory restrictions, and the invasiveness of radiotracer injection. Although current frameworks emphasize multimodal biomarker assessment, including the amyloid/tau/neurodegeneration (A/T/N) scheme, these barriers constrain access to PET imaging. Cross-modal image synthesis may help address this gap by reconstructing unavailable modalities from routine scans. Because PET is clinically valuable for regional uptake patterns rather than exact voxel-wise intensities, perceptual losses that capture higher-level semantic features are well suited to PET synthesis. Existing 2D, 3D, and 2.5D perceptual losses for 3D synthesis each have limitations, including restricted volumetric context, scarcity of pretrained 3D models, and difficulty balancing optimization across anatomical planes. In this study, we synthesize tau PET from structural MRI by generating 3D pseudo-[18F]flortaucipir standardized uptake value ratio (SUVR) maps from 3D T1-weighted MR images. We propose a cyclic 2.5D perceptual loss that alternates optimization across axial, coronal, and sagittal planes during training to improve volumetric consistency. We also standardize PET SUVRs by scanner manufacturer, reducing inter-manufacturer variability and better preserving high-uptake regions. Using cohorts spanning the ADRD spectrum from the ADNI and the SCAN cohort, we show that the method generalizes across U-Net, UNETR, SwinUNETR, CycleGAN, and Pix2Pix, with strong performance. Notably, it improves agreement between synthesized SUVRs and measured PET in brain regions relevant to Alzheimer-type tau pathology. Code is publicly available at https://github.com/labhai/Cyclic-2.5D-Perceptual-Loss.", "link": "http://arxiv.org/abs/2406.12632v3", "date": "2026-04-15", "relevancy": 2.8888, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5828}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5828}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5676}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Cyclic%202.5D%20Perceptual%20Loss%20for%20Cross-Modal%203D%20Medical%20Image%20Synthesis%3A%20T1w%20MRI%20to%20Tau%20PET&body=Title%3A%20Cyclic%202.5D%20Perceptual%20Loss%20for%20Cross-Modal%203D%20Medical%20Image%20Synthesis%3A%20T1w%20MRI%20to%20Tau%20PET%0AAuthor%3A%20Junho%20Moon%20and%20Symac%20Kim%20and%20Haejun%20Chung%20and%20Ikbeom%20Jang%0AAbstract%3A%20Positron%20emission%20tomography%20%28PET%29%20provides%20molecular%20biomarkers%20for%20Alzheimer%27s%20disease%20and%20related%20dementias%20%28ADRD%29%20and%20is%20increasingly%20used%20for%20diagnosis%2C%20staging%2C%20and%20clinical%20trial%20enrichment.%20However%2C%20its%20use%20is%20limited%20by%20cost%2C%20regulatory%20restrictions%2C%20and%20the%20invasiveness%20of%20radiotracer%20injection.%20Although%20current%20frameworks%20emphasize%20multimodal%20biomarker%20assessment%2C%20including%20the%20amyloid/tau/neurodegeneration%20%28A/T/N%29%20scheme%2C%20these%20barriers%20constrain%20access%20to%20PET%20imaging.%20Cross-modal%20image%20synthesis%20may%20help%20address%20this%20gap%20by%20reconstructing%20unavailable%20modalities%20from%20routine%20scans.%20Because%20PET%20is%20clinically%20valuable%20for%20regional%20uptake%20patterns%20rather%20than%20exact%20voxel-wise%20intensities%2C%20perceptual%20losses%20that%20capture%20higher-level%20semantic%20features%20are%20well%20suited%20to%20PET%20synthesis.%20Existing%202D%2C%203D%2C%20and%202.5D%20perceptual%20losses%20for%203D%20synthesis%20each%20have%20limitations%2C%20including%20restricted%20volumetric%20context%2C%20scarcity%20of%20pretrained%203D%20models%2C%20and%20difficulty%20balancing%20optimization%20across%20anatomical%20planes.%20In%20this%20study%2C%20we%20synthesize%20tau%20PET%20from%20structural%20MRI%20by%20generating%203D%20pseudo-%5B18F%5Dflortaucipir%20standardized%20uptake%20value%20ratio%20%28SUVR%29%20maps%20from%203D%20T1-weighted%20MR%20images.%20We%20propose%20a%20cyclic%202.5D%20perceptual%20loss%20that%20alternates%20optimization%20across%20axial%2C%20coronal%2C%20and%20sagittal%20planes%20during%20training%20to%20improve%20volumetric%20consistency.%20We%20also%20standardize%20PET%20SUVRs%20by%20scanner%20manufacturer%2C%20reducing%20inter-manufacturer%20variability%20and%20better%20preserving%20high-uptake%20regions.%20Using%20cohorts%20spanning%20the%20ADRD%20spectrum%20from%20the%20ADNI%20and%20the%20SCAN%20cohort%2C%20we%20show%20that%20the%20method%20generalizes%20across%20U-Net%2C%20UNETR%2C%20SwinUNETR%2C%20CycleGAN%2C%20and%20Pix2Pix%2C%20with%20strong%20performance.%20Notably%2C%20it%20improves%20agreement%20between%20synthesized%20SUVRs%20and%20measured%20PET%20in%20brain%20regions%20relevant%20to%20Alzheimer-type%20tau%20pathology.%20Code%20is%20publicly%20available%20at%20https%3A//github.com/labhai/Cyclic-2.5D-Perceptual-Loss.%0ALink%3A%20http%3A//arxiv.org/abs/2406.12632v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCyclic%25202.5D%2520Perceptual%2520Loss%2520for%2520Cross-Modal%25203D%2520Medical%2520Image%2520Synthesis%253A%2520T1w%2520MRI%2520to%2520Tau%2520PET%26entry.906535625%3DJunho%2520Moon%2520and%2520Symac%2520Kim%2520and%2520Haejun%2520Chung%2520and%2520Ikbeom%2520Jang%26entry. {"title": "MApLe: Multi-instance Alignment of Diagnostic Reports and Large Medical Images", "author": "Felicia Bader and Philipp Seeb\u00f6ck and Anastasia Bartashova and Ulrike Attenberger and Georg Langs", "abstract": "In diagnostic reports, experts encode complex imaging data into clinically actionable information. They describe subtle pathological findings that are meaningful in their anatomical context. Reports follow relatively consistent structures, expressing diagnostic information with few words that are often associated with tiny but consequential image observations. Standard vision language models struggle to identify the associations between these informative text components and small locations in the images. Here, we propose \"MApLe\", a multi-task, multi-instance vision language alignment approach that overcomes these limitations. It disentangles the concepts of anatomical region and diagnostic finding, and links local image information to sentences in a patch-wise approach. Our method consists of a text embedding trained to capture anatomical and diagnostic concepts in sentences, a patch-wise image encoder conditioned on anatomical structures, and a multi-instance alignment of these representations. We demonstrate that MApLe can successfully align different image regions and multiple diagnostic findings in free-text reports. We show that our model improves the alignment performance compared to state-of-the-art baseline models when evaluated on several downstream tasks. The code is available at https://github.com/cirmuw/MApLe.", "link": "http://arxiv.org/abs/2604.13970v1", "date": "2026-04-15", "relevancy": 2.8341, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5935}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5535}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5535}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MApLe%3A%20Multi-instance%20Alignment%20of%20Diagnostic%20Reports%20and%20Large%20Medical%20Images&body=Title%3A%20MApLe%3A%20Multi-instance%20Alignment%20of%20Diagnostic%20Reports%20and%20Large%20Medical%20Images%0AAuthor%3A%20Felicia%20Bader%20and%20Philipp%20Seeb%C3%B6ck%20and%20Anastasia%20Bartashova%20and%20Ulrike%20Attenberger%20and%20Georg%20Langs%0AAbstract%3A%20In%20diagnostic%20reports%2C%20experts%20encode%20complex%20imaging%20data%20into%20clinically%20actionable%20information.%20They%20describe%20subtle%20pathological%20findings%20that%20are%20meaningful%20in%20their%20anatomical%20context.%20Reports%20follow%20relatively%20consistent%20structures%2C%20expressing%20diagnostic%20information%20with%20few%20words%20that%20are%20often%20associated%20with%20tiny%20but%20consequential%20image%20observations.%20Standard%20vision%20language%20models%20struggle%20to%20identify%20the%20associations%20between%20these%20informative%20text%20components%20and%20small%20locations%20in%20the%20images.%20Here%2C%20we%20propose%20%22MApLe%22%2C%20a%20multi-task%2C%20multi-instance%20vision%20language%20alignment%20approach%20that%20overcomes%20these%20limitations.%20It%20disentangles%20the%20concepts%20of%20anatomical%20region%20and%20diagnostic%20finding%2C%20and%20links%20local%20image%20information%20to%20sentences%20in%20a%20patch-wise%20approach.%20Our%20method%20consists%20of%20a%20text%20embedding%20trained%20to%20capture%20anatomical%20and%20diagnostic%20concepts%20in%20sentences%2C%20a%20patch-wise%20image%20encoder%20conditioned%20on%20anatomical%20structures%2C%20and%20a%20multi-instance%20alignment%20of%20these%20representations.%20We%20demonstrate%20that%20MApLe%20can%20successfully%20align%20different%20image%20regions%20and%20multiple%20diagnostic%20findings%20in%20free-text%20reports.%20We%20show%20that%20our%20model%20improves%20the%20alignment%20performance%20compared%20to%20state-of-the-art%20baseline%20models%20when%20evaluated%20on%20several%20downstream%20tasks.%20The%20code%20is%20available%20at%20https%3A//github.com/cirmuw/MApLe.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13970v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMApLe%253A%2520Multi-instance%2520Alignment%2520of%2520Diagnostic%2520Reports%2520and%2520Large%2520Medical%2520Images%26entry.906535625%3DFelicia%2520Bader%2520and%2520Philipp%2520Seeb%25C3%25B6ck%2520and%2520Anastasia%2520Bartashova%2520and%2520Ulrike%2520Attenberger%2520and%2520Georg%2520Langs%26entry.1292438233%3DIn%2520diagnostic%2520reports%252C%2520experts%2520encode%2520complex%2520imaging%2520data%2520into%2520clinically%2520actionable%2520information.%2520They%2520describe%2520subtle%2520pathological%2520findings%2520that%2520are%2520meaningful%2520in%2520their%2520anatomical%2520context.%2520Reports%2520follow%2520relatively%2520consistent%2520structures%252C%2520expressing%2520diagnostic%2520information%2520with%2520few%2520words%2520that%2520are%2520often%2520associated%2520with%2520tiny%2520but%2520consequential%2520image%2520observations.%2520Standard%2520vision%2520language%2520models%2520struggle%2520to%2520identify%2520the%2520associations%2520between%2520these%2520informative%2520text%2520components%2520and%2520small%2520locations%2520in%2520the%2520images.%2520Here%252C%2520we%2520propose%2520%2522MApLe%2522%252C%2520a%2520multi-task%252C%2520multi-instance%2520vision%2520language%2520alignment%2520approach%2520that%2520overcomes%2520these%2520limitations.%2520It%2520disentangles%2520the%2520concepts%2520of%2520anatomical%2520region%2520and%2520diagnostic%2520finding%252C%2520and%2520links%2520local%2520image%2520information%2520to%2520sentences%2520in%2520a%2520patch-wise%2520approach.%2520Our%2520method%2520consists%2520of%2520a%2520text%2520embedding%2520trained%2520to%2520capture%2520anatomical%2520and%2520diagnostic%2520concepts%2520in%2520sentences%252C%2520a%2520patch-wise%2520image%2520encoder%2520conditioned%2520on%2520anatomical%2520structures%252C%2520and%2520a%2520multi-instance%2520alignment%2520of%2520these%2520representations.%2520We%2520demonstrate%2520that%2520MApLe%2520can%2520successfully%2520align%2520different%2520image%2520regions%2520and%2520multiple%2520diagnostic%2520findings%2520in%2520free-text%2520reports.%2520We%2520show%2520that%2520our%2520model%2520improves%2520the%2520alignment%2520performance%2520compared%2520to%2520state-of-the-art%2520baseline%2520models%2520when%2520evaluated%2520on%2520several%2520downstream%2520tasks.%2520The%2520code%2520is%2520available%2520at%2520https%253A//github.com/cirmuw/MApLe.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.13970v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MApLe%3A%20Multi-instance%20Alignment%20of%20Diagnostic%20Reports%20and%20Large%20Medical%20Images&entry.906535625=Felicia%20Bader%20and%20Philipp%20Seeb%C3%B6ck%20and%20Anastasia%20Bartashova%20and%20Ulrike%20Attenberger%20and%20Georg%20Langs&entry.1292438233=In%20diagnostic%20reports%2C%20experts%20encode%20complex%20imaging%20data%20into%20clinically%20actionable%20information.%20They%20describe%20subtle%20pathological%20findings%20that%20are%20meaningful%20in%20their%20anatomical%20context.%20Reports%20follow%20relatively%20consistent%20structures%2C%20expressing%20diagnostic%20information%20with%20few%20words%20that%20are%20often%20associated%20with%20tiny%20but%20consequential%20image%20observations.%20Standard%20vision%20language%20models%20struggle%20to%20identify%20the%20associations%20between%20these%20informative%20text%20components%20and%20small%20locations%20in%20the%20images.%20Her {"title": "GeoBridge: A Semantic-Anchored Multi-View Foundation Model Bridging Images and Text for Geo-Localization", "author": "Zixuan Song and Jing Zhang and Di Wang and Zidie Zhou and Wenbin Liu and Haonan Guo and En Wang and Bo Du", "abstract": "Cross-view geo-localization infers a location by retrieving geo-tagged reference images that visually correspond to a query image. However, the traditional satellite-centric paradigm limits robustness when high-resolution or up-to-date satellite imagery is unavailable. It further underexploits complementary cues across views (\\eg, drone, satellite, and street) and modalities (\\eg, language and image). To address these challenges, we propose GeoBridge, a novel model that performs bidirectional matching across views and supports language-to-image retrieval. Going beyond traditional satellite-centric formulations, GeoBridge builds on a novel semantic-anchor mechanism that bridges multi-view features through textual descriptions for robust, flexible localization. In support of this task, we construct GeoLoc, the first large-scale, cross-modal, and multi-view aligned dataset comprising over 50,000 pairs of drone, street-view panorama, and satellite images as well as their textual descriptions, collected from 36 countries, ensuring both geographic and semantic alignment. We performed broad evaluations across multiple tasks. Experiments confirm that GeoLoc pre-training markedly improves geo-location accuracy for GeoBridge while promoting cross-domain generalization and cross-modal knowledge transfer. Code, dataset, and pretrained models will be released at https://github.com/MiliLab/GeoBridge.", "link": "http://arxiv.org/abs/2512.02697v3", "date": "2026-04-15", "relevancy": 2.8243, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5794}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5576}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5576}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GeoBridge%3A%20A%20Semantic-Anchored%20Multi-View%20Foundation%20Model%20Bridging%20Images%20and%20Text%20for%20Geo-Localization&body=Title%3A%20GeoBridge%3A%20A%20Semantic-Anchored%20Multi-View%20Foundation%20Model%20Bridging%20Images%20and%20Text%20for%20Geo-Localization%0AAuthor%3A%20Zixuan%20Song%20and%20Jing%20Zhang%20and%20Di%20Wang%20and%20Zidie%20Zhou%20and%20Wenbin%20Liu%20and%20Haonan%20Guo%20and%20En%20Wang%20and%20Bo%20Du%0AAbstract%3A%20Cross-view%20geo-localization%20infers%20a%20location%20by%20retrieving%20geo-tagged%20reference%20images%20that%20visually%20correspond%20to%20a%20query%20image.%20However%2C%20the%20traditional%20satellite-centric%20paradigm%20limits%20robustness%20when%20high-resolution%20or%20up-to-date%20satellite%20imagery%20is%20unavailable.%20It%20further%20underexploits%20complementary%20cues%20across%20views%20%28%5Ceg%2C%20drone%2C%20satellite%2C%20and%20street%29%20and%20modalities%20%28%5Ceg%2C%20language%20and%20image%29.%20To%20address%20these%20challenges%2C%20we%20propose%20GeoBridge%2C%20a%20novel%20model%20that%20performs%20bidirectional%20matching%20across%20views%20and%20supports%20language-to-image%20retrieval.%20Going%20beyond%20traditional%20satellite-centric%20formulations%2C%20GeoBridge%20builds%20on%20a%20novel%20semantic-anchor%20mechanism%20that%20bridges%20multi-view%20features%20through%20textual%20descriptions%20for%20robust%2C%20flexible%20localization.%20In%20support%20of%20this%20task%2C%20we%20construct%20GeoLoc%2C%20the%20first%20large-scale%2C%20cross-modal%2C%20and%20multi-view%20aligned%20dataset%20comprising%20over%2050%2C000%20pairs%20of%20drone%2C%20street-view ews%2520and%2520supports%2520language-to-image%2520retrieval.%2520Going%2520beyond%2520traditional%2520satellite-centric%2520formulations%252C%2520GeoBridge%2520builds%2520on%2520a%2520novel%2520semantic-anchor%2520mechanism%2520that%2520bridges%2520multi-view%2520features%2520through%2520textual%2520descriptions%2520for%2520robust%252C%2520flexible%2520localization.%2520In%2520support%2520of%2520this%2520task%252C%2520we%2520construct%2520GeoLoc%252C%2520the%2520first%2520large-scale%252C%2520cross-modal%252C%2520and%2520multi-view%2520aligned%2520dataset%2520comprising%2520over%252050%252C000%2520pairs%2520of%2520drone%252C%2520street-view%2520panorama%252C%2520and%2520satellite%2520images%2520as%2520well%2520as%2520their%2520textual%2520descriptions%252C%2520collected%2520from%252036%2520countries%252C%2520ensuring%2520both%2520geographic%2520and%2520semantic%2520alignment.%2520We%2520performed%2520broad%2520evaluations%2520across%2520multiple%2520tasks.%2520Experiments%2520confirm%2520that%2520GeoLoc%2520pre-training%2520markedly%2520improves%2520geo-location%2520accuracy%2520for%2520GeoBridge%2520while%2520promoting%2520cross-domain%2520generalization%2520and%2520cross-modal%2520knowledge%2520transfer.%2520Code%252C%2520dataset%252C%2520and%2520pretrained%2520models%2520will%2520be%2520released%2520at%2520https%253A//github.com/MiliLab/GeoBridge.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.02697v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GeoBridge%3A%20A%20Semantic-Anchored%20Multi-View%20Foundation%20Model%20Bridging%20Images%20and%20Text%20for%20Geo-Localization&entry.906535625=Zixuan%20Song%20and%20Jing%20Zhang%20and%20Di%20Wang%20and%20Zidie%20Zhou%20and%20Wenbin%20Liu%20and%20Haonan%20Guo%20and%20En%20Wang%20and%20Bo%20Du&entry.1292438233=Cross-view%20geo-localization%20infers%20a%20location%20by%20retrieving%20geo-tagged%20reference%20images%20that%20visually%20correspond%20to%20a%20query%20image.%20However%2C%20the%20traditional%20satellite-centric%20paradigm%20limits%20robustness%20when%20high-resolution%20or%20up-to-date%20satellite%20imagery%20is%20unavailable.%20It%20further%20underexploits%20complementary%20cues%20across%20views%20%28%5Ceg%2C%20drone%2C%20satellite%2C%20and%20street%29%20and%20modalities%20%28%5Ceg%2C%20language%20and%20image%29.%20To%20address%20these%20challenges%2C%20we%20propose%20GeoBridge%2C%20a%20novel%20model%20that%20performs%20bidirectional%20matching%20across%20views%20and%20supports%20language-to-image%20retrieval.%20Going%20beyond%20traditional%20satellite-centric%20formulations%2C%20GeoBridge%20builds%20on%20a%20novel%20semantic-anchor%20mechanism%20that%20bridges%20multi-view%20features%20through%20textual%20descriptions%20for%20robust%2C%20flexible%20localization.%20In%20support%20of%20this%20task%2C%20we%20construct%20GeoLoc%2C%20the%20first%20large-scale%2C%20cross-modal%2C%20and%20multi-view%20aligned%20dataset%20comprising%20over%2050%2C000%20pairs%20of%20drone%2C%20street-view%20panorama%2C%20and%20satellite%20images%20as%20well%20as%20their%20textual%20descriptions%2C%20collected%20from%2036%20countries%2C%20ensuring%20both%20geographic%20and%20semantic%20alignment.%20We%20performed%20broad%20evaluations%20across%20multiple%20tasks.%20Experiments%20confirm%20that%20GeoLoc%20pre-training%20markedly%20improves%20geo-location%20accuracy%20for%20GeoBridge%20while%20promoting%20cross-domain%20generalization%20and%20cross-modal%20knowledge%20transfer.%20Code%2C%20dataset%2C%20and%20pretrained%20models%20will%20be%20released%20at%20https%3A//github.com/MiliLab/GeoBridge.&entry.1838667208=http%3A//arxiv.org/abs/2512.02697v3&entry.124074799=Read"},
{"title": "Why and When Visual Token Pruning Fails? A Study on Relevant Visual Information Shift in MLLMs Decoding", "author": "Jiwan Kim and Kibum Kim and Wonjoong Kim and Byung-Kwan Lee and Chanyoung Park", "abstract": "Recently, visual token pruning has been studied to handle the vast number of visual tokens in Multimodal Large Language Models. However, we observe that while existing pruning methods perform reliably on simple visual understanding, they struggle to effectively generalize to complex visual reasoning tasks, a critical gap underexplored in previous studies. Through a systematic analysis, we identify Relevant Visual Information Shift (RVIS) during decoding as the primary failure driver. To address this, we propose Decoding-stage Shift-aware Token Pruning (DSTP), a training-free add-on framework that enables existing pruning methods to align visual tokens with shifting reasoning requirements during the decoding stage. Extensive experiments demonstrate that DSTP significantly mitigates performance degradation of pruning methods in complex reasoning tasks, while consistently yielding performance gains even across visual understanding benchmarks. Furthermore, DSTP demonstrates effectiveness across diverse state-of-the-art architectures, highlighting its generalizability and efficiency with minimal computational overhead.", "link": "http://arxiv.org/abs/2604.12358v2", "date": "2026-04-15", "relevancy": 2.8166, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5776}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5776}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5348}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Why%20and%20When%20Visual%20Token%20Pruning%20Fails%3F%20A%20Study%20on%20Relevant%20Visual%20Information%20Shift%20in%20MLLMs%20Decoding&body=Title%3A%20Why%20and%20When%20Visual%20Token%20Pruning%20Fails%3F%20A%20Study%20on%20Relevant%20Visual%20Information%20Shift%20in%20MLLMs%20Decoding%0AAuthor%3A%20Jiwan%20Kim%20and%20Kibum%20Kim%20and%20Wonjoong%20Kim%20and%20Byung-Kwan%20Lee%20and%20Chanyoung%20Park%0AAbstract%3A%20Recently%2C%20visual%20token%20pruning%20has%20been%20studied%20to%20handle%20the%20vast%20number%20of%20visual%20tokens%20in%20Multimodal%20Large%20Language%20Models.%20However%2C%20we%20observe%20that%20while%20existing%20pruning%20methods%20perform%20reliably%20on%20simple%20visual%20understanding%2C%20they%20struggle%20to%20effectively%20generalize%20to%20complex%20visual%20reasoning%20tasks%2C%20a%20critical%20gap%20underexplored%20in%20previous%20studies.%20Through%20a%20systematic%20analysis%2C%20we%20identify%20Relevant%20Visual%20Information%20Shift%20%28RVIS%29%20during%20decoding%20as%20the%20primary%20failure%20driver.%20To%20address%20this%2C%20we%20propose%20Decoding-stage%20Shift-aware%20Token%20Pruning%20%28DSTP%29%2C%20a%20training-free%20add-on%20framework%20that%20enables%20existing%20pruning%20methods%20to%20align%20visual%20tokens%20with%20shifting%20reasoning%20requirements%20during%20the%20decoding%20stage.%20Extensive%20experiments%20demonstrate%20that%20DSTP%20significantly%20mitigates%20performance%20degradation%20of%20pruning%20methods%20in%20complex%20reasoning%20tasks%2C%20while%20consistently%20yielding%20performance%20gains%20even%20across%20visual%20understanding%20benchmarks.%20Furthermore%2C%20DSTP%20demonstrates%20effectiveness%20across%20diverse%20state-of-the-art%20architectures%2C%20highlighting%20its%20generalizability%20and%20efficiency%20with%20minimal%20computational%20overhead.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12358v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWY state-of-the-art%2520architectures%252C%2520highlighting%2520its%2520generalizability%2520and%2520efficiency%2520with%2520minimal%2520computational%2520overhead.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.12358v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Why%20and%20When%20Visual%20Token%20Pruning%20Fails%3F%20A%20Study%20on%20Relevant%20Visual%20Information%20Shift%20in%20MLLMs%20Decoding&entry.906535625=Jiwan%20Kim%20and%20Kibum%20Kim%20and%20Wonjoong%20Kim%20and%20Byung-Kwan%20Lee%20and%20Chanyoung%20Park&entry.1292438233=Recently%2C%20visual%20token%20pruning%20has%20been%20studied%20to%20handle%20the%20vast%20number%20of%20visual%20tokens%20in%20Multimodal%20Large%20Language%20Models.%20However%2C%20we%20observe%20that%20while%20existing%20pruning%20methods%20perform%20reliably%20on%20simple%20visual%20understanding%2C%20they%20struggle%20to%20effectively%20generalize%20to%20complex%20visual%20reasoning%20tasks%2C%20a%20critical%20gap%20underexplored%20in%20previous%20studies.%20Through%20a%20systematic%20analysis%2C%20we%20identify%20Relevant%20Visual%20Information%20Shift%20%28RVIS%29%20during%20decoding%20as%20the%20primary%20failure%20driver.%20To%20address%20this%2C%20we%20propose%20Decoding-stage%20Shift-aware%20Token%20Pruning%20%28DSTP%29%2C%20a%20training-free%20add-on%20framework%20that%20enables%20existing%20pruning%20methods%20to%20align%20visual%20tokens%20with%20shifting%20reasoning%20requirements%20during%20the%20decoding%20stage.%20Extensive%20experiments%20demonstrate%20that%20DSTP%20significantly%20mitigates%20performance%20degradation%20of%20pruning%20methods%20in%20complex%20reasoning%20tasks%2C%20while%20consistently%20yielding%20performance%20gains%20even%20across%20visual%20understanding%20benchmarks.%20Furthermore%2C%20DSTP%20demonstrates%20effectiveness%20across%20diverse%20state-of-the-art%20architectures%2C%20highlighting%20its%20generalizability%20and%20efficiency%20with%20minimal%20computational%20overhead.&entry.1838667208=http%3A//arxiv.org/abs/2604.12358v2&entry.124074799=Read"},
{"title": "Temporally Consistent Long-Term Memory for 3D Single Object Tracking", "author": "Jaejoon Yoo and SuBeen Lee and Yerim Jeon and Miso Lee and Jae-Pil Heo", "abstract": "3D Single Object Tracking (3D-SOT) aims to localize a target object across a sequence of LiDAR point clouds, given its 3D bounding box in the first frame. Recent methods have adopted a memory-based approach to utilize previously observed features of the target object, but remain limited to only a few recent frames. This work reveals that their temporal capacity is fundamentally constrained to short-term context due to severe temporal feature inconsistency and excessive memory overhead. To this end, we propose a robust long-term 3D-SOT framework, ChronoTrack, which preserves the temporal feature consistency while efficiently aggregating the diverse target features via long-term memory. Based on a compact set of learnable memory tokens, ChronoTrack leverages long-term information through two complementary objectives: a temporal consistency loss and a memory cycle consistency loss. The former enforces feature alignment across frames, alleviating temporal drift and improving the reliability of proposed long-term memory. In parallel, the latter encourages each token to encode diverse and discriminative target representations observed throughout the sequence via memory-point-memory cyclic walks. As a result, ChronoTrack achieves new state-of-the-art performance on multiple 3D-SOT benchmarks, demonstrating its effectiveness in long-term target modeling with compact memory while running at real-time speed of 42 FPS on a single RTX 4090 GPU. The code is available at https://github.com/ujaejoon/ChronoTrack", "link": "http://arxiv.org/abs/2604.13789v1", "date": "2026-04-15", "relevancy": 2.7657, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5604}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5505}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5485}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Temporally%20Consistent%20Long-Term%20Memory%20for%203D%20Single%20Object%20Tracking&body=Title%3A%20Temporally%20Consistent%20Long-Term%20Memory%20for%203D%20Single%20Object%20Tracking%0AAuthor%3A%20Jaejoon%20Yoo%20and%20SuBeen%20Lee%20and%20Yerim%20Jeon%20and%20Miso%20Lee%20and%20Jae-Pil%20Heo%0AAbstract%3A%203D%20Single%20Object%20Tracking%20%283D-SOT%29%20aims%20to%20localize%20a%20target%20object%20across%20a%20sequence%20of%20LiDAR%20point%20clouds%2C%20given%20its%203D%20bounding%20box%20in%20the%20first%20frame.%20Recent%20methods%20have%20adopted%20a%20memory-based%20approach%20to%20utilize%20previously%20observed%20features%20of%20the%20target%20object%2C%20but%20remain%20limited%20to%20only%20a%20few%20recent%20frames.%20This%20work%20reveals%20that%20their%20temporal%20capacity%20is%20fundamentally%20constrained%20to%20short-term%20context%20due%20to%20severe%20temporal%20feature%20inconsistency%20and%20excessive%20memory%20overhead.%20To%20this%20end%2C%20we%20propose%20a%20robust%20long-term%203D-SOT%20framework%2C%20ChronoTrack%2C%20which%20preserves%20the%20temporal%20feature%20consistency%20while%20efficiently%20aggregating%20the%20diverse%20target%20features%20via%20long-term%20memory.%20Based%20on%20a%20compact%20set%20of%20learnable%20memory%20tokens%2C%20ChronoTrack%20leverages%20long-term%20information%20through%20two%20complementary%20objectives%3A%20a%20temporal%20consistency%20loss%20and%20a%20memory%20cycle%20consistency%20loss.%20The%20former%20enforces%20feature%20alignment%20across%20frames%2C%20alleviating%20temporal%20drift%20and%20improving%20the%20reliability%20of%20proposed%20long-term% {"title": "Context Sensitivity Improves Human-Machine Visual Alignment", "author": "Frieda Born and Tom Neuh\u00e4user and Lukas Muttenthaler and Brett D. Roads and Bernhard Spitzer and Andrew K. Lampinen and Matt Jones and Klaus-Robert M\u00fcller and Michael C. Mozer", "abstract": "Modern machine learning models typically represent inputs as fixed points in a high-dimensional embedding space. While this approach has been proven powerful for a wide range of downstream tasks, it fundamentally differs from the way humans process information. Because humans are constantly adapting to their environment, they represent objects and their relationships in a highly context-sensitive manner. To address this gap, we propose a method for context-sensitive similarity computation from neural network embeddings, applied to modeling a triplet odd-one-out task with an anchor image serving as simultaneous context. Modeling context enables us to achieve up to a 15% improvement in odd-one-out accuracy over a context-insensitive model. We find that this improvement is consistent across both original and \"human-aligned\" vision foundation models.", "link": "http://arxiv.org/abs/2604.13883v1", "date": "2026-04-15", "relevancy": 2.729, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5544}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5544}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5286}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Context%20Sensitivity%20Improves%20Human-Machine%20Visual%20Alignment&body=Title%3A%20Context%20Sensitivity%20Improves%20Human-Machine%20Visual%20Alignment%0AAuthor%3A%20Frieda%20Born%20and%20Tom%20Neuh%C3%A4user%20 resent%2520inputs%2520as%2520fixed%2520points%2520in%2520a%2520high-dimensional%2520embedding%2520space.%2520While%2520this%2520approach%2520has%2520been%2520proven%2520powerful%2520for%2520a%2520wide%2520range%2520of%2520downstream%2520tasks%252C%2520it%2520fundamentally%2520differs%2520from%2520the%2520way%2520humans%2520process%2520information.%2520Because%2520humans%2520are%2520constantly%2520adapting%2520to%2520their%2520environment%252C%2520they%2520represent%2520objects%2520and%2520their%2520relationships%2520in%2520a%2520highly%2520context-sensitive%2520manner.%2520To%2520address%2520this%2520gap%252C%2520we%2520propose%2520a%2520method%2520for%2520context-sensitive%2520similarity%2520computation%2520from%2520neural%2520network%2520embeddings%252C%2520applied%2520to%2520modeling%2520a%2520triplet%2520odd-one-out%2520task%2520with%2520an%2520anchor%2520image%2520serving%2520as%2520simultaneous%2520context.%2520Modeling%2520context%2520enables%2520us%2520to%2520achieve%2520up%2520to%2520a%252015%2525%2520improvement%2520in%2520odd-one-out%2520accuracy%2520over%2520a%2520context-insensitive%2520model.%2520We%2520find%2520that%2520this%2520improvement%2520is%2520consistent%2520across%2520both%2520original%2520and%2520%2522human-aligned%2522%2520vision%2520foundation%2520models.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.13883v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Context%20Sensitivity%20Improves%20Human-Machine%20Visual%20Alignment&entry.906535625=Frieda%20Born%20and%20Tom%20Neuh%C3%A4user%20and%20Lukas%20Muttenthaler%20and%20Brett%20D.%20Roads%20and%20Bernhard%20Spitzer%20and%20Andrew%20K.%20Lampinen%20and%20Matt%20Jones%20and%20Klaus-Robert%20M%C3%BCller%20and%20Michael%20C.%20Mozer&entry.1292438233=Modern%20machine%20learning%20models%20typically%20represent%20inputs%20as%20fixed%20points%20in%20a%20high-dimensional%20embedding%20space.

{"title": "SLQ: Bridging Modalities via Shared Latent Queries for Retrieval with Frozen MLLMs", "author": "Haoran Lou and Ziyan Liu and Chunxiao Fan and Yuexin Wu and Yue Ming", "abstract": "Multimodal Large Language Models (MLLMs) exhibit strong reasoning and world knowledge, yet adapting them for retrieval remains challenging. Existing approaches rely on invasive parameter updates, such as full fine-tuning and LoRA, which may disrupt the pre-trained semantic space and impair the structured knowledge essential for reasoning. In this work, we argue that adapting MLLMs for retrieval should focus on eliciting pre-trained representations rather than overwriting them. To this end, we propose SLQ, an effective and efficient framework that adapts a frozen MLLM into a retriever through a small set of Shared Latent Queries. Appended to the end of both text and image token sequences, these queries leverage the model's native causal attention to serve as global aggregation interfaces, producing compact embeddings in a unified space while keeping the backbone unchanged. Furthermore, to better evaluate retrieval beyond superficial pattern matching, we construct KARR-Bench, a benchmark designed for knowledge-aware reasoning retrieval. Extensive experiments show that SLQ outperforms full fine-tuning and LoRA on COCO and Flickr30K, while achieving competitive performance on MMEB and yielding substantial gains on KARR-Bench. The results demonstrate that SLQ, which preserves pre-trained representations, provides an effective and efficient framework for adapting MLLMs to retrieval.", "link": "http://arxiv.org/abs/2604.13710v1", "date": "2026-04-15", "relevancy": 2.7104, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5569}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5347}, { {"title": "IGen: Scalable Data Generation for Robot Learning from Open-World Images", "author": "Chenghao Gu and Haolan Kang and Junchao Lin and Jinghe Wang and Duo Wu and Shuzhao Xie and Fanding Huang and Junchen Ge and Ziyang Gong and Letian Li and Hongying Zheng and Changwei Lv and Zhi Wang", "abstract": "The rise of generalist robotic policies has created an exponential demand for large-scale training data. However, on-robot data collection is labor-intensive and often limited to specific environments. In contrast, open-world images capture a vast diversity of real-world scenes that naturally align with robotic manipulation tasks, offering a promising avenue for low-cost, large-scale robot data acquisition. Despite this potential, the lack of associated robot actions hinders the practical use of open-world images for robot learning, leaving this rich visual resource largely unexploited. To bridge this gap, we propose IGen, a framework that scalably generates realistic visual observations and executable actions from open-world images. IGen first converts unstructured 2D pixels into structured 3D scene representations suitable for scene understanding and manipulation. It then leverages the reasoning capabilities of vision-language models to transform scene-specific task instructions into high-level plans and generate low-level actions as SE(3) end-effector pose sequences. From these poses, it synthesizes dynamic scene evolution and renders temporally coherent visual observations. Experiments validate the high quality of visuomotor data generated by IGen, and show that policies trained solely on IGen-synthesized data achieve performance comparable to those trained on real-world data. This highlights the potential of IGen to support scalable data generation from open-world images for generalist robotic policy training.", "link": "http://arxiv.org/abs/2512.01773v2", "date": "2026-04-15", "relevancy": 2.6876, "topK": [{"title": "Genie: Generative Interactive Environme ured%203D%20scene%20representations%20suitable%20for%20scene%20understanding%20and%20manipulation.%20It%20then%20leverages%20the%20reasoning%20capabilities%20of%20vision-language%20models%20to%20transform%20scene-specific%20task%20instructions%20into%20high-level%20plans%20and%20generate%20low-level%20actions%20as%20SE%283%29%20end-effector%20pose%20sequences.%20From%20these%20poses%2C%20it%20synthesizes%20dynamic%20scene%20evolution%20and%20renders%20temporally%20coherent%20visual%20observations.%20Experiments%20validate%20the%20high%20quality%20of%20visuomotor%20data%20generated%20by%20IGen%2C%20and%20show%20that%20policies%20trained%20solely%20on%20IGen-synthesized%20data%20achieve%20performance%20comparable%20to%20those%20trained%20on%20real-world%20data.%20This%20highlights%20the%20potential%20of%20IGen%20to%20support%20scalable%20data%20generation%20from%20open-world%20images%20for%20generalist%20robotic%20policy%20training.%0ALink%3A%20http%3A//arxiv.org/abs/2512.01773v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIGen%253A%2520Scalable%2520Data%2520Generation%2520for%2520Robot%2520Learning%2520from%2520Open-World%2520Images%26entry.906535625%3DChenghao%2520Gu%2520and%2520Haolan%2520Kang%2520and%2520Junchao%2520Lin%2520and%2520Jinghe%2520Wang%2520and%2520Duo%2520Wu%2520and%2520Shuzhao%2520Xie%2520and%2520Fanding%2520Huang%2520and%2520Junchen%2520Ge%2520and%2520Ziyang%2520Gong%2520and%2520Letian%2520Li%2520and%2520Hongying%2520Zheng%2520and%2520Changwei%2520Lv%2520and%2520Zhi%2520Wang%26entry.1292438233%3DThe%2520rise%2520of%2520generalist%2520robotic%2520policies%2520has%2520created%2520an%2520exponential%2520demand%2520for%2520large-scale%2520training%2520data.%2520However%252C%2520on-robot%2520data%2520collection%2520is%2520labor-intensive%2520and%2520often%2520limited%2520to%2520specific%2520environments.%2520In%2520contrast%252C%2520open-world%2520images%2520capture {"title": "AudioX: A Unified Framework for Anything-to-Audio Generation", "author": "Zeyue Tian and Zhaoyang Liu and Yizhu Jin and Ruibin Yuan and Liumeng Xue and Xu Tan and Qifeng Chen and Wei Xue and Yike Guo", "abstract": "Audio and music generation based on flexible multimodal control signals is a widely applicable topic, with the following key challenges: 1) a unified multimodal modeling framework, and 2) large-scale, high-quality training data. As such, we propose AudioX, a unified framework for anything-to-audio generation that integrates varied multimodal conditions (i.e., text, video, and audio signals) in this work. The core design in this framework is a Multimodal Adaptive Fusion module, which enables the effective fusion of diverse multimodal inputs, enhancing cross-modal alignment and improving overall generation quality. To train this unified model, we construct a large-scale, high-quality dataset, IF-caps, comprising over 7 million samples curated through a structured data annotation pipeline. This dataset provides comprehensive supervision for multimodal-conditioned audio generation. We benchmark AudioX against state-of-the-art methods across a wide range of tasks, finding that our model achieves superior performance, especially in text-to-audio and text-to-music generation. These results demonstrate our method is capable of audio generation under multimodal control signals, showing powerful instruction-following potential. The code and datasets will be available at https://zeyuet.github.io/AudioX/.", "link": "http://arxiv.org/abs/2503.10522v4", "date": "2026-04-15", "relevancy": 2.678, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.54}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5351}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxi {"title": "Think in Sentences: Explicit Sentence Boundaries Enhance Language Model's Capabilities", "author": "Zhichen Liu and Yongyuan Li and Yang Xu", "abstract": "Researchers have explored different ways to improve large language models (LLMs)' capabilities via dummy token insertion in contexts. However, existing works focus solely on the dummy tokens themselves, but fail to leverage the inherent sentence-level structure of natural language. This is a critical oversight, as LLMs acquire linguistic capabilities through exposure to human-generated texts, which are inherently structured at the sentence level. Motivated by this gap, we propose an approach that inserts delimiters at sentence boundaries in LLM inputs, which not only integrates dummy tokens into the context, but also facilitates LLMs with sentence-by-sentence processing behavior during reasoning. Two concrete methods: (1). In-context learning and (2). Supervised fine-tuning are experimented using 7B models to 600B Deepseek-V3. Our results demonstrate consistent improvements across various tasks, with notable gains of up to 7.7\\% on GSM8k and 12.5\\% on DROP. Furthermore, the fine-tuned LLMs can incorporate sentence awareness evidenced by their internal representations. Our work establishes a simple yet effective technique for enhancing LLM's capabilities, offering promising directions for cognitive-inspired LLM enhancement paradigm.", "link": "http://arxiv.org/abs/2604.10135v2", "date": "2026-04-15", "relevancy": 2.6777, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5598}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5598}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.487}], "mailto": %20paradigm.%0ALink%3A%20http%3A//arxiv.org/abs/2604.10135v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThink%2520in%2520Sentences%253A%2520Explicit%2520Sentence%2520Boundaries%2520Enhance%2520Language%2520Model%2527s%2520Capabilities%26entry.906535625%3DZhichen%2520Liu%2520and%2520Yongyuan%2520Li%2520and%2520Yang%2520Xu%26entry.1292438233%3DResearchers%2520have%2520explored%2520different%2520ways%2520to%2520improve%2520large%2520language%2520models%2520%2528LLMs%2529%2527%2520capabilities%2520via%2520dummy%2520token%2520insertion%2520in%2520contexts.%2520However%252C%2520existing%2520works%2520focus%2520solely%2520on%2520the%2520dummy%2520tokens%2520themselves%252C%2520but%2520fail%2520to%2520leverage%2520the%2520inherent%2520sentence-level%2520structure%2520of%2520natural%2520language.%2520This%2520is%2520a%2520critical%2520oversight%252C%2520as%2520LLMs%2520acquire%2520linguistic%2520capabilities%2520through%2520exposure%2520to%2520human-generated%2520texts%252C%2520which%2520are%2520inherently%2520structured%2520at%2520the%2520sentence%2520level.%2520Motivated%2520by%2520this%2520gap%252C%2520we%2520propose%2520an%2520approach%2520that%2520inserts%2520delimiters%2520at%2520sentence%2520boundaries%2520in%2520LLM%2520inputs%252C%2520which%2520not%2520only%2520integrates%2520dummy%2520tokens%2520into%2520the%2520context%252C%2520but%2520also%2520facilitates%2520LLMs%2520with%2520sentence-by-sentence%2520processing%2520behavior%2520during%2520reasoning.%2520Two%2520concrete%2520methods%253A%2520%25281%2529.%2520In-context%2520learning%2520and%2520%25282%2529.%2520Supervised%2520fine-tuning%2520are%2520experimented%2520using%25207B%2520models%2520to%2520600B%2520Deepseek-V3.%2520Our%2520results%2520demonstrate%2520consistent%2520improvements%2520across%2520various%2520tasks%252C%2520with%2520notable%2520gains%2520of%2520up%2520to%25207.7%255C%2525%2520on%2520GSM8k%2520and%2520 {"title": "UniGeoSeg: Towards Unified Open-World Segmentation for Geospatial Scenes", "author": "Shuo Ni and Di Wang and He Chen and Haonan Guo and Ning Zhang and Jing Zhang", "abstract": "Instruction-driven segmentation in remote sensing generates masks from guidance, offering great potential for accessible and generalizable applications. However, existing methods suffer from fragmented task formulations and limited instruction data, hindering effective understanding and generalization. To address these issues, we introduce GeoSeg-1M, the first million-scale dataset for remote sensing instruction-driven segmentation, constructed via an automatic mask filtering and instruction generation pipeline that synthesizes referring, interactive, and reasoning segmentation instructions from multiple public datasets. GeoSeg-1M contains 590K images, 117 categories, and 1.1M image-mask-instruction triplets. Building upon this foundation, we further curate GeoSeg-Bench, a challenging benchmark designed to evaluate contextual understanding and reasoning capabilities across diverse instruction-driven tasks and complex geospatial scenes. Furthermore, we present UniGeoSeg, a unified framework that serves as a strong baseline, incorporating task-aware text enhancement, latent knowledge memory, and a progressive training strategy to facilitate multi-task learning. Extensive experiments demonstrate the state-of-the-art performance of UniGeoSeg across GeoSeg-Bench and diverse public benchmarks, while exhibiting strong zero-shot generalization. Datasets and source code were released at https://github.com/MiliLab/UniGeoSeg.", "link": "http://arxiv.org/abs/2511.23332v2", "date": "2026-04-15", "relevancy": 2.6707, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5355}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http:/ {"title": "HiProto: Hierarchical Prototype Learning for Interpretable Object Detection Under Low-quality Conditions", "author": "Jianlin Xiang and Linhui Dai and Xue Yang and Chaolei Yang and Yanshan Li", "abstract": "Interpretability is essential for deploying object detection systems in critical applications, especially under low-quality imaging conditions that degrade visual information and increase prediction uncertainty. Existing methods either enhance image quality or design complex architectures, but often lack interpretability and fail to improve semantic discrimination. In contrast, prototype learning enables interpretable modeling by associating features with class-centered semantics, which can provide more stable and interpretable representations under degradation. Motivated by this, we propose HiProto, a new paradigm for interpretable object detection based on hierarchical prototype learning. By constructing structured prototype representations across multiple feature levels, HiProto effectively models class-specific semantics, thereby enhancing both semantic discrimination and interpretability. Building upon prototype modeling, we first propose a Region-to-Prototype Contrastive Loss (RPC-Loss) to enhance the semantic focus of prototypes on target regions. Then, we propose a Prototype Regularization Loss (PR-Loss) to improve the distinctiveness among class prototypes. Finally, we propose a Scale-aware Pseudo Label Generation Strategy (SPLGS) to suppress mismatched supervision for RPC-Loss, thereby preserving the robustness of low-level prototype representations. Experiments on ExDark, RTTS, and VOC2012-FOG demonstrate that HiProto achieves competitive results while offering clear interpretability through prototype responses, without relying on image enhancement or complex architectures. Our code will be available at https://github.com/xjlDestiny/HiProto.git.", "link": "http://arxiv.org/abs/2604.13981v1", "date": "2026-04-15", "relevancy": 2.6475, "topK": by%20enhancing%20both%20semantic%20discrimination%20and%20interpretability.%20Building%20upon%20prototype%20modeling%2C%20we%20first%20propose%20a%20Region-to-Prototype%20Contrastive%20Loss%20%28RPC-Loss%29%20to%20enhance%20the%20semantic%20focus%20of%20prototypes%20on%20target%20regions.%20Then%2C%20we%20propose%20a%20Prototype%20Regularization%20Loss%20%28PR-Loss%29%20to%20improve%20the%20distinctiveness%20among%20class%20prototypes.%20Finally%2C%20we%20propose%20a%20Scale-aware%20Pseudo%20Label%20Generation%20Strategy%20%28SPLGS%29%20to%20suppress%20mismatched%20supervision%20for%20RPC-Loss%2C%20thereby%20preserving%20the%20robustness%20of%20low-level%20prototype%20representations.%20Experiments%20on%20ExDark%2C%20RTTS%2C%20and%20VOC2012-FOG%20demonstrate%20that%20HiProto%20achieves%20competitive%20results%20while%20offering%20clear%20interpretability%20through%20prototype%20responses%2C%20without%20relying%20on%20image%20enhancement%20or%20complex%20architectures.%20Our%20code%20will%20be%20available%20at%20https%3A//github.com/xjlDestiny/HiProto.git.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13981v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHiProto%253A%2520Hierarchical%2520Prototype%2520Learning%2520for%2520Interpretable%2520Object%2520Detection%2520Under%2520Low-quality%2520Conditions%26entry.906535625%3DJianlin%2520Xiang%2520and%2520Linhui%2520Dai%2520and%2520Xue%2520Yang%2520and%2520Chaolei%2520Yang%2520and%2520Yanshan%2520Li%26entry.1292438233%3DInterpretability%2520is%2520essential%2520for%2520deploying%2520object%2520detection%2520systems%2520in%2520critical%2520applications%252C%2520especially%2520under%2520low-quality%2520imaging%2520conditions%2520that%2520degrade%2520visual%2520information%2520and%2520increase%2520prediction%2520uncertainty.%2520Existing%2520methods%2520either%2520enhance%2520image%2520quality%2520or%2520design%2520complex%2520architectures%252C%2520but%2520often%2520lack%2520interpretability%2520and%2520fail%2520to%2520improve%2520semantic%2520discrimination.%2520In%2520contrast%252C%2520prototype%2520learning%2520enables%2520interpretable%2520modeling%2520by%2520associating%2520features%2520with%2520class-centered%2520semantics%252C%2520which%2520can%2520provide%2520more%2520stable%2520and%2520interpretable%2520representations%2520under%2520degradation.%2520Motivated%2520by%2520this%252C%2520we%2520propose%2520HiProto%252C%2520a%2520new%2520paradigm%2520for%2520interpretable%2520object%2520detection%2520based%2520on%2520hierarchical%2520prototype%2520learning.%2520By%2520constructing%2520structured%2520prototype%2520representations%2520across%2520multiple%2520feature%2520levels%252C%2520HiProto%2520effectively%2520models%2520class-specific%2520semantics%252C%2520thereby%2520enhancing%2520both%2520semantic%2520discrimination%2520and%2520interpretability.%2520Building%2520upon%2520prototype%2520modeling%252C%2520we%2520first%2520propose%2520a%2520Region-to-Prototype%2520Contrastive%2520Loss%2520%2528RPC-Loss%2529%2520to%2520enhance%2520the%2520semantic%2520focus%2520of%2520prototypes%2520on%2520target%2520regions.%2520Then%252C%2520we%2520propose%2520a%2520Prototype%2520Regularization%2520Loss%2520%2528PR-Loss%2529%2520to%2520improve%2520the%2520distinctiveness%2520among%2520class%2520prototypes.%2520Finally%252C%2520we%2520propose%2520a%2520Scale-aware%2520Pseudo%2520Label%2520Generation%2520Strategy%2520%2528SPLGS%2529%2520to%2520suppress%2520mismatched%2520supervision%2520for%2520RPC-Loss%252C%2520thereby%2520preserving%2520the%2520robustness%2520of%2520low-level%2520prototype%2520representations.%2520Experiments%2520on%2520ExDark%252C%2520RTTS%252C%2520and%2520VOC2012-FOG%2520demonstrate%2520that%2520HiProto%2520achieves%2520competitive%2520results%2520while%2520offering%2520clear%2520interpretability%2520through%2520prototype%2520responses%252C%2520without%2520relying%2520on%2520image%2520enhancement {"title": "Gaslight, Gatekeep, V1-V3: Early Visual Cortex Alignment Shields Vision-Language Models from Sycophantic Manipulation", "author": "Arya Shah and Vaibhav Tripathi and Mayank Singh and Chaklam Silpasuwanchai", "abstract": "Vision-language models are increasingly deployed in high-stakes settings, yet their susceptibility to sycophantic manipulation remains poorly understood, particularly in relation to how these models represent visual information internally. Whether models whose visual representations more closely mirror human neural processing are also more resistant to adversarial pressure is an open question with implications for both neuroscience and AI safety. We investigate this question by evaluating 12 open-weight vision-language models spanning 6 architecture families and a 40$\\times$ parameter range (256M--10B) along two axes: brain alignment, measured by predicting fMRI responses from the Natural Scenes Dataset across 8 human subjects and 6 visual cortex regions of interest, and sycophancy, measured through 76,800 two-turn gaslighting prompts spanning 5 categories and 10 difficulty levels. Region-of-interest analysis reveals that alignment specifically in early visual cortex (V1--V3) is a reliable negative predictor of sycophancy ($r = -0.441$, BCa 95\\% CI $[-0.740, -0.031]$), with all 12 leave-one-out correlations negative and the strongest effect for existence denial attacks ($r = -0.597$, $p = 0.040$). This anatomically specific relationship is absent in higher-order category-selective regions, suggesting that faithful low-level visual encoding provides a measurable anchor against adversarial linguistic override in vision-language models. We release our code on \\href{https://github.com/aryashah2k/Gaslight-Gatekeep-Sycophantic-Manipulation}{GitHub} and dataset on \\href{https://huggingface.co/datasets/aryashah00/Gaslight-Gatekeep-V1-V3}{Hugging Face}", "link": "http://arxiv.org/abs/2604.13803v1", "date": "2026-04-15", "relevancy": 2.6373, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5472}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5472}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.488}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gaslight%2C%20Gatekeep%2C%20V1-V3%3A%20Early%20Visual%20Cortex%20Alignment%20Shields%20Vision-Language%20Models%20from%20Sycophantic%20Manipulation&body=Title%3A%20Gaslight%2C%20Gatekeep%2C%20V1-V3%3A%20Early%20Visual%20Cortex%20Alignment%20Shields%20Vision-Language%20Models%20from%20Sycophantic%20Manipulation%0AAuthor%3A%20Arya%20Shah%20and%20Vaibhav%20Tripathi%20and%20Mayank%20Singh%20and%20Chaklam%20Silpasuwanchai%0AAbstract%3A%20Vision-language%20models%20are%20increasingly%20deployed%20in%20high-stakes%20settings%2C%20yet%20their%20susceptibility%20to%20sycophantic%20manipulation%20remains%20poorly%20understood%2C%20particularly%20in%20relation%20to%20how%20these%20models%20represent%20visual%20information%20internally.%20Whether%20models%20whose%20visual%20representations%20more%20closely%20mirror%20human%20neural%20processing%20are%20also%20more%20resistant%20to%20adversarial%20pressure%20is%20an%20open%20question%20with%20implications%20for%20both%20neuroscience%20and%20AI%20safety.%20We%20investigate%20this%20question%20by%20evaluating%2012%20open-weight%20vision-language%20models%20spanning%206%20architecture%20families%20and%20a%2040%24%5Ctimes%24%20parameter%20range%20%28256M--10B%29%20along%20two%20axes%3A%20brain%20alignment%2C%20measured%20by%20predicting%20fMRI%20responses%20from%20t {"title": "SparseBalance: Load-Balanced Long Context Training with Dynamic Sparse Attention", "author": "Hongtao Xu and Jianchao Tan and Yuxuan Hu and Pengju Lu and Hongyu Wang and Pingwei Sun and Yerui Sun and Yuchen Xie and Xunliang Cai and Mingzhen Li and Weile Jia", "abstract": "While sparse attention mitigates the computational bottleneck of long-context LLM training, its distributed training process exhibits extreme heterogeneity in both \\textit{1)} sequence length and \\textit{2)} sparsity sensitivity, leading to a severe imbalance problem and sub-optimal model accuracy. Existing algorithms and training frameworks typically focus on single issue, failing to systematically co-optimize these two problems. Therefore, we propose SparseBalance, a novel algorithm-system co-design framework, which exploits the sparsity and sequence heterogeneity to optimize model accuracy and system efficiency jointly. First, we propose workload-aware dynamic sparsity tuning, which employs a bidirectional sparsity adjustment to eliminate stragglers and exploit inherent bubbles for free accuracy. Second, we propose a sparsity-aware batching strategy to achieve coarse-grained balance, which complements dynamic sparsity tuning. Experimental results demonstrate that SparseBalance achieves up to a 1.33$\\times$ end-to-end speedup while still improving the long-context capability by 0.46\\% on the LongBench benchmark.", "link": "http://arxiv.org/abs/2604.13847v1", "date": "2026-04-15", "relevancy": 2.6032, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5353}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5198}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5068}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SparseBalance%3A%20Load-Balanced%20Long%20Context%20Training%20with%20Dynamic%20Sparse%20Attention&body=Title%3A%20SparseBalance%3A%20Load-Balanced%20Long%20Context%20Training%20with%20Dynamic%20Sparse%20Attention%0AAuthor%3A%20Hongtao%20Xu%20and%20Jianchao%20Tan%20and%20Yuxuan%20Hu%20and%20Pengju%20Lu%20and%20Hongyu%20Wang%20and%20Pingwei%20Sun%20and%20Yerui%20Sun%20and%20Yuchen%20Xie%20and%20Xunliang%20Cai%20and%20Mingzhen%20Li%20and%20Weile%20Jia%0AAbstract%3A%20While%20sparse%20attention%20mitigates%20the%20computational%20bottleneck%20of%20long-context%20LLM%20training%2C%20its%20distributed%20training%20process%20exhibits%20extreme%20heterogeneity%20in%20both%20%5Ctextit%7B1%29%7D%20sequence%20length%20and%20%5Ctextit%7B2%29%7D%20sparsity%20sensitivity%2C%20leading%20to%20a%20severe%20imbalance%20problem%20and%20sub-optimal%20model%20accuracy.%20Existing%20algorithms%20and%20training%20frameworks%20typically%20focus%20on%20single%20issue%2C%20failing%20to%20systematically%20co-optimize%20these%20two%20problems.%20Therefore%2C%20we%20propose%20SparseBalance%2C%20a%20novel%20algorithm-system%20co-design%20framework%2C%20which%20exploits%20the%20sparsity%20and%20sequence%20heterogeneity%20to%20optimize%20model%20accuracy%20and%20system%20efficiency%20jointly.%20First%2C%20we%20propose%20workload-aware%20dynamic%20sparsity%20tuning%2C%20which%20employs%20a%20bidirectional%20sparsity%20adjustment%20to%20eliminate%20stragglers%20and%20exploit%20inherent%20bubbles%20for%20free%20accuracy.%20Second%2C%20we%20propose%20a%20sparsity-aware%20batching%20strategy%20to%20achieve%20coarse-grained%20balance%2C%20which%20complements%20dynamic%20sparsity%20tuning.%20Experimental%20results%20demonstrate%20that%20SparseBalance%20achieves%20up%20to%20a%201.33%24%5Ctimes%24%20end-to-end%20speedup%20while%20still%20improving%20the%20long-context%20capability%20by%200.46%5C%25%20on%20the%20LongBench%20benchmark.%0AL {"title": "Three Roles, One Model: Role Orchestration at Inference Time to Close the Performance Gap Between Small and Large Agents", "author": "S. Aaron McClendon and Jorge Gallego-Feliciano and Stavros Zervoudakis and Antonios Saravanos", "abstract": "Large language model (LLM) agents show promise on realistic tool-use tasks, but deploying capable agents on modest hardware remains challenging. We study whether inference-time scaffolding alone, without any additional training compute, can improve the performance of a small model in complex multi-step environments. Operating on a single 24GB GPU, we evaluate Qwen3-8B on the AppWorld benchmark under both full-precision and 4-bit quantized configurations. Without any intervention, the raw model achieves just 5.4% (FP16) and 3.0% (AWQ) task goal completion. Guided by a systematic failure mode analysis, we introduce a three-tier inference scaffolding pipeline that deploys the same frozen model in three distinct roles: (1) a summarization model that preserves critical artifacts (tokens, credentials, API responses) while compressing dialogue history; (2) the main agent model that reasons over the compressed context; and (3) an isolated correction model that reviews and revises the agent's code output without access to conversation history, breaking repetitive failure loops. Applied to the same unmodified model, this scaffolding yields 8.9% (FP16) and 5.9% (AWQ) task goal completion, roughly doubling performance in both settings, with particularly strong gains on difficulty-1 tasks (15.8% to 26.3% FP16; 5.3% to 14.0% AWQ). On full-precision inference, our scaffolded 8B model surpasses DeepSeek-Coder 33B Instruct (7.1%) from the original AppWorld evaluation, demonstrating that structured inference-time interventions can make small models competitive with systems 4 times their size. We formalize the approach as a scaffolded policy over a frozen base model, three invocations of the same weights with different conditioning, drawing connections to test-time compute scaling and action-space shaping in reinforcement learning.", "link": "http://arxiv.org/abs/2604.11465v2", "date": "2026-04-15", "relevancy": 2.5901, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5285}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5128}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5128}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Three%20Roles%2C%20One%20Model%3A%20Role%20Orchestration%20at%20Inference%20Time%20to%20Close%20the%20Performance%20Gap%20Between%20Small%20and%20Large%20Agents&body=Title%3A%20Three%20Roles%2C%20One%20Model%3A%20Role%20Orchestration%20at%20Inference%20Time%20to%20Close%20the%20Performance%20Gap%20Between%20Small%20and%20Large%20Agents%0AAuthor%3A%20S.%20Aaron%20McClendon%20and%20Jorge%20Gallego-Feliciano%20and%20Stavros%20Zervoudakis%20and%20Antonios%20Saravanos%0AAbstract%3A%20Large%20language%20model%20%28LLM%29%20agents%20show%20promise%20on%20realistic%20tool-use%20tasks%2C%20but%20deploying%20capable%20agents%20on%20modest%20hardware%20remains%20challenging.%20We%20study%20whether%20inference-time%20scaffolding%20alone%2C%20without%20any%20additional%20training%20compute%2C%20can%20improve%20the%20performance%20of%20a%20small%20model%20in%20complex%20multi-step%20environments.%20Operating%20on%20a%20single%2024GB%20GPU%2C%20we%20evaluate%20Qwen3-8B%20on%20the%20AppWorld%20benchmark%20under%20both%20full-precision%20and%204-bit%20quantized%20configurations.%20Without%20any%20intervention%2C%20the%20raw%20model%20achieves%20just%205.4%25%20%28FP16%29%20and%203.0%25%20%28AWQ%29%20task%20goal%20completion.%20Guided%20by%20a%20systematic%20fa {"title": "Towards Fine-grained Temporal Perception: Post-Training Large Audio-Language Models with Audio-Side Time Prompt", "author": "Yanfeng Shi and Pengfei Cai and Jun Liu and Qing Gu and Nan Jiang and Lirong Dai and Ian McLoughlin and Yan Song", "abstract": "Large Audio-Language Models (LALMs) enable general audio understanding and demonstrate remarkable performance across various audio tasks. However, these models still face challenges in temporal perception (e.g., inferring event onset and offset), leading to limited utility in fine-grained scenarios. To address this issue, we propose Audio-Side Time Prompt and leverage Reinforcement Learning (RL) to develop the TimePro-RL framework for fine-grained temporal perception. Specifically, we encode timestamps as embeddings and interleave them within the audio feature sequence as temporal coordinates to prompt the model. Furthermore, we introduce RL following Supervised Fine-Tuning (SFT) to directly optimize temporal alignment performance. Experiments demonstrate that TimePro-RL achieves significant performance gains across a range of audio temporal tasks, such as audio grounding, sound event detection, and dense audio captioning, validating its robust effectiveness.", "link": "http://arxiv.org/abs/2604.13715v1", "date": "2026-04-15", "relevancy": 2.5884, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5565}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4982}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4982}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Fine-grained%20Temporal%20Perception%3A%20Post-Training%20Large%20Audio-Language%2 {"title": "Native Hybrid Attention for Efficient Sequence Modeling", "author": "Jusen Du and Jiaxi Hu and Tao Zhang and Weigao Sun and Yu Cheng", "abstract": "Transformers excel at sequence modeling but face quadratic complexity, while linear attention offers improved efficiency but often compromises recall accuracy over long contexts. In this work, we introduce Native Hybrid Attention (NHA), a novel hybrid architecture of linear and full attention that integrates both intra & inter-layer hybridization into a unified layer design. NHA maintains long-term context in key-value slots updated by a linear RNN, and augments them with short-term tokens from a sliding window. A single softmax attention operation is then applied over all keys and values, enabling per-token and per-head context-dependent weighting without requiring additional fusion parameters. The inter-layer behavior is controlled through a single hyperparameter, the sliding window size, which allows smooth adjustment between purely linear and full attention while keeping all layers structurally uniform. Experimental results show that NHA surpasses Transformers and other hybrid baselines on recall-intensive and commonsense reasoning tasks. Furthermore, pretrained LLMs can be structurally hybridized with NHA, achieving competitive accuracy while delivering significant efficiency gains. Code is available at https://github.com/JusenD/NHA.", "link": "http://arxiv.org/abs/2510.07019v3", "date": "2026-04-15", "relevancy": 2.567, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5196}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5179}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5027}], "mailto": "mailto:haoxiang.li.2024@gmail.co d%20baselines%20on%20recall-intensive%20and%20commonsense%20reasoning%20tasks.%20Furthermore%2C%20pretrained%20LLMs%20can%20be%20structurally%20hybridized%20with%20NHA%2C%20achieving%20competitive%20accuracy%20while%20delivering%20significant%20efficiency%20gains.%20Code%20is%20available%20at%20https%3A//github.com/JusenD/NHA.&entry.1838667208=http%3A//arxiv.org/abs/2510.07019v3&entry.124074799=Read"},
{"title": "Learning-Based Estimation of Spatially Resolved Scatter Radiation Fields in Interventional Radiology", "author": "Felix Lehner and Pasquale Lombardo and Susana Castillo and Oliver Hupe and Marcus Magnor", "abstract": "We present three variants of a lightweight, fully connected artificial neural network, suited for interactive estimation of three-dimensional, spatially resolved volumes of scattered radiation fields and a corresponding training pipeline for radiation protection dosimetry in medical radiation fields, such as those found in interventional radiology and cardiology. Accompanying, we present three different synthetically generated datasets with increasing complexity for training, generated using RadField3D, a Monte Carlo simulation application based on Geant4. As the primary scatter object, we employed the torso of a male Alderson RANDO phantom. On those datasets, we evaluate convolutional and fully connected architectures of neural networks to demonstrate which design decisions work well for reconstructing the fluence and spectra distributions over the spatial domain of such radiation fields. All our datasets, as well as our training pipeline, are published as open source in separate repositories. To evaluate the presented neural networks, we define and assess several metrics. Across these measures, the model variants demonstrate good spatial agreement between predicted and ground-truth radiation fields, particularly within specific regions of interest within the radiation field. Of particular relevance for potential application in out-of-field dosimetry is the SMAPE of the scatter radiation field, which represents the most challenging metric and was consistently above 84 %.", "link": "http://arxiv.org/abs/2512.17654v3", "date": "2026-04-15", "relevancy": 2.5178, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5181}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5006}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4919}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning-Based%20Estimation%20of%20Spatially%20Resolved%20Scatter%20Radiation%20Fields%20in%20Interventional%20Radiology&body=Title%3A%20Learning-Based%20Estimation%20of%20Spatially%20Resolved%20Scatter%20Radiation%20Fields%20in%20Interventional%20Radiology%0AAuthor%3A%20Felix%20Lehner%20and%20Pasquale%20Lombardo%20and%20Susana%20Castillo%20and%20Oliver%20Hupe%20and%20Marcus%20Magnor%0AAbstract%3A%20We%20present%20three%20variants%20of%20a%20lightweight%2C%20fully%20connected%20artificial%20neural%20network%2C%20suited%20for%20interactive%20estimation%20of%20three-dimensional%2C%20spatially%20resolved%20volumes%20of%20scattered%20radiation%20fields%20and%20a%20corresponding%20training%20pipeline%20for%20radiation%20protection%20dosimetry%20in%20medical%20radiation%20fields%2C%20such%20as%20those%20found%20in%20interventional%20radiology%20and%20cardiology.%20Accompanying%2C%20we%20present%20three%20different%20synthetically%20generated%20datasets%20with%20increasing%20complexity%20for%20training%2C%20generated%20using%20RadField3D%2C%20a%20Monte%20Carlo%20simulation%20application%20based%20on%20Geant4.%20As%20the%20primary%20scatter%20object%2C%20we%20employed%20the%20torso%20of%20a%20male%20Alderson%20RANDO%20phantom.%20On%20those%20datasets%2C%20we%20evaluate%20convolutional%20and%20fully%20connected%20architectures%20of%20neural%20networks%20to%20demonstrate%20which%20design%20decisions%20work%20well%20for%20reconstructing%20the%20fluence%20and%20spectra%20distributions%20over%20the%20spatial%20domain%20of%20such%20radiation%20fields.%20All%20our%20datasets%2C%20as%20well%20as%20our%20training%20pipeline%2C%20are%20published%20as%20open%20source%20in%20separate%20repositories.%20To%20evaluate%20the%20presented%20neural%20networks%2C%20we%20define%20and%20assess%20several%20metrics.%20Across%20these%20measures%2C%20the%20model%20variants%20demonstrate%20good%20spatial%20agreement%20between%20predicted%20and%20ground-truth%20radiation%20fields%2C%20particularly%20within%20specific%20regions%20of%20interest%20within%20the%20radiation%20field.%20Of%20particular%20relevance%20for%20potential%20application%20in%20out-of-field%20dosimetry%20is%20the%20SMAPE%20of%20the%20scatter%20radiation%20field%2C%20which%20represents%20the%20most%20challenging%20metric%20and%20was%20consistently%20above%2084%20%25.%0ALink%3A%20http%3A//arxiv.org/abs/2512.17654v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning-Based%2520Estimation%2520of%2520Spatially%2520Resolved%2520Scatter%2520Radiation%2520Fields%2520in%2520Interventional%2520Radiology%26entry.906535625%3DFelix%2520Lehner%2520and%2520Pasquale%2520Lombardo%2520and%2520Susana%2520Castillo%2520and%2520Oliver%2520Hupe%2520and%2520Marcus%2520Magnor%26entry.1292438233%3DWe%2520present%2520three%2520variants%2520of%2520a%2520lightweight%252C%2520fully%2520connected%2520artificial%2520neural%2520network%252C%2520suited%2520for%2520interactive%2520estimation%2520of%2520three-dimensional%252C%2520spatially%2520resolved%2520volumes%2520of%2520scattered%2520radiation%2520fields%2520and%2520a%2520corresponding%2520training%2520pipeline%2520for%2520radiation%2520protection%2520dosimetry%2520in%2520medical%2520radiation%2520fields%252C%2520such%2520as%2520those%2520found%2520in%2520interventional%2520radiology%2520and%2520cardiology.%2520Accompanying%252C%2520we%2520present%2520three%2520different%2520synthetically%2520generated%2520datasets%2520with%2520increasing%2520complexity%2520for%2520training%252C%2520generated {"title": "The cognitive companion: a lightweight parallel monitoring architecture for detecting and recovering from reasoning degradation in LLM agents", "author": "Rafflesia Khan and Nafiul Islam Khan", "abstract": "Large language model (LLM) agents on multi-step tasks suffer reasoning degradation, looping, drift, stuck states, at rates up to 30% on hard tasks. Current solutions include hard step limits (abrupt) or LLM-as-judge monitoring (10-15% overhead per step). This paper introduces the Cognitive Companion, a parallel monitoring architecture with two implementations: an LLM-based Companion and a novel zero-overhead Probe-based Companion. We report a three-batch feasibility study centered on Gemma 4 E4B, with an additional exploratory small-model analysis on Qwen 2.5 1.5B and Llama 3.2 1B. In our experiments, the LLM-based Companion reduced repetition on loop-prone tasks by 52-62% with approximately 11% overhead. The Probe-based Companion, trained on hidden states from layer 28, showed a mean effect size of +0.471 at zero measured inference overhead; its strongest probe result achieved cross-validated AUROC 0.840 on a small proxy-labeled dataset. A key empirical finding is that companion benefit appears task-type dependent: companions are most helpful on loop-prone and open-ended tasks, while effects are neutral or negative on more structured tasks. Our small-model experiments also suggest a possible scale boundary: companions did not improve the measured quality proxy on 1B-1.5B models, even when interventions fired. Overall, the paper should be read as a feasibility study rather than a definitive validation. The results provide encouraging evidence that sub-token monitoring may be useful, identify task-type sensitivity as a practical design constraint, and motivate selective companion activation as a promising direction for future work.", "link": "http://arxiv.org/abs/2604.13759v1", "date": "2026-04-15", "relevancy": 2.4923, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4986}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4986}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4983}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20cognitive%20companion%3A%20a%20lightweight%20parallel%20monitoring%20architecture%20for%20detecting%20and%20recovering%20from%20reasoning%20degradation%20in%20LLM%20agents&body=Title%3A%20The%20cognitive%20companion%3A%20a%20lightweight%20parallel%20monitoring%20architecture%20for%20detecting%20and%20recovering%20from%20reasoning%20degradation%20in%20LLM%20agents%0AAuthor%3A%20Rafflesia%20Khan%20and%20Nafiul%20Islam%20Khan%0AAbstract%3A%20Large%20language%20model%20%28LLM%29%20agents%20on%20multi-step%20tasks%20suffer%20reasoning%20degradation%2C%20looping%2C%20drift%2C%20stuck%20states%2C%20at%20rates%20up%20to%2030%25%20on%20hard%20tasks.%20Current%20solutions%20include%20hard%20step%20limits%20%28abrupt%29%20or%20LLM-as-judge%20monitoring%20%2810-15%25%20overhead%20per%20step%29.%20This%20paper%20introduces%20the%20Cognitive%20Companion%2C%20a%20parallel%20monitoring%20architecture%20with%20two%20implementations%3A%20an%20LLM-based%20Companion%20and%20a%20novel%20zero-overhead%20Probe-based%20Companion.%20We%20report%20a%20three-batch%20feasibility%20study%20centered%20on%20Gemma%204%20E4B%2C%20with%20an%20additional%20exploratory%20small-model%20analysis%20on%20Qwen%202.5%201.5B%20and%20Llama%203.2%201B.%20In%20our%20experiments%2C%20the%20LLM-based%20Companion%20reduced%20repetition%20on%20loop-prone%20tasks%20by%2052-62%25%20with%20approximately%2011%25%20overhead.%20The%20Probe-based%20Companion%2C%20trained%20on%20hidden%20states%20from%20layer%2028%2C%20showed%20a%20mean%20effect%20size%20of%20%2B0.471%20at%20zero%20measured%20inference%20overhead%3B%20its%20strongest%20probe%20result%20achieved%20cross-validated%20AUROC%200.840%20on%20a%20small%20proxy-labeled%20dataset.%20A%20key%20empirical%20finding%20is%20that%20companion%20benefit%20appears%20task-type%20dependent%3A%20companions%20are%20most%20helpful%20on%20loop-prone%20and%20open-ended%20tasks%2C%20while%20effects%20are%20neutral%20or%20negative%20on%20more%20structured%20tasks.%20Our%20small-model%20experiments%20also%20suggest%20a%20possible%20scale%20boundary%3A%20companions%20did%20not%20improve%20the%20measured%20quality%20proxy%20on%201B-1.5B%20models%2C%20even%20when%20interventions%20fired.%20Overall%2C%20the%20paper%20should%20be%20read%20as%20a%20feasibility%20study%20rather%20than%20a%20definitive%20validation.%20The%20results%20provide%20encouraging%20evidence%20that%20sub-token%20monitoring%20may%20be%20useful%2C%20identify%20task-type%20sensitivity%20as%20a%20practical%20design%20constraint%2C%20and%20motivate%20selective%20companion%20activation%20as%20a%20promising%20direction%20for%20future%20work.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13759v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520cognitive%2520companion%253A%2520a%2520lightweight%2520parallel%2520monitoring%2520architecture%2520for%2520detecting%2520and%2520recovering%2520from%2520reasoning%2520degradation%2520in%2520LLM%2520agents%26entry.906535625%3DRafflesia%2520Khan%2520and%2520Nafiul%2520Islam%2520Khan%26entry.1292438233%3DLarge%2520language%2520model%2520%2528LLM%2529%2520agents%2520on%2520multi-step%2520tasks%2520suffer%2520reasoning%2520degradation%252C%2520looping%252C%2520drift%252C%2520stuck%2520states%252C%2520at%2520rates%2520up%2520to%252030%2525%2520on%2520hard%2520tasks.%2520Current%2520solutions%2520include%2520hard%2520step%2520limits%2520%2528abrupt%2529%2520or%2520LLM-as-judge%2520monitoring%2520%252810-15%2525%2520overhead%2520per%2520step%2529.%2520This%2520paper%2520introduces%2520the%2520Cognitive%2520Companion%252C%2520a%2520parallel%2520monitoring%2520architecture%2520with%2520two%2520implementations%253A%2520an%2520LLM-based%2520Companion%2520and%2520a%2520novel%2520zero-overhead%2520Probe-based%2520Companion.%2520We%2520report%2520a%2520three-batch%2520feasibility%2520study%2520centered%2520on%2520Gemma%25204%2520E4B%252C%2520with%2520an%2520additional%2520exploratory%2520small-model%2520analysis%2520on%2520Qwen%25202.5%25201.5B%2520and%2520Llama%25203.2%25201B.%2520In%2520our%2520experiments%252C%2520the%2520LLM-based%2520Companion%2520reduced%2520repetition%2520on%2520loop-prone%2520tasks%2520by%252052-62%2525%2520with%2520approximately%252011%2525%2520overhead.%2520The%2520Probe-based%2520Companion%252C%2520trained%2520on%2520hidden%2520states%2520from%2520layer%252028%252C%2520showed%2520a%2520mean%2520effect%2520size%2520of%2520%252B0.471%2520at%2520zero%2520measured%2520inference%2520overhead%253B%2520its%2520strongest%2520probe%2520result%2520achieved%2520cross-validated%2520AUROC%25200.840%2520on%2520a%2520small%2520proxy-labeled%2520dataset.%2520A%2520key%2520empirical%2520finding%2520is%2520that%2520companion%2520benefit%2520appears%2520task-type%2520dependent%253A%2520companions%2520are%2520most%2520helpful%2520on%2520loop-prone%2520and%2520open-ended%2520tasks%252C%2520while%2520effects%2520are%2520neutral%2520or%2520negative%2520on%2520more%2520structured%2520tasks.%2520Our%2520small-model%2520experiments%2520also%2520suggest%2520a%2520possible%2520scale%2520boundary%253A%2520companions%2520did%2520not%2520improve%2520the%2520measured%2520quality%2520proxy%2520on%25201B-1.5B%2520models%252C%2520even%2520when%2520interventions%2520fired.%2520Overall%252C%2520the%2520paper%2520should%2520be%2520read%2520as%2520a%2520feasibility%2520study%2520rather%2520than%2520a%2520definitive%2520validation.%2520 {"title": "Democratising Pathology Co-Pilots: An Open Pipeline and Dataset for Whole-Slide Vision-Language Modelling", "author": "Sander Moonemans and Sebastiaan Ram and Fr\u00e9d\u00e9rique Meeuwsen and Carlijn Lems and Jeroen van der Laak and Geert Litjens and Francesco Ciompi", "abstract": "Vision-language models (VLMs) have the potential to become co-pilots for pathologists. However, most VLMs either focus on small regions of interest within whole-slide images, provide only static slide-level outputs, or rely on data that is not publicly available, limiting reproducibility. Furthermore, training data containing WSIs paired with detailed clinical reports is scarce, restricting progress toward transparent and generalisable VLMs. We address these limitations with three main contributions. First, we introduce Polysome, a standardised tool for synthetic instruction generation. Second, we apply Polysome to the public HISTAI dataset, generating HISTAI-Instruct, a large whole-slide instruction tuning dataset spanning 24,259 slides and over 1.1 million instruction-response pairs. Finally, we use HISTAI-Instruct to train ANTONI-\u03b1, a VLM capable of visual-question answering (VQA). We show that ANTONI-\u03b1 outperforms MedGemma on WSI-level VQA tasks of tissue identification, neoplasm detection, and differential diagnosis. We also compare the performance of multiple incarnations of ANTONI-\u03b1 trained with different amounts of data. All methods, data, and code are publicly available.", "link": "http://arxiv.org/abs/2512.17326v2", "date": "2026-04-15", "relevancy": 2.4822, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5058}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4917}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Unde {"title": "ClipGStream: Clip-Stream Gaussian Splatting for Any Length and Any Motion Multi-View Dynamic Scene Reconstruction", "author": "Jie Liang and Jiahao Wu and Chao Wang and Jiayu Yang and Xiaoyun Zheng and Kaiqiang Xiong and Zhanke Wang and Jinbo Yan and Feng Gao and Ronggang Wang", "abstract": "Dynamic 3D scene reconstruction is essential for immersive media such as VR, MR, and XR, yet remains challenging for long multi-view sequences with large-scale motion. Existing dynamic Gaussian approaches are either Frame-Stream, offering scalability but poor temporal stability, or Clip, achieving local consistency at the cost of high memory and limited sequence length. We propose ClipGStream, a hybrid reconstruction framework that performs stream optimization at the clip level rather than the frame level. The sequence is divided into short clips, where dynamic motion is modeled using clip-independent spatio-temporal fields and residual anchor compensation to capture local variations efficiently, while inter-clip inherited anchors and decoders maintain structural consistency across clips. This Clip-Stream design enables scalable, flicker-free reconstruction of long dynamic videos with high temporal coherence and reduced memory overhead. Extensive experiments demonstrate that ClipGStream achieves state-of-the-art reconstruction quality and efficiency. The project page is available at: https://liangjie1999.github.io/ClipGStreamWeb/", "link": "http://arxiv.org/abs/2604.13746v1", "date": "2026-04-15", "relevancy": 2.4785, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6362}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6294}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5535}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ClipGStream%3A%20Clip-Stream%20Gaussian%20Splatting%20for%20Any%20Length%20and%20Any%20Motion%20Multi-View%20Dynamic%20Scene%20Reconstruction&body=Title%3A%20ClipGStream%3A%20Clip-Stream%20Gaussian%20Splatting%20for%20Any%20Length%20and%20Any%20Motion%20Multi-View%20Dynamic%20Scene%20Reconstruction%0AAuthor%3A%20Jie%20Liang%20and%20Jiahao%20Wu%20and%20Chao%20Wang%20and%20Jiayu%20Yang%20and%20Xiaoyun%20Zheng%20and%20Kaiqiang%20Xiong%20and%20Zhanke%20Wang%20and%20Jinbo%20Yan%20and%20Feng%20Gao%20and%20Ronggang%20Wang%0AAbstract%3A%20Dynamic%203D%20scene%20reconstruction%20is%20essential%20for%20immersive%20media%20such%20as%20VR%2C%20MR%2C%20and%20XR%2C%20yet%20remains%20challenging%20for%20long%20multi-view%20sequences%20with%20large-scale%20motion.%20Existing%20dynamic%20Gaussian%20approaches%20are%20either%20Frame-Stream%2C%20offering%20scalability%20but%20poor%20temporal%20stability%2C%20or%20Clip%2C%20achieving%20local%20consistency%20at%20the%20cost%20of%20high%20memory%20and%20limited%20sequence%20length.%20We%20propose%20ClipGStream%2C%20a%20hybrid%20reconstruction%20framework%20that%20performs%20stream%20optimization%20at%20the%20clip%20level%20rather%20than%20the%20frame%20level.%20The%20sequence%20is%20divided%20into%20short%20clips%2C%20where%20dynamic%20motion%20is%20modeled%20using%20clip-independent%20spatio-temporal%20fields%20and%20residual%20anchor%20compensation%20to%20capture%20local%20variations%20efficiently%2C%20while%20inter-clip%20inherited%20anchors%20and%20decoders%20maintain%20structural%20consistency%20across%20clips.%20This%20Clip-Stream%20design%20enables%20scalable%2C%20flicker-free%20reconstruction%20of%20long%20dynamic%20videos%20with%20high%20temporal%20coherence%20and%20reduced%20memory%20overhead.%20Extensive%20experiments%20demonstrate%20that%20ClipGStream%20achieves%20state-of-the-art%20reconstruction%20quality%20and%20efficiency.%20The%20project%20page%20is%20available%20at%3A%20https%3A//liangjie1999.github.io/ClipGStreamWeb/%0ALink%3A%20http%3A//arxiv.org/abs/2604.13746v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DClipGStream%253A%2520Clip-Stream%2520Gaussian%2520Splatting%2520for%2520Any%2520Length%2520and%2520Any%2520Motion%2520Multi-View%2520Dynamic%2520Scene%2520Reconstruction%26entry.906535625%3DJie%2520Liang%2520and%2520Jiahao%2520Wu%2520and%2520Chao%2520Wang%2520and%2520Jiayu%2520Yang%2520and%2520Xiaoyun%2520Zheng%2520and%2520Kaiqiang%2520Xiong%2520and%2520Zhanke%2520Wang%2520and%2520Jinbo%2520Yan%2520and%2520Feng%2520Gao%2520and%2520Ronggang%2520Wang%26entry.1292438233%3DDynamic%25203D%2520scene%2520reconstruction%2520is%2520essential%2520for%2520immersive%2520media%2520such%2520as%2520VR%252C%2520MR%252C%2520and%2520XR%252C%2520yet%2520remains%2520challenging%2520for%2520long%2520multi-view%2520sequences%2520with%2520large-scale%2520motion.%2520Existing%2520dynamic%2520Gaussian%2520approaches%2520are%2520either%2520Frame-Stream%252C%2520offering%2520scalability%2520but%2520poor%2520temporal%2520stability%252C%2520or%2520Clip%252C%2520achieving%2520local%2520consistency%2520at%2520the%2520cost%2520of%2520high%2520memory%2520and%2520limited%2520sequence%2520length.%2520We%2520propose%2520ClipGStream%252C%2520a%2520hybrid%2520reconstruction%2520framework%2520that%2520performs%2520stream%2520optimization%2520at%2520the%2520clip%2520level%2520rather%2520than%2520the%2520frame%2520level.%2520The%2520sequence%2520is%2520divided%2520into%2520short%2520clips%252C%2520where%2520dynamic%2520motion%2520is%2520modeled%2520using%2520clip-independent%2520spatio-temporal%2520fields%2520and%2520residual%2520anchor%2520compensation%2520to%2520capture%2520local%2520variations%2520efficiently%252C%2520while%2520inter-clip%2520inherited%2520anchors%2520and%2520decoders%2520maintain%2520structural%2520consistency%2520across {"title": "Geometric Context Transformer for Streaming 3D Reconstruction", "author": "Lin-Zhuo Chen and Jian Gao and Yihang Chen and Ka Leong Cheng and Yipengjing Sun and Liangxiao Hu and Nan Xue and Xing Zhu and Yujun Shen and Yao Yao and Yinghao Xu", "abstract": "Streaming 3D reconstruction aims to recover 3D information, such as camera poses and point clouds, from a video stream, which necessitates geometric accuracy, temporal\n  consistency, and computational efficiency. Motivated by the principles of Simultaneous Localization and Mapping (SLAM), we introduce LingBot-Map, a feed-forward 3D foundation\n  model for reconstructing scenes from streaming data, built upon a geometric context transformer (GCT) architecture. A defining aspect of LingBot-Map lies in its carefully\n  designed attention mechanism, which integrates an anchor context, a pose-reference window, and a trajectory memory to address coordinate grounding, dense geometric cues, and\n  long-range drift correction, respectively. This design keeps the streaming state compact while retaining rich geometric context, enabling stable efficient inference at around\n  20 FPS on 518 x 378 resolution inputs over long sequences exceeding 10,000 frames. Extensive evaluations across a variety of benchmarks demonstrate that our approach\n  achieves superior performance compared to both existing streaming and iterative optimization-based approaches.", "link": "http://arxiv.org/abs/2604.14141v1", "date": "2026-04-15", "relevancy": 2.4738, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6381}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6077}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6031}], "mailto" {"title": "Artificial intelligence application in lymphoma diagnosis with Vision Transformer using weakly supervised training", "author": " Nghia and  Nguyen and Amer Wahed and Andy Quesada and Yasir Ali and Hanadi El Achi and Y. Helen Zhang and Jocelyn Ursua and Alex Banerjee and Sahib Kalra and L. Jeffrey Medeiros and Jie Xu", "abstract": "Vision transformers (ViT) have been shown to allow for more flexible feature detection and can outperform convolutional neural network (CNN) when pre-trained on sufficient data. Due to their promising feature detection capabilities, we deployed ViTs for morphological classification of anaplastic large cell lymphoma (ALCL) versus classic Hodgkin lymphoma (cHL). We had previously designed a ViT model which was trained on a small dataset of 1,200 image patches in fully supervised training. That model achieved a diagnostic accuracy of 100% and an F1 score of 1.0 on the independent test set. Since fully supervised training is not a practical method due to lack of expertise resources in both the training and testing phases, we conducted a recent study on a modified approach to training data (weakly supervised training) and show that labeling training image patch automatically at the slide level of each whole-slide-image is a more practical solution for clinical use of Vision Transformer. Our ViT model, trained on a larger dataset of 100,000 image patches, yields evaluation metrics with significant accuracy, F1 score, and area under the curve (AUC) at 91.85%, 0.92, and 0.98, respectively. These are respectable values that qualify this ViT model, with weakly supervised training, as a suitable tool for a deep learning module in clinical model development using automated image patch extraction.", "link": "http://arxiv.org/abs/2604.13795v1", "date": "2026-04-15", "relevancy": 2.4495, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5257}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4737}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4703}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Artificial%20intelligence%20application%20in%20lymphoma%20diagnosis%20with%20Vision%20Transformer%20using%20weakly%20supervised%20training&body=Title%3A%20Artificial%20intelligence%20application%20in%20lymphoma%20diagnosis%20with%20Vision%20Transformer%20using%20weakly%20supervised%20training%0AAuthor%3A%20%20Nghia%20and%20%20Nguyen%20and%20Amer%20Wahed%20and%20Andy%20Quesada%20and%20Yasir%20Ali%20and%20Hanadi%20El%20Achi%20and%20Y.%20Helen%20Zhang%20and%20Jocelyn%20Ursua%20and%20Alex%20Banerjee%20and%20Sahib%20Kalra%20and%20L.%20Jeffrey%20Medeiros%20and%20Jie%20Xu%0AAbstract%3A%20Vision%20transformers%20%28ViT%29%20have%20been%20shown%20to%20allow%20for%20more%20flexible%20feature%20detection%20and%20can%20outperform%20convolutional%20neural%20network%20%28CNN%29%20when%20pre-trained%20on%20sufficient%20data.%20Due%20to%20their%20promising%20feature%20detection%20capabilities%2C%20we%20deployed%20ViTs%20for%20morphological%20classification%20of%20anaplastic%20large%20cell%20lymphoma%20%28ALCL%29%20versus%20classic%20Hodgkin%20lymphoma%20%28cHL%29.%20We%20had%20previously%20designed%20a%20ViT%20model%20which%20was%20trained%20on%20a%20small%20dataset%20of%201%2C200%20image%20patches%20in%20fully%20supervised%20training.%20That%20model%20achieved%20a%20diagnostic%20accuracy%20of%20100%25%20and%20an%20F1%20score%20of%201.0%20on%20the%20independent%20test%20set.%20Since%20fully%20supervised%20training%20is%20not%20a%20practical%20method%20due%20to%20lack%20of%20expertise%20resources%20in%20both%20the%20training%20and%20testing%20phases%2C%20we%20conducted%20a%20recent%20study%20on%20a%20modified%20approach%20to%20training%20data%20%28weakly%20supervised%20training%29%20and%20show%20that%20labeling%20training%20image%20patch%20automatically%20at%20the%20slide%20level%20of%20each%20whole-slide-image%20is%20a%20more%20practical%20solution%20for%20clinical%20use%20of%20Vision%20Transformer.%20Our%20ViT%20model%2C%20trained%20on%20a%20larger%20dataset%20of%20100%2C000%20image%20patches%2C%20yields%20evaluation%20metrics%20with%20significant%20accuracy%2C%20F1%20score%2C%20and%20area%20under%20the%20curve%20%28AUC%29%20at%2091.85%25%2C%200.92%2C%20and%200.98%2C%20respectively.%20These%20are%20respectable%20values%20that%20qualify%20this%20ViT%20model%2C%20with%20weakly%20supervised%20training%2C%20as%20a%20suitable%20tool%20for%20a%20deep%20learning%20module%20in%20clinical%20model%20development%20using%20automated%20image%20patch%20extraction.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13795v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DArtificial%2520intelligence%2520application%2520in%2520lymphoma%2520diagnosis%2520with%2520Vision%2520Transformer%2520using%2520weakly%2520supervised%2520training%26entry.906535625%3D%2520Nghia%2520and%2520%2520Nguyen%2520and%2520Amer%2520Wahed%2520and%2520Andy%2520Quesada%2520and%2520Yasir%2520Ali%2520and%2520Hanadi%2520El%2520Achi%2520and%2520Y.%2520Helen%2520Zhang%2520and%2520Jocelyn%2520Ursua%2520and%2520Alex%2520Banerjee%2520and%2520Sahib%2520Kalra%2520and%2520L.%2520Jeffrey%2520Medeiros%2520and%2520Jie%2520Xu%26entry.1292438233%3DVision%2520transformers%2520%2528ViT%2529%2520have%2520been%2520shown%2520to%2520allow%2520for%2520more%2520flexible%2520feature%2520detection%2520and%2520can%2520outperform%2520convolutional%2520neural%2520network%2520%2528CNN%2529%2520when%2520pre-trained%2520on%2520sufficient%2520data.%2520Due%2520to%2520their%2520promising%2520feature%2520detection%2520capabilities%252C%2520we%2520deployed%2520ViTs% {"title": "3D Instruction Ambiguity Detection", "author": "Jiayu Ding and Haoran Tang and Hongbo Jin and Wei Gao and Ge Li", "abstract": "In safety-critical domains, linguistic ambiguity can have severe consequences; a vague command like \"Pass me the vial\" in a surgical setting could lead to catastrophic errors. Yet, most embodied AI research overlooks this, assuming instructions are clear and focusing on execution rather than confirmation. To address this critical safety gap, we are the first to define 3D Instruction Ambiguity Detection, a fundamental new task where a model must determine if a command has a single, unambiguous meaning within a given 3D scene. To support this research, we build Ambi3D, the large-scale benchmark for this task, featuring over 700 diverse 3D scenes and around 22k instructions. Our analysis reveals a surprising limitation: state-of-the-art 3D Large Language Models (LLMs) struggle to reliably determine if an instruction is ambiguous. To address this challenge, we propose AmbiVer, a two-stage framework that collects explicit visual evidence from multiple views and uses it to guide an vision-language model (VLM) in judging instruction ambiguity. Extensive experiments demonstrate the challenge of our task and the effectiveness of AmbiVer, paving the way for safer and more trustworthy embodied AI. Code and dataset available at https://jiayuding031020.github.io/ambi3d/.", "link": "http://arxiv.org/abs/2601.05991v2", "date": "2026-04-15", "relevancy": 2.4415, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.635}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6054}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6054}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%203D%20Instruction%20Ambiguity%20Detection&body=Title%3A%203D%20Instruction%20Ambiguity%20Detection%0AAuthor%3A%20Jiayu%20Ding%20and%20Haoran%20Tang%20and%20Hongbo%20Jin%20and%20Wei%20Gao%20and%20Ge%20Li%0AAbstract%3A%20In%20safety-critical%20domains%2C%20linguistic%20ambiguity%20can%20have%20severe%20consequences%3B%20a%20vague%20command%20like%20%22Pass%20me%20the%20vial%22%20in%20a%20surgical%20setting%20could%20lead%20to%20catastrophic%20errors.%20Yet%2C%20most%20embodied%20AI%20research%20overlooks%20this%2C%20assuming%20instructions%20are%20clear%20and%20focusing%20on%20execution%20rather%20than%20confirmation.%20To%20address%20this%20critical%20safety%20gap%2C%20we%20are%20the%20first%20to%20define%203D%20Instruction%20Ambiguity%20Detection%2C%20a%20fundamental%20new%20task%20where%20a%20model%20must%20determine%20if%20a%20command%20has%20a%20single%2C%20unambiguous%20meaning%20within%20a%20given%203D%20scene.%20To%20support%20this%20research%2C%20we%20build%20Ambi3D%2C%20the%20large-scale%20benchmark%20for%20this%20task%2C%20featuring%20over%20700%20diverse%203D%20scenes%20and%20around%2022k%20instructions.%20Our%20analysis%20reveals%20a%20surprising%20limitation%3A%20state-of-the-art%203D%20Large%20Language%20Models%20%28LLMs%29%20struggle%20to%20reliably%20determine%20if%20an%20instruction%20is%20ambiguous.%20To%20address%20this%20challenge%2C%20we%20propose%20AmbiVer%2C%20a%20two-stage%20framework%20that%20collects%20explicit%20visual%20evidence%20from%20multiple%20views%20and%20uses%20it%20to%20guide%20an%20vision-language%20model%20%28VLM%29%20in%20judging%20instruction%20ambiguity.%20Extensive%20experiments%20demonstrate%20the%20challenge%20of%20our%20task%20and%20the%20effectiveness%20of%20AmbiVer%2C%20paving%20the%20way%20for%20safer%20and%20more%20trustworthy%20embodied%20AI.%20Code%20and%20dataset%20available%20at%20https%3A//jiayuding031020.github.io/ambi3d/.%0ALink%3A%2 {"title": "DocSeeker: Structured Visual Reasoning with Evidence Grounding for Long Document Understanding", "author": "Hao Yan and Yuliang Liu and Xingchen Liu and Yuyi Zhang and Minghui Liao and Jihao Wu and Wei Chen and Xiang Bai", "abstract": "Existing Multimodal Large Language Models (MLLMs) suffer from significant performance degradation on the long document understanding task as document length increases. This stems from two fundamental challenges: 1) a low Signal-to-Noise Ratio (SNR), with crucial evidence buried in irrelevant pages; and 2) supervision scarcity, as datasets offering only final short answers provide a weak learning signal. In this paper, we address these challenges by proposing a paradigm that requires the model to execute a structured Analysis, Localization and Reasoning workflow. To instill this capability, we design a two-stage training framework: we first perform Supervised Fine-Tuning on high-quality data generated via an efficient knowledge distillation strategy. Subsequently, we employ an Evidence-aware Group Relative Policy Optimization which jointly optimizes for both evidence localization and answer accuracy. Additionally, we introduce a Evidence-Guided Resolution Allocation strategy to mitigate memory constraints of training on multi-pages documents. Extensive experiments demonstrate that DocSeeker achieves superior performance on both in-domain and out-of-domain tasks. We show it robustly generalizes from short-page training to ultra-long documents and is naturally synergistic with visual Retrieval-Augmented Generation systems, serving as a solid foundation for their implementation.", "link": "http://arxiv.org/abs/2604.12812v2", "date": "2026-04-15", "relevancy": 2.4283, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6089}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6089}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5981}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DocSeeker%3A%20Structured%20Visual%20Reasoning%20with%20Evidence%20Grounding%20for%20Long%20Document%20Understanding&body=Title%3A%20DocSeeker%3A%20Structured%20Visual%20Reasoning%20with%20Evidence%20Grounding%20for%20Long%20Document%20Understanding%0AAuthor%3A%20Hao%20Yan%20and%20Yuliang%20Liu%20and%20Xingchen%20Liu%20and%20Yuyi%20Zhang%20and%20Minghui%20Liao%20and%20Jihao%20Wu%20and%20Wei%20Chen%20and%20Xiang%20Bai%0AAbstract%3A%20Existing%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20suffer%20from%20significant%20performance%20degradation%20on%20the%20long%20document%20understanding%20task%20as%20document%20length%20increases.%20This%20stems%20from%20two%20fundamental%20challenges%3A%201%29%20a%20low%20Signal-to-Noise%20Ratio%20%28SNR%29%2C%20with%20crucial%20evidence%20buried%20in%20irrelevant%20pages%3B%20and%202%29%20supervision%20scarcity%2C%20as%20datasets%20offering%20only%20final%20short%20answers%20provide%20a%20weak%20learning%20signal.%20In%20this%20paper%2C%20we%20address%20these%20challenges%20by%20proposing%20a%20paradigm%20that%20requires%20the%20model%20to%20execute%20a%20structured%20Analysis%2C%20Localization%20and%20Reasoning%20workflow.%20To%20instill%20this%20capability%2C%20we%20design%20a%20two-stage%20training%20framework%3A%20we%20first%20perform%20Supervised%20Fine-Tuning%20on%20high-quality%20data%20generated%20via%20an%20efficient%20knowledge%20distillation%20strategy.%20Subsequently%2C%20we%20employ%20an%20Evidence-aware%20Group%20Relative%20Policy%20Optimization%20which%20jointly%20optimizes%20for%20both%20evidence%20localization%20and%20answer%20accuracy.%20Additionally%2C%20we%20introduce%20a%20Evidence-Guided%20Resolution%20Allocation%20strategy%20to%20mitigate%20memory%20constraints%20of%20training%20on%20multi-pages%20documents.%20Extensive%20experiments%20demonstrate%20that%20DocSeeker%20achieves%20superior%20performance%20on%20both%20in-domain%20and%20out-of-domain%20tasks.%20We%20show%20it%20robustly%20generalizes%20from%20short-page%20training%20to%20ultra-long%20documents%20and%20is%20naturally%20synergistic%20with%20visual%20Retrieval-Augmented%20Generation%20systems%2C%20serving%20as%20a%20solid%20foundation%20for%20their%20implementation.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12812v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDocSeeker%253A%2520Structured%2520Visual%2520Reasoning%2520with%2520Evidence%2520Grounding%2520for%2520Long%2520Document%2520Understanding%26entry.906535625%3DHao%2520Yan%2520and%2520Yuliang%2520Liu%2520and%2520Xingchen%2520Liu%2520and%2520Yuyi%2520Zhang%2520and%2520Minghui%2520Liao%2520and%2520Jihao%2520Wu%2520and%2520Wei%2520Chen%2520and%2520Xiang%2520Bai%26entry.1292438233%3DExisting%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520suffer%2520from%2520significant%2520performance%2520degradation%2520on%2520the%2520long%2520document%2520understanding%2520task%2520as%2520document%2520length%2520increases.%2520This%2520stems%2520from%2520two%2520fundamental%2520challenges%253A%25201%2529%2520a%2520low%2520Signal-to-Noise%2520Ratio%2520%2528SNR%2529%252C%2520with%2520crucial%2520evidence%2520buried%2520in%2520irrelevant%2520pages%253B%2520and%25202%2529%2520supervision%2520scarcity%252C%2520as%2520datasets%2520offering%2520only%2520final%2520short%2520answers%2520provide%2520a%2520weak%2520learning%2520signal.%2520In%2520this%2520paper%252C%2520we%2520address%2520these%2520challenges%2520by%2520proposing%2520a%2520paradigm%2520that%2520requires%2520the%2520model%2520to%2520execute%2520a%2520structured%2520Analysis%252C%2520Localization

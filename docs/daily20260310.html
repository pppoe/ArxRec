{"title": "Sign Identifiability of Causal Effects in Stationary Stochastic Dynamical Systems", "author": "Gijs van Seeventer and Saber Salehkaleybar", "abstract": "We study identifiability in continuous-time linear stationary stochastic differential equations with known causal structure. Unlike existing approaches, we relax the assumption of a known diffusion matrix, thereby respecting the model's intrinsic scale invariance. Rather than recovering drift coefficients themselves, we introduce edge-sign identifiability: for a given causal structure, we ask whether the sign of a given drift entry is uniquely determined across all observational covariance matrices induced by parametrizations compatible with that structure. Under a notion of faithfulness, we derive criteria for characterising identifiability, non-identifiability, and partial identifiability for general graphs. Applying our criteria to specific causal structures, both analogous to classical causal settings (e.g., instrumental variables) and novel cyclic settings, we determine their edge-sign identifiability and, in some cases, obtain explicit expressions for the sign of a target edge in terms of the observational covariance matrix.", "link": "http://arxiv.org/abs/2603.08311v1", "date": "2026-03-09", "relevancy": 1.5993, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.422}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.3902}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.3684}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sign%20Identifiability%20of%20Causal%20Effects%20in%20S enter%20and%20Saber%20Salehkaleybar&entry.1292438233=We%20study%20identifiability%20in%20continuous-time%20linear%20stationary%20stochastic%20differential%20equations%20with%20known%20causal%20structure.%20Unlike%20existing%20approaches%2C%20we%20relax%20the%20assumption%20of%20a%20known%20diffusion%20matrix%2C%20thereby%20respecting%20the%20model%27s%20intrinsic%20scale%20invariance.%20Rather%20than%20recovering%20drift%20coefficients%20themselves%2C%20we%20introduce%20edge-sign%20identifiability%3A%20for%20a%20given%20causal%20structure%2C%20we%20ask%20whether%20the%20sign%20of%20a%20given%20drift%20entry%20is%20uniquely%20determined%20across%20all%20observational%20covariance%20matrices%20induced%20by%20parametrizations%20compatible%20with%20that%20structure.%20Under%20a%20notion%20of%20faithfulness%2C%20we%20derive%20criteria%20for%20characterising%20identifiability%2C%20non-identifiability%2C%20and%20partial%20identifiability%20for%20general%20graphs.%20Applying%20our%20criteria%20to%20specific%20causal%20structures%2C%20both%20analogous%20to%20classical%20causal%20settings%20%28e.g.%2C%20instrumental%20variables%29%20and%20novel%20cyclic%20settings%2C%20we%20determine%20their%20edge-sign%20identifiability%20and%2C%20in%20some%20cases%2C%20obtain%20explicit%20expressions%20for%20the%20sign%20of%20a%20target%20edge%20in%20terms%20of%20the%20observational%20covariance%20matrix.&entry.1838667208=http%3A//arxiv.org/abs/2603.08311v1&entry.124074799=Read"},
{"title": "Autoregressive Visual Decoding from EEG Signals", "author": "Sicheng Dai and Hongwang Xiao and Shan Yu and Qiwei Ye", "abstract": "Electroencephalogram (EEG) signals have become a popular medium for decoding visual information due to their cost-effectiveness and high temporal resolution. However, current approaches face significant challenges in bridging the modality gap between EEG and image data. These methods typically rely on complex adaptation processes involving multiple stages, making it hard to maintain consistency and manage compounding errors. Furthermore, the computational overhead imposed by large-scale diffusion models limit their practicality in real-world brain-computer interface (BCI) applications. In this work, we present AVDE, a lightweight and efficient framework for visual decoding from EEG signals. First, we leverage LaBraM, a pre-trained EEG model, and fine-tune it via contrastive learning to align EEG and image representations. Second, we adopt an autoregressive generative framework based on a \"next-scale prediction\" strategy: images are encoded into multi-scale token maps using a pre-trained VQ-VAE, and a transformer is trained to autoregressively predict finer-scale tokens starting from EEG embeddings as the coarsest representation. This design enables coherent generation while preserving a direct connection between the input EEG signals and the reconstructed images. Experiments on two datasets show that AVDE outperforms previous state-of-the-art methods in both image retrieval and reconstruction tasks, while using only 10% of the parameters. In addition, visualization of intermediate outputs shows that the generative process of AVDE reflects the hierarchical nature of human visual perception. These results highlight the potential of autoregressive models as efficient and interpretable tools for practical BCI applications.", "link": "http://arxiv.org/abs/2602.22555v2", "date": "2026-03-09", "relevancy": 2.2188, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5558}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5558}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5493}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Autoregressive%20Visual%20Decoding%20from%20EEG%20Signals&body=Title%3A%20Autoregressive%20Visual%20Decoding%20from%20EEG%20Signals%0AAuthor%3A%20Sicheng%20Dai%20and%20Hongwang%20Xiao%20and%20Shan%20Yu%20and%20Qiwei%20Ye%0AAbstract%3A%20Electroencephalogram%20%28EEG%29%20signals%20have%20become%20a%20popular%20medium%20for%20decoding%20visual%20information%20due%20to%20their%20cost-effectiveness%20and%20high%20temporal%20resolution.%20However%2C%20current%20approaches%20face%20significant%20challenges%20in%20bridging%20the%20modality%20gap%20between%20EEG%20and%20image%20data.%20These%20methods%20typically%20rely%20on%20complex%20adaptation%20processes%20involving%20multiple%20stages%2C%20making%20it%20hard%20to%20maintain%20consistency%20and%20manage%20compounding%20errors.%20Furthermore%2C%20the%20computational%20overhead%20imposed%20by%20large-scale%20diffusion%20models%20limit%20their%20practicality%20in%20real-world%20brain-computer%20interface%20%28BCI%29%20applications.%20In%20this%20work%2C%20we%20present%20AVDE%2C%20a%20lightweight%20and%20efficient%20framework%20for%20visual%20decoding%20from%20EEG%20signals.%20First%2C%20we%20leverage%20LaBraM%2C%20a%20pre-trained%20EEG%20model%2C%20and%20fine-tune%20it%20via%20contrastive%20learning%20to%20align%20EEG%20and%20image%20representations.%20Second%2C%20we%20adopt%20an%20autoregressive%20generative%20framework%20based%20on%20a%20%22next-scale%20prediction%22%20strategy%3A%20images%20are%20encoded%20into%20multi-scale%20token%20maps%20using%20a%20pre-trained%20VQ-VAE%2C%20and%20a%20transformer%20is%20trained%20to%20autoregressively%20predict%20finer-scale%20tokens%20starting%20from%20EEG%20embeddings%20as%20the%20coarsest%20representation.%20This%20design%20enables%20coherent%20generation%20while%20preserving%20a%20direct%20connection%20between%20the%20input%20EEG%20signals%20and%20the%20reconstructed%20images.%20Experiments%20on%20two%20datasets%20show%20that%20AVDE%20outperforms%20previous%20state-of-the-art%20methods%20in%20both%20image%20retrieval%20and%20reconstruction%20tasks%2C%20while%20using%20only%2010%25%20of%20the%20parameters.%20In%20addition%2C%20visualization%20of%20intermediate%20outputs%20shows%20that%20the%20generative%20process%20of%20AVDE%20reflects%20the%20hierarchical%20nature%20of%20human%20visual%20perception.%20These%20results%20highlight%20the%20potential%20of%20autoregressive%20models%20as%20efficient%20and%20interpretable%20tools%20for%20practical%20BCI%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2602.22555v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAutoregressive%2520Visual%2520Decoding%2520from%2520EEG%2520Signals%26entry.906535625%3DSicheng%2520Dai%2520and%2520Hongwang%2520Xiao%2520and%2520Shan%2520Yu%2520and%2520Qiwei%2520Ye%26entry.1292438233%3DElectroencephalogram%2520%2528EEG%2529%2520signals%2520have%2520become%2520a%2520popular%2520medium%2520for%2520decoding%2520visual%2520information%2520due%2520to%2520their%2520cost-effectiveness%2520and%2520high%2520temporal%2520resolution.%2520However%252C%2520current%2520approaches%2520face%2520significant%2520challenges%2520in%2520bridging%2520the%2520modality%2520gap%2520between%2520EEG%2520and%2520image%2520data.%2520These%2520methods%2520typically%2520rely%2520on%2520complex%2520adaptation%2520processes%2520involving%2520multiple%2520stages%252C%2520making%2520it% e%2520results%2520highlight%2520the%2520potential%2520of%2520autoregressive%2520models%2520as%2520efficient%2520and%2520interpretable%2520tools%2520for%2520practical%2520BCI%2520applications.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.22555v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Autoregressive%20Visual%20Decoding%20from%20EEG%20Signals&entry.906535625=Sicheng%20Dai%20and%20Hongwang%20Xiao%20and%20Shan%20Yu%20and%20Qiwei%20Ye&entry.1292438233=Electroencephalogram%20%28EEG%29%20signals%20have%20become%20a%20popular%20medium%20for%20decoding%20visual%20information%20due%20to%20their%20cost-effectiveness%20and%20high%20temporal%20resolution.%20However%2C%20current%20approaches%20face%20significant%20challenges%20in%20bridging%20the%20modality%20gap%20between%20EEG%20and%20image%20data.%20These%20methods%20typically%20rely%20on%20complex%20adaptation%20processes%20involving%20multiple%20stages%2C%20making%20it%20hard%20to%20maintain%20consistency%20and%20manage%20compounding%20errors.%20Furthermore%2C%20the%20computational%20overhead%20imposed%20by%20large-scale%20diffusion%20models%20limit%20their%20practicality%20in%20real-world%20brain-computer%20interface%20%28BCI%29%20applications.%20In%20this%20work%2C%20we%20present%20AVDE%2C%20a%20lightweight%20and%20efficient%20framework%20for%20visual%20decoding%20from%20EEG%20signals.%20First%2C%20we%20leverage%20LaBraM%2C%20a%20pre-trained%20EEG%20model%2C%20and%20fine-tune%20it%20via%20contrastive%20learning%20to%20align%20EEG%20and%20image%20representations.%20Second%2C%20we%20adopt%20an%20autoregressive%20generative%20framework%20based%20on%20a%20%22next-scale%20prediction%22%20strategy%3A%20images%20are%20encoded%20into%20multi-scale%20token%20maps%20using%20a%20pre-trained%20VQ-VAE%2C%20and%20a%20transformer%20is%20trained%20to%20autoregressively%20predict%20finer-scale%20tokens%20starting%20from%20 {"title": "AULLM++: Structural Reasoning with Large Language Models for Micro-Expression Recognition", "author": "Zhishu Liu and Kaishen Yuan and Bo Zhao and Hui Ma and Zitong Yu", "abstract": "Micro-expression Action Unit (AU) detection identifies localized AUs from subtle facial muscle activations, providing a foundation for decoding affective cues. Previous methods face three key limitations: (1) heavy reliance on low-density visual information, rendering discriminative evidence vulnerable to background noise; (2) coarse-grained feature processing that misaligns with the demand for fine-grained representations; and (3) neglect of inter-AU correlations, restricting the parsing of complex expression patterns. We propose AULLM++, a reasoning-oriented framework leveraging Large Language Models (LLMs), which injects visual features into textual prompts as actionable semantic premises to guide inference. It formulates AU prediction into three stages: evidence construction, structure modeling, and deduction-based prediction. Specifically, a Multi-Granularity Evidence-Enhanced Fusion Projector (MGE-EFP) fuses mid-level texture cues with high-level semantics, distilling them into a compact Content Token (CT). Furthermore, inspired by micro- and macro-expression AU correspondence, we encode AU relationships as a sparse structural prior and learn interaction strengths via a Relation-Aware AU Graph Neural Network (R-AUGNN), producing an Instruction Token (IT). We then fuse CT and IT into a structured textual prompt and introduce Counterfactual Consistency Regularization (CCR) to construct counterfactual samples, enhancing the model's generalization. Extensive experiments demonstrate AULLM++ achieves state-of-the-art performance on standard benchmarks and exhibits superior cross-domain generalization.", "link": "http://arxiv.org/abs/2603.08387v1", "date": "2026-03-09", "relevancy": 2.127, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5453}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.529}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.529}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AULLM%2B%2B%3A%20Structural%20Reasoning%20with%20Large%20Language%20Models%20for%20Micro-Expression%20Recognition&body=Title%3A%20AULLM%2B%2B%3A%20Structural%20Reasoning%20with%20Large%20Language%20Models%20for%20Micro-Expression%20Recognition%0AAuthor%3A%20Zhishu%20Liu%20and%20Kaishen%20Yuan%20and%20Bo%20Zhao%20and%20Hui%20Ma%20and%20Zitong%20Yu%0AAbstract%3A%20Micro-expression%20Action%20Unit%20%28AU%29%20detection%20identifies%20localized%20AUs%20from%20subtle%20facial%20muscle%20activations%2C%20providing%20a%20foundation%20for%20decoding%20affective%20cues.%20Previous%20methods%20face%20three%20key%20limitations%3A%20%281%29%20heavy%20reliance%20on%20low-density%20visual%20information%2C%20rendering%20discriminative%20evidence%20vulnerable%20to%20background%20noise%3B%20%282%29%20coarse-grained%20feature%20processing%20that%20misaligns%20with%20the%20demand%20for%20fine-grained%20representations%3B%20and%20%283%29%20neglect%20of%20inter-AU%20correlations%2C%20restricting%20the%20parsing%20of%20complex%20expression%20patterns.%20We%20propose%20AULLM%2B%2B%2C%20a%20reasoning-oriented%20framework%20leveraging%20Large%20Language%20Models%20%28LLMs%29%2C%20which%20injects%20visual%20features%20into%20textual%20prompts%20as%20actionable%20semantic%20premises%20to%20guide%20inference.%20It%20formulates%20AU%20prediction%20into%20three%20stages%3A%20evidence%20construction%2C%20structure%20modeling%2C%20and%20deduction-based%20prediction.%20Specifically%2C%20a%20Multi-Granularity%20Evidence-Enhanced%20Fusion%20Projector%20%28MGE-EFP%29%20fuses%20mid-level%20texture%20cues%20with%20high-level%20semantics%2C%20distilling%20them%20into%20a%20compact%20Content%20Token%20%28CT%29.%20Furthermore%2C%20inspired%20by%20micro-%20and%20macro-expression%20AU%20correspondence%2C%20we%20encode%20AU%20relationships%20as%20a%20sparse%20structural%20prior%20and%20learn%20interaction%20strengths%20via%20a%20Relation-Aware%20AU%20Graph%20Neural%20Network%20%28R-AUGNN%29%2C%20producing%20an%20Instruction%20Token%20%28IT%29.%20We%20then%20fuse%20CT%20and%20IT%20into%20a%20structured%20textual%20prompt%20and%20introduce%20Counterfactual%20Consistency%20Regularization%20%28CCR%29%20to%20construct%20counterfactual%20samples%2C%20enhancing%20the%20model%27s%20generalization.%20Extensive%20experiments%20demonstrate%20AULLM%2B%2B%20achieves%20state-of-the-art%20performance%20on%20standard%20benchmarks%20and%20exhibits%20superior%20cross-domain%20generalization.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08387v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAULLM%252B%252B%253A%2520Structural%2520Reasoning%2520with%2520Large%2520Language%2520Models%2520for%2520Micro-Expression%2520Recognition%26entry.906535625%3DZhishu%2520Liu%2520and%2520Kaishen%2520Yuan%2520and%2520Bo%2520Zhao%2520and%2520Hui%2520Ma%2520and%2520Zitong%2520Yu%26entry.1292438233%3DMicro-expression%2520Action%2520Unit%2520%2528AU%2529%2520detection%2520identifies%2520localized%2520AUs%2520from%2520subtle%2520facial%2520muscle%2520activations%252C%2520providing%2520a%2520foundation%2520for%2520decoding%2520affective%2520cues.%2520Previous%2520methods%2520face%2520three%2520key%2520limitations%253A%2520%25281%2529%2520heavy%2520reliance%2520on%2520low-density%2520visual%2520information%252C%2520rendering%2520discriminative%2520evidence%2520vulnerable%2520to%2520background%2520noise%253B%2520%25282%2529%2520coarse-grained%2520feature%2520processing%2520that%2520misaligns%2520with%2520the%2520demand%2520for%2520fine-grained%2520representations%253B%2520and%2520%25283%2529%2520neglect%2520of%2520inter-AU%2520correlations%252C%2520restricting%2520the%2520parsing%2520of%2520complex%2520expression%2520patterns.%2520We%2520propose%2520AULLM%252B%252B%252C%2520a%2520reasoning-oriented%2520framework%2520leveraging%2520Large%2520Language%2520Models%2520%2528LLMs%2529%252C%2520which%2520injects%2520visual%2520features%2520into%2520textual%2520prompts%2520as%2520actionable%2520semantic%2520premises%2520to%2520guide%2520inference.%2520It%2520formulates%2520AU%2520prediction%2520into%2520three%2520stages%253A%2520evidence%2520construction%252C%2520structure%2520modeling%252C%2520and%2520deduction-based%2520prediction.%2520Specifically%252C%2520a%2520Multi-Granularity%2520Evidence-Enhanced%2520Fusion%2520Projector%2520%2528MGE-EFP%2529%2520fuses%2520mid-level%2520texture%2520cues%2520with%2520high-level%2520semantics%252C%2520distilling%2520them%2520into%2520a%2520compact%2520Content%2520Token%2520%2528CT%2529.%2520Furthermore%252C%2520inspired%2520by%2520micro-%2520and%2520macro-expression%2520AU%2520correspondence%252C%2520we%2520encode%2520AU%2520relationships%2520as%2520a%2520sparse%2520structural%2520prior%2520and%2520learn%2520interaction%2520strengths%2520via%2520a%2520Relation-Aware%2520AU%2520Graph%2520Neural%2520Network%2520%2528R-AUGNN%2529%252C%2520producing%2520an%2520Instruction%2520Token%2520%2528IT%2529.%2520We%2520then%2520fuse%2520CT%2520and%2520IT%2520into%2520a%2520structured%2520textual%2520prompt%2520and%2520introduce%2520Counterfactual%2520Consistency%2520Regularization%2520%2528CCR%2529%2520to%2520construct%2520counterfactual%2520samples%252C%2520enhancing%2520the%2520model%2527s%2520generalization.%2520Extensive%2520experiments%2520demonstrate%2520AULLM%252B%252B%2520achieves%2520state-of-the-art%2520performance%2520on%2520standard%2520benchmarks%2520and%2520exhibits%2520superior%2520cro {"title": "Noisy PDE Training Requires Bigger PINNs", "author": "Sebastien Andre-Sloan and Anirbit Mukherjee and Matthew Colbrook", "abstract": "Physics-Informed Neural Networks (PINNs) are increasingly used to approximate solutions of partial differential equations (PDEs), particularly in high dimensions. In real-world settings, data are often noisy, making it crucial to understand when a predictor can still achieve low empirical risk. Yet, little is known about the conditions under which a PINN can do so effectively. We analyse PINNs applied to the Hamilton--Jacobi--Bellman (HJB) PDE and establish a lower bound on the network size required for the supervised PINN empirical risk to fall below the variance of noisy supervision labels. Specifically, if a predictor achieves empirical risk $O(\u03b7)$ below $\u03c3^2$ (the variance of the supervision data), then necessarily $d_N\\log d_N\\gtrsim N_s \u03b7^2$, where $N_s$ is the number of samples and $d_N$ the number of trainable parameters. A similar constraint holds in the fully unsupervised PINN setting when boundary labels are noisy. Thus, simply increasing the number of noisy supervision labels does not offer a ``free lunch'' in reducing empirical risk. We also give empirical studies on the HJB PDE, the Poisson PDE and the the Navier-Stokes PDE set to produce the Taylor-Green solutions. In these experiments we demonstrate that PINNs indeed need to be beyond a threshold model size for them to train to errors below $\u03c3^2$. These results provide a quantitative foundation for understanding parameter requirements when training PINNs in the presence of noisy data.", "link": "http://arxiv.org/abs/2507.06967v2", "date": "2026-03-09", "relevancy": 1.8114, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4788}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4374}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4266}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Noisy%20PDE%20Training%20Requires%20Bigger%20PINNs&body=Title%3A%20Noisy%20PDE%20Training%20Requires%20Bigger%20PINNs%0AAuthor%3A%20Sebastien%20Andre-Sloan%20and%20Anirbit%20Mukherjee%20and%20Matthew%20Colbrook%0AAbstract%3A%20Physics-Informed%20Neural%20Networks%20%28PINNs%29%20are%20increasingly%20used%20to%20approximate%20solutions%20of%20partial%20differential%20equations%20%28PDEs%29%2C%20particularly%20in%20high%20dimensions.%20In%20real-world%20settings%2C%20data%20are%20often%20noisy%2C%20making%20it%20crucial%20to%20understand%20when%20a%20predictor%20can%20still%20achieve%20low%20empirical%20risk.%20Yet%2C%20little%20is%20known%20about%20the%20conditions%20under%20which%20a%20PINN%20can%20do%20so%20effectively.%20We%20analyse%20PINNs%20applied%20to%20the%20Hamilton--Jacobi--Bellman%20%28HJB%29%20PDE%20and%20establish%20a%20lower%20bound%20on%20the%20network%20size%20required%20for%20the%20supervised%20PINN%20empirical%20risk%20to%20fall%20below%20the%20variance%20of%20noisy%20supervision%20labels.%20Specifically%2C%20if%20a%20predictor%20achieves%20empirical%20risk%20%24O%28%CE%B7%29%24%20below%20%24%CF%83%5E2%24%20%28the%20variance%20of%20the%20supervision%20data%29%2C%20then%20necessarily%20%24d_N%5Clog%20d_N%5Cgtrsim%20N_s%20%CE%B7%5E2%24%2C%20where%20%24N_s%24%20is%20the%20number%20of%20samples%20and%20%24d_N%24%20the%20number%20of%20trainable%20parameters.%20A%20similar%20constraint%20holds%20in%20the%20fully%20unsupervised%20PINN%20setting%20when%20boundary%20labels%20are%20noisy.%20Thus%2C%20simply%20increasing%20the%20number%20of%20noisy%20supervision%20labels%20does%20not%20offer%20a%20%60%60free%20lunch%27%27%20in%20reducing%20empirical%20risk.%20We%2 {"title": "Revisiting Gradient Staleness: Evaluating Distance Metrics for Asynchronous Federated Learning Aggregation", "author": "Patrick Wilhelm and Odej Kao", "abstract": "In asynchronous federated learning (FL), client devices send updates to a central server at varying times based on their computational speed, often using stale versions of the global model. This staleness can degrade the convergence and accuracy of the global model. Previous work, such as AsyncFedED, proposed an adaptive aggregation method using Euclidean distance to measure staleness. In this paper, we extend this approach by exploring alternative distance metrics to more accurately capture the effect of gradient staleness. We integrate these metrics into the aggregation process and evaluate their impact on convergence speed, model performance, and training stability under heterogeneous clients and non-IID data settings. Our results demonstrate that certain metrics lead to more robust and efficient asynchronous FL training, offering a stronger foundation for practical deployment.", "link": "http://arxiv.org/abs/2603.08211v1", "date": "2026-03-09", "relevancy": 1.8503, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4754}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4551}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4491}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Revisiting%20Gradient%20Staleness%3A%20Evaluating%20Distance%20Metrics%20for%20Asynchronous%20Federated%20Learning%20Aggregation&body=Title%3A%20Revisiting%20Gradient%20Staleness%3A%20Evaluating%20Distance%20Metrics%20for%20Asynchronous%20Federated%20Learning%20Aggregation%0AAuthor%3A%20Patrick%20Wilhelm%20and%20Odej%20Kao%0AAbstract%3A%20In%20asynchronous%20federated%20learning%20%28FL%29%2C%20client%20devices%20send%20updates%20to%20a%20central%20server%20at%20varying%20times%20based%20on%20their%20computational%20speed%2C%20often%20using%20stale%20versions%20of%20the%20global%20model.%20This%20staleness%20can%20degrade%20the%20convergence%20and%20accuracy%20of%20the%20global%20model.%20Previous%20work%2C%20such%20as%20AsyncFedED%2C%20proposed%20an%20adaptive%20aggregation%20method%20using%20Euclidean%20distance%20to%20measure%20staleness.%20In%20this%20paper%2C%20we%20extend%20this%20approach%20by%20exploring%20alternative%20distance%20metrics%20to%20more%20accurately%20capture%20the%20effect%20of%20gradient%20staleness.%20We%20integrate%20these%20metrics%20into%20the%20aggregation%20process%20and%20evaluate%20their%20impact%20on%20convergence%20speed%2C%20model%20performance%2C%20and%20training%20stability%20under%20heterogeneous%20clients%20and%20non-IID%20data%20settings.%20Our%20results%20demonstrate%20that%20certain%20metrics%20lead%20to%20more%20robust%20and%20efficient%20asynchronous%20FL%20training%2C%20offering%20a%20stronger%20foundation%20for%20practical%20deployment.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08211v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRevisiting%2520Gradient%2520Staleness%253A%2520Evaluating%2520Distance%2520Metrics%2520for%2520Asynchronous%2520Federated%2520Learning%2520Aggregation%26entry.906535625%3DPatrick%2520Wilhelm%2520and%2520Odej%2520Kao%26entry.1292438233%3DIn%2520asynchronous%2520federated%2520learning%2520%2528FL%2529%252C%2520client%2520devices%2520send%2520updates%2520to%2520a%2520central%2520server%2520at%2520varying%2520times%2520based%2520on%2520their%2520computational%2520speed%252C%2520often%2520using%2520stale%2520versions%2520of%2520the%2520global%2520model.%2520This%2520staleness%2520can%2520degrade%2520the%2520convergence%2520and%2520accuracy%2520of%2520the%2520global%2520model.%2520Previous%2520work%252C%2520such%2520as%2520AsyncFedED%252C%2520proposed%2520an%2520adaptive%2520aggregation%2520method%2520using%2520Euclidean%2520distance%2520to%2520measure%2520staleness.%2520In%2520this%2520paper%252C%2520we%2520extend%2520this%2520approach%2520by%2520exploring%2520alternative%2520distance%2520metrics%2520to%2520more%2520accurately%2520capture%2520the%2520effect%2520of%2520gradient%2520staleness.%2520We%2520integrate%2520these%2520metrics%2520into%2520the%2520aggregation%2520process%2520and%2520evaluate%2520their%2520impact%2520on%2520convergence%2520speed%252C%2520model%2520performance%252C%2520and%2520training%2520stability%2520under%2520heterogeneous%2520clients%2520and%2520non-IID%2520data%2520settings.%2520Our%2520results%2520demonstrate%2520that%2520certain%2520metrics%2520lead%2520to%2520more%2520robust%2520and%2520efficient%2520asynchronous%2520FL%2520training%252C%2520offering%2520a%2520stronger%2520foundation%2520for%2520practical%2520deployment.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.08211v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Revisiting%20Gradient%20Staleness%3A%20Evaluating%20Distance%20Metrics%20for%20Asynchronous%20Federated%20Learning%20Aggregation&entry.906535625=Patrick%20Wilhelm%20and%20Odej%20Kao&entry.1292438233=In%20asynchronous%20federated%20learning%20%28FL%29%2C%20client%20devices%20send%20updates%20to%20a%20central%20server%20at%20varying%20times%20based%20on%20their%20computational%20speed%2C%20often%20using%20stale%20versions%20of%20the%20global%20model.%20This%20staleness%20can%20degrade%20the%20convergence%20and%20accuracy%20of%20the%20global%20model.%20Previous%20work%2C%20such%20as%20AsyncFedED%2C%20proposed%20an%20adaptive%20aggregation%20method%20using%20Euclidean%20distance%20to%20measure%20staleness.%20In%20this%20paper%2C%20we%20extend%20this%20approach%20by%20exploring%20alternative%20distance%20metrics%20to%20more%20accurately%20capture%20the%20effect%20of%20gradient%20staleness.%20We%20integrate%20these%20metrics%20into%20the%20aggregation%20process%20and%20evaluate%20their%20impact%20on%20convergence%20speed%2C%20model%20performance%2C%20and%20training%20stability%20under%20heterogeneous%20clients%20and%20non-IID%20data%20settings.%20Our%20results%20demonstrate%20that%20certain%20metrics%20lead%20to%20more%20robust%20and%20efficient%20asynchronous%20FL%20training%2C%20offering%20a%20stronger%20foundation%20for%20practical%20deployment.&entry.1838667208=http%3A//arxiv.org/abs/2603.08211v1&entry.124074799=Read"},
{"title": "Climplicit: Climatic Implicit Embeddings for Global Ecological Tasks", "author": "Johannes Dollinger and Damien Robert and Elena Plekhanova and Lukas Drees and Jan Dirk Wegner", "abstract": "Deep learning on climatic data holds potential for macroecological applications. However, its adoption remains limited among scientists outside the deep learning community due to storage, compute, and technical expertise barriers. To address this, we introduce Climplicit, a spatio-temporal geolocation encoder pretrained to generate implicit climatic representations anywhere on Earth. By bypassing the need to download raw climatic rasters and train feature extractors, our model uses x3500 less disk space and significantly reduces computational needs for downstream tasks. We evaluate our Climplicit embeddings on biomes classification, species distribution modeling, and plant trait regression. We find that single-layer probing our Climplicit embeddings consistently performs better or on par with training a model from scratch on downstream tasks and overall better than alternative geolocation encoding models.", "link": "http://arxiv.org/abs/2504.05089v3", "date": "2026-03-09", "relevancy": 2.0099, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5501}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4761}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4654}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Climplicit%3A%20Climatic%20Implicit%20Embeddings%20for%20Global%20Ecological%20Tasks&body=Title%3A%20Climplicit%3A%20Climatic%20Implicit%20Embeddings%20for%20Global%20Ecological%20Tasks%0AAuthor%3A%20Johannes%20Dollinger%20and%20Damien%20Robert%20and%20Elena%20Plekhanova%2 {"title": "A New Lower Bound for the Random Offerer Mechanism in Bilateral Trade using AI-Guided Evolutionary Search", "author": "Yang Cai and Vineet Gupta and Zun Li and Aranyak Mehta", "abstract": "The celebrated Myerson--Satterthwaite theorem shows that in bilateral trade, no mechanism can be simultaneously fully efficient, Bayesian incentive compatible (BIC), and budget balanced (BB). This naturally raises the question of how closely the gains from trade (GFT) achievable by a BIC and BB mechanism can approximate the first-best (fully efficient) benchmark. The optimal BIC and BB mechanism is typically complex and highly distribution-dependent, making it difficult to characterize directly. Consequently, much of the literature analyzes simpler mechanisms such as the Random-Offerer (RO) mechanism and establishes constant-factor guarantees relative to the first-best GFT. An important open question concerns the worst-case performance of the RO mechanism relative to first-best (FB) efficiency. While it was originally hypothesized that the approximation ratio $\\frac{\\text{GFT}_{\\text{FB}}}{\\text{GFT}_{\\text{RO}}}$ is bounded by $2$, recent work provided counterexamples to this conjecture: Cai et al. proved that the ratio can be strictly larger than $2$, and Babaioff et al. exhibited an explicit example with ratio approximately $2.02$.\n  In this work, we employ AlphaEvolve, an AI-guided evolutionary search framework, to explore the space of value distributions. We identify a new worst-case instance that yields an improved lower bound of $\\frac{\\text{GFT}_{\\text{FB}}}{\\text{GFT}_{\\text{RO}}} \\ge \\textbf{2.0749}$. This establishes a new lower bound on the worst-case performance of the Random-Offerer mechanism, demonstrating a wider efficiency gap than previously known.", "link": "http://arxiv.org/abs/2603.08679v1", "date": "2026-03-09", "relevancy": 1.2245, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4165}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4128}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.403}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20New%20Lower%20Bound%20for%20the%20Random%20Offerer%20Mechanism%20in%20Bilateral%20Trade%20using%20AI-Guided%20Evolutionary%20Search&body=Title%3A%20A%20New%20Lower%20Bound%20for%20the%20Random%20Offerer%20Mechanism%20in%20Bilateral%20Trade%20using%20AI-Guided%20Evolutionary%20Search%0AAuthor%3A%20Yang%20Cai%20and%20Vineet%20Gupta%20and%20Zun%20Li%20and%20Aranyak%20Mehta%0AAbstract%3A%20The%20celebrated%20Myerson--Satterthwaite%20theorem%20shows%20that%20in%20bilateral%20trade%2C%20no%20mechanism%20can%20be%20simultaneously%20fully%20efficient%2C%20Bayesian%20incentive%20compatible%20%28BIC%29%2C%20and%20budget%20balanced%20%28BB%29.%20This%20naturally%20raises%20the%20question%20of%20how%20closely%20the%20gains%20from%20trade%20%28GFT%29%20achievable%20by%20a%20BIC%20and%20BB%20mechanism%20can%20approximate%20the%20first-best%20%28fully%20efficient%29%20benchmark.%20The%20optimal%20BIC%20and%20BB%20mechanism%20is%20typically%20complex%20and%20highly%20distribution-dependent%2C%20making%20it%20difficult%20to%20characterize%20directly.%20Consequently%2C%20much%20of%20the%20literature%20analyzes%20simpler%20mechanisms%20such%20as%20the%20Random-Offerer%20%28RO%29%20mechanism%20and%20establishes%20constant-factor%20guarantees%20relative%20to%20the%20first-best%20GFT.%20An%20important%20open%20question%20concerns%20the%20worst-case%20performance%20of%20the%20RO%20mechanism%20relative%20to%20first-best%20%28FB%29%20efficiency.%20While%20it%20was%20originally%20hypothesized%20that%20the%20approximation%20ratio%20%24%5Cfrac%7B%5Ctext%7BGFT%7D_%7B%5Ctext%7BFB%7D%7D%7D%7B%5Ctext%7BGFT%7D_%7B%5Ctext%7BRO%7D%7D%7D%24%20is%20bounded%20by%20%242%24%2C%20recent%20work%20provided%20counterexamples%20to%20this%20conjecture%3A%20Cai%20et%20al.%20proved%20that%20the%20ratio%20can%20be%20strictly%20larger%20than%20%242%24%2C%20and%20Babaioff%20et%20al.%20exhibited%20an%20explicit%20example%20with%20ratio%20approximately%20%242.02%24.%0A%20%20In%20this%20work%2C%20we%20employ%20AlphaEvolve%2C%20an%20AI-guided%20evolutionary%20search%20framework%2C%20to%20explore%20the%20space%20of%20value%20distributions.%20We%20identify%20a%20new%20worst-case%20instance%20that%20yields%20an%20improved%20lower%20bound%20of%20%24%5Cfrac%7B%5Ctext%7BGFT%7D_%7B%5Ctext%7BFB%7D%7D%7D%7B%5Ctext%7BGFT%7D_%7B%5Ctext%7BRO%7D%7D%7D%20%5Cge%20%5Ctextbf%7B2.0749%7D%24.%20This%20establishes%20a%20new%20lower%20bound%20on%20the%20worst-case%20performance%20of%20the%20Random-Offerer%20mechanism%2C%20demonstrating%20a%20wider%20efficiency%20gap%20than%20previously%20known.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08679v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520New%2520Lower%2520Bound%2520for%2520the%2520Random%2520Offerer%2520Mechanism%2520in%2520Bilateral%2520Trade%2520using%2520AI-Guided%2520Evolutionary%2520Search%26entry.906535625%3DYang%2520Cai%2520and%2520Vineet%2520Gupta%2520and%2520Zun%2520Li%2520and%2520Aranyak%2520Mehta%26entry.1292438233%3DThe%2520celebrated%2520Myerson--Satterthwaite%2520theorem%2520shows%2520that%2520in%2520bilateral%2520trade%252C%2520no%2520mechanism%2520can%2520be%2520simultaneously%2520fully%2520efficient%252C%2520Bayesian%2520incentive%2520compatible%2520%2528BIC%2529%252C%2520and%2520budget%2520balanced%2520%2528BB%2529.%2520This%2520naturally%2520raises%2520the%2520question%2520of%2520how%2520closely%2520the%2520gains%2520from%2520trade%2520%2528GFT%2529%2520achievable%2520by%2520a%2520BIC%2520and%2520BB%2520mechanism%2520can%2520approximate%2520the%2520first-best%2520%2528fully%2520efficient%2529%2520benchmark.%2520The%2520optimal%2520BIC%2520and%2520BB%2520mechanism%2520is%2520typically%2520complex%2520and%2520highly%2520distribution-dependent%252C%2520making%2520it%2520difficult%2520to%2520characterize%2520directly.%2520Consequently%252C%2520much%2520of%2520the%2520literature%2520analyzes%2520simpler%2520mechanisms%2520such%2520as%2520the%2520Random-Offerer%2520%2528RO%2529%2520mechanism%2520and%2520establishes%2520constant-factor%2520guarantees%2520relative%2520to%2520the%2520first-best%2520GFT.%2520An%2520important%2520open%2520question%2520concerns%2520the%2520worst-case%2520performance%2520of%2520the%2520RO%2520mechanism%2520relative%2520to%2520first-best%2520%2528FB%2529%2520efficiency.%2520While%2520it%2520was%2520originally%2520hypothesized%2520that%2520the%2520approximation%2520ratio%2520%2524%255Cfrac%257B%255Ctext%257BGFT%257D_%257B%255Ctext%257BFB%257D%257D%257D%257B%255Ctext%257BGFT%257D_%257B%255Ctext%257BRO%257D%257D%257D%2524%2520is%2520bounded%2520by%2520%25242%2524%252C%2520recent%2520work%2520provided%2520counterexamples%2520to%2520this%2520conjecture%253A%2520Cai%2520et%2520al.%2520proved%2520that%2520the%2520ratio%2520can%2520be%2520strictly%2520larger%2520than%2520%25242%2524%252C%2520and%2520Babaioff%2520et%2520al.%2520exhibited%2520an%2520explicit%2520example%2520with%2520ratio%2520approximately%2520%25242.02%2524.%250A%2520%2520In%2520this%2520work%252C%2520we%2520employ%2520AlphaEvolve%252C%2520an%2520AI-guided%2520evolutionary%2520search%2520framework%252C%2520to%2520explore%2520the%2520space%2520of%2520value%2520distributions.%2520We%2520identify%2520a%2520new%2520worst-case%2520instance%2520that%2520yields%2520an%2520improved%2520lower%2520bound%2520of%2520%2524%255Cfrac%257B%255Ctext%257BGFT%257D_%257B%255Ctext%257BFB%257D%257D%257D%257B%255Ctext%257BGFT%257D_%257B%255Ctext%257BRO%257D%257D%257D%2520%255Cge%2520%255Ctextbf%257B {"title": "Towards Batch-to-Streaming Deep Reinforcement Learning for Continuous Control", "author": "Riccardo De Monte and Matteo Cederle and Gian Antonio Susto", "abstract": "State-of-the-art deep reinforcement learning (RL) methods have achieved remarkable performance in continuous control tasks, yet their computational complexity is often incompatible with the constraints of resource-limited hardware, due to their reliance on replay buffers, batch updates, and target networks. The emerging paradigm of streaming deep RL addresses this limitation through purely online updates, achieving strong empirical performance on standard benchmarks. In this work, we propose two novel streaming deep RL algorithms, Streaming Soft Actor-Critic (S2AC) and Streaming Deterministic Actor-Critic (SDAC), explicitly designed to be compatible with state-of-the-art batch RL methods, making them particularly suitable for on-device finetuning applications such as Sim2Real transfer. Both algorithms achieve performance comparable to state-of-the-art streaming baselines on standard benchmarks without requiring tedious hyperparameter tuning. Finally, we further investigate the practical challenges of transitioning from batch to streaming learning during finetuning and propose concrete strategies to tackle them.", "link": "http://arxiv.org/abs/2603.08588v1", "date": "2026-03-09", "relevancy": 1.4691, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5188}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.4552}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4515}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Batch-to-Streaming%20Deep%20Reinforcement%20Learning%20for%20Conti {"title": "SYNAPSE: Framework for Neuron Analysis and Perturbation in Sequence Encoding", "author": "Jes\u00fas S\u00e1nchez Ochoa and Enrique Tom\u00e1s Mart\u00ednez Beltr\u00e1n and Alberto Huertas Celdr\u00e1n", "abstract": "In recent years, Artificial Intelligence has become a powerful partner for complex tasks such as data analysis, prediction, and problem-solving, yet its lack of transparency raises concerns about its reliability. In sensitive domains such as healthcare or cybersecurity, ensuring transparency, trustworthiness, and robustness is essential, since the consequences of wrong decisions or successful attacks can be severe. Prior neuron-level interpretability approaches are primarily descriptive, task-dependent, or require retraining, which limits their use as systematic, reusable tools for evaluating internal robustness across architectures and domains. To overcome these limitations, this work proposes SYNAPSE, a systematic, training-free framework for understanding and stress-testing the internal behavior of Transformer models across domains. It extracts per-layer [CLS] representations, trains a lightweight linear probe to obtain global and per-class neuron rankings, and applies forward-hook interventions during inference. This design enables controlled experiments on internal representations without altering the original model, thereby allowing weaknesses, stability patterns, and label-specific sensitivities to be measured and compared directly across tasks and architectures. Across all experiments, SYNAPSE reveals a consistent, domain-independent organization of internal representations, in which task-relevant information is encoded in broad, overlapping neuron subsets. This redundancy provides a strong degree of functional stability, while class-wise asymmetries expose heterogeneous specialization patterns and enable label-aware analysis. In contrast, small structured manipulations in weight or logit space are sufficient to redirect predictions, highlighting complementary vulnerability profiles and illustrating how SYNAPSE can guide the development of more robust Transformer models.", "link": "http://arxiv.org/abs/2603.08424v1", "date": "2026-03-09", "relevancy": 2.1618, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.556}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5373}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5373}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SYNAPSE%3A%20Framework%20for%20Neuron%20Analysis%20and%20Perturbation%20in%20Sequence%20Encoding&body=Title%3A%20SYNAPSE%3A%20Framework%20for%20Neuron%20Analysis%20and%20Perturbation%20in%20Sequence%20Encoding%0AAuthor%3A%20Jes%C3%BAs%20S%C3%A1nchez%20Ochoa%20and%20Enrique%20Tom%C3%A1s%20Mart%C3%ADnez%20Beltr%C3%A1n%20and%20Alberto%20Huertas%20Celdr%C3%A1n%0AAbstract%3A%20In%20recent%20years%2C%20Artificial%20Intelligence%20has%20become%20a%20powerful%20partner%20for%20complex%20tasks%20such%20as%20data%20analysis%2C%20prediction%2C%20and%20problem-solving%2C%20yet%20its%20lack%20of%20transparency%20raises%20concerns%20about%20its%20reliability.%20In%20sensitive%20domains%20such%20as%20healthcare%20or%20cybersecurity%2C%20ensuring%20transparency%2C%20trustworthiness%2C%20and%20robustness%20is%20essential%2C%20since%20the%20consequences%20of%20wrong%20decisions%20or%20successful%20attacks%20can%20be%20severe.%20Prior%20neuron-level%20interpretability%20approaches%20are%20primarily%20descriptive%2C%20task-dependent%2C%20or%20require%20retraining%2C%20which%20limits%20their%20use%20as%20systematic%2C%20reusable%20tools%20for%20evaluating%20internal%20robustness%20across%20architectures%20and%20domains.%20To%20overcome%20these%20limitations%2C%20this%20work%20proposes%20SYNAPSE%2C%20a%20systematic%2C%20training-free%20framework%20for%20understanding%20and%20stress-testing%20the%20internal%20behavior%20of%20Transformer%20models%20across%20domains.%20It%20extracts%20per-layer%20%5BCLS%5D%20representations%2C%20trains%20a%20lightweight%20linear%20probe%20to%20obtain%20global%20and%20per-class%20neuron%20rankings%2C%20and%20applies%20forward-hook%20interventions%20during%20inference.%20This%20design%20enables%20controlled%20experiments%20on%20internal%20representations%20without%20altering%20the%20original%20model%2C%20thereby%20allowing%20weaknesses%2C%20stability%20patterns%2C%20and%20label-specific%20sensitivities%20to%20be%20measured%20and%20compared%20directly%20across%20tasks%20and%20architectures.%20Across%20all%20experiments%2C%20SYNAPSE%20reveals%20a%20consistent%2C%20domain-independent%20organization%20of%20internal%20representations%2C%20in%20which%20task-relevant%20information%20is%20encoded%20in%20broad%2C%20overlapping%20neuron%20subsets.%20This%20redundancy%20provides%20a%20strong%20degree%20of%20functional%20stability%2C%20while%20class-wise%20asymmetries%20expose%20heterogeneous%20specialization%20patterns%20and%20enable%20label-aware%20analysis.%20In%20contrast%2C%20small%20structured%20manipulations%20in%20weight%20or%20logit%20space%20are%20sufficient%20to%20redirect%20predictions%2C%20highlighting%20complementary%20vulnerability%20profiles%20and%20illustrating%20how%20SYNAPSE%20can%20guide%20the%20development%20of%20more%20robust%20Transformer%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08424v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSYNAPSE%253A%2520Framework%2520for%2520Neuron%2520Analysis%2520and%2520Perturbation%2520in%2520Sequence%2520Encoding%26entry.906535625%3DJes%25C3%25BAs%2520S%25C3%25A1nchez%2520Ochoa%2520and%2520Enrique%2520Tom%25         linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

  </body>
</html>

{"title": "Improving Continual Learning for Gaussian Splatting based Environments Reconstruction on Commercial Off-the-Shelf Edge Devices", "author": "Ivan Zaino and Matteo Risso and Daniele Jahier Pagliari and Miguel de Prado and Toon Van de Maele and Alessio Burrello", "abstract": "Novel view synthesis (NVS) is increasingly relevant for edge robotics, where compact and incrementally updatable 3D scene models are needed for SLAM, navigation, and inspection under tight memory and latency budgets. Variational Bayesian Gaussian Splatting (VBGS) enables replay-free continual updates for the 3DGS algorithm by maintaining a probabilistic scene model, but its high-precision computations and large intermediate tensors make on-device training impractical. We present a precision-adaptive optimization framework that enables VBGS training on resource-constrained hardware without altering its variational formulation. We (i) profile VBGS to identify memory/latency hotspots, (ii) fuse memory-dominant kernels to reduce materialized intermediate tensors, and (iii) automatically assign operation-level precisions via a mixed-precision search with bounded relative error. Across the Blender, Habitat, and Replica datasets, our optimised pipeline reduces peak memory from 9.44 GB to 1.11 GB and training time from ~234 min to ~61 min on an A5000 GPU, while preserving (and in some cases improving) reconstruction quality of the state-of-the-art VBGS baseline. We also enable for the first time NVS training on a commercial embedded platform, the Jetson Orin Nano, reducing per-frame latency by 19x compared to 3DGS.", "link": "http://arxiv.org/abs/2603.08499v1", "date": "2026-03-09", "relevancy": 3.3521, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.7133}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v %20pipeline%20reduces%20peak%20memory%20from%209.44%20GB%20to%201.11%20GB%20and%20training%20time%20from%20~234%20min%20to%20~61%20min%20on%20an%20A5000%20GPU%2C%20while%20preserving%20%28and%20in%20some%20cases%20improving%29%20reconstruction%20quality%20of%20the%20state-of-the-art%20VBGS%20baseline.%20We%20also%20enable%20for%20the%20first%20time%20NVS%20training%20on%20a%20commercial%20embedded%20platform%2C%20the%20Jetson%20Orin%20Nano%2C%20reducing%20per-frame%20latency%20by%2019x%20compared%20to%203DGS.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08499v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DImproving%2520Continual%2520Learning%2520for%2520Gaussian%2520Splatting%2520based%2520Environments%2520Reconstruction%2520on%2520Commercial%2520Off-the-Shelf%2520Edge%2520Devices%26entry.906535625%3DIvan%2520Zaino%2520and%2520Matteo%2520Risso%2520and%2520Daniele%2520Jahier%2520Pagliari%2520and%2520Miguel%2520de%2520Prado%2520and%2520Toon%2520Van%2520de%2520Maele%2520and%2520Alessio%2520Burrello%26entry.1292438233%3DNovel%2520view%2520synthesis%2520%2528NVS%2529%2520is%2520increasingly%2520relevant%2520for%2520edge%2520robotics%252C%2520where%2520compact%2520and%2520incrementally%2520updatable%25203D%2520scene%2520models%2520are%2520needed%2520for%2520SLAM%252C%2520navigation%252C%2520and%2520inspection%2520under%2520tight%2520memory%2520and%2520latency%2520budgets.%2520Variational%2520Bayesian%2520Gaussian%2520Splatting%2520%2528VBGS%2529%2520enables%2520replay-free%2520continual%2520updates%2520for%2520the%25203DGS%2520algorithm%2520by%2520maintaining%2520a%2520probabilistic%2520scene%2520model%252C%2520but%2520its%2520high-precision%2520computations%2520and%2520large%2520intermediate%2520tensors%2520make%2520on-device%2520training%2520impractical.%2520We%2520present%2520a%2520precision-adaptive%2520optimization%2520framework%2520that%2520enables%2520VBGS%2520training%2520on%2520r e%20needed%20for%20SLAM%2C%20navigation%2C%20and%20inspection%20under%20tight%20memory%20and%20latency%20budgets.%20Variational%20Bayesian%20Gaussian%20Splatting%20%28VBGS%29%20enables%20replay-free%20continual%20updates%20for%20the%203DGS%20algorithm%20by%20maintaining%20a%20probabilistic%20scene%20model%2C%20but%20its%20high-precision%20computations%20and%20large%20intermediate%20tensors%20make%20on-device%20training%20impractical.%20We%20present%20a%20precision-adaptive%20optimization%20framework%20that%20enables%20VBGS%20training%20on%20resource-constrained%20hardware%20without%20altering%20its%20variational%20formulation.%20We%20%28i%29%20profile%20VBGS%20to%20identify%20memory/latency%20hotspots%2C%20%28ii%29%20fuse%20memory-dominant%20kernels%20to%20reduce%20materialized%20intermediate%20tensors%2C%20and%20%28iii%29%20automatically%20assign%20operation-level%20precisions%20via%20a%20mixed-precision%20search%20with%20bounded%20relative%20error.%20Across%20the%20Blender%2C%20Habitat%2C%20and%20Replica%20datasets%2C%20our%20optimised%20pipeline%20reduces%20peak%20memory%20from%209.44%20GB%20to%201.11%20GB%20and%20training%20time%20from%20~234%20min%20to%20~61%20min%20on%20an%20A5000%20GPU%2C%20while%20preserving%20%28and%20in%20some%20cases%20improving%29%20reconstruction%20quality%20of%20the%20state-of-the-art%20VBGS%20baseline.%20We%20also%20enable%20for%20the%20first%20time%20NVS%20training%20on%20a%20commercial%20embedded%20platform%2C%20the%20Jetson%20Orin%20Nano%2C%20reducing%20per-frame%20latency%20by%2019x%20compared%20to%203DGS.&entry.1838667208=http%3A//arxiv.org/abs/2603.08499v1&entry.124074799=Read"},
{"title": "ImprovedGS+: A High-Performance C++/CUDA Re-Implementation Strategy for 3D Gaussian Splatting", "author": "Jordi Mu\u00f1oz Vicente", "abstract": "Recent advancements in 3D Gaussian Splatting (3DGS) have shifted the focus toward balancing reconstruction fidelity with computational efficiency. In this work, we propose ImprovedGS+, a high-performance, low-level reinvention of the ImprovedGS strategy, implemented natively within the LichtFeld-Studio framework. By transitioning from high-level Python logic to hardware-optimized C++/CUDA kernels, we achieve a significant reduction in host-device synchronization and training latency. Our implementation introduces a Long-Axis-Split (LAS) CUDA kernel, custom Laplacian-based importance kernels with Non-Maximum Suppression (NMS) for edge scores, and an adaptive Exponential Scale Scheduler. Experimental results on the Mip-NeRF360 dataset demonstrate that ImprovedGS+ establishes a new Pareto-optimal front for scene reconstruction. Our 1M-budget variant outperforms the state-of-the-art MCMC baseline by achieving a 26.8% reduction in training time (saving 17 minutes per session) and utilizing 13.3% fewer Gaussians while maintaining superior visual quality. Furthermore, our full variant demonstrates a 1.28 dB PSNR increase over the ADC baseline with a 38.4% reduction in parametric complexity. These results validate ImprovedGS+ as a scalable, high-speed solution that upholds the core pillars of Speed, Quality, and Usability within the LichtFeld-Studio ecosystem.", "link": "http://arxiv.org/abs/2603.08661v1", "date": "2026-03-09", "relevancy": 3.3259, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.7008}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6528}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.642}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ImprovedGS%2B%3A%20A%20High-Performance%20C%2B%2B/CUDA%20Re-Implementation%20Strategy%20for%203D%20Gaussian%20Splatting&body=Title%3A%20ImprovedGS%2B%3A%20A%20High-Performance%20C%2B%2B/CUDA%20Re-Implementation%20Strategy%20for%203D%20Gaussian%20Splatting%0AAuthor%3A%20Jordi%20Mu%C3%B1oz%20Vicente%0AAbstract%3A%20Recent%20advancements%20in%203D%20Gaussian%20Splatting%20%283DGS%29%20have%20shifted%20the%20focus%20toward%20balancing%20reconstruction%20fidelity%20with%20computational%20efficiency.%20In%20this%20work%2C%20we%20propose%20ImprovedGS%2B%2C%20a%20high-performance%2C%20low-level%20reinvention%20of%20the%20ImprovedGS%20strategy%2C%20implemented%20natively%20within%20the%20LichtFeld-Studio%20framework.%20By%20transitioning%20from%20high-level%20Python%20logic%20to%20hardware-optimized%20C%2B%2B/CUDA%20kernels%2C%20we%20achieve%20a%20significant%20reduction%20in%20host-device%20synchronization%20and%20training%20latency.%20Our%20implementation%20introduces%20a%20Long-Axis-Split%20%28LAS%29%20CUDA%20kernel%2C%20custom%20Laplacian-based%20importance%20kernels%20with%20Non-Maximum%20Suppression%20%28NMS%29%20for%20edge%20scores%2C%20and%20an%20adaptive%20Exponential%20Scale%20Scheduler.%20Experimental%20results%20on%20the%20Mip-NeRF360%20dataset%20demonstrate%20that%20ImprovedGS%2B%20establishes%20a%20new%20Pareto-optimal%20front%20for%20scene%20reconstruction.%20Our%201M-budget%20variant%20outperforms%20the%20state-of-the-art%20MCMC%20baseline%20by%20achieving%20a%2026.8%25%20reduction%20in%20training%20time%20%28saving%2017%20minutes%20per%20session%29%20and%20utilizing%2013.3%25%20fewer%20Gaussians%20while%20maintaining%20superior%20visual%20quality.%20Furthermore%2C%20our%20full%20variant%20demonstrates%20a%201.28%20dB%20PSNR%20increase%20over%20the%20ADC%20baseline%20with%20a%2038.4%25%20reduction%20in%20parametric%20complexity.%20These%20results%20validate%20ImprovedGS%2B%20as%20a%20scalable%2C%20high-speed%20solution%20that%20upholds%20the%20core%20pillars%20of%20Speed%2C%20Quality%2C%20and%20Usability%20within%20the%20LichtFeld-Studio%20ecosystem.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08661v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DImprovedGS%252B%253A%2520A%2520High-Performance%2520C%252B%252B/CUDA%2520Re-Implementation%2520Strategy%2520for%25203D%2520Gaussian%2520Splatting%26entry.906535625%3DJordi%2520Mu%25C3%25B1oz%2520Vicente%26entry.1292438233%3DRecent%2520advancements%2520in%25203D%2520Gaussian%2520Splatting%2520%25283DGS%2529%2520have%2520shifted%2520the%2520focus%2520toward%2520balancing%2520reconstruction%2520fidelity%2520with%2520computational%2520efficiency.%2520In%2520this%2520work%252C%2520we%2520propose%2520ImprovedGS%252B%252C%2520a%2520high-performance%252C%2520low-level%2520reinvention%2520of%2520the%2520ImprovedGS%2520strategy%252C%2520implemented%2520natively%2520within%2520the%2520LichtFeld-Studio%2520framework.%2520By%2520transitioning%2520from%2520high-level%2520Python%2520logic%2520to%2520hardware-optimized%2520C%252B%252B/CUDA%2520kernels%252C%2520we%2520achieve%2520a%2520significant%2520reduction%2520in%2520host-device%2520synchronization%2520and%2520training%2520latency.%2520Our%2520implementation%2520introduces%2520a%2520Long-Axis-Split%2520%2528LAS%2529%2520CUDA%2520kernel%252C%2520custom%2520Laplacian-based%2520importance%2520kernels%2520with%2520Non-Maximum%2520Suppression%2520%2528NMS%2529%2520for%2520edge%2520scores%252C%2520and%2520an%2520adaptive%2520Exponential%2520Scale%2520Scheduler.%2520Experimental%2520results%2520on%2520the%2520Mip-NeRF360%2520dataset%2520demonstrate%2520that%2520ImprovedGS%252B%2520establishes%2520a%2520new%2520Pareto-optimal%2520front%2520for%2520scene%2520reconstruction.%2520Our%2520 {"title": "ExGS: Extreme 3D Gaussian Compression with Diffusion Priors", "author": "Jiaqi Chen and Xinhao Ji and Yuanyuan Gao and Hao Li and Yuning Gong and Yifei Liu and Dan Xu and Zhihang Zhong and Dingwen Zhang and Xiao Sun", "abstract": "Neural scene representations, such as 3D Gaussian Splatting (3DGS), have enabled high-quality neural rendering; however, their large storage and transmission costs hinder deployment in resource-constrained environments. Existing compression methods either rely on costly optimization, which is slow and scene-specific, or adopt training-free pruning and quantization, which degrade rendering quality under high compression ratios. In contrast, recent data-driven approaches provide a promising direction to overcome this trade-off, enabling efficient compression while preserving high rendering quality. We introduce ExGS, a novel feed-forward framework that unifies Universal Gaussian Compression (UGC) with GaussPainter for Extreme 3DGS compression. UGC performs re-optimization-free pruning to aggressively reduce Gaussian primitives while retaining only essential information, whereas GaussPainter leverages powerful diffusion priors with mask-guided refinement to restore high-quality renderings from heavily pruned Gaussian scenes. Unlike conventional inpainting, GaussPainter not only fills in missing regions but also enhances visible pixels, yielding substantial improvements in degraded renderings. To ensure practicality, it adopts a lightweight VAE and a one-step diffusion design, enabling real-time restoration. Our framework can even achieve over 100X compression (reducing a typical 354.77 MB model to about 3.31 MB) while preserving fidelity and significantly improving image quality under challenging conditions. These results highlight the central role of diffusion priors in bridging the gap between extreme compression and high-quality neural rendering. Our code repository will be released at: https://github.com/chenttt2001/ExGS", "link": "http://arxiv.org/abs/2509.24758v5", "date": "2026-03-09", "relevancy": 3.269, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6559}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6551}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.6505}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ExGS%3A%20Extreme%203D%20Gaussian%20Compression%20with%20Diffusion%20Priors&body=Title%3A%20ExGS%3A%20Extreme%203D%20Gaussian%20Compression%20with%20Diffusion%20Priors%0AAuthor%3A%20Jiaqi%20Chen%20and%20Xinhao%20Ji%20and%20Yuanyuan%20Gao%20and%20Hao%20Li%20and%20Yuning%20Gong%20and%20Yifei%20Liu%20and%20Dan%20Xu%20and%20Zhihang%20Zhong%20and%20Dingwen%20Zhang%20and%20Xiao%20Sun%0AAbstract%3A%20Neural%20scene%20representations%2C%20such%20as%203D%20Gaussian%20Splatting%20%283DGS%29%2C%20have%20enabled%20high-quality%20neural%20rendering%3B%20however%2C%20their%20large%20storage%20and%20transmission%20costs%20hinder%20deployment%20in%20resource-constrained%20environments.%20Existing%20compression%20methods%20either%20rely%20on%20costly%20optimization%2C%20which%20is%20slow%20and%20scene-specific%2C%20or%20adopt%20training-free%20pruning%20and%20quantization%2C%20which%20degrade%20rendering%20quality%20under%20high%20compression%20ratios.%20In%20contrast%2C%20recent%20data-driven%20approaches%20provide%20a%20promising%20direction%20to%20overcome%20this%20trade-off%2C%20enabling%20efficient%20compression%20while%20preserving%20high%20rendering%20quality.%20We%20introduce%20ExGS%2C%20a%20novel%20feed-forward%20framework%20that%20unifies%20Universal%20Gaussian%20Compression%20%28UGC%29%20with%20GaussPainter%20for%20Extreme%203DGS%20compression.%20UGC%20performs%20re-optimization-free%20pruning%20to%20aggressively%20reduce%20Gaussian%20primitives%20while%20retaining%20only%20essential%20information%2C%20whereas%20GaussPainter%20leverages%20powerful%20diffusion%20priors%20with%20mask-guided%20refinement%20to%20restore%20high-quality%20renderings%20from%20heavily%20pruned%20Gaussian%20scenes.%20Unlike%20conventional%20inpainting%2C%20GaussPainter%20not%20only%20fills%20in%20missing%20regions%20but%20also%20enhances%20visible%20pixels%2C%20yielding%20substantial%20improvements%20in%20degraded%20renderings.%20To%20ensure%20practicality%2C%20it%20adopts%20a%20lightweight%20VAE%20and%20a%20one-step%20diffusion%20design%2C%20enabling%20real-time%20restoration.%20Our%20framework%20can%20even%20achieve%20over%20100X%20compression%20%28reducing%20a%20typical%20354.77%20MB%20model%20to%20about%203.31%20MB%29%20while%20preserving%20fidelity%20and%20significantly%20improving%20image%20quality%20under%20challenging%20conditions.%20These%20results%20highlight%20the%20central%20role%20of%20diffusion%20priors%20in%20bridging%20the%20gap%20between%20extreme%20compression%20and%20high-quality%20neural%20rendering.%20Our%20code%20repository%20will%20be%20released%20at%3A%20https%3A//github.com/chenttt2001/ExGS%0ALink%3A%20http%3A//arxiv.org/abs/2509.24758v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DExGS%253A%2520Extreme%25203D%2520Gaussian%2520Compression%2520with%2520Diffusion%2520Priors%26entry.906535625%3DJiaqi%2520Chen%2520and%2520Xinhao%2520Ji%2520and%2520Yuanyuan%2520Gao%2520and%2520Hao%2520Li%2520and%2520Yuning%2520Gong%2520and%2520Yifei%2520Liu%2520and%2520Dan%2520Xu%2520and%2520Zhihang%2520Zhong%2520and%2520Dingwen%2520Zhang%2520and%2520Xiao%2520Sun%26entry.1292438233%3DNeural%2520scene%2520representations%252C%2520such%2520as%25203D%2520Gaussian%2520Splatting%2520%25283DGS%2529%252C%2520have%2520enabled%2520high-quality%2520neural%2520rendering%253B {"title": "DynamicVGGT: Learning Dynamic Point Maps for 4D Scene Reconstruction in Autonomous Driving", "author": "Zhuolin He and Jing Li and Guanghao Li and Xiaolei Chen and Jiacheng Tang and Siyang Zhang and Zhounan Jin and Feipeng Cai and Bin Li and Jian Pu and Jia Cai and Xiangyang Xue", "abstract": "Dynamic scene reconstruction in autonomous driving remains a fundamental challenge due to significant temporal variations, moving objects, and complex scene dynamics. Existing feed-forward 3D models have demonstrated strong performance in static reconstruction but still struggle to capture dynamic motion. To address these limitations, we propose DynamicVGGT, a unified feed-forward framework that extends VGGT from static 3D perception to dynamic 4D reconstruction. Our goal is to model point motion within feed-forward 3D models in a dynamic and temporally coherent manner. To this end, we jointly predict the current and future point maps within a shared reference coordinate system, allowing the model to implicitly learn dynamic point representations through temporal correspondence. To efficiently capture temporal dependencies, we introduce a Motion-aware Temporal Attention (MTA) module that learns motion continuity. Furthermore, we design a Dynamic 3D Gaussian Splatting Head that explicitly models point motion by predicting Gaussian velocities using learnable motion tokens under scene flow supervision. It refines dynamic geometry through continuous 3D Gaussian optimization. Extensive experiments on autonomous driving datasets demonstrate that DynamicVGGT significantly outperforms existing methods in reconstruction accuracy, achieving robust feed-forward 4D dynamic scene reconstruction under complex driving scenarios.", "link": "http://arxiv.org/abs/2603.08254v1", "date": "2026-03-09", "relevancy": 3.1836, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.667 ies%2C%20we%20introduce%20a%20Motion-aware%20Temporal%20Attention%20%28MTA%29%20module%20that%20learns%20motion%20continuity.%20Furthermore%2C%20we%20design%20a%20Dynamic%203D%20Gaussian%20Splatting%20Head%20that%20explicitly%20models%20point%20motion%20by%20predicting%20Gaussian%20velocities%20using%20learnable%20motion%20tokens%20under%20scene%20flow%20supervision.%20It%20refines%20dynamic%20geometry%20through%20continuous%203D%20Gaussian%20optimization.%20Extensive%20experiments%20on%20autonomous%20driving%20datasets%20demonstrate%20that%20DynamicVGGT%20significantly%20outperforms%20existing%20methods%20in%20reconstruction%20accuracy%2C%20achieving%20robust%20feed-forward%204D%20dynamic%20scene%20reconstruction%20under%20complex%20driving%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08254v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDynamicVGGT%253A%2520Learning%2520Dynamic%2520Point%2520Maps%2520for%25204D%2520Scene%2520Reconstruction%2520in%2520Autonomous%2520Driving%26entry.906535625%3DZhuolin%2520He%2520and%2520Jing%2520Li%2520and%2520Guanghao%2520Li%2520and%2520Xiaolei%2520Chen%2520and%2520Jiacheng%2520Tang%2520and%2520Siyang%2520Zhang%2520and%2520Zhounan%2520Jin%2520and%2520Feipeng%2520Cai%2520and%2520Bin%2520Li%2520and%2520Jian%2520Pu%2520and%2520Jia%2520Cai%2520and%2520Xiangyang%2520Xue%26entry.1292438233%3DDynamic%2520scene%2520reconstruction%2520in%2520autonomous%2520driving%2520remains%2520a%2520fundamental%2520challenge%2520due%2520to%2520significant%2520temporal%2520variations%252C%2520moving%2520objects%252C%2520and%2520complex%2520scene%2520dynamics.%2520Existing%2520feed-forward%25203D%2520models%2520have%2520demonstrated%2520strong%2520performance%2520in%2520static%2520reconstruction%2520but%2520still%2520struggle%2520to%2520capture%2520dynamic%2520motion.%2520To%2520address%2520these%2520limitations%252C%2520we%2520propose%2520DynamicVGGT%252C%252 {"title": "Retrieval-Augmented Gaussian Avatars: Improving Expression Generalization", "author": "Matan Levy and Gavriel Habib and Issar Tzachor and Dvir Samuel and Rami Ben-Ari and Nir Darshan and Or Litany and Dani Lischinski", "abstract": "Template-free animatable head avatars can achieve high visual fidelity by learning expression-dependent facial deformation directly from a subject's capture, avoiding parametric face templates and hand-designed blendshape spaces. However, since learned deformation is supervised only by the expressions observed for a single identity, these models suffer from limited expression coverage and often struggle when driven by motions that deviate from the training distribution. We introduce RAF (Retrieval-Augmented Faces), a simple training-time augmentation designed for template-free head avatars that learn deformation from data. RAF constructs a large unlabeled expression bank and, during training, replaces a subset of the subject's expression features with nearest-neighbor expressions retrieved from this bank while still reconstructing the subject's original frames. This exposes the deformation field to a broader range of expression conditions, encouraging stronger identity-expression decoupling and improving robustness to expression distribution shift without requiring paired cross-identity data, additional annotations, or architectural changes. We further analyze how retrieval augmentation increases expression diversity and validate retrieval quality with a user study showing that retrieved neighbors are perceptually closer in expression and pose. Experiments on the NeRSemble benchmark demonstrate that RAF consistently improves expression fidelity over the baseline, in both self-driving and cross-driving scenarios.", "link": "http://arxiv.org/abs/2603.08645v1", "date": "2026-03-09", "relevancy": 3.1404, "topK": [{"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity" ncouraging%20stronger%20identity-expression%20decoupling%20and%20improving%20robustness%20to%20expression%20distribution%20shift%20without%20requiring%20paired%20cross-identity%20data%2C%20additional%20annotations%2C%20or%20architectural%20changes.%20We%20further%20analyze%20how%20retrieval%20augmentation%20increases%20expression%20diversity%20and%20validate%20retrieval%20quality%20with%20a%20user%20study%20showing%20that%20retrieved%20neighbors%20are%20perceptually%20closer%20in%20expression%20and%20pose.%20Experiments%20on%20the%20NeRSemble%20benchmark%20demonstrate%20that%20RAF%20consistently%20improves%20expression%20fidelity%20over%20the%20baseline%2C%20in%20both%20self-driving%20and%20cross-driving%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08645v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRetrieval-Augmented%2520Gaussian%2520Avatars%253A%2520Improving%2520Expression%2520Generalization%26entry.906535625%3DMatan%2520Levy%2520and%2520Gavriel%2520Habib%2520and%2520Issar%2520Tzachor%2520and%2520Dvir%2520Samuel%2520and%2520Rami%2520Ben-Ari%2520and%2520Nir%2520Darshan%2520and%2520Or%2520Litany%2520and%2520Dani%2520Lischinski%26entry.1292438233%3DTemplate-free%2520animatable%2520head%2520avatars%2520can%2520achieve%2520high%2520visual%2520fidelity%2520by%2520learning%2520expression-dependent%2520facial%2520deformation%2520directly%2520from%2520a%2520subject%2527s%2520capture%252C%2520avoiding%2520parametric%2520face%2520templates%2520and%2520hand-designed%2520blendshape%2520spaces.%2520However%252C%2520since%2520learned%2520deformation%2520is%2520supervised%2520only%2520by%2520the%2520expressions%2520observed%2520for%2520a%2520single%2520identity%252C%2520these%2520models%2520suffer%2520from%2520limited%2520expression%2520coverage%2520and%2520often%2520struggle%2520when%2520driven%2520by%2520motions%2520that%2520deviate%2520from%2520the%2520training%2520distribution {"title": "Boosting MLLM Spatial Reasoning with Geometrically Referenced 3D Scene Representations", "author": "Jiangye Yuan and Gowri Kumar and Baoyuan Wang", "abstract": "While Multimodal Large Language Models (MLLMs) have achieved remarkable success in 2D visual understanding, their ability to reason about 3D space remains limited. To address this gap, we introduce geometrically referenced 3D scene representations (GR3D). Given a set of input images, GR3D annotates objects in the images with unique IDs and encodes their 3D geometric attributes as textual references indexed by these IDs. This representation enables MLLMs to interpret 3D cues using their advanced language-based skills in mathematical reasoning, while concurrently analyzing 2D visual features in a tightly coupled way. We present a simple yet effective approach based on GR3D, which requires no additional training and is readily applicable to different MLLMs. Implemented in a zero-shot setting, our approach boosts GPT-5's performance on VSI-Bench by 8% overall and more than 11% on tasks that rely heavily on spatial layout understanding. Qualitative studies further demonstrate that GR3D empowers MLLMs to perform complex spatial reasoning with highly sparse input views.", "link": "http://arxiv.org/abs/2603.08592v1", "date": "2026-03-09", "relevancy": 3.0548, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6199}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6199}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5931}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Boosting%20MLLM%20Spatial%20Reasoning%20with%20Geometrically%20Referenced%203D%20Scene%20Representations&bod {"title": "Talking Together: Synthesizing Co-Located 3D Conversations from Audio", "author": "Mengyi Shan and Shouchieh Chang and Ziqian Bai and Shichen Liu and Yinda Zhang and Luchuan Song and Rohit Pandey and Sean Fanello and Zeng Huang", "abstract": "We tackle the challenging task of generating complete 3D facial animations for two interacting, co-located participants from a mixed audio stream. While existing methods often produce disembodied \"talking heads\" akin to a video conference call, our work is the first to explicitly model the dynamic 3D spatial relationship -- including relative position, orientation, and mutual gaze -- that is crucial for realistic in-person dialogues. Our system synthesizes the full performance of both individuals, including precise lip-sync, and uniquely allows their relative head poses to be controlled via textual descriptions. To achieve this, we propose a dual-stream architecture where each stream is responsible for one participant's output. We employ speaker's role embeddings and inter-speaker cross-attention mechanisms designed to disentangle the mixed audio and model the interaction. Furthermore, we introduce a novel eye gaze loss to promote natural, mutual eye contact. To power our data-hungry approach, we introduce a novel pipeline to curate a large-scale conversational dataset consisting of over 2 million dyadic pairs from in-the-wild videos. Our method generates fluid, controllable, and spatially aware dyadic animations suitable for immersive applications in VR and telepresence, significantly outperforming existing baselines in perceived realism and interaction coherence.", "link": "http://arxiv.org/abs/2603.08674v1", "date": "2026-03-09", "relevancy": 3.0155, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6664}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.5714}, {" {"title": "UNBOX: Unveiling Black-box visual models with Natural-language", "author": "Simone Carnemolla and Chiara Russo and Simone Palazzo and Quentin Bouniot and Daniela Giordano and Zeynep Akata and Matteo Pennisi and Concetto Spampinato", "abstract": "Ensuring trustworthiness in open-world visual recognition requires models that are interpretable, fair, and robust to distribution shifts. Yet modern vision systems are increasingly deployed as proprietary black-box APIs, exposing only output probabilities and hiding architecture, parameters, gradients, and training data. This opacity prevents meaningful auditing, bias detection, and failure analysis. Existing explanation methods assume white- or gray-box access or knowledge of the training distribution, making them unusable in these real-world settings. We introduce UNBOX, a framework for class-wise model dissection under fully data-free, gradient-free, and backpropagation-free constraints. UNBOX leverages Large Language Models and text-to-image diffusion models to recast activation maximization as a purely semantic search driven by output probabilities. The method produces human-interpretable text descriptors that maximally activate each class, revealing the concepts a model has implicitly learned, the training distribution it reflects, and potential sources of bias. We evaluate UNBOX on ImageNet-1K, Waterbirds, and CelebA through semantic fidelity tests, visual-feature correlation analyses and slice-discovery auditing. Despite operating under the strictest black-box constraints, UNBOX performs competitively with state-of-the-art white-box interpretability methods. This demonstrates that meaningful insight into a model's internal reasoning can be recovered without any internal access, enabling more trustworthy and accountable visual recognition systems.", "link": "http://arxiv.org/abs/2603.08639v1", "date": "2026-03-09", "relevancy": 3.0085, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6208}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6208}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5635}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20UNBOX%3A%20Unveiling%20Black-box%20visual%20models%20with%20Natural-language&body=Title%3A%20UNBOX%3A%20Unveiling%20Black-box%20visual%20models%20with%20Natural-language%0AAuthor%3A%20Simone%20Carnemolla%20and%20Chiara%20Russo%20and%20Simone%20Palazzo%20and%20Quentin%20Bouniot%20and%20Daniela%20Giordano%20and%20Zeynep%20Akata%20and%20Matteo%20Pennisi%20and%20Concetto%20Spampinato%0AAbstract%3A%20Ensuring%20trustworthiness%20in%20open-world%20visual%20recognition%20requires%20models%20that%20are%20interpretable%2C%20fair%2C%20and%20robust%20to%20distribution%20shifts.%20Yet%20modern%20vision%20systems%20are%20increasingly%20deployed%20as%20proprietary%20black-box%20APIs%2C%20exposing%20only%20output%20probabilities%20and%20hiding%20architecture%2C%20parameters%2C%20gradients%2C%20and%20training%20data.%20This%20opacity%20prevents%20meaningful%20auditing%2C%20bias%20detection%2C%20and%20failure%20analysis.%20Existing%20explanation%20methods%20assume%20white-%20or%20gray-box%20access%20or%20knowledge%20of%20the%20training%20distribution%2C%20making%20them%20unusable%20in%20these%20real-world%20settings.%20We%20introduce%20UNBOX%2C%20a%20framework%20for%20class-wise%20model%20dissection%20under%20fully%20data-free%2C%20gradient-free%2C%20and%20backpropagation-free%20constraints.%20UNBOX%20leverages%20Large%20Language%20Models%20and%20text-to-image%20diffusion%20models%2 {"title": "SCOPE: Scene-Contextualized Incremental Few-Shot 3D Segmentation", "author": "Vishal Thengane and Zhaochong An and Tianjin Huang and Son Lam Phung and Abdesselam Bouzerdoum and Lu Yin and Na Zhao and Xiatian Zhu", "abstract": "Incremental Few-Shot (IFS) segmentation aims to learn new categories over time from only a few annotations. Although widely studied in 2D, it remains underexplored for 3D point clouds. Existing methods suffer from catastrophic forgetting or fail to learn discriminative prototypes under sparse supervision, and often overlook a key cue: novel categories frequently appear as unlabelled background in base-training scenes. We introduce SCOPE (Scene-COntextualised Prototype Enrichment), a plug-and-play background-guided prototype enrichment framework that integrates with any prototype-based 3D segmentation method. After base training, a class-agnostic segmentation model extracts high-confidence pseudo-instances from background regions to build a prototype pool. When novel classes arrive with few labelled samples, relevant background prototypes are retrieved and fused with few-shot prototypes to form enriched representations without retraining the backbone or adding parameters. Experiments on ScanNet and S3DIS show that SCOPE achieves SOTA performance, improving novel-class IoU by up to 6.98% and 3.61%, and mean IoU by 2.25% and 1.70%, respectively, while maintaining low forgetting. Code is available https://github.com/Surrey-UP-Lab/SCOPE.", "link": "http://arxiv.org/abs/2603.06572v2", "date": "2026-03-09", "relevancy": 2.9844, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6056}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6056}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation {"title": "M$^3$-ACE: Rectifying Visual Perception in Multimodal Math Reasoning via Multi-Agentic Context Engineering", "author": "Peijin Xie and Zhen Xu and Bingquan Liu and Baoxun Wang", "abstract": "Multimodal large language models have recently shown promising progress in visual mathematical reasoning. However, their performance is often limited by a critical yet underexplored bottleneck: inaccurate visual perception. Through systematic analysis, we find that the most failures originate from incorrect or incomplete visual evidence extraction rather than deficiencies in reasoning capability. Moreover, models tend to remain overly confident in their initial perceptions, making standard strategies such as prompt engineering, multi-round self-reflection, or posterior guidance insufficient to reliably correct errors.\n  To address this limitation, we propose M3-ACE, a multi-agentic context engineering framework designed to rectify visual perception in multimodal math reasoning. Instead of directly aggregating final answers, our approach decouples perception and reasoning by dynamically maintaining a shared context centered on visual evidence lists. Multiple agents collaboratively contribute complementary observations, enabling the system to expose inconsistencies and recover missing perceptual information. To support stable multi-turn collaboration, we further introduce two lightweight tools: a Summary Tool that organizes evidence from different agents into consistent, complementary, and conflicting components, and a Refine Tool that filters unreliable samples and guides iterative correction.\n  Extensive experiments demonstrate that M3-ACE substantially improves visual mathematical reasoning performance across multiple benchmarks. Our method establishes new state-of-the-art results 89.1 on the MathVision benchmark and achieves consistent improvements on other related datasets, including MathVista and MathVerse. These results highlight the importance of perception-centric multi-agent collaboration for advancing multimodal reasoning systems.", "link": "http://arxiv.org/abs/2603.08369v1", "date": "2026-03-09", "relevancy": 2.9776, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6011}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6011}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5844}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20M%24%5E3%24-ACE%3A%20Rectifying%20Visual%20Perception%20in%20Multimodal%20Math%20Reasoning%20via%20Multi-Agentic%20Context%20Engineering&body=Title%3A%20M%24%5E3%24-ACE%3A%20Rectifying%20Visual%20Perception%20in%20Multimodal%20Math%20Reasoning%20via%20Multi-Agentic%20Context%20Engineering%0AAuthor%3A%20Peijin%20Xie%20and%20Zhen%20Xu%20and%20Bingquan%20Liu%20and%20Baoxun%20Wang%0AAbstract%3A%20Multimodal%20large%20language%20models%20have%20recently%20shown%20promising%20progress%20in%20visual%20mathematical%20reasoning.%20However%2C%20their%20performance%20is%20often%20limited%20by%20a%20critical%20yet%20underexplored%20bottleneck%3A%20inaccurate%20visual%20perception.%20Through%20systematic%20analysis%2C%20we%20find%20that%20the%20most%20failures%20originate%20from%20incorrect%20or%20incomplete%20visual%20evidence%20extraction%20rather%20than%20deficiencies%20in%20reasoning%20capability.%20Moreover%2C%20models%20tend%20to%20remain%20overly%20confident%20in%20their%20initial%20perceptions%2C%20making%20standard%20strategies%20such%20as%20prompt%20engineering%2C%20multi-round%20self-reflection%2C%20or%20posterior%20guidance%20insufficient%20to%20reliably%20correct%20errors.%0A%20%20To%20address%20this%20limitation%2C%20we%20propose%20M3-ACE%2C%20a%20multi-agentic%20context%20engineering%20framework%20designed%20to%20rectify%20visual%20perception%20in%20multimodal%20math%20reasoning.%20Instead%20of%20directly%20aggregating%20final%20answers%2C%20our%20approach%20decouples%20perception%20and%20reasoning%20by%20dynamically%20maintaining%20a%20shared%20context%20centered%20on%20visual%20evidence%20lists.%20Multiple%20agents%20collaboratively%20contribute%20complementary%20observations%2C%20enabling%20the%20system%20to%20expose%20inconsistencies%20and%20recover%20missing%20perceptual%20information.%20To%20support%20stable%20multi-turn%20collaboration%2C%20we%20further%20introduce%20two%20lightweight%20tools%3A%20a%20Summary%20Tool%20that%20organizes%20evidence%20from%20different%20agents%20into%20consistent%2C%20complementary%2C%20and%20conflicting%20components%2C%20and%20a%20Refine%20Tool%20that%20filters%20unreliable%20samples%20and%20guides%20iterative%20correction.%0A%20%20Extensive%20experiments%20demonstrate%20that%20M3-ACE%20substantially%20improves%20visual%20mathematical%20reasoning%20performance%20across%20multiple%20benchmarks.%20Our%20method%20establishes%20new%20state-of-the-art%20results%2089.1%20on%20the%20MathVision%20benchmark%20and%20achieves%20consistent%20improvements%20on%20other%20related%20datasets%2C%20including%20MathVista%20and%20MathVerse.%20These%20results%20highlight%20the%20importance%20of%20perception-centric%20multi-agent%20collaboration%20for%20advancing%20multimodal%20reasoning%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08369v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DM%2524%255E3%2524-ACE%253A%2520Rectifying%2520Visual%2520Perception%2520in%2520Multimodal%2520Math%2520Reasoning%2520via%2520Multi-Agentic%2520Context%2520Engineering%26entry.906535625%3DPeijin%2520Xie%2520and%2520Zhen%2520Xu%2520and%2520Bingquan%2520Liu%2520and%2520Baoxun%2520Wang%26entry.1292438233%3DMultimodal%2520large%2520langua {"title": "GarmentPainter: Efficient 3D Garment Texture Synthesis with Character-Guided Diffusion Model", "author": "Jinbo Wu and Xiaobo Gao and Xing Liu and Chen Zhao and Jialun Liu", "abstract": "Generating high-fidelity, 3D-consistent garment textures remains a challenging problem due to the inherent complexities of garment structures and the stringent requirement for detailed, globally consistent texture synthesis. Existing approaches either rely on 2D-based diffusion models, which inherently struggle with 3D consistency, require expensive multi-step optimization or depend on strict spatial alignment between 2D reference images and 3D meshes, which limits their flexibility and scalability. In this work, we introduce GarmentPainter, a simple yet efficient framework for synthesizing high-quality, 3D-aware garment textures in UV space. Our method leverages a UV position map as the 3D structural guidance, ensuring texture consistency across the garment surface during texture generation. To enhance control and adaptability, we introduce a type selection module, enabling fine-grained texture generation for specific garment components based on a character reference image, without requiring alignment between the reference image and the 3D mesh. GarmentPainter efficiently integrates all guidance signals into the input of a diffusion model in a spatially aligned manner, without modifying the underlying UNet architecture. Extensive experiments demonstrate that GarmentPainter achieves state-of-the-art performance in terms of visual fidelity, 3D consistency, and computational efficiency, outperforming existing methods in both qualitative and quantitative evaluations.", "link": "http://arxiv.org/abs/2603.08228v1", "date": "2026-03-09", "relevancy": 2.9588, "topK": [{"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.8147}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.7056}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.6377}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GarmentPainter%3A%20Efficient%203D%20Garment%20Texture%20Synthesis%20with%20Character-Guided%20Diffusion%20Model&body=Title%3A%20GarmentPainter%3A%20Efficient%203D%20Garment%20Texture%20Synthesis%20with%20Character-Guided%20Diffusion%20Model%0AAuthor%3A%20Jinbo%20Wu%20and%20Xiaobo%20Gao%20and%20Xing%20Liu%20and%20Chen%20Zhao%20and%20Jialun%20Liu%0AAbstract%3A%20Generating%20high-fidelity%2C%203D-consistent%20garment%20textures%20remains%20a%20challenging%20problem%20due%20to%20the%20inherent%20complexities%20of%20garment%20structures%20and%20the%20stringent%20requirement%20for%20detailed%2C%20globally%20consistent%20texture%20synthesis.%20Existing%20approaches%20either%20rely%20on%202D-based%20diffusion%20models%2C%20which%20inherently%20struggle%20with%203D%20consistency%2C%20require%20expensive%20multi-step%20optimization%20or%20depend%20on%20strict%20spatial%20alignment%20between%202D%20reference%20images%20and%203D%20meshes%2C%20which%20limits%20their%20flexibility%20and%20scalability.%20In%20this%20work%2C%20we%20introduce%20GarmentPainter%2C%20a%20simple%20yet%20efficient%20framework%20for%20synthesizing%20high-quality%2C%203D-aware%20garment%20textures%20in%20UV%20space.%20Our%20method%20leverages%20a%20UV%20position%20map%20as%20the%203D%20structural%20guidance%2C%20ensuring%20texture%20consistency%20across%20the%20garment%20surface%20during%20texture%20generation.%20To%20enhance%20control%20and%20adaptability%2C%20we%20introduce%20a%20type%20selection%20module%2C%20enabling%20fine-grained%20texture%20generation%20for%20specific%20garment%20components%20based%20on%20a%20character%20reference%20image%2C%20without%20requiring%20alignment%20between%20the%20reference%20image%20and%20the%203D%20mesh.%20GarmentPainter%20efficiently%20integrates%20all%20guidance%20signals%20into%20the%20input%20of%20a%20diffusion%20model%20in%20a%20spatially%20aligned%20manner%2C%20without%20modifying%20the%20underlying%20UNet%20architecture.%20Extensive%20experiments%20demonstrate%20that%20GarmentPainter%20achieves%20state-of-the-art%20performance%20in%20terms%20of%20visual%20fidelity%2C%203D%20consistency%2C%20and%20computational%20efficiency%2C%20outperforming%20existing%20methods%20in%20both%20qualitative%20and%20quantitative%20evaluations.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08228v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGarmentPainter%253A%2520Efficient%25203D%2520Garment%2520Texture%2520Synthesis%2520with%2520Character-Guided%2520Diffusion%2520Model%26entry.906535625%3DJinbo%2520Wu%2520and%2520Xiaobo%2520Gao%2520and%2520Xing%2520Liu%2520and%2520Chen%2520Zhao%2520and%2520Jialun%2520Liu%26entry.1292438233%3DGenerating%2520high-fidelity%252C%25203D-consistent%2520garment%2520textures%2520remains%2520a%2520challenging%2520problem%2520due%2520to%2520the%2520inherent%2520complexities%2520of%2520garment%2520structures%2520and%2520the%2520stringent%2520requirement%2520for%2520detailed%252C%2520globally%2520consistent%2520texture%2520synthesis.%2520Existing%2520approaches%2520either%2520rely%2520on%25202D-based%2520diffusion%2520models%252C%2520which%2520inherently%2520struggle%2520with%25203D%2520consistency%252C%2520require%2520expensive%2520multi-step%2520optimization%2520or%2520depend%2520on%2520strict%2520spatial%2520alignment%2520between%25202D%2520reference%2520images%2520and%25203D%2520meshes%252C%2520which%2520limits%2520their%2520flexibility%2520and%2520scalability.%2520In%2520this%2520work%252C%2520we%2520introduce%2520GarmentPainter%252C%2520a%2520simple%2520yet%2520efficient%25 {"title": "Global Cross-Modal Geo-Localization: A Million-Scale Dataset and a Physical Consistency Learning Framework", "author": "Yutong Hu and Jinhui Chen and Chaoqiang Xu and Yuan Kou and Sili Zhou and Shaocheng Yan and Pengcheng Shi and Qingwu Hu and Jiayuan Li", "abstract": "Cross-modal Geo-localization (CMGL) matches ground-level text descriptions with geo-tagged aerial imagery, which is crucial for pedestrian navigation and emergency response. However, existing researches are constrained by narrow geographic coverage and simplistic scene diversity, failing to reflect the immense spatial heterogeneity of global architectural styles and topographic features. To bridge this gap and facilitate universal positioning, we introduce CORE, the first million-scale dataset dedicated to global CMGL. CORE comprises 1,034,786 cross-view images sampled from 225 distinct geographic regions across all continents, offering an unprecedented variety of perspectives in varying environmental conditions and urban layouts. We leverage the zero-shot reasoning of Large Vision-Language Models (LVLMs) to synthesize high-quality scene descriptions rich in discriminative cues. Furthermore, we propose a physical-law-aware network (PLANET) for cross-modal geo-localization. PLANET introduces a novel contrastive learning paradigm to guide textual representations in capturing the intrinsic physical signatures of satellite imagery. Extensive experiments across varied geographic regions demonstrate that PLANet significantly outperforms state-of-the-art methods, establishing a new benchmark for robust, global-scale geo-localization. The dataset and source code will be released at https://github.com/YtH0823/CORE.", "link": "http://arxiv.org/abs/2603.08491v1", "date": "2026-03-09", "relevancy": 2.9393, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6179}, {"tit %20cues.%20Furthermore%2C%20we%20propose%20a%20physical-law-aware%20network%20%28PLANET%29%20for%20cross-modal%20geo-localization.%20PLANET%20introduces%20a%20novel%20contrastive%20learning%20paradigm%20to%20guide%20textual%20representations%20in%20capturing%20the%20intrinsic%20physical%20signatures%20of%20satellite%20imagery.%20Extensive%20experiments%20across%20varied%20geographic%20regions%20demonstrate%20that%20PLANet%20significantly%20outperforms%20state-of-the-art%20methods%2C%20establishing%20a%20new%20benchmark%20for%20robust%2C%20global-scale%20geo-localization.%20The%20dataset%20and%20source%20code%20will%20be%20released%20at%20https%3A//github.com/YtH0823/CORE.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08491v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGlobal%2520Cross-Modal%2520Geo-Localization%253A%2520A%2520Million-Scale%2520Dataset%2520and%2520a%2520Physical%2520Consistency%2520Learning%2520Framework%26entry.906535625%3DYutong%2520Hu%2520and%2520Jinhui%2520Chen%2520and%2520Chaoqiang%2520Xu%2520and%2520Yuan%2520Kou%2520and%2520Sili%2520Zhou%2520and%2520Shaocheng%2520Yan%2520and%2520Pengcheng%2520Shi%2520and%2520Qingwu%2520Hu%2520and%2520Jiayuan%2520Li%26entry.1292438233%3DCross-modal%2520Geo-localization%2520%2528CMGL%2529%2520matches%2520ground-level%2520text%2520descriptions%2520with%2520geo-tagged%2520aerial%2520imagery%252C%2520which%2520is%2520crucial%2520for%2520pedestrian%2520navigation%2520and%2520emergency%2520response.%2520However%252C%2520existing%2520researches%2520are%2520constrained%2520by%2520narrow%2520geographic%2520coverage%2520and%2520simplistic%2520scene%2520diversity%252C%2520failing%2520to%2520reflect%2520the%2520immense%2520spatial%2520heterogeneity%2520of%2520global%2520architectural%2520styles%2520and%2520topographic%2520features.%2520To%2520bridge%2520this%2520gap%2520and%2520facilitate%2520universal%2520positioning%252C%2520we%2520introd {"title": "EndoSERV: A Vision-based Endoluminal Robot Navigation System", "author": "Junyang Wu and Fangfang Xie and Minghui Zhang and Hanxiao Zhang and Jiayuan Sun and Yun Gu and Guang-Zhong Yang", "abstract": "Robot-assisted endoluminal procedures are increasingly used for early cancer intervention. However, the intricate, narrow and tortuous pathways within the luminal anatomy pose substantial difficulties for robot navigation. Vision-based navigation offers a promising solution, but existing localization approaches are error-prone due to tissue deformation, in vivo artifacts and a lack of distinctive landmarks for consistent localization. This paper presents a novel EndoSERV localization method to address these challenges. It includes two main parts, \\textit{i.e.}, \\textbf{SE}gment-to-structure and \\textbf{R}eal-to-\\textbf{V}irtual mapping, and hence the name. For long-range and complex luminal structures, we divide them into smaller sub-segments and estimate the odometry independently. To cater for label insufficiency, an efficient transfer technique maps real image features to the virtual domain to use virtual pose ground truth. The training phases of EndoSERV include an offline pretraining to extract texture-agnostic features, and an online phase that adapts to real-world conditions. Extensive experiments based on both public and clinical datasets have been performed to demonstrate the effectiveness of the method even without any real pose labels.", "link": "http://arxiv.org/abs/2603.08324v1", "date": "2026-03-09", "relevancy": 2.8926, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.6221}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5652}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, {"title": "Retrieval-Augmented Anatomical Guidance for Text-to-CT Generation", "author": "Daniele Molino and Camillo Maria Caruso and Paolo Soda and Valerio Guarrasi", "abstract": "Text-conditioned generative models for volumetric medical imaging provide semantic control but lack explicit anatomical guidance, often resulting in outputs that are spatially ambiguous or anatomically inconsistent. In contrast, structure-driven methods ensure strong anatomical consistency but typically assume access to ground-truth annotations, which are unavailable when the target image is to be synthesized. We propose a retrieval-augmented approach for Text-to-CT generation that integrates semantic and anatomical information under a realistic inference setting. Given a radiology report, our method retrieves a semantically related clinical case using a 3D vision-language encoder and leverages its associated anatomical annotation as a structural proxy. This proxy is injected into a text-conditioned latent diffusion model via a ControlNet branch, providing coarse anatomical guidance while maintaining semantic flexibility. Experiments on the CT-RATE dataset show that retrieval-augmented generation improves image fidelity and clinical consistency compared to text-only baselines, while additionally enabling explicit spatial controllability, a capability inherently absent in such approaches. Further analysis highlights the importance of retrieval quality, with semantically aligned proxies yielding consistent gains across all evaluation axes. This work introduces a principled and scalable mechanism to bridge semantic conditioning and anatomical plausibility in volumetric medical image synthesis. Code will be released.", "link": "http://arxiv.org/abs/2603.08305v1", "date": "2026-03-09", "relevancy": 2.8525, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5742}, {"title": "CAT3D: Create Anything in 3 0baselines%2C%20while%20additionally%20enabling%20explicit%20spatial%20controllability%2C%20a%20capability%20inherently%20absent%20in%20such%20approaches.%20Further%20analysis%20highlights%20the%20importance%20of%20retrieval%20quality%2C%20with%20semantically%20aligned%20proxies%20yielding%20consistent%20gains%20across%20all%20evaluation%20axes.%20This%20work%20introduces%20a%20principled%20and%20scalable%20mechanism%20to%20bridge%20semantic%20conditioning%20and%20anatomical%20plausibility%20in%20volumetric%20medical%20image%20synthesis.%20Code%20will%20be%20released.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08305v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRetrieval-Augmented%2520Anatomical%2520Guidance%2520for%2520Text-to-CT%2520Generation%26entry.906535625%3DDaniele%2520Molino%2520and%2520Camillo%2520Maria%2520Caruso%2520and%2520Paolo%2520Soda%2520and%2520Valerio%2520Guarrasi%26entry.1292438233%3DText-conditioned%2520generative%2520models%2520for%2520volumetric%2520medical%2520imaging%2520provide%2520semantic%2520control%2520but%2520lack%2520explicit%2520anatomical%2520guidance%252C%2520often%2520resulting%2520in%2520outputs%2520that%2520are%2520spatially%2520ambiguous%2520or%2520anatomically%2520inconsistent.%2520In%2520contrast%252C%2520structure-driven%2520methods%2520ensure%2520strong%2520anatomical%2520consistency%2520but%2520typically%2520assume%2520access%2520to%2520ground-truth%2520annotations%252C%2520which%2520are%2520unavailable%2520when%2520the%2520target%2520image%2520is%2520to%2520be%2520synthesized.%2520We%2520propose%2520a%2520retrieval-augmented%2520approach%2520for%2520Text-to-CT%2520generation%2520that%2520integrates%2520semantic%2520and%2520anatomical%2520information%2520under%2520a%2520realistic%2520inference%2520setting.%2520Given%2520a%2520radiology%2520report%252C%2520our%2520method%2520retrieves%2520a%2520semantically%2520related%2520clinical%2520c {"title": "X-AVDT: Audio-Visual Cross-Attention for Robust Deepfake Detection", "author": "Youngseo Kim and Kwan Yun and Seokhyeon Hong and Sihun Cha and Colette Suhjung Koo and Junyong Noh", "abstract": "The surge of highly realistic synthetic videos produced by contemporary generative systems has significantly increased the risk of malicious use, challenging both humans and existing detectors. Against this backdrop, we take a generator-side view and observe that internal cross-attention mechanisms in these models encode fine-grained speech-motion alignment, offering useful correspondence cues for forgery detection. Building on this insight, we propose X-AVDT, a robust and generalizable deepfake detector that probes generator-internal audio-visual signals accessed via DDIM inversion to expose these cues. X-AVDT extracts two complementary signals: (i) a video composite capturing inversion-induced discrepancies, and (ii) an audio-visual cross-attention feature reflecting modality alignment enforced during generation. To enable faithful cross-generator evaluation, we further introduce MMDF, a new multimodal deepfake dataset spanning diverse manipulation types and rapidly evolving synthesis paradigms, including GANs, diffusion, and flow-matching. Extensive experiments demonstrate that X-AVDT achieves leading performance on MMDF and generalizes strongly to external benchmarks and unseen generators, outperforming existing methods with accuracy improved by 13.1%. Our findings highlight the importance of leveraging internal audio-visual consistency cues for robustness to future generators in deepfake detection.", "link": "http://arxiv.org/abs/2603.08483v1", "date": "2026-03-09", "relevancy": 2.8513, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5992}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5754}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5361}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20X-AVDT%3A%20Audio-Visual%20Cross-Attention%20for%20Robust%20Deepfake%20Detection&body=Title%3A%20X-AVDT%3A%20Audio-Visual%20Cross-Attention%20for%20Robust%20Deepfake%20Detection%0AAuthor%3A%20Youngseo%20Kim%20and%20Kwan%20Yun%20and%20Seokhyeon%20Hong%20and%20Sihun%20Cha%20and%20Colette%20Suhjung%20Koo%20and%20Junyong%20Noh%0AAbstract%3A%20The%20surge%20of%20highly%20realistic%20synthetic%20videos%20produced%20by%20contemporary%20generative%20systems%20has%20significantly%20increased%20the%20risk%20of%20malicious%20use%2C%20challenging%20both%20humans%20and%20existing%20detectors.%20Against%20this%20backdrop%2C%20we%20take%20a%20generator-side%20view%20and%20observe%20that%20internal%20cross-attention%20mechanisms%20in%20these%20models%20encode%20fine-grained%20speech-motion%20alignment%2C%20offering%20useful%20correspondence%20cues%20for%20forgery%20detection.%20Building%20on%20this%20insight%2C%20we%20propose%20X-AVDT%2C%20a%20robust%20and%20generalizable%20deepfake%20detector%20that%20probes%20generator-internal%20audio-visual%20signals%20accessed%20via%20DDIM%20inversion%20to%20expose%20these%20cues.%20X-AVDT%20extracts%20two%20complementary%20signals%3A%20%28i%29%20a%20video%20composite%20capturing%20inversion-induced%20discrepancies%2C%20and%20%28ii%29%20an%20audio-visual%20cross-attention%20feature%20reflecting%20modality%20alignment%20enforced%20during%20generation.%20To%20enable%20faithful%20cross-generator%20evaluation%2C%20we%20further%20introduce%20MMDF%2C%20a%20new%20multimodal%20deepfake%20dataset%20spanning%20diverse%20manipulation%20types%20and%20rapidly%20evolving%20synthesis%20paradigms%2C%20including%20GANs%2C%20diffusion%2C%20and%20flow-matching.%20Extensive%20experiments%20demonstrate%20that%20X-AVDT%20achieves%20leading%20performance%20on%20MMDF%20and%20generalizes%20strongly%20to%20external%20benchmarks%20and%20unseen%20generators%2C%20outperforming%20existing%20methods%20with%20accuracy%20improved%20by%2013.1%25.%20Our%20findings%20highlight%20the%20importance%20of%20leveraging%20internal%20audio-visual%20consistency%20cues%20for%20robustness%20to%20future%20generators%20in%20deepfake%20detection.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08483v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DX-AVDT%253A%2520Audio-Visual%2520Cross-Attention%2520for%2520Robust%2520Deepfake%2520Detection%26entry.906535625%3DYoungseo%2520Kim%2520and%2520Kwan%2520Yun%2520and%2520Seokhyeon%2520Hong%2520and%2520Sihun%2520Cha%2520and%2520Colette%2520Suhjung%2520Koo%2520and%2520Junyong%2520Noh%26entry.1292438233%3DThe%2520surge%2520of%2520highly%2520realistic%2520synthetic%2520videos%2520produced%2520by%2520contemporary%2520generative%2520systems%2520has%2520significantly%2520increased%2520the%2520risk%2520of%2520malicious%2520use%252C%2520challenging%2520both%2520humans%2520and%2520existing%2520detectors.%2520Against%2520this%2520backdrop%252C%2520we%2520take%2520a%2520generator-side%2520view%2520and%2520observe%2520that%2520internal%2520cross-attention%2520mechanisms%2520in%2520these%2520models%2520encode%2520fine-grained%2520speech-motion%2520alignment%252C%2520offering%2520useful%2520correspondence%2520cues%2520for%2520forgery%2520detection.%2520Building%2520on%2520this%2520insight%252C%2520we%2520propose%2520X-AVDT%252C%2520a%2520robust%2520and%2520generalizable%2520deepfake%2520detector%2520that%2520probes%2520generator-internal%2520audio-visual%2520signals%2520accessed%2520via%2520DDIM%2520inversion%2520to%2520expose%2520these%2520cues.%2520X-AVDT%2520extracts%2520two%2520complementary%2520signals%253A%2520%2528i%2529%2520a%2520video%2520composite%2520capturing%2520inversion-induced%2520discrepancies%252C%2520and%2520%2528ii%2529% {"title": "Concept-Guided Fine-Tuning: Steering ViTs away from Spurious Correlations to Improve Robustness", "author": "Yehonatan Elisha and Oren Barkan and Noam Koenigstein", "abstract": "Vision Transformers (ViTs) often degrade under distribution shifts because they rely on spurious correlations, such as background cues, rather than semantically meaningful features. Existing regularization methods, typically relying on simple foreground-background masks, which fail to capture the fine-grained semantic concepts that define an object (e.g., ``long beak'' and ``wings'' for a ``bird''). As a result, these methods provide limited robustness to distribution shifts. To address this limitation, we introduce a novel finetuning framework that steers model reasoning toward concept-level semantics. Our approach optimizes the model's internal relevance maps to align with spatially grounded concept masks. These masks are generated automatically, without manual annotation: class-relevant concepts are first proposed using an LLM-based, label-free method, and then segmented using a VLM. The finetuning objective aligns relevance with these concept regions while simultaneously suppressing focus on spurious background areas. Notably, this process requires only a minimal set of images and uses half of the dataset classes. Extensive experiments on five out-of-distribution benchmarks demonstrate that our method improves robustness across multiple ViT-based models. Furthermore, we show that the resulting relevance maps exhibit stronger alignment with semantic object parts, offering a scalable path toward more robust and interpretable vision models. Finally, we confirm that concept-guided masks provide more effective supervision for model robustness than conventional segmentation maps, supporting our central hypothesis.", "link": "http://arxiv.org/abs/2603.08309v1", "date": "2026-03-09", "relevancy": 2.8268, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5864}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5548}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5548}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Concept-Guided%20Fine-Tuning%3A%20Steering%20ViTs%20away%20from%20Spurious%20Correlations%20to%20Improve%20Robustness&body=Title%3A%20Concept-Guided%20Fine-Tuning%3A%20Steering%20ViTs%20away%20from%20Spurious%20Correlations%20to%20Improve%20Robustness%0AAuthor%3A%20Yehonatan%20Elisha%20and%20Oren%20Barkan%20and%20Noam%20Koenigstein%0AAbstract%3A%20Vision%20Transformers%20%28ViTs%29%20often%20degrade%20under%20distribution%20shifts%20because%20they%20rely%20on%20spurious%20correlations%2C%20such%20as%20background%20cues%2C%20rather%20than%20semantically%20meaningful%20features.%20Existing%20regularization%20methods%2C%20typically%20relying%20on%20simple%20foreground-background%20masks%2C%20which%20fail%20to%20capture%20the%20fine-grained%20semantic%20concepts%20that%20define%20an%20object%20%28e.g.%2C%20%60%60long%20beak%27%27%20and%20%60%60wings%27%27%20for%20a%20%60%60bird%27%27%29.%20As%20a%20result%2C%20these%20methods%20provide%20limited%20robustness%20to%20distribution%20shifts.%20To%20address%20this%20limitation%2C%20we%20introduce%20a%20novel%20finetuning%20framework%20that%20steers%20model%20reasoning%20toward%20concept-level%20semantics.%20Our%20approach%20optimizes%20the%20model%27s%20internal%20relevance%20maps%20to%20align%20with%20spatially%20grounded%20concept%20masks.%20These%20masks%20are%20generated%20automatically%2C%20without%20manual%20annotation%3A%20class-relevant%20concepts%20are%20first%20proposed%20using%20an%20LLM-based%2C%20label-free%20method%2C%20and%20then%20segmented%20using%20a%20VLM.%20The%20finetuning%20objective%20aligns%20relevance%20with%20these%20concept%20regions%20while%20simultaneously%20suppressing%20focus%20on%20spurious%20background%20areas.%20Notably%2C%20this%20process%20requires%20only%20a%20minimal%20set%20of%20images%20and%20uses%20half%20of%20the%20dataset%20classes.%20Extensive%20experiments%20on%20five%20out-of-distribution%20benchmarks%20demonstrate%20that%20our%20method%20improves%20robustness%20across%20multiple%20ViT-based%20models.%20Furthermore%2C%20we%20show%20that%20the%20resulting%20relevance%20maps%20exhibit%20stronger%20alignment%20with%20semantic%20object%20parts%2C%20offering%20a%20scalable%20path%20toward%20more%20robust%20and%20interpretable%20vision%20models.%20Finally%2C%20we%20confirm%20that%20concept-guided%20masks%20provide%20more%20effective%20supervision%20for%20model%20robustness%20than%20conventional%20segmentation%20maps%2C%20supporting%20our%20central%20hypothesis.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08309v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DConcept-Guided%2520Fine-Tuning%253A%2520Steering%2520ViTs%2520away%2520from%2520Spurious%2520Correlations%2520to%2520Improve%2520Robustness%26entry.906535625%3DYehonatan%2520Elisha%2520and%2520Oren%2520Barkan%2520and%2520Noam%2520Koenigstein%26entry.1292438233%3DVision%2520Transformers%2520%2528ViTs%2529%2520often%2520degrade%2520under%2520distribution%2520shifts%2520because%2520they%2520rely%2520on%2520spurious%2520correlations%252C%2520such%2520as%2520background%2520cues%252C%2520rather%2520than%2520semantically%2520meaningful%2520features.%2520Existing%2520regularization%2520methods%252C%2520typically%2520relying%2520on%2520simple%2520foreground-background%2520masks%252C%2520which%2520fail%2520to%2520capture%2520the%2520fine-grained%2520semantic%2520concepts%2520that%2520define%2520an%2520object%2520%2528e.g.%252C%2520%2560%2560long% {"title": "CrystaL: Spontaneous Emergence of Visual Latents in MLLMs", "author": "Yang Zhang and Danyang Li and Yuxuan Li and Xin Zhang and Tianyu Xie and Mingming Cheng and Xiang Li", "abstract": "Multimodal Large Language Models (MLLMs) have achieved remarkable performance by integrating powerful language backbones with large-scale visual encoders. Among these, latent Chain-of-Thought (CoT) methods enable implicit reasoning in continuous hidden states, facilitating seamless vision-language integration and faster inference. However, existing heuristically predefined supervision signals in latent CoT provide limited guidance for preserving critical visual information in intermediate latent states. To address this limitation, we propose CrystaL (Crystallized Latent Reasoning), a single-stage framework with two paths to process intact and corrupted images, respectively. By explicitly aligning the attention patterns and prediction distributions across the two paths, CrystaL crystallizes latent representations into task-relevant visual semantics, without relying on auxiliary annotations or external modules. Extensive experiments on perception-intensive benchmarks demonstrate that CrystaL consistently outperforms state-of-the-art baselines, achieving substantial gains in fine-grained visual understanding while maintaining robust reasoning capabilities.", "link": "http://arxiv.org/abs/2602.20980v2", "date": "2026-03-09", "relevancy": 2.8233, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5688}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5688}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5564}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5Bar ng%2520while%2520maintaining%2520robust%2520reasoning%2520capabilities.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.20980v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CrystaL%3A%20Spontaneous%20Emergence%20of%20Visual%20Latents%20in%20MLLMs&entry.906535625=Yang%20Zhang%20and%20Danyang%20Li%20and%20Yuxuan%20Li%20and%20Xin%20Zhang%20and%20Tianyu%20Xie%20and%20Mingming%20Cheng%20and%20Xiang%20Li&entry.1292438233=Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20have%20achieved%20remarkable%20performance%20by%20integrating%20powerful%20language%20backbones%20with%20large-scale%20visual%20encoders.%20Among%20these%2C%20latent%20Chain-of-Thought%20%28CoT%29%20methods%20enable%20implicit%20reasoning%20in%20continuous%20hidden%20states%2C%20facilitating%20seamless%20vision-language%20integration%20and%20faster%20inference.%20However%2C%20existing%20heuristically%20predefined%20supervision%20signals%20in%20latent%20CoT%20provide%20limited%20guidance%20for%20preserving%20critical%20visual%20information%20in%20intermediate%20latent%20states.%20To%20address%20this%20limitation%2C%20we%20propose%20CrystaL%20%28Crystallized%20Latent%20Reasoning%29%2C%20a%20single-stage%20framework%20with%20two%20paths%20to%20process%20intact%20and%20corrupted%20images%2C%20respectively.%20By%20explicitly%20aligning%20the%20attention%20patterns%20and%20prediction%20distributions%20across%20the%20two%20paths%2C%20CrystaL%20crystallizes%20latent%20representations%20into%20task-relevant%20visual%20semantics%2C%20without%20relying%20on%20auxiliary%20annotations%20or%20external%20modules.%20Extensive%20experiments%20on%20perception-intensive%20benchmarks%20demonstrate%20that%20CrystaL%20consistently%20outperforms%20state-of-the-art%20baselines%2C%20achieving%20substantial%20gains%20in%20fine-grained%20visual%20understanding%20while%20maintaining%20robust%20reasoning%20capabilities.&entry.1838667208=http%3A//arxiv.org/abs/2602.20980v2&entry.124074799=Read"},
{"title": "Local-Global Prompt Learning via Sparse Optimal Transport", "author": "Deniz Kizaro\u011flu and \u00dclku Tuncer K\u00fc\u00e7\u00fcktas and Emre \u00c7akmakyurdu and Alptekin Temizel", "abstract": "Few-shot adaptation of vision-language models (VLMs) like CLIP typically relies on learning textual prompts matched to global image embeddings. Recent works extend this paradigm by incorporating local image-text alignment to capture fine-grained visual cues, yet these approaches often select local regions independently for each prompt, leading to redundant local feature usage and prompt overlap. We propose SOT-GLP, which introduces a shared sparse patch support and balanced optimal transport allocation to explicitly partition salient visual regions among class-specific local prompts while preserving global alignment. Our method learns shared global prompts and class-specific local prompts. The global branch maintains standard image-text matching for robust category-level alignment. The local branch constructs a class-conditioned sparse patch set using V-V attention and aligns it to multiple class-specific prompts via balanced entropic optimal transport, yielding a soft partition of patches that prevents prompt overlap and collapse. We evaluate our method on two complementary objectives: (i) few-shot classification accuracy on 11 standard benchmarks and (ii) out-of-distribution (OOD) detection. On the standard 11-dataset benchmark with 16-shot ViT-B/16, SOT-GLP achieves 85.1% average accuracy, outperforming prior prompt-learning methods. We identify a distinct accuracy-robustness trade-off in prompt learning: while learnable projections optimize in-distribution fit, they alter the foundational feature space. We demonstrate that a projection-free local alignment preserves the native geometry of the CLIP manifold, yielding state-of-the-art OOD detection performance (94.2% AUC) that surpasses fully adapted models. Implementation available at: https://github.com/Deniz2304988/SOT-GLP", "link": "http://arxiv.org/abs/2603.08347v1", "date": "2026-03-09", "relevancy": 2.8216, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5948}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5523}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5459}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Local-Global%20Prompt%20Learning%20via%20Sparse%20Optimal%20Transport&body=Title%3A%20Local-Global%20Prompt%20Learning%20via%20Sparse%20Optimal%20Transport%0AAuthor%3A%20Deniz%20Kizaro%C4%9Flu%20and%20%C3%9Clku%20Tuncer%20K%C3%BC%C3%A7%C3%BCktas%20and%20Emre%20%C3%87akmakyurdu%20and%20Alptekin%20Temizel%0AAbstract%3A%20Few-shot%20adaptation%20of%20vision-language%20models%20%28VLMs%29%20like%20CLIP%20typically%20relies%20on%20learning%20textual%20prompts%20matched%20to%20global%20image%20embeddings.%20Recent%20works%20extend%20this%20paradigm%20by%20incorporating%20local%20image-text%20alignment%20to%20capture%20fine-grained%20visual%20cues%2C%20yet%20these%20approaches%20often%20select%20local%20regions%20independently%20for%20each%20prompt%2C%20leading%20to%20redundant%20local%20feature%20usage%20and%20prompt%20overlap.%20We%20propose%20SOT-GLP%2C%20which%20introduces%20a%20shared%20sparse%20patch%20support%20and%20balanced%20optimal%20transport%20allocation%20to%20explicitly%20partition%20salient%20visual%20regions%20among%20class-specific%20local%20prompts%20while%20preserving%20global%20alignment.%20Our%20method%20learns%20shared%20global%20prompts%20and%20class-specific%20local%20prompts.%20The%20global%20branch%20maintains%20standard%20image-text%20matching%20for%20robust%20category-level%20alignment.%20The%20local%20branch%20constructs%20a%20class-conditioned%20sparse%20patch%20set%20using%20V-V%20attention%20and%20aligns%20it%20to%20multiple%20class-specific%20prompts%20via%20balanced%20entropic%20optimal%20transport%2C%20yielding%20a%20soft%20partition%20of%20patches%20that%20prevents%20prompt%20overlap%20and%20collapse.%20We%20evaluate%20our%20method%20on%20two%20complementary%20objectives%3A%20%28i%29%20few-shot%20classification%20accuracy%20on%2011%20standard%20benchmarks%20and%20%28ii%29%20out-of-distribution%20%28OOD%29%20detection.%20On%20the%20standard%2011-dataset%20benchmark%20with%2016-shot%20ViT-B/16%2C%20SOT-GLP%20achieves%2085.1%25%20average%20accuracy%2C%20outperforming%20prior%20prompt-learning%20methods.%20We%20identify%20a%20distinct%20accuracy-robustness%20trade-off%20in%20prompt%20learning%3A%20while%20learnable%20projections%20optimize%20in-distribution%20fit%2C%20they%20alter%20the%20foundational%20feature%20space.%20We%20demonstrate%20that%20a%20projection-free%20local%20alignment%20preserves%20the%20native%20geometry%20of%20the%20CLIP%20manifold%2C%20yielding%20state-of-the-art%20OOD%20detection%20performance%20%2894.2%25%20AUC%29%20that%20surpasses%20fully%20adapted%20models.%20Implementation%20available%20at%3A%20https%3A//github.com/Deniz2304988/SOT-GLP%0ALink%3A%20http%3A//arxiv.org/abs/2603.08347v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLocal-Global%2520Prompt%2520Learning%2520via%2520Sparse%2520Optimal%2520Transport%26entry.906535625%3DDeniz%2520Kizaro%25C4%259Flu%2520and%2520%25C3%259Clku%2520Tuncer%2520K%25C3%25BC%25C3%25A7%25C3%25BCktas%2520and%2520Emre%2520%25C3%2587akmakyurdu%2520and%2520Alptekin%2520Temizel%26entry.1292438233%3DFew-shot%2520adaptation%2520of%2520vision-language%2520models%2520%2528VLMs%2529%2520like%2520CLIP%2520typically%2520relies%2520on%2520learning%2520textual%2520prompts%2520matched%2520to%2520global%2520image%2520

{"title": "Mem-T: Densifying Rewards for Long-Horizon Memory Agents", "author": "Yanwei Yue and Boci Peng and Xuanbo Fan and Jiaxin Guo and Qiankun Li and Yan Zhang", "abstract": "Memory agents, which depart from predefined memory-processing pipelines by endogenously managing the processing, storage, and retrieval of memories, have garnered increasing attention for their autonomy and adaptability. However, existing training paradigms remain constrained: agents often traverse long-horizon sequences of memory operations before receiving sparse and delayed rewards, which hinders truly end-to-end optimization of memory management policies. To address this limitation, we introduce Mem-T, an autonomous memory agent that interfaces with a lightweight hierarchical memory database to perform dynamic updates and multi-turn retrieval over streaming inputs. To effectively train long-horizon memory management capabilities, we further propose MoT-GRPO, a tree-guided reinforcement learning framework that transforms sparse terminal feedback into dense, step-wise supervision via memory operation tree backpropagation and hindsight credit assignment, thereby enabling the joint optimization of memory construction and retrieval. Extensive experiments demonstrate that Mem-T is (1) high-performing, surpassing frameworks such as A-Mem and Mem0 by up to $14.92\\%$, and (2) economical, operating on a favorable accuracy-efficiency Pareto frontier and reducing inference tokens per query by $\\sim24.45\\%$ relative to GAM without sacrificing performance.", "link": "http://arxiv.org/abs/2601.23014v2", "date": "2026-03-09", "relevancy": 2.5821, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5272}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.514}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5081}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mem-T%3A%20Densifying%20Rewards%20for%20Long-Horizon%20Memory%20Agents&body=Title%3A%20Mem-T%3A%20Densifying%20Rewards%20for%20Long-Horizon%20Memory%20Agents%0AAuthor%3A%20Yanwei%20Yue%20and%20Boci%20Peng%20and%20Xuanbo%20Fan%20and%20Jiaxin%20Guo%20and%20Qiankun%20Li%20and%20Yan%20Zhang%0AAbstract%3A%20Memory%20agents%2C%20which%20depart%20from%20predefined%20memory-processing%20pipelines%20by%20endogenously%20managing%20the%20processing%2C%20storage%2C%20and%20retrieval%20of%20memories%2C%20have%20garnered%20increasing%20attention%20for%20their%20autonomy%20and%20adaptability.%20However%2C%20existing%20training%20paradigms%20remain%20constrained%3A%20agents%20often%20traverse%20long-horizon%20sequences%20of%20memory%20operations%20before%20receiving%20sparse%20and%20delayed%20rewards%2C%20which%20hinders%20truly%20end-to-end%20optimization%20of%20memory%20management%20policies.%20To%20address%20this%20limitation%2C%20we%20introduce%20Mem-T%2C%20an%20autonomous%20memory%20agent%20that%20interfaces%20with%20a%20lightweight%20hierarchical%20memory%20database%20to%20perform%20dynamic%20updates%20and%20multi-turn%20retrieval%20over%20streaming%20inputs.%20To%20effectively%20train%20long-horizon%20memory%20management%20capabilities%2C%20we%20further%20propose%20MoT-GRPO%2C%20a%20tree-guided%20reinforcement%20learning%20framework%20that%20transforms%20sparse%20terminal%20feedback%20into%20dense%2C%20step-wise%20supervision%20via%20memory%20operation%20tree%20backpropagation%20and%20hindsight%20credit%20assignment%2C%20thereby%20enabling%20the%20joint%20optimization%20of%20memory%20construction%20and%20retrieval.%20Extensive%20experiments%20demonstrate%20that%20Mem-T%20is%20%281%29%20high-performing%2C%20surpassing%20frameworks%20such%20as%20A-Mem%20and%20Mem0%20by%20up%20to%20%2414.92%5C%25%24%2C%20and%20% {"title": "Delving into Cascaded Instability: A Lipschitz Continuity View on Image Restoration and Object Detection Synergy", "author": "Qing Zhao and Weijian Deng and Pengxu Wei and ZiYi Dong and Hannan Lu and Xiangyang Ji and Liang Lin", "abstract": "To improve detection robustness in adverse conditions (e.g., haze and low light), image restoration is commonly applied as a pre-processing step to enhance image quality for the detector. However, the functional mismatch between restoration and detection networks can introduce instability and hinder effective integration -- an issue that remains underexplored. We revisit this limitation through the lens of Lipschitz continuity, analyzing the functional differences between restoration and detection networks in both the input space and the parameter space. Our analysis shows that restoration networks perform smooth, continuous transformations, while object detectors operate with discontinuous decision boundaries, making them highly sensitive to minor perturbations. This mismatch introduces instability in traditional cascade frameworks, where even imperceptible noise from restoration is amplified during detection, disrupting gradient flow and hindering optimization. To address this, we propose Lipschitz-regularized object detection (LROD), a simple yet effective framework that integrates image restoration directly into the detector's feature learning, harmonizing the Lipschitz continuity of both tasks during training. We implement this framework as Lipschitz-regularized YOLO (LR-YOLO), extending seamlessly to existing YOLO detectors. Extensive experiments on haze and low-light benchmarks demonstrate that LR-YOLO consistently improves detection stability, optimization smoothness, and overall accuracy.", "link": "http://arxiv.org/abs/2510.24232v2", "date": "2026-03-09", "relevancy": 2.5671, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5159}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5155}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5088}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Delving%20into%20Cascaded%20Instability%3A%20A%20Lipschitz%20Continuity%20View%20on%20Image%20Restoration%20and%20Object%20Detection%20Synergy&body=Title%3A%20Delving%20into%20Cascaded%20Instability%3A%20A%20Lipschitz%20Continuity%20View%20on%20Image%20Restoration%20and%20Object%20Detection%20Synergy%0AAuthor%3A%20Qing%20Zhao%20and%20Weijian%20Deng%20and%20Pengxu%20Wei%20and%20ZiYi%20Dong%20and%20Hannan%20Lu%20and%20Xiangyang%20Ji%20and%20Liang%20Lin%0AAbstract%3A%20To%20improve%20detection%20robustness%20in%20adverse%20conditions%20%28e.g.%2C%20haze%20and%20low%20light%29%2C%20image%20restoration%20is%20commonly%20applied%20as%20a%20pre-processing%20step%20to%20enhance%20image%20quality%20for%20the%20detector.%20However%2C%20the%20functional%20mismatch%20between%20restoration%20and%20detection%20networks%20can%20introduce%20instability%20and%20hinder%20effective%20integration%20--%20an%20issue%20that%20remains%20underexplored.%20We%20revisit%20this%20limitation%20through%20the%20lens%20of%20Lipschitz%20continuity%2C%20analyzing%20the%20functional%20differences%20between%20restoration%20and%20detection%20networks%20in%20both%20the%20input%20space%20and%20the%20parameter%20space.%20Our%20analysis%20shows%20that%20restoration%20networks%20perform%20smooth%2C%20continuous%20transformations%2C%20while%20object%20detectors%20operate%20with%20discontinuous%20decision%20boundaries%2C%20making%20them%20highly%20sensitive%20to%20minor%20perturbations.%20This%20mismatch%20introduces%20instability%20in%20traditional%20cascade%20frameworks%2C%20where%20even%20imperceptible%20noise%20from%20restoration%20is%20amplified%20during%20detection%2C%20disrupting%20gradient%20flow%20and%20hindering%20optimization.%20To%20address%20this%2C%20we%20propose%20Lipschitz-regularized%20object%20detection%20%28LROD%29%2C%20a%20simple%20yet%20effective%20framework%20that%20integrates%20image%20restoration%20directly%20into%20the%20detector%27s%20feature%20learning%2C%20harmonizing%20the%20Lipschitz%20continuity%20of%20both%20tasks%20during%20training.%20We%20implement%20this%20framework%20as%20Lipschitz-regularized%20YOLO%20%28LR-YOLO%29%2C%20extending%20seamlessly%20to%20existing%20YOLO%20detectors.%20Extensive%20experiments%20on%20haze%20and%20low-light%20benchmarks%20demonstrate%20that%20LR-YOLO%20consistently%20improves%20detection%20stability%2C%20optimization%20smoothness%2C%20and%20overall%20accuracy.%0ALink%3A%20http%3A//arxiv.org/abs/2510.24232v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDelving%2520into%2520Cascaded%2520Instability%253A%2520A%2520Lipschitz%2520Continuity%2520View%2520on%2520Image%2520Restoration%2520and%2520Object%2520Detection%2520Synergy%26entry.906535625%3DQing%2520Zhao%2520and%2520Weijian%2520Deng%2520and%2520Pengxu%2520Wei%2520and%2520ZiYi%2520Dong%2520and%2520Hannan%2520Lu%2520and%2520Xiangyang%2520Ji%2520and%2520Liang%2520Lin%26entry.1292438233%3DTo%2520improve%2520detection%2520robustness%2520in%2520adverse%2520conditions%2520%2528e.g.%252C%2520haze%2520and%2520low%2520light%2529%252C%2520image%2520restoration%2520is%2520commonly%2520applied%2520as%2520a%2520pre-processing%2520step%2520to%2520enhance%2520image%2520quality%2520for%2520the%2520detector.%2520However%252C%2520the%2520functional%2520mismatch%2520between%2520restoration%2520and%2520detection%2520networks%2520can%2520introduce%2520instability%2520and%2520hinder%2520effective%2520integration%2520--%2520an%2520issue%2520that {"title": "GRADIEND: Feature Learning within Neural Networks Exemplified through Biases", "author": "Jonathan Drechsel and Steffen Herbold", "abstract": "AI systems frequently exhibit and amplify social biases, leading to harmful consequences in critical areas. This study introduces a novel encoder-decoder approach that leverages model gradients to learn a feature neuron encoding societal bias information such as gender, race, and religion. We show that our method can not only identify which weights of a model need to be changed to modify a feature, but even demonstrate that this can be used to rewrite models to debias them while maintaining other capabilities. We demonstrate the effectiveness of our approach across various model architectures and highlight its potential for broader applications.", "link": "http://arxiv.org/abs/2502.01406v4", "date": "2026-03-09", "relevancy": 2.5631, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5412}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5061}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4905}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GRADIEND%3A%20Feature%20Learning%20within%20Neural%20Networks%20Exemplified%20through%20Biases&body=Title%3A%20GRADIEND%3A%20Feature%20Learning%20within%20Neural%20Networks%20Exemplified%20through%20Biases%0AAuthor%3A%20Jonathan%20Drechsel%20and%20Steffen%20Herbold%0AAbstract%3A%20AI%20systems%20frequently%20exhibit%20and%20amplify%20social%20biases%2C%20leading%20to%20harmful%20consequences%20in%20critical%20areas.%20This%20study%20introduces%20a%20novel%20encoder-decoder%20approach%20that%20leverages%20model%20gradients%20to%20learn%20a%20feature%20neuron%2 {"title": "PCFEx: Point Cloud Feature Extraction for Graph Neural Networks", "author": "Abdullah Al Masud and Shi Xintong and Mondher Bouazizi and Ohtsuki Tomoaki", "abstract": "Graph neural networks (GNNs) have gained significant attention for their effectiveness across various domains. This study focuses on applying GNN to process 3D point cloud data for human pose estimation (HPE) and human activity recognition (HAR). We propose novel point cloud feature extraction (PCFEx) techniques to capture meaningful information at the point, edge, and graph levels of the point cloud by considering point cloud as a graph. Moreover, we introduce a GNN architecture designed to efficiently process these features. Our approach is evaluated on four most popular publicly available millimeter wave radar datasets, three for HPE and one for HAR. The results show substantial improvements, with significantly reduced errors in all three HPE benchmarks, and an overall accuracy of 98.8% in mmWave-based HAR, outperforming the existing state of the art models. This work demonstrates the great potential of feature extraction incorporated with GNN modeling approach to enhance the precision of point cloud processing.", "link": "http://arxiv.org/abs/2603.08540v1", "date": "2026-03-09", "relevancy": 2.5553, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5315}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5011}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5006}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PCFEx%3A%20Point%20Cloud%20Feature%20Extraction%20for%20Graph%20Neural%20Networks&body=Title%3A%20PCFEx%3A%20Point%20Cloud%20Feature%20Extraction%20for%20Graph%20Neural%20Networks%0AAuthor%3A%20Abdullah%20Al%20Masud%20and%20Shi%20Xintong%20and%20Mondher%20Bouazizi%20and%20Ohtsuki%20Tomoaki%0AAbstract%3A%20Graph%20neural%20networks%20%28GNNs%29%20have%20gained%20significant%20attention%20for%20their%20effectiveness%20across%20various%20domains.%20This%20study%20focuses%20on%20applying%20GNN%20to%20process%203D%20point%20cloud%20data%20for%20human%20pose%20estimation%20%28HPE%29%20and%20human%20activity%20recognition%20%28HAR%29.%20We%20propose%20novel%20point%20cloud%20feature%20extraction%20%28PCFEx%29%20techniques%20to%20capture%20meaningful%20information%20at%20the%20point%2C%20edge%2C%20and%20graph%20levels%20of%20the%20point%20cloud%20by%20considering%20point%20cloud%20as%20a%20graph.%20Moreover%2C%20we%20introduce%20a%20GNN%20architecture%20designed%20to%20efficiently%20process%20these%20features.%20Our%20approach%20is%20evaluated%20on%20four%20most%20popular%20publicly%20available%20millimeter%20wave%20radar%20datasets%2C%20three%20for%20HPE%20and%20one%20for%20HAR.%20The%20results%20show%20substantial%20improvements%2C%20with%20significantly%20reduced%20errors%20in%20all%20three%20HPE%20benchmarks%2C%20and%20an%20overall%20accuracy%20of%2098.8%25%20in%20mmWave-based%20HAR%2C%20outperforming%20the%20existing%20state%20of%20the%20art%20models.%20This%20work%20demonstrates%20the%20great%20potential%20of%20feature%20extraction%20incorporated%20with%20GNN%20modeling%20approach%20to%20enhance%20the%20precision%20of%20point%20cloud%20processing.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08540v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPCFEx%253A%2520Point%2520Cloud%2520Feature%2520Extraction%2520for%2520Graph%2520Neural%2520Networks%26entry.906535625%3DAbdullah%2520Al%2520Masud%2520and%2520Shi%2520Xintong%2520and%2520Mondher%2520Bouazizi%2520and%2520Ohtsuki%2520Tomoaki%26entry.1292438233%3DGraph%2 35625=Abdullah%20Al%20Masud%20and%20Shi%20Xintong%20and%20Mondher%20Bouazizi%20and%20Ohtsuki%20Tomoaki&entry.1292438233=Graph%20neural%20networks%20%28GNNs%29%20have%20gained%20significant%20attention%20for%20their%20effectiveness%20across%20various%20domains.%20This%20study%20focuses%20on%20applying%20GNN%20to%20process%203D%20point%20cloud%20data%20for%20human%20pose%20estimation%20%28HPE%29%20and%20human%20activity%20recognition%20%28HAR%29.%20We%20propose%20novel%20point%20cloud%20feature%20extraction%20%28PCFEx%29%20techniques%20to%20capture%20meaningful%20information%20at%20the%20point%2C%20edge%2C%20and%20graph%20levels%20of%20the%20point%20cloud%20by%20considering%20point%20cloud%20as%20a%20graph.%20Moreover%2C%20we%20introduce%20a%20GNN%20architecture%20designed%20to%20efficiently%20process%20these%20features.%20Our%20approach%20is%20evaluated%20on%20four%20most%20popular%20publicly%20available%20millimeter%20wave%20radar%20datasets%2C%20three%20for%20HPE%20and%20one%20for%20HAR.%20The%20results%20show%20substantial%20improvements%2C%20with%20significantly%20reduced%20errors%20in%20all%20three%20HPE%20benchmarks%2C%20and%20an%20overall%20accuracy%20of%2098.8%25%20in%20mmWave-based%20HAR%2C%20outperforming%20the%20existing%20state%20of%20the%20art%20models.%20This%20work%20demonstrates%20the%20great%20potential%20of%20feature%20extraction%20incorporated%20with%20GNN%20modeling%20approach%20to%20enhance%20the%20precision%20of%20point%20cloud%20processing.&entry.1838667208=http%3A//arxiv.org/abs/2603.08540v1&entry.124074799=Read"},
{"title": "TildeOpen LLM: Leveraging Curriculum Learning to Achieve Equitable Language Representation", "author": "Toms Bergmanis and Martins Kronis and Ingus J\u0101nis Pretkalni\u0146\u0161 and D\u0101vis Nicmanis and Je\u013cizaveta Je\u013cinska and Roberts Rozis and Rinalds V\u012bksna and M\u0101rcis Pinnis", "abstract": "Large language models often underperform in many European languages due to the dominance of English and a few high-resource languages in training data. This paper presents TildeOpen LLM, a 30-billion-parameter open-weight foundational model trained for 34 European languages to promote linguistic equity and improve performance for low-resource languages. To address the data imbalance, we combine dataset upsampling with a curriculum-based training schedule that alternates between uniform and natural language distributions. The resulting model performs favorably compared to other multilingual LLMs despite being trained with significantly fewer computing resources. Evaluation across multiple multilingual benchmarks shows that TildeOpen surpasses existing open-weight models in text generation and comprehension, particularly for Baltic, Finno-Ugric, and Slavic languages. Human evaluations confirm an up to tenfold reduction in linguistic errors relative to leading baselines. The model and associated resources are fully open-weight and publicly available at huggingface.co/TildeAI/TildeOpen-30b. These outcomes demonstrate that careful data curation and balanced training strategies can substantially enhance multilingual model quality without increasing model size or training volume.", "link": "http://arxiv.org/abs/2603.08182v1", "date": "2026-03-09", "relevancy": 2.5451, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5377}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4947}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4947}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TildeOpen%20LLM%3A%20Leveraging%20Curriculum%20Learning%20to%20Achieve%20Equitable%20Language%20Representation&body=Title%3A%20TildeOpen%20LLM%3A%20Leveraging%20Curriculum%20Learning%20to%20Achieve%20Equitable%20Language%20Representation%0AAuthor%3A%20Toms%20Bergmanis%20and%20Martins%20Kronis%20and%20Ingus%20J%C4%81nis%20Pretkalni%C5%86%C5%A1%20and%20D%C4%81vis%20Nicmanis%20and%20Je%C4%BCizaveta%20Je%C4%BCinska%20and%20Roberts%20Rozis%20and%20Rinalds%20V%C4%ABksna%20and%20M%C4%81rcis%20Pinnis%0AAbstract%3A%20Large%20language%20models%20often%20underperform%20in%20many%20European%20languages%20due%20to%20the%20dominance%20of%20English%20and%20a%20few%20high-resource%20languages%20in%20training%20data.%20This%20paper%20presents%20TildeOpen%20LLM%2C%20a%2030-billion-parameter%20open-weight%20foundational%20model%20trained%20for%2034%20European%20languages%20to%20promote%20linguistic%20equity%20and%20improve%20performance%20for%20low-resource%20languages.%20To%20address%20the%20data%20imbalance%2C%20we%20combine%20dataset%20upsampling%20with%20a%20curriculum-based%20training%20schedule%20that%20alternates%20between%20uniform%20and%20natural%20language%20distributions.%20The%20resulting%20model%20performs%20favorably%20compared%20to%20other%20multilingual%20LLMs%20despite%20being%20trained%20with%20significantly%20fewer%20computing%20resources.%20Evaluation%20across%20multiple%20multilingual%20benchmarks%20shows%20that%20TildeOpen%20surpasses%20existing%20open-weight%20models%20in%20text%20generation%20and%20comprehension%2C%20particularly%20for%20Baltic%2C%20Finno-Ugric%2C%20and%20Slavic%20languages.%20Human%20evaluations%20confirm%20an%20up%20to%20tenfold%20reduction%20in%20linguistic%20errors%20relative%20to% {"title": "One Model Is Enough: Native Retrieval Embeddings from LLM Agent Hidden States", "author": "Bo Jiang", "abstract": "LLM agents that retrieve external knowledge typically generate a search query as text, then run a separate embedding model to encode it into a vector. This two-model pipeline adds infrastructure complexity and latency, yet is redundant: the LLM already encodes the full conversational context in its hidden states. We propose equipping LLM agents with native retrieval capability by adding a lightweight projection head that maps hidden states directly into the embedding space, eliminating the need for a separate embedding model. Trained with a combination of alignment, contrastive, and rank distillation losses, our method retains 97\\% of baseline retrieval quality while enabling the LLM agent to search with its own representations. Experiments on the QReCC conversational search benchmark show competitive Recall@10 and MRR@10 compared to the standard generate-then-encode pipeline, with systematic ablations confirming the contribution of each loss component.", "link": "http://arxiv.org/abs/2603.08429v1", "date": "2026-03-09", "relevancy": 2.5309, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5161}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5161}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4863}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20One%20Model%20Is%20Enough%3A%20Native%20Retrieval%20Embeddings%20from%20LLM%20Agent%20Hidden%20States&body=Title%3A%20One%20Model%20Is%20Enough%3A%20Native%20Retrieval%20Embeddings%20from%20LLM%20Agent%20Hidden%20States%0AAuthor%3A%20Bo%20Jiang%0AAb {"title": "Exploring Embedding Priors in Prompt-Tuning for Improved Interpretability and Control", "author": "Sergey Sedov and Sumanth Bharadwaj Hachalli Karanam and Venu Gopal Kadamba", "abstract": "Prompt-Tuning is an efficient method for adapting pre-trained language models to new tasks with minimal computational overhead by modifying prompt embeddings. In this work, we investigate how crucial the phenomenon of embedding collapse, frequently observed in Prompt-Tuning, is for the final performance of the model. To address this question, we designed embedding priors and compared them with posteriors of the converged Soft and Deep Prompt-Tuning methods. Our findings suggest that priors strongly affect the position of the tuned embeddings, and models can effectively work with embeddings from different parts of activation spaces, including completely new regions. As the final Prompt-Tuning capabilities are limited, we hypothesize that controllable Prompt-Tuning posteriors may serve as a good starting point for tasks such as chain-of-thought (COT) distillation. Our experiments also show that generated trajectories are not localized in the activation space of the models. However, there are distinct clusters of activations for distant tasks (e.g., NLP and arithmetic), while activations between NLP tasks (e.g., Question-Answering and MLM) lie in the same cluster. These observations raise questions about the importance of a single activation cluster for the generalization abilities of large language models.", "link": "http://arxiv.org/abs/2412.18582v2", "date": "2026-03-09", "relevancy": 2.5146, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5077}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5077}, {"title": "TAMM: TriAdapter Multi-Modal Learning eddings%2C%20and%20models%20can%20effectively%20work%20with%20embeddings%20from%20different%20parts%20of%20activation%20spaces%2C%20including%20completely%20new%20regions.%20As%20the%20final%20Prompt-Tuning%20capabilities%20are%20limited%2C%20we%20hypothesize%20that%20controllable%20Prompt-Tuning%20posteriors%20may%20serve%20as%20a%20good%20starting%20point%20for%20tasks%20such%20as%20chain-of-thought%20%28COT%29%20distillation.%20Our%20experiments%20also%20show%20that%20generated%20trajectories%20are%20not%20localized%20in%20the%20activation%20space%20of%20the%20models.%20However%2C%20there%20are%20distinct%20clusters%20of%20activations%20for%20distant%20tasks%20%28e.g.%2C%20NLP%20and%20arithmetic%29%2C%20while%20activations%20between%20NLP%20tasks%20%28e.g.%2C%20Question-Answering%20and%20MLM%29%20lie%20in%20the%20same%20cluster.%20These%20observations%20raise%20questions%20about%20the%20importance%20of%20a%20single%20activation%20cluster%20for%20the%20generalization%20abilities%20of%20large%20language%20models.&entry.1838667208=http%3A//arxiv.org/abs/2412.18582v2&entry.124074799=Read"},
{"title": "ODI-Bench: Can MLLMs Understand Immersive Omnidirectional Environments?", "author": "Liu Yang and Huiyu Duan and Ran Tao and Juntao Cheng and Sijing Wu and Yunhao Li and Jing Liu and Xiongkuo Min and Guangtao Zhai", "abstract": "Omnidirectional images (ODIs) provide full 360x180 view which are widely adopted in VR, AR and embodied intelligence applications. While multi-modal large language models (MLLMs) have demonstrated remarkable performance on conventional 2D image and video understanding benchmarks, their ability to comprehend the immersive environments captured by ODIs remains largely unexplored. To address this gap, we first present ODI-Bench, a novel comprehensive benchmark specifically designed for omnidirectional image understanding. ODI-Bench contains 2,000 high-quality omnidirectional images and over 4,000 manually annotated question-answering (QA) pairs across 10 fine-grained tasks, covering both general-level and spatial-level ODI understanding. Extensive experiments are conducted to benchmark 20 representative MLLMs, including proprietary and open-source models, under both close-ended and open-ended settings. Experimental results reveal that current MLLMs still struggle to capture the immersive context provided by ODIs. To this end, we further introduce Omni-CoT, a training-free method which significantly enhances MLLMs' comprehension ability in the omnidirectional environment through chain-of-thought reasoning across both textual information and visual cues. Both the benchmark and the code will be released at https://github.com/ylylyl-sjtu/ODI-Bench.", "link": "http://arxiv.org/abs/2510.11549v2", "date": "2026-03-09", "relevancy": 2.4913, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6329}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.0375 we%20further%20introduce%20Omni-CoT%2C%20a%20training-free%20method%20which%20significantly%20enhances%20MLLMs%27%20comprehension%20ability%20in%20the%20omnidirectional%20environment%20through%20chain-of-thought%20reasoning%20across%20both%20textual%20information%20and%20visual%20cues.%20Both%20the%20benchmark%20and%20the%20code%20will%20be%20released%20at%20https%3A//github.com/ylylyl-sjtu/ODI-Bench.%0ALink%3A%20http%3A//arxiv.org/abs/2510.11549v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DODI-Bench%253A%2520Can%2520MLLMs%2520Understand%2520Immersive%2520Omnidirectional%2520Environments%253F%26entry.906535625%3DLiu%2520Yang%2520and%2520Huiyu%2520Duan%2520and%2520Ran%2520Tao%2520and%2520Juntao%2520Cheng%2520and%2520Sijing%2520Wu%2520and%2520Yunhao%2520Li%2520and%2520Jing%2520Liu%2520and%2520Xiongkuo%2520Min%2520and%2520Guangtao%2520Zhai%26entry.1292438233%3DOmnidirectional%2520images%2520%2528ODIs%2529%2520provide%2520full%2520360x180%2520view%2520which%2520are%2520widely%2520adopted%2520in%2520VR%252C%2520AR%2520and%2520embodied%2520intelligence%2520applications.%2520While%2520multi-modal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520have%2520demonstrated%2520remarkable%2520performance%2520on%2520conventional%25202D%2520image%2520and%2520video%2520understanding%2520benchmarks%252C%2520their%2520ability%2520to%2520comprehend%2520the%2520immersive%2520environments%2520captured%2520by%2520ODIs%2520remains%2520largely%2520unexplored.%2520To%2520address%2520this%2520gap%252C%2520we%2520first%2520present%2520ODI-Bench%252C%2520a%2520novel%2520comprehensive%2520benchmark%2520specifically%2520designed%2520for%2520omnidirectional%2520image%2520understanding.%2520ODI-Bench%2520contains%25202%252C000%2520high-quality%2520omnidirectional%2520images%2520and%2520over%25204%252C000%2520manually%2520annotated%2520question-answering%2520%2528QA%2529%2520pairs%2520across%252010%25 {"title": "Detecting Fake Reviewer Groups in Dynamic Networks: An Adaptive Graph Learning Method", "author": "Jing Zhang and Ke Huang and Yao Zhang and Bin Guo and Zhiwen Yu", "abstract": "The proliferation of fake reviews, often produced by organized groups, undermines consumer trust and fair competition on online platforms. These groups employ sophisticated strategies that evade traditional detection methods, particularly in cold-start scenarios involving newly launched products with sparse data. To address this, we propose the \\underline{D}iversity- and \\underline{S}imilarity-aware \\underline{D}ynamic \\underline{G}raph \\underline{A}ttention-enhanced \\underline{G}raph \\underline{C}onvolutional \\underline{N}etwork (DS-DGA-GCN), a new graph learning model for detecting fake reviewer groups. DS-DGA-GCN achieves robust detection since it focuses on the joint relationships among products, reviews, and reviewers by modeling product-review-reviewer networks. DS-DGA-GCN also achieves adaptive detection by integrating a Network Feature Scoring (NFS) system and a new dynamic graph attention mechanism. The NFS system quantifies network attributes, including neighbor diversity, network self-similarity, as a unified feature score. The dynamic graph attention mechanism improves the adaptability and computational efficiency by captures features related to temporal information, node importance, and global network structure. Extensive experiments conducted on two real-world datasets derived from Amazon and Xiaohongshu demonstrate that DS-DGA-GCN significantly outperforms state-of-the-art baselines, achieving accuracies of up to \\textbf{89.8\\% and 88.3\\%}, respectively.", "link": "http://arxiv.org/abs/2603.08332v1", "date": "2026-03-09", "relevancy": 2.4829, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5207}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Mo %20dynamic%20graph%20attention%20mechanism%20improves%20the%20adaptability%20and%20computational%20efficiency%20by%20captures%20features%20related%20to%20temporal%20information%2C%20node%20importance%2C%20and%20global%20network%20structure.%20Extensive%20experiments%20conducted%20on%20two%20real-world%20datasets%20derived%20from%20Amazon%20and%20Xiaohongshu%20demonstrate%20that%20DS-DGA-GCN%20significantly%20outperforms%20state-of-the-art%20baselines%2C%20achieving%20accuracies%20of%20up%20to%20%5Ctextbf%7B89.8%5C%25%20and%2088.3%5C%25%7D%2C%20respectively.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08332v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDetecting%2520Fake%2520Reviewer%2520Groups%2520in%2520Dynamic%2520Networks%253A%2520An%2520Adaptive%2520Graph%2520Learning%2520Method%26entry.906535625%3DJing%2520Zhang%2520and%2520Ke%2520Huang%2520and%2520Yao%2520Zhang%2520and%2520Bin%2520Guo%2520and%2520Zhiwen%2520Yu%26entry.1292438233%3DThe%2520proliferation%2520of%2520fake%2520reviews%252C%2520often%2520produced%2520by%2520organized%2520groups%252C%2520undermines%2520consumer%2520trust%2520and%2520fair%2520competition%2520on%2520online%2520platforms.%2520These%2520groups%2520employ%2520sophisticated%2520strategies%2520that%2520evade%2520traditional%2520detection%2520methods%252C%2520particularly%2520in%2520cold-start%2520scenarios%2520involving%2520newly%2520launched%2520products%2520with%2520sparse%2520data.%2520To%2520address%2520this%252C%2520we%2520propose%2520the%2520%255Cunderline%257BD%257Diversity-%2520and%2520%255Cunderline%257BS%257Dimilarity-aware%2520%255Cunderline%257BD%257Dynamic%2520%255Cunderline%257BG%257Draph%2520%255Cunderline%257BA%257Dttention-enhanced%2520%255Cunderline%257BG%257Draph%2520%255Cunderline%257BC%257Donvolutional%2520%255Cunderline%257BN%257Detwork%2520%2528DS-DGA-GCN%2529%252C%2520a%2520new%2520graph%2520learning%2520model%2520for%2520detecting {"title": "AltNet: Addressing the Plasticity-Stability Dilemma in Reinforcement Learning", "author": "Mansi Maheshwari and John C. Raisbeck and Bruno Castro da Silva", "abstract": "Artificial neural networks have shown remarkable success in supervised learning when trained on a single task using a fixed dataset. However, when neural networks are trained on a reinforcement learning task, their ability to continue learning from new experiences declines over time. This decline in learning ability is known as plasticity loss. To restore plasticity, prior work has explored periodically resetting the parameters of the learning network, a strategy that often improves performance. However, such resets come at the cost of a temporary drop in performance, which can be dangerous in real-world settings. To overcome this instability, we introduce AltNet, a reset-based approach that restores plasticity without performance degradation by leveraging a pair of twin networks. The use of twin networks anchors performance during resets through a mechanism that allows networks to periodically alternate roles: one network learns as it acts in the environment, while the other learns off-policy from the active network's interactions through a replay buffer. At fixed intervals, the active network is reset and the passive network, having learned from prior experience, becomes the new active network. AltNet restores plasticity, improving sample efficiency and achieving higher performance, while avoiding performance drops that pose risks in safety-critical settings. We demonstrate these advantages in several high-dimensional control tasks from the DeepMind Control Suite, where AltNet outperforms various relevant baseline methods, as well as state-of-the-art reset-based techniques.", "link": "http://arxiv.org/abs/2512.01034v3", "date": "2026-03-09", "relevancy": 2.4673, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5146}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5105}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4553}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AltNet%3A%20Addressing%20the%20Plasticity-Stability%20Dilemma%20in%20Reinforcement%20Learning&body=Title%3A%20AltNet%3A%20Addressing%20the%20Plasticity-Stability%20Dilemma%20in%20Reinforcement%20Learning%0AAuthor%3A%20Mansi%20Maheshwari%20and%20John%20C.%20Raisbeck%20and%20Bruno%20Castro%20da%20Silva%0AAbstract%3A%20Artificial%20neural%20networks%20have%20shown%20remarkable%20success%20in%20supervised%20learning%20when%20trained%20on%20a%20single%20task%20using%20a%20fixed%20dataset.%20However%2C%20when%20neural%20networks%20are%20trained%20on%20a%20reinforcement%20learning%20task%2C%20their%20ability%20to%20continue%20learning%20from%20new%20experiences%20declines%20over%20time.%20This%20decline%20in%20learning%20ability%20is%20known%20as%20plasticity%20loss.%20To%20restore%20plasticity%2C%20prior%20work%20has%20explored%20periodically%20resetting%20the%20parameters%20of%20the%20learning%20network%2C%20a%20strategy%20that%20often%20improves%20performance.%20However%2C%20such%20resets%20come%20at%20the%20cost%20of%20a%20temporary%20drop%20in%20performance%2C%20which%20can%20be%20dangerous%20in%20real-world%20settings.%20To%20overcome%20this%20instability%2C%20we%20introduce%20AltNet%2C%20a%20reset-based%20approach%20that%20restores%20plasticity%20without%20performance%20degradation%20by%20leveraging%20a%20pair%20of%20twin%20networks.%20The%20use%20of%20twin%20networks%20anchors%20performance%20during%20resets%20through%20a%20mechanism%20that%20allows%20networks%20to%20periodically%20alternate%20roles%3A%20one%20network%20learns%20as%20it%20acts%20in%20the%20environment%2C%20while%20the%20other%20learns%20off-policy%20from%20the%20active%20network%27s%20interactions%20through%20a%20replay%20buffer.%20At%20fixed%20intervals%2C%20the%20active%20network%20is%20reset%20and%20the%20passive%20network%2C%20having%20learned%20from%20prior%20experience%2C%20becomes%20the%20new%20active%20network.%20AltNet%20restores%20plasticity%2C%20improving%20sample%20efficiency%20and%20achieving%20higher%20performance%2C%20while%20avoiding%20performance%20drops%20that%20pose%20risks%20in%20safety-critical%20settings.%20We%20demonstrate%20these%20advantages%20in%20several%20high-dimensional%20control%20tasks%20from%20the%20DeepMind%20Control%20Suite%2C%20where%20AltNet%20outperforms%20various%20relevant%20baseline%20methods%2C%20as%20well%20as%20state-of-the-art%20reset-based%20techniques.%0ALink%3A%20http%3A//arxiv.org/abs/2512.01034v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAltNet%253A%2520Addressing%2520the%2520Plasticity-Stability%2520Dilemma%2520in%2520Reinforcement%2520Learning%26entry.906535625%3DMansi%2520Maheshwari%2520and%2520John%2520C.%2520Raisbeck%2520and%2520Bruno%2520Castro%2520da%2520Silva%26entry.1292438233%3DArtificial%2520neural%2520networks%2520have%2520shown%2520remarkable%2520success%2520in%2520supervised%2520learning%2520when%2520trained%2520on%2520a%2520single%2520task%2520using%2520a%2520fixed%2520dataset.%2520However%252C%2520when%2520neural%2520networks%2520are%2520trained%2520on%2520a%2520reinforcement%2520learning%2520task%252C%2520their%2520ability%2520to%2520continue%2520learning%2520from%2520new%2520experiences%2520declines%2520over%2520time.%2520This%2520decline%2520in%2520learning%2520ability%2520is%2520known%2520as%2520plasticity%2520loss.%2520To%2520restore%2520plasticity%252C%2520prior%2520work%2520has%2520explored%2520periodically%2520resetting%2520the%2520parameters%2520of%2520the%2520learning%2520network%252C%2520a%2520strategy%2520tha {"title": "SCL-GNN: Towards Generalizable Graph Neural Networks via Spurious Correlation Learning", "author": "Yuxiang Zhang and Enyan Dai", "abstract": "Graph Neural Networks (GNNs) have demonstrated remarkable success across diverse tasks. However, their generalization capability is often hindered by spurious correlations between node features and labels in the graph. Our analysis reveals that GNNs tend to exploit imperceptible statistical correlations in training data, even when such correlations are unreliable for prediction. To address this challenge, we propose the Spurious Correlation Learning Graph Neural Network (SCL-GNN), a novel framework designed to enhance generalization on both Independent and Identically Distributed (IID) and Out-of-Distribution (OOD) graphs. SCL-GNN incorporates a principled spurious correlation learning mechanism, leveraging the Hilbert-Schmidt Independence Criterion (HSIC) to quantify correlations between node representations and class scores. This enables the model to identify and mitigate irrelevant but influential spurious correlations effectively. Additionally, we introduce an efficient bi-level optimization strategy to jointly optimize modules and GNN parameters, preventing overfitting. Extensive experiments on real-world and synthetic datasets demonstrate that SCL-GNN consistently outperforms state-of-the-art baselines under various distribution shifts, highlighting its robustness and generalization capabilities.", "link": "http://arxiv.org/abs/2603.08270v1", "date": "2026-03-09", "relevancy": 2.4505, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5183}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4795}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4725}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SCL-GNN%3A%20Towards%20Generalizable%20Graph%20Neural%20Networks%20via%20Spurious%20Correlation%20Learning&body=Title%3A%20SCL-GNN%3A%20Towards%20Generalizable%20Graph%20Neural%20Networks%20via%20Spurious%20Correlation%20Learning%0AAuthor%3A%20Yuxiang%20Zhang%20and%20Enyan%20Dai%0AAbstract%3A%20Graph%20Neural%20Networks%20%28GNNs%29%20have%20demonstrated%20remarkable%20success%20across%20diverse%20tasks.%20However%2C%20their%20generalization%20capability%20is%20often%20hindered%20by%20spurious%20correlations%20between%20node%20features%20and%20labels%20in%20the%20graph.%20Our%20analysis%20reveals%20that%20GNNs%20tend%20to%20exploit%20imperceptible%20statistical%20correlations%20in%20training%20data%2C%20even%20when%20such%20correlations%20are%20unreliable%20for%20prediction.%20To%20address%20this%20challenge%2C%20we%20propose%20the%20Spurious%20Correlation%20Learning%20Graph%20Neural%20Network%20%28SCL-GNN%29%2C%20a%20novel%20framework%20designed%20to%20enhance%20generalization%20on%20both%20Independent%20and%20Identically%20Distributed%20%28IID%29%20and%20Out-of-Distribution%20%28OOD%29%20graphs.%20SCL-GNN%20incorporates%20a%20principled%20spurious%20correlation%20learning%20mechanism%2C%20leveraging%20the%20Hilbert-Schmidt%20Independence%20Criterion%20%28HSIC%29%20to%20quantify%20correlations%20between%20node%20representations%20and%20class%20scores.%20This%20enables%20the%20model%20to%20identify%20and%20mitigate%20irrelevant%20but%20influential%20spurious%20correlations%20effectively.%20Additionally%2C%20we%20introduce%20an%20efficient%20bi-level%20optimization%20strategy%20to%20jointly%20optimize%20modules%20and%20GNN%20parameters%2C%20preventing%20overfitting.%20Extensive%20experiments%20on%20real-world%20and%20synthetic%20datasets%20demonstrate%20that%20SCL-GNN%20consistently%20outperforms%20state-of-the-art%20baselines%20under%20various%20distribution%20shifts%2C%20highlighting%20its%20robustness%20and%20generalization% gy%2520to%2520jointly%2520optimize%2520modules%2520and%2520GNN%2520parameters%252C%2520preventing%2520overfitting.%2520Extensive%2520experiments%2520on%2520real-world%2520and%2520synthetic%2520datasets%2520demonstrate%2520that%2520SCL-GNN%2520consistently%2520outperforms%2520state-of-the-art%2520baselines%2520under%2520various%2520distribution%2520shifts%252C%2520highlighting%2520its%2520robustness%2520and%2520generalization%2520capabilities.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.08270v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SCL-GNN%3A%20Towards%20Generalizable%20Graph%20Neural%20Networks%20via%20Spurious%20Correlation%20Learning&entry.906535625=Yuxiang%20Zhang%20and%20Enyan%20Dai&entry.1292438233=Graph%20Neural%20Networks%20%28GNNs%29%20have%20demonstrated%20remarkable%20success%20across%20diverse%20tasks.%20However%2C%20their%20generalization%20capability%20is%20often%20hindered%20by%20spurious%20correlations%20between%20node%20features%20and%20labels%20in%20the%20graph.%20Our%20analysis%20reveals%20that%20GNNs%20tend%20to%20exploit%20imperceptible%20statistical%20correlations%20in%20training%20data%2C%20even%20when%20such%20correlations%20are%20unreliable%20for%20prediction.%20To%20address%20this%20challenge%2C%20we%20propose%20the%20Spurious%20Correlation%20Learning%20Graph%20Neural%20Network%20%28SCL-GNN%29%2C%20a%20novel%20framework%20designed%20to%20enhance%20generalization%20on%20both%20Independent%20and%20Identically%20Distributed%20%28IID%29%20and%20Out-of-Distribution%20%28OOD%29%20graphs.%20SCL-GNN%20incorporates%20a%20principled%20spurious%20correlation%20learning%20mechanism%2C%20leveraging%20the%20Hilbert-Schmidt%20Independence%20Criterion%20%28HSIC%29%20to%20quantify%20correlations%20between%20node%20representations%20and%20class%20scores.%20This%20enables%20the%20model%20to%20identify%20and%20mitigate%20irrelevant%20but%20influential%20spurious%20correlations%20effectively.%20Additionally%2C%20we%20introduce%20an%20efficient%20bi-level%20optimization%20strategy%20to%20jointly%20optimize%20modules%20and%20GNN%20parameters%2C%20preventing%20overfitting.%20Extensive%20experiments%20on%20real-world%20and%20synthetic%20datasets%20demonstrate%20that%20SCL-GNN%20consistently%20outperforms%20state-of-the-art%20baselines%20under%20various%20distribution%20shifts%2C%20highlighting%20its%20robustness%20and%20generalization%20capabilities.&entry.1838667208=http%3A//arxiv.org/abs/2603.08270v1&entry.124074799=Read"},
{"title": "Iterative Closed-Loop Motion Synthesis for Scaling the Capabilities of Humanoid Control", "author": "Weisheng Xu and Qiwei Wu and Jiaxi Zhang and Tan Jing and Yangfan Li and Yuetong Fang and Jiaqi Xiong and Kai Wu and Rong Ou and Renjing Xu", "abstract": "Physics-based humanoid control relies on training with motion datasets that have diverse data distributions. However, the fixed difficulty distribution of datasets limits the performance ceiling of the trained control policies. Additionally, the method of acquiring high-quality data through professional motion capture systems is constrained by costs, making it difficult to achieve large-scale scalability. To address these issues, we propose a closed-loop automated motion data generation and iterative framework. It can generate high-quality motion data with rich action semantics, including martial arts, dance, combat, sports, gymnastics, and more. Furthermore, our framework enables difficulty iteration of policies and data through physical metrics and objective evaluations, allowing the trained tracker to break through its original difficulty limits. On the PHC single-primitive tracker, using only approximately 1/10 of the AMASS dataset size, the average failure rate on the test set (2201 clips) is reduced by 45% compared to the baseline. Finally, we conduct comprehensive ablation and comparative experiments to highlight the rationality and advantages of our framework.", "link": "http://arxiv.org/abs/2602.21599v2", "date": "2026-03-09", "relevancy": 2.446, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6715}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5689}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.568}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Iterative%20Closed-Loop%20Motion%20Synthesis%20for%20Scaling%20the%20Capabilities%20of%20Humanoid%20Control&body=Title%3A%20Iterative%20Closed-Loop%20Motion%20Synthesis%20for%20Scaling%20the%20Capabilities%20of%20Humanoid%20Control%0AAuthor%3A%20Weisheng%20Xu%20and%20Qiwei%20Wu%20and%20Jiaxi%20Zhang%20and%20Tan%20Jing%20and%20Yangfan%20Li%20and%20Yuetong%20Fang%20and%20Jiaqi%20Xiong%20and%20Kai%20Wu%20and%20Rong%20Ou%20and%20Renjing%20Xu%0AAbstract%3A%20Physics-based%20humanoid%20control%20relies%20on%20training%20with%20motion%20datasets%20that%20have%20diverse%20data%20distributions.%20However%2C%20the%20fixed%20difficulty%20distribution%20of%20datasets%20limits%20the%20performance%20ceiling%20of%20the%20trained%20control%20policies.%20Additionally%2C%20the%20method%20of%20acquiring%20high-quality%20data%20through%20professional%20motion%20capture%20systems%20is%20constrained%20by%20costs%2C%20making%20it%20difficult%20to%20achieve%20large-scale%20scalability.%20To%20address%20these%20issues%2C%20we%20propose%20a%20closed-loop%20automated%20motion%20data%20generation%20and%20iterative%20framework.%20It%20can%20generate%20high-quality%20motion%20data%20with%20rich%20action%20semantics%2C%20including%20martial%20arts%2C%20dance%2C%20combat%2C%20sports%2C%20gymnastics%2C%20and%20more.%20Furthermore%2C%20our%20framework%20enables%20difficulty%20iteration%20of%20policies%20and%20data%20through%20physical%20metrics%20and%20objective%20evaluations%2C%20allowing%20the%20trained%20tracker%20to%20break%20through%20its%20original%20difficulty%20limits.%20On%20the%20PHC%20single-primitive%20tracker%2C%20using%20only%20approximately%201/10%20of%20the%20AMASS%20dataset%20size%2C%20the%20average%20failure%20rate%20on%20the%20test%20set%20%282201%20clips%29%20is%20reduced%20by%2045%25%20compared%20to%20the%20baseline.%20Finally%2C%20we%20conduct%20comprehensive%20ablation%20and%20comparative%20experiments%20to%20highlight%20the%20rationality%20and%20advantages%20of%20our%20framework.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21599v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIterative%2520Closed-Loop%2520Motion%2520Synthesis%2520for%2520Scaling%2520the%2520Capabilities%2520of%2520Humanoid%2520Control%26entry.906535625%3DWeisheng%2520Xu%2520and%2520Qiwei%2520Wu%2520and%2520Jiaxi%2520Zhang%2520and%2520Tan%2520Jing%2520and%2520Yangfan%2520Li%2520and%2520Yuetong%2520Fang%2520and%2520Jiaqi%2520Xiong%2520and%2520Kai%2520Wu%2520and%2520Rong%2520Ou%2520and%2520Renjing%2520Xu%26entry.1292438233%3DPhysics-based%2520humanoid%2520control%2520relies%2520on%2520training%2520with%2520motion%2520datasets%2520that%2520have%2520diverse%2520data%2520distributions.%2520However%252C%2520the%2520fixed%2520difficulty%2520distribution%2520of%2520datasets%2520limits%2520the%2520performance%2520ceiling%2520of%2520the%2520trained%2520control%2520policies.%2520Additionally%252C%2520the%2520method%2520of%2520acquiring%2520high-quality%2520data%2520through%2520professional%2520motion%2520capture%2520systems%2520is%2520constrained%2520by%2520costs%252C%2520making%2520it%2520difficult%2520to%2520achieve%2520large-scale%2520scalability.%2520To%2520address%2520these%2520issues%252C%2520we%2520propose%2520a%2520closed-loop%2520automated%2520motion%2520data%2520generation%2520and%2520iterative%2520framework.%2520It%2520can%2520generate%2520high-quality%2520motion%2520data%2520with%2520rich%2520action%2520semantics%252C%2520including%2520martial%2520arts%252C%2520dance%252C%2520combat%252C%2520sports%252C%2520gymnastics%252C%2520and%2520more.%2520Furthermore%252C%2520our%2520framework%2520enables%2520difficulty%2520iteration%2520of%2520policies%2520and%2520data%2520through%2520physical%2520metrics%2520and%2520objective%2520evaluations%252C%2520allowing%2520the%2520trained%2520tracker%2520to%2520break%2520through%2520its%2520original%2520difficulty%2520limits.%2520On%2520the%2520PHC%2520single-primitive%2520tracker%252C%2520using%2520only%2520approximately%25201/10%2520of%2520the%2520AMASS%2520dataset%2520size%252C%2520the%2520average%2520failure%2520rate%2520on%2520the%2520test%2520set%2520%25282201%2520clips%2529%2520is%2520reduced%2520by%252045%2525%2520compared%2520to%2520the%2520baseline.%2520Finally%252C%2520we%2520conduct%2520comprehensive%2520ablation%2520and%2520comparative%2520experiments%2520to%2520highlight%2520the%2520rationality%2520and%2520advantages%2520of%2520our%2520framework.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.21599v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Iterative%20Closed-Loop%20Motion%20Synthesis%20for%20Scaling%20the%20Capabilities%20of%20Humanoid%20Control&entry.906535625=Weisheng%20Xu%20and%20Qiwei%20Wu%20and%20Jiaxi%20Zhang%20and%20Tan%20Jing%20and%20Yangfan%20Li%20and%20Yuetong%20Fang%20and%20Jiaqi%20Xiong%20and%20Kai%20Wu%20and%20Rong%20Ou%20and%20Renjing%20Xu&entry.1292438233=Physics-based%20humanoid%20control%20relies%20on%20training%20with%20motion%20datasets%20that%20have%20diverse%20data%20distributions.%20However%2C%20the%20fixed%20difficulty%20distribution%20of%20datasets%20limits%20the%20performance%20ceiling%20of%20the%20trained%20control%20policies.%20Additionally%2C%20the%20method%20of%20acquiring%20high-quality%20data%20through%20professional%20motion%20capture%20systems%20is%20constrained%20by%20costs%2C%20making%20it%20difficult%20to%20achieve%20large-scale%20scalability.%20To%20address%20these%20issues%2C%20we%20propose%20a%20closed-loop%20automated%20motion%20data%20generation%20and%20iterative%20framework.%20It%20can%20generate%20high-quality%20motion%20data%20with%20rich%20action%20semantics%2C%20including%20martial%20arts%2C%20dance%2C%20combat%2C%20sports%2C%20gymnastics%2C%20and%20mo {"title": "FOMO-3D: Using Vision Foundation Models for Long-Tailed 3D Object Detection", "author": "Anqi Joyce Yang and James Tu and Nikita Dvornik and Enxu Li and Raquel Urtasun", "abstract": "In order to navigate complex traffic environments, self-driving vehicles must recognize many semantic classes pertaining to vulnerable road users or traffic control devices. However, many safety-critical objects (e.g., construction worker) appear infrequently in nominal traffic conditions, leading to a severe shortage of training examples from driving data alone. Recent vision foundation models, which are trained on a large corpus of data, can serve as a good source of external prior knowledge to improve generalization. We propose FOMO-3D, the first multi-modal 3D detector to leverage vision foundation models for long-tailed 3D detection. Specifically, FOMO-3D exploits rich semantic and depth priors from OWLv2 and Metric3Dv2 within a two-stage detection paradigm that first generates proposals with a LiDAR-based branch and a novel camera-based branch, and refines them with attention especially to image features from OWL. Evaluations on real-world driving data show that using rich priors from vision foundation models with careful multi-modal fusion designs leads to large gains for long-tailed 3D detection. Project website is at https://waabi.ai/fomo3d/.", "link": "http://arxiv.org/abs/2603.08611v1", "date": "2026-03-09", "relevancy": 2.4436, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6164}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6164}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5834}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FOMO-3D%3A%20Using%20Vision%20Foundation%20Models%20for%20Long-Tailed%203D%20Object%20Detection&body=Title%3A%20FOMO-3D%3A%20Using%20Vision%20Foundation%20Models%20for%20Long-Tailed%203D%20Object%20Detection%0AAuthor%3A%20Anqi%20Joyce%20Yang%20and%20James%20Tu%20and%20Nikita%20Dvornik%20and%20Enxu%20Li%20and%20Raquel%20Urtasun%0AAbstract%3A%20In%20order%20to%20navigate%20complex%20traffic%20environments%2C%20self-driving%20vehicles%20must%20recognize%20many%20semantic%20classes%20pertaining%20to%20vulnerable%20road%20users%20or%20traffic%20control%20devices.%20However%2C%20many%20safety-critical%20objects%20%28e.g.%2C%20construction%20worker%29%20appear%20infrequently%20in%20nominal%20traffic%20conditions%2C%20leading%20to%20a%20severe%20shortage%20of%20training%20examples%20from%20driving%20data%20alone.%20Recent%20vision%20foundation%20models%2C%20which%20are%20trained%20on%20a%20large%20corpus%20of%20data%2C%20can%20serve%20as%20a%20good%20source%20of%20external%20prior%20knowledge%20to%20improve%20generalization.%20We%20propose%20FOMO-3D%2C%20the%20first%20multi-modal%203D%20detector%20to%20leverage%20vision%20foundation%20models%20for%20long-tailed%203D%20detection.%20Specifically%2C%20FOMO-3D%20exploits%20rich%20semantic%20and%20depth%20priors%20from%20OWLv2%20and%20Metric3Dv2%20within%20a%20two-stage%20detection%20paradigm%20that%20first%20generates%20proposals%20with%20a%20LiDAR-based%20branch%20and%20a%20novel%20camera-based%20branch%2C%20and%20refines%20them%20with%20attention%20especially%20to%20image%20features%20from%20OWL.%20Evaluations%20on%20real-world%20driving%20data%20show%20that%20using%20rich%20priors%20from%20vision%20foundation%20models%20with%20careful%20multi-modal%20fusion%20designs%20leads%20to%20large%20gains%20for%20long-tailed%203D%20detection.%20Project%20website%20is%20at%20https%3A//waabi.ai/fomo3d/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08611v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFq oundation%2520models%2520with%2520careful%2520multi-modal%2520fusion%2520designs%2520leads%2520to%2520large%2520gains%2520for%2520long-tailed%25203D%2520detection.%2520Project%2520website%2520is%2520at%2520https%253A//waabi.ai/fomo3d/.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.08611v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=FOMO-3D%3A%20Using%20Vision%20Foundation%20Models%20for%20Long-Tailed%203D%20Object%20Detection&entry.906535625=Anqi%20Joyce%20Yang%20and%20James%20Tu%20and%20Nikita%20Dvornik%20and%20Enxu%20Li%20and%20Raquel%20Urtasun&entry.1292438233=In%20order%20to%20navigate%20complex%20traffic%20environments%2C%20self-driving%20vehicles%20must%20recognize%20many%20semantic%20classes%20pertaining%20to%20vulnerable%20road%20users%20or%20traffic%20control%20devices.%20However%2C%20many%20safety-critical%20objects%20%28e.g.%2C%20construction%20worker%29%20appear%20infrequently%20in%20nominal%20traffic%20conditions%2C%20leading%20to%20a%20severe%20shortage%20of%20training%20examples%20from%20driving%20data%20alone.%20Recent%20vision%20foundation%20models%2C%20which%20are%20trained%20on%20a%20large%20corpus%20of%20data%2C%20can%20serve%20as%20a%20good%20source%20of%20external%20prior%20knowledge%20to%20improve%20generalization.%20We%20propose%20FOMO-3D%2C%20the%20first%20multi-modal%203D%20detector%20to%20leverage%20vision%20foundation%20models%20for%20long-tailed%203D%20detection.%20Specifically%2C%20FOMO-3D%20exploits%20rich%20semantic%20and%20depth%20priors%20from%20OWLv2%20and%20Metric3Dv2%20within%20a%20two-stage%20detection%20paradigm%20that%20first%20generates%20proposals%20with%20a%20LiDAR-based%20branch%20and%20a%20novel%20camera-based%20branch%2C%20and%20refines%20them%20with%20attention%20especially%20to%20image%20features%20from%20OWL.%20Evaluations%20on%20real-world%20driving%20data%20show%20that%20using%20rich%20priors%20from%20vi {"title": "Don't Look Back in Anger: MAGIC Net for Streaming Continual Learning with Temporal Dependence", "author": "Federico Giannini and Sandro D'Andrea and Emanuele Della Valle", "abstract": "Concept drift, temporal dependence, and catastrophic forgetting represent major challenges when learning from data streams. While Streaming Machine Learning and Continual Learning (CL) address these issues separately, recent efforts in Streaming Continual Learning (SCL) aim to unify them. In this work, we introduce MAGIC Net, a novel SCL approach that integrates CL-inspired architectural strategies with recurrent neural networks to tame temporal dependence. MAGIC Net continuously learns, looks back at past knowledge by applying learnable masks over frozen weights, and expands its architecture when necessary. It performs all operations online, ensuring inference availability at all times. Experiments on synthetic and real-world streams show that it improves adaptation to new concepts, limits memory usage, and mitigates forgetting.", "link": "http://arxiv.org/abs/2603.08600v1", "date": "2026-03-09", "relevancy": 2.4312, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4915}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4884}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4788}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Don%27t%20Look%20Back%20in%20Anger%3A%20MAGIC%20Net%20for%20Streaming%20Continual%20Learning%20with%20Temporal%20Dependence&body=Title%3A%20Don%27t%20Look%20Back%20in%20Anger%3A%20MAGIC%20Net%20for%20Streaming%20Continual%20Learning%20with%20Temporal%20Dependence%0AAuthor%3A%20Federico%20Giannini%20and%20Sandro%20D%27Andrea%20and%20Emanuele%20Della%20Valle%0AAbstract%3A%20Concept%20drift%2C%20temporal%20dependence%2C%20and%20catastrophic%20forgetting%20represent%20major%20challenges%20when%20learning%20from%20data%20streams.%20While%20Streaming%20Machine%20Learning%20and%20Continual%20Learning%20%28CL%29%20address%20these%20issues%20separately%2C%20recent%20efforts%20in%20Streaming%20Continual%20Learning%20%28SCL%29%20aim%20to%20unify%20them.%20In%20this%20work%2C%20we%20introduce%20MAGIC%20Net%2C%20a%20novel%20SCL%20approach%20that%20integrates%20CL-inspired%20architectural%20strategies%20with%20recurrent%20neural%20networks%20to%20tame%20temporal%20dependence.%20MAGIC%20Net%20continuously%20learns%2C%20looks%20back%20at%20past%20knowledge%20by%20applying%20learnable%20masks%20over%20frozen%20weights%2C%20and%20expands%20its%20architecture%20when%20necessary.%20It%20performs%20all%20operations%20online%2C%20ensuring%20inference%20availability%20at%20all%20times.%20Experiments%20on%20synthetic%20and%20real-world%20streams%20show%20that%20it%20improves%20adaptation%20to%20new%20concepts%2C%20limits%20memory%20usage%2C%20and%20mitigates%20forgetting.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08600v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDon%2527t%2520Look%2520Back%2520in%2520Anger%253A%2520MAGIC%2520Net%2520for%2520Streaming%2520Continual%2520Learning%2520with%2520Temporal%2520Dependence%26entry.906535625%3DFederico%2520Giannini%2520and%2520Sandro%2520D%2527Andrea%2520and%2520Emanuele%2520Della%2520Valle%26entry.1292438233%3DConcept%2520drift%252C%2520temporal%2520dependence%252C%2520and%2520catastrophic%2520forgetting%2520represent%2520major%2520challenges%2520when%2520learning%2520from%2520data%2520streams.%2520While%2520Streaming%2520Machine%2520Learning%2520and%2520Continual%2520Learning%2520%2528CL%2529%2520address%2520these%2520issues%2520separately%252C%2520recent%2520efforts%2520in%2520Streaming%2520Continual%2520Learning%2520%2528SCL%25 uously%20learns%2C%20looks%20back%20at%20past%20knowledge%20by%20applying%20learnable%20masks%20over%20frozen%20weights%2C%20and%20expands%20its%20architecture%20when%20necessary.%20It%20performs%20all%20operations%20online%2C%20ensuring%20inference%20availability%20at%20all%20times.%20Experiments%20on%20synthetic%20and%20real-world%20streams%20show%20that%20it%20improves%20adaptation%20to%20new%20concepts%2C%20limits%20memory%20usage%2C%20and%20mitigates%20forgetting.&entry.1838667208=http%3A//arxiv.org/abs/2603.08600v1&entry.124074799=Read"},
{"title": "PRISM: Streaming Human Motion Generation with Per-Joint Latent Decomposition", "author": "Zeyu Ling and Qing Shuai and Teng Zhang and Shiyang Li and Bo Han and Changqing Zou", "abstract": "Text-to-motion generation has advanced rapidly, yet two challenges persist. First, existing motion autoencoders compress each frame into a single monolithic latent vector, entangling trajectory and per-joint rotations in an unstructured representation that downstream generators struggle to model faithfully. Second, text-to-motion, pose-conditioned generation, and long-horizon sequential synthesis typically require separate models or task-specific mechanisms, with autoregressive approaches suffering from severe error accumulation over extended rollouts.\n  We present PRISM, addressing each challenge with a dedicated contribution. (1) A joint-factorized motion latent space: each body joint occupies its own token, forming a structured 2D grid (time\n  joints) compressed by a causal VAE with forward-kinematics supervision. This simple change to the latent space -- without modifying the generator -- substantially improves generation quality, revealing that latent space design has been an underestimated bottleneck. (2) Noise-free condition injection: each latent token carries its own timestep embedding, allowing conditioning frames to be injected as clean tokens (timestep0) while the remaining tokens are denoised. This unifies text-to-motion and pose-conditioned generation in a single model, and directly enables autoregressive segment chaining for streaming synthesis. Self-forcing training further suppresses drift in long rollouts. With these two components, we train a single motion generation foundation model that seamlessly handles text-to-motion, pose-conditioned generation, autoregressive sequential generation, and narrative motion composition, achieving state-of-the-art on HumanML3D, MotionHub, BABEL, and a 50-scenario user study.", "link": "http://arxiv.org/abs/2603.08590v1", "date": "2026-03-09", "relevancy": 2.4223, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6378}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5831}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5823}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PRISM%3A%20Streaming%20Human%20Motion%20Generation%20with%20Per-Joint%20Latent%20Decomposition&body=Title%3A%20PRISM%3A%20Streaming%20Human%20Motion%20Generation%20with%20Per-Joint%20Latent%20Decomposition%0AAuthor%3A%20Zeyu%20Ling%20and%20Qing%20Shuai%20and%20Teng%20Zhang%20and%20Shiyang%20Li%20and%20Bo%20Han%20and%20Changqing%20Zou%0AAbstract%3A%20Text-to-motion%20generation%20has%20advanced%20rapidly%2C%20yet%20two%20challenges%20persist.%20First%2C%20existing%20motion%20autoencoders%20compress%20each%20frame%20into%20a%20single%20monolithic%20latent%20vector%2C%20entangling%20trajectory%20and%20per-joint%20rotations%20in%20an%20unstructured%20representation%20that%20downstream%20generators%20struggle%20to%20model%20faithfully.%20Second%2C%20text-to-motion%2C%20pose-conditioned%20generation%2C%20and%20long-horizon%20sequential%20synthesis%20typically%20require%20separate%20models%20or%20task-specific%20mechanisms%2C%20with%20autoregressive%20approaches%20suffering%20from%20severe%20error%20accumulation%20over%20extended%20rollouts.%0A%20%20We%20present%20PRISM%2C%20addressing%20each%20challenge%20with%20a%20dedicated%20contribution.%20%281%29%20A%20joint-factorized%20motion%20latent%20space%3A%20each%20body%20joint%20occupies%20its%20own%20token%2C%20forming%20a%20structured%202D%20grid%20%28time%0A%20%20joints%29%20compressed%20by%20a%20causal%20VAE%20with%20forward-kinematics%20supervision.%20This%20simple%20change%20to%20the%20latent%20space%20--%20without%20modifying%20the%20generator%20--%20substantially%20improves%20generation%20quality%2C%20revealing%20that%20latent%20space%20design%20has%20been%20an%20underestimated%20bottleneck.%20%282%29%20Noise-free%20condition%20injection%3A%20each%20latent%20token%20carries%20its%20own%20timestep%20embedding%2C%20allowing%20conditioning%20frames%20to%20be%20injected%20as%20clean%20tokens%20%28timestep0%29%20while%20the%20remaining%20tokens%20are%20denoised.%20This%20unifies%20text-to-motion%20and%20pose-conditioned%20generation%20in%20a%20single%20model%2C%20and%20directly%20enables%20autoregressive%20segment%20chaining%20for%20streaming%20synthesis.%20Self-forcing%20training%20further%20suppresses%20drift%20in%20long%20rollouts.%20With%20these%20two%20components%2C%20we%20train%20a%20single%20motion%20generation%20foundation%20model%20that%20seamlessly%20handles%20text-to-motion%2C%20pose-conditioned%20generation%2C%20autoregressive%20sequential%20generation%2C%20and%20narrative%20motion%20composition%2C%20achieving%20state-of-the-art%20on%20HumanML3D%2C%20MotionHub%2C%20BABEL%2C%20and%20a%2050-scenario%20user%20study.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08590v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPRISM%253A%2520Streaming%2520Human%2520Motion%2520Generation%2520with%2520Per-Joint%2520Latent%2520Decomposition%26entry.906535625%3DZeyu%2520Ling%2520and%2520Qing%2520Shuai%2520and%2520Teng%2520Zhang%2520and%2520Shiyang%2520Li%2520and%2520Bo%2520Han%2520and%2520Changqing%2520Zou%26entry.1292438233%3DText-to-motion%2520generation%2520has%2520advanced%2520rapidly%252C%2520yet%2520two%2520challenges%2520persist.%2520First%252C%2520existing%2520motion%2520autoencoders%2520compress%2520each%2520frame%2520into%2520a%2520single%2520monolithic%2520latent%2520vector%252C%2520entangling%2520trajectory%2520and%2520per-joint%2520rotations%25 {"title": "Generative Adversarial Regression (GAR): Learning Conditional Risk Scenarios", "author": "Saeed Asadi and Jonathan Yu-Meng Li", "abstract": "We propose Generative Adversarial Regression (GAR), a framework for learning conditional risk scenarios through generators aligned with downstream risk objectives. GAR builds on a regression characterization of conditional risk for elicitable functionals, including quantiles, expectiles, and jointly elicitable pairs. We extend this principle from point prediction to generative modeling by training generators whose policy-induced risk matches that of real data under the same context. To ensure robustness across all policies, GAR adopts a minimax formulation in which an adversarial policy identifies worst-case discrepancies in risk evaluation while the generator adapts to eliminate them. This structure preserves alignment with the risk functional across a broad class of policies rather than a fixed, pre-specified set. We illustrate GAR through a tail-risk instantiation based on jointly elicitable $(\\mathrm{VaR}, \\mathrm{ES})$ objectives. Experiments on S\\&P 500 data show that GAR produces scenarios that better preserve downstream risk than unconditional, econometric, and direct predictive baselines while remaining stable under adversarially selected policies.", "link": "http://arxiv.org/abs/2603.08553v1", "date": "2026-03-09", "relevancy": 2.4205, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.503}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4769}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4723}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generative%20Adversarial%20Regression%20%28GAR%29%3A%20Learning%20Conditional%20Risk%20Scenarios&body=T 26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.08553v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Generative%20Adversarial%20Regression%20%28GAR%29%3A%20Learning%20Conditional%20Risk%20Scenarios&entry.906535625=Saeed%20Asadi%20and%20Jonathan%20Yu-Meng%20Li&entry.1292438233=We%20propose%20Generative%20Adversarial%20Regression%20%28GAR%29%2C%20a%20framework%20for%20learning%20conditional%20risk%20scenarios%20through%20generators%20aligned%20with%20downstream%20risk%20objectives.%20GAR%20builds%20on%20a%20regression%20characterization%20of%20conditional%20risk%20for%20elicitable%20functionals%2C%20including%20quantiles%2C%20expectiles%2C%20and%20jointly%20elicitable%20pairs.%20We%20extend%20this%20principle%20from%20point%20prediction%20to%20generative%20modeling%20by%20training%20generators%20whose%20policy-induced%20risk%20matches%20that%20of%20real%20data%20under%20the%20same%20context.%20To%20ensure%20robustness%20across%20all%20policies%2C%20GAR%20adopts%20a%20minimax%20formulation%20in%20which%20an%20adversarial%20policy%20identifies%20worst-case%20discrepancies%20in%20risk%20evaluation%20while%20the%20generator%20adapts%20to%20eliminate%20them.%20This%20structure%20preserves%20alignment%20with%20the%20risk%20functional%20across%20a%20broad%20class%20of%20policies%20rather%20than%20a%20fixed%2C%20pre-specified%20set.%20We%20illustrate%20GAR%20through%20a%20tail-risk%20instantiation%20based%20on%20jointly%20elicitable%20%24%28%5Cmathrm%7BVaR%7D%2C%20%5Cmathrm%7BES%7D%29%24%20objectives.%20Experiments%20on%20S%5C%26P%20500%20data%20show%20that%20GAR%20produces%20scenarios%20that%20better%20preserve%20downstream%20risk%20than%20unconditional%2C%20econometric%2C%20and%20direct%20predictive%20baselines%20while%20remaining%20stable%20under%20adversarially%20selected%20policies.&entry.1838667208=http%3A//arxiv.org/abs/2603.08553v1&entry.124074799=Read"},
{"title": "BNEM: A Boltzmann Sampler Based on Bootstrapped Noised Energy Matching", "author": "RuiKang OuYang and Bo Qiang and Jos\u00e9 Miguel Hern\u00e1ndez-Lobato", "abstract": "Developing an efficient sampler capable of generating independent and identically distributed (IID) samples from a Boltzmann distribution is a crucial challenge in scientific research, e.g. molecular dynamics. In this work, we intend to learn neural samplers given energy functions instead of data sampled from the Boltzmann distribution. By learning the energies of the noised data, we propose a diffusion-based sampler, Noised Energy Matching, which theoretically has lower variance and more complexity compared to related works. Furthermore, a novel bootstrapping technique is applied to NEM to balance between bias and variance. We evaluate NEM and BNEM on a 2-dimensional 40 Gaussian Mixture Model (GMM) and a 4-particle double-well potential (DW-4). The experimental results demonstrate that BNEM can achieve state-of-the-art performance while being more robust.", "link": "http://arxiv.org/abs/2409.09787v5", "date": "2026-03-09", "relevancy": 2.4056, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5362}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4604}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4468}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BNEM%3A%20A%20Boltzmann%20Sampler%20Based%20on%20Bootstrapped%20Noised%20Energy%20Matching&body=Title%3A%20BNEM%3A%20A%20Boltzmann%20Sampler%20Based%20on%20Bootstrapped%20Noised%20Energy%20Matching%0AAuthor%3A%20RuiKang%20OuYang%20and%20Bo%20Qiang%20and%20Jos%C3%A9%20Miguel%20Hern%C3%A1ndez-Lobato%0AAbstract%3A%20Developing%20an%20efficient%20sampler%20capable%20of%20generating%20independent%20and%20identically%20distributed%20%28IID%29%20samples%20from%20a%20Boltzmann%20distribution%20is%20a%20crucial%20challenge%20in%20scientific%20research%2C%20e.g.%20molecular%20dynamics.%20In%20this%20work%2C%20we%20intend%20to%20learn%20neural%20samplers%20given%20energy%20functions%20instead%20of%20data%20sampled%20from%20the%20Boltzmann%20distribution.%20By%20learning%20the%20energies%20of%20the%20noised%20data%2C%20we%20propose%20a%20diffusion-based%20sampler%2C%20Noised%20Energy%20Matching%2C%20which%20theoretically%20has%20lower%20variance%20and%20more%20complexity%20compared%20to%20related%20works.%20Furthermore%2C%20a%20novel%20bootstrapping%20technique%20is%20applied%20to%20NEM%20to%20balance%20between%20bias%20and%20variance.%20We%20evaluate%20NEM%20and%20BNEM%20on%20a%202-dimensional%2040%20Gaussian%20Mixture%20Model%20%28GMM%29%20and%20a%204-particle%20double-well%20potential%20%28DW-4%29.%20The%20experimental%20results%20demonstrate%20that%20BNEM%20can%20achieve%20state-of-the-art%20performance%20while%20being%20more%20robust.%0ALink%3A%20http%3A//arxiv.org/abs/2409.09787v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBNEM%253A%2520A%2520Boltzmann%2520Sampler%2520Based%2520on%2520Bootstrapped%2520Noised%2520Energy%2520Matching%26entry.906535625%3DRuiKang%2520OuYang%2520and%2520Bo%2520Qiang%2520and%2520Jos%25C3%25A9%2520Miguel%2520Hern%25C3%25A1ndez-Lobato%26entry.1292438233%3DDeveloping%2520an%2520efficient%2520sampler%2520capable%2520of%2520generating%2520independent%2520and%2520identically%2520distributed%2520%2528IID%2529%2520samples%2520from%2520a%2520Boltzmann%2520distribution%2520is%2520a%2520crucial%2520challenge%2520in%2520scientific%2520research%252C%2520e.g.%2520molecular%2520dynamics.%2520In%2520this%2520work%252C%2520we%2520intend%2520to%2520learn%2520neural%

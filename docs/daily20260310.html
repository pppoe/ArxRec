{"title": "VOIC: Visible-Occluded Integrated Guidance for 3D Semantic Scene Completion", "author": "Zaidao Han and Risa Higashita and Jiang Liu", "abstract": "Camera-based 3D Semantic Scene Completion (SSC) is a critical task for autonomous driving and robotic scene understanding. It aims to infer a complete 3D volumetric representation of both semantics and geometry from a single image. Existing methods typically focus on end-to-end 2D-to-3D feature lifting and voxel completion. However, they often overlook the interference between high-confidence visible-region perception and low-confidence occluded-region reasoning caused by single-image input, which can lead to feature dilution and error propagation.\n  To address these challenges, we introduce an offline Visible Region Label Extraction (VRLE) strategy that explicitly separates and extracts voxel-level supervision for visible regions from dense 3D ground truth. This strategy purifies the supervisory space for two complementary sub-tasks: visible-region perception and occluded-region reasoning. Building on this idea, we propose the Visible-Occluded Interactive Completion Network (VOIC), a novel dual-decoder framework that explicitly decouples SSC into visible-region semantic perception and occluded-region scene completion. VOIC first constructs a base 3D voxel representation by fusing image features with depth-derived occupancy. The visible decoder focuses on generating high-fidelity geometric and semantic priors, while the occlusion decoder leverages these priors together with cross-modal interaction to perform coherent global scene reasoning.\n  Extensive experiments on the SemanticKITTI and SSCBench-KITTI360 benchmarks demonstrate that VOIC outperforms existing monocular SSC methods in both geometric completion and semantic segmentation accuracy, achieving state-of-the-art performance.", "link": "http://arxiv.org/abs/2512.18954v2", "date": "2026-03-09", "relevancy": 2.4044, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6113}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6113}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.55}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VOIC%3A%20Visible-Occluded%20Integrated%20Guidance%20for%203D%20Semantic%20Scene%20Completion&body=Title%3A%20VOIC%3A%20Visible-Occluded%20Integrated%20Guidance%20for%203D%20Semantic%20Scene%20Completion%0AAuthor%3A%20Zaidao%20Han%20and%20Risa%20Higashita%20and%20Jiang%20Liu%0AAbstract%3A%20Camera-based%203D%20Semantic%20Scene%20Completion%20%28SSC%29%20is%20a%20critical%20task%20for%20autonomous%20driving%20and%20robotic%20scene%20understanding.%20It%20aims%20to%20infer%20a%20complete%203D%20volumetric%20representation%20of%20both%20semantics%20and%20geometry%20from%20a%20single%20image.%20Existing%20methods%20typically%20focus%20on%20end-to-end%202D-to-3D%20feature%20lifting%20and%20voxel%20completion.%20However%2C%20they%20often%20overlook%20the%20interference%20between%20high-confidence%20visible-region%20perception%20and%20low-confidence%20occluded-region%20reasoning%20caused%20by%20single-image%20input%2C%20which%20can%20lead%20to%20feature%20dilution%20and%20error%20propagation.%0A%20%20To%20address%20these%20challenges%2C%20we%20introduce%20an%20offline%20Visible%20Region%20Label%20Extraction%20%28VRLE%29%20strategy%20that%20explicitly%20separates%20and%20extracts%20voxel-level%20supervision%20for%20visible%20regions%20from%20dense%203D%20ground%20truth.%20This%20strategy%20purifies%20the%20supervisory%20space%20for%20two%20complementary%20sub-tasks%3A%20visible-region%20perception%20and%20occluded-region%20reasoning.%20Building%20on%20this%20idea%2C%20we%20propose%20the%20Visible-Occluded%20Interactive%20Completion%20Network%20%28VOIC%29%2C%20a%20novel%20dual-decoder%20framework%20that%20explicitly%20decouples%20SSC%20into%20visible-region%20semantic%20perception%20and%20occluded-region%20scene%20completion.%20VOIC%20first%20constructs%20a%20base%203D%20voxel%20representation%20by%20fusing%20image%20features%20with%20depth-derived%20occupancy.%20The%20visible%20decoder%20focuses%20on%20generating%20high-fidelity%20geometric%20and%20semantic%20priors%2C%20while%20the%20occlusion%20decoder%20leverages%20these%20priors%20together%20with%20cross-modal%20interaction%20to%20perform%20coherent%20global%20scene%20reasoning.%0A%20%20Extensive%20experiments%20on%20the%20SemanticKITTI%20and%20SSCBench-KITTI360%20benchmarks%20demonstrate%20that%20VOIC%20outperforms%20existing%20monocular%20SSC%20methods%20in%20both%20geometric%20completion%20and%20semantic%20segmentation%20accuracy%2C%20achieving%20state-of-the-art%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2512.18954v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVOIC%253A%2520Visible-Occluded%2520Integrated%2520Guidance%2520for%25203D%2520Semantic%2520Scene%2520Completion%26entry.906535625%3DZaidao%2520Han%2520and%2520Risa%2520Higashita%2520and%2520Jiang%2520Liu%26entry.1292438233%3DCamera-based%25203D%2520Semantic%2520Scene%2520Completion%2520%2528SSC%2529%2520is%2520a%2520critical%2520task%2520for%2520autonomous%2520driving%2520and%2520robotic%2520scene%2520understanding.%2520It%2520aims%2520to%2520infer%2520a%2520complete%25203D%2520volumetric%2520representation%2520of%2520both%2520semantics%2520and%2520geometry%2520from%2520a%2520single%2520image.%2520Existing%2520methods%2520typically%2520focus%2520on%2520end-to-end%25202D-to-3D%2520feature%2520lifting%2520and%2520voxel%2520completion.%2520However%252C%2520they%2520often%2520overlook%2520the%2520interference%2520betwe {"title": "Embedding Ontologies via Incorporating Extensional and Intensional Knowledge", "author": "Keyu Wang and Guilin Qi and Jiaoyan Chen and Yi Huang and Tianxing Wu", "abstract": "Ontologies contain rich knowledge within domain, which can be divided into two categories, namely extensional knowledge and intensional knowledge. Extensional knowledge provides information about the concrete instances that belong to specific concepts in the ontology, while intensional knowledge details inherent properties, characteristics, and semantic associations among concepts. However, existing ontology embedding approaches fail to take both extensional knowledge and intensional knowledge into fine consideration simultaneously. In this paper, we propose a novel ontology embedding approach named EIKE (Extensional and Intensional Knowledge Embedding) by representing ontologies in two spaces, called extensional space and intensional space. EIKE presents a unified framework for embedding instances, concepts and their relations in an ontology, applying a geometry-based method to model extensional knowledge and a pretrained language model to model intensional knowledge, which can capture both structure information and textual information. Experimental results show that EIKE significantly outperforms state-of-the-art methods in three datasets for both triple classification and link prediction, indicating that EIKE provides a more comprehensive and representative perspective of the domain.", "link": "http://arxiv.org/abs/2402.01677v6", "date": "2026-03-09", "relevancy": 2.3997, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4921}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4921}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "li {"title": "The Neural Compass: Probabilistic Relative Feature Fields for Robotic Search", "author": "Gabriele Somaschini and Adrian R\u00f6fer and Abhinav Valada", "abstract": "Object co-occurrences provide a key cue for finding objects successfully and efficiently in unfamiliar environments. Typically, one looks for cups in kitchens and views fridges as evidence of being in a kitchen. Such priors have also been exploited in artificial agents, but they are typically learned from explicitly labeled data or queried from language models. It is still unclear whether these relations can be learned implicitly from unlabeled observations alone. In this work, we address this problem and propose ProReFF, a feature field model trained to predict relative distributions of features obtained from pre-trained vision language models. In addition, we introduce a learning-based strategy that enables training from unlabeled and potentially contradictory data by aligning inconsistent observations into a coherent relative distribution. For the downstream object search task, we propose an agent that leverages predicted feature distributions as a semantic prior to guide exploration toward regions with a high likelihood of containing the object. We present extensive evaluations demonstrating that ProReFF captures meaningful relative feature distributions in natural scenes and provides insight into the impact of our proposed alignment step. We further evaluate the performance of our search agent in 100 challenges in the Matterport3D simulator, comparing with feature-based baselines and human participants. The proposed agent is 20% more efficient than the strongest baseline and achieves up to 80% of human performance.", "link": "http://arxiv.org/abs/2603.08544v1", "date": "2026-03-09", "relevancy": 2.3944, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity" {"title": "Event-based Motion & Appearance Fusion for 6D Object Pose Tracking", "author": "Zhichao Li and Chiara Bartolozzi and Lorenzo Natale and Arren Glover", "abstract": "Object pose tracking is a fundamental and essential task for robotics to perform tasks in the home and industrial settings. The most commonly used sensors to do so are RGB-D cameras, which can hit limitations in highly dynamic environments due to motion blur and frame-rate constraints. Event cameras have remarkable features such as high temporal resolution and low latency, which make them a potentially ideal vision sensors for object pose tracking at high speed. Even so, there are still only few works on 6D pose tracking with event cameras. In this work, we take advantage of the high temporal resolution and propose a method that uses both a propagation step fused with a pose correction strategy. Specifically, we use 6D object velocity obtained from event-based optical flow for pose propagation, after which, a template-based local pose correction module is utilized for pose correction. Our learning-free method has comparable performance to the state-of-the-art algorithms, and in some cases out performs them for fast-moving objects. The results indicate the potential for using event cameras in highly-dynamic scenarios where the use of deep network approaches are limited by low update rates.", "link": "http://arxiv.org/abs/2603.08264v1", "date": "2026-03-09", "relevancy": 2.3936, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6168}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5857}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5842}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=% {"title": "ClearDepth: Enhanced Stereo Perception of Transparent Objects for Robotic Manipulation", "author": "Kaixin Bai and Huajian Zeng and Lei Zhang and Yiwen Liu and Hongli Xu and Zhaopeng Chen and Jianwei Zhang", "abstract": "Transparent object depth perception poses a challenge in everyday life and logistics, primarily due to the inability of standard 3D sensors to accurately capture depth on transparent or reflective surfaces. This limitation significantly affects depth map and point cloud-reliant applications, especially in robotic manipulation. We developed a vision transformer-based algorithm for stereo depth recovery of transparent objects. This approach is complemented by an innovative feature post-fusion module, which enhances the accuracy of depth recovery by structural features in images. To address the high costs associated with dataset collection for stereo camera-based perception of transparent objects, our method incorporates a parameter-aligned, domain-adaptive, and physically realistic Sim2Real simulation for efficient data generation, accelerated by AI algorithm. Our experimental results demonstrate the model's exceptional Sim2Real generalizability in real-world scenarios, enabling precise depth mapping of transparent objects to assist in robotic manipulation. Project details are available at https://sites.google.com/view/cleardepth/ .", "link": "http://arxiv.org/abs/2409.08926v3", "date": "2026-03-09", "relevancy": 2.3898, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5978}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5978}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5958}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ClearDepth%3A%20Enhanced%20Stereo%20Perception%20of%20Transparent%20Objects%20for%20Robotic%20Manipulation&body=Title%3A%20ClearDepth%3A%20Enhanced%20Stereo%20Perception%20of%20Transparent%20Objects%20for%20Robotic%20Manipulation%0AAuthor%3A%20Kaixin%20Bai%20and%20Huajian%20Zeng%20and%20Lei%20Zhang%20and%20Yiwen%20Liu%20and%20Hongli%20Xu%20and%20Zhaopeng%20Chen%20and%20Jianwei%20Zhang%0AAbstract%3A%20Transparent%20object%20depth%20perception%20poses%20a%20challenge%20in%20everyday%20life%20and%20logistics%2C%20primarily%20due%20to%20the%20inability%20of%20standard%203D%20sensors%20to%20accurately%20capture%20depth%20on%20transparent%20or%20reflective%20surfaces.%20This%20limitation%20significantly%20affects%20depth%20map%20and%20point%20cloud-reliant%20applications%2C%20especially%20in%20robotic%20manipulation.%20We%20developed%20a%20vision%20transformer-based%20algorithm%20for%20stereo%20depth%20recovery%20of%20transparent%20objects.%20This%20approach%20is%20complemented%20by%20an%20innovative%20feature%20post-fusion%20module%2C%20which%20enhances%20the%20accuracy%20of%20depth%20recovery%20by%20structural%20features%20in%20images.%20To%20address%20the%20high%20costs%20associated%20with%20dataset%20collection%20for%20stereo%20camera-based%20perception%20of%20transparent%20objects%2C%20our%20method%20incorporates%20a%20parameter-aligned%2C%20domain-adaptive%2C%20and%20physically%20realistic%20Sim2Real%20simulation%20for%20efficient%20data%20generation%2C%20accelerated%20by%20AI%20algorithm.%20Our%20experimental%20results%20demonstrate%20the%20model%27s%20exceptional%20Sim2Real%20generalizability%20in%20real-world%20scenarios%2C%20enabling%20precise%20depth%20mapping%20of%20transparent%20objects%20to%20assist%20in%20robotic%20manipulation.%20Project%20details%20are%20available%20at%20https%3A//sites.google.com/view/cleardepth/%20.%0ALink%3A%20http%3A//arxiv.org/abs/2409.08926v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUP lation.%20Project%20details%20are%20available%20at%20https%3A//sites.google.com/view/cleardepth/%20.&entry.1838667208=http%3A//arxiv.org/abs/2409.08926v3&entry.124074799=Read"},
{"title": "Echo2ECG: Enhancing ECG Representations with Cardiac Morphology from Multi-View Echos", "author": "Michelle Espranita Liman and \u00d6zg\u00fcn Turgut and Alexander M\u00fcller and Eimo Martens and Daniel Rueckert and Philip M\u00fcller", "abstract": "Electrocardiography (ECG) is a low-cost, widely used modality for diagnosing electrical abnormalities like atrial fibrillation by capturing the heart's electrical activity. However, it cannot directly measure cardiac morphological phenotypes, such as left ventricular ejection fraction (LVEF), which typically require echocardiography (Echo). Predicting these phenotypes from ECG would enable early, accessible health screening. Existing self-supervised methods suffer from a representational mismatch by aligning ECGs to single-view Echos, which only capture local, spatially restricted anatomical snapshots. To address this, we propose Echo2ECG, a multimodal self-supervised learning framework that enriches ECG representations with the heart's morphological structure captured in multi-view Echos. We evaluate Echo2ECG as an ECG feature extractor on two clinically relevant tasks that fundamentally require morphological information: (1) classification of structural cardiac phenotypes across three datasets, and (2) retrieval of Echo studies with similar morphological characteristics using ECG queries. Our extracted ECG representations consistently outperform those of state-of-the-art unimodal and multimodal baselines across both tasks, despite being 18x smaller than the largest baseline. These results demonstrate that Echo2ECG is a robust, powerful ECG feature extractor. Our code is accessible at https://github.com/michelleespranita/Echo2ECG.", "link": "http://arxiv.org/abs/2603.08505v1", "date": "2026-03-09", "relevancy": 2.3866, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4944}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4748}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4627}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Echo2ECG%3A%20Enhancing%20ECG%20Representations%20with%20Cardiac%20Morphology%20from%20Multi-View%20Echos&body=Title%3A%20Echo2ECG%3A%20Enhancing%20ECG%20Representations%20with%20Cardiac%20Morphology%20from%20Multi-View%20Echos%0AAuthor%3A%20Michelle%20Espranita%20Liman%20and%20%C3%96zg%C3%BCn%20Turgut%20and%20Alexander%20M%C3%BCller%20and%20Eimo%20Martens%20and%20Daniel%20Rueckert%20and%20Philip%20M%C3%BCller%0AAbstract%3A%20Electrocardiography%20%28ECG%29%20is%20a%20low-cost%2C%20widely%20used%20modality%20for%20diagnosing%20electrical%20abnormalities%20like%20atrial%20fibrillation%20by%20capturing%20the%20heart%27s%20electrical%20activity.%20However%2C%20it%20cannot%20directly%20measure%20cardiac%20morphological%20phenotypes%2C%20such%20as%20left%20ventricular%20ejection%20fraction%20%28LVEF%29%2C%20which%20typically%20require%20echocardiography%20%28Echo%29.%20Predicting%20these%20phenotypes%20from%20ECG%20would%20enable%20early%2C%20accessible%20health%20screening.%20Existing%20self-supervised%20methods%20suffer%20from%20a%20representational%20mismatch%20by%20aligning%20ECGs%20to%20single-view%20Echos%2C%20which%20only%20capture%20local%2C%20spatially%20restricted%20anatomical%20snapshots.%20To%20address%20this%2C%20we%20propose%20Echo2ECG%2C%20a%20multimodal%20self-supervised%20learning%20framework%20that%20enriches%20ECG%20representations%20with%20the%20heart%27s%20morphological%20structure%20captured%20in%20multi-view%20Echos.%20We%20evaluate%20Echo2ECG%20as%20an%20ECG%20feature%20extractor%20on%20two%20clinically%20relevant%20tasks%20that%20fundamentally%20require%20morphological%20information%3A%20%281%29%20classification%20of%20structural%20cardiac%20phenotypes%20across%20three%20datasets%2C%20and%20%282%29%20retrieval%20of%20Echo%20studies%20with%20similar%20morphological%20characteristics%20using%20ECG%20queries.%20Our%20extracted%20ECG%20representations%20consistently%20outperform%20those%20of%20state-of-the-art%20unimodal%20and%20multimodal%20baselines%20across%20both%20tasks%2C%20despite%20being%2018x%20smaller%20than%20the%20largest%20baseline.%20These%20results%20demonstrate%20that%20Echo2ECG%20is%20a%20robust%2C%20powerful%20ECG%20feature%20extractor.%20Our%20code%20is%20accessible%20at%20https%3A//github.com/michelleespranita/Echo2ECG.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08505v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEcho2ECG%253A%2520Enhancing%2520ECG%2520Representations%2520with%2520Cardiac%2520Morphology%2520from%2520Multi-View%2520Echos%26entry.906535625%3DMichelle%2520Espranita%2520Liman%2520and%2520%25C3%2596zg%25C3%25BCn%2520Turgut%2520and%2520Alexander%2520M%25C3%25BCller%2520and%2520Eimo%2520Martens%2520and%2520Daniel%2520Rueckert%2520and%2520Philip%2520M%25C3%25BCller%26entry.1292438233%3DElectrocardiography%2520%2528ECG%2529%2520is%2520a%2520low-cost%252C%2520widely%2520used%2520modality%2520for%2520diagnosing%2520electrical%2520abnormalities%2520like%2520atrial%2520fibrillation%2520by%2520capturing%2520the%2520heart%2527s%2520electrical%2520activity.%2520However%252C%2520it%2520cannot%2520directly%2520measure%2520cardiac%2520morphological%2520phenotypes%252C%2520such%2520as%2520left%2520ventricular%2520ejection%2520fraction%2520%2528LVEF%2529%252C%2520which%2520typically%2520require%2520echocardiography%2520%2528Echo%2529.%2520Predicting%2520these%2520phenotypes%2520from%2520ECG%2520would%2520enable%2520early%252C%2520accessible%2520health%2520screening.%2520Existing%2520self-supervised%2520methods%2520suffer%2520from%2520a%2520representat {"title": "OVGGT: O(1) Constant-Cost Streaming Visual Geometry Transformer", "author": "Si-Yu Lu and Po-Ting Chen and Hui-Che Hsu and Sin-Ye Jhong and Wen-Huang Cheng and Yung-Yao Chen", "abstract": "Reconstructing 3D geometry from streaming video requires continuous inference under bounded resources. Recent geometric foundation models achieve impressive reconstruction quality through all-to-all attention, yet their quadratic cost confines them to short, offline sequences. Causal-attention variants such as StreamVGGT enable single-pass streaming but accumulate an ever-growing KV cache, exhausting GPU memory within hundreds of frames and precluding the long-horizon deployment that motivates streaming inference in the first place. We present OVGGT, a training-free framework that bounds both memory and compute to a fixed budget regardless of sequence length. Our approach combines Self-Selective Caching, which leverages FFN residual magnitudes to compress the KV cache while remaining fully compatible with FlashAttention, with Dynamic Anchor Protection, which shields coordinate-critical tokens from eviction to suppress geometric drift over extended trajectories. Extensive experiments on indoor, outdoor, and ultra-long sequence benchmarks demonstrate that OVGGT processes arbitrarily long videos within a constant VRAM envelope while achieving state-of-the-art 3D geometric accuracy.", "link": "http://arxiv.org/abs/2603.05959v2", "date": "2026-03-09", "relevancy": 2.3835, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.606}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6022}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5547}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OVGGT%3A%20O%281%29%20Constant-Cost%20Streaming%20Visual%20Geometry%20Transformer&body=Title%3A%20OVGGT%3A%20O%281%29%20Constant-Cost%20Streaming%20Visual%20Geometry%20Transformer%0AAuthor%3A%20Si-Yu%20Lu%20and%20Po-Ting%20Chen%20and%20Hui-Che%20Hsu%20and%20Sin-Ye%20Jhong%20and%20Wen-Huang%20Cheng%20and%20Yung-Yao%20Chen%0AAbstract%3A%20Reconstructing%203D%20geometry%20from%20streaming%20video%20requires%20continuous%20inference%20under%20bounded%20resources.%20Recent%20geometric%20foundation%20models%20achieve%20impressive%20reconstruction%20quality%20through%20all-to-all%20attention%2C%20yet%20their%20quadratic%20cost%20confines%20them%20to%20short%2C%20offline%20sequences.%20Causal-attention%20variants%20such%20as%20StreamVGGT%20enable%20single-pass%20streaming%20but%20accumulate%20an%20ever-growing%20KV%20cache%2C%20exhausting%20GPU%20memory%20within%20hundreds%20of%20frames%20and%20precluding%20the%20long-horizon%20deployment%20that%20motivates%20streaming%20inference%20in%20the%20first%20place.%20We%20present%20OVGGT%2C%20a%20training-free%20framework%20that%20bounds%20both%20memory%20and%20compute%20to%20a%20fixed%20budget%20regardless%20of%20sequence%20length.%20Our%20approach%20combines%20Self-Selective%20Caching%2C%20which%20leverages%20FFN%20residual%20magnitudes%20to%20compress%20the%20KV%20cache%20while%20remaining%20fully%20compatible%20with%20FlashAttention%2C%20with%20Dynamic%20Anchor%20Protection%2C%20which%20shields%20coordinate-critical%20tokens%20from%20eviction%20to%20suppress%20geometric%20drift%20over%20extended%20trajectories.%20Extensive%20experiments%20on%20indoor%2C%20outdoor%2C%20and%20ultra-long%20sequence%20benchmarks%20demonstrate%20that%20OVGGT%20processes%20arbitrarily%20long%20videos%20within%20a%20constant%20VRAM%20envelope%20while%20achieving%20state-of-the-art%203D%20geometric%20accuracy.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05959v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqS marks%20demonstrate%20that%20OVGGT%20processes%20arbitrarily%20long%20videos%20within%20a%20constant%20VRAM%20envelope%20while%20achieving%20state-of-the-art%203D%20geometric%20accuracy.&entry.1838667208=http%3A//arxiv.org/abs/2603.05959v2&entry.124074799=Read"},
{"title": "OCN: Effectively Utilizing Higher-Order Common Neighbors for Better Link Prediction", "author": "Juntong Wang and Xiyuan Wang and Muhan Zhang", "abstract": "Common Neighbors (CNs) and their higher-order variants are important pairwise features widely used in state-of-the-art link prediction methods. However, existing methods often struggle with the repetition across different orders of CNs and fail to fully leverage their potential. We identify that these limitations stem from two key issues: redundancy and over-smoothing in high-order common neighbors. To address these challenges, we design orthogonalization to eliminate redundancy between different-order CNs and normalization to mitigate over-smoothing. By combining these two techniques, we propose Orthogonal Common Neighbor (OCN), a novel approach that significantly outperforms the strongest baselines by an average of 7.7\\% on popular link prediction benchmarks. A thorough theoretical analysis is provided to support our method. Ablation studies also verify the effectiveness of our orthogonalization and normalization techniques. Code is available at: https://github.com/qingpingmo/OCN.", "link": "http://arxiv.org/abs/2505.19719v2", "date": "2026-03-09", "relevancy": 2.3794, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4895}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4848}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4533}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OCN%3A%20Effectively%20Utilizing%20Higher-Order%20Common%20Neighbors%20for%20Better%20Link%20Prediction&body=Title%3A%20OCN%3A%20Effectively%20Utilizing%20High {"title": "Impermanent: A Live Benchmark for Temporal Generalization in Time Series Forecasting", "author": "Azul Garza and Ren\u00e9e Rosillo and Rodrigo Mendoza-Smith and David Salinas and Andrew Robert Williams and Arjun Ashok and Mononito Goswami and Jos\u00e9 Mart\u00edn Ju\u00e1rez", "abstract": "Recent advances in time-series forecasting increasingly rely on pre-trained foundation-style models. While these models often claim broad generalization, existing evaluation protocols provide limited evidence. Indeed, most current benchmarks use static train-test splits that can easily lead to contamination as foundation models can inadvertently train on test data or perform model selection using test scores, which can inflate performance. We introduce Impermanent, a live benchmark that evaluates forecasting models under open-world temporal change by scoring forecasts sequentially over time on continuously updated data streams, enabling the study of temporal robustness, distributional shift, and performance stability rather than one-off accuracy on a frozen test set. Impermanent is instantiated on GitHub open-source activity, providing a naturally live and highly non-stationary dataset shaped by releases, shifting contributor behavior, platform/tooling changes, and external events. We focus on the top 400 repositories by star count and construct time series from issues opened, pull requests opened, push events, and new stargazers, evaluated over a rolling window with daily updates, alongside standardized protocols and leaderboards for reproducible, ongoing comparison. By shifting evaluation from static accuracy to sustained performance, Impermanent takes a concrete step toward assessing when and whether foundation-level generalization in time-series forecasting can be meaningfully claimed. Code and a live dashboard are available at https://github.com/TimeCopilot/impermanent and https://impermanent.timecopilot.dev.", "link": "http://arxiv.org/abs/2603.08707v1", "date": "2026-03-09", "relevancy": 2.37, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4942}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4828}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.445}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Impermanent%3A%20A%20Live%20Benchmark%20for%20Temporal%20Generalization%20in%20Time%20Series%20Forecasting&body=Title%3A%20Impermanent%3A%20A%20Live%20Benchmark%20for%20Temporal%20Generalization%20in%20Time%20Series%20Forecasting%0AAuthor%3A%20Azul%20Garza%20and%20Ren%C3%A9e%20Rosillo%20and%20Rodrigo%20Mendoza-Smith%20and%20David%20Salinas%20and%20Andrew%20Robert%20Williams%20and%20Arjun%20Ashok%20and%20Mononito%20Goswami%20and%20Jos%C3%A9%20Mart%C3%ADn%20Ju%C3%A1rez%0AAbstract%3A%20Recent%20advances%20in%20time-series%20forecasting%20increasingly%20rely%20on%20pre-trained%20foundation-style%20models.%20While%20these%20models%20often%20claim%20broad%20generalization%2C%20existing%20evaluation%20protocols%20provide%20limited%20evidence.%20Indeed%2C%20most%20current%20benchmarks%20use%20static%20train-test%20splits%20that%20can%20easily%20lead%20to%20contamination%20as%20foundation%20models%20can%20inadvertently%20train%20on%20test%20data%20or%20perform%20model%20selection%20using%20test%20scores%2C%20which%20can%20inflate%20performance.%20We%20introduce%20Impermanent%2C%20a%20live%20benchmark%20that%20evaluates%20forecasting%20models%20under%20open-world%20temporal%20change%20by%20scoring%20forecasts%20sequentially%20over%20time%20on%20continuously%20updated%20data%20streams%2C%20enabling%20the%20study%20of%20temporal%20robustness%2C%20distributional%20shift%2C%20and%20performance%20stability%20rather%20than%20one-off%20accuracy%20on%20a%20frozen%20test%20set.%20Impermanent%20is%20instantiated%20on%20GitHub%20open-source%20activity%2C%20providing%20a%20naturally%20live%20and%20highly%20non-stationary%20dataset%20shaped%20by%20releases%2C%20shifting%20contributor%20behavior%2C%20platform/tooling%20changes%2C%20and%20external%20events.%20We%20focus%20on%20the%20top%20400%20repositories%20by%20star%20count%20and%20construct%20time%20series%20from%20issues%20opened%2C%20pull%20requests%20opened%2C%20push%20events%2C%20and%20new%20stargazers%2C%20evaluated%20over%20a%20rolling%20window%20with%20daily%20updates%2C%20alongside%20standardized%20protocols%20and%20leaderboards%20for%20reproducible%2C%20ongoing%20comparison.%20By%20shifting%20evaluation%20from%20static%20accuracy%20to%20sustained%20performance%2C%20Impermanent%20takes%20a%20concrete%20step%20toward%20assessing%20when%20and%20whether%20foundation-level%20generalization%20in%20time-series%20forecasting%20can%20be%20meaningfully%20claimed.%20Code%20and%20a%20live%20dashboard%20are%20available%20at%20https%3A//github.com/TimeCopilot/impermanent%20and%20https%3A//impermanent.timecopilot.dev.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08707v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DImpermanent%253A%2520A%2520Live%2520Benchmark%2520for%2520Temporal%2520Generalization%2520in%2520Time%2520Series%2520Forecasting%26entry.906535625%3DAzul%2520Garza%2520and%2520Ren%25C3%25A9e%2520Rosillo%2520and%2520Rodrigo%2520Mendoza-Smith%2520and%2520David%2520Salinas%2520and%2520Andrew%2520Robert%2520Williams%2520and%2520Arjun%2520Ashok%2520and%2520Mononito%2520Goswami%2520and%2520Jos%25C3%25A9%2520Mart%25C3%25ADn%2520Ju%25C3%25A1rez%26entry.1292438233%3DRecent%2520advances%2520in%2520time-series%2520forecasting%2520increasingly%2520rely%2520on%2520pre-trained%2520foundation-style%2520models.%2520While%2520these%2520models%2520often%2520claim%25 {"title": "Benchmarking Language Modeling for Lossless Compression of Full-Fidelity Audio", "author": "Phillip Long and Zachary Novack and Chris Donahue", "abstract": "Autoregressive \"language\" models (LMs) trained on raw waveforms can be repurposed for lossless audio compression, but prior work is limited to 8-bit audio, leaving open whether such approaches work for practical settings (16/24-bit) and can compete with existing codecs. We benchmark LM-based compression on full-fidelity audio across diverse domains (music, speech, bioacoustics), sampling rates (16kHz-48kHz), and bit depths (8, 16, 24-bit). Standard sample-level tokenization becomes intractable at higher bit depths due to vocabulary size (65K for 16-bit; 16.7M for 24-bit). We propose Trilobyte, a byte-level tokenization schema for full resolution audio, improving vocabulary scaling from $O(2^{b})$ to $O(1)$ and enabling the first tractable 24-bit LM-based lossless compression. While LMs consistently outperform FLAC and yield state-of-the-art compression at 8-bit and 16-bit, we observe that compression gains become more modest as bit depth increases beyond 8-bit.", "link": "http://arxiv.org/abs/2603.08683v1", "date": "2026-03-09", "relevancy": 2.3684, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4807}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4807}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4597}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Benchmarking%20Language%20Modeling%20for%20Lossless%20Compression%20of%20Full-Fidelity%20Audio&body=Title%3A%20Benchmarking%20Language%20Modeling%20for%20Lossless%20Compression%20of%20Full-Fidelity%20Audio%0AAuthor%3A%20Phillip%20Long%20and%20Zachary%20Novack%20and%20Chris%20Donahue%0AAbstract%3A%20Autoregressive%20%22language%22%20models%20%28LMs%29%20trained%20on%20raw%20waveforms%20can%20be%20repurposed%20for%20lossless%20audio%20compression%2C%20but%20prior%20work%20is%20limited%20to%208-bit%20audio%2C%20leaving%20open%20whether%20such%20approaches%20work%20for%20practical%20settings%20%2816/24-bit%29%20and%20can%20compete%20with%20existing%20codecs.%20We%20benchmark%20LM-based%20compression%20on%20full-fidelity%20audio%20across%20diverse%20domains%20%28music%2C%20speech%2C%20bioacoustics%29%2C%20sampling%20rates%20%2816kHz-48kHz%29%2C%20and%20bit%20depths%20%288%2C%2016%2C%2024-bit%29.%20Standard%20sample-level%20tokenization%20becomes%20intractable%20at%20higher%20bit%20depths%20due%20to%20vocabulary%20size%20%2865K%20for%2016-bit%3B%2016.7M%20for%2024-bit%29.%20We%20propose%20Trilobyte%2C%20a%20byte-level%20tokenization%20schema%20for%20full%20resolution%20audio%2C%20improving%20vocabulary%20scaling%20from%20%24O%282%5E%7Bb%7D%29%24%20to%20%24O%281%29%24%20and%20enabling%20the%20first%20tractable%2024-bit%20LM-based%20lossless%20compression.%20While%20LMs%20consistently%20outperform%20FLAC%20and%20yield%20state-of-the-art%20compression%20at%208-bit%20and%2016-bit%2C%20we%20observe%20that%20compression%20gains%20become%20more%20modest%20as%20bit%20depth%20increases%20beyond%208-bit.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08683v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBenchmarking%2520Language%2520Modeling%2520for%2520Lossless%2520Compression%2520of%2520Full-Fidelity%2520Audio%26entry.906535625%3DPhillip%2520Long%2520and%2520Zachary%2520Novack%2520and%2520Chris%2520Donahue%26entry.1292438233%3DAutoregressive%2520%2522language%2522%2520models%2520%2528LMs%2529%2520trained%2520on%2520raw%2520waveforms%2520can%2520be%2520repurposed%2520for%2520lossless%2520audio%2520compression%252C%2520but%2520prior%2520work%2520is%2520limited%2520to%25208-bit%2520audio%252C%2520leaving%2520open%2520whether%2520such%2520approaches%2520work%2520for%2520practical%2520settings%2520%252816/24-bit%2529%2520and%2520can%2520compete%2520with%2520existing%2520codecs.%2520We%2520benchmark%2520LM-based%2520compression%2520on%2520full-fidelity%2520audio%2520across%2520diverse%2520domains%2520%2528music%252C%2520speech%252C%2520bioacoustics%2529%252C%2520sampling%2520rates%2520%252816kHz-48kHz%2529%252C%2520and%2520bit%2520depths%2520%25288%252C%252016%252C%252024-bit%2529.%2520Standard%2520sample-level%2520tokenization%2520becomes%2520intractable%2520at%2520higher%2520bit%2520depths%2520due%2520to%2520vocabulary%2520size%2520%252865K%2520for%252016-bit%253B%252016.7M%2520for%252024-bit%2529.%2520We%2520propose%2520Trilobyte%252C%2520a%2520byte-level%2520tokenization%2520schema%2520for%2520full%2520resolution%2520audio%252C%2520improving%2520vocabulary%2520scaling%2520from%2520%2524O%25282%255E%257Bb%257D%2529%2524%2520to%2520%2524O%25281%2529%2524%2520and%2520enabling%2520the%2520first%2520tractable%252024-bit%2520LM-based%2520lossless%2520compression.%2520While%2520LMs%2520consistently%2520outperform%2520FLAC%2520and%2520yield%2520state-of-the-art%2520compression%2520at%25208-bit%2520and%252016-bit%252C%2520we%2520observe%2520that%2520compression%2520gains%2520become%2520more%2520modest%2520as%2520bit%2520depth%2520increases%2520beyond%25208-bit.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.08683v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Benchmarking%20Language%20Modeling%20for%20Lossless%20Compression%20of%20Full-Fidelity%20Audio&entry.906535625=Phillip%20Long%20and%20Zachary%20Novack%20and%20Chris%20Donahue&entry.1292438233=Autoregressive%20%22language%22%20models%20%28LMs%29%20trained%20on%20raw%20waveform {"title": "Momentum SVGD-EM for Accelerated Maximum Marginal Likelihood Estimation", "author": "Adam Rozzio and Rafael Athanasiades and O. Deniz Akyildiz", "abstract": "Maximum marginal likelihood estimation (MMLE) can be formulated as the optimization of a free energy functional. From this viewpoint, the Expectation-Maximisation (EM) algorithm admits a natural interpretation as a coordinate descent method over the joint space of model parameters and probability measures. Recently, a significant body of work has adopted this perspective, leading to interacting particle algorithms for MMLE. In this paper, we propose an accelerated version of one such procedure, based on Stein variational gradient descent (SVGD), by introducing Nesterov acceleration in both the parameter updates and in the space of probability measures. The resulting method, termed Momentum SVGD-EM, consistently accelerates convergence in terms of required iterations across various tasks of increasing difficulty, demonstrating effectiveness in both low- and high-dimensional settings.", "link": "http://arxiv.org/abs/2603.08676v1", "date": "2026-03-09", "relevancy": 2.3634, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4814}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4727}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4639}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Momentum%20SVGD-EM%20for%20Accelerated%20Maximum%20Marginal%20Likelihood%20Estimation&body=Title%3A%20Momentum%20SVGD-EM%20for%20Accelerated%20Maximum%20Marginal%20Likelihood%20Estimation%0AAuthor%3A%20Adam%20Rozzio%20and%20Rafael%20Athanasiades%20and%20O.%20Deniz%20Akyildiz%0AAbstract%3A%20Maximum%20marginal%20likelihood%20estimation%20%28MMLE%29%20can%20be%20formulated%20as%20the%20optimization%20of%20a%20free%20energy%20functional.%20From%20this%20viewpoint%2C%20the%20Expectation-Maximisation%20%28EM%29%20algorithm%20admits%20a%20natural%20interpretation%20as%20a%20coordinate%20descent%20method%20over%20the%20joint%20space%20of%20model%20parameters%20and%20probability%20measures.%20Recently%2C%20a%20significant%20body%20of%20work%20has%20adopted%20this%20perspective%2C%20leading%20to%20interacting%20particle%20algorithms%20for%20MMLE.%20In%20this%20paper%2C%20we%20propose%20an%20accelerated%20version%20of%20one%20such%20procedure%2C%20based%20on%20Stein%20variational%20gradient%20descent%20%28SVGD%29%2C%20by%20introducing%20Nesterov%20acceleration%20in%20both%20the%20parameter%20updates%20and%20in%20the%20space%20of%20probability%20measures.%20The%20resulting%20method%2C%20termed%20Momentum%20SVGD-EM%2C%20consistently%20accelerates%20convergence%20in%20terms%20of%20required%20iterations%20across%20various%20tasks%20of%20increasing%20difficulty%2C%20demonstrating%20effectiveness%20in%20both%20low-%20and%20high-dimensional%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08676v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMomentum%2520SVGD-EM%2520for%2520Accelerated%2520Maximum%2520Marginal%2520Likelihood%2520Estimation%26entry.906535625%3DAdam%2520Rozzio%2520and%2520Rafael%2520Athanasiades%2520and%2520O.%2520Deniz%2520Akyildiz%26entry.1292438233%3DMaximum%2520marginal%2520likelihood%2520estimation%2520%2528MMLE%2529%2520can%2520be%2520formulated%2520as%2520the%2520optimization%2520of%2520a%2520free%2520energy%2520functional.%2520From%2520this%2520viewpoint%252C%2520the%2520Expectation-Maximisation%2520%2528EM%2529%2520algorithm%2520admits%2520a%2520natural%2520interpretation%2520as%2520a%2520coordinate%2520descent%2520method%2520over%2520the%2520joint%2520space%2520of%2520model%2520parameters%2520and%2520probability%2520measures.%2520Recently%252C%2520a%2520significant%2520body%2520of%2520work%2520has%2520adopted%2520this%2520perspective%252C%2520leading%2520to%2520interacting%2520particle%2520algorithms%2520for%2520MMLE.%2520In%2520this%2520paper%252C%2520we%2520propose%2520an%2520accelerated%2520version%2520of%2520one%2520such%2520procedure%252C%2520based%2520on%2520Stein%2520variational%2520gradient%2520descent%2520%2528SVGD%2529%252C%2520by%2520introducing%2520Nesterov%2520acceleration%2520in%2520both%2520the%2520parameter%2520updates%2520and%2520in%2520the%2520space%2520of%2520probability%2520measures.%2520The%2520resulting%2520method%252C%2520termed%2520Momentum%2520SVGD-EM%252C%2520consistently%2520accelerates%2520convergence%2520in%2520terms%2520of%2520required%2520iterations%2520across%2520various%2520tasks%2520of%2520increasing%2520difficulty%252C%2520demonstrating%2520effectiveness%2520in%2520both%2520low-%2520and%2520high-dimensional%2520settings.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.08676v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Momentum%20SVGD-EM%20for%20Accelerated%20Maximum%20Marginal%20Likelihood%20Estimation&entry.906535625=Adam%20Rozzio%20and%20Rafael%20Athanasiades%20and%20O.%20Deniz%20Akyildiz&entry.1292438233=Maximum%20marginal%20likelihood%20estimation%20%28MMLE%29%20can%20be%20formulated%20as%20the%20optimization%20of%20a%20free%20energy%20functional.%20From%20this%20viewpoint%2C%20the%20Expectation-Maximisation%20%28EM%29%20algorithm%20admits%20a%20natural%20interpretation%20as%20a%20coordinate%20descent%20method%20over%20the%20joint%20space%20of%20model%20parameters%20and%20probability%20measures.%20Recently%2C%20a%20significant%20body%20of%20work%20has%20adopted%20this%20perspective%2C%20leading%20to%20interacting%20particle%20algorithms%20for%20MMLE.%20In%20this%20paper%2C%20we%20propose%20an%20accelerated%20version%20of%20one%20such%20procedure%2C%20based%20on%20Stein%20variational%20gradient%20descent%20%28SVGD%29%2C%20by%20introducing%20Nesterov%20acceleration%20in%20both%20the%20parameter%20updates%20and%20in%20the%20space%20of%20probability%20measures.%20The%20resulting%20method%2C%20termed%20Momentum%20SVGD-EM%2C%20consistently%20accelerates%20convergence%20in%20terms%20of%20required%20iterations%20across%20various%20tasks%20of%20increasing%20difficulty%2C%20demonstrating%20effectiveness%20in%20both%20low-%20and%20high-dimensional%20settings.&entry.1838667208=http%3A//arxiv.org/abs/2603.08676v1&entry.124074799=Read"},
{"title": "HiAR: Efficient Autoregressive Long Video Generation via Hierarchical Denoising", "author": "Kai Zou and Dian Zheng and Hongbo Liu and Tiankai Hang and Bin Liu and Nenghai Yu", "abstract": "Autoregressive (AR) diffusion offers a promising framework for generating videos of theoretically infinite length. However, a major challenge is maintaining temporal continuity while preventing the progressive quality degradation caused by error accumulation. To ensure continuity, existing methods typically condition on highly denoised contexts; yet, this practice propagates prediction errors with high certainty, thereby exacerbating degradation. In this paper, we argue that a highly clean context is unnecessary. Drawing inspiration from bidirectional diffusion models, which denoise frames at a shared noise level while maintaining coherence, we propose that conditioning on context at the same noise level as the current block provides sufficient signal for temporal consistency while effectively mitigating error propagation. Building on this insight, we propose HiAR, a hierarchical denoising framework that reverses the conventional generation order: instead of completing each block sequentially, it performs causal generation across all blocks at every denoising step, so that each block is always conditioned on context at the same noise level. This hierarchy naturally admits pipelined parallel inference, yielding a 1.8 wall-clock speedup in our 4-step setting. We further observe that self-rollout distillation under this paradigm amplifies a low-motion shortcut inherent to the mode-seeking reverse-KL objective. To counteract this, we introduce a forward-KL regulariser in bidirectional-attention mode, which preserves motion diversity for causal inference without interfering with the distillation loss. On VBench (20s generation), HiAR achieves the best overall score and the lowest temporal drift among all compared methods.", "link": "http://arxiv.org/abs/2603.08703v1", "date": "2026-03-09", "relevancy": 2.362, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6108}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5817}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5736}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HiAR%3A%20Efficient%20Autoregressive%20Long%20Video%20Generation%20via%20Hierarchical%20Denoising&body=Title%3A%20HiAR%3A%20Efficient%20Autoregressive%20Long%20Video%20Generation%20via%20Hierarchical%20Denoising%0AAuthor%3A%20Kai%20Zou%20and%20Dian%20Zheng%20and%20Hongbo%20Liu%20and%20Tiankai%20Hang%20and%20Bin%20Liu%20and%20Nenghai%20Yu%0AAbstract%3A%20Autoregressive%20%28AR%29%20diffusion%20offers%20a%20promising%20framework%20for%20generating%20videos%20of%20theoretically%20infinite%20length.%20However%2C%20a%20major%20challenge%20is%20maintaining%20temporal%20continuity%20while%20preventing%20the%20progressive%20quality%20degradation%20caused%20by%20error%20accumulation.%20To%20ensure%20continuity%2C%20existing%20methods%20typically%20condition%20on%20highly%20denoised%20contexts%3B%20yet%2C%20this%20practice%20propagates%20prediction%20errors%20with%20high%20certainty%2C%20thereby%20exacerbating%20degradation.%20In%20this%20paper%2C%20we%20argue%20that%20a%20highly%20clean%20context%20is%20unnecessary.%20Drawing%20inspiration%20from%20bidirectional%20diffusion%20models%2C%20which%20denoise%20frames%20at%20a%20shared%20noise%20level%20while%20maintaining%20coherence%2C%20we%20propose%20that%20conditioning%20on%20context%20at%20the%20same%20noise%20level%20as%20the%20current%20block%20provides%20sufficient%20signal%20for%20temporal%20consistency%20while%20effectively%20mitigating%20error%20propagation.%20Building%20on%20this%20insight%2C%20we%20propose%20HiAR%2C%20a%20hierarchical%20denoising%20framework%20that%20reverses%20the%20conventional%20generation%20order%3A%20instead%20of%20completing%20each%20block%20sequentially%2C%20it%20performs%20causal%20generation%20across%20all%20blocks%20at%20every%20denoising%20step%2C%20so%20that%20each%20block%20is%20always%20conditioned%20on%20context%20at%20the%20same%20noise%20level.%20This%20hierarchy%20naturally%20admits%20pipelined%20parallel%20inference%2C%20yielding%20a%201.8%20wall-clock%20speedup%20in%20our%204-step%20setting.%20We%20further%20observe%20that%20self-rollout%20distillation%20under%20this%20paradigm%20amplifies%20a%20low-motion%20shortcut%20inherent%20to%20the%20mode-seeking%20reverse-KL%20objective.%20To%20counteract%20this%2C%20we%20introduce%20a%20forward-KL%20regulariser%20in%20bidirectional-attention%20mode%2C%20which%20preserves%20motion%20diversity%20for%20causal%20inference%20without%20interfering%20with%20the%20distillation%20loss.%20On%20VBench%20%2820s%20generation%29%2C%20HiAR%20achieves%20the%20best%20overall%20score%20and%20the%20lowest%20temporal%20drift%20among%20all%20compared%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08703v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHiAR%253A%2520Efficient%2520Autoregressive%2520Long%2520Video%2520Generation%2520via%2520Hierarchical%2520Denoising%26entry.906535625%3DKai%2520Zou%2520and%2520Dian%2520Zheng%2520and%2520Hongbo%2520Liu%2520and%2520Tiankai%2520Hang%2520and%2520Bin%2520Liu%2520and%2520Nenghai%2520Yu%26entry.1292438233%3DAutoregressive%2520%2528AR%2529%2520diffusion%2520offers%2520a%2520promising%2520framework%2520for%2520generating%2520videos%2520of%2520theoretically%2520infinite%2520length.%2520However%252C%2520a%2520major%2520challenge%2520is%2520maintaining%2520temporal%2520continuity%2520while%2520preventing%2520the%2520progressive {"title": "From Pixels to Predicates: Learning Symbolic World Models via Pretrained Vision-Language Models", "author": "Ashay Athalye and Nishanth Kumar and Tom Silver and Yichao Liang and Jiuguang Wang and Tom\u00e1s Lozano-P\u00e9rez and Leslie Pack Kaelbling", "abstract": "Our aim is to learn to solve long-horizon decision-making problems in complex robotics domains given low-level skills and a handful of short-horizon demonstrations containing sequences of images. To this end, we focus on learning abstract symbolic world models that facilitate zero-shot generalization to novel goals via planning. A critical component of such models is the set of symbolic predicates that define properties of and relationships between objects. In this work, we leverage pretrained vision-language models (VLMs) to propose a large set of visual predicates potentially relevant for decision-making, and to evaluate those predicates directly from camera images. At training time, we pass the proposed predicates and demonstrations into an optimization-based model-learning algorithm to obtain an abstract symbolic world model that is defined in terms of a compact subset of the proposed predicates. At test time, given a novel goal in a novel setting, we use the VLM to construct a symbolic description of the current world state, and then use a search-based planning algorithm to find a sequence of low-level skills that achieves the goal. We demonstrate empirically across experiments in both simulation and the real world that our method can generalize aggressively, applying its learned world model to solve problems with a wide variety of object types, arrangements, numbers of objects, and visual backgrounds, as well as novel goals and much longer horizons than those seen at training time.", "link": "http://arxiv.org/abs/2501.00296v4", "date": "2026-03-09", "relevancy": 2.3583, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http:// ct%20symbolic%20world%20model%20that%20is%20defined%20in%20terms%20of%20a%20compact%20subset%20of%20the%20proposed%20predicates.%20At%20test%20time%2C%20given%20a%20novel%20goal%20in%20a%20novel%20setting%2C%20we%20use%20the%20VLM%20to%20construct%20a%20symbolic%20description%20of%20the%20current%20world%20state%2C%20and%20then%20use%20a%20search-based%20planning%20algorithm%20to%20find%20a%20sequence%20of%20low-level%20skills%20that%20achieves%20the%20goal.%20We%20demonstrate%20empirically%20across%20experiments%20in%20both%20simulation%20and%20the%20real%20world%20that%20our%20method%20can%20generalize%20aggressively%2C%20applying%20its%20learned%20world%20model%20to%20solve%20problems%20with%20a%20wide%20variety%20of%20object%20types%2C%20arrangements%2C%20numbers%20of%20objects%2C%20and%20visual%20backgrounds%2C%20as%20well%20as%20novel%20goals%20and%20much%20longer%20horizons%20than%20those%20seen%20at%20training%20time.%0ALink%3A%20http%3A//arxiv.org/abs/2501.00296v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Pixels%2520to%2520Predicates%253A%2520Learning%2520Symbolic%2520World%2520Models%2520via%2520Pretrained%2520Vision-Language%2520Models%26entry.906535625%3DAshay%2520Athalye%2520and%2520Nishanth%2520Kumar%2520and%2520Tom%2520Silver%2520and%2520Yichao%2520Liang%2520and%2520Jiuguang%2520Wang%2520and%2520Tom%25C3%25A1s%2520Lozano-P%25C3%25A9rez%2520and%2520Leslie%2520Pack%2520Kaelbling%26entry.1292438233%3DOur%2520aim%2520is%2520to%2520learn%2520to%2520solve%2520long-horizon%2520decision-making%2520problems%2520in%2520complex%2520robotics%2520domains%2520given%2520low-level%2520skills%2520and%2520a%2520handful%2520of%2520short-horizon%2520demonstrations%2520containing%2520sequences%2520of%2520images.%2520To%2520this%2520end%252C%2520we%2520focus%2520on%2520learning%2520abstract%2520symbolic%2520world%2520models%2520that%2520facilitate%2520zero-shot%2520general {"title": "Topological Spatial Graph Coarsening", "author": "Anna Calissano and Etienne Lasalle", "abstract": "Spatial graphs are particular graphs for which the nodes are localized in space (e.g., public transport network, molecules, branching biological structures). In this work, we consider the problem of spatial graph reduction, that aims to find a smaller spatial graph (i.e., with less nodes) with the same overall structure as the initial one. In this context, performing the graph reduction while preserving the main topological features of the initial graph is particularly relevant, due to the additional spatial information. Thus, we propose a topological spatial graph coarsening approach based on a new framework that finds a trade-off between the graph reduction and the preservation of the topological characteristics. The coarsening is realized by collapsing short edges. In order to capture the topological information required to calibrate the reduction level, we adapt the construction of classical topological descriptors made for point clouds (the so-called persistent diagrams) to spatial graphs. This construction relies on the introduction of a new filtration called triangle-aware graph filtration. Our coarsening approach is parameter-free and we prove that it is equivariant under rotations, translations and scaling of the initial spatial graph. We evaluate the performances of our method on synthetic and real spatial graphs, and show that it significantly reduces the graph sizes while preserving the relevant topological information.", "link": "http://arxiv.org/abs/2512.24327v2", "date": "2026-03-09", "relevancy": 2.3578, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4861}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4666}, {"title": "DDM-NET: E {"title": "ViTaPEs: Visuotactile Position Encodings for Cross-Modal Alignment in Multimodal Transformers", "author": "Fotios Lygerakis and Ozan \u00d6zdenizci and Elmar R\u00fcckert", "abstract": "Tactile sensing provides local essential information that is complementary to visual perception, such as texture, compliance, and force. Despite recent advances in visuotactile representation learning, challenges remain in fusing these modalities and generalizing across tasks and environments without heavy reliance on pre-trained vision-language models. Moreover, existing methods do not study positional encodings, thereby overlooking the multi-stage spatial reasoning needed to capture fine-grained visuotactile correlations. We introduce ViTaPEs, a transformer-based architecture for learning task-agnostic visuotactile representations from paired vision and tactile inputs. Our key idea is a two-stage positional injection: local (modality-specific) positional encodings are added within each stream, and a global positional encoding is added on the joint token sequence immediately before attention, providing a shared positional vocabulary at the stage where cross-modal interaction occurs. We make the positional injection points explicit and conduct controlled ablations that isolate their effect before a token-wise nonlinearity versus immediately before self-attention. Experiments on multiple large-scale real-world datasets show that ViTaPEs not only surpasses state-of-the-art baselines across various recognition tasks but also demonstrates zero-shot generalization to unseen, out-of-domain scenarios. We further demonstrate the transfer-learning strength of ViTaPEs in a robotic grasping task, where it outperforms state-of-the-art baselines in predicting grasp success. Project page: https://sites.google.com/view/vitapes", "link": "http://arxiv.org/abs/2505.20032v2", "date": "2026-03-09", "relevancy": 2.3565, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6529}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5673}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5341}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ViTaPEs%3A%20Visuotactile%20Position%20Encodings%20for%20Cross-Modal%20Alignment%20in%20Multimodal%20Transformers&body=Title%3A%20ViTaPEs%3A%20Visuotactile%20Position%20Encodings%20for%20Cross-Modal%20Alignment%20in%20Multimodal%20Transformers%0AAuthor%3A%20Fotios%20Lygerakis%20and%20Ozan%20%C3%96zdenizci%20and%20Elmar%20R%C3%BCckert%0AAbstract%3A%20Tactile%20sensing%20provides%20local%20essential%20information%20that%20is%20complementary%20to%20visual%20perception%2C%20such%20as%20texture%2C%20compliance%2C%20and%20force.%20Despite%20recent%20advances%20in%20visuotactile%20representation%20learning%2C%20challenges%20remain%20in%20fusing%20these%20modalities%20and%20generalizing%20across%20tasks%20and%20environments%20without%20heavy%20reliance%20on%20pre-trained%20vision-language%20models.%20Moreover%2C%20existing%20methods%20do%20not%20study%20positional%20encodings%2C%20thereby%20overlooking%20the%20multi-stage%20spatial%20reasoning%20needed%20to%20capture%20fine-grained%20visuotactile%20correlations.%20We%20introduce%20ViTaPEs%2C%20a%20transformer-based%20architecture%20for%20learning%20task-agnostic%20visuotactile%20representations%20from%20paired%20vision%20and%20tactile%20inputs.%20Our%20key%20idea%20is%20a%20two-stage%20positional%20injection%3A%20local%20%28modality-specific%29%20positional%20encodings%20are%20added%20within%20each%20stream%2C%20and%20a%20global%20positional%20encoding%20is%20added%20on%20the%20joint%20token%20sequence%20immediately%20before%20attention%2C%20providing%20a%2 {"title": "HDR-NSFF: High Dynamic Range Neural Scene Flow Fields", "author": "Shin Dong-Yeon and Kim Jun-Seong and Kwon Byung-Ki and Tae-Hyun Oh", "abstract": "Radiance of real-world scenes typically spans a much wider dynamic range than what standard cameras can capture. While conventional HDR methods merge alternating-exposure frames, these approaches are inherently constrained to 2D pixel-level alignment, often leading to ghosting artifacts and temporal inconsistency in dynamic scenes. To address these limitations, we present HDR-NSFF, a paradigm shift from 2D-based merging to 4D spatio-temporal modeling. Our framework reconstructs dynamic HDR radiance fields from alternating-exposure monocular videos by representing the scene as a continuous function of space and time, and is compatible with both neural radiance field and 4D Gaussian Splatting (4DGS) based dynamic representations. This unified end-to-end pipeline explicitly models HDR radiance, 3D scene flow, geometry, and tone-mapping, ensuring physical plausibility and global coherence. We further enhance robustness by (i) extending semantic-based optical flow with DINO features to achieve exposure-invariant motion estimation, and (ii) incorporating a generative prior as a regularizer to compensate for limited observation in monocular captures and saturation-induced information loss. To evaluate HDR space-time view synthesis, we present the first real-world HDR-GoPro dataset specifically designed for dynamic HDR scenes. Experiments demonstrate that HDR-NSFF recovers fine radiance details and coherent dynamics even under challenging exposure variations, thereby achieving state-of-the-art performance in novel space-time view synthesis. Project page: https://shin-dong-yeon.github.io/HDR-NSFF/", "link": "http://arxiv.org/abs/2603.08313v1", "date": "2026-03-09", "relevancy": 2.3511, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6055}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5805}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5729}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HDR-NSFF%3A%20High%20Dynamic%20Range%20Neural%20Scene%20Flow%20Fields&body=Title%3A%20HDR-NSFF%3A%20High%20Dynamic%20Range%20Neural%20Scene%20Flow%20Fields%0AAuthor%3A%20Shin%20Dong-Yeon%20and%20Kim%20Jun-Seong%20and%20Kwon%20Byung-Ki%20and%20Tae-Hyun%20Oh%0AAbstract%3A%20Radiance%20of%20real-world%20scenes%20typically%20spans%20a%20much%20wider%20dynamic%20range%20than%20what%20standard%20cameras%20can%20capture.%20While%20conventional%20HDR%20methods%20merge%20alternating-exposure%20frames%2C%20these%20approaches%20are%20inherently%20constrained%20to%202D%20pixel-level%20alignment%2C%20often%20leading%20to%20ghosting%20artifacts%20and%20temporal%20inconsistency%20in%20dynamic%20scenes.%20To%20address%20these%20limitations%2C%20we%20present%20HDR-NSFF%2C%20a%20paradigm%20shift%20from%202D-based%20merging%20to%204D%20spatio-temporal%20modeling.%20Our%20framework%20reconstructs%20dynamic%20HDR%20radiance%20fields%20from%20alternating-exposure%20monocular%20videos%20by%20representing%20the%20scene%20as%20a%20continuous%20function%20of%20space%20and%20time%2C%20and%20is%20compatible%20with%20both%20neural%20radiance%20field%20and%204D%20Gaussian%20Splatting%20%284DGS%29%20based%20dynamic%20representations.%20This%20unified%20end-to-end%20pipeline%20explicitly%20models%20HDR%20radiance%2C%203D%20scene%20flow%2C%20geometry%2C%20and%20tone-mapping%2C%20ensuring%20physical%20plausibility%20and%20global%20coherence.%20We%20further%20enhance%20robustness%20by%20%28i%29%20extending%20semantic-based%20optical%20flow%20with%20DINO%20features%20to%20achieve%20exposure-invariant%20motion%20estimation%2C%20and%20%28ii%29%20incorporating%20a%20generative%20prior%20as%20a%20regularizer%20to%20compensate%20for%20limited%20observation%20in%20monocular%20captures%20and%20saturation-induced%20information%20loss.%20To%20evaluate%20HDR%20space-time%20view%20synthesis%2C%20we%20present%20the%20first%20real-world%20HDR-GoPro%20dataset%20specifically%20designed%20for%20dynamic%20HDR%20scenes.%20Experiments%20demonstrate%20that%20HDR-NSFF%20recovers%20fine%20radiance%20details%20and%20coherent%20dynamics%20even%20under%20challenging%20exposure%20variations%2C%20thereby%20achieving%20state-of-the-art%20performance%20in%20novel%20space-time%20view%20synthesis.%20Project%20page%3A%20https%3A//shin-dong-yeon.github.io/HDR-NSFF/%0ALink%3A%20http%3A//arxiv.org/abs/2603.08313v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHDR-NSFF%253A%2520High%2520Dynamic%2520Range%2520Neural%2520Scene%2520Flow%2520Fields%26entry.906535625%3DShin%2520Dong-Yeon%2520and%2520Kim%2520Jun-Seong%2520and%2520Kwon%2520Byung-Ki%2520and%2520Tae-Hyun%2520Oh%26entry.1292438233%3DRadiance%2520of%2520real-world%2520scenes%2520typically%2520spans%2520a%2520much%2520wider%2520dynamic%2520range%2520than%2520what%2520standard%2520cameras%2520can%2520capture.%2520While%2520conventional%2520HDR%2520methods%2520merge%2520alternating-exposure%2520frames%252C%2520these%2520approaches%2520are%2520inherently%2520constrained%2520to%25202D%2520pixel-level%2520alignment%252C%2520often%2520leading%2520to%2520ghosting%2520artifacts%2520and%2520temporal%2520inconsistency%2520in%2520dynamic%2520scenes.%2520To%2520address%2520these%2520limitations%252C%2520we%2520present%2520HDR-NSFF%252C%2520a%2520paradigm%2520shift%2520from%25202D-based%2520merging%2520to%25204D%2520spatio-temporal%2520modeling.%2520Our%2520framework%2520reconstructs%2520dynamic%2520HDR%2520radiance%2520fields%2520from%2520alternating-exposure%2520monocular%2520videos%2520by%2520representing%2520the%2520scene%2520as%2520a%2520continuous%2520function%2520of%2520space%2520and%2520time%252C%2520and%2520is%2520compatible%2520with%2520both%2520neural%2520radiance%2520field%2520and%25204D%2520Gaussian%2520Splatting%2520%25284DGS%2529%2520based%2520dynamic%2520representations.%2520This%2520unified%2520end-to-end%2520pipeline%2520explicitly%2520models%2520HDR%2520radiance%252C%25203D%2520scene%2520flow%252C%2520geometry%252C%2520and%2520tone-mapping%252C%2520ensuring%2520physical%2520plausibility%2520and%2520global%2520coherence.%2520We%2520further%2520enhance%2520robustness%2520by%2520%2528i%2529%2520extending%2520semantic-based%2520optical%2520flow%2520with%2520DINO%2520features%2520to%2520achieve%2520exposure-invariant%2520motion%2520estimation%252C%2520and%2520%2528ii%2529%2520incorporating%2520a%2520generative%2520prior%2520as%2520a%2520regularizer%2520to%2520compensate%2520for%2520limited%2520observation%2520in%2520monocular%2520captures%2520and%2520saturation-induced%2520information%2520loss.%2520To%2520evaluate%2520HDR%2520space-time%2520view%2520synthesis%252C%2520we%2520present%2520the%2520first%2520real-world%2520HDR-GoPro%2520dataset%2520specifically%2520designed%2520for%2520dynamic%2520HDR%2520scenes.%2520Experiments%2520demonstrate%2520that%2520HDR-NSFF%2520recovers%2520fine%2520radiance%2520details%2520and%2520coherent%2520dynamics%2520even%2520under%2520challenging%2520exposure%2520variations%252C%2520thereby%2520achieving%2520state-of-the-art%2520performance%2520in%2520novel%2520space-time%2520view%2520synthesis.%2520Project%2520page%253A%2520https%253A//shin-dong-yeon.github.io/HDR-NSFF/%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.08313v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=HDR-NSFF%3A%20High%20Dynamic%20Range%20Neural%20Scene%20Flow%20Fields&entry.906535625=Shin%20Dong-Yeon%2 {"title": "Reading $\\neq$ Seeing: Diagnosing and Closing the Typography Gap in Vision-Language Models", "author": "Heng Zhou and Ao Yu and Li Kang and Yuchen Fan and Yutao Fan and Xiufeng Song and Hejia Geng and Yiran Qin", "abstract": "Vision-Language Models achieve near-perfect accuracy at reading text in images, yet prove largely typography-blind: capable of recognizing what text says, but not how it looks. We systematically investigate this gap by evaluating font family, size, style, and color recognition across 26 fonts, four scripts, and three difficulty levels. Our evaluation of 15 state-of-the-art VLMs reveals a striking perception hierarchy: color recognition is near-perfect, yet font style detection remains universally poor. We further find that model scale fails to predict performance and that accuracy is uniform across difficulty levels, together pointing to a training-data omission rather than a capacity ceiling. LoRA fine-tuning on a small set of synthetic samples substantially improves an open-source model, narrowing the gap to the best closed-source system and surpassing it on font size recognition. Font style alone remains resistant to fine-tuning, suggesting that relational visual reasoning may require architectural innovation beyond current patch-based encoders. We release our evaluation framework, data, and fine-tuning recipe to support progress in closing the typographic gap in vision-language understanding.", "link": "http://arxiv.org/abs/2603.08497v1", "date": "2026-03-09", "relevancy": 2.3431, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5942}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5942}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5436}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Reading%20%24%5Cneq%24%20Seeing%3A%20Diagnosing%20and%20Closing%20the%20Typography%20Gap%20in%20Vision-Language%20Models&body=Title%3A%20Reading%20%24%5Cneq%24%20Seeing%3A%20Diagnosing%20and%20Closing%20the%20Typography%20Gap%20in%20Vision-Language%20Models%0AAuthor%3A%20Heng%20Zhou%20and%20Ao%20Yu%20and%20Li%20Kang%20and%20Yuchen%20Fan%20and%20Yutao%20Fan%20and%20Xiufeng%20Song%20and%20Hejia%20Geng%20and%20Yiran%20Qin%0AAbstract%3A%20Vision-Language%20Models%20achieve%20near-perfect%20accuracy%20at%20reading%20text%20in%20images%2C%20yet%20prove%20largely%20typography-blind%3A%20capable%20of%20recognizing%20what%20text%20says%2C%20but%20not%20how%20it%20looks.%20We%20systematically%20investigate%20this%20gap%20by%20evaluating%20font%20family%2C%20size%2C%20style%2C%20and%20color%20recognition%20across%2026%20fonts%2C%20four%20scripts%2C%20and%20three%20difficulty%20levels.%20Our%20evaluation%20of%2015%20state-of-the-art%20VLMs%20reveals%20a%20striking%20perception%20hierarchy%3A%20color%20recognition%20is%20near-perfect%2C%20yet%20font%20style%20detection%20remains%20universally%20poor.%20We%20further%20find%20that%20model%20scale%20fails%20to%20predict%20performance%20and%20that%20accuracy%20is%20uniform%20across%20difficulty%20levels%2C%20together%20pointing%20to%20a%20training-data%20omission%20rather%20than%20a%20capacity%20ceiling.%20LoRA%20fine-tuning%20on%20a%20small%20set%20of%20synthetic%20samples%20substantially%20improves%20an%20open-source%20model%2C%20narrowing%20the%20gap%20to%20the%20best%20closed-source%20system%20and%20surpassing%20it%20on%20font%20size%20recognition.%20Font%20style%20alone%20remains%20resistant%20to%20fine-tuning%2C%20suggesting%20that%20relational%20visual%20reasoning%20may%20require%20architectural%20innovation%20beyond%20current%20patch-based%20encoders.%20We%20release%20our%20evaluation%20framework%2C%20data%2C%20and%20fine-tuning%20recipe%20to%20support%20progress%20in%20closing%20the%20typographic%20gap%20in%20vision-language%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08497v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReading%2520%2524%255Cneq%2524%2520Seeing%253A%2520Diagnosing%2520and%2520Closing%2520the%2520Typography%2520Gap%2520in%2520Vision-Language%2520Models%26entry.906535625%3DHeng%2520Zhou%2520and%2520Ao%2520Yu%2520and%2520Li%2520Kang%2520and%2520Yuchen%2520Fan%2520and%2520Yutao%2520Fan%2520and%2520Xiufeng%2520Song%2520and%2520Hejia%2520Geng%2520and%2520Yiran%2520Qin%26entry.1292438233%3DVision-Language%2520Models%2520achieve%2520near-perfect%2520accuracy%2520at%2520reading%2520text%2520in%2520images%252C%2520yet%2520prove%2520largely%2520typography-blind%253A%2520capable%2520of%2520recognizing%2520what%2520text%2520says%252C%2520but%2520not%2520how%2520it%2520looks.%2520We%2520systematically%2520investigate%2520this%2520gap%2520by%2520evaluating%2520font%2520family%252C%2520size%252C%2520style%252C%2520and%2520color%2520recognition%2520across%252026%2520fonts%252C%2520four%2520scripts%252C%2520and%2520three%2520difficulty%2520levels.%2520Our%2520evaluation%2520of%252015%2520state-of-the-art%2520VLMs%2520reveals%2520a%2520striking%2520perception%2520hierarchy%253A%2520color%2520recognition%2520is%2520near-perfect%252C%2520yet%2520font%2520style%2520detection%2520remains%2520universally%2520poor.%2520We%2520further%2520find%2520that%2520model%2520scale%2520fails%2520to%2520predict%2520performance%2520and%2520that%2520accuracy%2520is%2520uniform%2520across%2520difficulty%2520levels%252C%2520together%2520pointing%2520to%2520a%2520training-data%2520omission%2520rather%2520than%2520a%2520capacity%2520ceiling.%2520LoRA%2520fine-tuning%2520on%2520a%2520small%2520set%2520of%2520synthetic%2520samples%2520substantially%2520improves%2520an%2520open-source%2520model%252C%2520narrowing%2520the%2520gap%2520to%2520the%2520best%2520closed-source%2520system%2520and%2520surpassing%2520it%2520on%2520font%2520size%2520recognition.%2520Font%2520style%2520alone%2520remains%2520resistant%2520to%2520fine-tuning%252C%2520suggesting%2520that%2520relational%2520visual%2520reasoning%2520may%2520require%2520architectural%2520innovation%2520beyond%2520current%2520patch-based%2520encoders.%2520We%2520release%2520our%2520evaluation%2520framework%252C%2520data%252C%2520and%2520fine-tuning%2520recipe%2520to%2520support%2520progress%2520in%2520closing%2520the%2520typographic%2520gap%2520in%2520vision-language%2520understanding.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.08497v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Reading%20%24%5Cneq%24%20Seeing%3A%20Diagnosing%20and%20Closing%20the%20Typography%20Gap%20in%20Vision-Language%20Models&entry.906535625=Heng%20Zhou%20and%20Ao%20Yu%20and%20Li%20Kang%20and%20Yuchen%20Fan%20and%20Yutao%20Fan%20and%20Xiufeng%20Song%20and%20Hejia%20Geng%20and%20Yiran%20Qin&entry.1292438233=Vision-Language%20Models%20achieve%20near-perfect%20accuracy%20at%20reading%20text%20in%20images%2C%20yet%20prove%20largely%20typography-blind%3A%20capable%20of%20recognizing%20what%20text%20says%2C%20but%20not%20how%20it%20looks.%20We%20systematically%20investigate%20this%20gap%20by%20evaluating%20font%20family%2C%20size%2C%20style%2C%20and%20color%20recognition%20across%2026%20fonts%2C%20four%20scripts%2C%20and%20three%20difficulty%20levels.%20Our%20evaluation%20of%2015%20state-of-the-art%20VLMs%20reveals%20a%20striking%20perception%20hierarchy%3A%20color%20recognition%20is%20near-perfect%2C%20yet%20font%20style%20detection%20remains%20universally%20poor.%20We%20further%20find%20that%20model%20scale%20fails%20to%20predict%20performance%20and%20that%20accuracy%20is%20uniform%20across%20difficulty%20levels%2C%20together%20pointing%20to%2

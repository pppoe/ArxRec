{"title": "mmGAT: Pose Estimation by Graph Attention with Mutual Features from mmWave Radar Point Cloud", "author": "Abdullah Al Masud and Shi Xintong and Mondher Bouazizi and Ohtsuki Tomoaki", "abstract": "Pose estimation and human action recognition (HAR) are pivotal technologies spanning various domains. While the image-based pose estimation and HAR are widely admired for their superior performance, they lack in privacy protection and suboptimal performance in low-light and dark environments. This paper exploits the capabilities of millimeter-wave (mmWave) radar technology for human pose estimation by processing radar data with Graph Neural Network (GNN) architecture, coupled with the attention mechanism. Our goal is to capture the finer details of the radar point cloud to improve the pose estimation performance. To this end, we present a unique feature extraction technique that exploits the full potential of the GNN processing method for pose estimation. Our model mmGAT demonstrates remarkable performance on two publicly available benchmark mmWave datasets and establishes new state of the art results in most scenarios in terms of human pose estimation. Our approach achieves a noteworthy reduction of pose estimation mean per joint position error (MPJPE) by 35.6% and PA-MPJPE by 14.1% from the current state of the art benchmark within this domain.", "link": "http://arxiv.org/abs/2603.08551v1", "date": "2026-03-09", "relevancy": 2.796, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5702}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.566}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5414}], "mailto": "mailto:haoxiang.li.2024@gmail.com?sub {"title": "Can Vision-Language Models Solve the Shell Game?", "author": "Tiedong Liu and Wee Sun Lee", "abstract": "Visual entity tracking is an innate cognitive ability in humans, yet it remains a critical bottleneck for Vision-Language Models (VLMs). This deficit is often obscured in existing video benchmarks by visual shortcuts. We introduce VET-Bench, a synthetic diagnostic testbed featuring visually identical objects that necessitate tracking exclusively through spatiotemporal continuity. Our experiments reveal that current state-of-the-art VLMs perform at or near chance level on VET-Bench, exposing a fundamental limitation: an over-reliance on static frame-level features and a failure to maintain entity representations over time. We provide a theoretical analysis drawing connections to the state-tracking problem, proving that fixed-depth transformer-based VLMs are fundamentally limited in tracking indistinguishable objects without intermediate supervision due to expressivity constraints. To address this, we propose Spatiotemporal Grounded Chain-of-Thought (SGCoT): generating object trajectories as explicit intermediate states. Leveraging Molmo2's object tracking ability, we elicit SGCoT reasoning by fine-tuning on synthesized text-only data for alignment. Our method achieves state-of-the-art accuracy exceeding 90% on VET-Bench, demonstrating that VLMs can reliably solve the video shell-game task end-to-end without external tools. Our code and data are available at https://vetbench.github.io .", "link": "http://arxiv.org/abs/2603.08436v1", "date": "2026-03-09", "relevancy": 2.7922, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5727}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5727}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5299}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Can%20Vision-Language%20Models%20Solve%20the%20Shell%20Game%3F&body=Title%3A%20Can%20Vision-Language%20Models%20Solve%20the%20Shell%20Game%3F%0AAuthor%3A%20Tiedong%20Liu%20and%20Wee%20Sun%20Lee%0AAbstract%3A%20Visual%20entity%20tracking%20is%20an%20innate%20cognitive%20ability%20in%20humans%2C%20yet%20it%20remains%20a%20critical%20bottleneck%20for%20Vision-Language%20Models%20%28VLMs%29.%20This%20deficit%20is%20often%20obscured%20in%20existing%20video%20benchmarks%20by%20visual%20shortcuts.%20We%20introduce%20VET-Bench%2C%20a%20synthetic%20diagnostic%20testbed%20featuring%20visually%20identical%20objects%20that%20necessitate%20tracking%20exclusively%20through%20spatiotemporal%20continuity.%20Our%20experiments%20reveal%20that%20current%20state-of-the-art%20VLMs%20perform%20at%20or%20near%20chance%20level%20on%20VET-Bench%2C%20exposing%20a%20fundamental%20limitation%3A%20an%20over-reliance%20on%20static%20frame-level%20features%20and%20a%20failure%20to%20maintain%20entity%20representations%20over%20time.%20We%20provide%20a%20theoretical%20analysis%20drawing%20connections%20to%20the%20state-tracking%20problem%2C%20proving%20that%20fixed-depth%20transformer-based%20VLMs%20are%20fundamentally%20limited%20in%20tracking%20indistinguishable%20objects%20without%20intermediate%20supervision%20due%20to%20expressivity%20constraints.%20To%20address%20this%2C%20we%20propose%20Spatiotemporal%20Grounded%20Chain-of-Thought%20%28SGCoT%29%3A%20generating%20object%20trajectories%20as%20explicit%20intermediate%20states.%20Leveraging%20Molmo2%27s%20object%20tracking%20ability%2C%20we%20elicit%20SGCoT%20reasoning%20by%20fine-tuning%20on%20synthesized%20text-only%20data%20for%20alignment.%20Our%20method%20achieves%20state-of-the-art%20accuracy%20exceeding%2090%25%20on%20VET-Bench%2C%20demonstrating%20that%20VLMs%20can%20reliably%20solve%2 {"title": "LaVCa: LLM-assisted Visual Cortex Captioning", "author": "Takuya Matsuyama and Shinji Nishimoto and Yu Takagi", "abstract": "Understanding the property of neural populations (or voxels) in the human brain can advance our comprehension of human perceptual and cognitive processing capabilities and contribute to developing brain-inspired computer models. Recent encoding models using deep neural networks (DNNs) have successfully predicted voxel-wise activity. However, interpreting the properties that explain voxel responses remains challenging because of the black-box nature of DNNs. As a solution, we propose LLM-assisted Visual Cortex Captioning (LaVCa), a data-driven approach that uses large language models (LLMs) to generate natural-language captions for images to which voxels are selective. By applying LaVCa for image-evoked brain activity, we demonstrate that LaVCa generates captions that describe voxel selectivity more accurately than the previously proposed method. Furthermore, the captions generated by LaVCa quantitatively capture more detailed properties than the existing method at both the inter-voxel and intra-voxel levels. Furthermore, a more detailed analysis of the voxel-specific properties generated by LaVCa reveals fine-grained functional differentiation within regions of interest (ROIs) in the visual cortex and voxels that simultaneously represent multiple distinct concepts. These findings offer profound insights into human visual representations by assigning detailed captions throughout the visual cortex while highlighting the potential of LLM-based methods in understanding brain representations.", "link": "http://arxiv.org/abs/2502.13606v2", "date": "2026-03-09", "relevancy": 2.7698, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5745}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5745}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5128}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LaVCa%3A%20LLM-assisted%20Visual%20Cortex%20Captioning&body=Title%3A%20LaVCa%3A%20LLM-assisted%20Visual%20Cortex%20Captioning%0AAuthor%3A%20Takuya%20Matsuyama%20and%20Shinji%20Nishimoto%20and%20Yu%20Takagi%0AAbstract%3A%20Understanding%20the%20property%20of%20neural%20populations%20%28or%20voxels%29%20in%20the%20human%20brain%20can%20advance%20our%20comprehension%20of%20human%20perceptual%20and%20cognitive%20processing%20capabilities%20and%20contribute%20to%20developing%20brain-inspired%20computer%20models.%20Recent%20encoding%20models%20using%20deep%20neural%20networks%20%28DNNs%29%20have%20successfully%20predicted%20voxel-wise%20activity.%20However%2C%20interpreting%20the%20properties%20that%20explain%20voxel%20responses%20remains%20challenging%20because%20of%20the%20black-box%20nature%20of%20DNNs.%20As%20a%20solution%2C%20we%20propose%20LLM-assisted%20Visual%20Cortex%20Captioning%20%28LaVCa%29%2C%20a%20data-driven%20approach%20that%20uses%20large%20language%20models%20%28LLMs%29%20to%20generate%20natural-language%20captions%20for%20images%20to%20which%20voxels%20are%20selective.%20By%20applying%20LaVCa%20for%20image-evoked%20brain%20activity%2C%20we%20demonstrate%20that%20LaVCa%20generates%20captions%20that%20describe%20voxel%20selectivity%20more%20accurately%20than%20the%20previously%20proposed%20method.%20Furthermore%2C%20the%20captions%20generated%20by%20LaVCa%20quantitatively%20capture%20more%20detailed%20properties%20than%20the%20existing%20method%20at%20both%20the%20inter-voxel%20and%20intra-voxel%20levels.%20Furthermore%2C%20a%20more%20detailed%20analysis%20of%20the%20voxel-specific%20properties%20generated%20by%20LaVCa%20reveals%20fine-grained%20functional%20differentiation%20within%20regions%20of%20interest%20%28ROIs%29%20in%20the%20visual%20cortex%20and%20voxels%20that%20simultaneously%20represent%20multiple%20distinct%20concepts.%20These%20findings%20offer%20profound%20insights%20into%20human%20visual%20representations%20by%20assigning%20detailed%20captions%20throughout%20the%20visual%20cortex%20while%20highlighting%20the%20potential%20of%20LLM-based%20methods%20in%20understanding%20brain%20representations.%0ALink%3A%20http%3A//arxiv.org/abs/2502.13606v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLaVCa%253A%2520LLM-assisted%2520Visual%2520Cortex%2520Captioning%26entry.906535625%3DTakuya%2520Matsuyama%2520and%2520Shinji%2520Nishimoto%2520and%2520Yu%2520Takagi%26entry.1292438233%3DUnderstanding%2520the%2520property%2520of%2520neural%2520populations%2520%2528or%2520voxels%2529%2520in%2520the%2520human%2520brain%2520can%2520advance%2520our%2520comprehension%2520of%2520human%2520perceptual%2520and%2520cognitive%2520processing%2520capabilities%2520and%2520contribute%2520to%2520developing%2520brain-inspired%2520computer%2520models.%2520Recent%2520encoding%2520models%2520using%2520deep%2520neural%2520networks%2520%2528DNNs%2529%2520have%2520successfully%2520predicted%2520voxel-wise%2520activity.%2520However%252C%2520interpreting%2520the%2520properties%2520that%2520explain%2520voxel%2520responses%2520remains%2520challenging%2520because%2520of%2520the%2520black-box%2520nature%2520of%2520DNNs.%2520As%2520a%2520solution%252C%2520we%2520propose%2520LLM-assisted%2520Visual%2520Cortex%2520Captioning%2520%2528LaVCa%2529%252C%2520a%2520data-driven%2520approach%2520that%2520uses%2520large%2520language%2520models%2520%2528LLMs%2529%2520to%2520generate%2520natural-language%2520captions%2520for%2520images%2520to%2520which%2520voxels%2520are%2520selective.%2520By%2520applying%2520LaVCa%2520for%2520image-evoked%2520brain%2520activity%252C%2520we%2520demonstrate {"title": "LAHNet: Local Attentive Hashing Network for Point Cloud Registration", "author": "Wentao Qu and Xiaoshui Huang and Liang Xiao", "abstract": "Most existing learning-based point cloud descriptors for point cloud registration focus on perceiving local information of point clouds to generate distinctive features. However, a reasonable and broader receptive field is essential for enhancing feature distinctiveness. In this paper, we propose a Local Attentive Hashing Network for point cloud registration, called LAHNet, which introduces a local attention mechanism with the inductive bias of locality of convolution-like operators into point cloud descriptors. Specifically, a Group Transformer is designed to capture reasonable long-range context between points. This employs a linear neighborhood search strategy, Locality-Sensitive Hashing, enabling uniformly partitioning point clouds into non-overlapping windows. Meanwhile, an efficient cross-window strategy is adopted to further expand the reasonable feature receptive field. Furthermore, building on this effective windowing strategy, we propose an Interaction Transformer to enhance the feature interactions of the overlap regions within point cloud pairs. This computes an overlap matrix to match overlap regions between point cloud pairs by representing each window as a global signal. Extensive results demonstrate that LAHNet can learn robust and distinctive features, achieving significant registration results on real-world indoor and outdoor benchmarks.", "link": "http://arxiv.org/abs/2512.00927v2", "date": "2026-03-09", "relevancy": 2.7445, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5986}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5298}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5183}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LAHNet%3A%20Local%20Attentive%20Hashing%20Network%20for%20Point%20Cloud%20Registration&body=Title%3A%20LAHNet%3A%20Local%20Attentive%20Hashing%20Network%20for%20Point%20Cloud%20Registration%0AAuthor%3A%20Wentao%20Qu%20and%20Xiaoshui%20Huang%20and%20Liang%20Xiao%0AAbstract%3A%20Most%20existing%20learning-based%20point%20cloud%20descriptors%20for%20point%20cloud%20registration%20focus%20on%20perceiving%20local%20information%20of%20point%20clouds%20to%20generate%20distinctive%20features.%20However%2C%20a%20reasonable%20and%20broader%20receptive%20field%20is%20essential%20for%20enhancing%20feature%20distinctiveness.%20In%20this%20paper%2C%20we%20propose%20a%20Local%20Attentive%20Hashing%20Network%20for%20point%20cloud%20registration%2C%20called%20LAHNet%2C%20which%20introduces%20a%20local%20attention%20mechanism%20with%20the%20inductive%20bias%20of%20locality%20of%20convolution-like%20operators%20into%20point%20cloud%20descriptors.%20Specifically%2C%20a%20Group%20Transformer%20is%20designed%20to%20capture%20reasonable%20long-range%20context%20between%20points.%20This%20employs%20a%20linear%20neighborhood%20search%20strategy%2C%20Locality-Sensitive%20Hashing%2C%20enabling%20uniformly%20partitioning%20point%20clouds%20into%20non-overlapping%20windows.%20Meanwhile%2C%20an%20efficient%20cross-window%20strategy%20is%20adopted%20to%20further%20expand%20the%20reasonable%20feature%20receptive%20field.%20Furthermore%2C%20building%20on%20this%20effective%20windowing%20strategy%2C%20we%20propose%20an%20Interaction%20Transformer%20to%20enhance%20the%20feature%20interactions%20of%20the%20overlap%20regions%20within%20point%20cloud%20pairs.%20This%20computes%20an%20overlap%20matrix%20to%20match%20overlap%20regions%20between%20point%20cloud%20pairs%20by%20representing%20each%20window%20as%20a%20global%20signal.%20Extensive%20results%20demonstrate%20that%20LAHNet%20can%20learn%20robust%20and%20distinctive%20features%2C%20achieving%20significant%20registration%20results%20on%20real-world%20indoor%20and%20outdoor%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2512.00927v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLAHNet%253A%2520Local%2520Attentive%2520Hashing%2520Network%2520for%2520Point%2520Cloud%2520Registration%26entry.906535625%3DWentao%2520Qu%2520and%2520Xiaoshui%2520Huang%2520and%2520Liang%2520Xiao%26entry.1292438233%3DMost%2520existing%2520learning-based%2520point%2520cloud%2520descriptors%2520for%2520point%2520cloud%2520registration%2520focus%2520on%2520perceiving%2520local%2520information%2520of%2520point%2520clouds%2520to%2520generate%2520distinctive%2520features.%2520However%252C%2520a%2520reasonable%2520and%2520broader%2520receptive%2520field%2520is%2520essential%2520for%2520enhancing%2520feature%2520distinctiveness.%2520In%2520this%2520paper%252C%2520we%2520propose%2520a%2520Local%2520Attentive%2520Hashing%2520Network%2520for%2520point%2520cloud%2520registration%252C%2520called%2520LAHNet%252C%2520which%2520introduces%2520a%2520local%2520attention%2520mechanism%2520with%2520the%2520inductive%2520bias%2520of%2520locality%2520of%2520convolution-like%2520operators%2520into%2520point%2520cloud%2520descriptors.%2520Specifically%252C%2520a%2520Group%2520Transformer%2520is%2520designed%2520to%2520capture%2520reasonable%2520long-range%2520context%2520between%2520points.%2520This%2520employs%2520a%2520linear%2520neighborhood%2520search%2520strategy%252C%2520Locality-Sensitive%2520Hashing%252C%2520enabling%2520uniformly%2520partitioning%2520point%2520clouds%2520into%2520non-overlapping%2520windows.%2520Meanwhile%252C%2520an%2520efficient%2520cross-window%2520strategy%2520is%2520adopted%2520to%2520further%2520expand%2520the%2520reasonable%2520 {"title": "BotaCLIP: Contrastive Learning for Botany-Aware Representation of Earth Observation Data", "author": "Selene Cerna and Sara Si-Moussi and Wilfried Thuiller and Hadrien Hendrikx and Vincent Miele", "abstract": "Foundation models have demonstrated a remarkable ability to learn rich, transferable representations across diverse modalities such as images, text, and audio. In modern machine learning pipelines, these representations often replace raw data as the primary input for downstream tasks. In this paper, we address the challenge of adapting a pre-trained foundation model to inject domain-specific knowledge, without retraining from scratch or incurring significant computational costs. To this end, we introduce BotaCLIP, a lightweight multimodal contrastive framework that adapts a pre-trained Earth Observation foundation model (DOFA) by aligning high-resolution aerial imagery with botanical relev\u00e9s. Unlike generic embeddings, BotaCLIP internalizes ecological structure through contrastive learning with a regularization strategy that mitigates catastrophic forgetting. Once trained, the resulting embeddings serve as transferable representations for downstream predictors. Motivated by real-world applications in biodiversity modeling, we evaluated BotaCLIP representations in three ecological tasks: plant presence prediction, butterfly occurrence modeling, and soil trophic group abundance estimation. The results showed consistent improvements over those derived from DOFA and supervised baselines. More broadly, this work illustrates how domain-aware adaptation of foundation models can inject expert knowledge into data-scarce settings, enabling frugal representation learning.", "link": "http://arxiv.org/abs/2511.21194v2", "date": "2026-03-09", "relevancy": 2.7418, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.573}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.536}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.536}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BotaCLIP%3A%20Contrastive%20Learning%20for%20Botany-Aware%20Representation%20of%20Earth%20Observation%20Data&body=Title%3A%20BotaCLIP%3A%20Contrastive%20Learning%20for%20Botany-Aware%20Representation%20of%20Earth%20Observation%20Data%0AAuthor%3A%20Selene%20Cerna%20and%20Sara%20Si-Moussi%20and%20Wilfried%20Thuiller%20and%20Hadrien%20Hendrikx%20and%20Vincent%20Miele%0AAbstract%3A%20Foundation%20models%20have%20demonstrated%20a%20remarkable%20ability%20to%20learn%20rich%2C%20transferable%20representations%20across%20diverse%20modalities%20such%20as%20images%2C%20text%2C%20and%20audio.%20In%20modern%20machine%20learning%20pipelines%2C%20these%20representations%20often%20replace%20raw%20data%20as%20the%20primary%20input%20for%20downstream%20tasks.%20In%20this%20paper%2C%20we%20address%20the%20challenge%20of%20adapting%20a%20pre-trained%20foundation%20model%20to%20inject%20domain-specific%20knowledge%2C%20without%20retraining%20from%20scratch%20or%20incurring%20significant%20computational%20costs.%20To%20this%20end%2C%20we%20introduce%20BotaCLIP%2C%20a%20lightweight%20multimodal%20contrastive%20framework%20that%20adapts%20a%20pre-trained%20Earth%20Observation%20foundation%20model%20%28DOFA%29%20by%20aligning%20high-resolution%20aerial%20imagery%20with%20botanical%20relev%C3%A9s.%20Unlike%20generic%20embeddings%2C%20BotaCLIP%20internalizes%20ecological%20structure%20through%20contrastive%20learning%20with%20a%20regularization%20strategy%20that%20mitigates%20catastrophic%20forgetting.%20Once%20trained%2C%20the%20resulting%20embeddings%20serve%20as%20transferable%20representations%20for%20downstream%20predictors.%20Motivated%20by%20 {"title": "SAIL: Similarity-Aware Guidance and Inter-Caption Augmentation-based Learning for Weakly-Supervised Dense Video Captioning", "author": "Ye-Chan Kim and SeungJu Cha and Si-Woo Kim and Minju Jeon and Hyungee Kim and Dong-Jin Kim", "abstract": "Weakly-Supervised Dense Video Captioning aims to localize and describe events in videos trained only on caption annotations, without temporal boundaries. Prior work introduced an implicit supervision paradigm based on Gaussian masking and complementary captioning. However, existing method focuses merely on generating non-overlapping masks without considering their semantic relationship to corresponding events, resulting in simplistic, uniformly distributed masks that fail to capture semantically meaningful regions. Moreover, relying solely on ground-truth captions leads to sub-optimal performance due to the inherent sparsity of existing datasets. In this work, we propose SAIL, which constructs semantically-aware masks through cross-modal alignment. Our similarity aware training objective guides masks to emphasize video regions with high similarity to their corresponding event captions. Furthermore, to guide more accurate mask generation under sparse annotation settings, we introduce an LLM-based augmentation strategy that generates synthetic captions to provide additional alignment signals. These synthetic captions are incorporated through an inter-mask mechanism, providing auxiliary guidance for precise temporal localization without degrading the main objective. Experiments on ActivityNet Captions and YouCook2 demonstrate state-of-the-art performance on both captioning and localization metrics.", "link": "http://arxiv.org/abs/2603.05437v2", "date": "2026-03-09", "relevancy": 2.6601, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5392}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.534}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5229}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SAIL%3A%20Similarity-Aware%20Guidance%20and%20Inter-Caption%20Augmentation-based%20Learning%20for%20Weakly-Supervised%20Dense%20Video%20Captioning&body=Title%3A%20SAIL%3A%20Similarity-Aware%20Guidance%20and%20Inter-Caption%20Augmentation-based%20Learning%20for%20Weakly-Supervised%20Dense%20Video%20Captioning%0AAuthor%3A%20Ye-Chan%20Kim%20and%20SeungJu%20Cha%20and%20Si-Woo%20Kim%20and%20Minju%20Jeon%20and%20Hyungee%20Kim%20and%20Dong-Jin%20Kim%0AAbstract%3A%20Weakly-Supervised%20Dense%20Video%20Captioning%20aims%20to%20localize%20and%20describe%20events%20in%20videos%20trained%20only%20on%20caption%20annotations%2C%20without%20temporal%20boundaries.%20Prior%20work%20introduced%20an%20implicit%20supervision%20paradigm%20based%20on%20Gaussian%20masking%20and%20complementary%20captioning.%20However%2C%20existing%20method%20focuses%20merely%20on%20generating%20non-overlapping%20masks%20without%20considering%20their%20semantic%20relationship%20to%20corresponding%20events%2C%20resulting%20in%20simplistic%2C%20uniformly%20distributed%20masks%20that%20fail%20to%20capture%20semantically%20meaningful%20regions.%20Moreover%2C%20relying%20solely%20on%20ground-truth%20captions%20leads%20to%20sub-optimal%20performance%20due%20to%20the%20inherent%20sparsity%20of%20existing%20datasets.%20In%20this%20work%2C%20we%20propose%20SAIL%2C%20which%20constructs%20semantically-aware%20masks%20through%20cross-modal%20alignment.%20Our%20similarity%20aware%20training%20objective%20guides%20masks%20to%20emphasize%20video%20regions%20with%20high%20similarity%20to%20their%20corresponding%20event%20captions.%20Furthermore%2C%20to%20guide%20more%20accurate%20ma {"title": "Novel Semantic Prompting for Zero-Shot Action Recognition", "author": "Salman Iqbal and Waheed Rehman", "abstract": "Zero-shot action recognition relies on transferring knowledge from vision-language models to unseen actions using semantic descriptions. While recent methods focus on temporal modeling or architectural adaptations to handle video data, we argue that semantic prompting alone provides a strong and underexplored signal for zero-shot action understanding. We introduce SP-CLIP, a lightweight framework that augments frozen vision-language models with structured semantic prompts describing actions at multiple levels of abstraction, such as intent, motion, and object interaction. Without modifying the visual encoder or learning additional parameters, SP-CLIP aligns video representations with enriched textual semantics through prompt aggregation and consistency scoring. Experiments across standard benchmarks show that semantic prompting substantially improves zero-shot action recognition, particularly for fine-grained and compositional actions, while preserving the efficiency and generalization of pretrained models.", "link": "http://arxiv.org/abs/2603.08289v1", "date": "2026-03-09", "relevancy": 2.6567, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5368}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5368}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5205}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Novel%20Semantic%20Prompting%20for%20Zero-Shot%20Action%20Recognition&body=Title%3A%20Novel%20Semantic%20Prompting%20for%20Zero-Shot%20Action%20Recognition%0AAuthor%3A%20Salman%20 s%2520to%2520handle%2520video%2520data%252C%2520we%2520argue%2520that%2520semantic%2520prompting%2520alone%2520provides%2520a%2520strong%2520and%2520underexplored%2520signal%2520for%2520zero-shot%2520action%2520understanding.%2520We%2520introduce%2520SP-CLIP%252C%2520a%2520lightweight%2520framework%2520that%2520augments%2520frozen%2520vision-language%2520models%2520with%2520structured%2520semantic%2520prompts%2520describing%2520actions%2520at%2520multiple%2520levels%2520of%2520abstraction%252C%2520such%2520as%2520intent%252C%2520motion%252C%2520and%2520object%2520interaction.%2520Without%2520modifying%2520the%2520visual%2520encoder%2520or%2520learning%2520additional%2520parameters%252C%2520SP-CLIP%2520aligns%2520video%2520representations%2520with%2520enriched%2520textual%2520semantics%2520through%2520prompt%2520aggregation%2520and%2520consistency%2520scoring.%2520Experiments%2520across%2520standard%2520benchmarks%2520show%2520that%2520semantic%2520prompting%2520substantially%2520improves%2520zero-shot%2520action%2520recognition%252C%2520particularly%2520for%2520fine-grained%2520and%2520compositional%2520actions%252C%2520while%2520preserving%2520the%2520efficiency%2520and%2520generalization%2520of%2520pretrained%2520models.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.08289v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Novel%20Semantic%20Prompting%20for%20Zero-Shot%20Action%20Recognition&entry.906535625=Salman%20Iqbal%20and%20Waheed%20Rehman&entry.1292438233=Zero-shot%20action%20recognition%20relies%20on%20transferring%20knowledge%20from%20vision-language%20models%20to%20unseen%20actions%20using%20semantic%20descriptions.%20While%20recent%20methods%20focus%20on%20temporal%20modeling%20or%20architectural%20adaptations%20to%20handle%20video%20data%2C%20we%20argue%20that%20semantic%20prompting%20alone%20provides%20a%20strong%20and%20underexplored%20signal%2 {"title": "Computational modeling of early language learning from acoustic speech and audiovisual input without linguistic priors", "author": "Okko R\u00e4s\u00e4nen", "abstract": "Learning to understand speech appears almost effortless for typically developing infants, yet from an information-processing perspective, acquiring a language from acoustic speech is an enormous challenge. This chapter reviews recent developments in using computational models to understand early language acquisition from speech and audiovisual input. The focus is on self-supervised and visually grounded models of perceptual learning. We show how these models are becoming increasingly powerful in learning various aspects of speech without strong linguistic priors, and how many features of early language development can be explained through a shared set of learning principles-principles broadly compatible with multiple theories of language acquisition and human cognition. We also discuss how modern learning simulations are gradually becoming more realistic, both in terms of input data and in linking model behavior to empirical findings on infant language development.", "link": "http://arxiv.org/abs/2603.08359v1", "date": "2026-03-09", "relevancy": 2.656, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5513}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5513}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.491}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Computational%20modeling%20of%20early%20language%20learning%20from%20acoustic%20speech%20and%20audiovisual%20input%20without%20linguistic%20priors&body=Title%3A%20Computational%20modeling%20of%20early% from%2520an%2520information-processing%2520perspective%252C%2520acquiring%2520a%2520language%2520from%2520acoustic%2520speech%2520is%2520an%2520enormous%2520challenge.%2520This%2520chapter%2520reviews%2520recent%2520developments%2520in%2520using%2520computational%2520models%2520to%2520understand%2520early%2520language%2520acquisition%2520from%2520speech%2520and%2520audiovisual%2520input.%2520The%2520focus%2520is%2520on%2520self-supervised%2520and%2520visually%2520grounded%2520models%2520of%2520perceptual%2520learning.%2520We%2520show%2520how%2520these%2520models%2520are%2520becoming%2520increasingly%2520powerful%2520in%2520learning%2520various%2520aspects%2520of%2520speech%2520without%2520strong%2520linguistic%2520priors%252C%2520and%2520how%2520many%2520features%2520of%2520early%2520language%2520development%2520can%2520be%2520explained%2520through%2520a%2520shared%2520set%2520of%2520learning%2520principles-principles%2520broadly%2520compatible%2520with%2520multiple%2520theories%2520of%2520language%2520acquisition%2520and%2520human%2520cognition.%2520We%2520also%2520discuss%2520how%2520modern%2520learning%2520simulations%2520are%2520gradually%2520becoming%2520more%2520realistic%252C%2520both%2520in%2520terms%2520of%2520input%2520data%2520and%2520in%2520linking%2520model%2520behavior%2520to%2520empirical%2520findings%2520on%2520infant%2520language%2520development.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.08359v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Computational%20modeling%20of%20early%20language%20learning%20from%20acoustic%20speech%20and%20audiovisual%20input%20without%20linguistic%20priors&entry.906535625=Okko%20R%C3%A4s%C3%A4nen&entry.1292438233=Learning%20to%20understand%20speech%20appears%20almost%20effortless%20for%20typically%20developing%20infants%2C%20yet%20from%20an%20information-processing%20perspective%2C%20acquiring%20a%20languag {"title": "To Mix or To Merge: Toward Multi-Domain Reinforcement Learning for Large Language Models", "author": "Haoqing Wang and Xiang Long and Ziheng Li and Yilong Xu and Tingguang Li and Yehui Tang", "abstract": "Reinforcement Learning with Verifiable Rewards (RLVR) plays a key role in stimulating the explicit reasoning capability of Large Language Models (LLMs). We can achieve expert-level performance in some specific domains via RLVR, such as coding or math. When a general multi-domain expert-level model is required, we need to carefully consider the collaboration of RLVR across different domains. The current state-of-the-art models mainly employ two different training paradigms for multi-domain RLVR: mixed multi-task RLVR and separate RLVR followed by model merging. However, most of the works did not provide a detailed comparison and analysis about these paradigms. To this end, we choose multiple commonly used high-level tasks (e.g., math, coding, science, instruction following, and agent) as our target domains and design extensive qualitative and quantitative experiments using open-source datasets. We find the RLVR across domains exhibits few mutual interferences, and reasoning-intensive domains demonstrate mutually synergistic effects. Furthermore, we analyze the internal mechanisms of mutual gains from the perspectives of weight space geometry, model prediction behavior, information constraints and self-verification. This project is named as M2RL that means Mixed multi-task training or separate training followed by model Merging for Reinforcement Learning, and the homepage is at https://github.com/mosAI25/M2RL.", "link": "http://arxiv.org/abs/2602.12566v2", "date": "2026-03-09", "relevancy": 2.6283, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5329}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "htt {"title": "FVG-PT: Adaptive Foreground View-Guided Prompt Tuning for Vision-Language Models", "author": "Haoyang Li and Liang Wang and Siyu Zhou and Jiacheng Sun and Jing Jiang and Chao Wang and Guodong Long and Yan Peng", "abstract": "CLIP-based prompt tuning enables pretrained Vision-Language Models (VLMs) to efficiently adapt to downstream tasks. Although existing studies have made significant progress, they pay limited attention to changes in the internal attention representations of VLMs during the tuning process. In this paper, we attribute the failure modes of prompt tuning predictions to shifts in foreground attention of the visual encoder, and propose Foreground View-Guided Prompt Tuning (FVG-PT), an adaptive plug-and-play foreground attention guidance module, to alleviate the shifts. Concretely, FVG-PT introduces a learnable Foreground Reliability Gate to automatically enhance the foreground view quality, applies a Foreground Distillation Compensation module to guide visual attention toward the foreground, and further introduces a Prior Calibration module to mitigate generalization degradation caused by excessive focus on the foreground. Experiments on multiple backbone models and datasets show the effectiveness and compatibility of FVG-PT. Codes are available at: https://github.com/JREion/FVG-PT", "link": "http://arxiv.org/abs/2603.08708v1", "date": "2026-03-09", "relevancy": 2.6222, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5289}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5289}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5155}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FVG-PT%3A%20Adapti {"title": "Are vision-language models ready to zero-shot replace supervised classification models in agriculture?", "author": "Earl Ranario and Mason J. Earles", "abstract": "Vision-language models (VLMs) are increasingly proposed as general-purpose solutions for visual recognition tasks, yet their reliability for agricultural decision support remains poorly understood. We benchmark a diverse set of open-source and closed-source VLMs on 27 agricultural image classification datasets from the AgML collection (https://github.com/Project-AgML), spanning 162 classes and 248,000 images across plant disease, pest and damage, and plant and weed species identification. Across all tasks, zero-shot VLMs substantially underperform a supervised task-specific baseline (YOLO11), which consistently achieves markedly higher accuracy than any foundation model. Under multiple-choice prompting, the best-performing VLM (Gemini-3 Pro) reaches approximately 62% average accuracy, while open-ended prompting yields much lower performance, with raw accuracies typically below 25%. Applying LLM-based semantic judging increases open-ended accuracy (e.g., from ~21% to ~30% for top models) and alters model rankings, demonstrating that evaluation methodology meaningfully affects reported conclusions. Among open-source models, Qwen-VL-72B performs best, approaching closed-source performance under constrained prompting but still trailing top proprietary systems. Task-level analysis shows that plant and weed species classification is consistently easier than pest and damage identification, which remains the most challenging category across models. Overall, these results indicate that current off-the-shelf VLMs are not yet suitable as standalone agricultural diagnostic systems, but can function as assistive components when paired with constrained interfaces, explicit label ontologies, and domain-aware evaluation strategies.", "link": "http://arxiv.org/abs/2512.15977v2", "date": "2026-03-09", "relevancy": 2.6156, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5393}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5393}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4908}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Are%20vision-language%20models%20ready%20to%20zero-shot%20replace%20supervised%20classification%20models%20in%20agriculture%3F&body=Title%3A%20Are%20vision-language%20models%20ready%20to%20zero-shot%20replace%20supervised%20classification%20models%20in%20agriculture%3F%0AAuthor%3A%20Earl%20Ranario%20and%20Mason%20J.%20Earles%0AAbstract%3A%20Vision-language%20models%20%28VLMs%29%20are%20increasingly%20proposed%20as%20general-purpose%20solutions%20for%20visual%20recognition%20tasks%2C%20yet%20their%20reliability%20for%20agricultural%20decision%20support%20remains%20poorly%20understood.%20We%20benchmark%20a%20diverse%20set%20of%20open-source%20and%20closed-source%20VLMs%20on%2027%20agricultural%20image%20classification%20datasets%20from%20the%20AgML%20collection%20%28https%3A//github.com/Project-AgML%29%2C%20spanning%20162%20classes%20and%20248%2C000%20images%20across%20plant%20disease%2C%20pest%20and%20damage%2C%20and%20plant%20and%20weed%20species%20identification.%20Across%20all%20tasks%2C%20zero-shot%20VLMs%20substantially%20underperform%20a%20supervised%20task-specific%20baseline%20%28YOLO11%29%2C%20which%20consistently%20achieves%20markedly%20higher%20accuracy%20than%20any%20foundation%20model.%20Under%20multiple-choice%20prompting%2C%20the%20best-performing%20VLM%20%28Gemini-3%20Pro%29%20reaches%20approximately%2062%25%20average%20accuracy%2C%20while%20open-ended%20prompting%20yields%20much%20lower%20performance%2C%20with%20raw%20accuracies%20typically%20below%2025%25.%20Applying%20LLM-based%20semantic%20judging%20increases%20open-ended%20accuracy%20%28e.g.%2C%20from%20~21%25%20to%20~30%25%20for%20top%20models%29%20and%20alters%20model%20rankings%2C%20demonstrating%20that%20evaluation%20methodology%20meaningfully%20affects%20reported%20conclusions.%20Among%20open-source%20models%2C%20Qwen-VL-72B%20performs%20best%2C%20approaching%20closed-source%20performance%20under%20constrained%20prompting%20but%20still%20trailing%20top%20proprietary%20systems.%20Task-level%20analysis%20shows%20that%20plant%20and%20weed%20species%20classification%20is%20consistently%20easier%20than%20pest%20and%20damage%20identification%2C%20which%20remains%20the%20most%20challenging%20category%20across%20models.%20Overall%2C%20these%20results%20indicate%20that%20current%20off-the-shelf%20VLMs%20are%20not%20yet%20suitable%20as%20standalone%20agricultural%20diagnostic%20systems%2C%20but%20can%20function%20as%20assistive%20components%20when%20paired%20with%20constrained%20interfaces%2C%20explicit%20label%20ontologies%2C%20and%20domain-aware%20evaluation%20strategies.%0ALink%3A%20http%3A//arxiv.org/abs/2512.15977v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAre%2520vision-language%2520models%2520ready%2520to%2520zero-shot%2520replace%2520supervised%2520classification%2520models%2520in%2520agriculture%253F%26entry.906535625%3DEarl%2520Ranario%2520and%2520Mason%2520J.%2520Earles%26entry.1292438233%3DVision-language%2520models%2520%2528VLMs%2529%2520are%2520increasingly%2520proposed%2520as%2520general-purpose%2520solutions%2520for%2520visual%2520recognition%2520tasks%252C%2520yet%2520their%2520reliability%2520for%2520agricultural%2520decision%2520support%2520remains%2520poorly%2520underst {"title": "SDFed: Bridging Local Global Discrepancy via Subspace Refinement and Divergence Control in Federated Prompt Learning", "author": "Yicheng Di and Wei Yuan and Tieke He and Yuan Liu and Hongzhi Yin", "abstract": "Vision-language pretrained models offer strong transferable representations, yet adapting them in privacy-sensitive multi-party settings is challenging due to the high communication cost of federated optimization and the limited local data on clients. Federated prompt learning mitigates this issue by keeping the VLPM backbone frozen and collaboratively training lightweight prompt parameters. However, existing approaches typically enforce a unified prompt structure and length across clients, which is inadequate under practical client heterogeneity in both data distributions and system resources, and may further introduce conflicts between globally shared and locally optimal knowledge. To address these challenges, we propose \\textbf{SDFed}, a heterogeneous federated prompt learning framework that bridges Local-Global Discrepancy via Subspace Refinement and Divergence Control. SDFed maintains a fixed-length global prompt for efficient aggregation while allowing each client to learn a variable-length local prompt to better match its data characteristics and capacity. To mitigate local-global conflicts and facilitate effective knowledge transfer, SDFed introduces a subspace refinement method for local prompts and an information retention and divergence control strategy that preserves key local information while maintaining appropriate separability between global and local representations. Extensive experiments on several datasets demonstrate that SDFed consistently improves performance and robustness in heterogeneous federated settings.", "link": "http://arxiv.org/abs/2602.08590v2", "date": "2026-03-09", "relevancy": 2.6153, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5254}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5219}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5219}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SDFed%3A%20Bridging%20Local%20Global%20Discrepancy%20via%20Subspace%20Refinement%20and%20Divergence%20Control%20in%20Federated%20Prompt%20Learning&body=Title%3A%20SDFed%3A%20Bridging%20Local%20Global%20Discrepancy%20via%20Subspace%20Refinement%20and%20Divergence%20Control%20in%20Federated%20Prompt%20Learning%0AAuthor%3A%20Yicheng%20Di%20and%20Wei%20Yuan%20and%20Tieke%20He%20and%20Yuan%20Liu%20and%20Hongzhi%20Yin%0AAbstract%3A%20Vision-language%20pretrained%20models%20offer%20strong%20transferable%20representations%2C%20yet%20adapting%20them%20in%20privacy-sensitive%20multi-party%20settings%20is%20challenging%20due%20to%20the%20high%20communication%20cost%20of%20federated%20optimization%20and%20the%20limited%20local%20data%20on%20clients.%20Federated%20prompt%20learning%20mitigates%20this%20issue%20by%20keeping%20the%20VLPM%20backbone%20frozen%20and%20collaboratively%20training%20lightweight%20prompt%20parameters.%20However%2C%20existing%20approaches%20typically%20enforce%20a%20unified%20prompt%20structure%20and%20length%20across%20clients%2C%20which%20is%20inadequate%20under%20practical%20client%20heterogeneity%20in%20both%20data%20distributions%20and%20system%20resources%2C%20and%20may%20further%20introduce%20conflicts%20between%20globally%20shared%20and%20locally%20optimal%20knowledge.%20To%20address%20these%20challenges%2C%20we%20propose%20%5Ctextbf%7BSDFed%7D%2C%20a%20heterogeneous%20federated%20prompt%20learning%20framework%20that%20bridges%20Local-Global%20Discrepancy%20via%20Subspace%20Refinement%20and%20Divergence%20Control.%20SDFed%20maintains%20a%20fixed-length%20global%20prompt%20for%20efficient%20aggregation%20while%20allowing%20each%20client%20to%20learn%20a%20variable-length%20local%20prompt%20to%20better%20match%20its%20data%20characteristics%20and%20capacity.%20To%20mitigate%20local-global%20conflicts%20and%20facilitate%20effective%20knowledge%20transfer%2C%20SDFed%20introduces%20a%20subspace%20refinement%20method%20for%20local%20prompts%20and%20an%20information%20retention%20and%20divergence%20control%20strategy%20that%20preserves%20key%20local%20information%20while%20maintaining%20appropriate%20separability%20between%20global%20and%20local%20representations.%20Extensive%20experiments%20on%20several%20datasets%20demonstrate%20that%20SDFed%20consistently%20improves%20performance%20and%20robustness%20in%20heterogeneous%20federated%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2602.08590v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSDFed%253A%2520Bridging%2520Local%2520Global%2520Discrepancy%2520via%2520Subspace%2520Refinement%2520and%2520Divergence%2520Control%2520in%2520Federated%2520Prompt%2520Learning%26entry.906535625%3DYicheng%2520Di%2520and%2520Wei%2520Yuan%2520and%2520Tieke%2520He%2520and%2520Yuan%2520Liu%2520and%2520Hongzhi%2520Yin%26entry.1292438233%3DVision-language%2520pretrained%2520models%2520offer%2520strong%2520transferable%2520representations%252C%2520yet%2520adapting%2520them%2520in%2520privacy-sensitive%2520multi-party%2520settings%2520is%2520challenging%2520due%2520to%2520the%2520high%2520communication%2520cost%2520of%2520federated%2520optimization%2520and%2520the%2520limited%2520local%2520data%2520on%2520clients.%2520Federated%2520prompt%2520learning%2520mitigates%2520this%2520issue%2520by%2520keeping%2520the%2520VLPM%2520backbone%2520frozen%2520and%2520collaboratively%2520training%2520lightweight%2520prompt%2520parameters.%2520However%252C%2520exist {"title": "Single Image, Any Face: Generalisable 3D Face Generation", "author": "Wenqing Wang and Haosen Yang and Josef Kittler and Xiatian Zhu", "abstract": "The creation of 3D human face avatars from a single unconstrained image is a fundamental task that underlies numerous real-world vision and graphics applications. Despite the significant progress made in generative models, existing methods are either less suited in design for human faces or fail to generalise from the restrictive training domain to unconstrained facial images. To address these limitations, we propose a novel model, Gen3D-Face, which generates 3D human faces with unconstrained single image input within a multi-view consistent diffusion framework. Given a specific input image, our model first produces multi-view images, followed by neural surface construction. To incorporate face geometry information while preserving generalisation to in-the-wild inputs, we estimate a subject-specific mesh directly from the input image, enabling training and evaluation without ground-truth 3D supervision. Importantly, we introduce a multi-view joint generation scheme to enhance the appearance consistency among different views. To the best of our knowledge, this is the first attempt and benchmark for creating photorealistic 3D human face avatars from single images for generic human subject across domains. Extensive experiments demonstrate the efficacy and superiority of our method over previous alternatives for out-of-domain single image 3D face generation and the top ranking competition for the in-domain setting.", "link": "http://arxiv.org/abs/2409.16990v3", "date": "2026-03-09", "relevancy": 2.6144, "topK": [{"title": "Total Selfie: Generating Full-Body Selfies", "link": "http://arxiv.org/abs/2308.14740v2", "similarity": 0.6578}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6528}, {"title": "CAT3D: Create Anything in 3D {"title": "Spherical-GOF: Geometry-Aware Panoramic Gaussian Opacity Fields for 3D Scene Reconstruction", "author": "Zhe Yang and Guoqiang Zhao and Sheng Wu and Kai Luo and Kailun Yang", "abstract": "Omnidirectional images are increasingly used in robotics and vision due to their wide field of view. However, extending 3D Gaussian Splatting (3DGS) to panoramic camera models remains challenging, as existing formulations are designed for perspective projections and naive adaptations often introduce distortion and geometric inconsistencies. We present Spherical-GOF, an omnidirectional Gaussian rendering framework built upon Gaussian Opacity Fields (GOF). Unlike projection-based rasterization, Spherical-GOF performs GOF ray sampling directly on the unit sphere in spherical ray space, enabling consistent ray-Gaussian interactions for panoramic rendering. To make the spherical ray casting efficient and robust, we derive a conservative spherical bounding rule for fast ray-Gaussian culling and introduce a spherical filtering scheme that adapts Gaussian footprints to distortion-varying panoramic pixel sampling. Extensive experiments on standard panoramic benchmarks (OmniBlender and OmniPhotos) demonstrate competitive photometric quality and substantially improved geometric consistency. Compared with the strongest baseline, Spherical-GOF reduces depth reprojection error by 57% and improves cycle inlier ratio by 21%. Qualitative results show cleaner depth and more coherent normal maps, with strong robustness to global panorama rotations. We further validate generalization on OmniRob, a real-world robotic omnidirectional dataset introduced in this work, featuring UAV and quadruped platforms. The source code and the OmniRob dataset will be released at https://github.com/1170632760/Spherical-GOF.", "link": "http://arxiv.org/abs/2603.08503v1", "date": "2026-03-09", "relevancy": 2.6131, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6712}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6484}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6207}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Spherical-GOF%3A%20Geometry-Aware%20Panoramic%20Gaussian%20Opacity%20Fields%20for%203D%20Scene%20Reconstruction&body=Title%3A%20Spherical-GOF%3A%20Geometry-Aware%20Panoramic%20Gaussian%20Opacity%20Fields%20for%203D%20Scene%20Reconstruction%0AAuthor%3A%20Zhe%20Yang%20and%20Guoqiang%20Zhao%20and%20Sheng%20Wu%20and%20Kai%20Luo%20and%20Kailun%20Yang%0AAbstract%3A%20Omnidirectional%20images%20are%20increasingly%20used%20in%20robotics%20and%20vision%20due%20to%20their%20wide%20field%20of%20view.%20However%2C%20extending%203D%20Gaussian%20Splatting%20%283DGS%29%20to%20panoramic%20camera%20models%20remains%20challenging%2C%20as%20existing%20formulations%20are%20designed%20for%20perspective%20projections%20and%20naive%20adaptations%20often%20introduce%20distortion%20and%20geometric%20inconsistencies.%20We%20present%20Spherical-GOF%2C%20an%20omnidirectional%20Gaussian%20rendering%20framework%20built%20upon%20Gaussian%20Opacity%20Fields%20%28GOF%29.%20Unlike%20projection-based%20rasterization%2C%20Spherical-GOF%20performs%20GOF%20ray%20sampling%20directly%20on%20the%20unit%20sphere%20in%20spherical%20ray%20space%2C%20enabling%20consistent%20ray-Gaussian%20interactions%20for%20panoramic%20rendering.%20To%20make%20the%20spherical%20ray%20casting%20efficient%20and%20robust%2C%20we%20derive%20a%20conservative%20spherical%20bounding%20rule%20for%20fast%20ray-Gaussian%20culling%20and%20introduce%20a%20spherical%20filtering%20scheme%20that%20adapts%20Gaussian%20footprints%20to%20distortion-varying%20panoramic%20pixel%20sampling.%20Extensive%20experiments%20on%20standard%20panoramic%20benchmarks%20%28OmniBlender%20and%20OmniPhotos%29%20demonstrate%20competitive%20photometric%20quality%20and%20substantially%20improved%20geometric%20consistency.%20Compared%20with%20the%20strongest%20baseline%2C%20Spherical-GOF%20reduces%20depth%20reprojection%20error%20by%2057%25%20and%20improves%20cycle%20inlier%20ratio%20by%2021%25.%20Qualitative%20results%20show%20cleaner%20depth%20and%20more%20coherent%20normal%20maps%2C%20with%20strong%20robustness%20to%20global%20panorama%20rotations.%20We%20further%20validate%20generalization%20on%20OmniRob%2C%20a%20real-world%20robotic%20omnidirectional%20dataset%20introduced%20in%20this%20work%2C%20featuring%20UAV%20and%20quadruped%20platforms.%20The%20source%20code%20and%20the%20OmniRob%20dataset%20will%20be%20released%20at%20https%3A//github.com/1170632760/Spherical-GOF.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08503v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSpherical-GOF%253A%2520Geometry-Aware%2520Panoramic%2520Gaussian%2520Opacity%2520Fields%2520for%25203D%2520Scene%2520Reconstruction%26entry.906535625%3DZhe%2520Yang%2520and%2520Guoqiang%2520Zhao%2520and%2520Sheng%2520Wu%2520and%2520Kai%2520Luo%2520and%2520Kailun%2520Yang%26entry.1292438233%3DOmnidirectional%2520images%2520are%2520increasingly%2520used%2520in%2520robotics%2520and%2520vision%2520due%2520to%2520their%2520wide%2520field%2520of%2520view.%2520However%252C%2520extending%25203D%2520Gaussian%2520Splatting%2520%25283DGS%2529%2520to%2520panoramic%2520camera%2520models%2520remains%2520challenging%252C%2520as%2520existing%2520formulations%2520are%2520designed%2520for%2520perspective%2520projections%2520and%2520naive%2520adaptations%2520often%2520introduce%2520distortion%2520and%2520geometric%2520inconsistencies.%2520We%2520present%2520Spherical-GOF%252C%2520an%2520omnidirectional%2520Gaussian%2520rendering%2520framework%2520built%2520upon%2520 {"title": "Weakly Supervised Teacher-Student Framework with Progressive Pseudo-mask Refinement for Gland Segmentation", "author": "Hikmat Khan and Wei Chen and Muhammad Khalid Khan Niazi", "abstract": "Background and objectives: Colorectal cancer histopathological grading depends on accurate segmentation of glandular structures. Current deep learning approaches rely on large scale pixel level annotations that are labor intensive and difficult to obtain in routine clinical practice. Weakly supervised semantic segmentation offers a promising alternative. However, class activation map based methods often produce incomplete pseudo masks that emphasize highly discriminative regions and fail to supervise unannotated glandular structures. We propose a weakly supervised teacher student framework that leverages sparse pathologist annotations and an Exponential Moving Average stabilized teacher network to generate refined pseudo masks.\n  Methods: The framework integrates confidence based filtering, adaptive fusion of teacher predictions with limited ground truth, and curriculum guided refinement to progressively segment unannotated glandular regions. The method was evaluated on an institutional colorectal cancer cohort from The Ohio State University Wexner Medical Center consisting of 60 hematoxylin and eosin stained whole slide images and on public datasets including the Gland Segmentation dataset, TCGA COAD, TCGA READ, and SPIDER.\n  Results: On the Gland Segmentation dataset the framework achieved a mean Intersection over Union of 80.10 and a mean Dice coefficient of 89.10. Cross cohort evaluation demonstrated robust generalization on TCGA COAD and TCGA READ without additional annotations, while reduced performance on SPIDER reflected domain shift.\n  Conclusions: The proposed framework provides an annotation efficient and generalizable approach for gland segmentation in colorectal histopathology.", "link": "http://arxiv.org/abs/2603.08605v1", "date": "2026-03-09", "relev {"title": "TumorChain: Interleaved Multimodal Chain-of-Thought Reasoning for Traceable Clinical Tumor Analysis", "author": "Sijing Li and Zhongwei Qiu and Jiang Liu and Wenqiao Zhang and Tianwei Lin and Yihan Xie and Jianxiang An and Boxiang Yun and Chenglin Yang and Jun Xiao and Guangyu Guo and Jiawen Yao and Wei Liu and Yuan Gao and Ke Yan and Weiwei Cao and Zhilin Zheng and Tony C. W. Mok and Kai Cao and Yu Shi and Jiuyu Zhang and Jian Zhou and Beng Chin Ooi and Yingda Xia and Ling Zhang", "abstract": "Accurate tumor analysis is central to clinical radiology and precision oncology, where early detection, reliable lesion characterization, and pathology-level risk assessment guide diagnosis and treatment planning. Chain-of-Thought (CoT) reasoning is particularly important in this setting because it enables step-by-step interpretation from imaging findings to clinical impressions and pathology conclusions, improving traceability and reducing diagnostic errors. Here, we target the clinical tumor analysis task and build a large-scale benchmark that operationalizes a multimodal reasoning pipeline, spanning findings, impressions, and pathology predictions. We curate TumorCoT, a large-scale dataset of 1.5M CoT-labeled VQA instructions paired with 3D CT scans, with step-aligned rationales and cross-modal alignments along the trajectory from findings to impression to pathology, enabling evaluation of both answer accuracy and reasoning consistency. We further propose TumorChain, a multimodal interleaved reasoning framework that tightly couples 3D imaging encoders, clinical text understanding, and organ-level vision-language alignment. Through cross-modal alignment and iterative interleaved causal reasoning, TumorChain grounds visual evidence, aggregates conclusions, and issues pathology predictions after multiple rounds of self-refinement, improving traceability and reducing hallucination risk. Experiments show consistent improvements over strong baselines in lesion detection, impression generation, and pathology classification, and demonstrate strong generalization on the DeepTumorVQA benchmark. These results highlight the potential of multimodal reasoning for reliable and interpretable tumor analysis in clinical practice. Detailed information about our project can be found on our project homepage at https://github.com/ZJU4HealthCare/TumorChain.", "link": "http://arxiv.org/abs/2603.05867v2", "date": "2026-03-09", "relevancy": 2.5981, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5346}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5121}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5121}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TumorChain%3A%20Interleaved%20Multimodal%20Chain-of-Thought%20Reasoning%20for%20Traceable%20Clinical%20Tumor%20Analysis&body=Title%3A%20TumorChain%3A%20Interleaved%20Multimodal%20Chain-of-Thought%20Reasoning%20for%20Traceable%20Clinical%20Tumor%20Analysis%0AAuthor%3A%20Sijing%20Li%20and%20Zhongwei%20Qiu%20and%20Jiang%20Liu%20and%20Wenqiao%20Zhang%20and%20Tianwei%20Lin%20and%20Yihan%20Xie%20and%20Jianxiang%20An%20and%20Boxiang%20Yun%20and%20Chenglin%20Yang%20and%20Jun%20Xiao%20and%20Guangyu%20Guo%20and%20Jiawen%20Yao%20and%20Wei%20Liu%20and%20Yuan%20Gao%20and%20Ke%20Yan%20and%20Weiwei%20Cao%20and%20Zhilin%20Zheng%20and%20Tony%20C.%20W.%20Mok%20and%20Kai%20Cao%20and%20Yu%20Shi%20and%20Jiuyu%20Zhang%20and%20Jian%20Zhou%20and%20Beng%20Chin%20Ooi%20and%20Yingda%20Xia%20and%20Ling%20Zhang%0AAbstract%3A%20Accurate%20tumor%20analysis%20is%20central%20to%20clinical%20radiology%20and%20precision%20oncology%2C%20where%20early%20detection%2C%20reliable%20lesion%20characterization%2C%20and%20pathology-level%20risk%20assessment%20guide%20diagnosis%20and%20treatment%20planning.%20Chain-of-Thought%20%28CoT%29%20reasoning%20is%20particularly%20important%20in%20this%20setting%20because%20it%20enables%20step-by-step%20interpretation%20from%20imaging%20findings%20to%20clinical%20impressions%20and%20pathology%20conclusions%2C%20improving%20traceability%20and%20reducing%20diagnostic%20errors.%20Here%2C%20we%20target%20the%20clinical%20tumor%20analysis%20task%20and%20build%20a%20large-scale%20benchmark%20that%20operationalizes%20a%20multimodal%20reasoning%20pipeline%2C%20spanning%20findings%2C%20impressions%2C%20and%20pathology%20predictions.%20We%20curate%20TumorCoT%2C%20a%20large-scale%20dataset%20of%201.5M%20CoT-labeled%20VQA%20instructions%20paired%20with%203D%20CT%20scans%2C%20with%20step-aligned%20rationales%20and%20cross-modal%20alignments%20along%20the%20trajectory%20from%20findings%20to%20impression%20to%20pathology%2C%20enabling%20evaluation%20of%20both%20answer%20accuracy%20and%20reasoning%20consistency.%20We%20further%20propose%20TumorChain%2C%20a%20multimodal%20interleaved%20reasoning%20framework%20that%20tightly%20couples%203D%20imaging%20encoders%2C%20clinical%20text%20understanding%2C%20and%20organ-level%20vision-language%20alignment.%20Through%20cross-modal%20alignment%20and%20iterative%20interleaved%20causal%20reasoning%2C%20TumorChain%20grounds%20visual%20evidence%2C%20aggregates%20conclusions%2C%20and%20issues%20pathology%20predictions%20after%20multiple%20rounds%20of%20self-refinement%2C%20improving%20traceability%20and%20reducing%20hallucination%20risk.%20Experiments%20show%20consistent%20improvements%20over%20strong%20baselines%20in%20lesion%20detection%2C%20impression%20generation%2C%20and%20pathology%20classification%2C%20and%20demonstrate%20strong%20generalization%20on%20the%20DeepTumorVQA%20benchmark.%20These%20results%20highlight%20the%20potential%20of%20multimodal%20reasoning%20for%20reliable%20and%20interpretable%20tum {"title": "Towards Effective and Efficient Graph Alignment without Supervision", "author": "Songyang Chen and Youfang Lin and Yu Liu and Shuai Zheng and Lei Zou", "abstract": "Unsupervised graph alignment aims to find the node correspondence across different graphs without any anchor node pairs. Despite the recent efforts utilizing deep learning-based techniques, such as the embedding and optimal transport (OT)-based approaches, we observe their limitations in terms of model accuracy-efficiency tradeoff. By focusing on the exploitation of local and global graph information, we formalize them as the ``local representation, global alignment'' paradigm, and present a new ``global representation and alignment'' paradigm to resolve the mismatch between the two phases in the alignment process. We then propose \\underline{Gl}obal representation and \\underline{o}ptimal transport-\\underline{b}ased \\underline{Align}ment (\\texttt{GlobAlign}), and its variant, \\texttt{GlobAlign-E}, for better \\underline{E}fficiency. Our methods are equipped with the global attention mechanism and a hierarchical cross-graph transport cost, able to capture long-range and implicit node dependencies beyond the local graph structure. Furthermore, \\texttt{GlobAlign-E} successfully closes the time complexity gap between representative embedding and OT-based methods, reducing OT's cubic complexity to quadratic terms. Through extensive experiments, our methods demonstrate superior performance, with up to a 20\\% accuracy improvement over the best competitor. Meanwhile, \\texttt{GlobAlign-E} achieves the best efficiency, with an order of magnitude speedup against existing OT-based methods.", "link": "http://arxiv.org/abs/2603.08526v1", "date": "2026-03-09", "relevancy": 2.5973, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5504}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5416}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4663}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Effective%20and%20Efficient%20Graph%20Alignment%20without%20Supervision&body=Title%3A%20Towards%20Effective%20and%20Efficient%20Graph%20Alignment%20without%20Supervision%0AAuthor%3A%20Songyang%20Chen%20and%20Youfang%20Lin%20and%20Yu%20Liu%20and%20Shuai%20Zheng%20and%20Lei%20Zou%0AAbstract%3A%20Unsupervised%20graph%20alignment%20aims%20to%20find%20the%20node%20correspondence%20across%20different%20graphs%20without%20any%20anchor%20node%20pairs.%20Despite%20the%20recent%20efforts%20utilizing%20deep%20learning-based%20techniques%2C%20such%20as%20the%20embedding%20and%20optimal%20transport%20%28OT%29-based%20approaches%2C%20we%20observe%20their%20limitations%20in%20terms%20of%20model%20accuracy-efficiency%20tradeoff.%20By%20focusing%20on%20the%20exploitation%20of%20local%20and%20global%20graph%20information%2C%20we%20formalize%20them%20as%20the%20%60%60local%20representation%2C%20global%20alignment%27%27%20paradigm%2C%20and%20present%20a%20new%20%60%60global%20representation%20and%20alignment%27%27%20paradigm%20to%20resolve%20the%20mismatch%20between%20the%20two%20phases%20in%20the%20alignment%20process.%20We%20then%20propose%20%5Cunderline%7BGl%7Dobal%20representation%20and%20%5Cunderline%7Bo%7Dptimal%20transport-%5Cunderline%7Bb%7Dased%20%5Cunderline%7BAlign%7Dment%20%28%5Ctexttt%7BGlobAlign%7D%29%2C%20and%20its%20variant%2C%20%5Ctexttt%7BGlobAlign-E%7D%2C%20for%20better%20%5Cunderline%7BE%7Dfficiency.%20Our%20methods%20are%20equipped%20with%20the%20global%20attention%20mechanism%20and%20a%20hierarchical%20cross-graph%20transport%20cost%2C%20able%20to%20capture%20long-range%20and%20implicit%20node%20dependencies%20beyond%20the%20local%20graph%20structure.%20Furthermore%2C%20%5Ctexttt%7BGlobAlign-E%7D%20successfully%20closes%20the%20time%20complexity%20gap%20between%20representative%20embedding%20and%20OT-based%20methods%2C%20reducing%20OT%27s%20cubic%20complexity%20to%20quadratic%20terms.%20Through%20extensive%20experiments%2C%20our%20methods%20demonstrate%20superior%20performance%2C%20with%20up%20to%20a%2020%5C%25%20accuracy%20improvement%20over%20the%20best%20competitor.%20Meanwhile%2C%20%5Ctexttt%7BGlobAlign-E%7D%20achieves%20the%20best%20efficiency%2C%20with%20an%20order%20of%20magnitude%20speedup%20against%20existing%20OT-based%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08526v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520Effective%2520and%2520Efficient%2520Graph%2520Alignment%2520without%2520Supervision%26entry.906535625%3DSongyang%2520Chen%2520and%2520Youfang%2520Lin%2520and%2520Yu%2520Liu%2520and%2520Shuai%2520Zheng%2520and%2520Lei%2520Zou%26entry.1292438233%3DUnsupervised%2520graph%2520alignment%2520aims%2520to%2520find%2520the%2520node%2520correspondence%2520across%2520different%2520graphs%2520without%2520any%2520anchor%2520node%2520pairs.%2520Despite%2520the%2520recent%2520efforts%2520utilizing%2520deep%2520learning-based%2520techniques%252C%2520such%2520as%2520the%2520embedding%2520and%2520optimal%2520transport%2520%2528OT%2529-based%2520approaches%252C%2520we%2520observe%2520their%2520limitations%2520in%2520terms%2520of%2520model%2520accuracy-efficiency%2520tradeoff.%2520By%2520focusing%2520on%2520the%2520exploitation%2520of%2520local%2520and%2520global%2520graph%2520information%252C%2520we%2520formalize%2520them%2520as%2520the%2520%2560%2560local%2520representation%252C%2520global%2520alignment%2527%2527%2520paradigm%252C%2520and%2520present%2520a%2520new%2520%2560%2560global%2520representation%2520and%2520alignment%2527%2527%2520paradigm%2520to%2520resolve%2520the%2520mismatch%2520between%2520the%2520two%2520phases%2520in%2520the%2520alignment%2520process.%2520We%2520then%2520propose%2520%255Cunderline%257BGl%257Dobal%2520representation%2520and%2520%255Cunderline%257Bo%257Dptimal%2520transport-%255Cunderline%257Bb%257Dased%2520%255Cunderline%257BAlign%257Dment%2520%2528%255Ctexttt%257BGlobAlign%257D%2529%252C%2520and%2520its%2520variant%252C%2520%255Ctexttt%257BGlobAlign-E%257D%252C%2520for%2520better%2520%255Cunderline%257BE%257Dfficiency.%2520Our%2520methods%2520are%2520equipped%2520with%2520the%2520global%2520attention%2520mechanism%2520and%2520a%2520hierarchical%2520cross-graph%2520transport%2520cost%252C%2520able%2520to%2520capture%2520long-range%2520and%2520implicit%2520node%2520dependencies%2520beyond%2520the%2520local%2520graph%2520structure.%2520Furthermore%252C%2520%255Ctexttt%257BGlobAlign-E%257D%2520successfully%2520closes%2520the%2520time%2520complexity%2520gap%2520between%2520representative%2520embedding%2520and%2520OT-based%2520methods%252C%2520reducing%2520OT%2527s%2520cubic%2520complexity%2520to%2520quadratic%2520terms.%2520Through%2520extensive%2520experiments%252C%2520our%2520methods%2520demonstrate%2520superior%2520performance%252C%2520with%2520up%2520to%2520a%252020%255C%2525%2520accuracy%2520improvement%2520over%2520the%2520best%2520competitor.%2520Meanwhile%252C%2520%255Ctexttt%257BGlobAlign-E%257D%2520achieves%2520the%2520best%2520efficiency%252C%2520with%2520an%2520order%2520of%2520magnitude%2520speedup%2520against%2520existing%2520OT-based%2520methods.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.08526v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Towards%20Effective%20and%20Efficient%20Graph%20Alignment%20without%20Supervision&entry.906535625=Songyang%20Chen%20and%20Youfang%20Lin%20and%20Yu%20Liu%20and%20Shuai%20Zheng%20and%20Lei%20Zou&entry.1292438233=Unsupervised%20graph%20alignment%20aims {"title": "Deconstructing Multimodal Mathematical Reasoning: Towards a Unified Perception-Alignment-Reasoning Paradigm", "author": "Tianyu Yang and Sihong Wu and Yilun Zhao and Zhenwen Liang and Lisen Dai and Chen Zhao and Minhao Cheng and Arman Cohan and Xiangliang Zhang", "abstract": "Multimodal Mathematical Reasoning (MMR) has recently attracted increasing attention for its capability to solve mathematical problems that involve both textual and visual modalities. However, current models still face significant challenges in real-world visual math tasks. They often misinterpret diagrams, fail to align mathematical symbols with visual evidence, and produce inconsistent reasoning steps. Moreover, existing evaluations mainly focus on checking final answers rather than verifying the correctness or executability of each intermediate step. To address these limitations, a growing body of recent research addresses these issues by integrating structured perception, explicit alignment, and verifiable reasoning within unified frameworks. To establish a clear roadmap for understanding and comparing different MMR approaches, we systematically study them around four fundamental questions: (1) What to extract from multimodal inputs, (2) How to represent and align textual and visual information, (3) How to perform the reasoning, and (4) How to evaluate the correctness of the overall reasoning process. Finally, we discuss open challenges and offer perspectives on promising directions for future research.", "link": "http://arxiv.org/abs/2603.08291v1", "date": "2026-03-09", "relevancy": 2.5833, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5173}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5173}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5153}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Deconstructing%20Multimodal%20Mathematical%20Reasoning%3A%20Towards%20a%20Unified%20Perception-Alignment-Reasoning%20Paradigm&body=Title%3A%20Deconstructing%20Multimodal%20Mathematical%20Reasoning%3A%20Towards%20a%20Unified%20Perception-Alignment-Reasoning%20Paradigm%0AAuthor%3A%20Tianyu%20Yang%20and%20Sihong%20Wu%20and%20Yilun%20Zhao%20and%20Zhenwen%20Liang%20and%20Lisen%20Dai%20and%20Chen%20Zhao%20and%20Minhao%20Cheng%20and%20Arman%20Cohan%20and%20Xiangliang%20Zhang%0AAbstract%3A%20Multimodal%20Mathematical%20Reasoning%20%28MMR%29%20has%20recently%20attracted%20increasing%20attention%20for%20its%20capability%20to%20solve%20mathematical%20problems%20that%20involve%20both%20textual%20and%20visual%20modalities.%20However%2C%20current%20models%20still%20face%20significant%20challenges%20in%20real-world%20visual%20math%20tasks.%20They%20often%20misinterpret%20diagrams%2C%20fail%20to%20align%20mathematical%20symbols%20with%20visual%20evidence%2C%20and%20produce%20inconsistent%20reasoning%20steps.%20Moreover%2C%20existing%20evaluations%20mainly%20focus%20on%20checking%20final%20answers%20rather%20than%20verifying%20the%20correctness%20or%20executability%20of%20each%20intermediate%20step.%20To%20address%20these%20limitations%2C%20a%20growing%20body%20of%20recent%20research%20addresses%20these%20issues%20by%20integrating%20structured%20perception%2C%20explicit%20alignment%2C%20and%20verifiable%20reasoning%20within%20unified%20frameworks.%20To%20establish%20a%20clear%20roadmap%20for%20understanding%20and%20comparing%20different%20MMR%20approaches%2C%20we%20systematically%20study%20them%20around%20four%20fundamental%20questions%3A%20%281%29%20What%20to%20extract%20from%20multimodal%20inputs%2C%20%282%29%20How%20to%20represent%20and%20align%20textual%20and%20visual%20information%2C%20%283%29%20How%20to%20perform%20the%20reas {"title": "OSCAR: Occupancy-based Shape Completion via Acoustic Neural Implicit Representations", "author": "Magdalena Wysocki and Kadir Burak Buldu and Miruna-Alexandra Gafencu and Mohammad Farid Azampour and Nassir Navab", "abstract": "Accurate 3D reconstruction of vertebral anatomy from ultrasound is important for guiding minimally invasive spine interventions, but it remains challenging due to acoustic shadowing and view-dependent signal variations. We propose an occupancy-based shape completion method that reconstructs complete 3D anatomical geometry from partial ultrasound observations. Crucially for intra-operative applications, our approach extracts the anatomical surface directly from the image, avoiding the need for anatomical labels during inference. This label-free completion relies on a coupled latent space representing both the image appearance and the underlying anatomical shape. By leveraging a Neural Implicit Representation (NIR) that jointly models both spatial occupancy and acoustic interactions, the method uses acoustic parameters to become implicitly aware of the unseen regions without explicit shadowing labels through tracking acoustic signal transmission. We show that this method outperforms state-of-the-art shape completion for B-mode ultrasound by 80% in HD95 score. We validate our approach both in-silico and on phantom US images with registered mesh models from CT labels, demonstrating accurate reconstruction of occluded anatomy and robust generalization across diverse imaging conditions. Code and data will be released on publication.", "link": "http://arxiv.org/abs/2603.08279v1", "date": "2026-03-09", "relevancy": 2.5823, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5231}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5153},

{"title": "Interpretable Motion-Attentive Maps: Spatio-Temporally Localizing Concepts in Video Diffusion Transformers", "author": "Youngjun Jun and Seil Kang and Woojung Han and Seong Jae Hwang", "abstract": "Video Diffusion Transformers (DiTs) have been synthesizing high-quality video with high fidelity from given text descriptions involving motion. However, understanding how Video DiTs convert motion words into video remains insufficient. Furthermore, while prior studies on interpretable saliency maps primarily target objects, motion-related behavior in Video DiTs remains largely unexplored. In this paper, we investigate concrete motion features that specify when and which object moves for a given motion concept. First, to spatially localize, we introduce GramCol, which adaptively produces per-frame saliency maps for any text concept, including both motion and non-motion. Second, we propose a motion-feature selection algorithm to obtain an Interpretable Motion-Attentive Map (IMAP) that localizes motion spatially and temporally. Our method discovers concept saliency maps without the need for any gradient calculation or parameter update. Experimentally, our method shows outstanding localization capability on the motion localization task and zero-shot video semantic segmentation, providing interpretable and clearer saliency maps for both motion and non-motion concepts.", "link": "http://arxiv.org/abs/2603.02919v2", "date": "2026-03-09", "relevancy": 2.3353, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6388}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5755}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5701}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Interpretable%20Motion-Attentive%20Maps%3A%20Spatio-Temporally%20Localizing%20Concepts%20in%20Video%20Diffusion%20Transformers&body=Title%3A%20Interpretable%20Motion-Attentive%20Maps%3A%20Spatio-Temporally%20Localizing%20Concepts%20in%20Video%20Diffusion%20Transformers%0AAuthor%3A%20Youngjun%20Jun%20and%20Seil%20Kang%20and%20Woojung%20Han%20and%20Seong%20Jae%20Hwang%0AAbstract%3A%20Video%20Diffusion%20Transformers%20%28DiTs%29%20have%20been%20synthesizing%20high-quality%20video%20with%20high%20fidelity%20from%20given%20text%20descriptions%20involving%20motion.%20However%2C%20understanding%20how%20Video%20DiTs%20convert%20motion%20words%20into%20video%20remains%20insufficient.%20Furthermore%2C%20while%20prior%20studies%20on%20interpretable%20saliency%20maps%20primarily%20target%20objects%2C%20motion-related%20behavior%20in%20Video%20DiTs%20remains%20largely%20unexplored.%20In%20this%20paper%2C%20we%20investigate%20concrete%20motion%20features%20that%20specify%20when%20and%20which%20object%20moves%20for%20a%20given%20motion%20concept.%20First%2C%20to%20spatially%20localize%2C%20we%20introduce%20GramCol%2C%20which%20adaptively%20produces%20per-frame%20saliency%20maps%20for%20any%20text%20concept%2C%20including%20both%20motion%20and%20non-motion.%20Second%2C%20we%20propose%20a%20motion-feature%20selection%20algorithm%20to%20obtain%20an%20Interpretable%20Motion-Attentive%20Map%20%28IMAP%29%20that%20localizes%20motion%20spatially%20and%20temporally.%20Our%20method%20discovers%20concept%20saliency%20maps%20without%20the%20need%20for%20any%20gradient%20calculation%20or%20parameter%20update.%20Experimentally%2C%20our%20method%20shows%20outstanding%20localization%20capability%20on%20the%20motion%20localization%20task%20and%20zero-shot%20video%20semantic%20segmentation%2C%20providing%20interpretable%20and%20clearer%20saliency%20maps%20for%20both%20motion%20and%20non-motion%20concepts.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02919v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSf %2520localization%2520task%2520and%2520zero-shot%2520video%2520semantic%2520segmentation%252C%2520providing%2520interpretable%2520and%2520clearer%2520saliency%2520maps%2520for%2520both%2520motion%2520and%2520non-motion%2520concepts.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.02919v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Interpretable%20Motion-Attentive%20Maps%3A%20Spatio-Temporally%20Localizing%20Concepts%20in%20Video%20Diffusion%20Transformers&entry.906535625=Youngjun%20Jun%20and%20Seil%20Kang%20and%20Woojung%20Han%20and%20Seong%20Jae%20Hwang&entry.1292438233=Video%20Diffusion%20Transformers%20%28DiTs%29%20have%20been%20synthesizing%20high-quality%20video%20with%20high%20fidelity%20from%20given%20text%20descriptions%20involving%20motion.%20However%2C%20understanding%20how%20Video%20DiTs%20convert%20motion%20words%20into%20video%20remains%20insufficient.%20Furthermore%2C%20while%20prior%20studies%20on%20interpretable%20saliency%20maps%20primarily%20target%20objects%2C%20motion-related%20behavior%20in%20Video%20DiTs%20remains%20largely%20unexplored.%20In%20this%20paper%2C%20we%20investigate%20concrete%20motion%20features%20that%20specify%20when%20and%20which%20object%20moves%20for%20a%20given%20motion%20concept.%20First%2C%20to%20spatially%20localize%2C%20we%20introduce%20GramCol%2C%20which%20adaptively%20produces%20per-frame%20saliency%20maps%20for%20any%20text%20concept%2C%20including%20both%20motion%20and%20non-motion.%20Second%2C%20we%20propose%20a%20motion-feature%20selection%20algorithm%20to%20obtain%20an%20Interpretable%20Motion-Attentive%20Map%20%28IMAP%29%20that%20localizes%20motion%20spatially%20and%20temporally.%20Our%20method%20discovers%20concept%20saliency%20maps%20without%20the%20need%20for%20any%20gradient%20calculation%20or%20parameter%20update.%20Experimentally%2C%20our%20method%20shows%20outstanding%20localization%20capability%20on%20the%20motion%20localization%20task%20and%20zero-shot%20video%20semantic%20segmentation%2C%20providing%20interpretable%20and%20clearer%20saliency%20maps%20for%20both%20motion%20and%20non-motion%20concepts.&entry.1838667208=http%3A//arxiv.org/abs/2603.02919v2&entry.124074799=Read"},
{"title": "R2F: Repurposing Ray Frontiers for LLM-free Object Navigation", "author": "Francesco Argenziano and John Mark Alexis Marcelo and Michele Brienza and Abdel Hakim Drid and Emanuele Musumeci and Daniele Nardi and Domenico D. Bloisi and Vincenzo Suriani", "abstract": "Zero-shot open-vocabulary object navigation has progressed rapidly with the emergence of large Vision-Language Models (VLMs) and Large Language Models (LLMs), now widely used as high-level decision-makers instead of end-to-end policies. Although effective, such systems often rely on iterative large-model queries at inference time, introducing latency and computational overhead that limit real-time deployment. To address this problem, we repurpose ray frontiers (R2F), a recently proposed frontier-based exploration paradigm, to develop an LLM-free framework for indoor open-vocabulary object navigation. While ray frontiers were originally used to bias exploration using semantic cues carried along rays, we reinterpret frontier regions as explicit, direction-conditioned semantic hypotheses that serve as navigation goals. Language-aligned features accumulated along out-of-range rays are stored sparsely at frontiers, where each region maintains multiple directional embeddings encoding plausible unseen content. In this way, navigation then reduces to embedding-based frontier scoring and goal tracking within a classical mapping and planning pipeline, eliminating iterative large-model reasoning. We further introduce R2F-VLN, a lightweight extension for free-form language instructions using syntactic parsing and relational verification without additional VLM or LLM components. Experiments in Habitat-sim and on a real robotic platform demonstrate competitive state-of-the-art zero-shot performance with real-time execution, achieving up to 6 times faster runtime than VLM-based alternatives.", "link": "http://arxiv.org/abs/2603.08475v1", "date": "2026-03-09", "relevancy": 2.3215, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5833}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5833}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5659}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20R2F%3A%20Repurposing%20Ray%20Frontiers%20for%20LLM-free%20Object%20Navigation&body=Title%3A%20R2F%3A%20Repurposing%20Ray%20Frontiers%20for%20LLM-free%20Object%20Navigation%0AAuthor%3A%20Francesco%20Argenziano%20and%20John%20Mark%20Alexis%20Marcelo%20and%20Michele%20Brienza%20and%20Abdel%20Hakim%20Drid%20and%20Emanuele%20Musumeci%20and%20Daniele%20Nardi%20and%20Domenico%20D.%20Bloisi%20and%20Vincenzo%20Suriani%0AAbstract%3A%20Zero-shot%20open-vocabulary%20object%20navigation%20has%20progressed%20rapidly%20with%20the%20emergence%20of%20large%20Vision-Language%20Models%20%28VLMs%29%20and%20Large%20Language%20Models%20%28LLMs%29%2C%20now%20widely%20used%20as%20high-level%20decision-makers%20instead%20of%20end-to-end%20policies.%20Although%20effective%2C%20such%20systems%20often%20rely%20on%20iterative%20large-model%20queries%20at%20inference%20time%2C%20introducing%20latency%20and%20computational%20overhead%20that%20limit%20real-time%20deployment.%20To%20address%20this%20problem%2C%20we%20repurpose%20ray%20frontiers%20%28R2F%29%2C%20a%20recently%20proposed%20frontier-based%20exploration%20paradigm%2C%20to%20develop%20an%20LLM-free%20framework%20for%20indoor%20open-vocabulary%20object%20navigation.%20While%20ray%20frontiers%20were%20originally%20used%20to%20bias%20exploration%20using%20semantic%20cues%20carried%20along%20rays%2C%20we%20reinterpret%20frontier%20regions%20as%20explicit%2C%20direction-conditioned%20semantic%20hypotheses%20that%20serve%20as%20navigation%20goals.%20Language-aligned%20features%20accumulated%20along%20out-of-range%20rays%20are%20stored%20sparsely%20at%20frontiers%2C%20where%20each%20region%20maintains%20multiple%20directional%20embeddings%20encoding%20plausible%20unseen%20content.%20In%20this%20way%2C%20navigation%20then%20reduces%20to%20embedding-based%20frontier%20scoring%20and%20goal%20tracking%20within%20a%20classical%20mapping%20and%20planning%20pipeline%2C%20eliminating%20iterative%20large-model%20reasoning.%20We%20further%20introduce%20R2F-VLN%2C%20a%20lightweight%20extension%20for%20free-form%20language%20instructions%20using%20syntactic%20parsing%20and%20relational%20verification%20without%20additional%20VLM%20or%20LLM%20components.%20Experiments%20in%20Habitat-sim%20and%20on%20a%20real%20robotic%20platform%20demonstrate%20competitive%20state-of-the-art%20zero-shot%20performance%20with%20real-time%20execution%2C%20achieving%20up%20to%206%20times%20faster%20runtime%20than%20VLM-based%20alternatives.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08475v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DR2F%253A%2520Repurposing%2520Ray%2520Frontiers%2520for%2520LLM-free%2520Object%2520Navigation%26entry.906535625%3DFrancesco%2520Argenziano%2520and%2520John%2520Mark%2520Alexis%2520Marcelo%2520and%2520Michele%2520Brienza%2520and%2520Abdel%2520Hakim%2520Drid%2520and%2520Emanuele%2520Musumeci%2520and%2520Daniele%2520Nardi%2520and%2520Domenico%2520D.%2520Bloisi%2520and%2520Vincenzo%2520Suriani%26entry.1292438233%3DZero-shot%2520open-vocabulary%2520object%2520navigation%2520has%2520progressed%2520rapidly%2520with%2520the%2520emergence%2520of%2520large%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520and%2520Large%2520Language%2520Models%2520%2528LLMs%2529%252C%2520now%2520widely%2520used%2520as%2520high-level%2520decision-makers%2520instead%2520of%2520end-to-end%2520policies.%2520Al {"title": "ER-Pose: Rethinking Keypoint-Driven Representation Learning for Real-Time Human Pose Estimation", "author": "Nanjun Li and Pinqi Cheng and Zean Liu and Minghe Tian and Xuanyin Wang", "abstract": "Single-stage multi-person pose estimation aims to jointly perform human localization and keypoint prediction within a unified framework, offering advantages in inference efficiency and architectural simplicity. Consequently, multi-scale real-time detection architectures, such as YOLO-like models, are widely adopted for real-time pose estimation. However, these approaches typically inherit a box-driven modeling paradigm from object detection, in which pose estimation is implicitly constrained by bounding-box supervision during training. This formulation introduces biases in sample assignment and feature representation, resulting in task misalignment and ultimately limiting pose estimation accuracy. In this work, we revisit box-driven single-stage pose estimation from a keypoint-driven perspective and identify semantic conflicts among parallel objectives as a key source of performance degradation. To address this issue, we propose a keypoint-driven learning paradigm that elevates pose estimation to a primary prediction objective. Specifically, we remove bounding-box prediction and redesign the prediction head to better accommodate the high-dimensional structured representations for pose estimation. We further introduce a keypoint-driven dynamic sample assignment strategy to align training objectives with pose evaluation metrics, enabling dense supervision during training and efficient NMS-free inference. In addition, we propose a smooth OKS-based loss function to stabilize optimization in regression-based pose estimation. Based on these designs, we develop a single-stage multi-person pose estimation framework, termed ER-Pose. On MS COCO and CrowdPose, ER-Pose-n achieves AP improvements of 3.2/6.7 without pre-training and 7.4/4.9 with pre-training respectively compared with the baseline YOLO-Pose. These improvements are achieved with fewer parameters and higher inference efficiency.", "link": "http://arxiv.org/abs/2603.08681v1", "date": "2026-03-09", "relevancy": 2.3212, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6058}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5704}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5413}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ER-Pose%3A%20Rethinking%20Keypoint-Driven%20Representation%20Learning%20for%20Real-Time%20Human%20Pose%20Estimation&body=Title%3A%20ER-Pose%3A%20Rethinking%20Keypoint-Driven%20Representation%20Learning%20for%20Real-Time%20Human%20Pose%20Estimation%0AAuthor%3A%20Nanjun%20Li%20and%20Pinqi%20Cheng%20and%20Zean%20Liu%20and%20Minghe%20Tian%20and%20Xuanyin%20Wang%0AAbstract%3A%20Single-stage%20multi-person%20pose%20estimation%20aims%20to%20jointly%20perform%20human%20localization%20and%20keypoint%20prediction%20within%20a%20unified%20framework%2C%20offering%20advantages%20in%20inference%20efficiency%20and%20architectural%20simplicity.%20Consequently%2C%20multi-scale%20real-time%20detection%20architectures%2C%20such%20as%20YOLO-like%20models%2C%20are%20widely%20adopted%20for%20real-time%20pose%20estimation.%20However%2C%20these%20approaches%20typically%20inherit%20a%20box-driven%20modeling%20paradigm%20from%20object%20detection%2C%20in%20which%20pose%20estimation%20is%20implicitly%20constrained%20by%20bounding-box%20supervision%20during%20training.%20This%20formulation%20introduces%20biases%20in%20sample%20assignment%20and%20feature%20representation%2C%20resulting%20in%20task%20misalignment%20and%20ultimately%20limiting%20pose%20estimation%20accuracy.%20In%20this%20work%2C%20we%20revisit%20box-driven%20single-stage%20pose%20estimation%20from%20a%20keypoint-driven%20perspective%20and%20identify%20semantic%20conflicts%20among%20parallel%20objectives%20as%20a%20key%20source%20of%20performance%20degradation.%20To%20address%20this%20issue%2C%20we%20propose%20a%20keypoint-driven%20learning%20paradigm%20that%20elevates%20pose%20estimation%20to%20a%20primary%20prediction%20objective.%20Specifically%2C%20we%20remove%20bounding-box%20prediction%20and%20redesign%20the%20prediction%20head%20to%20better%20accommodate%20the%20high-dimensional%20structured%20representations%20for%20pose%20estimation.%20We%20further%20introduce%20a%20keypoint-driven%20dynamic%20sample%20assignment%20strategy%20to%20align%20training%20objectives%20with%20pose%20evaluation%20metrics%2C%20enabling%20dense%20supervision%20during%20training%20and%20efficient%20NMS-free%20inference.%20In%20addition%2C%20we%20propose%20a%20smooth%20OKS-based%20loss%20function%20to%20stabilize%20optimization%20in%20regression-based%20pose%20estimation.%20Based%20on%20these%20designs%2C%20we%20develop%20a%20single-stage%20multi-person%20pose%20estimation%20framework%2C%20termed%20ER-Pose.%20On%20MS%20COCO%20and%20CrowdPose%2C%20ER-Pose-n%20achieves%20AP%20improvements%20of%203.2/6.7%20without%20pre-training%20and%207.4/4.9%20with%20pre-training%20respectively%20compared%20with%20the%20baseline%20YOLO-Pose.%20These%20improvements%20are%20achieved%20with%20fewer%20parameters%20and%20higher%20inference%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08681v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DER-Pose%253A%2520Rethinking%2520Keypoint-Driven%2520Representation%2520Learning%2520for%2520Real-Time%2520Human%2520Pose%2520Estimation%26entry.906535625%3DNanjun%2520Li%2520and%2520Pinqi%2520Cheng%2520and%2520Zean%2520Liu%2520and%2520Minghe%2520Tian%25 {"title": "Perception-Aware Communication-Free Multi-UAV Coordination in the Wild", "author": "Manuel Boldrer and Michal Kamler and Afzal Ahmad and Martin Saska", "abstract": "We present a communication-free method for safe multi-robot coordination in complex environments such as forests with dense canopy cover, where GNSS is unavailable. Our approach relies on an onboard anisotropic 3D LiDAR sensor used for SLAM as well as for detecting obstacles and neighboring robots. We develop a novel perception-aware 3D navigation framework that enables robots to safely and effectively progress toward a goal region despite limited sensor field-of-view. The approach is evaluated through extensive simulations across diverse scenarios and validated in real-world field experiments, demonstrating its scalability, robustness, and reliability.", "link": "http://arxiv.org/abs/2603.08379v1", "date": "2026-03-09", "relevancy": 2.3072, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5982}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.579}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5545}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Perception-Aware%20Communication-Free%20Multi-UAV%20Coordination%20in%20the%20Wild&body=Title%3A%20Perception-Aware%20Communication-Free%20Multi-UAV%20Coordination%20in%20the%20Wild%0AAuthor%3A%20Manuel%20Boldrer%20and%20Michal%20Kamler%20and%20Afzal%20Ahmad%20and%20Martin%20Saska%0AAbstract%3A%20We%20present%20a%20communication-free%20method%20for%20safe%20multi-robot%20coordination%20in%20complex%20environments%20such%20as%20forests%20with%20dense%20ca {"title": "FedPrism: Adaptive Personalized Federated Learning under Non-IID Data", "author": "Prakash Kumbhakar and Shrey Srivastava and Haroon R Lone", "abstract": "Federated Learning (FL) suffers significant performance degradation in real-world deployments characterized by moderate to extreme statistical heterogeneity (non-IID client data). While global aggregation strategies promote broad generalization, they often fail to capture the diversity of local data distributions, leading to suboptimal personalization.\n  We address this problem with FedPrism, a framework that uses two main strategies. First, it uses a Prism Decomposition method that builds each client's model from three parts: a global foundation, a shared group part for similar clients, and a private part for unique local data. This allows the system to group similar users together automatically and adapt if their data changes. Second, we include a Dual-Stream design that runs a general model alongside a local specialist. The system routes predictions between the general model and the local specialist based on the specialist's confidence.\n  Through systematic experiments on non-IID data partitions, we demonstrate that FedPrism exceeds static aggregation and hard-clustering baselines, achieving significant accuracy gains under high heterogeneity. These results establish FedPrism as a robust and flexible solution for federated learning in heterogeneous environments, effectively balancing generalizable knowledge with adaptive personalization.", "link": "http://arxiv.org/abs/2603.08252v1", "date": "2026-03-09", "relevancy": 2.3028, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4628}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4596}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4593}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FedPrism%3A%20Adaptive%20Personalized%20Federated%20Learning%20under%20Non-IID%20Data&body=Title%3A%20FedPrism%3A%20Adaptive%20Personalized%20Federated%20Learning%20under%20Non-IID%20Data%0AAuthor%3A%20Prakash%20Kumbhakar%20and%20Shrey%20Srivastava%20and%20Haroon%20R%20Lone%0AAbstract%3A%20Federated%20Learning%20%28FL%29%20suffers%20significant%20performance%20degradation%20in%20real-world%20deployments%20characterized%20by%20moderate%20to%20extreme%20statistical%20heterogeneity%20%28non-IID%20client%20data%29.%20While%20global%20aggregation%20strategies%20promote%20broad%20generalization%2C%20they%20often%20fail%20to%20capture%20the%20diversity%20of%20local%20data%20distributions%2C%20leading%20to%20suboptimal%20personalization.%0A%20%20We%20address%20this%20problem%20with%20FedPrism%2C%20a%20framework%20that%20uses%20two%20main%20strategies.%20First%2C%20it%20uses%20a%20Prism%20Decomposition%20method%20that%20builds%20each%20client%27s%20model%20from%20three%20parts%3A%20a%20global%20foundation%2C%20a%20shared%20group%20part%20for%20similar%20clients%2C%20and%20a%20private%20part%20for%20unique%20local%20data.%20This%20allows%20the%20system%20to%20group%20similar%20users%20together%20automatically%20and%20adapt%20if%20their%20data%20changes.%20Second%2C%20we%20include%20a%20Dual-Stream%20design%20that%20runs%20a%20general%20model%20alongside%20a%20local%20specialist.%20The%20system%20routes%20predictions%20between%20the%20general%20model%20and%20the%20local%20specialist%20based%20on%20the%20specialist%27s%20confidence.%0A%20%20Through%20systematic%20experiments%20on%20non-IID%20data%20partitions%2C%20we%20demonstrate%20that%20FedPrism%20exceeds%20static%20aggregation%20and%20hard-clustering%20baselines%2C%20achieving%20significant%20accuracy%20gains%20under%20high%20heterogeneity.%20These%20results%20establish%20FedPrism%20as%20a%20robust%20and%20flexible%20solution%20for%20federated%20learning%20in%20heterogeneous%20environments%2C%20effectively%20balancing%20generalizable%20knowledge%20with%20adaptive%20personalization.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08252v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFedPrism%253A%2520Adaptive%2520Personalized%2520Federated%2520Learning%2520under%2520Non-IID%2520Data%26entry.906535625%3DPrakash%2520Kumbhakar%2520and%2520Shrey%2520Srivastava%2520and%2520Haroon%2520R%2520Lone%26entry.1292438233%3DFederated%2520Learning%2520%2528FL%2529%2520suffers%2520significant%2520performance%2520degradation%2520in%2520real-world%2520deployments%2520characterized%2520by%2520moderate%2520to%2520extreme%2520statistical%2520heterogeneity%2520%2528non-IID%2520client%2520data%2529.%2520While%2520global%2520aggregation%2520strategies%2520promote%2520broad%2520generalization%252C%2520they%2520often%2520fail%2520to%2520capture%2520the%2520diversity%2520of%2520local%2520data%2520distributions%252C%2520leading%2520to%2520suboptimal%2520personalization.%250A%2520%2520We%2520address%2520this%2520problem%2520with%2520FedPrism%252C%2520a%2520framework%2520that%2520uses%2520two%2520main%2520strategies.%2520First%252C%2520it%2520uses%2520a%2520Prism%2520Decomposition%2520method%2520that%2520builds%2520each%2520client%2527s%2520model%2520from%2520three%2520parts%253A%2520a%2520global%2520foundation%252C%2520a%2520shared%2520group%2520part%2520for%2520similar%2520clients%252C%2520and%2520a%2520private%2520part%2520for%2520unique%2520local%2520data.%2520This%2520allows%2520the%2520system%2520to%2520group%2520similar%2520users%2520together%2520automatically%2520and%2520adapt%2520if%2520their%2520data%2520changes.%2520Second%252C%2520we%252 {"title": "ALOOD: Exploiting Language Representations for LiDAR-based Out-of-Distribution Object Detection", "author": "Michael K\u00f6sel and Marcel Schreiber and Michael Ulrich and Claudius Gl\u00e4ser and Klaus Dietmayer", "abstract": "LiDAR-based 3D object detection plays a critical role for reliable and safe autonomous driving systems. However, existing detectors often produce overly confident predictions for objects not belonging to known categories, posing significant safety risks. This is caused by so-called out-of-distribution (OOD) objects, which were not part of the training data, resulting in incorrect predictions. To address this challenge, we propose ALOOD (Aligned LiDAR representations for Out-Of-Distribution Detection), a novel approach that incorporates language representations from a vision-language model (VLM). By aligning the object features from the object detector to the feature space of the VLM, we can treat the detection of OOD objects as a zero-shot classification task. We demonstrate competitive performance on the nuScenes OOD benchmark, establishing a novel approach to OOD object detection in LiDAR using language representations. The source code is available at https://github.com/uulm-mrm/mmood3d.", "link": "http://arxiv.org/abs/2603.08180v1", "date": "2026-03-09", "relevancy": 2.299, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.6032}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5827}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5555}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ALOOD%3A%20Exploiting%20Language%20Representations%20for%20LiDAR-based%20Out-of-Distributi {"title": "MM-TS: Multi-Modal Temperature and Margin Schedules for Contrastive Learning with Long-Tail Data", "author": "Siarhei Sheludzko and Dhimitrios Duka and Bernt Schiele and Hilde Kuehne and Anna Kukleva", "abstract": "Contrastive learning has become a fundamental approach in both uni-modal and multi-modal frameworks. This learning paradigm pulls positive pairs of samples closer while pushing negatives apart. In the uni-modal setting (e.g., image-based learning), previous research has shown that the strength of these forces can be controlled through the temperature parameter. In this work, we propose Multi-Modal Temperature and Margin Schedules (MM-TS), extending the concept of uni-modal temperature scheduling to multi-modal contrastive learning. Our method dynamically adjusts the temperature in the contrastive loss during training, modulating the attraction and repulsion forces in the multi-modal setting. Additionally, recognizing that standard multi-modal datasets often follow imbalanced, long-tail distributions, we adapt the temperature based on the local distribution of each training sample. Specifically, samples from dense clusters are assigned a higher temperature to better preserve their semantic structure. Furthermore, we demonstrate that temperature scheduling can be effectively integrated within a max-margin framework, thereby unifying the two predominant approaches in multi-modal contrastive learning: InfoNCE loss and max-margin objective. We evaluate our approach on four widely used image- and video-language datasets, Flickr30K, MSCOCO, EPIC-KITCHENS-100, and YouCook2, and show that our dynamic temperature and margin schedules improve performance and lead to new state-of-the-art results in the field.", "link": "http://arxiv.org/abs/2603.08202v1", "date": "2026-03-09", "relevancy": 2.296, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6153}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5589}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5387}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MM-TS%3A%20Multi-Modal%20Temperature%20and%20Margin%20Schedules%20for%20Contrastive%20Learning%20with%20Long-Tail%20Data&body=Title%3A%20MM-TS%3A%20Multi-Modal%20Temperature%20and%20Margin%20Schedules%20for%20Contrastive%20Learning%20with%20Long-Tail%20Data%0AAuthor%3A%20Siarhei%20Sheludzko%20and%20Dhimitrios%20Duka%20and%20Bernt%20Schiele%20and%20Hilde%20Kuehne%20and%20Anna%20Kukleva%0AAbstract%3A%20Contrastive%20learning%20has%20become%20a%20fundamental%20approach%20in%20both%20uni-modal%20and%20multi-modal%20frameworks.%20This%20learning%20paradigm%20pulls%20positive%20pairs%20of%20samples%20closer%20while%20pushing%20negatives%20apart.%20In%20the%20uni-modal%20setting%20%28e.g.%2C%20image-based%20learning%29%2C%20previous%20research%20has%20shown%20that%20the%20strength%20of%20these%20forces%20can%20be%20controlled%20through%20the%20temperature%20parameter.%20In%20this%20work%2C%20we%20propose%20Multi-Modal%20Temperature%20and%20Margin%20Schedules%20%28MM-TS%29%2C%20extending%20the%20concept%20of%20uni-modal%20temperature%20scheduling%20to%20multi-modal%20contrastive%20learning.%20Our%20method%20dynamically%20adjusts%20the%20temperature%20in%20the%20contrastive%20loss%20during%20training%2C%20modulating%20the%20attraction%20and%20repulsion%20forces%20in%20the%20multi-modal%20setting.%20Additionally%2C%20recognizing%20that%20standard%20multi-modal%20datasets%20often%20follow%20imbalanced%2C%20long-tail%20distributions%2C%20we%20adapt%20the%20temperature%20based%20on%20the%20local%20distribution%20of%20each%20training%20sample.%20Specifically%2C%20samples%20from%20dense%20clusters%20are%20assigned%20a%20higher%20temperature%20to%20better%20preserve%20their%20semantic%20structure.%20Furthermore%2C%20we%20demonstrate%20that%20temperature%20scheduling%20can%20be%20effectively%20integrated%20within%20a%20max-margin%20framework%2C%20thereby%20unifying%20the%20two%20predominant%20approaches%20in%20multi-modal%20contrastive%20learning%3A%20InfoNCE%20loss%20and%20max-margin%20objective.%20We%20evaluate%20our%20approach%20on%20four%20widely%20used%20image-%20and%20video-language%20datasets%2C%20Flickr30K%2C%20MSCOCO%2C%20EPIC-KITCHENS-100%2C%20and%20YouCook2%2C%20and%20show%20that%20our%20dynamic%20temperature%20and%20margin%20schedules%20improve%20performance%20and%20lead%20to%20new%20state-of-the-art%20results%20in%20the%20field.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08202v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMM-TS%253A%2520Multi-Modal%2520Temperature%2520and%2520Margin%2520Schedules%2520for%2520Contrastive%2520Learning%2520with%2520Long-Tail%2520Data%26entry.906535625%3DSiarhei%2520Sheludzko%2520and%2520Dhimitrios%2520Duka%2520and%2520Bernt%2520Schiele%2520and%2520Hilde%2520Kuehne%2520and%2520Anna%2520Kukleva%26entry.1292438233%3DContrastive%2520learning%2520has%2520become%2520a%2520fundamental%2520approach%2520in%2520both%2520uni-modal%2520and%2520multi-modal%2520frameworks.%2520This%2520learning%2520paradigm%2520pulls%2520positive%2520pairs%2520of%2520samples%2520closer%2520while%2520pushing%2520negatives%2520apart.%2520In%2520the%2520uni-modal%2520setting%2520%2528e.g.%252C%2520image-based%2520learning%2529%252C%2520previous%2520research%2520has%2520shown%2520that%2520the%2520strength%2520of%2520these%2520forces%2520can%2520be%2520controlled%2520through%2520the%2520temperature%2520parameter.%2520In%2520this%2520work%252C%2520we%2520propose%2520Multi-Modal%2520Temperature%2520and%2520Margin%2520Schedules%2520%2528MM-TS%2529%252C%2520 {"title": "NaviTrace: Evaluating Embodied Navigation of Vision-Language Models", "author": "Tim Windecker and Manthan Patel and Moritz Reuss and Richard Schwarzkopf and Cesar Cadena and Rudolf Lioutikov and Marco Hutter and Jonas Frey", "abstract": "Vision-language models demonstrate unprecedented performance and generalization across a wide range of tasks and scenarios. Integrating these foundation models into robotic navigation systems opens pathways toward building general-purpose robots. Yet, evaluating these models' navigation capabilities remains constrained by costly real-world trials, overly simplified simulations, and limited benchmarks. We introduce NaviTrace, a high-quality Visual Question Answering benchmark where a model receives an instruction and embodiment type (human, legged robot, wheeled robot, bicycle) and must output a 2D navigation trace in image space. Across 1000 scenarios and more than 3000 expert traces, we systematically evaluate eight state-of-the-art VLMs using a newly introduced semantic-aware trace score. This metric combines Dynamic Time Warping distance, goal endpoint error, and embodiment-conditioned penalties derived from per-pixel semantics and correlates with human preferences. Our evaluation reveals consistent gap to human performance caused by poor spatial grounding and goal localization. NaviTrace establishes a scalable and reproducible benchmark for real-world robotic navigation. The benchmark and leaderboard can be found at https://leggedrobotics.github.io/navitrace_webpage/.", "link": "http://arxiv.org/abs/2510.26909v3", "date": "2026-03-09", "relevancy": 2.2878, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5904}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity" {"title": "FreeTacMan: Robot-free Visuo-Tactile Data Collection System for Contact-rich Manipulation", "author": "Longyan Wu and Checheng Yu and Jieji Ren and Li Chen and Yufei Jiang and Ran Huang and Guoying Gu and Hongyang Li", "abstract": "Enabling robots with contact-rich manipulation remains a pivotal challenge in robot learning, which is substantially hindered by the data collection gap, including its inefficiency and limited sensor setup. While prior work has explored handheld paradigms, their rod-based mechanical structures remain rigid and unintuitive, providing limited tactile feedback and posing challenges for operators. Motivated by the dexterity and force feedback of human motion, we propose FreeTacMan, a human-centric and robot-free data collection system for accurate and efficient robot manipulation. Concretely, we design a wearable gripper with visuo-tactile sensors for data collection, which can be worn by human fingers for intuitive control. A high-precision optical tracking system is introduced to capture end-effector poses while synchronizing visual and tactile feedback simultaneously. We leverage FreeTacMan to collect a large-scale multimodal dataset, comprising over 3000k paired visuo-tactile images with end-effector poses, 10k demonstration trajectories across 50 diverse contact-rich manipulation tasks. FreeTacMan achieves multiple improvements in data collection performance over prior works and enables effective policy learning from self-collected datasets. By open-sourcing the hardware and the dataset, we aim to facilitate reproducibility and support research in visuo-tactile manipulation.", "link": "http://arxiv.org/abs/2506.01941v4", "date": "2026-03-09", "relevancy": 2.2864, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5857}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration {"title": "SiMO: Single-Modality-Operable Multimodal Collaborative Perception", "author": "Jiageng Wen and Shengjie Zhao and Bing Li and Jiafeng Huang and Kenan Ye and Hao Deng", "abstract": "Collaborative perception integrates multi-agent perspectives to enhance the sensing range and overcome occlusion issues. While existing multimodal approaches leverage complementary sensors to improve performance, they are highly prone to failure--especially when a key sensor like LiDAR is unavailable. The root cause is that feature fusion leads to semantic mismatches between single-modality features and the downstream modules. This paper addresses this challenge for the first time in the field of collaborative perception, introducing Single-Modality-Operable Multimodal Collaborative Perception (SiMO). By adopting the proposed Length-Adaptive Multi-Modal Fusion (LAMMA), SiMO can adaptively handle remaining modal features during modal failures while maintaining consistency of the semantic space. Additionally, leveraging the innovative \"Pretrain-Align-Fuse-RD\" training strategy, SiMO addresses the issue of modality competition--generally overlooked by existing methods--ensuring the independence of each individual modality branch. Experiments demonstrate that SiMO effectively aligns multimodal features while simultaneously preserving modality-specific features, enabling it to maintain optimal performance across all individual modalities. The implementation details can be found in https://github.com/dempsey-wen/SiMO.", "link": "http://arxiv.org/abs/2603.08240v1", "date": "2026-03-09", "relevancy": 2.2854, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6024}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5885}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5418}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SiMO%3A%20Single-Modality-Operable%20Multimodal%20Collaborative%20Perception&body=Title%3A%20SiMO%3A%20Single-Modality-Operable%20Multimodal%20Collaborative%20Perception%0AAuthor%3A%20Jiageng%20Wen%20and%20Shengjie%20Zhao%20and%20Bing%20Li%20and%20Jiafeng%20Huang%20and%20Kenan%20Ye%20and%20Hao%20Deng%0AAbstract%3A%20Collaborative%20perception%20integrates%20multi-agent%20perspectives%20to%20enhance%20the%20sensing%20range%20and%20overcome%20occlusion%20issues.%20While%20existing%20multimodal%20approaches%20leverage%20complementary%20sensors%20to%20improve%20performance%2C%20they%20are%20highly%20prone%20to%20failure--especially%20when%20a%20key%20sensor%20like%20LiDAR%20is%20unavailable.%20The%20root%20cause%20is%20that%20feature%20fusion%20leads%20to%20semantic%20mismatches%20between%20single-modality%20features%20and%20the%20downstream%20modules.%20This%20paper%20addresses%20this%20challenge%20for%20the%20first%20time%20in%20the%20field%20of%20collaborative%20perception%2C%20introducing%20Single-Modality-Operable%20Multimodal%20Collaborative%20Perception%20%28SiMO%29.%20By%20adopting%20the%20proposed%20Length-Adaptive%20Multi-Modal%20Fusion%20%28LAMMA%29%2C%20SiMO%20can%20adaptively%20handle%20remaining%20modal%20features%20during%20modal%20failures%20while%20maintaining%20consistency%20of%20the%20semantic%20space.%20Additionally%2C%20leveraging%20the%20innovative%20%22Pretrain-Align-Fuse-RD%22%20training%20strategy%2C%20SiMO%20addresses%20the%20issue%20of%20modality%20competition--generally%20overlooked%20by%20existing%20methods--ensuring%20the%20independence%20of%20each%20individual%20modality%20branch.%20Experiments%20demonstrate%20that%20SiMO%20effectively%20aligns%20multimodal%20features%20while%20simultaneously%20preserving%20modality-specific%20features%2C%20enabling%20it%20to%20maintain%20optimal%20performance%20across%20all%20individual%20modalities.%20The%20implementation%20details%20can%20be%20found%20in%20https%3A//github.com/dempsey-wen/SiMO.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08240v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSiMO%253A%2520Single-Modality-Operable%2520Multimodal%2520Collaborative%2520Perception%26entry.906535625%3DJiageng%2520Wen%2520and%2520Shengjie%2520Zhao%2520and%2520Bing%2520Li%2520and%2520Jiafeng%2520Huang%2520and%2520Kenan%2520Ye%2520and%2520Hao%2520Deng%26entry.1292438233%3DCollaborative%2520perception%2520integrates%2520multi-agent%2520perspectives%2520to%2520enhance%2520the%2520sensing%2520range%2520and%2520overcome%2520occlusion%2520issues.%2520While%2520existing%2520multimodal%2520approaches%2520leverage%2520complementary%2520sensors%2520to%2520improve%2520performance%252C%2520they%2520are%2520highly%2520prone%2520to%2520failure--especially%2520when%2520a%2520key%2520sensor%2520like%2520LiDAR%2520is%2520unavailable.%2520The%2520root%2520cause%2520is%2520that%2520feature%2520fusion%2520leads%2520to%2520semantic%2520mismatches%2520between%2520single-modality%2520features%2520and%2520the%2520downstream%2520modules.%2520This%2520paper%2520addresses%2520this%2520challenge%2520for%2520the%2520first%2520time%2520in%2520the%2520field%2520of%2520collaborative%2520perception%252C%2520introducing%2520Single-Modality-Operable%2520Multimodal%2520Collaborative%2520Perception%2520%2528SiMO%2529.%2520By%2520adopting%2520the%2520proposed%2520Length-Adaptive%2520Multi-Modal%2520Fusion%2520%2528LAMMA%2529%252C%2520SiMO%2520can%2520adaptively%2520handle%2520remaining%2520modal%2520features%2520during%2520modal%2520failures%2520while%2520maintaining%2520consistency%2520of%2520the%2520semantic%2520space.%2520Additionally%252C%2520leveraging%2520the%2520innovative%2520%2522Pretrain-Align-Fuse-RD%2522%2520training%2520strategy%252C%2520SiMO%2520addresses%2520the%2520issue%2520of%2520modality%2520competition--generally%2520overlooked%2520by%2520existing%2520methods--ensuring%2520the%2520independence%2520of%2520each%2520individual%2520modality%2520branch.%2520Experiments%2520demonstrate%2520that%2520SiMO%2520effectively%2520aligns%2520multimodal%2520features%2520while%2520simultaneously%2520preserving%2520modality-specific%2520features%252C%2520enabling%2520it%2520to%2520maintain%2520optimal%2520performance%2520across%2520all%2520individual%2520modalities.%2520The%2520implementation%2520details%2520can%2520be%2520found%2520in%2520https%253A//github.com/dempsey-wen/SiMO.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.08240v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SiMO%3A%20Single-Modality-Operable%20Multimodal%20Collaborative%20Perception&entry.906535625=Jiageng%20Wen%20and%20Shengjie%20Zhao%20and%20Bing%20Li%20and%20Jiafeng%20Huang%20and%20Kenan%20Ye%20and%20Hao%20Deng&entry.1292438233=Collaborative%20perception%20integrates%20multi-agent%20perspectives%20to%20enhance%20the%20sensing%20range%20and%20overcome%20occlusion%20issues.%20While%20existing%20multimodal%20approaches%20leverage%20complementary%20sensors%20to%20improve%20performance%2C%20they%20are%20highly%20prone%20to%20failure--especially%20when%20a%20key%20sensor%20like%20LiDAR%20is%20unavailable.%20The%20root%20cause%20is%20that%20feature%20fusion%20leads%20to%20semantic%20mismatches%20between%20single-modality%20features%20and%20the%20downstream%20modules.%20This%20paper%20addresses%20this%20challenge%20for%20the%20first%20time%20in%20the%20field%20of%20collaborative%20perception%2C%20introducing%20Single-Modality-Operable%20Multimodal%20Collaborative%20Perception%20%28SiMO%29.%20By%20adopting%20the%20proposed%20Length-Adaptive%20Multi-Modal%20Fusion%20%28LAMMA%29%2C%20SiMO%20can%20adaptively%20handle {"title": "$\u0394$VLA: Prior-Guided Vision-Language-Action Models via World Knowledge Variation", "author": "Yijie Zhu and Jie He and Rui Shao and Kaishen Yuan and Tao Tan and Xiaochen Yuan and Zitong Yu", "abstract": "Recent vision-language-action (VLA) models have significantly advanced robotic manipulation by unifying perception, reasoning, and control. To achieve such integration, recent studies adopt a predictive paradigm that models future visual states or world knowledge to guide action generation. However, these models emphasize forecasting outcomes rather than reasoning about the underlying process of change, which is essential for determining how to act. To address this, we propose $\u0394$VLA, a prior-guided framework that models world-knowledge variations relative to an explicit current-world knowledge prior for action generation, rather than regressing absolute future world states. Specifically, 1) to construct the current world knowledge prior, we propose the Prior-Guided WorldKnowledge Extractor (PWKE). It extracts manipulable regions, spatial relations, and semantic cues from the visual input, guided by auxiliary heads and prior pseudo labels, thus reducing redundancy. 2) Building upon this, to represent how world knowledge evolves under actions, we introduce the Latent World Variation Quantization (LWVQ). It learns a discrete latent space via a VQ-VAE objective to encode world knowledge variations, shifting prediction from full modalities to compact latent. 3)Moreover, to mitigate interference during variation modeling, we design the Conditional Variation Attention (CV-Atten), whichpromotes disentangled learning and preserves the independence of knowledge representations. Extensive experiments on both simulated benchmarks and real-world robotic tasks demonstrate $\u0394$VLA achieves state-of-the-art performance while improving efficiency. Code and real-world execution videos are available at https://github.com/JiuTian-VL/DeltaVLA.", "link": "http://arxiv.org/abs/2603.08361v1", "date": "2026-03-09", "relevancy": 2.2844, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5741}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5741}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5561}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20%24%CE%94%24VLA%3A%20Prior-Guided%20Vision-Language-Action%20Models%20via%20World%20Knowledge%20Variation&body=Title%3A%20%24%CE%94%24VLA%3A%20Prior-Guided%20Vision-Language-Action%20Models%20via%20World%20Knowledge%20Variation%0AAuthor%3A%20Yijie%20Zhu%20and%20Jie%20He%20and%20Rui%20Shao%20and%20Kaishen%20Yuan%20and%20Tao%20Tan%20and%20Xiaochen%20Yuan%20and%20Zitong%20Yu%0AAbstract%3A%20Recent%20vision-language-action%20%28VLA%29%20models%20have%20significantly%20advanced%20robotic%20manipulation%20by%20unifying%20perception%2C%20reasoning%2C%20and%20control.%20To%20achieve%20such%20integration%2C%20recent%20studies%20adopt%20a%20predictive%20paradigm%20that%20models%20future%20visual%20states%20or%20world%20knowledge%20to%20guide%20action%20generation.%20However%2C%20these%20models%20emphasize%20forecasting%20outcomes%20rather%20than%20reasoning%20about%20the%20underlying%20process%20of%20change%2C%20which%20is%20essential%20for%20determining%20how%20to%20act.%20To%20address%20this%2C%20we%20propose%20%24%CE%94%24VLA%2C%20a%20prior-guided%20framework%20that%20models%20world-knowledge%20variations%20relative%20to%20an%20explicit%20current-world%20knowledge%20prior%20for%20action%20generation%2C%20rather%20than%20regressing%20absolute%20future%20world%20states.%20Specifically%2C%201%29%20to%20construct%20the%20current%20world%20knowledge%20prior%2C%20we%20propose%20the%20Prior-Guided%20WorldKnowledge%20Extractor%20%28PWKE%29.%20It%20extracts%20manipulable%20regions%2C%20spatial%20relations%2C%20and%20semantic%20cues%20from%20the%20visual%20input%2C%20guided%20by%20auxiliary%20heads%20and%20prior%20pseudo%20labels%2C%20thus%20reducing%20redundancy.%202%29%20Building%20upon%20this%2C%20to%20represent%20how%20world%20knowledge%20evolves%20under%20actions%2C%20we%20introduce%20the%20Latent%20World%20Variation%20Quantization%20%28LWVQ%29.%20It%20learns%20a%20discrete%20latent%20space%20via%20a%20VQ-VAE%20objective%20to%20encode%20world%20knowledge%20variations%2C%20shifting%20prediction%20from%20full%20modalities%20to%20compact%20latent.%203%29Moreover%2C%20to%20mitigate%20interference%20during%20variation%20modeling%2C%20we%20design%20the%20Conditional%20Variation%20Attention%20%28CV-Atten%29%2C%20whichpromotes%20disentangled%20learning%20and%20preserves%20the%20independence%20of%20knowledge%20representations.%20Extensive%20experiments%20on%20both%20simulated%20benchmarks%20and%20real-world%20robotic%20tasks%20demonstrate%20%24%CE%94%24VLA%20achieves%20state-of-the-art%20performance%20while%20improving%20efficiency.%20Code%20and%20real-world%20execution%20videos%20are%20available%20at%20https%3A//github.com/JiuTian-VL/DeltaVLA.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08361v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D%2524%25CE%2594%2524VLA%253A%2520Prior-Guided%2520Vision-Language-Action%2520Models%2520via%2520World%2520Knowledge%2520Variation%26entry.906535625%3DYijie%2520Zhu%2520and%2520Jie%2520He%2520and%2520Rui%2520Shao%2520and%2520Kaishen%2520Yuan%2520and%2520Tao%2520Tan%2520and%2520Xiaochen%2520Yuan%2520and%2520Zitong%2520Yu%26entry.1292438233%3DRecent%2520vision-language-action%2520%2528VLA%2529%2520models%2520have%2520significantly%2520advanced%2520robotic%2520manipulation%2520b {"title": "Synchronized Online Friction Estimation and Adaptive Grasp Control for Robust Gentle Grasp", "author": "Zhenwei Niu and Xiaoyi Chen and Jiayu Hu and Zhaoyang Liu and Tang Jian and Xiaozu Ju", "abstract": "We introduce a unified framework for gentle robotic grasping that synergistically couples real-time friction estimation with adaptive grasp control. We propose a new particle filter-based method for real-time estimation of the friction coefficient using vision-based tactile sensors. This estimate is seamlessly integrated into a reactive controller that dynamically modulates grasp force to maintain a stable grip. The two processes operate synchronously in a closed-loop: the controller uses the current best estimate to adjust the force, while new tactile feedback from this action continuously refines the estimation. This creates a highly responsive and robust sensorimotor cycle. The reliability and efficiency of the complete framework are validated through extensive robotic experiments.", "link": "http://arxiv.org/abs/2602.02026v2", "date": "2026-03-09", "relevancy": 2.2839, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5912}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.588}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5439}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Synchronized%20Online%20Friction%20Estimation%20and%20Adaptive%20Grasp%20Control%20for%20Robust%20Gentle%20Grasp&body=Title%3A%20Synchronized%20Online%20Friction%20Estimation%20and%20Adaptive%20Grasp%20Control%20for%20Robust%20Gentle%20Grasp%0AAuthor%3A%20Zhenwei%20Niu%20and%20Xiaoyi%20Chen%20and%20Jiayu%20Hu%20and%20Zhaoyang%20Liu%20and {"title": "Fusion-Poly: A Polyhedral Framework Based on Spatial-Temporal Fusion for 3D Multi-Object Tracking", "author": "Xian Wu and Yitao Wu and Xiaoyu Li and Zijia Li and Lijun Zhao and Lining Sun", "abstract": "LiDAR-camera 3D multi-object tracking (MOT) combines rich visual semantics with accurate depth cues to improve trajectory consistency and tracking reliability. In practice, however, LiDAR and cameras operate at different sampling rates. To maintain temporal alignment, existing data pipelines usually synchronize heterogeneous sensor streams and annotate them at a reduced shared frequency, forcing most prior methods to perform spatial fusion only at synchronized timestamps through projection-based or learnable cross-sensor association. As a result, abundant asynchronous observations remain underexploited, despite their potential to support more frequent association and more robust trajectory estimation over short temporal intervals.\n  To address this limitation, we propose Fusion-Poly, a spatial-temporal fusion framework for 3D MOT that integrates asynchronous LiDAR and camera data. Fusion-Poly associates trajectories with multi-modal observations at synchronized timestamps and with single-modal observations at asynchronous timestamps, enabling higher-frequency updates of motion and existence states. The framework contains three key components: a frequency-aware cascade matching module that adapts to synchronized and asynchronous frames according to available detection modalities; a frequency-aware trajectory estimation module that maintains trajectories through high-frequency motion prediction, differential updates, and confidence-calibrated lifecycle management; and a full-state observation alignment module that improves cross-modal consistency at synchronized timestamps by optimizing image-projection errors.\n  On the nuScenes test set, Fusion-Poly achieves 76.5% AMOTA, establishing a new state of the art among tracking-by-detection 3D MOT methods. Extensive ablation studies further validate the effectiveness of each component. Code will be released.", "link": "http://arxiv.org/abs/2603.08199v1", "date": "2026-03-09", "relevancy": 2.2801, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5713}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5707}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5688}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Fusion-Poly%3A%20A%20Polyhedral%20Framework%20Based%20on%20Spatial-Temporal%20Fusion%20for%203D%20Multi-Object%20Tracking&body=Title%3A%20Fusion-Poly%3A%20A%20Polyhedral%20Framework%20Based%20on%20Spatial-Temporal%20Fusion%20for%203D%20Multi-Object%20Tracking%0AAuthor%3A%20Xian%20Wu%20and%20Yitao%20Wu%20and%20Xiaoyu%20Li%20and%20Zijia%20Li%20and%20Lijun%20Zhao%20and%20Lining%20Sun%0AAbstract%3A%20LiDAR-camera%203D%20multi-object%20tracking%20%28MOT%29%20combines%20rich%20visual%20semantics%20with%20accurate%20depth%20cues%20to%20improve%20trajectory%20consistency%20and%20tracking%20reliability.%20In%20practice%2C%20however%2C%20LiDAR%20and%20cameras%20operate%20at%20different%20sampling%20rates.%20To%20maintain%20temporal%20alignment%2C%20existing%20data%20pipelines%20usually%20synchronize%20heterogeneous%20sensor%20streams%20and%20annotate%20them%20at%20a%20reduced%20shared%20frequency%2C%20forcing%20most%20prior%20methods%20to%20perform%20spatial%20fusion%20only%20at%20synchronized%20timestamps%20through%20projection-based%20or%20learnable%20cross-sensor%20association.%20As%20a%20result%2C%20abundant%20asynchronous%20observations%20remain%20underexploited%2C%20despite%20their%20potential%20to%20support%20more%20frequent%20association%20and%20more%20robust%20trajectory%20estimation%20over%20short%20temporal%20intervals.%0A%20%20To%20address%20this%20limitation%2C%20we%20propose%20Fusion-Poly%2C%20a%20spatial-temporal%20fusion%20framework%20for%203D%20MOT%20that%20integrates%20asynchronous%20LiDAR%20and%20camera%20data.%20Fusion-Poly%20associates%20trajectories%20with%20multi-modal%20observations%20at%20synchronized%20timestamps%20and%20with%20single-modal%20observations%20at%20asynchronous%20timestamps%2C%20enabling%20higher-frequency%20updates%20of%20motion%20and%20existence%20states.%20The%20framework%20contains%20three%20key%20components%3A%20a%20frequency-aware%20cascade%20matching%20module%20that%20adapts%20to%20synchronized%20and%20asynchronous%20frames%20according%20to%20available%20detection%20modalities%3B%20a%20frequency-aware%20trajectory%20estimation%20module%20that%20maintains%20trajectories%20through%20high-frequency%20motion%20prediction%2C%20differential%20updates%2C%20and%20confidence-calibrated%20lifecycle%20management%3B%20and%20a%20full-state%20observation%20alignment%20module%20that%20improves%20cross-modal%20consistency%20at%20synchronized%20timestamps%20by%20optimizing%20image-projection%20errors.%0A%20%20On%20the%20nuScenes%20test%20set%2C%20Fusion-Poly%20achieves%2076.5%25%20AMOTA%2C%20establishing%20a%20new%20state%20of%20the%20art%20among%20tracking-by-detection%203D%20MOT%20methods.%20Extensive%20ablation%20studies%20further%20validate%20the%20effectiveness%20of%20each%20component.%20Code%20will%20be%20released.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08199v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFusion-Poly%253A%2520A%2520Polyhedral%2520Framework%2520Based%2520on%2520Spatial-Temporal%2520Fusion%2520for%25203D%2520Multi-Object%2520Tracking%26entry.906535625%3DXian%2520Wu%2520and%2520Yitao%2520Wu%2520and%2520Xiaoyu%2520Li%2520and%2520Zijia%2520Li%2520and%2520Lijun%2520Zhao%2520and%2520Li {"title": "StructBiHOI: Structured Articulation Modeling for Long--Horizon Bimanual Hand--Object Interaction Generation", "author": "Zhi Wang and Liu Liu and Ruonan Liu and Dan Guo and Meng Wang", "abstract": "Recent progress in 3D hand--object interaction (HOI) generation has primarily focused on single--hand grasp synthesis, while bimanual manipulation remains significantly more challenging. Long--horizon planning instability, fine--grained joint articulation, and complex cross--hand coordination make coherent bimanual generation difficult, especially under multimodal conditions. Existing approaches often struggle to simultaneously ensure temporal consistency, physical plausibility, and semantic alignment over extended sequences. We propose StructBiHOI, a Structured articulation modeling framework for long-horizon Bimanual HOI generation. Our key insight is to structurally disentangle temporal joint planning from frame--level manipulation refinement. Specifically, a jointVAE models long-term joint evolution conditioned on object geometry and task semantics, while a maniVAE refines fine-grained hand poses at the single--frame level. To enable stable and efficient long--sequence generation, we incorporate a state--space--inspired diffusion denoiser based on Mamba, which models long--range dependencies with linear complexity. This hierarchical design facilitates coherent dual-hand coordination and articulated object interaction. Extensive experiments on bimanual manipulation and single-hand grasping benchmarks demonstrate that our method achieves superior long--horizon stability, motion realism, and computational efficiency compared to strong baselines.", "link": "http://arxiv.org/abs/2603.08390v1", "date": "2026-03-09", "relevancy": 2.2795, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5952}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "simil {"title": "LycheeCluster: Efficient Long-Context Inference with Structure-Aware Chunking and Hierarchical KV Indexing", "author": "Dongfang Li and Zixuan Liu and Gang Lin and Baotian Hu and Min Zhang", "abstract": "The quadratic complexity of the attention mechanism and the substantial memory footprint of the Key-Value (KV) cache present severe computational and memory challenges for Large Language Models (LLMs) processing long contexts. Existing retrieval-based methods often compromise semantic integrity through fixed-size chunking and suffer from inefficient linear scanning. In this paper, we propose LycheeCluster, a novel method for efficient KV cache management. LycheeCluster preserves local semantic coherence via boundary-aware chunking and constructs a recursive hierarchical index rooted in the triangle inequality. This design transforms cache retrieval from a linear scan into a theoretically bounded, logarithmic-time pruning process, while a lazy update strategy supports efficient streaming generation. Experiments demonstrate that LycheeCluster achieves up to a 3.6x end-to-end inference speedup with negligible degradation in model performance, outperforming state-of-the-art KV cache management methods (e.g., Quest, ClusterKV). We will release our code and kernels after publication.", "link": "http://arxiv.org/abs/2603.08453v1", "date": "2026-03-09", "relevancy": 2.2755, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4712}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4712}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4229}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LycheeCluster%3A%20Efficient%20Long-Context%20Inference%20with%20Structure-Aware%20Chunking%20and%20Hierarchical%20KV%20Indexing&body=Title%3A%20LycheeCluster%3A%20Efficient%20Long-Context%20Inference%20with%20Structure-Aware%20Chunking%20and%20Hierarchical%20KV%20Indexing%0AAuthor%3A%20Dongfang%20Li%20and%20Zixuan%20Liu%20and%20Gang%20Lin%20and%20Baotian%20Hu%20and%20Min%20Zhang%0AAbstract%3A%20The%20quadratic%20complexity%20of%20the%20attention%20mechanism%20and%20the%20substantial%20memory%20footprint%20of%20the%20Key-Value%20%28KV%29%20cache%20present%20severe%20computational%20and%20memory%20challenges%20for%20Large%20Language%20Models%20%28LLMs%29%20processing%20long%20contexts.%20Existing%20retrieval-based%20methods%20often%20compromise%20semantic%20integrity%20through%20fixed-size%20chunking%20and%20suffer%20from%20inefficient%20linear%20scanning.%20In%20this%20paper%2C%20we%20propose%20LycheeCluster%2C%20a%20novel%20method%20for%20efficient%20KV%20cache%20management.%20LycheeCluster%20preserves%20local%20semantic%20coherence%20via%20boundary-aware%20chunking%20and%20constructs%20a%20recursive%20hierarchical%20index%20rooted%20in%20the%20triangle%20inequality.%20This%20design%20transforms%20cache%20retrieval%20from%20a%20linear%20scan%20into%20a%20theoretically%20bounded%2C%20logarithmic-time%20pruning%20process%2C%20while%20a%20lazy%20update%20strategy%20supports%20efficient%20streaming%20generation.%20Experiments%20demonstrate%20that%20LycheeCluster%20achieves%20up%20to%20a%203.6x%20end-to-end%20inference%20speedup%20with%20negligible%20degradation%20in%20model%20performance%2C%20outperforming%20state-of-the-art%20KV%20cache%20management%20methods%20%28e.g.%2C%20Quest%2C%20ClusterKV%29.%20We%20will%20release%20our%20code%20and%20kernels%20after%20publication.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08453v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLycheeCluster%253A%2520Efficient%2520Long-Context%2520Inference%25 2603.08453v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=LycheeCluster%3A%20Efficient%20Long-Context%20Inference%20with%20Structure-Aware%20Chunking%20and%20Hierarchical%20KV%20Indexing&entry.906535625=Dongfang%20Li%20and%20Zixuan%20Liu%20and%20Gang%20Lin%20and%20Baotian%20Hu%20and%20Min%20Zhang&entry.1292438233=The%20quadratic%20complexity%20of%20the%20attention%20mechanism%20and%20the%20substantial%20memory%20footprint%20of%20the%20Key-Value%20%28KV%29%20cache%20present%20severe%20computational%20and%20memory%20challenges%20for%20Large%20Language%20Models%20%28LLMs%29%20processing%20long%20contexts.%20Existing%20retrieval-based%20methods%20often%20compromise%20semantic%20integrity%20through%20fixed-size%20chunking%20and%20suffer%20from%20inefficient%20linear%20scanning.%20In%20this%20paper%2C%20we%20propose%20LycheeCluster%2C%20a%20novel%20method%20for%20efficient%20KV%20cache%20management.%20LycheeCluster%20preserves%20local%20semantic%20coherence%20via%20boundary-aware%20chunking%20and%20constructs%20a%20recursive%20hierarchical%20index%20rooted%20in%20the%20triangle%20inequality.%20This%20design%20transforms%20cache%20retrieval%20from%20a%20linear%20scan%20into%20a%20theoretically%20bounded%2C%20logarithmic-time%20pruning%20process%2C%20while%20a%20lazy%20update%20strategy%20supports%20efficient%20streaming%20generation.%20Experiments%20demonstrate%20that%20LycheeCluster%20achieves%20up%20to%20a%203.6x%20end-to-end%20inference%20speedup%20with%20negligible%20degradation%20in%20model%20performance%2C%20outperforming%20state-of-the-art%20KV%20cache%20management%20methods%20%28e.g.%2C%20Quest%2C%20ClusterKV%29.%20We%20will%20release%20our%20code%20and%20kernels%20after%20publication.&entry.1838667208=http%3A//arxiv.org/abs/2603.08453v1&entry.124074799=Read"},
{"title": "BuildMamba: A Visual State-Space Based Model for Multi-Task Building Segmentation and Height Estimation from Satellite Images", "author": "Sinan U. Ulu and A. Enes Doruk and I. Can Yagmur and Bahadir K. Gunturk and Oguz Hanoglu and Hasan F. Ates", "abstract": "Accurate building segmentation and height estimation from single-view RGB satellite imagery are fundamental for urban analytics, yet remain ill-posed due to structural variability and the high computational cost of global context modeling. While current approaches typically adapt monocular depth architectures, they often suffer from boundary bleeding and systematic underestimation of high-rise structures. To address these limitations, we propose BuildMamba, a unified multi-task framework designed to exploit the linear-time global modeling of visual state-space models. Motivated by the need for stronger structural coupling and computational efficiency, we introduce three modules: a Mamba Attention Module for dynamic spatial recalibration, a Spatial-Aware Mamba-FPN for multi-scale feature aggregation via gated state-space scans, and a Mask-Aware Height Refinement module using semantic priors to suppress height artifacts. Extensive experiments demonstrate that BuildMamba establishes a new performance upper bound across three benchmarks. Specifically, it achieves an IoU of 0.93 and RMSE of 1.77~m on DFC23 benchmark, surpassing state-of-the-art by 0.82~m in height estimation. Simulation results confirm the model's superior robustness and scalability for large-scale 3D urban reconstruction.", "link": "http://arxiv.org/abs/2603.08523v1", "date": "2026-03-09", "relevancy": 2.2728, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5696}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5675}, {" at%20BuildMamba%20establishes%20a%20new%20performance%20upper%20bound%20across%20three%20benchmarks.%20Specifically%2C%20it%20achieves%20an%20IoU%20of%200.93%20and%20RMSE%20of%201.77~m%20on%20DFC23%20benchmark%2C%20surpassing%20state-of-the-art%20by%200.82~m%20in%20height%20estimation.%20Simulation%20results%20confirm%20the%20model%27s%20superior%20robustness%20and%20scalability%20for%20large-scale%203D%20urban%20reconstruction.%0ALink%3A%20http%3A//arxiv.org/abs/2603.08523v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBuildMamba%253A%2520A%2520Visual%2520State-Space%2520Based%2520Model%2520for%2520Multi-Task%2520Building%2520Segmentation%2520and%2520Height%2520Estimation%2520from%2520Satellite%2520Images%26entry.906535625%3DSinan%2520U.%2520Ulu%2520and%2520A.%2520Enes%2520Doruk%2520and%2520I.%2520Can%2520Yagmur%2520and%2520Bahadir%2520K.%2520Gunturk%2520and%2520Oguz%2520Hanoglu%2520and%2520Hasan%2520F.%2520Ates%26entry.1292438233%3DAccurate%2520building%2520segmentation%2520and%2520height%2520estimation%2520from%2520single-view%2520RGB%2520satellite%2520imagery%2520are%2520fundamental%2520for%2520urban%2520analytics%252C%2520yet%2520remain%2520ill-posed%2520due%2520to%2520structural%2520variability%2520and%2520the%2520high%2520computational%2520cost%2520of%2520global%2520context%2520modeling.%2520While%2520current%2520approaches%2520typically%2520adapt%2520monocular%2520depth%2520architectures%252C%2520they%2520often%2520suffer%2520from%2520boundary%2520bleeding%2520and%2520systematic%2520underestimation%2520of%2520high-rise%2520structures.%2520To%2520address%2520these%2520limitations%252C%2520we%2520propose%2520BuildMamba%252C%2520a%2520unified%2520multi-task%2520framework%2520designed%2520to%2520exploit%2520the%2520linear-time%2520global%2520modeling%2520of%2520visual%2520state-space%2520models.%2520Motivated%2520by%2520the%2520need%2520for%2520stronger%2520structural%2520c {"title": "CoCo: Code as CoT for Text-to-Image Preview and Rare Concept Generation", "author": "Haodong Li and Chunmei Qing and Huanyu Zhang and Dongzhi Jiang and Yihang Zou and Hongbo Peng and Dingming Li and Yuhong Dai and ZePeng Lin and Juanxi Tian and Yi Zhou and Siqi Dai and Jingwei Wu", "abstract": "Recent advancements in Unified Multimodal Models (UMMs) have significantly advanced text-to-image (T2I) generation, particularly through the integration of Chain-of-Thought (CoT) reasoning. However, existing CoT-based T2I methods largely rely on abstract natural-language planning, which lacks the precision required for complex spatial layouts, structured visual elements, and dense textual content. In this work, we propose CoCo (Code-as-CoT), a code-driven reasoning framework that represents the reasoning process as executable code, enabling explicit and verifiable intermediate planning for image generation. Given a text prompt, CoCo first generates executable code that specifies the structural layout of the scene, which is then executed in a sandboxed environment to render a deterministic draft image. The model subsequently refines this draft through fine-grained image editing to produce the final high-fidelity result. To support this training paradigm, we construct CoCo-10K, a curated dataset containing structured draft-final image pairs designed to teach both structured draft construction and corrective visual refinement. Empirical evaluations on StructT2IBench, OneIG-Bench, and LongText-Bench show that CoCo achieves improvements of +68.83%, +54.8%, and +41.23% over direct generation, while also outperforming other generation methods empowered by CoT. These results demonstrate that executable code is an effective and reliable reasoning paradigm for precise, controllable, and structured text-to-image generation. The code is available at: https://github.com/micky-li-hd/CoCo", "link": "http://arxiv.org/abs/2603.08652v1", "date": "2026-03-09", "relevancy": 2.2726, "t {"title": "Minor First, Major Last: A Depth-Induced Implicit Bias of Sharpness-Aware Minimization", "author": "Chaewon Moon and Dongkuk Si and Chulhee Yun", "abstract": "We study the implicit bias of Sharpness-Aware Minimization (SAM) when training $L$-layer linear diagonal networks on linearly separable binary classification. For linear models ($L=1$), both $\\ell_\\infty$- and $\\ell_2$-SAM recover the $\\ell_2$ max-margin classifier, matching gradient descent (GD). However, for depth $L = 2$, the behavior changes drastically -- even on a single-example dataset. For $\\ell_\\infty$-SAM, the limit direction depends critically on initialization and can converge to $\\mathbf{0}$ or to any standard basis vector, in stark contrast to GD, whose limit aligns with the basis vector of the dominant data coordinate. For $\\ell_2$-SAM, we show that although its limit direction matches the $\\ell_1$ max-margin solution as in the case of GD, its finite-time dynamics exhibit a phenomenon we call \"sequential feature amplification\", in which the predictor initially relies on minor coordinates and gradually shifts to larger ones as training proceeds or initialization increases. Our theoretical analysis attributes this phenomenon to $\\ell_2$-SAM's gradient normalization factor applied in its perturbation, which amplifies minor coordinates early and allows major ones to dominate later, giving a concrete example where infinite-time implicit-bias analyses are insufficient. Synthetic and real-data experiments corroborate our findings.", "link": "http://arxiv.org/abs/2603.08290v1", "date": "2026-03-09", "relevancy": 1.8816, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.473}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.472}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4677}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Minor%20First%2C%20Major%20Last%3A%20A%20Depth-Induced%20Implicit%20Bias%20of%20Sharpness-Aware%20Minimization&body=Title%3A%20Minor%20First%2C%20Major%20Last%3A%20A%20Depth-Induced%20Implicit%20Bias%20of%20Sharpness-Aware%20Minimization%0AAuthor%3A%20Chaewon%20Moon%20and%20Dongkuk%20Si%20and%20Chulhee%20Yun%0AAbstract%3A%20We%20study%20the%20implicit%20bias%20of%20Sharpness-Aware%20Minimization%20%28SAM%29%20when%20training%20%24L%24-layer%20linear%20diagonal%20networks%20on%20linearly%20separable%20binary%20classification.%20For%20linear%20models%20%28%24L%3D1%24%29%2C%20both%20%24%5Cell_%5Cinfty%24-%20and%20%24%5Cell_2%24-SAM%20recover%20the%20%24%5Cell_2%24%20max-margin%20classifier%2C%20matching%20gradient%20descent%20%28GD%29.%20However%2C%20for%20depth%20%24L%20%3D%202%24%2C%20the%20behavior%20changes%20drastically%20--%20even%20on%20a%20single-example%20dataset.%20For%20%24%5Cell_%5Cinfty%24-SAM%2C%20the%20limit%20direction%20depends%20critically%20on%20initialization%20and%20can%20converge%20to%20%24%5Cmathbf%7B0%7D%24%20or%20to%20any%20standard%20basis%20vector%2C%20in%20stark%20contrast%20to%20GD%2C%20whose%20limit%20aligns%20with%20the%20basis%20vector%20of%20the%20dominant%20data%20coordinate.%20For%20%24%5Cell_2%24-SAM%2C%20we%20show%20that%20although%20its%20limit%20direction%20matches%20the%20%24%5Cell_1%24%20max-margin%20solution%20as%20in%20the%20case%20of%20GD%2C%20its%20finite-time%20dynamics%20exhibit%20a%20phenomenon%20we%20call%20%22sequential%20feature%20amplification%22%2C%20in%20which%20the%20predictor%20initially%20relies%20on%20minor%20coordinates%20and%20gradually%20shifts%20to%20larger%20ones%20as%20training%20proceeds%20or%20initialization%20increases.%20Our%20theoretical%20analysis%20attributes%20this%20phenomenon%20to%20%24%5Cell_2%24-SAM%27s%20gradient%2

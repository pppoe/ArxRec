{"title": "MedXIAOHE: A Comprehensive Recipe for Building Medical MLLMs", "author": "Baorong Shi and Bo Cui and Boyuan Jiang and Deli Yu and Fang Qian and Haihua Yang and Huichao Wang and Jiale Chen and Jianfei Pan and Jieqiong Cao and Jinghao Lin and Kai Wu and Lin Yang and Shengsheng Yao and Tao Chen and Xiaojun Xiao and Xiaozhong Ji and Xu Wang and Yijun He and Zhixiong Yang", "abstract": "We present MedXIAOHE, a medical vision-language foundation model designed to advance general-purpose medical understanding and reasoning in real-world clinical applications. MedXIAOHE achieves state-of-the-art performance across diverse medical benchmarks and surpasses leading closed-source multimodal systems on multiple capabilities. To achieve this, we propose an entity-aware continual pretraining framework that organizes heterogeneous medical corpora to broaden knowledge coverage and reduce long-tail gaps (e.g., rare diseases). For medical expert-level reasoning and interaction, MedXIAOHE incorporates diverse medical reasoning patterns via reinforcement learning and tool-augmented agentic training, enabling multi-step diagnostic reasoning with verifiable decision traces. To improve reliability in real-world use, MedXIAOHE integrates user-preference rubrics, evidence-grounded reasoning, and low-hallucination long-form report generation, with improved adherence to medical instructions. We release this report to document our practical design choices, scaling insights, and evaluation framework, hoping to inspire further research.", "link": "http://arxiv.org/abs/2602.12705v4", "date": "2026-04-07", "relevancy": 2.2869, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5724}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5724}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5684}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MedXIAOHE%3A%20A%20Comprehensive%20Recipe%20for%20Building%20Medical%20MLLMs&body=Title%3A%20MedXIAOHE%3A%20A%20Comprehensive%20Recipe%20for%20Building%20Medical%20MLLMs%0AAuthor%3A%20Baorong%20Shi%20and%20Bo%20Cui%20and%20Boyuan%20Jiang%20and%20Deli%20Yu%20and%20Fang%20Qian%20and%20Haihua%20Yang%20and%20Huichao%20Wang%20and%20Jiale%20Chen%20and%20Jianfei%20Pan%20and%20Jieqiong%20Cao%20and%20Jinghao%20Lin%20and%20Kai%20Wu%20and%20Lin%20Yang%20and%20Shengsheng%20Yao%20and%20Tao%20Chen%20and%20Xiaojun%20Xiao%20and%20Xiaozhong%20Ji%20and%20Xu%20Wang%20and%20Yijun%20He%20and%20Zhixiong%20Yang%0AAbstract%3A%20We%20present%20MedXIAOHE%2C%20a%20medical%20vision-language%20foundation%20model%20designed%20to%20advance%20general-purpose%20medical%20understanding%20and%20reasoning%20in%20real-world%20clinical%20applications.%20MedXIAOHE%20achieves%20state-of-the-art%20performance%20across%20diverse%20medical%20benchmarks%20and%20surpasses%20leading%20closed-source%20multimodal%20systems%20on%20multiple%20capabilities.%20To%20achieve%20this%2C%20we%20propose%20an%20entity-aware%20continual%20pretraining%20framework%20that%20organizes%20heterogeneous%20medical%20corpora%20to%20broaden%20knowledge%20coverage%20and%20reduce%20long-tail%20gaps%20%28e.g.%2C%20rare%20diseases%29.%20For%20medical%20expert-level%20reasoning%20and%20interaction%2C%20MedXIAOHE%20incorporates%20diverse%20medical%20reasoning%20patterns%20via%20reinforcement%20learning%20and%20tool-augmented%20agentic%20training%2C%20enabling%20multi-step%20diagnostic%20reasoning%20with%20verifiable%20decision%20traces.%20To%20improve%20reliability%20in%20real-world%20use%2C%20MedXIAOHE%20integrates%20user-preference%20rubrics%2C%20evidence-grounded%20reasoning%2C%20and%20low-hallucination%20long-form%20report%20generation%2C%20with%20improved%20adherence%20to%20medical%20instructions.%20We%20release%20this%20report%20to%20document%20our%20practical%20design%20choices%2C%20scaling%20insights%2C%20and%20evaluation%20framework%2C%20hoping%20to%20inspire%20further%20research.%0ALink%3A%20http%3A//arxiv.org/abs/2602.12705v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMedXIAOHE%253A%2520A%2520Comprehensive%2520Recipe%2520for%2520Building%2520Medical%2520MLLMs%26entry.906535625%3DBaorong%2520Shi%2520and%2520Bo%2520Cui%2520and%2520Boyuan%2520Jiang%2520and%2520Deli%2520Yu%2520and%2520Fang%2520Qian%2520and%2520Haihua%2520Yang%2520and%2520Huichao%2520Wang%2520and%2520Jiale%2520Chen%2520and%2520Jianfei%2520Pan%2520and%2520Jieqiong%2520Cao%2520and%2520Jinghao%2520Lin%2520and%2520Kai%2520Wu%2520and%2520Lin%2520Yang%2520and%2520Shengsheng%2520Yao%2520and%2520Tao%2520Chen%2520and%2520Xiaojun%2520Xiao%2520and%2520Xiaozhong%2520Ji%2520and%2520Xu%2520Wang%2520and%2520Yijun%2520He%2520and%2520Zhixiong%2520Yang%26entry.1292438233%3DWe%2520present%2520MedXIAOHE%252C%2520a%2520medical%2520vision-language%2520foundation%2520model%2520designed%2520to%2520advance%2520general-purpose%2520medical%2520understanding%2520and%2520reasoning%2520in%2520real-world%2520clinical%2520applications.%2520MedXIAOHE%2520achieves%2520state-of-the-art%2520performance%2520across%2520diverse%2520medical%2520benchmarks%2520and%2520surpasses%2520leading%2520closed-source%2520multimodal%2520systems%2520on%2520multiple%2520capabilities.%2520To%2520achieve%2520this%252C%2520we%2520propose%2520an%2520entity-aware%2520continual%2520pretraining%2520framework%2520that%2520organizes%2520heterogeneous%2520medical%2520corpora%2520to%2520broaden%2520knowledge%2520coverage%2520and%2520reduce%2520long-tail%2520gaps%2520%2528e.g.%252C%2520rare%2520diseases%2529.%2520For%2520medical%2520expert-level%2520reasoning%2520and%2520interaction%252C%2520MedXIAOHE% {"title": "ReMemNav: A Rethinking and Memory-Augmented Framework for Zero-Shot Object Navigation", "author": "Feng Wu and Wei Zuo and Wenliang Yang and Jun Xiao and Yang Liu and Xinhua Zeng", "abstract": "Zero-shot object navigation requires agents to locate unseen target objects in unfamiliar environments without prior maps or task-specific training which remains a significant challenge. Although recent advancements in vision-language models(VLMs) provide promising commonsense reasoning capabilities for this task, these models still suffer from spatial hallucinations, local exploration deadlocks, and a disconnect between high-level semantic intent and low-level control. In this regard, we propose a novel hierarchical navigation framework named ReMemNav, which seamlessly integrates panoramic semantic priors and episodic memory with VLMs. We introduce the Recognize Anything Model to anchor the spatial reasoning process of the VLM. We also design an adaptive dual-modal rethinking mechanism based on an episodic semantic buffer queue. The proposed mechanism actively verifies target visibility and corrects decisions using historical memory to prevent deadlocks. For low-level action execution, ReMemNav extracts a sequence of feasible actions using depth masks, allowing the VLM to select the optimal action for mapping into actual spatial movement. Extensive evaluations on HM3D and MP3D demonstrate that ReMemNav outperforms existing training-free zero-shot baselines in both success rate and exploration efficiency. Specifically, we achieve significant absolute performance improvements, with SR and SPL increasing by 1.7% and 7.0% on HM3D v0.1, 18.2% and 11.1% on HM3D v0.2, and 8.7% and 7.9% on MP3D.", "link": "http://arxiv.org/abs/2603.26788v2", "date": "2026-04-07", "relevancy": 2.2749, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5758}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5692}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5654}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ReMemNav%3A%20A%20Rethinking%20and%20Memory-Augmented%20Framework%20for%20Zero-Shot%20Object%20Navigation&body=Title%3A%20ReMemNav%3A%20A%20Rethinking%20and%20Memory-Augmented%20Framework%20for%20Zero-Shot%20Object%20Navigation%0AAuthor%3A%20Feng%20Wu%20and%20Wei%20Zuo%20and%20Wenliang%20Yang%20and%20Jun%20Xiao%20and%20Yang%20Liu%20and%20Xinhua%20Zeng%0AAbstract%3A%20Zero-shot%20object%20navigation%20requires%20agents%20to%20locate%20unseen%20target%20objects%20in%20unfamiliar%20environments%20without%20prior%20maps%20or%20task-specific%20training%20which%20remains%20a%20significant%20challenge.%20Although%20recent%20advancements%20in%20vision-language%20models%28VLMs%29%20provide%20promising%20commonsense%20reasoning%20capabilities%20for%20this%20task%2C%20these%20models%20still%20suffer%20from%20spatial%20hallucinations%2C%20local%20exploration%20deadlocks%2C%20and%20a%20disconnect%20between%20high-level%20semantic%20intent%20and%20low-level%20control.%20In%20this%20regard%2C%20we%20propose%20a%20novel%20hierarchical%20navigation%20framework%20named%20ReMemNav%2C%20which%20seamlessly%20integrates%20panoramic%20semantic%20priors%20and%20episodic%20memory%20with%20VLMs.%20We%20introduce%20the%20Recognize%20Anything%20Model%20to%20anchor%20the%20spatial%20reasoning%20process%20of%20the%20VLM.%20We%20also%20design%20an%20adaptive%20dual-modal%20rethinking%20mechanism%20based%20on%20an%20episodic%20semantic%20buffer%20queue.%20The%20proposed%20mechanism%20actively%20verifies%20target%20visibility%20and%20corrects%20decisions%20using%20historical%20memory%20to%20prevent%20deadlocks.%20For%20low-level%20action%20execution%2C%20ReMemNav%20extracts%20a%20sequence%20of%20feasible%20actions%20using%20depth%20masks%2C%20allowing%20the%20VLM%20to%20select%20the%20optimal%20action%20for%20mapping%20into%20actual%20spatial%20movement.%20Extensive%20evaluations%20on%20HM3D%20and%20MP3D%20demonstrate%20that%20ReMemNav%20outperforms%20existing%20training-free%20zero-shot%20baselines%20in%20both%20success%20rate%20and%20exploration%20efficiency.%20Specifically%2C%20we%20achieve%20significant%20absolute%20performance%20improvements%2C%20with%20SR%20and%20SPL%20increasing%20by%201.7%25%20and%207.0%25%20on%20HM3D%20v0.1%2C%2018.2%25%20and%2011.1%25%20on%20HM3D%20v0.2%2C%20and%208.7%25%20and%207.9%25%20on%20MP3D.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26788v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReMemNav%253A%2520A%2520Rethinking%2520and%2520Memory-Augmented%2520Framework%2520for%2520Zero-Shot%2520Object%2520Navigation%26entry.906535625%3DFeng%2520Wu%2520and%2520Wei%2520Zuo%2520and%2520Wenliang%2520Yang%2520and%2520Jun%2520Xiao%2520and%2520Yang%2520Liu%2520and%2520Xinhua%2520Zeng%26entry.1292438233%3DZero-shot%2520object%2520navigation%2520requires%2520agents%2520to%2520locate%2520unseen%2520target%2520objects%2520in%2520unfamiliar%2520environments%2520without%2520prior%2520maps%2520or%2520task-specific%2520training%2520which%2520remains%2520a%2520significant%2520challenge.%2520Although%2520recent%2520advancements%2520in%2520vision-language%2520models%2528VLMs%2529%2520provide%2520promising%2520commonsense%2520reasoning%2520capabilities%2520for%2520this%2520task%252C%2520these%2520models%2520still%2520suffer%2520from%2520spatial%2520hallucinations%252C%2520local%2520exploration%2520deadlocks%252C%2520and%2520a%2520disconnect%2520between%2520high-level%2520semantic%2520intent%2520and%2520low-level%2520control.%2520In%2520this%2520regard%252C%2520we%2520propose%2520a%2520novel%2520hierarc {"title": "Stories of Your Life as Others: A Round-Trip Evaluation of LLM-Generated Life Stories Conditioned on Rich Psychometric Profiles", "author": "Ben Wigler and Maria Tsfasman and Tiffany Matej Hrkalovic", "abstract": "Personality traits are richly encoded in natural language, and large language models (LLMs) trained on human text can simulate personality when conditioned on persona descriptions. However, existing evaluations rely predominantly on questionnaire self-report by the conditioned model, are limited in architectural diversity, and rarely use real human psychometric data. Without addressing these limitations, it remains unclear whether personality conditioning produces psychometrically informative representations of individual differences or merely superficial alignment with trait descriptors. To test how robustly LLMs can encode personality into extended text, we condition LLMs on real psychometric profiles from 290 participants to generate first-person life story narratives, and then task independent LLMs to recover personality scores from those narratives alone. We show that personality scores can be recovered from the generated narratives at levels approaching human test-retest reliability (mean r = 0.750, 85% of the human ceiling), and that recovery is robust across 10 LLM narrative generators and 3 LLM personality scorers spanning 6 providers. Decomposing systematic biases reveals that scoring models achieve their accuracy while counteracting alignment-induced defaults. Content analysis of the generated narratives shows that personality conditioning produces behaviourally differentiated text: nine of ten coded features correlate significantly with the same features in participants' real conversations, and personality-driven emotional reactivity patterns in narratives replicate in real conversational data. These findings provide evidence that the personality-language relationship captured during pretraining supports robust encoding and decoding of individual differences, including characteristic emotional variability patterns that replicate in real human behaviour.", "link": "http://arxiv.org/abs/2604.06071v1", "date": "2026-04-07", "relevancy": 2.2652, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4587}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4587}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4418}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Stories%20of%20Your%20Life%20as%20Others%3A%20A%20Round-Trip%20Evaluation%20of%20LLM-Generated%20Life%20Stories%20Conditioned%20on%20Rich%20Psychometric%20Profiles&body=Title%3A%20Stories%20of%20Your%20Life%20as%20Others%3A%20A%20Round-Trip%20Evaluation%20of%20LLM-Generated%20Life%20Stories%20Conditioned%20on%20Rich%20Psychometric%20Profiles%0AAuthor%3A%20Ben%20Wigler%20and%20Maria%20Tsfasman%20and%20Tiffany%20Matej%20Hrkalovic%0AAbstract%3A%20Personality%20traits%20are%20richly%20encoded%20in%20natural%20language%2C%20and%20large%20language%20models%20%28LLMs%29%20trained%20on%20human%20text%20can%20simulate%20personality%20when%20conditioned%20on%20persona%20descriptions.%20However%2C%20existing%20evaluations%20rely%20predominantly%20on%20questionnaire%20self-report%20by%20the%20conditioned%20model%2C%20are%20limited%20in%20architectural%20diversity%2C%20and%20rarely%20use%20real%20human%20psychometric%20data.%20Without%20addressing%20these%20limitations%2C%20it%20remains%20unclear%20whether%20personality%20conditioning%20produces%20psychometrically%20informative%20representations%20of%20individual%20differences%20or%20merely%20superficial%20alignment%20with%20trait%20descriptors.%20To%20test%20how%20robustly%20LLMs%20can%20encode%20personality%20into%20extended%20text%2C%20we%20condition%20LLMs%20on%20real%20psychometric%20profiles%20from%20290%20participants%20to%20generate%20first-person%20life%20story%20narratives%2C%20and%20then%20task%20independent%20LLMs%20to%20recover%20personality%20scores%20from%20those%20narratives%20alone.%20We%20show%20that%20personality%20scores%20can%20be%20recovered%20from%20the%20generated%20narratives%20at%20levels%20approaching%20human%20test-retest%20reliability%20%28mean%20r%20%3D%200.750%2C%2085%25%20of%20the%20human%20ceiling%29%2C%20and%20that%20recovery%20is%20robust%20across%2010%20LLM%20narrative%20generators%20and%203%20LLM%20personality%20scorers%20spanning%206%20providers.%20Decomposing%20systematic%20biases%20reveals%20that%20scoring%20models%20achieve%20their%20accuracy%20while%20counteracting%20alignment-induced%20defaults.%20Content%20analysis%20of%20the%20generated%20narratives%20shows%20that%20personality%20conditioning%20produces%20behaviourally%20differentiated%20text%3A%20nine%20of%20ten%20coded%20features%20correlate%20significantly%20with%20the%20same%20features%20in%20participants%27%20real%20conversations%2C%20and%20personality-driven%20emotional%20reactivity%20patterns%20in%20narratives%20replicate%20in%20real%20conversational%20data.%20These%20findings%20provide%20evidence%20that%20the%20personality-language%20relationship%20captured%20during%20pretraining%20supports%20robust%20encoding%20and%20decoding%20of%20individual%20differences%2C%20including%20characteristic%20emotional%20variability%20patterns%20that%20replicate%20in%20real%20human%20behaviour.%0ALink%3A%20http%3A//arxiv.org/abs/2604.06071v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStories%2520of%2520Your%2520Life%2520as%2520Others%253A%2520A%2520Round-Trip%2520Evaluation%2520of%2520LLM-Generated%2520Life%2520Stories%2520Conditioned%2520on%2520Rich%2520Psychometric {"title": "FeedbackSTS-Det: Sparse Frames-Based Spatio-Temporal Semantic Feedback Network for Moving Infrared Small Target Detection", "author": "Yian Huang and Qing Qin and Aji Mao and Xiangyu Qiu and Liang Xu and Xian Zhang and Zhenming Peng", "abstract": "Infrared small target detection (ISTD) has been a critical technology in defense and civilian applications over the past several decades, such as missile warning, maritime surveillance, and disaster monitoring. Nevertheless, moving infrared small target detection still faces considerable challenges: existing models suffer from insufficient spatio-temporal semantic correlation and are not lightweight-friendly, while algorithms with strong scene generalization capability are in great demand for real-world applications. To address these issues, we propose FeedbackSTS-Det, a sparse frames-based spatio-temporal semantic feedback network. Our approach introduces a closed-loop spatio-temporal semantic feedback strategy with paired forward and backward refinement modules that work cooperatively across the encoder and decoder to enhance information exchange between consecutive frames, effectively improving detection accuracy and reducing false alarms. Moreover, we introduce an embedded sparse semantic module (SSM), which operates by strategically grouping frames by interval, propagating semantics within each group, and reassembling the sequence to efficiently capture long-range temporal dependencies with low computational overhead. Extensive experiments on many widely adopted multi-frame infrared small target datasets demonstrate the generalization ability and scene adaptability of our proposed network. Code and models are available at: https://github.com/IDIP-Lab/FeedbackSTS-Det.", "link": "http://arxiv.org/abs/2601.14690v2", "date": "2026-04-07", "relevancy": 2.2612, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.6005}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5459}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5379}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FeedbackSTS-Det%3A%20Sparse%20Frames-Based%20Spatio-Temporal%20Semantic%20Feedback%20Network%20for%20Moving%20Infrared%20Small%20Target%20Detection&body=Title%3A%20FeedbackSTS-Det%3A%20Sparse%20Frames-Based%20Spatio-Temporal%20Semantic%20Feedback%20Network%20for%20Moving%20Infrared%20Small%20Target%20Detection%0AAuthor%3A%20Yian%20Huang%20and%20Qing%20Qin%20and%20Aji%20Mao%20and%20Xiangyu%20Qiu%20and%20Liang%20Xu%20and%20Xian%20Zhang%20and%20Zhenming%20Peng%0AAbstract%3A%20Infrared%20small%20target%20detection%20%28ISTD%29%20has%20been%20a%20critical%20technology%20in%20defense%20and%20civilian%20applications%20over%20the%20past%20several%20decades%2C%20such%20as%20missile%20warning%2C%20maritime%20surveillance%2C%20and%20disaster%20monitoring.%20Nevertheless%2C%20moving%20infrared%20small%20target%20detection%20still%20faces%20considerable%20challenges%3A%20existing%20models%20suffer%20from%20insufficient%20spatio-temporal%20semantic%20correlation%20and%20are%20not%20lightweight-friendly%2C%20while%20algorithms%20with%20strong%20scene%20generalization%20capability%20are%20in%20great%20demand%20for%20real-world%20applications.%20To%20address%20these%20issues%2C%20we%20propose%20FeedbackSTS-Det%2C%20a%20sparse%20frames-based%20spatio-temporal%20semantic%20feedback%20network.%20Our%20approach%20introduces%20a%20closed-loop%20spatio-temporal%20semantic%20feedback%20strategy%20with%20paired%20forward%20and%20backward%20refinement%20modules%20that%20work%20cooperatively%20across%20the%20encoder%20and%20decoder%20to%20enhance%20information%20e {"title": "MOELIGA: a multi-objective evolutionary approach for feature selection with local improvement", "author": "Leandro Vignolo and Matias Gerard", "abstract": "Selecting the most relevant or informative features is a key issue in actual machine learning problems. Since an exhaustive search is not feasible even for a moderate number of features, an intelligent search strategy must be employed for finding an optimal subset, which implies considering how features interact with each other in promoting class separability. Balancing feature subset size and classification accuracy constitutes a multi-objective optimization challenge. Here we propose MOELIGA, a multi-objective genetic algorithm incorporating an evolutionary local improvement strategy that evolves subordinate populations to refine feature subsets. MOELIGA employs a crowding-based fitness sharing mechanism and a sigmoid transformation to enhance diversity and guide compactness, alongside a geometry-based objective promoting classifier independence. Experimental evaluation on 14 diverse datasets demonstrates MOELIGA's ability to identify smaller feature subsets with superior or comparable classification performance relative to 11 state-of-the-art methods. These findings suggest MOELIGA effectively addresses the accuracy-dimensionality trade-off, offering a robust and adaptable approach for multi-objective feature selection in complex, high-dimensional scenarios.", "link": "http://arxiv.org/abs/2603.20934v2", "date": "2026-04-07", "relevancy": 2.2567, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4611}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.452}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4409}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MOELIGA%3A%20a%20multi-objective%20evolutionary%20approach%20for%20feature%20selection%20with%20local%20improvement&body=Title%3A%20MOELIGA%3A%20a%20multi-objective%20evolutionary%20approach%20for%20feature%20selection%20with%20local%20improvement%0AAuthor%3A%20Leandro%20Vignolo%20and%20Matias%20Gerard%0AAbstract%3A%20Selecting%20the%20most%20relevant%20or%20informative%20features%20is%20a%20key%20issue%20in%20actual%20machine%20learning%20problems.%20Since%20an%20exhaustive%20search%20is%20not%20feasible%20even%20for%20a%20moderate%20number%20of%20features%2C%20an%20intelligent%20search%20strategy%20must%20be%20employed%20for%20finding%20an%20optimal%20subset%2C%20which%20implies%20considering%20how%20features%20interact%20with%20each%20other%20in%20promoting%20class%20separability.%20Balancing%20feature%20subset%20size%20and%20classification%20accuracy%20constitutes%20a%20multi-objective%20optimization%20challenge.%20Here%20we%20propose%20MOELIGA%2C%20a%20multi-objective%20genetic%20algorithm%20incorporating%20an%20evolutionary%20local%20improvement%20strategy%20that%20evolves%20subordinate%20populations%20to%20refine%20feature%20subsets.%20MOELIGA%20employs%20a%20crowding-based%20fitness%20sharing%20mechanism%20and%20a%20sigmoid%20transformation%20to%20enhance%20diversity%20and%20guide%20compactness%2C%20alongside%20a%20geometry-based%20objective%20promoting%20classifier%20independence.%20Experimental%20evaluation%20on%2014%20diverse%20datasets%20demonstrates%20MOELIGA%27s%20ability%20to%20identify%20smaller%20feature%20subsets%20with%20superior%20or%20comparable%20classification%20performance%20relative%20to%2011%20state-of-the-art%20methods.%20These%20findings%20suggest%20MOELIGA%20effectively%20addresses%20the%20accuracy-dimensionality%20trade-off%2C%20offering%20a%20robust%20and%20adaptable%20approach%20for%20multi-objective%20feature%20selection%20in%20complex%2C%20high-dimensional%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2603.20934v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMOELIGA%253A%2520a%2520multi-objective%2520evolutionary%2520approach%2520for%2520feature%2520selection%2520with%2520local%2520improvement%26entry.906535625%3DLeandro%2520Vignolo%2520and%2520Matias%2520Gerard%26entry.1292438233%3DSelecting%2520the%2520most%2520relevant%2520or%2520informative%2520features%2520is%2520a%2520key%2520issue%2520in%2520actual%2520machine%2520learning%2520problems.%2520Since%2520an%2520exhaustive%2520search%2520is%2520not%2520feasible%2520even%2520for%2520a%2520moderate%2520number%2520of%2520features%252C%2520an%2520intelligent%2520search%2520strategy%2520must%2520be%2520employed%2520for%2520finding%2520an%2520optimal%2520subset%252C%2520which%2520implies%2520considering%2520how%2520features%2520interact%2520with%2520each%2520other%2520in%2520promoting%2520class%2520separability.%2520Balancing%2520feature%2520subset%2520size%2520and%2520classification%2520accuracy%2520constitutes%2520a%2520multi-objective%2520optimization%2520challenge.%2520Here%2520we%2520propose%2520MOELIGA%252C%2520a%2520multi-objective%2520genetic%2520algorithm%2520incorporating%2520an%2520evolutionary%2520local%2520improvement%2520strategy%2520that%2520evolves%2520subordinate%2520populations%2520to%2520refine%2520feature%2520subsets.%2520MOELIGA%2520employs%2520a%2520crowding-based%2520fitness%2520sharing%2520mechanism%2520and%2520a%2520sigmoid%2520transformation%2520to%2520enhance%2520diversity%2520and%2520guide%2520compactness%252C%2520alongside%2520a%2520geometry-based%2520objective%2520promoting%2520classifier%2520independence.%2520Experimental%2520evaluation%2520on%252014%2520diverse%2520datasets%2520demonstrates%2520MOELIGA%2527s%2520ability%2520to%2520identify%2520smaller%2520feature%2520subsets%2520with%2520superior%2520or%2520comparable%2520classification%2520performance%2520relative%2520to%252011%2520state-of-the-art%2520methods.%2520These%2520findings%2520suggest%2520MOELIGA%2520effectively%2520addresses%2520the%2520accuracy-dimensionality%2520trade-off%252C%2520offering%2520a%2520robust%2520and%2520adaptable%2520approach%2520for%2520multi-objective%2520feature%2520selection%2520in%2520complex%252C%2520high-dimensional%2520scenarios.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.20934v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MOELIGA%3A%20a%20multi-objective%20evolutionary%20approach%20for%20feature%20selection%20with%20local%20improvement&entry.906535625=Leandro%20Vignolo%20and%20Matias%20Gerard&entry.1292438233=Selecting%20the%20most%20relevant%20or%20informative%20features%20is%20a%20key%20issue%20in%20actual%20machine%20learning%20problems.%20Since%20an%20exhaustive%20search%20is%20not%20feasible%20even%20for%20a%20moderate%20number%20of%20features%2C%20an%20intelligent%20search%20strategy%20must%20be%20employed%20for%20finding%20an%20optimal%20subset%2C%20which%20implies%20considering%20how%20features%20interact%20with%20each%20other%20in%20promoting%20class%20separability.%20Balancing%20feature%20subset%20size%20and%20classification%20accuracy%20constitutes%20a%20multi-objective%20optimization%20challenge.%20Here%20we%20propose%20MOELIGA%2C%20a%20multi-objective%20genetic%20algorithm%20incorporating%20an%20evolutionary%20local%20improvement%20strategy%20that%20evolves%20subordinate%20populations%20to%20refine%20feature%20subsets.%20MOELIGA%20employs%20a%20crowding-based%20fitness%20sharing%20mechanism%20and%20a%20sigmoid%20transformation%20to%20enhance%20diversity%20and%20guide%20compactness%2C%20alongside%20a%20geometry-based%20objective%20promoting%20classifier%20independence.%20Experimental%20evaluation%20on%2014%20diverse%20datasets%20demonstrates%20MOELIGA%27s%20ability%20to%20identify%20smaller%20feature%20subsets%20with%20superior%20or%20comparable%20classification%20performance%20relative%20to%2011%20state-of-the-art%20methods.%20These%20findings%20suggest%20MOELIGA%20effectively%20addresses%20the%20accuracy-dimensionality%20trade-off%2C%20offering%20a%20robust%20and%20adaptable%20approach%20for%20multi-objective%20feature%20selection%20in%20complex%2C%20high-dimensional%20scenarios.&entry.1838667208=http%3A//arxiv.org/abs/2603.20934v2&entry.124074799=Read"},
{"title": "GeoPredict: Leveraging Predictive Kinematics and 3D Gaussian Geometry for Precise VLA Manipulation", "author": "Jingjing Qian and Boyao Han and Chen Shi and Lei Xiao and Long Yang and Shaoshuai Shi and Li Jiang", "abstract": "Vision-Language-Action (VLA) models achieve strong generalization in robotic manipulation but remain largely reactive and 2D-centric, making them unreliable in tasks that require precise 3D reasoning. We propose GeoPredict, a geometry-aware VLA framework that augments a continuous-action policy with predictive kinematic and geometric priors. GeoPredict introduces a trajectory-level module that encodes motion history and predicts multi-step 3D keypoint trajectories of robot arms, and a predictive 3D Gaussian geometry module that forecasts workspace geometry with track-guided refinement along future keypoint trajectories. These predictive modules serve exclusively as training-time supervision through depth-based rendering, while inference requires only lightweight additional query tokens without invoking any 3D decoding. Experiments on RoboCasa Human-50, LIBERO, and real-world manipulation tasks show that GeoPredict consistently outperforms strong VLA baselines, especially in geometry-intensive and spatially demanding scenarios.", "link": "http://arxiv.org/abs/2512.16811v2", "date": "2026-04-07", "relevancy": 2.2438, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5974}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5582}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5491}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GeoPredict%3A%20Leveraging%20Predictive%20Kinematics%20and%203D%20Gaussian%20Geometry%20for%20Precise%20VLA%20Manipulation&body=Title%3A%20GeoPredict%3A%20Leveraging%20Predictive%20Kinematics%20and%203D%20Gaussian%20Geometry%20for%20Precise%20VLA%20Manipulation%0AAuthor%3A%20Jingjing%20Qian%20and%20Boyao%20Han%20and%20Chen%20Shi%20and%20Lei%20Xiao%20and%20Long%20Yang%20and%20Shaoshuai%20Shi%20and%20Li%20Jiang%0AAbstract%3A%20Vision-Language-Action%20%28VLA%29%20models%20achieve%20strong%20generalization%20in%20robotic%20manipulation%20but%20remain%20largely%20reactive%20and%202D-centric%2C%20making%20them%20unreliable%20in%20tasks%20that%20require%20precise%203D%20reasoning.%20We%20propose%20GeoPredict%2C%20a%20geometry-aware%20VLA%20framework%20that%20augments%20a%20continuous-action%20policy%20with%20predictive%20kinematic%20and%20geometric%20priors.%20GeoPredict%20introduces%20a%20trajectory-level%20module%20that%20encodes%20motion%20history%20and%20predicts%20multi-step%203D%20keypoint%20trajectories%20of%20robot%20arms%2C%20and%20a%20predictive%203D%20Gaussian%20geometry%20module%20that%20forecasts%20workspace%20geometry%20with%20track-guided%20refinement%20along%20future%20keypoint%20trajectories.%20These%20predictive%20modules%20serve%20exclusively%20as%20training-time%20supervision%20through%20depth-based%20rendering%2C%20while%20inference%20requires%20only%20lightweight%20additional%20query%20tokens%20without%20invoking%20any%203D%20decoding.%20Experiments%20on%20RoboCasa%20Human-50%2C%20LIBERO%2C%20and%20real-world%20manipulation%20tasks%20show%20that%20GeoPredict%20consistently%20outperforms%20strong%20VLA%20baselines%2C%20especially%20in%20geometry-intensive%20and%20spatially%20demanding%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2512.16811v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeoPredict%253A%2520Leveraging%2520Predictive%2520Kinematics%2520and%25203D%2520Gaussian%2520Geometry%2520for%2520Precise%25 {"title": "OmniFysics: Towards Physical Intelligence Evolution via Omni-Modal Signal Processing and Network Optimization", "author": "Minghao Han and Dingkang Yang and Yue Jiang and Yizhou Liu and Lihua Zhang", "abstract": "The autonomous evolution of networked AI systems relies heavily on robust environmental perception. However, physical understanding remains brittle in current models because key physical signals are visually ambiguous and sparsely represented in web-scale data. To bridge the gap between data-centric learning and knowledge-based physical rules, we present OmniFysics, a compact omni-modal network that unifies signal processing and understanding across images, audio, video, and text. To enable autonomous optimization and inject explicit physical knowledge, we construct a dynamic physical data engine. Within this engine, FysicsAny acts as an adaptive mechanism that produces physics-grounded supervision by mapping salient objects to verified physical attributes via hierarchical retrieval and physics-law-constrained signal verification. Concurrently, FysicsOmniCap distills web videos utilizing advanced audio-visual cross-modal signal processing, generating high-fidelity data pairs that emphasize dynamic physical cues. We optimize the OmniFysics network through staged multimodal alignment and evolutive instruction tuning, integrating latent-space flow matching for generation and an adaptive intent router for efficient execution. Experiments demonstrate that this evolutive optimization paradigm not only achieves competitive performance on standard multimodal benchmarks but also significantly advances physics-oriented evaluations.", "link": "http://arxiv.org/abs/2602.07064v2", "date": "2026-04-07", "relevancy": 2.2391, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6089}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5815}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5184}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OmniFysics%3A%20Towards%20Physical%20Intelligence%20Evolution%20via%20Omni-Modal%20Signal%20Processing%20and%20Network%20Optimization&body=Title%3A%20OmniFysics%3A%20Towards%20Physical%20Intelligence%20Evolution%20via%20Omni-Modal%20Signal%20Processing%20and%20Network%20Optimization%0AAuthor%3A%20Minghao%20Han%20and%20Dingkang%20Yang%20and%20Yue%20Jiang%20and%20Yizhou%20Liu%20and%20Lihua%20Zhang%0AAbstract%3A%20The%20autonomous%20evolution%20of%20networked%20AI%20systems%20relies%20heavily%20on%20robust%20environmental%20perception.%20However%2C%20physical%20understanding%20remains%20brittle%20in%20current%20models%20because%20key%20physical%20signals%20are%20visually%20ambiguous%20and%20sparsely%20represented%20in%20web-scale%20data.%20To%20bridge%20the%20gap%20between%20data-centric%20learning%20and%20knowledge-based%20physical%20rules%2C%20we%20present%20OmniFysics%2C%20a%20compact%20omni-modal%20network%20that%20unifies%20signal%20processing%20and%20understanding%20across%20images%2C%20audio%2C%20video%2C%20and%20text.%20To%20enable%20autonomous%20optimization%20and%20inject%20explicit%20physical%20knowledge%2C%20we%20construct%20a%20dynamic%20physical%20data%20engine.%20Within%20this%20engine%2C%20FysicsAny%20acts%20as%20an%20adaptive%20mechanism%20that%20produces%20physics-grounded%20supervision%20by%20mapping%20salient%20objects%20to%20verified%20physical%20attributes%20via%20hierarchical%20retrieval%20and%20physics-law-constrained%20signal%20verification.%20Concurrently%2C%20FysicsOmniCap%20distills%20web%20videos%20utilizing%20advanced%20audio-visual%20cross-modal%20signal%20processing%2C%20generating%20high-fidelity%20data%20pairs%20that%20emphasize%20dynamic%20physical%20cues.%20We%20optimize%20the%20OmniFysics%20network%20through%20staged%20multimodal%20alignment%20and%20evolutive%20instruction%20tuning%2C%20integrating%20latent-space%20flow%20matching%20for%20generation%20and%20an%20adaptive%20intent%20router%20for%20efficient%20execution.%20Experiments%20demonstrate%20that%20this%20evolutive%20optimization%20paradigm%20not%20only%20achieves%20competitive%20performance%20on%20standard%20multimodal%20benchmarks%20but%20also%20significantly%20advances%20physics-oriented%20evaluations.%0ALink%3A%20http%3A//arxiv.org/abs/2602.07064v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOmniFysics%253A%2520Towards%2520Physical%2520Intelligence%2520Evolution%2520via%2520Omni-Modal%2520Signal%2520Processing%2520and%2520Network%2520Optimization%26entry.906535625%3DMinghao%2520Han%2520and%2520Dingkang%2520Yang%2520and%2520Yue%2520Jiang%2520and%2520Yizhou%2520Liu%2520and%2520Lihua%2520Zhang%26entry.1292438233%3DThe%2520autonomous%2520evolution%2520of%2520networked%2520AI%2520systems%2520relies%2520heavily%2520on%2520robust%2520environmental%2520perception.%2520However%252C%2520physical%2520understanding%2520remains%2520brittle%2520in%2520current%2520models%2520because%2520key%2520physical%2520signals%2520are%2520visually%2520ambiguous%2520and%2520sparsely%2520represented%2520in%2520web-scale%2520data.%2520To%2520bridge%2520the%2520gap%2520between%2520data-centric%2520learning%2520and%2520knowledge-based%2520physical%2520rules%252C%2520we%2520present%2520OmniFysics%252C%2520a%2520compact%2520omni-modal%2520network%2520that%2520unifies%2520signal%2520processing%2520and%2520understanding%2520across%2520images%252C%2520audio%252C%2520video%252C%2520and%2520text.%2520To%2520enable%2520autonomous%2520optimization%2520and%2520inject%2520explicit%2520physical%2520knowledge%252C%2520we%2520construct%2520a%2520dynamic%2520phy {"title": "Mixture-of-Modality-Experts with Holistic Token Learning for Fine-Grained Multimodal Visual Analytics in Driver Action Recognition", "author": "Tianyi Liu and Yiming Li and Wenqian Wang and Jiaojiao Wang and Chen Cai and Yi Wang and Kim-Hui Yap", "abstract": "Robust multimodal visual analytics remains challenging when heterogeneous modalities provide complementary but input-dependent evidence for decision-making.Existing multimodal learning methods mainly rely on fixed fusion modules or predefined cross-modal interactions, which are often insufficient to adapt to changing modality reliability and to capture fine-grained action cues. To address this issue, we propose a Mixture-of-Modality-Experts (MoME) framework with a Holistic Token Learning (HTL) strategy. MoME enables adaptive collaboration among modality-specific experts, while HTL improves both intra-expert refinement and inter-expert knowledge transfer through class tokens and spatio-temporal tokens. In this way, our method forms a knowledge-centric multimodal learning framework that improves expert specialization while reducing ambiguity in multimodal fusion.We validate the proposed framework on driver action recognition as a representative multimodal understanding taskThe experimental results on the public benchmark show that the proposed MoME framework and the HTL strategy jointly outperform representative single-modal and multimodal baselines. Additional ablation, validation, and visualization results further verify that the proposed HTL strategy improves subtle multimodal understanding and offers better interpretability.", "link": "http://arxiv.org/abs/2604.05947v1", "date": "2026-04-07", "relevancy": 2.2352, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5815}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/conten {"title": "SigLino: Efficient Multi-Teacher Distillation for Agglomerative Vision Foundation Models", "author": "Sofian Chaybouti and Sanath Narayan and Yasser Dahou and Ph\u00fac H. L\u00ea Khac and Ankit Singh and Ngoc Dung Huynh and Wamiq Reyaz Para and Hilde Kuehne and Hakim Hacid", "abstract": "Vision foundation models trained via multi-teacher distillation offer a promising path toward unified visual representations, yet the learning dynamics and data efficiency of such approaches remain underexplored. In this paper, we systematically study multi-teacher distillation for vision foundation models and identify key factors that enable training at lower computational cost. We introduce SigLino, an efficient family of agglomerative vision foundation models that distill knowledge from SigLIP2 and DINOv3 simultaneously into Dense and Mixture-of-Experts students. We show that (1) our Asymmetric Relation-Knowledge Distillation loss preserves the geometric properties of each teacher while enabling effective knowledge transfer, (2) token-balanced batching that packs varying-resolution images into sequences with uniform token budgets stabilizes representation learning across resolutions without sacrificing performance, (3) hierarchical clustering and sampling of training data, typically reserved for self-supervised learning, substantially improves sample efficiency over random sampling for multi-teacher distillation, and (4) the resulting representations transfer effectively to early-fusion Grounding-VLMs, outperforming models trained from scratch. By combining these findings, we curate OpenLVD200M, a 200M-image corpus that demonstrates superior efficiency for multi-teacher distillation. Instantiated in a Mixture-of-Experts, our SigLino-MoE initializes an early-fusion Grounding-VLM that replaces the conventional ViT->LLM stack, demonstrating improved performance compared to a model trained from scratch. We release OpenLVD200M and five distilled checkpoints comprising MoE {"title": "Sparse Gain Radio Map Reconstruction With Geometry Priors and Uncertainty-Guided Measurement Selection", "author": "Zhihan Zeng and Ning Wei and Muhammad Baqer Mollah and Kaihe Wang and Phee Lep Yeoh and Fei Xu and Yue Xiu and Zhongpei Zhang", "abstract": "Radio maps are important for environment-aware wireless communication, network planning, and radio resource optimization. However, dense radio map construction remains challenging when only a limited number of measurements are available, especially in complex urban environments with strong blockages, irregular geometry, and restricted sensing accessibility. Existing methods have explored interpolation, low-rank cartography, deep completion, and channel knowledge map (CKM) construction, but many of these methods insufficiently exploit explicit geometric priors or overlook the value of predictive uncertainty for subsequent sensing. In this paper, we study sparse gain radio map reconstruction from a geometry-aware and active sensing perspective. We first construct \\textbf{UrbanRT-RM}, a controllable ray-tracing benchmark with diverse urban layouts, multiple base-station deployments, and multiple sparse sampling modes. We then propose \\textbf{GeoUQ-GFNet}, a lightweight network that jointly predicts a dense gain radio map and a spatial uncertainty map from sparse measurements and structured scene priors. The predicted uncertainty is further used to guide active measurement selection under limited sensing budgets. Extensive experiments show that our proposed GeoUQ-GFNet method achieves strong and consistent reconstruction performance across different scenes and transmitter placements generated using UrbanRT-RM. Moreover, uncertainty-guided querying provides more effective reconstruction improvement than non-adaptive sampling under the same additional measurement budget. These results demonstrate the effectiveness of combining geometry-aware learning, uncertainty estimation, and benchmark-driven evaluation {"title": "Reveal-to-Revise: Explainable Bias-Aware Generative Modeling with Multimodal Attention", "author": "Noor Islam S. Mohammad and Md Muntaqim Meherab", "abstract": "We present an explainable, bias-aware generative framework that unifies cross-modal attention fusion, Grad-CAM++ attribution, and a Reveal-to-Revise feedback loop within a single training paradigm. The architecture couples a conditional attention WGAN GP with bias regularization and iterative local explanation feedback and is evaluated on Multimodal MNIST and Fashion MNIST for image generation and subgroup auditing, as well as a toxic/non-toxic text classification benchmark. All experiments use stratified 80/20 splits, validation-based early stopping, and AdamW with cosine annealing, and results are averaged over three random seeds. The proposed model achieves 93.2% accuracy, a 91.6% F1-score, and a 78.1% IoU-XAI on the multimodal benchmark, outperforming all baselines across every metric, while adversarial training restores 73 to 77% robustness on Fashion MNIST. Ablation studies confirm that fusion, Grad-CAM++, and bias feedback each contribute independently to final performance, with explanations improving structural coherence (SSIM = 88.8%, NMI = 84.9%) and fairness across protected subgroups. These results establish attribution and guided generative learning as a practical and trustworthy approach for high-stakes AI applications.", "link": "http://arxiv.org/abs/2510.12957v3", "date": "2026-04-07", "relevancy": 2.2121, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5611}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5505}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.546}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Revea {"title": "Less Detail, Better Answers: Degradation-Driven Prompting for VQA", "author": "Haoxuan Han and Weijie Wang and Zeyu Zhang and Yefei He and Bohan Zhuang", "abstract": "Recent advancements in Vision-Language Models (VLMs) have significantly pushed the boundaries of Visual Question Answering (VQA).However,high-resolution details can sometimes become noise that leads to hallucinations or reasoning errors. In this paper,we propose Degradation-Driven Prompting (DDP), a novel framework that improves VQA performance by strategically reducing image fidelity to force models to focus on essential structural information. We evaluate DDP across two distinct tasks. Physical attributes targets images prone to human misjudgment, where DDP employs a combination of 80p downsampling, structural visual aids (white background masks and orthometric lines), and In-Context Learning (ICL) to calibrate the model's focus. Perceptual phenomena addresses various machine-susceptible visual anomalies and illusions, including Visual Anomaly (VA), Color (CI), Motion(MI),Gestalt (GI), Geometric (GSI), and Visual Illusions (VI).For this task, DDP integrates a task-classification stage with specialized tools such as blur masks and contrast enhancement alongside downsampling. Our experimental results demonstrate that less is more: by intentionally degrading visual inputs and providing targeted structural prompts, DDP enables VLMs to bypass distracting textures and achieve superior reasoning accuracy on challenging visual benchmarks.", "link": "http://arxiv.org/abs/2604.04838v2", "date": "2026-04-07", "relevancy": 2.2066, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5557}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5557}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5314}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Less%20Detail%2C%20Better%20Answers%3A%20Degradation-Driven%20Prompting%20for%20VQA&body=Title%3A%20Less%20Detail%2C%20Better%20Answers%3A%20Degradation-Driven%20Prompting%20for%20VQA%0AAuthor%3A%20Haoxuan%20Han%20and%20Weijie%20Wang%20and%20Zeyu%20Zhang%20and%20Yefei%20He%20and%20Bohan%20Zhuang%0AAbstract%3A%20Recent%20advancements%20in%20Vision-Language%20Models%20%28VLMs%29%20have%20significantly%20pushed%20the%20boundaries%20of%20Visual%20Question%20Answering%20%28VQA%29.However%2Chigh-resolution%20details%20can%20sometimes%20become%20noise%20that%20leads%20to%20hallucinations%20or%20reasoning%20errors.%20In%20this%20paper%2Cwe%20propose%20Degradation-Driven%20Prompting%20%28DDP%29%2C%20a%20novel%20framework%20that%20improves%20VQA%20performance%20by%20strategically%20reducing%20image%20fidelity%20to%20force%20models%20to%20focus%20on%20essential%20structural%20information.%20We%20evaluate%20DDP%20across%20two%20distinct%20tasks.%20Physical%20attributes%20targets%20images%20prone%20to%20human%20misjudgment%2C%20where%20DDP%20employs%20a%20combination%20of%2080p%20downsampling%2C%20structural%20visual%20aids%20%28white%20background%20masks%20and%20orthometric%20lines%29%2C%20and%20In-Context%20Learning%20%28ICL%29%20to%20calibrate%20the%20model%27s%20focus.%20Perceptual%20phenomena%20addresses%20various%20machine-susceptible%20visual%20anomalies%20and%20illusions%2C%20including%20Visual%20Anomaly%20%28VA%29%2C%20Color%20%28CI%29%2C%20Motion%28MI%29%2CGestalt%20%28GI%29%2C%20Geometric%20%28GSI%29%2C%20and%20Visual%20Illusions%20%28VI%29.For%20this%20task%2C%20DDP%20integrates%20a%20task-classification%20stage%20with%20specialized%20tools%20such%20as%20blur%20masks%20and%20contrast%20enhancement%20alongside%20downsampling.%20Our%20experimental%20results%20demonstrate%20that%20less%20is%20more%3A%20by%20intentionally%20degrading%20visual%20inputs%20and%20providing%20targeted%20structural%20prompts%2C%20DDP%20enables%20VLMs%20to%20bypass%20distracting%20textures%20and%20achieve%20superior%20reasoning%20accuracy%20on%20challenging%20visual%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2604.04838v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLess%2520Detail%252C%2520Better%2520Answers%253A%2520Degradation-Driven%2520Prompting%2520for%2520VQA%26entry.906535625%3DHaoxuan%2520Han%2520and%2520Weijie%2520Wang%2520and%2520Zeyu%2520Zhang%2520and%2520Yefei%2520He%2520and%2520Bohan%2520Zhuang%26entry.1292438233%3DRecent%2520advancements%2520in%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520have%2520significantly%2520pushed%2520the%2520boundaries%2520of%2520Visual%2520Question%2520Answering%2520%2528VQA%2529.However%252Chigh-resolution%2520details%2520can%2520sometimes%2520become%2520noise%2520that%2520leads%2520to%2520hallucinations%2520or%2520reasoning%2520errors.%2520In%2520this%2520paper%252Cwe%2520propose%2520Degradation-Driven%2520Prompting%2520%2528DDP%2529%252C%2520a%2520novel%2520framework%2520that%2520improves%2520VQA%2520performance%2520by%2520strategically%2520reducing%2520image%2520fidelity%2520to%2520force%2520models%2520to%2520focus%2520on%2520essential%2520structural%2520information.%2520We%2520evaluate%2520DDP%2520across%2520two%2520distinct%2520tasks.%2520Physical%2520attributes%2520targets%2520images%2520prone%2520to%2520human%2520misjudgment%252C%2520where%2520DDP%2520employs%2520a%2520combination%2520of%252080p%2520downsampling%252C%2520structural%2520visual%2520aids%2520%2528white%2520background%2520masks%2520and%2520orthometric%2520lines%2529%252C%2520and%2520In-Context%2520Learning%2520%2528ICL%2529%2520to%2520calibrate%2520the%2520model%2527s%2520focus.%2520Perceptual%2520phenomena%2520addresses%2520various%2520machine-susceptible%2520visua {"title": "Graph-PiT: Enhancing Structural Coherence in Part-Based Image Synthesis via Graph Priors", "author": "Junbin Zhang and Meng Cao and Feng Tan and Yikai Lin and Yuexian Zou", "abstract": "Achieving fine-grained and structurally sound controllability is a cornerstone of advanced visual generation. Existing part-based frameworks treat user-provided parts as an unordered set and therefore ignore their intrinsic spatial and semantic relationships, which often results in compositions that lack structural integrity. To bridge this gap, we propose Graph-PiT, a framework that explicitly models the structural dependencies of visual components using a graph prior. Specifically, we represent visual parts as nodes and their spatial-semantic relationships as edges. At the heart of our method is a Hierarchical Graph Neural Network (HGNN) module that performs bidirectional message passing between coarse-grained part-level super-nodes and fine-grained IP+ token sub-nodes, refining part embeddings before they enter the generative pipeline. We also introduce a graph Laplacian smoothness loss and an edge-reconstruction loss so that adjacent parts acquire compatible, relation-aware embeddings. Quantitative experiments on controlled synthetic domains (character, product, indoor layout, and jigsaw), together with qualitative transfer to real web images, show that Graph-PiT improves structural coherence over vanilla PiT while remaining compatible with the original IP-Prior pipeline. Ablation experiments confirm that explicit relational reasoning is crucial for enforcing user-specified adjacency constraints. Our approach not only enhances the plausibility of generated concepts but also offers a scalable and interpretable mechanism for complex, multi-part image synthesis. The code is available at https://github.com/wolf-bailang/Graph-PiT.", "link": "http://arxiv.org/abs/2604.06074v1", "date": "2026-04-07", "relevancy": 2.2064, "topK": [{"title": "Synthesizing Moving People with 3D oss%20so%20that%20adjacent%20parts%20acquire%20compatible%2C%20relation-aware%20embeddings.%20Quantitative%20experiments%20on%20controlled%20synthetic%20domains%20%28character%2C%20product%2C%20indoor%20layout%2C%20and%20jigsaw%29%2C%20together%20with%20qualitative%20transfer%20to%20real%20web%20images%2C%20show%20that%20Graph-PiT%20improves%20structural%20coherence%20over%20vanilla%20PiT%20while%20remaining%20compatible%20with%20the%20original%20IP-Prior%20pipeline.%20Ablation%20experiments%20confirm%20that%20explicit%20relational%20reasoning%20is%20crucial%20for%20enforcing%20user-specified%20adjacency%20constraints.%20Our%20approach%20not%20only%20enhances%20the%20plausibility%20of%20generated%20concepts%20but%20also%20offers%20a%20scalable%20and%20interpretable%20mechanism%20for%20complex%2C%20multi-part%20image%20synthesis.%20The%20code%20is%20available%20at%20https%3A//github.com/wolf-bailang/Graph-PiT.%0ALink%3A%20http%3A//arxiv.org/abs/2604.06074v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGraph-PiT%253A%2520Enhancing%2520Structural%2520Coherence%2520in%2520Part-Based%2520Image%2520Synthesis%2520via%2520Graph%2520Priors%26entry.906535625%3DJunbin%2520Zhang%2520and%2520Meng%2520Cao%2520and%2520Feng%2520Tan%2520and%2520Yikai%2520Lin%2520and%2520Yuexian%2520Zou%26entry.1292438233%3DAchieving%2520fine-grained%2520and%2520structurally%2520sound%2520controllability%2520is%2520a%2520cornerstone%2520of%2520advanced%2520visual%2520generation.%2520Existing%2520part-based%2520frameworks%2520treat%2520user-provided%2520parts%2520as%2520an%2520unordered%2520set%2520and%2520therefore%2520ignore%2520their%2520intrinsic%2520spatial%2520and%2520semantic%2520relationships%252C%2520which%2520often%2520results%2520in%2520compositions%2520that%2520lack%2520structural%2520integrity.%2520To%2520bridge%2520this%2520gap%252C%2520we%2520propose%2520Graph-PiT%252C%2520a%2520framework%2520that% {"title": "Emergent Introspection in AI is Content-Agnostic", "author": "Harvey Lederman and Kyle Mahowald", "abstract": "Introspection is a foundational cognitive ability, but its mechanism is not well understood. Recent work has shown that AI models can introspect. We study the mechanism of this introspection. We first extensively replicate Lindsey (2025)'s thought injection detection paradigm in large open-source models. We show that introspection in these models is content-agnostic: models can detect that an anomaly occurred even when they cannot reliably identify its content. The models confabulate injected concepts that are high-frequency and concrete (e.g., \"apple\"). They also require fewer tokens to detect an injection than to guess the correct concept (with wrong guesses coming earlier). We argue that a content-agnostic introspective mechanism is consistent with leading theories in philosophy and psychology.", "link": "http://arxiv.org/abs/2603.05414v2", "date": "2026-04-07", "relevancy": 2.2021, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4459}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4401}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4352}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Emergent%20Introspection%20in%20AI%20is%20Content-Agnostic&body=Title%3A%20Emergent%20Introspection%20in%20AI%20is%20Content-Agnostic%0AAuthor%3A%20Harvey%20Lederman%20and%20Kyle%20Mahowald%0AAbstract%3A%20Introspection%20is%20a%20foundational%20cognitive%20ability%2C%20but%20its%20mechanism%20is%20not%20well%20understood.%20Recent%20work%20has%20shown%20that%20AI%20models%20can%20introspect.%20We%20study%20the%20mechanism%20of%20this%20introspection.%20We%20first%20extensively%20replicate%20Lindsey%20%282025%29%27s%20thought%20injection%20detection%20paradigm%20in%20large%20open-source%20models.%20We%20show%20that%20introspection%20in%20these%20models%20is%20content-agnostic%3A%20models%20can%20detect%20that%20an%20anomaly%20occurred%20even%20when%20they%20cannot%20reliably%20identify%20its%20content.%20The%20models%20confabulate%20injected%20concepts%20that%20are%20high-frequency%20and%20concrete%20%28e.g.%2C%20%22apple%22%29.%20They%20also%20require%20fewer%20tokens%20to%20detect%20an%20injection%20than%20to%20guess%20the%20correct%20concept%20%28with%20wrong%20guesses%20coming%20earlier%29.%20We%20argue%20that%20a%20content-agnostic%20introspective%20mechanism%20is%20consistent%20with%20leading%20theories%20in%20philosophy%20and%20psychology.%0ALink%3A%20http%3A//arxiv.org/abs/2603.05414v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEmergent%2520Introspection%2520in%2520AI%2520is%2520Content-Agnostic%26entry.906535625%3DHarvey%2520Lederman%2520and%2520Kyle%2520Mahowald%26entry.1292438233%3DIntrospection%2520is%2520a%2520foundational%2520cognitive%2520ability%252C%2520but%2520its%2520mechanism%2520is%2520not%2520well%2520understood.%2520Recent%2520work%2520has%2520shown%2520that%2520AI%2520models%2520can%2520introspect.%2520We%2520study%2520the%2520mechanism%2520of%2520this%2520introspection.%2520We%2520first%2520extensively%2520replicate%2520Lindsey%2520%25282025%2529%2527s%2520thought%2520injection%2520detection%2520paradigm%2520in%2520large%2520open-source%2520models.%2520We%2520show%2520that%2520introspection%2520in%2520these%2520models%2520is%2520content-agnostic%253A%2520models%2520can%2520detect%2520that%2520an%2520anomaly%2520occurred%2520even%2520when%2520they%2520cannot%2520reliably%2520identify%2520its%2520content.%2520The%2520models%2520confabulate%2520injected%2520concepts%2520that%2520are%2520high-frequency%2520and%2520concrete%2520%2528e.g.%252C%2520%2522apple%2522%2529.%2520They%2520also%2520require%2520fewer%2520tokens%2520to%2520detect%2520an%2520injection%2520than%2520to%2520guess%2520the%2520correct%2520concept%2520%2528with%2520wrong%2520guesses%2520coming%2520earlier%2529.%2520We%2520argue%2520that%2520a%2520content-agnostic%2520introspective%2520mechanism%2520is%2520consistent%2520with%2520leading%2520theories%2520in%2520philosophy%2520and%2520psychology.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.05414v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Emergent%20Introspection%20in%20AI%20is%20Content-Agnostic&entry.906535625=Harvey%20Lederman%20and%20Kyle%20Mahowald&entry.1292438233=Introspection%20is%20a%20foundational%20cognitive%20ability%2C%20but%20its%20mechanism%20is%20not%20well%20understood.%20Recent%20work%20has%20shown%20that%20AI%20models%20can%20introspect.%20We%20study%20the%20mechanism%20of%20this%20introspection.%20We%20first%20extensively%20replicate%20Lindsey%20%282025%29%27s%20thought%20injection%20detection%20paradigm%20in%20large%20open-source%20models.%20We%20show%20that%20introspection%20in%20these%20models%20is%20content-agnostic%3A%20models%20can%20detect%20that%20an%20anomaly%20occurred%20even%20when%20they%20cannot%20reliably%20identify%20its%20content.%20The%20models%20confabulate%20injected%20concepts%20that%20are%20high-frequency%20and%20concrete%20%28e.g.%2C%20%22apple%22%29.%20They%20also%20require%20fewer%20tokens%20to%20detect%20an%20injection%20than%20to%20guess%20the%20correct%20concept%20%28with%20wrong%20guesses%20coming%20earlier%29.%20We%20argue%20that%20a%20content-agnostic%20introspective%20mechanism%20is%20consistent%20with%20leading%20theories%20in%20philosophy%20and%20psychology.&entr {"title": "One-to-More: High-Fidelity Training-Free Anomaly Generation with Attention Control", "author": "Haoxiang Rao and Zhao Wang and Chenyang Si and Yan Lyu and Yuanyi Duan and Fang Zhao and Caifeng Shan", "abstract": "Industrial anomaly detection (AD) is characterized by an abundance of normal images but a scarcity of anomalous ones. Although numerous few-shot anomaly synthesis methods have been proposed to augment anomalous data for downstream AD tasks, most existing approaches require time-consuming training and struggle to learn distributions that are faithful to real anomalies, thereby restricting the efficacy of AD models trained on such data. To address these limitations, we propose a training-free few-shot anomaly generation method, namely O2MAG, which leverages the self-attention in One reference anomalous image to synthesize More realistic anomalies, supporting effective downstream anomaly detection. Specifically, O2MAG manipulates three parallel diffusion processes via self-attention grafting and incorporates the anomaly mask to mitigate foreground-background query confusion, synthesizing text-guided anomalies that closely adhere to real anomalous distributions. To bridge the semantic gap between the encoded anomaly text prompts and the true anomaly semantics, Anomaly-Guided Optimization is further introduced to align the synthesis process with the target anomalous distribution, steering the generation toward realistic and text-consistent anomalies. Moreover, to mitigate faint anomaly synthesis inside anomaly masks, Dual-Attention Enhancement is adopted during generation to reinforce both self- and cross-attention on masked regions. Extensive experiments validate the effectiveness of O2MAG, demonstrating its superior performance over prior state-of-the-art methods on downstream AD tasks.", "link": "http://arxiv.org/abs/2603.18093v2", "date": "2026-04-07", "relevancy": 2.1954, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5626}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5396}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5376}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20One-to-More%3A%20High-Fidelity%20Training-Free%20Anomaly%20Generation%20with%20Attention%20Control&body=Title%3A%20One-to-More%3A%20High-Fidelity%20Training-Free%20Anomaly%20Generation%20with%20Attention%20Control%0AAuthor%3A%20Haoxiang%20Rao%20and%20Zhao%20Wang%20and%20Chenyang%20Si%20and%20Yan%20Lyu%20and%20Yuanyi%20Duan%20and%20Fang%20Zhao%20and%20Caifeng%20Shan%0AAbstract%3A%20Industrial%20anomaly%20detection%20%28AD%29%20is%20characterized%20by%20an%20abundance%20of%20normal%20images%20but%20a%20scarcity%20of%20anomalous%20ones.%20Although%20numerous%20few-shot%20anomaly%20synthesis%20methods%20have%20been%20proposed%20to%20augment%20anomalous%20data%20for%20downstream%20AD%20tasks%2C%20most%20existing%20approaches%20require%20time-consuming%20training%20and%20struggle%20to%20learn%20distributions%20that%20are%20faithful%20to%20real%20anomalies%2C%20thereby%20restricting%20the%20efficacy%20of%20AD%20models%20trained%20on%20such%20data.%20To%20address%20these%20limitations%2C%20we%20propose%20a%20training-free%20few-shot%20anomaly%20generation%20method%2C%20namely%20O2MAG%2C%20which%20leverages%20the%20self-attention%20in%20One%20reference%20anomalous%20image%20to%20synthesize%20More%20realistic%20anomalies%2C%20supporting%20effective%20downstream%20anomaly%20detection.%20Specifically%2C%20O2MAG%20manipulates%20three%20parallel%20diffusion%20processes%20via%20self-attention%20grafting%20and%20incorporates%20the%20anomaly%20mask%20to%20mitigate%20foreground-background%20query%20confusion%2C%20synthesizing%20text-guided%20anomalies%20that%20closely%20adhere%20to%20real%20anomalous%20distributions.%20To%20bridge%20the%20semantic%20gap%20between%20the%20encoded%20anomaly%20text%20prompts%20and%20the%20true%20anomaly%20semantics%2C%20Anomaly-Guided%20Optimization%20is%20further%20introduced%20to%20align%20the%20synthesis%20process%20with%20the%20target%20anomalous%20distribution%2C%20steering%20the%20generation%20toward%20realistic%20and%20text-consistent%20anomalies.%20Moreover%2C%20to%20mitigate%20faint%20anomaly%20synthesis%20inside%20anomaly%20masks%2C%20Dual-Attention%20Enhancement%20is%20adopted%20during%20generation%20to%20reinforce%20both%20self-%20and%20cross-attention%20on%20masked%20regions.%20Extensive%20experiments%20validate%20the%20effectiveness%20of%20O2MAG%2C%20demonstrating%20its%20superior%20performance%20over%20prior%20state-of-the-art%20methods%20on%20downstream%20AD%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18093v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOne-to-More%253A%2520High-Fidelity%2520Training-Free%2520Anomaly%2520Generation%2520with%2520Attention%2520Control%26entry.906535625%3DHaoxiang%2520Rao%2520and%2520Zhao%2520Wang%2520and%2520Chenyang%2520Si%2520and%2520Yan%2520Lyu%2520and%2520Yuanyi%2520Duan%2520and%2520Fang%2520Zhao%2520and%2520Caifeng%2520Shan%26entry.1292438233%3DIndustrial%2520anomaly%2520detection%2520%2528AD%2529%2520is%2520characterized%2520by%2520an%2520abundance%2520of%2520normal%2520images%2520but%2520a%2520scarcity%2520of%2520anomalous%2520ones.%2520Although%2520numerous%2520few-shot%2520anomaly%2520synthesis%2520methods%2520have%2520been%2520proposed%2520to%2520augment%2520anomalous%2520data%2520for%2520downstream%2520AD%2520tasks%252C%2520most%2520existing%2520approaches%2520require%2520time-consuming%2520training%2520and%2520struggle%2520to%2520learn%2520distributions%2520that%2520are%2520faithful%2520to%2520real%2520anomalies%252C%2520thereby%25 {"title": "ProBA: Probabilistic Bundle Adjustment with the Bhattacharyya Coefficient", "author": "Jason Chui and Hector Andrade-Loarca and Daniel Cremers", "abstract": "Classical Bundle Adjustment (BA) is fundamentally limited by its reliance on precise metric initialization and prior camera intrinsics. While modern dense matchers offer high-fidelity correspondences, traditional Structure-from-Motion (SfM) pipelines struggle to leverage them, as rigid track-building heuristics fail in the presence of their inherent noise. We present \\textbf{ProBA (Probabilistic Bundle Adjustment)}, a probabilistic re-parameterization of the BA manifold that enables joint optimization of extrinsics, focal lengths, and geometry from a strict cold start. By replacing fragile point tracks with a flexible kinematic pose graph and representing landmarks as 3D Gaussians, our framework explicitly models spatial uncertainty through a unified Negative Log-Likelihood (NLL) objective. This volumetric formulation smooths the non-convex optimization landscape and naturally weights correspondences by their statistical confidence. To maintain global consistency, we optimize over a sparse view graph using an iterative, adaptive edge-weighting mechanism to prune erroneous topological links. Furthermore, we resolve mirror ambiguities inherent to prior-free SfM via a dual-hypothesis regularization strategy. Extensive evaluations show that our approach significantly expands the basin of attraction and achieves superior accuracy over both classical and learning-based baselines, providing a scalable foundation that greatly benefits SfM and SLAM robustness in unstructured environments.", "link": "http://arxiv.org/abs/2505.20858v2", "date": "2026-04-07", "relevancy": 2.1823, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5664}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5576}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5252}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ProBA%3A%20Probabilistic%20Bundle%20Adjustment%20with%20the%20Bhattacharyya%20Coefficient&body=Title%3A%20ProBA%3A%20Probabilistic%20Bundle%20Adjustment%20with%20the%20Bhattacharyya%20Coefficient%0AAuthor%3A%20Jason%20Chui%20and%20Hector%20Andrade-Loarca%20and%20Daniel%20Cremers%0AAbstract%3A%20Classical%20Bundle%20Adjustment%20%28BA%29%20is%20fundamentally%20limited%20by%20its%20reliance%20on%20precise%20metric%20initialization%20and%20prior%20camera%20intrinsics.%20While%20modern%20dense%20matchers%20offer%20high-fidelity%20correspondences%2C%20traditional%20Structure-from-Motion%20%28SfM%29%20pipelines%20struggle%20to%20leverage%20them%2C%20as%20rigid%20track-building%20heuristics%20fail%20in%20the%20presence%20of%20their%20inherent%20noise.%20We%20present%20%5Ctextbf%7BProBA%20%28Probabilistic%20Bundle%20Adjustment%29%7D%2C%20a%20probabilistic%20re-parameterization%20of%20the%20BA%20manifold%20that%20enables%20joint%20optimization%20of%20extrinsics%2C%20focal%20lengths%2C%20and%20geometry%20from%20a%20strict%20cold%20start.%20By%20replacing%20fragile%20point%20tracks%20with%20a%20flexible%20kinematic%20pose%20graph%20and%20representing%20landmarks%20as%203D%20Gaussians%2C%20our%20framework%20explicitly%20models%20spatial%20uncertainty%20through%20a%20unified%20Negative%20Log-Likelihood%20%28NLL%29%20objective.%20This%20volumetric%20formulation%20smooths%20the%20non-convex%20optimization%20landscape%20and%20naturally%20weights%20correspondences%20by%20their%20statistical%20confidence.%20To%20maintain%20global%20consistency%2C%20we%20optimize%20over%20a%20sparse%20view%20graph%20using%20an%20iterative%2C%20adaptive%20edge-weighting%20mechanism%20to%20prune%20erroneous%20topological%20links.%20Furthermore%2C%20we%20resolve%20mirror%20ambiguities%20inherent%20to%20prior-free%20SfM%20via%20a%20dual-hypothesis%20regularization%20strategy.%20Extensive%20evaluations%20show%20that%20our%20approach%20significantly%20expands%20the%20basin%20of%20attraction%20and%20achieves%20superior%20accuracy%20over%20both%20classical%20and%20learning-based%20baselines%2C%20providing%20a%20scalable%20foundation%20that%20greatly%20benefits%20SfM%20and%20SLAM%20robustness%20in%20unstructured%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2505.20858v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DProBA%253A%2520Probabilistic%2520Bundle%2520Adjustment%2520with%2520the%2520Bhattacharyya%2520Coefficient%26entry.906535625%3DJason%2520Chui%2520and%2520Hector%2520Andrade-Loarca%2520and%2520Daniel%2520Cremers%26entry.1292438233%3DClassical%2520Bundle%2520Adjustment%2520%2528BA%2529%2520is%2520fundamentally%2520limited%2520by%2520its%2520reliance%2520on%2520precise%2520metric%2520initialization%2520and%2520prior%2520camera%2520intrinsics.%2520While%2520modern%2520dense%2520matchers%2520offer%2520high-fidelity%2520correspondences%252C%2520traditional%2520Structure-from-Motion%2520%2528SfM%2529%2520pipelines%2520struggle%2520to%2520leverage%2520them%252C%2520as%2520rigid%2520track-building%2520heuristics%2520fail%2520in%2520the%2520presence%2520of%2520their%2520inherent%2520noise.%2520We%2520present%2520%255Ctextbf%257BProBA%2520%2528Probabilistic%2520Bundle%2520Adjustment%2529%257D%252C%2520a%2520probabilistic%2520re-parameterization%2520of%2520the%2520BA%2520manifold%2520that%2520enables%2520joint%2520optimization%2520of%2520extrinsics%252C%2520focal%2520lengths%252C%2520and%2520geometry%2520from%2520a%2520strict%2520cold%2520start.%2520By%2520replacing%2520fragile%2520point%2520tracks%2520

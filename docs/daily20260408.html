{"title": "SatFusion: A Unified Framework for Enhancing Remote Sensing Images via Multi-Frame and Multi-Source Images Fusion", "author": "Yufei Tong and Guanjie Cheng and Peihan Wu and Feiyi Chen and Xinkui Zhao and Shuiguang Deng", "abstract": "High-quality remote sensing (RS) image acquisition is fundamentally constrained by physical limitations. While Multi-Frame Super-Resolution (MFSR) and Pansharpening address this by exploiting complementary information, they are typically studied in isolation: MFSR lacks high-resolution (HR) structural priors for fine-grained texture recovery, whereas Pansharpening relies on upsampled low-resolution (LR) inputs and is sensitive to noise and misalignment. In this paper, we propose SatFusion, a novel and unified framework that seamlessly bridges multi-frame and multi-source RS image fusion. SatFusion extracts HR semantic features by aggregating complementary information from multiple LR multispectral frames via a Multi-Frame Image Fusion (MFIF) module, and integrates fine-grained structural details from an HR panchromatic image through a Multi-Source Image Fusion (MSIF) module with implicit pixel-level alignment. To further alleviate the lack of structural priors during multi-frame fusion, we introduce an advanced variant, SatFusion*, which integrates a panchromatic-guided mechanism into the MFIF stage. Through structure-aware feature embedding and transformer-based adaptive aggregation, SatFusion* enables spatially adaptive feature selection, strengthening the coupling between multi-frame and multi-source representations. Extensive experiments on four benchmark datasets validate our core insight: synergistically coupling multi-frame and multi-source priors effectively resolves the fragility of existing paradigms, delivering superior reconstruction fidelity, robustness, and generalizability.", "link": "http://arxiv.org/abs/2510.07905v4", "date": "2026-04-07", "relevancy": 2.549, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5358}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4991}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4944}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SatFusion%3A%20A%20Unified%20Framework%20for%20Enhancing%20Remote%20Sensing%20Images%20via%20Multi-Frame%20and%20Multi-Source%20Images%20Fusion&body=Title%3A%20SatFusion%3A%20A%20Unified%20Framework%20for%20Enhancing%20Remote%20Sensing%20Images%20via%20Multi-Frame%20and%20Multi-Source%20Images%20Fusion%0AAuthor%3A%20Yufei%20Tong%20and%20Guanjie%20Cheng%20and%20Peihan%20Wu%20and%20Feiyi%20Chen%20and%20Xinkui%20Zhao%20and%20Shuiguang%20Deng%0AAbstract%3A%20High-quality%20remote%20sensing%20%28RS%29%20image%20acquisition%20is%20fundamentally%20constrained%20by%20physical%20limitations.%20While%20Multi-Frame%20Super-Resolution%20%28MFSR%29%20and%20Pansharpening%20address%20this%20by%20exploiting%20complementary%20information%2C%20they%20are%20typically%20studied%20in%20isolation%3A%20MFSR%20lacks%20high-resolution%20%28HR%29%20structural%20priors%20for%20fine-grained%20texture%20recovery%2C%20whereas%20Pansharpening%20relies%20on%20upsampled%20low-resolution%20%28LR%29%20inputs%20and%20is%20sensitive%20to%20noise%20and%20misalignment.%20In%20this%20paper%2C%20we%20propose%20SatFusion%2C%20a%20novel%20and%20unified%20framework%20that%20seamlessly%20bridges%20multi-frame%20and%20multi-source%20RS%20image%20fusion.%20SatFusion%20extracts%20HR%20semantic%20features%20by%20aggregating%20complementary%20information%20from%20multiple%20LR%20multispectral%20frames%20via%20a%20Multi-Frame%20Image%20Fusion%20%28MFIF%29%20module%2C%20and%20integrates%20fine-grained%20structural%20details%20from%20an%20HR%20panchromatic%20image%20through%20a%20Multi-Source%20Image%20Fusion%20%28MSIF%29%20module%20with%20implicit%20pixel-level%20alignment.%20To%20further%20alleviate%20the%20lack%20of%20structural%20priors%20during%20multi-frame%20fusion%2C%20we%20introduce%20an%20advanced%20variant%2C%20SatFusion%2A%2C%20which%20integrates%20a%20panchromatic-guided%20mechanism%20into%20the%20MFIF%20stage.%20Through%20structure-aware%20feature%20embedding%20and%20transformer-based%20adaptive%20aggregation%2C%20SatFusion%2A%20enables%20spatially%20adaptive%20feature%20selection%2C%20strengthening%20the%20coupling%20between%20multi-frame%20and%20multi-source%20representations.%20Extensive%20experiments%20on%20four%20benchmark%20datasets%20validate%20our%20core%20insight%3A%20synergistically%20coupling%20multi-frame%20and%20multi-source%20priors%20effectively%20resolves%20the%20fragility%20of%20existing%20paradigms%2C%20delivering%20superior%20reconstruction%20fidelity%2C%20robustness%2C%20and%20generalizability.%0ALink%3A%20http%3A//arxiv.org/abs/2510.07905v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSatFusion%253A%2520A%2520Unified%2520Framework%2520for%2520Enhancing%2520Remote%2520Sensing%2520Images%2520via%2520Multi-Frame%2520and%2520Multi-Source%2520Images%2520Fusion%26entry.906535625%3DYufei%2520Tong%2520and%2520Guanjie%2520Cheng%2520and%2520Peihan%2520Wu%2520and%2520Feiyi%2520Chen%2520and%2520Xinkui%2520Zhao%2520and%2520Shuiguang%2520Deng%26entry.1292438233%3DHigh-quality%2520remote%2520sensing%2520%2528RS%2529%2520image%2520acquisition%2520is%2520fundamentally%2520constrained%2520by%2520physical%2520limitations.%2520While%2520Multi-Frame%2520Super-Resolution%2520%2528MFSR%2529%2520and%2520Pansharpening%2520address%2520this%2520by%2520exploiting%2520complementary%2520information%252C%2520they%2520are%2520typically%2520studied%2520in%2520isolation%253A%2520MF {"title": "SonoSelect: Efficient Ultrasound Perception via Active Probe Exploration", "author": "Yixin Zhang and Yunzhong Hou and Longqi Li and Zhenyue Qin and Yang Liu and Yue Yao", "abstract": "Ultrasound perception typically requires multiple scan views through probe movement to reduce diagnostic ambiguity, mitigate acoustic occlusions, and improve anatomical coverage. However, not all probe views are equally informative. Exhaustively acquiring a large number of views can introduce substantial redundancy, increase scanning and processing costs. To address this, we define an active view exploration task for ultrasound and propose SonoSelect, an ultrasound-specific method that adaptively guides probe movement based on current observations. Specifically, we cast ultrasound active view exploration as a sequential decision-making problem. Each new 2D ultrasound view is fused into a 3D spatial memory of the observed anatomy, which guides the next probe position. On top of this formulation, we propose an ultrasound-specific objective that favors probe movements with greater organ coverage, lower reconstruction uncertainty, and less redundant scanning. Experiments on the ultrasound simulator show that SonoSelect achieves promising multi-view organ classification accuracy using only 2 out of N views. Furthermore, for a more difficult kidney cyst detection task, it reaches 54.56% kidney coverage and 35.13% cyst coverage, with short trajectories consistently centered on the target cyst.", "link": "http://arxiv.org/abs/2604.05933v1", "date": "2026-04-07", "relevancy": 2.5486, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5181}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5181}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Model {"title": "SEM-ROVER: Semantic Voxel-Guided Diffusion for Large-Scale Driving Scene Generation", "author": "Hiba Dahmani and Nathan Piasco and Moussab Bennehar and Luis Rold\u00e3o and Dzmitry Tsishkou and Laurent Caraffa and Jean-Philippe Tarel and Roland Br\u00e9mond", "abstract": "Scalable generation of outdoor driving scenes requires 3D representations that remain consistent across multiple viewpoints and scale to large areas. Existing solutions either rely on image or video generative models distilled to 3D space, harming the geometric coherence and restricting the rendering to training views, or are limited to small-scale 3D scene or object-centric generation. In this work, we propose a 3D generative framework based on $\u03a3$-Voxfield grid, a discrete representation where each occupied voxel stores a fixed number of colorized surface samples. To generate this representation, we train a semantic-conditioned diffusion model that operates on local voxel neighborhoods and uses 3D positional encodings to capture spatial structure. We scale to large scenes via progressive spatial outpainting over overlapping regions. Finally, we render the generated $\u03a3$-Voxfield grid with a deferred rendering module to obtain photorealistic images, enabling large-scale multiview-consistent 3D scene generation without per-scene optimization. Extensive experiments show that our approach can generate diverse large-scale urban outdoor scenes, renderable into photorealistic images with various sensor configurations and camera trajectories while maintaining moderate computation cost compared to existing approaches.", "link": "http://arxiv.org/abs/2604.06113v1", "date": "2026-04-07", "relevancy": 2.5216, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6836}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": erence%20and%20restricting%20the%20rendering%20to%20training%20views%2C%20or%20are%20limited%20to%20small-scale%203D%20scene%20or%20object-centric%20generation.%20In%20this%20work%2C%20we%20propose%20a%203D%20generative%20framework%20based%20on%20%24%CE%A3%24-Voxfield%20grid%2C%20a%20discrete%20representation%20where%20each%20occupied%20voxel%20stores%20a%20fixed%20number%20of%20colorized%20surface%20samples.%20To%20generate%20this%20representation%2C%20we%20train%20a%20semantic-conditioned%20diffusion%20model%20that%20operates%20on%20local%20voxel%20neighborhoods%20and%20uses%203D%20positional%20encodings%20to%20capture%20spatial%20structure.%20We%20scale%20to%20large%20scenes%20via%20progressive%20spatial%20outpainting%20over%20overlapping%20regions.%20Finally%2C%20we%20render%20the%20generated%20%24%CE%A3%24-Voxfield%20grid%20with%20a%20deferred%20rendering%20module%20to%20obtain%20photorealistic%20images%2C%20enabling%20large-scale%20multiview-consistent%203D%20scene%20generation%20without%20per-scene%20optimization.%20Extensive%20experiments%20show%20that%20our%20approach%20can%20generate%20diverse%20large-scale%20urban%20outdoor%20scenes%2C%20renderable%20into%20photorealistic%20images%20with%20various%20sensor%20configurations%20and%20camera%20trajectories%20while%20maintaining%20moderate%20computation%20cost%20compared%20to%20existing%20approaches.&entry.1838667208=http%3A//arxiv.org/abs/2604.06113v1&entry.124074799=Read"},
{"title": "Can Large Language Models Reinvent Foundational Algorithms?", "author": "Jian Zhao and Haoren Luo and Yu Wang and Yuhan Cao and Pingyue Sheng and Tianxing He", "abstract": "LLMs have shown strong potential to advance scientific discovery. Whether they possess the capacity for foundational innovation, however, remains an open question. In this work, we focus on a prerequisite for foundational innovation: can LLMs reinvent foundational algorithms in computer science? Our \\textit{Unlearn-and-Reinvent} pipeline applies LLM unlearning to remove a specific foundational algorithm, such as Dijkstra's or Euclid's algorithm, from an LLM's pretrained knowledge, and then tests whether the model can reinvent it in a controlled environment. To enable effective unlearning, we adopt a GRPO-based, on-policy unlearning method. Across 10 target algorithms, 3 strong open-weight models, and 3 hint levels, our experiments demonstrate that (1) the strongest model Qwen3-4B-Thinking-2507 successfully reinvents 50% of the algorithms with no hint, 70% at hint level 1, and 90% at hint level 2; (2) a few high-level hints can enhance the reinvention success rate, but even step-by-step hints fail for those complicated algorithms; and (3) test-time reinforcement learning enables successful reinvention for the Strassen algorithm at hint level 2. Through analyses of output trajectories and ablation studies, we find that generative verifier in the reinvention phase plays a critical role in sustaining models' reasoning strength, helping to avoid the ``thought collapse'' phenomenon. These findings offer insights into both the potential and current limits of LLMs' innovative thinking.", "link": "http://arxiv.org/abs/2604.05716v1", "date": "2026-04-07", "relevancy": 2.5216, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5171}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5171}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4788}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Can%20Large%20Language%20Models%20Reinvent%20Foundational%20Algorithms%3F&body=Title%3A%20Can%20Large%20Language%20Models%20Reinvent%20Foundational%20Algorithms%3F%0AAuthor%3A%20Jian%20Zhao%20and%20Haoren%20Luo%20and%20Yu%20Wang%20and%20Yuhan%20Cao%20and%20Pingyue%20Sheng%20and%20Tianxing%20He%0AAbstract%3A%20LLMs%20have%20shown%20strong%20potential%20to%20advance%20scientific%20discovery.%20Whether%20they%20possess%20the%20capacity%20for%20foundational%20innovation%2C%20however%2C%20remains%20an%20open%20question.%20In%20this%20work%2C%20we%20focus%20on%20a%20prerequisite%20for%20foundational%20innovation%3A%20can%20LLMs%20reinvent%20foundational%20algorithms%20in%20computer%20science%3F%20Our%20%5Ctextit%7BUnlearn-and-Reinvent%7D%20pipeline%20applies%20LLM%20unlearning%20to%20remove%20a%20specific%20foundational%20algorithm%2C%20such%20as%20Dijkstra%27s%20or%20Euclid%27s%20algorithm%2C%20from%20an%20LLM%27s%20pretrained%20knowledge%2C%20and%20then%20tests%20whether%20the%20model%20can%20reinvent%20it%20in%20a%20controlled%20environment.%20To%20enable%20effective%20unlearning%2C%20we%20adopt%20a%20GRPO-based%2C%20on-policy%20unlearning%20method.%20Across%2010%20target%20algorithms%2C%203%20strong%20open-weight%20models%2C%20and%203%20hint%20levels%2C%20our%20experiments%20demonstrate%20that%20%281%29%20the%20strongest%20model%20Qwen3-4B-Thinking-2507%20successfully%20reinvents%2050%25%20of%20the%20algorithms%20with%20no%20hint%2C%2070%25%20at%20hint%20level%201%2C%20and%2090%25%20at%20hint%20level%202%3B%20%282%29%20a%20few%20high-level%20hints%20can%20enhance%20the%20reinvention%20success%20rate%2C%20but%20even%20step-by-step%20hints%20fail%20for%20those%20complicated%20algorithms%3B%20and%20%283%29%20test-time%20reinforcement%20learning%20enables%20successful%20reinvention%20for%20the%20Strassen%20algorithm%20at%20hint%20level%202.%20Through%20analyses%20of%20output%20trajectories%20and%20ablation%20studies%2C%20we%20find%20that%20generative%20verifier%20in%20the%20reinvention%20phase%20plays%20a%20critical%20role%20in%20sustaining%20models%27%20reasoning%20strength%2C%20helping%20to%20avoid%20the%20%60%60thought%20collapse%27%27%20phenomenon.%20These%20findings%20offer%20insights%20into%20both%20the%20potential%20and%20current%20limits%20of%20LLMs%27%20innovative%20thinking.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05716v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCan%2520Large%2520Language%2520Models%2520Reinvent%2520Foundational%2520Algorithms%253F%26entry.906535625%3DJian%2520Zhao%2520and%2520Haoren%2520Luo%2520and%2520Yu%2520Wang%2520and%2520Yuhan%2520Cao%2520and%2520Pingyue%2520Sheng%2520and%2520Tianxing%2520He%26entry.1292438233%3DLLMs%2520have%2520shown%2520strong%2520potential%2520to%2520advance%2520scientific%2520discovery.%2520Whether%2520they%2520possess%2520the%2520capacity%2520for%2520foundational%2520innovation%252C%2520however%252C%2520remains%2520an%2520open%2520question.%2520In%2520this%2520work%252C%2520we%2520focus%2520on%2520a%2520prerequisite%2520for%2520foundational%2520innovation%253A%2520can%2520LLMs%2520reinvent%2520foundational%2520algorithms%2520in%2520computer%2520science%253F%2520Our%2520%255Ctextit%257BUnlearn-and-Reinvent%257D%2520pipeline%2520applies%2520LLM%2520unlearning%2520to%2520remove%2520a%2520specific%2520foundational%2520algorithm%252C%2520such%2520as%2520Dijkstra%2527s%2520or%2520Euclid%2527s%2520algorithm%252C%2520from%2520an%2520LLM%2527s%2520pretrained%2520knowledge%252C%2520and%2520then%2520tests%2520whether%2520the%2520model%2520can%2520reinvent%2520it%2520in%2520a%2520controlled%2520en {"title": "Supporting Evidence for the Adaptive Feature Program across Diverse Models", "author": "Yicheng Li and Qian Lin", "abstract": "Theoretically exploring the advantages of neural networks might be one of the most challenging problems in the AI era. An adaptive feature program has recently been proposed to analyze feature learning, the characteristic property of neural networks, in a more abstract way. Motivated by the celebrated Le Cam equivalence, we advocate the over-parameterized sequence models to further simplify the analysis of the training dynamics of adaptive feature program and present several pieces of supporting evidence for the adaptive feature program. More precisely, after having introduced the feature error measure (FEM) to characterize the quality of the learned feature, we show that the FEM is decreasing during the training process of several concrete adaptive feature models including linear regression, single/multiple index models, etc. We believe that this hints at the potential successes of the adaptive feature program.", "link": "http://arxiv.org/abs/2511.09425v3", "date": "2026-04-07", "relevancy": 2.5158, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5107}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5092}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4896}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Supporting%20Evidence%20for%20the%20Adaptive%20Feature%20Program%20across%20Diverse%20Models&body=Title%3A%20Supporting%20Evidence%20for%20the%20Adaptive%20Feature%20Program%20across%20Diverse%20Models%0AAuthor%3A%20Yicheng%20Li%20and%20Qian%20Lin%0AAbstract%3A%20Theoretically%20exploring%20the%20advantages%20of%20neural%20networks%20might%20be%20one%20of%20the%20most%20challenging%20problems%20in%20the%20AI%20era.%20An%20adaptive%20feature%20program%20has%20recently%20been%20proposed%20to%20analyze%20feature%20learning%2C%20the%20characteristic%20property%20of%20neural%20networks%2C%20in%20a%20more%20abstract%20way.%20Motivated%20by%20the%20celebrated%20Le%20Cam%20equivalence%2C%20we%20advocate%20the%20over-parameterized%20sequence%20models%20to%20further%20simplify%20the%20analysis%20of%20the%20training%20dynamics%20of%20adaptive%20feature%20program%20and%20present%20several%20pieces%20of%20supporting%20evidence%20for%20the%20adaptive%20feature%20program.%20More%20precisely%2C%20after%20having%20introduced%20the%20feature%20error%20measure%20%28FEM%29%20to%20characterize%20the%20quality%20of%20the%20learned%20feature%2C%20we%20show%20that%20the%20FEM%20is%20decreasing%20during%20the%20training%20process%20of%20several%20concrete%20adaptive%20feature%20models%20including%20linear%20regression%2C%20single/multiple%20index%20models%2C%20etc.%20We%20believe%20that%20this%20hints%20at%20the%20potential%20successes%20of%20the%20adaptive%20feature%20program.%0ALink%3A%20http%3A//arxiv.org/abs/2511.09425v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSupporting%2520Evidence%2520for%2520the%2520Adaptive%2520Feature%2520Program%2520across%2520Diverse%2520Models%26entry.906535625%3DYicheng%2520Li%2520and%2520Qian%2520Lin%26entry.1292438233%3DTheoretically%2520exploring%2520the%2520advantages%2520of%2520neural%2520networks%2520might%2520be%2520one%2520of%2520the%2520most%2520challenging%2520problems%2520in%2520the%2520AI%2520era.%2520An%2520adaptive%2520feature%2520program%2520has%2520recently%2520been%2520proposed%2520to%2520analyze%2520feature%2520learning%252C%2520the%2520characteristic%2520property%2520of%2520neural%2520networks%252C%2520in%2520a%2520more%2520abstract%2520way.%2520Motivated%2520by%2520the%2520celebrated%2520Le%2520Cam%2520equivalence%252C%2520we%2520advocate%2520the%2520over-parameterized%2520sequence%2520models%2520to%2520further%2520simplify%2520the%2520analysis%2520of%2520the%2520training%2520dynamics%2520of%2520adaptive%2520feature%2520program%2520and%2520present%2520several%2520pieces%2520of%2520supporting%2520evidence%2520for%2520the%2520adaptive%2520feature%2520program.%2520More%2520precisely%252C%2520after%2520having%2520introduced%2520the%2520feature%2520error%2520measure%2520%2528FEM%2529%2520to%2520characterize%2520the%2520quality%2520of%2520the%2520learned%2520feature%252C%2520we%2520show%2520that%2520the%2520FEM%2520is%2520decreasing%2520during%2520the%2520training%2520process%2520of%2520several%2520concrete%2520adaptive%2520feature%2520models%2520including%2520linear%2520regression%252C%2520single/multiple%2520index%2520models%252C%2520etc.%2520We%2520believe%2520that%2520this%2520hints%2520at%2520the%2520potential%2520successes%2520of%2520the%2520adaptive%2520feature%2520program.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.09425v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Supporting%20Evidence%20for%20the%20Adaptive%20Feature%20Program%20across%20Diverse%20Models&entry.906535625=Yicheng%20Li%20and%20Qian%20Lin&entry.1292438233=Theoretically%20exploring%20the%20advantages%20of%20neural%20networks%20might%20be%20one%20of%20the%20most%20challenging%20problems%20in%20the%20AI%20era.%20An%20adaptive%20feature%20program%20has%20recently%20been%20proposed%20to%20analyze%20feature%20learning%2C%20the%20characteristic%20property%20of%20neural%20networks%2C%20in%20a%20more%20abstract%20way.%20Motivated%20by%20the%20celebrated%20Le%20Cam%20equivalence%2C%20we%20advocate%20the%20over-parameterized%20sequence%20models%20to%20further%20simplify%20the%20analysis%20of%20the%20training%20dynamics%20of%20adaptive%20feature%20program%20and%20present%20several%20pieces%20of%20supporting%20evidence%20for%20the%20adaptive%20feature%20program.%20More%20precisely%2C%20after%20having%20introduced%20the%20feature%20error%20measure%20%28FEM%29%20to%20characterize%20the%20quality%20of%20the%20learned%20feature%2C%20we%20show%20that%20the%20FEM%20is%20decreasing%20during%20the%20training%20process%20of%20several%20concrete%20adaptive%20feature%20models%20including%20linear%20regression%2C%20single/multiple%20index%20models%2C%20etc.%20We%20believe%20that%20this%20hints%20at%20the%20potential%20successes%20of%20the%20adaptive%20feature%20program.&entry.1838667208=http%3A//arxiv.org/abs/2511.09425v3&entry.124074799=Read"},
{"title": "In-Place Test-Time Training", "author": "Guhao Feng and Shengjie Luo and Kai Hua and Ge Zhang and Di He and Wenhao Huang and Tianle Cai", "abstract": "The static ``train then deploy\" paradigm fundamentally limits Large Language Models (LLMs) from dynamically adapting their weights in response to continuous streams of new information inherent in real-world tasks. Test-Time Training (TTT) offers a compelling alternative by updating a subset of model parameters (fast weights) at inference time, yet its potential in the current LLM ecosystem is hindered by critical barriers including architectural incompatibility, computational inefficiency and misaligned fast weight objectives for language modeling. In this work, we introduce In-Place Test-Time Training (In-Place TTT), a framework that seamlessly endows LLMs with Test-Time Training ability. In-Place TTT treats the final projection matrix of the ubiquitous MLP blocks as its adaptable fast weights, enabling a ``drop-in\" enhancement for LLMs without costly retraining from scratch. Furthermore, we replace TTT's generic reconstruction objective with a tailored, theoretically-grounded objective explicitly aligned with the Next-Token-Prediction task governing autoregressive language modeling. This principled objective, combined with an efficient chunk-wise update mechanism, results in a highly scalable algorithm compatible with context parallelism. Extensive experiments validate our framework's effectiveness: as an in-place enhancement, it enables a 4B-parameter model to achieve superior performance on tasks with contexts up to 128k, and when pretrained from scratch, it consistently outperforms competitive TTT-related approaches. Ablation study results further provide deeper insights on our design choices. Collectively, our results establish In-Place TTT as a promising step towards a paradigm of continual learning in LLMs.", "link": "http://arxiv.org/abs/2604.06169v1", "date": "2026-04-07", "relevancy": 2.5115, " 0objective%20with%20a%20tailored%2C%20theoretically-grounded%20objective%20explicitly%20aligned%20with%20the%20Next-Token-Prediction%20task%20governing%20autoregressive%20language%20modeling.%20This%20principled%20objective%2C%20combined%20with%20an%20efficient%20chunk-wise%20update%20mechanism%2C%20results%20in%20a%20highly%20scalable%20algorithm%20compatible%20with%20context%20parallelism.%20Extensive%20experiments%20validate%20our%20framework%27s%20effectiveness%3A%20as%20an%20in-place%20enhancement%2C%20it%20enables%20a%204B-parameter%20model%20to%20achieve%20superior%20performance%20on%20tasks%20with%20contexts%20up%20to%20128k%2C%20and%20when%20pretrained%20from%20scratch%2C%20it%20consistently%20outperforms%20competitive%20TTT-related%20approaches.%20Ablation%20study%20results%20further%20provide%20deeper%20insights%20on%20our%20design%20choices.%20Collectively%2C%20our%20results%20establish%20In-Place%20TTT%20as%20a%20promising%20step%20towards%20a%20paradigm%20of%20continual%20learning%20in%20LLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2604.06169v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIn-Place%2520Test-Time%2520Training%26entry.906535625%3DGuhao%2520Feng%2520and%2520Shengjie%2520Luo%2520and%2520Kai%2520Hua%2520and%2520Ge%2520Zhang%2520and%2520Di%2520He%2520and%2520Wenhao%2520Huang%2520and%2520Tianle%2520Cai%26entry.1292438233%3DThe%2520static%2520%2560%2560train%2520then%2520deploy%2522%2520paradigm%2520fundamentally%2520limits%2520Large%2520Language%2520Models%2520%2528LLMs%2529%2520from%2520dynamically%2520adapting%2520their%2520weights%2520in%2520response%2520to%2520continuous%2520streams%2520of%2520new%2520information%2520inherent%2520in%2520real-world%2520tasks.%2520Test-Time%2520Training%2520%2528TTT%2529%2520offers%2520a%2520compelling%2520alternative%2520by%2520updating%2520a%2520subset%2520of%2520model%2520parameters%2520%2528fast%2520weights%2529%2520at% {"title": "\"I See What You Did There\": Can Large Vision-Language Models Understand Multimodal Puns?", "author": "Naen Xu and Jiayi Sheng and Changjiang Li and Chunyi Zhou and Yuyuan Li and Tianyu Du and Jun Wang and Zhihui Fu and Jinbao Li and Shouling Ji", "abstract": "Puns are a common form of rhetorical wordplay that exploits polysemy and phonetic similarity to create humor. In multimodal puns, visual and textual elements synergize to ground the literal sense and evoke the figurative meaning simultaneously. Although Vision-Language Models (VLMs) are widely used in multimodal understanding and generation, their ability to understand puns has not been systematically studied due to a scarcity of rigorous benchmarks. To address this, we first propose a multimodal pun generation pipeline. We then introduce MultiPun, a dataset comprising diverse types of puns alongside adversarial non-pun distractors. Our evaluation reveals that most models struggle to distinguish genuine puns from these distractors. Moreover, we propose both prompt-level and model-level strategies to enhance pun comprehension, with an average improvement of 16.5% in F1 scores. Our findings provide valuable insights for developing future VLMs that master the subtleties of human-like humor via cross-modal reasoning.", "link": "http://arxiv.org/abs/2604.05930v1", "date": "2026-04-07", "relevancy": 2.5027, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5115}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5115}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4786}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20%22I%20See%20What%20You%20Did%20There%22%3A%20Can%20Large% {"title": "Vision-Guided Iterative Refinement for Frontend Code Generation", "author": "Hannah Sansford and Derek H. C. Law and Wei Liu and Abhishek Tripathi and Niresh Agarwal and Gerrit J. J. van den Burg", "abstract": "Code generation with large language models often relies on multi-stage human-in-the-loop refinement, which is effective but very costly - particularly in domains such as frontend web development where the solution quality depends on rendered visual output. We present a fully automated critic-in-the-loop framework in which a vision-language model serves as a visual critic that provides structured feedback on rendered webpages to guide iterative refinement of generated code. Across real-world user requests from the WebDev Arena dataset, this approach yields consistent improvements in solution quality, achieving up to 17.8% increase in performance over three refinement cycles. Next, we investigate parameter-efficient fine-tuning using LoRA to understand whether the improvements provided by the critic can be internalized by the code-generating LLM. Fine-tuning achieves 25% of the gains from the best critic-in-the-loop solution without a significant increase in token counts. Our findings indicate that automated, VLM-based critique of frontend code generation leads to significantly higher quality solutions than can be achieved through a single LLM inference pass, and highlight the importance of iterative refinement for the complex visual outputs associated with web development.", "link": "http://arxiv.org/abs/2604.05839v1", "date": "2026-04-07", "relevancy": 2.5015, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5063}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5063}, {"title": "Tuning-Free Noise Rectification for High Fidelity {"title": "Automatic dental superimposition of 3D intraorals and 2D photographs for human identification", "author": "Antonio D. Villegas-Yeguas and Xavier Abreau-Freire and Guillermo R-Garc\u00eda and Andrea Valsecchi and Teresa Pinho and Daniel P\u00e9rez-Mongiovi and Oscar Ib\u00e1\u00f1ez and Oscar Cord\u00f3n", "abstract": "Dental comparison is considered a primary identification method, at the level of fingerprints and DNA profiling. One crucial but time-consuming step of this method is the morphological comparison. One of the main challenges to apply this method is the lack of ante-mortem medical records, specially on scenarios such as migrant death at the border and/or in countries where there is no universal healthcare. The availability of photos on social media where teeth are visible has led many odontologists to consider morphological comparison using them. However, state-of-the-art proposals have significant limitations, including the lack of proper modeling of perspective distortion and the absence of objective approaches that quantify morphological differences.\n  Our proposal involves a 3D (post-mortem scan) - 2D (ante-mortem photos) approach. Using computer vision and optimization techniques, we replicate the ante-mortem image with the 3D model to perform the morphological comparison. Two automatic approaches have been developed: i) using paired landmarks and ii) using a segmentation of the teeth region to estimate camera parameters. Both are capable of obtaining very promising results over 20,164 cross comparisons from 142 samples, obtaining mean ranking values of 1.6 and 1.5, respectively. These results clearly outperform filtering capabilities of automatic dental chart comparison approaches, while providing an automatic, objective and quantitative score of the morphological correspondence, easily to interpret and analyze by visualizing superimposed images.", "link": "http://arxiv.org/abs/2604.05877v1", "date": "2026-04-07", "relevancy": 2.5011, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5093}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.4978}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4936}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Automatic%20dental%20superimposition%20of%203D%20intraorals%20and%202D%20photographs%20for%20human%20identification&body=Title%3A%20Automatic%20dental%20superimposition%20of%203D%20intraorals%20and%202D%20photographs%20for%20human%20identification%0AAuthor%3A%20Antonio%20D.%20Villegas-Yeguas%20and%20Xavier%20Abreau-Freire%20and%20Guillermo%20R-Garc%C3%ADa%20and%20Andrea%20Valsecchi%20and%20Teresa%20Pinho%20and%20Daniel%20P%C3%A9rez-Mongiovi%20and%20Oscar%20Ib%C3%A1%C3%B1ez%20and%20Oscar%20Cord%C3%B3n%0AAbstract%3A%20Dental%20comparison%20is%20considered%20a%20primary%20identification%20method%2C%20at%20the%20level%20of%20fingerprints%20and%20DNA%20profiling.%20One%20crucial%20but%20time-consuming%20step%20of%20this%20method%20is%20the%20morphological%20comparison.%20One%20of%20the%20main%20challenges%20to%20apply%20this%20method%20is%20the%20lack%20of%20ante-mortem%20medical%20records%2C%20specially%20on%20scenarios%20such%20as%20migrant%20death%20at%20the%20border%20and/or%20in%20countries%20where%20there%20is%20no%20universal%20healthcare.%20The%20availability%20of%20photos%20on%20social%20media%20where%20teeth%20are%20visible%20has%20led%20many%20odontologists%20to%20consider%20morphological%20comparison%20using%20them.%20However%2C%20state-of-the-art%20proposals%20have%20significant%20limitations%2C%20including%20the%20lack%20of%20proper%20modeling%20of%20perspective%20distortion%20and%20the%20absence%20of%20objective%20approaches%20that%20quantify%20morphological%20differences.%0A%20%20Our%20proposal%20involves%20a%203D%20%28post-mortem%20scan%29%20-%202D%20%28ante-mortem%20photos%29%20approach.%20Using%20computer%20vision%20and%20optimization%20techniques%2C%20we%20replicate%20the%20ante-mortem%20image%20with%20the%203D%20model%20to%20perform%20the%20morphological%20comparison.%20Two%20automatic%20approaches%20have%20been%20developed%3A%20i%29%20using%20paired%20landmarks%20and%20ii%29%20using%20a%20segmentation%20of%20the%20teeth%20region%20to%20estimate%20camera%20parameters.%20Both%20are%20capable%20of%20obtaining%20very%20promising%20results%20over%2020%2C164%20cross%20comparisons%20from%20142%20samples%2C%20obtaining%20mean%20ranking%20values%20of%201.6%20and%201.5%2C%20respectively.%20These%20results%20clearly%20outperform%20filtering%20capabilities%20of%20automatic%20dental%20chart%20comparison%20approaches%2C%20while%20providing%20an%20automatic%2C%20objective%20and%20quantitative%20score%20of%20the%20morphological%20correspondence%2C%20easily%20to%20interpret%20and%20analyze%20by%20visualizing%20superimposed%20images.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05877v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAutomatic%2520dental%2520superimposition%2520of%25203D%2520intraorals%2520and%25202D%2520photographs%2520for%2520human%2520identification%26entry.906535625%3DAntonio%2520D.%2520Villegas-Yeguas%2520and%2520Xavier%2520Abreau-Freire%2520and%2520Guillermo%2520R-Garc%25C3%25ADa%2520and%2520Andrea%2520Valsecchi%2520and%2520Teresa%2520Pinho%2520and%2520Daniel%2520P%25C3%25A9rez-Mongiovi%2520and%2520Oscar%2520Ib%25C3%25A1%25C3%25B1ez%2520and%2520Oscar%2520Cord%25C3%25B3n%26entry.1292438233%3DDental%2520comparison%2520is%2520considered%2520a%2520primary%2520identification%2520method%252C%2520at%2520the%2520level%2520of%2520fingerprints%2520and%2520DNA%2520profiling.%2520One%2520crucial%2 {"title": "Emergent social transmission of model-based representations without inference", "author": "Silja Ke\u00dfler and Miriam Bautista-Salinero and Claudio Tennie and Charley M. Wu", "abstract": "How do people acquire rich, flexible knowledge about their environment from others despite limited cognitive capacity? Humans are often thought to rely on computationally costly mentalizing, such as inferring others' beliefs. In contrast, cultural evolution emphasizes that behavioral transmission can be supported by simple social cues. Using reinforcement learning simulations, we show how minimal social learning can indirectly transmit higher-level representations. We simulate a na\u00efve agent searching for rewards in a reconfigurable environment, learning either alone or by observing an expert - crucially, without inferring mental states. Instead, the learner heuristically selects actions or boosts value representations based on observed actions. Our results demonstrate that these cues bias the learner's experience, causing its representation to converge toward the expert's. Model-based learners benefit most from social exposure, showing faster learning and more expert-like representations. These findings show how cultural transmission can arise from simple, non-mentalizing processes exploiting asocial learning mechanisms.", "link": "http://arxiv.org/abs/2604.05777v1", "date": "2026-04-07", "relevancy": 2.4905, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5187}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4879}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4877}], "mailto" {"title": "Hypothesis-Driven Feature Manifold Analysis in LLMs via Supervised Multi-Dimensional Scaling", "author": "Federico Tiblias and Irina Bigoulaeva and Jingcheng Niu and Simone Balloccu and Iryna Gurevych", "abstract": "The linear representation hypothesis states that language models (LMs) encode concepts as directions in their latent space, forming organized, multidimensional manifolds. Prior work has largely focused on identifying specific geometries for individual features, limiting its ability to generalize. We introduce Supervised Multi-Dimensional Scaling (SMDS), a model-agnostic method for evaluating and comparing competing feature manifold hypotheses. We apply SMDS to temporal reasoning as a case study and find that different features instantiate distinct geometric structures, including circles, lines, and clusters. SMDS reveals several consistent characteristics of these structures: they reflect the semantic properties of the concepts they represent, remain stable across model families and sizes, actively support reasoning, and dynamically reshape in response to contextual changes. Together, our findings shed light on the functional role of feature manifolds, supporting a model of entity-based reasoning in which LMs encode and transform structured representations.", "link": "http://arxiv.org/abs/2510.01025v2", "date": "2026-04-07", "relevancy": 2.4867, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5034}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4943}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4943}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hypothesis-Driven%20Feature%20Manifold%20Analysis%20in%20LLMs%20via%20Supervised%20Multi-Dimensional%20Scaling&body=Title%3A%20Hypothesis-Driven%20Feature%20Manifold%20Analysis%20in%20LLMs%20via%20Supervised%20Multi-Dimensional%20Scaling%0AAuthor%3A%20Federico%20Tiblias%20and%20Irina%20Bigoulaeva%20and%20Jingcheng%20Niu%20and%20Simone%20Balloccu%20and%20Iryna%20Gurevych%0AAbstract%3A%20The%20linear%20representation%20hypothesis%20states%20that%20language%20models%20%28LMs%29%20encode%20concepts%20as%20directions%20in%20their%20latent%20space%2C%20forming%20organized%2C%20multidimensional%20manifolds.%20Prior%20work%20has%20largely%20focused%20on%20identifying%20specific%20geometries%20for%20individual%20features%2C%20limiting%20its%20ability%20to%20generalize.%20We%20introduce%20Supervised%20Multi-Dimensional%20Scaling%20%28SMDS%29%2C%20a%20model-agnostic%20method%20for%20evaluating%20and%20comparing%20competing%20feature%20manifold%20hypotheses.%20We%20apply%20SMDS%20to%20temporal%20reasoning%20as%20a%20case%20study%20and%20find%20that%20different%20features%20instantiate%20distinct%20geometric%20structures%2C%20including%20circles%2C%20lines%2C%20and%20clusters.%20SMDS%20reveals%20several%20consistent%20characteristics%20of%20these%20structures%3A%20they%20reflect%20the%20semantic%20properties%20of%20the%20concepts%20they%20represent%2C%20remain%20stable%20across%20model%20families%20and%20sizes%2C%20actively%20support%20reasoning%2C%20and%20dynamically%20reshape%20in%20response%20to%20contextual%20changes.%20Together%2C%20our%20findings%20shed%20light%20on%20the%20functional%20role%20of%20feature%20manifolds%2C%20supporting%20a%20model%20of%20entity-based%20reasoning%20in%20which%20LMs%20encode%20and%20transform%20structured%20representations.%0ALink%3A%20http%3A//arxiv.org/abs/2510.01025v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHypothesis-Driven%2520Feature%2520Manifold%2520Analysis%2520in%2520LLMs%2520via%2520Supervised%2520 ead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Hypothesis-Driven%20Feature%20Manifold%20Analysis%20in%20LLMs%20via%20Supervised%20Multi-Dimensional%20Scaling&entry.906535625=Federico%20Tiblias%20and%20Irina%20Bigoulaeva%20and%20Jingcheng%20Niu%20and%20Simone%20Balloccu%20and%20Iryna%20Gurevych&entry.1292438233=The%20linear%20representation%20hypothesis%20states%20that%20language%20models%20%28LMs%29%20encode%20concepts%20as%20directions%20in%20their%20latent%20space%2C%20forming%20organized%2C%20multidimensional%20manifolds.%20Prior%20work%20has%20largely%20focused%20on%20identifying%20specific%20geometries%20for%20individual%20features%2C%20limiting%20its%20ability%20to%20generalize.%20We%20introduce%20Supervised%20Multi-Dimensional%20Scaling%20%28SMDS%29%2C%20a%20model-agnostic%20method%20for%20evaluating%20and%20comparing%20competing%20feature%20manifold%20hypotheses.%20We%20apply%20SMDS%20to%20temporal%20reasoning%20as%20a%20case%20study%20and%20find%20that%20different%20features%20instantiate%20distinct%20geometric%20structures%2C%20including%20circles%2C%20lines%2C%20and%20clusters.%20SMDS%20reveals%20several%20consistent%20characteristics%20of%20these%20structures%3A%20they%20reflect%20the%20semantic%20properties%20of%20the%20concepts%20they%20represent%2C%20remain%20stable%20across%20model%20families%20and%20sizes%2C%20actively%20support%20reasoning%2C%20and%20dynamically%20reshape%20in%20response%20to%20contextual%20changes.%20Together%2C%20our%20findings%20shed%20light%20on%20the%20functional%20role%20of%20feature%20manifolds%2C%20supporting%20a%20model%20of%20entity-based%20reasoning%20in%20which%20LMs%20encode%20and%20transform%20structured%20representations.&entry.1838667208=http%3A//arxiv.org/abs/2510.01025v2&entry.124074799=Read"},
{"title": "TrajectoryMover: Generative Movement of Object Trajectories in Videos", "author": "Kiran Chhatre and Hyeonho Jeong and Yulia Gryaditskaya and Christopher E. Peters and Chun-Hao Paul Huang and Paul Guerrero", "abstract": "Generative video editing has enabled several intuitive editing operations for short video clips that would previously have been difficult to achieve, especially for non-expert editors. Existing methods focus on prescribing an object's 3D or 2D motion trajectory in a video, or on altering the appearance of an object or a scene, while preserving both the video's plausibility and identity. Yet a method to move an object's 3D motion trajectory in a video, i.e., moving an object while preserving its relative 3D motion, is currently still missing. The main challenge lies in obtaining paired video data for this scenario. Previous methods typically rely on clever data generation approaches to construct plausible paired data from unpaired videos, but this approach fails if one of the videos in a pair can not easily be constructed from the other. Instead, we introduce TrajectoryAtlas, a new data generation pipeline for large-scale synthetic paired video data and a video generator TrajectoryMover fine-tuned with this data. We show that this successfully enables generative movement of object trajectories. Project page: https://chhatrekiran.github.io/trajectorymover", "link": "http://arxiv.org/abs/2603.29092v2", "date": "2026-04-07", "relevancy": 2.4751, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6231}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6183}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6176}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TrajectoryMover%3A%20Generative%20Movement%20of%20Object%20Trajectories%20in%20Videos&body=Title%3A%20TrajectoryMover%3A%20Generative%20Movement%20of%20Object%20Trajectories%20in%20Videos%0AAuthor%3A%20Kiran%20Chhatre%20and%20Hyeonho%20Jeong%20and%20Yulia%20Gryaditskaya%20and%20Christopher%20E.%20Peters%20and%20Chun-Hao%20Paul%20Huang%20and%20Paul%20Guerrero%0AAbstract%3A%20Generative%20video%20editing%20has%20enabled%20several%20intuitive%20editing%20operations%20for%20short%20video%20clips%20that%20would%20previously%20have%20been%20difficult%20to%20achieve%2C%20especially%20for%20non-expert%20editors.%20Existing%20methods%20focus%20on%20prescribing%20an%20object%27s%203D%20or%202D%20motion%20trajectory%20in%20a%20video%2C%20or%20on%20altering%20the%20appearance%20of%20an%20object%20or%20a%20scene%2C%20while%20preserving%20both%20the%20video%27s%20plausibility%20and%20identity.%20Yet%20a%20method%20to%20move%20an%20object%27s%203D%20motion%20trajectory%20in%20a%20video%2C%20i.e.%2C%20moving%20an%20object%20while%20preserving%20its%20relative%203D%20motion%2C%20is%20currently%20still%20missing.%20The%20main%20challenge%20lies%20in%20obtaining%20paired%20video%20data%20for%20this%20scenario.%20Previous%20methods%20typically%20rely%20on%20clever%20data%20generation%20approaches%20to%20construct%20plausible%20paired%20data%20from%20unpaired%20videos%2C%20but%20this%20approach%20fails%20if%20one%20of%20the%20videos%20in%20a%20pair%20can%20not%20easily%20be%20constructed%20from%20the%20other.%20Instead%2C%20we%20introduce%20TrajectoryAtlas%2C%20a%20new%20data%20generation%20pipeline%20for%20large-scale%20synthetic%20paired%20video%20data%20and%20a%20video%20generator%20TrajectoryMover%20fine-tuned%20with%20this%20data.%20We%20show%20that%20this%20successfully%20enables%20generative%20movement%20of%20object%20trajectories.%20Project%20page%3A%20https%3A//chhatrekiran.github.io/trajectorymover%0ALink%3A%20http%3A//arxiv.org/abs/2603.29092v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTrajectoryMover%253A%2520Generative%2520Movement%2520of%2520Object%2520Trajectories%2520in%2520Videos%26entry.906535625%3DKiran%2520Chhatre%2520and%2520Hyeonho%2520Jeong%2520and%2520Yulia%2520Gryaditskaya%2520and%2520Christopher%2520E.%2520Peters%2520and%2520Chun-Hao%2520Paul%2520Huang%2520and%2520Paul%2520Guerrero%26entry.1292438233%3DGenerative%2520video%2520editing%2520has%2520enabled%2520several%2520intuitive%2520editing%2520operations%2520for%2520short%2520video%2520clips%2520that%2520would%2520previously%2520have%2520been%2520difficult%2520to%2520achieve%252C%2520especially%2520for%2520non-expert%2520editors.%2520Existing%2520methods%2520focus%2520on%2520prescribing%2520an%2520object%2527s%25203D%2520or%25202D%2520motion%2520trajectory%2520in%2520a%2520video%252C%2520or%2520on%2520altering%2520the%2520appearance%2520of%2520an%2520object%2520or%2520a%2520scene%252C%2520while%2520preserving%2520both%2520the%2520video%2527s%2520plausibility%2520and%2520identity.%2520Yet%2520a%2520method%2520to%2520move%2520an%2520object%2527s%25203D%2520motion%2520trajectory%2520in%2520a%2520video%252C%2520i.e.%252C%2520moving%2520an%2520object%2520while%2520preserving%2520its%2520relative%25203D%2520motion%252C%2520is%2520currently%2520still%2520missing.%2520The%2520main%2520challenge%2520lies%2520in%2520obtaining%2520paired%2520video%2520data%2520for%2520this%2520scenario.%2520Previous%2520methods%2520typically%2520rely%2520on%2520clever%2520data%2520generation%2520approaches%2520to%2520construct%2520plausible%2520paired%2520data%2520from%2520unpaired%2520videos%252C%2520but%2520this%2520approach%2520fails%2520if%2520one%2520of%2520the%2520videos%2520in%2520a%2520pair%2520can%2520not%2520easily%2520be%2520constructed%2520from%2520the%2520other.%2520Instead%252C%2520we%2520introduce%2520TrajectoryAtlas%252C%2520a%2520new%2520data%2520generation%2520pipeline%2520for%2520 {"title": "MATRIX: Mask Track Alignment for Interaction-aware Video Generation", "author": "Siyoon Jin and Seongchan Kim and Dahyun Chung and Jaeho Lee and Hyunwook Choi and Jisu Nam and Jiyoung Kim and Seungryong Kim", "abstract": "Video DiTs have advanced video generation, yet they still struggle to model multi-instance or subject-object interactions. This raises a key question: How do these models internally represent interactions? To answer this, we curate MATRIX-11K, a video dataset with interaction-aware captions and multi-instance mask tracks. Using this dataset, we conduct a systematic analysis that formalizes two perspectives of video DiTs: semantic grounding, via video-to-text attention, which evaluates whether noun and verb tokens capture instances and their relations; and semantic propagation, via video-to-video attention, which assesses whether instance bindings persist across frames. We find both effects concentrate in a small subset of interaction-dominant layers. Motivated by this, we introduce MATRIX, a simple and effective regularization that aligns attention in specific layers of video DiTs with multi-instance mask tracks from the MATRIX-11K dataset, enhancing both grounding and propagation. We further propose InterGenEval, an evaluation protocol for interaction-aware video generation. In experiments, MATRIX improves both interaction fidelity and semantic alignment while reducing drift and hallucination. Extensive ablations validate our design choices. Codes and weights will be released.", "link": "http://arxiv.org/abs/2510.07310v2", "date": "2026-04-07", "relevancy": 2.4748, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6485}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5978}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5965}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MATRIX%3A%20Mask%20Track%20Alignment%20for%20Interaction-aware%20Video%20Generation&body=Title%3A%20MATRIX%3A%20Mask%20Track%20Alignment%20for%20Interaction-aware%20Video%20Generation%0AAuthor%3A%20Siyoon%20Jin%20and%20Seongchan%20Kim%20and%20Dahyun%20Chung%20and%20Jaeho%20Lee%20and%20Hyunwook%20Choi%20and%20Jisu%20Nam%20and%20Jiyoung%20Kim%20and%20Seungryong%20Kim%0AAbstract%3A%20Video%20DiTs%20have%20advanced%20video%20generation%2C%20yet%20they%20still%20struggle%20to%20model%20multi-instance%20or%20subject-object%20interactions.%20This%20raises%20a%20key%20question%3A%20How%20do%20these%20models%20internally%20represent%20interactions%3F%20To%20answer%20this%2C%20we%20curate%20MATRIX-11K%2C%20a%20video%20dataset%20with%20interaction-aware%20captions%20and%20multi-instance%20mask%20tracks.%20Using%20this%20dataset%2C%20we%20conduct%20a%20systematic%20analysis%20that%20formalizes%20two%20perspectives%20of%20video%20DiTs%3A%20semantic%20grounding%2C%20via%20video-to-text%20attention%2C%20which%20evaluates%20whether%20noun%20and%20verb%20tokens%20capture%20instances%20and%20their%20relations%3B%20and%20semantic%20propagation%2C%20via%20video-to-video%20attention%2C%20which%20assesses%20whether%20instance%20bindings%20persist%20across%20frames.%20We%20find%20both%20effects%20concentrate%20in%20a%20small%20subset%20of%20interaction-dominant%20layers.%20Motivated%20by%20this%2C%20we%20introduce%20MATRIX%2C%20a%20simple%20and%20effective%20regularization%20that%20aligns%20attention%20in%20specific%20layers%20of%20video%20DiTs%20with%20multi-instance%20mask%20tracks%20from%20the%20MATRIX-11K%20dataset%2C%20enhancing%20both%20grounding%20and%20propagation.%20We%20further%20propose%20InterGenEval%2C%20an%20evaluation%20protocol%20for%20interaction-aware%20video%20generation.%20In%20experiments%2C%20MATRIX%20improves%20both%20interaction%20fidelity%20and%20semantic%20alignment%20while%20reducing%20drift%20and%20hallucination.%20Extensive%20ablations%20validate%20our%20design%20choices.%20Codes%20and%20weights%20will%20be%20released.%0ALink%3A%20http%3A//arxiv.org/abs/2510.07310v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMATRIX%253A%2520Mask%2520Track%2520Alignment%2520for%2520Interaction-aware%2520Video%2520Generation%26entry.906535625%3DSiyoon%2520Jin%2520and%2520Seongchan%2520Kim%2520and%2520Dahyun%2520Chung%2520and%2520Jaeho%2520Lee%2520and%2520Hyunwook%2520Choi%2520and%2520Jisu%2520Nam%2520and%2520Jiyoung%2520Kim%2520and%2520Seungryong%2520Kim%26entry.1292438233%3DVideo%2520DiTs%2520have%2520advanced%2520video%2520generation%252C%2520yet%2520they%2520still%2520struggle%2520to%2520model%2520multi-instance%2520or%2520subject-object%2520interactions.%2520This%2520raises%2520a%2520key%2520question%253A%2520How%2520do%2520these%2520models%2520internally%2520represent%2520interactions%253F%2520To%2520answer%2520this%252C%2520we%2520curate%2520MATRIX-11K%252C%2520a%2520video%2520dataset%2520with%2520interaction-aware%2520captions%2520and%2520multi-instance%2520mask%2520tracks.%2520Using%2520this%2520dataset%252C%2520we%2520conduct%2520a%2520systematic%2520analysis%2520that%2520formalizes%2520two%2520perspectives%2520of%2520video%2520DiTs%253A%2520semantic%2520grounding%252C%2520via%2520video-to-text%2520attention%252C%2520which%2520evaluates%2520whether%2520noun%2520and%2520verb%2520tokens%2520capture%2520instances%2520and%2520their%2520relations%253B%2520and%2520semantic%2520propagation%252C%2520via%2520video-to-video%2520attention%252C%2520which%2520assesses%2520whether%2520instance%2520bindings%2520persist%2520across%2520frames.%2520We%2520find%2520both%2520effects%2520concentrate%2520in%2520a%2520small%2520subset%2520of%2520interaction-dominant%2520layers.%2520Motivated%2520by%25 {"title": "BulletGen: Improving 4D Reconstruction with Bullet-Time Generation", "author": "Denis Rozumny and Jonathon Luiten and Numair Khan and Johannes Sch\u00f6nberger and Peter Kontschieder", "abstract": "Transforming casually captured, monocular videos into fully immersive dynamic experiences is a highly ill-posed task, and comes with significant challenges, e.g., reconstructing unseen regions, and dealing with the ambiguity in monocular depth estimation. In this work we introduce BulletGen, an approach that takes advantage of generative models to correct errors and complete missing information in a Gaussian-based dynamic scene representation. This is done by aligning the output of a diffusion-based video generation model with the 4D reconstruction at a single frozen \"bullet-time\" step. The generated frames are then used to supervise the optimization of the 4D Gaussian model. Our method seamlessly blends generative content with both static and dynamic scene components, achieving state-of-the-art results on both novel-view synthesis, and 2D/3D tracking tasks.", "link": "http://arxiv.org/abs/2506.18601v2", "date": "2026-04-07", "relevancy": 2.4487, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6133}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6128}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6079}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BulletGen%3A%20Improving%204D%20Reconstruction%20with%20Bullet-Time%20Generation&body=Title%3A%20BulletGen%3A%20Improving%204D%20Reconstruction%20with%20Bullet-Time%20Generation%0AAuthor%3A%20Denis%20Rozumny%20and%20Jonathon%20Luiten%20and%20Numair%20Khan%20and%20Johannes%20Sch%C3%B6nberger%20and%20Peter%20Kontschieder%0AAbstract%3A%20Transforming%20casually%20captured%2C%20monocular%20videos%20into%20fully%20immersive%20dynamic%20experiences%20is%20a%20highly%20ill-posed%20task%2C%20and%20comes%20with%20significant%20challenges%2C%20e.g.%2C%20reconstructing%20unseen%20regions%2C%20and%20dealing%20with%20the%20ambiguity%20in%20monocular%20depth%20estimation.%20In%20this%20work%20we%20introduce%20BulletGen%2C%20an%20approach%20that%20takes%20advantage%20of%20generative%20models%20to%20correct%20errors%20and%20complete%20missing%20information%20in%20a%20Gaussian-based%20dynamic%20scene%20representation.%20This%20is%20done%20by%20aligning%20the%20output%20of%20a%20diffusion-based%20video%20generation%20model%20with%20the%204D%20reconstruction%20at%20a%20single%20frozen%20%22bullet-time%22%20step.%20The%20generated%20frames%20are%20then%20used%20to%20supervise%20the%20optimization%20of%20the%204D%20Gaussian%20model.%20Our%20method%20seamlessly%20blends%20generative%20content%20with%20both%20static%20and%20dynamic%20scene%20components%2C%20achieving%20state-of-the-art%20results%20on%20both%20novel-view%20synthesis%2C%20and%202D/3D%20tracking%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2506.18601v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBulletGen%253A%2520Improving%25204D%2520Reconstruction%2520with%2520Bullet-Time%2520Generation%26entry.906535625%3DDenis%2520Rozumny%2520and%2520Jonathon%2520Luiten%2520and%2520Numair%2520Khan%2520and%2520Johannes%2520Sch%25C3%25B6nberger%2520and%2520Peter%2520Kontschieder%26entry.1292438233%3DTransforming%2520casually%2520captured%252C%2520monocular%2520videos%2520into%2520fully%2520immersive%2520dynamic%2520experiences%2520is%2520a%2520highly%2520ill-posed%2520task%252C%2520and%2520comes%2520with%2520significant%2520challenges%252C%2520e.g.%252C%2520reconstructing%2520unseen%2520regions%252C%2520and%2520dealing%2520with%2520the%2520ambiguity {"title": "Controllable Image Generation with Composed Parallel Token Prediction", "author": "Jamie Stirling and Noura Al-Moubayed and Chris G. Willcocks and Hubert P. H. Shum", "abstract": "Conditional discrete generative models struggle to faithfully compose multiple input conditions. To address this, we derive a theoretically-grounded formulation for composing discrete probabilistic generative processes, with masked generation (absorbing diffusion) as a special case. Our formulation enables precise specification of novel combinations and numbers of input conditions that lie outside the training data, with concept weighting enabling emphasis or negation of individual conditions. In synergy with the richly compositional learned vocabulary of VQ-VAE and VQ-GAN, our method attains a $63.4\\%$ relative reduction in error rate compared to the previous state-of-the-art, averaged across 3 datasets (positional CLEVR, relational CLEVR and FFHQ), simultaneously obtaining an average absolute FID improvement of $-9.58$. Meanwhile, our method offers a $2.3\\times$ to $12\\times$ real-time speed-up over comparable methods, and is readily applied to an open pre-trained discrete text-to-image model for fine-grained control of text-to-image generation.", "link": "http://arxiv.org/abs/2405.06535v2", "date": "2026-04-07", "relevancy": 2.4475, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.6391}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6087}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6041}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Controllable%20Image%20Generation%20with%20Composed%20Parallel%20Token%20Prediction&body=Title%3A%20Controllable%20Image%20Generation%20with%20Composed%20Parallel%20Token%20Prediction%0AAuthor%3A%20Jamie%20Stirling%20and%20Noura%20Al-Moubayed%20and%20Chris%20G.%20Willcocks%20and%20Hubert%20P.%20H.%20Shum%0AAbstract%3A%20Conditional%20discrete%20generative%20models%20struggle%20to%20faithfully%20compose%20multiple%20input%20conditions.%20To%20address%20this%2C%20we%20derive%20a%20theoretically-grounded%20formulation%20for%20composing%20discrete%20probabilistic%20generative%20processes%2C%20with%20masked%20generation%20%28absorbing%20diffusion%29%20as%20a%20special%20case.%20Our%20formulation%20enables%20precise%20specification%20of%20novel%20combinations%20and%20numbers%20of%20input%20conditions%20that%20lie%20outside%20the%20training%20data%2C%20with%20concept%20weighting%20enabling%20emphasis%20or%20negation%20of%20individual%20conditions.%20In%20synergy%20with%20the%20richly%20compositional%20learned%20vocabulary%20of%20VQ-VAE%20and%20VQ-GAN%2C%20our%20method%20attains%20a%20%2463.4%5C%25%24%20relative%20reduction%20in%20error%20rate%20compared%20to%20the%20previous%20state-of-the-art%2C%20averaged%20across%203%20datasets%20%28positional%20CLEVR%2C%20relational%20CLEVR%20and%20FFHQ%29%2C%20simultaneously%20obtaining%20an%20average%20absolute%20FID%20improvement%20of%20%24-9.58%24.%20Meanwhile%2C%20our%20method%20offers%20a%20%242.3%5Ctimes%24%20to%20%2412%5Ctimes%24%20real-time%20speed-up%20over%20comparable%20methods%2C%20and%20is%20readily%20applied%20to%20an%20open%20pre-trained%20discrete%20text-to-image%20model%20for%20fine-grained%20control%20of%20text-to-image%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2405.06535v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DControllable%2520Image%2520Generation%2520with%2520Composed%2520Parallel%2520Token%2520Prediction%26entry.906535625%3DJamie%2520Stirling%2520and%2520Noura%2520Al-Moubayed%2520and%2520Chris%2520G.%2520Willcocks%2520and%2520Hubert%25 {"title": "GraspSense: Physically Grounded Grasp and Grip Planning for a Dexterous Robotic Hand via Language-Guided Perception and Force Maps", "author": "Elizaveta Semenyakina and Ivan Snegirev and Mariya Lezina and Miguel Altamirano Cabrera and Safina Gulyamova and Dzmitry Tsetserukou", "abstract": "Dexterous robotic manipulation requires more than geometrically valid grasps: it demands physically grounded contact strategies that account for the spatially non-uniform mechanical properties of the object. However, existing grasp planners typically treat the surface as structurally homogeneous, even though contact in a weak region can damage the object despite a geometrically perfect grasp. We present a pipeline for grasp selection and force regulation in a five-fingered robotic hand, based on a map of locally admissible contact loads. From an operator command, the system identifies the target object, reconstructs its 3D geometry using SAM3D, and imports the model into Isaac Sim. A physics-informed geometric analysis then computes a force map that encodes the maximum lateral contact force admissible at each surface location without deformation. Grasp candidates are filtered by geometric validity and task-goal consistency. When multiple candidates are comparable under classical metrics, they are re-ranked using a force-map-aware criterion that favors grasps with contacts in mechanically admissible regions. An impedance controller scales the stiffness of each finger according to the locally admissible force at the contact point, enabling safe and reliable grasp execution. Validation on paper, plastic, and glass cups shows that the proposed approach consistently selects structurally stronger contact regions and keeps grip forces within safe bounds. In this way, the work reframes dexterous manipulation from a purely geometric problem into a physically grounded joint planning problem of grasp selection and grip execution for future humanoid systems.", "link": "http://arxiv.org/abs/2604.05697v1", "date": "2026-04-07", "relevancy": 2.4354, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6449}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5937}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5789}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GraspSense%3A%20Physically%20Grounded%20Grasp%20and%20Grip%20Planning%20for%20a%20Dexterous%20Robotic%20Hand%20via%20Language-Guided%20Perception%20and%20Force%20Maps&body=Title%3A%20GraspSense%3A%20Physically%20Grounded%20Grasp%20and%20Grip%20Planning%20for%20a%20Dexterous%20Robotic%20Hand%20via%20Language-Guided%20Perception%20and%20Force%20Maps%0AAuthor%3A%20Elizaveta%20Semenyakina%20and%20Ivan%20Snegirev%20and%20Mariya%20Lezina%20and%20Miguel%20Altamirano%20Cabrera%20and%20Safina%20Gulyamova%20and%20Dzmitry%20Tsetserukou%0AAbstract%3A%20Dexterous%20robotic%20manipulation%20requires%20more%20than%20geometrically%20valid%20grasps%3A%20it%20demands%20physically%20grounded%20contact%20strategies%20that%20account%20for%20the%20spatially%20non-uniform%20mechanical%20properties%20of%20the%20object.%20However%2C%20existing%20grasp%20planners%20typically%20treat%20the%20surface%20as%20structurally%20homogeneous%2C%20even%20though%20contact%20in%20a%20weak%20region%20can%20damage%20the%20object%20despite%20a%20geometrically%20perfect%20grasp.%20We%20present%20a%20pipeline%20for%20grasp%20selection%20and%20force%20regulation%20in%20a%20five-fingered%20robotic%20hand%2C%20based%20on%20a%20map%20of%20locally%20admissible%20contact%20loads.%20From%20an%20operator%20command%2C%20the%20system%20identifies%20the%20target%20object%2C%20reconstructs%20its%203D%20geometry%20using%20SAM3D%2C%20and%20imports%20the%20model%20into%20Isaac%20Sim.%20A%20physics-informed%20geometric%20analysis%20then%20computes%20a%20force%20map%20that%20encodes%20the%20maximum%20lateral%20contact%20force%20admissible%20at%20each%20surface%20location%20without%20deformation.%20Grasp%20candidates%20are%20filtered%20by%20geometric%20validity%20and%20task-goal%20consistency.%20When%20multiple%20candidates%20are%20comparable%20under%20classical%20metrics%2C%20they%20are%20re-ranked%20using%20a%20force-map-aware%20criterion%20that%20favors%20grasps%20with%20contacts%20in%20mechanically%20admissible%20regions.%20An%20impedance%20controller%20scales%20the%20stiffness%20of%20each%20finger%20according%20to%20the%20locally%20admissible%20force%20at%20the%20contact%20point%2C%20enabling%20safe%20and%20reliable%20grasp%20execution.%20Validation%20on%20paper%2C%20plastic%2C%20and%20glass%20cups%20shows%20that%20the%20proposed%20approach%20consistently%20selects%20structurally%20stronger%20contact%20regions%20and%20keeps%20grip%20forces%20within%20safe%20bounds.%20In%20this%20way%2C%20the%20work%20reframes%20dexterous%20manipulation%20from%20a%20purely%20geometric%20problem%20into%20a%20physically%20grounded%20joint%20planning%20problem%20of%20grasp%20selection%20and%20grip%20execution%20for%20future%20humanoid%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05697v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGraspSense%253A%2520Physically%2520Grounded%2520Grasp%2520and%2520Grip%2520Planning%2520for%2520a%2520Dexterous%2520Robotic%2520Hand%2520via%2520Language-Guided%2520Perception%2520and%2520Force%2520Maps%26entry.906535625%3DElizaveta%2520Semenyakina%2520and%2520Ivan%2520Snegirev%2520and%2520Mariya%2520Lezina%2520and%2520Miguel%2520Altamirano%2520Cabrera%2520and%2520Safina%2520Gulyamova%2520and%2520Dzmitry%2520Tsetserukou%26entry.1292438233%3DDexterous%2520robotic%2520 {"title": "How LLMs Follow Instructions: Skillful Coordination, Not a Universal Mechanism", "author": "Elisabetta Rocchetti and Alfio Ferrara", "abstract": "Instruction tuning is commonly assumed to endow language models with a domain-general ability to follow instructions, yet the underlying mechanism remains poorly understood. Does instruction-following rely on a universal mechanism or compositional skill deployment? We investigate this through diagnostic probing across nine diverse tasks in three instruction-tuned models.\n  Our analysis provides converging evidence against a universal mechanism. First, general probes trained across all tasks consistently underperform task-specific specialists, indicating limited representational sharing. Second, cross-task transfer is weak and clustered by skill similarity. Third, causal ablation reveals sparse asymmetric dependencies rather than shared representations. Tasks also stratify by complexity across layers, with structural constraints emerging early and semantic tasks emerging late. Finally, temporal analysis shows constraint satisfaction operates as dynamic monitoring during generation rather than pre-generation planning.\n  These findings indicate that instruction-following is better characterized as skillful coordination of diverse linguistic capabilities rather than deployment of a single abstract constraint-checking process.", "link": "http://arxiv.org/abs/2604.06015v1", "date": "2026-04-07", "relevancy": 2.4235, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.496}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.496}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4621}], "mailto": "mailto:haoxiang.li.2

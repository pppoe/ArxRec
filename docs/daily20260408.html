illful%2520coordination%2520of%2520diverse%2520linguistic%2520capabilities%2520rather%2520than%2520deployment%2520of%2520a%2520single%2520abstract%2520constraint-checking%2520process.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.06015v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=How%20LLMs%20Follow%20Instructions%3A%20Skillful%20Coordination%2C%20Not%20a%20Universal%20Mechanism&entry.906535625=Elisabetta%20Rocchetti%20and%20Alfio%20Ferrara&entry.1292438233=Instruction%20tuning%20is%20commonly%20assumed%20to%20endow%20language%20models%20with%20a%20domain-general%20ability%20to%20follow%20instructions%2C%20yet%20the%20underlying%20mechanism%20remains%20poorly%20understood.%20Does%20instruction-following%20rely%20on%20a%20universal%20mechanism%20or%20compositional%20skill%20deployment%3F%20We%20investigate%20this%20through%20diagnostic%20probing%20across%20nine%20diverse%20tasks%20in%20three%20instruction-tuned%20models.%0A%20%20Our%20analysis%20provides%20converging%20evidence%20against%20a%20universal%20mechanism.%20First%2C%20general%20probes%20trained%20across%20all%20tasks%20consistently%20underperform%20task-specific%20specialists%2C%20indicating%20limited%20representational%20sharing.%20Second%2C%20cross-task%20transfer%20is%20weak%20and%20clustered%20by%20skill%20similarity.%20Third%2C%20causal%20ablation%20reveals%20sparse%20asymmetric%20dependencies%20rather%20than%20shared%20representations.%20Tasks%20also%20stratify%20by%20complexity%20across%20layers%2C%20with%20structural%20constraints%20emerging%20early%20and%20semantic%20tasks%20emerging%20late.%20Finally%2C%20temporal%20analysis%20shows%20constraint%20satisfaction%20operates%20as%20dynamic%20monitoring%20during%20generation%20rather%20than%20pre-generation%20planning.%0A%20%20These%20findings%20indicate%20that%20instruction-following%20is%20better%20characterized%20as%20skillful%20coordination%20of%20diverse%20linguistic%20capabilities%20rather%20than%20deployment%20of%20a%20single%20abstract%20constraint-checking%20process.&entry.1838667208=http%3A//arxiv.org/abs/2604.06015v1&entry.124074799=Read"},
{"title": "LLM4CodeRE: Generative AI for Code Decompilation Analysis and Reverse Engineering", "author": "Hamed Jelodar and Samita Bai and Tochukwu Emmanuel Nwankwo and Parisa Hamedi and Mohammad Meymani and Roozbeh Razavi-Far and Ali A. Ghorbani", "abstract": "Code decompilation analysis is a fundamental yet challenging task in malware reverse engineering, particularly due to the pervasive use of sophisticated obfuscation techniques. Although recent large language models (LLMs) have shown promise in translating low-level representations into high-level source code, most existing approaches rely on generic code pretraining and lack adaptation to malicious software. We propose LLM4CodeRE, a domain-adaptive LLM framework for bidirectional code reverse engineering that supports both assembly-to-source decompilation and source-to-assembly translation within a unified model. To enable effective task adaptation, we introduce two complementary fine-tuning strategies: (i) a Multi-Adapter approach for task-specific syntactic and semantic alignment, and (ii) a Seq2Seq Unified approach using task-conditioned prefixes to enforce end-to-end generation constraints. Experimental results demonstrate that LLM4CodeRE outperforms existing decompilation tools and general-purpose code models, achieving robust bidirectional generalization.", "link": "http://arxiv.org/abs/2604.06095v1", "date": "2026-04-07", "relevancy": 2.4232, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4885}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4885}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.477}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LLM4CodeRE%3A%20Generative%20AI%20for%20Code%20Decompilation%20Analysis%20and%20Reverse%20Engineering&body=Title%3A%20LLM4CodeRE%3A%20Generative%20AI%20for%20Code%20Decompilation%20Analysis%20and%20Reverse%20Engineering%0AAuthor%3A%20Hamed%20Jelodar%20and%20Samita%20Bai%20and%20Tochukwu%20Emmanuel%20Nwankwo%20and%20Parisa%20Hamedi%20and%20Mohammad%20Meymani%20and%20Roozbeh%20Razavi-Far%20and%20Ali%20A.%20Ghorbani%0AAbstract%3A%20Code%20decompilation%20analysis%20is%20a%20fundamental%20yet%20challenging%20task%20in%20malware%20reverse%20engineering%2C%20particularly%20due%20to%20the%20pervasive%20use%20of%20sophisticated%20obfuscation%20techniques.%20Although%20recent%20large%20language%20models%20%28LLMs%29%20have%20shown%20promise%20in%20translating%20low-level%20representations%20into%20high-level%20source%20code%2C%20most%20existing%20approaches%20rely%20on%20generic%20code%20pretraining%20and%20lack%20adaptation%20to%20malicious%20software.%20We%20propose%20LLM4CodeRE%2C%20a%20domain-adaptive%20LLM%20framework%20for%20bidirectional%20code%20reverse%20engineering%20that%20supports%20both%20assembly-to-source%20decompilation%20and%20source-to-assembly%20translation%20within%20a%20unified%20model.%20To%20enable%20effective%20task%20adaptation%2C%20we%20introduce%20two%20complementary%20fine-tuning%20strategies%3A%20%28i%29%20a%20Multi-Adapter%20approach%20for%20task-specific%20syntactic%20and%20semantic%20alignment%2C%20and%20%28ii%29%20a%20Seq2Seq%20Unified%20approach%20using%20task-conditioned%20prefixes%20to%20enforce%20end-to-end%20generation%20constraints.%20Experimental%20results%20demonstrate%20that%20LLM4CodeRE%20outperforms%20existing%20decompilation%20tools%20and%20general-purpose%20code%20models%2C%20achieving%20robust%20bidirectional%20generalization.%0ALink%3A%20http%3A//arxiv.org/abs/2604.06095v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLLM4CodeRE%253A%2520Generative%2520AI%2520f {"title": "Hackers or Hallucinators? A Comprehensive Analysis of LLM-Based Automated Penetration Testing", "author": "Jiaren Peng and Zeqin Li and Chang You and Yan Wang and Hanlin Sun and Xuan Tian and Shuqiao Zhang and Junyi Liu and Jianguo Zhao and Renyang Liu and Haoran Ou and Yuqiang Sun and Jiancheng Zhang and Yutong Jiao and Kunshu Song and Chao Zhang and Fan Shi and Hongda Sun and Rui Yan and Cheng Huang", "abstract": "The rapid advancement of Large Language Models (LLMs) has created new opportunities for Automated Penetration Testing (AutoPT), spawning numerous frameworks aimed at achieving end-to-end autonomous attacks. However, despite the proliferation of related studies, existing research generally lacks systematic architectural analysis and large-scale empirical comparisons under a unified benchmark. Therefore, this paper presents the first Systematization of Knowledge (SoK) focusing on the architectural design and comprehensive empirical evaluation of current LLM-based AutoPT frameworks. At systematization level, we comprehensively review existing framework designs across six dimensions: agent architecture, agent plan, agent memory, agent execution, external knowledge, and benchmarks. At empirical level, we conduct large-scale experiments on 13 representative open-source AutoPT frameworks and 2 baseline frameworks utilizing a unified benchmark. The experiments consumed over 10 billion tokens in total and generated more than 1,500 execution logs, which were manually reviewed and analyzed over four months by a panel of more than 15 researchers with expertise in cybersecurity. By investigating the latest progress in this rapidly developing field, we provide researchers with a structured taxonomy to understand existing LLM-based AutoPT frameworks and a large-scale empirical benchmark, along with promising directions for future research.", "link": "http://arxiv.org/abs/2604.05719v1", "date": "2026-04-07", "relevancy": 2.4006, "topK": [{"title": "Lexicon3D: {"title": "Incident-Guided Spatiotemporal Traffic Forecasting", "author": "Lixiang Fan and Bohao Li and Tao Zou and Junchen Ye and Bowen Du", "abstract": "Recent years have witnessed the rapid development of deep-learning-based, graph-neural-network-based forecasting methods for modern intelligent transportation systems. However, most existing work focuses exclusively on capturing spatio-temporal dependencies from historical traffic data, while overlooking the fact that suddenly occurring transportation incidents, such as traffic accidents and adverse weather, serve as external disturbances that can substantially alter temporal patterns. We argue that this issue has become a major obstacle to modeling the dynamics of traffic systems and improving prediction accuracy, but the unpredictability of incidents makes it difficult to observe patterns from historical sequences. To address these challenges, this paper proposes a novel framework named the Incident-Guided Spatiotemporal Graph Neural Network (IGSTGNN). IGSTGNN explicitly models the incident's impact through two core components: an Incident-Context Spatial Fusion (ICSF) module to capture the initial heterogeneous spatial influence, and a Temporal Incident Impact Decay (TIID) module to model the subsequent dynamic dissipation. To facilitate research on the spatio-temporal impact of incidents on traffic flow, a large-scale dataset is constructed and released, featuring incident records that are time-aligned with traffic time series. On this new benchmark, the proposed IGSTGNN framework is demonstrated to achieve state-of-the-art performance. Furthermore, the generalizability of the ICSF and TIID modules is validated by integrating them into various existing models.", "link": "http://arxiv.org/abs/2602.02528v2", "date": "2026-04-07", "relevancy": 2.3958, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5059}, {"title": "RTG-SLAM: 20Impact%20Decay%20%28TIID%29%20module%20to%20model%20the%20subsequent%20dynamic%20dissipation.%20To%20facilitate%20research%20on%20the%20spatio-temporal%20impact%20of%20incidents%20on%20traffic%20flow%2C%20a%20large-scale%20dataset%20is%20constructed%20and%20released%2C%20featuring%20incident%20records%20that%20are%20time-aligned%20with%20traffic%20time%20series.%20On%20this%20new%20benchmark%2C%20the%20proposed%20IGSTGNN%20framework%20is%20demonstrated%20to%20achieve%20state-of-the-art%20performance.%20Furthermore%2C%20the%20generalizability%20of%20the%20ICSF%20and%20TIID%20modules%20is%20validated%20by%20integrating%20them%20into%20various%20existing%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2602.02528v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIncident-Guided%2520Spatiotemporal%2520Traffic%2520Forecasting%26entry.906535625%3DLixiang%2520Fan%2520and%2520Bohao%2520Li%2520and%2520Tao%2520Zou%2520and%2520Junchen%2520Ye%2520and%2520Bowen%2520Du%26entry.1292438233%3DRecent%2520years%2520have%2520witnessed%2520the%2520rapid%2520development%2520of%2520deep-learning-based%252C%2520graph-neural-network-based%2520forecasting%2520methods%2520for%2520modern%2520intelligent%2520transportation%2520systems.%2520However%252C%2520most%2520existing%2520work%2520focuses%2520exclusively%2520on%2520capturing%2520spatio-temporal%2520dependencies%2520from%2520historical%2520traffic%2520data%252C%2520while%2520overlooking%2520the%2520fact%2520that%2520suddenly%2520occurring%2520transportation%2520incidents%252C%2520such%2520as%2520traffic%2520accidents%2520and%2520adverse%2520weather%252C%2520serve%2520as%2520external%2520disturbances%2520that%2520can%2520substantially%2520alter%2520temporal%2520patterns.%2520We%2520argue%2520that%2520this%2520issue%2520has%2520become%2520a%2520major%2520obstacle%2520to%2520modeling%2520the%2520dynamics%2520of%2520traffic%2520systems%2520and%2520improving%25 {"title": "Expectation Maximization (EM) Converges for General Agnostic Mixtures", "author": "Avishek Ghosh", "abstract": "Mixture of linear regression is well studied in statistics and machine learning, where the data points are generated probabilistically using $k$ linear models. Algorithms like Expectation Maximization (EM) may be used to recover the ground truth regressors for this problem. Recently, in \\cite{pal2022learning,ghosh_agnostic} the mixed linear regression problem is studied in the agnostic setting, where no generative model on data is assumed. Rather, given a set of data points, the objective is \\emph{fit} $k$ lines by minimizing a suitable loss function. It is shown that a modification of EM, namely gradient EM converges exponentially to appropriately defined loss minimizer even in the agnostic setting.\n  In this paper, we study the problem of \\emph{fitting} $k$ parametric functions to given set of data points. We adhere to the agnostic setup. However, instead of fitting lines equipped with quadratic loss, we consider any arbitrary parametric function fitting equipped with a strongly convex and smooth loss. This framework encompasses a large class of problems including mixed linear regression (regularized), mixed linear classifiers (mixed logistic regression, mixed Support Vector Machines) and mixed generalized linear regression. We propose and analyze gradient EM for this problem and show that with proper initialization and separation condition, the iterates of gradient EM converge exponentially to appropriately defined population loss minimizers with high probability. This shows the effectiveness of EM type algorithm which converges to \\emph{optimal} solution in the non-generative setup beyond mixture of linear regression.", "link": "http://arxiv.org/abs/2604.05842v1", "date": "2026-04-07", "relevancy": 2.3836, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4859}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4792}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.465}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Expectation%20Maximization%20%28EM%29%20Converges%20for%20General%20Agnostic%20Mixtures&body=Title%3A%20Expectation%20Maximization%20%28EM%29%20Converges%20for%20General%20Agnostic%20Mixtures%0AAuthor%3A%20Avishek%20Ghosh%0AAbstract%3A%20Mixture%20of%20linear%20regression%20is%20well%20studied%20in%20statistics%20and%20machine%20learning%2C%20where%20the%20data%20points%20are%20generated%20probabilistically%20using%20%24k%24%20linear%20models.%20Algorithms%20like%20Expectation%20Maximization%20%28EM%29%20may%20be%20used%20to%20recover%20the%20ground%20truth%20regressors%20for%20this%20problem.%20Recently%2C%20in%20%5Ccite%7Bpal2022learning%2Cghosh_agnostic%7D%20the%20mixed%20linear%20regression%20problem%20is%20studied%20in%20the%20agnostic%20setting%2C%20where%20no%20generative%20model%20on%20data%20is%20assumed.%20Rather%2C%20given%20a%20set%20of%20data%20points%2C%20the%20objective%20is%20%5Cemph%7Bfit%7D%20%24k%24%20lines%20by%20minimizing%20a%20suitable%20loss%20function.%20It%20is%20shown%20that%20a%20modification%20of%20EM%2C%20namely%20gradient%20EM%20converges%20exponentially%20to%20appropriately%20defined%20loss%20minimizer%20even%20in%20the%20agnostic%20setting.%0A%20%20In%20this%20paper%2C%20we%20study%20the%20problem%20of%20%5Cemph%7Bfitting%7D%20%24k%24%20parametric%20functions%20to%20given%20set%20of%20data%20points.%20We%20adhere%20to%20the%20agnostic%20setup.%20However%2C%20instead%20of%20fitting%20lines%20equipped%20with%20quadratic%20loss%2C%20we%20consider%20any%20arbitrary%20parametric%20function%20fitting%20equipped%20with%20a%20strongly%20convex%20and%20smooth%20loss.%20This%20framework%20encompasses%20a%20large%20class%20of%20problems%20including%20mixed%20linear%20regression%20%28regularized%29%2C%20mixed%20linear%20classifiers%20%28mixed%20logistic%20regression%2C%20mixed%20Support%20Vector%20Machines%29%20and%20mixed%20generalized%20linear%20regression.%20We%20propose%20and%20analyze%20gradient%20EM%20for%20this%20problem%20and%20show%20that%20with%20proper%20initialization%20and%20separation%20condition%2C%20the%20iterates%20of%20gradient%20EM%20converge%20exponentially%20to%20appropriately%20defined%20population%20loss%20minimizers%20with%20high%20probability.%20This%20shows%20the%20effectiveness%20of%20EM%20type%20algorithm%20which%20converges%20to%20%5Cemph%7Boptimal%7D%20solution%20in%20the%20non-generative%20setup%20beyond%20mixture%20of%20linear%20regression.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05842v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DExpectation%2520Maximization%2520%2528EM%2529%2520Converges%2520for%2520General%2520Agnostic%2520Mixtures%26entry.906535625%3DAvishek%2520Ghosh%26entry.1292438233%3DMixture%2520of%2520linear%2520regression%2520is%2520well%2520studied%2520in%2520statistics%2520and%2520machine%2520learning%252C%2520where%2520the%2520data%2520points%2520are%2520generated%2520probabilistically%2520using%2520%2524k%2524%2520linear%2520models.%2520Algorithms%2520like%2520Expectation%2520Maximization%2520%2528EM%2529%2520may%2520be%2520used%2520to%2520recover%2520the%2520ground%2520truth%2520regressors%2520for%2520this%2520problem.%2520Recently%252C%2520in%2520%255Ccite%257Bpal2022learning%252Cghosh_agnostic%257D%2520the%2520mixed%2520linear%2520regression%2520problem%2520is%2520studied%2520in%2520the%2520agnostic%2520setting%252C%2520where%2520no% ion%2C%20mixed%20Support%20Vector%20Machines%29%20and%20mixed%20generalized%20linear%20regression.%20We%20propose%20and%20analyze%20gradient%20EM%20for%20this%20problem%20and%20show%20that%20with%20proper%20initialization%20and%20separation%20condition%2C%20the%20iterates%20of%20gradient%20EM%20converge%20exponentially%20to%20appropriately%20defined%20population%20loss%20minimizers%20with%20high%20probability.%20This%20shows%20the%20effectiveness%20of%20EM%20type%20algorithm%20which%20converges%20to%20%5Cemph%7Boptimal%7D%20solution%20in%20the%20non-generative%20setup%20beyond%20mixture%20of%20linear%20regression.&entry.1838667208=http%3A//arxiv.org/abs/2604.05842v1&entry.124074799=Read"},
{"title": "PoM: A Linear-Time Replacement for Attention with the Polynomial Mixer", "author": "David Picard and Nicolas Dufour and Lucas Degeorge and Arijit Ghosh and Davide Allegro and Tom Ravaud and Yohann Perron and Corentin Sautier and Zeynep Sonat Baltaci and Fei Meng and Syrine Kalleli and Marta L\u00f3pez-Rauhut and Thibaut Loiseau and S\u00e9gol\u00e8ne Albouy and Raphael Baena and Elliot Vincent and Loic Landrieu", "abstract": "This paper introduces the Polynomial Mixer (PoM), a novel token mixing mechanism with linear complexity that serves as a drop-in replacement for self-attention. PoM aggregates input tokens into a compact representation through a learned polynomial function, from which each token retrieves contextual information. We prove that PoM satisfies the contextual mapping property, ensuring that transformers equipped with PoM remain universal sequence-to-sequence approximators. We replace standard self-attention with PoM across five diverse domains: text generation, handwritten text recognition, image generation, 3D modeling, and Earth observation. PoM matches the performance of attention-based models while drastically reducing computational cost when working with long sequences. The code is available at https://github.com/davidpicard/pom.", "link": "http://arxiv.org/abs/2604.06129v1", "date": "2026-04-07", "relevancy": 2.3806, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.511}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4612}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4561}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PoM%3A%20A%20Linear-Time%20Replacement%20for%20Attention% {"title": "Sparsity-Aware Voxel Attention and Foreground Modulation for 3D Semantic Scene Completion", "author": "Yu Xue and Longjun Gao and Yuanqi Su and HaoAng Lu and Xiaoning Zhang", "abstract": "Monocular Semantic Scene Completion (SSC) aims to reconstruct complete 3D semantic scenes from a single RGB image, offering a cost-effective solution for autonomous driving and robotics. However, the inherently imbalanced nature of voxel distributions, where over 93% of voxels are empty and foreground classes are rare, poses significant challenges. Existing methods often suffer from redundant emphasis on uninformative voxels and poor generalization to long-tailed categories. To address these issues, we propose VoxSAMNet (Voxel Sparsity-Aware Modulation Network), a unified framework that explicitly models voxel sparsity and semantic imbalance. Our approach introduces: (1) a Dummy Shortcut for Feature Refinement (DSFR) module that bypasses empty voxels via a shared dummy node while refining occupied ones with deformable attention; and (2) a Foreground Modulation Strategy combining Foreground Dropout (FD) and Text-Guided Image Filter (TGIF) to alleviate overfitting and enhance class-relevant features. Extensive experiments on the public benchmarks SemanticKITTI and SSCBench-KITTI-360 demonstrate that VoxSAMNet achieves state-of-the-art performance, surpassing prior monocular and stereo baselines with mIoU scores of 18.2% and 20.2%, respectively. Our results highlight the importance of sparsity-aware and semantics-guided design for efficient and accurate 3D scene completion, offering a promising direction for future research.", "link": "http://arxiv.org/abs/2604.05780v1", "date": "2026-04-07", "relevancy": 2.379, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6008}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6008}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5647}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sparsity-Aware%20Voxel%20Attention%20and%20Foreground%20Modulation%20for%203D%20Semantic%20Scene%20Completion&body=Title%3A%20Sparsity-Aware%20Voxel%20Attention%20and%20Foreground%20Modulation%20for%203D%20Semantic%20Scene%20Completion%0AAuthor%3A%20Yu%20Xue%20and%20Longjun%20Gao%20and%20Yuanqi%20Su%20and%20HaoAng%20Lu%20and%20Xiaoning%20Zhang%0AAbstract%3A%20Monocular%20Semantic%20Scene%20Completion%20%28SSC%29%20aims%20to%20reconstruct%20complete%203D%20semantic%20scenes%20from%20a%20single%20RGB%20image%2C%20offering%20a%20cost-effective%20solution%20for%20autonomous%20driving%20and%20robotics.%20However%2C%20the%20inherently%20imbalanced%20nature%20of%20voxel%20distributions%2C%20where%20over%2093%25%20of%20voxels%20are%20empty%20and%20foreground%20classes%20are%20rare%2C%20poses%20significant%20challenges.%20Existing%20methods%20often%20suffer%20from%20redundant%20emphasis%20on%20uninformative%20voxels%20and%20poor%20generalization%20to%20long-tailed%20categories.%20To%20address%20these%20issues%2C%20we%20propose%20VoxSAMNet%20%28Voxel%20Sparsity-Aware%20Modulation%20Network%29%2C%20a%20unified%20framework%20that%20explicitly%20models%20voxel%20sparsity%20and%20semantic%20imbalance.%20Our%20approach%20introduces%3A%20%281%29%20a%20Dummy%20Shortcut%20for%20Feature%20Refinement%20%28DSFR%29%20module%20that%20bypasses%20empty%20voxels%20via%20a%20shared%20dummy%20node%20while%20refining%20occupied%20ones%20with%20deformable%20attention%3B%20and%20%282%29%20a%20Foreground%20Modulation%20Strategy%20combining%20Foreground%20Dropout%20%28FD%29%20and%20Text-Guided%20Image%20Filter%20%28TGIF%29%20to%20alleviate%20overfitting%20and%20enhance%20class-relevant%20features.%20Extensive%20experiments%20on%20the%20public%20benchmarks%20SemanticKITTI%20and%20SSCBench-KITTI-360%20demonstrate%20that%20VoxSAMNet%20achieves%20state-of-the-art%20performance%2C%20surpassing%20prior%20monocular%20and%20stereo%20baselines%20with%20mIoU%20scores%20of%2018.2%25%20and%2020.2%25%2C%20respectively.%20Our%20results%20highlight%20the%20importance%20of%20sparsity-aware%20and%20semantics-guided%20design%20for%20efficient%20and%20accurate%203D%20scene%20completion%2C%20offering%20a%20promising%20direction%20for%20future%20research.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05780v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSparsity-Aware%2520Voxel%2520Attention%2520and%2520Foreground%2520Modulation%2520for%25203D%2520Semantic%2520Scene%2520Completion%26entry.906535625%3DYu%2520Xue%2520and%2520Longjun%2520Gao%2520and%2520Yuanqi%2520Su%2520and%2520HaoAng%2520Lu%2520and%2520Xiaoning%2520Zhang%26entry.1292438233%3DMonocular%2520Semantic%2520Scene%2520Completion%2520%2528SSC%2529%2520aims%2520to%2520reconstruct%2520complete%25203D%2520semantic%2520scenes%2520from%2520a%2520single%2520RGB%2520image%252C%2520offering%2520a%2520cost-effective%2520solution%2520for%2520autonomous%2520driving%2520and%2520robotics.%2520However%252C%2520the%2520inherently%2520imbalanced%2520nature%2520of%2520voxel%2520distributions%252C%2520where%2520over%252093%2525%2520of%2520voxels%2520are%2520empty%2520and%2520foreground%2520classes%2520are%2520rare%252C%2520poses%2520significant%2520challenges.%2520Existing%2520methods%2520often%2520suffer%2520from%2520redundant%2520emphasis%2520on%2520uninformative%2520voxels%2520and%2520poor%2520generalization%2520to%2520long-tailed%2520categories.%2520To%2520address%2520these%2520issues%252C%2520we%2520propose%2520VoxSAMNet%2520%2528Voxel%2520Sparsity-Aware%2520Modulation%2520Network%2529%252C%2520a%2520unified%2520framework%2520that%2520explicitly%2520models%2520voxel% {"title": "A Scene is Worth a Thousand Features: Feed-Forward Camera Localization from a Collection of Image Features", "author": "Axel Barroso-Laguna and Tommaso Cavallari and Victor Adrian Prisacariu and Eric Brachmann", "abstract": "Visually localizing an image, i.e., estimating its camera pose, requires building a scene representation that serves as a visual map. The representation we choose has direct consequences towards the practicability of our system. Even when starting from mapping images with known camera poses, state-of-the-art approaches still require hours of mapping time in the worst case, and several minutes in the best. This work raises the question whether we can achieve competitive accuracy much faster. We introduce FastForward, a method that creates a map representation and relocalizes a query image on-the-fly in a single feed-forward pass. At the core, we represent multiple mapping images as a collection of features anchored in 3D space. FastForward utilizes these mapping features to predict image-to-scene correspondences for the query image, enabling the estimation of its camera pose. We couple FastForward with image retrieval and achieve state-of-the-art accuracy when compared to other approaches with minimal map preparation time. Furthermore, FastForward demonstrates robust generalization to unseen domains, including challenging large-scale outdoor environments.", "link": "http://arxiv.org/abs/2510.00978v2", "date": "2026-04-07", "relevancy": 2.3705, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6307}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6167}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": rge-scale%20outdoor%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2510.00978v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Scene%2520is%2520Worth%2520a%2520Thousand%2520Features%253A%2520Feed-Forward%2520Camera%2520Localization%2520from%2520a%2520Collection%2520of%2520Image%2520Features%26entry.906535625%3DAxel%2520Barroso-Laguna%2520and%2520Tommaso%2520Cavallari%2520and%2520Victor%2520Adrian%2520Prisacariu%2520and%2520Eric%2520Brachmann%26entry.1292438233%3DVisually%2520localizing%2520an%2520image%252C%2520i.e.%252C%2520estimating%2520its%2520camera%2520pose%252C%2520requires%2520building%2520a%2520scene%2520representation%2520that%2520serves%2520as%2520a%2520visual%2520map.%2520The%2520representation%2520we%2520choose%2520has%2520direct%2520consequences%2520towards%2520the%2520practicability%2520of%2520our%2520system.%2520Even%2520when%2520starting%2520from%2520mapping%2520images%2520with%2520known%2520camera%2520poses%252C%2520state-of-the-art%2520approaches%2520still%2520require%2520hours%2520of%2520mapping%2520time%2520in%2520the%2520worst%2520case%252C%2520and%2520several%2520minutes%2520in%2520the%2520best.%2520This%2520work%2520raises%2520the%2520question%2520whether%2520we%2520can%2520achieve%2520competitive%2520accuracy%2520much%2520faster.%2520We%2520introduce%2520FastForward%252C%2520a%2520method%2520that%2520creates%2520a%2520map%2520representation%2520and%2520relocalizes%2520a%2520query%2520image%2520on-the-fly%2520in%2520a%2520single%2520feed-forward%2520pass.%2520At%2520the%2520core%252C%2520we%2520represent%2520multiple%2520mapping%2520images%2520as%2520a%2520collection%2520of%2520features%2520anchored%2520in%25203D%2520space.%2520FastForward%2520utilizes%2520these%2520mapping%2520features%2520to%2520predict%2520image-to-scene%2520correspondences%2520for%2520the%2520query%2520image%252C%2520enabling%2520the%2520estimation%2520of%2520its%2520camera%2 {"title": "GLUE: Coordinating Pre-Trained Generative Models for System-Level Design", "author": "Tim Aebersold and Soheyl Massoudi and Mark D. Fuge", "abstract": "Engineering complex systems (aircraft, buildings, vehicles) requires coordinating geometric and performance couplings across subsystems. As generative models proliferate for specialized domains, a key research gap is how to coordinate frozen, pre-trained submodels to generate full-system designs that are feasible, diverse, and high-performing. We introduce GLUE, which orchestrates pre-trained, frozen generators while enforcing system-level feasibility, optimality, and diversity. Compatible models must be end-to-end differentiable with a smooth, well-behaved latent-to-output mapping. We propose and benchmark (i) data-driven GLUE models trained on pre-generated system-level designs and (ii) a data-free GLUE model trained on a differentiable geometry layer. On a UAV design problem with five coupling constraints, we find that data-driven approaches yield diverse, high-performing designs but require large datasets to satisfy constraints reliably. The data-free approach is competitive with Bayesian optimization and gradient-based optimization in performance and feasibility while training a full generative model in only ~10 min on an RTX 4090 GPU, requiring more than two orders of magnitude fewer geometry evaluations and FLOPs than the data-driven method. We identify equality constraint satisfaction as a key difficulty and remaining limitation, and ablate approaches that improve this for the data-free approach. As a first step toward scaling generative design to complex, real-world engineering systems, this work explores how unmodified, domain-informed submodels can be integrated into a modular generative workflow.", "link": "http://arxiv.org/abs/2512.19469v2", "date": "2026-04-07", "relevancy": 2.3608, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6205}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.6106}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5517}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GLUE%3A%20Coordinating%20Pre-Trained%20Generative%20Models%20for%20System-Level%20Design&body=Title%3A%20GLUE%3A%20Coordinating%20Pre-Trained%20Generative%20Models%20for%20System-Level%20Design%0AAuthor%3A%20Tim%20Aebersold%20and%20Soheyl%20Massoudi%20and%20Mark%20D.%20Fuge%0AAbstract%3A%20Engineering%20complex%20systems%20%28aircraft%2C%20buildings%2C%20vehicles%29%20requires%20coordinating%20geometric%20and%20performance%20couplings%20across%20subsystems.%20As%20generative%20models%20proliferate%20for%20specialized%20domains%2C%20a%20key%20research%20gap%20is%20how%20to%20coordinate%20frozen%2C%20pre-trained%20submodels%20to%20generate%20full-system%20designs%20that%20are%20feasible%2C%20diverse%2C%20and%20high-performing.%20We%20introduce%20GLUE%2C%20which%20orchestrates%20pre-trained%2C%20frozen%20generators%20while%20enforcing%20system-level%20feasibility%2C%20optimality%2C%20and%20diversity.%20Compatible%20models%20must%20be%20end-to-end%20differentiable%20with%20a%20smooth%2C%20well-behaved%20latent-to-output%20mapping.%20We%20propose%20and%20benchmark%20%28i%29%20data-driven%20GLUE%20models%20trained%20on%20pre-generated%20system-level%20designs%20and%20%28ii%29%20a%20data-free%20GLUE%20model%20trained%20on%20a%20differentiable%20geometry%20layer.%20On%20a%20UAV%20design%20problem%20with%20five%20coupling%20constraints%2C%20we%20find%20that%20data-driven%20approaches%20yield%20diverse%2C%20high-performing%20designs%20but%20require%20large%20datasets%20to%20satisfy%20constraints%20reliably.%20The%20data-free%20approach%20is%20competitive%20with%20Bayesian%20optimization%20and%20gradient-based%20optimization%20in%20performance%20and%20feasibility%20while%20training%20a%20full%20generative%20model%20in%20only%20~10%20min%20on%20an%20RTX%204090%20GPU%2C%20requiring%20more%20than%20two%20orders%20of%20magnitude%20fewer%20geometry%20evaluations%20and%20FLOPs%20than%20the%20data-driven%20method.%20We%20identify%20equality%20constraint%20satisfaction%20as%20a%20key%20difficulty%20and%20remaining%20limitation%2C%20and%20ablate%20approaches%20that%20improve%20this%20for%20the%20data-free%20approach.%20As%20a%20first%20step%20toward%20scaling%20generative%20design%20to%20complex%2C%20real-world%20engineering%20systems%2C%20this%20work%20explores%20how%20unmodified%2C%20domain-informed%20submodels%20can%20be%20integrated%20into%20a%20modular%20generative%20workflow.%0ALink%3A%20http%3A//arxiv.org/abs/2512.19469v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGLUE%253A%2520Coordinating%2520Pre-Trained%2520Generative%2520Models%2520for%2520System-Level%2520Design%26entry.906535625%3DTim%2520Aebersold%2520and%2520Soheyl%2520Massoudi%2520and%2520Mark%2520D.%2520Fuge%26entry.1292438233%3DEngineering%2520complex%2520systems%2520%2528aircraft%252C%2520buildings%252C%2520vehicles%2529%2520requires%2520coordinating%2520geometric%2520and%2520performance%2520couplings%2520across%2520subsystems.%2520As%2520generative%2520models%2520proliferate%2520for%2520specialized%2520domains%252C%2520a%2520key%2520research%2520gap%2520is%2520how%2520to%2520coordinate%2520frozen%252C%2520pre-trained%2520submodels%2520to%2520generate%2520full-system%2520designs%2520that%2520are%2520feasible%252C%2520diverse%252C%2520and%2520high-performing.%2520We%2520introduce%2520GLUE%252C%2520which%2520orchestrates%2520pre-trained%252C%2520frozen%2520generators%2520while%2520enforcing%2520system-level%2520feasibility%252C%2520optimality%252C%2520and%2520diversity.%2520Compatible%2520models%2520must%2520be%2520end-to-end%2520differenti {"title": "Ensemble-Based Dirichlet Modeling for Predictive Uncertainty and Selective Classification", "author": "Courtney Franzen and Farhad Pourkamali-Anaraki", "abstract": "Neural network classifiers trained with cross-entropy loss achieve strong predictive accuracy but lack the capability to provide inherent predictive uncertainty estimates, thus requiring external techniques to obtain these estimates. In addition, softmax scores for the true class can vary substantially across independent training runs, which limits the reliability of uncertainty-based decisions in downstream tasks. Evidential Deep Learning aims to address these limitations by producing uncertainty estimates in a single pass, but evidential training is highly sensitive to design choices including loss formulation, prior regularization, and activation functions. Therefore, this work introduces an alternative Dirichlet parameter estimation strategy by applying a method of moments estimator to ensembles of softmax outputs, with an optional maximum-likelihood refinement step. This ensemble-based construction decouples uncertainty estimation from the fragile evidential loss design while also mitigating the variability of single-run cross-entropy training, producing explicit Dirichlet predictive distributions. Across multiple datasets, we show that the improved stability and predictive uncertainty behavior of these ensemble-derived Dirichlet estimates translate into stronger performance in downstream uncertainty-guided applications such as prediction confidence scoring and selective classification.", "link": "http://arxiv.org/abs/2604.06032v1", "date": "2026-04-07", "relevancy": 2.3593, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.6097}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5968}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5749}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Ensemble-Based%20Dirichlet%20Modeling%20for%20Predictive%20Uncertainty%20and%20Selective%20Classification&body=Title%3A%20Ensemble-Based%20Dirichlet%20Modeling%20for%20Predictive%20Uncertainty%20and%20Selective%20Classification%0AAuthor%3A%20Courtney%20Franzen%20and%20Farhad%20Pourkamali-Anaraki%0AAbstract%3A%20Neural%20network%20classifiers%20trained%20with%20cross-entropy%20loss%20achieve%20strong%20predictive%20accuracy%20but%20lack%20the%20capability%20to%20provide%20inherent%20predictive%20uncertainty%20estimates%2C%20thus%20requiring%20external%20techniques%20to%20obtain%20these%20estimates.%20In%20addition%2C%20softmax%20scores%20for%20the%20true%20class%20can%20vary%20substantially%20across%20independent%20training%20runs%2C%20which%20limits%20the%20reliability%20of%20uncertainty-based%20decisions%20in%20downstream%20tasks.%20Evidential%20Deep%20Learning%20aims%20to%20address%20these%20limitations%20by%20producing%20uncertainty%20estimates%20in%20a%20single%20pass%2C%20but%20evidential%20training%20is%20highly%20sensitive%20to%20design%20choices%20including%20loss%20formulation%2C%20prior%20regularization%2C%20and%20activation%20functions.%20Therefore%2C%20this%20work%20introduces%20an%20alternative%20Dirichlet%20parameter%20estimation%20strategy%20by%20applying%20a%20method%20of%20moments%20estimator%20to%20ensembles%20of%20softmax%20outputs%2C%20with%20an%20optional%20maximum-likelihood%20refinement%20step.%20This%20ensemble-based%20construction%20decouples%20uncertainty%20estimation%20from%20the%20fragile%20evidential%20loss%20design%20while%20also%20mitigating%20the%20variability%20of%20single-run%20cross-entropy%20training%2C%20producing%20explicit%20Dirichlet%20predictive%20distributions.%20Across%20multiple%20datasets%2C%20we%20show%20that%20the%20improved%20stability%20and%20predictive%20uncertainty%20behavior%20of%20these%20ensemble-derived%20Dirichlet%20estimates%20translate%20into%20stronger%20performance%20in%20downstream%20uncertainty-guided%20applications%20such%20as%20prediction%20confidence%20scoring%20and%20selective%20classification.%0ALink%3A%20http%3A//arxiv.org/abs/2604.06032v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEnsemble-Based%2520Dirichlet%2520Modeling%2520for%2520Predictive%2520Uncertainty%2520and%2520Selective%2520Classification%26entry.906535625%3DCourtney%2520Franzen%2520and%2520Farhad%2520Pourkamali-Anaraki%26entry.1292438233%3DNeural%2520network%2520classifiers%2520trained%2520with%2520cross-entropy%2520loss%2520achieve%2520strong%2520predictive%2520accuracy%2520but%2520lack%2520the%2520capability%2520to%2520provide%2520inherent%2520predictive%2520uncertainty%2520estimates%252C%2520thus%2520requiring%2520external%2520techniques%2520to%2520obtain%2520these%2520estimates.%2520In%2520addition%252C%2520softmax%2520scores%2520for%2520the%2520true%2520class%2520can%2520vary%2520substantially%2520across%2520independent%2520training%2520runs%252C%2520which%2520limits%2520the%2520reliability%2520of%2520uncertainty-based%2520decisions%2520in%2520downstream%2520tasks.%2520Evidential%2520Deep%2520Learning%2520aims%2520to%2520address%2520these%2520limitations%2520by%2520producing%2520uncertainty%2520estimates%2520in%2520a%2520single%2520pass%252C%2520but%2520evidential%2520training%2520is%2520highly%2520sensitive%2520to%2520design%2520choices%2520including%2520loss%2520formulation%252C%2520prior%2520regularization%252C%2520and%2520activation%2520functions.%2520Therefore%252C%2520this%2520work%2520introduces%2520an%2520alternative%2520Dirichlet%2520parameter%2520estimation% {"title": "TRANSPORTER: Transferring Visual Semantics from VLM Manifolds", "author": "Alexandros Stergiou", "abstract": "How do video understanding models acquire their answers? Although current Vision Language Models (VLMs) reason over complex scenes with diverse objects, action performances, and scene dynamics, understanding and controlling their internal processes remains an open challenge. Motivated by recent advancements in text-to-video (T2V) generative models, this paper introduces a logits-to-video (L2V) task alongside a model-independent approach, TRANSPORTER, to generate videos that capture the underlying rules behind VLMs' predictions. Given the high-visual-fidelity produced by T2V models, TRANSPORTER learns an optimal transport coupling to VLM's high-semantic embedding spaces. In turn, logit scores define embedding directions for conditional video generation. TRANSPORTER generates videos that reflect caption changes over diverse object attributes, action adverbs, and scene context. Quantitative and qualitative evaluations across VLMs demonstrate that L2V can provide a fidelity-rich, novel direction for model interpretability that has not been previously explored.", "link": "http://arxiv.org/abs/2511.18359v2", "date": "2026-04-07", "relevancy": 2.3588, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5919}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5919}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5787}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TRANSPORTER%3A%20Transferring%20Visual%20Semantics%20from%20VLM%20Manifolds&body=Title%3A%20TRANSPORTER%3A%20Transferring%20Visual%20Semantics%20 {"title": "CAKE: Cloud Architecture Knowledge Evaluation of Large Language Models", "author": "Tim Lukas Adam and Phongsakon Mark Konrad and Riccardo Terrenzi and Florian Girardo Lukas and Rahime Yilmaz and Krzysztof Sierszecki and Serkan Ayvaz", "abstract": "In today's software architecture, large language models (LLMs) serve as software architecture co-pilots. However, no benchmark currently exists to evaluate large language models' actual understanding of cloud-native software architecture. For this reason we present a benchmark called CAKE, which consists of 188 expert-validated questions covering four cognitive levels of Bloom's revised taxonomy -- recall, analyze, design, and implement -- and five cloud-native topics. Evaluation is conducted on 22 model configurations (0.5B--70B parameters) across four LLM families, using three-run majority voting for multiple-choice questions (MCQs) and LLM-as-a-judge scoring for free-responses (FR). Based on this evaluation, four notable findings were identified. First, MCQ accuracy plateaus above 3B parameters, with the best model reaching 99.2\\%. Second, free-response scores scale steadily across all cognitive levels. Third, the two formats capture different facets of knowledge, as the MCQ accuracy approaches a ceiling while free-responses continue to differentiate models. Finally, reasoning augmentation (+think) improves free-response quality, while tool augmentation (+tool) degrades performance for small models. These results suggest that the evaluation format fundamentally shapes how we measure architectural knowledge in LLMs.", "link": "http://arxiv.org/abs/2604.05755v1", "date": "2026-04-07", "relevancy": 2.3547, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4919}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4919}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4291}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CAKE%3A%20Cloud%20Architecture%20Knowledge%20Evaluation%20of%20Large%20Language%20Models&body=Title%3A%20CAKE%3A%20Cloud%20Architecture%20Knowledge%20Evaluation%20of%20Large%20Language%20Models%0AAuthor%3A%20Tim%20Lukas%20Adam%20and%20Phongsakon%20Mark%20Konrad%20and%20Riccardo%20Terrenzi%20and%20Florian%20Girardo%20Lukas%20and%20Rahime%20Yilmaz%20and%20Krzysztof%20Sierszecki%20and%20Serkan%20Ayvaz%0AAbstract%3A%20In%20today%27s%20software%20architecture%2C%20large%20language%20models%20%28LLMs%29%20serve%20as%20software%20architecture%20co-pilots.%20However%2C%20no%20benchmark%20currently%20exists%20to%20evaluate%20large%20language%20models%27%20actual%20understanding%20of%20cloud-native%20software%20architecture.%20For%20this%20reason%20we%20present%20a%20benchmark%20called%20CAKE%2C%20which%20consists%20of%20188%20expert-validated%20questions%20covering%20four%20cognitive%20levels%20of%20Bloom%27s%20revised%20taxonomy%20--%20recall%2C%20analyze%2C%20design%2C%20and%20implement%20--%20and%20five%20cloud-native%20topics.%20Evaluation%20is%20conducted%20on%2022%20model%20configurations%20%280.5B--70B%20parameters%29%20across%20four%20LLM%20families%2C%20using%20three-run%20majority%20voting%20for%20multiple-choice%20questions%20%28MCQs%29%20and%20LLM-as-a-judge%20scoring%20for%20free-responses%20%28FR%29.%20Based%20on%20this%20evaluation%2C%20four%20notable%20findings%20were%20identified.%20First%2C%20MCQ%20accuracy%20plateaus%20above%203B%20parameters%2C%20with%20the%20best%20model%20reaching%2099.2%5C%25.%20Second%2C%20free-response%20scores%20scale%20steadily%20across%20all%20cognitive%20levels.%20Third%2C%20the%20two%20formats%20capture%20different%20facets%20of%20knowledge%2C%20as%20the%20MCQ%20accuracy%20approaches%20a%20ceiling%20while%20free-responses%20continue%20to%20differentiate%20models.%20Finally%2C%20reasoning%20augmentation%20%28%2Bthink%29%20improves%20free-response%20quality%2C%20while%20tool%20augmentation%20%28%2Btool%29%20degrades%20performance%20for%20small%20models.%20These%20results%20suggest%20that%20the%20evaluation%20format%20fundamentally%20shapes%20how%20we%20measure%20architectural%20knowledge%20in%20LLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05755v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCAKE%253A%2520Cloud%2520Architecture%2520Knowledge%2520Evaluation%2520of%2520Large%2520Language%2520Models%26entry.906535625%3DTim%2520Lukas%2520Adam%2520and%2520Phongsakon%2520Mark%2520Konrad%2520and%2520Riccardo%2520Terrenzi%2520and%2520Florian%2520Girardo%2520Lukas%2520and%2520Rahime%2520Yilmaz%2520and%2520Krzysztof%2520Sierszecki%2520and%2520Serkan%2520Ayvaz%26entry.1292438233%3DIn%2520today%2527s%2520software%2520architecture%252C%2520large%2520language%2520models%2520%2528LLMs%2529%2520serve%2520as%2520software%2520architecture%2520co-pilots.%2520However%252C%2520no%2520benchmark%2520currently%2520exists%2520to%2520evaluate%2520large%2520language%2520models%2527%2520actual%2520understanding%2520of%2520cloud-native%2520software%2520architecture.%2520For%2520this%2520reason%2520we%2520present%2520a%2520benchmark%2520called%2520CAKE%252C%2520which%2520consists%2520of%2520188%2520expert-validated%2520questions%2520covering%2520four%2520cognitive%2520levels%2520of%2520Bloom%2527s%2520revised%2520taxonomy%2520--%2520recall%252C%2520analyze%252C%2520design%252C%2520and%2520implement%2520--%2520and%2520five%2520cloud-native%2520topics.%2520Evaluation%2520is%2520conducted%2520on%252022%2520model%2520configurations%2520%25280.5B--70B%2520parameters%2529%2520across%2520four%2520LLM%2520families%252C%2520using%2520three-run%2520majority%2520voting%2520for%2520multiple-choice%2520questi {"title": "Evaluating Learner Representations for Differentiation Prior to Instructional Outcomes", "author": "Junsoo Park and Youssef Medhat and Htet Phyo Wai and Ploy Thajchayapong and Ashok K. Goel", "abstract": "Learner representations play a central role in educational AI systems, yet it is often unclear whether they preserve meaningful differences between students when instructional outcomes are unavailable or highly context-dependent. This work examines how to evaluate learner representations based on whether they retain separation between learners under a shared comparison rule. We introduce distinctiveness, a representation-level measure that evaluates how each learner differs from others in the cohort using pairwise distances, without requiring clustering, labels, or task-specific evaluation. Using student-authored questions collected through a conversational AI agent in an online learning environment, we compare representations based on individual questions with representations that aggregate patterns across a student's interactions over time. Results show that learner-level representations yield higher separation, stronger clustering structure, and more reliable pairwise discrimination than interaction-level representations. These findings demonstrate that learner representations can be evaluated independently of instructional outcomes and provide a practical pre-deployment criterion using distinctiveness as a diagnostic metric for assessing whether a representation supports differentiated modeling or personalization.", "link": "http://arxiv.org/abs/2604.05848v1", "date": "2026-04-07", "relevancy": 2.3516, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4772}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_ resentations.%20These%20findings%20demonstrate%20that%20learner%20representations%20can%20be%20evaluated%20independently%20of%20instructional%20outcomes%20and%20provide%20a%20practical%20pre-deployment%20criterion%20using%20distinctiveness%20as%20a%20diagnostic%20metric%20for%20assessing%20whether%20a%20representation%20supports%20differentiated%20modeling%20or%20personalization.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05848v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEvaluating%2520Learner%2520Representations%2520for%2520Differentiation%2520Prior%2520to%2520Instructional%2520Outcomes%26entry.906535625%3DJunsoo%2520Park%2520and%2520Youssef%2520Medhat%2520and%2520Htet%2520Phyo%2520Wai%2520and%2520Ploy%2520Thajchayapong%2520and%2520Ashok%2520K.%2520Goel%26entry.1292438233%3DLearner%2520representations%2520play%2520a%2520central%2520role%2520in%2520educational%2520AI%2520systems%252C%2520yet%2520it%2520is%2520often%2520unclear%2520whether%2520they%2520preserve%2520meaningful%2520differences%2520between%2520students%2520when%2520instructional%2520outcomes%2520are%2520unavailable%2520or%2520highly%2520context-dependent.%2520This%2520work%2520examines%2520how%2520to%2520evaluate%2520learner%2520representations%2520based%2520on%2520whether%2520they%2520retain%2520separation%2520between%2520learners%2520under%2520a%2520shared%2520comparison%2520rule.%2520We%2520introduce%2520distinctiveness%252C%2520a%2520representation-level%2520measure%2520that%2520evaluates%2520how%2520each%2520learner%2520differs%2520from%2520others%2520in%2520the%2520cohort%2520using%2520pairwise%2520distances%252C%2520without%2520requiring%2520clustering%252C%2520labels%252C%2520or%2520task-specific%2520evaluation.%2520Using%2520student-authored%2520questions%2520collected%2520through%2520a%2520conversational%2520AI%2520agent%2520in%2520an%2520online%2520learning%2520environment%252C%2520we%2520compare%2520rep {"title": "Matrix-game 2.0: An open-source real-time and streaming interactive world model", "author": "Xianglong He and Chunli Peng and Zexiang Liu and Boyang Wang and Yifan Zhang and Qi Cui and Fei Kang and Biao Jiang and Mengyin An and Yangyang Ren and Baixin Xu and Hao-Xiang Guo and Kaixiong Gong and Size Wu and Wei Li and Xuchen Song and Yang Liu and Yangguang Li and Yahui Zhou", "abstract": "Recent advances in interactive video generations have demonstrated diffusion model's potential as world models by capturing complex physical dynamics and interactive behaviors. However, existing interactive world models depend on bidirectional attention and lengthy inference steps, severely limiting real-time performance. Consequently, they are hard to simulate real-world dynamics, where outcomes must update instantaneously based on historical context and current actions. To address this, we present Matrix-Game 2.0, an interactive world model generates long videos on-the-fly via few-step auto-regressive diffusion. Our framework consists of three key components: (1) A scalable data production pipeline for Unreal Engine and GTA5 environments to effectively produce massive amounts (about 1200 hours) of video data with diverse interaction annotations; (2) An action injection module that enables frame-level mouse and keyboard inputs as interactive conditions; (3) A few-step distillation based on the casual architecture for real-time and streaming video generation. Matrix Game 2.0 can generate high-quality minute-level videos across diverse scenes at an ultra-fast speed of 25 FPS. We open-source our model weights and codebase to advance research in interactive world modeling.", "link": "http://arxiv.org/abs/2508.13009v4", "date": "2026-04-07", "relevancy": 2.3304, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5943}, {"title": "Genie: Generative Interactive Environments", "link": "htt {"title": "Frequency Matters: Fast Model-Agnostic Data Curation for Pruning and Quantization", "author": "Francesco Pio Monaco and Elia Cunegatti and Flavio Vella and Giovanni Iacca", "abstract": "Post-training model compression is essential for enhancing the portability of Large Language Models (LLMs) while preserving their performance. While several compression approaches have been proposed, less emphasis has been placed on selecting the most suitable set of data (the so-called \\emph{calibration data}) for finding the compressed model configuration. The choice of calibration data is a critical step in preserving model capabilities both intra- and inter-tasks. In this work, we address the challenge of identifying high-performance calibration sets for both pruning and quantization by analyzing intrinsic data properties rather than model-specific signals. We introduce \\texttt{\\textbf{ZipCal}}, a model-agnostic data curation strategy that maximizes lexical diversity based on Zipfian power laws. Experiments demonstrate that our method consistently outperforms standard uniform random sampling across various pruning benchmarks. Notably, it also performs on par, in terms of downstream performance, with a state-of-the-art method that relies on model perplexity. The latter becomes prohibitively expensive at large-scale models and datasets, while \\texttt{\\textbf{ZipCal}} is on average $\\sim$240$\\times$ faster due to its tractable linear complexity\\footnote{We make the code and the experiments available at https://github.com/FrancescoMonaco/ZipCal.}.", "link": "http://arxiv.org/abs/2603.16105v2", "date": "2026-04-07", "relevancy": 2.3148, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4672}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4608}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4608}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Frequency%20Matters%3A%20Fast%20Model-Agnostic%20Data%20Curation%20for%20Pruning%20and%20Quantization&body=Title%3A%20Frequency%20Matters%3A%20Fast%20Model-Agnostic%20Data%20Curation%20for%20Pruning%20and%20Quantization%0AAuthor%3A%20Francesco%20Pio%20Monaco%20and%20Elia%20Cunegatti%20and%20Flavio%20Vella%20and%20Giovanni%20Iacca%0AAbstract%3A%20Post-training%20model%20compression%20is%20essential%20for%20enhancing%20the%20portability%20of%20Large%20Language%20Models%20%28LLMs%29%20while%20preserving%20their%20performance.%20While%20several%20compression%20approaches%20have%20been%20proposed%2C%20less%20emphasis%20has%20been%20placed%20on%20selecting%20the%20most%20suitable%20set%20of%20data%20%28the%20so-called%20%5Cemph%7Bcalibration%20data%7D%29%20for%20finding%20the%20compressed%20model%20configuration.%20The%20choice%20of%20calibration%20data%20is%20a%20critical%20step%20in%20preserving%20model%20capabilities%20both%20intra-%20and%20inter-tasks.%20In%20this%20work%2C%20we%20address%20the%20challenge%20of%20identifying%20high-performance%20calibration%20sets%20for%20both%20pruning%20and%20quantization%20by%20analyzing%20intrinsic%20data%20properties%20rather%20than%20model-specific%20signals.%20We%20introduce%20%5Ctexttt%7B%5Ctextbf%7BZipCal%7D%7D%2C%20a%20model-agnostic%20data%20curation%20strategy%20that%20maximizes%20lexical%20diversity%20based%20on%20Zipfian%20power%20laws.%20Experiments%20demonstrate%20that%20our%20method%20consistently%20outperforms%20standard%20uniform%20random%20sampling%20across%20various%20pruning%20benchmarks.%20Notably%2C%20it%20also%20performs%20on%20par%2C%20in%20terms%20of%20downstream%20performance%2C%20with%20a%20state-of-the-art%20method%20that%20relies%20on%20model%20perplexity.%20The%20latter%20becomes%20prohibitively%20expensive%20at%20large-scale%20models%20and%20datasets%2C%20while%20%5Ctexttt%7B%5Ctextbf%7BZipCal%7D%7D%20is%20on%20average%20%24%5Csim%24240%24%5Ctimes%24%20faster%20due%20to%20its%20tractable%20linear%20complexity%5Cfootnote%7BWe%20make%20the%20code%20and%20the%20experiments%20available%20at%20https%3A//github.com/FrancescoMonaco/ZipCal.%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16105v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrequency%2520Matters%253A%2520Fast%2520Model-Agnostic%2520Data%2520Curation%2520for%2520Pruning%2520and%2520Quantization%26entry.906535625%3DFrancesco%2520Pio%2520Monaco%2520and%2520Elia%2520Cunegatti%2520and%2520Flavio%2520Vella%2520and%2520Giovanni%2520Iacca%26entry.1292438233%3DPost-training%2520model%2520compression%2520is%2520essential%2520for%2520enhancing%2520the%2520portability%2520of%2520Large%2520Language%2520Models%2520%2528LLMs%2529%2520while%2520preserving%2520their%2520performance.%2520While%2520several%2520compression%2520approaches%2520have%2520been%2520proposed%252C%2520less%2520emphasis%2520has%2520been%2520placed%2520on%2520selecting%2520the%2520most%2520suitable%2520set%2520of%2520data%2520%2528the%2520so-called%2520%255Cemph%257Bcalibration%2520data%257D%2529%2520for%2520finding%2520the%2520compressed%2520model%2520configuration.%2520The%2520choice%2520of%2520calibration%2520data%2520is%2520a%2520critical%2520step%2520in%2520preserving%2520model%2520capabilities%2520both%2520intra-%2520and%2520inter-tasks.%2520In%2520this%2520work%252C%2520we%2520address%2520the%2520challenge%2520of%2520identifying%2520high-performance%2520calibration%2520sets%2520for%2520both%2520pruning%2520and%2520quantization%2520by%2520analyzing%2520intrinsic%2520data%2520properties%2520rather%2520than%2520model-specific%2520signals.%2520We%2520introduce%2520%255Ctexttt%257B%255Ctextbf%257BZipCal%257D%257D%252C%2520a%2520model-agnostic%2520data%2520curation%2520strategy%2520that%2520maximizes%2520lexical%2520diversity%2520based%2520on%2520Zipfian%2520power%2520laws.%2520Experiments%2520demonstrate%2520that%2520our%2520method%2520consistently%2520outperforms%2520standard%2520uniform%2520random%2520sampling%2520across%2520various%2520pruning%2520benchmarks.%2520Notably%252C%2520it%2520also%2520performs%2520on%2520par%252C%2520in%2520terms%2520of%2520downstream%2520performance%252C%2520with%2520a%2520state-of-the-art%2520method%2520that%2520relies%2520on%2520model%2520perplexity.%2520The%2520latter%2520becomes%2520prohibitively%2520expensive%2520at%2520large-scale%2520models%2520and%2520datasets%252C%2520while%2520%255Ctexttt%257B%255Ctextbf%257BZipCal%257D%257D%2520is%2520on%2520average%2520%2524%255Csim%2524240%2524%255Ctimes%2524%2520faster%2520due%2520to%2520its%2520tractable%2520linear%2520complexity%255Cfootnote%257BWe%2520make%2520the%2520code%2520and%2520the%2520experiments%2520available%2520at%2520https%253A//github.com/FrancescoMonaco/ZipCal.%257D.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.16105v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Frequency%20Matters%3A%20Fast%20Model-Agnostic%20Data%20Curation%20for%20Pruning%20and%20Quantization&entry.906535625=Francesco%20Pio%20Monaco%20and%20Elia%20Cunegatti%20and%20Flavio%20Vella%20and%20Giovanni%20Iacca&entry.1292438233=Post-training%20model%20compression%20is%20essential%20for%20enhancing%20the%20portability%20of%20Large%20Language%20Models%20%28LLMs%29%20while%20preserving%20their%20performance.%20While%20several%20compression%20approaches%20have%20been%20proposed%2C%20less%20emphasis%20has%20been%20placed%20on%20selecting%20the%20most%20suitable%20set%20of%20data%20%28the%20so-called%20%5Cemph%7Bcalibration%20data%7D%29%20for%20finding%20the%20compressed%20model%20configuration.%20The%20choice%20of%20calibration%20data% {"title": "MoCHA: Denoising Caption Supervision for Motion-Text Retrieval", "author": "Nikolai Warner and Cameron Ethan Taylor and Irfan Essa and Apaar Sadhwani", "abstract": "Text-motion retrieval systems learn shared embedding spaces from motion-caption pairs via contrastive objectives. However, each caption is not a deterministic label but a sample from a distribution of valid descriptions: different annotators produce different text for the same motion, mixing motion-recoverable semantics (action type, body parts, directionality) with annotator-specific style and inferred context that cannot be determined from 3D joint coordinates alone. Standard contrastive training treats each caption as the single positive target, overlooking this distributional structure and inducing within-motion embedding variance that weakens alignment. We propose MoCHA, a text canonicalization framework that reduces this variance by projecting each caption onto its motion-recoverable content prior to encoding, producing tighter positive clusters and better-separated embeddings. Canonicalization is a general principle: even deterministic rule-based methods improve cross-dataset transfer, though learned canonicalizers provide substantially larger gains. We present two learned variants: an LLM-based approach (GPT-5.2) and a distilled FlanT5 model requiring no LLM at inference time. MoCHA operates as a preprocessing step compatible with any retrieval architecture. Applied to MoPa (MotionPatches), MoCHA sets a new state of the art on both HumanML3D (H) and KIT-ML (K): the LLM variant achieves 13.9% T2M R@1 on H (+3.1pp) and 24.3% on K (+10.3pp), while the LLM-free T5 variant achieves gains of +2.5pp and +8.1pp. Canonicalization reduces within-motion text-embedding variance by 11-19% and improves cross-dataset transfer substantially, with H to K improving by 94% and K to H by 52%, demonstrating that standardizing the language space yields more transferable motion-language representations.", "link": "http://arxiv.org/abs/2603.23684v2", "date": "2026-04-07", "relevancy": 2.3022, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5995}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5844}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5571}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MoCHA%3A%20Denoising%20Caption%20Supervision%20for%20Motion-Text%20Retrieval&body=Title%3A%20MoCHA%3A%20Denoising%20Caption%20Supervision%20for%20Motion-Text%20Retrieval%0AAuthor%3A%20Nikolai%20Warner%20and%20Cameron%20Ethan%20Taylor%20and%20Irfan%20Essa%20and%20Apaar%20Sadhwani%0AAbstract%3A%20Text-motion%20retrieval%20systems%20learn%20shared%20embedding%20spaces%20from%20motion-caption%20pairs%20via%20contrastive%20objectives.%20However%2C%20each%20caption%20is%20not%20a%20deterministic%20label%20but%20a%20sample%20from%20a%20distribution%20of%20valid%20descriptions%3A%20different%20annotators%20produce%20different%20text%20for%20the%20same%20motion%2C%20mixing%20motion-recoverable%20semantics%20%28action%20type%2C%20body%20parts%2C%20directionality%29%20with%20annotator-specific%20style%20and%20inferred%20context%20that%20cannot%20be%20determined%20from%203D%20joint%20coordinates%20alone.%20Standard%20contrastive%20training%20treats%20each%20caption%20as%20the%20single%20positive%20target%2C%20overlooking%20this%20distributional%20structure%20and%20inducing%20within-motion%20embedding%20variance%20that%20weakens%20alignment.%20We%20propose%20MoCHA%2C%20a%20text%20canonicalization%20framework%20that%20reduces%20this%20variance%20by%20projecting%20each%20caption%20onto%20its%20motion-recoverable%20content%20prior%20to%20encoding%2C%20producing%20tighter%20positive%20clusters%20and%20better-separated%20embeddings.%20Canonicalization%20is%20a%20general%20principle%3A%20even%20deterministic%20rule-based%20methods%20improve%20cross-dataset%20transfer%2C%20though%20learned%20canonicalizers%20provide%20substantially%20larger%20gains.%20We%20present%20two%20learned%20variants%3A%20an%20LLM-based%20approach%20%28GPT-5.2%29%20and%20a%20distilled%20FlanT5%20model%20requiring%20no%20LLM%20at%20inference%20time.%20MoCHA%20operates%20as%20a%20preprocessing%20step%20compatible%20with%20any%20retrieval%20architecture.%20Applied%20to%20MoPa%20%28MotionPatches%29%2C%20MoCHA%20sets%20a%20new%20state%20of%20the%20art%20on%20both%20HumanML3D%20%28H%29%20and%20KIT-ML%20%28K%29%3A%20the%20LLM%20variant%20achieves%2013.9%25%20T2M%20R%401%20on%20H%20%28%2B3.1pp%29%20and%2024.3%25%20on%20K%20%28%2B10.3pp%29%2C%20while%20the%20LLM-free%20T5%20variant%20achieves%20gains%20of%20%2B2.5pp%20and%20%2B8.1pp.%20Canonicalization%20reduces%20within-motion%20text-embedding%20variance%20by%2011-19%25%20and%20improves%20cross-dataset%20transfer%20substantially%2C%20with%20H%20to%20K%20improving%20by%2094%25%20and%20K%20to%20H%20by%2052%25%2C%20demonstrating%20that%20standardizing%20the%20language%20space%20yields%20more%20transferable%20motion-language%20representations.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23684v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMoCHA%253A%2520Denoising%2520Caption%2520Supervision%2520for%2520Motion-Text%2520Retrieval%26entry.906535625%3DNikolai%2520Warner%2520and%2520Cameron%2520Ethan%2520Taylor%2520and%2520Irfan%2520Essa%2520and%2520Apaar%2520Sadhwani%26entry.1292438233%3DText-motion%2520retrieval%2520systems%2520learn%2520shared%2520embedding%2520spaces%2520from%2520motion-caption%2520pairs%2520via%2520contrastive%2520objectives.%2520However%252C%2520each%2520caption%2520is%2520not%2520a%2520deterministic%2520label%2520but%2520a%2520sample%2520from {"title": "Selective Aggregation of Attention Maps Improves Diffusion-Based Visual Interpretation", "author": "Jungwon Park and Jungmin Ko and Dongnam Byun and Wonjong Rhee", "abstract": "Numerous studies on text-to-image (T2I) generative models have utilized cross-attention maps to boost application performance and interpret model behavior. However, the distinct characteristics of attention maps from different attention heads remain relatively underexplored. In this study, we show that selectively aggregating cross-attention maps from heads most relevant to a target concept can improve visual interpretability. Compared to the diffusion-based segmentation method DAAM, our approach achieves higher mean IoU scores. We also find that the most relevant heads capture concept-specific features more accurately than the least relevant ones, and that selective aggregation helps diagnose prompt misinterpretations. These findings suggest that attention head selection offers a promising direction for improving the interpretability and controllability of T2I generation.", "link": "http://arxiv.org/abs/2604.05906v1", "date": "2026-04-07", "relevancy": 2.3006, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6046}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5694}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5479}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Selective%20Aggregation%20of%20Attention%20Maps%20Improves%20Diffusion-Based%20Visual%20Interpretation&body=Title%3A%20Selective%20Aggregation%20of%20Attention%20Maps%20Improves%20Diffusion-Based%20Visual%20Interpretation%0AAuthor%3A%20Jungwon%20Park%20and%20Jungmin%20Ko%20and%20Dongnam%20Byun%20and%20Wonjon {"title": "Weight space Detection of Backdoors in LoRA Adapters", "author": "David Puertolas Merenciano and Ekaterina Vasyagina and Kevin Zhu and Javier Ferrando and Maheep Chaudhary", "abstract": "LoRA adapters let users fine-tune large language models (LLMs) efficiently. However, LoRA adapters are shared through open repositories like Hugging Face Hub \\citep{huggingface_hub_docs}, making them vulnerable to backdoor attacks. Current detection methods require running the model with test input data -- making them impractical for screening thousands of adapters where the trigger for backdoor behavior is unknown. We detect poisoned adapters by analyzing their weight matrices directly, without running the model -- making our method trigger-agnostic. For each attention projection (Q, K, V, O), our method extracts five spectral statistics from the low-rank update $\u0394W$, yielding a 20-dimensional signature for each adapter. A logistic regression detector trained on this representation separates benign and poisoned adapters across three model families -- Llama-3.2-3B~\\citep{llama3}, Qwen2.5-3B~\\citep{qwen25}, and Gemma-2-2B~\\citep{gemma2} -- on unseen test adapters drawn from instruction-following, reasoning, question-answering, code, and classification tasks. Across all three architectures, the detector achieves 100\\% accuracy.", "link": "http://arxiv.org/abs/2602.15195v3", "date": "2026-04-07", "relevancy": 2.2899, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4667}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4595}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4478}], "mailto": "mailto:haoxiang.li.2024@gmai 2520question-answering%252C%2520code%252C%2520and%2520classification%2520tasks.%2520Across%2520all%2520three%2520architectures%252C%2520the%2520detector%2520achieves%2520100%255C%2525%2520accuracy.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.15195v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Weight%20space%20Detection%20of%20Backdoors%20in%20LoRA%20Adapters&entry.906535625=David%20Puertolas%20Merenciano%20and%20Ekaterina%20Vasyagina%20and%20Kevin%20Zhu%20and%20Javier%20Ferrando%20and%20Maheep%20Chaudhary&entry.1292438233=LoRA%20adapters%20let%20users%20fine-tune%20large%20language%20models%20%28LLMs%29%20efficiently.%20However%2C%20LoRA%20adapters%20are%20shared%20through%20open%20repositories%20like%20Hugging%20Face%20Hub%20%5Ccitep%7Bhuggingface_hub_docs%7D%2C%20making%20them%20vulnerable%20to%20backdoor%20attacks.%20Current%20detection%20methods%20require%20running%20the%20model%20with%20test%20input%20data%20--%20making%20them%20impractical%20for%20screening%20thousands%20of%20adapters%20where%20the%20trigger%20for%20backdoor%20behavior%20is%20unknown.%20We%20detect%20poisoned%20adapters%20by%20analyzing%20their%20weight%20matrices%20directly%2C%20without%20running%20the%20model%20--%20making%20our%20method%20trigger-agnostic.%20For%20each%20attention%20projection%20%28Q%2C%20K%2C%20V%2C%20O%29%2C%20our%20method%20extracts%20five%20spectral%20statistics%20from%20the%20low-rank%20update%20%24%CE%94W%24%2C%20yielding%20a%2020-dimensional%20signature%20for%20each%20adapter.%20A%20logistic%20regression%20detector%20trained%20on%20this%20representation%20separates%20benign%20and%20poisoned%20adapters%20across%20three%20model%20families%20--%20Llama-3.2-3B~%5Ccitep%7Bllama3%7D%2C%20Qwen2.5-3B~%5Ccitep%7Bqwen25%7D%2C%20and%20Gemma-2-2B~%5Ccitep%7Bgemma2%7D%20--%20on%20unseen%20test%20adapters%20drawn%20from%20instruction-following%2C%20reasoning%2C%20que

-fidelity%20correspondences%2C%20traditional%20Structure-from-Motion%20%28SfM%29%20pipelines%20struggle%20to%20leverage%20them%2C%20as%20rigid%20track-building%20heuristics%20fail%20in%20the%20presence%20of%20their%20inherent%20noise.%20We%20present%20%5Ctextbf%7BProBA%20%28Probabilistic%20Bundle%20Adjustment%29%7D%2C%20a%20probabilistic%20re-parameterization%20of%20the%20BA%20manifold%20that%20enables%20joint%20optimization%20of%20extrinsics%2C%20focal%20lengths%2C%20and%20geometry%20from%20a%20strict%20cold%20start.%20By%20replacing%20fragile%20point%20tracks%20with%20a%20flexible%20kinematic%20pose%20graph%20and%20representing%20landmarks%20as%203D%20Gaussians%2C%20our%20framework%20explicitly%20models%20spatial%20uncertainty%20through%20a%20unified%20Negative%20Log-Likelihood%20%28NLL%29%20objective.%20This%20volumetric%20formulation%20smooths%20the%20non-convex%20optimization%20landscape%20and%20naturally%20weights%20correspondences%20by%20their%20statistical%20confidence.%20To%20maintain%20global%20consistency%2C%20we%20optimize%20over%20a%20sparse%20view%20graph%20using%20an%20iterative%2C%20adaptive%20edge-weighting%20mechanism%20to%20prune%20erroneous%20topological%20links.%20Furthermore%2C%20we%20resolve%20mirror%20ambiguities%20inherent%20to%20prior-free%20SfM%20via%20a%20dual-hypothesis%20regularization%20strategy.%20Extensive%20evaluations%20show%20that%20our%20approach%20significantly%20expands%20the%20basin%20of%20attraction%20and%20achieves%20superior%20accuracy%20over%20both%20classical%20and%20learning-based%20baselines%2C%20providing%20a%20scalable%20foundation%20that%20greatly%20benefits%20SfM%20and%20SLAM%20robustness%20in%20unstructured%20environments.&entry.1838667208=http%3A//arxiv.org/abs/2505.20858v2&entry.124074799=Read"},
{"title": "MPM: Mutual Pair Merging for Efficient Vision Transformers", "author": "Simon Rav\u00e9 and Pejman Rasti and David Rousseau", "abstract": "Decreasing sequence length is a common way to accelerate transformers, but prior token reduction work often targets classification and reports proxy metrics rather than end-to-end latency. For semantic segmentation, token reduction is further constrained by the need to reconstruct dense, pixel-aligned features, and on modern accelerators the overhead of computing merge maps can erase expected gains. We propose Mutual Pair Merging (MPM), a training-free token aggregation module that forms mutual nearest-neighbor pairs in cosine space, averages each pair, and records a merge map enabling a gather-based reconstruction before the decoder so that existing segmentation heads can be used unchanged. MPM introduces no learned parameters and no continuous compression knob (no keep-rate or threshold). The speed-accuracy trade-off is set by a discrete insertion schedule. We benchmark end-to-end latency on an NVIDIA H100 GPU (with and without FlashAttention-2) and a Raspberry Pi 5 across standard segmentation datasets. On ADE20K, MPM reduces per-image latency by up to 60% for ViT-Tiny on Raspberry Pi 5, and increases throughput by up to 20% on H100 with FlashAttention-2 while keeping the mIoU drop below 3%. These results suggest that simple, reconstruction-aware, training-free token merging can translate into practical wall-clock gains for segmentation when overhead is explicitly accounted for.", "link": "http://arxiv.org/abs/2604.05718v1", "date": "2026-04-07", "relevancy": 2.1783, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5629}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5323}, {"title": "TAMM: TriAdapter Multi- {"title": "Multi-Modal Landslide Detection from Sentinel-1 SAR and Sentinel-2 Optical Imagery Using Multi-Encoder Vision Transformers and Ensemble Learning", "author": "Ioannis Nasios", "abstract": "Landslides represent a major geohazard with severe impacts on human life, infrastructure, and ecosystems, underscoring the need for accurate and timely detection approaches to support disaster risk reduction. This study proposes a modular, multi-model framework that fuses Sentinel-2 optical imagery with Sentinel-1 Synthetic Aperture Radar (SAR) data, for robust landslide detection. The methodology leverages multi-encoder vision transformers, where each data modality is processed through separate lightweight pretrained encoders, achieving strong performance in landslide detection. In addition, the integration of multiple models, particularly the combination of neural networks and gradient boosting models (LightGBM and XGBoost), demonstrates the power of ensemble learning to further enhance accuracy and robustness. Derived spectral indices, such as NDVI, are integrated alongside original bands to enhance sensitivity to vegetation and surface changes. The proposed methodology achieves a state-of-the-art F1 score of 0.919 on landslide detection, addressing a patch-based classification task rather than pixel-level segmentation and operating without pre-event Sentinel-2 data, highlighting its effectiveness in a non-classical change detection setting. It also demonstrated top performance in a machine learning competition, achieving a strong balance between precision and recall and highlighting the advantages of explicitly leveraging the complementary strengths of optical and radar data. The conducted experiments and research also emphasize scalability and operational applicability, enabling flexible configurations with optical-only, SAR-only, or combined inputs, and offering a transferable framework for broader natural hazard monitoring and environmental change applications. Full training and inference code can be found in https://github.com/IoannisNasios/sentinel-landslide-cls.", "link": "http://arxiv.org/abs/2604.05959v1", "date": "2026-04-07", "relevancy": 2.1774, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5829}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.548}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5253}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multi-Modal%20Landslide%20Detection%20from%20Sentinel-1%20SAR%20and%20Sentinel-2%20Optical%20Imagery%20Using%20Multi-Encoder%20Vision%20Transformers%20and%20Ensemble%20Learning&body=Title%3A%20Multi-Modal%20Landslide%20Detection%20from%20Sentinel-1%20SAR%20and%20Sentinel-2%20Optical%20Imagery%20Using%20Multi-Encoder%20Vision%20Transformers%20and%20Ensemble%20Learning%0AAuthor%3A%20Ioannis%20Nasios%0AAbstract%3A%20Landslides%20represent%20a%20major%20geohazard%20with%20severe%20impacts%20on%20human%20life%2C%20infrastructure%2C%20and%20ecosystems%2C%20underscoring%20the%20need%20for%20accurate%20and%20timely%20detection%20approaches%20to%20support%20disaster%20risk%20reduction.%20This%20study%20proposes%20a%20modular%2C%20multi-model%20framework%20that%20fuses%20Sentinel-2%20optical%20imagery%20with%20Sentinel-1%20Synthetic%20Aperture%20Radar%20%28SAR%29%20data%2C%20for%20robust%20landslide%20detection.%20The%20methodology%20leverages%20multi-encoder%20vision%20transformers%2C%20where%20each%20data%20modality%20is%20processed%20through%20separate%20lightweight%20pretrained%20encoders%2C%20achieving%20strong%20performance%20in%20landslide%20detection.%20In%20addition%2C%20the%20integration%20of%20multiple%20models%2C%20particularly%20the%20combination%20of%20neural%20networks%20and%20gradient%20boosting%20models%20%28LightGBM%20and%20XGBoost%29%2C%20demonstrates%20the%20power%20of%20ensemble%20learning%20to%20further%20enhance%20accuracy%20and%20robustness.%20Derived%20spectral%20indices%2C%20such%20as%20NDVI%2C%20are%20integrated%20alongside%20original%20bands%20to%20enhance%20sensitivity%20to%20vegetation%20and%20surface%20changes.%20The%20proposed%20methodology%20achieves%20a%20state-of-the-art%20F1%20score%20of%200.919%20on%20landslide%20detection%2C%20addressing%20a%20patch-based%20classification%20task%20rather%20than%20pixel-level%20segmentation%20and%20operating%20without%20pre-event%20Sentinel-2%20data%2C%20highlighting%20its%20effectiveness%20in%20a%20non-classical%20change%20detection%20setting.%20It%20also%20demonstrated%20top%20performance%20in%20a%20machine%20learning%20competition%2C%20achieving%20a%20strong%20balance%20between%20precision%20and%20recall%20and%20highlighting%20the%20advantages%20of%20explicitly%20leveraging%20the%20complementary%20strengths%20of%20optical%20and%20radar%20data.%20The%20conducted%20experiments%20and%20research%20also%20emphasize%20scalability%20and%20operational%20applicability%2C%20enabling%20flexible%20configurations%20with%20optical-only%2C%20SAR-only%2C%20or%20combined%20inputs%2C%20and%20offering%20a%20transferable%20framework%20for%20broader%20natural%20hazard%20monitoring%20and%20environmental%20change%20applications.%20Full%20training%20and%20inference%20code%20can%20be%20found%20in%20https%3A//github.com/IoannisNasios/sentinel-landslide-cls.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05959v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMulti-Modal%2520Landslide%2520Detection%2520from%2520Sentinel-1%2520SAR%2520and%2520Sentinel-2%2520Optical%2520Imagery%2520Using%2520Multi-Encoder%2520Vision%2520Transformers%2520and%2520Ensemble%2520Le {"title": "HaloProbe: Bayesian Detection and Mitigation of Object Hallucinations in Vision-Language Models", "author": "Reihaneh Zohrabi and Hosein Hasani and Akshita Gupta and Mahdieh Soleymani Baghshah and Anna Rohrbach and Marcus Rohrbach", "abstract": "Large vision-language models can produce object hallucinations in image descriptions, highlighting the need for effective detection and mitigation strategies. Prior work commonly relies on the model's attention weights on visual tokens as a detection signal. We reveal that coarse-grained attention-based analysis is unreliable due to hidden confounders, specifically token position and object repetition in a description. This leads to Simpson's paradox: the attention trends reverse or disappear when statistics are aggregated. Based on this observation, we introduce HaloProbe, a Bayesian framework that factorizes external description statistics and internal decoding signals to estimate token-level hallucination probabilities. HaloProbe uses balanced training to isolate internal evidence and combines it with learned prior over external features to recover the true posterior. While intervention-based mitigation methods often degrade utility or fluency by modifying models' internals, we use HaloProbe as an external scoring signal for non-invasive mitigation. Our experiments show that HaloProbe-guided decoding reduces hallucinations more effectively than state-of-the-art intervention-based methods while preserving utility.", "link": "http://arxiv.org/abs/2604.06165v1", "date": "2026-04-07", "relevancy": 2.1647, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5414}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5411}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5411}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HaloProbe%3A%20Bayesian%20Detection%20and%20Mitigation%20of%20Object%20Hallucinations%20in%20Vision-Language%20Models&body=Title%3A%20HaloProbe%3A%20Bayesian%20Detection%20and%20Mitigation%20of%20Object%20Hallucinations%20in%20Vision-Language%20Models%0AAuthor%3A%20Reihaneh%20Zohrabi%20and%20Hosein%20Hasani%20and%20Akshita%20Gupta%20and%20Mahdieh%20Soleymani%20Baghshah%20and%20Anna%20Rohrbach%20and%20Marcus%20Rohrbach%0AAbstract%3A%20Large%20vision-language%20models%20can%20produce%20object%20hallucinations%20in%20image%20descriptions%2C%20highlighting%20the%20need%20for%20effective%20detection%20and%20mitigation%20strategies.%20Prior%20work%20commonly%20relies%20on%20the%20model%27s%20attention%20weights%20on%20visual%20tokens%20as%20a%20detection%20signal.%20We%20reveal%20that%20coarse-grained%20attention-based%20analysis%20is%20unreliable%20due%20to%20hidden%20confounders%2C%20specifically%20token%20position%20and%20object%20repetition%20in%20a%20description.%20This%20leads%20to%20Simpson%27s%20paradox%3A%20the%20attention%20trends%20reverse%20or%20disappear%20when%20statistics%20are%20aggregated.%20Based%20on%20this%20observation%2C%20we%20introduce%20HaloProbe%2C%20a%20Bayesian%20framework%20that%20factorizes%20external%20description%20statistics%20and%20internal%20decoding%20signals%20to%20estimate%20token-level%20hallucination%20probabilities.%20HaloProbe%20uses%20balanced%20training%20to%20isolate%20internal%20evidence%20and%20combines%20it%20with%20learned%20prior%20over%20external%20features%20to%20recover%20the%20true%20posterior.%20While%20intervention-based%20mitigation%20methods%20often%20degrade%20utility%20or%20fluency%20by%20modifying%20models%27%20internals%2C%20we%20use%20HaloProbe%20as%20an%20external%20scoring%20signal%20for%20non-invasive%20mitigation.%20Our%20experiments%20show%20that%20HaloProbe-guided%20decoding%20reduces%20hallucinations%20more%20effectively%20than%20state-of-the-art%20intervention-based%20methods%20while%20preserving%20utility.%0ALink%3A%20http%3A//arxiv.org/abs/2604.06165v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHaloProbe%253A%2520Bayesian%2520Detection%2520and%2520Mitigation%2520of%2520Object%2520Hallucinations%2520in%2520Vision-Language%2520Models%26entry.906535625%3DReihaneh%2520Zohrabi%2520and%2520Hosein%2520Hasani%2520and%2520Akshita%2520Gupta%2520and%2520Mahdieh%2520Soleymani%2520Baghshah%2520and%2520Anna%2520Rohrbach%2520and%2520Marcus%2520Rohrbach%26entry.1292438233%3DLarge%2520vision-language%2520models%2520can%2520produce%2520object%2520hallucinations%2520in%2520image%2520descriptions%252C%2520highlighting%2520the%2520need%2520for%2520effective%2520detection%2520and%2520mitigation%2520strategies.%2520Prior%2520work%2520commonly%2520relies%2520on%2520the%2520model%2527s%2520attention%2520weights%2520on%2520visual%2520tokens%2520as%2520a%2520detection%2520signal.%2520We%2520reveal%2520that%2520coarse-grained%2520attention-based%2520analysis%2520is%2520unreliable%2520due%2520to%2520hidden%2520confounders%252C%2520specifically%2520token%2520position%2520and%2520object%2520repetition%2520in%2520a%2520description.%2520This%2520leads%2520to%2520Simpson%2527s%2520paradox%253A%2520the%2520attention%2520trends%2520reverse%2520or%2520disappear%2520when%2520statistics%2520are%2520aggregated.%2520Based%2520on%2520this%2520observation%252C%2520we%2520introduce%2520HaloProbe%252C%2520a%2520Bayesian%2520framework%2520that%2520factorizes%2520external%2520description%2520statistics%2520and%2520internal%2520decoding%2520signals%2520to%2520estimate%2520token-level%2520hallucination%2520probabilities.%2520HaloProbe%2520uses%2520balanced%2520training%2520to%2520isolate%2520internal%2520evidence%2520and%2520combines%2520it%2520with%2520learned%2520prior%2520over%2520external%2520features%2520to%2520recover%2520the%2520true%2520posterior.%2520While%2520intervention-based%2520mitigation%2520methods%2520often%2520degrade%2520utility%2520or%2520fluency%2520by%2520modifying%2520models%2527%2520internals%252C%2520we%2520use%2520HaloProbe%2520as%2520an%2520external%2520scoring%2520signal%2520for%2520non-invasive%2520mitigation.%2520Our%2520experiments%2520show%2520that%2520HaloProbe-guided%2520decoding%2520reduces%2520hallucinations%2520more%2520effectively%2520than%2520state-of-the-art%2520intervention-based%2520methods%2520while%2520preserving%2520utility.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.06165v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=HaloProbe%3A%20Bayesian%20Detection%20and%20Mitigation%20of%20Object%20Hallucinations%20in%20Vision-Language%20Models&entry.906535625=Reihaneh%20Zohrabi%20and%20Hosein%20Hasani%20and%20Akshita%20Gupta%20and%20Mahdieh%20Soleymani%20Baghshah%20and%20Anna%20Rohrbach%20and%20Marcus%20Rohrbach&entry.1292438233=Large%20vision-language%20models%20can%20produce%20object%20hallucinations%20in%20image%20descriptions%2C%20highlighting%20the%20need%20for%20effective%20detection%20and%20mitigation%20strategies.%20Prior%20work%20commonly%20relies%20on%20the%20model%27s%20attention%20weights%20on%20visual%20tokens%20as%20a%20detection%20signal.%20We%20reveal%20that%20coarse-grained%20attention-based%20analysis%20is%20unreliable%20due%20to%20hidden%20confounders%2C%20specifically%20token%20position%20and%20object%20repetition%20in%20a%20description.%20This%20leads%20to%20Simpson%27s%20paradox%3A%20the%20attention%20trends%20reverse%20or%20disappear%20when%20statistics%20are%20aggregated.%20Based%20on%20this%20observation%2C%20we%20introduce%20HaloProbe%2C%20a%20Bayesian%20framework%20that%20factorizes%20external%20description%20statistics%20and%20int {"title": "CRFT: Consistent-Recurrent Feature Flow Transformer for Cross-Modal Image Registration", "author": "Xuecong Liu and Mengzhu Ding and Zixuan Sun and Zhang Li and Xichao Teng", "abstract": "We present Consistent-Recurrent Feature Flow Transformer (CRFT), a unified coarse-to-fine framework based on feature flow learning for robust cross-modal image registration. CRFT learns a modality-independent feature flow representation within a transformer-based architecture that jointly performs feature alignment and flow estimation. The coarse stage establishes global correspondences through multi-scale feature correlation, while the fine stage refines local details via hierarchical feature fusion and adaptive spatial reasoning. To enhance geometric adaptability, an iterative discrepancy-guided attention mechanism with a Spatial Geometric Transform (SGT) recurrently refines the flow field, progressively capturing subtle spatial inconsistencies and enforcing feature-level consistency. This design enables accurate alignment under large affine and scale variations while maintaining structural coherence across modalities. Extensive experiments on diverse cross-modal datasets demonstrate that CRFT consistently outperforms state-of-the-art registration methods in both accuracy and robustness. Beyond registration, CRFT provides a generalizable paradigm for multimodal spatial correspondence, offering broad applicability to remote sensing, autonomous navigation, and medical imaging. Code and datasets are publicly available at https://github.com/NEU-Liuxuecong/CRFT.", "link": "http://arxiv.org/abs/2604.05689v1", "date": "2026-04-07", "relevancy": 2.1646, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.6013}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5404}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5178}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CRFT%3A%20Consistent-Recurrent%20Feature%20Flow%20Transformer%20for%20Cross-Modal%20Image%20Registration&body=Title%3A%20CRFT%3A%20Consistent-Recurrent%20Feature%20Flow%20Transformer%20for%20Cross-Modal%20Image%20Registration%0AAuthor%3A%20Xuecong%20Liu%20and%20Mengzhu%20Ding%20and%20Zixuan%20Sun%20and%20Zhang%20Li%20and%20Xichao%20Teng%0AAbstract%3A%20We%20present%20Consistent-Recurrent%20Feature%20Flow%20Transformer%20%28CRFT%29%2C%20a%20unified%20coarse-to-fine%20framework%20based%20on%20feature%20flow%20learning%20for%20robust%20cross-modal%20image%20registration.%20CRFT%20learns%20a%20modality-independent%20feature%20flow%20representation%20within%20a%20transformer-based%20architecture%20that%20jointly%20performs%20feature%20alignment%20and%20flow%20estimation.%20The%20coarse%20stage%20establishes%20global%20correspondences%20through%20multi-scale%20feature%20correlation%2C%20while%20the%20fine%20stage%20refines%20local%20details%20via%20hierarchical%20feature%20fusion%20and%20adaptive%20spatial%20reasoning.%20To%20enhance%20geometric%20adaptability%2C%20an%20iterative%20discrepancy-guided%20attention%20mechanism%20with%20a%20Spatial%20Geometric%20Transform%20%28SGT%29%20recurrently%20refines%20the%20flow%20field%2C%20progressively%20capturing%20subtle%20spatial%20inconsistencies%20and%20enforcing%20feature-level%20consistency.%20This%20design%20enables%20accurate%20alignment%20under%20large%20affine%20and%20scale%20variations%20while%20maintaining%20structural%20coherence%20across%20modalities.%20Extensive%20experiments%20on%20diverse%20cross-modal%20datasets%20demonstrate%20that%20CRFT%20consistently%20outperforms%20state-of-the-art%20registration%20methods%20in%20both%20accuracy%20and%20robustness.%20Beyond%20registration%2C%20CRFT%20provides%20a%20generalizable%20paradigm%20for%20multimodal%20spatial%20correspondence%2C%20offering%20broad%20applicability%20to%20remote%20sensing%2C%20autonomous%20navigation%2C%20and%20medical%20imaging.%20Code%20and%20datasets%20are%20publicly%20available%20at%20https%3A//github.com/NEU-Liuxuecong/CRFT.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05689v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCRFT%253A%2520Consistent-Recurrent%2520Feature%2520Flow%2520Transformer%2520for%2520Cross-Modal%2520Image%2520Registration%26entry.906535625%3DXuecong%2520Liu%2520and%2520Mengzhu%2520Ding%2520and%2520Zixuan%2520Sun%2520and%2520Zhang%2520Li%2520and%2520Xichao%2520Teng%26entry.1292438233%3DWe%2520present%2520Consistent-Recurrent%2520Feature%2520Flow%2520Transformer%2520%2528CRFT%2529%252C%2520a%2520unified%2520coarse-to-fine%2520framework%2520based%2520on%2520feature%2520flow%2520learning%2520for%2520robust%2520cross-modal%2520image%2520registration.%2520CRFT%2520learns%2520a%2520modality-independent%2520feature%2520flow%2520representation%2520within%2520a%2520transformer-based%2520architecture%2520that%2520jointly%2520performs%2520feature%2520alignment%2520and%2520flow%2520estimation.%2520The%2520coarse%2520stage%2520establishes%2520global%2520correspondences%2520through%2520multi-scale%2520feature%2520correlation%252C%2520while%2520the%2520fine%2520stage%2520refines%2520local%2520details%2520via%2520hierarchical%2520feature%2520fusion%2520and%2520adaptive%2520spatial%2520reasoning.%2520To%2520enhance%2520geometric%2520adaptability%252C%2520an%2520iterative%2520discrepancy-guided%2520attention%2520mechanism%2520with%2520a%2520Spatial%2520Geometric%2520Transform%2520%2528SGT%2529%2520recurrently%2520refines%2520the%2520flow%2520field%252C%2520progressively%2520capturing%2520subtle%2520spatial%2520inconsistencies%2520and%2520enforcing%2520feature-level%2520consistency.%2520This%252 {"title": "JTON: A Token-Efficient JSON Superset with Zen Grid Tabular Encoding for Large Language Models", "author": "Gowthamkumar Nandakishore", "abstract": "When LLMs process structured data, the serialization format directly affects cost and context utilization. Standard JSON wastes tokens repeating key names in every row of a tabular array--overhead that scales linearly with row count. This paper presents JTON (JSON Tabular Object Notation), a strict JSON superset whose main idea, Zen Grid, factors column headers into a single row and encodes values with semicolons, preserving JSON's type system while cutting redundancy. Across seven real-world domains, Zen Grid reduces token counts by 15-60% versus JSON compact (28.5% average; 32% with bare_strings). Comprehension tests on 10 LLMs show a net +0.3 pp accuracy gain over JSON: four models improve, three hold steady, and three dip slightly. Generation tests on 12 LLMs yield 100% syntactic validity in both few-shot and zero-shot settings. A Rust/PyO3 reference implementation adds SIMD-accelerated parsing at 1.4x the speed of Python's json module. Code, a 683-vector test suite, and all experimental data are publicly available.", "link": "http://arxiv.org/abs/2604.05865v1", "date": "2026-04-07", "relevancy": 2.1178, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4237}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4237}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4232}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20JTON%3A%20A%20Token-Efficient%20JSON%20Superset%20with%20Zen%20Grid%20Tabular%20Encoding%20for%20Large%20Language%20Models&body=Title%3A%20JTON%3A%20A%20Token-Efficient%20JSON%20Superset%20with%20Zen%20Grid%20Tabular%20Encoding%20for%20Large%20Language%20Models%0AAuthor%3A%20Gowthamkumar%20Nandakishore%0AAbstract%3A%20When%20LLMs%20process%20structured%20data%2C%20the%20serialization%20format%20directly%20affects%20cost%20and%20context%20utilization.%20Standard%20JSON%20wastes%20tokens%20repeating%20key%20names%20in%20every%20row%20of%20a%20tabular%20array--overhead%20that%20scales%20linearly%20with%20row%20count.%20This%20paper%20presents%20JTON%20%28JSON%20Tabular%20Object%20Notation%29%2C%20a%20strict%20JSON%20superset%20whose%20main%20idea%2C%20Zen%20Grid%2C%20factors%20column%20headers%20into%20a%20single%20row%20and%20encodes%20values%20with%20semicolons%2C%20preserving%20JSON%27s%20type%20system%20while%20cutting%20redundancy.%20Across%20seven%20real-world%20domains%2C%20Zen%20Grid%20reduces%20token%20counts%20by%2015-60%25%20versus%20JSON%20compact%20%2828.5%25%20average%3B%2032%25%20with%20bare_strings%29.%20Comprehension%20tests%20on%2010%20LLMs%20show%20a%20net%20%2B0.3%20pp%20accuracy%20gain%20over%20JSON%3A%20four%20models%20improve%2C%20three%20hold%20steady%2C%20and%20three%20dip%20slightly.%20Generation%20tests%20on%2012%20LLMs%20yield%20100%25%20syntactic%20validity%20in%20both%20few-shot%20and%20zero-shot%20settings.%20A%20Rust/PyO3%20reference%20implementation%20adds%20SIMD-accelerated%20parsing%20at%201.4x%20the%20speed%20of%20Python%27s%20json%20module.%20Code%2C%20a%20683-vector%20test%20suite%2C%20and%20all%20experimental%20data%20are%20publicly%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05865v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DJTON%253A%2520A%2520Token-Efficient%2520JSON%2520Superset%2520with%2520Zen%2520Grid%2520Tabular%2520Encoding%2520for%2520Large%2520Language%2520Models%26entry.906535625%3DGowthamkumar%2520Nandakishore%26entry.1292438233%3DWhen%2520LLMs%2520process%2520struc {"title": "Attention Editing: A Versatile Framework for Cross-Architecture Attention Conversion", "author": "Zhen Cheng and Hao-Bo Yang and Wan-Yi Huang and Jin-Long Li", "abstract": "Key-Value (KV) cache memory and bandwidth increasingly dominate large language model inference cost in long-context and long-generation regimes. Architectures such as multi-head latent attention (MLA) and hybrid sliding-window attention (SWA) can alleviate this bound, but integrating them into existing models remains difficult. Prior methods impose fine-grained structural requirements on both source and target attention modules, which cannot meet the feasible requirement in practical deployment. We present Attention Editing, a practical framework for converting already-trained large language models (LLMs) with new attention architectures without re-pretraining from scratch. Attention editing replaces the original attention with a learnable target module and trains it using progressive distillation, consisting of (1) layer-wise teacher-forced optimization with intermediate activation supervision to prevent cold-start error accumulation, and (2) model-level distillation on next-token distributions, optionally regularized by weak feature matching. We instantiate the framework on two different target--MLA and GateSWA, a gated hybrid SWA design, and apply it to Qwen3-8B and Qwen3-30B-A3B. The resulting models maintain competitive performance while delivering substantial efficiency improvements, demonstrating that large-scale attention conversion is both feasible and robust. Notably, experiments are conducted on an Ascend 910B clusters, offering a practical training case study on domestic hardware.", "link": "http://arxiv.org/abs/2604.05688v1", "date": "2026-04-07", "relevancy": 1.6257, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5518}, {"title": "Scaling Rectified Flow Trans k%20feature%20matching.%20We%20instantiate%20the%20framework%20on%20two%20different%20target--MLA%20and%20GateSWA%2C%20a%20gated%20hybrid%20SWA%20design%2C%20and%20apply%20it%20to%20Qwen3-8B%20and%20Qwen3-30B-A3B.%20The%20resulting%20models%20maintain%20competitive%20performance%20while%20delivering%20substantial%20efficiency%20improvements%2C%20demonstrating%20that%20large-scale%20attention%20conversion%20is%20both%20feasible%20and%20robust.%20Notably%2C%20experiments%20are%20conducted%20on%20an%20Ascend%20910B%20clusters%2C%20offering%20a%20practical%20training%20case%20study%20on%20domestic%20hardware.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05688v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAttention%2520Editing%253A%2520A%2520Versatile%2520Framework%2520for%2520Cross-Architecture%2520Attention%2520Conversion%26entry.906535625%3DZhen%2520Cheng%2520and%2520Hao-Bo%2520Yang%2520and%2520Wan-Yi%2520Huang%2520and%2520Jin-Long%2520Li%26entry.1292438233%3DKey-Value%2520%2528KV%2529%2520cache%2520memory%2520and%2520bandwidth%2520increasingly%2520dominate%2520large%2520language%2520model%2520inference%2520cost%2520in%2520long-context%2520and%2520long-generation%2520regimes.%2520Architectures%2520such%2520as%2520multi-head%2520latent%2520attention%2520%2528MLA%2529%2520and%2520hybrid%2520sliding-window%2520attention%2520%2528SWA%2529%2520can%2520alleviate%2520this%2520bound%252C%2520but%2520integrating%2520them%2520into%2520existing%2520models%2520remains%2520difficult.%2520Prior%2520methods%2520impose%2520fine-grained%2520structural%2520requirements%2520on%2520both%2520source%2520and%2520target%2520attention%2520modules%252C%2520which%2520cannot%2520meet%2520the%2520feasible%2520requirement%2520in%2520practical%2520deployment.%2520We%2520present%2520Attention%2520Editing%252C%2520a%2520practical%2520framework%2520for%2520converting%2520already-trained%2520large%2520language%2520mod {"title": "What Models Know, How Well They Know It: Knowledge-Weighted Fine-Tuning for Learning When to Say \"I Don't Know\"", "author": "Joosung Lee and Hwiyeol Jo and Donghyeon Ko and Kyubyung Chae and Cheonbok Park and Jeonghoon Kim", "abstract": "While large language models (LLMs) demonstrate strong capabilities across diverse user queries, they still suffer from hallucinations, often arising from knowledge misalignment between pre-training and fine-tuning. To address this misalignment, we reliably estimate a fine-grained, instance-level knowledge score via multi-sampled inference. Using the knowledge score, we scale the learning signal according to the model's existing knowledge, while encouraging explicit \"I don't know\" responses for out-of-scope queries. Experimental results show that this approach allows the model to explicitly express uncertainty when it lacks knowledge, while maintaining accuracy on questions it can answer. Furthermore, we propose evaluation metrics for uncertainty, showing that accurate discrimination between known and unknown instances consistently improves performance.", "link": "http://arxiv.org/abs/2604.05779v1", "date": "2026-04-07", "relevancy": 1.5073, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5234}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5065}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.446}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20What%20Models%20Know%2C%20How%20Well%20They%20Know%20It%3A%20Knowledge-Weighted%20Fine-Tuning%20for%20Learning%20When%20to%20Say%20%22I%20Don%27t%20Know%22&body=Title%3A%20What%20Models%20Know%2C%20How%20Well%20They%20Know%20It%3A%20Knowledge-Weighted%20Fine-Tuning%20for%20Learning%20When%20to%20Say%20%22I%20Don%27t%20Know%22%0AAuthor%3A%20Joosung%20Lee%20and%20Hwiyeol%20Jo%20and%20Donghyeon%20Ko%20and%20Kyubyung%20Chae%20and%20Cheonbok%20Park%20and%20Jeonghoon%20Kim%0AAbstract%3A%20While%20large%20language%20models%20%28LLMs%29%20demonstrate%20strong%20capabilities%20across%20diverse%20user%20queries%2C%20they%20still%20suffer%20from%20hallucinations%2C%20often%20arising%20from%20knowledge%20misalignment%20between%20pre-training%20and%20fine-tuning.%20To%20address%20this%20misalignment%2C%20we%20reliably%20estimate%20a%20fine-grained%2C%20instance-level%20knowledge%20score%20via%20multi-sampled%20inference.%20Using%20the%20knowledge%20score%2C%20we%20scale%20the%20learning%20signal%20according%20to%20the%20model%27s%20existing%20knowledge%2C%20while%20encouraging%20explicit%20%22I%20don%27t%20know%22%20responses%20for%20out-of-scope%20queries.%20Experimental%20results%20show%20that%20this%20approach%20allows%20the%20model%20to%20explicitly%20express%20uncertainty%20when%20it%20lacks%20knowledge%2C%20while%20maintaining%20accuracy%20on%20questions%20it%20can%20answer.%20Furthermore%2C%20we%20propose%20evaluation%20metrics%20for%20uncertainty%2C%20showing%20that%20accurate%20discrimination%20between%20known%20and%20unknown%20instances%20consistently%20improves%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05779v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhat%2520Models%2520Know%252C%2520How%2520Well%2520They%2520Know%2520It%253A%2520Knowledge-Weighted%2520Fine-Tuning%2520for%2520Learning%2520When%2520to%2520Say%2520%2522I%2520Don%2527t%2520Know%2522%26entry.906535625%3DJoosung%2520Lee%2520and%2520Hwiyeol%2520Jo%2520and%2520Donghyeon%2520Ko%252 {"title": "Value Mirror Descent for Reinforcement Learning", "author": "Zhichao Jia and Guanghui Lan", "abstract": "Value iteration-type methods have been extensively studied for computing a nearly optimal value function in reinforcement learning (RL). Under a generative sampling model, these methods can achieve sharper sample complexity than policy optimization approaches, particularly in their dependence on the discount factor. In practice, they are often employed for offline training or in simulated environments. In this paper, we consider discounted Markov decision processes with state space S, action space A, discount factor $\u03b3\\in(0,1)$ and costs in $[0,1]$. We introduce a novel value optimization method, termed value mirror descent (VMD), which integrates mirror descent from convex optimization into the classical value iteration framework. In the deterministic setting with known transition kernels, we show that VMD converges linearly. For the stochastic setting with a generative model, we develop a stochastic variant, SVMD, which incorporates variance reduction commonly used in stochastic value iteration-type methods. For RL problems with general convex regularizers, SVMD attains a near-optimal sample complexity of $\\tilde{O}(|S||A|(1-\u03b3)^{-3}\u03b5^{-2})$. Moreover, we establish that the Bregman divergence between the generated and optimal policies remains bounded throughout the iterations. This property is absent in existing stochastic value iteration-type methods but is important for enabling effective online (continual) learning following offline training. Under a strongly convex regularizer, SVMD achieves sample complexity of $\\tilde{O}(|S||A|(1-\u03b3)^{-5}\u03b5^{-1})$, improving performance in the high-accuracy regime. Furthermore, we prove convergence of the generated policy to the optimal policy. Overall, the proposed method, its analysis, and the resulting guarantees, constitute new contributions to the RL and optimization literature.", {"title": "Extending ZACH-ViT to Robust Medical Imaging: Corruption and Adversarial Stress Testing in Low-Data Regimes", "author": "Athanasios Angelakis and Marta Gomez-Barrero", "abstract": "The recently introduced ZACH-ViT (Zero-token Adaptive Compact Hierarchical Vision Transformer) formalized a compact permutation-invariant Vision Transformer for medical imaging and argued that architectural alignment with spatial structure can matter more than universal benchmark dominance. Its design was motivated by the observation that positional embeddings and a dedicated class token encode fixed spatial assumptions that may be suboptimal when spatial organization is weakly informative, locally distributed, or variable across biomedical images. The foundational study established a regime-dependent clean performance profile across MedMNIST, but did not examine robustness in detail. In this work, we present the first robustness-focused extension of ZACH-ViT by evaluating its behavior under common image corruptions and adversarial perturbations in the same low-data setting. We compare ZACH-ViT with three scratch-trained compact baselines, ABMIL, Minimal-ViT, and TransMIL, on seven MedMNIST datasets using 50 samples per class, fixed hyperparameters, and five random seeds. Across the benchmark, ZACH-ViT achieves the best overall mean rank on clean data (1.57) and under common corruptions (1.57), indicating a favorable balance between baseline predictive performance and robustness to realistic image degradation. Under adversarial stress, all models deteriorate substantially; nevertheless, ZACH-ViT remains competitive, ranking first under FGSM (2.00) and second under PGD (2.29), where ABMIL performs best overall. These results extend the original ZACH-ViT narrative: the advantages of compact permutation-invariant transformers are not limited to clean evaluation, but can persist under realistic perturbation stress in low-data medical imaging, while adversarial robustness remains an open challenge for all evaluated models.", "link": "http://arxiv.org/abs/2604.06099v1", "date": "2026-04-07", "relevancy": 2.1631, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5447}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5388}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5359}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Extending%20ZACH-ViT%20to%20Robust%20Medical%20Imaging%3A%20Corruption%20and%20Adversarial%20Stress%20Testing%20in%20Low-Data%20Regimes&body=Title%3A%20Extending%20ZACH-ViT%20to%20Robust%20Medical%20Imaging%3A%20Corruption%20and%20Adversarial%20Stress%20Testing%20in%20Low-Data%20Regimes%0AAuthor%3A%20Athanasios%20Angelakis%20and%20Marta%20Gomez-Barrero%0AAbstract%3A%20The%20recently%20introduced%20ZACH-ViT%20%28Zero-token%20Adaptive%20Compact%20Hierarchical%20Vision%20Transformer%29%20formalized%20a%20compact%20permutation-invariant%20Vision%20Transformer%20for%20medical%20imaging%20and%20argued%20that%20architectural%20alignment%20with%20spatial%20structure%20can%20matter%20more%20than%20universal%20benchmark%20dominance.%20Its%20design%20was%20motivated%20by%20the%20observation%20that%20positional%20embeddings%20and%20a%20dedicated%20class%20token%20encode%20fixed%20spatial%20assumptions%20that%20may%20be%20suboptimal%20when%20spatial%20organization%20is%20weakly%20informative%2C%20locally%20distributed%2C%20or%20variable%20across%20biomedical%20images.%20The%20foundational%20study%20established%20a%20regime-dependent%20clean%20performance%20profile%20across%20MedMNIST%2C%20but%20did%20not%20examine%20robustness%20in%20detail.%20In%20this%20work%2C%20we%20present%20the%20first%20robustness-focused%20extension%20of%20ZACH-ViT%20by%20evaluating%20its%20behavior%20under%20common%20image%20corruptions%20and%20adversarial%20perturbations%20in%20the%20same%20low-data%20setting.%20We%20compare%20ZACH-ViT%20with%20three%20scratch-trained%20compact%20baselines%2C%20ABMIL%2C%20Minimal-ViT%2C%20and%20TransMIL%2C%20on%20seven%20MedMNIST%20datasets%20using%2050%20samples%20per%20class%2C%20fixed%20hyperparameters%2C%20and%20five%20random%20seeds.%20Across%20the%20benchmark%2C%20ZACH-ViT%20achieves%20the%20best%20overall%20mean%20rank%20on%20clean%20data%20%281.57%29%20and%20under%20common%20corruptions%20%281.57%29%2C%20indicating%20a%20favorable%20balance%20between%20baseline%20predictive%20performance%20and%20robustness%20to%20realistic%20image%20degradation.%20Under%20adversarial%20stress%2C%20all%20models%20deteriorate%20substantially%3B%20nevertheless%2C%20ZACH-ViT%20remains%20competitive%2C%20ranking%20first%20under%20FGSM%20%282.00%29%20and%20second%20under%20PGD%20%282.29%29%2C%20where%20ABMIL%20performs%20best%20overall.%20These%20results%20extend%20the%20original%20ZACH-ViT%20narrative%3A%20the%20advantages%20of%20compact%20permutation-invariant%20transformers%20are%20not%20limited%20to%20clean%20evaluation%2C%20but%20can%20persist%20under%20realistic%20perturbation%20stress%20in%20low-data%20medical%20imaging%2C%20while%20adversarial%20robustness%20remains%20an%20open%20challenge%20for%20all%20evaluated%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2604.06099v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DExtending%2520ZACH-ViT%2520to%2520Robust%2520Medical%2520Imaging%253A%2520Corruption%2520and%2520Adversarial%2520Stress%2520Testing%2520in%2520Low-Data%2520Regimes%26entry.906535625%3DAthanasios%2520Angelakis%2520and%2520Marta%2520Gomez-Barrero%26entry.1292438233%3DThe%2520recently%2520introduced%2520ZACH-ViT%2520%2528Zero-token%2520Adaptive%2520Compact%2520Hierarchical%2520 {"title": "Reading Between the Pixels: An Inscriptive Jailbreak Attack on Text-to-Image Models", "author": "Zonghao Ying and Haowen Dai and Lianyu Hu and Zonglei Jing and Quanchen Zou and Yaodong Yang and Aishan Liu and Xianglong Liu", "abstract": "Modern text-to-image (T2I) models can now render legible, paragraph-length text, enabling a fundamentally new class of misuse. We identify and formalize the inscriptive jailbreak, where an adversary coerces a T2I system into generating images containing harmful textual payloads (e.g., fraudulent documents) embedded within visually benign scenes. Unlike traditional depictive jailbreaks that elicit visually objectionable imagery, inscriptive attacks weaponize the text-rendering capability itself. Because existing jailbreak techniques are designed for coarse visual manipulation, they struggle to bypass multi-stage safety filters while maintaining character-level fidelity. To expose this vulnerability, we propose Etch, a black-box attack framework that decomposes the adversarial prompt into three functionally orthogonal layers: semantic camouflage, visual-spatial anchoring, and typographic encoding. This decomposition reduces joint optimization over the full prompt space to tractable sub-problems, which are iteratively refined through a zero-order loop. In this process, a vision-language model critiques each generated image, localizes failures to specific layers, and prescribes targeted revisions. Extensive evaluations across 7 models on the 2 benchmarks demonstrate that Etch achieves an average attack success rate of 65.57% (peaking at 91.00%), significantly outperforming existing baselines. Our results reveal a critical blind spot in current T2I safety alignments and underscore the urgent need for typography-aware defense multimodal mechanisms.", "link": "http://arxiv.org/abs/2604.05853v1", "date": "2026-04-07", "relevancy": 1.5398, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5156}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5128}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5122}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Reading%20Between%20the%20Pixels%3A%20An%20Inscriptive%20Jailbreak%20Attack%20on%20Text-to-Image%20Models&body=Title%3A%20Reading%20Between%20the%20Pixels%3A%20An%20Inscriptive%20Jailbreak%20Attack%20on%20Text-to-Image%20Models%0AAuthor%3A%20Zonghao%20Ying%20and%20Haowen%20Dai%20and%20Lianyu%20Hu%20and%20Zonglei%20Jing%20and%20Quanchen%20Zou%20and%20Yaodong%20Yang%20and%20Aishan%20Liu%20and%20Xianglong%20Liu%0AAbstract%3A%20Modern%20text-to-image%20%28T2I%29%20models%20can%20now%20render%20legible%2C%20paragraph-length%20text%2C%20enabling%20a%20fundamentally%20new%20class%20of%20misuse.%20We%20identify%20and%20formalize%20the%20inscriptive%20jailbreak%2C%20where%20an%20adversary%20coerces%20a%20T2I%20system%20into%20generating%20images%20containing%20harmful%20textual%20payloads%20%28e.g.%2C%20fraudulent%20documents%29%20embedded%20within%20visually%20benign%20scenes.%20Unlike%20traditional%20depictive%20jailbreaks%20that%20elicit%20visually%20objectionable%20imagery%2C%20inscriptive%20attacks%20weaponize%20the%20text-rendering%20capability%20itself.%20Because%20existing%20jailbreak%20techniques%20are%20designed%20for%20coarse%20visual%20manipulation%2C%20they%20struggle%20to%20bypass%20multi-stage%20safety%20filters%20while%20maintaining%20character-level%20fidelity.%20To%20expose%20this%20vulnerability%2C%20we%20propose%20Etch%2C%20a%20black-box%20attack%20framework%20that%20decomposes%20the%20adversarial%20prompt%20into%20three%20functionally%20orthogonal%20layers%3A%20semantic%20camouflage%2C%20visual-spatial%20anchoring%2C%20and%20typographic%20encoding.%20This%20decomposition%20reduces%20joint%20optimization%20over%20the%20full%20prompt%20space%20to%20tractable%20sub-problems%2C%20which%20are%20iteratively%20refined%20through%20a%20zero-order%20loop.%20In%20this%20process%2C%20a%20vision-language%20model%20critiques%20each%20generated%20image%2C%20localizes%20failures%20to%20specific%20layers%2C%20and%20prescribes%20targeted%20revisions.%20Extensive%20evaluations%20across%207%20models%20on%20the%202%20benchmarks%20demonstrate%20that%20Etch%20achieves%20an%20average%20attack%20success%20rate%20of%2065.57%25%20%28peaking%20at%2091.00%25%29%2C%20significantly%20outperforming%20existing%20baselines.%20Our%20results%20reveal%20a%20critical%20blind%20spot%20in%20current%20T2I%20safety%20alignments%20and%20underscore%20the%20urgent%20need%20for%20typography-aware%20defense%20multimodal%20mechanisms.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05853v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReading%2520Between%2520the%2520Pixels%253A%2520An%2520Inscriptive%2520Jailbreak%2520Attack%2520on%2520Text-to-Image%2520Models%26entry.906535625%3DZonghao%2520Ying%2520and%2520Haowen%2520Dai%2520and%2520Lianyu%2520Hu%2520and%2520Zonglei%2520Jing%2520and%2520Quanchen%2520Zou%2520and%2520Yaodong%2520Yang%2520and%2520Aishan%2520Liu%2520and%2520Xianglong%2520Liu%26entry.1292438233%3DModern%2520text-to-image%2520%2528T2I%2529%2520models%2520can%2520now%2520render%2520legible%252C%2520paragraph-length%2520text%252C%2520enabling%2520a%2520fundamentally%2520new%2520class%2520of%2520misuse.%2520We%2520identify%2520and%2520formalize%2520the%2520inscriptive%2520jailbreak%252C%2520where%2520an%2520adversary%2520coerces%2520a%2520T2I%2520system%2520into%2520generating%2520images%2520containing%2520harmful%2520textual%2520payloads%2520%2528e.g.%252C%2520fraudulent%2520documents%2529%2520embedded%2520within%2520visually%2520benign%2 {"title": "CuraLight: Debate-Guided Data Curation for LLM-Centered Traffic Signal Control", "author": "Qing Guo and Xinhang Li and Junyu Chen and Zheng Guo and Shengzhe Xu and Lin Zhang and Lei Li", "abstract": "Traffic signal control (TSC) is a core component of intelligent transportation systems (ITS), aiming to reduce congestion, emissions, and travel time. Recent approaches based on reinforcement learning (RL) and large language models (LLMs) have improved adaptivity, but still suffer from limited interpretability, insufficient interaction data, and weak generalization to heterogeneous intersections.\n  This paper proposes CuraLight, an LLM-centered framework where an RL agent assists the fine-tuning of an LLM-based traffic signal controller. The RL agent explores traffic environments and generates high-quality interaction trajectories, which are converted into prompt-response pairs for imitation fine-tuning. A multi-LLM ensemble deliberation system further evaluates candidate signal timing actions through structured debate, providing preference-aware supervision signals for training.\n  Experiments conducted in SUMO across heterogeneous real-world networks from Jinan, Hangzhou, and Yizhuang demonstrate that CuraLight consistently outperforms state-of-the-art baselines, reducing average travel time by 5.34 percent, average queue length by 5.14 percent, and average waiting time by 7.02 percent. The results highlight the effectiveness of combining RL-assisted exploration with deliberation-based data curation for scalable and interpretable traffic signal control.", "link": "http://arxiv.org/abs/2604.05663v1", "date": "2026-04-07", "relevancy": 1.3975, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4806}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity" {"title": "Topological Characterization of Churn Flow and Unsupervised Correction to the Wu Flow-Regime Map in Small-Diameter Vertical Pipes", "author": "Brady Koenig and Sushovan Majhi and Atish Mitra and Abigail Stein and Burt Todd", "abstract": "Churn flow-the chaotic, oscillatory regime in vertical two-phase flow-has lacked a quantitative mathematical definition for over $40$ years. We introduce the first topology-based characterization using Euler Characteristic Surfaces (ECS). We formulate unsupervised regime discovery as Multiple Kernel Learning (MKL), blending two complementary ECS-derived kernels-temporal alignment ($L^1$ distance on the $\u03c7(s,t)$ surface) and amplitude statistics (scale-wise mean, standard deviation, max, min)-with gas velocity. Applied to $37$ unlabeled air-water trials from Montana Tech, the self-calibrating framework learns weights $\u03b2_{ECS}=0.14$, $\u03b2_{amp}=0.50$, $\u03b2_{ugs}=0.36$, placing $64\\%$ of total weight on topology-derived features ($\u03b2_{ECS} + \u03b2_{amp}$). The ECS-inferred slug/churn transition lies $+3.81$ m/s above Wu et al.'s (2017) prediction in $2$-in. tubing, quantifying reports that existing models under-predict slug persistence in small-diameter pipes where interfacial tension and wall-to-wall interactions dominate flow. Cross-facility validation on $947$ Texas A&M University images confirms $1.9\\times$ higher topological complexity in churn vs. slug ($p < 10^{-5}$). Applied to $45$ TAMU pseudo-trials, the same unsupervised framework achieves $95.6\\%$ $4$-class accuracy and $100\\%$ churn recall-without any labeled training data-matching or exceeding supervised baselines that require thousands of annotated examples. This work provides the first mathematical definition of churn flow and demonstrates that unsupervised topological descriptors can challenge and correct widely adopted mechanistic models.", "link": "http://arxiv.org/abs/2604.06167v1", "date": "2026-04-07", "relevancy": 1.6915, "topK 20on%20topology-derived%20features%20%28%24%CE%B2_%7BECS%7D%20%2B%20%CE%B2_%7Bamp%7D%24%29.%20The%20ECS-inferred%20slug/churn%20transition%20lies%20%24%2B3.81%24%20m/s%20above%20Wu%20et%20al.%27s%20%282017%29%20prediction%20in%20%242%24-in.%20tubing%2C%20quantifying%20reports%20that%20existing%20models%20under-predict%20slug%20persistence%20in%20small-diameter%20pipes%20where%20interfacial%20tension%20and%20wall-to-wall%20interactions%20dominate%20flow.%20Cross-facility%20validation%20on%20%24947%24%20Texas%20A%26M%20University%20images%20confirms%20%241.9%5Ctimes%24%20higher%20topological%20complexity%20in%20churn%20vs.%20slug%20%28%24p%20%3C%2010%5E%7B-5%7D%24%29.%20Applied%20to%20%2445%24%20TAMU%20pseudo-trials%2C%20the%20same%20unsupervised%20framework%20achieves%20%2495.6%5C%25%24%20%244%24-class%20accuracy%20and%20%24100%5C%25%24%20churn%20recall-without%20any%20labeled%20training%20data-matching%20or%20exceeding%20supervised%20baselines%20that%20require%20thousands%20of%20annotated%20examples.%20This%20work%20provides%20the%20first%20mathematical%20definition%20of%20churn%20flow%20and%20demonstrates%20that%20unsupervised%20topological%20descriptors%20can%20challenge%20and%20correct%20widely%20adopted%20mechanistic%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2604.06167v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTopological%2520Characterization%2520of%2520Churn%2520Flow%2520and%2520Unsupervised%2520Correction%2520to%2520the%2520Wu%2520Flow-Regime%2520Map%2520in%2520Small-Diameter%2520Vertical%2520Pipes%26entry.906535625%3DBrady%2520Koenig%2520and%2520Sushovan%2520Majhi%2520and%2520Atish%2520Mitra%2520and%2520Abigail%2520Stein%2520and%2520Burt%2520Todd%26entry.1292438233%3DChurn%2520flow-the%2520chaotic%252C%2520oscillatory%2520regime%2520in%2520vertical%2520two-phase%2520flow-has%2520lacked%2520a%2520quantitative%2520mathematical%2520definition%2520for%2520over%2520%2 _%7BECS%7D%3D0.14%24%2C%20%24%CE%B2_%7Bamp%7D%3D0.50%24%2C%20%24%CE%B2_%7Bugs%7D%3D0.36%24%2C%20placing%20%2464%5C%25%24%20of%20total%20weight%20on%20topology-derived%20features%20%28%24%CE%B2_%7BECS%7D%20%2B%20%CE%B2_%7Bamp%7D%24%29.%20The%20ECS-inferred%20slug/churn%20transition%20lies%20%24%2B3.81%24%20m/s%20above%20Wu%20et%20al.%27s%20%282017%29%20prediction%20in%20%242%24-in.%20tubing%2C%20quantifying%20reports%20that%20existing%20models%20under-predict%20slug%20persistence%20in%20small-diameter%20pipes%20where%20interfacial%20tension%20and%20wall-to-wall%20interactions%20dominate%20flow.%20Cross-facility%20validation%20on%20%24947%24%20Texas%20A%26M%20University%20images%20confirms%20%241.9%5Ctimes%24%20higher%20topological%20complexity%20in%20churn%20vs.%20slug%20%28%24p%20%3C%2010%5E%7B-5%7D%24%29.%20Applied%20to%20%2445%24%20TAMU%20pseudo-trials%2C%20the%20same%20unsupervised%20framework%20achieves%20%2495.6%5C%25%24%20%244%24-class%20accuracy%20and%20%24100%5C%25%24%20churn%20recall-without%20any%20labeled%20training%20data-matching%20or%20exceeding%20supervised%20baselines%20that%20require%20thousands%20of%20annotated%20examples.%20This%20work%20provides%20the%20first%20mathematical%20definition%20of%20churn%20flow%20and%20demonstrates%20that%20unsupervised%20topological%20descriptors%20can%20challenge%20and%20correct%20widely%20adopted%20mechanistic%20models.&entry.1838667208=http%3A//arxiv.org/abs/2604.06167v1&entry.124074799=Read"},
{"title": "CoStream: Codec-Guided Resource-Efficient System for Video Streaming Analytics", "author": "Yulin Zou and Yan Chen and Wenyan Chen and JooYoung Park and Shivaraman Nitin and Luo Tao and Francisco Romero and Dmitrii Ustiugov", "abstract": "Video streaming analytics is a crucial workload for vision-language model serving, but the high cost of multimodal inference limits scalability. Prior systems reduce inference cost by exploiting temporal and spatial redundancy in video streams, but they target either the vision transformer (ViT) or the LLM with a limited view, leaving end-to-end opportunities untapped. Moreover, existing methods incur significant overhead to identify redundancy, either through offline profiling and training or costly online computation, making them ill-suited for dynamic real-time streams.\n  We present CoStream, a codec-guided streaming video analytics system built on a key observation that video codecs already extract the temporal and spatial structure of each stream as a byproduct of compression. CoStream treats this codec metadata as a low-cost runtime signal to unify optimization across video decoding, visual processing, and LLM prefilling, with transmission reduction as an inherent benefit of operating directly on compressed bitstreams. This drives codec-guided patch pruning before ViT encoding and selective key-value cache refresh during LLM prefilling, both of which are fully online and do not require offline training. Experiments show that CoStream achieves up to 3x throughput improvement and up to 87% GPU compute reduction over state-of-the-art baselines, while maintaining competitive accuracy with only 0-8% F1 drop.", "link": "http://arxiv.org/abs/2604.06036v1", "date": "2026-04-07", "relevancy": 2.0425, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5141}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.514}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5058}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CoStream%3A%20Codec-Guided%20Resource-Efficient%20System%20for%20Video%20Streaming%20Analytics&body=Title%3A%20CoStream%3A%20Codec-Guided%20Resource-Efficient%20System%20for%20Video%20Streaming%20Analytics%0AAuthor%3A%20Yulin%20Zou%20and%20Yan%20Chen%20and%20Wenyan%20Chen%20and%20JooYoung%20Park%20and%20Shivaraman%20Nitin%20and%20Luo%20Tao%20and%20Francisco%20Romero%20and%20Dmitrii%20Ustiugov%0AAbstract%3A%20Video%20streaming%20analytics%20is%20a%20crucial%20workload%20for%20vision-language%20model%20serving%2C%20but%20the%20high%20cost%20of%20multimodal%20inference%20limits%20scalability.%20Prior%20systems%20reduce%20inference%20cost%20by%20exploiting%20temporal%20and%20spatial%20redundancy%20in%20video%20streams%2C%20but%20they%20target%20either%20the%20vision%20transformer%20%28ViT%29%20or%20the%20LLM%20with%20a%20limited%20view%2C%20leaving%20end-to-end%20opportunities%20untapped.%20Moreover%2C%20existing%20methods%20incur%20significant%20overhead%20to%20identify%20redundancy%2C%20either%20through%20offline%20profiling%20and%20training%20or%20costly%20online%20computation%2C%20making%20them%20ill-suited%20for%20dynamic%20real-time%20streams.%0A%20%20We%20present%20CoStream%2C%20a%20codec-guided%20streaming%20video%20analytics%20system%20built%20on%20a%20key%20observation%20that%20video%20codecs%20already%20extract%20the%20temporal%20and%20spatial%20structure%20of%20each%20stream%20as%20a%20byproduct%20of%20compression.%20CoStream%20treats%20this%20codec%20metadata%20as%20a%20low-cost%20runtime%20signal%20to%20unify%20optimization%20across%20video%20decoding%2C%20visual%20processing%2C%20and%20LLM%20prefilling%2C%20with%20transmission%20reduction%20as%20an%20inherent%20benefit%20of%20operating%20directly%20on%20compressed%20bitstreams.%20This%20drives%20codec-guided%20patch%20pruning%20before%20ViT%20encoding%20and%20selective%20key-value%20cache%20refresh%20during%20LLM%20prefilling%2C%20both%20of%20which%20are%20fully%20online%20and%20do%20not%20require%20offline%20training.%20Experiments%20show%20that%20CoStream%20achieves%20up%20to%203x%20throughput%20improvement%20and%20up%20to%2087%25%20GPU%20compute%20reduction%20over%20state-of-the-art%20baselines%2C%20while%20maintaining%20competitive%20accuracy%20with%20only%200-8%25%20F1%20drop.%0ALink%3A%20http%3A//arxiv.org/abs/2604.06036v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCoStream%253A%2520Codec-Guided%2520Resource-Efficient%2520System%2520for%2520Video%2520Streaming%2520Analytics%26entry.906535625%3DYulin%2520Zou%2520and%2520Yan%2520Chen%2520and%2520Wenyan%2520Chen%2520and%2520JooYoung%2520Park%2520and%2520Shivaraman%2520Nitin%2520and%2520Luo%2520Tao%2520and%2520Francisco%2520Romero%2520and%2520Dmitrii%2520Ustiugov%26entry.1292438233%3DVideo%2520streaming%2520analytics%2520is%2520a%2520crucial%2520workload%2520for%2520vision-language%2520model%2520serving%252C%2520but%2520the%2520high%2520cost%2520of%2520multimodal%2520inference%2520limits%2520scalability.%2520Prior%2520systems%2520reduce%2520inference%2520cost%2520by%2520exploiting%2520temporal%2520and%2520spatial%2520redundancy%2520in%2520video%2520streams%252C%2520but%2520they%2520target%2520either%2520the%2520vision%2520transformer%2520%2528ViT%2529%2520or%2520the%2520LLM%2520with%2520a%2520limited%2520view%252C%2520leaving%2520end-to-end%2520opportunities%2520untapped.%2520Moreover%252C%2520existing%2520methods%2520incur%2520significant%2520overhead%2520to%2520identify%2520redundancy%252C%2520either%2520through%2520offline%2520profiling%2520and%2520training%2520or%2520costly%2520online%2520computation%252C%2520ma lytics%20is%20a%20crucial%20workload%20for%20vision-language%20model%20serving%2C%20but%20the%20high%20cost%20of%20multimodal%20inference%20limits%20scalability.%20Prior%20systems%20reduce%20inference%20cost%20by%20exploiting%20temporal%20and%20spatial%20redundancy%20in%20video%20streams%2C%20but%20they%20target%20either%20the%20vision%20transformer%20%28ViT%29%20or%20the%20LLM%20with%20a%20limited%20view%2C%20leaving%20end-to-end%20opportunities%20untapped.%20Moreover%2C%20existing%20methods%20incur%20significant%20overhead%20to%20identify%20redundancy%2C%20either%20through%20offline%20profiling%20and%20training%20or%20costly%20online%20computation%2C%20making%20them%20ill-suited%20for%20dynamic%20real-time%20streams.%0A%20%20We%20present%20CoStream%2C%20a%20codec-guided%20streaming%20video%20analytics%20system%20built%20on%20a%20key%20observation%20that%20video%20codecs%20already%20extract%20the%20temporal%20and%20spatial%20structure%20of%20each%20stream%20as%20a%20byproduct%20of%20compression.%20CoStream%20treats%20this%20codec%20metadata%20as%20a%20low-cost%20runtime%20signal%20to%20unify%20optimization%20across%20video%20decoding%2C%20visual%20processing%2C%20and%20LLM%20prefilling%2C%20with%20transmission%20reduction%20as%20an%20inherent%20benefit%20of%20operating%20directly%20on%20compressed%20bitstreams.%20This%20drives%20codec-guided%20patch%20pruning%20before%20ViT%20encoding%20and%20selective%20key-value%20cache%20refresh%20during%20LLM%20prefilling%2C%20both%20of%20which%20are%20fully%20online%20and%20do%20not%20require%20offline%20training.%20Experiments%20show%20that%20CoStream%20achieves%20up%20to%203x%20throughput%20improvement%20and%20up%20to%2087%25%20GPU%20compute%20reduction%20over%20state-of-the-art%20baselines%2C%20while%20maintaining%20competitive%20accuracy%20with%20only%200-8%25%20F1%20drop.&entry.1838667208=http%3A//arxiv.org/abs/2604.06036v1&entry.124074799=Read"},
{"title": "Context-Value-Action Architecture for Value-Driven Large Language Model Agents", "author": "TianZe Zhang and Sirui Sun and Yuhang Xie and Xin Zhang and Zhiqiang Wu and Guojie Song", "abstract": "Large Language Models (LLMs) have shown promise in simulating human behavior, yet existing agents often exhibit behavioral rigidity, a flaw frequently masked by the self-referential bias of current \"LLM-as-a-judge\" evaluations. By evaluating against empirical ground truth, we reveal a counter-intuitive phenomenon: increasing the intensity of prompt-driven reasoning does not enhance fidelity but rather exacerbates value polarization, collapsing population diversity. To address this, we propose the Context-Value-Action (CVA) architecture, grounded in the Stimulus-Organism-Response (S-O-R) model and Schwartz's Theory of Basic Human Values. Unlike methods relying on self-verification, CVA decouples action generation from cognitive reasoning via a novel Value Verifier trained on authentic human data to explicitly model dynamic value activation. Experiments on CVABench, which comprises over 1.1 million real-world interaction traces, demonstrate that CVA significantly outperforms baselines. Our approach effectively mitigates polarization while offering superior behavioral fidelity and interpretability.", "link": "http://arxiv.org/abs/2604.05939v1", "date": "2026-04-07", "relevancy": 2.0532, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.537}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5086}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5086}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Context-V       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();

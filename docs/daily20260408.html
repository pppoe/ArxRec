{"title": "GaussianGrow: Geometry-aware Gaussian Growing from 3D Point Clouds with Text Guidance", "author": "Weiqi Zhang and Junsheng Zhou and Haotian Geng and Kanle Shi and Shenkun Xu and Yi Fang and Yu-Shen Liu", "abstract": "3D Gaussian Splatting has demonstrated superior performance in rendering efficiency and quality, yet the generation of 3D Gaussians still remains a challenge without proper geometric priors. Existing methods have explored predicting point maps as geometric references for inferring Gaussian primitives, while the unreliable estimated geometries may lead to poor generations. In this work, we introduce GaussianGrow, a novel approach that generates 3D Gaussians by learning to grow them from easily accessible 3D point clouds, naturally enforcing geometric accuracy in Gaussian generation. Specifically, we design a text-guided Gaussian growing scheme that leverages a multi-view diffusion model to synthesize consistent appearances from input point clouds for supervision. To mitigate artifacts caused by fusing neighboring views, we constrain novel views generated at non-preset camera poses identified in overlapping regions across different views. For completing the hard-to-observe regions, we propose to iteratively detect the camera pose by observing the largest un-grown regions in point clouds and inpainting them by inpainting the rendered view with a pretrained 2D diffusion model. The process continues until complete Gaussians are generated. We extensively evaluate GaussianGrow on text-guided Gaussian generation from synthetic and even real-scanned point clouds. Project Page: https://weiqi-zhang.github.io/GaussianGrow", "link": "http://arxiv.org/abs/2604.05721v1", "date": "2026-04-07", "relevancy": 3.2995, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6736}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6533}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6528}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GaussianGrow%3A%20Geometry-aware%20Gaussian%20Growing%20from%203D%20Point%20Clouds%20with%20Text%20Guidance&body=Title%3A%20GaussianGrow%3A%20Geometry-aware%20Gaussian%20Growing%20from%203D%20Point%20Clouds%20with%20Text%20Guidance%0AAuthor%3A%20Weiqi%20Zhang%20and%20Junsheng%20Zhou%20and%20Haotian%20Geng%20and%20Kanle%20Shi%20and%20Shenkun%20Xu%20and%20Yi%20Fang%20and%20Yu-Shen%20Liu%0AAbstract%3A%203D%20Gaussian%20Splatting%20has%20demonstrated%20superior%20performance%20in%20rendering%20efficiency%20and%20quality%2C%20yet%20the%20generation%20of%203D%20Gaussians%20still%20remains%20a%20challenge%20without%20proper%20geometric%20priors.%20Existing%20methods%20have%20explored%20predicting%20point%20maps%20as%20geometric%20references%20for%20inferring%20Gaussian%20primitives%2C%20while%20the%20unreliable%20estimated%20geometries%20may%20lead%20to%20poor%20generations.%20In%20this%20work%2C%20we%20introduce%20GaussianGrow%2C%20a%20novel%20approach%20that%20generates%203D%20Gaussians%20by%20learning%20to%20grow%20them%20from%20easily%20accessible%203D%20point%20clouds%2C%20naturally%20enforcing%20geometric%20accuracy%20in%20Gaussian%20generation.%20Specifically%2C%20we%20design%20a%20text-guided%20Gaussian%20growing%20scheme%20that%20leverages%20a%20multi-view%20diffusion%20model%20to%20synthesize%20consistent%20appearances%20from%20input%20point%20clouds%20for%20supervision.%20To%20mitigate%20artifacts%20caused%20by%20fusing%20neighboring%20views%2C%20we%20constrain%20novel%20views%20generated%20at%20non-preset%20camera%20poses%20identified%20in%20overlapping%20regions%20across%20different%20views.%20For%20completing%20the%20hard-to-observe%20regions%2C%20we%2 {"title": "In Depth We Trust: Reliable Monocular Depth Supervision for Gaussian Splatting", "author": "Wenhui Xiao and Ethan Goan and Rodrigo Santa Cruz and David Ahmedt-Aristizabal and Olivier Salvado and Clinton Fookes and Leo Lebrat", "abstract": "Using accurate depth priors in 3D Gaussian Splatting helps mitigate artifacts caused by sparse training data and textureless surfaces. However, acquiring accurate depth maps requires specialized acquisition systems. Foundation monocular depth estimation models offer a cost-effective alternative, but they suffer from scale ambiguity, multi-view inconsistency, and local geometric inaccuracies, which can degrade rendering performance when applied naively. This paper addresses the challenge of reliably leveraging monocular depth priors for Gaussian Splatting (GS) rendering enhancement. To this end, we introduce a training framework integrating scale-ambiguous and noisy depth priors into geometric supervision. We highlight the importance of learning from weakly aligned depth variations. We introduce a method to isolate ill-posed geometry for selective monocular depth regularization, restricting the propagation of depth inaccuracies into well-reconstructed 3D structures. Extensive experiments across diverse datasets show consistent improvements in geometric accuracy, leading to more faithful depth estimation and higher rendering quality across different GS variants and monocular depth backbones tested.", "link": "http://arxiv.org/abs/2604.05715v1", "date": "2026-04-07", "relevancy": 3.2966, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6747}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6576}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxi cross%20different%20GS%20variants%20and%20monocular%20depth%20backbones%20tested.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05715v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIn%2520Depth%2520We%2520Trust%253A%2520Reliable%2520Monocular%2520Depth%2520Supervision%2520for%2520Gaussian%2520Splatting%26entry.906535625%3DWenhui%2520Xiao%2520and%2520Ethan%2520Goan%2520and%2520Rodrigo%2520Santa%2520Cruz%2520and%2520David%2520Ahmedt-Aristizabal%2520and%2520Olivier%2520Salvado%2520and%2520Clinton%2520Fookes%2520and%2520Leo%2520Lebrat%26entry.1292438233%3DUsing%2520accurate%2520depth%2520priors%2520in%25203D%2520Gaussian%2520Splatting%2520helps%2520mitigate%2520artifacts%2520caused%2520by%2520sparse%2520training%2520data%2520and%2520textureless%2520surfaces.%2520However%252C%2520acquiring%2520accurate%2520depth%2520maps%2520requires%2520specialized%2520acquisition%2520systems.%2520Foundation%2520monocular%2520depth%2520estimation%2520models%2520offer%2520a%2520cost-effective%2520alternative%252C%2520but%2520they%2520suffer%2520from%2520scale%2520ambiguity%252C%2520multi-view%2520inconsistency%252C%2520and%2520local%2520geometric%2520inaccuracies%252C%2520which%2520can%2520degrade%2520rendering%2520performance%2520when%2520applied%2520naively.%2520This%2520paper%2520addresses%2520the%2520challenge%2520of%2520reliably%2520leveraging%2520monocular%2520depth%2520priors%2520for%2520Gaussian%2520Splatting%2520%2528GS%2529%2520rendering%2520enhancement.%2520To%2520this%2520end%252C%2520we%2520introduce%2520a%2520training%2520framework%2520integrating%2520scale-ambiguous%2520and%2520noisy%2520depth%2520priors%2520into%2520geometric%2520supervision.%2520We%2520highlight%2520the%2520importance%2520of%2520learning%2520from%2520weakly%2520aligned%2520depth%2520variations.%2520We%2520introduce%2520a%2520method%2520to%2520isolate%2520ill-posed%2520geometry%2520for%2520selective%2520monocular%2520depth%2520regularization%252C%2520restricting%2520the%2520propagation%2520of%2520depth%2520inaccuracies%2520into%2520well-reconstructed%25203D%2520structures.%2520Extensive%2520experiments%2520across%2520diverse%2520datasets%2520show%2520consistent%2520improvements%2520in%2520geometric%2520accuracy%252C%2520leading%2520to%2520more%2520faithful%2520depth%2520estimation%2520and%2520higher%2520rendering%2520quality%2520across%2520different%2520GS%2520variants%2520and%2520monocular%2520depth%2520backbones%2520tested.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.05715v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=In%20Depth%20We%20Trust%3A%20Reliable%20Monocular%20Depth%20Supervision%20for%20Gaussian%20Splatting&entry.906535625=Wenhui%20Xiao%20and%20Ethan%20Goan%20and%20Rodrigo%20Santa%20Cruz%20and%20David%20Ahmedt-Aristizabal%20and%20Olivier%20Salvado%20and%20Clinton%20Fookes%20and%20Leo%20Lebrat&entry.1292438233=Using%20accurate%20depth%20priors%20in%203D%20Gaussian%20Splatting%20helps%20mitigate%20artifacts%20caused%20by%20sparse%20training%20data%20and%20textureless%20surfaces.%20However%2C%20acquiring%20accurate%20depth%20maps%20requires%20specialized%20acquisition%20systems.%20Foundation%20monocular%20depth%20estimation%20models%20offer%20a%20cost-effective%20alternative%2C%20but%20they%20suffer%20from%20scale%20ambiguity%2C%20multi-view%20inconsistency%2C%20and%20local%20geometric%20inaccuracies%2C%20which%20can%20degrade%20rendering%20performance%20when%20applied%20naively.%20This%20paper%20addresses%20the%20challenge%20of%20reliably%20leveraging%20monocular%20depth%20priors%20for%20Gaussian%20Splatting%20%28GS%29%20rendering%20enhancement.%20To%20this%20end%2C%20we%20introduce%20a%20training%20framework%20integrating%20scale-ambiguous%20and%20noisy%20depth%20priors%20into%20geometric%20supervision.%20We%20highlight%20the%20importance%20of%20learning%20from%20weakly%20aligned%20depth%20variations.%20We%20introduce%20a%20method%20to%20isolate%20ill-posed%20geometry%20for%20selective%20monocular%20depth%20regularization%2C%20restricting%20the%20propagation%20of%20depth%20inaccuracies%20into%20well-reconstructed%203D%20structures.%20Extensive%20experiments%20across%20diverse%20datasets%20show%20consistent%20improvements%20in%20geometric%20accuracy%2C%20leading%20to%20more%20faithful%20depth%20estimation%20and%20higher%20rendering%20quality%20across%20different%20GS%20variants%20and%20monocular%20depth%20backbones%20tested.&entry.1838667208=http%3A//arxiv.org/abs/2604.05715v1&entry.124074799=Read"},
{"title": "MAMMA: Markerless & Automatic Multi-Person Motion Action Capture", "author": "Hanz Cuevas-Velasquez and Anastasios Yiannakidis and Soyong Shin and Giorgio Becherini and Markus H\u00f6schle and Joachim Tesch and Taylor Obersat and Tsvetelina Alexiadis and Eni Halilaj and Michael J. Black", "abstract": "We present MAMMA, a markerless motion-capture pipeline that accurately recovers SMPL-X parameters from multi-view video of two-person interaction sequences. Traditional motion-capture systems rely on physical markers. Although they offer high accuracy, their requirements of specialized hardware, manual marker placement, and extensive post-processing make them costly and time-consuming. Recent learning-based methods attempt to overcome these limitations, but most are designed for single-person capture, rely on sparse keypoints, or struggle with occlusions and physical interactions. In this work, we introduce a method that predicts dense 2D contact-aware surface landmarks conditioned on segmentation masks, enabling person-specific correspondence estimation even under heavy occlusion. We employ a novel architecture that exploits learnable queries for each landmark. We demonstrate that our approach can handle complex person--person interaction and offers greater accuracy than existing methods. To train our network, we construct a large, synthetic multi-view dataset combining human motions from diverse sources, including extreme poses, hand motions, and close interactions. Our dataset yields high-variability synthetic sequences with rich body contact and occlusion, and includes SMPL-X ground-truth annotations with dense 2D landmarks. The result is a system capable of capturing human motion without the need for markers. Our approach offers competitive reconstruction quality compared to commercial marker-based motion-capture solutions, without the extensive manual cleanup. Finally, we address the absence of common benchmarks for dense-landmark prediction and markerless motion capture by introducing two evaluation settings built from real multi-view sequences. Our dataset is available in https://mamma.is.tue.mpg.de for research purposes.", "link": "http://arxiv.org/abs/2506.13040v4", "date": "2026-04-07", "relevancy": 3.02, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.654}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5809}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5771}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MAMMA%3A%20Markerless%20%26%20Automatic%20Multi-Person%20Motion%20Action%20Capture&body=Title%3A%20MAMMA%3A%20Markerless%20%26%20Automatic%20Multi-Person%20Motion%20Action%20Capture%0AAuthor%3A%20Hanz%20Cuevas-Velasquez%20and%20Anastasios%20Yiannakidis%20and%20Soyong%20Shin%20and%20Giorgio%20Becherini%20and%20Markus%20H%C3%B6schle%20and%20Joachim%20Tesch%20and%20Taylor%20Obersat%20and%20Tsvetelina%20Alexiadis%20and%20Eni%20Halilaj%20and%20Michael%20J.%20Black%0AAbstract%3A%20We%20present%20MAMMA%2C%20a%20markerless%20motion-capture%20pipeline%20that%20accurately%20recovers%20SMPL-X%20parameters%20from%20multi-view%20video%20of%20two-person%20interaction%20sequences.%20Traditional%20motion-capture%20systems%20rely%20on%20physical%20markers.%20Although%20they%20offer%20high%20accuracy%2C%20their%20requirements%20of%20specialized%20hardware%2C%20manual%20marker%20placement%2C%20and%20extensive%20post-processing%20make%20them%20costly%20and%20time-consuming.%20Recent%20learning-based%20methods%20attempt%20to%20overcome%20these%20limitations%2C%20but%20most%20are%20designed%20for%20single-person%20capture%2C%20rely%20on%20sparse%20keypoints%2C%20or%20struggle%20with%20occlusions%20and%20physical%20interactions.%20In%20this%20work%2C%20we%20introduce%20a%20method%20that%20predicts%20dense%202D%20contact-aware%20surface%20landmarks%20conditioned%20on%20segmentation%20masks%2C%20enabling%20person-specific%20correspondence%20estimation%20even%20under%20heavy%20occlusion.%20We%20employ%20a%20novel%20architecture%20that%20exploits%20learnable%20queries%20for%20each%20landmark.%20We%20demonstrate%20that%20our%20approach%20can%20handle%20complex%20person--person%20interaction%20and%20offers%20greater%20accuracy%20than%20existing%20methods.%20To%20train%20our%20network%2C%20we%20construct%20a%20large%2C%20synthetic%20multi-view%20dataset%20combining%20human%20motions%20from%20diverse%20sources%2C%20including%20extreme%20poses%2C%20hand%20motions%2C%20and%20close%20interactions.%20Our%20dataset%20yields%20high-variability%20synthetic%20sequences%20with%20rich%20body%20contact%20and%20occlusion%2C%20and%20includes%20SMPL-X%20ground-truth%20annotations%20with%20dense%202D%20landmarks.%20The%20result%20is%20a%20system%20capable%20of%20capturing%20human%20motion%20without%20the%20need%20for%20markers.%20Our%20approach%20offers%20competitive%20reconstruction%20quality%20compared%20to%20commercial%20marker-based%20motion-capture%20solutions%2C%20without%20the%20extensive%20manual%20cleanup.%20Finally%2C%20we%20address%20the%20absence%20of%20common%20benchmarks%20for%20dense-landmark%20prediction%20and%20markerless%20motion%20capture%20by%20introducing%20two%20evaluation%20settings%20built%20from%20real%20multi-view%20sequences.%20Our%20dataset%20is%20available%20in%20https%3A//mamma.is.tue.mpg.de%20for%20research%20purposes.%0ALink%3A%20http%3A//arxiv.org/abs/2506.13040v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMAMMA%253A%2520Markerless%2520%2526%2520Automatic%2520Multi-Person%2520Motion%2520Action%2520Capture%26entry.906535625%3DHanz%2520Cuevas-Velasquez%2520and%2520Anastasi {"title": "EfficientMonoHair: Fast Strand-Level Reconstruction from Monocular Video via Multi-View Direction Fusion", "author": "Da Li and Dominik Engel and Deng Luo and Ivan Viola", "abstract": "Strand-level hair geometry reconstruction is a fundamental problem in virtual human modeling and the digitization of hairstyles. However, existing methods still suffer from a significant trade-off between accuracy and efficiency. Implicit neural representations can capture the global hair shape but often fail to preserve fine-grained strand details, while explicit optimization-based approaches achieve high-fidelity reconstructions at the cost of heavy computation and poor scalability. To address this issue, we propose EfficientMonoHair, a fast and accurate framework that combines the implicit neural network with multi-view geometric fusion for strand-level reconstruction from monocular video. Our method introduces a fusion-patch-based multi-view optimization that reduces the number of optimization iterations for point cloud direction, as well as a novel parallel hair-growing strategy that relaxes voxel occupancy constraints, allowing large-scale strand tracing to remain stable and robust even under inaccurate or noisy orientation fields. Extensive experiments on representative real-world hairstyles demonstrate that our method can robustly reconstruct high-fidelity strand geometries with accuracy. On synthetic benchmarks, our method achieves reconstruction quality comparable to state-of-the-art methods, while improving runtime efficiency by nearly an order of magnitude.", "link": "http://arxiv.org/abs/2604.05794v1", "date": "2026-04-07", "relevancy": 3.016, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6504}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5882}, {"title": "3D Gaussian Blends {"title": "Large-scale Codec Avatars: The Unreasonable Effectiveness of Large-scale Avatar Pretraining", "author": "Junxuan Li and Rawal Khirodkar and Chengan He and Zhongshi Jiang and Giljoo Nam and Lingchen Yang and Jihyun Lee and Egor Zakharov and Zhaoen Su and Rinat Abdrashitov and Yuan Dong and Julieta Martinez and Kai Li and Qingyang Tan and Takaaki Shiratori and Matthew Hu and Peihong Guo and Xuhua Huang and Ariyan Zarei and Marco Pesavento and Yichen Xu and He Wen and Teng Deng and Wyatt Borsos and Anjali Thakrar and Jean-Charles Bazin and Carsten Stoll and Gin\u00e9s Hidalgo and James Booth and Lucy Wang and Xiaowen Ma and Yu Rong and Sairanjith Thalanki and Chen Cao and Christian H\u00e4ne and Abhishek Kar and Sofien Bouaziz and Jason Saragih and Yaser Sheikh and Shunsuke Saito", "abstract": "High-quality 3D avatar modeling faces a critical trade-off between fidelity and generalization. On the one hand, multi-view studio data enables high-fidelity modeling of humans with precise control over expressions and poses, but it struggles to generalize to real-world data due to limited scale and the domain gap between the studio environment and the real world. On the other hand, recent large-scale avatar models trained on millions of in-the-wild samples show promise for generalization across a wide range of identities, yet the resulting avatars are often of low-quality due to inherent 3D ambiguities. To address this, we present Large-Scale Codec Avatars (LCA), a high-fidelity, full-body 3D avatar model that generalizes to world-scale populations in a feedforward manner, enabling efficient inference. Inspired by the success of large language models and vision foundation models, we present, for the first time, a pre/post-training paradigm for 3D avatar modeling at scale: we pretrain on 1M in-the-wild videos to learn broad priors over appearance and geometry, then post-train on high-quality curated data to enhance expressivity and fidelity. LCA generalizes across hair styles, clothing, and demographics while providing precise, fine-grained facial expressions and finger-level articulation control, with strong identity preservation. Notably, we observe emergent generalization to relightability and loose garment support to unconstrained inputs, and zero-shot robustness to stylized imagery, despite the absence of direct supervision.", "link": "http://arxiv.org/abs/2604.02320v2", "date": "2026-04-07", "relevancy": 2.9996, "topK": [{"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.603}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.603}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5938}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Large-scale%20Codec%20Avatars%3A%20The%20Unreasonable%20Effectiveness%20of%20Large-scale%20Avatar%20Pretraining&body=Title%3A%20Large-scale%20Codec%20Avatars%3A%20The%20Unreasonable%20Effectiveness%20of%20Large-scale%20Avatar%20Pretraining%0AAuthor%3A%20Junxuan%20Li%20and%20Rawal%20Khirodkar%20and%20Chengan%20He%20and%20Zhongshi%20Jiang%20and%20Giljoo%20Nam%20and%20Lingchen%20Yang%20and%20Jihyun%20Lee%20and%20Egor%20Zakharov%20and%20Zhaoen%20Su%20and%20Rinat%20Abdrashitov%20and%20Yuan%20Dong%20and%20Julieta%20Martinez%20and%20Kai%20Li%20and%20Qingyang%20Tan%20and%20Takaaki%20Shiratori%20and%20Matthew%20Hu%20and%20Peihong%20Guo%20and%20Xuhua%20Huang%20and%20Ariyan%20Zarei%20and%20Marco%20Pesavento%20and%20Yichen%20Xu%20and%20He%20Wen%20and%20Teng%20Deng%20and%20Wyatt%20Borsos%20and%20Anjali%20Thakrar%20and%20Jean-Charles%20Bazin%20and%20Carsten%20Stoll%20and%20Gin%C3%A9s%20Hidalgo%20and%20James%20Booth%20and%20Lucy%20Wang%20and%20Xiaowen%20Ma%20and%20Yu%20Rong%20and%20Sairanjith%20Thalanki%20and%20Chen%20Cao%20and%20Christian%20H%C3%A4ne%20and%20Abhishek%20Kar%20and%20Sofien%20Bouaziz%20and%20Jason%20Saragih%20and%20Yaser%20Sheikh%20and%20Shunsuke%20Saito%0AAbstract%3A%20High-quality%203D%20avatar%20modeling%20faces%20a%20critical%20trade-off%20between%20fidelity%20and%20generalization.%20On%20the%20one%20hand%2C%20multi-view%20studio%20data%20enables%20high-fidelity%20modeling%20of%20humans%20with%20precise%20control%20over%20expressions%20and%20poses%2C%20but%20it%20struggles%20to%20generalize%20to%20real-world%20data%20due%20to%20limited%20scale%20and%20the%20domain%20gap%20between%20the%20studio%20environment%20and%20the%20real%20world.%20On%20the%20other%20hand%2C%20recent%20large-scale%20avatar%20models%20trained%20on%20millions%20of%20in-the-wild%20samples%20show%20promise%20for%20generalization%20across%20a%20wide%20range%20of%20identities%2C%20yet%20the%20resulting%20avatars%20are%20often%20of%20low-quality%20due%20to%20inherent%203D%20ambiguities.%20To%20address%20this%2C%20we%20present%20Large-Scale%20Codec%20Avatars%20%28LCA%29%2C%20a%20high-fidelity%2C%20full-body%203D%20avatar%20model%20that%20generalizes%20to%20world-scale%20populations%20in%20a%20feedforward%20manner%2C%20enabling%20efficient%20inference.%20Inspired%20by%20the%20success%20of%20large%20language%20models%20and%20vision%20foundation%20models%2C%20we%20present%2C%20for%20the%20first%20time%2C%20a%20pre/post-training%20paradigm%20for%203D%20avatar%20modeling%20at%20scale%3A%20we%20pretrain%20on%201M%20in-the-wild%20videos%20to%20learn%20broad%20priors%20over%20appearance%20and%20geometry%2C%20then%20post-train%20on%20high-quality%20curated%20data%20to%20enhance%20expressivity%20and%20fidelity.%20LCA%20generalizes%20across%20hair%20styles%2C%20clothing%2C%20and%20demographics%20while%20providing%20precise%2C%20fine-grained%20facial%20expressions%20and%20finger-level%20articulation%20control%2C%20with%20strong%20identity%20preservation.%20Notably%2C%20we%20observe%20emergent%20generalization%20to%20relightabil {"title": "3D Smoke Scene Reconstruction Guided by Vision Priors from Multimodal Large Language Models", "author": "Xinye Zheng and Fei Wang and Yiqi Nie and Kun Li and Junjie Chen and Jiaqi Zhao and Yanyan Wei and Zhiliang Wu", "abstract": "Reconstructing 3D scenes from smoke-degraded multi-view images is particularly difficult because smoke introduces strong scattering effects, view-dependent appearance changes, and severe degradation of cross-view consistency. To address these issues, we propose a framework that integrates visual priors with efficient 3D scene modeling. We employ Nano-Banana-Pro to enhance smoke-degraded images and provide clearer visual observations for reconstruction and develop Smoke-GS, a medium-aware 3D Gaussian Splatting framework for smoke scene reconstruction and restoration-oriented novel view synthesis. Smoke-GS models the scene using explicit 3D Gaussians and introduces a lightweight view-dependent medium branch to capture direction-dependent appearance variations caused by smoke. Our method preserves the rendering efficiency of 3D Gaussian Splatting while improving robustness to smoke-induced degradation. Results demonstrate the effectiveness of our method for generating consistent and visually clear novel views in challenging smoke environments.", "link": "http://arxiv.org/abs/2604.05687v1", "date": "2026-04-07", "relevancy": 2.9478, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5997}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5889}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5801}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%203D%20Smoke%20Scene%20Reconstruction%20Guided%20by%20Vision%20Priors%20from%2 v7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=3D%20Smoke%20Scene%20Reconstruction%20Guided%20by%20Vision%20Priors%20from%20Multimodal%20Large%20Language%20Models&entry.906535625=Xinye%20Zheng%20and%20Fei%20Wang%20and%20Yiqi%20Nie%20and%20Kun%20Li%20and%20Junjie%20Chen%20and%20Jiaqi%20Zhao%20and%20Yanyan%20Wei%20and%20Zhiliang%20Wu&entry.1292438233=Reconstructing%203D%20scenes%20from%20smoke-degraded%20multi-view%20images%20is%20particularly%20difficult%20because%20smoke%20introduces%20strong%20scattering%20effects%2C%20view-dependent%20appearance%20changes%2C%20and%20severe%20degradation%20of%20cross-view%20consistency.%20To%20address%20these%20issues%2C%20we%20propose%20a%20framework%20that%20integrates%20visual%20priors%20with%20efficient%203D%20scene%20modeling.%20We%20employ%20Nano-Banana-Pro%20to%20enhance%20smoke-degraded%20images%20and%20provide%20clearer%20visual%20observations%20for%20reconstruction%20and%20develop%20Smoke-GS%2C%20a%20medium-aware%203D%20Gaussian%20Splatting%20framework%20for%20smoke%20scene%20reconstruction%20and%20restoration-oriented%20novel%20view%20synthesis.%20Smoke-GS%20models%20the%20scene%20using%20explicit%203D%20Gaussians%20and%20introduces%20a%20lightweight%20view-dependent%20medium%20branch%20to%20capture%20direction-dependent%20appearance%20variations%20caused%20by%20smoke.%20Our%20method%20preserves%20the%20rendering%20efficiency%20of%203D%20Gaussian%20Splatting%20while%20improving%20robustness%20to%20smoke-induced%20degradation.%20Results%20demonstrate%20the%20effectiveness%20of%20our%20method%20for%20generating%20consistent%20and%20visually%20clear%20novel%20views%20in%20challenging%20smoke%20environments.&entry.1838667208=http%3A//arxiv.org/abs/2604.05687v1&entry.124074799=Read"},
{"title": "Beyond Semantics: Disentangling Information Scope in Sparse Autoencoders for CLIP", "author": "Yusung Ro and Jaehyun Choi and Junmo Kim", "abstract": "Sparse Autoencoders (SAEs) have emerged as a powerful tool for interpreting the internal representations of CLIP vision encoders, yet existing analyses largely focus on the semantic meaning of individual features. We introduce information scope as a complementary dimension of interpretability that characterizes how broadly an SAE feature aggregates visual evidence, ranging from localized, patch-specific cues to global, image-level signals. We observe that some SAE features respond consistently across spatial perturbations, while others shift unpredictably with minor input changes, indicating a fundamental distinction in their underlying scope. To quantify this, we propose the Contextual Dependency Score (CDS), which separates positionally stable local scope features from positionally variant global scope features. Our experiments show that features of different information scopes exert systematically different influences on CLIP's predictions and confidence. These findings establish information scope as a critical new axis for understanding CLIP representations and provide a deeper diagnostic view of SAE-derived features.", "link": "http://arxiv.org/abs/2604.05724v1", "date": "2026-04-07", "relevancy": 2.8965, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5925}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5925}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5528}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Semantics%3A%20Disentangling%20Information%20Scope%20in%20Sparse%20Autoencoders%20for%20CLIP&body=Title%3A%20Beyond%20Semantics%3A%20Disentangling%20Information%20Scope%20in%20Sparse%20Autoencoders%20for%20CLIP%0AAuthor%3A%20Yusung%20Ro%20and%20Jaehyun%20Choi%20and%20Junmo%20Kim%0AAbstract%3A%20Sparse%20Autoencoders%20%28SAEs%29%20have%20emerged%20as%20a%20powerful%20tool%20for%20interpreting%20the%20internal%20representations%20of%20CLIP%20vision%20encoders%2C%20yet%20existing%20analyses%20largely%20focus%20on%20the%20semantic%20meaning%20of%20individual%20features.%20We%20introduce%20information%20scope%20as%20a%20complementary%20dimension%20of%20interpretability%20that%20characterizes%20how%20broadly%20an%20SAE%20feature%20aggregates%20visual%20evidence%2C%20ranging%20from%20localized%2C%20patch-specific%20cues%20to%20global%2C%20image-level%20signals.%20We%20observe%20that%20some%20SAE%20features%20respond%20consistently%20across%20spatial%20perturbations%2C%20while%20others%20shift%20unpredictably%20with%20minor%20input%20changes%2C%20indicating%20a%20fundamental%20distinction%20in%20their%20underlying%20scope.%20To%20quantify%20this%2C%20we%20propose%20the%20Contextual%20Dependency%20Score%20%28CDS%29%2C%20which%20separates%20positionally%20stable%20local%20scope%20features%20from%20positionally%20variant%20global%20scope%20features.%20Our%20experiments%20show%20that%20features%20of%20different%20information%20scopes%20exert%20systematically%20different%20influences%20on%20CLIP%27s%20predictions%20and%20confidence.%20These%20findings%20establish%20information%20scope%20as%20a%20critical%20new%20axis%20for%20understanding%20CLIP%20representations%20and%20provide%20a%20deeper%20diagnostic%20view%20of%20SAE-derived%20features.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05724v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520Semantics%253A%2520Disentangling%2520Information%2520Scope%2520in%2520Sparse%25 074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Beyond%20Semantics%3A%20Disentangling%20Information%20Scope%20in%20Sparse%20Autoencoders%20for%20CLIP&entry.906535625=Yusung%20Ro%20and%20Jaehyun%20Choi%20and%20Junmo%20Kim&entry.1292438233=Sparse%20Autoencoders%20%28SAEs%29%20have%20emerged%20as%20a%20powerful%20tool%20for%20interpreting%20the%20internal%20representations%20of%20CLIP%20vision%20encoders%2C%20yet%20existing%20analyses%20largely%20focus%20on%20the%20semantic%20meaning%20of%20individual%20features.%20We%20introduce%20information%20scope%20as%20a%20complementary%20dimension%20of%20interpretability%20that%20characterizes%20how%20broadly%20an%20SAE%20feature%20aggregates%20visual%20evidence%2C%20ranging%20from%20localized%2C%20patch-specific%20cues%20to%20global%2C%20image-level%20signals.%20We%20observe%20that%20some%20SAE%20features%20respond%20consistently%20across%20spatial%20perturbations%2C%20while%20others%20shift%20unpredictably%20with%20minor%20input%20changes%2C%20indicating%20a%20fundamental%20distinction%20in%20their%20underlying%20scope.%20To%20quantify%20this%2C%20we%20propose%20the%20Contextual%20Dependency%20Score%20%28CDS%29%2C%20which%20separates%20positionally%20stable%20local%20scope%20features%20from%20positionally%20variant%20global%20scope%20features.%20Our%20experiments%20show%20that%20features%20of%20different%20information%20scopes%20exert%20systematically%20different%20influences%20on%20CLIP%27s%20predictions%20and%20confidence.%20These%20findings%20establish%20information%20scope%20as%20a%20critical%20new%20axis%20for%20understanding%20CLIP%20representations%20and%20provide%20a%20deeper%20diagnostic%20view%20of%20SAE-derived%20features.&entry.1838667208=http%3A//arxiv.org/abs/2604.05724v1&entry.124074799=Read"},
{"title": "A Mixture of Experts Foundation Model for Scanning Electron Microscopy Image Analysis", "author": "Sk Miraj Ahmed and Yuewei Lin and Chuntian Cao and Shinjae Yoo and Xinpei Wu and Won-Il Lee and Nikhil Tiwale and Dan N. Le and Thi Thu Huong Chu and Jiyoung Kim and Kevin G. Yager and Chang-Yong Nam", "abstract": "Scanning Electron Microscopy (SEM) is indispensable in modern materials science, enabling high-resolution imaging across a wide range of structural, chemical, and functional investigations. However, SEM imaging remains constrained by task-specific models and labor-intensive acquisition processes that limit its scalability across diverse applications. Here, we introduce the first foundation model for SEM images, pretrained on a large corpus of multi-instrument, multi-condition scientific micrographs, enabling generalization across diverse material systems and imaging conditions. Leveraging a self-supervised transformer architecture, our model learns rich and transferable representations that can be fine-tuned or adapted to a wide range of downstream tasks. As a compelling demonstration, we focus on defocus-to-focus image translation-an essential yet underexplored challenge in automated microscopy pipelines. Our method not only restores focused detail from defocused inputs without paired supervision but also outperforms state-of-the-art techniques across multiple evaluation metrics. This work lays the groundwork for a new class of adaptable SEM models, accelerating materials discovery by bridging foundational representation learning with real-world imaging needs.", "link": "http://arxiv.org/abs/2604.05960v1", "date": "2026-04-07", "relevancy": 2.8635, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.587}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.587}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5441}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Mixture%20of%20Experts%20Foundation%20Model%20for%20Scanning%20Electron%20Microscopy%20Image%20Analysis&body=Title%3A%20A%20Mixture%20of%20Experts%20Foundation%20Model%20for%20Scanning%20Electron%20Microscopy%20Image%20Analysis%0AAuthor%3A%20Sk%20Miraj%20Ahmed%20and%20Yuewei%20Lin%20and%20Chuntian%20Cao%20and%20Shinjae%20Yoo%20and%20Xinpei%20Wu%20and%20Won-Il%20Lee%20and%20Nikhil%20Tiwale%20and%20Dan%20N.%20Le%20and%20Thi%20Thu%20Huong%20Chu%20and%20Jiyoung%20Kim%20and%20Kevin%20G.%20Yager%20and%20Chang-Yong%20Nam%0AAbstract%3A%20Scanning%20Electron%20Microscopy%20%28SEM%29%20is%20indispensable%20in%20modern%20materials%20science%2C%20enabling%20high-resolution%20imaging%20across%20a%20wide%20range%20of%20structural%2C%20chemical%2C%20and%20functional%20investigations.%20However%2C%20SEM%20imaging%20remains%20constrained%20by%20task-specific%20models%20and%20labor-intensive%20acquisition%20processes%20that%20limit%20its%20scalability%20across%20diverse%20applications.%20Here%2C%20we%20introduce%20the%20first%20foundation%20model%20for%20SEM%20images%2C%20pretrained%20on%20a%20large%20corpus%20of%20multi-instrument%2C%20multi-condition%20scientific%20micrographs%2C%20enabling%20generalization%20across%20diverse%20material%20systems%20and%20imaging%20conditions.%20Leveraging%20a%20self-supervised%20transformer%20architecture%2C%20our%20model%20learns%20rich%20and%20transferable%20representations%20that%20can%20be%20fine-tuned%20or%20adapted%20to%20a%20wide%20range%20of%20downstream%20tasks.%20As%20a%20compelling%20demonstration%2C%20we%20focus%20on%20defocus-to-focus%20image%20translation-an%20essential%20yet%20underexplored%20challenge%20in%20automated%20microscopy%20pipelines.%20Our%20method%20not%20only%20restores%20focused%20detail%20from%20defocused%20inputs%20without%20paired%20supervision%20but%20also%20outperforms%20state-of-the-art%20techniques%20across%20multiple%20evaluation%20metrics.%20This%20work%20lays%20the%20groundwork%20for%20a%20new%20class%20of%20adaptable%20SEM%20models%2C%20accelerating%20materials%20discovery%20by%20bridging%20foundational%20representation%20learning%20with%20real-world%20imaging%20needs.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05960v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Mixture%2520of%2520Experts%2520Foundation%2520Model%2520for%2520Scanning%2520Electron%2520Microscopy%2520Image%2520Analysis%26entry.906535625%3DSk%2520Miraj%2520Ahmed%2520and%2520Yuewei%2520Lin%2520and%2520Chuntian%2520Cao%2520and%2520Shinjae%2520Yoo%2520and%2520Xinpei%2520Wu%2520and%2520Won-Il%2520Lee%2520and%2520Nikhil%2520Tiwale%2520and%2520Dan%2520N.%2520Le%2520and%2520Thi%2520Thu%2520Huong%2520Chu%2520and%2520Jiyoung%2520Kim%2520and%2520Kevin%2520G.%2520Yager%2520and%2520Chang-Yong%2520Nam%26entry.1292438233%3DScanning%2520Electron%2520Microscopy%2520%2528SEM%2529%2520is%2520indispensable%2520in%2520modern%2520materials%2520science%252C%2520enabling%2520high-resolution%2520imaging%2520across%2520a%2520wide%2520range%2520of%2520structural%252C%2520chemical%252C%2520and%2520functional%2520investigations.%2520However%252C%2520SEM%2520imaging%2520remains%2520constrained%2520by%2520task-specific%2520models%2520and%2520labor-intensive%2520acquisition%2520processes%2520that%2520limit%2520its%2520scalability%2520across%2520diverse%2520applications.%2520Here%252C%2520we%2520introduce%2520the%2520first%2520foundation%2520model%2520for%2520SEM%2520images%252C%2520pretrained%2520on%2520a%2520large%2520corpus%2520of%2520multi-instrument%252C%2520multi-condition%2520scientific%2520micrographs%252C%2520enabling%2520generalization%2520across%2520diverse%2520material%2520systems%2520and% {"title": "Probing Intrinsic Medical Task Relationships: A Contrastive Learning Perspective", "author": "Jonas Muth and Zdravko Marinov and Simon Rei\u00df", "abstract": "While much of the medical computer vision community has focused on advancing performance for specific tasks, the underlying relationships between tasks, i.e., how they relate, overlap, or differ on a representational level, remain largely unexplored. Our work explores these intrinsic relationships between medical vision tasks, specifically, we investigate 30 tasks, such as semantic tasks (e.g., segmentation and detection), image generative tasks (e.g., denoising, inpainting, or colorization), and image transformation tasks (e.g., geometric transformations). Our goal is to probe whether a data-driven representation space can capture an underlying structure of tasks across a variety of 39 datasets from wildly different medical imaging modalities, including computed tomography, magnetic resonance, electron microscopy, X-ray ultrasound and more. By revealing how tasks relate to one another, we aim to provide insights into their fundamental properties and interconnectedness. To this end, we introduce Task-Contrastive Learning (TaCo), a contrastive learning framework designed to embed tasks into a shared representation space. Through TaCo, we map these heterogeneous tasks from different modalities into a joint space and analyze their properties: identifying which tasks are distinctly represented, which blend together, and how iterative alterations to tasks are reflected in the embedding space. Our work provides a foundation for understanding the intrinsic structure of medical vision tasks, offering a deeper understanding of task similarities and their interconnected properties in embedding spaces.", "link": "http://arxiv.org/abs/2604.05651v1", "date": "2026-04-07", "relevancy": 2.8536, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5836}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5836}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5451}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Probing%20Intrinsic%20Medical%20Task%20Relationships%3A%20A%20Contrastive%20Learning%20Perspective&body=Title%3A%20Probing%20Intrinsic%20Medical%20Task%20Relationships%3A%20A%20Contrastive%20Learning%20Perspective%0AAuthor%3A%20Jonas%20Muth%20and%20Zdravko%20Marinov%20and%20Simon%20Rei%C3%9F%0AAbstract%3A%20While%20much%20of%20the%20medical%20computer%20vision%20community%20has%20focused%20on%20advancing%20performance%20for%20specific%20tasks%2C%20the%20underlying%20relationships%20between%20tasks%2C%20i.e.%2C%20how%20they%20relate%2C%20overlap%2C%20or%20differ%20on%20a%20representational%20level%2C%20remain%20largely%20unexplored.%20Our%20work%20explores%20these%20intrinsic%20relationships%20between%20medical%20vision%20tasks%2C%20specifically%2C%20we%20investigate%2030%20tasks%2C%20such%20as%20semantic%20tasks%20%28e.g.%2C%20segmentation%20and%20detection%29%2C%20image%20generative%20tasks%20%28e.g.%2C%20denoising%2C%20inpainting%2C%20or%20colorization%29%2C%20and%20image%20transformation%20tasks%20%28e.g.%2C%20geometric%20transformations%29.%20Our%20goal%20is%20to%20probe%20whether%20a%20data-driven%20representation%20space%20can%20capture%20an%20underlying%20structure%20of%20tasks%20across%20a%20variety%20of%2039%20datasets%20from%20wildly%20different%20medical%20imaging%20modalities%2C%20including%20computed%20tomography%2C%20magnetic%20resonance%2C%20electron%20microscopy%2C%20X-ray%20ultrasound%20and%20more.%20By%20revealing%20how%20tasks%20relate%20to%20one%20another%2C%20we%20aim%20to%20provide%20insights%20into%20their%20fundamental%20properties%20and%20interconnectedness.%20To%20this%20end%2C%20we%20introduce%20Task-Contrastive%20Learning%20%28TaCo%29%2C%20a%20contrastive%20learning%20framework%20designed%20to%20embed%20tasks%20into%20a%20shared%20representation%20space.%20Through%20TaCo%2C%20we%20map%20these%20heterogeneous%20tasks%20from%20different%20modalities%20into%20a%20joint%20space%20and%20analyze%20their%20properties%3A%20identifying%20which%20tasks%20are%20distinctly%20represented%2C%20which%20blend%20together%2C%20and%20how%20iterative%20alterations%20to%20tasks%20are%20reflected%20in%20the%20embedding%20space.%20Our%20work%20provides%20a%20foundation%20for%20understanding%20the%20intrinsic%20structure%20of%20medical%20vision%20tasks%2C%20offering%20a%20deeper%20understanding%20of%20task%20similarities%20and%20their%20interconnected%20properties%20in%20embedding%20spaces.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05651v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DProbing%2520Intrinsic%2520Medical%2520Task%2520Relationships%253A%2520A%2520Contrastive%2520Learning%2520Perspective%26entry.906535625%3DJonas%2520Muth%2520and%2520Zdravko%2520Marinov%2520and%2520Simon%2520Rei%25C3%259F%26entry.1292438233%3DWhile%2520much%2520of%2520the%2520medical%2520computer%2520vision%2520community%2520has%2520focused%2520on%2520advancing%2520performance%2520for%2520specific%2520tasks%252C%2520the%2520underlying%2520relationships%2520between%2520tasks%252C%2520i.e.%252C%2520how%2520they%2520relate%252C%2520overlap%252C%2520or%2520differ%2520on%2520a%2520representational%2520level%252C%2520remain%2520largely%2520unexplored.%2520Our%2520work%2520explores%2520these%2520intrinsic%2520relationships%2520between%2520medical%2520vision%2520tasks%252C%2520specifically%252C%2520we%2520investigate%252030%2520tasks%252C%2520such%2520as%2520semantic%2520tasks%2520%2528e.g.%252C%2520segmentation%2520and%2520detection%2529%252C%2 {"title": "MINERVA-Cultural: A Benchmark for Cultural and Multilingual Long Video Reasoning", "author": "Darshan Singh and Arsha Nagrani and Kawshik Manikantan and Harman Singh and Dinesh Tewari and Tobias Weyand and Cordelia Schmid and Anelia Angelova and Shachi Dave", "abstract": "Recent advancements in video models have shown tremendous progress, particularly in long video understanding. However, current benchmarks predominantly feature western-centric data and English as the dominant language, introducing significant biases in evaluation. To address this, we introduce MINERVA-Cultural, a challenging benchmark for multicultural and multilingual video reasoning. MINERVA-Cultural comprises high-quality, entirely human-generated annotations from diverse, region-specific cultural videos across 18 global locales. Unlike prior work that relies on automatic translations, MINERVA-Cultural provides complex questions, answers, and multi-step reasoning steps, all crafted in native languages. Making progress on MINERVA-Cultural requires a deeply situated understanding of visual cultural context. Furthermore, we leverage MINERVA-Cultural's reasoning traces to construct evidence-based graphs and propose a novel iterative strategy using these graphs to identify fine-grained errors in reasoning. Our evaluations reveal that SoTA Video-LLMs struggle significantly, performing substantially below human-level accuracy, with errors primarily stemming from the visual perception of cultural elements. MINERVA-Cultural will be publicly available under https://github.com/google-deepmind/neptune?tab=readme-ov-file\\#minerva-cultural", "link": "http://arxiv.org/abs/2601.10649v2", "date": "2026-04-07", "relevancy": 2.8304, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5752}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": 20fine-grained%20errors%20in%20reasoning.%20Our%20evaluations%20reveal%20that%20SoTA%20Video-LLMs%20struggle%20significantly%2C%20performing%20substantially%20below%20human-level%20accuracy%2C%20with%20errors%20primarily%20stemming%20from%20the%20visual%20perception%20of%20cultural%20elements.%20MINERVA-Cultural%20will%20be%20publicly%20available%20under%20https%3A//github.com/google-deepmind/neptune%3Ftab%3Dreadme-ov-file%5C%23minerva-cultural%0ALink%3A%20http%3A//arxiv.org/abs/2601.10649v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMINERVA-Cultural%253A%2520A%2520Benchmark%2520for%2520Cultural%2520and%2520Multilingual%2520Long%2520Video%2520Reasoning%26entry.906535625%3DDarshan%2520Singh%2520and%2520Arsha%2520Nagrani%2520and%2520Kawshik%2520Manikantan%2520and%2520Harman%2520Singh%2520and%2520Dinesh%2520Tewari%2520and%2520Tobias%2520Weyand%2520and%2520Cordelia%2520Schmid%2520and%2520Anelia%2520Angelova%2520and%2520Shachi%2520Dave%26entry.1292438233%3DRecent%2520advancements%2520in%2520video%2520models%2520have%2520shown%2520tremendous%2520progress%252C%2520particularly%2520in%2520long%2520video%2520understanding.%2520However%252C%2520current%2520benchmarks%2520predominantly%2520feature%2520western-centric%2520data%2520and%2520English%2520as%2520the%2520dominant%2520language%252C%2520introducing%2520significant%2520biases%2520in%2520evaluation.%2520To%2520address%2520this%252C%2520we%2520introduce%2520MINERVA-Cultural%252C%2520a%2520challenging%2520benchmark%2520for%2520multicultural%2520and%2520multilingual%2520video%2520reasoning.%2520MINERVA-Cultural%2520comprises%2520high-quality%252C%2520entirely%2520human-generated%2520annotations%2520from%2520diverse%252C%2520region-specific%2520cultural%2520videos%2520across%252018%2520global%2520locales.%2520Unlike%2520prior%2520work%2520that%2520relies%2520on%2520automatic%2520translations%252C%2520MINERVA-Cultural%2520provides%2520 {"title": "Gesture-Aware Pretraining and Token Fusion for 3D Hand Pose Estimation", "author": "Rui Hong and Jana Kosecka", "abstract": "Estimating 3D hand pose from monocular RGB images is fundamental for applications in AR/VR, human-computer interaction, and sign language understanding. In this work we focus on a scenario where a discrete set of gesture labels is available and show that gesture semantics can serve as a powerful inductive bias for 3D pose estimation. We present a two-stage framework: gesture-aware pretraining that learns an informative embedding space using coarse and fine gesture labels from InterHand2.6M, followed by a per-joint token Transformer guided by gesture embeddings as intermediate representations for final regression of MANO hand parameters. Training is driven by a layered objective over parameters, joints, and structural constraints. Experiments on InterHand2.6M demonstrate that gesture-aware pretraining consistently improves single-hand accuracy over the state-of-the-art EANet baseline, and that the benefit transfers across architectures without any modification.", "link": "http://arxiv.org/abs/2603.17396v3", "date": "2026-04-07", "relevancy": 2.8245, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.572}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5685}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5542}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gesture-Aware%20Pretraining%20and%20Token%20Fusion%20for%203D%20Hand%20Pose%20Estimation&body=Title%3A%20Gesture-Aware%20Pretraining%20and%20Token%20Fusion%20for%203D%20Hand%20Pose%20Estimation%0AAuthor%3A%20Rui%20Hong%20and%20Jana%20Kosecka%0AAbstract%3A%20Estimating%203D%20hand%20pose%20from%20mon at%2520gesture%2520semantics%2520can%2520serve%2520as%2520a%2520powerful%2520inductive%2520bias%2520for%25203D%2520pose%2520estimation.%2520We%2520present%2520a%2520two-stage%2520framework%253A%2520gesture-aware%2520pretraining%2520that%2520learns%2520an%2520informative%2520embedding%2520space%2520using%2520coarse%2520and%2520fine%2520gesture%2520labels%2520from%2520InterHand2.6M%252C%2520followed%2520by%2520a%2520per-joint%2520token%2520Transformer%2520guided%2520by%2520gesture%2520embeddings%2520as%2520intermediate%2520representations%2520for%2520final%2520regression%2520of%2520MANO%2520hand%2520parameters.%2520Training%2520is%2520driven%2520by%2520a%2520layered%2520objective%2520over%2520parameters%252C%2520joints%252C%2520and%2520structural%2520constraints.%2520Experiments%2520on%2520InterHand2.6M%2520demonstrate%2520that%2520gesture-aware%2520pretraining%2520consistently%2520improves%2520single-hand%2520accuracy%2520over%2520the%2520state-of-the-art%2520EANet%2520baseline%252C%2520and%2520that%2520the%2520benefit%2520transfers%2520across%2520architectures%2520without%2520any%2520modification.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.17396v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Gesture-Aware%20Pretraining%20and%20Token%20Fusion%20for%203D%20Hand%20Pose%20Estimation&entry.906535625=Rui%20Hong%20and%20Jana%20Kosecka&entry.1292438233=Estimating%203D%20hand%20pose%20from%20monocular%20RGB%20images%20is%20fundamental%20for%20applications%20in%20AR/VR%2C%20human-computer%20interaction%2C%20and%20sign%20language%20understanding.%20In%20this%20work%20we%20focus%20on%20a%20scenario%20where%20a%20discrete%20set%20of%20gesture%20labels%20is%20available%20and%20show%20that%20gesture%20semantics%20can%20serve%20as%20a%20powerful%20inductive%20bias%20for%203D%20pose%20estimation.%20We%20present%20a%20two-stage%20framework%3A%20gesture-aware%20pretraini {"title": "Sim-CLIP: Unsupervised Siamese Adversarial Fine-Tuning for Robust and Semantically-Rich Vision-Language Models", "author": "Md Zarif Hossain and Ahmed Imteaj", "abstract": "Vision-Language Models (VLMs) rely heavily on pretrained vision encoders to support downstream tasks such as image captioning, visual question answering, and zero-shot classification. Despite their strong performance, these encoders remain highly vulnerable to imperceptible adversarial perturbations, which can severely degrade both robustness and semantic quality in multimodal reasoning. In this work, we introduce Sim-CLIP, an unsupervised adversarial fine-tuning framework that enhances the robustness of the CLIP vision encoder while preserving overall semantic representations. Sim-CLIP adopts a Siamese training architecture with a cosine similarity objective and a symmetric stop-gradient mechanism to enforce semantic alignment between clean and adversarial views. This design avoids large-batch contrastive learning and additional momentum encoders, enabling robust training with low computational overhead. We evaluate Sim-CLIP across multiple Vision-Language Models and tasks under both targeted and untargeted adversarial attacks. Experimental results demonstrate that Sim-CLIP consistently outperforms state-of-the-art robust CLIP variants, achieving stronger adversarial robustness while maintaining or improving semantic fidelity. These findings highlight the limitations of existing adversarial defenses and establish Sim-CLIP as an effective and scalable solution for robust vision-language representation learning.", "link": "http://arxiv.org/abs/2407.14971v3", "date": "2026-04-07", "relevancy": 2.8217, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5984}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5473}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5473}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sim-CLIP%3A%20Unsupervised%20Siamese%20Adversarial%20Fine-Tuning%20for%20Robust%20and%20Semantically-Rich%20Vision-Language%20Models&body=Title%3A%20Sim-CLIP%3A%20Unsupervised%20Siamese%20Adversarial%20Fine-Tuning%20for%20Robust%20and%20Semantically-Rich%20Vision-Language%20Models%0AAuthor%3A%20Md%20Zarif%20Hossain%20and%20Ahmed%20Imteaj%0AAbstract%3A%20Vision-Language%20Models%20%28VLMs%29%20rely%20heavily%20on%20pretrained%20vision%20encoders%20to%20support%20downstream%20tasks%20such%20as%20image%20captioning%2C%20visual%20question%20answering%2C%20and%20zero-shot%20classification.%20Despite%20their%20strong%20performance%2C%20these%20encoders%20remain%20highly%20vulnerable%20to%20imperceptible%20adversarial%20perturbations%2C%20which%20can%20severely%20degrade%20both%20robustness%20and%20semantic%20quality%20in%20multimodal%20reasoning.%20In%20this%20work%2C%20we%20introduce%20Sim-CLIP%2C%20an%20unsupervised%20adversarial%20fine-tuning%20framework%20that%20enhances%20the%20robustness%20of%20the%20CLIP%20vision%20encoder%20while%20preserving%20overall%20semantic%20representations.%20Sim-CLIP%20adopts%20a%20Siamese%20training%20architecture%20with%20a%20cosine%20similarity%20objective%20and%20a%20symmetric%20stop-gradient%20mechanism%20to%20enforce%20semantic%20alignment%20between%20clean%20and%20adversarial%20views.%20This%20design%20avoids%20large-batch%20contrastive%20learning%20and%20additional%20momentum%20encoders%2C%20enabling%20robust%20training%20with%20low%20computational%20overhead.%20We%20evaluate%20Sim-CLIP%20across%20multiple%20Vision-Language%20Models%20and%20tasks%20under%20both%20targeted%20and%20untargeted%20adversarial%20attacks.%20Experimental%20results%20demonstrate%20that%20Sim-CLIP%20consistently%20outperforms%20state-of-the-art%20robust%20CLIP%20variants%2C%20achieving%20stronger%20adversarial%20robustness%20while%20maintaining%20or%20improving%20semantic%20fidelity.%20These%20findings%20highlight%20the%20limitations%20of%20existing%20adversarial%20defenses%20and%20establish%20Sim-CLIP%20as%20an%20effective%20and%20scalable%20solution%20for%20robust%20vision-language%20representation%20learning.%0ALink%3A%20http%3A//arxiv.org/abs/2407.14971v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSim-CLIP%253A%2520Unsupervised%2520Siamese%2520Adversarial%2520Fine-Tuning%2520for%2520Robust%2520and%2520Semantically-Rich%2520Vision-Language%2520Models%26entry.906535625%3DMd%2520Zarif%2520Hossain%2520and%2520Ahmed%2520Imteaj%26entry.1292438233%3DVision-Language%2520Models%2520%2528VLMs%2529%2520rely%2520heavily%2520on%2520pretrained%2520vision%2520encoders%2520to%2520support%2520downstream%2520tasks%2520such%2520as%2520image%2520captioning%252C%2520visual%2520question%2520answering%252C%2520and%2520zero-shot%2520classification.%2520Despite%2520their%2520strong%2520performance%252C%2520these%2520encoders%2520remain%2520highly%2520vulnerable%2520to%2520imperceptible%2520adversarial%2520perturbations%252C%2520which%2520can%2520severely%2520degrade%2520both%2520robustness%2520and%2520semantic%2520quality%2520in%2520multimodal%2520reasoning.%2520In%2520this%2520work%252C%2520we%2520introduce%2520Sim-CLIP%252C%2520an%2520unsupervised%2520adversarial%2520fine-tuning%2520framework%2520that%2520enhances%2520the%2520robustness%2520of%2520the%2520CLIP%2520vision%2520encoder%2520while%2520preserving%2520overall%2520semantic%2520representations.%2520Sim-CLIP%2520adopts%2520a%2520Siamese%2520training%2520architecture%2520with%2520a%2520cosine%2520similarity%2520objective%2520and%2520a%2520symmetric%2520stop-gradient%2520mechanism%2520to%2520enforce%2520semantic%2520alignment%2520between 0unsupervised%20adversarial%20fine-tuning%20framework%20that%20enhances%20the%20robustness%20of%20the%20CLIP%20vision%20encoder%20while%20preserving%20overall%20semantic%20representations.%20Sim-CLIP%20adopts%20a%20Siamese%20training%20architecture%20with%20a%20cosine%20similarity%20objective%20and%20a%20symmetric%20stop-gradient%20mechanism%20to%20enforce%20semantic%20alignment%20between%20clean%20and%20adversarial%20views.%20This%20design%20avoids%20large-batch%20contrastive%20learning%20and%20additional%20momentum%20encoders%2C%20enabling%20robust%20training%20with%20low%20computational%20overhead.%20We%20evaluate%20Sim-CLIP%20across%20multiple%20Vision-Language%20Models%20and%20tasks%20under%20both%20targeted%20and%20untargeted%20adversarial%20attacks.%20Experimental%20results%20demonstrate%20that%20Sim-CLIP%20consistently%20outperforms%20state-of-the-art%20robust%20CLIP%20variants%2C%20achieving%20stronger%20adversarial%20robustness%20while%20maintaining%20or%20improving%20semantic%20fidelity.%20These%20findings%20highlight%20the%20limitations%20of%20existing%20adversarial%20defenses%20and%20establish%20Sim-CLIP%20as%20an%20effective%20and%20scalable%20solution%20for%20robust%20vision-language%20representation%20learning.&entry.1838667208=http%3A//arxiv.org/abs/2407.14971v3&entry.124074799=Read"},
{"title": "Let Geometry GUIDE: Layer-wise Unrolling of Geometric Priors in Multimodal LLMs", "author": "Chongyu Wang and Ting Huang and Chunyu Sun and Xinyu Ning and Di Wang and Hao Tang", "abstract": "Multimodal Large Language Models (MLLMs) have achieved remarkable progress in 2D visual tasks but still exhibit limited physical spatial awareness when processing real-world visual streams. Recently, feed-forward geometric foundation models, which implicitly extract geometric priors, have provided a new pathway to address this issue. However, existing geometry-aware MLLMs are predominantly constrained by the paradigm of single deep-layer extraction and input-level fusion. This flattened fusion leads to the loss of local geometric details and causes semantic mismatches in the early layers. To break this bottleneck, we propose GUIDE (Geometric Unrolling Inside MLLM Early-layers), a progressive geometric priors injection framework. GUIDE performs multi-level sampling within the geometric encoder, comprehensively capturing multi-granularity features ranging from local edges to global topologies. Subsequently, we rigorously align and fuse these multi-level geometric priors step-by-step with the early layers of the MLLM. Building upon the injection of multi-granularity geometric information, this design guides the model to progressively learn the 2D-to-3D transitional process. Furthermore, we introduce a context-aware gating that enables the model to fetch requisite spatial cues based on current semantics, thereby maximizing the utilization efficiency of spatial priors and effectively suppressing redundant geometric noise. Extensive experiments demonstrate that GUIDE significantly outperforms existing baselines on multiple complex spatial reasoning and perception tasks, establishing a novel paradigm for integrating 3D geometric priors into large models.", "link": "http://arxiv.org/abs/2604.05695v1", "date": "2026-04-07", "relevancy": 2.8186, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5805}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5553}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5553}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Let%20Geometry%20GUIDE%3A%20Layer-wise%20Unrolling%20of%20Geometric%20Priors%20in%20Multimodal%20LLMs&body=Title%3A%20Let%20Geometry%20GUIDE%3A%20Layer-wise%20Unrolling%20of%20Geometric%20Priors%20in%20Multimodal%20LLMs%0AAuthor%3A%20Chongyu%20Wang%20and%20Ting%20Huang%20and%20Chunyu%20Sun%20and%20Xinyu%20Ning%20and%20Di%20Wang%20and%20Hao%20Tang%0AAbstract%3A%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20have%20achieved%20remarkable%20progress%20in%202D%20visual%20tasks%20but%20still%20exhibit%20limited%20physical%20spatial%20awareness%20when%20processing%20real-world%20visual%20streams.%20Recently%2C%20feed-forward%20geometric%20foundation%20models%2C%20which%20implicitly%20extract%20geometric%20priors%2C%20have%20provided%20a%20new%20pathway%20to%20address%20this%20issue.%20However%2C%20existing%20geometry-aware%20MLLMs%20are%20predominantly%20constrained%20by%20the%20paradigm%20of%20single%20deep-layer%20extraction%20and%20input-level%20fusion.%20This%20flattened%20fusion%20leads%20to%20the%20loss%20of%20local%20geometric%20details%20and%20causes%20semantic%20mismatches%20in%20the%20early%20layers.%20To%20break%20this%20bottleneck%2C%20we%20propose%20GUIDE%20%28Geometric%20Unrolling%20Inside%20MLLM%20Early-layers%29%2C%20a%20progressive%20geometric%20priors%20injection%20framework.%20GUIDE%20performs%20multi-level%20sampling%20within%20the%20geometric%20encoder%2C%20comprehensively%20capturing%20multi-granularity%20features%20ranging%20from%20local%20edges%20to%20global%20topologies.%20Subsequently%2C%20we%20rigorously%20align%20and%20fuse%20these%20multi-level%20geometric%20priors%20step-by-step%20with%20the%20early%20layers%20of%20the%20MLLM.%20Building%20upon%20the%20injection%20of%20multi-granularity%20geometric%20information%2C%20this%20design%20guides%20the%20model%20to%20progressively%20learn%20the%202D-to-3D%20transitional%20process.%20Furthermore%2C%20we%20introduce%20a%20context-aware%20gating%20that%20enables%20the%20model%20to%20fetch%20requisite%20spatial%20cues%20based%20on%20current%20semantics%2C%20thereby%20maximizing%20the%20utilization%20efficiency%20of%20spatial%20priors%20and%20effectively%20suppressing%20redundant%20geometric%20noise.%20Extensive%20experiments%20demonstrate%20that%20GUIDE%20significantly%20outperforms%20existing%20baselines%20on%20multiple%20complex%20spatial%20reasoning%20and%20perception%20tasks%2C%20establishing%20a%20novel%20paradigm%20for%20integrating%203D%20geometric%20priors%20into%20large%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05695v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLet%2520Geometry%2520GUIDE%253A%2520Layer-wise%2520Unrolling%2520of%2520Geometric%2520Priors%2520in%2520Multimodal%2520LLMs%26entry.906535625%3DChongyu%2520Wang%2520and%2520Ting%2520Huang%2520and%2520Chunyu%2520Sun%2520and%2520Xinyu%2520Ning%2520and%2520Di%2520Wang%2520and%2520Hao%2520Tang%26entry.1292438233%3DMultimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520have%2520achieved%2520remarkable%2520progress%2520in%25202D%2520visual%2520tasks%2520but%2520still%2520exhibit%2520limited%2520physical%2520spatial%2520awareness%2520when%2520processing%2520real-world%2520visual%2520streams.%2520Recently%252C%2520feed-forward%2520geometric%2520foundation%2520models%252C%2520which%2520implicitly%2520extract%2520geometric%2520priors%252C%2520have%2520provided%2520a%2520new%2520p {"title": "Thinking with Video: Video Generation as a Promising Multimodal Reasoning Paradigm", "author": "Jingqi Tong and Yurong Mou and Hangcheng Li and Mingzhe Li and Yongzhuo Yang and Ming Zhang and Qiguang Chen and Tianyi Liang and Xiaomeng Hu and Yining Zheng and Xinchi Chen and Jun Zhao and Xuanjing Huang and Xipeng Qiu", "abstract": "The \"Thinking with Text\" and \"Thinking with Images\" paradigms significantly improve the reasoning abilities of large language models (LLMs) and Vision-Language Models (VLMs). However, these paradigms have inherent limitations. (1) Images capture only single moments and fail to represent dynamic processes or continuous changes, and (2) The separation of text and vision as distinct modalities, which hinders unified multimodal understanding and generation. Therefore, we propose \"Thinking with Video\", a new paradigm that leverages video generation models such as Sora-2 to use video frames as a unified medium for multimodal reasoning. To support this exploration, we developed the Video Thinking Benchmark (VideoThinkBench), which covers both vision-centric tasks (e.g., Eyeballing Puzzles) and text-centric tasks (e.g., GSM8K and MMMU). Our evaluation on VideoThinkBench establishes Sora-2 as a capable reasoner. On vision-centric tasks, Sora-2 is comparable to state-of-the-art (SOTA) VLMs, and even surpasses GPT-5 by 10% on eyeballing puzzles. On text-centric tasks, Sora-2 achieves 92% accuracy on MATH, and 69.2% accuracy on MMMU. Furthermore, we systematically analyze the source of these abilities. We also find that self-consistency and in-context learning can improve Sora-2's performance. In summary, our findings show that the video generation model is the potential unified multimodal understanding and generation model, positioning \"Thinking with Video\" as a potential unified multimodal reasoning paradigm.", "link": "http://arxiv.org/abs/2511.04570v2", "date": "2026-04-07", "relevancy": 2.8151, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5641}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5625}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5625}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Thinking%20with%20Video%3A%20Video%20Generation%20as%20a%20Promising%20Multimodal%20Reasoning%20Paradigm&body=Title%3A%20Thinking%20with%20Video%3A%20Video%20Generation%20as%20a%20Promising%20Multimodal%20Reasoning%20Paradigm%0AAuthor%3A%20Jingqi%20Tong%20and%20Yurong%20Mou%20and%20Hangcheng%20Li%20and%20Mingzhe%20Li%20and%20Yongzhuo%20Yang%20and%20Ming%20Zhang%20and%20Qiguang%20Chen%20and%20Tianyi%20Liang%20and%20Xiaomeng%20Hu%20and%20Yining%20Zheng%20and%20Xinchi%20Chen%20and%20Jun%20Zhao%20and%20Xuanjing%20Huang%20and%20Xipeng%20Qiu%0AAbstract%3A%20The%20%22Thinking%20with%20Text%22%20and%20%22Thinking%20with%20Images%22%20paradigms%20significantly%20improve%20the%20reasoning%20abilities%20of%20large%20language%20models%20%28LLMs%29%20and%20Vision-Language%20Models%20%28VLMs%29.%20However%2C%20these%20paradigms%20have%20inherent%20limitations.%20%281%29%20Images%20capture%20only%20single%20moments%20and%20fail%20to%20represent%20dynamic%20processes%20or%20continuous%20changes%2C%20and%20%282%29%20The%20separation%20of%20text%20and%20vision%20as%20distinct%20modalities%2C%20which%20hinders%20unified%20multimodal%20understanding%20and%20generation.%20Therefore%2C%20we%20propose%20%22Thinking%20with%20Video%22%2C%20a%20new%20paradigm%20that%20leverages%20video%20generation%20models%20such%20as%20Sora-2%20to%20use%20video%20frames%20as%20a%20unified%20medium%20for%20multimodal%20reasoning.%20To%20support%20this%20exploration%2C%20we%20developed%20the%20Video%20Thinking%20Benchmark%20%28VideoThinkBench%29%2C%20which%20covers%20both%20vision-centric%20tasks%20%28e.g.%2C%20Eyeballing%20Puzzles%29%20and%20text-centric%20tasks%20%28e.g.%2C%20GSM8K%20and%20MMMU%29.%20Our%20evaluation%20on%20VideoThinkBench%20establishes%20Sora-2%20as%20a%20capable%20reasoner.%20On%20vision-centric%20tasks%2C%20Sora-2%20is%20comparable%20to%20state-of-the-art%20%28SOTA%29%20VLMs%2C%20and%20even%20surpasses%20GPT-5%20by%2010%25%20on%20eyeballing%20puzzles.%20On%20text-centric%20tasks%2C%20Sora-2%20achieves%2092%25%20accuracy%20on%20MATH%2C%20and%2069.2%25%20accuracy%20on%20MMMU.%20Furthermore%2C%20we%20systematically%20analyze%20the%20source%20of%20these%20abilities.%20We%20also%20find%20that%20self-consistency%20and%20in-context%20learning%20can%20improve%20Sora-2%27s%20performance.%20In%20summary%2C%20our%20findings%20show%20that%20the%20video%20generation%20model%20is%20the%20potential%20unified%20multimodal%20understanding%20and%20generation%20model%2C%20positioning%20%22Thinking%20with%20Video%22%20as%20a%20potential%20unified%20multimodal%20reasoning%20paradigm.%0ALink%3A%20http%3A//arxiv.org/abs/2511.04570v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThinking%2520with%2520Video%253A%2520Video%2520Generation%2520as%2520a%2520Promising%2520Multimodal%2520Reasoning%2520Paradigm%26entry.906535625%3DJingqi%2520Tong%2520and%2520Yurong%2520Mou%2520and%2520Hangcheng%2520Li%2520and%2520Mingzhe%2520Li%2520and%2520Yongzhuo%2520Yang%2520and%2520Ming%2520Zhang%2520and%2520Qiguang%2520Chen%2520and%2520Tianyi%2520Liang%2520and%2520Xiaomeng%2520Hu%2520and%2520Yining%2520Zheng%2520and%2520Xinchi%2520Chen%2520and%2520Jun%2520Zhao%2520and%2520Xuanjing%2520Huang%2520and%2520Xipeng%2520Qiu%26entry.1292438233%3DThe%2520%2522Thinking%2520with%2520Text%2522%2520and%2520%2522Thinking%2520with%2520Images%2522%2520paradigms%2520significantly%2520improve%2520the%2520reasoning%2520abili 20covers%20both%20vision-centric%20tasks%20%28e.g.%2C%20Eyeballing%20Puzzles%29%20and%20text-centric%20tasks%20%28e.g.%2C%20GSM8K%20and%20MMMU%29.%20Our%20evaluation%20on%20VideoThinkBench%20establishes%20Sora-2%20as%20a%20capable%20reasoner.%20On%20vision-centric%20tasks%2C%20Sora-2%20is%20comparable%20to%20state-of-the-art%20%28SOTA%29%20VLMs%2C%20and%20even%20surpasses%20GPT-5%20by%2010%25%20on%20eyeballing%20puzzles.%20On%20text-centric%20tasks%2C%20Sora-2%20achieves%2092%25%20accuracy%20on%20MATH%2C%20and%2069.2%25%20accuracy%20on%20MMMU.%20Furthermore%2C%20we%20systematically%20analyze%20the%20source%20of%20these%20abilities.%20We%20also%20find%20that%20self-consistency%20and%20in-context%20learning%20can%20improve%20Sora-2%27s%20performance.%20In%20summary%2C%20our%20findings%20show%20that%20the%20video%20generation%20model%20is%20the%20potential%20unified%20multimodal%20understanding%20and%20generation%20model%2C%20positioning%20%22Thinking%20with%20Video%22%20as%20a%20potential%20unified%20multimodal%20reasoning%20paradigm.&entry.1838667208=http%3A//arxiv.org/abs/2511.04570v2&entry.124074799=Read"},
{"title": "Lightweight Multimodal Adaptation of Vision Language Models for Species Recognition and Habitat Context Interpretation in Drone Thermal Imagery", "author": "Hao Chen and Fang Qiu and Fangchao Dong and Defei Yang and Eve Bohnett and Li An", "abstract": "This study proposes a lightweight multimodal adaptation framework to bridge the representation gap between RGB-pretrained VLMs and thermal infrared imagery, and demonstrates its practical utility using a real drone-collected dataset. A thermal dataset was developed from drone-collected imagery and was used to fine-tune VLMs through multimodal projector alignment, enabling the transfer of information from RGB-based visual representations to thermal radiometric inputs. Three representative models, including InternVL3-8B-Instruct, Qwen2.5-VL-7B-Instruct, and Qwen3-VL-8B-Instruct, were benchmarked under both closed-set and open-set prompting conditions for species recognition and instance enumeration. Among the tested models, Qwen3-VL-8B-Instruct with open-set prompting achieved the best overall performance, with F1 scores of 0.935 for deer, 0.915 for rhino, and 0.968 for elephant, and within-1 enumeration accuracies of 0.779, 0.982, and 1.000, respectively. In addition, combining thermal imagery with simultaneously collected RGB imagery enabled the model to generate habitat-context information, including land-cover characteristics, key landscape features, and visible human disturbance. Overall, the findings demonstrate that lightweight projector-based adaptation provides an effective and practical route for transferring RGB-pretrained VLMs to thermal drone imagery, expanding their utility from object-level recognition to habitat-context interpretation in ecological monitoring.", "link": "http://arxiv.org/abs/2604.06124v1", "date": "2026-04-07", "relevancy": 2.805, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", {"title": "PhaseFlow4D: Physically Constrained 4D Beam Reconstruction via Feedback-Guided Latent Diffusion", "author": "Alexander Scheinker and Alexander Plastun and Peter Ostroumov", "abstract": "We address the problem of recovering a time-varying 4D distribution from a sparse sequence of 2D projections - analogous to novel-view synthesis from sparse cameras, but applied to the 4D transverse phase space density $\u03c1(x,p_x,y,p_y)$ of charged particle beams. Direct single shot measurement of this high-dimensional distribution is physically impossible in real particle accelerator systems; only limited 1D or 2D projections are accessible. We propose PhaseFlow4D, a feedback-guided latent diffusion model that reconstructs and tracks the full 4D phase space from incomplete 2D observations alone, with built-in hard physics constraints. Our core technical contribution is a 4D VAE whose decoder generates the full 4D phase space tensor, from which 2D projections are analytically computed and compared against 2D beam measurements. This projection-consistency constraint guarantees physical correctness by construction - not as a soft penalty, but as an architectural prior. An adaptive feedback loop then continuously tunes the conditioning vector of the latent diffusion model to track time-varying distributions online without retraining. We validate on multi-particle simulations of heavy-ion beams at the Facility for Rare Isotope Beams (FRIB), where full physics simulations require $\\sim$6 hours on a 100-core HPC system. PhaseFlow4D achieves accurate 4D reconstructions 11000$\\times$ faster while faithfully tracking distribution shifts under time-varying source conditions - demonstrating that principled generative reconstruction under incomplete observations transfers robustly beyond visual domains.", "link": "http://arxiv.org/abs/2604.03885v2", "date": "2026-04-07", "relevancy": 2.8019, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.or

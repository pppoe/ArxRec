{"title": "PhyAVBench: A Challenging Audio Physics-Sensitivity Benchmark for Physically Grounded Text-to-Audio-Video Generation", "author": "Tianxin Xie and Wentao Lei and Kai Jiang and Guanjie Huang and Pengfei Zhang and Chunhui Zhang and Fengji Ma and Haoyu He and Han Zhang and Jiangshan He and Jinting Wang and Linghan Fang and Lufei Gao and Orkesh Ablet and Peihua Zhang and Ruolin Hu and Shengyu Li and Weilin Lin and Xiaoyang Feng and Xinyue Yang and Yan Rong and Yanyun Wang and Zihang Shao and Zelin Zhao and Chenxing Li and Shan Yang and Wenfu Wang and Meng Yu and Dong Yu and Li Liu", "abstract": "Text-to-audio-video (T2AV) generation is central to applications such as filmmaking and world modeling. However, current models often fail to produce physically plausible sounds. Previous benchmarks primarily focus on audio-video temporal synchronization, while largely overlooking explicit evaluation of audio-physics grounding, thereby limiting the study of physically plausible audio-visual generation. To address this issue, we present PhyAVBench, the first benchmark that systematically evaluates the audio-physics grounding capabilities of T2AV, image-to-audio-video (I2AV), and video-to-audio (V2A) models. PhyAVBench offers PhyAV-Sound-11K, a new dataset of 25.5 hours of 11,605 audible videos collected from 184 participants to ensure diversity and avoid data leakage. It contains 337 paired-prompt groups with controlled physical variations that drive sound differences, each grounded with an average of 17 videos and spanning 6 audio-physics dimensions and 41 fine-grained test points. Each prompt pair is annotated with the physical factors underlying their acoustic differences. Importantly, PhyAVBench leverages paired text prompts to evaluate this capability. We term this evaluation paradigm the Audio-Physics Sensitivity Test (APST) and introduce a novel metric, the Contrastive Physical Response Score (CPRS), which quantifies the acoustic consistency between generated videos and their real-world counterparts. We conduct a comprehensive evaluation of 17 state-of-the-art models. Our results reveal that even leading commercial models struggle with fundamental audio-physical phenomena, exposing a critical gap beyond audio-visual synchronization and pointing to future research directions. We hope PhyAVBench will serve as a foundation for advancing physically grounded audio-visual generation. Prompts, ground-truth, and generated video samples are available at https://phyavbench.pages.dev/.", "link": "http://arxiv.org/abs/2512.23994v2", "date": "2026-04-07", "relevancy": 2.7957, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.6065}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5653}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5056}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PhyAVBench%3A%20A%20Challenging%20Audio%20Physics-Sensitivity%20Benchmark%20for%20Physically%20Grounded%20Text-to-Audio-Video%20Generation&body=Title%3A%20PhyAVBench%3A%20A%20Challenging%20Audio%20Physics-Sensitivity%20Benchmark%20for%20Physically%20Grounded%20Text-to-Audio-Video%20Generation%0AAuthor%3A%20Tianxin%20Xie%20and%20Wentao%20Lei%20and%20Kai%20Jiang%20and%20Guanjie%20Huang%20and%20Pengfei%20Zhang%20and%20Chunhui%20Zhang%20and%20Fengji%20Ma%20and%20Haoyu%20He%20and%20Han%20Zhang%20and%20Jiangshan%20He%20and%20Jinting%20Wang%20and%20Linghan%20Fang%20and%20Lufei%20Gao%20and%20Orkesh%20Ablet%20and%20Peihua%20Zhang%20and%20Ruolin%20Hu%20and%20Shengyu%20Li%20and%20Weilin%20Lin%20and%20Xiaoyang%20Feng%20and%20Xinyue%20Yang%20and%20Yan%20Rong%20and%20Yanyun%20Wang%20and%20Zihang%20Shao%20and%20Zelin%20Zhao%20and%20Chenxing%20Li%20and%20Shan%20Yang%20and%20Wenfu%20Wang%20and%20Meng%20Yu%20and%20Dong%20Yu%20and%20Li%20Liu%0AAbstract%3A%20Text-to-audio-video%20%28T2AV%29%20generation%20is%20central%20to%20applications%20such%20as%20filmmaking%20and%20world%20modeling.%20However%2C%20current%20models%20often%20fail%20to%20produce%20physically%20plausible%20sounds.%20Previous%20benchmarks%20primarily%20focus%20on%20audio-video%20temporal%20synchronization%2C%20while%20largely%20overlooking%20explicit%20evaluation%20of%20audio-physics%20grounding%2C%20thereby%20limiting%20the%20study%20of%20physically%20plausible%20audio-visual%20generation.%20To%20address%20this%20issue%2C%20we%20present%20PhyAVBench%2C%20the%20first%20benchmark%20that%20systematically%20evaluates%20the%20audio-physics%20grounding%20capabilities%20of%20T2AV%2C%20image-to-audio-video%20%28I2AV%29%2C%20and%20video-to-audio%20%28V2A%29%20models.%20PhyAVBench%20offers%20PhyAV-Sound-11K%2C%20a%20new%20dataset%20of%2025.5%20hours%20of%2011%2C605%20audible%20videos%20collected%20from%20184%20participants%20to%20ensure%20diversity%20and%20avoid%20data%20leakage.%20It%20contains%20337%20paired-prompt%20groups%20with%20controlled%20physical%20variations%20that%20drive%20sound%20differences%2C%20each%20grounded%20with%20an%20average%20of%2017%20videos%20and%20spanning%206%20audio-physics%20dimensions%20and%2041%20fine-grained%20test%20points.%20Each%20prompt%20pair%20is%20annotated%20with%20the%20physical%20factors%20underlying%20their%20acoustic%20differences.%20Importantly%2C%20PhyAVBench%20leverages%20paired%20text%20prompts%20to%20evaluate%20this%20capability.%20We%20term%20this%20evaluation%20paradigm%20the%20Audio-Physics%20Sensitivity%20Test%20%28APST%29%20and%20introduce%20a%20novel%20metric%2C%20the%20Contrastive%20Physical%20Response%20Score%20%28CPRS%29%2C%20which%20quantifies%20the%20acoustic%20consistency%20between%20generated%20videos%20and%20their%20real-world%20counterparts.%20We%20conduct%20a%20comprehensive%20evaluation% {"title": "HumANDiff: Articulated Noise Diffusion for Motion-Consistent Human Video Generation", "author": "Tao Hu and Varun Jampani", "abstract": "Despite tremendous recent progress in human video generation, generative video diffusion models still struggle to capture the dynamics and physics of human motions faithfully. In this paper, we propose a new framework for human video generation, HumANDiff, which enhances the human motion control with three key designs: 1) Articulated motion-consistent noise sampling that correlates the spatiotemporal distribution of latent noise and replaces the unstructured random Gaussian noise with 3D articulated noise sampled on the dense surface manifold of a statistical human body template. It inherits body topology priors for spatially and temporally consistent noise sampling. 2) Joint appearance-motion learning that enhances the standard training objective of video diffusion models by jointly predicting pixel appearances and corresponding physical motions from the articulated noises. It enables high-fidelity human video synthesis, e.g., capturing motion-dependent clothing wrinkles. 3) Geometric motion consistency learning that enforces physical motion consistency across frames via a novel geometric motion consistency loss defined in the articulated noise space. HumANDiff enables scalable controllable human video generation by fine-tuning video diffusion models with articulated noise sampling. Consequently, our method is agnostic to diffusion model design, and requires no modifications to the model architecture. During inference, HumANDiff enables image-to-video generation within a single framework, achieving intrinsic motion control without requiring additional motion modules. Extensive experiments demonstrate that our method achieves state-of-the-art performance in rendering motion-consistent, high-fidelity humans with diverse clothing styles. Project page: https://taohuumd.github.io/projects/HumANDiff/", "link": "http://arxiv.org/abs/2604.05961v1", "date": "2026-04-07", "relevancy": 2.7615, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.7416}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6589}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6517}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HumANDiff%3A%20Articulated%20Noise%20Diffusion%20for%20Motion-Consistent%20Human%20Video%20Generation&body=Title%3A%20HumANDiff%3A%20Articulated%20Noise%20Diffusion%20for%20Motion-Consistent%20Human%20Video%20Generation%0AAuthor%3A%20Tao%20Hu%20and%20Varun%20Jampani%0AAbstract%3A%20Despite%20tremendous%20recent%20progress%20in%20human%20video%20generation%2C%20generative%20video%20diffusion%20models%20still%20struggle%20to%20capture%20the%20dynamics%20and%20physics%20of%20human%20motions%20faithfully.%20In%20this%20paper%2C%20we%20propose%20a%20new%20framework%20for%20human%20video%20generation%2C%20HumANDiff%2C%20which%20enhances%20the%20human%20motion%20control%20with%20three%20key%20designs%3A%201%29%20Articulated%20motion-consistent%20noise%20sampling%20that%20correlates%20the%20spatiotemporal%20distribution%20of%20latent%20noise%20and%20replaces%20the%20unstructured%20random%20Gaussian%20noise%20with%203D%20articulated%20noise%20sampled%20on%20the%20dense%20surface%20manifold%20of%20a%20statistical%20human%20body%20template.%20It%20inherits%20body%20topology%20priors%20for%20spatially%20and%20temporally%20consistent%20noise%20sampling.%202%29%20Joint%20appearance-motion%20learning%20that%20enhances%20the%20standard%20training%20objective%20of%20video%20diffusion%20models%20by%20jointly%20predicting%20pixel%20appearances%20and%20corresponding%20physical%20motions%20from%20the%20articulated%20noises.%20It%20enables%20high-fidelity%20human%20video%20synthesis%2C%20e.g.%2C%20capturing%20motion-dependent%20clothing%20wrinkles.%203%29%20Geometric%20motion%20consistency%20learning%20that%20enforces%20physical%20motion%20consistency%20across%20frames%20via%20a%20novel%20geometric%20motion%20consistency%20loss%20defined%20in%20the%20articulated%20noise%20space.%20HumANDiff%20enables%20scalable%20controllable%20human%20video%20generation%20by%20fine-tuning%20video%20diffusion%20models%20with%20articulated%20noise%20sampling.%20Consequently%2C%20our%20method%20is%20agnostic%20to%20diffusion%20model%20design%2C%20and%20requires%20no%20modifications%20to%20the%20model%20architecture.%20During%20inference%2C%20HumANDiff%20enables%20image-to-video%20generation%20within%20a%20single%20framework%2C%20achieving%20intrinsic%20motion%20control%20without%20requiring%20additional%20motion%20modules.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20achieves%20state-of-the-art%20performance%20in%20rendering%20motion-consistent%2C%20high-fidelity%20humans%20with%20diverse%20clothing%20styles.%20Project%20page%3A%20https%3A//taohuumd.github.io/projects/HumANDiff/%0ALink%3A%20http%3A//arxiv.org/abs/2604.05961v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHumANDiff%253A%2520Articulated%2520Noise%2520Diffusion%2520for%2520Motion-Consistent%2520Human%2520Video%2520Generation%26entry.906535625%3DTao%2520Hu%2520and%2520Varun%2520Jampani%26entry.1292438233%3DDespite%2520tremendous%2520recent%2520progress%2520in%2520human%2520video%2520generation%252C%2520generative%2520video%2520diffusion%2520models%2520still%2520struggle%2520to%2520capture%2520the%2520dynamics%2520and%2520physics%2520of%2520human%2520motions%2520faithfully.%2520In%2520this%2520paper%252C%2520we%2520propose%2520a%2520new%2520framework%2520for%2520human%2520video%2520generation%252C%2520HumANDiff%252C%2520which%2520en {"title": "Vero: An Open RL Recipe for General Visual Reasoning", "author": "Gabriel Sarch and Linrong Cai and Qunzhong Wang and Haoyang Wu and Danqi Chen and Zhuang Liu", "abstract": "What does it take to build a visual reasoner that works across charts, science, spatial understanding, and open-ended tasks? The strongest vision-language models (VLMs) show such broad visual reasoning is within reach, but the recipe behind them remains unclear, locked behind proprietary reinforcement learning (RL) pipelines with non-public data. We introduce Vero, a family of fully open VLMs that matches or exceeds existing open-weight models across diverse visual reasoning tasks. We scale RL data and rewards across six broad task categories, constructing Vero-600K, a 600K-sample dataset from 59 datasets, and designing task-routed rewards that handle heterogeneous answer formats. Vero achieves state-of-the-art performance, improving over four base models by 3.6-5.3 points on average across VeroEval, our suite of 30 challenging benchmarks. Starting from Qwen3-VL-8B-Instruct, Vero outperforms Qwen3-VL-8B-Thinking on 23 of 30 benchmarks without additional proprietary thinking data. When trained from the same base model, Vero-600K exceeds existing RL datasets across task categories. Systematic ablations reveal that different task categories elicit qualitatively distinct reasoning patterns that transfer poorly in isolation, suggesting that broad data coverage is the primary driver of strong RL scaling. All data, code, and models are released.", "link": "http://arxiv.org/abs/2604.04917v2", "date": "2026-04-07", "relevancy": 2.7611, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5704}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5704}, {"title": "Flexible Visual Re {"title": "Is CLIP Cross-Eyed? Revealing and Mitigating Center Bias in the CLIP Family", "author": "Oscar Chew and Hsiao-Ying Huang and Kunal Jain and Tai-I Chen and Khoa D Doan and Kuan-Hao Huang", "abstract": "Recent research has shown that contrastive vision-language models such as CLIP often lack fine-grained understanding of visual content. While a growing body of work has sought to address this limitation, we identify a distinct failure mode in the CLIP family, which we term center bias, that persists even in recent model variants. Specifically, CLIP tends to disproportionately focus on the central region of an image, overlooking important objects located near the boundaries. This limitation is fundamental as failure to recognize relevant objects makes it difficult to perform any sophisticated tasks that depend on those objects. To understand the underlying causes of the limitation, we conduct analyses from both representation and attention perspectives. Using interpretability methods, i.e., embedding decomposition and attention map analysis, we find that relevant concepts especially those associated with off-center objects vanish from the model's embedding in the final representation due to information loss during the aggregation of visual embeddings, particularly the reliance on pooling mechanisms. Finally, we show that this bias can be alleviated with training-free strategies such as visual prompting and attention redistribution by redirecting models' attention to off-center regions.", "link": "http://arxiv.org/abs/2604.05971v1", "date": "2026-04-07", "relevancy": 2.7589, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5537}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5537}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.548}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Is%20CLIP%20Cross-Eyed%3F%20Revealing%20and%20Mitigating%20Center%20Bias%20in%20the%20CLIP%20Family&body=Title%3A%20Is%20CLIP%20Cross-Eyed%3F%20Revealing%20and%20Mitigating%20Center%20Bias%20in%20the%20CLIP%20Family%0AAuthor%3A%20Oscar%20Chew%20and%20Hsiao-Ying%20Huang%20and%20Kunal%20Jain%20and%20Tai-I%20Chen%20and%20Khoa%20D%20Doan%20and%20Kuan-Hao%20Huang%0AAbstract%3A%20Recent%20research%20has%20shown%20that%20contrastive%20vision-language%20models%20such%20as%20CLIP%20often%20lack%20fine-grained%20understanding%20of%20visual%20content.%20While%20a%20growing%20body%20of%20work%20has%20sought%20to%20address%20this%20limitation%2C%20we%20identify%20a%20distinct%20failure%20mode%20in%20the%20CLIP%20family%2C%20which%20we%20term%20center%20bias%2C%20that%20persists%20even%20in%20recent%20model%20variants.%20Specifically%2C%20CLIP%20tends%20to%20disproportionately%20focus%20on%20the%20central%20region%20of%20an%20image%2C%20overlooking%20important%20objects%20located%20near%20the%20boundaries.%20This%20limitation%20is%20fundamental%20as%20failure%20to%20recognize%20relevant%20objects%20makes%20it%20difficult%20to%20perform%20any%20sophisticated%20tasks%20that%20depend%20on%20those%20objects.%20To%20understand%20the%20underlying%20causes%20of%20the%20limitation%2C%20we%20conduct%20analyses%20from%20both%20representation%20and%20attention%20perspectives.%20Using%20interpretability%20methods%2C%20i.e.%2C%20embedding%20decomposition%20and%20attention%20map%20analysis%2C%20we%20find%20that%20relevant%20concepts%20especially%20those%20associated%20with%20off-center%20objects%20vanish%20from%20the%20model%27s%20embedding%20in%20the%20final%20representation%20due%20to%20information%20loss%20during%20the%20aggregation%20of%20visual%20embeddings%2C%20particularly%20the%20reliance%20on%20pooling%20mechanisms.%20Finally%2C%2 {"title": "WikiSeeker: Rethinking the Role of Vision-Language Models in Knowledge-Based Visual Question Answering", "author": "Yingjian Zhu and Xinming Wang and Kun Ding and Ying Wang and Bin Fan and Shiming Xiang", "abstract": "Multi-modal Retrieval-Augmented Generation (RAG) has emerged as a highly effective paradigm for Knowledge-Based Visual Question Answering (KB-VQA). Despite recent advancements, prevailing methods still primarily depend on images as the retrieval key, and often overlook or misplace the role of Vision-Language Models (VLMs), thereby failing to leverage their potential fully. In this paper, we introduce WikiSeeker, a novel multi-modal RAG framework that bridges these gaps by proposing a multi-modal retriever and redefining the role of VLMs. Rather than serving merely as answer generators, we assign VLMs two specialized agents: a Refiner and an Inspector. The Refiner utilizes the capability of VLMs to rewrite the textual query according to the input image, significantly improving the performance of the multimodal retriever. The Inspector facilitates a decoupled generation strategy by selectively routing reliable retrieved context to another LLM for answer generation, while relying on the VLM's internal knowledge when retrieval is unreliable. Extensive experiments on EVQA, InfoSeek, and M2KR demonstrate that WikiSeeker achieves state-of-the-art performance, with substantial improvements in both retrieval accuracy and answer quality. Our code will be released on https://github.com/zhuyjan/WikiSeeker.", "link": "http://arxiv.org/abs/2604.05818v1", "date": "2026-04-07", "relevancy": 2.6581, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5435}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5435}, {"title": "Flexible Visual Rec {"title": "Graph Topology Information Enhanced Heterogeneous Graph Representation Learning", "author": "He Zhao and Zhiwei Zeng and Yongwei Wang and Chunyan Miao", "abstract": "Real-world heterogeneous graphs are inherently noisy and usually not in the optimal graph structures for downstream tasks, which often adversely affects the performance of GRL models in downstream tasks. Although Graph Structure Learning (GSL) methods have been proposed to learn graph structures and downstream tasks simultaneously, existing methods are predominantly designed for homogeneous graphs, while GSL for heterogeneous graphs remains largely unexplored. Two challenges arise in this context. Firstly, the quality of the input graph structure has a more profound impact on GNN-based heterogeneous GRL models compared to their homogeneous counterparts. Secondly, most existing homogenous GRL models encounter memory consumption issues when applied directly to heterogeneous graphs. In this paper, we propose a novel Graph Topology learning Enhanced Heterogeneous Graph Representation Learning framework (ToGRL).ToGRL learns high-quality graph structures and representations for downstream tasks by incorporating task-relevant latent topology information. Specifically, a novel GSL module is first proposed to extract downstream task-related topology information from a raw graph structure and project it into topology embeddings. These embeddings are utilized to construct a new graph with smooth graph signals. This two-stage approach to GSL separates the optimization of the adjacency matrix from node representation learning to reduce memory consumption. Following this, a representation learning module takes the new graph as input to learn embeddings for downstream tasks. ToGRL also leverages prompt tuning to better utilize the knowledge embedded in learned representations, thus enhancing adaptability to downstream tasks. Extensive experiments on five real-world datasets show that our ToGRL outperforms state-of-the-art methods by a large margin.", "link": "http://arxiv.org/abs/2604.05732v1", "date": "2026-04-07", "relevancy": 2.6573, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5363}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5352}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5229}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Graph%20Topology%20Information%20Enhanced%20Heterogeneous%20Graph%20Representation%20Learning&body=Title%3A%20Graph%20Topology%20Information%20Enhanced%20Heterogeneous%20Graph%20Representation%20Learning%0AAuthor%3A%20He%20Zhao%20and%20Zhiwei%20Zeng%20and%20Yongwei%20Wang%20and%20Chunyan%20Miao%0AAbstract%3A%20Real-world%20heterogeneous%20graphs%20are%20inherently%20noisy%20and%20usually%20not%20in%20the%20optimal%20graph%20structures%20for%20downstream%20tasks%2C%20which%20often%20adversely%20affects%20the%20performance%20of%20GRL%20models%20in%20downstream%20tasks.%20Although%20Graph%20Structure%20Learning%20%28GSL%29%20methods%20have%20been%20proposed%20to%20learn%20graph%20structures%20and%20downstream%20tasks%20simultaneously%2C%20existing%20methods%20are%20predominantly%20designed%20for%20homogeneous%20graphs%2C%20while%20GSL%20for%20heterogeneous%20graphs%20remains%20largely%20unexplored.%20Two%20challenges%20arise%20in%20this%20context.%20Firstly%2C%20the%20quality%20of%20the%20input%20graph%20structure%20has%20a%20more%20profound%20impact%20on%20GNN-based%20heterogeneous%20GRL%20models%20compared%20to%20their%20homogeneous%20counterparts.%20Secondly%2C%20most%20existing%20homogenous%20GRL%20models%20encounter%20memory%20consumption%20issues%20when%20applied%20directly%20to%20heterogeneous%20graphs.%20In%20this%20paper%2C%20we%20propose%20a%20novel%20Graph%20Topology%20learning%20Enhanced%20Heterogeneous%20Graph%20Representation%20Learning%20framework%20%28ToGRL%29.ToGRL%20learns%20high-quality%20graph%20structures%20and%20representations%20for%20downstream%20tasks%20by%20incorporating%20task-relevant%20latent%20topology%20information.%20Specifically%2C%20a%20novel%20GSL%20module%20is%20first%20proposed%20to%20extract%20downstream%20task-related%20topology%20information%20from%20a%20raw%20graph%20structure%20and%20project%20it%20into%20topology%20embeddings.%20These%20embeddings%20are%20utilized%20to%20construct%20a%20new%20graph%20with%20smooth%20graph%20signals.%20This%20two-stage%20approach%20to%20GSL%20separates%20the%20optimization%20of%20the%20adjacency%20matrix%20from%20node%20representation%20learning%20to%20reduce%20memory%20consumption.%20Following%20this%2C%20a%20representation%20learning%20module%20takes%20the%20new%20graph%20as%20input%20to%20learn%20embeddings%20for%20downstream%20tasks.%20ToGRL%20also%20leverages%20prompt%20tuning%20to%20better%20utilize%20the%20knowledge%20embedded%20in%20learned%20representations%2C%20thus%20enhancing%20adaptability%20to%20downstream%20tasks.%20Extensive%20experiments%20on%20five%20real-world%20datasets%20show%20that%20our%20ToGRL%20outperforms%20state-of-the-art%20methods%20by%20a%20large%20margin.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05732v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGraph%2520Topology%2520Information%2520Enhanced%2520Heterogeneous%2520Graph%2520Representation%2520Learning%26entry.906535625%3DHe%2520Zhao%2520and%2520Zhiwei%2520Zeng%2520and%2520Yongwei%2520Wang%2520and%2520Chunyan%2520Miao%26entry.1292438233%3DReal-world%2520heterogeneous%2520graphs%2520are%2520inherently%2520noisy%2520and%2520usually%2520not%2520in%2520the%2520optimal%2520graph%2520structures%2520for%2520downstream%2520tasks%252C%2520which%2520often%2520adversely%2520affects%252 GRL%20models%20encounter%20memory%20consumption%20issues%20when%20applied%20directly%20to%20heterogeneous%20graphs.%20In%20this%20paper%2C%20we%20propose%20a%20novel%20Graph%20Topology%20learning%20Enhanced%20Heterogeneous%20Graph%20Representation%20Learning%20framework%20%28ToGRL%29.ToGRL%20learns%20high-quality%20graph%20structures%20and%20representations%20for%20downstream%20tasks%20by%20incorporating%20task-relevant%20latent%20topology%20information.%20Specifically%2C%20a%20novel%20GSL%20module%20is%20first%20proposed%20to%20extract%20downstream%20task-related%20topology%20information%20from%20a%20raw%20graph%20structure%20and%20project%20it%20into%20topology%20embeddings.%20These%20embeddings%20are%20utilized%20to%20construct%20a%20new%20graph%20with%20smooth%20graph%20signals.%20This%20two-stage%20approach%20to%20GSL%20separates%20the%20optimization%20of%20the%20adjacency%20matrix%20from%20node%20representation%20learning%20to%20reduce%20memory%20consumption.%20Following%20this%2C%20a%20representation%20learning%20module%20takes%20the%20new%20graph%20as%20input%20to%20learn%20embeddings%20for%20downstream%20tasks.%20ToGRL%20also%20leverages%20prompt%20tuning%20to%20better%20utilize%20the%20knowledge%20embedded%20in%20learned%20representations%2C%20thus%20enhancing%20adaptability%20to%20downstream%20tasks.%20Extensive%20experiments%20on%20five%20real-world%20datasets%20show%20that%20our%20ToGRL%20outperforms%20state-of-the-art%20methods%20by%20a%20large%20margin.&entry.1838667208=http%3A//arxiv.org/abs/2604.05732v1&entry.124074799=Read"},
{"title": "AICA-Bench: Holistically Examining the Capabilities of VLMs in Affective Image Content Analysis", "author": "Dong She and Xianrong Yao and Liqun Chen and Jinghe Yu and Yang Gao and Zhanpeng Jin", "abstract": "Vision-Language Models (VLMs) have demonstrated strong capabilities in perception, yet holistic Affective Image Content Analysis (AICA), which integrates perception, reasoning, and generation into a unified framework, remains underexplored. To address this gap, we introduce AICA-Bench, a comprehensive benchmark with three core tasks: Emotion Understanding (EU), Emotion Reasoning (ER), and Emotion-Guided Content Generation (EGCG). We evaluate 23 VLMs and identify two major limitations: weak intensity calibration and shallow open-ended descriptions. To address these issues, we propose Grounded Affective Tree (GAT) Prompting, a training-free framework that combines visual scaffolding with hierarchical reasoning. Experiments show that GAT reduces intensity errors and improves descriptive depth, providing a strong baseline for future research on affective multimodal understanding and generation.", "link": "http://arxiv.org/abs/2604.05900v1", "date": "2026-04-07", "relevancy": 2.6494, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5481}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5481}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4935}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AICA-Bench%3A%20Holistically%20Examining%20the%20Capabilities%20of%20VLMs%20in%20Affective%20Image%20Content%20Analysis&body=Title%3A%20AICA-Bench%3A%20Holistically%20Examining%20the%20Capabilities%20of%20VLMs%20in%20Affective%20Image%20Content%20Analysis%0AAuthor%3A%20Dong%20She%20and%20Xianrong%20Yao%20and%20Liqun%20Chen%20and%20Jinghe%20Yu%20and%20Yang%20Gao%20and%20Zhanpeng%20Jin%0AAbstract%3A%20Vision-Language%20Models%20%28VLMs%29%20have%20demonstrated%20strong%20capabilities%20in%20perception%2C%20yet%20holistic%20Affective%20Image%20Content%20Analysis%20%28AICA%29%2C%20which%20integrates%20perception%2C%20reasoning%2C%20and%20generation%20into%20a%20unified%20framework%2C%20remains%20underexplored.%20To%20address%20this%20gap%2C%20we%20introduce%20AICA-Bench%2C%20a%20comprehensive%20benchmark%20with%20three%20core%20tasks%3A%20Emotion%20Understanding%20%28EU%29%2C%20Emotion%20Reasoning%20%28ER%29%2C%20and%20Emotion-Guided%20Content%20Generation%20%28EGCG%29.%20We%20evaluate%2023%20VLMs%20and%20identify%20two%20major%20limitations%3A%20weak%20intensity%20calibration%20and%20shallow%20open-ended%20descriptions.%20To%20address%20these%20issues%2C%20we%20propose%20Grounded%20Affective%20Tree%20%28GAT%29%20Prompting%2C%20a%20training-free%20framework%20that%20combines%20visual%20scaffolding%20with%20hierarchical%20reasoning.%20Experiments%20show%20that%20GAT%20reduces%20intensity%20errors%20and%20improves%20descriptive%20depth%2C%20providing%20a%20strong%20baseline%20for%20future%20research%20on%20affective%20multimodal%20understanding%20and%20generation.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05900v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAICA-Bench%253A%2520Holistically%2520Examining%2520the%2520Capabilities%2520of%2520VLMs%2520in%2520Affective%2520Image%2520Content%2520Analysis%26entry.906535625%3DDong%2520She%2520and%2520Xianrong%2520Yao%2520and%2520Liqun%2520Chen%2520and%2520Jinghe%2520Yu%2520and%2520Yang%2520Gao%2520and%2520Zhanpeng%2520Jin%26entry.1292438233%3DVision-Language%2520Models%2520%2528VLMs%2529%2520have%2520demonstrated%2520strong%2520capabilities%2520in%2520perception%252C%2520yet%2520holistic%2520Affective%2520Image%2520Content%2520Analysis%2520%2528AICA%2529%252C%2520which%2520integrates%2520perception%252C%2520reasoning%252C%2520and%2520generation%2520into%2520a%2520unified%2520framework%252C%2520remains%2520underexplored.%2520To%2520address%2520this%2520gap%252C%2520we%2520introduce%2520AICA-Bench%252C%2520a%2520comprehensive%2520benchmark%2520with%2520three%2520core%2520tasks%253A%2520Emotion%2520Understanding%2520%2528EU%2529%252C%2520Emotion%2520Reasoning%2520%2528ER%2529%252C%2520and%2520Emotion-Guided%2520Content%2520Generation%2520%2528EGCG%2529.%2520We%2520evaluate%252023%2520VLMs%2520and%2520identify%2520two%2520major%2520limitations%253A%2520weak%2520intensity%2520calibration%2520and%2520shallow%2520open-ended%2520descriptions.%2520To%2520address%2520these%2520issues%252C%2520we%2520propose%2520Grounded%2520Affective%2520Tree%2520%2528GAT%2529%2520Prompting%252C%2520a%2520training-free%2520framework%2520that%2520combines%2520visual%2520scaffolding%2520with%2520hierarchical%2520reasoning.%2520Experiments%2520show%2520that%2520GAT%2520reduces%2520intensity%2520errors%2520and%2520improves%2520descriptive%2520depth%252C%2520providing%2520a%2520strong%2520baseline%2520for%2520future%2520research%2520on%2520affective%2520multimodal%2520understanding%2520and%2520generation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.05900v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=AICA-Bench%3A%20Holistically%20Examining%20the%20Capabilities%20of%20VLMs%20in%20Affective%20Image%20Content%20Analysis&entry.906535625=Dong%20She%20and%20Xianrong%20Yao%20and%20Liqun%20Chen%20and%20Jinghe%20Yu%20and%20Yang%20Gao%20and%20Zhanpeng%20Jin&entry.1292438233=Vision-Language%20Models%20%28VLMs%29%20have%20demonstrated%20strong%20capabilities%20in%20perception%2C%20yet%20holistic%20Affective%20Image%20Content%20Analysis%20%28AICA%29%2C%20which%20integrates%20 {"title": "Physics-Informed Neural Optimal Control for Precision Immobilization Technique in Emergency Scenarios", "author": "Yangye Jiang and Jiachen Wang and Daofei Li", "abstract": "Precision Immobilization Technique (PIT) is a potentially effective intervention maneuver for emergency out-of-control vehicle, but its automation is challenged by highly nonlinear collision dynamics, strict safety constraints, and real-time computation requirements. This work presents a PIT-oriented neural optimal-control framework built around PicoPINN (Planning-Informed Compact Physics-Informed Neural Network), a compact physics-informed surrogate obtained through knowledge distillation, hierarchical parameter clustering, and relation-matrix-based parameter reconstruction. A hierarchical neural-OCP (Optimal Control Problem) architecture is then developed, in which an upper virtual decision layer generates PIT decision packages under scenario constraints and a lower coupled-MPC (Model Predictive Control) layer executes interaction-aware control. To evaluate the framework, we construct a PIT Scenario Dataset and conduct surrogate-model comparison, planning-structure ablation, and multi-fidelity assessment from simulation to scaled by-wire vehicle tests. In simulation, adding the upper planning layer improves PIT success rate from 63.8% to 76.7%, and PicoPINN reduces the original PINN parameter count from 8965 to 812 and achieves the smallest average heading error among the learned surrogates (0.112 rad). Scaled vehicle experiments are further used as evidence of control feasibility, with 3 of 4 low-speed controllable-contact PIT trials achieving successful yaw reversal.", "link": "http://arxiv.org/abs/2604.05758v1", "date": "2026-04-07", "relevancy": 2.6422, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5312}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5284}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5258}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Physics-Informed%20Neural%20Optimal%20Control%20for%20Precision%20Immobilization%20Technique%20in%20Emergency%20Scenarios&body=Title%3A%20Physics-Informed%20Neural%20Optimal%20Control%20for%20Precision%20Immobilization%20Technique%20in%20Emergency%20Scenarios%0AAuthor%3A%20Yangye%20Jiang%20and%20Jiachen%20Wang%20and%20Daofei%20Li%0AAbstract%3A%20Precision%20Immobilization%20Technique%20%28PIT%29%20is%20a%20potentially%20effective%20intervention%20maneuver%20for%20emergency%20out-of-control%20vehicle%2C%20but%20its%20automation%20is%20challenged%20by%20highly%20nonlinear%20collision%20dynamics%2C%20strict%20safety%20constraints%2C%20and%20real-time%20computation%20requirements.%20This%20work%20presents%20a%20PIT-oriented%20neural%20optimal-control%20framework%20built%20around%20PicoPINN%20%28Planning-Informed%20Compact%20Physics-Informed%20Neural%20Network%29%2C%20a%20compact%20physics-informed%20surrogate%20obtained%20through%20knowledge%20distillation%2C%20hierarchical%20parameter%20clustering%2C%20and%20relation-matrix-based%20parameter%20reconstruction.%20A%20hierarchical%20neural-OCP%20%28Optimal%20Control%20Problem%29%20architecture%20is%20then%20developed%2C%20in%20which%20an%20upper%20virtual%20decision%20layer%20generates%20PIT%20decision%20packages%20under%20scenario%20constraints%20and%20a%20lower%20coupled-MPC%20%28Model%20Predictive%20Control%29%20layer%20executes%20interaction-aware%20control.%20To%20evaluate%20the%20framework%2C%20we%20construct%20a%20PIT%20Scenario%20Dataset%20and%20conduct%20surrogate-model%20comparison%2C%20planning-structure%20ablation%2C%20and%20multi-fidelity%20assessment%20from%20simulation%20to%20scaled%20by-wire%20vehicle%20tests.%20In%20simulation%2C%20adding%20the%20upper%20planning%20layer%20improves%20PIT%20success%20rate%20from%2063.8%25%20to%2076.7%25%2C%20and%20PicoPINN%20reduces%20the%20original%20PINN%20parameter%20count%20from%208965%20to%20812%20and%20achieves%20the%20smallest%20average%20heading%20error%20among%20the%20learned%20surrogates%20%280.112%20rad%29.%20Scaled%20vehicle%20experiments%20are%20further%20used%20as%20evidence%20of%20control%20feasibility%2C%20with%203%20of%204%20low-speed%20controllable-contact%20PIT%20trials%20achieving%20successful%20yaw%20reversal.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05758v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPhysics-Informed%2520Neural%2520Optimal%2520Control%2520for%2520Precision%2520Immobilization%2520Technique%2520in%2520Emergency%2520Scenarios%26entry.906535625%3DYangye%2520Jiang%2520and%2520Jiachen%2520Wang%2520and%2520Daofei%2520Li%26entry.1292438233%3DPrecision%2520Immobilization%2520Technique%2520%2528PIT%2529%2520is%2520a%2520potentially%2520effective%2520intervention%2520maneuver%2520for%2520emergency%2520out-of-control%2520vehicle%252C%2520but%2520its%2520automation%2520is%2520challenged%2520by%2520highly%2520nonlinear%2520collision%2520dynamics%252C%2520strict%2520safety%2520constraints%252C%2520and%2520real-time%2520computation%2520requirements.%2520This%2520work%2520presents%2520a%2520PIT-oriented%2520neural%2520optimal-control%2520framework%2520built%2520around%2520PicoPINN%2520%2528Planning-Informed%2520Compact%2520Physics-Informed%2520Neural%2520Network%2529%252C%2520a%2520compact%2520physics-informed%2520surrogate%2520obtained%2520through%2520knowledge%2520distillation%252C%2520hierarchical%2520parameter%2520clustering%252C%2520and%2520relation-matrix-based%2520parameter%2520reconstruction.%2520A%2520hierarchical%2520neural-OCP%2520%2528Optimal%2520Control%2520Problem%2529%2520ar {"title": "NativQA Framework: Enabling LLMs and VLMs with Native, Local, and Everyday Knowledge", "author": "Firoj Alam and Md Arid Hasan and Sahinur Rahman Laskar and Mucahid Kutlu and Kareem Darwish and Shammur Absar Chowdhury", "abstract": "The rapid progress of large language models (LLMs) raises concerns about cultural bias, fairness, and performance in diverse languages and underrepresented regions. Addressing these gaps requires large-scale resources grounded in multilingual, local, and cultural contexts. We systematize and extend the earlier NativQA framework to multimodality by adding image, audio, and video support, enabling scalable construction of culturally and regionally aligned QA datasets in native languages. Given user-defined seed queries, the framework uses search engines to collect location-specific everyday information. We evaluate it across 39 locations in 24 countries and 7 languages, spanning extremely low-resource to high-resource settings, and collect over $\\sim$300K text QA pairs, $\\sim$312K images, and $\\sim$29K videos with associated audio. The developed resources can be used for LLMs benchmarking and further fine-tuning. The framework has been made publicly available for the community (https://gitlab.com/nativqa/nativqa-framework). Demo video is available here: \\href{https://shorturl.at/DAVn9}{https://shorturl.at/DAVn9}.", "link": "http://arxiv.org/abs/2504.05995v3", "date": "2026-04-07", "relevancy": 2.6199, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5329}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5329}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5061}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subjec enchmarking%20and%20further%20fine-tuning.%20The%20framework%20has%20been%20made%20publicly%20available%20for%20the%20community%20%28https%3A//gitlab.com/nativqa/nativqa-framework%29.%20Demo%20video%20is%20available%20here%3A%20%5Chref%7Bhttps%3A//shorturl.at/DAVn9%7D%7Bhttps%3A//shorturl.at/DAVn9%7D.&entry.1838667208=http%3A//arxiv.org/abs/2504.05995v3&entry.124074799=Read"},
{"title": "MARL-GPT: Foundation Model for Multi-Agent Reinforcement Learning", "author": "Maria Nesterova and Mikhail Kolosov and Anton Andreychuk and Egor Cherepanov and Oleg Bulichev and Alexey Kovalev and Konstantin Yakovlev and Aleksandr Panov and Alexey Skrynnik", "abstract": "Recent advances in multi-agent reinforcement learning (MARL) have demonstrated success in numerous challenging domains and environments, but typically require specialized models for each task. In this work, we propose a coherent methodology that makes it possible for a single GPT-based model to learn and perform well across diverse MARL environments and tasks, including StarCraft Multi-Agent Challenge, Google Research Football and POGEMA. Our method, MARL-GPT, applies offline reinforcement learning to train at scale on the expert trajectories (400M for SMACv2, 100M for GRF, and 1B for POGEMA) combined with a single transformer-based observation encoder that requires no task-specific tuning. Experiments show that MARL-GPT achieves competitive performance compared to specialized baselines in all tested environments. Thus, our findings suggest that it is, indeed, possible to build a multi-task transformer-based model for a wide variety of (significantly different) multi-agent problems paving the way to the fundamental MARL model (akin to ChatGPT, Llama, Mistral etc. in natural language modeling).", "link": "http://arxiv.org/abs/2604.05943v1", "date": "2026-04-07", "relevancy": 2.6178, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5587}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.509}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.503}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MARL-GPT%3A%20Foundation%20Model%20for%20Multi-Agent%20Reinforcement%20Learning&body=Title%3A%20MARL-GPT%3A%20Foundation%20Model%20for%20Multi-Agent%20Reinforcement%20Learning%0AAuthor%3A%20Maria%20Nesterova%20and%20Mikhail%20Kolosov%20and%20Anton%20Andreychuk%20and%20Egor%20Cherepanov%20and%20Oleg%20Bulichev%20and%20Alexey%20Kovalev%20and%20Konstantin%20Yakovlev%20and%20Aleksandr%20Panov%20and%20Alexey%20Skrynnik%0AAbstract%3A%20Recent%20advances%20in%20multi-agent%20reinforcement%20learning%20%28MARL%29%20have%20demonstrated%20success%20in%20numerous%20challenging%20domains%20and%20environments%2C%20but%20typically%20require%20specialized%20models%20for%20each%20task.%20In%20this%20work%2C%20we%20propose%20a%20coherent%20methodology%20that%20makes%20it%20possible%20for%20a%20single%20GPT-based%20model%20to%20learn%20and%20perform%20well%20across%20diverse%20MARL%20environments%20and%20tasks%2C%20including%20StarCraft%20Multi-Agent%20Challenge%2C%20Google%20Research%20Football%20and%20POGEMA.%20Our%20method%2C%20MARL-GPT%2C%20applies%20offline%20reinforcement%20learning%20to%20train%20at%20scale%20on%20the%20expert%20trajectories%20%28400M%20for%20SMACv2%2C%20100M%20for%20GRF%2C%20and%201B%20for%20POGEMA%29%20combined%20with%20a%20single%20transformer-based%20observation%20encoder%20that%20requires%20no%20task-specific%20tuning.%20Experiments%20show%20that%20MARL-GPT%20achieves%20competitive%20performance%20compared%20to%20specialized%20baselines%20in%20all%20tested%20environments.%20Thus%2C%20our%20findings%20suggest%20that%20it%20is%2C%20indeed%2C%20possible%20to%20build%20a%20multi-task%20transformer-based%20model%20for%20a%20wide%20variety%20of%20%28significantly%20different%29%20multi-agent%20problems%20paving%20the%20way%20to%20the%20fundamental%20MARL%20model%20%28akin%20to%20ChatGPT%2C%20Llama%2C%20Mistral%20etc.%20in%20natural%20language%20modeling%29.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05943v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform% d%20model%20for%20a%20wide%20variety%20of%20%28significantly%20different%29%20multi-agent%20problems%20paving%20the%20way%20to%20the%20fundamental%20MARL%20model%20%28akin%20to%20ChatGPT%2C%20Llama%2C%20Mistral%20etc.%20in%20natural%20language%20modeling%29.&entry.1838667208=http%3A//arxiv.org/abs/2604.05943v1&entry.124074799=Read"},
{"title": "The Model Agreed, But Didn't Learn: Diagnosing Surface Compliance in Large Language Models", "author": "Xiaojie Gu and Ziying Huang and Weicong Hong and Jian Xie and Renze Lou and Kai Zhang", "abstract": "Large Language Models (LLMs) internalize vast world knowledge as parametric memory, yet inevitably inherit the staleness and errors of their source corpora. Consequently, ensuring the reliability and malleability of these internal representations is imperative for trustworthy real-world deployment. Knowledge editing offers a pivotal paradigm for surgically modifying memory without retraining. However, while recent editors demonstrate high success rates on standard benchmarks, it remains questionable whether current evaluation frameworks that rely on assessing output under specific prompting conditions can reliably authenticate genuine memory modification. In this work, we introduce a simple diagnostic framework that subjects models to discriminative self-assessment under in-context learning (ICL) settings that better reflect real-world application environments, specifically designed to scrutinize the subtle behavioral nuances induced by memory modifications. This probing reveals a pervasive phenomenon of Surface Compliance, where editors achieve high benchmark scores by merely mimicking target outputs without structurally overwriting internal beliefs. Moreover, we find that recursive modifications accumulate representational residues, triggering cognitive instability and permanently diminishing the reversibility of the model's memory state. These insights underscore the risks of current editing paradigms and highlight the pivotal role of robust memory modification in building trustworthy, long-term sustainable LLM systems. Code is available at https://github.com/XiaojieGu/SA-MCQ.", "link": "http://arxiv.org/abs/2604.05995v1", "date": "2026-04-07", "relevancy": 2.5976, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5246}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5246}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5094}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Model%20Agreed%2C%20But%20Didn%27t%20Learn%3A%20Diagnosing%20Surface%20Compliance%20in%20Large%20Language%20Models&body=Title%3A%20The%20Model%20Agreed%2C%20But%20Didn%27t%20Learn%3A%20Diagnosing%20Surface%20Compliance%20in%20Large%20Language%20Models%0AAuthor%3A%20Xiaojie%20Gu%20and%20Ziying%20Huang%20and%20Weicong%20Hong%20and%20Jian%20Xie%20and%20Renze%20Lou%20and%20Kai%20Zhang%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20internalize%20vast%20world%20knowledge%20as%20parametric%20memory%2C%20yet%20inevitably%20inherit%20the%20staleness%20and%20errors%20of%20their%20source%20corpora.%20Consequently%2C%20ensuring%20the%20reliability%20and%20malleability%20of%20these%20internal%20representations%20is%20imperative%20for%20trustworthy%20real-world%20deployment.%20Knowledge%20editing%20offers%20a%20pivotal%20paradigm%20for%20surgically%20modifying%20memory%20without%20retraining.%20However%2C%20while%20recent%20editors%20demonstrate%20high%20success%20rates%20on%20standard%20benchmarks%2C%20it%20remains%20questionable%20whether%20current%20evaluation%20frameworks%20that%20rely%20on%20assessing%20output%20under%20specific%20prompting%20conditions%20can%20reliably%20authenticate%20genuine%20memory%20modification.%20In%20this%20work%2C%20we%20introduce%20a%20simple%20diagnostic%20framework%20that%20subjects%20models%20to%20discriminative%20self-assessment%20under%20in-context%20learning%20%28ICL%29%20settings%20that%20better%20reflect%20real-world%20application%20environments%2C%20specifically%20designed%20to%20scrutinize%20the%20subtle%20behavioral%20nuances%20induced%20by%20memory%20modifications.%20This%20probing%20reveals%20a%20pervasive%20phenomenon%20of%20Surface%20Compliance%2C%20where%20editors%20achieve%20high%20benchmark%20scores%20by%20merely%20mimicking%20target%20outputs%20without%20structurally%20overwriting%20internal%20beliefs.%20Moreover%2C%20we%20find%20that%20recursive%20modifications%20accumulate%20representational%20residues%2C%20triggering%20cognitive%20instability%20and%20permanently%20diminishing%20the%20reversibility%20of%20the%20model%27s%20memory%20state.%20These%20insights%20underscore%20the%20risks%20of%20current%20editing%20paradigms%20and%20highlight%20the%20pivotal%20role%20of%20robust%20memory%20modification%20in%20building%20trustworthy%2C%20long-term%20sustainable%20LLM%20systems.%20Code%20is%20available%20at%20https%3A//github.com/XiaojieGu/SA-MCQ.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05995v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Model%2520Agreed%252C%2520But%2520Didn%2527t%2520Learn%253A%2520Diagnosing%2520Surface%2520Compliance%2520in%2520Large%2520Language%2520Models%26entry.906535625%3DXiaojie%2520Gu%2520and%2520Ziying%2520Huang%2520and%2520Weicong%2520Hong%2520and%2520Jian%2520Xie%2520and%2520Renze%2520Lou%2520and%2520Kai%2520Zhang%26entry.1292438233%3DLarge%2520Language%2520Models%2520%2528LLMs%2529%2520internalize%2520vast%2520world%2520knowledge%2520as%2520parametric%2520memory%252C%2520yet%2520inevitably%2520inherit%2520the%2520staleness%2520and%2520errors%2520of%2520their%2520source%2520corpora.%2520Consequently%252C%2520ensuring%2520the%2520reliability%2520and%2520malleability%2520of%2520these%2520internal%2520representations%2520is%2520imperative%2520for%2520trustworthy%2520real-world%2520deployment.%2520Knowledge%2520editing%2520offers%2520a%2520pivotal%2520paradigm%2520for%2520surgically%2520modifying%2520memory%2520without%2520retraining.%2520However%252C%2520while%2520recent%2520editors%2520demonstrate%2520high%2520success%2520rates%2520on%2520standard%2520benchmarks%252C%2520it%2520remains%2520questionable%2520whether%2520current%2520evaluation%2520frameworks%2520that%2520rely%2520on%2520assessing%2520output%2520under%2520specific%2520prompting%2520conditions%2520can%2520reliably%2520authenticate%2520genuine%2520memory%2520modification.%2520In%2520this%2520work%252C%2520we%2520introduce%2520a%2520simple%2520diagnostic%2520framework%2520that%2520subjects%2520models%2520to%2520discriminative%2520self-assessment%2520under%2520in-context%2520learning%2520%2528ICL%2529%2520settings%2520that%2520better%2520reflect%2520real-world%2520application%2520environments%252C%2520specifically%2520designed%2520to%2520scrutinize%2520the%2520subtle%2520behavioral%2520nuances%2520induced%2520by%2520memory%2520modifications.%2520This%2520probing%2520reveals%2520a%2520pervasive%2520phenomenon%2520of%2520Surface%2520Compliance%252C%2520where%2520editors%2520achieve%2520high%2520benchmark%2520scores%2520by%2520merely%2520mimicking%2520target%2520outputs%2520without%2520structurally%2520overwriting%2520internal%2520beliefs.%2520Moreover%252C%2520we%2520find%2520that%2520recursive%2520modifications%2520accumulate%2520representational%2520residues%252C%2520triggering%2520cognitive%2520instability%2520and%2520permanently%2520diminishing%2520the%2520reversibility%2520of%2520the%2520model%2527s%2520memory%2520state.%2520These%2520insights%2520underscore%2520the%2520risks%2520of%2520current%2520editing%2520paradigms%2520and%2520highlight%2520the%2520pivotal%2520role%2520of%2520robust%2520memory%2520modification%2520in%2520building%2520trustworthy%252C%2520long-term%2520sustainable%2520LLM%2520systems.%2520Code%2520is%2520available%2520at%2520https%253A//github.com {"title": "Saliency-Guided Representation with Consistency Policy Learning for Visual Unsupervised Reinforcement Learning", "author": "Jingbo Sun and Qichao Zhang and Songjun Tu and Xing Fang and Yupeng Zheng and Haoran Li and Ke Chen and Dongbin Zhao", "abstract": "Zero-shot unsupervised reinforcement learning (URL) offers a promising direction for building generalist agents capable of generalizing to unseen tasks without additional supervision. Among existing approaches, successor representations (SR) have emerged as a prominent paradigm due to their effectiveness in structured, low-dimensional settings. However, SR methods struggle to scale to high-dimensional visual environments. Through empirical analysis, we identify two key limitations of SR in visual URL: (1) SR objectives often lead to suboptimal representations that attend to dynamics-irrelevant regions, resulting in inaccurate successor measures and degraded task generalization; and (2) these flawed representations hinder SR policies from modeling multi-modal skill-conditioned action distributions and ensuring skill controllability. To address these limitations, we propose Saliency-Guided Representation with Consistency Policy Learning (SRCP), a novel framework that improves zero-shot generalization of SR methods in visual URL. SRCP decouples representation learning from successor training by introducing a saliency-guided dynamics task to capture dynamics-relevant representations, thereby improving successor measure and task generalization. Moreover, it integrates a fast-sampling consistency policy with URL-specific classifier-free guidance and tailored training objectives to improve skill-conditioned policy modeling and controllability. Extensive experiments on 16 tasks across 4 datasets from the ExORL benchmark demonstrate that SRCP achieves state-of-the-art zero-shot generalization in visual URL and is compatible with various SR methods.", "link": "http://arxiv.org/abs/2604.05931v1", "date": "2026-04-07", "relevancy": 2.5933, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5286}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5155}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5119}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Saliency-Guided%20Representation%20with%20Consistency%20Policy%20Learning%20for%20Visual%20Unsupervised%20Reinforcement%20Learning&body=Title%3A%20Saliency-Guided%20Representation%20with%20Consistency%20Policy%20Learning%20for%20Visual%20Unsupervised%20Reinforcement%20Learning%0AAuthor%3A%20Jingbo%20Sun%20and%20Qichao%20Zhang%20and%20Songjun%20Tu%20and%20Xing%20Fang%20and%20Yupeng%20Zheng%20and%20Haoran%20Li%20and%20Ke%20Chen%20and%20Dongbin%20Zhao%0AAbstract%3A%20Zero-shot%20unsupervised%20reinforcement%20learning%20%28URL%29%20offers%20a%20promising%20direction%20for%20building%20generalist%20agents%20capable%20of%20generalizing%20to%20unseen%20tasks%20without%20additional%20supervision.%20Among%20existing%20approaches%2C%20successor%20representations%20%28SR%29%20have%20emerged%20as%20a%20prominent%20paradigm%20due%20to%20their%20effectiveness%20in%20structured%2C%20low-dimensional%20settings.%20However%2C%20SR%20methods%20struggle%20to%20scale%20to%20high-dimensional%20visual%20environments.%20Through%20empirical%20analysis%2C%20we%20identify%20two%20key%20limitations%20of%20SR%20in%20visual%20URL%3A%20%281%29%20SR%20objectives%20often%20lead%20to%20suboptimal%20representations%20that%20attend%20to%20dynamics-irrelevant%20regions%2C%20resulting%20in%20inaccurate%20successor%20measures%20and%20degraded%20task%20generalization%3B%20and%20%282%29%20these%20flawed%20representations%20hinder%20SR%20policies%20from%20modeling%20multi-modal%20skill-conditioned%20action%20distributions%20and%20ensuring%20skill%20controllability.%20To%20address%20these%20limitations%2C%20we%20propose%20Saliency-Guided%20Representation%20with%20Consistency%20Policy%20Learning%20%28SRCP%29%2C%20a%20novel%20framework%20that%20improves%20zero-shot%20generalization%20of%20SR%20methods%20in%20visual%20URL.%20SRCP%20decouples%20representation%20learning%20from%20successor%20training%20by%20introducing%20a%20saliency-guided%20dynamics%20task%20to%20capture%20dynamics-relevant%20representations%2C%20thereby%20improving%20successor%20measure%20and%20task%20generalization.%20Moreover%2C%20it%20integrates%20a%20fast-sampling%20consistency%20policy%20with%20URL-specific%20classifier-free%20guidance%20and%20tailored%20training%20objectives%20to%20improve%20skill-conditioned%20policy%20modeling%20and%20controllability.%20Extensive%20experiments%20on%2016%20tasks%20across%204%20datasets%20from%20the%20ExORL%20benchmark%20demonstrate%20that%20SRCP%20achieves%20state-of-the-art%20zero-shot%20generalization%20in%20visual%20URL%20and%20is%20compatible%20with%20various%20SR%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05931v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSaliency-Guided%2520Representation%2520with%2520Consistency%2520Policy%2520Learning%2520for%2520Visual%2520Unsupervised%2520Reinforcement%2520Learning%26entry.906535625%3DJingbo%2520Sun%2520and%2520Qichao%2520Zhang%2520and%2520Songjun%2520Tu%2520and%2520Xing%2520Fang%2520and%2520Yupeng%2520Zheng%2520and%2520Haoran%2520Li%2520and%2520Ke%2520Chen%2520and%2520Dongbin%2520Zhao%26entry.1292438233%3DZero-shot%2520unsupervised%2520reinforcement%2520learning%2520%2528URL%2529%2520offers%2520a%2520promising%2520direction%2520for%2520building%2520generalist%2520agents%2520capable%2520of%2520generalizing%2520to%2520unseen%2520tasks%2520without%2520additional%2 {"title": "AgentHER: Hindsight Experience Replay for LLM Agent Trajectory Relabeling", "author": "Liang Ding", "abstract": "LLM agents fail on the majority of real-world tasks -- GPT-4o succeeds on fewer than 15% of WebArena navigation tasks and below 55% pass@1 on ToolBench (Zhou et al., 2024; Qin et al., 2024) -- yet every failed trajectory is routinely discarded, wasting the dominant source of collected experience. We introduce AgentHER, a framework that recovers this lost training signal by adapting the Hindsight Experience Replay (HER; Andrychowicz et al., 2017) principle to natural-language agent trajectories for offline data augmentation. The key insight is simple: a trajectory that fails goal A is often a correct demonstration for some achievable alternative goal B. AgentHER realises this idea through a four-stage pipeline -- failure classification, outcome extraction, LLM-guided prompt relabeling with confidence gating, and data packaging -- that converts discarded failures into high-quality SFT, DPO, and ShareGPT training data, with both zero-cost rule-based and LLM-judge implementations. On WebArena (Zhou et al., 2024) and ToolBench (Qin et al., 2024), AgentHER improves over success-only SFT by +7.1-11.7 pp across four model families (GPT-4o, Qwen2.5-72B/7B, LLaMA-3.1-8B), while achieving 2x data efficiency -- matching baseline performance with only 50% of successful demonstrations. Gains are consistent from 1.5B to 72B parameters (+5.8-9.2 pp) and compound under iterative redeployment (+2.1 pp over additional rounds). Human evaluation confirms 97.7% relabeling precision under multi-judge verification.", "link": "http://arxiv.org/abs/2603.21357v2", "date": "2026-04-07", "relevancy": 2.5755, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5485}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0 {"title": "Perturb and Recover: Fine-tuning for Effective Backdoor Removal from CLIP", "author": "Naman Deep Singh and Francesco Croce and Matthias Hein", "abstract": "Vision-Language models like CLIP have been shown to be highly effective at linking visual perception and natural language understanding, enabling sophisticated image-text capabilities, including strong retrieval and zero-shot classification performance. Their widespread use, as well as the fact that CLIP models are trained on image-text pairs from the web, make them both a worthwhile and relatively easy target for backdoor attacks. As training foundational models, such as CLIP, from scratch is very expensive, this paper focuses on cleaning potentially poisoned models via fine-tuning. We first show that existing cleaning techniques are not effective against simple structured triggers used in Blended or BadNet backdoor attacks, exposing a critical vulnerability for potential real-world deployment of these models. Then, we introduce PAR, Perturb and Recover, a surprisingly simple yet effective mechanism to remove backdoors from CLIP models. Through extensive experiments across different encoders and types of backdoor attacks, we show that PAR achieves high backdoor removal rate while preserving good standard performance. Finally, we illustrate that our approach is effective even only with synthetic text-image pairs, i.e. without access to real training data. The code and models are available on \\href{https://github.com/nmndeep/PerturbAndRecover}{GitHub}.", "link": "http://arxiv.org/abs/2412.00727v3", "date": "2026-04-07", "relevancy": 2.5714, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5259}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5085}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5085}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Perturb%20and%20Recover%3A%20Fine-tuning%20for%20Effective%20Backdoor%20Removal%20from%20CLIP&body=Title%3A%20Perturb%20and%20Recover%3A%20Fine-tuning%20for%20Effective%20Backdoor%20Removal%20from%20CLIP%0AAuthor%3A%20Naman%20Deep%20Singh%20and%20Francesco%20Croce%20and%20Matthias%20Hein%0AAbstract%3A%20Vision-Language%20models%20like%20CLIP%20have%20been%20shown%20to%20be%20highly%20effective%20at%20linking%20visual%20perception%20and%20natural%20language%20understanding%2C%20enabling%20sophisticated%20image-text%20capabilities%2C%20including%20strong%20retrieval%20and%20zero-shot%20classification%20performance.%20Their%20widespread%20use%2C%20as%20well%20as%20the%20fact%20that%20CLIP%20models%20are%20trained%20on%20image-text%20pairs%20from%20the%20web%2C%20make%20them%20both%20a%20worthwhile%20and%20relatively%20easy%20target%20for%20backdoor%20attacks.%20As%20training%20foundational%20models%2C%20such%20as%20CLIP%2C%20from%20scratch%20is%20very%20expensive%2C%20this%20paper%20focuses%20on%20cleaning%20potentially%20poisoned%20models%20via%20fine-tuning.%20We%20first%20show%20that%20existing%20cleaning%20techniques%20are%20not%20effective%20against%20simple%20structured%20triggers%20used%20in%20Blended%20or%20BadNet%20backdoor%20attacks%2C%20exposing%20a%20critical%20vulnerability%20for%20potential%20real-world%20deployment%20of%20these%20models.%20Then%2C%20we%20introduce%20PAR%2C%20Perturb%20and%20Recover%2C%20a%20surprisingly%20simple%20yet%20effective%20mechanism%20to%20remove%20backdoors%20from%20CLIP%20models.%20Through%20extensive%20experiments%20across%20different%20encoders%20and%20types%20of%20backdoor%20attacks%2C%20we%20show%20that%20PAR%20achieves%20high%20backdoor%20removal%20rate%20while%20preserving%20good%20standard%20performance.%20Finally%2C%20we%20illustrate%20that%20our%20approach%20is%20effective%20even%20only%20with%20synthetic%20text-image%20pairs%2C%20i.e.%20without%20access%20to%20real%20training%20data.%20The%20code%20and%20models%20are%20available%20on%20%5Chref%7Bhttps%3A//github.com/nmndeep/PerturbAndRecover%7D%7BGitHub%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2412.00727v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPerturb%2520and%2520Recover%253A%2520Fine-tuning%2520for%2520Effective%2520Backdoor%2520Removal%2520from%2520CLIP%26entry.906535625%3DNaman%2520Deep%2520Singh%2520and%2520Francesco%2520Croce%2520and%2520Matthias%2520Hein%26entry.1292438233%3DVision-Language%2520models%2520like%2520CLIP%2520have%2520been%2520shown%2520to%2520be%2520highly%2520effective%2520at%2520linking%2520visual%2520perception%2520and%2520natural%2520language%2520understanding%252C%2520enabling%2520sophisticated%2520image-text%2520capabilities%252C%2520including%2520strong%2520retrieval%2520and%2520zero-shot%2520classification%2520performance.%2520Their%2520widespread%2520use%252C%2520as%2520well%2520as%2520the%2520fact%2520that%2520CLIP%2520models%2520are%2520trained%2520on%2520image-text%2520pairs%2520from%2520the%2520web%252C%2520make%2520them%2520both%2520a%2520worthwhile%2520and%2520relatively%2520easy%2520target%2520for%2520backdoor%2520attacks.%2520As%2520training%2520foundational%2520models%252C%2520such%2520as%2520CLIP%252C%2520from%2520scratch%2520is%2520very%2520expensive%252C%2520this%2520paper%2520focuses%2520on%2520cleaning%2520potentially%2520poisoned%2520models%2520via%2520fine-tuning.%2520We%2520first%2520show%2520that%2520existing%2520cleaning%2520techniques%2520are%2520not%2520effective%2520against%2520simple%2520structured%2520triggers%2520used%2520in%2520Blended%2520or%2520BadNet%2520backdoor%2520attacks%252C%2520exposing%2520a%2520critical%2520vulnerability%2520for%2520potential%2520real-world%2520deployment%2520of%2520these% {"title": "Attentive Dilated Convolution for Automatic Sleep Staging using Force-directed Layout", "author": "Md Jobayer and Md Mehedi Hasan Shawon and Tasfin Mahmud and Md. Borhan Uddin Antor and Arshad M. Chowdhury", "abstract": "Sleep stages play an important role in identifying sleep patterns and diagnosing sleep disorders. In this study, we present an automated sleep stage classifier called the Attentive Dilated Convolutional Neural Network (AttDiCNN), which uses deep learning methodologies to address challenges related to data heterogeneity, computational complexity, and reliable and automatic sleep staging. We employed a force-directed layout based on the visibility graph to capture the most significant information from the EEG signals, thereby representing the spatial-temporal features. The proposed network consists of three modules: the Localized Spatial Feature Extraction Network (LSFE), Spatio-Temporal-Temporal Long Retention Network (S2TLR), and Global Averaging Attention Network (G2A). The LSFE captures spatial information from sleep data, the S2TLR is designed to extract the most pertinent information in long-term contexts, and the G2A reduces computational overhead by aggregating information from the LSFE and S2TLR. We evaluated the performance of our model on three comprehensive and publicly accessible datasets, achieving state-of-the-art accuracies of 98.56%, 99.66%, and 99.08% for the EDFX, HMC, and NCH datasets, respectively, while maintaining a low computational complexity with 1.4 M parameters. Our proposed architecture surpasses existing methodologies in several performance metrics, thereby proving its potential as an automated tool for clinical settings.", "link": "http://arxiv.org/abs/2409.01962v3", "date": "2026-04-07", "relevancy": 2.5677, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.518}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.513}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5096}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Attentive%20Dilated%20Convolution%20for%20Automatic%20Sleep%20Staging%20using%20Force-directed%20Layout&body=Title%3A%20Attentive%20Dilated%20Convolution%20for%20Automatic%20Sleep%20Staging%20using%20Force-directed%20Layout%0AAuthor%3A%20Md%20Jobayer%20and%20Md%20Mehedi%20Hasan%20Shawon%20and%20Tasfin%20Mahmud%20and%20Md.%20Borhan%20Uddin%20Antor%20and%20Arshad%20M.%20Chowdhury%0AAbstract%3A%20Sleep%20stages%20play%20an%20important%20role%20in%20identifying%20sleep%20patterns%20and%20diagnosing%20sleep%20disorders.%20In%20this%20study%2C%20we%20present%20an%20automated%20sleep%20stage%20classifier%20called%20the%20Attentive%20Dilated%20Convolutional%20Neural%20Network%20%28AttDiCNN%29%2C%20which%20uses%20deep%20learning%20methodologies%20to%20address%20challenges%20related%20to%20data%20heterogeneity%2C%20computational%20complexity%2C%20and%20reliable%20and%20automatic%20sleep%20staging.%20We%20employed%20a%20force-directed%20layout%20based%20on%20the%20visibility%20graph%20to%20capture%20the%20most%20significant%20information%20from%20the%20EEG%20signals%2C%20thereby%20representing%20the%20spatial-temporal%20features.%20The%20proposed%20network%20consists%20of%20three%20modules%3A%20the%20Localized%20Spatial%20Feature%20Extraction%20Network%20%28LSFE%29%2C%20Spatio-Temporal-Temporal%20Long%20Retention%20Network%20%28S2TLR%29%2C%20and%20Global%20Averaging%20Attention%20Network%20%28G2A%29.%20The%20LSFE%20captures%20spatial%20information%20from%20sleep%20data%2C%20the%20S2TLR%20is%20designed%20to%20extract%20the%20most%20pertinent%20information%20in%20long-term%20contexts%2C%20and%20the%20G2A%20reduces%20computational%20overhead%20by%20aggregating%20information%20from%20the%20LSFE%20and%20S2TLR.%20We%20evaluated%20the%20performance%20of%20our%20model%20on%20three%20comprehensive%20and%20publicly%20accessible%20datasets%2C%20achieving%20state-of-the-art%20accuracies%20of%2098.56%25%2C%2099.66%25%2C%20and%2099.08%25%20for%20the%20EDFX%2C%20HMC%2C%20and%20NCH%20datasets%2C%20respectively%2C%20while%20maintaining%20a%20low%20computational%20complexity%20with%201.4%20M%20parameters.%20Our%20proposed%20architecture%20surpasses%20existing%20methodologies%20in%20several%20performance%20metrics%2C%20thereby%20proving%20its%20potential%20as%20an%20automated%20tool%20for%20clinical%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2409.01962v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAttentive%2520Dilated%2520Convolution%2520for%2520Automatic%2520Sleep%2520Staging%2520using%2520Force-directed%2520Layout%26entry.906535625%3DMd%2520Jobayer%2520and%2520Md%2520Mehedi%2520Hasan%2520Shawon%2520and%2520Tasfin%2520Mahmud%2520and%2520Md.%2520Borhan%2520Uddin%2520Antor%2520and%2520Arshad%2520M.%2520Chowdhury%26entry.1292438233%3DSleep%2520stages%2520play%2520an%2520important%2520role%2520in%2520identifying%2520sleep%2520patterns%2520and%2520diagnosing%2520sleep%2520disorders.%2520In%2520this%2520study%252C%2520we%2520present%2520an%2520automated%2520sleep%2520stage%2520classifier%2520called%2520the%2520Attentive%2520Dilated%2520Convolutional%2520Neural%2520Network%2520%2528AttDiCNN%2529%252C%2520which%2520uses%2520deep%2520learning%2520methodologies%2520to%2520address%2520challenges%2520related%2520to%2520data%2520heterogeneity%252C%2520computational%2520complexity%252C%2520and%2520reliable%2520and%2520automatic%2520sleep%2520staging.%2520We%2520employed%2520a%2520force-directed%2520layout%2520based%2520on%2520the%2520visibility%2520graph%2520to%2520capture%2520the%2520most%2520significant%2520information%2520from%2520the%2520EEG%2520si

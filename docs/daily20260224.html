{"title": "NanoKnow: How to Know What Your Language Model Knows", "author": "Lingwei Gu and Nour Jedidi and Jimmy Lin", "abstract": "How do large language models (LLMs) know what they know? Answering this question has been difficult because pre-training data is often a \"black box\" -- unknown or inaccessible. The recent release of nanochat -- a family of small LLMs with fully open pre-training data -- addresses this as it provides a transparent view into where a model's parametric knowledge comes from. Towards the goal of understanding how knowledge is encoded by LLMs, we release NanoKnow, a benchmark dataset that partitions questions from Natural Questions and SQuAD into splits based on whether their answers are present in nanochat's pre-training corpus. Using these splits, we can now properly disentangle the sources of knowledge that LLMs rely on when producing an output. To demonstrate NanoKnow's utility, we conduct experiments using eight nanochat checkpoints. Our findings show: (1) closed-book accuracy is strongly influenced by answer frequency in the pre-training data, (2) providing external evidence can mitigate this frequency dependence, (3) even with external evidence, models are more accurate when answers were seen during pre-training, demonstrating that parametric and external knowledge are complementary, and (4) non-relevant information is harmful, with accuracy decreasing based on both the position and the number of non-relevant contexts. We release all NanoKnow artifacts at https://github.com/castorini/NanoKnow.", "link": "http://arxiv.org/abs/2602.20122v1", "date": "2026-02-23", "relevancy": 2.4393, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5016}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5016}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4605}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NanoKnow%3A%20How%20to%20Know%20What%20Your%20Language%20Model%20Knows&body=Title%3A%20NanoKnow%3A%20How%20to%20Know%20What%20Your%20Language%20Model%20Knows%0AAuthor%3A%20Lingwei%20Gu%20and%20Nour%20Jedidi%20and%20Jimmy%20Lin%0AAbstract%3A%20How%20do%20large%20language%20models%20%28LLMs%29%20know%20what%20they%20know%3F%20Answering%20this%20question%20has%20been%20difficult%20because%20pre-training%20data%20is%20often%20a%20%22black%20box%22%20--%20unknown%20or%20inaccessible.%20The%20recent%20release%20of%20nanochat%20--%20a%20family%20of%20small%20LLMs%20with%20fully%20open%20pre-training%20data%20--%20addresses%20this%20as%20it%20provides%20a%20transparent%20view%20into%20where%20a%20model%27s%20parametric%20knowledge%20comes%20from.%20Towards%20the%20goal%20of%20understanding%20how%20knowledge%20is%20encoded%20by%20LLMs%2C%20we%20release%20NanoKnow%2C%20a%20benchmark%20dataset%20that%20partitions%20questions%20from%20Natural%20Questions%20and%20SQuAD%20into%20splits%20based%20on%20whether%20their%20answers%20are%20present%20in%20nanochat%27s%20pre-training%20corpus.%20Using%20these%20splits%2C%20we%20can%20now%20properly%20disentangle%20the%20sources%20of%20knowledge%20that%20LLMs%20rely%20on%20when%20producing%20an%20output.%20To%20demonstrate%20NanoKnow%27s%20utility%2C%20we%20conduct%20experiments%20using%20eight%20nanochat%20checkpoints.%20Our%20findings%20show%3A%20%281%29%20closed-book%20accuracy%20is%20strongly%20influenced%20by%20answer%20frequency%20in%20the%20pre-training%20data%2C%20%282%29%20providing%20external%20evidence%20can%20mitigate%20this%20frequency%20dependence%2C%20%283%29%20even%20with%20external%20evidence%2C%20models%20are%20more%20accurate%20when%20answers%20were%20seen%20during%20pre-training%2C%20demonstrating%20that%20parametric%20and%20external%20knowledge%20are%20complementary%2C%20and%20%284%29%20non-relevant%20information%20is%20harmful%2C%20with%20accuracy%20decreasing%20based%20on%20both%20the%20position%20and%20the%20number%20of%20non-relevant%20contexts.%20We%20release%20all%20NanoKnow%20artifacts%20at%20https%3A//github.com/castorini/NanoKnow.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20122v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNanoKnow%253A%2520How%2520to%2520Know%2520What%2520Your%2520Language%2520Model%2520Knows%26entry.906535625%3DLingwei%2520Gu%2520and%2520Nour%2520Jedidi%2520and%2520Jimmy%2520Lin%26entry.1292438233%3DHow%2520do%2520large%2520language%2520models%2520%2528LLMs%2529%2520know%2520what%2520they%2520know%253F%2520Answering%2520this%2520question%2520has%2520been%2520difficult%2520because%2520pre-training%2520data%2520is%2520often%2520a%2520%2522black%2520box%2522%2520--%2520unknown%2520or%2520inaccessible.%2520The%2520recent%2520release%2520of%2520nanochat%2520--%2520a%2520family%2520of%2520small%2520LLMs%2520with%2520fully%2520open%2520pre-training%2520data%2520--%2520addresses%2520this%2520as%2520it%2520provides%2520a%2520transparent%2520view%2520into%2520where%2520a%2520model%2527s%2520parametric%2520knowledge%2520comes%2520from.%2520Towards%2520the%2520goal%2520of%2520understanding%2520how%2520knowledge%2520is%2520encoded%2520by%2520LLMs%252C%2520we%2520release%2520NanoKnow%252C%2520a%2520benchmark%2520dataset%2520that%2520partitions%2520questions%2520from%2520Natural%2520Questions%2520and%2520SQuAD%2520into%2520splits%2520based%2520on%2520whether%2520their%2520answers%2520are%2520present%2520in%2520nanochat%2527s%2520pre-training%2520corpus.%2520Using%2520these%2520splits%252C%2520we%2520can%2520now%2520properly%2520disentangle%2520the%2520sources%2520of%2520knowledge%2520that%2520LLMs%2520rely%2520on%2520when%2520producing%2520an%2520output.%2520To%2520demonstrate%2520NanoKnow%2527s%2520utility%252C%2520we%2520conduct%2520experiments%2520using%2520eight%2520nanochat%2520checkpoints.%2520Our%2520findings%2520show%253A%2520%25281%2529%2520closed-book%2520accuracy%2520is%2520strongly%2520influenced%2520by%2520answer%2520frequency%2520in%2520the%2520pre-training%2520data%252C%2520%25282%2529%2520providing%2520external%2520evidence%2520can%2520mitigate%2520this%2520frequency%2520dependence%252C%2520%25283%2529%2520even%2520with%2520external%2520evidence%252C%2520models%2520are%2520more%2520accurate%2520when%2520answers%2520were%2520seen%2520during%2520pre-training%252C%2520demonstrating%2520that%2520parametric%2520and%2520external%2520knowledge%2520are%2520complementary%252C%2520and%2520%25284%2529%2520non-relevant%2520information%2520is%2520harmful%252C%2520with%2520accuracy%2520decreasing%2520based%2520on%2520both%2520the%2520position%2520and%2520the%2520number%2520of%2520non-relevant%2520contexts.%2520We%2520release%2520all%2520NanoKnow%2520artifacts%2520at%2520https%253A//github.com/castorini/NanoKnow.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.20122v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=NanoKnow%3A%20How%20to%20Know%20What%20Your%20Language%20Model%20Knows&entry.906535625=Lingwei%20Gu%20and%20Nour%20Jedidi%20and%20Jimmy%20Lin&entry.1292438233=How%20do%20large%20language%20models%20%28LLMs%29%20know%20what%20they%20know%3F%20Answering%20this%20question%20has%20been%20difficult%20because%20pre-training%20data%20is%20often%20a%20%22black%20box%22%20--%20unknown%20or%20inaccessible.%20The%20recent%20release%20of%20nanochat%20--%20a%20family%20of%20small%20LLMs%20with%20fully%20open%20pre-training%20data%20--%20addresses%20this%20as%20it%20provides%20a%20transparent%20view%20into%20where%20a%20model%27s%20parametric%20knowledge%20comes%20from.%20Towards%20the%20goal%20of%20understanding%20how%20knowledge%20is%20encoded% {"title": "KINESIS: Motion Imitation for Human Musculoskeletal Locomotion", "author": "Merkourios Simos and Alberto Silvio Chiappa and Alexander Mathis", "abstract": "How do humans move? Advances in reinforcement learning (RL) have produced impressive results in capturing human motion using physics-based humanoid control. However, torque-controlled humanoids fail to model key aspects of human motor control such as biomechanical joint constraints \\& non-linear and overactuated musculotendon control. We present KINESIS, a model-free motion imitation framework that tackles these challenges. KINESIS is trained on 1.8 hours of locomotion data and achieves strong motion imitation performance on unseen trajectories. Through a negative mining approach, KINESIS learns robust locomotion priors that we leverage to deploy the policy on several downstream tasks such as text-to-control, target point reaching, and football penalty kicks. Importantly, KINESIS learns to generate muscle activity patterns that correlate well with human EMG activity. We show that these results scale seamlessly across biomechanical model complexity, demonstrating control of up to 290 muscles. Overall, the physiological plausibility makes KINESIS a promising model for tackling challenging problems in human motor control. Code, videos and benchmarks are available at https://github.com/amathislab/Kinesis.", "link": "http://arxiv.org/abs/2503.14637v2", "date": "2026-02-23", "relevancy": 2.4379, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6553}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5929}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5703}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20KINESIS%3A%20Motion%20Imitation%20for%20Human%20Musculoskeletal%20Locomotion&body=Title%3A%20KINESIS%3A%20Motion%20Imitation%20for%20Human%20Musculoskeletal%20Locomotion%0AAuthor%3A%20Merkourios%20Simos%20and%20Alberto%20Silvio%20Chiappa%20and%20Alexander%20Mathis%0AAbstract%3A%20How%20do%20humans%20move%3F%20Advances%20in%20reinforcement%20learning%20%28RL%29%20have%20produced%20impressive%20results%20in%20capturing%20human%20motion%20using%20physics-based%20humanoid%20control.%20However%2C%20torque-controlled%20humanoids%20fail%20to%20model%20key%20aspects%20of%20human%20motor%20control%20such%20as%20biomechanical%20joint%20constraints%20%5C%26%20non-linear%20and%20overactuated%20musculotendon%20control.%20We%20present%20KINESIS%2C%20a%20model-free%20motion%20imitation%20framework%20that%20tackles%20these%20challenges.%20KINESIS%20is%20trained%20on%201.8%20hours%20of%20locomotion%20data%20and%20achieves%20strong%20motion%20imitation%20performance%20on%20unseen%20trajectories.%20Through%20a%20negative%20mining%20approach%2C%20KINESIS%20learns%20robust%20locomotion%20priors%20that%20we%20leverage%20to%20deploy%20the%20policy%20on%20several%20downstream%20tasks%20such%20as%20text-to-control%2C%20target%20point%20reaching%2C%20and%20football%20penalty%20kicks.%20Importantly%2C%20KINESIS%20learns%20to%20generate%20muscle%20activity%20patterns%20that%20correlate%20well%20with%20human%20EMG%20activity.%20We%20show%20that%20these%20results%20scale%20seamlessly%20across%20biomechanical%20model%20complexity%2C%20demonstrating%20control%20of%20up%20to%20290%20muscles.%20Overall%2C%20the%20physiological%20plausibility%20makes%20KINESIS%20a%20promising%20model%20for%20tackling%20challenging%20problems%20in%20human%20motor%20control.%20Code%2C%20videos%20and%20benchmarks%20are%20available%20at%20https%3A//github.com/amathislab/Kinesis.%0ALink%3A%20http%3A//arxiv.org/abs/2503.14637v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qs {"title": "Benchmarking Pretrained Molecular Embedding Models For Molecular Representation Learning", "author": "Mateusz Praski and Jakub Adamczyk and Wojciech Czech", "abstract": "Pretrained neural networks have attracted significant interest in chemistry and small molecule drug design. Embeddings from these models are widely used for molecular property prediction, virtual screening, and small data learning in molecular chemistry. This study presents the most extensive comparison of such models to date, evaluating 25 models across 25 datasets. Under a fair comparison framework, we assess models spanning various modalities, architectures, and pretraining strategies. Using a dedicated hierarchical Bayesian statistical testing model, we arrive at a surprising result: nearly all neural models show negligible or no improvement over the baseline ECFP molecular fingerprint. Only the CLAMP model, which is also based on molecular fingerprints, performs statistically significantly better than the alternatives. These findings raise concerns about the evaluation rigor in existing studies. We discuss potential causes, propose solutions, and offer practical recommendations.", "link": "http://arxiv.org/abs/2508.06199v4", "date": "2026-02-23", "relevancy": 2.4333, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5035}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5035}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4529}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Benchmarking%20Pretrained%20Molecular%20Embedding%20Models%20For%20Molecular%20Representation%20Learning&body=Title%3A%20Benchmarking%20Pretrained%20Molecular%20Embedding%20Models%20For%20Molecular%20Representation%20Learning%0AAuthor%3A%20Mateusz%20Praski%20and%20Jakub%20Adamczyk%20and%20Wojciech%20Czech%0AAbstract%3A%20Pretrained%20neural%20networks%20have%20attracted%20significant%20interest%20in%20chemistry%20and%20small%20molecule%20drug%20design.%20Embeddings%20from%20these%20models%20are%20widely%20used%20for%20molecular%20property%20prediction%2C%20virtual%20screening%2C%20and%20small%20data%20learning%20in%20molecular%20chemistry.%20This%20study%20presents%20the%20most%20extensive%20comparison%20of%20such%20models%20to%20date%2C%20evaluating%2025%20models%20across%2025%20datasets.%20Under%20a%20fair%20comparison%20framework%2C%20we%20assess%20models%20spanning%20various%20modalities%2C%20architectures%2C%20and%20pretraining%20strategies.%20Using%20a%20dedicated%20hierarchical%20Bayesian%20statistical%20testing%20model%2C%20we%20arrive%20at%20a%20surprising%20result%3A%20nearly%20all%20neural%20models%20show%20negligible%20or%20no%20improvement%20over%20the%20baseline%20ECFP%20molecular%20fingerprint.%20Only%20the%20CLAMP%20model%2C%20which%20is%20also%20based%20on%20molecular%20fingerprints%2C%20performs%20statistically%20significantly%20better%20than%20the%20alternatives.%20These%20findings%20raise%20concerns%20about%20the%20evaluation%20rigor%20in%20existing%20studies.%20We%20discuss%20potential%20causes%2C%20propose%20solutions%2C%20and%20offer%20practical%20recommendations.%0ALink%3A%20http%3A//arxiv.org/abs/2508.06199v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBenchmarking%2520Pretrained%2520Molecular%2520Embedding%2520Models%2520For%2520Molecular%2520Representation%2520Learning%26entry.906535625%3DMateusz%2520Praski%2520and%2520Jakub%2520Adamczyk%2520and%2520Wojciech%2520Czech%26entry.1292438233%3DPretrained%2520neural%2520networks%2520have%2520attracted%2520significant%2520interest%2520in%2520chemistry%2520and%2520small%2520molecule%2520drug%2520 m%20these%20models%20are%20widely%20used%20for%20molecular%20property%20prediction%2C%20virtual%20screening%2C%20and%20small%20data%20learning%20in%20molecular%20chemistry.%20This%20study%20presents%20the%20most%20extensive%20comparison%20of%20such%20models%20to%20date%2C%20evaluating%2025%20models%20across%2025%20datasets.%20Under%20a%20fair%20comparison%20framework%2C%20we%20assess%20models%20spanning%20various%20modalities%2C%20architectures%2C%20and%20pretraining%20strategies.%20Using%20a%20dedicated%20hierarchical%20Bayesian%20statistical%20testing%20model%2C%20we%20arrive%20at%20a%20surprising%20result%3A%20nearly%20all%20neural%20models%20show%20negligible%20or%20no%20improvement%20over%20the%20baseline%20ECFP%20molecular%20fingerprint.%20Only%20the%20CLAMP%20model%2C%20which%20is%20also%20based%20on%20molecular%20fingerprints%2C%20performs%20statistically%20significantly%20better%20than%20the%20alternatives.%20These%20findings%20raise%20concerns%20about%20the%20evaluation%20rigor%20in%20existing%20studies.%20We%20discuss%20potential%20causes%2C%20propose%20solutions%2C%20and%20offer%20practical%20recommendations.&entry.1838667208=http%3A//arxiv.org/abs/2508.06199v4&entry.124074799=Read"},
{"title": "Towards Dexterous Embodied Manipulation via Deep Multi-Sensory Fusion and Sparse Expert Scaling", "author": "Yirui Sun and Guangyu Zhuge and Keliang Liu and Jie Gu and Zhihao xia and Qionglin Ren and Chunxu tian and Zhongxue Ga", "abstract": "Realizing dexterous embodied manipulation necessitates the deep integration of heterogeneous multimodal sensory inputs. However, current vision-centric paradigms often overlook the critical force and geometric feedback essential for complex tasks. This paper presents DeMUSE, a Deep Multimodal Unified Sparse Experts framework leveraging a Diffusion Transformer to integrate RGB, depth, and 6-axis force into a unified serialized stream. Adaptive Modality-specific Normalization (AdaMN) is employed to recalibrate modality-aware features, mitigating representation imbalance and harmonizing the heterogeneous distributions of multi-sensory signals. To facilitate efficient scaling, the architecture utilizes a Sparse Mixture-of-Experts (MoE) with shared experts, increasing model capacity for physical priors while maintaining the low inference latency required for real-time control. A Joint denoising objective synchronously synthesizes environmental evolution and action sequences to ensure physical consistency. Achieving success rates of 83.2% and 72.5% in simulation and real-world trials, DeMUSE demonstrates state-of-the-art performance, validating the necessity of deep multi-sensory integration for complex physical interactions.", "link": "http://arxiv.org/abs/2602.19764v1", "date": "2026-02-23", "relevancy": 2.4304, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6129}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6055}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "sim {"title": "PaReGTA: An LLM-based EHR Data Encoding Approach to Capture Temporal Information", "author": "Kihyuk Yoon and Lingchao Mao and Catherine Chong and Todd J. Schwedt and Chia-Chun Chiang and Jing Li", "abstract": "Temporal information in structured electronic health records (EHRs) is often lost in sparse one-hot or count-based representations, while sequence models can be costly and data-hungry. We propose PaReGTA, an LLM-based encoding framework that (i) converts longitudinal EHR events into visit-level templated text with explicit temporal cues, (ii) learns domain-adapted visit embeddings via lightweight contrastive fine-tuning of a sentence-embedding model, and (iii) aggregates visit embeddings into a fixed-dimensional patient representation using hybrid temporal pooling that captures both recency and globally informative visits. Because PaReGTA does not require training from scratch but instead utilizes a pre-trained LLM, it can perform well even in data-limited cohorts. Furthermore, PaReGTA is model-agnostic and can benefit from future EHR-specialized sentence-embedding models. For interpretability, we introduce PaReGTA-RSS (Representation Shift Score), which quantifies clinically defined factor importance by recomputing representations after targeted factor removal and projecting representation shifts through a machine learning model. On 39,088 migraine patients from the All of Us Research Program, PaReGTA outperforms sparse baselines for migraine type classification while deep sequential models were unstable in our cohort.", "link": "http://arxiv.org/abs/2602.19661v1", "date": "2026-02-23", "relevancy": 2.3946, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4881}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4834}, {"title": "GST: {"title": "Unlearning Noise in PINNs: A Selective Pruning Framework for PDE Inverse Problems", "author": "Yongsheng Chen and Yong Chen and Wei Guo and Xinghui Zhong", "abstract": "Physics-informed neural networks (PINNs) provide a promising framework for solving inverse problems governed by partial differential equations (PDEs) by integrating observational data and physical constraints in a unified optimization objective. However, the ill-posed nature of PDE inverse problems makes them highly sensitive to noise. Even a small fraction of corrupted observations can distort internal neural representations, severely impairing accuracy and destabilizing training. Motivated by recent advances in machine unlearning and structured network pruning, we propose P-PINN, a selective pruning framework designed to unlearn the influence of corrupted data in a pretrained PINN. Specifically, starting from a PINN trained on the full dataset, P-PINN evaluates a joint residual--data fidelity indicator, a weighted combination of data misfit and PDE residuals, to partition the training set into reliable and corrupted subsets. Next, we introduce a bias-based neuron importance measure that quantifies directional activation discrepancies between the two subsets, identifying neurons whose representations are predominantly driven by corrupted samples. Building on this, an iterative pruning strategy then removes noise-sensitive neurons layer by layer. The resulting pruned network is fine-tuned on the reliable data subject to the original PDE constraints, acting as a lightweight post-processing stage rather than a complete retraining. Numerical experiments on extensive PDE inverse-problem benchmarks demonstrate that P-PINN substantially improves robustness, accuracy, and training stability under noisy conditions, achieving up to a 96.6\\% reduction in relative error compared with baseline PINNs. These results indicate that activation-level post hoc pruning is a promising mechanism for enhancing {"title": "Carbon-Aware Governance Gates: An Architecture for Sustainable GenAI Development", "author": "Mateen A. Abbasi and Tommi J. Mikkonen and Petri J. Ihantola and Muhammad Waseem and Pekka Abrahamsson and Niko K. M\u00e4kitalo", "abstract": "The rapid adoption of Generative AI (GenAI) in the software development life cycle (SDLC) increases computational demand, which can raise the carbon footprint of development activities. At the same time, organizations are increasingly embedding governance mechanisms into GenAI-assisted development to support trust, transparency, and accountability. However, these governance mechanisms introduce additional computational workloads, including repeated inference, regeneration cycles, and expanded validation pipelines, increasing energy use and the carbon footprint of GenAI-assisted development. This paper proposes Carbon-Aware Governance Gates (CAGG), an architectural extension that embeds carbon budgets, energy provenance, and sustainability-aware validation orchestration into human-AI governance layers. CAGG comprises three components: (i) an Energy and Carbon Provenance Ledger, (ii) a Carbon Budget Manager, and (iii) a Green Validation Orchestrator, operationalized through governance policies and reusable design patterns.", "link": "http://arxiv.org/abs/2602.19718v1", "date": "2026-02-23", "relevancy": 2.3923, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4961}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.47}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4693}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Carbon-Aware%20Governance%20Gates%3A%20An%20Architecture%20for%20Sustainable%20GenAI%20Development&b {"title": "Iconographic Classification and Content-Based Recommendation for Digitized Artworks", "author": "Krzysztof Kutt and Maciej Baczy\u0144ski", "abstract": "We present a proof-of-concept system that automates iconographic classification and content-based recommendation of digitized artworks using the Iconclass vocabulary and selected artificial intelligence methods. The prototype implements a four-stage workflow for classification and recommendation, which integrates YOLOv8 object detection with algorithmic mappings to Iconclass codes, rule-based inference for abstract meanings, and three complementary recommenders (hierarchical proximity, IDF-weighted overlap, and Jaccard similarity). Although more engineering is still needed, the evaluation demonstrates the potential of this solution: Iconclass-aware computer vision and recommendation methods can accelerate cataloging and enhance navigation in large heritage repositories. The key insight is to let computer vision propose visible elements and to use symbolic structures (Iconclass hierarchy) to reach meaning.", "link": "http://arxiv.org/abs/2602.19698v1", "date": "2026-02-23", "relevancy": 2.3745, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4793}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4745}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.471}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Iconographic%20Classification%20and%20Content-Based%20Recommendation%20for%20Digitized%20Artworks&body=Title%3A%20Iconographic%20Classification%20and%20Content-Based%20Recommendation%20for%20Digitized%20Artworks%0AAuthor%3A%20Krzysztof%20Kutt%20and%20Maciej%20Baczy%C5%84ski%0AAbstract%3A%20We%20present%20a%20proof-of-concept%20system%20that%20automates%20iconographic%20classification%20and%20content-based%20recommendation%20of%20digitized%20artworks%20using%20the%20Iconclass%20vocabulary%20and%20selected%20artificial%20intelligence%20methods.%20The%20prototype%20implements%20a%20four-stage%20workflow%20for%20classification%20and%20recommendation%2C%20which%20integrates%20YOLOv8%20object%20detection%20with%20algorithmic%20mappings%20to%20Iconclass%20codes%2C%20rule-based%20inference%20for%20abstract%20meanings%2C%20and%20three%20complementary%20recommenders%20%28hierarchical%20proximity%2C%20IDF-weighted%20overlap%2C%20and%20Jaccard%20similarity%29.%20Although%20more%20engineering%20is%20still%20needed%2C%20the%20evaluation%20demonstrates%20the%20potential%20of%20this%20solution%3A%20Iconclass-aware%20computer%20vision%20and%20recommendation%20methods%20can%20accelerate%20cataloging%20and%20enhance%20navigation%20in%20large%20heritage%20repositories.%20The%20key%20insight%20is%20to%20let%20computer%20vision%20propose%20visible%20elements%20and%20to%20use%20symbolic%20structures%20%28Iconclass%20hierarchy%29%20to%20reach%20meaning.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19698v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIconographic%2520Classification%2520and%2520Content-Based%2520Recommendation%2520for%2520Digitized%2520Artworks%26entry.906535625%3DKrzysztof%2520Kutt%2520and%2520Maciej%2520Baczy%25C5%2584ski%26entry.1292438233%3DWe%2520present%2520a%2520proof-of-concept%2520system%2520that%2520automates%2520iconographic%2520classification%2520and%2520content-based%2520recommendation%2520of%2520digitized%2520artworks%2520using%2520the%2520Iconclass%2520vocabulary%2520and%2520selected%2520artificial%2520intelligence%2520methods.%2520The%2520prototype%2520impleme {"title": "Align When They Want, Complement When They Need! Human-Centered Ensembles for Adaptive Human-AI Collaboration", "author": "Hasan Amin and Ming Yin and Rajiv Khanna", "abstract": "In human-AI decision making, designing AI that complements human expertise has been a natural strategy to enhance human-AI collaboration, yet it often comes at the cost of decreased AI performance in areas of human strengths. This can inadvertently erode human trust and cause them to ignore AI advice precisely when it is most needed. Conversely, an aligned AI fosters trust yet risks reinforcing suboptimal human behavior and lowering human-AI team performance. In this paper, we start by identifying this fundamental tension between performance-boosting (i.e., complementarity) and trust-building (i.e., alignment) as an inherent limitation of the traditional approach for training a single AI model to assist human decision making. To overcome this, we introduce a novel human-centered adaptive AI ensemble that strategically toggles between two specialist AI models - the aligned model and the complementary model - based on contextual cues, using an elegantly simple yet provably near-optimal Rational Routing Shortcut mechanism. Comprehensive theoretical analyses elucidate why the adaptive AI ensemble is effective and when it yields maximum benefits. Moreover, experiments on both simulated and real-world data show that when humans are assisted by the adaptive AI ensemble in decision making, they can achieve significantly higher performance than when they are assisted by single AI models that are trained to either optimize for their independent performance or even the human-AI team performance.", "link": "http://arxiv.org/abs/2602.20104v1", "date": "2026-02-23", "relevancy": 2.3375, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4736}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4662}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4626}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Align%20When%20They%20Want%2C%20Complement%20When%20They%20Need%21%20Human-Centered%20Ensembles%20for%20Adaptive%20Human-AI%20Collaboration&body=Title%3A%20Align%20When%20They%20Want%2C%20Complement%20When%20They%20Need%21%20Human-Centered%20Ensembles%20for%20Adaptive%20Human-AI%20Collaboration%0AAuthor%3A%20Hasan%20Amin%20and%20Ming%20Yin%20and%20Rajiv%20Khanna%0AAbstract%3A%20In%20human-AI%20decision%20making%2C%20designing%20AI%20that%20complements%20human%20expertise%20has%20been%20a%20natural%20strategy%20to%20enhance%20human-AI%20collaboration%2C%20yet%20it%20often%20comes%20at%20the%20cost%20of%20decreased%20AI%20performance%20in%20areas%20of%20human%20strengths.%20This%20can%20inadvertently%20erode%20human%20trust%20and%20cause%20them%20to%20ignore%20AI%20advice%20precisely%20when%20it%20is%20most%20needed.%20Conversely%2C%20an%20aligned%20AI%20fosters%20trust%20yet%20risks%20reinforcing%20suboptimal%20human%20behavior%20and%20lowering%20human-AI%20team%20performance.%20In%20this%20paper%2C%20we%20start%20by%20identifying%20this%20fundamental%20tension%20between%20performance-boosting%20%28i.e.%2C%20complementarity%29%20and%20trust-building%20%28i.e.%2C%20alignment%29%20as%20an%20inherent%20limitation%20of%20the%20traditional%20approach%20for%20training%20a%20single%20AI%20model%20to%20assist%20human%20decision%20making.%20To%20overcome%20this%2C%20we%20introduce%20a%20novel%20human-centered%20adaptive%20AI%20ensemble%20that%20strategically%20toggles%20between%20two%20specialist%20AI%20models%20-%20the%20aligned%20model%20and%20the%20complementary%20model%20-%20based%20on%20contextual%20cues%2C%20using%20an%20elegantly%20simple%20yet%20provably%20near-opti {"title": "Latent Introspection: Models Can Detect Prior Concept Injections", "author": "Theia Pearson-Vogel and Martin Vanek and Raymond Douglas and Jan Kulveit", "abstract": "We uncover a latent capacity for introspection in a Qwen 32B model, demonstrating that the model can detect when concepts have been injected into its earlier context and identify which concept was injected. While the model denies injection in sampled outputs, logit lens analysis reveals clear detection signals in the residual stream, which are attenuated in the final layers. Furthermore, prompting the model with accurate information about AI introspection mechanisms can dramatically strengthen this effect: the sensitivity to injection increases massively (0.3% -> 39.2%) with only a 0.6% increase in false positives. Also, mutual information between nine injected and recovered concepts rises from 0.62 bits to 1.05 bits, ruling out generic noise explanations. Our results demonstrate models can have a surprising capacity for introspection and steering awareness that is easy to overlook, with consequences for latent reasoning and safety.", "link": "http://arxiv.org/abs/2602.20031v1", "date": "2026-02-23", "relevancy": 2.3359, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4675}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.467}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.467}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Latent%20Introspection%3A%20Models%20Can%20Detect%20Prior%20Concept%20Injections&body=Title%3A%20Latent%20Introspection%3A%20Models%20Can%20Detect%20Prior%20Concept%20Injections%0AAuthor%3A%20Theia%20Pearson-Vogel%20and%20 {"title": "Role-Aware Language Models for Secure and Contextualized Access Control in Organizations", "author": "Saeed Almheiri and Yerulan Kongrat and Adrian Santosh and Ruslan Tasmukhanov and Josemaria Loza Vera and Muhammad Dehan Al Kautsar and Fajri Koto", "abstract": "As large language models (LLMs) are increasingly deployed in enterprise settings, controlling model behavior based on user roles becomes an essential requirement. Existing safety methods typically assume uniform access and focus on preventing harmful or toxic outputs, without addressing role-specific access constraints. In this work, we investigate whether LLMs can be fine-tuned to generate responses that reflect the access privileges associated with different organizational roles. We explore three modeling strategies: a BERT-based classifier, an LLM-based classifier, and role-conditioned generation. To evaluate these approaches, we construct two complementary datasets. The first is adapted from existing instruction-tuning corpora through clustering and role labeling, while the second is synthetically generated to reflect realistic, role-sensitive enterprise scenarios. We assess model performance across varying organizational structures and analyze robustness to prompt injection, role mismatch, and jailbreak attempts.", "link": "http://arxiv.org/abs/2507.23465v3", "date": "2026-02-23", "relevancy": 2.3322, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4669}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4662}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity {"title": "Simulation-Ready Cluttered Scene Estimation via Physics-aware Joint Shape and Pose Optimization", "author": "Wei-Cheng Huang and Jiaheng Han and Xiaohan Ye and Zherong Pan and Kris Hauser", "abstract": "Estimating simulation-ready scenes from real-world observations is crucial for downstream planning and policy learning tasks. Regretfully, existing methods struggle in cluttered environments, often exhibiting prohibitive computational cost, poor robustness, and restricted generality when scaling to multiple interacting objects. We propose a unified optimization-based formulation for real-to-sim scene estimation that jointly recovers the shapes and poses of multiple rigid objects under physical constraints. Our method is built on two key technical innovations. First, we leverage the recently introduced shape-differentiable contact model, whose global differentiability permits joint optimization over object geometry and pose while modeling inter-object contacts. Second, we exploit the structured sparsity of the augmented Lagrangian Hessian to derive an efficient linear system solver whose computational cost scales favorably with scene complexity. Building on this formulation, we develop an end-to-end real-to-sim scene estimation pipeline that integrates learning-based object initialization, physics-constrained joint shape-pose optimization, and differentiable texture refinement. Experiments on cluttered scenes with up to 5 objects and 22 convex hulls demonstrate that our approach robustly reconstructs physically valid, simulation-ready object shapes and poses.", "link": "http://arxiv.org/abs/2602.20150v1", "date": "2026-02-23", "relevancy": 2.3176, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5875}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5836}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.572}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Simulation-Ready%20Cluttered%20Scene%20Estimation%20via%20Physics-aware%20Joint%20Shape%20and%20Pose%20Optimization&body=Title%3A%20Simulation-Ready%20Cluttered%20Scene%20Estimation%20via%20Physics-aware%20Joint%20Shape%20and%20Pose%20Optimization%0AAuthor%3A%20Wei-Cheng%20Huang%20and%20Jiaheng%20Han%20and%20Xiaohan%20Ye%20and%20Zherong%20Pan%20and%20Kris%20Hauser%0AAbstract%3A%20Estimating%20simulation-ready%20scenes%20from%20real-world%20observations%20is%20crucial%20for%20downstream%20planning%20and%20policy%20learning%20tasks.%20Regretfully%2C%20existing%20methods%20struggle%20in%20cluttered%20environments%2C%20often%20exhibiting%20prohibitive%20computational%20cost%2C%20poor%20robustness%2C%20and%20restricted%20generality%20when%20scaling%20to%20multiple%20interacting%20objects.%20We%20propose%20a%20unified%20optimization-based%20formulation%20for%20real-to-sim%20scene%20estimation%20that%20jointly%20recovers%20the%20shapes%20and%20poses%20of%20multiple%20rigid%20objects%20under%20physical%20constraints.%20Our%20method%20is%20built%20on%20two%20key%20technical%20innovations.%20First%2C%20we%20leverage%20the%20recently%20introduced%20shape-differentiable%20contact%20model%2C%20whose%20global%20differentiability%20permits%20joint%20optimization%20over%20object%20geometry%20and%20pose%20while%20modeling%20inter-object%20contacts.%20Second%2C%20we%20exploit%20the%20structured%20sparsity%20of%20the%20augmented%20Lagrangian%20Hessian%20to%20derive%20an%20efficient%20linear%20system%20solver%20whose%20computational%20cost%20scales%20favorably%20with%20scene%20complexity.%20Building%20on%20this%20formulation%2C%20we%20develop%20an%20end-to-end%20real-to-sim%20scene%20estimation%20pipeline%20that%20integrates%20learning-based%20object%20initialization%2C% {"title": "Mobile-O: Unified Multimodal Understanding and Generation on Mobile Device", "author": "Abdelrahman Shaker and Ahmed Heakl and Jaseel Muhammad and Ritesh Thawkar and Omkar Thawakar and Senmao Li and Hisham Cholakkal and Ian Reid and Eric P. Xing and Salman Khan and Fahad Shahbaz Khan", "abstract": "Unified multimodal models can both understand and generate visual content within a single architecture. Existing models, however, remain data-hungry and too heavy for deployment on edge devices. We present Mobile-O, a compact vision-language-diffusion model that brings unified multimodal intelligence to a mobile device. Its core module, the Mobile Conditioning Projector (MCP), fuses vision-language features with a diffusion generator using depthwise-separable convolutions and layerwise alignment. This design enables efficient cross-modal conditioning with minimal computational cost. Trained on only a few million samples and post-trained in a novel quadruplet format (generation prompt, image, question, answer), Mobile-O jointly enhances both visual understanding and generation capabilities. Despite its efficiency, Mobile-O attains competitive or superior performance compared to other unified models, achieving 74% on GenEval and outperforming Show-O and JanusFlow by 5% and 11%, while running 6x and 11x faster, respectively. For visual understanding, Mobile-O surpasses them by 15.3% and 5.1% averaged across seven benchmarks. Running in only ~3s per 512x512 image on an iPhone, Mobile-O establishes the first practical framework for real-time unified multimodal understanding and generation on edge devices. We hope Mobile-O will ease future research in real-time unified multimodal intelligence running entirely on-device with no cloud dependency. Our code, models, datasets, and mobile application are publicly available at https://amshaker.github.io/Mobile-O/", "link": "http://arxiv.org/abs/2602.20161v1", "date": "2026-02-23", "relevancy": 2.3125, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5823}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5768}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5745}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mobile-O%3A%20Unified%20Multimodal%20Understanding%20and%20Generation%20on%20Mobile%20Device&body=Title%3A%20Mobile-O%3A%20Unified%20Multimodal%20Understanding%20and%20Generation%20on%20Mobile%20Device%0AAuthor%3A%20Abdelrahman%20Shaker%20and%20Ahmed%20Heakl%20and%20Jaseel%20Muhammad%20and%20Ritesh%20Thawkar%20and%20Omkar%20Thawakar%20and%20Senmao%20Li%20and%20Hisham%20Cholakkal%20and%20Ian%20Reid%20and%20Eric%20P.%20Xing%20and%20Salman%20Khan%20and%20Fahad%20Shahbaz%20Khan%0AAbstract%3A%20Unified%20multimodal%20models%20can%20both%20understand%20and%20generate%20visual%20content%20within%20a%20single%20architecture.%20Existing%20models%2C%20however%2C%20remain%20data-hungry%20and%20too%20heavy%20for%20deployment%20on%20edge%20devices.%20We%20present%20Mobile-O%2C%20a%20compact%20vision-language-diffusion%20model%20that%20brings%20unified%20multimodal%20intelligence%20to%20a%20mobile%20device.%20Its%20core%20module%2C%20the%20Mobile%20Conditioning%20Projector%20%28MCP%29%2C%20fuses%20vision-language%20features%20with%20a%20diffusion%20generator%20using%20depthwise-separable%20convolutions%20and%20layerwise%20alignment.%20This%20design%20enables%20efficient%20cross-modal%20conditioning%20with%20minimal%20computational%20cost.%20Trained%20on%20only%20a%20few%20million%20samples%20and%20post-trained%20in%20a%20novel%20quadruplet%20format%20%28generation%20prompt%2C%20image%2C%20question%2C%20answer%29%2C%20Mobile-O%20jointly%20enhances%20both%20visual%20understanding%20and%20generation%20capabilities.%20Despite%20its%20efficiency%2C%20Mobile-O%20attains%20competitive%20or%20superior%20performance%20compared%20to%20other%20unified%20models%2C%20achieving%2074%25%20on%20GenEval%20and%20outperforming%20Show-O%20and%20JanusFlow%20by%205%25%20and%2011%25%2C%20while%20running%206x%20and%2011x%20faster%2C%20respectively.%20For%20visual%20understanding%2C%20Mobile-O%20surpasses%20them%20by%2015.3%25%20and%205.1%25%20averaged%20across%20seven%20benchmarks.%20Running%20in%20only%20~3s%20per%20512x512%20image%20on%20an%20iPhone%2C%20Mobile-O%20establishes%20the%20first%20practical%20framework%20for%20real-time%20unified%20multimodal%20understanding%20and%20generation%20on%20edge%20devices.%20We%20hope%20Mobile-O%20will%20ease%20future%20research%20in%20real-time%20unified%20multimodal%20intelligence%20running%20entirely%20on-device%20with%20no%20cloud%20dependency.%20Our%20code%2C%20models%2C%20datasets%2C%20and%20mobile%20application%20are%20publicly%20available%20at%20https%3A//amshaker.github.io/Mobile-O/%0ALink%3A%20http%3A//arxiv.org/abs/2602.20161v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMobile-O%253A%2520Unified%2520Multimodal%2520Understanding%2520and%2520Generation%2520on%2520Mobile%2520Device%26entry.906535625%3DAbdelrahman%2520Shaker%2520and%2520Ahmed%2520Heakl%2520and%2520Jaseel%2520Muhammad%2520and%2520Ritesh%2520Thawkar%2520and%2520Omkar%2520Thawakar%2520and%2520Senmao%2520Li%2520and%2520Hisham%2520Cholakkal%2520and%2520Ian%2520Reid%2520and%2520Eric%2520P.%2520Xing%2520and%2520Salman%2520Khan%2520and%2520Fahad%2520Shahbaz%2520Khan%26entry.1292438233%3DUnified%2520multimodal%2520models%2520can%2520both%2520understand%2520and%2520generate%2520visual%2520content%2520within%2520a%2520single%2520architecture.%2520Existing%2520models%252C%2520however%252C%2520remain%2520data-hungry%2520and%2520too%2520heavy%2520for%2520depl {"title": "U2-BENCH: Benchmarking Large Vision-Language Models on Ultrasound Understanding", "author": "Anjie Le and Henan Liu and Yue Wang and Zhenyu Liu and Rongkun Zhu and Taohan Weng and Jinze Yu and Boyang Wang and Yalun Wu and Kaiwen Yan and Quanlin Sun and Meirui Jiang and Jialun Pei and Siya Liu and Haoyun Zheng and Zhoujun Li and Alison Noble and Jacques Souquet and Xiaoqing Guo and Manxi Lin and Hongcheng Guo", "abstract": "Ultrasound is a widely-used imaging modality critical to global healthcare, yet its interpretation remains challenging due to its varying image quality on operators, noises, and anatomical structures. Although large vision-language models (LVLMs) have demonstrated impressive multimodal capabilities across natural and medical domains, their performance on ultrasound remains largely unexplored. We introduce U2-BENCH, the first comprehensive benchmark to evaluate LVLMs on ultrasound understanding across classification, detection, regression, and text generation tasks. U2-BENCH aggregates 7,241 cases spanning 15 anatomical regions and defines 8 clinically inspired tasks, such as diagnosis, view recognition, lesion localization, clinical value estimation, and report generation, across 50 ultrasound application scenarios. We evaluate 23 state-of-the-art LVLMs, both open- and closed-source, general-purpose and medical-specific. Our results reveal strong performance on image-level classification, but persistent challenges in spatial reasoning and clinical language generation. U2-BENCH establishes a rigorous and unified testbed to assess and accelerate LVLM research in the uniquely multimodal domain of medical ultrasound imaging.", "link": "http://arxiv.org/abs/2505.17779v4", "date": "2026-02-23", "relevancy": 2.3111, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5827}, {"title": "Lexicon3D: Probing Visual Foundation Models for {"title": "When Pretty Isn't Useful: Investigating Why Modern Text-to-Image Models Fail as Reliable Training Data Generators", "author": "Krzysztof Adamkiewicz and Brian Moser and Stanislav Frolov and Tobias Christian Nauen and Federico Raue and Andreas Dengel", "abstract": "Recent text-to-image (T2I) diffusion models produce visually stunning images and demonstrate excellent prompt following. But do they perform well as synthetic vision data generators? In this work, we revisit the promise of synthetic data as a scalable substitute for real training sets and uncover a surprising performance regression. We generate large-scale synthetic datasets using state-of-the-art T2I models released between 2022 and 2025, train standard classifiers solely on this synthetic data, and evaluate them on real test data. Despite observable advances in visual fidelity and prompt adherence, classification accuracy on real test data consistently declines with newer T2I models as training data generators. Our analysis reveals a hidden trend: These models collapse to a narrow, aesthetic-centric distribution that undermines diversity and label-image alignment. Overall, our findings challenge a growing assumption in vision research, namely that progress in generative realism implies progress in data realism. We thus highlight an urgent need to rethink the capabilities of modern T2I models as reliable training data generators.", "link": "http://arxiv.org/abs/2602.19946v1", "date": "2026-02-23", "relevancy": 2.2996, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.6125}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5701}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5647}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20When%20Pretty%20Isn%27t%20Useful%3A%20Investigating%20Why%20Modern%20Text-to-Image%20Models%20Fail%20as%20Reliable%20Training%20Data%20Generators&body=Title%3A%20When%20Pretty%20Isn%27t%20Useful%3A%20Investigating%20Why%20Modern%20Text-to-Image%20Models%20Fail%20as%20Reliable%20Training%20Data%20Generators%0AAuthor%3A%20Krzysztof%20Adamkiewicz%20and%20Brian%20Moser%20and%20Stanislav%20Frolov%20and%20Tobias%20Christian%20Nauen%20and%20Federico%20Raue%20and%20Andreas%20Dengel%0AAbstract%3A%20Recent%20text-to-image%20%28T2I%29%20diffusion%20models%20produce%20visually%20stunning%20images%20and%20demonstrate%20excellent%20prompt%20following.%20But%20do%20they%20perform%20well%20as%20synthetic%20vision%20data%20generators%3F%20In%20this%20work%2C%20we%20revisit%20the%20promise%20of%20synthetic%20data%20as%20a%20scalable%20substitute%20for%20real%20training%20sets%20and%20uncover%20a%20surprising%20performance%20regression.%20We%20generate%20large-scale%20synthetic%20datasets%20using%20state-of-the-art%20T2I%20models%20released%20between%202022%20and%202025%2C%20train%20standard%20classifiers%20solely%20on%20this%20synthetic%20data%2C%20and%20evaluate%20them%20on%20real%20test%20data.%20Despite%20observable%20advances%20in%20visual%20fidelity%20and%20prompt%20adherence%2C%20classification%20accuracy%20on%20real%20test%20data%20consistently%20declines%20with%20newer%20T2I%20models%20as%20training%20data%20generators.%20Our%20analysis%20reveals%20a%20hidden%20trend%3A%20These%20models%20collapse%20to%20a%20narrow%2C%20aesthetic-centric%20distribution%20that%20undermines%20diversity%20and%20label-image%20alignment.%20Overall%2C%20our%20findings%20challenge%20a%20growing%20assumption%20in%20vision%20research%2C%20namely%20that%20progress%20in%20generative%20realism%20implies%20progress%20in%20data%20realism.%20We%20thus%20highlight%20an%20urgent%20need%20to%20rethink%20the%20capabilities%20of%20modern%20T2I%20models%20as%20reliable% el-image%2520alignment.%2520Overall%252C%2520our%2520findings%2520challenge%2520a%2520growing%2520assumption%2520in%2520vision%2520research%252C%2520namely%2520that%2520progress%2520in%2520generative%2520realism%2520implies%2520progress%2520in%2520data%2520realism.%2520We%2520thus%2520highlight%2520an%2520urgent%2520need%2520to%2520rethink%2520the%2520capabilities%2520of%2520modern%2520T2I%2520models%2520as%2520reliable%2520training%2520data%2520generators.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.19946v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=When%20Pretty%20Isn%27t%20Useful%3A%20Investigating%20Why%20Modern%20Text-to-Image%20Models%20Fail%20as%20Reliable%20Training%20Data%20Generators&entry.906535625=Krzysztof%20Adamkiewicz%20and%20Brian%20Moser%20and%20Stanislav%20Frolov%20and%20Tobias%20Christian%20Nauen%20and%20Federico%20Raue%20and%20Andreas%20Dengel&entry.1292438233=Recent%20text-to-image%20%28T2I%29%20diffusion%20models%20produce%20visually%20stunning%20images%20and%20demonstrate%20excellent%20prompt%20following.%20But%20do%20they%20perform%20well%20as%20synthetic%20vision%20data%20generators%3F%20In%20this%20work%2C%20we%20revisit%20the%20promise%20of%20synthetic%20data%20as%20a%20scalable%20substitute%20for%20real%20training%20sets%20and%20uncover%20a%20surprising%20performance%20regression.%20We%20generate%20large-scale%20synthetic%20datasets%20using%20state-of-the-art%20T2I%20models%20released%20between%202022%20and%202025%2C%20train%20standard%20classifiers%20solely%20on%20this%20synthetic%20data%2C%20and%20evaluate%20them%20on%20real%20test%20data.%20Despite%20observable%20advances%20in%20visual%20fidelity%20and%20prompt%20adherence%2C%20classification%20accuracy%20on%20real%20test%20data%20consistently%20declines%20with%20newer%20T2I%20models%20as%20training%20data%20generators.%20Our%20analysis%20reveals%20a%20hidden%20trend%3A% {"title": "nnLandmark: A Self-Configuring Method for 3D Medical Landmark Detection", "author": "Alexandra Ertl and Stefan Denner and Robin Peretzke and Shuhan Xiao and David Zimmerer and Maximilian Fischer and Markus Bujotzek and Xin Yang and Peter Neher and Fabian Isensee and Klaus H. Maier-Hein", "abstract": "Landmark detection is central to many medical applications, such as identifying critical structures for treatment planning or defining control points for biometric measurements. However, manual annotation is labor-intensive and requires expert anatomical knowledge. While deep learning shows promise in automating this task, fair evaluation and interpretation of methods in a broader context are hindered by limited public benchmarking, inconsistent baseline implementations, and non-standardized experimentation. To overcome these pitfalls, we present nnLandmark, a self-configuring framework for 3D landmark detection that combines tailored heatmap generation, loss design, inference logic, and a robust set of hyperparameters for heatmap regression, while reusing components from nnU-Net's underlying self-configuration and training engine. nnLandmark achieves state-of-the-art performance across five public and one private dataset, benchmarked against three recently published methods. Its out-of-the-box usability enables training strong landmark detection models on new datasets without expert knowledge or dataset-specific hyperparameter tuning. Beyond accuracy, nnLandmark provides both a strong, common baseline and a flexible, standardized environment for developing and evaluating new methodological contributions. It further streamlines evaluation across multiple datasets by offering data conversion utilities for current public benchmarks. Together, these properties position nnLandmark as a central tool for advancing 3D medical landmark detection through systematic, transparent benchmarking, enabling to genuinely measure methodological progress. The code is available {"title": "TactiVerse: Generalizing Multi-Point Tactile Sensing in Soft Robotics Using Single-Point Data", "author": "Junhui Lee and Hyosung Kim and Saekwang Nam", "abstract": "Real-time prediction of deformation in highly compliant soft materials remains a significant challenge in soft robotics. While vision-based soft tactile sensors can track internal marker displacements, learning-based models for 3D contact estimation heavily depend on their training datasets, inherently limiting their ability to generalize to complex scenarios such as multi-point sensing. To address this limitation, we introduce TactiVerse, a U-Net-based framework that formulates contact geometry estimation as a spatial heatmap prediction task. Even when trained exclusively on a limited dataset of single-point indentations, our architecture achieves highly accurate single-point sensing, yielding a superior mean absolute error of 0.0589 mm compared to the 0.0612 mm of a conventional regression-based CNN baseline. Furthermore, we demonstrate that augmenting the training dataset with multi-point contact data substantially enhances the sensor's multi-point sensing capabilities, significantly improving the overall mean MAE for two-point discrimination from 1.214 mm to 0.383 mm. By successfully extrapolating complex contact geometries from fundamental interactions, this methodology unlocks advanced multi-point and large-area shape sensing. Ultimately, it significantly streamlines the development of marker-based soft sensors, offering a highly scalable solution for real-world tactile perception.", "link": "http://arxiv.org/abs/2602.19850v1", "date": "2026-02-23", "relevancy": 2.2701, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6211}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", " ntional%2520regression-based%2520CNN%2520baseline.%2520Furthermore%252C%2520we%2520demonstrate%2520that%2520augmenting%2520the%2520training%2520dataset%2520with%2520multi-point%2520contact%2520data%2520substantially%2520enhances%2520the%2520sensor%2527s%2520multi-point%2520sensing%2520capabilities%252C%2520significantly%2520improving%2520the%2520overall%2520mean%2520MAE%2520for%2520two-point%2520discrimination%2520from%25201.214%2520mm%2520to%25200.383%2520mm.%2520By%2520successfully%2520extrapolating%2520complex%2520contact%2520geometries%2520from%2520fundamental%2520interactions%252C%2520this%2520methodology%2520unlocks%2520advanced%2520multi-point%2520and%2520large-area%2520shape%2520sensing.%2520Ultimately%252C%2520it%2520significantly%2520streamlines%2520the%2520development%2520of%2520marker-based%2520soft%2520sensors%252C%2520offering%2520a%2520highly%2520scalable%2520solution%2520for%2520real-world%2520tactile%2520perception.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.19850v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=TactiVerse%3A%20Generalizing%20Multi-Point%20Tactile%20Sensing%20in%20Soft%20Robotics%20Using%20Single-Point%20Data&entry.906535625=Junhui%20Lee%20and%20Hyosung%20Kim%20and%20Saekwang%20Nam&entry.1292438233=Real-time%20prediction%20of%20deformation%20in%20highly%20compliant%20soft%20materials%20remains%20a%20significant%20challenge%20in%20soft%20robotics.%20While%20vision-based%20soft%20tactile%20sensors%20can%20track%20internal%20marker%20displacements%2C%20learning-based%20models%20for%203D%20contact%20estimation%20heavily%20depend%20on%20their%20training%20datasets%2C%20inherently%20limiting%20their%20ability%20to%20generalize%20to%20complex%20scenarios%20such%20as%20multi-point%20sensing.%20To%20address%20this%20limitation%2C%20we%20introduce%20TactiVerse%2C%20a%20U-Net-based%20framework%20that%20formulates%20contact%20geomet {"title": "GOT-Edit: Geometry-Aware Generic Object Tracking via Online Model Editing", "author": "Shih-Fang Chen and Jun-Cheng Chen and I-Hong Jhuo and Yen-Yu Lin", "abstract": "Human perception for effective object tracking in a 2D video stream arises from the implicit use of prior 3D knowledge combined with semantic reasoning. In contrast, most generic object tracking (GOT) methods primarily rely on 2D features of the target and its surroundings while neglecting 3D geometric cues, which makes them susceptible to partial occlusion, distractors, and variations in geometry and appearance. To address this limitation, we introduce GOT-Edit, an online cross-modality model editing approach that integrates geometry-aware cues into a generic object tracker from a 2D video stream. Our approach leverages features from a pre-trained Visual Geometry Grounded Transformer to enable geometric cue inference from only a few 2D images. To tackle the challenge of seamlessly combining geometry and semantics, GOT-Edit performs online model editing with null-space constrained updates that incorporate geometric information while preserving semantic discrimination, yielding consistently better performance across diverse scenarios. Extensive experiments on multiple GOT benchmarks demonstrate that GOT-Edit achieves superior robustness and accuracy, particularly under occlusion and clutter, establishing a new paradigm for combining 2D semantics with 3D geometric reasoning for generic object tracking.", "link": "http://arxiv.org/abs/2602.08550v2", "date": "2026-02-23", "relevancy": 2.2444, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.564}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5605}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5552}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GOT-Edit%3A%20Geometry-Aware%20Generic%20Object%20Tracking%20via%20Online%20Model%20Editing&body=Title%3A%20GOT-Edit%3A%20Geometry-Aware%20Generic%20Object%20Tracking%20via%20Online%20Model%20Editing%0AAuthor%3A%20Shih-Fang%20Chen%20and%20Jun-Cheng%20Chen%20and%20I-Hong%20Jhuo%20and%20Yen-Yu%20Lin%0AAbstract%3A%20Human%20perception%20for%20effective%20object%20tracking%20in%20a%202D%20video%20stream%20arises%20from%20the%20implicit%20use%20of%20prior%203D%20knowledge%20combined%20with%20semantic%20reasoning.%20In%20contrast%2C%20most%20generic%20object%20tracking%20%28GOT%29%20methods%20primarily%20rely%20on%202D%20features%20of%20the%20target%20and%20its%20surroundings%20while%20neglecting%203D%20geometric%20cues%2C%20which%20makes%20them%20susceptible%20to%20partial%20occlusion%2C%20distractors%2C%20and%20variations%20in%20geometry%20and%20appearance.%20To%20address%20this%20limitation%2C%20we%20introduce%20GOT-Edit%2C%20an%20online%20cross-modality%20model%20editing%20approach%20that%20integrates%20geometry-aware%20cues%20into%20a%20generic%20object%20tracker%20from%20a%202D%20video%20stream.%20Our%20approach%20leverages%20features%20from%20a%20pre-trained%20Visual%20Geometry%20Grounded%20Transformer%20to%20enable%20geometric%20cue%20inference%20from%20only%20a%20few%202D%20images.%20To%20tackle%20the%20challenge%20of%20seamlessly%20combining%20geometry%20and%20semantics%2C%20GOT-Edit%20performs%20online%20model%20editing%20with%20null-space%20constrained%20updates%20that%20incorporate%20geometric%20information%20while%20preserving%20semantic%20discrimination%2C%20yielding%20consistently%20better%20performance%20across%20diverse%20scenarios.%20Extensive%20experiments%20on%20multiple%20GOT%20benchmarks%20demonstrate%20that%20GOT-Edit%20achieves%20superior%20robustness%20and%20accuracy%2C%20particularly%20under%20occlusion%20and%20clutter%2C%20establishing%20a%20new%20paradigm%20for%20combining%202D%20semantics%20with%203D%20geometric%20reasoning%20for%20generic%20object%20tracking.%0ALink%3A%20http%3A//arxiv.org/abs/2602.08550v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGOT-Edit%253A%2520Geometry-Aware%2520Generic%2520Object%2520Tracking%2520via%2520Online%2520Model%2520Editing%26entry.906535625%3DShih-Fang%2520Chen%2520and%2520Jun-Cheng%2520Chen%2520and%2520I-Hong%2520Jhuo%2520and%2520Yen-Yu%2520Lin%26entry.1292438233%3DHuman%2520perception%2520for%2520effective%2520object%2520tracking%2520in%2520a%25202D%2520video%2520stream%2520arises%2520from%2520the%2520implicit%2520use%2520of%2520prior%25203D%2520knowledge%2520combined%2520with%2520semantic%2520reasoning.%2520In%2520contrast%252C%2520most%2520generic%2520object%2520tracking%2520%2528GOT%2529%2520methods%2520primarily%2520rely%2520on%25202D%2520features%2520of%2520the%2520target%2520and%2520its%2520surroundings%2520while%2520neglecting%25203D%2520geometric%2520cues%252C%2520which%2520makes%2520them%2520susceptible%2520to%2520partial%2520occlusion%252C%2520distractors%252C%2520and%2520variations%2520in%2520geometry%2520and%2520appearance.%2520To%2520address%2520this%2520limitation%252C%2520we%2520introduce%2520GOT-Edit%252C%2520an%2520online%2520cross-modality%2520model%2520editing%2520approach%2520that%2520integrates%2520geometry-aware%2520cues%2520into%2520a%2520generic%2520object%2520tracker%2520from%2520a%25202D%2520video%2520stream.%2520Our%2520approach%2520leverages%2520features%2520from%2520a%2520pre-trained%2520Visual%2520Geometry%2520Grounded%2520Transformer%2520to%2520enable%2520geometric%2520cue%2520inference%2520from%2520only%2520a%2520few%25202D%2520images.%2520To%2520tackle%2520the%2520challenge%2520of%2520seamlessly%2520combining%2520geometry%2520and%2520semantics%252C%2520GOT-Edit%2520performs%2520online%2520model%2520editing%2520with%2520null-space%2520constrained%2520updates%2520that%2520incorporate%2520geometric%2520information%2520while%2520preserving%2520semantic%2520discrimination%252C%2520yielding%2520consistently%2520better%2520performance%2520across%2520diverse%2520scenarios.%2520Extensive%2520experiments%2520on%2520multiple%2520GOT%2520benchmarks%2520demonstrate%2520that%2520GOT-Edit%2520achieves%2520superior%2520robustness%2520and%2520accuracy%252C%2520particularly%2520under%2520occlusion%2520and%2520clutter%252C%2520establishing%2520a%2520new%2520paradigm%2520for%2520combining%25202D%2520semantics%2520with%25203D%2520geometric%2520reasoning%2520for%2520generic%2520object%2520tracking.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.08550v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GOT-Edit%3A%20Geometry-Aware%20Generic%20Object%20Tracking%20via%20Online%20Model%20Editing&entry.906535625=Shih-Fang%20Chen%20and%20Jun-Cheng%20Chen%20and%20I-Hong%20Jhuo%20and%20Yen-Yu%20Lin&entry.1292438233=Human%20perception%20for%20effective%20object%20tracking%20in%20a%202D%20video%20stream%20arises%20from%20the%20implicit%20use%20of%20prior%203D%20knowledge%20combined%20with%20semantic%20reasoning.%20In%20contrast%2C%20most%20generic%20object%20tracking%20%28GOT%29%20methods%20primarily%20rely%20on%202D%20features%20of%20the%20target%20and%20its%20surroundings%20while%20neglecting%203D%20geometric%20cues%2C%20which%20makes%20them%20susceptible%20to%20partial%20occlusion%2C%20distractors%2C%20and%20variations%20in%20geometry%20and%20appearance.%20To%20address%20this%20limitation%2C%20we%20introduce%20GOT-Edit%2C%20an%20online%20cross-modality%20model%20editing%20approach%20that%20integrates%20geometry-aware%20cues%20into%20a%20generic%20object%20tracker%20from%20a%202D%20video%20stream.%20Our%20approach%20leverages%20features%20from%20a%20pre-trained%20Visual%20Geometry%20Grounded% {"title": "CARMA: Collocation-Aware Resource Manager", "author": "Ehsan Yousefzadeh-Asl-Miandoab and Florina M. Ciorba and P\u0131nar T\u00f6z\u00fcn", "abstract": "GPUs running deep learning (DL) workloads are frequently underutilized. Collocating multiple DL training tasks on the same GPU can improve utilization but introduces two key risks: (1) out-of-memory (OOM) crashes for newly scheduled tasks, and (2) severe performance interference among co-running tasks, which can negate any throughput gains. These issues reduce system robustness, quality of service, and energy efficiency. We present CARMA, a task-level, collocation-aware resource manager for the server-scale. CARMA addresses collocation challenges via (1) fine-grained monitoring and bookkeeping of GPUs and a collocation risk analysis that filters out the high-risk GPUs; (2) task placement policies that cap GPU utilization to limit OOMs and interference; (3) integration of GPU memory need estimators for DL tasks to minimize OOMs during collocation; and (4) a lightweight recovery method that relaunches jobs crashed due to OOMs. Our evaluation on a DL training workload derived from real-world traces shows that CARMA uses GPUs more efficiently by making more informed collocation decisions: for the best-performing collocation policy, CARMA increases GPU streaming multiprocessor (SM) utilization by 54%, the parallelism achieved per SM by 61%, and memory use by 62%. This results in a ~35% and ~15% reduction in the end-to-end execution time (makespan) and GPU energy consumption, respectively, for this workload.", "link": "http://arxiv.org/abs/2508.19073v3", "date": "2026-02-23", "relevancy": 2.2411, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4598}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.444}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4409}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CARMA%3A%20Collocation-Aware%20Resource%20Manager&body=Title%3A%20CARMA%3A%20Collocation-Aware%20Resource%20Manager%0AAuthor%3A%20Ehsan%20Yousefzadeh-Asl-Miandoab%20and%20Florina%20M.%20Ciorba%20and%20P%C4%B1nar%20T%C3%B6z%C3%BCn%0AAbstract%3A%20GPUs%20running%20deep%20learning%20%28DL%29%20workloads%20are%20frequently%20underutilized.%20Collocating%20multiple%20DL%20training%20tasks%20on%20the%20same%20GPU%20can%20improve%20utilization%20but%20introduces%20two%20key%20risks%3A%20%281%29%20out-of-memory%20%28OOM%29%20crashes%20for%20newly%20scheduled%20tasks%2C%20and%20%282%29%20severe%20performance%20interference%20among%20co-running%20tasks%2C%20which%20can%20negate%20any%20throughput%20gains.%20These%20issues%20reduce%20system%20robustness%2C%20quality%20of%20service%2C%20and%20energy%20efficiency.%20We%20present%20CARMA%2C%20a%20task-level%2C%20collocation-aware%20resource%20manager%20for%20the%20server-scale.%20CARMA%20addresses%20collocation%20challenges%20via%20%281%29%20fine-grained%20monitoring%20and%20bookkeeping%20of%20GPUs%20and%20a%20collocation%20risk%20analysis%20that%20filters%20out%20the%20high-risk%20GPUs%3B%20%282%29%20task%20placement%20policies%20that%20cap%20GPU%20utilization%20to%20limit%20OOMs%20and%20interference%3B%20%283%29%20integration%20of%20GPU%20memory%20need%20estimators%20for%20DL%20tasks%20to%20minimize%20OOMs%20during%20collocation%3B%20and%20%284%29%20a%20lightweight%20recovery%20method%20that%20relaunches%20jobs%20crashed%20due%20to%20OOMs.%20Our%20evaluation%20on%20a%20DL%20training%20workload%20derived%20from%20real-world%20traces%20shows%20that%20CARMA%20uses%20GPUs%20more%20efficiently%20by%20making%20more%20informed%20collocation%20decisions%3A%20for%20the%20best-performing%20collocation%20policy%2C%20CARMA%20increases%20GPU%20streaming%20multiprocessor%20%28SM%29%20utilization%20by%2054%25%2C%20the%20parallelism%20achieved%20per%20SM%20by%2061%25%2C%20and%20memory%20use%20by%2062%25.%20This%20results%20in%20a%20~35%25%20and%20~15%25%20reduction%20in%20the%20end-to-end%20execution%20time%20%28makespan%29%20and%20GPU%20energy%20consumption%2C%20respectively%2C%20for%20this%20workload.%0ALink%3A%20http%3A//arxiv.org/abs/2508.19073v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCARMA%253A%2520Collocation-Aware%2520Resource%2520Manager%26entry.906535625%3DEhsan%2520Yousefzadeh-Asl-Miandoab%2520and%2520Florina%2520M.%2520Ciorba%2520and%2520P%25C4%25B1nar%2520T%25C3%25B6z%25C3%25BCn%26entry.1292438233%3DGPUs%2520running%2520deep%2520learning%2520%2528DL%2529%2520workloads%2520are%2520frequently%2520underutilized.%2520Collocating%2520multiple%2520DL%2520training%2520tasks%2520on%2520the%2520same%2520GPU%2520can%2520improve%2520utilization%2520but%2520introduces%2520two%2520key%2520risks%253A%2520%25281%2529%2520out-of-memory%2520%2528OOM%2529%2520crashes%2520for%2520newly%2520scheduled%2520tasks%252C%2520and%2520%25282%2529%2520severe%2520performance%2520interference%2520among%2520co-running%2520tasks%252C%2520which%2520can%2520negate%2520any%2520throughput%2520gains.%2520These%2520issues%2520reduce%2520system%2520robustness%252C%2520quality%2520of%2520service%252C%2520and%2520energy%2520efficiency.%2520We%2520present%2520CARMA%252C%2520a%2520task-level%252C%2520collocation-aware%2520resource%2520manager%2520for%2520the%2520server-scale.%2520CARMA%2520addresses%2520collocation%2520challenges%2520via%2520%25281%2529%2520fine-grained%2520monitoring%2520and%2520bookkeeping%2520of%2520GPUs%2520and%2520a%2520collocation%2520risk%2520analysis%2520that%2520filters%2520out%2520the%2520high-risk%2520GPUs%253B%2520%25282%2529%2520task%2520placement%2520policies%2520that%2520cap%2520GPU%2520utilizati

{"title": "Open-vocabulary 3D scene perception in industrial environments", "author": "Keno Moenck and Adrian Philip Florea and Julian Koch and Thorsten Sch\u00fcppstuhl", "abstract": "Autonomous vision applications in production, intralogistics, or manufacturing environments require perception capabilities beyond a small, fixed set of classes. Recent open-vocabulary methods, leveraging 2D Vision-Language Foundation Models (VLFMs), target this task but often rely on class-agnostic segmentation models pre-trained on non-industrial datasets (e.g., household scenes). In this work, we first demonstrate that such models fail to generalize, performing poorly on common industrial objects. Therefore, we propose a training-free, open-vocabulary 3D perception pipeline that overcomes this limitation. Instead of using a pre-trained model to generate instance proposals, our method simply generates masks by merging pre-computed superpoints based on their semantic features. Following, we evaluate the domain-adapted VLFM \"IndustrialCLIP\" on a representative 3D industrial workshop scene for open-vocabulary querying. Our qualitative results demonstrate successful segmentation of industrial objects.", "link": "http://arxiv.org/abs/2602.19823v1", "date": "2026-02-23", "relevancy": 2.6367, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6773}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6773}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5685}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Open-vocabulary%203D%20scene%20perception%20in%20industrial%20environments&body=Title%3A%20Open-vocabulary%203D%20scene%20perception%20in%20industrial%20environmen {"title": "Contrastive and Multi-Task Learning on Noisy Brain Signals with Nonlinear Dynamical Signatures", "author": "Sucheta Ghosh and Felix Dietrich and Zahra Monfared", "abstract": "We introduce a two-stage multitask learning framework for analyzing Electroencephalography (EEG) signals that integrates denoising, dynamical modeling, and representation learning. In the first stage, a denoising autoencoder is trained to suppress artifacts and stabilize temporal dynamics, providing robust signal representations. In the second stage, a multitask architecture processes these denoised signals to achieve three objectives: motor imagery classification, chaotic versus non-chaotic regime discrimination using Lyapunov exponent-based labels, and self-supervised contrastive representation learning with NT-Xent loss. A convolutional backbone combined with a Transformer encoder captures spatial-temporal structure, while the dynamical task encourages sensitivity to nonlinear brain dynamics. This staged design mitigates interference between reconstruction and discriminative goals, improves stability across datasets, and supports reproducible training by clearly separating noise reduction from higher-level feature learning. Empirical studies show that our framework not only enhances robustness and generalization but also surpasses strong baselines and recent state-of-the-art methods in EEG decoding, highlighting the effectiveness of combining denoising, dynamical features, and self-supervised learning.", "link": "http://arxiv.org/abs/2601.08549v3", "date": "2026-02-23", "relevancy": 2.6229, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.549}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5177}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5071}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Contrastive%20and%20Multi-Task%20Learning%20on%20Noisy%20Brain%20Signals%20with%20Nonlinear%20Dynamical%20Signatures&body=Title%3A%20Contrastive%20and%20Multi-Task%20Learning%20on%20Noisy%20Brain%20Signals%20with%20Nonlinear%20Dynamical%20Signatures%0AAuthor%3A%20Sucheta%20Ghosh%20and%20Felix%20Dietrich%20and%20Zahra%20Monfared%0AAbstract%3A%20We%20introduce%20a%20two-stage%20multitask%20learning%20framework%20for%20analyzing%20Electroencephalography%20%28EEG%29%20signals%20that%20integrates%20denoising%2C%20dynamical%20modeling%2C%20and%20representation%20learning.%20In%20the%20first%20stage%2C%20a%20denoising%20autoencoder%20is%20trained%20to%20suppress%20artifacts%20and%20stabilize%20temporal%20dynamics%2C%20providing%20robust%20signal%20representations.%20In%20the%20second%20stage%2C%20a%20multitask%20architecture%20processes%20these%20denoised%20signals%20to%20achieve%20three%20objectives%3A%20motor%20imagery%20classification%2C%20chaotic%20versus%20non-chaotic%20regime%20discrimination%20using%20Lyapunov%20exponent-based%20labels%2C%20and%20self-supervised%20contrastive%20representation%20learning%20with%20NT-Xent%20loss.%20A%20convolutional%20backbone%20combined%20with%20a%20Transformer%20encoder%20captures%20spatial-temporal%20structure%2C%20while%20the%20dynamical%20task%20encourages%20sensitivity%20to%20nonlinear%20brain%20dynamics.%20This%20staged%20design%20mitigates%20interference%20between%20reconstruction%20and%20discriminative%20goals%2C%20improves%20stability%20across%20datasets%2C%20and%20supports%20reproducible%20training%20by%20clearly%20separating%20noise%20reduction%20from%20higher-level%20feature%20learning.%20Empirical%20studies%20show%20that%20our%20framework%20not%20only%20enhances%20robustness%20and%20generalization%20but%20also%20surpasses%20strong%20baselines%20and%20recent%20state-of-the-art%20methods%20in%20EEG%20decoding%2C%20highlighting%20the%20effectiveness%20of%20combining%20denoising%2C%20dynamical%20features%2C%20and%20self-supervised%20learning.%0ALink%3A%20http%3A//arxiv.org/abs/2601.08549v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DContrastive%2520and%2520Multi-Task%2520Learning%2520on%2520Noisy%2520Brain%2520Signals%2520with%2520Nonlinear%2520Dynamical%2520Signatures%26entry.906535625%3DSucheta%2520Ghosh%2520and%2520Felix%2520Dietrich%2520and%2520Zahra%2520Monfared%26entry.1292438233%3DWe%2520introduce%2520a%2520two-stage%2520multitask%2520learning%2520framework%2520for%2520analyzing%2520Electroencephalography%2520%2528EEG%2529%2520signals%2520that%2520integrates%2520denoising%252C%2520dynamical%2520modeling%252C%2520and%2520representation%2520learning.%2520In%2520the%2520first%2520stage%252C%2520a%2520denoising%2520autoencoder%2520is%2520trained%2520to%2520suppress%2520artifacts%2520and%2520stabilize%2520temporal%2520dynamics%252C%2520providing%2520robust%2520signal%2520representations.%2520In%2520the%2520second%2520stage%252C%2520a%2520multitask%2520architecture%2520processes%2520these%2520denoised%2520signals%2520to%2520achieve%2520three%2520objectives%253A%2520motor%2520imagery%2520classification%252C%2520chaotic%2520versus%2520non-chaotic%2520regime%2520discrimination%2520using%2520Lyapunov%2520exponent-based%2520labels%252C%2520and%2520self-supervised%2520contrastive%2520representation%2520learning%2520with%2520NT-Xent%2520loss.%2520A%2520convolutional%2520backbone%2520combined%2520with%2520a%2520Transformer%2520encoder%2520captures%2520spatial-temporal%2520structure%252C%2520while%2520the%2520dynamical%2520task%2520encourages%2520sensitivity%2520to%2520nonlinear%2520brain%2520dynamics.%2520This%2520staged%2520design%2520mitigates%2520interference%2520between%2520reconstruction%2520and%2520discriminative%2520goals%25 {"title": "Activation-Space Uncertainty Quantification for Pretrained Networks", "author": "Richard Bergna and Stefan Depeweg and Sergio Calvo-Ordo\u00f1ez and Jonathan Plenk and Alvaro Cartea and Jose Miguel Hern\u00e1ndez-Lobato", "abstract": "Reliable uncertainty estimates are crucial for deploying pretrained models; yet, many strong methods for quantifying uncertainty require retraining, Monte Carlo sampling, or expensive second-order computations and may alter a frozen backbone's predictions. To address this, we introduce Gaussian Process Activations (GAPA), a post-hoc method that shifts Bayesian modeling from weights to activations. GAPA replaces standard nonlinearities with Gaussian-process activations whose posterior mean exactly matches the original activation, preserving the backbone's point predictions by construction while providing closed-form epistemic variances in activation space. To scale to modern architectures, we use a sparse variational inducing-point approximation over cached training activations, combined with local k-nearest-neighbor subset conditioning, enabling deterministic single-pass uncertainty propagation without sampling, backpropagation, or second-order information. Across regression, classification, image segmentation, and language modeling, GAPA matches or outperforms strong post-hoc baselines in calibration and out-of-distribution detection while remaining efficient at test time.", "link": "http://arxiv.org/abs/2602.14934v2", "date": "2026-02-23", "relevancy": 2.58, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5568}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5058}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4854}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Activation-Space%20Uncertainty%20Quantification%20for%20Pretrained%20Networks&body=Title%3A%20Activation-Space%20Uncertainty%20Quantification%20for%20Pretrained%20Networks%0AAuthor%3A%20Richard%20Bergna%20and%20Stefan%20Depeweg%20and%20Sergio%20Calvo-Ordo%C3%B1ez%20and%20Jonathan%20Plenk%20and%20Alvaro%20Cartea%20and%20Jose%20Miguel%20Hern%C3%A1ndez-Lobato%0AAbstract%3A%20Reliable%20uncertainty%20estimates%20are%20crucial%20for%20deploying%20pretrained%20models%3B%20yet%2C%20many%20strong%20methods%20for%20quantifying%20uncertainty%20require%20retraining%2C%20Monte%20Carlo%20sampling%2C%20or%20expensive%20second-order%20computations%20and%20may%20alter%20a%20frozen%20backbone%27s%20predictions.%20To%20address%20this%2C%20we%20introduce%20Gaussian%20Process%20Activations%20%28GAPA%29%2C%20a%20post-hoc%20method%20that%20shifts%20Bayesian%20modeling%20from%20weights%20to%20activations.%20GAPA%20replaces%20standard%20nonlinearities%20with%20Gaussian-process%20activations%20whose%20posterior%20mean%20exactly%20matches%20the%20original%20activation%2C%20preserving%20the%20backbone%27s%20point%20predictions%20by%20construction%20while%20providing%20closed-form%20epistemic%20variances%20in%20activation%20space.%20To%20scale%20to%20modern%20architectures%2C%20we%20use%20a%20sparse%20variational%20inducing-point%20approximation%20over%20cached%20training%20activations%2C%20combined%20with%20local%20k-nearest-neighbor%20subset%20conditioning%2C%20enabling%20deterministic%20single-pass%20uncertainty%20propagation%20without%20sampling%2C%20backpropagation%2C%20or%20second-order%20information.%20Across%20regression%2C%20classification%2C%20image%20segmentation%2C%20and%20language%20modeling%2C%20GAPA%20matches%20or%20outperforms%20strong%20post-hoc%20baselines%20in%20calibration%20and%20out-of-distribution%20detection%20while%20remaining%20efficient%20at%20test%20time.%0ALink%3A% {"title": "Generative Logic: A New Computer Architecture for Deterministic Reasoning and Knowledge Generation", "author": "Nikolai Sergeev", "abstract": "We present Generative Logic (GL), a deterministic architecture that starts from user-supplied axiomatic definitions, written in a minimalist Mathematical Programming Language (MPL), and systematically explores a configurable region of their deductive neighborhood. A defining feature of the architecture is its unified hash-based inference engine, which executes both algebraic manipulations and deterministic logical transformations. Definitions are compiled into a distributed grid of simple Logic Blocks (LBs) that exchange messages; whenever the premises of an inference rule unify, a new fact is emitted with full provenance to its sources, yielding replayable, auditable proof graphs. Experimental validation is performed on Elementary Number Theory (ENT) utilizing a batched execution strategy. Starting from foundational axioms and definitions, the system first develops first-order Peano arithmetic, which is subsequently applied to autonomously derive and prove Gauss's summation formula as a main result. To manage combinatorial explosion, GL algorithmically enumerates conjectures and applies normalization, type constraints, and counterexample (CE) filtering. On commodity hardware, an end-to-end run completes in under 7 minutes. Generated proofs export as navigable HTML so that every inference step can be inspected independently. We outline a hardware-software co-design path toward massively parallel realizations and describe future integration with large language models (LLMs) for auto-formalization and conjecture seeding. The Python, C++, and MPL code to reproduce these experiments, along with the full proof graphs in HTML as well as machine-readable text format, are available in the project's GitHub repository at github.com/Generative-Logic/GL commit 1771330 and are permanently archived at doi:10.5281/zenodo.17206386.", "link": "http://arxiv.org/abs/2508.00017v3", "date": "2026-02-23", "relevancy": 2.5773, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5403}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5175}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4886}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generative%20Logic%3A%20A%20New%20Computer%20Architecture%20for%20Deterministic%20Reasoning%20and%20Knowledge%20Generation&body=Title%3A%20Generative%20Logic%3A%20A%20New%20Computer%20Architecture%20for%20Deterministic%20Reasoning%20and%20Knowledge%20Generation%0AAuthor%3A%20Nikolai%20Sergeev%0AAbstract%3A%20We%20present%20Generative%20Logic%20%28GL%29%2C%20a%20deterministic%20architecture%20that%20starts%20from%20user-supplied%20axiomatic%20definitions%2C%20written%20in%20a%20minimalist%20Mathematical%20Programming%20Language%20%28MPL%29%2C%20and%20systematically%20explores%20a%20configurable%20region%20of%20their%20deductive%20neighborhood.%20A%20defining%20feature%20of%20the%20architecture%20is%20its%20unified%20hash-based%20inference%20engine%2C%20which%20executes%20both%20algebraic%20manipulations%20and%20deterministic%20logical%20transformations.%20Definitions%20are%20compiled%20into%20a%20distributed%20grid%20of%20simple%20Logic%20Blocks%20%28LBs%29%20that%20exchange%20messages%3B%20whenever%20the%20premises%20of%20an%20inference%20rule%20unify%2C%20a%20new%20fact%20is%20emitted%20with%20full%20provenance%20to%20its%20sources%2C%20yielding%20replayable%2C%20auditable%20proof%20graphs.%20Experimental%20validation%20is%20performed%20on%20Elementary%20Number%20Theory%20%28ENT%29%20utilizing%20a%20batched%20execution%20strategy.%20Starting%20from%20foundational%20axioms%20and%20definitions%2C%20the%20system%20first%20devel {"title": "GOAL: Geometrically Optimal Alignment for Continual Generalized Category Discovery", "author": "Jizhou Han and Chenhao Ding and SongLin Dong and Yuhang He and Shaokun Wang and Qiang Wang and Yihong Gong", "abstract": "Continual Generalized Category Discovery (C-GCD) requires identifying novel classes from unlabeled data while retaining knowledge of known classes over time. Existing methods typically update classifier weights dynamically, resulting in forgetting and inconsistent feature alignment. We propose GOAL, a unified framework that introduces a fixed Equiangular Tight Frame (ETF) classifier to impose a consistent geometric structure throughout learning. GOAL conducts supervised alignment for labeled samples and confidence-guided alignment for novel samples, enabling stable integration of new classes without disrupting old ones. Experiments on four benchmarks show that GOAL outperforms the prior method Happy, reducing forgetting by 16.1% and boosting novel class discovery by 3.2%, establishing a strong solution for long-horizon continual discovery.", "link": "http://arxiv.org/abs/2602.19872v1", "date": "2026-02-23", "relevancy": 2.5743, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5223}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5214}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5009}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GOAL%3A%20Geometrically%20Optimal%20Alignment%20for%20Continual%20Generalized%20Category%20Discovery&body=Title%3A%20GOAL%3A%20Geometrically%20Optimal%20Alignment%20for%20Continual%20Generalized%20Category%20Discovery%0AAuthor%3A%20Jizhou%20Han%20and%20Chenhao%20Ding%20and%20SongLin%20Dong%20and%20Yuhang%20He%20and%20Shaokun%20Wang%20and%20Qiang%20Wang%20and%20Yihong%20Gong%0AAbstract%3A%20Continual%20Generalized%20Category%20Discovery%20%28C-GCD%29%20requires%20identifying%20novel%20classes%20from%20unlabeled%20data%20while%20retaining%20knowledge%20of%20known%20classes%20over%20time.%20Existing%20methods%20typically%20update%20classifier%20weights%20dynamically%2C%20resulting%20in%20forgetting%20and%20inconsistent%20feature%20alignment.%20We%20propose%20GOAL%2C%20a%20unified%20framework%20that%20introduces%20a%20fixed%20Equiangular%20Tight%20Frame%20%28ETF%29%20classifier%20to%20impose%20a%20consistent%20geometric%20structure%20throughout%20learning.%20GOAL%20conducts%20supervised%20alignment%20for%20labeled%20samples%20and%20confidence-guided%20alignment%20for%20novel%20samples%2C%20enabling%20stable%20integration%20of%20new%20classes%20without%20disrupting%20old%20ones.%20Experiments%20on%20four%20benchmarks%20show%20that%20GOAL%20outperforms%20the%20prior%20method%20Happy%2C%20reducing%20forgetting%20by%2016.1%25%20and%20boosting%20novel%20class%20discovery%20by%203.2%25%2C%20establishing%20a%20strong%20solution%20for%20long-horizon%20continual%20discovery.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19872v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGOAL%253A%2520Geometrically%2520Optimal%2520Alignment%2520for%2520Continual%2520Generalized%2520Category%2520Discovery%26entry.906535625%3DJizhou%2520Han%2520and%2520Chenhao%2520Ding%2520and%2520SongLin%2520Dong%2520and%2520Yuhang%2520He%2520and%2520Shaokun%2520Wang%2520and%2520Qiang%2520Wang%2520and%2520Yihong%2520Gong%26entry.1292438233%3DContinual%2520Generalized%2520Category%2520Discovery%2520%2528C-GCD%2529%2520requires%2520identifying%2520novel%2520classes%2520from%2520unlabeled%2520data%2520while%2520retaining%2520knowledge%2520of%2520known%2520classes%2520over%2520time.%2520Existing%2520methods%2520typically%2520update%2520classifier%2520weights%2520dynamically%252C%2520resulting%2520in%2520forgetting%2520and%2520inconsistent%2520feature%2520alignment.%2520We%2520propose%2520GOAL%252C%2520a%2520unified%2520framework%2520that%2520introduces%2520a%2520fixed%2520Equiangular%2520Tight%2520Frame%2520%2528ETF%2529%2520classifier%2520to%2520impose%2520a%2520consistent%2520geometric%2520structure%2520throughout%2520learning.%2520GOAL%2520conducts%2520supervised%2520alignment%2520for%2520labeled%2520samples%2520and%2520confidence-guided%2520alignment%2520for%2520novel%2520samples%252C%2520enabling%2520stable%2520integration%2520of%2520new%2520classes%2520without%2520disrupting%2520old%2520ones.%2520Experiments%2520on%2520four%2520benchmarks%2520show%2520that%2520GOAL%2520outperforms%2520the%2520prior%2520method%2520Happy%252C%2520reducing%2520forgetting%2520by%252016.1%2525%2520and%2520boosting%2520novel%2520class%2520discovery%2520by%25203.2%2525%252C%2520establishing%2520a%2520strong%2520solution%2520for%2520long-horizon%2520continual%2520discovery.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.19872v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GOAL%3A%20Geometrically%20Optimal%20Alignment%20for%20Continual%20Generalized%20Category%20Discovery&entry.906535625=Jizhou%20Han%20and%20Chenhao%20Ding%20and%20SongLin%20Dong%20and%20Yuhang%20He%20and%20Shaokun%20Wang%20and%20Qiang%20Wang%20and%20Yihong%20Gong&entry.1292438233=Continual%20Generalized%20Category%20Discovery%20%28C-GCD%29%20requires%20identifying%20novel%20classes%20from%20unlabeled%20data%20while%20retaining%20knowledge%20of%20known%20classes%20over%20time.%20Existing%20methods%20typically%20update%20classifier%20weights%20dynamically%2C%20resulting%20in%20forgetting%20and%20inconsistent%20feature%20alignment.%20We%20propose%20GOAL%2C%20a%20unified%20framework%20that%20introduces%20a%20fixed%20Equiangular%20Tight%20Frame%20%28ETF%29%20classifier%20to%20impose%20a%20consistent%20geometric%20structure%20throughout%20learning.%20GOAL%20conducts%20supervised%20alignment%20for%20labeled%20samples%20and%20confidence-guided%20alignment%20for%20novel%20samples%2C%20enabling%20stable%20integration%20of%20new%20classes%20without%20disrupting%20old%20ones.%20Experiments%20on%20four%20benchmarks%20show%20that%20GOAL%20outperforms%20the%20prior%20method%20Happy%2C%20reducing%20forgetting%20by%2016.1%25%20and%20boosting%20novel%20class%20discovery%20by%203.2%25%2C%20establishing%20a%20strong%20solution%20for%20long-horizon%20continual%20discovery.&entry.1838667208=http%3A//arxiv.org/abs/2602.19872v1&entry.124074799=Read"},
{"title": "Evaluating LLMs' Divergent Thinking Capabilities for Scientific Idea Generation with Minimal Context", "author": "Kai Ruan and Xuan Wang and Jixiang Hong and Peng Wang and Yang Liu and Hao Sun", "abstract": "While Large Language Models (LLMs) demonstrate remarkable capabilities in scientific tasks such as literature analysis and experimental design (e.g., accurately extracting key findings from papers or generating coherent experimental procedures), existing evaluation benchmarks primarily assess performance using rich contextual inputs. We introduce LiveIdeaBench, a comprehensive benchmark evaluating LLMs' scientific idea generation by assessing divergent thinking capabilities using single-keyword prompts. Drawing from Guilford's creativity theory, our benchmark employs a dynamic panel of state-of-the-art LLMs to assess generated ideas across five key dimensions: originality, feasibility, fluency, flexibility, and clarity. Through extensive experimentation with over 40 leading models across 1,180 keywords spanning 22 scientific domains, we reveal that the scientific idea generation capabilities measured by our benchmark, are poorly predicted by standard metrics of general intelligence. Our results demonstrate that models like QwQ-32B-preview achieve creative performance comparable to top-tier models such as claude-3.7-sonnet:thinking, despite significant gaps in their general intelligence scores. These findings highlight the need for specialized evaluation benchmarks for scientific idea generation and suggest that enhancing these idea generation capabilities in LLMs may require different training strategies than those used for improving general problem-solving abilities, potentially enabling a wider range of AI tools tailored for different stages of the scientific process.", "link": "http://arxiv.org/abs/2412.17596v4", "date": "2026-02-23", "relevancy": 2.5714, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.524}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.524}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4949}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Evaluating%20LLMs%27%20Divergent%20Thinking%20Capabilities%20for%20Scientific%20Idea%20Generation%20with%20Minimal%20Context&body=Title%3A%20Evaluating%20LLMs%27%20Divergent%20Thinking%20Capabilities%20for%20Scientific%20Idea%20Generation%20with%20Minimal%20Context%0AAuthor%3A%20Kai%20Ruan%20and%20Xuan%20Wang%20and%20Jixiang%20Hong%20and%20Peng%20Wang%20and%20Yang%20Liu%20and%20Hao%20Sun%0AAbstract%3A%20While%20Large%20Language%20Models%20%28LLMs%29%20demonstrate%20remarkable%20capabilities%20in%20scientific%20tasks%20such%20as%20literature%20analysis%20and%20experimental%20design%20%28e.g.%2C%20accurately%20extracting%20key%20findings%20from%20papers%20or%20generating%20coherent%20experimental%20procedures%29%2C%20existing%20evaluation%20benchmarks%20primarily%20assess%20performance%20using%20rich%20contextual%20inputs.%20We%20introduce%20LiveIdeaBench%2C%20a%20comprehensive%20benchmark%20evaluating%20LLMs%27%20scientific%20idea%20generation%20by%20assessing%20divergent%20thinking%20capabilities%20using%20single-keyword%20prompts.%20Drawing%20from%20Guilford%27s%20creativity%20theory%2C%20our%20benchmark%20employs%20a%20dynamic%20panel%20of%20state-of-the-art%20LLMs%20to%20assess%20generated%20ideas%20across%20five%20key%20dimensions%3A%20originality%2C%20feasibility%2C%20fluency%2C%20flexibility%2C%20and%20clarity.%20Through%20extensive%20experimentation%20with%20over%2040%20leading%20models%20across%201%2C180%20keywords%20spanning%2022%20scientific%20domains%2C%20we%20reveal%20that%20the%20scientific%20idea%20generation%20capabilities%20measured%20by%20our%20benchmark%2C%20are%20poorly%20predicted%20by%20standard%20metrics%20of%20general%20intelligence.%20Our%20results%20demonstrate%20that%20models%20like%20QwQ-32B-preview%20achieve%20creative%20performance%20comparable%20to%20top-tier%20models%20such%20as%20claude-3.7-sonnet%3Athinking%2C%20despite%20significant%20gaps%20in%20their%20general%20intelligence%20scores.%20These%20findings%20highlight%20the%20need%20for%20specialized%20evaluation%20benchmarks%20for%20scientific%20idea%20generation%20and%20suggest%20that%20enhancing%20these%20idea%20generation%20capabilities%20in%20LLMs%20may%20require%20different%20training%20strategies%20than%20those%20used%20for%20improving%20general%20problem-solving%20abilities%2C%20potentially%20enabling%20a%20wider%20range%20of%20AI%20tools%20tailored%20for%20different%20stages%20of%20the%20scientific%20process.%0ALink%3A%20http%3A//arxiv.org/abs/2412.17596v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEvaluating%2520LLMs%2527%2520Divergent%2520Thinking%2520Capabilities%2520for%2520Scientific%2520Idea%2520Generation%2520with%2520Minimal%2520Context%26entry.906535625%3DKai%2520Ruan%2520and%2520Xuan%2520Wang%2520and%2520Jixiang%2520Hong%2520and%2520Peng%2520Wang%2520and%2520Yang%2520Liu%2520and%2520Hao%2520Sun%26entry.1292438233%3DWhile%2520Large%2520Language%2520Models%2520%2528LLMs%2529%2520demonstrate%2520remarkable%2520capabilities%2520in%2520scientific%2520tasks%2520such%2520as%2520literature%2520analysis%2520and%2520experimental%2520design%2520%2528e.g.%252C%2520accurately%2520extracting%2520key%2520findings%2520from%2520papers%2520or%2520generating%2520coherent%2520experimental%2520procedures%2529%252C%2520existing%2520evaluation%2520benchmarks%2520primarily%2520assess%2520performance%2520using%2520rich%2520contextual%2520inputs.%2520We%2520introduce%2520LiveIdeaBench%252C%2520a%2520comprehensive%2520benchmark%2520evalua {"title": "Group Representational Position Encoding", "author": "Yifan Zhang and Zixiang Chen and Yifeng Liu and Zhen Qin and Huizhuo Yuan and Kangping Xu and Yang Yuan and Quanquan Gu and Andrew Chi-Chih Yao", "abstract": "We present GRAPE (Group Representational Position Encoding), a unified framework for positional encoding based on group actions. GRAPE unifies two families of mechanisms: (i) multiplicative rotations (Multiplicative GRAPE) in $\\operatorname{SO}(d)$ and (ii) additive logit biases (Additive GRAPE) arising from unipotent actions in the general linear group $\\mathrm{GL}$. In Multiplicative GRAPE, a position $n \\in \\mathbb{Z}$ (or $t \\in \\mathbb{R}$) acts as $\\mathbf{G}(n) = \\exp(n \\, \u03c9\\, \\mathbf{L})$ with a rank-2 skew-symmetric generator $\\mathbf{L} \\in \\mathbb{R}^{d \\times d}$, yielding a relative, compositional, norm-preserving map with a closed-form matrix exponential. RoPE is recovered exactly when the $d/2$ planes correspond to canonical coordinate pairs with a log-uniform spectrum. Learned commuting subspaces and compact non-commuting mixtures strictly extend this geometry to capture cross-subspace feature coupling at $O(d)$ and $O(r d)$ cost per head, respectively. In Additive GRAPE, additive logits arise from rank-1 (or low-rank) unipotent actions, recovering ALiBi and the Forgetting Transformer (FoX) as exact special cases while preserving an exact relative law and streaming cacheability. Overall, GRAPE provides a principled design space for positional geometry in long-context models, subsuming RoPE and ALiBi as special cases. Project page: https://github.com/model-architectures/GRAPE.", "link": "http://arxiv.org/abs/2512.07805v4", "date": "2026-02-23", "relevancy": 2.5552, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.536}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", {"title": "Hier-COS: Making Deep Features Hierarchy-aware via Composition of Orthogonal Subspaces", "author": "Depanshu Sani and Saket Anand", "abstract": "Traditional classifiers treat all labels as mutually independent, thereby considering all negative classes to be equally incorrect. This approach fails severely in many real-world scenarios, where a known semantic hierarchy defines a partial order of preferences over negative classes. While hierarchy-aware feature representations have shown promise in mitigating this problem, their performance is typically assessed using metrics like MS and AHD. In this paper, we highlight important shortcomings in existing hierarchical evaluation metrics, demonstrating that they are often incapable of measuring true hierarchical performance. Our analysis reveals that existing methods learn sub-optimal hierarchical representations, despite competitive MS and AHD scores. To counter these issues, we introduce Hier-COS, a novel framework for unified hierarchy-aware fine-grained and hierarchical multi-level classification. We show that Hier-COS is theoretically guaranteed to be consistent with the given hierarchy tree. Furthermore, our framework implicitly adapts the learning capacity for different classes based on their position within the hierarchy tree-a vital property absent in existing methods. Finally, to address the limitations of evaluation metrics, we propose HOPS, a ranking-based metric that demonstrably overcomes the deficiencies of current evaluation standards. We benchmark Hier-COS on four challenging datasets, including the deep and imbalanced tieredImageNet-H and iNaturalist-19. Through extensive experiments, we demonstrate that Hier-COS achieves SOTA across all hierarchical metrics for every dataset, while simultaneously beating the top-1 accuracy in all but one case. Lastly, we show that Hier-COS can effectively learn to transform the frozen features extracted from a pretrained backbone (ViT) to be hierarchy-aware, yielding substantial benefits for hierarchical classification performance.", "link": "http://arxiv.org/abs/2503.07853v2", "date": "2026-02-23", "relevancy": 2.5531, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5208}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5105}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5005}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hier-COS%3A%20Making%20Deep%20Features%20Hierarchy-aware%20via%20Composition%20of%20Orthogonal%20Subspaces&body=Title%3A%20Hier-COS%3A%20Making%20Deep%20Features%20Hierarchy-aware%20via%20Composition%20of%20Orthogonal%20Subspaces%0AAuthor%3A%20Depanshu%20Sani%20and%20Saket%20Anand%0AAbstract%3A%20Traditional%20classifiers%20treat%20all%20labels%20as%20mutually%20independent%2C%20thereby%20considering%20all%20negative%20classes%20to%20be%20equally%20incorrect.%20This%20approach%20fails%20severely%20in%20many%20real-world%20scenarios%2C%20where%20a%20known%20semantic%20hierarchy%20defines%20a%20partial%20order%20of%20preferences%20over%20negative%20classes.%20While%20hierarchy-aware%20feature%20representations%20have%20shown%20promise%20in%20mitigating%20this%20problem%2C%20their%20performance%20is%20typically%20assessed%20using%20metrics%20like%20MS%20and%20AHD.%20In%20this%20paper%2C%20we%20highlight%20important%20shortcomings%20in%20existing%20hierarchical%20evaluation%20metrics%2C%20demonstrating%20that%20they%20are%20often%20incapable%20of%20measuring%20true%20hierarchical%20performance.%20Our%20analysis%20reveals%20that%20existing%20methods%20learn%20sub-optimal%20hierarchical%20representations%2C%20despite%20competitive%20MS%20and%20AHD%20scores.%20To%20counter%20these%20issues%2C%20we%20introduce%20Hier-COS%2C%20a%20novel%20framework%20for%20unified%20hierarchy-aware%20fine-grained%20and%20hierarchical%20multi-level%20classification.%20We%20show%20that%20Hier-COS%20is%20theoretically%20guaranteed%20to%20be%20consistent%20with%20the%20given%20hierarchy%20tree.%20Furthermore%2C%20our%20framework%20implicitly%20adapts%20the%20learning%20capacity%20for%20different%20classes%20based%20on%20their%20position%20within%20the%20hierarchy%20tree-a%20vital%20property%20absent%20in%20existing%20methods.%20Finally%2C%20to%20address%20the%20limitations%20of%20evaluation%20metrics%2C%20we%20propose%20HOPS%2C%20a%20ranking-based%20metric%20that%20demonstrably%20overcomes%20the%20deficiencies%20of%20current%20evaluation%20standards.%20We%20benchmark%20Hier-COS%20on%20four%20challenging%20datasets%2C%20including%20the%20deep%20and%20imbalanced%20tieredImageNet-H%20and%20iNaturalist-19.%20Through%20extensive%20experiments%2C%20we%20demonstrate%20that%20Hier-COS%20achieves%20SOTA%20across%20all%20hierarchical%20metrics%20for%20every%20dataset%2C%20while%20simultaneously%20beating%20the%20top-1%20accuracy%20in%20all%20but%20one%20case.%20Lastly%2C%20we%20show%20that%20Hier-COS%20can%20effectively%20learn%20to%20transform%20the%20frozen%20features%20extracted%20from%20a%20pretrained%20backbone%20%28ViT%29%20to%20be%20hierarchy-aware%2C%20yielding%20substantial%20benefits%20for%20hierarchical%20classification%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2503.07853v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHier-COS%253A%2520Making%2520Deep%2520Features%2520Hierarchy-aware%2520via%2520Composition%2520of%2520Orthogonal%2520Subspaces%26entry.906535625%3DDepanshu%2520Sani%2520and%2520Saket%2520Anand%26entry.1292438233%3DTraditional%2520classifiers%2520treat%2520all%2520labels%2520as%2520mutually%2520independent%252C%2520thereb {"title": "Generative Neural Video Compression via Video Diffusion Prior", "author": "Qi Mao and Hao Cheng and Tinghan Yang and Libiao Jin and Siwei Ma", "abstract": "We present GNVC-VD, the first DiT-based generative neural video compression framework built upon an advanced video generation foundation model, where spatio-temporal latent compression and sequence-level generative refinement are unified within a single codec. Existing perceptual codecs primarily rely on pre-trained image generative priors to restore high-frequency details, but their frame-wise nature lacks temporal modeling and inevitably leads to perceptual flickering. To address this, GNVC-VD introduces a unified flow-matching latent refinement module that leverages a video diffusion transformer to jointly enhance intra- and inter-frame latents through sequence-level denoising, ensuring consistent spatio-temporal details. Instead of denoising from pure Gaussian noise as in video generation, GNVC-VD initializes refinement from decoded spatio-temporal latents and learns a correction term that adapts the diffusion prior to compression-induced degradation. A conditioning adaptor further injects compression-aware cues into intermediate DiT layers, enabling effective artifact removal while maintaining temporal coherence under extreme bitrate constraints. Extensive experiments show that GNVC-VD surpasses both traditional and learned codecs in perceptual quality and significantly reduces the flickering artifacts that persist in prior generative approaches, even below 0.01 bpp, highlighting the promise of integrating video-native generative priors into neural codecs for next-generation perceptual video compression.", "link": "http://arxiv.org/abs/2512.05016v2", "date": "2026-02-23", "relevancy": 2.5431, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6594}, {"title": "Magic-Me: Identity-Specific {"title": "ExpPortrait: Expressive Portrait Generation via Personalized Representation", "author": "Junyi Wang and Yudong Guo and Boyang Guo and Shengming Yang and Juyong Zhang", "abstract": "While diffusion models have shown great potential in portrait generation, generating expressive, coherent, and controllable cinematic portrait videos remains a significant challenge. Existing intermediate signals for portrait generation, such as 2D landmarks and parametric models, have limited disentanglement capabilities and cannot express personalized details due to their sparse or low-rank representation. Therefore, existing methods based on these models struggle to accurately preserve subject identity and expressions, hindering the generation of highly expressive portrait videos. To overcome these limitations, we propose a high-fidelity personalized head representation that more effectively disentangles expression and identity. This representation captures both static, subject-specific global geometry and dynamic, expression-related details. Furthermore, we introduce an expression transfer module to achieve personalized transfer of head pose and expression details between different identities. We use this sophisticated and highly expressive head model as a conditional signal to train a diffusion transformer (DiT)-based generator to synthesize richly detailed portrait videos. Extensive experiments on self- and cross-reenactment tasks demonstrate that our method outperforms previous models in terms of identity preservation, expression accuracy, and temporal stability, particularly in capturing fine-grained details of complex motion.", "link": "http://arxiv.org/abs/2602.19900v1", "date": "2026-02-23", "relevancy": 2.5022, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6333}, {"title": "Total Selfie: Generating Full-Body Selfies", "link": "http://arxiv.org/abs/2308.14740v2", "similarity": 0.6308}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6157}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ExpPortrait%3A%20Expressive%20Portrait%20Generation%20via%20Personalized%20Representation&body=Title%3A%20ExpPortrait%3A%20Expressive%20Portrait%20Generation%20via%20Personalized%20Representation%0AAuthor%3A%20Junyi%20Wang%20and%20Yudong%20Guo%20and%20Boyang%20Guo%20and%20Shengming%20Yang%20and%20Juyong%20Zhang%0AAbstract%3A%20While%20diffusion%20models%20have%20shown%20great%20potential%20in%20portrait%20generation%2C%20generating%20expressive%2C%20coherent%2C%20and%20controllable%20cinematic%20portrait%20videos%20remains%20a%20significant%20challenge.%20Existing%20intermediate%20signals%20for%20portrait%20generation%2C%20such%20as%202D%20landmarks%20and%20parametric%20models%2C%20have%20limited%20disentanglement%20capabilities%20and%20cannot%20express%20personalized%20details%20due%20to%20their%20sparse%20or%20low-rank%20representation.%20Therefore%2C%20existing%20methods%20based%20on%20these%20models%20struggle%20to%20accurately%20preserve%20subject%20identity%20and%20expressions%2C%20hindering%20the%20generation%20of%20highly%20expressive%20portrait%20videos.%20To%20overcome%20these%20limitations%2C%20we%20propose%20a%20high-fidelity%20personalized%20head%20representation%20that%20more%20effectively%20disentangles%20expression%20and%20identity.%20This%20representation%20captures%20both%20static%2C%20subject-specific%20global%20geometry%20and%20dynamic%2C%20expression-related%20details.%20Furthermore%2C%20we%20introduce%20an%20expression%20transfer%20module%20to%20achieve%20personalized%20transfer%20of%20head%20pose%20and%20expression%20details%20between%20different%20identities.%20We%20use%20this%20sophisticated%20and%20highly%20expressive%20head%20model%20as%20a%20conditional%20signal%20to%20train%20a%20diffusion%20transformer%20%28DiT%29-based%20generator%20to%20synthesize%20richly%20detailed%20portrait%20videos.%20Extensive%20experiments%20on%20self-%20and%20cross-reenactment%20tasks%20demonstrate%20that%20our%20method%20outperforms%20previous%20models%20in%20terms%20of%20identity%20preservation%2C%20expression%20accuracy%2C%20and%20temporal%20stability%2C%20particularly%20in%20capturing%20fine-grained%20details%20of%20complex%20motion.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19900v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DExpPortrait%253A%2520Expressive%2520Portrait%2520Generation%2520via%2520Personalized%2520Representation%26entry.906535625%3DJunyi%2520Wang%2520and%2520Yudong%2520Guo%2520and%2520Boyang%2520Guo%2520and%2520Shengming%2520Yang%2520and%2520Juyong%2520Zhang%26entry.1292438233%3DWhile%2520diffusion%2520models%2520have%2520shown%2520great%2520potential%2520in%2520portrait%2520generation%252C%2520generating%2520expressive%252C%2520coherent%252C%2520and%2520controllable%2520cinematic%2520portrait%2520videos%2520remains%2520a%2520significant%2520challenge.%2520Existing%2520intermediate%2520signals%2520for%2520portrait%2520generation%252C%2520such%2520as%25202D%2520landmarks%2520and%2520parametric%2520models%252C%2520have%2520limited%2520disentanglement%2520capabilities%2520and%2520cannot%2520express%2520personalized%2520details%2520due%2520to%2520their%2520sparse%2520or%2520low-rank%2520representation.%2520Therefore%252C%2520existing%2520methods%2520based%2520on%2520these%2520models%2520struggle%2520to%2520accurately%2520preserve%2520subject%2520identity%2520and%2520expressions%252C%2520hindering%2520the%2520generation%2520of%2520highly%2520expressive%2520portrait%2520videos.%2520To%2520overcome%2520these%2520limitations%252C%2520we%2520propose%2520a%2520high-fidelity%2520personalized%2520head%2520representation%2520that%2520more%2520effectively%2520disentangles%2520expression%2520and%2520identity.%2520This%2520represe {"title": "Do Large Language Models Understand Data Visualization Rules?", "author": "Martin Sinnona and Valentin Bonas and Emmanuel Iarussi and Viviana Siless", "abstract": "Data visualization rules-derived from decades of research in design and perception-ensure trustworthy chart communication. While prior work has shown that large language models (LLMs) can generate charts or flag misleading figures, it remains unclear whether they can reason about and enforce visualization rules directly. Constraint-based systems such as Draco encode these rules as logical constraints for precise automated checks, but maintaining symbolic encodings requires expert effort, motivating the use of LLMs as flexible rule validators. In this paper, we present the first systematic evaluation of LLMs against visualization rules using hard-verification ground truth derived from Answer Set Programming (ASP). We translated a subset of Draco's constraints into natural-language statements and generated a controlled dataset of 2,000 Vega-Lite specifications annotated with explicit rule violations. LLMs were evaluated on both accuracy in detecting violations and prompt adherence, which measures whether outputs follow the required structured format. Results show that frontier models achieve high adherence (Gemma 3 4B / 27B: 100%, GPT-oss 20B: 98%) and reliably detect common violations (F1 up to 0.82),yet performance drops for subtler perceptual rules (F1 < 0.15 for some categories) and for outputs generated from technical ASP formulations.Translating constraints into natural language improved performance by up to 150% for smaller models. These findings demonstrate the potential of LLMs as flexible, language-driven validators while highlighting their current limitations compared to symbolic solvers.", "link": "http://arxiv.org/abs/2602.20137v1", "date": "2026-02-23", "relevancy": 2.4811, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5105}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5105}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4677}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Do%20Large%20Language%20Models%20Understand%20Data%20Visualization%20Rules%3F&body=Title%3A%20Do%20Large%20Language%20Models%20Understand%20Data%20Visualization%20Rules%3F%0AAuthor%3A%20Martin%20Sinnona%20and%20Valentin%20Bonas%20and%20Emmanuel%20Iarussi%20and%20Viviana%20Siless%0AAbstract%3A%20Data%20visualization%20rules-derived%20from%20decades%20of%20research%20in%20design%20and%20perception-ensure%20trustworthy%20chart%20communication.%20While%20prior%20work%20has%20shown%20that%20large%20language%20models%20%28LLMs%29%20can%20generate%20charts%20or%20flag%20misleading%20figures%2C%20it%20remains%20unclear%20whether%20they%20can%20reason%20about%20and%20enforce%20visualization%20rules%20directly.%20Constraint-based%20systems%20such%20as%20Draco%20encode%20these%20rules%20as%20logical%20constraints%20for%20precise%20automated%20checks%2C%20but%20maintaining%20symbolic%20encodings%20requires%20expert%20effort%2C%20motivating%20the%20use%20of%20LLMs%20as%20flexible%20rule%20validators.%20In%20this%20paper%2C%20we%20present%20the%20first%20systematic%20evaluation%20of%20LLMs%20against%20visualization%20rules%20using%20hard-verification%20ground%20truth%20derived%20from%20Answer%20Set%20Programming%20%28ASP%29.%20We%20translated%20a%20subset%20of%20Draco%27s%20constraints%20into%20natural-language%20statements%20and%20generated%20a%20controlled%20dataset%20of%202%2C000%20Vega-Lite%20specifications%20annotated%20with%20explicit%20rule%20violations.%20LLMs%20were%20evaluated%20on%20both%20accuracy%20in%20detecting%20violations%20and%20prompt%20adherence%2C%20which%20measures%20whether%20outputs%20follow%20the%20required%20structured%20format.%20Results%20show%20that%20frontier%20models%20achieve%20high%20adherence%20%28Gemma%203%204B%20/%2027B%3A%20100%25%2C%20GPT-oss%2020B%3A%2098%25%29%20and%20reliably%20detect%20common%20violations%20%28F1%20up%20to%200.82%29%2Cyet%20performance%20drops%20for%20subtler%20perceptual%20rules%20%28F1%20%3C%200.15%20for%20some%20categories%29%20and%20for%20outputs%20generated%20from%20technical%20ASP%20formulations.Translating%20constraints%20into%20natural%20language%20improved%20performance%20by%20up%20to%20150%25%20for%20smaller%20models.%20These%20findings%20demonstrate%20the%20potential%20of%20LLMs%20as%20flexible%2C%20language-driven%20validators%20while%20highlighting%20their%20current%20limitations%20compared%20to%20symbolic%20solvers.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20137v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDo%2520Large%2520Language%2520Models%2520Understand%2520Data%2520Visualization%2520Rules%253F%26entry.906535625%3DMartin%2520Sinnona%2520and%2520Valentin%2520Bonas%2520and%2520Emmanuel%2520Iarussi%2520and%2520Viviana%2520Siless%26entry.1292438233%3DData%2520visualization%2520rules-derived%2520from%2520decades%2520of%2520research%2520in%2520design%2520and%2520perception-ensure%2520trustworthy%2520chart%2520communication.%2520While%2520prior%2520work%2520has%2520shown%2520that%2520large%2520language%2520models%2520%2528LLMs%2529%2520can%2520generate%2520charts%2520or%2520flag%2520misleading%2520figures%252C%2520it%2520remains%2520unclear%2520whether%2520they%2520can%2520reason%2520about%2520and%2520enforce%2520visualization%2520rules%2520directly.%2520Constraint-based%2520systems%2520such%2520as%2520Draco%2520encode%2 {"title": "RAIR: A Rule-Aware Benchmark Uniting Challenging Long-Tail and Visual Salience Subset for E-commerce Relevance Assessment", "author": "Chenji Lu and Zhuo Chen and Hui Zhao and Zhenyi Wang and Pengjie Wang and Chuan Yu and Jian Xu", "abstract": "Search relevance plays a central role in web e-commerce. While large language models (LLMs) have shown significant results on relevance task, existing benchmarks lack sufficient complexity for comprehensive model assessment, resulting in an absence of standardized relevance evaluation metrics across the industry. To address this limitation, we propose Rule-Aware benchmark with Image for Relevance assessment(RAIR), a Chinese dataset derived from real-world scenarios. RAIR established a standardized framework for relevance assessment and provides a set of universal rules, which forms the foundation for standardized evaluation. Additionally, RAIR analyzes essential capabilities required for current relevance models and introduces a comprehensive dataset consists of three subset: (1) a general subset with industry-balanced sampling to evaluate fundamental model competencies; (2) a long-tail hard subset focus on challenging cases to assess performance limits; (3) a visual salience subset for evaluating multimodal understanding capabilities. We conducted experiments on RAIR using 14 open and closed-source models. The results demonstrate that RAIR presents sufficient challenges even for GPT-5, which achieved the best performance. RAIR data are now available, serving as an industry benchmark for relevance assessment while providing new insights into general LLM and Visual Language Model(VLM) evaluation.", "link": "http://arxiv.org/abs/2512.24943v2", "date": "2026-02-23", "relevancy": 2.4694, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4988}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4988}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4841}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RAIR%3A%20A%20Rule-Aware%20Benchmark%20Uniting%20Challenging%20Long-Tail%20and%20Visual%20Salience%20Subset%20for%20E-commerce%20Relevance%20Assessment&body=Title%3A%20RAIR%3A%20A%20Rule-Aware%20Benchmark%20Uniting%20Challenging%20Long-Tail%20and%20Visual%20Salience%20Subset%20for%20E-commerce%20Relevance%20Assessment%0AAuthor%3A%20Chenji%20Lu%20and%20Zhuo%20Chen%20and%20Hui%20Zhao%20and%20Zhenyi%20Wang%20and%20Pengjie%20Wang%20and%20Chuan%20Yu%20and%20Jian%20Xu%0AAbstract%3A%20Search%20relevance%20plays%20a%20central%20role%20in%20web%20e-commerce.%20While%20large%20language%20models%20%28LLMs%29%20have%20shown%20significant%20results%20on%20relevance%20task%2C%20existing%20benchmarks%20lack%20sufficient%20complexity%20for%20comprehensive%20model%20assessment%2C%20resulting%20in%20an%20absence%20of%20standardized%20relevance%20evaluation%20metrics%20across%20the%20industry.%20To%20address%20this%20limitation%2C%20we%20propose%20Rule-Aware%20benchmark%20with%20Image%20for%20Relevance%20assessment%28RAIR%29%2C%20a%20Chinese%20dataset%20derived%20from%20real-world%20scenarios.%20RAIR%20established%20a%20standardized%20framework%20for%20relevance%20assessment%20and%20provides%20a%20set%20of%20universal%20rules%2C%20which%20forms%20the%20foundation%20for%20standardized%20evaluation.%20Additionally%2C%20RAIR%20analyzes%20essential%20capabilities%20required%20for%20current%20relevance%20models%20and%20introduces%20a%20comprehensive%20dataset%20consists%20of%20three%20subset%3A%20%281%29%20a%20general%20subset%20with%20industry-balanced%20sampling%20to%20evaluate%20fundamental%20model%20competencies%3B%20%282%29%20a%20long- {"title": "Unfolded Laplacian Spectral Embedding: A Theoretically Grounded Approach to Dynamic Network Representation", "author": "Haruka Ezoe and Hiroki Matsumoto and Ryohei Hisano", "abstract": "Dynamic relational data arise in many machine learning applications, yet their evolving structure poses challenges for learning representations that remain consistent and interpretable over time. A common approach is to learn time varying node embeddings, whose usefulness depends on well defined stability properties across nodes and across time. We introduce Unfolded Laplacian Spectral Embedding (ULSE), a principled extension of unfolded adjacency spectral embedding to normalized Laplacian operators, a setting where stability guarantees have remained out of reach. We prove that ULSE satisfies both cross-sectional and longitudinal stability under a dynamic stochastic block model. Moreover, the Laplacian formulation yields a dynamic Cheeger-type inequality linking the spectrum of the unfolded normalized Laplacian to worst case conductance over time, providing structural insight into the embeddings. Empirical results on synthetic and real world dynamic networks validate the theory.", "link": "http://arxiv.org/abs/2508.12674v2", "date": "2026-02-23", "relevancy": 2.4669, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5014}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4899}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4889}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unfolded%20Laplacian%20Spectral%20Embedding%3A%20A%20Theoretically%20Grounded%20Approach%20to%20Dynamic%20Network%20Representation&body=Title%3A%20Unfolded%20Laplacian%20Spectral%20Embedding%3A%20A%20Theoretically%20Grounded%20Approach%20to%20Dynamic%20Network%20Representation%0AAuthor%3A%20Haruka%20Ezoe%20and%20Hiroki%20Matsumoto%20and%20Ryohei%20Hisano%0AAbstract%3A%20Dynamic%20relational%20data%20arise%20in%20many%20machine%20learning%20applications%2C%20yet%20their%20evolving%20structure%20poses%20challenges%20for%20learning%20representations%20that%20remain%20consistent%20and%20interpretable%20over%20time.%20A%20common%20approach%20is%20to%20learn%20time%20varying%20node%20embeddings%2C%20whose%20usefulness%20depends%20on%20well%20defined%20stability%20properties%20across%20nodes%20and%20across%20time.%20We%20introduce%20Unfolded%20Laplacian%20Spectral%20Embedding%20%28ULSE%29%2C%20a%20principled%20extension%20of%20unfolded%20adjacency%20spectral%20embedding%20to%20normalized%20Laplacian%20operators%2C%20a%20setting%20where%20stability%20guarantees%20have%20remained%20out%20of%20reach.%20We%20prove%20that%20ULSE%20satisfies%20both%20cross-sectional%20and%20longitudinal%20stability%20under%20a%20dynamic%20stochastic%20block%20model.%20Moreover%2C%20the%20Laplacian%20formulation%20yields%20a%20dynamic%20Cheeger-type%20inequality%20linking%20the%20spectrum%20of%20the%20unfolded%20normalized%20Laplacian%20to%20worst%20case%20conductance%20over%20time%2C%20providing%20structural%20insight%20into%20the%20embeddings.%20Empirical%20results%20on%20synthetic%20and%20real%20world%20dynamic%20networks%20validate%20the%20theory.%0ALink%3A%20http%3A//arxiv.org/abs/2508.12674v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnfolded%2520Laplacian%2520Spectral%2520Embedding%253A%2520A%2520Theoretically%2520Grounded%2520Approach%2520to%2520Dynamic%2520Network%2520Representation%26entry.906535625%3DHaruka%2520Ezoe%2520and%2520Hiroki%2520Matsumoto%2520and%2520Ryohei%2520Hisano%26entry.1292438233%3DDynamic%2520relational%2520data%2520arise%2520in%2520many%2520machine%2520learning%2520appli {"title": "Beyond Mimicry: Toward Lifelong Adaptability in Imitation Learning", "author": "Nathan Gavenski and Felipe Meneguzzi and Odinaldo Rodrigues", "abstract": "Imitation learning stands at a crossroads: despite decades of progress, current imitation learning agents remain sophisticated memorisation machines, excelling at replay but failing when contexts shift or goals evolve. This paper argues that this failure is not technical but foundational: imitation learning has been optimised for the wrong objective. We propose a research agenda that redefines success from perfect replay to compositional adaptability. Such adaptability hinges on learning behavioural primitives once and recombining them through novel contexts without retraining. We establish metrics for compositional generalisation, propose hybrid architectures, and outline interdisciplinary research directions drawing on cognitive science and cultural evolution. Agents that embed adaptability at the core of imitation learning thus have an essential capability for operating in an open-ended world.", "link": "http://arxiv.org/abs/2602.19930v1", "date": "2026-02-23", "relevancy": 2.4652, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4993}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.49}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4898}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Mimicry%3A%20Toward%20Lifelong%20Adaptability%20in%20Imitation%20Learning&body=Title%3A%20Beyond%20Mimicry%3A%20Toward%20Lifelong%20Adaptability%20in%20Imitation%20Learning%0AAuthor%3A%20Nathan%20Gavenski%20and%20Felipe%20Meneguzzi%20and%20Odinaldo%20Rodrigues%0AAbstract%3A%20Imitation%20learning%20stands%20at%20a%20crossroads%3A%20despite%20decades%20of%20progress%2C%20current%20imitation%20learning%20agents%20remain%20sophisticated%20memorisation%20machines%2C%20excelling%20at%20replay%20but%20failing%20when%20contexts%20shift%20or%20goals%20evolve.%20This%20paper%20argues%20that%20this%20failure%20is%20not%20technical%20but%20foundational%3A%20imitation%20learning%20has%20been%20optimised%20for%20the%20wrong%20objective.%20We%20propose%20a%20research%20agenda%20that%20redefines%20success%20from%20perfect%20replay%20to%20compositional%20adaptability.%20Such%20adaptability%20hinges%20on%20learning%20behavioural%20primitives%20once%20and%20recombining%20them%20through%20novel%20contexts%20without%20retraining.%20We%20establish%20metrics%20for%20compositional%20generalisation%2C%20propose%20hybrid%20architectures%2C%20and%20outline%20interdisciplinary%20research%20directions%20drawing%20on%20cognitive%20science%20and%20cultural%20evolution.%20Agents%20that%20embed%20adaptability%20at%20the%20core%20of%20imitation%20learning%20thus%20have%20an%20essential%20capability%20for%20operating%20in%20an%20open-ended%20world.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19930v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520Mimicry%253A%2520Toward%2520Lifelong%2520Adaptability%2520in%2520Imitation%2520Learning%26entry.906535625%3DNathan%2520Gavenski%2520and%2520Felipe%2520Meneguzzi%2520and%2520Odinaldo%2520Rodrigues%26entry.1292438233%3DImitation%2520learning%2520stands%2520at%2520a%2520crossroads%253A%2520despite%2520decades%2520of%2520progress%252C%2520current%2520imitation%2520learning%2520agents%2520remain%2520sophisticated%2520memorisation%2520machines%252C%2520excelling%2520at%2520replay%2520but%2520failing%2520when%2520contexts%2520shift%2520or%2520goals%2520evolve.%2520This%2520paper%2520argues%2520that%2520this%2520failure%2520is%2520not%2520technical%2520but%2520foundational%253A%2520imitation%2520learning%2520has%2520been%2520optimised%2520for%2520the%2520wrong%2520objective.%2520We%2520propose%2520a%2520research%2520agenda%2520that%2520redefines%2520success%2520from%2520perfect%2520replay%2520to%2520compositional%2520adaptability.%2520Such%2520adaptability%2520hinges%2520on%2520learning%2520behavioural%2520primitives%2520once%2520and%2520recombining%2520them%2520through%2520novel%2520contexts%2520without%2520retraining.%2520We%2520establish%2520metrics%2520for%2520compositional%2520generalisation%252C%2520propose%2520hybrid%2520architectures%252C%2520and%2520outline%2520interdisciplinary%2520research%2520directions%2520drawing%2520on%2520cognitive%2520science%2520and%2520cultural%2520evolution.%2520Agents%2520that%2520embed%2520adaptability%2520at%2520the%2520core%2520of%2520imitation%2520learning%2520thus%2520have%2520an%2520essential%2520capability%2520for%2520operating%2520in%2520an%2520open-ended%2520world.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.19930v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Beyond%20Mimicry%3A%20Toward%20Lifelong%20Adaptability%20in%20Imitation%20Learning&entry.906535625=Nathan%20Gavenski%20and%20Felipe%20Meneguzzi%20and%20Odinaldo%20Rodrigues&entry.1292438233=Imitation%20learning%20stands%20at%20a%20crossroads%3A%20despite%20decades%20of%20progress%2C%20current%20imitation%20learning%20agents%20remain%20sophisticated%20memorisation%20machines%2C%20excelling%20at%20replay%20but%20failing%20when%20contexts%20shift%20or%20goals%20evolve.%20This%20paper%20argues%20that%20this%20failure%20is%20not%20technical%20but%20foundational%3A%20imitation%20learning%20has%20been%20optimised%20for%20the%20wrong%20objective.%20We%20propose%20a%20research%20agenda%20that%20redefines%20success%20from%20perfect%20replay%20to%20compositional%20adaptability.%20Such%20adaptability%20hinges%20on%20learning%20behavioural%20primitives%20once% {"title": "BayesFusion-SDF: Probabilistic Signed Distance Fusion with View Planning on CPU", "author": "Soumya Mazumdar and Vineet Kumar Rakesh and Tapas Samanta", "abstract": "Key part of robotics, augmented reality, and digital inspection is dense 3D reconstruction from depth observations. Traditional volumetric fusion techniques, including truncated signed distance functions (TSDF), enable efficient and deterministic geometry reconstruction; however, they depend on heuristic weighting and fail to transparently convey uncertainty in a systematic way. Recent neural implicit methods, on the other hand, get very high fidelity but usually need a lot of GPU power for optimization and aren't very easy to understand for making decisions later on. This work presents BayesFusion-SDF, a CPU-centric probabilistic signed distance fusion framework that conceptualizes geometry as a sparse Gaussian random field with a defined posterior distribution over voxel distances. First, a rough TSDF reconstruction is used to create an adaptive narrow-band domain. Then, depth observations are combined using a heteroscedastic Bayesian formulation that is solved using sparse linear algebra and preconditioned conjugate gradients. Randomized diagonal estimators are a quick way to get an idea of posterior uncertainty. This makes it possible to extract surfaces and plan the next best view while taking into account uncertainty. Tests on a controlled ablation scene and a CO3D object sequence show that the new method is more accurate geometrically than TSDF baselines and gives useful estimates of uncertainty for active sensing. The proposed formulation provides a clear and easy-to-use alternative to GPU-heavy neural reconstruction methods while still being able to be understood in a probabilistic way and acting in a predictable way. GitHub: https://mazumdarsoumya.github.io/BayesFusionSDF", "link": "http://arxiv.org/abs/2602.19697v1", "date": "2026-02-23", "relevancy": 2.4566, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6285}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6042}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6031}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BayesFusion-SDF%3A%20Probabilistic%20Signed%20Distance%20Fusion%20with%20View%20Planning%20on%20CPU&body=Title%3A%20BayesFusion-SDF%3A%20Probabilistic%20Signed%20Distance%20Fusion%20with%20View%20Planning%20on%20CPU%0AAuthor%3A%20Soumya%20Mazumdar%20and%20Vineet%20Kumar%20Rakesh%20and%20Tapas%20Samanta%0AAbstract%3A%20Key%20part%20of%20robotics%2C%20augmented%20reality%2C%20and%20digital%20inspection%20is%20dense%203D%20reconstruction%20from%20depth%20observations.%20Traditional%20volumetric%20fusion%20techniques%2C%20including%20truncated%20signed%20distance%20functions%20%28TSDF%29%2C%20enable%20efficient%20and%20deterministic%20geometry%20reconstruction%3B%20however%2C%20they%20depend%20on%20heuristic%20weighting%20and%20fail%20to%20transparently%20convey%20uncertainty%20in%20a%20systematic%20way.%20Recent%20neural%20implicit%20methods%2C%20on%20the%20other%20hand%2C%20get%20very%20high%20fidelity%20but%20usually%20need%20a%20lot%20of%20GPU%20power%20for%20optimization%20and%20aren%27t%20very%20easy%20to%20understand%20for%20making%20decisions%20later%20on.%20This%20work%20presents%20BayesFusion-SDF%2C%20a%20CPU-centric%20probabilistic%20signed%20distance%20fusion%20framework%20that%20conceptualizes%20geometry%20as%20a%20sparse%20Gaussian%20random%20field%20with%20a%20defined%20posterior%20distribution%20over%20voxel%20distances.%20First%2C%20a%20rough%20TSDF%20reconstruction%20is%20used%20to%20create%20an%20adaptive%20narrow-band%20domain.%20Then%2C%20depth%20observations%20are%20combined%20using%20a%20heteroscedastic%20Bayesian%20formulation%20that%20is%20solved%20using%20sparse%20linear%20algebra%20and%20preconditioned%20conjugate%20gradients.%20Randomized%20diagonal%20estimators%20are%20a%20quick%20way%20to%20get%20an%20idea%20of%20posterior%20uncertainty.%20This%20makes%20it%20possible%20to%20extract%20surfaces%20and%20plan%20the%20next%20best%20view%20while%20taking%20into%20account%20uncertainty.%20Tests%20on%20a%20controlled%20ablation%20scene%20and%20a%20CO3D%20object%20sequence%20show%20that%20the%20new%20method%20is%20more%20accurate%20geometrically%20than%20TSDF%20baselines%20and%20gives%20useful%20estimates%20of%20uncertainty%20for%20active%20sensing.%20The%20proposed%20formulation%20provides%20a%20clear%20and%20easy-to-use%20alternative%20to%20GPU-heavy%20neural%20reconstruction%20methods%20while%20still%20being%20able%20to%20be%20understood%20in%20a%20probabilistic%20way%20and%20acting%20in%20a%20predictable%20way.%20GitHub%3A%20https%3A//mazumdarsoumya.github.io/BayesFusionSDF%0ALink%3A%20http%3A//arxiv.org/abs/2602.19697v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBayesFusion-SDF%253A%2520Probabilistic%2520Signed%2520Distance%2520Fusion%2520with%2520View%2520Planning%2520on%2520CPU%26entry.906535625%3DSoumya%2520Mazumdar%2520and%2520Vineet%2520Kumar%2520Rakesh%2520and%2520Tapas%2520Samanta%26entry.1292438233%3DKey%2520part%2520of%2520robotics%252C%2520augmented%2520reality%252C%2520and%2520digital%2520inspection%2520is%2520dense%25203D%2520reconstruction%2520from%2520depth%2520observations.%2520Traditional%2520volumetric%2520fusion%2520techniques%252C%2520including%2520truncated%2520signed%2520distance%2520functions%2520%2528TSDF%2529%252C%2520enable%2520efficient%2520and%2520deterministic%2520geometry%2520reconstruction%253B%2520however%252C%2520they%2520depend%2520on%2520heuristic%2520weighting%2520and%2520fail%2520to%2520transparently%2520convey%2520uncertainty%2520in%2520a%2520systematic%2520way.%2520Recent%2520neural%2520implicit%2520methods%252C%2520on%2520the%2520other%2520hand%252C%2520get%2520very%2520high%2520fidelity%2520but%2520usually%2520need%2520a%2520lot%2520of%2520GPU%2520power%2520for%2520optimization%2520and%2520aren%2527t%2520very%2520easy%2520to%2520understand%2520for%2520making%2520decisions%2520later%2520on.%2520This%2520work%2520presents%2520BayesFusion-SDF%252C%2520a%2520CPU-centric%2520probabilistic%2520signed%2520distance%2520fusion%2520framework%2520that%2520conceptualizes%2520geometry%2520as%2520a%2520sparse%2520Gaussian%2520random%2520field%2520with%2520a%2520defined%2520posterior%2520distribution%2520over%2520voxel%2520distances.%2520First%252C%2520a%2520rough%2520TSDF%2520reconstruction%2520is%2520used%2520to%2520create%2520an%2520adaptive%2520narrow-band%2520domain.%2520Then%252C%2520depth%2520observations%2520are%2520combined%2520using%2520a%2520heteroscedastic%2520Bayesian%2520formulation%2520that%2520is%2520solved%2520using%2520sparse%2520linear%2520algebra%2520and%2520preconditioned%2520conjugate%2520gradients.%2520Randomized%2520diagonal%2520estimators%2520are%2520a%2520quick%2520way%2520to%2520get%2520an%2520idea%2520of%2520posterior%2520uncertainty.%2520This%2520makes%2520it%2520possible%2520to%2520extract%2520surfaces%2520and%2520plan%2520the%2520next%2520best%2520view%2520while%2520taking%2520into%2520account%2520uncertainty.%2520Tests%2520on%2520a%2520controlled%2520ablation%2520scene%2520and%2520a%2520CO3D%2520object%2520sequence%2520show%2520that%2520the%2520new%2520method%2520is%2520more%2520accurate%2520geometrically%2520than%2520TSDF%2520baselines%2520and%2520gives%2520useful%2520estimates%2520of%2520uncertainty%2520for%2520active%2520sensing.%2520The%2520proposed%2520formulation%2520provides%2520a%2520clear%2520and%2520easy-to-use%2520alternative%2520to%2520GPU-heavy%2520neural%2520reconstruction%2520methods%2520while%2520still%2520being%2520able%2520to%2520be%2520understood%2520in%2520a%2520probabilistic%2520way%2520and%2520acting%2520in%2520a%2520predictable%2520way.%2520GitHub%253A%2520https%253A//mazumdarsoumya.github.io/BayesFusionSDF%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.19697v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=BayesFusion-SDF%3A%20Probabilistic%20Signed%20Distance%20Fusion%20with%20View%20Planning%20on%20CPU&entry.906535625=Soumya%20Mazumdar%20and%20Vineet%20Kumar%20Rakesh%20and%20Tapas%20Samanta&entry.1292438233=Key%20part%20of%20robotics%2C%20augmented%20reality%2C%20and%20digital%20inspection%20is%20dense%203D%20reconstruction%20from%20depth%20observations.%20Traditional%20volumetric%20fusion%20techniques%2C%20including%20truncated%20signed%20distance%20functions%20%28TSDF%29%2C%20enable%20efficient%20and%20deterministic%20geometry%20reconstruction%3B%20however%2C%20they%20depend%20on%20heuristic%20weighting%20and%20fail%20to%20transparently%20convey%20uncertainty%20in%20a%20systematic%20way.%20Recent%20neural%20implicit%20methods%2C%20on%20the%20other%20hand%2C%20get%20very%20high%20fidelity%20but%20usually%20need%20a%20lot%20of%20GPU%20power%20for%20optimization%20and%20aren%27t%20very%20easy%20to%20understand%20for%20making%20decisions%20later%20on.%20This%20work%20presents%20BayesFusion-SDF%2C%20a%20CPU-centric%20probabilistic%20signed%20distance%20fusion%20framework%20that%20conceptualizes%20geometry%20as%20a%20sparse%20Gaussian%20random%20field%20with%20a%20defined%20posterior%20distribution%20over%20voxel%20distances.%20First%2C%20a%20rough%20TSDF%20reconstruction%20is%20used%20to%20create%20an%20adaptive%20narrow-band%20domain.%20Then%2C%20depth%20observations%20are%20combined%20using%20a%20heteroscedastic%20Bayesian%20formulation%20that%20is%20solved%20using%20sparse%20linear%20algebra%20and% {"title": "Unsupervised Anomaly Detection in NSL-KDD Using $\u03b2$-VAE: A Latent Space and Reconstruction Error Approach", "author": "Dylan Baptiste and Ramla Saddem and Alexandre Philippot and Fran\u00e7ois Foyer", "abstract": "As Operational Technology increasingly integrates with Information Technology, the need for Intrusion Detection Systems becomes more important. This paper explores an unsupervised approach to anomaly detection in network traffic using $\u03b2$-Variational Autoencoders on the NSL-KDD dataset. We investigate two methods: leveraging the latent space structure by measuring distances from test samples to the training data projections, and using the reconstruction error as a conventional anomaly detection metric. By comparing these approaches, we provide insights into their respective advantages and limitations in an unsupervised setting. Experimental results highlight the effectiveness of latent space exploitation for classification tasks.", "link": "http://arxiv.org/abs/2602.19785v1", "date": "2026-02-23", "relevancy": 2.4454, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5094}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4811}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4767}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unsupervised%20Anomaly%20Detection%20in%20NSL-KDD%20Using%20%24%CE%B2%24-VAE%3A%20A%20Latent%20Space%20and%20Reconstruction%20Error%20Approach&body=Title%3A%20Unsupervised%20Anomaly%20Detection%20in%20NSL-KDD%20Using%20%24%CE%B2%24-VAE%3A%20A%20Latent%20Space%20and%20Reconstruction%20Error%20Approach%0AAuthor%3A%20Dylan%20Baptiste 20NSL-KDD%2520dataset.%2520We%2520investigate%2520two%2520methods%253A%2520leveraging%2520the%2520latent%2520space%2520structure%2520by%2520measuring%2520distances%2520from%2520test%2520samples%2520to%2520the%2520training%2520data%2520projections%252C%2520and%2520using%2520the%2520reconstruction%2520error%2520as%2520a%2520conventional%2520anomaly%2520detection%2520metric.%2520By%2520comparing%2520these%2520approaches%252C%2520we%2520provide%2520insights%2520into%2520their%2520respective%2520advantages%2520and%2520limitations%2520in%2520an%2520unsupervised%2520setting.%2520Experimental%2520results%2520highlight%2520the%2520effectiveness%2520of%2520latent%2520space%2520exploitation%2520for%2520classification%2520tasks.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.19785v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Unsupervised%20Anomaly%20Detection%20in%20NSL-KDD%20Using%20%24%CE%B2%24-VAE%3A%20A%20Latent%20Space%20and%20Reconstruction%20Error%20Approach&entry.906535625=Dylan%20Baptiste%20and%20Ramla%20Saddem%20and%20Alexandre%20Philippot%20and%20Fran%C3%A7ois%20Foyer&entry.1292438233=As%20Operational%20Technology%20increasingly%20integrates%20with%20Information%20Technology%2C%20the%20need%20for%20Intrusion%20Detection%20Systems%20becomes%20more%20important.%20This%20paper%20explores%20an%20unsupervised%20approach%20to%20anomaly%20detection%20in%20network%20traffic%20using%20%24%CE%B2%24-Variational%20Autoencoders%20on%20the%20NSL-KDD%20dataset.%20We%20investigate%20two%20methods%3A%20leveraging%20the%20latent%20space%20structure%20by%20measuring%20distances%20from%20test%20samples%20to%20the%20training%20data%20projections%2C%20and%20using%20the%20reconstruction%20error%20as%20a%20conventional%20anomaly%20detection%20metric.%20By%20comparing%20these%20approaches%2C%20we%20provide%20insights%20into%20their%20respective%20advantages%20and%20limitations%20

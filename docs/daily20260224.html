{"title": "BigMaQ: A Big Macaque Motion and Animation Dataset Bridging Image and 3D Pose Representations", "author": "Lucas Martini and Alexander Lappe and Anna Bogn\u00e1r and Rufin Vogels and Martin A. Giese", "abstract": "The recognition of dynamic and social behavior in animals is fundamental for advancing ethology, ecology, medicine and neuroscience. Recent progress in deep learning has enabled automated behavior recognition from video, yet an accurate reconstruction of the three-dimensional (3D) pose and shape has not been integrated into this process. Especially for non-human primates, mesh-based tracking efforts lag behind those for other species, leaving pose descriptions restricted to sparse keypoints that are unable to fully capture the richness of action dynamics. To address this gap, we introduce the $\\textbf{Big Ma}$ca$\\textbf{Q}$ue 3D Motion and Animation Dataset ($\\texttt{BigMaQ}$), a large-scale dataset comprising more than 750 scenes of interacting rhesus macaques with detailed 3D pose descriptions. Extending previous surface-based animal tracking methods, we construct subject-specific textured avatars by adapting a high-quality macaque template mesh to individual monkeys. This allows us to provide pose descriptions that are more accurate than previous state-of-the-art surface-based animal tracking methods. From the original dataset, we derive BigMaQ500, an action recognition benchmark that links surface-based pose vectors to single frames across multiple individual monkeys. By pairing features extracted from established image and video encoders with and without our pose descriptors, we demonstrate substantial improvements in mean average precision (mAP) when pose information is included. With these contributions, $\\texttt{BigMaQ}$ establishes the first dataset that both integrates dynamic 3D pose-shape representations into the learning task of animal action recognition and provides a rich resource to advance the study of visual appearance, posture, and social interaction in non-human primates. The code and data are publicly available at https://martinivis.github.io/BigMaQ/ .", "link": "http://arxiv.org/abs/2602.19874v1", "date": "2026-02-23", "relevancy": 2.7941, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5834}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5681}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5249}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BigMaQ%3A%20A%20Big%20Macaque%20Motion%20and%20Animation%20Dataset%20Bridging%20Image%20and%203D%20Pose%20Representations&body=Title%3A%20BigMaQ%3A%20A%20Big%20Macaque%20Motion%20and%20Animation%20Dataset%20Bridging%20Image%20and%203D%20Pose%20Representations%0AAuthor%3A%20Lucas%20Martini%20and%20Alexander%20Lappe%20and%20Anna%20Bogn%C3%A1r%20and%20Rufin%20Vogels%20and%20Martin%20A.%20Giese%0AAbstract%3A%20The%20recognition%20of%20dynamic%20and%20social%20behavior%20in%20animals%20is%20fundamental%20for%20advancing%20ethology%2C%20ecology%2C%20medicine%20and%20neuroscience.%20Recent%20progress%20in%20deep%20learning%20has%20enabled%20automated%20behavior%20recognition%20from%20video%2C%20yet%20an%20accurate%20reconstruction%20of%20the%20three-dimensional%20%283D%29%20pose%20and%20shape%20has%20not%20been%20integrated%20into%20this%20process.%20Especially%20for%20non-human%20primates%2C%20mesh-based%20tracking%20efforts%20lag%20behind%20those%20for%20other%20species%2C%20leaving%20pose%20descriptions%20restricted%20to%20sparse%20keypoints%20that%20are%20unable%20to%20fully%20capture%20the%20richness%20of%20action%20dynamics.%20To%20address%20this%20gap%2C%20we%20introduce%20the%20%24%5Ctextbf%7BBig%20Ma%7D%24ca%24%5Ctextbf%7BQ%7D%24ue%203D%20Motion% {"title": "A Very Big Video Reasoning Suite", "author": "Maijunxian Wang and Ruisi Wang and Juyi Lin and Ran Ji and Thadd\u00e4us Wiedemer and Qingying Gao and Dezhi Luo and Yaoyao Qian and Lianyu Huang and Zelong Hong and Jiahui Ge and Qianli Ma and Hang He and Yifan Zhou and Lingzi Guo and Lantao Mei and Jiachen Li and Hanwen Xing and Tianqi Zhao and Fengyuan Yu and Weihang Xiao and Yizheng Jiao and Jianheng Hou and Danyang Zhang and Pengcheng Xu and Boyang Zhong and Zehong Zhao and Gaoyun Fang and John Kitaoka and Yile Xu and Hua Xu and Kenton Blacutt and Tin Nguyen and Siyuan Song and Haoran Sun and Shaoyue Wen and Linyang He and Runming Wang and Yanzhi Wang and Mengyue Yang and Ziqiao Ma and Rapha\u00ebl Milli\u00e8re and Freda Shi and Nuno Vasconcelos and Daniel Khashabi and Alan Yuille and Yilun Du and Ziming Liu and Bo Li and Dahua Lin and Ziwei Liu and Vikash Kumar and Yijiang Li and Lei Yang and Zhongang Cai and Hokin Deng", "abstract": "Rapid progress in video models has largely focused on visual quality, leaving their reasoning capabilities underexplored. Video reasoning grounds intelligence in spatiotemporally consistent visual environments that go beyond what text can naturally capture, enabling intuitive reasoning over spatiotemporal structure such as continuity, interaction, and causality. However, systematically studying video reasoning and its scaling behavior is hindered by the lack of large-scale training data. To address this gap, we introduce the Very Big Video Reasoning (VBVR) Dataset, an unprecedentedly large-scale resource spanning 200 curated reasoning tasks following a principled taxonomy and over one million video clips, approximately three orders of magnitude larger than existing datasets. We further present VBVR-Bench, a verifiable evaluation framework that moves beyond model-based judging by incorporating rule-based, human-aligned scorers, enabling reproducible and interpretable diagnosis of video reasoning capabilities. Leveraging the VBVR suite, we conduct one of the first large-scale scaling studies of video reasoning and observe early signs of emergent generalization to unseen reasoning tasks. Together, VBVR lays a foundation for the next stage of research in generalizable video reasoning. The data, benchmark toolkit, and models are publicly available at https://video-reason.com/ .", "link": "http://arxiv.org/abs/2602.20159v1", "date": "2026-02-23", "relevancy": 2.7937, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5678}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5678}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5406}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Very%20Big%20Video%20Reasoning%20Suite&body=Title%3A%20A%20Very%20Big%20Video%20Reasoning%20Suite%0AAuthor%3A%20Maijunxian%20Wang%20and%20Ruisi%20Wang%20and%20Juyi%20Lin%20and%20Ran%20Ji%20and%20Thadd%C3%A4us%20Wiedemer%20and%20Qingying%20Gao%20and%20Dezhi%20Luo%20and%20Yaoyao%20Qian%20and%20Lianyu%20Huang%20and%20Zelong%20Hong%20and%20Jiahui%20Ge%20and%20Qianli%20Ma%20and%20Hang%20He%20and%20Yifan%20Zhou%20and%20Lingzi%20Guo%20and%20Lantao%20Mei%20and%20Jiachen%20Li%20and%20Hanwen%20Xing%20and%20Tianqi%20Zhao%20and%20Fengyuan%20Yu%20and%20Weihang%20Xiao%20and%20Yizheng%20Jiao%20and%20Jianheng%20Hou%20and%20Danyang%20Zhang%20and%20Pengcheng%20Xu%20and%20Boyang%20Zhong%20and%20Zehong%20Zhao%20and%20Gaoyun%20Fang%20and%20John%20Kitaoka%20and%20Yile%20Xu%20and%20Hua%20Xu%20and%20Kenton%20Blacutt%20and%20Tin%20Nguyen%20and%20Siyuan%20Song%20and%20Haoran%20Sun%20and%20Shaoyue%20Wen%20and%20Linyang%20He%20and%20Runming%20Wang%20and%20Yanzhi%20Wang%20and%20Mengyue%20Yang%20and%20Ziqiao%20Ma%20and%20Rapha%C3%ABl%20Milli%C3%A8re%20and%20Freda%20Shi%20and%20Nuno%20Vasconcelos%20and%20Daniel%20Khashabi%20and%20Alan%20Yuille%20and%20Yilun%20Du%20and%20Ziming%20Liu%20and%20Bo%20Li%20and%20Dahua%20Lin%20and%20Ziwei%20Liu%20and%20Vikash%20Kumar%20and%20Yijiang%20Li%20and%20Lei%20Yang%20and%20Zhongang%20Cai%20and%20Hokin%20Deng%0AAbstract%3A%20Rapid%20progress%20in%20video%20models%20has%20largely%20focused%20on%20visual%20quality%2C%20leaving%20their%20reasoning%20capabilities%20underexplored.%20Video%20reasoning%20grounds%20intelligence%20in%20spatiotemporally%20consistent%20visual%20environments%20that%20go%20beyond%20what%20text%20can%20naturally%20capture%2C%20enabling%20intuitive%20reasoning%20over%20spatiotemporal%20structure%20such%20as%20continuity%2C%20interaction%2C%20and%20causality.%20However%2C%20systematically%20studying%20video%20reasoning%20and%20its%20scaling%20behavior%20is%20hindered%20by%20the%20lack%20of%20large-scale%20training%20data.%20To%20address%20this%20gap%2C%20we%20introduce%20the%20Very%20Big%20Video%20Reasoning%20%28VBVR%29%20Dataset%2C%20an%20unprecedentedly%20large-scale%20resource%20spanning%20200%20curated%20reasoning%20tasks%20following%20a%20principled%20taxonomy%20and%20over%20one%20million%20video%20clips%2C%20approximately%20three%20orders%20of%20magnitude%20larger%20than%20existing%20datasets.%20We%20further%20present%20VBVR-Bench%2C%20a%20verifiable%20evaluation%20framework%20that%20moves%20beyond%20model-based%20judging%20by%20incorporating%20rule-based%2C%20human-aligned%20scorers%2C%20enabling%20reproducible%20and%20interpretable%20diagnosis%20of%20video%20reasoning%20capabilities.%20Leveraging%20the%20VBVR%20suite%2C%20we%20conduct%20one%20of%20the%20first%20large-scale%20scaling%20studies%20of%20video%20reasoning%20and%20observe%20early%20signs%20of%20emergent%20generalization%20to%20unseen%20reasoning%20tasks.%20Together%2C%20VBVR%20lays%20a%20foundation%20for%20the%20next%20stage%20of%20researc {"title": "Discover, Segment, and Select: A Progressive Mechanism for Zero-shot Camouflaged Object Segmentation", "author": "Yilong Yang and Jianxin Tian and Shengchuan Zhang and Liujuan Cao", "abstract": "Current zero-shot Camouflaged Object Segmentation methods typically employ a two-stage pipeline (discover-then-segment): using MLLMs to obtain visual prompts, followed by SAM segmentation. However, relying solely on MLLMs for camouflaged object discovery often leads to inaccurate localization, false positives, and missed detections. To address these issues, we propose the \\textbf{D}iscover-\\textbf{S}egment-\\textbf{S}elect (\\textbf{DSS}) mechanism, a progressive framework designed to refine segmentation step by step. The proposed method contains a Feature-coherent Object Discovery (FOD) module that leverages visual features to generate diverse object proposals, a segmentation module that refines these proposals through SAM segmentation, and a Semantic-driven Mask Selection (SMS) module that employs MLLMs to evaluate and select the optimal segmentation mask from multiple candidates. Without requiring any training or supervision, DSS achieves state-of-the-art performance on multiple COS benchmarks, especially in multiple-instance scenes.", "link": "http://arxiv.org/abs/2602.19944v1", "date": "2026-02-23", "relevancy": 2.7936, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.561}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.561}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5541}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Discover%2C%20Segment%2C%20and%20Select%3A%20A%20Progressive%20Mechanism%20for%20Zero-shot%20Camouflaged%20Object%20Segmentation&body=Title%3A%20Discover%2C%20Segment%2C%20and%20Select%3A%20A%20Progressive%20Mechanism%20for%20Zero-shot%20Camouflaged%20Object%20Segmentation%0AAuthor%3A%20Yilong%20Yang%20and%20Jianxin%20Tian%20and%20Shengchuan%20Zhang%20and%20Liujuan%20Cao%0AAbstract%3A%20Current%20zero-shot%20Camouflaged%20Object%20Segmentation%20methods%20typically%20employ%20a%20two-stage%20pipeline%20%28discover-then-segment%29%3A%20using%20MLLMs%20to%20obtain%20visual%20prompts%2C%20followed%20by%20SAM%20segmentation.%20However%2C%20relying%20solely%20on%20MLLMs%20for%20camouflaged%20object%20discovery%20often%20leads%20to%20inaccurate%20localization%2C%20false%20positives%2C%20and%20missed%20detections.%20To%20address%20these%20issues%2C%20we%20propose%20the%20%5Ctextbf%7BD%7Discover-%5Ctextbf%7BS%7Degment-%5Ctextbf%7BS%7Delect%20%28%5Ctextbf%7BDSS%7D%29%20mechanism%2C%20a%20progressive%20framework%20designed%20to%20refine%20segmentation%20step%20by%20step.%20The%20proposed%20method%20contains%20a%20Feature-coherent%20Object%20Discovery%20%28FOD%29%20module%20that%20leverages%20visual%20features%20to%20generate%20diverse%20object%20proposals%2C%20a%20segmentation%20module%20that%20refines%20these%20proposals%20through%20SAM%20segmentation%2C%20and%20a%20Semantic-driven%20Mask%20Selection%20%28SMS%29%20module%20that%20employs%20MLLMs%20to%20evaluate%20and%20select%20the%20optimal%20segmentation%20mask%20from%20multiple%20candidates.%20Without%20requiring%20any%20training%20or%20supervision%2C%20DSS%20achieves%20state-of-the-art%20performance%20on%20multiple%20COS%20benchmarks%2C%20especially%20in%20multiple-instance%20scenes.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19944v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDiscover%252C%2520Segment%252C%2520and%2520Select%253A%2520A%2520Progressive%2520Mechanism%2520for%2520Zero-shot%2520Cam 1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Discover%2C%20Segment%2C%20and%20Select%3A%20A%20Progressive%20Mechanism%20for%20Zero-shot%20Camouflaged%20Object%20Segmentation&entry.906535625=Yilong%20Yang%20and%20Jianxin%20Tian%20and%20Shengchuan%20Zhang%20and%20Liujuan%20Cao&entry.1292438233=Current%20zero-shot%20Camouflaged%20Object%20Segmentation%20methods%20typically%20employ%20a%20two-stage%20pipeline%20%28discover-then-segment%29%3A%20using%20MLLMs%20to%20obtain%20visual%20prompts%2C%20followed%20by%20SAM%20segmentation.%20However%2C%20relying%20solely%20on%20MLLMs%20for%20camouflaged%20object%20discovery%20often%20leads%20to%20inaccurate%20localization%2C%20false%20positives%2C%20and%20missed%20detections.%20To%20address%20these%20issues%2C%20we%20propose%20the%20%5Ctextbf%7BD%7Discover-%5Ctextbf%7BS%7Degment-%5Ctextbf%7BS%7Delect%20%28%5Ctextbf%7BDSS%7D%29%20mechanism%2C%20a%20progressive%20framework%20designed%20to%20refine%20segmentation%20step%20by%20step.%20The%20proposed%20method%20contains%20a%20Feature-coherent%20Object%20Discovery%20%28FOD%29%20module%20that%20leverages%20visual%20features%20to%20generate%20diverse%20object%20proposals%2C%20a%20segmentation%20module%20that%20refines%20these%20proposals%20through%20SAM%20segmentation%2C%20and%20a%20Semantic-driven%20Mask%20Selection%20%28SMS%29%20module%20that%20employs%20MLLMs%20to%20evaluate%20and%20select%20the%20optimal%20segmentation%20mask%20from%20multiple%20candidates.%20Without%20requiring%20any%20training%20or%20supervision%2C%20DSS%20achieves%20state-of-the-art%20performance%20on%20multiple%20COS%20benchmarks%2C%20especially%20in%20multiple-instance%20scenes.&entry.1838667208=http%3A//arxiv.org/abs/2602.19944v1&entry.124074799=Read"},
{"title": "VGGT-MPR: VGGT-Enhanced Multimodal Place Recognition in Autonomous Driving Environments", "author": "Jingyi Xu and Zhangshuo Qi and Zhongmiao Yan and Xuyu Gao and Qianyun Jiao and Songpengcheng Xia and Xieyuanli Chen and Ling Pei", "abstract": "In autonomous driving, robust place recognition is critical for global localization and loop closure detection. While inter-modality fusion of camera and LiDAR data in multimodal place recognition (MPR) has shown promise in overcoming the limitations of unimodal counterparts, existing MPR methods basically attend to hand-crafted fusion strategies and heavily parameterized backbones that require costly retraining. To address this, we propose VGGT-MPR, a multimodal place recognition framework that adopts the Visual Geometry Grounded Transformer (VGGT) as a unified geometric engine for both global retrieval and re-ranking. In the global retrieval stage, VGGT extracts geometrically-rich visual embeddings through prior depth-aware and point map supervision, and densifies sparse LiDAR point clouds with predicted depth maps to improve structural representation. This enhances the discriminative ability of fused multimodal features and produces global descriptors for fast retrieval. Beyond global retrieval, we design a training-free re-ranking mechanism that exploits VGGT's cross-view keypoint-tracking capability. By combining mask-guided keypoint extraction with confidence-aware correspondence scoring, our proposed re-ranking mechanism effectively refines retrieval results without additional parameter optimization. Extensive experiments on large-scale autonomous driving benchmarks and our self-collected data demonstrate that VGGT-MPR achieves state-of-the-art performance, exhibiting strong robustness to severe environmental changes, viewpoint shifts, and occlusions. Our code and data will be made publicly available.", "link": "http://arxiv.org/abs/2602.19735v1", "date": "2026-02-23", "relevancy": 2.7886, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5679}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5561}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5491}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VGGT-MPR%3A%20VGGT-Enhanced%20Multimodal%20Place%20Recognition%20in%20Autonomous%20Driving%20Environments&body=Title%3A%20VGGT-MPR%3A%20VGGT-Enhanced%20Multimodal%20Place%20Recognition%20in%20Autonomous%20Driving%20Environments%0AAuthor%3A%20Jingyi%20Xu%20and%20Zhangshuo%20Qi%20and%20Zhongmiao%20Yan%20and%20Xuyu%20Gao%20and%20Qianyun%20Jiao%20and%20Songpengcheng%20Xia%20and%20Xieyuanli%20Chen%20and%20Ling%20Pei%0AAbstract%3A%20In%20autonomous%20driving%2C%20robust%20place%20recognition%20is%20critical%20for%20global%20localization%20and%20loop%20closure%20detection.%20While%20inter-modality%20fusion%20of%20camera%20and%20LiDAR%20data%20in%20multimodal%20place%20recognition%20%28MPR%29%20has%20shown%20promise%20in%20overcoming%20the%20limitations%20of%20unimodal%20counterparts%2C%20existing%20MPR%20methods%20basically%20attend%20to%20hand-crafted%20fusion%20strategies%20and%20heavily%20parameterized%20backbones%20that%20require%20costly%20retraining.%20To%20address%20this%2C%20we%20propose%20VGGT-MPR%2C%20a%20multimodal%20place%20recognition%20framework%20that%20adopts%20the%20Visual%20Geometry%20Grounded%20Transformer%20%28VGGT%29%20as%20a%20unified%20geometric%20engine%20for%20both%20global%20retrieval%20and%20re-ranking.%20In%20the%20global%20retrieval%20stage%2C%20VGGT%20extracts%20geometrically-rich%20visual%20embeddings%20through%20prior%20depth-aware%20and%20point%20map%20supervision%2C%20and%20densifies%20sparse%20LiDAR%20point%20clouds%20with%20predicted%20depth%20maps%20to%20improve%20structural%20representation.%20This%20enhances%20the%20discriminative%20ability%20of%20fused%20multimodal%20features%20and%20produces%20global%20descriptors%20for%20fast%20retrieval.%20Beyond%20global%20retrieval%2C%20we%20design%20a%20training-free%20re-ranking%20mechanism%20that%20exploits%20VGGT%27s%20cross-view%20keypoint-tracking%20capability.%20By%20combining%20mask-guided%20keypoint%20extraction%20with%20confidence-aware%20correspondence%20scoring%2C%20our%20proposed%20re-ranking%20mechanism%20effectively%20refines%20retrieval%20results%20without%20additional%20parameter%20optimization.%20Extensive%20experiments%20on%20large-scale%20autonomous%20driving%20benchmarks%20and%20our%20self-collected%20data%20demonstrate%20that%20VGGT-MPR%20achieves%20state-of-the-art%20performance%2C%20exhibiting%20strong%20robustness%20to%20severe%20environmental%20changes%2C%20viewpoint%20shifts%2C%20and%20occlusions.%20Our%20code%20and%20data%20will%20be%20made%20publicly%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19735v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVGGT-MPR%253A%2520VGGT-Enhanced%2520Multimodal%2520Place%2520Recognition%2520in%2520Autonomous%2520Driving%2520Environments%26entry.906535625%3DJingyi%2520Xu%2520and%2520Zhangshuo%2520Qi%2520and%2520Zhongmiao%2520Yan%2520and%2520Xuyu%2520Gao%2520and%2520Qianyun%2520Jiao%2520and%2520Songpengcheng%2520Xia%2520and%2520Xieyuanli%2520Chen%2520and%2520Ling%2520Pei%26entry.1292438233%3DIn%2520autonomous%2520driving%252C%2520robust%2520place%2520recognition%2520is%2520critical%2520for%2520global%2520localization%2520and%2520loop%2520closure%2520detection.%2520While%2520inter-modality%2520fusion%2520of%2520camera%2520and%2520LiDAR%2520data%2520in%2520multimodal%2520place%2520recognition%2520%2528MPR%2529%2520has%2520shown%2520promise%2520in%25 {"title": "ApET: Approximation-Error Guided Token Compression for Efficient VLMs", "author": "Qiankun Ma and Ziyao Zhang and Haofei Wang and Jie Chen and Zhen Song and Hairong Zheng", "abstract": "Recent Vision-Language Models (VLMs) have demonstrated remarkable multimodal understanding capabilities, yet the redundant visual tokens incur prohibitive computational overhead and degrade inference efficiency. Prior studies typically relies on [CLS] attention or text-vision cross-attention to identify and discard redundant visual tokens. Despite promising results, such solutions are prone to introduce positional bias and, more critically, are incompatible with efficient attention kernels such as FlashAttention, limiting their practical deployment for VLM acceleration. In this paper, we step away from attention dependencies and revisit visual token compression from an information-theoretic perspective, aiming to maximally preserve visual information without any attention involvement. We present ApET, an Approximation-Error guided Token compression framework. ApET first reconstructs the original visual tokens with a small set of basis tokens via linear approximation, then leverages the approximation error to identify and drop the least informative tokens. Extensive experiments across multiple VLMs and benchmarks demonstrate that ApET retains 95.2% of the original performance on image-understanding tasks and even attains 100.4% on video-understanding tasks, while compressing the token budgets by 88.9% and 87.5%, respectively. Thanks to its attention-free design, ApET seamlessly integrates with FlashAttention, enabling further inference acceleration and making VLM deployment more practical. Code is available at https://github.com/MaQianKun0/ApET.", "link": "http://arxiv.org/abs/2602.19870v1", "date": "2026-02-23", "relevancy": 2.7844, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5944}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5479}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5284}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ApET%3A%20Approximation-Error%20Guided%20Token%20Compression%20for%20Efficient%20VLMs&body=Title%3A%20ApET%3A%20Approximation-Error%20Guided%20Token%20Compression%20for%20Efficient%20VLMs%0AAuthor%3A%20Qiankun%20Ma%20and%20Ziyao%20Zhang%20and%20Haofei%20Wang%20and%20Jie%20Chen%20and%20Zhen%20Song%20and%20Hairong%20Zheng%0AAbstract%3A%20Recent%20Vision-Language%20Models%20%28VLMs%29%20have%20demonstrated%20remarkable%20multimodal%20understanding%20capabilities%2C%20yet%20the%20redundant%20visual%20tokens%20incur%20prohibitive%20computational%20overhead%20and%20degrade%20inference%20efficiency.%20Prior%20studies%20typically%20relies%20on%20%5BCLS%5D%20attention%20or%20text-vision%20cross-attention%20to%20identify%20and%20discard%20redundant%20visual%20tokens.%20Despite%20promising%20results%2C%20such%20solutions%20are%20prone%20to%20introduce%20positional%20bias%20and%2C%20more%20critically%2C%20are%20incompatible%20with%20efficient%20attention%20kernels%20such%20as%20FlashAttention%2C%20limiting%20their%20practical%20deployment%20for%20VLM%20acceleration.%20In%20this%20paper%2C%20we%20step%20away%20from%20attention%20dependencies%20and%20revisit%20visual%20token%20compression%20from%20an%20information-theoretic%20perspective%2C%20aiming%20to%20maximally%20preserve%20visual%20information%20without%20any%20attention%20involvement.%20We%20present%20ApET%2C%20an%20Approximation-Error%20guided%20Token%20compression%20framework.%20ApET%20first%20reconstructs%20the%20original%20visual%20tokens%20with%20a%20small%20set%20of%20basis%20tokens%20via%20linear%20approximation%2C%20then%20leverages%20the%20approximation%20error%20to%20identify%20and%20drop%20the%20least%20informative%20tokens.%20Extensive%20experiments%20across%20multiple%20VLMs%20and%20benchmarks%20demonstrate%20that%20ApET%20retains%2095.2%25%20of%20the%20original%20performance%20on%20image-understanding%20tasks%20and%20even%20attains%20100.4%25%20on%20video-understanding%20tasks%2C%20while%20compressing%20the%20token%20budgets%20by%2088.9%25%20and%2087.5%25%2C%20respectively.%20Thanks%20to%20its%20attention-free%20design%2C%20ApET%20seamlessly%20integrates%20with%20FlashAttention%2C%20enabling%20further%20inference%20acceleration%20and%20making%20VLM%20deployment%20more%20practical.%20Code%20is%20available%20at%20https%3A//github.com/MaQianKun0/ApET.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19870v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DApET%253A%2520Approximation-Error%2520Guided%2520Token%2520Compression%2520for%2520Efficient%2520VLMs%26entry.906535625%3DQiankun%2520Ma%2520and%2520Ziyao%2520Zhang%2520and%2520Haofei%2520Wang%2520and%2520Jie%2520Chen%2520and%2520Zhen%2520Song%2520and%2520Hairong%2520Zheng%26entry.1292438233%3DRecent%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520have%2520demonstrated%2520remarkable%2520multimodal%2520understanding%2520capabilities%252C%2520yet%2520the%2520redundant%2520visual%2520tokens%2520incur%2520prohibitive%2520computational%2520overhead%2520and%2520degrade%2520inference%2520efficiency.%2520Prior%2520studies%2520typically%2520relies%2520on%2520%255BCLS%255D%2520attention%2520or%2520text-vision%2520cross-attention%2520to%2520identify%2520and%2520discard%2520redundant%2520visual%2520tokens.%2520Despite%2520promising%2520results%252C%2520such%2520solutions%2520are%2520prone%2520to%2520introduce%2520positional%2520bias%2520and%252C%2520more%2520critically%252C%2520are%2520incompatible%2520with%2520efficient%2520attention%2520kernels%2520suc {"title": "Closing the gap in multimodal medical representation alignment", "author": "Eleonora Grassucci and Giordano Cicchetti and Danilo Comminiello", "abstract": "In multimodal learning, CLIP has emerged as the de-facto approach for mapping different modalities into a shared latent space by bringing semantically similar representations closer while pushing apart dissimilar ones. However, CLIP-based contrastive losses exhibit unintended behaviors that negatively impact true semantic alignment, leading to sparse and fragmented latent spaces. This phenomenon, known as the modality gap, has been partially mitigated for standard text and image pairs but remains unknown and unresolved in more complex multimodal settings, such as the medical domain. In this work, we study this phenomenon in the latter case, revealing that the modality gap is present also in medical alignment, and we propose a modality-agnostic framework that closes this gap, ensuring that semantically related representations are more aligned, regardless of their source modality. Our method enhances alignment between radiology images and clinical text, improving cross-modal retrieval and image captioning.", "link": "http://arxiv.org/abs/2602.20046v1", "date": "2026-02-23", "relevancy": 2.7746, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6278}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5319}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5051}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Closing%20the%20gap%20in%20multimodal%20medical%20representation%20alignment&body=Title%3A%20Closing%20the%20gap%20in%20multimodal%20medical%20represen {"title": "SEAL-pose: Enhancing 3D Human Pose Estimation via a Learned Loss for Structural Consistency", "author": "Yeonsung Kim and Junggeun Do and Seunguk Do and Sangmin Kim and Jaesik Park and Jay-Yoon Lee", "abstract": "3D human pose estimation (HPE) is characterized by intricate local and global dependencies among joints. Conventional supervised losses are limited in capturing these correlations because they treat each joint independently. Previous studies have attempted to promote structural consistency through manually designed priors or rule-based constraints; however, these approaches typically require manual specification and are often non-differentiable, limiting their use as end-to-end training objectives. We propose SEAL-pose, a data-driven framework in which a learnable loss-net trains a pose-net by evaluating structural plausibility. Rather than relying on hand-crafted priors, our joint-graph-based design enables the loss-net to learn complex structural dependencies directly from data. Extensive experiments on three 3D HPE benchmarks with eight backbones show that SEAL-pose reduces per-joint errors and improves pose plausibility compared with the corresponding backbones across all settings. Beyond improving each backbone, SEAL-pose also outperforms models with explicit structural constraints, despite not enforcing any such constraints. Finally, we analyze the relationship between the loss-net and structural consistency, and evaluate SEAL-pose in cross-dataset and in-the-wild settings.", "link": "http://arxiv.org/abs/2602.20051v1", "date": "2026-02-23", "relevancy": 2.7271, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5633}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5453}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5276}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SEAL-pose%3A%20Enhancing%203D%20Human%20Pose%20Estimation%20via%20a%20Learned%20Loss%20for%20Structural%20Consistency&body=Title%3A%20SEAL-pose%3A%20Enhancing%203D%20Human%20Pose%20Estimation%20via%20a%20Learned%20Loss%20for%20Structural%20Consistency%0AAuthor%3A%20Yeonsung%20Kim%20and%20Junggeun%20Do%20and%20Seunguk%20Do%20and%20Sangmin%20Kim%20and%20Jaesik%20Park%20and%20Jay-Yoon%20Lee%0AAbstract%3A%203D%20human%20pose%20estimation%20%28HPE%29%20is%20characterized%20by%20intricate%20local%20and%20global%20dependencies%20among%20joints.%20Conventional%20supervised%20losses%20are%20limited%20in%20capturing%20these%20correlations%20because%20they%20treat%20each%20joint%20independently.%20Previous%20studies%20have%20attempted%20to%20promote%20structural%20consistency%20through%20manually%20designed%20priors%20or%20rule-based%20constraints%3B%20however%2C%20these%20approaches%20typically%20require%20manual%20specification%20and%20are%20often%20non-differentiable%2C%20limiting%20their%20use%20as%20end-to-end%20training%20objectives.%20We%20propose%20SEAL-pose%2C%20a%20data-driven%20framework%20in%20which%20a%20learnable%20loss-net%20trains%20a%20pose-net%20by%20evaluating%20structural%20plausibility.%20Rather%20than%20relying%20on%20hand-crafted%20priors%2C%20our%20joint-graph-based%20design%20enables%20the%20loss-net%20to%20learn%20complex%20structural%20dependencies%20directly%20from%20data.%20Extensive%20experiments%20on%20three%203D%20HPE%20benchmarks%20with%20eight%20backbones%20show%20that%20SEAL-pose%20reduces%20per-joint%20errors%20and%20improves%20pose%20plausibility%20compared%20with%20the%20corresponding%20backbones%20across%20all%20settings.%20Beyond%20improving%20each%20backbone%2C%20SEAL-pose%20also%20outperforms%20models%20with%20explicit%20structural%20constraints%2C%20despite%20not%20enforcing%20any%20such%20constraints.%20Finally%2C%20we%20analyze%20the%20relationship%20between%20the%20loss-net%20and%20structural%20consistency%2C%20and%20evaluate%20SEAL-pose%20in%20cross-dataset%20and%20in-the-wild%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20051v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSEAL-pose%253A%2520Enhancing%25203D%2520Human%2520Pose%2520Estimation%2520via%2520a%2520Learned%2520Loss%2520for%2520Structural%2520Consistency%26entry.906535625%3DYeonsung%2520Kim%2520and%2520Junggeun%2520Do%2520and%2520Seunguk%2520Do%2520and%2520Sangmin%2520Kim%2520and%2520Jaesik%2520Park%2520and%2520Jay-Yoon%2520Lee%26entry.1292438233%3D3D%2520human%2520pose%2520estimation%2520%2528HPE%2529%2520is%2520characterized%2520by%2520intricate%2520local%2520and%2520global%2520dependencies%2520among%2520joints.%2520Conventional%2520supervised%2520losses%2520are%2520limited%2520in%2520capturing%2520these%2520correlations%2520because%2520they%2520treat%2520each%2520joint%2520independently.%2520Previous%2520studies%2520have%2520attempted%2520to%2520promote%2520structural%2520consistency%2520through%2520manually%2520designed%2520priors%2520or%2520rule-based%2520constraints%253B%2520however%252C%2520these%2520approaches%2520typically%2520require%2520manual%2520specification%2520and%2520are%2520often%2520non-differentiable%252C%2520limiting%2520their%2520use%2520as%2520end-to-end%2520training%2520objectives.%2520We%2520propose%2520SEAL-pose%252C%2520a%2520data-driven%2520framework%2520in%2520which%2520a%2520learnable%2520loss-net%2520trains%2520a%2520pose-net%2520by%2520evaluating%2520structural%2520plausibility.%2520Rather%2520than%2520relying%2520on%2520hand-crafted%2520priors%252C%2520our%2520joint-graph-based%2520design%2520enables%2520the%2520loss-net%2520to%2520learn%2520complex%2520structural%2520dependencies%2520directly%2520from%2520data.%2520Extensive%2520experiments%2520 %20by%20evaluating%20structural%20plausibility.%20Rather%20than%20relying%20on%20hand-crafted%20priors%2C%20our%20joint-graph-based%20design%20enables%20the%20loss-net%20to%20learn%20complex%20structural%20dependencies%20directly%20from%20data.%20Extensive%20experiments%20on%20three%203D%20HPE%20benchmarks%20with%20eight%20backbones%20show%20that%20SEAL-pose%20reduces%20per-joint%20errors%20and%20improves%20pose%20plausibility%20compared%20with%20the%20corresponding%20backbones%20across%20all%20settings.%20Beyond%20improving%20each%20backbone%2C%20SEAL-pose%20also%20outperforms%20models%20with%20explicit%20structural%20constraints%2C%20despite%20not%20enforcing%20any%20such%20constraints.%20Finally%2C%20we%20analyze%20the%20relationship%20between%20the%20loss-net%20and%20structural%20consistency%2C%20and%20evaluate%20SEAL-pose%20in%20cross-dataset%20and%20in-the-wild%20settings.&entry.1838667208=http%3A//arxiv.org/abs/2602.20051v1&entry.124074799=Read"},
{"title": "MathScape: Benchmarking Multimodal Large Language Models in Real-World Mathematical Contexts", "author": "Hao Liang and Linzhuang Sun and Minxuan Zhou and Zirong Chen and Meiyi Qiang and Mingan Lin and Tianpeng Li and Fan Yang and Zenan Zhou and Wentao Zhang", "abstract": "With the rapid progress of Multimodal LLMs, evaluating their mathematical reasoning capabilities has become an increasingly important research direction. In particular, visual-textual mathematical reasoning serves as a key indicator of an MLLM's ability to comprehend and solve complex, multi-step quantitative problems. While existing benchmarks such as MathVista and MathVerse have advanced the evaluation of multimodal math proficiency, they primarily rely on digitally rendered content and fall short in capturing the complexity of real-world scenarios. To bridge this gap, we introduce MathScape, a novel benchmark focused on assessing MLLMs' reasoning ability in realistic mathematical contexts. MathScape comprises 1,369 high-quality math problems paired with human-captured real-world images, closely reflecting the challenges encountered in practical educational settings. We conduct a thorough multi-dimensional evaluation across nine leading closed-source MLLMs, three open-source MLLMs with over 20 billion parameters, and seven smaller-scale MLLMs. Our results show that even state-of-the-art models struggle with real-world math tasks, lagging behind human performance, highlighting critical limitations in current model capabilities. Moreover, we find that strong performance on synthetic or digitally rendered images does not guarantee similar effectiveness on real-world tasks. This underscores the necessity of MathScape in the next stage of multimodal mathematical reasoning.", "link": "http://arxiv.org/abs/2408.07543v6", "date": "2026-02-23", "relevancy": 2.7191, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5528}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5528}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5259}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MathScape%3A%20Benchmarking%20Multimodal%20Large%20Language%20Models%20in%20Real-World%20Mathematical%20Contexts&body=Title%3A%20MathScape%3A%20Benchmarking%20Multimodal%20Large%20Language%20Models%20in%20Real-World%20Mathematical%20Contexts%0AAuthor%3A%20Hao%20Liang%20and%20Linzhuang%20Sun%20and%20Minxuan%20Zhou%20and%20Zirong%20Chen%20and%20Meiyi%20Qiang%20and%20Mingan%20Lin%20and%20Tianpeng%20Li%20and%20Fan%20Yang%20and%20Zenan%20Zhou%20and%20Wentao%20Zhang%0AAbstract%3A%20With%20the%20rapid%20progress%20of%20Multimodal%20LLMs%2C%20evaluating%20their%20mathematical%20reasoning%20capabilities%20has%20become%20an%20increasingly%20important%20research%20direction.%20In%20particular%2C%20visual-textual%20mathematical%20reasoning%20serves%20as%20a%20key%20indicator%20of%20an%20MLLM%27s%20ability%20to%20comprehend%20and%20solve%20complex%2C%20multi-step%20quantitative%20problems.%20While%20existing%20benchmarks%20such%20as%20MathVista%20and%20MathVerse%20have%20advanced%20the%20evaluation%20of%20multimodal%20math%20proficiency%2C%20they%20primarily%20rely%20on%20digitally%20rendered%20content%20and%20fall%20short%20in%20capturing%20the%20complexity%20of%20real-world%20scenarios.%20To%20bridge%20this%20gap%2C%20we%20introduce%20MathScape%2C%20a%20novel%20benchmark%20focused%20on%20assessing%20MLLMs%27%20reasoning%20ability%20in%20realistic%20mathematical%20contexts.%20MathScape%20comprises%201%2C369%20high-quality%20math%20problems%20paired%20with%20human-captured%20real-world%20images%2C%20closely%20reflecting%20the%20challenges%20encountered%20in%20practical%20educational%20settings.%20We%20conduct%20a%20thorough%20multi-dimensional%20evaluation%20across%20nine%20leading%20closed-source%20MLLMs%2C%20three%20open-source%20MLLMs%20with%20over%2020%20billion%20parameters%2C%20and%20seven%20smaller-scale%20MLLMs.%20Our%20results%20show%20that%20even%20state-of-the-art%20models%20struggle%20with%20real-world%20math%20tasks%2C%20lagging%20behind%20human%20performance%2C%20highlighting%20critical%20limitations%20in%20current%20model%20capabilities.%20Moreover%2C%20we%20find%20that%20strong%20performance%20on%20synthetic%20or%20digitally%20rendered%20images%20does%20not%20guarantee%20similar%20effectiveness%20on%20real-world%20tasks.%20This%20underscores%20the%20necessity%20of%20MathScape%20in%20the%20next%20stage%20of%20multimodal%20mathematical%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2408.07543v6%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMathScape%253A%2520Benchmarking%2520Multimodal%2520Large%2520Language%2520Models%2520in%2520Real-World%2520Mathematical%2520Contexts%26entry.906535625%3DHao%2520Liang%2520and%2520Linzhuang%2520Sun%2520and%2520Minxuan%2520Zhou%2520and%2520Zirong%2520Chen%2520and%2520Meiyi%2520Qiang%2520and%2520Mingan%2520Lin%2520and%2520Tianpeng%2520Li%2520and%2520Fan%2520Yang%2520and%2520Zenan%2520Zhou%2520and%2520Wentao%2520Zhang%26entry.1292438233%3DWith%2520the%2520rapid%2520progress%2520of%2520Multimodal%2520LLMs%252C%2520evaluating%2520their%2520mathematical%2520reasoning%2520capabilities%2520has%2520become%2520an%2520increasingly%2520important%2520research%2520direction.%2520In%2520particular%252C%2520visual-textual%2520mathematical%2520reasoning%2520serves%2520as%2520a%2520key%2520indicator%2520of%2520an%2520MLLM%2527s%2520ability%2520to%2520comprehend%2520and%2520solve%2520complex%252C%2520multi-step%2520quantitative%2520problems.%2520While%2520existing%2520benchmarks%2520such%2520as%2520MathVista%2 {"title": "SAGE: Spatial-visual Adaptive Graph Exploration for Efficient Visual Place Recognition", "author": "Shunpeng Chen and Changwei Wang and Rongtao Xu and Xingtian Pei and Yukun Song and Jinzhou Lin and Wenhao Xu and Jingyi Zhang and Li Guo and Shibiao Xu", "abstract": "Visual Place Recognition (VPR) requires robust retrieval of geotagged images despite large appearance, viewpoint, and environmental variation. Prior methods focus on descriptor fine-tuning or fixed sampling strategies yet neglect the dynamic interplay between spatial context and visual similarity during training. We present SAGE (Spatial-visual Adaptive Graph Exploration), a unified training pipeline that enhances granular spatial-visual discrimination by jointly improving local feature aggregation, organize samples during training, and hard sample mining. We introduce a lightweight Soft Probing module that learns residual weights from training data for patch descriptors before bilinear aggregation, boosting distinctive local cues. During training we reconstruct an online geo-visual graph that fuses geographic proximity and current visual similarity so that candidate neighborhoods reflect the evolving embedding landscape. To concentrate learning on the most informative place neighborhoods, we seed clusters from high-affinity anchors and iteratively expand them with a greedy weighted clique expansion sampler. Implemented with a frozen DINOv2 backbone and parameter-efficient fine-tuning, SAGE achieves SOTA across eight benchmarks. Notably, our method obtains 100% Recall@10 on SPED only using 4096D global descriptors. The code and model are available at https://github.com/chenshunpeng/SAGE.", "link": "http://arxiv.org/abs/2509.25723v3", "date": "2026-02-23", "relevancy": 2.714, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5639}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5322}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5322}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SAGE%3A%20Spatial-visual%20Adaptive%20Graph%20Exploration%20for%20Efficient%20Visual%20Place%20Recognition&body=Title%3A%20SAGE%3A%20Spatial-visual%20Adaptive%20Graph%20Exploration%20for%20Efficient%20Visual%20Place%20Recognition%0AAuthor%3A%20Shunpeng%20Chen%20and%20Changwei%20Wang%20and%20Rongtao%20Xu%20and%20Xingtian%20Pei%20and%20Yukun%20Song%20and%20Jinzhou%20Lin%20and%20Wenhao%20Xu%20and%20Jingyi%20Zhang%20and%20Li%20Guo%20and%20Shibiao%20Xu%0AAbstract%3A%20Visual%20Place%20Recognition%20%28VPR%29%20requires%20robust%20retrieval%20of%20geotagged%20images%20despite%20large%20appearance%2C%20viewpoint%2C%20and%20environmental%20variation.%20Prior%20methods%20focus%20on%20descriptor%20fine-tuning%20or%20fixed%20sampling%20strategies%20yet%20neglect%20the%20dynamic%20interplay%20between%20spatial%20context%20and%20visual%20similarity%20during%20training.%20We%20present%20SAGE%20%28Spatial-visual%20Adaptive%20Graph%20Exploration%29%2C%20a%20unified%20training%20pipeline%20that%20enhances%20granular%20spatial-visual%20discrimination%20by%20jointly%20improving%20local%20feature%20aggregation%2C%20organize%20samples%20during%20training%2C%20and%20hard%20sample%20mining.%20We%20introduce%20a%20lightweight%20Soft%20Probing%20module%20that%20learns%20residual%20weights%20from%20training%20data%20for%20patch%20descriptors%20before%20bilinear%20aggregation%2C%20boosting%20distinctive%20local%20cues.%20During%20training%20we%20reconstruct%20an%20online%20geo-visual%20graph%20that%20fuses%20geographic%20proximity%20and%20current%20visual%20similarity%20so%20that%20candidate%20neighborhoods%20reflect%20the%20evolving%20embedding%20landscape.%20To%20concentrate%20learning%20on%20the%20most%20informative%20place%20neighborhoods%2C%20we%20seed%20clusters%20from%20high-affinity%20anchors%20and%20iteratively%20expand%20them%20with%20a%20greedy%20weighted%20clique%20expansion%20sampler.%20Implemented%20with%20a%20frozen%20DINOv2%20backbone%20and%20parameter-efficient%20fine-tuning%2C%20SAGE%20achieves%20SOTA%20across%20eight%20benchmarks.%20Notably%2C%20our%20method%20obtains%20100%25%20Recall%4010%20on%20SPED%20only%20using%204096D%20global%20descriptors.%20The%20code%20and%20model%20are%20available%20at%20https%3A//github.com/chenshunpeng/SAGE.%0ALink%3A%20http%3A//arxiv.org/abs/2509.25723v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSAGE%253A%2520Spatial-visual%2520Adaptive%2520Graph%2520Exploration%2520for%2520Efficient%2520Visual%2520Place%2520Recognition%26entry.906535625%3DShunpeng%2520Chen%2520and%2520Changwei%2520Wang%2520and%2520Rongtao%2520Xu%2520and%2520Xingtian%2520Pei%2520and%2520Yukun%2520Song%2520and%2520Jinzhou%2520Lin%2520and%2520Wenhao%2520Xu%2520and%2520Jingyi%2520Zhang%2520and%2520Li%2520Guo%2520and%2520Shibiao%2520Xu%26entry.1292438233%3DVisual%2520Place%2520Recognition%2520%2528VPR%2529%2520requires%2520robust%2520retrieval%2520of%2520geotagged%2520images%2520despite%2520large%2520appearance%252C%2520viewpoint%252C%2520and%2520environmental%2520variation.%2520Prior%2520methods%2520focus%2520on%2520descriptor%2520fine-tuning%2520or%2520fixed%2520sampling%2520strategies%2520yet%2520neglect%2520the%2520dynamic%2520interplay%2520between%2520spatial%2520context%2520and%2520visual%2520similarity%2520during%2520training.%2520We%2520present%2520SAGE%2520%2528Spatial-visual%2520Adaptive%2520Graph%2520Exploration%2529%252C%2520a%2520unified%2520training%2520pipeline%2520that%2520enhances%2520granular%2520spatial-visual%2520discrimination%2520by%2520jointly%2520improving%2520local%2520feature%2520aggregation%252 {"title": "Learning Discriminative and Generalizable Anomaly Detector for Dynamic Graph with Limited Supervision", "author": "Yuxing Tian and Yiyan Qi and Fengran Mo and Weixu Zhang and Jian Guo and Jian-Yun Nie", "abstract": "Dynamic graph anomaly detection (DGAD) is critical for many real-world applications but remains challenging due to the scarcity of labeled anomalies. Existing methods are either unsupervised or semi-supervised: unsupervised methods avoid the need for labeled anomalies but often produce ambiguous boundary, whereas semi-supervised methods can overfit to the limited labeled anomalies and generalize poorly to unseen anomalies. To address this gap, we consider a largely underexplored problem in DGAD: learning a discriminative boundary from normal/unlabeled data, while leveraging limited labeled anomalies \\textbf{when available} without sacrificing generalization to unseen anomalies. To this end, we propose an effective, generalizable, and model-agnostic framework with three main components: (i) residual representation encoding that capture deviations between current interactions and their historical context, providing anomaly-relevant signals; (ii) a restriction loss that constrain the normal representations within an interval bounded by two co-centered hyperspheres, ensuring consistent scales while keeping anomalies separable; (iii) a bi-boundary optimization strategy that learns a discriminative and robust boundary using the normal log-likelihood distribution modeled by a normalizing flow. Extensive experiments demonstrate the superiority of our framework across diverse evaluation settings.", "link": "http://arxiv.org/abs/2602.20019v1", "date": "2026-02-23", "relevancy": 2.6768, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5419}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5391}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5251}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Discriminative%20and%20Generalizable%20Anomaly%20Detector%20for%20Dynamic%20Graph%20with%20Limited%20Supervision&body=Title%3A%20Learning%20Discriminative%20and%20Generalizable%20Anomaly%20Detector%20for%20Dynamic%20Graph%20with%20Limited%20Supervision%0AAuthor%3A%20Yuxing%20Tian%20and%20Yiyan%20Qi%20and%20Fengran%20Mo%20and%20Weixu%20Zhang%20and%20Jian%20Guo%20and%20Jian-Yun%20Nie%0AAbstract%3A%20Dynamic%20graph%20anomaly%20detection%20%28DGAD%29%20is%20critical%20for%20many%20real-world%20applications%20but%20remains%20challenging%20due%20to%20the%20scarcity%20of%20labeled%20anomalies.%20Existing%20methods%20are%20either%20unsupervised%20or%20semi-supervised%3A%20unsupervised%20methods%20avoid%20the%20need%20for%20labeled%20anomalies%20but%20often%20produce%20ambiguous%20boundary%2C%20whereas%20semi-supervised%20methods%20can%20overfit%20to%20the%20limited%20labeled%20anomalies%20and%20generalize%20poorly%20to%20unseen%20anomalies.%20To%20address%20this%20gap%2C%20we%20consider%20a%20largely%20underexplored%20problem%20in%20DGAD%3A%20learning%20a%20discriminative%20boundary%20from%20normal/unlabeled%20data%2C%20while%20leveraging%20limited%20labeled%20anomalies%20%5Ctextbf%7Bwhen%20available%7D%20without%20sacrificing%20generalization%20to%20unseen%20anomalies.%20To%20this%20end%2C%20we%20propose%20an%20effective%2C%20generalizable%2C%20and%20model-agnostic%20framework%20with%20three%20main%20components%3A%20%28i%29%20residual%20representation%20encoding%20that%20capture%20deviations%20between%20current%20interactions%20and%20their%20historical%20context%2C%20providing%20anomaly-relevant%20signals%3B%20%28ii%29%20a%20restriction%20loss%20that%20constrain%20the%20normal%20representations%20within%20an%20interval%20bounded%20by%20two%20co-centered%20hyperspheres%2C%20ensuring%20consistent%20scales%20while%20keeping%20anomalies%20separable%3B%20%28iii%29%20a%20bi-boundary%20optimization%20strategy%20that%20learns%20a%20discriminative%20and%20robust%20boundary%20using%20the%20normal%20log-likelihood%20distribution%20modeled%20by%20a%20normalizing%20flow.%20Extensive%20experiments%20demonstrate%20the%20superiority%20of%20our%20framework%20across%20diverse%20evaluation%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20019v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520Discriminative%2520and%2520Generalizable%2520Anomaly%2520Detector%2520for%2520Dynamic%2520Graph%2520with%2520Limited%2520Supervision%26entry.906535625%3DYuxing%2520Tian%2520and%2520Yiyan%2520Qi%2520and%2520Fengran%2520Mo%2520and%2520Weixu%2520Zhang%2520and%2520Jian%2520Guo%2520and%2520Jian-Yun%2520Nie%26entry.1292438233%3DDynamic%2520graph%2520anomaly%2520detection%2520%2528DGAD%2529%2520is%2520critical%2520for%2520many%2520real-world%2520applications%2520but%2520remains%2520challenging%2520due%2520to%2520the%2520scarcity%2520of%2520labeled%2520anomalies.%2520Existing%2520methods%2520are%2520either%2520unsupervised%2520or%2520semi-supervised%253A%2520unsupervised%2520methods%2520avoid%2520the%2520need%2520for%2520labeled%2520anomalies%2520but%2520often%2520produce%2520ambiguous%2520boundary%252C%2520whereas%2520semi-supervised%2520methods%2520can%2520overfit%2520to%2520the%2520limited%2520labeled%2520anomalies%2520and%2520generalize%2520poorly%2520to%2520unseen%2520anomalies.%2520To%2520address%2520this%2520gap%252C%2520we%2520consider%2520a%2520largely%2520underexplored%2520problem%2520in%2520DGAD%253A%2520learning%2520a%2520discriminative%2520boundary%2520from%2520normal/unlabeled%2520data%252C%2520while%2520leveraging%2520limited%2520labeled%2520anomalies%2520%255Ctextbf%257Bwhen% nsupervised%20methods%20avoid%20the%20need%20for%20labeled%20anomalies%20but%20often%20produce%20ambiguous%20boundary%2C%20whereas%20semi-supervised%20methods%20can%20overfit%20to%20the%20limited%20labeled%20anomalies%20and%20generalize%20poorly%20to%20unseen%20anomalies.%20To%20address%20this%20gap%2C%20we%20consider%20a%20largely%20underexplored%20problem%20in%20DGAD%3A%20learning%20a%20discriminative%20boundary%20from%20normal/unlabeled%20data%2C%20while%20leveraging%20limited%20labeled%20anomalies%20%5Ctextbf%7Bwhen%20available%7D%20without%20sacrificing%20generalization%20to%20unseen%20anomalies.%20To%20this%20end%2C%20we%20propose%20an%20effective%2C%20generalizable%2C%20and%20model-agnostic%20framework%20with%20three%20main%20components%3A%20%28i%29%20residual%20representation%20encoding%20that%20capture%20deviations%20between%20current%20interactions%20and%20their%20historical%20context%2C%20providing%20anomaly-relevant%20signals%3B%20%28ii%29%20a%20restriction%20loss%20that%20constrain%20the%20normal%20representations%20within%20an%20interval%20bounded%20by%20two%20co-centered%20hyperspheres%2C%20ensuring%20consistent%20scales%20while%20keeping%20anomalies%20separable%3B%20%28iii%29%20a%20bi-boundary%20optimization%20strategy%20that%20learns%20a%20discriminative%20and%20robust%20boundary%20using%20the%20normal%20log-likelihood%20distribution%20modeled%20by%20a%20normalizing%20flow.%20Extensive%20experiments%20demonstrate%20the%20superiority%20of%20our%20framework%20across%20diverse%20evaluation%20settings.&entry.1838667208=http%3A//arxiv.org/abs/2602.20019v1&entry.124074799=Read"},
{"title": "Monocular Mesh Recovery and Body Measurement of Female Saanen Goats", "author": "Bo Jin and Shichao Zhao and Jin Lyu and Bin Zhang and Tao Yu and Liang An and Yebin Liu and Meili Wang", "abstract": "The lactation performance of Saanen dairy goats, renowned for their high milk yield, is intrinsically linked to their body size, making accurate 3D body measurement essential for assessing milk production potential, yet existing reconstruction methods lack goat-specific authentic 3D data. To address this limitation, we establish the FemaleSaanenGoat dataset containing synchronized eight-view RGBD videos of 55 female Saanen goats (6-18 months). Using multi-view DynamicFusion, we fuse noisy, non-rigid point cloud sequences into high-fidelity 3D scans, overcoming challenges from irregular surfaces and rapid movement. Based on these scans, we develop SaanenGoat, a parametric 3D shape model specifically designed for female Saanen goats. This model features a refined template with 41 skeletal joints and enhanced udder representation, registered with our scan data. A comprehensive shape space constructed from 48 goats enables precise representation of diverse individual variations. With the help of SaanenGoat model, we get high-precision 3D reconstruction from single-view RGBD input, and achieve automated measurement of six critical body dimensions: body length, height, chest width, chest girth, hip width, and hip height. Experimental results demonstrate the superior accuracy of our method in both 3D reconstruction and body measurement, presenting a novel paradigm for large-scale 3D vision applications in precision livestock farming.", "link": "http://arxiv.org/abs/2602.19896v1", "date": "2026-02-23", "relevancy": 2.6768, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5707}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from M {"title": "Multi-Modal Representation Learning via Semi-Supervised Rate Reduction for Generalized Category Discovery", "author": "Wei He and Xianghan Meng and Zhiyuan Huang and Xianbiao Qi and Rong Xiao and Chun-Guang Li", "abstract": "Generalized Category Discovery (GCD) aims to identify both known and unknown categories, with only partial labels given for the known categories, posing a challenging open-set recognition problem. State-of-the-art approaches for GCD task are usually built on multi-modality representation learning, which is heavily dependent upon inter-modality alignment. However, few of them cast a proper intra-modality alignment to generate a desired underlying structure of representation distributions. In this paper, we propose a novel and effective multi-modal representation learning framework for GCD via Semi-Supervised Rate Reduction, called SSR$^2$-GCD, to learn cross-modality representations with desired structural properties based on emphasizing to properly align intra-modality relationships. Moreover, to boost knowledge transfer, we integrate prompt candidates by leveraging the inter-modal alignment offered by Vision Language Models. We conduct extensive experiments on generic and fine-grained benchmark datasets demonstrating superior performance of our approach.", "link": "http://arxiv.org/abs/2602.19910v1", "date": "2026-02-23", "relevancy": 2.6651, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5646}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5273}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5071}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multi-Modal%20Representation%20Learning%20via% {"title": "Closing the Gap Between Text and Speech Understanding in LLMs", "author": "Santiago Cuervo and Skyler Seto and Maureen de Seyssel and Richard He Bai and Zijin Gu and Tatiana Likhomanenko and Navdeep Jaitly and Zakaria Aldeneh", "abstract": "Large Language Models (LLMs) can be adapted to extend their text capabilities to speech inputs. However, these speech-adapted LLMs consistently underperform their text-based counterparts--and even cascaded pipelines--on language understanding tasks. We term this shortfall the text-speech understanding gap: the performance drop observed when a speech-adapted LLM processes spoken inputs relative to when the original text-based LLM processes the equivalent text. Recent approaches to narrowing this gap either rely on large-scale speech synthesis of text corpora, which is costly and heavily dependent on synthetic data, or on large-scale proprietary speech datasets, which are not reproducible. As a result, there remains a need for more data-efficient alternatives for closing the text-speech understanding gap. In this work, we analyze the gap as driven by two factors: (i) forgetting of text capabilities during adaptation, and (ii) cross-modal misalignment between speech and text. Based on this analysis, we introduce SALAD--Sample-efficient Alignment with Learning through Active selection and cross-modal Distillation--which combines cross-modal distillation with targeted synthetic data to improve alignment while mitigating forgetting. Applied to 3B and 7B LLMs, SALAD achieves competitive performance with a strong open-weight model across broad-domain benchmarks in knowledge, language understanding, and reasoning, while training on over an order of magnitude less speech data from public corpora.", "link": "http://arxiv.org/abs/2510.13632v2", "date": "2026-02-23", "relevancy": 2.6552, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": {"title": "Do Large Language Models Understand Data Visualization Principles?", "author": "Martin Sinnona and Valentin Bonas and Viviana Siless and Emmanuel Iarussi", "abstract": "Data visualization principles, derived from decades of research in design and perception, ensure proper visual communication. While prior work has shown that large language models (LLMs) can generate charts or flag misleading figures, it remains unclear whether they and their vision-language counterparts (VLMs) can reason about and enforce visualization principles directly. Constraint based systems encode these principles as logical rules for precise automated checks, but translating them into formal specifications demands expert knowledge. This motivates leveraging LLMs and VLMs as principle checkers that can reason about visual design directly, bypassing the need for symbolic rule specification. In this paper, we present the first systematic evaluation of both LLMs and VLMs on their ability to reason about visualization principles, using hard verification ground truth derived from Answer Set Programming (ASP). We compiled a set of visualization principles expressed as natural-language statements and generated a controlled dataset of approximately 2,000 Vega-Lite specifications annotated with explicit principle violations, complemented by over 300 real-world Vega-Lite charts. We evaluated both checking and fixing tasks, assessing how well models detect principle violations and correct flawed chart specifications. Our work highlights both the promise of large (vision-)language models as flexible validators and editors of visualization designs and the persistent gap with symbolic solvers on more nuanced aspects of visual perception. They also reveal an interesting asymmetry: frontier models tend to be more effective at correcting violations than at detecting them reliably.", "link": "http://arxiv.org/abs/2602.20084v1", "date": "2026-02-23", "relevancy": 2.6498, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5542}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5542}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4816}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Do%20Large%20Language%20Models%20Understand%20Data%20Visualization%20Principles%3F&body=Title%3A%20Do%20Large%20Language%20Models%20Understand%20Data%20Visualization%20Principles%3F%0AAuthor%3A%20Martin%20Sinnona%20and%20Valentin%20Bonas%20and%20Viviana%20Siless%20and%20Emmanuel%20Iarussi%0AAbstract%3A%20Data%20visualization%20principles%2C%20derived%20from%20decades%20of%20research%20in%20design%20and%20perception%2C%20ensure%20proper%20visual%20communication.%20While%20prior%20work%20has%20shown%20that%20large%20language%20models%20%28LLMs%29%20can%20generate%20charts%20or%20flag%20misleading%20figures%2C%20it%20remains%20unclear%20whether%20they%20and%20their%20vision-language%20counterparts%20%28VLMs%29%20can%20reason%20about%20and%20enforce%20visualization%20principles%20directly.%20Constraint%20based%20systems%20encode%20these%20principles%20as%20logical%20rules%20for%20precise%20automated%20checks%2C%20but%20translating%20them%20into%20formal%20specifications%20demands%20expert%20knowledge.%20This%20motivates%20leveraging%20LLMs%20and%20VLMs%20as%20principle%20checkers%20that%20can%20reason%20about%20visual%20design%20directly%2C%20bypassing%20the%20need%20for%20symbolic%20rule%20specification.%20In%20this%20paper%2C%20we%20present%20the%20first%20systematic%20evaluation%20of%20both%20LLMs%20and%20VLMs%20on%20their%20ability%20to%20reason%20about%20visualization%20principles%2C%20using%20hard%20verification%20ground%20truth%20derived%20from%20Answer%20Set%20Programming%20%28ASP%29.%20We%20compiled%20a%20set%20of%20visualization%20principles%20expressed%20as%20natural-language%20statements%20and%20generated%20a%20controlled%20dataset%20of%20approximately%202%2C000%20Vega-Lite%20specifications%20annotated%20with%20explicit%20principle%20violations%2C%20complemented%20by%20over%20300%20real-world%20Vega-Lite%20charts.%20We%20evaluated%20both%20checking%20and%20fixing%20tasks%2C%20assessing%20how%20well%20models%20detect%20principle%20violations%20and%20correct%20flawed%20chart%20specifications.%20Our%20work%20highlights%20both%20the%20promise%20of%20large%20%28vision-%29language%20models%20as%20flexible%20validators%20and%20editors%20of%20visualization%20designs%20and%20the%20persistent%20gap%20with%20symbolic%20solvers%20on%20more%20nuanced%20aspects%20of%20visual%20perception.%20They%20also%20reveal%20an%20interesting%20asymmetry%3A%20frontier%20models%20tend%20to%20be%20more%20effective%20at%20correcting%20violations%20than%20at%20detecting%20them%20reliably.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20084v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDo%2520Large%2520Language%2520Models%2520Understand%2520Data%2520Visualization%2520Principles%253F%26entry.906535625%3DMartin%2520Sinnona%2520and%2520Valentin%2520Bonas%2520and%2520Viviana%2520Siless%2520and%2520Emmanuel%2520Iarussi%26entry.1292438233%3DData%2520visualization%2520principles%252C%2520derived%2520from%2520decades%2520of%2520research%2520in%2520design%2520and%2520perception%252C%2520ensure%2520proper%2520visual%2520communication.%2520While%2520prior%2520work%2520has%2520shown%2520that%2520large%2520language%2520models%2520%2528LLMs%2529%2520can%2520generate%2520charts%2520or%2520flag%2520misleading%2520figures%252C%2520it%2520rema lvers%2520on%2520more%2520nuanced%2520aspects%2520of%2520visual%2520perception.%2520They%2520also%2520reveal%2520an%2520interesting%2520asymmetry%253A%2520frontier%2520models%2520tend%2520to%2520be%2520more%2520effective%2520at%2520correcting%2520violations%2520than%2520at%2520detecting%2520them%2520reliably.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.20084v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Do%20Large%20Language%20Models%20Understand%20Data%20Visualization%20Principles%3F&entry.906535625=Martin%20Sinnona%20and%20Valentin%20Bonas%20and%20Viviana%20Siless%20and%20Emmanuel%20Iarussi&entry.1292438233=Data%20visualization%20principles%2C%20derived%20from%20decades%20of%20research%20in%20design%20and%20perception%2C%20ensure%20proper%20visual%20communication.%20While%20prior%20work%20has%20shown%20that%20large%20language%20models%20%28LLMs%29%20can%20generate%20charts%20or%20flag%20misleading%20figures%2C%20it%20remains%20unclear%20whether%20they%20and%20their%20vision-language%20counterparts%20%28VLMs%29%20can%20reason%20about%20and%20enforce%20visualization%20principles%20directly.%20Constraint%20based%20systems%20encode%20these%20principles%20as%20logical%20rules%20for%20precise%20automated%20checks%2C%20but%20translating%20them%20into%20formal%20specifications%20demands%20expert%20knowledge.%20This%20motivates%20leveraging%20LLMs%20and%20VLMs%20as%20principle%20checkers%20that%20can%20reason%20about%20visual%20design%20directly%2C%20bypassing%20the%20need%20for%20symbolic%20rule%20specification.%20In%20this%20paper%2C%20we%20present%20the%20first%20systematic%20evaluation%20of%20both%20LLMs%20and%20VLMs%20on%20their%20ability%20to%20reason%20about%20visualization%20principles%2C%20using%20hard%20verification%20ground%20truth%20derived%20from%20Answer%20Set%20Programming%20%28ASP%29.%20We%20compiled%20a%20set%20of%20visualization%20principles {"title": "Modulate and Reconstruct: Learning Hyperspectral Imaging from Misaligned Smartphone Views", "author": "Daniil Reutsky and Daniil Vladimirov and Yasin Mamedov and Georgy Perevozchikov and Nancy Mehta and Egor Ershov and Radu Timofte", "abstract": "Hyperspectral reconstruction (HSR) from RGB images is a highly promising direction for accurate color reproduction and material color measurement. While most existing approaches rely on a single RGB image - thereby limiting reconstruction accuracy - the majority of modern smartphones are equipped with two or more cameras. In this work, we propose a novel multi-image-to-hyperspectral reconstruction (MI-HSR) framework that leverages a triple-camera smartphone system, where two lenses are equipped with carefully selected spectral filters. Our easy-to-implement configuration, based on theoretical and empirical analysis, allows to obtain more complete and diverse spectral data than traditional single-chamber setups. To support this new paradigm, we introduce Doomer, the first dataset for MI-HSR, comprising aligned images from three smartphone cameras and a hyperspectral reference camera across diverse scenes. We further introduce a lightweight alignment module for MI-HSR that effectively fuses multi-view inputs while mitigating parallax- and occlusion-induced artifacts. Proposed module demonstrate consistent quality improvements for modern HSR methods. In a nutshell, our setup allows 30% more accurate estimations of spectra compared to an ordinary RGB camera, while the proposed alignment module boosts the reconstruction quality of SotA methods by an additional 5%. Our findings suggest that spectral filtering of multiple views with commodity hardware unlocks more accurate and practical hyperspectral imaging.", "link": "http://arxiv.org/abs/2507.01835v4", "date": "2026-02-23", "relevancy": 2.6405, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5434}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5205}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5205}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Modulate%20and%20Reconstruct%3A%20Learning%20Hyperspectral%20Imaging%20from%20Misaligned%20Smartphone%20Views&body=Title%3A%20Modulate%20and%20Reconstruct%3A%20Learning%20Hyperspectral%20Imaging%20from%20Misaligned%20Smartphone%20Views%0AAuthor%3A%20Daniil%20Reutsky%20and%20Daniil%20Vladimirov%20and%20Yasin%20Mamedov%20and%20Georgy%20Perevozchikov%20and%20Nancy%20Mehta%20and%20Egor%20Ershov%20and%20Radu%20Timofte%0AAbstract%3A%20Hyperspectral%20reconstruction%20%28HSR%29%20from%20RGB%20images%20is%20a%20highly%20promising%20direction%20for%20accurate%20color%20reproduction%20and%20material%20color%20measurement.%20While%20most%20existing%20approaches%20rely%20on%20a%20single%20RGB%20image%20-%20thereby%20limiting%20reconstruction%20accuracy%20-%20the%20majority%20of%20modern%20smartphones%20are%20equipped%20with%20two%20or%20more%20cameras.%20In%20this%20work%2C%20we%20propose%20a%20novel%20multi-image-to-hyperspectral%20reconstruction%20%28MI-HSR%29%20framework%20that%20leverages%20a%20triple-camera%20smartphone%20system%2C%20where%20two%20lenses%20are%20equipped%20with%20carefully%20selected%20spectral%20filters.%20Our%20easy-to-implement%20configuration%2C%20based%20on%20theoretical%20and%20empirical%20analysis%2C%20allows%20to%20obtain%20more%20complete%20and%20diverse%20spectral%20data%20than%20traditional%20single-chamber%20setups.%20To%20support%20this%20new%20paradigm%2C%20we%20introduce%20Doomer%2C%20the%20first%20dataset%20for%20MI-HSR%2C%20comprising%20aligned%20images%20from%20three%20smartphone%20cameras%20and%20a%20hyperspectral%20reference%20camera%20across%20diverse%20scenes.%20We%20further%20introduce%20a%20lightweight%20alignment%20module%20for%20MI-HSR%20that%20effectively%20fuses%20multi-view%20inputs%20while%20mitigating%20parallax-%20and%20occlusion-induced%20artifacts.%20Proposed%20module%20demonstrate%20consistent%20quality%20improvements%20for%20modern%20HSR%20methods.%20In%20a%20nutshell%2C%20our%20setup%20allows%2030%25%20more%20accurate%20estimations%20of%20spectra%20compared%20to%20an%20ordinary%20RGB%20camera%2C%20while%20the%20proposed%20alignment%20module%20boosts%20the%20reconstruction%20quality%20of%20SotA%20methods%20by%20an%20additional%205%25.%20Our%20findings%20suggest%20that%20spectral%20filtering%20of%20multiple%20views%20with%20commodity%20hardware%20unlocks%20more%20accurate%20and%20practical%20hyperspectral%20imaging.%0ALink%3A%20http%3A//arxiv.org/abs/2507.01835v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DModulate%2520and%2520Reconstruct%253A%2520Learning%2520Hyperspectral%2520Imaging%2520from%2520Misaligned%2520Smartphone%2520Views%26entry.906535625%3DDaniil%2520Reutsky%2520and%2520Daniil%2520Vladimirov%2520and%2520Yasin%2520Mamedov%2520and%2520Georgy%2520Perevozchikov%2520and%2520Nancy%2520Mehta%2520and%2520Egor%2520Ershov%2520and%2520Radu%2520Timofte%26entry.1292438233%3DHyperspectral%2520reconstruction%2520%2528HSR%2529%2520from%2520RGB%2520images%2520is%2520a%2520highly%2520promising%2520direction%2520for%2520accurate%2520color%2520reproduction%2520and%2520material%2520color%2520measurement.%2520While%2520most%2520existing%2520approaches%2520rely%2520on%2520a%2520single%2520RGB%2520image%2520-%2520thereby%2520limiting%2520reconstruction%2520accuracy%2520-%2520the%2520majority%2520of%2520modern%2520smartphones%2520are%2520equipped%2520with%2520two%2520or%2520more%2520cameras.%2520In%2520this%2520work%252C%2520we%2520propose%2520a%2520novel%2520multi-image-to-hyperspectral%2520reconstruction%2520%2528MI- {"title": "Meta-Learning and Meta-Reinforcement Learning - Tracing the Path towards DeepMind's Adaptive Agent", "author": "Bj\u00f6rn Hoppmann and Christoph Scholz", "abstract": "Humans are highly effective at utilizing prior knowledge to adapt to novel tasks, a capability that standard machine learning models struggle to replicate due to their reliance on task-specific training. Meta-learning overcomes this limitation by allowing models to acquire transferable knowledge from various tasks, enabling rapid adaptation to new challenges with minimal data. This survey provides a rigorous, task-based formalization of meta-learning and meta-reinforcement learning and uses that paradigm to chronicle the landmark algorithms that paved the way for DeepMind's Adaptive Agent, consolidating the essential concepts needed to understand the Adaptive Agent and other generalist approaches.", "link": "http://arxiv.org/abs/2602.19837v1", "date": "2026-02-23", "relevancy": 2.6391, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5582}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5197}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5056}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Meta-Learning%20and%20Meta-Reinforcement%20Learning%20-%20Tracing%20the%20Path%20towards%20DeepMind%27s%20Adaptive%20Agent&body=Title%3A%20Meta-Learning%20and%20Meta-Reinforcement%20Learning%20-%20Tracing%20the%20Path%20towards%20DeepMind%27s%20Adaptive%20Agent%0AAuthor%3A%20Bj%C3%B6rn%20Hoppmann%20and%20Christoph%20Scholz%0AAbstract%3A%20Humans%20are%20highly%20effective%20at%20utilizing%20prior%20knowledge%20to%20adapt%20to%20novel%20tasks%2C%20a%20capability%20that%20standard%20machine%20learning%20models%20struggle%20to%20

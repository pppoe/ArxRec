{"title": "Augmented Radiance Field: A General Framework for Enhanced Gaussian Splatting", "author": "Yixin Yang and Bojian Wu and Yang Zhou and Hui Huang", "abstract": "Due to the real-time rendering performance, 3D Gaussian Splatting (3DGS) has emerged as the leading method for radiance field reconstruction. However, its reliance on spherical harmonics for color encoding inherently limits its ability to separate diffuse and specular components, making it challenging to accurately represent complex reflections. To address this, we propose a novel enhanced Gaussian kernel that explicitly models specular effects through view-dependent opacity. Meanwhile, we introduce an error-driven compensation strategy to improve rendering quality in existing 3DGS scenes. Our method begins with 2D Gaussian initialization and then adaptively inserts and optimizes enhanced Gaussian kernels, ultimately producing an augmented radiance field. Experiments demonstrate that our method not only surpasses state-of-the-art NeRF methods in rendering performance but also achieves greater parameter efficiency. Project page at: https://xiaoxinyyx.github.io/augs.", "link": "http://arxiv.org/abs/2602.19916v1", "date": "2026-02-23", "relevancy": 3.1726, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6914}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.6292}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.583}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Augmented%20Radiance%20Field%3A%20A%20General%20Framework%20for%20Enhanced%20Gaussian%20Splatting&body=Title%3A%20Augmented%20Radiance%20Field%3A%20A%20General%20Framework%20for%20Enhanced%20Gaussian%20Splatting%0AAuthor%3A%20Yixin%20Yang%20and%20Bojian%20Wu%20and%20Yang%20Zhou%20and%20Hui%20Huang%0AAbstract%3A%20Due%20to%20the%20real-time%20rendering%20performance%2C%203D%20Gaussian%20Splatting%20%283DGS%29%20has%20emerged%20as%20the%20leading%20method%20for%20radiance%20field%20reconstruction.%20However%2C%20its%20reliance%20on%20spherical%20harmonics%20for%20color%20encoding%20inherently%20limits%20its%20ability%20to%20separate%20diffuse%20and%20specular%20components%2C%20making%20it%20challenging%20to%20accurately%20represent%20complex%20reflections.%20To%20address%20this%2C%20we%20propose%20a%20novel%20enhanced%20Gaussian%20kernel%20that%20explicitly%20models%20specular%20effects%20through%20view-dependent%20opacity.%20Meanwhile%2C%20we%20introduce%20an%20error-driven%20compensation%20strategy%20to%20improve%20rendering%20quality%20in%20existing%203DGS%20scenes.%20Our%20method%20begins%20with%202D%20Gaussian%20initialization%20and%20then%20adaptively%20inserts%20and%20optimizes%20enhanced%20Gaussian%20kernels%2C%20ultimately%20producing%20an%20augmented%20radiance%20field.%20Experiments%20demonstrate%20that%20our%20method%20not%20only%20surpasses%20state-of-the-art%20NeRF%20methods%20in%20rendering%20performance%20but%20also%20achieves%20greater%20parameter%20efficiency.%20Project%20page%20at%3A%20https%3A//xiaoxinyyx.github.io/augs.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19916v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAugmented%2520Radiance%2520Field%253A%2520A%2520General%2520Framework%2520for%2520Enhanced%2520Gaussian%2520Splatting%26entry.906535625%3DYixin%2520Yang%2520and%2520Bojian%2520Wu%2520and%2520Yang%2520Zhou%2520and%2520Hui%2520Huang%26entry.1292438233%3DDue%2520to%2520the%2520real-time%2520rendering%2520performance%252C%25203D%2520Gaussian%2520Splatting%2520%25283DGS%2529%2520has%2520emerged%2520as%2520the%2520leading%2520method%2520for%2520radiance%2520field%2520reconstruction.%2520However%252C%2520its%2520reliance%2520on%2520spherical%2520harmonics%2520for%2520color%2520encoding%2520inherently%2520limits%2520its%2520ability%2520to%2520separate%2520diffuse%2520and%2520specular%2520components%252C%2520making%2520it%2520challenging%2520to%2520accurately%2520represent%2520complex%2520reflections.%2520To%2520address%2520this%252C%2520we%2520propose%2520a%2520novel%2520enhanced%2520Gaussian%2520kernel%2520that%2520explicitly%2520models%2520specular%2520effects%2520through%2520view-dependent%2520opacity.%2520Meanwhile%252C%2520we%2520introduce%2520an%2520error-driven%2520compensation%2520strategy%2520to%2520improve%2520rendering%2520quality%2520in%2520existing%25203DGS%2520scenes.%2520Our%2520method%2520begins%2520with%25202D%2520Gaussian%2520initialization%2520and%2520then%2520adaptively%2520inserts%2520and%2520optimizes%2520enhanced%2520Gaussian%2520kernels%252C%2520ultimately%2520producing%2520an%2520augmented%2520radiance%2520field.%2520Experiments%2520demonstrate%2520that%2520our%2520method%2520not%2520only%2520surpasses%2520state-of-the-art%2520NeRF%2520methods%2520in%2520rendering%2520performance%2520but%2520also%2520achieves%2520greater%2520parameter%2520efficiency.%2520Project%2520page%2520at%253A%2520https%253A//xiaoxinyyx.github.io/augs.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.19916v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Augmented%20Radiance%20Field%3A%20A%20General%20Framework%20for%20Enhanced%20Gaussian%20Splatting&entry.906535625=Yixin%20Yang%20and%20Bojian%20Wu%20and%20Yang%20Zhou%20and%20Hui%20Huang&entry.1292438233=Due%20to%20the%20real-time%20rendering%20performance%2C%203D%20Gaussian%20Splatting%20%283DGS%29%20has%20emerged%20as%20the%20leading%20method%20for%20radiance%20field%20reconstruction.%20However%2C%20its%20reliance%20on%20spherical%20harmonics%20for%20color%20encoding%20inherently%20limits%20its%20 {"title": "RAP: Fast Feedforward Rendering-Free Attribute-Guided Primitive Importance Score Prediction for Efficient 3D Gaussian Splatting Processing", "author": "Kaifa Yang and Qi Yang and Yiling Xu and Zhu Li", "abstract": "3D Gaussian Splatting (3DGS) has emerged as a leading technology for high-quality 3D scene reconstruction. However, the iterative refinement and densification process leads to the generation of a large number of primitives, each contributing to the reconstruction to a substantially different extent. Estimating primitive importance is thus crucial, both for removing redundancy during reconstruction and for enabling efficient compression and transmission. Existing methods typically rely on rendering-based analyses, where each primitive is evaluated through its contribution across multiple camera viewpoints. However, such methods are sensitive to the number and selection of views, rely on specialized differentiable rasterizers, and have long calculation times that grow linearly with view count, making them difficult to integrate as plug-and-play modules and limiting scalability and generalization. To address these issues, we propose RAP, a fast feedforward rendering-free attribute-guided method for efficient importance score prediction in 3DGS. RAP infers primitive significance directly from intrinsic Gaussian attributes and local neighborhood statistics, avoiding rendering-based or visibility-dependent computations. A compact MLP predicts per-primitive importance scores using rendering loss, pruning-aware loss, and significance distribution regularization. After training on a small set of scenes, RAP generalizes effectively to unseen data and can be seamlessly integrated into reconstruction, compression, and transmission pipelines. Our code is publicly available at https://github.com/yyyykf/RAP.", "link": "http://arxiv.org/abs/2602.19753v1", "date": "2026-02-23", "relevancy": 3.1573, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6896}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6135}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5912}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RAP%3A%20Fast%20Feedforward%20Rendering-Free%20Attribute-Guided%20Primitive%20Importance%20Score%20Prediction%20for%20Efficient%203D%20Gaussian%20Splatting%20Processing&body=Title%3A%20RAP%3A%20Fast%20Feedforward%20Rendering-Free%20Attribute-Guided%20Primitive%20Importance%20Score%20Prediction%20for%20Efficient%203D%20Gaussian%20Splatting%20Processing%0AAuthor%3A%20Kaifa%20Yang%20and%20Qi%20Yang%20and%20Yiling%20Xu%20and%20Zhu%20Li%0AAbstract%3A%203D%20Gaussian%20Splatting%20%283DGS%29%20has%20emerged%20as%20a%20leading%20technology%20for%20high-quality%203D%20scene%20reconstruction.%20However%2C%20the%20iterative%20refinement%20and%20densification%20process%20leads%20to%20the%20generation%20of%20a%20large%20number%20of%20primitives%2C%20each%20contributing%20to%20the%20reconstruction%20to%20a%20substantially%20different%20extent.%20Estimating%20primitive%20importance%20is%20thus%20crucial%2C%20both%20for%20removing%20redundancy%20during%20reconstruction%20and%20for%20enabling%20efficient%20compression%20and%20transmission.%20Existing%20methods%20typically%20rely%20on%20rendering-based%20analyses%2C%20where%20each%20primitive%20is%20evaluated%20through%20its%20contribution%20across%20multiple%20camera%20viewpoints.%20However%2C%20such%20methods%20are%20sensitive%20to%20the%20number%20and%20selection%20of%20views%2C%20rely%20on%20specialized%20differentiable%20rasterizers%2C%20and%20have%20long%20calculation%20times%20that%20grow%20linearly%20with%20view%20count%2C%20making%20them%20difficult%20to%20integrate%20as%20plug-and-play%20modules%20and%20limiting%20scalability%20and%20generalization.%20To%20address%20these%20issues%2C%20we%20propose%20RAP%2C%20a%20fast%20feedforward%20rendering-free%20attribute-guided%20method%20for%20efficient%20importance%20score%20prediction%20in%203DGS.%20RAP%20infers%20primitive%20significance%20directly%20from%20intrinsic%20Gaussian%20attributes%20and%20local%20neighborhood%20statistics%2C%20avoiding%20rendering-based%20or%20visibility-dependent%20computations.%20A%20compact%20MLP%20predicts%20per-primitive%20importance%20scores%20using%20rendering%20loss%2C%20pruning-aware%20loss%2C%20and%20significance%20distribution%20regularization.%20After%20training%20on%20a%20small%20set%20of%20scenes%2C%20RAP%20generalizes%20effectively%20to%20unseen%20data%20and%20can%20be%20seamlessly%20integrated%20into%20reconstruction%2C%20compression%2C%20and%20transmission%20pipelines.%20Our%20code%20is%20publicly%20available%20at%20https%3A//github.com/yyyykf/RAP.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19753v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRAP%253A%2520Fast%2520Feedforward%2520Rendering-Free%2520Attribute-Guided%2520Primitive%2520Importance%2520Score%2520Prediction%2520for%2520Efficient%25203D%2520Gaussian%2520Splatting%2520Processing%26entry.906535625%3DKaifa%2520Yang%2520and%2520Qi%2520Yang%2520and%2520Yiling%2520Xu%2520and%2520Zhu%2520Li%26entry.1292438233%3D3D%2520Gaussian%2520Splatting%2520%25283DGS%2529%2520has%2520emerged%2520as%2520a%2520leading%2520technology%2520for%2520high-quality%25203D%2520scene%2520reconstruction.%2520However%252C%2520the%2520iterative%2520refinement%2520and%2520densification%2520process%2520leads%2520to%2520the%2520generation%2520of%2520a%2520large%2520number%2520of%2520primitives%252C%2520each%2520contributing%2520to%2520the%2520reconstruction%2520to%2520a%2520substantially%2520different% {"title": "tttLRM: Test-Time Training for Long Context and Autoregressive 3D Reconstruction", "author": "Chen Wang and Hao Tan and Wang Yifan and Zhiqin Chen and Yuheng Liu and Kalyan Sunkavalli and Sai Bi and Lingjie Liu and Yiwei Hu", "abstract": "We propose tttLRM, a novel large 3D reconstruction model that leverages a Test-Time Training (TTT) layer to enable long-context, autoregressive 3D reconstruction with linear computational complexity, further scaling the model's capability. Our framework efficiently compresses multiple image observations into the fast weights of the TTT layer, forming an implicit 3D representation in the latent space that can be decoded into various explicit formats, such as Gaussian Splats (GS) for downstream applications. The online learning variant of our model supports progressive 3D reconstruction and refinement from streaming observations. We demonstrate that pretraining on novel view synthesis tasks effectively transfers to explicit 3D modeling, resulting in improved reconstruction quality and faster convergence. Extensive experiments show that our method achieves superior performance in feedforward 3D Gaussian reconstruction compared to state-of-the-art approaches on both objects and scenes.", "link": "http://arxiv.org/abs/2602.20160v1", "date": "2026-02-23", "relevancy": 3.147, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6807}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6065}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.601}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20tttLRM%3A%20Test-Time%20Training%20for%20Long%20Context%20and%20Autoregressive%203D%20Reconstruction&body=Title%3A%20tttLRM%3A%20Test-Time%20Training%20for%20Long%20Context%20and%20Autoregressive%203D%20Reconstruction%0AAuthor%3A%20Chen%20Wang%20and%20Hao%20Tan%20and%20Wang%20Yifan%20and%20Zhiqin%20Chen%20and%20Yuheng%20Liu%20and%20Kalyan%20Sunkavalli%20and%20Sai%20Bi%20and%20Lingjie%20Liu%20and%20Yiwei%20Hu%0AAbstract%3A%20We%20propose%20tttLRM%2C%20a%20novel%20large%203D%20reconstruction%20model%20that%20leverages%20a%20Test-Time%20Training%20%28TTT%29%20layer%20to%20enable%20long-context%2C%20autoregressive%203D%20reconstruction%20with%20linear%20computational%20complexity%2C%20further%20scaling%20the%20model%27s%20capability.%20Our%20framework%20efficiently%20compresses%20multiple%20image%20observations%20into%20the%20fast%20weights%20of%20the%20TTT%20layer%2C%20forming%20an%20implicit%203D%20representation%20in%20the%20latent%20space%20that%20can%20be%20decoded%20into%20various%20explicit%20formats%2C%20such%20as%20Gaussian%20Splats%20%28GS%29%20for%20downstream%20applications.%20The%20online%20learning%20variant%20of%20our%20model%20supports%20progressive%203D%20reconstruction%20and%20refinement%20from%20streaming%20observations.%20We%20demonstrate%20that%20pretraining%20on%20novel%20view%20synthesis%20tasks%20effectively%20transfers%20to%20explicit%203D%20modeling%2C%20resulting%20in%20improved%20reconstruction%20quality%20and%20faster%20convergence.%20Extensive%20experiments%20show%20that%20our%20method%20achieves%20superior%20performance%20in%20feedforward%203D%20Gaussian%20reconstruction%20compared%20to%20state-of-the-art%20approaches%20on%20both%20objects%20and%20scenes.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20160v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DtttLRM%253A%2520Test-Time%2520Training%2520for%2520Long%2520Context%2520and%2520Autoregressive%25203D%2520Reconstruction%26entry.906535625%3DChen%2520Wang%2520and%2520Hao%2520Tan%2520and%2520Wang%2520Yifan%2520and%2520Zhiqin%2520Chen%2520and%2520Yuhen %203D%20Reconstruction&entry.906535625=Chen%20Wang%20and%20Hao%20Tan%20and%20Wang%20Yifan%20and%20Zhiqin%20Chen%20and%20Yuheng%20Liu%20and%20Kalyan%20Sunkavalli%20and%20Sai%20Bi%20and%20Lingjie%20Liu%20and%20Yiwei%20Hu&entry.1292438233=We%20propose%20tttLRM%2C%20a%20novel%20large%203D%20reconstruction%20model%20that%20leverages%20a%20Test-Time%20Training%20%28TTT%29%20layer%20to%20enable%20long-context%2C%20autoregressive%203D%20reconstruction%20with%20linear%20computational%20complexity%2C%20further%20scaling%20the%20model%27s%20capability.%20Our%20framework%20efficiently%20compresses%20multiple%20image%20observations%20into%20the%20fast%20weights%20of%20the%20TTT%20layer%2C%20forming%20an%20implicit%203D%20representation%20in%20the%20latent%20space%20that%20can%20be%20decoded%20into%20various%20explicit%20formats%2C%20such%20as%20Gaussian%20Splats%20%28GS%29%20for%20downstream%20applications.%20The%20online%20learning%20variant%20of%20our%20model%20supports%20progressive%203D%20reconstruction%20and%20refinement%20from%20streaming%20observations.%20We%20demonstrate%20that%20pretraining%20on%20novel%20view%20synthesis%20tasks%20effectively%20transfers%20to%20explicit%203D%20modeling%2C%20resulting%20in%20improved%20reconstruction%20quality%20and%20faster%20convergence.%20Extensive%20experiments%20show%20that%20our%20method%20achieves%20superior%20performance%20in%20feedforward%203D%20Gaussian%20reconstruction%20compared%20to%20state-of-the-art%20approaches%20on%20both%20objects%20and%20scenes.&entry.1838667208=http%3A//arxiv.org/abs/2602.20160v1&entry.124074799=Read"},
{"title": "StructXLIP: Enhancing Vision-language Models with Multimodal Structural Cues", "author": "Zanxi Ruan and Qiuyu Kong and Songqun Gao and Yiming Wang and Marco Cristani", "abstract": "Edge-based representations are fundamental cues for visual understanding, a principle rooted in early vision research and still central today. We extend this principle to vision-language alignment, showing that isolating and aligning structural cues across modalities can greatly benefit fine-tuning on long, detail-rich captions, with a specific focus on improving cross-modal retrieval. We introduce StructXLIP, a fine-tuning alignment paradigm that extracts edge maps (e.g., Canny), treating them as proxies for the visual structure of an image, and filters the corresponding captions to emphasize structural cues, making them \"structure-centric\". Fine-tuning augments the standard alignment loss with three structure-centric losses: (i) aligning edge maps with structural text, (ii) matching local edge regions to textual chunks, and (iii) connecting edge maps to color images to prevent representation drift. From a theoretical standpoint, while standard CLIP maximizes the mutual information between visual and textual embeddings, StructXLIP additionally maximizes the mutual information between multimodal structural representations. This auxiliary optimization is intrinsically harder, guiding the model toward more robust and semantically stable minima, enhancing vision-language alignment. Beyond outperforming current competitors on cross-modal retrieval in both general and specialized domains, our method serves as a general boosting recipe that can be integrated into future approaches in a plug-and-play manner. Code and pretrained models are publicly available at: https://github.com/intelligolabs/StructXLIP.", "link": "http://arxiv.org/abs/2602.20089v1", "date": "2026-02-23", "relevancy": 3.0759, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6156}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6156}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6144}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20StructXLIP%3A%20Enhancing%20Vision-language%20Models%20with%20Multimodal%20Structural%20Cues&body=Title%3A%20StructXLIP%3A%20Enhancing%20Vision-language%20Models%20with%20Multimodal%20Structural%20Cues%0AAuthor%3A%20Zanxi%20Ruan%20and%20Qiuyu%20Kong%20and%20Songqun%20Gao%20and%20Yiming%20Wang%20and%20Marco%20Cristani%0AAbstract%3A%20Edge-based%20representations%20are%20fundamental%20cues%20for%20visual%20understanding%2C%20a%20principle%20rooted%20in%20early%20vision%20research%20and%20still%20central%20today.%20We%20extend%20this%20principle%20to%20vision-language%20alignment%2C%20showing%20that%20isolating%20and%20aligning%20structural%20cues%20across%20modalities%20can%20greatly%20benefit%20fine-tuning%20on%20long%2C%20detail-rich%20captions%2C%20with%20a%20specific%20focus%20on%20improving%20cross-modal%20retrieval.%20We%20introduce%20StructXLIP%2C%20a%20fine-tuning%20alignment%20paradigm%20that%20extracts%20edge%20maps%20%28e.g.%2C%20Canny%29%2C%20treating%20them%20as%20proxies%20for%20the%20visual%20structure%20of%20an%20image%2C%20and%20filters%20the%20corresponding%20captions%20to%20emphasize%20structural%20cues%2C%20making%20them%20%22structure-centric%22.%20Fine-tuning%20augments%20the%20standard%20alignment%20loss%20with%20three%20structure-centric%20losses%3A%20%28i%29%20aligning%20edge%20maps%20with%20structural%20text%2C%20%28ii%29%20matching%20local%20edge%20regions%20to%20textual%20chunks%2C%20and%20%28iii%29%20connecting%20edge%20maps%20to%20color%20images%20to%20prevent%20representation%20drift.%20From%20a%20theoretical%20standpoint%2C%20while%20standard%20CLIP%20maximizes%20the%20mutual%20information%20between%20visual%20and%20textual%20embeddings%2C%20StructXLIP%20additionally%20maximizes%20the%20mutual%20information%20between%20multimodal%20structural%20representations.%20This%20auxiliary%20optimization%20is%20intrinsically%20harder%2C%20guiding%20the%20model%20toward%20more%20robust%20and%20semantically%20stable%20minima%2C%20enhancing%20vision-language%20alignment.%20Beyond%20outperforming%20current%20competitors%20on%20cross-modal%20retrieval%20in%20both%20general%20and%20specialized%20domains%2C%20our%20method%20serves%20as%20a%20general%20boosting%20recipe%20that%20can%20be%20integrated%20into%20future%20approaches%20in%20a%20plug-and-play%20manner.%20Code%20and%20pretrained%20models%20are%20publicly%20available%20at%3A%20https%3A//github.com/intelligolabs/StructXLIP.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20089v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStructXLIP%253A%2520Enhancing%2520Vision-language%2520Models%2520with%2520Multimodal%2520Structural%2520Cues%26entry.906535625%3DZanxi%2520Ruan%2520and%2520Qiuyu%2520Kong%2520and%2520Songqun%2520Gao%2520and%2520Yiming%2520Wang%2520and%2520Marco%2520Cristani%26entry.1292438233%3DEdge-based%2520representations%2520are%2520fundamental%2520cues%2520for%2520visual%2520understanding%252C%2520a%2520principle%2520rooted%2520in%2520early%2520vision%2520research%2520and%2520still%2520central%2520today.%2520We%2520extend%2520this%2520principle%2520to%2520vision-language%2520alignment%252C%2520showing%2520that%2520isolating%2520and%2520aligning%2520structural%2520cues%2520across%2520modalities%2520can%2520greatly%2520benefit%2520fine-tuning%2520on%2520long%252C%2520detail-rich%2520captions%252C%2520with%2520a%2520specific%2520focus%2520on%2520improving%2520cross-modal%2520retrieval.%2520We%2520introduce%2520StructXLIP {"title": "TraceVision: Trajectory-Aware Vision-Language Model for Human-Like Spatial Understanding", "author": "Fan Yang and Shurong Zheng and Hongyin Zhao and Yufei Zhan and Xin Li and Yousong Zhu and Chaoyang Zhao Ming Tang and Jinqiao Wang", "abstract": "Recent Large Vision-Language Models (LVLMs) demonstrate remarkable capabilities in image understanding and natural language generation. However, current approaches focus predominantly on global image understanding, struggling to simulate human visual attention trajectories and explain associations between descriptions and specific regions. We propose TraceVision, a unified vision-language model integrating trajectory-aware spatial understanding in an end-to-end framework. TraceVision employs a Trajectory-aware Visual Perception (TVP) module for bidirectional fusion of visual features and trajectory information. We design geometric simplification to extract semantic keypoints from raw trajectories and propose a three-stage training pipeline where trajectories guide description generation and region localization. We extend TraceVision to trajectory-guided segmentation and video scene understanding, enabling cross-frame tracking and temporal attention analysis. We construct the Reasoning-based Interactive Localized Narratives (RILN) dataset to enhance logical reasoning and interpretability. Extensive experiments on trajectory-guided captioning, text-guided trajectory prediction, understanding, and segmentation demonstrate that TraceVision achieves state-of-the-art performance, establishing a foundation for intuitive spatial interaction and interpretable visual understanding.", "link": "http://arxiv.org/abs/2602.19768v1", "date": "2026-02-23", "relevancy": 3.0398, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6188}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6188}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5863}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TraceVision%3A%20Trajectory-Aware%20Vision-Language%20Model%20for%20Human-Like%20Spatial%20Understanding&body=Title%3A%20TraceVision%3A%20Trajectory-Aware%20Vision-Language%20Model%20for%20Human-Like%20Spatial%20Understanding%0AAuthor%3A%20Fan%20Yang%20and%20Shurong%20Zheng%20and%20Hongyin%20Zhao%20and%20Yufei%20Zhan%20and%20Xin%20Li%20and%20Yousong%20Zhu%20and%20Chaoyang%20Zhao%20Ming%20Tang%20and%20Jinqiao%20Wang%0AAbstract%3A%20Recent%20Large%20Vision-Language%20Models%20%28LVLMs%29%20demonstrate%20remarkable%20capabilities%20in%20image%20understanding%20and%20natural%20language%20generation.%20However%2C%20current%20approaches%20focus%20predominantly%20on%20global%20image%20understanding%2C%20struggling%20to%20simulate%20human%20visual%20attention%20trajectories%20and%20explain%20associations%20between%20descriptions%20and%20specific%20regions.%20We%20propose%20TraceVision%2C%20a%20unified%20vision-language%20model%20integrating%20trajectory-aware%20spatial%20understanding%20in%20an%20end-to-end%20framework.%20TraceVision%20employs%20a%20Trajectory-aware%20Visual%20Perception%20%28TVP%29%20module%20for%20bidirectional%20fusion%20of%20visual%20features%20and%20trajectory%20information.%20We%20design%20geometric%20simplification%20to%20extract%20semantic%20keypoints%20from%20raw%20trajectories%20and%20propose%20a%20three-stage%20training%20pipeline%20where%20trajectories%20guide%20description%20generation%20and%20region%20localization.%20We%20extend%20TraceVision%20to%20trajectory-guided%20segmentation%20and%20video%20scene%20understanding%2C%20enabling%20cross-frame%20tracking%20and%20temporal%20attention%20analysis.%20We%20construct%20the%20Reasoning-based%20Interactive%20Localized%20Narratives%20%28RILN%29%20dataset%20to%20enhance%20logical%20reasoning%20and%20interpretability.%20Extensive%20experiments%20on%20trajectory-guided%20captioning%2C%20text-guided%20trajectory%20prediction%2C%20understanding%2C%20and%20segmentation%20demonstrate%20that%20TraceVision%20achieves%20state-of-the-art%20performance%2C%20establishing%20a%20foundation%20for%20intuitive%20spatial%20interaction%20and%20interpretable%20visual%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19768v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTraceVision%253A%2520Trajectory-Aware%2520Vision-Language%2520Model%2520for%2520Human-Like%2520Spatial%2520Understanding%26entry.906535625%3DFan%2520Yang%2520and%2520Shurong%2520Zheng%2520and%2520Hongyin%2520Zhao%2520and%2520Yufei%2520Zhan%2520and%2520Xin%2520Li%2520and%2520Yousong%2520Zhu%2520and%2520Chaoyang%2520Zhao%2520Ming%2520Tang%2520and%2520Jinqiao%2520Wang%26entry.1292438233%3DRecent%2520Large%2520Vision-Language%2520Models%2520%2528LVLMs%2529%2520demonstrate%2520remarkable%2520capabilities%2520in%2520image%2520understanding%2520and%2520natural%2520language%2520generation.%2520However%252C%2520current%2520approaches%2520focus%2520predominantly%2520on%2520global%2520image%2520understanding%252C%2520struggling%2520to%2520simulate%2520human%2520visual%2520attention%2520trajectories%2520and%2520explain%2520associations%2520between%2520descriptions%2520and%2520specific%2520regions.%2520We%2520propose%2520TraceVision%252C%2520a%2520unified%2520vision-language%2520model%2520integrating%2520trajectory-aware%2520spatial%2520understanding%2520in%2520an%2520end-to-end%2520framework.%2520TraceVision%2520employs%2520a%2520Trajectory-aware%2520Visual%2520Perception%2520%2528TVP%2529%2520module%2520for%2520bidirectional%2520fusion%2520of%2520visual%2520features%2520and%2520trajectory%2520information.%2520We%2520design%2520geometric%2520sim {"title": "Learning Positive-Incentive Point Sampling in Neural Implicit Fields for Object Pose Estimation", "author": "Yifei Shi and Boyan Wan and Xin Xu and Kai Xu", "abstract": "Learning neural implicit fields of 3D shapes is a rapidly emerging field that enables shape representation at arbitrary resolutions. Due to the flexibility, neural implicit fields have succeeded in many research areas, including shape reconstruction, novel view image synthesis, and more recently, object pose estimation. Neural implicit fields enable learning dense correspondences between the camera space and the object's canonical space-including unobserved regions in camera space-significantly boosting object pose estimation performance in challenging scenarios like highly occluded objects and novel shapes. Despite progress, predicting canonical coordinates for unobserved camera-space regions remains challenging due to the lack of direct observational signals. This necessitates heavy reliance on the model's generalization ability, resulting in high uncertainty. Consequently, densely sampling points across the entire camera space may yield inaccurate estimations that hinder the learning process and compromise performance. To alleviate this problem, we propose a method combining an SO(3)-equivariant convolutional implicit network and a positive-incentive point sampling (PIPS) strategy. The SO(3)-equivariant convolutional implicit network estimates point-level attributes with SO(3)-equivariance at arbitrary query locations, demonstrating superior performance compared to most existing baselines. The PIPS strategy dynamically determines sampling locations based on the input, thereby boosting the network's accuracy and training efficiency. Our method outperforms the state-of-the-art on three pose estimation datasets. Notably, it demonstrates significant improvements in challenging scenarios, such as objects captured with unseen pose, high occlusion, novel geometry, and severe noise.", "link": {"title": "RangeSAM: On the Potential of Visual Foundation Models for Range-View represented LiDAR segmentation", "author": "Paul Julius K\u00fchn and Duc Anh Nguyen and Arjan Kuijper and Saptarshi Neil Sinha", "abstract": "Point cloud segmentation is central to autonomous driving and 3D scene understanding. While voxel- and point-based methods dominate recent research due to their compatibility with deep architectures and ability to capture fine-grained geometry, they often incur high computational cost, irregular memory access, and limited real-time efficiency. In contrast, range-view methods, though relatively underexplored - can leverage mature 2D semantic segmentation techniques for fast and accurate predictions. Motivated by the rapid progress in Visual Foundation Models (VFMs) for captioning, zero-shot recognition, and multimodal tasks, we investigate whether SAM2, the current state-of-the-art VFM for segmentation tasks, can serve as a strong backbone for LiDAR point cloud segmentation in the range view. We present , to our knowledge, the first range-view framework that adapts SAM2 to 3D segmentation, coupling efficient 2D feature extraction with standard projection/back-projection to operate on point clouds. To optimize SAM2 for range-view representations, we implement several architectural modifications to the encoder: (1) a novel module that emphasizes horizontal spatial dependencies inherent in LiDAR range images, (2) a customized configuration of tailored to the geometric properties of spherical projections, and (3) an adapted mechanism in the encoder backbone specifically designed to capture the unique spatial patterns and discontinuities present in range-view pseudo-images. Our approach achieves competitive performance on SemanticKITTI while benefiting from the speed, scalability, and deployment simplicity of 2D-centric pipelines. This work highlights the viability of VFMs as general-purpose backbones for 3D perception and opens a path toward unified, foundation-model-driven LiDAR segmentation. Results lets us conclude that range-view segmentation methods using VFMs leads to promising results.", "link": "http://arxiv.org/abs/2509.15886v4", "date": "2026-02-23", "relevancy": 3.0177, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.619}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.619}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5727}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RangeSAM%3A%20On%20the%20Potential%20of%20Visual%20Foundation%20Models%20for%20Range-View%20represented%20LiDAR%20segmentation&body=Title%3A%20RangeSAM%3A%20On%20the%20Potential%20of%20Visual%20Foundation%20Models%20for%20Range-View%20represented%20LiDAR%20segmentation%0AAuthor%3A%20Paul%20Julius%20K%C3%BChn%20and%20Duc%20Anh%20Nguyen%20and%20Arjan%20Kuijper%20and%20Saptarshi%20Neil%20Sinha%0AAbstract%3A%20Point%20cloud%20segmentation%20is%20central%20to%20autonomous%20driving%20and%203D%20scene%20understanding.%20While%20voxel-%20and%20point-based%20methods%20dominate%20recent%20research%20due%20to%20their%20compatibility%20with%20deep%20architectures%20and%20ability%20to%20capture%20fine-grained%20geometry%2C%20they%20often%20incur%20high%20computational%20cost%2C%20irregular%20memory%20access%2C%20and%20limited%20real-time%20efficiency.%20In%20contrast%2C%20range-view%20methods%2C%20though%20relatively%20underexplored%20-%20can%20leverage%20mature%202D%20semantic%20segmentation%20techniques%20for%20fast%20and%20accurate%20predictions.%20Motivated%20by%20the%20rapid%20progress%20in%20Visual%20Foundation%20Models%20%28VFMs%29%20for%20captioning%2C%20zero-shot%20recognition%2C%20and%20multim d%20ability%20to%20capture%20fine-grained%20geometry%2C%20they%20often%20incur%20high%20computational%20cost%2C%20irregular%20memory%20access%2C%20and%20limited%20real-time%20efficiency.%20In%20contrast%2C%20range-view%20methods%2C%20though%20relatively%20underexplored%20-%20can%20leverage%20mature%202D%20semantic%20segmentation%20techniques%20for%20fast%20and%20accurate%20predictions.%20Motivated%20by%20the%20rapid%20progress%20in%20Visual%20Foundation%20Models%20%28VFMs%29%20for%20captioning%2C%20zero-shot%20recognition%2C%20and%20multimodal%20tasks%2C%20we%20investigate%20whether%20SAM2%2C%20the%20current%20state-of-the-art%20VFM%20for%20segmentation%20tasks%2C%20can%20serve%20as%20a%20strong%20backbone%20for%20LiDAR%20point%20cloud%20segmentation%20in%20the%20range%20view.%20We%20present%20%2C%20to%20our%20knowledge%2C%20the%20first%20range-view%20framework%20that%20adapts%20SAM2%20to%203D%20segmentation%2C%20coupling%20efficient%202D%20feature%20extraction%20with%20standard%20projection/back-projection%20to%20operate%20on%20point%20clouds.%20To%20optimize%20SAM2%20for%20range-view%20representations%2C%20we%20implement%20several%20architectural%20modifications%20to%20the%20encoder%3A%20%281%29%20a%20novel%20module%20that%20emphasizes%20horizontal%20spatial%20dependencies%20inherent%20in%20LiDAR%20range%20images%2C%20%282%29%20a%20customized%20configuration%20of%20tailored%20to%20the%20geometric%20properties%20of%20spherical%20projections%2C%20and%20%283%29%20an%20adapted%20mechanism%20in%20the%20encoder%20backbone%20specifically%20designed%20to%20capture%20the%20unique%20spatial%20patterns%20and%20discontinuities%20present%20in%20range-view%20pseudo-images.%20Our%20approach%20achieves%20competitive%20performance%20on%20SemanticKITTI%20while%20benefiting%20from%20the%20speed%2C%20scalability%2C%20and%20deployment%20simplicity%20of%202D-centric%20pipelines.%20This%20work%20highlights%20the%20viability%20of%20VFMs%20as%20general-purpose%20backbones%20for%203D%20per {"title": "$R^2$-Mesh: Reinforcement Learning Powered Mesh Reconstruction via Geometry and Appearance Refinement", "author": "Haoyang Wang and Liming Liu and Xinggong Zhang", "abstract": "Mesh reconstruction from Neural Radiance Fields (NeRF) is widely used in 3D reconstruction and has been applied across numerous domains. However, existing methods typically rely solely on the given training set images, which restricts supervision to limited observations and makes it difficult to fully constrain geometry and appearance. Moreover, the contribution of each viewpoint for training is not uniform and changes dynamically during the optimization process, which can result in suboptimal guidance for both geometric refinement and rendering quality. To address these limitations, we propose $R^2$-Mesh, a reinforcement learning framework that combines NeRF-rendered pseudo-supervision with online viewpoint selection. Our key insight is to exploit NeRF's rendering ability to synthesize additional high-quality images, enriching training with diverse viewpoint information. To ensure that supervision focuses on the most beneficial perspectives, we introduce a UCB-based strategy with a geometry-aware reward, which dynamically balances exploration and exploitation to identify informative viewpoints throughout training. Within this framework, we jointly optimize SDF geometry and view-dependent appearance under differentiable rendering, while periodically refining meshes to capture fine geometric details. Experiments demonstrate that our method achieves competitive results in both geometric accuracy and rendering quality.", "link": "http://arxiv.org/abs/2408.10135v2", "date": "2026-02-23", "relevancy": 3.0098, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6604}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5993}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5462}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20%24R%5E2%24-Mesh%3A%20Reinforcement%20Learning%20Powered%20Mesh%20Reconstruction%20via%20Geometry%20and%20Appearance%20Refinement&body=Title%3A%20%24R%5E2%24-Mesh%3A%20Reinforcement%20Learning%20Powered%20Mesh%20Reconstruction%20via%20Geometry%20and%20Appearance%20Refinement%0AAuthor%3A%20Haoyang%20Wang%20and%20Liming%20Liu%20and%20Xinggong%20Zhang%0AAbstract%3A%20Mesh%20reconstruction%20from%20Neural%20Radiance%20Fields%20%28NeRF%29%20is%20widely%20used%20in%203D%20reconstruction%20and%20has%20been%20applied%20across%20numerous%20domains.%20However%2C%20existing%20methods%20typically%20rely%20solely%20on%20the%20given%20training%20set%20images%2C%20which%20restricts%20supervision%20to%20limited%20observations%20and%20makes%20it%20difficult%20to%20fully%20constrain%20geometry%20and%20appearance.%20Moreover%2C%20the%20contribution%20of%20each%20viewpoint%20for%20training%20is%20not%20uniform%20and%20changes%20dynamically%20during%20the%20optimization%20process%2C%20which%20can%20result%20in%20suboptimal%20guidance%20for%20both%20geometric%20refinement%20and%20rendering%20quality.%20To%20address%20these%20limitations%2C%20we%20propose%20%24R%5E2%24-Mesh%2C%20a%20reinforcement%20learning%20framework%20that%20combines%20NeRF-rendered%20pseudo-supervision%20with%20online%20viewpoint%20selection.%20Our%20key%20insight%20is%20to%20exploit%20NeRF%27s%20rendering%20ability%20to%20synthesize%20additional%20high-quality%20images%2C%20enriching%20training%20with%20diverse%20viewpoint%20information.%20To%20ensure%20that%20supervision%20focuses%20on%20the%20most%20beneficial%20perspectives%2C%20we%20introduce%20a%20UCB-based%20strategy%20with%20a%20geometry-aware%20reward%2C%20which%20dynamically%20balances%20exploration%20and%20exploitation%20to%20identify%20informative%20viewpoints%20throughout%20training.%20Within%20this%20framework%2C%20we%20jointly%20optimize%20SDF%20geometry%20and%20view-dependent%20appearance%20under%20differentiable%20rendering%2C%20while%20periodically%20refining%20meshes%20to%20capture%20fine%20geometric%20details.%20Experiments%20demonstrate%20that%20our%20method%20achieves%20competitive%20results%20in%20both%20geometric%20accuracy%20and%20rendering%20quality.%0ALink%3A%20http%3A//arxiv.org/abs/2408.10135v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D%2524R%255E2%2524-Mesh%253A%2520Reinforcement%2520Learning%2520Powered%2520Mesh%2520Reconstruction%2520via%2520Geometry%2520and%2520Appearance%2520Refinement%26entry.906535625%3DHaoyang%2520Wang%2520and%2520Liming%2520Liu%2520and%2520Xinggong%2520Zhang%26entry.1292438233%3DMesh%2520reconstruction%2520from%2520Neural%2520Radiance%2520Fields%2520%2528NeRF%2529%2520is%2520widely%2520used%2520in%25203D%2520reconstruction%2520and%2520has%2520been%2520applied%2520across%2520numerous%2520domains.%2520However%252C%2520existing%2520methods%2520typically%2520rely%2520solely%2520on%2520the%2520given%2520training%2520set%2520images%252C%2520which%2520restricts%2520supervision%2520to%2520limited%2520observations%2520and%2520makes%2520it%2520difficult%2520to%2520fully%2520constrain%2520geometry%2520and%2520appearance.%2520Moreover%252C%2520the%2520contribution%2520of%2520each%2520viewpoint%2520for%2520training%2520is%2520not%2520uniform%2520and%2520changes%2520dynamically%2520during%2520the%2520optimization%2520process%252C%2520which%2520can%2520result%2520in%2520suboptimal%2520guidance%2520for%2520both%2520geometric%2520refinement%2520and%2520rendering%2520quality.%2520To%2520address%2520these%2520limitations%252C%2520we%2520propose%2520%2524R%255E2%2524-Mesh%252C%2520a%2520reinforcement%2520learning%2520framework%2520that%2520combines%2520NeRF-rendered%2520pseudo-supervision%2520with%2520online%2520viewpoint%2520selection.%2520Our%2520key%2520insight%2520is%2520to%2520exploit%2520NeRF%2527s%2520rendering%2520ability%2520to%2520synthesize%2520additional%2520high-quality%2520images%252C%2520enriching%2520training%2520with%2520diverse%2520viewpoint%2520information.%2520To%2520ensure%2520that%2520supervision%2520focuses%2520on%2520the%2520most%2520beneficial%2520perspectives%252C%2520we%2520introduce%2520a%2520UCB-based%2520strategy%2520with%2520a%2520geometry-aware%2520reward%252C%2520which%2520dynamically%2520balances%2520exploration%2520and%2520exploitation%2520to%2520identify%2520informative%2520viewpoints%2520throughout%2520training.%2520Within%2520this%2520framework%252C%2520we%2520jointly%2520optimize%2520SDF%2520geometry%2520and%2520view-dependent%2520appearance%2520under%2520differentiable%2520rendering%252C%2520while%2520periodically%2520refining%2520meshes%2520to%2520capture%2520fine%2520geometric%2520details.%2520Experiments%2520demonstrate%2520that%2520our%2520method%2520achieves%2520competitive%2520results%2520in%2520both%2520geometric%2520accuracy%2520and%2520rendering%2520quality.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2408.10135v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=%24R%5E2%24-Mesh%3A%20Reinforcement%20Learning%20Powered%20Mesh%20Reconstruction%20via%20Geometry%20and%20Appearance%20Refinement&entry.906535625=Haoyang%20Wang%20and%20Liming%20Liu%20and%20Xinggong%20Zhang&entry.1292438233=Mesh%20reconstruction%20from%20Neural%20Radiance%20Fields%20%28NeRF%29%20is%20widely%20used%20in%203D%20reconstruction%20and%20has%20been%20applied%20across%20numerous%20domains.%20However%2C%20existing%20methods%20typically%20rely%20solely%20on%20the%20given%20training%20set%20images%2C%20which%20restricts%20supervision%20to%20limited%20observations%20and%20makes%20it%20difficult%20to%20fully%20 {"title": "MedDIFT: Multi-Scale Diffusion-Based Correspondence in 3D Medical Imaging", "author": "Xingyu Zhang and Anna Reithmeir and Fryderyk K\u00f6gl and Rickmer Braren and Julia A. Schnabel and Daniel M. Lang", "abstract": "Accurate spatial correspondence between medical images is essential for longitudinal analysis, lesion tracking, and image-guided interventions. Medical image registration methods rely on local intensity-based similarity measures, which fail to capture global semantic structure and often yield mismatches in low-contrast or anatomically variable regions. Recent advances in diffusion models suggest that their intermediate representations encode rich geometric and semantic information. We present MedDIFT, a training-free 3D correspondence framework that leverages multi-scale features from a pretrained latent medical diffusion model as voxel descriptors. MedDIFT fuses diffusion activations into rich voxel-wise descriptors and matches them via cosine similarity, with an optional local-search prior. On a publicly available lung CT dataset, MedDIFT shows promising capability in identifying anatomical correspondence without requiring any task-specific model training. Ablation experiments confirm that multi-level feature fusion and modest diffusion noise improve performance. Code is available online.", "link": "http://arxiv.org/abs/2512.05571v2", "date": "2026-02-23", "relevancy": 2.9837, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6199}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5852}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5852}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MedDIFT%3A%20Multi-Scale%20Diffusion-Based%20Correspondence%20in%203D%20Medical%20Imaging&body=Title%3A%20MedDIFT%3A%20Multi-Scale%20Diffusion-Based%20Correspondence%20in%203D%20Medical%20Imaging%0AAuthor%3A%20Xingyu%20Zhang%20and%20Anna%20Reithmeir%20and%20Fryderyk%20K%C3%B6gl%20and%20Rickmer%20Braren%20and%20Julia%20A.%20Schnabel%20and%20Daniel%20M.%20Lang%0AAbstract%3A%20Accurate%20spatial%20correspondence%20between%20medical%20images%20is%20essential%20for%20longitudinal%20analysis%2C%20lesion%20tracking%2C%20and%20image-guided%20interventions.%20Medical%20image%20registration%20methods%20rely%20on%20local%20intensity-based%20similarity%20measures%2C%20which%20fail%20to%20capture%20global%20semantic%20structure%20and%20often%20yield%20mismatches%20in%20low-contrast%20or%20anatomically%20variable%20regions.%20Recent%20advances%20in%20diffusion%20models%20suggest%20that%20their%20intermediate%20representations%20encode%20rich%20geometric%20and%20semantic%20information.%20We%20present%20MedDIFT%2C%20a%20training-free%203D%20correspondence%20framework%20that%20leverages%20multi-scale%20features%20from%20a%20pretrained%20latent%20medical%20diffusion%20model%20as%20voxel%20descriptors.%20MedDIFT%20fuses%20diffusion%20activations%20into%20rich%20voxel-wise%20descriptors%20and%20matches%20them%20via%20cosine%20similarity%2C%20with%20an%20optional%20local-search%20prior.%20On%20a%20publicly%20available%20lung%20CT%20dataset%2C%20MedDIFT%20shows%20promising%20capability%20in%20identifying%20anatomical%20correspondence%20without%20requiring%20any%20task-specific%20model%20training.%20Ablation%20experiments%20confirm%20that%20multi-level%20feature%20fusion%20and%20modest%20diffusion%20noise%20improve%20performance.%20Code%20is%20available%20online.%0ALink%3A%20http%3A//arxiv.org/abs/2512.05571v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMedDIFT%253A%2520Multi-Scale%2520Diffusion-Based%2520Correspondence%252 571v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MedDIFT%3A%20Multi-Scale%20Diffusion-Based%20Correspondence%20in%203D%20Medical%20Imaging&entry.906535625=Xingyu%20Zhang%20and%20Anna%20Reithmeir%20and%20Fryderyk%20K%C3%B6gl%20and%20Rickmer%20Braren%20and%20Julia%20A.%20Schnabel%20and%20Daniel%20M.%20Lang&entry.1292438233=Accurate%20spatial%20correspondence%20between%20medical%20images%20is%20essential%20for%20longitudinal%20analysis%2C%20lesion%20tracking%2C%20and%20image-guided%20interventions.%20Medical%20image%20registration%20methods%20rely%20on%20local%20intensity-based%20similarity%20measures%2C%20which%20fail%20to%20capture%20global%20semantic%20structure%20and%20often%20yield%20mismatches%20in%20low-contrast%20or%20anatomically%20variable%20regions.%20Recent%20advances%20in%20diffusion%20models%20suggest%20that%20their%20intermediate%20representations%20encode%20rich%20geometric%20and%20semantic%20information.%20We%20present%20MedDIFT%2C%20a%20training-free%203D%20correspondence%20framework%20that%20leverages%20multi-scale%20features%20from%20a%20pretrained%20latent%20medical%20diffusion%20model%20as%20voxel%20descriptors.%20MedDIFT%20fuses%20diffusion%20activations%20into%20rich%20voxel-wise%20descriptors%20and%20matches%20them%20via%20cosine%20similarity%2C%20with%20an%20optional%20local-search%20prior.%20On%20a%20publicly%20available%20lung%20CT%20dataset%2C%20MedDIFT%20shows%20promising%20capability%20in%20identifying%20anatomical%20correspondence%20without%20requiring%20any%20task-specific%20model%20training.%20Ablation%20experiments%20confirm%20that%20multi-level%20feature%20fusion%20and%20modest%20diffusion%20noise%20improve%20performance.%20Code%20is%20available%20online.&entry.1838667208=http%3A//arxiv.org/abs/2512.05571v2&entry.124074799=Read"},
{"title": "RL-RIG: A Generative Spatial Reasoner via Intrinsic Reflection", "author": "Tianyu Wang and Zhiyuan Ma and Qian Wang and Xinyi Zhang and Xinwei Long and Bowen Zhou", "abstract": "Recent advancements in image generation have achieved impressive results in producing high-quality images. However, existing image generation models still generally struggle with a spatial reasoning dilemma, lacking the ability to accurately capture fine-grained spatial relationships from the prompt and correctly generate scenes with structural integrity. To mitigate this dilemma, we propose RL-RIG, a Reinforcement Learning framework for Reflection-based Image Generation. Our architecture comprises four primary components: Diffuser, Checker, Actor, and Inverse Diffuser, following a Generate-Reflect-Edit paradigm to spark the Chain of Thought reasoning ability in image generation for addressing the dilemma. To equip the model with better intuition over generation trajectories, we further develop Reflection-GRPO to train the VLM Actor for edit prompts and the Image Editor for better image quality under a given prompt, respectively. Unlike traditional approaches that solely produce visually stunning yet structurally unreasonable content, our evaluation metrics prioritize spatial accuracy, utilizing Scene Graph IoU and employing a VLM-as-a-Judge strategy to assess the spatial consistency of generated images on LAION-SG dataset. Experimental results show that RL-RIG outperforms existing state-of-the-art open-source models by up to 11% in terms of controllable and precise spatial reasoning in image generation.", "link": "http://arxiv.org/abs/2602.19974v1", "date": "2026-02-23", "relevancy": 2.9389, "topK": [{"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5973}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5859}, {"titl RIG%2C%20a%20Reinforcement%20Learning%20framework%20for%20Reflection-based%20Image%20Generation.%20Our%20architecture%20comprises%20four%20primary%20components%3A%20Diffuser%2C%20Checker%2C%20Actor%2C%20and%20Inverse%20Diffuser%2C%20following%20a%20Generate-Reflect-Edit%20paradigm%20to%20spark%20the%20Chain%20of%20Thought%20reasoning%20ability%20in%20image%20generation%20for%20addressing%20the%20dilemma.%20To%20equip%20the%20model%20with%20better%20intuition%20over%20generation%20trajectories%2C%20we%20further%20develop%20Reflection-GRPO%20to%20train%20the%20VLM%20Actor%20for%20edit%20prompts%20and%20the%20Image%20Editor%20for%20better%20image%20quality%20under%20a%20given%20prompt%2C%20respectively.%20Unlike%20traditional%20approaches%20that%20solely%20produce%20visually%20stunning%20yet%20structurally%20unreasonable%20content%2C%20our%20evaluation%20metrics%20prioritize%20spatial%20accuracy%2C%20utilizing%20Scene%20Graph%20IoU%20and%20employing%20a%20VLM-as-a-Judge%20strategy%20to%20assess%20the%20spatial%20consistency%20of%20generated%20images%20on%20LAION-SG%20dataset.%20Experimental%20results%20show%20that%20RL-RIG%20outperforms%20existing%20state-of-the-art%20open-source%20models%20by%20up%20to%2011%25%20in%20terms%20of%20controllable%20and%20precise%20spatial%20reasoning%20in%20image%20generation.&entry.1838667208=http%3A//arxiv.org/abs/2602.19974v1&entry.124074799=Read"},
{"title": "TeHOR: Text-Guided 3D Human and Object Reconstruction with Textures", "author": "Hyeongjin Nam and Daniel Sungho Jung and Kyoung Mu Lee", "abstract": "Joint reconstruction of 3D human and object from a single image is an active research area, with pivotal applications in robotics and digital content creation. Despite recent advances, existing approaches suffer from two fundamental limitations. First, their reconstructions rely heavily on physical contact information, which inherently cannot capture non-contact human-object interactions, such as gazing at or pointing toward an object. Second, the reconstruction process is primarily driven by local geometric proximity, neglecting the human and object appearances that provide global context crucial for understanding holistic interactions. To address these issues, we introduce TeHOR, a framework built upon two core designs. First, beyond contact information, our framework leverages text descriptions of human-object interactions to enforce semantic alignment between the 3D reconstruction and its textual cues, enabling reasoning over a wider spectrum of interactions, including non-contact cases. Second, we incorporate appearance cues of the 3D human and object into the alignment process to capture holistic contextual information, thereby ensuring visually plausible reconstructions. As a result, our framework produces accurate and semantically coherent reconstructions, achieving state-of-the-art performance.", "link": "http://arxiv.org/abs/2602.19679v1", "date": "2026-02-23", "relevancy": 2.9313, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6009}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5848}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5732}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TeHOR%3A%20Text-Guided%203D%20Human%20and%20Object%20Reconstruction%20with%20Textures&body=Title%3A%20TeHOR%3A%20Text-Guided%203D%20Human%20and%20Object%20Reconstruction%20with%20Textures%0AAuthor%3A%20Hyeongjin%20Nam%20and%20Daniel%20Sungho%20Jung%20and%20Kyoung%20Mu%20Lee%0AAbstract%3A%20Joint%20reconstruction%20of%203D%20human%20and%20object%20from%20a%20single%20image%20is%20an%20active%20research%20area%2C%20with%20pivotal%20applications%20in%20robotics%20and%20digital%20content%20creation.%20Despite%20recent%20advances%2C%20existing%20approaches%20suffer%20from%20two%20fundamental%20limitations.%20First%2C%20their%20reconstructions%20rely%20heavily%20on%20physical%20contact%20information%2C%20which%20inherently%20cannot%20capture%20non-contact%20human-object%20interactions%2C%20such%20as%20gazing%20at%20or%20pointing%20toward%20an%20object.%20Second%2C%20the%20reconstruction%20process%20is%20primarily%20driven%20by%20local%20geometric%20proximity%2C%20neglecting%20the%20human%20and%20object%20appearances%20that%20provide%20global%20context%20crucial%20for%20understanding%20holistic%20interactions.%20To%20address%20these%20issues%2C%20we%20introduce%20TeHOR%2C%20a%20framework%20built%20upon%20two%20core%20designs.%20First%2C%20beyond%20contact%20information%2C%20our%20framework%20leverages%20text%20descriptions%20of%20human-object%20interactions%20to%20enforce%20semantic%20alignment%20between%20the%203D%20reconstruction%20and%20its%20textual%20cues%2C%20enabling%20reasoning%20over%20a%20wider%20spectrum%20of%20interactions%2C%20including%20non-contact%20cases.%20Second%2C%20we%20incorporate%20appearance%20cues%20of%20the%203D%20human%20and%20object%20into%20the%20alignment%20process%20to%20capture%20holistic%20contextual%20information%2C%20thereby%20ensuring%20visually%20plausible%20reconstructions.%20As%20a%20result%2C%20our%20framework%20produces%20accurate%20and%20semantically%20coherent%20reconstructions%2C%20achieving%20state-of-the-art%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19679v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTeHOR%253A%2520Text-Guided%25203D%2520Human%2520and%2520Object%2520Reconstruction%2520with%2520Textures%26entry.906535625%3DHyeongjin%2520Nam%2520and%2520Daniel%2520Sungho%2520Jung%2520and%2520Kyoung%2520Mu%2520Lee%26entry.1292438233%3DJoint%2520reconstruction%2520of%25203D%2520human%2520and%2520object%2520from%2520a%2520single%2520image%2520is%2520an%2520active%2520research%2520area%252C%2520with%2520pivotal%2520applications%2520in%2520robotics%2520and%2520digital%2520content%2520creation.%2520Despite%2520recent%2520advances%252C%2520existing%2520approaches%2520suffer%2520from%2520two%2520fundamental%2520limitations.%2520First%252C%2520their%2520reconstructions%2520rely%2520heavily%2520on%2520physical%2520contact%2520information%252C%2520which%2520inherently%2520cannot%2520capture%2520non-contact%2520human-object%2520interactions%252C%2520such%2520as%2520gazing%2520at%2520or%2520pointing%2520toward%2520an%2520object.%2520Second%252C%2520the%2520reconstruction%2520process%2520is%2520primarily%2520driven%2520by%2520local%2520geometric%2520proximity%252C%2520neglecting%2520the%2520human%2520and%2520object%2520appearances%2520that%2520provide%2520global%2520context%2520crucial%2520for%2520understanding%2520holistic%2520interactions.%2520To%2520address%2520these%2520issues%252C%2520we%2520introduce%2520TeHOR%252C%2520a%2520framework%2520built%2520upon%2520two%2520core%2520designs.%2520First%252C%2520beyond%2520contact%2520information%252C%2520our%2520framework%2520leverages%2520text%2520descriptions%2520of%2520human-object%2520interactions%2520to%2520enforce%2520semantic%2520alignment%2520between%2520the%25203D%2520reconstruction%2520and%2520its%2520textual%2520cues%252C%2520enabling%2520reasoning%2520over%2520a%2520wider%2520spectrum%2520of%2520interactions%252C%2520including%2520non-contact%2520cases.%2520Second%252C%2520we%2520incorporate%2520appearance%2520cues%2520of%2520the%25203D%2520human%2520and%2520object%2520into%2520the%2520alignment%2520process%2520to%2520capture%2520holistic%2520contextual%2520information%252C%2520thereby%2520ensuring%2520visually%2520plausible%2520reconstructions.%2520As%2520a%2520result%252C%2520our%2520framework%2520produces%2520accurate%2520and%2520semantically%2520coherent%2520reconstructions%252C%2520achieving%2520state-of-the-art%2520performance.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.19679v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=TeHOR%3A%20Text-Guided%203D%20Human%20and%20Object%20Reconstruction%20with%20Textures&entry.906535625=Hyeongjin%20Nam%20and%20Daniel%20Sungho%20Jung%20and%20Kyoung%20Mu%20Lee&entry.1292438233=Joint%20reconstruction%20of%203D%20human%20and%20object%20from%20a%20single%20image%20is%20an%20active%20research%20area%2C%20with%20pivotal%20applications%20in%20robotics%20and%20digital%20content%20creation.%20Despite%20recent%20advances%2C%20existing%20approaches%20suffer%20from%20two%20fundamental%20limitations.%20First%2C%20their%20reconstructions%20rely%20heavily%20on%20physical%20contact%20information%2C%20which%20inherently%20cannot%20capture%20non-contact%20human-object%20interactions%2C%20such%20as%20gazing%20at%20or%20pointing%20toward%20an%20object.%20Second%2C%20the%20reconstruction%20process%20is%20primarily%20driven%20by%20local%20geometric%20proximity%2C%20neglecting%20the%20human%20and%20object%20appearances%20that%20provide%20global%20context%20crucial%20for%20understanding%20holistic%20interactions.%20To%20address%20these%20issues%2C%20we%20introduce%20TeHOR%2C%20a%20framework%20built%20upon%20two%20core%20designs.%20First%2C%20beyond%20contact%20information%2C%20our%20framework%20leverages%20t {"title": "Universal Pose Pretraining for Generalizable Vision-Language-Action Policies", "author": "Haitao Lin and Hanyang Yu and Jingshun Huang and He Zhang and Yonggen Ling and Ping Tan and Xiangyang Xue and Yanwei Fu", "abstract": "Existing Vision-Language-Action (VLA) models often suffer from feature collapse and low training efficiency because they entangle high-level perception with sparse, embodiment-specific action supervision. Since these models typically rely on VLM backbones optimized for Visual Question Answering (VQA), they excel at semantic identification but often overlook subtle 3D state variations that dictate distinct action patterns.\n  To resolve these misalignments, we propose Pose-VLA, a decoupled paradigm that separates VLA training into a pre-training phase for extracting universal 3D spatial priors in a unified camera-centric space, and a post-training phase for efficient embodiment alignment within robot-specific action space. By introducing discrete pose tokens as a universal representation, Pose-VLA seamlessly integrates spatial grounding from diverse 3D datasets with geometry-level trajectories from robotic demonstrations. Our framework follows a two-stage pre-training pipeline, establishing fundamental spatial grounding via poses followed by motion alignment through trajectory supervision.\n  Extensive evaluations demonstrate that Pose-VLA achieves state-of-the-art results on RoboTwin 2.0 with a 79.5% average success rate and competitive performance on LIBERO at 96.0%. Real-world experiments further showcase robust generalization across diverse objects using only 100 demonstrations per task, validating the efficiency of our pre-training paradigm.", "link": "http://arxiv.org/abs/2602.19710v1", "date": "2026-02-23", "relevancy": 2.8757, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5755}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5755}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5744}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Universal%20Pose%20Pretraining%20for%20Generalizable%20Vision-Language-Action%20Policies&body=Title%3A%20Universal%20Pose%20Pretraining%20for%20Generalizable%20Vision-Language-Action%20Policies%0AAuthor%3A%20Haitao%20Lin%20and%20Hanyang%20Yu%20and%20Jingshun%20Huang%20and%20He%20Zhang%20and%20Yonggen%20Ling%20and%20Ping%20Tan%20and%20Xiangyang%20Xue%20and%20Yanwei%20Fu%0AAbstract%3A%20Existing%20Vision-Language-Action%20%28VLA%29%20models%20often%20suffer%20from%20feature%20collapse%20and%20low%20training%20efficiency%20because%20they%20entangle%20high-level%20perception%20with%20sparse%2C%20embodiment-specific%20action%20supervision.%20Since%20these%20models%20typically%20rely%20on%20VLM%20backbones%20optimized%20for%20Visual%20Question%20Answering%20%28VQA%29%2C%20they%20excel%20at%20semantic%20identification%20but%20often%20overlook%20subtle%203D%20state%20variations%20that%20dictate%20distinct%20action%20patterns.%0A%20%20To%20resolve%20these%20misalignments%2C%20we%20propose%20Pose-VLA%2C%20a%20decoupled%20paradigm%20that%20separates%20VLA%20training%20into%20a%20pre-training%20phase%20for%20extracting%20universal%203D%20spatial%20priors%20in%20a%20unified%20camera-centric%20space%2C%20and%20a%20post-training%20phase%20for%20efficient%20embodiment%20alignment%20within%20robot-specific%20action%20space.%20By%20introducing%20discrete%20pose%20tokens%20as%20a%20universal%20representation%2C%20Pose-VLA%20seamlessly%20integrates%20spatial%20grounding%20from%20diverse%203D%20datasets%20with%20geometry-level%20trajectories%20from%20robotic%20demonstrations.%20Our%20framework%20follows%20a%20two-stage%20pre-training%20pipeline%2C%20establishing%20fundamental%20spatial%20grounding%20via%20poses%20followed%20by%20motion%20alignment%20through%20trajectory%20supervision.%0A%20%20Extensive%20evaluations%20demonstrate%20that%20Pose-VLA%20achieves%20state-of-the-art%20results%20on%20RoboTwin%202.0%20with%20a%2079.5%25%20average%20success%20rate%20and%20competitive%20performance%20on%20LIBERO%20at%2096.0%25.%20Real-world%20experiments%20further%20showcase%20robust%20generalization%20across%20diverse%20objects%20using%20only%20100%20demonstrations%20per%20task%2C%20validating%20the%20efficiency%20of%20our%20pre-training%20paradigm.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19710v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUniversal%2520Pose%2520Pretraining%2520for%2520Generalizable%2520Vision-Language-Action%2520Policies%26entry.906535625%3DHaitao%2520Lin%2520and%2520Hanyang%2520Yu%2520and%2520Jingshun%2520Huang%2520and%2520He%2520Zhang%2520and%2520Yonggen%2520Ling%2520and%2520Ping%2520Tan%2520and%2520Xiangyang%2520Xue%2520and%2520Yanwei%2520Fu%26entry.1292438233%3DExisting%2520Vision-Language-Action%2520%2528VLA%2529%2520models%2520often%2520suffer%2520from%2520feature%2520collapse%2520and%2520low%2520training%2520efficiency%2520because%2520they%2520entangle%2520high-level%2520perception%2520with%2520sparse%252C%2520embodiment-specific%2520action%2520supervision.%2520Since%2520these%2520models%2520typically%2520rely%2520on%2520VLM%2520backbones%2520optimized%2520for%2520Visual%2520Question%2520Answering%2520%2528VQA%2529%252C%2520they%2520excel%2520at%2520semantic%2520identification%2520but%2520often%2520overlook%2520subtle%25203D%2520state%2520variations%2520that%2520dictate%2520distinct%2520action%2520patterns.%250A%2520%2520To%2520resolve%2520these%2520misalignments%252C%2520we%2520propose%2520Pose-VLA%252C%2520a%2520decoupled%2520paradigm%2520that%2520separates%2520VLA%2520training%2520into%2520a%2520pre- e%20collapse%20and%20low%20training%20efficiency%20because%20they%20entangle%20high-level%20perception%20with%20sparse%2C%20embodiment-specific%20action%20supervision.%20Since%20these%20models%20typically%20rely%20on%20VLM%20backbones%20optimized%20for%20Visual%20Question%20Answering%20%28VQA%29%2C%20they%20excel%20at%20semantic%20identification%20but%20often%20overlook%20subtle%203D%20state%20variations%20that%20dictate%20distinct%20action%20patterns.%0A%20%20To%20resolve%20these%20misalignments%2C%20we%20propose%20Pose-VLA%2C%20a%20decoupled%20paradigm%20that%20separates%20VLA%20training%20into%20a%20pre-training%20phase%20for%20extracting%20universal%203D%20spatial%20priors%20in%20a%20unified%20camera-centric%20space%2C%20and%20a%20post-training%20phase%20for%20efficient%20embodiment%20alignment%20within%20robot-specific%20action%20space.%20By%20introducing%20discrete%20pose%20tokens%20as%20a%20universal%20representation%2C%20Pose-VLA%20seamlessly%20integrates%20spatial%20grounding%20from%20diverse%203D%20datasets%20with%20geometry-level%20trajectories%20from%20robotic%20demonstrations.%20Our%20framework%20follows%20a%20two-stage%20pre-training%20pipeline%2C%20establishing%20fundamental%20spatial%20grounding%20via%20poses%20followed%20by%20motion%20alignment%20through%20trajectory%20supervision.%0A%20%20Extensive%20evaluations%20demonstrate%20that%20Pose-VLA%20achieves%20state-of-the-art%20results%20on%20RoboTwin%202.0%20with%20a%2079.5%25%20average%20success%20rate%20and%20competitive%20performance%20on%20LIBERO%20at%2096.0%25.%20Real-world%20experiments%20further%20showcase%20robust%20generalization%20across%20diverse%20objects%20using%20only%20100%20demonstrations%20per%20task%2C%20validating%20the%20efficiency%20of%20our%20pre-training%20paradigm.&entry.1838667208=http%3A//arxiv.org/abs/2602.19710v1&entry.124074799=Read"},
{"title": "FineVAU: A Novel Human-Aligned Benchmark for Fine-Grained Video Anomaly Understanding", "author": "Jo\u00e3o Pereira and Vasco Lopes and Jo\u00e3o Neves and David Semedo", "abstract": "Video Anomaly Understanding (VAU) is a novel task focused on describing unusual occurrences in videos. Despite growing interest, the evaluation of VAU remains an open challenge. Existing benchmarks rely on n-gram-based metrics (e.g., BLEU, ROUGE-L) or LLM-based evaluation. The first fails to capture the rich, free-form, and visually grounded nature of LVLM responses, while the latter focuses on assessing language quality over factual relevance, often resulting in subjective judgments that are misaligned with human perception. In this work, we address this issue by proposing FineVAU, a new benchmark for VAU that shifts the focus towards rich, fine-grained and domain-specific understanding of anomalous videos. We formulate VAU as a three-fold problem, with the goal of comprehensively understanding key descriptive elements of anomalies in video: events (What), participating entities (Who) and location (Where). Our benchmark introduces a) FVScore, a novel, human-aligned evaluation metric that assesses the presence of critical visual elements in LVLM answers, providing interpretable, fine-grained feedback; and b) FineW3, a novel, comprehensive dataset curated through a structured and fully automatic procedure that augments existing human annotations with high quality, fine-grained visual information. Human evaluation reveals that our proposed metric has a superior alignment with human perception of anomalies in comparison to current approaches. Detailed experiments on FineVAU unveil critical limitations in LVLM's ability to perceive anomalous events that require spatial and fine-grained temporal understanding, despite strong performance on coarse grain, static information, and events with strong visual cues.", "link": "http://arxiv.org/abs/2601.17258v2", "date": "2026-02-23", "relevancy": 2.8581, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.6257}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5446}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5446}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FineVAU%3A%20A%20Novel%20Human-Aligned%20Benchmark%20for%20Fine-Grained%20Video%20Anomaly%20Understanding&body=Title%3A%20FineVAU%3A%20A%20Novel%20Human-Aligned%20Benchmark%20for%20Fine-Grained%20Video%20Anomaly%20Understanding%0AAuthor%3A%20Jo%C3%A3o%20Pereira%20and%20Vasco%20Lopes%20and%20Jo%C3%A3o%20Neves%20and%20David%20Semedo%0AAbstract%3A%20Video%20Anomaly%20Understanding%20%28VAU%29%20is%20a%20novel%20task%20focused%20on%20describing%20unusual%20occurrences%20in%20videos.%20Despite%20growing%20interest%2C%20the%20evaluation%20of%20VAU%20remains%20an%20open%20challenge.%20Existing%20benchmarks%20rely%20on%20n-gram-based%20metrics%20%28e.g.%2C%20BLEU%2C%20ROUGE-L%29%20or%20LLM-based%20evaluation.%20The%20first%20fails%20to%20capture%20the%20rich%2C%20free-form%2C%20and%20visually%20grounded%20nature%20of%20LVLM%20responses%2C%20while%20the%20latter%20focuses%20on%20assessing%20language%20quality%20over%20factual%20relevance%2C%20often%20resulting%20in%20subjective%20judgments%20that%20are%20misaligned%20with%20human%20perception.%20In%20this%20work%2C%20we%20address%20this%20issue%20by%20proposing%20FineVAU%2C%20a%20new%20benchmark%20for%20VAU%20that%20shifts%20the%20focus%20towards%20rich%2C%20fine-grained%20and%20domain-specific%20understanding%20of%20anomalous%20videos.%20We%20formulate%20VAU%20as%20a%20three-fold%20problem%2C%20with%20the%20goal%20of%20comprehensively%20understanding%20key%20descriptive%20elements%20of%20anomalies%20in%20video%3A%20events%20%28What%29%2C%20participating%20entities%20%28Who%29%20and%20location%20%28Where%29.%20Our%20benchmark%20introduces%20a%29%20FVScore%2C%20a%20novel%2C%20human-aligned%20evaluation%20metric%20that%20assesses%20the%20presence%20of%20critical%20visual%20elements%20in%20LVLM%20answers%2C%20providing%20interpretable%2C%20fine-grained%20feedback%3B%20and%20b%29%20FineW3%2C%20a%20novel%2C%20comprehensive%20dataset%20curated%20through%20a%20structured%20and%20fully%20automatic%20procedure%20that%20augments%20existing%20human%20annotations%20with%20high%20quality%2C%20fine-grained%20visual%20information.%20Human%20evaluation%20reveals%20that%20our%20proposed%20metric%20has%20a%20superior%20alignment%20with%20human%20perception%20of%20anomalies%20in%20comparison%20to%20current%20approaches.%20Detailed%20experiments%20on%20FineVAU%20unveil%20critical%20limitations%20in%20LVLM%27s%20ability%20to%20perceive%20anomalous%20events%20that%20require%20spatial%20and%20fine-grained%20temporal%20understanding%2C%20despite%20strong%20performance%20on%20coarse%20grain%2C%20static%20information%2C%20and%20events%20with%20strong%20visual%20cues.%0ALink%3A%20http%3A//arxiv.org/abs/2601.17258v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFineVAU%253A%2520A%2520Novel%2520Human-Aligned%2520Benchmark%2520for%2520Fine-Grained%2520Video%2520Anomaly%2520Understanding%26entry.906535625%3DJo%25C3%25A3o%2520Pereira%2520and%2520Vasco%2520Lopes%2520and%2520Jo%25C3%25A3o%2520Neves%2520and%2520David%2520Semedo%26entry.1292438233%3DVideo%2520Anomaly%2520Understanding%2520%2528VAU%2529%2520is%2520a%2520novel%2520task%2520focused%2520on%2520describing%2520unusual%2520occurrences%2520in%2520videos.%2520Despite%2520growing%2520interest%252C%2520the%2520evaluation%2520of%2520VAU%2520remains%2520an%2520open%2520challenge.%2520Existing%2520benchmarks%2520rely%2520on%2520n-gram-based%2520metrics%2520%2528e.g.%252C%2520BLEU%252C%2520ROUGE-L%2529%2520or%2520LLM-based%2520evaluation.%2520The%2520first%2520fails%2520to%2520capture%2520the%2520rich%252C%2520free-form%252C%2520and%2520visually%2520grounded%2520nature%2520of%2520LVLM%2520responses%252C%2520while%2520the%2520latter%2520focuses%2520on%2520assessing%2520language%2520quality%2520over%2520factual%2520relevance%252C%2520often%2520resulting%2520in%2520subjective%2520judgments%2520that%2520are%2520misaligned%2520with%2520human%2520perception.%2520In%2520this%2520work%252C%2520we%2520address%2520this%2520issue%2520by%2520proposing%2520FineVAU%252C%2520a%2520new%2520benchmark%2520for%2520VAU%2520that%2520shifts%2520the%2520focus%2520towards%2520rich%252C%2520fine-grained%2520and%2520domain-specific%2520understanding%2520of%2520anomalous%2520videos.%2520We%2520formulate%2520VAU%2520as%2520a%2520three-fold%2520problem%252C%2520with%2520the%2520goal%2520of%2520comprehensively%2520understanding%2520key%2520descriptive%2520elements%2520of%2520anomalies%2520in%2520video%253A%2520events%2520%2528What%2529%252C%2520participating%2520entities%2520%2528Who%2529%2520and%2520location%2520%2528Where%2529.%2520Our%2520benchmark%2520introduces%2520a%2529%2520FVScore%252C%2520a%2520novel%252C%2520human-aligned%2520evaluation%2520metric%2520that%2520assesses%2520the%2520presence%2520of%2520critical%2520visual%2520elements%2520in%2520LVLM%2520answers%252C%2520providing%2520interpretable%252C%2520fine-grained%2520feedback%253B%2520and%2520b%2529%2520FineW3%252C%2520a%2520novel%252C%2520comprehensive%2520dataset%2520curated%2520through%2520a%2520structured%2520and%2520fully%2520automatic%2520procedure%2520that%2520augments%2520existing%2520human%2520annotations%2520with%2520high%2520quality%252C%2520fine-grained%2520visual%2520information.%2520Human%2520evaluation%2520reveals%2520that%2520our%2520proposed%2520metric%2520has%2520a%2520superior%2520alignment%2520with%2520human%2520p

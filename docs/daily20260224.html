{"title": "Unleashing the Power of Discrete-Time State Representation: Ultrafast Target-based IMU-Camera Spatial-Temporal Calibration", "author": "Junlin Song and Antoine Richard and Miguel Olivares-Mendez", "abstract": "Visual-inertial fusion is crucial for a large amount of intelligent and autonomous applications, such as robot navigation and augmented reality. To bootstrap and achieve optimal state estimation, the spatial-temporal displacements between IMU and cameras must be calibrated in advance. Most existing calibration methods adopt continuous-time state representation, more specifically the B-spline. Despite these methods achieve precise spatial-temporal calibration, they suffer from high computational cost caused by continuous-time state representation. To this end, we propose a novel and extremely efficient calibration method that unleashes the power of discrete-time state representation. Moreover, the weakness of discrete-time state representation in temporal calibration is tackled in this paper. With the increasing production of drones, cellphones and other visual-inertial platforms, if one million devices need calibration around the world, saving one minute for the calibration of each device means saving 2083 work days in total. To benefit both the research and industry communities, the open-source implementation is released at https://github.com/JunlinSong/DT-VI-Calib.", "link": "http://arxiv.org/abs/2509.12846v2", "date": "2026-02-23", "relevancy": 2.2401, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5943}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5582}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5482}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unleashing%20the%20Power%20of%20Discrete-Time%20State%20Representation%3A%20Ultrafast%20Target-based%20IMU-Camera%20Spatial-Temporal%20Calibration&body=Title%3A%20Unleashing%20the%20Power%20of%20Discrete-Time%20State%20Representation%3A%20Ultrafast%20Target-based%20IMU-Camera%20Spatial-Temporal%20Calibration%0AAuthor%3A%20Junlin%20Song%20and%20Antoine%20Richard%20and%20Miguel%20Olivares-Mendez%0AAbstract%3A%20Visual-inertial%20fusion%20is%20crucial%20for%20a%20large%20amount%20of%20intelligent%20and%20autonomous%20applications%2C%20such%20as%20robot%20navigation%20and%20augmented%20reality.%20To%20bootstrap%20and%20achieve%20optimal%20state%20estimation%2C%20the%20spatial-temporal%20displacements%20between%20IMU%20and%20cameras%20must%20be%20calibrated%20in%20advance.%20Most%20existing%20calibration%20methods%20adopt%20continuous-time%20state%20representation%2C%20more%20specifically%20the%20B-spline.%20Despite%20these%20methods%20achieve%20precise%20spatial-temporal%20calibration%2C%20they%20suffer%20from%20high%20computational%20cost%20caused%20by%20continuous-time%20state%20representation.%20To%20this%20end%2C%20we%20propose%20a%20novel%20and%20extremely%20efficient%20calibration%20method%20that%20unleashes%20the%20power%20of%20discrete-time%20state%20representation.%20Moreover%2C%20the%20weakness%20of%20discrete-time%20state%20representation%20in%20temporal%20calibration%20is%20tackled%20in%20this%20paper.%20With%20the%20increasing%20production%20of%20drones%2C%20cellphones%20and%20other%20visual-inertial%20platforms%2C%20if%20one%20million%20devices%20need%20calibration%20around%20the%20world%2C%20saving%20one%20minute%20for%20the%20calibration%20of%20each%20device%20means%20saving%202083%20work%20days%20in%20total.%20To%20benefit%20both%20the%20research%20and%20industry%20communities%2C%20the%20open-source%20implementation%20is%20released%20at%20https%3A//github.com/JunlinSong/DT-VI-Calib.%0ALink%3A%20http%3A//arxiv.org/abs/2509.12846v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnleashing%2520the%2520Power%2520of%2520Discrete-Time%2520State%2520Representation%253A%2520Ultrafast%2520Target-based%2520IMU-Camera%2520Spatial-Temporal%2520Calibration%26entry.906535625%3DJunlin%2520Song%2520and%2520Antoine%2520Richard%2520and%2520Miguel%2520Olivares-Mendez%26entry.1292438233%3DVisual-inertial%2520fusion%2520is%2520crucial%2520for%2520a%2520large%2520amount%2520of%2520intelligent%2520and%2520autonomous%2520applications%252C%2520such%2520as%2520robot%2520navigation%2520and%2520augmented%2520reality.%2520To%2520bootstrap%2520and%2520achieve%2520optimal%2520state%2520estimation%252C%2520the%2520spatial-temporal%2520displacements%2520between%2520IMU%2520and%2520cameras%2520must%2520be%2520calibrated%2520in%2520advance.%2520Most%2520existing%2520calibration%2520methods%2520adopt%2520continuous-time%2520state%2520representation%252C%2520more%2520specifically%2520the%2520B-spline.%2520Despite%2520these%2520methods%2520achieve%2520precise%2520spatial-temporal%2520calibration%252C%2520they%2520suffer%2520from%2520high%2520computational%2520cost%2520caused%2520by%2520continuous-time%2520state%2520representation.%2520To%2520this%2520end%252C%2520we%2520propose%2520a%2520novel%2520and%2520extremely%2520efficient%2520calibration%2520method%2520that%2520unleashes%2520the%2520power%2520of%2520discrete-time%2520state%2520representation.%2520Moreover%252C%2520the%2520weakness%2520of%2520discrete-time%2520state%2520representation%2520in%2520temporal%2520calibration%2520is%2520tackled%2520in%2520this%2520paper.%2520With%2520the%2520increasing%2520production%2520of%2520drones%252C%2520cellphones%2520and%2520other%2520visual-inertial%2520platforms%252C%2520if%2520one%2520million%2520devices%2520need%2520calibration%2520around%2520the%2520world%252C%2520saving%2520one%2520minute%2520for%2520the%2520calibration%2520of%2520each%2520device%2520means%2520saving%25202083%2520work%2520days%2520in%2520total.%2520To%2520benefit%2520both%2520the%2520research%2520and%2520industry%2520communities%252C%2520the%2520open-source%2520implementation%2520is%2520released%2520at%2520https%253A//github.com/JunlinSong/DT-VI-Calib.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.12846v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Unleashing%20the%20Power%20of%20Discrete-Time%20State%20Representation%3A%20Ultrafast%20Target-based%20IMU-Camera%20Spatial-Temporal%20Calibration&entry.906535625=Junlin%20Song%20and%20Antoine%20Richard%20and%20Miguel%20Olivares-Mendez&entry.1292438233=Visual-inertial%20fusion%20is%20crucial%20for%20a%20large%20amount%20of%20intelligent%20and%20autonomous%20applications%2C%20such%20as%20robot%20navigation%20and%20augmented%20reality.%20To%20bootstrap%20and%20achieve%20optimal%20state%20estimation%2C%20the%20spatial-temporal%20displacements%20between%20IMU%20and%20cameras%20must%20be%20calibrated%20in%20advance.%20Most%20existing%20calibration%20methods%20adopt%20continuous-time%20state%20representation%2C%20more%20specifically%20the%20B-spline.%20Despite%20these%20methods%20achieve%20precise%20spatial-temporal%20calibration%2C%20they%20suffer%20from%20high%20computational%20cost%20caused%20by%20continuous-time%20state%20representation.%20To%20this%20end%2C%20we%20propose%20a%20novel%20and%20extremely%20efficient%20calibration%20method%20that%20unleashes%20the%20power%20of%20discrete-time%20state%20representation.%20Moreover%2C%20the%20weakness%20of%20discrete-time%20state%20representation%20in%20temporal%20calibration%20is%20tackled%20in%20this%20paper.%20With%20the%20increasing%20production%20of%20drones%2C%20cellphones%20and%20other%20visual-inertial%20platforms%2C%20if%20one%20million%20devices%20need%20calibration%20around%20the%20world%2C%20saving%20one%20minute%20for%20the%20calibration%20of%20each%20device%20means%20saving%202083%20work%20days%20in%20total.%20To%20benefit%20both%20the%20research%20and%20industry%20communities%2C%20the%20open-source%20implementation%20is%20released%20at%20https%3A//github.com/JunlinSong/DT-VI-Calib.&entry.1838667208=http%3A//arxiv.org/abs/2509.12846v2&entry.124074799=Read"},
{"title": "Generative 6D Pose Estimation via Conditional Flow Matching", "author": "Amir Hamza and Davide Boscaini and Weihang Li and Benjamin Busam and Fabio Poiesi", "abstract": "Existing methods for instance-level 6D pose estimation typically rely on neural networks that either directly regress the pose in $\\mathrm{SE}(3)$ or estimate it indirectly via local feature matching. The former struggle with object symmetries, while the latter fail in the absence of distinctive local features. To overcome these limitations, we propose a novel formulation of 6D pose estimation as a conditional flow matching problem in $\\mathbb{R}^3$. We introduce Flose, a generative method that infers object poses via a denoising process conditioned on local features. While prior approaches based on conditional flow matching perform denoising solely based on geometric guidance, Flose integrates appearance-based semantic features to mitigate ambiguities caused by object symmetries. We further incorporate RANSAC-based registration to handle outliers. We validate Flose on five datasets from the established BOP benchmark. Flose outperforms prior methods with an average improvement of +4.5 Average Recall. Project Website : https://tev-fbk.github.io/Flose/", "link": "http://arxiv.org/abs/2602.19719v1", "date": "2026-02-23", "relevancy": 2.2375, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5808}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5562}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5392}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generative%206D%20Pose%20Estimation%20via%20Conditional%20Flow%20Matching&body=Title%3A%20Generative%206D%20Pose%20Estimation%20via%20Conditional%20Flow%20Matching%0AAuthor%3A%20Amir%20Hamza%20 {"title": "Token-UNet: A New Case for Transformers Integration in Efficient and Interpretable 3D UNets for Brain Imaging Segmentation", "author": "Louis Fabrice Tshimanga and Andrea Zanola and Federico Del Pup and Manfredo Atzori", "abstract": "We present Token-UNet, adopting the TokenLearner and TokenFuser modules to encase Transformers into UNets.\n  While Transformers have enabled global interactions among input elements in medical imaging, current computational challenges hinder their deployment on common hardware. Models like (Swin)UNETR adapt the UNet architecture by incorporating (Swin)Transformer encoders, which process tokens that each represent small subvolumes ($8^3$ voxels) of the input.\n  The Transformer attention mechanism scales quadratically with the number of tokens, which is tied to the cubic scaling of 3D input resolution.\n  This work reconsiders the role of convolution and attention, introducing Token-UNets, a family of 3D segmentation models that can operate in constrained computational environments and time frames.\n  To mitigate computational demands, our approach maintains the convolutional encoder of UNet-like models, and applies TokenLearner to 3D feature maps. This module pools a preset number of tokens from local and global structures.\n  Our results show this tokenization effectively encodes task-relevant information, yielding naturally interpretable attention maps. The memory footprint, computation times at inference, and parameter counts of our heaviest model are reduced to 33\\%, 10\\%, and 35\\% of the SwinUNETR values, with better average performance (86.75\\% $\\pm 0.19\\%$ Dice score for SwinUNETR vs our 87.21\\% $\\pm 0.35\\%$).\n  This work opens the way to more efficient trainings in contexts with limited computational resources, such as 3D medical imaging. Easing model optimization, fine-tuning, and transfer-learning in limited hardware settings can accelerate and diversify the development of approaches, for the benefit of the research community.", "link": "http://arxiv.org/abs/2602.20008v1", "date": "2026-02-23", "relevancy": 2.2178, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.563}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5532}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.536}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Token-UNet%3A%20A%20New%20Case%20for%20Transformers%20Integration%20in%20Efficient%20and%20Interpretable%203D%20UNets%20for%20Brain%20Imaging%20Segmentation&body=Title%3A%20Token-UNet%3A%20A%20New%20Case%20for%20Transformers%20Integration%20in%20Efficient%20and%20Interpretable%203D%20UNets%20for%20Brain%20Imaging%20Segmentation%0AAuthor%3A%20Louis%20Fabrice%20Tshimanga%20and%20Andrea%20Zanola%20and%20Federico%20Del%20Pup%20and%20Manfredo%20Atzori%0AAbstract%3A%20We%20present%20Token-UNet%2C%20adopting%20the%20TokenLearner%20and%20TokenFuser%20modules%20to%20encase%20Transformers%20into%20UNets.%0A%20%20While%20Transformers%20have%20enabled%20global%20interactions%20among%20input%20elements%20in%20medical%20imaging%2C%20current%20computational%20challenges%20hinder%20their%20deployment%20on%20common%20hardware.%20Models%20like%20%28Swin%29UNETR%20adapt%20the%20UNet%20architecture%20by%20incorporating%20%28Swin%29Transformer%20encoders%2C%20which%20process%20tokens%20that%20each%20represent%20small%20subvolumes%20%28%248%5E3%24%20voxels%29%20of%20the%20input.%0A%20%20The%20Transformer%20attention%20mechanism%20scales%20quadratically%20with%20the%20number%20of%20tokens%2C%20which%20is%20tied%20to%20the%20cubic%20scaling%20of%203D%20input%20resolution.%0A%20%20This%20work%20reconsiders%20the%20role%20of%20convolution%20and%20attention%2C%20introducing%20Token-UNets%2C%20a%20family%20of%203D%20segmentation%20models%20that%20can%20operate%20in%20constrained%20computational%20environments%20and%20time%20frames.%0A%20%20To%20mitigate%20computational%20demands%2C%20our%20approach%20maintains%20the%20convolutional%20encoder%20of%20UNet-like%20models%2C%20and%20applies%20TokenLearner%20to%203D%20feature%20maps.%20This%20module%20pools%20a%20preset%20number%20of%20tokens%20from%20local%20and%20global%20structures.%0A%20%20Our%20results%20show%20this%20tokenization%20effectively%20encodes%20task-relevant%20information%2C%20yielding%20naturally%20interpretable%20attention%20maps.%20The%20memory%20footprint%2C%20computation%20times%20at%20inference%2C%20and%20parameter%20counts%20of%20our%20heaviest%20model%20are%20reduced%20to%2033%5C%25%2C%2010%5C%25%2C%20and%2035%5C%25%20of%20the%20SwinUNETR%20values%2C%20with%20better%20average%20performance%20%2886.75%5C%25%20%24%5Cpm%200.19%5C%25%24%20Dice%20score%20for%20SwinUNETR%20vs%20our%2087.21%5C%25%20%24%5Cpm%200.35%5C%25%24%29.%0A%20%20This%20work%20opens%20the%20way%20to%20more%20efficient%20trainings%20in%20contexts%20with%20limited%20computational%20resources%2C%20such%20as%203D%20medical%20imaging.%20Easing%20model%20optimization%2C%20fine-tuning%2C%20and%20transfer-learning%20in%20limited%20hardware%20settings%20can%20accelerate%20and%20diversify%20the%20development%20of%20approaches%2C%20for%20the%20benefit%20of%20the%20research%20community.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20008v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DToken-UNet%253A%2520A%2520New%2520Case%2520for%2520Transformers%2520Integration%2520in%2520Efficient%2520and%2520Interpretable%25203D%2520UNets%2520for%2520Brain%2520Imaging%2520Segmentation%26entry.906535625%3DLouis%2520Fabrice%2520Tshimanga%2520and%2520Andrea%2520Zanola%2520and%2520Federico%2520Del%2520Pup%2520and%2520Manfredo%2520A {"title": "MergeMix: A Unified Augmentation Paradigm for Visual and Multi-Modal Understanding", "author": "Xin Jin and Siyuan Li and Siyong Jian and Kai Yu and Huan Wang", "abstract": "Vision-language alignment in multi-modal large language models (MLLMs) relies on supervised fine-tuning (SFT) or reinforcement learning (RL). To align multi-modal large language models (MLLMs) in the post-training stage, supervised fine-tuning (SFT) is a stable choice but requires human annotations and lacks task generalizations, while Reinforcement Learning (RL) searches for better answers from reward signals but suffers from computational overhead and instability. To achieve balance among scalability, efficiency, and alignment generalizations, we propose MergeMix, a unified paradigm that bridges SFT and RL with an efficient Token Merge based Mixup augmentation. As for the Mixup policy, we generate contextual aligned mixed images with the corresponding labels according to the merged attention maps with cluster regions. Then, we enhance the preference-driven paradigm for MLLMs by building preference pairs with raw images and MergeMix-generated ones and optimizing the soft preference margin with the mixed SimPO loss. Extensive experiments demonstrate that MergeMix not only achieves dominant classification accuracy as an augmentation method but also improves generalization abilities and alignment of MLLMs, providing a new learning paradigm for preference alignment with training efficiency and stability.", "link": "http://arxiv.org/abs/2510.23479v3", "date": "2026-02-23", "relevancy": 2.217, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.59}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5431}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5229}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MergeMix%3A%20A%20Unified%20Augmentation%20Paradigm%20for%20Visual%20and%20Multi-Modal%20Understanding&body=Title%3A%20MergeMix%3A%20A%20Unified%20Augmentation%20Paradigm%20for%20Visual%20and%20Multi-Modal%20Understanding%0AAuthor%3A%20Xin%20Jin%20and%20Siyuan%20Li%20and%20Siyong%20Jian%20and%20Kai%20Yu%20and%20Huan%20Wang%0AAbstract%3A%20Vision-language%20alignment%20in%20multi-modal%20large%20language%20models%20%28MLLMs%29%20relies%20on%20supervised%20fine-tuning%20%28SFT%29%20or%20reinforcement%20learning%20%28RL%29.%20To%20align%20multi-modal%20large%20language%20models%20%28MLLMs%29%20in%20the%20post-training%20stage%2C%20supervised%20fine-tuning%20%28SFT%29%20is%20a%20stable%20choice%20but%20requires%20human%20annotations%20and%20lacks%20task%20generalizations%2C%20while%20Reinforcement%20Learning%20%28RL%29%20searches%20for%20better%20answers%20from%20reward%20signals%20but%20suffers%20from%20computational%20overhead%20and%20instability.%20To%20achieve%20balance%20among%20scalability%2C%20efficiency%2C%20and%20alignment%20generalizations%2C%20we%20propose%20MergeMix%2C%20a%20unified%20paradigm%20that%20bridges%20SFT%20and%20RL%20with%20an%20efficient%20Token%20Merge%20based%20Mixup%20augmentation.%20As%20for%20the%20Mixup%20policy%2C%20we%20generate%20contextual%20aligned%20mixed%20images%20with%20the%20corresponding%20labels%20according%20to%20the%20merged%20attention%20maps%20with%20cluster%20regions.%20Then%2C%20we%20enhance%20the%20preference-driven%20paradigm%20for%20MLLMs%20by%20building%20preference%20pairs%20with%20raw%20images%20and%20MergeMix-generated%20ones%20and%20optimizing%20the%20soft%20preference%20margin%20with%20the%20mixed%20SimPO%20loss.%20Extensive%20experiments%20demonstrate%20that%20MergeMix%20not%20only%20achieves%20dominant%20classification%20accuracy%20as%20an%20augmentation%20method%20but%20also%20improves%20generalization%20abilities%20and%20alignment%20of%20MLLMs%2C%20providing%20a%20new%20learning%20paradigm%20for%20preference%20alignment%20with%20training%20efficiency%20and%20stability.%0ALink%3A%20http%3A//arxiv.org/abs/2510.23479v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMergeMix%253A%2520A%2520Unified%2520Augmentation%2520Paradigm%2520for%2520Visual%2520and%2520Multi-Modal%2520Understanding%26entry.906535625%3DXin%2520Jin%2520and%2520Siyuan%2520Li%2520and%2520Siyong%2520Jian%2520and%2520Kai%2520Yu%2520and%2520Huan%2520Wang%26entry.1292438233%3DVision-language%2520alignment%2520in%2520multi-modal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520relies%2520on%2520supervised%2520fine-tuning%2520%2528SFT%2529%2520or%2520reinforcement%2520learning%2520%2528RL%2529.%2520To%2520align%2520multi-modal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520in%2520the%2520post-training%2520stage%252C%2520supervised%2520fine-tuning%2520%2528SFT%2529%2520is%2520a%2520stable%2520choice%2520but%2520requires%2520human%2520annotations%2520and%2520lacks%2520task%2520generalizations%252C%2520while%2520Reinforcement%2520Learning%2520%2528RL%2529%2520searches%2520for%2520better%2520answers%2520from%2520reward%2520signals%2520but%2520suffers%2520from%2520computational%2520overhead%2520and%2520instability.%2520To%2520achieve%2520balance%2520among%2520scalability%252C%2520efficiency%252C%2520and%2520alignment%2520generalizations%252C%2520we%2520propose%2520MergeMix%252C%2520a%2520unified%2520paradigm%2520that%2520bridges%2520SFT%2520and%2520RL%2520with%2520an%2520efficient%2520Token%2520Merge%2520based%2520Mixup%2520augmentation.%2520As%2520for%2520the%2520Mixup%2520policy%252C%2520we%2520generate%2520contextual%2520aligned%2520mixed%2520imag {"title": "Drift Localization using Conformal Predictions", "author": "Fabian Hinder and Valerie Vaquet and Johannes Brinkrolf and Barbara Hammer", "abstract": "Concept drift -- the change of the distribution over time -- poses significant challenges for learning systems and is of central interest for monitoring. Understanding drift is thus paramount, and drift localization -- determining which samples are affected by the drift -- is essential. While several approaches exist, most rely on local testing schemes, which tend to fail in high-dimensional, low-signal settings. In this work, we consider a fundamentally different approach based on conformal predictions. We discuss and show the shortcomings of common approaches and demonstrate the performance of our approach on state-of-the-art image datasets.", "link": "http://arxiv.org/abs/2602.19790v1", "date": "2026-02-23", "relevancy": 2.2163, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5689}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5612}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.4993}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Drift%20Localization%20using%20Conformal%20Predictions&body=Title%3A%20Drift%20Localization%20using%20Conformal%20Predictions%0AAuthor%3A%20Fabian%20Hinder%20and%20Valerie%20Vaquet%20and%20Johannes%20Brinkrolf%20and%20Barbara%20Hammer%0AAbstract%3A%20Concept%20drift%20--%20the%20change%20of%20the%20distribution%20over%20time%20--%20poses%20significant%20challenges%20for%20learning%20systems%20and%20is%20of%20central%20interest%20for%20monitoring.%20Understanding%20drift%20is%20thus%20paramount%2C%20and%20drif e-of-the-art%2520image%2520datasets.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.19790v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Drift%20Localization%20using%20Conformal%20Predictions&entry.906535625=Fabian%20Hinder%20and%20Valerie%20Vaquet%20and%20Johannes%20Brinkrolf%20and%20Barbara%20Hammer&entry.1292438233=Concept%20drift%20--%20the%20change%20of%20the%20distribution%20over%20time%20--%20poses%20significant%20challenges%20for%20learning%20systems%20and%20is%20of%20central%20interest%20for%20monitoring.%20Understanding%20drift%20is%20thus%20paramount%2C%20and%20drift%20localization%20--%20determining%20which%20samples%20are%20affected%20by%20the%20drift%20--%20is%20essential.%20While%20several%20approaches%20exist%2C%20most%20rely%20on%20local%20testing%20schemes%2C%20which%20tend%20to%20fail%20in%20high-dimensional%2C%20low-signal%20settings.%20In%20this%20work%2C%20we%20consider%20a%20fundamentally%20different%20approach%20based%20on%20conformal%20predictions.%20We%20discuss%20and%20show%20the%20shortcomings%20of%20common%20approaches%20and%20demonstrate%20the%20performance%20of%20our%20approach%20on%20state-of-the-art%20image%20datasets.&entry.1838667208=http%3A//arxiv.org/abs/2602.19790v1&entry.124074799=Read"},
{"title": "DesignAsCode: Bridging Structural Editability and Visual Fidelity in Graphic Design Generation", "author": "Ziyuan Liu and Shizhao Sun and Danqing Huang and Yingdong Shi and Meisheng Zhang and Ji Li and Jingsong Yu and Jiang Bian", "abstract": "Graphic design generation demands a delicate balance between high visual fidelity and fine-grained structural editability. However, existing approaches typically bifurcate into either non-editable raster image synthesis or abstract layout generation devoid of visual content. Recent combinations of these two approaches attempt to bridge this gap but often suffer from rigid composition schemas and unresolvable visual dissonances (e.g., text-background conflicts) due to their inexpressive representation and open-loop nature. To address these challenges, we propose DesignAsCode, a novel framework that reimagines graphic design as a programmatic synthesis task using HTML/CSS. Specifically, we introduce a Plan-Implement-Reflect pipeline, incorporating a Semantic Planner to construct dynamic, variable-depth element hierarchies and a Visual-Aware Reflection mechanism that iteratively optimizes the code to rectify rendering artifacts. Extensive experiments demonstrate that DesignAsCode significantly outperforms state-of-the-art baselines in both structural validity and aesthetic quality. Furthermore, our code-native representation unlocks advanced capabilities, including automatic layout retargeting, complex document generation (e.g., resumes), and CSS-based animation. Our project page is available at https://liuziyuan1109.github.io/design-as-code/.", "link": "http://arxiv.org/abs/2602.17690v2", "date": "2026-02-23", "relevancy": 2.2076, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.6123}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5108}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.508}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DesignAsCode%3A%20Bridging%20Structural%20Editability%20and%20Visual%20Fidelity%20in%20Graphic%20Design%20Generation&body=Title%3A%20DesignAsCode%3A%20Bridging%20Structural%20Editability%20and%20Visual%20Fidelity%20in%20Graphic%20Design%20Generation%0AAuthor%3A%20Ziyuan%20Liu%20and%20Shizhao%20Sun%20and%20Danqing%20Huang%20and%20Yingdong%20Shi%20and%20Meisheng%20Zhang%20and%20Ji%20Li%20and%20Jingsong%20Yu%20and%20Jiang%20Bian%0AAbstract%3A%20Graphic%20design%20generation%20demands%20a%20delicate%20balance%20between%20high%20visual%20fidelity%20and%20fine-grained%20structural%20editability.%20However%2C%20existing%20approaches%20typically%20bifurcate%20into%20either%20non-editable%20raster%20image%20synthesis%20or%20abstract%20layout%20generation%20devoid%20of%20visual%20content.%20Recent%20combinations%20of%20these%20two%20approaches%20attempt%20to%20bridge%20this%20gap%20but%20often%20suffer%20from%20rigid%20composition%20schemas%20and%20unresolvable%20visual%20dissonances%20%28e.g.%2C%20text-background%20conflicts%29%20due%20to%20their%20inexpressive%20representation%20and%20open-loop%20nature.%20To%20address%20these%20challenges%2C%20we%20propose%20DesignAsCode%2C%20a%20novel%20framework%20that%20reimagines%20graphic%20design%20as%20a%20programmatic%20synthesis%20task%20using%20HTML/CSS.%20Specifically%2C%20we%20introduce%20a%20Plan-Implement-Reflect%20pipeline%2C%20incorporating%20a%20Semantic%20Planner%20to%20construct%20dynamic%2C%20variable-depth%20element%20hierarchies%20and%20a%20Visual-Aware%20Reflection%20mechanism%20that%20iteratively%20optimizes%20the%20code%20to%20rectify%20rendering%20artifacts.%20Extensive%20experiments%20demonstrate%20that%20DesignAsCode%20significantly%20outperforms%20state-of-the-art%20baselines%20in%20both%20structural%20validity%20and%20aesthetic%20quality.%20Furthermore%2C%20our%20code-native%20representation%20unlocks%20advanced%20capabilities%2C%20including%20automatic%20layout%20retargeting%2C%20complex%20document%20generation%20%28e.g.%2C%20resumes%29%2C%20and%20CSS-based%20animation.%20Our%20project%20page%20is%20available%20at%20https%3A//liuziyuan1109.github.io/design-as-code/.%0ALink%3A%20http%3A//arxiv.org/abs/2602.17690v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDesignAsCode%253A%2520Bridging%2520Structural%2520Editability%2520and%2520Visual%2520Fidelity%2520in%2520Graphic%2520Design%2520Generation%26entry.906535625%3DZiyuan%2520Liu%2520and%2520Shizhao%2520Sun%2520and%2520Danqing%2520Huang%2520and%2520Yingdong%2520Shi%2520and%2520Meisheng%2520Zhang%2520and%2520Ji%2520Li%2520and%2520Jingsong%2520Yu%2520and%2520Jiang%2520Bian%26entry.1292438233%3DGraphic%2520design%2520generation%2520demands%2520a%2520delicate%2520balance%2520between%2520high%2520visual%2520fidelity%2520and%2520fine-grained%2520structural%2520editability.%2520However%252C%2520existing%2520approaches%2520typically%2520bifurcate%2520into%2520either%2520non-editable%2520raster%2520image%2520synthesis%2520or%2520abstract%2520layout%2520generation%2520devoid%2520of%2520visual%2520content.%2520Recent%2520combinations%2520of%2520these%2520two%2520approaches%2520attempt%2520to%2520bridge%2520this%2520gap%2520but%2520often%2520suffer%2520from%2520rigid%2520composition%2520schemas%2520and%2520unresolvable%2520visual%2520dissonances%2520%2528e.g.%252C%2520text-background%2520conflicts%2529%2520due%2520to%2520their%2520inexpressive%2520representation%2520and%2520open-loop%2520nature.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520DesignAsCode%252C%2520a%2520novel%2520framework%2520that%2520reimagines%2520graphic%2520design%2520as%2520a%2520programmatic%2520synthesis%2520task%25 {"title": "Using Unsupervised Domain Adaptation Semantic Segmentation for Pulmonary Embolism Detection in Computed Tomography Pulmonary Angiogram (CTPA) Images", "author": "Wen-Liang Lin and Yun-Chien Cheng", "abstract": "While deep learning has demonstrated considerable promise in computer-aided diagnosis for pulmonary embolism (PE), practical deployment in Computed Tomography Pulmonary Angiography (CTPA) is often hindered by \"domain shift\" and the prohibitive cost of expert annotations. To address these challenges, an unsupervised domain adaptation (UDA) framework is proposed, utilizing a Transformer backbone and a Mean-Teacher architecture for cross-center semantic segmentation. The primary focus is placed on enhancing pseudo-label reliability by learning deep structural information within the feature space. Specifically, three modules are integrated and designed for this task: (1) a Prototype Alignment (PA) mechanism to reduce category-level distribution discrepancies; (2) Global and Local Contrastive Learning (GLCL) to capture both pixel-level topological relationships and global semantic representations; and (3) an Attention-based Auxiliary Local Prediction (AALP) module designed to reinforce sensitivity to small PE lesions by automatically extracting high-information slices from Transformer attention maps. Experimental validation conducted on cross-center datasets (FUMPE and CAD-PE) demonstrates significant performance gains. In the FUMPE -> CAD-PE task, the IoU increased from 0.1152 to 0.4153, while the CAD-PE -> FUMPE task saw an improvement from 0.1705 to 0.4302. Furthermore, the proposed method achieved a 69.9% Dice score in the CT -> MRI cross-modality task on the MMWHS dataset without utilizing any target-domain labels for model selection, confirming its robustness and generalizability for diverse clinical environments.", "link": "http://arxiv.org/abs/2602.19891v1", "date": "2026-02-23", "relevancy": 2.2073, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5817}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.566}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5257}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Using%20Unsupervised%20Domain%20Adaptation%20Semantic%20Segmentation%20for%20Pulmonary%20Embolism%20Detection%20in%20Computed%20Tomography%20Pulmonary%20Angiogram%20%28CTPA%29%20Images&body=Title%3A%20Using%20Unsupervised%20Domain%20Adaptation%20Semantic%20Segmentation%20for%20Pulmonary%20Embolism%20Detection%20in%20Computed%20Tomography%20Pulmonary%20Angiogram%20%28CTPA%29%20Images%0AAuthor%3A%20Wen-Liang%20Lin%20and%20Yun-Chien%20Cheng%0AAbstract%3A%20While%20deep%20learning%20has%20demonstrated%20considerable%20promise%20in%20computer-aided%20diagnosis%20for%20pulmonary%20embolism%20%28PE%29%2C%20practical%20deployment%20in%20Computed%20Tomography%20Pulmonary%20Angiography%20%28CTPA%29%20is%20often%20hindered%20by%20%22domain%20shift%22%20and%20the%20prohibitive%20cost%20of%20expert%20annotations.%20To%20address%20these%20challenges%2C%20an%20unsupervised%20domain%20adaptation%20%28UDA%29%20framework%20is%20proposed%2C%20utilizing%20a%20Transformer%20backbone%20and%20a%20Mean-Teacher%20architecture%20for%20cross-center%20semantic%20segmentation.%20The%20primary%20focus%20is%20placed%20on%20enhancing%20pseudo-label%20reliability%20by%20learning%20deep%20structural%20information%20within%20the%20feature%20space.%20Specifically%2C%20three%20modules%20are%20integrated%20and%20designed%20for%20this%20task%3A%20%281%29%20a%20Prototype%20Alignment%20%28PA%29%20mechanism%20to%20reduce%20category-level%20distribution%20discrepancies%3B%20%282%29%20Global%20and%20Local%20Contrastive%20Learning%20%28GLCL%29%20to%20capture%20both%20pixel-level%20topological%20relationships%20and%20global%20semantic%20representations%3B%20and%20%283%29%20an%20Attention-based%20Auxiliary%20Local%20Prediction%20%28AALP%29%20module%20designed%20to%20reinforce%20sensitivity%20to%20small%20PE%20lesions%20by%20automatically%20extracting%20high-information%20slices%20from%20Transformer%20attention%20maps.%20Experimental%20validation%20conducted%20on%20cross-center%20datasets%20%28FUMPE%20and%20CAD-PE%29%20demonstrates%20significant%20performance%20gains.%20In%20the%20FUMPE%20-%3E%20CAD-PE%20task%2C%20the%20IoU%20increased%20from%200.1152%20to%200.4153%2C%20while%20the%20CAD-PE%20-%3E%20FUMPE%20task%20saw%20an%20improvement%20from%200.1705%20to%200.4302.%20Furthermore%2C%20the%20proposed%20method%20achieved%20a%2069.9%25%20Dice%20score%20in%20the%20CT%20-%3E%20MRI%20cross-modality%20task%20on%20the%20MMWHS%20dataset%20without%20utilizing%20any%20target-domain%20labels%20for%20model%20selection%2C%20confirming%20its%20robustness%20and%20generalizability%20for%20diverse%20clinical%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19891v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUsing%2520Unsupervised%2520Domain%2520Adaptation%2520Semantic%2520Segmentation%2520for%2520Pulmonary%2520Embolism%2520Detection%2520in%2520Computed%2520Tomography%2520Pulmonary%2520Angiogram%2520%2528CTPA%2529%2520Images%26entry.906535625%3DWen-Liang%2520Lin%2520and%2520Yun-Chien%2520Cheng%26entry.1292438233%3DWhile%2520deep%2520learning%2520has%2520demonstrated%2520considerable%2520promise%2520in%2520computer-aided%2520diagnosis%2520for%2520pulmonary%2520embolism%2520%2528PE%2529%252C%2520practical%2520deployment%2520in%2520Computed%2520Tomography%2520Pulmonary%2520Angiography%2520%2528CTPA%2529%2520is%2520often%2520hindered%2520by%2520%2522domain%2520shift%2522%2520and%2520the%2520pr {"title": "PSGait: Gait Recognition using Parsing Skeleton", "author": "Hangrui Xu and Zhengxian Wu and Chuanrui Zhang and Zhuohong Chen and Zhifang Liu and Peng Jiao and Haoqian Wang", "abstract": "Gait recognition has emerged as a robust biometric modality due to its non-intrusive nature. Conventional gait recognition methods mainly rely on silhouettes or skeletons. While effective in controlled laboratory settings, their limited information entropy restricts generalization to real-world scenarios. To overcome this, we propose a novel representation called \\textbf{Parsing Skeleton}, which uses a skeleton-guided human parsing method to capture fine-grained body dynamics with much higher information entropy. To effectively explore the capability of the Parsing Skeleton, we also introduce \\textbf{PSGait}, a framework that fuses Parsing Skeleton with silhouettes to enhance individual differentiation. Comprehensive benchmarks demonstrate that PSGait outperforms state-of-the-art multimodal methods while significantly reducing computational resources. As a plug-and-play method, it achieves an improvement of up to 15.7\\% in the accuracy of Rank-1 in various models. These results validate the Parsing Skeleton as a \\textbf{lightweight}, \\textbf{effective}, and highly \\textbf{generalizable} representation for gait recognition in the wild. Code is available at https://github.com/realHarryX/PSGait.", "link": "http://arxiv.org/abs/2503.12047v3", "date": "2026-02-23", "relevancy": 2.2062, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5723}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5456}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5332}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PSGait%3A%20Gait%20Recognition%20using%20Parsing%20Skeleton&body=Title%3A%20PSGait%3A%20Gait%20Recognition%20using%20Parsing%20Skeleton%0AAuthor%3A%20Hangrui%20Xu%20and%20Zhengxian%20Wu%20and%20Chuanrui%20Zhang%20and%20Zhuohong%20Chen%20and%20Zhifang%20Liu%20and%20Peng%20Jiao%20and%20Haoqian%20Wang%0AAbstract%3A%20Gait%20recognition%20has%20emerged%20as%20a%20robust%20biometric%20modality%20due%20to%20its%20non-intrusive%20nature.%20Conventional%20gait%20recognition%20methods%20mainly%20rely%20on%20silhouettes%20or%20skeletons.%20While%20effective%20in%20controlled%20laboratory%20settings%2C%20their%20limited%20information%20entropy%20restricts%20generalization%20to%20real-world%20scenarios.%20To%20overcome%20this%2C%20we%20propose%20a%20novel%20representation%20called%20%5Ctextbf%7BParsing%20Skeleton%7D%2C%20which%20uses%20a%20skeleton-guided%20human%20parsing%20method%20to%20capture%20fine-grained%20body%20dynamics%20with%20much%20higher%20information%20entropy.%20To%20effectively%20explore%20the%20capability%20of%20the%20Parsing%20Skeleton%2C%20we%20also%20introduce%20%5Ctextbf%7BPSGait%7D%2C%20a%20framework%20that%20fuses%20Parsing%20Skeleton%20with%20silhouettes%20to%20enhance%20individual%20differentiation.%20Comprehensive%20benchmarks%20demonstrate%20that%20PSGait%20outperforms%20state-of-the-art%20multimodal%20methods%20while%20significantly%20reducing%20computational%20resources.%20As%20a%20plug-and-play%20method%2C%20it%20achieves%20an%20improvement%20of%20up%20to%2015.7%5C%25%20in%20the%20accuracy%20of%20Rank-1%20in%20various%20models.%20These%20results%20validate%20the%20Parsing%20Skeleton%20as%20a%20%5Ctextbf%7Blightweight%7D%2C%20%5Ctextbf%7Beffective%7D%2C%20and%20highly%20%5Ctextbf%7Bgeneralizable%7D%20representation%20for%20gait%20recognition%20in%20the%20wild.%20Code%20is%20available%20at%20https%3A//github.com/realHarryX/PSGait.%0ALink%3A%20http%3A//arxiv.org/abs/2503.12047v3%0AForm%3A%20https {"title": "ChimeraLoRA: Multi-Head LoRA-Guided Synthetic Datasets", "author": "Hoyoung Kim and Minwoo Jang and Jabin Koo and Sangdoo Yun and Jungseul Ok", "abstract": "Beyond general recognition tasks, specialized domains including privacy-constrained medical applications and fine-grained settings often encounter data scarcity, especially for tail classes. To obtain less biased and more reliable models under such scarcity, practitioners leverage diffusion models to supplement underrepresented regions of real data. Specifically, recent studies fine-tune pretrained diffusion models with LoRA on few-shot real sets to synthesize additional images. While an image-wise LoRA trained on a single image captures fine-grained details yet offers limited diversity, a class-wise LoRA trained over all shots produces diverse images as it encodes class priors yet tends to overlook fine details. To combine both benefits, we separate the adapter into a class-shared LoRA~$A$ for class priors and per-image LoRAs~$\\mathcal{B}$ for image-specific characteristics. To expose coherent class semantics in the shared LoRA~$A$, we propose a semantic boosting by preserving class bounding boxes during training. For generation, we compose $A$ with a mixture of $\\mathcal{B}$ using coefficients drawn from a Dirichlet distribution. Across diverse datasets, our synthesized images are both diverse and detail-rich while closely aligning with the few-shot real distribution, yielding robust gains in downstream classification accuracy.", "link": "http://arxiv.org/abs/2602.19708v1", "date": "2026-02-23", "relevancy": 2.1902, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5545}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.548}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5443}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ChimeraLoRA%3A%20Multi-Head%20LoRA-Guided%20Synthetic%20Datasets&body=Title%3A%20ChimeraLoRA%3A%20Multi-Head%20LoRA-Guided%20Synthetic%20Datasets%0AAuthor%3A%20Hoyoung%20Kim%20and%20Minwoo%20Jang%20and%20Jabin%20Koo%20and%20Sangdoo%20Yun%20and%20Jungseul%20Ok%0AAbstract%3A%20Beyond%20general%20recognition%20tasks%2C%20specialized%20domains%20including%20privacy-constrained%20medical%20applications%20and%20fine-grained%20settings%20often%20encounter%20data%20scarcity%2C%20especially%20for%20tail%20classes.%20To%20obtain%20less%20biased%20and%20more%20reliable%20models%20under%20such%20scarcity%2C%20practitioners%20leverage%20diffusion%20models%20to%20supplement%20underrepresented%20regions%20of%20real%20data.%20Specifically%2C%20recent%20studies%20fine-tune%20pretrained%20diffusion%20models%20with%20LoRA%20on%20few-shot%20real%20sets%20to%20synthesize%20additional%20images.%20While%20an%20image-wise%20LoRA%20trained%20on%20a%20single%20image%20captures%20fine-grained%20details%20yet%20offers%20limited%20diversity%2C%20a%20class-wise%20LoRA%20trained%20over%20all%20shots%20produces%20diverse%20images%20as%20it%20encodes%20class%20priors%20yet%20tends%20to%20overlook%20fine%20details.%20To%20combine%20both%20benefits%2C%20we%20separate%20the%20adapter%20into%20a%20class-shared%20LoRA~%24A%24%20for%20class%20priors%20and%20per-image%20LoRAs~%24%5Cmathcal%7BB%7D%24%20for%20image-specific%20characteristics.%20To%20expose%20coherent%20class%20semantics%20in%20the%20shared%20LoRA~%24A%24%2C%20we%20propose%20a%20semantic%20boosting%20by%20preserving%20class%20bounding%20boxes%20during%20training.%20For%20generation%2C%20we%20compose%20%24A%24%20with%20a%20mixture%20of%20%24%5Cmathcal%7BB%7D%24%20using%20coefficients%20drawn%20from%20a%20Dirichlet%20distribution.%20Across%20diverse%20datasets%2C%20our%20synthesized%20images%20are%20both%20diverse%20and%20detail-rich%20while%20closely%20aligning%20with%20the%20few-shot%20real%20distribution%2C%20yielding%20robust%20gains%20in%20downstream%20classification%20accuracy.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19708v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DChimeraLoRA%253A%2520Multi-Head%2520LoRA-Guided%2520Synthetic%2520Datasets%26entry.906535625%3DHoyoung%2520Kim%2520and%2520Minwoo%2520Jang%2520and%2520Jabin%2520Koo%2520and%2520Sangdoo%2520Yun%2520and%2520Jungseul%2520Ok%26entry.1292438233%3DBeyond%2520general%2520recognition%2520tasks%252C%2520specialized%2520domains%2520including%2520privacy-constrained%2520medical%2520applications%2520and%2520fine-grained%2520settings%2520often%2520encounter%2520data%2520scarcity%252C%2520especially%2520for%2520tail%2520classes.%2520To%2520obtain%2520less%2520biased%2520and%2520more%2520reliable%2520models%2520under%2520such%2520scarcity%252C%2520practitioners%2520leverage%2520diffusion%2520models%2520to%2520supplement%2520underrepresented%2520regions%2520of%2520real%2520data.%2520Specifically%252C%2520recent%2520studies%2520fine-tune%2520pretrained%2520diffusion%2520models%2520with%2520LoRA%2520on%2520few-shot%2520real%2520sets%2520to%2520synthesize%2520additional%2520images.%2520While%2520an%2520image-wise%2520LoRA%2520trained%2520on%2520a%2520single%2520image%2520captures%2520fine-grained%2520details%2520yet%2520offers%2520limited%2520diversity%252C%2520a%2520class-wise%2520LoRA%2520trained%2520over%2520all%2520shots%2520produces%2520diverse%2520images%2520as%2520it%2520encodes%2520class%2520priors%2520yet%2520tends%2520to%2520overlook%2520fine%2520details.%2520To%2520combine%2520both%2520benefits%252C%2520we%2520separate%2520the%2520adapter%2520into%2520a%2520class-shared%2520LoRA~%2524A%2524%2520for%2520class%2520priors%2520and%2520per-image%2520LoRAs~%2524%255Cmathcal%257BB%257D%2524%2520for%2520image-specifi {"title": "RADE-Net: Robust Attention Network for Radar-Only Object Detection in Adverse Weather", "author": "Christof Leitgeb and Thomas Puchleitner and Max Peter Ronecker and Daniel Watzenig", "abstract": "Automotive perception systems are obligated to meet high requirements. While optical sensors such as Camera and Lidar struggle in adverse weather conditions, Radar provides a more robust perception performance, effectively penetrating fog, rain, and snow. Since full Radar tensors have large data sizes and very few datasets provide them, most Radar-based approaches work with sparse point clouds or 2D projections, which can result in information loss. Additionally, deep learning methods show potential to extract richer and more dense features from low level Radar data and therefore significantly increase the perception performance. Therefore, we propose a 3D projection method for fast-Fourier-transformed 4D Range-Azimuth-Doppler-Elevation (RADE) tensors. Our method preserves rich Doppler and Elevation features while reducing the required data size for a single frame by 91.9% compared to a full tensor, thus achieving higher training and inference speed as well as lower model complexity. We introduce RADE-Net, a lightweight model tailored to 3D projections of the RADE tensor. The backbone enables exploitation of low-level and high-level cues of Radar tensors with spatial and channel-attention. The decoupled detection heads predict object center-points directly in the Range-Azimuth domain and regress rotated 3D bounding boxes from rich feature maps in the cartesian scene. We evaluate the model on scenes with multiple different road users and under various weather conditions on the large-scale K-Radar dataset and achieve a 16.7% improvement compared to their baseline, as well as 6.5% improvement over current Radar-only models. Additionally, we outperform several Lidar approaches in scenarios with adverse weather conditions. The code is available under https://github.com/chr-is-tof/RADE-Net.", "link": "http://arxiv.org/abs/2602.19994v1", "date": "2026-02-23", "relevancy": 2.1892, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5736}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5301}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5246}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RADE-Net%3A%20Robust%20Attention%20Network%20for%20Radar-Only%20Object%20Detection%20in%20Adverse%20Weather&body=Title%3A%20RADE-Net%3A%20Robust%20Attention%20Network%20for%20Radar-Only%20Object%20Detection%20in%20Adverse%20Weather%0AAuthor%3A%20Christof%20Leitgeb%20and%20Thomas%20Puchleitner%20and%20Max%20Peter%20Ronecker%20and%20Daniel%20Watzenig%0AAbstract%3A%20Automotive%20perception%20systems%20are%20obligated%20to%20meet%20high%20requirements.%20While%20optical%20sensors%20such%20as%20Camera%20and%20Lidar%20struggle%20in%20adverse%20weather%20conditions%2C%20Radar%20provides%20a%20more%20robust%20perception%20performance%2C%20effectively%20penetrating%20fog%2C%20rain%2C%20and%20snow.%20Since%20full%20Radar%20tensors%20have%20large%20data%20sizes%20and%20very%20few%20datasets%20provide%20them%2C%20most%20Radar-based%20approaches%20work%20with%20sparse%20point%20clouds%20or%202D%20projections%2C%20which%20can%20result%20in%20information%20loss.%20Additionally%2C%20deep%20learning%20methods%20show%20potential%20to%20extract%20richer%20and%20more%20dense%20features%20from%20low%20level%20Radar%20data%20and%20therefore%20significantly%20increase%20the%20perception%20performance.%20Therefore%2C%20we%20propose%20a%203D%20projection%20method%20for%20fast-Fourier-transformed%204D%20Range-Azimuth-Doppler-Elevation%20% {"title": "Brewing Stronger Features: Dual-Teacher Distillation for Multispectral Earth Observation", "author": "Filip Wolf and Bla\u017e Rolih and Luka \u010cehovin Zajc", "abstract": "Foundation models are transforming Earth Observation (EO), yet the diversity of EO sensors and modalities makes a single universal model unrealistic. Multiple specialized EO foundation models (EOFMs) will likely coexist, making efficient knowledge transfer across modalities essential. Most existing EO pretraining relies on masked image modeling, which emphasizes local reconstruction but provides limited control over global semantic structure. To address this, we propose a dual-teacher contrastive distillation framework for multispectral imagery that aligns the student's pretraining objective with the contrastive self-distillation paradigm of modern optical vision foundation models (VFMs). Our approach combines a multispectral teacher with an optical VFM teacher, enabling coherent cross-modal representation learning. Experiments across diverse optical and multispectral benchmarks show that our model adapts to multispectral data without compromising performance on optical-only inputs, achieving state-of-the-art results in both settings, with an average improvement of 3.64 percentage points in semantic segmentation, 1.2 in change detection, and 1.31 in classification tasks. This demonstrates that contrastive distillation provides a principled and efficient approach to scalable representation learning across heterogeneous EO data sources. Code: Coming soon.", "link": "http://arxiv.org/abs/2602.19863v1", "date": "2026-02-23", "relevancy": 2.1851, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5481}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5481}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5373}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Brewing%20Stronger%20Features%3A%20Dual-Teacher%20Distillation%20for%20Multispectral%20Earth%20Observation&body=Title%3A%20Brewing%20Stronger%20Features%3A%20Dual-Teacher%20Distillation%20for%20Multispectral%20Earth%20Observation%0AAuthor%3A%20Filip%20Wolf%20and%20Bla%C5%BE%20Rolih%20and%20Luka%20%C4%8Cehovin%20Zajc%0AAbstract%3A%20Foundation%20models%20are%20transforming%20Earth%20Observation%20%28EO%29%2C%20yet%20the%20diversity%20of%20EO%20sensors%20and%20modalities%20makes%20a%20single%20universal%20model%20unrealistic.%20Multiple%20specialized%20EO%20foundation%20models%20%28EOFMs%29%20will%20likely%20coexist%2C%20making%20efficient%20knowledge%20transfer%20across%20modalities%20essential.%20Most%20existing%20EO%20pretraining%20relies%20on%20masked%20image%20modeling%2C%20which%20emphasizes%20local%20reconstruction%20but%20provides%20limited%20control%20over%20global%20semantic%20structure.%20To%20address%20this%2C%20we%20propose%20a%20dual-teacher%20contrastive%20distillation%20framework%20for%20multispectral%20imagery%20that%20aligns%20the%20student%27s%20pretraining%20objective%20with%20the%20contrastive%20self-distillation%20paradigm%20of%20modern%20optical%20vision%20foundation%20models%20%28VFMs%29.%20Our%20approach%20combines%20a%20multispectral%20teacher%20with%20an%20optical%20VFM%20teacher%2C%20enabling%20coherent%20cross-modal%20representation%20learning.%20Experiments%20across%20diverse%20optical%20and%20multispectral%20benchmarks%20show%20that%20our%20model%20adapts%20to%20multispectral%20data%20without%20compromising%20performance%20on%20optical-only%20inputs%2C%20achieving%20state-of-the-art%20results%20in%20both%20settings%2C%20with%20an%20average%20improvement%20of%203.64%20percentage%20points%20in%20semantic%20segmentation%2C%201.2%20in%20change%20detection%2C%20and%201.31%20in%20classification%20tasks.%20This%20demonstrates%20that%20contrastive%20distillation%20provides%20a%20principled%20and%20efficient%20approach%20to%20scalable%20representation%20learning%20across%20heterogeneous%20EO%20data%20sources.%20Code%3A%20Coming%20soon.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19863v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBrewing%2520Stronger%2520Features%253A%2520Dual-Teacher%2520Distillation%2520for%2520Multispectral%2520Earth%2520Observation%26entry.906535625%3DFilip%2520Wolf%2520and%2520Bla%25C5%25BE%2520Rolih%2520and%2520Luka%2520%25C4%258Cehovin%2520Zajc%26entry.1292438233%3DFoundation%2520models%2520are%2520transforming%2520Earth%2520Observation%2520%2528EO%2529%252C%2520yet%2520the%2520diversity%2520of%2520EO%2520sensors%2520and%2520modalities%2520makes%2520a%2520single%2520universal%2520model%2520unrealistic.%2520Multiple%2520specialized%2520EO%2520foundation%2520models%2520%2528EOFMs%2529%2520will%2520likely%2520coexist%252C%2520making%2520efficient%2520knowledge%2520transfer%2520across%2520modalities%2520essential.%2520Most%2520existing%2520EO%2520pretraining%2520relies%2520on%2520masked%2520image%2520modeling%252C%2520which%2520emphasizes%2520local%2520reconstruction%2520but%2520provides%2520limited%2520control%2520over%2520global%2520semantic%2520structure.%2520To%2520address%2520this%252C%2520we%2520propose%2520a%2520dual-teacher%2520contrastive%2520distillation%2520framework%2520for%2520multispectral%2520imagery%2520that%2520aligns%2520the%2520student%2527s%2520pretraining%2520objective%2520with%2520the%2520contrastive%2520self-distillation%2520paradigm%2520of%2520modern%2520optical%2520vision%2520foundation%2520models%2520%2528VFMs%2529.%2520Our%2520approach%2520combines%2520a%2520multispectral%2520teacher%2520with%2520an%2520optical%2520VFM%2520teacher%252C%2520enabling%2520coherent%2520cross- {"title": "HDR Reconstruction Boosting with Training-Free and Exposure-Consistent Diffusion", "author": "Yo-Tin Lin and Su-Kai Chen and Hou-Ning Hu and Yen-Yu Lin and Yu-Lun Liu", "abstract": "Single LDR to HDR reconstruction remains challenging for over-exposed regions where traditional methods often fail due to complete information loss. We present a training-free approach that enhances existing indirect and direct HDR reconstruction methods through diffusion-based inpainting. Our method combines text-guided diffusion models with SDEdit refinement to generate plausible content in over-exposed areas while maintaining consistency across multi-exposure LDR images. Unlike previous approaches requiring extensive training, our method seamlessly integrates with existing HDR reconstruction techniques through an iterative compensation mechanism that ensures luminance coherence across multiple exposures. We demonstrate significant improvements in both perceptual quality and quantitative metrics on standard HDR datasets and in-the-wild captures. Results show that our method effectively recovers natural details in challenging scenarios while preserving the advantages of existing HDR reconstruction pipelines. Project page: https://github.com/EusdenLin/HDR-Reconstruction-Boosting", "link": "http://arxiv.org/abs/2602.19706v1", "date": "2026-02-23", "relevancy": 2.1732, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5779}, {"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.5459}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5269}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HDR%20Reconstruction%20Boosting%20with% {"title": "VillageNet: Graph-based, Easily-interpretable, Unsupervised Clustering for Broad Biomedical Applications", "author": "Aditya Ballal and Gregory A. DePaul and Esha Datta and Asuka Hatano and Erik Carlsson and Ye Chen-Izu and Javier E. L\u00f3pez and Leighton T. Izu", "abstract": "Clustering large high-dimensional datasets with diverse variable is essential for extracting high-level latent information from these datasets. Here, we developed an unsupervised clustering algorithm, we call \"Village-Net\". Village-Net is specifically designed to effectively cluster high-dimension data without priori knowledge on the number of existing clusters. The algorithm operates in two phases: first, utilizing K-Means clustering, it divides the dataset into distinct subsets we refer to as \"villages\". Next, a weighted network is created, with each node representing a village, capturing their proximity relationships. To achieve optimal clustering, we process this network using a community detection algorithm called Walk-likelihood Community Finder (WLCF), a community detection algorithm developed by one of our team members. A salient feature of Village-Net Clustering is its ability to autonomously determine an optimal number of clusters for further analysis based on inherent characteristics of the data. We present extensive benchmarking on extant real-world datasets with known ground-truth labels to showcase its competitive performance, particularly in terms of the normalized mutual information (NMI) score, when compared to other state-of-the-art methods. The algorithm is computationally efficient, boasting a time complexity of O(N*k*d), where N signifies the number of instances, k represents the number of villages and d represents the dimension of the dataset, which makes it well suited for effectively handling large-scale datasets.", "link": "http://arxiv.org/abs/2501.10471v2", "date": "2026-02-23", "relevancy": 2.1552, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.439}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4313}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4228}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VillageNet%3A%20Graph-based%2C%20Easily-interpretable%2C%20Unsupervised%20Clustering%20for%20Broad%20Biomedical%20Applications&body=Title%3A%20VillageNet%3A%20Graph-based%2C%20Easily-interpretable%2C%20Unsupervised%20Clustering%20for%20Broad%20Biomedical%20Applications%0AAuthor%3A%20Aditya%20Ballal%20and%20Gregory%20A.%20DePaul%20and%20Esha%20Datta%20and%20Asuka%20Hatano%20and%20Erik%20Carlsson%20and%20Ye%20Chen-Izu%20and%20Javier%20E.%20L%C3%B3pez%20and%20Leighton%20T.%20Izu%0AAbstract%3A%20Clustering%20large%20high-dimensional%20datasets%20with%20diverse%20variable%20is%20essential%20for%20extracting%20high-level%20latent%20information%20from%20these%20datasets.%20Here%2C%20we%20developed%20an%20unsupervised%20clustering%20algorithm%2C%20we%20call%20%22Village-Net%22.%20Village-Net%20is%20specifically%20designed%20to%20effectively%20cluster%20high-dimension%20data%20without%20priori%20knowledge%20on%20the%20number%20of%20existing%20clusters.%20The%20algorithm%20operates%20in%20two%20phases%3A%20first%2C%20utilizing%20K-Means%20clustering%2C%20it%20divides%20the%20dataset%20into%20distinct%20subsets%20we%20refer%20to%20as%20%22villages%22.%20Next%2C%20a%20weighted%20network%20is%20created%2C%20with%20each%20node%20representing%20a%20village%2C%20capturing%20their%20proximity%20relationships.%20To%20achieve%20optimal%20clustering%2C%20we%20process%20this%20network%20using%20a%20community%20detection%20algorithm%20called%20Walk-likelihood%20Community%20Finder%20%28WLCF%29%2C%20a%20community%20detection%20algorithm%20developed%20by%20one%20of%20our%20team%20members.%20A%20salient%20feature%20of%20Village-Net%20Clustering%20is%20its%20ability%20to%20autonomously%20determine%20an%20optimal%20number%20of%20clusters%20for%20further%20analysis%20based%20on%20inherent%20characteristics%20of%20the%20data.%20We%20present%20extensive%20benchmarking%20on%20extant%20real-world%20datasets%20with%20known%20ground-truth%20labels%20to%20showcase%20its%20competitive%20performance%2C%20particularly%20in%20terms%20of%20the%20normalized%20mutual%20information%20%28NMI%29%20score%2C%20when%20compared%20to%20other%20state-of-the-art%20methods.%20The%20algorithm%20is%20computationally%20efficient%2C%20boasting%20a%20time%20complexity%20of%20O%28N%2Ak%2Ad%29%2C%20where%20N%20signifies%20the%20number%20of%20instances%2C%20k%20represents%20the%20number%20of%20villages%20and%20d%20represents%20the%20dimension%20of%20the%20dataset%2C%20which%20makes%20it%20well%20suited%20for%20effectively%20handling%20large-scale%20datasets.%0ALink%3A%20http%3A//arxiv.org/abs/2501.10471v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVillageNet%253A%2520Graph-based%252C%2520Easily-interpretable%252C%2520Unsupervised%2520Clustering%2520for%2520Broad%2520Biomedical%2520Applications%26entry.906535625%3DAditya%2520Ballal%2520and%2520Gregory%2520A.%2520DePaul%2520and%2520Esha%2520Datta%2520and%2520Asuka%2520Hatano%2520and%2520Erik%2520Carlsson%2520and%2520Ye%2520Chen-Izu%2520and%2520Javier%2520E.%2520L%25C3%25B3pez%2520and%2520Leighton%2520T.%2520Izu%26entry.1292438233%3DClustering%2520large%2520high-dimensional%2520datasets%2520with%2520diverse%2520variable%2520is%2520essential%2520for%2520extracting%2520high-level%2520latent%2520information%2520from%2520these%2520datasets.%2520Here%252C%2520we%2520developed%2520an%2520unsupervised%2520clustering%2520algorithm%252C%2520we%2520call%2520%2522Village-Net%252 {"title": "Training Deep Stereo Matching Networks on Tree Branch Imagery: A Benchmark Study for Real-Time UAV Forestry Applications", "author": "Yida Lin and Bing Xue and Mengjie Zhang and Sam Schofield and Richard Green", "abstract": "Autonomous drone-based tree pruning needs accurate, real-time depth estimation from stereo cameras. Depth is computed from disparity maps using $Z = f B/d$, so even small disparity errors cause noticeable depth mistakes at working distances. Building on our earlier work that identified DEFOM-Stereo as the best reference disparity generator for vegetation scenes, we present the first study to train and test ten deep stereo matching networks on real tree branch images. We use the Canterbury Tree Branches dataset -- 5,313 stereo pairs from a ZED Mini camera at 1080P and 720P -- with DEFOM-generated disparity maps as training targets. The ten methods cover step-by-step refinement, 3D convolution, edge-aware attention, and lightweight designs. Using perceptual metrics (SSIM, LPIPS, ViTScore) and structural metrics (SIFT/ORB feature matching), we find that BANet-3D produces the best overall quality (SSIM = 0.883, LPIPS = 0.157), while RAFT-Stereo scores highest on scene-level understanding (ViTScore = 0.799). Testing on an NVIDIA Jetson Orin Super (16 GB, independently powered) mounted on our drone shows that AnyNet reaches 6.99 FPS at 1080P -- the only near-real-time option -- while BANet-2D gives the best quality-speed balance at 1.21 FPS. We also compare 720P and 1080P processing times to guide resolution choices for forestry drone systems.", "link": "http://arxiv.org/abs/2602.19763v1", "date": "2026-02-23", "relevancy": 2.1544, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5386}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5386}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5384}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Training%20Deep%20Stereo%20Matching%20Networks%20on%20Tree%20Branch%20Imagery%3A%20A%20Benchmark%20Study%20for%20Real-Time%20UAV%20Forestry%20Applications&body=Title%3A%20Training%20Deep%20Stereo%20Matching%20Networks%20on%20Tree%20Branch%20Imagery%3A%20A%20Benchmark%20Study%20for%20Real-Time%20UAV%20Forestry%20Applications%0AAuthor%3A%20Yida%20Lin%20and%20Bing%20Xue%20and%20Mengjie%20Zhang%20and%20Sam%20Schofield%20and%20Richard%20Green%0AAbstract%3A%20Autonomous%20drone-based%20tree%20pruning%20needs%20accurate%2C%20real-time%20depth%20estimation%20from%20stereo%20cameras.%20Depth%20is%20computed%20from%20disparity%20maps%20using%20%24Z%20%3D%20f%20B/d%24%2C%20so%20even%20small%20disparity%20errors%20cause%20noticeable%20depth%20mistakes%20at%20working%20distances.%20Building%20on%20our%20earlier%20work%20that%20identified%20DEFOM-Stereo%20as%20the%20best%20reference%20disparity%20generator%20for%20vegetation%20scenes%2C%20we%20present%20the%20first%20study%20to%20train%20and%20test%20ten%20deep%20stereo%20matching%20networks%20on%20real%20tree%20branch%20images.%20We%20use%20the%20Canterbury%20Tree%20Branches%20dataset%20--%205%2C313%20stereo%20pairs%20from%20a%20ZED%20Mini%20camera%20at%201080P%20and%20720P%20--%20with%20DEFOM-generated%20disparity%20maps%20as%20training%20targets.%20The%20ten%20methods%20cover%20step-by-step%20refinement%2C%203D%20convolution%2C%20edge-aware%20attention%2C%20and%20lightweight%20designs.%20Using%20perceptual%20metrics%20%28SSIM%2C%20LPIPS%2C%20ViTScore%29%20and%20structural%20metrics%20%28SIFT/ORB%20feature%20matching%29%2C%20we%20find%20that%20BANet-3D%20produces%20the%20best%20overall%20quality%20%28SSIM%20%3D%200.883%2C%20LPIPS%20%3D%200.157%29%2C%20while%20RAFT-Stereo%20scores%20highest%20on%20scene-level%20understanding%20%28ViTScore%20%3D%200.799%29.%20Testing%20on%20an%20NVIDIA%20Jetson%20Orin%20Super%20%2816%20GB%2C%20independently%20powered%29%20mounted%20on%20our%20drone%20shows%20that%20AnyNet%20reaches%206.99%20FPS%20at%201080P%20--%20the%20only%20near-real-time%20option%20--%20while%20BANet-2D%20gives%20the%20best%20quality-speed%20balance%20at%201.21%20FPS.%20We%20also%20compare%20720P%20and%201080P%20processing%20times%20to%20guide%20resolution%20choices%20for%20forestry%20drone%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19763v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTraining%2520Deep%2520Stereo%2520Matching%2520Networks%2520on%2520Tree%2520Branch%2520Imagery%253A%2520A%2520Benchmark%2520Study%2520for%2520Real-Time%2520UAV%2520Forestry%2520Applications%26entry.906535625%3DYida%2520Lin%2520and%2520Bing%2520Xue%2520and%2520Mengjie%2520Zhang%2520and%2520Sam%2520Schofield%2520and%2520Richard%2520Green%26entry.1292438233%3DAutonomous%2520drone-based%2520tree%2520pruning%2520needs%2520accurate%252C%2520real-time%2520depth%2520estimation%2520from%2520stereo%2520cameras.%2520Depth%2520is%2520computed%2520from%2520disparity%2520maps%2520using%2520%2524Z%2520%253D%2520f%2520B/d%2524%252C%2520so%2520even%2520small%2520disparity%2520errors%2520cause%2520noticeable%2520depth%2520mistakes%2520at%2520working%2520distances.%2520Building%2520on%2520our%2520earlier%2520work%2520that%2520identified%2520DEFOM-Stereo%2520as%2520the%2520best%2520reference%2520disparity%2520generator%2520for%2520vegetation%2520scenes%252C%2520we%2520present%2520the%2520first%2520study%2520to%2520train%2520and%2520test%2520ten%2520deep%2520stereo%2520matching%2520networks%2520on%2520real%2520tree%2520branch%2520images.%2520We%2520use%2520the%2520Canterbury%2520Tree%2520Branches%2520dataset%2520--%25205%252C313%2520stereo%2520pairs%2520from%2520a%2520ZED%2520Mini%2520camera% {"title": "TextShield-R1: Reinforced Reasoning for Tampered Text Detection", "author": "Chenfan Qu and Yiwu Zhong and Jian Liu and Xuekang Zhu and Bohan Yu and Lianwen Jin", "abstract": "The growing prevalence of tampered images poses serious security threats, highlighting the urgent need for reliable detection methods. Multimodal large language models (MLLMs) demonstrate strong potential in analyzing tampered images and generating interpretations. However, they still struggle with identifying micro-level artifacts, exhibit low accuracy in localizing tampered text regions, and heavily rely on expensive annotations for forgery interpretation. To this end, we introduce TextShield-R1, the first reinforcement learning based MLLM solution for tampered text detection and reasoning. Specifically, our approach introduces Forensic Continual Pre-training, an easy-to-hard curriculum that well prepares the MLLM for tampered text detection by harnessing the large-scale cheap data from natural image forensic and OCR tasks. During fine-tuning, we perform Group Relative Policy Optimization with novel reward functions to reduce annotation dependency and improve reasoning capabilities. At inference time, we enhance localization accuracy via OCR Rectification, a method that leverages the MLLM's strong text recognition abilities to refine its predictions. Furthermore, to support rigorous evaluation, we introduce the Text Forensics Reasoning (TFR) benchmark, comprising over 45k real and tampered images across 16 languages, 10 tampering techniques, and diverse domains. Rich reasoning-style annotations are included, allowing for comprehensive assessment. Our TFR benchmark simultaneously addresses seven major limitations of existing benchmarks and enables robust evaluation under cross-style, cross-method, and cross-language conditions. Extensive experiments demonstrate that TextShield-R1 significantly advances the state of the art in interpretable tampered text detection.", "link": "http://arxiv.org/abs/2602.19828v1", "date": "2026-02-23", "relevancy": 2.1386, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5609}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5243}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5126}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TextShield-R1%3A%20Reinforced%20Reasoning%20for%20Tampered%20Text%20Detection&body=Title%3A%20TextShield-R1%3A%20Reinforced%20Reasoning%20for%20Tampered%20Text%20Detection%0AAuthor%3A%20Chenfan%20Qu%20and%20Yiwu%20Zhong%20and%20Jian%20Liu%20and%20Xuekang%20Zhu%20and%20Bohan%20Yu%20and%20Lianwen%20Jin%0AAbstract%3A%20The%20growing%20prevalence%20of%20tampered%20images%20poses%20serious%20security%20threats%2C%20highlighting%20the%20urgent%20need%20for%20reliable%20detection%20methods.%20Multimodal%20large%20language%20models%20%28MLLMs%29%20demonstrate%20strong%20potential%20in%20analyzing%20tampered%20images%20and%20generating%20interpretations.%20However%2C%20they%20still%20struggle%20with%20identifying%20micro-level%20artifacts%2C%20exhibit%20low%20accuracy%20in%20localizing%20tampered%20text%20regions%2C%20and%20heavily%20rely%20on%20expensive%20annotations%20for%20forgery%20interpretation.%20To%20this%20end%2C%20we%20introduce%20TextShield-R1%2C%20the%20first%20reinforcement%20learning%20based%20MLLM%20solution%20for%20tampered%20text%20detection%20and%20reasoning.%20Specifically%2C%20our%20approach%20introduces%20Forensic%20Continual%20Pre-training%2C%20an%20easy-to-hard%20curriculum%20that%20well%20prepares%20the%20MLLM%20for%20tampered%20text%20detection%20by%20harnessing%20the%20large-scale%20cheap%20data%20from%20natural%20image%20forensic%20and%20OCR%20tasks.%20During%20fine-tuning%2C%20we%20perform%20Group%20Relative%20Policy%20Optimization%20with%20novel%20reward%20functions%20to%20reduce%20annotation%20dependency%20and%20improve%20reasoning%20capabilities.%20At%20inference%20time%2C%20we%20enhance%20localization%20accuracy%20via%20OCR%20Rectification%2C%20a%20method%20that%20leverages%20the%20MLLM%27s%20strong%20text%20recognition%20abilities%20to%20refine%20its%20predictions.%20Furthermore%2C%20to%20support%20rigorous%20evaluation%2C%20we%20introduce%20the%20Text%20Forensics%20Reasoning%20%28TFR%29%20benchmark%2C%20comprising%20over%2045k%20real%20and%20tampered%20images%20across%2016%20languages%2C%2010%20tampering%20techniques%2C%20and%20diverse%20domains.%20Rich%20reasoning-style%20annotations%20are%20included%2C%20allowing%20for%20comprehensive%20assessment.%20Our%20TFR%20benchmark%20simultaneously%20addresses%20seven%20major%20limitations%20of%20existing%20benchmarks%20and%20enables%20robust%20evaluation%20under%20cross-style%2C%20cross-method%2C%20and%20cross-language%20conditions.%20Extensive%20experiments%20demonstrate%20that%20TextShield-R1%20significantly%20advances%20the%20state%20of%20the%20art%20in%20interpretable%20tampered%20text%20detection.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19828v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTextShield-R1%253A%2520Reinforced%2520Reasoning%2520for%2520Tampered%2520Text%2520Detection%26entry.906535625%3DChenfan%2520Qu%2520and%2520Yiwu%2520Zhong%2520and%2520Jian%2520Liu%2520and%2520Xuekang%2520Zhu%2520and%2520Bohan%2520Yu%2520and%2520Lianwen%2520Jin%26entry.1292438233%3DThe%2520growing%2520prevalence%2520of%2520tampered%2520images%2520poses%2520serious%2520security%2520threats%252C%2520highlighting%2520the%2520urgent%2520need%2520for%2520reliable%2520detection%2520methods.%2520Multimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%2

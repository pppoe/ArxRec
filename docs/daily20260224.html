{"title": "A Simple Generative Model of Logical Reasoning and Statistical Learning", "author": "Hiroyuki Kido", "abstract": "Statistical learning and logical reasoning are two major fields of AI expected to be unified for human-like machine intelligence. Most existing work considers how to combine existing logical and statistical systems. However, there is no theory of inference so far explaining how basic approaches to statistical learning and logical reasoning stem from a common principle. Inspired by the fact that much empirical work in neuroscience suggests Bayesian (or probabilistic generative) approaches to brain function including learning and reasoning, we here propose a simple Bayesian model of logical reasoning and statistical learning. The theory is statistically correct as it satisfies Kolmogorov's axioms, is consistent with both Fenstad's representation theorem and maximum likelihood estimation and performs exact Bayesian inference with a linear-time complexity. The theory is logically correct as it is a data-driven generalisation of uncertain reasoning from consistency, possibility, inconsistency and impossibility. The theory is correct in terms of machine learning as its solution to generation and prediction tasks on the MNIST dataset is not only empirically reasonable but also theoretically correct against the K nearest neighbour method. We simply model how data causes symbolic knowledge in terms of its satisfiability in formal logic. Symbolic reasoning emerges as a result of the process of going the causality forwards and backwards. The forward and backward processes correspond to an interpretation and inverse interpretation in formal logic, respectively. The inverse interpretation differentiates our work from the mainstream often referred to as inverse entailment, inverse deduction or inverse resolution. The perspective gives new insights into learning and reasoning towards human-like machine intelligence.", "link": "http://arxiv.org/abs/2305.11098v2", "date": "2026-02-23", "relevancy": 2.1371, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5492}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5428}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5198}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Simple%20Generative%20Model%20of%20Logical%20Reasoning%20and%20Statistical%20Learning&body=Title%3A%20A%20Simple%20Generative%20Model%20of%20Logical%20Reasoning%20and%20Statistical%20Learning%0AAuthor%3A%20Hiroyuki%20Kido%0AAbstract%3A%20Statistical%20learning%20and%20logical%20reasoning%20are%20two%20major%20fields%20of%20AI%20expected%20to%20be%20unified%20for%20human-like%20machine%20intelligence.%20Most%20existing%20work%20considers%20how%20to%20combine%20existing%20logical%20and%20statistical%20systems.%20However%2C%20there%20is%20no%20theory%20of%20inference%20so%20far%20explaining%20how%20basic%20approaches%20to%20statistical%20learning%20and%20logical%20reasoning%20stem%20from%20a%20common%20principle.%20Inspired%20by%20the%20fact%20that%20much%20empirical%20work%20in%20neuroscience%20suggests%20Bayesian%20%28or%20probabilistic%20generative%29%20approaches%20to%20brain%20function%20including%20learning%20and%20reasoning%2C%20we%20here%20propose%20a%20simple%20Bayesian%20model%20of%20logical%20reasoning%20and%20statistical%20learning.%20The%20theory%20is%20statistically%20correct%20as%20it%20satisfies%20Kolmogorov%27s%20axioms%2C%20is%20consistent%20with%20both%20Fenstad%27s%20representation%20theorem%20and%20maximum%20likelihood%20estimation%20and%20performs%20exact%20Bayesian%20inference%20with%20a%20linear-time%20complexity.%20The%20theory%20is%20logically%20correct%20as%20it%20is%20a%20data-driven%20generalisation%20of%20uncertain%20reasoning%20from%20consistency%2C%20possibility%2C%20inconsistency%20and%20impossibility.%20The%20theory%20is%20correct%20in%20terms%20of%20machine%20learning%20as%20its%20solution%20to%20generation%20and%20prediction%20tasks%20on%20the%20MNIST%20dataset%20is%20not%20only%20empirically%20reasonable%20but%20also%20theoretically%20correct%20against%20the%20K%20nearest%20neighbour%20method.%20We%20simply%20model%20how%20data%20causes%20symbolic%20knowledge%20in%20terms%20of%20its%20satisfiability%20in%20formal%20logic.%20Symbolic%20reasoning%20emerges%20as%20a%20result%20of%20the%20process%20of%20going%20the%20causality%20forwards%20and%20backwards.%20The%20forward%20and%20backward%20processes%20correspond%20to%20an%20interpretation%20and%20inverse%20interpretation%20in%20formal%20logic%2C%20respectively.%20The%20inverse%20interpretation%20differentiates%20our%20work%20from%20the%20mainstream%20often%20referred%20to%20as%20inverse%20entailment%2C%20inverse%20deduction%20or%20inverse%20resolution.%20The%20perspective%20gives%20new%20insights%20into%20learning%20and%20reasoning%20towards%20human-like%20machine%20intelligence.%0ALink%3A%20http%3A//arxiv.org/abs/2305.11098v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Simple%2520Generative%2520Model%2520of%2520Logical%2520Reasoning%2520and%2520Statistical%2520Learning%26entry.906535625%3DHiroyuki%2520Kido%26entry.1292438233%3DStatistical%2520learning%2520and%2520logical%2520reasoning%2520are%2520two%2520major%2520fields%2520of%2520AI%2520expected%2520to%2520be%2520unified%2520for%2520human-like%2520machine%2520intelligence.%2520Most%2520existing%2520work%2520considers%2520how%2520to%2520combine%2520existing%2520logical%2520and%2520statistical%2520systems.%2520However%252C%2520there%2520is%2520no%2520theory%2520of%2520inference%2520so%2520far%2520explaining%2520how%2520basic%2520approaches%2520to%2520statistical%2520learning%2520and%2520logical%2520reasoning%2520stem%2520from%2520a%2520common%2520principle.%2520Inspired%2520by%2520the%2520fact%2520that%2520much%2520empirical%2520work%2520in%2520neuroscience%2520suggests%2520Bayesian%2520%2528or%2520probabilistic%2520generative%2529%2520approaches%2520to%2520brain%2520function%2520including%2520learning%2520and%2520reasoning%252C%2520we%2520here%2520propose%2520a%2520simple%2520Bayesian%2520model%2520of%2520logical%2520reasoning%2520and%2520statistical%2520learning.%2520The%2520theory%2520is%2520statistically%2520correct%2520as%2520it%2520satisfies%2520Kolmogorov%2527s%2520axioms%252C%2520is%2520consistent%2520with%2520both%2520Fenstad%2527s%2520representation%2520theorem%2520and%2520maximum%2520likelihood%2520estimation%2520and%2520performs%2520exact%2520Bayesian%2520inference%2520with%2520a%2520linear-time%2520complexity.%2520The%2520theory%2520is%2520logically%2520correct%2520as%2520it%2520is%2520a%2520data-driven%2520generalisation%2520of%2520uncertain%2520reasoning%2520from%2520consistency%252C%2520possibility%252C%2520inconsistency%2520and%2520impossibility.%2520The%2520theory%2520is%2520correct%2520in%2520terms%2520of%2520machine%2520learning%2520as%2520its%2520solution%2520to%2520generation%2520and%2520prediction%2520tasks%2520on%2520the%2520MNIST%2520dataset%2520is%2520not%2520only%2520empirically%2520reasonable%2520but%2520also%2520theoretically%2520correct%2520against%2520the%2520K%2520nearest%2520neighbour%2520method.%2520We%2520simply%2520model%2520how%2520data%2520causes%2520symbolic%2520knowledge%2520in%2520terms%2520of%2520its%2520satisfiability%2520in%2520formal%2520logic.%2520Symbolic%2520reasoning%2520emerges%2520as%2520a%2520result%2520of%2520the%2520process%2520of%2520going%2520the%2520causality%2520forwards%2520and%2520backwards.%25 an%20inference%20with%20a%20linear-time%20complexity.%20The%20theory%20is%20logically%20correct%20as%20it%20is%20a%20data-driven%20generalisation%20of%20uncertain%20reasoning%20from%20consistency%2C%20possibility%2C%20inconsistency%20and%20impossibility.%20The%20theory%20is%20correct%20in%20terms%20of%20machine%20learning%20as%20its%20solution%20to%20generation%20and%20prediction%20tasks%20on%20the%20MNIST%20dataset%20is%20not%20only%20empirically%20reasonable%20but%20also%20theoretically%20correct%20against%20the%20K%20nearest%20neighbour%20method.%20We%20simply%20model%20how%20data%20causes%20symbolic%20knowledge%20in%20terms%20of%20its%20satisfiability%20in%20formal%20logic.%20Symbolic%20reasoning%20emerges%20as%20a%20result%20of%20the%20process%20of%20going%20the%20causality%20forwards%20and%20backwards.%20The%20forward%20and%20backward%20processes%20correspond%20to%20an%20interpretation%20and%20inverse%20interpretation%20in%20formal%20logic%2C%20respectively.%20The%20inverse%20interpretation%20differentiates%20our%20work%20from%20the%20mainstream%20often%20referred%20to%20as%20inverse%20entailment%2C%20inverse%20deduction%20or%20inverse%20resolution.%20The%20perspective%20gives%20new%20insights%20into%20learning%20and%20reasoning%20towards%20human-like%20machine%20intelligence.&entry.1838667208=http%3A//arxiv.org/abs/2305.11098v2&entry.124074799=Read"},
{"title": "EEG-Driven Intention Decoding: Offline Deep Learning Benchmarking on a Robotic Rover", "author": "Ghadah Alosaimi and Maha Alsayyari and Yixin Sun and Stamos Katsigiannis and Amir Atapour-Abarghouei and Toby P. Breckon", "abstract": "Brain-computer interfaces (BCIs) provide a hands-free control modality for mobile robotics, yet decoding user intent during real-world navigation remains challenging. This work presents a brain-robot control framework for offline decoding of driving commands during robotic rover operation. A 4WD Rover Pro platform was remotely operated by 12 participants who navigated a predefined route using a joystick, executing the commands forward, reverse, left, right, and stop. Electroencephalogram (EEG) signals were recorded with a 16-channel OpenBCI cap and aligned with motor actions at Delta = 0 ms and future prediction horizons (Delta > 0 ms). After preprocessing, several deep learning models were benchmarked, including convolutional neural networks, recurrent neural networks, and Transformer architectures. ShallowConvNet achieved the highest performance for both action prediction and intent prediction. By combining real-world robotic control with multi-horizon EEG intention decoding, this study introduces a reproducible benchmark and reveals key design insights for predictive deep learning-based BCI systems.", "link": "http://arxiv.org/abs/2602.20041v1", "date": "2026-02-23", "relevancy": 2.1315, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5612}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5581}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4963}], "ma {"title": "LookBench: A Live and Holistic Open Benchmark for Fashion Image Retrieval", "author": "Gensmo. ai and Chao Gao and Siqiao Xue and Yimin Peng and Jiwen Fu and Tingyi Gu and Shanshan Li and Fan Zhou", "abstract": "In this paper, we present LookBench (We use the term \"look\" to reflect retrieval that mirrors how people shop -- finding the exact item, a close substitute, or a visually consistent alternative.), a live, holistic and challenging benchmark for fashion image retrieval in real e-commerce settings. LookBench includes both recent product images sourced from live websites and AI-generated fashion images, reflecting contemporary trends and use cases. Each test sample is time-stamped and we intend to update the benchmark periodically, enabling contamination-aware evaluation aligned with declared training cutoffs. Grounded in our fine-grained attribute taxonomy, LookBench covers single-item and outfit-level retrieval across. Our experiments reveal that LookBench poses a significant challenge on strong baselines, with many models achieving below $60\\%$ Recall@1. Our proprietary model achieves the best performance on LookBench, and we release an open-source counterpart that ranks second, with both models attaining state-of-the-art results on legacy Fashion200K evaluations. LookBench is designed to be updated semi-annually with new test samples and progressively harder task variants, providing a durable measure of progress. We publicly release our leaderboard, dataset, evaluation code, and trained models.", "link": "http://arxiv.org/abs/2601.14706v2", "date": "2026-02-23", "relevancy": 2.1218, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5736}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.53}, {"t {"title": "The Confusion is Real: GRAPHIC - A Network Science Approach to Confusion Matrices in Deep Learning", "author": "Johanna S. Fr\u00f6hlich and Bastian Heinlein and Jan U. Claar and Hans Rosenberger and Vasileios Belagiannis and Ralf R. M\u00fcller", "abstract": "Explainable artificial intelligence has emerged as a promising field of research to address reliability concerns in artificial intelligence. Despite significant progress in explainable artificial intelligence, few methods provide a systematic way to visualize and understand how classes are confused and how their relationships evolve as training progresses. In this work, we present GRAPHIC, an architecture-agnostic approach that analyzes neural networks on a class level. It leverages confusion matrices derived from intermediate layers using linear classifiers. We interpret these as adjacency matrices of directed graphs, allowing tools from network science to visualize and quantify learning dynamics across training epochs and intermediate layers. GRAPHIC provides insights into linear class separability, dataset issues, and architectural behavior, revealing, for example, similarities between flatfish and man and labeling ambiguities validated in a human study. In summary, by uncovering real confusions, GRAPHIC offers new perspectives on how neural networks learn. The code is available at https://github.com/Johanna-S-Froehlich/GRAPHIC.", "link": "http://arxiv.org/abs/2602.19770v1", "date": "2026-02-23", "relevancy": 2.1128, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5734}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5015}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4937}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Confusion%20is%20Real%3A%20GRAPHIC%20-%20A%20Network%20Science%20Approach%20to%20Confusion%20Matrices%20in%20Deep%20Learning&body=Title%3A%20The%20Confusion%20is%20Real%3A%20GRAPHIC%20-%20A%20Network%20Science%20Approach%20to%20Confusion%20Matrices%20in%20Deep%20Learning%0AAuthor%3A%20Johanna%20S.%20Fr%C3%B6hlich%20and%20Bastian%20Heinlein%20and%20Jan%20U.%20Claar%20and%20Hans%20Rosenberger%20and%20Vasileios%20Belagiannis%20and%20Ralf%20R.%20M%C3%BCller%0AAbstract%3A%20Explainable%20artificial%20intelligence%20has%20emerged%20as%20a%20promising%20field%20of%20research%20to%20address%20reliability%20concerns%20in%20artificial%20intelligence.%20Despite%20significant%20progress%20in%20explainable%20artificial%20intelligence%2C%20few%20methods%20provide%20a%20systematic%20way%20to%20visualize%20and%20understand%20how%20classes%20are%20confused%20and%20how%20their%20relationships%20evolve%20as%20training%20progresses.%20In%20this%20work%2C%20we%20present%20GRAPHIC%2C%20an%20architecture-agnostic%20approach%20that%20analyzes%20neural%20networks%20on%20a%20class%20level.%20It%20leverages%20confusion%20matrices%20derived%20from%20intermediate%20layers%20using%20linear%20classifiers.%20We%20interpret%20these%20as%20adjacency%20matrices%20of%20directed%20graphs%2C%20allowing%20tools%20from%20network%20science%20to%20visualize%20and%20quantify%20learning%20dynamics%20across%20training%20epochs%20and%20intermediate%20layers.%20GRAPHIC%20provides%20insights%20into%20linear%20class%20separability%2C%20dataset%20issues%2C%20and%20architectural%20behavior%2C%20revealing%2C%20for%20example%2C%20similarities%20between%20flatfish%20and%20man%20and%20labeling%20ambiguities%20validated%20in%20a%20human%20study.%20In%20summary%2C%20by%20uncovering%20real%20confusions%2C%20GRAPHIC%20offers%20new%20perspectives%20on%20how%20neural {"title": "Contrastive meta-domain adaptation for robust skin lesion classification across clinical and acquisition conditions", "author": "Rodrigo Mota and Kelvin Cunha and Emanoel dos Santos and F\u00e1bio Papais and Francisco Filho and Thales Bezerra and Erico Medeiros and Paulo Borba and Tsang Ing Ren", "abstract": "Deep learning models for dermatological image analysis remain sensitive to acquisition variability and domain-specific visual characteristics, leading to performance degradation when deployed in clinical settings. We investigate how visual artifacts and domain shifts affect deep learning-based skin lesion classification. We propose an adaptation strategy, grounded in the idea of visual meta-domains, that transfers visual representations from larger dermoscopic datasets into clinical image domains, thereby improving generalization robustness. Experiments across multiple dermatology datasets show consistent gains in classification performance and reduced gaps between dermoscopic and clinical images. These results emphasize the importance of domain-aware training for deployable systems.", "link": "http://arxiv.org/abs/2602.19857v1", "date": "2026-02-23", "relevancy": 2.0981, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5471}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5262}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5012}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Contrastive%20meta-domain%20adaptation%20for%20robust%20skin%20lesion%20classification%20across%20clinical%20and%20acquisition%20conditions&body=Title%3A%20Contrastive%20meta-domain%20adaptation%20for%20robust%20skin%20lesion%20classification%20across%20clinical%20and%20acquisition%20conditions%0AAuthor%3A%20Rodrigo%20Mota%20and%20Kelvin%20Cunha%20and%20Emanoel%20dos%20Santos%20and%20F%C3%A1bio%20Papais%20and%20Francisco%20Filho%20and%20Thales%20Bezerra%20and%20Erico%20Medeiros%20and%20Paulo%20Borba%20and%20Tsang%20Ing%20Ren%0AAbstract%3A%20Deep%20learning%20models%20for%20dermatological%20image%20analysis%20remain%20sensitive%20to%20acquisition%20variability%20and%20domain-specific%20visual%20characteristics%2C%20leading%20to%20performance%20degradation%20when%20deployed%20in%20clinical%20settings.%20We%20investigate%20how%20visual%20artifacts%20and%20domain%20shifts%20affect%20deep%20learning-based%20skin%20lesion%20classification.%20We%20propose%20an%20adaptation%20strategy%2C%20grounded%20in%20the%20idea%20of%20visual%20meta-domains%2C%20that%20transfers%20visual%20representations%20from%20larger%20dermoscopic%20datasets%20into%20clinical%20image%20domains%2C%20thereby%20improving%20generalization%20robustness.%20Experiments%20across%20multiple%20dermatology%20datasets%20show%20consistent%20gains%20in%20classification%20performance%20and%20reduced%20gaps%20between%20dermoscopic%20and%20clinical%20images.%20These%20results%20emphasize%20the%20importance%20of%20domain-aware%20training%20for%20deployable%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19857v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DContrastive%2520meta-domain%2520adaptation%2520for%2520robust%2520skin%2520lesion%2520classification%2520across%2520clinical%2520and%2520acquisition%2520conditions%26entry.906535625%3DRodrigo%2520Mota%2520and%2520Kelvin%2520Cunha%2520and%2520Emanoel%2520dos%2520Santos%2520and%2520F%25C3%25A1bio%2520Papais%2520and%2520Francisco%2520Filho%2520and%2520Thales%2520Bezerra%2520and%2520Erico%2520Medeiros%2520and%2520Paulo%2520Borba%2520and%2520Tsang%2520Ing%2520Ren%26entry.1292438233%3DDeep%2520learning%2520models%2520for%2520dermatological%2520image%2520analysis%2520remain%2520sensitive%2520to%2520acquisition%2520variability%2520and%2520domain-specific%2520visual%2520characteristics%252C%2520leading%2520to%2520performance%2520degradation%2520when%2520deployed%2520in%2520clinical%2520settings.%2520We%2520investigate%2520how%2520visual%2520artifacts%2520and%2520domain%2520shifts%2520affect%2520deep%2520learning-based%2520skin%2520lesion%2520classification.%2520We%2520propose%2520an%2520adaptation%2520strategy%252C%2520grounded%2520in%2520the%2520idea%2520of%2520visual%2520meta-domains%252C%2520that%2520transfers%2520visual%2520representations%2520from%2520larger%2520dermoscopic%2520datasets%2520into%2520clinical%2520image%2520domains%252C%2520thereby%2520improving%2520generalization%2520robustness.%2520Experiments%2520across%2520multiple%2520dermatology%2520datasets%2520show%2520consistent%2520gains%2520in%2520classification%2520performance%2520and%2520reduced%2520gaps%2520between%2520dermoscopic%2520and%2520clinical%2520images.%2520These%2520results%2520emphasize%2520the%2520importance%2520of%2520domain-aware%2520training%2520for%2520deployable%2520systems.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.19857v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Contrastive%20meta-domain%20adaptation%20for%20robust%20skin%20lesion%20classification%20across%20clinical%20and%20acquisition%20conditions&entry.906535625=Rodrigo%20Mota%20and%20Kelvin%20Cunha%20and%20Emanoel%20dos%20Santos%20and%20F%C3%A1bio%20Papais%20and%20Francisco%20Filho%20and%20Thales%20Bezerra%20and%20Erico%20Medeiros%20and%20Paulo%20Borba%20and%20Tsang%20Ing%20Ren&entry.1292438233=Deep%20learning%20models%20for%20dermatological%20image%20analysis%20remain%20sensitive%20to%20acquisition%20variability%20and%20domain-specific%20visual%20characteristics%2C%20leading%20to%20performance%20degradation%20 {"title": "Adaptation to Intrinsic Dependence in Diffusion Language Models", "author": "Yunxiao Zhao and Changxiao Cai", "abstract": "Diffusion language models (DLMs) have recently emerged as a promising alternative to autoregressive (AR) approaches, enabling parallel token generation beyond a rigid left-to-right order. Despite growing empirical success, the theoretical understanding of how unmasking schedules -- which specify the order and size of unmasked tokens during sampling -- affect generation quality remains limited. In this work, we introduce a distribution-agnostic unmasking schedule for DLMs that adapts to the (unknown) dependence structure of the target data distribution, without requiring any prior knowledge or hyperparameter tuning. In contrast to prior deterministic procedures that fix unmasking sizes, our method randomizes the number of tokens revealed at each iteration. We show that, for two specific parameter choices, the sampling convergence guarantees -- measured by Kullback-Leibler (KL) divergence -- scale as $\\widetilde O(\\mathsf{TC}/K)$ and $\\widetilde O(\\mathsf{DTC}/K)$ respectively. Here, $K$ is the number of iterations, and $\\mathsf{TC}$ and $\\mathsf{DTC}$ are the total correlation and dual total correlation of the target distribution, capturing the intrinsic dependence structure underlying the data. Importantly, our guarantees hold in the practically relevant parallel-sampling regime $K<L$ where $L$ is the token sequence length. These results significantly improve upon prior convergence theories and yield substantial sampling acceleration for low-complexity distributions. Overall, our findings unveil the adaptivity of DLMs to intrinsic data structures and shed light on the benefit of randomized unmasking sizes in inference schedule design.", "link": "http://arxiv.org/abs/2602.20126v1", "date": "2026-02-23", "relevancy": 2.0964, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5502}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5398}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.498}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Adaptation%20to%20Intrinsic%20Dependence%20in%20Diffusion%20Language%20Models&body=Title%3A%20Adaptation%20to%20Intrinsic%20Dependence%20in%20Diffusion%20Language%20Models%0AAuthor%3A%20Yunxiao%20Zhao%20and%20Changxiao%20Cai%0AAbstract%3A%20Diffusion%20language%20models%20%28DLMs%29%20have%20recently%20emerged%20as%20a%20promising%20alternative%20to%20autoregressive%20%28AR%29%20approaches%2C%20enabling%20parallel%20token%20generation%20beyond%20a%20rigid%20left-to-right%20order.%20Despite%20growing%20empirical%20success%2C%20the%20theoretical%20understanding%20of%20how%20unmasking%20schedules%20--%20which%20specify%20the%20order%20and%20size%20of%20unmasked%20tokens%20during%20sampling%20--%20affect%20generation%20quality%20remains%20limited.%20In%20this%20work%2C%20we%20introduce%20a%20distribution-agnostic%20unmasking%20schedule%20for%20DLMs%20that%20adapts%20to%20the%20%28unknown%29%20dependence%20structure%20of%20the%20target%20data%20distribution%2C%20without%20requiring%20any%20prior%20knowledge%20or%20hyperparameter%20tuning.%20In%20contrast%20to%20prior%20deterministic%20procedures%20that%20fix%20unmasking%20sizes%2C%20our%20method%20randomizes%20the%20number%20of%20tokens%20revealed%20at%20each%20iteration.%20We%20show%20that%2C%20for%20two%20specific%20parameter%20choices%2C%20the%20sampling%20convergence%20guarantees%20--%20measured%20by%20Kullback-Leibler%20%28KL%29%20divergence%20--%20scale%20as%20%24%5Cwidetilde%20O%28%5Cmathsf%7BTC%7D/K%29%24%20and%20%24%5Cwidetilde%20O%28%5Cmathsf%7BDTC%7D/K%29%24%20respectively.%20Here%2C%20%24K%24%20is%20the%20number%20of%20iterations%2C%20and%20%24%5Cmathsf%7BTC%7D%24%20and%20%24%5Cmathsf%7BDTC%7D%24%20are%20the%20total%20correlation%20and%20dual%20total%20correlation%20of%20the%20target%20distribution%2C%20capturing%20the%20intrinsic%20dependence%20structure%20underlying%20the%20data.%20Importantly%2C%20our%20guarantees%20hold%20in%20the%20practically%20relevant%20parallel-sampling%20regime%20%24K%3CL%24%20where%20%24L%24%20is%20the%20token%20sequence%20length.%20These%20results%20significantly%20improve%20upon%20prior%20convergence%20theories%20and%20yield%20substantial%20sampling%20acceleration%20for%20low-complexity%20distributions.%20Overall%2C%20our%20findings%20unveil%20the%20adaptivity%20of%20DLMs%20to%20intrinsic%20data%20structures%20and%20shed%20light%20on%20the%20benefit%20of%20randomized%20unmasking%20sizes%20in%20inference%20schedule%20design.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20126v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAdaptation%2520to%2520Intrinsic%2520Dependence%2520in%2520Diffusion%2520Language%2520Models%26entry.906535625%3DYunxiao%2520Zhao%2520and%2520Changxiao%2520Cai%26entry.1292438233%3DDiffusion%2520language%2520models%2520%2528DLMs%2529%2520have%2520recently%2520emerged%2520as%2520a%2520promising%2520alternative%2520to%2520autoregressive%2520%2528AR%2529%2520approaches%252C%2520enabling%2520parallel%2520token%2520generation%2520beyond%2520a%2520rigid%2520left-to-right%2520order.%2520Despite%2520growing%2520empirical%2520success%252C%2520the%2520theoretical%2520understanding%2520of%2520how%2520unmasking%2520schedules%2520--%2520which%2520specify%2520the%2520order%2520and%2520size%2520of%2520unmasked%2520tokens%2520during%2520sampling%2520--%2520affect%2520generation%2520quality%2520remains%2520limited.%2520In%2520this%2520work%252C%2520we%2520introduce%2520a%2520distribution-agnostic%2520unmasking%2520schedule%2520for%2520DLMs%2520that% {"title": "Exact Discrete Stochastic Simulation with Deep-Learning-Scale Gradient Optimization", "author": "Jose M. G. Vilar and Leonor Saiz", "abstract": "Exact stochastic simulation of continuous-time Markov chains (CTMCs) is essential when discreteness and noise drive system behavior, but the hard categorical event selection in Gillespie-type algorithms blocks gradient-based learning. We eliminate this constraint by decoupling forward simulation from backward differentiation, with hard categorical sampling generating exact trajectories and gradients propagating through a continuous massively-parallel Gumbel-Softmax straight-through surrogate. Our approach enables accurate optimization at parameter scales over four orders of magnitude beyond existing simulators. We validate for accuracy, scalability, and reliability on a reversible dimerization model (0.09% error), a genetic oscillator (1.2% error), a 203,796-parameter gene regulatory network achieving 98.4% MNIST accuracy (a prototypical deep-learning multilayer perceptron benchmark), and experimental patch-clamp recordings of ion channel gating (R^2 = 0.987) in the single-channel regime. Our GPU implementation delivers 1.9 billion steps per second, matching the scale of non-differentiable simulators. By making exact stochastic simulation massively parallel and autodiff-compatible, our results enable high-dimensional parameter inference and inverse design across systems biology, chemical kinetics, physics, and related CTMC-governed domains.", "link": "http://arxiv.org/abs/2602.19775v1", "date": "2026-02-23", "relevancy": 2.0955, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5406}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5271}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "lin onal%20parameter%20inference%20and%20inverse%20design%20across%20systems%20biology%2C%20chemical%20kinetics%2C%20physics%2C%20and%20related%20CTMC-governed%20domains.%0ALink%3A%20http%3A//arxiv.org/abs/2602.19775v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DExact%2520Discrete%2520Stochastic%2520Simulation%2520with%2520Deep-Learning-Scale%2520Gradient%2520Optimization%26entry.906535625%3DJose%2520M.%2520G.%2520Vilar%2520and%2520Leonor%2520Saiz%26entry.1292438233%3DExact%2520stochastic%2520simulation%2520of%2520continuous-time%2520Markov%2520chains%2520%2528CTMCs%2529%2520is%2520essential%2520when%2520discreteness%2520and%2520noise%2520drive%2520system%2520behavior%252C%2520but%2520the%2520hard%2520categorical%2520event%2520selection%2520in%2520Gillespie-type%2520algorithms%2520blocks%2520gradient-based%2520learning.%2520We%2520eliminate%2520this%2520constraint%2520by%2520decoupling%2520forward%2520simulation%2520from%2520backward%2520differentiation%252C%2520with%2520hard%2520categorical%2520sampling%2520generating%2520exact%2520trajectories%2520and%2520gradients%2520propagating%2520through%2520a%2520continuous%2520massively-parallel%2520Gumbel-Softmax%2520straight-through%2520surrogate.%2520Our%2520approach%2520enables%2520accurate%2520optimization%2520at%2520parameter%2520scales%2520over%2520four%2520orders%2520of%2520magnitude%2520beyond%2520existing%2520simulators.%2520We%2520validate%2520for%2520accuracy%252C%2520scalability%252C%2520and%2520reliability%2520on%2520a%2520reversible%2520dimerization%2520model%2520%25280.09%2525%2520error%2529%252C%2520a%2520genetic%2520oscillator%2520%25281.2%2525%2520error%2529%252C%2520a%2520203%252C796-parameter%2520gene%2520regulatory%2520network%2520achieving%252098.4%2525%2520MNIST%2520accuracy%2520%2528a%2520prototypical%2520deep-learning%2520multilayer%2520perceptron%2520benchmark%2529%252C%2520and%2520experimental%2520patch-clamp%2520recordings%2520of%2520ion%2520channel%2520gating%2520%2528R%255E2%2520%253D%25200.987%2529%2520in%2520the%2520single-channel%2520regime.%2520Our%2520GPU%2520implementation%2520delivers%25201.9%2520billion%2520steps%2520per%2520second%252C%2520matching%2520the%2520scale%2520of%2520non-differentiable%2520simulators.%2520By%2520making%2520exact%2520stochastic%2520simulation%2520massively%2520parallel%2520and%2520autodiff-compatible%252C%2520our%2520results%2520enable%2520high-dimensional%2520parameter%2520inference%2520and%2520inverse%2520design%2520across%2520systems%2520biology%252C%2520chemical%2520kinetics%252C%2520physics%252C%2520and%2520related%2520CTMC-governed%2520domains.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.19775v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Exact%20Discrete%20Stochastic%20Simulation%20with%20Deep-Learning-Scale%20Gradient%20Optimization&entry.906535625=Jose%20M.%20G.%20Vilar%20and%20Leonor%20Saiz&entry.1292438233=Exact%20stochastic%20simulation%20of%20continuous-time%20Markov%20chains%20%28CTMCs%29%20is%20essential%20when%20discreteness%20and%20noise%20drive%20system%20behavior%2C%20but%20the%20hard%20categorical%20event%20selection%20in%20Gillespie-type%20algorithms%20blocks%20gradient-based%20learning.%20We%20eliminate%20this%20constraint%20by%20decoupling%20forward%20simulation%20from%20backward%20differentiation%2C%20with%20hard%20categorical%20sampling%20generating%20exact%20trajectories%20and%20gradients%20propagating%20through%20a%20continuous%20massively-parallel%20Gumbel-Softmax%20straight-through%20surrogate.%20Our%20approach%20enables%20accurate%20optimization%20at%20parameter%20scales%20over%20four%20orders%20of%20magnitude%20beyond%20existing%20simulators.%20We%20validate%20for%20accuracy%2C%20scalability%2C%20and%20reliability%20on%20a%20reversible%20dimerization%20model%20%280.09%25%20error%29%2C%20a%2 {"title": "Multilingual Large Language Models do not comprehend all natural languages to equal degrees", "author": "Natalia Moskvina and Raquel Montero and Masaya Yoshida and Ferdy Hubers and Paolo Morosi and Walid Irhaymi and Jin Yan and Tamara Serrano and Elena Pagliarini and Fritz G\u00fcnther and Evelina Leivada", "abstract": "Large Language Models (LLMs) play a critical role in how humans access information. While their core use relies on comprehending written requests, our understanding of this ability is currently limited, because most benchmarks evaluate LLMs in high-resource languages predominantly spoken by Western, Educated, Industrialised, Rich, and Democratic (WEIRD) communities. The default assumption is that English is the best-performing language for LLMs, while smaller, low-resource languages are linked to less reliable outputs, even in multilingual, state-of-the-art models. To track variation in the comprehension abilities of LLMs, we prompt 3 popular models on a language comprehension task across 12 languages, representing the Indo-European, Afro-Asiatic, Turkic, Sino-Tibetan, and Japonic language families. Our results suggest that the models exhibit remarkable linguistic accuracy across typologically diverse languages, yet they fall behind human baselines in all of them, albeit to different degrees. Contrary to what was expected, English is not the best-performing language, as it was systematically outperformed by several Romance languages, even lower-resource ones. We frame the results by discussing the role of several factors that drive LLM performance, such as tokenization, language distance from Spanish and English, size of training data, and data origin in high- vs. low-resource languages and WEIRD vs. non-WEIRD communities.", "link": "http://arxiv.org/abs/2602.20065v1", "date": "2026-02-23", "relevancy": 2.0926, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5409}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5409}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4342}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multilingual%20Large%20Language%20Models%20do%20not%20comprehend%20all%20natural%20languages%20to%20equal%20degrees&body=Title%3A%20Multilingual%20Large%20Language%20Models%20do%20not%20comprehend%20all%20natural%20languages%20to%20equal%20degrees%0AAuthor%3A%20Natalia%20Moskvina%20and%20Raquel%20Montero%20and%20Masaya%20Yoshida%20and%20Ferdy%20Hubers%20and%20Paolo%20Morosi%20and%20Walid%20Irhaymi%20and%20Jin%20Yan%20and%20Tamara%20Serrano%20and%20Elena%20Pagliarini%20and%20Fritz%20G%C3%BCnther%20and%20Evelina%20Leivada%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20play%20a%20critical%20role%20in%20how%20humans%20access%20information.%20While%20their%20core%20use%20relies%20on%20comprehending%20written%20requests%2C%20our%20understanding%20of%20this%20ability%20is%20currently%20limited%2C%20because%20most%20benchmarks%20evaluate%20LLMs%20in%20high-resource%20languages%20predominantly%20spoken%20by%20Western%2C%20Educated%2C%20Industrialised%2C%20Rich%2C%20and%20Democratic%20%28WEIRD%29%20communities.%20The%20default%20assumption%20is%20that%20English%20is%20the%20best-performing%20language%20for%20LLMs%2C%20while%20smaller%2C%20low-resource%20languages%20are%20linked%20to%20less%20reliable%20outputs%2C%20even%20in%20multilingual%2C%20state-of-the-art%20models.%20To%20track%20variation%20in%20the%20comprehension%20abilities%20of%20LLMs%2C%20we%20prompt%203%20popular%20models%20on%20a%20language%20comprehension%20task%20across%2012%20languages%2C%20representing%20the%20Indo-European%2C%20Afro-Asiatic%2C%20Turkic%2C%20Sino-Tibetan%2C%20and%20Japonic%20language%20families.%20Our%20results%20suggest%20that%20the%20models%20exhibit%20remarkable%20linguistic%20accuracy%20across%20typologically%20diverse%20languages%2C%20yet%20they%20fall%20behind%20human%20baselines%20in%20all%20of%20them%2C%20albeit%20to%20different%20degrees.%20Contrary%20to%20what%20was%20expected%2C%20English%20is%20not%20the%20best-performing%20language%2C%20as%20it%20was%20systematically%20outperformed%20by%20several%20Romance%20languages%2C%20even%20lower-resource%20ones.%20We%20frame%20the%20results%20by%20discussing%20the%20role%20of%20several%20factors%20that%20drive%20LLM%20performance%2C%20such%20as%20tokenization%2C%20language%20distance%20from%20Spanish%20and%20English%2C%20size%20of%20training%20data%2C%20and%20data%20origin%20in%20high-%20vs.%20low-resource%20languages%20and%20WEIRD%20vs.%20non-WEIRD%20communities.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20065v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMultilingual%2520Large%2520Language%2520Models%2520do%2520not%2520comprehend%2520all%2520natural%2520languages%2520to%2520equal%2520degrees%26entry.906535625%3DNatalia%2520Moskvina%2520and%2520Raquel%2520Montero%2520and%2520Masaya%2520Yoshida%2520and%2520Ferdy%2520Hubers%2520and%2520Paolo%2520Morosi%2520and%2520Walid%2520Irhaymi%2520and%2520Jin%2520Yan%2520and%2520Tamara%2520Serrano%2520and%2520Elena%2520Pagliarini%2520and%2520Fritz%2520G%25C3%25BCnther%2520and%2520Evelina%2520Leivada%26entry.1292438233%3DLarge%2520Language%2520Models%2520%2528LLMs%2529%2520play%2520a%2520critical%2520role%2520in%2520how%2520humans%2520access%2520information.%2520While%2520their%2520core%2520use%2520relies%2520on%2520comprehending%2520written%2520requests%252C%2520our%2520understanding%2520of%2520this%2520ability%2520is%2520currently%2520limited%252C%2520because%2520most%2520benchmarks%2520evaluate%2520LLMs%2520in%2520high-resource%2 {"title": "Towards Personalized Multi-Modal MRI Synthesis across Heterogeneous Datasets", "author": "Yue Zhang and Zhizheng Zhuo and Siyao Xu and Shan Lv and Zhaoxi Liu and Jun Qiu and Qiuli Wang and Yaou Liu and S. Kevin Zhou", "abstract": "Synthesizing missing modalities in multi-modal magnetic resonance imaging (MRI) is vital for ensuring diagnostic completeness, particularly when full acquisitions are infeasible due to time constraints, motion artifacts, and patient tolerance. Recent unified synthesis models have enabled flexible synthesis tasks by accommodating various input-output configurations. However, their training and evaluation are typically restricted to a single dataset, limiting their generalizability across diverse clinical datasets and impeding practical deployment. To address this limitation, we propose PMM-Synth, a personalized MRI synthesis framework that not only supports various synthesis tasks but also generalizes effectively across heterogeneous datasets. PMM-Synth is jointly trained on multiple multi-modal MRI datasets that differ in modality coverage, disease types, and intensity distributions. It achieves cross-dataset generalization through three core innovations: a Personalized Feature Modulation module that dynamically adapts feature representations based on dataset identifier to mitigate the impact of distributional shifts; a Modality-Consistent Batch Scheduler that facilitates stable and efficient batch training under inconsistent modality conditions; and a selective supervision loss to ensure effective learning when ground truth modalities are partially missing. Evaluated on four clinical multi-modal MRI datasets, PMM-Synth consistently outperforms state-of-the-art methods in both one-to-one and many-to-one synthesis tasks, achieving superior PSNR and SSIM scores. Qualitative results further demonstrate improved preservation of anatomical structures and pathological details. Additionally, downstream tumor segmentation and radiological reporting studies suggest that PMM-Synth holds potential for supporting reliable diagnosis under real-world modality-missing scenarios.", "link": "http://arxiv.org/abs/2602.19723v1", "date": "2026-02-23", "relevancy": 2.0921, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5278}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5258}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5041}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Personalized%20Multi-Modal%20MRI%20Synthesis%20across%20Heterogeneous%20Datasets&body=Title%3A%20Towards%20Personalized%20Multi-Modal%20MRI%20Synthesis%20across%20Heterogeneous%20Datasets%0AAuthor%3A%20Yue%20Zhang%20and%20Zhizheng%20Zhuo%20and%20Siyao%20Xu%20and%20Shan%20Lv%20and%20Zhaoxi%20Liu%20and%20Jun%20Qiu%20and%20Qiuli%20Wang%20and%20Yaou%20Liu%20and%20S.%20Kevin%20Zhou%0AAbstract%3A%20Synthesizing%20missing%20modalities%20in%20multi-modal%20magnetic%20resonance%20imaging%20%28MRI%29%20is%20vital%20for%20ensuring%20diagnostic%20completeness%2C%20particularly%20when%20full%20acquisitions%20are%20infeasible%20due%20to%20time%20constraints%2C%20motion%20artifacts%2C%20and%20patient%20tolerance.%20Recent%20unified%20synthesis%20models%20have%20enabled%20flexible%20synthesis%20tasks%20by%20accommodating%20various%20input-output%20configurations.%20However%2C%20their%20training%20and%20evaluation%20are%20typically%20restricted%20to%20a%20single%20dataset%2C%20limiting%20their%20generalizability%20across%20diverse%20clinical%20datasets%20and%20impeding%20practical%20deployment.%20To%20address%20this%20limitation%2C%20we%20propose%20PMM-Synth%2C%20a%20personalized%20MRI%20synthesis%20framework%20that%20not {"title": "Make Some Noise: Unsupervised Remote Sensing Change Detection Using Latent Space Perturbations", "author": "Bla\u017e Rolih and Matic Fu\u010dka and Filip Wolf and Luka \u010cehovin Zajc", "abstract": "Unsupervised change detection (UCD) in remote sensing aims to localise semantic changes between two images of the same region without relying on labelled data during training. Most recent approaches rely either on frozen foundation models in a training-free manner or on training with synthetic changes generated in pixel space. Both strategies inherently rely on predefined assumptions about change types, typically introduced through handcrafted rules, external datasets, or auxiliary generative models. Due to these assumptions, such methods fail to generalise beyond a few change types, limiting their real-world usage, especially in rare or complex scenarios. To address this, we propose MaSoN (Make Some Noise), an end-to-end UCD framework that synthesises diverse changes directly in the latent feature space during training. It generates changes that are dynamically estimated using feature statistics of target data, enabling diverse yet data-driven variation aligned with the target domain. It also easily extends to new modalities, such as SAR. MaSoN generalises strongly across diverse change types and achieves state-of-the-art performance on five benchmarks, improving the average F1 score by 14.1 percentage points. Project page: https://blaz-r.github.io/mason_ucd", "link": "http://arxiv.org/abs/2602.19881v1", "date": "2026-02-23", "relevancy": 1.6263, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5545}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5281}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5251}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Make%20Some%20Noise%3A%20Unsupervised%20Remote%20Sensing%20Change%20Detection%20Using%20Latent%20Space%20Perturbations&body=Title%3A%20Make%20Some%20Noise%3A%20Unsupervised%20Remote%20Sensing%20Change%20Detection%20Using%20Latent%20Space%20Perturbations%0AAuthor%3A%20Bla%C5%BE%20Rolih%20and%20Matic%20Fu%C4%8Dka%20and%20Filip%20Wolf%20and%20Luka%20%C4%8Cehovin%20Zajc%0AAbstract%3A%20Unsupervised%20change%20detection%20%28UCD%29%20in%20remote%20sensing%20aims%20to%20localise%20semantic%20changes%20between%20two%20images%20of%20the%20same%20region%20without%20relying%20on%20labelled%20data%20during%20training.%20Most%20recent%20approaches%20rely%20either%20on%20frozen%20foundation%20models%20in%20a%20training-free%20manner%20or%20on%20training%20with%20synthetic%20changes%20generated%20in%20pixel%20space.%20Both%20strategies%20inherently%20rely%20on%20predefined%20assumptions%20about%20change%20types%2C%20typically%20introduced%20through%20handcrafted%20rules%2C%20external%20datasets%2C%20or%20auxiliary%20generative%20models.%20Due%20to%20these%20assumptions%2C%20such%20methods%20fail%20to%20generalise%20beyond%20a%20few%20change%20types%2C%20limiting%20their%20real-world%20usage%2C%20especially%20in%20rare%20or%20complex%20scenarios.%20To%20address%20this%2C%20we%20propose%20MaSoN%20%28Make%20Some%20Noise%29%2C%20an%20end-to-end%20UCD%20framework%20that%20synthesises%20diverse%20changes%20directly%20in%20the%20latent%20feature%20space%20during%20training.%20It%20generates%20changes%20that%20are%20dynamically%20estimated%20using%20feature%20statistics%20of%20target%20data%2C%20enabling%20diverse%20yet%20data-driven%20variation%20aligned%20with%20the%20target%20domain.%20It%20also%20easily%20extends%20to%20new%20modalities%2C%20such%20as%20SAR.%20MaSoN%20generalises%20strongly%20across%20diverse%20change%20types%20and%20achieves%20state-of-the-art%20performance%20on%20five%20benchmarks%2C%20improving%20the%20average%20F1%20score%20by%2014.1%20percentage%20points.%20Project%20page%3A%20https%3A//blaz-r.github.io/mason_ucd%0ALink%3A%20http%3A//arxiv.org/abs/2602.19881v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMake%2520Some%2520Noise%253A%2520Unsupervised%2520Remote%2520Sensing%2520Change%2520Detection%2520Using%2520Latent%2520Space%2520Perturbations%26entry.906535625%3DBla%25C5%25BE%2520Rolih%2520and%2520Matic%2520Fu%25C4%258Dka%2520and%2520Filip%2520Wolf%2520and%2520Luka%2520%25C4%258Cehovin%2520Zajc%26entry.1292438233%3DUnsupervised%2520change%2520detection%2520%2528UCD%2529%2520in%2520remote%2520sensing%2520aims%2520to%2520localise%2520semantic%2520changes%2520between%2520two%2520images%2520of%2520the%2520same%2520region%2520without%2520relying%2520on%2520labelled%2520data%2520during%2520training.%2520Most%2520recent%2520approaches%2520rely%2520either%2520on%2520frozen%2520foundation%2520models%2520in%2520a%2520training-free%2520manner%2520or%2520on%2520training%2520with%2520synthetic%2520changes%2520generated%2520in%2520pixel%2520space.%2520Both%2520strategies%2520inherently%2520rely%2520on%2520predefined%2520assumptions%2520about%2520change%2520types%252C%2520typically%2520introduced%2520through%2520handcrafted%2520rules%252C%2520external%2520datasets%252C%2520or%2520auxiliary%2520generative%2520models.%2520Due%2520to%2520these%2520assumptions%252C%2520such%2520methods%2520fail%2520to%2520generalise%2520beyond%2520a%2520few%2520change%2520types%252C%2520limiting%2520their%2520real-world%2520usage%252C%2520especially%2520in%2520rare%2520or%2520complex%2520scenarios.%2520To%2520address%2520this%252C%2520we%2520propose%2520MaSoN%2520%2528Make%2520Some%2520Noise%2529%252C%2520an%2520end-to-end%2520UCD%2520framework%2520that%2520synthesises%2520diverse%2520changes%2520dire {"title": "The Invisible Gorilla Effect in Out-of-distribution Detection", "author": "Harry Anthony and Ziyun Liang and Hermione Warr and Konstantinos Kamnitsas", "abstract": "Deep Neural Networks achieve high performance in vision tasks by learning features from regions of interest (ROI) within images, but their performance degrades when deployed on out-of-distribution (OOD) data that differs from training data. This challenge has led to OOD detection methods that aim to identify and reject unreliable predictions. Although prior work shows that OOD detection performance varies by artefact type, the underlying causes remain underexplored. To this end, we identify a previously unreported bias in OOD detection: for hard-to-detect artefacts (near-OOD), detection performance typically improves when the artefact shares visual similarity (e.g. colour) with the model's ROI and drops when it does not - a phenomenon we term the Invisible Gorilla Effect. For example, in a skin lesion classifier with red lesion ROI, we show the method Mahalanobis Score achieves a 31.5% higher AUROC when detecting OOD red ink (similar to ROI) compared to black ink (dissimilar) annotations. We annotated artefacts by colour in 11,355 images from three public datasets (e.g. ISIC) and generated colour-swapped counterfactuals to rule out dataset bias. We then evaluated 40 OOD methods across 7 benchmarks and found significant performance drops for most methods when artefacts differed from the ROI. Our findings highlight an overlooked failure mode in OOD detection and provide guidance for more robust detectors. Code and annotations are available at: https://github.com/HarryAnthony/Invisible_Gorilla_Effect.", "link": "http://arxiv.org/abs/2602.20068v1", "date": "2026-02-23", "relevancy": 1.4838, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5088}, {"title": "Thinking Outside the B {"title": "AttestLLM: Efficient Attestation Framework for Billion-scale On-device LLMs", "author": "Ruisi Zhang and Yifei Zhao and Neusha Javidnia and Mengxin Zheng and Farinaz Koushanfar", "abstract": "As on-device LLMs(e.g., Apple on-device Intelligence) are widely adopted to reduce network dependency, improve privacy, and enhance responsiveness, verifying the legitimacy of models running on local devices becomes critical. Existing attestation techniques are not suitable for billion-parameter Large Language Models (LLMs), struggling to remain both time- and memory-efficient while addressing emerging threats in the LLM era. In this paper, we present AttestLLM, the first-of-its-kind attestation framework to protect the hardware-level intellectual property (IP) of device vendors by ensuring that only authorized LLMs can execute on target platforms. AttestLLM leverages an algorithm/software/hardware co-design approach to embed robust watermarking signatures onto the activation distributions of LLM building blocks. It also optimizes the attestation protocol within the Trusted Execution Environment (TEE), providing efficient verification without compromising inference throughput. Extensive proof-of-concept evaluations on LLMs from Llama, Qwen, and Phi families for on-device use cases demonstrate AttestLLM's attestation reliability, fidelity, and efficiency. Furthermore, AttestLLM enforces model legitimacy and exhibits resilience against model replacement and forgery attacks.", "link": "http://arxiv.org/abs/2509.06326v2", "date": "2026-02-23", "relevancy": 1.7144, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4862}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4198}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", {"title": "Dataless Weight Disentanglement in Task Arithmetic via Kronecker-Factored Approximate Curvature", "author": "Angelo Porrello and Pietro Buzzega and Felix Dangel and Thomas Sommariva and Riccardo Salami and Lorenzo Bonicelli and Simone Calderara", "abstract": "Task Arithmetic yields a modular, scalable way to adapt foundation models. Combining multiple task vectors, however, can lead to cross-task interference, causing representation drift and degraded performance. Representation drift regularization provides a natural remedy to disentangle task vectors; however, existing approaches typically require external task data, conflicting with modularity and data availability constraints (e.g., privacy requirements). We propose a dataless approach by framing regularization against representation drift as a curvature matrix approximation problem. This allows us to leverage well-established techniques; in particular, we adopt Kronecker-Factored Approximate Curvature and obtain a practical regularizer that achieves state-of-the-art results in task addition and negation. Our method has constant complexity in the number of tasks and promotes robustness to task vector rescaling, eliminating the need for held-out tuning.", "link": "http://arxiv.org/abs/2602.17385v2", "date": "2026-02-23", "relevancy": 1.3361, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4552}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4383}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4278}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dataless%20Weight%20Disentanglement%20in%20Task%20Arithmetic%20via%20Kronecker-Factored%20App ry.906535625=Angelo%20Porrello%20and%20Pietro%20Buzzega%20and%20Felix%20Dangel%20and%20Thomas%20Sommariva%20and%20Riccardo%20Salami%20and%20Lorenzo%20Bonicelli%20and%20Simone%20Calderara&entry.1292438233=Task%20Arithmetic%20yields%20a%20modular%2C%20scalable%20way%20to%20adapt%20foundation%20models.%20Combining%20multiple%20task%20vectors%2C%20however%2C%20can%20lead%20to%20cross-task%20interference%2C%20causing%20representation%20drift%20and%20degraded%20performance.%20Representation%20drift%20regularization%20provides%20a%20natural%20remedy%20to%20disentangle%20task%20vectors%3B%20however%2C%20existing%20approaches%20typically%20require%20external%20task%20data%2C%20conflicting%20with%20modularity%20and%20data%20availability%20constraints%20%28e.g.%2C%20privacy%20requirements%29.%20We%20propose%20a%20dataless%20approach%20by%20framing%20regularization%20against%20representation%20drift%20as%20a%20curvature%20matrix%20approximation%20problem.%20This%20allows%20us%20to%20leverage%20well-established%20techniques%3B%20in%20particular%2C%20we%20adopt%20Kronecker-Factored%20Approximate%20Curvature%20and%20obtain%20a%20practical%20regularizer%20that%20achieves%20state-of-the-art%20results%20in%20task%20addition%20and%20negation.%20Our%20method%20has%20constant%20complexity%20in%20the%20number%20of%20tasks%20and%20promotes%20robustness%20to%20task%20vector%20rescaling%2C%20eliminating%20the%20need%20for%20held-out%20tuning.&entry.1838667208=http%3A//arxiv.org/abs/2602.17385v2&entry.124074799=Read"},
{"title": "Optimal Local Convergence Rates of Stochastic First-Order Methods under Local $\u03b1$-PL", "author": "Saeed Masiha and Saber Salehkaleybar and Niao He and Negar Kiyavash and Patrick Thiran", "abstract": "We study the local convergence rate of stochastic first-order methods under a local $\u03b1$-Polyak-Lojasiewicz ($\u03b1$-PL) condition in a neighborhood of a target connected component $\\mathcal{M}$ of the local minimizer set. The parameter $\u03b1\\in [1,2]$ is the exponent of the gradient norm in the $\u03b1$-PL inequality: $\u03b1=2$ recovers the classical PL case, $\u03b1=1$ corresponds to Holder-type error bounds, and intermediate values interpolate between these regimes. Our performance criterion is the number of oracle queries required to output $\\hat{x}$ with $F(\\hat{x})-l \\le \\varepsilon$, where $l := F(y)$ for any $y \\in \\mathcal{M}$. We work in a local regime where the algorithm is initialized near $\\mathcal{M}$ and, with high probability, its iterates remain in that neighborhood. We establish a lower bound $\u03a9(\\varepsilon^{-2/\u03b1})$ for all stochastic first-order methods in this regime, and we obtain a matching upper bound $\\mathcal{O}(\\varepsilon^{-2/\u03b1})$ for $1 \\le \u03b1< 2$ via a SARAH-type variance-reduced method with time-varying batch sizes and step sizes. In the convex setting, assuming a local $\u03b1$-PL condition on the $\\varepsilon$-sublevel set, we further show a complexity lower bound $\\widetilde\u03a9(\\varepsilon^{-2/\u03b1})$ for reaching an $\\varepsilon$-global optimum, matching the $\\varepsilon$-dependence of known accelerated stochastic subgradient methods.", "link": "http://arxiv.org/abs/2408.01839v2", "date": "2026-02-23", "relevancy": 1.1918, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4318}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.3552}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.3531}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Optimal%20Local%20Convergence%20Rates%20of%20Stochastic%20First-Order%20Methods%20under%20Local%20%24%CE%B1%24-PL&body=Title%3A%20Optimal%20Local%20Convergence%20Rates%20of%20Stochastic%20First-Order%20Methods%20under%20Local%20%24%CE%B1%24-PL%0AAuthor%3A%20Saeed%20Masiha%20and%20Saber%20Salehkaleybar%20and%20Niao%20He%20and%20Negar%20Kiyavash%20and%20Patrick%20Thiran%0AAbstract%3A%20We%20study%20the%20local%20convergence%20rate%20of%20stochastic%20first-order%20methods%20under%20a%20local%20%24%CE%B1%24-Polyak-Lojasiewicz%20%28%24%CE%B1%24-PL%29%20condition%20in%20a%20neighborhood%20of%20a%20target%20connected%20component%20%24%5Cmathcal%7BM%7D%24%20of%20the%20local%20minimizer%20set.%20The%20parameter%20%24%CE%B1%5Cin%20%5B1%2C2%5D%24%20is%20the%20exponent%20of%20the%20gradient%20norm%20in%20the%20%24%CE%B1%24-PL%20inequality%3A%20%24%CE%B1%3D2%24%20recovers%20the%20classical%20PL%20case%2C%20%24%CE%B1%3D1%24%20corresponds%20to%20Holder-type%20error%20bounds%2C%20and%20intermediate%20values%20interpolate%20between%20these%20regimes.%20Our%20performance%20criterion%20is%20the%20number%20of%20oracle%20queries%20required%20to%20output%20%24%5Chat%7Bx%7D%24%20with%20%24F%28%5Chat%7Bx%7D%29-l%20%5Cle%20%5Cvarepsilon%24%2C%20where%20%24l%20%3A%3D%20F%28y%29%24%20for%20any%20%24y%20%5Cin%20%5Cmathcal%7BM%7D%24.%20We%20work%20in%20a%20local%20regime%20where%20the%20algorithm%20is%20initialized%20near%20%24%5Cmathcal%7BM%7D%24%20and%2C%20with%20high%20probability%2C%20its%20iterates%20remain%20in%20that%20neighborhood.%20We%20establish%20a%20lower%20bound%20%24%CE%A9%28%5Cvarepsilon%5E%7B-2/%CE%B1%7D%29%24%20for%20all%20stochastic%20first-order% {"title": "APEX-Agents", "author": "Bertie Vidgen and Austin Mann and Abby Fennelly and John Wright Stanly and Lucas Rothman and Marco Burstein and Julien Benchek and David Ostrofsky and Anirudh Ravichandran and Debnil Sur and Neel Venugopal and Alannah Hsia and Isaac Robinson and Calix Huang and Olivia Varones and Daniyal Khan and Michael Haines and Austin Bridges and Jesse Boyle and Koby Twist and Zach Richards and Chirag Mahapatra and Brendan Foody and Osvald Nitski", "abstract": "We introduce the AI Productivity Index for Agents (APEX-Agents), a benchmark for assessing whether AI agents can execute long-horizon, cross-application tasks created by investment banking analysts, management consultants, and corporate lawyers. APEX-Agents requires agents to navigate realistic work environments with files and tools. We test eight agents for the leaderboard using Pass@1. Gemini 3 Flash (Thinking=High) achieves the highest score of 24.0%, followed by GPT-5.2 (Thinking=High), Claude Opus 4.5 (Thinking=High), and Gemini 3 Pro (Thinking=High). We open source the APEX-Agents benchmark (n=480) with all prompts, rubrics, gold outputs, files, and metadata. We also open source Archipelago, our infrastructure for agent execution and evaluation.", "link": "http://arxiv.org/abs/2601.14242v3", "date": "2026-02-23", "relevancy": 1.7369, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4522}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4407}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4205}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20APEX-Agents&body=Title%3A%20APEX-Agents%0AAuthor%3A%20Bertie%20Vidgen%20and%20Austin%20Mann%20and%20Abby%20Fennelly%20and%20John%20Wrigh {"title": "PoCo: Agentic Proof-of-Concept Exploit Generation for Smart Contracts", "author": "Vivi Andersson and Sofia Bobadilla and Harald Hobbelhagen and Martin Monperrus", "abstract": "Smart contracts operate in a highly adversarial environment, where vulnerabilities can lead to substantial financial losses. Thus, smart contracts are subject to security audits. In auditing, proof-of-concept (PoC) exploits play a critical role by demonstrating to the stakeholders that the reported vulnerabilities are genuine, reproducible, and actionable. However, manually creating PoCs is time-consuming, error-prone, and often constrained by tight audit schedules. We introduce PoCo, an agentic framework that automatically generates executable PoC exploits from natural-language vulnerability descriptions written by auditors. PoCo autonomously generates PoC exploits in an agentic manner by interacting with a set of codeexecution tools in a Reason-Act-Observe loop. It produces fully executable exploits compatible with the Foundry testing framework, ready for integration into audit reports and other security tools. We evaluate PoCo on a dataset of 23 real-world vulnerability reports. PoCo consistently outperforms the Zero-shot and Workflow baselines, generating well-formed and logically correct PoCs. Our results demonstrate that agentic frameworks can significantly reduce the effort required for high-quality PoCs in smart contract audits. Our contribution provides actionable knowledge for the smart contract security community.", "link": "http://arxiv.org/abs/2511.02780v3", "date": "2026-02-23", "relevancy": 1.2294, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4447}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.4313}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.3872}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PoCo%3A%20Agentic%20Proof-of-Concept%20Exploit%20Generation%20for%20Smart%20Contracts&body=Title%3A%20PoCo%3A%20Agentic%20Proof-of-Concept%20Exploit%20Generation%20for%20Smart%20Contracts%0AAuthor%3A%20Vivi%20Andersson%20and%20Sofia%20Bobadilla%20and%20Harald%20Hobbelhagen%20and%20Martin%20Monperrus%0AAbstract%3A%20Smart%20contracts%20operate%20in%20a%20highly%20adversarial%20environment%2C%20where%20vulnerabilities%20can%20lead%20to%20substantial%20financial%20losses.%20Thus%2C%20smart%20contracts%20are%20subject%20to%20security%20audits.%20In%20auditing%2C%20proof-of-concept%20%28PoC%29%20exploits%20play%20a%20critical%20role%20by%20demonstrating%20to%20the%20stakeholders%20that%20the%20reported%20vulnerabilities%20are%20genuine%2C%20reproducible%2C%20and%20actionable.%20However%2C%20manually%20creating%20PoCs%20is%20time-consuming%2C%20error-prone%2C%20and%20often%20constrained%20by%20tight%20audit%20schedules.%20We%20introduce%20PoCo%2C%20an%20agentic%20framework%20that%20automatically%20generates%20executable%20PoC%20exploits%20from%20natural-language%20vulnerability%20descriptions%20written%20by%20auditors.%20PoCo%20autonomously%20generates%20PoC%20exploits%20in%20an%20agentic%20manner%20by%20interacting%20with%20a%20set%20of%20codeexecution%20tools%20in%20a%20Reason-Act-Observe%20loop.%20It%20produces%20fully%20executable%20exploits%20compatible%20with%20the%20Foundry%20testing%20framework%2C%20ready%20for%20integration%20into%20audit%20reports%20and%20other%20security%20tools.%20We%20evaluate%20PoCo%20on%20a%20dataset%20of%2023%20real-world%20vulnerability%20reports.%20PoCo%20consistently%20outperforms%20the%20Zero-shot%20and%20Workflow%20baselines%2C%20generating%20well-formed%20and%20logically%20correct%20PoCs.%20Our%20results%20demonstrate%20that%20agentic%20framew {"title": "A Theory of How Pretraining Shapes Inductive Bias in Fine-Tuning", "author": "Nicolas Anguita and Francesco Locatello and Andrew M. Saxe and Marco Mondelli and Flavia Mancini and Samuel Lippl and Clementine Domine", "abstract": "Pretraining and fine-tuning are central stages in modern machine learning systems. In practice, feature learning plays an important role across both stages: deep neural networks learn a broad range of useful features during pretraining and further refine those features during fine-tuning. However, an end-to-end theoretical understanding of how choices of initialization impact the ability to reuse and refine features during fine-tuning has remained elusive. Here we develop an analytical theory of the pretraining-fine-tuning pipeline in diagonal linear networks, deriving exact expressions for the generalization error as a function of initialization parameters and task statistics. We find that different initialization choices place the network into four distinct fine-tuning regimes that are distinguished by their ability to support feature learning and reuse, and therefore by the task statistics for which they are beneficial. In particular, a smaller initialization scale in earlier layers enables the network to both reuse and refine its features, leading to superior generalization on fine-tuning tasks that rely on a subset of pretraining features. We demonstrate empirically that the same initialization parameters impact generalization in nonlinear networks trained on CIFAR-100. Overall, our results demonstrate analytically how data and network initialization interact to shape fine-tuning generalization, highlighting an important role for the relative scale of initialization across different layers in enabling continued feature learning during fine-tuning.", "link": "http://arxiv.org/abs/2602.20062v1", "date": "2026-02-23", "relevancy": 1.8656, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.503}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4494}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4366}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Theory%20of%20How%20Pretraining%20Shapes%20Inductive%20Bias%20in%20Fine-Tuning&body=Title%3A%20A%20Theory%20of%20How%20Pretraining%20Shapes%20Inductive%20Bias%20in%20Fine-Tuning%0AAuthor%3A%20Nicolas%20Anguita%20and%20Francesco%20Locatello%20and%20Andrew%20M.%20Saxe%20and%20Marco%20Mondelli%20and%20Flavia%20Mancini%20and%20Samuel%20Lippl%20and%20Clementine%20Domine%0AAbstract%3A%20Pretraining%20and%20fine-tuning%20are%20central%20stages%20in%20modern%20machine%20learning%20systems.%20In%20practice%2C%20feature%20learning%20plays%20an%20important%20role%20across%20both%20stages%3A%20deep%20neural%20networks%20learn%20a%20broad%20range%20of%20useful%20features%20during%20pretraining%20and%20further%20refine%20those%20features%20during%20fine-tuning.%20However%2C%20an%20end-to-end%20theoretical%20understanding%20of%20how%20choices%20of%20initialization%20impact%20the%20ability%20to%20reuse%20and%20refine%20features%20during%20fine-tuning%20has%20remained%20elusive.%20Here%20we%20develop%20an%20analytical%20theory%20of%20the%20pretraining-fine-tuning%20pipeline%20in%20diagonal%20linear%20networks%2C%20deriving%20exact%20expressions%20for%20the%20generalization%20error%20as%20a%20function%20of%20initialization%20parameters%20and%20task%20statistics.%20We%20find%20that%20different%20initialization%20choices%20place%20the%20network%20into%20four%20distinct%20fine-tuning%20regimes%20that%20are%20distinguished%20by%20their%20ability%20to%20support%20feature%20learning%20and%20reuse%2C%20and%20therefore%20by%20the%20task%20statistics%20for%20which%20they%20are%20beneficial.%20In%20particular%2C%20a%20smaller%20initialization%20scale%20in%20earlier%20layers%20enables%20the%20network%20to%20both%20reuse%20and%20refine%20its%20features%2C%20leading%20to%20superior%20generalization%20on%20fine-tuning%20tasks%20that%20rely%20on%20a%20subset%20of%20pretraining%20features.%20We%20demonstrate%20empirically%20that%20the%20same%20initialization%20parameters%20impact%20generalization%20in%20nonlinear%20networks%20trained%20on%20CIFAR-100.%20Overall%2C%20our%20results%20demonstrate%20analytically%20how%20data%20and%20network%20initialization%20interact%20to%20shape%20fine-tuning%20generalization%2C%20highlighting%20an%20important%20role%20for%20the%20relative%20scale%20of%20initialization%20across%20different%20layers%20in%20enabling%20continued%20feature%20learning%20during%20fine-tuning.%0ALink%3A%20http%3A//arxiv.org/abs/2602.20062v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Theory%2520of%2520How%2520Pretraining%2520Shapes%2520Inductive%2520Bias%2520in%2520Fine-Tuning%26entry.906535625%3DNicolas%2520Anguita%2520and%2520Francesco%2520Locatello%2520and%2520Andrew%2520M.%2520Saxe%2520and%2520Marco%2520Mondelli%2520and%2520Flavia%2520Mancini%2520and%2520Samuel%2520Lippl%2520and%2520Clementine%2520Domine%26entry.1292438233%3DPretraining%2520and%2520fine-tuning%2520are%2520central%2520stages%2520in%2520modern%2520machine%2520learning%2520systems.%2520In%2520practice%252C%2520feature%2520learning%2520plays%2520an%2520important%2520role%2520across%2520both%2520stages%253A%2520deep%2520neural%2520networks%2520learn%2520a%2520broad%2520range%2520of%2520useful%2520features%2520during%2520pretraining%2520and%2520further%2520refine%2520those%2520features%2520during%2520fine-tuning.%2520However%252C%2520an%2520end-to-end%2520theoretical%2520understanding%2520of%2520how%2520choices%2520of%2520initialization%2520impact% {"title": "TROLL: Trust Regions improve Reinforcement Learning for Large Language Models", "author": "Philipp Becker and Niklas Freymuth and Serge Thilges and Fabian Otto and Gerhard Neumann", "abstract": "Reinforcement Learning (RL) with PPO-like clip objectives has become the standard choice for reward-based fine-tuning of large language models (LLMs). Although recent work has explored improved estimators of advantages and normalization, the clipping mechanism itself has remained untouched. Originally introduced as a proxy for principled KL-based trust regions, clipping is a crude approximation that often causes unstable updates and suboptimal performance. We replace the clip objective with a novel discrete differentiable trust region projection, which provides principled token-level KL constraints. The projection operates on a sparse subset of the model's most important token logits to balance computational cost and projection effectiveness. Our approach, Trust Region Optimization for Large Language models (TROLL), serves as a direct replacement for PPO-like clipping during training and does not alter the model's inference behavior. Across mathematical reasoning and code generation tasks, model families, as well as advantage-estimation methods, TROLL consistently outperforms PPO-like clipping in terms of training speed, stability, and final success rates.", "link": "http://arxiv.org/abs/2510.03817v3", "date": "2026-02-23", "relevancy": 1.8628, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.48}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.457}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4549}], "mailto": "mailto:haoxiang.li.2024@g {"title": "Reliable Abstention under Adversarial Injections: Tight Lower Bounds and New Upper Bounds", "author": "Ezra Edelman and Surbhi Goel", "abstract": "We study online learning in the adversarial injection model introduced by [Goel et al. 2017], where a stream of labeled examples is predominantly drawn i.i.d.\\ from an unknown distribution $\\mathcal{D}$, but may be interspersed with adversarially chosen instances without the learner knowing which rounds are adversarial. Crucially, labels are always consistent with a fixed target concept (the clean-label setting). The learner is additionally allowed to abstain from predicting, and the total error counts the mistakes whenever the learner decides to predict and incorrect abstentions when it abstains on i.i.d.\\ rounds. Perhaps surprisingly, prior work shows that oracle access to the underlying distribution yields $O(d^2 \\log T)$ combined error for VC dimension $d$, while distribution-agnostic algorithms achieve only $\\tilde{O}(\\sqrt{T})$ for restricted classes, leaving open whether this gap is fundamental.\n  We resolve this question by proving a matching $\u03a9(\\sqrt{T})$ lower bound for VC dimension $1$, establishing a sharp separation between the two information regimes. On the algorithmic side, we introduce a potential-based framework driven by \\emph{robust witnesses}, small subsets of labeled examples that certify predictions while remaining resilient to adversarial contamination. We instantiate this framework using two combinatorial dimensions: (1) \\emph{inference dimension}, yielding combined error $\\tilde{O}(T^{1-1/k})$ for classes of inference dimension $k$, and (2) \\emph{certificate dimension}, a new relaxation we introduce. As an application, we show that halfspaces in $\\mathbb{R}^2$ have certificate dimension $3$, obtaining the first distribution-agnostic bound of $\\tilde{O}(T^{2/3})$ for this class. This is notable since [Blum et al. 2021] showed halfspaces are not robustly learnable unde       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();

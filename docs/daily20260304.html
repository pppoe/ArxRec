{"title": "Adapting Time Series Foundation Models through Data Mixtures", "author": "Thomas L. Lee and Edoardo M. Ponti and Amos Storkey", "abstract": "Time series foundation models (TSFMs) have become increasingly popular for zero-shot forecasting. However, for a new time series domain not fully covered by the pretraining set, performance can suffer. Therefore, when a practitioner cares about a new domain and has access to a set of related datasets, the question arises: how best to fine-tune a TSFM to improve zero-shot forecasting? A typical approach to this type of problem is to fine-tune a LoRA module on all datasets or separately on each dataset. Tuning a separate module on each dataset allows for the specialisation of the TSFM to different types of data distribution, by selecting differing combinations of per-dataset modules for different time series contexts. However, we find that, using per-dataset modules might not be optimal, since a time series dataset can contain data from several types of distributions, i.e. sub-domains. This can be due to the distribution shifting or having differing distributions for different dimensions of the time series. Hence, we propose MixFT which re-divides the data using Bayesian mixtures into sets that best represent the sub-domains present in the data, and fine-tunes separately on each of these sets. This re-division of the data ensures that each set is more homogeneous, leading to fine-tuned modules focused on specific sub-domains. Our experiments show that MixFT performs better than per-dataset methods and when fine-tuning a single module on all the data. This suggests that by re-partitioning the data to represent sub-domains we can better specialise TSFMs to improve zero-shot forecasting.", "link": "http://arxiv.org/abs/2603.02840v1", "date": "2026-03-03", "relevancy": 2.4257, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4915}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4845}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4795}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Adapting%20Time%20Series%20Foundation%20Models%20through%20Data%20Mixtures&body=Title%3A%20Adapting%20Time%20Series%20Foundation%20Models%20through%20Data%20Mixtures%0AAuthor%3A%20Thomas%20L.%20Lee%20and%20Edoardo%20M.%20Ponti%20and%20Amos%20Storkey%0AAbstract%3A%20Time%20series%20foundation%20models%20%28TSFMs%29%20have%20become%20increasingly%20popular%20for%20zero-shot%20forecasting.%20However%2C%20for%20a%20new%20time%20series%20domain%20not%20fully%20covered%20by%20the%20pretraining%20set%2C%20performance%20can%20suffer.%20Therefore%2C%20when%20a%20practitioner%20cares%20about%20a%20new%20domain%20and%20has%20access%20to%20a%20set%20of%20related%20datasets%2C%20the%20question%20arises%3A%20how%20best%20to%20fine-tune%20a%20TSFM%20to%20improve%20zero-shot%20forecasting%3F%20A%20typical%20approach%20to%20this%20type%20of%20problem%20is%20to%20fine-tune%20a%20LoRA%20module%20on%20all%20datasets%20or%20separately%20on%20each%20dataset.%20Tuning%20a%20separate%20module%20on%20each%20dataset%20allows%20for%20the%20specialisation%20of%20the%20TSFM%20to%20different%20types%20of%20data%20distribution%2C%20by%20selecting%20differing%20combinations%20of%20per-dataset%20modules%20for%20different%20time%20series%20contexts.%20However%2C%20we%20find%20that%2C%20using%20per-dataset%20modules%20might%20not%20be%20optimal%2C%20since%20a%20time%20series%20dataset%20can%20contain%20data%20from%20several%20types%20of%20distributions%2C%20i.e.%20sub-domains.%20This%20can%20be%20due%20to%20the%20distribution%20shifting%20or%20having%20differing%20distributions%20for%20different%20dimensions%20of%20the%20time%20series.%20Hence%2C%20we%20propose%20MixFT%20which%20re-divides%20the%20data%20using%20Bayesian%20mixtures%20into%20sets%20that%20best%20represent%20the%20sub-domains%20present%20in%20the%20data%2C%20and%20fine-tunes%20separately%20on%20each%20of%20these%20sets.%20This%20re-division%20of%20the%20data%20ensures%20that%20each%20set%20is%20more%20homogeneous%2C%20leading%20to%20fine-tuned%20modules%20focused%20on%20specific%20sub-domains.%20Our%20experiments%20show%20that%20MixFT%20performs%20better%20than%20per-dataset%20methods%20and%20when%20fine-tuning%20a%20single%20module%20on%20all%20the%20data.%20This%20suggests%20that%20by%20re-partitioning%20the%20data%20to%20represent%20sub-domains%20we%20can%20better%20specialise%20TSFMs%20to%20improve%20zero-shot%20forecasting.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02840v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAdapting%2520Time%2520Series%2520Foundation%2520Models%2520through%2520Data%2520Mixtures%26entry.906535625%3DThomas%2520L.%2520Lee%2520and%2520Edoardo%2520M.%2520Ponti%2520and%2520Amos%2520Storkey%26entry.1292438233%3DTime%2520series%2520foundation%2520models%2520%2528TSFMs%2529%2520have%2520become%2520increasingly%2520popular%2520for%2520zero-shot%2520forecasting.%2520However%252C%2520for%2520a%2520new%2520time%2520series%2520domain%2520not%2520fully%2520covered%2520by%2520the%2520pretraining%2520set%252C%2520performance%2520can%2520suffer.%2520Therefore%252C%2520when%2520a%2520practitioner%2520cares%2520about%2520a%2520new%2520domain%2520and%2520has%2520access%2520to%2520a%2520set%2520of%2520related%2520datasets%252C%2520the%2520question%2520arises%253A%2520how%2520best%2520to%2520fine-tune%2520a%2520TSFM%2520to%2520improve%2520zero-shot%2520forecasting%253F%2520A%2520typical%2520approach%2520to%2520this%2520type%2520of%2520problem%2520is%2520to%2520fine-tune% {"title": "Synthetic Perception: Can Generated Images Unlock Latent Visual Prior for Text-Centric Reasoning?", "author": "Yuesheng Huang and Peng Zhang and Xiaoxin Wu and Riliang Liu and Jiaqi Liang", "abstract": "A significant ``modality gap\" exists between the abundance of text-only data and the increasing power of multimodal models. This work systematically investigates whether images generated on-the-fly by Text-to-Image (T2I) models can serve as a mechanism to unlock latent visual priors for text-centric reasoning. Through a comprehensive evaluation framework on text classification, we analyze the impact of critical variables, including T2I model quality (e.g., Flux.1, SDXL), prompt engineering strategies, and multimodal fusion architectures. Our findings demonstrate that this ``synthetic perception\" can yield significant performance gains by effectively projecting text into a visual semantic space, even when augmenting strong large language model baselines like Llama-3 and Qwen-2.5. We show that this approach serves as a form of cross-modal probing, mitigating the sensory deprivation inherent in pure text training. However, the effectiveness is highly conditional, depending on the semantic alignment between text and the generated image, the task's visual groundability, and the generative fidelity of the T2I model. Our work establishes a rigorous benchmark for this paradigm, demonstrating its viability as a pathway to enrich language understanding in traditionally unimodal scenarios.", "link": "http://arxiv.org/abs/2506.17623v2", "date": "2026-03-03", "relevancy": 2.4254, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6073}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6073}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.6019}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Synthetic%20Perception%3A%20Can%20Generated%20Images%20Unlock%20Latent%20Visual%20Prior%20for%20Text-Centric%20Reasoning%3F&body=Title%3A%20Synthetic%20Perception%3A%20Can%20Generated%20Images%20Unlock%20Latent%20Visual%20Prior%20for%20Text-Centric%20Reasoning%3F%0AAuthor%3A%20Yuesheng%20Huang%20and%20Peng%20Zhang%20and%20Xiaoxin%20Wu%20and%20Riliang%20Liu%20and%20Jiaqi%20Liang%0AAbstract%3A%20A%20significant%20%60%60modality%20gap%22%20exists%20between%20the%20abundance%20of%20text-only%20data%20and%20the%20increasing%20power%20of%20multimodal%20models.%20This%20work%20systematically%20investigates%20whether%20images%20generated%20on-the-fly%20by%20Text-to-Image%20%28T2I%29%20models%20can%20serve%20as%20a%20mechanism%20to%20unlock%20latent%20visual%20priors%20for%20text-centric%20reasoning.%20Through%20a%20comprehensive%20evaluation%20framework%20on%20text%20classification%2C%20we%20analyze%20the%20impact%20of%20critical%20variables%2C%20including%20T2I%20model%20quality%20%28e.g.%2C%20Flux.1%2C%20SDXL%29%2C%20prompt%20engineering%20strategies%2C%20and%20multimodal%20fusion%20architectures.%20Our%20findings%20demonstrate%20that%20this%20%60%60synthetic%20perception%22%20can%20yield%20significant%20performance%20gains%20by%20effectively%20projecting%20text%20into%20a%20visual%20semantic%20space%2C%20even%20when%20augmenting%20strong%20large%20language%20model%20baselines%20like%20Llama-3%20and%20Qwen-2.5.%20We%20show%20that%20this%20approach%20serves%20as%20a%20form%20of%20cross-modal%20probing%2C%20mitigating%20the%20sensory%20deprivation%20inherent%20in%20pure%20text%20training.%20However%2C%20the%20effectiveness%20is%20highly%20conditional%2C%20depending%20on%20the%20semantic%20alignment%20between%20text%20and%20the%20generated%20image%2C%20the%20task%27s%20visual%20groundability%2C%20and%20the%20genera {"title": "EduVQA: Benchmarking AI-Generated Video Quality Assessment for Education", "author": "Baoliang Chen and Xinlong Bu and Lingyu Zhu and Hanwei Zhu and Xiangjie Sui", "abstract": "While AI-generated content (AIGC) models have achieved remarkable success in generating photorealistic videos, their potential to support visual, story-driven learning in education remains largely untapped. To close this gap, we present EduAIGV-1k, the first benchmark dataset and evaluation framework dedicated to assessing the quality of AI-generated videos (AIGVs) designed to teach foundational math concepts, such as numbers and geometry, to young learners. EduAIGV-1k contains 1,130 short videos produced by ten state-of-the-art text-to-video (T2V) models using 113 pedagogy-oriented prompts. Each video is accompanied by rich, fine-grained annotations along two complementary axes: (1) Perceptual quality, disentangled into spatial and temporal fidelity, and (2) Prompt alignment, labeled at the word-level and sentence-level to quantify the degree to which each mathematical concept in the prompt is accurately grounded in the generated video. These fine-grained annotations transform each video into a multi-dimensional, interpretable supervision signal, far beyond a single quality score. Leveraging this dense feedback, we introduce EduVQA for both perceptual and alignment quality assessment of AIGVs. In particular, we propose a Structured 2D Mixture-of-Experts (S2D-MoE) module, which enhances the dependency between overall quality and each sub-dimension by shared experts and dynamic 2D gating matrix. Extensive experiments show our EduVQA consistently outperforms existing VQA baselines. Both our dataset and code will be publicly available.", "link": "http://arxiv.org/abs/2603.03066v1", "date": "2026-03-03", "relevancy": 2.4115, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.6348}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.592}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5502}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EduVQA%3A%20Benchmarking%20AI-Generated%20Video%20Quality%20Assessment%20for%20Education&body=Title%3A%20EduVQA%3A%20Benchmarking%20AI-Generated%20Video%20Quality%20Assessment%20for%20Education%0AAuthor%3A%20Baoliang%20Chen%20and%20Xinlong%20Bu%20and%20Lingyu%20Zhu%20and%20Hanwei%20Zhu%20and%20Xiangjie%20Sui%0AAbstract%3A%20While%20AI-generated%20content%20%28AIGC%29%20models%20have%20achieved%20remarkable%20success%20in%20generating%20photorealistic%20videos%2C%20their%20potential%20to%20support%20visual%2C%20story-driven%20learning%20in%20education%20remains%20largely%20untapped.%20To%20close%20this%20gap%2C%20we%20present%20EduAIGV-1k%2C%20the%20first%20benchmark%20dataset%20and%20evaluation%20framework%20dedicated%20to%20assessing%20the%20quality%20of%20AI-generated%20videos%20%28AIGVs%29%20designed%20to%20teach%20foundational%20math%20concepts%2C%20such%20as%20numbers%20and%20geometry%2C%20to%20young%20learners.%20EduAIGV-1k%20contains%201%2C130%20short%20videos%20produced%20by%20ten%20state-of-the-art%20text-to-video%20%28T2V%29%20models%20using%20113%20pedagogy-oriented%20prompts.%20Each%20video%20is%20accompanied%20by%20rich%2C%20fine-grained%20annotations%20along%20two%20complementary%20axes%3A%20%281%29%20Perceptual%20quality%2C%20disentangled%20into%20spatial%20and%20temporal%20fidelity%2C%20and%20%282%29%20Prompt%20alignment%2C%20labeled%20at%20the%20word-level%20and%20sentence-level%20to%20quantify%20the%20degree%20to%20which%20each%20mathematical%20concept%20in%20the%20prompt%20is%20accurately%20grounded%20in%20the%20generated%20video.%20These%20fine-grained%20annotations%20transform%20each%20video%20into%20a%20multi-dimensional%2C%20interpretable%20supervision%20signal%2C%20far%20beyond%20a%20single%20quality%20score.%20Leveraging%20this%20dense%20feedback%2C%20we%20introduce%20EduVQA%20for%20both%20perceptual%20and%20alignment%20quality%20assessment%20of%20AIGVs.%20In%20particular%2C%20we%20propose%20a%20Structured%202D%20Mixture-of-Experts%20%28S2D-MoE%29%20module%2C%20which%20enhances%20the%20dependency%20between%20overall%20quality%20and%20each%20sub-dimension%20by%20shared%20experts%20and%20dynamic%202D%20gating%20matrix.%20Extensive%20experiments%20show%20our%20EduVQA%20consistently%20outperforms%20existing%20VQA%20baselines.%20Both%20our%20dataset%20and%20code%20will%20be%20publicly%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03066v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEduVQA%253A%2520Benchmarking%2520AI-Generated%2520Video%2520Quality%2520Assessment%2520for%2520Education%26entry.906535625%3DBaoliang%2520Chen%2520and%2520Xinlong%2520Bu%2520and%2520Lingyu%2520Zhu%2520and%2520Hanwei%2520Zhu%2520and%2520Xiangjie%2520Sui%26entry.1292438233%3DWhile%2520AI-generated%2520content%2520%2528AIGC%2529%2520models%2520have%2520achieved%2520remarkable%2520success%2520in%2520generating%2520photorealistic%2520videos%252C%2520their%2520potential%2520to%2520support%2520visual%252C%2520story-driven%2520learning%2520in%2520education%2520remains%2520largely%2520untapped.%2520To%2520close%2520this%2520gap%252C%2520we%2520present%2520EduAIGV-1k%252C%2520the%2520first%2520benchmark%2520dataset%2520and%2520evaluation%2520framework%2520dedicated%2520to%2520assessing%2520the%2520quality%2520of%2520AI-generated%2520videos%2520%2528AIGVs%2529%2520designed%2520to%2520teach%2520foundational%2520math%2520concepts%252C%2520such%2520as%2520numbers%2520and%2520geometry%252C%2520to%2520young%2520learners.%2520EduAIGV-1k%2520contains%25201%252C130%2520short%2520v {"title": "Nano-EmoX: Unifying Multimodal Emotional Intelligence from Perception to Empathy", "author": "Jiahao Huang and Fengyan Lin and Xuechao Yang and Chen Feng and Kexin Zhu and Xu Yang and Zhide Chen", "abstract": "The development of affective multimodal language models (MLMs) has long been constrained by a gap between low-level perception and high-level interaction, leading to fragmented affective capabilities and limited generalization. To bridge this gap, we propose a cognitively inspired three-level hierarchy that organizes affective tasks according to their cognitive depth-perception, understanding, and interaction-and provides a unified conceptual foundation for advancing affective modeling. Guided by this hierarchy, we introduce Nano-EmoX, a small-scale multitask MLM, and P2E (Perception-to-Empathy), a curriculum-based training framework. Nano-EmoX integrates a suite of omni-modal encoders, including an enhanced facial encoder and a fusion encoder, to capture key multimodal affective cues and improve cross-task transferability. The outputs are projected into a unified language space via heterogeneous adapters, empowering a lightweight language model to tackle diverse affective tasks. Concurrently, P2E progressively cultivates emotional intelligence by aligning rapid perception with chain-of-thought-driven empathy. To the best of our knowledge, Nano-EmoX is the first compact MLM (2.2B) to unify six core affective tasks across all three hierarchy levels, achieving state-of-the-art or highly competitive performance across multiple benchmarks, demonstrating excellent efficiency and generalization.", "link": "http://arxiv.org/abs/2603.02123v2", "date": "2026-03-03", "relevancy": 2.4059, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4826}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": " {"title": "HoMMI: Learning Whole-Body Mobile Manipulation from Human Demonstrations", "author": "Xiaomeng Xu and Jisang Park and Han Zhang and Eric Cousineau and Aditya Bhat and Jose Barreiros and Dian Wang and Shuran Song", "abstract": "We present Whole-Body Mobile Manipulation Interface (HoMMI), a data collection and policy learning framework that learns whole-body mobile manipulation directly from robot-free human demonstrations. We augment UMI interfaces with egocentric sensing to capture the global context required for mobile manipulation, enabling portable, robot-free, and scalable data collection. However, naively incorporating egocentric sensing introduces a larger human-to-robot embodiment gap in both observation and action spaces, making policy transfer difficult. We explicitly bridge this gap with a cross-embodiment hand-eye policy design, including an embodiment agnostic visual representation; a relaxed head action representation; and a whole-body controller that realizes hand-eye trajectories through coordinated whole-body motion under robot-specific physical constraints. Together, these enable long-horizon mobile manipulation tasks requiring bimanual and whole-body coordination, navigation, and active perception. Results are best viewed on: https://hommi-robot.github.io", "link": "http://arxiv.org/abs/2603.03243v1", "date": "2026-03-03", "relevancy": 2.3732, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.6224}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5745}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5675}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HoMMI%3A%20Learning%20Whole-Body%2 {"title": "VideoTemp-o3: Harmonizing Temporal Grounding and Video Understanding in Agentic Thinking-with-Videos", "author": "Wenqi Liu and Yunxiao Wang and Shijie Ma and Meng Liu and Qile Su and Tianke Zhang and Haonan Fan and Changyi Liu and Kaiyu Jiang and Jiankang Chen and Kaiyu Tang and Bin Wen and Fan Yang and Tingting Gao and Han Li and Yinwei Wei and Xuemeng Song", "abstract": "In long-video understanding, conventional uniform frame sampling often fails to capture key visual evidence, leading to degraded performance and increased hallucinations. To address this, recent agentic thinking-with-videos paradigms have emerged, adopting a localize-clip-answer pipeline in which the model actively identifies relevant video segments, performs dense sampling within those clips, and then produces answers. However, existing methods remain inefficient, suffer from weak localization, and adhere to rigid workflows. To solve these issues, we propose VideoTemp-o3, a unified agentic thinking-with-videos framework that jointly models video grounding and question answering. VideoTemp-o3 exhibits strong localization capability, supports on-demand clipping, and can refine inaccurate localizations. Specifically, in the supervised fine-tuning stage, we design a unified masking mechanism that encourages exploration while preventing noise. For reinforcement learning, we introduce dedicated rewards to mitigate reward hacking. Besides, from the data perspective, we develop an effective pipeline to construct high-quality long video grounded QA data, along with a corresponding benchmark for systematic evaluation across various video durations. Experimental results demonstrate that our method achieves remarkable performance on both long video understanding and grounding.", "link": "http://arxiv.org/abs/2602.07801v2", "date": "2026-03-03", "relevancy": 2.3728, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5949}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5949}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5846}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VideoTemp-o3%3A%20Harmonizing%20Temporal%20Grounding%20and%20Video%20Understanding%20in%20Agentic%20Thinking-with-Videos&body=Title%3A%20VideoTemp-o3%3A%20Harmonizing%20Temporal%20Grounding%20and%20Video%20Understanding%20in%20Agentic%20Thinking-with-Videos%0AAuthor%3A%20Wenqi%20Liu%20and%20Yunxiao%20Wang%20and%20Shijie%20Ma%20and%20Meng%20Liu%20and%20Qile%20Su%20and%20Tianke%20Zhang%20and%20Haonan%20Fan%20and%20Changyi%20Liu%20and%20Kaiyu%20Jiang%20and%20Jiankang%20Chen%20and%20Kaiyu%20Tang%20and%20Bin%20Wen%20and%20Fan%20Yang%20and%20Tingting%20Gao%20and%20Han%20Li%20and%20Yinwei%20Wei%20and%20Xuemeng%20Song%0AAbstract%3A%20In%20long-video%20understanding%2C%20conventional%20uniform%20frame%20sampling%20often%20fails%20to%20capture%20key%20visual%20evidence%2C%20leading%20to%20degraded%20performance%20and%20increased%20hallucinations.%20To%20address%20this%2C%20recent%20agentic%20thinking-with-videos%20paradigms%20have%20emerged%2C%20adopting%20a%20localize-clip-answer%20pipeline%20in%20which%20the%20model%20actively%20identifies%20relevant%20video%20segments%2C%20performs%20dense%20sampling%20within%20those%20clips%2C%20and%20then%20produces%20answers.%20However%2C%20existing%20methods%20remain%20inefficient%2C%20suffer%20from%20weak%20localization%2C%20and%20adhere%20to%20rigid%20workflows.%20To%20solve%20these%20issues%2C%20we%20propose%20VideoTemp-o3%2C%20a%20unified%20agentic%20thinking-with-videos%20framework%20that%20jointly%20models%20video%20grounding%20and%20question%20answering.%20VideoTemp-o3%20exhibits%20strong%20localization%20capability%2C%20supports%20on-demand%20clipping%2C%20and%20can%20refine%20inaccurate%20localizations.%20Specifically%2C%20in%20the%20supervised%20fine-tuning%20stage%2C%20we%20design%20a%20unified%20masking%20mechanism%20that%20encourages%20exploration%20while%20preventing%20noise.%20For%20reinforcement%20learning%2C%20we%20introduce%20dedicated%20rewards%20to%20mitigate%20reward%20hacking.%20Besides%2C%20from%20the%20data%20perspective%2C%20we%20develop%20an%20effective%20pipeline%20to%20construct%20high-quality%20long%20video%20grounded%20QA%20data%2C%20along%20with%20a%20corresponding%20benchmark%20for%20systematic%20evaluation%20across%20various%20video%20durations.%20Experimental%20results%20demonstrate%20that%20our%20method%20achieves%20remarkable%20performance%20on%20both%20long%20video%20understanding%20and%20grounding.%0ALink%3A%20http%3A//arxiv.org/abs/2602.07801v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVideoTemp-o3%253A%2520Harmonizing%2520Temporal%2520Grounding%2520and%2520Video%2520Understanding%2520in%2520Agentic%2520Thinking-with-Videos%26entry.906535625%3DWenqi%2520Liu%2520and%2520Yunxiao%2520Wang%2520and%2520Shijie%2520Ma%2520and%2520Meng%2520Liu%2520and%2520Qile%2520Su%2520and%2520Tianke%2520Zhang%2520and%2520Haonan%2520Fan%2520and%2520Changyi%2520Liu%2520and%2520Kaiyu%2520Jiang%2520and%2520Jiankang%2520Chen%2520and%2520Kaiyu%2520Tang%2520and%2520Bin%2520Wen%2520and%2520Fan%2520Yang%2520and%2520Tingting%2520Gao%2520and%2520Han%2520Li%2520and%2520Yinwei%2520Wei%2520and%2520Xuemeng%2520Song%26entry.1292438233%3DIn%2520long-video%2520understanding%252C%2520conventional%2520uniform%2520frame%2520sampling%2520often%2520fails%2520to%2520capture%2520key%2520visual%2520evidence%252C%2520leading%2520to%2520degraded%2520performance%2520and%2520increased%2520hallucinations.%2520To%2520address%2520this%252C%2520recent%2520agentic%2520thinking-with-videos%2520 YQ/viewform?entry.1380929848=VideoTemp-o3%3A%20Harmonizing%20Temporal%20Grounding%20and%20Video%20Understanding%20in%20Agentic%20Thinking-with-Videos&entry.906535625=Wenqi%20Liu%20and%20Yunxiao%20Wang%20and%20Shijie%20Ma%20and%20Meng%20Liu%20and%20Qile%20Su%20and%20Tianke%20Zhang%20and%20Haonan%20Fan%20and%20Changyi%20Liu%20and%20Kaiyu%20Jiang%20and%20Jiankang%20Chen%20and%20Kaiyu%20Tang%20and%20Bin%20Wen%20and%20Fan%20Yang%20and%20Tingting%20Gao%20and%20Han%20Li%20and%20Yinwei%20Wei%20and%20Xuemeng%20Song&entry.1292438233=In%20long-video%20understanding%2C%20conventional%20uniform%20frame%20sampling%20often%20fails%20to%20capture%20key%20visual%20evidence%2C%20leading%20to%20degraded%20performance%20and%20increased%20hallucinations.%20To%20address%20this%2C%20recent%20agentic%20thinking-with-videos%20paradigms%20have%20emerged%2C%20adopting%20a%20localize-clip-answer%20pipeline%20in%20which%20the%20model%20actively%20identifies%20relevant%20video%20segments%2C%20performs%20dense%20sampling%20within%20those%20clips%2C%20and%20then%20produces%20answers.%20However%2C%20existing%20methods%20remain%20inefficient%2C%20suffer%20from%20weak%20localization%2C%20and%20adhere%20to%20rigid%20workflows.%20To%20solve%20these%20issues%2C%20we%20propose%20VideoTemp-o3%2C%20a%20unified%20agentic%20thinking-with-videos%20framework%20that%20jointly%20models%20video%20grounding%20and%20question%20answering.%20VideoTemp-o3%20exhibits%20strong%20localization%20capability%2C%20supports%20on-demand%20clipping%2C%20and%20can%20refine%20inaccurate%20localizations.%20Specifically%2C%20in%20the%20supervised%20fine-tuning%20stage%2C%20we%20design%20a%20unified%20masking%20mechanism%20that%20encourages%20exploration%20while%20preventing%20noise.%20For%20reinforcement%20learning%2C%20we%20introduce%20dedicated%20rewards%20to%20mitigate%20reward%20hacking.%20Besides%2C%20from%20the%20data%20perspective%2C%20we%20develop%20an%20effective%20pipeline%20to%20construct%20high-quality%20long%20video%20 {"title": "Utonia: Toward One Encoder for All Point Clouds", "author": "Yujia Zhang and Xiaoyang Wu and Yunhan Yang and Xianzhe Fan and Han Li and Yuechen Zhang and Zehao Huang and Naiyan Wang and Hengshuang Zhao", "abstract": "We dream of a future where point clouds from all domains can come together to shape a single model that benefits them all. Toward this goal, we present Utonia, a first step toward training a single self-supervised point transformer encoder across diverse domains, spanning remote sensing, outdoor LiDAR, indoor RGB-D sequences, object-centric CAD models, and point clouds lifted from RGB-only videos. Despite their distinct sensing geometries, densities, and priors, Utonia learns a consistent representation space that transfers across domains. This unification improves perception capability while revealing intriguing emergent behaviors that arise only when domains are trained jointly. Beyond perception, we observe that Utonia representations can also benefit embodied and multimodal reasoning: conditioning vision-language-action policies on Utonia features improves robotic manipulation, and integrating them into vision-language models yields gains on spatial reasoning. We hope Utonia can serve as a step toward foundation models for sparse 3D data, and support downstream applications in AR/VR, robotics, and autonomous driving.", "link": "http://arxiv.org/abs/2603.03283v1", "date": "2026-03-03", "relevancy": 2.3468, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.622}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5617}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5611}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Utonia%3A%20Toward%20One%20Encoder%20for%20All%20Point%20Clouds&body=Title%3A%20Utonia%3A%20Toward%20One%20Encoder%20for%20All%20Point%20Clouds%0AAuthor%3A%20Yujia%20Zhang%20and%20Xiaoyang%20Wu%20and%20Yunhan%20Yang%20and%20Xianzhe%20Fan%20and%20Han%20Li%20and%20Yuechen%20Zhang%20and%20Zehao%20Huang%20and%20Naiyan%20Wang%20and%20Hengshuang%20Zhao%0AAbstract%3A%20We%20dream%20of%20a%20future%20where%20point%20clouds%20from%20all%20domains%20can%20come%20together%20to%20shape%20a%20single%20model%20that%20benefits%20them%20all.%20Toward%20this%20goal%2C%20we%20present%20Utonia%2C%20a%20first%20step%20toward%20training%20a%20single%20self-supervised%20point%20transformer%20encoder%20across%20diverse%20domains%2C%20spanning%20remote%20sensing%2C%20outdoor%20LiDAR%2C%20indoor%20RGB-D%20sequences%2C%20object-centric%20CAD%20models%2C%20and%20point%20clouds%20lifted%20from%20RGB-only%20videos.%20Despite%20their%20distinct%20sensing%20geometries%2C%20densities%2C%20and%20priors%2C%20Utonia%20learns%20a%20consistent%20representation%20space%20that%20transfers%20across%20domains.%20This%20unification%20improves%20perception%20capability%20while%20revealing%20intriguing%20emergent%20behaviors%20that%20arise%20only%20when%20domains%20are%20trained%20jointly.%20Beyond%20perception%2C%20we%20observe%20that%20Utonia%20representations%20can%20also%20benefit%20embodied%20and%20multimodal%20reasoning%3A%20conditioning%20vision-language-action%20policies%20on%20Utonia%20features%20improves%20robotic%20manipulation%2C%20and%20integrating%20them%20into%20vision-language%20models%20yields%20gains%20on%20spatial%20reasoning.%20We%20hope%20Utonia%20can%20serve%20as%20a%20step%20toward%20foundation%20models%20for%20sparse%203D%20data%2C%20and%20support%20downstream%20applications%20in%20AR/VR%2C%20robotics%2C%20and%20autonomous%20driving.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03283v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUtonia%253A%2520Toward%2520One%2520Encoder%2520for%2520All%2520Point%2520Clouds%26entry.906535625%3DYujia%2520Zhang%2520and%2520Xiaoyang%2520Wu%2520and%2520Yunhan%2520Yang%2520and%2520Xianzhe%2520Fan%2520and%2520Han%2520Li%2520and%2520Yuechen%2520Zhang%2520and%2520Zehao%2520Huang%2520and%2520Naiyan%2520Wang%2520and%2520Hengshuang%2520Zhao%26entry.1292438233%3DWe%2520dream%2520of%2520a%2520future%2520where%2520point%2520clouds%2520from%2520all%2520domains%2520can%2520come%2520together%2520to%2520shape%2520a%2520single%2520model%2520that%2520benefits%2520them%2520all.%2520Toward%2520this%2520goal%252C%2520we%2520present%2520Utonia%252C%2520a%2520first%2520step%2520toward%2520training%2520a%2520single%2520self-supervised%2520point%2520transformer%2520encoder%2520across%2520diverse%2520domains%252C%2520spanning%2520remote%2520sensing%252C%2520outdoor%2520LiDAR%252C%2520indoor%2520RGB-D%2520sequences%252C%2520object-centric%2520CAD%2520models%252C%2520and%2520point%2520clouds%2520lifted%2520from%2520RGB-only%2520videos.%2520Despite%2520their%2520distinct%2520sensing%2520geometries%252C%2520densities%252C%2520and%2520priors%252C%2520Utonia%2520learns%2520a%2520consistent%2520representation%2520space%2520that%2520transfers%2520across%2520domains.%2520This%2520unification%2520improves%2520perception%2520capability%2520while%2520revealing%2520intriguing%2520emergent%2520behaviors%2520that%2520arise%2520only%2520when%2520domains%2520are%2520trained%2520jointly.%2520Beyond%2520perception%252C%2520we%2520observe%2520that%2520Utonia%2520representations%2520can%2520also%2520benefit%2520embodied%2520and%2520multimodal%2520reasoning%253A%2520conditioning%2520vision-language-action%2520policies%2520on%2520Utonia%2520features%2520improves%2520robotic%2520manipulation%252C%2520and%2520integrating%2520them%2520into%2520vision-language%2520models%2520yields%2520gains%2520on%2520spatial%2520reasoning.%2520We%2520hope%2520Utonia%2520can%2520s {"title": "Interpretable Motion-Attentive Maps: Spatio-Temporally Localizing Concepts in Video Diffusion Transformers", "author": "Youngjun Jun and Seil Kang and Woojung Han and Seong Jae Hwang", "abstract": "Video Diffusion Transformers (DiTs) have been synthesizing high-quality video with high fidelity from given text descriptions involving motion. However, understanding how Video DiTs convert motion words into video remains insufficient. Furthermore, while prior studies on interpretable saliency maps primarily target objects, motion-related behavior in Video DiTs remains largely unexplored. In this paper, we investigate concrete motion features that specify when and which object moves for a given motion concept. First, to spatially localize, we introduce GramCol, which adaptively produces per-frame saliency maps for any text concept, including both motion and non-motion. Second, we propose a motion-feature selection algorithm to obtain an Interpretable Motion-Attentive Map (IMAP) that localizes motion spatially and temporally. Our method discovers concept saliency maps without the need for any gradient calculation or parameter update. Experimentally, our method shows outstanding localization capability on the motion localization task and zero-shot video semantic segmentation, providing interpretable and clearer saliency maps for both motion and non-motion concepts.", "link": "http://arxiv.org/abs/2603.02919v1", "date": "2026-03-03", "relevancy": 2.335, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6388}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5755}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5701}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Interpretable%20Motion-Attentive%20Maps%3A%20Spatio-Temporally%20Localizing%20Concepts%20in%20Video%20Diffusion%20Transformers&body=Title%3A%20Interpretable%20Motion-Attentive%20Maps%3A%20Spatio-Temporally%20Localizing%20Concepts%20in%20Video%20Diffusion%20Transformers%0AAuthor%3A%20Youngjun%20Jun%20and%20Seil%20Kang%20and%20Woojung%20Han%20and%20Seong%20Jae%20Hwang%0AAbstract%3A%20Video%20Diffusion%20Transformers%20%28DiTs%29%20have%20been%20synthesizing%20high-quality%20video%20with%20high%20fidelity%20from%20given%20text%20descriptions%20involving%20motion.%20However%2C%20understanding%20how%20Video%20DiTs%20convert%20motion%20words%20into%20video%20remains%20insufficient.%20Furthermore%2C%20while%20prior%20studies%20on%20interpretable%20saliency%20maps%20primarily%20target%20objects%2C%20motion-related%20behavior%20in%20Video%20DiTs%20remains%20largely%20unexplored.%20In%20this%20paper%2C%20we%20investigate%20concrete%20motion%20features%20that%20specify%20when%20and%20which%20object%20moves%20for%20a%20given%20motion%20concept.%20First%2C%20to%20spatially%20localize%2C%20we%20introduce%20GramCol%2C%20which%20adaptively%20produces%20per-frame%20saliency%20maps%20for%20any%20text%20concept%2C%20including%20both%20motion%20and%20non-motion.%20Second%2C%20we%20propose%20a%20motion-feature%20selection%20algorithm%20to%20obtain%20an%20Interpretable%20Motion-Attentive%20Map%20%28IMAP%29%20that%20localizes%20motion%20spatially%20and%20temporally.%20Our%20method%20discovers%20concept%20saliency%20maps%20without%20the%20need%20for%20any%20gradient%20calculation%20or%20parameter%20update.%20Experimentally%2C%20our%20method%20shows%20outstanding%20localization%20capability%20on%20the%20motion%20localization%20task%20and%20zero-shot%20video%20semantic%20segmentation%2C%20providing%20interpretable%20and%20clearer%20saliency%20maps%20for%20both%20motion%20and%20non-motion%20concepts.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02919v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfF {"title": "Rhythm: Learning Interactive Whole-Body Control for Dual Humanoids", "author": "Hongjin Chen and Wei Zhang and Pengfei Li and Shihao Ma and Ke Ma and Yujie Jin and Zijun Xu and Xiaohui Wang and Yupeng Zheng and Zining Wang and Jieru Zhao and Yilun Chen and Wenchao Ding", "abstract": "Realizing interactive whole-body control for multi-humanoid systems is critical for unlocking complex collaborative capabilities in shared environments. Although recent advancements have significantly enhanced the agility of individual robots, bridging the gap to physically coupled multi-humanoid interaction remains challenging, primarily due to severe kinematic mismatches and complex contact dynamics. To address this, we introduce Rhythm, the first unified framework enabling real-world deployment of dual-humanoid systems for complex, physically plausible interactions. Our framework integrates three core components: (1) an Interaction-Aware Motion Retargeting (IAMR) module that generates feasible humanoid interaction references from human data; (2) an Interaction-Guided Reinforcement Learning (IGRL) policy that masters coupled dynamics via graph-based rewards; and (3) a real-world deployment system that enables robust transfer of dual-humanoid interaction. Extensive experiments on physical Unitree G1 robots demonstrate that our framework achieves robust interactive whole-body control, successfully transferring diverse behaviors such as hugging and dancing from simulation to reality.", "link": "http://arxiv.org/abs/2603.02856v1", "date": "2026-03-03", "relevancy": 2.3243, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6005}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.578}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link" {"title": "Enhancing Generative Auto-bidding with Offline Reward Evaluation and Policy Search", "author": "Zhiyu Mou and Yiqin Lv and Miao Xu and Qi Wang and Yixiu Mao and Jinghao Chen and Qichen Ye and Chao Li and Rongquan Bai and Chuan Yu and Jian Xu and Bo Zheng", "abstract": "Auto-bidding is a critical tool for advertisers to improve advertising performance. Recent progress has demonstrated that AI-Generated Bidding (AIGB), which learns a conditional generative planner from offline data, achieves superior performance compared to typical offline reinforcement learning (RL)-based auto-bidding methods. However, existing AIGB methods still face a performance bottleneck due to their inherent inability to explore beyond the static dataset with feedback. To address this, we propose \\textbf{AIGB-Pearl} (\\emph{\\textbf{P}lanning with \\textbf{E}valu\\textbf{A}tor via \\textbf{RL}}), a novel method that integrates generative planning and policy optimization. The core of AIGB-Pearl lies in constructing a trajectory evaluator to assess the quality of generated scores and designing a provably sound KL-Lipschitz-constrained score-maximization scheme to ensure safe and efficient exploration beyond the offline dataset. A practical algorithm that incorporates the synchronous coupling technique is further developed to ensure the model regularity required by the proposed scheme. Extensive experiments on both simulated and real-world advertising systems demonstrate the state-of-the-art performance of our approach.", "link": "http://arxiv.org/abs/2509.15927v4", "date": "2026-03-03", "relevancy": 2.3123, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4966}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4469}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", {"title": "BrandFusion: A Multi-Agent Framework for Seamless Brand Integration in Text-to-Video Generation", "author": "Zihao Zhu and Ruotong Wang and Siwei Lyu and Min Zhang and Baoyuan Wu", "abstract": "The rapid advancement of text-to-video (T2V) models has revolutionized content creation, yet their commercial potential remains largely untapped. We introduce, for the first time, the task of seamless brand integration in T2V: automatically embedding advertiser brands into prompt-generated videos while preserving semantic fidelity to user intent. This task confronts three core challenges: maintaining prompt fidelity, ensuring brand recognizability, and achieving contextually natural integration. To address them, we propose BrandFusion, a novel multi-agent framework comprising two synergistic phases. In the offline phase (advertiser-facing), we construct a Brand Knowledge Base by probing model priors and adapting to novel brands via lightweight fine-tuning. In the online phase (user-facing), five agents jointly refine user prompts through iterative refinement, leveraging the shared knowledge base and real-time contextual tracking to ensure brand visibility and semantic alignment. Experiments on 18 established and 2 custom brands across multiple state-of-the-art T2V models demonstrate that BrandFusion significantly outperforms baselines in semantic preservation, brand recognizability, and integration naturalness. Human evaluations further confirm higher user satisfaction, establishing a practical pathway for sustainable T2V monetization.", "link": "http://arxiv.org/abs/2603.02816v1", "date": "2026-03-03", "relevancy": 2.3116, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6525}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5973}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5287}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BrandFusion%3A%20A%20Multi-Agent%20Framework%20for%20Seamless%20Brand%20Integration%20in%20Text-to-Video%20Generation&body=Title%3A%20BrandFusion%3A%20A%20Multi-Agent%20Framework%20for%20Seamless%20Brand%20Integration%20in%20Text-to-Video%20Generation%0AAuthor%3A%20Zihao%20Zhu%20and%20Ruotong%20Wang%20and%20Siwei%20Lyu%20and%20Min%20Zhang%20and%20Baoyuan%20Wu%0AAbstract%3A%20The%20rapid%20advancement%20of%20text-to-video%20%28T2V%29%20models%20has%20revolutionized%20content%20creation%2C%20yet%20their%20commercial%20potential%20remains%20largely%20untapped.%20We%20introduce%2C%20for%20the%20first%20time%2C%20the%20task%20of%20seamless%20brand%20integration%20in%20T2V%3A%20automatically%20embedding%20advertiser%20brands%20into%20prompt-generated%20videos%20while%20preserving%20semantic%20fidelity%20to%20user%20intent.%20This%20task%20confronts%20three%20core%20challenges%3A%20maintaining%20prompt%20fidelity%2C%20ensuring%20brand%20recognizability%2C%20and%20achieving%20contextually%20natural%20integration.%20To%20address%20them%2C%20we%20propose%20BrandFusion%2C%20a%20novel%20multi-agent%20framework%20comprising%20two%20synergistic%20phases.%20In%20the%20offline%20phase%20%28advertiser-facing%29%2C%20we%20construct%20a%20Brand%20Knowledge%20Base%20by%20probing%20model%20priors%20and%20adapting%20to%20novel%20brands%20via%20lightweight%20fine-tuning.%20In%20the%20online%20phase%20%28user-facing%29%2C%20five%20agents%20jointly%20refine%20user%20prompts%20through%20iterative%20refinement%2C%20leveraging%20the%20shared%20knowledge%20base%20and%20real-time%20contextual%20tracking%20to%20ensure%20brand%20visibility%20and%20semantic%20alignment.%20Experiments%20on%2018%20established%20and%202%20custom%20brands%20across%20multiple%20state-of-the-art%20T2V%20models%20demonstrate%20that%20BrandFusion%20significantly%20outperforms%20baselines%20in%20semantic%20preservation%2C%20brand%20recognizability%2C%20and%20integration%20naturalness.%20Human%20evaluations%20further%20confirm%20higher%20user%20satisfaction%2C%20establishing%20a%20practical%20pathway%20for%20sustainable%20T2V%20monetization.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02816v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBrandFusion%253A%2520A%2520Multi-Agent%2520Framework%2520for%2520Seamless%2520Brand%2520Integration%2520in%2520Text-to-Video%2520Generation%26entry.906535625%3DZihao%2520Zhu%2520and%2520Ruotong%2520Wang%2520and%2520Siwei%2520Lyu%2520and%2520Min%2520Zhang%2520and%2520Baoyuan%2520Wu%26entry.1292438233%3DThe%2520rapid%2520advancement%2520of%2520text-to-video%2520%2528T2V%2529%2520models%2520has%2520revolutionized%2520content%2520creation%252C%2520yet%2520their%2520commercial%2520potential%2520remains%2520largely%2520untapped.%2520We%2520introduce%252C%2520for%2520the%2520first%2520time%252C%2520the%2520task%2520of%2520seamless%2520brand%2520integration%2520in%2520T2V%253A%2520automatically%2520embedding%2520advertiser%2520brands%2520into%2520prompt-generated%2520videos%2520while%2520preserving%2520semantic%2520fidelity%2520to%2520user%2520intent.%2520This%2520task%2520confronts%2520three%2520core%2520challenges%253A%2520maintaining%2520prompt%2520fidelity%252C%2520ensuring%2520brand%2520recognizability%252C%2520and%2520achieving%2520contextually%2520natural%2520integration.%2520To%2520address%2520them%252C%2520we%2520propose%2520BrandFusion%252C%2520a%2520novel%2520multi-agent%2520framework%2520comprising%2520two%2520synergistic%2520phases.%2520In%2520the%2520offline%2520phase%2520%2528advertiser-facing%2529%252C%2520we%2520construct%2520a%2520Brand%2520Knowledge%2520Base%2520by%2520probing%2520model%2520priors%2520and%2520adapting%2520to%2520novel%2520brands%2520via%2520lightweight%2520fine-tun {"title": "MIBURI: Towards Expressive Interactive Gesture Synthesis", "author": "M. Hamza Mughal and Rishabh Dabral and Vera Demberg and Christian Theobalt", "abstract": "Embodied Conversational Agents (ECAs) aim to emulate human face-to-face interaction through speech, gestures, and facial expressions. Current large language model (LLM)-based conversational agents lack embodiment and the expressive gestures essential for natural interaction. Existing solutions for ECAs often produce rigid, low-diversity motions, that are unsuitable for human-like interaction. Alternatively, generative methods for co-speech gesture synthesis yield natural body gestures but depend on future speech context and require long run-times. To bridge this gap, we present MIBURI, the first online, causal framework for generating expressive full-body gestures and facial expressions synchronized with real-time spoken dialogue. We employ body-part aware gesture codecs that encode hierarchical motion details into multi-level discrete tokens. These tokens are then autoregressively generated by a two-dimensional causal framework conditioned on LLM-based speech-text embeddings, modeling both temporal dynamics and part-level motion hierarchy in real time. Further, we introduce auxiliary objectives to encourage expressive and diverse gestures while preventing convergence to static poses. Comparative evaluations demonstrate that our causal and real-time approach produces natural and contextually aligned gestures against recent baselines. We urge the reader to explore demo videos on https://vcai.mpi-inf.mpg.de/projects/MIBURI/.", "link": "http://arxiv.org/abs/2603.03282v1", "date": "2026-03-03", "relevancy": 2.3073, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5988}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5688}, {"title": "RoboEXP: Action-Conditio {"title": "ACE-Brain-0: Spatial Intelligence as a Shared Scaffold for Universal Embodiments", "author": "Ziyang Gong and Zehang Luo and Anke Tang and Zhe Liu and Shi Fu and Zhi Hou and Ganlin Yang and Weiyun Wang and Xiaofeng Wang and Jianbo Liu and Gen Luo and Haolan Kang and Shuang Luo and Yue Zhou and Yong Luo and Li Shen and Xiaosong Jia and Yao Mu and Xue Yang and Chunxiao Liu and Junchi Yan and Hengshuang Zhao and Dacheng Tao and Xiaogang Wang", "abstract": "Universal embodied intelligence demands robust generalization across heterogeneous embodiments, such as autonomous driving, robotics, and unmanned aerial vehicles (UAVs). However, existing embodied brain in training a unified model over diverse embodiments frequently triggers long-tail data, gradient interference, and catastrophic forgetting, making it notoriously difficult to balance universal generalization with domain-specific proficiency. In this report, we introduce ACE-Brain-0, a generalist foundation brain that unifies spatial reasoning, autonomous driving, and embodied manipulation within a single multimodal large language model~(MLLM). Our key insight is that spatial intelligence serves as a universal scaffold across diverse physical embodiments: although vehicles, robots, and UAVs differ drastically in morphology, they share a common need for modeling 3D mental space, making spatial cognition a natural, domain-agnostic foundation for cross-embodiment transfer. Building on this insight, we propose the Scaffold-Specialize-Reconcile~(SSR) paradigm, which first establishes a shared spatial foundation, then cultivates domain-specialized experts, and finally harmonizes them through data-free model merging. Furthermore, we adopt Group Relative Policy Optimization~(GRPO) to strengthen the model's comprehensive capability. Extensive experiments demonstrate that ACE-Brain-0 achieves competitive and even state-of-the-art performance across 24 spatial and embodiment-related benchmarks.", "link": "http://arxiv.org/abs/2603.03198v1", "date": "2026-03-03", "relevancy": 2.3051, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5804}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5763}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5721}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ACE-Brain-0%3A%20Spatial%20Intelligence%20as%20a%20Shared%20Scaffold%20for%20Universal%20Embodiments&body=Title%3A%20ACE-Brain-0%3A%20Spatial%20Intelligence%20as%20a%20Shared%20Scaffold%20for%20Universal%20Embodiments%0AAuthor%3A%20Ziyang%20Gong%20and%20Zehang%20Luo%20and%20Anke%20Tang%20and%20Zhe%20Liu%20and%20Shi%20Fu%20and%20Zhi%20Hou%20and%20Ganlin%20Yang%20and%20Weiyun%20Wang%20and%20Xiaofeng%20Wang%20and%20Jianbo%20Liu%20and%20Gen%20Luo%20and%20Haolan%20Kang%20and%20Shuang%20Luo%20and%20Yue%20Zhou%20and%20Yong%20Luo%20and%20Li%20Shen%20and%20Xiaosong%20Jia%20and%20Yao%20Mu%20and%20Xue%20Yang%20and%20Chunxiao%20Liu%20and%20Junchi%20Yan%20and%20Hengshuang%20Zhao%20and%20Dacheng%20Tao%20and%20Xiaogang%20Wang%0AAbstract%3A%20Universal%20embodied%20intelligence%20demands%20robust%20generalization%20across%20heterogeneous%20embodiments%2C%20such%20as%20autonomous%20driving%2C%20robotics%2C%20and%20unmanned%20aerial%20vehicles%20%28UAVs%29.%20However%2C%20existing%20embodied%20brain%20in%20training%20a%20unified%20model%20over%20diverse%20embodiments%20frequently%20triggers%20long-tail%20data%2C%20gradient%20interference%2C%20and%20catastrophic%20forgetting%2C%20making%20it%20notoriously%20difficult%20to%20balance%20universal%20generalization%20with%20domain-specific%20proficiency.%20In%20this%20report%2C%20we%20introduce%20ACE-Brain-0%2C%20a%20generalist%20foundation%20brain%20that%20unifies%20spatial%20reasoning%2C%20autonomous%20driving%2C%20and%20embodied%20manipulation%20within%20a%20single%20multimodal%20large%20language%20model~%28MLLM%29.%20Our%20key%20insight%20is%20that%20spatial%20intelligence%20serves%20as%20a%20universal%20scaffold%20across%20diverse%20physical%20embodiments%3A%20although%20vehicles%2C%20robots%2C%20and%20UAVs%20differ%20drastically%20in%20morphology%2C%20they%20share%20a%20common%20need%20for%20modeling%203D%20mental%20space%2C%20making%20spatial%20cognition%20a%20natural%2C%20domain-agnostic%20foundation%20for%20cross-embodiment%20transfer.%20Building%20on%20this%20insight%2C%20we%20propose%20the%20Scaffold-Specialize-Reconcile~%28SSR%29%20paradigm%2C%20which%20first%20establishes%20a%20shared%20spatial%20foundation%2C%20then%20cultivates%20domain-specialized%20experts%2C%20and%20finally%20harmonizes%20them%20through%20data-free%20model%20merging.%20Furthermore%2C%20we%20adopt%20Group%20Relative%20Policy%20Optimization~%28GRPO%29%20to%20strengthen%20the%20model%27s%20comprehensive%20capability.%20Extensive%20experiments%20demonstrate%20that%20ACE-Brain-0%20achieves%20competitive%20and%20even%20state-of-the-art%20performance%20across%2024%20spatial%20and%20embodiment-related%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03198v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DACE-Brain-0%253A%2520Spatial%2520Intelligence%2520as%2520a%2520Shared%2520Scaffold%2520for%2520Universal%2520Embodiments%26entry.906535625%3DZiyang%2520Gong%2520and%2520Zehang%2520Luo%2520and%2520Anke%2520Tang%2520and%2520Zhe%2520Liu%2520and%2520Shi%2520Fu%2520and%2520Zhi%2520Hou%2520and%2520Ganlin%2520Yang%2520and%2520Weiyun%2520Wang%2520and%2520Xiaofeng%2520Wang%2520and%2520Jianbo%2520Liu%2520and%2520Gen%2520Luo%2520and%2520Haolan%2520Kang%2520and%2520Shuang%2520Luo%2520and%2520Yue%2520Zhou%2520and%2520Yong%2520 {"title": "OM4OV: Leveraging Ontology Matching for Ontology Versioning", "author": "Zhangcheng Qiang and Kerry Taylor and Weiqing Wang", "abstract": "Due to the dynamic nature of the Semantic Web, version control is necessary to manage changes in widely used ontologies. Despite the long-standing recognition of ontology versioning (OV) as a crucial component of efficient ontology management, many approaches treat OV as similar to ontology matching (OM) and directly reuse OM systems for OV tasks. In this study, we systematically analyse similarities and differences between OM and OV and formalise an OM4OV pipeline to offer more advanced OV support. The pipeline is implemented and evaluated in the state-of-the-art OM system Agent-OM. The experimental results indicate that OM systems can be effectively reused for OV tasks, but without necessary extensions, can produce skewed measurements, poor performance in detecting update entities, and limited explanation of false mappings. To tackle these issues, we propose an optimisation method called the cross-reference (CR) mechanism, which builds on existing OM alignments to reduce the number of matching candidates and to improve overall OV performance.", "link": "http://arxiv.org/abs/2409.20302v10", "date": "2026-03-03", "relevancy": 2.3036, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4647}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4647}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.4528}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OM4OV%3A%20Leveraging%20Ontology%20Matching%20for%20Ontology%20Versioning&body=Title%3A%20 {"title": "Gravity Falls: A Comparative Analysis of Domain-Generation Algorithm (DGA) Detection Methods for Mobile Device Spearphishing", "author": "Adam Dorian Wong and John D. Hastings", "abstract": "Mobile devices are frequent targets of eCrime threat actors through SMS spearphishing (smishing) links that leverage Domain Generation Algorithms (DGA) to rotate hostile infrastructure. Despite this, DGA research and evaluation largely emphasize malware C2 and email phishing datasets, leaving limited evidence on how well detectors generalize to smishing-driven domain tactics outside enterprise perimeters. This work addresses that gap by evaluating traditional and machine-learning DGA detectors against Gravity Falls, a new semi-synthetic dataset derived from smishing links delivered between 2022 and 2025. Gravity Falls captures a single threat actor's evolution across four technique clusters, shifting from short randomized strings to dictionary concatenation and themed combo-squatting variants used for credential theft and fee/fine fraud. Two string-analysis approaches (Shannon entropy and Exp0se) and two ML-based detectors (an LSTM classifier and COSSAS DGAD) are assessed using Top-1M domains as benign baselines. Results are strongly tactic-dependent: performance is highest on randomized-string domains but drops on dictionary concatenation and themed combo-squatting, with low recall across multiple tool/cluster pairings. Overall, both traditional heuristics and recent ML detectors are ill-suited for consistently evolving DGA tactics observed in Gravity Falls, motivating more context-aware approaches and providing a reproducible benchmark for future evaluation.", "link": "http://arxiv.org/abs/2603.03270v1", "date": "2026-03-03", "relevancy": 2.271, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4841}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": " nes.%20Results%20are%20strongly%20tactic-dependent%3A%20performance%20is%20highest%20on%20randomized-string%20domains%20but%20drops%20on%20dictionary%20concatenation%20and%20themed%20combo-squatting%2C%20with%20low%20recall%20across%20multiple%20tool/cluster%20pairings.%20Overall%2C%20both%20traditional%20heuristics%20and%20recent%20ML%20detectors%20are%20ill-suited%20for%20consistently%20evolving%20DGA%20tactics%20observed%20in%20Gravity%20Falls%2C%20motivating%20more%20context-aware%20approaches%20and%20providing%20a%20reproducible%20benchmark%20for%20future%20evaluation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03270v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGravity%2520Falls%253A%2520A%2520Comparative%2520Analysis%2520of%2520Domain-Generation%2520Algorithm%2520%2528DGA%2529%2520Detection%2520Methods%2520for%2520Mobile%2520Device%2520Spearphishing%26entry.906535625%3DAdam%2520Dorian%2520Wong%2520and%2520John%2520D.%2520Hastings%26entry.1292438233%3DMobile%2520devices%2520are%2520frequent%2520targets%2520of%2520eCrime%2520threat%2520actors%2520through%2520SMS%2520spearphishing%2520%2528smishing%2529%2520links%2520that%2520leverage%2520Domain%2520Generation%2520Algorithms%2520%2528DGA%2529%2520to%2520rotate%2520hostile%2520infrastructure.%2520Despite%2520this%252C%2520DGA%2520research%2520and%2520evaluation%2520largely%2520emphasize%2520malware%2520C2%2520and%2520email%2520phishing%2520datasets%252C%2520leaving%2520limited%2520evidence%2520on%2520how%2520well%2520detectors%2520generalize%2520to%2520smishing-driven%2520domain%2520tactics%2520outside%2520enterprise%2520perimeters.%2520This%2520work%2520addresses%2520that%2520gap%2520by%2520evaluating%2520traditional%2520and%2520machine-learning%2520DGA%2520detectors%2520against%2520Gravity%2520Falls%252C%2520a%2520new%2520semi-synthetic%2520dataset%2520derived%2520from%2520smishing%2520links%2520delivered%2520between%2520202 {"title": "Why Does RLAIF Work At All?", "author": "Robin Young", "abstract": "Reinforcement Learning from AI Feedback (RLAIF) enables language models to improve by training on their own preference judgments, yet no theoretical account explains why this self-improvement seemingly works for value learning. We propose the latent value hypothesis, that pretraining on internet-scale data encodes human values as directions in representation space, and constitutional prompts elicit these latent values into preference judgments. We formalize this intuition under a linear model where the constitution acts as a projection operator selecting value-relevant directions. Our analysis yields several results. RLAIF improves alignment when the constitution-activated direction correlates with true values better than the model's default generation direction thus explaining the generation-judgment gap; the ceiling on RLAIF quality is determined by how well representations encode values, which scales with model capacity; and adversarial constitutions exist that can activate anti-social value directions encoded from harmful pretraining data. Our account unifies scattered empirical findings including the refusal direction, low-rank safety subspaces, and RLAIF scaling behavior.", "link": "http://arxiv.org/abs/2603.03000v1", "date": "2026-03-03", "relevancy": 2.2682, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4613}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4498}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4498}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Why%20Does%20RLAIF%20Work%20At%20All%3F&body=Title%3A%20Why%20Does%20RLAIF%20Work%20At%20All%3F%0AAuthor%3A%20Robin%20Young%0AAbstract%3A%20Reinforcement%20Learning%20from%20AI%20Feedback%20%28RLAIF%29%20enables%20language%20models%20to%20improve%20by%20training%20on%20their%20own%20preference%20judgments%2C%20yet%20no%20theoretical%20account%20explains%20why%20this%20self-improvement%20seemingly%20works%20for%20value%20learning.%20We%20propose%20the%20latent%20value%20hypothesis%2C%20that%20pretraining%20on%20internet-scale%20data%20encodes%20human%20values%20as%20directions%20in%20representation%20space%2C%20and%20constitutional%20prompts%20elicit%20these%20latent%20values%20into%20preference%20judgments.%20We%20formalize%20this%20intuition%20under%20a%20linear%20model%20where%20the%20constitution%20acts%20as%20a%20projection%20operator%20selecting%20value-relevant%20directions.%20Our%20analysis%20yields%20several%20results.%20RLAIF%20improves%20alignment%20when%20the%20constitution-activated%20direction%20correlates%20with%20true%20values%20better%20than%20the%20model%27s%20default%20generation%20direction%20thus%20explaining%20the%20generation-judgment%20gap%3B%20the%20ceiling%20on%20RLAIF%20quality%20is%20determined%20by%20how%20well%20representations%20encode%20values%2C%20which%20scales%20with%20model%20capacity%3B%20and%20adversarial%20constitutions%20exist%20that%20can%20activate%20anti-social%20value%20directions%20encoded%20from%20harmful%20pretraining%20data.%20Our%20account%20unifies%20scattered%20empirical%20findings%20including%20the%20refusal%20direction%2C%20low-rank%20safety%20subspaces%2C%20and%20RLAIF%20scaling%20behavior.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03000v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhy%2520Does%2520RLAIF%2520Work%2520At%2520All%253F%26entry.906535625%3DRobin%2520Young%26entry.1292438233%3DReinforcement%2520Learning%2520from%2520AI%2520Feedback%2520%2528RLAIF%2529%2520enables%2520language%2520 {"title": "Linear Model Extraction via Factual and Counterfactual Queries", "author": "Daan Otto and Jannis Kurtz and Dick den Hertog and Ilker Birbil", "abstract": "In model extraction attacks, the goal is to reveal the parameters of a black-box machine learning model by querying the model for a selected set of data points. Due to an increasing demand for explanations, this may involve counterfactual queries besides the typically considered factual queries. In this work, we consider linear models and three types of queries: factual, counterfactual, and robust counterfactual. First, for an arbitrary set of queries, we derive novel mathematical formulations for the classification regions for which the decision of the unknown model is known, without recovering any of the model parameters. Second, we derive bounds on the number of queries needed to extract the model's parameters for (robust) counterfactual queries under arbitrary norm-based distances. We show that the full model can be recovered using just a single counterfactual query when differentiable distance measures are employed. In contrast, when using polyhedral distances for instance, the number of required queries grows linearly with the dimension of the data space. For robust counterfactuals, the latter number of queries doubles. Consequently, the applied distance function and robustness of counterfactuals have a significant impact on the model's security.", "link": "http://arxiv.org/abs/2602.09748v2", "date": "2026-03-03", "relevancy": 2.2643, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.461}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.461}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4367}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Linear%20Model%20Extraction%20via%20Factual%20and%20Counterfactual%20Queries&body=Title%3A%20Linear%20Model%20Extraction%20via%20Factual%20and%20Counterfactual%20Queries%0AAuthor%3A%20Daan%20Otto%20and%20Jannis%20Kurtz%20and%20Dick%20den%20Hertog%20and%20Ilker%20Birbil%0AAbstract%3A%20In%20model%20extraction%20attacks%2C%20the%20goal%20is%20to%20reveal%20the%20parameters%20of%20a%20black-box%20machine%20learning%20model%20by%20querying%20the%20model%20for%20a%20selected%20set%20of%20data%20points.%20Due%20to%20an%20increasing%20demand%20for%20explanations%2C%20this%20may%20involve%20counterfactual%20queries%20besides%20the%20typically%20considered%20factual%20queries.%20In%20this%20work%2C%20we%20consider%20linear%20models%20and%20three%20types%20of%20queries%3A%20factual%2C%20counterfactual%2C%20and%20robust%20counterfactual.%20First%2C%20for%20an%20arbitrary%20set%20of%20queries%2C%20we%20derive%20novel%20mathematical%20formulations%20for%20the%20classification%20regions%20for%20which%20the%20decision%20of%20the%20unknown%20model%20is%20known%2C%20without%20recovering%20any%20of%20the%20model%20parameters.%20Second%2C%20we%20derive%20bounds%20on%20the%20number%20of%20queries%20needed%20to%20extract%20the%20model%27s%20parameters%20for%20%28robust%29%20counterfactual%20queries%20under%20arbitrary%20norm-based%20distances.%20We%20show%20that%20the%20full%20model%20can%20be%20recovered%20using%20just%20a%20single%20counterfactual%20query%20when%20differentiable%20distance%20measures%20are%20employed.%20In%20contrast%2C%20when%20using%20polyhedral%20distances%20for%20instance%2C%20the%20number%20of%20required%20queries%20grows%20linearly%20with%20the%20dimension%20of%20the%20data%20space.%20For%20robust%20counterfactuals%2C%20the%20latter%20number%20of%20queries%20doubles.%20Consequently%2C%20the%20applied%20distance%20function%20and%20robustness%20of%20counterfactuals%20have%20a%20significant%20impact%20on%20the%20model%27s%20security.%0ALink%3A%20http%3A//arxiv.org/abs/2602.09748v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLinear%2520Model%2520Extraction%2520via%2520Factual%2520and%2520Counterfactual%2520Queries%26entry.906535625%3DDaan%2520Otto%2520and%2520Jannis%2520Kurtz%2520and%2520Dick%2520den%2520Hertog%2520and%2520Ilker%2520Birbil%26entry.1292438233%3DIn%2520model%2520extraction%2520attacks%252C%2520the%2520goal%2520is%2520to%2520reveal%2520the%2520parameters%2520of%2520a%2520black-box%2520machine%2520learning%2520model%2520by%2520querying%2520the%2520model%2520for%2520a%2520selected%2520set%2520of%2520data%2520points.%2520Due%2520to%2520an%2520increasing%2520demand%2520for%2520explanations%252C%2520this%2520may%2520involve%2520counterfactual%2520queries%2520besides%2520the%2520typically%2520considered%2520factual%2520queries.%2520In%2520this%2520work%252C%2520we%2520consider%2520linear%2520models%2520and%2520three%2520types%2520of%2520queries%253A%2520factual%252C%2520counterfactual%252C%2520and%2520robust%2520counterfactual.%2520First%252C%2520for%2520an%2520arbitrary%2520set%2520of%2520queries%252C%2520we%2520derive%2520novel%2520mathematical%2520formulations%2520for%2520the%2520classification%2520regions%2520for%2520which%2520the%2520decision%2520of%2520the%2520unknown%2520model%2520is%2520known%252C%2520without%2520recovering%2520any%2520of%2520the%2520model%2520parameters.%2520Second%252C%2520we%2520derive%2520bounds%2520on%2520the%2520number%2520of%2520queries%2520needed%2520to%2520extract%2520the%2520model%2527s%2520parameters%2520for%2520%2528robust%2529%2520counterfactual%2520queries%2520under%2520arbitrary%2520norm-based%2520distances.%2520We%2520show%2520that%2520the%2520full%2520model%2520can%2520be%2520recove {"title": "Partial Weakly-Supervised Oriented Object Detection", "author": "Mingxin Liu and Peiyuan Zhang and Yuan Liu and Wei Zhang and Yue Zhou and Ning Liao and Ziyang Gong and Junwei Luo and Zhirui Wang and Yi Yu and Xue Yang", "abstract": "The growing demand for oriented object detection (OOD) across various domains has driven significant research in this area. However, the high cost of dataset annotation remains a major concern. Current mainstream OOD algorithms can be mainly categorized into three types: (1) fully supervised methods using complete oriented bounding box (OBB) annotations, (2) semi-supervised methods using partial OBB annotations, and (3) weakly supervised methods using weak annotations such as horizontal boxes or points. However, these algorithms inevitably increase the cost of models in terms of annotation speed or annotation cost. To address this issue, we propose: (1)the first Partial Weakly-Supervised Oriented Object Detection (PWOOD) framework based on partially weak annotations (horizontal boxes or single points), which can efficiently leverage large amounts of unlabeled data, significantly outperforming weakly supervised algorithms trained with partially weak annotations, also offers a lower cost solution; (2) Orientation-and-Scale-aware Student (OS-Student) model capable of learning orientation and scale information with only a small amount of orientation-agnostic or scale-agnostic weak annotations; and (3) Class-Agnostic Pseudo-Label Filtering strategy (CPF) to reduce the model's sensitivity to static filtering thresholds. Comprehensive experiments on DOTA-v1.0/v1.5/v2.0 and DIOR datasets demonstrate that our PWOOD framework performs comparably to, or even surpasses traditional semi-supervised algorithms. Our code will be made publicly available.", "link": "http://arxiv.org/abs/2507.02751v2", "date": "2026-03-03", "relevancy": 2.2465, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5822}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5514}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.536}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Partial%20Weakly-Supervised%20Oriented%20Object%20Detection&body=Title%3A%20Partial%20Weakly-Supervised%20Oriented%20Object%20Detection%0AAuthor%3A%20Mingxin%20Liu%20and%20Peiyuan%20Zhang%20and%20Yuan%20Liu%20and%20Wei%20Zhang%20and%20Yue%20Zhou%20and%20Ning%20Liao%20and%20Ziyang%20Gong%20and%20Junwei%20Luo%20and%20Zhirui%20Wang%20and%20Yi%20Yu%20and%20Xue%20Yang%0AAbstract%3A%20The%20growing%20demand%20for%20oriented%20object%20detection%20%28OOD%29%20across%20various%20domains%20has%20driven%20significant%20research%20in%20this%20area.%20However%2C%20the%20high%20cost%20of%20dataset%20annotation%20remains%20a%20major%20concern.%20Current%20mainstream%20OOD%20algorithms%20can%20be%20mainly%20categorized%20into%20three%20types%3A%20%281%29%20fully%20supervised%20methods%20using%20complete%20oriented%20bounding%20box%20%28OBB%29%20annotations%2C%20%282%29%20semi-supervised%20methods%20using%20partial%20OBB%20annotations%2C%20and%20%283%29%20weakly%20supervised%20methods%20using%20weak%20annotations%20such%20as%20horizontal%20boxes%20or%20points.%20However%2C%20these%20algorithms%20inevitably%20increase%20the%20cost%20of%20models%20in%20terms%20of%20annotation%20speed%20or%20annotation%20cost.%20To%20address%20this%20issue%2C%20we%20propose%3A%20%281%29the%20first%20Partial%20Weakly-Supervised%20Oriented%20Object%20Detection%20%28PWOOD%29%20framework%20based%20on%20partially%20weak%20annotations%20%28horizontal%20boxes%20or%20single%20points%29%2C%20which%20can%20efficiently%20leverage%20large%20amounts%20of%20unlabeled%20data%2C%20significantly%20outperforming%20weakly%20supervised%20algorithms%20trained%20with%20partially%20weak%20annotations%2C%20also%20offers%20a%20lower%20cost%20solution%3B%20%282%29%20Orientation-and-Scale-aware%20Student%20%28OS-Student%29%20model%20capable%20of%20learning%20orientation%20and%20scale%20information%20with%20only%20a%20small%20amount%20of%20orientation-agnostic%20or%20scale-agnostic%20weak%20annotations%3B%20and%20%283%29%20Class-Agnostic%20Pseudo-Label%20Filtering%20strategy%20%28CPF%29%20to%20reduce%20the%20model%27s%20sensitivity%20to%20static%20filtering%20thresholds.%20Comprehensive%20experiments%20on%20DOTA-v1.0/v1.5/v2.0%20and%20DIOR%20datasets%20demonstrate%20that%20our%20PWOOD%20framework%20performs%20comparably%20to%2C%20or%20even%20surpasses%20traditional%20semi-supervised%20algorithms.%20Our%20code%20will%20be%20made%20publicly%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2507.02751v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPartial%2520Weakly-Supervised%2520Oriented%2520Object%2520Detection%26entry.906535625%3DMingxin%2520Liu%2520and%2520Peiyuan%2520Zhang%2520and%2520Yuan%2520Liu%2520and%2520Wei%2520Zhang%2520and%2520Yue%2520Zhou%2520and%2520Ning%2520Liao%2520and%2520Ziyang%2520Gong%2520and%2520Junwei%2520Luo%2520and%2520Zhirui%2520Wang%2520and%2520Yi%2520Yu%2520and%2520Xue%2520Yang%26entry.1292438233%3DThe%2520growing%2520demand%2520for%2520oriented%2520object%2520detection%2520%2528OOD%2529%2520across%2520various%2520domains%2520has%2520driven%2520significant%2520research%2520in%2520this%2520area.%2520However%252C%2520the%2520high%2520cost%2520of%2520dataset%2520annotation%2520remains%2520a%2520major%2520concern.%2520Current%2520mainstream%2520OOD%2520algorithms%2520can%2520be%2520mainly%2520categorized%2520into%2520three%2520types%253A%2520%25281%2529%2520fully%2520supervised%2520methods%2520using%2520complete%2520oriente {"title": "Expectation and Acoustic Neural Network Representations Enhance Music Identification from Brain Activity", "author": "Shogo Noguchi and Taketo Akama and Tai Nakamura and Shun Minamikawa and Natalia Polouliakh", "abstract": "During music listening, cortical activity encodes both acoustic and expectation-related information. Prior work has shown that ANN representations resemble cortical representations and can serve as supervisory signals for EEG recognition. Here we show that distinguishing acoustic and expectation-related ANN representations as teacher targets improves EEG-based music identification. Models pretrained to predict either representation outperform non-pretrained baselines, and combining them yields complementary gains that exceed strong seed ensembles formed by varying random initializations. These findings show that teacher representation type shapes downstream performance and that representation learning can be guided by neural encoding. This work points toward advances in predictive music cognition and neural decoding. Our expectation representation, computed directly from raw signals without manual labels, reflects predictive structure beyond onset or pitch, enabling investigation of multilayer predictive encoding across diverse stimuli. Its scalability to large, diverse datasets further suggests potential for developing general-purpose EEG models grounded in cortical encoding principles.", "link": "http://arxiv.org/abs/2603.03190v1", "date": "2026-03-03", "relevancy": 2.2455, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4715}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4458}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.43}], "

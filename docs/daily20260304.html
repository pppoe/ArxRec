{"title": "VIRGi: View-dependent Instant Recoloring of 3D Gaussians Splats", "author": "Alessio Mazzucchelli and Ivan Ojeda-Martin and Fernando Rivas-Manzaneque and Elena Garces and Adrian Penate-Sanchez and Francesc Moreno-Noguer", "abstract": "3D Gaussian Splatting (3DGS) has recently transformed the fields of novel view synthesis and 3D reconstruction due to its ability to accurately model complex 3D scenes and its unprecedented rendering performance. However, a significant challenge persists: the absence of an efficient and photorealistic method for editing the appearance of the scene's content. In this paper we introduce VIRGi, a novel approach for rapidly editing the color of scenes modeled by 3DGS while preserving view-dependent effects such as specular highlights. Key to our method are a novel architecture that separates color into diffuse and view-dependent components, and a multi-view training strategy that integrates image patches from multiple viewpoints. Improving over the conventional single-view batch training, our 3DGS representation provides more accurate reconstruction and serves as a solid representation for the recoloring task. For 3DGS recoloring, we then introduce a rapid scheme requiring only one manually edited image of the scene from the end-user. By fine-tuning the weights of a single MLP, alongside a module for single-shot segmentation of the editable area, the color edits are seamlessly propagated to the entire scene in just two seconds, facilitating real-time interaction and providing control over the strength of the view-dependent effects. An exhaustive validation on diverse datasets demonstrates significant quantitative and qualitative advancements over competitors based on Neural Radiance Fields representations.", "link": "http://arxiv.org/abs/2603.02986v1", "date": "2026-03-03", "relevancy": 3.3303, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6878}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.6696}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6408}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VIRGi%3A%20View-dependent%20Instant%20Recoloring%20of%203D%20Gaussians%20Splats&body=Title%3A%20VIRGi%3A%20View-dependent%20Instant%20Recoloring%20of%203D%20Gaussians%20Splats%0AAuthor%3A%20Alessio%20Mazzucchelli%20and%20Ivan%20Ojeda-Martin%20and%20Fernando%20Rivas-Manzaneque%20and%20Elena%20Garces%20and%20Adrian%20Penate-Sanchez%20and%20Francesc%20Moreno-Noguer%0AAbstract%3A%203D%20Gaussian%20Splatting%20%283DGS%29%20has%20recently%20transformed%20the%20fields%20of%20novel%20view%20synthesis%20and%203D%20reconstruction%20due%20to%20its%20ability%20to%20accurately%20model%20complex%203D%20scenes%20and%20its%20unprecedented%20rendering%20performance.%20However%2C%20a%20significant%20challenge%20persists%3A%20the%20absence%20of%20an%20efficient%20and%20photorealistic%20method%20for%20editing%20the%20appearance%20of%20the%20scene%27s%20content.%20In%20this%20paper%20we%20introduce%20VIRGi%2C%20a%20novel%20approach%20for%20rapidly%20editing%20the%20color%20of%20scenes%20modeled%20by%203DGS%20while%20preserving%20view-dependent%20effects%20such%20as%20specular%20highlights.%20Key%20to%20our%20method%20are%20a%20novel%20architecture%20that%20separates%20color%20into%20diffuse%20and%20view-dependent%20components%2C%20and%20a%20multi-view%20training%20strategy%20that%20integrates%20image%20patches%20from%20multiple%20viewpoints.%20Improving%20over%20the%20conventional%20single-view%20batch%20training%2C%20our%203DGS%20representation%20provides%20more%20accurate%20reconstruction%20and%20serves%20as%20a%20solid%20representation%20for%20the%20recoloring%20task.%20For%203DGS%20recoloring%2C%20we%20then%20introduce%20a%20rapid%20scheme%20requiring%20only%20one%20manually%20edited%20image%20of%20the%20scene%20from%20the%20end-user.%20By%20fine-tuning%20the%20weights%20of%20a%20single%20MLP%2C%20alongside%20a%20module%20for%20single-shot%20segmentation%20of%20the%20editable%20area%2C%20the%20color%20edits%20are%20seamlessly%20propagated%20to%20the%20entire%20scene%20in%20just%20two%20seconds%2C%20facilitating%20real-time%20interaction%20and%20providing%20control%20over%20the%20strength%20of%20the%20view-dependent%20effects.%20An%20exhaustive%20validation%20on%20diverse%20datasets%20demonstrates%20significant%20quantitative%20and%20qualitative%20advancements%20over%20competitors%20based%20on%20Neural%20Radiance%20Fields%20representations.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02986v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVIRGi%253A%2520View-dependent%2520Instant%2520Recoloring%2520of%25203D%2520Gaussians%2520Splats%26entry.906535625%3DAlessio%2520Mazzucchelli%2520and%2520Ivan%2520Ojeda-Martin%2520and%2520Fernando%2520Rivas-Manzaneque%2520and%2520Elena%2520Garces%2520and%2520Adrian%2520Penate-Sanchez%2520and%2520Francesc%2520Moreno-Noguer%26entry.1292438233%3D3D%2520Gaussian%2520Splatting%2520%25283DGS%2529%2520has%2520recently%2520transformed%2520the%2520fields%2520of%2520novel%2520view%2520synthesis%2520and%25203D%2520reconstruction%2520due%2520to%2520its%2520ability%2520to%2520accurately%2520model%2520complex%25203D%2520scenes%2520and%2520its%2520unprecedented%2520rendering%2520performance.%2520However%252C%2520a%2520significant%2520challenge%2520persists%253A%2520the%2520absence%2520of%2520an%2520efficient%2520and%2520photorealistic%2520method%2520for%2520editing%2520the%2520appearance%2520of%2520the%2520scene%2527s%2520content.%2520In%2520this%2520paper%2520we%2520introduce%2520VIRGi%252C%2520a%2520novel%2520approach%2520for%2520rapidly%2520editing%2520the%2520color%2520of%2520scenes%2520modeled%2520by%25203DGS%2520while%2520preserving%2520view-dependent%2520effects%2520such%2520as%2520specular%2520highlights.%2520Key%2520to%2520our%2520method%2520are%2520a%2520novel%2520architecture%2520that%2520separates%2520color%2520into%2520diffuse%2520and%2520view-dependent%2520components%252C%2520and%2520a%2520multi-view%2520training%2520strategy%2520that%2520integrates%2520image%2520patches%2520from%2520multiple%2520viewpoints.%2520Improving%2520over%2520the%2520conventional%2520single-view%2520batch%2520training%252C%2520our%25203DGS%2520representation%2520provides%2520more%2520accurate%2520reconstruction%2520and%2520serves%2520as%2520a%2520solid%2520representation%2520for%2520the%2520recoloring%2520task.%2520For%25203DGS%2520recoloring%252C%2520we%2520then%2520introduce%2520a%2520rapid%2520scheme%2520requiring%2520only%2520one%2520manually%2520edited%2520image%2520of%2520the%2520scene%2520from%2520the%2520end-user.%2520By%2520fine-tuning%2520the%2520weights%2520of%2520a%2520single%2520MLP%252C%2520alongside%2520a%2520module%2520for%2520single-shot%2520segmentation%2520of%2520the%2520editable%2520area%252C%2520the%2520color%2520edits%2520are%2520seamlessly%2520propagated%2520to%2520the%2520entire%2520scene%2520in%2520just%2520two%2520seconds%252C%2520facilitating%2520real-time%2520interaction%2520and%2520providing%2520control%2520over%2520the%2520strength%2520of%2520the%2520view-dependent%2520effects.%2520An%2520exhaustive%2520validation%2520on%2520diverse%2520datasets%2520demonstrates%2520significant%2520quantitative%2520and%2520qualitative%2520advancements%2520over%2520competitors%2520based%2520on%2520Neural%2520Radiance%2520Fields%2520representations.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.02986v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=VIRGi%3A%20View-dependent%20Instant%20Recoloring%20of%203D%2 {"title": "Multimodal-Prior-Guided Importance Sampling for Hierarchical Gaussian Splatting in Sparse-View Novel View Synthesis", "author": "Kaiqiang Xiong and Zhanke Wang and Ronggang Wang", "abstract": "We present multimodal-prior-guided importance sampling as the central mechanism for hierarchical 3D Gaussian Splatting (3DGS) in sparse-view novel view synthesis. Our sampler fuses complementary cues { -- } photometric rendering residuals, semantic priors, and geometric priors { -- } to produce a robust, local recoverability estimate that directly drives where to inject fine Gaussians. Built around this sampling core, our framework comprises (1) a coarse-to-fine Gaussian representation that encodes global shape with a stable coarse layer and selectively adds fine primitives where the multimodal metric indicates recoverable detail; and (2) a geometric-aware sampling and retention policy that concentrates refinement on geometrically critical and complex regions while protecting newly added primitives in underconstrained areas from premature pruning. By prioritizing regions supported by consistent multimodal evidence rather than raw residuals alone, our method alleviates overfitting texture-induced errors and suppresses noise from pose/appearance inconsistencies. Experiments on diverse sparse-view benchmarks demonstrate state-of-the-art reconstructions, with up to +0.3 dB PSNR on DTU.", "link": "http://arxiv.org/abs/2603.02866v1", "date": "2026-03-03", "relevancy": 3.2747, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6666}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6524}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6458}], "mailto": "ma {"title": "Beyond Language Modeling: An Exploration of Multimodal Pretraining", "author": "Shengbang Tong and David Fan and John Nguyen and Ellis Brown and Gaoyue Zhou and Shengyi Qian and Boyang Zheng and Th\u00e9ophane Vallaeys and Junlin Han and Rob Fergus and Naila Murray and Marjan Ghazvininejad and Mike Lewis and Nicolas Ballas and Amir Bar and Michael Rabbat and Jakob Verbeek and Luke Zettlemoyer and Koustuv Sinha and Yann LeCun and Saining Xie", "abstract": "The visual world offers a critical axis for advancing foundation models beyond language. Despite growing interest in this direction, the design space for native multimodal models remains opaque. We provide empirical clarity through controlled, from-scratch pretraining experiments, isolating the factors that govern multimodal pretraining without interference from language pretraining. We adopt the Transfusion framework, using next-token prediction for language and diffusion for vision, to train on diverse data including text, video, image-text pairs, and even action-conditioned video. Our experiments yield four key insights: (i) Representation Autoencoder (RAE) provides an optimal unified visual representation by excelling at both visual understanding and generation; (ii) visual and language data are complementary and yield synergy for downstream capabilities; (iii) unified multimodal pretraining leads naturally to world modeling, with capabilities emerging from general training; and (iv) Mixture-of-Experts (MoE) enables efficient and effective multimodal scaling while naturally inducing modality specialization. Through IsoFLOP analysis, we compute scaling laws for both modalities and uncover a scaling asymmetry: vision is significantly more data-hungry than language. We demonstrate that the MoE architecture harmonizes this scaling asymmetry by providing the high model capacity required by language while accommodating the data-intensive nature of vision, paving the way for truly unified multimodal models.", "link": "http://arxiv.org/abs/2603.03276v1", "date": "2026-03-03", "relevancy": 3.1524, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6311}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6311}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6292}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Language%20Modeling%3A%20An%20Exploration%20of%20Multimodal%20Pretraining&body=Title%3A%20Beyond%20Language%20Modeling%3A%20An%20Exploration%20of%20Multimodal%20Pretraining%0AAuthor%3A%20Shengbang%20Tong%20and%20David%20Fan%20and%20John%20Nguyen%20and%20Ellis%20Brown%20and%20Gaoyue%20Zhou%20and%20Shengyi%20Qian%20and%20Boyang%20Zheng%20and%20Th%C3%A9ophane%20Vallaeys%20and%20Junlin%20Han%20and%20Rob%20Fergus%20and%20Naila%20Murray%20and%20Marjan%20Ghazvininejad%20and%20Mike%20Lewis%20and%20Nicolas%20Ballas%20and%20Amir%20Bar%20and%20Michael%20Rabbat%20and%20Jakob%20Verbeek%20and%20Luke%20Zettlemoyer%20and%20Koustuv%20Sinha%20and%20Yann%20LeCun%20and%20Saining%20Xie%0AAbstract%3A%20The%20visual%20world%20offers%20a%20critical%20axis%20for%20advancing%20foundation%20models%20beyond%20language.%20Despite%20growing%20interest%20in%20this%20direction%2C%20the%20design%20space%20for%20native%20multimodal%20models%20remains%20opaque.%20We%20provide%20empirical%20clarity%20through%20controlled%2C%20from-scratch%20pretraining%20experiments%2C%20isolating%20the%20factors%20that%20govern%20multimodal%20pretraining%20without%20interference%20from%20language%20pretraining.%20We%20adopt%20the%20Transfusion%20framework%2C%20using%20next-token%20prediction%20for%20language%20and%20diffusion%20for%20vision%2C%20to%20train%20on%20diverse%20data%20including%20text%2C%20video%2C%20image-text%20pairs%2C%20and%20even%20action-conditioned%20video.%20Our%20experiments%20yield%20four%20key%20insights%3A%20%28i%29%20Representation%20Autoencoder%20%28RAE%29%20provides%20an%20optimal%20unified%20visual%20representation%20by%20excelling%20at%20both%20visual%20understanding%20and%20generation%3B%20%28ii%29%20visual%20and%20language%20data%20are%20complementary%20and%20yield%20synergy%20for%20downstream%20capabilities%3B%20%28iii%29%20unified%20multimodal%20pretraining%20leads%20naturally%20to%20world%20modeling%2C%20with%20capabilities%20emerging%20from%20general%20training%3B%20and%20%28iv%29%20Mixture-of-Experts%20%28MoE%29%20enables%20efficient%20and%20effective%20multimodal%20scaling%20while%20naturally%20inducing%20modality%20specialization.%20Through%20IsoFLOP%20analysis%2C%20we%20compute%20scaling%20laws%20for%20both%20modalities%20and%20uncover%20a%20scaling%20asymmetry%3A%20vision%20is%20significantly%20more%20data-hungry%20than%20language.%20We%20demonstrate%20that%20the%20MoE%20architecture%20harmonizes%20this%20scaling%20asymmetry%20by%20providing%20the%20high%20model%20capacity%20required%20by%20language%20while%20accommodating%20the%20data-intensive%20nature%20of%20vision%2C%20paving%20the%20way%20for%20truly%20unified%20multimodal%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03276v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520Language%2520Modeling%253A%2520An%2520Exploration%2520of%2520Multimodal%2520Pretraining%26entry.906535625%3DShengbang%2520Tong%2520and%2520David%2520Fan%2520and%2520John%2520Nguyen%2520and%2520Ellis%2520Brown%2520and%2520Gaoyue%2520Zhou%2520and%2520Shengyi%2520Qian%2520and%2520Boyang%2520Zheng%2520and%2520Th%25C3%25A9ophane%2520Vallaeys%2520and%2520Junlin%2520Han%2520and%2520Rob%2520Fergus%2520and%2520Naila%2520Murray%2520and%2520Marjan%2520Ghazvininejad%2520and%2520Mike%2520Le .%20We%20adopt%20the%20Transfusion%20framework%2C%20using%20next-token%20prediction%20for%20language%20and%20diffusion%20for%20vision%2C%20to%20train%20on%20diverse%20data%20including%20text%2C%20video%2C%20image-text%20pairs%2C%20and%20even%20action-conditioned%20video.%20Our%20experiments%20yield%20four%20key%20insights%3A%20%28i%29%20Representation%20Autoencoder%20%28RAE%29%20provides%20an%20optimal%20unified%20visual%20representation%20by%20excelling%20at%20both%20visual%20understanding%20and%20generation%3B%20%28ii%29%20visual%20and%20language%20data%20are%20complementary%20and%20yield%20synergy%20for%20downstream%20capabilities%3B%20%28iii%29%20unified%20multimodal%20pretraining%20leads%20naturally%20to%20world%20modeling%2C%20with%20capabilities%20emerging%20from%20general%20training%3B%20and%20%28iv%29%20Mixture-of-Experts%20%28MoE%29%20enables%20efficient%20and%20effective%20multimodal%20scaling%20while%20naturally%20inducing%20modality%20specialization.%20Through%20IsoFLOP%20analysis%2C%20we%20compute%20scaling%20laws%20for%20both%20modalities%20and%20uncover%20a%20scaling%20asymmetry%3A%20vision%20is%20significantly%20more%20data-hungry%20than%20language.%20We%20demonstrate%20that%20the%20MoE%20architecture%20harmonizes%20this%20scaling%20asymmetry%20by%20providing%20the%20high%20model%20capacity%20required%20by%20language%20while%20accommodating%20the%20data-intensive%20nature%20of%20vision%2C%20paving%20the%20way%20for%20truly%20unified%20multimodal%20models.&entry.1838667208=http%3A//arxiv.org/abs/2603.03276v1&entry.124074799=Read"},
{"title": "3D-DRES: Detailed 3D Referring Expression Segmentation", "author": "Qi Chen and Changli Wu and Jiayi Ji and Yiwei Ma and Liujuan Cao", "abstract": "Current 3D visual grounding tasks only process sentence level detection or segmentation, which critically fails to leverage the rich compositional contextual reasonings within natural language expressions. To address this challenge, we introduce Detailed 3D Referring Expression Segmentation (3D-DRES), a new task that provides a phrase to 3D instance mapping, aiming at enhancing fine-grained 3D vision language understanding. To support 3D-DRES, we present DetailRefer, a new dataset comprising 54,432 descriptions spanning 11,054 distinct objects. Unlike previous datasets, DetailRefer implements a pioneering phrase-instance annotation paradigm where each referenced noun phrase is explicitly mapped to its corresponding 3D elements. Additionally, we introduce DetailBase, a purposefully streamlined yet effective baseline architecture that supports dual-mode segmentation at both sentence and phrase levels. Our experimental results demonstrate that models trained on DetailRefer not only excel at phrase-level segmentation but also show surprising improvements on traditional 3D-RES benchmarks.", "link": "http://arxiv.org/abs/2603.02896v1", "date": "2026-03-03", "relevancy": 3.0927, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6463}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6463}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.563}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%203D-DRES%3A%20Detailed%203D%20Referring%20Expression%20Segmentation&body=Title%3A%203D-DRES%3A%20Detailed%203D%20Referring%20Expression%20Segmentation%0AAuthor%3A%20Qi%20Chen%20and%20Changli%20Wu%20and%20Jiayi%20Ji%20and%20Yiwei%20Ma%20and%20Liujuan%20Cao%0AAbstract%3A%20Current%203D%20visual%20grounding%20tasks%20only%20process%20sentence%20level%20detection%20or%20segmentation%2C%20which%20critically%20fails%20to%20leverage%20the%20rich%20compositional%20contextual%20reasonings%20within%20natural%20language%20expressions.%20To%20address%20this%20challenge%2C%20we%20introduce%20Detailed%203D%20Referring%20Expression%20Segmentation%20%283D-DRES%29%2C%20a%20new%20task%20that%20provides%20a%20phrase%20to%203D%20instance%20mapping%2C%20aiming%20at%20enhancing%20fine-grained%203D%20vision%20language%20understanding.%20To%20support%203D-DRES%2C%20we%20present%20DetailRefer%2C%20a%20new%20dataset%20comprising%2054%2C432%20descriptions%20spanning%2011%2C054%20distinct%20objects.%20Unlike%20previous%20datasets%2C%20DetailRefer%20implements%20a%20pioneering%20phrase-instance%20annotation%20paradigm%20where%20each%20referenced%20noun%20phrase%20is%20explicitly%20mapped%20to%20its%20corresponding%203D%20elements.%20Additionally%2C%20we%20introduce%20DetailBase%2C%20a%20purposefully%20streamlined%20yet%20effective%20baseline%20architecture%20that%20supports%20dual-mode%20segmentation%20at%20both%20sentence%20and%20phrase%20levels.%20Our%20experimental%20results%20demonstrate%20that%20models%20trained%20on%20DetailRefer%20not%20only%20excel%20at%20phrase-level%20segmentation%20but%20also%20show%20surprising%20improvements%20on%20traditional%203D-RES%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02896v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D3D-DRES%253A%2520Detailed%25203D%2520Referring%2520Expression%2520Segmentation%26entry.906535625%3DQi%2520Chen%2520and%2520Changli%2520Wu%2520and%2520Jiayi%2520Ji%2520and%2520Yiwei%2520Ma%2520and%2520Liujuan%2520Cao%26entry.1292438233%3DCur 5625=Qi%20Chen%20and%20Changli%20Wu%20and%20Jiayi%20Ji%20and%20Yiwei%20Ma%20and%20Liujuan%20Cao&entry.1292438233=Current%203D%20visual%20grounding%20tasks%20only%20process%20sentence%20level%20detection%20or%20segmentation%2C%20which%20critically%20fails%20to%20leverage%20the%20rich%20compositional%20contextual%20reasonings%20within%20natural%20language%20expressions.%20To%20address%20this%20challenge%2C%20we%20introduce%20Detailed%203D%20Referring%20Expression%20Segmentation%20%283D-DRES%29%2C%20a%20new%20task%20that%20provides%20a%20phrase%20to%203D%20instance%20mapping%2C%20aiming%20at%20enhancing%20fine-grained%203D%20vision%20language%20understanding.%20To%20support%203D-DRES%2C%20we%20present%20DetailRefer%2C%20a%20new%20dataset%20comprising%2054%2C432%20descriptions%20spanning%2011%2C054%20distinct%20objects.%20Unlike%20previous%20datasets%2C%20DetailRefer%20implements%20a%20pioneering%20phrase-instance%20annotation%20paradigm%20where%20each%20referenced%20noun%20phrase%20is%20explicitly%20mapped%20to%20its%20corresponding%203D%20elements.%20Additionally%2C%20we%20introduce%20DetailBase%2C%20a%20purposefully%20streamlined%20yet%20effective%20baseline%20architecture%20that%20supports%20dual-mode%20segmentation%20at%20both%20sentence%20and%20phrase%20levels.%20Our%20experimental%20results%20demonstrate%20that%20models%20trained%20on%20DetailRefer%20not%20only%20excel%20at%20phrase-level%20segmentation%20but%20also%20show%20surprising%20improvements%20on%20traditional%203D-RES%20benchmarks.&entry.1838667208=http%3A//arxiv.org/abs/2603.02896v1&entry.124074799=Read"},
{"title": "Articulation in Motion: Prior-free Part Mobility Analysis for Articulated Objects By Dynamic-Static Disentanglement", "author": "Hao Ai and Wenjie Chang and Jianbo Jiao and Ales Leonardis and Ofek Eyal", "abstract": "Articulated objects are ubiquitous in daily life. Our goal is to achieve a high-quality reconstruction, segmentation of independent moving parts, and analysis of articulation. Recent methods analyse two different articulation states and perform per-point part segmentation, optimising per-part articulation using cross-state correspondences, given a priori knowledge of the number of parts. Such assumptions greatly limit their applications and performance. Their robustness is reduced when objects cannot be clearly visible in both states. To address these issues, in this paper, we present a new framework, Articulation in Motion (AiM). We infer part-level decomposition, articulation kinematics, and reconstruct an interactive 3D digital replica from a user-object interaction video and a start-state scan. We propose a dual-Gaussian scene representation that is learned from an initial 3DGS scan of the object and a video that shows the movement of separate parts. It uses motion cues to segment the object into parts and assign articulation joints. Subsequently, a robust, sequential RANSAC is employed to achieve part mobility analysis without any part-level structural priors, which clusters moving primitives into rigid parts and estimates kinematics while automatically determining the number of parts. The proposed approach separates the object into parts, each represented as a 3D Gaussian set, enabling high-quality rendering. Our approach yields higher quality part segmentation than previous methods, without prior knowledge. Extensive experimental analysis on both simple and complex objects validates the effectiveness and strong generalisation ability of our approach. Project page: https://haoai-1997.github.io/AiM/.", "link": "http://arxiv.org/abs/2603.02910v1", "date": "2026-03-03", "relevancy": 3.0755, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6534}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6277}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5643}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Articulation%20in%20Motion%3A%20Prior-free%20Part%20Mobility%20Analysis%20for%20Articulated%20Objects%20By%20Dynamic-Static%20Disentanglement&body=Title%3A%20Articulation%20in%20Motion%3A%20Prior-free%20Part%20Mobility%20Analysis%20for%20Articulated%20Objects%20By%20Dynamic-Static%20Disentanglement%0AAuthor%3A%20Hao%20Ai%20and%20Wenjie%20Chang%20and%20Jianbo%20Jiao%20and%20Ales%20Leonardis%20and%20Ofek%20Eyal%0AAbstract%3A%20Articulated%20objects%20are%20ubiquitous%20in%20daily%20life.%20Our%20goal%20is%20to%20achieve%20a%20high-quality%20reconstruction%2C%20segmentation%20of%20independent%20moving%20parts%2C%20and%20analysis%20of%20articulation.%20Recent%20methods%20analyse%20two%20different%20articulation%20states%20and%20perform%20per-point%20part%20segmentation%2C%20optimising%20per-part%20articulation%20using%20cross-state%20correspondences%2C%20given%20a%20priori%20knowledge%20of%20the%20number%20of%20parts.%20Such%20assumptions%20greatly%20limit%20their%20applications%20and%20performance.%20Their%20robustness%20is%20reduced%20when%20objects%20cannot%20be%20clearly%20visible%20in%20both%20states.%20To%20address%20these%20issues%2C%20in%20this%20paper%2C%20we%20present%20a%20new%20framework%2C%20Articulation%20in%20Motion%20%28AiM%29.%20We%20infer%20part-level%20decomposition%2C%20articulation%20kinematics%2C%20and%20reconstruct%20an%20interactive%203D%20digital%20replica%20from%20a%20user-object%20interaction%20video%20and%20a%20start-state%20scan.%20We%20propose%20a%20dual-Gaussian%20scene%20representation%20that%20is%20learned%20from%20an%20initial%203DGS%20scan%20of%20the%20object%20and%20a%20video%20that%20shows%20the%20movement%20of%20separate%20parts.%20It%20uses%20motion%20cues%20to%20segment%20the%20object%20into%20parts%20and%20assign%20articulation%20joints.%20Subsequently%2C%20a%20robust%2C%20sequential%20RANSAC%20is%20employed%20to%20achieve%20part%20mobility%20analysis%20without%20any%20part-level%20structural%20priors%2C%20which%20clusters%20moving%20primitives%20into%20rigid%20parts%20and%20estimates%20kinematics%20while%20automatically%20determining%20the%20number%20of%20parts.%20The%20proposed%20approach%20separates%20the%20object%20into%20parts%2C%20each%20represented%20as%20a%203D%20Gaussian%20set%2C%20enabling%20high-quality%20rendering.%20Our%20approach%20yields%20higher%20quality%20part%20segmentation%20than%20previous%20methods%2C%20without%20prior%20knowledge.%20Extensive%20experimental%20analysis%20on%20both%20simple%20and%20complex%20objects%20validates%20the%20effectiveness%20and%20strong%20generalisation%20ability%20of%20our%20approach.%20Project%20page%3A%20https%3A//haoai-1997.github.io/AiM/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02910v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DArticulation%2520in%2520Motion%253A%2520Prior-free%2520Part%2520Mobility%2520Analysis%2520for%2520Articulated%2520Objects%2520By%2520Dynamic-Static%2520Disentanglement%26entry.906535625%3DHao%2520Ai%2520and%2520Wenjie%2520Chang%2520and%2520Jianbo%2520Jiao%2520and%2520Ales%2520Leonardis%2520and%2520Ofek%2520Eyal%26entry.1292438233%3DArticulated%2520objects%2520are%2520ubiquitous%2520in%2520daily%2520life.%2520Our%2520goal%2520is%2520to%2520achieve%2520a%2520high-quality%2520reconstruction%252C%2520segmentation%2520of%2520independent%2520moving%2520parts%252C%25 {"title": "TTT3R: 3D Reconstruction as Test-Time Training", "author": "Xingyu Chen and Yue Chen and Yuliang Xiu and Andreas Geiger and Anpei Chen", "abstract": "Modern Recurrent Neural Networks have become a competitive architecture for 3D reconstruction due to their linear-time complexity. However, their performance degrades significantly when applied beyond the training context length, revealing limited length generalization. In this work, we revisit the 3D reconstruction foundation models from a Test-Time Training perspective, framing their designs as an online learning problem. Building on this perspective, we leverage the alignment confidence between the memory state and incoming observations to derive a closed-form learning rate for memory updates, to balance between retaining historical information and adapting to new observations. This training-free intervention, termed TTT3R, substantially improves length generalization, achieving a $2\\times$ improvement in global pose estimation over baselines, while operating at 20 FPS with just 6 GB of GPU memory to process thousands of images. Code is available in https://rover-xingyu.github.io/TTT3R", "link": "http://arxiv.org/abs/2509.26645v4", "date": "2026-03-03", "relevancy": 3.0559, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6385}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6012}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5939}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TTT3R%3A%203D%20Reconstruction%20as%20Test-Time%20Training&body=Title%3A%20TTT3R%3A%203D%20Reconstruction%20as%20Test-Time%20Training%0AAuthor%3A%20Xingyu%20Chen%20and%20Yue%20Chen%20and%20Yuliang%20Xiu%20and%20Andreas%20Geiger%20and%20Anpei%20Chen%0AAbstract%3A%20Modern%20Recurrent%20Neural%20Networks%20have%20become%20a%20competitive%20architecture%20for%203D%20reconstruction%20due%20to%20their%20linear-time%20complexity.%20However%2C%20their%20performance%20degrades%20significantly%20when%20applied%20beyond%20the%20training%20context%20length%2C%20revealing%20limited%20length%20generalization.%20In%20this%20work%2C%20we%20revisit%20the%203D%20reconstruction%20foundation%20models%20from%20a%20Test-Time%20Training%20perspective%2C%20framing%20their%20designs%20as%20an%20online%20learning%20problem.%20Building%20on%20this%20perspective%2C%20we%20leverage%20the%20alignment%20confidence%20between%20the%20memory%20state%20and%20incoming%20observations%20to%20derive%20a%20closed-form%20learning%20rate%20for%20memory%20updates%2C%20to%20balance%20between%20retaining%20historical%20information%20and%20adapting%20to%20new%20observations.%20This%20training-free%20intervention%2C%20termed%20TTT3R%2C%20substantially%20improves%20length%20generalization%2C%20achieving%20a%20%242%5Ctimes%24%20improvement%20in%20global%20pose%20estimation%20over%20baselines%2C%20while%20operating%20at%2020%20FPS%20with%20just%206%20GB%20of%20GPU%20memory%20to%20process%20thousands%20of%20images.%20Code%20is%20available%20in%20https%3A//rover-xingyu.github.io/TTT3R%0ALink%3A%20http%3A//arxiv.org/abs/2509.26645v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTTT3R%253A%25203D%2520Reconstruction%2520as%2520Test-Time%2520Training%26entry.906535625%3DXingyu%2520Chen%2520and%2520Yue%2520Chen%2520and%2520Yuliang%2520Xiu%2520and%2520Andreas%2520Geiger%2520and%2520Anpei%2520Chen%26entry.1292438233%3DModern%2520Recurrent%2520Neural%2520Networks%2520have%2520become%2520a%2520competitive%2520architecture%2520for%25203D%2520reconstruction%2520due%2520to%2520their%2520linear-time%2520complexity.%2520 {"title": "Generalized non-exponential Gaussian splatting", "author": "S\u00e9bastien Speierer and Adrian Jarabo", "abstract": "In this work we generalize 3D Gaussian splatting (3DGS) to a wider family of physically-based alpha-blending operators. 3DGS has become the standard de-facto for radiance field rendering and reconstruction, given its flexibility and efficiency. At its core, it is based on alpha-blending sorted semitransparent primitives, which in the limit converges to the classic radiative transfer function with exponential transmittance. Inspired by recent research on non-exponential radiative transfer, we generalize the image formation model of 3DGS to non-exponential regimes. Based on this generalization, we use a quadratic transmittance to define sub-linear, linear, and super-linear versions of 3DGS, which exhibit faster-than-exponential decay. We demonstrate that these new non-exponential variants achieve similar quality than the original 3DGS but significantly reduce the number of overdraws, which result on speed-ups of up to $4\\times$ in complex real-world captures, on a ray-tracing-based renderer.", "link": "http://arxiv.org/abs/2603.02887v1", "date": "2026-03-03", "relevancy": 3.0188, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6448}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5849}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5816}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generalized%20non-exponential%20Gaussian%20splatting&body=Title%3A%20Generalized%20non-exponential%20Gaussian%20splatting%0AAuthor%3A%20S%C3%A9bastien%20Speierer%20and%20Adrian%20Jarabo%0AAbstract%3A%20In%20this%20work%20we%20generalize%203D%20 {"title": "UniG2U-Bench: Do Unified Models Advance Multimodal Understanding?", "author": "Zimo Wen and Boxiu Li and Wanbo Zhang and Junxiang Lei and Xiaoyu Chen and Yijia Fan and Qi Zhang and Yujiang Wang and Lili Qiu and Bo Li and Ziwei Liu and Caihua Shan and Yifan Yang and Yifei Shen", "abstract": "Unified multimodal models have recently demonstrated strong generative capabilities, yet whether and when generation improves understanding remains unclear. Existing benchmarks lack a systematic exploration of the specific tasks where generation facilitates understanding. To this end, we introduce UniG2U-Bench, a comprehensive benchmark categorizing generation-to-understanding (G2U) evaluation into 7 regimes and 30 subtasks, requiring varying degrees of implicit or explicit visual transformations. Extensive evaluation of over 30 models reveals three core findings: 1) Unified models generally underperform their base Vision-Language Models (VLMs), and Generate-then-Answer (GtA) inference typically degrades performance relative to direct inference. 2) Consistent enhancements emerge in spatial intelligence, visual illusions, or multi-round reasoning subtasks, where enhanced spatial and shape perception, as well as multi-step intermediate image states, prove beneficial. 3) Tasks with similar reasoning structures and models sharing architectures exhibit correlated behaviors, suggesting that generation-understanding coupling induces class-consistent inductive biases over tasks, pretraining data, and model architectures. These findings highlight the necessity for more diverse training data and novel paradigms to fully unlock the potential of unified multimodal modeling.", "link": "http://arxiv.org/abs/2603.03241v1", "date": "2026-03-03", "relevancy": 2.9714, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6032}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link {"title": "Any Resolution Any Geometry: From Multi-View To Multi-Patch", "author": "Wenqing Cui and Zhenyu Li and Mykola Lavreniuk and Jian Shi and Ramzi Idoughi and Xiangjun Tang and Peter Wonka", "abstract": "Joint estimation of surface normals and depth is essential for holistic 3D scene understanding, yet high-resolution prediction remains difficult due to the trade-off between preserving fine local detail and maintaining global consistency. To address this challenge, we propose the Ultra Resolution Geometry Transformer (URGT), which adapts the Visual Geometry Grounded Transformer (VGGT) into a unified multi-patch transformer for monocular high-resolution depth--normal estimation. A single high-resolution image is partitioned into patches that are augmented with coarse depth and normal priors from pre-trained models, and jointly processed in a single forward pass to predict refined geometric outputs. Global coherence is enforced through cross-patch attention, which enables long-range geometric reasoning and seamless propagation of information across patches within a shared backbone. To further enhance spatial robustness, we introduce a GridMix patch sampling strategy that probabilistically samples grid configurations during training, improving inter-patch consistency and generalization. Our method achieves state-of-the-art results on UnrealStereo4K, jointly improving depth and normal estimation, reducing AbsRel from 0.0582 to 0.0291, RMSE from 2.17 to 1.31, and lowering mean angular error from 23.36 degrees to 18.51 degrees, while producing sharper and more stable geometry. The proposed multi-patch framework also demonstrates strong zero-shot and cross-domain generalization and scales effectively to very high resolutions, offering an efficient and extensible solution for high-quality geometry refinement.", "link": "http://arxiv.org/abs/2603.03026v1", "date": "2026-03-03", "relevancy": 2.9533, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5921}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5916}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5883}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Any%20Resolution%20Any%20Geometry%3A%20From%20Multi-View%20To%20Multi-Patch&body=Title%3A%20Any%20Resolution%20Any%20Geometry%3A%20From%20Multi-View%20To%20Multi-Patch%0AAuthor%3A%20Wenqing%20Cui%20and%20Zhenyu%20Li%20and%20Mykola%20Lavreniuk%20and%20Jian%20Shi%20and%20Ramzi%20Idoughi%20and%20Xiangjun%20Tang%20and%20Peter%20Wonka%0AAbstract%3A%20Joint%20estimation%20of%20surface%20normals%20and%20depth%20is%20essential%20for%20holistic%203D%20scene%20understanding%2C%20yet%20high-resolution%20prediction%20remains%20difficult%20due%20to%20the%20trade-off%20between%20preserving%20fine%20local%20detail%20and%20maintaining%20global%20consistency.%20To%20address%20this%20challenge%2C%20we%20propose%20the%20Ultra%20Resolution%20Geometry%20Transformer%20%28URGT%29%2C%20which%20adapts%20the%20Visual%20Geometry%20Grounded%20Transformer%20%28VGGT%29%20into%20a%20unified%20multi-patch%20transformer%20for%20monocular%20high-resolution%20depth--normal%20estimation.%20A%20single%20high-resolution%20image%20is%20partitioned%20into%20patches%20that%20are%20augmented%20with%20coarse%20depth%20and%20normal%20priors%20from%20pre-trained%20models%2C%20and%20jointly%20processed%20in%20a%20single%20forward%20pass%20to%20predict%20refined%20geometric%20outputs.%20Global%20coherence%20is%20enforced%20through%20cross-patch%20attention%2C%20which%20enables%20long-range%20geometric%20reasoning%20and%20seamless%20propagation%20of%20information%20across%20patches%20within%20a%20shared%20backbone.%20To%20further%20enhance%20spatial%20robustness%2C%20we%20introduce%20a%20GridMix%20patch%20sampling%20strategy%20that%20probabilistically%20samples%20grid%20configurations%20during%20training%2C%20improving%20inter-patch%20consistency%20and%20generalization.%20Our%20method%20achieves%20state-of-the-art%20results%20on%20UnrealStereo4K%2C%20jointly%20improving%20depth%20and%20normal%20estimation%2C%20reducing%20AbsRel%20from%200.0582%20to%200.0291%2C%20RMSE%20from%202.17%20to%201.31%2C%20and%20lowering%20mean%20angular%20error%20from%2023.36%20degrees%20to%2018.51%20degrees%2C%20while%20producing%20sharper%20and%20more%20stable%20geometry.%20The%20proposed%20multi-patch%20framework%20also%20demonstrates%20strong%20zero-shot%20and%20cross-domain%20generalization%20and%20scales%20effectively%20to%20very%20high%20resolutions%2C%20offering%20an%20efficient%20and%20extensible%20solution%20for%20high-quality%20geometry%20refinement.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03026v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAny%2520Resolution%2520Any%2520Geometry%253A%2520From%2520Multi-View%2520To%2520Multi-Patch%26entry.906535625%3DWenqing%2520Cui%2520and%2520Zhenyu%2520Li%2520and%2520Mykola%2520Lavreniuk%2520and%2520Jian%2520Shi%2520and%2520Ramzi%2520Idoughi%2520and%2520Xiangjun%2520Tang%2520and%2520Peter%2520Wonka%26entry.1292438233%3DJoint%2520estimation%2520of%2520surface%2520normals%2520and%2520depth%2520is%2520essential%2520for%2520holistic%25203D%2520scene%2520understanding%252C%2520yet%2520high-resolution%2520prediction%2520remains%2520difficult%2520due%2520to%2520the%2520trade-off%2520between%2520preserving%2520fine%2520local%2520detail%2520and%2520maintaining%2520global%2520consistency.%2520To%2520address%2520this%2520challenge%252C%2520we%2520propose%2520the%2520Ultra%2520Resolution%2520Geometry%2520Transformer%2520%2528URGT%2529%252C%2520which%2520adapts%2520the%2520Visual%2520Geometry%2 {"title": "Are VLMs Ready for Lane Topology Awareness in Autonomous Driving?", "author": "Xin Chen and Jia He and Maozheng Li and Dongliang Xu and Tianyu Wang and Yixiao Chen and Zhixin Lin and Yue Yao", "abstract": "Vision-Language Models (VLMs) have recently shown remarkable progress in multimodal reasoning, yet their applications in autonomous driving remain limited. In particular, the ability to understand road topology, a key requirement for safe navigation, has received relatively little attention. While some recent works have begun to explore VLMs in driving contexts, their performance on topology reasoning is far from satisfactory. In this work, we systematically evaluate VLMs' capabilities in road topology understanding. Specifically, multi-view images are projected into unified ground-plane coordinate system and fused into bird's-eye-view (BEV) lanes. Based on these BEV lanes, we formulate four topology-related diagnostic VQA tasks, which together capture essential components of spatial topology reasoning. Through extensive evaluation, we find that while frontier closed-source models (e.g., GPT-4o) achieve relatively high accuracy in some tasks, they still fail in some spatial questions that humans can answer (e.g., GPT-4o achieve only 67.8% in vector, a two-class classification problem). Furthermore, we find open-source VLMs, even at 30B scale, struggle significantly. These results indicate that spatial reasoning remains a fundamental bottleneck for current VLMs. We also find that the model's capability is positively correlated with model size, length of reasoning tokens and shots provided as examples, showing direction for future research.", "link": "http://arxiv.org/abs/2509.16654v3", "date": "2026-03-03", "relevancy": 2.9444, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5995}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5995}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5677}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Are%20VLMs%20Ready%20for%20Lane%20Topology%20Awareness%20in%20Autonomous%20Driving%3F&body=Title%3A%20Are%20VLMs%20Ready%20for%20Lane%20Topology%20Awareness%20in%20Autonomous%20Driving%3F%0AAuthor%3A%20Xin%20Chen%20and%20Jia%20He%20and%20Maozheng%20Li%20and%20Dongliang%20Xu%20and%20Tianyu%20Wang%20and%20Yixiao%20Chen%20and%20Zhixin%20Lin%20and%20Yue%20Yao%0AAbstract%3A%20Vision-Language%20Models%20%28VLMs%29%20have%20recently%20shown%20remarkable%20progress%20in%20multimodal%20reasoning%2C%20yet%20their%20applications%20in%20autonomous%20driving%20remain%20limited.%20In%20particular%2C%20the%20ability%20to%20understand%20road%20topology%2C%20a%20key%20requirement%20for%20safe%20navigation%2C%20has%20received%20relatively%20little%20attention.%20While%20some%20recent%20works%20have%20begun%20to%20explore%20VLMs%20in%20driving%20contexts%2C%20their%20performance%20on%20topology%20reasoning%20is%20far%20from%20satisfactory.%20In%20this%20work%2C%20we%20systematically%20evaluate%20VLMs%27%20capabilities%20in%20road%20topology%20understanding.%20Specifically%2C%20multi-view%20images%20are%20projected%20into%20unified%20ground-plane%20coordinate%20system%20and%20fused%20into%20bird%27s-eye-view%20%28BEV%29%20lanes.%20Based%20on%20these%20BEV%20lanes%2C%20we%20formulate%20four%20topology-related%20diagnostic%20VQA%20tasks%2C%20which%20together%20capture%20essential%20components%20of%20spatial%20topology%20reasoning.%20Through%20extensive%20evaluation%2C%20we%20find%20that%20while%20frontier%20closed-source%20models%20%28e.g.%2C%20GPT-4o%29%20achieve%20relatively%20high%20accuracy%20in%20some%20tasks%2C%20they%20still%20fail%20in%20some%20spatial%20questions%20that%20humans%20can%20answer%20%28e.g.%2C%20GPT-4o%20achieve%20only%2067.8%25%20in%20vector%2C%20a%20two-class%20classification%20problem%29.%20Furthermore%2C%20we%20find%20open-source%20VLMs%2C%20even%20at%2030B%20scale%2C%20struggle%20significantly.%20These%20results%20indicate%20that%20spatial%20reasoning%20remains%20a%20fundamental%20bottleneck%20for%20current%20VLMs.%20We%20also%20find%20that%20the%20model%27s%20capability%20is%20positively%20correlated%20with%20model%20size%2C%20length%20of%20reasoning%20tokens%20and%20shots%20provided%20as%20examples%2C%20showing%20direction%20for%20future%20research.%0ALink%3A%20http%3A//arxiv.org/abs/2509.16654v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAre%2520VLMs%2520Ready%2520for%2520Lane%2520Topology%2520Awareness%2520in%2520Autonomous%2520Driving%253F%26entry.906535625%3DXin%2520Chen%2520and%2520Jia%2520He%2520and%2520Maozheng%2520Li%2520and%2520Dongliang%2520Xu%2520and%2520Tianyu%2520Wang%2520and%2520Yixiao%2520Chen%2520and%2520Zhixin%2520Lin%2520and%2520Yue%2520Yao%26entry.1292438233%3DVision-Language%2520Models%2520%2528VLMs%2529%2520have%2520recently%2520shown%2520remarkable%2520progress%2520in%2520multimodal%2520reasoning%252C%2520yet%2520their%2520applications%2520in%2520autonomous%2520driving%2520remain%2520limited.%2520In%2520particular%252C%2520the%2520ability%2520to%2520understand%2520road%2520topology%252C%2520a%2520key%2520requirement%2520for%2520safe%2520navigation%252C%2520has%2520received%2520relatively%2520little%2520attention.%2520While%2520some%2520recent%2520works%2520have%2520begun%2520to%2520explore%2520VLMs%2520in%2520driving%2520contexts%252C%2520their%2520performance%2520on%2520topology%2520reasoning%2520is%2520far%2520from%2520satisfactory.%2520In%2520this%2520work%252C%2520we%2520systematically%2520evaluate%2520VLMs%2527%2520capabilities%2520in%2520road%2520topology%2520understanding.%2520Specifically%252C%2520multi-view%2520images%2520are%2520projected%2520into%2520unified%2520ground-plane%2520coordinate%2520system%2520and%2520fused%2520into%2520bird%2527s-eye-view%2520%2528BEV%2529%2520lanes.%2520Based%2520on%2520these%2520BEV%2520lanes%252C%2520we%2520formulate%2520four%2520topology-related%2520diagnostic%2520VQA%2520tasks%252C%2520which%2520together%2520capture%2520essential%2520components%2520of%2520spatial%2520topology%2520reasoning.%2520Through%2520extensive%2520evaluation%252C%2520we%2520find%2520that%2520while%2520frontier%2520closed-source%2520models%2520%2528e.g.%252C%2520GPT-4o%2529%2520achieve%2520relatively%2520high%2520accuracy%2520in%2520some%2520tasks%252C%2520they%2520still%2520fail%2520in%2520some%2520spatial%2520questions%2520that%2520humans%2520can%2520answer%2520%2528e.g.%252C%2520GPT-4o%2520achieve%2520only%252067.8%2525%2520in%2520vector%252C%2520a%2520two-class%2520classification%2520problem%2529.%2520Furthermore%252C%2520we%2520find%2520open-source%2520VLMs%252C%2520even%2520at%252030B%2520scale%252C%2520struggle%2520significantly.%2520These%2520results%2520indicate%2520that%2520spatial%2520reasoning%2520remains%2520a%2520fundamental%2520bottleneck%2520for%2520current%2520VLMs.%2520We%2520also%2520find%2520that%2520the%2520model%2527s%2520capability%2520is%2520positively%2520correlated%2520with%2520model%2520size%252C%2520length%2520of%2520reasoning%2520tokens%2520and%2520shots%2520provided%2520as%2520examples%252C%2520showing%2520direction%2520for%2520future%2520research.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.16654v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Are%20VLMs%20Ready%20for%20Lane%20Topology%20Awareness%20in%20Autonomous%20Driving%3F&entry.906535625=Xin%20Chen%20and%20Jia%20He%20and%20Maozheng%20Li%20and%20Dongliang%20Xu%20and%20Tianyu%20Wang%20and%20Yixiao%20Chen%20and%20Zhixin%20 {"title": "DMTrack: Spatio-Temporal Multimodal Tracking via Dual-Adapter", "author": "Weihong Li and Shaohua Dong and Haonan Lu and Yanhao Zhang and Heng Fan and Libo Zhang", "abstract": "In this paper, we explore adapter tuning and introduce a novel dual-adapter architecture for spatio-temporal multimodal tracking, dubbed DMTrack. The key of our DMTrack lies in two simple yet effective modules, including a spatio-temporal modality adapter (STMA) and a progressive modality complementary adapter (PMCA) module. The former, applied to each modality alone, aims to adjust spatio-temporal features extracted from a frozen backbone by self-prompting, which to some extent can bridge the gap between different modalities and thus allows better cross-modality fusion. The latter seeks to facilitate cross-modality prompting progressively with two specially designed pixel-wise shallow and deep adapters. The shallow adapter employs shared parameters between the two modalities, aiming to bridge the information flow between the two modality branches, thereby laying the foundation for following modality fusion, while the deep adapter modulates the preliminarily fused information flow with pixel-wise inner-modal attention and further generates modality-aware prompts through pixel-wise inter-modal attention. With such designs, DMTrack achieves promising spatio-temporal multimodal tracking performance with merely 0.93M trainable parameters. Extensive experiments on five benchmarks demonstrate that DMTrack achieves state-of-the-art results. Our code and models will be available at https://github.com/Nightwatch-Fox11/DMTrack.", "link": "http://arxiv.org/abs/2508.01592v2", "date": "2026-03-03", "relevancy": 2.9435, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6511}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": %20%28PMCA%29%20module.%20The%20former%2C%20applied%20to%20each%20modality%20alone%2C%20aims%20to%20adjust%20spatio-temporal%20features%20extracted%20from%20a%20frozen%20backbone%20by%20self-prompting%2C%20which%20to%20some%20extent%20can%20bridge%20the%20gap%20between%20different%20modalities%20and%20thus%20allows%20better%20cross-modality%20fusion.%20The%20latter%20seeks%20to%20facilitate%20cross-modality%20prompting%20progressively%20with%20two%20specially%20designed%20pixel-wise%20shallow%20and%20deep%20adapters.%20The%20shallow%20adapter%20employs%20shared%20parameters%20between%20the%20two%20modalities%2C%20aiming%20to%20bridge%20the%20information%20flow%20between%20the%20two%20modality%20branches%2C%20thereby%20laying%20the%20foundation%20for%20following%20modality%20fusion%2C%20while%20the%20deep%20adapter%20modulates%20the%20preliminarily%20fused%20information%20flow%20with%20pixel-wise%20inner-modal%20attention%20and%20further%20generates%20modality-aware%20prompts%20through%20pixel-wise%20inter-modal%20attention.%20With%20such%20designs%2C%20DMTrack%20achieves%20promising%20spatio-temporal%20multimodal%20tracking%20performance%20with%20merely%200.93M%20trainable%20parameters.%20Extensive%20experiments%20on%20five%20benchmarks%20demonstrate%20that%20DMTrack%20achieves%20state-of-the-art%20results.%20Our%20code%20and%20models%20will%20be%20available%20at%20https%3A//github.com/Nightwatch-Fox11/DMTrack.&entry.1838667208=http%3A//arxiv.org/abs/2508.01592v2&entry.124074799=Read"},
{"title": "LoGeR: Long-Context Geometric Reconstruction with Hybrid Memory", "author": "Junyi Zhang and Charles Herrmann and Junhwa Hur and Chen Sun and Ming-Hsuan Yang and Forrester Cole and Trevor Darrell and Deqing Sun", "abstract": "Feedforward geometric foundation models achieve strong short-window reconstruction, yet scaling them to minutes-long videos is bottlenecked by quadratic attention complexity or limited effective memory in recurrent designs. We present LoGeR (Long-context Geometric Reconstruction), a novel architecture that scales dense 3D reconstruction to extremely long sequences without post-optimization. LoGeR processes video streams in chunks, leveraging strong bidirectional priors for high-fidelity intra-chunk reasoning. To manage the critical challenge of coherence across chunk boundaries, we propose a learning-based hybrid memory module. This dual-component system combines a parametric Test-Time Training (TTT) memory to anchor the global coordinate frame and prevent scale drift, alongside a non-parametric Sliding Window Attention (SWA) mechanism to preserve uncompressed context for high-precision adjacent alignment. Remarkably, this memory architecture enables LoGeR to be trained on sequences of 128 frames, and generalize up to thousands of frames during inference. Evaluated across standard benchmarks and a newly repurposed VBR dataset with sequences of up to 19k frames, LoGeR substantially outperforms prior state-of-the-art feedforward methods--reducing ATE on KITTI by over 74%--and achieves robust, globally consistent reconstruction over unprecedented horizons.", "link": "http://arxiv.org/abs/2603.03269v1", "date": "2026-03-03", "relevancy": 2.9002, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6137}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5745}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.552}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LoGeR%3A%20Long-Context%20Geometric%20Reconstruction%20with%20Hybrid%20Memory&body=Title%3A%20LoGeR%3A%20Long-Context%20Geometric%20Reconstruction%20with%20Hybrid%20Memory%0AAuthor%3A%20Junyi%20Zhang%20and%20Charles%20Herrmann%20and%20Junhwa%20Hur%20and%20Chen%20Sun%20and%20Ming-Hsuan%20Yang%20and%20Forrester%20Cole%20and%20Trevor%20Darrell%20and%20Deqing%20Sun%0AAbstract%3A%20Feedforward%20geometric%20foundation%20models%20achieve%20strong%20short-window%20reconstruction%2C%20yet%20scaling%20them%20to%20minutes-long%20videos%20is%20bottlenecked%20by%20quadratic%20attention%20complexity%20or%20limited%20effective%20memory%20in%20recurrent%20designs.%20We%20present%20LoGeR%20%28Long-context%20Geometric%20Reconstruction%29%2C%20a%20novel%20architecture%20that%20scales%20dense%203D%20reconstruction%20to%20extremely%20long%20sequences%20without%20post-optimization.%20LoGeR%20processes%20video%20streams%20in%20chunks%2C%20leveraging%20strong%20bidirectional%20priors%20for%20high-fidelity%20intra-chunk%20reasoning.%20To%20manage%20the%20critical%20challenge%20of%20coherence%20across%20chunk%20boundaries%2C%20we%20propose%20a%20learning-based%20hybrid%20memory%20module.%20This%20dual-component%20system%20combines%20a%20parametric%20Test-Time%20Training%20%28TTT%29%20memory%20to%20anchor%20the%20global%20coordinate%20frame%20and%20prevent%20scale%20drift%2C%20alongside%20a%20non-parametric%20Sliding%20Window%20Attention%20%28SWA%29%20mechanism%20to%20preserve%20uncompressed%20context%20for%20high-precision%20adjacent%20alignment.%20Remarkably%2C%20this%20memory%20architecture%20enables%20LoGeR%20to%20be%20trained%20on%20sequences%20of%20128%20frames%2C%20and%20generalize%20up%20to%20thousands%20of%20frames%20during%20inference.%20Evaluated%20across%20standard%20benchmarks%20and%20a%20newly%20repurposed%20VBR%20dataset%20with%20sequences%20of%20up%20to%2019k%20frames%2C%20LoGeR%20substantially%20outperforms%20prior%20state-of-the-art%20feedforward%20methods--reducing%20ATE%20on%20KITTI%20by%20over%2074%25--and%20achieves%20robust%2C%20globally%20consistent%20reconstruction%20over%20unprecedented%20horizons.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03269v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLoGeR%253A%2520Long-Context%2520Geometric%2520Reconstruction%2520with%2520Hybrid%2520Memory%26entry.906535625%3DJunyi%2520Zhang%2520and%2520Charles%2520Herrmann%2520and%2520Junhwa%2520Hur%2520and%2520Chen%2520Sun%2520and%2520Ming-Hsuan%2520Yang%2520and%2520Forrester%2520Cole%2520and%2520Trevor%2520Darrell%2520and%2520Deqing%2520Sun%26entry.1292438233%3DFeedforward%2520geometric%2520foundation%2520models%2520achieve%2520strong%2520short-window%2520reconstruction%252C%2520yet%2520scaling%2520them%2520to%2520minutes-long%2520videos%2520is%2520bottlenecked%2520by%2520quadratic%2520attention%2520complexity%2520or%2520limited%2520effective%2520memory%2520in%2520recurrent%2520designs.%2520We%2520present%2520LoGeR%2520%2528Long-context%2520Geometric%2520Reconstruction%2529%252C%2520a%2520novel%2520architecture%2520that%2520scales%2520dense%25203D%2520reconstruction%2520to%2520extremely%2520long%2520sequences%2520without%2520post-optimization.%2520LoGeR%2520processes%2520video%2520streams%2520in%2520chunks%252C%2520leveraging%2520strong%2520bidirectional%2520priors%2520for%2520high-fidelity%2520intra-chunk%2520reasoning.%2520To%2520manage%2520the%2520critical%2520challenge%2520of%2520coherence%2520across%2520chunk%2520boundaries%252C%2520we%2520propose%2520a%2520learning-based%2520hybrid%2520memory%2520module.%2520This%2520dual-component%2520system%2520combines%2520a%2520parametric%2520Test-Time%2520Training%2 20extremely%20long%20sequences%20without%20post-optimization.%20LoGeR%20processes%20video%20streams%20in%20chunks%2C%20leveraging%20strong%20bidirectional%20priors%20for%20high-fidelity%20intra-chunk%20reasoning.%20To%20manage%20the%20critical%20challenge%20of%20coherence%20across%20chunk%20boundaries%2C%20we%20propose%20a%20learning-based%20hybrid%20memory%20module.%20This%20dual-component%20system%20combines%20a%20parametric%20Test-Time%20Training%20%28TTT%29%20memory%20to%20anchor%20the%20global%20coordinate%20frame%20and%20prevent%20scale%20drift%2C%20alongside%20a%20non-parametric%20Sliding%20Window%20Attention%20%28SWA%29%20mechanism%20to%20preserve%20uncompressed%20context%20for%20high-precision%20adjacent%20alignment.%20Remarkably%2C%20this%20memory%20architecture%20enables%20LoGeR%20to%20be%20trained%20on%20sequences%20of%20128%20frames%2C%20and%20generalize%20up%20to%20thousands%20of%20frames%20during%20inference.%20Evaluated%20across%20standard%20benchmarks%20and%20a%20newly%20repurposed%20VBR%20dataset%20with%20sequences%20of%20up%20to%2019k%20frames%2C%20LoGeR%20substantially%20outperforms%20prior%20state-of-the-art%20feedforward%20methods--reducing%20ATE%20on%20KITTI%20by%20over%2074%25--and%20achieves%20robust%2C%20globally%20consistent%20reconstruction%20over%20unprecedented%20horizons.&entry.1838667208=http%3A//arxiv.org/abs/2603.03269v1&entry.124074799=Read"},
{"title": "FACE: A Face-based Autoregressive Representation for High-Fidelity and Efficient Mesh Generation", "author": "Hanxiao Wang and Yuan-Chen Guo and Ying-Tian Liu and Zi-Xin Zou and Biao Zhang and Weize Quan and Ding Liang and Yan-Pei Cao and Dong-Ming Yan", "abstract": "Autoregressive models for 3D mesh generation suffer from a fundamental limitation: they flatten meshes into long vertex-coordinate sequences. This results in prohibitive computational costs, hindering the efficient synthesis of high-fidelity geometry. We argue this bottleneck stems from operating at the wrong semantic level. We introduce FACE, a novel Autoregressive Autoencoder (ARAE) framework that reconceptualizes the task by generating meshes at the face level. Our one-face-one-token strategy treats each triangle face, the fundamental building block of a mesh, as a single, unified token. This simple yet powerful design reduces the sequence length by a factor of nine, leading to an unprecedented compression ratio of 0.11, halving the previous state-of-the-art. This dramatic efficiency gain does not compromise quality; by pairing our face-level decoder with a powerful VecSet encoder, FACE achieves state-of-the-art reconstruction quality on standard benchmarks. The versatility of the learned latent space is further demonstrated by training a latent diffusion model that achieves high-fidelity, single-image-to-mesh generation. FACE provides a simple, scalable, and powerful paradigm that lowers the barrier to high-quality structured 3D content creation.", "link": "http://arxiv.org/abs/2603.01515v2", "date": "2026-03-03", "relevancy": 2.891, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6148}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5646}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5553}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FACE%3A%20A%20Face-based%20Autoregressive%20Representation%20for%20High-Fidelity%20and%20Efficient%20Mesh%20Generation&body=Title%3A%20FACE%3A%20A%20Face-based%20Autoregressive%20Representation%20for%20High-Fidelity%20and%20Efficient%20Mesh%20Generation%0AAuthor%3A%20Hanxiao%20Wang%20and%20Yuan-Chen%20Guo%20and%20Ying-Tian%20Liu%20and%20Zi-Xin%20Zou%20and%20Biao%20Zhang%20and%20Weize%20Quan%20and%20Ding%20Liang%20and%20Yan-Pei%20Cao%20and%20Dong-Ming%20Yan%0AAbstract%3A%20Autoregressive%20models%20for%203D%20mesh%20generation%20suffer%20from%20a%20fundamental%20limitation%3A%20they%20flatten%20meshes%20into%20long%20vertex-coordinate%20sequences.%20This%20results%20in%20prohibitive%20computational%20costs%2C%20hindering%20the%20efficient%20synthesis%20of%20high-fidelity%20geometry.%20We%20argue%20this%20bottleneck%20stems%20from%20operating%20at%20the%20wrong%20semantic%20level.%20We%20introduce%20FACE%2C%20a%20novel%20Autoregressive%20Autoencoder%20%28ARAE%29%20framework%20that%20reconceptualizes%20the%20task%20by%20generating%20meshes%20at%20the%20face%20level.%20Our%20one-face-one-token%20strategy%20treats%20each%20triangle%20face%2C%20the%20fundamental%20building%20block%20of%20a%20mesh%2C%20as%20a%20single%2C%20unified%20token.%20This%20simple%20yet%20powerful%20design%20reduces%20the%20sequence%20length%20by%20a%20factor%20of%20nine%2C%20leading%20to%20an%20unprecedented%20compression%20ratio%20of%200.11%2C%20halving%20the%20previous%20state-of-the-art.%20This%20dramatic%20efficiency%20gain%20does%20not%20compromise%20quality%3B%20by%20pairing%20our%20face-level%20decoder%20with%20a%20powerful%20VecSet%20encoder%2C%20FACE%20achieves%20state-of-the-art%20reconstruction%20quality%20on%20standard%20benchmarks.%20The%20versatility%20of%20the%20learned%20latent%20space%20is%20further%20demonstrated%20by%20training%20a%20latent%20diffusion%20model%20that%20achieves%20high-fidelity%2C%20single-image-to-mesh%20generation.%20FACE%20provides%20a%20simple%2C%20scalable%2C%20and%20powerful%20paradigm%20that%20lowers%20the%20barrier%20to%20high-quality%20structured%203D%20content%20creation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01515v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFACE%253A%2520A%2520Face-based%2520Autoregressive%2520Representation%2520for%2520High-Fidelity%2520and%2520Efficient%2520Mesh%2520Generation%26entry.906535625%3DHanxiao%2520Wang%2520and%2520Yuan-Chen%2520Guo%2520and%2520Ying-Tian%2520Liu%2520and%2520Zi-Xin%2520Zou%2520and%2520Biao%2520Zhang%2520and%2520Weize%2520Quan%2520and%2520Ding%2520Liang%2520and%2520Yan-Pei%2520Cao%2520and%2520Dong-Ming%2520Yan%26entry.1292438233%3DAutoregressive%2520models%2520for%25203D%2520mesh%2520generation%2520suffer%2520from%2520a%2520fundamental%2520limitation%253A%2520they%2520flatten%2520meshes%2520into%2520long%2520vertex-coordinate%2520sequences.%2520This%2520results%2520in%2520prohibitive%2520computational%2520costs%252C%2520hindering%2520the%2520efficient%2520synthesis%2520of%2520high-fidelity%2520geometry.%2520We%2520argue%2520this%2520bottleneck%2520stems%2520from%2520operating%2520at%2520the%2520wrong%2520semantic%2520level.%2520We%2520introduce%2520FACE%252C%2520a%2520novel%2520Autoregressive%2520Autoencoder%2520%2528ARAE%2529%2520framework%2520that%2520reconceptualizes%2520the%2520task%2520by%2520generating%2520meshes%2520at%2520the%2520face%2520level.%2520Our%2520one-face-one-token%2520strategy%2520treats%2520each%2520triangle%2520face%252C%2520the%2520fundamental%2520building%2520block%2520of%2520a%2520mesh%252C%2520as%2520a%2520single%252C%2520unified%2520token.%2520This%2520simple%2520yet%2520powerful%2520design%2520reduces%2520the%2520sequence%2520length%2520by%2520a%2520factor%2520of%2520nine%252C%2520leading%2520to%2520an%2520unprecedented%2520compression%2520ratio%2520of%25200.11%252C%2520halving%2520the%2520previous%2520state-of-the-art.%2520This%2520dramatic%2520efficiency%2520gain%2520does%2520not%2520compromise%2520quality%253B%2520by%2520pairing%2520our%2520face-level%2520decoder%2520with%2520a%2520powerful%2520VecSet%2520encoder%252C%2520FACE%2520achieves%2520state-of-the-art%2520reconstruction%2520quality%2520on%2520standard%2520benchmarks.%2520The%2520versatility%2520of%2520the%2520learned%2520latent%2520space%2520is%2520further%2520demonstrated%2520by%2520training%2520a%2520latent%2520diffusion%2520model%2520that%2520achieves%2520high-fidelity%252C%2520single-image-to-mesh%2520generation.%2520FACE%2520provides%2520a%2520simple%252C%2520scalable%252C%2520and%2520powerful%2520paradigm%2520that%2520lowers%2520the%2520barrier%2520to%2520high-quality%2520structured%25203D%2520content%2520creation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.01515v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=FACE%3A%20A%20Face-based%20Autoregressive%20Representation%20for%20High-Fidelity%20and%20Efficient%20Mesh%20Generation&entry.906535625=Hanxiao%20Wang%20and%20Yuan-Chen%20Guo%20and%20Ying-Tian%20Liu%20and%20Zi-Xin%20Zou%20and%20Biao%20Zhang%20and%20Weize%20Quan%20and%20Ding%20Liang%20and%20Yan-Pei%20Cao%20and%20Dong-Ming%20Yan&entry.1292438233=Autoregressive%20models%20for%203D%20mesh%20generation%20suffer%20from%20a%20fundamental%20limitation%3A%20they%20flatten%20meshes%20into%20long%20vertex-coordinate%20sequences.%20This%20results%20in%20prohibitive%20computational%20costs%2C%20hindering%20the%20efficient%20synthesis%20of%20high-fidelity%20geometry.%20We%20argue%20this%20bottleneck%20stems%20from%20operating%20at%20the%20wrong%20semantic%20level.%20We%20introduce%20FACE%2C%20a%20novel%20Autoregressive%20Autoencoder%20%28ARAE%29%20framework%2 {"title": "Nodes Are Early, Edges Are Late: Probing Diagram Representations in Large Vision-Language Models", "author": "Haruto Yoshida and Keito Kudo and Yoichi Aoki and Ryota Tanaka and Itsumi Saito and Keisuke Sakaguchi and Kentaro Inui", "abstract": "Large vision-language models (LVLMs) demonstrate strong performance on diagram understanding benchmarks, yet they still struggle with understanding relationships between elements, particularly those represented by nodes and directed edges (e.g., arrows and lines). To investigate the underlying causes of this limitation, we probe the internal representation of LVLMs using a carefully constructed synthetic diagram dataset based on directed graphs. Our probing experiments reveal that edge information is not linearly separable in the vision encoder and becomes linearly encoded only in the text tokens in the language model. In contrast, node information and global structural features are already linearly encoded in individual hidden states of the vision encoder. These findings suggest that the stage at which linearly separable representations are formed varies depending on the type of visual information. In particular, the delayed emergence of edge representations may help explain why LVLMs struggle with relational understanding, such as interpreting edge directions, which require more abstract, compositionally integrated processes.", "link": "http://arxiv.org/abs/2603.02865v1", "date": "2026-03-03", "relevancy": 2.8685, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6075}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6075}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.506}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Nodes%20Are%20Early%2C%20Edges%20Are%20Late%3A%20Probing%20Diagram%20Representations%20in%20Large%20Vision-Language%20Models&body=Title%3A%20Nodes%20Are%20Early%2C%20Edges%20Are%20Late%3A%20Probing%20Diagram%20Representations%20in%20Large%20Vision-Language%20Models%0AAuthor%3A%20Haruto%20Yoshida%20and%20Keito%20Kudo%20and%20Yoichi%20Aoki%20and%20Ryota%20Tanaka%20and%20Itsumi%20Saito%20and%20Keisuke%20Sakaguchi%20and%20Kentaro%20Inui%0AAbstract%3A%20Large%20vision-language%20models%20%28LVLMs%29%20demonstrate%20strong%20performance%20on%20diagram%20understanding%20benchmarks%2C%20yet%20they%20still%20struggle%20with%20understanding%20relationships%20between%20elements%2C%20particularly%20those%20represented%20by%20nodes%20and%20directed%20edges%20%28e.g.%2C%20arrows%20and%20lines%29.%20To%20investigate%20the%20underlying%20causes%20of%20this%20limitation%2C%20we%20probe%20the%20internal%20representation%20of%20LVLMs%20using%20a%20carefully%20constructed%20synthetic%20diagram%20dataset%20based%20on%20directed%20graphs.%20Our%20probing%20experiments%20reveal%20that%20edge%20information%20is%20not%20linearly%20separable%20in%20the%20vision%20encoder%20and%20becomes%20linearly%20encoded%20only%20in%20the%20text%20tokens%20in%20the%20language%20model.%20In%20contrast%2C%20node%20information%20and%20global%20structural%20features%20are%20already%20linearly%20encoded%20in%20individual%20hidden%20states%20of%20the%20vision%20encoder.%20These%20findings%20suggest%20that%20the%20stage%20at%20which%20linearly%20separable%20representations%20are%20formed%20varies%20depending%20on%20the%20type%20of%20visual%20information.%20In%20particular%2C%20the%20delayed%20emergence%20of%20edge%20representations%20may%20help%20explain%20why%20LVLMs%20struggle%20with%20relational%20understanding%2C%20such%20as%20interpreting%20edge%20directions%2C%20which%20require%20more%20abstract%2C%20compositionally%20integrated%20processes.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02865v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNodes%2520Are%2520Early%252C%2520Edges%2520Are%2520Late%253A%2520Probing%2520Diagram%2520Representations%2520in%2520Large%2520Vision-Language%2520Models%26entry.906535625%3DHaruto%2520Yoshida%2520and%2520Keito%2520Kudo%2520and%2520Yoichi%2520Aoki%2520and%2520Ryota%2520Tanaka%2520and%2520Itsumi%2520Saito%2520and%2520Keisuke%2520Sakaguchi%2520and%2520Kentaro%2520Inui%26entry.1292438233%3DLarge%2520vision-language%2520models%2520%2528LVLMs%2529%2520demonstrate%2520strong%2520performance%2520on%2520diagram%2520understanding%2520benchmarks%252C%2520yet%2520they%2520still%2520struggle%2520with%2520understanding%2520relationships%2520between%2520elements%252C%2520particularly%2520those%2520represented%2520by%2520nodes%2520and%2520directed%2520edges%2520%2528e.g.%252C%2520arrows%2520and%2520lines%2529.%2520To%2520investigate%2520the%2520underlying%2520causes%2520of%2520this%2520limitation%252C%2520we%2520probe%2520the%2520internal%2520representation%2520of%2520LVLMs%2520using%2520a%2520carefully%2520constructed%2520synthetic%2520diagram%2520dataset%2520based%2520on%2520directed%2520graphs.%2520Our%2520probing%2520experiments%2520reveal%2520that%2520edge%2520information%2520is%2520not%2520linearly%2520separable%2520in%2520the%2520vision%2520encoder%2520and%2520becomes%2520linearly%2520encoded%2520only%2520in%2520the%2520text%2520tokens%2520in%2520the%2520language%2520model.%2520In%2520contrast%252C%2520node%2520information%2520and%2520global%2520structural%2520features%2520are%2520already%2520linearly%2520encoded%2520in%2520individual%2520hidden%2520states%2520of%2520the%2520vision%2520encoder.%2520These%2520findings%2520suggest%2520that%2520the%2520stage%2520at%2520which%2520linearly%2520separable%2520representations%2520are%2520formed%2520varies%2520depending%2520on%2520the%2520type%2520of%2520visual%2520information.%2520In%2520particular%252C%2520the%2520delayed%2520emergence%2520of%2520edge%2520representations%2520may%2520help%2520explain%2520why%2520LVLMs%2520struggle%2520with%2520relational%2520understanding%252C%2520such%2520as%2520interpreting%2520edge%2520directions%252C%2520which%2520require%2520more%2520abstract%252C%2520compositionally%2520integrated%2520processes.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.02865v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Nodes%20Are%20Early%2C%20Edges%20Are%20Late%3A%20Probing%20Diagram%20Representations%20in%20Large%20Vision-Language%20Models&entry.906535625=Haruto%20Yoshida%20and%20Keito%20Kudo%20and%20Yoichi%20Aoki%20and%20Ryota%20Tanaka%20and%20Itsumi%20Saito%20and%20Keisuke%20Sakaguchi%20and%20Kentaro%20Inui&entry.1292438233=Large%20vision-language%20models%20%28LVLMs%29%20demonstrate%20strong%20performance%20on%20diagram%20understanding%20benchmarks%2C%20yet%20they%20still%20struggle%20with%20understanding%20relationships%20between%20elements%2C%20particularly%20those%20represented%20by%20nodes%20and%20directed%20edges%20%28e.g.%2C%20arrows%20and%20lines%29.%20To%20investigate%20the%20underlying%20causes%20of%20this%20limitation%2C%20we%20probe%20the%20internal%20representation%20of%20LVLMs%20using%20a%20carefully%20constructed%20synthetic%20diagram%20dataset%20based%20on%20directed%20graphs.%20Our%20probing%20experiments%20reveal%20that%20edge%20information%20is%20not%20linearly%20separable%20in%20the%20vision%20encoder%20and%20becomes%20linearly%20encoded%20only%20in%20the%20text%20tokens%20in%20the%20language%20model.%20In%20contrast%2C%20node%20information%20and%20global%20structural%20features%20are%20already%20linearly%20encoded%20in%20individual%20hidden%20states%20of%20the%20vision%20encoder.%20These%20findings%20suggest%20that%20the%20stage%20at%20which%20linearly%20separable%20representations%20are%2

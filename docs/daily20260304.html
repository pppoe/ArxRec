ed%20convolutions%20to%20capture%20relevance%20across%20local%20and%20contextual%20scales%2C%20then%20enforces%20explicit%20sparsity%20via%20an%20%24%5Cell_1%24%20proximal%20operator%20with%20learnable%20per-channel%20thresholds%2C%20yielding%20a%20closed-form%20soft-thresholding%20gate%20that%20can%20remove%20noisy%20responses.%20To%20further%20suppress%20semantically%20irrelevant%20channels%2C%20ProSMA%20incorporates%20decoder-conditioned%20channel%20gating%20driven%20by%20global%20decoder%20context.%20Extensive%20experiments%20on%20challenging%202D%20and%203D%20benchmarks%20demonstrate%20state-of-the-art%20performance%2C%20with%20particularly%20large%20gains%20%28%24%5Capprox20%24%5C%25%29%20on%20difficult%203D%20segmentation%20tasks.%20Project%20page%3A%20https%3A//math-ml-x.github.io/ProSMA-UNet/%0ALink%3A%20http%3A//arxiv.org/abs/2603.03187v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DProSMA-UNet%253A%2520Decoder%2520Conditioning%2520for%2520Proximal-Sparse%2520Skip%2520Feature%2520Selection%26entry.906535625%3DChun-Wun%2520Cheng%2520and%2520Yanqi%2520Cheng%2520and%2520Peiyuan%2520Jing%2520and%2520Guang%2520Yang%2520and%2520Carola-Bibiane%2520Sch%25C3%25B6nlieb%2520and%2520Angelica%2520I.%2520Aviles-Rivero%26entry.1292438233%3DMedical%2520image%2520segmentation%2520commonly%2520relies%2520on%2520U-shaped%2520encoder-decoder%2520architectures%2520such%2520as%2520U-Net%252C%2520where%2520skip%2520connections%2520preserve%2520fine%2520spatial%2520detail%2520by%2520injecting%2520high-resolution%2520encoder%2520features%2520into%2520the%2520decoder.%2520However%252C%2520these%2520skip%2520pathways%2520also%2520propagate%2520low-level%2520textures%252C%2520background%2520clutter%252C%2520and%2520acquisition%2520noise%252C%2520allowing%2520irrelevant%2520information%2520to%2520bypass%2520deeper%2520semantic%2520filtering%2520--%2520an%2520issue%2520that%2520is%2520particularly {"title": "Doxing via the Lens: Revealing Location-related Privacy Leakage on Multi-modal Large Reasoning Models", "author": "Weidi Luo and Tianyu Lu and Qiming Zhang and Xiaogeng Liu and Bin Hu and Yue Zhao and Jieyu Zhao and Song Gao and Patrick McDaniel and Zhen Xiang and Chaowei Xiao", "abstract": "Recent advances in multi-modal large reasoning models (MLRMs) have shown significant ability to interpret complex visual content. While these models enable impressive reasoning capabilities, they also introduce novel and underexplored privacy risks. In this paper, we identify a novel category of privacy leakage in MLRMs: Adversaries can infer sensitive geolocation information, such as a user's home address or neighborhood, from user-generated images, including selfies captured in private settings. To formalize and evaluate these risks, we propose a three-level visual privacy risk framework that categorizes image content based on contextual sensitivity and potential for location inference. We further introduce DoxBench, a curated dataset of 500 real-world images reflecting diverse privacy scenarios. Our evaluation across 11 advanced MLRMs and MLLMs demonstrates that these models consistently outperform non-expert humans in geolocation inference and can effectively leak location-related private information. This significantly lowers the barrier for adversaries to obtain users' sensitive geolocation information. We further analyze and identify two primary factors contributing to this vulnerability: (1) MLRMs exhibit strong reasoning capabilities by leveraging visual clues in combination with their internal world knowledge; and (2) MLRMs frequently rely on privacy-related visual clues for inference without any built-in mechanisms to suppress or avoid such usage. To better understand and demonstrate real-world attack feasibility, we propose GeoMiner, a collaborative attack framework that decomposes the prediction process into two stages: clue extraction and reasoning to improve geolocation performance while introducing a novel attack perspective. Our findings highlight the urgent need to reassess inference-time privacy risks in MLRMs to better protect users' sensitive information.", "link": "http://arxiv.org/abs/2504.19373v5", "date": "2026-03-03", "relevancy": 2.1207, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5351}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5267}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5265}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Doxing%20via%20the%20Lens%3A%20Revealing%20Location-related%20Privacy%20Leakage%20on%20Multi-modal%20Large%20Reasoning%20Models&body=Title%3A%20Doxing%20via%20the%20Lens%3A%20Revealing%20Location-related%20Privacy%20Leakage%20on%20Multi-modal%20Large%20Reasoning%20Models%0AAuthor%3A%20Weidi%20Luo%20and%20Tianyu%20Lu%20and%20Qiming%20Zhang%20and%20Xiaogeng%20Liu%20and%20Bin%20Hu%20and%20Yue%20Zhao%20and%20Jieyu%20Zhao%20and%20Song%20Gao%20and%20Patrick%20McDaniel%20and%20Zhen%20Xiang%20and%20Chaowei%20Xiao%0AAbstract%3A%20Recent%20advances%20in%20multi-modal%20large%20reasoning%20models%20%28MLRMs%29%20have%20shown%20significant%20ability%20to%20interpret%20complex%20visual%20content.%20While%20these%20models%20enable%20impressive%20reasoning%20capabilities%2C%20they%20also%20introduce%20novel%20and%20underexplored%20privacy%20risks.%20In%20this%20paper%2C%20we%20identify%20a%20novel%20category%20of%20privacy%20leakage%20in%20MLRMs%3A%20Adversaries%20can%20infer%20sensitive%20geolocation%20information%2C%20such%20as%20a%20user%27s%20home%20address%20or%20neighborhood%2C%20from%20user-generated%20images%2C%20including%20selfies%20captured%20in%20private%20settings.%20To%20formalize%20and%20evaluate%20these%20risks%2C%20we%20propose%20a%20three-level%20visual%20privacy%20risk%20framework%20that%20categorizes%20image%20content%20based%20on%20contextual%20sensitivity%20and%20potential%20for%20location%20inference.%20We%20further%20introduce%20DoxBench%2C%20a%20curated%20dataset%20of%20500%20real-world%20images%20reflecting%20diverse%20privacy%20scenarios.%20Our%20evaluation%20across%2011%20advanced%20MLRMs%20and%20MLLMs%20demonstrates%20that%20these%20models%20consistently%20outperform%20non-expert%20humans%20in%20geolocation%20inference%20and%20can%20effectively%20leak%20location-related%20private%20information.%20This%20significantly%20lowers%20the%20barrier%20for%20adversaries%20to%20obtain%20users%27%20sensitive%20geolocation%20information.%20We%20further%20analyze%20and%20identify%20two%20primary%20factors%20contributing%20to%20this%20vulnerability%3A%20%281%29%20MLRMs%20exhibit%20strong%20reasoning%20capabilities%20by%20leveraging%20visual%20clues%20in%20combination%20with%20their%20internal%20world%20knowledge%3B%20and%20%282%29%20MLRMs%20frequently%20rely%20on%20privacy-related%20visual%20clues%20for%20inference%20without%20any%20built-in%20mechanisms%20to%20suppress%20or%20avoid%20such%20usage.%20To%20better%20understand%20and%20demonstrate%20real-world%20attack%20feasibility%2C%20we%20propose%20GeoMiner%2C%20a%20collaborative%20attack%20framework%20that%20decomposes%20the%20prediction%20process%20into%20two%20stages%3A%20clue%20extraction%20and%20reasoning%20to%20improve%20geolocation%20performance%20while%20introducing%20a%20novel%20attack%20perspective.%20Our%20findings%20highlight%20the%20urgent%20need%20to%20reassess%20inference-time%20privacy%20risks%20in%20MLRMs%20to%20better%20protect%20users%27%20sensitive%20information.%0ALink%3A%20http%3A//arxiv.org/abs/2504.19373v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqS {"title": "Echoing: Identity Failures when LLM Agents Talk to Each Other", "author": "Sarath Shekkizhar and Romain Cosentino and Adam Earle and Silvio Savarese", "abstract": "As large language model (LLM) based agents interact autonomously with one another, a new class of failures emerges that cannot be predicted from single agent performance: behavioral drifts in agent-agent conversations (AxA). Unlike human-agent interactions, where humans ground and steer conversations, AxA lacks such stabilizing signals, making these failures unique. We investigate one such failure, echoing, where agents abandon their assigned roles and instead mirror their conversational partners, undermining their intended objectives. Through experiments across $66$ AxA configurations, $4$ domains (3 transactional, 1 advisory), and $2500+$ conversations (over $250000$ LLM inferences), we show that echoing occurs across major LLM providers, with echoing rates as high as $70\\%$ depending on the model and domain. Moreover, we find that echoing is persistent even in advanced reasoning models with substantial rates ($32.8\\%$) that are not reduced by reasoning efforts. We analyze prompt, conversation dynamics, showing that echoing arises as interaction grows longer ($7+$ agent turns) and is not merely an artifact of sub-optimal experiment design. Finally, we introduce a protocol-level mitigation where targeted use of structured response reduces echoing to $9\\%$.", "link": "http://arxiv.org/abs/2511.09710v3", "date": "2026-03-03", "relevancy": 2.1091, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4386}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4134}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1" {"title": "Information Routing in Atomistic Foundation Models: How Equivariance Creates Linearly Disentangled Representations", "author": "Joshua Steier", "abstract": "What do atomistic foundation models encode in their intermediate representations, and how is that information organized? We introduce Composition Projection Decomposition (CPD), which uses QR projection to linearly remove composition signal from learned representations and probes the geometric residual. Across eight models from five architectural families on QM9 molecules and Materials Project crystals, we find a disentanglement gradient: tensor product equivariant architectures (MACE) produce representations where geometry is almost fully linearly accessible after composition removal ($R^2_{\\text{geom}} = 0.782$ for HOMO-LUMO gap), while handcrafted descriptors (ANI-2x) entangle the same information nonlinearly ($R^2_{\\text{geom}} = -0.792$ under Ridge; $R^2 = +0.784$ under MLP). MACE routes target-specific signal through irreducible representation channels -- dipole to $L = 1$, HOMO-LUMO gap to $L = 0$ -- a pattern not observed in ViSNet's vector-scalar architecture under the same probe. We show that gradient boosted tree probes on projected residuals are systematically inflated, recovering $R^2 = 0.68$--$0.95$ on a purely compositional target, and recommend linear probes as the primary metric. Linearly disentangled representations are more sample-efficient under linear probing, suggesting a practical advantage for equivariant architectures beyond raw prediction accuracy.", "link": "http://arxiv.org/abs/2603.03155v1", "date": "2026-03-03", "relevancy": 2.1066, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5323}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5323}, {"title" {"title": "Optimizing Data Augmentation through Bayesian Model Selection", "author": "Madi Matymov and Ba-Hien Tran and Michael Kampffmeyer and Markus Heinonen and Maurizio Filippone", "abstract": "Data Augmentation (DA) has become an essential tool to improve robustness and generalization of modern machine learning. However, when deciding on DA strategies it is critical to choose parameters carefully, and this can be a daunting task which is traditionally left to trial-and-error or expensive optimization based on validation performance. In this paper, we counter these limitations by proposing a novel framework for optimizing DA. In particular, we take a probabilistic view of DA, which leads to the interpretation of augmentation parameters as model (hyper)-parameters, and the optimization of the marginal likelihood with respect to these parameters as a Bayesian model selection problem. Due to its intractability, we derive a tractable ELBO, which allows us to optimize augmentation parameters jointly with model parameters. We provide extensive theoretical results on variational approximation quality, generalization guarantees, invariance properties, and connections to empirical Bayes. Through experiments on computer vision and NLP tasks, we show that our approach improves calibration and yields robust performance over fixed or no augmentation. Our work provides a rigorous foundation for optimizing DA through Bayesian principles with significant potential for robust machine learning.", "link": "http://arxiv.org/abs/2505.21813v2", "date": "2026-03-03", "relevancy": 2.1056, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5322}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5314}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tai {"title": "Joint Training Across Multiple Activation Sparsity Regimes", "author": "Haotian Wang", "abstract": "Generalization in deep neural networks remains only partially understood. Inspired by the stronger generalization tendency of biological systems, we explore the hypothesis that robust internal representations should remain effective across both dense and sparse activation regimes. To test this idea, we introduce a simple training strategy that applies global top-k constraints to hidden activations and repeatedly cycles a single model through multiple activation budgets via progressive compression and periodic reset. Using CIFAR-10 without data augmentation and a WRN-28-4 backbone, we find in single-run experiments that two adaptive keep-ratio control strategies both outperform dense baseline training. These preliminary results suggest that joint training across multiple activation sparsity regimes may provide a simple and effective route to improved generalization.", "link": "http://arxiv.org/abs/2603.03131v1", "date": "2026-03-03", "relevancy": 2.1006, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5467}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5128}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.502}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Joint%20Training%20Across%20Multiple%20Activation%20Sparsity%20Regimes&body=Title%3A%20Joint%20Training%20Across%20Multiple%20Activation%20Sparsity%20Regimes%0AAuthor%3A%20Haotian%20Wang%0AAbstract%3A%20Generalization%20in%20deep%20neural%20networks%20remains%20only%20partially%20understood.%20Inspired%20by%20the%20stronger%20generalization%20tendency%20of%20biological%20systems%2C%20we%20explore%20the%20hypothesis%20that%20robust%20internal%20representations%20should%20remain%20effective%20across%20both%20dense%20and%20sparse%20activation%20regimes.%20To%20test%20this%20idea%2C%20we%20introduce%20a%20simple%20training%20strategy%20that%20applies%20global%20top-k%20constraints%20to%20hidden%20activations%20and%20repeatedly%20cycles%20a%20single%20model%20through%20multiple%20activation%20budgets%20via%20progressive%20compression%20and%20periodic%20reset.%20Using%20CIFAR-10%20without%20data%20augmentation%20and%20a%20WRN-28-4%20backbone%2C%20we%20find%20in%20single-run%20experiments%20that%20two%20adaptive%20keep-ratio%20control%20strategies%20both%20outperform%20dense%20baseline%20training.%20These%20preliminary%20results%20suggest%20that%20joint%20training%20across%20multiple%20activation%20sparsity%20regimes%20may%20provide%20a%20simple%20and%20effective%20route%20to%20improved%20generalization.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03131v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DJoint%2520Training%2520Across%2520Multiple%2520Activation%2520Sparsity%2520Regimes%26entry.906535625%3DHaotian%2520Wang%26entry.1292438233%3DGeneralization%2520in%2520deep%2520neural%2520networks%2520remains%2520only%2520partially%2520understood.%2520Inspired%2520by%2520the%2520stronger%2520generalization%2520tendency%2520of%2520biological%2520systems%252C%2520we%2520explore%2520the%2520hypothesis%2520that%2520robust%2520internal%2520representations%2520should%2520remain%2520effective%2520across%2520both%2520dense%2520and%2520sparse%2520activation%2520regimes.%2520To%2520test%2520this%2520idea%252C%2520we%2520introduce%2520a%2520simple%2520training%2520strategy%2520that%2520applies%2520global%2520top-k%2520constraints%2520to%2520hidden%2520activations%2520and%2520repeatedly%2520cycles%2520a%2520single%2520model%2520through%2520multiple%2520activation%2520budgets%2520via%2520progressive%2520compression%2520and%2520periodic%2520reset.%2520Using%2520CIFAR-10%2520without%2520data%2520augmentation%2520and%2520a%2520WRN-28-4%2520backbone%252C%2520we%2520find%2520in%2520single-run%2520experiments%2520that%2520two%2520adaptive%2520keep-ratio%2520control%2520strategies%2520both%2520outperform%2520dense%2520baseline%2520training.%2520These%2520preliminary%2520results%2520suggest%2520that%2520joint%2520training%2520across%2520multiple%2520activation%2520sparsity%2520regimes%2520may%2520provide%2520a%2520simple%2520and%2520effective%2520route%2520to%2520improved%2520generalization.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.03131v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Joint%20Training%20Across%20Multiple%20Activation%20Sparsity%20Regimes&entry.906535625=Haotian%20Wang&entry.1292438233=Generalization%20in%20deep%20neural%20networks%20remains%20only%20partially%20understood.%20Inspired%20by%20the%20stronger%20generalization%20tendency%20of%20biological%20systems%2C%20we%20explore%20the%20hypothesis%20that%20robust%20internal%20representations%20should%20remain%20effective%20across%20both%20dense%20and%20sparse%20activation%20regimes.%20To%20test%20this%20idea%2C%20we%20introduce%20a%20simple%20training%20strategy%20that%20applies%20global%20top-k%20constraints%20to%20hidden%20activations%20and%20repeatedly%20cycles%20a%20single%20model%20through%20multiple%20activation%20budgets%20via%20progressive%20compression%20and%20periodic%20reset.%20Using%20CIFAR-10%20without%20data%20augmentation%20and%20a%20WRN-28-4%20backbone%2C%20we%20find%20in%20single-run%20experiments%20that%20two%20adaptive%20keep-ratio%20control%20strategies%20both%20outperform%20dense%20baseline%20training.%20These%20preliminary%20results%20suggest%20that%20joint%20training%20across%20multiple%20activation%20sparsity%20regimes%20may%20provide%20a%20simple%20and%20effective%20route%20to%20improved%20generalization.&entry.1838667208=http%3A//arxiv.org/abs/2603.03131v1&entry.124074799=Read"},
{"title": "Hot-Start from Pixels: Low-Resolution Visual Tokens for Chinese Language Modeling", "author": "Shuyang Xiang and Hao Guan", "abstract": "Large language models typically represent Chinese characters as discrete index-based tokens, largely ignoring their visual form. For logographic scripts, visual structure carries semantic and phonetic information, which may aid prediction. We investigate whether low-resolution visual inputs can serve as an alternative for character-level modeling. Instead of token IDs, our decoder receives grayscale images of individual characters, with resolutions as low as 8 x 8 pixels. Remarkably, these inputs achieve 39.2% accuracy, comparable to the index-based baseline of 39.1%. Such low-resource settings also exhibit a pronounced hot-start effect: by 0.4% of total training, accuracy reaches above 12%, while index-based models lag at below 6%. Overall, our results demonstrate that minimal visual structure can provide a robust and efficient signal for Chinese language modeling, offering an alternative perspective on character representation that complements traditional index-based approaches.", "link": "http://arxiv.org/abs/2601.09566v3", "date": "2026-03-03", "relevancy": 2.0978, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5344}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5324}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5125}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hot-Start%20from%20Pixels%3A%20Low-Resolution%20Visual%20Tokens%20for%20Chinese%20Language%20Modeling&body=Title%3A%20Hot-Start%20from%20Pixels%3A%20Low-Resolution%20Visual%20Tokens%20for%20Chinese%20Language%20Modeling%0AAuthor%3A%20Shuyang%20Xiang%20and%20Hao%20Guan%0AAbstract%3A%20Large%20language%20models%20typically%20represent%20Chinese%20characters%20as%20discrete%20index-based%20tokens%2C%20largely%20ignoring%20their%20visual%20form.%20For%20logographic%20scripts%2C%20visual%20structure%20carries%20semantic%20and%20phonetic%20information%2C%20which%20may%20aid%20prediction.%20We%20investigate%20whether%20low-resolution%20visual%20inputs%20can%20serve%20as%20an%20alternative%20for%20character-level%20modeling.%20Instead%20of%20token%20IDs%2C%20our%20decoder%20receives%20grayscale%20images%20of%20individual%20characters%2C%20with%20resolutions%20as%20low%20as%208%20x%208%20pixels.%20Remarkably%2C%20these%20inputs%20achieve%2039.2%25%20accuracy%2C%20comparable%20to%20the%20index-based%20baseline%20of%2039.1%25.%20Such%20low-resource%20settings%20also%20exhibit%20a%20pronounced%20hot-start%20effect%3A%20by%200.4%25%20of%20total%20training%2C%20accuracy%20reaches%20above%2012%25%2C%20while%20index-based%20models%20lag%20at%20below%206%25.%20Overall%2C%20our%20results%20demonstrate%20that%20minimal%20visual%20structure%20can%20provide%20a%20robust%20and%20efficient%20signal%20for%20Chinese%20language%20modeling%2C%20offering%20an%20alternative%20perspective%20on%20character%20representation%20that%20complements%20traditional%20index-based%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2601.09566v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHot-Start%2520from%2520Pixels%253A%2520Low-Resolution%2520Visual%2520Tokens%2520for%2520Chinese%2520Language%2520Modeling%26entry.906535625%3DShuyang%2520Xiang%2520and%2520Hao%2520Guan%26entry.1292438233%3DLarge%2520language%2520models%2520typically%2520represent%2520Chinese%2520characters%2520as%2520discrete%2520index-based%2520tokens%252C%2520largely%2520ignoring%2520their%2520visual%2520form.%2520For%2520logographic%2520scripts%252C%2520visua {"title": "Improving Anomaly Detection with Foundation-Model Synthesis and Wavelet-Domain Attention", "author": "Wensheng Wu and Zheming Lu and Ziqian Lu and Zewei He and Xuecheng Sun and Zhao Wang and Jungong Han and Yunlong Yu", "abstract": "Industrial anomaly detection faces significant challenges due to the scarcity of anomalous samples and the complexity of real-world anomalies. In this paper, we propose a foundation model-based anomaly synthesis pipeline (FMAS) that generates highly realistic anomalous samples without fine-tuning or class-specific training. Motivated by the distinct frequency-domain characteristics of anomalies, we introduce aWavelet Domain Attention Module (WDAM), which exploits adaptive sub-band processing to enhance anomaly feature extraction. The combination of FMAS and WDAM significantly improves anomaly detection sensitivity while maintaining computational efficiency. Comprehensive experiments on MVTec AD and VisA datasets demonstrate that WDAM, as a plug-and-play module, achieves substantial performance gains against existing baselines.", "link": "http://arxiv.org/abs/2603.02964v1", "date": "2026-03-03", "relevancy": 1.986, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5026}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.498}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.4775}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Improving%20Anomaly%20Detection%20with%20Foundation-Model%20Synthesis%20and%20Wavelet-Domain%20Attention&body=Title%3A%20Improving%20Anomaly%20Detection%20with%20Foundation-Model%20Synthesis%20and%20Wavelet-Domain%20Attention%0AAuthor {"title": "Value Gradient Guidance for Flow Matching Alignment", "author": "Zhen Liu and Tim Z. Xiao and Carles Domingo-Enrich and Weiyang Liu and Dinghuai Zhang", "abstract": "While methods exist for aligning flow matching models--a popular and effective class of generative models--with human preferences, existing approaches fail to achieve both adaptation efficiency and probabilistically sound prior preservation. In this work, we leverage the theory of optimal control and propose VGG-Flow, a gradient-matching-based method for finetuning pretrained flow matching models. The key idea behind this algorithm is that the optimal difference between the finetuned velocity field and the pretrained one should be matched with the gradient field of a value function. This method not only incorporates first-order information from the reward model but also benefits from heuristic initialization of the value function to enable fast adaptation. Empirically, we show on a popular text-to-image flow matching model, Stable Diffusion 3, that our method can finetune flow matching models under limited computational budgets while achieving effective and prior-preserving alignment.", "link": "http://arxiv.org/abs/2512.05116v2", "date": "2026-03-03", "relevancy": 1.5515, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5941}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4971}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.4904}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Value%20Gradient%20Guidance%20for%20Flow%20Matching%20Alignment&body=Title%3A%20Value%20Gradient%20Guidance%20for%20Flow%20Matching%20Alignment%0AAuthor%3A%20Zhen%20Liu%20and%20Tim%20Z.%20Xiao%20and%20Carles%20Domingo-Enri hieve%20both%20adaptation%20efficiency%20and%20probabilistically%20sound%20prior%20preservation.%20In%20this%20work%2C%20we%20leverage%20the%20theory%20of%20optimal%20control%20and%20propose%20VGG-Flow%2C%20a%20gradient-matching-based%20method%20for%20finetuning%20pretrained%20flow%20matching%20models.%20The%20key%20idea%20behind%20this%20algorithm%20is%20that%20the%20optimal%20difference%20between%20the%20finetuned%20velocity%20field%20and%20the%20pretrained%20one%20should%20be%20matched%20with%20the%20gradient%20field%20of%20a%20value%20function.%20This%20method%20not%20only%20incorporates%20first-order%20information%20from%20the%20reward%20model%20but%20also%20benefits%20from%20heuristic%20initialization%20of%20the%20value%20function%20to%20enable%20fast%20adaptation.%20Empirically%2C%20we%20show%20on%20a%20popular%20text-to-image%20flow%20matching%20model%2C%20Stable%20Diffusion%203%2C%20that%20our%20method%20can%20finetune%20flow%20matching%20models%20under%20limited%20computational%20budgets%20while%20achieving%20effective%20and%20prior-preserving%20alignment.&entry.1838667208=http%3A//arxiv.org/abs/2512.05116v2&entry.124074799=Read"},
{"title": "Tell Me What To Learn: Generalizing Neural Memory to be Controllable in Natural Language", "author": "Max S. Bennett and Thomas P. Zollo and Richard Zemel", "abstract": "Modern machine learning models are deployed in diverse, non-stationary environments where they must continually adapt to new tasks and evolving knowledge. Continual fine-tuning and in-context learning are costly and brittle, whereas neural memory methods promise lightweight updates with minimal forgetting. However, existing neural memory models typically assume a single fixed objective and homogeneous information streams, leaving users with no control over what the model remembers or ignores over time. To address this challenge, we propose a generalized neural memory system that performs flexible updates based on learning instructions specified in natural language. Our approach enables adaptive agents to learn selectively from heterogeneous information sources, supporting settings, such as healthcare and customer service, where fixed-objective memory updates are insufficient.", "link": "http://arxiv.org/abs/2602.23201v2", "date": "2026-03-03", "relevancy": 2.0359, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5209}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5033}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4933}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Tell%20Me%20What%20To%20Learn%3A%20Generalizing%20Neural%20Memory%20to%20be%20Controllable%20in%20Natural%20Language&body=Title%3A%20Tell%20Me%20What%20To%20Learn%3A%20Generalizing%20Neural%20Memory%20to%20be%20Controllable%20in%20Natural%20Language%0AAuthor%3A%20Max%20S.%20Bennett%20and%20Thomas%20P.%20 {"title": "On the Topology of Neural Network Superlevel Sets", "author": "Bahman Gharesifard", "abstract": "We show that neural networks with activations satisfying a Riccati-type ordinary differential equation condition, an assumption arising in recent universal approximation results in the uniform topology, produce Pfaffian outputs on analytic domains with format controlled only by the architecture. Consequently, superlevel sets, as well as Lie bracket rank drop loci for neural network parameterized vector fields, admit architecture-only bounds on topological complexity, in particular on total Betti numbers, uniformly over all weights.", "link": "http://arxiv.org/abs/2603.02973v1", "date": "2026-03-03", "relevancy": 1.2108, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4181}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.3886}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.3823}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20On%20the%20Topology%20of%20Neural%20Network%20Superlevel%20Sets&body=Title%3A%20On%20the%20Topology%20of%20Neural%20Network%20Superlevel%20Sets%0AAuthor%3A%20Bahman%20Gharesifard%0AAbstract%3A%20We%20show%20that%20neural%20networks%20with%20activations%20satisfying%20a%20Riccati-type%20ordinary%20differential%20equation%20condition%2C%20an%20assumption%20arising%20in%20recent%20universal%20approximation%20results%20in%20the%20uniform%20topology%2C%20produce%20Pfaffian%20outputs%20on%20analytic%20domains%20with%20format%20controlled%20only%20by%20the%20architecture.%20Consequently%2C%20superlevel%20sets%2C%20as%20well%20as%20Lie%20bracket%20rank%20drop%20loci%20for%20neural%20network%20parameterized%20vector%20fields%2C%20admit%20architec {"title": "Out-of-Support Generalisation via Weight-Space Sequence Modelling", "author": "Roussel Desmond Nzoyem", "abstract": "As breakthroughs in deep learning transform key industries, models are increasingly required to extrapolate on datapoints found outside the range of the training set, a challenge we coin as out-of-support (OoS) generalisation. However, neural networks frequently exhibit catastrophic failure on OoS samples, yielding unrealistic but overconfident predictions. We address this challenge by reformulating the OoS generalisation problem as a sequence modelling task in the weight space, wherein the training set is partitioned into concentric shells corresponding to discrete sequential steps. Our WeightCaster framework yields plausible, interpretable, and uncertainty-aware predictions without necessitating explicit inductive biases, all the while maintaining high computational efficiency. Emprical validation on a synthetic cosine dataset and real-world air quality sensor readings demonstrates performance competitive or superior to the state-of-the-art. By enhancing reliability beyond in-distribution scenarios, these results hold significant implications for the wider adoption of artificial intelligence in safety-critical applications.", "link": "http://arxiv.org/abs/2602.13550v2", "date": "2026-03-03", "relevancy": 1.0656, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5567}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5267}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.515}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Out-of-Support%20Generalisation%20via%20Weight-Space%20Sequence%20M {"title": "No Answer Needed: Predicting LLM Answer Accuracy from Question-Only Linear Probes", "author": "Iv\u00e1n Vicente Moreno Cencerrado and Arnau Padr\u00e9s Masdemont and Anton Gonzalvez Hawthorne and David Demitri Africa and Lorenzo Pacchiardi", "abstract": "Do large language models (LLMs) anticipate when they will answer correctly? To study this, we extract activations after a question is read but before any tokens are generated, and train linear probes to predict whether the model's forthcoming answer will be correct. Across three open-source model families ranging from 7 to 70 billion parameters, projections on this \"in-advance correctness direction\" trained on generic trivia questions predict success in distribution and on diverse out-of-distribution knowledge datasets, indicating a deeper signal than dataset-specific spurious features, and outperforming black-box baselines and verbalised predicted confidence. Predictive power saturates in intermediate layers and, notably, generalisation falters on questions requiring mathematical reasoning. Moreover, for models responding \"I don't know\", doing so strongly correlates with the probe score, indicating that the same direction also captures confidence. By complementing previous results on truthfulness and other behaviours obtained with probes and sparse auto-encoders, our work contributes essential findings to elucidate LLM internals.", "link": "http://arxiv.org/abs/2509.10625v3", "date": "2026-03-03", "relevancy": 1.9549, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.496}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.496}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity" {"title": "The Winnability of Klondike Solitaire and Many Other Patience Games", "author": "Charlie Blake and Ian P. Gent", "abstract": "Our ignorance of the winnability percentage of the solitaire card game `Klondike' has been described as ``one of the embarrassments of applied mathematics''. Klondike, the game in the Windows Solitaire program, is just one of many single-player card games, generically called `patience' or `solitaire' games, for which players have long wanted to know how likely a particular game is to be winnable. A number of different games have been studied empirically in the academic literature and by non-academic enthusiasts. Here we show that a single general purpose Artificial Intelligence program named `Solvitaire' can be used to determine the winnability percentage of 73 variants of 35 different single-player card games with a 95% confidence interval of $\\pm$ 0.1% or better. For example, we report the winnability of Klondike as 81.945% $\\pm$ 0.084% (in the `thoughtful' variant where the player knows the rank and suit of all cards), a 30-fold reduction in confidence interval over the best previous result. The vast majority of our results are either entirely new or represent significant improvements on previous knowledge. Solvitaire uses depth-first search and exploits a number of AI techniques including transposition tables, symmetry breaking, dominances, and streamliners. We give the first correctness proofs of two key dominances for patience games.", "link": "http://arxiv.org/abs/1906.12314v6", "date": "2026-03-03", "relevancy": 1.3018, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.3367}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", {"title": "Operator Learning Using Weak Supervision from Walk-on-Spheres", "author": "Hrishikesh Viswanath and Hong Chul Nam and Xi Deng and Julius Berner and Anima Anandkumar and Aniket Bera", "abstract": "Training neural PDE solvers is often bottlenecked by expensive data generation or unstable physics-informed neural network (PINN) involving challenging optimization landscapes due to higher-order derivatives. To tackle this issue, we propose an alternative approach using Monte Carlo approaches to estimate the solution to the PDE as a stochastic process for weak supervision during training. Leveraging the Walk-on-Spheres method, we introduce a learning scheme called \\emph{Walk-on-Spheres Neural Operator (WoS-NO)} which uses weak supervision from WoS to train any given neural operator. We propose to amortize the cost of Monte Carlo walks across the distribution of PDE instances using stochastic representations from the WoS algorithm to generate cheap, noisy, estimates of the PDE solution during training. This is formulated into a data-free physics-informed objective where a neural operator is trained to regress against these weak supervisions, allowing the operator to learn a generalized solution map for an entire family of PDEs. This strategy does not require expensive pre-computed datasets, avoids computing higher-order derivatives for loss functions that are memory-intensive and unstable, and demonstrates zero-shot generalization to novel PDE parameters and domains. Experiments show that for the same number of training steps, our method exhibits up to 8.75$\\times$ improvement in $L_2$-error compared to standard physics-informed training schemes, up to 6.31$\\times$ improvement in training speed, and reductions of up to 2.97$\\times$ in GPU memory consumption. We present the code at https://github.com/neuraloperator/WoS-NO", "link": "http://arxiv.org/abs/2603.01193v2", "date": "2026-03-03", "relevancy": 1.9399, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.507}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4849}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4762}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Operator%20Learning%20Using%20Weak%20Supervision%20from%20Walk-on-Spheres&body=Title%3A%20Operator%20Learning%20Using%20Weak%20Supervision%20from%20Walk-on-Spheres%0AAuthor%3A%20Hrishikesh%20Viswanath%20and%20Hong%20Chul%20Nam%20and%20Xi%20Deng%20and%20Julius%20Berner%20and%20Anima%20Anandkumar%20and%20Aniket%20Bera%0AAbstract%3A%20Training%20neural%20PDE%20solvers%20is%20often%20bottlenecked%20by%20expensive%20data%20generation%20or%20unstable%20physics-informed%20neural%20network%20%28PINN%29%20involving%20challenging%20optimization%20landscapes%20due%20to%20higher-order%20derivatives.%20To%20tackle%20this%20issue%2C%20we%20propose%20an%20alternative%20approach%20using%20Monte%20Carlo%20approaches%20to%20estimate%20the%20solution%20to%20the%20PDE%20as%20a%20stochastic%20process%20for%20weak%20supervision%20during%20training.%20Leveraging%20the%20Walk-on-Spheres%20method%2C%20we%20introduce%20a%20learning%20scheme%20called%20%5Cemph%7BWalk-on-Spheres%20Neural%20Operator%20%28WoS-NO%29%7D%20which%20uses%20weak%20supervision%20from%20WoS%20to%20train%20any%20given%20neural%20operator.%20We%20propose%20to%20amortize%20the%20cost%20of%20Monte%20Carlo%20walks%20across%20the%20distribution%20of%20PDE%20instances%20using%20stochastic%20representations%20from%20the%20WoS%20algorithm%20to%20generate%20cheap%2C%20noisy%2C%20estimates%20of%20the%20PDE%20solution%20during%20training.%20This%20is%20formulated%20into%20a%20data-free%20physics-informed%20objective%20where%20a%20neural%20operator%20is%20trained%20to%20regress%20against%20these%20weak%20supervisions%2C%20allowing%20the%20operator%20to%20learn%20a%20generalized%20solution%20map%20for%20an%20entire%20family%20of%20PDEs.%20This%20strategy%20does%20not%20require%20expensive%20pre-computed%20datasets%2C%20avoids%20computing%20higher-order%20derivatives%20for%20loss%20functions%20that%20are%20memory-intensive%20and%20unstable%2C%20and%20demonstrates%20zero-shot%20generalization%20to%20novel%20PDE%20parameters%20and%20domains.%20Experiments%20show%20that%20for%20the%20same%20number%20of%20training%20steps%2C%20our%20method%20exhibits%20up%20to%208.75%24%5Ctimes%24%20improvement%20in%20%24L_2%24-error%20compared%20to%20standard%20physics-informed%20training%20schemes%2C%20up%20to%206.31%24%5Ctimes%24%20improvement%20in%20training%20speed%2C%20and%20reductions%20of%20up%20to%202.97%24%5Ctimes%24%20in%20GPU%20memory%20consumption.%20We%20present%20the%20code%20at%20https%3A//github.com/neuraloperator/WoS-NO%0ALink%3A%20http%3A//arxiv.org/abs/2603.01193v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOperator%2520Learning%2520Using%2520Weak%2520Supervision%2520from%2520Walk-on-Spheres%26entry.906535625%3DHrishikesh%2520Viswanath%2520and%2520Hong%2520Chul%2520Nam%2520and%2520Xi%2520Deng%2520and%2520Julius%2520Berner%2520and%2520Anima%2520Anandkumar%2520and%2520Aniket%2520Bera%26entry.1292438233%3DTraining%2520neural%2520PDE%2520solvers%2520is%2520often%2520bottlenecked%2520by%2520expensive%2520data%2520generation%2520or%2520unstable%2520physics-informed%2520neural%2520network%2520%2528PINN%2529%2520involving%2520challenging%2520optimization%2520landscapes%2520due%2520to%2520higher-order%2520derivatives.%2520To%2520tackle%2520this%2520issue%252C%2520we%2520propose%2520an%2520alternative%2520approach%2520using%2520Monte%2520Carlo%2520approaches%2520to%2520estimate%2520the%2520solution up%2520to%25202.97%2524%255Ctimes%2524%2520in%2520GPU%2520memory%2520consumption.%2520We%2520present%2520the%2520code%2520at%2520https%253A//github.com/neuraloperator/WoS-NO%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.01193v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Operator%20Learning%20Using%20Weak%20Supervision%20from%20Walk-on-Spheres&entry.906535625=Hrishikesh%20Viswanath%20and%20Hong%20Chul%20Nam%20and%20Xi%20Deng%20and%20Julius%20Berner%20and%20Anima%20Anandkumar%20and%20Aniket%20Bera&entry.1292438233=Training%20neural%20PDE%20solvers%20is%20often%20bottlenecked%20by%20expensive%20data%20generation%20or%20unstable%20physics-informed%20neural%20network%20%28PINN%29%20involving%20challenging%20optimization%20landscapes%20due%20to%20higher-order%20derivatives.%20To%20tackle%20this%20issue%2C%20we%20propose%20an%20alternative%20approach%20using%20Monte%20Carlo%20approaches%20to%20estimate%20the%20solution%20to%20the%20PDE%20as%20a%20stochastic%20process%20for%20weak%20supervision%20during%20training.%20Leveraging%20the%20Walk-on-Spheres%20method%2C%20we%20introduce%20a%20learning%20scheme%20called%20%5Cemph%7BWalk-on-Spheres%20Neural%20Operator%20%28WoS-NO%29%7D%20which%20uses%20weak%20supervision%20from%20WoS%20to%20train%20any%20given%20neural%20operator.%20We%20propose%20to%20amortize%20the%20cost%20of%20Monte%20Carlo%20walks%20across%20the%20distribution%20of%20PDE%20instances%20using%20stochastic%20representations%20from%20the%20WoS%20algorithm%20to%20generate%20cheap%2C%20noisy%2C%20estimates%20of%20the%20PDE%20solution%20during%20training.%20This%20is%20formulated%20into%20a%20data-free%20physics-informed%20objective%20where%20a%20neural%20operator%20is%20trained%20to%20regress%20against%20these%20weak%20supervisions%2C%20allowing%20the%20operator%20to%20learn%20a%20generalized%20solution%20map%20for%20an%20entire%20family%20of%20PDEs.%20T {"title": "Why Adam Can Beat SGD: Second-Moment Normalization Yields Sharper Tails", "author": "Ruinan Jin and Yingbin Liang and Shaofeng Zou", "abstract": "Despite Adam demonstrating faster empirical convergence than SGD in many applications, much of the existing theory yields guarantees essentially comparable to those of SGD, leaving the empirical performance gap insufficiently explained. In this paper, we uncover a key second-moment normalization in Adam and develop a stopping-time/martingale analysis that provably distinguishes Adam from SGD under the classical bounded variance model (a second moment assumption). In particular, we establish the first theoretical separation between the high-probability convergence behaviors of the two methods: Adam achieves a $\u03b4^{-1/2}$ dependence on the confidence parameter $\u03b4$, whereas corresponding high-probability guarantee for SGD necessarily incurs at least a $\u03b4^{-1}$ dependence.", "link": "http://arxiv.org/abs/2603.03099v1", "date": "2026-03-03", "relevancy": 1.7606, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4429}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.441}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4371}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Why%20Adam%20Can%20Beat%20SGD%3A%20Second-Moment%20Normalization%20Yields%20Sharper%20Tails&body=Title%3A%20Why%20Adam%20Can%20Beat%20SGD%3A%20Second-Moment%20Normalization%20Yields%20Sharper%20Tails%0AAuthor%3A%20Ruinan%20Jin%20and%20Yingbin%20Liang%20and%20Shaofeng%20Zou%0AAbstract%3A%20Despite%20Adam%20demonstrating%20faster%20empirical%20convergence%20than%20SGD%20in%20many%20applications%2C%20much%20of%20the%20existing%20theory {"title": "Embedding interpretable $\\ell_1$-regression into neural networks for uncovering temporal structure in cell imaging", "author": "Fabian Kabus and Maren Hackenberg and Julia Hindel and Thibault Cholvin and Antje Kilias and Thomas Brox and Abhinav Valada and Marlene Bartos and Harald Binder", "abstract": "While artificial neural networks excel in unsupervised learning of non-sparse structure, classical statistical regression techniques offer better interpretability, in particular when sparseness is enforced by $\\ell_1$ regularization, enabling identification of which factors drive observed dynamics. We investigate how these two types of approaches can be optimally combined, exemplarily considering two-photon calcium imaging data where sparse autoregressive dynamics are to be extracted. We propose embedding a vector autoregressive (VAR) model as an interpretable regression technique into a convolutional autoencoder, which provides dimension reduction for tractable temporal modeling. A skip connection separately addresses non-sparse static spatial information, selectively channeling sparse structure into the $\\ell_1$-regularized VAR. $\\ell_1$-estimation of regression parameters is enabled by differentiating through the piecewise linear solution path. This is contrasted with approaches where the autoencoder does not adapt to the VAR model. Having an embedded statistical model also enables a testing approach for comparing temporal sequences from the same observational unit. Additionally, contribution maps visualize which spatial regions drive the learned dynamics.", "link": "http://arxiv.org/abs/2603.02899v1", "date": "2026-03-03", "relevancy": 1.9896, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.498}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4971}, {"title       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

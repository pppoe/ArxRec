{"title": "Specificity-aware reinforcement learning for fine-grained open-world classification", "author": "Samuele Angheben and Davide Berasi and Alessandro Conti and Elisa Ricci and Yiming Wang", "abstract": "Classifying fine-grained visual concepts under open-world settings, i.e., without a predefined label set, demands models to be both accurate and specific. Recent reasoning Large Multimodal Models (LMMs) exhibit strong visual understanding capability but tend to produce overly generic predictions when performing fine-grained image classification. Our preliminary analysis reveals that models do possess the intrinsic fine-grained domain knowledge. However, promoting more specific predictions (specificity) without compromising correct ones (correctness) remains a non-trivial and understudied challenge. In this work, we investigate how to steer reasoning LMMs toward predictions that are both correct and specific. We propose a novel specificity-aware reinforcement learning framework, SpeciaRL, to fine-tune reasoning LMMs on fine-grained image classification under the open-world setting. SpeciaRL introduces a dynamic, verifier-based reward signal anchored to the best predictions within online rollouts, promoting specificity while respecting the model's capabilities to prevent incorrect predictions. Our out-of-domain experiments show that SpeciaRL delivers the best trade-off between correctness and specificity across extensive fine-grained benchmarks, surpassing existing methods and advancing open-world fine-grained image classification. Code and model are publicly available at https://github.com/s-angheben/SpeciaRL.", "link": "http://arxiv.org/abs/2603.03197v1", "date": "2026-03-03", "relevancy": 2.2303, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", " {"title": "SwiftRepertoire: Few-Shot Immune-Signature Synthesis via Dynamic Kernel Codes", "author": "Rong Fu and Muge Qi and Yang Li and Yabin Jin and Jiekai Wu and Jiaxuan Lu and Chunlei Meng and Youjin Wang and Zeli Su and Juntao Gao and Li Bao and Qi Zhao and Wei Luo and Simon Fong", "abstract": "Repertoire-level analysis of T cell receptors offers a biologically grounded signal for disease detection and immune monitoring, yet practical deployment is impeded by label sparsity, cohort heterogeneity, and the computational burden of adapting large encoders to new tasks. We introduce a framework that synthesizes compact task-specific parameterizations from a learned dictionary of prototypes conditioned on lightweight task descriptors derived from repertoire probes and pooled embedding statistics. This synthesis produces small adapter modules applied to a frozen pretrained backbone, enabling immediate adaptation to novel tasks with only a handful of support examples and without full model fine-tuning. The architecture preserves interpretability through motif-aware probes and a calibrated motif discovery pipeline that links predictive decisions to sequence-level signals. Together, these components yield a practical, sample-efficient, and interpretable pathway for translating repertoire-informed models into diverse clinical and research settings where labeled data are scarce and computational resources are constrained.", "link": "http://arxiv.org/abs/2602.01051v3", "date": "2026-03-03", "relevancy": 2.2276, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4506}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4464}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4396}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SwiftRepertoire%3A%20Few-Shot%20Immune-Signature%20Synthesis%20via%20Dynamic%20Kernel%20Codes&body=Title%3A%20SwiftRepertoire%3A%20Few-Shot%20Immune-Signature%20Synthesis%20via%20Dynamic%20Kernel%20Codes%0AAuthor%3A%20Rong%20Fu%20and%20Muge%20Qi%20and%20Yang%20Li%20and%20Yabin%20Jin%20and%20Jiekai%20Wu%20and%20Jiaxuan%20Lu%20and%20Chunlei%20Meng%20and%20Youjin%20Wang%20and%20Zeli%20Su%20and%20Juntao%20Gao%20and%20Li%20Bao%20and%20Qi%20Zhao%20and%20Wei%20Luo%20and%20Simon%20Fong%0AAbstract%3A%20Repertoire-level%20analysis%20of%20T%20cell%20receptors%20offers%20a%20biologically%20grounded%20signal%20for%20disease%20detection%20and%20immune%20monitoring%2C%20yet%20practical%20deployment%20is%20impeded%20by%20label%20sparsity%2C%20cohort%20heterogeneity%2C%20and%20the%20computational%20burden%20of%20adapting%20large%20encoders%20to%20new%20tasks.%20We%20introduce%20a%20framework%20that%20synthesizes%20compact%20task-specific%20parameterizations%20from%20a%20learned%20dictionary%20of%20prototypes%20conditioned%20on%20lightweight%20task%20descriptors%20derived%20from%20repertoire%20probes%20and%20pooled%20embedding%20statistics.%20This%20synthesis%20produces%20small%20adapter%20modules%20applied%20to%20a%20frozen%20pretrained%20backbone%2C%20enabling%20immediate%20adaptation%20to%20novel%20tasks%20with%20only%20a%20handful%20of%20support%20examples%20and%20without%20full%20model%20fine-tuning.%20The%20architecture%20preserves%20interpretability%20through%20motif-aware%20probes%20and%20a%20calibrated%20motif%20discovery%20pipeline%20that%20links%20predictive%20decisions%20to%20sequence-level%20signals.%20Together%2C%20these%20components%20yield%20a%20practical%2C%20sample-efficient%2C%20and%20interpretable%20pathway%20for%20translating%20repertoire-informed%20models%20into%20diverse%20clinical%20and%20research%20settings%20where%20labeled%20data%20are%20scarce%20and%2 e%2520that%2520links%2520predictive%2520decisions%2520to%2520sequence-level%2520signals.%2520Together%252C%2520these%2520components%2520yield%2520a%2520practical%252C%2520sample-efficient%252C%2520and%2520interpretable%2520pathway%2520for%2520translating%2520repertoire-informed%2520models%2520into%2520diverse%2520clinical%2520and%2520research%2520settings%2520where%2520labeled%2520data%2520are%2520scarce%2520and%2520computational%2520resources%2520are%2520constrained.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.01051v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SwiftRepertoire%3A%20Few-Shot%20Immune-Signature%20Synthesis%20via%20Dynamic%20Kernel%20Codes&entry.906535625=Rong%20Fu%20and%20Muge%20Qi%20and%20Yang%20Li%20and%20Yabin%20Jin%20and%20Jiekai%20Wu%20and%20Jiaxuan%20Lu%20and%20Chunlei%20Meng%20and%20Youjin%20Wang%20and%20Zeli%20Su%20and%20Juntao%20Gao%20and%20Li%20Bao%20and%20Qi%20Zhao%20and%20Wei%20Luo%20and%20Simon%20Fong&entry.1292438233=Repertoire-level%20analysis%20of%20T%20cell%20receptors%20offers%20a%20biologically%20grounded%20signal%20for%20disease%20detection%20and%20immune%20monitoring%2C%20yet%20practical%20deployment%20is%20impeded%20by%20label%20sparsity%2C%20cohort%20heterogeneity%2C%20and%20the%20computational%20burden%20of%20adapting%20large%20encoders%20to%20new%20tasks.%20We%20introduce%20a%20framework%20that%20synthesizes%20compact%20task-specific%20parameterizations%20from%20a%20learned%20dictionary%20of%20prototypes%20conditioned%20on%20lightweight%20task%20descriptors%20derived%20from%20repertoire%20probes%20and%20pooled%20embedding%20statistics.%20This%20synthesis%20produces%20small%20adapter%20modules%20applied%20to%20a%20frozen%20pretrained%20backbone%2C%20enabling%20immediate%20adaptation%20to%20novel%20tasks%20with%20only%20a%20handful%20of%20support%20examples%20and%20without%20full%20model%20fine-tuning.%20The%20arc {"title": "MoECLIP: Patch-Specialized Experts for Zero-shot Anomaly Detection", "author": "Jun Yeong Park and JunYoung Seo and Minji Kang and Yu Rang Park", "abstract": "The CLIP model's outstanding generalization has driven recent success in Zero-Shot Anomaly Detection (ZSAD) for detecting anomalies in unseen categories. The core challenge in ZSAD is to specialize the model for anomaly detection tasks while preserving CLIP's powerful generalization capability. Existing approaches attempting to solve this challenge share the fundamental limitation of a patch-agnostic design that processes all patches monolithically without regard for their unique characteristics. To address this limitation, we propose \\textbf{MoECLIP}, a Mixture-of-Experts (MoE) architecture for the ZSAD task, which achieves patch-level adaptation by dynamically routing each image patch to a specialized Low-Rank Adaptation (LoRA) expert based on its unique characteristics. Furthermore, to prevent functional redundancy among the LoRA experts, we introduce (1) Frozen Orthogonal Feature Separation (FOFS), which orthogonally separates the input feature space to force experts to focus on distinct information, and (2) a simplex equiangular tight frame (ETF) loss to regulate the expert outputs to form maximally equiangular representations. Comprehensive experimental results across 14 benchmark datasets spanning industrial and medical domains demonstrate that MoECLIP outperforms existing state-of-the-art methods. The code is available at https://github.com/CoCoRessa/MoECLIP.", "link": "http://arxiv.org/abs/2603.03101v1", "date": "2026-03-03", "relevancy": 2.2092, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5834}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5326}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5236}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MoECLIP%3A%20Patch-Specialized%20Experts%20for%20Zero-shot%20Anomaly%20Detection&body=Title%3A%20MoECLIP%3A%20Patch-Specialized%20Experts%20for%20Zero-shot%20Anomaly%20Detection%0AAuthor%3A%20Jun%20Yeong%20Park%20and%20JunYoung%20Seo%20and%20Minji%20Kang%20and%20Yu%20Rang%20Park%0AAbstract%3A%20The%20CLIP%20model%27s%20outstanding%20generalization%20has%20driven%20recent%20success%20in%20Zero-Shot%20Anomaly%20Detection%20%28ZSAD%29%20for%20detecting%20anomalies%20in%20unseen%20categories.%20The%20core%20challenge%20in%20ZSAD%20is%20to%20specialize%20the%20model%20for%20anomaly%20detection%20tasks%20while%20preserving%20CLIP%27s%20powerful%20generalization%20capability.%20Existing%20approaches%20attempting%20to%20solve%20this%20challenge%20share%20the%20fundamental%20limitation%20of%20a%20patch-agnostic%20design%20that%20processes%20all%20patches%20monolithically%20without%20regard%20for%20their%20unique%20characteristics.%20To%20address%20this%20limitation%2C%20we%20propose%20%5Ctextbf%7BMoECLIP%7D%2C%20a%20Mixture-of-Experts%20%28MoE%29%20architecture%20for%20the%20ZSAD%20task%2C%20which%20achieves%20patch-level%20adaptation%20by%20dynamically%20routing%20each%20image%20patch%20to%20a%20specialized%20Low-Rank%20Adaptation%20%28LoRA%29%20expert%20based%20on%20its%20unique%20characteristics.%20Furthermore%2C%20to%20prevent%20functional%20redundancy%20among%20the%20LoRA%20experts%2C%20we%20introduce%20%281%29%20Frozen%20Orthogonal%20Feature%20Separation%20%28FOFS%29%2C%20which%20orthogonally%20separates%20the%20input%20feature%20space%20to%20force%20experts%20to%20focus%20on%20distinct%20information%2C%20and%20%282%29%20a%20simplex%20equiangular%20tight%20frame%20%28ETF%29%20loss%20to%20regulate%20the%20expert%20outputs%20to%20form%20maximally%20equiangular%20representations.%20Comprehensive%20experimental%20results%20across%2014%20benchmark%20datasets%20spanning%20industrial%20and%20medical%20domains%20demonstrate%20that%20MoECLIP%20outperforms%20existing%20state-of-the-art%20methods.%20The%20code%20is%20available%20at%20https%3A//github.com/CoCoRessa/MoECLIP.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03101v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMoECLIP%253A%2520Patch-Specialized%2520Experts%2520for%2520Zero-shot%2520Anomaly%2520Detection%26entry.906535625%3DJun%2520Yeong%2520Park%2520and%2520JunYoung%2520Seo%2520and%2520Minji%2520Kang%2520and%2520Yu%2520Rang%2520Park%26entry.1292438233%3DThe%2520CLIP%2520model%2527s%2520outstanding%2520generalization%2520has%2520driven%2520recent%2520success%2520in%2520Zero-Shot%2520Anomaly%2520Detection%2520%2528ZSAD%2529%2520for%2520detecting%2520anomalies%2520in%2520unseen%2520categories.%2520The%2520core%2520challenge%2520in%2520ZSAD%2520is%2520to%2520specialize%2520the%2520model%2520for%2520anomaly%2520detection%2520tasks%2520while%2520preserving%2520CLIP%2527s%2520powerful%2520generalization%2520capability.%2520Existing%2520approaches%2520attempting%2520to%2520solve%2520this%2520challenge%2520share%2520the%2520fundamental%2520limitation%2520of%2520a%2520patch-agnostic%2520design%2520that%2520processes%2520all%2520patches%2520monolithically%2520without%2520regard%2520for%2520their%2520unique%2520characteristics.%2520To%2520address%2520this%2520limitation%252C%2520we%2520propose%2520%255Ctextbf%257BMoECLIP%257D%252C%2520a%2520Mixture-of-Experts%2520%2528MoE%2529%2520architecture%2520for%2520the%2520ZSAD%2520task%252C%2520which%2520achieves%2520patch-level%2520adaptation%2520by%2520dynamically%2520routing%2520each%2520image%2520patch%2520to%2520a%2520specialized%2520Low-Rank%2520Adaptation%2520%2528LoRA%2529%2520expert%2520based%2520on%2520its%2520unique%2520characterist {"title": "Lattice-based Deep Neural Networks: Regularity and Tailored Regularization", "author": "Alexander Keller and Frances Y. Kuo and Dirk Nuyens and Ian H. Sloan", "abstract": "This survey article is concerned with the application of lattice rules to Deep Neural Networks (DNNs), lattice rules being a family of quasi-Monte Carlo methods. They have demonstrated effectiveness in various contexts for high-dimensional integration and function approximation. They are extremely easy to implement thanks to their very simple formulation -- all that is required is a good integer generating vector of length matching the dimensionality of the problem. In recent years there has been a burst of research activities on the application and theory of DNNs. We review our recent article on using lattice rules as training points for DNNs with a smooth activation function, where we obtained explicit regularity bounds of the DNNs. By imposing restrictions on the network parameters to match the regularity features of the target function, we prove that DNNs with tailored lattice training points can achieve good theoretical generalization error bounds, with implied constants independent of the input dimension. We also demonstrate numerically that DNNs trained with our tailored regularization perform significantly better than with standard $\\ell_2$ regularization.", "link": "http://arxiv.org/abs/2603.02809v1", "date": "2026-03-03", "relevancy": 2.2045, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.446}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4442}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4325}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=% put%20dimension.%20We%20also%20demonstrate%20numerically%20that%20DNNs%20trained%20with%20our%20tailored%20regularization%20perform%20significantly%20better%20than%20with%20standard%20%24%5Cell_2%24%20regularization.&entry.1838667208=http%3A//arxiv.org/abs/2603.02809v1&entry.124074799=Read"},
{"title": "Spatial Autoregressive Modeling of DINOv3 Embeddings for Unsupervised Anomaly Detection", "author": "Ertunc Erdil and Nico Schulthess and Guney Tombak and Ender Konukoglu", "abstract": "DINO models provide rich patch-level representations that have recently enabled strong performance in unsupervised anomaly detection (UAD). Most existing methods extract patch embeddings from ``normal'' images and model them independently, ignoring spatial and neighborhood relationships between patches. This implicitly assumes that self-attention and positional encodings sufficiently encode contextual information within each patch embedding. In addition, the normative distribution is often modeled as memory banks or prototype-based representations, which require storing large numbers of features and performing costly comparisons at inference time, leading to substantial memory and computational overhead. In this work, we address both limitations by proposing a simple and efficient framework that explicitly models spatial and contextual dependencies between patch embeddings using a 2D autoregressive (AR) model. Instead of storing embeddings or clustering prototypes, our approach learns a compact parametric model of the normative distribution via an AR convolutional neural network (CNN). At test time, anomaly detection reduces to a single forward pass through the network and enables fast and memory-efficient inference. We evaluate our method on the BMAD benchmark, which comprises three medical imaging datasets, and compare it against existing work including recent DINO-based methods. Experimental results demonstrate that explicitly modeling spatial dependencies achieves competitive anomaly detection performance while substantially reducing inference time and memory requirements. Code is available at the project page: https://eerdil.github.io/spatial-ar-dinov3-uad/.", "link": "http://arxiv.org/abs/2603.02974v1", "date": "2026-03-03", "relevancy": 2.2035, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5667}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5516}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5347}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Spatial%20Autoregressive%20Modeling%20of%20DINOv3%20Embeddings%20for%20Unsupervised%20Anomaly%20Detection&body=Title%3A%20Spatial%20Autoregressive%20Modeling%20of%20DINOv3%20Embeddings%20for%20Unsupervised%20Anomaly%20Detection%0AAuthor%3A%20Ertunc%20Erdil%20and%20Nico%20Schulthess%20and%20Guney%20Tombak%20and%20Ender%20Konukoglu%0AAbstract%3A%20DINO%20models%20provide%20rich%20patch-level%20representations%20that%20have%20recently%20enabled%20strong%20performance%20in%20unsupervised%20anomaly%20detection%20%28UAD%29.%20Most%20existing%20methods%20extract%20patch%20embeddings%20from%20%60%60normal%27%27%20images%20and%20model%20them%20independently%2C%20ignoring%20spatial%20and%20neighborhood%20relationships%20between%20patches.%20This%20implicitly%20assumes%20that%20self-attention%20and%20positional%20encodings%20sufficiently%20encode%20contextual%20information%20within%20each%20patch%20embedding.%20In%20addition%2C%20the%20normative%20distribution%20is%20often%20modeled%20as%20memory%20banks%20or%20prototype-based%20representations%2C%20which%20require%20storing%20large%20numbers%20of%20features%20and%20performing%20costly%20comparisons%20at%20inference%20time%2C%20leading%20to%20substantial%20memory%20and%20computational%20overhead.%20In%20this%20work%2C%20we%20address%20both%20limitations%20by%20proposing%20a%20simple%20and%20efficient%20framework%20that%20explicitly%20models%20spatial%20and%20contextual%20dependencies%20between%20patch%20embeddings%20using%20a%202D%20autoregressive%20%28AR%29%20model.%20Instead%20of%20storing%20embeddings%20or%20clustering%20prototypes%2C%20our%20approach%20learns%20a%20compact%20parametric%20model%20of%20the%20normative%20distribution%20via%20an%20AR%20convolutional%20neural%20network%20%28CNN%29.%20At%20test%20time%2C%20anomaly%20detection%20reduces%20to%20a%20single%20forward%20pass%20through%20the%20network%20and%20enables%20fast%20and%20memory-efficient%20inference.%20We%20evaluate%20our%20method%20on%20the%20BMAD%20benchmark%2C%20which%20comprises%20three%20medical%20imaging%20datasets%2C%20and%20compare%20it%20against%20existing%20work%20including%20recent%20DINO-based%20methods.%20Experimental%20results%20demonstrate%20that%20explicitly%20modeling%20spatial%20dependencies%20achieves%20competitive%20anomaly%20detection%20performance%20while%20substantially%20reducing%20inference%20time%20and%20memory%20requirements.%20Code%20is%20available%20at%20the%20project%20page%3A%20https%3A//eerdil.github.io/spatial-ar-dinov3-uad/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02974v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSpatial%2520Autoregressive%2520Modeling%2520of%2520DINOv3%2520Embeddings%2520for%2520Unsupervised%2520Anomaly%2520Detection%26entry.906535625%3DErtunc%2520Erdil%2520and%2520Nico%2520Schulthess%2520and%2520Guney%2520Tombak%2520and%2520Ender%2520Konukoglu%26entry.1292438233%3DDINO%2520models%2520provide%2520rich%2520patch-level%2520representations%2520that%2520have%2520recently%2520enabled%2520strong%2520performance%2520in%2520unsupervised%2520anomaly%2520detection%2520%2528UAD%2529.%2520Most%2520existing%2520methods%2520extract%2520patch%2520embeddings%2520from%2520%2560%2560normal%2527%2527%2520images%2520and%2520model%2520them%2520independently%252C%2520ignoring%2520spatial%2520and%2520neighborhood%2520relationships%2520between%2520patches.%2520This%2520implicitly%2520assumes%2520that%2520self-attention%2520and%2520positional%2520encodings%2520sufficiently%2520encode%2520contextual%2520information%2520within%2520each%2520patch%2520embedding.%2520In%2520addition%252C%2520the%2520normative%2520distribution%2520is%2520often%2520modeled%2520as%2520memory%2520banks%2520or%2520prototype-based%2520representations%252C%2520which%2520require%2520storing%2520large%2520numbers%2520of%2520features%2520and%2520performing%2520costly%2520comparisons%2520at%2520inference%2520time%252C%2520leading%2520to%2520substantial%2520memory%2520and%2520computational%2520overhead.%2520In%2520this%2520work%252C%2520we%2520address%2520both%2520limitations%2520by%2520proposing%2520a%2520simple%2520and%2520efficient%2520framework%2520that%2520explicitly%2520models%2520spatial%2520and%2520contextual%2520dependencies%2520between%2520patch%2520embeddings%2520using%2520a%25202D%2520autoregressive%2520%2528AR%2529%2520model.%2520Instead%2520of%2520storing%2520embeddings%2520or%2520clustering%2520prototypes%252C%2520our%2520approach%2520learns%2520a%2520compact%2520parametric%2520model%2520of%2520the%2520normative%2520distribution%2520via%2520an%2520AR%2520convolutional%2520neural%2520network%2520%2528CNN%2529.%2520At%2520test%2520time%252C%2520anomaly%2520detection%2520reduces%2520to%2520a%2520single%2520forward%2520pass%2520through%2520the%2520network%2520and%2520enables%2520fast%2520and%2520memory-efficient%2520inference.%2520We%2520evaluate%2520our%2520method%2520on%2520the%2520BMAD%2520benchmark%252C%2520which%2520comprises%2520three%2520medical%2520imaging%2520datasets%252C%2520and%2520compare%2520it%2520against%2520existing%2520work%2520including%2520recent%2520DINO-based%2520methods.%2520Experimental%2520results%2520demonstrate%2520that%2520explicitly%2520modeling%2520spatial%2520dependencies%2520achieves%2520competitive%2520anomaly%2520detection%2520performance%2520while%2520substantially%2520reducing%2520infer {"title": "CGL: Advancing Continual GUI Learning via Reinforcement Fine-Tuning", "author": "Zhenquan Yao and Zitong Huang and Yihan Zeng and Jianhua Han and Hang Xu and Chun-Mei Feng and Jianwei Ma and Wangmeng Zuo", "abstract": "Graphical User Interface (GUI) Agents, benefiting from recent advances in multimodal large language models (MLLM), have achieved significant development. However, due to the frequent updates of GUI applications, adapting to new tasks without forgetting old tasks in GUI continual learning remains an open problem. In this work, we reveal that while Supervised Fine-Tuning (SFT) facilitates fast adaptation, it often triggers knowledge overwriting, whereas Reinforcement Learning (RL) demonstrates an inherent resilience that shields prior interaction logic from erasure. Based on this insight, we propose a \\textbf{C}ontinual \\textbf{G}UI \\textbf{L}earning (CGL) framework that dynamically balances adaptation efficiency and skill retention by enhancing the synergy between SFT and RL. Specifically, we introduce an SFT proportion adjustment mechanism guided by policy entropy to dynamically control the weight allocation between the SFT and RL training phases. To resolve explicit gradient interference, we further develop a specialized gradient surgery strategy. By projecting exploratory SFT gradients onto GRPO-based anchor gradients, our method explicitly clips the components of SFT gradients that conflict with GRPO. On top of that, we establish an AndroidControl-CL benchmark, which divides GUI applications into distinct task groups to effectively simulate and evaluate the performance of continual GUI learning. Experimental results demonstrate the effectiveness of our proposed CGL framework across continual learning scenarios. The benchmark, code, and model will be made publicly available.", "link": "http://arxiv.org/abs/2603.02951v1", "date": "2026-03-03", "relevancy": 2.1992, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5586}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5533}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5192}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CGL%3A%20Advancing%20Continual%20GUI%20Learning%20via%20Reinforcement%20Fine-Tuning&body=Title%3A%20CGL%3A%20Advancing%20Continual%20GUI%20Learning%20via%20Reinforcement%20Fine-Tuning%0AAuthor%3A%20Zhenquan%20Yao%20and%20Zitong%20Huang%20and%20Yihan%20Zeng%20and%20Jianhua%20Han%20and%20Hang%20Xu%20and%20Chun-Mei%20Feng%20and%20Jianwei%20Ma%20and%20Wangmeng%20Zuo%0AAbstract%3A%20Graphical%20User%20Interface%20%28GUI%29%20Agents%2C%20benefiting%20from%20recent%20advances%20in%20multimodal%20large%20language%20models%20%28MLLM%29%2C%20have%20achieved%20significant%20development.%20However%2C%20due%20to%20the%20frequent%20updates%20of%20GUI%20applications%2C%20adapting%20to%20new%20tasks%20without%20forgetting%20old%20tasks%20in%20GUI%20continual%20learning%20remains%20an%20open%20problem.%20In%20this%20work%2C%20we%20reveal%20that%20while%20Supervised%20Fine-Tuning%20%28SFT%29%20facilitates%20fast%20adaptation%2C%20it%20often%20triggers%20knowledge%20overwriting%2C%20whereas%20Reinforcement%20Learning%20%28RL%29%20demonstrates%20an%20inherent%20resilience%20that%20shields%20prior%20interaction%20logic%20from%20erasure.%20Based%20on%20this%20insight%2C%20we%20propose%20a%20%5Ctextbf%7BC%7Dontinual%20%5Ctextbf%7BG%7DUI%20%5Ctextbf%7BL%7Dearning%20%28CGL%29%20framework%20that%20dynamically%20balances%20adaptation%20efficiency%20and%20skill%20retention%20by%20enhancing%20the%20synergy%20between%20SFT%20and%20RL.%20Specifically%2C%20we%20introduce%20an%20SFT%20proportion%20adjustment%20mechanism%20guided%20by%20policy%20entropy%20to%20dynamically%20control%20the%20weight%20allocation%20between%20the%20SFT%20and%20RL%20training%20phases.%20To%20resolve%20explicit%20gradient%20interference%2C%20we%20further%20develop%20a%20specialized%20gradient%20surgery%20strategy.%20By%20projecting%20exploratory%20SFT%20gradients%20onto%20GRPO-based%20anchor%20gradients%2C%20our%20method%20explicitly%20clips%20the%20components%20of%20SFT%20gradients%20that%20conflict%20with%20GRPO.%20On%20top%20of%20that%2C%20we%20establish%20an%20AndroidControl-CL%20benchmark%2C%20which%20divides%20GUI%20applications%20into%20distinct%20task%20groups%20to%20effectively%20simulate%20and%20evaluate%20the%20performance%20of%20continual%20GUI%20learning.%20Experimental%20results%20demonstrate%20the%20effectiveness%20of%20our%20proposed%20CGL%20framework%20across%20continual%20learning%20scenarios.%20The%20benchmark%2C%20code%2C%20and%20model%20will%20be%20made%20publicly%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02951v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCGL%253A%2520Advancing%2520Continual%2520GUI%2520Learning%2520via%2520Reinforcement%2520Fine-Tuning%26entry.906535625%3DZhenquan%2520Yao%2520and%2520Zitong%2520Huang%2520and%2520Yihan%2520Zeng%2520and%2520Jianhua%2520Han%2520and%2520Hang%2520Xu%2520and%2520Chun-Mei%2520Feng%2520and%2520Jianwei%2520Ma%2520and%2520Wangmeng%2520Zuo%26entry.1292438233%3DGraphical%2520User%2520Interface%2520%2528GUI%2529%2520Agents%252C%2520benefiting%2520from%2520recent%2520advances%2520in%2520multimodal%2520large%2520language%2520models%2520%2528MLLM%2529%252C%2520have%2520achieved%2520significant%2520development.%2520However%252C%2520due%2520to%2520the%2520frequent%2520updates%2520of%2520GUI%2520applications%252C%2520adapting%2520to%2520new%2520tasks%2520without%2520forgetting%2520old%2520tasks%2520in%2520GUI%2520continual%2520learning%2520remains%2520an%2520open%2520problem.%2520In%2520this%2520wor {"title": "Self-supervised Domain Adaptation for Visual 3D Pose Estimation of Nano-drone Racing Gates by Enforcing Geometric Consistency", "author": "Nicholas Carlotti and Michele Antonazzi and Elia Cereda and Mirko Nava and Nicola Basilico and Daniele Palossi and Alessandro Giusti", "abstract": "We consider the task of visually estimating the relative pose of a drone racing gate in front of a nano-quadrotor, using a convolutional neural network pre-trained on simulated data to regress the gate's pose. Due to the sim-to-real gap, the pre-trained model underperforms in the real world and must be adapted to the target domain. We propose an unsupervised domain adaptation (UDA) approach using only real image sequences collected by the drone flying an arbitrary trajectory in front of a gate; sequences are annotated in a self-supervised fashion with the drone's odometry as measured by its onboard sensors. On this dataset, a state consistency loss enforces that two images acquired at different times yield pose predictions that are consistent with the drone's odometry. Results indicate that our approach outperforms other SoA UDA approaches, has a low mean absolute error in position (x=26, y=28, z=10 cm) and orientation ($\u03c8$=13${^{\\circ}}$), an improvement of 40% in position and 37% in orientation over a baseline. The approach's effectiveness is appreciable with as few as 10 minutes of real-world flight data and yields models with an inference time of 30.4ms (33 fps) when deployed aboard the Crazyflie 2.1 Brushless nano-drone.", "link": "http://arxiv.org/abs/2603.02936v1", "date": "2026-03-03", "relevancy": 2.1971, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5731}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5577}, {"title": "u {"title": "Coalgebras for categorical deep learning: Representability and universal approximation", "author": "Dragan Ma\u0161ulovi\u0107", "abstract": "Categorical deep learning (CDL) has recently emerged as a framework that leverages category theory to unify diverse neural architectures. While geometric deep learning (GDL) is grounded in the specific context of invariants of group actions, CDL aims to provide domain-independent abstractions for reasoning about models and their properties. In this paper, we contribute to this program by developing a coalgebraic foundation for equivariant representation in deep learning, as classical notions of group actions and equivariant maps are naturally generalized by the coalgebraic formalism. Our first main result demonstrates that, given an embedding of data sets formalized as a functor from SET to VECT, and given a notion of invariant behavior on data sets modeled by an endofunctor on SET, there is a corresponding endofunctor on VECT that is compatible with the embedding in the sense that this lifted functor recovers the analogous notion of invariant behavior on the embedded data. Building on this foundation, we then establish a universal approximation theorem for equivariant maps in this generalized setting. We show that continuous equivariant functions can be approximated within our coalgebraic framework for a broad class of symmetries. This work thus provides a categorical bridge between the abstract specification of invariant behavior and its concrete realization in neural architectures.", "link": "http://arxiv.org/abs/2603.03227v1", "date": "2026-03-03", "relevancy": 2.1895, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4456}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4343}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4338}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Coalgebras%20for%20categorical%20deep%20learning%3A%20Representability%20and%20universal%20approximation&body=Title%3A%20Coalgebras%20for%20categorical%20deep%20learning%3A%20Representability%20and%20universal%20approximation%0AAuthor%3A%20Dragan%20Ma%C5%A1ulovi%C4%87%0AAbstract%3A%20Categorical%20deep%20learning%20%28CDL%29%20has%20recently%20emerged%20as%20a%20framework%20that%20leverages%20category%20theory%20to%20unify%20diverse%20neural%20architectures.%20While%20geometric%20deep%20learning%20%28GDL%29%20is%20grounded%20in%20the%20specific%20context%20of%20invariants%20of%20group%20actions%2C%20CDL%20aims%20to%20provide%20domain-independent%20abstractions%20for%20reasoning%20about%20models%20and%20their%20properties.%20In%20this%20paper%2C%20we%20contribute%20to%20this%20program%20by%20developing%20a%20coalgebraic%20foundation%20for%20equivariant%20representation%20in%20deep%20learning%2C%20as%20classical%20notions%20of%20group%20actions%20and%20equivariant%20maps%20are%20naturally%20generalized%20by%20the%20coalgebraic%20formalism.%20Our%20first%20main%20result%20demonstrates%20that%2C%20given%20an%20embedding%20of%20data%20sets%20formalized%20as%20a%20functor%20from%20SET%20to%20VECT%2C%20and%20given%20a%20notion%20of%20invariant%20behavior%20on%20data%20sets%20modeled%20by%20an%20endofunctor%20on%20SET%2C%20there%20is%20a%20corresponding%20endofunctor%20on%20VECT%20that%20is%20compatible%20with%20the%20embedding%20in%20the%20sense%20that%20this%20lifted%20functor%20recovers%20the%20analogous%20notion%20of%20invariant%20behavior%20on%20the%20embedded%20data.%20Building%20on%20this%20foundation%2C%20we%20then%20establish%20a%20universal%20approximation%20theorem%20for%20equivariant%20maps%20in%20this%20generalized%20setting.%20We%20show%20that%20continuous%20equivariant%20functions%20can%20be%20approximated%20within%20our%20coalgebraic%20framework%20for%20a%20broad%20class%20of%20symmetries.%20This%20work%20thus%20provides%20a%20categorical%20bridge%20between%20the%20abstract%20specification%20of%20invariant%20behavior%20and%20its%20concrete%20realization%20in%20neural%20architectures.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03227v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCoalgebras%2520for%2520categorical%2520deep%2520learning%253A%2520Representability%2520and%2520universal%2520approximation%26entry.906535625%3DDragan%2520Ma%25C5%25A1ulovi%25C4%2587%26entry.1292438233%3DCategorical%2520deep%2520learning%2520%2528CDL%2529%2520has%2520recently%2520emerged%2520as%2520a%2520framework%2520that%2520leverages%2520category%2520theory%2520to%2520unify%2520diverse%2520neural%2520architectures.%2520While%2520geometric%2520deep%2520learning%2520%2528GDL%2529%2520is%2520grounded%2520in%2520the%2520specific%2520context%2520of%2520invariants%2520of%2520group%2520actions%252C%2520CDL%2520aims%2520to%2520provide%2520domain-independent%2520abstractions%2520for%2520reasoning%2520about%2520models%2520and%2520their%2520properties.%2520In%2520this%2520paper%252C%2520we%2520contribute%2520to%2520this%2520program%2520by%2520developing%2520a%2520coalgebraic%2520foundation%2520for%2520equivariant%2520representation%2520in%2520deep%2520learning%252C%2520as%2520classical%2520notions%2520of%2520group%2520actions%2520and%2520equivariant%2520maps%2520are%2520naturally%2520generalized%2520by%2520the%2520coalgebraic%2520formalism.%2520Our%2520first%2520main%2520result%2520demonstrates%2520that%252C%2520given%2520an%2520embedding%2520of%2520data%2520sets%2520formalized%2520as%2520a%2520functor%2520from%2520SET%2520to%2520VECT%252C%2520and%2520given%2520a%2520notion%2520of%2520invariant%2520behavior%2520on%2520data%2520sets%2520modeled%2520by%2520an%2520endofunctor%2520on%2520SET%252C%2520there%2520is%2520a%2520corresponding%2520endofunctor%2520on%2520VECT%2520that%2520is%2520compatible%2520with%2520the%2520embedding%2520in%2520the%2520sense%2520that%2520this%2520lifted%2520functor%2520recovers%2520the%2520analogous%2520notion%2520of%2520invariant%2520behavior%2520on%2520the%2520embedded%2520data.%2520Building%2520on%2520this%2520foundation%252C%2520we%2520then%2520establish%2520a%2520universal%2520approximation%2520theorem%2520for%2520equivariant%2520maps%2520in%2520this%2520generalized%2520setting.%2520We%2520show%2520that%2520continuous%2520equivariant%2520functions%2520can%2520be%2520approximated%2520within%2520our%2520coalgebraic%2520framework%2520for%2520a%2520broad%2520class%2520of%2520symmetries.%2520This%2520work%2520thus%2520provides%2520a%2520categorical%2520bridge%2520between%2520the%2520abstract%2520specification%2520of%2520invariant%2520behavior%2520and%2520its%2520concrete%2520realization%2520in%2520neural%2520architectures.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.03227v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Coalgebras%20for%20categorical%20deep%20learning%3A%20Representability%20and%20universal%20approximation&entry.906535625=Dragan%20Ma%C5%A1ulovi%C4%87&entry.1292438233=Categorical%20deep%20learning%20%28CDL%29%20has%20recently%20emerged%20as%20a%20framework%20that%20leverages%20category%20theory%20to%20unify%20diverse%20neural%20architectures.%20While%20geometric%20deep%20learning%20%28GDL%29%20is%20grounded%20in%20the%20specific%20context%20of%20invariants%20of%20group%20actions%2C%20CDL%20aims%20to%20provide%20domain-independent%20abstractions%20for%20reasoning%20about%20models%20and%20their%20properties.%20In%20this%20paper%2C%20we%20contribute%20to%20this%20program%20by%20developing%20a%20coalgebraic%20foundation%20for%20equivariant%20representation%20in%20deep%20learning%2C%20as%20classical%20notions%20of%20group%20actions%20and%20equivariant%20maps%20are%20naturally%20generalized%20by%20the%20coalgebraic%20formalism.%20Our%20first%20main%20result%20demonstrates%20that%2C%20given%20an%20embedding%20of%20data%20sets%20formalized%20as%20a%20functor%20from%20SET%20to%20VECT%2C%20and%20given%20a%20notion%20of%20invariant%20behavior%20on%20data%20sets%20modeled%20by%20an%20endofunctor%20on%20SET%2C%20there%20is%20a%20corresponding%20endofunctor%20on%20VECT%20that%20is%20compatible%20with%20the%20embedding%20in%20the%20sense%20that%20this%20lifted%20functor%20recovers%20the%20analogous%20notion%20of%20invariant%20behavior%20on%20the%20embedded%20data.%20Building%20on%20this%20foundation%2C%20we%20then%20establish%20a%20universal%20approximation%20theorem%20for%20equivariant%20maps%20in%20this%20generalized%20setting.%20We%20show%20that%20continuous%20equivariant%20functions%20can%20be%20approximated%20within%20our%20coalgebraic%20framework%20for%20a%20broad%20class%20of%20symmetries.%20This%20work%20thus%20provides%20a%20categorical%20bridge%20between%20the%20abstract%20specification%20of%20invariant%20behavior%20and%20its%20concrete%20realization%20in%20neural%20architectures.&entry.1838667208=http%3A//arxiv.org/abs/2603.03227v1&entry.124074799=Read"},
{"title": "Cycle-Consistent Multi-Graph Matching for Self-Supervised Annotation of C.Elegans", "author": "Christoph Karg and Sebastian Stricker and Lisa Hutschenreiter and Bogdan Savchynskyy and Dagmar Kainmueller", "abstract": "In this work we present a novel approach for unsupervised multi-graph matching, which applies to problems for which a Gaussian distribution of keypoint features can be assumed. We leverage cycle consistency as loss for self-supervised learning, and determine Gaussian parameters through Bayesian Optimization, yielding a highly efficient approach that scales to large datasets. Our fully unsupervised approach enables us to reach the accuracy of state-of-the-art supervised methodology for the biomedical use case of semantic cell annotation in 3D microscopy images of the worm C. elegans. To this end, our approach yields the first unsupervised atlas of C. elegans, i.e. a model of the joint distribution of all of its cell nuclei, without the need for any ground truth cell annotation. This advancement enables highly efficient semantic annotation of cells in large microscopy datasets, overcoming a current key bottleneck. Beyond C. elegans, our approach offers fully unsupervised construction of cell-level atlases for any model organism with a stereotyped body plan down to the level of unique semantic cell labels, and thus bears the potential to catalyze respective biomedical studies in a range of further species.", "link": "http://arxiv.org/abs/2503.07348v3", "date": "2026-03-03", "relevancy": 2.1644, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5604}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5305}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5193}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Cycle-Consistent%20Multi-Graph%20Matching%20for%20Self-Supervised%20Annotation%20of%20C.Elegans&body=Title%3A%20Cycle-Consistent%20Multi-Graph%20Matching%20for%20Self-Supervised%20Annotation%20of%20C.Elegans%0AAuthor%3A%20Christoph%20Karg%20and%20Sebastian%20Stricker%20and%20Lisa%20Hutschenreiter%20and%20Bogdan%20Savchynskyy%20and%20Dagmar%20Kainmueller%0AAbstract%3A%20In%20this%20work%20we%20present%20a%20novel%20approach%20for%20unsupervised%20multi-graph%20matching%2C%20which%20applies%20to%20problems%20for%20which%20a%20Gaussian%20distribution%20of%20keypoint%20features%20can%20be%20assumed.%20We%20leverage%20cycle%20consistency%20as%20loss%20for%20self-supervised%20learning%2C%20and%20determine%20Gaussian%20parameters%20through%20Bayesian%20Optimization%2C%20yielding%20a%20highly%20efficient%20approach%20that%20scales%20to%20large%20datasets.%20Our%20fully%20unsupervised%20approach%20enables%20us%20to%20reach%20the%20accuracy%20of%20state-of-the-art%20supervised%20methodology%20for%20the%20biomedical%20use%20case%20of%20semantic%20cell%20annotation%20in%203D%20microscopy%20images%20of%20the%20worm%20C.%20elegans.%20To%20this%20end%2C%20our%20approach%20yields%20the%20first%20unsupervised%20atlas%20of%20C.%20elegans%2C%20i.e.%20a%20model%20of%20the%20joint%20distribution%20of%20all%20of%20its%20cell%20nuclei%2C%20without%20the%20need%20for%20any%20ground%20truth%20cell%20annotation.%20This%20advancement%20enables%20highly%20efficient%20semantic%20annotation%20of%20cells%20in%20large%20microscopy%20datasets%2C%20overcoming%20a%20current%20key%20bottleneck.%20Beyond%20C.%20elegans%2C%20our%20approach%20offers%20fully%20unsupervised%20construction%20of%20cell-level%20atlases%20for%20any%20model%20organism%20with%20a%20stereotyped%20body%20plan%20down%20to%20the%20level%20of%20unique%20semantic%20cell%20labels%2C% {"title": "Beyond One-Size-Fits-All: Adaptive Subgraph Denoising for Zero-Shot Graph Learning with Large Language Models", "author": "Fengzhi Li and Liang Zhang and Yuan Zuo and Ruiqing Zhao and YanSong Liu and Yunfei Ma and Fanyu Meng and Junlan Feng", "abstract": "Graph-based tasks in the zero-shot setting remain a significant challenge due to data scarcity and the inability of traditional Graph Neural Networks (GNNs) to generalize to unseen domains or label spaces. While recent advancements have transitioned toward leveraging Large Language Models (LLMs) as predictors to enhance GNNs, these methods often suffer from cross-modal alignment issues. A recent paradigm (i.e., Graph-R1) overcomes the aforementioned architectural dependencies by adopting a purely text-based format and utilizing LLM-based graph reasoning, showing improved zero-shot generalization. However, it employs a task-agnostic, one-size-fits-all subgraph extraction strategy, which inevitably introduces significant structural noise--irrelevant neighbors and edges--that distorts the LLMs' receptive field and leads to suboptimal predictions. To address this limitation, we introduce GraphSSR, a novel framework designed for adaptive subgraph extraction and denoising in zero-shot LLM-based graph reasoning. Specifically, we propose the SSR pipeline, which dynamically tailors subgraph extraction to specific contexts through a \"Sample-Select-Reason\" process, enabling the model to autonomously filter out task-irrelevant neighbors and overcome the one-size-fits-all issue. To internalize this capability, we develop SSR-SFT, a data synthesis strategy that generates high-quality SSR-style graph reasoning traces for supervised fine-tuning of LLMs. Furthermore, we propose SSR-RL, a two-stage reinforcement learning framework that explicitly regulates sampling and selection operations within the proposed SSR pipeline designed for adaptive subgraph denoising. By incorporating Authenticity-Reinforced and Denoising-Reinforced RL, we guide the model to achieve accurate predictions using parsimonious, denoised subgraphs for reasoning.", "link": "http://arxiv.org/abs/2603.02938v1", "date": "2026-03-03", "relevancy": 2.1603, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5654}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5247}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5151}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20One-Size-Fits-All%3A%20Adaptive%20Subgraph%20Denoising%20for%20Zero-Shot%20Graph%20Learning%20with%20Large%20Language%20Models&body=Title%3A%20Beyond%20One-Size-Fits-All%3A%20Adaptive%20Subgraph%20Denoising%20for%20Zero-Shot%20Graph%20Learning%20with%20Large%20Language%20Models%0AAuthor%3A%20Fengzhi%20Li%20and%20Liang%20Zhang%20and%20Yuan%20Zuo%20and%20Ruiqing%20Zhao%20and%20YanSong%20Liu%20and%20Yunfei%20Ma%20and%20Fanyu%20Meng%20and%20Junlan%20Feng%0AAbstract%3A%20Graph-based%20tasks%20in%20the%20zero-shot%20setting%20remain%20a%20significant%20challenge%20due%20to%20data%20scarcity%20and%20the%20inability%20of%20traditional%20Graph%20Neural%20Networks%20%28GNNs%29%20to%20generalize%20to%20unseen%20domains%20or%20label%20spaces.%20While%20recent%20advancements%20have%20transitioned%20toward%20leveraging%20Large%20Language%20Models%20%28LLMs%29%20as%20predictors%20to%20enhance%20GNNs%2C%20these%20methods%20often%20suffer%20from%20cross-modal%20alignment%20issues.%20A%20recent%20paradigm%20%28i.e.%2C%20Graph-R1%29%20overcomes%20the%20aforementioned%20architectural%20dependencies%20by%20adopting%20a%20purely%20text-based%20format%20and%20utilizing%20LLM-based%20graph%20reasoning%2C%20showing%20improved%20zero-shot%20generalization.%20However%2C%20it%20employs%20a%20task-agnostic%2C%20one-size-fits-all%20subgraph%20extraction%20strategy%2C%20which%20inevitably%20introduces%20significant%20structural%20noise--irrelevant%20neighbors%20and%20edges--that%20distorts%20the%20LLMs%27%20receptive%20field%20and%20leads%20to%20suboptimal%20predictions.%20To%20address%20this%20limitation%2C%20we%20introduce%20GraphSSR%2C%20a%20novel%20framework%20designed%20for%20adaptive%20subgraph%20extraction%20and%20denoising%20in%20zero-shot%20LLM-based%20graph%20reasoning.%20Specifically%2C%20we%20propose%20the%20SSR%20pipeline%2C%20which%20dynamically%20tailors%20subgraph%20extraction%20to%20specific%20contexts%20through%20a%20%22Sample-Select-Reason%22%20process%2C%20enabling%20the%20model%20to%20autonomously%20filter%20out%20task-irrelevant%20neighbors%20and%20overcome%20the%20one-size-fits-all%20issue.%20To%20internalize%20this%20capability%2C%20we%20develop%20SSR-SFT%2C%20a%20data%20synthesis%20strategy%20that%20generates%20high-quality%20SSR-style%20graph%20reasoning%20traces%20for%20supervised%20fine-tuning%20of%20LLMs.%20Furthermore%2C%20we%20propose%20SSR-RL%2C%20a%20two-stage%20reinforcement%20learning%20framework%20that%20explicitly%20regulates%20sampling%20and%20selection%20operations%20within%20the%20proposed%20SSR%20pipeline%20designed%20for%20adaptive%20subgraph%20denoising.%20By%20incorporating%20Authenticity-Reinforced%20and%20Denoising-Reinforced%20RL%2C%20we%20guide%20the%20model%20to%20achieve%20accurate%20predictions%20using%20parsimonious%2C%20denoised%20subgraphs%20for%20reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02938v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520One-Size-Fits-All%253A%2520Adaptive%2520Subgraph%2520Denoising%2520for%2520Zero-Shot%2520Graph%2520Learning%2520with%2520Large%2520Language%2520Models%26entry.906535625%3DFengzhi%2520Li%2520and%2520Liang%2520Zhang%2520and%2520Y {"title": "MoD-DPO: Towards Mitigating Cross-modal Hallucinations in Omni LLMs using Modality Decoupled Preference Optimization", "author": "Ashutosh Chaubey and Jiacheng Pang and Mohammad Soleymani", "abstract": "Omni-modal large language models (omni LLMs) have recently achieved strong performance across audiovisual understanding tasks, yet they remain highly susceptible to cross-modal hallucinations arising from spurious correlations and dominant language priors. In this work, we propose Modality-Decoupled Direct Preference Optimization (MoD-DPO), a simple and effective framework for improving modality grounding in omni LLMs. MoD-DPO introduces modality-aware regularization terms that explicitly enforce invariance to corruptions in irrelevant modalities and sensitivity to perturbations in relevant modalities, thereby reducing unintended cross-modal interactions. To further mitigate over-reliance on textual priors, we incorporate a language-prior debiasing penalty that discourages hallucination-prone text-only responses. Extensive experiments across multiple audiovisual hallucination benchmarks demonstrate that MoD-DPO consistently improves perception accuracy and hallucination resistance, outperforming previous preference optimization baselines under similar training budgets. Our findings underscore the importance of modality-faithful alignment and demonstrate a scalable path toward more reliable and resilient multimodal foundation models.", "link": "http://arxiv.org/abs/2603.03192v1", "date": "2026-03-03", "relevancy": 2.1567, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5403}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5403}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv. oward%20more%20reliable%20and%20resilient%20multimodal%20foundation%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03192v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMoD-DPO%253A%2520Towards%2520Mitigating%2520Cross-modal%2520Hallucinations%2520in%2520Omni%2520LLMs%2520using%2520Modality%2520Decoupled%2520Preference%2520Optimization%26entry.906535625%3DAshutosh%2520Chaubey%2520and%2520Jiacheng%2520Pang%2520and%2520Mohammad%2520Soleymani%26entry.1292438233%3DOmni-modal%2520large%2520language%2520models%2520%2528omni%2520LLMs%2529%2520have%2520recently%2520achieved%2520strong%2520performance%2520across%2520audiovisual%2520understanding%2520tasks%252C%2520yet%2520they%2520remain%2520highly%2520susceptible%2520to%2520cross-modal%2520hallucinations%2520arising%2520from%2520spurious%2520correlations%2520and%2520dominant%2520language%2520priors.%2520In%2520this%2520work%252C%2520we%2520propose%2520Modality-Decoupled%2520Direct%2520Preference%2520Optimization%2520%2528MoD-DPO%2529%252C%2520a%2520simple%2520and%2520effective%2520framework%2520for%2520improving%2520modality%2520grounding%2520in%2520omni%2520LLMs.%2520MoD-DPO%2520introduces%2520modality-aware%2520regularization%2520terms%2520that%2520explicitly%2520enforce%2520invariance%2520to%2520corruptions%2520in%2520irrelevant%2520modalities%2520and%2520sensitivity%2520to%2520perturbations%2520in%2520relevant%2520modalities%252C%2520thereby%2520reducing%2520unintended%2520cross-modal%2520interactions.%2520To%2520further%2520mitigate%2520over-reliance%2520on%2520textual%2520priors%252C%2520we%2520incorporate%2520a%2520language-prior%2520debiasing%2520penalty%2520that%2520discourages%2520hallucination-prone%2520text-only%2520responses.%2520Extensive%2520experiments%2520across%2520multiple%2520audiovisual%2520hallucination%2520benchmarks%2520demonstrate%2520that%2520MoD-DPO%2520consistently%2520improves%2520perception%2520accuracy% {"title": "BRIGHT: A Collaborative Generalist-Specialist Foundation Model for Breast Pathology", "author": "Xiaojing Guo and Jiatai Lin and Yumian Jia and Jingqi Huang and Zeyan Xu and Weidong Li and Longfei Wang and Jingjing Chen and Qin Li and Weiwei Wang and Lifang Cui and Wen Yue and Zhiqiang Cheng and Xiaolong Wei and Jianzhong Yu and Xia Jin and Baizhou Li and Honghong Shen and Jing Li and Chunlan Li and Yanfen Cui and Yi Dai and Yiling Yang and Xiaolong Qian and Liu Yang and Yang Yang and Guangshen Gao and Yaqing Li and Lili Zhai and Chenying Liu and Tianhua Zhang and Zhenwei Shi and Cheng Lu and Xingchen Zhou and Jing Xu and Miaoqing Zhao and Fang Mei and Jiaojiao Zhou and Ning Mao and Fangfang Liu and Chu Han and Zaiyi Liu", "abstract": "Generalist pathology foundation models (PFMs), pretrained on large-scale multi-organ datasets, have demonstrated remarkable predictive capabilities across diverse clinical applications. However, their proficiency on the full spectrum of clinically essential tasks within a specific organ system remains an open question due to the lack of large-scale validation cohorts for a single organ as well as the absence of a tailored training paradigm that can effectively translate broad histomorphological knowledge into the organ-specific expertise required for specialist-level interpretation. In this study, we propose BRIGHT, the first PFM specifically designed for breast pathology, trained on approximately 210 million histopathology tiles from over 51,000 breast whole-slide images derived from a cohort of over 40,000 patients across 19 hospitals. BRIGHT employs a collaborative generalist-specialist framework to capture both universal and organ-specific features. To comprehensively evaluate the performance of PFMs on breast oncology, we curate the largest multi-institutional cohorts to date for downstream task development and evaluation, comprising over 25,000 WSIs across 10 hospitals. The validation cohorts cover the full spectrum of breast pathology across 24 distinct clinical tasks spanning diagnosis, biomarker prediction, treatment response and survival prediction. Extensive experiments demonstrate that BRIGHT outperforms three leading generalist PFMs, achieving state-of-the-art (SOTA) performance in 21 of 24 internal validation tasks and in 5 of 10 external validation tasks with excellent heatmap interpretability. By evaluating on large-scale validation cohorts, this study not only demonstrates BRIGHT's clinical utility in breast oncology but also validates a collaborative generalist-specialist paradigm, providing a scalable template for developing PFMs on a specific organ system.", "link": "http://arxiv.org/abs/2603.03030v1", "date": "2026-03-03", "relevancy": 2.1475, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.433}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.433}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4226}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BRIGHT%3A%20A%20Collaborative%20Generalist-Specialist%20Foundation%20Model%20for%20Breast%20Pathology&body=Title%3A%20BRIGHT%3A%20A%20Collaborative%20Generalist-Specialist%20Foundation%20Model%20for%20Breast%20Pathology%0AAuthor%3A%20Xiaojing%20Guo%20and%20Jiatai%20Lin%20and%20Yumian%20Jia%20and%20Jingqi%20Huang%20and%20Zeyan%20Xu%20and%20Weidong%20Li%20and%20Longfei%20Wang%20and%20Jingjing%20Chen%20and%20Qin%20Li%20and%20Weiwei%20Wang%20and%20Lifang%20Cui%20and%20Wen%20Yue%20and%20Zhiqiang%20Cheng%20and%20Xiaolong%20Wei%20and%20Jianzhong%20Yu%20and%20Xia%20Jin%20and%20Baizhou%20Li%20and%20Honghong%20Shen%20and%20Jing%20Li%20and%20Chunlan%20Li%20and%20Yanfen%20Cui%20and%20Yi%20Dai%20and% {"title": "MLV-Edit: Towards Consistent and Highly Efficient Editing for Minute-Level Videos", "author": "Yangyi Cao and Yuanhang Li and Lan Chen and Qi Mao", "abstract": "We propose MLV-Edit, a training-free, flow-based framework that address the unique challenges of minute-level video editing. While existing techniques excel in short-form video manipulation, scaling them to long-duration videos remains challenging due to prohibitive computational overhead and the difficulty of maintaining global temporal consistency across thousands of frames. To address this, MLV-Edit employs a divide-and-conquer strategy for segment-wise editing, facilitated by two core modules: Velocity Blend rectifies motion inconsistencies at segment boundaries by aligning the flow fields of adjacent chunks, eliminating flickering and boundary artifacts commonly observed in fragmented video processing; and Attention Sink anchors local segment features to global reference frames, effectively suppressing cumulative structural drift. Extensive quantitative and qualitative experiments demonstrate that MLV-Edit consistently outperforms state-of-the-art methods in terms of temporal stability and semantic fidelity.", "link": "http://arxiv.org/abs/2602.02123v2", "date": "2026-03-03", "relevancy": 2.1383, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5919}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5362}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5101}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MLV-Edit%3A%20Towards%20Consistent%20and%20Highly%20Efficient%20Editing%20for%20Minute-Level%20Videos&body=Title%3A%20MLV-Edit%3A%20Towards%20Consistent%20and%20Highly%20Efficient%20Editing%20for%20Minute-Level%20Videos%0AAuthor%3A%20Yangyi%20Cao%20and%20Yuanhang%20Li%20and%20Lan%20Chen%20and%20Qi%20Mao%0AAbstract%3A%20We%20propose%20MLV-Edit%2C%20a%20training-free%2C%20flow-based%20framework%20that%20address%20the%20unique%20challenges%20of%20minute-level%20video%20editing.%20While%20existing%20techniques%20excel%20in%20short-form%20video%20manipulation%2C%20scaling%20them%20to%20long-duration%20videos%20remains%20challenging%20due%20to%20prohibitive%20computational%20overhead%20and%20the%20difficulty%20of%20maintaining%20global%20temporal%20consistency%20across%20thousands%20of%20frames.%20To%20address%20this%2C%20MLV-Edit%20employs%20a%20divide-and-conquer%20strategy%20for%20segment-wise%20editing%2C%20facilitated%20by%20two%20core%20modules%3A%20Velocity%20Blend%20rectifies%20motion%20inconsistencies%20at%20segment%20boundaries%20by%20aligning%20the%20flow%20fields%20of%20adjacent%20chunks%2C%20eliminating%20flickering%20and%20boundary%20artifacts%20commonly%20observed%20in%20fragmented%20video%20processing%3B%20and%20Attention%20Sink%20anchors%20local%20segment%20features%20to%20global%20reference%20frames%2C%20effectively%20suppressing%20cumulative%20structural%20drift.%20Extensive%20quantitative%20and%20qualitative%20experiments%20demonstrate%20that%20MLV-Edit%20consistently%20outperforms%20state-of-the-art%20methods%20in%20terms%20of%20temporal%20stability%20and%20semantic%20fidelity.%0ALink%3A%20http%3A//arxiv.org/abs/2602.02123v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMLV-Edit%253A%2520Towards%2520Consistent%2520and%2520Highly%2520Efficient%2520Editing%2520for%2520Minute-Level%2520Videos%26entry.906535625%3DYangyi%2520Cao%2520and%2520Yuanhang%2520Li%2520and%2520Lan%2520Chen%2520and%2520Qi%2520Mao%26entry.1292438233%3DWe%2520propose%2520MLV-Edit%252C%2520a%2520training-free%252C%2520flow-based%2520framework%2520that%2520address {"title": "From Complex Dynamics to DynFormer: Rethinking Transformers for PDEs", "author": "Pengyu Lai and Yixiao Chen and Dewu Yang and Rui Wang and Feng Wang and Hui Xu", "abstract": "Partial differential equations (PDEs) are fundamental for modeling complex physical systems, yet classical numerical solvers face prohibitive computational costs in high-dimensional and multi-scale regimes. While Transformer-based neural operators have emerged as powerful data-driven alternatives, they conventionally treat all discretized spatial points as uniform, independent tokens. This monolithic approach ignores the intrinsic scale separation of physical fields, applying computationally prohibitive global attention that redundantly mixes smooth large-scale dynamics with high-frequency fluctuations. Rethinking Transformers through the lens of complex dynamics, we propose DynFormer, a novel dynamics-informed neural operator. Rather than applying a uniform attention mechanism across all scales, DynFormer explicitly assigns specialized network modules to distinct physical scales. It leverages a Spectral Embedding to isolate low-frequency modes, enabling a Kronecker-structured attention mechanism to efficiently capture large-scale global interactions with reduced complexity. Concurrently, we introduce a Local-Global-Mixing transformation. This module utilizes nonlinear multiplicative frequency mixing to implicitly reconstruct the small-scale, fast-varying turbulent cascades that are slaved to the macroscopic state, without incurring the cost of global attention. Integrating these modules into a hybrid evolutionary architecture ensures robust long-term temporal stability. Extensive memory-aligned evaluations across four PDE benchmarks demonstrate that DynFormer achieves up to a 95% reduction in relative error compared to state-of-the-art baselines, while significantly reducing GPU memory consumption. Our results establish that embedding first-principles physical dynamics into Transformer architectures yields a highly scalable, theoretically grounded blueprint for PDE surrogate modeling.", "link": "http://arxiv.org/abs/2603.03112v1", "date": "2026-03-03", "relevancy": 2.1354, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.6252}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5217}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5095}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Complex%20Dynamics%20to%20DynFormer%3A%20Rethinking%20Transformers%20for%20PDEs&body=Title%3A%20From%20Complex%20Dynamics%20to%20DynFormer%3A%20Rethinking%20Transformers%20for%20PDEs%0AAuthor%3A%20Pengyu%20Lai%20and%20Yixiao%20Chen%20and%20Dewu%20Yang%20and%20Rui%20Wang%20and%20Feng%20Wang%20and%20Hui%20Xu%0AAbstract%3A%20Partial%20differential%20equations%20%28PDEs%29%20are%20fundamental%20for%20modeling%20complex%20physical%20systems%2C%20yet%20classical%20numerical%20solvers%20face%20prohibitive%20computational%20costs%20in%20high-dimensional%20and%20multi-scale%20regimes.%20While%20Transformer-based%20neural%20operators%20have%20emerged%20as%20powerful%20data-driven%20alternatives%2C%20they%20conventionally%20treat%20all%20discretized%20spatial%20points%20as%20uniform%2C%20independent%20tokens.%20This%20monolithic%20approach%20ignores%20the%20intrinsic%20scale%20separation%20of%20physical%20fields%2C%20applying%20computationally%20prohibitive%20global%20attention%20that%20redundantly%20mixes%20smooth%20large-scale%20dynamics%20with%20high-frequency%20fluctuations.%20Rethinking%20Transformers%20through%20the%20lens%20of%20complex%20dynamics%2C%20we%20propose%20DynFormer%2C%20a%20novel%20dynamics-informed%20neural%20operator.%20Rather%20than%20applying%20a%20uniform%20attention%20mechanism%20across%20all%20scales%2C%20DynFormer%20explicitly%20assigns%20specialized%20network%20modules%20to%20distinct%20physical%20scales.%20It%20leverages%20a%20Spectral%20Embedding%20to%20isolate%20low-frequency%20modes%2C%20enabling%20a%20Kronecker-structured%20attention%20mechanism%20to%20efficiently%20capture%20large-scale%20global%20interactions%20with%20reduced%20complexity.%20Concurrently%2C%20we%20introduce%20a%20Local-Global-Mixing%20transformation.%20This%20module%20utilizes%20nonlinear%20multiplicative%20frequency%20mixing%20to%20implicitly%20reconstruct%20the%20small-scale%2C%20fast-varying%20turbulent%20cascades%20that%20are%20slaved%20to%20the%20macroscopic%20state%2C%20without%20incurring%20the%20cost%20of%20global%20attention.%20Integrating%20these%20modules%20into%20a%20hybrid%20evolutionary%20architecture%20ensures%20robust%20long-term%20temporal%20stability.%20Extensive%20memory-aligned%20evaluations%20across%20four%20PDE%20benchmarks%20demonstrate%20that%20DynFormer%20achieves%20up%20to%20a%2095%25%20reduction%20in%20relative%20error%20compared%20to%20state-of-the-art%20baselines%2C%20while%20significantly%20reducing%20GPU%20memory%20consumption.%20Our%20results%20establish%20that%20embedding%20first-principles%20physical%20dynamics%20into%20Transformer%20architectures%20yields%20a%20highly%20scalable%2C%20theoretically%20grounded%20blueprint%20for%20PDE%20surrogate%20modeling.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03112v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Complex%2520Dynamics%2520to%2520DynFormer%253A%2520Rethinking%2520Transformers%2520for%2520PDEs%26entry.906535625%3DPengyu%2520Lai%2520and%2520Yixiao%2520Chen%2520and%2520Dewu%2520Yang%2520and%2520Rui%2520Wang%2520and%2520Feng%2520Wang%2520and%2520Hui%2520Xu%26entry.1292438233%3DPartial%2520differential%2520equations%2520%2528PDEs%2529%2520are%2520fundamental%2520for%2520modeling%2520 {"title": "Weight Space Representation Learning on Diverse NeRF Architectures", "author": "Francesco Ballerini and Pierluigi Zama Ramirez and Luigi Di Stefano and Samuele Salti", "abstract": "Neural Radiance Fields (NeRFs) have emerged as a groundbreaking paradigm for representing 3D objects and scenes by encoding shape and appearance information into the weights of a neural network. Recent studies have demonstrated that these weights can be used as input for frameworks designed to address deep learning tasks; however, such frameworks require NeRFs to adhere to a specific, predefined architecture. In this paper, we introduce the first framework capable of processing NeRFs with diverse architectures and performing inference on architectures unseen at training time. We achieve this by training a Graph Meta-Network within an unsupervised representation learning framework, and show that a contrastive objective is conducive to obtaining an architecture-agnostic latent space. In experiments conducted across 13 NeRF architectures belonging to three families (MLPs, tri-planes, and, for the first time, hash tables), our approach demonstrates robust performance in classification, retrieval, and language tasks involving multiple architectures, even unseen at training time, while also matching or exceeding the results of existing frameworks limited to single architectures. Our code and data are available at https://cvlab-unibo.github.io/gmnerf.", "link": "http://arxiv.org/abs/2502.09623v4", "date": "2026-03-03", "relevancy": 2.1343, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5353}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5339}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5317}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Weight%20Space%20Representation%20Learning%20on%20Diverse%20NeRF%20Architectures&body=Title%3A%20Weight%20Space%20Representation%20Learning%20on%20Diverse%20NeRF%20Architectures%0AAuthor%3A%20Francesco%20Ballerini%20and%20Pierluigi%20Zama%20Ramirez%20and%20Luigi%20Di%20Stefano%20and%20Samuele%20Salti%0AAbstract%3A%20Neural%20Radiance%20Fields%20%28NeRFs%29%20have%20emerged%20as%20a%20groundbreaking%20paradigm%20for%20representing%203D%20objects%20and%20scenes%20by%20encoding%20shape%20and%20appearance%20information%20into%20the%20weights%20of%20a%20neural%20network.%20Recent%20studies%20have%20demonstrated%20that%20these%20weights%20can%20be%20used%20as%20input%20for%20frameworks%20designed%20to%20address%20deep%20learning%20tasks%3B%20however%2C%20such%20frameworks%20require%20NeRFs%20to%20adhere%20to%20a%20specific%2C%20predefined%20architecture.%20In%20this%20paper%2C%20we%20introduce%20the%20first%20framework%20capable%20of%20processing%20NeRFs%20with%20diverse%20architectures%20and%20performing%20inference%20on%20architectures%20unseen%20at%20training%20time.%20We%20achieve%20this%20by%20training%20a%20Graph%20Meta-Network%20within%20an%20unsupervised%20representation%20learning%20framework%2C%20and%20show%20that%20a%20contrastive%20objective%20is%20conducive%20to%20obtaining%20an%20architecture-agnostic%20latent%20space.%20In%20experiments%20conducted%20across%2013%20NeRF%20architectures%20belonging%20to%20three%20families%20%28MLPs%2C%20tri-planes%2C%20and%2C%20for%20the%20first%20time%2C%20hash%20tables%29%2C%20our%20approach%20demonstrates%20robust%20performance%20in%20classification%2C%20retrieval%2C%20and%20language%20tasks%20involving%20multiple%20architectures%2C%20even%20unseen%20at%20training%20time%2C%20while%20also%20matching%20or%20exceeding%20the%20results%20of%20existing%20frameworks%20limited%20to%20single%20architectures.%20Our%20code%2 {"title": "TikZilla: Scaling Text-to-TikZ with High-Quality Data and Reinforcement Learning", "author": "Christian Greisinger and Steffen Eger", "abstract": "Large language models (LLMs) are increasingly used to assist scientists across diverse workflows. A key challenge is generating high-quality figures from textual descriptions, often represented as TikZ programs that can be rendered as scientific images. Prior research has proposed a variety of datasets and modeling approaches for this task. However, existing datasets for Text-to-TikZ are too small and noisy to capture the complexity of TikZ, causing mismatches between text and rendered figures. Moreover, prior approaches rely solely on supervised fine-tuning (SFT), which does not expose the model to the rendered semantics of the figure, often resulting in errors such as looping, irrelevant content, and incorrect spatial relations. To address these issues, we construct DaTikZ-V4, a dataset more than four times larger and substantially higher in quality than DaTikZ-V3, enriched with LLM-generated figure descriptions. Using this dataset, we train TikZilla, a family of small open-source Qwen models (3B and 8B) with a two-stage pipeline of SFT followed by reinforcement learning (RL). For RL, we leverage an image encoder trained via inverse graphics to provide semantically faithful reward signals. Extensive human evaluations with over 1,000 judgments show that TikZilla improves by 1.5-2 points over its base models on a 5-point scale, surpasses GPT-4o by 0.5 points, and matches GPT-5 in the image-based evaluation, while operating at much smaller model sizes. Code, data, and models will be made available.", "link": "http://arxiv.org/abs/2603.03072v1", "date": "2026-03-03", "relevancy": 2.131, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.576}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5457}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5025}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TikZilla%3A%20Scaling%20Text-to-TikZ%20with%20High-Quality%20Data%20and%20Reinforcement%20Learning&body=Title%3A%20TikZilla%3A%20Scaling%20Text-to-TikZ%20with%20High-Quality%20Data%20and%20Reinforcement%20Learning%0AAuthor%3A%20Christian%20Greisinger%20and%20Steffen%20Eger%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20are%20increasingly%20used%20to%20assist%20scientists%20across%20diverse%20workflows.%20A%20key%20challenge%20is%20generating%20high-quality%20figures%20from%20textual%20descriptions%2C%20often%20represented%20as%20TikZ%20programs%20that%20can%20be%20rendered%20as%20scientific%20images.%20Prior%20research%20has%20proposed%20a%20variety%20of%20datasets%20and%20modeling%20approaches%20for%20this%20task.%20However%2C%20existing%20datasets%20for%20Text-to-TikZ%20are%20too%20small%20and%20noisy%20to%20capture%20the%20complexity%20of%20TikZ%2C%20causing%20mismatches%20between%20text%20and%20rendered%20figures.%20Moreover%2C%20prior%20approaches%20rely%20solely%20on%20supervised%20fine-tuning%20%28SFT%29%2C%20which%20does%20not%20expose%20the%20model%20to%20the%20rendered%20semantics%20of%20the%20figure%2C%20often%20resulting%20in%20errors%20such%20as%20looping%2C%20irrelevant%20content%2C%20and%20incorrect%20spatial%20relations.%20To%20address%20these%20issues%2C%20we%20construct%20DaTikZ-V4%2C%20a%20dataset%20more%20than%20four%20times%20larger%20and%20substantially%20higher%20in%20quality%20than%20DaTikZ-V3%2C%20enriched%20with%20LLM-generated%20figure%20descriptions.%20Using%20this%20dataset%2C%20we%20train%20TikZilla%2C%20a%20family%20of%20small%20open-source%20Qwen%20models%20%283B%20and%208B%29%20with%20a%20two-stage%20pipeline%20of%20SFT% {"title": "ProSMA-UNet: Decoder Conditioning for Proximal-Sparse Skip Feature Selection", "author": "Chun-Wun Cheng and Yanqi Cheng and Peiyuan Jing and Guang Yang and Carola-Bibiane Sch\u00f6nlieb and Angelica I. Aviles-Rivero", "abstract": "Medical image segmentation commonly relies on U-shaped encoder-decoder architectures such as U-Net, where skip connections preserve fine spatial detail by injecting high-resolution encoder features into the decoder. However, these skip pathways also propagate low-level textures, background clutter, and acquisition noise, allowing irrelevant information to bypass deeper semantic filtering -- an issue that is particularly detrimental in low-contrast clinical imaging. Although attention gates have been introduced to address this limitation, they typically produce dense sigmoid masks that softly reweight features rather than explicitly removing irrelevant activations. We propose ProSMA-UNet (Proximal-Sparse Multi-Scale Attention U-Net), which reformulates skip gating as a decoder-conditioned sparse feature selection problem. ProSMA constructs a multi-scale compatibility field using lightweight depthwise dilated convolutions to capture relevance across local and contextual scales, then enforces explicit sparsity via an $\\ell_1$ proximal operator with learnable per-channel thresholds, yielding a closed-form soft-thresholding gate that can remove noisy responses. To further suppress semantically irrelevant channels, ProSMA incorporates decoder-conditioned channel gating driven by global decoder context. Extensive experiments on challenging 2D and 3D benchmarks demonstrate state-of-the-art performance, with particularly large gains ($\\approx20$\\%) on difficult 3D segmentation tasks. Project page: https://math-ml-x.github.io/ProSMA-UNet/", "link": "http://arxiv.org/abs/2603.03187v1", "date": "2026-03-03", "relevancy": 2.1254, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://

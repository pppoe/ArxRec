{"title": "OptMerge: Unifying Multimodal LLM Capabilities and Modalities via Model Merging", "author": "Yongxian Wei and Runxi Cheng and Weike Jin and Enneng Yang and Li Shen and Lu Hou and Sinan Du and Chun Yuan and Xiaochun Cao and Dacheng Tao", "abstract": "Foundation models update slowly due to resource-intensive training, whereas domain-specific models evolve rapidly between releases. Model merging seeks to combine multiple expert models into a single, more capable model, reducing storage and serving costs while supporting decentralized development. Despite its potential, previous studies have primarily focused on merging visual classification models or Large Language Models (LLMs) for code and math tasks. Recently, Multimodal LLMs (MLLMs) that extend LLMs through large-scale multimodal training have gained traction. However, there lacks a benchmark for model merging research that clearly divides the tasks for MLLM training and evaluation. In this paper, $\\textbf{(i)}$ we introduce a model merging benchmark for MLLMs, which includes multiple tasks such as VQA, Geometry, Chart, OCR, and Grounding, studying both LoRA and full fine-tuning models. Moreover, we explore how model merging can combine different modalities (e.g., vision-language, audio-language, and video-language models), moving toward the Omni-language model. $\\textbf{(ii)}$ We implement 10 model merging algorithms on the benchmark. Furthermore, we propose a novel method that removes noise from task vectors and robustly optimizes the merged vector based on a loss defined over task vector interactions, achieving an average performance gain of 2.48%. $\\textbf{(iii)}$ We find that model merging offers a promising way for building improved MLLMs without requiring training data. Our results also demonstrate that the complementarity among multiple modalities outperforms individual modalities.", "link": "http://arxiv.org/abs/2505.19892v3", "date": "2026-03-03", "relevancy": 2.8618, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5725}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5725}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.572}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OptMerge%3A%20Unifying%20Multimodal%20LLM%20Capabilities%20and%20Modalities%20via%20Model%20Merging&body=Title%3A%20OptMerge%3A%20Unifying%20Multimodal%20LLM%20Capabilities%20and%20Modalities%20via%20Model%20Merging%0AAuthor%3A%20Yongxian%20Wei%20and%20Runxi%20Cheng%20and%20Weike%20Jin%20and%20Enneng%20Yang%20and%20Li%20Shen%20and%20Lu%20Hou%20and%20Sinan%20Du%20and%20Chun%20Yuan%20and%20Xiaochun%20Cao%20and%20Dacheng%20Tao%0AAbstract%3A%20Foundation%20models%20update%20slowly%20due%20to%20resource-intensive%20training%2C%20whereas%20domain-specific%20models%20evolve%20rapidly%20between%20releases.%20Model%20merging%20seeks%20to%20combine%20multiple%20expert%20models%20into%20a%20single%2C%20more%20capable%20model%2C%20reducing%20storage%20and%20serving%20costs%20while%20supporting%20decentralized%20development.%20Despite%20its%20potential%2C%20previous%20studies%20have%20primarily%20focused%20on%20merging%20visual%20classification%20models%20or%20Large%20Language%20Models%20%28LLMs%29%20for%20code%20and%20math%20tasks.%20Recently%2C%20Multimodal%20LLMs%20%28MLLMs%29%20that%20extend%20LLMs%20through%20large-scale%20multimodal%20training%20have%20gained%20traction.%20However%2C%20there%20lacks%20a%20benchmark%20for%20model%20merging%20research%20that%20clearly%20divides%20the%20tasks%20for%20MLLM%20training%20and%20evaluation.%20In%20this%20paper%2C%20%24%5Ctextbf%7B%28i%29%7D%24%20we%20introduce%20a%20model%20merging%20benchmark%20for%20MLLMs%2C%20wh {"title": "SpatialText: A Pure-Text Cognitive Benchmark for Spatial Understanding in Large Language Models", "author": "Peiyao Jiang and Zequn Qin and Xi Li", "abstract": "Genuine spatial reasoning relies on the capacity to construct and manipulate coherent internal spatial representations, often conceptualized as mental models, rather than merely processing surface linguistic associations. While large language models exhibit advanced capabilities across various domains, existing benchmarks fail to isolate this intrinsic spatial cognition from statistical language heuristics. Furthermore, multimodal evaluations frequently conflate genuine spatial reasoning with visual perception. To systematically investigate whether models construct flexible spatial mental models, we introduce SpatialText, a theory-driven diagnostic framework. Rather than functioning simply as a dataset, SpatialText isolates text-based spatial reasoning through a dual-source methodology. It integrates human-annotated descriptions of real 3D indoor environments, which capture natural ambiguities, perspective shifts, and functional relations, with code-generated, logically precise scenes designed to probe formal spatial deduction and epistemic boundaries. Systematic evaluation across state-of-the-art models reveals fundamental representational limitations. Although models demonstrate proficiency in retrieving explicit spatial facts and operating within global, allocentric coordinate systems, they exhibit critical failures in egocentric perspective transformation and local reference frame reasoning. These systematic errors provide strong evidence that current models rely heavily on linguistic co-occurrence heuristics rather than constructing coherent, verifiable internal spatial representations. SpatialText thus serves as a rigorous instrument for diagnosing the cognitive boundaries of artificial spatial intelligence.", "link": "http://arxiv.org/abs/2603.03002v1", "date": "2026-03-03", "relevancy": 2.8539, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5943}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5943}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5238}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SpatialText%3A%20A%20Pure-Text%20Cognitive%20Benchmark%20for%20Spatial%20Understanding%20in%20Large%20Language%20Models&body=Title%3A%20SpatialText%3A%20A%20Pure-Text%20Cognitive%20Benchmark%20for%20Spatial%20Understanding%20in%20Large%20Language%20Models%0AAuthor%3A%20Peiyao%20Jiang%20and%20Zequn%20Qin%20and%20Xi%20Li%0AAbstract%3A%20Genuine%20spatial%20reasoning%20relies%20on%20the%20capacity%20to%20construct%20and%20manipulate%20coherent%20internal%20spatial%20representations%2C%20often%20conceptualized%20as%20mental%20models%2C%20rather%20than%20merely%20processing%20surface%20linguistic%20associations.%20While%20large%20language%20models%20exhibit%20advanced%20capabilities%20across%20various%20domains%2C%20existing%20benchmarks%20fail%20to%20isolate%20this%20intrinsic%20spatial%20cognition%20from%20statistical%20language%20heuristics.%20Furthermore%2C%20multimodal%20evaluations%20frequently%20conflate%20genuine%20spatial%20reasoning%20with%20visual%20perception.%20To%20systematically%20investigate%20whether%20models%20construct%20flexible%20spatial%20mental%20models%2C%20we%20introduce%20SpatialText%2C%20a%20theory-driven%20diagnostic%20framework.%20Rather%20than%20functioning%20simply%20as%20a%20dataset%2C%20SpatialText%20isolates%20text-based%20spatial%20reasoning%20through%20a%20dual-source%20methodology.%20It%20integrates%20human-annotated%20descriptions%20of%20real%203D%20indoor%20environments%2C%20which%20capt though%20models%20demonstrate%20proficiency%20in%20retrieving%20explicit%20spatial%20facts%20and%20operating%20within%20global%2C%20allocentric%20coordinate%20systems%2C%20they%20exhibit%20critical%20failures%20in%20egocentric%20perspective%20transformation%20and%20local%20reference%20frame%20reasoning.%20These%20systematic%20errors%20provide%20strong%20evidence%20that%20current%20models%20rely%20heavily%20on%20linguistic%20co-occurrence%20heuristics%20rather%20than%20constructing%20coherent%2C%20verifiable%20internal%20spatial%20representations.%20SpatialText%20thus%20serves%20as%20a%20rigorous%20instrument%20for%20diagnosing%20the%20cognitive%20boundaries%20of%20artificial%20spatial%20intelligence.&entry.1838667208=http%3A//arxiv.org/abs/2603.03002v1&entry.124074799=Read"},
{"title": "TRACE: Task-Adaptive Reasoning and Representation Learning for Universal Multimodal Retrieval", "author": "Xiangzhao Hao and Shijie Wang and Tianyu Yang and Tianyue Wang and Haiyun Guo and JinQiao Wang", "abstract": "Universal Multimodal Retrieval requires unified embedding models capable of interpreting diverse user intents, ranging from simple keywords to complex compositional instructions. While Multimodal Large Language Models (MLLMs) possess strong reasoning capabilities, prevailing adaptations confine them to static encoders, underutilizing their generative potential. This encoder-only paradigm struggles with complex intents that demand logical deduction rather than superficial pattern matching. To address this, we introduce TRACE (Task-adaptive Reasoning And Compressing Embeddings). TRACE unifies generative reasoning with discriminative representation learning. It first generates a structured Chain-of-Thought (CoT) to explicitly reason about the query, and subsequently compresses this reasoning trace into a compact embedding via a dedicated token. To train this framework, we construct M-BEIR-CoT, a large-scale dataset featuring a difficulty-aware routing strategy. Experiments on the M-BEIR benchmark establish TRACE as the new state-of-the-art. Crucially, TRACE demonstrates a learned implicit routing behavior. It autonomously activates reasoning for complex queries while bypassing it for simpler ones, achieving an optimal balance between retrieval accuracy and inference throughput. Furthermore, by internalizing the deductive process, TRACE exhibits remarkable zero-shot transferability to unseen domains and novel constraints.", "link": "http://arxiv.org/abs/2603.02929v1", "date": "2026-03-03", "relevancy": 2.8166, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5825}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Unders ish%20TRACE%20as%20the%20new%20state-of-the-art.%20Crucially%2C%20TRACE%20demonstrates%20a%20learned%20implicit%20routing%20behavior.%20It%20autonomously%20activates%20reasoning%20for%20complex%20queries%20while%20bypassing%20it%20for%20simpler%20ones%2C%20achieving%20an%20optimal%20balance%20between%20retrieval%20accuracy%20and%20inference%20throughput.%20Furthermore%2C%20by%20internalizing%20the%20deductive%20process%2C%20TRACE%20exhibits%20remarkable%20zero-shot%20transferability%20to%20unseen%20domains%20and%20novel%20constraints.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02929v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTRACE%253A%2520Task-Adaptive%2520Reasoning%2520and%2520Representation%2520Learning%2520for%2520Universal%2520Multimodal%2520Retrieval%26entry.906535625%3DXiangzhao%2520Hao%2520and%2520Shijie%2520Wang%2520and%2520Tianyu%2520Yang%2520and%2520Tianyue%2520Wang%2520and%2520Haiyun%2520Guo%2520and%2520JinQiao%2520Wang%26entry.1292438233%3DUniversal%2520Multimodal%2520Retrieval%2520requires%2520unified%2520embedding%2520models%2520capable%2520of%2520interpreting%2520diverse%2520user%2520intents%252C%2520ranging%2520from%2520simple%2520keywords%2520to%2520complex%2520compositional%2520instructions.%2520While%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520possess%2520strong%2520reasoning%2520capabilities%252C%2520prevailing%2520adaptations%2520confine%2520them%2520to%2520static%2520encoders%252C%2520underutilizing%2520their%2520generative%2520potential.%2520This%2520encoder-only%2520paradigm%2520struggles%2520with%2520complex%2520intents%2520that%2520demand%2520logical%2520deduction%2520rather%2520than%2520superficial%2520pattern%2520matching.%2520To%2520address%2520this%252C%2520we%2520introduce%2520TRACE%2520%2528Task-adaptive%2520Reasoning%2520And%2520Compressing%2520Embeddings%2529.%2520TRACE%2520unifies%2520generative%2520reasoning%252 dal%20Large%20Language%20Models%20%28MLLMs%29%20possess%20strong%20reasoning%20capabilities%2C%20prevailing%20adaptations%20confine%20them%20to%20static%20encoders%2C%20underutilizing%20their%20generative%20potential.%20This%20encoder-only%20paradigm%20struggles%20with%20complex%20intents%20that%20demand%20logical%20deduction%20rather%20than%20superficial%20pattern%20matching.%20To%20address%20this%2C%20we%20introduce%20TRACE%20%28Task-adaptive%20Reasoning%20And%20Compressing%20Embeddings%29.%20TRACE%20unifies%20generative%20reasoning%20with%20discriminative%20representation%20learning.%20It%20first%20generates%20a%20structured%20Chain-of-Thought%20%28CoT%29%20to%20explicitly%20reason%20about%20the%20query%2C%20and%20subsequently%20compresses%20this%20reasoning%20trace%20into%20a%20compact%20embedding%20via%20a%20dedicated%20token.%20To%20train%20this%20framework%2C%20we%20construct%20M-BEIR-CoT%2C%20a%20large-scale%20dataset%20featuring%20a%20difficulty-aware%20routing%20strategy.%20Experiments%20on%20the%20M-BEIR%20benchmark%20establish%20TRACE%20as%20the%20new%20state-of-the-art.%20Crucially%2C%20TRACE%20demonstrates%20a%20learned%20implicit%20routing%20behavior.%20It%20autonomously%20activates%20reasoning%20for%20complex%20queries%20while%20bypassing%20it%20for%20simpler%20ones%2C%20achieving%20an%20optimal%20balance%20between%20retrieval%20accuracy%20and%20inference%20throughput.%20Furthermore%2C%20by%20internalizing%20the%20deductive%20process%2C%20TRACE%20exhibits%20remarkable%20zero-shot%20transferability%20to%20unseen%20domains%20and%20novel%20constraints.&entry.1838667208=http%3A//arxiv.org/abs/2603.02929v1&entry.124074799=Read"},
{"title": "MMTok: Multimodal Coverage Maximization for Efficient Inference of VLMs", "author": "Sixun Dong and Juhua Hu and Mian Zhang and Ming Yin and Yanjie Fu and Qi Qian", "abstract": "Vision-Language Models (VLMs) demonstrate impressive performance in understanding visual content with language instruction by converting visual inputs to vision tokens. However, redundancy in vision tokens results in the degraded inference efficiency of VLMs. While many algorithms have been proposed to reduce the number of vision tokens, most of them apply only unimodal information (i.e., vision/text) for pruning and ignore the inherent multimodal property of vision-language tasks. Moreover, it lacks a generic criterion that can be applied to different modalities. To mitigate this limitation, in this work, we propose to leverage both vision and text tokens to select informative vision tokens by the coverage criterion. We first formulate the subset selection problem as a maximum coverage problem. Afterwards, a subset of vision tokens is optimized to cover the text tokens and the original set of vision tokens, simultaneously. The proposed method MMTok is extensively evaluated on benchmark datasets with different VLMs. The comparison illustrates that vision and text information are complementary, and combining multimodal information can surpass the unimodal baseline with a clear margin. Moreover, under the maximum coverage criterion on the POPE dataset, our method achieves a 1.87x speedup while maintaining 98.7% of the original performance on LLaVA-NeXT-13B. Finally, with only four vision tokens, 87.7% of the original performance is still preserved on LLaVA-1.5-7B. These results highlight the effectiveness of coverage in token selection. The code is available at https://github.com/Ironieser/mmtok", "link": "http://arxiv.org/abs/2508.18264v2", "date": "2026-03-03", "relevancy": 2.7935, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5768}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5497}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5497}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MMTok%3A%20Multimodal%20Coverage%20Maximization%20for%20Efficient%20Inference%20of%20VLMs&body=Title%3A%20MMTok%3A%20Multimodal%20Coverage%20Maximization%20for%20Efficient%20Inference%20of%20VLMs%0AAuthor%3A%20Sixun%20Dong%20and%20Juhua%20Hu%20and%20Mian%20Zhang%20and%20Ming%20Yin%20and%20Yanjie%20Fu%20and%20Qi%20Qian%0AAbstract%3A%20Vision-Language%20Models%20%28VLMs%29%20demonstrate%20impressive%20performance%20in%20understanding%20visual%20content%20with%20language%20instruction%20by%20converting%20visual%20inputs%20to%20vision%20tokens.%20However%2C%20redundancy%20in%20vision%20tokens%20results%20in%20the%20degraded%20inference%20efficiency%20of%20VLMs.%20While%20many%20algorithms%20have%20been%20proposed%20to%20reduce%20the%20number%20of%20vision%20tokens%2C%20most%20of%20them%20apply%20only%20unimodal%20information%20%28i.e.%2C%20vision/text%29%20for%20pruning%20and%20ignore%20the%20inherent%20multimodal%20property%20of%20vision-language%20tasks.%20Moreover%2C%20it%20lacks%20a%20generic%20criterion%20that%20can%20be%20applied%20to%20different%20modalities.%20To%20mitigate%20this%20limitation%2C%20in%20this%20work%2C%20we%20propose%20to%20leverage%20both%20vision%20and%20text%20tokens%20to%20select%20informative%20vision%20tokens%20by%20the%20coverage%20criterion.%20We%20first%20formulate%20the%20subset%20selection%20problem%20as%20a%20maximum%20coverage%20problem.%20Afterwards%2C%20a%20subset%20of%20vision%20tokens%20is%20optimized%20to%20cover%20the%20text%20tokens%20and%20the%20original%20set%20of%20vision%20tokens%2C%20simultaneously.%20The%20proposed%20method%20MMTok%20is%20extensively%20evaluated%20on%20benchmark%20datasets%20with%20different%20VLMs.%20The%20comparison%20illustrates%20that%20vision%20and%20text%20information%20are%20complementary%2C%20and%20combining%20multimodal%20information%20can%20surpass%20the%20unimodal%20baseline%20with%20a%20clear%20margin.%20Moreover%2C%20under%20the%20maximum%20coverage%20criterion%20on%20the%20POPE%20dataset%2C%20our%20method%20achieves%20a%201.87x%20speedup%20while%20maintaining%2098.7%25%20of%20the%20original%20performance%20on%20LLaVA-NeXT-13B.%20Finally%2C%20with%20only%20four%20vision%20tokens%2C%2087.7%25%20of%20the%20original%20performance%20is%20still%20preserved%20on%20LLaVA-1.5-7B.%20These%20results%20highlight%20the%20effectiveness%20of%20coverage%20in%20token%20selection.%20The%20code%20is%20available%20at%20https%3A//github.com/Ironieser/mmtok%0ALink%3A%20http%3A//arxiv.org/abs/2508.18264v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMMTok%253A%2520Multimodal%2520Coverage%2520Maximization%2520for%2520Efficient%2520Inference%2520of%2520VLMs%26entry.906535625%3DSixun%2520Dong%2520and%2520Juhua%2520Hu%2520and%2520Mian%2520Zhang%2520and%2520Ming%2520Yin%2520and%2520Yanjie%2520Fu%2520and%2520Qi%2520Qian%26entry.1292438233%3DVision-Language%2520Models%2520%2528VLMs%2529%2520demonstrate%2520impressive%2520performance%2520in%2520understanding%2520visual%2520content%2520with%2520language%2520instruction%2520by%2520converting%2520visual%2520inputs%2520to%2520vision%2520tokens.%2520However%252C%2520redundancy%2520in%2520vision%2520tokens%2520results%2520in%2520the%2520degraded%2520inference%2520efficiency%2520of%2520VLMs.%2520While%2520many%2520algorithms%2520have%2520been%2520proposed%2520to%2520reduce%2520the%2520number%2520of%2520vision%2520tokens%252C%2520most%2520of%2520them%2520apply%2520only%2520unimodal%2520information%2520%2528i.e {"title": "LLandMark: A Multi-Agent Framework for Landmark-Aware Multimodal Interactive Video Retrieval", "author": "Minh-Chi Phung and Thien-Bao Le and Cam-Tu Tran-Thi and Thu-Dieu Nguyen-Thi and Vu-Hung Dao", "abstract": "The increasing diversity and scale of video data demand retrieval systems capable of multimodal understanding, adaptive reasoning, and domain-specific knowledge integration. This paper presents LLandMark, a modular multi-agent framework for landmark-aware multimodal video retrieval to handle real-world complex queries. The framework features specialized agents that collaborate across four stages: query parsing and planning, landmark reasoning, multimodal retrieval, and reranked answer synthesis. A key component, the Landmark Knowledge Agent, detects cultural or spatial landmarks and reformulates them into descriptive visual prompts, enhancing CLIP-based semantic matching for Vietnamese scenes. To expand capabilities, we introduce an LLM-assisted image-to-image pipeline, where a large language model (Gemini 2.5 Flash) autonomously detects landmarks, generates image search queries, retrieves representative images, and performs CLIP-based visual similarity matching, removing the need for manual image input. In addition, an OCR refinement module leveraging Gemini and LlamaIndex improves Vietnamese text recognition. Experimental results show that LLandMark achieves adaptive, culturally grounded, and explainable retrieval performance.", "link": "http://arxiv.org/abs/2603.02888v1", "date": "2026-03-03", "relevancy": 2.7882, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5579}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5579}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.or {"title": "The Dresden Dataset for 4D Reconstruction of Non-Rigid Abdominal Surgical Scenes", "author": "Reuben Docea and Rayan Younis and Yonghao Long and Maxime Fleury and Jinjing Xu and Chenyang Li and Andr\u00e9 Schulze and Ann Wierick and Johannes Bender and Micha Pfeiffer and Qi Dou and Martin Wagner and Stefanie Speidel", "abstract": "The D4D Dataset provides paired endoscopic video and high-quality structured-light geometry for evaluating 3D reconstruction of deforming abdominal soft tissue in realistic surgical conditions. Data were acquired from six porcine cadaver sessions using a da Vinci Xi stereo endoscope and a Zivid structured-light camera, registered via optical tracking and manually curated iterative alignment methods. Three sequence types - whole deformations, incremental deformations, and moved-camera clips - probe algorithm robustness to non-rigid motion, deformation magnitude, and out-of-view updates. Each clip provides rectified stereo images, per-frame instrument masks, stereo depth, start/end structured-light point clouds, curated camera poses and camera intrinsics. In postprocessing, ICP and semi-automatic registration techniques are used to register data, and instrument masks are created. The dataset enables quantitative geometric evaluation in both visible and occluded regions, alongside photometric view-synthesis baselines. Comprising over 300,000 frames and 369 point clouds across 98 curated recordings, this resource can serve as a comprehensive benchmark for developing and evaluating non-rigid SLAM, 4D reconstruction, and depth estimation methods.", "link": "http://arxiv.org/abs/2603.02985v1", "date": "2026-03-03", "relevancy": 2.7849, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5578}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5578}, {"title": {"title": "TagaVLM: Topology-Aware Global Action Reasoning for Vision-Language Navigation", "author": "Jiaxing Liu and Zexi Zhang and Xiaoyan Li and Boyue Wang and Yongli Hu and Baocai Yin", "abstract": "Vision-Language Navigation (VLN) presents a unique challenge for Large Vision-Language Models (VLMs) due to their inherent architectural mismatch: VLMs are primarily pretrained on static, disembodied vision-language tasks, which fundamentally clash with the dynamic, embodied, and spatially-structured nature of navigation. Existing large-model-based methods often resort to converting rich visual and spatial information into text, forcing models to implicitly infer complex visual-topological relationships or limiting their global action capabilities. To bridge this gap, we propose TagaVLM (Topology-Aware Global Action reasoning), an end-to-end framework that explicitly injects topological structures into the VLM backbone. To introduce topological edge information, Spatial Topology Aware Residual Attention (STAR-Att) directly integrates it into the VLM's self-attention mechanism, enabling intrinsic spatial reasoning while preserving pretrained knowledge. To enhance topological node information, an Interleaved Navigation Prompt strengthens node-level visual-text alignment. Finally, with the embedded topological graph, the model is capable of global action reasoning, allowing for robust path correction. On the R2R benchmark, TagaVLM achieves state-of-the-art performance among large-model-based methods, with a Success Rate (SR) of 51.09% and SPL of 47.18 in unseen environments, outperforming prior work by 3.39% in SR and 9.08 in SPL. This demonstrates that, for embodied spatial reasoning, targeted enhancements on smaller open-source VLMs can be more effective than brute-force model scaling. The code will be released upon publication.Project page: https://apex-bjut.github.io/Taga-VLM", "link": "http://arxiv.org/abs/2603.02972v1", "date": "2026-03-03", "relevancy": 2.7481, topological%20node%20information%2C%20an%20Interleaved%20Navigation%20Prompt%20strengthens%20node-level%20visual-text%20alignment.%20Finally%2C%20with%20the%20embedded%20topological%20graph%2C%20the%20model%20is%20capable%20of%20global%20action%20reasoning%2C%20allowing%20for%20robust%20path%20correction.%20On%20the%20R2R%20benchmark%2C%20TagaVLM%20achieves%20state-of-the-art%20performance%20among%20large-model-based%20methods%2C%20with%20a%20Success%20Rate%20%28SR%29%20of%2051.09%25%20and%20SPL%20of%2047.18%20in%20unseen%20environments%2C%20outperforming%20prior%20work%20by%203.39%25%20in%20SR%20and%209.08%20in%20SPL.%20This%20demonstrates%20that%2C%20for%20embodied%20spatial%20reasoning%2C%20targeted%20enhancements%20on%20smaller%20open-source%20VLMs%20can%20be%20more%20effective%20than%20brute-force%20model%20scaling.%20The%20code%20will%20be%20released%20upon%20publication.Project%20page%3A%20https%3A//apex-bjut.github.io/Taga-VLM&entry.1838667208=http%3A//arxiv.org/abs/2603.02972v1&entry.124074799=Read"},
{"title": "Think-as-You-See: Streaming Chain-of-Thought Reasoning for Large Vision-Language Models", "author": "Jialiang Zhang and Junlong Tong and Junyan Lin and Hao Wu and Yirong Sun and Yunpu Ma and Xiaoyu Shen", "abstract": "Large Vision Language Models (LVLMs) exhibit strong Chain-of-Thought (CoT) capabilities, yet most existing paradigms assume full-video availability before inference, a batch-style process misaligned with real-world video streams where information arrives sequentially. Motivated by the streaming nature of video data, we investigate two streaming reasoning paradigms for LVLMs. The first, an interleaved paradigm, alternates between receiving frames and producing partial reasoning but remains constrained by strictly ordered cache updates. To better match streaming inputs, we propose \\textbf{Think-as-You-See (TaYS)}, a unified framework enabling true concurrent reasoning. TaYS integrates parallelized CoT generation, stream-constrained training, and stream-parallel inference. It further employs temporally aligned reasoning units, streaming attention masks and positional encodings, and a dual KV-cache that decouples visual encoding from textual reasoning. We evaluate all paradigms on the Qwen2.5-VL family across representative video CoT tasks, including event dynamics analysis, causal reasoning, and thematic understanding. Experiments show that TaYS consistently outperforms both batch and interleaved baselines, improving reasoning performance while substantially reducing time-to-first-token (TTFT) and overall reasoning delay. These results demonstrate the effectiveness of data-aligned streaming reasoning in enabling efficient and responsive video understanding for LVLMs. We release our code at \\href{https://github.com/EIT-NLP/StreamingLLM/tree/main/TaYS}{this repository.}", "link": "http://arxiv.org/abs/2603.02872v1", "date": "2026-03-03", "relevancy": 2.7292, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5596}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5596}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5184}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Think-as-You-See%3A%20Streaming%20Chain-of-Thought%20Reasoning%20for%20Large%20Vision-Language%20Models&body=Title%3A%20Think-as-You-See%3A%20Streaming%20Chain-of-Thought%20Reasoning%20for%20Large%20Vision-Language%20Models%0AAuthor%3A%20Jialiang%20Zhang%20and%20Junlong%20Tong%20and%20Junyan%20Lin%20and%20Hao%20Wu%20and%20Yirong%20Sun%20and%20Yunpu%20Ma%20and%20Xiaoyu%20Shen%0AAbstract%3A%20Large%20Vision%20Language%20Models%20%28LVLMs%29%20exhibit%20strong%20Chain-of-Thought%20%28CoT%29%20capabilities%2C%20yet%20most%20existing%20paradigms%20assume%20full-video%20availability%20before%20inference%2C%20a%20batch-style%20process%20misaligned%20with%20real-world%20video%20streams%20where%20information%20arrives%20sequentially.%20Motivated%20by%20the%20streaming%20nature%20of%20video%20data%2C%20we%20investigate%20two%20streaming%20reasoning%20paradigms%20for%20LVLMs.%20The%20first%2C%20an%20interleaved%20paradigm%2C%20alternates%20between%20receiving%20frames%20and%20producing%20partial%20reasoning%20but%20remains%20constrained%20by%20strictly%20ordered%20cache%20updates.%20To%20better%20match%20streaming%20inputs%2C%20we%20propose%20%5Ctextbf%7BThink-as-You-See%20%28TaYS%29%7D%2C%20a%20unified%20framework%20enabling%20true%20concurrent%20reasoning.%20TaYS%20integrates%20parallelized%20CoT%20generation%2C%20stream-constrained%20training%2C%20and%20stream-parallel%20inference.%20It%20further%20employs%20temporally%20aligned%20reasoning%20units%2C%20streaming%20attention%20masks%20and%20positional%20encodings%2C%20and%20a%20dual%20KV-cache%20that%20decouples%20visual%20encoding%20from%20textual%20reasoning.%20We%20evaluate%20all%20paradigms%20on%20the%20Qwen2.5-VL%20family%20across%20representative%20video%20CoT%20tasks%2C%20including%20event%20dynamics%20analysis%2C%20causal%20reasoning%2C%20and%20thematic%20understanding.%20Experiments%20show%20that%20TaYS%20consistently%20outperforms%20both%20batch%20and%20interleaved%20baselines%2C%20improving%20reasoning%20performance%20while%20substantially%20reducing%20time-to-first-token%20%28TTFT%29%20and%20overall%20reasoning%20delay.%20These%20results%20demonstrate%20the%20effectiveness%20of%20data-aligned%20streaming%20reasoning%20in%20enabling%20efficient%20and%20responsive%20video%20understanding%20for%20LVLMs.%20We%20release%20our%20code%20at%20%5Chref%7Bhttps%3A//github.com/EIT-NLP/StreamingLLM/tree/main/TaYS%7D%7Bthis%20repository.%7D%0ALink%3A%20http%3A//arxiv.org/abs/2603.02872v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThink-as-You-See%253A%2520Streaming%2520Chain-of-Thought%2520Reasoning%2520for%2520Large%2520Vision-Language%2520Models%26entry.906535625%3DJialiang%2520Zhang%2520and%2520Junlong%2520Tong%2520and%2520Junyan%2520Lin%2520and%2520Hao%2520Wu%2520and%2520Yirong%2520Sun%2520and%2520Yunpu%2520Ma%2520and%2520Xiaoyu%2520Shen%26entry.1292438233%3DLarge%2520Vision%2520Language%2520Models%2520%2528LVLMs%2529%2520exhibit%2520strong%2520Chain-of-Thought%2520%2528CoT%2529%2520capabilities%252C%2520yet%2520most%2520existing%2520paradigms%2520assume%2520full-video%2520availability%2520before%2520inference%252C%2520a%2520batch-style%2520process%2520misaligned%2520with%2520real-world%2520video%2520streams%2520where%2520information%2520arrives%2520sequentially.%2520Motivated%2520by%2520the%2520streaming%2520nature%2520of%2520video%2520data%252C%2520we%2520investigate%2520two%2520streaming%2520reasoning%2520paradigms%2520for%2520LVLMs.%2 {"title": "Differentially Private 2D Human Pose Estimation", "author": "Kaushik Bhargav Sivangi and Paul Henderson and Fani Deligianni", "abstract": "Human pose estimation (HPE) has become essential in numerous applications including healthcare, activity recognition, and human-computer interaction. However, the privacy implications of processing sensitive visual data present significant deployment barriers in critical domains. While traditional anonymization techniques offer limited protection and often compromise data utility for broader motion analysis, Differential Privacy (DP) provides formal privacy guarantees but typically degrades model performance when applied naively. In this work, we present the first comprehensive framework for differentially private 2D human pose estimation (2D-HPE) by applying Differentially Private Stochastic Gradient Descent (DP-SGD) to this task. To effectively balance privacy with performance, we adopt Projected DP-SGD (PDP-SGD), which projects the noisy gradients to a low-dimensional subspace. Next, we incorporate Feature Differential Privacy(FDP) to selectively privatize only sensitive features while retaining public visual cues. Finally, we propose a hybrid feature-projective DP framework that combines both approaches to balance privacy and accuracy for HPE. We evaluate our approach on the MPII dataset across varying privacy budgets, training strategies, and clipping norms. Our combined feature-projective method consistently outperforms vanilla DP-SGD and individual baselines, achieving up to 82.61\\% mean PCKh@0.5 at $\u03b5= 0.8$, substantially closing the gap to the non-private performance. This work lays foundation for privacy-preserving human pose estimation in real-world, sensitive applications.", "link": "http://arxiv.org/abs/2504.10190v4", "date": "2026-03-03", "relevancy": 2.7211, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5687}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5493}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5146}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Differentially%20Private%202D%20Human%20Pose%20Estimation&body=Title%3A%20Differentially%20Private%202D%20Human%20Pose%20Estimation%0AAuthor%3A%20Kaushik%20Bhargav%20Sivangi%20and%20Paul%20Henderson%20and%20Fani%20Deligianni%0AAbstract%3A%20Human%20pose%20estimation%20%28HPE%29%20has%20become%20essential%20in%20numerous%20applications%20including%20healthcare%2C%20activity%20recognition%2C%20and%20human-computer%20interaction.%20However%2C%20the%20privacy%20implications%20of%20processing%20sensitive%20visual%20data%20present%20significant%20deployment%20barriers%20in%20critical%20domains.%20While%20traditional%20anonymization%20techniques%20offer%20limited%20protection%20and%20often%20compromise%20data%20utility%20for%20broader%20motion%20analysis%2C%20Differential%20Privacy%20%28DP%29%20provides%20formal%20privacy%20guarantees%20but%20typically%20degrades%20model%20performance%20when%20applied%20naively.%20In%20this%20work%2C%20we%20present%20the%20first%20comprehensive%20framework%20for%20differentially%20private%202D%20human%20pose%20estimation%20%282D-HPE%29%20by%20applying%20Differentially%20Private%20Stochastic%20Gradient%20Descent%20%28DP-SGD%29%20to%20this%20task.%20To%20effectively%20balance%20privacy%20with%20performance%2C%20we%20adopt%20Projected%20DP-SGD%20%28PDP-SGD%29%2C%20which%20projects%20the%20noisy%20gradients%20to%20a%20low-dimensional%20subspace.%20Next%2C%20we%20incorporate%20Feature%20Differential%20Privacy%28FDP%29%20to%20selectively%20privatize%20only%20sensitive%20features%20while%20retaining%20public%20visual%20cues.%20Finally%2C%20we%20propose%20a%20hybrid%20feature-projective%20DP%20framework%20that%20combines%20both%20approaches%20to%20balance%20privacy%20and%20accuracy%20for%20HPE.%20We%20evaluate%20our%20approach%20on%20the%20MPII%20dataset%20across%20varying%20privacy%20budgets%2C%20training%20strategies%2C%20and%20clipping%20norms.%20Our%20combined%20feature-projective%20method%20consistently%20outperforms%20vanilla%20DP-SGD%20and%20individual%20baselines%2C%20achieving%20up%20to%2082.61%5C%25%20mean%20PCKh%400.5%20at%20%24%CE%B5%3D%200.8%24%2C%20substantially%20closing%20the%20gap%20to%20the%20non-private%20performance.%20This%20work%20lays%20foundation%20for%20privacy-preserving%20human%20pose%20estimation%20in%20real-world%2C%20sensitive%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2504.10190v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDifferentially%2520Private%25202D%2520Human%2520Pose%2520Estimation%26entry.906535625%3DKaushik%2520Bhargav%2520Sivangi%2520and%2520Paul%2520Henderson%2520and%2520Fani%2520Deligianni%26entry.1292438233%3DHuman%2520pose%2520estimation%2520%2528HPE%2529%2520has%2520become%2520essential%2520in%2520numerous%2520applications%2520including%2520healthcare%252C%2520activity%2520recognition%252C%2520and%2520human-computer%2520interaction.%2520However%252C%2520the%2520privacy%2520implications%2520of%2520processing%2520sensitive%2520visual%2520data%2520present%2520significant%2520deployment%2520barriers%2520in%2520critical%2520domains.%2520While%2520traditional%2520anonymization%2520techniques%2520offer%2520limited%2520protection%2520and%2520often%2520compromise%2520data%2520utility%2520for%2520broader%2520motion%2520analysis%252C%2520Differential%2520Privacy%2520%2528DP%2529%2520provides%2520formal%2520privacy%2520guarantees%2520but%2520typically%2520degrades%2520model%2520performance%2520when%2520applied%2520naively.%2520In%2520this%2520work%252C%2520we%2520present {"title": "HDINO: A Concise and Efficient Open-Vocabulary Detector", "author": "Hao Zhang and Yiqun Wang and Qinran Lin and Runze Fan and Yong Li", "abstract": "Despite the growing interest in open-vocabulary object detection in recent years, most existing methods rely heavily on manually curated fine-grained training datasets as well as resource-intensive layer-wise cross-modal feature extraction. In this paper, we propose HDINO, a concise yet efficient open-vocabulary object detector that eliminates the dependence on these components. Specifically, we propose a two-stage training strategy built upon the transformer-based DINO model. In the first stage, noisy samples are treated as additional positive object instances to construct a One-to-Many Semantic Alignment Mechanism(O2M) between the visual and textual modalities, thereby facilitating semantic alignment. A Difficulty Weighted Classification Loss (DWCL) is also designed based on initial detection difficulty to mine hard examples and further improve model performance. In the second stage, a lightweight feature fusion module is applied to the aligned representations to enhance sensitivity to linguistic semantics. Under the Swin Transformer-T setting, HDINO-T achieves \\textbf{49.2} mAP on COCO using 2.2M training images from two publicly available detection datasets, without any manual data curation and the use of grounding data, surpassing Grounding DINO-T and T-Rex2 by \\textbf{0.8} mAP and \\textbf{2.8} mAP, respectively, which are trained on 5.4M and 6.5M images. After fine-tuning on COCO, HDINO-T and HDINO-L further achieve \\textbf{56.4} mAP and \\textbf{59.2} mAP, highlighting the effectiveness and scalability of our approach. Code and models are available at https://github.com/HaoZ416/HDINO.", "link": "http://arxiv.org/abs/2603.02924v1", "date": "2026-03-03", "relevancy": 2.709, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/i esentations%20to%20enhance%20sensitivity%20to%20linguistic%20semantics.%20Under%20the%20Swin%20Transformer-T%20setting%2C%20HDINO-T%20achieves%20%5Ctextbf%7B49.2%7D%20mAP%20on%20COCO%20using%202.2M%20training%20images%20from%20two%20publicly%20available%20detection%20datasets%2C%20without%20any%20manual%20data%20curation%20and%20the%20use%20of%20grounding%20data%2C%20surpassing%20Grounding%20DINO-T%20and%20T-Rex2%20by%20%5Ctextbf%7B0.8%7D%20mAP%20and%20%5Ctextbf%7B2.8%7D%20mAP%2C%20respectively%2C%20which%20are%20trained%20on%205.4M%20and%206.5M%20images.%20After%20fine-tuning%20on%20COCO%2C%20HDINO-T%20and%20HDINO-L%20further%20achieve%20%5Ctextbf%7B56.4%7D%20mAP%20and%20%5Ctextbf%7B59.2%7D%20mAP%2C%20highlighting%20the%20effectiveness%20and%20scalability%20of%20our%20approach.%20Code%20and%20models%20are%20available%20at%20https%3A//github.com/HaoZ416/HDINO.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02924v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHDINO%253A%2520A%2520Concise%2520and%2520Efficient%2520Open-Vocabulary%2520Detector%26entry.906535625%3DHao%2520Zhang%2520and%2520Yiqun%2520Wang%2520and%2520Qinran%2520Lin%2520and%2520Runze%2520Fan%2520and%2520Yong%2520Li%26entry.1292438233%3DDespite%2520the%2520growing%2520interest%2520in%2520open-vocabulary%2520object%2520detection%2520in%2520recent%2520years%252C%2520most%2520existing%2520methods%2520rely%2520heavily%2520on%2520manually%2520curated%2520fine-grained%2520training%2520datasets%2520as%2520well%2520as%2520resource-intensive%2520layer-wise%2520cross-modal%2520feature%2520extraction.%2520In%2520this%2520paper%252C%2520we%2520propose%2520HDINO%252C%2520a%2520concise%2520yet%2520efficient%2520open-vocabulary%2520object%2520detector%2520that%2520eliminates%2520the%2520dependence%2520on%2520these%2520components.%2520Specifically%252C%2520we%2520propose%2520a%2520two-stage%2520training%2520strategy%2520built%2520upon%2520t {"title": "Step-Level Sparse Autoencoder for Reasoning Process Interpretation", "author": "Xuan Yang and Jiayu Liu and Yuhang Lai and Hao Xu and Zhenya Huang and Ning Miao", "abstract": "Large Language Models (LLMs) have achieved strong complex reasoning capabilities through Chain-of-Thought (CoT) reasoning. However, their reasoning patterns remain too complicated to analyze. While Sparse Autoencoders (SAEs) have emerged as a powerful tool for interpretability, existing approaches predominantly operate at the token level, creating a granularity mismatch when capturing more critical step-level information, such as reasoning direction and semantic transitions. In this work, we propose step-level sparse autoencoder (SSAE), which serves as an analytical tool to disentangle different aspects of LLMs' reasoning steps into sparse features. Specifically, by precisely controlling the sparsity of a step feature conditioned on its context, we form an information bottleneck in step reconstruction, which splits incremental information from background information and disentangles it into several sparsely activated dimensions. Experiments on multiple base models and reasoning tasks show the effectiveness of the extracted features. By linear probing, we can easily predict surface-level information, such as generation length and first token distribution, as well as more complicated properties, such as the correctness and logicality of the step. These observations indicate that LLMs should already at least partly know about these properties during generation, which provides the foundation for the self-verification ability of LLMs. The code is available at https://github.com/Miaow-Lab/SSAE", "link": "http://arxiv.org/abs/2603.03031v1", "date": "2026-03-03", "relevancy": 2.7083, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5487}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5487}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5275}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Step-Level%20Sparse%20Autoencoder%20for%20Reasoning%20Process%20Interpretation&body=Title%3A%20Step-Level%20Sparse%20Autoencoder%20for%20Reasoning%20Process%20Interpretation%0AAuthor%3A%20Xuan%20Yang%20and%20Jiayu%20Liu%20and%20Yuhang%20Lai%20and%20Hao%20Xu%20and%20Zhenya%20Huang%20and%20Ning%20Miao%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20have%20achieved%20strong%20complex%20reasoning%20capabilities%20through%20Chain-of-Thought%20%28CoT%29%20reasoning.%20However%2C%20their%20reasoning%20patterns%20remain%20too%20complicated%20to%20analyze.%20While%20Sparse%20Autoencoders%20%28SAEs%29%20have%20emerged%20as%20a%20powerful%20tool%20for%20interpretability%2C%20existing%20approaches%20predominantly%20operate%20at%20the%20token%20level%2C%20creating%20a%20granularity%20mismatch%20when%20capturing%20more%20critical%20step-level%20information%2C%20such%20as%20reasoning%20direction%20and%20semantic%20transitions.%20In%20this%20work%2C%20we%20propose%20step-level%20sparse%20autoencoder%20%28SSAE%29%2C%20which%20serves%20as%20an%20analytical%20tool%20to%20disentangle%20different%20aspects%20of%20LLMs%27%20reasoning%20steps%20into%20sparse%20features.%20Specifically%2C%20by%20precisely%20controlling%20the%20sparsity%20of%20a%20step%20feature%20conditioned%20on%20its%20context%2C%20we%20form%20an%20information%20bottleneck%20in%20step%20reconstruction%2C%20which%20splits%20incremental%20information%20from%20background%20information%20and%20disentangles%20it%20into%20several%20sparsely%20activated%20dimensions.%20Experiments%20on%20multiple%20base%20models%20and%20reasoning%20tasks%20show%20the%20effectiveness%20of%20the%20extracted%20features.%20By%20linear%20probing%2C%20we%20can%20easily%20predict%20surface-level%20information%2C%20such%20as%20generation%20length%20and%20first%20token%20distribution%2C%20as%20well%20as%20more%20complicated%20properties%2C%20such%20as%20the%20correctness%20and%20logicality%20of%20the%20step.%20These%20observations%20indicate%20that%20LLMs%20should%20already%20at%20least%20partly%20know%20about%20these%20properties%20during%20generation%2C%20which%20provides%20the%20foundation%20for%20the%20self-verification%20ability%20of%20LLMs.%20The%20code%20is%20available%20at%20https%3A//github.com/Miaow-Lab/SSAE%0ALink%3A%20http%3A//arxiv.org/abs/2603.03031v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DStep-Level%2520Sparse%2520Autoencoder%2520for%2520Reasoning%2520Process%2520Interpretation%26entry.906535625%3DXuan%2520Yang%2520and%2520Jiayu%2520Liu%2520and%2520Yuhang%2520Lai%2520and%2520Hao%2520Xu%2520and%2520Zhenya%2520Huang%2520and%2520Ning%2520Miao%26entry.1292438233%3DLarge%2520Language%2520Models%2520%2528LLMs%2529%2520have%2520achieved%2520strong%2520complex%2520reasoning%2520capabilities%2520through%2520Chain-of-Thought%2520%2528CoT%2529%2520reasoning.%2520However%252C%2520their%2520reasoning%2520patterns%2520remain%2520too%2520complicated%2520to%2520analyze.%2520While%2520Sparse%2520Autoencoders%2520%2528SAEs%2529%2520have%2520emerged%2520as%2520a%2520powerful%2520tool%2520for%2520interpretability%252C%2520existing%2520approaches%2520predominantly%2520operate%2520at%2520the%2520token%2520level%252C%2520creating%2520a%2520granularity%2520mismatch%2520when%2520capturing%2520more%2520critical%2520step-level%2520information%252C%2520such%2520as%2520reasoning%2520direction%2520and%2520semantic%2520transitions.%2520In%2520this%2520work%252C%2520we%2520propose%2520step-level%2520sparse%2520autoencoder%2520%2528SSAE%2529%252C%2520which%2520serves%2520as%2520a {"title": "Semi-Supervised Few-Shot Adaptation of Vision-Language Models", "author": "Julio Silva-Rodr\u00edguez and Ender Konukoglu", "abstract": "Vision-language models (VLMs) pre-trained on large, heterogeneous data sources are becoming increasingly popular, providing rich multi-modal embeddings that enable efficient transfer to new tasks. A particularly relevant application is few-shot adaptation, where only a handful of annotated examples are available to adapt the model through multi-modal linear probes. In medical imaging, specialized VLMs have shown promising performance in zero- and few-shot image classification, which is valuable for mitigating the high cost of expert annotations. However, challenges remain in extremely low-shot regimes: the inherent class imbalances in medical tasks often lead to underrepresented categories, penalizing overall model performance. To address this limitation, we propose leveraging unlabeled data by introducing an efficient semi-supervised solver that propagates text-informed pseudo-labels during few-shot adaptation. The proposed method enables lower-budget annotation pipelines for adapting VLMs, reducing labeling effort by >50% in low-shot regimes.", "link": "http://arxiv.org/abs/2603.02959v1", "date": "2026-03-03", "relevancy": 2.6616, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5771}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5099}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5099}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Semi-Supervised%20Few-Shot%20Adaptation%20of%20Vision-Language%20Models&body=Title%3A%20Semi-Supervised%20Few-Shot%20Adaptation%20of%20Vision-Language%20Models%0AAuthor%3A%20Julio%20Silva-Rodr%C3%ADguez%20and%20Ender%20Konukoglu%0AAbstract%3A%20Vision-language%20models%20%28VLMs%29%20pre-trained%20on%20large%2C%20heterogeneous%20data%20sources%20are%20becoming%20increasingly%20popular%2C%20providing%20rich%20multi-modal%20embeddings%20that%20enable%20efficient%20transfer%20to%20new%20tasks.%20A%20particularly%20relevant%20application%20is%20few-shot%20adaptation%2C%20where%20only%20a%20handful%20of%20annotated%20examples%20are%20available%20to%20adapt%20the%20model%20through%20multi-modal%20linear%20probes.%20In%20medical%20imaging%2C%20specialized%20VLMs%20have%20shown%20promising%20performance%20in%20zero-%20and%20few-shot%20image%20classification%2C%20which%20is%20valuable%20for%20mitigating%20the%20high%20cost%20of%20expert%20annotations.%20However%2C%20challenges%20remain%20in%20extremely%20low-shot%20regimes%3A%20the%20inherent%20class%20imbalances%20in%20medical%20tasks%20often%20lead%20to%20underrepresented%20categories%2C%20penalizing%20overall%20model%20performance.%20To%20address%20this%20limitation%2C%20we%20propose%20leveraging%20unlabeled%20data%20by%20introducing%20an%20efficient%20semi-supervised%20solver%20that%20propagates%20text-informed%20pseudo-labels%20during%20few-shot%20adaptation.%20The%20proposed%20method%20enables%20lower-budget%20annotation%20pipelines%20for%20adapting%20VLMs%2C%20reducing%20labeling%20effort%20by%20%3E50%25%20in%20low-shot%20regimes.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02959v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSemi-Supervised%2520Few-Shot%2520Adaptation%2520of%2520Vision-Language%2520Models%26entry.906535625%3DJulio%2520Silva-Rodr%25C3%25ADguez%2520and%2520Ender%2520Konukoglu%26entry.1292438233%3DVision-language%2520models%2520%2528VLMs%2529%2520pre-trained%2520on%2520large%252C%2520heterogeneous%2520data%2520sources%2520are%2520becoming%2520increasingly%2520popular%252C%2520providing%2520rich%2520multi-modal%2520embeddings%2520that%2520enable%2520efficient%2520transfer%2520to%2520new%2520tasks.%2520A%2520particularly%2520relevant%2520application%2520is%2520few-shot%2520adaptation%252C%2520where%2520only%2520a%2520handful%2520of%2520annotated%2520examples%2520are%2520available%2520to%2520adapt%2520the%2520model%2520through%2520multi-modal%2520linear%2520probes.%2520In%2520medical%2520imaging%252C%2520specialized%2520VLMs%2520have%2520shown%2520promising%2520performance%2520in%2520zero-%2520and%2520few-shot%2520image%2520classification%252C%2520which%2520is%2520valuable%2520for%2520mitigating%2520the%2520high%2520cost%2520of%2520expert%2520annotations.%2520However%252C%2520challenges%2520remain%2520in%2520extremely%2520low-shot%2520regimes%253A%2520the%2520inherent%2520class%2520imbalances%2520in%2520medical%2520tasks%2520often%2520lead%2520to%2520underrepresented%2520categories%252C%2520penalizing%2520overall%2520model%2520performance.%2520To%2520address%2520this%2520limitation%252C%2520we%2520propose%2520leveraging%2520unlabeled%2520data%2520by%2520introducing%2520an%2520efficient%2520semi-supervised%2520solver%2520that%2520propagates%2520text-informed%2520pseudo-labels%2520during%2520few-shot%2520adaptation.%2520The%2520proposed%2520method%2520enables%2520lower-budget%2520annotation%2520pipelines%2520for%2520adapting%2520VLMs%252C%2520reducing%2520labeling%2520effort%2520by%2520%253E50%2525%2520in%2520low-shot%2520regimes.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.02959v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Semi-Supervised%20Few-Shot%20Adaptation%20of%20Vision-Language%20Models&entry.906535625=Julio%20Silva-Rodr%C3%ADguez%20and%20Ender%20Konukoglu&entry.1292438233=Vision-language%20models%20%28VLMs%29%20pre-trained%20on%20large%2C%20heterogeneous%20data%20sources%20are%20becoming%20increasingly%20popular%2C%20providing%20rich%20multi-modal%20embeddings%20that%20enable%20efficient%20transfer%20to%20new%20tasks.%20A%20particularly%20relevant%20application%20is%20few-shot%20adaptation%2C%20where%20only%20a%20handful%20of%20annotated%20examples%20are%20available%20to%20adapt%20the%20model%20through%20multi-modal%20linear%20probes.%20In%20medical%20imaging%2C%20specialized%20VLMs%20have%20shown%20promising%20performance%20in%20zero-%20and%20few-shot%20image%20classification%2C%20which%20is%20valuable%20for%20mitigating%20the%20high%20cost%20of%20expert%20annotations.%20However%2C%20challenges%20remain%20in%20extremely%20low-shot%20regimes%3A%20the%20inherent%20class%20imbalances%20in%20medical%20tasks%20often%20lead%20to%20underrepresented%20categories%2C%20penalizing%20overall%20model%20performance.%20To%20address%20this%20limitation%2C%20we%20propose%20leveraging%20unlabeled%20data%20by%20introducing%20an%20efficient%20semi-supervised%20solver%20that%20propagates%20text-informed%20pseudo-labels%20during%20few-shot%20adaptation.%20The%20proposed%20method%20enables%20lower-budget%20annotation%20pipelines%20for%20adapting%20VLMs%2C%20reducing%20labeling%20effort%20by%20%3E50%25%20in%20low-shot%20regimes.&entry.1838667208=http%3A//arxiv.org/abs/2603.02959v1&entry.124074799=Read"},
{"title": "ProGIC: Progressive and Lightweight Generative Image Compression with Residual Vector Quantization", "author": "Hao Cao and Chengbin Liang and Wenqi Guo and Zhijin Qin and Jungong Han", "abstract": "Recent advances in generative image compression (GIC) have delivered remarkable improvements in perceptual quality. However, many GICs rely on large-scale and rigid models, which severely constrain their utility for flexible transmission and practical deployment in low-bitrate scenarios. To address these issues, we propose Progressive Generative Image Compression (ProGIC), a compact codec built on residual vector quantization (RVQ). In RVQ, a sequence of vector quantizers encodes the residuals stage by stage, each with its own codebook. The resulting codewords sum to a coarse-to-fine reconstruction and a progressive bitstream, enabling previews from partial data. We pair this with a lightweight backbone based on depthwise-separable convolutions and small attention blocks, enabling practical deployment on both GPUs and CPU-only devices. Experimental results show that ProGIC attains comparable compression performance compared with previous methods. It achieves bitrate savings of up to 57.57% on DISTS and 58.83% on LPIPS compared to MS-ILLM on the Kodak dataset. Beyond perceptual quality, ProGIC enables progressive transmission for flexibility, and also delivers over 10 times faster encoding and decoding compared with MS-ILLM on GPUs for efficiency.", "link": "http://arxiv.org/abs/2603.02897v1", "date": "2026-03-03", "relevancy": 2.661, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.557}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5252}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similari vers%20over%2010%20times%20faster%20encoding%20and%20decoding%20compared%20with%20MS-ILLM%20on%20GPUs%20for%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02897v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DProGIC%253A%2520Progressive%2520and%2520Lightweight%2520Generative%2520Image%2520Compression%2520with%2520Residual%2520Vector%2520Quantization%26entry.906535625%3DHao%2520Cao%2520and%2520Chengbin%2520Liang%2520and%2520Wenqi%2520Guo%2520and%2520Zhijin%2520Qin%2520and%2520Jungong%2520Han%26entry.1292438233%3DRecent%2520advances%2520in%2520generative%2520image%2520compression%2520%2528GIC%2529%2520have%2520delivered%2520remarkable%2520improvements%2520in%2520perceptual%2520quality.%2520However%252C%2520many%2520GICs%2520rely%2520on%2520large-scale%2520and%2520rigid%2520models%252C%2520which%2520severely%2520constrain%2520their%2520utility%2520for%2520flexible%2520transmission%2520and%2520practical%2520deployment%2520in%2520low-bitrate%2520scenarios.%2520To%2520address%2520these%2520issues%252C%2520we%2520propose%2520Progressive%2520Generative%2520Image%2520Compression%2520%2528ProGIC%2529%252C%2520a%2520compact%2520codec%2520built%2520on%2520residual%2520vector%2520quantization%2520%2528RVQ%2529.%2520In%2520RVQ%252C%2520a%2520sequence%2520of%2520vector%2520quantizers%2520encodes%2520the%2520residuals%2520stage%2520by%2520stage%252C%2520each%2520with%2520its%2520own%2520codebook.%2520The%2520resulting%2520codewords%2520sum%2520to%2520a%2520coarse-to-fine%2520reconstruction%2520and%2520a%2520progressive%2520bitstream%252C%2520enabling%2520previews%2520from%2520partial%2520data.%2520We%2520pair%2520this%2520with%2520a%2520lightweight%2520backbone%2520based%2520on%2520depthwise-separable%2520convolutions%2520and%2520small%2520attention%2520blocks%252C%2520enabling%2520practical%2520deployment%2520on%2520both%2520GPUs%2520and%2520CPU-only%2520devices.%2520Experimental%2520re {"title": "Graph Recognition via Subgraph Prediction", "author": "Andr\u00e9 Eberhard and Gerhard Neumann and Pascal Friederich", "abstract": "Despite tremendous improvements in tasks such as image classification, object detection, and segmentation, the recognition of visual relationships, commonly modeled as the extraction of a graph from an image, remains a challenging task. We believe that this mainly stems from the fact that there is no canonical way to approach the visual graph recognition task. Most existing solutions are specific to a problem and cannot be transferred between different contexts out-of-the box, even though the conceptual problem remains the same. With broad applicability and simplicity in mind, in this paper we develop a method, \\textbf{Gra}ph Recognition via \\textbf{S}ubgraph \\textbf{P}rediction (\\textbf{GraSP}), for recognizing graphs in images. We show across several synthetic benchmarks and one real-world application that our method works with a set of diverse types of graphs and their drawings, and can be transferred between tasks without task-specific modifications, paving the way to a more unified framework for visual graph recognition.", "link": "http://arxiv.org/abs/2601.15133v2", "date": "2026-03-03", "relevancy": 2.6174, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5599}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5154}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4952}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Graph%20Recognition%20via%20Subgraph%20Prediction&body=Title%3A%20Graph%20Recognition%20via%20Subgraph%20Prediction%0AAuthor%3A%20Andr%C3%A9%20Eberhard%20and%20Gerhard%20Neumann%20and%20Pascal%20Friederich%0AAbstract%3A%20Despite%20tremendous%20improvements%20in%20tasks%20such%20as%20image%20classification%2C%20object%20detection%2C%20and%20segmentation%2C%20the%20recognition%20of%20visual%20relationships%2C%20commonly%20modeled%20as%20the%20extraction%20of%20a%20graph%20from%20an%20image%2C%20remains%20a%20challenging%20task.%20We%20believe%20that%20this%20mainly%20stems%20from%20the%20fact%20that%20there%20is%20no%20canonical%20way%20to%20approach%20the%20visual%20graph%20recognition%20task.%20Most%20existing%20solutions%20are%20specific%20to%20a%20problem%20and%20cannot%20be%20transferred%20between%20different%20contexts%20out-of-the%20box%2C%20even%20though%20the%20conceptual%20problem%20remains%20the%20same.%20With%20broad%20applicability%20and%20simplicity%20in%20mind%2C%20in%20this%20paper%20we%20develop%20a%20method%2C%20%5Ctextbf%7BGra%7Dph%20Recognition%20via%20%5Ctextbf%7BS%7Dubgraph%20%5Ctextbf%7BP%7Drediction%20%28%5Ctextbf%7BGraSP%7D%29%2C%20for%20recognizing%20graphs%20in%20images.%20We%20show%20across%20several%20synthetic%20benchmarks%20and%20one%20real-world%20application%20that%20our%20method%20works%20with%20a%20set%20of%20diverse%20types%20of%20graphs%20and%20their%20drawings%2C%20and%20can%20be%20transferred%20between%20tasks%20without%20task-specific%20modifications%2C%20paving%20the%20way%20to%20a%20more%20unified%20framework%20for%20visual%20graph%20recognition.%0ALink%3A%20http%3A//arxiv.org/abs/2601.15133v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGraph%2520Recognition%2520via%2520Subgraph%2520Prediction%26entry.906535625%3DAndr%25C3%25A9%2520Eberhard%2520and%2520Gerhard%2520Neumann%2520and%2520Pascal%2520Friederich%26entry.1292438233%3DDespite%2520tremendous%2520improvements%2520in%2520tasks%2520such%2520as%2520image%2520classification%252C%2520object%2520detection%252C%2520and%2520segmentation%252C%2520the%2520recognition%2520of%2520visual%2520relationships%252C%2520commonly%2520modeled%2520as%2520the%2520extraction%2520of%2520a%2520graph%2520from%2520an%2520image%252C%2520remains%2520a%2520challenging%2520task.%2520We%2520believe%2520that%2520this%2520mainly%2520stems%2520from%2520the%2520fact%2520that%2520there%2520is%2520no%2520canonical%2520way%2520to%2520approach%2520the%2520visual%2520graph%2520recognition%2520task.%2520Most%2520existing%2520solutions%2520are%2520specific%2520to%2520a%2520problem%2520and%2520cannot%2520be%2520transferred%2520between%2520different%2520contexts%2520out-of-the%2520box%252C%2520even%2520though%2520the%2520conceptual%2520problem%2520remains%2520the%2520same.%2520With%2520broad%2520applicability%2520and%2520simplicity%2520in%2520mind%252C%2520in%2520this%2520paper%2520we%2520develop%2520a%2520method%252C%2520%255Ctextbf%257BGra%257Dph%2520Recognition%2520via%2520%255Ctextbf%257BS%257Dubgraph%2520%255Ctextbf%257BP%257Drediction%2520%2528%255Ctextbf%257BGraSP%257D%2529%252C%2520for%2520recognizing%2520graphs%2520in%2520images.%2520We%2520show%2520across%2520several%2520synthetic%2520benchmarks%2520and%2520one%2520real-world%2520application%2520that%2520our%2520method%2520works%2520with%2520a%2520set%2520of%2520diverse%2520types%2520of%2520graphs%2520and%2520their%2520drawings%252C%2520and%2520can%2520be%2520transferred%2520between%2520tasks%2520without%2520task-specific%2520modifications%252C%2520paving%2520the%2520way%2520to%2520a%2520more%2520unified%2520framework%2520for%2520visual%2520graph%2520recognition.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.15133v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Graph%20Recognition%20via%20Subgraph%20Prediction&entry.906535625=Andr%C3%A9%20Eberhard%20and%20Gerhard%20Neumann%20and%20Pascal%20Friederich&entry.1292438233=Despite%20tremendous%20improvements%20in%20tasks%20such%20as%20image%20classification%2C%20object%20detection%2C%20and%20segmentation%2C%20the%20recognition%20of%20visual%20relationships%2C%20commonly%20modeled%20as%20the%20extraction%20of%20a%20graph%20from%20an%20image%2C%20remains%20a%20challenging%20task.%20We%20believe%20that%20this%20mainly%20stems%20from%20the%20fact%20that%20there%20is%20no%20canonical%20way%20to%20approach%20the%20visual%20graph%20recognition%20task.%20Most%20existing%20solutions%20are%20specific%20to%20a%20problem%20and%20cannot%20be%20transferred%20between%20different%20contexts%20out-of-the%20box%2C%20even%20though%20the%20conceptual%20problem%20remains%20the%20same.%20With%20broad%20applicability%20and%20simplicity%20in%20mind%2C%20in%20this%20paper%20we%20develop%20a%20method%2C%20%5Ctextbf%7BGra%7Dph%20Recognition%20via%20%5Ctextbf%7BS%7Dubgraph%20%5Ctextbf%7BP%7Drediction%20%28%5Ctextbf%7BGraSP%7D%29%2C%20for%20recognizing%20graphs%20in%20images.%20We%20show%20across%20several%20synthetic%20benchmarks%20and%20one%20real-world%20application%20that%20our%20method%20works%20with%20a%20set%20of%20diverse%20types%20of%20graphs%20and%20their%20drawings%2C%20and%20can%20be%20transferred%20between%20tasks%20without%20task-specific%20modifications%2C%20paving%20the%20way%20to%20a%20more%20unified%20framework%20for%20visual%20graph%20recognition.&entry.1838667208=http%3A//arxiv.org/abs/2601.15133v2&entry.124074799=Read"},
{"title": "OnlineX: Unified Online 3D Reconstruction and Understanding with Active-to-Stable State Evolution", "author": "Chong Xia and Fangfu Liu and Yule Wang and Yize Pang and Yueqi Duan", "abstract": "Recent advances in generalizable 3D Gaussian Splatting (3DGS) have enabled rapid 3D scene reconstruction within seconds, eliminating the need for per-scene optimization. However, existing methods primarily follow an offline reconstruction paradigm, lacking the capacity for continuous reconstruction, which limits their applicability to online scenarios such as robotics and VR/AR. In this paper, we introduce OnlineX, a feed-forward framework that reconstructs both 3D visual appearance and language fields in an online manner using only streaming images. A key challenge in online formulation is the cumulative drift issue, which is rooted in the fundamental conflict between two opposing roles of the memory state: an active role that constantly refreshes to capture high-frequency local geometry, and a stable role that conservatively accumulates and preserves the long-term global structure. To address this, we introduce a decoupled active-to-stable state evolution paradigm. Our framework decouples the memory state into a dedicated active state and a persistent stable state, and then cohesively fuses the information from the former into the latter to achieve both fidelity and stability. Moreover, we jointly model visual appearance and language fields and incorporate an implicit Gaussian fusion module to enhance reconstruction quality. Experiments on mainstream datasets demonstrate that our method consistently outperforms prior work in novel view synthesis and semantic understanding, showcasing robust performance across input sequences of varying lengths with real-time inference speed.", "link": "http://arxiv.org/abs/2603.02134v2", "date": "2026-03-03", "relevancy": 2.5779, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6669}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6357}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6104}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OnlineX%3A%20Unified%20Online%203D%20Reconstruction%20and%20Understanding%20with%20Active-to-Stable%20State%20Evolution&body=Title%3A%20OnlineX%3A%20Unified%20Online%203D%20Reconstruction%20and%20Understanding%20with%20Active-to-Stable%20State%20Evolution%0AAuthor%3A%20Chong%20Xia%20and%20Fangfu%20Liu%20and%20Yule%20Wang%20and%20Yize%20Pang%20and%20Yueqi%20Duan%0AAbstract%3A%20Recent%20advances%20in%20generalizable%203D%20Gaussian%20Splatting%20%283DGS%29%20have%20enabled%20rapid%203D%20scene%20reconstruction%20within%20seconds%2C%20eliminating%20the%20need%20for%20per-scene%20optimization.%20However%2C%20existing%20methods%20primarily%20follow%20an%20offline%20reconstruction%20paradigm%2C%20lacking%20the%20capacity%20for%20continuous%20reconstruction%2C%20which%20limits%20their%20applicability%20to%20online%20scenarios%20such%20as%20robotics%20and%20VR/AR.%20In%20this%20paper%2C%20we%20introduce%20OnlineX%2C%20a%20feed-forward%20framework%20that%20reconstructs%20both%203D%20visual%20appearance%20and%20language%20fields%20in%20an%20online%20manner%20using%20only%20streaming%20images.%20A%20key%20challenge%20in%20online%20formulation%20is%20the%20cumulative%20drift%20issue%2C%20which%20is%20rooted%20in%20the%20fundamental%20conflict%20between%20two%20opposing%20roles%20of%20the%20memory%20state%3A%20an%20active%20role%20that%20constantly%20refreshes%20to%20capture%20high-frequency%20local%20geometry%2C%20and%20a%20stable%20role%20that%20conservatively%20accumulates%20and%20preserves%20the%20long-term%20global%20structure.%20To%20address%20this%2C%20we%20introduce%20a%20decoupled%20active-to-stable%20state%20evolution%20paradigm.%20Our%20framework%20decouples%20the%20memory%20state%20into%20a%20dedicated%20active%20state%20and%20a%20persistent%20stable%20state%2C%20and%20then%20cohesively%20fuses%20the%20information%20from%20the%20former%20into%20the%20latter%20to%20achieve%20both%20fidelity%20and%20stability.%20Moreover%2C%20we%20jointly%20model%20visual%20appearance%20and%20language%20fields%20and%20incorporate%20an%20implicit%20Gaussian%20fusion%20module%20to%20enhance%20reconstruction%20quality.%20Experiments%20on%20mainstream%20datasets%20demonstrate%20that%20our%20method%20consistently%20outperforms%20prior%20work%20in%20novel%20view%20synthesis%20and%20semantic%20understanding%2C%20showcasing%20robust%20performance%20across%20input%20sequences%20of%20varying%20lengths%20with%20real-time%20inference%20speed.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02134v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOnlineX%253A%2520Unified%2520Online%25203D%2520Reconstruction%2520and%2520Understanding%2520with%2520Active-to-Stable%2520State%2520Evolution%26entry.906535625%3DChong%2520Xia%2520and%2520Fangfu%2520Liu%2520and%2520Yule%2520Wang%2520and%2520Yize%2520Pang%2520and%2520Yueqi%2520Duan%26entry.1292438233%3DRecent%2520advances%2520in%2520generalizable%25203D%2520Gaussian%2520Splatting%2520%25283DGS%2529%2520have%2520enabled%2520rapid%25203D%2520scene%2520reconstruction%2520within%2520seconds%252C%2520eliminating%2520the%2520need%2520for%2520per-scene%2520optimization.%2520However%252C%2520existing%2520methods%2520primarily%2520follow%2520an%2520offline%2520reconstruction%2520paradigm%252C%2520lacking%2520the%2520capacity%2520for%2520continuous%2520reconstruction%252C%2520which%2520limits%2520their%2520applicability%2520to%2520online%2520scenarios%2520such%2520as%2520robotics%2520and%2520VR/AR.%2520In%2520this%2520paper%25

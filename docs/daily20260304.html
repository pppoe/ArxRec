{"title": "Spectrum Tuning: Post-Training for Distributional Coverage and In-Context Steerability", "author": "Taylor Sorensen and Benjamin Newman and Jared Moore and Chan Park and Jillian Fisher and Niloofar Mireshghallah and Liwei Jiang and Yejin Choi", "abstract": "Language model post-training has enhanced instruction-following and performance on many downstream tasks, but also comes with an often-overlooked cost on tasks with many possible valid answers. On many tasks such as creative writing, synthetic data generation, or steering to diverse preferences, models must cover an entire distribution of outputs, rather than a single correct answer. We characterize three desiderata for conditional distributional modeling: in-context steerability, valid output space coverage, and distributional alignment, and document across three model families how current post-training can reduce these properties. In particular, we disambiguate between two kinds of in-context learning: ICL for eliciting existing underlying knowledge or capabilities, and in-context steerability, where a model must use in-context information to override its priors and steer to a novel data generating distribution. To better evaluate and improve these desiderata, we introduce Spectrum Suite, a large-scale resource compiled from >40 data sources and spanning >90 tasks requiring models to steer to and match diverse distributions ranging from varied human preferences to numerical distributions and more. We find that while current post-training techniques elicit underlying capabilities and knowledge, they hurt models' ability to flexibly steer in-context. To mitigate these issues, we propose Spectrum Tuning, a post-training method using Spectrum Suite to improve steerability and distributional coverage. We find that Spectrum Tuning often improves over pretrained and typical instruction-tuned models, enhancing steerability, spanning more of the output space, and improving distributional alignment on held-out datasets.", "link": "http://arxiv.org/abs/2510.06084v2", "date": "2026-03-03", "relevancy": 2.5496, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5193}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5193}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4911}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Spectrum%20Tuning%3A%20Post-Training%20for%20Distributional%20Coverage%20and%20In-Context%20Steerability&body=Title%3A%20Spectrum%20Tuning%3A%20Post-Training%20for%20Distributional%20Coverage%20and%20In-Context%20Steerability%0AAuthor%3A%20Taylor%20Sorensen%20and%20Benjamin%20Newman%20and%20Jared%20Moore%20and%20Chan%20Park%20and%20Jillian%20Fisher%20and%20Niloofar%20Mireshghallah%20and%20Liwei%20Jiang%20and%20Yejin%20Choi%0AAbstract%3A%20Language%20model%20post-training%20has%20enhanced%20instruction-following%20and%20performance%20on%20many%20downstream%20tasks%2C%20but%20also%20comes%20with%20an%20often-overlooked%20cost%20on%20tasks%20with%20many%20possible%20valid%20answers.%20On%20many%20tasks%20such%20as%20creative%20writing%2C%20synthetic%20data%20generation%2C%20or%20steering%20to%20diverse%20preferences%2C%20models%20must%20cover%20an%20entire%20distribution%20of%20outputs%2C%20rather%20than%20a%20single%20correct%20answer.%20We%20characterize%20three%20desiderata%20for%20conditional%20distributional%20modeling%3A%20in-context%20steerability%2C%20valid%20output%20space%20coverage%2C%20and%20distributional%20alignment%2C%20and%20document%20across%20three%20model%20families%20how%20current%20post-training%20can%20reduce%20these%20properties.%20In%20particular%2C%20we%20disambiguate%20between%20two%20kinds%20of%20in-context%20learning%3A%20ICL%20for%20eliciting%20existing%20underlying%20knowledge%20or%20capabilities%2C%20and%20in-context%20steerability%2C%20where%20a%20model%20must%20use%20in-context%20information%20to%20override%20its%20priors%20and%20steer%20to%20a%20novel%20data%20generating%20distribution.%20To%20better%20evaluate%20and%20improve%20these%20desiderata%2C%20we%20introduce%20Spectrum%20Suite%2C%20a%20large-scale%20resource%20compiled%20from%20%3E40%20data%20sources%20and%20spanning%20%3E90%20tasks%20requiring%20models%20to%20steer%20to%20and%20match%20diverse%20distributions%20ranging%20from%20varied%20human%20preferences%20to%20numerical%20distributions%20and%20more.%20We%20find%20that%20while%20current%20post-training%20techniques%20elicit%20underlying%20capabilities%20and%20knowledge%2C%20they%20hurt%20models%27%20ability%20to%20flexibly%20steer%20in-context.%20To%20mitigate%20these%20issues%2C%20we%20propose%20Spectrum%20Tuning%2C%20a%20post-training%20method%20using%20Spectrum%20Suite%20to%20improve%20steerability%20and%20distributional%20coverage.%20We%20find%20that%20Spectrum%20Tuning%20often%20improves%20over%20pretrained%20and%20typical%20instruction-tuned%20models%2C%20enhancing%20steerability%2C%20spanning%20more%20of%20the%20output%20space%2C%20and%20improving%20distributional%20alignment%20on%20held-out%20datasets.%0ALink%3A%20http%3A//arxiv.org/abs/2510.06084v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSpectrum%2520Tuning%253A%2520Post-Training%2520for%2520Distributional%2520Coverage%2520and%2520In-Context%2520Steerability%26entry.906535625%3DTaylor%2520Sorensen%2520and%2520Benjamin%2520Newman%2520and%2520Jared%2520Moore%2520and%2520Chan%2520Park%2520and%2520Jillian%2520Fisher%2520and%2520Niloofar%2520Mireshghallah%2520and%2520Liwei%2520Jiang%2520and%2520Yejin%2520Choi%26entry.1292438233%3DLanguage%2520model%2520post-training%2520has%2520enhanced%2520instructio {"title": "Harmonic Beltrami Signature Network: a Shape Prior Module in Deep Learning Framework", "author": "Chenran Lin and Lok Ming Lui", "abstract": "This paper presents the Harmonic Beltrami Signature Network (HBSN), a novel deep learning architecture for computing the Harmonic Beltrami Signature (HBS) from binary-like images. HBS is a shape representation that provides a one-to-one correspondence with 2D simply connected shapes, with invariance to translation, scaling, and rotation. By exploiting the function approximation capacity of neural networks, HBSN enables efficient extraction and utilization of shape prior information. The proposed network architecture incorporates a pre-Spatial Transformer Network (pre-STN) for shape normalization, a UNet-based backbone for HBS prediction, and a post-STN for angle regularization. Experiments show that HBSN accurately computes HBS representations, even for complex shapes. Furthermore, we demonstrate how HBSN can be directly incorporated into existing deep learning segmentation models, improving their performance through the use of shape priors. The results confirm the utility of HBSN as a general-purpose module for embedding geometric shape information into computer vision pipelines.", "link": "http://arxiv.org/abs/2603.02907v1", "date": "2026-03-03", "relevancy": 2.5479, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5271}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5165}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4851}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Harmonic%20Beltrami%20Signature%20Network%3A%20a%20Shape%20Prior%20Module%20in%20Deep%20Learning%20Framework&body=Title% {"title": "FEAST: Retrieval-Augmented Multi-Hierarchical Food Classification for the FoodEx2 System", "author": "Lorenzo Molfetta and Alessio Cocchieri and Stefano Fantazzini and Giacomo Frisoni and Luca Ragazzi and Gianluca Moro", "abstract": "Hierarchical text classification (HTC) and extreme multi-label classification (XML) tasks face compounded challenges from complex label interdependencies, data sparsity, and extreme output dimensions. These challenges are exemplified in the European Food Safety Authority's FoodEx2 system-a standardized food classification framework essential for food consumption monitoring and contaminant exposure assessment across Europe. FoodEx2 coding transforms natural language food descriptions into a set of codes from multiple standardized hierarchies, but faces implementation barriers due to its complex structure. Given a food description (e.g., \"organic yogurt''), the system identifies its base term (\"yogurt''), all the applicable facet categories (e.g., \"production method''), and then, every relevant facet descriptors to each category (e.g., \"organic production''). While existing models perform adequately on well-balanced and semantically dense hierarchies, no work has been applied on the practical constraints imposed by the FoodEx2 system. The limited literature addressing such real-world scenarios further compounds these challenges. We propose FEAST (Food Embedding And Semantic Taxonomy), a novel retrieval-augmented framework that decomposes FoodEx2 classification into a three-stage approach: (1) base term identification, (2) multi-label facet prediction, and (3) facet descriptor assignment. By leveraging the system's hierarchical structure to guide training and performing deep metric learning, FEASTlearns discriminative embeddings that mitigate data sparsity and improve generalization on rare and fine-grained labels. Evaluated on the multilingual FoodEx2 benchmark, FEAST outperforms the prior European's CNN baseline F1 scores by 12-38 % on rare classes.", "link": "http://arxiv.org/abs/2603.03176v1", "date": "2026-03-03", "relevancy": 2.5362, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.536}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4929}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4929}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FEAST%3A%20Retrieval-Augmented%20Multi-Hierarchical%20Food%20Classification%20for%20the%20FoodEx2%20System&body=Title%3A%20FEAST%3A%20Retrieval-Augmented%20Multi-Hierarchical%20Food%20Classification%20for%20the%20FoodEx2%20System%0AAuthor%3A%20Lorenzo%20Molfetta%20and%20Alessio%20Cocchieri%20and%20Stefano%20Fantazzini%20and%20Giacomo%20Frisoni%20and%20Luca%20Ragazzi%20and%20Gianluca%20Moro%0AAbstract%3A%20Hierarchical%20text%20classification%20%28HTC%29%20and%20extreme%20multi-label%20classification%20%28XML%29%20tasks%20face%20compounded%20challenges%20from%20complex%20label%20interdependencies%2C%20data%20sparsity%2C%20and%20extreme%20output%20dimensions.%20These%20challenges%20are%20exemplified%20in%20the%20European%20Food%20Safety%20Authority%27s%20FoodEx2%20system-a%20standardized%20food%20classification%20framework%20essential%20for%20food%20consumption%20monitoring%20and%20contaminant%20exposure%20assessment%20across%20Europe.%20FoodEx2%20coding%20transforms%20natural%20language%20food%20descriptions%20into%20a%20set%20of%20codes%20from%20multiple%20standardized%20hierarchies%2C%20but%20faces%20implementation%20barriers%20due%20to%20its%20complex%20structure.%20Given%20a%20food%20description%20%28e.g.%2C%20%22organic%20yogurt%27%27%29%2C%20the%20system%20identifies%20its%20base%20term%20%28%22yogurt%27%27%29%2C%20all%20the%20applicable%20facet%20categories%20%28e.g.%2C%20%22production%20method%27%27%29%2C%20and%20then%2C%20every%20relevant%20facet%20descriptors%20to%20each%20category%20%28e.g.%2C%20%22organic%20production%27%27%29.%20While%20existing%20models%20perform%20adequately%20on%20well-balanced%20and%20semantically%20dense%20hierarchies%2C%20no%20work%20has%20been%20applied%20on%20the%20practical%20constraints%20imposed%20by%20the%20FoodEx2%20system.%20The%20limited%20literature%20addressing%20such%20real-world%20scenarios%20further%20compounds%20these%20challenges.%20We%20propose%20FEAST%20%28Food%20Embedding%20And%20Semantic%20Taxonomy%29%2C%20a%20novel%20retrieval-augmented%20framework%20that%20decomposes%20FoodEx2%20classification%20into%20a%20three-stage%20approach%3A%20%281%29%20base%20term%20identification%2C%20%282%29%20multi-label%20facet%20prediction%2C%20and%20%283%29%20facet%20descriptor%20assignment.%20By%20leveraging%20the%20system%27s%20hierarchical%20structure%20to%20guide%20training%20and%20performing%20deep%20metric%20learning%2C%20FEASTlearns%20discriminative%20embeddings%20that%20mitigate%20data%20sparsity%20and%20improve%20generalization%20on%20rare%20and%20fine-grained%20labels.%20Evaluated%20on%20the%20multilingual%20FoodEx2%20benchmark%2C%20FEAST%20outperforms%20the%20prior%20European%27s%20CNN%20baseline%20F1%20scores%20by%2012-38%20%25%20on%20rare%20classes.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03176v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFEAST%253A%2520Retrieval-Augmented%2520Multi-Hierarchical%2520Food%2520Classification%2520for%2520the%2520FoodEx2%2520System%26entry.906535625%3DLorenzo%2520Molfetta%2520and%2520Alessio%2520Cocchieri%2520and%2520Stefano%2520Fantazzini%2520and%2520Giacomo%2520Frisoni%2520and%2520Luca%2520Ragazzi%2520and%2520Gianluca%2520Moro%26entry.1292438233%3DHierarchical%2 {"title": "MotionStream: Real-Time Video Generation with Interactive Motion Controls", "author": "Joonghyuk Shin and Zhengqi Li and Richard Zhang and Jun-Yan Zhu and Jaesik Park and Eli Shechtman and Xun Huang", "abstract": "Current motion-conditioned video generation methods suffer from prohibitive latency (minutes per video) and non-causal processing that prevents real-time interaction. We present MotionStream, enabling sub-second latency with up to 29 FPS streaming generation on a single GPU. Our approach begins by augmenting a text-to-video model with motion control, which generates high-quality videos that adhere to the global text prompt and local motion guidance, but does not perform inference on the fly. As such, we distill this bidirectional teacher into a causal student through Self Forcing with Distribution Matching Distillation, enabling real-time streaming inference. Several key challenges arise when generating videos of long, potentially infinite time-horizons -- (1) bridging the domain gap from training on finite length and extrapolating to infinite horizons, (2) sustaining high quality by preventing error accumulation, and (3) maintaining fast inference, without incurring growth in computational cost due to increasing context windows. A key to our approach is introducing carefully designed sliding-window causal attention, combined with attention sinks. By incorporating self-rollout with attention sinks and KV cache rolling during training, we properly simulate inference-time extrapolations with a fixed context window, enabling constant-speed generation of arbitrarily long videos. Our models achieve state-of-the-art results in motion following and video quality while being two orders of magnitude faster, uniquely enabling infinite-length streaming. With MotionStream, users can paint trajectories, control cameras, or transfer motion, and see results unfold in real-time, delivering a truly interactive experience.", "link": "http://arxiv.org/abs/2511.01266v4", "date": "2026-03-03", "relevancy": 2.5351, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6623}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6288}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6273}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MotionStream%3A%20Real-Time%20Video%20Generation%20with%20Interactive%20Motion%20Controls&body=Title%3A%20MotionStream%3A%20Real-Time%20Video%20Generation%20with%20Interactive%20Motion%20Controls%0AAuthor%3A%20Joonghyuk%20Shin%20and%20Zhengqi%20Li%20and%20Richard%20Zhang%20and%20Jun-Yan%20Zhu%20and%20Jaesik%20Park%20and%20Eli%20Shechtman%20and%20Xun%20Huang%0AAbstract%3A%20Current%20motion-conditioned%20video%20generation%20methods%20suffer%20from%20prohibitive%20latency%20%28minutes%20per%20video%29%20and%20non-causal%20processing%20that%20prevents%20real-time%20interaction.%20We%20present%20MotionStream%2C%20enabling%20sub-second%20latency%20with%20up%20to%2029%20FPS%20streaming%20generation%20on%20a%20single%20GPU.%20Our%20approach%20begins%20by%20augmenting%20a%20text-to-video%20model%20with%20motion%20control%2C%20which%20generates%20high-quality%20videos%20that%20adhere%20to%20the%20global%20text%20prompt%20and%20local%20motion%20guidance%2C%20but%20does%20not%20perform%20inference%20on%20the%20fly.%20As%20such%2C%20we%20distill%20this%20bidirectional%20teacher%20into%20a%20causal%20student%20through%20Self%20Forcing%20with%20Distribution%20Matching%20Distillation%2C%20enabling%20real-time%20streaming%20inference.%20Several%20key%20challenges%20arise%20when%20generating%20videos%20of%20long%2C%20potentially%20infinite%20time-horizons%20--%20%281%29%20bridging%20the%20domain%20gap%20from%20training%20on%20finite%20length%20and%20extrapolating%20to%20infinite%20horizons%2C%20%282%29%20sustaining%20high%20quality%20by%20preventing%20error%20accumulation%2C%20and%20%283%29%20maintaining%20fast%20inference%2C%20without%20incurring%20growth%20in%20computational%20cost%20due%20to%20increasing%20context%20windows.%20A%20key%20to%20our%20approach%20is%20introducing%20carefully%20designed%20sliding-window%20causal%20attention%2C%20combined%20with%20attention%20sinks.%20By%20incorporating%20self-rollout%20with%20attention%20sinks%20and%20KV%20cache%20rolling%20during%20training%2C%20we%20properly%20simulate%20inference-time%20extrapolations%20with%20a%20fixed%20context%20window%2C%20enabling%20constant-speed%20generation%20of%20arbitrarily%20long%20videos.%20Our%20models%20achieve%20state-of-the-art%20results%20in%20motion%20following%20and%20video%20quality%20while%20being%20two%20orders%20of%20magnitude%20faster%2C%20uniquely%20enabling%20infinite-length%20streaming.%20With%20MotionStream%2C%20users%20can%20paint%20trajectories%2C%20control%20cameras%2C%20or%20transfer%20motion%2C%20and%20see%20results%20unfold%20in%20real-time%2C%20delivering%20a%20truly%20interactive%20experience.%0ALink%3A%20http%3A//arxiv.org/abs/2511.01266v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMotionStream%253A%2520Real-Time%2520Video%2520Generation%2520with%2520Interactive%2520Motion%2520Controls%26entry.906535625%3DJoonghyuk%2520Shin%2520and%2520Zhengqi%2520Li%2520and%2520Richard%2520Zhang%2520and%2520Jun-Yan%2520Zhu%2520and%2520Jaesik%2520Park%2520and%2520Eli%2520Shechtman%2520and%2520Xun%2520Huang%26entry.1292438233%3DCurrent%2520motion-conditioned%2520video%2520generation%2520methods%2520suffer%2520from%2520prohibitive%2520latency%2520%2528minutes%2520per%2520video%2529%2520and%2520non-causal%2520processing%2520that%2520prevents%2520real-time%2520interaction.%2520We%2520present%2520MotionStream%252C%2520 {"title": "SIGMark: Scalable In-Generation Watermark with Blind Extraction for Video Diffusion", "author": "Xinjie Zhu and Zijing Zhao and Hui Jin and Qingxiao Guo and Yilong Ma and Yunhao Wang and Xiaobing Guo and Weifeng Zhang", "abstract": "Artificial Intelligence Generated Content (AIGC), particularly video generation with diffusion models, has been advanced rapidly. Invisible watermarking is a key technology for protecting AI-generated videos and tracing harmful content, and thus plays a crucial role in AI safety. Beyond post-processing watermarks which inevitably degrade video quality, recent studies have proposed distortion-free in-generation watermarking for video diffusion models. However, existing in-generation approaches are non-blind: they require maintaining all the message-key pairs and performing template-based matching during extraction, which incurs prohibitive computational costs at scale. Moreover, when applied to modern video diffusion models with causal 3D Variational Autoencoders (VAEs), their robustness against temporal disturbance becomes extremely weak. To overcome these challenges, we propose SIGMark, a Scalable In-Generation watermarking framework with blind extraction for video diffusion. To achieve blind-extraction, we propose to generate watermarked initial noise using a Global set of Frame-wise PseudoRandom Coding keys (GF-PRC), reducing the cost of storing large-scale information while preserving noise distribution and diversity for distortion-free watermarking. To enhance robustness, we further design a Segment Group-Ordering module (SGO) tailored to causal 3D VAEs, ensuring robust watermark inversion during extraction under temporal disturbance. Comprehensive experiments on modern diffusion models show that SIGMark achieves very high bit-accuracy during extraction under both temporal and spatial disturbances with minimal overhead, demonstrating its scalability and robustness. Our project is available at https://jeremyzhao1998.github.io/SIGMark-release/.", "link": "http://arxiv.org/abs/2603.02882v1", "date": "2026-03-03", "relevancy": 2.5285, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6601}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6159}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6029}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SIGMark%3A%20Scalable%20In-Generation%20Watermark%20with%20Blind%20Extraction%20for%20Video%20Diffusion&body=Title%3A%20SIGMark%3A%20Scalable%20In-Generation%20Watermark%20with%20Blind%20Extraction%20for%20Video%20Diffusion%0AAuthor%3A%20Xinjie%20Zhu%20and%20Zijing%20Zhao%20and%20Hui%20Jin%20and%20Qingxiao%20Guo%20and%20Yilong%20Ma%20and%20Yunhao%20Wang%20and%20Xiaobing%20Guo%20and%20Weifeng%20Zhang%0AAbstract%3A%20Artificial%20Intelligence%20Generated%20Content%20%28AIGC%29%2C%20particularly%20video%20generation%20with%20diffusion%20models%2C%20has%20been%20advanced%20rapidly.%20Invisible%20watermarking%20is%20a%20key%20technology%20for%20protecting%20AI-generated%20videos%20and%20tracing%20harmful%20content%2C%20and%20thus%20plays%20a%20crucial%20role%20in%20AI%20safety.%20Beyond%20post-processing%20watermarks%20which%20inevitably%20degrade%20video%20quality%2C%20recent%20studies%20have%20proposed%20distortion-free%20in-generation%20watermarking%20for%20video%20diffusion%20models.%20However%2C%20existing%20in-generation%20approaches%20are%20non-blind%3A%20they%20require%20maintaining%20all%20the%20message-key%20pairs%20and%20performing%20template-based%20matching%20during%20extraction%2C%20which%20incurs%20prohibitive%20computational%20costs%20at%20scale.%20Moreover%2C%20when%20applied%20to%20modern%20video%20diffusion%20models%20with%20causal%203D%20Variational%20Autoencoders%20%28VAEs%29%2C%20their%20robustness%20against%20temporal%20disturbance%20becomes%20extremely%20weak.%20To%20overcome%20these%20challenges%2C%20we%20propose%20SIGMark%2C%20a%20Scalable%20In-Generation%20watermarking%20framework%20with%20blind%20extraction%20for%20video%20diffusion.%20To%20achieve%20blind-extraction%2C%20we%20propose%20to%20generate%20watermarked%20initial%20noise%20using%20a%20Global%20set%20of%20Frame-wise%20PseudoRandom%20Coding%20keys%20%28GF-PRC%29%2C%20reducing%20the%20cost%20of%20storing%20large-scale%20information%20while%20preserving%20noise%20distribution%20and%20diversity%20for%20distortion-free%20watermarking.%20To%20enhance%20robustness%2C%20we%20further%20design%20a%20Segment%20Group-Ordering%20module%20%28SGO%29%20tailored%20to%20causal%203D%20VAEs%2C%20ensuring%20robust%20watermark%20inversion%20during%20extraction%20under%20temporal%20disturbance.%20Comprehensive%20experiments%20on%20modern%20diffusion%20models%20show%20that%20SIGMark%20achieves%20very%20high%20bit-accuracy%20during%20extraction%20under%20both%20temporal%20and%20spatial%20disturbances%20with%20minimal%20overhead%2C%20demonstrating%20its%20scalability%20and%20robustness.%20Our%20project%20is%20available%20at%20https%3A//jeremyzhao1998.github.io/SIGMark-release/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02882v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSIGMark%253A%2520Scalable%2520In-Generation%2520Watermark%2520with%2520Blind%2520Extraction%2520for%2520Video%2520Diffusion%26entry.906535625%3DXinjie%2520Zhu%2520and%2520Zijing%2520Zhao%2520and%2520Hui%2520Jin%2520and%2520Qingxiao%2520Guo%2520and%2520Yilong%2520Ma%2520and%2520Yunhao%2520Wang%2520and%2520Xiaobing%2520Guo%2520and%2520Weifeng%2520Zhang%26entry.1292438233%3DArtificial%2520Intelligence%2520Generated%2520Content%2520%2528AIGC%2529%252C%2520particularly%2520video%25 {"title": "DuoMo: Dual Motion Diffusion for World-Space Human Reconstruction", "author": "Yufu Wang and Evonne Ng and Soyong Shin and Rawal Khirodkar and Yuan Dong and Zhaoen Su and Jinhyung Park and Kris Kitani and Alexander Richard and Fabian Prada and Michael Zollhofer", "abstract": "We present DuoMo, a generative method that recovers human motion in world-space coordinates from unconstrained videos with noisy or incomplete observations. Reconstructing such motion requires solving a fundamental trade-off: generalizing from diverse and noisy video inputs while maintaining global motion consistency. Our approach addresses this problem by factorizing motion learning into two diffusion models. The camera-space model first estimates motion from videos in camera coordinates. The world-space model then lifts this initial estimate into world coordinates and refines it to be globally consistent. Together, the two models can reconstruct motion across diverse scenes and trajectories, even from highly noisy or incomplete observations. Moreover, our formulation is general, generating the motion of mesh vertices directly and bypassing parametric models. DuoMo achieves state-of-the-art performance. On EMDB, our method obtains a 16% reduction in world-space reconstruction error while maintaining low foot skating. On RICH, it obtains a 30% reduction in world-space error. Project page: https://yufu-wang.github.io/duomo/", "link": "http://arxiv.org/abs/2603.03265v1", "date": "2026-03-03", "relevancy": 2.5271, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6589}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6245}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5821}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DuoMo%3A%20Dual%20Motion%20Diffusion%20for%20World-Space%20Human%20Reconstruction&body=Title%3A%20DuoMo%3A%20Dual%20Motion%20Diffusion%20for%20World-Space%20Human%20Reconstruction%0AAuthor%3A%20Yufu%20Wang%20and%20Evonne%20Ng%20and%20Soyong%20Shin%20and%20Rawal%20Khirodkar%20and%20Yuan%20Dong%20and%20Zhaoen%20Su%20and%20Jinhyung%20Park%20and%20Kris%20Kitani%20and%20Alexander%20Richard%20and%20Fabian%20Prada%20and%20Michael%20Zollhofer%0AAbstract%3A%20We%20present%20DuoMo%2C%20a%20generative%20method%20that%20recovers%20human%20motion%20in%20world-space%20coordinates%20from%20unconstrained%20videos%20with%20noisy%20or%20incomplete%20observations.%20Reconstructing%20such%20motion%20requires%20solving%20a%20fundamental%20trade-off%3A%20generalizing%20from%20diverse%20and%20noisy%20video%20inputs%20while%20maintaining%20global%20motion%20consistency.%20Our%20approach%20addresses%20this%20problem%20by%20factorizing%20motion%20learning%20into%20two%20diffusion%20models.%20The%20camera-space%20model%20first%20estimates%20motion%20from%20videos%20in%20camera%20coordinates.%20The%20world-space%20model%20then%20lifts%20this%20initial%20estimate%20into%20world%20coordinates%20and%20refines%20it%20to%20be%20globally%20consistent.%20Together%2C%20the%20two%20models%20can%20reconstruct%20motion%20across%20diverse%20scenes%20and%20trajectories%2C%20even%20from%20highly%20noisy%20or%20incomplete%20observations.%20Moreover%2C%20our%20formulation%20is%20general%2C%20generating%20the%20motion%20of%20mesh%20vertices%20directly%20and%20bypassing%20parametric%20models.%20DuoMo%20achieves%20state-of-the-art%20performance.%20On%20EMDB%2C%20our%20method%20obtains%20a%2016%25%20reduction%20in%20world-space%20reconstruction%20error%20while%20maintaining%20low%20foot%20skating.%20On%20RICH%2C%20it%20obtains%20a%2030%25%20reduction%20in%20world-space%20error.%20Project%20page%3A%20https%3A//yufu-wang.github.io/duomo/%0ALink%3A%20http%3A//arxiv.or {"title": "Breaking the Prototype Bias Loop: Confidence-Aware Federated Contrastive Learning for Highly Imbalanced Clients", "author": "Tian-Shuang Wu and Shen-Huan Lyu and Ning Chen and Yi-Xiao He and Bing Tang and Baoliu Ye and Qingfu Zhang", "abstract": "Local class imbalance and data heterogeneity across clients often trap prototype-based federated contrastive learning in a prototype bias loop: biased local prototypes induced by imbalanced data are aggregated into biased global prototypes, which are repeatedly reused as contrastive anchors, accumulating errors across communication rounds. To break this loop, we propose Confidence-Aware Federated Contrastive Learning (CAFedCL), a novel framework that improves the prototype aggregation mechanism and strengthens the contrastive alignment guided by prototypes. CAFedCL employs a confidence-aware aggregation mechanism that leverages predictive uncertainty to downweight high-variance local prototypes. In addition, generative augmentation for minority classes and geometric consistency regularization are integrated to stabilize the structure between classes. From a theoretical perspective, we provide an expectation-based analysis showing that our aggregation reduces estimation variance, thereby bounding global prototype drift and ensuring convergence. Extensive experiments under varying levels of class imbalance and data heterogeneity demonstrate that CAFedCL consistently outperforms representative federated baselines in both accuracy and client fairness.", "link": "http://arxiv.org/abs/2603.03007v1", "date": "2026-03-03", "relevancy": 2.5215, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5327}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4976}, {"title": "Flexible Visual Recognition by {"title": "CoPeP: Benchmarking Continual Pretraining for Protein Language Models", "author": "Darshan Patil and Pranshu Malviya and Mathieu Reymond and Quentin Fournier and Sarath Chandar", "abstract": "Protein language models (pLMs) have recently gained significant attention for their ability to uncover relationships between sequence, structure, and function from evolutionary statistics, thereby accelerating therapeutic drug discovery. These models learn from large protein databases that are continuously updated by the biology community and whose dynamic nature motivates the application of continual learning, not only to keep up with the ever-growing data, but also as an opportunity to take advantage of the temporal meta-information that is created during this process. As a result, we introduce the Continual Pretraining of Protein Language Models (CoPeP) benchmark, a novel benchmark for evaluating continual learning approaches on pLMs. Specifically, we curate a sequence of protein datasets derived from the UniProt Knowledgebase spanning a decade and define metrics to assess pLM performance across 31 protein understanding tasks. We evaluate several methods from the continual learning literature, including replay, unlearning, and plasticity-based methods, some of which have never been applied to models and data of this scale. Our findings reveal that incorporating temporal meta-information improves perplexity by up to 7% even when compared to training on data from all tasks jointly. Moreover, even at scale, several continual learning methods outperform naive continual pretraining. The CoPeP benchmark offers an exciting opportunity to study these methods at scale in an impactful real-world application.", "link": "http://arxiv.org/abs/2603.00253v2", "date": "2026-03-03", "relevancy": 2.5214, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5074}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5074}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4981}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CoPeP%3A%20Benchmarking%20Continual%20Pretraining%20for%20Protein%20Language%20Models&body=Title%3A%20CoPeP%3A%20Benchmarking%20Continual%20Pretraining%20for%20Protein%20Language%20Models%0AAuthor%3A%20Darshan%20Patil%20and%20Pranshu%20Malviya%20and%20Mathieu%20Reymond%20and%20Quentin%20Fournier%20and%20Sarath%20Chandar%0AAbstract%3A%20Protein%20language%20models%20%28pLMs%29%20have%20recently%20gained%20significant%20attention%20for%20their%20ability%20to%20uncover%20relationships%20between%20sequence%2C%20structure%2C%20and%20function%20from%20evolutionary%20statistics%2C%20thereby%20accelerating%20therapeutic%20drug%20discovery.%20These%20models%20learn%20from%20large%20protein%20databases%20that%20are%20continuously%20updated%20by%20the%20biology%20community%20and%20whose%20dynamic%20nature%20motivates%20the%20application%20of%20continual%20learning%2C%20not%20only%20to%20keep%20up%20with%20the%20ever-growing%20data%2C%20but%20also%20as%20an%20opportunity%20to%20take%20advantage%20of%20the%20temporal%20meta-information%20that%20is%20created%20during%20this%20process.%20As%20a%20result%2C%20we%20introduce%20the%20Continual%20Pretraining%20of%20Protein%20Language%20Models%20%28CoPeP%29%20benchmark%2C%20a%20novel%20benchmark%20for%20evaluating%20continual%20learning%20approaches%20on%20pLMs.%20Specifically%2C%20we%20curate%20a%20sequence%20of%20protein%20datasets%20derived%20from%20the%20UniProt%20Knowledgebase%20spanning%20a%20decade%20and%20define%20metrics%20to%20assess%20pLM%20performance%20across%2031%20protein%20understanding%20tasks.%20We%20evaluate%20several%20methods%20from%20the%20continual%20learning%20literature%2C%20including%20replay%2C%20unlearning%2C%20and%20plasticity-based%20methods%2C%20some%20of%20which%20have%20never%20been%20applied%20to%20models%20and%20data%20of%20this%20scale.%20Our%20findings%20reveal%20that%20incorporating%20temporal%20meta-information%20improves%20perplexity%20by%20up%20to%207%25%20even%20when%20compared%20to%20training%20on%20data%20from%20all%20tasks%20jointly.%20Moreover%2C%20even%20at%20scale%2C%20several%20continual%20learning%20methods%20outperform%20naive%20continual%20pretraining.%20The%20CoPeP%20benchmark%20offers%20an%20exciting%20opportunity%20to%20study%20these%20methods%20at%20scale%20in%20an%20impactful%20real-world%20application.%0ALink%3A%20http%3A//arxiv.org/abs/2603.00253v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCoPeP%253A%2520Benchmarking%2520Continual%2520Pretraining%2520for%2520Protein%2520Language%2520Models%26entry.906535625%3DDarshan%2520Patil%2520and%2520Pranshu%2520Malviya%2520and%2520Mathieu%2520Reymond%2520and%2520Quentin%2520Fournier%2520and%2520Sarath%2520Chandar%26entry.1292438233%3DProtein%2520language%2520models%2520%2528pLMs%2529%2520have%2520recently%2520gained%2520significant%2520attention%2520for%2520their%2520ability%2520to%2520uncover%2520relationships%2520between%2520sequence%252C%2520structure%252C%2520and%2520function%2520from%2520evolutionary%2520statistics%252C%2520thereby%2520accelerating%2520therapeutic%2520drug%2520discovery.%2520These%2520models%2520learn%2520from%2520large%2520protein%2520databases%2520that%2520are%2520continuously%2520updated%2520by%2520the%2520biology%2520community%2520and%2520whose%2520dynamic%2520nature%2520motivates%2520the%2520application%2520of%2520continual%2520learning%252C%2520not%2520only%2520to%2520keep%2520up%2520with%2520the%2520ever-growing%2520data%252C%2520but%2520also%2520as%2520an%2520opportunity%2520to%2520take%2520advantage%2520of%2520the% {"title": "Kling-MotionControl Technical Report", "author": " Kling Team and Jialu Chen and Yikang Ding and Zhixue Fang and Kun Gai and Kang He and Xu He and Jingyun Hua and Mingming Lao and Xiaohan Li and Hui Liu and Jiwen Liu and Xiaoqiang Liu and Fan Shi and Xiaoyu Shi and Peiqin Sun and Songlin Tang and Pengfei Wan and Tiancheng Wen and Zhiyong Wu and Haoxian Zhang and Runze Zhao and Yuanxing Zhang and Yan Zhou", "abstract": "Character animation aims to generate lifelike videos by transferring motion dynamics from a driving video to a reference image. Recent strides in generative models have paved the way for high-fidelity character animation. In this work, we present Kling-MotionControl, a unified DiT-based framework engineered specifically for robust, precise, and expressive holistic character animation. Leveraging a divide-and-conquer strategy within a cohesive system, the model orchestrates heterogeneous motion representations tailored to the distinct characteristics of body, face, and hands, effectively reconciling large-scale structural stability with fine-grained articulatory expressiveness. To ensure robust cross-identity generalization, we incorporate adaptive identity-agnostic learning, facilitating natural motion retargeting for diverse characters ranging from realistic humans to stylized cartoons. Simultaneously, we guarantee faithful appearance preservation through meticulous identity injection and fusion designs, further supported by a subject library mechanism that leverages comprehensive reference contexts. To ensure practical utility, we implement an advanced acceleration framework utilizing multi-stage distillation, boosting inference speed by over 10x. Kling-MotionControl distinguishes itself through intelligent semantic motion understanding and precise text responsiveness, allowing for flexible control beyond visual inputs. Human preference evaluations demonstrate that Kling-MotionControl delivers superior performance compared to leading commercial and open-source solutions, achieving exceptional fidelity in holistic motion control, open domain generalization, and visual quality and coherence. These results establish Kling-MotionControl as a robust solution for high-quality, controllable, and lifelike character animation.", "link": "http://arxiv.org/abs/2603.03160v1", "date": "2026-03-03", "relevancy": 2.5164, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6626}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.6293}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5449}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Kling-MotionControl%20Technical%20Report&body=Title%3A%20Kling-MotionControl%20Technical%20Report%0AAuthor%3A%20%20Kling%20Team%20and%20Jialu%20Chen%20and%20Yikang%20Ding%20and%20Zhixue%20Fang%20and%20Kun%20Gai%20and%20Kang%20He%20and%20Xu%20He%20and%20Jingyun%20Hua%20and%20Mingming%20Lao%20and%20Xiaohan%20Li%20and%20Hui%20Liu%20and%20Jiwen%20Liu%20and%20Xiaoqiang%20Liu%20and%20Fan%20Shi%20and%20Xiaoyu%20Shi%20and%20Peiqin%20Sun%20and%20Songlin%20Tang%20and%20Pengfei%20Wan%20and%20Tiancheng%20Wen%20and%20Zhiyong%20Wu%20and%20Haoxian%20Zhang%20and%20Runze%20Zhao%20and%20Yuanxing%20Zhang%20and%20Yan%20Zhou%0AAbstract%3A%20Character%20animation%20aims%20to%20generate%20lifelike%20videos%20by%20transferring%20motion%20dynamics%20from%20a%20driving%20video%20to%20a%20reference%20image.%20Recent%20strides%20in%20generative%20models%20have%20paved%20the%20way%20for%20high-fidelity%20character%20animation.%20In%20this%20work%2C%20we%20present%20Kling-MotionControl%2C%20a%20unified%20DiT-based%20framework%20engineered%20specifically%20for%20robust%2C%20precise%2C%20and%20expressive%20holistic%20character%20animation.%20Leveraging%20a%20divide-and-conquer%20strategy%20within%20a%20cohesive%20system%2C%20the%20model%20orchestrates%20heterogeneous%20motion%20representations%20tailored%20to%20the%20distinct%20characteristics%20of%20body%2C%20face%2C%20and%20hands%2C%20effectively%20reconciling%20large-scale%20structural%20stability%20with%20fine-grained%20articulatory%20expressiveness.%20To%20ensure%20robust%20cross-identity%20generalization%2C%20we%20incorporate%20adaptive%20identity-agnostic%20learning%2C%20facilitating%20natural%20motion%20retargeting%20for%20diverse%20characters%20ranging%20from%20realistic%20humans%20to%20stylized%20cartoons.%20Simultaneously%2C%20we%20guarantee%20faithful%20appearance%20preservation%20through%20meticulous%20identity%20injection%20and%20fusion%20designs%2C%20further%20supported%20by%20a%20subject%20library%20mechanism%20that%20leverages%20comprehensive%20reference%20contexts.%20To%20ensure%20practical%20utility%2C%20we%20implement%20an%20advanced%20acceleration%20framework%20utilizing%20multi-stage%20distillation%2C%20boosting%20inference%20speed%20by%20over%2010x.%20Kling-MotionControl%20distinguishes%20itself%20through%20intelligent%20semantic%20motion%20understanding%20and%20precise%20text%20responsiveness%2C%20allowing%20for%20flexible%20control%20beyond%20visual%20inputs.%20Human%20preference%20evaluations%20demonstrate%20that%20Kling-MotionControl%20delivers%20superior%20performance%20compared%20to%20leading%20commercial%20and%20open-source%20solutions%2C%20achieving%20exceptional%20fidelity%20in%20holistic%20motion%20control%2C%20open%20domain%20generalization%2C%20and%20visual%20quality%20and%20coherence.%20These%20results%20establish%20Kling-MotionControl%20as%20a%20robust%20solution%20for%20high-quality%2C%20controllable%2C%20and%20lifelike%20character%20animation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03160v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9 {"title": "PROFusion: Robust and Accurate Dense Reconstruction via Camera Pose Regression and Optimization", "author": "Siyan Dong and Zijun Wang and Lulu Cai and Yi Ma and Yanchao Yang", "abstract": "Real-time dense scene reconstruction during unstable camera motions is crucial for robotics, yet current RGB-D SLAM systems fail when cameras experience large viewpoint changes, fast motions, or sudden shaking. Classical optimization-based methods deliver high accuracy but fail with poor initialization during large motions, while learning-based approaches provide robustness but lack sufficient accuracy for dense reconstruction. We address this challenge through a combination of learning-based initialization with optimization-based refinement. Our method employs a camera pose regression network to predict metric-aware relative poses from consecutive RGB-D frames, which serve as reliable starting points for a randomized optimization algorithm that further aligns depth images with the scene geometry. Extensive experiments demonstrate promising results: our approach outperforms the best competitor on challenging benchmarks, while maintaining comparable accuracy on stable motion sequences. The system operates in real-time, showcasing that combining simple and principled techniques can achieve both robustness for unstable motions and accuracy for dense reconstruction. Code released: https://github.com/siyandong/PROFusion.", "link": "http://arxiv.org/abs/2509.24236v2", "date": "2026-03-03", "relevancy": 2.5014, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6542}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6129}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6015}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PROFusion%3A%20Robust%20and%20Accurate%20Dense%20Reconstruction%20via%20Camera%20Pose%20Regression%20and%20Optimization&body=Title%3A%20PROFusion%3A%20Robust%20and%20Accurate%20Dense%20Reconstruction%20via%20Camera%20Pose%20Regression%20and%20Optimization%0AAuthor%3A%20Siyan%20Dong%20and%20Zijun%20Wang%20and%20Lulu%20Cai%20and%20Yi%20Ma%20and%20Yanchao%20Yang%0AAbstract%3A%20Real-time%20dense%20scene%20reconstruction%20during%20unstable%20camera%20motions%20is%20crucial%20for%20robotics%2C%20yet%20current%20RGB-D%20SLAM%20systems%20fail%20when%20cameras%20experience%20large%20viewpoint%20changes%2C%20fast%20motions%2C%20or%20sudden%20shaking.%20Classical%20optimization-based%20methods%20deliver%20high%20accuracy%20but%20fail%20with%20poor%20initialization%20during%20large%20motions%2C%20while%20learning-based%20approaches%20provide%20robustness%20but%20lack%20sufficient%20accuracy%20for%20dense%20reconstruction.%20We%20address%20this%20challenge%20through%20a%20combination%20of%20learning-based%20initialization%20with%20optimization-based%20refinement.%20Our%20method%20employs%20a%20camera%20pose%20regression%20network%20to%20predict%20metric-aware%20relative%20poses%20from%20consecutive%20RGB-D%20frames%2C%20which%20serve%20as%20reliable%20starting%20points%20for%20a%20randomized%20optimization%20algorithm%20that%20further%20aligns%20depth%20images%20with%20the%20scene%20geometry.%20Extensive%20experiments%20demonstrate%20promising%20results%3A%20our%20approach%20outperforms%20the%20best%20competitor%20on%20challenging%20benchmarks%2C%20while%20maintaining%20comparable%20accuracy%20on%20stable%20motion%20sequences.%20The%20system%20operates%20in%20real-time%2C%20showcasing%20that%20combining%20simple%20and%20principled%20techniques%20can%20achieve%20both%20robustness%20for%20unstable%20motions%20and%20accuracy%20for%20dense%20reconstruction.%20Code%20released%3A%20https%3A//github.com/siyandong/PROFusion.%0ALink%3A%20http%3A//arx e%2520system%2520operates%2520in%2520real-time%252C%2520showcasing%2520that%2520combining%2520simple%2520and%2520principled%2520techniques%2520can%2520achieve%2520both%2520robustness%2520for%2520unstable%2520motions%2520and%2520accuracy%2520for%2520dense%2520reconstruction.%2520Code%2520released%253A%2520https%253A//github.com/siyandong/PROFusion.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.24236v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=PROFusion%3A%20Robust%20and%20Accurate%20Dense%20Reconstruction%20via%20Camera%20Pose%20Regression%20and%20Optimization&entry.906535625=Siyan%20Dong%20and%20Zijun%20Wang%20and%20Lulu%20Cai%20and%20Yi%20Ma%20and%20Yanchao%20Yang&entry.1292438233=Real-time%20dense%20scene%20reconstruction%20during%20unstable%20camera%20motions%20is%20crucial%20for%20robotics%2C%20yet%20current%20RGB-D%20SLAM%20systems%20fail%20when%20cameras%20experience%20large%20viewpoint%20changes%2C%20fast%20motions%2C%20or%20sudden%20shaking.%20Classical%20optimization-based%20methods%20deliver%20high%20accuracy%20but%20fail%20with%20poor%20initialization%20during%20large%20motions%2C%20while%20learning-based%20approaches%20provide%20robustness%20but%20lack%20sufficient%20accuracy%20for%20dense%20reconstruction.%20We%20address%20this%20challenge%20through%20a%20combination%20of%20learning-based%20initialization%20with%20optimization-based%20refinement.%20Our%20method%20employs%20a%20camera%20pose%20regression%20network%20to%20predict%20metric-aware%20relative%20poses%20from%20consecutive%20RGB-D%20frames%2C%20which%20serve%20as%20reliable%20starting%20points%20for%20a%20randomized%20optimization%20algorithm%20that%20further%20aligns%20depth%20images%20with%20the%20scene%20geometry.%20Extensive%20experiments%20demonstrate%20promising%20results%3A%20our%20approach%20outperforms%20the%20best%20competitor%20on%20challenging%20benchmarks%2C%20while%2 {"title": "Loss Barcode: A Topological Measure of Escapability in Loss Landscapes", "author": "Serguei Barannikov and Daria Voronkova and Alexander Mironenko and Ilya Trofimov and Alexander Korotin and Grigorii Sotnikov and Evgeny Burnaev", "abstract": "Neural network training is commonly based on SGD. However, the understanding of SGD's ability to converge to good local minima, given the non-convex nature of loss functions and the intricate geometric characteristics of loss landscapes, remains limited. In this paper, we apply topological data analysis methods to loss landscapes to gain insights into the learning process and generalization properties of deep neural networks. We use the loss function topology to relate the local behavior of gradient descent trajectories with the global properties of the loss surface. For this purpose, we define the neural network's Topological Obstructions score (\"TO-score\") with the help of robust topological invariants, barcodes of the loss function, which quantify the escapability of local minima for gradient-based optimization. Our two principal observations are: 1) the loss barcode of the neural network decreases with increasing depth and width, therefore the topological obstructions to learning diminish; 2) in certain situations there is a connection between the length of minima segments in the loss barcode and the minima's generalization errors. Our statements are based on extensive experiments with fully connected, convolutional, and transformer architectures and several datasets including MNIST, FMNIST, CIFAR10, CIFAR100, SVHN, and multilingual OSCAR text dataset.", "link": "http://arxiv.org/abs/2012.15834v3", "date": "2026-03-03", "relevancy": 2.491, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5175}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4924}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4847}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Loss%20Barcode%3A%20A%20Topological%20Measure%20of%20Escapability%20in%20Loss%20Landscapes&body=Title%3A%20Loss%20Barcode%3A%20A%20Topological%20Measure%20of%20Escapability%20in%20Loss%20Landscapes%0AAuthor%3A%20Serguei%20Barannikov%20and%20Daria%20Voronkova%20and%20Alexander%20Mironenko%20and%20Ilya%20Trofimov%20and%20Alexander%20Korotin%20and%20Grigorii%20Sotnikov%20and%20Evgeny%20Burnaev%0AAbstract%3A%20Neural%20network%20training%20is%20commonly%20based%20on%20SGD.%20However%2C%20the%20understanding%20of%20SGD%27s%20ability%20to%20converge%20to%20good%20local%20minima%2C%20given%20the%20non-convex%20nature%20of%20loss%20functions%20and%20the%20intricate%20geometric%20characteristics%20of%20loss%20landscapes%2C%20remains%20limited.%20In%20this%20paper%2C%20we%20apply%20topological%20data%20analysis%20methods%20to%20loss%20landscapes%20to%20gain%20insights%20into%20the%20learning%20process%20and%20generalization%20properties%20of%20deep%20neural%20networks.%20We%20use%20the%20loss%20function%20topology%20to%20relate%20the%20local%20behavior%20of%20gradient%20descent%20trajectories%20with%20the%20global%20properties%20of%20the%20loss%20surface.%20For%20this%20purpose%2C%20we%20define%20the%20neural%20network%27s%20Topological%20Obstructions%20score%20%28%22TO-score%22%29%20with%20the%20help%20of%20robust%20topological%20invariants%2C%20barcodes%20of%20the%20loss%20function%2C%20which%20quantify%20the%20escapability%20of%20local%20minima%20for%20gradient-based%20optimization.%20Our%20two%20principal%20observations%20are%3A%201%29%20the%20loss%20barcode%20of%20the%20neural%20network%20decreases%20with%20increasing%20depth%20and%20width%2C%20therefore%20the%20topological%20obstructions%20to%20learning%20diminish%3B%202%29%20in%20certain%20situations%20there%20is%20a%20connection%20between%20the%20length%20of%20minima%20segments%20in%20the%20loss%20barcode%20and%20the%20minima%27s%20generalization%20errors.%20Our%20statements%20are%20based%20on%20extensive%20experiments%20with%20fully%20connected%2C%20convolutional%2C%20and%20transformer%20architectures%20and%20several%20datasets%20including%20MNIST%2C%20FMNIST%2C%20CIFAR10%2C%20CIFAR100%2C%20SVHN%2C%20and%20multilingual%20OSCAR%20text%20dataset.%0ALink%3A%20http%3A//arxiv.org/abs/2012.15834v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLoss%2520Barcode%253A%2520A%2520Topological%2520Measure%2520of%2520Escapability%2520in%2520Loss%2520Landscapes%26entry.906535625%3DSerguei%2520Barannikov%2520and%2520Daria%2520Voronkova%2520and%2520Alexander%2520Mironenko%2520and%2520Ilya%2520Trofimov%2520and%2520Alexander%2520Korotin%2520and%2520Grigorii%2520Sotnikov%2520and%2520Evgeny%2520Burnaev%26entry.1292438233%3DNeural%2520network%2520training%2520is%2520commonly%2520based%2520on%2520SGD.%2520However%252C%2520the%2520understanding%2520of%2520SGD%2527s%2520ability%2520to%2520converge%2520to%2520good%2520local%2520minima%252C%2520given%2520the%2520non-convex%2520nature%2520of%2520loss%2520functions%2520and%2520the%2520intricate%2520geometric%2520characteristics%2520of%2520loss%2520landscapes%252C%2520remains%2520limited.%2520In%2520this%2520paper%252C%2520we%2520apply%2520topological%2520data%2520analysis%2520methods%2520to%2520loss%2520landscapes%2520to%2520gain%2520insights%2520into%2520the%2520learning%2520process%2520and%2520generalization%2520properties%2520of%2520deep%2520neural%2520networks.%2520We%2520use%2520the%2520loss%2520function%2520topology%2520to%2520relate%2520the%2520local%2520behavior%2520of%2520gradient%2520descent%2520trajectories%2520with%2520the%2520global%2520properties%2520of%2520the%2520loss%2520surface.%2520For%2520this%2520purpos {"title": "Contextual Latent World Models for Offline Meta Reinforcement Learning", "author": "Mohammadreza Nakheai and Aidan Scannell and Kevin Luck and Joni Pajarinen", "abstract": "Offline meta-reinforcement learning seeks to learn policies that generalize across related tasks from fixed datasets. Context-based methods infer a task representation from transition histories, but learning effective task representations without supervision remains a challenge. In parallel, latent world models have demonstrated strong self-supervised representation learning through temporal consistency. We introduce contextual latent world models, which condition latent world models on inferred task representations and train them jointly with the context encoder. This enforces task-conditioned temporal consistency, yielding task representations that capture task-dependent dynamics rather than merely discriminating between tasks. Our method learns more expressive task representations and significantly improves generalization to unseen tasks across MuJoCo, Contextual-DeepMind Control, and Meta-World benchmarks.", "link": "http://arxiv.org/abs/2603.02935v1", "date": "2026-03-03", "relevancy": 2.4862, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5201}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4858}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4858}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Contextual%20Latent%20World%20Models%20for%20Offline%20Meta%20Reinforcement%20Learning&body=Title%3A%20Contextual%20Latent%20World%20Models%20for%20Offline%20Meta%20Reinforcement%20Learning%0AAuthor%3A%20Mohammadreza%20Nakheai%20and%20Aidan%20Scannell%20and%20Kevin%20Luck%2 {"title": "Sparse autoencoders reveal organized biological knowledge but minimal regulatory logic in single-cell foundation models: a comparative atlas of Geneformer and scGPT", "author": "Ihor Kendiukhov", "abstract": "Background: Single-cell foundation models such as Geneformer and scGPT encode rich biological information, but whether this includes causal regulatory logic rather than statistical co-expression remains unclear. Sparse autoencoders (SAEs) can resolve superposition in neural networks by decomposing dense activations into interpretable features, yet they have not been systematically applied to biological foundation models.\n  Results: We trained TopK SAEs on residual stream activations from all layers of Geneformer V2-316M (18 layers, d=1152) and scGPT whole-human (12 layers, d=512), producing atlases of 82525 and 24527 features, respectively. Both atlases confirm massive superposition, with 99.8 percent of features invisible to SVD. Systematic characterization reveals rich biological organization: 29 to 59 percent of features annotate to Gene Ontology, KEGG, Reactome, STRING, or TRRUST, with U-shaped layer profiles reflecting hierarchical abstraction. Features organize into co-activation modules (141 in Geneformer, 76 in scGPT), exhibit causal specificity (median 2.36x), and form cross-layer information highways (63 to 99.8 percent). When tested against genome-scale CRISPRi perturbation data, only 3 of 48 transcription factors (6.2 percent) show regulatory-target-specific feature responses. A multi-tissue control yields marginal improvement (10.4 percent, 5 of 48 TFs), establishing model representations as the bottleneck.\n  Conclusions: These models have internalized organized biological knowledge, including pathway membership, protein interactions, functional modules, and hierarchical abstraction, yet they encode minimal causal regulatory logic. We release both feature atlases as interactive web platforms enabling exploration of more than 107000 features across 30 layers of two leading single-cell foundation models.", "link": "http://arxiv.org/abs/2603.02952v1", "date": "2026-03-03", "relevancy": 2.4799, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.499}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.499}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4899}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sparse%20autoencoders%20reveal%20organized%20biological%20knowledge%20but%20minimal%20regulatory%20logic%20in%20single-cell%20foundation%20models%3A%20a%20comparative%20atlas%20of%20Geneformer%20and%20scGPT&body=Title%3A%20Sparse%20autoencoders%20reveal%20organized%20biological%20knowledge%20but%20minimal%20regulatory%20logic%20in%20single-cell%20foundation%20models%3A%20a%20comparative%20atlas%20of%20Geneformer%20and%20scGPT%0AAuthor%3A%20Ihor%20Kendiukhov%0AAbstract%3A%20Background%3A%20Single-cell%20foundation%20models%20such%20as%20Geneformer%20and%20scGPT%20encode%20rich%20biological%20information%2C%20but%20whether%20this%20includes%20causal%20regulatory%20logic%20rather%20than%20statistical%20co-expression%20remains%20unclear.%20Sparse%20autoencoders%20%28SAEs%29%20can%20resolve%20superposition%20in%20neural%20networks%20by%20decomposing%20dense%20activations%20into%20interpretable%20features%2C%20yet%20they%20have%20not%20been%20systematically%20applied%20to%20biological%20foundation%20models.%0A%20%20Results%3A%20We%20trained%20TopK%20SAEs%20on%20residual%20stream%20activations%20from%20all%20layers%20of%20Geneformer%20V2-316M%20%2818%20layers%2C%20d%3D1152%29%20and%20scGPT%20whole-human%20%2812%20layers%2C%20d%3D512%29%2C%20producing%20atlases%20o {"title": "Leveraging Label Proportion Prior for Class-Imbalanced Semi-Supervised Learning", "author": "Kohki Akiba and Shinnosuke Matsuo and Shota Harada and Ryoma Bise", "abstract": "Semi-supervised learning (SSL) often suffers under class imbalance, where pseudo-labeling amplifies majority bias and suppresses minority performance. We address this issue with a lightweight framework that, to our knowledge, is the first to introduce Proportion Loss from learning from label proportions (LLP) into SSL as a regularization term. Proportion Loss aligns model predictions with the global class distribution, mitigating bias across both majority and minority classes. To further stabilize training, we formulate a stochastic variant that accounts for fluctuations in mini-batch composition. Experiments on the Long-tailed CIFAR-10 benchmark show that integrating Proportion Loss into FixMatch and ReMixMatch consistently improves performance over the baselines across imbalance severities and label ratios, and achieves competitive or superior results compared to existing CISSL methods, particularly under scarce-label conditions.", "link": "http://arxiv.org/abs/2603.02957v1", "date": "2026-03-03", "relevancy": 2.4541, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4993}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4917}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4814}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Leveraging%20Label%20Proportion%20Prior%20for%20Class-Imbalanced%20Semi-Supervised%20Learning&body=Title%3A%20Leveraging%20Label%20Proportion%20Prior%20for%20Class-Imbalanced%20Semi-Supervised%20Learning%0AAuthor%3A%20Kohki%20Akiba%20and%20Shinnosuke%20Matsuo%20and%20Shota%20Harada%20and%20Ryoma%20Bise%0AAbstract%3A%20Semi-supervised%20learning%20%28SSL%29%20often%20suffers%20under%20class%20imbalance%2C%20where%20pseudo-labeling%20amplifies%20majority%20bias%20and%20suppresses%20minority%20performance.%20We%20address%20this%20issue%20with%20a%20lightweight%20framework%20that%2C%20to%20our%20knowledge%2C%20is%20the%20first%20to%20introduce%20Proportion%20Loss%20from%20learning%20from%20label%20proportions%20%28LLP%29%20into%20SSL%20as%20a%20regularization%20term.%20Proportion%20Loss%20aligns%20model%20predictions%20with%20the%20global%20class%20distribution%2C%20mitigating%20bias%20across%20both%20majority%20and%20minority%20classes.%20To%20further%20stabilize%20training%2C%20we%20formulate%20a%20stochastic%20variant%20that%20accounts%20for%20fluctuations%20in%20mini-batch%20composition.%20Experiments%20on%20the%20Long-tailed%20CIFAR-10%20benchmark%20show%20that%20integrating%20Proportion%20Loss%20into%20FixMatch%20and%20ReMixMatch%20consistently%20improves%20performance%20over%20the%20baselines%20across%20imbalance%20severities%20and%20label%20ratios%2C%20and%20achieves%20competitive%20or%20superior%20results%20compared%20to%20existing%20CISSL%20methods%2C%20particularly%20under%20scarce-label%20conditions.%0ALink%3A%20http%3A//arxiv.org/abs/2603.02957v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLeveraging%2520Label%2520Proportion%2520Prior%2520for%2520Class-Imbalanced%2520Semi-Supervised%2520Learning%26entry.906535625%3DKohki%2520Akiba%2520and%2520Shinnosuke%2520Matsuo%2520and%2520Shota%2520Harada%2520and%2520Ryoma%2520Bise%26entry.1292438233%3DSemi-supervised%2520learning%2520%2528SSL%2529%2520often%2520suffers%2520under%2520class%2520imbalance%252C%2520where%2520pseudo-labeling%2520amplifies%2520majority%2520bias%2520and%2520suppresses%2520minority%2520performance.%2520We%2520address%252 {"title": "LAGO: A Local-Global Optimization Framework Combining Trust Region Methods and Bayesian Optimization", "author": "Eliott Van Dieren and Tommaso Vanzan and Fabio Nobile", "abstract": "We introduce LAGO, a LocAl-Global Optimization algorithm that combines gradient-enhanced Bayesian Optimization (BO) with gradient-based trust region local refinement through an adaptive competition mechanism. At each iteration, global and local optimization strategies independently propose candidate points, and the next evaluation is selected based on predicted improvement. LAGO separates global exploration from local refinement at the proposal level: the BO acquisition function is optimized outside the active trust region, while local function and gradient evaluations are incorporated into the global gradient-enhanced Gaussian process only when they satisfy a lengthscale-based minimum-distance criterion, reducing the risk of numerical instability during the local exploitation. This enables efficient local refinement when reaching promising regions, without sacrificing a global search of the design space. As a result, the method achieves an improved exploration of the full design space compared to standard non-linear local optimization algorithms for smooth functions, while maintaining fast local convergence in regions of interest.", "link": "http://arxiv.org/abs/2603.02970v1", "date": "2026-03-03", "relevancy": 2.4437, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5066}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4916}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4681}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subje ons%20of%20interest.&entry.1838667208=http%3A//arxiv.org/abs/2603.02970v1&entry.124074799=Read"},
{"title": "ULTRA: Unified Multimodal Control for Autonomous Humanoid Whole-Body Loco-Manipulation", "author": "Xialin He and Sirui Xu and Xinyao Li and Runpei Dong and Liuyu Bian and Yu-Xiong Wang and Liang-Yan Gui", "abstract": "Achieving autonomous and versatile whole-body loco-manipulation remains a central barrier to making humanoids practically useful. Yet existing approaches are fundamentally constrained: retargeted data are often scarce or low-quality; methods struggle to scale to large skill repertoires; and, most importantly, they rely on tracking predefined motion references rather than generating behavior from perception and high-level task specifications. To address these limitations, we propose ULTRA, a unified framework with two key components. First, we introduce a physics-driven neural retargeting algorithm that translates large-scale motion capture to humanoid embodiments while preserving physical plausibility for contact-rich interactions. Second, we learn a unified multimodal controller that supports both dense references and sparse task specifications, under sensing ranging from accurate motion-capture state to noisy egocentric visual inputs. We distill a universal tracking policy into this controller, compress motor skills into a compact latent space, and apply reinforcement learning finetuning to expand coverage and improve robustness under out-of-distribution scenarios. This enables coordinated whole-body behavior from sparse intent without test-time reference motions. We evaluate ULTRA in simulation and on a real Unitree G1 humanoid. Results show that ULTRA generalizes to autonomous, goal-conditioned whole-body loco-manipulation from egocentric perception, consistently outperforming tracking-only baselines with limited skills.", "link": "http://arxiv.org/abs/2603.03279v1", "date": "2026-03-03", "relevancy": 2.443, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6126}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6105}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.609}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ULTRA%3A%20Unified%20Multimodal%20Control%20for%20Autonomous%20Humanoid%20Whole-Body%20Loco-Manipulation&body=Title%3A%20ULTRA%3A%20Unified%20Multimodal%20Control%20for%20Autonomous%20Humanoid%20Whole-Body%20Loco-Manipulation%0AAuthor%3A%20Xialin%20He%20and%20Sirui%20Xu%20and%20Xinyao%20Li%20and%20Runpei%20Dong%20and%20Liuyu%20Bian%20and%20Yu-Xiong%20Wang%20and%20Liang-Yan%20Gui%0AAbstract%3A%20Achieving%20autonomous%20and%20versatile%20whole-body%20loco-manipulation%20remains%20a%20central%20barrier%20to%20making%20humanoids%20practically%20useful.%20Yet%20existing%20approaches%20are%20fundamentally%20constrained%3A%20retargeted%20data%20are%20often%20scarce%20or%20low-quality%3B%20methods%20struggle%20to%20scale%20to%20large%20skill%20repertoires%3B%20and%2C%20most%20importantly%2C%20they%20rely%20on%20tracking%20predefined%20motion%20references%20rather%20than%20generating%20behavior%20from%20perception%20and%20high-level%20task%20specifications.%20To%20address%20these%20limitations%2C%20we%20propose%20ULTRA%2C%20a%20unified%20framework%20with%20two%20key%20components.%20First%2C%20we%20introduce%20a%20physics-driven%20neural%20retargeting%20algorithm%20that%20translates%20large-scale%20motion%20capture%20to%20humanoid%20embodiments%20while%20preserving%20physical%20plausibility%20for%20contact-rich%20interactions.%20Second%2C%20we%20learn%20a%20unified%20multimodal%20controller%20that%20supports%20both%20dense%20references%20and%20sparse%20task%20specifications%2C%20under%20sensing%20ranging%20from%20accurate%20motion-capture%20state%20to%20noisy%20egocentric%20visual%20inputs.%20We%20distill%20a%20universal%20tracking%20policy%20into%20this%20controller%2C%20compress%20motor%20skills%20into%20a%20compact%20latent%20space%2C%20and%20apply%20reinforcement%20learning%20finetuning%20to%20expand%20coverage%20and%20improve%20robustness%20under%20out-of-distribution%20scenarios.%20This%20enables%20coordinated%20whole-body%20behavior%20from%20sparse%20intent%20without%20test-time%20reference%20motions.%20We%20evaluate%20ULTRA%20in%20simulation%20and%20on%20a%20real%20Unitree%20G1%20humanoid.%20Results%20show%20that%20ULTRA%20generalizes%20to%20autonomous%2C%20goal-conditioned%20whole-body%20loco-manipulation%20from%20egocentric%20perception%2C%20consistently%20outperforming%20tracking-only%20baselines%20with%20limited%20skills.%0ALink%3A%20http%3A//arxiv.org/abs/2603.03279v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DULTRA%253A%2520Unified%2520Multimodal%2520Control%2520for%2520Autonomous%2520Humanoid%2520Whole-Body%2520Loco-Manipulation%26entry.906535625%3DXialin%2520He%2520and%2520Sirui%2520Xu%2520and%2520Xinyao%2520Li%2520and%2520Runpei%2520Dong%2520and%2520Liuyu%2520Bian%2520and%2520Yu-Xiong%2520Wang%2520and%2520Liang-Yan%2520Gui%26entry.1292438233%3DAchieving%2520autonomous%2520and%2520versatile%2520whole-body%2520loco-manipulation%2520remains%2520a%2520central%2520barrier%2520to%2520making%2520humanoids%2520practically%2520useful.%2520Yet%2520existing%2520approaches%2520are%2520fundamentally%2520constrained%253A%2520retargeted%2520data%2520are%2520often%2520scarce%2520or%2520low-quality%253B%2520methods%2520struggle%2520to%2520scale%2520to%2520large%2520skill%2520repertoires%253B%2520and%252C%2520most%2520importantly%252C%2520they%2520rely%2520on%2520tracking%2520predefined%2520motion%2520references%2520rather%2520than%2520generating%2520behavior%2520from%2520perception%2520and%2520high-level%2520task%2520specifications.%2520To%2520address%2520these%2520limitations%25 {"title": "EP-GAT: Energy-based Parallel Graph Attention Neural Network for Stock Trend Classification", "author": "Zhuodong Jiang and Pengju Zhang and Peter Martin", "abstract": "Graph neural networks have shown remarkable performance in forecasting stock movements, which arises from learning complex inter-dependencies between stocks and intra-dynamics of stocks. Existing approaches based on graph neural networks typically rely on static or manually defined factors to model changing inter-dependencies between stocks. Furthermore, these works often struggle to preserve hierarchical features within stocks. To bridge these gaps, this work presents the Energy-based Parallel Graph Attention Neural Network, a novel approach for predicting future movements for multiple stocks. First, it generates a dynamic stock graph with the energy difference between stocks and Boltzmann distribution, capturing evolving inter-dependencies between stocks. Then, a parallel graph attention mechanism is proposed to preserve the hierarchical intra-stock dynamics. Extensive experiments on five real-world datasets are conducted to validate the proposed approach, spanning from the US stock markets (NASDAQ, NYSE, SP) and UK stock markets (FTSE, LSE). The experimental results demonstrate that EP-GAT consistently outperforms competitive five baselines on test periods across various metrics. The ablation studies and hyperparameter sensitivity analysis further validate the effectiveness of each module in the proposed method. The raw dataset and code are available at https://github.com/theflash987/EP-GAT.", "link": "http://arxiv.org/abs/2507.08184v2", "date": "2026-03-03", "relevancy": 2.4259, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5479}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4595}, {"title": "Weakly-guided self-supervised pretraining for

{"title": "RieMind: Geometry-Grounded Spatial Agent for Scene Understanding", "author": "Fernando Ropero and Erkin Turkoz and Daniel Matos and Junqing Du and Antonio Ruiz and Yanfeng Zhang and Lu Liu and Mingwei Sun and Yongliang Wang", "abstract": "Visual Language Models (VLMs) have increasingly become the main paradigm for understanding indoor scenes, but they still struggle with metric and spatial reasoning. Current approaches rely on end-to-end video understanding or large-scale spatial question answering fine-tuning, inherently coupling perception and reasoning. In this paper, we investigate whether decoupling perception and reasoning leads to improved spatial reasoning. We propose an agentic framework for static 3D indoor scene reasoning that grounds an LLM in an explicit 3D scene graph (3DSG). Rather than ingesting videos directly, each scene is represented as a persistent 3DSG constructed by a dedicated perception module. To isolate reasoning performance, we instantiate the 3DSG from ground-truth annotations. The agent interacts with the scene exclusively through structured geometric tools that expose fundamental properties such as object dimensions, distances, poses, and spatial relationships. The results we obtain on the static split of VSI-Bench provide an upper bound under ideal perceptual conditions on the spatial reasoning performance, and we find that it is significantly higher than previous works, by up to 16\\%, without task specific fine-tuning. Compared to base VLMs, our agentic variant achieves significantly better performance, with average improvements between 33\\% to 50\\%. These findings indicate that explicit geometric grounding substantially improves spatial reasoning performance, and suggest that structured representations offer a compelling alternative to purely end-to-end visual reasoning.", "link": "http://arxiv.org/abs/2603.15386v1", "date": "2026-03-16", "relevancy": 2.4606, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.621}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.621}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5859}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RieMind%3A%20Geometry-Grounded%20Spatial%20Agent%20for%20Scene%20Understanding&body=Title%3A%20RieMind%3A%20Geometry-Grounded%20Spatial%20Agent%20for%20Scene%20Understanding%0AAuthor%3A%20Fernando%20Ropero%20and%20Erkin%20Turkoz%20and%20Daniel%20Matos%20and%20Junqing%20Du%20and%20Antonio%20Ruiz%20and%20Yanfeng%20Zhang%20and%20Lu%20Liu%20and%20Mingwei%20Sun%20and%20Yongliang%20Wang%0AAbstract%3A%20Visual%20Language%20Models%20%28VLMs%29%20have%20increasingly%20become%20the%20main%20paradigm%20for%20understanding%20indoor%20scenes%2C%20but%20they%20still%20struggle%20with%20metric%20and%20spatial%20reasoning.%20Current%20approaches%20rely%20on%20end-to-end%20video%20understanding%20or%20large-scale%20spatial%20question%20answering%20fine-tuning%2C%20inherently%20coupling%20perception%20and%20reasoning.%20In%20this%20paper%2C%20we%20investigate%20whether%20decoupling%20perception%20and%20reasoning%20leads%20to%20improved%20spatial%20reasoning.%20We%20propose%20an%20agentic%20framework%20for%20static%203D%20indoor%20scene%20reasoning%20that%20grounds%20an%20LLM%20in%20an%20explicit%203D%20scene%20graph%20%283DSG%29.%20Rather%20than%20ingesting%20videos%20directly%2C%20each%20scene%20is%20represented%20as%20a%20persistent%203DSG%20constructed%20by%20a%20dedicated%20perception%20module.%20To%20isolate%20reasoning%20performance%2C%20we%20instantiate%20the%203DSG%20from%20ground-truth%20annotations.%20The%20agent%20interacts%20with%20the%20scene%20exclusively%20thr {"title": "Clinically Aware Synthetic Image Generation for Concept Coverage in Chest X-ray Models", "author": "Amy Rafferty and Rishi Ramaesh and Ajitha Rajan", "abstract": "The clinical deployment of AI diagnostic models demands more than benchmark accuracy - it demands robustness across the full spectrum of disease presentations. However, publicly available chest radiographic datasets systematically underrepresent critical clinical feature combinations, leaving models under-trained precisely where clinical stakes are highest. We present CARS, a clinically aware and anatomically grounded framework that addresses this gap through principled synthetic image generation. CARS applies targeted perturbations to clinical feature vectors, enabling controlled insertion and deletion of pathological findings while explicitly preserving anatomical structure. We evaluate CARS across seven backbone architectures by fine-tuning models on synthetic subsets and testing on a held-out MIMIC-CXR benchmark. Compared to prior feature perturbation approaches, fine-tuning on CARS-generated images consistently improves precision-recall performance, reduces predictive uncertainty, and improves model calibration. Structural and semantic analyses demonstrate high anatomical fidelity, strong feature alignment, and low semantic uncertainty. Independent evaluation by two expert radiologists further confirms realism and clinical agreement. As the field moves toward regulated clinical AI, CARS demonstrates that anatomically faithful synthetic data generation for better feature space coverage is a viable and effective strategy for improving both the performance and trustworthiness of chest X-ray classification systems - without compromising clinical integrity.", "link": "http://arxiv.org/abs/2603.15525v1", "date": "2026-03-16", "relevancy": 2.4527, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4972}, {"title": "HSImul3R: Physics-in-the-Loop Reconstruction of Simulation-Ready Human-Scene Interactions", "author": "Yukang Cao and Haozhe Xie and Fangzhou Hong and Long Zhuo and Zhaoxi Chen and Liang Pan and Ziwei Liu", "abstract": "We present HSImul3R, a unified framework for simulation-ready 3D reconstruction of human-scene interactions (HSI) from casual captures, including sparse-view images and monocular videos. Existing methods suffer from a perception-simulation gap: visually plausible reconstructions often violate physical constraints, leading to instability in physics engines and failure in embodied AI applications. To bridge this gap, we introduce a physically-grounded bi-directional optimization pipeline that treats the physics simulator as an active supervisor to jointly refine human dynamics and scene geometry. In the forward direction, we employ Scene-targeted Reinforcement Learning to optimize human motion under dual supervision of motion fidelity and contact stability. In the reverse direction, we propose Direct Simulation Reward Optimization, which leverages simulation feedback on gravitational stability and interaction success to refine scene geometry. We further present HSIBench, a new benchmark with diverse objects and interaction scenarios. Extensive experiments demonstrate that HSImul3R produces the first stable, simulation-ready HSI reconstructions and can be directly deployed to real-world humanoid robots.", "link": "http://arxiv.org/abs/2603.15612v1", "date": "2026-03-16", "relevancy": 2.4496, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6515}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.592}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5657}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HSImul3R%3A%20Physics-in-the-Loop%20Reconstruction%20of%20Simulation-Ready%20Human-Scene%20Interactions&body=Title%3A%20HSImul3R%3A%20Physics-in-the-Loop%20Reconstruction%20of%20Simulation-Ready%20Human-Scene%20Interactions%0AAuthor%3A%20Yukang%20Cao%20and%20Haozhe%20Xie%20and%20Fangzhou%20Hong%20and%20Long%20Zhuo%20and%20Zhaoxi%20Chen%20and%20Liang%20Pan%20and%20Ziwei%20Liu%0AAbstract%3A%20We%20present%20HSImul3R%2C%20a%20unified%20framework%20for%20simulation-ready%203D%20reconstruction%20of%20human-scene%20interactions%20%28HSI%29%20from%20casual%20captures%2C%20including%20sparse-view%20images%20and%20monocular%20videos.%20Existing%20methods%20suffer%20from%20a%20perception-simulation%20gap%3A%20visually%20plausible%20reconstructions%20often%20violate%20physical%20constraints%2C%20leading%20to%20instability%20in%20physics%20engines%20and%20failure%20in%20embodied%20AI%20applications.%20To%20bridge%20this%20gap%2C%20we%20introduce%20a%20physically-grounded%20bi-directional%20optimization%20pipeline%20that%20treats%20the%20physics%20simulator%20as%20an%20active%20supervisor%20to%20jointly%20refine%20human%20dynamics%20and%20scene%20geometry.%20In%20the%20forward%20direction%2C%20we%20employ%20Scene-targeted%20Reinforcement%20Learning%20to%20optimize%20human%20motion%20under%20dual%20supervision%20of%20motion%20fidelity%20and%20contact%20stability.%20In%20the%20reverse%20direction%2C%20we%20propose%20Direct%20Simulation%20Reward%20Optimization%2C%20which%20leverages%20simulation%20feedback%20on%20gravitational%20stability%20and%20interaction%20success%20to%20refine%20scene%20geometry.%20We%20further%20present%20HSIBench%2C%20a%20new%20benchmark%20with%20diverse%20objects%20and%20interaction%20scenarios.%20Extensive%20experiments%20demonstrate%20that%20HSImul3R%20produces%20the%20first%20stable%2C%20simulation-ready%20HSI%20reconstructions%20and%20can%20be%20directly%20deployed%20to%20real-world%20humanoid%20robots.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15612v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHSImul3R%253A%2520Physics-in-the-Loop%2520Reconstruction%2520of%2520Simulation-Ready%2520Human-Scene%2520Interactions%26entry.906535625%3DYukang%2520Cao%2520and%2520Haozhe%2520Xie%2520and%2520Fangzhou%2520Hong%2520and%2520Long%2520Zhuo%2520and%2520Zhaoxi%2520Chen%2520and%2520Liang%2520Pan%2520and%2520Ziwei%2520Liu%26entry.1292438233%3DWe%2520present%2520HSImul3R%252C%2520a%2520unified%2520framework%2520for%2520simulation-ready%25203D%2520reconstruction%2520of%2520human-scene%2520interactions%2520%2528HSI%2529%2520from%2520casual%2520captures%252C%2520including%2520sparse-view%2520images%2520and%2520monocular%2520videos.%2520Existing%2520methods%2520suffer%2520from%2520a%2520perception-simulation%2520gap%253A%2520visually%2520plausible%2520reconstructions%2520often%2520violate%2520physical%2520constraints%252C%2520leading%2520to%2520instability%2520in%2520physics%2520engines%2520and%2520failure%2520in%2520embodied%2520AI%2520applications.%2520To%2520bridge%2520this%2520gap%252C%2520we%2520introduce%2520a%2520physically-grounded%2520bi-directional%2520optimization%2520pipeline%2520that%2520treats%2520the%2520physics%2520simulator%2520as%2520an%2520active%2520supervisor%2520to%2520jointly%2520refine%2520human%2520dynamics%2520and%2520scene%2520geometry.%2520In%2520the%2520forward%2520direction%252C%2520we%2520employ%2520Scene-targeted%2520Reinforcement%2520Learning%2520to%2520optimize%2520human%2520motion%2520under%2520dual%2520supervision%2520of%2520motion%2520fidelity%2520and%2520contact%2520stability.%2520In%2520the%2520reverse%2520direction%252C%2520we%2520propose%2520Direct%2520Simulation%2520Reward%2520Optimization%252C%2520which%2520leverages%2520simulation%2520feedback%2520on%2520gravitational%2520stability%2520and%2520interaction%2520success%2520to%2520ref %2C%20which%20leverages%20simulation%20feedback%20on%20gravitational%20stability%20and%20interaction%20success%20to%20refine%20scene%20geometry.%20We%20further%20present%20HSIBench%2C%20a%20new%20benchmark%20with%20diverse%20objects%20and%20interaction%20scenarios.%20Extensive%20experiments%20demonstrate%20that%20HSImul3R%20produces%20the%20first%20stable%2C%20simulation-ready%20HSI%20reconstructions%20and%20can%20be%20directly%20deployed%20to%20real-world%20humanoid%20robots.&entry.1838667208=http%3A//arxiv.org/abs/2603.15612v1&entry.124074799=Read"},
{"title": "Kimodo: Scaling Controllable Human Motion Generation", "author": "Davis Rempe and Mathis Petrovich and Ye Yuan and Haotian Zhang and Xue Bin Peng and Yifeng Jiang and Tingwu Wang and Umar Iqbal and David Minor and Michael de Ruyter and Jiefeng Li and Chen Tessler and Edy Lim and Eugene Jeong and Sam Wu and Ehsan Hassani and Michael Huang and Jin-Bey Yu and Chaeyeon Chung and Lina Song and Olivier Dionne and Jan Kautz and Simon Yuen and Sanja Fidler", "abstract": "High-quality human motion data is becoming increasingly important for applications in robotics, simulation, and entertainment. Recent generative models offer a potential data source, enabling human motion synthesis through intuitive inputs like text prompts or kinematic constraints on poses. However, the small scale of public mocap datasets has limited the motion quality, control accuracy, and generalization of these models. In this work, we introduce Kimodo, an expressive and controllable kinematic motion diffusion model trained on 700 hours of optical motion capture data. Our model generates high-quality motions while being easily controlled through text and a comprehensive suite of kinematic constraints including full-body keyframes, sparse joint positions/rotations, 2D waypoints, and dense 2D paths. This is enabled through a carefully designed motion representation and two-stage denoiser architecture that decomposes root and body prediction to minimize motion artifacts while allowing for flexible constraint conditioning. Experiments on the large-scale mocap dataset justify key design decisions and analyze how the scaling of dataset size and model size affect performance.", "link": "http://arxiv.org/abs/2603.15546v1", "date": "2026-03-16", "relevancy": 2.4454, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6883}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5605}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5548}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Kimodo%3A%20Scaling%20Controllable%20Human%20Motion%20Generation&body=Title%3A%20Kimodo%3A%20Scaling%20Controllable%20Human%20Motion%20Generation%0AAuthor%3A%20Davis%20Rempe%20and%20Mathis%20Petrovich%20and%20Ye%20Yuan%20and%20Haotian%20Zhang%20and%20Xue%20Bin%20Peng%20and%20Yifeng%20Jiang%20and%20Tingwu%20Wang%20and%20Umar%20Iqbal%20and%20David%20Minor%20and%20Michael%20de%20Ruyter%20and%20Jiefeng%20Li%20and%20Chen%20Tessler%20and%20Edy%20Lim%20and%20Eugene%20Jeong%20and%20Sam%20Wu%20and%20Ehsan%20Hassani%20and%20Michael%20Huang%20and%20Jin-Bey%20Yu%20and%20Chaeyeon%20Chung%20and%20Lina%20Song%20and%20Olivier%20Dionne%20and%20Jan%20Kautz%20and%20Simon%20Yuen%20and%20Sanja%20Fidler%0AAbstract%3A%20High-quality%20human%20motion%20data%20is%20becoming%20increasingly%20important%20for%20applications%20in%20robotics%2C%20simulation%2C%20and%20entertainment.%20Recent%20generative%20models%20offer%20a%20potential%20data%20source%2C%20enabling%20human%20motion%20synthesis%20through%20intuitive%20inputs%20like%20text%20prompts%20or%20kinematic%20constraints%20on%20poses.%20However%2C%20the%20small%20scale%20of%20public%20mocap%20datasets%20has%20limited%20the%20motion%20quality%2C%20control%20accuracy%2C%20and%20generalization%20of%20these%20models.%20In%20this%20work%2C%20we%20introduce%20Kimodo%2C%20an%20expressive%20and%20controllable%20kinematic%20motion%20diffusion%20model%20trained%20on%20700%20hours%20of%20optical%20motion%20capture%20data.%20Our%20model%20generates%20high-quality%20motions%20while%20being%20easily%20controlled%20through%20text%20and%20a%20comprehensive%20suite%20of%20kinematic%20constraints%20including%20full-body%20keyframes%2C%20sparse%20joint%20positions/rotations%2C%202D%20waypoints%2C%20and%20dense%202D%20paths.%20This%20is%20enabled%20through%20a%20carefully%20designed%20motion%20representation%20and%20two-stage%20denoiser%20architecture%20that%20decomposes%20root%20and%20body%20prediction%20to%20minimize%20motion%20artifacts%20while%20allowing%20for%20flexible%20constraint%20conditioning.%20Experiments%20on%20the%20large-scale%20mocap%20dataset%20justify%20key%20design%20decisions%20and%20analyze%20how%20the%20scaling%20of%20dataset%20size%20and%20model%20size%20affect%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15546v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DKimodo%253A%2520Scaling%2520Controllable%2520Human%2520Motion%2520Generation%26entry.906535625%3DDavis%2520Rempe%2520and%2520Mathis%2520Petrovich%2520and%2520Ye%2520Yuan%2520and%2520Haotian%2520Zhang%2520and%2520Xue%2520Bin%2520Peng%2520and%2520Yifeng%2520Jiang%2520and%2520Tingwu%2520Wang%2520and%2520Umar%2520Iqbal%2520and%2520David%2520Minor%2520and%2520Michael%2520de%2520Ruyter%2520and%2520Jiefeng%2520Li%2520and%2520Chen%2520Tessler%2520and%2520Edy%2520Lim%2520and%2520Eugene%2520Jeong%2520and%2520Sam%2520Wu%2520and%2520Ehsan%2520Hassani%2520and%2520Michael%2520Huang%2520and%2520Jin-Bey%2520Yu%2520and%2520Chaeyeon%2520Chung%2520and%2520Lina%2520Song%2520and%2520Olivier%2520Dionne%2520and%2520Jan%2520Kautz%2520and%2520Simon%2520Yuen%2520and%2520Sanja%2520Fidler%26entry.1292438233%3DHigh-quality%2520human%2520motion%2520data%2520is%2520becoming%2520increasingly%2520important%2520for%2520applications%2520in%2520robotics%252C%2520simulation%252C%2520and%2520entertainment.%2520Recent%2520generative%2520models%2520offer%2520a%2520potential%2520data%2520source%252C%2520enabling%2520human%2520motion%2520synthesis%2520through%2520intuitive%2520inputs%2520like%2520text%2520prompts%2520or%2520kinematic%2520constraints%2520on%2520poses.%2520However%252C%2520the%2520small%2520scale%2520of%2520public%2520mocap%2520da {"title": "Benchmarking Deep Learning and Vision Foundation Models for Atypical vs. Normal Mitosis Classification with Cross-Dataset Evaluation", "author": "Sweta Banerjee and Viktoria Weiss and Taryn A. Donovan and Rutger H. J. Fick and Thomas Conrad and Jonas Ammeling and Nils Porsche and Robert Klopfleisch and Christopher Kaltenecker and Katharina Breininger and Marc Aubreville and Christof A. Bertram", "abstract": "Atypical mitosis marks a deviation in the cell division process that has been shown be an independent prognostic marker for tumor malignancy. However, atypical mitosis classification remains challenging due to low prevalence, at times subtle morphological differences from normal mitotic figures, low inter-rater agreement among pathologists, and class imbalance in datasets. Building on the Atypical Mitosis dataset for Breast Cancer (AMi-Br), this study presents a comprehensive benchmark comparing deep learning approaches for automated atypical mitotic figure (AMF) classification, including end-to-end trained deep learning models, foundation models with linear probing, and foundation models fine-tuned with low-rank adaptation (LoRA). For rigorous evaluation, we further introduce two new held-out AMF datasets - AtNorM-Br, a dataset of mitotic figures from the TCGA breast cancer cohort, and AtNorM-MD, a multi-domain dataset of mitotic figures from a subset of the MIDOG++ training set. We found average balanced accuracy values of up to 0.8135, 0.7788, and 0.7723 on the in-domain AMi-Br and the out-of-domain AtNorm-Br and AtNorM-MD datasets, respectively. Our work shows that atypical mitotic figure classification, while being a challenging problem, can be effectively addressed through the use of recent advances in transfer learning and model fine-tuning techniques. We make all code and data used in this paper available in this github repository: https://github.com/DeepMicroscopy/AMi-Br_Benchmark.", "link": "http://arxiv.org/abs/2506.21444v3", "date": "2026-03-16", "relevancy": 2.4351, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4919}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4846}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4846}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Benchmarking%20Deep%20Learning%20and%20Vision%20Foundation%20Models%20for%20Atypical%20vs.%20Normal%20Mitosis%20Classification%20with%20Cross-Dataset%20Evaluation&body=Title%3A%20Benchmarking%20Deep%20Learning%20and%20Vision%20Foundation%20Models%20for%20Atypical%20vs.%20Normal%20Mitosis%20Classification%20with%20Cross-Dataset%20Evaluation%0AAuthor%3A%20Sweta%20Banerjee%20and%20Viktoria%20Weiss%20and%20Taryn%20A.%20Donovan%20and%20Rutger%20H.%20J.%20Fick%20and%20Thomas%20Conrad%20and%20Jonas%20Ammeling%20and%20Nils%20Porsche%20and%20Robert%20Klopfleisch%20and%20Christopher%20Kaltenecker%20and%20Katharina%20Breininger%20and%20Marc%20Aubreville%20and%20Christof%20A.%20Bertram%0AAbstract%3A%20Atypical%20mitosis%20marks%20a%20deviation%20in%20the%20cell%20division%20process%20that%20has%20been%20shown%20be%20an%20independent%20prognostic%20marker%20for%20tumor%20malignancy.%20However%2C%20atypical%20mitosis%20classification%20remains%20challenging%20due%20to%20low%20prevalence%2C%20at%20times%20subtle%20morphological%20differences%20from%20normal%20mitotic%20figures%2C%20low%20inter-rater%20agreement%20among%20pathologists%2C%20and%20class%20imbalance%20in%20datasets.%20Building%20on%20the%20Atypical%20Mitosis%20dataset%20for%20Breast%20Cancer%20%28AMi-Br%29%2C%20this%20study%20presents%20a%20comprehensive%20benchmark%20comparing%20deep%20learning%20approaches%20for%20automated%20atypical%20mitotic%20figure%20%28AMF%29%20classification%2C%20including%20end-to-end%20trained%20deep%20learning%20models%2C%20foundation%20models%20with%20linear%20probing%2C%20and%20foundation%20models%20fine-tuned%20with%20low-rank%20adaptation%20%28LoRA%29.%20For%20rigorous%20evaluation%2C%20we%20further%20introduce%20two%20new%20held-out%20AMF%20datasets%20-%20AtNorM-Br%2C%20a%20dataset%20of%20mitotic%20figures%20from%20the%20TCGA%20breast%20cancer%20cohort%2C%20and%20AtNorM-MD%2C%20a%20multi-domain%20dataset%20of%20mitotic%20figures%20from%20a%20subset%20of%20the%20MIDOG%2B%2B%20training%20set.%20We%20found%20average%20balanced%20accuracy%20values%20of%20up%20to%200.8135%2C%200.7788%2C%20and%200.7723%20on%20the%20in-domain%20AMi-Br%20and%20the%20out-of-domain%20AtNorm-Br%20and%20AtNorM-MD%20datasets%2C%20respectively.%20Our%20work%20shows%20that%20atypical%20mitotic%20figure%20classification%2C%20while%20being%20a%20challenging%20problem%2C%20can%20be%20effectively%20addressed%20through%20the%20use%20of%20recent%20advances%20in%20transfer%20learning%20and%20model%20fine-tuning%20techniques.%20We%20make%20all%20code%20and%20data%20used%20in%20this%20paper%20available%20in%20this%20github%20repository%3A%20https%3A//github.com/DeepMicroscopy/AMi-Br_Benchmark.%0ALink%3A%20http%3A//arxiv.org/abs/2506.21444v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBenchmarking%2520Deep%2520Learning%2520and%2520Vision%2520Foundation%2520Models%2520for%2520Atypical%2520vs.%2520Normal%2520Mitosis%2520Classification%2520with%2520Cross-Dataset%2520Evaluation%26entry.906535625%3DSweta%2520Banerjee%2520and%2520Viktoria%2520Weiss%2520and%2520Taryn%2520A.%2520Donovan%2520and%2520Rutger%2520H.%2520J.%2520Fick%2520and%2520Thomas%2520Conrad%2520and%2520Jonas%2520Ammeling%2520and%2520Nils%2520Porsche%2520and%2520Robert%2520Klopfleisch%2520and%2520Christopher%2520Kaltenecker%2520and%2520Katharina%2520Breininger%2520and%252 rk%2520shows%2520that%2520atypical%2520mitotic%2520figure%2520classification%252C%2520while%2520being%2520a%2520challenging%2520problem%252C%2520can%2520be%2520effectively%2520addressed%2520through%2520the%2520use%2520of%2520recent%2520advances%2520in%2520transfer%2520learning%2520and%2520model%2520fine-tuning%2520techniques.%2520We%2520make%2520all%2520code%2520and%2520data%2520used%2520in%2520this%2520paper%2520available%2520in%2520this%2520github%2520repository%253A%2520https%253A//github.com/DeepMicroscopy/AMi-Br_Benchmark.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2506.21444v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Benchmarking%20Deep%20Learning%20and%20Vision%20Foundation%20Models%20for%20Atypical%20vs.%20Normal%20Mitosis%20Classification%20with%20Cross-Dataset%20Evaluation&entry.906535625=Sweta%20Banerjee%20and%20Viktoria%20Weiss%20and%20Taryn%20A.%20Donovan%20and%20Rutger%20H.%20J.%20Fick%20and%20Thomas%20Conrad%20and%20Jonas%20Ammeling%20and%20Nils%20Porsche%20and%20Robert%20Klopfleisch%20and%20Christopher%20Kaltenecker%20and%20Katharina%20Breininger%20and%20Marc%20Aubreville%20and%20Christof%20A.%20Bertram&entry.1292438233=Atypical%20mitosis%20marks%20a%20deviation%20in%20the%20cell%20division%20process%20that%20has%20been%20shown%20be%20an%20independent%20prognostic%20marker%20for%20tumor%20malignancy.%20However%2C%20atypical%20mitosis%20classification%20remains%20challenging%20due%20to%20low%20prevalence%2C%20at%20times%20subtle%20morphological%20differences%20from%20normal%20mitotic%20figures%2C%20low%20inter-rater%20agreement%20among%20pathologists%2C%20and%20class%20imbalance%20in%20datasets.%20Building%20on%20the%20Atypical%20Mitosis%20dataset%20for%20Breast%20Cancer%20%28AMi-Br%29%2C%20this%20study%20presents%20a%20comprehensive%20benchmark%20comparing%20deep%20learning%20approaches%20for%20automated%20atypical%20mitotic%20figure%20% {"title": "Why the Valuable Capabilities of LLMs Are Precisely the Unexplainable Ones", "author": "Quan Cheng", "abstract": "This paper proposes and argues for a counterintuitive thesis: the truly valuable capabilities of large language models (LLMs) reside precisely in the part that cannot be fully captured by human-readable discrete rules. The core argument is a proof by contradiction via expert system equivalence: if the full capabilities of an LLM could be described by a complete set of human-readable rules, then that rule set would be functionally equivalent to an expert system; but expert systems have been historically and empirically demonstrated to be strictly weaker than LLMs; therefore, a contradiction arises -- the capabilities of LLMs that exceed those of expert systems are exactly the capabilities that cannot be rule-encoded. This thesis is further supported by the Chinese philosophical concept of Wu (sudden insight through practice), the historical failure of expert systems, and a structural mismatch between human cognitive tools and complex systems. The paper discusses implications for interpretability research, AI safety, and scientific epistemology.", "link": "http://arxiv.org/abs/2603.15238v1", "date": "2026-03-16", "relevancy": 2.4268, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5006}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4777}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4777}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Why%20the%20Valuable%20Capabilities%20of%20LLMs%20Are%20Precisely%20the%20Unexplainable%20Ones&body=Title%3A%20Why%20the%20Valuable%20Capabilities%20of%20LLMs%20Are%20Precisely%20the%20Unexplainable%20Ones%0AAuthor%3A%20Quan%20Cheng%0AAbstract%3A%20This%20paper%20proposes%20and%20argues%20for%20a%20counterintuitive%20thesis%3A%20the%20truly%20valuable%20capabilities%20of%20large%20language%20models%20%28LLMs%29%20reside%20precisely%20in%20the%20part%20that%20cannot%20be%20fully%20captured%20by%20human-readable%20discrete%20rules.%20The%20core%20argument%20is%20a%20proof%20by%20contradiction%20via%20expert%20system%20equivalence%3A%20if%20the%20full%20capabilities%20of%20an%20LLM%20could%20be%20described%20by%20a%20complete%20set%20of%20human-readable%20rules%2C%20then%20that%20rule%20set%20would%20be%20functionally%20equivalent%20to%20an%20expert%20system%3B%20but%20expert%20systems%20have%20been%20historically%20and%20empirically%20demonstrated%20to%20be%20strictly%20weaker%20than%20LLMs%3B%20therefore%2C%20a%20contradiction%20arises%20--%20the%20capabilities%20of%20LLMs%20that%20exceed%20those%20of%20expert%20systems%20are%20exactly%20the%20capabilities%20that%20cannot%20be%20rule-encoded.%20This%20thesis%20is%20further%20supported%20by%20the%20Chinese%20philosophical%20concept%20of%20Wu%20%28sudden%20insight%20through%20practice%29%2C%20the%20historical%20failure%20of%20expert%20systems%2C%20and%20a%20structural%20mismatch%20between%20human%20cognitive%20tools%20and%20complex%20systems.%20The%20paper%20discusses%20implications%20for%20interpretability%20research%2C%20AI%20safety%2C%20and%20scientific%20epistemology.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15238v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhy%2520the%2520Valuable%2520Capabilities%2520of%2520LLMs%2520Are%2520Precisely%2520the%2520Unexplainable%2520Ones%26entry.906535625%3DQuan%2520Cheng%26entry.1292438233%3DThis%2520paper%2520proposes%2520and%2520a {"title": "Enhancing classification accuracy through chaos", "author": "Panos Stinis", "abstract": "We propose a novel approach which exploits chaos to enhance classification accuracy. Specifically, the available data that need to be classified are treated as vectors that are first lifted into a higher-dimensional space and then used as initial conditions for the evolution of a chaotic dynamical system for a prescribed temporal interval. The evolved state of the dynamical system is then fed to a trainable softmax classifier which outputs the probabilities of the various classes. As proof-of-concept, we use samples of randomly perturbed orthogonal vectors of moderate dimension (2 to 20), with a corresponding number of classes equal to the vector dimension, and show how our approach can both significantly accelerate the training process and improve the classification accuracy compared to a standard softmax classifier which operates on the original vectors, as well as a softmax classifier which only lifts the vectors to a higher-dimensional space without evolving them. We also provide an explanation for the improved performance of the chaos-enhanced classifier.", "link": "http://arxiv.org/abs/2603.15299v1", "date": "2026-03-16", "relevancy": 2.4216, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5007}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4783}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.474}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Enhancing%20classification%20accuracy%20through%20chaos& {"title": "A Survey on Deep Learning Approaches for Tabular Data Generation: Utility, Alignment, Fidelity, Privacy, Diversity, and Beyond", "author": "Mihaela C\u0103t\u0103lina Stoian and Eleonora Giunchiglia and Thomas Lukasiewicz", "abstract": "Generative modelling has become the standard approach for synthesising tabular data. However, different use cases demand synthetic data to comply with different requirements to be useful in practice. In this survey, we review deep generative modelling approaches for tabular data from the perspective of five types of requirements: utility of the synthetic data, alignment of the synthetic data with domain-specific knowledge, statistical fidelity of the synthetic data distribution compared to the real data distribution, privacy-preserving capabilities, and sampling diversity. We group the approaches along two levels of granularity: (i) based on the requirements they address and (ii) according to the underlying model they utilise. Additionally, we summarise the appropriate evaluation methods for each requirement, the relationships among the requirements, and the specific characteristics of each model type. Finally, we discuss future directions for the field, along with opportunities to improve the current evaluation methods. Overall, this survey can be seen as a user guide to tabular data generation: helping readers navigate available models and evaluation methods to find those best suited to their needs.", "link": "http://arxiv.org/abs/2503.05954v2", "date": "2026-03-16", "relevancy": 2.4205, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4913}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4823}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4787}], "mailto": "mailto:haoxiang.li.20 {"title": "InterPol: De-anonymizing LM Arena via Interpolated Preference Learning", "author": "Minsung Cho and Jaehyung Kim", "abstract": "Strict anonymity of model responses is a key for the reliability of voting-based leaderboards, such as LM Arena. While prior studies have attempted to compromise this assumption using simple statistical features like TF-IDF or bag-ofwords, these methods often lack the discriminative power to distinguish between stylistically similar or within-family models. To overcome these limitations and expose the severity of vulnerability, we introduce INTERPOL, a model-driven identification framework that learns to distinguish target models from others using interpolated preference data. Specifically, INTERPOL captures deep stylistic patterns that superficial statistical features miss by synthesizing hard negative samples through model interpolation and employing an adaptive curriculum learning strategy. Extensive experiments demonstrate that INTERPOL significantly outperforms existing baselines in identification accuracy. Furthermore, we quantify the real-world threat of our findings through ranking manipulation simulations on Arena battle data.", "link": "http://arxiv.org/abs/2603.15220v1", "date": "2026-03-16", "relevancy": 2.4203, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5035}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4743}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4743}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20InterPol%3A%20De-anonymizing%20LM%20 {"title": "Understanding Reasoning in LLMs through Strategic Information Allocation under Uncertainty", "author": "Jeonghye Kim and Xufang Luo and Minbeom Kim and Sangmook Lee and Dongsheng Li and Yuqing Yang", "abstract": "LLMs often exhibit Aha moments during reasoning, such as apparent self-correction following tokens like \"Wait,\" yet their underlying mechanisms remain unclear. We introduce an information-theoretic framework that decomposes reasoning into procedural information and epistemic verbalization - the explicit externalization of uncertainty that supports downstream control actions. We show that purely procedural reasoning can become informationally stagnant, whereas epistemic verbalization enables continued information acquisition and is critical for achieving information sufficiency. Empirical results demonstrate that strong reasoning performance is driven by uncertainty externalization rather than specific surface tokens. Our framework unifies prior findings on Aha moments and post-training experiments, and offers insights for future reasoning model design.", "link": "http://arxiv.org/abs/2603.15500v1", "date": "2026-03-16", "relevancy": 2.4199, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5172}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4673}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4673}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Understanding%20Reasoning%20in%20LLMs%20through%20Strategic%20Information%20Allocation%20under%20Uncertainty&body=Title%3A%20Understandi {"title": "Bridging Local and Global Knowledge: Cascaded Mixture-of-Experts Learning for Near-Shortest Path Routing", "author": "Yung-Fu Chen and Anish Arora", "abstract": "While deep learning models that leverage local features have demonstrated significant potential for near-optimal routing in dense Euclidean graphs, they struggle to generalize well in sparse networks where topological irregularities require broader structural awareness. To address this limitation, we train a Cascaded Mixture of Experts (Ca-MoE) to solve the all-pairs near-shortest path (APNSP) routing problem. Our Ca-MoE is a modular two-tier architecture that supports the decision-making for forwarder selection with lower-tier experts relying on local features and upper-tier experts relying on global features. It performs adaptive inference wherein the upper-tier experts are triggered only when the lower-tier ones do not suffice to achieve adequate decision quality. Computational efficiency is thus achieved by escalating model capacity only when necessitated by topological complexity, and parameter redundancy is avoided. Furthermore, we incorporate an online meta-learning strategy that facilitates independent expert fine-tuning and utilizes a stability-focused update mechanism to prevent catastrophic forgetting as new graph environments are encountered. Experimental evaluations demonstrate that Ca-MoE routing improves accuracy by up to 29.1% in sparse networks compared to single-expert baselines and maintains performance within 1%-6% of the theoretical upper bound across diverse graph densities.", "link": "http://arxiv.org/abs/2603.15541v1", "date": "2026-03-16", "relevancy": 2.4196, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4969}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity" %20catastrophic%20forgetting%20as%20new%20graph%20environments%20are%20encountered.%20Experimental%20evaluations%20demonstrate%20that%20Ca-MoE%20routing%20improves%20accuracy%20by%20up%20to%2029.1%25%20in%20sparse%20networks%20compared%20to%20single-expert%20baselines%20and%20maintains%20performance%20within%201%25-6%25%20of%20the%20theoretical%20upper%20bound%20across%20diverse%20graph%20densities.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15541v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBridging%2520Local%2520and%2520Global%2520Knowledge%253A%2520Cascaded%2520Mixture-of-Experts%2520Learning%2520for%2520Near-Shortest%2520Path%2520Routing%26entry.906535625%3DYung-Fu%2520Chen%2520and%2520Anish%2520Arora%26entry.1292438233%3DWhile%2520deep%2520learning%2520models%2520that%2520leverage%2520local%2520features%2520have%2520demonstrated%2520significant%2520potential%2520for%2520near-optimal%2520routing%2520in%2520dense%2520Euclidean%2520graphs%252C%2520they%2520struggle%2520to%2520generalize%2520well%2520in%2520sparse%2520networks%2520where%2520topological%2520irregularities%2520require%2520broader%2520structural%2520awareness.%2520To%2520address%2520this%2520limitation%252C%2520we%2520train%2520a%2520Cascaded%2520Mixture%2520of%2520Experts%2520%2528Ca-MoE%2529%2520to%2520solve%2520the%2520all-pairs%2520near-shortest%2520path%2520%2528APNSP%2529%2520routing%2520problem.%2520Our%2520Ca-MoE%2520is%2520a%2520modular%2520two-tier%2520architecture%2520that%2520supports%2520the%2520decision-making%2520for%2520forwarder%2520selection%2520with%2520lower-tier%2520experts%2520relying%2520on%2520local%2520features%2520and%2520upper-tier%2520experts%2520relying%2520on%2520global%2520features.%2520It%2520performs%2520adaptive%2520inference%2520wherein%2520the%2520upper-tier%2520experts%2520are%2520triggered%2520only%2520when%2520the%2520lower-tier%2520ones%2520do%2520not%2520suffice%2520to%2520 {"title": "Can LLMs Model Incorrect Student Reasoning? A Case Study on Distractor Generation", "author": "Yanick Zengaffinen and Andreas Opedal and Donya Rooein and Kv Aditya Srivatsa and Shashank Sonkar and Mrinmaya Sachan", "abstract": "Modeling plausible student misconceptions is critical for AI in education. In this work, we examine how large language models (LLMs) reason about misconceptions when generating multiple-choice distractors, a task that requires modeling incorrect yet plausible answers by coordinating solution knowledge, simulating student misconceptions, and evaluating plausibility. We introduce a taxonomy for analyzing the strategies used by state-of-the-art LLMs, examining their reasoning procedures and comparing them to established best practices in the learning sciences. Our structured analysis reveals a surprising alignment between their processes and best practices: the models typically solve the problem correctly first, then articulate and simulate multiple potential misconceptions, and finally select a set of distractors. An analysis of failure modes reveals that errors arise primarily from failures in recovering the correct solution and selecting among response candidates, rather than simulating errors or structuring the process. Consistent with these results, we find that providing the correct solution in the prompt improves alignment with human-authored distractors by 8%, highlighting the critical role of anchoring to the correct solution when generating plausible incorrect student reasoning. Overall, our analysis offers a structured and interpretable lens into LLMs' ability to model incorrect student reasoning and produce high-quality distractors.", "link": "http://arxiv.org/abs/2603.15547v1", "date": "2026-03-16", "relevancy": 2.4182, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5017}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4746}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4746}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Can%20LLMs%20Model%20Incorrect%20Student%20Reasoning%3F%20A%20Case%20Study%20on%20Distractor%20Generation&body=Title%3A%20Can%20LLMs%20Model%20Incorrect%20Student%20Reasoning%3F%20A%20Case%20Study%20on%20Distractor%20Generation%0AAuthor%3A%20Yanick%20Zengaffinen%20and%20Andreas%20Opedal%20and%20Donya%20Rooein%20and%20Kv%20Aditya%20Srivatsa%20and%20Shashank%20Sonkar%20and%20Mrinmaya%20Sachan%0AAbstract%3A%20Modeling%20plausible%20student%20misconceptions%20is%20critical%20for%20AI%20in%20education.%20In%20this%20work%2C%20we%20examine%20how%20large%20language%20models%20%28LLMs%29%20reason%20about%20misconceptions%20when%20generating%20multiple-choice%20distractors%2C%20a%20task%20that%20requires%20modeling%20incorrect%20yet%20plausible%20answers%20by%20coordinating%20solution%20knowledge%2C%20simulating%20student%20misconceptions%2C%20and%20evaluating%20plausibility.%20We%20introduce%20a%20taxonomy%20for%20analyzing%20the%20strategies%20used%20by%20state-of-the-art%20LLMs%2C%20examining%20their%20reasoning%20procedures%20and%20comparing%20them%20to%20established%20best%20practices%20in%20the%20learning%20sciences.%20Our%20structured%20analysis%20reveals%20a%20surprising%20alignment%20between%20their%20processes%20and%20best%20practices%3A%20the%20models%20typically%20solve%20the%20problem%20correctly%20first%2C%20then%20articulate%20and%20simulate%20multiple%20potential%20misconceptions%2C%20and%20finally%20select%20a%20set%20of%20distractors.%20An%20analysis%20of%20failure%20modes%20reveals%20that%20errors%20arise%20primarily%20from%20failures%20in%20recovering%20the%20correct%20solution%20and%20selecting%20among%20response%20candidates%2C%20rather%20than%20simulating%20errors%20or%20structuring%20the%20process.%20Consistent%20with%20these%20results%2C%20we%20find%20that%20providing%20the%20correct%20solution%20in%20the%20prompt%20improves%20alignment%20with%20human-authored%20distractors%20by%208%25%2C%20highlighting%20the%20critical%20role%20of%20anchoring%20to%20the%20correct%20solution%20when%20generating%20plausible%20incorrect%20student%20reasoning.%20Overall%2C%20our%20analysis%20offers%20a%20structured%20and%20interpretable%20lens%20into%20LLMs%27%20ability%20to%20model%20incorrect%20student%20reasoning%20and%20produce%20high-quality%20distractors.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15547v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCan%2520LLMs%2520Model%2520Incorrect%2520Student%2520Reasoning%253F%2520A%2520Case%2520Study%2520on%2520Distractor%2520Generation%26entry.906535625%3DYanick%2520Zengaffinen%2520and%2520Andreas%2520Opedal%2520and%2520Donya%2520Rooein%2520and%2520Kv%2520Aditya%2520Srivatsa%2520and%2520Shashank%2520Sonkar%2520and%2520Mrinmaya%2520Sachan%26entry.1292438233%3DModeling%2520plausible%2520student%2520misconceptions%2520is%2520critical%2520for%2520AI%2520in%2520education.%2520In%2520this%2520work%252C%2520we%2520examine%2520how%2520large%2520language%2520models%2520%2528LLMs%2529%2520reason%2520about%2520misconceptions%2520when%2520generating%2520multiple-choice%2520distractors%252C%2520a%2520task%2520that%2520requires%2520modeling%2520incorrect%2520yet%2520plausible%2520answers%2520by%2520coordinating%2520solution%2520knowledge%252C%2520simulating%2520student%2520misconceptions%252C%2520and%2520evaluating%2520plausibility.%2520We%2520introduce%2520a%2520taxonomy%2520for%2520analyzing%2520the%2520strategies%2520used%2520by%2520state-o {"title": "RSGen: Enhancing Layout-Driven Remote Sensing Image Generation with Diverse Edge Guidance", "author": "Xianbao Hou and Yonghao He and Zeyd Boukhers and John See and Hu Su and Wei Sui and Cong Yang", "abstract": "Diffusion models have significantly mitigated the impact of annotated data scarcity in remote sensing (RS). Although recent approaches have successfully harnessed these models to enable diverse and controllable Layout-to-Image (L2I) synthesis, they still suffer from limited fine-grained control and fail to strictly adhere to bounding box constraints. To address these limitations, we propose RSGen, a plug-and-play framework that leverages diverse edge guidance to enhance layout-driven RS image generation. Specifically, RSGen employs a progressive enhancement strategy: 1) it first enriches the diversity of edge maps composited from retrieved training instances via Image-to-Image generation; and 2) subsequently utilizes these diverse edge maps as conditioning for existing L2I models to enforce pixel-level control within bounding boxes, ensuring the generated instances strictly adhere to the layout. Extensive experiments across three baseline models demonstrate that RSGen significantly boosts the capabilities of existing L2I models. For instance, with CC-Diff on the DOTA dataset for oriented object detection, we achieve remarkable gains of +9.8/+12.0 in YOLOScore mAP50/mAP50-95 and +1.6 in mAP on the downstream detection task. Our code will be publicly available: https://github.com/D-Robotics-AI-Lab/RSGen", "link": "http://arxiv.org/abs/2603.15484v1", "date": "2026-03-16", "relevancy": 2.4156, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.6099}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.6039}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5979}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RSGen%3A%20Enhancing%20Layout-Driven%20Remote%20Sensing%20Image%20Generation%20with%20Diverse%20Edge%20Guidance&body=Title%3A%20RSGen%3A%20Enhancing%20Layout-Driven%20Remote%20Sensing%20Image%20Generation%20with%20Diverse%20Edge%20Guidance%0AAuthor%3A%20Xianbao%20Hou%20and%20Yonghao%20He%20and%20Zeyd%20Boukhers%20and%20John%20See%20and%20Hu%20Su%20and%20Wei%20Sui%20and%20Cong%20Yang%0AAbstract%3A%20Diffusion%20models%20have%20significantly%20mitigated%20the%20impact%20of%20annotated%20data%20scarcity%20in%20remote%20sensing%20%28RS%29.%20Although%20recent%20approaches%20have%20successfully%20harnessed%20these%20models%20to%20enable%20diverse%20and%20controllable%20Layout-to-Image%20%28L2I%29%20synthesis%2C%20they%20still%20suffer%20from%20limited%20fine-grained%20control%20and%20fail%20to%20strictly%20adhere%20to%20bounding%20box%20constraints.%20To%20address%20these%20limitations%2C%20we%20propose%20RSGen%2C%20a%20plug-and-play%20framework%20that%20leverages%20diverse%20edge%20guidance%20to%20enhance%20layout-driven%20RS%20image%20generation.%20Specifically%2C%20RSGen%20employs%20a%20progressive%20enhancement%20strategy%3A%201%29%20it%20first%20enriches%20the%20diversity%20of%20edge%20maps%20composited%20from%20retrieved%20training%20instances%20via%20Image-to-Image%20generation%3B%20and%202%29%20subsequently%20utilizes%20these%20diverse%20edge%20maps%20as%20conditioning%20for%20existing%20L2I%20models%20to%20enforce%20pixel-level%20control%20within%20bounding%20boxes%2C%20ensuring%20the%20generated%20instances%20strictly%20adhere%20to%20the%20layout.%20Extensive%20experiments%20across%20three%20baseline%20models%20demonstrate%20that%20RSGen%20significantly%20boosts%20the%20capabilities%20of%20existing%20L2I%20models.%20For%20instance%2C%20with%20CC-Diff%20on%20the%20DOTA%20dataset%20for%20oriented%20object%20detection%2C%20we%20achieve%20remarkable%20gains%20of%20%2B9.8/%2B12.0%20in%20YOLOScore%20mAP50/mAP50-95%20and%20%2B1.6%20in%20mAP%20on%20the%20downstream%20detection%20task.%20Our%20code%20will%20be%20publicly%20available%3A%20https%3A//github.com/D-Robotics-AI-Lab/RSGen%0ALink%3A%20http%3A//arxiv.org/abs/2603.15484v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRSGen%253A%2520Enhancing%2520Layout-Driven%2520Remote%2520Sensing%2520Image%2520Generation%2520with%2520Diverse%2520Edge%2520Guidance%26entry.906535625%3DXianbao%2520Hou%2520and%2520Yonghao%2520He%2520and%2520Zeyd%2520Boukhers%2520and%2520John%2520See%2520and%2520Hu%2520Su%2520and%2520Wei%2520Sui%2520and%2520Cong%2520Yang%26entry.1292438233%3DDiffusion%2520models%2520have%2520significantly%2520mitigated%2520the%2520impact%2520of%2520annotated%2520data%2520scarcity%2520in%2520remote%2520sensing%2520%2528RS%2529.%2520Although%2520recent%2520approaches%2520have%2520successfully%2520harnessed%2520these%2520models%2520to%2520enable%2520diverse%2520and%2520controllable%2520Layout-to-Image%2520%2528L2I%2529%2520synthesis%252C%2520they%2520still%2520suffer%2520from%2520limited%2520fine-grained%2520control%2520and%2520fail%2520to%2520strictly%2520adhere%2520to%2520bounding%2520box%2520constraints.%2520To%2520address%2520these%2520limitations%252C%2520we%2520propose%2520RSGen%252C%2520a%2520plug-and-play%2520framework%2520that%2520leverages%2520diverse%2520edge%2520guidance%2520to%2520enhance%2520layout-driven%2520RS%2520image%2520generation.%2520Specifically%252C%2520RSGen%2520employs%2520a%2520progressive%2520enhancement%2520strategy%253A%25201%2529%2520it%2520first%2520enriches%2520the%2520diversity%2520of%2520edge%2520maps%2520composited%2520from%2520retrieved%2520training%2520instances%2520via%2520Image-to-Image%2520generation%253B%2520and%25202%2529%2520subsequently%2520utilizes%2520these%2520diverse%2520edge%2520m %20to%20enhance%20layout-driven%20RS%20image%20generation.%20Specifically%2C%20RSGen%20employs%20a%20progressive%20enhancement%20strategy%3A%201%29%20it%20first%20enriches%20the%20diversity%20of%20edge%20maps%20composited%20from%20retrieved%20training%20instances%20via%20Image-to-Image%20generation%3B%20and%202%29%20subsequently%20utilizes%20these%20diverse%20edge%20maps%20as%20conditioning%20for%20existing%20L2I%20models%20to%20enforce%20pixel-level%20control%20within%20bounding%20boxes%2C%20ensuring%20the%20generated%20instances%20strictly%20adhere%20to%20the%20layout.%20Extensive%20experiments%20across%20three%20baseline%20models%20demonstrate%20that%20RSGen%20significantly%20boosts%20the%20capabilities%20of%20existing%20L2I%20models.%20For%20instance%2C%20with%20CC-Diff%20on%20the%20DOTA%20dataset%20for%20oriented%20object%20detection%2C%20we%20achieve%20remarkable%20gains%20of%20%2B9.8/%2B12.0%20in%20YOLOScore%20mAP50/mAP50-95%20and%20%2B1.6%20in%20mAP%20on%20the%20downstream%20detection%20task.%20Our%20code%20will%20be%20publicly%20available%3A%20https%3A//github.com/D-Robotics-AI-Lab/RSGen&entry.1838667208=http%3A//arxiv.org/abs/2603.15484v1&entry.124074799=Read"},
{"title": "Towards Balanced Multi-Modal Learning in 3D Human Pose Estimation", "author": "Mengshi Qi and Jiaxuan Peng and Xianlin Zhang and Huadong Ma", "abstract": "3D human pose estimation (3D HPE) has emerged as a prominent research topic, particularly in the realm of RGB-based methods. However, the use of RGB images is often limited by issues such as occlusion and privacy constraints. Consequently, multi-modal sensing, which leverages non-intrusive sensors, is gaining increasing attention. Nevertheless, multi-modal 3D HPE still faces challenges, including modality imbalance. In this work, we introduce a novel balanced multi-modal learning method for 3D HPE, which harnesses the power of RGB, LiDAR, mmWave, and WiFi. Specifically, we propose a Shapley value-based contribution algorithm to assess the contribution of each modality and detect modality imbalance. To address this imbalance, we design a modality learning regulation strategy that decelerates the learning process during the early stages of training. We conduct extensive experiments on the widely adopted multi-modal dataset, MM-Fi, demonstrating the superiority of our approach in enhancing 3D pose estimation under complex conditions. Our source code is available at https://github.com/MICLAB-BUPT/AWC.", "link": "http://arxiv.org/abs/2501.05264v5", "date": "2026-03-16", "relevancy": 2.4115, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6034}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.603}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6023}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Balanced%20Multi-Modal%20Learning%20in%203D%20Human%20Pose%20Estimation&body=Title%3A%20Towards%20Balanced%20Multi-Modal%20Learning%20in%203D%20Human%20Pose%20Estimation%0AAuthor%3A%20Mengshi%20Qi%20and%20Jiaxuan%20Peng%20and%20Xianlin%20Zhang%20and%20Huadong%20Ma%0AAbstract%3A%203D%20human%20pose%20estimation%20%283D%20HPE%29%20has%20emerged%20as%20a%20prominent%20research%20topic%2C%20particularly%20in%20the%20realm%20of%20RGB-based%20methods.%20However%2C%20the%20use%20of%20RGB%20images%20is%20often%20limited%20by%20issues%20such%20as%20occlusion%20and%20privacy%20constraints.%20Consequently%2C%20multi-modal%20sensing%2C%20which%20leverages%20non-intrusive%20sensors%2C%20is%20gaining%20increasing%20attention.%20Nevertheless%2C%20multi-modal%203D%20HPE%20still%20faces%20challenges%2C%20including%20modality%20imbalance.%20In%20this%20work%2C%20we%20introduce%20a%20novel%20balanced%20multi-modal%20learning%20method%20for%203D%20HPE%2C%20which%20harnesses%20the%20power%20of%20RGB%2C%20LiDAR%2C%20mmWave%2C%20and%20WiFi.%20Specifically%2C%20we%20propose%20a%20Shapley%20value-based%20contribution%20algorithm%20to%20assess%20the%20contribution%20of%20each%20modality%20and%20detect%20modality%20imbalance.%20To%20address%20this%20imbalance%2C%20we%20design%20a%20modality%20learning%20regulation%20strategy%20that%20decelerates%20the%20learning%20process%20during%20the%20early%20stages%20of%20training.%20We%20conduct%20extensive%20experiments%20on%20the%20widely%20adopted%20multi-modal%20dataset%2C%20MM-Fi%2C%20demonstrating%20the%20superiority%20of%20our%20approach%20in%20enhancing%203D%20pose%20estimation%20under%20complex%20conditions.%20Our%20source%20code%20is%20available%20at%20https%3A//github.com/MICLAB-BUPT/AWC.%0ALink%3A%20http%3A//arxiv.org/abs/2501.05264v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520Balanced%2520Multi-Modal%2520Learning%2520in%25203D%2520Human%2520Pose%2520Estimation .05264v5%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Towards%20Balanced%20Multi-Modal%20Learning%20in%203D%20Human%20Pose%20Estimation&entry.906535625=Mengshi%20Qi%20and%20Jiaxuan%20Peng%20and%20Xianlin%20Zhang%20and%20Huadong%20Ma&entry.1292438233=3D%20human%20pose%20estimation%20%283D%20HPE%29%20has%20emerged%20as%20a%20prominent%20research%20topic%2C%20particularly%20in%20the%20realm%20of%20RGB-based%20methods.%20However%2C%20the%20use%20of%20RGB%20images%20is%20often%20limited%20by%20issues%20such%20as%20occlusion%20and%20privacy%20constraints.%20Consequently%2C%20multi-modal%20sensing%2C%20which%20leverages%20non-intrusive%20sensors%2C%20is%20gaining%20increasing%20attention.%20Nevertheless%2C%20multi-modal%203D%20HPE%20still%20faces%20challenges%2C%20including%20modality%20imbalance.%20In%20this%20work%2C%20we%20introduce%20a%20novel%20balanced%20multi-modal%20learning%20method%20for%203D%20HPE%2C%20which%20harnesses%20the%20power%20of%20RGB%2C%20LiDAR%2C%20mmWave%2C%20and%20WiFi.%20Specifically%2C%20we%20propose%20a%20Shapley%20value-based%20contribution%20algorithm%20to%20assess%20the%20contribution%20of%20each%20modality%20and%20detect%20modality%20imbalance.%20To%20address%20this%20imbalance%2C%20we%20design%20a%20modality%20learning%20regulation%20strategy%20that%20decelerates%20the%20learning%20process%20during%20the%20early%20stages%20of%20training.%20We%20conduct%20extensive%20experiments%20on%20the%20widely%20adopted%20multi-modal%20dataset%2C%20MM-Fi%2C%20demonstrating%20the%20superiority%20of%20our%20approach%20in%20enhancing%203D%20pose%20estimation%20under%20complex%20conditions.%20Our%20source%20code%20is%20available%20at%20https%3A//github.com/MICLAB-BUPT/AWC.&entry.1838667208=http%3A//arxiv.org/abs/2501.05264v5&entry.124074799=Read"},
{"title": "sim2art: Accurate Articulated Object Modeling from a Single Video using Synthetic Training Data Only", "author": "Arslan Artykov and Tom Ravaud and Corentin Sautier and Vincent Lepetit", "abstract": "Understanding articulated objects from monocular video is a crucial yet challenging task in robotics and digital twin creation. Existing methods often rely on complex multi-view setups, high-fidelity object scans, or fragile long-term point tracks that frequently fail in casual real-world captures. In this paper, we present sim2art, a data-driven framework that recovers the 3D part segmentation and joint parameters of articulated objects from a single monocular video captured by a freely moving camera. Our core insight is a robust representation based on per-frame surface point sampling, which we augment with short-term scene flow and DINOv3 semantic features. Unlike previous works that depend on error-prone long-term correspondences, our representation is easy to obtain and exhibits a negligible difference between simulation and reality without requiring domain adaptation. Also, by construction, our method relies on single-viewpoint visibility, ensuring that the geometric representation remains consistent across synthetic and real data despite noise and occlusions. Leveraging a suitable Transformer-based architecture, sim2art is trained exclusively on synthetic data yet generalizes strongly to real-world sequences. To address the lack of standardized benchmarks in the field, we introduce two datasets featuring a significantly higher diversity of object categories and instances than prior work. Our evaluations show that sim2art effectively handles large camera motions and complex articulations, outperforming state-of-the-art optimization-based and tracking-dependent methods. sim2art offers a scalable solution that can be easily extended to new object categories without the need for cumbersome real-world annotations. Project webpage: https://aartykov.github.io r%20representation%20is%20easy%20to%20obtain%20and%20exhibits%20a%20negligible%20difference%20between%20simulation%20and%20reality%20without%20requiring%20domain%20adaptation.%20Also%2C%20by%20construction%2C%20our%20method%20relies%20on%20single-viewpoint%20visibility%2C%20ensuring%20that%20the%20geometric%20representation%20remains%20consistent%20across%20synthetic%20and%20real%20data%20despite%20noise%20and%20occlusions.%20Leveraging%20a%20suitable%20Transformer-based%20architecture%2C%20sim2art%20is%20trained%20exclusively%20on%20synthetic%20data%20yet%20generalizes%20strongly%20to%20real-world%20sequences.%20To%20address%20the%20lack%20of%20standardized%20benchmarks%20in%20the%20field%2C%20we%20introduce%20two%20datasets%20featuring%20a%20significantly%20higher%20diversity%20of%20object%20categories%20and%20instances%20than%20prior%20work.%20Our%20evaluations%20show%20that%20sim2art%20effectively%20handles%20large%20camera%20motions%20and%20complex%20articulations%2C%20outperforming%20state-of-the-art%20optimization-based%20and%20tracking-dependent%20methods.%20sim2art%20offers%20a%20scalable%20solution%20that%20can%20be%20easily%20extended%20to%20new%20object%20categories%20without%20the%20need%20for%20cumbersome%20real-world%20annotations.%20Project%20webpage%3A%20https%3A//aartykov.github.io/sim2art/%0ALink%3A%20http%3A//arxiv.org/abs/2512.07698v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3Dsim2art%253A%2520Accurate%2520Articulated%2520Object%2520Modeling%2520from%2520a%2520Single%2520Video%2520using%2520Synthetic%2520Training%2520Data%2520Only%26entry.906535625%3DArslan%2520Artykov%2520and%2520Tom%2520Ravaud%2520and%2520Corentin%2520Sautier%2520and%2520Vincent%2520Lepetit%26entry.1292438233%3DUnderstanding%2520articulated%2520objects%2520from%2520monocular%2520video%2520is%2520a%2520crucial%2520yet%2520challenging%2520task%2520in%2520robotics%2520and%2520digital%2520t {"title": "PhysMoDPO: Physically-Plausible Humanoid Motion with Preference Optimization", "author": "Yangsong Zhang and Anujith Muraleedharan and Rikhat Akizhanov and Abdul Ahad Butt and G\u00fcl Varol and Pascal Fua and Fabio Pizzati and Ivan Laptev", "abstract": "Recent progress in text-conditioned human motion generation has been largely driven by diffusion models trained on large-scale human motion data. Building on this progress, recent methods attempt to transfer such models for character animation and real robot control by applying a Whole-Body Controller (WBC) that converts diffusion-generated motions into executable trajectories. While WBC trajectories become compliant with physics, they may expose substantial deviations from original motion. To address this issue, we here propose PhysMoDPO, a Direct Preference Optimization framework. Unlike prior work that relies on hand-crafted physics-aware heuristics such as foot-sliding penalties, we integrate WBC into our training pipeline and optimize diffusion model such that the output of WBC becomes compliant both with physics and original text instructions. To train PhysMoDPO we deploy physics-based and task-specific rewards and use them to assign preference to synthesized trajectories. Our extensive experiments on text-to-motion and spatial control tasks demonstrate consistent improvements of PhysMoDPO in both physical realism and task-related metrics on simulated robots. Moreover, we demonstrate that PhysMoDPO results in significant improvements when applied to zero-shot motion transfer in simulation and for real-world deployment on a G1 humanoid robot.", "link": "http://arxiv.org/abs/2603.13228v2", "date": "2026-03-16", "relevancy": 2.4018, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6419}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.604}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5575}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PhysMoDPO%3A%20Physically-Plausible%20Humanoid%20Motion%20with%20Preference%20Optimization&body=Title%3A%20PhysMoDPO%3A%20Physically-Plausible%20Humanoid%20Motion%20with%20Preference%20Optimization%0AAuthor%3A%20Yangsong%20Zhang%20and%20Anujith%20Muraleedharan%20and%20Rikhat%20Akizhanov%20and%20Abdul%20Ahad%20Butt%20and%20G%C3%BCl%20Varol%20and%20Pascal%20Fua%20and%20Fabio%20Pizzati%20and%20Ivan%20Laptev%0AAbstract%3A%20Recent%20progress%20in%20text-conditioned%20human%20motion%20generation%20has%20been%20largely%20driven%20by%20diffusion%20models%20trained%20on%20large-scale%20human%20motion%20data.%20Building%20on%20this%20progress%2C%20recent%20methods%20attempt%20to%20transfer%20such%20models%20for%20character%20animation%20and%20real%20robot%20control%20by%20applying%20a%20Whole-Body%20Controller%20%28WBC%29%20that%20converts%20diffusion-generated%20motions%20into%20executable%20trajectories.%20While%20WBC%20trajectories%20become%20compliant%20with%20physics%2C%20they%20may%20expose%20substantial%20deviations%20from%20original%20motion.%20To%20address%20this%20issue%2C%20we%20here%20propose%20PhysMoDPO%2C%20a%20Direct%20Preference%20Optimization%20framework.%20Unlike%20prior%20work%20that%20relies%20on%20hand-crafted%20physics-aware%20heuristics%20such%20as%20foot-sliding%20penalties%2C%20we%20integrate%20WBC%20into%20our%20training%20pipeline%20and%20optimize%20diffusion%20model%20such%20that%20the%20output%20of%20WBC%20becomes%20compliant%20both%20with%20physics%20and%20original%20text%20instructions.%20To%20train%20PhysMoDPO%20we%20deploy%20physics-based%20and%20task-specific%20rewards%20and%20use%20them%20to%20assign%20preference%20to%20synthesized%20trajectories.%20Our%20extensive%20experiments%20on%20text-to-motion%20and%20spatial%20control%20tasks%20demonstrate%20consistent%20improvements%20of%20PhysMoDPO%20in%20both%20physical%20realism%20and%20task-related%20metrics%20on%20simulated%20robots.%20Moreover%2C%20we%20demonstrate%20that%20PhysMoDPO%20results%20in%20significant%20improvements%20when%20applied%20to%20zero-shot%20motion%20transfer%20in%20simulation%20and%20for%20real-world%20deployment%20on%20a%20G1%20humanoid%20robot.%0ALink%3A%20http%3A//arxiv.org/abs/2603.13228v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPhysMoDPO%253A%2520Physically-Plausible%2520Humanoid%2520Motion%2520with%2520Preference%2520Optimization%26entry.906535625%3DYangsong%2520Zhang%2520and%2520Anujith%2520Muraleedharan%2520and%2520Rikhat%2520Akizhanov%2520and%2520Abdul%2520Ahad%2520Butt%2520and%2520G%25C3%25BCl%2520Varol%2520and%2520Pascal%2520Fua%2520and%2520Fabio%2520Pizzati%2520and%2520Ivan%2520Laptev%26entry.1292438233%3DRecent%2520progress%2520in%2520text-conditioned%2520human%2520motion%2520generation%2520has%2520been%2520largely%2520driven%2520by%2520diffusion%2520models%2520trained%2520on%2520large-scale%2520human%2520motion%2520data.%2520Building%2520on%2520this%2520progress%252C%2520recent%2520methods%2520attempt%2520to%2520transfer%2520such%2520models%2520for%2520character%2520animation%2520and%2520real%2520robot%2520control%2520by%2520applying%2520a%2520Whole-Body%2520Controller%2520%2528WBC%2529%2520that%2520converts%2520diffusion-generated%2520motions%2520into%2520executable%2520trajectories.%2520While%2520WBC%2520trajectories%2520become%2520compliant%2520with%2520physics%252C%2520they%2520may%2520expose%2520substantial%2520deviations%2520from%2520original%2520motion.%2520To%2520address%2520this%2520issue%252C%2520we%2520here%2520propose%2520PhysMoDPO%252C%2520a%2520Direct%2520Preference%2520Optimization%2520framework.%2520Unlike%2520prior%2520work%2520that%2520relies%2520on%25 {"title": "Collaborating Vision, Depth, and Thermal Signals for Multi-Modal Tracking: Dataset and Algorithm", "author": "Xue-Feng Zhu and Tianyang Xu and Yifan Pan and Jinjie Gu and Xi Li and Jiwen Lu and Xiao-Jun Wu and Josef Kittler", "abstract": "Existing multi-modal object tracking approaches primarily focus on dual-modal paradigms, such as RGB-Depth or RGB-Thermal, yet remain challenged in complex scenarios due to limited input modalities. To address this gap, this work introduces a novel multi-modal tracking task that leverages three complementary modalities, including visible RGB, Depth (D), and Thermal Infrared (TIR), aiming to enhance robustness in complex scenarios. To support this task, we construct a new multi-modal tracking dataset, coined RGBDT500, which consists of 500 videos with synchronised frames across the three modalities. Each frame provides spatially aligned RGB, depth, and thermal infrared images with precise object bounding box annotations. Furthermore, we propose a novel multi-modal tracker, dubbed RDTTrack. RDTTrack integrates tri-modal information for robust tracking by leveraging a pretrained RGB-only tracking model and prompt learning techniques. In specific, RDTTrack fuses thermal infrared and depth modalities under a proposed orthogonal projection constraint, then integrates them with RGB signals as prompts for the pre-trained foundation tracking model, effectively harmonising tri-modal complementary cues. The experimental results demonstrate the effectiveness and advantages of the proposed method, showing significant improvements over existing dual-modal approaches in terms of tracking accuracy and robustness in complex scenarios. The dataset and source code are publicly available at https://xuefeng-zhu5.github.io/RGBDT500.", "link": "http://arxiv.org/abs/2509.24741v3", "date": "2026-03-16", "relevancy": 2.3967, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6049}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6007}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5812}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Collaborating%20Vision%2C%20Depth%2C%20and%20Thermal%20Signals%20for%20Multi-Modal%20Tracking%3A%20Dataset%20and%20Algorithm&body=Title%3A%20Collaborating%20Vision%2C%20Depth%2C%20and%20Thermal%20Signals%20for%20Multi-Modal%20Tracking%3A%20Dataset%20and%20Algorithm%0AAuthor%3A%20Xue-Feng%20Zhu%20and%20Tianyang%20Xu%20and%20Yifan%20Pan%20and%20Jinjie%20Gu%20and%20Xi%20Li%20and%20Jiwen%20Lu%20and%20Xiao-Jun%20Wu%20and%20Josef%20Kittler%0AAbstract%3A%20Existing%20multi-modal%20object%20tracking%20approaches%20primarily%20focus%20on%20dual-modal%20paradigms%2C%20such%20as%20RGB-Depth%20or%20RGB-Thermal%2C%20yet%20remain%20challenged%20in%20complex%20scenarios%20due%20to%20limited%20input%20modalities.%20To%20address%20this%20gap%2C%20this%20work%20introduces%20a%20novel%20multi-modal%20tracking%20task%20that%20leverages%20three%20complementary%20modalities%2C%20including%20visible%20RGB%2C%20Depth%20%28D%29%2C%20and%20Thermal%20Infrared%20%28TIR%29%2C%20aiming%20to%20enhance%20robustness%20in%20complex%20scenarios.%20To%20support%20this%20task%2C%20we%20construct%20a%20new%20multi-modal%20tracking%20dataset%2C%20coined%20RGBDT500%2C%20which%20consists%20of%20500%20videos%20with%20synchronised%20frames%20across%20the%20three%20modalities.%20Each%20frame%20provides%20spatially%20aligned%20RGB%2C%20depth%2C%20and%20thermal%20infrared%20images%20with%20precise%20object%20bounding%20box%20annotations.%20Furthermore%2C%20we%20propose%20a%20novel%20multi-modal%20tracker%2C%20dubbed%20RDTTrack.%20RDTTrack%20integrates%20tri-modal%20information%20for%20robust%20tracking%20by%20leveraging%20a%20pretrained%20RGB-only%20tracking%20model%20and%20prompt%20learning%20techniques.%20In%20specific%2C%20RDTTrack%20fuses%20thermal%20infrared%20and%20depth%20modalities%20under%20a%20proposed%20orthogonal%20projection%20constraint%2C%20then%20integrates%20them%20with%20RGB%20signals%20as%20prompts%20for%20the%20pre-trained%20foundation%20tracking%20model%2C%20effectively%20harmonising%20tri-modal%20complementary%20cues.%20The%20experimental%20results%20demonstrate%20the%20effectiveness%20and%20advantages%20of%20the%20proposed%20method%2C%20showing%20significant%20improvements%20over%20existing%20dual-modal%20approaches%20in%20terms%20of%20tracking%20accuracy%20and%20robustness%20in%20complex%20scenarios.%20The%20dataset%20and%20source%20code%20are%20publicly%20available%20at%20https%3A//xuefeng-zhu5.github.io/RGBDT500.%0ALink%3A%20http%3A//arxiv.org/abs/2509.24741v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCollaborating%2520Vision%252C%2520Depth%252C%2520and%2520Thermal%2520Signals%2520for%2520Multi-Modal%2520Tracking%253A%2520Dataset%2520and%2520Algorithm%26entry.906535625%3DXue-Feng%2520Zhu%2520and%2520Tianyang%2520Xu%2520and%2520Yifan%2520Pan%2520and%2520Jinjie%2520Gu%2520and%2520Xi%2520Li%2520and%2520Jiwen%2520Lu%2520and%2520Xiao-Jun%2520Wu%2520and%2520Josef%2520Kittler%26entry.1292438233%3DExisting%2520multi-modal%2520object%2520tracking%2520approaches%2520primarily%2520focus%2520on%2520dual-modal%2520paradigms%252C%2520such%2520as%2520RGB-Depth%2520or%2520RGB-Thermal%252C%2520yet%2520remain%2520challenged%2520in%2520complex%2520scenarios%2520due%2520to%2520limited%2520input%2520modalities.%2520To%2520address%2520this%2520gap%252C%2520this%2520work%2520introduces%2520a%2520novel%2520multi-modal%2520tracking%2520task%2520that%2520leverages%2520three%2520complementary%2520modalities%252C%2520including%2520visible%2520RGB%252C

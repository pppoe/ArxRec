{"title": "Faster Inference of Flow-Based Generative Models via Improved Data-Noise Coupling", "author": "Aram Davtyan and Leello Tadesse Dadi and Volkan Cevher and Paolo Favaro", "abstract": "Conditional Flow Matching (CFM), a simulation-free method for training continuous normalizing flows, provides an efficient alternative to diffusion models for key tasks like image and video generation. The performance of CFM in solving these tasks depends on the way data is coupled with noise. A recent approach uses minibatch optimal transport (OT) to reassign noise-data pairs in each training step to streamline sampling trajectories and thus accelerate inference. However, its optimization is restricted to individual minibatches, limiting its effectiveness on large datasets. To address this shortcoming, we introduce LOOM-CFM (Looking Out Of Minibatch-CFM), a novel method to extend the scope of minibatch OT by preserving and optimizing these assignments across minibatches over training time. Our approach demonstrates consistent improvements in the sampling speed-quality trade-off across multiple datasets. LOOM-CFM also enhances distillation initialization and supports high-resolution synthesis in latent space training.", "link": "http://arxiv.org/abs/2603.15279v1", "date": "2026-03-16", "relevancy": 1.7609, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.6367}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5814}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5693}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Faster%20Inference%20of%20Flow-Based%20Generative%20Models%20via%20Improved%20Data-Noise%20Coupling&body=Title%3A%20Faster%20Inference%20of%20Flow-Based%20Generative%20Models%20via%20Improved%20Data-Noise%20Coupling%0AAuthor%3A%20Aram%20Davtyan%20and%20Leello%20Tadesse%20Dadi%20and%20Volkan%20Cevher%20and%20Paolo%20Favaro%0AAbstract%3A%20Conditional%20Flow%20Matching%20%28CFM%29%2C%20a%20simulation-free%20method%20for%20training%20continuous%20normalizing%20flows%2C%20provides%20an%20efficient%20alternative%20to%20diffusion%20models%20for%20key%20tasks%20like%20image%20and%20video%20generation.%20The%20performance%20of%20CFM%20in%20solving%20these%20tasks%20depends%20on%20the%20way%20data%20is%20coupled%20with%20noise.%20A%20recent%20approach%20uses%20minibatch%20optimal%20transport%20%28OT%29%20to%20reassign%20noise-data%20pairs%20in%20each%20training%20step%20to%20streamline%20sampling%20trajectories%20and%20thus%20accelerate%20inference.%20However%2C%20its%20optimization%20is%20restricted%20to%20individual%20minibatches%2C%20limiting%20its%20effectiveness%20on%20large%20datasets.%20To%20address%20this%20shortcoming%2C%20we%20introduce%20LOOM-CFM%20%28Looking%20Out%20Of%20Minibatch-CFM%29%2C%20a%20novel%20method%20to%20extend%20the%20scope%20of%20minibatch%20OT%20by%20preserving%20and%20optimizing%20these%20assignments%20across%20minibatches%20over%20training%20time.%20Our%20approach%20demonstrates%20consistent%20improvements%20in%20the%20sampling%20speed-quality%20trade-off%20across%20multiple%20datasets.%20LOOM-CFM%20also%20enhances%20distillation%20initialization%20and%20supports%20high-resolution%20synthesis%20in%20latent%20space%20training.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15279v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFaster%2520Inference%2520of%2520Flow-Based%2520Generative%2520Models%2520via%2520Improved%2520Data-Noise%2520Coupling%26entry.906535625%3DAram%2520Davtyan%2520and%2520Leello%2520Tadesse%2520Dadi%2520and%2520Volkan%2520Cevher%2520and%2520Paolo%2520Favaro%26entry.1292438233%3DCondit {"title": "MA-VLCM: A Vision Language Critic Model for Value Estimation of Policies in Multi-Agent Team Settings", "author": "Shahil Shaik and Aditya Parameshwaran and Anshul Nayak and Jonathon M. Smereka and Yue Wang", "abstract": "Multi-agent reinforcement learning (MARL) commonly relies on a centralized critic to estimate the value function. However, learning such a critic from scratch is highly sample-inefficient and often lacks generalization across environments. At the same time, large vision-language-action models (VLAs) trained on internet-scale data exhibit strong multimodal reasoning and zero-shot generalization capabilities, yet directly deploying them for robotic execution remains computationally prohibitive, particularly in heterogeneous multi-robot systems with diverse embodiments and resource constraints. To address these challenges, we propose Multi-Agent Vision-Language-Critic Models (MA-VLCM), a framework that replaces the learned centralized critic in MARL with a pretrained vision-language model fine-tuned to evaluate multi-agent behavior. MA-VLCM acts as a centralized critic conditioned on natural language task descriptions, visual trajectory observations, and structured multi-agent state information. By eliminating critic learning during policy optimization, our approach significantly improves sample efficiency while producing compact execution policies suitable for deployment on resource-constrained robots. Results show good zero-shot return estimation on models with differing VLM backbones on in-distribution and out-of-distribution scenarios in multi-agent team settings", "link": "http://arxiv.org/abs/2603.15418v1", "date": "2026-03-16", "relevancy": 2.1055, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5601}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5196}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5196}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MA-VLCM%3A%20A%20Vision%20Language%20Critic%20Model%20for%20Value%20Estimation%20of%20Policies%20in%20Multi-Agent%20Team%20Settings&body=Title%3A%20MA-VLCM%3A%20A%20Vision%20Language%20Critic%20Model%20for%20Value%20Estimation%20of%20Policies%20in%20Multi-Agent%20Team%20Settings%0AAuthor%3A%20Shahil%20Shaik%20and%20Aditya%20Parameshwaran%20and%20Anshul%20Nayak%20and%20Jonathon%20M.%20Smereka%20and%20Yue%20Wang%0AAbstract%3A%20Multi-agent%20reinforcement%20learning%20%28MARL%29%20commonly%20relies%20on%20a%20centralized%20critic%20to%20estimate%20the%20value%20function.%20However%2C%20learning%20such%20a%20critic%20from%20scratch%20is%20highly%20sample-inefficient%20and%20often%20lacks%20generalization%20across%20environments.%20At%20the%20same%20time%2C%20large%20vision-language-action%20models%20%28VLAs%29%20trained%20on%20internet-scale%20data%20exhibit%20strong%20multimodal%20reasoning%20and%20zero-shot%20generalization%20capabilities%2C%20yet%20directly%20deploying%20them%20for%20robotic%20execution%20remains%20computationally%20prohibitive%2C%20particularly%20in%20heterogeneous%20multi-robot%20systems%20with%20diverse%20embodiments%20and%20resource%20constraints.%20To%20address%20these%20challenges%2C%20we%20propose%20Multi-Agent%20Vision-Language-Critic%20Models%20%28MA-VLCM%29%2C%20a%20framework%20that%20replaces%20the%20learned%20centralized%20critic%20in%20MARL%20with%20a%20pretrained%20vision-language%20model%20fine-tuned%20to%20evaluate%20multi-agent%20behavior.%20MA-VLCM%20acts%20as%20a%20centralized%20critic%20conditioned%20on%20natural%20language%20task%20descriptions%2C%20visual%20trajectory%20observations%2C%20and%20structured%20multi-agent%20state%20information.%20By%20eliminating%20critic%20learning%20during%20policy%20optimization%2C%20our%20approach%20significantly%20improves%20sample%20efficiency%20while%20producing%20compact%20execution%20policies%20suitable%20for%20deployment%20on%20resource-constrained%20robots.%20Results%20show%20good%20zero-shot%20return%20estimation%20on%20models%20with%20differing%20VLM%20backbones%20on%20in-distribution%20and%20out-of-distribution%20scenarios%20in%20multi-agent%20team%20settings%0ALink%3A%20http%3A//arxiv.org/abs/2603.15418v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMA-VLCM%253A%2520A%2520Vision%2520Language%2520Critic%2520Model%2520for%2520Value%2520Estimation%2520of%2520Policies%2520in%2520Multi-Agent%2520Team%2520Settings%26entry.906535625%3DShahil%2520Shaik%2520and%2520Aditya%2520Parameshwaran%2520and%2520Anshul%2520Nayak%2520and%2520Jonathon%2520M.%2520Smereka%2520and%2520Yue%2520Wang%26entry.1292438233%3DMulti-agent%2520reinforcement%2520learning%2520%2528MARL%2529%2520commonly%2520relies%2520on%2520a%2520centralized%2520critic%2520to%2520estimate%2520the%2520value%2520function.%2520However%252C%2520learning%2520such%2520a%2520critic%2520from%2520scratch%2520is%2520highly%2520sample-inefficient%2520and%2520often%2520lacks%2520generalization%2520across%2520environments.%2520At%2520the%2520same%2520time%252C%2520large%2520vision-language-action%2520models%2520%2528VLAs%2529%2520trained%2520on%2520internet-scale%2520data%2520exhibit%2520strong%2520multimodal%2520reasoning%2520and%2520zero-shot%2520generalization%2520capabilities%252C%2520yet%2520directly%2520deploying%2520them%2520for%2520robotic%2520execution%2520remains%2520computationally%2520prohibitive%252C%2520particularly%2520in%2520heterogeneous%2520multi-robot%2520systems%2520with%2520diverse%2520embodiments%2520and%2520resource%2520constraints.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2 {"title": "Federated Learning of Binary Neural Networks: Enabling Low-Cost Inference", "author": "Nitin Priyadarshini Shankar and Soham Lahiri and Sheetal Kalyani and Saurav Prakash", "abstract": "Federated Learning (FL) preserves privacy by distributing training across devices. However, using DNNs is computationally intensive at the low-powered edge during inference. Edge deployment demands models that simultaneously optimize memory footprint and computational efficiency, a dilemma where conventional DNNs fail by exceeding resource limits. Traditional post-training binarization reduces model size but suffers from severe accuracy loss due to quantization errors. To address these challenges, we propose FedBNN, a rotation-aware binary neural network framework that learns binary representations directly during local training. By encoding each weight as a single bit $\\{+1, -1\\}$ instead of a $32$-bit float, FedBNN shrinks the model footprint, significantly reducing runtime (during inference) FLOPs and memory requirements in comparison to federated methods using real models. Evaluations across multiple benchmark datasets demonstrate that FedBNN significantly reduces resource consumption while performing similarly to existing federated methods using real-valued models.", "link": "http://arxiv.org/abs/2603.15507v1", "date": "2026-03-16", "relevancy": 2.0147, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5488}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4846}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4662}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Federated%20Learning%20of%20Binary%20Neural%20Networks%3A%20Enabling%20Low-Cost%20Inference&body=Title%3A%20Federated%20Learning%20of%20Binary%20Neural%20Networks%3A%20Enabling%20Low-Cost%20Inference%0AAuthor%3A%20Nitin%20Priyadarshini%20Shankar%20and%20Soham%20Lahiri%20and%20Sheetal%20Kalyani%20and%20Saurav%20Prakash%0AAbstract%3A%20Federated%20Learning%20%28FL%29%20preserves%20privacy%20by%20distributing%20training%20across%20devices.%20However%2C%20using%20DNNs%20is%20computationally%20intensive%20at%20the%20low-powered%20edge%20during%20inference.%20Edge%20deployment%20demands%20models%20that%20simultaneously%20optimize%20memory%20footprint%20and%20computational%20efficiency%2C%20a%20dilemma%20where%20conventional%20DNNs%20fail%20by%20exceeding%20resource%20limits.%20Traditional%20post-training%20binarization%20reduces%20model%20size%20but%20suffers%20from%20severe%20accuracy%20loss%20due%20to%20quantization%20errors.%20To%20address%20these%20challenges%2C%20we%20propose%20FedBNN%2C%20a%20rotation-aware%20binary%20neural%20network%20framework%20that%20learns%20binary%20representations%20directly%20during%20local%20training.%20By%20encoding%20each%20weight%20as%20a%20single%20bit%20%24%5C%7B%2B1%2C%20-1%5C%7D%24%20instead%20of%20a%20%2432%24-bit%20float%2C%20FedBNN%20shrinks%20the%20model%20footprint%2C%20significantly%20reducing%20runtime%20%28during%20inference%29%20FLOPs%20and%20memory%20requirements%20in%20comparison%20to%20federated%20methods%20using%20real%20models.%20Evaluations%20across%20multiple%20benchmark%20datasets%20demonstrate%20that%20FedBNN%20significantly%20reduces%20resource%20consumption%20while%20performing%20similarly%20to%20existing%20federated%20methods%20using%20real-valued%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15507v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFederated%2520Learning%2520of%2520Binary%2520Neural%2520Networks%253A%2520Enabling%2520Low-Cost%2520Inference%26entry.906535625%3DNitin%2520Priyadarshini%2520Shankar%2520and%25       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

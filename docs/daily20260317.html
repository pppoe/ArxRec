{"title": "Surprised by Attention: Predictable Query Dynamics for Time Series Anomaly Detection", "author": "Kadir-Kaan \u00d6zer and Ren\u00e9 Ebeling and Markus Enzweiler", "abstract": "Multivariate time series anomalies often manifest as shifts in cross-channel dependencies rather than simple amplitude excursions. In autonomous driving, for instance, a steering command might be internally consistent but decouple from the resulting lateral acceleration. Residual-based detectors can miss such anomalies when flexible sequence models still reconstruct signals plausibly despite altered coordination. We introduce AxonAD, an unsupervised detector that treats multi-head attention query evolution as a short horizon predictable process. A gradient-updated reconstruction pathway is coupled with a history-only predictor that forecasts future query vectors from past context. This is trained via a masked predictor-target objective against an exponential moving average (EMA) target encoder. At inference, reconstruction error is combined with a tail-aggregated query mismatch score, which measures cosine deviation between predicted and target queries on recent timesteps. This dual approach provides sensitivity to structural dependency shifts while retaining amplitude-level detection. On proprietary in-vehicle telemetry with interval annotations and on the TSB-AD multi-variate suite (17 datasets, 180 series) with threshold-free and range-aware metrics, AxonAD improves ranking quality and temporal localization over strong baselines. Ablations confirm that query prediction and combined scoring are the primary drivers of the observed gains. Code is available at the URL https://github.com/iis-esslingen/AxonAD.", "link": "http://arxiv.org/abs/2603.12916v2", "date": "2026-03-16", "relevancy": 2.5385, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5188}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5144}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.49}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Surprised%20by%20Attention%3A%20Predictable%20Query%20Dynamics%20for%20Time%20Series%20Anomaly%20Detection&body=Title%3A%20Surprised%20by%20Attention%3A%20Predictable%20Query%20Dynamics%20for%20Time%20Series%20Anomaly%20Detection%0AAuthor%3A%20Kadir-Kaan%20%C3%96zer%20and%20Ren%C3%A9%20Ebeling%20and%20Markus%20Enzweiler%0AAbstract%3A%20Multivariate%20time%20series%20anomalies%20often%20manifest%20as%20shifts%20in%20cross-channel%20dependencies%20rather%20than%20simple%20amplitude%20excursions.%20In%20autonomous%20driving%2C%20for%20instance%2C%20a%20steering%20command%20might%20be%20internally%20consistent%20but%20decouple%20from%20the%20resulting%20lateral%20acceleration.%20Residual-based%20detectors%20can%20miss%20such%20anomalies%20when%20flexible%20sequence%20models%20still%20reconstruct%20signals%20plausibly%20despite%20altered%20coordination.%20We%20introduce%20AxonAD%2C%20an%20unsupervised%20detector%20that%20treats%20multi-head%20attention%20query%20evolution%20as%20a%20short%20horizon%20predictable%20process.%20A%20gradient-updated%20reconstruction%20pathway%20is%20coupled%20with%20a%20history-only%20predictor%20that%20forecasts%20future%20query%20vectors%20from%20past%20context.%20This%20is%20trained%20via%20a%20masked%20predictor-target%20objective%20against%20an%20exponential%20moving%20average%20%28EMA%29%20target%20encoder.%20At%20inference%2C%20reconstruction%20error%20is%20combined%20with%20a%20tail-aggregated%20query%20mismatch%20score%2C%20which%20measures%20cosine%20deviation%20between%20predicted%20and%20target%20queries%20on%20recent%20timesteps.%20This%20dual%20approach%20provides%20sensitivity%20to%20structural%20dependency%20shifts%20while%20retaining%20amplitude-level%20detection.%20On%20proprietary%20in-vehicle%20telemetry%20with%20interval%20annotations%20and%20on%20the%20TSB-AD%20multi-variate%20suite%20%2817%20datasets%2C%20180%20series%29%20with%20threshold-free%20and%20range-aware%20metrics%2C%20AxonAD%20improves%20ranking%20quality%20and%20temporal%20localization%20over%20strong%20baselines.%20Ablations%20confirm%20that%20query%20prediction%20and%20combined%20scoring%20are%20the%20primary%20drivers%20of%20the%20observed%20gains.%20Code%20is%20available%20at%20the%20URL%20https%3A//github.com/iis-esslingen/AxonAD.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12916v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSurprised%2520by%2520Attention%253A%2520Predictable%2520Query%2520Dynamics%2520for%2520Time%2520Series%2520Anomaly%2520Detection%26entry.906535625%3DKadir-Kaan%2520%25C3%2596zer%2520and%2520Ren%25C3%25A9%2520Ebeling%2520and%2520Markus%2520Enzweiler%26entry.1292438233%3DMultivariate%2520time%2520series%2520anomalies%2520often%2520manifest%2520as%2520shifts%2520in%2520cross-channel%2520dependencies%2520rather%2520than%2520simple%2520amplitude%2520excursions.%2520In%2520autonomous%2520driving%252C%2520for%2520instance%252C%2520a%2520steering%2520command%2520might%2520be%2520internally%2520consistent%2520but%2520decouple%2520from%2520the%2520resulting%2520lateral%2520acceleration.%2520Residual-based%2520detectors%2520can%2520miss%2520such%2520anomalies%2520when%2520flexible%2520sequence%2520models%2520still%2520reconstruct%2520signals%2520plausibly%2520despite%2520altered%2520coordination.%2520We%2520introduce%2520AxonAD%252C%2520an%2520unsupervised%2520detector%2520that%2520treats%2520multi-head%2520attention%2520query%2520evolution%2520as%2520a%2520short%2520horizon%2520predictable%2520process.%2520A%2520gradient-updated%2520reconst channel%20dependencies%20rather%20than%20simple%20amplitude%20excursions.%20In%20autonomous%20driving%2C%20for%20instance%2C%20a%20steering%20command%20might%20be%20internally%20consistent%20but%20decouple%20from%20the%20resulting%20lateral%20acceleration.%20Residual-based%20detectors%20can%20miss%20such%20anomalies%20when%20flexible%20sequence%20models%20still%20reconstruct%20signals%20plausibly%20despite%20altered%20coordination.%20We%20introduce%20AxonAD%2C%20an%20unsupervised%20detector%20that%20treats%20multi-head%20attention%20query%20evolution%20as%20a%20short%20horizon%20predictable%20process.%20A%20gradient-updated%20reconstruction%20pathway%20is%20coupled%20with%20a%20history-only%20predictor%20that%20forecasts%20future%20query%20vectors%20from%20past%20context.%20This%20is%20trained%20via%20a%20masked%20predictor-target%20objective%20against%20an%20exponential%20moving%20average%20%28EMA%29%20target%20encoder.%20At%20inference%2C%20reconstruction%20error%20is%20combined%20with%20a%20tail-aggregated%20query%20mismatch%20score%2C%20which%20measures%20cosine%20deviation%20between%20predicted%20and%20target%20queries%20on%20recent%20timesteps.%20This%20dual%20approach%20provides%20sensitivity%20to%20structural%20dependency%20shifts%20while%20retaining%20amplitude-level%20detection.%20On%20proprietary%20in-vehicle%20telemetry%20with%20interval%20annotations%20and%20on%20the%20TSB-AD%20multi-variate%20suite%20%2817%20datasets%2C%20180%20series%29%20with%20threshold-free%20and%20range-aware%20metrics%2C%20AxonAD%20improves%20ranking%20quality%20and%20temporal%20localization%20over%20strong%20baselines.%20Ablations%20confirm%20that%20query%20prediction%20and%20combined%20scoring%20are%20the%20primary%20drivers%20of%20the%20observed%20gains.%20Code%20is%20available%20at%20the%20URL%20https%3A//github.com/iis-esslingen/AxonAD.&entry.1838667208=http%3A//arxiv.org/abs/2603.12916v2&entry.124074799=Read"},
{"title": "From Documents to Spans: Code-Centric Learning for LLM-based ICD Coding", "author": "Xu Zhang and Wenxin Ma and Chenxu Wu and Rongsheng Wang and Kun Zhang and S. Kevin Zhou", "abstract": "ICD coding is a critical yet challenging task in healthcare. Recently, LLM-based methods demonstrate stronger generalization than discriminative methods in ICD coding. However, fine-tuning LLMs for ICD coding faces three major challenges. First, existing public ICD coding datasets provide limited coverage of the ICD code space, restricting a model's ability to generalize to unseen codes. Second, naive fine-tuning diminishes the interpretability of LLMs, as few public datasets contain explicit supporting evidence for assigned codes. Third, ICD coding typically involves long clinical documents, making fine-tuning LLMs computationally expensive. To address these issues, we propose Code-Centric Learning, a training framework that shifts supervision from full clinical documents to scalable, short evidence spans. The key idea of this framework is that span-level learning improves LLMs' ability to perform document-level ICD coding. Our proposed framework consists of a mixed training strategy and code-centric data expansion, which substantially reduces training cost, improves accuracy on unseen ICD codes and preserves interpretability. Under the same LLM backbone, our method substantially outperforms strong baselines. Notably, our method enables small-scale LLMs to achieve performance comparable to much larger proprietary models, demonstrating its effectiveness and potential for fully automated ICD coding.", "link": "http://arxiv.org/abs/2603.15270v1", "date": "2026-03-16", "relevancy": 2.5318, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5155}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5155}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4881}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Documents%20to%20Spans%3A%20Code-Centric%20Learning%20for%20LLM-based%20ICD%20Coding&body=Title%3A%20From%20Documents%20to%20Spans%3A%20Code-Centric%20Learning%20for%20LLM-based%20ICD%20Coding%0AAuthor%3A%20Xu%20Zhang%20and%20Wenxin%20Ma%20and%20Chenxu%20Wu%20and%20Rongsheng%20Wang%20and%20Kun%20Zhang%20and%20S.%20Kevin%20Zhou%0AAbstract%3A%20ICD%20coding%20is%20a%20critical%20yet%20challenging%20task%20in%20healthcare.%20Recently%2C%20LLM-based%20methods%20demonstrate%20stronger%20generalization%20than%20discriminative%20methods%20in%20ICD%20coding.%20However%2C%20fine-tuning%20LLMs%20for%20ICD%20coding%20faces%20three%20major%20challenges.%20First%2C%20existing%20public%20ICD%20coding%20datasets%20provide%20limited%20coverage%20of%20the%20ICD%20code%20space%2C%20restricting%20a%20model%27s%20ability%20to%20generalize%20to%20unseen%20codes.%20Second%2C%20naive%20fine-tuning%20diminishes%20the%20interpretability%20of%20LLMs%2C%20as%20few%20public%20datasets%20contain%20explicit%20supporting%20evidence%20for%20assigned%20codes.%20Third%2C%20ICD%20coding%20typically%20involves%20long%20clinical%20documents%2C%20making%20fine-tuning%20LLMs%20computationally%20expensive.%20To%20address%20these%20issues%2C%20we%20propose%20Code-Centric%20Learning%2C%20a%20training%20framework%20that%20shifts%20supervision%20from%20full%20clinical%20documents%20to%20scalable%2C%20short%20evidence%20spans.%20The%20key%20idea%20of%20this%20framework%20is%20that%20span-level%20learning%20improves%20LLMs%27%20ability%20to%20perform%20document-level%20ICD%20coding.%20Our%20proposed%20framework%20consists%20of%20a%20mixed%20training%20strategy%20and%20code-centric%20data%20expansion%2C%20which%20substantially%20reduces%20training%20cost%2C%20improves%20accuracy%20on%20unseen%20ICD%20codes%20and%20preserves%20interpretability.%20Under%20the%20same%20LLM%20backbone%2C%20our%20method%20substantially%20outperforms%20strong%20baselines.%20Notably%2C%20our%20method%20enables%20small-scale%20LLMs%20to%20achieve%20performance%20comparable%20to%20much%20larger%20proprietary%20models%2C%20demonstrating%20its%20effectiveness%20and%20potential%20for%20fully%20automated%20ICD%20coding.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15270v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Documents%2520to%2520Spans%253A%2520Code-Centric%2520Learning%2520for%2520LLM-based%2520ICD%2520Coding%26entry.906535625%3DXu%2520Zhang%2520and%2520Wenxin%2520Ma%2520and%2520Chenxu%2520Wu%2520and%2520Rongsheng%2520Wang%2520and%2520Kun%2520Zhang%2520and%2520S.%2520Kevin%2520Zhou%26entry.1292438233%3DICD%2520coding%2520is%2520a%2520critical%2520yet%2520challenging%2520task%2520in%2520healthcare.%2520Recently%252C%2520LLM-based%2520methods%2520demonstrate%2520stronger%2520generalization%2520than%2520discriminative%2520methods%2520in%2520ICD%2520coding.%2520However%252C%2520fine-tuning%2520LLMs%2520for%2520ICD%2520coding%2520faces%2520three%2520major%2520challenges.%2520First%252C%2520existing%2520public%2520ICD%2520coding%2520datasets%2520provide%2520limited%2520coverage%2520of%2520the%2520ICD%2520code%2520space%252C%2520restricting%2520a%2520model%2527s%2520ability%2520to%2520generalize%2520to%2520unseen%2520codes.%2520Second%252C%2520naive%2520fine-tuning%2520diminishes%2520the%2520interpretability%2520of%2520LLMs%252C%2520as%2520few%2520public%2520datasets%2520contain%2520explicit%2520supporting%2520evidence%2520for%2520assigned%2520codes.%2520Third%252C%2520ICD%2520coding%2520typically%2520involves%2520long%2520clinical%2520documents%252C%2520making%2520fine-tuning%2520LLMs%2520computationally%25 20First%2C%20existing%20public%20ICD%20coding%20datasets%20provide%20limited%20coverage%20of%20the%20ICD%20code%20space%2C%20restricting%20a%20model%27s%20ability%20to%20generalize%20to%20unseen%20codes.%20Second%2C%20naive%20fine-tuning%20diminishes%20the%20interpretability%20of%20LLMs%2C%20as%20few%20public%20datasets%20contain%20explicit%20supporting%20evidence%20for%20assigned%20codes.%20Third%2C%20ICD%20coding%20typically%20involves%20long%20clinical%20documents%2C%20making%20fine-tuning%20LLMs%20computationally%20expensive.%20To%20address%20these%20issues%2C%20we%20propose%20Code-Centric%20Learning%2C%20a%20training%20framework%20that%20shifts%20supervision%20from%20full%20clinical%20documents%20to%20scalable%2C%20short%20evidence%20spans.%20The%20key%20idea%20of%20this%20framework%20is%20that%20span-level%20learning%20improves%20LLMs%27%20ability%20to%20perform%20document-level%20ICD%20coding.%20Our%20proposed%20framework%20consists%20of%20a%20mixed%20training%20strategy%20and%20code-centric%20data%20expansion%2C%20which%20substantially%20reduces%20training%20cost%2C%20improves%20accuracy%20on%20unseen%20ICD%20codes%20and%20preserves%20interpretability.%20Under%20the%20same%20LLM%20backbone%2C%20our%20method%20substantially%20outperforms%20strong%20baselines.%20Notably%2C%20our%20method%20enables%20small-scale%20LLMs%20to%20achieve%20performance%20comparable%20to%20much%20larger%20proprietary%20models%2C%20demonstrating%20its%20effectiveness%20and%20potential%20for%20fully%20automated%20ICD%20coding.&entry.1838667208=http%3A//arxiv.org/abs/2603.15270v1&entry.124074799=Read"},
{"title": "SCAN: Sparse Circuit Anchor Interpretable Neuron for Lifelong Knowledge Editing", "author": "Yuhuan Liu and Haitian Zhong and Xinyuan Xia and Qiang Liu and Shu Wu and Liang Wang", "abstract": "Large Language Models (LLMs) often suffer from catastrophic forgetting and collapse during sequential knowledge editing. This vulnerability stems from the prevailing dense editing paradigm, which treats models as black boxes and relies on coarse-grained parameter interventions that inevitably disrupt preserved knowledge. To address this, we propose SCAN (a sparse editing framework based on Sparse Circuit Anchored Neuron) which transforms editing into a mechanism-aware manipulation by constructing a knowledge circuit via Sparse Transcoders. Experiments on Gemma2, Qwen3, and Llama3.1 across CounterFact, ZsRE and WikiFactDiff demonstrate that SCAN achieves a superior performance, maintaining model integrity on benchmarks like MMLU and GSM8K even after 3,000 sequential edits, whereas other existing methods deteriorate progressively as editing accumulates, eventually resulting in model collapse.", "link": "http://arxiv.org/abs/2603.15226v1", "date": "2026-03-16", "relevancy": 2.5224, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5141}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5141}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4852}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SCAN%3A%20Sparse%20Circuit%20Anchor%20Interpretable%20Neuron%20for%20Lifelong%20Knowledge%20Editing&body=Title%3A%20SCAN%3A%20Sparse%20Circuit%20Anchor%20Interpretable%20Neuron%20for%20Lifelong%20Knowledge%20Editing%0AAuthor%3A%20Yuhuan%20Liu%20and%20Haitian%20Zhong%20and%20Xinyuan%20Xia%20and%20Qiang%20Liu%20and%20Shu%20Wu%20and%20Liang%20Wang%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20often%20suffer%20from%20catastrophic%20forgetting%20and%20collapse%20during%20sequential%20knowledge%20editing.%20This%20vulnerability%20stems%20from%20the%20prevailing%20dense%20editing%20paradigm%2C%20which%20treats%20models%20as%20black%20boxes%20and%20relies%20on%20coarse-grained%20parameter%20interventions%20that%20inevitably%20disrupt%20preserved%20knowledge.%20To%20address%20this%2C%20we%20propose%20SCAN%20%28a%20sparse%20editing%20framework%20based%20on%20Sparse%20Circuit%20Anchored%20Neuron%29%20which%20transforms%20editing%20into%20a%20mechanism-aware%20manipulation%20by%20constructing%20a%20knowledge%20circuit%20via%20Sparse%20Transcoders.%20Experiments%20on%20Gemma2%2C%20Qwen3%2C%20and%20Llama3.1%20across%20CounterFact%2C%20ZsRE%20and%20WikiFactDiff%20demonstrate%20that%20SCAN%20achieves%20a%20superior%20performance%2C%20maintaining%20model%20integrity%20on%20benchmarks%20like%20MMLU%20and%20GSM8K%20even%20after%203%2C000%20sequential%20edits%2C%20whereas%20other%20existing%20methods%20deteriorate%20progressively%20as%20editing%20accumulates%2C%20eventually%20resulting%20in%20model%20collapse.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15226v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSCAN%253A%2520Sparse%2520Circuit%2520Anchor%2520Interpretable%2520Neuron%2520for%2520Lifelong%2520Knowledge%2520Editing%26entry.906535625%3DYuhuan%2520Liu%2520and%2520Haitian%2520Zhong%2520and%2520Xinyuan%2520Xia%2520and%2520Qiang%2520Liu%2520and%2520Shu%2520Wu%2520and%2520Liang%2520Wang%26entry.1292438233%3DLarge%2520Language%2520Models%2520%2528LLMs%2529%2520often%2520suffer%2520from%2520catastrophic%2520forgetting%2520and%2520collapse%2520during%2520sequential%2520knowledge%2520editing.%2520This%2520vulnerability%2520stems%2520from%2520the%2520prevailing%2520dense%2520editing%2520paradigm%252C%2520which%2520treats%2520models%2520as%2520black%2520boxes%2520and%2520relies%2520on%2520coarse-grained%2520parameter%2520interventions%2520that%2520inevitably%2520disrupt%2520preserved%2520knowledge.%2520To%2520address%2520this%252C%2520we%2520propose%2520SCAN%2520%2528a%2520sparse%2520editing%2520framework%2520based%2520on%2520Sparse%2520Circuit%2520Anchored%2520Neuron%2529%2520which%2520transforms%2520editing%2520into%2520a%2520mechanism-aware%2520manipulation%2520by%2520constructing%2520a%2520knowledge%2520circuit%2520via%2520Sparse%2520Transcoders.%2520Experiments%2520on%2520Gemma2%252C%2520Qwen3%252C%2520and%2520Llama3.1%2520across%2520CounterFact%252C%2520ZsRE%2520and%2520WikiFactDiff%2520demonstrate%2520that%2520SCAN%2520achieves%2520a%2520superior%2520performance%252C%2520maintaining%2520model%2520integrity%2520on%2520benchmarks%2520like%2520MMLU%2520and%2520GSM8K%2520even%2520after%25203%252C000%2520sequential%2520edits%252C%2520whereas%2520other%2520existing%2520methods%2520deteriorate%2520progressively%2520as%2520editing%2520accumulates%252C%2520eventually%2520resulting%2520in%2520model%2520collapse.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.15226v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SCAN%3A%20Sparse%20Circuit%20Anchor%20Interpretable%20Neuron%20for%20Lifelong%20Knowledge%20Editing&entry.906535625=Yuhuan%20Liu%20and%20Haitian%20Zhong%20and%20Xinyuan%20Xia%20and%20Qiang%20Liu%20and%20Shu%20Wu%20and%20Liang%20Wang&entry.1292438233=Large%20Language%20Models%20%28LLMs%29%20often%20suffer%20from%20catastrophic%20forgetting%20and%20collapse%20during%20sequential%20knowledge%20editing.%20This%20vulnerability%20stems%20from%20the%20prevailing%20dense%20editing%20paradigm%2C%20which%20treats%20models%20as%20black%20boxes%20and%20relies%20on%20coarse-grained%20parameter%20interventions%20that%20inevitably%20disrupt%20preserved%20knowledge.%20To%20address%20this%2C%20we%20propose%20SCAN%20%28a%20sparse%20editing%20framework%20based%20on%20Sparse%20Circuit%20Anchored%20Neuron%29%20which%20transforms%20editing%20into%20a%20mechanism-aware%20manipulation%20by%20constructing%20a%20knowledge%20circuit%20via%20Sparse%20Transcoders.%20Experiments%20on%20Gemma2%2C%20Qwen3%2C%20and%20Llama3.1%20across%20CounterFact%2C%20ZsRE%20and%20WikiFactDiff%20demonstrate%20that%20SCAN%20achieves%20a%20superior%20performance%2C%20maintaining%20model%20integrity%20on%20benchmarks%20like%20MMLU%20and%20GSM8K%20even%20after%203%2C000%20sequential%20edits%2C%20whereas%20other%20existing%20methods%20deteriorate%20progressively%20as%20editing%20accumulates%2C%20eventually%20resulting%20in%20model%20collapse.&entry.1838667208=http%3A//arxiv.org/abs/2603.15226v1&entry.124074799=Read"},
{"title": "SRL-MAD: Structured Residual Latents for One-Class Morphing Attack Detection", "author": "Diogo J. Paulo and Hugo Proen\u00e7a and Jo\u00e3o C. Neves", "abstract": "Face morphing attacks represent a significant threat to biometric systems as they allow multiple identities to be combined into a single face. While supervised morphing attack detection (MAD) methods have shown promising performance, their reliance on attack-labeled data limits generalization to unseen morphing attacks. This has motivated increasing interest in one-class MAD, where models are trained exclusively on bona fide samples and are expected to detect unseen attacks as deviations from the normal facial structure. In this context, we introduce SRL-MAD, a one-class single-image MAD that uses structured residual Fourier representations for open-set morphing attack detection. Starting from a residual frequency map that suppresses image-specific spectral trends, we preserve the two-dimensional organization of the Fourier domain through a ring-based representation and replace azimuthal averaging with a learnable ring-wise spectral projection. To further encode domain knowledge about where morphing artifacts arise, we impose a frequency-informed inductive bias by organizing spectral evidence into low, mid, and high-frequency bands and learning cross-band interactions. These structured spectral features are mapped into a latent space designed for direct scoring, avoiding the reliance on reconstruction errors. Extensive evaluation on FERET-Morph, FRLL-Morph, and MorDIFF demonstrates that SRL-MAD consistently outperforms recent one-class and supervised MAD models. Overall, our results show that learning frequency-aware projections provides a more discriminative alternative to azimuthal spectral summarization for one-class morphing attack detection.", "link": "http://arxiv.org/abs/2603.15050v1", "date": "2026-03-16", "relevancy": 2.5219, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5461}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4879}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4792}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SRL-MAD%3A%20Structured%20Residual%20Latents%20for%20One-Class%20Morphing%20Attack%20Detection&body=Title%3A%20SRL-MAD%3A%20Structured%20Residual%20Latents%20for%20One-Class%20Morphing%20Attack%20Detection%0AAuthor%3A%20Diogo%20J.%20Paulo%20and%20Hugo%20Proen%C3%A7a%20and%20Jo%C3%A3o%20C.%20Neves%0AAbstract%3A%20Face%20morphing%20attacks%20represent%20a%20significant%20threat%20to%20biometric%20systems%20as%20they%20allow%20multiple%20identities%20to%20be%20combined%20into%20a%20single%20face.%20While%20supervised%20morphing%20attack%20detection%20%28MAD%29%20methods%20have%20shown%20promising%20performance%2C%20their%20reliance%20on%20attack-labeled%20data%20limits%20generalization%20to%20unseen%20morphing%20attacks.%20This%20has%20motivated%20increasing%20interest%20in%20one-class%20MAD%2C%20where%20models%20are%20trained%20exclusively%20on%20bona%20fide%20samples%20and%20are%20expected%20to%20detect%20unseen%20attacks%20as%20deviations%20from%20the%20normal%20facial%20structure.%20In%20this%20context%2C%20we%20introduce%20SRL-MAD%2C%20a%20one-class%20single-image%20MAD%20that%20uses%20structured%20residual%20Fourier%20representations%20for%20open-set%20morphing%20attack%20detection.%20Starting%20from%20a%20residual%20frequency%20map%20that%20suppresses%20image-specific%20spectral%20trends%2C%20we%20preserve%20the%20two-dimensional%20organization%20of%20the%20Fourier%20domain%20through%20a%20ring-based%20representation%20and%20replace%20azimuthal%20averaging%20with%20a%20learnable%20ring-wise%20spectral%20projection.%20To%20further%20encode%20domain%20knowledge%20about%20where%20morphing%20artifacts%20arise%2C%20we%20impose%20a%20frequency-informed%20inductive%20bias%20by%20organizing%20spectral%20evidence%20into%20low%2C%20mid%2C%20and%20high-frequency%20bands%20and%20learning%20cross-band%20interactions.%20These%20structured%20spectral%20features%20are%20mapped%20into%20a%20latent%20space%20designed%20for%20direct%20scoring%2C%20avoiding%20the%20reliance%20on%20reconstruction%20errors.%20Extensive%20evaluation%20on%20FERET-Morph%2C%20FRLL-Morph%2C%20and%20MorDIFF%20demonstrates%20that%20SRL-MAD%20consistently%20outperforms%20recent%20one-class%20and%20supervised%20MAD%20models.%20Overall%2C%20our%20results%20show%20that%20learning%20frequency-aware%20projections%20provides%20a%20more%20discriminative%20alternative%20to%20azimuthal%20spectral%20summarization%20for%20one-class%20morphing%20attack%20detection.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15050v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSRL-MAD%253A%2520Structured%2520Residual%2520Latents%2520for%2520One-Class%2520Morphing%2520Attack%2520Detection%26entry.906535625%3DDiogo%2520J.%2520Paulo%2520and%2520Hugo%2520Proen%25C3%25A7a%2520and%2520Jo%25C3%25A3o%2520C.%2520Neves%26entry.1292438233%3DFace%2520morphing%2520attacks%2520represent%2520a%2520significant%2520threat%2520to%2520biometric%2520systems%2520as%2520they%2520allow%2520multiple%2520identities%2520to%2520be%2520combined%2520into%2520a%2520single%2520face.%2520While%2520supervised%2520morphing%2520attack%2520detection%2520%2528MAD%2529%2520methods%2520have%2520shown%2520promising%2520performance%252C%2520their%2520reliance%2520on%2520attack-labeled%2520data%2520limits%2520generalization%2520to%2520unseen%2520morphing%2520attacks.%2520This%2520has%2520motivated%2520increasing%2520interest%2520in%2520one-class%2520MAD%252C%2520where%2520models%2520are%2520trained%2520exclusively%2520on%2520bona%2520fide%2520samples%2520and%2520are%2520expected%2520to%2520detect%2520unseen%2520attacks%2520as%2520deviations%2520from%2520the%2520normal%2520facial%2520structure.%2520In%2520this%2520context%252C%2520we%2520introduce%2520SRL-MAD%252C%2520a%2520one-class%2520single-image%2520MAD%2520that%2520uses%2520structured%2520residual%2520Fourier%2520representations%2520for%2520open-set%2520morphing%2520attack%2520detection.%2520Starting%2520from%2520a%2520residual%2520frequency%2520map%2520that%2520suppresses%2520image-specific%2520spectral%2520trends%252C%2520we%2520preserve%2520the%2520two-dimensional%2520organization%2520of%2520the%2520Fourier%2520domain%2520through%2520a%2520ring-based%2520representation%2520and%2520replace%2520azimuthal%2520averaging%2520with%2520a%2520learnable%2520ring-wise%2520spectral%2520projection.%2520To%2520further%2520encode%2520domain%2520knowledge%2520about%2520where%2520morphing%2520artifacts%2520arise%252C%2520we%2520impose%2520a%2520frequency-informed%2520inductive%2520bias%2520by%2520organizing%2520spectral%2520evidence%2520into%2520low%252C%2520mid%252C%2520and%2520high-frequency%2520bands%2520and%2520learning%2520cross-band%2520interactions.%2520These%2520structured%2520spectral%2520features%2520are%2520mapped%2520into%2520a%2520latent%2520space%2520designed%2520for%2520direct%2520scoring%252C%2520avoiding%2520the%2520reliance%2520on%2520reconstruction%2520errors.%2520Extensive%2520evaluation%2520on%2520FERET-Morph%252C%2520FRLL-Morph%252C%2520and%2520MorDIFF%2520demonstrates%2520that%2520SRL-MAD%2520consistently%2520outperforms%2520recent%2520one-class%2520and%2520supervised%2520MAD%2520models.%2520Overall%252C%2520our%2520results%2520show%2520that%2520learning%2520frequency-aware%2520projections%2520provides%2520a%2520more%2520discriminative%2520alternative%2520to%2520azimuthal%2520spectral%2520summarization%2520for%2520one-class%2520morphing%2520attack%2520detection.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.15050v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SRL-MAD%3A%20Structured%20Residual%20Latents%20for%20One-Class%20Morphing%20Attack%20Detection&entry.906535625=Diogo%20J.%20Paulo%20and%20Hugo%20Proen%C3%A7a%20and%20Jo%C3%A3o%20C.%20Neves&entry.1292438233=Face%20morphing%20attacks%20represent%20a%20significant%20threat%20to%20biometric%20systems%20as%20they%20allow%20multiple%20identities%20to%20be%20combined%20into%20a%20single%20face.%20While%20supervised%20morphing%20attack%20detection%20%28MAD%29%20methods%20have%20shown%20promising%20performance%2C%20their%20reliance%20on%20attack-labeled%20data%20limits%20generalization%20to%20unseen%20morphing%20attacks.%20This%20has%20motivated%20increasing%20interest%20in%20one-class%20MAD%2C%20where%20models%20are%20trained%20exclusively%20on%20bona%20fide%20samples%20and%20are%20expected%20to%20detect%20unseen%20attacks%20as%20deviations%20from%20the%20normal%20facial%20structure.%20In%20this%20context%2C%20we%20introduce%20SRL-MAD%2C%20a%20one-class%20single-image%20MAD%20that%20uses%20structured%20residual%20Fourier%20representations%20for%20open-set%20morphing%20attack%20detection.%20Starting%20from%20a%20residual%20frequency%20map%20that%20suppresses%20image-specific%20spectral%20trends%2C%20we%20preserve%20the%20two-dimensional%20organization%20of%20the%20Fourier%20domain%20through%20a%20ring-based%20representation%20and%20replace%20azimuthal%20averaging%20with%20a%20learnable%20ring-wise%20spectral%20projection.%20To%20further%20encode%20domain%20knowledge%20about%20where%20morphing%20artifacts%20arise%2C%20we%20impose%20a%20frequency-informed%20inductive%20bias%20by%20organizing%20spectral%20evidence%20into%20low%2C%20mid%2C%20and%20high-frequency%20bands%20and%20learning%20cross-band%20interactions.%20These%20structured%20sp {"title": "Next-Frame Decoding for Ultra-Low-Bitrate Image Compression with Video Diffusion Priors", "author": "Yunuo Chen and Chuqin Zhou and Jiangchuan Li and Xiaoyue Ling and Bing He and Jincheng Dai and Li Song and Guo Lu", "abstract": "We present a novel paradigm for ultra-low-bitrate image compression (ULB-IC) that exploits the ``temporal'' evolution in generative image compression. Specifically, we define an explicit intermediate state during decoding: a compact anchor frame, which preserves the scene geometry and semantic layout while discarding high-frequency details. We then reinterpret generative decoding as a virtual temporal transition from this anchor to the final reconstructed image.To model this progression, we leverage a pretrained video diffusion model (VDM) as temporal priors: the anchor frame serves as the initial frame and the original image as the target frame, transforming the decoding process into a next-frame prediction task.In contrast to image diffusion-based ULB-IC models, our decoding proceeds from a visible, semantically faithful anchor, which improves both fidelity and realism for perceptual image compression. Extensive experiments demonstrate that our method achieves superior objective and subjective performance. On the CLIC2020 test set, our method achieves over \\textbf{50\\% bitrate savings} across LPIPS, DISTS, FID, and KID compared to DiffC, while also delivering a significant decoding speedup of up to $\\times$5. Code will be released later.", "link": "http://arxiv.org/abs/2603.15129v1", "date": "2026-03-16", "relevancy": 2.5201, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.6682}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6261}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6187}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Next-Frame%20Decoding%20for%20Ultra-Low-Bitrate%20Image%20Compression%20with%20Video%20Diffusion%20Priors&body=Title%3A%20Next-Frame%20Decoding%20for%20Ultra-Low-Bitrate%20Image%20Compression%20with%20Video%20Diffusion%20Priors%0AAuthor%3A%20Yunuo%20Chen%20and%20Chuqin%20Zhou%20and%20Jiangchuan%20Li%20and%20Xiaoyue%20Ling%20and%20Bing%20He%20and%20Jincheng%20Dai%20and%20Li%20Song%20and%20Guo%20Lu%0AAbstract%3A%20We%20present%20a%20novel%20paradigm%20for%20ultra-low-bitrate%20image%20compression%20%28ULB-IC%29%20that%20exploits%20the%20%60%60temporal%27%27%20evolution%20in%20generative%20image%20compression.%20Specifically%2C%20we%20define%20an%20explicit%20intermediate%20state%20during%20decoding%3A%20a%20compact%20anchor%20frame%2C%20which%20preserves%20the%20scene%20geometry%20and%20semantic%20layout%20while%20discarding%20high-frequency%20details.%20We%20then%20reinterpret%20generative%20decoding%20as%20a%20virtual%20temporal%20transition%20from%20this%20anchor%20to%20the%20final%20reconstructed%20image.To%20model%20this%20progression%2C%20we%20leverage%20a%20pretrained%20video%20diffusion%20model%20%28VDM%29%20as%20temporal%20priors%3A%20the%20anchor%20frame%20serves%20as%20the%20initial%20frame%20and%20the%20original%20image%20as%20the%20target%20frame%2C%20transforming%20the%20decoding%20process%20into%20a%20next-frame%20prediction%20task.In%20contrast%20to%20image%20diffusion-based%20ULB-IC%20models%2C%20our%20decoding%20proceeds%20from%20a%20visible%2C%20semantically%20faithful%20anchor%2C%20which%20improves%20both%20fidelity%20and%20realism%20for%20perceptual%20image%20compression.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20achieves%20superior%20objective%20and%20subjective%20performance.%20On%20the%20CLIC2020%20test%20set%2C%20our%20method%20achieves%20over%20%5Ctextbf%7B50%5C%25%20bitrate%20savings%7D%20across%20LPIPS%2C%20DISTS%2C%20FID%2C%20and%20KID%20compared%20to%20DiffC%2C%20while%20also%20delivering%20a%20significant%20decoding%20speedup%20of%20up%20to%20%24%5Ctimes%245.%20Code%20will%20be%20released%20later.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15129v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNext-Frame%2520Decoding%2520for%2520Ultra-Low-Bitrate%2520Image%2520Compression%2520with%2520Video%2520Diffusion%2520Priors%26entry.906535625%3DYunuo%2520Chen%2520and%2520Chuqin%2520Zhou%2520and%2520Jiangchuan%2520Li%2520and%2520Xiaoyue%2520Ling%2520and%2520Bing%2520He%2520and%2520Jincheng%2520Dai%2520and%2520Li%2520Song%2520and%2520Guo%2520Lu%26entry.1292438233%3DWe%2520present%2520a%2520novel%2520paradigm%2520for%2520ultra-low-bitrate%2520image%2520compression%2520%2528ULB-IC%2529%2520that%2520exploits%2520the%2520%2560%2560temporal%2527%2527%2520evolution%2520in%2520generative%2520image%2520compression.%2520Specifically%252C%2520we%2520define%2520an%2520explicit%2520intermediate%2520state%2520during%2520decoding%253A%2520a%2520compact%2520anchor%2520frame%252C%2520which%2520preserves%2520the%2520scene%2520geometry%2520and%2520semantic%2520layout%2520while%2520discarding%2520high-frequency%2520details.%2520We%2520then%2520reinterpret%2520generative%2520decoding%2520as%2520a%2520virtual%2520temporal%2520transition%2520from%2520this%2520anchor%2520to%2520the%2520final%2520reconstructed%2520image.To%2520model%2520this%2520progression%252C%2520we%2520leverage%2520a%2520pretrained%2520video%2520diffusion%2520model%2520%2528VDM%2529%2520as%2520temporal%2520priors%253A%2520the%2520anchor%2520frame%2520serves%2520as%2520the%2520initial%2520frame%2520and%2520the%2520original%2520image%2520as%2520the%2520target%2520frame%252C%2520transforming%2520the%2520decoding%2520process%2520into%2520a%2520next-frame%2520prediction%2520task.In%2520contrast%2520to%2520image%2520diffusion-based%2520ULB-IC%2520models%252C%2520our%2520decoding%2520proceeds%2520from%2520a%2520visible%252C%2520semantically%2520faithful%2520anchor%252C%2520which%2520improves%2520both%2520fidelity%2520and%2520realism%2520for%2520perceptual%2520image%2520compression.%2520Extensive%2520experiments%2520demonstrate%2520that%2520our%2520method%2520achieves%2520superior%2520objective%2520and%2520subjective%2520performance.%2520On%2520the%2520CLIC2020%2520test%2520set%252C%2520our%2520method%2520achieves%2520over%2520%255Ctextbf%257B50%255C%2525%2520bitrate%2520savings%257D%2520across%2520LPIPS%252C%2520DISTS%252C%2520FID%252C%2520and%2520KID%2520compared%2520to%2520DiffC%252C%2520while%2520also%2520delivering%2520a%2520significant%2520decoding%2520speedup%2520of%2520up%2520to%2520%2524%255Ctimes%25245.%2520Code%2520will%2520be%2520released%2520later.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.15129v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Next-Frame%20Decoding%20for%20Ultra-Low-Bitrate%20Image%20Compression%20with%20Video%20Diffusion%20Priors&entry.906535625=Yunuo%20Chen%20and%20Chuqin%20Zhou%20and%20Jiangchuan%20Li%20and%20Xiaoyue%20Ling%20and%20Bing%20He%20and%20Jincheng%20Dai%20and%20Li%20Song%20and%20Guo%20Lu&entry.1292438233=We%20present%20a%20novel%20paradigm%20for%20ultra-low-bitrate%20image%20compression%20%28ULB-IC%29%20that%20exploits%20the%20%60%60temporal%27%27%20evolution%20in%20generative%20image%20compression.%20Specifically%2C%20we%20define%20an%20explicit%20intermediate%20state%20during%20decoding%3A%20a%20compact%20anchor%20frame%2C%20which%20preserves%20the%20scene%20geometry%20and%20semantic%20layout%20while%20discarding%20high-frequency%20details.%20We%20then%20reinterpret%20generative%20decoding%20as%20a%20virtual%20temporal%20transition%20from%20this%20anchor%20to%20the%20final%20reconstructed%20image.To%20model%20this%20progression%2C%20we%20leverage%20a% {"title": "Efficient Document Parsing via Parallel Token Prediction", "author": "Lei Li and Ze Zhao and Meng Li and Zhongwang Lun and Yi Yuan and Xingjing Lu and Zheng Wei and Jiang Bian and Zang Li", "abstract": "Document parsing, as a fundamental yet crucial vision task, is being revolutionized by vision-language models (VLMs). However, the autoregressive (AR) decoding inherent to VLMs creates a significant bottleneck, severely limiting parsing speed. In this paper, we propose Parallel-Token Prediction (PTP), a plugable, model-agnostic and simple-yet-effective method that enables VLMs to generate multiple future tokens in parallel with improved sample efficiency. Specifically, we insert some learnable tokens into the input sequence and design corresponding training objectives to equip the model with parallel decoding capabilities for document parsing. Furthermore, to support effective training, we develop a comprehensive data generation pipeline that efficiently produces large-scale, high-quality document parsing training data for VLMs. Extensive experiments on OmniDocBench and olmOCR-bench demonstrate that our method not only significantly improves decoding speed (1.6x-2.2x) but also reduces model hallucinations and exhibits strong generalization abilities.", "link": "http://arxiv.org/abs/2603.15206v1", "date": "2026-03-16", "relevancy": 2.5132, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5133}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4973}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4973}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Efficient%20Document%20Parsing%20via%20Parallel%20Token%20Predict {"title": "UP2You: Fast Reconstruction of Yourself from Unconstrained Photo Collections", "author": "Zeyu Cai and Ziyang Li and Xiaoben Li and Boqian Li and Zeyu Wang and Zhenyu Zhang and Yuliang Xiu", "abstract": "We present UP2You, the first tuning-free solution for reconstructing high-fidelity 3D clothed portraits from extremely unconstrained in-the-wild 2D photos. Unlike previous approaches that require \"clean\" inputs (e.g., full-body images with minimal occlusions, or well-calibrated cross-view captures), UP2You directly processes raw, unstructured photographs, which may vary significantly in pose, viewpoint, cropping, and occlusion. Instead of compressing data into tokens for slow online text-to-3D optimization, we introduce a data rectifier paradigm that efficiently converts unconstrained inputs into clean, orthogonal multi-view images in a single forward pass within seconds, simplifying the 3D reconstruction. Central to UP2You is a pose-correlated feature aggregation module (PCFA), that selectively fuses information from multiple reference images w.r.t. target poses, enabling better identity preservation and nearly constant memory footprint, with more observations. We also introduce a perceiver-based multi-reference shape predictor, removing the need for pre-captured body templates. Extensive experiments on 4D-Dress, PuzzleIOI, and in-the-wild captures demonstrate that UP2You consistently surpasses previous methods in both geometric accuracy (Chamfer-15%, P2S-18% on PuzzleIOI) and texture fidelity (PSNR-21%, LPIPS-46% on 4D-Dress). UP2You is efficient (1.5 minutes per person), and versatile (supports arbitrary pose control, and training-free multi-garment 3D virtual try-on), making it practical for real-world scenarios where humans are casually captured. Both models and code will be released to facilitate future research on this underexplored task. Project Page: https://zcai0612.github.io/UP2You", "link": "http://arxiv.org/abs/2509.24817v2", "date": "2026-03-16", "relevancy": 2.5094, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6401}, {"title": "Total Selfie: Generating Full-Body Selfies", "link": "http://arxiv.org/abs/2308.14740v2", "similarity": 0.623}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6163}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20UP2You%3A%20Fast%20Reconstruction%20of%20Yourself%20from%20Unconstrained%20Photo%20Collections&body=Title%3A%20UP2You%3A%20Fast%20Reconstruction%20of%20Yourself%20from%20Unconstrained%20Photo%20Collections%0AAuthor%3A%20Zeyu%20Cai%20and%20Ziyang%20Li%20and%20Xiaoben%20Li%20and%20Boqian%20Li%20and%20Zeyu%20Wang%20and%20Zhenyu%20Zhang%20and%20Yuliang%20Xiu%0AAbstract%3A%20We%20present%20UP2You%2C%20the%20first%20tuning-free%20solution%20for%20reconstructing%20high-fidelity%203D%20clothed%20portraits%20from%20extremely%20unconstrained%20in-the-wild%202D%20photos.%20Unlike%20previous%20approaches%20that%20require%20%22clean%22%20inputs%20%28e.g.%2C%20full-body%20images%20with%20minimal%20occlusions%2C%20or%20well-calibrated%20cross-view%20captures%29%2C%20UP2You%20directly%20processes%20raw%2C%20unstructured%20photographs%2C%20which%20may%20vary%20significantly%20in%20pose%2C%20viewpoint%2C%20cropping%2C%20and%20occlusion.%20Instead%20of%20compressing%20data%20into%20tokens%20for%20slow%20online%20text-to-3D%20optimization%2C%20we%20introduce%20a%20data%20rectifier%20paradigm%20that%20efficiently%20converts%20unconstrained%20inputs%20into%20clean%2C%20orthogonal%20multi-view%20images%20in%20a%20single%20forward%20pass%20within%20seconds%2C%20simplifying%20the%203D%20reconstruction.%20Central%20to%20UP2You%20is%20a%20pose-correlated%20feature%20aggregation%20module%20%28PCFA%29%2C%20that%20selectively%20fuses%20information%20from%20multiple%20reference%20images%20w.r.t.%20target%20poses%2C%20enabling%20better%20identity%20preservation%20and%20nearly%20constant%20memory%20footprint%2C%20with%20more%20observations.%20We%20also%20introduce%20a%20perceiver-based%20multi-reference%20shape%20predictor%2C%20removing%20the%20need%20for%20pre-captured%20body%20templates.%20Extensive%20experiments%20on%204D-Dress%2C%20PuzzleIOI%2C%20and%20in-the-wild%20captures%20demonstrate%20that%20UP2You%20consistently%20surpasses%20previous%20methods%20in%20both%20geometric%20accuracy%20%28Chamfer-15%25%2C%20P2S-18%25%20on%20PuzzleIOI%29%20and%20texture%20fidelity%20%28PSNR-21%25%2C%20LPIPS-46%25%20on%204D-Dress%29.%20UP2You%20is%20efficient%20%281.5%20minutes%20per%20person%29%2C%20and%20versatile%20%28supports%20arbitrary%20pose%20control%2C%20and%20training-free%20multi-garment%203D%20virtual%20try-on%29%2C%20making%20it%20practical%20for%20real-world%20scenarios%20where%20humans%20are%20casually%20captured.%20Both%20models%20and%20code%20will%20be%20released%20to%20facilitate%20future%20research%20on%20this%20underexplored%20task.%20Project%20Page%3A%20https%3A//zcai0612.github.io/UP2You%0ALink%3A%20http%3A//arxiv.org/abs/2509.24817v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUP2You%253A%2520Fast%2520Reconstruction%2520of%2520Yourself%2520from%2520Unconstrained%2520Photo%2520Collections%26entry.906535625%3DZeyu%2520Cai%2520and%2520Ziyang%2520Li%2520and%2520Xiaoben%2520Li%2520and%2520Boqian%2520Li%2520and%2520Zeyu%2520Wang%2520and%2520Zhenyu%2520Zhang%2520and%2520Yuliang%2520Xiu%26entry.1292438233%3DWe%2520present%2520UP2You%252C%2520the%2520first%2520tuning-free%2520solution%2520for%2520reconstructing%2520high-fidelity%25203D%2520clothed%2520portraits%2520from%2520extremely%2520unconstrained%2520in-the-wild%25202D%2520photos.%2520Unlike%2520previous%2520approaches%2520that%2520require%2520%2522clean%2522%2520inputs%2520%2528e.g.%252C%2520full-body {"title": "IRIS: Intersection-aware Ray-based Implicit Editable Scenes", "author": "Grzegorz Wilczy\u0144ski and Miko\u0142aj Zieli\u0144ski and Krzysztof Byrski and Joanna Waczy\u0144ska and Dominik Belter and Przemys\u0142aw Spurek", "abstract": "Neural Radiance Fields achieve high-fidelity scene representation but suffer from costly training and rendering, while 3D Gaussian splatting offers real-time performance with strong empirical results. Recently, solutions that harness the best of both worlds by using Gaussians as proxies to guide neural field evaluations, still suffer from significant computational inefficiencies. They typically rely on stochastic volumetric sampling to aggregate features, which severely limits rendering performance. To address this issue, a novel framework named IRIS (Intersection-aware Ray-based Implicit Editable Scenes) is introduced as a method designed for efficient and interactive scene editing. To overcome the limitations of standard ray marching, an analytical sampling strategy is employed that precisely identifies interaction points between rays and scene primitives, effectively eliminating empty space processing. Furthermore, to address the computational bottleneck of spatial neighbor lookups, a continuous feature aggregation mechanism is introduced that operates directly along the ray. By interpolating latent attributes from sorted intersections, costly 3D searches are bypassed, ensuring geometric consistency, enabling high-fidelity, real-time rendering, and flexible shape editing. Code can be found at https://github.com/gwilczynski95/iris.", "link": "http://arxiv.org/abs/2603.15368v1", "date": "2026-03-16", "relevancy": 2.4942, "topK": [{"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.6725}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6029}, {"title": {"title": "To See is Not to Master: Teaching LLMs to Use Private Libraries for Code Generation", "author": "Yitong Zhang and Chengze Li and Ruize Chen and Guowei Yang and Xiaoran Jia and Yijie Ren and Jia Li", "abstract": "Large Language Models (LLMs) have shown strong potential for code generation, yet they remain limited in private-library-oriented code generation, where the goal is to generate code using APIs from private libraries. Existing approaches mainly rely on retrieving private-library API documentation and injecting relevant knowledge into the context at inference time. However, our study shows that this is insufficient: even given accurate required knowledge, LLMs still struggle to invoke private-library APIs effectively.\n  To address this limitation, we propose PriCoder, an approach that teaches LLMs to invoke private-library APIs through automatically synthesized data. Specifically, PriCoder models private-library data synthesis as the construction of a graph, and alternates between two graph operators: (1) Progressive Graph Evolution, which improves data diversity by progressively synthesizing more diverse training samples from basic ones, and (2) Multidimensional Graph Pruning, which improves data quality through a rigorous filtering pipeline. To support rigorous evaluation, we construct two new benchmarks based on recently released libraries that are unfamiliar to the tested models. Experiments on three mainstream LLMs show that PriCoder substantially improves private-library-oriented code generation, yielding gains of over 20% in pass@1 in many settings, while causing negligible impact on general code generation capability. Our code and benchmarks are publicly available at https://github.com/contact-eniacode/PriCoder.", "link": "http://arxiv.org/abs/2603.15159v1", "date": "2026-03-16", "relevancy": 2.4915, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5047}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5047}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4855}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20To%20See%20is%20Not%20to%20Master%3A%20Teaching%20LLMs%20to%20Use%20Private%20Libraries%20for%20Code%20Generation&body=Title%3A%20To%20See%20is%20Not%20to%20Master%3A%20Teaching%20LLMs%20to%20Use%20Private%20Libraries%20for%20Code%20Generation%0AAuthor%3A%20Yitong%20Zhang%20and%20Chengze%20Li%20and%20Ruize%20Chen%20and%20Guowei%20Yang%20and%20Xiaoran%20Jia%20and%20Yijie%20Ren%20and%20Jia%20Li%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20have%20shown%20strong%20potential%20for%20code%20generation%2C%20yet%20they%20remain%20limited%20in%20private-library-oriented%20code%20generation%2C%20where%20the%20goal%20is%20to%20generate%20code%20using%20APIs%20from%20private%20libraries.%20Existing%20approaches%20mainly%20rely%20on%20retrieving%20private-library%20API%20documentation%20and%20injecting%20relevant%20knowledge%20into%20the%20context%20at%20inference%20time.%20However%2C%20our%20study%20shows%20that%20this%20is%20insufficient%3A%20even%20given%20accurate%20required%20knowledge%2C%20LLMs%20still%20struggle%20to%20invoke%20private-library%20APIs%20effectively.%0A%20%20To%20address%20this%20limitation%2C%20we%20propose%20PriCoder%2C%20an%20approach%20that%20teaches%20LLMs%20to%20invoke%20private-library%20APIs%20through%20automatically%20synthesized%20data.%20Specifically%2C%20PriCoder%20models%20private-library%20data%20synthesis%20as%20the%20construction%20of%20a%20graph%2C%20and%20alternates%20between%20two%20graph%20operators%3A%20%281%29%20Progressive%20Graph%20Evolution%2C%20which%20improves%20data%20diversity%20by%20progressively%20synthesizing%20more%20diverse%20training%20samples%20from%20basic%20ones%2C%20and%20%282%29%20Multidimensional%20Graph%20Pruning%2C%20which%20improves%20data%20quality%20through%20a%20rigorous%20filtering%20pipeline.%20To%20support%20rigorous%20evaluation%2C%20we%20construct%20two%20new%20benchmarks%20based%20on%20recently%20released%20libraries%20that%20are%20unfamiliar%20to%20the%20tested%20models.%20Experiments%20on%20three%20mainstream%20LLMs%20show%20that%20PriCoder%20substantially%20improves%20private-library-oriented%20code%20generation%2C%20yielding%20gains%20of%20over%2020%25%20in%20pass%401%20in%20many%20settings%2C%20while%20causing%20negligible%20impact%20on%20general%20code%20generation%20capability.%20Our%20code%20and%20benchmarks%20are%20publicly%20available%20at%20https%3A//github.com/contact-eniacode/PriCoder.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15159v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTo%2520See%2520is%2520Not%2520to%2520Master%253A%2520Teaching%2520LLMs%2520to%2520Use%2520Private%2520Libraries%2520for%2520Code%2520Generation%26entry.906535625%3DYitong%2520Zhang%2520and%2520Chengze%2520Li%2520and%2520Ruize%2520Chen%2520and%2520Guowei%2520Yang%2520and%2520Xiaoran%2520Jia%2520and%2520Yijie%2520Ren%2520and%2520Jia%2520Li%26entry.1292438233%3DLarge%2520Language%2520Models%2520%2528LLMs%2529%2520have%2520shown%2520strong%2520potential%2520for%2520code%2520generation%252C%2520yet%2520they%2520remain%2520limited%2520in%2520private-library-oriented%2520code%2520generation%252C%2520where%2520the%2520goal%2520is%2520to%2520generate%2520code%2520using%2520APIs%2520from%2520private%2520libraries.%2520Existing%2520approaches%2520mainly%2520rely%2520on%2520retrieving%2520private-library%2520API%2520documentation%2520and%2520injecting%2520relevant%2520knowledge%2520into%2520the%2520context%2520at%2520inference%2520time.%2520However%252C%2520our%2520study%2520shows%2520that%2520this%2520is%2520insu {"title": "Revisiting Face Forgery Detection: From Facial Representation to Forgery Detection", "author": "Zonghui Guo and Yingjie Liu and Jie Zhang and Haiyong Zheng and Shiguang Shan", "abstract": "Face Forgery Detection (FFD), or Deepfake detection, aims to determine whether a digital face is real or fake. Due to different face synthesis algorithms with diverse forgery patterns, FFD models often overfit specific patterns in training datasets, resulting in poor generalization to other unseen forgeries. Existing FFD methods primarily leverage pre-trained backbones with general image representation capabilities and fine-tune them to identify facial forgery cues. However, these backbones lack domain-specific facial knowledge and insufficiently capture complex facial features, thus hindering effective implicit forgery cue identification and limiting generalization. Therefore, it is essential to revisit FFD workflow across the \\textit{pre-training} and \\textit{fine-tuning} stages, achieving an elaborate integration from facial representation to forgery detection to improve generalization. Specifically, we develop an FFD-specific pre-trained backbone with superior facial representation capabilities through self-supervised pre-training on real faces. We then propose a competitive fine-tuning framework that stimulates the backbone to identify implicit forgery cues through a competitive learning mechanism. Moreover, we devise a threshold optimization mechanism that utilizes prediction confidence to improve the inference reliability. Comprehensive experiments demonstrate that our method achieves excellent performance in FFD and extra face-related tasks, \\ie, presentation attack detection. Code and models are available at \\href{https://github.com/zhenglab/FFDBackbone}{https://github.com/zhenglab/FFDBackbone}.", "link": "http://arxiv.org/abs/2409.16945v2", "date": "2026-03-16", "relevancy": 2.4799, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.498}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4962}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4937}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Revisiting%20Face%20Forgery%20Detection%3A%20From%20Facial%20Representation%20to%20Forgery%20Detection&body=Title%3A%20Revisiting%20Face%20Forgery%20Detection%3A%20From%20Facial%20Representation%20to%20Forgery%20Detection%0AAuthor%3A%20Zonghui%20Guo%20and%20Yingjie%20Liu%20and%20Jie%20Zhang%20and%20Haiyong%20Zheng%20and%20Shiguang%20Shan%0AAbstract%3A%20Face%20Forgery%20Detection%20%28FFD%29%2C%20or%20Deepfake%20detection%2C%20aims%20to%20determine%20whether%20a%20digital%20face%20is%20real%20or%20fake.%20Due%20to%20different%20face%20synthesis%20algorithms%20with%20diverse%20forgery%20patterns%2C%20FFD%20models%20often%20overfit%20specific%20patterns%20in%20training%20datasets%2C%20resulting%20in%20poor%20generalization%20to%20other%20unseen%20forgeries.%20Existing%20FFD%20methods%20primarily%20leverage%20pre-trained%20backbones%20with%20general%20image%20representation%20capabilities%20and%20fine-tune%20them%20to%20identify%20facial%20forgery%20cues.%20However%2C%20these%20backbones%20lack%20domain-specific%20facial%20knowledge%20and%20insufficiently%20capture%20complex%20facial%20features%2C%20thus%20hindering%20effective%20implicit%20forgery%20cue%20identification%20and%20limiting%20generalization.%20Therefore%2C%20it%20is%20essential%20to%20revisit%20FFD%20workflow%20across%20the%20%5Ctextit%7Bpre-training%7D%20and%20%5Ctextit%7Bfine-tuning%7D%20stages%2C%20achieving%20an%20elaborate%20integration%20from%20facial%20representation%20to%20forgery%20detection%20to%20improve%20generalization.%20Specifically%2C%20we%20develop%20an%20FFD-specific%20pre-trained%20backbone%20with%20superior%20facial%20representation%20capabilities%20through%20self-supervised%20pre-training%20on%20real%20faces.%20We%20then%20propose%20a%20competitive%20fine-tuning%20framework%20that%20stimulates%20the%20backbone%20to%20identify%20implicit%20forgery%20cues%20through%20a%20competitive%20learning%20mechanism.%20Moreover%2C%20we%20devise%20a%20threshold%20optimization%20mechanism%20that%20utilizes%20prediction%20confidence%20to%20improve%20the%20inference%20reliability.%20Comprehensive%20experiments%20demonstrate%20that%20our%20method%20achieves%20excellent%20performance%20in%20FFD%20and%20extra%20face-related%20tasks%2C%20%5Cie%2C%20presentation%20attack%20detection.%20Code%20and%20models%20are%20available%20at%20%5Chref%7Bhttps%3A//github.com/zhenglab/FFDBackbone%7D%7Bhttps%3A//github.com/zhenglab/FFDBackbone%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2409.16945v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRevisiting%2520Face%2520Forgery%2520Detection%253A%2520From%2520Facial%2520Representation%2520to%2520Forgery%2520Detection%26entry.906535625%3DZonghui%2520Guo%2520and%2520Yingjie%2520Liu%2520and%2520Jie%2520Zhang%2520and%2520Haiyong%2520Zheng%2520and%2520Shiguang%2520Shan%26entry.1292438233%3DFace%2520Forgery%2520Detection%2520%2528FFD%2529%252C%2520or%2520Deepfake%2520detection%252C%2520aims%2520to%2520determine%2520whether%2520a%2520digital%2520face%2520is%2520real%2520or%2520fake.%2520Due%2520to%2520different%2520face%2520synthesis%2520algorithms%2520with%2520diverse%2520forgery%2520patterns%252C%2520FFD%2520models%2520often%2520overfit%2520specific%2520patterns%2520in%2520training%2520datasets%252C%2520resulting%2520in%2520poor%2520generalization%2520to%2520other%2520unseen%2520forgeries.%2520Existing%2520FFD%2520methods%2520primarily%2520leverage%2520pre-trained%2520backbones%2520with%2520general%2520image%2520representation%2520capabilities%2520and%2520fine-tune%2520them%2520to%2520identify%2520facial%2520forgery%2520cues.%2520However%252C%2520these%2520backbones%2520lack%2520domain-specific%2520facial%2520knowledge%2520and%2520insufficiently%2520capture%2520complex%2520facial%2520features%252C%2520thus%2520hindering%2520effective%2520implicit%2520forgery%2520cue%2520identification%2520and%2520limiting%2520generalization.%2520Therefore%252C%2520it%2520is%2520essential%2520to%2520revisit%2520FFD%2520workflow%2520across%2520the%2520%255Ctextit%257Bpre-training%257D%2520and%2520%255Ctextit%257Bfine-tuning%257D%2520stages%252C%2520achieving%2520an%2520elaborate%2520integration%2520from%2520facial%2520representation%2520to%2520forgery%2520detection%2520to%2520improve%2520generalization.%2520Specifically%252C%2520we%2520develop%2520an%2520FFD-specific%2520pre-trained%2520backbone%2520with%2520superior%2520facial%2520representation%2520capabilities%2520through%2520self-supervised%2520pre-training%2520on%2520real%2520faces.%2520We%2520then%2520propose%2520a%2520competitive%2520fine-tuning%2520framework%2520that%2520stimulates%2520the%2520backbone%2520to%2520identify%2520implicit%2520forgery%2520cues%2520through%2520a%2520competitive%2520learning%2520mechanism.%2520Moreover%252C%2520we%2520devise%2520a%2520threshold%2520optimization%2520mechanism%2520that%2520utilizes%2520prediction%2520confidence%2520to%2520improve%2520the%2520inference%2520reliability.%2520Comprehensive%2520experiments%2520demonstrate%2520that%2520our%2520method%2520achieves%2520excellent%2520performance%2520in%2520FFD%2520and%2520extra%2520face-related%2520tasks%252C%2520%255Cie%252C%2520presentation%2520attack%2520detection.%2520Code%2520and%2520models%2520are%2520available%2520at%2520%255Chref%257Bhttps%253A//github.com/zhenglab/FFDBackbone%257D%257Bhttps%253A//github.com/zhenglab/FFDBackbone%257D.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2409.16945v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Revisiting%20Face%20Forgery%20Detection%3A%20From%20Facial%20Representation%20to%20Forgery%20Detection&entry.906535625=Zonghui%20Guo%20and%20Yingjie%20Liu%20and%20Jie%20Zhang%20and%20Haiyong%20Zheng%20and%20Shiguang%20Shan&entry.1292438233=Face%20Forgery%20Detection%20%28FFD%29%2C%20or%20Deepfake%20detection%2C%20aims%20to%20determine%20whether%20a%20digital%20face%20is%20real%20or%20fake.%20Due%20to%20different%20face%20synthesis%20algorithms%20with%20diverse%20forgery%20patterns%2C%20FFD%20models%20often%20overfit%20specific%20patterns%20in%20training%20datasets%2C%20resulting%20in%20poor%20generalization%20to%20other%20unseen%20forgeries.%20Existing%20FFD%20methods%20primarily%20leverage%20pre-trained%20backbones%20with%20general%20image%20representation%20capabilities%20and%20fine-tune%20them%20to%20identify%20facial%20forgery%20cues.%20However%2C%20these%20backbones%20lack%20domain-specific%20facial%20knowledge%20and%20insufficiently%20capture%20complex%20facial%20features%2C%20thus%20hindering%20effective%20implicit%20forgery%20cue%20identification%20and%20limiting%20generalization.%20Therefore%2C%20it%20is%20essential%20to%20revisit%20FFD%20workflow%20across%20the%20%5Ctextit%7Bpre-training%7D%20and%20%5Ctextit%7Bfine-tuning%7D%20stages%2C%20achieving%20an%20elaborate%20integration%20from%20facial%20representation%20to%20forgery%20detection%20to%20improve%20generalization.%20Specifically%2C%20we%20develop%20an%20FFD-specific%20pre-trained%20backbone%20with%20superior%20facial%20representation%20capabilities%20through%20self-supervised%20pre-training%20on%20real%20faces.%20We%20then%20propose%20a%20competitive%20fine-tuning%20framework%20that%20stimulates%20the%20backbone%20to%20identify%20implicit%20forgery%20cues%20through%20a%20competitive%20learning%20mechanism.%20Moreover%2C%20we%20devis {"title": "RESQ: A Unified Framework for REliability- and Security Enhancement of Quantized Deep Neural Networks", "author": "Ali Soltan Mohammadi and Samira Nazari and Ali Azarpeyvand and Mahdi Taheri and Milos Krstic and Michael Huebner and Christian Herglotz and Tara Ghasempouri", "abstract": "This work proposes a unified three-stage framework that produces a quantized DNN with balanced fault and attack robustness. The first stage improves attack resilience via fine-tuning that desensitizes feature representations to small input perturbations. The second stage reinforces fault resilience through fault-aware fine-tuning under simulated bit-flip faults. Finally, a lightweight post-training adjustment integrates quantization to enhance efficiency and further mitigate fault sensitivity without degrading attack resilience. Experiments on ResNet18, VGG16, EfficientNet, and Swin-Tiny in CIFAR-10, CIFAR-100, and GTSRB show consistent gains of up to 10.35% in attack resilience and 12.47% in fault resilience, while maintaining competitive accuracy in quantized networks. The results also highlight an asymmetric interaction in which improvements in fault resilience generally increase resilience to adversarial attacks, whereas enhanced adversarial resilience does not necessarily lead to higher fault resilience.", "link": "http://arxiv.org/abs/2603.15413v1", "date": "2026-03-16", "relevancy": 2.4771, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.516}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4869}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4834}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RESQ%3A%20A%20Unified%20Framework%20for%20REliability-%2 bility-%2520and%2520Security%2520Enhancement%2520of%2520Quantized%2520Deep%2520Neural%2520Networks%26entry.906535625%3DAli%2520Soltan%2520Mohammadi%2520and%2520Samira%2520Nazari%2520and%2520Ali%2520Azarpeyvand%2520and%2520Mahdi%2520Taheri%2520and%2520Milos%2520Krstic%2520and%2520Michael%2520Huebner%2520and%2520Christian%2520Herglotz%2520and%2520Tara%2520Ghasempouri%26entry.1292438233%3DThis%2520work%2520proposes%2520a%2520unified%2520three-stage%2520framework%2520that%2520produces%2520a%2520quantized%2520DNN%2520with%2520balanced%2520fault%2520and%2520attack%2520robustness.%2520The%2520first%2520stage%2520improves%2520attack%2520resilience%2520via%2520fine-tuning%2520that%2520desensitizes%2520feature%2520representations%2520to%2520small%2520input%2520perturbations.%2520The%2520second%2520stage%2520reinforces%2520fault%2520resilience%2520through%2520fault-aware%2520fine-tuning%2520under%2520simulated%2520bit-flip%2520faults.%2520Finally%252C%2520a%2520lightweight%2520post-training%2520adjustment%2520integrates%2520quantization%2520to%2520enhance%2520efficiency%2520and%2520further%2520mitigate%2520fault%2520sensitivity%2520without%2520degrading%2520attack%2520resilience.%2520Experiments%2520on%2520ResNet18%252C%2520VGG16%252C%2520EfficientNet%252C%2520and%2520Swin-Tiny%2520in%2520CIFAR-10%252C%2520CIFAR-100%252C%2520and%2520GTSRB%2520show%2520consistent%2520gains%2520of%2520up%2520to%252010.35%2525%2520in%2520attack%2520resilience%2520and%252012.47%2525%2520in%2520fault%2520resilience%252C%2520while%2520maintaining%2520competitive%2520accuracy%2520in%2520quantized%2520networks.%2520The%2520results%2520also%2520highlight%2520an%2520asymmetric%2520interaction%2520in%2520which%2520improvements%2520in%2520fault%2520resilience%2520generally%2520increase%2520resilience%2520to%2520adversarial%2520attacks%252C%2520whereas%2520enhanced%2520adversarial%2520resilience%2520does%2520not%2520necessarily%2520lead%2520to%2520higher%2520fault%2520resilience.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.15413v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=RESQ%3A%20A%20Unified%20Framework%20for%20REliability-%20and%20Security%20Enhancement%20of%20Quantized%20Deep%20Neural%20Networks&entry.906535625=Ali%20Soltan%20Mohammadi%20and%20Samira%20Nazari%20and%20Ali%20Azarpeyvand%20and%20Mahdi%20Taheri%20and%20Milos%20Krstic%20and%20Michael%20Huebner%20and%20Christian%20Herglotz%20and%20Tara%20Ghasempouri&entry.1292438233=This%20work%20proposes%20a%20unified%20three-stage%20framework%20that%20produces%20a%20quantized%20DNN%20with%20balanced%20fault%20and%20attack%20robustness.%20The%20first%20stage%20improves%20attack%20resilience%20via%20fine-tuning%20that%20desensitizes%20feature%20representations%20to%20small%20input%20perturbations.%20The%20second%20stage%20reinforces%20fault%20resilience%20through%20fault-aware%20fine-tuning%20under%20simulated%20bit-flip%20faults.%20Finally%2C%20a%20lightweight%20post-training%20adjustment%20integrates%20quantization%20to%20enhance%20efficiency%20and%20further%20mitigate%20fault%20sensitivity%20without%20degrading%20attack%20resilience.%20Experiments%20on%20ResNet18%2C%20VGG16%2C%20EfficientNet%2C%20and%20Swin-Tiny%20in%20CIFAR-10%2C%20CIFAR-100%2C%20and%20GTSRB%20show%20consistent%20gains%20of%20up%20to%2010.35%25%20in%20attack%20resilience%20and%2012.47%25%20in%20fault%20resilience%2C%20while%20maintaining%20competitive%20accuracy%20in%20quantized%20networks.%20The%20results%20also%20highlight%20an%20asymmetric%20interaction%20in%20which%20improvements%20in%20fault%20resilience%20generally%20increase%20resilience%20to%20adversarial%20attacks%2C%20whereas%20enhanced%20adversarial%20resilience%20does%20not%20necessarily%20lead%20to%20higher%20fault%20resilience.&entry.1838667208=http%3A//arxiv.org/abs/2603.15413v1&entry.124074799=Read"},
{"title": "Omni-Captioner: Data Pipeline, Models, and Benchmark for Omni Detailed Perception", "author": "Ziyang Ma and Ruiyang Xu and Zhenghao Xing and Yunfei Chu and Yuxuan Wang and Jinzheng He and Jin Xu and Pheng-Ann Heng and Kai Yu and Junyang Lin and Eng Siong Chng and Xie Chen", "abstract": "Fine-grained perception of multimodal information is critical for advancing human-AI interaction. With recent progress in audio-visual technologies, Omni Language Models (OLMs), capable of processing audio and video signals in parallel, have emerged as a promising paradigm for achieving richer understanding and reasoning. However, their capacity to capture and describe fine-grained details remains limited explored. In this work, we present a systematic and comprehensive investigation of omni detailed perception from the perspectives of the data pipeline, models, and benchmark. We first identify an inherent \"co-growth\" between detail and hallucination in current OLMs. To address this, we propose Omni-Detective, an agentic data generation pipeline integrating tool-calling, to autonomously produce highly detailed yet minimally hallucinatory multimodal data. Based on the data generated with Omni-Detective, we train two captioning models: Audio-Captioner for audio-only detailed perception, and Omni-Captioner for audio-visual detailed perception. Under the cascade evaluation protocol, Audio-Captioner achieves the best performance on MMAU and MMAR among all open-source models, surpassing Gemini 2.5 Flash and delivering performance comparable to Gemini 2.5 Pro. On existing detailed captioning benchmarks, Omni-Captioner sets a new state-of-the-art on VDC and achieves the best trade-off between detail and hallucination on the video-SALMONN 2 testset. Given the absence of a dedicated benchmark for omni detailed perception, we design Omni-Cloze, a novel cloze-style evaluation for detailed audio, visual, and audio-visual captioning that ensures stable, efficient, and reliable assessment. Experimental results and analysis demonstrate the effectiveness of Omni-Detective in generating high-quality detailed captions, as well as the superiority of Omni-Cloze in evaluating such detailed captions.", "link": "http://arxiv.org/abs/2510.12720v2", "date": "2026-03-16", "relevancy": 2.4609, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6287}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6287}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5476}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Omni-Captioner%3A%20Data%20Pipeline%2C%20Models%2C%20and%20Benchmark%20for%20Omni%20Detailed%20Perception&body=Title%3A%20Omni-Captioner%3A%20Data%20Pipeline%2C%20Models%2C%20and%20Benchmark%20for%20Omni%20Detailed%20Perception%0AAuthor%3A%20Ziyang%20Ma%20and%20Ruiyang%20Xu%20and%20Zhenghao%20Xing%20and%20Yunfei%20Chu%20and%20Yuxuan%20Wang%20and%20Jinzheng%20He%20and%20Jin%20Xu%20and%20Pheng-Ann%20Heng%20and%20Kai%20Yu%20and%20Junyang%20Lin%20and%20Eng%20Siong%20Chng%20and%20Xie%20Chen%0AAbstract%3A%20Fine-grained%20perception%20of%20multimodal%20information%20is%20critical%20for%20advancing%20human-AI%20interaction.%20With%20recent%20progress%20in%20audio-visual%20technologies%2C%20Omni%20Language%20Models%20%28OLMs%29%2C%20capable%20of%20processing%20audio%20and%20video%20signals%20in%20parallel%2C%20have%20emerged%20as%20a%20promising%20paradigm%20for%20achieving%20richer%20understanding%20and%20reasoning.%20However%2C%20their%20capacity%20to%20capture%20and%20describe%20fine-grained%20details%20remains%20limited%20explored.%20In%20this%20work%2C%20we%20present%20a%20systematic%20and%20comprehensive%20investigation%20of%20omni%20detailed%20perception%20from%20the%20perspectives%20of%20the%20data%20pipeline%2C%20models%2C%20and%20benchmark.%20We%20first%20identify%20an%20inherent%20%22co-growth%22%20between%20detail%20and%20hallucination%20in%20current%20OLMs.%20To%20address%20this%2C%20we%20propose%20Omni-Detective%2C%20an%20agentic%20data%20generation%20pipeline%20integrating%20tool-calling%2C%20to%20autonomously%20produce%20highly%20detailed%20yet%20minimally%20hallucinatory%20multimodal%20data.%20Based%20on%20the%20data%20generated%20with%20Omni-Detective%2C%20we%20train%20two%20captioning%20models%3A%20Audio-Captioner%20for%20audio-only%20detailed%20perception%2C%20and%20Omni-Captioner%20for%20audio-visual%20detailed%20perception.%20Under%20the%20cascade%20evaluation%20protocol%2C%20Audio-Captioner%20achieves%20the%20best%20performance%20on%20MMAU%20and%20MMAR%20among%20all%20open-source%20models%2C%20surpassing%20Gemini%202.5%20Flash%20and%20delivering%20performance%20comparable%20to%20Gemini%202.5%20Pro.%20On%20existing%20detailed%20captioning%20benchmarks%2C%20Omni-Captioner%20sets%20a%20new%20state-of-the-art%20on%20VDC%20and%20achieves%20the%20best%20trade-off%20between%20detail%20and%20hallucination%20on%20the%20video-SALMONN%202%20testset.%20Given%20the%20absence%20of%20a%20dedicated%20benchmark%20for%20omni%20detailed%20perception%2C%20we%20design%20Omni-Cloze%2C%20a%20novel%20cloze-style%20evaluation%20for%20detailed%20audio%2C%20visual%2C%20and%20audio-visual%20captioning%20that%20ensures%20stable%2C%20efficient%2C%20and%20reliable%20assessment.%20Experimental%20results%20and%20analysis%20demonstrate%20the%20effectiveness%20of%20Omni-Detective%20in%20generating%20high-quality%20detailed%20captions%2C%20as%20well%20as%20the%20superiority%20of%20Omni-Cloze%20in%20evaluating%20such%20detailed%20captions.%0ALink%3A%20http%3A//arxiv.org/abs/2510.12720v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/

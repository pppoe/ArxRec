{"title": "Spectral Rectification for Parameter-Efficient Adaptation of Foundation Models in Colonoscopy Depth Estimation", "author": "Xiaoxian Zhang and Minghai Shi and Lei Li", "abstract": "Accurate monocular depth estimation is critical in colonoscopy for lesion localization and navigation. Foundation models trained on natural images fail to generalize directly to colonoscopy. We identify the core issue not as a semantic gap, but as a statistical shift in the frequency domain: colonoscopy images lack the strong high-frequency edge and texture gradients that these models rely on for geometric reasoning. To address this, we propose SpecDepth, a parameter-efficient adaptation framework that preserves the robust geometric representations of the pre-trained models while adapting to the colonoscopy domain. Its key innovation is an adaptive spectral rectification module, which uses a learnable wavelet decomposition to explicitly model and amplify the attenuated high-frequency components in feature maps. Different from conventional fine-tuning that risks distorting high-level semantic features, this targeted, low-level adjustment realigns the input signal with the original inductive bias of the foundational model. On the public C3VD and SimCol3D datasets, SpecDepth achieved state-of-the-art performance with an absolute relative error of 0.022 and 0.027, respectively. Our work demonstrates that directly addressing spectral mismatches is a highly effective strategy for adapting vision foundation models to specialized medical imaging tasks. The code will be released publicly after the manuscript is accepted for publication.", "link": "http://arxiv.org/abs/2603.15374v1", "date": "2026-03-16", "relevancy": 2.7255, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5522}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5522}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.531}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Spectral%20Rectification%20for%20Parameter-Efficient%20Adaptation%20of%20Foundation%20Models%20in%20Colonoscopy%20Depth%20Estimation&body=Title%3A%20Spectral%20Rectification%20for%20Parameter-Efficient%20Adaptation%20of%20Foundation%20Models%20in%20Colonoscopy%20Depth%20Estimation%0AAuthor%3A%20Xiaoxian%20Zhang%20and%20Minghai%20Shi%20and%20Lei%20Li%0AAbstract%3A%20Accurate%20monocular%20depth%20estimation%20is%20critical%20in%20colonoscopy%20for%20lesion%20localization%20and%20navigation.%20Foundation%20models%20trained%20on%20natural%20images%20fail%20to%20generalize%20directly%20to%20colonoscopy.%20We%20identify%20the%20core%20issue%20not%20as%20a%20semantic%20gap%2C%20but%20as%20a%20statistical%20shift%20in%20the%20frequency%20domain%3A%20colonoscopy%20images%20lack%20the%20strong%20high-frequency%20edge%20and%20texture%20gradients%20that%20these%20models%20rely%20on%20for%20geometric%20reasoning.%20To%20address%20this%2C%20we%20propose%20SpecDepth%2C%20a%20parameter-efficient%20adaptation%20framework%20that%20preserves%20the%20robust%20geometric%20representations%20of%20the%20pre-trained%20models%20while%20adapting%20to%20the%20colonoscopy%20domain.%20Its%20key%20innovation%20is%20an%20adaptive%20spectral%20rectification%20module%2C%20which%20uses%20a%20learnable%20wavelet%20decomposition%20to%20explicitly%20model%20and%20amplify%20the%20attenuated%20high-frequency%20components%20in%20feature%20maps.%20Different%20from%20conventional%20fine-tuning%20that%20risks%20distorting%20high-level%20semantic%20features%2C%20this%20targeted%2C%20low-level%20adjustment%20realigns%20the%20input%20signal%20with%20the%20original%20inductive%20bias%20of%20the%20foundational%20model.%20On%20the%20public%20C3VD%20and%20SimCol3D%20datasets%2C%20SpecDepth%20achieved%20state-of-the-art%20performance%20with%20an%20absolute%20relative%20error%20of%200.022%20and%200.027%2C%20respectively.%20Our%20work%20demonstrates%20that%20directly%20addressing%20spectral%20mismatches%20is%20a%20highly%20effective%20strategy%20for%20adapting%20vision%20foundation%20models%20to%20specialized%20medical%20imaging%20tasks.%20The%20code%20will%20be%20released%20publicly%20after%20the%20manuscript%20is%20accepted%20for%20publication.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15374v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSpectral%2520Rectification%2520for%2520Parameter-Efficient%2520Adaptation%2520of%2520Foundation%2520Models%2520in%2520Colonoscopy%2520Depth%2520Estimation%26entry.906535625%3DXiaoxian%2520Zhang%2520and%2520Minghai%2520Shi%2520and%2520Lei%2520Li%26entry.1292438233%3DAccurate%2520monocular%2520depth%2520estimation%2520is%2520critical%2520in%2520colonoscopy%2520for%2520lesion%2520localization%2520and%2520navigation.%2520Foundation%2520models%2520trained%2520on%2520natural%2520images%2520fail%2520to%2520generalize%2520directly%2520to%2520colonoscopy.%2520We%2520identify%2520the%2520core%2520issue%2520not%2520as%2520a%2520semantic%2520gap%252C%2520but%2520as%2520a%2520statistical%2520shift%2520in%2520the%2520frequency%2520domain%253A%2520colonoscopy%2520images%2520lack%2520the%2520strong%2520high-frequency%2520edge%2520and%2520texture%2520gradients%2520that%2520these%2520models%2520rely%2520on%2520for%2520geometric%2520reasoning.%2520To%2520address%2520this%252C%2520we%2520propose%2520SpecDepth%252C%2520a%2520parameter-efficient%2520adaptation%2520framework%2520that%2520preserves%2520the%2520robust%2520geometric%2520representations%2520of%2520the%2520pre-trained%2520models%2520while%2520adapting%2520to%2520the%2520colonoscopy%2520domain.%2520Its% {"title": "The COTe score: A decomposable framework for evaluating Document Layout Analysis models", "author": "Jonathan Bourne and Mwiza Simbeye and Ishtar Govia", "abstract": "Document Layout analysis (DLA), is the process by which a page is parsed into meaningful elements, often using machine learning models. Typically, the quality of a model is judged using general object detection metrics such as IoU, F1 or mAP. However, these metrics are designed for images that are 2D projections of 3D space, not for the natively 2D imagery of printed media. This discrepancy can result in misleading or uninformative interpretation of model performance by the metrics. To encourage more robust, comparable, and nuanced DLA, we introduce: The Structural Semantic Unit (SSU) a relational labelling approach that shifts the focus from the physical to the semantic structure of the content; and the Coverage, Overlap, Trespass, and Excess (COTe) score, a decomposable metric for measuring page parsing quality. We demonstrate the value of these methods through case studies and by evaluating 5 common DLA models on 3 DLA datasets. We show that the COTe score is more informative than traditional metrics and reveals distinct failure modes across models, such as breaching semantic boundaries or repeatedly parsing the same region. In addition, the COTe score reduces the interpretation-performance gap by up to 76% relative to the F1. Notably, we find that the COTe's granularity robustness largely holds even without explicit SSU labelling, lowering the barriers to entry for using the system. Finally, we release an SSU labelled dataset and a Python library for applying COTe in DLA projects.", "link": "http://arxiv.org/abs/2603.12718v2", "date": "2026-03-16", "relevancy": 2.6848, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5737}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5186}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5186}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20COTe%20score%3A%20A%20decomposable%20framework%20for%20evaluating%20Document%20Layout%20Analysis%20models&body=Title%3A%20The%20COTe%20score%3A%20A%20decomposable%20framework%20for%20evaluating%20Document%20Layout%20Analysis%20models%0AAuthor%3A%20Jonathan%20Bourne%20and%20Mwiza%20Simbeye%20and%20Ishtar%20Govia%0AAbstract%3A%20Document%20Layout%20analysis%20%28DLA%29%2C%20is%20the%20process%20by%20which%20a%20page%20is%20parsed%20into%20meaningful%20elements%2C%20often%20using%20machine%20learning%20models.%20Typically%2C%20the%20quality%20of%20a%20model%20is%20judged%20using%20general%20object%20detection%20metrics%20such%20as%20IoU%2C%20F1%20or%20mAP.%20However%2C%20these%20metrics%20are%20designed%20for%20images%20that%20are%202D%20projections%20of%203D%20space%2C%20not%20for%20the%20natively%202D%20imagery%20of%20printed%20media.%20This%20discrepancy%20can%20result%20in%20misleading%20or%20uninformative%20interpretation%20of%20model%20performance%20by%20the%20metrics.%20To%20encourage%20more%20robust%2C%20comparable%2C%20and%20nuanced%20DLA%2C%20we%20introduce%3A%20The%20Structural%20Semantic%20Unit%20%28SSU%29%20a%20relational%20labelling%20approach%20that%20shifts%20the%20focus%20from%20the%20physical%20to%20the%20semantic%20structure%20of%20the%20content%3B%20and%20the%20Coverage%2C%20Overlap%2C%20Trespass%2C%20and%20Excess%20%28COTe%29%20score%2C%20a%20decomposable%20metric%20for%20measuring%20page%20parsing%20quality.%20We%20demonstrate%20the%20value%20of%20these%20methods%20through%20case%20studies%20and%20by%20evaluating%205%20common%20DLA%20models%20on%203%20DLA%20datasets.%20We%20show%20that%20the%20COTe%20score%20is%20more%20informative%20than%20traditional%20metrics%20and%20reveals%20distinct%20failure%20modes%20across%20models%2C%20such%20as%20breaching%20semantic%20boundaries%20or%20repeatedly%20parsing%20the%20same%20region.%20In%20addition%2C%20the%20COTe%20score%20reduces%20the%20interpretation-performance%20gap%20by%20up%20to%2076%25%20relative%20to%20the%20F1.%20Notably%2C%20we%20find%20that%20the%20COTe%27s%20granularity%20robustness%20largely%20holds%20even%20without%20explicit%20SSU%20labelling%2C%20lowering%20the%20barriers%20to%20entry%20for%20using%20the%20system.%20Finally%2C%20we%20release%20an%20SSU%20labelled%20dataset%20and%20a%20Python%20library%20for%20applying%20COTe%20in%20DLA%20projects.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12718v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520COTe%2520score%253A%2520A%2520decomposable%2520framework%2520for%2520evaluating%2520Document%2520Layout%2520Analysis%2520models%26entry.906535625%3DJonathan%2520Bourne%2520and%2520Mwiza%2520Simbeye%2520and%2520Ishtar%2520Govia%26entry.1292438233%3DDocument%2520Layout%2520analysis%2520%2528DLA%2529%252C%2520is%2520the%2520process%2520by%2520which%2520a%2520page%2520is%2520parsed%2520into%2520meaningful%2520elements%252C%2520often%2520using%2520machine%2520learning%2520models.%2520Typically%252C%2520the%2520quality%2520of%2520a%2520model%2520is%2520judged%2520using%2520general%2520object%2520detection%2520metrics%2520such%2520as%2520IoU%252C%2520F1%2520or%2520mAP.%2520However%252C%2520these%2520metrics%2520are%2520designed%2520for%2520images%2520that%2520are%25202D%2520projections%2520of%25203D%2520space%252C%2520not%2520for%2520the%2520natively%25202D%2520imagery%2520of%2520printed%2520media.%2520This%2520discrepancy%2520can%2520result%2520in%2520misleading%2520or%2520uninformative%2520interpretation%2520of%2520model%2520performance%2520by%2520the%2520metrics.%2520To%2520encourage%2520more%2520robust%252C%2520comparable%252C%2520and%2520nuanced%2520DLA%252C%2520we%2520introduce%253A%2520The%2520Structural%2520Semantic%2520Unit%2520%2528SSU%2529%2520a%2520relational%2520labelling%2520approach%2520that%2520shifts%2520the%2520focus%2520from%2520the%2520physical%2520to%2520the%2520semantic%2520structure%2520of%2520the%2520content%253B%2520and%2520the%2520Coverage%252C%2520Overlap%252C%2520Trespass%252C%2520and%2520Excess%2520%2528COTe%2529%2520score%252C%2520a%2520decomposable%2520metric%2520for%2520measuring%2520page%2520parsing%2520quality.%2520We%2520demonstrate%2520the%2520value%2520of%2520these%2520methods%2520through%2520case%2520studies%2520and%2520by%2520evaluating%25205%2520common%2520DLA%2520models%2520on%25203%2520DLA%2520datasets.%2520We%2520show%2520that%2520the%2520COTe%2520score%2520is%2520more%2520informative%2520than%2520traditional%2520metrics%2520and%2520reveals%2520distinct%2520failure%2520modes%2520across%2520models%252C%2520such%2520as%2520breaching%2520semantic%2520boundaries%2520or%2520repeatedly%2520parsing%2520the%2520same%2520region.%2520In%2520addition%252C%2520the%2520COTe%2520score%2520reduces%2520the%2520interpretation-performance%2520gap%2520by%2520up%2520to%252076%2525%2520relative%2520to%2520the%2520F1.%2520Notably%252C%2520we%2520find%2520that%2520the%2520COTe%2527s%2520granularity%2520robustness%2520largely%2520holds%2520even%2520without%2520explicit%2520SSU%2520labelling%252C%2520lowering%2520the%2520barriers%2520to%2520entry%2520for%2520using%2520the%2520system.%2520Finally%252C%2520we%2520release%2520an%2520SSU%2520labelled%2520dataset%2520and%2520a%2520Python%2520library%2520for%2520applying%2520COTe%2520in%2520DLA%2520projects.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.12718v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=The%20COTe%20score%3A%20A%20decomposable%20framework%20for%20evaluating%20Documen {"title": "ViFeEdit: A Video-Free Tuner of Your Video Diffusion Transformer", "author": "Ruonan Yu and Zhenxiong Tan and Zigeng Chen and Songhua Liu and Xinchao Wang", "abstract": "Diffusion Transformers (DiTs) have demonstrated remarkable scalability and quality in image and video generation, prompting growing interest in extending them to controllable generation and editing tasks. However, compared to the image counterparts, progress in video control and editing remains limited, mainly due to the scarcity of paired video data and the high computational cost of training video diffusion models. To address this issue, in this paper, we propose a video-free tuning framework termed ViFeEdit for video diffusion transformers. Without requiring any forms of video training data, ViFeEdit achieves versatile video generation and editing, adapted solely with 2D images. At the core of our approach is an architectural reparameterization that decouples spatial independence from the full 3D attention in modern video diffusion transformers, which enables visually faithful editing while maintaining temporal consistency with only minimal additional parameters. Moreover, this design operates in a dual-path pipeline with separate timestep embeddings for noise scheduling, exhibiting strong adaptability to diverse conditioning signals. Extensive experiments demonstrate that our method delivers promising results of controllable video generation and editing with only minimal training on 2D image data. Codes are available https://github.com/Lexie-YU/ViFeEdit.", "link": "http://arxiv.org/abs/2603.15478v1", "date": "2026-03-16", "relevancy": 2.64, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6766}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6511}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6408}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ViFeEdit%3A%20A%20Video-Free%20Tuner%20of%20Your%20Video%20Diffusion%20Transformer&body=Title%3A%20ViFeEdit%3A%20A%20Video-Free%20Tuner%20of%20Your%20Video%20Diffusion%20Transformer%0AAuthor%3A%20Ruonan%20Yu%20and%20Zhenxiong%20Tan%20and%20Zigeng%20Chen%20and%20Songhua%20Liu%20and%20Xinchao%20Wang%0AAbstract%3A%20Diffusion%20Transformers%20%28DiTs%29%20have%20demonstrated%20remarkable%20scalability%20and%20quality%20in%20image%20and%20video%20generation%2C%20prompting%20growing%20interest%20in%20extending%20them%20to%20controllable%20generation%20and%20editing%20tasks.%20However%2C%20compared%20to%20the%20image%20counterparts%2C%20progress%20in%20video%20control%20and%20editing%20remains%20limited%2C%20mainly%20due%20to%20the%20scarcity%20of%20paired%20video%20data%20and%20the%20high%20computational%20cost%20of%20training%20video%20diffusion%20models.%20To%20address%20this%20issue%2C%20in%20this%20paper%2C%20we%20propose%20a%20video-free%20tuning%20framework%20termed%20ViFeEdit%20for%20video%20diffusion%20transformers.%20Without%20requiring%20any%20forms%20of%20video%20training%20data%2C%20ViFeEdit%20achieves%20versatile%20video%20generation%20and%20editing%2C%20adapted%20solely%20with%202D%20images.%20At%20the%20core%20of%20our%20approach%20is%20an%20architectural%20reparameterization%20that%20decouples%20spatial%20independence%20from%20the%20full%203D%20attention%20in%20modern%20video%20diffusion%20transformers%2C%20which%20enables%20visually%20faithful%20editing%20while%20maintaining%20temporal%20consistency%20with%20only%20minimal%20additional%20parameters.%20Moreover%2C%20this%20design%20operates%20in%20a%20dual-path%20pipeline%20with%20separate%20timestep%20embeddings%20for%20noise%20scheduling%2C%20exhibiting%20strong%20adaptability%20to%20diverse%20conditioning%20signals.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20delivers%20promising%20results%20of%20controllable%20video%20generation%20and%20editing%20with%20only%20minimal%20training%20on%202D%20image%20data.%20Codes%20are%20available%20https%3A//github.com/Lexie-YU/ViFeEdit.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15478v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DViFeEdit%253A%2520A%2520Video-Free%2520Tuner%2520of%2520Your%2520Video%2520Diffusion%2520Transformer%26entry.906535625%3DRuonan%2520Yu%2520and%2520Zhenxiong%2520Tan%2520and%2520Zigeng%2520Chen%2520and%2520Songhua%2520Liu%2520and%2520Xinchao%2520Wang%26entry.1292438233%3DDiffusion%2520Transformers%2520%2528DiTs%2529%2520have%2520demonstrated%2520remarkable%2520scalability%2520and%2520quality%2520in%2520image%2520and%2520video%2520generation%252C%2520prompting%2520growing%2520interest%2520in%2520extending%2520them%2520to%2520controllable%2520generation%2520and%2520editing%2520tasks.%2520However%252C%2520compared%2520to%2520the%2520image%2520counterparts%252C%2520progress%2520in%2520video%2520control%2520and%2520editing%2520remains%2520limited%252C%2520mainly%2520due%2520to%2520the%2520scarcity%2520of%2520paired%2520video%2520data%2520and%2520the%2520high%2520computational%2520cost%2520of%2520training%2520video%2520diffusion%2520models.%2520To%2520address%2520this%2520issue%252C%2520in%2520this%2520paper%252C%2520we%2520propose%2520a%2520video-free%2520tuning%2520framework%2520termed%2520ViFeEdit%2520for%2520video%2520diffusion%2520transformers.%2520Without%2520requiring%2520any%2520forms%2520of%2520video%2520training%2520data%252C%2520ViFeEdit%2520achieves%2520versatile%2520video%2520generation%2520and%2520editing%252C%2520adapted%2520solely%2520with%25202D%2520images.%2520At%2520the%2520core%2520of%2520our%2520approach%2520is%2520an%2520architectural%2520reparameterization%2520that%2520decouples%2520spatial%25 {"title": "GATE-AD: Graph Attention Network Encoding For Few-Shot Industrial Visual Anomaly Detection", "author": "Aggelos Psiris and Yannis Panagakis and Maria Vakalopoulou and Georgios Th. Papadopoulos", "abstract": "Few-Shot Industrial Visual Anomaly Detection (FS-IVAD) comprises a critical task in modern manufacturing settings, where automated product inspection systems need to identify rare defects using only a handful of normal/defect-free training samples. In this context, the current study introduces a novel reconstruction-based approach termed GATE-AD. In particular, the proposed framework relies on the employment of a masked, representation-aligned Graph Attention Network (GAT) encoding scheme to learn robust appearance patterns of normal samples. By leveraging dense, patch-level, visual feature tokens as graph nodes, the model employs stacked self-attentional layers to adaptively encode complex, irregular, non-Euclidean, local relations. The graph is enhanced with a representation alignment component grounded on a learnable, latent space, where high reconstruction residual areas (i.e., defects) are assessed using a Scaled Cosine Error (SCE) objective function. Extensive comparative evaluation on the MVTec AD, VisA, and MPDD industrial defect detection benchmarks demonstrates that GATE-AD achieves state-of-the-art performance across the $1$- to $8$-shot settings, combining the highest detection accuracy (increase up to $1.8\\%$ in image AUROC in the 8-shot case in MPDD) with the lowest per-image inference latency (at least $25.05\\%$ faster), compared to the best-performing literature methods. In order to facilitate reproducibility and further research, the source code of GATE-AD is available at https://github.com/gthpapadopoulos/GATE-AD.", "link": "http://arxiv.org/abs/2603.15300v1", "date": "2026-03-16", "relevancy": 2.6353, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5324}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5264}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5223}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GATE-AD%3A%20Graph%20Attention%20Network%20Encoding%20For%20Few-Shot%20Industrial%20Visual%20Anomaly%20Detection&body=Title%3A%20GATE-AD%3A%20Graph%20Attention%20Network%20Encoding%20For%20Few-Shot%20Industrial%20Visual%20Anomaly%20Detection%0AAuthor%3A%20Aggelos%20Psiris%20and%20Yannis%20Panagakis%20and%20Maria%20Vakalopoulou%20and%20Georgios%20Th.%20Papadopoulos%0AAbstract%3A%20Few-Shot%20Industrial%20Visual%20Anomaly%20Detection%20%28FS-IVAD%29%20comprises%20a%20critical%20task%20in%20modern%20manufacturing%20settings%2C%20where%20automated%20product%20inspection%20systems%20need%20to%20identify%20rare%20defects%20using%20only%20a%20handful%20of%20normal/defect-free%20training%20samples.%20In%20this%20context%2C%20the%20current%20study%20introduces%20a%20novel%20reconstruction-based%20approach%20termed%20GATE-AD.%20In%20particular%2C%20the%20proposed%20framework%20relies%20on%20the%20employment%20of%20a%20masked%2C%20representation-aligned%20Graph%20Attention%20Network%20%28GAT%29%20encoding%20scheme%20to%20learn%20robust%20appearance%20patterns%20of%20normal%20samples.%20By%20leveraging%20dense%2C%20patch-level%2C%20visual%20feature%20tokens%20as%20graph%20nodes%2C%20the%20model%20employs%20stacked%20self-attentional%20layers%20to%20adaptively%20encode%20complex%2C%20irregular%2C%20non-Euclidean%2C%20local%20relations.%20The%20graph%20is%20enhanced%20with%20a%20representation%20alignment%20component%20grounded%20on%20a%20learnable%2C%20latent%20space%2C%20where%20high%20reconstruction%20residual%20areas%20%28i.e.%2C%20defects%29%20are%20assessed%20using%20a%20Scaled%20Cosine%20Error%20%28SCE%29%20objective%20function.%20Extensive%20comparative%20evaluation%20on%20the%20MVTec%20AD%2C%20VisA%2C%20and%20MPDD%20industrial%20defect%20detection%20benchmarks%20demonstrates%20that%20GATE-AD%20achieves%20state-of-the-art%20performance%20across%20the%20%241%24-%20to%20%248%24-shot%20settings%2C%20combining%20the%20highest%20detection%20accuracy%20%28increase%20up%20to%20%241.8%5C%25%24%20in%20image%20AUROC%20in%20the%208-shot%20case%20in%20MPDD%29%20with%20the%20lowest%20per-image%20inference%20latency%20%28at%20least%20%2425.05%5C%25%24%20faster%29%2C%20compared%20to%20the%20best-performing%20literature%20methods.%20In%20order%20to%20facilitate%20reproducibility%20and%20further%20research%2C%20the%20source%20code%20of%20GATE-AD%20is%20available%20at%20https%3A//github.com/gthpapadopoulos/GATE-AD.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15300v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGATE-AD%253A%2520Graph%2520Attention%2520Network%2520Encoding%2520For%2520Few-Shot%2520Industrial%2520Visual%2520Anomaly%2520Detection%26entry.906535625%3DAggelos%2520Psiris%2520and%2520Yannis%2520Panagakis%2520and%2520Maria%2520Vakalopoulou%2520and%2520Georgios%2520Th.%2520Papadopoulos%26entry.1292438233%3DFew-Shot%2520Industrial%2520Visual%2520Anomaly%2520Detection%2520%2528FS-IVAD%2529%2520comprises%2520a%2520critical%2520task%2520in%2520modern%2520manufacturing%2520settings%252C%2520where%2520automated%2520product%2520inspection%2520systems%2520need%2520to%2520identify%2520rare%2520defects%2520using%2520only%2520a%2520handful%2520of%2520normal/defect-free%2520training%2520samples.%2520In%2520this%2520context%252C%2520the%2520current%2520study%2520introduces%2520a%2520novel%2520reconstruction-based%2520approach%2520termed%2520GATE-AD.%2520In%2520particular%252C%2520the%2520proposed%2520framework%2520relies%2520on%2520the%2520employment%2520of%2520a%2520masked%252C%2520representation-aligned%2520Graph%2520Attention%2520Network%2520%2528GAT%2529%2520encoding%2520scheme%2520to%2520learn%2520robust%2520appearance%2520patterns%2520of%2520normal%2520samples.%2520By%2520leveraging%2520dense%252C%2520patch-level%252C%2520visual%2520feature%2520tokens%2520as%2520graph%2520nodes%252C%2520the%2520model%2520employs%2520stacked%2520self-attentional%2520layers%2520to%2520adaptively%2520encode%2520complex%252C%2520irregular%252C%2520non-Euclidean%252C%2520local%2520relations.%2520The%2520graph%2520is%2520enhanced%2520with%2520a%2520representation%2520alignment%2520component%2520grounded%2520on%2520a%2520learnable%252C%2520latent%2520space%252C%2520where%2520high%2520reconstruction%2520residual%2520areas%2520%2528i.e.%252C%2520defects%2529%2520are%2520assessed%2520using%2520a%2520Scaled%2520Cosine%2520Error%2520%2528SCE%2529%2520objective%2520function.%2520Extensive%2520comparative%2520evaluation%2520on%2520the%2520MVTec%2520AD%252C%2520VisA%252C%2520and%2520MPDD%2520industrial%2520defect%2520detection%2520benchmarks%2520demonstrates%2520that%2520GATE-AD%2520achieves%2520state-of-the-art%2520performance%2520across%2520the%2520%25241%2524-%2520to%2520%25248%2524-shot%2520settings%252C%2520combining%2520the%2520highest%2520detection%2520accuracy%2520%2528increase%2520up%2520to%2520%25241.8%255C%2525%2524%2520in%2520image%2520AUROC%2520in%2520the%25208-shot%2520case%2520in%2520MPDD%2529%2520with%2520the%2520lowest%2520per-image%2520inference%2520latency%2520%2528at%2520least%2520%252425.05%255C%2525%2524%2520faster%2529%252C%2520compared%2520to%2520the%2520best-performing%2520literature%2520methods.%2520In%2520order%2520to%2520facilitate%2520reproducibility%2520and%2520further%2520research%252C%2520the%2520source%2520code%2520of%2520GATE-AD%2520is%2520available%2520at%2520https%253A//github.com/gthpapadopoulos/GATE-AD.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.15300v1%26entry.124074799%3DRead", "form": "ht {"title": "Skyfall-GS: Synthesizing Immersive 3D Urban Scenes from Satellite Imagery", "author": "Jie-Ying Lee and Yi-Ruei Liu and Shr-Ruei Tsai and Wei-Cheng Chang and Chung-Ho Wu and Jiewen Chan and Zhenjun Zhao and Chieh Hubert Lin and Yu-Lun Liu", "abstract": "Synthesizing large-scale, explorable, and geometrically accurate 3D urban scenes is a challenging yet valuable task for immersive and embodied applications. The challenge lies in the lack of large-scale and high-quality real-world 3D scans for training generalizable generative models. In this paper, we take an alternative route to create large-scale 3D scenes by leveraging readily available satellite imagery for realistic coarse geometry and open-domain diffusion models for high-quality close-up appearance synthesis. We propose Skyfall-GS, a novel hybrid framework that synthesizes immersive city-block scale 3D urban scenes by combining satellite reconstruction with diffusion refinement, eliminating the need for costly 3D annotations, and also featuring real-time, immersive 3D exploration. We tailor a curriculum-driven iterative refinement strategy to progressively enhance geometric completeness and photorealistic texture. Extensive experiments demonstrate that Skyfall-GS provides improved cross-view consistent geometry and more realistic textures compared to state-of-the-art approaches. Project page: https://skyfall-gs.jayinnn.dev/", "link": "http://arxiv.org/abs/2510.15869v2", "date": "2026-03-16", "relevancy": 2.626, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6569}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6569}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6544}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Skyfall-GS%3A%20Synthesizing%20Immersive%203D%20Urban%20Scenes%20from%20Satellite%20Imagery&body=Title%3A%20Skyfall-GS%3A%20Synthesizing%20Immersive%203D%20Urban%20Scenes%20from%20Satellite%20Imagery%0AAuthor%3A%20Jie-Ying%20Lee%20and%20Yi-Ruei%20Liu%20and%20Shr-Ruei%20Tsai%20and%20Wei-Cheng%20Chang%20and%20Chung-Ho%20Wu%20and%20Jiewen%20Chan%20and%20Zhenjun%20Zhao%20and%20Chieh%20Hubert%20Lin%20and%20Yu-Lun%20Liu%0AAbstract%3A%20Synthesizing%20large-scale%2C%20explorable%2C%20and%20geometrically%20accurate%203D%20urban%20scenes%20is%20a%20challenging%20yet%20valuable%20task%20for%20immersive%20and%20embodied%20applications.%20The%20challenge%20lies%20in%20the%20lack%20of%20large-scale%20and%20high-quality%20real-world%203D%20scans%20for%20training%20generalizable%20generative%20models.%20In%20this%20paper%2C%20we%20take%20an%20alternative%20route%20to%20create%20large-scale%203D%20scenes%20by%20leveraging%20readily%20available%20satellite%20imagery%20for%20realistic%20coarse%20geometry%20and%20open-domain%20diffusion%20models%20for%20high-quality%20close-up%20appearance%20synthesis.%20We%20propose%20Skyfall-GS%2C%20a%20novel%20hybrid%20framework%20that%20synthesizes%20immersive%20city-block%20scale%203D%20urban%20scenes%20by%20combining%20satellite%20reconstruction%20with%20diffusion%20refinement%2C%20eliminating%20the%20need%20for%20costly%203D%20annotations%2C%20and%20also%20featuring%20real-time%2C%20immersive%203D%20exploration.%20We%20tailor%20a%20curriculum-driven%20iterative%20refinement%20strategy%20to%20progressively%20enhance%20geometric%20completeness%20and%20photorealistic%20texture.%20Extensive%20experiments%20demonstrate%20that%20Skyfall-GS%20provides%20improved%20cross-view%20consistent%20geometry%20and%20more%20realistic%20textures%20compared%20to%20state-of-the-art%20approaches.%20Project%20page%3A%20https%3A//skyfall-gs.jayinnn.dev/%0ALink%3A%20http%3A//arxiv.org/abs/2510.15869v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSf 0provides%2520improved%2520cross-view%2520consistent%2520geometry%2520and%2520more%2520realistic%2520textures%2520compared%2520to%2520state-of-the-art%2520approaches.%2520Project%2520page%253A%2520https%253A//skyfall-gs.jayinnn.dev/%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.15869v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Skyfall-GS%3A%20Synthesizing%20Immersive%203D%20Urban%20Scenes%20from%20Satellite%20Imagery&entry.906535625=Jie-Ying%20Lee%20and%20Yi-Ruei%20Liu%20and%20Shr-Ruei%20Tsai%20and%20Wei-Cheng%20Chang%20and%20Chung-Ho%20Wu%20and%20Jiewen%20Chan%20and%20Zhenjun%20Zhao%20and%20Chieh%20Hubert%20Lin%20and%20Yu-Lun%20Liu&entry.1292438233=Synthesizing%20large-scale%2C%20explorable%2C%20and%20geometrically%20accurate%203D%20urban%20scenes%20is%20a%20challenging%20yet%20valuable%20task%20for%20immersive%20and%20embodied%20applications.%20The%20challenge%20lies%20in%20the%20lack%20of%20large-scale%20and%20high-quality%20real-world%203D%20scans%20for%20training%20generalizable%20generative%20models.%20In%20this%20paper%2C%20we%20take%20an%20alternative%20route%20to%20create%20large-scale%203D%20scenes%20by%20leveraging%20readily%20available%20satellite%20imagery%20for%20realistic%20coarse%20geometry%20and%20open-domain%20diffusion%20models%20for%20high-quality%20close-up%20appearance%20synthesis.%20We%20propose%20Skyfall-GS%2C%20a%20novel%20hybrid%20framework%20that%20synthesizes%20immersive%20city-block%20scale%203D%20urban%20scenes%20by%20combining%20satellite%20reconstruction%20with%20diffusion%20refinement%2C%20eliminating%20the%20need%20for%20costly%203D%20annotations%2C%20and%20also%20featuring%20real-time%2C%20immersive%203D%20exploration.%20We%20tailor%20a%20curriculum-driven%20iterative%20refinement%20strategy%20to%20progressively%20enhance%20geometric%20completeness%20and%20photorealistic%20texture.%20Extensive%20experiments%20demonstr {"title": "A Closer Look into LLMs for Table Understanding", "author": "Jia Wang and Chuanyu Qin and Mingyu Zheng and Qingyi Si and Peize Li and Zheng Lin", "abstract": "Despite the success of Large Language Models (LLMs) in table understanding, their internal mechanisms remain unclear. In this paper, we conduct an empirical study on 16 LLMs, covering general LLMs, specialist tabular LLMs, and Mixture-of-Experts (MoE) models, to explore how LLMs understand tabular data and perform downstream tasks. Our analysis focus on 4 dimensions including the attention dynamics, the effective layer depth, the expert activation, and the impacts of input designs. Key findings include: (1) LLMs follow a three-phase attention pattern -- early layers scan the table broadly, middle layers localize relevant cells, and late layers amplify their contributions; (2) tabular tasks require deeper layers than math reasoning to reach stable predictions; (3) MoE models activate table-specific experts in middle layers, with early and late layers sharing general-purpose experts; (4) Chain-of-Thought prompting increases table attention, further enhanced by table-tuning. We hope these findings and insights can facilitate interpretability and future research on table-related tasks.", "link": "http://arxiv.org/abs/2603.15402v1", "date": "2026-03-16", "relevancy": 2.6068, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5272}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5272}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5096}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Closer%20Look%20into%20LLMs%20for%20Table%20Understanding&body=Title%3A%20A%20Closer%20Look%20into%20LLMs%20for%20Table%20Understanding%0AAuthor%3A%20Jia%20Wang%20and%20Chuanyu%20Qin%20and%20Mingyu%20Zheng%20and%20Qingyi%20Si%20and%20Peize%20Li%20and%20Zheng%20Lin%0AAbstract%3A%20Despite%20the%20success%20of%20Large%20Language%20Models%20%28LLMs%29%20in%20table%20understanding%2C%20their%20internal%20mechanisms%20remain%20unclear.%20In%20this%20paper%2C%20we%20conduct%20an%20empirical%20study%20on%2016%20LLMs%2C%20covering%20general%20LLMs%2C%20specialist%20tabular%20LLMs%2C%20and%20Mixture-of-Experts%20%28MoE%29%20models%2C%20to%20explore%20how%20LLMs%20understand%20tabular%20data%20and%20perform%20downstream%20tasks.%20Our%20analysis%20focus%20on%204%20dimensions%20including%20the%20attention%20dynamics%2C%20the%20effective%20layer%20depth%2C%20the%20expert%20activation%2C%20and%20the%20impacts%20of%20input%20designs.%20Key%20findings%20include%3A%20%281%29%20LLMs%20follow%20a%20three-phase%20attention%20pattern%20--%20early%20layers%20scan%20the%20table%20broadly%2C%20middle%20layers%20localize%20relevant%20cells%2C%20and%20late%20layers%20amplify%20their%20contributions%3B%20%282%29%20tabular%20tasks%20require%20deeper%20layers%20than%20math%20reasoning%20to%20reach%20stable%20predictions%3B%20%283%29%20MoE%20models%20activate%20table-specific%20experts%20in%20middle%20layers%2C%20with%20early%20and%20late%20layers%20sharing%20general-purpose%20experts%3B%20%284%29%20Chain-of-Thought%20prompting%20increases%20table%20attention%2C%20further%20enhanced%20by%20table-tuning.%20We%20hope%20these%20findings%20and%20insights%20can%20facilitate%20interpretability%20and%20future%20research%20on%20table-related%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15402v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Closer%2520Look%2520into%2520LLMs%2520for%2520Table%2520Understanding%26entry.906535625%3DJia%2520Wang%2520and%2520Chuanyu%2520Qin%2520and%2520Mingyu%2520 {"title": "IConE: Batch Independent Collapse Prevention for Self-Supervised Representation Learning", "author": "Konstantinos Almpanakis and Anna Kreshuk", "abstract": "Self-supervised learning (SSL) has revolutionized representation learning, with Joint-Embedding Architectures (JEAs) emerging as an effective approach for capturing semantic features. Existing JEAs rely on implicit or explicit batch interaction -- via negative sampling or statistical regularization -- to prevent representation collapse. This reliance becomes problematic in regimes where batch sizes must be small, such as high-dimensional scientific data, where memory constraints and class imbalance make large, well-balanced batches infeasible. We introduce IConE (Instance-Contrasted Embeddings), a framework that decouples collapse prevention from the training batch size. Rather than enforcing diversity through batch statistics, IConE maintains a global set of learnable auxiliary instance embeddings regularized by an explicit diversity objective. This transfers the anti-collapse mechanism from the transient batch to a dataset-level embedding space, allowing stable training even when batch statistics are unreliable, down to batch size 1. Across diverse 2D and 3D biomedical modalities, IConE outperforms strong contrastive and non-contrastive baselines throughout the small-batch regime (from B=1 to B=64) and demonstrates marked robustness to severe class imbalance. Geometric analysis shows that IConE preserves high intrinsic dimensionality in the learned representations, preventing the collapse observed in existing JEAs as batch sizes shrink.", "link": "http://arxiv.org/abs/2603.15263v1", "date": "2026-03-16", "relevancy": 2.5942, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5643}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5142}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.478}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20IConE%3A%20Batch%20Independent%20Collapse%20Prevention%20for%20Self-Supervised%20Representation%20Learning&body=Title%3A%20IConE%3A%20Batch%20Independent%20Collapse%20Prevention%20for%20Self-Supervised%20Representation%20Learning%0AAuthor%3A%20Konstantinos%20Almpanakis%20and%20Anna%20Kreshuk%0AAbstract%3A%20Self-supervised%20learning%20%28SSL%29%20has%20revolutionized%20representation%20learning%2C%20with%20Joint-Embedding%20Architectures%20%28JEAs%29%20emerging%20as%20an%20effective%20approach%20for%20capturing%20semantic%20features.%20Existing%20JEAs%20rely%20on%20implicit%20or%20explicit%20batch%20interaction%20--%20via%20negative%20sampling%20or%20statistical%20regularization%20--%20to%20prevent%20representation%20collapse.%20This%20reliance%20becomes%20problematic%20in%20regimes%20where%20batch%20sizes%20must%20be%20small%2C%20such%20as%20high-dimensional%20scientific%20data%2C%20where%20memory%20constraints%20and%20class%20imbalance%20make%20large%2C%20well-balanced%20batches%20infeasible.%20We%20introduce%20IConE%20%28Instance-Contrasted%20Embeddings%29%2C%20a%20framework%20that%20decouples%20collapse%20prevention%20from%20the%20training%20batch%20size.%20Rather%20than%20enforcing%20diversity%20through%20batch%20statistics%2C%20IConE%20maintains%20a%20global%20set%20of%20learnable%20auxiliary%20instance%20embeddings%20regularized%20by%20an%20explicit%20diversity%20objective.%20This%20transfers%20the%20anti-collapse%20mechanism%20from%20the%20transient%20batch%20to%20a%20dataset-level%20embedding%20space%2C%20allowing%20stable%20training%20even%20when%20batch%20statistics%20are%20unreliable%2C%20down%20to%20batch%20size%201.%20Across%20diverse%202D%20and%203D%20biomedical%20modalities%2C%20IConE%20outperforms%20strong%20contrastive%20and%20non-contrastive%20baselines%20throughout%20the%20small-batch%20regime%20%28from%20B%3D1%20to%20B%3D64%29%20and%20demonstrates%20marked%20robustness%20to%20severe%20class%20imbalance.%20Geometric%20analysis%20shows%20that%20IConE%20preserves%20high%20intrinsic%20dimensionality%20in%20the%20learned%20representations%2C%20preventing%20the%20collapse%20observed%20in%20existing%20JEAs%20as%20batch%20sizes%20shrink.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15263v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIConE%253A%2520Batch%2520Independent%2520Collapse%2520Prevention%2520for%2520Self-Supervised%2520Representation%2520Learning%26entry.906535625%3DKonstantinos%2520Almpanakis%2520and%2520Anna%2520Kreshuk%26entry.1292438233%3DSelf-supervised%2520learning%2520%2528SSL%2529%2520has%2520revolutionized%2520representation%2520learning%252C%2520with%2520Joint-Embedding%2520Architectures%2520%2528JEAs%2529%2520emerging%2520as%2520an%2520effective%2520approach%2520for%2520capturing%2520semantic%2520features.%2520Existing%2520JEAs%2520rely%2520on%2520implicit%2520or%2520explicit%2520batch%2520interaction%2520--%2520via%2520negative%2520sampling%2520or%2520statistical%2520regularization%2520--%2520to%2520prevent%2520representation%2520collapse.%2520This%2520reliance%2520becomes%2520problematic%2520in%2520regimes%2520where%2520batch%2520sizes%2520must%2520be%2520small%252C%2520such%2520as%2520high-dimensional%2520scientific%2520data%252C%2520where%2520memory%2520constraints%2520and%2520class%2520imbalance%2520make%2520large%252C%2520well-balanced%2520batches%2520infeasible.%2520We%2520introduce%2520IConE%2520%2528Instance-Contrasted%2520Embeddings%2529%252C%2520a%2520framework%2520that%2520decouples%2520collapse%2520prevention%2520from%2520the%2520training%2520batch%2520size.%2520Rather%2520than%2520enforcing%2520diversity%2520through%2520batch%2520statistics%252C%2520IConE%25 {"title": "AI Evasion and Impersonation Attacks on Facial Re-Identification with Activation Map Explanations", "author": "Noe Claudel and Weisi Guo and Yang Xing", "abstract": "Facial identification systems are increasingly deployed in surveillance and yet their vulnerability to adversarial evasion and impersonation attacks pose a critical risk. This paper introduces a novel framework for generating adversarial patches capable of both evasion and impersonation attacks against deep re-identification models across non-overlapping cameras. Unlike prior approaches that require iterative patch optimisation for each target, our method employs a conditional encoder-decoder network to synthesize adversarial patches in a single forward pass, guided by multi-scale features from source and target images. The patches are optimised with a dual adversarial objective comprising of pull and push terms. To enhance imperceptibility and aid physical deployment, we further integrate naturalistic patch generation using pre-trained latent diffusion models. Experiments on standard pedestrian (Market-1501, DukeMTMCreID) and facial recognition benchmarks (CelebA-HQ, PubFig) datasets demonstrate the effectiveness of the proposed method. Our adversarial evasion attacks reduce mean Average Precision from 90% to 0.4% in white-box settings and from 72% to 0.4% in black-box settings, showing strong cross-model generalization. In targeted impersonation attacks, our framework achieves a success rate of 27% on CelebA-HQ, competing with other patch-based methods. We go further to use clustering of activation maps to interpret which features are most used by adversarial attacks and propose a pathway for future countermeasures. The results highlight the practicality of adversarial patch attacks on retrieval-based systems and underline the urgent need for robust defense strategies.", "link": "http://arxiv.org/abs/2603.15396v1", "date": "2026-03-16", "relevancy": 2.594, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5498}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5189}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4878}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AI%20Evasion%20and%20Impersonation%20Attacks%20on%20Facial%20Re-Identification%20with%20Activation%20Map%20Explanations&body=Title%3A%20AI%20Evasion%20and%20Impersonation%20Attacks%20on%20Facial%20Re-Identification%20with%20Activation%20Map%20Explanations%0AAuthor%3A%20Noe%20Claudel%20and%20Weisi%20Guo%20and%20Yang%20Xing%0AAbstract%3A%20Facial%20identification%20systems%20are%20increasingly%20deployed%20in%20surveillance%20and%20yet%20their%20vulnerability%20to%20adversarial%20evasion%20and%20impersonation%20attacks%20pose%20a%20critical%20risk.%20This%20paper%20introduces%20a%20novel%20framework%20for%20generating%20adversarial%20patches%20capable%20of%20both%20evasion%20and%20impersonation%20attacks%20against%20deep%20re-identification%20models%20across%20non-overlapping%20cameras.%20Unlike%20prior%20approaches%20that%20require%20iterative%20patch%20optimisation%20for%20each%20target%2C%20our%20method%20employs%20a%20conditional%20encoder-decoder%20network%20to%20synthesize%20adversarial%20patches%20in%20a%20single%20forward%20pass%2C%20guided%20by%20multi-scale%20features%20from%20source%20and%20target%20images.%20The%20patches%20are%20optimised%20with%20a%20dual%20adversarial%20objective%20comprising%20of%20pull%20and%20push%20terms.%20To%20enhance%20imperceptibility%20and%20aid%20physical%20deployment%2C%20we%20further%20integrate%20naturalistic%20patch%20generation%20using%20pre-trained%20latent%20diffusion%20models.%20Experiments%20on%20standard%20pedestrian%20%28Market-1501%2C%20DukeMTMCreID%29%20and%20facial%20recognition%20benchmarks%20%28CelebA-HQ%2C%20PubFig%29%20datasets%20demonstrate%20the%20effectiveness%20of%20the%20proposed%20method.%20Our%20adversarial%20evasion%20attacks%20reduce%20mean%20Average%20Precision%20from%2090%25%20to%200.4%25%20in%20white-box%20settings%20and%20from%2072%25%20to%200.4%25%20in%20black-box%20settings%2C%20showing%20strong%20cross-model%20generalization.%20In%20targeted%20impersonation%20attacks%2C%20our%20framework%20achieves%20a%20success%20rate%20of%2027%25%20on%20CelebA-HQ%2C%20competing%20with%20other%20patch-based%20methods.%20We%20go%20further%20to%20use%20clustering%20of%20activation%20maps%20to%20interpret%20which%20features%20are%20most%20used%20by%20adversarial%20attacks%20and%20propose%20a%20pathway%20for%20future%20countermeasures.%20The%20results%20highlight%20the%20practicality%20of%20adversarial%20patch%20attacks%20on%20retrieval-based%20systems%20and%20underline%20the%20urgent%20need%20for%20robust%20defense%20strategies.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15396v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAI%2520Evasion%2520and%2520Impersonation%2520Attacks%2520on%2520Facial%2520Re-Identification%2520with%2520Activation%2520Map%2520Explanations%26entry.906535625%3DNoe%2520Claudel%2520and%2520Weisi%2520Guo%2520and%2520Yang%2520Xing%26entry.1292438233%3DFacial%2520identification%2520systems%2520are%2520increasingly%2520deployed%2520in%2520surveillance%2520and%2520yet%2520their%2520vulnerability%2520to%2520adversarial%2520evasion%2520and%2520impersonation%2520attacks%2520pose%2520a%2520critical%2520risk.%2520This%2520paper%2520introduces%2520a%2520novel%2520framework%2520for%2520generating%2520adversarial%2520patches%2520capable%2520of%2520both%2520evasion%2520and%2520impersonation%2520attacks%2520aga %2520highlight%2520the%2520practicality%2520of%2520adversarial%2520patch%2520attacks%2520on%2520retrieval-based%2520systems%2520and%2520underline%2520the%2520urgent%2520need%2520for%2520robust%2520defense%2520strategies.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.15396v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=AI%20Evasion%20and%20Impersonation%20Attacks%20on%20Facial%20Re-Identification%20with%20Activation%20Map%20Explanations&entry.906535625=Noe%20Claudel%20and%20Weisi%20Guo%20and%20Yang%20Xing&entry.1292438233=Facial%20identification%20systems%20are%20increasingly%20deployed%20in%20surveillance%20and%20yet%20their%20vulnerability%20to%20adversarial%20evasion%20and%20impersonation%20attacks%20pose%20a%20critical%20risk.%20This%20paper%20introduces%20a%20novel%20framework%20for%20generating%20adversarial%20patches%20capable%20of%20both%20evasion%20and%20impersonation%20attacks%20against%20deep%20re-identification%20models%20across%20non-overlapping%20cameras.%20Unlike%20prior%20approaches%20that%20require%20iterative%20patch%20optimisation%20for%20each%20target%2C%20our%20method%20employs%20a%20conditional%20encoder-decoder%20network%20to%20synthesize%20adversarial%20patches%20in%20a%20single%20forward%20pass%2C%20guided%20by%20multi-scale%20features%20from%20source%20and%20target%20images.%20The%20patches%20are%20optimised%20with%20a%20dual%20adversarial%20objective%20comprising%20of%20pull%20and%20push%20terms.%20To%20enhance%20imperceptibility%20and%20aid%20physical%20deployment%2C%20we%20further%20integrate%20naturalistic%20patch%20generation%20using%20pre-trained%20latent%20diffusion%20models.%20Experiments%20on%20standard%20pedestrian%20%28Market-1501%2C%20DukeMTMCreID%29%20and%20facial%20recognition%20benchmarks%20%28CelebA-HQ%2C%20PubFig%29%20datasets%20demonstrate%20the%20effectiveness%20of%20the%20proposed%20method.%20Our%20adversarial% {"title": "NerVE: Nonlinear Eigenspectrum Dynamics in LLM Feed-Forward Networks", "author": "Nandan Kumar Jha and Brandon Reagen", "abstract": "We introduce NerVE, a unified eigenspectral framework for understanding how feed-forward networks (FFNs) in large language models (LLMs) organize and regulate information flow in high-dimensional latent space. Despite FFNs dominating the parameter budget, their high-dimensional dynamics remain poorly understood. NerVE addresses this gap through lightweight, memory-efficient tracking of eigenspectrum dynamics via four complementary metrics: Spectral Entropy (dispersion), Participation Ratio (effective dimensionality), Eigenvalue Early Enrichment (top-heaviness), and Jensen-Shannon divergence (distributional shifts). Our key insight is that FFN nonlinearities reinject variance across eigenmodes, fundamentally governing latent dimension utilization, and that optimizer geometry strongly modulates the extent of this variance reinjection. We validate NerVE across model scales, and diverse architectural and optimizer configurations, each uniquely shaping FFN dynamics: normalization schemes controlling variance flow; FFN weight geometries constraining latent space; positional encoding and activation functions regulating information flow; and optimizer choices redistributing effective capacity across depth. Across these settings, NerVE consistently recovers stable spectral signatures that correlate with model's generalization ability and respond predictably to design choices, generalizing beyond transformer to MLP-Mixer architectures, providing actionable insights for architectural and optimizer choices beyond trial-and-error.", "link": "http://arxiv.org/abs/2603.06922v2", "date": "2026-03-16", "relevancy": 2.5673, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5666}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n unctions%20regulating%20information%20flow%3B%20and%20optimizer%20choices%20redistributing%20effective%20capacity%20across%20depth.%20Across%20these%20settings%2C%20NerVE%20consistently%20recovers%20stable%20spectral%20signatures%20that%20correlate%20with%20model%27s%20generalization%20ability%20and%20respond%20predictably%20to%20design%20choices%2C%20generalizing%20beyond%20transformer%20to%20MLP-Mixer%20architectures%2C%20providing%20actionable%20insights%20for%20architectural%20and%20optimizer%20choices%20beyond%20trial-and-error.%0ALink%3A%20http%3A//arxiv.org/abs/2603.06922v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNerVE%253A%2520Nonlinear%2520Eigenspectrum%2520Dynamics%2520in%2520LLM%2520Feed-Forward%2520Networks%26entry.906535625%3DNandan%2520Kumar%2520Jha%2520and%2520Brandon%2520Reagen%26entry.1292438233%3DWe%2520introduce%2520NerVE%252C%2520a%2520unified%2520eigenspectral%2520framework%2520for%2520understanding%2520how%2520feed-forward%2520networks%2520%2528FFNs%2529%2520in%2520large%2520language%2520models%2520%2528LLMs%2529%2520organize%2520and%2520regulate%2520information%2520flow%2520in%2520high-dimensional%2520latent%2520space.%2520Despite%2520FFNs%2520dominating%2520the%2520parameter%2520budget%252C%2520their%2520high-dimensional%2520dynamics%2520remain%2520poorly%2520understood.%2520NerVE%2520addresses%2520this%2520gap%2520through%2520lightweight%252C%2520memory-efficient%2520tracking%2520of%2520eigenspectrum%2520dynamics%2520via%2520four%2520complementary%2520metrics%253A%2520Spectral%2520Entropy%2520%2528dispersion%2529%252C%2520Participation%2520Ratio%2520%2528effective%2520dimensionality%2529%252C%2520Eigenvalue%2520Early%2520Enrichment%2520%2528top-heaviness%2529%252C%2520and%2520Jensen-Shannon%2520divergence%2520%2528distributional%2520shifts%2529.%2520Our%2520key%2520insight%2520is%2520that%2520FFN%2520nonlinearities%2520reinject%2520variance%2520acr {"title": "End-to-End Dexterous Grasp Learning from Single-View Point Clouds via a Multi-Object Scene Dataset", "author": "Tao Geng and Dapeng Yang and Ziwei Liu and Le Zhang and Le Qi and WangYang Li and Yi Ren and Shan Luo and Fenglei Ni", "abstract": "Dexterous grasping in multi-object scene constitutes a fundamental challenge in robotic manipulation. Current mainstream grasping datasets predominantly focus on single-object scenarios and predefined grasp configurations, often neglecting environmental interference and the modeling of dexterous pre-grasp gesture, thereby limiting their generalizability in real-world applications. To address this, we propose DGS-Net, an end-to-end grasp prediction network capable of learning dense grasp configurations from single-view point clouds in multi-object scene. Furthermore, we propose a two-stage grasp data generation strategy that progresses from dense single-object grasp synthesis to dense scene-level grasp generation. Our dataset comprises 307 objects, 240 multi-object scenes, and over 350k validated grasps. By explicitly modeling grasp offsets and pre-grasp configurations, the dataset provides more robust and accurate supervision for dexterous grasp learning. Experimental results show that DGS-Net achieves grasp success rates of 88.63\\% in simulation and 78.98\\% on a real robotic platform, while exhibiting lower penetration with a mean penetration depth of 0.375 mm and penetration volume of 559.45 mm^3, outperforming existing methods and demonstrating strong effectiveness and generalization capability. Our dataset is available at https://github.com/4taotao8/DGS-Net.", "link": "http://arxiv.org/abs/2603.15410v1", "date": "2026-03-16", "relevancy": 2.5544, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.7222}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5975}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5715}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20End-to-End%20Dexterous%20Grasp%20Learning%20from%20Single-View%20Point%20Clouds%20via%20a%20Multi-Object%20Scene%20Dataset&body=Title%3A%20End-to-End%20Dexterous%20Grasp%20Learning%20from%20Single-View%20Point%20Clouds%20via%20a%20Multi-Object%20Scene%20Dataset%0AAuthor%3A%20Tao%20Geng%20and%20Dapeng%20Yang%20and%20Ziwei%20Liu%20and%20Le%20Zhang%20and%20Le%20Qi%20and%20WangYang%20Li%20and%20Yi%20Ren%20and%20Shan%20Luo%20and%20Fenglei%20Ni%0AAbstract%3A%20Dexterous%20grasping%20in%20multi-object%20scene%20constitutes%20a%20fundamental%20challenge%20in%20robotic%20manipulation.%20Current%20mainstream%20grasping%20datasets%20predominantly%20focus%20on%20single-object%20scenarios%20and%20predefined%20grasp%20configurations%2C%20often%20neglecting%20environmental%20interference%20and%20the%20modeling%20of%20dexterous%20pre-grasp%20gesture%2C%20thereby%20limiting%20their%20generalizability%20in%20real-world%20applications.%20To%20address%20this%2C%20we%20propose%20DGS-Net%2C%20an%20end-to-end%20grasp%20prediction%20network%20capable%20of%20learning%20dense%20grasp%20configurations%20from%20single-view%20point%20clouds%20in%20multi-object%20scene.%20Furthermore%2C%20we%20propose%20a%20two-stage%20grasp%20data%20generation%20strategy%20that%20progresses%20from%20dense%20single-object%20grasp%20synthesis%20to%20dense%20scene-level%20grasp%20generation.%20Our%20dataset%20comprises%20307%20objects%2C%20240%20multi-object%20scenes%2C%20and%20over%20350k%20validated%20grasps.%20By%20explicitly%20modeling%20grasp%20offsets%20and%20pre-grasp%20configurations%2C%20the%20dataset%20provides%20more%20robust%20and%20accurate%20supervision%20for%20dexterous%20grasp%20learning.%20Experimental%20results%20sho os%20and%20predefined%20grasp%20configurations%2C%20often%20neglecting%20environmental%20interference%20and%20the%20modeling%20of%20dexterous%20pre-grasp%20gesture%2C%20thereby%20limiting%20their%20generalizability%20in%20real-world%20applications.%20To%20address%20this%2C%20we%20propose%20DGS-Net%2C%20an%20end-to-end%20grasp%20prediction%20network%20capable%20of%20learning%20dense%20grasp%20configurations%20from%20single-view%20point%20clouds%20in%20multi-object%20scene.%20Furthermore%2C%20we%20propose%20a%20two-stage%20grasp%20data%20generation%20strategy%20that%20progresses%20from%20dense%20single-object%20grasp%20synthesis%20to%20dense%20scene-level%20grasp%20generation.%20Our%20dataset%20comprises%20307%20objects%2C%20240%20multi-object%20scenes%2C%20and%20over%20350k%20validated%20grasps.%20By%20explicitly%20modeling%20grasp%20offsets%20and%20pre-grasp%20configurations%2C%20the%20dataset%20provides%20more%20robust%20and%20accurate%20supervision%20for%20dexterous%20grasp%20learning.%20Experimental%20results%20show%20that%20DGS-Net%20achieves%20grasp%20success%20rates%20of%2088.63%5C%25%20in%20simulation%20and%2078.98%5C%25%20on%20a%20real%20robotic%20platform%2C%20while%20exhibiting%20lower%20penetration%20with%20a%20mean%20penetration%20depth%20of%200.375%20mm%20and%20penetration%20volume%20of%20559.45%20mm%5E3%2C%20outperforming%20existing%20methods%20and%20demonstrating%20strong%20effectiveness%20and%20generalization%20capability.%20Our%20dataset%20is%20available%20at%20https%3A//github.com/4taotao8/DGS-Net.&entry.1838667208=http%3A//arxiv.org/abs/2603.15410v1&entry.124074799=Read"},
{"title": "A Tutorial on ALOS2 SAR Utilization: Dataset Preparation, Self-Supervised Pretraining, and Semantic Segmentation", "author": "Nevrez Imamoglu and Ali Caglayan and Toru Kouyama", "abstract": "Masked auto-encoders (MAE) and related approaches have shown promise for satellite imagery, but their application to synthetic aperture radar (SAR) remains limited due to challenges in semantic labeling and high noise levels. Building on our prior work with SAR-W-MixMAE, which adds SAR-specific intensity-weighted loss to standard MixMAE for pretraining, we also introduce SAR-W-SimMIM; a weighted variant of SimMIM applied to ALOS-2 single-channel SAR imagery. This method aims to reduce the impact of speckle and extreme intensity values during self-supervised pretraining. We evaluate its effect on semantic segmentation compared to our previous trial with SAR-W-MixMAE and random initialization, observing notable improvements. In addition, pretraining and fine-tuning models on satellite imagery pose unique challenges, particularly when developing region-specific models. Imbalanced land cover distributions such as dominant water, forest, or desert areas can introduce bias, affecting both pretraining and downstream tasks like land cover segmentation. To address this, we constructed a SAR dataset using ALOS-2 single-channel (HH polarization) imagery focused on the Japan region, marking the initial phase toward a national-scale foundation model. This dataset was used to pretrain a vision transformer-based autoencoder, with the resulting encoder fine-tuned for semantic segmentation using a task-specific decoder. Initial results demonstrate significant performance improvements compared to training from scratch with random initialization. In summary, this work provides a guide to process and prepare ALOS2 observations to create dataset so that it can be taken advantage of self-supervised pretraining of models and finetuning downstream tasks such as semantic segmentation.", "link": "http://arxiv.org/abs/2603.15119v1", "date": "2026-03-16", "relevancy": 2.554, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5135}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5117}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5072}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Tutorial%20on%20ALOS2%20SAR%20Utilization%3A%20Dataset%20Preparation%2C%20Self-Supervised%20Pretraining%2C%20and%20Semantic%20Segmentation&body=Title%3A%20A%20Tutorial%20on%20ALOS2%20SAR%20Utilization%3A%20Dataset%20Preparation%2C%20Self-Supervised%20Pretraining%2C%20and%20Semantic%20Segmentation%0AAuthor%3A%20Nevrez%20Imamoglu%20and%20Ali%20Caglayan%20and%20Toru%20Kouyama%0AAbstract%3A%20Masked%20auto-encoders%20%28MAE%29%20and%20related%20approaches%20have%20shown%20promise%20for%20satellite%20imagery%2C%20but%20their%20application%20to%20synthetic%20aperture%20radar%20%28SAR%29%20remains%20limited%20due%20to%20challenges%20in%20semantic%20labeling%20and%20high%20noise%20levels.%20Building%20on%20our%20prior%20work%20with%20SAR-W-MixMAE%2C%20which%20adds%20SAR-specific%20intensity-weighted%20loss%20to%20standard%20MixMAE%20for%20pretraining%2C%20we%20also%20introduce%20SAR-W-SimMIM%3B%20a%20weighted%20variant%20of%20SimMIM%20applied%20to%20ALOS-2%20single-channel%20SAR%20imagery.%20This%20method%20aims%20to%20reduce%20the%20impact%20of%20speckle%20and%20extreme%20intensity%20values%20during%20self-supervised%20pretraining.%20We%20evaluate%20its%20effect%20on%20semantic%20segmentation%20compared%20to%20our%20previous%20trial%20with%20SAR-W-MixMAE%20and%20random%20initialization%2C%20observing%20notable%20improvements.%20In%20addition%2C%20pretraining%20and%20fine-tuning%20models%20on%20satellite%20imagery%20pose%20unique%20challenges%2C%20particularly%20when%20developing%20region-specific%20models.%20Imbalanced%20land%20cover%20distributions%20such%20as%20dominant%20water%2C%20forest%2C%20or%20desert%20areas%20can%20introduce%20bias%2C%20affecting%20both%20pretraining%20and%20downstream%20tasks%20like%20land%20cover%20segmentation.%20To%20address%20this%2C%20we%20constructed%20a%20SAR%20dataset%20using%20ALOS-2%20single-channel%20%28HH%20polarization%29%20imagery%20focused%20on%20the%20Japan%20region%2C%20marking%20the%20initial%20phase%20toward%20a%20national-scale%20foundation%20model.%20This%20dataset%20was%20used%20to%20pretrain%20a%20vision%20transformer-based%20autoencoder%2C%20with%20the%20resulting%20encoder%20fine-tuned%20for%20semantic%20segmentation%20using%20a%20task-specific%20decoder.%20Initial%20results%20demonstrate%20significant%20performance%20improvements%20compared%20to%20training%20from%20scratch%20with%20random%20initialization.%20In%20summary%2C%20this%20work%20provides%20a%20guide%20to%20process%20and%20prepare%20ALOS2%20observations%20to%20create%20dataset%20so%20that%20it%20can%20be%20taken%20advantage%20of%20self-supervised%20pretraining%20of%20models%20and%20finetuning%20downstream%20tasks%20such%20as%20semantic%20segmentation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15119v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Tutorial%2520on%2520ALOS2%2520SAR%2520Utilization%253A%2520Dataset%2520Preparation%252C%2520Self-Supervised%2520Pretraining%252C%2520and%2520Semantic%2520Segmentation%26entry.906535625%3DNevrez%2520Imamoglu%2520and%2520Ali%2520Caglayan%2520and%2520Toru%2520Kouyama%26entry.1292438233%3DMasked%2520auto-encoders%2520%2528MAE%2529%2520and%2520related%2520approaches%2520have%2520shown%2520promise%2520for%2520sate 520with%2520the%2520resulting%2520encoder%2520fine-tuned%2520for%2520semantic%2520segmentation%2520using%2520a%2520task-specific%2520decoder.%2520Initial%2520results%2520demonstrate%2520significant%2520performance%2520improvements%2520compared%2520to%2520training%2520from%2520scratch%2520with%2520random%2520initialization.%2520In%2520summary%252C%2520this%2520work%2520provides%2520a%2520guide%2520to%2520process%2520and%2520prepare%2520ALOS2%2520observations%2520to%2520create%2520dataset%2520so%2520that%2520it%2520can%2520be%2520taken%2520advantage%2520of%2520self-supervised%2520pretraining%2520of%2520models%2520and%2520finetuning%2520downstream%2520tasks%2520such%2520as%2520semantic%2520segmentation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.15119v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=A%20Tutorial%20on%20ALOS2%20SAR%20Utilization%3A%20Dataset%20Preparation%2C%20Self-Supervised%20Pretraining%2C%20and%20Semantic%20Segmentation&entry.906535625=Nevrez%20Imamoglu%20and%20Ali%20Caglayan%20and%20Toru%20Kouyama&entry.1292438233=Masked%20auto-encoders%20%28MAE%29%20and%20related%20approaches%20have%20shown%20promise%20for%20satellite%20imagery%2C%20but%20their%20application%20to%20synthetic%20aperture%20radar%20%28SAR%29%20remains%20limited%20due%20to%20challenges%20in%20semantic%20labeling%20and%20high%20noise%20levels.%20Building%20on%20our%20prior%20work%20with%20SAR-W-MixMAE%2C%20which%20adds%20SAR-specific%20intensity-weighted%20loss%20to%20standard%20MixMAE%20for%20pretraining%2C%20we%20also%20introduce%20SAR-W-SimMIM%3B%20a%20weighted%20variant%20of%20SimMIM%20applied%20to%20ALOS-2%20single-channel%20SAR%20imagery.%20This%20method%20aims%20to%20reduce%20the%20impact%20of%20speckle%20and%20extreme%20intensity%20values%20during%20self-supervised%20pretraining.%20We%20evaluate%20its%20effect%20on%20semantic%20segmentation%20compared%20to%20our%20p {"title": "Matching Features, Not Tokens: Energy-Based Fine-Tuning of Language Models", "author": "Samy Jelassi and Mujin Kwun and Rosie Zhao and Yuanzhi Li and Nicolo Fusi and Yilun Du and Sham M. Kakade and Carles Domingo-Enrich", "abstract": "Cross-entropy (CE) training provides dense and scalable supervision for language models, but it optimizes next-token prediction under teacher forcing rather than sequence-level behavior under model rollouts. We introduce a feature-matching objective for language-model fine-tuning that targets sequence-level statistics of the completion distribution, providing dense semantic feedback without requiring a task-specific verifier or preference model. To optimize this objective efficiently, we propose energy-based fine-tuning (EBFT), which uses strided block-parallel sampling to generate multiple rollouts from nested prefixes concurrently, batches feature extraction over these rollouts, and uses the resulting embeddings to perform an on-policy policy-gradient update. We present a theoretical perspective connecting EBFT to KL-regularized feature-matching and energy-based modeling. Empirically, across Q&A coding, unstructured coding, and translation, EBFT matches RLVR and outperforms SFT on downstream accuracy while achieving a lower validation cross-entropy than both methods.", "link": "http://arxiv.org/abs/2603.12248v2", "date": "2026-03-16", "relevancy": 2.5406, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5264}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5146}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4834}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Matching%20Features%2C%20Not%20Tokens%3A%20Energy-Based%20Fine-Tuning%20of%20Language%20Models&body=Title%3A%20Matching%20Features%2C%20Not%20Tokens%3A%20Energy-Based%20Fine-Tuning%20of%20Language%20Models%0AAuthor%3A%20Samy%20Jelassi%20and%20Mujin%20Kwun%20and%20Rosie%20Zhao%20and%20Yuanzhi%20Li%20and%20Nicolo%20Fusi%20and%20Yilun%20Du%20and%20Sham%20M.%20Kakade%20and%20Carles%20Domingo-Enrich%0AAbstract%3A%20Cross-entropy%20%28CE%29%20training%20provides%20dense%20and%20scalable%20supervision%20for%20language%20models%2C%20but%20it%20optimizes%20next-token%20prediction%20under%20teacher%20forcing%20rather%20than%20sequence-level%20behavior%20under%20model%20rollouts.%20We%20introduce%20a%20feature-matching%20objective%20for%20language-model%20fine-tuning%20that%20targets%20sequence-level%20statistics%20of%20the%20completion%20distribution%2C%20providing%20dense%20semantic%20feedback%20without%20requiring%20a%20task-specific%20verifier%20or%20preference%20model.%20To%20optimize%20this%20objective%20efficiently%2C%20we%20propose%20energy-based%20fine-tuning%20%28EBFT%29%2C%20which%20uses%20strided%20block-parallel%20sampling%20to%20generate%20multiple%20rollouts%20from%20nested%20prefixes%20concurrently%2C%20batches%20feature%20extraction%20over%20these%20rollouts%2C%20and%20uses%20the%20resulting%20embeddings%20to%20perform%20an%20on-policy%20policy-gradient%20update.%20We%20present%20a%20theoretical%20perspective%20connecting%20EBFT%20to%20KL-regularized%20feature-matching%20and%20energy-based%20modeling.%20Empirically%2C%20across%20Q%26A%20coding%2C%20unstructured%20coding%2C%20and%20translation%2C%20EBFT%20matches%20RLVR%20and%20outperforms%20SFT%20on%20downstream%20accuracy%20while%20achieving%20a%20lower%20validation%20cross-entropy%20than%20both%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2603.12248v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMatching%2520Features%252C%2520Not%2520Tok {"title": "PAKAN: Pixel Adaptive Kolmogorov-Arnold Network Modules for Pansharpening", "author": "Haoyu Zhang and Haojing Chen and Zhen Zhong and Liangjian Deng", "abstract": "Pansharpening aims to fuse high-resolution spatial details from panchromatic images with the rich spectral information of multispectral images. Existing deep neural networks for this task typically rely on static activation functions, which limit their ability to dynamically model the complex, non-linear mappings required for optimal spatial-spectral fusion. While the recently introduced Kolmogorov-Arnold Network (KAN) utilizes learnable activation functions, traditional KANs lack dynamic adaptability during inference. To address this limitation, we propose a Pixel Adaptive Kolmogorov-Arnold Network framework. Starting from KAN, we design two adaptive variants: a 2D Adaptive KAN that generates spline summation weights across spatial dimensions and a 1D Adaptive KAN that generates them across spectral channels. These two components are then assembled into PAKAN 2to1 for feature fusion and PAKAN 1to1 for feature refinement. Extensive experiments demonstrate that our proposed modules significantly enhance network performance, proving the effectiveness and superiority of pixel-adaptive activation in pansharpening tasks.", "link": "http://arxiv.org/abs/2603.15109v1", "date": "2026-03-16", "relevancy": 2.5402, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5312}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5044}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4886}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PAKAN%3A%20Pixel%20Adaptive%20Kolmo

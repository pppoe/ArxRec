{"title": "Fast SAM 3D Body: Accelerating SAM 3D Body for Real-Time Full-Body Human Mesh Recovery", "author": "Timing Yang and Sicheng He and Hongyi Jing and Jiawei Yang and Zhijian Liu and Chuhang Zou and Yue Wang", "abstract": "SAM 3D Body (3DB) achieves state-of-the-art accuracy in monocular 3D human mesh recovery, yet its inference latency of several seconds per image precludes real-time application. We present Fast SAM 3D Body, a training-free acceleration framework that reformulates the 3DB inference pathway to achieve interactive rates. By decoupling serial spatial dependencies and applying architecture-aware pruning, we enable parallelized multi-crop feature extraction and streamlined transformer decoding. Moreover, to extract the joint-level kinematics (SMPL) compatible with existing humanoid control and policy learning frameworks, we replace the iterative mesh fitting with a direct feedforward mapping, accelerating this specific conversion by over 10,000x. Overall, our framework delivers up to a 10.9x end-to-end speedup while maintaining on-par reconstruction fidelity, even surpassing 3DB on benchmarks such as LSPET. We demonstrate its utility by deploying Fast SAM 3D Body in a vision-only teleoperation system that-unlike methods reliant on wearable IMUs-enables real-time humanoid control and the direct collection of manipulation policies from a single RGB stream.", "link": "http://arxiv.org/abs/2603.15603v1", "date": "2026-03-16", "relevancy": 3.181, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6459}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6441}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6186}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarX {"title": "Real-Time Human Frontal View Synthesis from a Single Image", "author": "Fangyu Lin and Yingdong Hu and Lunjie Zhu and Zhening Liu and Yushi Huang and Zehong Lin and Jun Zhang", "abstract": "Photorealistic human novel view synthesis from a single image is crucial for democratizing immersive 3D telepresence, eliminating the need for complex multi-camera setups. However, current rendering-centric methods prioritize visual fidelity over explicit geometric understanding and struggle with intricate regions like faces and hands, leading to temporal instability. Meanwhile, human-centric frameworks suffer from memory bottlenecks since they typically rely on an auxiliary model to provide informative structural priors for geometric modeling, which limits real-time performance. To address these challenges, we propose PrismMirror, a geometry-guided framework for instant frontal view synthesis from a single image. By avoiding external geometric modeling and focusing on frontal view synthesis, our model optimizes visual integrity for telepresence. Specifically, PrismMirror introduces a novel cascade learning strategy that enables coarse-to-fine geometric feature learning. It first directly learns coarse geometric features, such as SMPL-X meshes and point clouds, and then refines textures through rendering supervision. To achieve real-time efficiency, we distill this unified framework into a lightweight linear attention model. Notably, PrismMirror is the first monocular human frontal view synthesis model that achieves real-time inference at 24 FPS, significantly outperforming previous methods in both visual authenticity and structural accuracy.", "link": "http://arxiv.org/abs/2603.15433v1", "date": "2026-03-16", "relevancy": 3.1482, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6564}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6163}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6163}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Real-Time%20Human%20Frontal%20View%20Synthesis%20from%20a%20Single%20Image&body=Title%3A%20Real-Time%20Human%20Frontal%20View%20Synthesis%20from%20a%20Single%20Image%0AAuthor%3A%20Fangyu%20Lin%20and%20Yingdong%20Hu%20and%20Lunjie%20Zhu%20and%20Zhening%20Liu%20and%20Yushi%20Huang%20and%20Zehong%20Lin%20and%20Jun%20Zhang%0AAbstract%3A%20Photorealistic%20human%20novel%20view%20synthesis%20from%20a%20single%20image%20is%20crucial%20for%20democratizing%20immersive%203D%20telepresence%2C%20eliminating%20the%20need%20for%20complex%20multi-camera%20setups.%20However%2C%20current%20rendering-centric%20methods%20prioritize%20visual%20fidelity%20over%20explicit%20geometric%20understanding%20and%20struggle%20with%20intricate%20regions%20like%20faces%20and%20hands%2C%20leading%20to%20temporal%20instability.%20Meanwhile%2C%20human-centric%20frameworks%20suffer%20from%20memory%20bottlenecks%20since%20they%20typically%20rely%20on%20an%20auxiliary%20model%20to%20provide%20informative%20structural%20priors%20for%20geometric%20modeling%2C%20which%20limits%20real-time%20performance.%20To%20address%20these%20challenges%2C%20we%20propose%20PrismMirror%2C%20a%20geometry-guided%20framework%20for%20instant%20frontal%20view%20synthesis%20from%20a%20single%20image.%20By%20avoiding%20external%20geometric%20modeling%20and%20focusing%20on%20frontal%20view%20synthesis%2C%20our%20model%20optimizes%20visual%20integrity%20for%20telepresence.%20Specifically%2C%20PrismMirror%20introduces%20a%20novel%20cascade%20learning%20strategy%20that%20enables%20coarse-to-fine%20geometric%20feature%20learning.%20It%20first%20directly%20learns%20coarse%20geometric%20features%2C%20such%20as%20SMPL-X%20meshes%20and%20point%20clouds%2C%20and%20then%20refines%20textures%20through%20rendering%20supervision.%20To%20achieve%20real-time%20efficiency%2C%20we%20distill%20this%20unified%20framework%20into%20a%20lightweight%20linear%20attention%20model.%20Notably%2C%20PrismMirror%20is%20the%20first%20monocular%20human%20frontal%20view%20synthesis%20model%20that%20achieves%20real-time%20inference%20at%2024%20FPS%2C%20significantly%20outperforming%20previous%20methods%20in%20both%20visual%20authenticity%20and%20structural%20accuracy.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15433v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReal-Time%2520Human%2520Frontal%2520View%2520Synthesis%2520from%2520a%2520Single%2520Image%26entry.906535625%3DFangyu%2520Lin%2520and%2520Yingdong%2520Hu%2520and%2520Lunjie%2520Zhu%2520and%2520Zhening%2520Liu%2520and%2520Yushi%2520Huang%2520and%2520Zehong%2520Lin%2520and%2520Jun%2520Zhang%26entry.1292438233%3DPhotorealistic%2520human%2520novel%2520view%2520synthesis%2520from%2520a%2520single%2520image%2520is%2520crucial%2520for%2520democratizing%2520immersive%25203D%2520telepresence%252C%2520eliminating%2520the%2520need%2520for%2520complex%2520multi-camera%2520setups.%2520However%252C%2520current%2520rendering-centric%2520methods%2520prioritize%2520visual%2520fidelity%2520over%2520explicit%2520geometric%2520understanding%2520and%2520struggle%2520with%2520intricate%2520regions%2520like%2520faces%2520and%2520hands%252C%2520leading%2520to%2520temporal%2520instability.%2520Meanwhile%252C%2520human-centric%2520frameworks%2520suffer%2520from%2520memory%2520bottlenecks%2520since%2520they%2520typically%2520rely%2520on%2520an%2520auxiliary%2520model%2520to%2520provide%2520informative%2520structural%2520priors%2520for%2520geometric%2520modeling%252C%2520which%2520limits%2520real-time%2520performance.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520PrismMirror%252C%2520a%2520geometry-guided%2520framework%2520for%2520instant%25 {"title": "NavGSim: High-Fidelity Gaussian Splatting Simulator for Large-Scale Navigation", "author": "Jiahang Liu and Yuanxing Duan and Jiazhao Zhang and Minghan Li and Shaoan Wang and Zhizheng Zhang and He Wang", "abstract": "Simulating realistic environments for robots is widely recognized as a critical challenge in robot learning, particularly in terms of rendering and physical simulation. This challenge becomes even more pronounced in navigation tasks, where trajectories often extend across multiple rooms or entire floors. In this work, we present NavGSim, a Gaussian Splatting-based simulator designed to generate high-fidelity, large-scale navigation environments. Built upon a hierarchical 3D Gaussian Splatting framework, NavGSim enables photorealistic rendering in expansive scenes spanning hundreds of square meters. To simulate navigation collisions, we introduce a Gaussian Splatting-based slice technique that directly extracts navigable areas from reconstructed Gaussians. Additionally, for ease of use, we provide comprehensive NavGSim APIs supporting multi-GPU development, including tools for custom scene reconstruction, robot configuration, policy training, and evaluation. To evaluate NavGSim's effectiveness, we train a Vision-Language-Action (VLA) model using trajectories collected from NavGSim and assess its performance in both simulated and real-world environments. Our results demonstrate that NavGSim significantly enhances the VLA model's scene understanding, enabling the policy to handle diverse navigation queries effectively.", "link": "http://arxiv.org/abs/2603.15186v1", "date": "2026-03-16", "relevancy": 3.1167, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6819}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5943}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5938}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NavGSim%3A%20High-Fidelity%20Gaussian%20Splatting%20Simulator%20for%20Large-Scale%20Navigation&body=Title%3A%20NavGSim%3A%20High-Fidelity%20Gaussian%20Splatting%20Simulator%20for%20Large-Scale%20Navigation%0AAuthor%3A%20Jiahang%20Liu%20and%20Yuanxing%20Duan%20and%20Jiazhao%20Zhang%20and%20Minghan%20Li%20and%20Shaoan%20Wang%20and%20Zhizheng%20Zhang%20and%20He%20Wang%0AAbstract%3A%20Simulating%20realistic%20environments%20for%20robots%20is%20widely%20recognized%20as%20a%20critical%20challenge%20in%20robot%20learning%2C%20particularly%20in%20terms%20of%20rendering%20and%20physical%20simulation.%20This%20challenge%20becomes%20even%20more%20pronounced%20in%20navigation%20tasks%2C%20where%20trajectories%20often%20extend%20across%20multiple%20rooms%20or%20entire%20floors.%20In%20this%20work%2C%20we%20present%20NavGSim%2C%20a%20Gaussian%20Splatting-based%20simulator%20designed%20to%20generate%20high-fidelity%2C%20large-scale%20navigation%20environments.%20Built%20upon%20a%20hierarchical%203D%20Gaussian%20Splatting%20framework%2C%20NavGSim%20enables%20photorealistic%20rendering%20in%20expansive%20scenes%20spanning%20hundreds%20of%20square%20meters.%20To%20simulate%20navigation%20collisions%2C%20we%20introduce%20a%20Gaussian%20Splatting-based%20slice%20technique%20that%20directly%20extracts%20navigable%20areas%20from%20reconstructed%20Gaussians.%20Additionally%2C%20for%20ease%20of%20use%2C%20we%20provide%20comprehensive%20NavGSim%20APIs%20supporting%20multi-GPU%20development%2C%20including%20tools%20for%20custom%20scene%20reconstruction%2C%20robot%20configuration%2C%20policy%20training%2C%20and%20evaluation.%20To%20evaluate%20NavGSim%27s%20effectiveness%2C%20we%20train%20a%20Vision-Language-Action%20%28VLA%29%20model%20using%20trajectories%20collected%20from%20NavGSim%20and%20assess%20its%20performance%20in%20both%20simulated%20and%20real-world%20environments.%20Our%20results%20demonstrate%20that%20NavGSim%20significantly%20enhances%20the%20VLA%20model%27s%20scene%20understanding%2C%20enabling%20the%20policy%20to%20handle%20diverse%20navigation%20queries%20effectively.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15186v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNavGSim%253A%2520High-Fidelity%2520Gaussian%2520Splatting%2520Simulator%2520for%2520Large-Scale%2520Navigation%26entry.906535625%3DJiahang%2520Liu%2520and%2520Yuanxing%2520Duan%2520and%2520Jiazhao%2520Zhang%2520and%2520Minghan%2520Li%2520and%2520Shaoan%2520Wang%2520and%2520Zhizheng%2520Zhang%2520and%2520He%2520Wang%26entry.1292438233%3DSimulating%2520realistic%2520environments%2520for%2520robots%2520is%2520widely%2520recognized%2520as%2520a%2520critical%2520challenge%2520in%2520robot%2520learning%252C%2520particularly%2520in%2520terms%2520of%2520rendering%2520and%2520physical%2520simulation.%2520This%2520challenge%2520becomes%2520even%2520more%2520pronounced%2520in%2520navigation%2520tasks%252C%2520where%2520trajectories%2520often%2520extend%2520across%2520multiple%2520rooms%2520or%2520entire%2520floors.%2520In%2520this%2520work%252C%2520we%2520present%2520NavGSim%252C%2520a%2520Gaussian%2520Splatting-based%2520simulator%2520designed%2520to%2520generate%2520high-fidelity%252C%2520large-scale%2520navigation%2520environments.%2520Built%2520upon%2520a%2520hierarchical%25203D%2520Gaussian%2520Splatting%2520framework%252C%2520NavGSim%2520enables%2520photorealistic%2520rendering%2520in%2520expansive%2520scenes%2520spanning%2520hundreds%2520of%2520square%2520meters.%2520To%2520simulate%2520navigation%2520collisions%252C%2520we%2520introduce%2520a%2520Gaussian%2520Splatting-based%2520slice%2520technique%2520that%2520directly%2520extracts%2520navigable%2520areas%2520from%2520reconstructed% {"title": "FreeTalk: Emotional Topology-Free 3D Talking Heads", "author": "Federico Nocentini and Thomas Besnier and Claudio Ferrari and Stefano Berretti and Mohamed Daoudi", "abstract": "Speech-driven 3D facial animation has advanced rapidly, yet most approaches remain tied to registered template meshes, preventing effective deployment on raw 3D scans with arbitrary topology. At the same time, modeling controllable emotional dynamics beyond lip articulation remains challenging, and is often tied to template-based parameterizations. We address these challenges by proposing FreeTalk, a two-stage framework for emotion-conditioned 3D talking-head animation that generalizes to unregistered face meshes with arbitrary vertex count and connectivity. First, Audio-To-Sparse (ATS) predicts a temporally coherent sequence of 3D landmark displacements from speech audio, conditioned on an emotion category and intensity. This sparse representation captures both articulatory and affective motion while remaining independent of mesh topology. Second, Sparse-To-Mesh (STM) transfers the predicted landmark motion to a target mesh by combining intrinsic surface features with landmark-to-vertex conditioning, producing dense per-vertex deformations without template fitting or correspondence supervision at test time. Extensive experiments show that FreeTalk matches specialized baselines when trained in-domain, while providing substantially improved robustness to unseen identities and mesh topologies. Code and pre-trained models will be made publicly available.", "link": "http://arxiv.org/abs/2603.15512v1", "date": "2026-03-16", "relevancy": 2.9778, "topK": [{"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.5967}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.5967}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5933}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FreeTalk%3A%20Emotional%20Topology-Free%203D%20Talking%20Heads&body=Title%3A%20FreeTalk%3A%20Emotional%20Topology-Free%203D%20Talking%20Heads%0AAuthor%3A%20Federico%20Nocentini%20and%20Thomas%20Besnier%20and%20Claudio%20Ferrari%20and%20Stefano%20Berretti%20and%20Mohamed%20Daoudi%0AAbstract%3A%20Speech-driven%203D%20facial%20animation%20has%20advanced%20rapidly%2C%20yet%20most%20approaches%20remain%20tied%20to%20registered%20template%20meshes%2C%20preventing%20effective%20deployment%20on%20raw%203D%20scans%20with%20arbitrary%20topology.%20At%20the%20same%20time%2C%20modeling%20controllable%20emotional%20dynamics%20beyond%20lip%20articulation%20remains%20challenging%2C%20and%20is%20often%20tied%20to%20template-based%20parameterizations.%20We%20address%20these%20challenges%20by%20proposing%20FreeTalk%2C%20a%20two-stage%20framework%20for%20emotion-conditioned%203D%20talking-head%20animation%20that%20generalizes%20to%20unregistered%20face%20meshes%20with%20arbitrary%20vertex%20count%20and%20connectivity.%20First%2C%20Audio-To-Sparse%20%28ATS%29%20predicts%20a%20temporally%20coherent%20sequence%20of%203D%20landmark%20displacements%20from%20speech%20audio%2C%20conditioned%20on%20an%20emotion%20category%20and%20intensity.%20This%20sparse%20representation%20captures%20both%20articulatory%20and%20affective%20motion%20while%20remaining%20independent%20of%20mesh%20topology.%20Second%2C%20Sparse-To-Mesh%20%28STM%29%20transfers%20the%20predicted%20landmark%20motion%20to%20a%20target%20mesh%20by%20combining%20intrinsic%20surface%20features%20with%20landmark-to-vertex%20conditioning%2C%20producing%20dense%20per-vertex%20deformations%20without%20template%20fitting%20or%20correspondence%20supervision%20at%20test%20time.%20Extensive%20experiments%20show%20that%20FreeTalk%20matches%20specialized%20baselines%20when%20trained%20in-domain%2C%20while%20providing%20substantially%20improved%20robustness%20to%20unseen%20identities%20and%20mesh%20topologies.%20Code%20and%20pre-trained%20models%20will%20be%20made%20publicly%20available.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15512v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFreeTalk%253A%2520Emotional%2520Topology-Free%25203D%2520Talking%2520Heads%26entry.906535625%3DFederico%2520Nocentini%2520and%2520Thomas%2520Besnier%2520and%2520Claudio%2520Ferrari%2520and%2520Stefano%2520Berretti%2520and%2520Mohamed%2520Daoudi%26entry.1292438233%3DSpeech-driven%25203D%2520facial%2520animation%2520has%2520advanced%2520rapidly%252C%2520yet%2520most%2520approaches%2520remain%2520tied%2520to%2520registered%2520template%2520meshes%252C%2520preventing%2520effective%2520deployment%2520on%2520raw%25203D%2520scans%2520with%2520arbitrary%2520topology.%2520At%2520the%2520same%2520time%252C%2520modeling%2520controllable%2520emotional%2520dynamics%2520beyond%2520lip%2520articulation%2520remains%2520challenging%252C%2520and%2520is%2520often%2520tied%2520to%2520template-based%2520parameterizations.%2520We%2520address%2520these%2520challenges%2520by%2520proposing%2520FreeTalk%252C%2520a%2520two-stage%2520framework%2520for%2520emotion-conditioned%25203D%2520talking-head%2520animation%2520that%2520generalizes%2520to%2520unregistered%2520face%2520meshes%2520with%2520arbitrary%2520vertex%2520count%2520and%2520connectivity.%2520First%252C%2520Audio-To-Sparse%2520%2528ATS%2529%2520predicts%2520a%2520temporally%2520coherent%2520sequence%2520of%25203D%2520landmark%2520displacements%2520from%2520speech%2520audio%252C%2520conditioned%2520on%2520an%2520emotion%2520category%2520and%2520intensity.%2520This%2520sparse%2520representation%2520captures%2520both%2520articulatory%2520and%2520affective%2520motion%2520while%2520remaining%2520independent%2520of%2520mesh%2520topology.%2520Second%252C%2520Sparse-To-Mesh%2520%2528STM%2529%2520transfers {"title": "Evaluating Time Awareness and Cross-modal Active Perception of Large Models via 4D Escape Room Task", "author": "Yurui Dong and Ziyue Wang and Shuyun Lu and Dairu Liu and Xuechen Liu and Fuwen Luo and Peng Li and Yang Liu", "abstract": "Multimodal Large Language Models (MLLMs) have recently made rapid progress toward unified Omni models that integrate vision, language, and audio. However, existing environments largely focus on 2D or 3D visual context and vision-language tasks, offering limited support for temporally dependent auditory signals and selective cross-modal integration, where different modalities may provide complementary or interfering information, which are essential capabilities for realistic multimodal reasoning. As a result, whether models can actively coordinate modalities and reason under time-varying, irreversible conditions remains underexplored. To this end, we introduce \\textbf{EscapeCraft-4D}, a customizable 4D environment for assessing selective cross-modal perception and time awareness in Omni models. It incorporates trigger-based auditory sources, temporally transient evidence, and location-dependent cues, requiring agents to perform spatio-temporal reasoning and proactive multimodal integration under time constraints. Building on this environment, we curate a benchmark to evaluate corresponding abilities across powerful models. Evaluation results suggest that models struggle with modality bias, and reveal significant gaps in current model's ability to integrate multiple modalities under time constraints. Further in-depth analysis uncovers how multiple modalities interact and jointly influence model decisions in complex multimodal reasoning environments.", "link": "http://arxiv.org/abs/2603.15467v1", "date": "2026-03-16", "relevancy": 2.9701, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6102}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6102}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5617}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Evaluating%20Time%20Awareness%20and%20Cross-modal%20Active%20Perception%20of%20Large%20Models%20via%204D%20Escape%20Room%20Task&body=Title%3A%20Evaluating%20Time%20Awareness%20and%20Cross-modal%20Active%20Perception%20of%20Large%20Models%20via%204D%20Escape%20Room%20Task%0AAuthor%3A%20Yurui%20Dong%20and%20Ziyue%20Wang%20and%20Shuyun%20Lu%20and%20Dairu%20Liu%20and%20Xuechen%20Liu%20and%20Fuwen%20Luo%20and%20Peng%20Li%20and%20Yang%20Liu%0AAbstract%3A%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20have%20recently%20made%20rapid%20progress%20toward%20unified%20Omni%20models%20that%20integrate%20vision%2C%20language%2C%20and%20audio.%20However%2C%20existing%20environments%20largely%20focus%20on%202D%20or%203D%20visual%20context%20and%20vision-language%20tasks%2C%20offering%20limited%20support%20for%20temporally%20dependent%20auditory%20signals%20and%20selective%20cross-modal%20integration%2C%20where%20different%20modalities%20may%20provide%20complementary%20or%20interfering%20information%2C%20which%20are%20essential%20capabilities%20for%20realistic%20multimodal%20reasoning.%20As%20a%20result%2C%20whether%20models%20can%20actively%20coordinate%20modalities%20and%20reason%20under%20time-varying%2C%20irreversible%20conditions%20remains%20underexplored.%20To%20this%20end%2C%20we%20introduce%20%5Ctextbf%7BEscapeCraft-4D%7D%2C%20a%20customizable%204D%20environment%20for%20assessing%20selective%20cross-modal%20perception%20and%20time%20awareness%20in%20Omni%20models.%20It%20incorporates%20trigger-based%20auditory%20sources%2C%20temporally%20transient%20evidence%2C%20and%20location-dependent%20cues%2C%20requiring%20agents%20to%20perform%20spatio-temporal%20reasoning%20and%20proactive%20multimodal%20integration%20under%20time%20constraints.%20Building%20on%20this%20environment%2C%20we%20curate%20a%20benchmark%20to%20evaluate%20corresponding%20abilities%20across%20powerful%20models.%20Evaluation%20results%20suggest%20that%20models%20struggle%20with%20modality%20bias%2C%20and%20reveal%20significant%20gaps%20in%20current%20model%27s%20ability%20to%20integrate%20multiple%20modalities%20under%20time%20constraints.%20Further%20in-depth%20analysis%20uncovers%20how%20multiple%20modalities%20interact%20and%20jointly%20influence%20model%20decisions%20in%20complex%20multimodal%20reasoning%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15467v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEvaluating%2520Time%2520Awareness%2520and%2520Cross-modal%2520Active%2520Perception%2520of%2520Large%2520Models%2520via%25204D%2520Escape%2520Room%2520Task%26entry.906535625%3DYurui%2520Dong%2520and%2520Ziyue%2520Wang%2520and%2520Shuyun%2520Lu%2520and%2520Dairu%2520Liu%2520and%2520Xuechen%2520Liu%2520and%2520Fuwen%2520Luo%2520and%2520Peng%2520Li%2520and%2520Yang%2520Liu%26entry.1292438233%3DMultimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520have%2520recently%2520made%2520rapid%2520progress%2520toward%2520unified%2520Omni%2520models%2520that%2520integrate%2520vision%252C%2520language%252C%2520and%2520audio.%2520However%252C%2520existing%2520environments%2520largely%2520focus%2520on%25202D%2520or%25203D%2520visual%2520context%2520and%2520vision-language%2520tasks%252C%2520offering%2520limited%2520support%2520for%2520temporally%2520dependent%2520auditory%2520signals%2520and%2520selective%2520cross-modal%2520integration%252C%2520where%2520different%2520modalities%2520may%2520provide%2520complementary%2520or%2520interfering%2520information%252C%2520which%2520are%2520essential%2520capabilities%25 {"title": "Look Before Acting: Enhancing Vision Foundation Representations for Vision-Language-Action Models", "author": "Yulin Luo and Hao Chen and Zhuangzhe Wu and Bowen Sui and Jiaming Liu and Chenyang Gu and Zhuoyang Liu and Qiuxuan Feng and Jiale Yu and Shuo Gu and Peng Jia and Pheng-Ann Heng and Shanghang Zhang", "abstract": "Vision-Language-Action (VLA) models have recently emerged as a promising paradigm for robotic manipulation, in which reliable action prediction critically depends on accurately interpreting and integrating visual observations conditioned on language instructions. Although recent works have sought to enhance the visual capabilities of VLA models, most approaches treat the LLM backbone as a black box, providing limited insight into how visual information is grounded into action generation. Therefore, we perform a systematic analysis of multiple VLA models across different action-generation paradigms and observe that sensitivity to visual tokens progressively decreases in deeper layers during action generation. Motivated by this observation, we propose \\textbf{DeepVision-VLA}, built on a \\textbf{Vision-Language Mixture-of-Transformers (VL-MoT)} framework. This framework enables shared attention between the vision foundation model and the VLA backbone, injecting multi-level visual features from the vision expert into deeper layers of the VLA backbone to enhance visual representations for precise and complex manipulation. In addition, we introduce \\textbf{Action-Guided Visual Pruning (AGVP)}, which leverages shallow-layer attention to prune irrelevant visual tokens while preserving task-relevant ones, reinforcing critical visual cues for manipulation with minimal computational overhead. DeepVision-VLA outperforms prior state-of-the-art methods by 9.0\\% and 7.5\\% on simulated and real-world tasks, respectively, providing new insights for the design of visually enhanced VLA models.", "link": "http://arxiv.org/abs/2603.15618v1", "date": "2026-03-16", "relevancy": 2.9332, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6082}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6082}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5434}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Look%20Before%20Acting%3A%20Enhancing%20Vision%20Foundation%20Representations%20for%20Vision-Language-Action%20Models&body=Title%3A%20Look%20Before%20Acting%3A%20Enhancing%20Vision%20Foundation%20Representations%20for%20Vision-Language-Action%20Models%0AAuthor%3A%20Yulin%20Luo%20and%20Hao%20Chen%20and%20Zhuangzhe%20Wu%20and%20Bowen%20Sui%20and%20Jiaming%20Liu%20and%20Chenyang%20Gu%20and%20Zhuoyang%20Liu%20and%20Qiuxuan%20Feng%20and%20Jiale%20Yu%20and%20Shuo%20Gu%20and%20Peng%20Jia%20and%20Pheng-Ann%20Heng%20and%20Shanghang%20Zhang%0AAbstract%3A%20Vision-Language-Action%20%28VLA%29%20models%20have%20recently%20emerged%20as%20a%20promising%20paradigm%20for%20robotic%20manipulation%2C%20in%20which%20reliable%20action%20prediction%20critically%20depends%20on%20accurately%20interpreting%20and%20integrating%20visual%20observations%20conditioned%20on%20language%20instructions.%20Although%20recent%20works%20have%20sought%20to%20enhance%20the%20visual%20capabilities%20of%20VLA%20models%2C%20most%20approaches%20treat%20the%20LLM%20backbone%20as%20a%20black%20box%2C%20providing%20limited%20insight%20into%20how%20visual%20information%20is%20grounded%20into%20action%20generation.%20Therefore%2C%20we%20perform%20a%20systematic%20analysis%20of%20multiple%20VLA%20models%20across%20different%20action-generation%20paradigms%20and%20observe%20that%20sensitivity%20to%20visual%20tokens%20progressively%20decreases%20in%20deeper%20layers%20during%20action%20generation.%20Motivated%20by%20this%20observation%2C%20we%20propose%20%5Ctextbf%7BDeepVision-VLA%7D%2C%20built%20on%20a%20%5Ctextbf%7BVision-Language%20Mixture-of-Transformers%20%28VL-MoT%29%7D%20framework.%20This%20framework%20enables%20shared%20attention%20between%20the%20vision%20foundation%20model%20and%20the%20VLA%20backbone%2C%20injecting%20multi-level%20visual%20features%20from%20the%20vision%20expert%20into%20deeper%20layers%20of%20the%20VLA%20backbone%20to%20enhance%20visual%20representations%20for%20precise%20and%20complex%20manipulation.%20In%20addition%2C%20we%20introduce%20%5Ctextbf%7BAction-Guided%20Visual%20Pruning%20%28AGVP%29%7D%2C%20which%20leverages%20shallow-layer%20attention%20to%20prune%20irrelevant%20visual%20tokens%20while%20preserving%20task-relevant%20ones%2C%20reinforcing%20critical%20visual%20cues%20for%20manipulation%20with%20minimal%20computational%20overhead.%20DeepVision-VLA%20outperforms%20prior%20state-of-the-art%20methods%20by%209.0%5C%25%20and%207.5%5C%25%20on%20simulated%20and%20real-world%20tasks%2C%20respectively%2C%20providing%20new%20insights%20for%20the%20design%20of%20visually%20enhanced%20VLA%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15618v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLook%2520Before%2520Acting%253A%2520Enhancing%2520Vision%2520Foundation%2520Representations%2520for%2520Vision-Language-Action%2520Models%26entry.906535625%3DYulin%2520Luo%2520and%2520Hao%2520Chen%2520and%2520Zhuangzhe%2520Wu%2520and%2520Bowen%2520Sui%2520and%2520Jiaming%2520Liu%2520and%2520Chenyang%2520Gu%2520and%2520Zhuoyang%2520Liu%2520and%2520Qiuxuan%2520Feng%2520and%2520Jiale%2520Yu%2520and%2520Shuo%2520Gu%2520and%2520Peng%2520Jia%2520and%2520Pheng-Ann%2520Heng%2520and%2520Shanghang%2520Zhang%26entry.1292438233%3DVision-Language-Action%2520%2528VLA%2529%2520models%2520have%2520recently%2520emerged%252 {"title": "Confusion-Aware In-Context-Learning for Vision-Language Models in Robotic Manipulation", "author": "Yayun He and Zuheng Kang and Botao Zhao and Zhouyin Wu and Junqing Peng and Jianzong Wang", "abstract": "Vision-language models (VLMs) have significantly improved the generalization capabilities of robotic manipulation. However, VLM-based systems often suffer from a lack of robustness, leading to unpredictable errors, particularly in scenarios involving confusable objects. Our preliminary analysis reveals that these failures are mainly caused by shortcut learning problem inherently in VLMs, limiting their ability to accurately distinguish between confusable features. To this end, we propose Confusion-Aware In-Context Learning (CAICL), a method that enhances VLM performance in confusable scenarios for robotic manipulation. The approach begins with confusion localization and analysis, identifying potential sources of confusion. This information is then used as a prompt for the VLM to focus on features most likely to cause misidentification. Extensive experiments on the VIMA-Bench show that CAICL effectively addresses the shortcut learning issue, achieving a 85.5\\% success rate and showing good stability across tasks with different degrees of generalization.", "link": "http://arxiv.org/abs/2603.15134v1", "date": "2026-03-16", "relevancy": 2.9044, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.6095}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5666}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5666}], "mailto": 38667208%3Dhttp%253A//arxiv.org/abs/2603.15134v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Confusion-Aware%20In-Context-Learning%20for%20Vision-Language%20Models%20in%20Robotic%20Manipulation&entry.906535625=Yayun%20He%20and%20Zuheng%20Kang%20and%20Botao%20Zhao%20and%20Zhouyin%20Wu%20and%20Junqing%20Peng%20and%20Jianzong%20Wang&entry.1292438233=Vision-language%20models%20%28VLMs%29%20have%20significantly%20improved%20the%20generalization%20capabilities%20of%20robotic%20manipulation.%20However%2C%20VLM-based%20systems%20often%20suffer%20from%20a%20lack%20of%20robustness%2C%20leading%20to%20unpredictable%20errors%2C%20particularly%20in%20scenarios%20involving%20confusable%20objects.%20Our%20preliminary%20analysis%20reveals%20that%20these%20failures%20are%20mainly%20caused%20by%20shortcut%20learning%20problem%20inherently%20in%20VLMs%2C%20limiting%20their%20ability%20to%20accurately%20distinguish%20between%20confusable%20features.%20To%20this%20end%2C%20we%20propose%20Confusion-Aware%20In-Context%20Learning%20%28CAICL%29%2C%20a%20method%20that%20enhances%20VLM%20performance%20in%20confusable%20scenarios%20for%20robotic%20manipulation.%20The%20approach%20begins%20with%20confusion%20localization%20and%20analysis%2C%20identifying%20potential%20sources%20of%20confusion.%20This%20information%20is%20then%20used%20as%20a%20prompt%20for%20the%20VLM%20to%20focus%20on%20features%20most%20likely%20to%20cause%20misidentification.%20Extensive%20experiments%20on%20the%20VIMA-Bench%20show%20that%20CAICL%20effectively%20addresses%20the%20shortcut%20learning%20issue%2C%20achieving%20a%2085.5%5C%25%20success%20rate%20and%20showing%20good%20stability%20across%20tasks%20with%20different%20degrees%20of%20generalization.&entry.1838667208=http%3A//arxiv.org/abs/2603.15134v1&entry.124074799=Read"},
{"title": "Question-guided Visual Compression with Memory Feedback for Long-Term Video Understanding", "author": "Sosuke Yamao and Natsuki Miyahara and Yuankai Qi and Shun Takeuchi", "abstract": "In the context of long-term video understanding with large multimodal models, many frameworks have been proposed. Although transformer-based visual compressors and memory-augmented approaches are often used to process long videos, they usually compress each frame independently and therefore fail to achieve strong performance on tasks that require understanding complete events, such as temporal ordering tasks in MLVU and VNBench. This motivates us to rethink the conventional one-way scheme from perception to memory, and instead establish a feedbackdriven process in which past visual contexts stored in the context memory can benefit ongoing perception. To this end, we propose Question-guided Visual Compression with Memory Feedback (QViC-MF), a framework for long-term video understanding. At its core is a Question-guided Multimodal Selective Attention (QMSA), which learns to preserve visual information related to the given question from both the current clip and the past related frames from the memory. The compressor and memory feedback work iteratively for each clip of the entire video. This simple yet effective design yields large performance gains on longterm video understanding tasks. Extensive experiments show that our method achieves significant improvement over current state-of-the-art methods by 6.1% on MLVU test, 8.3% on LVBench, 18.3% on VNBench Long, and 3.7% on VideoMME Long. The code will be released publicly.", "link": "http://arxiv.org/abs/2603.15167v1", "date": "2026-03-16", "relevancy": 2.9018, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5861}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5861}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5689}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Question-guided%20Visual%20Compression%20with%20Memory%20Feedback%20for%20Long-Term%20Video%20Understanding&body=Title%3A%20Question-guided%20Visual%20Compression%20with%20Memory%20Feedback%20for%20Long-Term%20Video%20Understanding%0AAuthor%3A%20Sosuke%20Yamao%20and%20Natsuki%20Miyahara%20and%20Yuankai%20Qi%20and%20Shun%20Takeuchi%0AAbstract%3A%20In%20the%20context%20of%20long-term%20video%20understanding%20with%20large%20multimodal%20models%2C%20many%20frameworks%20have%20been%20proposed.%20Although%20transformer-based%20visual%20compressors%20and%20memory-augmented%20approaches%20are%20often%20used%20to%20process%20long%20videos%2C%20they%20usually%20compress%20each%20frame%20independently%20and%20therefore%20fail%20to%20achieve%20strong%20performance%20on%20tasks%20that%20require%20understanding%20complete%20events%2C%20such%20as%20temporal%20ordering%20tasks%20in%20MLVU%20and%20VNBench.%20This%20motivates%20us%20to%20rethink%20the%20conventional%20one-way%20scheme%20from%20perception%20to%20memory%2C%20and%20instead%20establish%20a%20feedbackdriven%20process%20in%20which%20past%20visual%20contexts%20stored%20in%20the%20context%20memory%20can%20benefit%20ongoing%20perception.%20To%20this%20end%2C%20we%20propose%20Question-guided%20Visual%20Compression%20with%20Memory%20Feedback%20%28QViC-MF%29%2C%20a%20framework%20for%20long-term%20video%20understanding.%20At%20its%20core%20is%20a%20Question-guided%20Multimodal%20Selective%20Attention%20%28QMSA%29%2C%20which%20learns%20to%20preserve%20visual%20information%20related%20to%20the%20given%20question%20from%20both%20the%20current%20clip%20and%20the%20past%20related%20frames%20from%20the%20memory.%20The%20compressor%20and%20memory%20feedback%20work%20iter {"title": "Generative Video Compression with One-Dimensional Latent Representation", "author": "Zihan Zheng and Zhaoyang Jia and Naifu Xue and Jiahao Li and Bin Li and Zongyu Guo and Xiaoyi Zhang and Zhenghao Chen and Houqiang Li and Yan Lu", "abstract": "Recent advancements in generative video codec (GVC) typically encode video into a 2D latent grid and employ high-capacity generative decoders for reconstruction. However, this paradigm still leaves two key challenges in fully exploiting spatial-temporal redundancy: Spatially, the 2D latent grid inevitably preserves intra-frame redundancy due to its rigid structure, where adjacent patches remain highly similar, thereby necessitating a higher bitrate. Temporally, the 2D latent grid is less effective for modeling long-term correlations in a compact and semantically coherent manner, as it hinders the aggregation of common contents across frames. To address these limitations, we introduce Generative Video Compression with One-Dimensional (1D) Latent Representation (GVC1D). GVC1D encodes the video data into extreme compact 1D latent tokens conditioned on both short- and long-term contexts. Without the rigid 2D spatial correspondence, these 1D latent tokens can adaptively attend to semantic regions and naturally facilitate token reduction, thereby reducing spatial redundancy. Furthermore, the proposed 1D memory provides semantically rich long-term context while maintaining low computational cost, thereby further reducing temporal redundancy. Experimental results indicate that GVC1D attains superior compression efficiency, where it achieves bitrate reductions of 60.4\\% under LPIPS and 68.8\\% under DISTS on the HEVC Class B dataset, surpassing the previous video compression methods.Project: https://gvc1d.github.io/", "link": "http://arxiv.org/abs/2603.15302v1", "date": "2026-03-16", "relevancy": 2.8905, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6077}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5643}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5623}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generative%20Video%20Compression%20with%20One-Dimensional%20Latent%20Representation&body=Title%3A%20Generative%20Video%20Compression%20with%20One-Dimensional%20Latent%20Representation%0AAuthor%3A%20Zihan%20Zheng%20and%20Zhaoyang%20Jia%20and%20Naifu%20Xue%20and%20Jiahao%20Li%20and%20Bin%20Li%20and%20Zongyu%20Guo%20and%20Xiaoyi%20Zhang%20and%20Zhenghao%20Chen%20and%20Houqiang%20Li%20and%20Yan%20Lu%0AAbstract%3A%20Recent%20advancements%20in%20generative%20video%20codec%20%28GVC%29%20typically%20encode%20video%20into%20a%202D%20latent%20grid%20and%20employ%20high-capacity%20generative%20decoders%20for%20reconstruction.%20However%2C%20this%20paradigm%20still%20leaves%20two%20key%20challenges%20in%20fully%20exploiting%20spatial-temporal%20redundancy%3A%20Spatially%2C%20the%202D%20latent%20grid%20inevitably%20preserves%20intra-frame%20redundancy%20due%20to%20its%20rigid%20structure%2C%20where%20adjacent%20patches%20remain%20highly%20similar%2C%20thereby%20necessitating%20a%20higher%20bitrate.%20Temporally%2C%20the%202D%20latent%20grid%20is%20less%20effective%20for%20modeling%20long-term%20correlations%20in%20a%20compact%20and%20semantically%20coherent%20manner%2C%20as%20it%20hinders%20the%20aggregation%20of%20common%20contents%20across%20frames.%20To%20address%20these%20limitations%2C%20we%20introduce%20Generative%20Video%20Compression%20with%20One-Dimensional%20%281D%29%20Latent%20Representation%20%28GVC1D%29.%20GVC1D%20encodes%20the%20video%20data%20into%20extreme%20compact%201D%20latent%20tokens%20conditioned%20on%20both%20short-%20and%20long-term%20contexts.%20Without%20the%20rigid%202D%20spatial%20correspondence%2C%20these%201D%20latent%20tokens%20can%20adaptively%20attend%20to%20semantic%20regions%20and%20naturally%20facilitate%20token%20reduction%2C%20thereby%20reducing%20spatial%20redundancy.%20Furthermore%2C%20the%20proposed%201D%20memory%20provides%20semantically%20rich%20long-term%20context%20while%20maintaining%20low%20computational%20cost%2C%20thereby%20further%20reducing%20temporal%20redundancy.%20Experimental%20results%20indicate%20that%20GVC1D%20attains%20superior%20compression%20efficiency%2C%20where%20it%20achieves%20bitrate%20reductions%20of%2060.4%5C%25%20under%20LPIPS%20and%2068.8%5C%25%20under%20DISTS%20on%20the%20HEVC%20Class%20B%20dataset%2C%20surpassing%20the%20previous%20video%20compression%20methods.Project%3A%20https%3A//gvc1d.github.io/%0ALink%3A%20http%3A//arxiv.org/abs/2603.15302v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGenerative%2520Video%2520Compression%2520with%2520One-Dimensional%2520Latent%2520Representation%26entry.906535625%3DZihan%2520Zheng%2520and%2520Zhaoyang%2520Jia%2520and%2520Naifu%2520Xue%2520and%2520Jiahao%2520Li%2520and%2520Bin%2520Li%2520and%2520Zongyu%2520Guo%2520and%2520Xiaoyi%2520Zhang%2520and%2520Zhenghao%2520Chen%2520and%2520Houqiang%2520Li%2520and%2520Yan%2520Lu%26entry.1292438233%3DRecent%2520advancements%2520in%2520generative%2520video%2520codec%2520%2528GVC%2529%2520typically%2520encode%2520video%2520into%2520a%25202D%2520latent%2520grid%2520and%2520employ%2520high-capacity%2520generative%2520decoders%2520for%2520reconstruction.%2520However%252C%2520this%2520paradigm%2520still%2520leaves%2520two%2520key%2520challenges%2520in%2520fully%2520exploiting%2520spatial-temporal%2520redundancy%253A%2520Spatially%252C%2520the%25202D%2520latent%2520grid%2520inevitably%2520preserves%2520intra-frame%2520redundancy%2520due%2520to%2520its%2520rigid%2520structure%252C%2520where%2520adjacent {"title": "Self-Distillation of Hidden Layers for Self-Supervised Representation Learning", "author": "Scott C. Lowe and Anthony Fuller and Sageev Oore and Evan Shelhamer and Graham W. Taylor", "abstract": "The landscape of self-supervised learning (SSL) is currently dominated by generative approaches (e.g., MAE) that reconstruct raw low-level data, and predictive approaches (e.g., I-JEPA) that predict high-level abstract embeddings. While generative methods provide strong grounding, they are computationally inefficient for high-redundancy modalities like imagery, and their training objective does not prioritize learning high-level, conceptual features. Conversely, predictive methods often suffer from training instability due to their reliance on the non-stationary targets of final-layer self-distillation. We introduce Bootleg, a method that bridges this divide by tasking the model with predicting latent representations from multiple hidden layers of a teacher network. This hierarchical objective forces the model to capture features at varying levels of abstraction simultaneously. We demonstrate that Bootleg significantly outperforms comparable baselines (+10% over I-JEPA) on classification of ImageNet-1K and iNaturalist-21, and semantic segmentation of ADE20K and Cityscapes.", "link": "http://arxiv.org/abs/2603.15553v1", "date": "2026-03-16", "relevancy": 2.869, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.6287}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5777}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5149}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Self-Distillation%20of%20Hidden%20Layers  "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Self-Distillation%20of%20Hidden%20Layers%20for%20Self-Supervised%20Representation%20Learning&entry.906535625=Scott%20C.%20Lowe%20and%20Anthony%20Fuller%20and%20Sageev%20Oore%20and%20Evan%20Shelhamer%20and%20Graham%20W.%20Taylor&entry.1292438233=The%20landscape%20of%20self-supervised%20learning%20%28SSL%29%20is%20currently%20dominated%20by%20generative%20approaches%20%28e.g.%2C%20MAE%29%20that%20reconstruct%20raw%20low-level%20data%2C%20and%20predictive%20approaches%20%28e.g.%2C%20I-JEPA%29%20that%20predict%20high-level%20abstract%20embeddings.%20While%20generative%20methods%20provide%20strong%20grounding%2C%20they%20are%20computationally%20inefficient%20for%20high-redundancy%20modalities%20like%20imagery%2C%20and%20their%20training%20objective%20does%20not%20prioritize%20learning%20high-level%2C%20conceptual%20features.%20Conversely%2C%20predictive%20methods%20often%20suffer%20from%20training%20instability%20due%20to%20their%20reliance%20on%20the%20non-stationary%20targets%20of%20final-layer%20self-distillation.%20We%20introduce%20Bootleg%2C%20a%20method%20that%20bridges%20this%20divide%20by%20tasking%20the%20model%20with%20predicting%20latent%20representations%20from%20multiple%20hidden%20layers%20of%20a%20teacher%20network.%20This%20hierarchical%20objective%20forces%20the%20model%20to%20capture%20features%20at%20varying%20levels%20of%20abstraction%20simultaneously.%20We%20demonstrate%20that%20Bootleg%20significantly%20outperforms%20comparable%20baselines%20%28%2B10%25%20over%20I-JEPA%29%20on%20classification%20of%20ImageNet-1K%20and%20iNaturalist-21%2C%20and%20semantic%20segmentation%20of%20ADE20K%20and%20Cityscapes.&entry.1838667208=http%3A//arxiv.org/abs/2603.15553v1&entry.124074799=Read"},
{"title": "ECHO: Ego-Centric modeling of Human-Object interactions", "author": "Ilya A. Petrov and Vladimir Guzov and Riccardo Marin and Emre Aksan and Xu Chen and Daniel Cremers and Thabo Beeler and Gerard Pons-Moll", "abstract": "Modeling human-object interactions (HOI) from an egocentric perspective is a critical yet challenging task, particularly when relying on sparse signals from wearable devices like smart glasses and watches. We present ECHO, the first unified framework to jointly recover human pose, object motion, and contact dynamics solely from head and wrist tracking. To tackle the underconstrained nature of this problem, we introduce a novel tri-variate diffusion process with independent noise schedules that models the mutual dependencies between the human, object, and interaction modalities. This formulation allows ECHO to operate with flexible input configurations, making it robust to intermittent tracking and capable of leveraging partial observations. Crucially, it enables training on a combination of large-scale human motion datasets and smaller HOI collections, learning strong priors while capturing interaction nuances. Furthermore, we employ a smooth inpainting inference mechanism that enables the generation of temporally consistent interactions for arbitrarily long sequences. Extensive evaluations demonstrate that ECHO achieves state-of-the-art performance, significantly outperforming existing methods lacking such flexibility.", "link": "http://arxiv.org/abs/2508.21556v2", "date": "2026-03-16", "relevancy": 2.8637, "topK": [{"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5899}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5824}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https:/ {"title": "The Good, the Better, and the Best: Improving the Discriminability of Face Embeddings through Attribute-aware Learning", "author": "Ana Dias and Jo\u00e3o Ribeiro Pinto and Hugo Proen\u00e7a and Jo\u00e3o C. Neves", "abstract": "Despite recent advances in face recognition, robust performance remains challenging under large variations in age, pose, and occlusion. A common strategy to address these issues is to guide representation learning with auxiliary supervision from facial attributes, encouraging the visual encoder to focus on identity-relevant regions. However, existing approaches typically rely on heterogeneous and fixed sets of attributes, implicitly assuming equal relevance across attributes. This assumption is suboptimal, as different attributes exhibit varying discriminative power for identity recognition, and some may even introduce harmful biases. In this paper, we propose an attribute-aware face recognition architecture that supervises the learning of facial embeddings using identity class labels, identity-relevant facial attributes, and non-identity-related attributes. Facial attributes are organized into interpretable groups, making it possible to decompose and analyze their individual contributions in a human-understandable manner. Experiments on standard face verification benchmarks demonstrate that joint learning of identity and facial attributes improves the discriminability of face embeddings with two major conclusions: (i) using identity-relevant subsets of facial attributes consistently outperforms supervision with a broader attribute set, and (ii) explicitly forcing embeddings to unlearn non-identity-related attributes yields further performance gains compared to leaving such attributes unsupervised. Additionally, our method serves as a diagnostic tool for assessing the trustworthiness of face recognition encoders by allowing for the measurement of accuracy gains with suppression of non-identity-relevant attributes, with such gains {"title": "GeoMotionGPT: Geometry-Aligned Motion Understanding with Large Language Models", "author": "Zhankai Ye and Bofan Li and Yukai Jin and Shuoqiu Li and Wei Wang and Yanfu Zhang and Shangqian Gao and Xin Liu", "abstract": "Discrete motion tokenization has recently enabled Large Language Models (LLMs) to serve as versatile backbones for motion understanding and motion-language reasoning. However, existing pipelines typically decouple motion quantization from semantic embedding learning, linking them solely via token IDs. This approach fails to effectively align the intrinsic geometry of the motion space with the embedding space, thereby hindering the LLM's capacity for nuanced motion reasoning. We argue that alignment is most effective when both modalities share a unified geometric basis. Therefore, instead of forcing the LLM to reconstruct the complex geometry among motion tokens from scratch, we present a novel framework that explicitly enforces orthogonality on both the motion codebook and the LLM embedding space, ensuring that their relational structures naturally mirror each other. Specifically, we employ a decoder-only quantizer with Gumbel-Softmax for differentiable training and balanced codebook usage. To bridge the modalities, we use a sparse projection that maps motion codes into the LLM embedding space while preserving orthogonality. Finally, a two-stage orthonormal regularization schedule enforces soft constraints during tokenizer training and LLM fine-tuning to maintain geometric alignment without hindering semantic adaptation. Extensive experiments show that our framework improves the aggregated Average by 22.4% over the strongest baseline on HumanML3D and by 14.4% on KIT-ML, while ablations confirm the effectiveness of the tokenizer, projection, and regularization designs.", "link": "http://arxiv.org/abs/2601.07632v3", "date": "2026-03-16", "relevancy": 2.8407, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5757}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.575}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5538}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GeoMotionGPT%3A%20Geometry-Aligned%20Motion%20Understanding%20with%20Large%20Language%20Models&body=Title%3A%20GeoMotionGPT%3A%20Geometry-Aligned%20Motion%20Understanding%20with%20Large%20Language%20Models%0AAuthor%3A%20Zhankai%20Ye%20and%20Bofan%20Li%20and%20Yukai%20Jin%20and%20Shuoqiu%20Li%20and%20Wei%20Wang%20and%20Yanfu%20Zhang%20and%20Shangqian%20Gao%20and%20Xin%20Liu%0AAbstract%3A%20Discrete%20motion%20tokenization%20has%20recently%20enabled%20Large%20Language%20Models%20%28LLMs%29%20to%20serve%20as%20versatile%20backbones%20for%20motion%20understanding%20and%20motion-language%20reasoning.%20However%2C%20existing%20pipelines%20typically%20decouple%20motion%20quantization%20from%20semantic%20embedding%20learning%2C%20linking%20them%20solely%20via%20token%20IDs.%20This%20approach%20fails%20to%20effectively%20align%20the%20intrinsic%20geometry%20of%20the%20motion%20space%20with%20the%20embedding%20space%2C%20thereby%20hindering%20the%20LLM%27s%20capacity%20for%20nuanced%20motion%20reasoning.%20We%20argue%20that%20alignment%20is%20most%20effective%20when%20both%20modalities%20share%20a%20unified%20geometric%20basis.%20Therefore%2C%20instead%20of%20forcing%20the%20LLM%20to%20reconstruct%20the%20complex%20geometry%20among%20motion%20tokens%20from%20scratch%2C%20we%20present%20a%20novel%20framework%20that%20explicitly%20enforces%20orthogonality%20on%20both%20the%20motion%20codebook%20and%20the%20LLM%20embedding%20space%2C%20ensuring%20that%20their%20relational%20structures%20naturally%20mirror%20each%20other.%20Specifically%2C%20we%20employ%20a%20decoder-only%20quantizer%20with%20Gumbel-Softmax%20for%20differentiable%20training%20and%20balanced%20codebook%20usage.%20To%20bridge%20the%20modalities%2C%20we%20use%20a%20sparse%20projection%20that%20maps%20motion%20codes%20into%20the%20LLM%20embedding%20space%20while%20preserving%20orthogonality.%20Finally%2C%20a%20two-stage%20orthonormal%20regularization%20schedule%20enforces%20soft%20constraints%20during%20tokenizer%20training%20and%20LLM%20fine-tuning%20to%20maintain%20geometric%20alignment%20without%20hindering%20semantic%20adaptation.%20Extensive%20experiments%20show%20that%20our%20framework%20improves%20the%20aggregated%20Average%20by%2022.4%25%20over%20the%20strongest%20baseline%20on%20HumanML3D%20and%20by%2014.4%25%20on%20KIT-ML%2C%20while%20ablations%20confirm%20the%20effectiveness%20of%20the%20tokenizer%2C%20projection%2C%20and%20regularization%20designs.%0ALink%3A%20http%3A//arxiv.org/abs/2601.07632v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeoMotionGPT%253A%2520Geometry-Aligned%2520Motion%2520Understanding%2520with%2520Large%2520Language%2520Models%26entry.906535625%3DZhankai%2520Ye%2520and%2520Bofan%2520Li%2520and%2520Yukai%2520Jin%2520and%2520Shuoqiu%2520Li%2520and%2520Wei%2520Wang%2520and%2520Yanfu%2520Zhang%2520and%2520Shangqian%2520Gao%2520and%2520Xin%2520Liu%26entry.1292438233%3DDiscrete%2520motion%2520tokenization%2520has%2520recently%2520enabled%2520Large%2520Language%2520Models%2520%2528LLMs%2529%2520to%2520serve%2520as%2520versatile%2520backbones%2520for%2520motion%2520understanding%2520and%2520motion-language%2520reasoning.%2520However%252C%2520existing%2520pipelines%2520typically%2520decouple%2520motion%2520quantization%2520from%2520semantic%2520embedding%2520learning%252C%2520linking%2520them%2520solely%2520via%2520token%2520IDs.%2520This%2520approach%2520fails%2520to%2520effectively%2520al tage%20orthonormal%20regularization%20schedule%20enforces%20soft%20constraints%20during%20tokenizer%20training%20and%20LLM%20fine-tuning%20to%20maintain%20geometric%20alignment%20without%20hindering%20semantic%20adaptation.%20Extensive%20experiments%20show%20that%20our%20framework%20improves%20the%20aggregated%20Average%20by%2022.4%25%20over%20the%20strongest%20baseline%20on%20HumanML3D%20and%20by%2014.4%25%20on%20KIT-ML%2C%20while%20ablations%20confirm%20the%20effectiveness%20of%20the%20tokenizer%2C%20projection%2C%20and%20regularization%20designs.&entry.1838667208=http%3A//arxiv.org/abs/2601.07632v3&entry.124074799=Read"},
{"title": "HYDRA: Unifying Multi-modal Generation and Understanding via Representation-Harmonized Tokenization", "author": "Xuerui Qiu and Yutao Cui and Guozhen Zhang and Junzhe Li and JiaKui Hu and Xiao Zhang and Yang Li and Songtao Liu and Miles Yang and Yu Shi and Zhao Zhong and Liefeng Bo", "abstract": "Unified Multimodal Models struggle to bridge the fundamental gap between the abstract representations needed for visual understanding and the detailed primitives required for generation. Existing approaches typically compromise by employing decoupled encoders, stacking representation encoder atop VAEs, or utilizing discrete quantization. However, these methods often disrupt information coherence and lead to optimization conflicts. To this end, we introduce HYDRA-TOK, a representation-harmonized pure ViT in the insight that visual modeling should evolve from generation to understanding. HYDRA-TOK reformulates the standard backbone into a progressive learner that transitions from a Gen-ViT, which captures structure-preserving primitives, to a Sem-ViT for semantic encoding. Crucially, this transition is mediated by a Generation-Semantic Bottleneck (GSB), which compresses features into a low-dimensional space to filter noise for robust synthesis, then restores dimensionality to empower complex semantic comprehension. Built upon this foundation, we present HYDRA, a native unified framework integrating perception and generation within a single parameter space. Extensive experiments establish HYDRA as a new state-of-the-art. It sets a benchmark in visual reconstruction (rFID 0.08) and achieves top-tier generation performance on GenEval (0.86), DPG-Bench (86.4), and WISE (0.53), while simultaneously outperforming previous native UMMs by an average of 10.0 points across eight challenging understanding benchmarks.", "link": "http://arxiv.org/abs/2603.15228v1", "date": "2026-03-16", "relevancy": 2.8179, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5716}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5648}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5543}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HYDRA%3A%20Unifying%20Multi-modal%20Generation%20and%20Understanding%20via%20Representation-Harmonized%20Tokenization&body=Title%3A%20HYDRA%3A%20Unifying%20Multi-modal%20Generation%20and%20Understanding%20via%20Representation-Harmonized%20Tokenization%0AAuthor%3A%20Xuerui%20Qiu%20and%20Yutao%20Cui%20and%20Guozhen%20Zhang%20and%20Junzhe%20Li%20and%20JiaKui%20Hu%20and%20Xiao%20Zhang%20and%20Yang%20Li%20and%20Songtao%20Liu%20and%20Miles%20Yang%20and%20Yu%20Shi%20and%20Zhao%20Zhong%20and%20Liefeng%20Bo%0AAbstract%3A%20Unified%20Multimodal%20Models%20struggle%20to%20bridge%20the%20fundamental%20gap%20between%20the%20abstract%20representations%20needed%20for%20visual%20understanding%20and%20the%20detailed%20primitives%20required%20for%20generation.%20Existing%20approaches%20typically%20compromise%20by%20employing%20decoupled%20encoders%2C%20stacking%20representation%20encoder%20atop%20VAEs%2C%20or%20utilizing%20discrete%20quantization.%20However%2C%20these%20methods%20often%20disrupt%20information%20coherence%20and%20lead%20to%20optimization%20conflicts.%20To%20this%20end%2C%20we%20introduce%20HYDRA-TOK%2C%20a%20representation-harmonized%20pure%20ViT%20in%20the%20insight%20that%20visual%20modeling%20should%20evolve%20from%20generation%20to%20understanding.%20HYDRA-TOK%20reformulates%20the%20standard%20backbone%20into%20a%20progressive%20learner%20that%20transitions%20from%20a%20Gen-ViT%2C%20which%20captures%20structure-preserving%20primitives%2C%20to%20a%20Sem-ViT%20for%20semantic%20encoding.%20Crucially%2C%20this%20transition%20is%20mediated%20by%20a%20Generation-Semantic%20Bottleneck%20%28GSB%29%2C%20which%20compresses%20features%20into%20a%20low-dimensional%20space%20to%20filter%20noise%20for%20robust%20synthesis%2C%20then%20restores%20dimensionality%20to%20empower%20complex%20semantic%20comprehension.%20Built%20upon%20this%20foundation%2C%20we%20present%20HYDRA%2C%20a%20native%20unified%20framework%20integrating%20perception%20and%20generation%20within%20a%20single%20parameter%20space.%20Extensive%20experiments%20establish%20HYDRA%20as%20a%20new%20state-of-the-art.%20It%20sets%20a%20benchmark%20in%20visual%20reconstruction%20%28rFID%200.08%29%20and%20achieves%20top-tier%20generation%20performance%20on%20GenEval%20%280.86%29%2C%20DPG-Bench%20%2886.4%29%2C%20and%20WISE%20%280.53%29%2C%20while%20simultaneously%20outperforming%20previous%20native%20UMMs%20by%20an%20average%20of%2010.0%20points%20across%20eight%20challenging%20understanding%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15228v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHYDRA%253A%2520Unifying%2520Multi-modal%2520Generation%2520and%2520Understanding%2520via%2520Representation-Harmonized%2520Tokenization%26entry.906535625%3DXuerui%2520Qiu%2520and%2520Yutao%2520Cui%2520and%2520Guozhen%2520Zhang%2520and%2520Junzhe%2520Li%2520and%2520JiaKui%2520Hu%2520and%2520Xiao%2520Zhang%2520and%2520Yang%2520Li%2520and%2520Songtao%2520Liu%2520and%2520Miles%2520Yang%2520and%2520Yu%2520Shi%2520and%2520Zhao%2520Zhong%2520and%2520Liefeng%2520Bo%26entry.1292438233%3DUnified%2520Multimodal%2520Models%2520struggle%2520to%2520bridge%2520the%2520fundamental%2520gap%2520between%2520the%2520abstract%2520representations%2520needed%2520for%2520visual%2520understanding%2520and%2520the%2520detailed%2520primitives%2520required%2520for%2520generation.%2520Existing%2520approaches%2520typically%2520compromise%2520by%2520employing%2520decoupled%2520encoders%252C%2520stacking%2520representation%2520encoder%2520atop%2520VAEs%252C%2520or 03.15228v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=HYDRA%3A%20Unifying%20Multi-modal%20Generation%20and%20Understanding%20via%20Representation-Harmonized%20Tokenization&entry.906535625=Xuerui%20Qiu%20and%20Yutao%20Cui%20and%20Guozhen%20Zhang%20and%20Junzhe%20Li%20and%20JiaKui%20Hu%20and%20Xiao%20Zhang%20and%20Yang%20Li%20and%20Songtao%20Liu%20and%20Miles%20Yang%20and%20Yu%20Shi%20and%20Zhao%20Zhong%20and%20Liefeng%20Bo&entry.1292438233=Unified%20Multimodal%20Models%20struggle%20to%20bridge%20the%20fundamental%20gap%20between%20the%20abstract%20representations%20needed%20for%20visual%20understanding%20and%20the%20detailed%20primitives%20required%20for%20generation.%20Existing%20approaches%20typically%20compromise%20by%20employing%20decoupled%20encoders%2C%20stacking%20representation%20encoder%20atop%20VAEs%2C%20or%20utilizing%20discrete%20quantization.%20However%2C%20these%20methods%20often%20disrupt%20information%20coherence%20and%20lead%20to%20optimization%20conflicts.%20To%20this%20end%2C%20we%20introduce%20HYDRA-TOK%2C%20a%20representation-harmonized%20pure%20ViT%20in%20the%20insight%20that%20visual%20modeling%20should%20evolve%20from%20generation%20to%20understanding.%20HYDRA-TOK%20reformulates%20the%20standard%20backbone%20into%20a%20progressive%20learner%20that%20transitions%20from%20a%20Gen-ViT%2C%20which%20captures%20structure-preserving%20primitives%2C%20to%20a%20Sem-ViT%20for%20semantic%20encoding.%20Crucially%2C%20this%20transition%20is%20mediated%20by%20a%20Generation-Semantic%20Bottleneck%20%28GSB%29%2C%20which%20compresses%20features%20into%20a%20low-dimensional%20space%20to%20filter%20noise%20for%20robust%20synthesis%2C%20then%20restores%20dimensionality%20to%20empower%20complex%20semantic%20comprehension.%20Built%20upon%20this%20foundation%2C%20we%20present%20HYDRA%2C%20a%20native%20unified%20framework%20integrating%20perception%20and%20ge {"title": "Anatomy of a Lie: A Multi-Stage Diagnostic Framework for Tracing Hallucinations in Vision-Language Models", "author": "Lexiang Xiong and Qi Li and Jingwen Ye and Xinchao Wang", "abstract": "Vision-Language Models (VLMs) frequently \"hallucinate\" - generate plausible yet factually incorrect statements - posing a critical barrier to their trustworthy deployment. In this work, we propose a new paradigm for diagnosing hallucinations, recasting them from static output errors into dynamic pathologies of a model's computational cognition. Our framework is grounded in a normative principle of computational rationality, allowing us to model a VLM's generation as a dynamic cognitive trajectory. We design a suite of information-theoretic probes that project this trajectory onto an interpretable, low-dimensional Cognitive State Space. Our central discovery is a governing principle we term the geometric-information duality: a cognitive trajectory's geometric abnormality within this space is fundamentally equivalent to its high information-theoretic surprisal. Hallucination detection is counts as a geometric anomaly detection problem. Evaluated across diverse settings - from rigorous binary QA (POPE) and comprehensive reasoning (MME) to unconstrained open-ended captioning (MS-COCO) - our framework achieves state-of-the-art performance. Crucially, it operates with high efficiency under weak supervision and remains highly robust even when calibration data is heavily contaminated. This approach enables a causal attribution of failures, mapping observable errors to distinct pathological states: perceptual instability (measured by Perceptual Entropy), logical-causal failure (measured by Inferential Conflict), and decisional ambiguity (measured by Decision Entropy). Ultimately, this opens a path toward building AI systems whose reasoning is transparent, auditable, and diagnosable by design.", "link": "http://arxiv.org/abs/2603.15557v1", "date": "2026-03-16", "relevancy": 2.7388, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5564}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5564}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5306}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Anatomy%20of%20a%20Lie%3A%20A%20Multi-Stage%20Diagnostic%20Framework%20for%20Tracing%20Hallucinations%20in%20Vision-Language%20Models&body=Title%3A%20Anatomy%20of%20a%20Lie%3A%20A%20Multi-Stage%20Diagnostic%20Framework%20for%20Tracing%20Hallucinations%20in%20Vision-Language%20Models%0AAuthor%3A%20Lexiang%20Xiong%20and%20Qi%20Li%20and%20Jingwen%20Ye%20and%20Xinchao%20Wang%0AAbstract%3A%20Vision-Language%20Models%20%28VLMs%29%20frequently%20%22hallucinate%22%20-%20generate%20plausible%20yet%20factually%20incorrect%20statements%20-%20posing%20a%20critical%20barrier%20to%20their%20trustworthy%20deployment.%20In%20this%20work%2C%20we%20propose%20a%20new%20paradigm%20for%20diagnosing%20hallucinations%2C%20recasting%20them%20from%20static%20output%20errors%20into%20dynamic%20pathologies%20of%20a%20model%27s%20computational%20cognition.%20Our%20framework%20is%20grounded%20in%20a%20normative%20principle%20of%20computational%20rationality%2C%20allowing%20us%20to%20model%20a%20VLM%27s%20generation%20as%20a%20dynamic%20cognitive%20trajectory.%20We%20design%20a%20suite%20of%20information-theoretic%20probes%20that%20project%20this%20trajectory%20onto%20an%20interpretable%2C%20low-dimensional%20Cognitive%20State%20Space.%20Our%20central%20discovery%20is%20a%20governing%20principle%20we%20term%20the%20geometric-information%20duality%3A%20a%20cognitive%20trajectory%27s%20geometric%20abnormality%20within%20this%20space%20is%20fundamentally%20equivalent%20to%20its%20high%20information-theoretic%20surprisal.%20Hallucination%20detection%20is%20counts%20as%20a%20geometric%20anomaly%20detection%20problem.%20Evaluated%20across%20diverse%20settings%20-%20from%20rigorous%20binary%20QA%20%28POPE%29%20and%20comprehensive%20reasoning%20%28MME%29%20to%20unconstrained%20open-ended%20captioning%20%28MS-COCO%29%20-%20our%20framework%20achieves%20state-of-the-art%20performance.%20Crucially%2C%20it%20operates%20with%20high%20efficiency%20under%20weak%20supervision%20and%20remains%20highly%20robust%20even%20when%20calibration%20data%20is%20heavily%20contaminated.%20This%20approach%20enables%20a%20causal%20attribution%20of%20failures%2C%20mapping%20observable%20errors%20to%20distinct%20pathological%20states%3A%20perceptual%20instability%20%28measured%20by%20Perceptual%20Entropy%29%2C%20logical-causal%20failure%20%28measured%20by%20Inferential%20Conflict%29%2C%20and%20decisional%20ambiguity%20%28measured%20by%20Decision%20Entropy%29.%20Ultimately%2C%20this%20opens%20a%20path%20toward%20building%20AI%20systems%20whose%20reasoning%20is%20transparent%2C%20auditable%2C%20and%20diagnosable%20by%20design.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15557v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAnatomy%2520of%2520a%2520Lie%253A%2520A%2520Multi-Stage%2520Diagnostic%2520Framework%2520for%2520Tracing%2520Hallucinations%2520in%2520Vision-Language%2520Models%26entry.906535625%3DLexiang%2520Xiong%2520and%2520Qi%2520Li%2520and%2520Jingwen%2520Ye%2520and%2520Xinchao%2520Wang%26entry.1292438233%3DVision-Language%2520Models%2520%2528VLMs%2529%2520frequently%2520%2522hallucinate%2522%2520-%2520generate%2520plausible%2520yet%2520factually%2520incorrect%2520statements%2520-%2520posing%2520a%2520critical%2520barrier%2 {"title": "VAREX: A Benchmark for Multi-Modal Structured Extraction from Documents", "author": "Udi Barzelay and Ophir Azulai and Inbar Shapira and Idan Friedman and Foad Abo Dahood and Madison Lee and Abraham Daniels", "abstract": "We introduce VAREX (VARied-schema EXtraction), a benchmark for evaluating multimodal foundation models on structured data extraction from government forms. VAREX employs a Reverse Annotation pipeline that programmatically fills PDF templates with synthetic values, producing deterministic ground truth validated through three-phase quality assurance. The benchmark comprises 1,777 documents with 1,771 unique schemas across three structural categories, each provided in four input modalities: plain text, layout-preserving text (whitespace-aligned to approximate column positions), document image, or both text and image combined. Unlike existing benchmarks that evaluate from a single input representation, VAREX provides four controlled modalities per document, enabling systematic ablation of how input format affects extraction accuracy -- a capability absent from prior benchmarks. We evaluate 20 models from frontier proprietary models to small open models, with particular attention to models <=4B parameters suitable for cost-sensitive and latency-constrained deployment. Results reveal that (1) below 4B parameters, structured output compliance -- not extraction capability -- is a dominant bottleneck; in particular, schema echo (models producing schema-conforming structure instead of extracted values) depresses scores by 45-65 pp (percentage points) in affected models; (2) extraction-specific fine-tuning at 2B yields +81 pp gains, demonstrating that the instruction-following deficit is addressable without scale; (3) layout-preserving text provides the largest accuracy gain (+3-18 pp), exceeding pixel-level visual cues; and (4) the benchmark most effectively discriminates models in the 60-95% accuracy band. Dataset and evaluation code are publicly available.", "link": "http://arxiv.org/abs/2603.15118v1", "date": "2026-03-16", "relevancy": 2.7313, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5666}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5666}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5057}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VAREX%3A%20A%20Benchmark%20for%20Multi-Modal%20Structured%20Extraction%20from%20Documents&body=Title%3A%20VAREX%3A%20A%20Benchmark%20for%20Multi-Modal%20Structured%20Extraction%20from%20Documents%0AAuthor%3A%20Udi%20Barzelay%20and%20Ophir%20Azulai%20and%20Inbar%20Shapira%20and%20Idan%20Friedman%20and%20Foad%20Abo%20Dahood%20and%20Madison%20Lee%20and%20Abraham%20Daniels%0AAbstract%3A%20We%20introduce%20VAREX%20%28VARied-schema%20EXtraction%29%2C%20a%20benchmark%20for%20evaluating%20multimodal%20foundation%20models%20on%20structured%20data%20extraction%20from%20government%20forms.%20VAREX%20employs%20a%20Reverse%20Annotation%20pipeline%20that%20programmatically%20fills%20PDF%20templates%20with%20synthetic%20values%2C%20producing%20deterministic%20ground%20truth%20validated%20through%20three-phase%20quality%20assurance.%20The%20benchmark%20comprises%201%2C777%20documents%20with%201%2C771%20unique%20schemas%20across%20three%20structural%20categories%2C%20each%20provided%20in%20four%20input%20modalities%3A%20plain%20text%2C%20layout-preserving%20text%20%28whitespace-aligned%20to%20approximate%20column%20positions%29%2C%20document%20image%2C%20or%20both%20text%20and%20image%20combined.%20Unlike%20existing%20benchmarks%20that%20evaluate%20from%20a%20single%20input%20representation%2C%20VAREX%20provides%20four%20contro

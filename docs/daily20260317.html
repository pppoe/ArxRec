{"title": "Grounded Misunderstandings in Asymmetric Dialogue: A Perspectivist Annotation Scheme for MapTask", "author": "Nan Li and Albert Gatt and Massimo Poesio", "abstract": "Collaborative dialogue relies on participants incrementally establishing common ground, yet in asymmetric settings they may believe they agree while referring to different entities. We introduce a perspectivist annotation scheme for the HCRC MapTask corpus (Anderson et al., 1991) that separately captures speaker and addressee grounded interpretations for each reference expression, enabling us to trace how understanding emerges, diverges, and repairs over time. Using a scheme-constrained LLM annotation pipeline, we obtain 13k annotated reference expressions with reliability estimates and analyze the resulting understanding states. The results show that full misunderstandings are rare once lexical variants are unified, but multiplicity discrepancies systematically induce divergences, revealing how apparent grounding can mask referential misalignment. Our framework provides both a resource and an analytic lens for studying grounded misunderstanding and for evaluating (V)LLMs' capacity to model perspective-dependent grounding in collaborative dialogue.", "link": "http://arxiv.org/abs/2511.03718v2", "date": "2026-03-16", "relevancy": 2.3953, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4877}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4877}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4618}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Grounded%20Misunderstandings%20in%20Asymmetric%20Dialogue%3A%20A%20Perspectivist%20Annotation%20Scheme%20for%20MapTask&body=Title%3A%20Grounded%20Misunderstandings%20in%20Asymmetric%20Dialogue%3A%20A%20Perspectivist%20Annotation%20Scheme%20for%20MapTask%0AAuthor%3A%20Nan%20Li%20and%20Albert%20Gatt%20and%20Massimo%20Poesio%0AAbstract%3A%20Collaborative%20dialogue%20relies%20on%20participants%20incrementally%20establishing%20common%20ground%2C%20yet%20in%20asymmetric%20settings%20they%20may%20believe%20they%20agree%20while%20referring%20to%20different%20entities.%20We%20introduce%20a%20perspectivist%20annotation%20scheme%20for%20the%20HCRC%20MapTask%20corpus%20%28Anderson%20et%20al.%2C%201991%29%20that%20separately%20captures%20speaker%20and%20addressee%20grounded%20interpretations%20for%20each%20reference%20expression%2C%20enabling%20us%20to%20trace%20how%20understanding%20emerges%2C%20diverges%2C%20and%20repairs%20over%20time.%20Using%20a%20scheme-constrained%20LLM%20annotation%20pipeline%2C%20we%20obtain%2013k%20annotated%20reference%20expressions%20with%20reliability%20estimates%20and%20analyze%20the%20resulting%20understanding%20states.%20The%20results%20show%20that%20full%20misunderstandings%20are%20rare%20once%20lexical%20variants%20are%20unified%2C%20but%20multiplicity%20discrepancies%20systematically%20induce%20divergences%2C%20revealing%20how%20apparent%20grounding%20can%20mask%20referential%20misalignment.%20Our%20framework%20provides%20both%20a%20resource%20and%20an%20analytic%20lens%20for%20studying%20grounded%20misunderstanding%20and%20for%20evaluating%20%28V%29LLMs%27%20capacity%20to%20model%20perspective-dependent%20grounding%20in%20collaborative%20dialogue.%0ALink%3A%20http%3A//arxiv.org/abs/2511.03718v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGrounded%2520Misunderstandings%2520in%2520Asymmetric%2520Dialogue%253A%2520A%2520Perspectivist%2520Annotation%2520Scheme%2520for%2520MapTask%26entry.906535625%3DNan%2520Li%2520and%2520Albert%2520Gatt%2520and%2520Massimo%2520Poesio%26 {"title": "Curriculum Reinforcement Learning from Easy to Hard Tasks Improves LLM Reasoning", "author": "Shubham Parashar and Shurui Gui and Xiner Li and Hongyi Ling and Sushil Vemuri and Blake Olson and Eric Li and Yu Zhang and James Caverlee and Dileep Kalathil and Shuiwang Ji", "abstract": "We aim to improve the reasoning capabilities of language models via reinforcement learning (RL). Recent RL post-trained models like DeepSeek-R1 have demonstrated reasoning abilities on mathematical and coding tasks. However, prior studies suggest that using RL alone to improve reasoning on inherently difficult tasks is less effective. Here, we draw inspiration from curriculum learning and propose to schedule tasks from easy to hard (E2H), allowing LLMs to build reasoning skills gradually. Our method is termed E2H Reasoner. Empirically, we observe that, although easy tasks are important initially, fading them out through appropriate scheduling is essential in preventing overfitting. Theoretically, we establish convergence guarantees for E2H Reasoner within an approximate policy iteration framework. We derive finite-sample complexity bounds and show that when tasks are appropriately decomposed and conditioned, learning through curriculum stages requires fewer total samples than direct learning. Experiments across multiple domains show that E2H Reasoner significantly improves the reasoning ability of small LLMs (1.5B to 3B), which otherwise struggle when trained with vanilla RL alone, highlighting the effectiveness of our method. Our code can be found on https://github.com/divelab/E2H-Reasoning.", "link": "http://arxiv.org/abs/2506.06632v3", "date": "2026-03-16", "relevancy": 2.3932, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4846}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4846}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4668}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Curriculum%20Reinforcement%20Learning%20from%20Easy%20to%20Hard%20Tasks%20Improves%20LLM%20Reasoning&body=Title%3A%20Curriculum%20Reinforcement%20Learning%20from%20Easy%20to%20Hard%20Tasks%20Improves%20LLM%20Reasoning%0AAuthor%3A%20Shubham%20Parashar%20and%20Shurui%20Gui%20and%20Xiner%20Li%20and%20Hongyi%20Ling%20and%20Sushil%20Vemuri%20and%20Blake%20Olson%20and%20Eric%20Li%20and%20Yu%20Zhang%20and%20James%20Caverlee%20and%20Dileep%20Kalathil%20and%20Shuiwang%20Ji%0AAbstract%3A%20We%20aim%20to%20improve%20the%20reasoning%20capabilities%20of%20language%20models%20via%20reinforcement%20learning%20%28RL%29.%20Recent%20RL%20post-trained%20models%20like%20DeepSeek-R1%20have%20demonstrated%20reasoning%20abilities%20on%20mathematical%20and%20coding%20tasks.%20However%2C%20prior%20studies%20suggest%20that%20using%20RL%20alone%20to%20improve%20reasoning%20on%20inherently%20difficult%20tasks%20is%20less%20effective.%20Here%2C%20we%20draw%20inspiration%20from%20curriculum%20learning%20and%20propose%20to%20schedule%20tasks%20from%20easy%20to%20hard%20%28E2H%29%2C%20allowing%20LLMs%20to%20build%20reasoning%20skills%20gradually.%20Our%20method%20is%20termed%20E2H%20Reasoner.%20Empirically%2C%20we%20observe%20that%2C%20although%20easy%20tasks%20are%20important%20initially%2C%20fading%20them%20out%20through%20appropriate%20scheduling%20is%20essential%20in%20preventing%20overfitting.%20Theoretically%2C%20we%20establish%20convergence%20guarantees%20for%20E2H%20Reasoner%20within%20an%20approximate%20policy%20iteration%20framework.%20We%20derive%20finite-sample%20complexity%20bounds%20and%20show%20that%20when%20tasks%20are%20appropriately%20decomposed%20and%20conditioned%2C%20learning%20through%20curriculum%20stages%20requires%20fewer%20total%20samples%20than%20direct%20learning.%20Experiments%20across%20multiple%20domains%20show%20that%20E2H%20Reasoner%20significantly%20improves%20the%20reasoning%20ability%20of%20small%20LLMs%20%281.5B%20to%203B%29%2C%20which%20otherwise%20struggle%20when%20trained%20with%20vanilla%20RL%20alone%2C%20highlighting%20the%20effectiveness%20of%20our%20method.%20Our%20code%20can%20be%20found%20on%20https%3A//github.com/divelab/E2H-Reasoning.%0ALink%3A%20http%3A//arxiv.org/abs/2506.06632v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCurriculum%2520Reinforcement%2520Learning%2520from%2520Easy%2520to%2520Hard%2520Tasks%2520Improves%2520LLM%2520Reasoning%26entry.906535625%3DShubham%2520Parashar%2520and%2520Shurui%2520Gui%2520and%2520Xiner%2520Li%2520and%2520Hongyi%2520Ling%2520and%2520Sushil%2520Vemuri%2520and%2520Blake%2520Olson%2520and%2520Eric%2520Li%2520and%2520Yu%2520Zhang%2520and%2520James%2520Caverlee%2520and%2520Dileep%2520Kalathil%2520and%2520Shuiwang%2520Ji%26entry.1292438233%3DWe%2520aim%2520to%2520improve%2520the%2520reasoning%2520capabilities%2520of%2520language%2520models%2520via%2520reinforcement%2520learning%2520%2528RL%2529.%2520Recent%2520RL%2520post-trained%2520models%2520like%2520DeepSeek-R1%2520have%2520demonstrated%2520reasoning%2520abilities%2520on%2520mathematical%2520and%2520coding%2520tasks.%2520However%252C%2520prior%2520studies%2520suggest%2520that%2520using%2520RL%2520alone%2520to%2520improve%2520reasoning%2520on%2520inherently%2520difficult%2520tasks%2520is%2520less%2520effective.%2520Here%252C%2520we%2520draw%2520inspiration%2520from%2520curriculum%2520learning%2520and%2520propose%2520to%2520schedule%2520tasks%2520from%2520easy%2520to%2520hard%2520%2528E2H%2529%252C%2520allowing%2520LLMs%2520to%2520build%2520reasoning%2520skill {"title": "Ayn: A Tiny yet Competitive Indian Legal Language Model Pretrained from Scratch", "author": "Mitodru Niyogi and Eric Gaussier and Arnab Bhattacharya", "abstract": "Decoder-only Large Language Models (LLMs) are currently the model of choice for many Natural Language Processing (NLP) applications. Through instruction fine-tuning and prompting approaches, such LLMs have been efficiently used to solve both general and domain-specific tasks. However, they are costly to train and, to a certain extent, costly to use as well, and one can wonder whether LLMs can be replaced by domain-specific Tiny Language Models (TLMs), which typically contain less than 100M parameters. We address this question in this study by comparing the performance of an 88M TLM pretrained from scratch for 185 A100 hours on a specific domain with a domain-specific tokenizer (here, the Indian legal domain) with LLMs of various sizes between 1B and 8B for solving domain-specific tasks. We show in particular that our legal TLM, Ayn, can indeed outperform LLMs up to 80 times larger on the legal case judgment prediction task, rival LLMs up to 30 times larger on the summarization task, and still be competitive with these larger LLMs on general tasks.", "link": "http://arxiv.org/abs/2403.13681v3", "date": "2026-03-16", "relevancy": 2.3779, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4815}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4815}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4637}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Ayn%3A%20A%20Tiny%20yet%20Competitive%20Indian%20Legal%20Language%20Model%20Pretrained%20from%20Scratch&body=Title%3A%20Ayn%3A%20A%20Tiny%20yet%20Competitive%20Indian%20Legal%20Language%20Model%20Pretrained%20from%20Scratch%0AAuthor%3A%20Mitodru%20Niyogi%20and%20Eric%20Gaussier%20and%20Arnab%20Bhattacharya%0AAbstract%3A%20Decoder-only%20Large%20Language%20Models%20%28LLMs%29%20are%20currently%20the%20model%20of%20choice%20for%20many%20Natural%20Language%20Processing%20%28NLP%29%20applications.%20Through%20instruction%20fine-tuning%20and%20prompting%20approaches%2C%20such%20LLMs%20have%20been%20efficiently%20used%20to%20solve%20both%20general%20and%20domain-specific%20tasks.%20However%2C%20they%20are%20costly%20to%20train%20and%2C%20to%20a%20certain%20extent%2C%20costly%20to%20use%20as%20well%2C%20and%20one%20can%20wonder%20whether%20LLMs%20can%20be%20replaced%20by%20domain-specific%20Tiny%20Language%20Models%20%28TLMs%29%2C%20which%20typically%20contain%20less%20than%20100M%20parameters.%20We%20address%20this%20question%20in%20this%20study%20by%20comparing%20the%20performance%20of%20an%2088M%20TLM%20pretrained%20from%20scratch%20for%20185%20A100%20hours%20on%20a%20specific%20domain%20with%20a%20domain-specific%20tokenizer%20%28here%2C%20the%20Indian%20legal%20domain%29%20with%20LLMs%20of%20various%20sizes%20between%201B%20and%208B%20for%20solving%20domain-specific%20tasks.%20We%20show%20in%20particular%20that%20our%20legal%20TLM%2C%20Ayn%2C%20can%20indeed%20outperform%20LLMs%20up%20to%2080%20times%20larger%20on%20the%20legal%20case%20judgment%20prediction%20task%2C%20rival%20LLMs%20up%20to%2030%20times%20larger%20on%20the%20summarization%20task%2C%20and%20still%20be%20competitive%20with%20these%20larger%20LLMs%20on%20general%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2403.13681v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAyn%253A%2520A%2520Tiny%2520yet%2520Competitive%2520Indian%2520Legal%2520Language%2520Model%2520Pretrained%2520from%2520Scratch%26entry.906535625%3DMitodru%2520Niyogi%2520and {"title": "Learning 2D Invariant Affordance Knowledge for 3D Affordance Grounding", "author": "Xianqiang Gao and Pingrui Zhang and Delin Qu and Dong Wang and Zhigang Wang and Yan Ding and Bin Zhao", "abstract": "3D Object Affordance Grounding aims to predict the functional regions on a 3D object and has laid the foundation for a wide range of applications in robotics. Recent advances tackle this problem via learning a mapping between 3D regions and a single human-object interaction image. However, the geometric structure of the 3D object and the object in the human-object interaction image are not always consistent, leading to poor generalization. To address this issue, we propose to learn generalizable invariant affordance knowledge from multiple human-object interaction images within the same affordance category. Specifically, we introduce the Multi-Image Guided Invariant-Feature-Aware 3D Affordance Grounding (MIFAG) framework. It grounds 3D object affordance regions by identifying common interaction patterns across multiple human-object interaction images. First, the Invariant Affordance Knowledge Extraction Module (IAM) utilizes an iterative updating strategy to gradually extract aligned affordance knowledge from multiple images and integrate it into an affordance dictionary. Then, the Affordance Dictionary Adaptive Fusion Module (ADM) learns comprehensive point cloud representations that consider all affordance candidates in multiple images. Besides, the Multi-Image and Point Affordance (MIPA) benchmark is constructed and our method outperforms existing state-of-the-art methods on various experimental comparisons.", "link": "http://arxiv.org/abs/2408.13024v3", "date": "2026-03-16", "relevancy": 2.3656, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5996}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5886}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5779}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%202D%20Invariant%20Affordance%20Knowledge%20for%203D%20Affordance%20Grounding&body=Title%3A%20Learning%202D%20Invariant%20Affordance%20Knowledge%20for%203D%20Affordance%20Grounding%0AAuthor%3A%20Xianqiang%20Gao%20and%20Pingrui%20Zhang%20and%20Delin%20Qu%20and%20Dong%20Wang%20and%20Zhigang%20Wang%20and%20Yan%20Ding%20and%20Bin%20Zhao%0AAbstract%3A%203D%20Object%20Affordance%20Grounding%20aims%20to%20predict%20the%20functional%20regions%20on%20a%203D%20object%20and%20has%20laid%20the%20foundation%20for%20a%20wide%20range%20of%20applications%20in%20robotics.%20Recent%20advances%20tackle%20this%20problem%20via%20learning%20a%20mapping%20between%203D%20regions%20and%20a%20single%20human-object%20interaction%20image.%20However%2C%20the%20geometric%20structure%20of%20the%203D%20object%20and%20the%20object%20in%20the%20human-object%20interaction%20image%20are%20not%20always%20consistent%2C%20leading%20to%20poor%20generalization.%20To%20address%20this%20issue%2C%20we%20propose%20to%20learn%20generalizable%20invariant%20affordance%20knowledge%20from%20multiple%20human-object%20interaction%20images%20within%20the%20same%20affordance%20category.%20Specifically%2C%20we%20introduce%20the%20Multi-Image%20Guided%20Invariant-Feature-Aware%203D%20Affordance%20Grounding%20%28MIFAG%29%20framework.%20It%20grounds%203D%20object%20affordance%20regions%20by%20identifying%20common%20interaction%20patterns%20across%20multiple%20human-object%20interaction%20images.%20First%2C%20the%20Invariant%20Affordance%20Knowledge%20Extraction%20Module%20%28IAM%29%20utilizes%20an%20iterative%20updating%20strategy%20to%20gradually%20extract%20aligned%20affordance%20knowledge%20from%20multiple%20images%20and%20integrate%20it%20into%20an%20affordance%20dictionary.%20Then%2C%20the%20Affordance%20Dictionary%20Adaptive%20Fusion%20Module%20%28ADM%29%20learns%20comprehensive%20point%20cloud%20representations%20that%20consider%20all%20affordance%20candidates%20in%20multiple%20images.%20Besides%2C%20the%20Multi-Image%20and%20Point%20Affordance%20%28MIPA%29%20benchmark%20is%20constructed%20and%20our%20method%20outperforms%20existing%20state-of-the-art%20methods%20on%20various%20experimental%20comparisons.%0ALink%3A%20http%3A//arxiv.org/abs/2408.13024v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%25202D%2520Invariant%2520Affordance%2520Knowledge%2520for%25203D%2520Affordance%2520Grounding%26entry.906535625%3DXianqiang%2520Gao%2520and%2520Pingrui%2520Zhang%2520and%2520Delin%2520Qu%2520and%2520Dong%2520Wang%2520and%2520Zhigang%2520Wang%2520and%2520Yan%2520Ding%2520and%2520Bin%2520Zhao%26entry.1292438233%3D3D%2520Object%2520Affordance%2520Grounding%2520aims%2520to%2520predict%2520the%2520functional%2520regions%2520on%2520a%25203D%2520object%2520and%2520has%2520laid%2520the%2520foundation%2520for%2520a%2520wide%2520range%2520of%2520applications%2520in%2520robotics.%2520Recent%2520advances%2520tackle%2520this%2520problem%2520via%2520learning%2520a%2520mapping%2520between%25203D%2520regions%2520and%2520a%2520single%2520human-object%2520interaction%2520image.%2520However%252C%2520the%2520geometric%2520structure%2520of%2520the%25203D%2520object%2520and%2520the%2520object%2520in%2520the%2520human-object%2520interaction%2520image%2520are%2520not%2520always%2520consistent%252C%2520leading%2520to%2520poor%2520generalization.%2520To%2520address%2520this%2520issue%252C%2520we%2520propose%2520to%2520learn%2520generalizable%2520invariant%2520affordance%2520knowledge%2520from%2520multiple%2520human-object%2520interaction%2520images%2520within%2520the%2520same%2520affordance%2520category.%2520Specifically%252C%2520we%2520introduce%2520the%2520Multi-Image%2520Guided%2520Invariant-Feature-Aware%25203D%2520Affordance%2520Grounding%2520%2528MIFAG%2529%2520framework.%2520It%2520grounds%25203D%2520object%2520affordance%2520regions%2520by%2520identifying%2520common%2520interaction%2520patterns%2520across%2520multiple%2520human-object%2520interaction%2520images.%2520First%252C%2520the%2520Invariant%2520Affordance%2520Knowledge%2520Extraction%2520Module%2520%2528IAM%2529%2520utilizes%2520an%2520iterative%2520updating%2520strategy%2520to%2520gradually%2520extract%2520aligned%2520affordance%2520knowledge%2520from%2520multiple%2520images%2520and%2520integrate%2520it%2520into%2520an%2520affordance%2520dictionary.%2520Then%252C%2520the%2520Affordance%2520Dictionary%2520Adaptive%2520Fusion%2520Module%2520%2528ADM%2529%2520learns%2520comprehensive%2520point%2520cloud%2520representations%2520that%2520consider%2520all%2520affordance%2520candidates%2520in%2520multiple%2520images.%2520Besides%252C%2520the%2520Multi-Image%2520and%2520Point%2520Affordance%2520%2528MIPA%2529%2520benchmark%2520is%2520constructed%2520and%2520our%2520method%2520outperforms%2520existing%2520state-of-the-art%2520methods%2520on%2520various%2520experimental%2520comparisons.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2408.13024v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Learning%202D%20Invariant%20Affordance%20Knowledge%20for%203D%20Affordance%20Grounding&entry.906535625=Xianqiang%20Gao%20and%20Pingrui%20Zhang%20and%20Delin%20Qu%20and%20Dong%20Wang%20and%20Zhigang%20Wang%20and%20Yan%20Ding%20and%20Bin%20Zhao&entry.1292438233=3D%20Object%20Affordance%20Grounding%20aims%20to%20predict%20the%20functional%20regions%20on%20a%203D%20object%20and%20has%20laid%20the%20foundation%20for%20a%20wide%20range%20of%20applications%20in%20robotics.%20Recent%20advances%20t {"title": "SVG360: Multi-View SVG Generation with Geometric and Color Consistency from a Single SVG", "author": "Mengnan Jiang and Zhaolin Sun and Christian Franke and Michele Franco Adesso and Antonio Haas and Grace Li Zhang", "abstract": "Scalable Vector Graphics (SVGs) are central to modern design workflows, offering scaling without distortion and precise editability. However, for single object SVGs, generating multi-view consistent SVGs from a single-view input remains underexplored. We present a three stage framework that produces multi-view SVGs with geometric and color consistency from a single SVG input. First, the rasterized input is lifted to a 3D representation and rendered under target camera poses, producing multi-view images of the object. Next, we extend the temporal memory mechanism of Segment Anything 2 (SAM2) to the spatial domain, constructing a spatial memory bank that establishes part level correspondences across neighboring views, yielding cleaner and more consistent vector paths and color assignments without retraining. Finally, during the raster to vector conversion, we perform path consolidation and structural optimization to reduce redundancy while preserving boundaries and semantics. The resulting SVGs exhibit strong geometric and color consistency across views, significantly reduce redundant paths, and retain fine structural details. This work bridges generative modeling and structured vector representation, providing a scalable route to single input, object level multi-view SVG generation and supporting applications such as asset creation and semantic vector editing.", "link": "http://arxiv.org/abs/2511.16766v2", "date": "2026-03-16", "relevancy": 2.3601, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5962}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0 {"title": "SKEL-CF: Coarse-to-Fine Biomechanical Skeleton and Surface Mesh Recovery", "author": "Da Li and Jiping Jin and Xuanlong Yu and Wei Liu and Xiaodong Cun and Kai Chen and Rui Fan and Jiangang Kong and Xi Shen", "abstract": "Parametric 3D human models such as SMPL have driven significant advances in human pose and shape estimation, yet their simplified kinematics limit biomechanical realism. The recently proposed SKEL model addresses this limitation by re-rigging SMPL with an anatomically accurate skeleton. However, estimating SKEL parameters directly remains challenging due to limited training data, perspective ambiguities, and the inherent complexity of human articulation. We introduce SKEL-CF, a coarse-to-fine framework for SKEL parameter estimation. SKEL-CF employs a transformer-based encoder-decoder architecture, where the encoder predicts coarse camera and SKEL parameters, and the decoder progressively refines them in successive layers. To ensure anatomically consistent supervision, we convert the existing SMPL-based dataset 4DHuman into a SKEL-aligned version, 4DHuman-SKEL, providing high-quality training data for SKEL estimation. In addition, to mitigate depth and scale ambiguities, we explicitly incorporate camera modeling into the SKEL-CF pipeline and demonstrate its importance across diverse viewpoints. Extensive experiments validate the effectiveness of the proposed design. On the challenging MOYO dataset, SKEL-CF achieves 85.0 MPJPE / 51.4 PA-MPJPE, significantly outperforming the previous SKEL-based state-of-the-art HSMR (104.5 / 79.6). These results establish SKEL-CF as a scalable and anatomically faithful framework for human motion analysis, facilitating the use of computer vision techniques in biomechanics-related analysis. Our implementation is available on the project page: https://pokerman8.github.io/SKEL-CF/.", "link": "http://arxiv.org/abs/2511.20157v5", "date": "2026-03-16", "relevancy": 2.3549, "topK": [{"title": "Synthesizing Moving {"title": "NV-Bench: Benchmark of Nonverbal Vocalization Synthesis for Expressive Text-to-Speech Generation", "author": "Qinke Ni and Huan Liao and Dekun Chen and Yuxiang Wang and Zhizheng Wu", "abstract": "While recent text-to-speech (TTS) systems increasingly integrate nonverbal vocalizations (NVs), their evaluations lack standardized metrics and reliable ground-truth references. To bridge this gap, we propose NV-Bench, the first benchmark grounded in a functional taxonomy that treats NVs as communicative acts rather than acoustic artifacts. NV-Bench comprises 1,651 multi-lingual, in-the-wild utterances with paired human reference audio, balanced across 14 NV categories. We introduce a dual-dimensional evaluation protocol: (1) Instruction Alignment, utilizing the proposed paralinguistic character error rate (PCER) to assess controllability, (2) Acoustic Fidelity, measuring the distributional gap to real recordings to assess acoustic realism. We evaluate diverse TTS models and develop two baselines. Experimental results demonstrate a strong correlation between our objective metrics and human perception, establishing NV-Bench as a standardized evaluation framework.", "link": "http://arxiv.org/abs/2603.15352v1", "date": "2026-03-16", "relevancy": 2.3545, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5188}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.447}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.447}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20NV-Bench%3A%20Benchmark%20of%20Nonverbal%20Vocalization%20Synthesis%20for%20Expressive%20Text-to-Speech%20Generation&body=Title%3A%20NV-Bench%3A%20Benchmark%20of%20Nonverbal%20Vocalization%20Synthesis%20for%20Expressive%20Text-to-Speech%20Generation%0AAuthor%3A%20Qinke%20Ni%20and%20Huan%20Liao%20and%20Dekun%20Chen%20and%20Yuxiang%20Wang%20and%20Zhizheng%20Wu%0AAbstract%3A%20While%20recent%20text-to-speech%20%28TTS%29%20systems%20increasingly%20integrate%20nonverbal%20vocalizations%20%28NVs%29%2C%20their%20evaluations%20lack%20standardized%20metrics%20and%20reliable%20ground-truth%20references.%20To%20bridge%20this%20gap%2C%20we%20propose%20NV-Bench%2C%20the%20first%20benchmark%20grounded%20in%20a%20functional%20taxonomy%20that%20treats%20NVs%20as%20communicative%20acts%20rather%20than%20acoustic%20artifacts.%20NV-Bench%20comprises%201%2C651%20multi-lingual%2C%20in-the-wild%20utterances%20with%20paired%20human%20reference%20audio%2C%20balanced%20across%2014%20NV%20categories.%20We%20introduce%20a%20dual-dimensional%20evaluation%20protocol%3A%20%281%29%20Instruction%20Alignment%2C%20utilizing%20the%20proposed%20paralinguistic%20character%20error%20rate%20%28PCER%29%20to%20assess%20controllability%2C%20%282%29%20Acoustic%20Fidelity%2C%20measuring%20the%20distributional%20gap%20to%20real%20recordings%20to%20assess%20acoustic%20realism.%20We%20evaluate%20diverse%20TTS%20models%20and%20develop%20two%20baselines.%20Experimental%20results%20demonstrate%20a%20strong%20correlation%20between%20our%20objective%20metrics%20and%20human%20perception%2C%20establishing%20NV-Bench%20as%20a%20standardized%20evaluation%20framework.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15352v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNV-Bench%253A%2520Benchmark%2520of%2520Nonverbal%2520Vocalization%2520Synthesis%2520for%2520Expressive%2520Text-to-Speech%2520Generation%26entry.906535625%3DQinke%2520Ni%2520and%2520Huan%2520Liao%2520and%2520Dekun%2520Chen%2520and%2520Yuxiang%2520Wang%2520and%2520Zhizheng%2520Wu%26entry.1292438233%3DWhile%2520recent%2520text-to-speech%25 {"title": "Perception-Aware Autonomous Exploration in Feature-Limited Environments", "author": "Moji Shi and Rajitha de Silva and Hang Yu and Riccardo Polvara and Marija Popovi\u0107", "abstract": "Autonomous exploration in unknown environments typically relies on onboard state estimation for localisation and mapping. Existing exploration methods primarily maximise coverage efficiency, but often overlook that visual-inertial odometry (VIO) performance strongly depends on the availability of robust visual features. As a result, exploration policies can drive a robot into feature-sparse regions where tracking degrades, leading to odometry drift, corrupted maps, and mission failure. We propose a hierarchical perception-aware exploration framework for a stereo-equipped unmanned aerial vehicle (UAV) that explicitly couples exploration progress with feature observability. Our approach (i) associates each candidate frontier with an expected feature quality using a global feature map, and prioritises visually informative subgoals, and (ii) optimises a continuous yaw trajectory along the planned motion to maintain stable feature tracks. We evaluate our method in simulation across environments with varying texture levels and in real-world indoor experiments with largely textureless walls. Compared to baselines that ignore feature quality and/or do not optimise continuous yaw, our method maintains more reliable feature tracking, reduces odometry drift, and achieves on average 30\\% higher coverage before the odometry error exceeds specified thresholds.", "link": "http://arxiv.org/abs/2603.15605v1", "date": "2026-03-16", "relevancy": 2.3533, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5977}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5923}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5806}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Perception-Aware%20Autonomous%20Exploration%20in%20Feature-Limited%20Environments&body=Title%3A%20Perception-Aware%20Autonomous%20Exploration%20in%20Feature-Limited%20Environments%0AAuthor%3A%20Moji%20Shi%20and%20Rajitha%20de%20Silva%20and%20Hang%20Yu%20and%20Riccardo%20Polvara%20and%20Marija%20Popovi%C4%87%0AAbstract%3A%20Autonomous%20exploration%20in%20unknown%20environments%20typically%20relies%20on%20onboard%20state%20estimation%20for%20localisation%20and%20mapping.%20Existing%20exploration%20methods%20primarily%20maximise%20coverage%20efficiency%2C%20but%20often%20overlook%20that%20visual-inertial%20odometry%20%28VIO%29%20performance%20strongly%20depends%20on%20the%20availability%20of%20robust%20visual%20features.%20As%20a%20result%2C%20exploration%20policies%20can%20drive%20a%20robot%20into%20feature-sparse%20regions%20where%20tracking%20degrades%2C%20leading%20to%20odometry%20drift%2C%20corrupted%20maps%2C%20and%20mission%20failure.%20We%20propose%20a%20hierarchical%20perception-aware%20exploration%20framework%20for%20a%20stereo-equipped%20unmanned%20aerial%20vehicle%20%28UAV%29%20that%20explicitly%20couples%20exploration%20progress%20with%20feature%20observability.%20Our%20approach%20%28i%29%20associates%20each%20candidate%20frontier%20with%20an%20expected%20feature%20quality%20using%20a%20global%20feature%20map%2C%20and%20prioritises%20visually%20informative%20subgoals%2C%20and%20%28ii%29%20optimises%20a%20continuous%20yaw%20trajectory%20along%20the%20planned%20motion%20to%20maintain%20stable%20feature%20tracks.%20We%20evaluate%20our%20method%20in%20simulation%20across%20environments%20with%20varying%20texture%20levels%20and%20in%20real-world%20indoor%20experiments%20with%20largely%20textureless%20walls.%20Compared%20to%20baselines%20that%20ignore%20feature%20quality%20and/or%20do%20not%20optimise%20continuous%20yaw%2C%20our%20method%20maintains%20more%20reliable%20feature%20tracking%2C%20reduces%20odometry%20drift%2C%20and%20achieves%20on%20average%2030%5C%25%20higher%20coverage%20before%20the%20odometry%20error%20exceeds%20specified%20thresholds.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15605v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPerception-Aware%2520Autonomous%2520Exploration%2520in%2520Feature-Limited%2520Environments%26entry.906535625%3DMoji%2520Shi%2520and%2520Rajitha%2520de%2520Silva%2520and%2520Hang%2520Yu%2520and%2520Riccardo%2520Polvara%2520and%2520Marija%2520Popovi%25C4%2587%26entry.1292438233%3DAutonomous%2520exploration%2520in%2520unknown%2520environments%2520typically%2520relies%2520on%2520onboard%2520state%2520estimation%2520for%2520localisation%2520and%2520mapping.%2520Existing%2520exploration%2520methods%2520primarily%2520maximise%2520coverage%2520efficiency%252C%2520but%2520often%2520overlook%2520that%2520visual-inertial%2520odometry%2520%2528VIO%2529%2520performance%2520strongly%2520depends%2520on%2520the%2520availability%2520of%2520robust%2520visual%2520features.%2520As%2520a%2520result%252C%2520exploration%2520policies%2520can%2520drive%2520a%2520robot%2520into%2520feature-sparse%2520regions%2520where%2520tracking%2520degrades%252C%2520leading%2520to%2520odometry%2520drift%252C%2520corrupted%2520maps%252C%2520and%2520mission%2520failure.%2520We%2520propose%2520a%2520hierarchical%2520perception-aware%2520exploration%2520framework%2520for%2520a%2520stereo-equipped%2520unmanned%2520aerial%2520vehicle%2520%2528UAV%2529%2520that%2520explicitly%2520couples%2520exploration%2520progress%2520with%2520feature%2520observability.%2520Our%2520approach%2520%2528i%2529%2520associates%2520each%2520candidate%2520frontier%2520with%2520an%2520expected%2520feature%2520quality%2520using%2520a%2520glob {"title": "GoalSwarm: Multi-UAV Semantic Coordination for Open-Vocabulary Object Navigation", "author": "MoniJesu Wonders James and Amir Atef Habel and Aleksey Fedoseev and Dzmitry Tsetserokou", "abstract": "Cooperative visual semantic navigation is a foundational capability for aerial robot teams operating in unknown environments. However, achieving robust open-vocabulary object-goal navigation remains challenging due to the computational constraints of deploying heavy perception models onboard and the complexity of decentralized multi-agent coordination. We present GoalSwarm, a fully decentralized multi-UAV framework for zero-shot semantic object-goal navigation. Each UAV collaboratively constructs a shared, lightweight 2D top-down semantic occupancy map by projecting depth observations from aerial vantage points, eliminating the computational burden of full 3D representations while preserving essential geometric and semantic structure. The core contributions of GoalSwarm are threefold: (1) integration of zero-shot foundation model -- SAM3 for open vocabulary detection and pixel-level segmentation, enabling open-vocabulary target identification without task-specific training; (2) a Bayesian Value Map that fuses multi-viewpoint detection confidences into a per-pixel goal-relevance distribution, enabling informed frontier scoring via Upper Confidence Bound (UCB) exploration; and (3) a decentralized coordination strategy combining semantic frontier extraction, cost-utility bidding with geodesic path costs, and spatial separation penalties to minimize redundant exploration across the swarm.", "link": "http://arxiv.org/abs/2603.12908v2", "date": "2026-03-16", "relevancy": 2.3441, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5953}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Predictio {"title": "CASHomon Sets: Efficient Rashomon Sets Across Multiple Model Classes and their Hyperparameters", "author": "Fiona Katharina Ewald and Martin Binder and Matthias Feurer and Bernd Bischl and Giuseppe Casalicchio", "abstract": "Rashomon sets are model sets within one model class that perform nearly as well as a reference model from the same model class. They reveal the existence of alternative well-performing models, which may support different interpretations. This enables selecting models that match domain knowledge, hidden constraints, or user preferences. However, efficient construction methods currently exist for only a few model classes. Applied machine learning usually searches many model classes, and the best class is unknown beforehand. We therefore study Rashomon sets in the combined algorithm selection and hyperparameter optimization (CASH) setting and call them CASHomon sets. We propose TruVaRImp, a model-based active learning algorithm for level set estimation with an implicit threshold, and provide convergence guarantees. On synthetic and real-world datasets, TruVaRImp reliably identifies CASHomon sets members and matches or outperforms naive sampling, Bayesian optimization, classical and implicit level set estimation methods, and other baselines. Our analyses of predictive multiplicity and feature-importance variability across model classes question the common practice of interpreting data through a single model class.", "link": "http://arxiv.org/abs/2603.15321v1", "date": "2026-03-16", "relevancy": 2.3413, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.492}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4568}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.456}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CASHomon%20Sets%3A%20Efficient%20Rashomon%20Sets%20Across%20Multiple%20Model%20Classes%20and%20their%20Hyperparameters&body=Title%3A%20CASHomon%20Sets%3A%20Efficient%20Rashomon%20Sets%20Across%20Multiple%20Model%20Classes%20and%20their%20Hyperparameters%0AAuthor%3A%20Fiona%20Katharina%20Ewald%20and%20Martin%20Binder%20and%20Matthias%20Feurer%20and%20Bernd%20Bischl%20and%20Giuseppe%20Casalicchio%0AAbstract%3A%20Rashomon%20sets%20are%20model%20sets%20within%20one%20model%20class%20that%20perform%20nearly%20as%20well%20as%20a%20reference%20model%20from%20the%20same%20model%20class.%20They%20reveal%20the%20existence%20of%20alternative%20well-performing%20models%2C%20which%20may%20support%20different%20interpretations.%20This%20enables%20selecting%20models%20that%20match%20domain%20knowledge%2C%20hidden%20constraints%2C%20or%20user%20preferences.%20However%2C%20efficient%20construction%20methods%20currently%20exist%20for%20only%20a%20few%20model%20classes.%20Applied%20machine%20learning%20usually%20searches%20many%20model%20classes%2C%20and%20the%20best%20class%20is%20unknown%20beforehand.%20We%20therefore%20study%20Rashomon%20sets%20in%20the%20combined%20algorithm%20selection%20and%20hyperparameter%20optimization%20%28CASH%29%20setting%20and%20call%20them%20CASHomon%20sets.%20We%20propose%20TruVaRImp%2C%20a%20model-based%20active%20learning%20algorithm%20for%20level%20set%20estimation%20with%20an%20implicit%20threshold%2C%20and%20provide%20convergence%20guarantees.%20On%20synthetic%20and%20real-world%20datasets%2C%20TruVaRImp%20reliably%20identifies%20CASHomon%20sets%20members%20and%20matches%20or%20outperforms%20naive%20sampling%2C%20Bayesian%20optimization%2C%20classical%20and%20implicit%20level%20set%20estimation%20methods%2C%20and%20other%20baselines.%20Our%20analyses%20of%20predictive%20multiplicity%20and%20feature-importance%20variability%20across%20model%20classes%20question%20the%20common%20practice%20of%20interpreting%20data%20through%20a%20single%20model%20class.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15321v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCASHomon%2520Sets%253A%2520Efficient%2520Rashomon%2520Sets%2520Across%2520Multiple%2520Model%2520Classes%2520and%2520their%2520Hyperparameters%26entry.906535625%3DFiona%2520Katharina%2520Ewald%2520and%2520Martin%2520Binder%2520and%2520Matthias%2520Feurer%2520and%2520Bernd%2520Bischl%2520and%2520Giuseppe%2520Casalicchio%26entry.1292438233%3DRashomon%2520sets%2520are%2520model%2520sets%2520within%2520one%2520model%2520class%2520that%2520perform%2520nearly%2520as%2520well%2520as%2520a%2520reference%2520model%2520from%2520the%2520same%2520model%2520class.%2520They%2520reveal%2520the%2520existence%2520of%2520alternative%2520well-performing%2520models%252C%2520which%2520may%2520support%2520different%2520interpretations.%2520This%2520enables%2520selecting%2520models%2520that%2520match%2520domain%2520knowledge%252C%2520hidden%2520constraints%252C%2520or%2520user%2520preferences.%2520However%252C%2520efficient%2520construction%2520methods%2520currently%2520exist%2520for%2520only%2520a%2520few%2520model%2520classes.%2520Applied%2520machine%2520learning%2520usually%2520searches%2520many%2520model%2520classes%252C%2520and%2520the%2520best%2520class%2520is%2520unknown%2520beforehand.%2520We%2520therefore%2520study%2520Rashomon%2520sets%2520in%2520the%2520combined%2520algorithm%2520selection%2520and%2520hyperparameter%2520optimization%2520%2528CASH%2529%2520setting%2520and%2520call%2520them%2520CASHomon%2520sets.%2520We%2520propose%2520TruVaRImp%252C%2520a%2520model-based%2520active%2520learning%2520algorithm%2520for%2520level%2520set%2520estimation%2520wit {"title": "AeroGrab: A Unified Framework for Aerial Grasping in Cluttered Environments", "author": "Shivansh Pratap Singh and Naveen Sudheer Nair and Samaksh Ujjawal and Sarthak Mishra and Soham Patil and Rishabh Dev Yadav and Spandan Roy", "abstract": "Reliable aerial grasping in cluttered environments remains challenging due to occlusions and collision risks. Existing aerial manipulation pipelines largely rely on centroid-based grasping and lack integration between the grasp pose generation models, active exploration, and language-level task specification, resulting in the absence of a complete end-to-end system. In this work, we present an integrated pipeline for reliable aerial grasping in cluttered environments. Given a scene and a language instruction, the system identifies the target object and actively explores it to gain better views of the object. During exploration, a grasp generation network predicts multiple 6-DoF grasp candidates for each view. Each candidate is evaluated using a collision-aware feasibility framework, and the overall best grasp is selected and executed using standard trajectory generation and control methods. Experiments in cluttered real-world scenarios demonstrate robust and reliable grasp execution, highlighting the effectiveness of combining active perception with feasibility-aware grasp selection for aerial manipulation.", "link": "http://arxiv.org/abs/2603.15097v1", "date": "2026-03-16", "relevancy": 2.341, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6324}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5915}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5356}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5 {"title": "Gym-V: A Unified Vision Environment System for Agentic Vision Research", "author": "Fanqing Meng Lingxiao Du Jiawei Gu Jiaqi Liao Linjie Li Zijian Wu Xiangyan Liu Ziqi Zhao Mengkang Hu Yue Zhang Zichen Liu Jiaheng Zhang Michael Qizhe Shieh", "abstract": "As agentic systems increasingly rely on reinforcement learning from verifiable rewards, standardized ``gym'' infrastructure has become essential for rapid iteration, reproducibility, and fair comparison. Vision agents lack such infrastructure, limiting systematic study of what drives their learning and where current models fall short. We introduce \\textbf{Gym-V}, a unified platform of 179 procedurally generated visual environments across 10 domains with controllable difficulty, enabling controlled experiments that were previously infeasible across fragmented toolkits. Using it, we find that observation scaffolding is more decisive for training success than the choice of RL algorithm, with captions and game rules determining whether learning succeeds at all. Cross-domain transfer experiments further show that training on diverse task categories generalizes broadly while narrow training can cause negative transfer, with multi-turn interaction amplifying all of these effects. Gym-V is released as a convenient foundation for training environments and evaluation toolkits, aiming to accelerate future research on agentic VLMs.", "link": "http://arxiv.org/abs/2603.15432v1", "date": "2026-03-16", "relevancy": 2.3359, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.6152}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5737}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5568}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gym-V%3A%20A%20Unified%20Vision%20Environment%20System%20for%20Agentic%20Vision%20Research&body=Title%3A%20Gym-V%3A%20A%20Unified%20Vision%20Environment%20System%20for%20Agentic%20Vision%20Research%0AAuthor%3A%20Fanqing%20Meng%20Lingxiao%20Du%20Jiawei%20Gu%20Jiaqi%20Liao%20Linjie%20Li%20Zijian%20Wu%20Xiangyan%20Liu%20Ziqi%20Zhao%20Mengkang%20Hu%20Yue%20Zhang%20Zichen%20Liu%20Jiaheng%20Zhang%20Michael%20Qizhe%20Shieh%0AAbstract%3A%20As%20agentic%20systems%20increasingly%20rely%20on%20reinforcement%20learning%20from%20verifiable%20rewards%2C%20standardized%20%60%60gym%27%27%20infrastructure%20has%20become%20essential%20for%20rapid%20iteration%2C%20reproducibility%2C%20and%20fair%20comparison.%20Vision%20agents%20lack%20such%20infrastructure%2C%20limiting%20systematic%20study%20of%20what%20drives%20their%20learning%20and%20where%20current%20models%20fall%20short.%20We%20introduce%20%5Ctextbf%7BGym-V%7D%2C%20a%20unified%20platform%20of%20179%20procedurally%20generated%20visual%20environments%20across%2010%20domains%20with%20controllable%20difficulty%2C%20enabling%20controlled%20experiments%20that%20were%20previously%20infeasible%20across%20fragmented%20toolkits.%20Using%20it%2C%20we%20find%20that%20observation%20scaffolding%20is%20more%20decisive%20for%20training%20success%20than%20the%20choice%20of%20RL%20algorithm%2C%20with%20captions%20and%20game%20rules%20determining%20whether%20learning%20succeeds%20at%20all.%20Cross-domain%20transfer%20experiments%20further%20show%20that%20training%20on%20diverse%20task%20categories%20generalizes%20broadly%20while%20narrow%20training%20can%20cause%20negative%20transfer%2C%20with%20multi-turn%20interaction%20amplifying%20all%20of%20these%20effects.%20Gym-V%20is%20released%20as%20a%20convenient%20foundation%20for%20training%20environments%20and%20evaluation%20toolkits%2C%20aiming%20to%20accelerate%20future%20research%20on%20agentic%20VLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15432v1%0AForm%3A fer%252C%2520with%2520multi-turn%2520interaction%2520amplifying%2520all%2520of%2520these%2520effects.%2520Gym-V%2520is%2520released%2520as%2520a%2520convenient%2520foundation%2520for%2520training%2520environments%2520and%2520evaluation%2520toolkits%252C%2520aiming%2520to%2520accelerate%2520future%2520research%2520on%2520agentic%2520VLMs.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.15432v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Gym-V%3A%20A%20Unified%20Vision%20Environment%20System%20for%20Agentic%20Vision%20Research&entry.906535625=Fanqing%20Meng%20Lingxiao%20Du%20Jiawei%20Gu%20Jiaqi%20Liao%20Linjie%20Li%20Zijian%20Wu%20Xiangyan%20Liu%20Ziqi%20Zhao%20Mengkang%20Hu%20Yue%20Zhang%20Zichen%20Liu%20Jiaheng%20Zhang%20Michael%20Qizhe%20Shieh&entry.1292438233=As%20agentic%20systems%20increasingly%20rely%20on%20reinforcement%20learning%20from%20verifiable%20rewards%2C%20standardized%20%60%60gym%27%27%20infrastructure%20has%20become%20essential%20for%20rapid%20iteration%2C%20reproducibility%2C%20and%20fair%20comparison.%20Vision%20agents%20lack%20such%20infrastructure%2C%20limiting%20systematic%20study%20of%20what%20drives%20their%20learning%20and%20where%20current%20models%20fall%20short.%20We%20introduce%20%5Ctextbf%7BGym-V%7D%2C%20a%20unified%20platform%20of%20179%20procedurally%20generated%20visual%20environments%20across%2010%20domains%20with%20controllable%20difficulty%2C%20enabling%20controlled%20experiments%20that%20were%20previously%20infeasible%20across%20fragmented%20toolkits.%20Using%20it%2C%20we%20find%20that%20observation%20scaffolding%20is%20more%20decisive%20for%20training%20success%20than%20the%20choice%20of%20RL%20algorithm%2C%20with%20captions%20and%20game%20rules%20determining%20whether%20learning%20succeeds%20at%20all.%20Cross-domain%20transfer%20experiments%20further%20show%20that%20training%20on%20diverse%20task%20categories%20genera {"title": "Live Avatar: Streaming Real-time Audio-Driven Avatar Generation with Infinite Length", "author": "Yubo Huang and Hailong Guo and Fangtai Wu and Shifeng Zhang and Shijie Huang and Qijun Gan and Lin Liu and Sirui Zhao and Enhong Chen and Jiaming Liu and Steven Hoi", "abstract": "Audio-driven avatar interaction demands real-time, streaming, and infinite-length generation -- capabilities fundamentally at odds with the sequential denoising and long-horizon drift of current diffusion models. We present Live Avatar, an algorithm-system co-designed framework that addresses both challenges for a 14-billion-parameter diffusion model. On the algorithm side, a two-stage pipeline distills a pretrained bidirectional model into a causal, few-step streaming one, while a set of complementary long-horizon strategies eliminate identity drift and visual artifacts, enabling stable autoregressive generation exceeding 10000 seconds. On the system side, Timestep-forcing Pipeline Parallelism (TPP) assigns each GPU a fixed denoising timestep, converting the sequential diffusion chain into an asynchronous spatial pipeline that simultaneously boosts throughput and improves temporal consistency. Live Avatar achieves 45 FPS with a TTFF of 1.21\\,s on 5 H800 GPUs, and to our knowledge is the first to enable practical real-time streaming of a 14B diffusion model for infinite-length avatar generation. We further introduce GenBench, a standardized long-form benchmark, to facilitate reproducible evaluation. Our project page is at https://liveavatar.github.io/.", "link": "http://arxiv.org/abs/2512.04677v4", "date": "2026-03-16", "relevancy": 2.3281, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5934}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5806}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5712}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Live%20Avatar%3A%20Streaming%20Real-time%20Audio-Driven%20Avatar%20Generation%20with%20Infinite%20Length&body=Title%3A%20Live%20Avatar%3A%20Streaming%20Real-time%20Audio-Driven%20Avatar%20Generation%20with%20Infinite%20Length%0AAuthor%3A%20Yubo%20Huang%20and%20Hailong%20Guo%20and%20Fangtai%20Wu%20and%20Shifeng%20Zhang%20and%20Shijie%20Huang%20and%20Qijun%20Gan%20and%20Lin%20Liu%20and%20Sirui%20Zhao%20and%20Enhong%20Chen%20and%20Jiaming%20Liu%20and%20Steven%20Hoi%0AAbstract%3A%20Audio-driven%20avatar%20interaction%20demands%20real-time%2C%20streaming%2C%20and%20infinite-length%20generation%20--%20capabilities%20fundamentally%20at%20odds%20with%20the%20sequential%20denoising%20and%20long-horizon%20drift%20of%20current%20diffusion%20models.%20We%20present%20Live%20Avatar%2C%20an%20algorithm-system%20co-designed%20framework%20that%20addresses%20both%20challenges%20for%20a%2014-billion-parameter%20diffusion%20model.%20On%20the%20algorithm%20side%2C%20a%20two-stage%20pipeline%20distills%20a%20pretrained%20bidirectional%20model%20into%20a%20causal%2C%20few-step%20streaming%20one%2C%20while%20a%20set%20of%20complementary%20long-horizon%20strategies%20eliminate%20identity%20drift%20and%20visual%20artifacts%2C%20enabling%20stable%20autoregressive%20generation%20exceeding%2010000%20seconds.%20On%20the%20system%20side%2C%20Timestep-forcing%20Pipeline%20Parallelism%20%28TPP%29%20assigns%20each%20GPU%20a%20fixed%20denoising%20timestep%2C%20converting%20the%20sequential%20diffusion%20chain%20into%20an%20asynchronous%20spatial%20pipeline%20that%20simultaneously%20boosts%20throughput%20and%20improves%20temporal%20consistency.%20Live%20Avatar%20achieves%2045%20FPS%20with%20a%20TTFF%20of%201.21%5C%2Cs%20on%205%20H800%20GPUs%2C%20and%20to%20our%20knowledge%20is%20the%20first%20to%20enable%20practical%20real-time%20streaming%20of%20a%2014B%20diffusion%20model%20for%20infinite-length%20avatar%20generation.%20We%20further%20introduce%20GenBench%2C%20a%20standardized%20long-form%20benchmark%2C%20to%20facilitate%20reproducible%20evaluation.%20Our%20project%20page%20is%20at%20https%3A//liveavatar.github.io/.%0ALink%3A%20http%3A//arxiv.org/abs/2512.04677v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLive%2520Avatar%253A%2520Streaming%2520Real-time%2520Audio-Driven%2520Avatar%2520Generation%2520with%2520Infinite%2520Length%26entry.906535625%3DYubo%2520Huang%2520and%2520Hailong%2520Guo%2520and%2520Fangtai%2520Wu%2520and%2520Shifeng%2520Zhang%2520and%2520Shijie%2520Huang%2520and%2520Qijun%2520Gan%2520and%2520Lin%2520Liu%2520and%2520Sirui%2520Zhao%2520and%2520Enhong%2520Chen%2520and%2520Jiaming%2520Liu%2520and%2520Steven%2520Hoi%26entry.1292438233%3DAudio-driven%2520avatar%2520interaction%2520demands%2520real-time%252C%2520streaming%252C%2520and%2520infinite-length%2520generation%2520--%2520capabilities%2520fundamentally%2520at%2520odds%2520with%2520the%2520sequential%2520denoising%2520and%2520long-horizon%2520drift%2520of%2520current%2520diffusion%2520models.%2520We%2520present%2520Live%2520Avatar%252C%2520an%2520algorithm-system%2520co-designed%2520framework%2520that%2520addresses%2520both%2520challenges%2520for%2520a%252014-billion-parameter%2520diffusion%2520model.%2520On%2520the%2520algorithm%2520side%252C%2520a%2520two-stage%2520pipeline%2520distills%2520a%2520pretrained%2520bidirectional%2520model%2520into%2520a%2520causal%252C%2520few-step%2520streaming%2520one%252C%2520while%2520a%2520set%2520of%2520complementary%2520long-horizon%2520strategies%2520eliminate%2520identity%2520drift%2520and%2520visual%2520artifacts%252C%2520enabling%2520stable%2520autoregressive%2520generation%2520exceeding%252010000%2520seconds.%2520On%2520the%2520system%2520side%252C%2520Timestep-forcing%2520Pipeline%2520Parallelism%2520%2528TP {"title": "The Wisdom of Many Queries: Complexity-Diversity Principle for Dense Retriever Training", "author": "Xincan Feng and Noriki Nishida and Yusuke Sakai and Yuji Matsumoto", "abstract": "Synthetic query generation has become essential for training dense retrievers, yet prior methods generate one query per document, focusing solely on query quality. We are the first to systematically study multi-query synthesis and discover a quality-diversity trade-off: high-quality queries benefit in-domain tasks, while diverse queries benefit out-of-domain (OOD) generalization. Through controlled experiments on 4 benchmark types across Contriever, RetroMAE, and Qwen3-Embedding, we find that diversity benefit strongly correlates with query complexity (r$\\geq$0.95, p<0.05), approximated by content words (CW). We formalize this as the Complexity-Diversity Principle (CDP): query complexity determines optimal diversity. Based on CDP, we propose complexity-aware training: multi-query synthesis for high-complexity tasks and CW-weighted training for existing data. Both strategies improve OOD performance on reasoning-intensive benchmarks, with compounded gains when combined.", "link": "http://arxiv.org/abs/2602.09448v4", "date": "2026-03-16", "relevancy": 2.3247, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4718}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4718}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4513}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Wisdom%20of%20Many%20Queries%3A%20Complexity-Diversity%20Principle%20for%20Dense%20Retriever%20Training&body=Title%3A%20The%20Wisdom%20of%20Many%20Queries%3A%20Complexity-Diversity%20Principle%20for%20Dense%20Retriever%20Training%0AAuthor%3A%20Xincan%20Feng%20and%20Noriki%20Nishida%20and%20Yusuke%20Sakai%20and%20Yuji%20Matsumoto%0AAbstract%3A%20Synthetic%20query%20generation%20has%20become%20essential%20for%20training%20dense%20retrievers%2C%20yet%20prior%20methods%20generate%20one%20query%20per%20document%2C%20focusing%20solely%20on%20query%20quality.%20We%20are%20the%20first%20to%20systematically%20study%20multi-query%20synthesis%20and%20discover%20a%20quality-diversity%20trade-off%3A%20high-quality%20queries%20benefit%20in-domain%20tasks%2C%20while%20diverse%20queries%20benefit%20out-of-domain%20%28OOD%29%20generalization.%20Through%20controlled%20experiments%20on%204%20benchmark%20types%20across%20Contriever%2C%20RetroMAE%2C%20and%20Qwen3-Embedding%2C%20we%20find%20that%20diversity%20benefit%20strongly%20correlates%20with%20query%20complexity%20%28r%24%5Cgeq%240.95%2C%20p%3C0.05%29%2C%20approximated%20by%20content%20words%20%28CW%29.%20We%20formalize%20this%20as%20the%20Complexity-Diversity%20Principle%20%28CDP%29%3A%20query%20complexity%20determines%20optimal%20diversity.%20Based%20on%20CDP%2C%20we%20propose%20complexity-aware%20training%3A%20multi-query%20synthesis%20for%20high-complexity%20tasks%20and%20CW-weighted%20training%20for%20existing%20data.%20Both%20strategies%20improve%20OOD%20performance%20on%20reasoning-intensive%20benchmarks%2C%20with%20compounded%20gains%20when%20combined.%0ALink%3A%20http%3A//arxiv.org/abs/2602.09448v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Wisdom%2520of%2520Many%2520Queries%253A%2520Complexity-Diversity%2520Principle%2520for%2520Dense%2520Retriever%2520Training%26entry.906535625%3DXincan%2520Feng%2520and%2520Noriki%2520Nishida%2520and%2520Yusuke%2520Sakai%2520and%2520Yuji%2520Matsumoto%26entry.1292438233%3DSynthetic%2520query%2520generation%2520has%2520become%2520essential%2520for%2 {"title": "Zero-Shot Generalization from Motion Demonstrations to New Tasks", "author": "Kilian Freitag and Alvin Combrink and Nadia Figueroa", "abstract": "Learning motion policies from expert demonstrations is an essential paradigm in modern robotics. While end-to-end models aim for broad generalization, they require large datasets and computationally heavy inference. Conversely, learning dynamical systems (DS) provides fast, reactive, and provably stable control from very few demonstrations. However, existing DS learning methods typically model isolated tasks and struggle to reuse demonstrations for novel behaviors. In this work, we formalize the problem of combining isolated demonstrations within a shared workspace to enable generalization to unseen tasks. The Gaussian Graph is introduced, which reinterprets spatial components of learned motion primitives as discrete vertices with connections to one another. This formulation allows us to bridge continuous control with discrete graph search. We propose two frameworks leveraging this graph: Stitching, for constructing time-invariant DSs, and Chaining, giving a sequence-based DS for complex motions while retaining convergence guarantees. Simulations and real-robot experiments show that these methods successfully generalize to new tasks where baseline methods fail.", "link": "http://arxiv.org/abs/2603.15445v1", "date": "2026-03-16", "relevancy": 2.3243, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5872}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5837}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5739}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Zero-Shot%20Generalization%20from%20Motion%20Demonstrations%20to%20New%20Tasks&body=Title%3A%20Zero-Shot%20Generalization%20from%20Motion%20Demonstrations%20to%20New%20Tasks%0AAuthor%3A%20Kilian%20Freitag%20and%20Alvin%20Combrink%20and%20Nadia%20Figueroa%0AAbstract%3A%20Learning%20motion%20policies%20from%20expert%20demonstrations%20is%20an%20essential%20paradigm%20in%20modern%20robotics.%20While%20end-to-end%20models%20aim%20for%20broad%20generalization%2C%20they%20require%20large%20datasets%20and%20computationally%20heavy%20inference.%20Conversely%2C%20learning%20dynamical%20systems%20%28DS%29%20provides%20fast%2C%20reactive%2C%20and%20provably%20stable%20control%20from%20very%20few%20demonstrations.%20However%2C%20existing%20DS%20learning%20methods%20typically%20model%20isolated%20tasks%20and%20struggle%20to%20reuse%20demonstrations%20for%20novel%20behaviors.%20In%20this%20work%2C%20we%20formalize%20the%20problem%20of%20combining%20isolated%20demonstrations%20within%20a%20shared%20workspace%20to%20enable%20generalization%20to%20unseen%20tasks.%20The%20Gaussian%20Graph%20is%20introduced%2C%20which%20reinterprets%20spatial%20components%20of%20learned%20motion%20primitives%20as%20discrete%20vertices%20with%20connections%20to%20one%20another.%20This%20formulation%20allows%20us%20to%20bridge%20continuous%20control%20with%20discrete%20graph%20search.%20We%20propose%20two%20frameworks%20leveraging%20this%20graph%3A%20Stitching%2C%20for%20constructing%20time-invariant%20DSs%2C%20and%20Chaining%2C%20giving%20a%20sequence-based%20DS%20for%20complex%20motions%20while%20retaining%20convergence%20guarantees.%20Simulations%20and%20real-robot%20experiments%20show%20that%20these%20methods%20successfully%20generalize%20to%20new%20tasks%20where%20baseline%20methods%20fail.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15445v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DZero-Shot%2520Generalization%2520from%2520Motion%2520Demonstr {"title": "MV2UV: Generating High-quality UV Texture Maps with Multiview Prompts", "author": "Zheng Zhang and Qinchuan Zhang and Yuteng Ye and Zhi Chen and Penglei Ji and Mengfei Li and Wenxiao Zhang and Yuan Liu", "abstract": "Generating high-quality textures for 3D assets is a challenging task. Existing multiview texture generation methods suffer from the multiview inconsistency and missing textures on unseen parts, while UV inpainting texture methods do not generalize well due to insufficient UV data and cannot well utilize 2D image diffusion priors. In this paper, we propose a new method called MV2UV that combines 2D generative priors from multiview generation and the inpainting ability of UV refinement to get high-quality texture maps. Our key idea is to adopt a UV space generative model that simultaneously inpaints unseen parts of multiview images while resolving the inconsistency of multiview images. Experiments show that our method enables a better texture generation quality than existing methods, especially in unseen occluded and multiview-inconsistent parts.", "link": "http://arxiv.org/abs/2603.15436v1", "date": "2026-03-16", "relevancy": 2.323, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5868}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5868}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5504}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MV2UV%3A%20Generating%20High-quality%20UV%20Texture%20Maps%20with%20Multiview%20Prompts&body=Title%3A%20MV2UV%3A%20Generating%20High-quality%20UV%20Texture%20Maps%20with%20Multiview%20Prompts%0AAuthor%3A%20Zheng%20Zhang%20and%20Qinchuan%20Zhang%20and%20Yuteng%20Ye%20and%20Zhi%20Chen%20and%20Penglei%20Ji%20and%20Mengfei% arts%252C%2520while%2520UV%2520inpainting%2520texture%2520methods%2520do%2520not%2520generalize%2520well%2520due%2520to%2520insufficient%2520UV%2520data%2520and%2520cannot%2520well%2520utilize%25202D%2520image%2520diffusion%2520priors.%2520In%2520this%2520paper%252C%2520we%2520propose%2520a%2520new%2520method%2520called%2520MV2UV%2520that%2520combines%25202D%2520generative%2520priors%2520from%2520multiview%2520generation%2520and%2520the%2520inpainting%2520ability%2520of%2520UV%2520refinement%2520to%2520get%2520high-quality%2520texture%2520maps.%2520Our%2520key%2520idea%2520is%2520to%2520adopt%2520a%2520UV%2520space%2520generative%2520model%2520that%2520simultaneously%2520inpaints%2520unseen%2520parts%2520of%2520multiview%2520images%2520while%2520resolving%2520the%2520inconsistency%2520of%2520multiview%2520images.%2520Experiments%2520show%2520that%2520our%2520method%2520enables%2520a%2520better%2520texture%2520generation%2520quality%2520than%2520existing%2520methods%252C%2520especially%2520in%2520unseen%2520occluded%2520and%2520multiview-inconsistent%2520parts.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.15436v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=MV2UV%3A%20Generating%20High-quality%20UV%20Texture%20Maps%20with%20Multiview%20Prompts&entry.906535625=Zheng%20Zhang%20and%20Qinchuan%20Zhang%20and%20Yuteng%20Ye%20and%20Zhi%20Chen%20and%20Penglei%20Ji%20and%20Mengfei%20Li%20and%20Wenxiao%20Zhang%20and%20Yuan%20Liu&entry.1292438233=Generating%20high-quality%20textures%20for%203D%20assets%20is%20a%20challenging%20task.%20Existing%20multiview%20texture%20generation%20methods%20suffer%20from%20the%20multiview%20inconsistency%20and%20missing%20textures%20on%20unseen%20parts%2C%20while%20UV%20inpainting%20texture%20methods%20do%20not%20generalize%20well%20due%20to%20insufficient%20UV%20data%20and%20cannot%20well%20utilize%202D%20image%20diffusion%20priors. {"title": "Benchmarking Semantic Segmentation Models via Appearance and Geometry Attribute Editing", "author": "Zijin Yin and Bing Li and Kongming Liang and Hao Sun and Zhongjiang He and Zhanyu Ma and Jun Guo", "abstract": "Semantic segmentation takes pivotal roles in various applications such as autonomous driving and medical image analysis. When deploying segmentation models in practice, it is critical to test their behaviors in varied and complex scenes in advance. In this paper, we construct an automatic data generation pipeline Gen4Seg to stress-test semantic segmentation models by generating various challenging samples with different attribute changes. Beyond previous evaluation paradigms focusing solely on global weather and style transfer, we investigate variations in both appearance and geometry attributes at the object and image level. These include object color, material, size, position, as well as image-level variations such as weather and style. To achieve this, we propose to edit visual attributes of existing real images with precise control of structural information, empowered by diffusion models. In this way, the existing segmentation labels can be reused for the edited images, which greatly reduces the labor costs. Using our pipeline, we construct two new benchmarks, Pascal-EA and COCO-EA. We benchmark a wide variety of semantic segmentation models, spanning from closed-set models to open-vocabulary large models. We have several key findings: 1) advanced open-vocabulary models do not exhibit greater robustness compared to closed-set methods under geometric variations; 2) data augmentation techniques, such as CutOut and CutMix, are limited in enhancing robustness against appearance variations; 3) our pipeline can also be employed as a data augmentation tool and improve both in-distribution and out-of-distribution performances. Our work suggests the potential of generative models as effective tools for automatically analyzing segmentation models, and ct%20color%2C%20material%2C%20size%2C%20position%2C%20as%20well%20as%20image-level%20variations%20such%20as%20weather%20and%20style.%20To%20achieve%20this%2C%20we%20propose%20to%20edit%20visual%20attributes%20of%20existing%20real%20images%20with%20precise%20control%20of%20structural%20information%2C%20empowered%20by%20diffusion%20models.%20In%20this%20way%2C%20the%20existing%20segmentation%20labels%20can%20be%20reused%20for%20the%20edited%20images%2C%20which%20greatly%20reduces%20the%20labor%20costs.%20Using%20our%20pipeline%2C%20we%20construct%20two%20new%20benchmarks%2C%20Pascal-EA%20and%20COCO-EA.%20We%20benchmark%20a%20wide%20variety%20of%20semantic%20segmentation%20models%2C%20spanning%20from%20closed-set%20models%20to%20open-vocabulary%20large%20models.%20We%20have%20several%20key%20findings%3A%201%29%20advanced%20open-vocabulary%20models%20do%20not%20exhibit%20greater%20robustness%20compared%20to%20closed-set%20methods%20under%20geometric%20variations%3B%202%29%20data%20augmentation%20techniques%2C%20such%20as%20CutOut%20and%20CutMix%2C%20are%20limited%20in%20enhancing%20robustness%20against%20appearance%20variations%3B%203%29%20our%20pipeline%20can%20also%20be%20employed%20as%20a%20data%20augmentation%20tool%20and%20improve%20both%20in-distribution%20and%20out-of-distribution%20performances.%20Our%20work%20suggests%20the%20potential%20of%20generative%20models%20as%20effective%20tools%20for%20automatically%20analyzing%20segmentation%20models%2C%20and%20we%20hope%20our%20findings%20will%20assist%20practitioners%20and%20researchers%20in%20developing%20more%20robust%20and%20reliable%20segmentation%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.01535v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBenchmarking%2520Semantic%2520Segmentation%2520Models%2520via%2520Appearance%2520and%2520Geometry%2520Attribute%2520Editing%26entry.906535625%3DZijin%2520Yin%2520and%2520Bing%252 {"title": "A Tri-Modal Dataset and a Baseline System for Tracking Unmanned Aerial Vehicles", "author": "Tianyang Xu and Jinjie Gu and Xuefeng Zhu and XiaoJun Wu and Josef Kittler", "abstract": "With the proliferation of low altitude unmanned aerial vehicles (UAVs), visual multi-object tracking is becoming a critical security technology, demanding significant robustness even in complex environmental conditions. However, tracking UAVs using a single visual modality often fails in challenging scenarios, such as low illumination, cluttered backgrounds, and rapid motion. Although multi-modal multi-object UAV tracking is more resilient, the development of effective solutions has been hindered by the absence of dedicated public datasets. To bridge this gap, we release MM-UAV, the first large-scale benchmark for Multi-Modal UAV Tracking, integrating three key sensing modalities, e.g. RGB, infrared (IR), and event signals. The dataset spans over 30 challenging scenarios, with 1,321 synchronised multi-modal sequences, and more than 2.8 million annotated frames. Accompanying the dataset, we provide a novel multi-modal multi-UAV tracking framework, designed specifically for UAV tracking applications and serving as a baseline for future research. Our framework incorporates two key technical innovations, e.g. an offset-guided adaptive alignment module to resolve spatio mismatches across sensors, and an adaptive dynamic fusion module to balance complementary information conveyed by different modalities. Furthermore, to overcome the limitations of conventional appearance modelling in multi-object tracking, we introduce an event-enhanced association mechanism that leverages motion cues from the event modality for more reliable identity maintenance. Comprehensive experiments demonstrate that the proposed framework consistently outperforms state-of-the-art methods. To foster further research in multi-modal UAV tracking, both the dataset and source code will be made publicly available {"title": "Pointing-Based Object Recognition", "author": "Luk\u00e1\u0161 Hajd\u00fach and Viktor Kocur", "abstract": "This paper presents a comprehensive pipeline for recognizing objects targeted by human pointing gestures using RGB images. As human-robot interaction moves toward more intuitive interfaces, the ability to identify targets of non-verbal communication becomes crucial. Our proposed system integrates several existing state-of-the-art methods, including object detection, body pose estimation, monocular depth estimation, and vision-language models. We evaluate the impact of 3D spatial information reconstructed from a single image and the utility of image captioning models in correcting classification errors. Experimental results on a custom dataset show that incorporating depth information significantly improves target identification, especially in complex scenes with overlapping objects. The modularity of the approach allows for deployment in environments where specialized depth sensors are unavailable.", "link": "http://arxiv.org/abs/2603.15403v1", "date": "2026-03-16", "relevancy": 2.2987, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6015}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5562}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.554}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Pointing-Based%20Object%20Recognition&body=Title%3A%20Pointing-Based%20Object%20Recognition%0AAuthor%3A%20Luk%C3%A1%C5%A1%20Hajd%C3%BAch%20and%20Viktor%20Kocur%0AAbstract%3A%20This%20paper%20presents%20a%20comprehensive%20pipeline%20for%20recognizing%20objects%20targeted%20b

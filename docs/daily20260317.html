{"title": "Deformation-Invariant Neural Network and Its Applications in Distorted Image Restoration and Analysis", "author": "Han Zhang and Qiguang Chen and Lok Ming Lui", "abstract": "Images degraded by geometric distortions pose a significant challenge to imaging and computer vision tasks such as object recognition. Deep learning-based imaging models usually fail to give accurate performance for geometrically distorted images. In this paper, we propose the deformation-invariant neural network (DINN), a framework to address the problem of imaging tasks for geometrically distorted images. The DINN outputs consistent latent features for images that are geometrically distorted but represent the same underlying object or scene. The idea of DINN is to incorporate a simple component, called the quasiconformal transformer network (QCTN), into other existing deep networks for imaging tasks. The QCTN is a deep neural network that outputs a quasiconformal map, which can be used to transform a geometrically distorted image into an improved version that is closer to the distribution of natural or good images. It first outputs a Beltrami coefficient, which measures the quasiconformality of the output deformation map. By controlling the Beltrami coefficient, the local geometric distortion under the quasiconformal mapping can be controlled. The QCTN is lightweight and simple, which can be readily integrated into other existing deep neural networks to enhance their performance. Leveraging our framework, we have developed an image classification network that achieves accurate classification of distorted images. Our proposed framework has been applied to restore geometrically distorted images by atmospheric turbulence and water turbulence. DINN outperforms existing GAN-based restoration methods under these scenarios, demonstrating the effectiveness of the proposed framework. Additionally, we apply our proposed framework to the 1-1 verification of human face images under atmospheric turbulence and achieve satisfactory performance, further demonstrating the efficacy of our approach.", "link": "http://arxiv.org/abs/2310.02641v3", "date": "2026-03-16", "relevancy": 2.2784, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5899}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5754}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.547}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Deformation-Invariant%20Neural%20Network%20and%20Its%20Applications%20in%20Distorted%20Image%20Restoration%20and%20Analysis&body=Title%3A%20Deformation-Invariant%20Neural%20Network%20and%20Its%20Applications%20in%20Distorted%20Image%20Restoration%20and%20Analysis%0AAuthor%3A%20Han%20Zhang%20and%20Qiguang%20Chen%20and%20Lok%20Ming%20Lui%0AAbstract%3A%20Images%20degraded%20by%20geometric%20distortions%20pose%20a%20significant%20challenge%20to%20imaging%20and%20computer%20vision%20tasks%20such%20as%20object%20recognition.%20Deep%20learning-based%20imaging%20models%20usually%20fail%20to%20give%20accurate%20performance%20for%20geometrically%20distorted%20images.%20In%20this%20paper%2C%20we%20propose%20the%20deformation-invariant%20neural%20network%20%28DINN%29%2C%20a%20framework%20to%20address%20the%20problem%20of%20imaging%20tasks%20for%20geometrically%20distorted%20images.%20The%20DINN%20outputs%20consistent%20latent%20features%20for%20images%20that%20are%20geometrically%20distorted%20but%20represent%20the%20same%20underlying%20object%20or%20scene.%20The%20idea%20of%20DINN%20is%20to%20incorporate%20a%20simple%20component%2C%20called%20the%20quasiconformal%20transformer%20network%20%28QCTN%29%2C%20into%20other%20existing%20deep%20networks%20for%20imaging%20tasks.%20The%20QCTN%20is%20a%20deep%20neural%20network%20that%20outputs%20a%20quasiconformal%20map%2C%20which%20can%20be%20used%20to%20transform%20a%20geometrically%20distorted%20image%20into%20an%20improved%20version%20that%20is%20closer%20to%20the%20distribution%20of%20natural%20or%20good%20images.%20It%20first%20outputs%20a%20Beltrami%20coefficient%2C%20which%20measures%20the%20quasiconformality%20of%20the%20output%20deformation%20map.%20By%20controlling%20the%20Beltrami%20coefficient%2C%20the%20local%20geometric%20distortion%20under%20the%20quasiconformal%20mapping%20can%20be%20controlled.%20The%20QCTN%20is%20lightweight%20and%20simple%2C%20which%20can%20be%20readily%20integrated%20into%20other%20existing%20deep%20neural%20networks%20to%20enhance%20their%20performance.%20Leveraging%20our%20framework%2C%20we%20have%20developed%20an%20image%20classification%20network%20that%20achieves%20accurate%20classification%20of%20distorted%20images.%20Our%20proposed%20framework%20has%20been%20applied%20to%20restore%20geometrically%20distorted%20images%20by%20atmospheric%20turbulence%20and%20water%20turbulence.%20DINN%20outperforms%20existing%20GAN-based%20restoration%20methods%20under%20these%20scenarios%2C%20demonstrating%20the%20effectiveness%20of%20the%20proposed%20framework.%20Additionally%2C%20we%20apply%20our%20proposed%20framework%20to%20the%201-1%20verification%20of%20human%20face%20images%20under%20atmospheric%20turbulence%20and%20achieve%20satisfactory%20performance%2C%20further%20demonstrating%20the%20efficacy%20of%20our%20approach.%0ALink%3A%20http%3A//arxiv.org/abs/2310.02641v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDeformation-Invariant%2520Neural%2520Network%2520and%2520Its%2520Applications%2520in%2520Distorted%2520Image%2520Restoration%2520and%2520Analysis%26entry.906535625%3DHan%2520Zhang%2520and%2520Qiguang%2520Chen%2520and% {"title": "Deep Reinforcement Learning for Fano Hypersurfaces", "author": "Marc Truter", "abstract": "We design a deep reinforcement learning algorithm to explore a high-dimensional integer lattice with sparse rewards, training a feedforward neural network as a dynamic search heuristic to steer exploration toward reward dense regions. We apply this to the discovery of Fano 4-fold hypersurfaces with terminal singularities, objects of central importance in algebraic geometry. Fano varieties with terminal singularities are fundamental building blocks of algebraic varieties, and explicit examples serve as a vital testing ground for the development and generalisation of theory. Despite decades of effort, the combinatorial intractability of the underlying search space has left this classification severely incomplete. Our reinforcement learning approach yields thousands of previously unknown examples, hundreds of which we show are inaccessible to known search methods.", "link": "http://arxiv.org/abs/2603.15437v1", "date": "2026-03-16", "relevancy": 2.2678, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4594}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4547}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4466}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Deep%20Reinforcement%20Learning%20for%20Fano%20Hypersurfaces&body=Title%3A%20Deep%20Reinforcement%20Learning%20for%20Fano%20Hypersurfaces%0AAuthor%3A%20Marc%20Truter%0AAbstract%3A%20We%20design%20a%20deep%20reinforcement%20learning%20algorithm%20to%20explore%20a%20high-dimensional%20integer%20lattice%20with%20sparse%20rewards%2C%20training%20a%20feedforward%20neural%20network%20as%20 {"title": "Seeing Beyond: Extrapolative Domain Adaptive Panoramic Segmentation", "author": "Yuanfan Zheng and Kunyu Peng and Xu Zheng and Kailun Yang", "abstract": "Cross-domain panoramic semantic segmentation has attracted growing interest as it enables comprehensive 360\u00b0 scene understanding for real-world applications. However, it remains particularly challenging due to severe geometric Field of View (FoV) distortions and inconsistent open-set semantics across domains. In this work, we formulate an open-set domain adaptation setting, and propose Extrapolative Domain Adaptive Panoramic Segmentation (EDA-PSeg) framework that trains on local perspective views and tests on full 360\u00b0 panoramic images, explicitly tackling both geometric FoV shifts across domains and semantic uncertainty arising from previously unseen classes. To this end, we propose the Euler-Margin Attention (EMA), which introduces an angular margin to enhance viewpoint-invariant semantic representation, while performing amplitude and phase modulation to improve generalization toward unseen classes. Additionally, we design the Graph Matching Adapter (GMA), which builds high-order graph relations to align shared semantics across FoV shifts while effectively separating novel categories through structural adaptation. Extensive experiments on four benchmark datasets under camera-shift, weather-condition, and open-set scenarios demonstrate that EDA-PSeg achieves state-of-the-art performance, robust generalization to diverse viewing geometries, and resilience under varying environmental conditions. The code is available at https://github.com/zyfone/EDA-PSeg.", "link": "http://arxiv.org/abs/2603.15475v1", "date": "2026-03-16", "relevancy": 2.2661, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5713}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", " {"title": "Muon Converges under Heavy-Tailed Noise: Nonconvex H\u00f6lder-Smooth Empirical Risk Minimization", "author": "Hideaki Iiduka", "abstract": "Muon is a recently proposed optimizer that enforces orthogonality in parameter updates by projecting gradients onto the Stiefel manifold, leading to stable and efficient training in large-scale deep neural networks. Meanwhile, the previously reported results indicated that stochastic noise in practical machine learning may exhibit heavy-tailed behavior, violating the bounded-variance assumption. In this paper, we consider the problem of minimizing a nonconvex H\u00f6lder-smooth empirical risk that works well with the heavy-tailed stochastic noise. We then show that Muon converges to a stationary point of the empirical risk under the boundedness condition accounting for heavy-tailed stochastic noise. In addition, we show that Muon converges faster than mini-batch SGD.", "link": "http://arxiv.org/abs/2603.15059v1", "date": "2026-03-16", "relevancy": 2.2619, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4648}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4492}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4432}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Muon%20Converges%20under%20Heavy-Tailed%20Noise%3A%20Nonconvex%20H%C3%B6lder-Smooth%20Empirical%20Risk%20Minimization&body=Title%3A%20Muon%20Converges%20under%20Heavy-Tailed%20Noise%3A%20Nonconvex%20H%C3%B6lder-Smooth%20Empirical%20Risk%20Minimization%0AAuthor%3A%20Hideaki%20Iiduka%0AAbstract%3A%20Muon%20is%20a%20recently%20proposed%20optimizer%20that%20enforces%20orthogonality%20in%20parameter%20updates%20by%20projecting%20gradients%20onto%20the%20Stiefel%20manifold%2C%20leading%20to%20stable%20and%20efficient%20training%20in%20large-scale%20deep%20neural%20networks.%20Meanwhile%2C%20the%20previously%20reported%20results%20indicated%20that%20stochastic%20noise%20in%20practical%20machine%20learning%20may%20exhibit%20heavy-tailed%20behavior%2C%20violating%20the%20bounded-variance%20assumption.%20In%20this%20paper%2C%20we%20consider%20the%20problem%20of%20minimizing%20a%20nonconvex%20H%C3%B6lder-smooth%20empirical%20risk%20that%20works%20well%20with%20the%20heavy-tailed%20stochastic%20noise.%20We%20then%20show%20that%20Muon%20converges%20to%20a%20stationary%20point%20of%20the%20empirical%20risk%20under%20the%20boundedness%20condition%20accounting%20for%20heavy-tailed%20stochastic%20noise.%20In%20addition%2C%20we%20show%20that%20Muon%20converges%20faster%20than%20mini-batch%20SGD.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15059v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMuon%2520Converges%2520under%2520Heavy-Tailed%2520Noise%253A%2520Nonconvex%2520H%25C3%25B6lder-Smooth%2520Empirical%2520Risk%2520Minimization%26entry.906535625%3DHideaki%2520Iiduka%26entry.1292438233%3DMuon%2520is%2520a%2520recently%2520proposed%2520optimizer%2520that%2520enforces%2520orthogonality%2520in%2520parameter%2520updates%2520by%2520projecting%2520gradients%2520onto%2520the%2520Stiefel%2520manifold%252C%2520leading%2520to%2520stable%2520and%2520efficient%2520training%2520in%2520large-scale%2520deep%2520neural%2520networks.%2520Meanwhile%252C%2520the%2520previously%2520reported%2520results%2520indicated%2520that%2520stochastic%2520noise%2520in%2520practical%2520machine%2520learning%2520may%2520exhibit%2520heavy-tailed%2520behavior%252C%2520violating%2520the%2520bounded-variance%2520assumption.%2520In%2520this%2520paper%252C%2520we%2520consider%2520the%2520problem%2520of%2520minimizing%2520a%2520nonconvex%2520H%25C3%25B6lder-smooth%2520empirical%2520risk%2520that%2520works%2520well%2520with%2520the%2520heavy-tailed%2520stochastic%2520noise.%2520We%2520then%2520show%2520that%2520Muon%2520converges%2520to%2520a%2520stationary%2520point%2520of%2520the%2520empirical%2520risk%2520under%2520the%2520boundedness%2520condition%2520accounting%2520for%2520heavy-tailed%2520stochastic%2520noise.%2520In%2520addition%252C%2520we%2520show%2520that%2520Muon%2520converges%2520faster%2520than%2520mini-batch%2520SGD.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.15059v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Muon%20Converges%20under%20Heavy-Tailed%20Noise%3A%20Nonconvex%20H%C3%B6lder-Smooth%20Empirical%20Risk%20Minimization&entry.906535625=Hideaki%20Iiduka&entry.1292438233=Muon%20is%20a%20recently%20proposed%20optimizer%20that%20enforces%20orthogonality%20in%20parameter%20updates%20by%20projecting%20gradients%20onto%20the%20Stiefel%20manifold%2C%20leading%20to%20stable%20and%20efficient%20training%20in%20large-scale%20deep%20neural%20networks.%20Meanwhile%2C%20the%20previously%20reported%20results%20indicated%20that%20stochastic%20noise%20in%20practical%20machine%20learning%20may%20exhibit%20heavy-tailed%20behavior%2C%20violating%20the%20bounded-variance%20assumption.%20In%20this%20paper%2C%20we%20consider%20the%20problem%20of%20minimizing%20a%20nonconvex%20H%C3%B6lder-smooth%20empirical%20risk%20that%20works%20well%20with%20the%20heavy-tailed%20stochastic%20noise.%20We%20then%20show%20that%20Muon%20converges%20to%20a%20stationary%20point%20of%20the%20empirical%20risk%20under%20the%20boundedness%20condition%20accounting%20for%20heavy-tailed%20stochastic%20noise.%20In%20addition%2C%20we%20show%20that%20Muon%20converges%20faster%20than%20mini-batch%20SGD.&entry.1838667208=http%3A//arxiv.org/abs/2603.15059v1&entry.124074799=Read"},
{"title": "What Matters for Scalable and Robust Learning in End-to-End Driving Planners?", "author": "David Holtz and Niklas Hanselmann and Simon Doll and Marius Cordts and Bernt Schiele", "abstract": "End-to-end autonomous driving has gained significant attention for its potential to learn robust behavior in interactive scenarios and scale with data. Popular architectures often build on separate modules for perception and planning connected through latent representations, such as bird's eye view feature grids, to maintain end-to-end differentiability. This paradigm emerged mostly on open-loop datasets, with evaluation focusing not only on driving performance, but also intermediate perception tasks. Unfortunately, architectural advances that excel in open-loop often fail to translate to scalable learning of robust closed-loop driving. In this paper, we systematically re-examine the impact of common architectural patterns on closed-loop performance: (1) high-resolution perceptual representations, (2) disentangled trajectory representations, and (3) generative planning. Crucially, our analysis evaluates the combined impact of these patterns, revealing both unexpected limitations as well as underexplored synergies. Building on these insights, we introduce BevAD, a novel lightweight and highly scalable end-to-end driving architecture. BevAD achieves 72.7% success rate on the Bench2Drive benchmark and demonstrates strong data-scaling behavior using pure imitation learning. Our code and models are publicly available here: https://dmholtz.github.io/bevad/", "link": "http://arxiv.org/abs/2603.15185v1", "date": "2026-03-16", "relevancy": 2.2614, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5709}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5671}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5614}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20What%20Matters%20for%20Scalable%20and%20Robust%20Learning%20in%20End-to-End%20Driving%20Planners%3F&body=Title%3A%20What%20Matters%20for%20Scalable%20and%20Robust%20Learning%20in%20End-to-End%20Driving%20Planners%3F%0AAuthor%3A%20David%20Holtz%20and%20Niklas%20Hanselmann%20and%20Simon%20Doll%20and%20Marius%20Cordts%20and%20Bernt%20Schiele%0AAbstract%3A%20End-to-end%20autonomous%20driving%20has%20gained%20significant%20attention%20for%20its%20potential%20to%20learn%20robust%20behavior%20in%20interactive%20scenarios%20and%20scale%20with%20data.%20Popular%20architectures%20often%20build%20on%20separate%20modules%20for%20perception%20and%20planning%20connected%20through%20latent%20representations%2C%20such%20as%20bird%27s%20eye%20view%20feature%20grids%2C%20to%20maintain%20end-to-end%20differentiability.%20This%20paradigm%20emerged%20mostly%20on%20open-loop%20datasets%2C%20with%20evaluation%20focusing%20not%20only%20on%20driving%20performance%2C%20but%20also%20intermediate%20perception%20tasks.%20Unfortunately%2C%20architectural%20advances%20that%20excel%20in%20open-loop%20often%20fail%20to%20translate%20to%20scalable%20learning%20of%20robust%20closed-loop%20driving.%20In%20this%20paper%2C%20we%20systematically%20re-examine%20the%20impact%20of%20common%20architectural%20patterns%20on%20closed-loop%20performance%3A%20%281%29%20high-resolution%20perceptual%20representations%2C%20%282%29%20disentangled%20trajectory%20representations%2C%20and%20%283%29%20generative%20planning.%20Crucially%2C%20our%20analysis%20evaluates%20the%20combined%20impact%20of%20these%20patterns%2C%20revealing%20both%20unexpected%20limitations%20as%20well%20as%20underexplored%20synergies.%20Building%20on%20these%20insights%2C%20we%20introduce%20BevAD%2C%20a%20novel%20lightweight%20and%20highly%20scalable%20end-to-end%20driving%20architecture.%20BevAD%20achieves%2072.7%25%20success%20rate%20on%20the%20Bench2Drive%20benchmark%20and%20demonstrates%20strong%20data-scaling%20behavior%20using%20pure%20imitation%20learning.%20Our%20code%20and%20models%20are%20publicly%20available%20here%3A%20https%3A//dmholtz.github.io/bevad/%0ALink%3A%20http%3A//arxiv.org/abs/2603.15185v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhat%2520Matters%2520for%2520Scalable%2520and%2520Robust%2520Learning%2520in%2520End-to-End%2520Driving%2520Planners%253F%26entry.906535625%3DDavid%2520Holtz%2520and%2520Niklas%2520Hanselmann%2520and%2520Simon%2520Doll%2520and%2520Marius%2520Cordts%2520and%2520Bernt%2520Schiele%26entry.1292438233%3DEnd-to-end%2520autonomous%2520driving%2520has%2520gained%2520significant%2520attention%2520for%2520its%2520potential%2520to%2520learn%2520robust%2520behavior%2520in%2520interactive%2520scenarios%2520and%2520scale%2520with%2520data.%2520Popular%2520architectures%2520often%2520build%2520on%2520separate%2520modules%2520for%2520perception%2520and%2520planning%2520connected%2520through%2520latent%2520representations%252C%2520such%2520as%2520bird%2527s%2520eye%2520view%2520feature%2520grids%252C%2520to%2520maintain%2520end-to-end%2520differentiability.%2520This%2520paradigm%2520emerged%2520mostly%2520on%2520open-loop%2520datasets%252C%2520with%2520evaluation%2520focusing%2520not%2520only%2520on%2520driving%2520performance%252C%2520but%2520also%2520intermediate%2520perception%2520tasks.%2520Unfortunately%252C%2520architectural%2520advances%2520that%2520excel%2520in%2520open-loop%2520often%2520fail%2520to%2520translate%2520to%2520scalable%2520learning%2520of%2520robust%2520closed-loop%2520driving.%2520In%2520this%2520paper%252C%2520we%2520systematically%2520re-examine%2520the%2520impact%2520of%2520common%2520architectural%2520patterns%252 {"title": "Vib2ECG: A Paired Chest-Lead SCG-ECG Dataset and Benchmark for ECG Reconstruction", "author": "Guorui Lu and Xiaohui Cai and Todor Stefanov and Qinyu Chen", "abstract": "Twelve-lead electrocardiography (ECG) is essential for cardiovascular diagnosis, but its long-term acquisition in daily life is constrained by complex and costly hardware. Recent efforts have explored reconstructing ECG from low-cost cardiac vibrational signals such as seismocardiography (SCG), however, due to the lack of a dataset, current methods are limited to limb leads, while clinical diagnosis requires multi-lead ECG, including chest leads. In this work, we propose Vib2ECG, the first paired, multi-channel electro-mechanical cardiac signal dataset, which includes complete twelve-lead ECGs and vibrational signals acquired by inertial measurement units (IMUs) at six chest-lead positions from 17 subjects. Based on this dataset, we also provide a benchmark. Experimental results demonstrate the feasibility of reconstructing electrical cardiac signals at variable locations from vibrational signals using a lightweight 364 K-parameter U-Net. Furthermore, we observe a hallucination phenomenon in the model, where ECG waveforms are generated in regions where no corresponding electrical activity is present. We analyze the causes of this phenomenon and propose potential directions for mitigation. This study demonstrates the feasibility of mobile-device-friendly ECG monitoring through chest-lead ECG prediction from low-cost vibrational signals acquired using IMU sensors. It expands the application of cardiac vibrational signals and provides new insights into the spatial relationship between cardiac electrical and mechanical activities with spatial location variation.", "link": "http://arxiv.org/abs/2603.15539v1", "date": "2026-03-16", "relevancy": 2.2465, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4605}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.457}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4304}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Vib2ECG%3A%20A%20Paired%20Chest-Lead%20SCG-ECG%20Dataset%20and%20Benchmark%20for%20ECG%20Reconstruction&body=Title%3A%20Vib2ECG%3A%20A%20Paired%20Chest-Lead%20SCG-ECG%20Dataset%20and%20Benchmark%20for%20ECG%20Reconstruction%0AAuthor%3A%20Guorui%20Lu%20and%20Xiaohui%20Cai%20and%20Todor%20Stefanov%20and%20Qinyu%20Chen%0AAbstract%3A%20Twelve-lead%20electrocardiography%20%28ECG%29%20is%20essential%20for%20cardiovascular%20diagnosis%2C%20but%20its%20long-term%20acquisition%20in%20daily%20life%20is%20constrained%20by%20complex%20and%20costly%20hardware.%20Recent%20efforts%20have%20explored%20reconstructing%20ECG%20from%20low-cost%20cardiac%20vibrational%20signals%20such%20as%20seismocardiography%20%28SCG%29%2C%20however%2C%20due%20to%20the%20lack%20of%20a%20dataset%2C%20current%20methods%20are%20limited%20to%20limb%20leads%2C%20while%20clinical%20diagnosis%20requires%20multi-lead%20ECG%2C%20including%20chest%20leads.%20In%20this%20work%2C%20we%20propose%20Vib2ECG%2C%20the%20first%20paired%2C%20multi-channel%20electro-mechanical%20cardiac%20signal%20dataset%2C%20which%20includes%20complete%20twelve-lead%20ECGs%20and%20vibrational%20signals%20acquired%20by%20inertial%20measurement%20units%20%28IMUs%29%20at%20six%20chest-lead%20positions%20from%2017%20subjects.%20Based%20on%20this%20dataset%2C%20we%20also%20provide%20a%20benchmark.%20Experimental%20results%20demonstrate%20the%20feasibility%20of%20reconstructing%20electrical%20cardiac%20signals%20at%20variable%20locations%20from%20vibrational%20signals%20using%20a%20lightweight%20364%20K-parameter%20U-Net.%20Furthermore%2C%20we%20observe%20a%20hallucination%20phenomenon%20in%20the%20model%2C%20where%20ECG%20waveforms%20are%20generated%20in%20regions%20where%20no%20corresponding%20electrical%20activity%20is%20present.%20We%20analyze%20the%20causes%20of%20this%20phenomenon%20and%20propose%20potential%20directions%20for%20mitigation.%20This%20study%20demonstrates%20the%20feasibility%20of%20mobile-device-friendly%20ECG%20monitoring%20through%20chest-lead%20ECG%20prediction%20from%20low-cost%20vibrational%20signals%20acquired%20using%20IMU%20sensors.%20It%20expands%20the%20application%20of%20cardiac%20vibrational%20signals%20and%20provides%20new%20insights%20into%20the%20spatial%20relationship%20between%20cardiac%20electrical%20and%20mechanical%20activities%20with%20spatial%20location%20variation.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15539v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVib2ECG%253A%2520A%2520Paired%2520Chest-Lead%2520SCG-ECG%2520Dataset%2520and%2520Benchmark%2520for%2520ECG%2520Reconstruction%26entry.906535625%3DGuorui%2520Lu%2520and%2520Xiaohui%2520Cai%2520and%2520Todor%2520Stefanov%2520and%2520Qinyu%2520Chen%26entry.1292438233%3DTwelve-lead%2520electrocardiography%2520%2528ECG%2529%2520is%2520essential%2520for%2520cardiovascular%2520diagnosis%252C%2520but%2520its%2520long-term%2520acquisition%2520in%2520daily%2520life%2520is%2520constrained%2520by%2520complex%2520and%2520costly%2520hardware.%2520Recent%2520efforts%2520have%2520explored%2520reconstructing%2520ECG%2520from%2520low-cost%2520cardiac%2520vibrational%2520signals%2520such%2520as%2520seismocardiography%2520%2528SCG%2529%252C%2520however%252C%2520due%2520to%2520the%2520lack%2520of%2520a%2520dataset%252C%2520current%2520methods%2520are%2520limited%2520to%2520limb%2520leads%252C%2520while%2520clinical%2520diagnosis%2520requires%2520multi-lead%2520ECG%252C%2520including%2520chest%2520leads.%2520In%2520this%2520 {"title": "CLAIM: Camera-LiDAR Alignment with Intensity and Monodepth", "author": "Zhuo Zhang and Yonghui Liu and Meijie Zhang and Feiyang Tan and Yikang Ding", "abstract": "In this paper, we unleash the potential of the powerful monodepth model in camera-LiDAR calibration and propose CLAIM, a novel method of aligning data from the camera and LiDAR. Given the initial guess and pairs of images and LiDAR point clouds, CLAIM utilizes a coarse-to-fine searching method to find the optimal transformation minimizing a patched Pearson correlation-based structure loss and a mutual information-based texture loss. These two losses serve as good metrics for camera-LiDAR alignment results and require no complicated steps of data processing, feature extraction, or feature matching like most methods, rendering our method simple and adaptive to most scenes. We validate CLAIM on public KITTI, Waymo, and MIAS-LCEC datasets, and the experimental results demonstrate its superior performance compared with the state-of-the-art methods. The code is available at https://github.com/Tompson11/claim.", "link": "http://arxiv.org/abs/2512.14001v2", "date": "2026-03-16", "relevancy": 2.2456, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5808}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5689}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.539}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CLAIM%3A%20Camera-LiDAR%20Alignment%20with%20Intensity%20and%20Monodepth&body=Title%3A%20CLAIM%3A%20Camera-LiDAR%20Alignment%20with%20Intensity%20and%20Monodepth%0AAuthor%3A%20Zhuo%20Zhang%20and%20Yonghui%20Liu%20and%20Meijie%20Zhang%2 %2520the%2520initial%2520guess%2520and%2520pairs%2520of%2520images%2520and%2520LiDAR%2520point%2520clouds%252C%2520CLAIM%2520utilizes%2520a%2520coarse-to-fine%2520searching%2520method%2520to%2520find%2520the%2520optimal%2520transformation%2520minimizing%2520a%2520patched%2520Pearson%2520correlation-based%2520structure%2520loss%2520and%2520a%2520mutual%2520information-based%2520texture%2520loss.%2520These%2520two%2520losses%2520serve%2520as%2520good%2520metrics%2520for%2520camera-LiDAR%2520alignment%2520results%2520and%2520require%2520no%2520complicated%2520steps%2520of%2520data%2520processing%252C%2520feature%2520extraction%252C%2520or%2520feature%2520matching%2520like%2520most%2520methods%252C%2520rendering%2520our%2520method%2520simple%2520and%2520adaptive%2520to%2520most%2520scenes.%2520We%2520validate%2520CLAIM%2520on%2520public%2520KITTI%252C%2520Waymo%252C%2520and%2520MIAS-LCEC%2520datasets%252C%2520and%2520the%2520experimental%2520results%2520demonstrate%2520its%2520superior%2520performance%2520compared%2520with%2520the%2520state-of-the-art%2520methods.%2520The%2520code%2520is%2520available%2520at%2520https%253A//github.com/Tompson11/claim.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.14001v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CLAIM%3A%20Camera-LiDAR%20Alignment%20with%20Intensity%20and%20Monodepth&entry.906535625=Zhuo%20Zhang%20and%20Yonghui%20Liu%20and%20Meijie%20Zhang%20and%20Feiyang%20Tan%20and%20Yikang%20Ding&entry.1292438233=In%20this%20paper%2C%20we%20unleash%20the%20potential%20of%20the%20powerful%20monodepth%20model%20in%20camera-LiDAR%20calibration%20and%20propose%20CLAIM%2C%20a%20novel%20method%20of%20aligning%20data%20from%20the%20camera%20and%20LiDAR.%20Given%20the%20initial%20guess%20and%20pairs%20of%20images%20and%20LiDAR%20point%20clouds%2C%20CLAIM%20utilizes%20a%20coarse-to-fine%20searching%20method%20to%20find%20the%20o {"title": "Detection of Autonomous Shuttles in Urban Traffic Images Using Adaptive Residual Context", "author": "Mohamed Aziz Younes and Nicolas Saunier and Guillaume-Alexandre Bilodeau", "abstract": "The progressive automation of transport promises to enhance safety and sustainability through shared mobility. Like other vehicles and road users, and even more so for such a new technology, it requires monitoring to understand how it interacts in traffic and to evaluate its safety. This can be done with fixed cameras and video object detection. However, the addition of new detection targets generally requires a fine-tuning approach for regular detection methods. Unfortunately, this implementation strategy will lead to a phenomenon known as catastrophic forgetting, which causes a degradation in scene understanding. In road safety applications, preserving contextual scene knowledge is of the utmost importance for protecting road users. We introduce the Adaptive Residual Context (ARC) architecture to address this. ARC links a frozen context branch and trainable task-specific branches through a Context-Guided Bridge, utilizing attention to transfer spatial features while preserving pre-trained representations. Experiments on a custom dataset show that ARC matches fine-tuned baselines while significantly improving knowledge retention, offering a data-efficient solution to add new vehicle categories for complex urban environments.", "link": "http://arxiv.org/abs/2603.15404v1", "date": "2026-03-16", "relevancy": 2.2429, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5665}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5619}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5434}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Detection%20of%20Autonomous%20Shuttles%20in%20Urban%20Traffic%20Images%20Using%20Adaptive%20Residual%20Context&body=Title%3A%20Detection%20of%20Autonomous%20Shuttles%20in%20Urban%20Traffic%20Images%20Using%20Adaptive%20Residual%20Context%0AAuthor%3A%20Mohamed%20Aziz%20Younes%20and%20Nicolas%20Saunier%20and%20Guillaume-Alexandre%20Bilodeau%0AAbstract%3A%20The%20progressive%20automation%20of%20transport%20promises%20to%20enhance%20safety%20and%20sustainability%20through%20shared%20mobility.%20Like%20other%20vehicles%20and%20road%20users%2C%20and%20even%20more%20so%20for%20such%20a%20new%20technology%2C%20it%20requires%20monitoring%20to%20understand%20how%20it%20interacts%20in%20traffic%20and%20to%20evaluate%20its%20safety.%20This%20can%20be%20done%20with%20fixed%20cameras%20and%20video%20object%20detection.%20However%2C%20the%20addition%20of%20new%20detection%20targets%20generally%20requires%20a%20fine-tuning%20approach%20for%20regular%20detection%20methods.%20Unfortunately%2C%20this%20implementation%20strategy%20will%20lead%20to%20a%20phenomenon%20known%20as%20catastrophic%20forgetting%2C%20which%20causes%20a%20degradation%20in%20scene%20understanding.%20In%20road%20safety%20applications%2C%20preserving%20contextual%20scene%20knowledge%20is%20of%20the%20utmost%20importance%20for%20protecting%20road%20users.%20We%20introduce%20the%20Adaptive%20Residual%20Context%20%28ARC%29%20architecture%20to%20address%20this.%20ARC%20links%20a%20frozen%20context%20branch%20and%20trainable%20task-specific%20branches%20through%20a%20Context-Guided%20Bridge%2C%20utilizing%20attention%20to%20transfer%20spatial%20features%20while%20preserving%20pre-trained%20representations.%20Experiments%20on%20a%20custom%20dataset%20show%20that%20ARC%20matches%20fine-tuned%20baselines%20while%20significantly%20improving%20knowledge%20retention%2C%20offering%20a%20data-efficient%20solutio %2520Context-Guided%2520Bridge%252C%2520utilizing%2520attention%2520to%2520transfer%2520spatial%2520features%2520while%2520preserving%2520pre-trained%2520representations.%2520Experiments%2520on%2520a%2520custom%2520dataset%2520show%2520that%2520ARC%2520matches%2520fine-tuned%2520baselines%2520while%2520significantly%2520improving%2520knowledge%2520retention%252C%2520offering%2520a%2520data-efficient%2520solution%2520to%2520add%2520new%2520vehicle%2520categories%2520for%2520complex%2520urban%2520environments.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.15404v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Detection%20of%20Autonomous%20Shuttles%20in%20Urban%20Traffic%20Images%20Using%20Adaptive%20Residual%20Context&entry.906535625=Mohamed%20Aziz%20Younes%20and%20Nicolas%20Saunier%20and%20Guillaume-Alexandre%20Bilodeau&entry.1292438233=The%20progressive%20automation%20of%20transport%20promises%20to%20enhance%20safety%20and%20sustainability%20through%20shared%20mobility.%20Like%20other%20vehicles%20and%20road%20users%2C%20and%20even%20more%20so%20for%20such%20a%20new%20technology%2C%20it%20requires%20monitoring%20to%20understand%20how%20it%20interacts%20in%20traffic%20and%20to%20evaluate%20its%20safety.%20This%20can%20be%20done%20with%20fixed%20cameras%20and%20video%20object%20detection.%20However%2C%20the%20addition%20of%20new%20detection%20targets%20generally%20requires%20a%20fine-tuning%20approach%20for%20regular%20detection%20methods.%20Unfortunately%2C%20this%20implementation%20strategy%20will%20lead%20to%20a%20phenomenon%20known%20as%20catastrophic%20forgetting%2C%20which%20causes%20a%20degradation%20in%20scene%20understanding.%20In%20road%20safety%20applications%2C%20preserving%20contextual%20scene%20knowledge%20is%20of%20the%20utmost%20importance%20for%20protecting%20road%20users.%20We%20introduce%20the%20Adaptive%20Residual%20Context%20%28ARC%29%20architecture%20to%20address%20this.%20ARC%20links%20a%20frozen%20context%20branch%20and%20trainable%20task-specific%20branches%20through%20a%20Context-Guided%20Bridge%2C%20utilizing%20attention%20to%20transfer%20spatial%20features%20while%20preserving%20pre-trained%20representations.%20Experiments%20on%20a%20custom%20dataset%20show%20that%20ARC%20matches%20fine-tuned%20baselines%20while%20significantly%20improving%20knowledge%20retention%2C%20offering%20a%20data-efficient%20solution%20to%20add%20new%20vehicle%20categories%20for%20complex%20urban%20environments.&entry.1838667208=http%3A//arxiv.org/abs/2603.15404v1&entry.124074799=Read"},
{"title": "MatAnyone 2: Scaling Video Matting via a Learned Quality Evaluator", "author": "Peiqing Yang and Shangchen Zhou and Kai Hao and Qingyi Tao", "abstract": "Video matting remains limited by the scale and realism of existing datasets. While leveraging segmentation data can enhance semantic stability, the lack of effective boundary supervision often leads to segmentation-like mattes lacking fine details. To this end, we introduce a learned Matting Quality Evaluator (MQE) that assesses semantic and boundary quality of alpha mattes without ground truth. It produces a pixel-wise evaluation map that identifies reliable and erroneous regions, enabling fine-grained quality assessment. The MQE scales up video matting in two ways: (1) as an online matting-quality feedback during training to suppress erroneous regions, providing comprehensive supervision, and (2) as an offline selection module for data curation, improving annotation quality by combining the strengths of leading video and image matting models. This process allows us to build a large-scale real-world video matting dataset, VMReal, containing 28K clips and 2.4M frames. To handle large appearance variations in long videos, we introduce a reference-frame training strategy that incorporates long-range frames beyond the local window for effective training. Our MatAnyone 2 achieves state-of-the-art performance on both synthetic and real-world benchmarks, surpassing prior methods across all metrics.", "link": "http://arxiv.org/abs/2512.11782v2", "date": "2026-03-16", "relevancy": 2.2345, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5625}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5596}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5466}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MatAnyone%202%3A%20Scaling%20Video%20Matting%20via%20a%20Learned%20Quality%20Evaluator&body=Title%3A%20MatAnyone%202%3A%20Scaling%20Video%20Matting%20via%20a%20Learned%20Quality%20Evaluator%0AAuthor%3A%20Peiqing%20Yang%20and%20Shangchen%20Zhou%20and%20Kai%20Hao%20and%20Qingyi%20Tao%0AAbstract%3A%20Video%20matting%20remains%20limited%20by%20the%20scale%20and%20realism%20of%20existing%20datasets.%20While%20leveraging%20segmentation%20data%20can%20enhance%20semantic%20stability%2C%20the%20lack%20of%20effective%20boundary%20supervision%20often%20leads%20to%20segmentation-like%20mattes%20lacking%20fine%20details.%20To%20this%20end%2C%20we%20introduce%20a%20learned%20Matting%20Quality%20Evaluator%20%28MQE%29%20that%20assesses%20semantic%20and%20boundary%20quality%20of%20alpha%20mattes%20without%20ground%20truth.%20It%20produces%20a%20pixel-wise%20evaluation%20map%20that%20identifies%20reliable%20and%20erroneous%20regions%2C%20enabling%20fine-grained%20quality%20assessment.%20The%20MQE%20scales%20up%20video%20matting%20in%20two%20ways%3A%20%281%29%20as%20an%20online%20matting-quality%20feedback%20during%20training%20to%20suppress%20erroneous%20regions%2C%20providing%20comprehensive%20supervision%2C%20and%20%282%29%20as%20an%20offline%20selection%20module%20for%20data%20curation%2C%20improving%20annotation%20quality%20by%20combining%20the%20strengths%20of%20leading%20video%20and%20image%20matting%20models.%20This%20process%20allows%20us%20to%20build%20a%20large-scale%20real-world%20video%20matting%20dataset%2C%20VMReal%2C%20containing%2028K%20clips%20and%202.4M%20frames.%20To%20handle%20large%20appearance%20variations%20in%20long%20videos%2C%20we%20introduce%20a%20reference-frame%20training%20strategy%20that%20incorporates%20long-range%20frames%20beyond%20the%20local%20window%20for%20effective%20training.%20Our%20MatAnyone%202%20achieves%20state-of-the-art%20perfor {"title": "Generative Visual Chain-of-Thought for Image Editing", "author": "Zijin Yin and Tiankai Hang and Yiji Cheng and Shiyi Zhang and Runze He and Yu Xu and Chunyu Wang and Bing Li and Zheng Chang and Kongming Liang and Qinglin Lu and Zhanyu Ma", "abstract": "Existing image editing methods struggle to perceive where to edit, especially under complex scenes and nuanced spatial instructions. To address this issue, we propose Generative Visual Chain-of-Thought (GVCoT), a unified framework that performs native visual reasoning by first generating spatial cues to localize the target region and then executing the edit. Unlike prior text-only CoT or tool-dependent visual CoT paradigms, GVCoT jointly optimizes visual tokens generated during the reasoning and editing phases in an end-to-end manner. This way fosters the emergence of innate spatial reasoning ability and enables more effective utilization of visual-domain cues. The main challenge of training GCVoT lies in the scarcity of large-scale editing data with precise edit region annotations; to this end, we construct GVCoT-Edit-Instruct, a dataset of 1.8M high-quality samples spanning 19 tasks. We adopt a progressive training strategy: supervised fine-tuning to build foundational localization ability in reasoning trace before final editing, followed by reinforcement learning to further improve reasoning and editing quality. Finally, we introduce SREdit-Bench, a new benchmark designed to comprehensively stress-test models under sophisticated scenes and fine-grained referring expressions. Experiments demonstrate that GVCoT consistently outperforms state-of-the-art models on SREdit-Bench and ImgEdit. We hope our GVCoT will inspire future research toward interpretable and precise image editing.", "link": "http://arxiv.org/abs/2603.01893v2", "date": "2026-03-16", "relevancy": 2.2298, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", {"title": "Multi-turn Physics-informed Vision-language Model for Physics-grounded Anomaly Detection", "author": "Yao Gu and Xiaohao Xu and Yingna Wu", "abstract": "Vision-Language Models (VLMs) demonstrate strong general-purpose reasoning but remain limited in physics-grounded anomaly detection, where causal understanding of dynamics is essential. Existing VLMs, trained predominantly on appearance-centric correlations, fail to capture kinematic constraints, leading to poor performance on anomalies such as irregular rotations or violated mechanical motions. We introduce a physics-informed instruction tuning framework that explicitly encodes object properties, motion paradigms, and dynamic constraints into structured prompts. By delivering these physical priors through multi-turn dialogues, our method decomposes causal reasoning into incremental steps, enabling robust internal representations of normal and abnormal dynamics. Evaluated on the Phys-AD benchmark, our approach achieves 96.7% AUROC in video-level detection--substantially outperforming prior SOTA (66.9%)--and yields superior causal explanations (0.777 LLM score). This work highlights how structured physics priors can transform VLMs into reliable detectors of dynamic anomalies.", "link": "http://arxiv.org/abs/2603.15237v1", "date": "2026-03-16", "relevancy": 2.2296, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6092}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.547}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.547}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multi-turn%20Physics-informed%20Vision-language%20Model%20for%2 {"title": "Effective Distillation to Hybrid xLSTM Architectures", "author": "Lukas Hauzenberger and Niklas Schmidinger and Thomas Schmied and Anamaria-Roberta Hartl and David Stap and Pieter-Jan Hoedt and Maximilian Beck and Sebastian B\u00f6ck and G\u00fcnter Klambauer and Sepp Hochreiter", "abstract": "There have been numerous attempts to distill quadratic attention-based large language models (LLMs) into sub-quadratic linearized architectures. However, despite extensive research, such distilled models often fail to match the performance of their teacher LLMs on various downstream tasks. We set out the goal of lossless distillation, which we define in terms of tolerance-corrected Win-and-Tie rates between student and teacher on sets of tasks. To this end, we introduce an effective distillation pipeline for xLSTM-based students. We propose an additional merging stage, where individually linearized experts are combined into a single model. We show the effectiveness of this pipeline by distilling base and instruction-tuned models from the Llama, Qwen, and Olmo families. In many settings, our xLSTM-based students recover most of the teacher's performance, and even exceed it on some downstream tasks. Our contributions are an important step towards more energy-efficient and cost-effective replacements for transformer-based LLMs.", "link": "http://arxiv.org/abs/2603.15590v1", "date": "2026-03-16", "relevancy": 1.5367, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5316}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5114}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.495}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Effective%20Distillation%20to%20Hybrid%20xLSTM%20Architectures&body=Title%3A%20Effective%20Distillation%20to%20Hybrid%20xLSTM%20Architectures%0AAuthor%3A%20Lukas%20Hauzenberger%20and%20Niklas%20Schmidinger%20and%20Thomas%20Schmied%20and%20Anamaria-Roberta%20Hartl%20and%20David%20Stap%20and%20Pieter-Jan%20Hoedt%20and%20Maximilian%20Beck%20and%20Sebastian%20B%C3%B6ck%20and%20G%C3%BCnter%20Klambauer%20and%20Sepp%20Hochreiter%0AAbstract%3A%20There%20have%20been%20numerous%20attempts%20to%20distill%20quadratic%20attention-based%20large%20language%20models%20%28LLMs%29%20into%20sub-quadratic%20linearized%20architectures.%20However%2C%20despite%20extensive%20research%2C%20such%20distilled%20models%20often%20fail%20to%20match%20the%20performance%20of%20their%20teacher%20LLMs%20on%20various%20downstream%20tasks.%20We%20set%20out%20the%20goal%20of%20lossless%20distillation%2C%20which%20we%20define%20in%20terms%20of%20tolerance-corrected%20Win-and-Tie%20rates%20between%20student%20and%20teacher%20on%20sets%20of%20tasks.%20To%20this%20end%2C%20we%20introduce%20an%20effective%20distillation%20pipeline%20for%20xLSTM-based%20students.%20We%20propose%20an%20additional%20merging%20stage%2C%20where%20individually%20linearized%20experts%20are%20combined%20into%20a%20single%20model.%20We%20show%20the%20effectiveness%20of%20this%20pipeline%20by%20distilling%20base%20and%20instruction-tuned%20models%20from%20the%20Llama%2C%20Qwen%2C%20and%20Olmo%20families.%20In%20many%20settings%2C%20our%20xLSTM-based%20students%20recover%20most%20of%20the%20teacher%27s%20performance%2C%20and%20even%20exceed%20it%20on%20some%20downstream%20tasks.%20Our%20contributions%20are%20an%20important%20step%20towards%20more%20energy-efficient%20and%20cost-effective%20replacements%20for%20transformer-based%20LLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15590v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEffective%2520Distillation%2520to%2520Hybrid%2520xLSTM%2520Architectures%26entry.906535625%3DLukas%2520Hauzenberger%2520and%2520Niklas%2520Schmidinger%2520and%2520Thomas%2520Schmied%2520and%2520Anamaria-Roberta%2520Hartl%2520and%2520David%2520Stap%2520and%2520Pieter-Jan%2520Hoedt%2520and%2520Maximilian%2520Beck%2520and%2520Sebastian%2520B%25C3%25B6ck%2520and%2520G%25C3%25BCnter%2520Klambauer%2520and%2520Sepp%2520Hochreiter%26entry.1292438233%3DThere%2520have%2520been%2520numerous%2520attempts%2520to%2520distill%2520quadratic%2520attention-based%2520large%2520language%2520models%2520%2528LLMs%2529%2520into%2520sub-quadratic%2520linearized%2520architectures.%2520However%252C%2520despite%2520extensive%2520research%252C%2520such%2520distilled%2520models%2520often%2520fail%2520to%2520match%2520the%2520performance%2520of%2520their%2520teacher%2520LLMs%2520on%2520various%2520downstream%2520tasks.%2520We%2520set%2520out%2520the%2520goal%2520of%2520lossless%2520distillation%252C%2520which%2520we%2520define%2520in%2520terms%2520of%2520tolerance-corrected%2520Win-and-Tie%2520rates%2520between%2520student%2520and%2520teacher%2520on%2520sets%2520of%2520tasks.%2520To%2520this%2520end%252C%2520we%2520introduce%2520an%2520effective%2520distillation%2520pipeline%2520for%2520xLSTM-based%2520students.%2520We%2520propose%2520an%2520additional%2520merging%2520stage%252C%2520where%2520individually%2520linearized%2520experts%2520are%2520combined%2520into%2520a%2520single%2520model.%2520We%2520show%2520the%2520effectiveness%2520of%2520this%2520pipeline%2520by%2520distilling%2520base%2520and%2520instruction-tuned%2520models%2520from%2520the%2520Llama%252C%2520Qwen%252C%2520and%2520Olmo%2520families.%2520In%2520many%2520settings%252C%2520our%2520xLSTM-based%2520students%2520recover%2520most%2520of%2520the%2520teacher%2527s%2520performance%252C%2520and%2520even%2520exceed%2520it%2520on%2520some%2520downstream%2520tasks.%2520Our%2520contributions%2520are%2520an%2520important%2520step%2520towards%2520more%2520energy-efficient%2520and% %20LLMs.&entry.1838667208=http%3A//arxiv.org/abs/2603.15590v1&entry.124074799=Read"},
{"title": "EvoX: Meta-Evolution for Automated Discovery", "author": "Shu Liu and Shubham Agarwal and Monishwaran Maheswaran and Mert Cemri and Zhifei Li and Qiuyang Mang and Ashwin Naren and Ethan Boneh and Audrey Cheng and Melissa Z. Pan and Alexander Du and Kurt Keutzer and Alvin Cheung and Alexandros G. Dimakis and Koushik Sen and Matei Zaharia and Ion Stoica", "abstract": "Recent work such as AlphaEvolve has shown that combining LLM-driven optimization with evolutionary search can effectively improve programs, prompts, and algorithms across domains. In this paradigm, previously evaluated solutions are reused to guide the model toward new candidate solutions. Crucially, the effectiveness of this evolution process depends on the search strategy: how prior solutions are selected and varied to generate new candidates. However, most existing methods rely on fixed search strategies with predefined knobs (e.g., explore-exploit ratios) that remain static throughout execution. While effective in some settings, these approaches often fail to adapt across tasks, or even within the same task as the search space changes over time. We introduce EvoX, an adaptive evolution method that optimizes its own evolution process. EvoX jointly evolves candidate solutions and the search strategies used to generate them, continuously updating how prior solutions are selected and varied based on progress. This enables the system to dynamically shift between different search strategies during the optimization process. Across nearly 200 real-world optimization tasks, EvoX outperforms existing AI-driven evolutionary methods including AlphaEvolve, OpenEvolve, GEPA, and ShinkaEvolve on the majority of tasks.", "link": "http://arxiv.org/abs/2602.23413v2", "date": "2026-03-16", "relevancy": 1.9553, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5408}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4834}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4734}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EvoX%3A%20Meta-Evolution%20for%20Automated%20Discovery&body=Title%3A%20EvoX%3A%20Meta-Evolution%20for%20Automated%20Discovery%0AAuthor%3A%20Shu%20Liu%20and%20Shubham%20Agarwal%20and%20Monishwaran%20Maheswaran%20and%20Mert%20Cemri%20and%20Zhifei%20Li%20and%20Qiuyang%20Mang%20and%20Ashwin%20Naren%20and%20Ethan%20Boneh%20and%20Audrey%20Cheng%20and%20Melissa%20Z.%20Pan%20and%20Alexander%20Du%20and%20Kurt%20Keutzer%20and%20Alvin%20Cheung%20and%20Alexandros%20G.%20Dimakis%20and%20Koushik%20Sen%20and%20Matei%20Zaharia%20and%20Ion%20Stoica%0AAbstract%3A%20Recent%20work%20such%20as%20AlphaEvolve%20has%20shown%20that%20combining%20LLM-driven%20optimization%20with%20evolutionary%20search%20can%20effectively%20improve%20programs%2C%20prompts%2C%20and%20algorithms%20across%20domains.%20In%20this%20paradigm%2C%20previously%20evaluated%20solutions%20are%20reused%20to%20guide%20the%20model%20toward%20new%20candidate%20solutions.%20Crucially%2C%20the%20effectiveness%20of%20this%20evolution%20process%20depends%20on%20the%20search%20strategy%3A%20how%20prior%20solutions%20are%20selected%20and%20varied%20to%20generate%20new%20candidates.%20However%2C%20most%20existing%20methods%20rely%20on%20fixed%20search%20strategies%20with%20predefined%20knobs%20%28e.g.%2C%20explore-exploit%20ratios%29%20that%20remain%20static%20throughout%20execution.%20While%20effective%20in%20some%20settings%2C%20these%20approaches%20often%20fail%20to%20adapt%20across%20tasks%2C%20or%20even%20within%20the%20same%20task%20as%20the%20search%20space%20changes%20over%20time.%20We%20introduce%20EvoX%2C%20an%20adaptive%20evolution%20method%20that%20optimizes%20its%20own%20ev {"title": "Prompt Readiness Levels (PRL): a maturity scale and scoring framework for production grade prompt assets", "author": "Sebastien Guinard", "abstract": "Prompt engineering has become a production critical component of generative AI systems. However, organizations still lack a shared, auditable method to qualify prompt assets against operational objectives, safety constraints, and compliance requirements. This paper introduces Prompt Readiness Levels (PRL), a nine level maturity scale inspired by TRL, and the Prompt Readiness Score (PRS), a multidimensional scoring method with gating thresholds designed to prevent weak link failure modes. PRL/PRS provide an original, structured and methodological framework for governing prompt assets specification, testing, traceability, security evaluation, and deployment readiness enabling valuation of prompt engineering through reproducible qualification decisions across teams and industries.", "link": "http://arxiv.org/abs/2603.15044v1", "date": "2026-03-16", "relevancy": 1.4416, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.3682}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.3636}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.3513}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Prompt%20Readiness%20Levels%20%28PRL%29%3A%20a%20maturity%20scale%20and%20scoring%20framework%20for%20production%20grade%20prompt%20assets&body=Title%3A%20Prompt%20Readiness%20Levels%20%28PRL%29%3A%20a%20maturity%20scale%20and%20scoring%20framework%20for%20production%20grade%20prompt%20assets%0AAuthor%3A%20Sebastien%20Guinard%0AAbstract%3A%20Prompt%20engineering%20has%20become%20a%20production%2 cation%20decisions%20across%20teams%20and%20industries.&entry.1838667208=http%3A//arxiv.org/abs/2603.15044v1&entry.124074799=Read"},
{"title": "Clinical Priors Guided Lung Disease Detection in 3D CT Scans", "author": "Kejin Lu and Jianfa Bai and Qingqiu Li and Runtian Yuan and Jilan Xu Junlin Hou and Yuejie Zhang and Rui Feng", "abstract": "Accurate classification of lung diseases from chest CT scans plays an important role in computer-aided diagnosis systems. However, medical imaging datasets often suffer from severe class imbalance, which may significantly degrade the performance of deep learning models, especially for minority disease categories. To address this issue, we propose a gender-aware two-stage lung disease classification framework. The proposed approach explicitly incorporates gender information into the disease recognition pipeline. In the first stage, a gender classifier is trained to predict the patient's gender from CT scans. In the second stage, the input CT image is routed to a corresponding gender-specific disease classifier to perform final disease prediction. This design enables the model to better capture gender-related imaging characteristics and alleviate the influence of imbalanced data distribution. Experimental results demonstrate that the proposed method improves the recognition performance for minority disease categories, particularly squamous cell carcinoma, while maintaining competitive performance on other classes.", "link": "http://arxiv.org/abs/2603.15143v1", "date": "2026-03-16", "relevancy": 1.8814, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4825}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.469}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4668}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Clinical%20Priors%20Guided%20Lung%20Disease%20Detection%20in%203D%20CT%20Scans&body=Title%3A%20Clinical%20Priors%20Guided%20Lung%20Disease%20Detection%20in%203D%20CT%20Scans%0AAuthor%3A%20Kejin%20Lu%20and%20Jianfa%20Bai%20and%20Qingqiu%20Li%20and%20Runtian%20Yuan%20and%20Jilan%20Xu%20Junlin%20Hou%20and%20Yuejie%20Zhang%20and%20Rui%20Feng%0AAbstract%3A%20Accurate%20classification%20of%20lung%20diseases%20from%20chest%20CT%20scans%20plays%20an%20important%20role%20in%20computer-aided%20diagnosis%20systems.%20However%2C%20medical%20imaging%20datasets%20often%20suffer%20from%20severe%20class%20imbalance%2C%20which%20may%20significantly%20degrade%20the%20performance%20of%20deep%20learning%20models%2C%20especially%20for%20minority%20disease%20categories.%20To%20address%20this%20issue%2C%20we%20propose%20a%20gender-aware%20two-stage%20lung%20disease%20classification%20framework.%20The%20proposed%20approach%20explicitly%20incorporates%20gender%20information%20into%20the%20disease%20recognition%20pipeline.%20In%20the%20first%20stage%2C%20a%20gender%20classifier%20is%20trained%20to%20predict%20the%20patient%27s%20gender%20from%20CT%20scans.%20In%20the%20second%20stage%2C%20the%20input%20CT%20image%20is%20routed%20to%20a%20corresponding%20gender-specific%20disease%20classifier%20to%20perform%20final%20disease%20prediction.%20This%20design%20enables%20the%20model%20to%20better%20capture%20gender-related%20imaging%20characteristics%20and%20alleviate%20the%20influence%20of%20imbalanced%20data%20distribution.%20Experimental%20results%20demonstrate%20that%20the%20proposed%20method%20improves%20the%20recognition%20performance%20for%20minority%20disease%20categories%2C%20particularly%20squamous%20cell%20carcinoma%2C%20while%20maintaining%20competitive%20performance%20on%20other%20classes.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15143v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DClinical% 0while%2520maintaining%2520competitive%2520performance%2520on%2520other%2520classes.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.15143v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Clinical%20Priors%20Guided%20Lung%20Disease%20Detection%20in%203D%20CT%20Scans&entry.906535625=Kejin%20Lu%20and%20Jianfa%20Bai%20and%20Qingqiu%20Li%20and%20Runtian%20Yuan%20and%20Jilan%20Xu%20Junlin%20Hou%20and%20Yuejie%20Zhang%20and%20Rui%20Feng&entry.1292438233=Accurate%20classification%20of%20lung%20diseases%20from%20chest%20CT%20scans%20plays%20an%20important%20role%20in%20computer-aided%20diagnosis%20systems.%20However%2C%20medical%20imaging%20datasets%20often%20suffer%20from%20severe%20class%20imbalance%2C%20which%20may%20significantly%20degrade%20the%20performance%20of%20deep%20learning%20models%2C%20especially%20for%20minority%20disease%20categories.%20To%20address%20this%20issue%2C%20we%20propose%20a%20gender-aware%20two-stage%20lung%20disease%20classification%20framework.%20The%20proposed%20approach%20explicitly%20incorporates%20gender%20information%20into%20the%20disease%20recognition%20pipeline.%20In%20the%20first%20stage%2C%20a%20gender%20classifier%20is%20trained%20to%20predict%20the%20patient%27s%20gender%20from%20CT%20scans.%20In%20the%20second%20stage%2C%20the%20input%20CT%20image%20is%20routed%20to%20a%20corresponding%20gender-specific%20disease%20classifier%20to%20perform%20final%20disease%20prediction.%20This%20design%20enables%20the%20model%20to%20better%20capture%20gender-related%20imaging%20characteristics%20and%20alleviate%20the%20influence%20of%20imbalanced%20data%20distribution.%20Experimental%20results%20demonstrate%20that%20the%20proposed%20method%20improves%20the%20recognition%20performance%20for%20minority%20disease%20categories%2C%20particularly%20squamous%20cell%20carcinoma%2C%20while%20maintaining%20competitive%20performance%20on%20other%20classes.&entry.1838667208=http%3A//arxiv.org/abs/2603.15143v1&entry.124074799=Read"},
{"title": "Imagine-then-Plan: Agent Learning from Adaptive Lookahead with World Models", "author": "Youwei Liu and Jian Wang and Hanlin Wang and Beichen Guo and Wenjie Li", "abstract": "Recent advances in world models have shown promise for modeling future dynamics of environmental states, enabling agents to reason and act without accessing real environments. Current methods mainly perform single-step or fixed-horizon rollouts, leaving their potential for complex task planning under-exploited. We propose Imagine-then-Plan (\\texttt{ITP}), a unified framework for agent learning via lookahead imagination, where an agent's policy model interacts with the learned world model, yielding multi-step ``imagined'' trajectories. Since the imagination horizon may vary by tasks and stages, we introduce a novel adaptive lookahead mechanism by trading off the ultimate goal and task progress. The resulting imagined trajectories provide rich signals about future consequences, such as achieved progress and potential conflicts, which are fused with current observations, formulating a partially \\textit{observable} and \\textit{imaginable} Markov decision process to guide policy learning. We instantiate \\texttt{ITP} with both training-free and reinforcement-trained variants. Extensive experiments across representative agent benchmarks demonstrate that \\texttt{ITP} significantly outperforms competitive baselines. Further analyses validate that our adaptive lookahead largely enhances agents' reasoning capability, providing valuable insights into addressing broader, complex tasks. Our code and data will be publicly available at https://github.com/loyiv/ITP.", "link": "http://arxiv.org/abs/2601.08955v2", "date": "2026-03-16", "relevancy": 1.713, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5815}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5617}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5539}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Imagine-then-Plan%3A%20Agent%20Learning%20from%20Adaptive%20Lookahead%20with%20World%20Models&body=Title%3A%20Imagine-then-Plan%3A%20Agent%20Learning%20from%20Adaptive%20Lookahead%20with%20World%20Models%0AAuthor%3A%20Youwei%20Liu%20and%20Jian%20Wang%20and%20Hanlin%20Wang%20and%20Beichen%20Guo%20and%20Wenjie%20Li%0AAbstract%3A%20Recent%20advances%20in%20world%20models%20have%20shown%20promise%20for%20modeling%20future%20dynamics%20of%20environmental%20states%2C%20enabling%20agents%20to%20reason%20and%20act%20without%20accessing%20real%20environments.%20Current%20methods%20mainly%20perform%20single-step%20or%20fixed-horizon%20rollouts%2C%20leaving%20their%20potential%20for%20complex%20task%20planning%20under-exploited.%20We%20propose%20Imagine-then-Plan%20%28%5Ctexttt%7BITP%7D%29%2C%20a%20unified%20framework%20for%20agent%20learning%20via%20lookahead%20imagination%2C%20where%20an%20agent%27s%20policy%20model%20interacts%20with%20the%20learned%20world%20model%2C%20yielding%20multi-step%20%60%60imagined%27%27%20trajectories.%20Since%20the%20imagination%20horizon%20may%20vary%20by%20tasks%20and%20stages%2C%20we%20introduce%20a%20novel%20adaptive%20lookahead%20mechanism%20by%20trading%20off%20the%20ultimate%20goal%20and%20task%20progress.%20The%20resulting%20imagined%20trajectories%20provide%20rich%20signals%20about%20future%20consequences%2C%20such%20as%20achieved%20progress%20and%20potential%20conflicts%2C%20which%20are%20fused%20with%20current%20observations%2C%20formulating%20a%20partially%20%5Ctextit%7Bobservable%7D%20and%20%5Ctextit%7Bimaginable%7D%20Markov%20decision%20process%20to%20guide%20policy%20learning.%20We%20instantiate%20%5Ctexttt%7BITP%7D%20with%20both%20training-free%20and%20reinforcement-trained%20variants.%20Extensive%20experiments%20across%20representative%20agent%20benchmarks%20demonstrate%20that%20%5Ctexttt%7BITP%7D%20significantly%20outperforms%20competitive%20baselines.%20Further%20analyses%20validate%20that%20our%20adaptive%20lookahead%20largely%20enhances%20agents%27%20reasoning%20capability%2C%20providing%20valuable%20insights%20into%20addressing%20broader%2C%20complex%20tasks.%20Our%20code%20and%20data%20will%20be%20publicly%20available%20at%20https%3A//github.com/loyiv/ITP.%0ALink%3A%20http%3A//arxiv.org/abs/2601.08955v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DImagine-then-Plan%253A%2520Agent%2520Learning%2520from%2520Adaptive%2520Lookahead%2520with%2520World%2520Models%26entry.906535625%3DYouwei%2520Liu%2520and%2520Jian%2520Wang%2520and%2520Hanlin%2520Wang%2520and%2520Beichen%2520Guo%2520and%2520Wenjie%2520Li%26entry.1292438233%3DRecent%2520advances%2520in%2520world%2520models%2520have%2520shown%2520promise%2520for%2520modeling%2520future%2520dynamics%2520of%2520environmental%2520states%252C%2520enabling%2520agents%2520to%2520reason%2520and%2520act%2520without%2520accessing%2520real%2520environments.%2520Current%2520methods%2520mainly%2520perform%2520single-step%2520or%2520fixed-horizon%2520rollouts%252C%2520leaving%2520their%2520potential%2520for%2520complex%2520task%2520planning%2520under-exploited.%2520We%2520propose%2520Imagine-then-Plan%2520%2528%255Ctexttt%257BITP%257D%2529%252C%2520a%2520unified%2520framework%2520for%2520agent%2520learning%2520via%2520lookahead%2520imagination%252C%2520where%2520an%2520agent%2527s%2520policy%2520model%2520interacts%2520with%2520the%2520learned%2520world%2520model%252C%2520yielding%2520multi-step%2520%2560%2560imagined%2527%2527%2520trajectories.%2520Since%2520the%2520imagination%2520horizon%2520may%2520vary%2520by%2520tasks%2520and%2520stages%252C%2520we%2520introduce%2520a%2520novel%25 {"title": "Shorten After You're Right: Lazy Length Penalties for Reasoning RL", "author": "Danlong Yuan and Tian Xie and Shaohan Huang and Zhuocheng Gong and Huishuai Zhang and Chong Luo and Furu Wei and Dongyan Zhao", "abstract": "Large reasoning models, such as OpenAI o1 or DeepSeek R1, have demonstrated remarkable performance on reasoning tasks but often incur a long reasoning path with significant memory and time costs. Existing methods primarily aim to shorten reasoning paths by introducing additional training data and stages. In this paper, we propose three critical reward designs integrated directly into the reinforcement learning process of large reasoning models, which reduce the response length without extra training stages. Experiments on four settings show that our method significantly decreases response length while maintaining or even improving performance. Specifically, in a logic reasoning setting, we achieve a 40% reduction in response length averaged by steps alongside a 14% gain in performance. For math problems, we reduce response length averaged by steps by 33% while preserving performance.", "link": "http://arxiv.org/abs/2505.12284v3", "date": "2026-03-16", "relevancy": 1.7456, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4457}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4354}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4337}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Shorten%20After%20You%27re%20Right%3A%20Lazy%20Length%20Penalties%20for%20Reasoning%20RL&body=Title%3A%20Shorten%20After%20You%27re%20Right%3A%20Lazy%20Length%20Penalties%20for%20Reasoning%20RL%0AAuthor%3A%2 %2520R1%252C%2520have%2520demonstrated%2520remarkable%2520performance%2520on%2520reasoning%2520tasks%2520but%2520often%2520incur%2520a%2520long%2520reasoning%2520path%2520with%2520significant%2520memory%2520and%2520time%2520costs.%2520Existing%2520methods%2520primarily%2520aim%2520to%2520shorten%2520reasoning%2520paths%2520by%2520introducing%2520additional%2520training%2520data%2520and%2520stages.%2520In%2520this%2520paper%252C%2520we%2520propose%2520three%2520critical%2520reward%2520designs%2520integrated%2520directly%2520into%2520the%2520reinforcement%2520learning%2520process%2520of%2520large%2520reasoning%2520models%252C%2520which%2520reduce%2520the%2520response%2520length%2520without%2520extra%2520training%2520stages.%2520Experiments%2520on%2520four%2520settings%2520show%2520that%2520our%2520method%2520significantly%2520decreases%2520response%2520length%2520while%2520maintaining%2520or%2520even%2520improving%2520performance.%2520Specifically%252C%2520in%2520a%2520logic%2520reasoning%2520setting%252C%2520we%2520achieve%2520a%252040%2525%2520reduction%2520in%2520response%2520length%2520averaged%2520by%2520steps%2520alongside%2520a%252014%2525%2520gain%2520in%2520performance.%2520For%2520math%2520problems%252C%2520we%2520reduce%2520response%2520length%2520averaged%2520by%2520steps%2520by%252033%2525%2520while%2520preserving%2520performance.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2505.12284v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Shorten%20After%20You%27re%20Right%3A%20Lazy%20Length%20Penalties%20for%20Reasoning%20RL&entry.906535625=Danlong%20Yuan%20and%20Tian%20Xie%20and%20Shaohan%20Huang%20and%20Zhuocheng%20Gong%20and%20Huishuai%20Zhang%20and%20Chong%20Luo%20and%20Furu%20Wei%20and%20Dongyan%20Zhao&entry.1292438233=Large%20reasoning%20models%2C%20such%20as%20OpenAI%20o1%20or%20DeepSeek%20R1%2C%20have%20demonstrated%20remarkable%20performance%20o {"title": "SloPal: A 60-Million-Word Slovak Parliamentary Corpus with Aligned Speech and Fine-Tuned ASR Models", "author": "Erik Bo\u017e\u00edk and Marek \u0160uppa", "abstract": "Slovak remains a low-resource language for automatic speech recognition (ASR), with fewer than 100 hours of publicly available training data. We present SloPal, a comprehensive Slovak parliamentary corpus comprising 330,000 speaker-segmented transcripts (66 million words, 220 million tokens) spanning 2001--2024, with rich metadata including speaker names, roles, and session information. From this collection, we derive SloPalSpeech, a 2,806-hour aligned speech dataset with segments up to 30 seconds, constructed using a language-agnostic anchor-based alignment pipeline and optimized for Whisper-based ASR training. Fine-tuning Whisper on SloPalSpeech reduces Word Error Rate (WER) by up to 70\\%, with the fine-tuned small model (244M parameters) approaching base large-v3 (1.5B parameters) performance at 6$\\times$ fewer parameters. We publicly release the SloPal text corpus, SloPalSpeech aligned audio, and four fine-tuned Whisper models at https://huggingface.co/collections/NaiveNeuron/slopal, providing the most comprehensive open Slovak parliamentary language resource to date.", "link": "http://arxiv.org/abs/2509.19270v2", "date": "2026-03-16", "relevancy": 2.0571, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4242}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.405}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.405}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SloPal%3A%20A%2060-Million-Word%20Slovak%20Parliamentary%20Corpus%20with%20Aligned%20Speech%20and%20Fine-Tuned%20ASR%20Models&body=Title%3A%20SloPal%3A%20A%2060-Million-Word%20Slovak%20Parliamentary%20Corpus%20with%20Aligned%20Speech%20and%20Fine-Tuned%20ASR%20Models%0AAuthor%3A%20Erik%20Bo%C5%BE%C3%ADk%20and%20Marek%20%C5%A0uppa%0AAbstract%3A%20Slovak%20remains%20a%20low-resource%20language%20for%20automatic%20speech%20recognition%20%28ASR%29%2C%20with%20fewer%20than%20100%20hours%20of%20publicly%20available%20training%20data.%20We%20present%20SloPal%2C%20a%20comprehensive%20Slovak%20parliamentary%20corpus%20comprising%20330%2C000%20speaker-segmented%20transcripts%20%2866%20million%20words%2C%20220%20million%20tokens%29%20spanning%202001--2024%2C%20with%20rich%20metadata%20including%20speaker%20names%2C%20roles%2C%20and%20session%20information.%20From%20this%20collection%2C%20we%20derive%20SloPalSpeech%2C%20a%202%2C806-hour%20aligned%20speech%20dataset%20with%20segments%20up%20to%2030%20seconds%2C%20constructed%20using%20a%20language-agnostic%20anchor-based%20alignment%20pipeline%20and%20optimized%20for%20Whisper-based%20ASR%20training.%20Fine-tuning%20Whisper%20on%20SloPalSpeech%20reduces%20Word%20Error%20Rate%20%28WER%29%20by%20up%20to%2070%5C%25%2C%20with%20the%20fine-tuned%20small%20model%20%28244M%20parameters%29%20approaching%20base%20large-v3%20%281.5B%20parameters%29%20performance%20at%206%24%5Ctimes%24%20fewer%20parameters.%20We%20publicly%20release%20the%20SloPal%20text%20corpus%2C%20SloPalSpeech%20aligned%20audio%2C%20and%20four%20fine-tuned%20Whisper%20models%20at%20https%3A//huggingface.co/collections/NaiveNeuron/slopal%2C%20providing%20the%20most%20comprehensive%20open%20Slovak%20parliamentary%20language%20resource%20to%20date.%0ALink%3A%20http%3A//arxiv.org/abs/2509.19270v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSloPal%253A%2520A%252060-Million-Word%2520Slovak%2520Parliamentary%2520Corpus%2520with%2520Al

{"title": "Robust Adaptive Backstepping Impedance Control of Robots in Unknown Environments", "author": "Reza Nazmara and Alap Kshirsagar and Jan Peters and A. Pedro Aguiar", "abstract": "This paper presents a Robust Adaptive Backstepping Impedance Control (RABIC) strategy for robots operating in contact-rich and uncertain environments. The proposed control strategy considers the complete coupled dynamics of the system and explicitly accounts for key sources of uncertainty, including external disturbances and unmodeled dynamics, while not requiring the robot's dynamic parameters in implementation. We propose a backstepping-based adaptive impedance control scheme for the inner loop to track the reference impedance model. To handle uncertainties, we employ a Taylor series-based estimator for system dynamics and an adaptive estimator for determining the upper bound of external forces. Stability analysis demonstrates the semi-global practical finite-time stability of the overall system. To demonstrate the effectiveness of the proposed method, a simulated mobile manipulator scenario and experimental evaluations on a real Franka Emika Panda robot were conducted. The proposed approach exhibits safer performance compared to PD control while ensuring trajectory tracking and force monitoring. Overall, the RABIC framework provides a solid basis for future research on adaptive and learning-based impedance control for coupled mobile and fixed serially linked manipulators.", "link": "http://arxiv.org/abs/2604.09323v1", "date": "2026-04-10", "relevancy": 1.6678, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5662}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.556}, {"title": "RoboEXP: Action-Conditioned Scene Grap {"title": "The AI Codebase Maturity Model: From Assisted Coding to Self-Sustaining Systems", "author": "Andy Anderson", "abstract": "AI coding tools are widely adopted, but most teams plateau at prompt-and-review without a framework for systematic progression. This paper presents the AI Codebase Maturity Model (ACMM), a 5-level framework describing how codebases evolve from basic AI-assisted coding to self-sustaining systems. Inspired by CMMI, each level is defined by its feedback loop topology the specific mechanisms that must exist before the next level becomes possible. I validate the model through a 4-month experience report maintaining KubeStellar Console, a CNCF Kubernetes dashboard built from scratch with Claude Code (Opus) and GitHub Copilot. The system currently operates with 63 CI/CD workflows, 32 nightly test suites, 91% code coverage, and achieves bug-to-fix times under 30 minutes 24 hours a day. The central finding: the intelligence of an AI-driven development system resides not in the AI model itself, but in the infrastructure of instructions, tests, metrics, and feedback loops that surround it. You cannot skip levels, and at each level, the thing that unlocks the next one is another feedback mechanism. Testing the volume of test cases, the coverage thresholds, and the reliability of test execution proved to be the single most important investment in the entire journey.", "link": "http://arxiv.org/abs/2604.09388v1", "date": "2026-04-10", "relevancy": 1.6216, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4154}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4096}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.3972}], "mailto": {"title": "The causal relation between off-street parking and electric vehicle adoption in Scotland", "author": "Bernardino D'Amico and Achille Fonzone and Emma Hart", "abstract": "The transition to electric mobility hinges on maximising aggregate adoption while also facilitating equitable access. This study examines whether the 'charging divide' between households with and without off-street parking reflects a genuine infrastructure constraint or a by-product of socio-economic disparity. Moving beyond conventional predictive models, we apply a probabilistic causal framework to a nationally representative dataset of Scottish households, enabling estimation of policy interventions while explicitly neutralising the confounding effect of other causal factors. The results reveal a structural hierarchy in the EV adoption process. Private off-street parking functions as a conversion catalyst: enabling access to home-charging increases the probability of EV ownership from 3.3% to 5.6% (a 70% relative, 2.3 percentage point absolute increase). However, this effect primarily accelerates households already economically positioned to purchase an EV rather than recruiting new entrants. By contrast, household income operates as the fundamental affordability ceiling. A causal contrast between lower- and higher-income strata, shows a reduction in market non-participation by 23.1 percentage points, identifying financial capacity as the principal gatekeeper to entering the EV transition funnel. Crucially, the analysis demonstrates that standard observational models overstate the isolated effect of off-street parking infrastructure. The apparent effect emerges from selection bias: higher-income households are disproportionately likely to possess both private parking and the means to purchase EVs. These findings support a dual-track policy strategy: lowering the affordability ceiling for non-participants through financial instruments, while addressing EV home-charging access for the 'latent intent' cohort in high-density urban contexts.", "link": "http://arxiv.org/abs/2604.09271v1", "date": "2026-04-10", "relevancy": 0.9953, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.3639}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.3309}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.3018}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20causal%20relation%20between%20off-street%20parking%20and%20electric%20vehicle%20adoption%20in%20Scotland&body=Title%3A%20The%20causal%20relation%20between%20off-street%20parking%20and%20electric%20vehicle%20adoption%20in%20Scotland%0AAuthor%3A%20Bernardino%20D%27Amico%20and%20Achille%20Fonzone%20and%20Emma%20Hart%0AAbstract%3A%20The%20transition%20to%20electric%20mobility%20hinges%20on%20maximising%20aggregate%20adoption%20while%20also%20facilitating%20equitable%20access.%20This%20study%20examines%20whether%20the%20%27charging%20divide%27%20between%20households%20with%20and%20without%20off-street%20parking%20reflects%20a%20genuine%20infrastructure%20constraint%20or%20a%20by-product%20of%20socio-economic%20disparity.%20Moving%20beyond%20conventional%20predictive%20models%2C%20we%20apply%20a%20probabilistic%20causal%20framework%20to%20a%20nationally%20representative%20dataset%20of%20Scottish%20households%2C%20enabling%20estimation%20of%20policy%20interventions%20while%20explicitly%20neutralising%20the%20confounding%20effect%20of%20other%20causal%20factors.%20The%20results%20reveal%20a%20structural%20hierarchy%20in%20the%20EV%20adoption%20process.%20Private%20off-street%20parking%20functions%20as%20a%20conversion%20catalyst%3A%20enab {"title": "Drift-Aware Online Dynamic Learning for Nonstationary Multivariate Time Series: Application to Sintering Quality Prediction", "author": "Yumeng Zhao and Shengxiang Yang and Xianpeng Wang", "abstract": "Accurate prediction of nonstationary multivariate time series remains a critical challenge in complex industrial systems such as iron ore sintering. In practice, pronounced concept drift compounded by significant label verification latency rapidly degrades the performance of offline-trained models. Existing methods based on static architectures or passive update strategies struggle to simultaneously extract multi-scale spatiotemporal features and overcome the stability-plasticity dilemma without immediate supervision. To address these limitations, a Drift-Aware Multi-Scale Dynamic Learning (DA-MSDL) framework is proposed to maintain robust multi-output predictive performance via online adaptive mechanisms on nonstationary data streams. The framework employs a multi-scale bi-branch convolutional network as its backbone to disentangle local fluctuations from long-term trends, thereby enhancing representational capacity for complex dynamic patterns. To circumvent the label latency bottleneck, DA-MSDL leverages Maximum Mean Discrepancy (MMD) for unsupervised drift detection. By quantifying online statistical deviations in feature distributions, DA-MSDL proactively triggers model adaptation prior to inference. Furthermore, a drift-severity-guided hierarchical fine-tuning strategy is developed. Supported by prioritized experience replay from a dynamic memory queue, this approach achieves rapid distribution alignment while effectively mitigating catastrophic forgetting. Long-horizon experiments on real-world industrial sintering data and a public benchmark dataset demonstrate that DA-MSDL consistently outperforms representative baselines under severe concept drift. Exhibiting strong cross-domain generalization and predictive stability, the proposed framework provides an effective online dynamic learning paradigm for quality monitoring in nonstationary environments.", "link": "http://arxiv.org/abs/2604.09358v1", "date": "2026-04-10", "relevancy": 1.5799, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5372}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5188}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5081}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Drift-Aware%20Online%20Dynamic%20Learning%20for%20Nonstationary%20Multivariate%20Time%20Series%3A%20Application%20to%20Sintering%20Quality%20Prediction&body=Title%3A%20Drift-Aware%20Online%20Dynamic%20Learning%20for%20Nonstationary%20Multivariate%20Time%20Series%3A%20Application%20to%20Sintering%20Quality%20Prediction%0AAuthor%3A%20Yumeng%20Zhao%20and%20Shengxiang%20Yang%20and%20Xianpeng%20Wang%0AAbstract%3A%20Accurate%20prediction%20of%20nonstationary%20multivariate%20time%20series%20remains%20a%20critical%20challenge%20in%20complex%20industrial%20systems%20such%20as%20iron%20ore%20sintering.%20In%20practice%2C%20pronounced%20concept%20drift%20compounded%20by%20significant%20label%20verification%20latency%20rapidly%20degrades%20the%20performance%20of%20offline-trained%20models.%20Existing%20methods%20based%20on%20static%20architectures%20or%20passive%20update%20strategies%20struggle%20to%20simultaneously%20extract%20multi-scale%20spatiotemporal%20features%20and%20overcome%20the%20stability-plasticity%20dilemma%20without%20immediate%20supervision.%20To%20address%20these%20limitations%2C%20a%20Drift-Aware%20Multi-Scale%20Dynamic%20Learning%20%28DA-MSDL%29%20framework%20is%20proposed%20to%20maintain%20robust%20multi-output%20predictive%20performance%20via%20online%20adaptive%20mechanisms%20on%20nonstationary%20data%20streams.%20The%20framework%20employs%20a%20multi-scale%20bi-branch%20convolutional%20network%20as%20its%20backbone%20to%20disentangle%20local%20fluctuations%20from%20long-term%20trends%2C%20thereby%20enhancing%20representational%20capacity%20for%20complex%20dynamic%20patterns.%20To%20circumvent%20the%20label%20latency%20bottleneck%2C%20DA-MSDL%20leverages%20Maximum%20Mean%20Discrepancy%20%28MMD%29%20for%20unsupervised%20drift%20detection.%20By%20quantifying%20online%20statistical%20deviations%20in%20feature%20distributions%2C%20DA-MSDL%20proactively%20triggers%20model%20adaptation%20prior%20to%20inference.%20Furthermore%2C%20a%20drift-severity-guided%20hierarchical%20fine-tuning%20strategy%20is%20developed.%20Supported%20by%20prioritized%20experience%20replay%20from%20a%20dynamic%20memory%20queue%2C%20this%20approach%20achieves%20rapid%20distribution%20alignment%20while%20effectively%20mitigating%20catastrophic%20forgetting.%20Long-horizon%20experiments%20on%20real-world%20industrial%20sintering%20data%20and%20a%20public%20benchmark%20dataset%20demonstrate%20that%20DA-MSDL%20consistently%20outperforms%20representative%20baselines%20under%20severe%20concept%20drift.%20Exhibiting%20strong%20cross-domain%20generalization%20and%20predictive%20stability%2C%20the%20proposed%20framework%20provides%20an%20effective%20online%20dynamic%20learning%20paradigm%20for%20quality%20monitoring%20in%20nonstationary%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09358v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDrift-Aware%2520Online%2520Dynamic%2520Learning%2520for%2520Nonstationary%2520Multivariate%2520Time%2520Series%253A%2520Application%2520to%2520Sintering%2520Quality%2520Prediction%26entry.906535625%3DYumeng%2520Zhao%2520and%2520Shengxiang%2520Yang%2520and%2520Xianpeng%2520Wang%26entry.1292438233%       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

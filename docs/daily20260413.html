{"title": "On the Role of DAG topology in Energy-Aware Cloud Scheduling : A GNN-Based Deep Reinforcement Learning Approach", "author": "Anas Hattay and Fred Ngole Mboula and Eric Gascard and Zakaria Yahoun", "abstract": "Cloud providers must assign heterogeneous compute resources to workflow DAGs while balancing competing objectives such as completion time, cost, and energy consumption. In this work, we study a single-workflow, queue-free scheduling setting and consider a graph neural network (GNN)-based deep reinforcement learning scheduler designed to minimize workflow completion time and energy usage. We identify specific out-of-distribution (OOD) conditions under which GNN-based deep reinforcement learning schedulers fail and provide a principled explanation of why these failures occur. Through controlled OOD evaluations, we demonstrate that performance degradation stems from structural mismatches between training and deployment environments, which disrupt message passing and undermine policy generalization. Our analysis exposes fundamental limitations of current GNN-based schedulers and highlights the need for more robust representations to ensure reliable scheduling performance under distribution shifts.", "link": "http://arxiv.org/abs/2604.09202v1", "date": "2026-04-10", "relevancy": 2.289, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4874}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4456}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4405}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20On%20the%20Role%20of%20DAG%20topology%20in%20Energy-Aware%20Cloud%20Scheduling%20%3A%20A%20GNN-Based%20Deep%20Reinforcement%20Learning%20Approach&body=Title%3A%20On%20the%20Role%20of%20DAG%20topology%20in%20Energy-Aware%20Cloud%20Scheduling%20%3A%20A%20GNN-Based%20Deep%20Reinforcement%20Learning%20Approach%0AAuthor%3A%20Anas%20Hattay%20and%20Fred%20Ngole%20Mboula%20and%20Eric%20Gascard%20and%20Zakaria%20Yahoun%0AAbstract%3A%20Cloud%20providers%20must%20assign%20heterogeneous%20compute%20resources%20to%20workflow%20DAGs%20while%20balancing%20competing%20objectives%20such%20as%20completion%20time%2C%20cost%2C%20and%20energy%20consumption.%20In%20this%20work%2C%20we%20study%20a%20single-workflow%2C%20queue-free%20scheduling%20setting%20and%20consider%20a%20graph%20neural%20network%20%28GNN%29-based%20deep%20reinforcement%20learning%20scheduler%20designed%20to%20minimize%20workflow%20completion%20time%20and%20energy%20usage.%20We%20identify%20specific%20out-of-distribution%20%28OOD%29%20conditions%20under%20which%20GNN-based%20deep%20reinforcement%20learning%20schedulers%20fail%20and%20provide%20a%20principled%20explanation%20of%20why%20these%20failures%20occur.%20Through%20controlled%20OOD%20evaluations%2C%20we%20demonstrate%20that%20performance%20degradation%20stems%20from%20structural%20mismatches%20between%20training%20and%20deployment%20environments%2C%20which%20disrupt%20message%20passing%20and%20undermine%20policy%20generalization.%20Our%20analysis%20exposes%20fundamental%20limitations%20of%20current%20GNN-based%20schedulers%20and%20highlights%20the%20need%20for%20more%20robust%20representations%20to%20ensure%20reliable%20scheduling%20performance%20under%20distribution%20shifts.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09202v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOn%2520the%2520Role%2520of%2520DAG%2520topology%2520in%2520Energy-Aware%2520Cloud%2520Scheduling%2520%253A%2520A%2520GNN-Based%2520Deep%2520Reinforcement%2520Learning%2520Approach%26entry.906535625%3DAnas%2520Hattay%2520and%2520Fred%2520Ngole%2520Mboula%2520and%2520Eric {"title": "VL-Calibration: Decoupled Confidence Calibration for Large Vision-Language Models Reasoning", "author": "Wenyi Xiao and Xinchi Xu and Leilei Gan", "abstract": "Large Vision Language Models (LVLMs) achieve strong multimodal reasoning but frequently exhibit hallucinations and incorrect responses with high certainty, which hinders their usage in high-stakes domains. Existing verbalized confidence calibration methods, largely developed for text-only LLMs, typically optimize a single holistic confidence score using binary answer-level correctness. This design is mismatched to LVLMs: an incorrect prediction may arise from perceptual failures or from reasoning errors given correct perception, and a single confidence conflates these sources while visual uncertainty is often dominated by language priors. To address these issues, we propose VL-Calibration, a reinforcement learning framework that explicitly decouples confidence into visual and reasoning confidence. To supervise visual confidence without ground-truth perception labels, we introduce an intrinsic visual certainty estimation that combines (i) visual grounding measured by KL-divergence under image perturbations and (ii) internal certainty measured by token entropy. We further propose token-level advantage reweighting to focus optimization on tokens based on visual certainty, suppressing ungrounded hallucinations while preserving valid perception. Experiments on thirteen benchmarks show that VL-Calibration effectively improves calibration while boosting visual reasoning accuracy, and it generalizes to out-of-distribution benchmarks across model scales and architectures.", "link": "http://arxiv.org/abs/2604.09529v1", "date": "2026-04-10", "relevancy": 2.2792, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5886}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5613}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5544}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VL-Calibration%3A%20Decoupled%20Confidence%20Calibration%20for%20Large%20Vision-Language%20Models%20Reasoning&body=Title%3A%20VL-Calibration%3A%20Decoupled%20Confidence%20Calibration%20for%20Large%20Vision-Language%20Models%20Reasoning%0AAuthor%3A%20Wenyi%20Xiao%20and%20Xinchi%20Xu%20and%20Leilei%20Gan%0AAbstract%3A%20Large%20Vision%20Language%20Models%20%28LVLMs%29%20achieve%20strong%20multimodal%20reasoning%20but%20frequently%20exhibit%20hallucinations%20and%20incorrect%20responses%20with%20high%20certainty%2C%20which%20hinders%20their%20usage%20in%20high-stakes%20domains.%20Existing%20verbalized%20confidence%20calibration%20methods%2C%20largely%20developed%20for%20text-only%20LLMs%2C%20typically%20optimize%20a%20single%20holistic%20confidence%20score%20using%20binary%20answer-level%20correctness.%20This%20design%20is%20mismatched%20to%20LVLMs%3A%20an%20incorrect%20prediction%20may%20arise%20from%20perceptual%20failures%20or%20from%20reasoning%20errors%20given%20correct%20perception%2C%20and%20a%20single%20confidence%20conflates%20these%20sources%20while%20visual%20uncertainty%20is%20often%20dominated%20by%20language%20priors.%20To%20address%20these%20issues%2C%20we%20propose%20VL-Calibration%2C%20a%20reinforcement%20learning%20framework%20that%20explicitly%20decouples%20confidence%20into%20visual%20and%20reasoning%20confidence.%20To%20supervise%20visual%20confidence%20without%20ground-truth%20perception%20labels%2C%20we%20introduce%20an%20intrinsic%20visual%20certainty%20estimation%20that%20combines%20%28i%29%20visual%20grounding%20measured%20by%20KL-divergence%20under%20image%20perturbations%20and%20%28ii%29%20internal%20certainty%20measured%20by%20token%20entropy.%20We%20further%20propose%20token-level%20advantage%20reweighting%20to%20focus%20optimization%20on%20tokens%20based%20on%20visual%20certainty%2C%20suppressing%20ungrounded%20hallucinations%20while%20preserving%20valid%20perception.%20Experiments%20on%20thirteen%20benchmarks%20show%20that%20VL-Calibration%20effectively%20improves%20calibration%20while%20boosting%20visual%20reasoning%20accuracy%2C%20and%20it%20generalizes%20to%20out-of-distribution%20benchmarks%20across%20model%20scales%20and%20architectures.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09529v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVL-Calibration%253A%2520Decoupled%2520Confidence%2520Calibration%2520for%2520Large%2520Vision-Language%2520Models%2520Reasoning%26entry.906535625%3DWenyi%2520Xiao%2520and%2520Xinchi%2520Xu%2520and%2520Leilei%2520Gan%26entry.1292438233%3DLarge%2520Vision%2520Language%2520Models%2520%2528LVLMs%2529%2520achieve%2520strong%2520multimodal%2520reasoning%2520but%2520frequently%2520exhibit%2520hallucinations%2520and%2520incorrect%2520responses%2520with%2520high%2520certainty%252C%2520which%2520hinders%2520their%2520usage%2520in%2520high-stakes%2520domains.%2520Existing%2520verbalized%2520confidence%2520calibration%2520methods%252C%2520largely%2520developed%2520for%2520text-only%2520LLMs%252C%2520typically%2520optimize%2520a%2520single%2520holistic%2520confidence%2520score%2520using%2520binary%2520answer-level%2520correctness.%2520This%2520design%2520is%2520mismatched%2520to%2520LVLMs%253A%2520an%2520incorrect%2520prediction%2520may%2520arise%2520from%2520perceptual%2520failures%2520or%2520from%2520reasoning%2520errors%2520given%2520correct%2520perception%252C%2520and%2520a%2520single%2520confidence%2520conflates%2520these%2520sources%2520while%2520visual%2520u {"title": "Tango: Taming Visual Signals for Efficient Video Large Language Models", "author": "Shukang Yin and Sirui Zhao and Hanchao Wang and Baozhi Jia and Xianquan Wang and Chaoyou Fu and Enhong Chen", "abstract": "Token pruning has emerged as a mainstream approach for developing efficient Video Large Language Models (Video LLMs). This work revisits and advances the two predominant token-pruning paradigms: attention-based selection and similarity-based clustering. Our study reveals two critical limitations in existing methods: (1) conventional top-k selection strategies fail to fully account for the attention distribution, which is often spatially multi-modal and long-tailed in magnitude; and (2) direct similarity-based clustering frequently generates fragmented clusters, resulting in distorted representations after pooling. To address these bottlenecks, we propose Tango, a novel framework designed to optimize the utilization of visual signals. Tango integrates a diversity-driven strategy to enhance attention-based token selection, and introduces Spatio-temporal Rotary Position Embedding (ST-RoPE) to preserve geometric structure via locality priors. Comprehensive experiments across various Video LLMs and video understanding benchmarks demonstrate the effectiveness and generalizability of our approach. Notably, when retaining only 10% of the video tokens, Tango preserves 98.9% of the original performance on LLaVA-OV while delivering a 1.88x inference speedup.", "link": "http://arxiv.org/abs/2604.09547v1", "date": "2026-04-10", "relevancy": 2.2787, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5789}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5642}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "h %20preserves%2098.9%25%20of%20the%20original%20performance%20on%20LLaVA-OV%20while%20delivering%20a%201.88x%20inference%20speedup.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09547v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTango%253A%2520Taming%2520Visual%2520Signals%2520for%2520Efficient%2520Video%2520Large%2520Language%2520Models%26entry.906535625%3DShukang%2520Yin%2520and%2520Sirui%2520Zhao%2520and%2520Hanchao%2520Wang%2520and%2520Baozhi%2520Jia%2520and%2520Xianquan%2520Wang%2520and%2520Chaoyou%2520Fu%2520and%2520Enhong%2520Chen%26entry.1292438233%3DToken%2520pruning%2520has%2520emerged%2520as%2520a%2520mainstream%2520approach%2520for%2520developing%2520efficient%2520Video%2520Large%2520Language%2520Models%2520%2528Video%2520LLMs%2529.%2520This%2520work%2520revisits%2520and%2520advances%2520the%2520two%2520predominant%2520token-pruning%2520paradigms%253A%2520attention-based%2520selection%2520and%2520similarity-based%2520clustering.%2520Our%2520study%2520reveals%2520two%2520critical%2520limitations%2520in%2520existing%2520methods%253A%2520%25281%2529%2520conventional%2520top-k%2520selection%2520strategies%2520fail%2520to%2520fully%2520account%2520for%2520the%2520attention%2520distribution%252C%2520which%2520is%2520often%2520spatially%2520multi-modal%2520and%2520long-tailed%2520in%2520magnitude%253B%2520and%2520%25282%2529%2520direct%2520similarity-based%2520clustering%2520frequently%2520generates%2520fragmented%2520clusters%252C%2520resulting%2520in%2520distorted%2520representations%2520after%2520pooling.%2520To%2520address%2520these%2520bottlenecks%252C%2520we%2520propose%2520Tango%252C%2520a%2520novel%2520framework%2520designed%2520to%2520optimize%2520the%2520utilization%2520of%2520visual%2520signals.%2520Tango%2520integrates%2520a%2520diversity-driven%2520strategy%2520to%2520enhance%2520attention-based%2520token%2520selection%252C%2520and%2520introduces%2520Spatio-temporal%2520Rotary%2520Position%2520Embedding%2520%2528ST-RoPE%2529%2520to%2520preserve%2520geometric%2520structure%2520via%2520locality%2520priors.%2520Comprehensive%2520experiments%2520across%2520various%2520Video%2520LLMs%2520and%2520video%2520understanding%2520benchmarks%2520demonstrate%2520the%2520effectiveness%2520and%2520generalizability%2520of%2520our%2520approach.%2520Notably%252C%2520when%2520retaining%2520only%252010%2525%2520of%2520the%2520video%2520tokens%252C%2520Tango%2520preserves%252098.9%2525%2520of%2520the%2520original%2520performance%2520on%2520LLaVA-OV%2520while%2520delivering%2520a%25201.88x%2520inference%2520speedup.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.09547v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Tango%3A%20Taming%20Visual%20Signals%20for%20Efficient%20Video%20Large%20Language%20Models&entry.906535625=Shukang%20Yin%20and%20Sirui%20Zhao%20and%20Hanchao%20Wang%20and%20Baozhi%20Jia%20and%20Xianquan%20Wang%20and%20Chaoyou%20Fu%20and%20Enhong%20Chen&entry.1292438233=Token%20pruning%20has%20emerged%20as%20a%20mainstream%20approach%20for%20developing%20efficient%20Video%20Large%20Language%20Models%20%28Video%20LLMs%29.%20This%20work%20revisits%20and%20advances%20the%20two%20predominant%20token-pruning%20paradigms%3A%20attention-based%20selection%20and%20similarity-based%20clustering.%20Our%20study%20reveals%20two%20critical%20limitations%20in%20existing%20methods%3A%20%281%29%20conventional%20top-k%20selection%20strategies%20fail%20to%20fully%20account%20for%20the%20attention%20distribution%2C%20which%20is%20often%20spatially%20multi-modal%20and%20long-tailed%20in%20magnitude%3B%20and%20%282%29%20direct%20similarity-based%20clustering%20frequently%20generates%20fragmented%20clusters%2C%20resulting%20in%20distorted%20representations%20after%20pooling.%20To%20address%20these%20bottlenecks%2C%20we%20propose%20Tango%2C%20a%20novel% {"title": "Are Independently Estimated View Uncertainties Comparable? Unified Routing for Trusted Multi-View Classification", "author": "Yilin Zhang and Cai Xu and Haishun Chen and Ziyu Guan and Wei Zhao", "abstract": "Trusted multi-view classification typically relies on a view-wise evidential fusion process: each view independently produces class evidence and uncertainty, and the final prediction is obtained by aggregating these independent opinions. While this design is modular and uncertainty-aware, it implicitly assumes that evidence from different views is numerically comparable. In practice, however, this assumption is fragile. Different views often differ in feature space, noise level, and semantic granularity, while independently trained branches are optimized only for prediction correctness, without any constraint enforcing cross-view consistency in evidence strength. As a result, the uncertainty used for fusion can be dominated by branch-specific scale bias rather than true sample-level reliability. To address this issue, we propose Trusted Multi-view learning with Unified Routing (TMUR), which decouples view-specific evidence extraction from fusion arbitration. TMUR uses view-private experts and one collaborative expert, and employs a unified router that observes the global multi-view context to generate sample-level expert weights. Soft load-balancing and diversity regularization further encourage balanced expert utilization and more discriminative expert specialization. We also provide theoretical analysis showing why independent evidential supervision does not identify a common cross-view evidence scale, and why unified global routing is preferable to branch-local arbitration when reliability is sample-dependent.", "link": "http://arxiv.org/abs/2604.09288v1", "date": "2026-04-10", "relevancy": 2.2711, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5763}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5723}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5574}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Are%20Independently%20Estimated%20View%20Uncertainties%20Comparable%3F%20Unified%20Routing%20for%20Trusted%20Multi-View%20Classification&body=Title%3A%20Are%20Independently%20Estimated%20View%20Uncertainties%20Comparable%3F%20Unified%20Routing%20for%20Trusted%20Multi-View%20Classification%0AAuthor%3A%20Yilin%20Zhang%20and%20Cai%20Xu%20and%20Haishun%20Chen%20and%20Ziyu%20Guan%20and%20Wei%20Zhao%0AAbstract%3A%20Trusted%20multi-view%20classification%20typically%20relies%20on%20a%20view-wise%20evidential%20fusion%20process%3A%20each%20view%20independently%20produces%20class%20evidence%20and%20uncertainty%2C%20and%20the%20final%20prediction%20is%20obtained%20by%20aggregating%20these%20independent%20opinions.%20While%20this%20design%20is%20modular%20and%20uncertainty-aware%2C%20it%20implicitly%20assumes%20that%20evidence%20from%20different%20views%20is%20numerically%20comparable.%20In%20practice%2C%20however%2C%20this%20assumption%20is%20fragile.%20Different%20views%20often%20differ%20in%20feature%20space%2C%20noise%20level%2C%20and%20semantic%20granularity%2C%20while%20independently%20trained%20branches%20are%20optimized%20only%20for%20prediction%20correctness%2C%20without%20any%20constraint%20enforcing%20cross-view%20consistency%20in%20evidence%20strength.%20As%20a%20result%2C%20the%20uncertainty%20used%20for%20fusion%20can%20be%20dominated%20by%20branch-specific%20scale%20bias%20rather%20than%20true%20sample-level%20reliability.%20To%20address%20this%20issue%2C%20we%20propose%20Trusted%20Multi-view%20learning%20with%20Unified%20Routing%20%28TMUR%29%2C%20which%20decouples%20view-specific%20evidence%20extraction%20from%20fusion%20arbitration.%20TMUR%20uses%20view-private%20experts%20and%20one%20collaborative%20expert%2C%20and%20employs%20a%20unified%20router%20that%20observes%20the%20global%20multi-view%20context%20to%20generate%20sample-level%20expert%20weights.%20Soft%20load-balancing%20and%20diversity%20regularization%20further%20encourage%20balanced%20expert%20utilization%20and%20more%20discriminative%20expert%20specialization.%20We%20also%20provide%20theoretical%20analysis%20showing%20why%20independent%20evidential%20supervision%20does%20not%20identify%20a%20common%20cross-view%20evidence%20scale%2C%20and%20why%20unified%20global%20routing%20is%20preferable%20to%20branch-local%20arbitration%20when%20reliability%20is%20sample-dependent.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09288v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAre%2520Independently%2520Estimated%2520View%2520Uncertainties%2520Comparable%253F%2520Unified%2520Routing%2520for%2520Trusted%2520Multi-View%2520Classification%26entry.906535625%3DYilin%2520Zhang%2520and%2520Cai%2520Xu%2520and%2520Haishun%2520Chen%2520and%2520Ziyu%2520Guan%2520and%2520Wei%2520Zhao%26entry.1292438233%3DTrusted%2520multi-view%2520classification%2520typically%2520relies%2520on%2520a%2520view-wise%2520evidential%2520fusion%2520process%253A%2520each%2520view%2520independently%2520produces%2520class%2520evidence%2520and%2520uncertainty%252C%2520and%2520the%2520final%2520prediction%2520is%2520obtained%2520by%2520aggregating%2520these%2520independent%2520opinions.%2520While%2520this%2520design%2520is%2520modular%2520and%2520uncertainty-aware%252C%2520it%2520implicitly%2520assumes%2520that%2520evidence%2520from%2520different%2520views%2520is%2520numerically%2520comparable.%252 viewform?entry.1380929848=Are%20Independently%20Estimated%20View%20Uncertainties%20Comparable%3F%20Unified%20Routing%20for%20Trusted%20Multi-View%20Classification&entry.906535625=Yilin%20Zhang%20and%20Cai%20Xu%20and%20Haishun%20Chen%20and%20Ziyu%20Guan%20and%20Wei%20Zhao&entry.1292438233=Trusted%20multi-view%20classification%20typically%20relies%20on%20a%20view-wise%20evidential%20fusion%20process%3A%20each%20view%20independently%20produces%20class%20evidence%20and%20uncertainty%2C%20and%20the%20final%20prediction%20is%20obtained%20by%20aggregating%20these%20independent%20opinions.%20While%20this%20design%20is%20modular%20and%20uncertainty-aware%2C%20it%20implicitly%20assumes%20that%20evidence%20from%20different%20views%20is%20numerically%20comparable.%20In%20practice%2C%20however%2C%20this%20assumption%20is%20fragile.%20Different%20views%20often%20differ%20in%20feature%20space%2C%20noise%20level%2C%20and%20semantic%20granularity%2C%20while%20independently%20trained%20branches%20are%20optimized%20only%20for%20prediction%20correctness%2C%20without%20any%20constraint%20enforcing%20cross-view%20consistency%20in%20evidence%20strength.%20As%20a%20result%2C%20the%20uncertainty%20used%20for%20fusion%20can%20be%20dominated%20by%20branch-specific%20scale%20bias%20rather%20than%20true%20sample-level%20reliability.%20To%20address%20this%20issue%2C%20we%20propose%20Trusted%20Multi-view%20learning%20with%20Unified%20Routing%20%28TMUR%29%2C%20which%20decouples%20view-specific%20evidence%20extraction%20from%20fusion%20arbitration.%20TMUR%20uses%20view-private%20experts%20and%20one%20collaborative%20expert%2C%20and%20employs%20a%20unified%20router%20that%20observes%20the%20global%20multi-view%20context%20to%20generate%20sample-level%20expert%20weights.%20Soft%20load-balancing%20and%20diversity%20regularization%20further%20encourage%20balanced%20expert%20utilization%20and%20more%20discriminative%20expert%20specialization.%20We%20also%20provide%20theoretical%20analysis%20showing%20wh {"title": "VisionLaw: Inferring Interpretable Intrinsic Dynamics from Visual Observations via Bilevel Optimization", "author": "Jiajing Lin and Shu Jiang and Qingyuan Zeng and Zhenzhong Wang and Min Jiang", "abstract": "The intrinsic dynamics of an object governs its physical behavior in the real world, playing a critical role in enabling physically plausible interactive simulation with 3D assets. Existing methods have attempted to infer the intrinsic dynamics of objects from visual observations, but generally face two major challenges: one line of work relies on manually defined constitutive priors, making it difficult to align with actual intrinsic dynamics; the other models intrinsic dynamics using neural networks, resulting in limited interpretability and poor generalization. To address these challenges, we propose VisionLaw, a bilevel optimization framework that infers interpretable expressions of intrinsic dynamics from visual observations. At the upper level, we introduce an LLMs-driven decoupled constitutive evolution strategy, where LLMs are prompted to act as physics experts to generate and revise constitutive laws, with a built-in decoupling mechanism that substantially reduces the search complexity of LLMs. At the lower level, we introduce a vision-guided constitutive evaluation mechanism, which utilizes visual simulation to evaluate the consistency between the generated constitutive law and the underlying intrinsic dynamics, thereby guiding the upper-level evolution. Experiments on both synthetic and real-world datasets demonstrate that VisionLaw can effectively infer interpretable intrinsic dynamics from visual observations. It significantly outperforms existing state-of-the-art methods and exhibits strong generalization for interactive simulation in novel scenarios.", "link": "http://arxiv.org/abs/2508.13792v2", "date": "2026-04-10", "relevancy": 2.2613, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5782}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5628}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5628}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VisionLaw%3A%20Inferring%20Interpretable%20Intrinsic%20Dynamics%20from%20Visual%20Observations%20via%20Bilevel%20Optimization&body=Title%3A%20VisionLaw%3A%20Inferring%20Interpretable%20Intrinsic%20Dynamics%20from%20Visual%20Observations%20via%20Bilevel%20Optimization%0AAuthor%3A%20Jiajing%20Lin%20and%20Shu%20Jiang%20and%20Qingyuan%20Zeng%20and%20Zhenzhong%20Wang%20and%20Min%20Jiang%0AAbstract%3A%20The%20intrinsic%20dynamics%20of%20an%20object%20governs%20its%20physical%20behavior%20in%20the%20real%20world%2C%20playing%20a%20critical%20role%20in%20enabling%20physically%20plausible%20interactive%20simulation%20with%203D%20assets.%20Existing%20methods%20have%20attempted%20to%20infer%20the%20intrinsic%20dynamics%20of%20objects%20from%20visual%20observations%2C%20but%20generally%20face%20two%20major%20challenges%3A%20one%20line%20of%20work%20relies%20on%20manually%20defined%20constitutive%20priors%2C%20making%20it%20difficult%20to%20align%20with%20actual%20intrinsic%20dynamics%3B%20the%20other%20models%20intrinsic%20dynamics%20using%20neural%20networks%2C%20resulting%20in%20limited%20interpretability%20and%20poor%20generalization.%20To%20address%20these%20challenges%2C%20we%20propose%20VisionLaw%2C%20a%20bilevel%20optimization%20framework%20that%20infers%20interpretable%20expressions%20of%20intrinsic%20dynamics%20from%20visual%20observations.%20At%20the%20upper%20level%2C%20we%20introduce%20an%20LLMs-driven%20decoupled%20constitutive%20evolution%20strategy%2C%20where%20LLMs%20are%20prompted%20to%20act%20as%20physics%20experts%20to%20generate%20and%20revise%20constitutive%20laws%2C%20with%20a%20built-in%20decoupling%20mechanism%20that%20substantially%20reduces%20the%20search%20complexity%20of%20LLMs.%20At%20the%20lower%20level%2C%20we%20introduce%20a%20vision-guided%20constitutive%20evaluation%20mechanism%2C%20which%20utilizes%20visual%20simulation%20to%20evaluate%20the%20consistency%20between%20the%20generated%20constitutive%20law%20and%20the%20underlying%20intrinsic%20dynamics%2C%20thereby%20guiding%20the%20upper-level%20evolution.%20Experiments%20on%20both%20synthetic%20and%20real-world%20datasets%20demonstrate%20that%20VisionLaw%20can%20effectively%20infer%20interpretable%20intrinsic%20dynamics%20from%20visual%20observations.%20It%20significantly%20outperforms%20existing%20state-of-the-art%20methods%20and%20exhibits%20strong%20generalization%20for%20interactive%20simulation%20in%20novel%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2508.13792v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVisionLaw%253A%2520Inferring%2520Interpretable%2520Intrinsic%2520Dynamics%2520from%2520Visual%2520Observations%2520via%2520Bilevel%2520Optimization%26entry.906535625%3DJiajing%2520Lin%2520and%2520Shu%2520Jiang%2520and%2520Qingyuan%2520Zeng%2520and%2520Zhenzhong%2520Wang%2520and%2520Min%2520Jiang%26entry.1292438233%3DThe%2520intrinsic%2520dynamics%2520of%2520an%2520object%2520governs%2520its%2520physical%2520behavior%2520in%2520the%2520real%2520world%252C%2520playing%2520a%2520critical%2520role%2520in%2520enabling%2520physically%2520plausible%2520interactive%2520simulation%2520with%25203D%2520assets.%2520Existing%2520methods%2520have%2520attempted%2520to%2520infer%2520the%2520intrinsic%2520dynamics%2520of%2520objects%2520from%2520visual%2520observations%252C%2520but%2520generally%2520face%2520two%2520major%2520challenges%253A%2520one%2520line%2520of%2520work%2520relies% {"title": "Many-Tier Instruction Hierarchy in LLM Agents", "author": "Jingyu Zhang and Tianjian Li and William Jurayj and Hongyuan Zhan and Benjamin Van Durme and Daniel Khashabi", "abstract": "Large language model agents receive instructions from many sources-system messages, user prompts, tool outputs, and more-each carrying different levels of trust and authority. When these instructions conflict, models must reliably follow the highest-privilege instruction to remain safe and effective. The dominant paradigm, instruction hierarchy (IH), assumes a fixed, small set of privilege levels (typically fewer than five) defined by rigid role labels (e.g., system > user). This is inadequate for real-world agentic settings, where conflicts can arise across far more sources and contexts. In this work, we propose Many-Tier Instruction Hierarchy (ManyIH), a paradigm for resolving instruction conflicts among instructions with arbitrarily many privilege levels. We introduce ManyIH-Bench, the first benchmark for ManyIH. ManyIH-Bench requires models to navigate up to 12 levels of conflicting instructions with varying privileges, comprising 853 agentic tasks (427 coding and 426 instruction-following). ManyIH-Bench composes constraints developed by LLMs and verified by humans to create realistic and difficult test cases spanning 46 real-world agents. Our experiments show that even the current frontier models perform poorly (~40% accuracy) when instruction conflict scales. This work underscores the urgent need for methods that explicitly target fine-grained, scalable instruction conflict resolution in agentic settings.", "link": "http://arxiv.org/abs/2604.09443v1", "date": "2026-04-10", "relevancy": 2.2605, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4884}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.434}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.434}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Many-Tier%20Instruction%20Hierarchy%20in%20LLM%20Agents&body=Title%3A%20Many-Tier%20Instruction%20Hierarchy%20in%20LLM%20Agents%0AAuthor%3A%20Jingyu%20Zhang%20and%20Tianjian%20Li%20and%20William%20Jurayj%20and%20Hongyuan%20Zhan%20and%20Benjamin%20Van%20Durme%20and%20Daniel%20Khashabi%0AAbstract%3A%20Large%20language%20model%20agents%20receive%20instructions%20from%20many%20sources-system%20messages%2C%20user%20prompts%2C%20tool%20outputs%2C%20and%20more-each%20carrying%20different%20levels%20of%20trust%20and%20authority.%20When%20these%20instructions%20conflict%2C%20models%20must%20reliably%20follow%20the%20highest-privilege%20instruction%20to%20remain%20safe%20and%20effective.%20The%20dominant%20paradigm%2C%20instruction%20hierarchy%20%28IH%29%2C%20assumes%20a%20fixed%2C%20small%20set%20of%20privilege%20levels%20%28typically%20fewer%20than%20five%29%20defined%20by%20rigid%20role%20labels%20%28e.g.%2C%20system%20%3E%20user%29.%20This%20is%20inadequate%20for%20real-world%20agentic%20settings%2C%20where%20conflicts%20can%20arise%20across%20far%20more%20sources%20and%20contexts.%20In%20this%20work%2C%20we%20propose%20Many-Tier%20Instruction%20Hierarchy%20%28ManyIH%29%2C%20a%20paradigm%20for%20resolving%20instruction%20conflicts%20among%20instructions%20with%20arbitrarily%20many%20privilege%20levels.%20We%20introduce%20ManyIH-Bench%2C%20the%20first%20benchmark%20for%20ManyIH.%20ManyIH-Bench%20requires%20models%20to%20navigate%20up%20to%2012%20levels%20of%20conflicting%20instructions%20with%20varying%20privileges%2C%20comprising%20853%20agentic%20tasks%20%28427%20coding%20and%20426%20instruction-following%29.%20ManyIH-Bench%20composes%20constraints%20developed%20by%20LLMs%20and%20verified%20by%20humans%20to%20create%20realistic%20and%20difficult%20test%20cases%20spanning%2046%20real-world%20agents.%20Our%20experiments%20show%20that%20even%20the%20current%20frontier%20models%20perform%20poorly%20%28~40%25%20accuracy%29%20when%20instruction%20conflict%20scales.%20This%20work%20underscores%20the%20urgent%20need%20for%20methods%20that%20explicitly%20target%20fine-grained%2C%20scalable%20instruction%20conflict%20resolution%20in%20agentic%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09443v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMany-Tier%2520Instruction%2520Hierarchy%2520in%2520LLM%2520Agents%26entry.906535625%3DJingyu%2520Zhang%2520and%2520Tianjian%2520Li%2520and%2520William%2520Jurayj%2520and%2520Hongyuan%2520Zhan%2520and%2520Benjamin%2520Van%2520Durme%2520and%2520Daniel%2520Khashabi%26entry.1292438233%3DLarge%2520language%2520model%2520agents%2520receive%2520instructions%2520from%2520many%2520sources-system%2520messages%252C%2520user%2520prompts%252C%2520tool%2520outputs%252C%2520and%2520more-each%2520carrying%2520different%2520levels%2520of%2520trust%2520and%2520authority.%2520When%2520these%2520instructions%2520conflict%252C%2520models%2520must%2520reliably%2520follow%2520the%2520highest-privilege%2520instruction%2520to%2520remain%2520safe%2520and%2520effective.%2520The%2520dominant%2520paradigm%252C%2520instruction%2520hierarchy%2520%2528IH%2529%252C%2520assumes%2520a%2520fixed%252C%2520small%2520set%2520of%2520privilege%2520levels%2520%2528typically%2520fewer%2520than%2520five%2529%2520defined%2520by%2520rigid%2520role%2520labels%2520%2528e.g.%252C%2520system%2520%253E%2520user%2529.%2520This%2520is%2520inadequate%2520for%2520real-world%2520agentic%2520settings%252C%2520where%2520conflicts%2520can%2520arise%2520across%2520far%2520more%2520sources%2520and%2520contexts.%2520In%2520this%2520work%252C%2520we%2520propose%2520Many-Tier%2520Instruction%2520Hierarchy%2520%2528 {"title": "Mind the Gap Between Spatial Reasoning and Acting! Step-by-Step Evaluation of Agents With Spatial-Gym", "author": "Lars Benedikt Kaesberg and Tianyu Yang and Niklas Bauer and Terry Ruas and Jan Philip Wahle and Bela Gipp", "abstract": "Spatial reasoning is central to navigation and robotics, yet measuring model capabilities on these tasks remains difficult. Existing benchmarks evaluate models in a one-shot setting, requiring full solution generation in a single response, unlike humans, who work in interactive environments step-by-step. We introduce Spatial-Gym, a Gymnasium environment that isolates spatial constraint reasoning by testing pathfinding in 2D-grid puzzles as a sequential decision task with optional backtracking. We evaluate eight models in three settings (one-shot, step-by-step, step-by-step with backtracking) against human, random, and A* baselines on 500 episodes. The best model, GPT-OSS 120B, achieves a solve rate of 16.0%, 82 points below the human baseline (98.0%). Step-by-step format helps weaker models (up to +5.4%) by removing formatting errors, but hurts stronger models (up to 5.6%) by constraining global planning. Backtracking improves episode completion, but increases solve rate only for weaker models; stronger models rarely backtrack and do not benefit from it. Our experiments have three key findings: (1) models fail to scale reasoning effort with difficulty, (2) vision models receiving images of the spatial environment reduce solve rate by 73%, and (3) extended chain-of-thought reasoning retains a 3-5x accuracy advantage over standard inference even in the step-by-step setting. Spatial-Gym enables diagnosis of model limitations and provides a framework for improving spatial reasoning through reinforcement learning.", "link": "http://arxiv.org/abs/2604.09338v1", "date": "2026-04-10", "relevancy": 2.2572, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5973}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5577}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5577}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mind%20the%20Gap%20Between%20Spatial%20Reasoning%20and%20Acting%21%20Step-by-Step%20Evaluation%20of%20Agents%20With%20Spatial-Gym&body=Title%3A%20Mind%20the%20Gap%20Between%20Spatial%20Reasoning%20and%20Acting%21%20Step-by-Step%20Evaluation%20of%20Agents%20With%20Spatial-Gym%0AAuthor%3A%20Lars%20Benedikt%20Kaesberg%20and%20Tianyu%20Yang%20and%20Niklas%20Bauer%20and%20Terry%20Ruas%20and%20Jan%20Philip%20Wahle%20and%20Bela%20Gipp%0AAbstract%3A%20Spatial%20reasoning%20is%20central%20to%20navigation%20and%20robotics%2C%20yet%20measuring%20model%20capabilities%20on%20these%20tasks%20remains%20difficult.%20Existing%20benchmarks%20evaluate%20models%20in%20a%20one-shot%20setting%2C%20requiring%20full%20solution%20generation%20in%20a%20single%20response%2C%20unlike%20humans%2C%20who%20work%20in%20interactive%20environments%20step-by-step.%20We%20introduce%20Spatial-Gym%2C%20a%20Gymnasium%20environment%20that%20isolates%20spatial%20constraint%20reasoning%20by%20testing%20pathfinding%20in%202D-grid%20puzzles%20as%20a%20sequential%20decision%20task%20with%20optional%20backtracking.%20We%20evaluate%20eight%20models%20in%20three%20settings%20%28one-shot%2C%20step-by-step%2C%20step-by-step%20with%20backtracking%29%20against%20human%2C%20random%2C%20and%20A%2A%20baselines%20on%20500%20episodes.%20The%20best%20model%2C%20GPT-OSS%20120B%2C%20achieves%20a%20solve%20rate%20of%2016.0%25%2C%2082%20points%20below%20the%20human%20baseline%20%2898.0%25%29.%20Step-by-step%20format%20helps%20weaker%20models%20%28up%20to%20%2B5.4%25%29%20by%20removi {"title": "SafeMind: A Risk-Aware Differentiable Control Framework for Adaptive and Safe Quadruped Locomotion", "author": "Zukun Zhang and Kai Shu and Mingqiao Mo", "abstract": "Learning-based quadruped controllers achieve impressive agility but typically lack formal safety guarantees under model uncertainty, perception noise, and unstructured contact conditions. We introduce SafeMind, a differentiable stochastic safety-control framework that unifies probabilistic Control Barrier Functions with semantic context understanding and meta-adaptive risk calibration. SafeMind explicitly models epistemic and aleatoric uncertainty through a variance-aware barrier constraint embedded in a differentiable quadratic program, thereby preserving gradient flow for end-to-end training. A semantics-to-constraint encoder modulates safety margins using perceptual or language cues, while a meta-adaptive learner continuously adjusts risk sensitivity across environments. We provide theoretical conditions for probabilistic forward invariance, feasibility, and stability under stochastic dynamics. SafeMind is deployed on Unitree A1 and ANYmal C at 200~Hz and validated across 12 terrain types, dynamic obstacles, morphology perturbations, and semantically defined tasks. Experiments show that SafeMind reduces safety violations by 3--10x and energy consumption by 10--15% relative to state-of-the-art CBF, MPC, and hybrid RL baselines, while maintaining real-time control performance.", "link": "http://arxiv.org/abs/2604.09474v1", "date": "2026-04-10", "relevancy": 2.2556, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6083}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5768}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link" {"title": "Sharp description of local minima in the loss landscape of high-dimensional two-layer ReLU neural networks", "author": "Jie Huang and Bruno Loureiro and Stefano Sarao Mannelli", "abstract": "We study the population loss landscape of two-layer ReLU networks of the form $\\sum_{k=1}^K \\mathrm{ReLU}(w_k^\\top x)$ in a realisable teacher-student setting with Gaussian covariates. We show that local minima admit an exact low-dimensional representation in terms of summary statistics, yielding a sharp and interpretable characterisation of the landscape. We further establish a direct link with one-pass SGD: local minima correspond to attractive fixed points of the dynamics in summary statistics space. This perspective reveals a hierarchical structure of minima: they are typically isolated in the well-specified regime, but become connected by flat directions as network width increases. In this overparameterised regime, global minima become increasingly accessible, attracting the dynamics and reducing convergence to spurious solutions. Overall, our results reveal intrinsic limitations of common simplifying assumptions, which may miss essential features of the loss landscape even in minimal neural network models.", "link": "http://arxiv.org/abs/2604.09412v1", "date": "2026-04-10", "relevancy": 2.242, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4541}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4511}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4399}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sharp%20description%20of%20local%20minima%20in%20the%20loss%20landscape%20of%20high-dimensional%20two-layer%20ReLU%20neural%20networks {"title": "BEDTime: A Unified Benchmark for Automatically Describing Time Series", "author": "Medhasweta Sen and Zachary Gottesman and Jiaxing Qiu and C. Bayan Bruss and Nam Nguyen and Tom Hartvigsen", "abstract": "Recent works propose complex multi-modal models that handle both time series and language, ultimately claiming high performance on complex tasks like time series reasoning and cross-modal question answering. However, they skip foundational evaluations that such complex models should have mastered. So we ask a simple question: \\textit{How well can recent models describe structural properties of time series?} To answer this, we propose that successful models should be able to \\textit{recognize}, \\textit{differentiate}, and \\textit{generate} descriptions of univariate time series. We then create \\textbf{\\benchmark}, a benchmark to assess these novel tasks, that comprises \\textbf{five datasets} reformatted across \\textbf{three modalities}. In evaluating \\textbf{17 state-of-the-art models}, we find that (1) surprisingly, dedicated time series-language models fall short, despite being designed for similar tasks, (2) vision language models are quite capable, (3) language only methods perform worst, despite many lauding their potential, and (4) all approaches are clearly fragile to a range of real world robustness tests, indicating directions for future work. Together, our findings critique prior works' claims and provide avenues for advancing multi-modal time series modeling.", "link": "http://arxiv.org/abs/2509.05215v3", "date": "2026-04-10", "relevancy": 2.2397, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5663}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5663}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.528}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BEDTime%3A%20A%20Unified%20Benchmark%20for%20Automatically%20Describing%20Time%20Series&body=Title%3A%20BEDTime%3A%20A%20Unified%20Benchmark%20for%20Automatically%20Describing%20Time%20Series%0AAuthor%3A%20Medhasweta%20Sen%20and%20Zachary%20Gottesman%20and%20Jiaxing%20Qiu%20and%20C.%20Bayan%20Bruss%20and%20Nam%20Nguyen%20and%20Tom%20Hartvigsen%0AAbstract%3A%20Recent%20works%20propose%20complex%20multi-modal%20models%20that%20handle%20both%20time%20series%20and%20language%2C%20ultimately%20claiming%20high%20performance%20on%20complex%20tasks%20like%20time%20series%20reasoning%20and%20cross-modal%20question%20answering.%20However%2C%20they%20skip%20foundational%20evaluations%20that%20such%20complex%20models%20should%20have%20mastered.%20So%20we%20ask%20a%20simple%20question%3A%20%5Ctextit%7BHow%20well%20can%20recent%20models%20describe%20structural%20properties%20of%20time%20series%3F%7D%20To%20answer%20this%2C%20we%20propose%20that%20successful%20models%20should%20be%20able%20to%20%5Ctextit%7Brecognize%7D%2C%20%5Ctextit%7Bdifferentiate%7D%2C%20and%20%5Ctextit%7Bgenerate%7D%20descriptions%20of%20univariate%20time%20series.%20We%20then%20create%20%5Ctextbf%7B%5Cbenchmark%7D%2C%20a%20benchmark%20to%20assess%20these%20novel%20tasks%2C%20that%20comprises%20%5Ctextbf%7Bfive%20datasets%7D%20reformatted%20across%20%5Ctextbf%7Bthree%20modalities%7D.%20In%20evaluating%20%5Ctextbf%7B17%20state-of-the-art%20models%7D%2C%20we%20find%20that%20%281%29%20surprisingly%2C%20dedicated%20time%20series-language%20models%20fall%20short%2C%20despite%20being%20designed%20for%20similar%20tasks%2C%20%282%29%20vision%20language%20models%20are%20quite%20capable%2C%20%283%29%20language%20only%20methods%20perform%20worst%2C%20despite%20many%20lauding%20their%20potential%2C%20and%20%284%29%20all%20approac {"title": "LLM-Rosetta: A Hub-and-Spoke Intermediate Representation for Cross-Provider LLM API Translation", "author": "Peng Ding", "abstract": "The rapid proliferation of Large Language Model (LLM) providers--each exposing proprietary API formats--has created a fragmented ecosystem where applications become tightly coupled to individual vendors. Switching or bridging providers requires $O(N^2)$ bilateral adapters, impeding portability and multi-provider architectures. We observe that despite substantial syntactic divergence, the major LLM APIs share a common semantic core: the practical challenge is the combinatorial surface of syntactic variations, not deep semantic incompatibility. Based on this finding, we present LLM-Rosetta, an open-source translation framework built on a hub-and-spoke Intermediate Representation (IR) that captures the shared semantic core--messages, content parts, tool calls, reasoning traces, and generation controls--in a 9-type content model and 10-type stream event schema. A modular Ops-composition converter architecture enables each API standard to be added independently. LLM-Rosetta supports bidirectional conversion (provider-to-IR-to-provider) for both request and response payloads, including chunk-level streaming with stateful context management. We implement converters for four API standards (OpenAI Chat Completions, OpenAI Responses, Anthropic Messages, and Google GenAI), covering the vast majority of commercial providers. Empirical evaluation demonstrates lossless round-trip fidelity, correct streaming behavior, and sub-100 microsecond conversion overhead--competitive with LiteLLM's single-pass approach while providing bidirectionality and provider neutrality. LLM-Rosetta passes the Open Responses compliance suite and is deployed in production at Argonne National Laboratory. Code is available at https://github.com/Oaklight/llm-rosetta.", "link": "http://arxiv.org/abs/2604.09360v1", "date": "2026-04-10", "relevancy": 2.2313, "topK": {"title": "SatQNet: Satellite-assisted Quantum Network Entanglement Routing Using Directed Line Graph Neural Networks", "author": "Tobias Meuser and Jannis Weil and Aninda Lahiri and Marius Paraschiv", "abstract": "Quantum networks are expected to become a key enabler for interconnecting quantum devices. In contrast to classical communication networks, however, information transfer in quantum networks is usually restricted to short distances due to physical constraints of entanglement distribution. Satellites can extend entanglement distribution over long distances, but routing in such networks is challenging because satellite motion and stochastic link generation create a highly dynamic quantum topology. Existing routing methods often rely on global topology information that quickly becomes outdated due to delays in the classical control plane, while decentralized methods typically act on incomplete local information. We propose SatQNet, a reinforcement learning approach for entanglement routing in satellite-assisted quantum networks that can be decentralized at runtime. Its key innovation is an edge-centric directed line graph neural network that performs local message passing on directed edge embeddings, enabling it to better capture link properties in high-degree and time-varying topologies. By exchanging messages with neighboring repeaters, SatQNet learns a local graph representation at runtime that supports agents in establishing high-fidelity end-to-end entanglements. Trained on random graphs, SatQNet outperforms heuristic and learning-based approaches across diverse settings, including a real-world European backbone topology, and generalizes to unseen topologies without retraining.", "link": "http://arxiv.org/abs/2604.09306v1", "date": "2026-04-10", "relevancy": 2.2291, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4521}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4469}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4384}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SatQNet%3A%20Satellite-assisted%20Quantum%20Network%20Entanglement%20Routing%20Using%20Directed%20Line%20Graph%20Neural%20Networks&body=Title%3A%20SatQNet%3A%20Satellite-assisted%20Quantum%20Network%20Entanglement%20Routing%20Using%20Directed%20Line%20Graph%20Neural%20Networks%0AAuthor%3A%20Tobias%20Meuser%20and%20Jannis%20Weil%20and%20Aninda%20Lahiri%20and%20Marius%20Paraschiv%0AAbstract%3A%20Quantum%20networks%20are%20expected%20to%20become%20a%20key%20enabler%20for%20interconnecting%20quantum%20devices.%20In%20contrast%20to%20classical%20communication%20networks%2C%20however%2C%20information%20transfer%20in%20quantum%20networks%20is%20usually%20restricted%20to%20short%20distances%20due%20to%20physical%20constraints%20of%20entanglement%20distribution.%20Satellites%20can%20extend%20entanglement%20distribution%20over%20long%20distances%2C%20but%20routing%20in%20such%20networks%20is%20challenging%20because%20satellite%20motion%20and%20stochastic%20link%20generation%20create%20a%20highly%20dynamic%20quantum%20topology.%20Existing%20routing%20methods%20often%20rely%20on%20global%20topology%20information%20that%20quickly%20becomes%20outdated%20due%20to%20delays%20in%20the%20classical%20control%20plane%2C%20while%20decentralized%20methods%20typically%20act%20on%20incomplete%20local%20information.%20We%20propose%20SatQNet%2C%20a%20reinforcement%20learning%20approach%20for%20entanglement%20routing%20in%20satellite-assisted%20quantum%20networks%20that%20can%20be%20decentralized%20at%20runtime.%20Its%20key%20innovation%20is%20an%20edge-centric%20directed%20line%20graph%20neural%20network%20that%20performs%20local%20message%20passing%20on%20directed%20edge%20embeddings%2C%20enabling%20it%20to%20better%20capture%20link%20properties%20in%20high-degree%20and%20time-varying%20topologies.%20By%20exchanging%20messages%20with%20neighboring%20repeaters%2C%20SatQNet%20learns%20a%20local%20graph%20representation%20at%20runtime%20that%20supports%20agents%20in%20establishing%20high-fidelity%20end-to-end%20entanglements.%20Trained%20on%20random%20graphs%2C%20SatQNet%20outperforms%20heuristic%20and%20learning-based%20approaches%20across%20diverse%20settings%2C%20including%20a%20real-world%20European%20backbone%20topology%2C%20and%20generalizes%20to%20unseen%20topologies%20without%20retraining.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09306v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSatQNet%253A%2520Satellite-assisted%2520Quantum%2520Network%2520Entanglement%2520Routing%2520Using%2520Directed%2520Line%2520Graph%2520Neural%2520Networks%26entry.906535625%3DTobias%2520Meuser%2520and%2520Jannis%2520Weil%2520and%2520Aninda%2520Lahiri%2520and%2520Marius%2520Paraschiv%26entry.1292438233%3DQuantum%2520networks%2520are%2520expected%2520to%2520become%2520a%2520key%2520enabler%2520for%2520interconnecting%2520quantum%2520devices.%2520In%2520contrast%2520to%2520classical%2520communication%2520networks%252C%2520however%252C%2520information%2520transfer%2520in%2520quantum%2520networks%2520is%2520usually%2520restricted%2520to%2520short%2520distances%2520due%2520to%2520physical%2520constraints%2520of%2520entanglement%2520distribution.%2520Satellites%2520can%2520extend%2520entanglement%2520distribution%2520over%2520long%2520distances%252C%2520but%2520routing%2520in%2520such%2520networks%2520is%2520challenging%2520because%2520satellite%2520motion%2520and%2520stochastic%2520link%2520generation%2520create%2520a%2520highly%2520dynamic%2520quantum%2520topology.%2520Existing%2520routing%2520methods%2520often%2520rely%2520on%2520global%25 {"title": "CaRLi-V: Camera-RADAR-LiDAR Point-Wise 3D Velocity Estimation", "author": "Landson Guo and Andres M. Diaz Aguilar and William Talbot and Turcan Tuna and Marco Hutter and Cesar Cadena", "abstract": "Accurate point-wise velocity estimation in 3D is crucial for robot interaction with non-rigid dynamic agents, enabling robust performance in path planning, collision avoidance, and object manipulation in dynamic environments. To this end, this paper proposes a novel RADAR, LiDAR, and camera fusion pipeline for point-wise 3D velocity estimation named CaRLi-V. This pipeline leverages raw RADAR measurements to create a novel RADAR representation, the velocity cube, which densely encodes RADAR radial velocities. By combining the velocity cube for radial velocity extraction, optical flow for tangential velocity estimation, and LiDAR for point-wise range measurements through a closed-form solution, our approach can produce 3D velocity estimates for a dense array of points. Developed as an open-source ROS2 package, CaRLi-V has been field-tested on a custom dataset and achieves low velocity error metrics relative to ground truth while outperforming state-of-the-art scene flow methods.", "link": "http://arxiv.org/abs/2511.01383v2", "date": "2026-04-10", "relevancy": 2.2278, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5787}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.559}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5463}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CaRLi-V%3A%20Camera-RADAR-LiDAR%20Point-Wise%203D%20Velocity%20Estimation&body=Title%3A%20CaRLi-V%3A%20Camera-RADAR-LiDAR%20Point-Wise%203D%20Velocity%20Estimation%0AAuthor%3A%20Landson%20Guo%20and%20Andres%20M.%20Diaz%20Aguilar%20and%20William%20Talbot%20and%20Turcan%20Tuna%20and%20Marco%20Hutter%20and%20Cesar%20Cadena%0AAbstract%3A%20Accurate%20point-wise%20velocity%20estimation%20in%203D%20is%20crucial%20for%20robot%20interaction%20with%20non-rigid%20dynamic%20agents%2C%20enabling%20robust%20performance%20in%20path%20planning%2C%20collision%20avoidance%2C%20and%20object%20manipulation%20in%20dynamic%20environments.%20To%20this%20end%2C%20this%20paper%20proposes%20a%20novel%20RADAR%2C%20LiDAR%2C%20and%20camera%20fusion%20pipeline%20for%20point-wise%203D%20velocity%20estimation%20named%20CaRLi-V.%20This%20pipeline%20leverages%20raw%20RADAR%20measurements%20to%20create%20a%20novel%20RADAR%20representation%2C%20the%20velocity%20cube%2C%20which%20densely%20encodes%20RADAR%20radial%20velocities.%20By%20combining%20the%20velocity%20cube%20for%20radial%20velocity%20extraction%2C%20optical%20flow%20for%20tangential%20velocity%20estimation%2C%20and%20LiDAR%20for%20point-wise%20range%20measurements%20through%20a%20closed-form%20solution%2C%20our%20approach%20can%20produce%203D%20velocity%20estimates%20for%20a%20dense%20array%20of%20points.%20Developed%20as%20an%20open-source%20ROS2%20package%2C%20CaRLi-V%20has%20been%20field-tested%20on%20a%20custom%20dataset%20and%20achieves%20low%20velocity%20error%20metrics%20relative%20to%20ground%20truth%20while%20outperforming%20state-of-the-art%20scene%20flow%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2511.01383v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCaRLi-V%253A%2520Camera-RADAR-LiDAR%2520Point-Wise%25203D%2520Velocity%2520Estimation%26entry.906535625%3DLandson%2520Guo%2520and%2520Andres%2520M.%2520Diaz%2520Aguilar%2520and%2520William%2520Talbot%2520and%2520Turcan%2520Tuna%2520and%2520Marco%2520Hutter%2520and%2520Cesar%2520Cadena%26entry.1292438233%3DAccurate%2520point-wise%2520velocity%2520estimation%2520in%25203D%2520is%2520crucial%2520for%2520robot%2520interaction%2520with%2520non-rigid%2520dynamic%2520agents%252C%2520enabling%2520robust%2520performance%2520in%2520path%2520planning%252C%2520collision%2520avoidance%252C%2520and%2520object%2520manipulation%2520in%2520dynamic%2520environments.%2520To%2520this%2520end%252C%2520this%2520paper%2520proposes%2520a%2520novel%2520RADAR%252C%2520LiDAR%252C%2520and%2520camera%2520fusion%2520pipeline%2520for%2520point-wise%25203D%2520velocity%2520estimation%2520named%2520CaRLi-V.%2520This%2520pipeline%2520leverages%2520raw%2520RADAR%2520measurements%2520to%2520create%2520a%2520novel%2520RADAR%2520representation%252C%2520the%2520velocity%2520cube%252C%2520which%2520densely%2520encodes%2520RADAR%2520radial%2520velocities.%2520By%2520combining%2520the%2520velocity%2520cube%2520for%2520radial%2520velocity%2520extraction%252C%2520optical%2520flow%2520for%2520tangential%2520velocity%2520estimation%252C%2520and%2520LiDAR%2520for%2520point-wise%2520range%2520measurements%2520through%2520a%2520closed-form%2520solution%252C%2520our%2520approach%2520can%2520produce%25203D%2520velocity%2520estimates%2520for%2520a%2520dense%2520array%2520of%2520points.%2520Developed%2520as%2520an%2520open-source%2520ROS2%2520package%252C%2520CaRLi-V%2520has%2520been%2520field-tested%2520on%2520a%2520custom%2520dataset%2520and%2520achieves%2520low%2520velocity%2520error%2520metrics%2520relative%2520to%2520ground%2520truth%2520while%2520outperforming%2520state-of-the-art%2520scene%2520flow%2520methods.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.01383v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=CaRLi-V%3A%20Camera-RADAR-LiDAR%20Point-Wise%203D%20Velocity%20Estimation&entry.906535625=Landson%20Guo%20and%20Andres%20M.%20Diaz%20Aguilar%20and%20William%20Talbot%20and%20Turcan%20Tuna%20and%20Marco%20Hutter%20and%20Cesar%20Cadena&entry.1292438233=Accurat {"title": "From Frames to Events: Rethinking Evaluation in Human-Centric Video Anomaly Detection", "author": "Narges Rashvand and Shanle Yao and Armin Danesh Pazho and Babak Rahimi Ardabili and Hamed Tabkhi", "abstract": "Pose-based Video Anomaly Detection (VAD) has gained significant attention for its privacy-preserving nature and robustness to environmental variations. However, traditional frame-level evaluations treat video as a collection of isolated frames, fundamentally misaligned with how anomalies manifest and are acted upon in the real world. In operational surveillance systems, what matters is not the flagging of individual frames, but the reliable detection, localization, and reporting of a coherent anomalous event, a contiguous temporal episode with an identifiable onset and duration. Frame-level metrics are blind to this distinction, and as a result, they systematically overestimate model performance for any deployment that requires actionable, event-level alerts. In this work, we propose a shift toward an event-centric perspective in VAD. We first audit widely used VAD benchmarks, including SHT[19], CHAD[6], NWPUC[4], and HuVAD[25], to characterize their event structure. We then introduce two strategies for temporal event localization: a score-refinement pipeline with hierarchical Gaussian smoothing and adaptive binarization, and an end-to-end Dual-Branch Model that directly generates event-level detections. Finally, we establish the first event-based evaluation standard for VAD by adapting Temporal Action Localization metrics, including tIoU-based event matching and multi-threshold F1 evaluation. Our results quantify a substantial performance gap: while all SoTA models achieve frame-level AUC-ROC exceeding 52% on the NWPUC[4], their event-level localization precision falls below 10% even at a minimal tIoU=0.2, with an average event-level F1 of only 0.11 across all thresholds. The code base for this work is available at https://github.com/TeCSAR-UNCC/EventCentric-VAD.", "link": "http://arxiv.org/abs/2604.09327v1", "date": "2026-04-10", "relevancy": 2.2259, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.573}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5467}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5394}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Frames%20to%20Events%3A%20Rethinking%20Evaluation%20in%20Human-Centric%20Video%20Anomaly%20Detection&body=Title%3A%20From%20Frames%20to%20Events%3A%20Rethinking%20Evaluation%20in%20Human-Centric%20Video%20Anomaly%20Detection%0AAuthor%3A%20Narges%20Rashvand%20and%20Shanle%20Yao%20and%20Armin%20Danesh%20Pazho%20and%20Babak%20Rahimi%20Ardabili%20and%20Hamed%20Tabkhi%0AAbstract%3A%20Pose-based%20Video%20Anomaly%20Detection%20%28VAD%29%20has%20gained%20significant%20attention%20for%20its%20privacy-preserving%20nature%20and%20robustness%20to%20environmental%20variations.%20However%2C%20traditional%20frame-level%20evaluations%20treat%20video%20as%20a%20collection%20of%20isolated%20frames%2C%20fundamentally%20misaligned%20with%20how%20anomalies%20manifest%20and%20are%20acted%20upon%20in%20the%20real%20world.%20In%20operational%20surveillance%20systems%2C%20what%20matters%20is%20not%20the%20flagging%20of%20individual%20frames%2C%20but%20the%20reliable%20detection%2C%20localization%2C%20and%20reporting%20of%20a%20coherent%20anomalous%20event%2C%20a%20contiguous%20temporal%20episode%20with%20an%20identifiable%20onset%20and%20duration.%20Frame-level%20metrics%20are%20blind%20to%20this%20distinction%2C%20and%20as%20a%20result%2C%20they%20systematically%20overestimate%20model%20performance%20for%20any%20deployment%20that%20requires%20actionable%2C%20event-level%20alerts.%20In%20this%20work%2C%20we%20propose%20a%20shift%20toward%20an%20event-centric%20perspective%20in%20VAD.%20We%20first%20audit%20widely%20used%20VAD%20benchmarks%2C%20including%20SHT%5B19%5D%2C%20CHAD%5B6%5D%2C%20NWPUC%5B4%5D%2C%20and%20HuVAD%5B25%5D%2C%20to%20characterize%20their%20event%20structure.%20We%20then%20introduce%20two%20strategies%20for%20temporal%20event%20localization%3A%20a%20score-refinement%20pipeline%20with%20hierarchical%20Gaussian%20smoothing%20and%20adaptive%20binarization%2C%20and%20an%20end-to-end%20Dual-Branch%20Model%20that%20directly%20generates%20event-level%20detections.%20Finally%2C%20we%20establish%20the%20first%20event-based%20evaluation%20standard%20for%20VAD%20by%20adapting%20Temporal%20Action%20Localization%20metrics%2C%20including%20tIoU-based%20event%20matching%20and%20multi-threshold%20F1%20evaluation.%20Our%20results%20quantify%20a%20substantial%20performance%20gap%3A%20while%20all%20SoTA%20models%20achieve%20frame-level%20AUC-ROC%20exceeding%2052%25%20on%20the%20NWPUC%5B4%5D%2C%20their%20event-level%20localization%20precision%20falls%20below%2010%25%20even%20at%20a%20minimal%20tIoU%3D0.2%2C%20with%20an%20average%20event-level%20F1%20of%20only%200.11%20across%20all%20thresholds.%20The%20code%20base%20for%20this%20work%20is%20available%20at%20https%3A//github.com/TeCSAR-UNCC/EventCentric-VAD.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09327v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Frames%2520to%2520Events%253A%2520Rethinking%2520Evaluation%2520in%2520Human-Centric%2520Video%2520Anomaly%2520Detection%26entry.906535625%3DNarges%2520Rashvand%2520and%2520Shanle%2520Yao%2520and%2520Armin%2520Danesh%2520Pazho%2520and%2520Babak%2520Rahimi%2520Ardabili%2520and%2520Hamed%2520Tabkhi%26entry.1292438233%3DPose-based%2520Video%2520Anomaly%2520Detection%2520%2528VAD%25 {"title": "ClusterMark: Towards Robust Watermarking for Autoregressive Image Generators with Visual Token Clustering", "author": "Denis Lukovnikov and Andreas M\u00fcller and Erwin Quiring and Asja Fischer", "abstract": "In-generation watermarking for latent diffusion models has recently shown high robustness in marking generated images for easier detection and attribution. However, its application to autoregressive (AR) image models is underexplored. Autoregressive models generate images by autoregressively predicting a sequence of visual tokens that are then decoded into pixels using a VQ-VAE decoder. Inspired by KGW watermarking for large language models, we examine token-level watermarking schemes that bias the next-token prediction based on prior tokens. We find that a direct transfer of these schemes works in principle, but the detectability of the watermarks decreases considerably under common image perturbations. As a remedy, we propose a watermarking approach based on visual token clustering, which assigns similar tokens to the same set (red or green). We investigate token clustering in a training-free setting, as well as in combination with a more accurate fine-tuned token or cluster predictor. Overall, our experiments show that cluster-based watermarks greatly improve robustness against perturbations and regeneration attacks while preserving image quality, outperforming a set of baselines and concurrent works. Moreover, our methods offer fast verification runtime, comparable to lightweight post-hoc watermarking techniques.", "link": "http://arxiv.org/abs/2508.06656v2", "date": "2026-04-10", "relevancy": 2.2022, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5612}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5447}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5385}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ClusterMark%3A%20Towards%20Robust%20Watermarking%20for%20Autoregressive%20Image%20Generators%20with%20Visual%20Token%20Clustering&body=Title%3A%20ClusterMark%3A%20Towards%20Robust%20Watermarking%20for%20Autoregressive%20Image%20Generators%20with%20Visual%20Token%20Clustering%0AAuthor%3A%20Denis%20Lukovnikov%20and%20Andreas%20M%C3%BCller%20and%20Erwin%20Quiring%20and%20Asja%20Fischer%0AAbstract%3A%20In-generation%20watermarking%20for%20latent%20diffusion%20models%20has%20recently%20shown%20high%20robustness%20in%20marking%20generated%20images%20for%20easier%20detection%20and%20attribution.%20However%2C%20its%20application%20to%20autoregressive%20%28AR%29%20image%20models%20is%20underexplored.%20Autoregressive%20models%20generate%20images%20by%20autoregressively%20predicting%20a%20sequence%20of%20visual%20tokens%20that%20are%20then%20decoded%20into%20pixels%20using%20a%20VQ-VAE%20decoder.%20Inspired%20by%20KGW%20watermarking%20for%20large%20language%20models%2C%20we%20examine%20token-level%20watermarking%20schemes%20that%20bias%20the%20next-token%20prediction%20based%20on%20prior%20tokens.%20We%20find%20that%20a%20direct%20transfer%20of%20these%20schemes%20works%20in%20principle%2C%20but%20the%20detectability%20of%20the%20watermarks%20decreases%20considerably%20under%20common%20image%20perturbations.%20As%20a%20remedy%2C%20we%20propose%20a%20watermarking%20approach%20based%20on%20visual%20token%20clustering%2C%20which%20assigns%20similar%20tokens%20to%20the%20same%20set%20%28red%20or%20green%29.%20We%20investigate%20token%20clustering%20in%20a%20training-free%20setting%2C%20as%20well%20as%20in%20combination%20with%20a%20more%20accurate%20fine-tuned%20token%20or%20cluster%20predictor.%20Overall%2C%20our%20experiments%20show%20that%20cluster-based%20watermarks%20greatly%20improve%20robustness%20against%20perturbations%20and%20regeneration%20attacks%20while%20preserving%20image%20quality%2C%20outperforming%20a%20set%20of%20baselines%20and%20concurrent%20works.%20Moreover%2C%20our%20methods%20offer%20fast%20verification%20runtime%2C%20comparable%20to%20lightweight%20post-hoc%20watermarking%20techniques.%0ALink%3A%20http%3A//arxiv.org/abs/2508.06656v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DClusterMark%253A%2520Towards%2520Robust%2520Watermarking%2520for%2520Autoregressive%2520Image%2520Generators%2520with%2520Visual%2520Token%2520Clustering%26entry.906535625%3DDenis%2520Lukovnikov%2520and%2520Andreas%2520M%25C3%25BCller%2520and%2520Erwin%2520Quiring%2520and%2520Asja%2520Fischer%26entry.1292438233%3DIn-generation%2520watermarking%2520for%2520latent%2520diffusion%2520models%2520has%2520recently%2520shown%2520high%2520robustness%2520in%2520marking%2520generated%2520images%2520for%2520easier%2520detection%2520and%2520attribution.%2520However%252C%2520its%2520application%2520to%2520autoregressive%2520%2528AR%2529%2520image%2520models%2520is%2520underexplored.%2520Autoregressive%2520models%2520generate%2520images%2520by%2520autoregressively%2520predicting%2520a%2520sequence%2520of%2520visual%2520tokens%2520that%2520are%2520then%2520decoded%2520into%2520pixels%2520using%2520a%2520VQ-VAE%2520decoder.%2520Inspired%2520by%2520KGW%2520watermarking%2520for%2520large%2520language%2520models%252C%2520we%2520examine%2520token-level%2520watermarking%2520schemes%2520that%2520bias%2520the%2520next-token%2520prediction%2520based%2520on%2520prior%2520tokens.%2520We%2520find%2520that%2520a%2520direct%2520transfer%2520of%2520these%2520schemes%2520works%2520in%2520principle%252C%2520but%2520the%2520detectability%2520of%2520the%2520watermarks%2520decreases%2520considerably%2520under%2520common%2520image%2520perturbations.%2520As%2520a%2520remedy%252C%2520we%2520propose%2520a%2520watermarking%2520approach%2520based%2520on%2520visual%2520token%2520clustering%252C%2520which%2520assigns%2520similar%2520tokens%2520to%2520the%2520same%2520set%2520%2528red%2520or%2520green%2529.%2520We%2520investigate%2520token%2520clustering%2520in%2520a%2520training-free%2520setting%252C%2520as%2520well%2520as%2520in%2520combination%2520with%2520a%2520more%2520accurate%2520fine-tuned%2520token%2520or%2520cluster%2520predictor.%2520Overall%252C%2520our%2520experiments%2520show%2520that%2520cluster-based%2520watermarks%2520greatly%2520improve%2520robustness%2520against%2520perturbations%2520and%2520regeneration%2520attacks%2520while%2520preserving%2520image%2520quality%252C%2520outperforming%2520a%2520set%2520of%2520baselines%2520and%2520concurrent%2520works.%2520Moreover%252C%2520our%2520methods%2520offer%2520fast%2520verification%2520runtime%252C%2520comparable%2520to%2520lightweight%2520post-hoc%2520watermarking%2520techniques.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2508.06656v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ClusterMark%3A%20Towards%20Robust%20Watermarking%20for%20Autoregressive%20Image%20Generators%20with%20Visual%20Token%20Clustering&entry.906535625=Denis%20Lukovnikov%20and%20Andreas%20M%C3%BCller%20and%20Erwin%20Quiring%20and%20Asja%20Fischer&entry.1292438233=In-generation%20watermarking%20for%20latent%20diffusion%20models%20has%20recently%20shown%20high%20robustness%20in%20marking%20generated%20images%20for%20easier%20detection%20and%20attribution.%20However%2C%20its%20application%20to%20autoregressive%20%28AR%29%20image%20models%20is%20underexplored.%20Autoregressive%20models%20generate%20images%20by%20autoregressively%20predicting%20a%20sequence%20of%20visual%20tokens%20that%20are%20then%20decoded%20into%20pixels%20using%20a%20VQ-VAE%20decoder.%20Inspired%20by%20KGW%20watermarking%20for%20large%20language%20models%2C%20we%20examine%20token-level%20watermarking%20schemes%20that%20bias%20the%20next-token%20prediction%20based%20on%20prior%20tokens.%20We%20find%20that%20a%20direct%20transfer%20of%20these%20schemes%20works%20in%20principle%2C%20but%20the%20detectability%20of%20the%20watermarks%20decreases%20considerably%20under%20common%20image%20perturbations.%20As%20a%20remedy%2C%20we%20propose%20a%20watermarking%20approach%20based%20on%20visual%20token%20clustering%2C%20which%20assigns%20similar%20tokens%20to%20the%20same%20set%20%28red%20or%20green%29.%20We%20investigate%20token%20clustering%20in%20a%20training-free%20setting%2C%20as%20well%20as%20in%20combination%20with%20a%20more%20accurate%20fine-tuned%20token%20or%20cluster%20predictor.%20Overall%2C%20our%20experiments%20show%20that%20cluster-based%20watermarks%20greatly%20improve%20robustness%20against%20perturbations%20and%20regeneration%20attacks%20while%20preserving%20image%20quality%2C%20outperforming%20a%20set%20of%20baselines%20and%20concurrent%20works.%20Moreover%2C%20our%20methods%20offer%20fast%20verification%20runtime%2C%20comparable%20to%20lightweight%20post-hoc%20watermarking%20techniques.&entry.1838667208=http%3A//arxiv.org/abs/2508.06656v2&entry.124074799=Read"},
{"title": "Online Intention Prediction via Control-Informed Learning", "author": "Tianyu Zhou and Zihao Liang and Zehui Lu and Shaoshuai Mou", "abstract": "This paper presents an online intention prediction framework for estimating the goal state of autonomous systems in real time, even when intention is time-varying, and system dynamics or objectives include unknown parameters. The problem is formulated as an inverse optimal control / inverse reinforcement learning task, with the intention treated as a parameter in the objective. A shifting horizon strategy discounts outdated information, while online control-informed learning enables efficient gradient computation and online parameter updates. Simulations under varying noise levels and hardware experiments on a quadrotor drone demonstrate that the proposed approach achieves accurate, adaptive intention prediction in complex environments.", "link": "http://arxiv.org/abs/2604.09303v1", "date": "2026-04-10", "relevancy": 2.1923, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5781}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5781}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5061}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Online%20Intention%20Prediction%20via%20Control-Informed%20Learning&body=Title%3A%20Online%20Intention%20Prediction%20via%20Control-Informed%20Learning%0AAuthor%3A%20Tianyu%20Zhou%20and%20Zihao%20Liang%20and%20Zehui%20Lu%20and%20Shaoshuai%20Mou%0AAbstract%3A%20This%20paper%20presents%20an%20online%20intention%20prediction%20framework%20for%20estimating%20the%20goal%20state%20of%20autonomous%20systems%20in%20real%

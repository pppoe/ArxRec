{"title": "Screen, Cache, and Match: A Training-Free Causality-Consistent Reference Frame Framework for Human Animation", "author": "Jianan Wang and Nailei Hei and Li He and Huanzhen Wang and Aoxing Li and Yingkai Zhao and Yuxuan Lin and Haofen Wang and Chunyang Wang and Yan Wang and Wenqiang Zhang", "abstract": "Human animation aims to generate temporally coherent and visually consistent videos over long sequences, yet modeling long-range dependencies while preserving frame quality remains challenging. Inspired by the human ability to leverage past observations for interpreting ongoing actions, we propose FrameCache, a training-free, causality-consistent reference frame framework. FrameCache explicitly converts historical generation results into causal guidance through two complementary mechanisms. First, at the reference level, a novel Screen-Cache-Match (SCM) strategy constructs a dynamic, high-quality reference memory, ensuring motion-consistent appearance guidance to reduce identity drift. Second, at the generative level, a Trajectory-Aware Autoregressive Generation (TAAG) mechanism aligns denoising trajectories across adjacent video chunks. This is achieved through an overlap-aware latent propagation and a dual-domain fusion strategy that seamlessly blends low-frequency structural layouts with high-frequency textural details. Extensive experiments on standard benchmarks demonstrate that FrameCache consistently improves temporal coherence and visual stability while integrating seamlessly with diverse diffusion baselines. Code will be made publicly available.", "link": "http://arxiv.org/abs/2601.22160v2", "date": "2026-04-10", "relevancy": 2.4533, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6329}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.6004}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5969}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Screen%2C%20Cache%2C%20and%20Match%3A%20A%20Training-Free%20Causality-Consistent%20Reference%20Frame%20Framework%20for%20Human%20Animation&body=Title%3A%20Screen%2C%20Cache%2C%20and%20Match%3A%20A%20Training-Free%20Causality-Consistent%20Reference%20Frame%20Framework%20for%20Human%20Animation%0AAuthor%3A%20Jianan%20Wang%20and%20Nailei%20Hei%20and%20Li%20He%20and%20Huanzhen%20Wang%20and%20Aoxing%20Li%20and%20Yingkai%20Zhao%20and%20Yuxuan%20Lin%20and%20Haofen%20Wang%20and%20Chunyang%20Wang%20and%20Yan%20Wang%20and%20Wenqiang%20Zhang%0AAbstract%3A%20Human%20animation%20aims%20to%20generate%20temporally%20coherent%20and%20visually%20consistent%20videos%20over%20long%20sequences%2C%20yet%20modeling%20long-range%20dependencies%20while%20preserving%20frame%20quality%20remains%20challenging.%20Inspired%20by%20the%20human%20ability%20to%20leverage%20past%20observations%20for%20interpreting%20ongoing%20actions%2C%20we%20propose%20FrameCache%2C%20a%20training-free%2C%20causality-consistent%20reference%20frame%20framework.%20FrameCache%20explicitly%20converts%20historical%20generation%20results%20into%20causal%20guidance%20through%20two%20complementary%20mechanisms.%20First%2C%20at%20the%20reference%20level%2C%20a%20novel%20Screen-Cache-Match%20%28SCM%29%20strategy%20constructs%20a%20dynamic%2C%20high-quality%20reference%20memory%2C%20ensuring%20motion-consistent%20appearance%20guidance%20to%20reduce%20identity%20drift.%20Second%2C%20at%20the%20generative%20level%2C%20a%20Trajectory-Aware%20Autoregressive%20Generation%20%28TAAG%29%20mechanism%20aligns%20denoising%20trajectories%20across%20adjacent%20video%20chunks.%20This%20is%20achieved%20through%20an%20overlap-aware%20latent%20propagation%20and%20a%20dual-domain%20fusion%20strategy%20that%20seamlessly%20blends%20low-frequ {"title": "Efficient Spatial-Temporal Focal Adapter with SSM for Temporal Action Detection", "author": "Yicheng Qiu and Keiji Yanai", "abstract": "Temporal human action detection aims to identify and localize action segments within untrimmed videos, serving as a pivotal task in video understanding. Despite the progress achieved by prior architectures like CNN and Transformer models, these continue to struggle with feature redundancy and degraded global dependency modeling capabilities when applied to long video sequences. These limitations severely constrain their scalability in real-world video analysis. State Space Models (SSMs) offer a promising alternative with linear long-term modeling and robust global temporal reasoning capabilities. Rethinking the application of SSMs in temporal modeling, this research constructs a novel framework for video human action detection. Specifically, we introduce the Efficient Spatial-Temporal Focal (ESTF) Adapter into the pre-trained layers. This module integrates the advantages of our proposed Temporal Boundary-aware SSM(TB-SSM) for temporal feature modeling with efficient processing of spatial features. We perform comprehensive and quantitative analyses across multiple benchmarks, comparing our proposed method against previous SSM-based and other structural methods. Extensive experiments demonstrate that our improved strategy significantly enhances both localization performance and robustness, validating the effectiveness of our proposed method.", "link": "http://arxiv.org/abs/2604.09164v1", "date": "2026-04-10", "relevancy": 2.4332, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.6652}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5735}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5529}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Efficient%20Spatial-Temporal%20Focal%20Adapter%20with%20SSM%20for%20Temporal%20Action%20Detection&body=Title%3A%20Efficient%20Spatial-Temporal%20Focal%20Adapter%20with%20SSM%20for%20Temporal%20Action%20Detection%0AAuthor%3A%20Yicheng%20Qiu%20and%20Keiji%20Yanai%0AAbstract%3A%20Temporal%20human%20action%20detection%20aims%20to%20identify%20and%20localize%20action%20segments%20within%20untrimmed%20videos%2C%20serving%20as%20a%20pivotal%20task%20in%20video%20understanding.%20Despite%20the%20progress%20achieved%20by%20prior%20architectures%20like%20CNN%20and%20Transformer%20models%2C%20these%20continue%20to%20struggle%20with%20feature%20redundancy%20and%20degraded%20global%20dependency%20modeling%20capabilities%20when%20applied%20to%20long%20video%20sequences.%20These%20limitations%20severely%20constrain%20their%20scalability%20in%20real-world%20video%20analysis.%20State%20Space%20Models%20%28SSMs%29%20offer%20a%20promising%20alternative%20with%20linear%20long-term%20modeling%20and%20robust%20global%20temporal%20reasoning%20capabilities.%20Rethinking%20the%20application%20of%20SSMs%20in%20temporal%20modeling%2C%20this%20research%20constructs%20a%20novel%20framework%20for%20video%20human%20action%20detection.%20Specifically%2C%20we%20introduce%20the%20Efficient%20Spatial-Temporal%20Focal%20%28ESTF%29%20Adapter%20into%20the%20pre-trained%20layers.%20This%20module%20integrates%20the%20advantages%20of%20our%20proposed%20Temporal%20Boundary-aware%20SSM%28TB-SSM%29%20for%20temporal%20feature%20modeling%20with%20efficient%20processing%20of%20spatial%20features.%20We%20perform%20comprehensive%20and%20quantitative%20analyses%20across%20multiple%20benchmarks%2C%20comparing%20our%20proposed%20method%20against%20previous%20SSM-based%20and%20other%20structural%20methods.%20Extensive%20experiments%20demonstrate%20that%20 {"title": "PhysInOne: Visual Physics Learning and Reasoning in One Suite", "author": "Siyuan Zhou and Hejun Wang and Hu Cheng and Jinxi Li and Dongsheng Wang and Junwei Jiang and Yixiao Jin and Jiayue Huang and Shiwei Mao and Shangjia Liu and Yafei Yang and Hongkang Song and Shenxing Wei and Zihui Zhang and Peng Huang and Shijie Liu and Zhengli Hao and Hao Li and Yitian Li and Wenqi Zhou and Zhihan Zhao and Zongqi He and Hongtao Wen and Shouwang Huang and Peng Yun and Bowen Cheng and Pok Kazaf Fu and Wai Kit Lai and Jiahao Chen and Kaiyuan Wang and Zhixuan Sun and Ziqi Li and Haochen Hu and Di Zhang and Chun Ho Yuen and Bing Wang and Zhihua Wang and Chuhang Zou and Bo Yang", "abstract": "We present PhysInOne, a large-scale synthetic dataset addressing the critical scarcity of physically-grounded training data for AI systems. Unlike existing datasets limited to merely hundreds or thousands of examples, PhysInOne provides 2 million videos across 153,810 dynamic 3D scenes, covering 71 basic physical phenomena in mechanics, optics, fluid dynamics, and magnetism. Distinct from previous works, our scenes feature multiobject interactions against complex backgrounds, with comprehensive ground-truth annotations including 3D geometry, semantics, dynamic motion, physical properties, and text descriptions. We demonstrate PhysInOne's efficacy across four emerging applications: physics-aware video generation, long-/short-term future frame prediction, physical property estimation, and motion transfer. Experiments show that fine-tuning foundation models on PhysInOne significantly enhances physical plausibility, while also exposing critical gaps in modeling complex physical dynamics and estimating intrinsic properties. As the largest dataset of its kind, orders of magnitude beyond prior works, PhysInOne establishes a new benchmark for advancing physics-grounded world models in generation, simulation, and embodied AI.", "link": "http://arxiv.org/abs/2604.09415v1", "date": "2026-04-10 {"title": "VAG: Dual-Stream Video-Action Generation for Embodied Data Synthesis", "author": "Xiaolei Lang and Yang Wang and Yukun Zhou and Chaojun Ni and Kerui Li and Jiagang Zhu and Tianze Liu and Jiajun Lv and Xingxing Zuo and Yun Ye and Guan Huang and Xiaofeng Wang and Zheng Zhu", "abstract": "Recent advances in robot foundation models trained on large-scale human teleoperation data have enabled robots to perform increasingly complex real-world tasks. However, scaling these systems remains difficult because collecting task-specific demonstrations is expensive and labor-intensive. Synthetic data, especially generated videos, offer a promising direction, but existing World Models (WMs) are not directly suitable for policy learning since they do not provide paired action trajectories. World-Action (WA) models partially address this by predicting actions with visual outputs, yet often lack strong video-action alignment, while two-stage pipelines that generate video first and then infer actions introduce inefficiency and error accumulation. To address these limitations, we propose VAG, a unified flow-matching-based dual-stream framework that jointly generates video and action under visual and language conditioning. By synchronizing denoising in both branches and using an adaptive 3D pooling mechanism to transfer compact global video context to the action branch, VAG improves cross-modal consistency during generation. Across both simulated and real-world settings, VAG produces aligned video-action pairs with competitive prediction quality, supports executable trajectory replay, and provides useful synthetic pretraining data that improves downstream policy generalization, indicating its potential as a practical world-action model for embodied data synthesis.", "link": "http://arxiv.org/abs/2604.09330v1", "date": "2026-04-10", "relevancy": 2.431, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0. 0action%20under%20visual%20and%20language%20conditioning.%20By%20synchronizing%20denoising%20in%20both%20branches%20and%20using%20an%20adaptive%203D%20pooling%20mechanism%20to%20transfer%20compact%20global%20video%20context%20to%20the%20action%20branch%2C%20VAG%20improves%20cross-modal%20consistency%20during%20generation.%20Across%20both%20simulated%20and%20real-world%20settings%2C%20VAG%20produces%20aligned%20video-action%20pairs%20with%20competitive%20prediction%20quality%2C%20supports%20executable%20trajectory%20replay%2C%20and%20provides%20useful%20synthetic%20pretraining%20data%20that%20improves%20downstream%20policy%20generalization%2C%20indicating%20its%20potential%20as%20a%20practical%20world-action%20model%20for%20embodied%20data%20synthesis.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09330v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVAG%253A%2520Dual-Stream%2520Video-Action%2520Generation%2520for%2520Embodied%2520Data%2520Synthesis%26entry.906535625%3DXiaolei%2520Lang%2520and%2520Yang%2520Wang%2520and%2520Yukun%2520Zhou%2520and%2520Chaojun%2520Ni%2520and%2520Kerui%2520Li%2520and%2520Jiagang%2520Zhu%2520and%2520Tianze%2520Liu%2520and%2520Jiajun%2520Lv%2520and%2520Xingxing%2520Zuo%2520and%2520Yun%2520Ye%2520and%2520Guan%2520Huang%2520and%2520Xiaofeng%2520Wang%2520and%2520Zheng%2520Zhu%26entry.1292438233%3DRecent%2520advances%2520in%2520robot%2520foundation%2520models%2520trained%2520on%2520large-scale%2520human%2520teleoperation%2520data%2520have%2520enabled%2520robots%2520to%2520perform%2520increasingly%2520complex%2520real-world%2520tasks.%2520However%252C%2520scaling%2520these%2520systems%2520remains%2520difficult%2520because%2520collecting%2520task-specific%2520demonstrations%2520is%2520expensive%2520and%2520labor-intensive.%2520Synthetic%2520data%252C%2520especially%2520generated%2520videos%252C%2520offer%2520a%2520promising%2520direction%252C%2520but%2520existing% {"title": "Generative 3D Gaussian Splatting for Arbitrary-ResolutionAtmospheric Downscaling and Forecasting", "author": "Tao Han and Zhibin Wen and Zhenghao Chen and Fenghua Lin and Junyu Gao and Song Guo and Lei Bai", "abstract": "While AI-based numerical weather prediction (NWP) enables rapid forecasting, generating high-resolution outputs remains computationally demanding due to limited multi-scale adaptability and inefficient data representations. We propose the 3D Gaussian splatting-based scale-aware vision transformer (GSSA-ViT), a novel framework for arbitrary-resolution forecasting and flexible downscaling of high-dimensional atmospheric fields. Specifically, latitude-longitude grid points are treated as centers of 3D Gaussians. A generative 3D Gaussian prediction scheme is introduced to estimate key parameters, including covariance, attributes, and opacity, for unseen samples, improving generalization and mitigating overfitting. In addition, a scale-aware attention module is designed to capture cross-scale dependencies, enabling the model to effectively integrate information across varying downscaling ratios and support continuous resolution adaptation. To our knowledge, this is the first NWP approach that combines generative 3D Gaussian modeling with scale-aware attention for unified multi-scale prediction. Experiments on ERA5 show that the proposed method accurately forecasts 87 atmospheric variables at arbitrary resolutions, while evaluations on ERA5 and CMIP6 demonstrate its superior performance in downscaling tasks. The proposed framework provides an efficient and scalable solution for high-resolution, multi-scale atmospheric prediction and downscaling. Code is available at: https://github.com/binbin2xs/weather-GS.", "link": "http://arxiv.org/abs/2604.07928v2", "date": "2026-04-10", "relevancy": 2.4208, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6158}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6058}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5772}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generative%203D%20Gaussian%20Splatting%20for%20Arbitrary-ResolutionAtmospheric%20Downscaling%20and%20Forecasting&body=Title%3A%20Generative%203D%20Gaussian%20Splatting%20for%20Arbitrary-ResolutionAtmospheric%20Downscaling%20and%20Forecasting%0AAuthor%3A%20Tao%20Han%20and%20Zhibin%20Wen%20and%20Zhenghao%20Chen%20and%20Fenghua%20Lin%20and%20Junyu%20Gao%20and%20Song%20Guo%20and%20Lei%20Bai%0AAbstract%3A%20While%20AI-based%20numerical%20weather%20prediction%20%28NWP%29%20enables%20rapid%20forecasting%2C%20generating%20high-resolution%20outputs%20remains%20computationally%20demanding%20due%20to%20limited%20multi-scale%20adaptability%20and%20inefficient%20data%20representations.%20We%20propose%20the%203D%20Gaussian%20splatting-based%20scale-aware%20vision%20transformer%20%28GSSA-ViT%29%2C%20a%20novel%20framework%20for%20arbitrary-resolution%20forecasting%20and%20flexible%20downscaling%20of%20high-dimensional%20atmospheric%20fields.%20Specifically%2C%20latitude-longitude%20grid%20points%20are%20treated%20as%20centers%20of%203D%20Gaussians.%20A%20generative%203D%20Gaussian%20prediction%20scheme%20is%20introduced%20to%20estimate%20key%20parameters%2C%20including%20covariance%2C%20attributes%2C%20and%20opacity%2C%20for%20unseen%20samples%2C%20improving%20generalization%20and%20mitigating%20overfitting.%20In%20addition%2C%20a%20scale-aware%20attention%20module%20is%20designed%20to%20capture%20cross-scale%20dependencies%2C%20enabling%20the%20model%20to%20effectively%20integrate%20information%20across%20varying%20downscaling%20ratios%20and%20support%20continuous%20resolution%20adaptation.%20To%20our%20knowledge%2C%20this%20is%20the%20first%20NWP%20approach%20that%20combines%20generative%203D%20Gaussian%20modeling%20with%20scale-aware%20attention%20for%20unified%20multi-scale%20prediction.%20Experiments%20on%20ERA5%20show%20that%20the%20proposed%20method%20accurately%20forecasts%2087%20atmospheric%20variables%20at%20arbitrary%20resolutions%2C%20while%20evaluations%20on%20ERA5%20and%20CMIP6%20demonstrate%20its%20superior%20performance%20in%20downscaling%20tasks.%20The%20proposed%20framework%20provides%20an%20efficient%20and%20scalable%20solution%20for%20high-resolution%2C%20multi-scale%20atmospheric%20prediction%20and%20downscaling.%20Code%20is%20available%20at%3A%20https%3A//github.com/binbin2xs/weather-GS.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07928v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGenerative%25203D%2520Gaussian%2520Splatting%2520for%2520Arbitrary-ResolutionAtmospheric%2520Downscaling%2520and%2520Forecasting%26entry.906535625%3DTao%2520Han%2520and%2520Zhibin%2520Wen%2520and%2520Zhenghao%2520Chen%2520and%2520Fenghua%2520Lin%2520and%2520Junyu%2520Gao%2520and%2520Song%2520Guo%2520and%2520Lei%2520Bai%26entry.1292438233%3DWhile%2520AI-based%2520numerical%2520weather%2520prediction%2520%2528NWP%2529%2520enables%2520rapid%2520forecasting%252C%2520generating%2520high-resolution%2520outputs%2520remains%2520computationally%2520demanding%2520due%2520to%2520limited%2520multi-scale%2520adaptability%2520and%2520inefficient%2520data%2520representations.%2520We%2520propose%2520the%25203D%2520Gaussian%2520splatting-based%2520scale-aware%2520vision%2520transformer%2520%2528GSSA-ViT%2529%252C%2520a%2520novel%2520framework%2520for%2520arbitrary-resolution%2520forecasting%2520and%2520flexible%2520downscaling%2520of%2520high-dimensional%2520atmospheric%2520fields.%2520Specifically%252C%2520latitude-longitude%2520grid%2520points%2520are%2520treated%2520as%2520cente {"title": "Stochastic-Dimension Frozen Sampled Neural Network for High-Dimensional Gross-Pitaevskii Equations on Unbounded Domains", "author": "Zhangyong Liang", "abstract": "In this paper, we propose a stochastic-dimension frozen sampled neural network (SD-FSNN) for solving a class of high-dimensional Gross-Pitaevskii equations (GPEs) on unbounded domains. SD-FSNN is unbiased across all dimensions, and its computational cost is independent of the dimension, avoiding the exponential growth in computational and memory costs associated with Hermite-basis discretizations. Additionally, we randomly sample the hidden weights and biases of the neural network, significantly outperforming iterative, gradient-based optimization methods in terms of training time and accuracy. Furthermore, we employ a space-time separation strategy, using adaptive ordinary differential equation (ODE) solvers to update the evolution coefficients and incorporate temporal causality. To preserve the structure of the GPEs, we integrate a Gaussian-weighted ansatz into the neural network to enforce exponential decay at infinity, embed a normalization projection layer for mass normalization, and add an energy conservation constraint to mitigate long-time numerical dissipation. Comparative experiments with existing methods demonstrate the superior performance of SD-FSNN across a range of spatial dimensions and interaction parameters. Compared to existing random-feature methods, SD-FSNN reduces the complexity from linear to dimension-independent. Additionally, SD-FSNN achieves better accuracy and faster training compared to general high-dimensional solvers, while focusing specifically on high-dimensional GPEs on unbounded domains.", "link": "http://arxiv.org/abs/2604.09361v1", "date": "2026-04-10", "relevancy": 2.4153, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4925}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4838}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4729}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Stochastic-Dimension%20Frozen%20Sampled%20Neural%20Network%20for%20High-Dimensional%20Gross-Pitaevskii%20Equations%20on%20Unbounded%20Domains&body=Title%3A%20Stochastic-Dimension%20Frozen%20Sampled%20Neural%20Network%20for%20High-Dimensional%20Gross-Pitaevskii%20Equations%20on%20Unbounded%20Domains%0AAuthor%3A%20Zhangyong%20Liang%0AAbstract%3A%20In%20this%20paper%2C%20we%20propose%20a%20stochastic-dimension%20frozen%20sampled%20neural%20network%20%28SD-FSNN%29%20for%20solving%20a%20class%20of%20high-dimensional%20Gross-Pitaevskii%20equations%20%28GPEs%29%20on%20unbounded%20domains.%20SD-FSNN%20is%20unbiased%20across%20all%20dimensions%2C%20and%20its%20computational%20cost%20is%20independent%20of%20the%20dimension%2C%20avoiding%20the%20exponential%20growth%20in%20computational%20and%20memory%20costs%20associated%20with%20Hermite-basis%20discretizations.%20Additionally%2C%20we%20randomly%20sample%20the%20hidden%20weights%20and%20biases%20of%20the%20neural%20network%2C%20significantly%20outperforming%20iterative%2C%20gradient-based%20optimization%20methods%20in%20terms%20of%20training%20time%20and%20accuracy.%20Furthermore%2C%20we%20employ%20a%20space-time%20separation%20strategy%2C%20using%20adaptive%20ordinary%20differential%20equation%20%28ODE%29%20solvers%20to%20update%20the%20evolution%20coefficients%20and%20incorporate%20temporal%20causality.%20To%20preserve%20the%20structure%20of%20the%20GPEs%2C%20we%20integrate%20a%20Gaussian-weighted%20ansatz%20into%20the%20neural%20network%20to%20enforce%20exponential%20decay%20at%20infinity%2C%20embed%20a%20normalization%20projection%20layer%20for%20mass%20normalization%2C%20and%20add%20an%20 {"title": "SIM1: Physics-Aligned Simulator as Zero-Shot Data Scaler in Deformable Worlds", "author": "Yunsong Zhou and Hangxu Liu and Xuekun Jiang and Xing Shen and Yuanzhen Zhou and Hui Wang and Baole Fang and Yang Tian and Mulin Yu and Qiaojun Yu and Li Ma and Hengjie Li and Hanqing Wang and Jia Zeng and Jiangmiao Pang", "abstract": "Robotic manipulation with deformable objects represents a data-intensive regime in embodied learning, where shape, contact, and topology co-evolve in ways that far exceed the variability of rigids. Although simulation promises relief from the cost of real-world data acquisition, prevailing sim-to-real pipelines remain rooted in rigid-body abstractions, producing mismatched geometry, fragile soft dynamics, and motion primitives poorly suited for cloth interaction. We posit that simulation fails not for being synthetic, but for being ungrounded. To address this, we introduce SIM1, a physics-aligned real-to-sim-to-real data engine that grounds simulation in the physical world. Given limited demonstrations, the system digitizes scenes into metric-consistent twins, calibrates deformable dynamics through elastic modeling, and expands behaviors via diffusion-based trajectory generation with quality filtering. This pipeline transforms sparse observations into scaled synthetic supervision with near-demonstration fidelity. Experiments show that policies trained on purely synthetic data achieve parity with real-data baselines at a 1:15 equivalence ratio, while delivering 90% zero-shot success and 50% generalization gains in real-world deployment. These results validate physics-aligned simulation as scalable supervision for deformable manipulation and a practical pathway for data-efficient policy learning.", "link": "http://arxiv.org/abs/2604.08544v2", "date": "2026-04-10", "relevancy": 2.3824, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6067}, { {"title": "Cluster-First Labelling: An Automated Pipeline for Segmentation and Morphological Clustering in Histology Whole Slide Images", "author": "Muhammad Haseeb Ahmad and Sharmila Rajendran and Damion Young and Jon Mason", "abstract": "Labelling tissue components in histology whole slide images (WSIs) is prohibitively labour-intensive: a single slide may contain tens of thousands of structures--cells, nuclei, and other morphologically distinct objects--each requiring manual boundary delineation and classification. We present a cloudnative, end-to-end pipeline that automates this process through a cluster-first paradigm. Our system tiles WSIs, filters out tiles deemed unlikely to contain valuable information, segments tissue components with Cellpose-SAM (including cells, nuclei, and other morphologically similar structures), extracts neural embeddings via a pretrained ResNet-50, reduces dimensionality with UMAP, and groups morphologically similar objects using DBSCAN clustering. Under this paradigm, a human annotator labels representative clusters rather than individual objects, reducing annotation effort by orders of magnitude. We evaluate the pipeline on 3,696 tissue components across 13 diverse tissue types from three species (human, rat, rabbit), measuring how well unsupervised clusters align with independent human labels via per-tile Hungarian-algorithm matching. Our system achieves a weighted cluster-label alignment accuracy of 96.8%, with 7 of 13 tissue types reaching perfect agreement. The pipeline, a companion labelling web application, and all evaluation code are released as open-source software.", "link": "http://arxiv.org/abs/2604.09370v1", "date": "2026-04-10", "relevancy": 2.3782, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.496}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arx {"title": "FashionStylist: An Expert Knowledge-enhanced Multimodal Dataset for Fashion Understanding", "author": "Kaidong Feng and Zhuoxuan Huang and Huizhong Guo and Yuting Jin and Xinyu Chen and Yue Liang and Yifei Gai and Li Zhou and Yunshan Ma and Zhu Sun", "abstract": "Fashion understanding requires both visual perception and expert-level reasoning about style, occasion, compatibility, and outfit rationale. However, existing fashion datasets remain fragmented and task-specific, often focusing on item attributes, outfit co-occurrence, or weak textual supervision, and thus provide limited support for holistic outfit understanding. In this paper, we introduce FashionStylist, an expert-annotated benchmark for holistic and expert-level fashion understanding. Constructed through a dedicated fashion-expert annotation pipeline, FashionStylist provides professionally grounded annotations at both the item and outfit levels. It supports three representative tasks: outfit-to-item grounding, outfit completion, and outfit evaluation. These tasks cover realistic item recovery from complex outfits with layering and accessories, compatibility-aware composition beyond co-occurrence matching, and expert-level assessment of style, season, occasion, and overall coherence. Experimental results show that FashionStylist serves not only as a unified benchmark for multiple fashion tasks, but also as an effective training resource for improving grounding, completion, and outfit-level semantic evaluation in MLLM-based fashion systems.", "link": "http://arxiv.org/abs/2604.09249v1", "date": "2026-04-10", "relevancy": 2.3773, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.7029}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.586}, {"title": "FabricDiffusion: High-Fidelity Textur {"title": "Reasoning Models Will Sometimes Lie About Their Reasoning", "author": "William Walden and Miriam Wanner", "abstract": "Hint-based faithfulness evaluations have established that Large Reasoning Models (LRMs) may not say what they think: they do not always volunteer information about how key parts of the input (e.g. answer hints) influence their reasoning. Yet, these evaluations also fail to specify what models should do when confronted with hints or other unusual prompt content -- even though versions of such instructions are standard security measures (e.g. for countering prompt injections). Here, we study faithfulness under this more realistic setting in which models are explicitly alerted to the possibility of unusual inputs. We find that such instructions can yield strong results on faithfulness metrics from prior work. However, results on new, more granular metrics proposed in this work paint a mixed picture: although models may acknowledge the presence of hints, they will often deny intending to use them -- even when permitted to use hints and even when it can be demonstrated that they are using them. Our results thus raise broader challenges for CoT monitoring and interpretability.", "link": "http://arxiv.org/abs/2601.07663v3", "date": "2026-04-10", "relevancy": 2.372, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5122}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4555}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4555}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Reasoning% {"title": "Vision Transformers for Preoperative CT-Based Prediction of Histopathologic Chemotherapy Response Score in High-Grade Serous Ovarian Carcinoma", "author": "Francesca Fati and Felipe Coutinho and Marika Reinius and Marina Rosanu and Gabriel Funingana and Luigi De Vitis and Gabriella Schivardi and Hannah Clayton and Alice Traversa and Zeyu Gao and Guilherme Penteado and Shangqi Gao and Francesco Pastori and Ramona Woitek and Maria Cristina Ghioni and Giovanni Damiano Aletti and Mercedes Jimenez-Linan and Sarah Burge and Nicoletta Colombo and Evis Sala and Maria Francesca Spadea and Timothy L. Kline and James D. Brenton and Jaime Cardoso and Francesco Multinu and Elena De Momi and Mireia Crispin-Ortuzar and Ines P. Machado", "abstract": "Purpose. High-grade serous ovarian carcinoma (HGSOC) is characterized by pronounced biological and spatial heterogeneity and is frequently diagnosed at an advanced stage. Neoadjuvant chemotherapy (NACT) followed by delayed primary surgery is commonly employed in patients unsuitable for primary cytoreduction. The Chemotherapy Response Score (CRS) is a validated histopathological biomarker of response to NACT, but it is only available postoperatively. In this study, we investigate whether pre-treatment computed tomography (CT) imaging and clinical data can be used to predict CRS as an investigational decision-support adjunct to inform multidisciplinary team (MDT) discussions regarding expected treatment response. Methods. We proposed a 2.5D multimodal deep learning framework that processes lesion-dense omental slices using a pre-trained Vision Transformer encoder and integrates the resulting visual representations with clinical variables through an intermediate fusion module to predict CRS. Results. Our multimodal model, integrating imaging and clinical data, achieved a ROC-AUC of 0.95 alongside 95% accuracy and 80% precision on the internal test cohort (IEO, n=41 patients). On the external test set (OV04, n=70 patients), it achieved a ROC-AUC of 0.68, alongside 67% accuracy and 75% precision. Conclusion. These preliminary results demonstrate the feasibility of transformer-based deep learning for preoperative prediction of CRS in HGSOC using routine clinical data and CT imaging. As an investigational, pre-treatment decision-support tool, this approach may assist MDT discussions by providing early, non-invasive estimates of treatment response.", "link": "http://arxiv.org/abs/2604.09197v1", "date": "2026-04-10", "relevancy": 2.371, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4743}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4743}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4739}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Vision%20Transformers%20for%20Preoperative%20CT-Based%20Prediction%20of%20Histopathologic%20Chemotherapy%20Response%20Score%20in%20High-Grade%20Serous%20Ovarian%20Carcinoma&body=Title%3A%20Vision%20Transformers%20for%20Preoperative%20CT-Based%20Prediction%20of%20Histopathologic%20Chemotherapy%20Response%20Score%20in%20High-Grade%20Serous%20Ovarian%20Carcinoma%0AAuthor%3A%20Francesca%20Fati%20and%20Felipe%20Coutinho%20and%20Marika%20Reinius%20and%20Marina%20Rosanu%20and%20Gabriel%20Funingana%20and%20Luigi%20De%20Vitis%20and%20Gabriella%20Schivardi%20and%20Hannah%20Clayton%20and%20Alice%20Traversa%20and%20Zeyu%20Gao%20and%20Guilherme%20Penteado%20and%20Shangqi%20Gao%20and%20Francesco%20Pastori%20and%20Ramona%20Woitek%20and%20Maria%20Cristina%20Ghioni%20and%20Giovanni%20Damiano%20Aletti%20and%20Mercedes%20Jimenez-Linan%20and%20Sarah%20Burge%20and%20Nicoletta%20Colombo%20and%20Evis%20Sala%20and%20Maria%20Francesca%20Spadea%20and%20Timothy%20L.%20Kline%20and%20James%20D.%20Brenton%20and%20Jaime%20Cardoso%20and%20Francesco%20Multinu%20and%20Elena%20De%20Momi%20and%20Mireia%20Crispin-Ortuzar%20and%20Ines%20P.%20Machado%0AAbstract%3A%20Purpose.%20High-grade%20serous%20ovarian%20carcinoma%20%28HGSOC%29%20is%20characterized%20by%20pronounced%20biological%20and%20spatial%20heterogeneity%20and%20is%20frequently%20diagnosed%20at%20an%20advanced%20stage.%20Neoadjuvant%20chemotherapy%20%28NACT%29%20followed%20by%20delayed%20primary%20surgery%20is%20commonly%20employed%20in%20patients%20unsuitable%20for%20primary%20cytoreduction.%20The%20Chemotherapy%20Response%20Score%20%28CRS%29%20is%20a%20validated%20histopathological%20biomarker%20of%20response%20to%20NACT%2C%20but%20it%20is%20only%20available%20postoperatively.%20In%20this%20study%2C%20we%20investigate%20whether%20pre-treatment%20computed%20tomography%20%28CT%29%20imaging%20and%20clinical%20data%20can%20be%20used%20to%20predict%20CRS%20as%20an%20investigational%20decision-support%20adjunct%20to%20inform%20multidisciplinary%20team%20%28MDT%29%20discussions%20regarding%20expected%20treatment%20response.%20Methods.%20We%20proposed%20a%202.5D%20multimodal%20deep%20learning%20framework%20that%20processes%20lesion-dense%20omental%20slices%20using%20a%20pre-trained%20Vision%20Transformer%20encoder%20and%20integrates%20the%20resulting%20visual%20representations%20with%20clinical%20variables%20through%20an%20intermediate%20fusion%20module%20to%20predict%20CRS.%20Results.%20Our%20multimodal%20model%2C%20integrating%20imaging%20and%20clinical%20data%2C%20achieved%20a%20ROC-AUC%20of%200.95%20alongside%2095%25%20accuracy%20and%2080%25%20precision%20on%20the%20internal%20test%20cohort%20%28IEO%2C%20n%3D41%20patients%29.%20On%20the%20external%20test%20set%20%28OV04%2C%20n%3D70%20patients%29%2C%20it%20achieved%20a%20ROC-AUC%20of%200.68%2C%20alongside%2067%25%20accuracy%20and%2075%25%20precision.%20Conclusion.%20These%20preliminary%20resul ary%20cytoreduction.%20The%20Chemotherapy%20Response%20Score%20%28CRS%29%20is%20a%20validated%20histopathological%20biomarker%20of%20response%20to%20NACT%2C%20but%20it%20is%20only%20available%20postoperatively.%20In%20this%20study%2C%20we%20investigate%20whether%20pre-treatment%20computed%20tomography%20%28CT%29%20imaging%20and%20clinical%20data%20can%20be%20used%20to%20predict%20CRS%20as%20an%20investigational%20decision-support%20adjunct%20to%20inform%20multidisciplinary%20team%20%28MDT%29%20discussions%20regarding%20expected%20treatment%20response.%20Methods.%20We%20proposed%20a%202.5D%20multimodal%20deep%20learning%20framework%20that%20processes%20lesion-dense%20omental%20slices%20using%20a%20pre-trained%20Vision%20Transformer%20encoder%20and%20integrates%20the%20resulting%20visual%20representations%20with%20clinical%20variables%20through%20an%20intermediate%20fusion%20module%20to%20predict%20CRS.%20Results.%20Our%20multimodal%20model%2C%20integrating%20imaging%20and%20clinical%20data%2C%20achieved%20a%20ROC-AUC%20of%200.95%20alongside%2095%25%20accuracy%20and%2080%25%20precision%20on%20the%20internal%20test%20cohort%20%28IEO%2C%20n%3D41%20patients%29.%20On%20the%20external%20test%20set%20%28OV04%2C%20n%3D70%20patients%29%2C%20it%20achieved%20a%20ROC-AUC%20of%200.68%2C%20alongside%2067%25%20accuracy%20and%2075%25%20precision.%20Conclusion.%20These%20preliminary%20results%20demonstrate%20the%20feasibility%20of%20transformer-based%20deep%20learning%20for%20preoperative%20prediction%20of%20CRS%20in%20HGSOC%20using%20routine%20clinical%20data%20and%20CT%20imaging.%20As%20an%20investigational%2C%20pre-treatment%20decision-support%20tool%2C%20this%20approach%20may%20assist%20MDT%20discussions%20by%20providing%20early%2C%20non-invasive%20estimates%20of%20treatment%20response.&entry.1838667208=http%3A//arxiv.org/abs/2604.09197v1&entry.124074799=Read"},
{"title": "HD-VGGT: High-Resolution Visual Geometry Transformer", "author": "Tianrun Chen and Yuanqi Hu and Yidong Han and Hanjie Xu and Deyi Ji and Qi Zhu and Chunan Yu and Xin Zhang and Cheng Chen and Chaotao Ding and Ying Zang and Xuanfu Li and Jin Ma and Lanyun Zhu", "abstract": "High-resolution imagery is essential for accurate 3D reconstruction, as many geometric details only emerge at fine spatial scales. Recent feed-forward approaches, such as the Visual Geometry Grounded Transformer (VGGT), have demonstrated the ability to infer scene geometry from large collections of images in a single forward pass. However, scaling these models to high-resolution inputs remains challenging: the number of tokens in transformer architectures grows rapidly with both image resolution and the number of views, leading to prohibitive computational and memory costs. Moreover, we observe that visually ambiguous regions, such as repetitive patterns, weak textures, or specular surfaces, often produce unstable feature tokens that degrade geometric inference, especially at higher resolutions. We introduce HD-VGGT, a dual-branch architecture for efficient and robust high-resolution 3D reconstruction. A low-resolution branch predicts a coarse, globally consistent geometry, while a high-resolution branch refines details via a learned feature upsampling module. To handle unstable tokens, we propose Feature Modulation, which suppresses unreliable features early in the transformer. HD-VGGT leverages high-resolution images and supervision without full-resolution transformer costs, achieving state-of-the-art reconstruction quality.", "link": "http://arxiv.org/abs/2603.27222v2", "date": "2026-04-10", "relevancy": 2.3684, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.6218}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http: ry%2C%20while%20a%20high-resolution%20branch%20refines%20details%20via%20a%20learned%20feature%20upsampling%20module.%20To%20handle%20unstable%20tokens%2C%20we%20propose%20Feature%20Modulation%2C%20which%20suppresses%20unreliable%20features%20early%20in%20the%20transformer.%20HD-VGGT%20leverages%20high-resolution%20images%20and%20supervision%20without%20full-resolution%20transformer%20costs%2C%20achieving%20state-of-the-art%20reconstruction%20quality.%0ALink%3A%20http%3A//arxiv.org/abs/2603.27222v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHD-VGGT%253A%2520High-Resolution%2520Visual%2520Geometry%2520Transformer%26entry.906535625%3DTianrun%2520Chen%2520and%2520Yuanqi%2520Hu%2520and%2520Yidong%2520Han%2520and%2520Hanjie%2520Xu%2520and%2520Deyi%2520Ji%2520and%2520Qi%2520Zhu%2520and%2520Chunan%2520Yu%2520and%2520Xin%2520Zhang%2520and%2520Cheng%2520Chen%2520and%2520Chaotao%2520Ding%2520and%2520Ying%2520Zang%2520and%2520Xuanfu%2520Li%2520and%2520Jin%2520Ma%2520and%2520Lanyun%2520Zhu%26entry.1292438233%3DHigh-resolution%2520imagery%2520is%2520essential%2520for%2520accurate%25203D%2520reconstruction%252C%2520as%2520many%2520geometric%2520details%2520only%2520emerge%2520at%2520fine%2520spatial%2520scales.%2520Recent%2520feed-forward%2520approaches%252C%2520such%2520as%2520the%2520Visual%2520Geometry%2520Grounded%2520Transformer%2520%2528VGGT%2529%252C%2520have%2520demonstrated%2520the%2520ability%2520to%2520infer%2520scene%2520geometry%2520from%2520large%2520collections%2520of%2520images%2520in%2520a%2520single%2520forward%2520pass.%2520However%252C%2520scaling%2520these%2520models%2520to%2520high-resolution%2520inputs%2520remains%2520challenging%253A%2520the%2520number%2520of%2520tokens%2520in%2520transformer%2520architectures%2520grows%2520rapidly%2520with%2520both%2520image%2520resolution%2520and%2520the%2520number%2520of%2520views%252C%2520leading%2520to%2520prohibitive%2520computational%2520and%2520memory%2520costs.%2520Moreover%252C%2520we%2520observe%2520that%2520visually%2520ambiguous%2520regions%252C%2520such%2520as%2520repetitive%2520patterns%252C%2520weak%2520textures%252C%2520or%2520specular%2520surfaces%252C%2520often%2520produce%2520unstable%2520feature%2520tokens%2520that%2520degrade%2520geometric%2520inference%252C%2520especially%2520at%2520higher%2520resolutions.%2520We%2520introduce%2520HD-VGGT%252C%2520a%2520dual-branch%2520architecture%2520for%2520efficient%2520and%2520robust%2520high-resolution%25203D%2520reconstruction.%2520A%2520low-resolution%2520branch%2520predicts%2520a%2520coarse%252C%2520globally%2520consistent%2520geometry%252C%2520while%2520a%2520high-resolution%2520branch%2520refines%2520details%2520via%2520a%2520learned%2520feature%2520upsampling%2520module.%2520To%2520handle%2520unstable%2520tokens%252C%2520we%2520propose%2520Feature%2520Modulation%252C%2520which%2520suppresses%2520unreliable%2520features%2520early%2520in%2520the%2520transformer.%2520HD-VGGT%2520leverages%2520high-resolution%2520images%2520and%2520supervision%2520without%2520full-resolution%2520transformer%2520costs%252C%2520achieving%2520state-of-the-art%2520reconstruction%2520quality.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.27222v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=HD-VGGT%3A%20High-Resolution%20Visual%20Geometry%20Transformer&entry.906535625=Tianrun%20Chen%20and%20Yuanqi%20Hu%20and%20Yidong%20Han%20and%20Hanjie%20Xu%20and%20Deyi%20Ji%20and%20Qi%20Zhu%20and%20Chunan%20Yu%20and%20Xin%20Zhang%20and%20Cheng%20Chen%20and%20Chaotao%20Ding%20and%20Ying%20Zang%20and%20Xuanfu%20Li%20and%20Jin%20Ma%20and%20Lanyun%20Zhu&entry.1292438233=High-resolution%20imagery%20is%20essential%20for%20accurate%203D%20reconstruction%2C%20as%20many%20geometric%20details%20only%20emerge%20at%20fine%20spatial%20scales.%20Recent%20feed-forward%20approaches%2C%20such%20as%20the%20Visual%20Geometry%20Grounded%20Transformer%20%28VGGT%29%2C%20have%20demonstrated%20the%20ability%20to%20infer%20scene%20geometry%20from%20large%20collections%20of%20images%20in%20a%20single%20forward%20pass.%20However%2C%20scaling%20these%20models%20to%20high-resolution%20inputs%20remains%20challenging%3A%20the%20number%20of%20tokens%20in%20transformer%20architectures%20grows%20rapidly%20with%20both%20image%20resolution%20and%20the%20number%20of%20views%2C%20leading%20to%20prohibitive%20computational%20and%20memory%20costs.%20Moreover%2C%20we%20observe%20that%20visually%20ambiguous%20regions%2C%20such%20as%20repetitive%20patterns%2C%20weak%20textures%2C%20or%20specular%20surfaces%2C%20often%20produce%20unstable%20feature%20tokens%20that%20degrade%20geometric%20inference%2C%20especially%20at%20higher%20resolutions.%20We%20introduce%20HD-VGGT%2C%20a%20dual-branch%20architecture%20for%20efficient%20and%20robust%20high-resolution%203D%20reconstruction.%20A%20low-resolution%20branch%20predicts%20a%20coarse%2C%20globally%20consistent%20geometry%2C%20while%20a%20high-resolution%20branch%20refines%20details%20via%20a%20learned%20feature%20upsampling%20module.%20To%20handle%20unstable%20tokens%2C%20we%20propose%20Feature%20Modulation%2C%20which%20suppresses%20unreliable%20features%20early%20in%20the%20transformer.%20HD-VGGT%20leverages%20high-resolution%20images%20and%20supervision%20without%20full-resolution%20transformer%20costs%2C%20achieving%20state-of-the-art%20reconstruction%20quality.&entry.1838667208=http%3A//arxiv.org/abs/2603.27222v2&entry.124074799=Read"},
{"title": "NOMAD: Generating Embeddings for Massive Distributed Graphs", "author": "Aishwarya Sarkar and Sayan Ghosh and Nathan R. Tallent and Ali Jannesari", "abstract": "Successful machine learning on graphs or networks requires embeddings that not only represent nodes and edges as low-dimensional vectors but also preserve the graph structure. Established methods for generating embeddings require flexible exploration of the entire graph through repeated use of random walks that capture graph structure with samples of nodes and edges. These methods create scalability challenges for massive graphs with millions-to-billions of edges because single-node solutions have inadequate memory and processing capabilities.\n  We present NOMAD, a distributed-memory graph embedding framework using the Message Passing Interface (MPI) for distributed graphs. NOMAD implements proximity-based models proposed in the widely popular LINE (Large-scale Information Network Embedding) algorithm. We propose several practical trade-offs to improve the scalability and communication overheads confronted by irregular and distributed graph embedding methods, catering to massive-scale graphs arising in web and science domains. NOMAD demonstrates median speedups of 10/100x on CPU-based NERSC Perlmutter cluster relative to the popular reference implementations of multi-threaded LINE and node2vec, 35-76x over distributed PBG, and competitive embedding quality relative to LINE, node2vec, and GraphVite, while yielding 12-370x end-to-end speedups on real-world graphs.", "link": "http://arxiv.org/abs/2604.09419v1", "date": "2026-04-10", "relevancy": 2.3537, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4873}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4645}, {"title": "Boosted dynamic neural n the%2520scalability%2520and%2520communication%2520overheads%2520confronted%2520by%2520irregular%2520and%2520distributed%2520graph%2520embedding%2520methods%252C%2520catering%2520to%2520massive-scale%2520graphs%2520arising%2520in%2520web%2520and%2520science%2520domains.%2520NOMAD%2520demonstrates%2520median%2520speedups%2520of%252010/100x%2520on%2520CPU-based%2520NERSC%2520Perlmutter%2520cluster%2520relative%2520to%2520the%2520popular%2520reference%2520implementations%2520of%2520multi-threaded%2520LINE%2520and%2520node2vec%252C%252035-76x%2520over%2520distributed%2520PBG%252C%2520and%2520competitive%2520embedding%2520quality%2520relative%2520to%2520LINE%252C%2520node2vec%252C%2520and%2520GraphVite%252C%2520while%2520yielding%252012-370x%2520end-to-end%2520speedups%2520on%2520real-world%2520graphs.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.09419v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=NOMAD%3A%20Generating%20Embeddings%20for%20Massive%20Distributed%20Graphs&entry.906535625=Aishwarya%20Sarkar%20and%20Sayan%20Ghosh%20and%20Nathan%20R.%20Tallent%20and%20Ali%20Jannesari&entry.1292438233=Successful%20machine%20learning%20on%20graphs%20or%20networks%20requires%20embeddings%20that%20not%20only%20represent%20nodes%20and%20edges%20as%20low-dimensional%20vectors%20but%20also%20preserve%20the%20graph%20structure.%20Established%20methods%20for%20generating%20embeddings%20require%20flexible%20exploration%20of%20the%20entire%20graph%20through%20repeated%20use%20of%20random%20walks%20that%20capture%20graph%20structure%20with%20samples%20of%20nodes%20and%20edges.%20These%20methods%20create%20scalability%20challenges%20for%20massive%20graphs%20with%20millions-to-billions%20of%20edges%20because%20single-node%20solutions%20have%20inadequate%20memory%20and%20processing%20capabilities.%0A%20%20We%20present%20NOMAD%2C%20a%20distributed-memory%20graph%20embedding%20framework%20using%20the%20Message%20Passing%20Interface%20%28MPI%29%20for%20distributed%20graphs.%20NOMAD%20implements%20proximity-based%20models%20proposed%20in%20the%20widely%20popular%20LINE%20%28Large-scale%20Information%20Network%20Embedding%29%20algorithm.%20We%20propose%20several%20practical%20trade-offs%20to%20improve%20the%20scalability%20and%20communication%20overheads%20confronted%20by%20irregular%20and%20distributed%20graph%20embedding%20methods%2C%20catering%20to%20massive-scale%20graphs%20arising%20in%20web%20and%20science%20domains.%20NOMAD%20demonstrates%20median%20speedups%20of%2010/100x%20on%20CPU-based%20NERSC%20Perlmutter%20cluster%20relative%20to%20the%20popular%20reference%20implementations%20of%20multi-threaded%20LINE%20and%20node2vec%2C%2035-76x%20over%20distributed%20PBG%2C%20and%20competitive%20embedding%20quality%20relative%20to%20LINE%2C%20node2vec%2C%20and%20GraphVite%2C%20while%20yielding%2012-370x%20end-to-end%20speedups%20on%20real-world%20graphs.&entry.1838667208=http%3A//arxiv.org/abs/2604.09419v1&entry.124074799=Read"},
{"title": "Realizing Immersive Volumetric Video: A Multimodal Framework for 6-DoF VR Engagement", "author": "Zhengxian Yang and Shengqi Wang and Shi Pan and Hongshuai Li and Haoxiang Wang and Lin Li and Guanjun Li and Zhengqi Wen and Borong Lin and Jianhua Tao and Tao Yu", "abstract": "Fully immersive experiences that tightly integrate 6-DoF visual and auditory interaction are essential for virtual and augmented reality. While such experiences can be achieved through computer-generated content, constructing them directly from real-world captured videos remains largely unexplored. We introduce Immersive Volumetric Videos, a new volumetric media format designed to provide large 6-DoF interaction spaces, audiovisual feedback, and high-resolution, high-frame-rate dynamic content. To support IVV construction, we present ImViD, a multi-view, multi-modal dataset built upon a space-oriented capture philosophy. Our custom capture rig enables synchronized multi-view video-audio acquisition during motion, facilitating efficient capture of complex indoor and outdoor scenes with rich foreground--background interactions and challenging dynamics. The dataset provides 5K-resolution videos at 60 FPS with durations of 1-5 minutes, offering richer spatial, temporal, and multimodal coverage than existing benchmarks. Leveraging this dataset, we develop a dynamic light field reconstruction framework built upon a Gaussian-based spatio-temporal representation, incorporating flow-guided sparse initialization, joint camera temporal calibration, and multi-term spatio-temporal supervision for robust and accurate modeling of complex motion. We further propose, to our knowledge, the first method for sound field reconstruction from such multi-view audiovisual data. Together, these components form a unified pipeline for immersive volumetric video production. Extensive benchmarks and immersive VR experiments demonstrate that our pipeline generates high-quality, temporally stable audiovisual volumetric content with large 6-DoF interaction spaces. This work provides both a foundational definition and a practical construction methodology for immersive volumetric videos.", "link": "http://arxiv.org/abs/2604.09473v1", "date": "2026-04-10", "relevancy": 2.3526, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6201}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5818}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5818}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Realizing%20Immersive%20Volumetric%20Video%3A%20A%20Multimodal%20Framework%20for%206-DoF%20VR%20Engagement&body=Title%3A%20Realizing%20Immersive%20Volumetric%20Video%3A%20A%20Multimodal%20Framework%20for%206-DoF%20VR%20Engagement%0AAuthor%3A%20Zhengxian%20Yang%20and%20Shengqi%20Wang%20and%20Shi%20Pan%20and%20Hongshuai%20Li%20and%20Haoxiang%20Wang%20and%20Lin%20Li%20and%20Guanjun%20Li%20and%20Zhengqi%20Wen%20and%20Borong%20Lin%20and%20Jianhua%20Tao%20and%20Tao%20Yu%0AAbstract%3A%20Fully%20immersive%20experiences%20that%20tightly%20integrate%206-DoF%20visual%20and%20auditory%20interaction%20are%20essential%20for%20virtual%20and%20augmented%20reality.%20While%20such%20experiences%20can%20be%20achieved%20through%20computer-generated%20content%2C%20constructing%20them%20directly%20from%20real-world%20captured%20videos%20remains%20largely%20unexplored.%20We%20introduce%20Immersive%20Volumetric%20Videos%2C%20a%20new%20volumetric%20media%20format%20designed%20to%20provide%20large%206-DoF%20interaction%20spaces%2C%20audiovisual%20feedback%2C%20and%20high-resolution%2C%20high-frame-rate%20dynamic%20content.%20To%20support%20IVV%20construction%2C%20we%20present%20ImViD%2C%20a%20multi-view%2C%20multi-modal%20dataset%20built%20upon%20a%20space-oriented%20capture%20philosophy.%20Our%20custom%20capture%20rig%20enables%20synchronized%20multi-view%20video-audio%20acquisition%20during%20motion%2C%20facilitating%20efficient%20capture%20of%20complex%20indoor%20and%20outdoor%20scenes%20with%20rich%20foreground--background%20interactions%20and%20challenging%20dynamics.%20The%20dataset%20provides%205K-resolution%20videos%20at%2060%20FPS%20with%20durations%20of%201-5%20minutes%2C%20offering%20richer%20spatial%2C%20temporal%2C%20and%20multimodal%20coverage%20than%20existing%20benchmarks.%20Leveraging%20this%20dataset%2C%20we%20develop%20a%20dynamic%20light%20field%20reconstruction%20framework%20built%20upon%20a%20Gaussian-based%20spatio-temporal%20representation%2C%20incorporating%20flow-guided%20sparse%20initialization%2C%20joint%20camera%20temporal%20calibration%2C%20and%20multi-term%20spatio-temporal%20supervision%20for%20robust%20and%20accurate%20modeling%20of%20complex%20motion.%20We%20further%20propose%2C%20to%20our%20knowledge%2C%20the%20first%20method%20for%20sound%20field%20reconstruction%20from%20such%20multi-view%20audiovisual%20data.%20Together%2C%20these%20components%20form%20a%20unified%20pipeline%20for%20immersive%20volumetric%20video%20production.%20Extensive%20benchmarks%20and%20immersive%20VR%20experiments%20demonstrate%20that%20our%20pipeline%20generates%20high-quality%2C%20temporally%20stable%20audiovisual%20volumetric%20content%20with%20large%206-DoF%20interaction%20spaces.%20This%20work%20provides%20both%20a%20foundational%20definition%20and%20a%20practical%20construction%20methodology%20for%20immersive%20volumetric%20videos.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09473v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRealizing%2520Immersive%2520Volumetric%2520Video%253A%2520A%2520Multimodal%2520Framework%2520for%25206-DoF%2520VR%2520Engagement%26entry.906535625%3DZhengxian%2520Yang%2520an nerated%20content%2C%20constructing%20them%20directly%20from%20real-world%20captured%20videos%20remains%20largely%20unexplored.%20We%20introduce%20Immersive%20Volumetric%20Videos%2C%20a%20new%20volumetric%20media%20format%20designed%20to%20provide%20large%206-DoF%20interaction%20spaces%2C%20audiovisual%20feedback%2C%20and%20high-resolution%2C%20high-frame-rate%20dynamic%20content.%20To%20support%20IVV%20construction%2C%20we%20present%20ImViD%2C%20a%20multi-view%2C%20multi-modal%20dataset%20built%20upon%20a%20space-oriented%20capture%20philosophy.%20Our%20custom%20capture%20rig%20enables%20synchronized%20multi-view%20video-audio%20acquisition%20during%20motion%2C%20facilitating%20efficient%20capture%20of%20complex%20indoor%20and%20outdoor%20scenes%20with%20rich%20foreground--background%20interactions%20and%20challenging%20dynamics.%20The%20dataset%20provides%205K-resolution%20videos%20at%2060%20FPS%20with%20durations%20of%201-5%20minutes%2C%20offering%20richer%20spatial%2C%20temporal%2C%20and%20multimodal%20coverage%20than%20existing%20benchmarks.%20Leveraging%20this%20dataset%2C%20we%20develop%20a%20dynamic%20light%20field%20reconstruction%20framework%20built%20upon%20a%20Gaussian-based%20spatio-temporal%20representation%2C%20incorporating%20flow-guided%20sparse%20initialization%2C%20joint%20camera%20temporal%20calibration%2C%20and%20multi-term%20spatio-temporal%20supervision%20for%20robust%20and%20accurate%20modeling%20of%20complex%20motion.%20We%20further%20propose%2C%20to%20our%20knowledge%2C%20the%20first%20method%20for%20sound%20field%20reconstruction%20from%20such%20multi-view%20audiovisual%20data.%20Together%2C%20these%20components%20form%20a%20unified%20pipeline%20for%20immersive%20volumetric%20video%20production.%20Extensive%20benchmarks%20and%20immersive%20VR%20experiments%20demonstrate%20that%20our%20pipeline%20generates%20high-quality%2C%20temporally%20stable%20audiovisual%20volumetric%20content%20with%20large%206-DoF%20interaction%20spaces.%20This%20work%20provides%20both%20a%20foundational%20definition%20and%20a%20practical%20construction%20methodology%20for%20immersive%20volumetric%20videos.&entry.1838667208=http%3A//arxiv.org/abs/2604.09473v1&entry.124074799=Read"},
{"title": "AdaCubic: An Adaptive Cubic Regularization Optimizer for Deep Learning", "author": "Ioannis Tsingalis and Constantine Kotropoulos and Corentin Briat", "abstract": "A novel regularization technique, AdaCubic, is proposed that adapts the weight of the cubic term. The heart of AdaCubic is an auxiliary optimization problem with cubic constraints that dynamically adjusts the weight of the cubic term in Newton's cubic regularized method. We use Hutchinson's method to approximate the Hessian matrix, thereby reducing computational cost. We demonstrate that AdaCubic inherits the cubically regularized Newton method's local convergence guarantees. Our experiments in Computer Vision, Natural Language Processing, and Signal Processing tasks demonstrate that AdaCubic outperforms or competes with several widely used optimizers. Unlike other adaptive algorithms that require hyperparameter fine-tuning, AdaCubic is evaluated with a fixed set of hyperparameters, rendering it a highly attractive optimizer in settings where fine-tuning is infeasible. This makes AdaCubic an attractive option for researchers and practitioners alike. To our knowledge, AdaCubic is the first optimizer to leverage cubic regularization in scalable deep learning applications.", "link": "http://arxiv.org/abs/2604.09437v1", "date": "2026-04-10", "relevancy": 2.3476, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4985}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4665}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4436}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AdaCubic%3A%20An%20Adaptive%20Cubic%20Regularization%20Optimizer%20for%20Deep%20Learning&body=Title%3A%20AdaCubic% {"title": "VSI: Visual Subtitle Integration for Keyframe Selection to enhance Long Video Understanding", "author": "Jianxiang He and Meisheng Hong and Jungang Li and Weiyu Guo and Xuming Hu and Hui Xiong", "abstract": "Multimodal large language models (MLLMs) demonstrate exceptional performance in vision-language tasks, yet their processing of long videos is constrained by input context length and high computational costs. Sparse frame sampling thus becomes a necessary preprocessing step, with sampled frame quality directly impacting downstream performance. Existing keyframe search algorithms achieve a balance between efficiency and sampled frame quality but heavily rely on the visual modality alone. This makes them difficult to adapt to text-related tasks and often leads to retrieval results deviating from core semantic content. To address this, we propose the VISUAL-SUBTITLE INTEGRATION (VSI), a multimodal keyframe retrieval framework. It employs a dual-branch collaborative retrieval approach combining Video Search and Subtitle Match to fuse complementary visual and textual information for precise localization. Experiments on LongVideoBench and VideoMME demonstrate that VSI achieves state-of-the-art accuracy in keyframe retrieval while delivering breakthrough performance in text-related tasks and exhibiting strong generalization across other tasks.", "link": "http://arxiv.org/abs/2508.06869v4", "date": "2026-04-10", "relevancy": 2.3245, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5826}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5826}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5736}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VSI%3A%20Visual%20Subtitle%20Integration%20for%20Keyframe%20Selection%20to%20enhance%20Long%20Video%20Understanding&body=Title%3A%20VSI%3A%20Visual%20Subtitle%20Integration%20for%20Keyframe%20Selection%20to%20enhance%20Long%20Video%20Understanding%0AAuthor%3A%20Jianxiang%20He%20and%20Meisheng%20Hong%20and%20Jungang%20Li%20and%20Weiyu%20Guo%20and%20Xuming%20Hu%20and%20Hui%20Xiong%0AAbstract%3A%20Multimodal%20large%20language%20models%20%28MLLMs%29%20demonstrate%20exceptional%20performance%20in%20vision-language%20tasks%2C%20yet%20their%20processing%20of%20long%20videos%20is%20constrained%20by%20input%20context%20length%20and%20high%20computational%20costs.%20Sparse%20frame%20sampling%20thus%20becomes%20a%20necessary%20preprocessing%20step%2C%20with%20sampled%20frame%20quality%20directly%20impacting%20downstream%20performance.%20Existing%20keyframe%20search%20algorithms%20achieve%20a%20balance%20between%20efficiency%20and%20sampled%20frame%20quality%20but%20heavily%20rely%20on%20the%20visual%20modality%20alone.%20This%20makes%20them%20difficult%20to%20adapt%20to%20text-related%20tasks%20and%20often%20leads%20to%20retrieval%20results%20deviating%20from%20core%20semantic%20content.%20To%20address%20this%2C%20we%20propose%20the%20VISUAL-SUBTITLE%20INTEGRATION%20%28VSI%29%2C%20a%20multimodal%20keyframe%20retrieval%20framework.%20It%20employs%20a%20dual-branch%20collaborative%20retrieval%20approach%20combining%20Video%20Search%20and%20Subtitle%20Match%20to%20fuse%20complementary%20visual%20and%20textual%20information%20for%20precise%20localization.%20Experiments%20on%20LongVideoBench%20and%20VideoMME%20demonstrate%20that%20VSI%20achieves%20state-of-the-art%20accuracy%20in%20keyframe%20retrieval%20while%20delivering%20breakthrough%20performance%20in%20text-related%20tasks%20and%20exhibiting%20strong%20generalization%20across%20other%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2508.06869v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAI yframe%2520retrieval%2520while%2520delivering%2520breakthrough%2520performance%2520in%2520text-related%2520tasks%2520and%2520exhibiting%2520strong%2520generalization%2520across%2520other%2520tasks.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2508.06869v4%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=VSI%3A%20Visual%20Subtitle%20Integration%20for%20Keyframe%20Selection%20to%20enhance%20Long%20Video%20Understanding&entry.906535625=Jianxiang%20He%20and%20Meisheng%20Hong%20and%20Jungang%20Li%20and%20Weiyu%20Guo%20and%20Xuming%20Hu%20and%20Hui%20Xiong&entry.1292438233=Multimodal%20large%20language%20models%20%28MLLMs%29%20demonstrate%20exceptional%20performance%20in%20vision-language%20tasks%2C%20yet%20their%20processing%20of%20long%20videos%20is%20constrained%20by%20input%20context%20length%20and%20high%20computational%20costs.%20Sparse%20frame%20sampling%20thus%20becomes%20a%20necessary%20preprocessing%20step%2C%20with%20sampled%20frame%20quality%20directly%20impacting%20downstream%20performance.%20Existing%20keyframe%20search%20algorithms%20achieve%20a%20balance%20between%20efficiency%20and%20sampled%20frame%20quality%20but%20heavily%20rely%20on%20the%20visual%20modality%20alone.%20This%20makes%20them%20difficult%20to%20adapt%20to%20text-related%20tasks%20and%20often%20leads%20to%20retrieval%20results%20deviating%20from%20core%20semantic%20content.%20To%20address%20this%2C%20we%20propose%20the%20VISUAL-SUBTITLE%20INTEGRATION%20%28VSI%29%2C%20a%20multimodal%20keyframe%20retrieval%20framework.%20It%20employs%20a%20dual-branch%20collaborative%20retrieval%20approach%20combining%20Video%20Search%20and%20Subtitle%20Match%20to%20fuse%20complementary%20visual%20and%20textual%20information%20for%20precise%20localization.%20Experiments%20on%20LongVideoBench%20and%20VideoMME%20demonstrate%20that%20VSI%20achieves%20state-of-the-art%20accuracy%20in%20keyframe%20retrieval%20while%20delivering%20breakthrough%20performance%20in%20text-related%20tasks%20and%20exhibiting%20strong%20generalization%20across%20other%20tasks.&entry.1838667208=http%3A//arxiv.org/abs/2508.06869v4&entry.124074799=Read"},
{"title": "CrashSight: A Phase-Aware, Infrastructure-Centric Video Benchmark for Traffic Crash Scene Understanding and Reasoning", "author": "Rui Gan and Junyi Ma and Pei Li and Xingyou Yang and Kai Chen and Sikai Chen and Bin Ran", "abstract": "Cooperative autonomous driving requires traffic scene understanding from both vehicle and infrastructure perspectives. While vision-language models (VLMs) show strong general reasoning capabilities, their performance in safety-critical traffic scenarios remains insufficiently evaluated due to the ego-vehicle focus of existing benchmarks. To bridge this gap, we present \\textbf{CrashSight}, a large-scale vision-language benchmark for roadway crash understanding using real-world roadside camera data. The dataset comprises 250 crash videos, annotated with 13K multiple-choice question-answer pairs organized under a two-tier taxonomy. Tier 1 evaluates the visual grounding of scene context and involved parties, while Tier 2 probes higher-level reasoning, including crash mechanics, causal attribution, temporal progression, and post-crash outcomes. We benchmark 8 state-of-the-art VLMs and show that, despite strong scene description capabilities, current models struggle with temporal and causal reasoning in safety-critical scenarios. We provide a detailed analysis of failure scenarios and discuss directions for improving VLM crash understanding. The benchmark provides a standardized evaluation framework for infrastructure-assisted perception in cooperative autonomous driving. The CrashSight benchmark, including the full dataset and code, is accessible at https://mcgrche.github.io/crashsight.", "link": "http://arxiv.org/abs/2604.08457v2", "date": "2026-04-10", "relevancy": 2.3033, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5872}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5872}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5191}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CrashSight%3A%20A%20Phase-Aware%2C%20Infrastructure-Centric%20Video%20Benchmark%20for%20Traffic%20Crash%20Scene%20Understanding%20and%20Reasoning&body=Title%3A%20CrashSight%3A%20A%20Phase-Aware%2C%20Infrastructure-Centric%20Video%20Benchmark%20for%20Traffic%20Crash%20Scene%20Understanding%20and%20Reasoning%0AAuthor%3A%20Rui%20Gan%20and%20Junyi%20Ma%20and%20Pei%20Li%20and%20Xingyou%20Yang%20and%20Kai%20Chen%20and%20Sikai%20Chen%20and%20Bin%20Ran%0AAbstract%3A%20Cooperative%20autonomous%20driving%20requires%20traffic%20scene%20understanding%20from%20both%20vehicle%20and%20infrastructure%20perspectives.%20While%20vision-language%20models%20%28VLMs%29%20show%20strong%20general%20reasoning%20capabilities%2C%20their%20performance%20in%20safety-critical%20traffic%20scenarios%20remains%20insufficiently%20evaluated%20due%20to%20the%20ego-vehicle%20focus%20of%20existing%20benchmarks.%20To%20bridge%20this%20gap%2C%20we%20present%20%5Ctextbf%7BCrashSight%7D%2C%20a%20large-scale%20vision-language%20benchmark%20for%20roadway%20crash%20understanding%20using%20real-world%20roadside%20camera%20data.%20The%20dataset%20comprises%20250%20crash%20videos%2C%20annotated%20with%2013K%20multiple-choice%20question-answer%20pairs%20organized%20under%20a%20two-tier%20taxonomy.%20Tier%201%20evaluates%20the%20visual%20grounding%20of%20scene%20context%20and%20involved%20parties%2C%20while%20Tier%202%20probes%20higher-level%20reasoning%2C%20including%20crash%20mechanics%2C%20causal%20attribution%2C%20temporal%20progression%2C%20and%20post-crash%20outcomes.%20We%20benchmark%208%20state-of-the-art%20VLMs%20and%20show%20that%2C%20despite%20strong%20scene%20description%20c {"title": "Musculoskeletal Motion Imitation for Learning Personalized Exoskeleton Control Policy in Impaired Gait", "author": "Itak Choi and Ilseung Park and Eni Halilaj and Inseung Kang", "abstract": "Designing generalizable control policies for lower-limb exoskeletons remains fundamentally constrained by exhaustive data collection or iterative optimization procedures, which limit accessibility to clinical populations. To address this challenge, we introduce a device-agnostic framework that combines physiologically plausible musculoskeletal simulation with reinforcement learning to enable scalable personalized exoskeleton assistance for both able-bodied and clinical populations. Our control policies not only generate physiologically plausible locomotion dynamics but also capture clinically observed compensatory strategies under targeted muscular deficits, providing a unified computational model of both healthy and pathological gait. Without task-specific tuning, the resulting exoskeleton control policies produce assistive torque profiles at the hip and ankle that align with state-of-the-art profiles validated in human experiments, while consistently reducing metabolic cost across walking speeds. For simulated impaired-gait models, the learned control policies yield asymmetric, deficit-specific exoskeleton assistance that improves both energetic efficiency and bilateral kinematic symmetry without explicit prescription of the target gait pattern. These results demonstrate that physiologically plausible musculoskeletal simulation via reinforcement learning can serve as a scalable foundation for personalized exoskeleton control across both able-bodied and clinical populations, eliminating the need for extensive physical trials.", "link": "http://arxiv.org/abs/2604.09431v1", "date": "2026-04-10", "relevancy": 2.3032, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5915}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5694}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5523}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Musculoskeletal%20Motion%20Imitation%20for%20Learning%20Personalized%20Exoskeleton%20Control%20Policy%20in%20Impaired%20Gait&body=Title%3A%20Musculoskeletal%20Motion%20Imitation%20for%20Learning%20Personalized%20Exoskeleton%20Control%20Policy%20in%20Impaired%20Gait%0AAuthor%3A%20Itak%20Choi%20and%20Ilseung%20Park%20and%20Eni%20Halilaj%20and%20Inseung%20Kang%0AAbstract%3A%20Designing%20generalizable%20control%20policies%20for%20lower-limb%20exoskeletons%20remains%20fundamentally%20constrained%20by%20exhaustive%20data%20collection%20or%20iterative%20optimization%20procedures%2C%20which%20limit%20accessibility%20to%20clinical%20populations.%20To%20address%20this%20challenge%2C%20we%20introduce%20a%20device-agnostic%20framework%20that%20combines%20physiologically%20plausible%20musculoskeletal%20simulation%20with%20reinforcement%20learning%20to%20enable%20scalable%20personalized%20exoskeleton%20assistance%20for%20both%20able-bodied%20and%20clinical%20populations.%20Our%20control%20policies%20not%20only%20generate%20physiologically%20plausible%20locomotion%20dynamics%20but%20also%20capture%20clinically%20observed%20compensatory%20strategies%20under%20targeted%20muscular%20deficits%2C%20providing%20a%20unified%20computational%20model%20of%20both%20healthy%20and%20pathological%20gait.%20Without%20task-specific%20tuning%2C%20the%20resulting%20exoskeleton%20control%20policies%20produce%20assistive%20torque%20profiles%20at%20the%20hip%20and%20ankle%20that%20align%20with%20state-of-the-art%20profiles%20validated%20in%20human%20experiments%2C%20while%20consistently%20reducing%20metabolic%20cost%20across%20walking%20speeds.%20For%20simulated%20impaired-gait%20models%2C%20the%20learned%20control%20policies%20yield%20asymmetric%2C%20deficit-specific%20exoskeleton%20assistance%20that%20improves%20both%20energetic%20efficiency%20and%20bilateral%20kinematic%20symmetry%20without%20explicit%20prescription%20of%20the%20target%20gait%20pattern.%20These%20results%20demonstrate%20that%20physiologically%20plausible%20musculoskeletal%20simulation%20via%20reinforcement%20learning%20can%20serve%20as%20a%20scalable%20foundation%20for%20personalized%20exoskeleton%20control%20across%20both%20able-bodied%20and%20clinical%20populations%2C%20eliminating%20the%20need%20for%20extensive%20physical%20trials.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09431v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMusculoskeletal%2520Motion%2520Imitation%2520for%2520Learning%2520Personalized%2520Exoskeleton%2520Control%2520Policy%2520in%2520Impaired%2520Gait%26entry.906535625%3DItak%2520Choi%2520and%2520Ilseung%2520Park%2520and%2520Eni%2520Halilaj%2520and%2520Inseung%2520Kang%26entry.1292438233%3DDesigning%2520generalizable%2520control%2520policies%2520for%2520lower-limb%2520exoskeletons%2520remains%2520fundamentally%2520constrained%2520by%2520exhaustive%2520data%2520collection%2520or%2520iterative%2520optimization%2520procedures%252C%2520which%2520limit%2520accessibility%2520to%2520clinical%2520populations.%2520To%2520address%2520this%2520challenge%252C%2520we%2520introduce%2520a%2520device-agnostic%2520framework%2520that%2520combines%2520physiologically%2520plausible%2520musculoskeletal%2520simulation%2520with%2520reinforcement%2520learning%2520to%2520enable%2520scalable%2520personalized%2520exoskeleton%2520assistance%2520for%2520both%2520able-bodied%2520and%2520clinical%2520populations.%2520Our%2520control%2520policies%2520not%2520only%2520generate%2520physiologically%2520plausibl

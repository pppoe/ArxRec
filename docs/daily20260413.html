{"title": "LoBE-GS: Load-Balanced and Efficient 3D Gaussian Splatting for Large-Scale Scene Reconstruction", "author": "Sheng-Hsiang Hung and Ting-Yu Yen and Wei-Fang Sun and Simon See and Shih-Hsuan Hung and Hung-Kuo Chu", "abstract": "3D Gaussian Splatting (3DGS) has established itself as an efficient representation for real-time, high-fidelity 3D scene reconstruction. However, scaling 3DGS to large and unbounded scenes such as city blocks remains difficult. Existing divide-and-conquer methods alleviate memory pressure by partitioning the scene into blocks and training on multiple, non-communicating GPUs, but introduce new bottlenecks: (i) partitions suffer from severe load imbalance since uniform or heuristic splits do not reflect actual computational demands, and (ii) coarse-to-fine pipelines fail to exploit the coarse stage efficiently, often reloading the entire model and incurring high overhead. In this work, we introduce LoBE-GS, a novel Load-Balanced and Efficient 3D Gaussian Splatting framework, that re-engineers the large-scale 3DGS pipeline. Specifically, LoBE-GS introduces a load-balanced KD-tree scene partitioning scheme with optimized cutlines that balance per-block camera counts. To accelerate preprocessing, it employs depth-based back-projection for fast camera assignment, reducing processing time from hours to minutes. It further reduces training cost through two lightweight techniques: visibility cropping and selective densification. Evaluations on large-scale urban and outdoor datasets show that LoBE-GS consistently achieves up to 2 times faster end-to-end training time than state-of-the-art baselines, while maintaining reconstruction quality and enabling scalability to scenes infeasible with vanilla 3DGS.", "link": "http://arxiv.org/abs/2510.01767v2", "date": "2026-04-10", "relevancy": 3.3552, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0 cene%20Reconstruction&entry.906535625=Sheng-Hsiang%20Hung%20and%20Ting-Yu%20Yen%20and%20Wei-Fang%20Sun%20and%20Simon%20See%20and%20Shih-Hsuan%20Hung%20and%20Hung-Kuo%20Chu&entry.1292438233=3D%20Gaussian%20Splatting%20%283DGS%29%20has%20established%20itself%20as%20an%20efficient%20representation%20for%20real-time%2C%20high-fidelity%203D%20scene%20reconstruction.%20However%2C%20scaling%203DGS%20to%20large%20and%20unbounded%20scenes%20such%20as%20city%20blocks%20remains%20difficult.%20Existing%20divide-and-conquer%20methods%20alleviate%20memory%20pressure%20by%20partitioning%20the%20scene%20into%20blocks%20and%20training%20on%20multiple%2C%20non-communicating%20GPUs%2C%20but%20introduce%20new%20bottlenecks%3A%20%28i%29%20partitions%20suffer%20from%20severe%20load%20imbalance%20since%20uniform%20or%20heuristic%20splits%20do%20not%20reflect%20actual%20computational%20demands%2C%20and%20%28ii%29%20coarse-to-fine%20pipelines%20fail%20to%20exploit%20the%20coarse%20stage%20efficiently%2C%20often%20reloading%20the%20entire%20model%20and%20incurring%20high%20overhead.%20In%20this%20work%2C%20we%20introduce%20LoBE-GS%2C%20a%20novel%20Load-Balanced%20and%20Efficient%203D%20Gaussian%20Splatting%20framework%2C%20that%20re-engineers%20the%20large-scale%203DGS%20pipeline.%20Specifically%2C%20LoBE-GS%20introduces%20a%20load-balanced%20KD-tree%20scene%20partitioning%20scheme%20with%20optimized%20cutlines%20that%20balance%20per-block%20camera%20counts.%20To%20accelerate%20preprocessing%2C%20it%20employs%20depth-based%20back-projection%20for%20fast%20camera%20assignment%2C%20reducing%20processing%20time%20from%20hours%20to%20minutes.%20It%20further%20reduces%20training%20cost%20through%20two%20lightweight%20techniques%3A%20visibility%20cropping%20and%20selective%20densification.%20Evaluations%20on%20large-scale%20urban%20and%20outdoor%20datasets%20show%20that%20LoBE-GS%20consistently%20achieves%20up%20to%202%20times%20faster%20end-to-end%20training%20time%20than%20state-of-the-art%20bas {"title": "Gen-n-Val: Agentic Image Data Generation and Validation", "author": "Jing-En Huang and I-Sheng Fang and Tzuhsuan Huang and Yu-Lun Liu and Chih-Yu Wang and Jun-Cheng Chen", "abstract": "The data scarcity, label noise, and long-tailed category imbalance remain important and unresolved challenges in many computer vision tasks, such as object detection and instance segmentation, especially on large-vocabulary benchmarks like LVIS, where most categories appear in only a few images. Current synthetic data generation methods still suffer from multiple objects per mask, inaccurate segmentation, incorrect category labels, and other issues, limiting their effectiveness. To address these issues, we introduce Gen-n-Val, a novel agentic data generation framework that leverages Layer Diffusion (LD), a Large Language Model (LLM), and a Vision Large Language Model (VLLM) to produce high-quality and diverse instance masks and images for object detection and instance segmentation. Gen-n-Val consists of two agents: (1) the LD prompt agent, an LLM, optimizes rompts to encourage LD to generate high-quality foreground single-object images and corresponding segmentation masks; and (2) the data validation agent, a VLLM, filters out low-quality synthetic instance images. The system prompts for both agents are optimized by TextGrad. Compared to state-of-the-art synthetic data approaches like MosaicFusion, our approach reduces invalid synthetic data from 50% to 7% and improves performance by 7.6% on rare classes in LVIS instance segmentation with Mask R-CNN, and by 3.6% mAP on rare classes in COCO instance segmentation with YOLOv9c and YOLO11m. Furthermore, Gen-n-Val shows significant improvements (7.1% mAP) over YOLO-Worldv2-M in open-vocabulary object detection benchmarks with YOLO11m. Moreover, Gen-n-Val has scalability in model capacity and dataset size. The code is available at https://github.com/aiiu-lab/Gen-n-Val.", "link": "http://arxiv.org/abs/2506.04676v2", "date": "2026-04-10", "relevancy": 3.0997, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.6375}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.616}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.6063}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gen-n-Val%3A%20Agentic%20Image%20Data%20Generation%20and%20Validation&body=Title%3A%20Gen-n-Val%3A%20Agentic%20Image%20Data%20Generation%20and%20Validation%0AAuthor%3A%20Jing-En%20Huang%20and%20I-Sheng%20Fang%20and%20Tzuhsuan%20Huang%20and%20Yu-Lun%20Liu%20and%20Chih-Yu%20Wang%20and%20Jun-Cheng%20Chen%0AAbstract%3A%20The%20data%20scarcity%2C%20label%20noise%2C%20and%20long-tailed%20category%20imbalance%20remain%20important%20and%20unresolved%20challenges%20in%20many%20computer%20vision%20tasks%2C%20such%20as%20object%20detection%20and%20instance%20segmentation%2C%20especially%20on%20large-vocabulary%20benchmarks%20like%20LVIS%2C%20where%20most%20categories%20appear%20in%20only%20a%20few%20images.%20Current%20synthetic%20data%20generation%20methods%20still%20suffer%20from%20multiple%20objects%20per%20mask%2C%20inaccurate%20segmentation%2C%20incorrect%20category%20labels%2C%20and%20other%20issues%2C%20limiting%20their%20effectiveness.%20To%20address%20these%20issues%2C%20we%20introduce%20Gen-n-Val%2C%20a%20novel%20agentic%20data%20generation%20framework%20that%20leverages%20Layer%20Diffusion%20%28LD%29%2C%20a%20Large%20Language%20Model%20%28LLM%29%2C%20and%20a%20Vision%20Large%20Language%20Model%20%28VLLM%29%20to%20produce%20high-quality%20and%20diverse%20instance%20masks%20and%20images%20for%20object%20detection%20and%20instance%20segmentation.%20Gen-n-Val%20consists%20of%20two%20agents%3A%20%281%29%20the%20LD%20prompt%20agent%2C%20an%20LLM%2C%20optimizes%20rompts%20to%20encourage%20LD%20to%20generate%20high-quality%20foreground%20single-object%20images%20and%20corresponding%20segmentation%20masks%3B%20and%20%282%29%20the%20data%20validation%20agent%2C%20a%20VLLM%2C%20filters%20out%20low-quality%20synthetic%20instance%20images.%20The%20system%20prompts%20for%20both%20agents%20are%20optimized%20by%20TextGrad.%20Compared%20to%20state-of-the-art%20synthetic%20data%20approaches%20like%20MosaicFusion%2C%20our%20approach%20reduces%20invalid%20synthetic%20data%20from%2050%25%20to%207%25%20and%20improves%20performance%20by%207.6%25%20on%20rare%20classes%20in%20LVIS%20instance%20segmentation%20with%20Mask%20R-CNN%2C%20and%20by%203.6%25%20mAP%20on%20rare%20classes%20in%20COCO%20instance%20segmentation%20with%20YOLOv9c%20and%20YOLO11m.%20Furthermore%2C%20Gen-n-Val%20shows%20significant%20improvements%20%287.1%25%20mAP%29%20over%20YOLO-Worldv2-M%20in%20open-vocabulary%20object%20detection%20benchmarks%20with%20YOLO11m.%20Moreover%2C%20Gen-n-Val%20has%20scalability%20in%20model%20capacity%20and%20dataset%20size.%20The%20code%20is%20available%20at%20https%3A//github.com/aiiu-lab/Gen-n-Val.%0ALink%3A%20http%3A//arxiv.org/abs/2506.04676v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGen-n-Val%253A%2520Agentic%2520Image%2520Data%2520Generation%2520and%2520Validation%26entry.906535625%3DJing-En%2520Huang%2520and%2520I-Sheng%2520Fang%2520and%2520Tzuhsuan%2520Huang%2520and%2520Yu-Lun%2520Liu%2520and%2520Chih-Yu%2520Wang%2520and%2520Jun-Cheng%2520Chen%26entry.1292438233%3DThe%2520data%2520scarcity%252C%2520label%2520noise%252C%2520and%2520long-tailed%2520category%2520imbalance%2520remain%2520important%2520and%2520unresolved%2520challenges%2520in%2520many%2520computer%2520vision%2520tasks%252C%2520such%2520as%2520object%2520detection%2520and%2520instance%2520segmentation%252C%2520especially%2520on%2520large-vocabulary%2520benchmarks%2520like%2 {"title": "Self-Supervised Slice-to-Volume Reconstruction with Gaussian Representations for Fetal MRI", "author": "Yinsong Wang and Thomas Fletcher and Xinzhe Luo and Aine Travers Dineen and Rhodri Cusack and Chen Qin", "abstract": "Reconstructing 3D fetal MR volumes from motion-corrupted stacks of 2D slices is a crucial and challenging task. Conventional slice-to-volume reconstruction (SVR) methods are time-consuming and require multiple orthogonal stacks for reconstruction. While learning-based SVR approaches have significantly reduced the time required at the inference stage, they heavily rely on ground truth information for training, which is inaccessible in practice. To address these challenges, we propose GaussianSVR, a self-supervised framework for slice-to-volume reconstruction. GaussianSVR represents the target volume using 3D Gaussian representations to achieve high-fidelity reconstruction. It leverages a simulated forward slice acquisition model to enable self-supervised training, alleviating the need for ground-truth volumes. Furthermore, to enhance both accuracy and efficiency, we introduce a multi-resolution training strategy that jointly optimizes Gaussian parameters and spatial transformations across different resolution levels. Experiments show that GaussianSVR outperforms the baseline methods on fetal MR volumetric reconstruction. Code is available at https://github.com/Yinsong0510/GaussianSVR-Self-Supervised-Slice-to-Volume-Reconstruction-with-Gaussian-Representations.", "link": "http://arxiv.org/abs/2601.22990v2", "date": "2026-04-10", "relevancy": 3.0332, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6291}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6214}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5693}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Self-Supervised%20Slice-to-Volume%20Reconstruction%20with%20Gaussian%20Representations%20for%20Fetal%20MRI&body=Title%3A%20Self-Supervised%20Slice-to-Volume%20Reconstruction%20with%20Gaussian%20Representations%20for%20Fetal%20MRI%0AAuthor%3A%20Yinsong%20Wang%20and%20Thomas%20Fletcher%20and%20Xinzhe%20Luo%20and%20Aine%20Travers%20Dineen%20and%20Rhodri%20Cusack%20and%20Chen%20Qin%0AAbstract%3A%20Reconstructing%203D%20fetal%20MR%20volumes%20from%20motion-corrupted%20stacks%20of%202D%20slices%20is%20a%20crucial%20and%20challenging%20task.%20Conventional%20slice-to-volume%20reconstruction%20%28SVR%29%20methods%20are%20time-consuming%20and%20require%20multiple%20orthogonal%20stacks%20for%20reconstruction.%20While%20learning-based%20SVR%20approaches%20have%20significantly%20reduced%20the%20time%20required%20at%20the%20inference%20stage%2C%20they%20heavily%20rely%20on%20ground%20truth%20information%20for%20training%2C%20which%20is%20inaccessible%20in%20practice.%20To%20address%20these%20challenges%2C%20we%20propose%20GaussianSVR%2C%20a%20self-supervised%20framework%20for%20slice-to-volume%20reconstruction.%20GaussianSVR%20represents%20the%20target%20volume%20using%203D%20Gaussian%20representations%20to%20achieve%20high-fidelity%20reconstruction.%20It%20leverages%20a%20simulated%20forward%20slice%20acquisition%20model%20to%20enable%20self-supervised%20training%2C%20alleviating%20the%20need%20for%20ground-truth%20volumes.%20Furthermore%2C%20to%20enhance%20both%20accuracy%20and%20efficiency%2C%20we%20introduce%20a%20multi-resolution%20training%20strategy%20that%20jointly%20optimizes%20Gaussian%20parameters%20and%20spatial%20transformations%20across%20different%20resolution%20levels.%20Experiments%20show%20that%20GaussianSVR%20outperforms%20the%20baseline%20methods%20on%20fetal%20MR%20volumetric%20reconstruction.%20Code%20is%20available%20at%20https%3A//github.com/Yinsong0510/GaussianSVR-Self-Supervised-Slice-to-Volume-Reconstruction-with-Gaussian-Representations.%0ALink%3A%20http%3A//arxiv.org/abs/2601.22990v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSelf-Supervised%2520Slice-to-Volume%2520Reconstruction%2520with%2520Gaussian%2520Representations%2520for%2520Fetal%2520MRI%26entry.906535625%3DYinsong%2520Wang%2520and%2520Thomas%2520Fletcher%2520and%2520Xinzhe%2520Luo%2520and%2520Aine%2520Travers%2520Dineen%2520and%2520Rhodri%2520Cusack%2520and%2520Chen%2520Qin%26entry.1292438233%3DReconstructing%25203D%2520fetal%2520MR%2520volumes%2520from%2520motion-corrupted%2520stacks%2520of%25202D%2520slices%2520is%2520a%2520crucial%2520and%2520challenging%2520task.%2520Conventional%2520slice-to-volume%2520reconstruction%2520%2528SVR%2529%2520methods%2520are%2520time-consuming%2520and%2520require%2520multiple%2520orthogonal%2520stacks%2520for%2520reconstruction.%2520While%2520learning-based%2520SVR%2520approaches%2520have%2520significantly%2520reduced%2520the%2520time%2520required%2520at%2520the%2520inference%2520stage%252C%2520they%2520heavily%2520rely%2520on%2520ground%2520truth%2520information%2520for%2520training%252C%2520which%2520is%2520inaccessible%2520in%2520practice.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520GaussianSVR%252C%2520a%2520self-supervised%2520framework%2520for%2520slice-to-volume%2520reconstruction.%2520GaussianSVR%2520represents%2520the%2520target%2520volume%2520using%25203D%2520Gaussian%2520representations%2520to%2520achieve%2520high-fidelity%2520reconstruction.%2520It%2520leverages%2520a%2520simulated%2520forward%2520slice%2520acquisition%2520model%2520to%2520enable%2520self-supervised%2520training%252C%2520alleviating%2520the%2520need%2520for%2520ground-truth%2520volumes.%2520Furthermore%252C%2520to%2520enhance%2520both%2520accuracy%2520and%2520efficiency%252C%2520we%2520introduce%2520a%2520multi-resolution%2520training%2520strategy%2520that%2520jointly%2520optimizes%2520Gaussian%2520parameters%2520and%2520spatial%2520transformations%2520across%2520different%2520resolution%2520levels.%2520Experiments%2520show%2520that%2520GaussianSVR%2520outperforms%2520the%2520baseline%2520methods%2520on%2520fetal%2520MR%2520volumetric%2520reconstruction.%2520Code%2520is%2520available%2520at%2520https%253A//github.com/Yinsong0510/GaussianSVR-Self-Supervised-Slice-to-Volume-Reconstruction-with-Gaussian-Representations.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.22990v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Self-Supervised%20Slice-to-Volume%20Reconstruction%20with%20Gaussian%20Representations%20for%20Fetal%20MRI&entry.906535625=Yinsong%20Wang%20and%20Thomas%20Fletcher%20and%20Xinzhe%20Luo%20and%20Aine%20Travers%20Dineen%20and%20Rhodri%20Cusack%20and%20Chen%20Qin&entry.1292438233=Reconstructing%203D%20fetal%20MR%20volumes%20from%20motion-corrupted%20stacks%20of%202D%20slices%20is%20a%20crucial%20and%20challenging%20task.%20Conventional%20slice-to-volume%20reconstruction%20%28SVR%29%20methods%20are%20time-consuming%20and%20require%20multiple%20orthogonal%20stacks%20for%20reconstruction.%20While%20learning-based%20SVR%20approaches%20have%20significantly%20reduced%20the%20time%20required%20at%20the%20inference%20stage%2C%20they%20heavily%20rely%20on%20ground%20truth%20information%20for%20training%2C%20which%20is%20inaccessible%20in%20practice.%20To%20address%20these%20challenges%2C%20we%20propose%20GaussianSVR%2C%20a%20self-supervised%20framework%20for%20slice-to-volume%20reconstruction.%20GaussianSVR%20represents%20the%20target%20volume%20using%203D%20Gaussian%20representations%20to%20achieve%20high-fidelity%20reconstruction.%20It%20leverages%20a%20simulated%20forward%20slice%20acquisition%20model%20to%20en {"title": "Online3R: Online Learning for Consistent Sequential Reconstruction Based on Geometry Foundation Model", "author": "Shunkai Zhou and Zike Yan and Fei Xue and Dong Wu and Yuchen Deng and Hongbin Zha", "abstract": "We present Online3R, a new sequential reconstruction framework that is capable of adapting to new scenes through online learning, effectively resolving inconsistency issues. Specifically, we introduce a set of learnable lightweight visual prompts into a pretrained, frozen geometry foundation model to capture the knowledge of new environments while preserving the fundamental capability of the foundation model for geometry prediction. To solve the problems of missing groundtruth and the requirement of high efficiency when updating these visual prompts at test time, we introduce a local-global self-supervised learning strategy by enforcing the local and global consistency constraints on predictions. The local consistency constraints are conducted on intermediate and previously local fused results, enabling the model to be trained with high-quality pseudo groundtruth signals; the global consistency constraints are operated on sparse keyframes spanning long distances rather than per frame, allowing the model to learn from a consistent prediction over a long trajectory in an efficient way. Our experiments demonstrate that Online3R outperforms previous state-of-the-art methods on various benchmarks. Project page: https://shunkaizhou.github.io/online3r-1.0/", "link": "http://arxiv.org/abs/2604.09480v1", "date": "2026-04-10", "relevancy": 3.0291, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6121}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.605}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6003}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Online3R%3A%20Online%20Learning%20for%20Consistent%20Sequential%20Reconstruction%20Based%20on%20Geometry%20Foundation%20Model&body=Title%3A%20Online3R%3A%20Online%20Learning%20for%20Consistent%20Sequential%20Reconstruction%20Based%20on%20Geometry%20Foundation%20Model%0AAuthor%3A%20Shunkai%20Zhou%20and%20Zike%20Yan%20and%20Fei%20Xue%20and%20Dong%20Wu%20and%20Yuchen%20Deng%20and%20Hongbin%20Zha%0AAbstract%3A%20We%20present%20Online3R%2C%20a%20new%20sequential%20reconstruction%20framework%20that%20is%20capable%20of%20adapting%20to%20new%20scenes%20through%20online%20learning%2C%20effectively%20resolving%20inconsistency%20issues.%20Specifically%2C%20we%20introduce%20a%20set%20of%20learnable%20lightweight%20visual%20prompts%20into%20a%20pretrained%2C%20frozen%20geometry%20foundation%20model%20to%20capture%20the%20knowledge%20of%20new%20environments%20while%20preserving%20the%20fundamental%20capability%20of%20the%20foundation%20model%20for%20geometry%20prediction.%20To%20solve%20the%20problems%20of%20missing%20groundtruth%20and%20the%20requirement%20of%20high%20efficiency%20when%20updating%20these%20visual%20prompts%20at%20test%20time%2C%20we%20introduce%20a%20local-global%20self-supervised%20learning%20strategy%20by%20enforcing%20the%20local%20and%20global%20consistency%20constraints%20on%20predictions.%20The%20local%20consistency%20constraints%20are%20conducted%20on%20intermediate%20and%20previously%20local%20fused%20results%2C%20enabling%20the%20model%20to%20be%20trained%20with%20high-quality%20pseudo%20groundtruth%20signals%3B%20the%20global%20consistency%20constraints%20are%20operated%20on%20sparse%20keyframes%20spanning%20long%20distances%20rather%20than%20per%20frame%2C%20allowing%20the%20model%20to%20learn%20from%20a%20consistent%20prediction%20over%20a%20long%20trajectory%20in%20an%20efficient%20way.%20Our%20experiments%20demonstrate%20that%20Online3R%20outperforms%20previous%20state-of-the-art%20methods%20on%20various%20benchmarks.%20Project%20page%3A%20https%3A//shunkaizhou.github.io/online3r-1.0/%0ALink%3A%20http%3A//arxiv.org/abs/2604.09480v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOnline3R%253A%2520Online%2520Learning%2520for%2520Consistent%2520Sequential%2520Reconstruction%2520Based%2520on%2520Geometry%2520Foundation%2520Model%26entry.906535625%3DShunkai%2520Zhou%2520and%2520Zike%2520Yan%2520and%2520Fei%2520Xue%2520and%2520Dong%2520Wu%2520and%2520Yuchen%2520Deng%2520and%2520Hongbin%2520Zha%26entry.1292438233%3DWe%2520present%2520Online3R%252C%2520a%2520new%2520sequential%2520reconstruction%2520framework%2520that%2520is%2520capable%2520of%2520adapting%2520to%2520new%2520scenes%2520through%2520online%2520learning%252C%2520effectively%2520resolving%2520inconsistency%2520issues.%2520Specifically%252C%2520we%2520introduce%2520a%2520set%2520of%2520learnable%2520lightweight%2520visual%2520prompts%2520into%2520a%2520pretrained%252C%2520frozen%2520geometry%2520foundation%2520model%2520to%2520capture%2520the%2520knowledge%2520of%2520new%2520environments%2520while%2520preserving%2520the%2520fundamental%2520capability%2520of%2520the%2520foundation%2520model%2520for%2520geometry%2520prediction.%2520To%2520solve%2520the%2520problems%2520of%2520missing%2520groundtruth%2520and%2520the%2520requirement%2520of%2520high%2520efficiency%2520when%2520updating%2520these%2520visual%2520prompts%2520at%2520test%2520time%252C%2520we%2520introduce%2520a%2520local-global%2520self-supervised%2520learning%2520strategy%2520by%2520enforcing%2520the%2520local%2520and%2520global%2520consistency%2520constraints%2520on%2520predictions.%2520The%2520local%2520consistency%2520constraints%2520are%2520conducted%2520on%2520intermediate%2520and%2520previously%2520local%2520fused%2520results%252C%2520enabling%2520the%2520model%2520to%2520be%2520trained%2520with%2520high-quality%2520pseudo%2520groundtruth%2520signals%253B%2520the%2520global%2520consistency%2520constraints%2520are%2520operated%2520on%2520sparse%2520keyframes%2520spanning%2520long%2520distances%2520rather%2520than%2520per%2520frame%252C%2520allowing%2520the%2520model%2520to%2520learn%2520from%2520a%2520consistent%2520prediction%2520over%2520a%2520long%2520trajectory%2520in%2520an%2520efficient%2520way.%2520Our%2520experiments%2520demonstrate%2520that%2520Online3R%2520outperforms%2520previous%2520state-of-the-art%2520methods%2520on%2520various%2520benchmarks.%2520Project%2520page%253A%2520https%253A//shunkaizhou.github.io/online3r-1.0/%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.09480v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Online3R%3A%20Online%20Learning%20for%20Consistent%20Sequential%20Reconstruction%20Based%20on%20Geometry%20Foundation%20Model&entry.906535625=Shunkai%20Zhou%20and%20Zike%20Yan%20and%20Fei%20Xue%20and%20Dong%20Wu%20and%20Yuchen%20Deng%20and%20Hongbin%20Zha&entry.1292438233=We%20present%20Online3R%2C%20a%20new%20sequential%20reconstruction%20framework%20that%20is%20capable%20of%20adapting%20to%20new%20scenes%20through%20online%20learning%2C%20effectively%20resolving%20inconsistency%20issues.%20Specifically%2C%20we%20introduce%20a%20set%20of%20learnable%20lightweight%20visual%20prompts%20into%20a%20pretrained%2C%20frozen%20geometry%20foundation%20model%20to%20capture%20the%20knowledge%20of%20new%20environments%20while%20preserving%20the%20fundamental%20capability%20of%20the%20foundation%20model%20for%20geometry%20prediction.%20To%20solve%20the%20problems%20of%20missing%20groundtruth%20and%20the%20requirement%20of%20high%20efficiency%20when%20updating%20these%20visual%20prompts%20at%20test%20time%2C%20we%20introduce%20a%20local-global%20self-supervised%20learning%20strategy% {"title": "Incremental Semantics-Aided Meshing from LiDAR-Inertial Odometry and RGB Direct Label Transfer", "author": "Muhammad Affan and Ville Lehtola and George Vosselman", "abstract": "Geometric high-fidelity mesh reconstruction from LiDAR-inertial scans remains challenging in large, complex indoor environments -- such as cultural buildings -- where point cloud sparsity, geometric drift, and fixed fusion parameters produce holes, over-smoothing, and spurious surfaces at structural boundaries. We propose a modular, incremental RGB+LiDAR pipeline that generates incremental semantics-aided high-quality meshes from indoor scans through scan frame-based direct label transfer. A vision foundation model labels each incoming RGB frame; labels are incrementally projected and fused onto a LiDAR-inertial odometry map; and an incremental semantics-aware Truncated Signed Distance Function (TSDF) fusion step produces the final mesh via marching cubes. This frame-level fusion strategy preserves the geometric fidelity of LiDAR while leveraging rich visual semantics to resolve geometric ambiguities at reconstruction boundaries caused by LiDAR point-cloud sparsity and geometric drift. We demonstrate that semantic guidance improves geometric reconstruction quality; quantitative evaluation is therefore performed using geometric metrics on the Oxford Spires dataset, while results from the NTU VIRAL dataset are analyzed qualitatively. The proposed method outperforms state-of-the-art geometric baselines ImMesh and Voxblox, demonstrating the benefit of semantics-aided fusion for geometric mesh quality. The resulting semantically labelled meshes are of value when reconstructing Universal Scene Description (USD) assets, offering a path from indoor LiDAR scanning to XR and digital modeling.", "link": "http://arxiv.org/abs/2604.09478v1", "date": "2026-04-10", "relevancy": 2.9997, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://ar {"title": "Long-SCOPE: Fully Sparse Long-Range Cooperative 3D Perception", "author": "Jiahao Wang and Zikun Xu and Yuner Zhang and Zhongwei Jiang and Chenyang Lu and Shuocheng Yang and Yuxuan Wang and Jiaru Zhong and Chuang Zhang and Shaobing Xu and Jianqiang Wang", "abstract": "Cooperative 3D perception via Vehicle-to-Everything communication is a promising paradigm for enhancing autonomous driving, offering extended sensing horizons and occlusion resolution. However, the practical deployment of existing methods is hindered at long distances by two critical bottlenecks: the quadratic computational scaling of dense BEV representations and the fragility of feature association mechanisms under significant observation and alignment errors. To overcome these limitations, we introduce Long-SCOPE, a fully sparse framework designed for robust long-distance cooperative 3D perception. Our method features two novel components: a Geometry-guided Query Generation module to accurately detect small, distant objects, and a learnable Context-Aware Association module that robustly matches cooperative queries despite severe positional noise. Experiments on the V2X-Seq and Griffin datasets validate that Long-SCOPE achieves state-of-the-art performance, particularly in challenging 100-150 m long-range settings, while maintaining highly competitive computation and communication costs.", "link": "http://arxiv.org/abs/2604.09206v1", "date": "2026-04-10", "relevancy": 2.9984, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6096}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6096}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5798}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Long-SCOPE%3A%20Fully%20Sparse%20Long-Range%20Cooperative%203D%20Perception&body=Title%3A%20Long-SCOPE%3A%20Fully%20Sparse%20Long-Range%20Cooperative%203D%20Perception%0AAuthor%3A%20Jiahao%20Wang%20and%20Zikun%20Xu%20and%20Yuner%20Zhang%20and%20Zhongwei%20Jiang%20and%20Chenyang%20Lu%20and%20Shuocheng%20Yang%20and%20Yuxuan%20Wang%20and%20Jiaru%20Zhong%20and%20Chuang%20Zhang%20and%20Shaobing%20Xu%20and%20Jianqiang%20Wang%0AAbstract%3A%20Cooperative%203D%20perception%20via%20Vehicle-to-Everything%20communication%20is%20a%20promising%20paradigm%20for%20enhancing%20autonomous%20driving%2C%20offering%20extended%20sensing%20horizons%20and%20occlusion%20resolution.%20However%2C%20the%20practical%20deployment%20of%20existing%20methods%20is%20hindered%20at%20long%20distances%20by%20two%20critical%20bottlenecks%3A%20the%20quadratic%20computational%20scaling%20of%20dense%20BEV%20representations%20and%20the%20fragility%20of%20feature%20association%20mechanisms%20under%20significant%20observation%20and%20alignment%20errors.%20To%20overcome%20these%20limitations%2C%20we%20introduce%20Long-SCOPE%2C%20a%20fully%20sparse%20framework%20designed%20for%20robust%20long-distance%20cooperative%203D%20perception.%20Our%20method%20features%20two%20novel%20components%3A%20a%20Geometry-guided%20Query%20Generation%20module%20to%20accurately%20detect%20small%2C%20distant%20objects%2C%20and%20a%20learnable%20Context-Aware%20Association%20module%20that%20robustly%20matches%20cooperative%20queries%20despite%20severe%20positional%20noise.%20Experiments%20on%20the%20V2X-Seq%20and%20Griffin%20datasets%20validate%20that%20Long-SCOPE%20achieves%20state-of-the-art%20performance%2C%20particularly%20in%20challenging%20100-150%20m%20long-range%20settings%2C%20while%20maintaining%20highly%20competitive%20computation%20and%20communication%20costs.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09206v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9s icularly%2520in%2520challenging%2520100-150%2520m%2520long-range%2520settings%252C%2520while%2520maintaining%2520highly%2520competitive%2520computation%2520and%2520communication%2520costs.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.09206v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Long-SCOPE%3A%20Fully%20Sparse%20Long-Range%20Cooperative%203D%20Perception&entry.906535625=Jiahao%20Wang%20and%20Zikun%20Xu%20and%20Yuner%20Zhang%20and%20Zhongwei%20Jiang%20and%20Chenyang%20Lu%20and%20Shuocheng%20Yang%20and%20Yuxuan%20Wang%20and%20Jiaru%20Zhong%20and%20Chuang%20Zhang%20and%20Shaobing%20Xu%20and%20Jianqiang%20Wang&entry.1292438233=Cooperative%203D%20perception%20via%20Vehicle-to-Everything%20communication%20is%20a%20promising%20paradigm%20for%20enhancing%20autonomous%20driving%2C%20offering%20extended%20sensing%20horizons%20and%20occlusion%20resolution.%20However%2C%20the%20practical%20deployment%20of%20existing%20methods%20is%20hindered%20at%20long%20distances%20by%20two%20critical%20bottlenecks%3A%20the%20quadratic%20computational%20scaling%20of%20dense%20BEV%20representations%20and%20the%20fragility%20of%20feature%20association%20mechanisms%20under%20significant%20observation%20and%20alignment%20errors.%20To%20overcome%20these%20limitations%2C%20we%20introduce%20Long-SCOPE%2C%20a%20fully%20sparse%20framework%20designed%20for%20robust%20long-distance%20cooperative%203D%20perception.%20Our%20method%20features%20two%20novel%20components%3A%20a%20Geometry-guided%20Query%20Generation%20module%20to%20accurately%20detect%20small%2C%20distant%20objects%2C%20and%20a%20learnable%20Context-Aware%20Association%20module%20that%20robustly%20matches%20cooperative%20queries%20despite%20severe%20positional%20noise.%20Experiments%20on%20the%20V2X-Seq%20and%20Griffin%20datasets%20validate%20that%20Long-SCOPE%20achieves%20state-of-the-art%20performance%2C%20particularly%20 {"title": "VisionFoundry: Teaching VLMs Visual Perception with Synthetic Images", "author": "Guanyu Zhou and Yida Yin and Wenhao Chai and Shengbang Tong and Xingyu Fu and Zhuang Liu", "abstract": "Vision-language models (VLMs) still struggle with visual perception tasks such as spatial understanding and viewpoint recognition. One plausible contributing factor is that natural image datasets provide limited supervision for low-level visual skills. This motivates a practical question: can targeted synthetic supervision, generated from only a task keyword such as Depth Order, address these weaknesses? To investigate this question, we introduce VisionFoundry, a task-aware synthetic data generation pipeline that takes only the task name as input and uses large language models (LLMs) to generate questions, answers, and text-to-image (T2I) prompts, then synthesizes images with T2I models and verifies consistency with a proprietary VLM, requiring no reference images or human annotation. Using VisionFoundry, we construct VisionFoundry-10K, a synthetic visual question answering (VQA) dataset containing 10k image-question-answer triples spanning 10 tasks. Models trained on VisionFoundry-10K achieve substantial improvements on visual perception benchmarks: +7% on MMVP and +10% on CV-Bench-3D, while preserving broader capabilities and showing favorable scaling behavior as data size increases. Our results suggest that limited task-targeted supervision is an important contributor to this bottleneck and that synthetic supervision is a promising path toward more systematic training for VLMs.", "link": "http://arxiv.org/abs/2604.09531v1", "date": "2026-04-10", "relevancy": 2.977, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.626}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", {"title": "2D or 3D: Who Governs Salience in VLA Models? -- Tri-Stage Token Pruning Framework with Modality Salience Awareness", "author": "Zihao Zheng and Sicheng Tian and Zhihao Mao and Lingyue Zhang and Chenyue Li and Ziyun Zhang and Hong Gao and Yuchen Huang and Yutong Xu and Guojie Luo and Xiang Chen", "abstract": "Vision-Language-Action (VLA) models have emerged as the mainstream of embodied intelligence. Recent VLA models have expanded their input modalities from 2D-only to 2D+3D paradigms, forming multi-visual-modal VLA (MVLA) models. Despite achieving improved spatial perception, MVLA faces a greater acceleration demand due to the increased number of input tokens caused by modal expansion. Token pruning is an effective optimization methods tailored to MVLA models. However, existing token pruning schemes are designed for 2D-only VLA models, ignoring 2D/3D modality salience differences. In this paper, we follow the application process of multi-modal data in MVLA models and develop a tri-stage analysis to capture the discrepancy and dynamics of 2D/3D modality salience. Based on these, we propose a corresponding tri-stage token pruning framework for MVLA models to achieve optimal 2D/3D token selection and efficient pruning. Experiments show that our framework achieves up to a 2.55x inference speedup with minimal accuracy loss, while only costing 5.8% overhead. Our Code is coming soon.", "link": "http://arxiv.org/abs/2604.09244v1", "date": "2026-04-10", "relevancy": 2.9506, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5999}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5999}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5705}], "mailto": "mail 0costing%205.8%25%20overhead.%20Our%20Code%20is%20coming%20soon.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09244v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D2D%2520or%25203D%253A%2520Who%2520Governs%2520Salience%2520in%2520VLA%2520Models%253F%2520--%2520Tri-Stage%2520Token%2520Pruning%2520Framework%2520with%2520Modality%2520Salience%2520Awareness%26entry.906535625%3DZihao%2520Zheng%2520and%2520Sicheng%2520Tian%2520and%2520Zhihao%2520Mao%2520and%2520Lingyue%2520Zhang%2520and%2520Chenyue%2520Li%2520and%2520Ziyun%2520Zhang%2520and%2520Hong%2520Gao%2520and%2520Yuchen%2520Huang%2520and%2520Yutong%2520Xu%2520and%2520Guojie%2520Luo%2520and%2520Xiang%2520Chen%26entry.1292438233%3DVision-Language-Action%2520%2528VLA%2529%2520models%2520have%2520emerged%2520as%2520the%2520mainstream%2520of%2520embodied%2520intelligence.%2520Recent%2520VLA%2520models%2520have%2520expanded%2520their%2520input%2520modalities%2520from%25202D-only%2520to%25202D%252B3D%2520paradigms%252C%2520forming%2520multi-visual-modal%2520VLA%2520%2528MVLA%2529%2520models.%2520Despite%2520achieving%2520improved%2520spatial%2520perception%252C%2520MVLA%2520faces%2520a%2520greater%2520acceleration%2520demand%2520due%2520to%2520the%2520increased%2520number%2520of%2520input%2520tokens%2520caused%2520by%2520modal%2520expansion.%2520Token%2520pruning%2520is%2520an%2520effective%2520optimization%2520methods%2520tailored%2520to%2520MVLA%2520models.%2520However%252C%2520existing%2520token%2520pruning%2520schemes%2520are%2520designed%2520for%25202D-only%2520VLA%2520models%252C%2520ignoring%25202D/3D%2520modality%2520salience%2520differences.%2520In%2520this%2520paper%252C%2520we%2520follow%2520the%2520application%2520process%2520of%2520multi-modal%2520data%2520in%2520MVLA%2520models%2520and%2520develop%2520a%2520tri-stage%2520analysis%2520to%2520capture%2520the%2520discrepancy%2520and%2520dynamics%2520of%25202D/3D%2520modality%2520 {"title": "4D-RGPT: Toward Region-level 4D Understanding via Perceptual Distillation", "author": "Chiao-An Yang and Ryo Hachiuma and Sifei Liu and Subhashree Radhakrishnan and Raymond A. Yeh and Yu-Chiang Frank Wang and Min-Hung Chen", "abstract": "Despite advances in Multimodal LLMs (MLLMs), their ability to reason over 3D structures and temporal dynamics remains limited, constrained by weak 4D perception and temporal understanding. Existing 3D and 4D Video Question Answering (VQA) benchmarks also emphasize static scenes and lack region-level prompting. We tackle these issues by introducing: (a) 4D-RGPT, a specialized MLLM designed to capture 4D representations from video inputs with enhanced temporal perception; (b) Perceptual 4D Distillation (P4D), a training framework that transfers 4D representations from a frozen expert model into 4D-RGPT for comprehensive 4D perception; and (c) R4D-Bench, a benchmark for depth-aware dynamic scenes with region-level prompting, built via a hybrid automated and human-verified pipeline. Our 4D-RGPT achieves notable improvements on both existing 4D VQA benchmarks and the proposed R4D-Bench benchmark.", "link": "http://arxiv.org/abs/2512.17012v3", "date": "2026-04-10", "relevancy": 2.9186, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5935}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5935}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5642}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%204D-RGPT%3A%20Toward%20Region-level%204D%20Understanding%20via%20Perceptual%20Distillation&body=Title%3A%204D-RGPT%3A%20Toward%20Region-level%204D%20Understanding%20via%20Perceptual%20Distillation%0AAuthor%3 {"title": "How Noise Benefits AI-generated Image Detection", "author": "Ziqiang Li and Jiazhen Yan and Fan Wang and Kai Zeng and Zhangjie Fu", "abstract": "The rapid advancement of generative models has made real and synthetic images increasingly indistinguishable. Although extensive efforts have been devoted to detecting AI-generated images, out-of-distribution generalization remains a persistent challenge. We trace this weakness to spurious shortcuts exploited during training and we also observe that small feature-space perturbations can mitigate shortcut dominance. To address this problem in a more controllable manner, we propose the Positive-Incentive Noise for CLIP (PiN-CLIP), which jointly trains a noise generator and a detection network under a variational positive-incentive principle. Specifically, we construct positive-incentive noise in the feature space via cross-attention fusion of visual and categorical semantic features. During optimization, the noise is injected into the feature space to fine-tune the visual encoder, suppressing shortcut-sensitive directions while amplifying stable forensic cues, thereby enabling the extraction of more robust and generalized artifact representations. Comparative experiments are conducted on an open-world dataset comprising synthetic images generated by 42 distinct generative models. Our method achieves new state-of-the-art performance, with notable improvements of 5.4 in average accuracy over existing approaches.", "link": "http://arxiv.org/abs/2511.16136v2", "date": "2026-04-10", "relevancy": 2.9005, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6212}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5622}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5569}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20How%20Noise%20Benefits%20AI-generated%20Image%20Detection&body=Title%3A%20How%20Noise%20Benefits%20AI-generated%20Image%20Detection%0AAuthor%3A%20Ziqiang%20Li%20and%20Jiazhen%20Yan%20and%20Fan%20Wang%20and%20Kai%20Zeng%20and%20Zhangjie%20Fu%0AAbstract%3A%20The%20rapid%20advancement%20of%20generative%20models%20has%20made%20real%20and%20synthetic%20images%20increasingly%20indistinguishable.%20Although%20extensive%20efforts%20have%20been%20devoted%20to%20detecting%20AI-generated%20images%2C%20out-of-distribution%20generalization%20remains%20a%20persistent%20challenge.%20We%20trace%20this%20weakness%20to%20spurious%20shortcuts%20exploited%20during%20training%20and%20we%20also%20observe%20that%20small%20feature-space%20perturbations%20can%20mitigate%20shortcut%20dominance.%20To%20address%20this%20problem%20in%20a%20more%20controllable%20manner%2C%20we%20propose%20the%20Positive-Incentive%20Noise%20for%20CLIP%20%28PiN-CLIP%29%2C%20which%20jointly%20trains%20a%20noise%20generator%20and%20a%20detection%20network%20under%20a%20variational%20positive-incentive%20principle.%20Specifically%2C%20we%20construct%20positive-incentive%20noise%20in%20the%20feature%20space%20via%20cross-attention%20fusion%20of%20visual%20and%20categorical%20semantic%20features.%20During%20optimization%2C%20the%20noise%20is%20injected%20into%20the%20feature%20space%20to%20fine-tune%20the%20visual%20encoder%2C%20suppressing%20shortcut-sensitive%20directions%20while%20amplifying%20stable%20forensic%20cues%2C%20thereby%20enabling%20the%20extraction%20of%20more%20robust%20and%20generalized%20artifact%20representations.%20Comparative%20experiments%20are%20conducted%20on%20an%20open-world%20dataset%20comprising%20synthetic%20images%20generated%20by%2042%20distinct%20generative%20models.%20Our%20method%20achieves%20new%20state-of-the-art%20performance%2C%20with%20notable%20improvements%20of%205.4%20in%20averag extraction%2520of%2520more%2520robust%2520and%2520generalized%2520artifact%2520representations.%2520Comparative%2520experiments%2520are%2520conducted%2520on%2520an%2520open-world%2520dataset%2520comprising%2520synthetic%2520images%2520generated%2520by%252042%2520distinct%2520generative%2520models.%2520Our%2520method%2520achieves%2520new%2520state-of-the-art%2520performance%252C%2520with%2520notable%2520improvements%2520of%25205.4%2520in%2520average%2520accuracy%2520over%2520existing%2520approaches.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.16136v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=How%20Noise%20Benefits%20AI-generated%20Image%20Detection&entry.906535625=Ziqiang%20Li%20and%20Jiazhen%20Yan%20and%20Fan%20Wang%20and%20Kai%20Zeng%20and%20Zhangjie%20Fu&entry.1292438233=The%20rapid%20advancement%20of%20generative%20models%20has%20made%20real%20and%20synthetic%20images%20increasingly%20indistinguishable.%20Although%20extensive%20efforts%20have%20been%20devoted%20to%20detecting%20AI-generated%20images%2C%20out-of-distribution%20generalization%20remains%20a%20persistent%20challenge.%20We%20trace%20this%20weakness%20to%20spurious%20shortcuts%20exploited%20during%20training%20and%20we%20also%20observe%20that%20small%20feature-space%20perturbations%20can%20mitigate%20shortcut%20dominance.%20To%20address%20this%20problem%20in%20a%20more%20controllable%20manner%2C%20we%20propose%20the%20Positive-Incentive%20Noise%20for%20CLIP%20%28PiN-CLIP%29%2C%20which%20jointly%20trains%20a%20noise%20generator%20and%20a%20detection%20network%20under%20a%20variational%20positive-incentive%20principle.%20Specifically%2C%20we%20construct%20positive-incentive%20noise%20in%20the%20feature%20space%20via%20cross-attention%20fusion%20of%20visual%20and%20categorical%20semantic%20features.%20During%20optimization%2C%20the%20noise%20is%20injected%20into%20the%20feature%20space%20t {"title": "Arbitration Failure, Not Perceptual Blindness: How Vision-Language Models Resolve Visual-Linguistic Conflicts", "author": "Farhad Nooralahzadeh and Omid Rohanian and Yi Zhang and Jonathan F\u00fcrst and Kurt Stockinger", "abstract": "When a Vision-Language Model (VLM) sees a blue banana and answers \"yellow\", is the problem of perception or arbitration? We explore the question in ten VLMs with various sizes and reveal an Encoding--Grounding Dissociation: models that fail to report what they see (and thus provide a wrong answer) still encode the visual evidence as strongly as models that provide the correct answer. Using Multimodal Arbitration Crossover (MAC) analysis with layer-by-layer Logit Lens probing, we track the competition between visual and prior signals across every layer of each model. We show that visual attributes can be linearly decodable from early layers (AUC > 0.86). The accuracy remains nearly identical for both successful and failed samples. However, the gap in the final-layer logit -- not the strength of encoding -- better predicts grounding outcomes with a correlation of . After having studied when VLMs base their answers on image clues rather than prior knowledge, we want to understand the causal relationships. We establish causality through full-sequence activation patching. The standard last-token interventions in LLM interpretability do not affect VLMs. In contrast, replacing the full token sequence at layers identified by MAC alters 60 to 84% of outputs. Partial-token decomposition shows that image tokens carry almost all of the causal impact, while text tokens have none. Scaling addresses the remaining architectural differences to achieve perfect retention. Moving from diagnosis to intervention, we show that training-free activation steering -- both linear and sparse autoencoder-guided -- in early layers can improve visual grounding by up to +3.8% with degrading performance in some setups. Overall, these findings lead to a clear conclusion: VLMs already see well, but the challenge is acting on what they see. Targeted interventions can help to bridge this gap.", "link": "http://arxiv.org/abs/2604.09364v1", "date": "2026-04-10", "relevancy": 2.8879, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5979}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5979}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5369}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Arbitration%20Failure%2C%20Not%20Perceptual%20Blindness%3A%20How%20Vision-Language%20Models%20Resolve%20Visual-Linguistic%20Conflicts&body=Title%3A%20Arbitration%20Failure%2C%20Not%20Perceptual%20Blindness%3A%20How%20Vision-Language%20Models%20Resolve%20Visual-Linguistic%20Conflicts%0AAuthor%3A%20Farhad%20Nooralahzadeh%20and%20Omid%20Rohanian%20and%20Yi%20Zhang%20and%20Jonathan%20F%C3%BCrst%20and%20Kurt%20Stockinger%0AAbstract%3A%20When%20a%20Vision-Language%20Model%20%28VLM%29%20sees%20a%20blue%20banana%20and%20answers%20%22yellow%22%2C%20is%20the%20problem%20of%20perception%20or%20arbitration%3F%20We%20explore%20the%20question%20in%20ten%20VLMs%20with%20various%20sizes%20and%20reveal%20an%20Encoding--Grounding%20Dissociation%3A%20models%20that%20fail%20to%20report%20what%20they%20see%20%28and%20thus%20provide%20a%20wrong%20answer%29%20still%20encode%20the%20visual%20evidence%20as%20strongly%20as%20models%20that%20provide%20the%20correct%20answer.%20Using%20Multimodal%20Arbitration%20Crossover%20%28MAC%29%20analysis%20with%20layer-by-layer%20Logit%20Lens%20probing%2C%20we%20track%20the%20competition%20between%20visual%20and%20prior%20signals%20across%20every%20layer%20of%20each%20model.%20We%20show%20that%20visual%20attributes%20can%20be%20linearly%20decodable%20from%20early%20layers%20%28AUC%20%3E%200.86%29.%20The%20accuracy%20remains%20nearly%20identical%20for%20both%20successful%20and%20failed%20samples.%20However%2C%20the%20gap%20in%20the%20final-layer%20logit%20--%20not%20the%20strength%20of%20encoding%20--%20better%20predicts%20grounding%20outcomes%20with%20a%20correlation%20of%20.%20After%20having%20studied%20when%20VLMs%20base%20their%20answers%20on%20image%20clues%20rather%20than%20prior%20knowledge%2C%20we%20want%20to%20understand%20the%20causal%20relationships.%20We%20establish%20causality%20through%20full-sequence%20activation%20patching.%20The%20standard%20last-token%20interventions%20in%20LLM%20interpretability%20do%20not%20affect%20VLMs.%20In%20contrast%2C%20replacing%20the%20full%20token%20sequence%20at%20layers%20identified%20by%20MAC%20alters%2060%20to%2084%25%20of%20outputs.%20Partial-token%20decomposition%20shows%20that%20image%20tokens%20carry%20almost%20all%20of%20the%20causal%20impact%2C%20while%20text%20tokens%20have%20none.%20Scaling%20addresses%20the%20remaining%20architectural%20differences%20to%20achieve%20perfect%20retention.%20Moving%20from%20diagnosis%20to%20intervention%2C%20we%20show%20that%20training-free%20activation%20steering%20--%20both%20linear%20and%20sparse%20autoencoder-guided%20--%20in%20early%20layers%20can%20improve%20visual%20grounding%20by%20up%20to%20%2B3.8%25%20with%20degrading%20performance%20in%20some%20setups.%20Overall%2C%20these%20findings%20lead%20to%20a%20clear%20conclusion%3A%20VLMs%20already%20see%20well%2C%20but%20the%20challenge%20is%20acting%20on%20what%20they%20see.%20Targeted%20interventions%20can%20help%20to%20bridge%20this%20gap.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09364v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9Bu {"title": "RAM: Recover Any 3D Human Motion in-the-Wild", "author": "Sen Jia and Ning Zhu and Jinqin Zhong and Jiale Zhou and Huaping Zhang and Jenq-Neng Hwang and Lei Li", "abstract": "RAM incorporates a motion-aware semantic tracker with adaptive Kalman filtering to achieve robust identity association under severe occlusions and dynamic interactions. A memory-augmented Temporal HMR module further enhances human motion reconstruction by injecting spatio-temporal priors for consistent and smooth motion estimation. Moreover, a lightweight Predictor module forecasts future poses to maintain reconstruction continuity, while a gated combiner adaptively fuses reconstructed and predicted features to ensure coherence and robustness. Experiments on in-the-wild multi-person benchmarks such as PoseTrack and 3DPW, demonstrate that RAM substantially outperforms previous state-of-the-art in both Zero-shot tracking stability and 3D accuracy, offering a generalizable paradigm for markerless 3D human motion capture in-the-wild.", "link": "http://arxiv.org/abs/2603.19929v2", "date": "2026-04-10", "relevancy": 2.8632, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5982}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5646}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5551}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RAM%3A%20Recover%20Any%203D%20Human%20Motion%20in-the-Wild&body=Title%3A%20RAM%3A%20Recover%20Any%203D%20Human%20Motion%20in-the-Wild%0AAuthor%3A%20Sen%20Jia%20and%20Ning%20Zhu%20and%20Jinqin%20Zhong%20and%20Jiale%20Zhou%20and%20Huaping%20Zhang%20and%20Jenq-Neng%20Hwang%20and%20Lei%20Li%0AAbstract%3A%20RAM%20incorporates%20a%20motion-aware%20semantic%20tracker%20with%20adaptive%20Kalman%20filtering%20to%20achieve%20robust%20identity%20association%20under%20severe%20occlusions%20and%20dynamic%20interactions.%20A%20memory-augmented%20Temporal%20HMR%20module%20further%20enhances%20human%20motion%20reconstruction%20by%20injecting%20spatio-temporal%20priors%20for%20consistent%20and%20smooth%20motion%20estimation.%20Moreover%2C%20a%20lightweight%20Predictor%20module%20forecasts%20future%20poses%20to%20maintain%20reconstruction%20continuity%2C%20while%20a%20gated%20combiner%20adaptively%20fuses%20reconstructed%20and%20predicted%20features%20to%20ensure%20coherence%20and%20robustness.%20Experiments%20on%20in-the-wild%20multi-person%20benchmarks%20such%20as%20PoseTrack%20and%203DPW%2C%20demonstrate%20that%20RAM%20substantially%20outperforms%20previous%20state-of-the-art%20in%20both%20Zero-shot%20tracking%20stability%20and%203D%20accuracy%2C%20offering%20a%20generalizable%20paradigm%20for%20markerless%203D%20human%20motion%20capture%20in-the-wild.%0ALink%3A%20http%3A//arxiv.org/abs/2603.19929v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRAM%253A%2520Recover%2520Any%25203D%2520Human%2520Motion%2520in-the-Wild%26entry.906535625%3DSen%2520Jia%2520and%2520Ning%2520Zhu%2520and%2520Jinqin%2520Zhong%2520and%2520Jiale%2520Zhou%2520and%2520Huaping%2520Zhang%2520and%2520Jenq-Neng%2520Hwang%2520and%2520Lei%2520Li%26entry.1292438233%3DRAM%2520incorporates%2520a%2520motion-aware%2520semantic%2520tracker%2520with%2520adaptive%2520Kalman%2520filtering%2520to%2520achieve%2520robust%2520identity%2520association%2520under%2520severe%2520occlusions%2520and%2520dynamic%2520interactions.%2520A%2520memory-augmented%2520Temporal%2520HMR%2520module%2520further%2520enhances%2520human%2520motion%2520reconstruction%2520by%2520injecting%2520spatio-temporal%2520priors%2520for%2520consistent%2520and%2520smooth%2520motion%2520estimation.%2520Moreover%252C%2520a%2520lightweight%2520Predictor%2520module%2520forecasts%2520future%2520poses%2520to%2520maintain%2520reconstruction%2520continuity%252C%2520while%2520a%2520gated%2520combiner%2520adaptively%2520fuses%2520reconstructed%2520and%2520predicted%2520features%2520to%2520ensure%2520coherence%2520and%2520robustness.%2520Experiments%2520on%2520in-the-wild%2520multi-person%2520benchmarks%2520such%2520as%2520PoseTrack%2520and%25203DPW%252C%2520demonstrate%2520that%2520RAM%2520substantially%2520outperforms%2520previous%2520state-of-the-art%2520in%2520both%2520Zero-shot%2520tracking%2520stability%2520and%25203D%2520accuracy%252C%2520offering%2520a%2520generalizable%2520paradigm%2520for%2520markerless%25203D%2520human%2520motion%2520capture%2520in-the-wild.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.19929v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=RAM%3A%20Recover%20Any%203D%20Human%20Motion%20in-the-Wild&entry.906535625=Sen%20Jia%20and%20Ning%20Zhu%20and%20Jinqin%20Zhong%20and%20Jiale%20Zhou%20and%20Huaping%20Zhang%20and%20Jenq-Neng%20Hwang%20and%20Lei%20Li&entry.1292438233=RAM%20incorporates%20a%20motion-aware%20semantic%20tracker%20with%20adaptive%20Kalman%20filtering%20to%20achieve%20robust%20identity%20association%20under%20severe%20occlusions%20and%20dynamic%20interactions.%20A%20memory-augmented%20Temporal%20HMR%20module%20further%20enhances%20human%20motion%20reconstruction%20by%20injecting%20spatio-temporal%20priors%20for%20consistent%20and%20smooth%20motion%20estimation.%20Moreover%2C%20a%20lightweight%20Predictor%20module%20forecasts%20future%20poses%20to%20maintain%20reconstruction%20continuity%2C%20while%20a%20gated%20combiner%20adaptively%20fuses%20reconstructed%20and%20predicted%20features%20to%20ensure%20coherence%20and%20robustness.%20Experiments%20on%20in-the-wild%20multi-person%20benchmarks%20such%20as%20PoseTrack%20and%203DPW%2C%20demonstrate%20that%20RAM%20s {"title": "AsymLoc: Towards Asymmetric Feature Matching for Efficient Visual Localization", "author": "Mohammad Omama and Gabriele Berton and Eric Foxlin and Yelin Kim", "abstract": "Precise and real-time visual localization is critical for applications like AR/VR and robotics, especially on resource-constrained edge devices such as smart glasses, where battery life and heat dissipation can be a primary concerns. While many efficient models exist, further reducing compute without sacrificing accuracy is essential for practical deployment. To address this, we propose asymmetric visual localization: a large Teacher model processes pre-mapped database images offline, while a lightweight Student model processes the query image online. This creates a challenge in matching features from two different models without resorting to heavy, learned matchers.\n  We introduce AsymLoc, a novel distillation framework that aligns a Student to its Teacher through a combination of a geometry-driven matching objective and a joint detector-descriptor distillation objective, enabling fast, parameter-less nearest-neighbor matching. Extensive experiments on HPatches, ScanNet, IMC2022, and Aachen show that AsymLoc achieves up to 95% of the teacher's localization accuracy using an order of magnitude smaller models, significantly outperforming existing baselines and establishing a new state-of-the-art efficiency-accuracy trade-off.", "link": "http://arxiv.org/abs/2604.09445v1", "date": "2026-04-10", "relevancy": 2.8595, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6513}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5479}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v iency-accuracy%20trade-off.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09445v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAsymLoc%253A%2520Towards%2520Asymmetric%2520Feature%2520Matching%2520for%2520Efficient%2520Visual%2520Localization%26entry.906535625%3DMohammad%2520Omama%2520and%2520Gabriele%2520Berton%2520and%2520Eric%2520Foxlin%2520and%2520Yelin%2520Kim%26entry.1292438233%3DPrecise%2520and%2520real-time%2520visual%2520localization%2520is%2520critical%2520for%2520applications%2520like%2520AR/VR%2520and%2520robotics%252C%2520especially%2520on%2520resource-constrained%2520edge%2520devices%2520such%2520as%2520smart%2520glasses%252C%2520where%2520battery%2520life%2520and%2520heat%2520dissipation%2520can%2520be%2520a%2520primary%2520concerns.%2520While%2520many%2520efficient%2520models%2520exist%252C%2520further%2520reducing%2520compute%2520without%2520sacrificing%2520accuracy%2520is%2520essential%2520for%2520practical%2520deployment.%2520To%2520address%2520this%252C%2520we%2520propose%2520asymmetric%2520visual%2520localization%253A%2520a%2520large%2520Teacher%2520model%2520processes%2520pre-mapped%2520database%2520images%2520offline%252C%2520while%2520a%2520lightweight%2520Student%2520model%2520processes%2520the%2520query%2520image%2520online.%2520This%2520creates%2520a%2520challenge%2520in%2520matching%2520features%2520from%2520two%2520different%2520models%2520without%2520resorting%2520to%2520heavy%252C%2520learned%2520matchers.%250A%2520%2520We%2520introduce%2520AsymLoc%252C%2520a%2520novel%2520distillation%2520framework%2520that%2520aligns%2520a%2520Student%2520to%2520its%2520Teacher%2520through%2520a%2520combination%2520of%2520a%2520geometry-driven%2520matching%2520objective%2520and%2520a%2520joint%2520detector-descriptor%2520distillation%2520objective%252C%2520enabling%2520fast%252C%2520parameter-less%2520nearest-neighbor%2520matching.%2520Extensive%2520experiments%2520on% {"title": "Adding Another Dimension to Image-based Animal Detection", "author": "Vandita Shukla and Fabio Remondino and Benjamin Risse", "abstract": "Monocular imaging of animals inherently reduces 3D structures to 2D projections. Detection algorithms lead to 2D bounding boxes that lack information about animal's orientation relative to the camera. To build 3D detection methods for RGB animal images, there is a lack of labeled datasets; such labeling processes require 3D input streams along with RGB data. We present a pipeline that utilises Skinned Multi Animal Linear models to estimate 3D bounding boxes and to project them as robust labels into 2D image space using a dedicated camera pose refinement algorithm. To assess which sides of the animal are captured, cuboid face visibility metrics are computed. These 3D bounding boxes and metrics form a crucial step toward developing and benchmarking future monocular 3D animal detection algorithms. We evaluate our method on the Animal3D dataset, demonstrating accurate performance across species and settings.", "link": "http://arxiv.org/abs/2604.09210v1", "date": "2026-04-10", "relevancy": 2.8547, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5824}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.568}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5624}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Adding%20Another%20Dimension%20to%20Image-based%20Animal%20Detection&body=Title%3A%20Adding%20Another%20Dimension%20to%20Image-based%20Animal%20Detection%0AAuthor%3A%20Vandita%20Shukla%20and%20Fabio%20Remondino%20and%20Benjamin%20Risse%0AAbstract%3A%20Monocular%20imaging%20of%20animals%20inherently%20reduces%203D%20structures%20to%202D%20projections.%20Detection%20algorithms%20lead%20to%202D%20bounding%20boxes%20that%20lack%20information%20about%20animal%27s%20orientation%20relative%20to%20the%20camera.%20To%20build%203D%20detection%20methods%20for%20RGB%20animal%20images%2C%20there%20is%20a%20lack%20of%20labeled%20datasets%3B%20such%20labeling%20processes%20require%203D%20input%20streams%20along%20with%20RGB%20data.%20We%20present%20a%20pipeline%20that%20utilises%20Skinned%20Multi%20Animal%20Linear%20models%20to%20estimate%203D%20bounding%20boxes%20and%20to%20project%20them%20as%20robust%20labels%20into%202D%20image%20space%20using%20a%20dedicated%20camera%20pose%20refinement%20algorithm.%20To%20assess%20which%20sides%20of%20the%20animal%20are%20captured%2C%20cuboid%20face%20visibility%20metrics%20are%20computed.%20These%203D%20bounding%20boxes%20and%20metrics%20form%20a%20crucial%20step%20toward%20developing%20and%20benchmarking%20future%20monocular%203D%20animal%20detection%20algorithms.%20We%20evaluate%20our%20method%20on%20the%20Animal3D%20dataset%2C%20demonstrating%20accurate%20performance%20across%20species%20and%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09210v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAdding%2520Another%2520Dimension%2520to%2520Image-based%2520Animal%2520Detection%26entry.906535625%3DVandita%2520Shukla%2520and%2520Fabio%2520Remondino%2520and%2520Benjamin%2520Risse%26entry.1292438233%3DMonocular%2520imaging%2520of%2520animals%2520inherently%2520reduces%25203D%2520structures%2520to%25202D%2520projections.%2520Detection%2520algorithms%2520lead%2520to%25202D%2520bounding%2520boxes%2520that%2520lack%2520information%2520about%2520animal%2527s%2520orientation%2520relative%2520to%2520the%2520camera.%2520To%2520build%25203D%2520detection%2520methods%2520for%2520RGB%2520animal%2520images%252C%2520there%2520is%2520a%2520lack%2520of%252 {"title": "Adaptor: Advancing Assistive Teleoperation with Few-Shot Learning and Cross-Operator Generalization", "author": "Yu Liu and Yihang Yin and Tianlv Huang and Fei Yan and Yuan Xu and Weinan Hong and Wei Han and Yue Cao and Xiangyu Chen and Zipei Fan and Xuan Song", "abstract": "Assistive teleoperation enhances efficiency via shared control, yet inter-operator variability, stemming from diverse habits and expertise, induces highly heterogeneous trajectory distributions that undermine intent recognition stability. We present Adaptor, a few-shot framework for robust cross-operator intent recognition. The Adaptor bridges the domain gap through two stages: (i) preprocessing, which models intent uncertainty by synthesizing trajectory perturbations via noise injection and performs geometry-aware keyframe extraction; and (ii) policy learning, which encodes the processed trajectories with an Intention Expert and fuses them with the pre-trained vision-language model context to condition an Action Expert for action generation. Experiments on real-world and simulated benchmarks demonstrate that Adaptor achieves state-of-the-art performance, improving success rates and efficiency over baselines. Moreover, the method exhibits low variance across operators with varying expertise, demonstrating robust cross-operator generalization.", "link": "http://arxiv.org/abs/2604.09462v1", "date": "2026-04-10", "relevancy": 2.8542, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6055}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5649}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5421}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Adaptor%3A%20Advancing%20Assistive%20Teleoperation%20with%20Few-Shot%20Learning%20a {"title": "Do Vision Language Models Need to Process Image Tokens?", "author": "Sambit Ghosh and R. Venkatesh Babu and Chirag Agarwal", "abstract": "Vision Language Models (VLMs) have achieved remarkable success by integrating visual encoders with large language models (LLMs). While VLMs process dense image tokens across deep transformer stacks (incurring substantial computational overhead), it remains fundamentally unclear whether sustained image-token processing is necessary for their performance or visual representations meaningfully evolve from early to later layers. In this work, we systematically investigate the functional role of image tokens in VLMs and show that visual representations rapidly converge to a bounded-complexity regime, \\ie their entropy stabilizes, intrinsic dimensionality compresses, and trajectory curvature approaches a near-constant profile. In contrast, textual representations continue to undergo substantial restructuring across depth. Once stabilized, visual representations become largely interchangeable between layers, indicating limited additional transformation in deeper stages. Further, depth-wise visual truncation reveals that the necessity of visual processing is task-dependent, where single-token predictions remain comparatively robust to truncated visual depth, but multi-token generation require sustained access to visual representations. Under deterministic decoding, reducing visual depth perturbs intermediate reasoning trajectories more strongly than final outputs, suggesting that image tokens influence the structure of reasoning more than the ultimate conclusions. Collectively, these findings \\textbf{question the assumption} that deeper visual processing is uniformly essential in VLMs, challenging the current paradigm of multimodal LLM architectures.", "link": "http://arxiv.org/abs/2604.09425v1", "date": "2026-04-10", "relevancy": 2.823, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5838}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5838}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5261}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Do%20Vision%20Language%20Models%20Need%20to%20Process%20Image%20Tokens%3F&body=Title%3A%20Do%20Vision%20Language%20Models%20Need%20to%20Process%20Image%20Tokens%3F%0AAuthor%3A%20Sambit%20Ghosh%20and%20R.%20Venkatesh%20Babu%20and%20Chirag%20Agarwal%0AAbstract%3A%20Vision%20Language%20Models%20%28VLMs%29%20have%20achieved%20remarkable%20success%20by%20integrating%20visual%20encoders%20with%20large%20language%20models%20%28LLMs%29.%20While%20VLMs%20process%20dense%20image%20tokens%20across%20deep%20transformer%20stacks%20%28incurring%20substantial%20computational%20overhead%29%2C%20it%20remains%20fundamentally%20unclear%20whether%20sustained%20image-token%20processing%20is%20necessary%20for%20their%20performance%20or%20visual%20representations%20meaningfully%20evolve%20from%20early%20to%20later%20layers.%20In%20this%20work%2C%20we%20systematically%20investigate%20the%20functional%20role%20of%20image%20tokens%20in%20VLMs%20and%20show%20that%20visual%20representations%20rapidly%20converge%20to%20a%20bounded-complexity%20regime%2C%20%5Cie%20their%20entropy%20stabilizes%2C%20intrinsic%20dimensionality%20compresses%2C%20and%20trajectory%20curvature%20approaches%20a%20near-constant%20profile.%20In%20contrast%2C%20textual%20representations%20continue%20to%20undergo%20substantial%20restructuring%20across%20depth.%20Once%20stabilized%2C%20visual%20representations%20become%20largely%20interchangeable%20between%20layers%2C%20indicating%20limited%20additional%20transformation%20in%20deeper%20stages.%20Further%2C%20depth-wise%20visual%20truncation%20reveals%20that%20the%20necessity%20of%20visual%20processing%20is%20task-dependent%2C%20where%20single-token%20predictions%20remain%20comparatively%20robust%20to%20truncated%20visual%20depth%2C%20but%20multi-token%20generation%20require%20sustained%20access%20to%20visual%20representations.%20Under%20deterministic%20decoding%2C%20reducing%20visual%20depth%20perturbs%20intermediate%20reasoning%20trajectories%20more%20strongly%20than%20final%20outputs%2C%20suggesting%20that%20image%20tokens%20influence%20the%20structure%20of%20reasoning%20more%20than%20the%20ultimate%20conclusions.%20Collectively%2C%20these%20findings%20%5Ctextbf%7Bquestion%20the%20assumption%7D%20that%20deeper%20visual%20processing%20is%20uniformly%20essential%20in%20VLMs%2C%20challenging%20the%20current%20paradigm%20of%20multimodal%20LLM%20architectures.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09425v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDo%2520Vision%2520Language%2520Models%2520Need%2520to%2520Process%2520Image%2520Tokens%253F%26entry.906535625%3DSambit%2520Ghosh%2520and%2520R.%2520Venkatesh%2520Babu%2520and%2520Chirag%2520Agarwal%26entry.1292438233%3DVision%2520Language%2520Models%2520%2528VLMs%2529%2520have%2520achieved%2520remarkable%2520success%2520by%2520integrating%2520visual%2520encoders%2520with%2520large%2520language%2520models%2520%2528LLMs%2529.%2520While%2520VLMs%2520process%2520dense%2520image%2520tokens%2520across%2520deep%2520transformer%2520stacks%2520%2528incurring%2520substantial%2520computational%2520overhead%2529%252C%2520it%2520remains%2520fundamentally%2520unclear%2520whether%2520sustained%2520image-token%2520processing%2520is%2520necessary%2520for%2520their%2520performance%2520or%2520visual%2520representations%2520meaningfully%2520evolve%2520from%2520early%2520to%2520later%2520layers.%2520In%2520this%2520work%252C%2520we%2520systematically%2520inv {"title": "Three Modalities, Two Design Probes, One Prototype, and No Vision: Experience-Based Co-Design of a Multi-modal 3D Data Visualization Tool", "author": "Sanchita S. Kamath and Aziz N Zeidieh and Venkatesh Potluri and Sile O'Modhrain and Kenneth Perry and JooYoung Seo", "abstract": "Three-dimensional (3D) data visualizations, such as surface plots, are vital in STEM fields from biomedical imaging to spectroscopy, yet remain largely inaccessible to blind and low-vision (BLV) people. To address this gap, we conducted an Experience-Based Co-Design with BLV co-designers with expertise in non-visual data representations to create an accessible, multi-modal, web-native visualization tool. Using a multi-phase methodology, our team of five BLV and one non-BLV researcher(s) participated in two iterative sessions, comparing a low-fidelity tactile probe with a high-fidelity digital prototype. This process produced a prototype with empirically grounded features, including reference sonification, stereo and volumetric audio, and configurable buffer aggregation, which our co-designers validated as improving analytic accuracy and learnability. In this study, we target core analytic tasks essential for non-visual 3D data exploration: orientation, landmark and peak finding, comparing local maxima versus global trends, gradient tracing, and identifying occluded or partially hidden features. Our work offers accessibility researchers and developers a co-design protocol for translating tactile knowledge to digital interfaces, concrete design guidance for future systems, and opportunities to extend accessible 3D visualization into embodied data environments.", "link": "http://arxiv.org/abs/2604.09426v1", "date": "2026-04-10", "relevancy": 2.7857, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5681}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5681}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5353}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Three%20Modalities%2C%20Two%20Design%20Probes%2C%20One%20Prototype%2C%20and%20No%20Vision%3A%20Experience-Based%20Co-Design%20of%20a%20Multi-modal%203D%20Data%20Visualization%20Tool&body=Title%3A%20Three%20Modalities%2C%20Two%20Design%20Probes%2C%20One%20Prototype%2C%20and%20No%20Vision%3A%20Experience-Based%20Co-Design%20of%20a%20Multi-modal%203D%20Data%20Visualization%20Tool%0AAuthor%3A%20Sanchita%20S.%20Kamath%20and%20Aziz%20N%20Zeidieh%20and%20Venkatesh%20Potluri%20and%20Sile%20O%27Modhrain%20and%20Kenneth%20Perry%20and%20JooYoung%20Seo%0AAbstract%3A%20Three-dimensional%20%283D%29%20data%20visualizations%2C%20such%20as%20surface%20plots%2C%20are%20vital%20in%20STEM%20fields%20from%20biomedical%20imaging%20to%20spectroscopy%2C%20yet%20remain%20largely%20inaccessible%20to%20blind%20and%20low-vision%20%28BLV%29%20people.%20To%20address%20this%20gap%2C%20we%20conducted%20an%20Experience-Based%20Co-Design%20with%20BLV%20co-designers%20with%20expertise%20in%20non-visual%20data%20representations%20to%20create%20an%20accessible%2C%20multi-modal%2C%20web-native%20visualization%20tool.%20Using%20a%20multi-phase%20methodology%2C%20our%20team%20of%20five%20BLV%20and%20one%20non-BLV%20researcher%28s%29%20participated%20in%20two%20iterative%20sessions%2C%20comparing%20a%20low-fidelity%20tactile%20probe%20with%20a%20high-fidelity%20digital%20prototype.%20This%20process%20produced%20a%20prototype%20with%20empirically%20grounded%20features%2C%20including%20reference%20sonification%2C%20stereo%20and%20volumetric%20audio%2C%20and%20configurable%20buffer%20aggregation%2C%20which%20our%20co-designers%20validated%20as%20improving%20analytic%20accuracy%20and%20learnability.%20In%20th

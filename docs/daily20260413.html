{"title": "Globally Optimal Pose from Orthographic Silhouettes", "author": "Agniva Sengupta and Dilara Ku\u015f and Jianning Li and Stefan Zachow", "abstract": "We solve the problem of determining the pose of known shapes in $\\mathbb{R}^3$ from their unoccluded silhouettes. The pose is determined up to global optimality using a simple yet under-explored property of the area-of-silhouette: its continuity w.r.t trajectories in the rotation space. The proposed method utilises pre-computed silhouette-signatures, modelled as a response surface of the area-of-silhouettes. Querying this silhouette-signature response surface for pose estimation leads to a strong branching of the rotation search space, making resolution-guided candidate search feasible. Additionally, we utilise the aspect ratio of 2D ellipses fitted to projected silhouettes as an auxiliary global shape signature to accelerate the pose search. This combined strategy forms the first method to efficiently estimate globally optimal pose from just the silhouettes, without being guided by correspondences, for any shape, irrespective of its convexity and genus. We validate our method on synthetic and real examples, demonstrating significantly improved accuracy against comparable approaches.\n  Code, data, and supplementary in: https://agnivsen.github.io/pose-from-silhouette/", "link": "http://arxiv.org/abs/2604.09199v1", "date": "2026-04-10", "relevancy": 2.19, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5721}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5331}, {"title": "Total Selfie: Generating Full-Body Selfies", "link": "http://arxiv.org/abs/2308.14740v2", "similarity": 0.5218}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Globally%20Optimal%20Pose%20from%20Orthographic%20Silhouettes&body=Ti .09199v1&entry.124074799=Read"},
{"title": "UniSemAlign: Text-Prototype Alignment with a Foundation Encoder for Semi-Supervised Histopathology Segmentation", "author": "Le-Van Thai and Tien Dat Nguyen and Hoai Nhan Pham and Lan Anh Dinh Thi and Duy-Dong Nguyen and Ngoc Lam Quang Bui", "abstract": "Semi-supervised semantic segmentation in computational pathology remains challenging due to scarce pixel-level annotations and unreliable pseudo-label supervision. We propose UniSemAlign, a dual-modal semantic alignment framework that enhances visual segmentation by injecting explicit class-level structure into pixel-wise learning. Built upon a pathology-pretrained Transformer encoder, UniSemAlign introduces complementary prototype-level and text-level alignment branches in a shared embedding space, providing structured guidance that reduces class ambiguity and stabilizes pseudo-label refinement. The aligned representations are fused with visual predictions to generate more reliable supervision for unlabeled histopathology images. The framework is trained end-to-end with supervised segmentation, cross-view consistency, and cross-modal alignment objectives. Extensive experiments on the GlaS and CRAG datasets demonstrate that UniSemAlign substantially outperforms recent semi-supervised baselines under limited supervision, achieving Dice improvements of up to 2.6% on GlaS and 8.6% on CRAG with only 10% labeled data, and strong improvements at 20% supervision. Code is available at: https://github.com/thailevann/UniSemAlign", "link": "http://arxiv.org/abs/2604.09169v1", "date": "2026-04-10", "relevancy": 2.1855, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5806}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5241}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5166}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20UniSemAlign%3A%20Text-Prototype%20Alignment%20with%20a%20Foundation%20Encoder%20for%20Semi-Supervised%20Histopathology%20Segmentation&body=Title%3A%20UniSemAlign%3A%20Text-Prototype%20Alignment%20with%20a%20Foundation%20Encoder%20for%20Semi-Supervised%20Histopathology%20Segmentation%0AAuthor%3A%20Le-Van%20Thai%20and%20Tien%20Dat%20Nguyen%20and%20Hoai%20Nhan%20Pham%20and%20Lan%20Anh%20Dinh%20Thi%20and%20Duy-Dong%20Nguyen%20and%20Ngoc%20Lam%20Quang%20Bui%0AAbstract%3A%20Semi-supervised%20semantic%20segmentation%20in%20computational%20pathology%20remains%20challenging%20due%20to%20scarce%20pixel-level%20annotations%20and%20unreliable%20pseudo-label%20supervision.%20We%20propose%20UniSemAlign%2C%20a%20dual-modal%20semantic%20alignment%20framework%20that%20enhances%20visual%20segmentation%20by%20injecting%20explicit%20class-level%20structure%20into%20pixel-wise%20learning.%20Built%20upon%20a%20pathology-pretrained%20Transformer%20encoder%2C%20UniSemAlign%20introduces%20complementary%20prototype-level%20and%20text-level%20alignment%20branches%20in%20a%20shared%20embedding%20space%2C%20providing%20structured%20guidance%20that%20reduces%20class%20ambiguity%20and%20stabilizes%20pseudo-label%20refinement.%20The%20aligned%20representations%20are%20fused%20with%20visual%20predictions%20to%20generate%20more%20reliable%20supervision%20for%20unlabeled%20histopathology%20images.%20The%20framework%20is%20trained%20end-to-end%20with%20supervised%20segmentation%2C%20cross-view%20consistency%2C%20and%20cross-modal%20alignment%20objectives.%20Extensive%20experiments%20on%20the%20GlaS%20and%20CRAG%20datasets%20demonstrate%20that%20UniSemAlign%20substantially%20outperforms%20recent%20semi-supervised%20baselines%20under%20limited%20supervision%2C%20achieving%20Dice%20improvements%20of%20up%20to%202.6%25%20on%20GlaS%20and%208.6%25%20on%20CRAG%20with%20only%2010%25%20labeled%20data%2C%20and%20strong%20improvements%20at%2020%25%20supervision.%20Code%20is%20available%20at%3A%20https%3A//github.com/thailevann/UniSemAlign%0ALink%3A%20http%3A//arxiv.org/abs/2604.09169v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUniSemAlign%253A%2520Text-Prototype%2520Alignment%2520with%2520a%2520Foundation%2520Encoder%2520for%2520Semi-Supervised%2520Histopathology%2520Segmentation%26entry.906535625%3DLe-Van%2520Thai%2520and%2520Tien%2520Dat%2520Nguyen%2520and%2520Hoai%2520Nhan%2520Pham%2520and%2520Lan%2520Anh%2520Dinh%2520Thi%2520and%2520Duy-Dong%2520Nguyen%2520and%2520Ngoc%2520Lam%2520Quang%2520Bui%26entry.1292438233%3DSemi-supervised%2520semantic%2520segmentation%2520in%2520computational%2520pathology%2520remains%2520challenging%2520due%2520to%2520scarce%2520pixel-level%2520annotations%2520and%2520unreliable%2520pseudo-label%2520supervision.%2520We%2520propose%2520UniSemAlign%252C%2520a%2520dual-modal%2520semantic%2520alignment%2520framework%2520that%2520enhances%2520visual%2520segmentation%2520by%2520injecting%2520explicit%2520class-level%2520structure%2520into%2520pixel-wise%2520learning.%2520Built%2520upon%2520a%2520pathology-pretrained%2520Transformer%2520encoder%252C%2520UniSemAlign%2520introduces%2520complementary%2520prototype-level%2520and%2520text-level%2520alignment%2520branches%2520in%2520a%2520shared%2520embedding%2520space%252C%2520providing%2520structured%2520guidance%2520that%2520reduces%2520class%2520ambiguity%2520and%2520stabilizes%2520pseudo-label%2520refinement.%2520The%2520aligned%2520representations%2520are%2520fused%2520with%2520visual%2520predictions%2520to%2520generate%2520more%2520reliable%2520supervision%2520for%2520unlabeled%2520histopathology%2520images.%2520The%2520framework%2520is%2520trained%2520end-to-end%2520with%2520supervised%2520segmentation%252C%2520cross-view%2520consistency {"title": "Neural Distribution Prior for LiDAR Out-of-Distribution Detection", "author": "Zizhao Li and Zhengkang Xiang and Jiayang Ao and Feng Liu and Joseph West and Kourosh Khoshelham", "abstract": "LiDAR-based perception is critical for autonomous driving due to its robustness to poor lighting and visibility conditions. Yet, current models operate under the closed-set assumption and often fail to recognize unexpected out-of-distribution (OOD) objects in the open world. Existing OOD scoring functions exhibit limited performance because they ignore the pronounced class imbalance inherent in LiDAR OOD detection and assume a uniform class distribution. To address this limitation, we propose the Neural Distribution Prior (NDP), a framework that models the distributional structure of network predictions and adaptively reweights OOD scores based on alignment with a learned distribution prior. NDP dynamically captures the logit distribution patterns of training data and corrects class-dependent confidence bias through an attention-based module. We further introduce a Perlin noise-based OOD synthesis strategy that generates diverse auxiliary OOD samples from input scans, enabling robust OOD training without external datasets. Extensive experiments on the SemanticKITTI and STU benchmarks demonstrate that NDP substantially improves OOD detection performance, achieving a point-level AP of 61.31\\% on the STU test set, which is more than 10$\\times$ higher than the previous best result. Our framework is compatible with various existing OOD scoring formulations, providing an effective solution for open-world LiDAR perception.", "link": "http://arxiv.org/abs/2604.09232v1", "date": "2026-04-10", "relevancy": 2.1842, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.55}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5468}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5343}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Neural%20Distribution%20Prior%20for%20LiDAR%20Out-of-Distribution%20Detection&body=Title%3A%20Neural%20Distribution%20Prior%20for%20LiDAR%20Out-of-Distribution%20Detection%0AAuthor%3A%20Zizhao%20Li%20and%20Zhengkang%20Xiang%20and%20Jiayang%20Ao%20and%20Feng%20Liu%20and%20Joseph%20West%20and%20Kourosh%20Khoshelham%0AAbstract%3A%20LiDAR-based%20perception%20is%20critical%20for%20autonomous%20driving%20due%20to%20its%20robustness%20to%20poor%20lighting%20and%20visibility%20conditions.%20Yet%2C%20current%20models%20operate%20under%20the%20closed-set%20assumption%20and%20often%20fail%20to%20recognize%20unexpected%20out-of-distribution%20%28OOD%29%20objects%20in%20the%20open%20world.%20Existing%20OOD%20scoring%20functions%20exhibit%20limited%20performance%20because%20they%20ignore%20the%20pronounced%20class%20imbalance%20inherent%20in%20LiDAR%20OOD%20detection%20and%20assume%20a%20uniform%20class%20distribution.%20To%20address%20this%20limitation%2C%20we%20propose%20the%20Neural%20Distribution%20Prior%20%28NDP%29%2C%20a%20framework%20that%20models%20the%20distributional%20structure%20of%20network%20predictions%20and%20adaptively%20reweights%20OOD%20scores%20based%20on%20alignment%20with%20a%20learned%20distribution%20prior.%20NDP%20dynamically%20captures%20the%20logit%20distribution%20patterns%20of%20training%20data%20and%20corrects%20class-dependent%20confidence%20bias%20through%20an%20attention-based%20module.%20We%20further%20introduce%20a%20Perlin%20noise-based%20OOD%20synthesis%20strategy%20that%20generates%20diverse%20auxiliary%20OOD%20samples%20from%20input%20scans%2C%20enabling%20robust%20OOD%20training%20without%20external%20datasets.%20Extensive%20experiments%20on%20the%20SemanticKITTI%20and%20STU%20benchmarks%20demonstrate%20that%20NDP%20substantially%20improves%20OOD%20detection%20performance%2C%20achieving%20a%20point-level%20AP%20of%2061.31%5C%25%20on%20the%20STU%20test%20set%2C%20which%20is%20more%20than%2010%24%5Ctimes%24%20higher%20than%20the%20previous%20best%20result.%20Our%20framework%20is%20compatible%20with%20various%20existing%20OOD%20scoring%20formulations%2C%20providing%20an%20effective%20solution%20for%20open-world%20LiDAR%20perception.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09232v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNeural%2520Distribution%2520Prior%2520for%2520LiDAR%2520Out-of-Distribution%2520Detection%26entry.906535625%3DZizhao%2520Li%2520and%2520Zhengkang%2520Xiang%2520and%2520Jiayang%2520Ao%2520and%2520Feng%2520Liu%2520and%2520Joseph%2520West%2520and%2520Kourosh%2520Khoshelham%26entry.1292438233%3DLiDAR-based%2520perception%2520is%2520critical%2520for%2520autonomous%2520driving%2520due%2520to%2520its%2520robustness%2520to%2520poor%2520lighting%2520and%2520visibility%2520conditions.%2520Yet%252C%2520current%2520models%2520operate%2520under%2520the%2520closed-set%2520assumption%2520and%2520often%2520fail%2520to%2520recognize%2520unexpected%2520out-of-distribution%2520%2528OOD%2529%2520objects%2520in%2520the%2520open%2520world.%2520Existing%2520OOD%2520scoring%2520functions%2520exhibit%2520limited%2520performance%2520because%2520they%2520ignore%2520the%2520pronounced%2520class%2520imbalance%2520inherent%2520in%2520LiDAR%2520OOD%2520detection%2520and%2520assume%2520a%2520uniform%2520class%2520distribution.%2520To%2520address%2520this%2520limitation%252C%2520we%2520propose%2520the%2520Neural%2520Distribution%2520Prior%2520%2528NDP%2529%252C%2520a%2520framework%2520that%2520models%2520the%2520distributional%2520structure%2520of%2520network%2520predictions%2520and%2520adaptively%2520reweights%2520OOD%2520scores%2520based%2520on%2520alignment%2520with%2520a%2520learned%2520distribution%2520prior.%2520NDP%2520dynamically%2520captures%2520the%2520logit%2520distribution%2520patterns%2520of%2520training%2520data%2520and%2520corrects%2520class-dependent%2520confidence%2520bias%2520through%2520an%2520attention-based%2520module.%2520We%2520further%2520introduce%2520a%2520Perlin%2520noise-based%2520OOD%2520synthesis%2520strategy%2520that%2520generates%2520diverse%2520auxiliary%2520OOD%2520samples%2520from%2520input%2520scans%252C%2520enabling%2520robust%2520OOD%2520training%2520without%2520external%2520datasets.%2520Extensive%2520experiments%2520on%2520the%2520SemanticKITTI%2520and%2520STU%2520benchmarks%2520demonstrate%2520that%2520NDP%2520substantially%2520improves%2520OOD%2520detection%2520performance%252C%2520achieving%2520a%2520point-level%2520AP%2520of%252061.31%255C%2525%2520on%2520the%2520STU%2520test%2520set%252C%2520which%2520is%2520more%2520than%252010%2524%255Ctimes%2524%2520higher%2520than%2520the%2520previous%2520best%2520result.%2520Our%2520framework%2520is%2520compatible%2520with%2520various%2520existing%2520OOD%2520scoring%2520formulations%252C%2520providing%2520an%2520effective%2520solution%2520for%2520open-world%2520LiDAR%2520perception.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.09232v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Neural%20Distribution%20Prior%20for%20LiDAR%20Out-of-Distribution%20Detection&entry.906535625=Zizhao%20Li%20and%20Zhengkang%20Xiang%20and%20Jiayang%20Ao%20and%20Feng%20Liu%20and%20Joseph%20West%20and%20Kourosh%20Khoshelham&entry.1292438233=LiDAR-based%20perception%20is%20critical%20for%20autonomous%20driving%20due%20to%20its%20robustness%20to%20poor%20lighting%20and%20visibility%20conditions.%20Yet%2C%20current%20models%20operate%20under%20the%20closed-set%20assumption%20and%20often%20fail%20to {"title": "FlashLips: 100-FPS Mask-Free Latent Lip-Sync using Reconstruction Instead of Diffusion or GANs", "author": "Andreas Zinonos and Micha\u0142 Stypu\u0142kowski and Antoni Bigata and Stavros Petridis and Maja Pantic and Nikita Drobyshev", "abstract": "We present FlashLips, a two-stage, mask-free lip-sync system that decouples lips control from rendering and achieves real-time performance, with our U-Net variant running at over 100 FPS on a single GPU, while matching the visual quality of larger state-of-the-art models. Stage 1 is a compact, one-step latent-space editor that reconstructs an image using a reference identity, a masked target frame, and a low-dimensional lips-pose vector, trained purely with reconstruction losses - no GANs or diffusion. To remove explicit masks at inference, we use self-supervision via mouth-altered target variants as pseudo ground truth, teaching the network to localize lip edits while preserving the rest. Stage 2 is an audio-to-pose transformer trained with a flow-matching objective to predict lips-pose vectors from speech. Together, these stages form a simple and stable pipeline that combines deterministic reconstruction with robust audio control, delivering high perceptual quality and faster-than-real-time speed.", "link": "http://arxiv.org/abs/2512.20033v2", "date": "2026-04-10", "relevancy": 2.1786, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5513}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5476}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5368}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FlashLips%3A%20100-FPS%20Mask-Free%20Latent%20Lip-Sync%20using%20Reconstruction%20Instead%20of%20Diffusion%20or%20GANs&body=Title%3A%20FlashLips%3A%20100-FPS%20Mask-Free%20Latent%20Lip-Sync%20using%20Reconstruction%20Instead%20of%20Diffusion%20or%20GANs%0AAuthor%3A%20Andreas%20Zinonos%20and%20Micha%C5%82%20Stypu%C5%82kowski%20and%20Antoni%20Bigata%20and%20Stavros%20Petridis%20and%20Maja%20Pantic%20and%20Nikita%20Drobyshev%0AAbstract%3A%20We%20present%20FlashLips%2C%20a%20two-stage%2C%20mask-free%20lip-sync%20system%20that%20decouples%20lips%20control%20from%20rendering%20and%20achieves%20real-time%20performance%2C%20with%20our%20U-Net%20variant%20running%20at%20over%20100%20FPS%20on%20a%20single%20GPU%2C%20while%20matching%20the%20visual%20quality%20of%20larger%20state-of-the-art%20models.%20Stage%201%20is%20a%20compact%2C%20one-step%20latent-space%20editor%20that%20reconstructs%20an%20image%20using%20a%20reference%20identity%2C%20a%20masked%20target%20frame%2C%20and%20a%20low-dimensional%20lips-pose%20vector%2C%20trained%20purely%20with%20reconstruction%20losses%20-%20no%20GANs%20or%20diffusion.%20To%20remove%20explicit%20masks%20at%20inference%2C%20we%20use%20self-supervision%20via%20mouth-altered%20target%20variants%20as%20pseudo%20ground%20truth%2C%20teaching%20the%20network%20to%20localize%20lip%20edits%20while%20preserving%20the%20rest.%20Stage%202%20is%20an%20audio-to-pose%20transformer%20trained%20with%20a%20flow-matching%20objective%20to%20predict%20lips-pose%20vectors%20from%20speech.%20Together%2C%20these%20stages%20form%20a%20simple%20and%20stable%20pipeline%20that%20combines%20deterministic%20reconstruction%20with%20robust%20audio%20control%2C%20delivering%20high%20perceptual%20quality%20and%20faster-than-real-time%20speed.%0ALink%3A%20http%3A//arxiv.org/abs/2512.20033v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFlashLips%253A%2520100-FPS%2520Mask-Free%2520Latent%2520Lip-Sync%2520using%2520Reconstruction%2520Instead%2520of%2520Diffusion%2520or%2520GANs%26entry.906535625%3DAndreas%2 {"title": "EgoTL: Egocentric Think-Aloud Chains for Long-Horizon Tasks", "author": "Lulin Liu and Dayou Li and Yiqing Liang and Sicong Jiang and Hitesh Vijay and Hezhen Hu and Xuhai Xu and Zirui Liu and Srinivas Shakkottai and Manling Li and Zhiwen Fan", "abstract": "Large foundation models have made significant advances in embodied intelligence, enabling synthesis and reasoning over egocentric input for household tasks. However, VLM-based auto-labeling is often noisy because the primary data sources lack accurate human action labels, chain-of-thought (CoT), and spatial annotations; these errors are amplified during long-horizon spatial instruction following. These issues stem from insufficient coverage of minute-long, daily household planning tasks and from inaccurate spatial grounding. As a result, VLM reasoning chains and world-model synthesis can hallucinate objects, skip steps, or fail to respect real-world physical attributes. To address these gaps, we introduce EgoTL. EgoTL builds a think-aloud capture pipeline for egocentric data. It uses a say-before-act protocol to record step-by-step goals and spoken reasoning with word-level timestamps, then calibrates physical properties with metric-scale spatial estimators, a memory-bank walkthrough for scene context, and clip-level tags for navigation instructions and detailed manipulation actions. With EgoTL, we are able to benchmark VLMs and World Models on six task dimensions from three layers and long-horizon generation over minute-long sequences across over 100 daily household tasks. We find that foundation models still fall short as egocentric assistants or open-world simulators. Finally, we finetune foundation models with human CoT aligned with metric labels on the training split of EgoTL, which improves long-horizon planning and reasoning, step-wise reasoning, instruction following, and spatial grounding.", "link": "http://arxiv.org/abs/2604.09535v1", "date": "2026-04-10", "relevancy": 2.1696, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5566}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5396}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5396}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EgoTL%3A%20Egocentric%20Think-Aloud%20Chains%20for%20Long-Horizon%20Tasks&body=Title%3A%20EgoTL%3A%20Egocentric%20Think-Aloud%20Chains%20for%20Long-Horizon%20Tasks%0AAuthor%3A%20Lulin%20Liu%20and%20Dayou%20Li%20and%20Yiqing%20Liang%20and%20Sicong%20Jiang%20and%20Hitesh%20Vijay%20and%20Hezhen%20Hu%20and%20Xuhai%20Xu%20and%20Zirui%20Liu%20and%20Srinivas%20Shakkottai%20and%20Manling%20Li%20and%20Zhiwen%20Fan%0AAbstract%3A%20Large%20foundation%20models%20have%20made%20significant%20advances%20in%20embodied%20intelligence%2C%20enabling%20synthesis%20and%20reasoning%20over%20egocentric%20input%20for%20household%20tasks.%20However%2C%20VLM-based%20auto-labeling%20is%20often%20noisy%20because%20the%20primary%20data%20sources%20lack%20accurate%20human%20action%20labels%2C%20chain-of-thought%20%28CoT%29%2C%20and%20spatial%20annotations%3B%20these%20errors%20are%20amplified%20during%20long-horizon%20spatial%20instruction%20following.%20These%20issues%20stem%20from%20insufficient%20coverage%20of%20minute-long%2C%20daily%20household%20planning%20tasks%20and%20from%20inaccurate%20spatial%20grounding.%20As%20a%20result%2C%20VLM%20reasoning%20chains%20and%20world-model%20synthesis%20can%20hallucinate%20objects%2C%20skip%20steps%2C%20or%20fail%20to%20respect%20real-world%20physical%20attributes.%20To%20address%20these%20gaps%2C%20we%20introduce%20EgoTL.%20EgoTL%20builds%20a%20think-aloud%20capture%20pipeline%20for%20egocentric%20data.%20It%20uses%20a%20say-before-act%20protocol%20to%20record%20step-by-step%20goals%20and%20spoken%20reasoning%20with%20word-level%20timestamps%2C%20then%20calibrates%20physical%20properties%20with%20metric-scale%20spatial%20estimators%2C%20a%20memory-bank%20walkthrough%20for%20scene%20context%2C%20and%20clip-level%20tags%20for%20navigation%20instructions%20and%20detailed%20manipulation%20actions.%20With%20EgoTL%2C%20we%20are%20able%20to%20benchmark%20VLMs%20and%20World%20Models%20on%20six%20task%20dimensions%20from%20three%20layers%20and%20long-horizon%20generation%20over%20minute-long%20sequences%20across%20over%20100%20daily%20household%20tasks.%20We%20find%20that%20foundation%20models%20still%20fall%20short%20as%20egocentric%20assistants%20or%20open-world%20simulators.%20Finally%2C%20we%20finetune%20foundation%20models%20with%20human%20CoT%20aligned%20with%20metric%20labels%20on%20the%20training%20split%20of%20EgoTL%2C%20which%20improves%20long-horizon%20planning%20and%20reasoning%2C%20step-wise%20reasoning%2C%20instruction%20following%2C%20and%20spatial%20grounding.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09535v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEgoTL%253A%2520Egocentric%2520Think-Aloud%2520Chains%2520for%2520Long-Horizon%2520Tasks%26entry.906535625%3DLulin%2520Liu%2520and%2520Dayou%2520Li%2520and%2520Yiqing%2520Liang%2520and%2520Sicong%2520Jiang%2520and%2520Hitesh%2520Vijay%2520and%2520Hezhen%2520Hu%2520and%2520Xuhai%2520Xu%2520and%2520Zirui%2520Liu%2520and%2520Srinivas%2520Shakkottai%2520and%2520Manling%2520Li%2520and%2520Zhiwen%2520Fan%26entry.1292438233%3DLarge%2520foundation%2520models%2520have%2520made%2520significant%2520advances%2520in%2520embodied%2520intelligence%252C%2520enabling%2520synthesis%2520and%2520reasoning%2520over%2520egocentric%2520input%2520for%2520household%2520tasks.%2520However%252C%2520VLM-based%2520auto-labeling%2520is%2520often% {"title": "SyncBreaker:Stage-Aware Multimodal Adversarial Attacks on Audio-Driven Talking Head Generation", "author": "Wenli Zhang and Xianglong Shi and Sirui Zhao and Xinqi Chen and Guo Cheng and Yifan Xu and Tong Xu and Yong Liao", "abstract": "Diffusion-based audio-driven talking-head generation enables realistic portrait animation, but also introduces risks of misuse, such as fraud and misinformation. Existing protection methods are largely limited to a single modality, and neither image-only nor audio-only attacks can effectively suppress speech-driven facial dynamics. To address this gap, we propose SyncBreaker, a stage-aware multimodal protection framework that jointly perturbs portrait and audio inputs under modality-specific perceptual constraints. Our key contributions are twofold. First, for the image stream, we introduce nullifying supervision with Multi-Interval Sampling (MIS) across diffusion stages to steer the generation toward the static reference portrait by aggregating guidance from multiple denoising intervals. Second, for the audio stream, we propose Cross-Attention Fooling (CAF), which suppresses interval-specific audio-conditioned cross-attention responses. Both streams are optimized independently and combined at inference time to enable flexible deployment. We evaluate SyncBreaker in a white-box proactive protection setting. Extensive experiments demonstrate that SyncBreaker more effectively degrades lip synchronization and facial dynamics than strong single-modality baselines, while preserving input perceptual quality and remaining robust under purification. Code: https://github.com/kitty384/SyncBreaker.", "link": "http://arxiv.org/abs/2604.08405v2", "date": "2026-04-10", "relevancy": 2.1696, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5439}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": " {"title": "LuMon: A Comprehensive Benchmark and Development Suite with Novel Datasets for Lunar Monocular Depth Estimation", "author": "Ayta\u00e7 Sekmen and Fatih Emre Gunes and Furkan Horoz and H\u00fcseyin Umut I\u015f\u0131k and Mehmet Alp Ozaydin and Onur Altay Topaloglu and \u015eahin Umutcan \u00dcst\u00fcnda\u015f and Yurdasen Alp Yeni and Halil Ersin Soken and Erol Sahin and Ramazan Gokberk Cinbis and Sinan Kalkan", "abstract": "Monocular Depth Estimation (MDE) is crucial for autonomous lunar rover navigation using electro-optical cameras. However, deploying terrestrial MDE networks to the Moon brings a severe domain gap due to harsh shadows, textureless regolith, and zero atmospheric scattering. Existing evaluations rely on analogs that fail to replicate these conditions and lack actual metric ground truth. To address this, we present LuMon, a comprehensive benchmarking framework to evaluate MDE methods for lunar exploration. We introduce novel datasets featuring high-quality stereo ground truth depth from the real Chang'e-3 mission and the CHERI dark analog dataset. Utilizing this framework, we conduct a systematic zero-shot evaluation of state-of-the-art architectures across synthetic, analog, and real datasets. We rigorously assess performance against mission critical challenges like craters, rocks, extreme shading, and varying depth ranges. Furthermore, we establish a sim-to-real domain adaptation baseline by fine tuning a foundation model on synthetic data. While this adaptation yields drastic in-domain performance gains, it exhibits minimal generalization to authentic lunar imagery, highlighting a persistent cross-domain transfer gap. Our extensive analysis reveals the inherent limitations of current networks and sets a standard foundation to guide future advancements in extraterrestrial perception and domain adaptation.", "link": "http://arxiv.org/abs/2604.09352v1", "date": "2026-04-10", "relevancy": 2.1589, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5537}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5369}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5369}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20LuMon%3A%20A%20Comprehensive%20Benchmark%20and%20Development%20Suite%20with%20Novel%20Datasets%20for%20Lunar%20Monocular%20Depth%20Estimation&body=Title%3A%20LuMon%3A%20A%20Comprehensive%20Benchmark%20and%20Development%20Suite%20with%20Novel%20Datasets%20for%20Lunar%20Monocular%20Depth%20Estimation%0AAuthor%3A%20Ayta%C3%A7%20Sekmen%20and%20Fatih%20Emre%20Gunes%20and%20Furkan%20Horoz%20and%20H%C3%BCseyin%20Umut%20I%C5%9F%C4%B1k%20and%20Mehmet%20Alp%20Ozaydin%20and%20Onur%20Altay%20Topaloglu%20and%20%C5%9Eahin%20Umutcan%20%C3%9Cst%C3%BCnda%C5%9F%20and%20Yurdasen%20Alp%20Yeni%20and%20Halil%20Ersin%20Soken%20and%20Erol%20Sahin%20and%20Ramazan%20Gokberk%20Cinbis%20and%20Sinan%20Kalkan%0AAbstract%3A%20Monocular%20Depth%20Estimation%20%28MDE%29%20is%20crucial%20for%20autonomous%20lunar%20rover%20navigation%20using%20electro-optical%20cameras.%20However%2C%20deploying%20terrestrial%20MDE%20networks%20to%20the%20Moon%20brings%20a%20severe%20domain%20gap%20due%20to%20harsh%20shadows%2C%20textureless%20regolith%2C%20and%20zero%20atmospheric%20scattering.%20Existing%20evaluations%20rely%20on%20analogs%20that%20fail%20to%20replicate%20these%20conditions%20and%20lack%20actual%20metric%20ground%20truth.%20To%20address%20this%2C%20we%20present%20LuMon%2C%20a%20comprehensive%20benchmarking%20framework%20to%20evaluate%20MDE%20methods%20for%20lunar%20exploration.%20We%20introduce%20novel%20datasets%20featuring%20high-quality%20stereo%20ground%20truth%20depth%20from%20the%20real%20Chang%27e-3%20mission%20and%20the%20CHERI%20dark%20analog%20dataset.%20Utilizing%20this%20framework%2C%20we%20conduct%20a%20systematic%20zero-shot%20evaluation%20of%20state-of-the-art%20architectures%20across%20synthetic%2C%20analog%2C%20and%20real%20datasets.%20We%20rigorously%20assess%20performance%20against%20mission%20critical%20challenges%20like%20craters%2C%20rocks%2C%20extreme%20shading%2C%20and%20varying%20depth%20ranges.%20Furthermore%2C%20we%20establish%20a%20sim-to-real%20domain%20adaptation%20baseline%20by%20fine%20tuning%20a%20foundation%20model%20on%20synthetic%20data.%20While%20this%20adaptation%20yields%20drastic%20in-domain%20performance%20gains%2C%20it%20exhibits%20minimal%20generalization%20to%20authentic%20lunar%20imagery%2C%20highlighting%20a%20persistent%20cross-domain%20transfer%20gap.%20Our%20extensive%20analysis%20reveals%20the%20inherent%20limitations%20of%20current%20networks%20and%20sets%20a%20standard%20foundation%20to%20guide%20future%20advancements%20in%20extraterrestrial%20perception%20and%20domain%20adaptation.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09352v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLuMon%253A%2520A%2520Comprehensive%2520Benchmark%2520and%2520Development%2520Suite%2520with%2520Novel%2520Datasets%2520for%2520Lunar%2520Monocular%2520Depth%2520Estimation%26entry.906535625%3DAyta%25C3%25A7%2520Sekmen%2520and%2520Fatih%2520Emre%2520Gunes%2520and%2520Furkan%2520Horoz%2520and%2520H%25C3%25BCseyin%2520Umut%2520I%25C5%259F%25C4%25B1k%2520and%2520Mehmet%2520Alp%2520Ozaydin%2520and%2520Onur%2520Altay%2520Topaloglu%2520and%2520%25C5%259Eahin%2520Umutcan%2520%25C3%259Cst%25C3%25BCnda%25C5%259F%2520and%2520Yurdasen%2520Alp%2520Yeni%2520and%2520Halil%2520Ersin%2520Soken%2520and%2520Erol%2520Sahin%2520and%2520Ramazan%2520Gokberk%2520Cinbis%2520and%2520Sinan%2520Kalkan%26entry.1292438233%3DMonocular%2520Depth%2520Estimation%2 {"title": "The Fast Lane Hypothesis: Von Economo Neurons Implement a Biological Speed-Accuracy Tradeoff", "author": "Esila Keskin", "abstract": "Von Economo neurons (VENs) are large bipolar projection neurons found exclusively in the anterior cingulate cortex (ACC) and frontal insula of species with complex social cognition, including humans, great apes, and cetaceans. Their selective depletion in frontotemporal dementia (FTD) and altered development in autism implicate them in rapid social decision-making, yet no computational model of VEN function has previously existed. We introduce the Fast Lane Hypothesis: VENs implement a biological speed-accuracy tradeoff (SAT) by providing a sparse, fast projection pathway that enables rapid social decisions at the cost of deliberate processing accuracy. We model VENs as fast leaky integrate-and-fire (LIF) neurons with membrane time constant 5 ms and sparse dendritic fan-in of eight afferents, compared to 20 ms and eighty afferents for standard pyramidal neurons, within a spiking cortical circuit of 2,000 neurons trained on a social discrimination task. Networks are evaluated under three clinically motivated conditions across 10 independent random seeds: typical (2% VENs), autism-like (0.4% VENs), and FTD-like (post-training VEN ablation). All configurations achieve equivalent asymptotic classification accuracy (99.4%), consistent with the prediction that VENs modulate decision speed rather than representational capacity. Temporal analysis confirms that VENs produce median first-spike latencies 4 ms earlier than pyramidal neurons. At a fixed decision threshold, the typical condition is significantly faster than FTD-like (t=-23.31, p<0.0001), while autism-like is intermediate (mean RT=26.91+/-9.01 ms vs. typical 20.70+/-2.02 ms; p=0.078). A preliminary evolutionary analysis shows qualitative correspondence between model-optimal VEN fraction and the primate phylogenetic gradient. To our knowledge, this is the first computational model that asks what a Von Economo neuron actually computes.", "link": "http://arxiv.org/abs/2604.09229v1", "date": "2026-04-10", "relevancy": 2.1576, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4326}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4326}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4294}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Fast%20Lane%20Hypothesis%3A%20Von%20Economo%20Neurons%20Implement%20a%20Biological%20Speed-Accuracy%20Tradeoff&body=Title%3A%20The%20Fast%20Lane%20Hypothesis%3A%20Von%20Economo%20Neurons%20Implement%20a%20Biological%20Speed-Accuracy%20Tradeoff%0AAuthor%3A%20Esila%20Keskin%0AAbstract%3A%20Von%20Economo%20neurons%20%28VENs%29%20are%20large%20bipolar%20projection%20neurons%20found%20exclusively%20in%20the%20anterior%20cingulate%20cortex%20%28ACC%29%20and%20frontal%20insula%20of%20species%20with%20complex%20social%20cognition%2C%20including%20humans%2C%20great%20apes%2C%20and%20cetaceans.%20Their%20selective%20depletion%20in%20frontotemporal%20dementia%20%28FTD%29%20and%20altered%20development%20in%20autism%20implicate%20them%20in%20rapid%20social%20decision-making%2C%20yet%20no%20computational%20model%20of%20VEN%20function%20has%20previously%20existed.%20We%20introduce%20the%20Fast%20Lane%20Hypothesis%3A%20VENs%20implement%20a%20biological%20speed-accuracy%20tradeoff%20%28SAT%29%20by%20providing%20a%20sparse%2C%20fast%20projection%20pathway%20that%20enables%20rapid%20social%20decisions%20at%20the%20cost%20of%20deliberate%20processing%20accuracy.%20We%20model%20VENs%20as%20fast%20leaky%20integrate-and-fire%20%28LIF%29%20neurons%20with%20membrane%20time%20constant%205%20ms%20and%20spars {"title": "HaloProbe: Bayesian Detection and Mitigation of Object Hallucinations in Vision-Language Models", "author": "Reihaneh Zohrabi and Hosein Hasani and Akshita Gupta and Mahdieh Soleymani Baghshah and Anna Rohrbach and Marcus Rohrbach", "abstract": "Large vision-language models can produce object hallucinations in image descriptions, highlighting the need for effective detection and mitigation strategies. Prior work commonly relies on the model's attention weights on visual tokens as a detection signal. We reveal that coarse-grained attention-based analysis is unreliable due to hidden confounders, specifically token position and object repetition in a description. This leads to Simpson's paradox: the attention trends reverse or disappear when statistics are aggregated. Based on this observation, we introduce HaloProbe, a Bayesian framework that factorizes external description statistics and internal decoding signals to estimate token-level hallucination probabilities. HaloProbe uses balanced training to isolate internal evidence and combines it with a learned prior over external features to recover the true posterior. While intervention-based mitigation methods often degrade utility or fluency by modifying models' internals, we use HaloProbe as an external scoring signal for non-invasive mitigation. Our experiments show that HaloProbe-guided decoding reduces hallucinations more effectively than state-of-the-art intervention-based methods while preserving utility.", "link": "http://arxiv.org/abs/2604.06165v2", "date": "2026-04-10", "relevancy": 2.1545, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5387}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5387}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5384}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HaloProbe%3A%20Bayesian%20Detection%20and%20Mitigation%20of%20Object%20Hallucinations%20in%20Vision-Language%20Models&body=Title%3A%20HaloProbe%3A%20Bayesian%20Detection%20and%20Mitigation%20of%20Object%20Hallucinations%20in%20Vision-Language%20Models%0AAuthor%3A%20Reihaneh%20Zohrabi%20and%20Hosein%20Hasani%20and%20Akshita%20Gupta%20and%20Mahdieh%20Soleymani%20Baghshah%20and%20Anna%20Rohrbach%20and%20Marcus%20Rohrbach%0AAbstract%3A%20Large%20vision-language%20models%20can%20produce%20object%20hallucinations%20in%20image%20descriptions%2C%20highlighting%20the%20need%20for%20effective%20detection%20and%20mitigation%20strategies.%20Prior%20work%20commonly%20relies%20on%20the%20model%27s%20attention%20weights%20on%20visual%20tokens%20as%20a%20detection%20signal.%20We%20reveal%20that%20coarse-grained%20attention-based%20analysis%20is%20unreliable%20due%20to%20hidden%20confounders%2C%20specifically%20token%20position%20and%20object%20repetition%20in%20a%20description.%20This%20leads%20to%20Simpson%27s%20paradox%3A%20the%20attention%20trends%20reverse%20or%20disappear%20when%20statistics%20are%20aggregated.%20Based%20on%20this%20observation%2C%20we%20introduce%20HaloProbe%2C%20a%20Bayesian%20framework%20that%20factorizes%20external%20description%20statistics%20and%20internal%20decoding%20signals%20to%20estimate%20token-level%20hallucination%20probabilities.%20HaloProbe%20uses%20balanced%20training%20to%20isolate%20internal%20evidence%20and%20combines%20it%20with%20a%20learned%20prior%20over%20external%20features%20to%20recover%20the%20true%20posterior.%20While%20intervention-based%20mitigation%20methods%20often%20degrade%20utility%20or%20fluency%20by%20modifying%20models%27%20internals%2C%20we%20use%20HaloProbe%20as%20an%20external%20scoring%20signal%20for%20non-invasive%20mitigation.%20Our%20experiments%20show%20that%20HaloProbe-guided%20decoding%20reduces%20hallucinations%20more%20effectively%20than%20state-of-the-art%20intervention-based%20methods%20while%20preserving%20utility.%0ALink%3A%20http%3A//arxiv.org/abs/2604.06165v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHaloProbe%253A%2520Bayesian%2520Detection%2520and%2520Mitigation%2520of%2520Object%2520Hallucinations%2520in%2520Vision-Language%2520Models%26entry.906535625%3DReihaneh%2520Zohrabi%2520and%2520Hosein%2520Hasani%2520and%2520Akshita%2520Gupta%2520and%2520Mahdieh%2520Soleymani%2520Baghshah%2520and%2520Anna%2520Rohrbach%2520and%2520Marcus%2520Rohrbach%26entry.1292438233%3DLarge%2520vision-language%2520models%2520can%2520produce%2520object%2520hallucinations%2520in%2520image%2520descriptions%252C%2520highlighting%2520the%2520need%2520for%2520effective%2520detection%2520and%2520mitigation%2520strategies.%2520Prior%2520work%2520commonly%2520relies%2520on%2520the%2520model%2527s%2520attention%2520weights%2520on%2520visual%2520tokens%2520as%2520a%2520detection%2520signal.%2520We%2520reveal%2520that%2520coarse-grained%2520attention-based%2520analysis%2520is%2520unreliable%2520due%2520to%2520hidden%2520confounders%252C%2520specifically%2520token%2520position%2520and%2520object%2520repetition%2520in%2520a%2520description.%2520This%2520leads%2520to%2520Simpson%2527s%2520paradox%253A%2520the%2520attention%2520trends%2520reverse%2520or%2520disappear%2520when%2520statistics%2520are%2520aggregated.%2520Based%2520on%2520this%2520observation%252C%2520we%2520introduce%2520HaloProbe%252C%2520a%2520Bayesian%2520framework%2520that%2520factorizes%2520external%2520description%2520statistics%2520and%2520internal%2520decoding%2520signals%2520to%2520estimate%2520token-level%2520hallucination%2520probabilities.%2520HaloProbe%2520uses%2520balanced%2520training%2520to%2520isolate%2520internal%2520evidence%2520and%2520combines%2520it {"title": "Differentially Private and Federated Structure Learning in Bayesian Networks", "author": "Ghita Fassy El Fehri and Aur\u00e9lien Bellet and Philippe Bastien", "abstract": "Learning the structure of a Bayesian network from decentralized data poses two major challenges: (i) ensuring rigorous privacy guarantees for participants, and (ii) avoiding communication costs that scale poorly with dimensionality. In this work, we introduce Fed-Sparse-BNSL, a novel federated method for learning linear Gaussian Bayesian network structures that addresses both challenges. By combining differential privacy with greedy updates that target only a few relevant edges per participant, Fed-Sparse-BNSL efficiently uses the privacy budget while keeping communication costs low. Our careful algorithmic design preserves model identifiability and enables accurate structure estimation. Experiments on synthetic and real datasets demonstrate that Fed-Sparse-BNSL achieves utility close to non-private baselines while offering substantially stronger privacy and communication efficiency.", "link": "http://arxiv.org/abs/2512.01708v2", "date": "2026-04-10", "relevancy": 2.1537, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4541}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4209}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4172}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Differentially%20Private%20and%20Federated%20Structure%20Learning%20in%20Bayesian%20Networks&body=Title%3A%20Differentially%20Private%20and%20Federated%20Structure%20Learning%20in%20Bayesian%20Networks%0AAuthor%3A%20Ghita%20Fassy%20El%20Fehri%20and%20Aur%C3%A9lien%20Bellet%20and%20Phil {"title": "Multi-task Just Recognizable Difference for Video Coding for Machines: Database, Model, and Coding Application", "author": "Junqi Liu and Yun Zhang and Xiaoxia Huang and Long Xu and Weisi Lin", "abstract": "Just Recognizable Difference (JRD) boosts coding efficiency for machine vision through visibility threshold modeling, but is currently limited to a single-task scenario. To address this issue, we propose a Multi-Task JRD (MT-JRD) dataset and an Attribute-assisted MT-JRD (AMT-JRD) model for Video Coding for Machines (VCM), enhancing both prediction accuracy and coding efficiency. First, we construct a dataset comprising 27,264 JRD annotations from machines, supporting three representative tasks including object detection, instance segmentation, and keypoint detection. Secondly, we propose the AMT-JRD prediction model, which integrates Generalized Feature Extraction Module (GFEM) and Specialized Feature Extraction Module (SFEM) to facilitate joint learning across multiple tasks. Thirdly, we innovatively incorporate object attribute information into object-wise JRD prediction through the Attribute Feature Fusion Module (AFFM), which introduces prior knowledge about object size and location. This design effectively compensates for the limitations of relying solely on image features and enhances the model's capacity to represent the perceptual mechanisms of machine vision. Finally, we apply the AMT-JRD model to VCM, where the accurately predicted JRDs are applied to reduce the coding bit rate while preserving accuracy across multiple machine vision tasks. Extensive experimental results demonstrate that AMT-JRD achieves precise and robust multi-task prediction with a mean absolute error of 3.781 and error variance of 5.332 across three tasks, outperforming the state-of-the-art single-task prediction model by 6.7% and 6.3%, respectively. Coding experiments further reveal that compared to the baseline VVC and JPEG, the AMT-JRD-based VCM improves an average of {"title": "Visually-Guided Policy Optimization for Multimodal Reasoning", "author": "Zengbin Wang and Feng Xiong and Liang Lin and Xuecai Hu and Yong Wang and Yanlin Wang and Man Zhang and Xiangxiang Chu", "abstract": "Reinforcement learning with verifiable rewards (RLVR) has significantly advanced the reasoning ability of vision-language models (VLMs). However, the inherent text-dominated nature of VLMs often leads to insufficient visual faithfulness, characterized by sparse attention activation to visual tokens. More importantly, our empirical analysis reveals that temporal visual forgetting along reasoning steps exacerbates this deficiency. To bridge this gap, we propose Visually-Guided Policy Optimization (VGPO), a novel framework to reinforce visual focus during policy optimization. Specifically, VGPO initially introduces a Visual Attention Compensation mechanism that leverages visual similarity to localize and amplify visual cues, while progressively elevating visual expectations in later steps to counteract visual forgetting. Building on this mechanism, we implement a dual-grained advantage re-weighting strategy: the intra-trajectory level highlights tokens exhibiting relatively high visual activation, while the inter-trajectory level prioritizes trajectories demonstrating superior visual accumulation. Extensive experiments demonstrate that VGPO achieves better visual activation and superior performance in mathematical multimodal reasoning and visual-dependent tasks.", "link": "http://arxiv.org/abs/2604.09349v1", "date": "2026-04-10", "relevancy": 2.1388, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5444}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5357}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5247}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Visually-Guided%20Policy%20Optimization%20for%20Multimodal%20Reasoning&body=Title%3A%20Visually-Guided%20Policy%20Optimization%20for%20Multimodal%20Reasoning%0AAuthor%3A%20Zengbin%20Wang%20and%20Feng%20Xiong%20and%20Liang%20Lin%20and%20Xuecai%20Hu%20and%20Yong%20Wang%20and%20Yanlin%20Wang%20and%20Man%20Zhang%20and%20Xiangxiang%20Chu%0AAbstract%3A%20Reinforcement%20learning%20with%20verifiable%20rewards%20%28RLVR%29%20has%20significantly%20advanced%20the%20reasoning%20ability%20of%20vision-language%20models%20%28VLMs%29.%20However%2C%20the%20inherent%20text-dominated%20nature%20of%20VLMs%20often%20leads%20to%20insufficient%20visual%20faithfulness%2C%20characterized%20by%20sparse%20attention%20activation%20to%20visual%20tokens.%20More%20importantly%2C%20our%20empirical%20analysis%20reveals%20that%20temporal%20visual%20forgetting%20along%20reasoning%20steps%20exacerbates%20this%20deficiency.%20To%20bridge%20this%20gap%2C%20we%20propose%20Visually-Guided%20Policy%20Optimization%20%28VGPO%29%2C%20a%20novel%20framework%20to%20reinforce%20visual%20focus%20during%20policy%20optimization.%20Specifically%2C%20VGPO%20initially%20introduces%20a%20Visual%20Attention%20Compensation%20mechanism%20that%20leverages%20visual%20similarity%20to%20localize%20and%20amplify%20visual%20cues%2C%20while%20progressively%20elevating%20visual%20expectations%20in%20later%20steps%20to%20counteract%20visual%20forgetting.%20Building%20on%20this%20mechanism%2C%20we%20implement%20a%20dual-grained%20advantage%20re-weighting%20strategy%3A%20the%20intra-trajectory%20level%20highlights%20tokens%20exhibiting%20relatively%20high%20visual%20activation%2C%20while%20the%20inter-trajectory%20level%20prioritizes%20trajectories%20demonstrating%20superior%20visual%20accumulation.%20Extensive%20experiments%20demonstrate%20that%20VGPO%20achieves%20better%20visual%20activation%20and%20superior%20performance%20in%20mathematical%20multimodal%20reasoning%20and%20visual-dependent%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09349v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVisually-Guided%2520Policy%2520Optimization%2520for%2520Multimodal%2520Reasoning%26entry.906535625%3DZengbin%2520Wang%2520and%2520Feng%2520Xiong%2520and%2520Liang%2520Lin%2520and%2520Xuecai%2520Hu%2520and%2520Yong%2520Wang%2520and%2520Yanlin%2520Wang%2520and%2520Man%2520Zhang%2520and%2520Xiangxiang%2520Chu%26entry.1292438233%3DReinforcement%2520learning%2520with%2520verifiable%2520rewards%2520%2528RLVR%2529%2520has%2520significantly%2520advanced%2520the%2520reasoning%2520ability%2520of%2520vision-language%2520models%2520%2528VLMs%2529.%2520However%252C%2520the%2520inherent%2520text-dominated%2520nature%2520of%2520VLMs%2520often%2520leads%2520to%2520insufficient%2520visual%2520faithfulness%252C%2520characterized%2520by%2520sparse%2520attention%2520activation%2520to%2520visual%2520tokens.%2520More%2520importantly%252C%2520our%2520empirical%2520analysis%2520reveals%2520that%2520temporal%2520visual%2520forgetting%2520along%2520reasoning%2520steps%2520exacerbates%2520this%2520deficiency.%2520To%2520bridge%2520this%2520gap%252C%2520we%2520propose%2520Visually-Guided%2520Policy%2520Optimization%2520%2528VGPO%2529%252C%2520a%2520novel%2520framework%2520to%2520reinforce%2520visual%2520focus%2520during%2520policy%2520optimization.%2520Specifically%252C%2520VGPO%2520initially%2520introduces%2520a%2520Visual%2520Attention%2520Compensation%2520mechanism%2520that%2520leverages%2520visual%2520similarity%2520to%2520localize%2520and%2520amplify%2520visual%2520cues%252C%2520while%2520progressively%2520elevating%2520visual%2520expectations%252 {"title": "VAGNet: Vision-based accident anticipation with global features", "author": "Vipooshan Vipulananthan and Charith D. Chitraranjan", "abstract": "Traffic accidents are a leading cause of fatalities and injuries across the globe. Therefore, the ability to anticipate hazardous situations in advance is essential. Automated accident anticipation enables timely intervention through driver alerts and collision avoidance maneuvers, forming a key component of advanced driver assistance systems. In autonomous driving, such predictive capabilities support proactive safety behaviors, such as initiating defensive driving and human takeover when required. Using dashcam video as input offers a cost-effective solution, but it is challenging due to the complexity of real-world driving scenes. Accident anticipation systems need to operate in real-time. However, current methods involve extracting features from each detected object, which is computationally intensive. We propose VAGNet, a deep neural network that learns to predict accidents from dash-cam video using global features of traffic scenes without requiring explicit object-level features. The network consists of transformer and graph modules, and we use the vision foundation model VideoMAE-V2 for global feature extraction. Experiments on four benchmark datasets (DAD, DoTA, DADA, and Nexar) show that our method anticipates accidents with higher average precision and mean time-to-accident while being computationally more efficient compared to existing methods.", "link": "http://arxiv.org/abs/2604.09305v1", "date": "2026-04-10", "relevancy": 2.1299, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5422}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5368}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5242}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VAGNet%3A%20Vision-based%20accident%20anticipation%20with%20global%20features&body=Title%3A%20VAGNet%3A%20Vision-based%20accident%20anticipation%20with%20global%20features%0AAuthor%3A%20Vipooshan%20Vipulananthan%20and%20Charith%20D.%20Chitraranjan%0AAbstract%3A%20Traffic%20accidents%20are%20a%20leading%20cause%20of%20fatalities%20and%20injuries%20across%20the%20globe.%20Therefore%2C%20the%20ability%20to%20anticipate%20hazardous%20situations%20in%20advance%20is%20essential.%20Automated%20accident%20anticipation%20enables%20timely%20intervention%20through%20driver%20alerts%20and%20collision%20avoidance%20maneuvers%2C%20forming%20a%20key%20component%20of%20advanced%20driver%20assistance%20systems.%20In%20autonomous%20driving%2C%20such%20predictive%20capabilities%20support%20proactive%20safety%20behaviors%2C%20such%20as%20initiating%20defensive%20driving%20and%20human%20takeover%20when%20required.%20Using%20dashcam%20video%20as%20input%20offers%20a%20cost-effective%20solution%2C%20but%20it%20is%20challenging%20due%20to%20the%20complexity%20of%20real-world%20driving%20scenes.%20Accident%20anticipation%20systems%20need%20to%20operate%20in%20real-time.%20However%2C%20current%20methods%20involve%20extracting%20features%20from%20each%20detected%20object%2C%20which%20is%20computationally%20intensive.%20We%20propose%20VAGNet%2C%20a%20deep%20neural%20network%20that%20learns%20to%20predict%20accidents%20from%20dash-cam%20video%20using%20global%20features%20of%20traffic%20scenes%20without%20requiring%20explicit%20object-level%20features.%20The%20network%20consists%20of%20transformer%20and%20graph%20modules%2C%20and%20we%20use%20the%20vision%20foundation%20model%20VideoMAE-V2%20for%20global%20feature%20extraction.%20Experiments%20on%20four%20benchmark%20datasets%20%28DAD%2C%20DoTA%2C%20DADA%2C%20an redict%2520accidents%2520from%2520dash-cam%2520video%2520using%2520global%2520features%2520of%2520traffic%2520scenes%2520without%2520requiring%2520explicit%2520object-level%2520features.%2520The%2520network%2520consists%2520of%2520transformer%2520and%2520graph%2520modules%252C%2520and%2520we%2520use%2520the%2520vision%2520foundation%2520model%2520VideoMAE-V2%2520for%2520global%2520feature%2520extraction.%2520Experiments%2520on%2520four%2520benchmark%2520datasets%2520%2528DAD%252C%2520DoTA%252C%2520DADA%252C%2520and%2520Nexar%2529%2520show%2520that%2520our%2520method%2520anticipates%2520accidents%2520with%2520higher%2520average%2520precision%2520and%2520mean%2520time-to-accident%2520while%2520being%2520computationally%2520more%2520efficient%2520compared%2520to%2520existing%2520methods.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.09305v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=VAGNet%3A%20Vision-based%20accident%20anticipation%20with%20global%20features&entry.906535625=Vipooshan%20Vipulananthan%20and%20Charith%20D.%20Chitraranjan&entry.1292438233=Traffic%20accidents%20are%20a%20leading%20cause%20of%20fatalities%20and%20injuries%20across%20the%20globe.%20Therefore%2C%20the%20ability%20to%20anticipate%20hazardous%20situations%20in%20advance%20is%20essential.%20Automated%20accident%20anticipation%20enables%20timely%20intervention%20through%20driver%20alerts%20and%20collision%20avoidance%20maneuvers%2C%20forming%20a%20key%20component%20of%20advanced%20driver%20assistance%20systems.%20In%20autonomous%20driving%2C%20such%20predictive%20capabilities%20support%20proactive%20safety%20behaviors%2C%20such%20as%20initiating%20defensive%20driving%20and%20human%20takeover%20when%20required.%20Using%20dashcam%20video%20as%20input%20offers%20a%20cost-effective%20solution%2C%20but%20it%20is%20challenging%20due%20to%20the%20complexity%20of%20real-world%20driving%20sce {"title": "Learning General Representation of 12-Lead Electrocardiogram with a Joint-Embedding Predictive Architecture", "author": "Sehun Kim", "abstract": "Electrocardiogram (ECG) captures the heart's electrical signals, offering valuable information for diagnosing cardiac conditions. However, the scarcity of labeled data makes it challenging to fully leverage supervised learning in the medical domain. Self-supervised learning (SSL) offers a promising solution, enabling models to learn from unlabeled data and uncover meaningful patterns. In this paper, we show that masked modeling in the latent space can be a powerful alternative to existing self-supervised methods in the ECG domain. We introduce ECG-JEPA, an SSL model for 12-lead ECG analysis that learns semantic representations of ECG data by predicting in the hidden latent space, bypassing the need to reconstruct raw signals. This approach offers several advantages in the ECG domain: (1) it avoids producing unnecessary details, such as noise, which is common in ECG; and (2) it addresses the limitations of naive L2 loss between raw signals. Another key contribution is the introduction of Cross-Pattern Attention (CroPA), a specialized masked attention mechanism tailored for 12-lead ECG data. ECG-JEPA is trained on the union of several open ECG datasets, totaling approximately 180,000 samples, and achieves state-of-the-art performance in various downstream tasks including diagnostic classification, feature extraction, and segmentation. Our code is openly available at https://github.com/sehunfromdaegu/ECG_JEPA.", "link": "http://arxiv.org/abs/2410.08559v5", "date": "2026-04-10", "relevancy": 2.1237, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5393}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5347}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5006}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20General%20Representation%20of%2012-Lead%20Electrocardiogram%20with%20a%20Joint-Embedding%20Predictive%20Architecture&body=Title%3A%20Learning%20General%20Representation%20of%2012-Lead%20Electrocardiogram%20with%20a%20Joint-Embedding%20Predictive%20Architecture%0AAuthor%3A%20Sehun%20Kim%0AAbstract%3A%20Electrocardiogram%20%28ECG%29%20captures%20the%20heart%27s%20electrical%20signals%2C%20offering%20valuable%20information%20for%20diagnosing%20cardiac%20conditions.%20However%2C%20the%20scarcity%20of%20labeled%20data%20makes%20it%20challenging%20to%20fully%20leverage%20supervised%20learning%20in%20the%20medical%20domain.%20Self-supervised%20learning%20%28SSL%29%20offers%20a%20promising%20solution%2C%20enabling%20models%20to%20learn%20from%20unlabeled%20data%20and%20uncover%20meaningful%20patterns.%20In%20this%20paper%2C%20we%20show%20that%20masked%20modeling%20in%20the%20latent%20space%20can%20be%20a%20powerful%20alternative%20to%20existing%20self-supervised%20methods%20in%20the%20ECG%20domain.%20We%20introduce%20ECG-JEPA%2C%20an%20SSL%20model%20for%2012-lead%20ECG%20analysis%20that%20learns%20semantic%20representations%20of%20ECG%20data%20by%20predicting%20in%20the%20hidden%20latent%20space%2C%20bypassing%20the%20need%20to%20reconstruct%20raw%20signals.%20This%20approach%20offers%20several%20advantages%20in%20the%20ECG%20domain%3A%20%281%29%20it%20avoids%20producing%20unnecessary%20details%2C%20such%20as%20noise%2C%20which%20is%20common%20in%20ECG%3B%20and%20%282%29%20it%20addresses%20the%20limitations%20of%20naive%20L2%20loss%20between%20raw%20signals.%20Another%20key%20contribution%20is%20the%20introduction%20of%20Cross-Pattern%20Attention%20%28CroPA%29%2C%20a%20specialized%20masked%20attention%20mechanism%20tailored%20for%2012-lead%20ECG%20data.%20ECG-JEPA%20is%20trained%20on%20the%20union%20of%20several%20open%20ECG%20datasets%2C%20totaling%20approximately%20180%2C000%20samples%2C%20and%20achieves%20state-of-the-art%20performance%20in%20various%20downstream%20tasks%20including%20diagnostic%20classification%2C%20feature%20extraction%2C%20and%20segmentation.%20Our%20code%20is%20openly%20available%20at%20https%3A//github.com/sehunfromdaegu/ECG_JEPA.%0ALink%3A%20http%3A//arxiv.org/abs/2410.08559v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520General%2520Representation%2520of%252012-Lead%2520Electrocardiogram%2520with%2520a%2520Joint-Embedding%2520Predictive%2520Architecture%26entry.906535625%3DSehun%2520Kim%26entry.1292438233%3DElectrocardiogram%2520%2528ECG%2529%2520captures%2520the%2520heart%2527s%2520electrical%2520signals%252C%2520offering%2520valuable%2520information%2520for%2520diagnosing%2520cardiac%2520conditions.%2520However%252C%2520the%2520scarcity%2520of%2520labeled%2520data%2520makes%2520it%2520challenging%2520to%2520fully%2520leverage%2520supervised%2520learning%2520in%2520the%2520medical%2520domain.%2520Self-supervised%2520learning%2520%2528SSL%2529%2520offers%2520a%2520promising%2520solution%252C%2520enabling%2520models%2520to%2520learn%2520from%2520unlabeled%2520data%2520and%2520uncover%2520meaningful%2520patterns.%2520In%2520this%2520paper%252C%2520we%2520show%2520that%2520masked%2520modeling%2520in%2520the%2520latent%2520space%2520can%2520be%2520a%2520powerful%2520alternative%2520to%2520existing%2520self-supervised%2520methods%2520in%2520the%2520ECG%2520domain.%2520We%2520introduce%2520ECG-JEPA%252C%2520an%2520SSL%2520model%2520for%252012-lead%2520ECG%2520analysis%2520that%2520learns%2520semantic%2520representations%2520of%2520ECG%2520data%2520by%2520predicting%2520in%2520the%2520hidden%2520latent%2520space%252C%2520bypassing%2520the%2520need%2520to%2520reconstruct%2520r nd%20uncover%20meaningful%20patterns.%20In%20this%20paper%2C%20we%20show%20that%20masked%20modeling%20in%20the%20latent%20space%20can%20be%20a%20powerful%20alternative%20to%20existing%20self-supervised%20methods%20in%20the%20ECG%20domain.%20We%20introduce%20ECG-JEPA%2C%20an%20SSL%20model%20for%2012-lead%20ECG%20analysis%20that%20learns%20semantic%20representations%20of%20ECG%20data%20by%20predicting%20in%20the%20hidden%20latent%20space%2C%20bypassing%20the%20need%20to%20reconstruct%20raw%20signals.%20This%20approach%20offers%20several%20advantages%20in%20the%20ECG%20domain%3A%20%281%29%20it%20avoids%20producing%20unnecessary%20details%2C%20such%20as%20noise%2C%20which%20is%20common%20in%20ECG%3B%20and%20%282%29%20it%20addresses%20the%20limitations%20of%20naive%20L2%20loss%20between%20raw%20signals.%20Another%20key%20contribution%20is%20the%20introduction%20of%20Cross-Pattern%20Attention%20%28CroPA%29%2C%20a%20specialized%20masked%20attention%20mechanism%20tailored%20for%2012-lead%20ECG%20data.%20ECG-JEPA%20is%20trained%20on%20the%20union%20of%20several%20open%20ECG%20datasets%2C%20totaling%20approximately%20180%2C000%20samples%2C%20and%20achieves%20state-of-the-art%20performance%20in%20various%20downstream%20tasks%20including%20diagnostic%20classification%2C%20feature%20extraction%2C%20and%20segmentation.%20Our%20code%20is%20openly%20available%20at%20https%3A//github.com/sehunfromdaegu/ECG_JEPA.&entry.1838667208=http%3A//arxiv.org/abs/2410.08559v5&entry.124074799=Read"},
{"title": "Physics-Informed Reinforcement Learning of Spatial Density Velocity Potentials for Map-Free Racing", "author": "Shathushan Sivashangaran and Apoorva Khairnar and Sepideh Gohari and Vihaan Dutta and Azim Eskandarian", "abstract": "Autonomous racing without prebuilt maps is a grand challenge for embedded robotics that requires kinodynamic planning from instantaneous sensor data at the acceleration and tire friction limits. Out-Of-Distribution (OOD) generalization to various racetrack configurations utilizes Machine Learning (ML) to encode the mathematical relation between sensor data and vehicle actuation for end-to-end control, with implicit localization. These comprise Behavioral Cloning (BC) that is capped to human reaction times and Deep Reinforcement Learning (DRL) which requires large-scale collisions for comprehensive training that can be infeasible without simulation but is arduous to transfer to reality, thus exhibiting greater performance than BC in simulation, but actuation instability on hardware. This paper presents a DRL method that parameterizes nonlinear vehicle dynamics from the spectral distribution of depth measurements with a non-geometric, physics-informed reward, to infer vehicle time-optimal and overtaking racing controls with an Artificial Neural Network (ANN) that utilizes less than 1% of the computation of BC and model-based DRL. Slaloming from simulation to reality transfer and variance-induced conservatism are eliminated with the combination of a physics engine exploit-aware reward and the replacement of an explicit collision penalty with an implicit truncation of the value horizon. The policy outperforms human demonstrations by 12% in OOD tracks on proportionally scaled hardware, by maximizing the friction circle with tire dynamics that resemble an empirical Pacejka tire model. System identification illuminates a functional bifurcation where the first layer compresses spatial observations to extract digitized track features with higher resolution in corner apexes, and the second encodes nonlinear dynamics.", "link": "http://arxiv.org/abs/2604.09499v1", "date": "2026-04-10", "relevancy": 2.1137, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5206}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5076}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Physics-Informed%20Reinforcement%20Learning%20of%20Spatial%20Density%20Velocity%20Potentials%20for%20Map-Free%20Racing&body=Title%3A%20Physics-Informed%20Reinforcement%20Learning%20of%20Spatial%20Density%20Velocity%20Potentials%20for%20Map-Free%20Racing%0AAuthor%3A%20Shathushan%20Sivashangaran%20and%20Apoorva%20Khairnar%20and%20Sepideh%20Gohari%20and%20Vihaan%20Dutta%20and%20Azim%20Eskandarian%0AAbstract%3A%20Autonomous%20racing%20without%20prebuilt%20maps%20is%20a%20grand%20challenge%20for%20embedded%20robotics%20that%20requires%20kinodynamic%20planning%20from%20instantaneous%20sensor%20data%20at%20the%20acceleration%20and%20tire%20friction%20limits.%20Out-Of-Distribution%20%28OOD%29%20generalization%20to%20various%20racetrack%20configurations%20utilizes%20Machine%20Learning%20%28ML%29%20to%20encode%20the%20mathematical%20relation%20between%20sensor%20data%20and%20vehicle%20actuation%20for%20end-to-end%20control%2C%20with%20implicit%20localization.%20These%20comprise%20Behavioral%20Cloning%20%28BC%29%20that%20is%20capped%20to%20human%20reaction%20times%20and%20Deep%20Reinforcement%20Learning%20%28DRL%29%20which%20requires%20large-scale%20collisions%20for%20comprehensive%20training%20that%20can%20be {"title": "Neurons Speak in Ranges: Breaking Free from Discrete Neuronal Attribution", "author": "Muhammad Umair Haider and Hammad Rizwan and Hassan Sajjad and Peizhong Ju and A. B. Siddique", "abstract": "Pervasive polysemanticity in large language models (LLMs) undermines discrete neuron-concept attribution, posing a significant challenge for model interpretation and control. We systematically analyze both encoder and decoder based LLMs across diverse datasets, and observe that even highly salient neurons for specific semantic concepts consistently exhibit polysemantic behavior. Importantly, we uncover a consistent pattern: concept-conditioned activation magnitudes of neurons form distinct, often Gaussian-like distributions with minimal overlap. Building on this observation, we hypothesize that interpreting and intervening on concept-specific activation ranges can enable more precise interpretability and targeted manipulation in LLMs. To this end, we introduce NeuronLens, a novel range-based interpretation and manipulation framework, that localizes concept attribution to activation ranges within a neuron. Extensive empirical evaluations show that range-based interventions enable effective manipulation of target concepts while causing substantially less collateral degradation to auxiliary concepts and overall model performance compared to neuron-level masking.", "link": "http://arxiv.org/abs/2502.06809v3", "date": "2026-04-10", "relevancy": 2.1135, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5369}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5369}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4859}], " {"title": "DiffHLS: Differential Learning for High-Level Synthesis QoR Prediction with GNNs and LLM Code Embeddings", "author": "Zedong Peng and Zeju Li and Qiang Xu and Jieru Zhao", "abstract": "High-Level Synthesis (HLS) compiles C/C++ into RTL, but exploring pragma-driven optimization choices remains expensive because each design point requires time-consuming synthesis. We propose \\textbf{\\DiffHLS}, a differential learning framework for HLS Quality-of-Result (QoR) prediction that learns from kernel--design pairs: a kernel baseline and a pragma-inserted design variant. \\DiffHLS~encodes kernel and design intermediate-representation graphs with dedicated graph neural network (GNN) branches, and augments the delta pathway with code embeddings from a pretrained code large language model (LLM). Instead of regressing absolute targets directly, we jointly predict the kernel baseline and the design-induced delta, and compose them to obtain the design prediction. On PolyBench, \\DiffHLS~attains lower average MAPE than GNN baselines under four GNN backbones, and LLM code embeddings consistently improve over a GNN-only ablation. We further validate scalability on the ForgeHLS dataset.", "link": "http://arxiv.org/abs/2604.09240v1", "date": "2026-04-10", "relevancy": 2.1098, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5386}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5267}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5015}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DiffHLS%3A%20Differential%20Learning%20for%20High-Level%20Synthesis%20QoR%20Prediction%20with%20GNNs%20and%20LLM%20Code%20Embeddings&body=Title%3A%20DiffHLS%3A%20Differential%20Learning%20for%20High-Level%20Synthesis%20QoR%20Prediction%20with%20GNNs%20and%20LLM%20Code%20Embeddings%0AAuthor%3A%20Zedong%20Peng%20and%20Zeju%20Li%20and%20Qiang%20Xu%20and%20Jieru%20Zhao%0AAbstract%3A%20High-Level%20Synthesis%20%28HLS%29%20compiles%20C/C%2B%2B%20into%20RTL%2C%20but%20exploring%20pragma-driven%20optimization%20choices%20remains%20expensive%20because%20each%20design%20point%20requires%20time-consuming%20synthesis.%20We%20propose%20%5Ctextbf%7B%5CDiffHLS%7D%2C%20a%20differential%20learning%20framework%20for%20HLS%20Quality-of-Result%20%28QoR%29%20prediction%20that%20learns%20from%20kernel--design%20pairs%3A%20a%20kernel%20baseline%20and%20a%20pragma-inserted%20design%20variant.%20%5CDiffHLS~encodes%20kernel%20and%20design%20intermediate-representation%20graphs%20with%20dedicated%20graph%20neural%20network%20%28GNN%29%20branches%2C%20and%20augments%20the%20delta%20pathway%20with%20code%20embeddings%20from%20a%20pretrained%20code%20large%20language%20model%20%28LLM%29.%20Instead%20of%20regressing%20absolute%20targets%20directly%2C%20we%20jointly%20predict%20the%20kernel%20baseline%20and%20the%20design-induced%20delta%2C%20and%20compose%20them%20to%20obtain%20the%20design%20prediction.%20On%20PolyBench%2C%20%5CDiffHLS~attains%20lower%20average%20MAPE%20than%20GNN%20baselines%20under%20four%20GNN%20backbones%2C%20and%20LLM%20code%20embeddings%20consistently%20improve%20over%20a%20GNN-only%20ablation.%20We%20further%20validate%20scalability%20on%20the%20ForgeHLS%20dataset.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09240v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDiffHLS%253A%2520Differential%2520Learning%2520for%2520High-Level%2520Synthesis%2520QoR%2520Prediction%2520with%2520GNNs%2520and%2520LLM%2520Code%2520Embeddings%26entry.906535625%3DZedong%2520Peng%2520and%2520Zeju%2520Li%2520and%2520Qiang%2520Xu%2520and%2520Jieru%2520Zhao%26entry.1292438233%3DHigh-Level%2520Synthesis%2520%2528HLS%2529%2520compiles%2520C/C%252B%2

{"title": "Characterizing Lidar Range-Measurement Ambiguity due to Multiple Returns", "author": "Jason H. Rife and Yifan Li", "abstract": "Reliable position and attitude sensing is critical for highly automated vehicles that operate on conventional roadways. Lidar sensors are increasingly incorporated into pose-estimation systems. Despite its great utility, lidar is a complex sensor, and its performance in roadway environments is not yet well understood. For instance, it is often assumed in lidar-localization algorithms that a lidar will always identify a unique surface along a given raypath. However, this assumption is not always true, as ample prior evidence exists to suggest that lidar units may generate measurements probabilistically when more than one scattering surface appears within the lidar's conical beam. In this paper, we analyze lidar datasets to characterize cases with probabilistic returns along particular raypaths. Our contribution is to present representative cumulative distribution functions (CDFs) for raypaths observed by two different mechanically rotating lidar units with stationary bases. In subsequent discussion, we outline a qualitative methodology to assess the effect of probabilistic multi-return cases on lidar-based localization.", "link": "http://arxiv.org/abs/2604.09282v1", "date": "2026-04-10", "relevancy": 2.1091, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5697}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5357}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4815}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Characterizing%20Lidar%20Range-Measurement%20Ambiguity%20due%20to%20Multiple%20Returns&body=Title%3A%20Characterizing%20Lidar%20Range-Measurement%20Ambiguity%20due%20to%20Multiple%20Returns%0AAuthor%3A%20Jason%20H.%20Rife%20and%20Yifan%20Li%0AAbstract%3A%20Reliable%20position%20and%20attitude%20sensing%20is%20critical%20for%20highly%20automated%20vehicles%20that%20operate%20on%20conventional%20roadways.%20Lidar%20sensors%20are%20increasingly%20incorporated%20into%20pose-estimation%20systems.%20Despite%20its%20great%20utility%2C%20lidar%20is%20a%20complex%20sensor%2C%20and%20its%20performance%20in%20roadway%20environments%20is%20not%20yet%20well%20understood.%20For%20instance%2C%20it%20is%20often%20assumed%20in%20lidar-localization%20algorithms%20that%20a%20lidar%20will%20always%20identify%20a%20unique%20surface%20along%20a%20given%20raypath.%20However%2C%20this%20assumption%20is%20not%20always%20true%2C%20as%20ample%20prior%20evidence%20exists%20to%20suggest%20that%20lidar%20units%20may%20generate%20measurements%20probabilistically%20when%20more%20than%20one%20scattering%20surface%20appears%20within%20the%20lidar%27s%20conical%20beam.%20In%20this%20paper%2C%20we%20analyze%20lidar%20datasets%20to%20characterize%20cases%20with%20probabilistic%20returns%20along%20particular%20raypaths.%20Our%20contribution%20is%20to%20present%20representative%20cumulative%20distribution%20functions%20%28CDFs%29%20for%20raypaths%20observed%20by%20two%20different%20mechanically%20rotating%20lidar%20units%20with%20stationary%20bases.%20In%20subsequent%20discussion%2C%20we%20outline%20a%20qualitative%20methodology%20to%20assess%20the%20effect%20of%20probabilistic%20multi-return%20cases%20on%20lidar-based%20localization.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09282v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCharacteriz http%253A//arxiv.org/abs/2604.09282v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Characterizing%20Lidar%20Range-Measurement%20Ambiguity%20due%20to%20Multiple%20Returns&entry.906535625=Jason%20H.%20Rife%20and%20Yifan%20Li&entry.1292438233=Reliable%20position%20and%20attitude%20sensing%20is%20critical%20for%20highly%20automated%20vehicles%20that%20operate%20on%20conventional%20roadways.%20Lidar%20sensors%20are%20increasingly%20incorporated%20into%20pose-estimation%20systems.%20Despite%20its%20great%20utility%2C%20lidar%20is%20a%20complex%20sensor%2C%20and%20its%20performance%20in%20roadway%20environments%20is%20not%20yet%20well%20understood.%20For%20instance%2C%20it%20is%20often%20assumed%20in%20lidar-localization%20algorithms%20that%20a%20lidar%20will%20always%20identify%20a%20unique%20surface%20along%20a%20given%20raypath.%20However%2C%20this%20assumption%20is%20not%20always%20true%2C%20as%20ample%20prior%20evidence%20exists%20to%20suggest%20that%20lidar%20units%20may%20generate%20measurements%20probabilistically%20when%20more%20than%20one%20scattering%20surface%20appears%20within%20the%20lidar%27s%20conical%20beam.%20In%20this%20paper%2C%20we%20analyze%20lidar%20datasets%20to%20characterize%20cases%20with%20probabilistic%20returns%20along%20particular%20raypaths.%20Our%20contribution%20is%20to%20present%20representative%20cumulative%20distribution%20functions%20%28CDFs%29%20for%20raypaths%20observed%20by%20two%20different%20mechanically%20rotating%20lidar%20units%20with%20stationary%20bases.%20In%20subsequent%20discussion%2C%20we%20outline%20a%20qualitative%20methodology%20to%20assess%20the%20effect%20of%20probabilistic%20multi-return%20cases%20on%20lidar-based%20localization.&entry.1838667208=http%3A//arxiv.org/abs/2604.09282v1&entry.124074799=Read"},
{"title": "Chain-of-Zoom: Extreme Super-Resolution via Scale Autoregression and Preference Alignment", "author": "Bryan Sangwoo Kim and Jeongsol Kim and Jong Chul Ye", "abstract": "Modern single-image super-resolution (SISR) models deliver photo-realistic results at the scale factors on which they are trained, but collapse when asked to magnify far beyond that regime. We address this scalability bottleneck with Chain-of-Zoom (CoZ), a model-agnostic framework that factorizes SISR into an autoregressive chain of intermediate scale-states with multi-scale-aware prompts. CoZ repeatedly re-uses a backbone SR model, decomposing the conditional probability into tractable sub-problems to achieve extreme resolutions without additional training. Because visual cues diminish at high magnifications, we augment each zoom step with multi-scale-aware text prompts generated by a vision-language model (VLM). The prompt extractor itself is fine-tuned using Generalized Reward Policy Optimization (GRPO) with a critic VLM, aligning text guidance towards human preference. Experiments show that a standard 4x diffusion SR model wrapped in CoZ attains beyond 256x enlargement with high perceptual quality and fidelity. Project Page: https://bryanswkim.github.io/chain-of-zoom/.", "link": "http://arxiv.org/abs/2505.18600v3", "date": "2026-04-10", "relevancy": 2.1039, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.533}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5264}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5227}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Chain-of-Zoom%3A%20Extreme%20Super-Resolution%20via%20Scale%20Autoregression%20and%20Preference%20Alignment&body=Title%3A%20Chain-of-Zoom%3A%20Extreme%20Super-Resolution%20via%20Scale%20Autoregression%20and%20Preference%20Alignment%0AAuthor%3A%20Bryan%20Sangwoo%20Kim%20and%20Jeongsol%20Kim%20and%20Jong%20Chul%20Ye%0AAbstract%3A%20Modern%20single-image%20super-resolution%20%28SISR%29%20models%20deliver%20photo-realistic%20results%20at%20the%20scale%20factors%20on%20which%20they%20are%20trained%2C%20but%20collapse%20when%20asked%20to%20magnify%20far%20beyond%20that%20regime.%20We%20address%20this%20scalability%20bottleneck%20with%20Chain-of-Zoom%20%28CoZ%29%2C%20a%20model-agnostic%20framework%20that%20factorizes%20SISR%20into%20an%20autoregressive%20chain%20of%20intermediate%20scale-states%20with%20multi-scale-aware%20prompts.%20CoZ%20repeatedly%20re-uses%20a%20backbone%20SR%20model%2C%20decomposing%20the%20conditional%20probability%20into%20tractable%20sub-problems%20to%20achieve%20extreme%20resolutions%20without%20additional%20training.%20Because%20visual%20cues%20diminish%20at%20high%20magnifications%2C%20we%20augment%20each%20zoom%20step%20with%20multi-scale-aware%20text%20prompts%20generated%20by%20a%20vision-language%20model%20%28VLM%29.%20The%20prompt%20extractor%20itself%20is%20fine-tuned%20using%20Generalized%20Reward%20Policy%20Optimization%20%28GRPO%29%20with%20a%20critic%20VLM%2C%20aligning%20text%20guidance%20towards%20human%20preference.%20Experiments%20show%20that%20a%20standard%204x%20diffusion%20SR%20model%20wrapped%20in%20CoZ%20attains%20beyond%20256x%20enlargement%20with%20high%20perceptual%20quality%20and%20fidelity.%20Project%20Page%3A%20https%3A//bryanswkim.github.io/chain-of-zoom/.%0ALink%3A%20http%3A//arxiv.org/abs/2505.18600v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DChain-of-Zoom%253A%2520Extreme%2520Super-Resolution%2520via%2520Scale%2520Autoregression%2520and%2520Preference%2520Alignment%26entry.906535625%3DBryan%2520Sangwoo%2520Kim%2520an hain-of-Zoom%3A%20Extreme%20Super-Resolution%20via%20Scale%20Autoregression%20and%20Preference%20Alignment&entry.906535625=Bryan%20Sangwoo%20Kim%20and%20Jeongsol%20Kim%20and%20Jong%20Chul%20Ye&entry.1292438233=Modern%20single-image%20super-resolution%20%28SISR%29%20models%20deliver%20photo-realistic%20results%20at%20the%20scale%20factors%20on%20which%20they%20are%20trained%2C%20but%20collapse%20when%20asked%20to%20magnify%20far%20beyond%20that%20regime.%20We%20address%20this%20scalability%20bottleneck%20with%20Chain-of-Zoom%20%28CoZ%29%2C%20a%20model-agnostic%20framework%20that%20factorizes%20SISR%20into%20an%20autoregressive%20chain%20of%20intermediate%20scale-states%20with%20multi-scale-aware%20prompts.%20CoZ%20repeatedly%20re-uses%20a%20backbone%20SR%20model%2C%20decomposing%20the%20conditional%20probability%20into%20tractable%20sub-problems%20to%20achieve%20extreme%20resolutions%20without%20additional%20training.%20Because%20visual%20cues%20diminish%20at%20high%20magnifications%2C%20we%20augment%20each%20zoom%20step%20with%20multi-scale-aware%20text%20prompts%20generated%20by%20a%20vision-language%20model%20%28VLM%29.%20The%20prompt%20extractor%20itself%20is%20fine-tuned%20using%20Generalized%20Reward%20Policy%20Optimization%20%28GRPO%29%20with%20a%20critic%20VLM%2C%20aligning%20text%20guidance%20towards%20human%20preference.%20Experiments%20show%20that%20a%20standard%204x%20diffusion%20SR%20model%20wrapped%20in%20CoZ%20attains%20beyond%20256x%20enlargement%20with%20high%20perceptual%20quality%20and%20fidelity.%20Project%20Page%3A%20https%3A//bryanswkim.github.io/chain-of-zoom/.&entry.1838667208=http%3A//arxiv.org/abs/2505.18600v3&entry.124074799=Read"},
{"title": "Hierarchical SVG Tokenization: Learning Compact Visual Programs for Scalable Vector Graphics Modeling", "author": "Ximing Xing and Ziteng Xue and Zhenxi Li and Weicong Liang and Linqing Wang and Zhantao Yang and Tiankai Hang and Zijin Yin and Qinglin Lu and Chunyu Wang and Qian Yu", "abstract": "Recent large language models have shifted SVG generation from differentiable rendering optimization to autoregressive program synthesis. However, existing approaches still rely on generic byte-level tokenization inherited from natural language processing, which poorly reflects the geometric structure of vector graphics. Numerical coordinates are fragmented into discrete symbols, destroying spatial relationships and introducing severe token redundancy, often leading to coordinate hallucination and inefficient long-sequence generation. To address these challenges, we propose HiVG, a hierarchical SVG tokenization framework tailored for autoregressive vector graphics generation. HiVG decomposes raw SVG strings into structured \\textit{atomic tokens} and further compresses executable command--parameter groups into geometry-constrained \\textit{segment tokens}, substantially improving sequence efficiency while preserving syntactic validity. To further mitigate spatial mismatch, we introduce a Hierarchical Mean--Noise (HMN) initialization strategy that injects numerical ordering signals and semantic priors into new token embeddings. Combined with a curriculum training paradigm that progressively increases program complexity, HiVG enables more stable learning of executable SVG programs. Extensive experiments on both text-to-SVG and image-to-SVG tasks demonstrate improved generation fidelity, spatial consistency, and sequence efficiency compared with conventional tokenization schemes. Our code is publicly available at https://github.com/ximinng/HiVG", "link": "http://arxiv.org/abs/2604.05072v2", "date": "2026-04-10", "relevancy": 2.0981, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5316}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5214}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5149}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hierarchical%20SVG%20Tokenization%3A%20Learning%20Compact%20Visual%20Programs%20for%20Scalable%20Vector%20Graphics%20Modeling&body=Title%3A%20Hierarchical%20SVG%20Tokenization%3A%20Learning%20Compact%20Visual%20Programs%20for%20Scalable%20Vector%20Graphics%20Modeling%0AAuthor%3A%20Ximing%20Xing%20and%20Ziteng%20Xue%20and%20Zhenxi%20Li%20and%20Weicong%20Liang%20and%20Linqing%20Wang%20and%20Zhantao%20Yang%20and%20Tiankai%20Hang%20and%20Zijin%20Yin%20and%20Qinglin%20Lu%20and%20Chunyu%20Wang%20and%20Qian%20Yu%0AAbstract%3A%20Recent%20large%20language%20models%20have%20shifted%20SVG%20generation%20from%20differentiable%20rendering%20optimization%20to%20autoregressive%20program%20synthesis.%20However%2C%20existing%20approaches%20still%20rely%20on%20generic%20byte-level%20tokenization%20inherited%20from%20natural%20language%20processing%2C%20which%20poorly%20reflects%20the%20geometric%20structure%20of%20vector%20graphics.%20Numerical%20coordinates%20are%20fragmented%20into%20discrete%20symbols%2C%20destroying%20spatial%20relationships%20and%20introducing%20severe%20token%20redundancy%2C%20often%20leading%20to%20coordinate%20hallucination%20and%20inefficient%20long-sequence%20generation.%20To%20address%20these%20challenges%2C%20we%20propose%20HiVG%2C%20a%20hierarchical%20SVG%20tokenization%20framework%20tailored%20for%20autoregressive%20vector%20graphics%20generation.%20HiVG%20decomposes%20raw%20SVG%20strings%20into%20structured%20%5Ctextit%7Batomic%20tokens%7D%20and%20further%20compresses%20executable%20command--parameter%20groups%20into%20geometry-constrained%20%5Ctextit%7Bsegment%20tokens%7D%2C%20substantially%20improving%20sequence%20efficiency%20while%20preserving%20syntactic%20validity.%20To%20further%20mitigate%20spatial%20mismatch%2C%20we%20introduce%20a%20Hierarchical%20Mean--Noise%20%28HMN%29%20initialization%20strategy%20that%20injects%20numerical%20ordering%20signals%20and%20semantic%20priors%20into%20new%20token%20embeddings.%20Combined%20with%20a%20curriculum%20training%20paradigm%20that%20progressively%20increases%20program%20complexity%2C%20HiVG%20enables%20more%20stable%20learning%20of%20executable%20SVG%20programs.%20Extensive%20experiments%20on%20both%20text-to-SVG%20and%20image-to-SVG%20tasks%20demonstrate%20improved%20generation%20fidelity%2C%20spatial%20consistency%2C%20and%20sequence%20efficiency%20compared%20with%20conventional%20tokenization%20schemes.%20Our%20code%20is%20publicly%20available%20at%20https%3A//github.com/ximinng/HiVG%0ALink%3A%20http%3A//arxiv.org/abs/2604.05072v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHierarchical%2520SVG%2520Tokenization%253A%2520Learning%2520Compact%2520Visual%2520Programs%2520for%2520Scalable%2520Vector%2520Graphics%2520Modeling%26entry.906535625%3DXiming%2520Xing%2520and%2520Ziteng%2520Xue%2520and%2520Zhenxi%2520Li%2520and%2520Weicong%2520Liang%2520and%2520Linqing%2520Wang%2520and%2520Zhantao%2520Yang%2520and%2520Tiankai%2520Hang%2520and%2520Zijin%2520Yin%2520and%2520Qinglin%2520Lu%2520and%2520Chunyu%2520Wang%2520and%2520Qian%2520Yu%26entry.1292438233%3DRecent%2520large%2520language%2520models%2520have%2520shifted%2520SVG%2520generation%2520from%2520differentiable%2520rendering%2520optimization%2520to%2520autoregressive%2520program%2520synthesis.%2520However%252C%2520existing%2520approaches%2520still%2520rely%2520on%2520generic%2520byte-level%2520tokenization%2520inherited%2520from%2520natural%25 {"title": "Continuous Orthogonal Mode Decomposition: Haptic Signal Prediction in Tactile Internet", "author": "Mohammad Ali Vahedifar and Mojtaba Nazari and Qi Zhang", "abstract": "The Tactile Internet demands sub-millisecond latency and ultra-high reliability, as high latency or packet loss could lead to haptic control instability. To address this, we propose the Mode-Domain Architecture (MDA), a bilateral predictive neural network architecture designed to restore missing signals on both the human and robot sides. Unlike conventional models that extract features implicitly from raw data, MDA utilizes a novel Continuous-Orthogonal Mode Decomposition framework. By integrating an orthogonality constraint, we overcome the pervasive issue of \"mode overlapping\" found in state-of-the-art decomposition methods. Experimental results demonstrate that this structured feature extraction achieves high prediction accuracies of 98.6% (human) and 97.3% (robot). Furthermore, the model achieves ultra-low inference latency of 0.065 ms, significantly outperforming existing benchmarks and meeting the stringent real-time requirements of haptic teleoperation.", "link": "http://arxiv.org/abs/2604.09446v1", "date": "2026-04-10", "relevancy": 2.0979, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5844}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5196}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5054}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Continuous%20Orthogonal%20Mode%20Decomposition%3A%20Haptic%20Signal%20Prediction%20in%20Tactile%20Internet&body=Title%3A%20Continuous%20Orthogonal%20Mode%20Decomposition%3A%20Haptic%20Signal%2 0loss%2520could%2520lead%2520to%2520haptic%2520control%2520instability.%2520To%2520address%2520this%252C%2520we%2520propose%2520the%2520Mode-Domain%2520Architecture%2520%2528MDA%2529%252C%2520a%2520bilateral%2520predictive%2520neural%2520network%2520architecture%2520designed%2520to%2520restore%2520missing%2520signals%2520on%2520both%2520the%2520human%2520and%2520robot%2520sides.%2520Unlike%2520conventional%2520models%2520that%2520extract%2520features%2520implicitly%2520from%2520raw%2520data%252C%2520MDA%2520utilizes%2520a%2520novel%2520Continuous-Orthogonal%2520Mode%2520Decomposition%2520framework.%2520By%2520integrating%2520an%2520orthogonality%2520constraint%252C%2520we%2520overcome%2520the%2520pervasive%2520issue%2520of%2520%2522mode%2520overlapping%2522%2520found%2520in%2520state-of-the-art%2520decomposition%2520methods.%2520Experimental%2520results%2520demonstrate%2520that%2520this%2520structured%2520feature%2520extraction%2520achieves%2520high%2520prediction%2520accuracies%2520of%252098.6%2525%2520%2528human%2529%2520and%252097.3%2525%2520%2528robot%2529.%2520Furthermore%252C%2520the%2520model%2520achieves%2520ultra-low%2520inference%2520latency%2520of%25200.065%2520ms%252C%2520significantly%2520outperforming%2520existing%2520benchmarks%2520and%2520meeting%2520the%2520stringent%2520real-time%2520requirements%2520of%2520haptic%2520teleoperation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.09446v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Continuous%20Orthogonal%20Mode%20Decomposition%3A%20Haptic%20Signal%20Prediction%20in%20Tactile%20Internet&entry.906535625=Mohammad%20Ali%20Vahedifar%20and%20Mojtaba%20Nazari%20and%20Qi%20Zhang&entry.1292438233=The%20Tactile%20Internet%20demands%20sub-millisecond%20latency%20and%20ultra-high%20reliability%2C%20as%20high%20latency%20or%20packet%20loss%20could%20lead%20to%20haptic%20control%20instability.%20To%20address%20this%2C%20we%20propose%20the%20Mode-Domain%20Architecture%20%28MDA%29%2C%20a%20bilateral%20predictive%20neural%20network%20architecture%20designed%20to%20restore%20missing%20signals%20on%20both%20the%20human%20and%20robot%20sides.%20Unlike%20conventional%20models%20that%20extract%20features%20implicitly%20from%20raw%20data%2C%20MDA%20utilizes%20a%20novel%20Continuous-Orthogonal%20Mode%20Decomposition%20framework.%20By%20integrating%20an%20orthogonality%20constraint%2C%20we%20overcome%20the%20pervasive%20issue%20of%20%22mode%20overlapping%22%20found%20in%20state-of-the-art%20decomposition%20methods.%20Experimental%20results%20demonstrate%20that%20this%20structured%20feature%20extraction%20achieves%20high%20prediction%20accuracies%20of%2098.6%25%20%28human%29%20and%2097.3%25%20%28robot%29.%20Furthermore%2C%20the%20model%20achieves%20ultra-low%20inference%20latency%20of%200.065%20ms%2C%20significantly%20outperforming%20existing%20benchmarks%20and%20meeting%20the%20stringent%20real-time%20requirements%20of%20haptic%20teleoperation.&entry.1838667208=http%3A//arxiv.org/abs/2604.09446v1&entry.124074799=Read"},
{"title": "EmoCtrl: Controllable Emotional Image Content Generation", "author": "Jingyuan Yang and Weibin Luo and Hui Huang", "abstract": "An image conveys meaning through both its visual content and emotional tone, jointly shaping human perception. We introduce Controllable Emotional Image Content Generation (C-EICG), which aims to generate images that remain faithful to a given content description while expressing a target emotion. Existing text-to-image models ensure content consistency but lack emotional awareness, whereas emotion-driven models generate affective results at the cost of content distortion. To address this gap, we propose EmoCtrl, supported by a dataset annotated with content, emotion, and affective prompts, bridging abstract emotions to visual cues. EmoCtrl incorporates textual and visual emotion enhancement modules that enrich affective expression via descriptive semantics and perceptual cues. To align with human preference, we further introduce an emotion-driven preference optimization with specifically designed emotion reward. Comprehensive experiments demonstrate that EmoCtrl achieves faithful content and expressive emotion control, outperforming existing methods. User studies confirm EmoCtrl's strong alignment with human preference. Moreover, EmoCtrl generalizes well to creative applications, further demonstrating the robustness and adaptability of the learned emotion tokens.", "link": "http://arxiv.org/abs/2512.22437v2", "date": "2026-04-10", "relevancy": 2.0919, "topK": [{"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.5261}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5253}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5091}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EmoCtrl%3A%20Controllable%20Emotional%20Image%20Content%20Generation&body=Title%3A%20EmoCtrl%3A%20Controllable%20Emotional%20Image%20Content%20Generation%0AAuthor%3A%20Jingyuan%20Yang%20and%20Weibin%20Luo%20and%20Hui%20Huang%0AAbstract%3A%20An%20image%20conveys%20meaning%20through%20both%20its%20visual%20content%20and%20emotional%20tone%2C%20jointly%20shaping%20human%20perception.%20We%20introduce%20Controllable%20Emotional%20Image%20Content%20Generation%20%28C-EICG%29%2C%20which%20aims%20to%20generate%20images%20that%20remain%20faithful%20to%20a%20given%20content%20description%20while%20expressing%20a%20target%20emotion.%20Existing%20text-to-image%20models%20ensure%20content%20consistency%20but%20lack%20emotional%20awareness%2C%20whereas%20emotion-driven%20models%20generate%20affective%20results%20at%20the%20cost%20of%20content%20distortion.%20To%20address%20this%20gap%2C%20we%20propose%20EmoCtrl%2C%20supported%20by%20a%20dataset%20annotated%20with%20content%2C%20emotion%2C%20and%20affective%20prompts%2C%20bridging%20abstract%20emotions%20to%20visual%20cues.%20EmoCtrl%20incorporates%20textual%20and%20visual%20emotion%20enhancement%20modules%20that%20enrich%20affective%20expression%20via%20descriptive%20semantics%20and%20perceptual%20cues.%20To%20align%20with%20human%20preference%2C%20we%20further%20introduce%20an%20emotion-driven%20preference%20optimization%20with%20specifically%20designed%20emotion%20reward.%20Comprehensive%20experiments%20demonstrate%20that%20EmoCtrl%20achieves%20faithful%20content%20and%20expressive%20emotion%20control%2C%20outperforming%20existing%20methods.%20User%20studies%20confirm%20EmoCtrl%27s%20strong%20alignment%20with%20human%20preference.%20Moreover%2C%20EmoCtrl%20generalizes%20well%20to%20creative%20applications%2C%20further%20demonstrating%20the%20robustness%20and%20adaptability%20of%20the%20learned%20emotion%20tokens.%0ALink%3A%20http%3A//arxiv.org/a ethods.%2520User%2520studies%2520confirm%2520EmoCtrl%2527s%2520strong%2520alignment%2520with%2520human%2520preference.%2520Moreover%252C%2520EmoCtrl%2520generalizes%2520well%2520to%2520creative%2520applications%252C%2520further%2520demonstrating%2520the%2520robustness%2520and%2520adaptability%2520of%2520the%2520learned%2520emotion%2520tokens.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.22437v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=EmoCtrl%3A%20Controllable%20Emotional%20Image%20Content%20Generation&entry.906535625=Jingyuan%20Yang%20and%20Weibin%20Luo%20and%20Hui%20Huang&entry.1292438233=An%20image%20conveys%20meaning%20through%20both%20its%20visual%20content%20and%20emotional%20tone%2C%20jointly%20shaping%20human%20perception.%20We%20introduce%20Controllable%20Emotional%20Image%20Content%20Generation%20%28C-EICG%29%2C%20which%20aims%20to%20generate%20images%20that%20remain%20faithful%20to%20a%20given%20content%20description%20while%20expressing%20a%20target%20emotion.%20Existing%20text-to-image%20models%20ensure%20content%20consistency%20but%20lack%20emotional%20awareness%2C%20whereas%20emotion-driven%20models%20generate%20affective%20results%20at%20the%20cost%20of%20content%20distortion.%20To%20address%20this%20gap%2C%20we%20propose%20EmoCtrl%2C%20supported%20by%20a%20dataset%20annotated%20with%20content%2C%20emotion%2C%20and%20affective%20prompts%2C%20bridging%20abstract%20emotions%20to%20visual%20cues.%20EmoCtrl%20incorporates%20textual%20and%20visual%20emotion%20enhancement%20modules%20that%20enrich%20affective%20expression%20via%20descriptive%20semantics%20and%20perceptual%20cues.%20To%20align%20with%20human%20preference%2C%20we%20further%20introduce%20an%20emotion-driven%20preference%20optimization%20with%20specifically%20designed%20emotion%20reward.%20Comprehensive%20experiments%20demonstrate%20that%20EmoCtrl%20achieves%20faithful%20content%20and%20expressive%20emotion%20control%2C%20outperforming%20existing%20methods.%20User%20studies%20confirm%20EmoCtrl%27s%20strong%20alignment%20with%20human%20preference.%20Moreover%2C%20EmoCtrl%20generalizes%20well%20to%20creative%20applications%2C%20further%20demonstrating%20the%20robustness%20and%20adaptability%20of%20the%20learned%20emotion%20tokens.&entry.1838667208=http%3A//arxiv.org/abs/2512.22437v2&entry.124074799=Read"},
{"title": "Constraining Sequential Model Editing with Editing Anchor Compression", "author": "Hao-Xiang Xu and Jun-Yu Ma and Zhen-Hua Ling and Ningyu Zhang and Jia-Chen Gu", "abstract": "Large language models (LLMs) struggle with hallucinations due to false or outdated knowledge. Given the high resource demands of retraining these models, there is an increasing focus on developing model editing. However, the general abilities of LLMs across downstream tasks are prone to significant degradation during sequential editing. This paper statistically observes that the parameter matrix after editing exhibits a significant deviation compared to its previous state as the number of edits increases. This serious deviation affects the original knowledge associations within LLMs and leads to the degradation of their general abilities. To this end, a framework termed Editing Anchor Compression (EAC) is proposed to constrain the deviation of the parameter matrix during sequential editing. It compresses the editing information by selecting editing anchors that are important in encoding new relations without deviating too much from the original matrix, thereby preserving the general abilities. Experiments of applying EAC to two popular editing methods on three LLMs across four tasks are conducted. Evaluation results show that EAC effectively minimizes unreasonable deviations caused by model editing, preserving over 70% of the general abilities while better retaining the editing knowledge compared to the original counterpart methods.", "link": "http://arxiv.org/abs/2503.00035v2", "date": "2026-04-10", "relevancy": 2.0894, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5232}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5232}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5179}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Constraining%20Sequential%20Model%20Editing%20with%20Editing%20Anchor%20Compression&body=Title%3A%20Constraining%20Sequential%20Model%20Editing%20with%20Editing%20Anchor%20Compression%0AAuthor%3A%20Hao-Xiang%20Xu%20and%20Jun-Yu%20Ma%20and%20Zhen-Hua%20Ling%20and%20Ningyu%20Zhang%20and%20Jia-Chen%20Gu%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20struggle%20with%20hallucinations%20due%20to%20false%20or%20outdated%20knowledge.%20Given%20the%20high%20resource%20demands%20of%20retraining%20these%20models%2C%20there%20is%20an%20increasing%20focus%20on%20developing%20model%20editing.%20However%2C%20the%20general%20abilities%20of%20LLMs%20across%20downstream%20tasks%20are%20prone%20to%20significant%20degradation%20during%20sequential%20editing.%20This%20paper%20statistically%20observes%20that%20the%20parameter%20matrix%20after%20editing%20exhibits%20a%20significant%20deviation%20compared%20to%20its%20previous%20state%20as%20the%20number%20of%20edits%20increases.%20This%20serious%20deviation%20affects%20the%20original%20knowledge%20associations%20within%20LLMs%20and%20leads%20to%20the%20degradation%20of%20their%20general%20abilities.%20To%20this%20end%2C%20a%20framework%20termed%20Editing%20Anchor%20Compression%20%28EAC%29%20is%20proposed%20to%20constrain%20the%20deviation%20of%20the%20parameter%20matrix%20during%20sequential%20editing.%20It%20compresses%20the%20editing%20information%20by%20selecting%20editing%20anchors%20that%20are%20important%20in%20encoding%20new%20relations%20without%20deviating%20too%20much%20from%20the%20original%20matrix%2C%20thereby%20preserving%20the%20general%20abilities.%20Experiments%20of%20applying%20EAC%20to%20two%20popular%20editing%20methods%20on%20three%20LLMs%20across%20four%20tasks%20are%20conducted.%20Evaluation%20results%20show%20that%20EAC%20effectively%20minimizes%20unreasonable%20deviations%20caused%20by%20model%20editing%2C%20preserving%20over%2070%25%20of%20the%20general%20abilities%20while%20better%20retaining%20the%20editing%20knowledge%20compared%20to%20the%20original%20counterpart%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2503.00035v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DConstraining%2520Sequential%2520Model%2520Editing%2520with%2520Editing%2520Anchor%2520Compression%26entry.906535625%3DHao-Xiang%2520Xu%2520and%2520Jun-Yu%2520Ma%2520and%2520Zhen-Hua%2520Ling%2520and%2520Ningyu%2520Zhang%2520and%2520Jia-Chen%2520Gu%26entry.1292438233%3DLarge%2520language%2520models%2520%2528LLMs%2529%2520struggle%2520with%2520hallucinations%2520due%2520to%2520false%2520or%2520outdated%2520knowledge.%2520Given%2520the%2520high%2520resource%2520demands%2520of%2520retraining%2520these%2520models%252C%2520there%2520is%2520an%2520increasing%2520focus%2520on%2520developing%2520model%2520editing.%2520However%252C%2520the%2520general%2520abilities%2520of%2520LLMs%2520across%2520downstream%2520tasks%2520are%2520prone%2520to%2520significant%2520degradation%2520during%2520sequential%2520editing.%2520This%2520paper%2520statistically%2520observes%2520that%2520the%2520parameter%2520matrix%2520after%2520editing%2520exhibits%2520a%2520significant%2520deviation%2520compared%2520to%2520its%2520previous%2520state%2520as%2520the%2520number%2520of%2520edits%2520increases.%2520This%2520serious%2520deviation%2520affects%2520the%2520original%2520knowledge%2520associations%2520within%2520LLMs%2520and%2520leads%2520to%2520the%2520degradation%2520of%2520their%2520general%2520abilities.%2520To%2520this%2520end%252C%2520a%2520framework%2520termed%2520Editing%2520Anchor%2520Compression%2520%2528EAC%2529%2520is%2520proposed%2520to%2520constrain%2520the%2520deviation%2520of%2520the%2520parameter%2520matrix%2520during%2520sequential%2520edit {"title": "Streaming Video Instruction Tuning", "author": "Jiaer Xia and Peixian Chen and Mengdan Zhang and Xing Sun and Kaiyang Zhou", "abstract": "We present Streamo, a real-time streaming video LLM that serves as a general-purpose interactive assistant. Unlike existing online video models that focus narrowly on question answering or captioning, Streamo performs a broad spectrum of streaming video tasks, including real-time narration, action understanding, event captioning, temporal event grounding, and time-sensitive question answering. To develop such versatility, we construct Streamo-Instruct-465K, a large-scale instruction-following dataset tailored for streaming video understanding. The dataset covers diverse temporal contexts and multi-task supervision, enabling unified training across heterogeneous streaming tasks. After training end-to-end on the instruction-following dataset through a streamlined pipeline, Streamo exhibits strong temporal reasoning, responsive interaction, and broad generalization across a variety of streaming benchmarks. Extensive experiments show that Streamo bridges the gap between offline video perception models and real-time multimodal assistants, making a step toward unified, intelligent video understanding in continuous video streams.", "link": "http://arxiv.org/abs/2512.21334v2", "date": "2026-04-10", "relevancy": 2.0875, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5396}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5183}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5183}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Streaming%20Video%20Instruction%20Tuning&body=Tit {"title": "Seeing is Believing: Robust Vision-Guided Cross-Modal Prompt Learning under Label Noise", "author": "Zibin Geng and Xuefeng Jiang and Jia Li and Zheng Li and Tian Wen and Lvhua Wu and Sheng Sun and Yuwei Wang and Min Liu", "abstract": "Prompt learning is a parameter-efficient approach for vision-language models, yet its robustness under label noise is less investigated. Visual content contains richer and more reliable semantic information, which remains more robust under label noise. However, the prompt itself is highly susceptible to label noise. Motivated by this intuition, we propose VisPrompt, a lightweight and robust vision-guided prompt learning framework for noisy-label settings. Specifically, we exploit a cross-modal attention mechanism to reversely inject visual semantics into prompt representations. This enables the prompt tokens to selectively aggregate visual information relevant to the current sample, thereby improving robustness by anchoring prompt learning to stable instance-level visual evidence and reducing the influence of noisy supervision. To address the instability caused by using the same way of injecting visual information for all samples, despite differences in the quality of their visual cues, we further introduce a lightweight conditional modulation mechanism to adaptively control the strength of visual information injection, which strikes a more robust balance between text-side semantic priors and image-side instance evidence. The proposed framework effectively suppresses the noise-induced disturbances, reduce instability in prompt updates, and alleviate memorization of mislabeled samples. VisPrompt significantly improves robustness while keeping the pretrained VLM backbone frozen and introducing only a small amount of additional trainable parameters. Extensive experiments under synthetic and real-world label noise demonstrate that VisPrompt generally outperforms existing baselines on seven benchmark datasets and achieves stronger robustness. Our code is publicly available at https://github.com/gezbww/Vis_Prompt.", "link": "http://arxiv.org/abs/2604.09532v1", "date": "2026-04-10", "relevancy": 2.0849, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5237}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5207}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5207}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Seeing%20is%20Believing%3A%20Robust%20Vision-Guided%20Cross-Modal%20Prompt%20Learning%20under%20Label%20Noise&body=Title%3A%20Seeing%20is%20Believing%3A%20Robust%20Vision-Guided%20Cross-Modal%20Prompt%20Learning%20under%20Label%20Noise%0AAuthor%3A%20Zibin%20Geng%20and%20Xuefeng%20Jiang%20and%20Jia%20Li%20and%20Zheng%20Li%20and%20Tian%20Wen%20and%20Lvhua%20Wu%20and%20Sheng%20Sun%20and%20Yuwei%20Wang%20and%20Min%20Liu%0AAbstract%3A%20Prompt%20learning%20is%20a%20parameter-efficient%20approach%20for%20vision-language%20models%2C%20yet%20its%20robustness%20under%20label%20noise%20is%20less%20investigated.%20Visual%20content%20contains%20richer%20and%20more%20reliable%20semantic%20information%2C%20which%20remains%20more%20robust%20under%20label%20noise.%20However%2C%20the%20prompt%20itself%20is%20highly%20susceptible%20to%20label%20noise.%20Motivated%20by%20this%20intuition%2C%20we%20propose%20VisPrompt%2C%20a%20lightweight%20and%20robust%20vision-guided%20prompt%20learning%20framework%20for%20noisy-label%20settings.%20Specifically%2C%20we%20exploit%20a%20cross-modal%20attention%20mechanism%20to%20reversely%20inject%20visual%20semantics%20into%20prompt%20representations.%20This%20enables%20the%20prompt%20tokens%20to%20selectively%20aggregate%20visual%20information%20relevant%20to%20the%20current%20sample%2C%20thereby%20improving%20robustness%20by%20anchoring%20prompt%20learning%20to%20stable%20instance-level%20visual%20evidence%20and%20reducing%20the%20influence%20of%20noisy%20supervision.%20To%20address%20the%20instability%20caused%20by%20using%20the%20same%20way%20of%20injecting%20visual%20information%20for%20all%20samples%2C%20despite%20differences%20in%20the%20quality%20of%20their%20visual%20cues%2C%20we%20further%20introduce%20a%20lightweight%20conditional%20modulation%20mechanism%20to%20adaptively%20control%20the%20strength%20of%20visual%20information%20injection%2C%20which%20strikes%20a%20more%20robust%20balance%20between%20text-side%20semantic%20priors%20and%20image-side%20instance%20evidence.%20The%20proposed%20framework%20effectively%20suppresses%20the%20noise-induced%20disturbances%2C%20reduce%20instability%20in%20prompt%20updates%2C%20and%20alleviate%20memorization%20of%20mislabeled%20samples.%20VisPrompt%20significantly%20improves%20robustness%20while%20keeping%20the%20pretrained%20VLM%20backbone%20frozen%20and%20introducing%20only%20a%20small%20amount%20of%20additional%20trainable%20parameters.%20Extensive%20experiments%20under%20synthetic%20and%20real-world%20label%20noise%20demonstrate%20that%20VisPrompt%20generally%20outperforms%20existing%20baselines%20on%20seven%20benchmark%20datasets%20and%20achieves%20stronger%20robustness.%20Our%20code%20is%20publicly%20available%20at%20https%3A//github.com/gezbww/Vis_Prompt.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09532v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSeeing%2520is%2520Believing%253A%2520Robust%2520Vision-Guided%2520Cross-Modal%2520Prompt%2520Learning%2520under%2520Label%2520Noise%26entry.906535625%3DZibin%2520Geng%2520and%2520Xuefeng%2520Jiang%2520and%2520Jia%2520Li%2520and%2520Zheng%2520Li%2520and%2520Tian%2520Wen%2 {"title": "RecaLLM: Addressing the Lost-in-Thought Phenomenon with Explicit In-Context Retrieval", "author": "Kyle Whitecross and Negin Rahimi", "abstract": "We propose RecaLLM, a set of reasoning language models post-trained to make effective use of long-context information. In-context retrieval, which identifies relevant evidence from context, and reasoning are deeply intertwined: retrieval supports reasoning, while reasoning often determines what must be retrieved. However, their interaction remains largely underexplored. In preliminary experiments on several open-source LLMs, we observe that in-context retrieval performance substantially degrades even after a short reasoning span, revealing a key bottleneck for test-time scaling that we refer to as lost-in-thought: reasoning steps that improve performance also make subsequent in-context retrieval more challenging. To address this limitation, RecaLLM interleaves reasoning with explicit in-context retrieval, alternating between reasoning and retrieving context information needed to solve intermediate subproblems. We introduce a negligible-overhead constrained decoding mechanism that enables verbatim copying of evidence spans, improving the grounding of subsequent generation. Trained on diverse lexical and semantic retrieval tasks, RecaLLM achieves strong performance on two long-context benchmarks, RULER and HELMET, significantly outperforming baselines. Notably, we observe consistent gains at context windows of up to 128K tokens using training samples of at most 10K tokens, far shorter than those used by existing long-context approaches, highlighting a promising path toward improving long-context performance without expensive long-context training data.", "link": "http://arxiv.org/abs/2604.09494v1", "date": "2026-04-10", "relevancy": 2.0804, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5313}, {"t e%20spans%2C%20improving%20the%20grounding%20of%20subsequent%20generation.%20Trained%20on%20diverse%20lexical%20and%20semantic%20retrieval%20tasks%2C%20RecaLLM%20achieves%20strong%20performance%20on%20two%20long-context%20benchmarks%2C%20RULER%20and%20HELMET%2C%20significantly%20outperforming%20baselines.%20Notably%2C%20we%20observe%20consistent%20gains%20at%20context%20windows%20of%20up%20to%20128K%20tokens%20using%20training%20samples%20of%20at%20most%2010K%20tokens%2C%20far%20shorter%20than%20those%20used%20by%20existing%20long-context%20approaches%2C%20highlighting%20a%20promising%20path%20toward%20improving%20long-context%20performance%20without%20expensive%20long-context%20training%20data.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09494v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRecaLLM%253A%2520Addressing%2520the%2520Lost-in-Thought%2520Phenomenon%2520with%2520Explicit%2520In-Context%2520Retrieval%26entry.906535625%3DKyle%2520Whitecross%2520and%2520Negin%2520Rahimi%26entry.1292438233%3DWe%2520propose%2520RecaLLM%252C%2520a%2520set%2520of%2520reasoning%2520language%2520models%2520post-trained%2520to%2520make%2520effective%2520use%2520of%2520long-context%2520information.%2520In-context%2520retrieval%252C%2520which%2520identifies%2520relevant%2520evidence%2520from%2520context%252C%2520and%2520reasoning%2520are%2520deeply%2520intertwined%253A%2520retrieval%2520supports%2520reasoning%252C%2520while%2520reasoning%2520often%2520determines%2520what%2520must%2520be%2520retrieved.%2520However%252C%2520their%2520interaction%2520remains%2520largely%2520underexplored.%2520In%2520preliminary%2520experiments%2520on%2520several%2520open-source%2520LLMs%252C%2520we%2520observe%2520that%2520in-context%2520retrieval%2520performance%2520substantially%2520degrades%2520even%2520after%2520a%2520short%2520reasoning%2520span%252C%2520revealing%2520a%2520key%2520bottleneck%2520for%2520test-time {"title": "Multimodal Anomaly Detection for Human-Robot Interaction", "author": "Guilherme Ribeiro and Iordanis Antypas and Leonardo Bizzaro and Jo\u00e3o Bimbo and Nuno Cruz Garcia", "abstract": "Ensuring safety and reliability in human-robot interaction (HRI) requires the timely detection of unexpected events that could lead to system failures or unsafe behaviours. Anomaly detection thus plays a critical role in enabling robots to recognize and respond to deviations from normal operation during collaborative tasks. While reconstruction models have been actively explored in HRI, approaches that operate directly on feature vectors remain largely unexplored. In this work, we propose MADRI, a framework that first transforms video streams into semantically meaningful feature vectors before performing reconstruction-based anomaly detection. Additionally, we augment these visual feature vectors with the robot's internal sensors' readings and a Scene Graph, enabling the model to capture both external anomalies in the visual environment and internal failures within the robot itself. To evaluate our approach, we collected a custom dataset consisting of a simple pick-and-place robotic task under normal and anomalous conditions. Experimental results demonstrate that reconstruction on vision-based feature vectors alone is effective for detecting anomalies, while incorporating other modalities further improves detection performance, highlighting the benefits of multimodal feature reconstruction for robust anomaly detection in human-robot collaboration.", "link": "http://arxiv.org/abs/2604.09326v1", "date": "2026-04-10", "relevancy": 1.6849, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6097}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.548}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5477}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multimodal%20Anomaly%20Detection%20for%20Human-Robot%20Interaction&body=Title%3A%20Multimodal%20Anomaly%20Detection%20for%20Human-Robot%20Interaction%0AAuthor%3A%20Guilherme%20Ribeiro%20and%20Iordanis%20Antypas%20and%20Leonardo%20Bizzaro%20and%20Jo%C3%A3o%20Bimbo%20and%20Nuno%20Cruz%20Garcia%0AAbstract%3A%20Ensuring%20safety%20and%20reliability%20in%20human-robot%20interaction%20%28HRI%29%20requires%20the%20timely%20detection%20of%20unexpected%20events%20that%20could%20lead%20to%20system%20failures%20or%20unsafe%20behaviours.%20Anomaly%20detection%20thus%20plays%20a%20critical%20role%20in%20enabling%20robots%20to%20recognize%20and%20respond%20to%20deviations%20from%20normal%20operation%20during%20collaborative%20tasks.%20While%20reconstruction%20models%20have%20been%20actively%20explored%20in%20HRI%2C%20approaches%20that%20operate%20directly%20on%20feature%20vectors%20remain%20largely%20unexplored.%20In%20this%20work%2C%20we%20propose%20MADRI%2C%20a%20framework%20that%20first%20transforms%20video%20streams%20into%20semantically%20meaningful%20feature%20vectors%20before%20performing%20reconstruction-based%20anomaly%20detection.%20Additionally%2C%20we%20augment%20these%20visual%20feature%20vectors%20with%20the%20robot%27s%20internal%20sensors%27%20readings%20and%20a%20Scene%20Graph%2C%20enabling%20the%20model%20to%20capture%20both%20external%20anomalies%20in%20the%20visual%20environment%20and%20internal%20failures%20within%20the%20robot%20itself.%20To%20evaluate%20our%20approach%2C%20we%20collected%20a%20custom%20dataset%20consisting%20of%20a%20simple%20pick-and-place%20robotic%20task%20under%20normal%20and%20anomalous%20conditions.%20Experimental%20results%20demonstrate%20that%20reconstructio {"title": "DRBENCHER: Can Your Agent Identify the Entity, Retrieve Its Properties and Do the Math?", "author": "Young-Suk Lee and Ramon Fernandez Astudillo and Radu Florian", "abstract": "Deep research agents increasingly interleave web browsing with multi-step computation, yet existing benchmarks evaluate these capabilities in isolation, creating a blind spot in assessing real-world performance. We introduce DRBENCHER, a synthetic benchmark generator for questions that require both browsing and computation. It enforces four criteria: verifiability (gold answers are computed by executing parameterized code over knowledge-graph values), complexity (multi-hop entity identification, property retrieval, and domain-specific computation), difficulty (a two-stage verification cascade filters out questions solvable by the generating model), and diversity (a greedy max-min embedding filter maximizes coverage). These criteria are realized via a unified answer-first pipeline spanning five domains: biochemistry, financial, geophysical, security, and history. Human evaluation shows 76% validity (84% excluding stale data), with 35% of errors due to outdated knowledge-graph entries, highlighting an inherent limitation of systems that reason over evolving data. Automatic evaluation shows that the strongest frontier model achieves only 20% answer accuracy. Compared to manually constructed benchmarks (BrowseComp+, MATH-500, GPQA), DRBENCHER achieves the highest semantic diversity.", "link": "http://arxiv.org/abs/2604.09251v1", "date": "2026-04-10", "relevancy": 1.8901, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4913}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4688}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4688}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DRBENCHER%3A%20Can%20Your%20Agent%20Identify%20the%20Entity%2C%20Retrieve%20Its%20Properties%20and%20Do%20the%20Math%3F&body=Title%3A%20DRBENCHER%3A%20Can%20Your%20Agent%20Identify%20the%20Entity%2C%20Retrieve%20Its%20Properties%20and%20Do%20the%20Math%3F%0AAuthor%3A%20Young-Suk%20Lee%20and%20Ramon%20Fernandez%20Astudillo%20and%20Radu%20Florian%0AAbstract%3A%20Deep%20research%20agents%20increasingly%20interleave%20web%20browsing%20with%20multi-step%20computation%2C%20yet%20existing%20benchmarks%20evaluate%20these%20capabilities%20in%20isolation%2C%20creating%20a%20blind%20spot%20in%20assessing%20real-world%20performance.%20We%20introduce%20DRBENCHER%2C%20a%20synthetic%20benchmark%20generator%20for%20questions%20that%20require%20both%20browsing%20and%20computation.%20It%20enforces%20four%20criteria%3A%20verifiability%20%28gold%20answers%20are%20computed%20by%20executing%20parameterized%20code%20over%20knowledge-graph%20values%29%2C%20complexity%20%28multi-hop%20entity%20identification%2C%20property%20retrieval%2C%20and%20domain-specific%20computation%29%2C%20difficulty%20%28a%20two-stage%20verification%20cascade%20filters%20out%20questions%20solvable%20by%20the%20generating%20model%29%2C%20and%20diversity%20%28a%20greedy%20max-min%20embedding%20filter%20maximizes%20coverage%29.%20These%20criteria%20are%20realized%20via%20a%20unified%20answer-first%20pipeline%20spanning%20five%20domains%3A%20biochemistry%2C%20financial%2C%20geophysical%2C%20security%2C%20and%20history.%20Human%20evaluation%20shows%2076%25%20validity%20%2884%25%20excluding%20stale%20data%29%2C%20with%2035%25%20of%20errors%20due%20to%20outdated%20knowledge-graph%20entries%2C%20highlighting%20an%20inherent%20limitation%20of%20systems%20that%20reason%20over%20evolving%20data.%20Automatic%20evaluation%20shows%20that%20the%20strongest%20frontier%20model%20achieves%20only%2020%25%20answer%20accuracy.%20Compared%20to%20manually%20constructed%20benchmarks%20%28BrowseComp%2B%2C%20MATH-500%2C%20GPQA%29%2C%20DRBENCHER%20achieves%20the%20highest%20semantic%20diversity.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09251v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDRBENCHER%253A%2520Can%2520Your%2520Agent%2520Identify%2520the%2520Entity%252C%2520Retrieve%2520Its%2520Properties%2520and%2520Do%2520the%2520Math%253F%26entry.906535625%3DYoung-Suk%2520Lee%2520and%2520Ramon%2520Fernandez%2520Astudillo%2520and%2520Radu%2520Florian%26entry.1292438233%3DDeep%2520research%2520agents%2520increasingly%2520interleave%2520web%2520browsing%2520with%2520multi-step%2520computation%252C%2520yet%2520existing%2520benchmarks%2520evaluate%2520these%2520capabilities%2520in%2520isolation%252C%2520creating%2520a%2520blind%2520spot%2520in%2520assessing%2520real-world%2520performance.%2520We%2520introduce%2520DRBENCHER%252C%2520a%2520synthetic%2520benchmark%2520generator%2520for%2520questions%2520that%2520require%2520both%2520browsing%2520and%2520computation.%2520It%2520enforces%2520four%2520criteria%253A%2520verifiability%2520%2528gold%2520answers%2520are%2520computed%2520by%2520executing%2520parameterized%2520code%2520over%2520knowledge-graph%2520values%2529%252C%2520complexity%2520%2528multi-hop%2520entity%2520identification%252C%2520property%2520retrieval%252C%2520and%2520domain-specific%2520computation%2529%252C%2520difficulty%2520%2528a%2520two-stage%2520verification%2520cascade%2520filters%2520out%2520questions%2520solvable%2520by%2520the%2520generating%2520model%2529%252C%2520and%2520diversity%2520%2528a%2520greedy%2520max-min%2520embedding%2520filter%2520maximizes%2520coverage%2529.%2520These%2520criteria%2520are%2520realized%2520via%2520a%2520unified%2520answer-first%2520pipeline%2520spanning%2520five%2520domains%253A%2520biochemistry%252C {"title": "TopoFlow: Topography-aware Pollutant Flow Learning for High-Resolution Air Quality Prediction", "author": "Ammar Kheder and Helmi Toropainen and Wenqing Peng and Samuel Ant\u00e3o and Jia Chen and Michael Boy and Zhi-Song Liu", "abstract": "We propose TopoFlow (Topography-aware pollutant Flow learning), a physics-guided neural network for efficient, high-resolution air quality prediction. To explicitly embed physical processes into the learning framework, we identify two critical factors governing pollutant dynamics: topography and wind direction. Complex terrain can channel, block, and trap pollutants, while wind acts as a primary driver of their transport and dispersion. Building on these insights, TopoFlow leverages a vision transformer architecture with two novel mechanisms: topography-aware attention, which explicitly models terrain-induced flow patterns, and wind-guided patch reordering, which aligns spatial representations with prevailing wind directions. Trained on six years of high-resolution reanalysis data assimilating observations from over 1,400 surface monitoring stations across China, TopoFlow achieves a PM2.5 RMSE of 9.71 ug/m3, representing a 71-80% improvement over operational forecasting systems and a 13% improvement over state-of-the-art AI baselines. Forecast errors remain well below China's 24-hour air quality threshold of 75 ug/m3 (GB 3095-2012), enabling reliable discrimination between clean and polluted conditions. These performance gains are consistent across all four major pollutants and forecast lead times from 12 to 96 hours, demonstrating that principled integration of physical knowledge into neural networks can fundamentally advance air quality prediction.", "link": "http://arxiv.org/abs/2602.16821v2", "date": "2026-04-10", "relevancy": 1.4558, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5661}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4643}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4568}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TopoFlow%3A%20Topography-aware%20Pollutant%20Flow%20Learning%20for%20High-Resolution%20Air%20Quality%20Prediction&body=Title%3A%20TopoFlow%3A%20Topography-aware%20Pollutant%20Flow%20Learning%20for%20High-Resolution%20Air%20Quality%20Prediction%0AAuthor%3A%20Ammar%20Kheder%20and%20Helmi%20Toropainen%20and%20Wenqing%20Peng%20and%20Samuel%20Ant%C3%A3o%20and%20Jia%20Chen%20and%20Michael%20Boy%20and%20Zhi-Song%20Liu%0AAbstract%3A%20We%20propose%20TopoFlow%20%28Topography-aware%20pollutant%20Flow%20learning%29%2C%20a%20physics-guided%20neural%20network%20for%20efficient%2C%20high-resolution%20air%20quality%20prediction.%20To%20explicitly%20embed%20physical%20processes%20into%20the%20learning%20framework%2C%20we%20identify%20two%20critical%20factors%20governing%20pollutant%20dynamics%3A%20topography%20and%20wind%20direction.%20Complex%20terrain%20can%20channel%2C%20block%2C%20and%20trap%20pollutants%2C%20while%20wind%20acts%20as%20a%20primary%20driver%20of%20their%20transport%20and%20dispersion.%20Building%20on%20these%20insights%2C%20TopoFlow%20leverages%20a%20vision%20transformer%20architecture%20with%20two%20novel%20mechanisms%3A%20topography-aware%20attention%2C%20which%20explicitly%20models%20terrain-induced%20flow%20patterns%2C%20and%20wind-guided%20patch%20reordering%2C%20which%20aligns%20spatial%20representations%20with%20prevailing%20wind%20directions.%20Trained%20on%20six%20years%20of%20high-resolution%20reanalysis%20data%20assimilating%20observations%20from%20over%201%2C400%20surface%20monitoring%20stations%20across%20China%2C%20TopoFlow%20achieves%20a%20PM2.5%20RMSE%20of%209.71%20ug/m3%2C%20representing%20a%2071-80%25%20improvement%20over%20operational%20forecasting%20systems%20and%20a%2013%25%20improvement%20over%20state-of-the-art%20AI%20baselines.%20Forecast%20errors%20remain%20well%20below%20China%27s%2024-hour%20air%20quality%20threshold%20of%2075%20ug/m3%20%28GB%203095-2012%29%2C%20enabling%20reliable%20discrimination%20between%20clean%20and%20polluted%20conditions.%20These%20performance%20gains%20are%20consistent%20across%20all%20four%20major%20pollutants%20and%20forecast%20lead%20times%20from%2012%20to%2096%20hours%2C%20demonstrating%20that%20principled%20integration%20of%20physical%20knowledge%20into%20neural%20networks%20can%20fundamentally%20advance%20air%20quality%20prediction.%0ALink%3A%20http%3A//arxiv.org/abs/2602.16821v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTopoFlow%253A%2520Topography-aware%2520Pollutant%2520Flow%2520Learning%2520for%2520High-Resolution%2520Air%2520Quality%2520Prediction%26entry.906535625%3DAmmar%2520Kheder%2520and%2520Helmi%2520Toropainen%2520and%2520Wenqing%2520Peng%2520and%2520Samuel%2520Ant%25C3%25A3o%2520and%2520Jia%2520Chen%2520and%2520Michael%2520Boy%2520and%2520Zhi-Song%2520Liu%26entry.1292438233%3DWe%2520propose%2520TopoFlow%2520%2528Topography-aware%2520pollutant%2520Flow%2520learning%2529%252C%2520a%2520physics-guided%2520neural%2520network%2520for%2520efficient%252C%2520high-resolution%2520air%2520quality%2520prediction.%2520To%2520explicitly%2520embed%2520physical%2520processes%2520into%2520the%2520learning%2520framework%252C%2520we%2520identify%2520two%2520critical%2520factors%2520governing%2520pollutant%2520dynamics%253A%2520topography%2520and%2520wind%2520direction.%2520Complex%2520terrain%2520can%2520channel%252C%2520block%252C%2520and%2520trap%2520pollutants%252C%2520while%2520wind%2520acts%2520as%2520a%2520primary%2520driver%2520of%2520their%2520transport%2520and%2520dispersio {"title": "XFED: Non-Collusive Model Poisoning Attack Against Byzantine-Robust Federated Classifiers", "author": "Israt Jahan Mouri and Muhammad Ridowan and Muhammad Abdullah Adnan", "abstract": "Model poisoning attacks pose a significant security threat to Federated Learning (FL). Most existing model poisoning attacks rely on collusion, requiring adversarial clients to coordinate by exchanging local benign models and synchronizing the generation of their poisoned updates. However, sustaining such coordination is increasingly impractical in real-world FL deployments, as it effectively requires botnet-like control over many devices. This approach is costly to maintain and highly vulnerable to detection. This context raises a fundamental question: Can model poisoning attacks remain effective without any communication between attackers? To address this challenge, we introduce and formalize the \\textbf{non-collusive attack model}, in which all compromised clients share a common adversarial objective but operate independently. Under this model, each attacker generates its malicious update without communicating with other adversaries, accessing other clients' updates, or relying on any knowledge of server-side defenses. To demonstrate the feasibility of this threat model, we propose \\textbf{XFED}, the first aggregation-agnostic, non-collusive model poisoning attack. Our empirical evaluation across six benchmark datasets shows that XFED bypasses eight state-of-the-art defenses and outperforms six existing model poisoning attacks. These findings indicate that FL systems are substantially less secure than previously believed and underscore the urgent need for more robust and practical defense mechanisms.", "link": "http://arxiv.org/abs/2604.09489v1", "date": "2026-04-10", "relevancy": 1.3272, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarit ients%27%20updates%2C%20or%20relying%20on%20any%20knowledge%20of%20server-side%20defenses.%20To%20demonstrate%20the%20feasibility%20of%20this%20threat%20model%2C%20we%20propose%20%5Ctextbf%7BXFED%7D%2C%20the%20first%20aggregation-agnostic%2C%20non-collusive%20model%20poisoning%20attack.%20Our%20empirical%20evaluation%20across%20six%20benchmark%20datasets%20shows%20that%20XFED%20bypasses%20eight%20state-of-the-art%20defenses%20and%20outperforms%20six%20existing%20model%20poisoning%20attacks.%20These%20findings%20indicate%20that%20FL%20systems%20are%20substantially%20less%20secure%20than%20previously%20believed%20and%20underscore%20the%20urgent%20need%20for%20more%20robust%20and%20practical%20defense%20mechanisms.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09489v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DXFED%253A%2520Non-Collusive%2520Model%2520Poisoning%2520Attack%2520Against%2520Byzantine-Robust%2520Federated%2520Classifiers%26entry.906535625%3DIsrat%2520Jahan%2520Mouri%2520and%2520Muhammad%2520Ridowan%2520and%2520Muhammad%2520Abdullah%2520Adnan%26entry.1292438233%3DModel%2520poisoning%2520attacks%2520pose%2520a%2520significant%2520security%2520threat%2520to%2520Federated%2520Learning%2520%2528FL%2529.%2520Most%2520existing%2520model%2520poisoning%2520attacks%2520rely%2520on%2520collusion%252C%2520requiring%2520adversarial%2520clients%2520to%2520coordinate%2520by%2520exchanging%2520local%2520benign%2520models%2520and%2520synchronizing%2520the%2520generation%2520of%2520their%2520poisoned%2520updates.%2520However%252C%2520sustaining%2520such%2520coordination%2520is%2520increasingly%2520impractical%2520in%2520real-world%2520FL%2520deployments%252C%2520as%2520it%2520effectively%2520requires%2520botnet-like%2520control%2520over%2520many%2520devices.%2520This%2520approach%2520is%2520costly%2520to%2520maintain%2520and%2520highly%2520vulnerable%2520to%2520detection.%2520This%2520cont {"title": "Semantic Rate-Distortion for Bounded Multi-Agent Communication: Capacity-Derived Semantic Spaces and the Communication Cost of Alignment", "author": "Anthony T. Nixon", "abstract": "When two agents of different computational capacities interact with the same environment, they need not compress a common semantic alphabet differently; they can induce different semantic alphabets altogether. We show that the quotient POMDP $Q_{m,T}(M)$ - the unique coarsest abstraction consistent with an agent's capacity - serves as a capacity-derived semantic space for any bounded agent, and that communication between heterogeneous agents exhibits a sharp structural phase transition. Below a critical rate $R_{\\text{crit}}$ determined by the quotient mismatch, intent-preserving communication is structurally impossible. In the supported one-way memoryless regime, classical side-information coding then yields exponential decay above the induced benchmark. Classical coding theorems tell you the rate once the source alphabet is fixed; our contribution is to derive that alphabet from bounded interaction itself.\n  Concretely, we prove: (1) a fixed-$\\varepsilon$ structural phase-transition theorem whose lower bound is fully general on the common-history quotient comparison; (2) a one-way Wyner-Ziv benchmark identification on quotient alphabets, with exact converse, exact operational equality for memoryless quotient sources, and an ergodic long-run bridge via explicit mixing bounds; (3) an asymptotic one-way converse in the shrinking-distortion regime $\\varepsilon = O(1/T)$, proved from the message stream and decoder side information; and (4) alignment traversal bounds enabling compositional communication through intermediate capacity levels. Experiments on eight POMDP environments (including RockSample(4,4)) illustrate the phase transition, a structured-policy benchmark shows the one-way rate can drop by up to $19\\times$ relative to the counting bound, and a shrinking-distortion sweep matches the regime of the asymptotic converse.", "link": "http://arxiv.org/abs/2604.09521v1", "date": "2026-04-10", "relevancy": 1.3543, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5079}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4398}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.424}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Semantic%20Rate-Distortion%20for%20Bounded%20Multi-Agent%20Communication%3A%20Capacity-Derived%20Semantic%20Spaces%20and%20the%20Communication%20Cost%20of%20Alignment&body=Title%3A%20Semantic%20Rate-Distortion%20for%20Bounded%20Multi-Agent%20Communication%3A%20Capacity-Derived%20Semantic%20Spaces%20and%20the%20Communication%20Cost%20of%20Alignment%0AAuthor%3A%20Anthony%20T.%20Nixon%0AAbstract%3A%20When%20two%20agents%20of%20different%20computational%20capacities%20interact%20with%20the%20same%20environment%2C%20they%20need%20not%20compress%20a%20common%20semantic%20alphabet%20differently%3B%20they%20can%20induce%20different%20semantic%20alphabets%20altogether.%20We%20show%20that%20the%20quotient%20POMDP%20%24Q_%7Bm%2CT%7D%28M%29%24%20-%20the%20unique%20coarsest%20abstraction%20consistent%20with%20an%20agent%27s%20capacity%20-%20serves%20as%20a%20capacity-derived%20semantic%20space%20for%20any%20bounded%20agent%2C%20and%20that%20communication%20between%20heterogeneous%20agents%20exhibits%20a%20sharp%20structural%20phase%20transition.%20Below%20a%20critical%20rate%20%24R_%7B%5Ctext%7Bcrit%7D%7D%24%20determined%20by%20the%20quotient%20mismatch%2C%20intent-preserving%20communication%20is%20structurally%20impossible.%20In%20the%20supported%20one-way%20memoryless%20regime%2C%20classical%20side-information%20coding%20then%20yields%20exponential%20decay%20above%20the%20induced%20benchmark.%20Classical%20coding%20theorems%20tell%20you%20the%20rate%20once%20the%20source%20alphabet%20is%20fixed%3B%20our%20contribution%20is%20to%20derive%20that%20alphabet%20from%20bounded%20interaction%20itself.%0A%20%20Concretely%2C%20we%20prove%3A%20%281%29%20a%20fixed-%24%5Cvarepsilon%24%20structural%20phase-transition%20theorem%20whose%20lower%20bound%20is%20fully%20general%20on%20the%20common-history%20quotient%20comparison%3B%20%282%29%20a%20one-way%20Wyner-Ziv%20benchmark%20identification%20on%20quotient%20alphabets%2C%20with%20exact%20converse%2C%20exact%20operational%20equality%20for%20memoryless%20quotient%20sources%2C%20and%20an%20ergodic%20long-run%20bridge%20via%20explicit%20mixing%20bounds%3B%20%283%29%20an%20asymptotic%20one-way%20converse%20in%20the%20shrinking-distortion%20regime%20%24%5Cvarepsilon%20%3D%20O%281/T%29%24%2C%20proved%20from%20the%20message%20stream%20and%20decoder%20side%20information%3B%20and%20%284%29%20alignment%20traversal%20bounds%20enabling%20compositional%20communication%20through%20intermediate%20capacity%20levels.%20Experiments%20on%20eight%20POMDP%20environments%20%28including%20RockSample%284%2C4%29%29%20illustrate%20the%20phase%20transition%2C%20a%20structured-policy%20benchmark%20shows%20the%20one-way%20rate%20can%20drop%20by%20up%20to%20%2419%5Ctimes%24%20relative%20to%20the%20counting%20bound%2C%20and%20a%20shrinking-distortion%20sweep%20matches%20the%20regime%20of%20the%20asymptotic%20converse.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09521v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSemantic%2520Rate-Distortion%2520for%2520Bounded%2520Multi-Agent%2520Communication%253A%2520Capacity-Derived%2520Semantic%2520Spaces%2520and%2520the%2520Communication%2520Cost%2520of%2520Alignment%26entry.906535625%3DAnthony%2520T.%2520Nixon% {"title": "Bayesian Social Deduction with Graph-Informed Language Models", "author": "Shahab Rahimirad and Guven Gergerli and Lucia Romero and Angela Qian and Matthew Lyle Olson and Simon Stepputtis and Joseph Campbell", "abstract": "Social reasoning - inferring unobservable beliefs and intentions from partial observations of other agents - remains a challenging task for large language models (LLMs). We evaluate the limits of current reasoning language models in the social deduction game Avalon and find that while the largest models demonstrate strong performance, they require extensive test-time inference and degrade sharply when distilled to smaller, real-time-capable variants. To address this, we introduce a hybrid reasoning framework that externalizes belief inference to a structured probabilistic model, while using an LLM for language understanding and interaction. Our approach achieves competitive performance with much larger models in Agent-Agent play and, notably, is the first language agent to defeat human players in a controlled study - achieving a 67% win rate and receiving higher qualitative ratings than both reasoning baselines and human teammates. We release code, models, and a dataset to support future work on social reasoning in LLM agents, which can be found at https://camp-lab-purdue.github.io/bayesian-social-deduction/", "link": "http://arxiv.org/abs/2506.17788v2", "date": "2026-04-10", "relevancy": 1.8999, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5229}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4654}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4654}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Bayesian%20Social%20Deduction%20with%20Graph-Informed%20Language%20Models&body=Title%3A%20Bayesian%20Social%20Deduction%20with%20Graph-Informed%20Language%20Models%0AAuthor%3A%20Shahab%20Rahimirad%20and%20Guven%20Gergerli%20and%20Lucia%20Romero%20and%20Angela%20Qian%20and%20Matthew%20Lyle%20Olson%20and%20Simon%20Stepputtis%20and%20Joseph%20Campbell%0AAbstract%3A%20Social%20reasoning%20-%20inferring%20unobservable%20beliefs%20and%20intentions%20from%20partial%20observations%20of%20other%20agents%20-%20remains%20a%20challenging%20task%20for%20large%20language%20models%20%28LLMs%29.%20We%20evaluate%20the%20limits%20of%20current%20reasoning%20language%20models%20in%20the%20social%20deduction%20game%20Avalon%20and%20find%20that%20while%20the%20largest%20models%20demonstrate%20strong%20performance%2C%20they%20require%20extensive%20test-time%20inference%20and%20degrade%20sharply%20when%20distilled%20to%20smaller%2C%20real-time-capable%20variants.%20To%20address%20this%2C%20we%20introduce%20a%20hybrid%20reasoning%20framework%20that%20externalizes%20belief%20inference%20to%20a%20structured%20probabilistic%20model%2C%20while%20using%20an%20LLM%20for%20language%20understanding%20and%20interaction.%20Our%20approach%20achieves%20competitive%20performance%20with%20much%20larger%20models%20in%20Agent-Agent%20play%20and%2C%20notably%2C%20is%20the%20first%20language%20agent%20to%20defeat%20human%20players%20in%20a%20controlled%20study%20-%20achieving%20a%2067%25%20win%20rate%20and%20receiving%20higher%20qualitative%20ratings%20than%20both%20reasoning%20baselines%20and%20human%20teammates.%20We%20release%20code%2C%20models%2C%20and%20a%20dataset%20to%20support%20future%20work%20on%20social%20reasoning%20in%20LLM%20agents%2C%20which%20can%20be%20found%20at%20https%3A//camp-lab-purdue.github.io/bayesian-social-deduction/%0ALink%3A%20http%3A//arxiv.org/abs/2506.17788v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv 520support%2520future%2520work%2520on%2520social%2520reasoning%2520in%2520LLM%2520agents%252C%2520which%2520can%2520be%2520found%2520at%2520https%253A//camp-lab-purdue.github.io/bayesian-social-deduction/%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2506.17788v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Bayesian%20Social%20Deduction%20with%20Graph-Informed%20Language%20Models&entry.906535625=Shahab%20Rahimirad%20and%20Guven%20Gergerli%20and%20Lucia%20Romero%20and%20Angela%20Qian%20and%20Matthew%20Lyle%20Olson%20and%20Simon%20Stepputtis%20and%20Joseph%20Campbell&entry.1292438233=Social%20reasoning%20-%20inferring%20unobservable%20beliefs%20and%20intentions%20from%20partial%20observations%20of%20other%20agents%20-%20remains%20a%20challenging%20task%20for%20large%20language%20models%20%28LLMs%29.%20We%20evaluate%20the%20limits%20of%20current%20reasoning%20language%20models%20in%20the%20social%20deduction%20game%20Avalon%20and%20find%20that%20while%20the%20largest%20models%20demonstrate%20strong%20performance%2C%20they%20require%20extensive%20test-time%20inference%20and%20degrade%20sharply%20when%20distilled%20to%20smaller%2C%20real-time-capable%20variants.%20To%20address%20this%2C%20we%20introduce%20a%20hybrid%20reasoning%20framework%20that%20externalizes%20belief%20inference%20to%20a%20structured%20probabilistic%20model%2C%20while%20using%20an%20LLM%20for%20language%20understanding%20and%20interaction.%20Our%20approach%20achieves%20competitive%20performance%20with%20much%20larger%20models%20in%20Agent-Agent%20play%20and%2C%20notably%2C%20is%20the%20first%20language%20agent%20to%20defeat%20human%20players%20in%20a%20controlled%20study%20-%20achieving%20a%2067%25%20win%20rate%20and%20receiving%20higher%20qualitative%20ratings%20than%20both%20reasoning%20baselines%20and%20human%20teammates.%20We%20release%20code%2C%20models%2C%20and%20a%20dataset%20to%20support

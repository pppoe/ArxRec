{"title": "Unmasking Puppeteers: Leveraging Biometric Leakage to Disarm Impersonation in AI-based Videoconferencing", "author": "Danial Samadi Vahdati and Tai Duc Nguyen and Ekta Prashnani and Koki Nagano and David Luebke and Orazio Gallo and Matthew Stamm", "abstract": "AI-based talking-head videoconferencing systems reduce bandwidth by sending a compact pose-expression latent and re-synthesizing RGB at the receiver, but this latent can be puppeteered, letting an attacker hijack a victim's likeness in real time. Because every frame is synthetic, deepfake and synthetic video detectors fail outright. To address this security problem, we exploit a key observation: the pose-expression latent inherently contains biometric information of the driving identity. Therefore, we introduce the first biometric leakage defense without ever looking at the reconstructed RGB video: a pose-conditioned, large-margin contrastive encoder that isolates persistent identity cues inside the transmitted latent while cancelling transient pose and expression. A simple cosine test on this disentangled embedding flags illicit identity swaps as the video is rendered. Our experiments on multiple talking-head generation models show that our method consistently outperforms existing puppeteering defenses, operates in real-time, and shows strong generalization to out-of-distribution scenarios.", "link": "http://arxiv.org/abs/2510.03548v3", "date": "2026-04-10", "relevancy": 2.7835, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5879}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5438}, {"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.5385}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unmasking%20Puppeteers%3A%20Leveraging%20Biometric%20Leakage%20to%20Disarm%20Impersonation%20in%20AI-based%20Videoconferencing&body=Title%3A%20Unmasking%20Puppeteers%3A%20Leveraging%20Biometric%20Leakage%20to%20Disarm%20Impersonation%20in%20AI-based%20Videoconferencing%0AAuthor%3A%20Danial%20Samadi%20Vahdati%20and%20Tai%20Duc%20Nguyen%20and%20Ekta%20Prashnani%20and%20Koki%20Nagano%20and%20David%20Luebke%20and%20Orazio%20Gallo%20and%20Matthew%20Stamm%0AAbstract%3A%20AI-based%20talking-head%20videoconferencing%20systems%20reduce%20bandwidth%20by%20sending%20a%20compact%20pose-expression%20latent%20and%20re-synthesizing%20RGB%20at%20the%20receiver%2C%20but%20this%20latent%20can%20be%20puppeteered%2C%20letting%20an%20attacker%20hijack%20a%20victim%27s%20likeness%20in%20real%20time.%20Because%20every%20frame%20is%20synthetic%2C%20deepfake%20and%20synthetic%20video%20detectors%20fail%20outright.%20To%20address%20this%20security%20problem%2C%20we%20exploit%20a%20key%20observation%3A%20the%20pose-expression%20latent%20inherently%20contains%20biometric%20information%20of%20the%20driving%20identity.%20Therefore%2C%20we%20introduce%20the%20first%20biometric%20leakage%20defense%20without%20ever%20looking%20at%20the%20reconstructed%20RGB%20video%3A%20a%20pose-conditioned%2C%20large-margin%20contrastive%20encoder%20that%20isolates%20persistent%20identity%20cues%20inside%20the%20transmitted%20latent%20while%20cancelling%20transient%20pose%20and%20expression.%20A%20simple%20cosine%20test%20on%20this%20disentangled%20embedding%20flags%20illicit%20identity%20swaps%20as%20the%20video%20is%20rendered.%20Our%20experiments%20on%20multiple%20talking-head%20generation%20models%20show%20that%20our%20method%20consistently%20outperforms%20existing%20puppeteering%20defenses%2C%20operates%20in%20real-time%2C%20and%20shows%20strong%20generalization%20to%20out-of-distribution%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2510.03548v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj existing%2520puppeteering%2520defenses%252C%2520operates%2520in%2520real-time%252C%2520and%2520shows%2520strong%2520generalization%2520to%2520out-of-distribution%2520scenarios.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.03548v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Unmasking%20Puppeteers%3A%20Leveraging%20Biometric%20Leakage%20to%20Disarm%20Impersonation%20in%20AI-based%20Videoconferencing&entry.906535625=Danial%20Samadi%20Vahdati%20and%20Tai%20Duc%20Nguyen%20and%20Ekta%20Prashnani%20and%20Koki%20Nagano%20and%20David%20Luebke%20and%20Orazio%20Gallo%20and%20Matthew%20Stamm&entry.1292438233=AI-based%20talking-head%20videoconferencing%20systems%20reduce%20bandwidth%20by%20sending%20a%20compact%20pose-expression%20latent%20and%20re-synthesizing%20RGB%20at%20the%20receiver%2C%20but%20this%20latent%20can%20be%20puppeteered%2C%20letting%20an%20attacker%20hijack%20a%20victim%27s%20likeness%20in%20real%20time.%20Because%20every%20frame%20is%20synthetic%2C%20deepfake%20and%20synthetic%20video%20detectors%20fail%20outright.%20To%20address%20this%20security%20problem%2C%20we%20exploit%20a%20key%20observation%3A%20the%20pose-expression%20latent%20inherently%20contains%20biometric%20information%20of%20the%20driving%20identity.%20Therefore%2C%20we%20introduce%20the%20first%20biometric%20leakage%20defense%20without%20ever%20looking%20at%20the%20reconstructed%20RGB%20video%3A%20a%20pose-conditioned%2C%20large-margin%20contrastive%20encoder%20that%20isolates%20persistent%20identity%20cues%20inside%20the%20transmitted%20latent%20while%20cancelling%20transient%20pose%20and%20expression.%20A%20simple%20cosine%20test%20on%20this%20disentangled%20embedding%20flags%20illicit%20identity%20swaps%20as%20the%20video%20is%20rendered.%20Our%20experiments%20on%20multiple%20talking-head%20generation%20models%20show%20that%20our%20method%20consistently%20outperforms%20existing% {"title": "Beyond Segmentation: Structurally Informed Facade Parsing from Imperfect Images", "author": "Maciej Janicki and Aleksander Plocharski and Przemyslaw Musialski", "abstract": "Standard object detectors typically treat architectural elements independently, often resulting in facade parsings that lack the structural coherence required for downstream procedural reconstruction. We address this limitation by augmenting the YOLOv8 training objective with a custom lightweight alignment loss. This regularization encourages grid-consistent arrangements of bounding boxes during training, effectively injecting geometric priors without altering the standard inference pipeline. Experiments on the CMP dataset demonstrate that our method successfully improves structural regularity, correcting alignment errors caused by perspective and occlusion while maintaining a controllable trade-off with standard detection accuracy.", "link": "http://arxiv.org/abs/2604.09260v1", "date": "2026-04-10", "relevancy": 2.6943, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5391}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5387}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5387}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Segmentation%3A%20Structurally%20Informed%20Facade%20Parsing%20from%20Imperfect%20Images&body=Title%3A%20Beyond%20Segmentation%3A%20Structurally%20Informed%20Facade%20Parsing%20from%20Imperfect%20Images%0AAuthor%3A%20Maciej%20Janicki%20and%20Aleksander%20Plocharski%20and%20Przemyslaw%20Musialski%0AAbstract%3A%20Standard%20object%20detectors%20typically%20treat%20architectural%20elements%20independently%2C%20often%20resu ts%2520on%2520the%2520CMP%2520dataset%2520demonstrate%2520that%2520our%2520method%2520successfully%2520improves%2520structural%2520regularity%252C%2520correcting%2520alignment%2520errors%2520caused%2520by%2520perspective%2520and%2520occlusion%2520while%2520maintaining%2520a%2520controllable%2520trade-off%2520with%2520standard%2520detection%2520accuracy.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.09260v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Beyond%20Segmentation%3A%20Structurally%20Informed%20Facade%20Parsing%20from%20Imperfect%20Images&entry.906535625=Maciej%20Janicki%20and%20Aleksander%20Plocharski%20and%20Przemyslaw%20Musialski&entry.1292438233=Standard%20object%20detectors%20typically%20treat%20architectural%20elements%20independently%2C%20often%20resulting%20in%20facade%20parsings%20that%20lack%20the%20structural%20coherence%20required%20for%20downstream%20procedural%20reconstruction.%20We%20address%20this%20limitation%20by%20augmenting%20the%20YOLOv8%20training%20objective%20with%20a%20custom%20lightweight%20alignment%20loss.%20This%20regularization%20encourages%20grid-consistent%20arrangements%20of%20bounding%20boxes%20during%20training%2C%20effectively%20injecting%20geometric%20priors%20without%20altering%20the%20standard%20inference%20pipeline.%20Experiments%20on%20the%20CMP%20dataset%20demonstrate%20that%20our%20method%20successfully%20improves%20structural%20regularity%2C%20correcting%20alignment%20errors%20caused%20by%20perspective%20and%20occlusion%20while%20maintaining%20a%20controllable%20trade-off%20with%20standard%20detection%20accuracy.&entry.1838667208=http%3A//arxiv.org/abs/2604.09260v1&entry.124074799=Read"},
{"title": "Mosaic: Multimodal Jailbreak against Closed-Source VLMs via Multi-View Ensemble Optimization", "author": "Yuqin Lan and Gen Li and Yuanze Hu and Weihao Shen and Zhaoxin Fan and Faguo Wu and Xiao Zhang and Laurence T. Yang and Zhiming Zheng", "abstract": "Vision-Language Models (VLMs) are powerful but remain vulnerable to multimodal jailbreak attacks. Existing attacks mainly rely on either explicit visual prompt attacks or gradient-based adversarial optimization. While the former is easier to detect, the latter produces subtle perturbations that are less perceptible, but is usually optimized and evaluated under homogeneous open-source surrogate-target settings, leaving its effectiveness on commercial closed-source VLMs under heterogeneous settings unclear. To examine this issue, we study different surrogate-target settings and observe a consistent gap between homogeneous and heterogeneous settings, a phenomenon we term surrogate dependency. Motivated by this finding, we propose Mosaic, a Multi-view ensemble optimization framework for multimodal jailbreak against closed-source VLMs, which alleviates surrogate dependency under heterogeneous surrogate-target settings by reducing over-reliance on any single surrogate model and visual view. Specifically, Mosaic incorporates three core components: a Text-Side Transformation module, which perturbs refusal-sensitive lexical patterns; a Multi-View Image Optimization module, which updates perturbations under diverse cropped views to avoid overfitting to a single visual view; and a Surrogate Ensemble Guidance module, which aggregates optimization signals from multiple surrogate VLMs to reduce surrogate-specific bias. Extensive experiments on safety benchmarks demonstrate that Mosaic achieves state-of-the-art Attack Success Rate and Average Toxicity against commercial closed-source VLMs.", "link": "http://arxiv.org/abs/2604.09253v1", "date": "2026-04-10", "relevancy": 2.6932, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5469}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5469}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5221}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mosaic%3A%20Multimodal%20Jailbreak%20against%20Closed-Source%20VLMs%20via%20Multi-View%20Ensemble%20Optimization&body=Title%3A%20Mosaic%3A%20Multimodal%20Jailbreak%20against%20Closed-Source%20VLMs%20via%20Multi-View%20Ensemble%20Optimization%0AAuthor%3A%20Yuqin%20Lan%20and%20Gen%20Li%20and%20Yuanze%20Hu%20and%20Weihao%20Shen%20and%20Zhaoxin%20Fan%20and%20Faguo%20Wu%20and%20Xiao%20Zhang%20and%20Laurence%20T.%20Yang%20and%20Zhiming%20Zheng%0AAbstract%3A%20Vision-Language%20Models%20%28VLMs%29%20are%20powerful%20but%20remain%20vulnerable%20to%20multimodal%20jailbreak%20attacks.%20Existing%20attacks%20mainly%20rely%20on%20either%20explicit%20visual%20prompt%20attacks%20or%20gradient-based%20adversarial%20optimization.%20While%20the%20former%20is%20easier%20to%20detect%2C%20the%20latter%20produces%20subtle%20perturbations%20that%20are%20less%20perceptible%2C%20but%20is%20usually%20optimized%20and%20evaluated%20under%20homogeneous%20open-source%20surrogate-target%20settings%2C%20leaving%20its%20effectiveness%20on%20commercial%20closed-source%20VLMs%20under%20heterogeneous%20settings%20unclear.%20To%20examine%20this%20issue%2C%20we%20study%20different%20surrogate-target%20settings%20and%20observe%20a%20consistent%20gap%20between%20homogeneous%20and%20heterogeneous%20settings%2C%20a%20phenomenon%20we%20term%20surrogate%20dependency.%20Motivated%20by%20this%20finding%2C%20we%20propose%20Mosaic%2C%20a%20Multi-view%20ensemble%20optimization%20framework%20for%20multimodal%20jailbreak%20against%20closed-source%20VLMs%2C%20which%20alleviates%20surrogate%20dependency%20under%20heterogeneous%20surrogate-target%20settings%20by%20reducing%20over-reliance%20on%20any%20single%20surrogate%20model%20and%20visual%20view.%20Specifically%2C%20Mosaic%20incorporates%20three%20core%20components%3A%20a%20Text-Side%20Transformation%20module%2C%20which%20perturbs%20refusal-sensitive%20lexical%20patterns%3B%20a%20Multi-View%20Image%20Optimization%20module%2C%20which%20updates%20perturbations%20under%20diverse%20cropped%20views%20to%20avoid%20overfitting%20to%20a%20single%20visual%20view%3B%20and%20a%20Surrogate%20Ensemble%20Guidance%20module%2C%20which%20aggregates%20optimization%20signals%20from%20multiple%20surrogate%20VLMs%20to%20reduce%20surrogate-specific%20bias.%20Extensive%20experiments%20on%20safety%20benchmarks%20demonstrate%20that%20Mosaic%20achieves%20state-of-the-art%20Attack%20Success%20Rate%20and%20Average%20Toxicity%20against%20commercial%20closed-source%20VLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09253v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMosaic%253A%2520Multimodal%2520Jailbreak%2520against%2520Closed-Source%2520VLMs%2520via%2520Multi-View%2520Ensemble%2520Optimization%26entry.906535625%3DYuqin%2520Lan%2520and%2520Gen%2520Li%2520and%2520Yuanze%2520Hu%2520and%2520Weihao%2520Shen%2520and%2520Zhaoxin%2520Fan%2520and%2520Faguo%2520Wu%2520and%2520Xiao%2520Zhang%2520and%2520Laurence%2520T.%2520Yang%2520and%2520Zhiming%2520Zheng%26entry.1292438233%3DVision-Language%2520Models%2520%2528VLMs%2529%2520are%2520powerful%2520but%2520remain%2520vulnerable%2520to%2520multimodal%2520jailbreak%2520attacks.%2520Existing%2520attacks%2520mainly%2520rely%2520on%2520either%2520explicit%2520visual%2520prompt%2520attacks%2520or%2520gradient-based%2520adversarial%2520optimization.%2520While%2520the%2520former%2520is%2520easier%2520to%2520detect%252C%2520the%2520latter%2520produces%2520subtle%2520perturbations%2520that%2520are%2520less%2520perceptible%252C%2520but%2520is%2520usually%2520optimized%2520and%2520evaluated%2520under%2520homogeneous%2520open-source%2520surrogate-target%2520settings%252C%2520leaving%2520its%2520effectiveness%2520on%2520commercial%2520closed-source%2520VLMs%2520under%2520heterogeneous%2520settings%2520unclear.%2520To%2520examine%2520this%2520issue%252C%2520we%2520study%2520different%2520surrogate-target%2520settings%2520and%2520observe%2520a%2520consistent%2520gap%2520between%2520homogeneous%2520and%2520heterogeneous%2520settings%252C%2520a%2520phenomenon%2520we%2520term%2520surrogate%2520dependency.%2520Motivated%2520by%2520this%2520finding%252C%2520we%2520propose%2520Mosaic%252C%2520a%2520Multi-view%2520ensemble%2520optimization%2520framework%2520for%2520multimodal%2520jailbreak%2520against%2520closed-source%2520VLMs%252C%2520which%2520alleviates%2520surrogate%2520dependency%2520under%2520heterogeneous%2520surrogate-target%2520settings%2520by%2520reducing%2520over-reliance%2520on%2520any%2520single%2520surrogate%2520model%2520and%2520visual%2520view.%2520Specifically%252C%2520Mosaic%2520incorporates%2520three%2520core%2520components%253A%2520a%2520Text-Side%2520Transformation%2520module%252C%2520which%2520perturbs%2520refusal-sensitive%2520lexical%2520patterns%253B%2520a%2520Multi-View%2520Image%2520Optimization%2520module%252C%2520which%2520updates%2520perturbations%2520under%2520diverse%2520cropped%2520views%2520to%2520avoid%2520overfitting%2520to%2520a%2520single%2520visual%2520view%253B%2520and%2520a%2520Surrogate%2520Ensemble%2520Guidance%2520module%252C%2520which%2520aggregates%2520optimization%2520signals%2520from%2520multiple%2520surrogate%2520VLMs%2520to%2520reduce%2520surrogate-specific%2520bias.%2520Extensive%2520experiments%2520on%2520safety%2520benchmarks%2520demonstrate%2520that%2520Mosaic%2520achieves%2520state-of-the-art%2520Attack%2520Success%2520Rate%2520and%2520Average%2520Toxicity%2520against%2520commercial%2520closed-source%2520VLMs.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.09253v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Mosaic%3A%20Multimodal%20Jailbreak%20against%20Closed-Source%20VLMs%20via%20Multi-View%20Ensemble%20Optimization&entry.906535625=Yuqin%20Lan%20and%20Gen%20Li%20and%20Yuanze%20Hu%20and%20Weihao%20Shen%20and%20Zhaoxin%20Fan%20and%20Faguo%20Wu%20and%20Xiao%20Zhang%20and%20Laurence%20T.%20Yang%20and%20Zhiming%20Zheng&entry.1292438233=Vision-Language%20Models%20%28VLMs%29%20are%20powerful%20but%20remain%20vulnerable%20to%20multimodal%20jailbreak%20attacks.%20Existing%20attacks%20mainly%20rely%20on%20either%20explicit%20visual%20prompt%20attacks%20or%20gradient-based%20adversarial%20optimization.%20While%20the%20former%20is%20easier%20to%20detect%2C%20the%20latter%20produces%20subtle%20perturbations%20that%20are%20less%20perceptible%2C%20but%20is%20usually%20optimized%20and%20evaluated%20under%20homogeneous%20open-source%20surrogate-target%20settings%2C%20leaving%20its%20effectiveness%20on%20commercial%20closed-source%20VLMs%20under%20heterogeneous%20settings%20unclear.%20To%20examine%20this%20issue%2C%20we%20study%20different%20surrogate-target%20settings%20and%20observe%20a%20consistent%20gap%20between%20homogeneous%20and%20heterogeneous%20settings%2C%20a%20phenomenon%20we%20term%20surrogate%20dependency.%20Motivated%20by%20this%20finding%2C%20we%20propose%20Mosaic%2C%20a%20Multi-view%20ensemble%20optimization%20framework%20for%20multimodal%20jailbreak%20against%20closed-source%20VLMs%2C%20which%20alleviates%20surrogate%20dependency%20under%20heterogeneous%20surrogate-target%20settings%20by%20reducing%20over-reliance%20on%20any%20single%20surrogate%20model%20and%20visual%20view.%20Specifically%2C%20Mosaic%20incorporates%20three%20core%20components%3A%20a%20Text-Side%20Transformation%20module%2C%20which%20per {"title": "PolySLGen: Online Multimodal Speaking-Listening Reaction Generation in Polyadic Interaction", "author": "Zhi-Yi Lin and Thomas Markhorst and Jouh Yeong Chew and Xucong Zhang", "abstract": "Human-like multimodal reaction generation is essential for natural group interactions between humans and embodied AI. However, existing approaches are limited to single-modality or speaking-only responses in dyadic interactions, making them unsuitable for realistic social scenarios. Many also overlook nonverbal cues and complex dynamics of polyadic interactions, both critical for engagement and conversational coherence. In this work, we present PolySLGen, an online framework for Polyadic multimodal Speaking and Listening reaction Generation. Given past conversation and motion from all participants, PolySLGen generates a future speaking or listening reaction for a target participant, including speech, body motion, and speaking state score. To model group interactions effectively, we propose a pose fusion module and a social cue encoder that jointly aggregate motion and social signals from the group. Extensive experiments, along with quantitative and qualitative evaluations, show that PolySLGen produces contextually appropriate and temporally coherent multi-modal reactions, outperforming several adapted and state-of-the-art baselines in motion quality, motion-speech alignment, speaking state prediction, and human-perceived realism.", "link": "http://arxiv.org/abs/2604.08125v2", "date": "2026-04-10", "relevancy": 2.6425, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5343}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5274}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5238}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PolySLGen%3A%20Online%20Multimodal%20Speaking-Listening%20Reaction%20Generation%20in%20Polyadic%20Interaction&body=Title%3A%20PolySLGen%3A%20Online%20Multimodal%20Speaking-Listening%20Reaction%20Generation%20in%20Polyadic%20Interaction%0AAuthor%3A%20Zhi-Yi%20Lin%20and%20Thomas%20Markhorst%20and%20Jouh%20Yeong%20Chew%20and%20Xucong%20Zhang%0AAbstract%3A%20Human-like%20multimodal%20reaction%20generation%20is%20essential%20for%20natural%20group%20interactions%20between%20humans%20and%20embodied%20AI.%20However%2C%20existing%20approaches%20are%20limited%20to%20single-modality%20or%20speaking-only%20responses%20in%20dyadic%20interactions%2C%20making%20them%20unsuitable%20for%20realistic%20social%20scenarios.%20Many%20also%20overlook%20nonverbal%20cues%20and%20complex%20dynamics%20of%20polyadic%20interactions%2C%20both%20critical%20for%20engagement%20and%20conversational%20coherence.%20In%20this%20work%2C%20we%20present%20PolySLGen%2C%20an%20online%20framework%20for%20Polyadic%20multimodal%20Speaking%20and%20Listening%20reaction%20Generation.%20Given%20past%20conversation%20and%20motion%20from%20all%20participants%2C%20PolySLGen%20generates%20a%20future%20speaking%20or%20listening%20reaction%20for%20a%20target%20participant%2C%20including%20speech%2C%20body%20motion%2C%20and%20speaking%20state%20score.%20To%20model%20group%20interactions%20effectively%2C%20we%20propose%20a%20pose%20fusion%20module%20and%20a%20social%20cue%20encoder%20that%20jointly%20aggregate%20motion%20and%20social%20signals%20from%20the%20group.%20Extensive%20experiments%2C%20along%20with%20quantitative%20and%20qualitative%20evaluations%2C%20show%20that%20PolySLGen%20produces%20contextually%20appropriate%20and%20temporally%20coherent%20multi-modal%20reactions%2C%20outperforming%20several%20adapted%20and%20state-of-the-art%20baselines%20in%20motion%20quality%2C%20motion-speech%20alignment%2C%20speaking%20state%20prediction%2C%20and%20human-perceived%20realism.%0ALink%3A%20http%3A//arxiv.org/ab %2520that%2520PolySLGen%2520produces%2520contextually%2520appropriate%2520and%2520temporally%2520coherent%2520multi-modal%2520reactions%252C%2520outperforming%2520several%2520adapted%2520and%2520state-of-the-art%2520baselines%2520in%2520motion%2520quality%252C%2520motion-speech%2520alignment%252C%2520speaking%2520state%2520prediction%252C%2520and%2520human-perceived%2520realism.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.08125v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=PolySLGen%3A%20Online%20Multimodal%20Speaking-Listening%20Reaction%20Generation%20in%20Polyadic%20Interaction&entry.906535625=Zhi-Yi%20Lin%20and%20Thomas%20Markhorst%20and%20Jouh%20Yeong%20Chew%20and%20Xucong%20Zhang&entry.1292438233=Human-like%20multimodal%20reaction%20generation%20is%20essential%20for%20natural%20group%20interactions%20between%20humans%20and%20embodied%20AI.%20However%2C%20existing%20approaches%20are%20limited%20to%20single-modality%20or%20speaking-only%20responses%20in%20dyadic%20interactions%2C%20making%20them%20unsuitable%20for%20realistic%20social%20scenarios.%20Many%20also%20overlook%20nonverbal%20cues%20and%20complex%20dynamics%20of%20polyadic%20interactions%2C%20both%20critical%20for%20engagement%20and%20conversational%20coherence.%20In%20this%20work%2C%20we%20present%20PolySLGen%2C%20an%20online%20framework%20for%20Polyadic%20multimodal%20Speaking%20and%20Listening%20reaction%20Generation.%20Given%20past%20conversation%20and%20motion%20from%20all%20participants%2C%20PolySLGen%20generates%20a%20future%20speaking%20or%20listening%20reaction%20for%20a%20target%20participant%2C%20including%20speech%2C%20body%20motion%2C%20and%20speaking%20state%20score.%20To%20model%20group%20interactions%20effectively%2C%20we%20propose%20a%20pose%20fusion%20module%20and%20a%20social%20cue%20encoder%20that%20jointly%20aggregate%20motion%20and%20social%20signals%20from%20the%20group.%20Extensive%20experiments%2C%20along%20with%20quantitative%20and%20qualitative%20evaluations%2C%20show%20that%20PolySLGen%20produces%20contextually%20appropriate%20and%20temporally%20coherent%20multi-modal%20reactions%2C%20outperforming%20several%20adapted%20and%20state-of-the-art%20baselines%20in%20motion%20quality%2C%20motion-speech%20alignment%2C%20speaking%20state%20prediction%2C%20and%20human-perceived%20realism.&entry.1838667208=http%3A//arxiv.org/abs/2604.08125v2&entry.124074799=Read"},
{"title": "CoMoVi: Co-Generation of 3D Human Motions and Realistic Videos", "author": "Chengfeng Zhao and Jiazhi Shu and Yubo Zhao and Tianyu Huang and Jiahao Lu and Zekai Gu and Chengwei Ren and Zhiyang Dou and Qing Shuai and Yuan Liu", "abstract": "In this paper, we find that the generation of 3D human motions and 2D human videos is intrinsically coupled. 3D motions provide the structural prior for plausibility and consistency in videos, while pre-trained video models offer strong generalization capabilities for motions. Based on this, we present CoMoVi, a co-generative framework that generates 3D human motions and videos synchronously within a single diffusion denoising loop. However, since the 3D human motions and the 2D human-centric videos have a modality gap between each other, we propose to project the 3D human motion into an effective 2D human motion representation that effectively aligns with the 2D videos. Then, we design a dual-branch diffusion model to couple human motion and the video generation process with mutual feature interaction and 3D-2D cross attentions. To train and evaluate our model, we curate CoMoVi-Dataset, a large-scale real-world human video dataset with text and motion annotations, covering diverse and challenging human motions. Extensive experiments demonstrate that our method generates high-quality 3D human motion with a better generalization ability and that our method can generate high-quality human-centric videos without external motion references.", "link": "http://arxiv.org/abs/2601.10632v2", "date": "2026-04-10", "relevancy": 2.6401, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.7136}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6243}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6207}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CoMoVi%3A%20Co-Generation%20of%203D%20Human%20Motions%20and%20Realistic%20Videos&body=Title%3A%20CoMoVi%3A%20Co-Generation%20of%203D%20Human%20Motions%20and%20Realistic%20Videos%0AAuthor%3A%20Chengfeng%20Zhao%20and%20Jiazhi%20Shu%20and%20Yubo%20Zhao%20and%20Tianyu%20Huang%20and%20Jiahao%20Lu%20and%20Zekai%20Gu%20and%20Chengwei%20Ren%20and%20Zhiyang%20Dou%20and%20Qing%20Shuai%20and%20Yuan%20Liu%0AAbstract%3A%20In%20this%20paper%2C%20we%20find%20that%20the%20generation%20of%203D%20human%20motions%20and%202D%20human%20videos%20is%20intrinsically%20coupled.%203D%20motions%20provide%20the%20structural%20prior%20for%20plausibility%20and%20consistency%20in%20videos%2C%20while%20pre-trained%20video%20models%20offer%20strong%20generalization%20capabilities%20for%20motions.%20Based%20on%20this%2C%20we%20present%20CoMoVi%2C%20a%20co-generative%20framework%20that%20generates%203D%20human%20motions%20and%20videos%20synchronously%20within%20a%20single%20diffusion%20denoising%20loop.%20However%2C%20since%20the%203D%20human%20motions%20and%20the%202D%20human-centric%20videos%20have%20a%20modality%20gap%20between%20each%20other%2C%20we%20propose%20to%20project%20the%203D%20human%20motion%20into%20an%20effective%202D%20human%20motion%20representation%20that%20effectively%20aligns%20with%20the%202D%20videos.%20Then%2C%20we%20design%20a%20dual-branch%20diffusion%20model%20to%20couple%20human%20motion%20and%20the%20video%20generation%20process%20with%20mutual%20feature%20interaction%20and%203D-2D%20cross%20attentions.%20To%20train%20and%20evaluate%20our%20model%2C%20we%20curate%20CoMoVi-Dataset%2C%20a%20large-scale%20real-world%20human%20video%20dataset%20with%20text%20and%20motion%20annotations%2C%20covering%20diverse%20and%20challenging%20human%20motions.%20Extensive%20experiments%20demonstrate%20that%20our%20method%20generates%20high-quality%203D%20human%20motion%20with%20a%20better%20generalization%20ability%20and%20that%20our%20method%20can%20generate%20high-quality%20human-centric%20videos%20without%20external%20motion%20references.%0ALink%3A%20http%3A//arxiv.org/abs/2601.10632v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCoMoVi%253A%2520Co-Generation%2520of%25203D%2520Human%2520Motions%2520and%2520Realistic%2520Videos%26entry.906535625%3DChengfeng%2520Zhao%2520and%2520Jiazhi%2520Shu%2520and%2520Yubo%2520Zhao%2520and%2520Tianyu%2520Huang%2520and%2520Jiahao%2520Lu%2520and%2520Zekai%2520Gu%2520and%2520Chengwei%2520Ren%2520and%2520Zhiyang%2520Dou%2520and%2520Qing%2520Shuai%2520and%2520Yuan%2520Liu%26entry.1292438233%3DIn%2520this%2520paper%252C%2520we%2520find%2520that%2520the%2520generation%2520of%25203D%2520human%2520motions%2520and%25202D%2520human%2520videos%2520is%2520intrinsically%2520coupled.%25203D%2520motions%2520provide%2520the%2520structural%2520prior%2520for%2520plausibility%2520and%2520consistency%2520in%2520videos%252C%2520while%2520pre-trained%2520video%2520models%2520offer%2520strong%2520generalization%2520capabilities%2520for%2520motions.%2520Based%2520on%2520this%252C%2520we%2520present%2520CoMoVi%252C%2520a%2520co-generative%2520framework%2520that%2520generates%25203D%2520human%2520motions%2520and%2520videos%2520synchronously%2520within%2520a%2520single%2520diffusion%2520denoising%2520loop.%2520However%252C%2520since%2520the%25203D%2520human%2520motions%2520and%2520the%25202D%2520human-centric%2520videos%2520have%2520a%2520modality%2520gap%2520between%2520each%2520other%252C%2520we%2520propose%2520to%2520project%2520the%25203D%2520human%2520motion%2520into%2520an%2520effective%25202D%2520human%2520motion%2520representation%2520that%2520effectively%2520aligns%2520with%2520the%25202D%2520videos.%2520Then%252C%2520we%2520design%2520a%2520dual-branch%2520diffusion%2520model%2520to%2520couple%2520human%2520motion%2520and%2520the%2520video% {"title": "Stability Enhanced Gaussian Process Variational Autoencoders", "author": "Carl R. Richardson and Jichen Zhang and Ethan King and J\u00e1n Drgo\u0148a", "abstract": "A novel stability-enhanced Gaussian process variational autoencoder (SEGP-VAE) is proposed for indirectly training a low-dimensional linear time invariant (LTI) system, using high-dimensional video data. The mean and covariance function of the novel SEGP prior are derived from the definition of an LTI system, enabling the SEGP to capture the indirectly observed latent process using a combined probabilistic and interpretable physical model. The search space of LTI parameters is restricted to the set of semi-contracting systems via a complete and unconstrained parametrisation. As a result, the SEGP-VAE can be trained using unconstrained optimisation algorithms. Furthermore, this parametrisation prevents numerical issues caused by the presence of a non-Hurwitz state matrix. A case study applies SEGP-VAE to a dataset containing videos of spiralling particles. This highlights the benefits of the approach and the application-specific design choices that enabled accurate latent state predictions.", "link": "http://arxiv.org/abs/2604.09331v1", "date": "2026-04-10", "relevancy": 2.6001, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5262}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5204}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5135}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Stability%20Enhanced%20Gaussian%20Process%20Variational%20Autoencoders&body=Title%3A%20Stability%20Enhanced%20Gaussian%20Process%20Variational%20Autoencoders%0AAuthor%3A%20Carl%20R.%20 {"title": "DSVTLA: Deep Swin Vision Transformer-Based Transfer Learning Architecture for Multi-Type Cancer Histopathological Cancer Image Classification", "author": "Muazzem Hussain Khan and Tasdid Hasnain and Md. Jamil khan and Ruhul Amin and Md. Shamim Reza and Md. Al Mehedi Hasan and Md Ashad Alam", "abstract": "In this study, we proposed a deep Swin-Vision Transformer-based transfer learning architecture for robust multi-cancer histopathological image classification. The proposed framework integrates a hierarchical Swin Transformer with ResNet50-based convolution features extraction, enabling the model to capture both long-range contextual dependencies and fine-grained local morphological patterns within histopathological images. To validate the efficiency of the proposed architecture, an extensive experiment was executed on a comprehensive multi-cancer dataset including Breast Cancer, Oral Cancer, Lung and Colon Cancer, Kidney Cancer, and Acute Lymphocytic Leukemia (ALL), including both original and segmented images were analyzed to assess model robustness across heterogeneous clinical imaging conditions. Our approach is benchmarked alongside several state-of-the-art CNN and transfer models, including DenseNet121, DenseNet201, InceptionV3, ResNet50, EfficientNetB3, multiple ViT variants, and Swin Transformer models. However, all models were trained and validated using a unified pipeline, incorporating balanced data preprocessing, transfer learning, and fine-tuning strategies. The experimental results demonstrated that our proposed architecture consistently gained superior performance, reaching 100% test accuracy for lung-colon cancer, segmented leukemia datasets, and up to 99.23% accuracy for breast cancer classification. The model also achieved near-perfect precision, f1 score, and recall, indicating highly stable scores across divers cancer types. Overall, the proposed model establishes a highly accurate, interpretable, and also robust multi-cancer classification system, demonstrating strong benchmark for future research and provides a unified comparative assessment useful for designing reliable AI-assisted histopathological diagnosis and clinical decision-making.", "link": "http://arxiv.org/abs/2604.09468v1", "date": "2026-04-10", "relevancy": 2.5376, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5535}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4845}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4845}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DSVTLA%3A%20Deep%20Swin%20Vision%20Transformer-Based%20Transfer%20Learning%20Architecture%20for%20Multi-Type%20Cancer%20Histopathological%20Cancer%20Image%20Classification&body=Title%3A%20DSVTLA%3A%20Deep%20Swin%20Vision%20Transformer-Based%20Transfer%20Learning%20Architecture%20for%20Multi-Type%20Cancer%20Histopathological%20Cancer%20Image%20Classification%0AAuthor%3A%20Muazzem%20Hussain%20Khan%20and%20Tasdid%20Hasnain%20and%20Md.%20Jamil%20khan%20and%20Ruhul%20Amin%20and%20Md.%20Shamim%20Reza%20and%20Md.%20Al%20Mehedi%20Hasan%20and%20Md%20Ashad%20Alam%0AAbstract%3A%20In%20this%20study%2C%20we%20proposed%20a%20deep%20Swin-Vision%20Transformer-based%20transfer%20learning%20architecture%20for%20robust%20multi-cancer%20histopathological%20image%20classification.%20The%20proposed%20framework%20integrates%20a%20hierarchical%20Swin%20Transformer%20with%20ResNet50-based%20convolution%20features%20extraction%2C%20enabling%20the%20model%20to%20capture%20both%20long-range%20contextual%20dependencies%20and%20fine-grained%20local%20morphological%20patterns%20within%20histopathological%20images.%20To%20validate%20the%20efficiency%20of%20the%20proposed%20architecture%2C%20an%20extensive%20experiment%20was%20executed%20on%20a%20comprehensive%20multi-cancer%20dataset%20including%20Breast%20Cancer%2C%20Oral%20Cancer%2C%20Lung%20and%20Colon%20Cancer%2C%20Kidney%20Cancer%2C%20and%20Acute%20Lymphocytic%20Leukemia%20%28ALL%29%2C%20including%20both%20original%20and%20segmented%20images%20were%20analyzed%20to%20assess%20model%20robustness%20across%20heterogeneous%20clinical%20imaging%20conditions.%20Our%20approach%20is%20benchmarked%20alongside%20several%20state-of-the-art%20CNN%20and%20transfer%20models%2C%20including%20DenseNet121%2C%20DenseNet201%2C%20InceptionV3%2C%20ResNet50%2C%20EfficientNetB3%2C%20multiple%20ViT%20variants%2C%20and%20Swin%20Transformer%20models.%20However%2C%20all%20models%20were%20trained%20and%20validated%20using%20a%20unified%20pipeline%2C%20incorporating%20balanced%20data%20preprocessing%2C%20transfer%20learning%2C%20and%20fine-tuning%20strategies.%20The%20experimental%20results%20demonstrated%20that%20our%20proposed%20architecture%20consistently%20gained%20superior%20performance%2C%20reaching%20100%25%20test%20accuracy%20for%20lung-colon%20cancer%2C%20segmented%20leukemia%20datasets%2C%20and%20up%20to%2099.23%25%20accuracy%20for%20breast%20cancer%20classification.%20The%20model%20also%20achieved%20near-perfect%20precision%2C%20f1%20score%2C%20and%20recall%2C%20indicating%20highly%20stable%20scores%20across%20divers%20cancer%20types.%20Overall%2C%20the%20proposed%20model%20establishes%20a%20highly%20accurate%2C%20interpretable%2C%20and%20also%20robust%20multi-cancer%20classification%20system%2C%20demonstrating%20strong%20benchmark%20for%20future%20research%20and%20provides%20a%20unified%20comparative%20assessment%20useful%20for%20designing%20reliable%20AI-assisted%20histopathological%20diagnosis%20and%20clinical%20decision-making.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09468v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fen {"title": "Hitem3D 2.0: Multi-View Guided Native 3D Texture Generation", "author": "Huiang He and Shengchu Zhao and Jianwen Huang and Jie Li and Jiaqi Wu and Hu Zhang and Pei Tang and Heliang Zheng and Yukun Li and Rongfei Jia", "abstract": "Although recent advances have improved the quality of 3D texture generation, existing methods still struggle with incomplete texture coverage, cross-view inconsistency, and misalignment between geometry and texture. To address these limitations, we propose Hitem3D 2.0, a multi-view guided native 3D texture generation framework that enhances texture quality through the integration of 2D multi-view generation priors and native 3D texture representations. Hitem3D 2.0 comprises two key components: a multi-view synthesis framework and a native 3D texture generation model. The multi-view generation is built upon a pre-trained image editing backbone and incorporates plug-and-play modules that explicitly promote geometric alignment, cross-view consistency, and illumination uniformity, thereby enabling the synthesis of high-fidelity multi-view images. Conditioned on the generated views and 3D geometry, the native 3D texture generation model projects multi-view textures onto 3D surfaces while plausibly completing textures in unseen regions. Through the integration of multi-view consistency constraints with native 3D texture modeling, Hitem3D 2.0 significantly improves texture completeness, cross-view coherence, and geometric alignment. Experimental results demonstrate that Hitem3D 2.0 outperforms existing methods in terms of texture detail, fidelity, consistency, coherence, and alignment.", "link": "http://arxiv.org/abs/2604.09231v1", "date": "2026-04-10", "relevancy": 2.5209, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6394}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6394}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5842}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hitem3D%202.0%3A%20Multi-View%20Guided%20Native%203D%20Texture%20Generation&body=Title%3A%20Hitem3D%202.0%3A%20Multi-View%20Guided%20Native%203D%20Texture%20Generation%0AAuthor%3A%20Huiang%20He%20and%20Shengchu%20Zhao%20and%20Jianwen%20Huang%20and%20Jie%20Li%20and%20Jiaqi%20Wu%20and%20Hu%20Zhang%20and%20Pei%20Tang%20and%20Heliang%20Zheng%20and%20Yukun%20Li%20and%20Rongfei%20Jia%0AAbstract%3A%20Although%20recent%20advances%20have%20improved%20the%20quality%20of%203D%20texture%20generation%2C%20existing%20methods%20still%20struggle%20with%20incomplete%20texture%20coverage%2C%20cross-view%20inconsistency%2C%20and%20misalignment%20between%20geometry%20and%20texture.%20To%20address%20these%20limitations%2C%20we%20propose%20Hitem3D%202.0%2C%20a%20multi-view%20guided%20native%203D%20texture%20generation%20framework%20that%20enhances%20texture%20quality%20through%20the%20integration%20of%202D%20multi-view%20generation%20priors%20and%20native%203D%20texture%20representations.%20Hitem3D%202.0%20comprises%20two%20key%20components%3A%20a%20multi-view%20synthesis%20framework%20and%20a%20native%203D%20texture%20generation%20model.%20The%20multi-view%20generation%20is%20built%20upon%20a%20pre-trained%20image%20editing%20backbone%20and%20incorporates%20plug-and-play%20modules%20that%20explicitly%20promote%20geometric%20alignment%2C%20cross-view%20consistency%2C%20and%20illumination%20uniformity%2C%20thereby%20enabling%20the%20synthesis%20of%20high-fidelity%20multi-view%20images.%20Conditioned%20on%20the%20generated%20views%20and%203D%20geometry%2C%20the%20native%203D%20texture%20generation%20model%20projects%20multi-view%20textures%20onto%203D%20surfaces%20while%20plausibly%20completing%20textures%20in%20unseen%20regions.%20Through%20the%20integration%20of%20multi-view%20consistency%20constraints%20with%20native%203D%20texture%20modeling%2C%20Hitem3D%202.0%20significantly%20improves%20texture%20completeness%2C%20cross-view%20coherence%2C%20and%20geometric%20alignment.%20Experimental%20results%20demonstrate%20that%20Hitem3D%202.0%20outperforms%20existing%20methods%20in%20terms%20of%20texture%20detail%2C%20fidelity%2C%20consistency%2C%20coherence%2C%20and%20alignment.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09231v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHitem3D%25202.0%253A%2520Multi-View%2520Guided%2520Native%25203D%2520Texture%2520Generation%26entry.906535625%3DHuiang%2520He%2520and%2520Shengchu%2520Zhao%2520and%2520Jianwen%2520Huang%2520and%2520Jie%2520Li%2520and%2520Jiaqi%2520Wu%2520and%2520Hu%2520Zhang%2520and%2520Pei%2520Tang%2520and%2520Heliang%2520Zheng%2520and%2520Yukun%2520Li%2520and%2520Rongfei%2520Jia%26entry.1292438233%3DAlthough%2520recent%2520advances%2520have%2520improved%2520the%2520quality%2520of%25203D%2520texture%2520generation%252C%2520existing%2520methods%2520still%2520struggle%2520with%2520incomplete%2520texture%2520coverage%252C%2520cross-view%2520inconsistency%252C%2520and%2520misalignment%2520between%2520geometry%2520and%2520texture.%2520To%2520address%2520these%2520limitations%252C%2520we%2520propose%2520Hitem3D%25202.0%252C%2520a%2520multi-view%2520guided%2520native%25203D%2520texture%2520generation%2520framework%2520that%2520enhances%2520texture%2520quality%2520through%2520the%2520integration%2520of%25202D%2520multi-view%2520generation%2520priors%2520and%2520native%25203D%2520texture%2520representations.%2520Hitem3D%25202.0%2520comprises%2520two%2520key%2520components%253A%2520a%2520multi-view%2520synthesis%2520framework%2520and%2520a%2520native%25203D%2520texture%2520generation%2520model.%2520The%2520multi-view%2520generation%2520is%2520built%2520upon%2520a%2520pre-trained%2520image%252 limitations%2C%20we%20propose%20Hitem3D%202.0%2C%20a%20multi-view%20guided%20native%203D%20texture%20generation%20framework%20that%20enhances%20texture%20quality%20through%20the%20integration%20of%202D%20multi-view%20generation%20priors%20and%20native%203D%20texture%20representations.%20Hitem3D%202.0%20comprises%20two%20key%20components%3A%20a%20multi-view%20synthesis%20framework%20and%20a%20native%203D%20texture%20generation%20model.%20The%20multi-view%20generation%20is%20built%20upon%20a%20pre-trained%20image%20editing%20backbone%20and%20incorporates%20plug-and-play%20modules%20that%20explicitly%20promote%20geometric%20alignment%2C%20cross-view%20consistency%2C%20and%20illumination%20uniformity%2C%20thereby%20enabling%20the%20synthesis%20of%20high-fidelity%20multi-view%20images.%20Conditioned%20on%20the%20generated%20views%20and%203D%20geometry%2C%20the%20native%203D%20texture%20generation%20model%20projects%20multi-view%20textures%20onto%203D%20surfaces%20while%20plausibly%20completing%20textures%20in%20unseen%20regions.%20Through%20the%20integration%20of%20multi-view%20consistency%20constraints%20with%20native%203D%20texture%20modeling%2C%20Hitem3D%202.0%20significantly%20improves%20texture%20completeness%2C%20cross-view%20coherence%2C%20and%20geometric%20alignment.%20Experimental%20results%20demonstrate%20that%20Hitem3D%202.0%20outperforms%20existing%20methods%20in%20terms%20of%20texture%20detail%2C%20fidelity%2C%20consistency%2C%20coherence%2C%20and%20alignment.&entry.1838667208=http%3A//arxiv.org/abs/2604.09231v1&entry.124074799=Read"},
{"title": "MAG-3D: Multi-Agent Grounded Reasoning for 3D Understanding", "author": "Henry Zheng and Chenyue Fang and Rui Huang and Siyuan Wei and Xiao Liu and Gao Huang", "abstract": "Vision-language models (VLMs) have achieved strong performance in multimodal understanding and reasoning, yet grounded reasoning in 3D scenes remains underexplored. Effective 3D reasoning hinges on accurate grounding: to answer open-ended queries, a model must first identify query-relevant objects and regions in a complex scene, and then reason about their spatial and geometric relationships. Recent approaches have demonstrated strong potential for grounded 3D reasoning. However, they often rely on in-domain tuning or hand-crafted reasoning pipelines, which limit their flexibility and zero-shot generalization to novel environments. In this work, we present MAG-3D, a training-free multi-agent framework for grounded 3D reasoning with off-the-shelf VLMs. Instead of relying on task-specific training or fixed reasoning procedures, MAG-3D dynamically coordinates expert agents to address the key challenges of 3D reasoning. Specifically, we propose a planning agent that decomposes the task and orchestrates the overall reasoning process, a grounding agent that performs free-form 3D grounding and relevant frame retrieval from extensive 3D scene observations, and a coding agent that conducts flexible geometric reasoning and explicit verification through executable programs. This multi-agent collaborative design enables flexible training-free 3D grounded reasoning across diverse scenes and achieves state-of-the-art performance on challenging benchmarks.", "link": "http://arxiv.org/abs/2604.09167v1", "date": "2026-04-10", "relevancy": 2.5061, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6365}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6365}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5763}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MAG-3D%3A%20Multi-Agent%20Grounded%20Reasoning%20for%203D%20Understanding&body=Title%3A%20MAG-3D%3A%20Multi-Agent%20Grounded%20Reasoning%20for%203D%20Understanding%0AAuthor%3A%20Henry%20Zheng%20and%20Chenyue%20Fang%20and%20Rui%20Huang%20and%20Siyuan%20Wei%20and%20Xiao%20Liu%20and%20Gao%20Huang%0AAbstract%3A%20Vision-language%20models%20%28VLMs%29%20have%20achieved%20strong%20performance%20in%20multimodal%20understanding%20and%20reasoning%2C%20yet%20grounded%20reasoning%20in%203D%20scenes%20remains%20underexplored.%20Effective%203D%20reasoning%20hinges%20on%20accurate%20grounding%3A%20to%20answer%20open-ended%20queries%2C%20a%20model%20must%20first%20identify%20query-relevant%20objects%20and%20regions%20in%20a%20complex%20scene%2C%20and%20then%20reason%20about%20their%20spatial%20and%20geometric%20relationships.%20Recent%20approaches%20have%20demonstrated%20strong%20potential%20for%20grounded%203D%20reasoning.%20However%2C%20they%20often%20rely%20on%20in-domain%20tuning%20or%20hand-crafted%20reasoning%20pipelines%2C%20which%20limit%20their%20flexibility%20and%20zero-shot%20generalization%20to%20novel%20environments.%20In%20this%20work%2C%20we%20present%20MAG-3D%2C%20a%20training-free%20multi-agent%20framework%20for%20grounded%203D%20reasoning%20with%20off-the-shelf%20VLMs.%20Instead%20of%20relying%20on%20task-specific%20training%20or%20fixed%20reasoning%20procedures%2C%20MAG-3D%20dynamically%20coordinates%20expert%20agents%20to%20address%20the%20key%20challenges%20of%203D%20reasoning.%20Specifically%2C%20we%20propose%20a%20planning%20agent%20that%20decomposes%20the%20task%20and%20orchestrates%20the%20overall%20reasoning%20process%2C%20a%20grounding%20agent%20that%20performs%20free-form%203D%20grounding%20and%20relevant%20frame%20retrieval%20from%20extensive%203D%20scene%20observations%2C%20and%20a%20coding%20agent%20that%20conducts%20flexible%20geometric%20reasoning%20and%20explicit%20verification%20through%20executable%20programs.%20This%20multi-agent%20collaborative%20design%20enables%20flexible%20training-free%203D%20grounded%20reasoning%20across%20diverse%20scenes%20and%20achieves%20state-of-the-art%20performance%20on%20challenging%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09167v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMAG-3D%253A%2520Multi-Agent%2520Grounded%2520Reasoning%2520for%25203D%2520Understanding%26entry.906535625%3DHenry%2520Zheng%2520and%2520Chenyue%2520Fang%2520and%2520Rui%2520Huang%2520and%2520Siyuan%2520Wei%2520and%2520Xiao%2520Liu%2520and%2520Gao%2520Huang%26entry.1292438233%3DVision-language%2520models%2520%2528VLMs%2529%2520have%2520achieved%2520strong%2520performance%2520in%2520multimodal%2520understanding%2520and%2520reasoning%252C%2520yet%2520grounded%2520reasoning%2520in%25203D%2520scenes%2520remains%2520underexplored.%2520Effective%25203D%2520reasoning%2520hinges%2520on%2520accurate%2520grounding%253A%2520to%2520answer%2520open-ended%2520queries%252C%2520a%2520model%2520must%2520first%2520identify%2520query-relevant%2520objects%2520and%2520regions%2520in%2520a%2520complex%2520scene%252C%2520and%2520then%2520reason%2520about%2520their%2520spatial%2520and%2520geometric%2520relationships.%2520Recent%2520approaches%2520have%2520demonstrated%2520strong%2520potential%2520for%2520grounded%25203D%2520reasoning.%2520However%252C%2520they%2520often%2520rely%2520on%2520in-domain%2520tuning%2520or%2520hand-crafted%2520reasoning%2520pipelines%252C%2520which%2520limit%2520their%2520flexibility%2520and%2520zero-shot%2520generalization%2520to%2520novel%2520environments.%2520In%2520this n-ended%20queries%2C%20a%20model%20must%20first%20identify%20query-relevant%20objects%20and%20regions%20in%20a%20complex%20scene%2C%20and%20then%20reason%20about%20their%20spatial%20and%20geometric%20relationships.%20Recent%20approaches%20have%20demonstrated%20strong%20potential%20for%20grounded%203D%20reasoning.%20However%2C%20they%20often%20rely%20on%20in-domain%20tuning%20or%20hand-crafted%20reasoning%20pipelines%2C%20which%20limit%20their%20flexibility%20and%20zero-shot%20generalization%20to%20novel%20environments.%20In%20this%20work%2C%20we%20present%20MAG-3D%2C%20a%20training-free%20multi-agent%20framework%20for%20grounded%203D%20reasoning%20with%20off-the-shelf%20VLMs.%20Instead%20of%20relying%20on%20task-specific%20training%20or%20fixed%20reasoning%20procedures%2C%20MAG-3D%20dynamically%20coordinates%20expert%20agents%20to%20address%20the%20key%20challenges%20of%203D%20reasoning.%20Specifically%2C%20we%20propose%20a%20planning%20agent%20that%20decomposes%20the%20task%20and%20orchestrates%20the%20overall%20reasoning%20process%2C%20a%20grounding%20agent%20that%20performs%20free-form%203D%20grounding%20and%20relevant%20frame%20retrieval%20from%20extensive%203D%20scene%20observations%2C%20and%20a%20coding%20agent%20that%20conducts%20flexible%20geometric%20reasoning%20and%20explicit%20verification%20through%20executable%20programs.%20This%20multi-agent%20collaborative%20design%20enables%20flexible%20training-free%203D%20grounded%20reasoning%20across%20diverse%20scenes%20and%20achieves%20state-of-the-art%20performance%20on%20challenging%20benchmarks.&entry.1838667208=http%3A//arxiv.org/abs/2604.09167v1&entry.124074799=Read"},
{"title": "Robust 4D Visual Geometry Transformer with Uncertainty-Aware Priors", "author": "Ying Zang and Yidong Han and Chaotao Ding and Yuanqi Hu and Deyi Ji and Qi Zhu and Xuanfu Li and Jin Ma and Lingyun Sun and Tianrun Chen and Lanyun Zhu", "abstract": "Reconstructing dynamic 4D scenes is an important yet challenging task. While 3D foundation models like VGGT excel in static settings, they often struggle with dynamic sequences where motion causes significant geometric ambiguity. To address this, we present a framework designed to disentangle dynamic and static components by modeling uncertainty across different stages of the reconstruction process. Our approach introduces three synergistic mechanisms: (1) Entropy-Guided Subspace Projection, which leverages information-theoretic weighting to adaptively aggregate multi-head attention distributions, effectively isolating dynamic motion cues from semantic noise; (2) Local-Consistency Driven Geometry Purification, which enforces spatial continuity via radius-based neighborhood constraints to eliminate structural outliers; and (3) Uncertainty-Aware Cross-View Consistency, which formulates multi-view projection refinement as a heteroscedastic maximum likelihood estimation problem, utilizing depth confidence as a probabilistic weight. Experiments on dynamic benchmarks show that our approach outperforms current state-of-the-art methods, reducing Mean Accuracy error by 13.43\\% and improving segmentation F-measure by 10.49\\%. Our framework maintains the efficiency of feed-forward inference and requires no task-specific fine-tuning or per-scene optimization.", "link": "http://arxiv.org/abs/2604.09366v1", "date": "2026-04-10", "relevancy": 2.4993, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6321}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6311}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.615}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Robust%204D%20Visual%20Geometry%20Transformer%20with%20Uncertainty-Aware%20Priors&body=Title%3A%20Robust%204D%20Visual%20Geometry%20Transformer%20with%20Uncertainty-Aware%20Priors%0AAuthor%3A%20Ying%20Zang%20and%20Yidong%20Han%20and%20Chaotao%20Ding%20and%20Yuanqi%20Hu%20and%20Deyi%20Ji%20and%20Qi%20Zhu%20and%20Xuanfu%20Li%20and%20Jin%20Ma%20and%20Lingyun%20Sun%20and%20Tianrun%20Chen%20and%20Lanyun%20Zhu%0AAbstract%3A%20Reconstructing%20dynamic%204D%20scenes%20is%20an%20important%20yet%20challenging%20task.%20While%203D%20foundation%20models%20like%20VGGT%20excel%20in%20static%20settings%2C%20they%20often%20struggle%20with%20dynamic%20sequences%20where%20motion%20causes%20significant%20geometric%20ambiguity.%20To%20address%20this%2C%20we%20present%20a%20framework%20designed%20to%20disentangle%20dynamic%20and%20static%20components%20by%20modeling%20uncertainty%20across%20different%20stages%20of%20the%20reconstruction%20process.%20Our%20approach%20introduces%20three%20synergistic%20mechanisms%3A%20%281%29%20Entropy-Guided%20Subspace%20Projection%2C%20which%20leverages%20information-theoretic%20weighting%20to%20adaptively%20aggregate%20multi-head%20attention%20distributions%2C%20effectively%20isolating%20dynamic%20motion%20cues%20from%20semantic%20noise%3B%20%282%29%20Local-Consistency%20Driven%20Geometry%20Purification%2C%20which%20enforces%20spatial%20continuity%20via%20radius-based%20neighborhood%20constraints%20to%20eliminate%20structural%20outliers%3B%20and%20%283%29%20Uncertainty-Aware%20Cross-View%20Consistency%2C%20which%20formulates%20multi-view%20projection%20refinement%20as%20a%20heteroscedastic%20maximum%20likelihood%20estimation%20problem%2C%20utilizing%20depth%20confidence%20as%20a%20probabilistic%20weight.%20Experiments%20on%20dynamic%20benchmarks%20show%20that%20our%20approach%20outperforms%20current%20state-of-the-art%20methods%2C%20reducing%20Mean%20Accuracy%20error%20by%2013.43%5C%25%20and%20improving%20segmentation%20F-measure%20by%2010.49%5C%25.%20Our%20framework%20maintains%20the%20efficiency%20of%20feed-forward%20inference%20and%20requires%20no%20task-specific%20fine-tuning%20or%20per-scene%20optimization.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09366v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRobust%25204D%2520Visual%2520Geometry%2520Transformer%2520with%2520Uncertainty-Aware%2520Priors%26entry.906535625%3DYing%2520Zang%2520and%2520Yidong%2520Han%2520and%2520Chaotao%2520Ding%2520and%2520Yuanqi%2520Hu%2520and%2520Deyi%2520Ji%2520and%2520Qi%2520Zhu%2520and%2520Xuanfu%2520Li%2520and%2520Jin%2520Ma%2520and%2520Lingyun%2520Sun%2520and%2520Tianrun%2520Chen%2520and%2520Lanyun%2520Zhu%26entry.1292438233%3DReconstructing%2520dynamic%25204D%2520scenes%2520is%2520an%2520important%2520yet%2520challenging%2520task.%2520While%25203D%2520foundation%2520models%2520like%2520VGGT%2520excel%2520in%2520static%2520settings%252C%2520they%2520often%2520struggle%2520with%2520dynamic%2520sequences%2520where%2520motion%2520causes%2520significant%2520geometric%2520ambiguity.%2520To%2520address%2520this%252C%2520we%2520present%2520a%2520framework%2520designed%2520to%2520disentangle%2520dynamic%2520and%2520static%2520components%2520by%2520modeling%2520uncertainty%2520across%2520different%2520stages%2520of%2520the%2520reconstruction%2520process.%2520Our%2520approach%2520introduces%2520three%2520synergistic%2520mechanisms%253A%2520%25281%2529%2520Entropy-Guided%2520Subspace%2520Projection%252C%2520which%2520leverages%2520information-theoretic%2520weighting%2520to%2520adaptively%2520aggregate%2520multi-head%2520attention%2520distributions%252C%2520effectively%2520isolating%2520dynamic%2520motion%2520cues%2520from%2520semantic%2520noise%253B%2520%25282%2529%2520Local-Consistency%2520Driven%2520Geometry%2520Purification%252C%2520which%2520enforces%2520spatial%2520continuity%2520via%2520radius-based%2520neighborhood%2520constraints%2520to%2520eliminate%2520structural%2520outliers%253B%2520and%2520%25283%2529%2520Uncertainty-Aware%2520Cross-View%2520Consistency%252C%2520which%2520formulates%2520multi-view%2520projection%2520refinement%2520as%2520a%2520heteroscedastic%2520maximum%2520likelihood%2520estimation%2520problem%252C%2520utilizing%2520depth%2520confidence%2520as%2520a%2520probabilistic%2520weight.%2520Experiments%2520on%2520dynamic%2520benchmarks%2520show%2520that%2520our%2520approach%2520outperforms%2520current%2520state-of-the-art%2520methods%252C%2520reducing%2520Mean%2520Accuracy%2520error%2520by%252013.43%255C%2525%2520and%2520improving%2520segmentation%2520F-measure%2520by%252010.49%255C%2525.%2520Our%2520framework%2520maintains%2520the%2520efficiency%2520of%2520feed-forward%2520inference%2520and%2520requires%2520no%2520task-specific%2520fine-tuning%2520or%2520per-scene%2520optimization.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.09366v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Robust%204D%20Visual%20Geometry%20Transformer%20with%20Uncertainty-Aware%20Priors&entry.906535625=Ying%20Zang%20and%20Yidong%20Han%20and%20Chaotao%20Ding%20and%20Yuanqi%20Hu%20and%20Deyi%20Ji%20and%20Qi%20Zhu%20and%20Xuanfu%20Li%20and%20Jin%20Ma%20and%20Lingyun%20Sun%20and%20Tianrun%20Chen%20and%20Lanyun%20Zhu&entry.1292438233=Reconstructing%20dynamic%204D%20scenes%20is%20an%20important%20yet%20challenging%20task.%20While%203D%20foundation%20models%20like%20VGGT%20excel%20in%20static%20settings%2C%20they%20often%20struggle%20with%20dynamic%20sequences%20where%20motion%20causes%20significant%20geometric%20ambiguity.%20To%20address {"title": "RIRF: Reasoning Image Restoration Framework", "author": "Wending Yan and Rongkai Zhang and Kaihua Tang and Yu Cheng and Qiankun Liu", "abstract": "Universal image restoration (UIR) aims to recover clean images from diverse and unknown degradations using a unified model. Existing UIR methods primarily focus on pixel reconstruction and often lack explicit diagnostic reasoning over degradation composition, severity, and scene semantics prior to restoration. We propose Reason and Restore (R\\&R), a novel framework that integrates structured Chain-of-Thought (CoT) reasoning into the image restoration pipeline. R\\&R introduces an explicit reasoner, implemented by fine-tuning Qwen3-VL, to diagnose degradation types, quantify degradation severity, infer key degradation-related factors, and describe relevant scene and object semantics. The resulting structured reasoning provides interpretable and fine-grained diagnostic priors for the restorer. To further improve restoration quality, the quantified degradation severity produced by the reasoner is leveraged as reinforcement learning (RL) signals to guide and strengthen the restorer. Unlike existing multimodal LLM-based agentic systems that decouple reasoning from low-level vision tasks, R\\&R tightly couples semantic diagnostic reasoning with pixel-level restoration in a unified framework. Extensive experiments across diverse UIR benchmarks demonstrate that R\\&R achieves state-of-the-art performance while offering unique interpretability into the restoration process.", "link": "http://arxiv.org/abs/2604.09511v1", "date": "2026-04-10", "relevancy": 2.4735, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5073}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4884}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4884}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RIRF%3A%20Reasoning%20Image%20Restoration%20Framework&body=Title%3A%20RIRF%3A%20Reasoning%20Image%20Restoration%20Framework%0AAuthor%3A%20Wending%20Yan%20and%20Rongkai%20Zhang%20and%20Kaihua%20Tang%20and%20Yu%20Cheng%20and%20Qiankun%20Liu%0AAbstract%3A%20Universal%20image%20restoration%20%28UIR%29%20aims%20to%20recover%20clean%20images%20from%20diverse%20and%20unknown%20degradations%20using%20a%20unified%20model.%20Existing%20UIR%20methods%20primarily%20focus%20on%20pixel%20reconstruction%20and%20often%20lack%20explicit%20diagnostic%20reasoning%20over%20degradation%20composition%2C%20severity%2C%20and%20scene%20semantics%20prior%20to%20restoration.%20We%20propose%20Reason%20and%20Restore%20%28R%5C%26R%29%2C%20a%20novel%20framework%20that%20integrates%20structured%20Chain-of-Thought%20%28CoT%29%20reasoning%20into%20the%20image%20restoration%20pipeline.%20R%5C%26R%20introduces%20an%20explicit%20reasoner%2C%20implemented%20by%20fine-tuning%20Qwen3-VL%2C%20to%20diagnose%20degradation%20types%2C%20quantify%20degradation%20severity%2C%20infer%20key%20degradation-related%20factors%2C%20and%20describe%20relevant%20scene%20and%20object%20semantics.%20The%20resulting%20structured%20reasoning%20provides%20interpretable%20and%20fine-grained%20diagnostic%20priors%20for%20the%20restorer.%20To%20further%20improve%20restoration%20quality%2C%20the%20quantified%20degradation%20severity%20produced%20by%20the%20reasoner%20is%20leveraged%20as%20reinforcement%20learning%20%28RL%29%20signals%20to%20guide%20and%20strengthen%20the%20restorer.%20Unlike%20existing%20multimodal%20LLM-based%20agentic%20systems%20that%20decouple%20reasoning%20from%20low-level%20vision%20tasks%2C%20R%5C%26R%20tightly%20couples%20semantic%20diagnostic%20reasoning%20with%20pixel-level%20restoration%20in%20a%20unified%20framework.%20Extensive%20experiments%20across%20diverse%20UIR%20benchmarks%20demonstrate%20that%20R%5C%26R%20achieves%20state-of-the-art%20performance%20while%20offering%20unique%20interpretability%20into%20the%20restoration%20process.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09511v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRIRF%253A%2520Reasoning%2520Image%2520Restoration%2520Framework%26entry.906535625%3DWending%2520Yan%2520and%2520Rongkai%2520Zhang%2520and%2520Kaihua%2520Tang%2520and%2520Yu%2520Cheng%2520and%2520Qiankun%2520Liu%26entry.1292438233%3DUniversal%2520image%2520restoration%2520%2528UIR%2529%2520aims%2520to%2520recover%2520clean%2520images%2520from%2520diverse%2520and%2520unknown%2520degradations%2520using%2520a%2520unified%2520model.%2520Existing%2520UIR%2520methods%2520primarily%2520focus%2520on%2520pixel%2520reconstruction%2520and%2520often%2520lack%2520explicit%2520diagnostic%2520reasoning%2520over%2520degradation%2520composition%252C%2520severity%252C%2520and%2520scene%2520semantics%2520prior%2520to%2520restoration.%2520We%2520propose%2520Reason%2520and%2520Restore%2520%2528R%255C%2526R%2529%252C%2520a%2520novel%2520framework%2520that%2520integrates%2520structured%2520Chain-of-Thought%2520%2528CoT%2529%2520reasoning%2520into%2520the%2520image%2520restoration%2520pipeline.%2520R%255C%2526R%2520introduces%2520an%2520explicit%2520reasoner%252C%2520implemented%2520by%2520fine-tuning%2520Qwen3-VL%252C%2520to%2520diagnose%2520degradation%2520types%252C%2520quantify%2520degradation%2520severity%252C%2520infer%2520key%2520degradation-related%2520factors%252C%2520and%2520describe%2520relevant%2520scene%2520and%2520object%2520semantics.%2520The%2520resulting%2520structured%2520reasoning%2520provides%2520interpretable%2520and%2520fine-grained%2520diagnostic%2520priors%2520for%2520the%2520restorer.%2520To%2520further%2520improve%2520restoration%2520quality%252C%2520the%2520quantified%2520degradation%2520severity%2520produced%2520by%2520the%2520reasoner%2520is%2520leveraged%2520as%2520reinforcement%2520learning%2520%2528RL%2529%2520signals%2520to%2520guide%2520and%2520strengthen%2520the%2520restorer.%2520Unlike%2520existing%2520multimodal%2520LLM-based%2520agentic%2520systems%2520that%2520decouple%2520reasoning%2520from%2520low-level%2520vision%2520tasks%252C%2520R%255C%2526R%2520tightly%2520couples%2520semantic%2520diagnostic%2520reasoning%2520with%2520pixel-level%2520restoration%2520in%2520a%2520unified%2520framework.%2520Extensive%2520experiments%2520across%2520diverse%2520UIR%2520benchmarks%2520demonstrate%2520that%2520R%255C%2526R%2520achieves%2520state-of-the-art%2520performance%2520while%2520offering%2520unique%2520interpretability%2520into%2520the%2520restoration%2520process.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.09511v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=RIRF%3A%20Reasoning%20Image%20Restoration%20Framework&entry.906535625=Wending%20Yan%20and%20Rongkai%20Zhang%20and%20Kaihua%20Tang%20and%20Yu%20Cheng%20and%20Qiankun%20Liu&entry.1292438233=Universal%20image%20restoration%20%28UIR%29%20aims%20to%20recover%20clean%20images%20from%20diverse%20and%20unknown%20degradations%20using%20a%20unified%20model.%20Existing%20UIR%20methods%20primarily%20focus%20on%20pixel%20reconstruction%20and%20often%20lack%20explicit%20diagnostic%20reasoning%20over%20degradation%20composition%2C%20severity%2C%20and%20scene%20semantics%20prior%20to%20restoration.%20We%20propose%20Reason%20and%20Restore%20%28R%5C%26R%29%2C%20a%20novel%20framework%20that%20integrates%20structured%20Chain-of-Thought%20%28CoT%29%20reasoning%20into%20the%20image%20restoration%20pipeline.%20R%5C%26R%20introduces%20an%20explicit%20reasoner%2C%20implemented%20by%20fine-tuning%20Qwen3-VL%2C%20to%20diagnose%20degradation%20types%2C%20quantify%20degradation%20severity%2C%20infer%20key%20degradation-related%20factors%2C%20and%20describe%20relevant%20scene%20and%20object%20semantics.%20The%20resulting%20structured%20reasoning%20provides%20interpretable%20and%20fine-grained%20diagnostic%20priors%20for%20the%20restorer.%20To%20further%20improve%20restoration%20quality%2C%20the%20quantified%20degradation%20severity%20produced%20by%20the%20reasoner%20is%20leveraged%20as%20reinforcement%20learning%20%28RL%29%20signals%20to%20guide%20and%20strengthen%20the%20restorer.%20Unlike%20existing%20multimodal%20LLM-based%20agentic%20systems%20that%20decouple%20reasoning%20from%20low-level%20vision%20tasks%2C%20R%5C%26R%20tightly%20couples%20semantic%20diagnostic%20reasoning%20with%20pixel-level%20restoration%20in%20a%20unified%20framework.%20Extensive%20experiments%20across%20diverse%20UIR%20benchmarks%20demonstrate%20that%20R%5C%26R%20achieves%20state-of-the-art%20performance%20while%20offering%20unique%20interpretability%20into%20the%20restoration%20process.&entry.1838667208=http%3A//arxiv.org/abs/2604.09511v1&entry.124074799=Read"},
{"title": "Nexus: Same Pretraining Loss, Better Downstream Generalization via Common Minima", "author": "Huanran Chen and Huaqing Zhang and Xiao Li and Yinpeng Dong and Ke Shen and Jun Zhu", "abstract": "Pretraining is the cornerstone of Large Language Models (LLMs), dominating the vast majority of computational budget and data to serve as the primary engine for their capabilities. During pretraining, LLMs acquire foundational knowledge from an unprecedentedly massive and diverse data sources, encompassing a vast array of domains such as general language, mathematics, code, and complex reasoning. In this work, we investigate an interesting geometric question regarding the converged state of pretraining: Does the model converge to a common minimizer across all data sources (e.g., \\cref{fig:cwa_illustration:close}), or merely a minimizer of the summed loss (e.g., \\cref{fig:cwa_illustration:distant})? We hypothesize that the geometric \"closeness\" of task-specific minima is intrinsically linked to downstream generalization. We reveal that standard optimizers (e.g., AdamW) often converge to points where task-specific minima are distant from each other. To address this, we propose the Nexus optimizer, which encourages the closeness of these minima by maximizing gradient similarity during optimization. Experiments across models ranging from 130M to 3B parameters, various data mixtures and hyperparameter schedules, show that Nexus \\textit{significantly boosts downstream performance}, despite \\textit{achieving the same pretraining loss} (see \\cref{fig:demo:benchmark}). Notably, on the 3B model, Nexus reduces the out-of-distribution loss by 0.012 and yields up to a 15.0\\% accuracy improvement on complex reasoning tasks (e.g., GSM8k). This finding challenges the reliance on pretraining loss as the sole proxy for model evaluation and demonstrates the importance of implicit biases in unlocking downstream generalization.", "link": "http://arxiv.org/abs/2604.09258v1", "date": "2026-04-10", "relevancy": 2.4699, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5066}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4877}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4877}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Nexus%3A%20Same%20Pretraining%20Loss%2C%20Better%20Downstream%20Generalization%20via%20Common%20Minima&body=Title%3A%20Nexus%3A%20Same%20Pretraining%20Loss%2C%20Better%20Downstream%20Generalization%20via%20Common%20Minima%0AAuthor%3A%20Huanran%20Chen%20and%20Huaqing%20Zhang%20and%20Xiao%20Li%20and%20Yinpeng%20Dong%20and%20Ke%20Shen%20and%20Jun%20Zhu%0AAbstract%3A%20Pretraining%20is%20the%20cornerstone%20of%20Large%20Language%20Models%20%28LLMs%29%2C%20dominating%20the%20vast%20majority%20of%20computational%20budget%20and%20data%20to%20serve%20as%20the%20primary%20engine%20for%20their%20capabilities.%20During%20pretraining%2C%20LLMs%20acquire%20foundational%20knowledge%20from%20an%20unprecedentedly%20massive%20and%20diverse%20data%20sources%2C%20encompassing%20a%20vast%20array%20of%20domains%20such%20as%20general%20language%2C%20mathematics%2C%20code%2C%20and%20complex%20reasoning.%20In%20this%20work%2C%20we%20investigate%20an%20interesting%20geometric%20question%20regarding%20the%20converged%20state%20of%20pretraining%3A%20Does%20the%20model%20converge%20to%20a%20common%20minimizer%20across%20all%20data%20sources%20%28e.g.%2C%20%5Ccref%7Bfig%3Acwa_illustration%3Aclose%7D%29%2C%20or%20merely%20a%20minimizer%20of%20the%20summed%20loss%20%28e.g.%2C%20%5Ccref%7Bfig%3Acwa_illustration%3Adistant%7D%29%3F%20We%20hypothesize%20that%20the%20geometric%20%22closeness%22%20of%20task-specific%20minima%20is%20intrinsically%20linked%20to%20downstream%20generalization.%20We%20reveal%20that%20standard%20optimizers%20%28e.g.%2C%20AdamW%29%20often%20converge%20to%20points%20where%20task-specific%20minima%20are%20distant%20from%20each%20other.%20To%20address%20this%2C%20we%20propose%20the%20Nexus%20optimizer%2C%20which%20encourages%20the%20closeness%20of%20these%20minima%20by%20maximizing%20gradient%20similarity%20during%20optimization.%20Experiments%20across%20models%20ranging%20from%20130M%20to%203B%20parameters%2C%20various%20data%20mixtures%20and%20hyperparameter%20schedules%2C%20show%20that%20Nexus%20%5Ctextit%7Bsignificantly%20boosts%20downstream%20performance%7D%2C%20despite%20%5Ctextit%7Bachieving%20the%20same%20pretraining%20loss%7D%20%28see%20%5Ccref%7Bfig%3Ademo%3Abenchmark%7D%29.%20Notably%2C%20on%20the%203B%20model%2C%20Nexus%20reduces%20the%20out-of-distribution%20loss%20by%200.012%20and%20yields%20up%20to%20a%2015.0%5C%25%20accuracy%20improvement%20on%20complex%20reasoning%20tasks%20%28e.g.%2C%20GSM8k%29.%20This%20finding%20challenges%20the%20reliance%20on%20pretraining%20loss%20as%20the%20sole%20proxy%20for%20model%20evaluation%20and%20demonstrates%20the%20importance%20of%20implicit%20biases%20in%20unlocking%20downstream%20generalization.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09258v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNexus%253A%2520Same%2520Pretraining%2520Loss%252C%2520Better%2520Downstream%2520Generalization%2520via%2520Common%2520Minima%26entry.906535625%3DHuanran%2520Chen%2520and%2520Huaqing%2520Zhang%2520and%2520Xiao%2520Li%2520and%2520Yinpeng%2520Dong%2520and%2520Ke%2520Shen%2520and%2520Jun%2520Zhu%26entry.1292438233%3DPretraining%2520is%2520the%2520cornerstone%2520of%2520Large%2520Language%2520Models%2520%2528LLMs%2529%252C%2520dominating%2520the%2520vast%2520majority%2520of%2520computational%2520budget%2520and%2520data%2520to%2520serve%2520as%2520the%2520p

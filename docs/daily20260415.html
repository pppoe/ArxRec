{"title": "XRZero-G0: Pushing the Frontier of Dexterous Robotic Manipulation with Interfaces, Quality and Ratios", "author": "Junming Wang and Teng Pu and Wingmun Fung and Jindong Wang and Shanchang Wang and Yuan Deng and Shuyuan Wang and Ziwei Liu and Kunhao Pan and Ping Yang and Peng Zhai and Yuxin Liang and Xiaofan Li and Jiabi Sun and Renchao Xu and Xiaotian Tian and Pengfei Yan and Guoqiang Ye and Liang Li and Qian Wang and Ruyi Gan and Hao Wang", "abstract": "The acquisition of high-quality, action-aligned demonstration data remains a fundamental bottleneck in scaling foundation models for dexterous robot manipulation. Although robot-free human demonstrations (e.g., the UMI paradigm) offer a scalable alternative to traditional teleoperation, current systems are constrained by sub-optimal hardware ergonomics, open-loop workflows, and a lack of systematic data-mixing strategies. To address these limitations, we present XRZero-G0, a hardware-software co-designed system for embodied data collection and policy learning. The system features an ergonomic, virtual reality interface equipped with a top-view camera and dual specialized grippers to directly improve collection efficiency. To ensure dataset reliability, we propose a closed-loop collection, inspection, training, and evaluation pipeline for non-proprioceptive data. This workflow achieves an 85% data validity rate and establishes a transparent mechanism for quality control. Furthermore, we investigate the empirical scaling behaviors and optimal mixing ratios of robot-free data. Extensive experiments indicate that combining a minimal volume of real-robot data with large-scale robot-free data (e.g., a 10:1 ratio) achieves performance comparable to exclusively real-robot datasets, while reducing acquisition costs by a factor of twenty. Utilizing XRZero-G0, we construct a 2,000-hour robot-free dataset that enables zero-shot cross-embodiment transfer to a target physical robot, demonstrating a highly scalable methodology for generalized real-world manipulation.Our project repository: https://github.com/X-Square-Robot/XRZero-G0", "link": "http://arxiv.org/abs/2604.13001v1", "date": "2026-04-14", "relevancy": 2.4143, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.6353}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6181}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5764}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20XRZero-G0%3A%20Pushing%20the%20Frontier%20of%20Dexterous%20Robotic%20Manipulation%20with%20Interfaces%2C%20Quality%20and%20Ratios&body=Title%3A%20XRZero-G0%3A%20Pushing%20the%20Frontier%20of%20Dexterous%20Robotic%20Manipulation%20with%20Interfaces%2C%20Quality%20and%20Ratios%0AAuthor%3A%20Junming%20Wang%20and%20Teng%20Pu%20and%20Wingmun%20Fung%20and%20Jindong%20Wang%20and%20Shanchang%20Wang%20and%20Yuan%20Deng%20and%20Shuyuan%20Wang%20and%20Ziwei%20Liu%20and%20Kunhao%20Pan%20and%20Ping%20Yang%20and%20Peng%20Zhai%20and%20Yuxin%20Liang%20and%20Xiaofan%20Li%20and%20Jiabi%20Sun%20and%20Renchao%20Xu%20and%20Xiaotian%20Tian%20and%20Pengfei%20Yan%20and%20Guoqiang%20Ye%20and%20Liang%20Li%20and%20Qian%20Wang%20and%20Ruyi%20Gan%20and%20Hao%20Wang%0AAbstract%3A%20The%20acquisition%20of%20high-quality%2C%20action-aligned%20demonstration%20data%20remains%20a%20fundamental%20bottleneck%20in%20scaling%20foundation%20models%20for%20dexterous%20robot%20manipulation.%20Although%20robot-free%20human%20demonstrations%20%28e.g.%2C%20the%20UMI%20paradigm%29%20offer%20a%20scalable%20alternative%20to%20traditional%20teleoperation%2C%20current%20systems%20are%20constrained%20by%20sub-optimal%20hardware%20ergonomics%2C%20open-loop%20workflows%2C%20and%20a%20lack%20of%20systematic%20data-mixing%20strategies.%20To%20address%20these%20limitations%2C%20we%20present%20XRZero-G0%2C%20a%20hardware-software%20co-designed%20system%20for%20embodied%20data%20collection%20and%20policy%20learning.%20The%20system%20features%20an%20ergonomic%2C%20virtual%20reality%20interface%20equipped%20with%20a%20top-view%20camera%20and%20dual%20specialized%20grippers%20to%20directly%20improve%20collection%20efficiency.%20To%20ensure%20dataset%20reliability%2C%20we%20propose%20a%20closed-loop%20collection%2C%20inspection%2C%20training%2C%20and%20evaluation%20pipeline%20for%20non-proprioceptive%20data.%20This%20workflow%20achieves%20an%2085%25%20data%20validity%20rate%20and%20establishes%20a%20transparent%20mechanism%20for%20quality%20control.%20Furthermore%2C%20we%20investigate%20the%20empirical%20scaling%20behaviors%20and%20optimal%20mixing%20ratios%20of%20robot-free%20data.%20Extensive%20experiments%20indicate%20that%20combining%20a%20minimal%20volume%20of%20real-robot%20data%20with%20large-scale%20robot-free%20data%20%28e.g.%2C%20a%2010%3A1%20ratio%29%20achieves%20performance%20comparable%20to%20exclusively%20real-robot%20datasets%2C%20while%20reducing%20acquisition%20costs%20by%20a%20factor%20of%20twenty.%20Utilizing%20XRZero-G0%2C%20we%20construct%20a%202%2C000-hour%20robot-free%20dataset%20that%20enables%20zero-shot%20cross-embodiment%20transfer%20to%20a%20target%20physical%20robot%2C%20demonstrating%20a%20highly%20scalable%20methodology%20for%20generalized%20real-world%20manipulation.Our%20project%20repository%3A%20https%3A//github.com/X-Square-Robot/XRZero-G0%0ALink%3A%20http%3A//arxiv.org/abs/2604.13001v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DXRZero-G0%253A%2520Pushing%2520the%2520Frontier%2520of%2520Dexterous%2520Robotic%2520Manipulation%2520with%2520Interfaces%252C%2520Quality%2520and%2520Ratios%26entry.906535625%3DJunming%2520Wang%252 {"title": "A2-DIDM: Privacy-preserving Accumulator-enabled Auditing for Distributed Identity of DNN Model", "author": "Tianxiu Xie and Keke Gai and Jing Yu and Liehuang Zhu", "abstract": "Recent booming development of Generative Artificial Intelligence (GenAI) has facilitated model commercialization to reinforce the model performance, including licensing or trading Deep Neural Network (DNN) models. However, DNN model trading may violate the benefit of the model owner due to unauthorized replications or misuse of the model. Model identity auditing is a challenging issue in protecting DNN model ownership, and verifying the integrity and ownership of models is one of the critical obstacles. In this paper, we focus on the above issue and propose an \\underline{A}ccumulator-enabled \\underline{A}uditing for \\underline{D}ecentralized \\underline{Id}entity of DNN \\underline{M}odel (A2-DIDM) that utilizes blockchain and zero-knowledge techniques to protect data and function privacy while ensuring the lightweight on-chain ownership verification. The proposed model presents a scheme of identity records via configuring model weight checkpoints with zero-knowledge proofs, which incorporates predicates to capture incremental state changes in model weight checkpoints. Our scheme ensures both computational integrity and programmability in DNN training process so that the uniqueness of the weight checkpoint sequence in a DNN model is preserved. %to ensure the correctness of model identity auditing, so that the uniqueness of the weight checkpoint sequence in a DNN model is preserved. A2-DIDM also addresses privacy protections in decentralized identity. We systematically analyze the security and robustness of our proposed model and further evaluate the effectiveness and usability of auditing DNN model identities. The code is available at https://github.com/xtx123456/A2-DIDM.git.", "link": "http://arxiv.org/abs/2405.04108v2", "date": "2026-04-14", "relevancy": 2.4066, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4999}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.4741}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.47}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A2-DIDM%3A%20Privacy-preserving%20Accumulator-enabled%20Auditing%20for%20Distributed%20Identity%20of%20DNN%20Model&body=Title%3A%20A2-DIDM%3A%20Privacy-preserving%20Accumulator-enabled%20Auditing%20for%20Distributed%20Identity%20of%20DNN%20Model%0AAuthor%3A%20Tianxiu%20Xie%20and%20Keke%20Gai%20and%20Jing%20Yu%20and%20Liehuang%20Zhu%0AAbstract%3A%20Recent%20booming%20development%20of%20Generative%20Artificial%20Intelligence%20%28GenAI%29%20has%20facilitated%20model%20commercialization%20to%20reinforce%20the%20model%20performance%2C%20including%20licensing%20or%20trading%20Deep%20Neural%20Network%20%28DNN%29%20models.%20However%2C%20DNN%20model%20trading%20may%20violate%20the%20benefit%20of%20the%20model%20owner%20due%20to%20unauthorized%20replications%20or%20misuse%20of%20the%20model.%20Model%20identity%20auditing%20is%20a%20challenging%20issue%20in%20protecting%20DNN%20model%20ownership%2C%20and%20verifying%20the%20integrity%20and%20ownership%20of%20models%20is%20one%20of%20the%20critical%20obstacles.%20In%20this%20paper%2C%20we%20focus%20on%20the%20above%20issue%20and%20propose%20an%20%5Cunderline%7BA%7Dccumulator-enabled%20%5Cunderline%7BA%7Duditing%20for%20%5Cunderline%7BD%7Decentralized%20%5Cunderline%7BId%7Dentity%20of%20DNN%20%5Cunderline%7BM%7Dodel%20%28A2-DIDM%29%20that%20utilizes%20blockchain%20and%20zero-knowledge%20techniques%20to%20protect%20data%20and%20function%20privacy%20while%20ensuring%20the%20lightweight%20on-chain%20ownership%20verification.%20The%20proposed%20model%20presents%20a%20scheme%20of%20identity%20records%20via%20configuring%20model%20weight%20checkpoints%20with%20zero-knowledge%20proofs%2C%20which%20incorporates%20predicates%20to%20capture%20incremental%20state%20changes%20in%20model%20weight%20checkpoints.%20Our%20scheme%20ensures%20both%20computational%20integrity%20and%20programmability%20in%20DNN%20training%20process%20so%20that%20the%20uniqueness%20of%20the%20weight%20checkpoint%20sequence%20in%20a%20DNN%20model%20is%20preserved.%20%25to%20ensure%20the%20correctness%20of%20model%20identity%20auditing%2C%20so%20that%20the%20uniqueness%20of%20the%20weight%20checkpoint%20sequence%20in%20a%20DNN%20model%20is%20preserved.%20A2-DIDM%20also%20addresses%20privacy%20protections%20in%20decentralized%20identity.%20We%20systematically%20analyze%20the%20security%20and%20robustness%20of%20our%20proposed%20model%20and%20further%20evaluate%20the%20effectiveness%20and%20usability%20of%20auditing%20DNN%20model%20identities.%20The%20code%20is%20available%20at%20https%3A//github.com/xtx123456/A2-DIDM.git.%0ALink%3A%20http%3A//arxiv.org/abs/2405.04108v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA2-DIDM%253A%2520Privacy-preserving%2520Accumulator-enabled%2520Auditing%2520for%2520Distributed%2520Identity%2520of%2520DNN%2520Model%26entry.906535625%3DTianxiu%2520Xie%2520and%2520Keke%2520Gai%2520and%2520Jing%2520Yu%2520and%2520Liehuang%2520Zhu%26entry.1292438233%3DRecent%2520booming%2520development%2520of%2520Generative%2520Artificial%2520Intelligence%2520%2528GenAI%2529%2520has%2520facilitated%2520model%2520commercialization%2520to%2520reinforce%2520the%2520model%2520performance%252C%2520including%2520licensing%2520or%2520trading%2520Deep%2520Neural%2520Network%2520%2528DNN%2529%2520models.%2520However%252C%2520DNN%2520model%2520trading%2520may%2520violate%2520the%2520benefit%2520of%2520the%2520model%2520owner%2520due%2520to%2520unauthorized%2520replications%2520or%2520misuse%2520of%2520the%2520model.%2520Model%2520identity%2520auditing%2520is%2520a%2520challenging%2520issue%2520in%2520protecting%2520DNN%2520model%2520ownership%252C%2520and%2520verifying%2520the%2520integrity%2520and%2520ownership%2520of%2520models%2520is%2520one%2520of%2520the%2520critical%2520obstacles.%2520In%2520this%2520paper%252C%2520we%2520focus%2520on%2520the%2520above%2520issue%2520and%2520propose%2520an%2520%255Cunderline%257BA%257Dccumulator-enabled%2520%255Cunderline%257BA%257Duditing%2520for%2520%255Cunderline%257BD%257Decentralized%2520%255Cunderline%257BId%257Dentity%2520of%2520DNN%2520%255Cunderline%257BM%257Dodel%2520%2528A2-DIDM%2529%2520that%2520utilizes%2520blockchain%2520and%2520zero-knowledge%2520techniques%2520to%2520protect%2520data%2520and%2520function%2520privacy%2520while%2520ensuring%2520the%2520lightweight%2520on-chain%2520ownership%2520verification.%2520The%2520proposed%2520model%2520presents%2520a%2520scheme%2520of%2520identity%2520records%2520via%2520configuring%2520model%2520weight%2520checkpoints%2520with%2520zero-knowledge%2520proofs%252C%2520which%2520incorporates%2520predicates%2520to%2520capture%2520incremental%2520state%2520changes%2520in%2520model%2520weight%2520checkpoints.%2520Our%2520scheme%2520ensures%2520both%2520computational%2520integrity%2520and%2520programmability%2520in%2520DNN%2520training%2520process%2520so%2520that%2520the%2520uniqueness%2520of%2520the%2520weight%2520checkpoint%2520sequence%2520in%2520a%2520DNN%2520model%2520is%2520preserved.%2520%2525to%2520ensure%2520the%2520correctness%2520of%2520model%2520identity%2520auditing%252C%2520so%2520that%2520the%2520uniqueness%2520of%2520the%2520weight%2520checkpoint%2520sequence%2520in%2520a%2520DNN%2520model%2520is%2520preserved.%2520A2-DIDM%2520also%2520addresses%2520privacy%2520protections%2520in%2520decentralized%2520identity.%2520We%2520systematically%2520analyze%2520the%2520security%2520and%2520robustness%2520of%2520our%2520proposed%2520model%2520and%2520further%2520evaluate%2520the%2520effectiveness%2520and%2520usability%2520of%2520auditing%2520DNN%2520model%2520identities.%2520The%2520code%2520is%2520available%2520at%2520https%253A//github.com/xtx123456/A2-DIDM.git.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2405.04108v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=A2-DIDM%3A%20Privacy-preserving%20Accumulator-enabled%20Auditing%20for%20Distributed%20Identity%20of%20DNN%20Model&entry.906535625=Tianxiu%20Xie%20and%20Keke%20Gai%20and%20Jing%20Yu%20and%20Liehuang%20Zhu&entry.1292438233=Recent%20booming%20development%20of%20Generative%20Artificial%20Intelligence%20%28GenAI%29%20has%20facilitated%20model%20commercialization%20to%20reinforce%20the%20model%20performance%2C%20including%20licensing%20or%20trading%20Deep%20Neural%20Network%20%28DNN%29%20models.%20However%2C%20DNN%20model%20trading%20may%20violate%20the%20benefit%20of%20the%20model%20owner%20due%20to%20unauthorized%20replications%20or%20misuse%20of%20the%20model.%20Model%20identity%20auditing%20is%20a%20challenging%20issue%20in%20protecting%20DNN%20model%20ownership%2C%20and%20verifying%20the%20integrity%20and%20ownership%20of%20models%20is%20one%20of%20the%20critical%20obstacles.%20In%20this%20paper%2C%20we%20focus%20on%20the%20above%20issue%20and%20propose%20an%20%5Cunderline%7BA%7Dccumulator-enabled%20%5Cunderline%7BA%7Duditing%20for%20%5Cunderline%7BD%7Decentralized%20%5Cunderline%7BId%7Dentity%20of%20DNN%20%5Cunderline%7BM%7Dodel%20%28A2-DIDM%29%20that%20utilizes%20blockchain%20and%20zero-knowledge%20techniques%20to%20protect%20data%20and%20function%20privacy%20while%20ensuring%20the%20lightweight%20on-chain%20ownership%20verification.%20The%20proposed%20model%20presents%20a%20scheme%20of%20identity%20records%20via%20configuring%20model%20weight%20checkpoints%20with%20zero-kno {"title": "Understanding or Memorizing? A Case Study of German Definite Articles in Language Models", "author": "Jonathan Drechsel and Erisa Bytyqi and Steffen Herbold", "abstract": "Language models perform well on grammatical agreement, but it is unclear whether this reflects rule-based generalization or memorization. We study this question for German definite singular articles, whose forms depend on gender and case. Using GRADIEND, a gradient-based interpretability method, we learn parameter update directions for gender-case specific article transitions. We find that updates learned for a specific gender-case article transition frequently affect unrelated gender-case settings, with substantial overlap among the most affected neurons across settings. These results argue against a strictly rule-based encoding of German definite articles, indicating that models at least partly rely on memorized associations rather than abstract grammatical rules.", "link": "http://arxiv.org/abs/2601.09313v2", "date": "2026-04-14", "relevancy": 2.4054, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4983}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4983}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4466}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Understanding%20or%20Memorizing%3F%20A%20Case%20Study%20of%20German%20Definite%20Articles%20in%20Language%20Models&body=Title%3A%20Understanding%20or%20Memorizing%3F%20A%20Case%20Study%20of%20German%20Definite%20Articles%20in%20Language%20Models%0AAuthor%3A%20Jonathan%20Drechsel%20and%20Erisa%20Bytyqi%20and%20Steffen%20Herbold%0AAbstract%3A%20Language%20models%20perform%20well%20on%20grammatical%2 {"title": "NTIRE 2026 Challenge on Bitstream-Corrupted Video Restoration: Methods and Results", "author": "Wenbin Zou and Tianyi Liu and Kejun Wu and Huiping Zhuang and Zongwei Wu and Zhuyun Zhou and Radu Timofte and Kim-Hui Yap and Lap-Pui Chau and Yi Wang and Shiqi Zhou and Xiaodi Shi and Yuxiang Chen and Yilian Zhong and Shibo Yin and Yushun Fang and Xilei Zhu and Yahui Wang and Chen Lu and Zhitao Wang and Lifa Ha and Hengyu Man and Xiaopeng Fan and Priyansh Singh and  Sidharth and Krrish Dev and Soham Kakkar and Vinit Jakhetiya and Ovais Iqbal Shah and Wei Zhou and Linfeng Li and Qi Xu and Zhenyang Liu and Kepeng Xu and Tong Qiao and Jiachen Tu and Guoyi Xu and Yaoxin Jiang and Jiajia Liu and Yaokun Shi", "abstract": "This paper reports on the NTIRE 2026 Challenge on Bitstream-Corrupted Video Restoration (BSCVR). The challenge aims to advance research on recovering visually coherent videos from corrupted bitstreams, whose decoding often produces severe spatial-temporal artifacts and content distortion. Built upon recent progress in bitstream-corrupted video recovery, the challenge provides a common benchmark for evaluating restoration methods under realistic corruption settings. We describe the dataset, evaluation protocol, and participating methods, and summarize the final results and main technical trends. The challenge highlights the difficulty of this emerging task and provides useful insights for future research on robust video restoration under practical bitstream corruption.", "link": "http://arxiv.org/abs/2604.06945v3", "date": "2026-04-14", "relevancy": 2.405, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5206}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4642}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", " {"title": "Rethinking the Personalized Relaxed Initialization in the Federated Learning: Consistency and Generalization", "author": "Li Shen and Yan Sun and Dacheng Tao", "abstract": "Federated learning (FL) is a distributed paradigm that coordinates massive local clients to collaboratively train a global model via stage-wise local training processes on the heterogeneous dataset. Previous works have implicitly studied that FL suffers from the ``client-drift'' problem, which is caused by the inconsistent optimum across local clients. However, till now it still lacks solid theoretical analysis to explain the impact of this local inconsistency. To alleviate the negative impact of ``client drift'' and explore its substance in FL, in this paper, we first propose an efficient FL algorithm FedInit, which allows employing the personalized relaxed initialization state at the beginning of each local training stage. Specifically, FedInit initializes the local state by moving away from the current global state towards the reverse direction of the latest local state. Moreover, to further understand how inconsistency disrupts performance in FL, we introduce the excess risk analysis and study the divergence term to investigate the test error in FL. Our studies show that optimization error is not sensitive to this local inconsistency, while it mainly affects the generalization error bound. Extensive experiments are conducted to validate its efficiency. The proposed FedInit method could achieve comparable results compared to several advanced benchmarks without any additional training or communication costs. Meanwhile, the stage-wise personalized relaxed initialization could also be incorporated into several current advanced algorithms to achieve higher generalization performance in the FL paradigm.", "link": "http://arxiv.org/abs/2604.12768v1", "date": "2026-04-14", "relevancy": 2.3919, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4848}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4793}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.471}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Rethinking%20the%20Personalized%20Relaxed%20Initialization%20in%20the%20Federated%20Learning%3A%20Consistency%20and%20Generalization&body=Title%3A%20Rethinking%20the%20Personalized%20Relaxed%20Initialization%20in%20the%20Federated%20Learning%3A%20Consistency%20and%20Generalization%0AAuthor%3A%20Li%20Shen%20and%20Yan%20Sun%20and%20Dacheng%20Tao%0AAbstract%3A%20Federated%20learning%20%28FL%29%20is%20a%20distributed%20paradigm%20that%20coordinates%20massive%20local%20clients%20to%20collaboratively%20train%20a%20global%20model%20via%20stage-wise%20local%20training%20processes%20on%20the%20heterogeneous%20dataset.%20Previous%20works%20have%20implicitly%20studied%20that%20FL%20suffers%20from%20the%20%60%60client-drift%27%27%20problem%2C%20which%20is%20caused%20by%20the%20inconsistent%20optimum%20across%20local%20clients.%20However%2C%20till%20now%20it%20still%20lacks%20solid%20theoretical%20analysis%20to%20explain%20the%20impact%20of%20this%20local%20inconsistency.%20To%20alleviate%20the%20negative%20impact%20of%20%60%60client%20drift%27%27%20and%20explore%20its%20substance%20in%20FL%2C%20in%20this%20paper%2C%20we%20first%20propose%20an%20efficient%20FL%20algorithm%20FedInit%2C%20which%20allows%20employing%20the%20personalized%20relaxed%20initialization%20state%20at%20the%20beginning%20of%20each%20local%20training%20stage.%20Specifically%2C%20FedInit%20initializes%20the%20local%20state%20by%20moving%20away%20from%20the%20current%20global%20state%20towards%20the%20reverse%20direction%20of%20the%20latest%20local%20state.%20Moreover%2C%20to%20further%20understand%20how%20inconsistency%20disrupts%20performance%20in%20FL%2C%20we%20introduce%20the%20excess%20risk%20analysis%20and%20study%20the%20divergence%20term%20to%20investigate%20the%20test%20error%20in%20FL.%20Our%20studies%20show%20that%20optimization%20error%20is%20not%20sensitive%20to%20this%20local%20inconsistency%2C%20while%20it%20mainly%20affects%20the%20generalization%20error%20bound.%20Extensive%20experiments%20are%20conducted%20to%20validate%20its%20efficiency.%20The%20proposed%20FedInit%20method%20could%20achieve%20comparable%20results%20compared%20to%20several%20advanced%20benchmarks%20without%20any%20additional%20training%20or%20communication%20costs.%20Meanwhile%2C%20the%20stage-wise%20personalized%20relaxed%20initialization%20could%20also%20be%20incorporated%20into%20several%20current%20advanced%20algorithms%20to%20achieve%20higher%20generalization%20performance%20in%20the%20FL%20paradigm.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12768v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRethinking%2520the%2520Personalized%2520Relaxed%2520Initialization%2520in%2520the%2520Federated%2520Learning%253A%2520Consistency%2520and%2520Generalization%26entry.906535625%3DLi%2520Shen%2520and%2520Yan%2520Sun%2520and%2520Dacheng%2520Tao%26entry.1292438233%3DFederated%2520learning%2520%2528FL%2529%2520is%2520a%2520distributed%2520paradigm%2520that%2520coordinates%2520massive%2520local%2520clients%2520to%2520collaboratively%2520train%2520a%2520global%2520model%2520via%2520stage-wise%2520local%2520training%2520processes%2520on%2520the%2520heterogeneous%2520dataset.%2520Previous%2520works%2520have%2520implicitly%2520studied%2520that%2520FL%2520suffers%2520from%2520the%2520%2560%2560client-drift%2527%2527%2520problem%252C%2520which%2520is%2520caused%2520by {"title": "Direct Discrepancy Replay: Distribution-Discrepancy Condensation and Manifold-Consistent Replay for Continual Face Forgery Detection", "author": "Tianshuo Zhang and Haoyuan Zhang and Siran Peng and Weisong Zhao and Xiangyu Zhu and Zhen Lei", "abstract": "Continual face forgery detection (CFFD) requires detectors to learn emerging forgery paradigms without forgetting previously seen manipulations. Existing CFFD methods commonly rely on replaying a small amount of past data to mitigate forgetting. Such replay is typically implemented either by storing a few historical samples or by synthesizing pseudo-forgeries from detector-dependent perturbations. Under strict memory budgets, the former cannot adequately cover diverse forgery cues and may expose facial identities, while the latter remains strongly tied to past decision boundaries. We argue that the core role of replay in CFFD is to reinstate the distributions of previous forgery tasks during subsequent training. To this end, we directly condense the discrepancy between real and fake distributions and leverage real faces from the current stage to perform distribution-level replay. Specifically, we introduce Distribution-Discrepancy Condensation (DDC), which models the real-to-fake discrepancy via a surrogate factorization in characteristic-function space and condenses it into a tiny bank of distribution discrepancy maps. We further propose Manifold-Consistent Replay (MCR), which synthesizes replay samples through variance-preserving composition of these maps with current-stage real faces, yielding samples that reflect previous-task forgery cues while remaining compatible with current real-face statistics. Operating under an extremely small memory budget and without directly storing raw historical face images, our framework consistently outperforms prior CFFD baselines and significantly mitigates catastrophic forgetting. Replay-level privacy analysis further suggests reduced identity leakage risk relative to selection-based replay.", "link": "http://arxiv.org/abs/2604.12941v1", "date": "2026-04-14", "relevancy": 2.3901, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5031}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4697}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4613}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Direct%20Discrepancy%20Replay%3A%20Distribution-Discrepancy%20Condensation%20and%20Manifold-Consistent%20Replay%20for%20Continual%20Face%20Forgery%20Detection&body=Title%3A%20Direct%20Discrepancy%20Replay%3A%20Distribution-Discrepancy%20Condensation%20and%20Manifold-Consistent%20Replay%20for%20Continual%20Face%20Forgery%20Detection%0AAuthor%3A%20Tianshuo%20Zhang%20and%20Haoyuan%20Zhang%20and%20Siran%20Peng%20and%20Weisong%20Zhao%20and%20Xiangyu%20Zhu%20and%20Zhen%20Lei%0AAbstract%3A%20Continual%20face%20forgery%20detection%20%28CFFD%29%20requires%20detectors%20to%20learn%20emerging%20forgery%20paradigms%20without%20forgetting%20previously%20seen%20manipulations.%20Existing%20CFFD%20methods%20commonly%20rely%20on%20replaying%20a%20small%20amount%20of%20past%20data%20to%20mitigate%20forgetting.%20Such%20replay%20is%20typically%20implemented%20either%20by%20storing%20a%20few%20historical%20samples%20or%20by%20synthesizing%20pseudo-forgeries%20from%20detector-dependent%20perturbations.%20Under%20strict%20memory%20budgets%2C%20the%20former%20cannot%20adequately%20cover%20diverse%20forgery%20cues%20and%20may%20expose%20facial%20identities%2C%20while%20the%20latter%20remains%20strongly%20tied%20to%20past%20decision%20boundaries.%20We%20argue%20that%20the%20core%20role%20of%20replay%20in%20CFFD%20is%20to%20reinstate%20the%20distributions%20of%20previous%20forgery%20tasks%20during%20subsequent%20training.%20To%20this%20end%2C%20we%20directly%20condense%20the%20discrepancy%20between%20real%20and%20fake%20distributions%20and%20leverage%20real%20faces%20from%20the%20current%20stage%20to%20perform%20distribution-level%20replay.%20Specifically%2C%20we%20introduce%20Distribution-Discrepancy%20Condensation%20%28DDC%29%2C%20which%20models%20the%20real-to-fake%20discrepancy%20via%20a%20surrogate%20factorization%20in%20characteristic-function%20space%20and%20condenses%20it%20into%20a%20tiny%20bank%20of%20distribution%20discrepancy%20maps.%20We%20further%20propose%20Manifold-Consistent%20Replay%20%28MCR%29%2C%20which%20synthesizes%20replay%20samples%20through%20variance-preserving%20composition%20of%20these%20maps%20with%20current-stage%20real%20faces%2C%20yielding%20samples%20that%20reflect%20previous-task%20forgery%20cues%20while%20remaining%20compatible%20with%20current%20real-face%20statistics.%20Operating%20under%20an%20extremely%20small%20memory%20budget%20and%20without%20directly%20storing%20raw%20historical%20face%20images%2C%20our%20framework%20consistently%20outperforms%20prior%20CFFD%20baselines%20and%20significantly%20mitigates%20catastrophic%20forgetting.%20Replay-level%20privacy%20analysis%20further%20suggests%20reduced%20identity%20leakage%20risk%20relative%20to%20selection-based%20replay.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12941v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDirect%2520Discrepancy%2520Replay%253A%2520Distribution-Discrepancy%2520Condensation%2520and%2520Manifold-Consistent%2520Replay%2520for%2520Continual%2520Face%2520Forgery%2520Detection%26entry.906535625%3DTianshuo%2520Zhang%2520and%2520Haoyuan%2520Zhang%2520and%2520Siran%2520Peng%2520and%2520Weisong%2520Zhao%2520and%2520Xiangyu%2520Zhu%2520and%2520Zhen%2520Lei%26entry.1292438233%3DContinual%2520face%2520forgery%2520detection%2520%2528CFFD%2529%2520requires%2520det 20that%2520reflect%2520previous-task%2520forgery%2520cues%2520while%2520remaining%2520compatible%2520with%2520current%2520real-face%2520statistics.%2520Operating%2520under%2520an%2520extremely%2520small%2520memory%2520budget%2520and%2520without%2520directly%2520storing%2520raw%2520historical%2520face%2520images%252C%2520our%2520framework%2520consistently%2520outperforms%2520prior%2520CFFD%2520baselines%2520and%2520significantly%2520mitigates%2520catastrophic%2520forgetting.%2520Replay-level%2520privacy%2520analysis%2520further%2520suggests%2520reduced%2520identity%2520leakage%2520risk%2520relative%2520to%2520selection-based%2520replay.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.12941v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Direct%20Discrepancy%20Replay%3A%20Distribution-Discrepancy%20Condensation%20and%20Manifold-Consistent%20Replay%20for%20Continual%20Face%20Forgery%20Detection&entry.906535625=Tianshuo%20Zhang%20and%20Haoyuan%20Zhang%20and%20Siran%20Peng%20and%20Weisong%20Zhao%20and%20Xiangyu%20Zhu%20and%20Zhen%20Lei&entry.1292438233=Continual%20face%20forgery%20detection%20%28CFFD%29%20requires%20detectors%20to%20learn%20emerging%20forgery%20paradigms%20without%20forgetting%20previously%20seen%20manipulations.%20Existing%20CFFD%20methods%20commonly%20rely%20on%20replaying%20a%20small%20amount%20of%20past%20data%20to%20mitigate%20forgetting.%20Such%20replay%20is%20typically%20implemented%20either%20by%20storing%20a%20few%20historical%20samples%20or%20by%20synthesizing%20pseudo-forgeries%20from%20detector-dependent%20perturbations.%20Under%20strict%20memory%20budgets%2C%20the%20former%20cannot%20adequately%20cover%20diverse%20forgery%20cues%20and%20may%20expose%20facial%20identities%2C%20while%20the%20latter%20remains%20strongly%20tied%20to%20past%20decision%20boundaries.%20We%20argue%20that%20the%20core%20role%20of%20replay%20in%20CFFD%20is%20t {"title": "Radar-Camera BEV Multi-Task Learning with Cross-Task Attention Bridge for Joint 3D Detection and Segmentation", "author": "Ahmet \u0130nan\u00e7 and \u00d6zg\u00fcr Erkent", "abstract": "Bird's-eye-view (BEV) representations are the dominant paradigm for 3D perception in autonomous driving, providing a unified spatial canvas where detection and segmentation features are geometrically registered to the same physical coordinate system. However, existing radar-camera fusion methods treat these tasks in isolation, missing the opportunity to share complementary information between them: detection features encode object-level geometry that can sharpen segmentation boundaries, while segmentation features provide dense semantic context that can anchor detection. We propose \\textbf{CTAB} (Cross-Task Attention Bridge), a bidirectional module that exchanges features between detection and segmentation branches via multi-scale deformable attention in shared BEV space. CTAB is integrated into a multi-task framework with an Instance Normalization-based segmentation decoder and learnable BEV upsampling to provide a more detailed BEV representation. On nuScenes, CTAB improves segmentation on 7 classes over the joint multi-task baseline at essentially neutral detection. On a 4-class subset (drivable area, pedestrian crossing, walkway, vehicle), our joint multi-task model reaches comparable mIoU on 4 classes while simultaneously providing 3D detection.", "link": "http://arxiv.org/abs/2604.12918v1", "date": "2026-04-14", "relevancy": 2.3839, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6149}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6071}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "http r%20joint%20multi-task%20model%20reaches%20comparable%20mIoU%20on%204%20classes%20while%20simultaneously%20providing%203D%20detection.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12918v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRadar-Camera%2520BEV%2520Multi-Task%2520Learning%2520with%2520Cross-Task%2520Attention%2520Bridge%2520for%2520Joint%25203D%2520Detection%2520and%2520Segmentation%26entry.906535625%3DAhmet%2520%25C4%25B0nan%25C3%25A7%2520and%2520%25C3%2596zg%25C3%25BCr%2520Erkent%26entry.1292438233%3DBird%2527s-eye-view%2520%2528BEV%2529%2520representations%2520are%2520the%2520dominant%2520paradigm%2520for%25203D%2520perception%2520in%2520autonomous%2520driving%252C%2520providing%2520a%2520unified%2520spatial%2520canvas%2520where%2520detection%2520and%2520segmentation%2520features%2520are%2520geometrically%2520registered%2520to%2520the%2520same%2520physical%2520coordinate%2520system.%2520However%252C%2520existing%2520radar-camera%2520fusion%2520methods%2520treat%2520these%2520tasks%2520in%2520isolation%252C%2520missing%2520the%2520opportunity%2520to%2520share%2520complementary%2520information%2520between%2520them%253A%2520detection%2520features%2520encode%2520object-level%2520geometry%2520that%2520can%2520sharpen%2520segmentation%2520boundaries%252C%2520while%2520segmentation%2520features%2520provide%2520dense%2520semantic%2520context%2520that%2520can%2520anchor%2520detection.%2520We%2520propose%2520%255Ctextbf%257BCTAB%257D%2520%2528Cross-Task%2520Attention%2520Bridge%2529%252C%2520a%2520bidirectional%2520module%2520that%2520exchanges%2520features%2520between%2520detection%2520and%2520segmentation%2520branches%2520via%2520multi-scale%2520deformable%2520attention%2520in%2520shared%2520BEV%2520space.%2520CTAB%2520is%2520integrated%2520into%2520a%2520multi-task%2520framework%2520with%2520an%2520Instance%2520Normalization-based%2520segmentation%2520decoder%2520and%2520learnable%2520BEV%2520upsampling%2520to%2520provide%2520a%2520more%2520detailed%2520BEV%2520representation.%2520On%2520nuScenes%252C%2520CTAB%2520improves%2520segmentation%2520on%25207%2520classes%2520over%2520the%2520joint%2520multi-task%2520baseline%2520at%2520essentially%2520neutral%2520detection.%2520On%2520a%25204-class%2520subset%2520%2528drivable%2520area%252C%2520pedestrian%2520crossing%252C%2520walkway%252C%2520vehicle%2529%252C%2520our%2520joint%2520multi-task%2520model%2520reaches%2520comparable%2520mIoU%2520on%25204%2520classes%2520while%2520simultaneously%2520providing%25203D%2520detection.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.12918v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Radar-Camera%20BEV%20Multi-Task%20Learning%20with%20Cross-Task%20Attention%20Bridge%20for%20Joint%203D%20Detection%20and%20Segmentation&entry.906535625=Ahmet%20%C4%B0nan%C3%A7%20and%20%C3%96zg%C3%BCr%20Erkent&entry.1292438233=Bird%27s-eye-view%20%28BEV%29%20representations%20are%20the%20dominant%20paradigm%20for%203D%20perception%20in%20autonomous%20driving%2C%20providing%20a%20unified%20spatial%20canvas%20where%20detection%20and%20segmentation%20features%20are%20geometrically%20registered%20to%20the%20same%20physical%20coordinate%20system.%20However%2C%20existing%20radar-camera%20fusion%20methods%20treat%20these%20tasks%20in%20isolation%2C%20missing%20the%20opportunity%20to%20share%20complementary%20information%20between%20them%3A%20detection%20features%20encode%20object-level%20geometry%20that%20can%20sharpen%20segmentation%20boundaries%2C%20while%20segmentation%20features%20provide%20dense%20semantic%20context%20that%20can%20anchor%20detection.%20We%20propose%20%5Ctextbf%7BCTAB%7D%20%28Cross-Task%20Attention%20Bridge%29%2C%20a%20bidirectional%20module%20that%20exchanges%20features%20between%20detection%20and%20segmentation%20branches%20via%20multi-scale%20deform {"title": "FastGrasp: Learning-based Whole-body Control method for Fast Dexterous Grasping with Mobile Manipulators", "author": "Heng Tao and Yiming Zhong and Zemin Yang and Yuexin Ma", "abstract": "Fast grasping is critical for mobile robots in logistics, manufacturing, and service applications. Existing methods face fundamental challenges in impact stabilization under high-speed motion, real-time whole-body coordination, and generalization across diverse objects and scenarios, limited by fixed bases, simple grippers, or slow tactile response capabilities. We propose \\textbf{FastGrasp}, a learning-based framework that integrates grasp guidance, whole-body control, and tactile feedback for mobile fast grasping. Our two-stage reinforcement learning strategy first generates diverse grasp candidates via conditional variational autoencoder conditioned on object point clouds, then executes coordinated movements of mobile base, arm, and hand guided by optimal grasp selection. Tactile sensing enables real-time grasp adjustments to handle impact effects and object variations. Extensive experiments demonstrate superior grasping performance in both simulation and real-world scenarios, achieving robust manipulation across diverse object geometries through effective sim-to-real transfer.", "link": "http://arxiv.org/abs/2604.12879v1", "date": "2026-04-14", "relevancy": 2.38, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6594}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.549}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5489}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FastGrasp%3A%20Learning-based%20Whole-body%20Control%20method%20for%20Fast%20Dexterous%20Grasping%20with%20Mobile%20Manipulators&body=Title%3A%20FastGrasp%3A%20Learning-based%20Whole-body%20Control%20method%20for%20Fast%20Dexterous%20Grasping%20with%20Mobile%20Manipulators%0AAuthor%3A%20Heng%20Tao%20and%20Yiming%20Zhong%20and%20Zemin%20Yang%20and%20Yuexin%20Ma%0AAbstract%3A%20Fast%20grasping%20is%20critical%20for%20mobile%20robots%20in%20logistics%2C%20manufacturing%2C%20and%20service%20applications.%20Existing%20methods%20face%20fundamental%20challenges%20in%20impact%20stabilization%20under%20high-speed%20motion%2C%20real-time%20whole-body%20coordination%2C%20and%20generalization%20across%20diverse%20objects%20and%20scenarios%2C%20limited%20by%20fixed%20bases%2C%20simple%20grippers%2C%20or%20slow%20tactile%20response%20capabilities.%20We%20propose%20%5Ctextbf%7BFastGrasp%7D%2C%20a%20learning-based%20framework%20that%20integrates%20grasp%20guidance%2C%20whole-body%20control%2C%20and%20tactile%20feedback%20for%20mobile%20fast%20grasping.%20Our%20two-stage%20reinforcement%20learning%20strategy%20first%20generates%20diverse%20grasp%20candidates%20via%20conditional%20variational%20autoencoder%20conditioned%20on%20object%20point%20clouds%2C%20then%20executes%20coordinated%20movements%20of%20mobile%20base%2C%20arm%2C%20and%20hand%20guided%20by%20optimal%20grasp%20selection.%20Tactile%20sensing%20enables%20real-time%20grasp%20adjustments%20to%20handle%20impact%20effects%20and%20object%20variations.%20Extensive%20experiments%20demonstrate%20superior%20grasping%20performance%20in%20both%20simulation%20and%20real-world%20scenarios%2C%20achieving%20robust%20manipulation%20across%20diverse%20object%20geometries%20through%20effective%20sim-to-real%20transfer.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12879v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFastGrasp%253A%2520Learning-based%2520Whole-body%2520Control%2520method%2520for%2520Fast%2520Dexterous%2520 orms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=FastGrasp%3A%20Learning-based%20Whole-body%20Control%20method%20for%20Fast%20Dexterous%20Grasping%20with%20Mobile%20Manipulators&entry.906535625=Heng%20Tao%20and%20Yiming%20Zhong%20and%20Zemin%20Yang%20and%20Yuexin%20Ma&entry.1292438233=Fast%20grasping%20is%20critical%20for%20mobile%20robots%20in%20logistics%2C%20manufacturing%2C%20and%20service%20applications.%20Existing%20methods%20face%20fundamental%20challenges%20in%20impact%20stabilization%20under%20high-speed%20motion%2C%20real-time%20whole-body%20coordination%2C%20and%20generalization%20across%20diverse%20objects%20and%20scenarios%2C%20limited%20by%20fixed%20bases%2C%20simple%20grippers%2C%20or%20slow%20tactile%20response%20capabilities.%20We%20propose%20%5Ctextbf%7BFastGrasp%7D%2C%20a%20learning-based%20framework%20that%20integrates%20grasp%20guidance%2C%20whole-body%20control%2C%20and%20tactile%20feedback%20for%20mobile%20fast%20grasping.%20Our%20two-stage%20reinforcement%20learning%20strategy%20first%20generates%20diverse%20grasp%20candidates%20via%20conditional%20variational%20autoencoder%20conditioned%20on%20object%20point%20clouds%2C%20then%20executes%20coordinated%20movements%20of%20mobile%20base%2C%20arm%2C%20and%20hand%20guided%20by%20optimal%20grasp%20selection.%20Tactile%20sensing%20enables%20real-time%20grasp%20adjustments%20to%20handle%20impact%20effects%20and%20object%20variations.%20Extensive%20experiments%20demonstrate%20superior%20grasping%20performance%20in%20both%20simulation%20and%20real-world%20scenarios%2C%20achieving%20robust%20manipulation%20across%20diverse%20object%20geometries%20through%20effective%20sim-to-real%20transfer.&entry.1838667208=http%3A//arxiv.org/abs/2604.12879v1&entry.124074799=Read"},
{"title": "Don't Show Pixels, Show Cues: Unlocking Visual Tool Reasoning in Language Models via Perception Programs", "author": "Muhammad Kamran Janjua and Hugo Silva and Di Niu and Bahador Rashidi", "abstract": "Multimodal language models (MLLMs) are increasingly paired with vision tools (e.g., depth, flow, correspondence) to enhance visual reasoning. However, despite access to these tool-generated visual cues, MLLMs often fail to benefit from them. Existing approaches typically feed raw tool outputs into the model, but these dense, pixel-level representations are misaligned with the language-native reasoning strengths of LLMs, leading to weak perception and reliance on language priors. We argue that, in problems where vision tools can provide the necessary visual cues, the bottleneck is not more tool calls or larger MLLMs, it is how tool outputs are represented. We introduce Perception Programs (P$^2$), a training-free, model-agnostic method that rewrites tool outputs into compact, structured, language-native summaries that MLLMs can directly parse and reason over. Across six perception-centric tasks in BLINK, P$^2$ consistently yields large improvements over base models and raw tool-augmented baselines. With GPT-5 Mini as the base model, P$^2$ raises its accuracy from 41.35\\% to 86.47\\% on multi-view reasoning, from 52.42\\% to 81.45\\% on relative depth, and achieves a 22\\% average gain across tasks, setting new state-of-the-art results. Even on smaller MLLMs, e.g., InternVL3.5-4B and Qwen3VL-4B, we observe 15-40\\% absolute gains from P$^2$, surpassing prior agentic, supervised, and RL-based tool-use methods-without any training or model modifications.", "link": "http://arxiv.org/abs/2604.12896v1", "date": "2026-04-14", "relevancy": 2.3667, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5971}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5971}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5643}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Don%27t%20Show%20Pixels%2C%20Show%20Cues%3A%20Unlocking%20Visual%20Tool%20Reasoning%20in%20Language%20Models%20via%20Perception%20Programs&body=Title%3A%20Don%27t%20Show%20Pixels%2C%20Show%20Cues%3A%20Unlocking%20Visual%20Tool%20Reasoning%20in%20Language%20Models%20via%20Perception%20Programs%0AAuthor%3A%20Muhammad%20Kamran%20Janjua%20and%20Hugo%20Silva%20and%20Di%20Niu%20and%20Bahador%20Rashidi%0AAbstract%3A%20Multimodal%20language%20models%20%28MLLMs%29%20are%20increasingly%20paired%20with%20vision%20tools%20%28e.g.%2C%20depth%2C%20flow%2C%20correspondence%29%20to%20enhance%20visual%20reasoning.%20However%2C%20despite%20access%20to%20these%20tool-generated%20visual%20cues%2C%20MLLMs%20often%20fail%20to%20benefit%20from%20them.%20Existing%20approaches%20typically%20feed%20raw%20tool%20outputs%20into%20the%20model%2C%20but%20these%20dense%2C%20pixel-level%20representations%20are%20misaligned%20with%20the%20language-native%20reasoning%20strengths%20of%20LLMs%2C%20leading%20to%20weak%20perception%20and%20reliance%20on%20language%20priors.%20We%20argue%20that%2C%20in%20problems%20where%20vision%20tools%20can%20provide%20the%20necessary%20visual%20cues%2C%20the%20bottleneck%20is%20not%20more%20tool%20calls%20or%20larger%20MLLMs%2C%20it%20is%20how%20tool%20outputs%20are%20represented.%20We%20introduce%20Perception%20Programs%20%28P%24%5E2%24%29%2C%20a%20training-free%2C%20model-agnostic%20method%20that%20rewrites%20tool%20outputs%20into%20compact%2C%20structured%2C%20language-native%20summaries%20that%20MLLMs%20can%20directly%20parse%20and%20reason%20over.%20Across%20six%20perception-centric%20tasks%20in%20BLINK%2C%20P%24%5E2%24%20consistently%20yields%20large%20improvements%20over%20base%20models%20and%20raw%20tool-augmented%20baselines.%20With%20GPT-5%20Mini%20as%20the%20base%20model%2C%20P%24%5E2%24%20raises%20its%20accuracy%20from%2041.35%5C%25%20to%2086.47%5C%25%20on%20multi-view%20reasoning%2C%20from%2052.42%5C%25%20to%2081.45%5C%25%20on%20relative%20depth%2C%20and%20achieves%20a%2022%5C%25%20average%20gain%20across%20tasks%2C%20setting%20new%20state-of-the-art%20results.%20Even%20on%20smaller%20MLLMs%2C%20e.g.%2C%20InternVL3.5-4B%20and%20Qwen3VL-4B%2C%20we%20observe%2015-40%5C%25%20absolute%20gains%20from%20P%24%5E2%24%2C%20surpassing%20prior%20agentic%2C%20supervised%2C%20and%20RL-based%20tool-use%20methods-without%20any%20training%20or%20model%20modifications.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12896v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDon%2527t%2520Show%2520Pixels%252C%2520Show%2520Cues%253A%2520Unlocking%2520Visual%2520Tool%2520Reasoning%2520in%2520Language%2520Models%2520via%2520Perception%2520Programs%26entry.906535625%3DMuhammad%2520Kamran%2520Janjua%2520and%2520Hugo%2520Silva%2520and%2520Di%2520Niu%2520and%2520Bahador%2520Rashidi%26entry.1292438233%3DMultimodal%2520language%2520models%2520%2528MLLMs%2529%2520are%2520increasingly%2520paired%2520with%2520vision%2520tools%2520%2528e.g.%252C%2520depth%252C%2520flow%252C%2520correspondence%2529%2520to%2520enhance%2520visual%2520reasoning.%2520However%252C%2520despite%2520access%2520to%2520these%2520tool-generated%2520visual%2520cues%252C%2520MLLMs%2520often%2520fail%2520to%2520benefit%2520from%2520them.%2520Existing%2520approaches%2520typically%2520feed%2520raw%2520tool%2520outputs%2520into%2520the%2520model%252C%2520but%2520these%2520dense%252C%2520pixel-level%2520representations%2520are%2520misaligned%2520with%2520the%2520language-native%2520reasoning%2520strengths%2520of%2520LLMs%252C%2520leading%252 {"title": "One View Is Enough! Monocular Training for In-the-Wild Novel View Generation", "author": "Adrien Ramanana Rahary and Nicolas Dufour and Patrick Perez and David Picard", "abstract": "Monocular novel-view synthesis has long required multi-view image pairs for supervision, limiting training data scale and diversity. We argue it is not necessary: one view is enough. We present OVIE, trained entirely on unpaired internet images. We leverage a monocular depth estimator as a geometric scaffold at training time: we lift a source image into 3D, apply a sampled camera transformation, and project to obtain a pseudo-target view. To handle disocclusions, we introduce a masked training formulation that restricts geometric, perceptual, and textural losses to valid regions, enabling training on 30 million uncurated images. At inference, OVIE is geometry-free, requiring no depth estimator or 3D representation. Trained exclusively on in-the-wild images, OVIE outperforms prior methods in a zero-shot setting, while being 600x faster than the second-best baseline. Code and models are publicly available at https://github.com/AdrienRR/ovie.", "link": "http://arxiv.org/abs/2603.23488v2", "date": "2026-04-14", "relevancy": 2.3625, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5933}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5933}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5773}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20One%20View%20Is%20Enough%21%20Monocular%20Training%20for%20In-the-Wild%20Novel%20View%20Generation&body=Title%3A%20One%20View%20Is%20Enough%21%20Monocular%20Training%20for%20In-the-Wild%20Novel%20View%20Generation%0AAuthor%3A%20Adrien%20Ramanana%20Rahary%20and%20Nicolas%20Dufour%20and%20Patrick%20Perez%20and%20David%20Picard%0AAbstract%3A%20Monocular%20novel-view%20synthesis%20has%20long%20required%20multi-view%20image%20pairs%20for%20supervision%2C%20limiting%20training%20data%20scale%20and%20diversity.%20We%20argue%20it%20is%20not%20necessary%3A%20one%20view%20is%20enough.%20We%20present%20OVIE%2C%20trained%20entirely%20on%20unpaired%20internet%20images.%20We%20leverage%20a%20monocular%20depth%20estimator%20as%20a%20geometric%20scaffold%20at%20training%20time%3A%20we%20lift%20a%20source%20image%20into%203D%2C%20apply%20a%20sampled%20camera%20transformation%2C%20and%20project%20to%20obtain%20a%20pseudo-target%20view.%20To%20handle%20disocclusions%2C%20we%20introduce%20a%20masked%20training%20formulation%20that%20restricts%20geometric%2C%20perceptual%2C%20and%20textural%20losses%20to%20valid%20regions%2C%20enabling%20training%20on%2030%20million%20uncurated%20images.%20At%20inference%2C%20OVIE%20is%20geometry-free%2C%20requiring%20no%20depth%20estimator%20or%203D%20representation.%20Trained%20exclusively%20on%20in-the-wild%20images%2C%20OVIE%20outperforms%20prior%20methods%20in%20a%20zero-shot%20setting%2C%20while%20being%20600x%20faster%20than%20the%20second-best%20baseline.%20Code%20and%20models%20are%20publicly%20available%20at%20https%3A//github.com/AdrienRR/ovie.%0ALink%3A%20http%3A//arxiv.org/abs/2603.23488v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOne%2520View%2520Is%2520Enough%2521%2520Monocular%2520Training%2520for%2520In-the-Wild%2520Novel%2520View%2520Generation%26entry.906535625%3DAdrien%2520Ramanana%2520Rahary%2520and%2520Nicolas%2520Dufour%2520and%2520Patrick%2520Perez%2520and%2520David%2520Picard%26entry.1292438233%3DMonocular%2520novel-view%2520synthesis%2520has%2520long%2520required%2520multi-view%2520image%2520pairs%2520for%2520supervision%252C%2520limiting%2520training%2520data%2520scale%2520an {"title": "Round-Trip Translation Reveals What Frontier Multilingual Benchmarks Miss", "author": "Ronald Skorobogat and Ameya Prabhu and Matthias Bethge", "abstract": "Multilingual benchmarks guide the development of frontier models. Yet multilingual evaluations reported by frontier models are structured similar to popular reasoning and knowledge benchmarks, but across many languages. We show such benchmarks, and consequently multilingual evaluations, measure mathematical reasoning and factual recall, not multilingual proficiency. For example, thinking variants dramatically outperform instruct variants on these benchmarks, yet often perform worse on real-world multilingual tasks, such as LMArena. We propose a simple alternative: evaluate multilingual capability via round-trip translation. Given text in a source language, translate it to a target language and back; semantic gaps between the original and result expose failures in multilingual generation capabilities. Round-trip translation correlates almost perfectly (\\r{ho} = 0.94) with user ratings on LMArena with our benchmark, requires no human reference translations, and does not require a more capable multilingual judge than tested models. Lastly, we introduce Lost in Translation (LiT), a challenging round-trip translation benchmark spanning widely spoken languages worldwide, for realistic evaluation of multilingual frontier models.", "link": "http://arxiv.org/abs/2604.12911v1", "date": "2026-04-14", "relevancy": 2.3514, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4934}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4934}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.424}], "mailto": "mailto: n%2520tested%2520models.%2520Lastly%252C%2520we%2520introduce%2520Lost%2520in%2520Translation%2520%2528LiT%2529%252C%2520a%2520challenging%2520round-trip%2520translation%2520benchmark%2520spanning%2520widely%2520spoken%2520languages%2520worldwide%252C%2520for%2520realistic%2520evaluation%2520of%2520multilingual%2520frontier%2520models.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.12911v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Round-Trip%20Translation%20Reveals%20What%20Frontier%20Multilingual%20Benchmarks%20Miss&entry.906535625=Ronald%20Skorobogat%20and%20Ameya%20Prabhu%20and%20Matthias%20Bethge&entry.1292438233=Multilingual%20benchmarks%20guide%20the%20development%20of%20frontier%20models.%20Yet%20multilingual%20evaluations%20reported%20by%20frontier%20models%20are%20structured%20similar%20to%20popular%20reasoning%20and%20knowledge%20benchmarks%2C%20but%20across%20many%20languages.%20We%20show%20such%20benchmarks%2C%20and%20consequently%20multilingual%20evaluations%2C%20measure%20mathematical%20reasoning%20and%20factual%20recall%2C%20not%20multilingual%20proficiency.%20For%20example%2C%20thinking%20variants%20dramatically%20outperform%20instruct%20variants%20on%20these%20benchmarks%2C%20yet%20often%20perform%20worse%20on%20real-world%20multilingual%20tasks%2C%20such%20as%20LMArena.%20We%20propose%20a%20simple%20alternative%3A%20evaluate%20multilingual%20capability%20via%20round-trip%20translation.%20Given%20text%20in%20a%20source%20language%2C%20translate%20it%20to%20a%20target%20language%20and%20back%3B%20semantic%20gaps%20between%20the%20original%20and%20result%20expose%20failures%20in%20multilingual%20generation%20capabilities.%20Round-trip%20translation%20correlates%20almost%20perfectly%20%28%5Cr%7Bho%7D%20%3D%200.94%29%20with%20user%20ratings%20on%20LMArena%20with%20our%20benchmark%2C%20requires%20no%20human%20reference%20translations%2C%20and%20does%20not%20require%20a%20more%20capable%20multilingual%20judge%20than%20tested%20models.%20Lastly%2C%20we%20introduce%20Lost%20in%20Translation%20%28LiT%29%2C%20a%20challenging%20round-trip%20translation%20benchmark%20spanning%20widely%20spoken%20languages%20worldwide%2C%20for%20realistic%20evaluation%20of%20multilingual%20frontier%20models.&entry.1838667208=http%3A//arxiv.org/abs/2604.12911v1&entry.124074799=Read"},
{"title": "Towards Long-horizon Agentic Multimodal Search", "author": "Yifan Du and Zikang Liu and Jinbiao Peng and Jie Wu and Junyi Li and Jinyang Li and Wayne Xin Zhao and Ji-Rong Wen", "abstract": "Multimodal deep search agents have shown great potential in solving complex tasks by iteratively collecting textual and visual evidence. However, managing the heterogeneous information and high token costs associated with multimodal inputs over long horizons remains a critical challenge, as existing methods often suffer from context explosion or the loss of crucial visual signals. To address this, we propose a novel Long-horizon MultiModal deep search framework, named LMM-Searcher, centered on a file-based visual representation mechanism. By offloading visual assets to an external file system and mapping them to lightweight textual identifiers (UIDs), our approach mitigates context overhead while preserving multimodal information for future access. We equip the agent with a tailored fetch-image tool, enabling a progressive, on-demand visual loading strategy for active perception. Furthermore, we introduce a data synthesis pipeline designed to generate queries requiring complex cross-modal multi-hop reasoning. Using this pipeline, we distill 12K high-quality trajectories to fine-tune Qwen3-VL-Thinking-30A3B into a specialized multimodal deep search agent. Extensive experiments across four benchmarks demonstrate that our method successfully scales to 100-turn search horizons, achieving state-of-the-art performance among open-source models on challenging long-horizon benchmarks like MM-BrowseComp and MMSearch-Plus, while also exhibiting strong generalizability across different base models. Our code will be released in https://github.com/RUCAIBox/LMM-Searcher.", "link": "http://arxiv.org/abs/2604.12890v1", "date": "2026-04-14", "relevancy": 2.3483, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.588}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.588}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5824}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Long-horizon%20Agentic%20Multimodal%20Search&body=Title%3A%20Towards%20Long-horizon%20Agentic%20Multimodal%20Search%0AAuthor%3A%20Yifan%20Du%20and%20Zikang%20Liu%20and%20Jinbiao%20Peng%20and%20Jie%20Wu%20and%20Junyi%20Li%20and%20Jinyang%20Li%20and%20Wayne%20Xin%20Zhao%20and%20Ji-Rong%20Wen%0AAbstract%3A%20Multimodal%20deep%20search%20agents%20have%20shown%20great%20potential%20in%20solving%20complex%20tasks%20by%20iteratively%20collecting%20textual%20and%20visual%20evidence.%20However%2C%20managing%20the%20heterogeneous%20information%20and%20high%20token%20costs%20associated%20with%20multimodal%20inputs%20over%20long%20horizons%20remains%20a%20critical%20challenge%2C%20as%20existing%20methods%20often%20suffer%20from%20context%20explosion%20or%20the%20loss%20of%20crucial%20visual%20signals.%20To%20address%20this%2C%20we%20propose%20a%20novel%20Long-horizon%20MultiModal%20deep%20search%20framework%2C%20named%20LMM-Searcher%2C%20centered%20on%20a%20file-based%20visual%20representation%20mechanism.%20By%20offloading%20visual%20assets%20to%20an%20external%20file%20system%20and%20mapping%20them%20to%20lightweight%20textual%20identifiers%20%28UIDs%29%2C%20our%20approach%20mitigates%20context%20overhead%20while%20preserving%20multimodal%20information%20for%20future%20access.%20We%20equip%20the%20agent%20with%20a%20tailored%20fetch-image%20tool%2C%20enabling%20a%20progressive%2C%20on-demand%20visual%20loading%20strategy%20for%20active%20perception.%20Furthermore%2C%20we%20introduce%20a%20data%20synthesis%20pipeline%20designed%20to%20generate%20queries%20requiring%20complex%20cross-modal%20multi-hop%20reasoning.%20Using%20this%20pipeline%2C%20we%20distill%2012K%20high-quality%20trajectories%20to%20fine-tune%20Qwen3-VL-Thinking-30A3B%20into%20a%20specialized%20multimodal%20deep%20search%20agent.%20Extensive%20experiments%20across%20four%20benchmarks%20demonstrate%20that%20our%20method%20successfully%20scales%20to%20100-turn%20search%20horizons%2C%20achieving%20state-of-the-art%20performance%20among%20open-source%20models%20on%20challenging%20long-horizon%20benchmarks%20like%20MM-BrowseComp%20and%20MMSearch-Plus%2C%20while%20also%20exhibiting%20strong%20generalizability%20across%20different%20base%20models.%20Our%20code%20will%20be%20released%20in%20https%3A//github.com/RUCAIBox/LMM-Searcher.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12890v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520Long-horizon%2520Agentic%2520Multimodal%2520Search%26entry.906535625%3DYifan%2520Du%2520and%2520Zikang%2520Liu%2520and%2520Jinbiao%2520Peng%2520and%2520Jie%2520Wu%2520and%2520Junyi%2520Li%2520and%2520Jinyang%2520Li%2520and%2520Wayne%2520Xin%2520Zhao%2520and%2520Ji-Rong%2520Wen%26entry.1292438233%3DMultimodal%2520deep%2520search%2520agents%2520have%2520shown%2520great%2520potential%2520in%2520solving%2520complex%2520tasks%2520by%2520iteratively%2520collecting%2520textual%2520and%2520visual%2520evidence.%2520However%252C%2520managing%2520the%2520heterogeneous%2520information%2520and%2520high%2520token%2520costs%2520associated%2520with%2520multimodal%2520inputs%2520over%2520long%2520horizons%2520remains%2520a%2520critical%2520challenge%252C%2520as%2520existing%2520methods%2520often%2520suffer%2520from%2520context%2520explosion%2520or%2520the%2520loss%2520of%2520crucial%2520visual%2520signals.%2520To%2520address%2520this%252C%2520we%2520propose%2520a%2520novel%2520Long-horizon%2520MultiModal%2520d {"title": "Are Video Reasoning Models Ready to Go Outside?", "author": "Yangfan He and Changgyu Boo and Jaehong Yoon", "abstract": "In real-world deployment, vision-language models often encounter disturbances such as weather, occlusion, and camera motion. Under such conditions, their understanding and reasoning degrade substantially, revealing a gap between clean, controlled (i.e., unperturbed) evaluation settings and real-world robustness. To address this limitation, we propose ROVA, a novel training framework that improves robustness by modeling a robustness-aware consistency reward under spatio-temporal corruptions. ROVA introduces a difficulty-aware online training strategy that prioritizes informative samples based on the model's evolving capability. Specifically, it continuously re-estimates sample difficulty via self-reflective evaluation, enabling adaptive training with a robustness-aware consistency reward. We also introduce PVRBench, a new benchmark that injects real-world perturbations into embodied video datasets to assess both accuracy and reasoning quality under realistic disturbances. We evaluate ROVA and baselines on PVRBench, UrbanVideo, and VisBench, where open-source and proprietary models suffer up to 35% and 28% drops in accuracy and reasoning under realistic perturbations. ROVA effectively mitigates performance degradation, boosting relative accuracy by at least 24% and reasoning by over 9% compared with baseline models (QWen2.5/3-VL, InternVL2.5, Embodied-R). These gains transfer to clean standard benchmarks, yielding consistent improvements.", "link": "http://arxiv.org/abs/2603.10652v2", "date": "2026-04-14", "relevancy": 2.33, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5833}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "simila {"title": "From edges to meaning: Semantic line sketches as a cognitive scaffold for ancient pictograph invention", "author": "Seowung Leem and Lin Gu and Ruogu Fang", "abstract": "Humans readily recognize objects from sparse line drawings, a capacity that appears early in development and persists across cultures, suggesting neural rather than purely learned origins. Yet the computational mechanism by which the brain transforms high-level semantic knowledge into low-level visual symbols remains poorly understood. Here we propose that ancient pictographic writing emerged from the brain's intrinsic tendency to compress visual input into stable, boundary-based abstractions. We construct a biologically inspired digital twin of the visual hierarchy that encodes an image into low-level features, generates a contour sketch, and iteratively refines it through top-down feedback guided by semantic representations, mirroring the feedforward and recurrent architecture of the human visual cortex. The resulting symbols bear striking structural resemblance to early pictographs across culturally distant writing systems, including Egyptian hieroglyphs, Chinese oracle bone characters, and proto-cuneiform, and offer candidate interpretations for undeciphered scripts. Our findings support a neuro-computational origin of pictographic writing and establish a framework in which AI can recapitulate the cognitive processes by which humans first externalized perception into symbols.", "link": "http://arxiv.org/abs/2604.12865v1", "date": "2026-04-14", "relevancy": 2.3295, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4696}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4696}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http: {"title": "Hybrid-AIRL: Enhancing Inverse Reinforcement Learning with Supervised Expert Guidance", "author": "Bram Silue and Santiago Amaya-Corredor and Patrick Mannion and Lander Willem and Pieter Libin", "abstract": "Adversarial Inverse Reinforcement Learning (AIRL) has shown promise in addressing the sparse reward problem in reinforcement learning (RL) by inferring dense reward functions from expert demonstrations. However, its performance in highly complex, imperfect-information settings remains largely unexplored. To explore this gap, we evaluate AIRL in the context of Heads-Up Limit Hold'em (HULHE) poker, a domain characterized by sparse, delayed rewards and significant uncertainty. In this setting, we find that AIRL struggles to infer a sufficiently informative reward function. To overcome this limitation, we contribute Hybrid-AIRL (H-AIRL), an extension that enhances reward inference and policy learning by incorporating a supervised loss derived from expert data and a stochastic regularization mechanism. We evaluate H-AIRL on a carefully selected set of Gymnasium benchmarks and the HULHE poker setting. Additionally, we analyze the learned reward function through visualization to gain deeper insights into the learning process. Our experimental results show that H-AIRL achieves higher sample efficiency and more stable learning compared to AIRL. This highlights the benefits of incorporating supervised signals into inverse RL and establishes H-AIRL as a promising framework for tackling challenging, real-world settings.", "link": "http://arxiv.org/abs/2511.21356v2", "date": "2026-04-14", "relevancy": 2.3254, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4716}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4676}, {"title": "Boosted dynamic neural networks", " {"title": "Cognition-Inspired Dual-Stream Semantic Enhancement for Vision-Based Dynamic Emotion Modeling", "author": "Huanzhen Wang and Ziheng Zhou and Zeng Tao and Aoxing Li and Yingkai Zhao and Yuxuan Lin and Yan Wang and Wenqiang Zhang", "abstract": "The human brain constructs emotional percepts not by processing facial expressions in isolation, but through a dynamic, hierarchical integration of sensory input with semantic and contextual knowledge. However, existing vision-based dynamic emotion modeling approaches often neglect emotion perception and cognitive theories. To bridge this gap between machine and human emotion perception, we propose cognition-inspired Dual-stream Semantic Enhancement (DuSE). Our model instantiates a dual-stream cognitive architecture. The first stream, a Hierarchical Temporal Prompt Cluster (HTPC), operationalizes the cognitive priming effect. It simulates how linguistic cues pre-sensitize neural pathways, modulating the processing of incoming visual stimuli by aligning textual semantics with fine-grained temporal features of facial dynamics. The second stream, a Latent Semantic Emotion Aggregator (LSEA), computationally models the knowledge integration process, akin to the mechanism described by the Conceptual Act Theory. It aggregates sensory inputs and synthesizes them with learned conceptual knowledge, reflecting the role of the hippocampus and default mode network in constructing a coherent emotional experience. By explicitly modeling these neuro-cognitive mechanisms, DuSE provides a more neurally plausible and robust framework for dynamic facial expression recognition (DFER). Extensive experiments on challenging in-the-wild benchmarks validate our cognition-centric approach, demonstrating that emulating the brain's strategies for emotion processing yields state-of-the-art performance and enhances model interpretability.", "link": "http://arxiv.org/abs/2604.12777v1", "date": "2026-04-14", "relevancy": 2.318, "topK": [{"title": "L features%20of%20facial%20dynamics.%20The%20second%20stream%2C%20a%20Latent%20Semantic%20Emotion%20Aggregator%20%28LSEA%29%2C%20computationally%20models%20the%20knowledge%20integration%20process%2C%20akin%20to%20the%20mechanism%20described%20by%20the%20Conceptual%20Act%20Theory.%20It%20aggregates%20sensory%20inputs%20and%20synthesizes%20them%20with%20learned%20conceptual%20knowledge%2C%20reflecting%20the%20role%20of%20the%20hippocampus%20and%20default%20mode%20network%20in%20constructing%20a%20coherent%20emotional%20experience.%20By%20explicitly%20modeling%20these%20neuro-cognitive%20mechanisms%2C%20DuSE%20provides%20a%20more%20neurally%20plausible%20and%20robust%20framework%20for%20dynamic%20facial%20expression%20recognition%20%28DFER%29.%20Extensive%20experiments%20on%20challenging%20in-the-wild%20benchmarks%20validate%20our%20cognition-centric%20approach%2C%20demonstrating%20that%20emulating%20the%20brain%27s%20strategies%20for%20emotion%20processing%20yields%20state-of-the-art%20performance%20and%20enhances%20model%20interpretability.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12777v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCognition-Inspired%2520Dual-Stream%2520Semantic%2520Enhancement%2520for%2520Vision-Based%2520Dynamic%2520Emotion%2520Modeling%26entry.906535625%3DHuanzhen%2520Wang%2520and%2520Ziheng%2520Zhou%2520and%2520Zeng%2520Tao%2520and%2520Aoxing%2520Li%2520and%2520Yingkai%2520Zhao%2520and%2520Yuxuan%2520Lin%2520and%2520Yan%2520Wang%2520and%2520Wenqiang%2520Zhang%26entry.1292438233%3DThe%2520human%2520brain%2520constructs%2520emotional%2520percepts%2520not%2520by%2520processing%2520facial%2520expressions%2520in%2520isolation%252C%2520but%2520through%2520a%2520dynamic%252C%2520hierarchical%2520integration%2520of%2520sensory%2520input%2520with%2520semantic%2520and%2520contextual%2520knowledge.%2520However%252C%2520existing%2520vision-based%2520dynamic%2520emotion%25 {"title": "ReXSonoVQA: A Video QA Benchmark for Procedure-Centric Ultrasound Understanding", "author": "Xucheng Wang and Xiaoman Zhang and Sung Eun Kim and Ankit Pal and Pranav Rajpurkar", "abstract": "Ultrasound acquisition requires skilled probe manipulation and real-time adjustments. Vision-language models (VLMs) could enable autonomous ultrasound systems, but existing benchmarks evaluate only static images, not dynamic procedural understanding. We introduce ReXSonoVQA, a video QA benchmark with 514 video clips and 514 questions (249 MCQ, 265 free-response) targeting three competencies: Action-Goal Reasoning, Artifact Resolution & Optimization, and Procedure Context & Planning. Zero-shot evaluation of Gemini 3 Pro, Qwen3.5-397B, LLaVA-Video-72B, and Seed 2.0 Pro shows VLMs can extract some procedural information, but troubleshooting questions remain challenging with minimal gains over text-only baselines, exposing limitations in causal reasoning. ReXSonoVQA enables developing perception systems for ultrasound training, guidance, and robotic automation.", "link": "http://arxiv.org/abs/2604.10916v2", "date": "2026-04-14", "relevancy": 2.3172, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5987}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5987}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4821}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ReXSonoVQA%3A%20A%20Video%20QA%20Benchmark%20for%20Procedure-Centric%20Ultrasound%20Understanding&body=Title%3A%20ReXSonoVQA%3A%20A%20Video%20QA%20Benchmark%20for%20Procedure-Centric%20Ultrasound%20Understanding%0AAuthor%3A%20Xucheng%20Wang%20and%20Xiaoman%

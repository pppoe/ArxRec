{"title": "MedGS: Gaussian Splatting for Multi-Modal 3D Medical Imaging", "author": "Kacper Marzol and Ignacy Kolton and Weronika Smolak-Dy\u017cewska and Joanna Kaleta and \u017baneta \u015awiderska-Chadaj and Marcin Mazur and Miros\u0142aw Dziekiewicz and Tomasz Markiewicz and Przemys\u0142aw Spurek", "abstract": "Endoluminal endoscopic procedures are essential for diagnosing colorectal cancer and other severe conditions in the digestive tract, urogenital system, and airways. 3D reconstruction and novel-view synthesis from endoscopic images are promising tools for enhancing diagnosis. Moreover, integrating physiological deformations and interaction with the endoscope enables the development of simulation tools from real video data. However, constrained camera trajectories and view-dependent lighting create artifacts, leading to inaccurate or overfitted reconstructions. We present MedGS, a novel 3D reconstruction framework leveraging the unique property of endoscopic imaging, where a single light source is closely aligned with the camera. Our method separates light effects from tissue properties. MedGS enhances 3D Gaussian Splatting with a physically based relightable model. We boost the traditional light transport formulation with a specialized MLP capturing complex light-related effects while ensuring reduced artifacts and better generalization across novel views. MedGS achieves superior reconstruction quality compared to baseline methods on both public and in-house datasets. Unlike existing approaches, MedGS enables tissue modifications while preserving a physically accurate response to light, making it closer to real-world clinical use. Repository: https://github.com/gmum/MedGS", "link": "http://arxiv.org/abs/2509.16806v4", "date": "2026-04-14", "relevancy": 3.4462, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.7126}, {"title": "RTG-SLAM: {"title": "Grasp in Gaussians: Fast Monocular Reconstruction of Dynamic Hand-Object Interactions", "author": "Ayce Idil Aytekin and Xu Chen and Zhengyang Shen and Thabo Beeler and Helge Rhodin and Rishabh Dabral and Christian Theobalt", "abstract": "We present Grasp in Gaussians (GraG), a fast and robust method for reconstructing dynamic 3D hand-object interactions from a single monocular video. Unlike recent approaches that optimize heavy neural representations, our method focuses on tracking the hand and the object efficiently, once initialized from pretrained large models. Our key insight is that accurate and temporally stable hand-object motion can be recovered using a compact Sum-of-Gaussians (SoG) representation, revived from classical tracking literature and integrated with generative Gaussian-based initializations. We initialize object pose and geometry using a video-adapted SAM3D pipeline, then convert the resulting dense Gaussian representation into a lightweight SoG via subsampling. This compact representation enables efficient and fast tracking while preserving geometric fidelity. For the hand, we adopt a complementary strategy: starting from off-the-shelf monocular hand pose initialization, we refine hand motion using simple yet effective 2D joint and depth alignment losses, avoiding per-frame refinement of a detailed 3D hand appearance model while maintaining stable articulation. Extensive experiments on public benchmarks demonstrate that GraG reconstructs temporally coherent hand-object interactions on long sequences 6.4x faster than prior work while improving object reconstruction by 13.4% and reducing hand's per-joint position error by over 65%.", "link": "http://arxiv.org/abs/2604.12929v1", "date": "2026-04-14", "relevancy": 3.3665, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.7227}, {"title": "RTG-SLAM: Real-time 3D Reconstruction {"title": "ELoG-GS: Dual-Branch Gaussian Splatting with Luminance-Guided Enhancement for Extreme Low-light 3D Reconstruction", "author": "Yuhao Liu and Dingju Wang and Ziyang Zheng", "abstract": "This paper presents our approach to the NTIRE 2026 3D Restoration and Reconstruction Challenge (Track 1), which focuses on reconstructing high-quality 3D representations from degraded multi-view inputs. The challenge involves recovering geometrically consistent and photorealistic 3D scenes in extreme low-light environments. To address this task, we propose Extreme Low-light Optimized Gaussian Splatting (ELoG-GS), a robust low-light 3D reconstruction pipeline that integrates learning-based point cloud initialization and luminance-guided color enhancement for stable and photorealistic Gaussian Splatting. Our method incorporates both geometry-aware initialization and photometric adaptation strategies to improve reconstruction fidelity under challenging conditions. Extensive experiments on the NTIRE Track 1 benchmark demonstrate that our approach significantly improves reconstruction quality over the baselines, achieving superior visual fidelity and geometric consistency. The proposed method provides a practical solution for robust 3D reconstruction in real-world degraded scenarios. In the final testing phase, our method achieved a PSNR of 18.6626 and an SSIM of 0.6855 on the official platform leaderboard. Code is available at https://github.com/lyh120/FSGS_EAPGS.", "link": "http://arxiv.org/abs/2604.12592v1", "date": "2026-04-14", "relevancy": 3.3354, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.7213}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.651}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "ht {"title": "PDF-GS: Progressive Distractor Filtering for Robust 3D Gaussian Splatting", "author": "Kangmin Seo and MinKyu Lee and Tae-Young Kim and ByeongCheol Lee and JoonSeoung An and Jae-Pil Heo", "abstract": "Recent advances in 3D Gaussian Splatting (3DGS) have enabled impressive real-time photorealistic rendering. However, conventional training pipelines inherently assume full multi-view consistency among input images, which makes them sensitive to distractors that violate this assumption and cause visual artifacts. In this work, we revisit an underexplored aspect of 3DGS: its inherent ability to suppress inconsistent signals. Building on this insight, we propose PDF-GS (Progressive Distractor Filtering for Robust 3D Gaussian Splatting), a framework that amplifies this self-filtering property through a progressive multi-phase optimization. The progressive filtering phases gradually remove distractors by exploiting discrepancy cues, while the following reconstruction phase restores fine-grained, view-consistent details from the purified Gaussian representation. Through this iterative refinement, PDF-GS achieves robust, high-fidelity, and distractor-free reconstructions, consistently outperforming baselines across diverse datasets and challenging real-world conditions. Moreover, our approach is lightweight and easily adaptable to existing 3DGS frameworks, requiring no architectural changes or additional inference overhead, leading to a new state-of-the-art performance. The code is publicly available at https://github.com/kangrnin/PDF-GS.", "link": "http://arxiv.org/abs/2604.12580v1", "date": "2026-04-14", "relevancy": 3.3189, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6814}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6668}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6431}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PDF-GS%3A%20Progressive%20Distractor%20Filtering%20for%20Robust%203D%20Gaussian%20Splatting&body=Title%3A%20PDF-GS%3A%20Progressive%20Distractor%20Filtering%20for%20Robust%203D%20Gaussian%20Splatting%0AAuthor%3A%20Kangmin%20Seo%20and%20MinKyu%20Lee%20and%20Tae-Young%20Kim%20and%20ByeongCheol%20Lee%20and%20JoonSeoung%20An%20and%20Jae-Pil%20Heo%0AAbstract%3A%20Recent%20advances%20in%203D%20Gaussian%20Splatting%20%283DGS%29%20have%20enabled%20impressive%20real-time%20photorealistic%20rendering.%20However%2C%20conventional%20training%20pipelines%20inherently%20assume%20full%20multi-view%20consistency%20among%20input%20images%2C%20which%20makes%20them%20sensitive%20to%20distractors%20that%20violate%20this%20assumption%20and%20cause%20visual%20artifacts.%20In%20this%20work%2C%20we%20revisit%20an%20underexplored%20aspect%20of%203DGS%3A%20its%20inherent%20ability%20to%20suppress%20inconsistent%20signals.%20Building%20on%20this%20insight%2C%20we%20propose%20PDF-GS%20%28Progressive%20Distractor%20Filtering%20for%20Robust%203D%20Gaussian%20Splatting%29%2C%20a%20framework%20that%20amplifies%20this%20self-filtering%20property%20through%20a%20progressive%20multi-phase%20optimization.%20The%20progressive%20filtering%20phases%20gradually%20remove%20distractors%20by%20exploiting%20discrepancy%20cues%2C%20while%20the%20following%20reconstruction%20phase%20restores%20fine-grained%2C%20view-consistent%20details%20from%20the%20purified%20Gaussian%20representation.%20Through%20this%20iterative%20refinement%2C%20PDF-GS%20achieves%20robust%2C%20high-fidelity%2C%20and%20distractor-free%20reconstructions%2C%20consistently%20outperforming%20baselines%20across%20diverse%20datasets%20and%20challenging%20real-world%20conditions.%20Moreover%2C%20our%20approach%20is%20lightweight%20and%20easily%20adaptable%20to%20existing%203DGS%20frameworks%2C%20requiring%20no%20architectural%20changes%20or%20additional%20inference%20overhead%2C%20leading%20to%20a%20new%20state-of-the-art%20performance.%20The%20code%20is%20publicly%20available%20at%20https%3A//github.com/kangrnin/PDF-GS.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12580v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPDF-GS%253A%2520Progressive%2520Distractor%2520Filtering%2520for%2520Robust%25203D%2520Gaussian%2520Splatting%26entry.906535625%3DKangmin%2520Seo%2520and%2520MinKyu%2520Lee%2520and%2520Tae-Young%2520Kim%2520and%2520ByeongCheol%2520Lee%2520and%2520JoonSeoung%2520An%2520and%2520Jae-Pil%2520Heo%26entry.1292438233%3DRecent%2520advances%2520in%25203D%2520Gaussian%2520Splatting%2520%25283DGS%2529%2520have%2520enabled%2520impressive%2520real-time%2520photorealistic%2520rendering.%2520However%252C%2520conventional%2520training%2520pipelines%2520inherently%2520assume%2520full%2520multi-view%2520consistency%2520among%2520input%2520images%252C%2520which%2520makes%2520them%2520sensitive%2520to%2520distractors%2520that%2520violate%2520this%2520assumption%2520and%2520cause%2520visual%2520artifacts.%2520In%2520this%2520work%252C%2520we%2520revisit%2520an%2520underexplored%2520aspect%2520of%25203DGS%253A%2520its%2520inherent%2520ability%2520to%2520suppress%2520inconsistent%2520signals.%2520Building%2520on%2520this%2520insight%252C%2520we%2520propose%2520PDF-GS%2520%2528Progressive%2520Distractor%2520Filtering%2520for%2520Robust%25203D%2520Gaussian%2520Splatting%2529%252C%2520a%2520framework%2520that%2520amplifies%2520this%2520self-filtering%2520property%2520through%2520a%2520progressive%2520multi-phase%2520optimization.%2520The%2520progressive%2520filtering%2520phases%2520gradually%2520remove%2520distractors%2520by%2520exploiting%2520discrepancy%2520cues%252C%2520while%2520the%2520following%2520reconstruction%2520phase%2520restores%2520fine-grained%252C%2520view-consistent%2520details%2520from%2520the%2520purified%2520Gaussian%2520representation.%2520Through%2520this%2520iterative%2520refinement%252C%2520PDF-GS%2520achieves%2520robust%252C%2520high-fidelity%252C%2520and%2520distractor-free%2520reconstructions%252C%2520consistently%2520outperforming%2520baselines%2520across%2520diverse%2520datasets%2520and%2520challenging%2520real-world%2520conditions.%2520Moreover%252C%2520our%2520approach%2520is%2520lightweight%2520and%2520easily%2520adaptable%2520to%2520existing%25203DGS%2520frameworks%252C%2520requiring%2520no%2520architectural%2520changes%2520or%2520additional%2520inference%2520overhead%252C%2520leading%2520to%2520a%2520new%2520state-of-the-art%2520performance.%2520The%2520code%2520is%2520publicly%2520available%2520at%2520https%253A//github.com/kangrnin/PDF-GS.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.12580v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=PDF-GS%3A%20Progressive%20Distractor%20Filtering%20for%20Robust%203D%20Gaussian%20Splatting&entry.906535625=Kangmin%20Seo%20and%20MinKyu%20Lee%20and%20Tae-Young%20Kim%20and%20ByeongCheol%20Lee%20and%20JoonSeoung%20An%20and%20Jae-Pil%20Heo&entry.1292438233=Recent%20advances%20in%203D%20Gaussian%20Splatting%20%283DGS%29%20have%20enabled%20impressive%20real-time%20photorealistic%20rendering.%20However%2C%20conventional%20training%20pipelines%20inherently%20assume%20full%20multi-view%20consistency%20among%20input%20images%2C%20which%20makes%20them%20sensitive%20to%20distractors%20that%20violate%20this%20assumption%20and%20cause%20visual%20artifacts.%20In%20this%20work%2C%20we%20revisit%20an%20underexplored%20aspect%20of%203DGS%3A%20its%20inherent%20ability%20to%20suppress%20inconsistent%20signals.%20Building%20on%20this%20insight%2C%20we%20propose%20PDF-GS%20%28Progressive%20Distractor%20Filtering%20for%20Robust%203D%20Gaussian%20Splatting%29%2C%20a%20framework%20that%20amplifies%20this%20self-filtering%20property%20through%20a%20progressive%20multi-phase%20optimization.%20The%20progressive%20filtering%20phases%20gradually%20remove%20distractors%20by%20exploiting%20discrepancy%20cues%2C%20while%20the%20following%20reconstruction%20phase%20restores%20fine-grained%2C%20view-consistent%20details%20from%20the%20purified%20Gaussian%20representation.%20Through%20this%20iterative%20refinement%2C%20PDF-GS%20achieves%20robust%2C%20high-fidelity%2C%20and%20distractor-free%20reconstructions%2C%20consistently%20outperforming%20baselines%20across%20diverse%20datasets%20and%20challenging%20real-world%20conditions.%20Moreover%2C%20our%20approach%20is%20lightweight%20and%20easily%20adaptable%20to%20existing%203DGS%20frameworks%2C%20requiring%20no%20architectural%20changes%20or%20additional%20inference%20overhead%2C%20leading%20to%20a%20new%20state-of-the-art%20performance.%20The%20code%20is%20publicly%20available%20at%20https%3A//github.com/kangrnin/PDF-GS.&entry.1838667208=http%3A//arxiv.org/abs/2604.12580v1&entry.124074799=Read"},
{"title": "Cross-Attentive Multiview Fusion of Vision-Language Embeddings", "author": "Tomas Berriel Martins and Martin R. Oswald and Javier Civera", "abstract": "Vision-language models have been key to the development of open-vocabulary 2D semantic segmentation. Lifting these models from 2D images to 3D scenes, however, remains a challenging problem. Existing approaches typically back-project and average 2D descriptors across views, or heuristically select a single representative one, often resulting in suboptimal 3D representations. In this work, we introduce a novel multiview transformer architecture that cross-attends across vision-language descriptors from multiple viewpoints and fuses them into a unified per-3D-instance embedding. As a second contribution, we leverage multiview consistency as a self-supervision signal for this fusion, which significantly improves performance when added to a standard supervised target-class loss. Our Cross-Attentive Multiview Fusion, which we denote with its acronym CAMFusion, not only consistently outperforms naive averaging or single-view descriptor selection, but also achieves state-of-the-art results on 3D semantic and instance classification benchmarks, including zero-shot evaluations on out-of-domain datasets.", "link": "http://arxiv.org/abs/2604.12551v1", "date": "2026-04-14", "relevancy": 3.2147, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.656}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6364}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6364}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Cross-Attentive%20Multiview%20Fusion%20of%20Vision-Language%20Embeddings&body=Title%3A%20Cross-Attentive%20Multiview%20Fusion%20of%20Vision-Language%20Embeddings%0AAuthor%3A%20Tomas%20Berriel%20Martins%20and%20Martin%20R.%20Oswald%20and%20Javier%20Civera%0AAbstract%3A%20Vision-language%20models%20have%20been%20key%20to%20the%20development%20of%20open-vocabulary%202D%20semantic%20segmentation.%20Lifting%20these%20models%20from%202D%20images%20to%203D%20scenes%2C%20however%2C%20remains%20a%20challenging%20problem.%20Existing%20approaches%20typically%20back-project%20and%20average%202D%20descriptors%20across%20views%2C%20or%20heuristically%20select%20a%20single%20representative%20one%2C%20often%20resulting%20in%20suboptimal%203D%20representations.%20In%20this%20work%2C%20we%20introduce%20a%20novel%20multiview%20transformer%20architecture%20that%20cross-attends%20across%20vision-language%20descriptors%20from%20multiple%20viewpoints%20and%20fuses%20them%20into%20a%20unified%20per-3D-instance%20embedding.%20As%20a%20second%20contribution%2C%20we%20leverage%20multiview%20consistency%20as%20a%20self-supervision%20signal%20for%20this%20fusion%2C%20which%20significantly%20improves%20performance%20when%20added%20to%20a%20standard%20supervised%20target-class%20loss.%20Our%20Cross-Attentive%20Multiview%20Fusion%2C%20which%20we%20denote%20with%20its%20acronym%20CAMFusion%2C%20not%20only%20consistently%20outperforms%20naive%20averaging%20or%20single-view%20descriptor%20selection%2C%20but%20also%20achieves%20state-of-the-art%20results%20on%203D%20semantic%20and%20instance%20classification%20benchmarks%2C%20including%20zero-shot%20evaluations%20on%20out-of-domain%20datasets.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12551v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCross-Attentive%2520Multiview%2520Fusion%2520of%2520Vision-Language%2520Embeddings%26entry.906535625%3DTomas%2520Berriel%2520Martins%2520and%2520Martin%2520R.%2520Oswald%2520and%2520Javier%2520Civera%26entry.12924382 {"title": "Habitat-GS: A High-Fidelity Navigation Simulator with Dynamic Gaussian Splatting", "author": "Ziyuan Xia and Jingyi Xu and Chong Cui and Yuanhong Yu and Jiazhao Zhang and Qingsong Yan and Tao Ni and Junbo Chen and Xiaowei Zhou and Hujun Bao and Ruizhen Hu and Sida Peng", "abstract": "Training embodied AI agents depends critically on the visual fidelity of simulation environments and the ability to model dynamic humans. Current simulators rely on mesh-based rasterization with limited visual realism, and their support for dynamic human avatars, where available, is constrained to mesh representations, hindering agent generalization to human-populated real-world scenarios. We present Habitat-GS, a navigation-centric embodied AI simulator extended from Habitat-Sim that integrates 3D Gaussian Splatting scene rendering and drivable gaussian avatars while maintaining full compatibility with the Habitat ecosystem. Our system implements a 3DGS renderer for real-time photorealistic rendering and supports scalable 3DGS asset import from diverse sources. For dynamic human modeling, we introduce a gaussian avatar module that enables each avatar to simultaneously serve as a photorealistic visual entity and an effective navigation obstacle, allowing agents to learn human-aware behaviors in realistic settings. Experiments on point-goal navigation demonstrate that agents trained on 3DGS scenes achieve stronger cross-domain generalization, with mixed-domain training being the most effective strategy. Evaluations on avatar-aware navigation further confirm that gaussian avatars enable effective human-aware navigation. Finally, performance benchmarks validate the system's scalability across varying scene complexity and avatar counts.", "link": "http://arxiv.org/abs/2604.12626v1", "date": "2026-04-14", "relevancy": 3.0966, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.622}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6194}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6165}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Habitat-GS%3A%20A%20High-Fidelity%20Navigation%20Simulator%20with%20Dynamic%20Gaussian%20Splatting&body=Title%3A%20Habitat-GS%3A%20A%20High-Fidelity%20Navigation%20Simulator%20with%20Dynamic%20Gaussian%20Splatting%0AAuthor%3A%20Ziyuan%20Xia%20and%20Jingyi%20Xu%20and%20Chong%20Cui%20and%20Yuanhong%20Yu%20and%20Jiazhao%20Zhang%20and%20Qingsong%20Yan%20and%20Tao%20Ni%20and%20Junbo%20Chen%20and%20Xiaowei%20Zhou%20and%20Hujun%20Bao%20and%20Ruizhen%20Hu%20and%20Sida%20Peng%0AAbstract%3A%20Training%20embodied%20AI%20agents%20depends%20critically%20on%20the%20visual%20fidelity%20of%20simulation%20environments%20and%20the%20ability%20to%20model%20dynamic%20humans.%20Current%20simulators%20rely%20on%20mesh-based%20rasterization%20with%20limited%20visual%20realism%2C%20and%20their%20support%20for%20dynamic%20human%20avatars%2C%20where%20available%2C%20is%20constrained%20to%20mesh%20representations%2C%20hindering%20agent%20generalization%20to%20human-populated%20real-world%20scenarios.%20We%20present%20Habitat-GS%2C%20a%20navigation-centric%20embodied%20AI%20simulator%20extended%20from%20Habitat-Sim%20that%20integrates%203D%20Gaussian%20Splatting%20scene%20rendering%20and%20drivable%20gaussian%20avatars%20while%20maintaining%20full%20compatibility%20with%20the%20Habitat%20ecosystem.%20Our%20system%20implements%20a%203DGS%20renderer%20for%20real-time%20photorealistic%20rendering%20and%20supports%20scalable%203DGS%20asset%20import%20from%20diverse%20sources.%20For%20dynamic%20human%20modeling%2C%20we%20introduce%20a%20gaussian%20avatar%20module%20that%20enables%20each%20avatar%20to%20s {"title": "AniGen: Unified $S^3$ Fields for Animatable 3D Asset Generation", "author": "Yi-Hua Huang and Zi-Xin Zou and Yuting He and Chirui Chang and Cheng-Feng Pu and Ziyi Yang and Yuan-Chen Guo and Yan-Pei Cao and Xiaojuan Qi", "abstract": "Animatable 3D assets, defined as geometry equipped with an articulated skeleton and skinning weights, are fundamental to interactive graphics, embodied agents, and animation production. While recent 3D generative models can synthesize visually plausible shapes from images, the results are typically static. Obtaining usable rigs via post-hoc auto-rigging is brittle and often produces skeletons that are topologically inconsistent with the generated geometry. We present AniGen, a unified framework that directly generates animate-ready 3D assets conditioned on a single image. Our key insight is to represent shape, skeleton, and skinning as mutually consistent $S^3$ Fields (Shape, Skeleton, Skin) defined over a shared spatial domain. To enable the robust learning of these fields, we introduce two technical innovations: (i) a confidence-decaying skeleton field that explicitly handles the geometric ambiguity of bone prediction at Voronoi boundaries, and (ii) a dual skin feature field that decouples skinning weights from specific joint counts, allowing a fixed-architecture network to predict rigs of arbitrary complexity. Built upon a two-stage flow-matching pipeline, AniGen first synthesizes a sparse structural scaffold and then generates dense geometry and articulation in a structured latent space. Extensive experiments demonstrate that AniGen substantially outperforms state-of-the-art sequential baselines in rig validity and animation quality, generalizing effectively to in-the-wild images across diverse categories including animals, humanoids, and machinery. Homepage: https://yihua7.github.io/AniGen-web/", "link": "http://arxiv.org/abs/2604.08746v2", "date": "2026-04-14", "relevancy": 2.9916, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6124}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6101}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5725}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AniGen%3A%20Unified%20%24S%5E3%24%20Fields%20for%20Animatable%203D%20Asset%20Generation&body=Title%3A%20AniGen%3A%20Unified%20%24S%5E3%24%20Fields%20for%20Animatable%203D%20Asset%20Generation%0AAuthor%3A%20Yi-Hua%20Huang%20and%20Zi-Xin%20Zou%20and%20Yuting%20He%20and%20Chirui%20Chang%20and%20Cheng-Feng%20Pu%20and%20Ziyi%20Yang%20and%20Yuan-Chen%20Guo%20and%20Yan-Pei%20Cao%20and%20Xiaojuan%20Qi%0AAbstract%3A%20Animatable%203D%20assets%2C%20defined%20as%20geometry%20equipped%20with%20an%20articulated%20skeleton%20and%20skinning%20weights%2C%20are%20fundamental%20to%20interactive%20graphics%2C%20embodied%20agents%2C%20and%20animation%20production.%20While%20recent%203D%20generative%20models%20can%20synthesize%20visually%20plausible%20shapes%20from%20images%2C%20the%20results%20are%20typically%20static.%20Obtaining%20usable%20rigs%20via%20post-hoc%20auto-rigging%20is%20brittle%20and%20often%20produces%20skeletons%20that%20are%20topologically%20inconsistent%20with%20the%20generated%20geometry.%20We%20present%20AniGen%2C%20a%20unified%20framework%20that%20directly%20generates%20animate-ready%203D%20assets%20conditioned%20on%20a%20single%20image.%20Our%20key%20insight%20is%20to%20represent%20shape%2C%20skeleton%2C%20and%20skinning%20as%20mutually%20consistent%20%24S%5E3%24%20Fields%20%28Shape%2C%20Skeleton%2C%20Skin%29%20defined%20over%20a%20shared%20spatial%20domain.%20To%20enable%20the%20robust%20learning%20of%20these%20fields%2C%20we%20introduce%20two%20technical%20innovations%3A%20%28i%29%20a%20confidence-decaying%20skeleton%20field%20that%20explicitly%20handles%20the%20geometric%20ambiguity%20of%20bone%20prediction%20at%20Voronoi%20boundaries%2C%20and%20%28ii%29%20a%20dual%20skin%20feature%20field%20that%20decouples%20skinning%20weights%20from%20specific%20joint%20counts%2C%20allowing%20a%20fixed-architecture%20network%20to%20predict%20rigs%20of%20arbitrary%20complexity.%20Built%20upon%20a%20two-stage%20flow-matching%20pipeline%2C%20AniGen%20first%20synthesizes%20a%20sparse%20structural%20scaffold%20and%20then%20generates%20dense%20geometry%20and%20articulation%20in%20a%20structured%20latent%20space.%20Extensive%20experiments%20demonstrate%20that%20AniGen%20substantially%20outperforms%20state-of-the-art%20sequential%20baselines%20in%20rig%20validity%20and%20animation%20quality%2C%20generalizing%20effectively%20to%20in-the-wild%20images%20across%20diverse%20categories%20including%20animals%2C%20humanoids%2C%20and%20machinery.%20Homepage%3A%20https%3A//yihua7.github.io/AniGen-web/%0ALink%3A%20http%3A//arxiv.org/abs/2604.08746v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAniGen%253A%2520Unified%2520%2524S%255E3%2524%2520Fields%2520for%2520Animatable%25203D%2520Asset%2520Generation%26entry.906535625%3DYi-Hua%2520Huang%2520and%2520Zi-Xin%2520Zou%2520and%2520Yuting%2520He%2520and%2520Chirui%2520Chang%2520and%2520Cheng-Feng%2520Pu%2520and%2520Ziyi%2520Yang%2520and%2520Yuan-Chen%2520Guo%2520and%2520Yan-Pei%2520Cao%2520and%2520Xiaojuan%2520Qi%26entry.1292438233%3DAnimatable%25203D%2520assets%252C%2520defined%2520as%2520geometry%2520equipped%2520with%2520an%2520articulated%2520skeleton%2520and%2520skinning%2520weights%252C%2520are%2520fundamental%2520to%2520interactive%2520graphics%252C%2520embodied%2520agents%252C%2520and%2520animation%2520production.%2520While%2520recent%25203D%2520generative%2520models%2520can%2520synthesize%2520visually%2520plausible%2520shapes%2520from%2520images%252C%2520the%2520results%2520are%2520typi {"title": "Neural Dynamic GI: Random-Access Neural Compression for Temporal Lightmaps in Dynamic Lighting Environments", "author": "Jianhui Wu and Jian Zhou and Zhi Zhou and Zhangjin Huang and Chao Li", "abstract": "High-quality global illumination (GI) in real-time rendering is commonly achieved using precomputed lighting techniques, with lightmap as the standard choice. To support GI for static objects in dynamic lighting environments, multiple lightmaps at different lighting conditions need to be precomputed, which incurs substantial storage and memory overhead.\n  To overcome this limitation, we propose Neural Dynamic GI (NDGI), a novel compression technique specifically designed for temporal lightmap sets. Our method utilizes multi-dimensional feature maps and lightweight neural networks to integrate the temporal information instead of storing multiple sets explicitly, which significantly reduces the storage size of lightmaps. Additionally, we introduce a block compression (BC) simulation strategy during the training process, which enables BC compression on the final generated feature maps and further improves the compression ratio. To enable efficient real-time decompression, we also integrate a virtual texturing (VT) system with our neural representation.\n  Compared with prior methods, our approach achieves high-quality dynamic GI while maintaining remarkably low storage and memory requirements, with only modest real-time decompression overhead. To facilitate further research in this direction, we will release our temporal lightmap dataset precomputed in multiple scenes featuring diverse temporal variations.", "link": "http://arxiv.org/abs/2604.12625v1", "date": "2026-04-14", "relevancy": 2.9642, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.622}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5964}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.5601}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Neural%20Dynamic%20GI%3A%20Random-Access%20Neural%20Compression%20for%20Temporal%20Lightmaps%20in%20Dynamic%20Lighting%20Environments&body=Title%3A%20Neural%20Dynamic%20GI%3A%20Random-Access%20Neural%20Compression%20for%20Temporal%20Lightmaps%20in%20Dynamic%20Lighting%20Environments%0AAuthor%3A%20Jianhui%20Wu%20and%20Jian%20Zhou%20and%20Zhi%20Zhou%20and%20Zhangjin%20Huang%20and%20Chao%20Li%0AAbstract%3A%20High-quality%20global%20illumination%20%28GI%29%20in%20real-time%20rendering%20is%20commonly%20achieved%20using%20precomputed%20lighting%20techniques%2C%20with%20lightmap%20as%20the%20standard%20choice.%20To%20support%20GI%20for%20static%20objects%20in%20dynamic%20lighting%20environments%2C%20multiple%20lightmaps%20at%20different%20lighting%20conditions%20need%20to%20be%20precomputed%2C%20which%20incurs%20substantial%20storage%20and%20memory%20overhead.%0A%20%20To%20overcome%20this%20limitation%2C%20we%20propose%20Neural%20Dynamic%20GI%20%28NDGI%29%2C%20a%20novel%20compression%20technique%20specifically%20designed%20for%20temporal%20lightmap%20sets.%20Our%20method%20utilizes%20multi-dimensional%20feature%20maps%20and%20lightweight%20neural%20networks%20to%20integrate%20the%20temporal%20information%20instead%20of%20storing%20multiple%20sets%20explicitly%2C%20which%20significantly%20reduces%20the%20storage%20size%20of%20lightmaps.%20Additionally%2C%20we%20introduce%20a%20block%20compression%20%28BC%29%20simulation%20strategy%20during%20the%20training%20process%2C%20which%20enables%20BC%20compression%20on%20the%20final%20generated%20feature%20maps%20and%20further%20improves%20the%20compression%20ratio.%20To%20enable%20efficient%20real-time%20decompression%2C%20we%20also%20integrate%20a%20virtual%20texturing%20%28VT%29%20system%20with%20our%20neural%20representation.%0A%20%20Compared%20with%20prior%20methods%2C%20our%20approach%20achieves%20high-quality%20dynamic%20GI%20while%20maintaining%20remarkably%20low%20storage%20and%20memory%20requirements%2C%20with%20only%20modest%20real-time%20decompression%20overhead.%20To%20facilitate%20further%20research%20in%20this%20direction%2C%20we%20will%20release%20our%20temporal%20lightmap%20dataset%20precomputed%20in%20multiple%20scenes%20featuring%20diverse%20temporal%20variations.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12625v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNeural%2520Dynamic%2520GI%253A%2520Random-Access%2520Neural%2520Compression%2520for%2520Temporal%2520Lightmaps%2520in%2520Dynamic%2520Lighting%2520Environments%26entry.906535625%3DJianhui%2520Wu%2520and%2520Jian%2520Zhou%2520and%2520Zhi%2520Zhou%2520and%2520Zhangjin%2520Huang%2520and%2520Chao%2520Li%26entry.1292438233%3DHigh-quality%2520global%2520illumination%2520%2528GI%2529%2520in%2520real-time%2520rendering%2520is%2520commonly%2520achieved%2520using%2520precomputed%2520lighting%2520techniques%252C%2520with%2520lightmap%2520as%2520the%2520standard%2520choice.%2520To%2520support%2520GI%2520for%2520static%2520objects%2520in%2520dynamic%2520lighting%2520environments%252C%2520multiple%2520lightmaps%2520at%2520different%2520lighting%2520conditions%2520need%2520to%2520be%2520precomputed%252C%2520which%2520incurs%2520substantial%2520storage%2520and%2520memory%2520overhead.%250A%2520%2520To%2520overcome%2520this%2520limitation%252C%2520we%2520propose%2520Neural%2520Dynamic%2520GI%2520%2528NDGI%2529%252C%2520a%2520novel%2520compression%2520technique%2520specifically%2520designed%2520for%2520temporal%2520lightmap%2520sets.%2520Our%2520method%2520utilizes%2520multi-dimensional%2520feature%2520maps%2520and%2520lightweight%2520neural%2520networks%2520to%2520integrate%2520the%2520temporal%252 c%20objects%20in%20dynamic%20lighting%20environments%2C%20multiple%20lightmaps%20at%20different%20lighting%20conditions%20need%20to%20be%20precomputed%2C%20which%20incurs%20substantial%20storage%20and%20memory%20overhead.%0A%20%20To%20overcome%20this%20limitation%2C%20we%20propose%20Neural%20Dynamic%20GI%20%28NDGI%29%2C%20a%20novel%20compression%20technique%20specifically%20designed%20for%20temporal%20lightmap%20sets.%20Our%20method%20utilizes%20multi-dimensional%20feature%20maps%20and%20lightweight%20neural%20networks%20to%20integrate%20the%20temporal%20information%20instead%20of%20storing%20multiple%20sets%20explicitly%2C%20which%20significantly%20reduces%20the%20storage%20size%20of%20lightmaps.%20Additionally%2C%20we%20introduce%20a%20block%20compression%20%28BC%29%20simulation%20strategy%20during%20the%20training%20process%2C%20which%20enables%20BC%20compression%20on%20the%20final%20generated%20feature%20maps%20and%20further%20improves%20the%20compression%20ratio.%20To%20enable%20efficient%20real-time%20decompression%2C%20we%20also%20integrate%20a%20virtual%20texturing%20%28VT%29%20system%20with%20our%20neural%20representation.%0A%20%20Compared%20with%20prior%20methods%2C%20our%20approach%20achieves%20high-quality%20dynamic%20GI%20while%20maintaining%20remarkably%20low%20storage%20and%20memory%20requirements%2C%20with%20only%20modest%20real-time%20decompression%20overhead.%20To%20facilitate%20further%20research%20in%20this%20direction%2C%20we%20will%20release%20our%20temporal%20lightmap%20dataset%20precomputed%20in%20multiple%20scenes%20featuring%20diverse%20temporal%20variations.&entry.1838667208=http%3A//arxiv.org/abs/2604.12625v1&entry.124074799=Read"},
{"title": "MODIX: A Training-Free Multimodal Information-Driven Positional Index Scaling for Vision-Language Models", "author": "Ruoxiang Huang and Zhen Yuan", "abstract": "Vision-Language Models (VLMs) have achieved remarkable progress in multimodal understanding, yet their positional encoding mechanisms remain suboptimal. Existing approaches uniformly assign positional indices to all tokens, overlooking variations in information density within and across modalities, which leads to inefficient attention allocation where redundant visual regions dominate while informative content is underrepresented. We identify positional granularity as an implicit resource and propose MODIX (Multimodal Information-Driven Positional IndeX Scaling), a training-free framework that dynamically adapts positional strides based on modality-specific contributions. MODIX jointly models intra-modal density via covariance-based entropy and inter-modal interaction via cross-modal alignment to derive unified scores, which rescale positional indices to allocate finer granularity to informative modalities while compressing redundant ones, without requiring any modification to model parameters or architecture. Experiments across diverse architectures and benchmarks demonstrate that MODIX consistently improves multimodal reasoning and adaptively reallocates attention according to task-dependent information distributions, suggesting that positional encoding should be treated as an adaptive resource in Transformers for multimodal sequence modeling.", "link": "http://arxiv.org/abs/2604.12537v1", "date": "2026-04-14", "relevancy": 2.9082, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5828}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5828}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5794}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MODIX%3A%20A%20Training-Free%20Multimodal%20Information-Driven%20Positional%20Index%20Scaling%20for%20Vision-Language%20Models&body=Title%3A%20MODIX%3A%20A%20Training-Free%20Multimodal%20Information-Driven%20Positional%20Index%20Scaling%20for%20Vision-Language%20Models%0AAuthor%3A%20Ruoxiang%20Huang%20and%20Zhen%20Yuan%0AAbstract%3A%20Vision-Language%20Models%20%28VLMs%29%20have%20achieved%20remarkable%20progress%20in%20multimodal%20understanding%2C%20yet%20their%20positional%20encoding%20mechanisms%20remain%20suboptimal.%20Existing%20approaches%20uniformly%20assign%20positional%20indices%20to%20all%20tokens%2C%20overlooking%20variations%20in%20information%20density%20within%20and%20across%20modalities%2C%20which%20leads%20to%20inefficient%20attention%20allocation%20where%20redundant%20visual%20regions%20dominate%20while%20informative%20content%20is%20underrepresented.%20We%20identify%20positional%20granularity%20as%20an%20implicit%20resource%20and%20propose%20MODIX%20%28Multimodal%20Information-Driven%20Positional%20IndeX%20Scaling%29%2C%20a%20training-free%20framework%20that%20dynamically%20adapts%20positional%20strides%20based%20on%20modality-specific%20contributions.%20MODIX%20jointly%20models%20intra-modal%20density%20via%20covariance-based%20entropy%20and%20inter-modal%20interaction%20via%20cross-modal%20alignment%20to%20derive%20unified%20scores%2C%20which%20rescale%20positional%20indices%20to%20allocate%20finer%20granularity%20to%20informative%20modalities%20while%20compressing%20redundant%20ones%2C%20without%20requiring%20any%20modification%20to%20model%20parameters%20or%20architecture.%20Experiments%20across%20diverse%20architectures%20and%20benchmarks%20demonstrate%20that%20MODIX%20consistently%20improves%20multimodal%20reasoning%20and%20adaptively%20reallocates%20attention%20according%20to%20task-dependent%20information%20distributions%2C%20suggesting%20that%20positional%20encoding%20should%20be%20treated%20as%20an%20adaptive%20resource%20in%20Transformers%20for%20multimodal%20sequence%20modeling.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12537v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMODIX%253A%2520A%2520Training-Free%2520Multimodal%2520Information-Driven%2520Positional%2520Index%2520Scaling%2520for%2520Vision-Language%2520Models%26entry.906535625%3DRuoxiang%2520Huang%2520and%2520Zhen%2520Yuan%26entry.1292438233%3DVision-Language%2520Models%2520%2528VLMs%2529%2520have%2520achieved%2520remarkable%2520progress%2520in%2520multimodal%2520understanding%252C%2520yet%2520their%2520positional%2520encoding%2520mechanisms%2520remain%2520suboptimal.%2520Existing%2520approaches%2520uniformly%2520assign%2520positional%2520indices%2520to%2520all%2520tokens%252C%2520overlooking%2520variations%2520in%2520information%2520density%2520within%2520and%2520across%2520modalities%252C%2520which%2520leads%2520to%2520inefficient%2520attention%2520allocation%2520where%2520redundant%2520visual%2520regions%2520dominate%2520while%2520informative%2520content%2520is%2520underrepresented.%2520We%2520identify%2520positional%2520granularity%2520as%2520an%2520implicit%2520resource%2520and%2520propose%2520MODIX%2520%2528Multimodal%2520Information-Driven%2520Positional%2520IndeX%2520Scaling%2529%252C%2520a%2520training-free%2520framework%2520that%2520dynamically%2520adapts%2520positional%2520strides%2520based%2520on%2520modality-specific%2520contributions.%2520MODIX%2520jointly%2520models%2520intra-modal%2520density%2520via%2520covariance-based%2520entropy%2520and%2520inter-modal%2520interaction%2520via%2520cross-modal%2520alignment%2520to%2520derive%2520unified%2520scores%252C%2520which%2520rescale%2520positional%2520indices%2520to%2520allocate%2520finer%2520granularity%2520to%252 {"title": "A Dataset and Evaluation for Complex 4D Markerless Human Motion Capture", "author": "Yeeun Park and Miqdad Naduthodi and Suryansh Kumar", "abstract": "Marker-based motion capture (MoCap) systems have long been the gold standard for accurate 4D human modeling, yet their reliance on specialized hardware and markers limits scalability and real-world deployment. Advancing reliable markerless 4D human motion capture requires datasets that reflect the complexity of real-world human interactions. Yet, existing benchmarks often lack realistic multi-person dynamics, severe occlusions, and challenging interaction patterns, leading to a persistent domain gap. In this work, we present a new dataset and evaluation for complex 4D markerless human motion capture. Our proposed MoCap dataset captures both single and multi-person scenarios with intricate motions, frequent inter-person occlusions, rapid position exchanges between similarly dressed subjects, and varying subject distances. It includes synchronized multi-view RGB and depth sequences, accurate camera calibration, ground-truth 3D motion capture from a Vicon system, and corresponding SMPL/SMPL-X parameters. This setup ensures precise alignment between visual observations and motion ground truth. Benchmarking state-of-the-art markerless MoCap models reveals substantial performance degradation under these realistic conditions, highlighting limitations of current approaches. We further demonstrate that targeted fine-tuning improves generalization, validating the dataset's realism and value for model development. Our evaluation exposes critical gaps in existing models and provides a rigorous foundation for advancing robust markerless 4D human motion capture.", "link": "http://arxiv.org/abs/2604.12765v1", "date": "2026-04-14", "relevancy": 2.8933, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6445}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5457}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5457}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Dataset%20and%20Evaluation%20for%20Complex%204D%20Markerless%20Human%20Motion%20Capture&body=Title%3A%20A%20Dataset%20and%20Evaluation%20for%20Complex%204D%20Markerless%20Human%20Motion%20Capture%0AAuthor%3A%20Yeeun%20Park%20and%20Miqdad%20Naduthodi%20and%20Suryansh%20Kumar%0AAbstract%3A%20Marker-based%20motion%20capture%20%28MoCap%29%20systems%20have%20long%20been%20the%20gold%20standard%20for%20accurate%204D%20human%20modeling%2C%20yet%20their%20reliance%20on%20specialized%20hardware%20and%20markers%20limits%20scalability%20and%20real-world%20deployment.%20Advancing%20reliable%20markerless%204D%20human%20motion%20capture%20requires%20datasets%20that%20reflect%20the%20complexity%20of%20real-world%20human%20interactions.%20Yet%2C%20existing%20benchmarks%20often%20lack%20realistic%20multi-person%20dynamics%2C%20severe%20occlusions%2C%20and%20challenging%20interaction%20patterns%2C%20leading%20to%20a%20persistent%20domain%20gap.%20In%20this%20work%2C%20we%20present%20a%20new%20dataset%20and%20evaluation%20for%20complex%204D%20markerless%20human%20motion%20capture.%20Our%20proposed%20MoCap%20dataset%20captures%20both%20single%20and%20multi-person%20scenarios%20with%20intricate%20motions%2C%20frequent%20inter-person%20occlusions%2C%20rapid%20position%20exchanges%20between%20similarly%20dressed%20subjects%2C%20and%20varying%20subject%20distances.%20It%20includes%20synchronized%20multi-view%20RGB%20and%20depth%20sequences%2C%20accurate%20camera%20calibration%2C%20ground-truth%203D%20motion%20capture%20from%20a%20Vicon%20system%2C%20and%20corresponding%20SMPL/SMPL-X%20parameters.%20This%20setup%20ensures%20precise%20alignment%20between%20visual%20observations%20and%20motion%20ground%20truth.%20Benchmarking%20state-of-the-art%20markerless%20MoCap%20models%20reveals%20substantial%20performance%20degradation%20under%20these%20realistic%20conditions%2C%20highlighting%20limitations%20of%20current%20approaches.%20We%20further%20demonstrate%20that%20targeted%20fine-tuning%20improves%20generalization%2C%20validating%20the%20dataset%27s%20realism%20and%20value%20for%20model%20development.%20Our%20evaluation%20exposes%20critical%20gaps%20in%20existing%20models%20and%20provides%20a%20rigorous%20foundation%20for%20advancing%20robust%20markerless%204D%20human%20motion%20capture.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12765v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Dataset%2520and%2520Evaluation%2520for%2520Complex%25204D%2520Markerless%2520Human%2520Motion%2520Capture%26entry.906535625%3DYeeun%2520Park%2520and%2520Miqdad%2520Naduthodi%2520and%2520Suryansh%2520Kumar%26entry.1292438233%3DMarker-based%2520motion%2520capture%2520%2528MoCap%2529%2520systems%2520have%2520long%2520been%2520the%2520gold%2520standard%2520for%2520accurate%25204D%2520human%2520modeling%252C%2520yet%2520their%2520reliance%2520on%2520specialized%2520hardware%2520and%2520markers%2520limits%2520scalability%2520and%2520real-world%2520deployment.%2520Advancing%2520reliable%2520markerless%25204D%2520human%2520motion%2520capture%2520requires%2520datasets%2520that%2520reflect%2520the%2520complexity%2520of%2520real-world%2520human%2520interactions.%2520Yet%252C%2520existing%2520benchmarks%2520often%2520lack%2520realistic%2520multi-person%2520dynamics%252C%2520severe%2520occlusions%252C%2520and%2520challenging%2520interaction%2520patterns%252C%2520leading%2520to%2520a%2520persistent%2520domain%2520gap.%2520In%2520this%2520work%252C%2520we%2520present%2520a%2520new%2520dataset%2520and%2520evaluation%2520for%2520complex%25204D%2520mar {"title": "Representing 3D Faces with Learnable B-Spline Volumes", "author": "Prashanth Chandran and Daoye Wang and Timo Bolkart", "abstract": "We present CUBE (Control-based Unified B-spline Encoding), a new geometric representation for human faces that combines B-spline volumes with learned features, and demonstrate its use as a decoder for 3D scan registration and monocular 3D face reconstruction. Unlike existing B-spline representations with 3D control points, CUBE is parametrized by a lattice (e.g., 8 x 8 x 8) of high-dimensional control features, increasing the model's expressivity. These features define a continuous, two-stage mapping from a 3D parametric domain to 3D Euclidean space via an intermediate feature space. First, high-dimensional control features are locally blended using the B-spline bases, yielding a high-dimensional feature vector whose first three values define a 3D base mesh. A small MLP then processes this feature vector to predict a residual displacement from the base shape, yielding the final refined 3D coordinates. To reconstruct 3D surfaces in dense semantic correspondence, CUBE is queried at 3D coordinates sampled from a fixed template mesh. Crucially, CUBE retains the local support property of traditional B-spline representations, enabling local surface editing by updating individual control features. We demonstrate the strengths of this representation by training transformer-based encoders to predict CUBE's control features from unstructured point clouds and monocular images, achieving state-of-the-art scan registration results compared to recent baselines.", "link": "http://arxiv.org/abs/2604.12894v1", "date": "2026-04-14", "relevancy": 2.8719, "topK": [{"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.5747}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.5747}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5737}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Representing%203D%20Faces%20with%20Learnable%20B-Spline%20Volumes&body=Title%3A%20Representing%203D%20Faces%20with%20Learnable%20B-Spline%20Volumes%0AAuthor%3A%20Prashanth%20Chandran%20and%20Daoye%20Wang%20and%20Timo%20Bolkart%0AAbstract%3A%20We%20present%20CUBE%20%28Control-based%20Unified%20B-spline%20Encoding%29%2C%20a%20new%20geometric%20representation%20for%20human%20faces%20that%20combines%20B-spline%20volumes%20with%20learned%20features%2C%20and%20demonstrate%20its%20use%20as%20a%20decoder%20for%203D%20scan%20registration%20and%20monocular%203D%20face%20reconstruction.%20Unlike%20existing%20B-spline%20representations%20with%203D%20control%20points%2C%20CUBE%20is%20parametrized%20by%20a%20lattice%20%28e.g.%2C%208%20x%208%20x%208%29%20of%20high-dimensional%20control%20features%2C%20increasing%20the%20model%27s%20expressivity.%20These%20features%20define%20a%20continuous%2C%20two-stage%20mapping%20from%20a%203D%20parametric%20domain%20to%203D%20Euclidean%20space%20via%20an%20intermediate%20feature%20space.%20First%2C%20high-dimensional%20control%20features%20are%20locally%20blended%20using%20the%20B-spline%20bases%2C%20yielding%20a%20high-dimensional%20feature%20vector%20whose%20first%20three%20values%20define%20a%203D%20base%20mesh.%20A%20small%20MLP%20then%20processes%20this%20feature%20vector%20to%20predict%20a%20residual%20displacement%20from%20the%20base%20shape%2C%20yielding%20the%20final%20refined%203D%20coordinates.%20To%20reconstruct%203D%20surfaces%20in%20dense%20semantic%20correspondence%2C%20CUBE%20is%20queried%20at%203D%20coordinates%20sampled%20from%20a%20fixed%20template%20mesh.%20Crucially%2C%20CUBE%20retains%20the%20local%20support%20property%20of%20traditional%20B-spline%20representations%2C%20enabling%20local%20surface%20editing%20by {"title": "GeoAlign: Geometric Feature Realignment for MLLM Spatial Reasoning", "author": "Zhaochen Liu and Limeng Qiao and Guanglu Wan and Tingting Jiang", "abstract": "Multimodal large language models (MLLMs) have exhibited remarkable performance in various visual tasks, yet still struggle with spatial reasoning. Recent efforts mitigate this by injecting geometric features from 3D foundation models, but rely on static single-layer extractions. We identify that such an approach induces a task misalignment bias: the geometric features naturally evolve towards 3D pretraining objectives, which may contradict the heterogeneous spatial demands of MLLMs, rendering any single layer fundamentally insufficient. To resolve this, we propose GeoAlign, a novel framework that dynamically aggregates multi-layer geometric features to realign with the actual demands. GeoAlign constructs a hierarchical geometric feature bank and leverages the MLLM's original visual tokens as content-aware queries to perform layer-wise sparse routing, adaptively fetching the suitable geometric features for each patch. Extensive experiments on VSI-Bench, ScanQA, and SQA3D demonstrate that our compact 4B model effectively achieves state-of-the-art performance, even outperforming larger existing MLLMs.", "link": "http://arxiv.org/abs/2604.12630v1", "date": "2026-04-14", "relevancy": 2.8705, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5898}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5755}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.557}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GeoAlign%3A%20Geometric%20Feature%20Realignment%20for%20MLLM%20Spatial%20Reasoning&body=Title%3A%20GeoAlign%3A%20Geometric%20Feature%20Realignment%20for%20MLLM%20Spatial%20Reasoning%0AAuthor%3A%20Zhaochen%20Liu%20and%20Limeng%20Qiao%20and%20Guanglu%20Wan%20and%20Tingting%20Jiang%0AAbstract%3A%20Multimodal%20large%20language%20models%20%28MLLMs%29%20have%20exhibited%20remarkable%20performance%20in%20various%20visual%20tasks%2C%20yet%20still%20struggle%20with%20spatial%20reasoning.%20Recent%20efforts%20mitigate%20this%20by%20injecting%20geometric%20features%20from%203D%20foundation%20models%2C%20but%20rely%20on%20static%20single-layer%20extractions.%20We%20identify%20that%20such%20an%20approach%20induces%20a%20task%20misalignment%20bias%3A%20the%20geometric%20features%20naturally%20evolve%20towards%203D%20pretraining%20objectives%2C%20which%20may%20contradict%20the%20heterogeneous%20spatial%20demands%20of%20MLLMs%2C%20rendering%20any%20single%20layer%20fundamentally%20insufficient.%20To%20resolve%20this%2C%20we%20propose%20GeoAlign%2C%20a%20novel%20framework%20that%20dynamically%20aggregates%20multi-layer%20geometric%20features%20to%20realign%20with%20the%20actual%20demands.%20GeoAlign%20constructs%20a%20hierarchical%20geometric%20feature%20bank%20and%20leverages%20the%20MLLM%27s%20original%20visual%20tokens%20as%20content-aware%20queries%20to%20perform%20layer-wise%20sparse%20routing%2C%20adaptively%20fetching%20the%20suitable%20geometric%20features%20for%20each%20patch.%20Extensive%20experiments%20on%20VSI-Bench%2C%20ScanQA%2C%20and%20SQA3D%20demonstrate%20that%20our%20compact%204B%20model%20effectively%20achieves%20state-of-the-art%20performance%2C%20even%20outperforming%20larger%20existing%20MLLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12630v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGeoAlign%253A%2520Geometric%2520Feature%2520Realignment%2520for%2520MLLM%2520Spatial%2520Reasoning%26entry.906535625%3DZhaochen%2520Liu%2520 {"title": "Mema: Memory-Augmented Adapter for Enhanced Vision-Language Understanding", "author": "Ying Liu and Yudong Han and Kean Shi and Liyuan Pan", "abstract": "Multimodal Large Language Models (MLLMs) have achieved remarkable performance by aligning pretrained visual representations with the linguistic knowledge embedded in Large Language Models (LLMs). However, existing approaches typically rely on final-layer visual features or learnable multi-layer fusion, which often fail to sufficiently exploit hierarchical visual cues without explicit cross-layer interaction design. In this work, we propose a Memory-Augmented Adapter (Mema) within the vision encoder. Specifically, Mema maintains a stateful memory that accumulates hierarchical visual representations across layers, with its evolution conditioned on both query embeddings and step-wise visual features. A portion of this memory is selectively injected into token representations via a feedback mechanism, thereby mitigating the attenuation of fine-grained visual cues from shallow layers. Designed as a lightweight and plug-and-play module, Mema integrates seamlessly into pretrained vision encoders without modifying the vanilla backbone architecture. Only a minimal set of additional parameters requires training, enabling adaptive visual feature refinement while reducing training overhead. Extensive experiments across multiple benchmarks demonstrate that Mema consistently improves performance, validating its effectiveness in complex multimodal reasoning tasks. The code have been released at https://github.com/Sisiliu312/Mema.", "link": "http://arxiv.org/abs/2603.00655v2", "date": "2026-04-14", "relevancy": 2.8704, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6029}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5597}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5597}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mema%3A%20Memory-Augmented%20Adapter%20for%20Enhanced%20Vision-Language%20Understanding&body=Title%3A%20Mema%3A%20Memory-Augmented%20Adapter%20for%20Enhanced%20Vision-Language%20Understanding%0AAuthor%3A%20Ying%20Liu%20and%20Yudong%20Han%20and%20Kean%20Shi%20and%20Liyuan%20Pan%0AAbstract%3A%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20have%20achieved%20remarkable%20performance%20by%20aligning%20pretrained%20visual%20representations%20with%20the%20linguistic%20knowledge%20embedded%20in%20Large%20Language%20Models%20%28LLMs%29.%20However%2C%20existing%20approaches%20typically%20rely%20on%20final-layer%20visual%20features%20or%20learnable%20multi-layer%20fusion%2C%20which%20often%20fail%20to%20sufficiently%20exploit%20hierarchical%20visual%20cues%20without%20explicit%20cross-layer%20interaction%20design.%20In%20this%20work%2C%20we%20propose%20a%20Memory-Augmented%20Adapter%20%28Mema%29%20within%20the%20vision%20encoder.%20Specifically%2C%20Mema%20maintains%20a%20stateful%20memory%20that%20accumulates%20hierarchical%20visual%20representations%20across%20layers%2C%20with%20its%20evolution%20conditioned%20on%20both%20query%20embeddings%20and%20step-wise%20visual%20features.%20A%20portion%20of%20this%20memory%20is%20selectively%20injected%20into%20token%20representations%20via%20a%20feedback%20mechanism%2C%20thereby%20mitigating%20the%20attenuation%20of%20fine-grained%20visual%20cues%20from%20shallow%20layers.%20Designed%20as%20a%20lightweight%20and%20plug-and-play%20module%2C%20Mema%20integrates%20seamlessly%20into%20pretrained%20vision%20encoders%20without%20modifying%20the%20vanilla%20backbone%20architecture.%20Only%20a%20minimal%20set%20of%20additional%20parameters%20requires%20training%2C%20enabling%20adaptive%20visual%20feature%20refinement%20while%20reducing%20training%20overhead.%20Extensive%20experiments%20across%20multiple%20benchmarks%20demonstrate%20that%20Mema%20consistently%20improves%20performance%2C%20validating%20its%20effectiveness%20in%20complex%20multimodal%20reasoning%20tasks.%20The%20code%20have%20been%20released%20at%20https%3A//github.com/Sisiliu312/Mema.%0ALink%3A%20http%3A//arxiv.org/abs/2603.00655v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMema%253A%2520Memory-Augmented%2520Adapter%2520for%2520Enhanced%2520Vision-Language%2520Understanding%26entry.906535625%3DYing%2520Liu%2520and%2520Yudong%2520Han%2520and%2520Kean%2520Shi%2520and%2520Liyuan%2520Pan%26entry.1292438233%3DMultimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520have%2520achieved%2520remarkable%2520performance%2520by%2520aligning%2520pretrained%2520visual%2520representations%2520with%2520the%2520linguistic%2520knowledge%2520embedded%2520in%2520Large%2520Language%2520Models%2520%2528LLMs%2529.%2520However%252C%2520existing%2520approaches%2520typically%2520rely%2520on%2520final-layer%2520visual%2520features%2520or%2520learnable%2520multi-layer%2520fusion%252C%2520which%2520often%2520fail%2520to%2520sufficiently%2520exploit%2520hierarchical%2520visual%2520cues%2520without%2520explicit%2520cross-layer%2520interaction%2520design.%2520In%2520this%2520work%252C%2520we%2520propose%2520a%2520Memory-Augmented%2520Adapter%2520%2528Mema%2529%2520within%2520the%2520vision%2520encoder.%2520Specifically%252C%2520Mema%2520maintains%2520a%2520stateful%2520memory%2520that%2520accumulates%2520hierarchical%2520visual%2520representations%2520across%2520layers%252C%2520with%2520its%2520evolution%2520conditioned%2520on%2520both%2520query%2520embeddings%2520and%2520step-wise%2520visual%2520features.%2520A%2520portion%2520of%2520this%2520memory%2520is%2520selectively%2520injected%2520into%2520token%2520representa ter%20%28Mema%29%20within%20the%20vision%20encoder.%20Specifically%2C%20Mema%20maintains%20a%20stateful%20memory%20that%20accumulates%20hierarchical%20visual%20representations%20across%20layers%2C%20with%20its%20evolution%20conditioned%20on%20both%20query%20embeddings%20and%20step-wise%20visual%20features.%20A%20portion%20of%20this%20memory%20is%20selectively%20injected%20into%20token%20representations%20via%20a%20feedback%20mechanism%2C%20thereby%20mitigating%20the%20attenuation%20of%20fine-grained%20visual%20cues%20from%20shallow%20layers.%20Designed%20as%20a%20lightweight%20and%20plug-and-play%20module%2C%20Mema%20integrates%20seamlessly%20into%20pretrained%20vision%20encoders%20without%20modifying%20the%20vanilla%20backbone%20architecture.%20Only%20a%20minimal%20set%20of%20additional%20parameters%20requires%20training%2C%20enabling%20adaptive%20visual%20feature%20refinement%20while%20reducing%20training%20overhead.%20Extensive%20experiments%20across%20multiple%20benchmarks%20demonstrate%20that%20Mema%20consistently%20improves%20performance%2C%20validating%20its%20effectiveness%20in%20complex%20multimodal%20reasoning%20tasks.%20The%20code%20have%20been%20released%20at%20https%3A//github.com/Sisiliu312/Mema.&entry.1838667208=http%3A//arxiv.org/abs/2603.00655v2&entry.124074799=Read"},
{"title": "Generative Anonymization in Event Streams", "author": "Adam T. M\u00fcller and Mihai Kocsis and Nicolaj C. Stache", "abstract": "Neuromorphic vision sensors offer low latency and high dynamic range, but their deployment in public spaces raises severe data protection concerns. Recent Event-to-Video (E2V) models can reconstruct high-fidelity intensity images from sparse event streams, inadvertently exposing human identities. Current obfuscation methods, such as masking or scrambling, corrupt the spatio-temporal structure, severely degrading data utility for downstream perception tasks. In this paper, to the best of our knowledge, we present the first generative anonymization framework for event streams to resolve this utility-privacy trade-off. By bridging the modality gap between asynchronous events and standard spatial generative models, our pipeline projects events into an intermediate intensity representation, leverages pretrained models to synthesize realistic, non-existent identities, and re-encodes the features back into the neuromorphic domain. Experiments demonstrate that our method reliably prevents identity recovery from E2V reconstructions while preserving the structural data integrity required for downstream vision tasks. Finally, to facilitate rigorous evaluation, we introduce a novel, synchronized real-world event and RGB dataset captured via precise robotic trajectories, providing a robust benchmark for future research in privacy-preserving neuromorphic vision.", "link": "http://arxiv.org/abs/2604.12803v1", "date": "2026-04-14", "relevancy": 2.8517, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5871}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5686}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5553}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generative%20Anonymization%20in%20Event%20Streams&body=Title%3A%20Generative%20Anonymization%20in%20Event%20Streams%0AAuthor%3A%20Adam%20T.%20M%C3%BCller%20and%20Mihai%20Kocsis%20and%20Nicolaj%20C.%20Stache%0AAbstract%3A%20Neuromorphic%20vision%20sensors%20offer%20low%20latency%20and%20high%20dynamic%20range%2C%20but%20their%20deployment%20in%20public%20spaces%20raises%20severe%20data%20protection%20concerns.%20Recent%20Event-to-Video%20%28E2V%29%20models%20can%20reconstruct%20high-fidelity%20intensity%20images%20from%20sparse%20event%20streams%2C%20inadvertently%20exposing%20human%20identities.%20Current%20obfuscation%20methods%2C%20such%20as%20masking%20or%20scrambling%2C%20corrupt%20the%20spatio-temporal%20structure%2C%20severely%20degrading%20data%20utility%20for%20downstream%20perception%20tasks.%20In%20this%20paper%2C%20to%20the%20best%20of%20our%20knowledge%2C%20we%20present%20the%20first%20generative%20anonymization%20framework%20for%20event%20streams%20to%20resolve%20this%20utility-privacy%20trade-off.%20By%20bridging%20the%20modality%20gap%20between%20asynchronous%20events%20and%20standard%20spatial%20generative%20models%2C%20our%20pipeline%20projects%20events%20into%20an%20intermediate%20intensity%20representation%2C%20leverages%20pretrained%20models%20to%20synthesize%20realistic%2C%20non-existent%20identities%2C%20and%20re-encodes%20the%20features%20back%20into%20the%20neuromorphic%20domain.%20Experiments%20demonstrate%20that%20our%20method%20reliably%20prevents%20identity%20recovery%20from%20E2V%20reconstructions%20while%20preserving%20the%20structural%20data%20integrity%20required%20for%20downstream%20vision%20tasks.%20Finally%2C%20to%20facilitate%20rigorous%20evaluation%2C%20we%20introduce%20a%20novel%2C%20synchronized%20real-world%20event%20and%20RGB%20dataset%20captured%20via%20precise%20robotic%20trajectories%2C%20providing%20a%20robust%20benchmark%20for%20future%20research%20in%20privacy-preserving%20neuromorphic%20vision.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12803v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGenerative%2520Anonymization%2520in%2520Event%2520Streams%26entry.906535625%3DAdam%2520T.%2520M%25C3%25BCller%2520and%2520Mihai%2520Kocsis%2520and%2520Nicolaj%2520C.%2520Stache%26entry.1292438233%3DNeuromorphic%2520vision%2520sensors%2520offer%2520low%2520latency%2520and%2520high%2520dynamic%2520range%252C%2520but%2520their%2520deployment%2520in%2520public%2520spaces%2520raises%2520severe%2520data%2520protection%2520concerns.%2520Recent%2520Event-to-Video%2520%2528E2V%2529%2520models%2520can%2520reconstruct%2520high-fidelity%2520intensity%2520images%2520from%2520sparse%2520event%2520streams%252C%2520inadvertently%2520exposing%2520human%2520identities.%2520Current%2520obfuscation%2520methods%252C%2520such%2520as%2520masking%2520or%2520scrambling%252C%2520corrupt%2520the%2520spatio-temporal%2520structure%252C%2520severely%2520degrading%2520data%2520utility%2520for%2520downstream%2520perception%2520tasks.%2520In%2520this%2520paper%252C%2520to%2520the%2520best%2520of%2520our%2520knowledge%252C%2520we%2520present%2520the%2520first%2520generative%2520anonymization%2520framework%2520for%2520event%2520streams%2520to%2520resolve%2520this%2520utility-privacy%2520trade-off.%2520By%2520bridging%2520the%2520modality%2520gap%2520between%2520asynchronous%2520events%2520and%2520standard%2520spatial%2520generative%2520models%252C%2520our%2520pipeline%2520projects%2520events%2520into%2520an%2520intermediate%2520intensity%2520representation%252C%2520leverages%2520pretrained%2520models%2520to%2520synthesize%2520realistic%252C%2520non-existent%2520identities%252C%2520and%2520re-encodes%2520the%2520features%2520back%2520into%2520the%2520neuromorphic%2520domain.%2520Experiments%2520demonstrate%2520that%2520our%2520method%2520reliably%2520prevents%2520identity%2520recovery%2520from%2520E2V%2520reconstructions%2520while%2520preserving%2520the%2520structural%2520data%2520integrity%2520required%2520for%2520downstream%2520vision%2520tasks.%2520Finally%252C%2520to%2520facilitate%2520rigorous%2520evaluation%252C%2520we%2520introduce%2520a%2520novel%252C%2520synchronized%2520real-world%2520event%2520and%2520RGB%2520dataset%2520captured%2520via%2520precise%2520robotic%2520trajectories%252C%2520providing%2520a%2520robust%2520benchmark%2520for%2520future%2520research%2520in%2520privacy-preserving%2520neuromorphic%2520vision.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.12803v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Generative%20Anonymization%20in%20Event%20Streams&entry.906535625=Adam%20T.%20M%C3%BCller%20and%20Mihai%20Kocsis%20and%20Nicolaj%20C.%20Stache&entry.1292438233=Neuromorphic%20vision%20sensors%20offer%20low%20latency%20and%20high%20dynamic%20range%2C%20but%20their%20deployment%20in%20public%20spaces%20raises%20severe%20data%20protection%20concerns.%20Recent%20Event-to-Video%20%28E2V%29%20models%20can%20reconstruct%20high-fidelity%20intensity%20images%20from%20sparse%20event%20streams%2C%20inadvertently%20exposing%20human%20identities.%20Current%20obfuscation%20methods%2C%20such%20as%20masking%20or%20scrambling%2C%20corrupt%20the%20spatio-temporal%20structure%2C%20severely%20degrading%20data%20utility%20for%20downstream%20perception%20tasks.%20In%20this%20paper%2C%20to%20the%20best%20of%20our%20knowledge%2C%20we%20present%20the%20first%20generative%20anonymization%20framework%20for%20event%20streams%20to%20resolve%20this%20utility-privacy%20trade-off.%20By%20bridging%20the%20modality%20gap%20between%20asynchronous%20events%20and%20standard%20spatial%20generative%20models%2C%20our%20pipeline%20projects%20events%20into%20an%20intermediate%20intensity%20representation%2C%20leverage {"title": "Representation geometry shapes task performance in vision-language modeling for CT enterography", "author": "Cristian Minoccheri and Emily Wittrup and Kayvan Najarian and Ryan Stidham", "abstract": "Computed tomography (CT) enterography is a primary imaging modality for assessing inflammatory bowel disease (IBD), yet the representational choices that best support automated analysis of this modality are unknown. We present the first study of vision-language transfer learning on abdominal CT enterography and identify two main findings. First, mean pooling of slice embeddings gives better categorical disease assessment (59.2\\% three-class accuracy), whereas attention pooling gives better cross-modal retrieval (0.235 text-to-image MRR). This pattern holds across all LoRA configurations tested and suggests that the two aggregators emphasize different properties of the learned representation. Second, per-slice tissue contrast matters more than broader spatial coverage: multi-window RGB encoding, which maps complementary Hounsfield Unit windows to RGB channels, outperforms all strategies that increase spatial coverage through multiplanar sampling, and in this setting adding coronal and sagittal views reduces classification performance. For report generation, fine-tuning without retrieval context yields within-1 severity accuracy at the prevalence-matched chance level (70.4\\% vs.\\ 71\\% random), suggesting little learned ordering beyond the class distribution. Retrieval-augmented generation (RAG) improves this across all configurations, scoring 7--14 percentage points above the chance baseline and improving ordinal MAE from 0.98 to 0.80--0.89. A three-teacher pseudolabel framework enables all comparisons without expert annotations. Together, these findings provide the first baselines for this underexplored modality and offer practical guidance for building vision-language systems for volumetric medical imaging.", "link": "http://arxiv.org/abs/2604.13021v1", "date": "2026-04-14", "relevancy": 2.821, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5794}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5566}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5566}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Representation%20geometry%20shapes%20task%20performance%20in%20vision-language%20modeling%20for%20CT%20enterography&body=Title%3A%20Representation%20geometry%20shapes%20task%20performance%20in%20vision-language%20modeling%20for%20CT%20enterography%0AAuthor%3A%20Cristian%20Minoccheri%20and%20Emily%20Wittrup%20and%20Kayvan%20Najarian%20and%20Ryan%20Stidham%0AAbstract%3A%20Computed%20tomography%20%28CT%29%20enterography%20is%20a%20primary%20imaging%20modality%20for%20assessing%20inflammatory%20bowel%20disease%20%28IBD%29%2C%20yet%20the%20representational%20choices%20that%20best%20support%20automated%20analysis%20of%20this%20modality%20are%20unknown.%20We%20present%20the%20first%20study%20of%20vision-language%20transfer%20learning%20on%20abdominal%20CT%20enterography%20and%20identify%20two%20main%20findings.%20First%2C%20mean%20pooling%20of%20slice%20embeddings%20gives%20better%20categorical%20disease%20assessment%20%2859.2%5C%25%20three-class%20accuracy%29%2C%20whereas%20attention%20pooling%20gives%20better%20cross-modal%20retrieval%20%280.235%20text-to-image%20MRR%29.%20This%20pattern%20holds%20across%20all%20LoRA%20configurations%20tested%20and%20suggests%20that%20the%20two%20aggregators%20emphasize%20different%20properties%20of%20the%20learned%20representation.%20Second%2C%20per-slice%20tissue%20contrast%20matters%20more%20than%20broader%20spatial%20coverage%3A%20multi-window%20RGB%20enc

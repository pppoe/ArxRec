{"title": "A Comparison of Reinforcement Learning and Optimal Control Methods for Path Planning", "author": "Qiang Le and Yaguang Yang and Isaac E. Weintraub", "abstract": "Path-planning for autonomous vehicles in threat-laden environments is a fundamental challenge. While traditional optimal control methods can find ideal paths, the computational time is often too slow for real-time decision-making. To solve this challenge, we propose a method based on Deep Deterministic Policy Gradient (DDPG) and model the threat as a simple, circular `no-go' zone. A mission failure is claimed if the vehicle enters this `no-go' zone at any time or does not reach a neighborhood of the destination. The DDPG agent is trained to learn a direct mapping from its current state (position and velocity) to a series of feasible actions that guide the agent to safely reach its goal. A reward function and two neural networks, critic and actor, are used to describe the environment and guide the control efforts. The DDPG trains the agent to find the largest possible set of starting points (``feasible set'') wherein a safe path to the goal is guaranteed. This provides critical information for mission planning, showing beforehand whether a task is achievable from a given starting point, assisting pre-mission planning activities. The approach is validated in simulation. A comparison between the DDPG method and a traditional optimal control (pseudo-spectral) method is carried out. The results show that the learning-based agent may produce effective paths while being significantly faster, making it a better fit for real-time applications. However, there are areas (``infeasible set'') where the DDPG agent cannot find paths to the destination, and the paths in the feasible set may not be optimal. These preliminary results guide our future research: (1) improve the reward function to enlarge the DDPG feasible set, (2) examine the feasible set obtained by the pseudo-spectral method, and (3) investigate the arc-search IPM method for the path planning problem.", "link": "http://arxiv.org/abs/2604.12628v1", "date": "2026-04-14", "relevancy": 2.1155, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5544}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5179}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5077}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Comparison%20of%20Reinforcement%20Learning%20and%20Optimal%20Control%20Methods%20for%20Path%20Planning&body=Title%3A%20A%20Comparison%20of%20Reinforcement%20Learning%20and%20Optimal%20Control%20Methods%20for%20Path%20Planning%0AAuthor%3A%20Qiang%20Le%20and%20Yaguang%20Yang%20and%20Isaac%20E.%20Weintraub%0AAbstract%3A%20Path-planning%20for%20autonomous%20vehicles%20in%20threat-laden%20environments%20is%20a%20fundamental%20challenge.%20While%20traditional%20optimal%20control%20methods%20can%20find%20ideal%20paths%2C%20the%20computational%20time%20is%20often%20too%20slow%20for%20real-time%20decision-making.%20To%20solve%20this%20challenge%2C%20we%20propose%20a%20method%20based%20on%20Deep%20Deterministic%20Policy%20Gradient%20%28DDPG%29%20and%20model%20the%20threat%20as%20a%20simple%2C%20circular%20%60no-go%27%20zone.%20A%20mission%20failure%20is%20claimed%20if%20the%20vehicle%20enters%20this%20%60no-go%27%20zone%20at%20any%20time%20or%20does%20not%20reach%20a%20neighborhood%20of%20the%20destination.%20The%20DDPG%20agent%20is%20trained%20to%20learn%20a%20direct%20mapping%20from%20its%20current%20state%20%28position%20and%20velocity%29%20to%20a%20series%20of%20feasible%20actions%20that%20guide%20the%20agent%20to%20safely%20reach%20its%20goal.%20A%20reward%20function%20and%20two%20neural%20networks%2C%20critic%20and%20actor%2C%20are%20used%20to%20describe%20the%20environment%20and%20guide%20the%20control%20efforts.%20The%20DDPG%20trains%20the%20agent%20to%20find%20the%20largest%20possible%20set%20of%20starting%20points%20%28%60%60feasible%20set%27%27%29%20wherein%20a%20safe%20path%20to%20the%20goal%20is%20guaranteed.%20This%20provides%20critical%20information%20for%20mission%20planning%2C%20showing%20beforehand%20whether%20a%20task%20is%20achievable%20from%20a%20given%20starting%20point%2C%20assisting%20pre-mission%20planning%20activities.%20The%20approach%20is%20validated%20in%20simulation.%20A%20comparison%20between%20the%20DDPG%20method%20and%20a%20traditional%20optimal%20control%20%28pseudo-spectral%29%20method%20is%20carried%20out.%20The%20results%20show%20that%20the%20learning-based%20agent%20may%20produce%20effective%20paths%20while%20being%20significantly%20faster%2C%20making%20it%20a%20better%20fit%20for%20real-time%20applications.%20However%2C%20there%20are%20areas%20%28%60%60infeasible%20set%27%27%29%20where%20the%20DDPG%20agent%20cannot%20find%20paths%20to%20the%20destination%2C%20and%20the%20paths%20in%20the%20feasible%20set%20may%20not%20be%20optimal.%20These%20preliminary%20results%20guide%20our%20future%20research%3A%20%281%29%20improve%20the%20reward%20function%20to%20enlarge%20the%20DDPG%20feasible%20set%2C%20%282%29%20examine%20the%20feasible%20set%20obtained%20by%20the%20pseudo-spectral%20method%2C%20and%20%283%29%20investigate%20the%20arc-search%20IPM%20method%20for%20the%20path%20planning%20problem.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12628v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Comparison%2520of%2520Reinforcement%2520Learning%2520and%2520Optimal%2520Control%2520Methods%2520for%2520Path%2520Planning%26entry.906535625%3DQiang%2520Le%2520and%2520Yaguang%2520Yang%2520and%2520Isaac%2520E.%2520 20a%20method%20based%20on%20Deep%20Deterministic%20Policy%20Gradient%20%28DDPG%29%20and%20model%20the%20threat%20as%20a%20simple%2C%20circular%20%60no-go%27%20zone.%20A%20mission%20failure%20is%20claimed%20if%20the%20vehicle%20enters%20this%20%60no-go%27%20zone%20at%20any%20time%20or%20does%20not%20reach%20a%20neighborhood%20of%20the%20destination.%20The%20DDPG%20agent%20is%20trained%20to%20learn%20a%20direct%20mapping%20from%20its%20current%20state%20%28position%20and%20velocity%29%20to%20a%20series%20of%20feasible%20actions%20that%20guide%20the%20agent%20to%20safely%20reach%20its%20goal.%20A%20reward%20function%20and%20two%20neural%20networks%2C%20critic%20and%20actor%2C%20are%20used%20to%20describe%20the%20environment%20and%20guide%20the%20control%20efforts.%20The%20DDPG%20trains%20the%20agent%20to%20find%20the%20largest%20possible%20set%20of%20starting%20points%20%28%60%60feasible%20set%27%27%29%20wherein%20a%20safe%20path%20to%20the%20goal%20is%20guaranteed.%20This%20provides%20critical%20information%20for%20mission%20planning%2C%20showing%20beforehand%20whether%20a%20task%20is%20achievable%20from%20a%20given%20starting%20point%2C%20assisting%20pre-mission%20planning%20activities.%20The%20approach%20is%20validated%20in%20simulation.%20A%20comparison%20between%20the%20DDPG%20method%20and%20a%20traditional%20optimal%20control%20%28pseudo-spectral%29%20method%20is%20carried%20out.%20The%20results%20show%20that%20the%20learning-based%20agent%20may%20produce%20effective%20paths%20while%20being%20significantly%20faster%2C%20making%20it%20a%20better%20fit%20for%20real-time%20applications.%20However%2C%20there%20are%20areas%20%28%60%60infeasible%20set%27%27%29%20where%20the%20DDPG%20agent%20cannot%20find%20paths%20to%20the%20destination%2C%20and%20the%20paths%20in%20the%20feasible%20set%20may%20not%20be%20optimal.%20These%20preliminary%20results%20guide%20our%20future%20research%3A%20%281%29%20improve%20the%20reward%20function%20to%20enlarge%20the%20DDPG%20feasible%20set%2C%20%282%29%20examine%20the%20feasible%20set%20obtained%20by%20the%20pseudo-spectral%20method%2C%20and%20%283%29%20investigate%20the%20arc-search%20IPM%20method%20for%20the%20path%20planning%20problem.&entry.1838667208=http%3A//arxiv.org/abs/2604.12628v1&entry.124074799=Read"},
{"title": "CamReasoner: Reinforcing Camera Movement Understanding via Structured Spatial Reasoning", "author": "Hang Wu and Yujun Cai and Zehao Li and Haonan Ge and Bowen Sun and Junsong Yuan and Yiwei Wang", "abstract": "Understanding camera dynamics is a fundamental pillar of video spatial intelligence. However, existing multimodal models predominantly treat this task as a black-box classification, often confusing physically distinct motions by relying on superficial visual patterns rather than geometric cues. We present \\textbf{CamReasoner}, a framework that reformulates camera movement understanding as a structured inference process to bridge the gap between perception and cinematic logic. Our approach centers on the Observation-Thinking-Answer (O-T-A) paradigm, which compels the model to articulate spatio-temporal observations and reason about motion patterns within an explicit reasoning block. To instill this capability, we construct a Large-scale Inference Trajectory Suite comprising 18k SFT reasoning chains and 38k RL feedback samples. To the best of our knowledge, \\textbf{we are the first to employ RL for logical alignment in camera movement understanding}, ensuring motion inferences are grounded in structured visual reasoning rather than contextual guesswork. Built upon Qwen2.5-VL-7B, CamReasoner-7B improves binary classification accuracy from 73.8\\% to 78.4\\% and VQA accuracy from 60.9\\% to 74.5\\% over its backbone, consistently outperforming both proprietary and open-source baselines across multiple benchmarks.", "link": "http://arxiv.org/abs/2602.00181v3", "date": "2026-04-14", "relevancy": 1.8186, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6372}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5974}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5973}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CamReasoner%3A%20Reinforcing%20Camera%20Movement%20Understanding%20via%20Structured%20Spatial%20Reasoning&body=Title%3A%20CamReasoner%3A%20Reinforcing%20Camera%20Movement%20Understanding%20via%20Structured%20Spatial%20Reasoning%0AAuthor%3A%20Hang%20Wu%20and%20Yujun%20Cai%20and%20Zehao%20Li%20and%20Haonan%20Ge%20and%20Bowen%20Sun%20and%20Junsong%20Yuan%20and%20Yiwei%20Wang%0AAbstract%3A%20Understanding%20camera%20dynamics%20is%20a%20fundamental%20pillar%20of%20video%20spatial%20intelligence.%20However%2C%20existing%20multimodal%20models%20predominantly%20treat%20this%20task%20as%20a%20black-box%20classification%2C%20often%20confusing%20physically%20distinct%20motions%20by%20relying%20on%20superficial%20visual%20patterns%20rather%20than%20geometric%20cues.%20We%20present%20%5Ctextbf%7BCamReasoner%7D%2C%20a%20framework%20that%20reformulates%20camera%20movement%20understanding%20as%20a%20structured%20inference%20process%20to%20bridge%20the%20gap%20between%20perception%20and%20cinematic%20logic.%20Our%20approach%20centers%20on%20the%20Observation-Thinking-Answer%20%28O-T-A%29%20paradigm%2C%20which%20compels%20the%20model%20to%20articulate%20spatio-temporal%20observations%20and%20reason%20about%20motion%20patterns%20within%20an%20explicit%20reasoning%20block.%20To%20instill%20this%20capability%2C%20we%20construct%20a%20Large-scale%20Inference%20Trajectory%20Suite%20comprising%2018k%20SFT%20reasoning%20chains%20and%2038k%20RL%20feedback%20samples.%20To%20the%20best%20of%20our%20knowledge%2C%20%5Ctextbf%7Bwe%20are%20the%20first%20to%20employ%20RL%20for%20logical%20alignment%20in%20camera%20movement%20understanding%7D%2C%20ensuring%20motion%20inferences%20are%20grounded%20in%20structured%20visual%20reasoning%20rather%20than%20contextual%20guesswork.% {"title": "Listening Deepfake Detection: A New Perspective Beyond Speaking-Centric Forgery Analysis", "author": "Miao Liu and Fangda Wei and Jing Wang and Xinyuan Qian", "abstract": "Existing deepfake detection research has primarily focused on scenarios where the manipulated subject is actively speaking, i.e., generating fabricated content by altering the speaker's appearance or voice. However, in realistic interaction settings, attackers often alternate between falsifying speaking and listening states to mislead their targets, thereby enhancing the realism and persuasiveness of the scenario. Although the detection of 'listening deepfakes' remains largely unexplored and is hindered by a scarcity of both datasets and methodologies, the relatively limited quality of synthesized listening reactions presents an excellent breakthrough opportunity for current deepfake detection efforts. In this paper, we present the task of Listening Deepfake Detection (LDD). We introduce ListenForge, the first dataset specifically designed for this task, constructed using five Listening Head Generation (LHG) methods. To address the distinctive characteristics of listening forgeries, we propose MANet, a Motion-aware and Audio-guided Network that captures subtle motion inconsistencies in listener videos while leveraging speaker's audio semantics to guide cross-modal fusion. Extensive experiments demonstrate that existing Speaking Deepfake Detection (SDD) models perform poorly in listening scenarios. In contrast, MANet achieves significantly superior performance on ListenForge. Our work highlights the necessity of rethinking deepfake detection beyond the traditional speaking-centric paradigm and opens new directions for multimodal forgery analysis in interactive communication settings. The dataset and code are available at https://anonymous.4open.science/r/LDD-B4CB.", "link": "http://arxiv.org/abs/2604.12650v1", "date": "2026-04-14", "relevancy": 1.7833, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.458}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4492}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4376}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Listening%20Deepfake%20Detection%3A%20A%20New%20Perspective%20Beyond%20Speaking-Centric%20Forgery%20Analysis&body=Title%3A%20Listening%20Deepfake%20Detection%3A%20A%20New%20Perspective%20Beyond%20Speaking-Centric%20Forgery%20Analysis%0AAuthor%3A%20Miao%20Liu%20and%20Fangda%20Wei%20and%20Jing%20Wang%20and%20Xinyuan%20Qian%0AAbstract%3A%20Existing%20deepfake%20detection%20research%20has%20primarily%20focused%20on%20scenarios%20where%20the%20manipulated%20subject%20is%20actively%20speaking%2C%20i.e.%2C%20generating%20fabricated%20content%20by%20altering%20the%20speaker%27s%20appearance%20or%20voice.%20However%2C%20in%20realistic%20interaction%20settings%2C%20attackers%20often%20alternate%20between%20falsifying%20speaking%20and%20listening%20states%20to%20mislead%20their%20targets%2C%20thereby%20enhancing%20the%20realism%20and%20persuasiveness%20of%20the%20scenario.%20Although%20the%20detection%20of%20%27listening%20deepfakes%27%20remains%20largely%20unexplored%20and%20is%20hindered%20by%20a%20scarcity%20of%20both%20datasets%20and%20methodologies%2C%20the%20relatively%20limited%20quality%20of%20synthesized%20listening%20reactions%20presents%20an%20excellent%20breakthrough%20opportunity%20for%20current%20deepfake%20detection%20efforts.%20In%20this%20paper%2C%20we%20present%20the%20task%20of%20Listening%20Deepfake%20Detection%20%28LDD%29.%20We%20introduce%20ListenForge%2C%20the%20first%20dataset%20specifically%20designed%20for%20this%20task%2C%20constructed%20using%20five%20Listening%20Head%20Generation%20%28LHG%29%20methods.%20To%20address%20the%20distinctive%20characteristics%20of%20listening%20forgeries%2C%20we%20propose%20MANet%2C%20a%20Motion-aware%20and%20Audio-guided%20Network%20that%20captures%20subtle%20motion%20inconsistencies%20in%20listener%20videos%20while%20leveraging%20speaker%27s%20audio%20semantics%20to%20guide%20cross-modal%20fusion.%20Extensive%20experiments%20demonstrate%20that%20existing%20Speaking%20Deepfake%20Detection%20%28SDD%29%20models%20perform%20poorly%20in%20listening%20scenarios.%20In%20contrast%2C%20MANet%20achieves%20significantly%20superior%20performance%20on%20ListenForge.%20Our%20work%20highlights%20the%20necessity%20of%20rethinking%20deepfake%20detection%20beyond%20the%20traditional%20speaking-centric%20paradigm%20and%20opens%20new%20directions%20for%20multimodal%20forgery%20analysis%20in%20interactive%20communication%20settings.%20The%20dataset%20and%20code%20are%20available%20at%20https%3A//anonymous.4open.science/r/LDD-B4CB.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12650v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DListening%2520Deepfake%2520Detection%253A%2520A%2520New%2520Perspective%2520Beyond%2520Speaking-Centric%2520Forgery%2520Analysis%26entry.906535625%3DMiao%2520Liu%2520and%2520Fangda%2520Wei%2520and%2520Jing%2520Wang%2520and%2520Xinyuan%2520Qian%26entry.1292438233%3DExisting%2520deepfake%2520detection%2520research%2520has%2520primarily%2520focused%2520on%2520scenarios%2520where%2520the%2520manipulated%2520subject%2520is%2520actively%2520speaking%252C%2520i.e.%252C%2520generating%2520fabricated%2520content%2520by%2520altering%2520the%2520speaker%2527s%2520appearance%2520or%2520voice.%2520However%252C%2520in%2520realistic%2520interaction%2520settings%252C%2520attackers%2520often%2520alternate%2520between%2520falsifying%2520speaking%2520and%2520listeni {"title": "VFA: Relieving Vector Operations in Flash Attention with Global Maximum Pre-computation", "author": "Yupeng Sun and Yanzhao Li and Zhiqiang Zou and Bai Du and Zhiyuan Zhang and Hui Dong and Gaoyige Fan and Hui Wang", "abstract": "FlashAttention-style online softmax enables exact attention computation with linear memory by streaming score tiles through on-chip memory and maintaining a running maximum and normalizer. However, as attention kernels approach peak tensor-core/cube-core throughput on modern accelerators, non-matmul components of online softmax -- especially per-tile rowmax and rowsum reductions and rescale chains -- can become vector or SIMD limited and dominate latency. This paper revisits FlashAttention and proposes Vector Relieved Flash Attention (VFA), a hardware-friendly method that reduces rowmax-driven updates of the running maximum while retaining the online-softmax structure. VFA initializes the running maximum via a cheap approximation from key-block representations, reorders key-block traversal to prioritize high-impact sink and local blocks, and freezes the maximum for remaining blocks to avoid repeated reductions and rescaling. We further integrate VFA with block-sparse skipping methods such as BLASST to form Vector Relieved Sparse Attention (VSA), which reduces both block count and per-block overhead. Notably, VFA and VSA completely avoid the conditional rescale operation in the update stage used in FA4.0. Extensive evaluations on benchmarks including MMLU and MATH500, together with attention statistics, verify our design: (i) sink and local reordering stabilizes the running maximum early; (ii) simple Q and K block summaries fail due to intra-block heterogeneity; (iii) m-initialization is required when maxima appear in middle blocks. Overall, VFA and VSA efficiently alleviate online-softmax reduction bottlenecks without performance loss. Compared to the C16V32 baseline, C8V32, C4V32 and C4V16 achieve nearly two times speedup on modern hardware while hitting the vector bottleneck. With upcoming architecture improvements, C4V16 will deliver six times speedup by enhancing exponent capacity.", "link": "http://arxiv.org/abs/2604.12798v1", "date": "2026-04-14", "relevancy": 1.497, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5197}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4913}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4551}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VFA%3A%20Relieving%20Vector%20Operations%20in%20Flash%20Attention%20with%20Global%20Maximum%20Pre-computation&body=Title%3A%20VFA%3A%20Relieving%20Vector%20Operations%20in%20Flash%20Attention%20with%20Global%20Maximum%20Pre-computation%0AAuthor%3A%20Yupeng%20Sun%20and%20Yanzhao%20Li%20and%20Zhiqiang%20Zou%20and%20Bai%20Du%20and%20Zhiyuan%20Zhang%20and%20Hui%20Dong%20and%20Gaoyige%20Fan%20and%20Hui%20Wang%0AAbstract%3A%20FlashAttention-style%20online%20softmax%20enables%20exact%20attention%20computation%20with%20linear%20memory%20by%20streaming%20score%20tiles%20through%20on-chip%20memory%20and%20maintaining%20a%20running%20maximum%20and%20normalizer.%20However%2C%20as%20attention%20kernels%20approach%20peak%20tensor-core/cube-core%20throughput%20on%20modern%20accelerators%2C%20non-matmul%20components%20of%20online%20softmax%20--%20especially%20per-tile%20rowmax%20and%20rowsum%20reductions%20and%20rescale%20chains%20--%20can%20become%20vector%20or%20SIMD%20limited%20and%20dominate%20latency.%20This%20paper%20revisits%20FlashAttention%20and%20proposes%20Vector%20Relieved%20Flash%20Attention%20%28VFA%29%2C%20a%20hardware-friendly%20method%20that%20reduces%20rowmax-driven%20updates%20of%20the%20running%20maximum%20while%20retaining%20the%20online-softmax%20structure.%20VFA%20initializes%20the%20running%20maximum%20via%20a%20cheap%20approximation%20from%20key-block%20representations%2C%20reorders%20key-block%20traversal%20to%20prioritize%20high-impact%20sink%20and%20local%20blocks%2C%20and%20freezes%20the%20maximum%20for%20remaining%20blocks%20to%20avoid%20repeated%20reductions%20and%20rescaling.%20We%20further%20integrate%20VFA%20with%20block-sparse%20skipping%20methods%20such%20as%20BLASST%20to%20form%20Vector%20Relieved%20Sparse%20Attention%20%28VSA%29%2C%20which%20reduces%20both%20block%20count%20and%20per-block%20overhead.%20Notably%2C%20VFA%20and%20VSA%20completely%20avoid%20the%20conditional%20rescale%20operation%20in%20the%20update%20stage%20used%20in%20FA4.0.%20Extensive%20evaluations%20on%20benchmarks%20including%20MMLU%20and%20MATH500%2C%20together%20with%20attention%20statistics%2C%20verify%20our%20design%3A%20%28i%29%20sink%20and%20local%20reordering%20stabilizes%20the%20running%20maximum%20early%3B%20%28ii%29%20simple%20Q%20and%20K%20block%20summaries%20fail%20due%20to%20intra-block%20heterogeneity%3B%20%28iii%29%20m-initialization%20is%20required%20when%20maxima%20appear%20in%20middle%20blocks.%20Overall%2C%20VFA%20and%20VSA%20efficiently%20alleviate%20online-softmax%20reduction%20bottlenecks%20without%20performance%20loss.%20Compared%20to%20the%20C16V32%20baseline%2C%20C8V32%2C%20C4V32%20and%20C4V16%20achieve%20nearly%20two%20times%20speedup%20on%20modern%20hardware%20while%20hitting%20the%20vector%20bottleneck.%20With%20upcoming%20architecture%20improvements%2C%20C4V16%20will%20deliver%20six%20times%20speedup%20by%20enhancing%20exponent%20capacity.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12798v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVFA%253A%2520Relieving%2520Vector%2520Operations%2520in%2520Flash%2520Attention%2520with%2520Global%2520Maximum% {"title": "Climate Model Tuning with Online Synchronization-Based Parameter Estimation", "author": "Jordan Seneca and Suzanne Bintanja and Frank M. Selten", "abstract": "In climate science, the tuning of climate models is a computationally intensive problem due to the combination of the high-dimensionality of the system state and long integration times. Supermodelling is a technique which has shown the potential for reducing climate model biases by dynamically coupling multiple models together, and training their coupling on a short timescale. Here, we introduce a new approach called \\emph{adaptive supermodeling}, where the internal model parameters of the member of a supermodel are tuned. We perform three experiments. We first directly optimize the internal parameters of a climate model. We then optimize the weights between two members of a supermodel in a classical supermodel approach. For a case designed to challenge the two previous methods, we implement adaptive supermodeling, which achieves a performance similar to a perfect model.", "link": "http://arxiv.org/abs/2510.06180v2", "date": "2026-04-14", "relevancy": 1.3639, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.4677}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.465}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4453}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Climate%20Model%20Tuning%20with%20Online%20Synchronization-Based%20Parameter%20Estimation&body=Title%3A%20Climate%20Model%20Tuning%20with%20Online%20Synchronization-Based%20Parameter%20Estimation%0AAuthor%3A%20Jordan%20Seneca%20and%20Suzanne%20Bintanja%20and%20Frank%20M.%20Selten%0AAbstract%3A%20In%20climate%20science%2C%20the%20tuning%20of%20climate%20models%20is%20a%20computationally%20intensive%20problem%20due%20to%20the%20combination%20of%20the%20high-dimensionality%20of%20the%20system%20state%20and%20long%20integration%20times.%20Supermodelling%20is%20a%20technique%20which%20has%20shown%20the%20potential%20for%20reducing%20climate%20model%20biases%20by%20dynamically%20coupling%20multiple%20models%20together%2C%20and%20training%20their%20coupling%20on%20a%20short%20timescale.%20Here%2C%20we%20introduce%20a%20new%20approach%20called%20%5Cemph%7Badaptive%20supermodeling%7D%2C%20where%20the%20internal%20model%20parameters%20of%20the%20member%20of%20a%20supermodel%20are%20tuned.%20We%20perform%20three%20experiments.%20We%20first%20directly%20optimize%20the%20internal%20parameters%20of%20a%20climate%20model.%20We%20then%20optimize%20the%20weights%20between%20two%20members%20of%20a%20supermodel%20in%20a%20classical%20supermodel%20approach.%20For%20a%20case%20designed%20to%20challenge%20the%20two%20previous%20methods%2C%20we%20implement%20adaptive%20supermodeling%2C%20which%20achieves%20a%20performance%20similar%20to%20a%20perfect%20model.%0ALink%3A%20http%3A//arxiv.org/abs/2510.06180v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DClimate%2520Model%2520Tuning%2520with%2520Online%2520Synchronization-Based%2520Parameter%2520Estimation%26entry.906535625%3DJordan%2520Seneca%2520and%2520Suzanne%2520Bintanja%2520and%2520Frank%2520M.%2520Selten%26entry.1292438233%3DIn%2520climate%2520science%252C%2520the%2520tuning%2520of%2520climate%2520models%2520is%2520a%2520computationally%2520intensive%2520problem%2520due%2520to%2520the%2520combination%2520of%2520the%2520high-dimensionality%2520of%2520the%2520system%2520state%2520and%2520long%2520integration%2520times.%2520Supermodelling%2520is%2520a%2520technique%2520which%2520has%2520shown%2520the%2520potential%2520for%2520reducing%2520climate%2520model%2520biases%2520by%2520dynamically%2520coupling%2520multiple%2520models%2520together%252C%2520and%2520training%2520their%2520coupling%2520on%2520a%2520short%2520timescale.%2520Here%252C%2520we%2520introduce%2520a%2520new%2520approach%2520called%2520%255Cemph%257Badaptive%2520supermodeling%257D%252C%2520where%2520the%2520internal%2520model%2520parameters%2520of%2520the%2520member%2520of%2520a%2520supermodel%2520are%2520tuned.%2520We%2520perform%2520three%2520experiments.%2520We%2520first%2520directly%2520optimize%2520the%2520internal%2520parameters%2520of%2520a%2520climate%2520model.%2520We%2520then%2520optimize%2520the%2520weights%2520between%2520two%2520members%2520of%2520a%2520supermodel%2520in%2520a%2520classical%2520supermodel%2520approach.%2520For%2520a%2520case%2520designed%2520to%2520challenge%2520the%2520two%2520previous%2520methods%252C%2520we%2520implement%2520adaptive%2520supermodeling%252C%2520which%2520achieves%2520a%2520performance%2520similar%2520to%2520a%2520perfect%2520model.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2510.06180v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Climate%20Model%20Tuning%20with%20Online%20Synchronization-Based%20Parameter%20Estimation&entry.906535625=Jordan%20Seneca%20and%20Suzanne%20Bintanja%20and%20Frank%20M.%20Selten&entry.1292438233=In%20climate%20science%2C%20the%20tuning%20of%20climate%20models%20is%20a%20computationally%20intensive%20problem%20due%20to%20the%20combination%20of%20the%20high-dimensionality%20of%20the%20system%20state%20and%20long%20integration%20times.%20Supermodelling%20is%20a%20technique%20which%20has%20shown%20the%20potential%20for%20reducing%20climate%20model%20biases%20by%20dynamically%20coupling%20multiple%20models%20together%2C%20and%20training%20their%20coupling%20on%20a%20short%20timescale.%20Here%2C%20we%20introduce%20a%20new%20approach%20called%20%5Cemph%7Badaptive%20supermodeling%7D%2C%20where% {"title": "Actuation space reduction to facilitate insightful shape matching in a novel reconfigurable tendon driven continuum manipulator", "author": "Sabyasachi Dash and John Golden and Girish Krishnan", "abstract": "In tendon driven continuum manipulators (TDCMs), reconfiguring the tendon routing enables tailored spatial deformation of the backbone. This work presents a design in which tendons can be rerouted either prior to or after actuation by actively rotating the individual spacer disks. Each disk rotation thus adds a degree of freedom to the actuation space, complicating the mapping from a desired backbone curve to the corresponding actuator inputs. However, when the backbone shape is projected into an intermediate space defined by curvature and torsion (C-T), patterns emerge that highlight which disks are most influential in achieving a global shape. This insight enables a simplified, sequential shape-matching strategy: first, the proximal and intermediate disks are rotated to approximate the global shape; then, the distal disks are adjusted to fine-tune the end-effector position with minimal impact on the overall shape. The proposed actuation framework offers a model-free alternative to conventional control approaches, bypassing the complexities of modeling reconfigurable TDCMs.", "link": "http://arxiv.org/abs/2604.12792v1", "date": "2026-04-14", "relevancy": 1.9451, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5071}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4752}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.462}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Actuation%20space%20reduction%20to%20facilitate%20insightful%20shape%20matc {"title": "PianoFlow: Music-Aware Streaming Piano Motion Generation with Bimanual Coordination", "author": "Xuan Wang and Kai Ruan and Jiayi Han and kaiyue Zhou and Gaoang Wang", "abstract": "Audio-driven bimanual piano motion generation requires precise modeling of complex musical structures and dynamic cross-hand coordination. However, existing methods often rely on acoustic-only representations lacking symbolic priors, employ inflexible interaction mechanisms, and are limited to computationally expensive short-sequence generation. To address these limitations, we propose PianoFlow, a flow-matching framework for precise and coordinated bimanual piano motion synthesis. Our approach strategically leverages MIDI as a privileged modality during training, distilling these structured musical priors to achieve deep semantic understanding while maintaining audio-only inference. Furthermore, we introduce an asymmetric role-gated interaction module to explicitly capture dynamic cross-hand coordination through role-aware attention and temporal gating. To enable real-time streaming generation for arbitrarily long sequences, we design an autoregressive flow continuation scheme that ensures seamless cross-chunk temporal coherence. Extensive experiments on the PianoMotion10M dataset demonstrate that PianoFlow achieves superior quantitative and qualitative performance, while accelerating inference by over 9\\times compared to previous methods.", "link": "http://arxiv.org/abs/2604.12856v1", "date": "2026-04-14", "relevancy": 2.1908, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5995}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.518}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": {"title": "Dreamer-CDP: Improving Reconstruction-free World Models Via Continuous Deterministic Representation Prediction", "author": "Michael Hauri and Friedemann Zenke", "abstract": "Model-based reinforcement learning (MBRL) agents operating in high-dimensional observation spaces, such as Dreamer, rely on learning abstract representations for effective planning and control. Existing approaches typically employ reconstruction-based objectives in the observation space, which can render representations sensitive to task-irrelevant details. Recent alternatives trade reconstruction for auxiliary action prediction heads or view augmentation strategies, but perform worse in the Crafter environment than reconstruction-based methods. We close this gap between Dreamer and reconstruction-free models by introducing a JEPA-style predictor defined on continuous, deterministic representations. Our method matches Dreamer's performance on Crafter, demonstrating effective world model learning on this benchmark without reconstruction objectives.", "link": "http://arxiv.org/abs/2603.07083v2", "date": "2026-04-14", "relevancy": 2.0236, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5165}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5134}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4942}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dreamer-CDP%3A%20Improving%20Reconstruction-free%20World%20Models%20Via%20Continuous%20Deterministic%20Representation%20Prediction&body=Title%3A%20Dreamer-CDP%3A%20Improving%20Reconstruction-free%20World%20Models%20Via%20Continuous%20Deterministic%20Representation%20Prediction%0AAuthor%3A%20Michael%20Hauri%20a 520render%2520representations%2520sensitive%2520to%2520task-irrelevant%2520details.%2520Recent%2520alternatives%2520trade%2520reconstruction%2520for%2520auxiliary%2520action%2520prediction%2520heads%2520or%2520view%2520augmentation%2520strategies%252C%2520but%2520perform%2520worse%2520in%2520the%2520Crafter%2520environment%2520than%2520reconstruction-based%2520methods.%2520We%2520close%2520this%2520gap%2520between%2520Dreamer%2520and%2520reconstruction-free%2520models%2520by%2520introducing%2520a%2520JEPA-style%2520predictor%2520defined%2520on%2520continuous%252C%2520deterministic%2520representations.%2520Our%2520method%2520matches%2520Dreamer%2527s%2520performance%2520on%2520Crafter%252C%2520demonstrating%2520effective%2520world%2520model%2520learning%2520on%2520this%2520benchmark%2520without%2520reconstruction%2520objectives.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.07083v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Dreamer-CDP%3A%20Improving%20Reconstruction-free%20World%20Models%20Via%20Continuous%20Deterministic%20Representation%20Prediction&entry.906535625=Michael%20Hauri%20and%20Friedemann%20Zenke&entry.1292438233=Model-based%20reinforcement%20learning%20%28MBRL%29%20agents%20operating%20in%20high-dimensional%20observation%20spaces%2C%20such%20as%20Dreamer%2C%20rely%20on%20learning%20abstract%20representations%20for%20effective%20planning%20and%20control.%20Existing%20approaches%20typically%20employ%20reconstruction-based%20objectives%20in%20the%20observation%20space%2C%20which%20can%20render%20representations%20sensitive%20to%20task-irrelevant%20details.%20Recent%20alternatives%20trade%20reconstruction%20for%20auxiliary%20action%20prediction%20heads%20or%20view%20augmentation%20strategies%2C%20but%20perform%20worse%20in%20the%20Crafter%20environment%20than%20reconstruction-based%20methods.%20We%20close%20this%20gap%20between%20Dreamer%20and {"title": "Safe-FedLLM: Delving into the Safety of Federated Large Language Models", "author": "Mingxiang Tao and Yu Tian and Wenxuan Tu and Yue Yang and Xue Yang and Xiangyan Tang", "abstract": "Federated learning (FL) addresses privacy and data-silo issues in the training of large language models (LLMs). Most prior work focuses on improving the efficiency of federated learning for LLMs (FedLLM). However, security in open federated environments, particularly defenses against malicious clients, remains underexplored. To investigate the security of FedLLM, we conduct a preliminary study to analyze potential attack surfaces and defensive characteristics from the perspective of LoRA updates. We find two key properties of FedLLM: 1) LLMs are vulnerable to attacks from malicious clients in FL, and 2) LoRA updates exhibit distinct behavioral patterns that can be effectively distinguished by lightweight classifiers. Based on these properties, we propose Safe-FedLLM, a probe-based defense framework for FedLLM, which constructs defenses across three levels: Step-Level, Client-Level, and Shadow-Level. The core concept of Safe-FedLLM is to perform probe-based discrimination on each client's local LoRA updates, treating them as high-dimensional behavioral features and using a lightweight classifier to determine whether they are malicious. Extensive experiments demonstrate that Safe-FedLLM effectively improves FedLLM's robustness against malicious clients while maintaining competitive performance on benign data. Notably, our method effectively suppresses the impact of malicious data without significantly affecting training speed, and remains effective even under high malicious client ratios.", "link": "http://arxiv.org/abs/2601.07177v2", "date": "2026-04-14", "relevancy": 1.7671, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4649}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4409}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4334}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Safe-FedLLM%3A%20Delving%20into%20the%20Safety%20of%20Federated%20Large%20Language%20Models&body=Title%3A%20Safe-FedLLM%3A%20Delving%20into%20the%20Safety%20of%20Federated%20Large%20Language%20Models%0AAuthor%3A%20Mingxiang%20Tao%20and%20Yu%20Tian%20and%20Wenxuan%20Tu%20and%20Yue%20Yang%20and%20Xue%20Yang%20and%20Xiangyan%20Tang%0AAbstract%3A%20Federated%20learning%20%28FL%29%20addresses%20privacy%20and%20data-silo%20issues%20in%20the%20training%20of%20large%20language%20models%20%28LLMs%29.%20Most%20prior%20work%20focuses%20on%20improving%20the%20efficiency%20of%20federated%20learning%20for%20LLMs%20%28FedLLM%29.%20However%2C%20security%20in%20open%20federated%20environments%2C%20particularly%20defenses%20against%20malicious%20clients%2C%20remains%20underexplored.%20To%20investigate%20the%20security%20of%20FedLLM%2C%20we%20conduct%20a%20preliminary%20study%20to%20analyze%20potential%20attack%20surfaces%20and%20defensive%20characteristics%20from%20the%20perspective%20of%20LoRA%20updates.%20We%20find%20two%20key%20properties%20of%20FedLLM%3A%201%29%20LLMs%20are%20vulnerable%20to%20attacks%20from%20malicious%20clients%20in%20FL%2C%20and%202%29%20LoRA%20updates%20exhibit%20distinct%20behavioral%20patterns%20that%20can%20be%20effectively%20distinguished%20by%20lightweight%20classifiers.%20Based%20on%20these%20properties%2C%20we%20propose%20Safe-FedLLM%2C%20a%20probe-based%20defense%20framework%20for%20FedLLM%2C%20which%20constructs%20defenses%20across%20three%20levels%3A%20Step-Level%2C%20Client-Level%2C%20and%20Shadow-Level.%20The%20core%20concept%20of%20Safe-FedLLM%20is%20to%2 {"title": "Towards Generalized Certified Robustness with Multi-Norm Training", "author": "Enyi Jiang and David S. Cheung and Gagandeep Singh", "abstract": "Existing certified training methods can only train models to be robust against a certain perturbation type (e.g. $l_\\infty$ or $l_2$). However, an $l_\\infty$ certifiably robust model may not be certifiably robust against $l_2$ perturbation (and vice versa) and also has low robustness against other perturbations (e.g. geometric and patch transformation). By constructing a theoretical framework to analyze and mitigate the tradeoff, we propose the first multi-norm certified training framework \\textbf{CURE}, consisting of several multi-norm certified training methods, to attain better \\emph{union robustness} when training from scratch or fine-tuning a pre-trained certified model. Inspired by our theoretical findings, we devise bound alignment and connect natural training with certified training for better union robustness. Compared with SOTA-certified training, \\textbf{CURE} improves union robustness to $32.0\\%$ on MNIST, $25.8\\%$ on CIFAR-10, and $10.6\\%$ on TinyImagenet across different epsilon values. It leads to better generalization on a diverse set of challenging unseen geometric and patch perturbations to $6.8\\%$ and $16.0\\%$ on CIFAR-10. Overall, our contributions pave a path towards \\textit{generalized certified robustness}.", "link": "http://arxiv.org/abs/2410.03000v3", "date": "2026-04-14", "relevancy": 1.3866, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.502}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4513}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4506}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Generalized%20Certified%20Robustness%20with%20Multi-Norm%20Training&body=Title%3A%20Towards%20Generalized%20Certified%20Robustness%20with%20Multi-Norm%20Training%0AAuthor%3A%20Enyi%20Jiang%20and%20David%20S.%20Cheung%20and%20Gagandeep%20Singh%0AAbstract%3A%20Existing%20certified%20training%20methods%20can%20only%20train%20models%20to%20be%20robust%20against%20a%20certain%20perturbation%20type%20%28e.g.%20%24l_%5Cinfty%24%20or%20%24l_2%24%29.%20However%2C%20an%20%24l_%5Cinfty%24%20certifiably%20robust%20model%20may%20not%20be%20certifiably%20robust%20against%20%24l_2%24%20perturbation%20%28and%20vice%20versa%29%20and%20also%20has%20low%20robustness%20against%20other%20perturbations%20%28e.g.%20geometric%20and%20patch%20transformation%29.%20By%20constructing%20a%20theoretical%20framework%20to%20analyze%20and%20mitigate%20the%20tradeoff%2C%20we%20propose%20the%20first%20multi-norm%20certified%20training%20framework%20%5Ctextbf%7BCURE%7D%2C%20consisting%20of%20several%20multi-norm%20certified%20training%20methods%2C%20to%20attain%20better%20%5Cemph%7Bunion%20robustness%7D%20when%20training%20from%20scratch%20or%20fine-tuning%20a%20pre-trained%20certified%20model.%20Inspired%20by%20our%20theoretical%20findings%2C%20we%20devise%20bound%20alignment%20and%20connect%20natural%20training%20with%20certified%20training%20for%20better%20union%20robustness.%20Compared%20with%20SOTA-certified%20training%2C%20%5Ctextbf%7BCURE%7D%20improves%20union%20robustness%20to%20%2432.0%5C%25%24%20on%20MNIST%2C%20%2425.8%5C%25%24%20on%20CIFAR-10%2C%20and%20%2410.6%5C%25%24%20on%20TinyImagenet%20across%20different%20epsilon%20values.%20It%20leads%20to%20better%20generalization%20on%20a%20diverse%20set%20of%20challenging%20unseen%20geometric%20and%20patch%20perturbation       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

stic%7D%20unlike%20existing%20work%20that%20focuses%20on%20translation%20to%20a%20solver-specific%20model.%20To%20achieve%20this%2C%20we%20leverage%20%5Ctextsc%7BMiniZinc%7D%27s%20solver-and-paradigm-agnostic%20modeling%20capabilities%20to%20formulate%20combinatorial%20problems.%20We%20conduct%20comprehensive%20experiments%20to%20compare%20execution%20and%20solution%20accuracy%20across%20several%20single-%20and%20multi-call%20strategies%2C%20including%3B%20zero-shot%20prompting%2C%20chain-of-thought%20reasoning%2C%20intermediate%20representations%20via%20knowledge-graphs%2C%20grammar-based%20syntax%20encoding%2C%20and%20agentic%20approaches%20that%20decompose%20the%20model%20into%20sequential%20sub-tasks.%20Our%20co-pilot%20strategies%20are%20competitive%2C%20and%20in%20parts%20improve%2C%20recent%20research%20in%20this%20domain.%20Our%20findings%20indicate%20that%20while%20LLMs%20are%20promising%20they%20are%20not%20yet%20a%20push-button%20technology%20for%20combinatorial%20modeling.%20We%20contribute%20%5Ctextsc%7BText2Model%7D%20co-pilots%20and%20leaderboard%2C%20and%20%5Ctextsc%7BText2Zinc%7D%20and%20interactive%20editor%20to%20open-source%20to%20support%20closing%20this%20performance%20gap.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12955v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DModeling%2520Co-Pilots%2520for%2520Text-to-Model%2520Translation%26entry.906535625%3DSerdar%2520Kadioglu%2520and%2520Karthik%2520Uppuluri%2520and%2520Akash%2520Singirikonda%26entry.1292438233%3DThere%2520is%2520growing%2520interest%2520in%2520leveraging%2520large%2520language%2520models%2520%2528LLMs%2529%2520for%2520text-to-model%2520translation%2520and%2520optimization%2520tasks.%2520This%2520paper%2520aims%2520to%2520advance%2520this%2520line%2520of%2520research%2520by%2520introducing%2520%255Ctextsc%257BText2Model%257D%2520and%2520%255Ctextsc%257BText2Zinc%257D.%2520%255Ctextsc%257BText2Mode {"title": "Are Pretrained Image Matchers Good Enough for SAR-Optical Satellite Registration?", "author": "Isaac Corley and Alex Stoken and Gabriele Berton", "abstract": "Cross-modal optical-SAR (Synthetic Aperture Radar) registration is a bottleneck for disaster-response via remote sensing, yet modern image matchers are developed and benchmarked almost exclusively on natural-image domains. We evaluate twenty-four pretrained matcher families--in a zero-shot setting with no fine-tuning or domain adaptation on satellite or SAR data--on SpaceNet9 and two additional cross-modal benchmarks under a deterministic protocol with tiled large-image inference, robust geometric filtering, and tie-point-grounded metrics. Our results reveal asymmetric transfer--matchers with explicit cross-modal training do not uniformly outperform those without it. While XoFTR (trained for visible-thermal matching) and RoMa achieve the lowest reported mean error at $3.0$ px on the labeled SpaceNet9 training scenes, RoMa achieves this without any cross-modal training, and MatchAnything-ELoFTR ($3.4$ px)--trained on synthetic cross-modal pairs--matches closely, suggesting (as a working hypothesis) that foundation-model features (DINOv2) may contribute to modality invariance that partially substitutes for explicit cross-modal supervision. 3D-reconstruction matchers (MASt3R, DUSt3R), which are not designed for traditional 2D image matching, are highly protocol-sensitive and remain fragile under default settings. Deployment protocol choices (geometry model, tile size, inlier gating) shift accuracy by up to $33\\times$ for a single matcher, sometimes exceeding the effect of swapping matchers entirely within the evaluated sweep--affine geometry alone reduces mean error from $12.34$ to $9.74$ px. These findings inform both practical deployment of existing matchers and future matcher design for cross-modal satellite registration.", "link": "http://arxiv.org/abs/2604.10217v2", "date": "2026-04-14", "relevan {"title": "PromptEcho: Annotation-Free Reward from Vision-Language Models for Text-to-Image Reinforcement Learning", "author": "Jinlong Liu and Wanggui He and Peng Zhang and Mushui Liu and Hao Jiang and Pipei Huang", "abstract": "Reinforcement learning (RL) can improve the prompt following capability of text-to-image (T2I) models, yet obtaining high-quality reward signals remains challenging: CLIP Score is too coarse-grained, while VLM-based reward models (e.g., RewardDance) require costly human-annotated preference data and additional fine-tuning. We propose PromptEcho, a reward construction method that requires \\emph{no} annotation and \\emph{no} reward model training. Given a generated image and a guiding query, PromptEcho computes the token-level cross-entropy loss of a frozen VLM with the original prompt as the label, directly extracting the image-text alignment knowledge encoded during VLM pretraining. The reward is deterministic, computationally efficient, and improves automatically as stronger open-source VLMs become available. For evaluation, we develop DenseAlignBench, a benchmark of concept-rich dense captions for rigorously testing prompt following capability. Experimental results on two state-of-the-art T2I models (Z-Image and QwenImage-2512) demonstrate that PromptEcho achieves substantial improvements on DenseAlignBench (+26.8pp / +16.2pp net win rate), along with consistent gains on GenEval, DPG-Bench, and TIIFBench without any task-specific training. Ablation studies confirm that PromptEcho comprehensively outperforms inference-based scoring with the same VLM, and that reward quality scales with VLM size. We will open-source the trained models and the DenseAlignBench.", "link": "http://arxiv.org/abs/2604.12652v1", "date": "2026-04-14", "relevancy": 2.6122, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.529}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5191}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5191}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PromptEcho%3A%20Annotation-Free%20Reward%20from%20Vision-Language%20Models%20for%20Text-to-Image%20Reinforcement%20Learning&body=Title%3A%20PromptEcho%3A%20Annotation-Free%20Reward%20from%20Vision-Language%20Models%20for%20Text-to-Image%20Reinforcement%20Learning%0AAuthor%3A%20Jinlong%20Liu%20and%20Wanggui%20He%20and%20Peng%20Zhang%20and%20Mushui%20Liu%20and%20Hao%20Jiang%20and%20Pipei%20Huang%0AAbstract%3A%20Reinforcement%20learning%20%28RL%29%20can%20improve%20the%20prompt%20following%20capability%20of%20text-to-image%20%28T2I%29%20models%2C%20yet%20obtaining%20high-quality%20reward%20signals%20remains%20challenging%3A%20CLIP%20Score%20is%20too%20coarse-grained%2C%20while%20VLM-based%20reward%20models%20%28e.g.%2C%20RewardDance%29%20require%20costly%20human-annotated%20preference%20data%20and%20additional%20fine-tuning.%20We%20propose%20PromptEcho%2C%20a%20reward%20construction%20method%20that%20requires%20%5Cemph%7Bno%7D%20annotation%20and%20%5Cemph%7Bno%7D%20reward%20model%20training.%20Given%20a%20generated%20image%20and%20a%20guiding%20query%2C%20PromptEcho%20computes%20the%20token-level%20cross-entropy%20loss%20of%20a%20frozen%20VLM%20with%20the%20original%20prompt%20as%20the%20label%2C%20directly%20extracting%20the%20image-text%20alignment%20knowledge%20encoded%20during%20VLM%20pretraining.%20The%20reward%20is%20deterministic%2C%20computationally%20efficient%2C%20and%20improves%20automatically%20as%20stronger%20open-source%20VLMs%20become%20available.%20For%20evaluation%2C%20we%20develop%20DenseAlignBench%2C%20a%20benchmark%20of%20concept-rich%20dense%20captions%20for%20rigorously%20testing%20prompt%20following%20capability.%20Experimental%20results%20on%20two%20state-of-the-art%20T2I%20models%20%28Z-Image%20and%20QwenImage-2512%29%20demonstrate%20that%20PromptEcho%20achieves%20substantial%20improvements%20on%20DenseAlignBench%20%28%2B26.8pp%20/%20%2B16.2pp%20net%20win%20rate%29%2C%20along%20with%20consistent%20gains%20on%20GenEval%2C%20DPG-Bench%2C%20and%20TIIFBench%20without%20any%20task-specific%20training.%20Ablation%20studies%20confirm%20that%20PromptEcho%20comprehensively%20outperforms%20inference-based%20scoring%20with%20the%20same%20VLM%2C%20and%20that%20reward%20quality%20scales%20with%20VLM%20size.%20We%20will%20open-source%20the%20trained%20models%20and%20the%20DenseAlignBench.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12652v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPromptEcho%253A%2520Annotation-Free%2520Reward%2520from%2520Vision-Language%2520Models%2520for%2520Text-to-Image%2520Reinforcement%2520Learning%26entry.906535625%3DJinlong%2520Liu%2520and%2520Wanggui%2520He%2520and%2520Peng%2520Zhang%2520and%2520Mushui%2520Liu%2520and%2520Hao%2520Jiang%2520and%2520Pipei%2520Huang%26entry.1292438233%3DReinforcement%2520learning%2520%2528RL%2529%2520can%2520improve%2520the%2520prompt%2520following%2520capability%2520of%2520text-to-image%2520%2528T2I%2529%2520models%252C%2520yet%2520obtaining%2520high-quality%2520reward%2520signals%2520remains%2520challenging%253A%2520CLIP%2520Score%2520is%2520too%2520coarse-grained%252C%2520while%2520VLM-based%2520reward%2520models%2520%2528e.g.%252C%2520RewardDance%2529%2520require%2520costly%2520human-annotated%2520preference%2520data%2520and%2520additional%2520fine-tuning.%2520We%2520propose%2520PromptEcho%252C%2520a%2520reward%2520construction%2520method%2520that%2520requires%2520%255Cemph%257Bno%257D%2520annotation%2520and%2520%255Cemph%257Bno%257D%2520reward%2520model%2520training.%2520Given%2520a%2520generated%2520image%2520and%2520a%25 {"title": "Distorted or Fabricated? A Survey on Hallucination in Video LLMs", "author": "Yiyang Huang and Yitian Zhang and Yizhou Wang and Mingyuan Zhang and Liang Shi and Huimin Zeng and Yun Fu", "abstract": "Despite significant progress in video-language modeling, hallucinations remain a persistent challenge in Video Large Language Models (Vid-LLMs), referring to outputs that appear plausible yet contradict the content of the input video. This survey presents a comprehensive analysis of hallucinations in Vid-LLMs and introduces a systematic taxonomy that categorizes them into two core types: dynamic distortion and content fabrication, each comprising two subtypes with representative cases. Building on this taxonomy, we review recent advances in the evaluation and mitigation of hallucinations, covering key benchmarks, metrics, and intervention strategies. We further analyze the root causes of dynamic distortion and content fabrication, which often result from limited capacity for temporal representation and insufficient visual grounding. These insights inform several promising directions for future work, including the development of motion-aware visual encoders and the integration of counterfactual learning techniques. This survey consolidates scattered progress to foster a systematic understanding of hallucinations in Vid-LLMs, laying the groundwork for building robust and reliable video-language systems. An up-to-date curated list of related works is maintained at https://github.com/hukcc/Awesome-Video-Hallucination .", "link": "http://arxiv.org/abs/2604.12944v1", "date": "2026-04-14", "relevancy": 2.6115, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5247}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5211}, {"title": "Lexicon3D: Probing Visual Foundation Models {"title": "Scaling In-Context Segmentation with Hierarchical Supervision", "author": "T. Camaret Ndir and Marco Reisert and Robin T. Schirrmeister", "abstract": "In-context learning (ICL) enables medical image segmentation models to adapt to new anatomical structures from limited examples, reducing the clinical annotation burden. However, standard ICL methods typically rely on dense, global cross-attention, which scales poorly with image resolution. While recent approaches have introduced localized attention mechanisms, they often lack explicit supervision on the selection process, leading to redundant computation in non-informative regions. We propose PatchICL, a hierarchical framework that combines selective image patching with multi-level supervision. Our approach learns to actively identify and attend only to the most informative anatomical regions. Compared to UniverSeg, a strong global-attention baseline, PatchICL achieves competitive in-domain CT segmentation accuracy while reducing compute by 44\\% at $512\\times512$ resolution. On 35 out-of-domain datasets spanning diverse imaging modalities, PatchICL outperforms the baseline on 6 of 13 modality categories, with particular strength on modalities dominated by localized pathology such as OCT and dermoscopy. Training and evaluation code are available at https://github.com/tidiane-camaret/ic_segmentation", "link": "http://arxiv.org/abs/2604.12752v1", "date": "2026-04-14", "relevancy": 2.6056, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5278}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5227}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5128}], "mailto": "mailto:haoxia {"title": "Evolution of Optimization Methods: Algorithms, Scenarios, and Evaluations", "author": "Tong Zhang and Jiangning Zhang and Zhucun Xue and Juntao Jiang and Yicheng Xu and Chengming Xu and Teng Hu and Xingyu Xie and Xiaobin Hu and Yabiao Wang and Yong Liu and Shuicheng Yan", "abstract": "Balancing convergence speed, generalization capability, and computational efficiency remains a core challenge in deep learning optimization. First-order gradient descent methods, epitomized by stochastic gradient descent (SGD) and Adam, serve as the cornerstone of modern training pipelines. However, large-scale model training, stringent differential privacy requirements, and distributed learning paradigms expose critical limitations in these conventional approaches regarding privacy protection and memory efficiency. To mitigate these bottlenecks, researchers explore second-order optimization techniques to surpass first-order performance ceilings, while zeroth-order methods reemerge to alleviate memory constraints inherent to large-scale training. Despite this proliferation of methodologies, the field lacks a cohesive framework that unifies underlying principles and delineates application scenarios for these disparate approaches. In this work, we retrospectively analyze the evolutionary trajectory of deep learning optimization algorithms and present a comprehensive empirical evaluation of mainstream optimizers across diverse model architectures and training scenarios. We distill key emerging trends and fundamental design trade-offs, pinpointing promising directions for future research. By synthesizing theoretical insights with extensive empirical evidence, we provide actionable guidance for designing next-generation highly efficient, robust, and trustworthy optimization methods. The code is available at https://github.com/APRIL-AIGC/Awesome-Optimizer.", "link": "http://arxiv.org/abs/2604.12968v1", "date": "2026-04-14", "relevancy": 2.5967, "topK": [{"title": "Boosted dynamic {"title": "INFORM-CT: INtegrating LLMs and VLMs FOR Incidental Findings Management in Abdominal CT", "author": "Idan Tankel and Nir Mazor and Rafi Brada and Christina LeBedis and Guy ben-Yosef", "abstract": "Incidental findings in CT scans, though often benign, can have significant clinical implications and should be reported following established guidelines. Traditional manual inspection by radiologists is time-consuming and variable. This paper proposes a novel framework that leverages large language models (LLMs) and foundational vision-language models (VLMs) in a plan-and-execute agentic approach to improve the efficiency and precision of incidental findings detection, classification, and reporting for abdominal CT scans. Given medical guidelines for abdominal organs, the process of managing incidental findings is automated through a planner-executor framework. The planner, based on LLM, generates Python scripts using predefined base functions, while the executor runs these scripts to perform the necessary checks and detections, via VLMs, segmentation models, and image processing subroutines.\n  We demonstrate the effectiveness of our approach through experiments on a CT abdominal benchmark for three organs, in a fully automatic end-to-end manner. Our results show that the proposed framework outperforms existing pure VLM-based approaches in terms of accuracy and efficiency.", "link": "http://arxiv.org/abs/2512.14732v2", "date": "2026-04-14", "relevancy": 2.5922, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.527}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.527}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5012}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20INFORM-CT%3A%20INtegrating%20LLMs%20and%20VLMs%20FOR%20Incidental%20Findings%20Management%20in%20Abdominal%20CT&body=Title%3A%20INFORM-CT%3A%20INtegrating%20LLMs%20and%20VLMs%20FOR%20Incidental%20Findings%20Management%20in%20Abdominal%20CT%0AAuthor%3A%20Idan%20Tankel%20and%20Nir%20Mazor%20and%20Rafi%20Brada%20and%20Christina%20LeBedis%20and%20Guy%20ben-Yosef%0AAbstract%3A%20Incidental%20findings%20in%20CT%20scans%2C%20though%20often%20benign%2C%20can%20have%20significant%20clinical%20implications%20and%20should%20be%20reported%20following%20established%20guidelines.%20Traditional%20manual%20inspection%20by%20radiologists%20is%20time-consuming%20and%20variable.%20This%20paper%20proposes%20a%20novel%20framework%20that%20leverages%20large%20language%20models%20%28LLMs%29%20and%20foundational%20vision-language%20models%20%28VLMs%29%20in%20a%20plan-and-execute%20agentic%20approach%20to%20improve%20the%20efficiency%20and%20precision%20of%20incidental%20findings%20detection%2C%20classification%2C%20and%20reporting%20for%20abdominal%20CT%20scans.%20Given%20medical%20guidelines%20for%20abdominal%20organs%2C%20the%20process%20of%20managing%20incidental%20findings%20is%20automated%20through%20a%20planner-executor%20framework.%20The%20planner%2C%20based%20on%20LLM%2C%20generates%20Python%20scripts%20using%20predefined%20base%20functions%2C%20while%20the%20executor%20runs%20these%20scripts%20to%20perform%20the%20necessary%20checks%20and%20detections%2C%20via%20VLMs%2C%20segmentation%20models%2C%20and%20image%20processing%20subroutines.%0A%20%20We%20demonstrate%20the%20effectiveness%20of%20our%20approach%20through%20experiments%20on%20a%20CT%20abdominal%20benchmark%20for%20three%20organs%2C%20in%20a%20fully%20automatic%20end-to-end%20manner.%20Our%20results%20show%20that%20the%20proposed%20framework%20outperforms%20existing%20pure%20VLM-based%20approaches%20in%20terms%20of%20accuracy%20and%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/251 riments%2520on%2520a%2520CT%2520abdominal%2520benchmark%2520for%2520three%2520organs%252C%2520in%2520a%2520fully%2520automatic%2520end-to-end%2520manner.%2520Our%2520results%2520show%2520that%2520the%2520proposed%2520framework%2520outperforms%2520existing%2520pure%2520VLM-based%2520approaches%2520in%2520terms%2520of%2520accuracy%2520and%2520efficiency.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2512.14732v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=INFORM-CT%3A%20INtegrating%20LLMs%20and%20VLMs%20FOR%20Incidental%20Findings%20Management%20in%20Abdominal%20CT&entry.906535625=Idan%20Tankel%20and%20Nir%20Mazor%20and%20Rafi%20Brada%20and%20Christina%20LeBedis%20and%20Guy%20ben-Yosef&entry.1292438233=Incidental%20findings%20in%20CT%20scans%2C%20though%20often%20benign%2C%20can%20have%20significant%20clinical%20implications%20and%20should%20be%20reported%20following%20established%20guidelines.%20Traditional%20manual%20inspection%20by%20radiologists%20is%20time-consuming%20and%20variable.%20This%20paper%20proposes%20a%20novel%20framework%20that%20leverages%20large%20language%20models%20%28LLMs%29%20and%20foundational%20vision-language%20models%20%28VLMs%29%20in%20a%20plan-and-execute%20agentic%20approach%20to%20improve%20the%20efficiency%20and%20precision%20of%20incidental%20findings%20detection%2C%20classification%2C%20and%20reporting%20for%20abdominal%20CT%20scans.%20Given%20medical%20guidelines%20for%20abdominal%20organs%2C%20the%20process%20of%20managing%20incidental%20findings%20is%20automated%20through%20a%20planner-executor%20framework.%20The%20planner%2C%20based%20on%20LLM%2C%20generates%20Python%20scripts%20using%20predefined%20base%20functions%2C%20while%20the%20executor%20runs%20these%20scripts%20to%20perform%20the%20necessary%20checks%20and%20detections%2C%20via%20VLMs%2C%20segmentation%20models%2C%20and%20image%20processing%20subroutines.%0A%20%20W {"title": "A document is worth a structured record: Principled inductive bias design for document recognition", "author": "Benjamin Meyer and Lukas Tuggener and Sascha H\u00e4nzi and Daniel Schmid and Erdal Ayfer and Benjamin F. Grewe and Ahmed Abdulkadir and Thilo Stadelmann", "abstract": "Many document types use intrinsic, convention-driven structures that serve to encode precise and structured information, such as the conventions governing engineering drawings. However, many state-of-the-art approaches treat document recognition as a mere computer vision problem, neglecting these underlying document-type-specific structural properties, making them dependent on sub-optimal heuristic post-processing and rendering many less frequent or more complicated document types inaccessible to modern document recognition. We suggest a novel perspective that frames document recognition as a transcription task from a document to a record. This implies a natural grouping of documents based on the intrinsic structure inherent in their transcription, where related document types can be treated (and learned) similarly. We propose a method to design structure-specific relational inductive biases for the underlying machine-learned end-to-end document recognition systems, and a respective base transformer architecture that we successfully adapt to different structures. We demonstrate the effectiveness of the so-found inductive biases in extensive experiments with progressively complex record structures from monophonic sheet music, shape drawings, and simplified engineering drawings. By integrating an inductive bias for unrestricted graph structures, we train the first-ever successful end-to-end model to transcribe mechanical engineering drawings to their inherently interlinked information. Our approach is relevant to inform the design of document recognition systems for document types that are less well understood than standard OCR, OMR, etc., and serves as a guide to unify the design {"title": "Lyra 2.0: Explorable Generative 3D Worlds", "author": "Tianchang Shen and Sherwin Bahmani and Kai He and Sangeetha Grama Srinivasan and Tianshi Cao and Jiawei Ren and Ruilong Li and Zian Wang and Nicholas Sharp and Zan Gojcic and Sanja Fidler and Jiahui Huang and Huan Ling and Jun Gao and Xuanchi Ren", "abstract": "Recent advances in video generation enable a new paradigm for 3D scene creation: generating camera-controlled videos that simulate scene walkthroughs, then lifting them to 3D via feed-forward reconstruction techniques. This generative reconstruction approach combines the visual fidelity and creative capacity of video models with 3D outputs ready for real-time rendering and simulation. Scaling to large, complex environments requires 3D-consistent video generation over long camera trajectories with large viewpoint changes and location revisits, a setting where current video models degrade quickly. Existing methods for long-horizon generation are fundamentally limited by two forms of degradation: spatial forgetting and temporal drifting. As exploration proceeds, previously observed regions fall outside the model's temporal context, forcing the model to hallucinate structures when revisited. Meanwhile, autoregressive generation accumulates small synthesis errors over time, gradually distorting scene appearance and geometry. We present Lyra 2.0, a framework for generating persistent, explorable 3D worlds at scale. To address spatial forgetting, we maintain per-frame 3D geometry and use it solely for information routing -- retrieving relevant past frames and establishing dense correspondences with the target viewpoints -- while relying on the generative prior for appearance synthesis. To address temporal drifting, we train with self-augmented histories that expose the model to its own degraded outputs, teaching it to correct drift rather than propagate it. Together, these enable substantially longer and 3D-consistent video trajectories, which we leverage to fine-tune feed-forward reconstruction models that reliably recover high-quality 3D scenes.", "link": "http://arxiv.org/abs/2604.13036v1", "date": "2026-04-14", "relevancy": 2.5429, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.7481}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.6229}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6036}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Lyra%202.0%3A%20Explorable%20Generative%203D%20Worlds&body=Title%3A%20Lyra%202.0%3A%20Explorable%20Generative%203D%20Worlds%0AAuthor%3A%20Tianchang%20Shen%20and%20Sherwin%20Bahmani%20and%20Kai%20He%20and%20Sangeetha%20Grama%20Srinivasan%20and%20Tianshi%20Cao%20and%20Jiawei%20Ren%20and%20Ruilong%20Li%20and%20Zian%20Wang%20and%20Nicholas%20Sharp%20and%20Zan%20Gojcic%20and%20Sanja%20Fidler%20and%20Jiahui%20Huang%20and%20Huan%20Ling%20and%20Jun%20Gao%20and%20Xuanchi%20Ren%0AAbstract%3A%20Recent%20advances%20in%20video%20generation%20enable%20a%20new%20paradigm%20for%203D%20scene%20creation%3A%20generating%20camera-controlled%20videos%20that%20simulate%20scene%20walkthroughs%2C%20then%20lifting%20them%20to%203D%20via%20feed-forward%20reconstruction%20techniques.%20This%20generative%20reconstruction%20approach%20combines%20the%20visual%20fidelity%20and%20creative%20capacity%20of%20video%20models%20with%203D%20outputs%20ready%20for%20real-time%20rendering%20and%20simulation.%20Scaling%20to%20large%2C%20complex%20environments%20requires%203D-consistent%20video%20generation%20over%20long%20camera%20trajectories%20with%20large%20viewpoint%20changes%20and%20location%20revisits%2C%20a%20setting%20where%20current%20video%20models%20degrade%20quickly.%20Existing%20methods%20for%20long-horizon%20generation%20are%20fundamentally%20limited%20by%20two%20forms%20of%20degradation%3A%20spatial%20forgetting%20and%20temporal%20drifting.%20As%20exploration%20proceeds%2C%20previously%20observed%20regions%20fall%20outside%20the%20model%27s%20temporal%20context%2C%20forcing%20the%20model%20to%20hallucinate%20structures%20when%20revisited.%20Meanwhile%2C%20autoregressive%20generation%20accumulates%20small%20synthesis%20errors%20over%20time%2C%20gradually%20distorting%20scene%20appearance%20and%20geometry.%20We%20present%20Lyra%202.0%2C%20a%20framework%20for%20generating%20persistent%2C%20explorable%203D%20worlds%20at%20scale.%20To%20address%20spatial%20forgetting%2C%20we%20maintain%20per-frame%203D%20geometry%20and%20use%20it%20solely%20for%20information%20routing%20--%20retrieving%20relevant%20past%20frames%20and%20establishing%20dense%20correspondences%20with%20the%20target%20viewpoints%20--%20while%20relying%20on%20the%20generative%20prior%20for%20appearance%20synthesis.%20To%20address%20temporal%20drifting%2C%20we%20train%20with%20self-augmented%20histories%20that%20expose%20the%20model%20to%20its%20own%20degraded%20outputs%2C%20teaching%20it%20to%20correct%20drift%20rather%20than%20propagate%20it.%20Together%2C%20these%20enable%20substantially%20longer%20and%203D-consistent%20video%20trajectories%2C%20which%20we%20leverage%20to%20fine-tune%20feed-forward%20reconstruction%20models%20that%20reliably%20recover%20high-quality%203D%20scenes.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13036v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLyra%25202.0%253A%2520Explorable%2520Generative%25203D%2520Worlds%26entry.906535625%3DTianchang%2520Shen%2520and%2520Sherwin%2520Bahmani%2520and%2520Kai%2520He%2520and%2520Sangeetha%2520Grama%2520Srinivasan%2520and%2520Tianshi%2520Cao%2520and%2520Jiawei%2520Ren%2520and%2520Ruilong%2520Li%2520and%2520Zian%2520Wang%2520and%2520Nicholas%2520Sharp%2520and%2520Zan%2520Gojcic%2520 {"title": "HSG-12M: A Large-Scale Benchmark of Spatial Multigraphs from the Energy Spectra of Non-Hermitian Crystals", "author": "Xianquan Yan and Hakan Akg\u00fcn and Kenji Kawaguchi and N. Duane Loh and Ching Hua Lee", "abstract": "AI is transforming scientific research by revealing new ways to understand complex physical systems, but its impact remains constrained by the lack of large, high-quality domain-specific datasets. A rich, largely untapped resource lies in non-Hermitian quantum physics, where the energy spectra of crystals form intricate geometries on the complex plane -- termed as Hamiltonian spectral graphs. Despite their significance as fingerprints for electronic behavior, their systematic study has been intractable due to the reliance on manual extraction. To unlock this potential, we introduce Poly2Graph: a high-performance, open-source pipeline that automates the mapping of 1-D crystal Hamiltonians to spectral graphs. Using this tool, we present HSG-12M: a dataset containing 11.6 million static and 5.1 million dynamic Hamiltonian spectral graphs across 1401 characteristic-polynomial classes, distilled from 177 TB of spectral potential data. Crucially, HSG-12M is the first large-scale dataset of spatial multigraphs -- graphs embedded in a metric space where multiple geometrically distinct trajectories between two nodes are retained as separate edges. This simultaneously addresses a critical gap, as existing graph benchmarks overwhelmingly assume simple, non-spatial edges, discarding vital geometric information. Benchmarks with popular GNNs expose new challenges in learning spatial multi-edges at scale. Beyond its practical utility, we show that spectral graphs serve as universal topological fingerprints of polynomials, vectors, and matrices, forging a new algebra-to-graph link. HSG-12M lays the groundwork for data-driven scientific discovery in condensed matter physics, new opportunities in geometry-aware graph learning and beyond.", "link": "http: {"title": "SceneCritic: A Symbolic Evaluator for 3D Indoor Scene Synthesis", "author": "Kathakoli Sengupta and Kai Ao and Paola Cascante-Bonilla", "abstract": "Large Language Models (LLMs) and Vision-Language Models (VLMs) increasingly generate indoor scenes through intermediate structures such as layouts and scene graphs, yet evaluation still relies on LLM or VLM judges that score rendered views, making judgments sensitive to viewpoint, prompt phrasing, and hallucination. When the evaluator is unstable, it becomes difficult to determine whether a model has produced a spatially plausible scene or whether the output score reflects the choice of viewpoint, rendering, or prompt. We introduce SceneCritic, a symbolic evaluator for floor-plan-level layouts. SceneCritic's constraints are grounded in SceneOnto, a structured spatial ontology we construct by aggregating indoor scene priors from 3D-FRONT, ScanNet, and Visual Genome. SceneOnto traverses this ontology to jointly verify semantic, orientation, and geometric coherence across object relationships, providing object-level and relationship-level assessments that identify specific violations and successful placements. Furthermore, we pair SceneCritic with an iterative refinement test bed that probes how models build and revise spatial structure under different critic modalities: a rule-based critic using collision constraints as feedback, an LLM critic operating on the layout as text, and a VLM critic operating on rendered observations. Through extensive experiments, we show that (a) SceneCritic aligns substantially better with human judgments than VLM-based evaluators, (b) text-only LLMs can outperform VLMs on semantic layout quality, and (c) image-based VLM refinement is the most effective critic modality for semantic and orientation correction.", "link": "http://arxiv.org/abs/2604.13035v1", "date": "2026-04-14", "relevancy": 2.5412, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\ identify%20specific%20violations%20and%20successful%20placements.%20Furthermore%2C%20we%20pair%20SceneCritic%20with%20an%20iterative%20refinement%20test%20bed%20that%20probes%20how%20models%20build%20and%20revise%20spatial%20structure%20under%20different%20critic%20modalities%3A%20a%20rule-based%20critic%20using%20collision%20constraints%20as%20feedback%2C%20an%20LLM%20critic%20operating%20on%20the%20layout%20as%20text%2C%20and%20a%20VLM%20critic%20operating%20on%20rendered%20observations.%20Through%20extensive%20experiments%2C%20we%20show%20that%20%28a%29%20SceneCritic%20aligns%20substantially%20better%20with%20human%20judgments%20than%20VLM-based%20evaluators%2C%20%28b%29%20text-only%20LLMs%20can%20outperform%20VLMs%20on%20semantic%20layout%20quality%2C%20and%20%28c%29%20image-based%20VLM%20refinement%20is%20the%20most%20effective%20critic%20modality%20for%20semantic%20and%20orientation%20correction.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13035v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSceneCritic%253A%2520A%2520Symbolic%2520Evaluator%2520for%25203D%2520Indoor%2520Scene%2520Synthesis%26entry.906535625%3DKathakoli%2520Sengupta%2520and%2520Kai%2520Ao%2520and%2520Paola%2520Cascante-Bonilla%26entry.1292438233%3DLarge%2520Language%2520Models%2520%2528LLMs%2529%2520and%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520increasingly%2520generate%2520indoor%2520scenes%2520through%2520intermediate%2520structures%2520such%2520as%2520layouts%2520and%2520scene%2520graphs%252C%2520yet%2520evaluation%2520still%2520relies%2520on%2520LLM%2520or%2520VLM%2520judges%2520that%2520score%2520rendered%2520views%252C%2520making%2520judgments%2520sensitive%2520to%2520viewpoint%252C%2520prompt%2520phrasing%252C%2520and%2520hallucination.%2520When%2520the%2520evaluator%2520is%2520unstable%252C%2520it%2520becomes%2520difficult%2520to%2520determine%2520whether%2520a%2520model%2520has%2520produce {"title": "Drawing on Memory: Dual-Trace Encoding Improves Cross-Session Recall in LLM Agents", "author": "Benjamin Stern and Peter Nadel", "abstract": "LLM agents with persistent memory store information as flat factual records, providing little context for temporal reasoning, change tracking, or cross-session aggregation. Inspired by the drawing effect [3], we introduce dual-trace memory encoding. In this method, each stored fact is paired with a concrete scene trace, a narrative reconstruction of the moment and context in which the information was learned. The agent is forced to commit to specific contextual details during encoding, creating richer, more distinctive memory traces. Using the LongMemEval-S benchmark (4,575 sessions, 100 recall questions), we compare dual-trace encoding against a fact-only control with matched coverage and format over 99 shared questions. Dual-trace achieves 73.7% overall accuracy versus 53.5%, a +20.2 percentage point (pp) gain (95% CI: [+12.1, +29.3], bootstrap p < 0.0001). Gains concentrate in temporal reasoning (+40pp), knowledge-update tracking (+25pp), and multi-session aggregation (+30pp), with no benefit for single-session retrieval, consistent with encoding specificity theory [8]. Token analysis shows dual-trace encoding achieves this gain at no additional cost. We additionally sketch an architectural design for adapting dual-trace encoding to coding agents, with preliminary pilot validation.", "link": "http://arxiv.org/abs/2604.12948v1", "date": "2026-04-14", "relevancy": 2.5021, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5125}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4944}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4944}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Drawing%20on%20Memory%3A%20Dual-Trace%20Encoding%20Improves%20Cross-Session%20Recall%20in%20LLM%20Agents&body=Title%3A%20Drawing%20on%20Memory%3A%20Dual-Trace%20Encoding%20Improves%20Cross-Session%20Recall%20in%20LLM%20Agents%0AAuthor%3A%20Benjamin%20Stern%20and%20Peter%20Nadel%0AAbstract%3A%20LLM%20agents%20with%20persistent%20memory%20store%20information%20as%20flat%20factual%20records%2C%20providing%20little%20context%20for%20temporal%20reasoning%2C%20change%20tracking%2C%20or%20cross-session%20aggregation.%20Inspired%20by%20the%20drawing%20effect%20%5B3%5D%2C%20we%20introduce%20dual-trace%20memory%20encoding.%20In%20this%20method%2C%20each%20stored%20fact%20is%20paired%20with%20a%20concrete%20scene%20trace%2C%20a%20narrative%20reconstruction%20of%20the%20moment%20and%20context%20in%20which%20the%20information%20was%20learned.%20The%20agent%20is%20forced%20to%20commit%20to%20specific%20contextual%20details%20during%20encoding%2C%20creating%20richer%2C%20more%20distinctive%20memory%20traces.%20Using%20the%20LongMemEval-S%20benchmark%20%284%2C575%20sessions%2C%20100%20recall%20questions%29%2C%20we%20compare%20dual-trace%20encoding%20against%20a%20fact-only%20control%20with%20matched%20coverage%20and%20format%20over%2099%20shared%20questions.%20Dual-trace%20achieves%2073.7%25%20overall%20accuracy%20versus%2053.5%25%2C%20a%20%2B20.2%20percentage%20point%20%28pp%29%20gain%20%2895%25%20CI%3A%20%5B%2B12.1%2C%20%2B29.3%5D%2C%20bootstrap%20p%20%3C%200.0001%29.%20Gains%20concentrate%20in%20temporal%20reasoning%20%28%2B40pp%29%2C%20knowledge-update%20tracking%20%28%2B25pp%29%2C%20and%20multi-session%20aggregation%20%28%2B30pp%29%2C%20with%20no%20benefit%20for%20single-session%20retrieval%2C%20consistent%20with%20encoding%20specificity%20theory%20%5B8%5D.%20Token%20analysis%20shows%20dual-trace%20encoding%20achieves%20this%20gain%20at%20no%20additional%20cost.%20We%20additionally%20sketch%20an%20architectural%20design%20for%20adapting%20dual-trace%20encoding%20to%20coding%20agents%2C%20with%20preliminary%20pilot%20validation.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12948v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDrawing%2520on%2520Memory%253A%2520Dual-Trace%2520Encoding%2520Improves%2520Cross-Session%2520Recall%2520in%2520LLM%2520Agents%26entry.906535625%3DBenjamin%2520Stern%2520and%2520Peter%2520Nadel%26entry.1292438233%3DLLM%2520agents%2520with%2520persistent%2520memory%2520store%2520information%2520as%2520flat%2520factual%2520records%252C%2520providing%2520little%2520context%2520for%2520temporal%2520reasoning%252C%2520change%2520tracking%252C%2520or%2520cross-session%2520aggregation.%2520Inspired%2520by%2520the%2520drawing%2520effect%2520%255B3%255D%252C%2520we%2520introduce%2520dual-trace%2520memory%2520encoding.%2520In%2520this%2520method%252C%2520each%2520stored%2520fact%2520is%2520paired%2520with%2520a%2520concrete%2520scene%2520trace%252C%2520a%2520narrative%2520reconstruction%2520of%2520the%2520moment%2520and%2520context%2520in%2520which%2520the%2520information%2520was%2520learned.%2520The%2520agent%2520is%2520forced%2520to%2520commit%2520to%2520specific%2520contextual%2520details%2520during%2520encoding%252C%2520creating%2520richer%252C%2520more%2520distinctive%2520memory%2520traces.%2520Using%2520the%2520LongMemEval-S%2520benchmark%2520%25284%252C575%2520sessions%252C%2520100%2520recall%2520questions%2529%252C%2520we%2520compare%2520dual-trace%2520encoding%2520against%2520a%2520fact-only%2520control%2520with%2520matched%2520coverage%2520and%2520format%2520over%252099%2520shared%2520questions.%2520Dual-trace%2520achieves%252073.7%2525%2520overall%2520accuracy%2520versus%252053.5%2525%252C%2520a%2520%252B20.2%2520percentage%2520point%2520%2528pp%2529%2520gain%2520%252895%2525%2520CI%253A%2520%255B%252B12.1%252C%2520%252B29.3%255D%252C%2 {"title": "Invariant Features for Global Crop Type Classification", "author": "Xin-Yi Tong and Sherrie Wang", "abstract": "Accurate global crop type mapping supports agricultural monitoring and food security, yet remains limited by the scarcity of labeled data in many regions. A key challenge is enabling models trained in one geography to generalize reliably to others despite shifts in climate, phenology, and spectral characteristics. In this work, we show that geographic transfer in crop classification is primarily governed by the ability to learn invariant structure in multispectral time series. To systematically study this, we introduce CropGlobe, a globally distributed benchmark dataset of 300,000 samples spanning eight countries and five continents, and define progressively harder transfer settings from cross-country to cross-hemisphere. Across all settings, we find that simple spectral-temporal representations outperform both handcrafted features and modern geospatial foundation model embeddings. We propose CropNet, a lightweight convolutional architecture that jointly convolves across spectral and temporal dimensions to learn invariant crop signatures. Despite its simplicity, CropNet consistently outperforms larger transformer-based and foundation-model approaches under geographic domain shift. To further improve robustness to geographic variation, we introduce augmentations that simulate shifts in crop phenology and reflectance. Combined with CropNet, this yields substantial gains under large domain shifts. Our results demonstrate that inductive bias toward joint spectral-temporal structure is more critical for transfer than model scale or pretraining, pointing toward a scalable and data-efficient paradigm for worldwide agricultural mapping. Data and code are available at https://github.com/x-ytong/CropNet/.", "link": "http://arxiv.org/abs/2509.03497v3", "date": "2026-04-14", "relevancy": 2.4997, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.515}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4929}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4919}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Invariant%20Features%20for%20Global%20Crop%20Type%20Classification&body=Title%3A%20Invariant%20Features%20for%20Global%20Crop%20Type%20Classification%0AAuthor%3A%20Xin-Yi%20Tong%20and%20Sherrie%20Wang%0AAbstract%3A%20Accurate%20global%20crop%20type%20mapping%20supports%20agricultural%20monitoring%20and%20food%20security%2C%20yet%20remains%20limited%20by%20the%20scarcity%20of%20labeled%20data%20in%20many%20regions.%20A%20key%20challenge%20is%20enabling%20models%20trained%20in%20one%20geography%20to%20generalize%20reliably%20to%20others%20despite%20shifts%20in%20climate%2C%20phenology%2C%20and%20spectral%20characteristics.%20In%20this%20work%2C%20we%20show%20that%20geographic%20transfer%20in%20crop%20classification%20is%20primarily%20governed%20by%20the%20ability%20to%20learn%20invariant%20structure%20in%20multispectral%20time%20series.%20To%20systematically%20study%20this%2C%20we%20introduce%20CropGlobe%2C%20a%20globally%20distributed%20benchmark%20dataset%20of%20300%2C000%20samples%20spanning%20eight%20countries%20and%20five%20continents%2C%20and%20define%20progressively%20harder%20transfer%20settings%20from%20cross-country%20to%20cross-hemisphere.%20Across%20all%20settings%2C%20we%20find%20that%20simple%20spectral-temporal%20representations%20outperform%20both%20handcrafted%20features%20and%20modern%20geospatial%20foundation%20model%20embeddings.%20We%20propose%20CropNet%2C%20a%20lightweight%20convolutional%20architecture%20that%20jointly%20convolves%20across%2 {"title": "CLAD: Efficient Log Anomaly Detection Directly on Compressed Representations", "author": "Benzhao Tang and Shiyu Yang", "abstract": "The explosive growth of system logs makes streaming compression essential, yet existing log anomaly detection (LAD) methods incur severe pre-processing overhead by requiring full decompression and parsing. We introduce CLAD, the first deep learning framework to perform LAD directly on compressed byte streams. CLAD bypasses these bottlenecks by exploiting a key insight: normal logs compress into regular byte patterns, while anomalies systematically disrupt them. To extract these multi-scale deviations from opaque bytes, we propose a purpose-built architecture integrating a dilated convolutional byte encoder, a hybrid Transformer--mLSTM, and four-way aggregation pooling. This is coupled with a two-stage training strategy of masked pre-training and focal-contrastive fine-tuning to effectively handle severe class imbalance. Evaluated across five datasets, CLAD achieves a state-of-the-art average F1-score of 0.9909 and outperforms the best baseline by 2.72 percentage points. It delivers superior accuracy while completely eliminating decompression and parsing overheads, offering a robust solution that generalizes to structured streaming compressors.", "link": "http://arxiv.org/abs/2604.13024v1", "date": "2026-04-14", "relevancy": 2.4888, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5135}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5068}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.473}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CLAD%3A%20Efficient%20Log%20Anomaly%20Detection%20Directly%20on%20Compressed%20Representations&body=Title%3A%20CLAD%3A%20Efficient%20Log%20Anomaly%20Detection%20Directly%20on%20Compressed%20Representations%0AAuthor%3A%20Benzhao%20Tang%20and%20Shiyu%20Yang%0AAbstract%3A%20The%20explosive%20growth%20of%20system%20logs%20makes%20streaming%20compression%20essential%2C%20yet%20existing%20log%20anomaly%20detection%20%28LAD%29%20methods%20incur%20severe%20pre-processing%20overhead%20by%20requiring%20full%20decompression%20and%20parsing.%20We%20introduce%20CLAD%2C%20the%20first%20deep%20learning%20framework%20to%20perform%20LAD%20directly%20on%20compressed%20byte%20streams.%20CLAD%20bypasses%20these%20bottlenecks%20by%20exploiting%20a%20key%20insight%3A%20normal%20logs%20compress%20into%20regular%20byte%20patterns%2C%20while%20anomalies%20systematically%20disrupt%20them.%20To%20extract%20these%20multi-scale%20deviations%20from%20opaque%20bytes%2C%20we%20propose%20a%20purpose-built%20architecture%20integrating%20a%20dilated%20convolutional%20byte%20encoder%2C%20a%20hybrid%20Transformer--mLSTM%2C%20and%20four-way%20aggregation%20pooling.%20This%20is%20coupled%20with%20a%20two-stage%20training%20strategy%20of%20masked%20pre-training%20and%20focal-contrastive%20fine-tuning%20to%20effectively%20handle%20severe%20class%20imbalance.%20Evaluated%20across%20five%20datasets%2C%20CLAD%20achieves%20a%20state-of-the-art%20average%20F1-score%20of%200.9909%20and%20outperforms%20the%20best%20baseline%20by%202.72%20percentage%20points.%20It%20delivers%20superior%20accuracy%20while%20completely%20eliminating%20decompression%20and%20parsing%20overheads%2C%20offering%20a%20robust%20solution%20that%20generalizes%20to%20structured%20streaming%20compressors.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13024v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCLAD%253A%2520Efficient%2520Log%2520Anomaly%2520Detection%2520Directly%2520on%2520Compressed%2520Represent {"title": "Orthogonal Subspace Projection for Continual Machine Unlearning via SVD-Based LoRA", "author": "Yogachandran Rahulamathavan and Nasir Iqbal and Juncheng Hu and Sangarapillai Lambotharan", "abstract": "Continual machine unlearning aims to remove the influence of data that should no longer be retained, while preserving the usefulness of the model on everything else. This setting becomes especially difficult when deletion requests arrive sequentially, because the model must repeatedly adapt without erasing previously retained knowledge. Low-Rank Adaptation (LoRA) offers an efficient way to implement such updates, but naively combining many sequential LoRA modules leads to parameter collision, causing \\textit{strong interference} between tasks. We propose a static alternative based on Singular Value Decomposition (SVD)-guided orthogonal subspace projection. Our method constrains each new LoRA update during training so that it lies in the orthogonal complement of the subspaces used by earlier unlearning tasks. This preserves task isolation without requiring dynamic routing at deployment. Experiments on CIFAR-100 with ResNet-20 and on MNIST show stable behavior across long sequences of unlearning tasks. After thirty sequential unlearning tasks, state-of-the-art static fusion reduces retained accuracy from 60.39\\% to 12.70\\%, whereas the proposed in-training constrained optimization maintains baseline performance ($\\sim$58.1\\%) while preserving strong unlearning efficacy.", "link": "http://arxiv.org/abs/2604.12526v1", "date": "2026-04-14", "relevancy": 2.4709, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5277}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4781}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leve {"title": "Token Encoding for Semantic Recovery", "author": "Jingzhi Hu and Geoffrey Ye Li", "abstract": "Token-based semantic communication is promising for future wireless networks, as it can compact semantic tokens under very limited channel capacity. However, harsh wireless channels often cause missing tokens, leading to severe distortion that prevents reliable semantic recovery at the receiver. In this article, we propose a token encoding framework for robust semantic recovery (TokCode), which incurs no additional transmission overhead and supports plug-and-play deployment. For efficient token encoder optimization, we develop a sentence-semantic-guided foundation model adaptation algorithm (SFMA) that avoids costly end-to-end training. Based on simulation results on prompt-based generative image transmission, TokCode mitigates semantic distortion and can approach the performance upper-bound, even under harsh channels where 40% to 60% of tokens are randomly lost.", "link": "http://arxiv.org/abs/2604.12931v1", "date": "2026-04-14", "relevancy": 2.4449, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5298}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4717}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4654}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Token%20Encoding%20for%20Semantic%20Recovery&body=Title%3A%20Token%20Encoding%20for%20Semantic%20Recovery%0AAuthor%3A%20Jingzhi%20Hu%20and%20Geoffrey%20Ye%20Li%0AAbstract%3A%20Token-based%20semantic%20communication%20is%20promising%20for%20future%20wireless%20networks%2C%20as%20it%20can%20compact%20semantic%20tokens%20under%20very%20limited%20channel%20capacity.%20However%2C%20harsh%20wireless%20channels%20often%20cause%20missing%20tokens%2C%20leading%20to%20severe%20distortion%20that%20prevents%20reliable%20semantic%20recovery%20at%20the%20receiver.%20In%20this%20article%2C%20we%20propose%20a%20token%20encoding%20framework%20for%20robust%20semantic%20recovery%20%28TokCode%29%2C%20which%20incurs%20no%20additional%20transmission%20overhead%20and%20supports%20plug-and-play%20deployment.%20For%20efficient%20token%20encoder%20optimization%2C%20we%20develop%20a%20sentence-semantic-guided%20foundation%20model%20adaptation%20algorithm%20%28SFMA%29%20that%20avoids%20costly%20end-to-end%20training.%20Based%20on%20simulation%20results%20on%20prompt-based%20generative%20image%20transmission%2C%20TokCode%20mitigates%20semantic%20distortion%20and%20can%20approach%20the%20performance%20upper-bound%2C%20even%20under%20harsh%20channels%20where%2040%25%20to%2060%25%20of%20tokens%20are%20randomly%20lost.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12931v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DToken%2520Encoding%2520for%2520Semantic%2520Recovery%26entry.906535625%3DJingzhi%2520Hu%2520and%2520Geoffrey%2520Ye%2520Li%26entry.1292438233%3DToken-based%2520semantic%2520communication%2520is%2520promising%2520for%2520future%2520wireless%2520networks%252C%2520as%2520it%2520can%2520compact%2520semantic%2520tokens%2520under%2520very%2520limited%2520channel%2520capacity.%2520However%252C%2520harsh%2520wireless%2520channels%2520often%2520cause%2520missing%2520tokens%252C%2520leading%2520to%2520severe%2520distortion%2520that%2520prevents%2520reliable%2520semantic%2520recovery%2520at%2520the%2520receiver.%2520In%2520this%2520article%252C%2520we%2520propose%2520a%2520token%2520encoding%2520framework%2520for%2520robust%2520semantic%2520recovery%2520%2528TokCode%2529%252C%2520which%2520incurs%2520no%2520additional%2520transmission%2520overhead%2520and%2520supports%2520plug-and-play%2520deployment.%2520For%2520efficient%2520token%2520encoder%2520optimization%252C%2520we%2520develop%2520a%2520sentence-semantic-guided%2520foundation%2520model%2520adaptation%2520algorithm%2520%2528SFMA%2529%2520that%2520avoids%2520costly%2520end-to-end%2520training.%2520Based%2520on%2520simulation%2520results%2520on%2520prompt-based%2520generative%2520image%2520transmission%252C%2520TokCode%2520mitigates%2520semantic%2520distortion%2520and%2520can%2520approach%2520the%2520performance%2520upper-bound%252C%2520even%2520under%2520harsh%2520channels%2520where%252040%2525%2520to%252060%2525%2520of%2520tokens%2520are%2520randomly%2520lost.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.12931v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Token%20Encoding%20for%20Semantic%20Recovery&entry.906535625=Jingzhi%20Hu%20and%20Geoffrey%20Ye%20Li&entry.1292438233=Token-based%20semantic%20communication%20is%20promising%20for%20future%20wireless%20networks%2C%20as%20it%20can%20compact%20semantic%20tokens%20under%20very%20limited%20channel%20capacity.%20However%2C%20harsh%20wireless%20channels%20often%20cause%20missing%20tokens%2C%20leading%20to%20severe%20distortion%20that%20prevents%20reliable%20semantic%20recovery%20at%20the%20receiver.%20In%20this%20article%2C%20we%20propose%20a%20token%20encoding%20framework%20for%20robust%20semantic%20recovery%20%28TokCode%29%2C%20which%20incurs%20no%20additional%20transmission%20overhead%20and%20supports%20plug-and-play%20deployment.%20For%20efficient%20token%20encoder%20optimization%2C%20we%20develop%20a%20sentence-semantic-guided%20foundation%20model%20adaptation%20algorithm%20%28SFMA%29%20that%20avoids%20costly%20end-to-end%20training.%20Based%20on%20simulation%20results%20on%20prompt-based%20generative%20image%20transmission%2C%20TokCode%20mitigates%20semantic%20distortion%20and%20can%20approach%20the%20performance%20upper-bound%2C%20even%20under%20harsh%20channels%20where%2040%25%20to%2060%25%20of%20tokens%20are%20randomly%20lost.&entry.1838667208=http%3A//arxiv.org/abs/2604.12931v1&entry.124074799=Read"},
{"title": "Learning Versatile Humanoid Manipulation with Touch Dreaming", "author": "Yaru Niu and Zhenlong Fang and Binghong Chen and Shuai Zhou and Revanth Senthilkumaran and Hao Zhang and Bingqing Chen and Chen Qiu and H. Eric Tseng and Jonathan Francis and Ding Zhao", "abstract": "Humanoid robots promise general-purpose assistance, yet real-world humanoid loco-manipulation remains challenging because it requires whole-body stability, dexterous hands, and contact-aware perception under frequent contact changes. In this work, we study dexterous, contact-rich humanoid loco-manipulation. We first develop an RL-based whole-body controller that provides stable lower-body and torso execution during complex manipulation. Built on this controller, we develop a whole-body humanoid data collection system that combines VR-based teleoperation with human-to-humanoid motion mapping, enabling efficient collection of real-world demonstrations. We then propose Humanoid Transformer with Touch Dreaming (HTD), a multimodal encoder--decoder Transformer that models touch as a core modality alongside multi-view vision and proprioception. HTD is trained in a single stage with behavioral cloning augmented by touch dreaming: in addition to predicting action chunks, the policy predicts future hand-joint forces and future tactile latents, encouraging the shared Transformer trunk to learn contact-aware representations for dexterous interaction. Across five contact-rich tasks, Insert-T, Book Organization, Towel Folding, Cat Litter Scooping, and Tea Serving, HTD achieves a 90.9% relative improvement in average success rate over the stronger baseline. Ablation results further show that latent-space tactile prediction is more effective than raw tactile prediction, yielding a 30% relative gain in success rate. These results demonstrate that combining robust whole-body execution, scalable humanoid data collection, and predictive touch-centered learning enables versatile, high-dexterity humanoid manipulation in the real world. Project webpage: humanoid-touch-dream.github.io.", "link": "http://arxiv.org/abs/2604.13015v1", "date": "2026-04-14", "relevancy": 2.4271, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.615}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6016}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5994}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Versatile%20Humanoid%20Manipulation%20with%20Touch%20Dreaming&body=Title%3A%20Learning%20Versatile%20Humanoid%20Manipulation%20with%20Touch%20Dreaming%0AAuthor%3A%20Yaru%20Niu%20and%20Zhenlong%20Fang%20and%20Binghong%20Chen%20and%20Shuai%20Zhou%20and%20Revanth%20Senthilkumaran%20and%20Hao%20Zhang%20and%20Bingqing%20Chen%20and%20Chen%20Qiu%20and%20H.%20Eric%20Tseng%20and%20Jonathan%20Francis%20and%20Ding%20Zhao%0AAbstract%3A%20Humanoid%20robots%20promise%20general-purpose%20assistance%2C%20yet%20real-world%20humanoid%20loco-manipulation%20remains%20challenging%20because%20it%20requires%20whole-body%20stability%2C%20dexterous%20hands%2C%20and%20contact-aware%20perception%20under%20frequent%20contact%20changes.%20In%20this%20work%2C%20we%20study%20dexterous%2C%20contact-rich%20humanoid%20loco-manipulation.%20We%20first%20develop%20an%20RL-based%20whole-body%20controller%20that%20provides%20stable%20lower-body%20and%20torso%20execution%20during%20complex%20manipulation.%20Built%20on%20this%20controller%2C%20we%20develop%20a%20whole-body%20humanoid%20data%20collection%20system%20that%20combines%20VR-based%20teleoperation%20with%20human-to-humanoid%20motion%20mapping%2C%20enabling%20efficient%20collection%20of%20real-world%20demonstrations.%20We%20then%20propose%20Humanoid%20Transformer%20with%20Touch%20Dreaming%20%28HTD%29%2C%20a%20multimodal%20encoder--decoder%20Transformer%20that%20models%20touch%20as%20a%20core%20modality%20alongside%20multi-view%20vision%20and%20proprioception.%20HTD%20is%20trained%20in%20a%20single%20stage%20with%20behavioral%20cloning%20augmented%20by%20touch%20dreaming%3A%20in%20addition%20to%20predicting%20action%20chunks%2C%20the%20policy%20predicts%20future%20hand-joint%20forces%20and%20future%20tactile%20latents%2C%20encouraging%20the%20shared%20Transformer%20trunk%20to%20learn%20contact-aware%20representations%20for%20dexterous%20interaction.%20Across%20five%20contact-rich%20tasks%2C%20Insert-T%2C%20Book%20Organization%2C%20Towel%20Folding%2C%20Cat%20Litter%20Scooping%2C%20and%20Tea%20Serving%2C%20HTD%20achieves%20a%2090.9%25%20relative%20improvement%20in%20average%20success%20rate%20over%20the%20stronger%20baseline.%20Ablation%20results%20further%20show%20that%20latent-space%20tactile%20prediction%20is%20more%20effective%20than%20raw%20tactile%20prediction%2C%20yielding%20a%2030%25%20relative%20gain%20in%20success%20rate.%20These%20results%20demonstrate%20that%20combining%20robust%20whole-body%20execution%2C%20scalable%20humanoid%20data%20collection%2C%20and%20predictive%20touch-centered%20learning%20enables%20versatile%2C%20high-dexterity%20humanoid%20manipulation%20in%20the%20real%20world.%20Project%20webpage%3A%20humanoid-touch-dream.github.io.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13015v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520Versatile%2520Humanoid%2520Manipulation%2520with%2520Touch%2520Dreaming%26entry.906535625%3DYaru%2520Niu%2520and%2520Zhenlong%2520Fang%2520and%2520Binghong%2520Chen%2520and%2520Shuai%2520Zhou%2520and%2520Revanth%2520Senthilkumaran%2520and%2520Hao%2520Zhang%2520and%2520Bingqing%2520Chen%2520and%2520Chen%2520Qiu%2520and%2520H.%2520Eric%2520Tseng%2520and%2520Jonathan%2520Francis%2520and%2520Ding%2520Z {"title": "GroupKAN: Efficient Kolmogorov-Arnold Networks via Grouped Spline Modeling", "author": "Guojie Li and Tianyi Liu and Anwar P. P. Abdul Majeed and Muhammad Ateeq and Anh Nguyen and Fan Zhang", "abstract": "Medical image segmentation demands models that achieve high accuracy while maintaining computational efficiency and clinical interpretability. While recent Kolmogorov-Arnold Networks (KANs) offer powerful adaptive non-linearities, their full-channel spline transformations incur a quadratic parameter growth of $\\mathcal{O}(C^{2}(G+k))$ with respect to the channel dimension $C$, where $G$ and $k$ denote the number of grid intervals and spline polynomial order, respectively. Moreover, unconstrained spline mappings lack structural constraints, leading to excessive functional freedom, which may cause overfitting under limited medical annotations. To address these challenges, we propose GroupKAN (Grouped Kolmogorov-Arnold Networks), an efficient architecture driven by group-structured spline modeling. Specifically, we introduce: (1) Grouped KAN Transform (GKT), which restricts spline interactions to intra-group channel mappings across $g$ groups, effectively reducing the spline-induced quadratic expansion to \\textbf{$\\mathcal{O}(C^2(\\frac{G+k}{g} + 1))$}, thereby significantly lowering the effective quadratic coefficient; and (2) Grouped KAN Activation (GKA), which applies shared spline functions within each group to enable efficient token-wise non-linearities. By imposing structured constraints on channel interactions, GroupKAN achieves a substantial reduction in parameter redundancy without sacrificing expressive capacity.Extensive evaluations on three medical benchmarks (BUSI, GlaS, and CVC) demonstrate that GroupKAN achieves an average IoU of 79.80\\%, outperforming the strong U-KAN baseline by +1.11\\% while requiring only 47.6\\% of the parameters (3.02M vs. 6.35M). Qualitative results further reveal that GroupKAN produces sharply localized activation maps that better align with the ground truth than MLPs and KANs, significantly enhancing clinical interpretability.", "link": "http://arxiv.org/abs/2511.05477v2", "date": "2026-04-14", "relevancy": 2.4264, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5091}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4736}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4731}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GroupKAN%3A%20Efficient%20Kolmogorov-Arnold%20Networks%20via%20Grouped%20Spline%20Modeling&body=Title%3A%20GroupKAN%3A%20Efficient%20Kolmogorov-Arnold%20Networks%20via%20Grouped%20Spline%20Modeling%0AAuthor%3A%20Guojie%20Li%20and%20Tianyi%20Liu%20and%20Anwar%20P.%20P.%20Abdul%20Majeed%20and%20Muhammad%20Ateeq%20and%20Anh%20Nguyen%20and%20Fan%20Zhang%0AAbstract%3A%20Medical%20image%20segmentation%20demands%20models%20that%20achieve%20high%20accuracy%20while%20maintaining%20computational%20efficiency%20and%20clinical%20interpretability.%20While%20recent%20Kolmogorov-Arnold%20Networks%20%28KANs%29%20offer%20powerful%20adaptive%20non-linearities%2C%20their%20full-channel%20spline%20transformations%20incur%20a%20quadratic%20parameter%20growth%20of%20%24%5Cmathcal%7BO%7D%28C%5E%7B2%7D%28G%2Bk%29%29%24%20with%20respect%20to%20the%20channel%20dimension%20%24C%24%2C%20where%20%24G%24%20and%20%24k%24%20denote%20the%20number%20of%20grid%20intervals%20and%20spline%20polynomial%20order%2C%20respectively.%20Moreover%2C%20unconstrained%20spline%20mappings%20lack%20structural%20constraints%2C%20leading%20to%20excessive%20functional%20freedom%2C%20which%20may%20cause%20overfitting%20under%20limited%20medical%20annotations.%20To%20address%20these%20challenges%2C%20we%20propose%20GroupKAN%20%28Grouped%20Kolmogorov-Arnold%20Networks%29%2C%20an%20efficient%20architecture%20driven%20by%20group-structured%20spline%20modeling.%20Specifically%2C%20we%20introduce%3A%20%281%29%20Grouped%20KAN%20Transform%20%28GKT%29%2C%20which%20restricts%20spline%20interactions%20to%20intra-group%20channel%20mappings%20across%20%24g%24%20groups%2C%20effectively%20reducing%20the%20spline-induced%20quadratic%20expansion%20to%20%5Ctextbf%7B%24%5Cmathcal%7BO%7D%28C%5E2%28%5Cfrac%7BG%2Bk%7D%7Bg%7D%20%2B%201%29%29%24%7D%2C%20thereby%20significantly%20lowering%20the%20effective%20quadratic%20coefficient%3B%20and%20%282%29%20Grouped%20KAN%20Activation%20%28GKA%29%2C%20which%20applies%20shared%20spline%20functions%20within%20each%20group%20to%20enable%20efficient%20token-wise%20non-linearities.%20By%20imposing%20structured%20constraints%20on%20channel%20interactions%2C%20GroupKAN%20achieves%20a%20substantial%20reduction%20in%20parameter%20redundancy%20without%20sacrificing%20expressive%20capacity.Extensive%20evaluations%20on%20three%20medical%20benchmarks%20%28BUSI%2C%20GlaS%2C%20and%20CVC%29%20demonstrate%20that%20GroupKAN%20achieves%20an%20average%20IoU%20of%2079.80%5C%25%2C%20outperforming%20the%20strong%20U-KAN%20baseline%20by%20%2B1.11%5C%25%20while%20requiring%20only%2047.6%5C%25%20of%20the%20parameters%20%283.02M%20vs.%206.35M%29.%20Qualitative%20results%20further%20reveal%20that%20GroupKAN%20produces%20sharply%20localized%20activation%20maps%20that%20better%20align%20with%20the%20ground%20truth%20than%20MLPs%20and%20KANs%2C%20significantly%20enhancing%20clinical%20interpretability.%0ALink%3A%20http%3A//arxiv.org/abs/2511.05477v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGroupKAN%253A%2520Efficient%2520Kolmogorov-Arnold%2520Networks%2520via%2520Grouped%2520Spline%2520Modeling%26entry.906535625%3DGuojie%2520Li%2520and%2520Tiany 6%5C%25%20of%20the%20parameters%20%283.02M%20vs.%206.35M%29.%20Qualitative%20results%20further%20reveal%20that%20GroupKAN%20produces%20sharply%20localized%20activation%20maps%20that%20better%20align%20with%20the%20ground%20truth%20than%20MLPs%20and%20KANs%2C%20significantly%20enhancing%20clinical%20interpretability.&entry.1838667208=http%3A//arxiv.org/abs/2511.05477v2&entry.124074799=Read"},
{"title": "VideoFlexTok: Flexible-Length Coarse-to-Fine Video Tokenization", "author": "Andrei Atanov and Jesse Allardice and Roman Bachmann and O\u011fuzhan Fatih Kar and R Devon Hjelm and David Griffiths and Peter Fu and Afshin Dehghan and Amir Zamir", "abstract": "Visual tokenizers map high-dimensional raw pixels into a compressed representation for downstream modeling. Beyond compression, tokenizers dictate what information is preserved and how it is organized. A de facto standard approach to video tokenization is to represent a video as a spatiotemporal 3D grid of tokens, each capturing the corresponding local information in the original signal. This requires the downstream model that consumes the tokens, e.g., a text-to-video model, to learn to predict all low-level details \"pixel-by-pixel\" irrespective of the video's inherent complexity, leading to high learning complexity.\n  We present VideoFlexTok, which represents videos with a variable-length sequence of tokens structured in a coarse-to-fine manner -- where the first tokens (emergently) capture abstract information, such as semantics and motion, and later tokens add fine-grained details. The generative flow decoder enables realistic video reconstructions from any token count. This representation structure allows adapting the token count according to downstream needs and encoding videos longer than the baselines with the same budget.\n  We evaluate VideoFlexTok on class- and text-to-video generative tasks and show that it leads to more efficient training compared to 3D grid tokens, e.g., achieving comparable generation quality (gFVD and ViCLIP Score) with a 5x smaller model (1.1B vs 5.2B). Finally, we demonstrate how VideoFlexTok can enable long video generation without prohibitive computational cost by training a text-to-video model on 10-second 81-frame videos with only 672 tokens, 8x fewer than a comparable 3D grid tokenizer.", "link": "http://arxiv.org/abs/2604.12887v1", "date": "2026-04-14", "relevancy": 2.4197, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6108}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6074}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.584}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VideoFlexTok%3A%20Flexible-Length%20Coarse-to-Fine%20Video%20Tokenization&body=Title%3A%20VideoFlexTok%3A%20Flexible-Length%20Coarse-to-Fine%20Video%20Tokenization%0AAuthor%3A%20Andrei%20Atanov%20and%20Jesse%20Allardice%20and%20Roman%20Bachmann%20and%20O%C4%9Fuzhan%20Fatih%20Kar%20and%20R%20Devon%20Hjelm%20and%20David%20Griffiths%20and%20Peter%20Fu%20and%20Afshin%20Dehghan%20and%20Amir%20Zamir%0AAbstract%3A%20Visual%20tokenizers%20map%20high-dimensional%20raw%20pixels%20into%20a%20compressed%20representation%20for%20downstream%20modeling.%20Beyond%20compression%2C%20tokenizers%20dictate%20what%20information%20is%20preserved%20and%20how%20it%20is%20organized.%20A%20de%20facto%20standard%20approach%20to%20video%20tokenization%20is%20to%20represent%20a%20video%20as%20a%20spatiotemporal%203D%20grid%20of%20tokens%2C%20each%20capturing%20the%20corresponding%20local%20information%20in%20the%20original%20signal.%20This%20requires%20the%20downstream%20model%20that%20consumes%20the%20tokens%2C%20e.g.%2C%20a%20text-to-video%20model%2C%20to%20learn%20to%20predict%20all%20low-level%20details%20%22pixel-by-pixel%22%20irrespective%20of%20the%20video%27s%20inherent%20complexity%2C%20leading%20to%20high%20learning%20complexity.%0A%20%20We%20present%20VideoFlexTok%2C%20which%20represents%20videos%20with%20a%20variable-length%20sequence%20of%20tokens%20structured%20in%20a%20coarse-to-fine%20manner%20--%20where%20the%20first%20tokens%20%28emergently%29%20capture%20abstract%20information%2C%20such%20as%20semantics%20and%20motion%2C%20and%20later%20tokens%20add%20fine-grained%20details.%20The%20generative%20flow%20decoder%20enables%20realistic%20video%20reconstructions%20from%20any%20token%20count.%20This%20representation%20structure%20allows%20adapting%20the%20token%20count%20according%20to%20downstream%20needs%20and%20encoding%20videos%20longer%20than%20the%20baselines%20with%20the%20same%20budget.%0A%20%20We%20evaluate%20VideoFlexTok%20on%20class-%20and%20text-to-video%20generative%20tasks%20and%20show%20that%20it%20leads%20to%20more%20efficient%20training%20compared%20to%203D%20grid%20tokens%2C%20e.g.%2C%20achieving%20comparable%20generation%20quality%20%28gFVD%20and%20ViCLIP%20Score%29%20with%20a%205x%20smaller%20model%20%281.1B%20vs%205.2B%29.%20Finally%2C%20we%20demonstrate%20how%20VideoFlexTok%20can%20enable%20long%20video%20generation%20without%20prohibitive%20computational%20cost%20by%20training%20a%20text-to-video%20model%20on%2010-second%2081-frame%20videos%20with%20only%20672%20tokens%2C%208x%20fewer%20than%20a%20comparable%203D%20grid%20tokenizer.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12887v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVideoFlexTok%253A%2520Flexible-Length%2520Coarse-to-Fine%2520Video%2520Tokenization%26entry.906535625%3DAndrei%2520Atanov%2520and%2520Jesse%2520Allardice%2520and%2520Roman%2520Bachmann%2520and%2520O%25C4%259Fuzhan%2520Fatih%2520Kar%2520and%2520R%2520Devon%2520Hjelm%2520and%2520David%2520Griffiths%2520and%2520Peter%2520Fu%2520and%2520Afshin%2520Dehghan%2520and%2520Amir%2520Zamir%26entry.1292438233%3DVisual%2520tokenizers%2520map%2520high-dimensional%2520raw%2520pixels%2520into%2520a%2520compressed%2520representation%2520for%2520downstream%2520modeling.%2520Beyond%2520compression%252C%2520tokenizers%2520dictate%2520what%2520information%2520is%2520preserved%2520and%2520h {"title": "DocSeeker: Structured Visual Reasoning with Evidence Grounding for Long Document Understanding", "author": "Hao Yan and Yuliang Liu and Xingchen Liu and Yuyi Zhang and Minghui Liao and Jihao Wu and Wei Chen and Xiang Bai", "abstract": "Existing Multimodal Large Language Models (MLLMs) suffer from significant performance degradation on the long document understanding task as document length increases. This stems from two fundamental challenges: 1) a low Signal-to-Noise Ratio (SNR), with crucial evidence buried in irrelevant pages; and 2) supervision scarcity, as datasets offering only final short answers provide a weak learning signal. In this paper, we address these challenges by proposing a paradigm that requires the model to execute a structured ``\\textbf{Analysis}, \\textbf{Localization} and \\textbf{Reasoning}'' workflow. To instill this capability, we design a two-stage training framework: we first perform Supervised Fine-Tuning on high-quality data generated via an efficient knowledge distillation strategy. Subsequently, we employ an Evidence-aware Group Relative Policy Optimization which jointly optimizes for both evidence localization and answer accuracy. Additionally, we introduce a Evidence-Guided Resolution Allocation strategy to mitigate memory constraints of training on multi-pages documents. Extensive experiments demonstrate that DocSeeker achieves superior performance on both in-domain and out-of-domain tasks. We show it robustly generalizes from short-page training to ultra-long documents and is naturally synergistic with visual Retrieval-Augmented Generation systems, serving as a solid foundation for their implementation.", "link": "http://arxiv.org/abs/2604.12812v1", "date": "2026-04-14", "relevancy": 2.4154, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6053}, {"title": "Lexicon3D: Probing Visual Foundation Models for

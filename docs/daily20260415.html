{"title": "Turbo-DDCM: Fast and Flexible Zero-Shot Diffusion-Based Image Compression", "author": "Amit Vaisman and Guy Ohayon and Hila Manor and Michael Elad and Tomer Michaeli", "abstract": "While zero-shot diffusion-based compression methods have seen significant progress in recent years, they remain notoriously slow and computationally demanding. This paper presents an efficient zero-shot diffusion-based compression method that runs substantially faster than existing methods, while maintaining performance that is on par with the state-of-the-art techniques. Our method builds upon the recently proposed Denoising Diffusion Codebook Models (DDCMs) compression scheme. Specifically, DDCM compresses an image by sequentially choosing the diffusion noise vectors from reproducible random codebooks, guiding the denoiser's output to reconstruct the target image. We modify this framework with Turbo-DDCM, which efficiently combines a large number of noise vectors at each denoising step, thereby significantly reducing the number of required denoising operations. This modification is also coupled with an improved encoding protocol. Furthermore, we introduce two flexible variants of Turbo-DDCM, a priority-aware variant that prioritizes user-specified regions and a distortion-controlled variant that compresses an image based on a target PSNR rather than a target BPP. Comprehensive experiments position Turbo-DDCM as a compelling, practical, and flexible image compression scheme.", "link": "http://arxiv.org/abs/2511.06424v2", "date": "2026-04-14", "relevancy": 2.3078, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.6364}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5657}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": {"title": "OM4OV: Leveraging Ontology Matching for Ontology Versioning", "author": "Zhangcheng Qiang and Kerry Taylor and Weiqing Wang", "abstract": "Due to the dynamic nature of the Semantic Web, version control is necessary to manage changes in widely used ontologies. Despite the long-standing recognition of ontology versioning (OV) as a crucial component of efficient ontology management, many approaches treat OV as similar to ontology matching (OM) and directly reuse OM systems for OV tasks. In this study, we systematically analyse similarities and differences between OM and OV and formalise an OM4OV pipeline to offer more advanced OV support. The pipeline is implemented and evaluated in the state-of-the-art OM system Agent-OM. The experimental results indicate that OM systems can be effectively reused for OV tasks, but without necessary extensions, can produce skewed measurements, poor performance in detecting update entities, and limited explanation of false mappings. To tackle these issues, we propose an optimisation method called the cross-reference (CR) mechanism, which builds on existing OM alignments to reduce the number of matching candidates and to improve overall OV performance.", "link": "http://arxiv.org/abs/2409.20302v11", "date": "2026-04-14", "relevancy": 2.3036, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4647}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4647}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.4528}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OM4OV%3A%20Leveraging%20Ontology%20Matching%20for%20Ontology%20Versioning&body=Title%3A%20 {"title": "DINO-Explorer: Active Underwater Discovery via Ego-Motion Compensated Semantic Predictive Coding", "author": "Yuhan Jin and Nayari Marie Lessa and Mariela De Lucas Alvarez and Melvin Laux and Lucas Amparo Barbosa and Frank Kirchner and Rebecca Adam", "abstract": "Marine ecosystem degradation necessitates continuous, scientifically selective underwater monitoring. However, most autonomous underwater vehicles (AUVs) operate as passive data loggers, capturing exhaustive video for offline review and frequently missing transient events of high scientific value. Transitioning to active perception requires a causal, online signal that highlights significant phenomena while suppressing maneuver-induced visual changes. We propose DINO-Explorer, a novelty-aware perception framework driven by a continuous semantic surprise signal. Operating within the latent space of a frozen DINOv3 foundation model, it leverages a lightweight, action-conditioned recurrent predictor to anticipate short-horizon semantic evolution. An efference-copy-inspired module utilizes globally pooled optical flow to discount self-induced visual changes without suppressing genuine environmental novelty. We evaluate this signal on the downstream task of asynchronous event triage under variant telemetry constraints. Results demonstrate that DINO-Explorer provides a robust, bandwidth-efficient attention mechanism. At a fixed operating point, the system retains 78.8% of post-discovery human-reviewer consensus events with a 56.8% trigger confirmation rate, effectively surfacing mission-relevant phenomena. Crucially, ego-motion conditioning suppresses 45.5% of false positives relative to an uncompensated surprise signal baseline. In a replay-side Pareto ablation study, DINO-Explorer robustly dominates the validated peak F1 versus telemetry bandwidth frontier, reducing telemetry bandwidth by 48.2% at the selected operating point while maintaining a 62.2% peak F1 score, successfully concentrating data transmission around human-verified novelty events.", "link": "http://arxiv.org/abs/2604.12933v1", "date": "2026-04-14", "relevancy": 2.2993, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5762}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5762}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5678}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DINO-Explorer%3A%20Active%20Underwater%20Discovery%20via%20Ego-Motion%20Compensated%20Semantic%20Predictive%20Coding&body=Title%3A%20DINO-Explorer%3A%20Active%20Underwater%20Discovery%20via%20Ego-Motion%20Compensated%20Semantic%20Predictive%20Coding%0AAuthor%3A%20Yuhan%20Jin%20and%20Nayari%20Marie%20Lessa%20and%20Mariela%20De%20Lucas%20Alvarez%20and%20Melvin%20Laux%20and%20Lucas%20Amparo%20Barbosa%20and%20Frank%20Kirchner%20and%20Rebecca%20Adam%0AAbstract%3A%20Marine%20ecosystem%20degradation%20necessitates%20continuous%2C%20scientifically%20selective%20underwater%20monitoring.%20However%2C%20most%20autonomous%20underwater%20vehicles%20%28AUVs%29%20operate%20as%20passive%20data%20loggers%2C%20capturing%20exhaustive%20video%20for%20offline%20review%20and%20frequently%20missing%20transient%20events%20of%20high%20scientific%20value.%20Transitioning%20to%20active%20perception%20requires%20a%20causal%2C%20online%20signal%20that%20highlights%20significant%20phenomena%20while%20suppressing%20maneuver-induced%20visual%20changes.%20We%20propose%20DINO-Explorer%2C%20a%20novelty-aware%20perception%20framework%20driven%20by%20a%20continuous%20semantic%20surprise%20signal.%20Operating%20within%20the%20latent%20space%20of%20a%20frozen%20DINOv3%20foundation%20model%2C%20it%20leverages%20a%20lightweight%2C%20ac {"title": "Progress-Think: Semantic Progress Reasoning for Vision-Language Navigation", "author": "Shuo Wang and Yucheng Wang and Guoxin Lian and Yongcai Wang and Maiyue Chen and Kaihui Wang and Bo Zhang and Zhizhong Su and Yutian Zhou and Wanting Li and Deying Li and Zhaoxin Fan", "abstract": "Vision-Language Navigation requires agents to act coherently over long horizons by understanding not only local visual context but also how far they have advanced within a multi-step instruction. However, recent Vision-Language-Action models focus on direct action prediction and earlier progress methods predict numeric achievements; both overlook the monotonic co-progression property of the observation and instruction sequences. Building on this insight, Progress-Think introduces semantic progress reasoning, predicting instruction-style progress from visual observations to enable more accurate navigation. To achieve this without expensive annotations, we propose a three-stage framework. In the initial stage, Self-Aligned Progress Pretraining bootstraps a reasoning module via a novel differentiable alignment between visual history and instruction prefixes. Then, Progress-Guided Policy Pretraining injects learned progress states into the navigation context, guiding the policy toward consistent actions. Finally, Progress-Policy Co-Finetuning jointly optimizes both modules with tailored progress-aware reinforcement objectives. Experiments on R2R-CE and RxR-CE show state-of-the-art success and efficiency, demonstrating that semantic progress yields a more consistent representation of navigation advancement.", "link": "http://arxiv.org/abs/2511.17097v2", "date": "2026-04-14", "relevancy": 2.297, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5931}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5705}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5705}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Progress-Think%3A%20Semantic%20Progress%20Reasoning%20for%20Vision-Language%20Navigation&body=Title%3A%20Progress-Think%3A%20Semantic%20Progress%20Reasoning%20for%20Vision-Language%20Navigation%0AAuthor%3A%20Shuo%20Wang%20and%20Yucheng%20Wang%20and%20Guoxin%20Lian%20and%20Yongcai%20Wang%20and%20Maiyue%20Chen%20and%20Kaihui%20Wang%20and%20Bo%20Zhang%20and%20Zhizhong%20Su%20and%20Yutian%20Zhou%20and%20Wanting%20Li%20and%20Deying%20Li%20and%20Zhaoxin%20Fan%0AAbstract%3A%20Vision-Language%20Navigation%20requires%20agents%20to%20act%20coherently%20over%20long%20horizons%20by%20understanding%20not%20only%20local%20visual%20context%20but%20also%20how%20far%20they%20have%20advanced%20within%20a%20multi-step%20instruction.%20However%2C%20recent%20Vision-Language-Action%20models%20focus%20on%20direct%20action%20prediction%20and%20earlier%20progress%20methods%20predict%20numeric%20achievements%3B%20both%20overlook%20the%20monotonic%20co-progression%20property%20of%20the%20observation%20and%20instruction%20sequences.%20Building%20on%20this%20insight%2C%20Progress-Think%20introduces%20semantic%20progress%20reasoning%2C%20predicting%20instruction-style%20progress%20from%20visual%20observations%20to%20enable%20more%20accurate%20navigation.%20To%20achieve%20this%20without%20expensive%20annotations%2C%20we%20propose%20a%20three-stage%20framework.%20In%20the%20initial%20stage%2C%20Self-Aligned%20Progress%20Pretraining%20bootstraps%20a%20reasoning%20module%20via%20a%20novel%20differentiable%20alignment%20between%20visual%20history%20and%20instruction%20prefixes.%20Then%2C%20Progress-Guided%20Policy%20Pretraining%20injects%20learned%20progress%20states%20into%20the%20navigation%20context%2C%20guiding%20the%20policy%20toward%20consistent%20actions.%20Finally%2C%20Progress-Policy%20Co-Finetuning%20jointly%20optimizes%20both%20modules%20with%20tailored%20progress-aware%20reinforcement%20objectives.%20Experiments%20on%20R2R-CE%20and%20RxR-CE%20show%20state-of-the-art%20success%20and%20efficiency%2C%20demonstrating%20that%20semantic%20progress%20yields%20a%20more%20consistent%20representation%20of%20navigation%20advancement.%0ALink%3A%20http%3A//arxiv.org/abs/2511.17097v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DProgress-Think%253A%2520Semantic%2520Progress%2520Reasoning%2520for%2520Vision-Language%2520Navigation%26entry.906535625%3DShuo%2520Wang%2520and%2520Yucheng%2520Wang%2520and%2520Guoxin%2520Lian%2520and%2520Yongcai%2520Wang%2520and%2520Maiyue%2520Chen%2520and%2520Kaihui%2520Wang%2520and%2520Bo%2520Zhang%2520and%2520Zhizhong%2520Su%2520and%2520Yutian%2520Zhou%2520and%2520Wanting%2520Li%2520and%2520Deying%2520Li%2520and%2520Zhaoxin%2520Fan%26entry.1292438233%3DVision-Language%2520Navigation%2520requires%2520agents%2520to%2520act%2520coherently%2520over%2520long%2520horizons%2520by%2520understanding%2520not%2520only%2520local%2520visual%2520context%2520but%2520also%2520how%2520far%2520they%2520have%2520advanced%2520within%2520a%2520multi-step%2520instruction.%2520However%252C%2520recent%2520Vision-Language-Action%2520models%2520focus%2520on%2520direct%2520action%2520prediction%2520and%2520earlier%2520progress%2520methods%2520predict%2520numeric%2520achievements%253B%2520both%2520overlook%2520the%2520monotonic%2520co-progression%2520property%2520of%2520the%2520observation%2520and%2520instruction%2520sequences.%2520Building%2520on%2520this%2520insight%252C%2520Progress-Think%2520introduces%2520semantic%2520progress%2520reasoning%252C%2520predicting%2520instruction-style%2520progress%2520from%2520visual%2520observations%2520to%2520enable%2520more%2520accurate%25 {"title": "Pi-HOC: Pairwise 3D Human-Object Contact Estimation", "author": "Sravan Chittupalli and Ayush Jain and Dong Huang", "abstract": "Resolving real-world human-object interactions in images is a many-to-many challenge, in which disentangling fine-grained concurrent physical contact is particularly difficult. Existing semantic contact estimation methods are either limited to single-human settings or require object geometries (e.g., meshes) in addition to the input image. Current state-of-the-art leverages powerful VLM for category-level semantics but struggles with multi-human scenarios and scales poorly in inference. We introduce Pi-HOC, a single-pass, instance-aware framework for dense 3D semantic contact prediction of all human-object pairs. Pi-HOC detects instances, creates dedicated human-object (HO) tokens for each pair, and refines them using an InteractionFormer. A SAM-based decoder then predicts dense contact on SMPL human meshes for each human-object pair. On the MMHOI and DAMON datasets, Pi-HOC significantly improves accuracy and localization over state-of-the-art methods while achieving 20x higher throughput. We further demonstrate that predicted contacts improve SAM-3D image-to-mesh reconstruction via a test-time optimization algorithm and enable referential contact prediction from language queries without additional training.", "link": "http://arxiv.org/abs/2604.12923v1", "date": "2026-04-14", "relevancy": 2.2949, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5916}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5741}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5557}], "mailto": "mailto:haoxiang.li.2024 {"title": "Adaptive Data Dropout: Towards Self-Regulated Learning in Deep Neural Networks", "author": "Amar Gahir and Varshil Patel and Shreyank N Gowda", "abstract": "Deep neural networks are typically trained by uniformly sampling large datasets across epochs, despite evidence that not all samples contribute equally throughout learning. Recent work shows that progressively reducing the amount of training data can improve efficiency and generalization, but existing methods rely on fixed schedules that do not adapt during training. In this work, we propose Adaptive Data Dropout, a simple framework that dynamically adjusts the subset of training data based on performance feedback. Inspired by self-regulated learning, our approach treats data selection as an adaptive process, increasing or decreasing data exposure in response to changes in training accuracy. We introduce a lightweight stochastic update mechanism that modulates the dropout schedule online, allowing the model to balance exploration and consolidation over time. Experiments on standard image classification benchmarks show that our method reduces effective training steps while maintaining competitive accuracy compared to static data dropout strategies. These results highlight adaptive data selection as a promising direction for efficient and robust training. Code will be released.", "link": "http://arxiv.org/abs/2604.12945v1", "date": "2026-04-14", "relevancy": 2.2907, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.6039}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5649}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.514}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Adaptive%20Data%20Dropout%3A%20Towards%20Self-Regulated%20Learning%20in%20Deep%20Neural%20Networks&body=Title%3A%20Adaptive%20Data%20Dropout%3A%20Towards%20Self-Regulated%20Learning%20in%20Deep%20Neural%20Networks%0AAuthor%3A%20Amar%20Gahir%20and%20Varshil%20Patel%20and%20Shreyank%20N%20Gowda%0AAbstract%3A%20Deep%20neural%20networks%20are%20typically%20trained%20by%20uniformly%20sampling%20large%20datasets%20across%20epochs%2C%20despite%20evidence%20that%20not%20all%20samples%20contribute%20equally%20throughout%20learning.%20Recent%20work%20shows%20that%20progressively%20reducing%20the%20amount%20of%20training%20data%20can%20improve%20efficiency%20and%20generalization%2C%20but%20existing%20methods%20rely%20on%20fixed%20schedules%20that%20do%20not%20adapt%20during%20training.%20In%20this%20work%2C%20we%20propose%20Adaptive%20Data%20Dropout%2C%20a%20simple%20framework%20that%20dynamically%20adjusts%20the%20subset%20of%20training%20data%20based%20on%20performance%20feedback.%20Inspired%20by%20self-regulated%20learning%2C%20our%20approach%20treats%20data%20selection%20as%20an%20adaptive%20process%2C%20increasing%20or%20decreasing%20data%20exposure%20in%20response%20to%20changes%20in%20training%20accuracy.%20We%20introduce%20a%20lightweight%20stochastic%20update%20mechanism%20that%20modulates%20the%20dropout%20schedule%20online%2C%20allowing%20the%20model%20to%20balance%20exploration%20and%20consolidation%20over%20time.%20Experiments%20on%20standard%20image%20classification%20benchmarks%20show%20that%20our%20method%20reduces%20effective%20training%20steps%20while%20maintaining%20competitive%20accuracy%20compared%20to%20static%20data%20dropout%20strategies.%20These%20results%20highlight%20adaptive%20data%20selection%20as%20a%20promising%20direction%20for%20efficient%20and%20robust%20training.%20Code%20will%20be%20released.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12945v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.13809 {"title": "LogicEval: A Systematic Framework for Evaluating Automated Repair Techniques for Logical Vulnerabilities in Real-World Software", "author": "Syed Md Mukit Rashid and Abdullah Al Ishtiaq and Kai Tu and Yilu Dong and Tianwei Wu and Ali Ranjbar and Tianchang Yang and Najrin Sultana and Shagufta Mehnaz and Syed Rafiul Hussain", "abstract": "Logical vulnerabilities in software stem from flaws in program logic rather than memory safety, which can lead to critical security failures. Although existing automated program repair techniques primarily focus on repairing memory corruption vulnerabilities, they struggle with logical vulnerabilities because of their limited semantic understanding of the vulnerable code and its expected behavior. On the other hand, recent successes of large language models (LLMs) in understanding and repairing code are promising. However, no framework currently exists to analyze the capabilities and limitations of such techniques for logical vulnerabilities. This paper aims to systematically evaluate both traditional and LLM-based repair approaches for addressing real-world logical vulnerabilities. To facilitate our assessment, we created the first ever dataset, LogicDS, of 86 logical vulnerabilities with assigned CVEs reflecting tangible security impact. We also developed a systematic framework, LogicEval, to evaluate patches for logical vulnerabilities. Evaluations suggest that compilation and testing failures are primarily driven by prompt sensitivity, loss of code context, and difficulty in patch localization.", "link": "http://arxiv.org/abs/2604.12994v1", "date": "2026-04-14", "relevancy": 2.2838, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4694}, {"title": "Lexicon3D: Probing Visual Foundation Models {"title": "On Higher-Order Geometric Refinements of Classical Covariance Asymptotics: An Approach via Intrinsic and Extrinsic Information Geometry", "author": "Malik Amir and Sourangshu Ghosh", "abstract": "Classical Fisher-information asymptotics describe the covariance of regular efficient estimators through the local quadratic approximation of the log-likelihood, and thus capture first-order geometry only. In curved models, including mixtures, curved exponential families, latent-variable models, and manifold-constrained parameter spaces, finite-sample behavior can deviate systematically from these predictions. We develop a coordinate-invariant, curvature-aware refinement by viewing a regular parametric family as a Riemannian manifold \\((\u0398,g)\\) with Fisher--Rao metric, immersed in \\(L^2(\u03bc)\\) through the square-root density map. Under suitable regularity and moment assumptions, we derive an \\(n^{-2}\\) correction to the leading \\(n^{-1}I(\u03b8)^{-1}\\) covariance term for score-root, first-order efficient estimators. The correction is governed by a tensor \\(P_{ij}\\) that decomposes canonically into three parts, an intrinsic Ricci-type contraction of the Fisher--Rao curvature tensor, an extrinsic Gram-type contraction of the second fundamental form, and a Hellinger discrepancy tensor encoding higher-order probabilistic information not determined by immersion geometry alone. The extrinsic term is positive semidefinite, the full correction is invariant under smooth reparameterization, and it vanishes identically for full exponential families. We then extend the picture to singular models, where Fisher information degenerates. Using resolution of singularities under an additive normal crossing assumption, we describe the resolved metric, the role of the real log canonical threshold in learning rates and posterior mean-squared error, and a curvature-based covariance expansion on the resolved space that recovers the regular theory as a special case. Th {"title": "One Token Away from Collapse: The Fragility of Instruction-Tuned Helpfulness", "author": "Erfan Baghaei Potraghloo and Seyedarmin Azizi and Souvik Kundu and Massoud Pedram", "abstract": "Instruction-tuned large language models produce helpful, structured responses, but how robust is this helpfulness when trivially constrained? We show that simple lexical constraints (banning a single punctuation character or common word) cause instruction-tuned LLMs to collapse their responses, losing 14--48% of comprehensiveness in pairwise evaluation across three open-weight model families and one closed-weight model (GPT-4o-mini). The baseline response is preferred in 77--100% of 1,920 pairwise comparisons judged by GPT-4o-mini and GPT-4o. Notably, GPT-4o-mini suffers 31% comprehensiveness loss (99% baseline win rate), demonstrating that the fragility extends to commercially deployed closed-weight models, contrary to prior findings on format-level constraints. Through mechanistic analysis, we identify this as a planning failure: two-pass generation (free generation followed by constrained rewriting) recovers 59--96% of response length, and linear probes on prompt representations predict response length with $R^2 = 0.51$--$0.93$ before generation begins, with $R^2$ tracking collapse severity across models. The same probes yield negative $R^2$ on base models, confirming that instruction tuning creates the representational structure encoding the collapse decision. Crucially, base models show no systematic collapse under identical constraints, with effects that are small, noisy, and bidirectional, demonstrating that instruction tuning creates this fragility by coupling task competence to narrow surface-form templates. The effect replicates on MT-Bench across all eight task categories. We further show that standard independent LLM-as-judge evaluation detects only a 3.5% average quality drop where pairwise evaluation reveals 23%, exposing a methodological blind spot in how constrained generation is assessed.", "link": "http://arxiv.org/abs/2604.13006v1", "date": "2026-04-14", "relevancy": 2.2708, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4587}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4587}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.445}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20One%20Token%20Away%20from%20Collapse%3A%20The%20Fragility%20of%20Instruction-Tuned%20Helpfulness&body=Title%3A%20One%20Token%20Away%20from%20Collapse%3A%20The%20Fragility%20of%20Instruction-Tuned%20Helpfulness%0AAuthor%3A%20Erfan%20Baghaei%20Potraghloo%20and%20Seyedarmin%20Azizi%20and%20Souvik%20Kundu%20and%20Massoud%20Pedram%0AAbstract%3A%20Instruction-tuned%20large%20language%20models%20produce%20helpful%2C%20structured%20responses%2C%20but%20how%20robust%20is%20this%20helpfulness%20when%20trivially%20constrained%3F%20We%20show%20that%20simple%20lexical%20constraints%20%28banning%20a%20single%20punctuation%20character%20or%20common%20word%29%20cause%20instruction-tuned%20LLMs%20to%20collapse%20their%20responses%2C%20losing%2014--48%25%20of%20comprehensiveness%20in%20pairwise%20evaluation%20across%20three%20open-weight%20model%20families%20and%20one%20closed-weight%20model%20%28GPT-4o-mini%29.%20The%20baseline%20response%20is%20preferred%20in%2077--100%25%20of%201%2C920%20pairwise%20comparisons%20judged%20by%20GPT-4o-mini%20and%20GPT-4o.%20Notably%2C%20GPT-4o-mini%20suffers%2031%25%20comprehensiveness%20loss%20%2899%25%20baseline%20win%20rate%29%2C%20demonstrating%20that%20the%20fragility%20extends%20to%20commercially%20deployed%20closed-weight%20models%2C%20contrary%20to%20prior%20findings%20on%20format-level%20constraints.%20Through%20mechanistic%20analysis%2C%20we%20identify%20this%20as%20a%20planning%20failure%3A%20two-pass%20generation%20%28free%20generation%20followed%20by%20constrained%20rewriting%29%20recovers%2059--96%25%20of%20response%20length%2C%20and%20linear%20probes%20on%20prompt%20representations%20predict%20response%20length%20with%20%24R%5E2%20%3D%200.51%24--%240.93%24%20before%20generation%20begins%2C%20with%20%24R%5E2%24%20tracking%20collapse%20severity%20across%20models.%20The%20same%20probes%20yield%20negative%20%24R%5E2%24%20on%20base%20models%2C%20confirming%20that%20instruction%20tuning%20creates%20the%20representational%20structure%20encoding%20the%20collapse%20decision.%20Crucially%2C%20base%20models%20show%20no%20systematic%20collapse%20under%20identical%20constraints%2C%20with%20effects%20that%20are%20small%2C%20noisy%2C%20and%20bidirectional%2C%20demonstrating%20that%20instruction%20tuning%20creates%20this%20fragility%20by%20coupling%20task%20competence%20to%20narrow%20surface-form%20templates.%20The%20effect%20replicates%20on%20MT-Bench%20across%20all%20eight%20task%20categories.%20We%20further%20show%20that%20standard%20independent%20LLM-as-judge%20evaluation%20detects%20only%20a%203.5%25%20average%20quality%20drop%20where%20pairwise%20evaluation%20reveals%2023%25%2C%20exposing%20a%20methodological%20blind%20spot%20in%20how%20constrained%20generation%20is%20assessed.%0ALink%3A%20http%3A//arxiv.org/abs/2604.13006v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOne%2520Token%2520Away%2520from%2520Collapse%253A%2520The%2520Fragility%2520of%2520Instruction-Tuned%2520Helpfulness%26entry.906535625%3DErfan%2520Baghaei%2520Potraghloo%2520and%2520Seyedarmin%2520Azizi%2520and%2520Souvik%2520Kundu%2520and%2520Massoud%2520Pedram%26entry.1292438233%3DInstruction-tuned%2520large%2520language%2520models%2520produce%2520helpful%252C%2520structured% {"title": "TempR1: Improving Temporal Understanding of MLLMs via Temporal-Aware Multi-Task Reinforcement Learning", "author": "Tao Wu and Li Yang and Gen Zhan and Yabin Zhang and Yiting Liao and Junlin Li and Deliang Fu and Li Zhang and Limin Wang", "abstract": "Enhancing the temporal understanding of Multimodal Large Language Models (MLLMs) is essential for advancing long-form video analysis, enabling tasks such as temporal localization, action detection, and time-sensitive question answering. While reinforcement learning (RL) has recently been explored for improving temporal reasoning, existing approaches are often confined to limited task types and data, restricting their generalization across diverse temporal understanding scenarios. To address this challenge, we present TempR1, a temporal-aware multi-task reinforcement learning framework that systematically strengthens MLLMs' temporal comprehension. We curate a multi-task corpus that exposes the model to diverse temporal structures and semantics, and build upon the Group Relative Policy Optimization (GRPO) algorithm to achieve stable and effective cross-task optimization. Specifically, we categorize temporal tasks into three correspondence types between predicted intervals and ground-truth instances, and design tailored localization rewards for each, enabling TempR1 to capture fine-grained temporal dependencies and adapt to different temporal patterns. Extensive experiments demonstrate that TempR1 attains state-of-the-art performance across multiple benchmarks. Moreover, its joint optimization over complementary tasks yields a strong synergistic effect, enhancing both generalization and single-task performance, establishing a scalable and principled paradigm for temporal reasoning in MLLMs.", "link": "http://arxiv.org/abs/2512.03963v3", "date": "2026-04-14", "relevancy": 2.26, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5849}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5699}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5031}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TempR1%3A%20Improving%20Temporal%20Understanding%20of%20MLLMs%20via%20Temporal-Aware%20Multi-Task%20Reinforcement%20Learning&body=Title%3A%20TempR1%3A%20Improving%20Temporal%20Understanding%20of%20MLLMs%20via%20Temporal-Aware%20Multi-Task%20Reinforcement%20Learning%0AAuthor%3A%20Tao%20Wu%20and%20Li%20Yang%20and%20Gen%20Zhan%20and%20Yabin%20Zhang%20and%20Yiting%20Liao%20and%20Junlin%20Li%20and%20Deliang%20Fu%20and%20Li%20Zhang%20and%20Limin%20Wang%0AAbstract%3A%20Enhancing%20the%20temporal%20understanding%20of%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20is%20essential%20for%20advancing%20long-form%20video%20analysis%2C%20enabling%20tasks%20such%20as%20temporal%20localization%2C%20action%20detection%2C%20and%20time-sensitive%20question%20answering.%20While%20reinforcement%20learning%20%28RL%29%20has%20recently%20been%20explored%20for%20improving%20temporal%20reasoning%2C%20existing%20approaches%20are%20often%20confined%20to%20limited%20task%20types%20and%20data%2C%20restricting%20their%20generalization%20across%20diverse%20temporal%20understanding%20scenarios.%20To%20address%20this%20challenge%2C%20we%20present%20TempR1%2C%20a%20temporal-aware%20multi-task%20reinforcement%20learning%20framework%20that%20systematically%20strengthens%20MLLMs%27%20temporal%20comprehension.%20We%20curate%20a%20multi-task%20corpus%20that%20exposes%20the%20model%20to%20diverse%20temporal%20structures%20and%20semantics%2C%20and%20build%20upon%20the%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29%20algorithm%20to%20achieve%20stable%20and%20effective%20cross-task%20optimization.%20Specifically%2C%20we%20categorize%20temporal%20tasks%20into%20three%20correspondence%20types%20between%20predicted%20intervals%20and%20ground-truth%20instances%2C%20and%20design%20tailored%20localization%20rewards%20for%20each%2C%20enabling%20TempR1%20to%20capture%20fine-grained%20temporal%20dependencies%20and%20adapt%20to%20different%20temporal%20patterns.%20Extensive%20experiments%20demonstrate%20that%20TempR1%20attains%20state-of-the-art%20performance%20across%20multiple%20benchmarks.%20Moreover%2C%20its%20joint%20optimization%20over%20complementary%20tasks%20yields%20a%20strong%20synergistic%20effect%2C%20enhancing%20both%20generalization%20and%20single-task%20performance%2C%20establishing%20a%20scalable%20and%20principled%20paradigm%20for%20temporal%20reasoning%20in%20MLLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2512.03963v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTempR1%253A%2520Improving%2520Temporal%2520Understanding%2520of%2520MLLMs%2520via%2520Temporal-Aware%2520Multi-Task%2520Reinforcement%2520Learning%26entry.906535625%3DTao%2520Wu%2520and%2520Li%2520Yang%2520and%2520Gen%2520Zhan%2520and%2520Yabin%2520Zhang%2520and%2520Yiting%2520Liao%2520and%2520Junlin%2520Li%2520and%2520Deliang%2520Fu%2520and%2520Li%2520Zhang%2520and%2520Limin%2520Wang%26entry.1292438233%3DEnhancing%2520the%2520temporal%2520understanding%2520of%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520is%2520essential%2520for%2520advancing%2520long-form%2520video%2520analysis%252C%2520enabling%2520tasks%2520such%2520as%2520temporal%2520localization%252C%2520action%2520detection%252C%2520and%2520time-sensitive%2520question%2520answering.%2520While%2520reinforcement%2520learning%2520%2528RL%2529%2520has%2520recently%2520been%2520explored%2520for%2520improving%2520temporal%2520reasoning%252C%2520existing%2520approaches%2520are%252 {"title": "Reliability-Guided Depth Fusion for Glare-Resilient Navigation Costmaps", "author": "Shang-En Tsai and Wei-Cheng Sun", "abstract": "Specular glare on reflective floors and glass surfaces frequently corrupts RGB-D depth measurements, producing holes and spikes that accumulate as persistent phantom obstacles in occupancy-grid costmaps. This paper proposes a glare-resilient costmap construction method based on explicit depth-reliability modeling. A lightweight Depth Reliability Map (DRM) estimator predicts per-pixel measurement trustworthiness under specular interference, and a Reliability-Guided Fusion (RGF) mechanism uses this signal to modulate occupancy updates before corrupted measurements are accumulated into the map. Experiments on a real mobile robotic platform equipped with an Intel RealSense D435 and a Jetson Orin Nano show that the proposed method substantially reduces false obstacle insertion and improves free-space preservation under real reflective-floor and glass-surface conditions, while introducing only modest computational overhead. These results indicate that treating glare as a measurement-reliability problem provides a practical and lightweight solution for improving costmap correctness and navigation robustness in safety-critical indoor environments.", "link": "http://arxiv.org/abs/2604.12753v1", "date": "2026-04-14", "relevancy": 2.2577, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5921}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5537}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5222}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Reliability-Guided%20Depth%20Fusion%20for%20Glare-Resilient%20Navigation%20Costmaps&body=Title%3A%20Reliability-Guided%20Depth%20Fusion%20for%20Glare-Resilient%20Navigation%20Costmaps%0AAuthor%3A%20Shang-En%20Tsai%20and%20Wei-Cheng%20Sun%0AAbstract%3A%20Specular%20glare%20on%20reflective%20floors%20and%20glass%20surfaces%20frequently%20corrupts%20RGB-D%20depth%20measurements%2C%20producing%20holes%20and%20spikes%20that%20accumulate%20as%20persistent%20phantom%20obstacles%20in%20occupancy-grid%20costmaps.%20This%20paper%20proposes%20a%20glare-resilient%20costmap%20construction%20method%20based%20on%20explicit%20depth-reliability%20modeling.%20A%20lightweight%20Depth%20Reliability%20Map%20%28DRM%29%20estimator%20predicts%20per-pixel%20measurement%20trustworthiness%20under%20specular%20interference%2C%20and%20a%20Reliability-Guided%20Fusion%20%28RGF%29%20mechanism%20uses%20this%20signal%20to%20modulate%20occupancy%20updates%20before%20corrupted%20measurements%20are%20accumulated%20into%20the%20map.%20Experiments%20on%20a%20real%20mobile%20robotic%20platform%20equipped%20with%20an%20Intel%20RealSense%20D435%20and%20a%20Jetson%20Orin%20Nano%20show%20that%20the%20proposed%20method%20substantially%20reduces%20false%20obstacle%20insertion%20and%20improves%20free-space%20preservation%20under%20real%20reflective-floor%20and%20glass-surface%20conditions%2C%20while%20introducing%20only%20modest%20computational%20overhead.%20These%20results%20indicate%20that%20treating%20glare%20as%20a%20measurement-reliability%20problem%20provides%20a%20practical%20and%20lightweight%20solution%20for%20improving%20costmap%20correctness%20and%20navigation%20robustness%20in%20safety-critical%20indoor%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12753v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReliability-Guided%2520Depth%2520Fusion%2520for%2520Glare-Resilient%2520Navigation%2520Costmaps%26entry.906535625%3DShang-En {"title": "Computation of Least Trimmed Squares: A Branch-and-Bound framework with Hyperplane Arrangement Enhancements", "author": "Xiang Meng and Andr\u00e9s G\u00f3mez and Rahul Mazumder", "abstract": "We study computational aspects of a key problem in robust statistics -- the penalized least trimmed squares (LTS) regression problem, a robust estimator that mitigates the influence of outliers in data by capping residuals with large magnitudes. Although statistically attractive, penalized LTS is NP-hard, and existing mixed-integer optimization (MIO) formulations scale poorly due to weak relaxations and exponential worst-case complexity in the number of observations. We propose a new MIO formulation that embeds hyperplane arrangement logic into a perspective reformulation, explicitly enforcing structural properties of optimal solutions. We show that, if the number of features is fixed, the resulting branch-and-bound tree is of polynomial size in the sample size. Moreover, we develop a tailored branch-and-bound algorithm that uses first-order methods with dual bounds to solve node relaxations efficiently. Computational experiments on synthetic and real datasets demonstrate substantial improvements over existing MIO approaches: on synthetic instances with 5000 samples and 20 features, our tailored solver reaches a 1% gap in 1 minute while competing approaches fail to do so within one hour. These gains enable exact robust regression at significantly larger sample sizes in low-dimensional settings.", "link": "http://arxiv.org/abs/2604.11584v2", "date": "2026-04-14", "relevancy": 2.2533, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4704}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4504}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4311}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Computation%20of%20Least%20Trimmed%20Squares%3A%20A%20Branch-and-Bound%20framework%20with%20Hyperplane%20Arrangement%20Enhancements&body=Title%3A%20Computation%20of%20Least%20Trimmed%20Squares%3A%20A%20Branch-and-Bound%20framework%20with%20Hyperplane%20Arrangement%20Enhancements%0AAuthor%3A%20Xiang%20Meng%20and%20Andr%C3%A9s%20G%C3%B3mez%20and%20Rahul%20Mazumder%0AAbstract%3A%20We%20study%20computational%20aspects%20of%20a%20key%20problem%20in%20robust%20statistics%20--%20the%20penalized%20least%20trimmed%20squares%20%28LTS%29%20regression%20problem%2C%20a%20robust%20estimator%20that%20mitigates%20the%20influence%20of%20outliers%20in%20data%20by%20capping%20residuals%20with%20large%20magnitudes.%20Although%20statistically%20attractive%2C%20penalized%20LTS%20is%20NP-hard%2C%20and%20existing%20mixed-integer%20optimization%20%28MIO%29%20formulations%20scale%20poorly%20due%20to%20weak%20relaxations%20and%20exponential%20worst-case%20complexity%20in%20the%20number%20of%20observations.%20We%20propose%20a%20new%20MIO%20formulation%20that%20embeds%20hyperplane%20arrangement%20logic%20into%20a%20perspective%20reformulation%2C%20explicitly%20enforcing%20structural%20properties%20of%20optimal%20solutions.%20We%20show%20that%2C%20if%20the%20number%20of%20features%20is%20fixed%2C%20the%20resulting%20branch-and-bound%20tree%20is%20of%20polynomial%20size%20in%20the%20sample%20size.%20Moreover%2C%20we%20develop%20a%20tailored%20branch-and-bound%20algorithm%20that%20uses%20first-order%20methods%20with%20dual%20bounds%20to%20solve%20node%20relaxations%20efficiently.%20Computational%20experiments%20on%20synthetic%20and%20real%20datasets%20demonstrate%20substantial%20improvements%20over%20existing%20MIO%20approaches%3A%20on%20synthetic%20instances%20with%205000%20samples%20and%2020%20features%2C%20our%20tailored%2 {"title": "When Does Data Augmentation Help? Evaluating LLM and Back-Translation Methods for Hausa and Fongbe NLP", "author": "Mahounan Pericles Adjovi and Roald Eiselen and Prasenjit Mitra", "abstract": "Data scarcity limits NLP development for low-resource African languages. We evaluate two data augmentation methods -- LLM-based generation (Gemini 2.5 Flash) and back-translation (NLLB-200) -- for Hausa and Fongbe, two West African languages that differ substantially in LLM generation quality. We assess augmentation on named entity recognition (NER) and part-of-speech (POS) tagging using MasakhaNER 2.0 and MasakhaPOS benchmarks. Our results reveal that augmentation effectiveness depends on task type rather than language or LLM quality alone. For NER, neither method improves over baseline for either language; LLM augmentation reduces Hausa NER by 0.24% F1 and Fongbe NER by 1.81% F1. For POS tagging, LLM augmentation improves Fongbe by 0.33% accuracy, while back-translation improves Hausa by 0.17%; back-translation reduces Fongbe POS by 0.35% and has negligible effect on Hausa POS. The same LLM-generated synthetic data produces opposite effects across tasks for Fongbe -- hurting NER while helping POS -- suggesting task structure governs augmentation outcomes more than synthetic data quality. These findings challenge the assumption that LLM generation quality predicts augmentation success, and provide actionable guidance: data augmentation should be treated as a task-specific intervention rather than a universally beneficial preprocessing step.", "link": "http://arxiv.org/abs/2604.12540v1", "date": "2026-04-14", "relevancy": 2.2501, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4846}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "simil y%25201.81%2525%2520F1.%2520For%2520POS%2520tagging%252C%2520LLM%2520augmentation%2520improves%2520Fongbe%2520by%25200.33%2525%2520accuracy%252C%2520while%2520back-translation%2520improves%2520Hausa%2520by%25200.17%2525%253B%2520back-translation%2520reduces%2520Fongbe%2520POS%2520by%25200.35%2525%2520and%2520has%2520negligible%2520effect%2520on%2520Hausa%2520POS.%2520The%2520same%2520LLM-generated%2520synthetic%2520data%2520produces%2520opposite%2520effects%2520across%2520tasks%2520for%2520Fongbe%2520--%2520hurting%2520NER%2520while%2520helping%2520POS%2520--%2520suggesting%2520task%2520structure%2520governs%2520augmentation%2520outcomes%2520more%2520than%2520synthetic%2520data%2520quality.%2520These%2520findings%2520challenge%2520the%2520assumption%2520that%2520LLM%2520generation%2520quality%2520predicts%2520augmentation%2520success%252C%2520and%2520provide%2520actionable%2520guidance%253A%2520data%2520augmentation%2520should%2520be%2520treated%2520as%2520a%2520task-specific%2520intervention%2520rather%2520than%2520a%2520universally%2520beneficial%2520preprocessing%2520step.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.12540v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=When%20Does%20Data%20Augmentation%20Help%3F%20Evaluating%20LLM%20and%20Back-Translation%20Methods%20for%20Hausa%20and%20Fongbe%20NLP&entry.906535625=Mahounan%20Pericles%20Adjovi%20and%20Roald%20Eiselen%20and%20Prasenjit%20Mitra&entry.1292438233=Data%20scarcity%20limits%20NLP%20development%20for%20low-resource%20African%20languages.%20We%20evaluate%20two%20data%20augmentation%20methods%20--%20LLM-based%20generation%20%28Gemini%202.5%20Flash%29%20and%20back-translation%20%28NLLB-200%29%20--%20for%20Hausa%20and%20Fongbe%2C%20two%20West%20African%20languages%20that%20differ%20substantially%20in%20LLM%20generation%20quality.%20We%20assess%20augmentation%20on%20named%20entity%20recognition%20%28NER%29%20and%20part-of-speech%20%28POS%29%20tagging%20using%20MasakhaNER%202.0%20and%20MasakhaPOS%20benchmarks.%20Our%20results%20reveal%20that%20augmentation%20effectiveness%20depends%20on%20task%20type%20rather%20than%20language%20or%20LLM%20quality%20alone.%20For%20NER%2C%20neither%20method%20improves%20over%20baseline%20for%20either%20language%3B%20LLM%20augmentation%20reduces%20Hausa%20NER%20by%200.24%25%20F1%20and%20Fongbe%20NER%20by%201.81%25%20F1.%20For%20POS%20tagging%2C%20LLM%20augmentation%20improves%20Fongbe%20by%200.33%25%20accuracy%2C%20while%20back-translation%20improves%20Hausa%20by%200.17%25%3B%20back-translation%20reduces%20Fongbe%20POS%20by%200.35%25%20and%20has%20negligible%20effect%20on%20Hausa%20POS.%20The%20same%20LLM-generated%20synthetic%20data%20produces%20opposite%20effects%20across%20tasks%20for%20Fongbe%20--%20hurting%20NER%20while%20helping%20POS%20--%20suggesting%20task%20structure%20governs%20augmentation%20outcomes%20more%20than%20synthetic%20data%20quality.%20These%20findings%20challenge%20the%20assumption%20that%20LLM%20generation%20quality%20predicts%20augmentation%20success%2C%20and%20provide%20actionable%20guidance%3A%20data%20augmentation%20should%20be%20treated%20as%20a%20task-specific%20intervention%20rather%20than%20a%20universally%20beneficial%20preprocessing%20step.&entry.1838667208=http%3A//arxiv.org/abs/2604.12540v1&entry.124074799=Read"},
{"title": "Many-Tier Instruction Hierarchy in LLM Agents", "author": "Jingyu Zhang and Tianjian Li and William Jurayj and Hongyuan Zhan and Benjamin Van Durme and Daniel Khashabi", "abstract": "Large language model agents receive instructions from many sources-system messages, user prompts, tool outputs, other agents, and more-each carrying different levels of trust and authority. When these instructions conflict, agents must reliably follow the highest-privilege instruction to remain safe and effective. The dominant paradigm, instruction hierarchy (IH), assumes a fixed, small set of privilege levels (typically fewer than five) defined by rigid role labels (e.g., system > user). This is inadequate for real-world agentic settings, where conflicts can arise across far more sources and contexts. In this work, we propose Many-Tier Instruction Hierarchy (ManyIH), a paradigm for resolving instruction conflicts among instructions with arbitrarily many privilege levels. We introduce ManyIH-Bench, the first benchmark for ManyIH. ManyIH-Bench requires models to navigate up to 12 levels of conflicting instructions with varying privileges, comprising 853 agentic tasks (427 coding and 426 instruction-following). ManyIH-Bench composes constraints developed by LLMs and verified by humans to create realistic and difficult test cases spanning 46 real-world agents. Our experiments show that even the current frontier models perform poorly (~40% accuracy) when instruction conflict scales. This work underscores the urgent need for methods that explicitly target fine-grained, scalable instruction conflict resolution in agentic settings.", "link": "http://arxiv.org/abs/2604.09443v3", "date": "2026-04-14", "relevancy": 2.2492, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4888}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4304}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4304}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Many-Tier%20Instruction%20Hierarchy%20in%20LLM%20Agents&body=Title%3A%20Many-Tier%20Instruction%20Hierarchy%20in%20LLM%20Agents%0AAuthor%3A%20Jingyu%20Zhang%20and%20Tianjian%20Li%20and%20William%20Jurayj%20and%20Hongyuan%20Zhan%20and%20Benjamin%20Van%20Durme%20and%20Daniel%20Khashabi%0AAbstract%3A%20Large%20language%20model%20agents%20receive%20instructions%20from%20many%20sources-system%20messages%2C%20user%20prompts%2C%20tool%20outputs%2C%20other%20agents%2C%20and%20more-each%20carrying%20different%20levels%20of%20trust%20and%20authority.%20When%20these%20instructions%20conflict%2C%20agents%20must%20reliably%20follow%20the%20highest-privilege%20instruction%20to%20remain%20safe%20and%20effective.%20The%20dominant%20paradigm%2C%20instruction%20hierarchy%20%28IH%29%2C%20assumes%20a%20fixed%2C%20small%20set%20of%20privilege%20levels%20%28typically%20fewer%20than%20five%29%20defined%20by%20rigid%20role%20labels%20%28e.g.%2C%20system%20%3E%20user%29.%20This%20is%20inadequate%20for%20real-world%20agentic%20settings%2C%20where%20conflicts%20can%20arise%20across%20far%20more%20sources%20and%20contexts.%20In%20this%20work%2C%20we%20propose%20Many-Tier%20Instruction%20Hierarchy%20%28ManyIH%29%2C%20a%20paradigm%20for%20resolving%20instruction%20conflicts%20among%20instructions%20with%20arbitrarily%20many%20privilege%20levels.%20We%20introduce%20ManyIH-Bench%2C%20the%20first%20benchmark%20for%20ManyIH.%20ManyIH-Bench%20requires%20models%20to%20navigate%20up%20to%2012%20levels%20of%20conflicting%20instructions%20with%20varying%20privileges%2C%20comprising%20853%20agentic%20tasks%20%28427%20coding%20and%20426%20instruction-following%29.%20ManyIH-Bench%20composes%20constraints%20developed%20by%20LLMs%20a {"title": "Hail to the Thief: Exploring Attacks and Defenses in Decentralised GRPO", "author": "Nikolay Blagoev and O\u011fuzhan Ersoy and Lydia Yiyu Chen", "abstract": "Group Relative Policy Optimization (GRPO) has demonstrated wide adoption in the post-training of Large Language Models (LLMs). In GRPO, prompts are answered by the model and preferred behaviour is learnt via reinforcement learning. Owing to the small communication volume, GRPO is inherently suitable for decentralised training as the prompts can be concurrently answered by multiple nodes and these completions are exchanged in the form of strings. In this work, we explore the robustness of decentralised GRPO by presenting the first adversarial attacks and countermeasures. We present a diverse set of attacks where malicious nodes poison benign models by sharing their poisoned completions. We demonstrate these attacks on math and coding tasks and show that an adversary can achieve attack success rates of up to 100% in as few as 50 iterations. Moreover, to mitigate the attacks, we propose two defense mechanisms that check logit probabilities of completions or utilize an LLM judge to filter completions. The defenses prevent all but the DoS attack that causes unnecessarily lengthy but conceptually correct completions. The code of both attacks and defenses can be found at: https://github.com/gensyn-ai/HTTT.", "link": "http://arxiv.org/abs/2511.09780v2", "date": "2026-04-14", "relevancy": 2.2434, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4572}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4475}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4413}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Hail%20to%20the%20Thief%3A%20Exploring%20Attacks%20and%20Defenses%20in%20Decentralised%20GRPO&body=Title%3A%20Hail%20to%20the%20Thief%3A%20Exploring%20Attacks%20and%20Defenses%20in%20Decentralised%20GRPO%0AAuthor%3A%20Nikolay%20Blagoev%20and%20O%C4%9Fuzhan%20Ersoy%20and%20Lydia%20Yiyu%20Chen%0AAbstract%3A%20Group%20Relative%20Policy%20Optimization%20%28GRPO%29%20has%20demonstrated%20wide%20adoption%20in%20the%20post-training%20of%20Large%20Language%20Models%20%28LLMs%29.%20In%20GRPO%2C%20prompts%20are%20answered%20by%20the%20model%20and%20preferred%20behaviour%20is%20learnt%20via%20reinforcement%20learning.%20Owing%20to%20the%20small%20communication%20volume%2C%20GRPO%20is%20inherently%20suitable%20for%20decentralised%20training%20as%20the%20prompts%20can%20be%20concurrently%20answered%20by%20multiple%20nodes%20and%20these%20completions%20are%20exchanged%20in%20the%20form%20of%20strings.%20In%20this%20work%2C%20we%20explore%20the%20robustness%20of%20decentralised%20GRPO%20by%20presenting%20the%20first%20adversarial%20attacks%20and%20countermeasures.%20We%20present%20a%20diverse%20set%20of%20attacks%20where%20malicious%20nodes%20poison%20benign%20models%20by%20sharing%20their%20poisoned%20completions.%20We%20demonstrate%20these%20attacks%20on%20math%20and%20coding%20tasks%20and%20show%20that%20an%20adversary%20can%20achieve%20attack%20success%20rates%20of%20up%20to%20100%25%20in%20as%20few%20as%2050%20iterations.%20Moreover%2C%20to%20mitigate%20the%20attacks%2C%20we%20propose%20two%20defense%20mechanisms%20that%20check%20logit%20probabilities%20of%20completions%20or%20utilize%20an%20LLM%20judge%20to%20filter%20completions.%20The%20defenses%20prevent%20all%20but%20the%20DoS%20attack%20that%20causes%20unnecessarily%20lengthy%20but%20conceptually%20correct%20completions.%20The%20code%20of%20both%20attacks%20and%20defenses%20can%20be%20found%20at%3A%20https%3A//github.com/gensyn-ai/HTTT.%0ALink%3A%20http%3A//arxiv.org/abs/2511.09780v2%0AForm%3A%20https%3A//docs.google.c {"title": "DPC-VQA: Decoupling Quality Perception and Residual Calibration for Video Quality Assessment", "author": "Xinyue Li and Shubo Xu and Zhichao Zhang and Zhaolin Cai and Yitong Chen and Guangtao Zhai", "abstract": "Recent multimodal large language models (MLLMs) have shown promising performance on video quality assessment (VQA) tasks. However, adapting them to new scenarios remains expensive due to large-scale retraining and costly mean opinion score (MOS) annotations. In this paper, we argue that a pretrained MLLM already provides a useful perceptual prior for VQA, and that the main challenge is to efficiently calibrate this prior to the target MOS space. Based on this insight, we propose DPC-VQA, a decoupling perception and calibration framework for video quality assessment. Specifically, DPC-VQA uses a frozen MLLM to provide a base quality estimate and perceptual prior, and employs a lightweight calibration branch to predict a residual correction for target-scenario adaptation. This design avoids costly end-to-end retraining while maintaining reliable performance with lower training and data costs. Extensive experiments on both user-generated content (UGC) and AI-generated content (AIGC) benchmarks show that DPC-VQA achieves competitive performance against representative baselines, while using less than 2% of the trainable parameters of conventional MLLM-based VQA methods and remaining effective with only 20\\% of MOS labels. The code will be released upon publication.", "link": "http://arxiv.org/abs/2604.12813v1", "date": "2026-04-14", "relevancy": 2.2373, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5703}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5571}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5571}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DPC-VQA%3A%20Decoupling%20Quality%20Perception%20and%20Residual%20Calibration%20for%20Video%20Quality%20Assessment&body=Title%3A%20DPC-VQA%3A%20Decoupling%20Quality%20Perception%20and%20Residual%20Calibration%20for%20Video%20Quality%20Assessment%0AAuthor%3A%20Xinyue%20Li%20and%20Shubo%20Xu%20and%20Zhichao%20Zhang%20and%20Zhaolin%20Cai%20and%20Yitong%20Chen%20and%20Guangtao%20Zhai%0AAbstract%3A%20Recent%20multimodal%20large%20language%20models%20%28MLLMs%29%20have%20shown%20promising%20performance%20on%20video%20quality%20assessment%20%28VQA%29%20tasks.%20However%2C%20adapting%20them%20to%20new%20scenarios%20remains%20expensive%20due%20to%20large-scale%20retraining%20and%20costly%20mean%20opinion%20score%20%28MOS%29%20annotations.%20In%20this%20paper%2C%20we%20argue%20that%20a%20pretrained%20MLLM%20already%20provides%20a%20useful%20perceptual%20prior%20for%20VQA%2C%20and%20that%20the%20main%20challenge%20is%20to%20efficiently%20calibrate%20this%20prior%20to%20the%20target%20MOS%20space.%20Based%20on%20this%20insight%2C%20we%20propose%20DPC-VQA%2C%20a%20decoupling%20perception%20and%20calibration%20framework%20for%20video%20quality%20assessment.%20Specifically%2C%20DPC-VQA%20uses%20a%20frozen%20MLLM%20to%20provide%20a%20base%20quality%20estimate%20and%20perceptual%20prior%2C%20and%20employs%20a%20lightweight%20calibration%20branch%20to%20predict%20a%20residual%20correction%20for%20target-scenario%20adaptation.%20This%20design%20avoids%20costly%20end-to-end%20retraining%20while%20maintaining%20reliable%20performance%20with%20lower%20training%20and%20data%20costs.%20Extensive%20experiments%20on%20both%20user-generated%20content%20%28UGC%29%20and%20AI-generated%20content%20%28AIGC%29%20benchmarks%20show%20that%20DPC-VQA%20achieves%20competitive%20performance%20against%20representative%20baselines%2C%20while {"title": "Gaussian Equivalence for Self-Attention: Asymptotic Spectral Analysis of Attention Matrix", "author": "Tomohiro Hayase and Beno\u00eet Collins and Ryo Karakida", "abstract": "Self-attention layers have become fundamental building blocks of modern deep neural networks, yet their theoretical understanding remains limited, particularly from the perspective of random matrix theory. In this work, we provide a rigorous analysis of the singular value spectrum of the attention matrix and establish the first Gaussian equivalence result for attention. In a natural regime where the inverse temperature remains of constant order, we show that the singular value distribution of the attention matrix is asymptotically characterized by a tractable linear model. We further demonstrate that the distribution of squared singular values deviates from the Marchenko-Pastur law, which has been believed in previous work. Our proof relies on two key ingredients: precise control of fluctuations in the normalization term and a refined linearization that leverages favorable Taylor expansions of the exponential. This analysis also identifies a threshold for linearization and elucidates why attention, despite not being an entrywise operation, admits a rigorous Gaussian equivalence in this regime.", "link": "http://arxiv.org/abs/2510.06685v2", "date": "2026-04-14", "relevancy": 2.2367, "topK": [{"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.4508}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.4508}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4404}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gaussian%20Equivalence%20for%20Self-Attention%3A%20Asymptotic%20Spectral%20Analysis%20of%20Attention%20Matrix&bo {"title": "Probabilistic Feature Imputation and Uncertainty-Aware Multimodal Federated Aggregation", "author": "Nafis Fuad Shahid and Maroof Ahmed and Md Akib Haider and Saidur Rahman Sagor and Aashnan Rahman and Md Azam Hossain", "abstract": "Multimodal federated learning enables privacy-preserving collaborative model training across healthcare institutions. However, a fundamental challenge arises from modality heterogeneity: many clinical sites possess only a subset of modalities due to resource constraints or workflow variations. Existing approaches address this through feature imputation networks that synthesize missing modality representations, yet these methods produce point estimates without reliability measures, forcing downstream classifiers to treat all imputed features as equally trustworthy. In safety-critical medical applications, this limitation poses significant risks. We propose the Probabilistic Feature Imputation Network (P-FIN), which outputs calibrated uncertainty estimates alongside imputed features. This uncertainty is leveraged at two levels: (1) locally, through sigmoid gating that attenuates unreliable feature dimensions before classification, and (2) globally, through Fed-UQ-Avg, an aggregation strategy that prioritizes updates from clients with reliable imputation. Experiments on federated chest X-ray classification using CheXpert, NIH Open-I, and PadChest demonstrate consistent improvements over deterministic baselines, with +5.36% AUC gain in the most challenging configuration.", "link": "http://arxiv.org/abs/2604.12970v1", "date": "2026-04-14", "relevancy": 2.2295, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.583}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5616}, {"title": "Flexible Visual Recogni {"title": "Face Density as a Proxy for Data Complexity: Quantifying the Hardness of Instance Count", "author": "Abolfazl Mohammadi-Seif and Ricardo Baeza-Yates", "abstract": "Machine learning progress has historically prioritized model-centric innovations, yet achievable performance is frequently capped by the intrinsic complexity of the data itself. In this work, we isolate and quantify the impact of instance density (measured by face count) as a primary driver of data complexity. Rather than simply observing that ``crowded scenes are harder,'' we rigorously control for class imbalance to measure the precise degradation caused by density alone.\n  Controlled experiments on the WIDER FACE and Open Images datasets, restricted to exactly 1 to 18 faces per image with perfectly balanced sampling, reveal that model performance degrades monotonically with increasing face count. This trend holds across classification, regression, and detection paradigms, even when models are fully exposed to the entire density range. Furthermore, we demonstrate that models trained on low-density regimes fail to generalize to higher densities, exhibiting a systematic under-counting bias, with error rates increasing by up to 4.6x, which suggests density acts as a domain shift.\n  These findings establish instance density as an intrinsic, quantifiable dimension of data hardness and motivate specific interventions in curriculum learning and density-stratified evaluation.", "link": "http://arxiv.org/abs/2604.09689v2", "date": "2026-04-14", "relevancy": 2.2272, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4549}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4407}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4407}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Face%20Density%20as%20a%20Proxy%20for%20Data%20Complexity%3A%20Quantifying%20the%20Hardness%20of%20Instance%20Count&body=Title%3A%20Face%20Density%20as%20a%20Proxy%20for%20Data%20Complexity%3A%20Quantifying%20the%20Hardness%20of%20Instance%20Count%0AAuthor%3A%20Abolfazl%20Mohammadi-Seif%20and%20Ricardo%20Baeza-Yates%0AAbstract%3A%20Machine%20learning%20progress%20has%20historically%20prioritized%20model-centric%20innovations%2C%20yet%20achievable%20performance%20is%20frequently%20capped%20by%20the%20intrinsic%20complexity%20of%20the%20data%20itself.%20In%20this%20work%2C%20we%20isolate%20and%20quantify%20the%20impact%20of%20instance%20density%20%28measured%20by%20face%20count%29%20as%20a%20primary%20driver%20of%20data%20complexity.%20Rather%20than%20simply%20observing%20that%20%60%60crowded%20scenes%20are%20harder%2C%27%27%20we%20rigorously%20control%20for%20class%20imbalance%20to%20measure%20the%20precise%20degradation%20caused%20by%20density%20alone.%0A%20%20Controlled%20experiments%20on%20the%20WIDER%20FACE%20and%20Open%20Images%20datasets%2C%20restricted%20to%20exactly%201%20to%2018%20faces%20per%20image%20with%20perfectly%20balanced%20sampling%2C%20reveal%20that%20model%20performance%20degrades%20monotonically%20with%20increasing%20face%20count.%20This%20trend%20holds%20across%20classification%2C%20regression%2C%20and%20detection%20paradigms%2C%20even%20when%20models%20are%20fully%20exposed%20to%20the%20entire%20density%20range.%20Furthermore%2C%20we%20demonstrate%20that%20models%20trained%20on%20low-density%20regimes%20fail%20to%20generalize%20to%20higher%20densities%2C%20exhibiting%20a%20systematic%20under-counting%20bias%2C%20with%20error%20rates%20increasing%20by%20up%20to%204.6x%2C%20which%20suggests%20density%20acts%20as%20a%20domain%20shift.%0A%20%20These%20findings%20establish%20instance%20density%20as%20an%20intrinsic%2C%20quantifiable%20dimension%20of%20data%20hardness%20and%20motivate%20specific%20interventions%20in%20curriculum%20learning%20and%20density-stratified%20evaluation.%0ALink%3A%20http%3A//arxiv.org/abs/2604.09689v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFace%2520Density%2520as%2520a%2520Proxy%2520for%2520Data%2520Complexity%253A%2520Quantifying%2520the%2520Hardness%2520of%2520Instance%2520Count%26entry.906535625%3DAbolfazl%2520Mohammadi-Seif%2520and%2520Ricardo%2520Baeza-Yates%26entry.1292438233%3DMachine%2520learning%2520progress%2520has%2520historically%2520prioritized%2520model-centric%2520innovations%252C%2520yet%2520achievable%2520performance%2520is%2520frequently%2520capped%2520by%2520the%2520intrinsic%2520complexity%2520of%2520the%2520data%2520itself.%2520In%2520this%2520work%252C%2520we%2520isolate%2520and%2520quantify%2520the%2520impact%2520of%2520instance%2520density%2520%2528measured%2520by%2520face%2520count%2529%2520as%2520a%2520primary%2520driver%2520of%2520data%2520complexity.%2520Rather%2520than%2520simply%2520observing%2520that%2520%2560%2560crowded%2520scenes%2520are%2520harder%252C%2527%2527%2520we%2520rigorously%2520control%2520for%2520class%2520imbalance%2520to%2520measure%2520the%2520precise%2520degradation%2520caused%2520by%2520density%2520alone.%250A%2520%2520Controlled%2520experiments%2520on%2520the%2520WIDER%2520FACE%2520and%2520Open%2520Images%2520datasets%252C%2520restricted%2520to%2520exactly%25201%2520to%252018%2520faces%2520per%2520image%2520with%2520perfectly%2520balanced%2520sampling%252C%2520reveal%2520that%2520model%2520performance%2520degrades%2520monotonically%2520with%2520increasing%2520face%2520count.%2520This%2520trend%2520holds%2520across%2520classification%252C%2520regression%252C%2520and%2520detection%2520paradigms%252C%2520even%2520when%2520models%2520are%2520fully%2520exposed%2520to%2520the%2520entire%2520density%2520range.%2520Furthermore%2 {"title": "Evolution-Inspired Sample Competition for Deep Neural Network Optimization", "author": "Ying Zheng and Yiyi Zhang and Yi Wang and Lap-Pui Chau", "abstract": "Conventional deep network training generally optimizes all samples under a largely uniform learning paradigm, without explicitly modeling the heterogeneous competition among them. Such an oversimplified treatment can lead to several well-known issues, including bias under class imbalance, insufficient learning of hard samples, and the erroneous reinforcement of noisy samples. In this work, we present \\textit{Natural Selection} (NS), a novel evolution-inspired optimization method that explicitly incorporates competitive interactions into deep network training. Unlike conventional sample reweighting strategies that rely mainly on predefined heuristics or static criteria, NS estimates the competitive status of each sample in a group-wise context and uses it to adaptively regulate its training contribution. Specifically, NS first assembles multiple samples into a composite image and rescales it to the original input size for model inference. Based on the resulting predictions, a natural selection score is computed for each sample to characterize its relative competitive variation within the constructed group. These scores are then used to dynamically reweight the sample-wise loss, thereby introducing an explicit competition-driven mechanism into the optimization process. In this way, NS provides a simple yet effective means of moving beyond uniform sample treatment and enables more adaptive and balanced model optimization. Extensive experiments on 12 public datasets across four image classification tasks demonstrate the effectiveness of the proposed method. Moreover, NS is compatible with diverse network architectures and does not depend on task-specific assumptions, indicating its strong generality and practical potential. The code will be made publicly available.", "link": "http://arxiv.org/abs/2604.12568v1", "date": "2026-04-14", "relevancy": 2.2249, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.6127}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5245}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4945}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Evolution-Inspired%20Sample%20Competition%20for%20Deep%20Neural%20Network%20Optimization&body=Title%3A%20Evolution-Inspired%20Sample%20Competition%20for%20Deep%20Neural%20Network%20Optimization%0AAuthor%3A%20Ying%20Zheng%20and%20Yiyi%20Zhang%20and%20Yi%20Wang%20and%20Lap-Pui%20Chau%0AAbstract%3A%20Conventional%20deep%20network%20training%20generally%20optimizes%20all%20samples%20under%20a%20largely%20uniform%20learning%20paradigm%2C%20without%20explicitly%20modeling%20the%20heterogeneous%20competition%20among%20them.%20Such%20an%20oversimplified%20treatment%20can%20lead%20to%20several%20well-known%20issues%2C%20including%20bias%20under%20class%20imbalance%2C%20insufficient%20learning%20of%20hard%20samples%2C%20and%20the%20erroneous%20reinforcement%20of%20noisy%20samples.%20In%20this%20work%2C%20we%20present%20%5Ctextit%7BNatural%20Selection%7D%20%28NS%29%2C%20a%20novel%20evolution-inspired%20optimization%20method%20that%20explicitly%20incorporates%20competitive%20interactions%20into%20deep%20network%20training.%20Unlike%20conventional%20sample%20reweighting%20strategies%20that%20rely%20mainly%20on%20predefined%20heuristics%20or%20static%20criteria%2C%20NS%20estimates%20the%20competitive%20status%20of%20each%20sample%20in%20a%20group-wise%20context%20and%20uses%20it%20to%20adaptively%20regulate%20its%20training%20contribution.%20Specifically%2C%20NS%20first%20assembles%20mult

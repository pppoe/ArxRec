{"title": "Relaxing Anchor-Frame Dominance for Mitigating Hallucinations in Video Large Language Models", "author": "Zijian Liu and Sihan Cao and Pengcheng Zheng and Kuien Liu and Caiyan Qin and Xiaolin Qin and Jiwei Wei and Chaoning Zhang", "abstract": "Recent Video Large Language Models (Video-LLMs) have demonstrated strong capability in video understanding, yet they still suffer from hallucinations. Existing mitigation methods typically rely on training, input modification, auxiliary guidance, or additional decoding procedures, while largely overlooking a more fundamental challenge. During generation, Video-LLMs tend to over-rely on a limited portion of temporal evidence, leading to temporally imbalanced evidence aggregation across the video. To address this issue, we investigate a decoder-side phenomenon in which the model exhibits a temporally imbalanced concentration pattern. We term the frame with the highest aggregated frame-level attention mass the anchor frame. We find that this bias is largely independent of the input video and instead appears to reflect a persistent, model-specific structural or positional bias, whose over-dominance is closely associated with hallucination-prone generation. Motivated by this insight, we propose Decoder-side Temporal Rebalancing (DTR), a training-free, layer-selective inference method that rebalances temporal evidence allocation in middle-to-late decoder layers without altering visual encoding or requiring auxiliary models. DTR adaptively calibrates decoder-side visual attention to alleviate temporally imbalanced concentration and encourage under-attended frames to contribute more effectively to response generation. In this way, DTR guides the decoder to ground its outputs in temporally broader and more balanced video evidence. Extensive experiments on hallucination and video understanding benchmarks show that DTR consistently improves hallucination robustness across diverse Video-LLM families, while preserving competitive video understanding performance and high inference efficiency.", "link": "http://arxiv.org/abs/2604.12582v1", "date": "2026-04-14", "relevancy": 2.8021, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.567}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.567}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5473}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Relaxing%20Anchor-Frame%20Dominance%20for%20Mitigating%20Hallucinations%20in%20Video%20Large%20Language%20Models&body=Title%3A%20Relaxing%20Anchor-Frame%20Dominance%20for%20Mitigating%20Hallucinations%20in%20Video%20Large%20Language%20Models%0AAuthor%3A%20Zijian%20Liu%20and%20Sihan%20Cao%20and%20Pengcheng%20Zheng%20and%20Kuien%20Liu%20and%20Caiyan%20Qin%20and%20Xiaolin%20Qin%20and%20Jiwei%20Wei%20and%20Chaoning%20Zhang%0AAbstract%3A%20Recent%20Video%20Large%20Language%20Models%20%28Video-LLMs%29%20have%20demonstrated%20strong%20capability%20in%20video%20understanding%2C%20yet%20they%20still%20suffer%20from%20hallucinations.%20Existing%20mitigation%20methods%20typically%20rely%20on%20training%2C%20input%20modification%2C%20auxiliary%20guidance%2C%20or%20additional%20decoding%20procedures%2C%20while%20largely%20overlooking%20a%20more%20fundamental%20challenge.%20During%20generation%2C%20Video-LLMs%20tend%20to%20over-rely%20on%20a%20limited%20portion%20of%20temporal%20evidence%2C%20leading%20to%20temporally%20imbalanced%20evidence%20aggregation%20across%20the%20video.%20To%20address%20this%20issue%2C%20we%20investigate%20a%20decoder-side%20phenomenon%20in%20which%20the%20model%20exhibits%20a%20temporally%20imbalanced%20concentration%20pattern.%20We%20term%20the%20frame%20with%20the%20highest%20aggregated%20frame-level%20attention%20mass%20the%20anchor%20frame.%20We%20find%20that%20this%20bias%20is%20largely%20independent%20of%20the%20input%20video%20and%20instead%20appears%20to%20reflect%20a%20persistent%2C%20model-specific%20structural%20or%20positional%20bias%2C%20whose%20over-dominance%20is%20closely%20associated%20with%20hallucination-prone%20generation.%20Motivated%20by%20this%20insight%2C%20we%20propose%20Decoder-side%20Temporal%20Rebalancing%20%28DTR%29%2C%20a%20training-free%2C%20layer-selective%20inference%20method%20that%20rebalances%20temporal%20evidence%20allocation%20in%20middle-to-late%20decoder%20layers%20without%20altering%20visual%20encoding%20or%20requiring%20auxiliary%20models.%20DTR%20adaptively%20calibrates%20decoder-side%20visual%20attention%20to%20alleviate%20temporally%20imbalanced%20concentration%20and%20encourage%20under-attended%20frames%20to%20contribute%20more%20effectively%20to%20response%20generation.%20In%20this%20way%2C%20DTR%20guides%20the%20decoder%20to%20ground%20its%20outputs%20in%20temporally%20broader%20and%20more%20balanced%20video%20evidence.%20Extensive%20experiments%20on%20hallucination%20and%20video%20understanding%20benchmarks%20show%20that%20DTR%20consistently%20improves%20hallucination%20robustness%20across%20diverse%20Video-LLM%20families%2C%20while%20preserving%20competitive%20video%20understanding%20performance%20and%20high%20inference%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12582v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRelaxing%2520Anchor-Frame%2520Dominance%2520for%2520Mitigating%2520Hallucinations%2520in%2520Video%2520Large%2520Language%2520Models%26entry.906535625%3DZijian%2520Liu%2520and%2520Sihan%2520Cao%2520and%2520Pengcheng%2520Zheng%2520and%2520Kuien%2520Liu%2520and%2520Caiyan%2520Qin%2520and%2520Xiaolin%2520Qin%2520and%2520Jiwei%2520Wei%2520and%2520Chaoning%2520Zhang%26entry.1292438 de%2520visual%2520attention%2520to%2520alleviate%2520temporally%2520imbalanced%2520concentration%2520and%2520encourage%2520under-attended%2520frames%2520to%2520contribute%2520more%2520effectively%2520to%2520response%2520generation.%2520In%2520this%2520way%252C%2520DTR%2520guides%2520the%2520decoder%2520to%2520ground%2520its%2520outputs%2520in%2520temporally%2520broader%2520and%2520more%2520balanced%2520video%2520evidence.%2520Extensive%2520experiments%2520on%2520hallucination%2520and%2520video%2520understanding%2520benchmarks%2520show%2520that%2520DTR%2520consistently%2520improves%2520hallucination%2520robustness%2520across%2520diverse%2520Video-LLM%2520families%252C%2520while%2520preserving%2520competitive%2520video%2520understanding%2520performance%2520and%2520high%2520inference%2520efficiency.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.12582v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Relaxing%20Anchor-Frame%20Dominance%20for%20Mitigating%20Hallucinations%20in%20Video%20Large%20Language%20Models&entry.906535625=Zijian%20Liu%20and%20Sihan%20Cao%20and%20Pengcheng%20Zheng%20and%20Kuien%20Liu%20and%20Caiyan%20Qin%20and%20Xiaolin%20Qin%20and%20Jiwei%20Wei%20and%20Chaoning%20Zhang&entry.1292438233=Recent%20Video%20Large%20Language%20Models%20%28Video-LLMs%29%20have%20demonstrated%20strong%20capability%20in%20video%20understanding%2C%20yet%20they%20still%20suffer%20from%20hallucinations.%20Existing%20mitigation%20methods%20typically%20rely%20on%20training%2C%20input%20modification%2C%20auxiliary%20guidance%2C%20or%20additional%20decoding%20procedures%2C%20while%20largely%20overlooking%20a%20more%20fundamental%20challenge.%20During%20generation%2C%20Video-LLMs%20tend%20to%20over-rely%20on%20a%20limited%20portion%20of%20temporal%20evidence%2C%20leading%20to%20temporally%20imbalanced%20evidence%20aggregation%20across%20the%20video.%20To%20address%20this%20 {"title": "Subspace-Guided Feature Reconstruction for Unsupervised Anomaly Localization", "author": "Katsuya Hotta and Chao Zhang and Yoshihiro Hagihara and Takuya Akashi", "abstract": "Unsupervised anomaly localization aims to identify anomalous regions that deviate from normal sample patterns. Most recent methods perform feature matching or reconstruction for the target sample with pre-trained deep neural networks. However, they still struggle to address challenging anomalies because the deep embeddings stored in the memory bank can be less powerful and informative. Specifically, prior methods often overly rely on the finite resources stored in the memory bank, which leads to low robustness to unseen targets. In this paper, we propose a novel subspace-guided feature reconstruction framework to pursue adaptive feature approximation for anomaly localization. It first learns to construct low-dimensional subspaces from the given nominal samples, and then learns to reconstruct the given deep target embedding by linearly combining the subspace basis vectors using the self-expressive model. Our core is that, despite the limited resources in the memory bank, the out-of-bank features can be alternatively ``mimicked'' to adaptively model the target. Moreover, we propose a sampling method that leverages the sparsity of subspaces and allows the feature reconstruction to depend only on a small resource subset, contributing to less memory overhead. Extensive experiments on three benchmark datasets demonstrate that our approach generally achieves state-of-the-art anomaly localization performance.", "link": "http://arxiv.org/abs/2309.13904v3", "date": "2026-04-14", "relevancy": 2.7896, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.601}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https:/ {"title": "Enabling Ultra-Fast Cardiovascular Imaging Across Heterogeneous Clinical Environments with A Generalist Foundation Model and Multimodal Database", "author": "Zi Wang and Mingkai Huang and Zhang Shi and Hongjie Hu and Lan Lan and Hui Zhang and Yan Li and Xi Hu and Qing Lu and Zongming Zhu and Qiong Yao and Yuxiang Dai and Fanwen Wang and Yinzhe Wu and Jun Lyu and Qianqian Gao and Guangming Xu and Zhenxuan Zhang and Haosen Zhang and Qing Li and Guangming Wang and Tianxing He and Lizhen Lan and Siyue Li and Le Xue and Mengting Sun and Yuntong Lyu and Junpu Hu and Jiayu Zhu and Rizwan Ahmad and Zhengyu Bu and Xianling Qian and Guanke Cai and Ruiyu Cao and Weirui Cai and Chang Xu and Yuyang Ren and Feidan Yu and Siying Ma and Ziqiang Xu and Xinran Chen and Sha Hua and Daniel Kim and Yajing Zhang and Chen Ouyang and Wenjia Bai and Jing Qin and Yucheng Yang and Daniel Rueckert and He Wang and Qian Tao and Claudia Prieto and Michael Markl and Alistair Young and Lianming Wu and Shuo Wang and Chen Qin and Mengsu Zeng and Xihong Hu and Haibo Xu and Xiaobo Qu and Hao Li and Guang Yang and Chengyan Wang", "abstract": "Multimodal cardiovascular magnetic resonance (CMR) imaging provides comprehensive and non-invasive insights into cardiovascular disease (CVD) diagnosis and underlying mechanisms. Despite decades of advancements, its widespread clinical adoption remains constrained by prolonged scan times, inconsistent image quality, and heterogeneity across medical environments. This underscores the urgent need for a generalist reconstruction foundation model for ultra-fast CMR imaging, one formulated for physics-constrained inverse problems in the sensor (k-space) domain, capable of adapting across diverse imaging scenarios and serving as the essential substrate for all downstream analyses. To enable this goal, we curate MMCMR-427K, the largest and most comprehensive multimodal CMR k-space database to date, comprising 427,465 multi-coil k-space data paired with structured metadata across 13 international centers, 12 CMR modalities, 15 scanners spanning four field strengths, and 17 CVD categories in populations across three continents. Building on this unprecedented resource, we introduce CardioMM, a generalist reconstruction foundation model capable of dynamically adapting to heterogeneous fast CMR imaging scenarios. CardioMM unifies semantic contextual understanding with physics-informed data consistency to deliver robust reconstructions across varied scanners, protocols, and patient presentations. Comprehensive evaluations demonstrate that CardioMM achieves state-of-the-art performance across internal centers and exhibits strong zero-shot generalization to unseen external settings. Importantly, CardioMM supports acceleration up to 24x, providing the first evidence that such extreme acquisition speed can preserve key cardiac phenotypes, quantitative myocardial biomarkers, and diagnostic image quality without compromising clinical integrity.", "link": "http://arxiv.org/abs/2512.21652v2", "date": "2026-04-14", "relevancy": 2.7271, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5636}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5636}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5091}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Enabling%20Ultra-Fast%20Cardiovascular%20Imaging%20Across%20Heterogeneous%20Clinical%20Environments%20with%20A%20Generalist%20Foundation%20Model%20and%20Multimodal%20Database&body=Title%3A%20Enabling%20Ultra-Fast%20Cardiovascular%20Imaging%20Across%20Heterogeneous%20Clinical%20Environments%20with%20A%20Generalist%20Foundation%20Model%20and%20Multimodal%20Database%0AAuthor%3A%20Zi%20Wang%20and%20Mingkai%20 {"title": "CLASP: Class-Adaptive Layer Fusion and Dual-Stage Pruning for Multimodal Large Language Models", "author": "Yunkai Dang and Yizhu Jiang and Yifan Jiang and Qi Fan and Yinghuan Shi and Wenbin Li and Yang Gao", "abstract": "Multimodal Large Language Models (MLLMs) suffer from substantial computational overhead due to the high redundancy in visual token sequences. Existing approaches typically address this issue using single-layer Vision Transformer (ViT) features and static pruning strategies. However, such fixed configurations are often brittle under diverse instructions. To overcome these limitations, we propose CLASP, a plug-and-play token reduction framework based on class-adaptive layer fusion and dual-stage pruning. Specifically, CLASP first constructs category-specific visual representations through multi-layer vision feature fusion. It then performs dual-stage pruning, allocating the token budget between attention-salient pivot tokens for relevance and redundancy-aware completion tokens for coverage. Through class-adaptive pruning, CLASP enables prompt-conditioned feature fusion and budget allocation, allowing aggressive yet robust visual token reduction. Extensive experiments demonstrate that CLASP consistently outperforms existing methods across a wide range of benchmarks, pruning ratios, and MLLM architectures. Code will be available at https://github.com/Yunkaidang/CLASP.", "link": "http://arxiv.org/abs/2604.12767v1", "date": "2026-04-14", "relevancy": 2.7202, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5951}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.524}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.513}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CLASP%3A%20Class-Adaptive%20Layer%20Fusion%20and%20Dual-Stage%20Pruning%20for%20Multimodal%20Large%20Language%20Models&body=Title%3A%20CLASP%3A%20Class-Adaptive%20Layer%20Fusion%20and%20Dual-Stage%20Pruning%20for%20Multimodal%20Large%20Language%20Models%0AAuthor%3A%20Yunkai%20Dang%20and%20Yizhu%20Jiang%20and%20Yifan%20Jiang%20and%20Qi%20Fan%20and%20Yinghuan%20Shi%20and%20Wenbin%20Li%20and%20Yang%20Gao%0AAbstract%3A%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20suffer%20from%20substantial%20computational%20overhead%20due%20to%20the%20high%20redundancy%20in%20visual%20token%20sequences.%20Existing%20approaches%20typically%20address%20this%20issue%20using%20single-layer%20Vision%20Transformer%20%28ViT%29%20features%20and%20static%20pruning%20strategies.%20However%2C%20such%20fixed%20configurations%20are%20often%20brittle%20under%20diverse%20instructions.%20To%20overcome%20these%20limitations%2C%20we%20propose%20CLASP%2C%20a%20plug-and-play%20token%20reduction%20framework%20based%20on%20class-adaptive%20layer%20fusion%20and%20dual-stage%20pruning.%20Specifically%2C%20CLASP%20first%20constructs%20category-specific%20visual%20representations%20through%20multi-layer%20vision%20feature%20fusion.%20It%20then%20performs%20dual-stage%20pruning%2C%20allocating%20the%20token%20budget%20between%20attention-salient%20pivot%20tokens%20for%20relevance%20and%20redundancy-aware%20completion%20tokens%20for%20coverage.%20Through%20class-adaptive%20pruning%2C%20CLASP%20enables%20prompt-conditioned%20feature%20fusion%20and%20budget%20allocation%2C%20allowing%20aggressive%20yet%20robust%20visual%20token%20reduction.%20Extensive%20experiments%20demonstrate%20that%20CLASP%20consistently%20outperforms%20existing%20methods%20across%20a%20wide%20range%20of%20benchmarks%2C%20pruning%20ratios%2C%20and%20MLLM%20architectures.%20Code%20will%20be%20available%20at%20https%3A//github.com/Yunkaidang/CLASP.%0ALink%3 {"title": "Dress-ED: Instruction-Guided Editing for Virtual Try-On and Try-Off", "author": "Fulvio Sanguigni and Davide Lobba and Bin Ren and Marcella Cornia and Nicu Sebe and Rita Cucchiara", "abstract": "Recent advances in Virtual Try-On (VTON) and Virtual Try-Off (VTOFF) have greatly improved photo-realistic fashion synthesis and garment reconstruction. However, existing datasets remain static, lacking instruction-driven editing for controllable and interactive fashion generation. In this work, we introduce the Dress Editing Dataset (Dress-ED), the first large-scale benchmark that unifies VTON, VTOFF, and text-guided garment editing within a single framework. Each sample in Dress-ED includes an in-shop garment image, the corresponding person image wearing the garment, their edited counterparts, and a natural-language instruction of the desired modification. Built through a fully automated multimodal pipeline that integrates MLLM-based garment understanding, diffusion-based editing, and LLM-guided verification, Dress-ED comprises over 146k verified quadruplets spanning three garment categories and seven edit types, including both appearance (e.g., color, pattern, material) and structural (e.g., sleeve length, neckline) modifications. Based on this benchmark, we further propose a unified multimodal diffusion framework that jointly reasons over linguistic instructions and visual garment cues, serving as a strong baseline for instruction-driven VTON and VTOFF. Dataset and code will be made publicly available. Project page: https://furio1999.github.io/Dress-ED/", "link": "http://arxiv.org/abs/2603.22607v2", "date": "2026-04-14", "relevancy": 2.7011, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.7147}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.6994}, mark%2C%20we%20further%20propose%20a%20unified%20multimodal%20diffusion%20framework%20that%20jointly%20reasons%20over%20linguistic%20instructions%20and%20visual%20garment%20cues%2C%20serving%20as%20a%20strong%20baseline%20for%20instruction-driven%20VTON%20and%20VTOFF.%20Dataset%20and%20code%20will%20be%20made%20publicly%20available.%20Project%20page%3A%20https%3A//furio1999.github.io/Dress-ED/%0ALink%3A%20http%3A//arxiv.org/abs/2603.22607v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDress-ED%253A%2520Instruction-Guided%2520Editing%2520for%2520Virtual%2520Try-On%2520and%2520Try-Off%26entry.906535625%3DFulvio%2520Sanguigni%2520and%2520Davide%2520Lobba%2520and%2520Bin%2520Ren%2520and%2520Marcella%2520Cornia%2520and%2520Nicu%2520Sebe%2520and%2520Rita%2520Cucchiara%26entry.1292438233%3DRecent%2520advances%2520in%2520Virtual%2520Try-On%2520%2528VTON%2529%2520and%2520Virtual%2520Try-Off%2520%2528VTOFF%2529%2520have%2520greatly%2520improved%2520photo-realistic%2520fashion%2520synthesis%2520and%2520garment%2520reconstruction.%2520However%252C%2520existing%2520datasets%2520remain%2520static%252C%2520lacking%2520instruction-driven%2520editing%2520for%2520controllable%2520and%2520interactive%2520fashion%2520generation.%2520In%2520this%2520work%252C%2520we%2520introduce%2520the%2520Dress%2520Editing%2520Dataset%2520%2528Dress-ED%2529%252C%2520the%2520first%2520large-scale%2520benchmark%2520that%2520unifies%2520VTON%252C%2520VTOFF%252C%2520and%2520text-guided%2520garment%2520editing%2520within%2520a%2520single%2520framework.%2520Each%2520sample%2520in%2520Dress-ED%2520includes%2520an%2520in-shop%2520garment%2520image%252C%2520the%2520corresponding%2520person%2520image%2520wearing%2520the%2520garment%252C%2520their%2520edited%2520counterparts%252C%2520and%2520a%2520natural-language%2520instruction%2520of%2520the%2520desired%2520modification.%2520Built%2520through%2520a%2520fully%2520automat {"title": "SAM3-I: Segment Anything with Instructions", "author": "Jingjing Li and Yue Feng and Yuchen Guo and Jincai Huang and Wei Ji and Qi Bi and Yongri Piao and Miao Zhang and Xiaoqi Zhao and Qiang Chen and Shihao Zou and Huchuan Lu and Li Cheng", "abstract": "Segment Anything Model 3 (SAM3) advances open-vocabulary segmentation through promptable concept segmentation, enabling users to segment all instances associated with a given concept using short noun-phrase (NP) prompts. While effective for concept-level grounding, real-world interactions often involve far richer natural-language instructions that combine attributes, relations, actions, states, or implicit reasoning. Currently, SAM3 relies on external multi-modal agents to convert complex instructions into NPs and conducts iterative mask filtering, leading to coarse representations and limited instance specificity. In this work, we present SAM3-I, an instruction-following extension of the SAM family that unifies concept-level grounding and instruction-level reasoning within a single segmentation framework. Built upon SAM3, SAM3-I introduces an instruction-aware cascaded adaptation mechanism with dedicated alignment losses that progressively aligns expressive instruction semantics with SAM3's vision-language representations, enabling direct interpretation of natural-language instructions while preserving its strong concept recall ability. To enable instruction-following learning, we introduce HMPL-Instruct, a large-scale instruction-centric dataset that systematically covers hierarchical instruction semantics and diverse target granularities. Experiments demonstrate that SAM3-I achieves appealing performance across referring and reasoning-based segmentation, showing that SAM3 can be effectively extended to follow complex natural-language instructions without sacrificing its original concept-driven strengths. Code and dataset are available at https://github.com/debby-0527/SAM3-I.", "link": "http://arxiv.org/abs/2512.04585v3", "date": "2026-04-14", "relevancy": 2.6961, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5418}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5418}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5342}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SAM3-I%3A%20Segment%20Anything%20with%20Instructions&body=Title%3A%20SAM3-I%3A%20Segment%20Anything%20with%20Instructions%0AAuthor%3A%20Jingjing%20Li%20and%20Yue%20Feng%20and%20Yuchen%20Guo%20and%20Jincai%20Huang%20and%20Wei%20Ji%20and%20Qi%20Bi%20and%20Yongri%20Piao%20and%20Miao%20Zhang%20and%20Xiaoqi%20Zhao%20and%20Qiang%20Chen%20and%20Shihao%20Zou%20and%20Huchuan%20Lu%20and%20Li%20Cheng%0AAbstract%3A%20Segment%20Anything%20Model%203%20%28SAM3%29%20advances%20open-vocabulary%20segmentation%20through%20promptable%20concept%20segmentation%2C%20enabling%20users%20to%20segment%20all%20instances%20associated%20with%20a%20given%20concept%20using%20short%20noun-phrase%20%28NP%29%20prompts.%20While%20effective%20for%20concept-level%20grounding%2C%20real-world%20interactions%20often%20involve%20far%20richer%20natural-language%20instructions%20that%20combine%20attributes%2C%20relations%2C%20actions%2C%20states%2C%20or%20implicit%20reasoning.%20Currently%2C%20SAM3%20relies%20on%20external%20multi-modal%20agents%20to%20convert%20complex%20instructions%20into%20NPs%20and%20conducts%20iterative%20mask%20filtering%2C%20leading%20to%20coarse%20representations%20and%20limited%20instance%20specificity.%20In%20this%20work%2C%20we%20present%20SAM3-I%2C%20an%20instruction-following%20extension%20of%20the%20SAM%20family%20that%20unifies%20concept-level%20grounding%20and%20instruction-level%20reasoning%20within%20a%20single%20segmentation%20framework.%20Built%20upon%20SAM3%2C%20SAM3-I%20introduces%20an%20instruction-aware%20cascaded%20adaptation%20mechanism%20with%20dedicated%20alignment%20losses%20that%20progressively%20aligns%20expressive%20instruction%20semantics%20with%20SAM3%27s%20vision-language%20representations%2C%20enabling%20direct%20interpretation%20of%20natural-language%20instructions%20while%20preserving%20its%20strong%20concept%20recall%20ability.%20To%20enable%20instruction-following%20learning%2C%20we%20introduce%20HMPL-Instruct%2C%20a%20large-scale%20instruction-centric%20dataset%20that%20systematically%20covers%20hierarchical%20instruction%20semantics%20and%20diverse%20target%20granularities.%20Experiments%20demonstrate%20that%20SAM3-I%20achieves%20appealing%20performance%20across%20referring%20and%20reasoning-based%20segmentation%2C%20showing%20that%20SAM3%20can%20be%20effectively%20extended%20to%20follow%20complex%20natural-language%20instructions%20without%20sacrificing%20its%20original%20concept-driven%20strengths.%20Code%20and%20dataset%20are%20available%20at%20https%3A//github.com/debby-0527/SAM3-I.%0ALink%3A%20http%3A//arxiv.org/abs/2512.04585v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSAM3-I%253A%2520Segment%2520Anything%2520with%2520Instructions%26entry.906535625%3DJingjing%2520Li%2520and%2520Yue%2520Feng%2520and%2520Yuchen%2520Guo%2520and%2520Jincai%2520Huang%2520and%2520Wei%2520Ji%2520and%2520Qi%2520Bi%2520and%2520Yongri%2520Piao%2520and%2520Miao%2520Zhang%2520and%2520Xiaoqi%2520Zhao%2520and%2520Qiang%2520Chen%2520and%2520Shihao%2520Zou%2520and%2520Huchuan%2520Lu%2520and%2520Li%2520Cheng%26entry.1292438233%3DSegment%2520Anything%2520Model%25203%2520%2528SAM3%2529%2520advances%2520open-vocabulary%2520segmentation%2520through%2520promptable%2520concept%2520segmentation%252C%2520enabling%2520users%2520to%2520segment%2520all%2520i n%20instruction-aware%20cascaded%20adaptation%20mechanism%20with%20dedicated%20alignment%20losses%20that%20progressively%20aligns%20expressive%20instruction%20semantics%20with%20SAM3%27s%20vision-language%20representations%2C%20enabling%20direct%20interpretation%20of%20natural-language%20instructions%20while%20preserving%20its%20strong%20concept%20recall%20ability.%20To%20enable%20instruction-following%20learning%2C%20we%20introduce%20HMPL-Instruct%2C%20a%20large-scale%20instruction-centric%20dataset%20that%20systematically%20covers%20hierarchical%20instruction%20semantics%20and%20diverse%20target%20granularities.%20Experiments%20demonstrate%20that%20SAM3-I%20achieves%20appealing%20performance%20across%20referring%20and%20reasoning-based%20segmentation%2C%20showing%20that%20SAM3%20can%20be%20effectively%20extended%20to%20follow%20complex%20natural-language%20instructions%20without%20sacrificing%20its%20original%20concept-driven%20strengths.%20Code%20and%20dataset%20are%20available%20at%20https%3A//github.com/debby-0527/SAM3-I.&entry.1838667208=http%3A//arxiv.org/abs/2512.04585v3&entry.124074799=Read"},
{"title": "One Model for All: Unified Try-On and Try-Off in Any Pose via LLM-Inspired Bidirectional Tweedie Diffusion", "author": "Jinxi Liu and Zijian He and Guangrun Wang and Guanbin Li and Liang Lin", "abstract": "Recent diffusion-based approaches have made significant advances in image-based virtual try-on, enabling more realistic and end-to-end garment synthesis. However, most existing methods remain constrained by their reliance on exhibition garments and segmentation masks, as well as their limited ability to handle flexible pose variations. These limitations reduce their practicality in real-world scenarios; for instance, users cannot easily transfer garments worn by one person onto another, and the generated try-on results are typically restricted to the same pose as the reference image. In this paper, we introduce OMFA (One Model For All), a unified diffusion framework for both virtual try-on and try-off that operates without the need for exhibition garments and supports arbitrary poses. OMFA is inspired by the mask-based paradigm of discrete diffusion language models and unifies try-on and try-off within a bidirectional framework. It is built upon a Bidirectional Tweedie Diffusion process for target-selective denoising in latent space. Instead of imposing lower body constraints, OMFA is an entirely mask-free framework that requires only a single portrait and a target garment as inputs, and is designed to support flexible outfit combinations and cross-person garment transfer, making it better aligned with practical usage scenarios. Additionally, by leveraging SMPL-X-based pose conditioning, OMFA supports multi-view and arbitrary-pose try-on from just one image. Extensive experiments demonstrate that OMFA achieves state-of-the-art results on both try-on and try-off tasks, providing a practical and generalizable solution for virtual garment synthesis. Project page: https://onemodelforall.github.io", "link": "http://arxiv.org/abs/2508.04559v3", "date": "2026-04-14", "relevancy": 2.6929, "topK": [{"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.697}, {"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.6812}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.6557}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20One%20Model%20for%20All%3A%20Unified%20Try-On%20and%20Try-Off%20in%20Any%20Pose%20via%20LLM-Inspired%20Bidirectional%20Tweedie%20Diffusion&body=Title%3A%20One%20Model%20for%20All%3A%20Unified%20Try-On%20and%20Try-Off%20in%20Any%20Pose%20via%20LLM-Inspired%20Bidirectional%20Tweedie%20Diffusion%0AAuthor%3A%20Jinxi%20Liu%20and%20Zijian%20He%20and%20Guangrun%20Wang%20and%20Guanbin%20Li%20and%20Liang%20Lin%0AAbstract%3A%20Recent%20diffusion-based%20approaches%20have%20made%20significant%20advances%20in%20image-based%20virtual%20try-on%2C%20enabling%20more%20realistic%20and%20end-to-end%20garment%20synthesis.%20However%2C%20most%20existing%20methods%20remain%20constrained%20by%20their%20reliance%20on%20exhibition%20garments%20and%20segmentation%20masks%2C%20as%20well%20as%20their%20limited%20ability%20to%20handle%20flexible%20pose%20variations.%20These%20limitations%20reduce%20their%20practicality%20in%20real-world%20scenarios%3B%20for%20instance%2C%20users%20cannot%20easily%20transfer%20garments%20worn%20by%20one%20person%20onto%20another%2C%20and%20the%20generated%20try-on%20results%20are%20typically%20restricted%20to%20the%20same%20pose%20as%20the%20reference%20image.%20In%20this%20paper%2C%20we%20introduce%20OMFA%20%28One%20Model%20For%20All%29%2C%20a%20unified%20diffusion%20framework%20for%20both%20virtual%20try-on%20and%20try-off%20that%20operates%20without%20the%20need%20for%20exhibition%20garments%20and%20supports%20arbitrary%20poses.%20OMFA%20is%20inspired%20by%20the%20mask-based%20paradigm%20of%20discrete%20diffusion%20language%20models%20and%20unifies%20try-on%20and%20try-off%20within%20a%20bidirectional%20framework.%20It%20is%20built%20upon%20a%20Bidirectional%20Tweedie%20Diffusion%20process%20for%20target-selective%20denoising%20in%20latent%20space.%20Instead%20of%20imposing%20lower%20body%20constraints%2C%20OMFA%20is%20an%20entirely%20mask-free%20framework%20that%20requires%20only%20a%20single%20portrait%20and%20a%20target%20garment%20as%20inputs%2C%20and%20is%20designed%20to%20support%20flexible%20outfit%20combinations%20and%20cross-person%20garment%20transfer%2C%20making%20it%20better%20aligned%20with%20practical%20usage%20scenarios.%20Additionally%2C%20by%20leveraging%20SMPL-X-based%20pose%20conditioning%2C%20OMFA%20supports%20multi-view%20and%20arbitrary-pose%20try-on%20from%20just%20one%20image.%20Extensive%20experiments%20demonstrate%20that%20OMFA%20achieves%20state-of-the-art%20results%20on%20both%20try-on%20and%20try-off%20tasks%2C%20providing%20a%20practical%20and%20generalizable%20solution%20for%20virtual%20garment%20synthesis.%20Project%20page%3A%20https%3A//onemodelforall.github.io%0ALink%3A%20http%3A//arxiv.org/abs/2508.04559v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOne%2520Model%2520for%2520All%253A%2520Unified%2520Try-On%2520and%2520Try-Off%2520in%2520Any%2520Pose%2520via%2520LLM-Inspired%2520Bidirectional%2520Tweedie%2520Diffusion%26entry.906535625%3DJinxi%2520Liu%2520and%2520Zijian%2520He%2520and%2520Guangrun%2520Wang%2520and%2520Guanbin%2520Li%2520and%2520Liang%2520Lin%26entry.1292438233%3DRecent%2520diffusion-based%2520approaches%2520have%2520made%2520significant%2520advances%2520in%2520image-based%2520virtual%2520try-on%252C%2520enabling%2520more%2520realistic%2 he%20need%20for%20exhibition%20garments%20and%20supports%20arbitrary%20poses.%20OMFA%20is%20inspired%20by%20the%20mask-based%20paradigm%20of%20discrete%20diffusion%20language%20models%20and%20unifies%20try-on%20and%20try-off%20within%20a%20bidirectional%20framework.%20It%20is%20built%20upon%20a%20Bidirectional%20Tweedie%20Diffusion%20process%20for%20target-selective%20denoising%20in%20latent%20space.%20Instead%20of%20imposing%20lower%20body%20constraints%2C%20OMFA%20is%20an%20entirely%20mask-free%20framework%20that%20requires%20only%20a%20single%20portrait%20and%20a%20target%20garment%20as%20inputs%2C%20and%20is%20designed%20to%20support%20flexible%20outfit%20combinations%20and%20cross-person%20garment%20transfer%2C%20making%20it%20better%20aligned%20with%20practical%20usage%20scenarios.%20Additionally%2C%20by%20leveraging%20SMPL-X-based%20pose%20conditioning%2C%20OMFA%20supports%20multi-view%20and%20arbitrary-pose%20try-on%20from%20just%20one%20image.%20Extensive%20experiments%20demonstrate%20that%20OMFA%20achieves%20state-of-the-art%20results%20on%20both%20try-on%20and%20try-off%20tasks%2C%20providing%20a%20practical%20and%20generalizable%20solution%20for%20virtual%20garment%20synthesis.%20Project%20page%3A%20https%3A//onemodelforall.github.io&entry.1838667208=http%3A//arxiv.org/abs/2508.04559v3&entry.124074799=Read"},
{"title": "Rein3D: Reinforced 3D Indoor Scene Generation with Panoramic Video Diffusion Models", "author": "Dehui Wang and Congsheng Xu and Rong Wei and Yue Shi and Shoufa Chen and Dingxiang Luo and Tianshuo Yang and Xiaokang Yang and Wei Sui and Yusen Qin and Rui Tang and Yao Mu", "abstract": "The growing demand for Embodied AI and VR applications has highlighted the need for synthesizing high-quality 3D indoor scenes from sparse inputs. However, existing approaches struggle to infer massive amounts of missing geometry in large unseen areas while maintaining global consistency, often producing locally plausible but globally inconsistent reconstructions. We present Rein3D, a framework that reconstructs full 360-degree indoor environments by coupling explicit 3D Gaussian Splatting (3DGS) with temporally coherent priors from video diffusion models. Our approach follows a \"restore-and-refine\" paradigm: we employ a radial exploration strategy to render imperfect panoramic videos along trajectories starting from the origin, effectively uncovering occluded regions from a coarse 3DGS initialization. These sequences are restored by a panoramic video-to-video diffusion model and further enhanced via video super-resolution to synthesize high-fidelity geometry and textures. Finally, these refined videos serve as pseudo-ground truths to update the global 3D Gaussian field. To support this task, we construct PanoV2V-15K, a dataset of over 15K paired clean and degraded panoramic videos for diffusion-based scene restoration. Experiments demonstrate that Rein3D produces photorealistic and globally consistent 3D scenes and significantly improves long-range camera exploration compared with existing baselines.", "link": "http://arxiv.org/abs/2604.10578v2", "date": "2026-04-14", "relevancy": 2.6794, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6897}, {"title": "CAT3D: Create Anything in {"title": "AbdomenGen: Sequential Volume-Conditioned Diffusion Framework for Abdominal Anatomy Generation", "author": "Yubraj Bhandari and Lavsen Dahal and Paul Segars and Joseph Y. Lo", "abstract": "Computational phantoms are widely used in medical imaging research, yet current systems to generate controlled, clinically meaningful anatomical variations remain limited. We present AbdomenGen, a sequential volume-conditioned diffusion framework for controllable abdominal anatomy generation. We introduce the \\textbf{Volume Control Scalar (VCS)}, a standardized residual that decouples organ size from body habitus, enabling interpretable volume modulation. Organ masks are synthesized sequentially, conditioning on the body mask and previously generated structures to preserve global anatomical coherence while supporting independent, multi-organ control. Across 11 abdominal organs, the proposed framework achieves strong geometric fidelity (e.g., liver dice $0.83 \\pm 0.05$), stable single-organ calibration over $[-3,+3]$ VCS, and disentangled multi-organ modulation. To showcase clinical utility with a hepatomegaly cohort selected from MERLIN, Wasserstein-based VCS selection reduces distributional distance of training data by 73.6\\% . These results demonstrate calibrated, distribution-aware anatomical generation suitable for controllable abdominal phantom construction and simulation studies.", "link": "http://arxiv.org/abs/2604.12969v1", "date": "2026-04-14", "relevancy": 2.6755, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5403}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5325}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5325}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AbdomenGen%3A%20Sequential%20Volume-Conditioned%20Diffusion%20Framework%20for%20Abdominal%20Anatomy%20Generation&body=Title%3A%20AbdomenGen%3A%20Sequential%20Volume-Conditioned%20Diffusion%20Framework%20for%20Abdominal%20Anatomy%20Generation%0AAuthor%3A%20Yubraj%20Bhandari%20and%20Lavsen%20Dahal%20and%20Paul%20Segars%20and%20Joseph%20Y.%20Lo%0AAbstract%3A%20Computational%20phantoms%20are%20widely%20used%20in%20medical%20imaging%20research%2C%20yet%20current%20systems%20to%20generate%20controlled%2C%20clinically%20meaningful%20anatomical%20variations%20remain%20limited.%20We%20present%20AbdomenGen%2C%20a%20sequential%20volume-conditioned%20diffusion%20framework%20for%20controllable%20abdominal%20anatomy%20generation.%20We%20introduce%20the%20%5Ctextbf%7BVolume%20Control%20Scalar%20%28VCS%29%7D%2C%20a%20standardized%20residual%20that%20decouples%20organ%20size%20from%20body%20habitus%2C%20enabling%20interpretable%20volume%20modulation.%20Organ%20masks%20are%20synthesized%20sequentially%2C%20conditioning%20on%20the%20body%20mask%20and%20previously%20generated%20structures%20to%20preserve%20global%20anatomical%20coherence%20while%20supporting%20independent%2C%20multi-organ%20control.%20Across%2011%20abdominal%20organs%2C%20the%20proposed%20framework%20achieves%20strong%20geometric%20fidelity%20%28e.g.%2C%20liver%20dice%20%240.83%20%5Cpm%200.05%24%29%2C%20stable%20single-organ%20calibration%20over%20%24%5B-3%2C%2B3%5D%24%20VCS%2C%20and%20disentangled%20multi-organ%20modulation.%20To%20showcase%20clinical%20utility%20with%20a%20hepatomegaly%20cohort%20selected%20from%20MERLIN%2C%20Wasserstein-based%20VCS%20selection%20reduces%20distributional%20distance%20of%20training%20data%20by%2073.6%5C%25%20.%20These%20results%20demonstrate%20calibrated%2C%20distribution-aware%20anatomical%20generation%20suitable%20for%20controllable%20abdominal%20phantom%20construction%20and%20simulation%20studies.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12969v1%0AForm% {"title": "Image-to-Image Translation Framework Embedded with Rotation Symmetry Priors", "author": "Feiyu Tan and Heran Yang and Qihong Duan and Kai Ye and Qi Xie and Deyu Meng", "abstract": "Image-to-image translation (I2I) is a fundamental task in computer vision, focused on mapping an input image from a source domain to a corresponding image in a target domain while preserving domain-invariant features and adapting domain-specific attributes. Despite the remarkable success of deep learning-based I2I approaches, the lack of paired data and unsupervised learning framework still hinder their effectiveness. In this work, we address the challenge by incorporating transformation symmetry priors into image-to-image translation networks. Specifically, we introduce rotation group equivariant convolutions to achieve rotation equivariant I2I framework, a novel contribution, to the best of our knowledge, along this research direction. This design ensures the preservation of rotation symmetry, one of the most intrinsic and domain-invariant properties of natural and scientific images, throughout the network. Furthermore, we conduct a systematic study on image symmetry priors on real dataset and propose a novel transformation learnable equivariant convolutions (TL-Conv) that adaptively learns transformation groups, enhancing symmetry preservation across diverse datasets. We also provide a theoretical analysis of the equivariance error of TL-Conv, proving that it maintains exact equivariance in continuous domains and provide a bound for the error in discrete cases. Through extensive experiments across a range of I2I tasks, we validate the effectiveness and superior performance of our approach, highlighting the potential of equivariant networks in enhancing generation quality and its broad applicability. Our code is available at https://github.com/tanfy929/Equivariant-I2I", "link": "http://arxiv.org/abs/2604.12805v1", "date": "2026-04-14", "relevancy": 2.6682, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5597}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5236}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5175}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Image-to-Image%20Translation%20Framework%20Embedded%20with%20Rotation%20Symmetry%20Priors&body=Title%3A%20Image-to-Image%20Translation%20Framework%20Embedded%20with%20Rotation%20Symmetry%20Priors%0AAuthor%3A%20Feiyu%20Tan%20and%20Heran%20Yang%20and%20Qihong%20Duan%20and%20Kai%20Ye%20and%20Qi%20Xie%20and%20Deyu%20Meng%0AAbstract%3A%20Image-to-image%20translation%20%28I2I%29%20is%20a%20fundamental%20task%20in%20computer%20vision%2C%20focused%20on%20mapping%20an%20input%20image%20from%20a%20source%20domain%20to%20a%20corresponding%20image%20in%20a%20target%20domain%20while%20preserving%20domain-invariant%20features%20and%20adapting%20domain-specific%20attributes.%20Despite%20the%20remarkable%20success%20of%20deep%20learning-based%20I2I%20approaches%2C%20the%20lack%20of%20paired%20data%20and%20unsupervised%20learning%20framework%20still%20hinder%20their%20effectiveness.%20In%20this%20work%2C%20we%20address%20the%20challenge%20by%20incorporating%20transformation%20symmetry%20priors%20into%20image-to-image%20translation%20networks.%20Specifically%2C%20we%20introduce%20rotation%20group%20equivariant%20convolutions%20to%20achieve%20rotation%20equivariant%20I2I%20framework%2C%20a%20novel%20contribution%2C%20to%20the%20best%20of%20our%20knowledge%2C%20along%20this%20research%20direction.%20This%20design%20ensures%20the%20preservation%20of%20rotation%20symmetry%2C%20one%20of%20the%20most%20intrinsic%20and%20domain-invariant%20properties%20of%20natural%20and%20scientific%20images%2C%20throughout%20the%20network.%20Furthermore%2C%20we%20conduct%20a%20systematic%20study%20on%20image%20symmetry%20priors%20on%20real%20dataset%20and%20propose%20a%20novel%20transformation%20learnable%20equivariant%20convolutions%20%28TL-Conv%29%20that%20adaptively%20learns%20transformation%20groups%2C%20enhancing%20symmetry%20preservation%20across%20diverse%20datasets.%20We%20also%20provide%20a%20theoretical%20analysis%20of%20the%20equivariance%20error%20of%20TL-Conv%2C%20proving%20that%20it%20maintains%20exact%20equivariance%20in%20continuous%20domains%20and%20provide%20a%20bound%20for%20the%20error%20in%20discrete%20cases.%20Through%20extensive%20experiments%20across%20a%20range%20of%20I2I%20tasks%2C%20we%20validate%20the%20effectiveness%20and%20superior%20performance%20of%20our%20approach%2C%20highlighting%20the%20potential%20of%20equivariant%20networks%20in%20enhancing%20generation%20quality%20and%20its%20broad%20applicability.%20Our%20code%20is%20available%20at%20https%3A//github.com/tanfy929/Equivariant-I2I%0ALink%3A%20http%3A//arxiv.org/abs/2604.12805v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DImage-to-Image%2520Translation%2520Framework%2520Embedded%2520with%2520Rotation%2520Symmetry%2520Priors%26entry.906535625%3DFeiyu%2520Tan%2520and%2520Heran%2520Yang%2520and%2520Qihong%2520Duan%2520and%2520Kai%2520Ye%2520and%2520Qi%2520Xie%2520and%2520Deyu%2520Meng%26entry.1292438233%3DImage-to-image%2520translation%2520%2528I2I%2529%2520is%2520a%2520fundamental%2520task%2520in%2520computer%2520vision%252C%2520focused%2520on%2520mapping%2520an%2520input%2520image%2520from%2520a%2520source%2520domain%2520to%2520a%2520corresponding%2520image%2520in%2520a%2520target%2520domain%2520while%2520preserving%2520domain-invariant%2520features%2520and%2520adapting%2520domain-specific%2520attributes.%2520Despite%2520the%2520remarkable%2520success%2520of%252 {"title": "Every Picture Tells a Dangerous Story: Memory-Augmented Multi-Agent Jailbreak Attacks on VLMs", "author": "Jianhao Chen and Haoyang Chen and Hanjie Zhao and Haozhe Liang and Tieyun Qian", "abstract": "The rapid evolution of Vision-Language Models (VLMs) has catalyzed unprecedented capabilities in artificial intelligence; however, this continuous modal expansion has inadvertently exposed a vastly broadened and unconstrained adversarial attack surface. Current multimodal jailbreak strategies primarily focus on surface-level pixel perturbations and typographic attacks or harmful images; however, they fail to engage with the complex semantic structures intrinsic to visual data. This leaves the vast semantic attack surface of original, natural images largely unscrutinized. Driven by the need to expose these deep-seated semantic vulnerabilities, we introduce \\textbf{MemJack}, a \\textbf{MEM}ory-augmented multi-agent \\textbf{JA}ilbreak atta\\textbf{CK} framework that explicitly leverages visual semantics to orchestrate automated jailbreak attacks. MemJack employs coordinated multi-agent cooperation to dynamically map visual entities to malicious intents, generate adversarial prompts via multi-angle visual-semantic camouflage, and utilize an Iterative Nullspace Projection (INLP) geometric filter to bypass premature latent space refusals. By accumulating and transferring successful strategies through a persistent Multimodal Experience Memory, MemJack maintains highly coherent extended multi-turn jailbreak attack interactions across different images, thereby improving the attack success rate (ASR) on new images. Extensive empirical evaluations across full, unmodified COCO val2017 images demonstrate that MemJack achieves a 71.48\\% ASR against Qwen3-VL-Plus, scaling to 90\\% under extended budgets. Furthermore, to catalyze future defensive alignment research, we will release \\textbf{MemJack-Bench}, a comprehensive dataset comprising over 113,000 interactive multimodal jailbreak attack trajectories, establishing a vital foundation for developing inherently robust VLMs.", "link": "http://arxiv.org/abs/2604.12616v1", "date": "2026-04-14", "relevancy": 2.6658, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5628}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5232}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5134}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Every%20Picture%20Tells%20a%20Dangerous%20Story%3A%20Memory-Augmented%20Multi-Agent%20Jailbreak%20Attacks%20on%20VLMs&body=Title%3A%20Every%20Picture%20Tells%20a%20Dangerous%20Story%3A%20Memory-Augmented%20Multi-Agent%20Jailbreak%20Attacks%20on%20VLMs%0AAuthor%3A%20Jianhao%20Chen%20and%20Haoyang%20Chen%20and%20Hanjie%20Zhao%20and%20Haozhe%20Liang%20and%20Tieyun%20Qian%0AAbstract%3A%20The%20rapid%20evolution%20of%20Vision-Language%20Models%20%28VLMs%29%20has%20catalyzed%20unprecedented%20capabilities%20in%20artificial%20intelligence%3B%20however%2C%20this%20continuous%20modal%20expansion%20has%20inadvertently%20exposed%20a%20vastly%20broadened%20and%20unconstrained%20adversarial%20attack%20surface.%20Current%20multimodal%20jailbreak%20strategies%20primarily%20focus%20on%20surface-level%20pixel%20perturbations%20and%20typographic%20attacks%20or%20harmful%20images%3B%20however%2C%20they%20fail%20to%20engage%20with%20the%20complex%20semantic%20structures%20intrinsic%20to%20visual%20data.%20This%20leaves%20the%20vast%20semantic%20attack%20surface%20of%20original%2C%20natural%20images%20largely%20unscrutinized.%20Driven%20by%20the%20need%20to%20expose%20these%20deep-seated%20semantic%20vulnerabilities%2C%20we%20introduce%20%5Ctextbf%7BMemJack%7D%2C%20a%20%5Ctextbf%7BMEM%7Dory-augmented%20multi-agent%20%5Ctextbf%7BJA%7Dilbreak%20atta%5Ctextbf%7BCK%7D%20framework%20that%20explicitly%20leverages%20visual%20semantics%20to%20orchestrate%20automated%20jailbreak%20attacks.%20MemJack%20employs%20coordinated%20multi-agent%20cooperation%20to%20dynamically%20map%20visual%20entities%20to%20malicious%20intents%2C%20generate%20adversarial%20prompts%20via%20multi-angle%20visual-semantic%20camouflage%2C%20and%20utilize%20an%20Iterative%20Nullspace%20Projection%20%28INLP%29%20geometric%20filter%20to%20bypass%20premature%20latent%20space%20refusals.%20By%20accumulating%20and%20transferring%20successful%20strategies%20through%20a%20persistent%20Multimodal%20Experience%20Memory%2C%20MemJack%20maintains%20highly%20coherent%20extended%20multi-turn%20jailbreak%20attack%20interactions%20across%20different%20images%2C%20thereby%20improving%20the%20attack%20success%20rate%20%28ASR%29%20on%20new%20images.%20Extensive%20empirical%20evaluations%20across%20full%2C%20unmodified%20COCO%20val2017%20images%20demonstrate%20that%20MemJack%20achieves%20a%2071.48%5C%25%20ASR%20against%20Qwen3-VL-Plus%2C%20scaling%20to%2090%5C%25%20under%20extended%20budgets.%20Furthermore%2C%20to%20catalyze%20future%20defensive%20alignment%20research%2C%20we%20will%20release%20%5Ctextbf%7BMemJack-Bench%7D%2C%20a%20comprehensive%20dataset%20comprising%20over%20113%2C000%20interactive%20multimodal%20jailbreak%20attack%20trajectories%2C%20establishing%20a%20vital%20foundation%20for%20developing%20inherently%20robust%20VLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12616v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEvery%2520Picture%2520Tells%2520a%2520Dangerous%2520Story%253A%2520Memory-Augmented%2520Multi-Agent%2520Jailbreak%2520Attacks%2520on%2520VLMs%26entry.906535625%3DJianhao%2520Chen%2520and%2520Haoyang%2520Chen%2520and%2520Hanjie%2520Zhao%2520and%2520Haozhe%2520Liang%2520and%2520Tieyun% {"title": "Robust Semi-Supervised Temporal Intrusion Detection for Adversarial Cloud Networks", "author": "Anasuya Chattopadhyay and Daniel Reti and Hans D. Schotten", "abstract": "Cloud networks increasingly rely on machine learning based Network Intrusion Detection Systems to defend against evolving cyber threats. However, real-world deployments are challenged by limited labeled data, non-stationary traffic, and adaptive adversaries. While semi-supervised learning can alleviate label scarcity, most existing approaches implicitly assume benign and stationary unlabeled traffic, leading to degraded performance in adversarial cloud environments. This paper proposes a robust semi-supervised temporal learning framework for cloud intrusion detection that explicitly addresses adversarial contamination and temporal drift in unlabeled network traffic. Operating on flow-level data, this framework combines supervised learning with consistency regularization, confidence-aware pseudo-labeling, and selective temporal invariance to conservatively exploit unlabeled traffic while suppressing unreliable samples. By leveraging the temporal structure of network flows, the proposed method improves robustness and generalization across heterogeneous cloud environments. Extensive evaluations on publicly available datasets (CIC-IDS2017, CSE-CIC-IDS2018, and UNSW-NB15) under limited-label conditions demonstrate that the proposed framework consistently outperforms state-of-the-art supervised and semi-supervised network intrusion detection systems in detection performance, label efficiency, and resilience to adversarial and non-stationary traffic.", "link": "http://arxiv.org/abs/2604.12655v1", "date": "2026-04-14", "relevancy": 2.665, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5821}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5132}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5037}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Robust%20Semi-Supervised%20Temporal%20Intrusion%20Detection%20for%20Adversarial%20Cloud%20Networks&body=Title%3A%20Robust%20Semi-Supervised%20Temporal%20Intrusion%20Detection%20for%20Adversarial%20Cloud%20Networks%0AAuthor%3A%20Anasuya%20Chattopadhyay%20and%20Daniel%20Reti%20and%20Hans%20D.%20Schotten%0AAbstract%3A%20Cloud%20networks%20increasingly%20rely%20on%20machine%20learning%20based%20Network%20Intrusion%20Detection%20Systems%20to%20defend%20against%20evolving%20cyber%20threats.%20However%2C%20real-world%20deployments%20are%20challenged%20by%20limited%20labeled%20data%2C%20non-stationary%20traffic%2C%20and%20adaptive%20adversaries.%20While%20semi-supervised%20learning%20can%20alleviate%20label%20scarcity%2C%20most%20existing%20approaches%20implicitly%20assume%20benign%20and%20stationary%20unlabeled%20traffic%2C%20leading%20to%20degraded%20performance%20in%20adversarial%20cloud%20environments.%20This%20paper%20proposes%20a%20robust%20semi-supervised%20temporal%20learning%20framework%20for%20cloud%20intrusion%20detection%20that%20explicitly%20addresses%20adversarial%20contamination%20and%20temporal%20drift%20in%20unlabeled%20network%20traffic.%20Operating%20on%20flow-level%20data%2C%20this%20framework%20combines%20supervised%20learning%20with%20consistency%20regularization%2C%20confidence-aware%20pseudo-labeling%2C%20and%20selective%20temporal%20invariance%20to%20conservatively%20exploit%20unlabeled%20traffic%20while%20suppressing%20unreliable%20samples.%20By%20leveraging%20the%20temporal%20structure%20of%20network%20flows%2C%20the%20proposed%20method%20improves%20robustness%20and%20generalization%20across%20heterogeneous%20cloud%20environments.%20Extensi beled%20traffic%2C%20leading%20to%20degraded%20performance%20in%20adversarial%20cloud%20environments.%20This%20paper%20proposes%20a%20robust%20semi-supervised%20temporal%20learning%20framework%20for%20cloud%20intrusion%20detection%20that%20explicitly%20addresses%20adversarial%20contamination%20and%20temporal%20drift%20in%20unlabeled%20network%20traffic.%20Operating%20on%20flow-level%20data%2C%20this%20framework%20combines%20supervised%20learning%20with%20consistency%20regularization%2C%20confidence-aware%20pseudo-labeling%2C%20and%20selective%20temporal%20invariance%20to%20conservatively%20exploit%20unlabeled%20traffic%20while%20suppressing%20unreliable%20samples.%20By%20leveraging%20the%20temporal%20structure%20of%20network%20flows%2C%20the%20proposed%20method%20improves%20robustness%20and%20generalization%20across%20heterogeneous%20cloud%20environments.%20Extensive%20evaluations%20on%20publicly%20available%20datasets%20%28CIC-IDS2017%2C%20CSE-CIC-IDS2018%2C%20and%20UNSW-NB15%29%20under%20limited-label%20conditions%20demonstrate%20that%20the%20proposed%20framework%20consistently%20outperforms%20state-of-the-art%20supervised%20and%20semi-supervised%20network%20intrusion%20detection%20systems%20in%20detection%20performance%2C%20label%20efficiency%2C%20and%20resilience%20to%20adversarial%20and%20non-stationary%20traffic.&entry.1838667208=http%3A//arxiv.org/abs/2604.12655v1&entry.124074799=Read"},
{"title": "Boosting Visual Instruction Tuning with Self-Supervised Guidance", "author": "Sophia Sirko-Galouchenko and Monika Wysoczanska and Andrei Bursuc and Nicolas Thome and Spyros Gidaris", "abstract": "Multimodal large language models (MLLMs) perform well on many vision-language tasks but often struggle with vision-centric problems that require fine-grained visual reasoning. Recent evidence suggests that this limitation arises not from weak visual representations, but from under-utilization of visual information during instruction tuning, where many tasks can be partially solved using language priors alone. We propose a simple and lightweight approach that augments visual instruction tuning with a small number of visually grounded self-supervised tasks expressed as natural language instructions. By reformulating classical self-supervised pretext tasks, such as rotation prediction, color matching, and cross-view correspondence, as image-instruction-response triplets, we introduce supervision that cannot be solved without relying on visual evidence. Our approach requires no human annotations, no architectural modifications, and no additional training stages. Across multiple models, training regimes, and benchmarks, injecting only a small fraction (3-10%) of such visually grounded instructions consistently improves performance on vision-centric evaluations. Our findings highlight instruction tuning with visually grounded SSL tasks as a powerful lever for improving visual reasoning in MLLMs through simple adjustments to the training data distribution. Code available at: https://github.com/sirkosophia/V-GIFT", "link": "http://arxiv.org/abs/2604.12966v1", "date": "2026-04-14", "relevancy": 2.6596, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5402}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5278}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5278}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Boosting%20Visual%20Instruction%20Tuning%20with%20Self-Supervised%20Guidance&body=Title%3A%20Boosting%20Visual%20Instruction%20Tuning%20with%20Self-Supervised%20Guidance%0AAuthor%3A%20Sophia%20Sirko-Galouchenko%20and%20Monika%20Wysoczanska%20and%20Andrei%20Bursuc%20and%20Nicolas%20Thome%20and%20Spyros%20Gidaris%0AAbstract%3A%20Multimodal%20large%20language%20models%20%28MLLMs%29%20perform%20well%20on%20many%20vision-language%20tasks%20but%20often%20struggle%20with%20vision-centric%20problems%20that%20require%20fine-grained%20visual%20reasoning.%20Recent%20evidence%20suggests%20that%20this%20limitation%20arises%20not%20from%20weak%20visual%20representations%2C%20but%20from%20under-utilization%20of%20visual%20information%20during%20instruction%20tuning%2C%20where%20many%20tasks%20can%20be%20partially%20solved%20using%20language%20priors%20alone.%20We%20propose%20a%20simple%20and%20lightweight%20approach%20that%20augments%20visual%20instruction%20tuning%20with%20a%20small%20number%20of%20visually%20grounded%20self-supervised%20tasks%20expressed%20as%20natural%20language%20instructions.%20By%20reformulating%20classical%20self-supervised%20pretext%20tasks%2C%20such%20as%20rotation%20prediction%2C%20color%20matching%2C%20and%20cross-view%20correspondence%2C%20as%20image-instruction-response%20triplets%2C%20we%20introduce%20supervision%20that%20cannot%20be%20solved%20without%20relying%20on%20visual%20evidence.%20Our%20approach%20requires%20no%20human%20annotations%2C%20no%20architectural%20modifications%2C%20and%20no%20additional%20training%20stages.%20Across%20multiple%20models%2C%20training%20regimes%2C%20and%20benchmarks%2C%20injecting%20only%20a%20small%20fraction%20%283-10%25%29%20of%20such%20visually%20grounded%20instructions%20consistently%20improves%20performance%20on%20vision-centric%20evaluations.%20Our%20findings%20highlight%20instruction%20tuning%20with%20visually%20grounded%20SSL%20tasks%20as%20a%20powerful%20lever%20for%20improving%20visual%20reasoning%20in%20MLLMs%20through%20simple%20adjustments%20to%20the%20training%20data%20distribution.%20Code%20available%20at%3A%20https%3A//github.com/sirkosophia/V-GIFT%0ALink%3A%20http%3A//arxiv.org/abs/2604.12966v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBoosting%2520Visual%2520Instruction%2520Tuning%2520with%2520Self-Supervised%2520Guidance%26entry.906535625%3DSophia%2520Sirko-Galouchenko%2520and%2520Monika%2520Wysoczanska%2520and%2520Andrei%2520Bursuc%2520and%2520Nicolas%2520Thome%2520and%2520Spyros%2520Gidaris%26entry.1292438233%3DMultimodal%2520large%2520language%2520models%2520%2528MLLMs%2529%2520perform%2520well%2520on%2520many%2520vision-language%2520tasks%2520but%2520often%2520struggle%2520with%2520vision-centric%2520problems%2520that%2520require%2520fine-grained%2520visual%2520reasoning.%2520Recent%2520evidence%2520suggests%2520that%2520this%2520limitation%2520arises%2520not%2520from%2520weak%2520visual%2520representations%252C%2520but%2520from%2520under-utilization%2520of%2520visual%2520information%2520during%2520instruction%2520tuning%252C%2520where%2520many%2520tasks%2520can%2520be%2520partially%2520solved%2520using%2520language%2520priors%2520alone.%2520We%2520propose%2520a%2520simple%2520and%2520lightweight%2520approach%2520that%2520augments%2520visual%2520instruction%2520tuning%2520with%2520a%2520small%2520number%2520of%2520visually%2520grounded%2520self-supervised%2520tasks%2520expressed%2520as%2520natural%2520language%2520instructions.%2520By%2520reformulating%2520classical%2520self-supervised%2520pretext%2520tasks%252C%2520such%2520as%2520rotation%2520prediction%252C%2520color%2520matching%252C%2520and%2520cross-view%2520correspondence%252C%2520as%2520image-instruction-response%2520triplets%252C%2520we%2520introduce%2520supervision%2520that%2520cannot%2520be%2520solved%2520without%2520relying%2520on%2520visual%2520evidence.%2520Our%2520approach%2520requires%2520no%2520human%2520annotations%252C%2520no%2520architectural%2520modifications%252C%2520and%2520no%2520additional%2520training%2520stages.%2520Across%2520multiple%2520models%252C%2520training%2520regimes%252C%2520and%2520benchmarks%252C%2520injecting%2520only%2520a%2520small%2520fraction%2520%25283-10%2525%2529%2520of%2520such%2520visually%2520grounded%2520instructions%2520consistently%2520improves%2520performance%2520on%2520vision-centric%2520evaluations.%2520Our%2520findings%2520highlight%2520instruction%2520tuning%2520with%2520visually%2520grounded%2520SSL%2520tasks%2520as%2520a%2520powerful%2520lever%2520for%2520improving%2520visual%2520reasoning%2520in%2520MLLMs%2520through%2520simple%2520adjustments%2520to%2520the%2520training%2520data%2520distribution.%2520Code%2520available%2520at%253A%2520https%253A//github.com/sirkosophia/V-GIFT%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.12966v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Boosting%20Visual%20Instruction%20Tuning%20with%20Self-Supervised%20Guidance&entry.906535625=Sophia%20Sirko-Galouchenko%20and%20Monika%20Wysoczanska%20and%20Andrei%20Bursuc%20and%20Nicolas%20Thome%20and%20Spyros%20Gidaris&entry.1292438233=Multimodal%20large%20language%20models%20%28MLLMs%29%20perform%20well%20on%20many%20vision-language%20tasks%20but%20often%20struggle%20with%20vision-centric%20problems%20that%20require%20fine-grained%20visual%20reasoning.%20Recent%20evidence%20suggests%20that%20this%20limitation%20arises%20not%20from%20weak%20visual%20representations%2C%20but%20from%20under-utilization%20of%20visual%20information% {"title": "WikiSeeker: Rethinking the Role of Vision-Language Models in Knowledge-Based Visual Question Answering", "author": "Yingjian Zhu and Xinming Wang and Kun Ding and Ying Wang and Bin Fan and Shiming Xiang", "abstract": "Multi-modal Retrieval-Augmented Generation (RAG) has emerged as a highly effective paradigm for Knowledge-Based Visual Question Answering (KB-VQA). Despite recent advancements, prevailing methods still primarily depend on images as the retrieval key, and often overlook or misplace the role of Vision-Language Models (VLMs), thereby failing to leverage their potential fully. In this paper, we introduce WikiSeeker, a novel multi-modal RAG framework that bridges these gaps by proposing a multi-modal retriever and redefining the role of VLMs. Rather than serving merely as answer generators, we assign VLMs two specialized agents: a Refiner and an Inspector. The Refiner utilizes the capability of VLMs to rewrite the textual query according to the input image, significantly improving the performance of the multimodal retriever. The Inspector facilitates a decoupled generation strategy by selectively routing reliable retrieved context to another LLM for answer generation, while relying on the VLM's internal knowledge when retrieval is unreliable. Extensive experiments on EVQA, InfoSeek, and M2KR demonstrate that WikiSeeker achieves state-of-the-art performance, with substantial improvements in both retrieval accuracy and answer quality. Our code will be released on https://github.com/zhuyjan/WikiSeeker.", "link": "http://arxiv.org/abs/2604.05818v2", "date": "2026-04-14", "relevancy": 2.6581, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5435}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5435}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5078}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20WikiSeeker%3A%20Rethinking%20the%20Role%20of%20Vision-Language%20Models%20in%20Knowledge-Based%20Visual%20Question%20Answering&body=Title%3A%20WikiSeeker%3A%20Rethinking%20the%20Role%20of%20Vision-Language%20Models%20in%20Knowledge-Based%20Visual%20Question%20Answering%0AAuthor%3A%20Yingjian%20Zhu%20and%20Xinming%20Wang%20and%20Kun%20Ding%20and%20Ying%20Wang%20and%20Bin%20Fan%20and%20Shiming%20Xiang%0AAbstract%3A%20Multi-modal%20Retrieval-Augmented%20Generation%20%28RAG%29%20has%20emerged%20as%20a%20highly%20effective%20paradigm%20for%20Knowledge-Based%20Visual%20Question%20Answering%20%28KB-VQA%29.%20Despite%20recent%20advancements%2C%20prevailing%20methods%20still%20primarily%20depend%20on%20images%20as%20the%20retrieval%20key%2C%20and%20often%20overlook%20or%20misplace%20the%20role%20of%20Vision-Language%20Models%20%28VLMs%29%2C%20thereby%20failing%20to%20leverage%20their%20potential%20fully.%20In%20this%20paper%2C%20we%20introduce%20WikiSeeker%2C%20a%20novel%20multi-modal%20RAG%20framework%20that%20bridges%20these%20gaps%20by%20proposing%20a%20multi-modal%20retriever%20and%20redefining%20the%20role%20of%20VLMs.%20Rather%20than%20serving%20merely%20as%20answer%20generators%2C%20we%20assign%20VLMs%20two%20specialized%20agents%3A%20a%20Refiner%20and%20an%20Inspector.%20The%20Refiner%20utilizes%20the%20capability%20of%20VLMs%20to%20rewrite%20the%20textual%20query%20according%20to%20the%20input%20image%2C%20significantly%20improving%20the%20performance%20of%20the%20multimodal%20retriever.%20The%20Inspector%20facilitates%20a%20decoupled%20generation%20strategy%20by%20selectively%20routing%20reliable%20retrieved%20context%20to%20another%20LLM%20for%20answer {"title": "Task Alignment: A simple and effective proxy for model merging in computer vision", "author": "Pau de Jorge and C\u00e9sar Roberto de Souza and Bj\u00f6rn Michele and Mert B\u00fclent Sar\u0131y\u0131ld\u0131z and Philippe Weinzaepfel and Florent Perronnin and Diane Larlus and Yannis Kalantidis", "abstract": "Efficiently merging several models fine-tuned for different tasks, but stemming from the same pretrained base model, is of great practical interest. Despite extensive prior work, most evaluations of model merging in computer vision are restricted to image classification using CLIP, where different classification datasets define different tasks. In this work, our goal is to make model merging more practical and show its relevance on challenging scenarios beyond this specific setting. In most vision scenarios, different tasks rely on trainable and usually heterogeneous decoders. Differently from previous studies with frozen decoders, where merged models can be evaluated right away, the non-trivial cost of decoder training renders hyperparameter selection based on downstream performance impractical. To address this, we introduce the task alignment proxy, and show how it can be used to speed up hyperparameter selection by orders of magnitude while retaining performance. Equipped with the task alignment proxy, we extend the applicability of model merging to multi-task vision models beyond CLIP-based classification.", "link": "http://arxiv.org/abs/2604.12935v1", "date": "2026-04-14", "relevancy": 2.656, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5767}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5108}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5061}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Task%20Alignment%3A%20A%20simple%20and%20effective%20proxy%20for%20model%20merging%20in%20computer%20vision&body=Title%3A%20Task%20Alignment%3A%20A%20simple%20and%20effective%20proxy%20for%20model%20merging%20in%20computer%20vision%0AAuthor%3A%20Pau%20de%20Jorge%20and%20C%C3%A9sar%20Roberto%20de%20Souza%20and%20Bj%C3%B6rn%20Michele%20and%20Mert%20B%C3%BClent%20Sar%C4%B1y%C4%B1ld%C4%B1z%20and%20Philippe%20Weinzaepfel%20and%20Florent%20Perronnin%20and%20Diane%20Larlus%20and%20Yannis%20Kalantidis%0AAbstract%3A%20Efficiently%20merging%20several%20models%20fine-tuned%20for%20different%20tasks%2C%20but%20stemming%20from%20the%20same%20pretrained%20base%20model%2C%20is%20of%20great%20practical%20interest.%20Despite%20extensive%20prior%20work%2C%20most%20evaluations%20of%20model%20merging%20in%20computer%20vision%20are%20restricted%20to%20image%20classification%20using%20CLIP%2C%20where%20different%20classification%20datasets%20define%20different%20tasks.%20In%20this%20work%2C%20our%20goal%20is%20to%20make%20model%20merging%20more%20practical%20and%20show%20its%20relevance%20on%20challenging%20scenarios%20beyond%20this%20specific%20setting.%20In%20most%20vision%20scenarios%2C%20different%20tasks%20rely%20on%20trainable%20and%20usually%20heterogeneous%20decoders.%20Differently%20from%20previous%20studies%20with%20frozen%20decoders%2C%20where%20merged%20models%20can%20be%20evaluated%20right%20away%2C%20the%20non-trivial%20cost%20of%20decoder%20training%20renders%20hyperparameter%20selection%20based%20on%20downstream%20performance%20impractical.%20To%20address%20this%2C%20we%20introduce%20the%20task%20alignment%20proxy%2C%20and%20show%20how%20it%20can%20be%20used%20to%20speed%20up%20hyperparameter%20selection%20by%20orders%20of%20magnitude%20while%20retaining%20performance.%20Equipped%20with%20the%20task%20alignment%20proxy%2C%20we%20extend%20the%20applicability%20of%20model%20merging%20to%20multi-task%20vision%20models%20beyond%20CLIP-based%20classification.%0ALink%3A%20http%3A//arxiv.org/abs/2604.12935v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTask%2520Alignment%253A%2520A%2520simple%2520and%2520effective%2520proxy%2520for%2520model%2520merging%2520in%2520computer%2520vision%26entry.906535625%3DPau%2520de%2520Jorge%2520and%2520C%25C3%25A9sar%2520Roberto%2520de%2520Souza%2520and%2520Bj%25C3%25B6rn%2520Michele%2520and%2520Mert%2520B%25C3%25BClent%2520Sar%25C4%25B1y%25C4%25B1ld%25C4%25B1z%2520and%2520Philippe%2520Weinzaepfel%2520and%2520Florent%2520Perronnin%2520and%2520Diane%2520Larlus%2520and%2520Yannis%2520Kalantidis%26entry.1292438233%3DEfficiently%2520merging%2520several%2520models%2520fine-tuned%2520for%2520different%2520tasks%252C%2520but%2520stemming%2520from%2520the%2520same%2520pretrained%2520base%2520model%252C%2520is%2520of%2520great%2520practical%2520interest.%2520Despite%2520extensive%2520prior%2520work%252C%2520most%2520evaluations%2520of%2520model%2520merging%2520in%2520computer%2520vision%2520are%2520restricted%2520to%2520image%2520classification%2520using%2520CLIP%252C%2520where%2520different%2520classification%2520datasets%2520define%2520different%2520tasks.%2520In%2520this%2520work%252C%2520our%2520goal%2520is%2520to%2520make%2520model%2520merging%2520more%2520practical%2520and%2520show%2520its%2520relevance%2520on%2520challenging%2520scenarios%2520beyond%2520this%2520specific%2520setting.%2520In%2520most%2520vision%2520scenarios%252C%2520different%2520tasks%2520rely%2520on%2520trainable%2520and%2520usually%2520heterogeneous%2520decoders.%2520Differently%2520from%2520previous%2520studies%2520with%2520frozen%2520decoders%252C%2520where%2520merged%2520models%2520can%2520be%2520evaluated%2520right%2520away%252C%2520the%2520non-trivial%2520cost%2520of%2520decoder%2520training%2520renders%2520hyperparameter%2520selection% {"title": "Modeling Co-Pilots for Text-to-Model Translation", "author": "Serdar Kadioglu and Karthik Uppuluri and Akash Singirikonda", "abstract": "There is growing interest in leveraging large language models (LLMs) for text-to-model translation and optimization tasks. This paper aims to advance this line of research by introducing \\textsc{Text2Model} and \\textsc{Text2Zinc}. \\textsc{Text2Model} is a suite of co-pilots based on several LLM strategies with varying complexity, along with an online leaderboard. \\textsc{Text2Zinc} is a cross-domain dataset for capturing optimization and satisfaction problems specified in natural language, along with an interactive editor with built-in AI assistant. While there is an emerging literature on using LLMs for translating combinatorial problems into formal models, our work is the first attempt to integrate \\textit{both} satisfaction and optimization problems within a \\textit{unified architecture} and \\textit{dataset}. Moreover, our approach is \\textit{solver-agnostic} unlike existing work that focuses on translation to a solver-specific model. To achieve this, we leverage \\textsc{MiniZinc}'s solver-and-paradigm-agnostic modeling capabilities to formulate combinatorial problems. We conduct comprehensive experiments to compare execution and solution accuracy across several single- and multi-call strategies, including; zero-shot prompting, chain-of-thought reasoning, intermediate representations via knowledge-graphs, grammar-based syntax encoding, and agentic approaches that decompose the model into sequential sub-tasks. Our co-pilot strategies are competitive, and in parts improve, recent research in this domain. Our findings indicate that while LLMs are promising they are not yet a push-button technology for combinatorial modeling. We contribute \\textsc{Text2Model} co-pilots and leaderboard, and \\textsc{Text2Zinc} and interactive editor to open-source to support closing this performance gap.", "link": "http://arxiv.o

{"title": "AnchorSplat: Feed-Forward 3D Gaussian SplattingWith 3D Geometric Priors", "author": "Xiaoxue Zhang and Xiaoxu Zheng and Yixuan Yin and Tiao Zhao and Kaihua Tang and Michael Bi Mi and Zhan Xu and Dave Zhenyu Chen", "abstract": "Recent feed-forward Gaussian reconstruction models adopt a pixel-aligned formulation that maps each 2D pixel to a 3D Gaussian, entangling Gaussian representations tightly with the input images. In this paper, we propose AnchorSplat, a novel feed-forward 3DGS framework for scene-level reconstruction that represents the scene directly in 3D space. AnchorSplat introduces an anchor-aligned Gaussian representation guided by 3D geometric priors (e.g., sparse point clouds, voxels, or RGB-D point clouds), enabling a more geometry-aware renderable 3D Gaussians that is independent of image resolution and number of views. This design substantially reduces the number of required Gaussians, improving computational efficiency while enhancing reconstruction fidelity. Beyond the anchor-aligned design, we utilize a Gaussian Refiner to adjust the intermediate Gaussiansy via merely a few forward passes. Experiments on the ScanNet++ v2 NVS benchmark demonstrate the SOTA performance, outperforming previous methods with more view-consistent and substantially fewer Gaussian primitives.", "link": "http://arxiv.org/abs/2604.07053v1", "date": "2026-04-08", "relevancy": 3.4473, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.7202}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6975}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6507}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AnchorSplat%3A%20Feed-Forward%20 primitives.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.07053v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=AnchorSplat%3A%20Feed-Forward%203D%20Gaussian%20SplattingWith%203D%20Geometric%20Priors&entry.906535625=Xiaoxue%20Zhang%20and%20Xiaoxu%20Zheng%20and%20Yixuan%20Yin%20and%20Tiao%20Zhao%20and%20Kaihua%20Tang%20and%20Michael%20Bi%20Mi%20and%20Zhan%20Xu%20and%20Dave%20Zhenyu%20Chen&entry.1292438233=Recent%20feed-forward%20Gaussian%20reconstruction%20models%20adopt%20a%20pixel-aligned%20formulation%20that%20maps%20each%202D%20pixel%20to%20a%203D%20Gaussian%2C%20entangling%20Gaussian%20representations%20tightly%20with%20the%20input%20images.%20In%20this%20paper%2C%20we%20propose%20AnchorSplat%2C%20a%20novel%20feed-forward%203DGS%20framework%20for%20scene-level%20reconstruction%20that%20represents%20the%20scene%20directly%20in%203D%20space.%20AnchorSplat%20introduces%20an%20anchor-aligned%20Gaussian%20representation%20guided%20by%203D%20geometric%20priors%20%28e.g.%2C%20sparse%20point%20clouds%2C%20voxels%2C%20or%20RGB-D%20point%20clouds%29%2C%20enabling%20a%20more%20geometry-aware%20renderable%203D%20Gaussians%20that%20is%20independent%20of%20image%20resolution%20and%20number%20of%20views.%20This%20design%20substantially%20reduces%20the%20number%20of%20required%20Gaussians%2C%20improving%20computational%20efficiency%20while%20enhancing%20reconstruction%20fidelity.%20Beyond%20the%20anchor-aligned%20design%2C%20we%20utilize%20a%20Gaussian%20Refiner%20to%20adjust%20the%20intermediate%20Gaussiansy%20via%20merely%20a%20few%20forward%20passes.%20Experiments%20on%20the%20ScanNet%2B%2B%20v2%20NVS%20benchmark%20demonstrate%20the%20SOTA%20performance%2C%20outperforming%20previous%20methods%20with%20more%20view-consistent%20and%20substantially%20fewer%20Gaussian%20primitives.&entry.1838667208=http%3A//arxiv.org/abs/2604.07053v1&entry.124074799=Read"},
{"title": "GenLCA: 3D Diffusion for Full-Body Avatars from In-the-Wild Videos", "author": "Yiqian Wu and Rawal Khirodkar and Egor Zakharov and Timur Bagautdinov and Lei Xiao and Zhaoen Su and Shunsuke Saito and Xiaogang Jin and Junxuan Li", "abstract": "We present GenLCA, a diffusion-based generative model for generating and editing photorealistic full-body avatars from text and image inputs. The generated avatars are faithful to the inputs, while supporting high-fidelity facial and full-body animations. The core idea is a novel paradigm that enables training a full-body 3D diffusion model from partially observable 2D data, allowing the training dataset to scale to millions of real-world videos. This scalability contributes to the superior photorealism and generalizability of GenLCA. Specifically, we scale up the dataset by repurposing a pretrained feed-forward avatar reconstruction model as an animatable 3D tokenizer, which encodes unstructured video frames into structured 3D tokens. However, most real-world videos only provide partial observations of body parts, resulting in excessive blurring or transparency artifacts in the 3D tokens. To address this, we propose a novel visibility-aware diffusion training strategy that replaces invalid regions with learnable tokens and computes losses only over valid regions. We then train a flow-based diffusion model on the token dataset, inherently maintaining the photorealism and animatability provided by the pretrained avatar reconstruction model. Our approach effectively enables the use of large-scale real-world video data to train a diffusion model natively in 3D. We demonstrate the efficacy of our method through diverse and high-fidelity generation and editing results, outperforming existing solutions by a large margin. The project page is available at https://onethousandwu.com/GenLCA-Page.", "link": "http://arxiv.org/abs/2604.07273v1", "date": "2026-04-08", "relevancy": 3.2871, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6801}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6461}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6461}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GenLCA%3A%203D%20Diffusion%20for%20Full-Body%20Avatars%20from%20In-the-Wild%20Videos&body=Title%3A%20GenLCA%3A%203D%20Diffusion%20for%20Full-Body%20Avatars%20from%20In-the-Wild%20Videos%0AAuthor%3A%20Yiqian%20Wu%20and%20Rawal%20Khirodkar%20and%20Egor%20Zakharov%20and%20Timur%20Bagautdinov%20and%20Lei%20Xiao%20and%20Zhaoen%20Su%20and%20Shunsuke%20Saito%20and%20Xiaogang%20Jin%20and%20Junxuan%20Li%0AAbstract%3A%20We%20present%20GenLCA%2C%20a%20diffusion-based%20generative%20model%20for%20generating%20and%20editing%20photorealistic%20full-body%20avatars%20from%20text%20and%20image%20inputs.%20The%20generated%20avatars%20are%20faithful%20to%20the%20inputs%2C%20while%20supporting%20high-fidelity%20facial%20and%20full-body%20animations.%20The%20core%20idea%20is%20a%20novel%20paradigm%20that%20enables%20training%20a%20full-body%203D%20diffusion%20model%20from%20partially%20observable%202D%20data%2C%20allowing%20the%20training%20dataset%20to%20scale%20to%20millions%20of%20real-world%20videos.%20This%20scalability%20contributes%20to%20the%20superior%20photorealism%20and%20generalizability%20of%20GenLCA.%20Specifically%2C%20we%20scale%20up%20the%20dataset%20by%20repurposing%20a%20pretrained%20feed-forward%20avatar%20reconstruction%20model%20as%20an%20animatable%203D%20tokenizer%2C%20which%20encodes%20unstructured%20video%20frames%20into%20structured%203D%20tokens.%20However%2C%20most%20real-world%20videos%20only%20provide%20partial%20observations%20of%20body%20parts%2C%20resulting%20in%20excessive%20blurring%20or%20transparency%20artifacts%20in%20the%203D%20tokens.%20To%20address%20this%2C%20we%20propose%20a%20novel%20visibility-aware%20diffusion%20training%20strategy%20that%20replaces%20invalid%20regions%20with%20learnable%20tokens%20and%20computes%20losses%20only%20over%20valid%20regions.%20We%20then%20train%20a%20flow-based%20diffusion%20model%20on%20the%20token%20dataset%2C%20inherently%20maintaining%20the%20photorealism%20and%20animatability%20provided%20by%20the%20pretrained%20avatar%20reconstruction%20model.%20Our%20approach%20effectively%20enables%20the%20use%20of%20large-scale%20real-world%20video%20data%20to%20train%20a%20diffusion%20model%20natively%20in%203D.%20We%20demonstrate%20the%20efficacy%20of%20our%20method%20through%20diverse%20and%20high-fidelity%20generation%20and%20editing%20results%2C%20outperforming%20existing%20solutions%20by%20a%20large%20margin.%20The%20project%20page%20is%20available%20at%20https%3A//onethousandwu.com/GenLCA-Page.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07273v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGenLCA%253A%25203D%2520Diffusion%2520for%2520Full-Body%2520Avatars%2520from%2520In-the-Wild%2520Videos%26entry.906535625%3DYiqian%2520Wu%2520and%2520Rawal%2520Khirodkar%2520and%2520Egor%2520Zakharov%2520and%2520Timur%2520Bagautdinov%2520and%2520Lei%2520Xiao%2520and%2520Zhaoen%2520Su%2520and%2520Shunsuke%2520Saito%2520and%2520Xiaogang%2520Jin%2520and%2520Junxuan%2520Li%26entry.1292438233%3DWe%2520present%2520GenLCA%252C%2520a%2520diffusion-based%2520generative%2520model%2520for%2520generating%2520and%2520editing%2520photorealistic%2520full-body%2520avatars%2520from%2520text%2520and%2520image%2520inputs.%2520The%2520generated%2520avatars%2520are%2520faithful%2520to%2520the%2520inputs%252C%2520while%2520supporting%2520high-fidelity%2520facial%2520and%2520full-body%2520animations.%2520The%2520core%2520idea%2520is%2520a%2520novel%2520paradigm%2520that%2520enables%2520trai ble%2520at%2520https%253A//onethousandwu.com/GenLCA-Page.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.07273v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GenLCA%3A%203D%20Diffusion%20for%20Full-Body%20Avatars%20from%20In-the-Wild%20Videos&entry.906535625=Yiqian%20Wu%20and%20Rawal%20Khirodkar%20and%20Egor%20Zakharov%20and%20Timur%20Bagautdinov%20and%20Lei%20Xiao%20and%20Zhaoen%20Su%20and%20Shunsuke%20Saito%20and%20Xiaogang%20Jin%20and%20Junxuan%20Li&entry.1292438233=We%20present%20GenLCA%2C%20a%20diffusion-based%20generative%20model%20for%20generating%20and%20editing%20photorealistic%20full-body%20avatars%20from%20text%20and%20image%20inputs.%20The%20generated%20avatars%20are%20faithful%20to%20the%20inputs%2C%20while%20supporting%20high-fidelity%20facial%20and%20full-body%20animations.%20The%20core%20idea%20is%20a%20novel%20paradigm%20that%20enables%20training%20a%20full-body%203D%20diffusion%20model%20from%20partially%20observable%202D%20data%2C%20allowing%20the%20training%20dataset%20to%20scale%20to%20millions%20of%20real-world%20videos.%20This%20scalability%20contributes%20to%20the%20superior%20photorealism%20and%20generalizability%20of%20GenLCA.%20Specifically%2C%20we%20scale%20up%20the%20dataset%20by%20repurposing%20a%20pretrained%20feed-forward%20avatar%20reconstruction%20model%20as%20an%20animatable%203D%20tokenizer%2C%20which%20encodes%20unstructured%20video%20frames%20into%20structured%203D%20tokens.%20However%2C%20most%20real-world%20videos%20only%20provide%20partial%20observations%20of%20body%20parts%2C%20resulting%20in%20excessive%20blurring%20or%20transparency%20artifacts%20in%20the%203D%20tokens.%20To%20address%20this%2C%20we%20propose%20a%20novel%20visibility-aware%20diffusion%20training%20strategy%20that%20replaces%20invalid%20regions%20with%20learnable%20tokens%20and%20computes%20losses%20only%20over%20valid%20regions.%20We%20then%20tra {"title": "BrepGaussian: CAD reconstruction from Multi-View Images with Gaussian Splatting", "author": "Jiaxing Yu and Dongyang Ren and Hangyu Xu and Zhouyuxiao Yang and Yuanqi Li and Jie Guo and Zhengkang Zhou and Yanwen Guo", "abstract": "The boundary representation (B-Rep) models a 3D solid as its explicit boundaries: trimmed corners, edges, and faces. Recovering B-Rep representation from unstructured data is a challenging and valuable task of computer vision and graphics. Recent advances in deep learning have greatly improved the recovery of 3D shape geometry, but still depend on dense and clean point clouds and struggle to generalize to novel shapes. We propose B-Rep Gaussian Splatting (BrepGaussian), a novel framework that learns 3D parametric representations from 2D images. We employ a Gaussian Splatting renderer with learnable features, followed by a specific fitting strategy. To disentangle geometry reconstruction and feature learning, we introduce a two-stage learning framework that first captures geometry and edges and then refines patch features to achieve clean geometry and coherent instance representations. Extensive experiments demonstrate the superior performance of our approach to state-of-the-art methods.", "link": "http://arxiv.org/abs/2602.21105v3", "date": "2026-04-08", "relevancy": 3.2783, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6602}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6566}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6502}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BrepGaussian%3A%20CAD%20reconstruction%20from%20Multi-View%20Images%20with%20Gaussian%20Splatting&body=Title%3A%20BrepGaussian%3A%20CAD%20reconstruction%20from%20Multi-View%20Images%20with%20Gaussian%20Splatting%0AAuthor%3A%20Jiaxing%20Yu%20and%20Dongyang%20Ren%20and%20Hangyu%20Xu%20and%20Zhouyuxiao%20Yang%20and%20Yuanqi%20Li%20and%20Jie%20Guo%20and%20Zhengkang%20Zhou%20and%20Yanwen%20Guo%0AAbstract%3A%20The%20boundary%20representation%20%28B-Rep%29%20models%20a%203D%20solid%20as%20its%20explicit%20boundaries%3A%20trimmed%20corners%2C%20edges%2C%20and%20faces.%20Recovering%20B-Rep%20representation%20from%20unstructured%20data%20is%20a%20challenging%20and%20valuable%20task%20of%20computer%20vision%20and%20graphics.%20Recent%20advances%20in%20deep%20learning%20have%20greatly%20improved%20the%20recovery%20of%203D%20shape%20geometry%2C%20but%20still%20depend%20on%20dense%20and%20clean%20point%20clouds%20and%20struggle%20to%20generalize%20to%20novel%20shapes.%20We%20propose%20B-Rep%20Gaussian%20Splatting%20%28BrepGaussian%29%2C%20a%20novel%20framework%20that%20learns%203D%20parametric%20representations%20from%202D%20images.%20We%20employ%20a%20Gaussian%20Splatting%20renderer%20with%20learnable%20features%2C%20followed%20by%20a%20specific%20fitting%20strategy.%20To%20disentangle%20geometry%20reconstruction%20and%20feature%20learning%2C%20we%20introduce%20a%20two-stage%20learning%20framework%20that%20first%20captures%20geometry%20and%20edges%20and%20then%20refines%20patch%20features%20to%20achieve%20clean%20geometry%20and%20coherent%20instance%20representations.%20Extensive%20experiments%20demonstrate%20the%20superior%20performance%20of%20our%20approach%20to%20state-of-the-art%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2602.21105v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBrepGaussian%253A%2520CAD%2520reconstruction%2520from%2520Multi-View%2520Images%2520with%2520Gaussian%2520Splatting%26entry.906535625%3DJiaxing%2520Yu%2520and%2520Dongyang%2520Ren%2520and%2520Hangyu%2520Xu%2520and% {"title": "FlexAvatar: Learning Complete 3D Head Avatars with Partial Supervision", "author": "Tobias Kirschstein and Simon Giebenhain and Matthias Nie\u00dfner", "abstract": "We introduce FlexAvatar, a method for creating high-quality and complete 3D head avatars from a single image. A core challenge lies in the limited availability of multi-view data and the tendency of monocular training to yield incomplete 3D head reconstructions. We identify the root cause of this issue as the entanglement between driving signal and target viewpoint when learning from monocular videos. To address this, we propose a transformer-based 3D portrait animation model with learnable data source tokens, so-called bias sinks, which enables unified training across monocular and multi-view datasets. This design leverages the strengths of both data sources during inference: strong generalization from monocular data and full 3D completeness from multi-view supervision. Furthermore, our training procedure yields a smooth latent avatar space that facilitates identity interpolation and flexible fitting to an arbitrary number of input observations. In extensive evaluations on single-view, few-shot, and monocular avatar creation tasks, we verify the efficacy of FlexAvatar. Many existing methods struggle with view extrapolation while FlexAvatar generates complete 3D head avatars with realistic facial animations. Website: https://tobias-kirschstein.github.io/flexavatar/", "link": "http://arxiv.org/abs/2512.15599v2", "date": "2026-04-08", "relevancy": 3.2248, "topK": [{"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.6627}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.6627}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6094}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject {"title": "Splats under Pressure: Exploring Performance-Energy Trade-offs in Real-Time 3D Gaussian Splatting under Constrained GPU Budgets", "author": "Muhammad Fahim Tajwar and Arthur Wuhrlin and Bhojan Anand", "abstract": "We investigate the feasibility of real-time 3D Gaussian Splatting (3DGS) rasterisation on edge clients with varying Gaussian splat counts and GPU computational budgets. Instead of evaluating multiple physical devices, we adopt an emulation-based approach that approximates different GPU capability tiers on a single high-end GPU. By systematically under-clocking the GPU core frequency and applying power caps, we emulate a controlled range of floating-point performance levels that approximate different GPU capability tiers. At each point in this range, we measure frame rate, runtime behaviour, and power consumption across scenes of varying complexity, pipelines, and optimisations, enabling analysis of power-performance relationships such as FPS-power curves, energy per frame, and performance per watt. This method allows us to approximate the performance envelope of a diverse class of GPUs, from embedded and mobile-class devices to high-end consumer-grade systems.\n  Our objective is to explore the practical lower bounds of client-side 3DGS rasterisation and assess its potential for deployment in energy-constrained environments, including standalone headsets and thin clients. Through this analysis, we provide early insights into the performance-energy trade-offs that govern the viability of edge-deployed 3DGS systems.", "link": "http://arxiv.org/abs/2604.07177v1", "date": "2026-04-08", "relevancy": 3.0536, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6676}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5934}, {"title": "Dynamic {"title": "PhyEdit: Towards Real-World Object Manipulation via Physically-Grounded Image Editing", "author": "Ruihang Xu and Dewei Zhou and Xiaolong Shen and Fan Ma and Yi Yang", "abstract": "Achieving physically accurate object manipulation in image editing is essential for its potential applications in interactive world models. However, existing visual generative models often fail at precise spatial manipulation, resulting in incorrect scaling and positioning of objects. This limitation primarily stems from the lack of explicit mechanisms to incorporate 3D geometry and perspective projection. To achieve accurate manipulation, we develop PhyEdit, an image editing framework that leverages explicit geometric simulation as contextual 3D-aware visual guidance. By combining this plug-and-play 3D prior with joint 2D--3D supervision, our method effectively improves physical accuracy and manipulation consistency. To support this method and evaluate performance, we present a real-world dataset, RealManip-10K, for 3D-aware object manipulation featuring paired images and depth annotations. We also propose ManipEval, a benchmark with multi-dimensional metrics to evaluate 3D spatial control and geometric consistency. Extensive experiments show that our approach outperforms existing methods, including strong closed-source models, in both 3D geometric accuracy and manipulation consistency.", "link": "http://arxiv.org/abs/2604.07230v1", "date": "2026-04-08", "relevancy": 3.0312, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6239}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.6003}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5946}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PhyEdit%3A%20Towards%20Real-World%20Object%20Manipulation%20via%20Physically-Grounded%20Image%20Editing&body=Title%3A%20PhyEdit%3A%20Towards%20Real-World%20Object%20Manipulation%20via%20Physically-Grounded%20Image%20Editing%0AAuthor%3A%20Ruihang%20Xu%20and%20Dewei%20Zhou%20and%20Xiaolong%20Shen%20and%20Fan%20Ma%20and%20Yi%20Yang%0AAbstract%3A%20Achieving%20physically%20accurate%20object%20manipulation%20in%20image%20editing%20is%20essential%20for%20its%20potential%20applications%20in%20interactive%20world%20models.%20However%2C%20existing%20visual%20generative%20models%20often%20fail%20at%20precise%20spatial%20manipulation%2C%20resulting%20in%20incorrect%20scaling%20and%20positioning%20of%20objects.%20This%20limitation%20primarily%20stems%20from%20the%20lack%20of%20explicit%20mechanisms%20to%20incorporate%203D%20geometry%20and%20perspective%20projection.%20To%20achieve%20accurate%20manipulation%2C%20we%20develop%20PhyEdit%2C%20an%20image%20editing%20framework%20that%20leverages%20explicit%20geometric%20simulation%20as%20contextual%203D-aware%20visual%20guidance.%20By%20combining%20this%20plug-and-play%203D%20prior%20with%20joint%202D--3D%20supervision%2C%20our%20method%20effectively%20improves%20physical%20accuracy%20and%20manipulation%20consistency.%20To%20support%20this%20method%20and%20evaluate%20performance%2C%20we%20present%20a%20real-world%20dataset%2C%20RealManip-10K%2C%20for%203D-aware%20object%20manipulation%20featuring%20paired%20images%20and%20depth%20annotations.%20We%20also%20propose%20ManipEval%2C%20a%20benchmark%20with%20multi-dimensional%20metrics%20to%20evaluate%203D%20spatial%20control%20and%20geometric%20consistency.%20Extensive%20experiments%20show%20that%20our%20approach%20outperforms%20existing%20methods%2C%20including%20strong%20closed-source%20models%2C%20in%20both%203D%20geometric%20accuracy%20and%20manipulation%20consistency.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07230v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNx ms%2520existing%2520methods%252C%2520including%2520strong%2520closed-source%2520models%252C%2520in%2520both%25203D%2520geometric%2520accuracy%2520and%2520manipulation%2520consistency.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.07230v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=PhyEdit%3A%20Towards%20Real-World%20Object%20Manipulation%20via%20Physically-Grounded%20Image%20Editing&entry.906535625=Ruihang%20Xu%20and%20Dewei%20Zhou%20and%20Xiaolong%20Shen%20and%20Fan%20Ma%20and%20Yi%20Yang&entry.1292438233=Achieving%20physically%20accurate%20object%20manipulation%20in%20image%20editing%20is%20essential%20for%20its%20potential%20applications%20in%20interactive%20world%20models.%20However%2C%20existing%20visual%20generative%20models%20often%20fail%20at%20precise%20spatial%20manipulation%2C%20resulting%20in%20incorrect%20scaling%20and%20positioning%20of%20objects.%20This%20limitation%20primarily%20stems%20from%20the%20lack%20of%20explicit%20mechanisms%20to%20incorporate%203D%20geometry%20and%20perspective%20projection.%20To%20achieve%20accurate%20manipulation%2C%20we%20develop%20PhyEdit%2C%20an%20image%20editing%20framework%20that%20leverages%20explicit%20geometric%20simulation%20as%20contextual%203D-aware%20visual%20guidance.%20By%20combining%20this%20plug-and-play%203D%20prior%20with%20joint%202D--3D%20supervision%2C%20our%20method%20effectively%20improves%20physical%20accuracy%20and%20manipulation%20consistency.%20To%20support%20this%20method%20and%20evaluate%20performance%2C%20we%20present%20a%20real-world%20dataset%2C%20RealManip-10K%2C%20for%203D-aware%20object%20manipulation%20featuring%20paired%20images%20and%20depth%20annotations.%20We%20also%20propose%20ManipEval%2C%20a%20benchmark%20with%20multi-dimensional%20metrics%20to%20evaluate%203D%20spatial%20control%20and%20geometric%20consistency.%20Extensive%20experiments%20show%20that%20our%20approach% {"title": "DINO-QPM: Adapting Visual Foundation Models for Globally Interpretable Image Classification", "author": "Robert Zimmermann and Thomas Norrenbrock and Bodo Rosenhahn", "abstract": "Although visual foundation models like DINOv2 provide state-of-the-art performance as feature extractors, their complex, high-dimensional representations create substantial hurdles for interpretability. This work proposes DINO-QPM, which converts these powerful but entangled features into contrastive, class-independent representations that are interpretable by humans. DINO-QPM is a lightweight interpretability adapter that pursues globally interpretable image classification, adapting the Quadratic Programming Enhanced Model (QPM) to operate on strictly frozen DINO backbones. While classification with visual foundation models typically relies on the \\texttt{CLS} token, we deliberately diverge from this standard. By leveraging average-pooling, we directly connect the patch embeddings to the model's features and therefore enable spatial localisation of DINO-QPM's globally interpretable features within the input space. Furthermore, we apply a sparsity loss to minimise spatial scatter and background noise, ensuring that explanations are grounded in relevant object parts. With DINO-QPM we make the level of interpretability of QPM available as an adapter while exceeding the accuracy of DINOv2 linear probe. Evaluated through an introduced Plausibility metric and other interpretability metrics, extensive experiments demonstrate that DINO-QPM is superior to other applicable methods for frozen visual foundation models in both classification accuracy and explanation quality.", "link": "http://arxiv.org/abs/2604.07166v1", "date": "2026-04-08", "relevancy": 2.9593, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6055}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6055}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5646}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DINO-QPM%3A%20Adapting%20Visual%20Foundation%20Models%20for%20Globally%20Interpretable%20Image%20Classification&body=Title%3A%20DINO-QPM%3A%20Adapting%20Visual%20Foundation%20Models%20for%20Globally%20Interpretable%20Image%20Classification%0AAuthor%3A%20Robert%20Zimmermann%20and%20Thomas%20Norrenbrock%20and%20Bodo%20Rosenhahn%0AAbstract%3A%20Although%20visual%20foundation%20models%20like%20DINOv2%20provide%20state-of-the-art%20performance%20as%20feature%20extractors%2C%20their%20complex%2C%20high-dimensional%20representations%20create%20substantial%20hurdles%20for%20interpretability.%20This%20work%20proposes%20DINO-QPM%2C%20which%20converts%20these%20powerful%20but%20entangled%20features%20into%20contrastive%2C%20class-independent%20representations%20that%20are%20interpretable%20by%20humans.%20DINO-QPM%20is%20a%20lightweight%20interpretability%20adapter%20that%20pursues%20globally%20interpretable%20image%20classification%2C%20adapting%20the%20Quadratic%20Programming%20Enhanced%20Model%20%28QPM%29%20to%20operate%20on%20strictly%20frozen%20DINO%20backbones.%20While%20classification%20with%20visual%20foundation%20models%20typically%20relies%20on%20the%20%5Ctexttt%7BCLS%7D%20token%2C%20we%20deliberately%20diverge%20from%20this%20standard.%20By%20leveraging%20average-pooling%2C%20we%20directly%20connect%20the%20patch%20embeddings%20to%20the%20model%27s%20features%20and%20therefore%20enable%20spatial%20localisation%20of%20DINO-QPM%27s%20globally%20interpretable%20features%20within%20the%20input%20space.%20Furthermore%2C%20we%20apply%20a%20sparsity%20loss%20to%20minimise%20spatial%20scatter%20and%20background%20noise%2C%20ensuring%20that%20explanations%20are%20grounded%20in%20relevant%20object%20parts.%20With%20DINO-QPM%20we%20make%20the%20level%20of%20interpretability%20of%20QPM%20available%20as%20an%20adapter%20while%20exceeding%20the%20accuracy%20of%20DINOv2%20linear%20probe.%20Evaluated%20through%20an%20introduced%20Plausibility%20metric%20and%20other%20interpretability%20metrics%2C%20extensive%20experiments%20demonstrate%20that%20DINO-QPM%20is%20superior%20to%20other%20applicable%20methods%20for%20frozen%20visual%20foundation%20models%20in%20both%20classification%20accuracy%20and%20explanation%20quality.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07166v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDINO-QPM%253A%2520Adapting%2520Visual%2520Foundation%2520Models%2520for%2520Globally%2520Interpretable%2520Image%2520Classification%26entry.906535625%3DRobert%2520Zimmermann%2520and%2520Thomas%2520Norrenbrock%2520and%2520Bodo%2520Rosenhahn%26entry.1292438233%3DAlthough%2520visual%2520foundation%2520models%2520like%2520DINOv2%2520provide%2520state-of-the-art%2520performance%2520as%2520feature%2520extractors%252C%2520their%2520complex%252C%2520high-dimensional%2520representations%2520create%2520substantial%2520hurdles%2520for%2520interpretability.%2520This%2520work%2520proposes%2520DINO-QPM%252C%2520which%2520converts%2520these%2520powerful%2520but%2520entangled%2520features%2520into%2520contrastive%252C%2520class-independent%2520representations%2520that%2520are%2520interpretable%2520by%2520humans.%2520DINO-QPM%2520is%2520a%2520lightweight%2520interpretability%2520adapter%2520that%2520pursues%2520globally%2520interpretable%2520image%2520classification%252C%2520adapting%2520the%2520Quadratic%2520Programming%2520Enhanced%2520Model%2520%2528QPM%2529%2520to%2520operate%2520on%2520strictly%2520frozen%2520DINO%2520backbones.%2520While%2520classification%2520with%2520visual%2520foundation%2520models%2520typically%2520relies%2520on%2520the%2520% {"title": "Q-Zoom: Query-Aware Adaptive Perception for Efficient Multimodal Large Language Models", "author": "Yuheng Shi and Xiaohuan Pei and Linfeng Wen and Minjing Dong and Chang Xu", "abstract": "MLLMs require high-resolution visual inputs for fine-grained tasks like document understanding and dense scene perception. However, current global resolution scaling paradigms indiscriminately flood the quadratic self-attention mechanism with visually redundant tokens, severely bottlenecking inference throughput while ignoring spatial sparsity and query intent. To overcome this, we propose Q-Zoom, a query-aware adaptive high-resolution perception framework that operates in an efficient coarse-to-fine manner. First, a lightweight Dynamic Gating Network safely bypasses high-resolution processing when coarse global features suffice. Second, for queries demanding fine-grained perception, a Self-Distilled Region Proposal Network (SD-RPN) precisely localizes the task-relevant Region-of-Interest (RoI) directly from intermediate feature spaces. To optimize these modules efficiently, the gating network uses a consistency-aware generation strategy to derive deterministic routing labels, while the SD-RPN employs a fully self-supervised distillation paradigm. A continuous spatio-temporal alignment scheme and targeted fine-tuning then seamlessly fuse the dense local RoI with the coarse global layout. Extensive experiments demonstrate that Q-Zoom establishes a dominant Pareto frontier. Using Qwen2.5-VL-7B as a primary testbed, Q-Zoom accelerates inference by 2.52 times on Document & OCR benchmarks and 4.39 times in High-Resolution scenarios while matching the baseline's peak accuracy. Furthermore, when configured for maximum perceptual fidelity, Q-Zoom surpasses the baseline's peak performance by 1.1% and 8.1% on these respective benchmarks. These robust improvements transfer seamlessly to Qwen3-VL, LLaVA, and emerging RL-based thinking-with-image models. Project page is available at https://yuhengsss.github.io/Q-Zoom/.", "link": "http://arxiv.org/abs/2604.06912v1", "date": "2026-04-08", "relevancy": 2.9519, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5918}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5918}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5876}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Q-Zoom%3A%20Query-Aware%20Adaptive%20Perception%20for%20Efficient%20Multimodal%20Large%20Language%20Models&body=Title%3A%20Q-Zoom%3A%20Query-Aware%20Adaptive%20Perception%20for%20Efficient%20Multimodal%20Large%20Language%20Models%0AAuthor%3A%20Yuheng%20Shi%20and%20Xiaohuan%20Pei%20and%20Linfeng%20Wen%20and%20Minjing%20Dong%20and%20Chang%20Xu%0AAbstract%3A%20MLLMs%20require%20high-resolution%20visual%20inputs%20for%20fine-grained%20tasks%20like%20document%20understanding%20and%20dense%20scene%20perception.%20However%2C%20current%20global%20resolution%20scaling%20paradigms%20indiscriminately%20flood%20the%20quadratic%20self-attention%20mechanism%20with%20visually%20redundant%20tokens%2C%20severely%20bottlenecking%20inference%20throughput%20while%20ignoring%20spatial%20sparsity%20and%20query%20intent.%20To%20overcome%20this%2C%20we%20propose%20Q-Zoom%2C%20a%20query-aware%20adaptive%20high-resolution%20perception%20framework%20that%20operates%20in%20an%20efficient%20coarse-to-fine%20manner.%20First%2C%20a%20lightweight%20Dynamic%20Gating%20Network%20safely%20bypasses%20high-resolution%20processing%20when%20coarse%20global%20features%20suffice.%20Second%2C%20for%20queries%20demanding%20fine-grained%20perception%2C%20a%20Self-Distilled%20Region%20Proposal%20Network%20%28SD-RPN%29%20precisely%20localizes%20t {"title": "Appear2Meaning: A Cross-Cultural Benchmark for Structured Cultural Metadata Inference from Images", "author": "Yuechen Jiang and Enze Zhang and Md Mohsinul Kabir and Qianqian Xie and Stavroula Golfomitsou and Konstantinos Arvanitis and Sophia Ananiadou", "abstract": "Recent advances in vision-language models (VLMs) have improved image captioning for cultural heritage. However, inferring structured cultural metadata (e.g., creator, origin, period) from visual input remains underexplored. We introduce a multi-category, cross-cultural benchmark for this task and evaluate VLMs using an LLM-as-Judge framework that measures semantic alignment with reference annotations. To assess cultural reasoning, we report exact-match, partial-match, and attribute-level accuracy across cultural regions. Results show that models capture fragmented signals and exhibit substantial performance variation across cultures and metadata types, leading to inconsistent and weakly grounded predictions. These findings highlight the limitations of current VLMs in structured cultural metadata inference beyond visual perception.", "link": "http://arxiv.org/abs/2604.07338v1", "date": "2026-04-08", "relevancy": 2.8333, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5691}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5691}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5619}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Appear2Meaning%3A%20A%20Cross-Cultural%20Benchmark%20for%20Structured%20Cultural%20Metadata%20Inference%20from%20Images&body=Title%3A%20Appear2Meaning%3A%20A%20Cross-Cultural%20Benchmark%20for%20Structured%20Cultural%20Metadata%20Inferenc {"title": "Caption-Matching: A Multimodal Approach for Cross-Domain Image Retrieval", "author": "Lucas Iijima and Nikolaos Giakoumoglou and Tania Stathaki", "abstract": "Cross-Domain Image Retrieval (CDIR) is a challenging task in computer vision, aiming to match images across different visual domains such as sketches, paintings, and photographs. Existing CDIR methods rely either on supervised learning with labeled cross-domain correspondences or on methods that require training or fine-tuning on target datasets, often struggling with substantial domain gaps and limited generalization to unseen domains. This paper introduces a novel CDIR approach that incorporates textual context by leveraging publicly available pre-trained vision-language models. Our method, Caption-Matching (CM), uses generated image captions as a domain-agnostic intermediate representation, enabling effective cross-domain similarity computation without the need for labeled data or further training. We evaluate our method on standard CDIR benchmark datasets, demonstrating state-of-the-art performance in plug-and-play settings with consistent improvements on Office-Home and DomainNet over previous methods. We also demonstrate our method's effectiveness on a dataset of AI-generated images from Midjourney, showcasing its ability to handle complex, multi-domain queries.", "link": "http://arxiv.org/abs/2403.15152v3", "date": "2026-04-08", "relevancy": 2.8162, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.578}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5729}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5388}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subje multi-domain%20queries.&entry.1838667208=http%3A//arxiv.org/abs/2403.15152v3&entry.124074799=Read"},
{"title": "Not All Tokens See Equally: Perception-Grounded Policy Optimization for Large Vision-Language Models", "author": "Zekai Ye and Qiming Li and Xiaocheng Feng and Ruihan Chen and Ziming Li and Haoyu Ren and Kun Chen and Dandan Tu and Bing Qin", "abstract": "While Reinforcement Learning from Verifiable Rewards (RLVR) has advanced reasoning in Large Vision-Language Models (LVLMs), prevailing frameworks suffer from a foundational methodological flaw: by distributing identical advantages across all generated tokens, these methods inherently dilute the learning signals essential for optimizing the critical, visually-grounded steps of multimodal reasoning. To bridge this gap, we formulate \\textit{Token Visual Dependency}, quantifying the causal information gain of visual inputs via the Kullback-Leibler (KL) divergence between visual-conditioned and text-only predictive distributions. Revealing that this dependency is highly sparse and semantically pivotal, we introduce Perception-Grounded Policy Optimization (PGPO), which is a novel fine-grained credit assignment framework that dynamically reshapes advantages at the token level. Through a threshold-gated, mass-conserving mechanism, PGPO actively amplifies learning signals for visually-dependent tokens while suppressing gradient noise from linguistic priors. Extensive experiments based on the Qwen2.5-VL series across seven challenging multimodal reasoning benchmarks demonstrate that PGPO boosts models by 18.7% on average. Both theoretical and empirical analyses confirm that PGPO effectively reduces gradient variance, prevents training collapse, and acts as a potent regularizer for robust, perception-grounded multimodal reasoning. Code will be released on https://github.com/Yzk1114/PGPO.", "link": "http://arxiv.org/abs/2604.01840v2", "date": "2026-04-08", "relevancy": 2.8144, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5673}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5607}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5607}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Not%20All%20Tokens%20See%20Equally%3A%20Perception-Grounded%20Policy%20Optimization%20for%20Large%20Vision-Language%20Models&body=Title%3A%20Not%20All%20Tokens%20See%20Equally%3A%20Perception-Grounded%20Policy%20Optimization%20for%20Large%20Vision-Language%20Models%0AAuthor%3A%20Zekai%20Ye%20and%20Qiming%20Li%20and%20Xiaocheng%20Feng%20and%20Ruihan%20Chen%20and%20Ziming%20Li%20and%20Haoyu%20Ren%20and%20Kun%20Chen%20and%20Dandan%20Tu%20and%20Bing%20Qin%0AAbstract%3A%20While%20Reinforcement%20Learning%20from%20Verifiable%20Rewards%20%28RLVR%29%20has%20advanced%20reasoning%20in%20Large%20Vision-Language%20Models%20%28LVLMs%29%2C%20prevailing%20frameworks%20suffer%20from%20a%20foundational%20methodological%20flaw%3A%20by%20distributing%20identical%20advantages%20across%20all%20generated%20tokens%2C%20these%20methods%20inherently%20dilute%20the%20learning%20signals%20essential%20for%20optimizing%20the%20critical%2C%20visually-grounded%20steps%20of%20multimodal%20reasoning.%20To%20bridge%20this%20gap%2C%20we%20formulate%20%5Ctextit%7BToken%20Visual%20Dependency%7D%2C%20quantifying%20the%20causal%20information%20gain%20of%20visual%20inputs%20via%20the%20Kullback-Leibler%20%28KL%29%20divergence%20between%20visual-conditioned%20and%20text-only%20predictive%20distributions.%20Revealing%20that%20this%20dependency%20is%20highly%20sparse%20and%20semantically%20pivotal%2C%20we%20introduce%20Perception-Grounded%20Policy%20Optimization%20%28PGPO%29%2C%20which%20is%20a%20novel%20fine-grained%20credit%20assignment%20framework%20that%20dynamically%20reshapes%20advantages%20at%20the%20token%20level.%20Through%20a%20threshold-gated%2C%20mass-conserving%20mechanism%2C%20PGPO%20actively%20amplifies%20learning%20signals%20for%20visually-dependent%20tokens%20while%20suppressing%20gradient%20noise%20from%20linguistic%20priors.%20Extensive%20experiments%20based%20on%20the%20Qwen2.5-VL%20series%20across%20seven%20challenging%20multimodal%20reasoning%20benchmarks%20demonstrate%20that%20PGPO%20boosts%20models%20by%2018.7%25%20on%20average.%20Both%20theoretical%20and%20empirical%20analyses%20confirm%20that%20PGPO%20effectively%20reduces%20gradient%20variance%2C%20prevents%20training%20collapse%2C%20and%20acts%20as%20a%20potent%20regularizer%20for%20robust%2C%20perception-grounded%20multimodal%20reasoning.%20Code%20will%20be%20released%20on%20https%3A//github.com/Yzk1114/PGPO.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01840v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNot%2520All%2520Tokens%2520See%2520Equally%253A%2520Perception-Grounded%2520Policy%2520Optimization%2520for%2520Large%2520Vision-Language%2520Models%26entry.906535625%3DZekai%2520Ye%2520and%2520Qiming%2520Li%2520and%2520Xiaocheng%2520Feng%2520and%2520Ruihan%2520Chen%2520and%2520Ziming%2520Li%2520and%2520Haoyu%2520Ren%2520and%2520Kun%2520Chen%2520and%2520Dandan%2520Tu%2520and%2520Bing%2520Qin%26entry.1292438233%3DWhile%2520Reinforcement%2520Learning%2520from%2520Verifiable%2520Rewards%2520%2528RLVR%2529%2520has%2520advanced%2520reasoning%2520in%2520Large%2520Vision-Language%2520Models%2520%2528LVLMs%2529%252C%2520prevailing%2520frameworks%2520suffer%2520from%2520a%2520foundational%2520methodological%2520flaw%253A%2520by%2520distributing%2520identical%2520advantages%2520across%2520all%2520generated%2520tokens%252C%2520these%2520methods%2520inherently%2520dilute%2520the%2520learning%2520signals%2520essential%2520for%2520optimizing%2520the%2520critical%252C%2520visually-grounded%2520steps%2520of {"title": "TC-AE: Unlocking Token Capacity for Deep Compression Autoencoders", "author": "Teng Li and Ziyuan Huang and Cong Chen and Yangfu Li and Yuanhuiyi Lyu and Dandan Zheng and Chunhua Shen and Jun Zhang", "abstract": "We propose TC-AE, a ViT-based architecture for deep compression autoencoders. Existing methods commonly increase the channel number of latent representations to maintain reconstruction quality under high compression ratios. However, this strategy often leads to latent representation collapse, which degrades generative performance. Instead of relying on increasingly complex architectures or multi-stage training schemes, TC-AE addresses this challenge from the perspective of the token space, the key bridge between pixels and image latents, through two complementary innovations: Firstly, we study token number scaling by adjusting the patch size in ViT under a fixed latent budget, and identify aggressive token-to-latent compression as the key factor that limits effective scaling. To address this issue, we decompose token-to-latent compression into two stages, reducing structural information loss and enabling effective token number scaling for generation. Secondly, to further mitigate latent representation collapse, we enhance the semantic structure of image tokens via joint self-supervised training, leading to more generative-friendly latents. With these designs, TC-AE achieves substantially improved reconstruction and generative performance under deep compression. We hope our research will advance ViT-based tokenizer for visual generation.", "link": "http://arxiv.org/abs/2604.07340v1", "date": "2026-04-08", "relevancy": 2.8058, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5928}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5497}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5409}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TC-AE%3A%20Unlocking%20Token%20Capacity%20for%20Deep%20Compression%20Autoencoders&body=Title%3A%20TC-AE%3A%20Unlocking%20Token%20Capacity%20for%20Deep%20Compression%20Autoencoders%0AAuthor%3A%20Teng%20Li%20and%20Ziyuan%20Huang%20and%20Cong%20Chen%20and%20Yangfu%20Li%20and%20Yuanhuiyi%20Lyu%20and%20Dandan%20Zheng%20and%20Chunhua%20Shen%20and%20Jun%20Zhang%0AAbstract%3A%20We%20propose%20TC-AE%2C%20a%20ViT-based%20architecture%20for%20deep%20compression%20autoencoders.%20Existing%20methods%20commonly%20increase%20the%20channel%20number%20of%20latent%20representations%20to%20maintain%20reconstruction%20quality%20under%20high%20compression%20ratios.%20However%2C%20this%20strategy%20often%20leads%20to%20latent%20representation%20collapse%2C%20which%20degrades%20generative%20performance.%20Instead%20of%20relying%20on%20increasingly%20complex%20architectures%20or%20multi-stage%20training%20schemes%2C%20TC-AE%20addresses%20this%20challenge%20from%20the%20perspective%20of%20the%20token%20space%2C%20the%20key%20bridge%20between%20pixels%20and%20image%20latents%2C%20through%20two%20complementary%20innovations%3A%20Firstly%2C%20we%20study%20token%20number%20scaling%20by%20adjusting%20the%20patch%20size%20in%20ViT%20under%20a%20fixed%20latent%20budget%2C%20and%20identify%20aggressive%20token-to-latent%20compression%20as%20the%20key%20factor%20that%20limits%20effective%20scaling.%20To%20address%20this%20issue%2C%20we%20decompose%20token-to-latent%20compression%20into%20two%20stages%2C%20reducing%20structural%20information%20loss%20and%20enabling%20effective%20token%20number%20scaling%20for%20generation.%20Secondly%2C%20to%20further%20mitigate%20latent%20representation%20collapse%2C%20we%20enhance%20the%20semantic%20structure%20of%20image%20tokens%20via%20joint%20self-supervis {"title": "Do MLLMs Really Understand Space? A Mathematical Reasoning Evaluation", "author": "Shuo Lu and Jianjie Cheng and Yinuo Xu and Yongcan Yu and Lijun Sheng and Peijie Wang and Siru Jiang and Yongguan Hu and Run Ling and Yihua Shao and Ao Ma and Wei Feng and Lingxiao He and Meng Wang and Qianlong Xie and Xingxing Wang and Nicu Sebe and Ran He and Jian Liang", "abstract": "Multimodal large language models (MLLMs) have achieved strong performance on perception-oriented tasks, yet their ability to perform mathematical spatial reasoning, defined as the capacity to parse and manipulate two- and three-dimensional relations, remains unclear. Humans easily solve textbook-style spatial reasoning problems with over 95\\% accuracy, but we find that most leading MLLMs fail to reach even 60\\% on the same tasks. This striking gap highlights spatial reasoning as a fundamental weakness of current models. To investigate this gap, we present \\emph{MathSpatial}, the first large-scale and systematic dataset resource dedicated to mathematical spatial reasoning in MLLMs. \\emph{MathSpatial} provides two complementary subsets: (i)~\\emph{MathSpatial-Bench}, a rigorously curated evaluation set of 2{,}000 problems spanning 3 categories and 11 subtypes, designed to isolate spatial reasoning from perceptual noise; and (ii)~\\emph{MathSpatial-Corpus}, a training set of 8{,}000 problems equipped with verified solutions and structured reasoning traces. All problems are sourced from authentic educational materials and undergo multi-stage quality control including deduplication, geometric consistency checking, and cross-validated solution verification. Benchmarking 16 leading MLLMs on \\emph{MathSpatial-Bench} reveals that spatial reasoning remains a fundamental bottleneck: even GPT-5 lags behind human performance by over 35 percentage points, with particularly poor results on abstract deduction tasks. We further show that training on \\emph{MathSpatial-Corpus} yields consistent improvements across model families, demonstrating the dataset's practical value for advancing spatial reasoning capabilities. \\emph{MathSpatial} is publicly available at https://shuolucs.github.io/MathSpatial.", "link": "http://arxiv.org/abs/2602.11635v2", "date": "2026-04-08", "relevancy": 2.8018, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5698}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5698}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5414}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Do%20MLLMs%20Really%20Understand%20Space%3F%20A%20Mathematical%20Reasoning%20Evaluation&body=Title%3A%20Do%20MLLMs%20Really%20Understand%20Space%3F%20A%20Mathematical%20Reasoning%20Evaluation%0AAuthor%3A%20Shuo%20Lu%20and%20Jianjie%20Cheng%20and%20Yinuo%20Xu%20and%20Yongcan%20Yu%20and%20Lijun%20Sheng%20and%20Peijie%20Wang%20and%20Siru%20Jiang%20and%20Yongguan%20Hu%20and%20Run%20Ling%20and%20Yihua%20Shao%20and%20Ao%20Ma%20and%20Wei%20Feng%20and%20Lingxiao%20He%20and%20Meng%20Wang%20and%20Qianlong%20Xie%20and%20Xingxing%20Wang%20and%20Nicu%20Sebe%20and%20Ran%20He%20and%20Jian%20Liang%0AAbstract%3A%20Multimodal%20large%20language%20models%20%28MLLMs%29%20have%20achieved%20strong%20performance%20on%20perception-oriented%20tasks%2C%20yet%20their%20ability%20to%20perform%20mathematical%20spatial%20reasoning%2C%20defined%20as%20the%20capacity%20to%20parse%20and%20manipulate%20two-%20and%20three-dimensional%20relations%2C%20remains%20unclear.%20Humans%20easily%20solve%20textbook-style%20spatial%20reasoning%20problems%20with%20over%2095%5C%25%20accuracy%2C%20but%20we%20find%20that%20most%20leading%20MLLMs%20fail%20to%20reach%20even%2060%5C%25%20on%20the%20same%20tasks.%20This%20striking%20gap%20highlights%20spatial%20reasoning%20as%20a%20fundamental%20weakness%20of%20current%20models.%20To%20investigate%20this%20gap%2C%20we%20present%20%5Cemph%7BMathSpatial%7D%2C%20the%20first%20large-scale%20and%20systematic%20dataset%20resource%20dedicated%20to%20mathematical%20spatial%20reasoning%20in%20MLLMs.%20%5Cemph%7BMathSpatial%7D%20provides%20two%20complementary%20subsets%3A%20%28i%29~%5Cemph%7BMathSpatial-Bench%7D%2C%20a%20rigorously%20curated%20evaluation%20set%20of%202%7B%2C%7D000%20problems%20spanning%203%20categories%20and%2011%20subtypes%2C%20designed%20to%20isolate%20spatial%20reasoning%20from%20perceptual%20noise%3B%20and%20%28ii%29~%5Cemph%7BMathSpatial-Corpus%7D%2C%20a%20training%20set%20of%208%7B%2C%7D000%20problems%20equipped%20with%20verified%20solutions%20and%20structured%20reasoning%20traces.%20All%20problems%20are%20sourced%20from%20authentic%20educational%20materials%20and%20undergo%20multi-stage%20quality%20control%20including%20deduplication%2C%20geometric%20consistency%20checking%2C%20and%20cross-validated%20solution%20verification.%20Benchmarking%2016%20leading%20MLLMs%20on%20%5Cemph%7BMathSpatial-Bench%7D%20reveals%20that%20spatial%20reasoning%20remains%20a%20fundamental%20bottleneck%3A%20even%20GPT-5%20lags%20behind%20human%20performance%20by%20over%2035%20percentage%20points%2C%20with%20particularly%20poor%20results%20on%20abstract%20deduction%20tasks.%20We%20further%20show%20that%20training%20on%20%5Cemph%7BMathSpatial-Corpus%7D%20yields%20consistent%20improvements%20across%20model%20families%2C%20demonstrating%20the%20dataset%27s%20practical%20value%20for%20advancing%20spatial%20reasoning%20capabilities.%20%5Cemph%7BMathSpatial%7D%20is%20publicly%20available%20at%20https%3A//shuolucs.github.io/MathSpatial.%0ALink%3A%20http%3A//arxiv.org/abs/2602.11635v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDo%25 {"title": "An Automated Survey of Generative Artificial Intelligence: Large Language Models, Architectures, Protocols, and Applications", "author": "Eduardo C. Garrido-Merch\u00e1n and \u00c1lvaro L\u00f3pez L\u00f3pez", "abstract": "Generative artificial intelligence, and large language models in particular, have emerged as one of the most transformative paradigms in modern computer science. This automated survey provides an accessible treatment of the field as of early 2026, with a strong focus on the leading model families, deployment protocols, and real-world applications. The core of the survey is devoted to a detailed comparative analysis of the frontier large language models, with particular emphasis on open-weight systems: DeepSeek-V3, DeepSeek-R1, DeepSeek-V3.2, and the forthcoming DeepSeek V4; the Qwen 3 and Qwen 3.5 series; GLM-5; Kimi K2.5; MiniMax M2.5; LLaMA 4; Mistral Large 3; Gemma 3; and Phi-4, alongside proprietary systems including GPT-5.4, Gemini 3.1 Pro, Grok 4.20, and Claude Opus 4.6. For each model, we describe the architectural innovations, training regimes, and empirical performance on current benchmarks and the Chatbot Arena leaderboard. The survey further covers deployment protocols including Retrieval-Augmented Generation, the Model Context Protocol, the Agent-to-Agent protocol, function calling standards, and serving frameworks. We present an extensive review of real-world applications across fifteen industry sectors, from financial services and legal technology to tourism and agriculture, supported by empirical evidence and case studies. This work has been generated by Claude Opus 4.6 (Anthropic) under the supervision and editorial review of the human authors, with the goal of producing updated editions approximately every six months.", "link": "http://arxiv.org/abs/2306.02781v3", "date": "2026-04-08", "relevancy": 2.7876, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "simi {"title": "Focus on What Really Matters in Low-Altitude Governance: A Management-Centric Multi-Modal Benchmark with Implicitly Coordinated Vision-Language Reasoning Framework", "author": "Hao Chang and Zhihui Wang and Lingxiang Wu and Wei An and Boyang Li and Zaiping Lin and Weidong Sheng and Jinqiao Wang", "abstract": "Low-altitude vision systems are becoming a critical infrastructure for smart city governance. However, existing object-centric perception paradigms and loosely coupled vision-language pipelines are still difficult to support management-oriented anomaly understanding required in real-world urban governance. To bridge this gap, we introduce GovLA-10K, the first management-oriented multi-modal benchmark for low-altitude intelligence, along with GovLA-Reasoner, a unified vision-language reasoning framework tailored for governance-aware aerial perception. Unlike existing studies that aim to exhaustively annotate all visible objects, GovLA-10K is deliberately designed around functionally salient targets that directly correspond to practical management needs, and further provides actionable management suggestions grounded in these observations. To effectively coordinate the fine-grained visual grounding with high-level contextual language reasoning, GovLA-Reasoner introduces an efficient Spatially-aware Grounding Adapter (SGA) that implicitly coordinates discriminative representation sharing between the visual detector and the large language model (LLM). Different from existing adapters that primarily focus on global embedding alignment, our SGA is specifically designed to compress and aggregate multi-stream grounding-aware representations, thereby preserving fine-grained spatial cues while enabling their effective integration into the language reasoning process. Extensive experiments indicate that our GovLA-Reasoner effectively improves performance while avoiding the need of fine-tuning for any task-specific individual components. We believe our work offers a new perspective and foundation for future studies on management-aware low-altitude vision-language systems. The code and dataset will be publicly released after further organization.", "link": "http://arxiv.org/abs/2601.19640v2", "date": "2026-04-08", "relevancy": 2.7744, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5616}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5515}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5515}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Focus%20on%20What%20Really%20Matters%20in%20Low-Altitude%20Governance%3A%20A%20Management-Centric%20Multi-Modal%20Benchmark%20with%20Implicitly%20Coordinated%20Vision-Language%20Reasoning%20Framework&body=Title%3A%20Focus%20on%20What%20Really%20Matters%20in%20Low-Altitude%20Governance%3A%20A%20Management-Centric%20Multi-Modal%20Benchmark%20with%20Implicitly%20Coordinated%20Vision-Language%20Reasoning%20Framework%0AAuthor%3A%20Hao%20Chang%20and%20Zhihui%20Wang%20and%20Lingxiang%20Wu%20and%20Wei%20An%20and%20Boyang%20Li%20and%20Zaiping%20Lin%20and%20Weidong%20Sheng%20and%20Jinqiao%20Wang%0AAbstract%3A%20Low-altitude%20vision%20systems%20are%20becoming%20a%20critical%20infrastructure%20for%20smart%20city%20governance.%20However%2C%20existing%20object-centric%20perception%20paradigms%20and%20loosely%20coupled%20vision-language%20pipelines%20are%20still%20difficult%20to%20support%20management-oriented%20anomaly%20understanding%20required%20in%20real-world%20urban%20governance.%20To%20bridge%20this%20gap%2C%20we%20introduce%20GovLA-10K%2C%20the%20first%20management-oriented%20multi-modal%20benchmark%20for%20low-altitude%20intelligence%2C%2 {"title": "BRIDGE: Multimodal-to-Text Retrieval via Reinforcement-Learned Query Alignment", "author": "Mohamed Darwish Mounis and Mohamed Mahmoud and Shaimaa Sedek and Mahmoud Abdalla and Mahmoud SalahEldin Kasem and Abdelrahman Abdallah and Hyun-Soo Kang", "abstract": "Multimodal retrieval systems struggle to resolve image-text queries against text-only corpora: the best vision-language encoder achieves only 27.6 nDCG@10 on MM-BRIGHT, underperforming strong text-only retrievers. We argue the bottleneck is not the retriever but the query -- raw multimodal queries entangle visual descriptions, conversational noise, and retrieval intent in ways that systematically degrade embedding similarity. We present \\textbf{BRIDGE}, a two-component system that resolves this mismatch without multimodal encoders. \\textbf{FORGE} (\\textbf{F}ocused Retrieval Query Generato\\textbf{r}) is a query alignment model trained via reinforcement learning, which distills noisy multimodal queries into compact, retrieval-optimized search strings. \\textbf{LENS} (\\textbf{L}anguage-\\textbf{E}nhanced \\textbf{N}eural \\textbf{S}earch) is a reasoning-enhanced dense retriever fine-tuned on reasoning-intensive retrieval data to handle the intent-rich queries FORGE produces. Evaluated on MM-BRIGHT (2,803 queries, 29 domains), BRIDGE achieves \\textbf{29.7} nDCG@10, surpassing all multimodal encoder baselines including Nomic-Vision (27.6). When FORGE is applied as a plug-and-play aligner on top of Nomic-Vision, the combined system reaches \\textbf{33.3} nDCG@10 -- exceeding the best text-only retriever (32.2) -- demonstrating that \\textit{query alignment} is the key bottleneck in multimodal-to-text retrieval. https://github.com/mm-bright/multimodal-reasoning-retrieval", "link": "http://arxiv.org/abs/2604.07201v1", "date": "2026-04-08", "relevancy": 2.7404, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757 {"title": "Location Is All You Need: Continuous Spatiotemporal Neural Representations of Earth Observation Data", "author": "Mojgan Madadikhaljan and Jonathan Prexl and Isabelle Wittmann and Conrad M Albrecht and Michael Schmitt", "abstract": "In this work, we present LIANet (Location Is All You Need Network), a coordinate-based neural representation that models multi-temporal spaceborne Earth observation (EO) data for a given region of interest as a continuous spatiotemporal neural field. Given only spatial and temporal coordinates, LIANet reconstructs the corresponding satellite imagery. Once pretrained, this neural representation can be adapted to various EO downstream tasks, such as semantic segmentation or pixel-wise regression, importantly, without requiring access to the original satellite data. LIANet intends to serve as a user-friendly alternative to Geospatial Foundation Models (GFMs) by eliminating the overhead of data access and preprocessing for end-users and enabling fine-tuning solely based on labels. We demonstrate the pretraining of LIANet across target areas of varying sizes and show that fine-tuning it for downstream tasks achieves competitive performance compared to training from scratch or using established GFMs. The source code and datasets are publicly available at https://github.com/mojganmadadi/LIANet/tree/v1.0.1.", "link": "http://arxiv.org/abs/2604.07092v1", "date": "2026-04-08", "relevancy": 2.7347, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5685}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5565}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5159}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Location%20Is%20All%20You%20Need%3A%20Continuous%20Spatiotemporal%20Neural%20Representations%20of%20Earth%20Observation%20Data&body=Title%3A%20Location%20Is%20All%20You%20Need%3A%20Continuous%20Spatiotemporal%20Neural%20Representations%20of%20Earth%20Observation%20Data%0AAuthor%3A%20Mojgan%20Madadikhaljan%20and%20Jonathan%20Prexl%20and%20Isabelle%20Wittmann%20and%20Conrad%20M%20Albrecht%20and%20Michael%20Schmitt%0AAbstract%3A%20In%20this%20work%2C%20we%20present%20LIANet%20%28Location%20Is%20All%20You%20Need%20Network%29%2C%20a%20coordinate-based%20neural%20representation%20that%20models%20multi-temporal%20spaceborne%20Earth%20observation%20%28EO%29%20data%20for%20a%20given%20region%20of%20interest%20as%20a%20continuous%20spatiotemporal%20neural%20field.%20Given%20only%20spatial%20and%20temporal%20coordinates%2C%20LIANet%20reconstructs%20the%20corresponding%20satellite%20imagery.%20Once%20pretrained%2C%20this%20neural%20representation%20can%20be%20adapted%20to%20various%20EO%20downstream%20tasks%2C%20such%20as%20semantic%20segmentation%20or%20pixel-wise%20regression%2C%20importantly%2C%20without%20requiring%20access%20to%20the%20original%20satellite%20data.%20LIANet%20intends%20to%20serve%20as%20a%20user-friendly%20alternative%20to%20Geospatial%20Foundation%20Models%20%28GFMs%29%20by%20eliminating%20the%20overhead%20of%20data%20access%20and%20preprocessing%20for%20end-users%20and%20enabling%20fine-tuning%20solely%20based%20on%20labels.%20We%20demonstrate%20the%20pretraining%20of%20LIANet%20across%20target%20areas%20of%20varying%20sizes%20and%20show%20that%20fine-tuning%20it%20for%20downstream%20tasks%20achieves%20competitive%20performance%20compared%20to%20training%20from%20scratch%20or%20using%20established%20GFMs.%20The%20source%20code%20and%20datasets%20are%20publicly%20available%20at%20https%3A//github.com/mojganmadadi/LIANet/tree/v1.0.1.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07092v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLocation%2520Is%2520All%2520You%2520Need%253A%2520Continuous%2520Spatiotemporal%2520Neural%2520Representations%2520of%2520Earth%2520Observation%2520Data%26entry.906535625%3DMojgan%2520Madadikhaljan%2520and%2520Jonathan%2520Prexl%2520and%2520Isabelle%2520Wittmann%2520and%2520Conrad%2520M%2520Albrecht%2520and%2520Michael%2520Schmitt%26entry.1292438233%3DIn%2520this%2520work%252C%2520we%2520present%2520LIANet%2520%2528Location%2520Is%2520All%2520You%2520Need%2520Network%2529%252C%2520a%2520coordinate-based%2520neural%2520representation%2520that%2520models%2520multi-temporal%2520spaceborne%2520Earth%2520observation%2520%2528EO%2529%2520data%2520for%2520a%2520given%2520region%2520of%2520interest%2520as%2520a%2520continuous%2520spatiotemporal%2520neural%2520field.%2520Given%2520only%2520spatial%2520and%2520temporal%2520coordinates%252C%2520LIANet%2520reconstructs%2520the%2520corresponding%2520satellite%2520imagery.%2520Once%2520pretrained%252C%2520this%2520neural%2520representation%2520can%2520be%2520adapted%2520to%2520various%2520EO%2520downstream%2520tasks%252C%2520such%2520as%2520semantic%2520segmentation%2520or%2520pixel-wise%2520regression%252C%2520importantly%252C%2520without%2520requiring%2520access%2520to%2520the%2520original%2520satellite%2520data.%2520LIANet%2520intends%2520to%2520serve%2520as%2520a%2520user-friendly%2520alternative%2520to%2520Geospatial%2520Foundation%2520Models%2520%2528GFMs%2529%2520by%2520eliminating%2520the%2520overhead%2520of%2520data%2520access%2520and%2520preprocessing%2520for%2520end-users%2520and%2520enabling%2520fine-tuning%2520solely%2520based%2520on%2520labels.%2520We%2520demonstrate%2520the%2520pretraining%2520of%2520LIANet%2520across%2520target%2520areas%2520of%2520varying%2520sizes%2520and%2520show%2520that%2520fine-tuning%2520it%2520for%2520downstream%2520tasks%2520achieves%2520competitive%2520performance%2520compared%2520to%2520training%2520from%2520scratch%2520or%2520using%2520established%2520GFMs.%2520The%2520source%2520code%2520and%2520datasets%2520are%2520publicly%2520available%2520at%2520https%253A//github.com/mojganmadadi/LIANet/tree/v1.0.1.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.07092v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Location%20Is%20All%20You%20Need%3A%20Continuous%20Spatiotemporal%20Neural%20Representations%20of%20Earth%20Observation%20Data&entry.906535625=Mojgan%20Madadikhaljan%20and%20Jonathan%20Prexl%20and%20Isabelle%20Wittmann%20and%20Conrad%20M%20Albrecht%20and%20Michael%20Schmitt&entry.1292438233=In%20this%20work%2C%20we%20present%20LIANet%20%28Location%20Is%20All%20You%20Need%20Network%29%2C%20a%20coordinate-based%20neural%20representation%20that%20models%20multi-temporal%20spaceborne%20Earth%20observation%20%28EO%29%20data%20for%20a%20given%20region%20of%20interest%20as%20a%20continuous%20spatiotemporal%20neural%20field.%20Given%20only%20spatial%20and%20temporal%20coordinates%2C%20LIANet%20reconstructs%20the%20corresponding%20satellite%20imagery.%20Once%20pretrained%2C%20this%20neural%20representation%20can%20be%20adapted%20to%20various%20EO%20downstream%20tasks%2C%20such%20as%20semantic%20segmentation%20or%20pixel-wise%20regression%2C%20importantly%2C%20without%20requiring%20access%20to%20the%20original%20satellite%20data.%20LIANet%20intends%20to%20serve%20as%20a%20user-friendly%20alternative%20to%20Geospatial%20Foundation%20Models%20%28GFMs%29%20by%20eliminating%20the%20overhead%20of%20data%20access%20and%20preprocessing%20for%20end-users%20and%20enabling%20fine-tuning%20solely%20based%20on%20labels.%20We%20demonstrate%20the%20pretraining%20of%20LIANet%20across%20target%20areas%20of%20varying%20sizes%20and%20show%20that%20fine-tuning%20it%20for%20downstream%20tasks%20achieves%20competitive%20performance%20compared%20to%20training%20from%20scratch%20or%20using%20established%20GFMs.%20The%20source%20code%20and%20datasets%20are%20publicly%20available%20at%20https%3A//github.com/mojganmadadi/LIANet/tree/v1.0.1.&entry.1838667208=http%3A//arxiv.org/abs/2604.07092v1&entry.124074799=Read"},
{"title": "Free-Grained Hierarchical Visual Recognition", "author": "Seulki Park and Zilin Wang and Stella X. Yu", "abstract": "Hierarchical image recognition seeks to predict class labels along a semantic taxonomy, from broad categories to specific ones, typically under the tidy assumption that every training image is fully annotated along its taxonomy path. Reality is messier: A distant bird may be labeled only bird, while a clear close-up may justify bald eagle. We introduce free-grain training, where labels may appear at any level of the taxonomy and models must learn consistent hierarchical predictions from incomplete, mixed-granularity supervision. We build benchmark datasets with varying label granularity and show that existing hierarchical methods deteriorate sharply in this setting. To make up for missing supervision, we propose two simple solutions: One adds broad text-based supervision that captures visual attributes, and the other treats missing labels at specific taxonomy levels as a semi-supervised learning problem. We also study free-grained inference, where the model chooses how deep to predict, returning a reliable coarse label when a fine-grained one is uncertain. Together, our task, datasets, and methods move hierarchical recognition closer to the way labels arise in the real world.", "link": "http://arxiv.org/abs/2510.14737v2", "date": "2026-04-08", "relevancy": 2.7204, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5656}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5387}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity" {"title": "Dynamic Context Evolution for Scalable Synthetic Data Generation", "author": "Ryan Lingo and Rajeev Chhajer", "abstract": "Large language models produce repetitive output when prompted independently across many batches, a phenomenon we term cross-batch mode collapse: the progressive loss of output diversity when a language model is prompted repeatedly without access to its prior generations. Practitioners have long mitigated this with ad hoc deduplication and seed rotation, but no principled framework exists. We introduce Dynamic Context Evolution (DCE), comprising three mechanisms: (1) verbalized tail sampling (the model labels each idea with a guess about how obvious it is, and obvious ideas are discarded), which filters high-probability candidates via model self-assessment; (2) semantic memory, which maintains a persistent embedding index to reject near-duplicates across batches; and (3) adaptive prompt evolution, which reconstructs the generation prompt each batch using memory state and rotating diversity strategies. In experiments across three domains (sustainable packaging concepts, educational exam questions, and creative writing prompts) and two model families (gpt-5-mini and claude-haiku-4-5), a component ablation across 2-3 random seeds per method shows that DCE achieves 0.0 +/- 0.0% collapse versus 5.6 +/- 2.0% for naive prompting, while producing 17-18 HDBSCAN clusters per seed versus naive's volatile 2-17, indicating reliably richer conceptual structure. These results are validated with an independent embedding model (all-MiniLM-L6-v2) and hold across sensitivity sweeps of the VTS threshold tau and dedup threshold delta. Deduplication and prompt evolution are individually insufficient but jointly effective, at approximately $0.50 per 1,000 candidates using only standard API calls, with no fine-tuning or custom architectures required.", "link": "http://arxiv.org/abs/2604.07147v1", "date": "2026-04-08", "relevancy": 2.7078, "topK": [{"title": " {"title": "Are Face Embeddings Compatible Across Deep Neural Network Models?", "author": "Fizza Rubab and Yiying Tong and Arun Ross", "abstract": "Automated face recognition has made rapid strides over the past decade due to the unprecedented rise of deep neural network (DNN) models that can be trained for domain-specific tasks. At the same time, foundation models that are pretrained on broad vision or vision-language tasks have shown impressive generalization across diverse domains, including biometrics. This raises an important question: Do different DNN models--both domain-specific and foundation models--encode facial identity in similar ways, despite being trained on different datasets, loss functions, and architectures? In this regard, we directly analyze the geometric structure of embedding spaces imputed by different DNN models. Treating embeddings of face images as point clouds, we study whether simple affine transformations can align face representations of one model with another. Our findings reveal surprising cross-model compatibility: low-capacity linear mappings substantially improve cross-model face recognition over unaligned baselines for both face identification and verification tasks. Alignment patterns generalize across datasets and vary systematically across model families, indicating representational convergence in facial identity encoding. These findings have implications for model interoperability, ensemble design, and biometric template security.", "link": "http://arxiv.org/abs/2604.07282v1", "date": "2026-04-08", "relevancy": 2.6889, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5421}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5421}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Descriptio

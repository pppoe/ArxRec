{"title": "Smoothing the Edges: Smooth Optimization for Sparse Regularization using Hadamard Overparametrization", "author": "Chris Kolb and Christian L. M\u00fcller and Bernd Bischl and David R\u00fcgamer", "abstract": "We present a framework for smooth optimization of explicitly regularized objectives for (structured) sparsity. These non-smooth and possibly non-convex problems typically rely on solvers tailored to specific models and regularizers. In contrast, our method enables fully differentiable and approximation-free optimization and is thus compatible with the ubiquitous gradient descent paradigm in deep learning. The proposed optimization transfer comprises an overparameterization of selected parameters and a change of penalties. In the overparametrized problem, smooth surrogate regularization induces non-smooth, sparse regularization in the base parametrization. We prove that the surrogate objective is equivalent in the sense that it not only has identical global minima but also matching local minima, thereby avoiding the introduction of spurious solutions. Additionally, our theory establishes results of independent interest regarding matching local minima for arbitrary, potentially unregularized, objectives. We comprehensively review sparsity-inducing parametrizations across different fields that are covered by our general theory, extend their scope, and propose improvements in several aspects. Numerical experiments further demonstrate the correctness and effectiveness of our approach on several sparse learning problems ranging from high-dimensional regression to sparse neural network training.", "link": "http://arxiv.org/abs/2307.03571v4", "date": "2026-04-08", "relevancy": 2.3101, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.491}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4497}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4454}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Smoothing%20the%20Edges%3A%20Smooth%20Optimization%20for%20Sparse%20Regularization%20using%20Hadamard%20Overparametrization&body=Title%3A%20Smoothing%20the%20Edges%3A%20Smooth%20Optimization%20for%20Sparse%20Regularization%20using%20Hadamard%20Overparametrization%0AAuthor%3A%20Chris%20Kolb%20and%20Christian%20L.%20M%C3%BCller%20and%20Bernd%20Bischl%20and%20David%20R%C3%BCgamer%0AAbstract%3A%20We%20present%20a%20framework%20for%20smooth%20optimization%20of%20explicitly%20regularized%20objectives%20for%20%28structured%29%20sparsity.%20These%20non-smooth%20and%20possibly%20non-convex%20problems%20typically%20rely%20on%20solvers%20tailored%20to%20specific%20models%20and%20regularizers.%20In%20contrast%2C%20our%20method%20enables%20fully%20differentiable%20and%20approximation-free%20optimization%20and%20is%20thus%20compatible%20with%20the%20ubiquitous%20gradient%20descent%20paradigm%20in%20deep%20learning.%20The%20proposed%20optimization%20transfer%20comprises%20an%20overparameterization%20of%20selected%20parameters%20and%20a%20change%20of%20penalties.%20In%20the%20overparametrized%20problem%2C%20smooth%20surrogate%20regularization%20induces%20non-smooth%2C%20sparse%20regularization%20in%20the%20base%20parametrization.%20We%20prove%20that%20the%20surrogate%20objective%20is%20equivalent%20in%20the%20sense%20that%20it%20not%20only%20has%20identical%20global%20minima%20but%20also%20matching%20local%20minima%2C%20thereby%20avoiding%20the%20introduction%20of%20spurious%20solutions.%20Additionally%2C%20our%20theory%20establishes%20results%20of%20independent%20interest%20regarding%20matching%20local%20minima%20for%20arbitrary%2C%20potentially%20unregularized%2C%20objectives.%20We%20comprehensively%20review%20sparsity-inducing%20parametrizations%20across%20different%20fields%20that%20are%20covered%20by%20our%20general%20theory%2C%20extend%20their%20scope%2C%20and%20propose%20improvements%20in%20several%20aspects.%20Numerical%20experiments%20further%20demonstrate%20the%20correctness%20and%20effectiveness%20of%20our%20approach%20on%20several%20sparse%20learning%20problems%20ranging%20from%20high-dimensional%20regression%20to%20sparse%20neural%20network%20training.%0ALink%3A%20http%3A//arxiv.org/abs/2307.03571v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSmoothing%2520the%2520Edges%253A%2520Smooth%2520Optimization%2520for%2520Sparse%2520Regularization%2520using%2520Hadamard%2520Overparametrization%26entry.906535625%3DChris%2520Kolb%2520and%2520Christian%2520L.%2520M%25C3%25BCller%2520and%2520Bernd%2520Bischl%2520and%2520David%2520R%25C3%25BCgamer%26entry.1292438233%3DWe%2520present%2520a%2520framework%2520for%2520smooth%2520optimization%2520of%2520explicitly%2520regularized%2520objectives%2520for%2520%2528structured%2529%2520sparsity.%2520These%2520non-smooth%2520and%2520possibly%2520non-convex%2520problems%2520typically%2520rely%2520on%2520solvers%2520tailored%2520to%2520specific%2520models%2520and%2520regularizers.%2520In%2520contrast%252C%2520our%2520method%2520enables%2520fully%2520differentiable%2520and%2520approximation-free%2520optimization%2520and%2520is%2520thus%2520compatible%2520with%2520the%2520ubiquitous%2520gradient%2520descent%2520paradigm%2520in%2520deep%2520learning.%2520The%2520proposed%2520optimization%2520transfer%2520comprises%2520an%2520overparameterization%2520of%2520selected%2520parameters%2520and%2520a%2520change%2520of%2520penalties.%2520In%2520the%2520overparametrized%2520problem%252C%2520smooth%2520surrogate%2520regularization%2520induces%2520non-smooth%252C%2520sparse%2520regularization%2520in%2520the%2520base%2520parametrization.%2520We%2520prove%25 {"title": "Q-Probe: Scaling Image Quality Assessment to High Resolution via Context-Aware Agentic Probing", "author": "Xiang Li and Xueheng Li and Yu Wang and Xuanhua He and Zhangchi Hu and Weiwei Yu and Chengjun Xie", "abstract": "Reinforcement Learning (RL) has empowered Multimodal Large Language Models (MLLMs) to achieve superior human preference alignment in Image Quality Assessment (IQA). However, existing RL-based IQA models typically rely on coarse-grained global views, failing to capture subtle local degradations in high-resolution scenarios. While emerging \"Thinking with Images\" paradigms enable multi-scale visual perception via zoom-in mechanisms, their direct adaptation to IQA induces spurious \"cropping-implies-degradation\" biases and misinterprets natural depth-of-field as artifacts. To address these challenges, we propose Q-Probe, the first agentic IQA framework designed to scale IQA to high resolution via context-aware probing. First, we construct Vista-Bench, a pioneering benchmark tailored for fine-grained local degradation analysis in high-resolution IQA settings. Furthermore, we propose a three-stage training paradigm that progressively aligns the model with human preferences, while simultaneously eliminating causal bias through a novel context-aware cropping strategy. Extensive experiments demonstrate that Q-Probe achieves state-of-the-art performance in high-resolution settings while maintaining superior efficacy across resolution scales.", "link": "http://arxiv.org/abs/2601.15356v3", "date": "2026-04-08", "relevancy": 2.3081, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5916}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5916}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5042}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Q-Probe%3A%20Scaling%20Image%20Quality%20Assessment%20to%20High%20Resolution%20via%20Context-Aware%20Agentic%20Probing&body=Title%3A%20Q-Probe%3A%20Scaling%20Image%20Quality%20Assessment%20to%20High%20Resolution%20via%20Context-Aware%20Agentic%20Probing%0AAuthor%3A%20Xiang%20Li%20and%20Xueheng%20Li%20and%20Yu%20Wang%20and%20Xuanhua%20He%20and%20Zhangchi%20Hu%20and%20Weiwei%20Yu%20and%20Chengjun%20Xie%0AAbstract%3A%20Reinforcement%20Learning%20%28RL%29%20has%20empowered%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20to%20achieve%20superior%20human%20preference%20alignment%20in%20Image%20Quality%20Assessment%20%28IQA%29.%20However%2C%20existing%20RL-based%20IQA%20models%20typically%20rely%20on%20coarse-grained%20global%20views%2C%20failing%20to%20capture%20subtle%20local%20degradations%20in%20high-resolution%20scenarios.%20While%20emerging%20%22Thinking%20with%20Images%22%20paradigms%20enable%20multi-scale%20visual%20perception%20via%20zoom-in%20mechanisms%2C%20their%20direct%20adaptation%20to%20IQA%20induces%20spurious%20%22cropping-implies-degradation%22%20biases%20and%20misinterprets%20natural%20depth-of-field%20as%20artifacts.%20To%20address%20these%20challenges%2C%20we%20propose%20Q-Probe%2C%20the%20first%20agentic%20IQA%20framework%20designed%20to%20scale%20IQA%20to%20high%20resolution%20via%20context-aware%20probing.%20First%2C%20we%20construct%20Vista-Bench%2C%20a%20pioneering%20benchmark%20tailored%20for%20fine-grained%20local%20degradation%20analysis%20in%20high-resolution%20IQA%20settings.%20Furthermore%2C%20we%20propose%20a%20three-stage%20training%20paradigm%20that%20progressively%20aligns%20the%20model%20with%20human%20preferences%2C%20while%20simultaneously%20eliminating%20causal%20bias%20through%20a%20novel%20context-aware%20cropping%20strategy.%20Extensive%20experiments%20demonstrate%20that%20Q-Probe%20achieves%20state-of-the-art%20performance%20in%20high-resolution%20settings%20while%20maintaining%20superior%20efficacy%20across%20resolution%20scales.%0ALink%3A%20http%3A//arxiv.org/abs/2601.15356v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DQ-Probe%253A%2520Scaling%2520Image%2520Quality%2520Assessment%2520to%2520High%2520Resolution%2520via%2520Context-Aware%2520Agentic%2520Probing%26entry.906535625%3DXiang%2520Li%2520and%2520Xueheng%2520Li%2520and%2520Yu%2520Wang%2520and%2520Xuanhua%2520He%2520and%2520Zhangchi%2520Hu%2520and%2520Weiwei%2520Yu%2520and%2520Chengjun%2520Xie%26entry.1292438233%3DReinforcement%2520Learning%2520%2528RL%2529%2520has%2520empowered%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520to%2520achieve%2520superior%2520human%2520preference%2520alignment%2520in%2520Image%2520Quality%2520Assessment%2520%2528IQA%2529.%2520However%252C%2520existing%2520RL-based%2520IQA%2520models%2520typically%2520rely%2520on%2520coarse-grained%2520global%2520views%252C%2520failing%2520to%2520capture%2520subtle%2520local%2520degradations%2520in%2520high-resolution%2520scenarios.%2520While%2520emerging%2520%2522Thinking%2520with%2520Images%2522%2520paradigms%2520enable%2520multi-scale%2520visual%2520perception%2520via%2520zoom-in%2520mechanisms%252C%2520their%2520direct%2520adaptation%2520to%2520IQA%2520induces%2520spurious%2520%2522cropping-implies-degradation%2522%2520biases%2520and%2520misinterprets%2520natural%2520depth-of-field%2520as%2520artifacts.%2520To%2520address%2520these%2520challenges%252C%2520we%2520propose%2520Q-Probe%252C%2520the%2520first%2520agentic%2520IQA%2520framework%2520designed%2520to%2520scale%2520IQA%2520to%2520high%2520resolution%2520via%2520context-aware%2520probing.%2520First%252C%2520we%2520construct%2520Vista-Bench%252C%2520a%2520pioneering%2520benchmark%2520tailored%2520for%2520fine-grained%2520local%2520degradation%2520analysis%2520in%2520high-resolution%2520IQA%2520settings.%2520Furthermore%252C%2520we%2520propose%2520a%2520three-stage%2520training%2520paradigm%2520that%2520progressively%2520aligns%2520the%2520model%2520with%2520human%2520preferences%252C%2520while%2520simultaneously%2520eliminating%2520causal%2520bias%2520through%2520a%2520novel%2520context-aware%2520cropping%2520strategy.%2520Extensive%2520experiments%2520demonstrate%2520that%2520Q-Probe%2520achieves%2520state-of-the-art%2520performance%2520in%2520high-resolution%2520settings%2520while%2520maintaining%2520superior%2520efficacy%2520across%2520resolution%2520scales.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.15356v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Q-Probe%3A%20Scaling%20Image%20Quality%20Assessment%20to%20High%20Resolution%20via%20Context-Aware%20Agentic%20Probing&entry.906535625=Xiang%20Li%20and%20Xueheng%20Li%20and%20Yu%20Wang%20and%20Xuanhua%20He%20and%20Zhangchi%20Hu%20and%20Weiwei%20Yu%20and%20Chengjun%20Xie&entry.1292438233=Reinforcement%20Learning%20%28RL%29%20has%20empowered%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20to%20achieve%20superior%20human%20preference%20alignment%20in%20Image%20Quality%20Assessment%20%28IQA%29.%20However%2C%20existing%20RL-based%20IQA%20models%20typically%20rely%20on%20coarse-grained%20global%20views%2C%20failing%20to%20capture%20subtle%20local%20degradations%20in%20high-resolution%20scenarios.%20While%20emerging%20%22Thinking%20with%20Images%22%20paradigms%20enable%20multi-scale%20visual%20perception%20via%20zoom-in%20mechanisms%2C%20their%20direct%20adaptation%20to%20IQA%20induces%20spurious%20%22cropping-implies-degradation%22%20biases%20and%20misinterprets%20natural%20depth-of-field%20as%20artifacts.%20To%20address%20these%20challenges%2C%20we%20propose%20Q-Probe%2C%20the%20first%20agentic%20IQA%20framework%20designed%20to%20scal {"title": "PlaneCycle: Training-Free 2D-to-3D Lifting of Foundation Models Without Adapters", "author": "Yinghong Yu and Guangyuan Li and Jiancheng Yang", "abstract": "Large-scale 2D foundation models exhibit strong transferable representations, yet extending them to 3D volumetric data typically requires retraining, adapters, or architectural redesign. We introduce PlaneCycle, a training-free, adapter-free operator for architecture-agnostic 2D-to-3D lifting of foundation models. PlaneCycle reuses the original pretrained 2D backbone by cyclically distributing spatial aggregation across orthogonal HW, DW, and DH planes throughout network depth, enabling progressive 3D fusion while preserving pretrained inductive biases. The method introduces no additional parameters and is applicable to arbitrary 2D networks. Using pretrained DINOv3 models, we evaluate PlaneCycle on six 3D classification and three 3D segmentation benchmarks. Without any training, the lifted models exhibit intrinsic 3D fusion capability and, under linear probing, outperform slice-wise 2D baselines and strong 3D counterparts, approaching the performance of fully trained models. With full fine-tuning, PlaneCycle matches standard 3D architectures, highlighting its potential as a seamless and practical 2D-to-3D lifting operator. These results demonstrate that 3D capability can be unlocked from pretrained 2D foundation models without structural modification or retraining. Code is available at https://github.com/HINTLab/PlaneCycle.", "link": "http://arxiv.org/abs/2603.04165v3", "date": "2026-04-08", "relevancy": 2.3003, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5823}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5756}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5676}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PlaneCycle%3A%20Training-Free%202D-to-3D%20Lifting%20of%20Foundation%20Models%20Without%20Adapters&body=Title%3A%20PlaneCycle%3A%20Training-Free%202D-to-3D%20Lifting%20of%20Foundation%20Models%20Without%20Adapters%0AAuthor%3A%20Yinghong%20Yu%20and%20Guangyuan%20Li%20and%20Jiancheng%20Yang%0AAbstract%3A%20Large-scale%202D%20foundation%20models%20exhibit%20strong%20transferable%20representations%2C%20yet%20extending%20them%20to%203D%20volumetric%20data%20typically%20requires%20retraining%2C%20adapters%2C%20or%20architectural%20redesign.%20We%20introduce%20PlaneCycle%2C%20a%20training-free%2C%20adapter-free%20operator%20for%20architecture-agnostic%202D-to-3D%20lifting%20of%20foundation%20models.%20PlaneCycle%20reuses%20the%20original%20pretrained%202D%20backbone%20by%20cyclically%20distributing%20spatial%20aggregation%20across%20orthogonal%20HW%2C%20DW%2C%20and%20DH%20planes%20throughout%20network%20depth%2C%20enabling%20progressive%203D%20fusion%20while%20preserving%20pretrained%20inductive%20biases.%20The%20method%20introduces%20no%20additional%20parameters%20and%20is%20applicable%20to%20arbitrary%202D%20networks.%20Using%20pretrained%20DINOv3%20models%2C%20we%20evaluate%20PlaneCycle%20on%20six%203D%20classification%20and%20three%203D%20segmentation%20benchmarks.%20Without%20any%20training%2C%20the%20lifted%20models%20exhibit%20intrinsic%203D%20fusion%20capability%20and%2C%20under%20linear%20probing%2C%20outperform%20slice-wise%202D%20baselines%20and%20strong%203D%20counterparts%2C%20approaching%20the%20performance%20of%20fully%20trained%20models.%20With%20full%20fine-tuning%2C%20PlaneCycle%20matches%20standard%203D%20architectures%2C%20highlighting%20its%20potential%20as%20a%20seamless%20and%20practical%202D-to-3D%20lifting%20operator.%20These%20results%20demonstrate%20that%203D%20capability%20can%20be%20unlocked%20from%20pretrained%202D%20foundation%20models%20without%20structural%20modification%20or%20retraining.%20Code%20is%20available%20at%20https%3A//github.com/HINTLab/PlaneCycle.%0ALink%3A%20http%3A//arxiv.org/abs/2603.04165v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPlaneCycle%253A%2520Training-Free%25202D-to-3D%2520Lifting%2520of%2520Foundation%2520Models%2520Without%2520Adapters%26entry.906535625%3DYinghong%2520Yu%2520and%2520Guangyuan%2520Li%2520and%2520Jiancheng%2520Yang%26entry.1292438233%3DLarge-scale%25202D%2520foundation%2520models%2520exhibit%2520strong%2520transferable%2520representations%252C%2520yet%2520extending%2520them%2520to%25203D%2520volumetric%2520data%2520typically%2520requires%2520retraining%252C%2520adapters%252C%2520or%2520architectural%2520redesign.%2520We%2520introduce%2520PlaneCycle%252C%2520a%2520training-free%252C%2520adapter-free%2520operator%2520for%2520architecture-agnostic%25202D-to-3D%2520lifting%2520of%2520foundation%2520models.%2520PlaneCycle%2520reuses%2520the%2520original%2520pretrained%25202D%2520backbone%2520by%2520cyclically%2520distributing%2520spatial%2520aggregation%2520across%2520orthogonal%2520HW%252C%2520DW%252C%2520and%2520DH%2520planes%2520throughout%2520network%2520depth%252C%2520enabling%2520progressive%25203D%2520fusion%2520while%2520preserving%2520pretrained%2520inductive%2520biases.%2520The%2520method%2520introduces%2520no%2520additional%2520parameters%2520and%2520is%2520applicable%2520to%2520arbitrary%25202D%2520networks.%2520Using%2520pretrained%2520DINOv3%2520models%252C%2520we%2520evaluate%2520PlaneCycle%2520on%2520six%25203D%2520classification%2520and%2520three%25203D%2520segmentation%2520benchmarks.%2520Without%2520any%2520training%252C%2520the%2520lifted%2520models%2520exhibit%2520intrinsic%25203D%2520fusion%2520capability%2520and%252C%2520under%2520linear%2520probing%252C%2520outperform%2520slice-wise%25202D%2520baselines%25 {"title": "BadImplant: Injection-based Multi-Targeted Graph Backdoor Attack", "author": "Md Nabi Newaz Khan and Abdullah Arafat Miah and Yu Bi", "abstract": "Graph neural network (GNN) have demonstrated exceptional performance in solving critical problems across diverse domains yet remain susceptible to backdoor attacks. Existing studies on backdoor attack for graph classification are limited to single target attack using subgraph replacement based mechanism where the attacker implants only one trigger into the GNN model. In this paper, we introduce the first multi-targeted backdoor attack for graph classification task, where multiple triggers simultaneously redirect predictions to different target labels. Instead of subgraph replacement, we propose subgraph injection which preserves the structure of the original graphs while poisoning the clean graphs. Extensive experiments demonstrate the efficacy of our approach, where our attack achieves high attack success rates for all target labels with minimal impact on the clean accuracy. Experimental results on five dataset demonstrate the superior performance of our attack framework compared to the conventional subgraph replacement-based attack. Our analysis on four GNN models confirms the generalization capability of our attack which is effective regardless of the GNN model architectures and training parameters settings. We further investigate the impact of the attack design parameters including injection methods, number of connections, trigger sizes, trigger edge density and poisoning ratios. Additionally, our evaluation against state-of-the-art defenses (randomized smoothing and fine-pruning) demonstrates the robustness of our proposed multi-target attacks. This work highlights the GNN vulnerability against multi-targeted backdoor attack in graph classification task. Our source codes will be available at https://github.com/SiSL-URI/Multi-Targeted-Graph-Backdoor-Attack.", "link": "http://arxiv.org/abs/2601.15474v2", "da {"title": "Towards Multi-Object Nonprehensile Transportation via Shared Teleoperation: A Framework Based on Virtual Object Model Predictive Control", "author": "Xinyang Fan and Zhaoyang Chen and Shu Xin and Yi Ren and Zainan Jiang and Fenglei Ni and Hong Liu", "abstract": "Multi-object nonprehensile transportation in teleoperation demands simultaneous trajectory tracking and tray orientation control. Existing methods often struggle with model dependency, uncertain parameters, and multi-object adaptability. We propose a shared teleoperation framework where humans and robots share positioning control, while the robot autonomously manages orientation to satisfy dynamic constraints. Key contributions include: 1) A theoretical dynamic constraint analysis utilizing a novel virtual object (VO)-based method to simplify constraints for trajectory planning. 2) An MPC-based trajectory smoothing algorithm that enforces real-time constraints and coordinates user tracking with orientation control. 3) Validations demonstrating stable manipulation of nine objects at accelerations up to 2.4 m/s2. Compared to the baseline, our approach reduces sliding distance by 72.45% and eliminates tip-overs (0% vs. 13.9%), proving robust adaptability in complex scenarios.", "link": "http://arxiv.org/abs/2604.06932v1", "date": "2026-04-08", "relevancy": 2.2928, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.593}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5917}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.546}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20Multi-Object%20Nonprehensile%20Transportation%20via%20Shared%20Teleoperation%3A%20A%20Framework%20Based%20on%20Virtual%20Object%20Model%20Predictive%20Control&body=Title%3A%20Towards%20Multi-Object%20Nonprehensile%20Transportation%20via%20Shared%20Teleoperation%3A%20A%20Framework%20Based%20on%20Virtual%20Object%20Model%20Predictive%20Control%0AAuthor%3A%20Xinyang%20Fan%20and%20Zhaoyang%20Chen%20and%20Shu%20Xin%20and%20Yi%20Ren%20and%20Zainan%20Jiang%20and%20Fenglei%20Ni%20and%20Hong%20Liu%0AAbstract%3A%20Multi-object%20nonprehensile%20transportation%20in%20teleoperation%20demands%20simultaneous%20trajectory%20tracking%20and%20tray%20orientation%20control.%20Existing%20methods%20often%20struggle%20with%20model%20dependency%2C%20uncertain%20parameters%2C%20and%20multi-object%20adaptability.%20We%20propose%20a%20shared%20teleoperation%20framework%20where%20humans%20and%20robots%20share%20positioning%20control%2C%20while%20the%20robot%20autonomously%20manages%20orientation%20to%20satisfy%20dynamic%20constraints.%20Key%20contributions%20include%3A%201%29%20A%20theoretical%20dynamic%20constraint%20analysis%20utilizing%20a%20novel%20virtual%20object%20%28VO%29-based%20method%20to%20simplify%20constraints%20for%20trajectory%20planning.%202%29%20An%20MPC-based%20trajectory%20smoothing%20algorithm%20that%20enforces%20real-time%20constraints%20and%20coordinates%20user%20tracking%20with%20orientation%20control.%203%29%20Validations%20demonstrating%20stable%20manipulation%20of%20nine%20objects%20at%20accelerations%20up%20to%202.4%20m/s2.%20Compared%20to%20the%20baseline%2C%20our%20approach%20reduces%20sliding%20distance%20by%2072.45%25%20and%20eliminates%20tip-overs%20%280%25%20vs.%2013.9%25%29%2C%20proving%20robust%20adaptability%20in%20complex%20scenarios.%0ALink%3A%20http%3A//arxiv.org/abs/2604.06932v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520Multi-Object%2520Nonprehensile%2520Transportation%2520via%2520Shared%2520Teleo {"title": "LoRA-DA: Data-Aware Initialization for Low-Rank Adaptation via Asymptotic Analysis", "author": "Qingyue Zhang and Chang Chu and Tianren Peng and Qi Li and Xiangyang Luo and Zhihao Jiang and Shao-Lun Huang", "abstract": "LoRA has become a widely adopted method for PEFT, and its initialization methods have attracted increasing attention. However, existing methods have notable limitations: many methods do not incorporate target-domain data, while gradient-based methods exploit data only at a shallow level by relying on one-step gradient decomposition. In this paper, we establish a theoretical framework for data-aware LoRA initialization. Starting from minimizing the expectation of the parameter discrepancy between the fine-tuned and target models, we derive an optimization problem with two components: a bias term, which is related to the parameter distance between the fine-tuned and target models, and is approximated using a Fisher-gradient formulation to preserve anisotropy; and a variance term, which accounts for the uncertainty introduced by sampling stochasticity through the Fisher information. Solving this problem yields an optimal initialization strategy for LoRA, based on which we develop an efficient algorithm, LoRA-DA. Empirical results across multiple benchmarks demonstrate that LoRA-DA consistently improves final accuracy over existing initialization methods. Additional studies show faster, more stable convergence, robustness across ranks, and only a small initialization overhead for LoRA-DA. The source code will be released upon publication.", "link": "http://arxiv.org/abs/2510.24561v2", "date": "2026-04-08", "relevancy": 2.2764, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4611}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "s {"title": "Analyzing Multimodal Interaction Strategies for LLM-Assisted Manipulation of 3D Scenes", "author": "Junlong Chen and Jens Grubert and Per Ola Kristensson", "abstract": "As more applications of large language models (LLMs) for 3D content for immersive environments emerge, it is crucial to study user behaviour to identify interaction patterns and potential barriers to guide the future design of immersive content creation and editing systems which involve LLMs. In an empirical user study with 12 participants, we combine quantitative usage data with post-experience questionnaire feedback to reveal common interaction patterns and key barriers in LLM-assisted 3D scene editing systems. We identify opportunities for improving natural language interfaces in 3D design tools and propose design recommendations for future LLM-integrated 3D content creation systems. Through an empirical study, we demonstrate that LLM-assisted interactive systems can be used productively in immersive environments.", "link": "http://arxiv.org/abs/2410.22177v2", "date": "2026-04-08", "relevancy": 2.2456, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5691}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5629}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5568}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Analyzing%20Multimodal%20Interaction%20Strategies%20for%20LLM-Assisted%20Manipulation%20of%203D%20Scenes&body=Title%3A%20Analyzing%20Multimodal%20Interaction%20Strategies%20for%20LLM-Assisted%20Manipulation%20of%203D%20Scenes%0AAuthor%3A%20Junlong%20Chen%20and%20Jens%20Grubert%20and%20Per%20Ola%20Kristensson%0AAbstract%3A%20As%20more%2 {"title": "ModuSeg: Decoupling Object Discovery and Semantic Retrieval for Training-Free Weakly Supervised Segmentation", "author": "Qingze He and Fagui Liu and Dengke Zhang and Qingmao Wei and Quan Tang", "abstract": "Weakly supervised semantic segmentation aims to achieve pixel-level predictions using image-level labels. Existing methods typically entangle semantic recognition and object localization, which often leads models to focus exclusively on sparse discriminative regions. Although foundation models show immense potential, many approaches still follow the tightly coupled optimization paradigm, struggling to effectively alleviate pseudo-label noise and often relying on time-consuming multi-stage retraining or unstable end-to-end joint optimization. To address the above challenges, we present ModuSeg, a training-free weakly supervised semantic segmentation framework centered on explicitly decoupling object discovery and semantic assignment. Specifically, we integrate a general mask proposer to extract geometric proposals with reliable boundaries, while leveraging semantic foundation models to construct an offline feature bank, transforming segmentation into a non-parametric feature retrieval process. Furthermore, we propose semantic boundary purification and soft-masked feature aggregation strategies to effectively mitigate boundary ambiguity and quantization errors, thereby extracting high-quality category prototypes. Extensive experiments demonstrate that the proposed decoupled architecture better preserves fine boundaries without parameter fine-tuning and achieves highly competitive performance on standard benchmark datasets. Code is available at https://github.com/Autumnair007/ModuSeg.", "link": "http://arxiv.org/abs/2604.07021v1", "date": "2026-04-08", "relevancy": 2.2367, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5634}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5565}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5554}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ModuSeg%3A%20Decoupling%20Object%20Discovery%20and%20Semantic%20Retrieval%20for%20Training-Free%20Weakly%20Supervised%20Segmentation&body=Title%3A%20ModuSeg%3A%20Decoupling%20Object%20Discovery%20and%20Semantic%20Retrieval%20for%20Training-Free%20Weakly%20Supervised%20Segmentation%0AAuthor%3A%20Qingze%20He%20and%20Fagui%20Liu%20and%20Dengke%20Zhang%20and%20Qingmao%20Wei%20and%20Quan%20Tang%0AAbstract%3A%20Weakly%20supervised%20semantic%20segmentation%20aims%20to%20achieve%20pixel-level%20predictions%20using%20image-level%20labels.%20Existing%20methods%20typically%20entangle%20semantic%20recognition%20and%20object%20localization%2C%20which%20often%20leads%20models%20to%20focus%20exclusively%20on%20sparse%20discriminative%20regions.%20Although%20foundation%20models%20show%20immense%20potential%2C%20many%20approaches%20still%20follow%20the%20tightly%20coupled%20optimization%20paradigm%2C%20struggling%20to%20effectively%20alleviate%20pseudo-label%20noise%20and%20often%20relying%20on%20time-consuming%20multi-stage%20retraining%20or%20unstable%20end-to-end%20joint%20optimization.%20To%20address%20the%20above%20challenges%2C%20we%20present%20ModuSeg%2C%20a%20training-free%20weakly%20supervised%20semantic%20segmentation%20framework%20centered%20on%20explicitly%20decoupling%20object%20discovery%20and%20semantic%20assignment.%20Specifically%2C%20we%20integrate%20a%20general%20mask%20proposer%20to%20extract%20geometric%20proposals%20with%20reliable%20boundaries%2C%20while%20leveraging%20semantic%20foundation%20models%20to%20construct%20an%20 {"title": "SSPINNpose: A Self-Supervised PINN for Inertial Pose and Dynamics Estimation", "author": "Markus Gambietz and Eva Dorschky and Altan Akat and Marcel Sch\u00f6ckel and J\u00f6rg Miehling and Anne D. Koelewijn", "abstract": "Accurate real-time estimation of human movement dynamics, including internal joint moments and muscle forces, is essential for applications in clinical diagnostics and sports performance monitoring. Inertial measurement units (IMUs) provide a minimally intrusive solution for capturing motion data, particularly when used in sparse sensor configurations. However, current real-time methods rely on supervised learning, where a ground truth dataset needs to be measured with laboratory measurement systems, such as optical motion capture. These systems are known to introduce measurement and processing errors and often fail to generalize to real-world or previously unseen movements, necessitating new data collection efforts that are time-consuming and impractical. To overcome these limitations, we propose SSPINNpose, a self-supervised, physics-informed neural network that estimates joint kinematics and kinetics directly from IMU data, without requiring ground truth labels for training. We run the network output through a physics model of the human body to optimize physical plausibility and generate virtual measurement data. Using this virtual sensor data, the network is trained directly on the measured sensor data instead of a ground truth. When compared to optical motion capture, SSPINNpose is able to accurately estimate joint angles and joint moments at an RMSD of 8.7 deg and 4.9 BWBH%, respectively, for walking and running at speeds up to 4.9 m/s at a latency of 3.5 ms. Furthermore, the framework demonstrates robustness across sparse sensor configurations and can infer the anatomical locations of the sensors. These results underscore the potential of SSPINNpose as a scalable and adaptable solution for real-time biomechanical analysis in both laboratory and field environments.", "link": "http://arxiv.org/abs/2506.11786v2", "date": "2026-04-08", "relevancy": 2.2346, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5801}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5782}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.5294}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SSPINNpose%3A%20A%20Self-Supervised%20PINN%20for%20Inertial%20Pose%20and%20Dynamics%20Estimation&body=Title%3A%20SSPINNpose%3A%20A%20Self-Supervised%20PINN%20for%20Inertial%20Pose%20and%20Dynamics%20Estimation%0AAuthor%3A%20Markus%20Gambietz%20and%20Eva%20Dorschky%20and%20Altan%20Akat%20and%20Marcel%20Sch%C3%B6ckel%20and%20J%C3%B6rg%20Miehling%20and%20Anne%20D.%20Koelewijn%0AAbstract%3A%20Accurate%20real-time%20estimation%20of%20human%20movement%20dynamics%2C%20including%20internal%20joint%20moments%20and%20muscle%20forces%2C%20is%20essential%20for%20applications%20in%20clinical%20diagnostics%20and%20sports%20performance%20monitoring.%20Inertial%20measurement%20units%20%28IMUs%29%20provide%20a%20minimally%20intrusive%20solution%20for%20capturing%20motion%20data%2C%20particularly%20when%20used%20in%20sparse%20sensor%20configurations.%20However%2C%20current%20real-time%20methods%20rely%20on%20supervised%20learning%2C%20where%20a%20ground%20truth%20dataset%20needs%20to%20be%20measured%20with%20laboratory%20measurement%20systems%2C%20such%20as%20optical%20motion%20capture.%20These%20systems%20are%20known%20to%20introduce%20measurement%20and%20processing%20errors%20and%20often%20fail%20to%20generalize%20to%20real-world%20or%20previously%20unseen%20movements%2C%20necessitating%20new%20data%20collection%20efforts%20that%20are%20time-consuming%20and%20impractical.%20To%20overcome%20these%20limitations%2C%20we%20propose%20SSPINNpose%2C%20a%20self-supervised%2C%20physics-informed%20neural%20network%20that%20estimates%20joint%20kinematics%20and%20kinetics%20directly%20from%20IMU%20data%2C%20without%20requiring%20ground%20truth%20labels%20for%20training.%20We%20run%20the%20network%20output%20through%20a%20physics%20model%20of%20the%20human%20body%20to%20optimize%20physical%20plausibility%20and%20generate%20virtual%20measurement%20data.%20Using%20this%20virtual%20sensor%20data%2C%20the%20network%20is%20trained%20directly%20on%20the%20measured%20sensor%20data%20instead%20of%20a%20ground%20truth.%20When%20compared%20to%20optical%20motion%20capture%2C%20SSPINNpose%20is%20able%20to%20accurately%20estimate%20joint%20angles%20and%20joint%20moments%20at%20an%20RMSD%20of%208.7%20deg%20and%204.9%20BWBH%25%2C%20respectively%2C%20for%20walking%20and%20running%20at%20speeds%20up%20to%204.9%20m/s%20at%20a%20latency%20of%203.5%20ms.%20Furthermore%2C%20the%20framework%20demonstrates%20robustness%20across%20sparse%20sensor%20configurations%20and%20can%20infer%20the%20anatomical%20locations%20of%20the%20sensors.%20These%20results%20underscore%20the%20potential%20of%20SSPINNpose%20as%20a%20scalable%20and%20adaptable%20solution%20for%20real-time%20biomechanical%20analysis%20in%20both%20laboratory%20and%20field%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2506.11786v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSSPINNpose%253A%2520A%2520Self-Supervised%2520PINN%2520for%2520Inertial%2520Pose%2520and%2520Dynamics%2520Estimation%26entry.906535625%3DMarkus%2520Gambietz%2520and%2520Eva%2520Dorschky%2520and%2520Altan%2520Akat%2520and%2520Marcel%2520Sch%25C3%25B6ckel%2520and%2520J%25C3%25B6rg%2520Miehling%2520and%2520Anne%2520D.%2520Koelewijn%26entry.1292438233%3DAccurate%2520real-time%2520estimation%2520of%2520human%2520m {"title": "MedGRPO: Multi-Task Reinforcement Learning for Heterogeneous Medical Video Understanding", "author": "Yuhao Su and Anwesa Choudhuri and Zhongpai Gao and Benjamin Planche and Van Nguyen Nguyen and Meng Zheng and Yuhan Shen and Arun Innanje and Terrence Chen and Ehsan Elhamifar and Ziyan Wu", "abstract": "Large vision-language models struggle with medical video understanding, where spatial precision, temporal reasoning, and clinical semantics are critical. To address this, we first introduce \\textbf{MedVidBench}, a large-scale benchmark of 531,850 video-instruction pairs across 8 medical sources spanning video, segment, and frame-level tasks, curated through a rigorous quality assurance pipeline with expert-guided prompting and dual-model validation. While supervised fine-tuning on MedVidBench yields noticeable gains, standard Reinforcement Learning (RL) fails due to imbalanced reward scales across datasets, which destabilizes optimization and leads to training collapse. To overcome this, we introduce \\textbf{MedGRPO}, a novel RL framework for balanced multi-dataset training with two key innovations: (1) \\emph{cross-dataset reward normalization} that maps each dataset's median performance to a common reward value, ensuring fair optimization regardless of difficulty, and (2) a \\emph{medical LLM judge} that evaluates caption quality on five clinical dimensions through comparative similarity scoring. Supervised fine-tuning Qwen2.5-VL-7B on MedVidBench outperforms GPT-4.1 and Gemini-2.5-Flash across all tasks, while MedGRPO further improves the SFT baseline on grounding and captioning. Our work establishes a foundational benchmark and training methodology for advancing medical video understanding with VLMs. Our project website is available at: https://uii-america.github.io/MedGRPO/.", "link": "http://arxiv.org/abs/2512.06581v4", "date": "2026-04-08", "relevancy": 2.2277, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5694}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5544}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5544}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MedGRPO%3A%20Multi-Task%20Reinforcement%20Learning%20for%20Heterogeneous%20Medical%20Video%20Understanding&body=Title%3A%20MedGRPO%3A%20Multi-Task%20Reinforcement%20Learning%20for%20Heterogeneous%20Medical%20Video%20Understanding%0AAuthor%3A%20Yuhao%20Su%20and%20Anwesa%20Choudhuri%20and%20Zhongpai%20Gao%20and%20Benjamin%20Planche%20and%20Van%20Nguyen%20Nguyen%20and%20Meng%20Zheng%20and%20Yuhan%20Shen%20and%20Arun%20Innanje%20and%20Terrence%20Chen%20and%20Ehsan%20Elhamifar%20and%20Ziyan%20Wu%0AAbstract%3A%20Large%20vision-language%20models%20struggle%20with%20medical%20video%20understanding%2C%20where%20spatial%20precision%2C%20temporal%20reasoning%2C%20and%20clinical%20semantics%20are%20critical.%20To%20address%20this%2C%20we%20first%20introduce%20%5Ctextbf%7BMedVidBench%7D%2C%20a%20large-scale%20benchmark%20of%20531%2C850%20video-instruction%20pairs%20across%208%20medical%20sources%20spanning%20video%2C%20segment%2C%20and%20frame-level%20tasks%2C%20curated%20through%20a%20rigorous%20quality%20assurance%20pipeline%20with%20expert-guided%20prompting%20and%20dual-model%20validation.%20While%20supervised%20fine-tuning%20on%20MedVidBench%20yields%20noticeable%20gains%2C%20standard%20Reinforcement%20Learning%20%28RL%29%20fails%20due%20to%20imbalanced%20reward%20scales%20across%20datasets%2C%20which%20destabilizes%20optimization%20and%20leads%20to%20training%20collapse.%20To%20overcome%20this%2C%20we%20introduce%20%5Ctextbf%7BMedGRPO%7D%2C%20a%20novel%20RL%20framework%20for%20balanced%20multi-dataset%20training%20with%20two%20key%20innovations%3A%20%281%29%20%5Cemph%7Bcross-dataset%20reward%20normalization%7D%20that%20maps%20each%20dataset%27s%20median%20performance%20to%20a%20common%20reward%20value%2C%20ensuring%20fair%20optimization%20regardless%20of%20difficulty%2C%20and%20%282%29%20a%20%5Cemph%7Bmedical%20LLM%20judge%7D%20that%20evaluates%20caption%20quality%20on%20five%20clinical%20dimensions%20through%20comparative%20similarity%20scoring.%20Supervised%20fine-tuning%20Qwen2.5-VL-7B%20on%20MedVidBench%20outperforms%20GPT-4.1%20and%20Gemini-2.5-Flash%20across%20all%20tasks%2C%20while%20MedGRPO%20further%20improves%20the%20SFT%20baseline%20on%20grounding%20and%20captioning.%20Our%20work%20establishes%20a%20foundational%20benchmark%20and%20training%20methodology%20for%20advancing%20medical%20video%20understanding%20with%20VLMs.%20Our%20project%20website%20is%20available%20at%3A%20https%3A//uii-america.github.io/MedGRPO/.%0ALink%3A%20http%3A//arxiv.org/abs/2512.06581v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMedGRPO%253A%2520Multi-Task%2520Reinforcement%2520Learning%2520for%2520Heterogeneous%2520Medical%2520Video%2520Understanding%26entry.906535625%3DYuhao%2520Su%2520and%2520Anwesa%2520Choudhuri%2520and%2520Zhongpai%2520Gao%2520and%2520Benjamin%2520Planche%2520and%2520Van%2520Nguyen%2520Nguyen%2520and%2520Meng%2520Zheng%2520and%2520Yuhan%2520Shen%2520and%2520Arun%2520Innanje%2520and%2520Terrence%2520Chen%2520and%2520Ehsan%2520Elhamifar%2520and%2520Ziyan%2520Wu%26entry.1292438233%3DLarge%2520vision-language%2520models%2520struggle%2520with%2520medical%2520video%2520understanding%252C%2520where%2520spatial%2520precision%252C%2520temporal%2520reasoning%252C%2520and%2520clinical%2520semantics%2520are%2520critical.%2520To%2520address%2520this%252C%2520we%2520first%2520introduce%2520%255Ctextbf%257BMedVidBench%257D%252C%2520a%2520large-scale%2520benchmark%2520of%252053 {"title": "A Lightweight Library for Energy-Based Joint-Embedding Predictive Architectures", "author": "Basile Terver and Randall Balestriero and Megi Dervishi and David Fan and Quentin Garrido and Tushar Nagarajan and Koustuv Sinha and Wancong Zhang and Mike Rabbat and Yann LeCun and Amir Bar", "abstract": "We present EB-JEPA, an open-source library for learning representations and world models using Joint-Embedding Predictive Architectures (JEPAs). JEPAs learn to predict in representation space rather than pixel space, avoiding the pitfalls of generative modeling while capturing semantically meaningful features suitable for downstream tasks. Our library provides modular, self-contained implementations that illustrate how representation learning techniques developed for image-level self-supervised learning can transfer to video, where temporal dynamics add complexity, and ultimately to action-conditioned world models, where the model must additionally learn to predict the effects of control inputs. Each example is designed for single-GPU training within a few hours, making energy-based self-supervised learning accessible for research and education. We provide ablations of JEA components on CIFAR-10. Probing these representations yields 91% accuracy, indicating that the model learns useful features. Extending to video, we include a multi-step prediction example on Moving MNIST that demonstrates how the same principles scale to temporal modeling. Finally, we show how these representations can drive action-conditioned world models, achieving a 97% planning success rate on the Two Rooms navigation task. Comprehensive ablations reveal the critical importance of each regularization component for preventing representation collapse. Code is available at https://github.com/facebookresearch/eb_jepa.", "link": "http://arxiv.org/abs/2602.03604v3", "date": "2026-04-08", "relevancy": 2.2163, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representa ible%20for%20research%20and%20education.%20We%20provide%20ablations%20of%20JEA%20components%20on%20CIFAR-10.%20Probing%20these%20representations%20yields%2091%25%20accuracy%2C%20indicating%20that%20the%20model%20learns%20useful%20features.%20Extending%20to%20video%2C%20we%20include%20a%20multi-step%20prediction%20example%20on%20Moving%20MNIST%20that%20demonstrates%20how%20the%20same%20principles%20scale%20to%20temporal%20modeling.%20Finally%2C%20we%20show%20how%20these%20representations%20can%20drive%20action-conditioned%20world%20models%2C%20achieving%20a%2097%25%20planning%20success%20rate%20on%20the%20Two%20Rooms%20navigation%20task.%20Comprehensive%20ablations%20reveal%20the%20critical%20importance%20of%20each%20regularization%20component%20for%20preventing%20representation%20collapse.%20Code%20is%20available%20at%20https%3A//github.com/facebookresearch/eb_jepa.%0ALink%3A%20http%3A//arxiv.org/abs/2602.03604v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Lightweight%2520Library%2520for%2520Energy-Based%2520Joint-Embedding%2520Predictive%2520Architectures%26entry.906535625%3DBasile%2520Terver%2520and%2520Randall%2520Balestriero%2520and%2520Megi%2520Dervishi%2520and%2520David%2520Fan%2520and%2520Quentin%2520Garrido%2520and%2520Tushar%2520Nagarajan%2520and%2520Koustuv%2520Sinha%2520and%2520Wancong%2520Zhang%2520and%2520Mike%2520Rabbat%2520and%2520Yann%2520LeCun%2520and%2520Amir%2520Bar%26entry.1292438233%3DWe%2520present%2520EB-JEPA%252C%2520an%2520open-source%2520library%2520for%2520learning%2520representations%2520and%2520world%2520models%2520using%2520Joint-Embedding%2520Predictive%2520Architectures%2520%2528JEPAs%2529.%2520JEPAs%2520learn%2520to%2520predict%2520in%2520representation%2520space%2520rather%2520than%2520pixel%2520space%252C%2520avoiding%2520the%2520pitfalls%2520of%2520generative%2520modeling%2520while%2520capturing%2520semantically%2520meaningful%2520feat {"title": "Entropy After </Think> for reasoning model early exiting", "author": "Xi Wang and James McInerney and Lequn Wang and Nathan Kallus", "abstract": "Reasoning LLMs show improved performance with longer chains of thought. However, recent work has highlighted their tendency to overthink, continuing to revise answers even after reaching the correct solution. We quantitatively confirm this inefficiency from the distribution dynamics perspective by tracking Pass@1 for answers averaged over a large number of rollouts and find the model often begins to always produce the correct answer early in the reasoning, making extra reasoning tokens wasteful. To detect and prevent overthinking, we propose a simple and inexpensive novel signal, Entropy After </Think> (EAT), for monitoring and deciding whether to exit reasoning early. By appending a stop thinking token (</think>) and monitoring the entropy of the following token as the model reasons, we obtain a trajectory that decreases and stabilizes when Pass@1 plateaus; thresholding its variance under an exponential moving average yields a practical stopping rule. Importantly, our approach enables adaptively allocating compute based on the EAT trajectory, allowing us to spend compute in a more efficient way compared with fixing the token budget for all questions. Empirically, on MATH500 and AIME2025, EAT reduces token usage by 12 - 22% without harming accuracy. EAT also remains effective in black box settings where logits from the reasoning model are not accessible, and EAT is computed with proxy models: We verified the feasibility via early stopping Llama 70B with a 1.5B model and Claude 3.7 with a local 4B model.", "link": "http://arxiv.org/abs/2509.26522v3", "date": "2026-04-08", "relevancy": 2.2107, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4804}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4322}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4138}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Entropy%20After%20%3C/Think%3E%20for%20reasoning%20model%20early%20exiting&body=Title%3A%20Entropy%20After%20%3C/Think%3E%20for%20reasoning%20model%20early%20exiting%0AAuthor%3A%20Xi%20Wang%20and%20James%20McInerney%20and%20Lequn%20Wang%20and%20Nathan%20Kallus%0AAbstract%3A%20Reasoning%20LLMs%20show%20improved%20performance%20with%20longer%20chains%20of%20thought.%20However%2C%20recent%20work%20has%20highlighted%20their%20tendency%20to%20overthink%2C%20continuing%20to%20revise%20answers%20even%20after%20reaching%20the%20correct%20solution.%20We%20quantitatively%20confirm%20this%20inefficiency%20from%20the%20distribution%20dynamics%20perspective%20by%20tracking%20Pass%401%20for%20answers%20averaged%20over%20a%20large%20number%20of%20rollouts%20and%20find%20the%20model%20often%20begins%20to%20always%20produce%20the%20correct%20answer%20early%20in%20the%20reasoning%2C%20making%20extra%20reasoning%20tokens%20wasteful.%20To%20detect%20and%20prevent%20overthinking%2C%20we%20propose%20a%20simple%20and%20inexpensive%20novel%20signal%2C%20Entropy%20After%20%3C/Think%3E%20%28EAT%29%2C%20for%20monitoring%20and%20deciding%20whether%20to%20exit%20reasoning%20early.%20By%20appending%20a%20stop%20thinking%20token%20%28%3C/think%3E%29%20and%20monitoring%20the%20entropy%20of%20the%20following%20token%20as%20the%20model%20reasons%2C%20we%20obtain%20a%20trajectory%20that%20decreases%20and%20stabilizes%20when%20Pass%401%20plateaus%3B%20thresholding%20its%20variance%20under%20an%20exponential%20moving%20average%20yields%20a%20practical%20stopping%20rule.%20Importantly%2C%20our%20approach%20enables%20adaptively%20allocating%20compute%20based%20on%20the%20EAT%20trajectory%2C%20allowing%20us%20to%20spend%20compute%20in%20a%20more%20efficient%20way%20compared%20with%20fixing%20the%20token%20budget%20for%20all%20questions.%20Empirically%2C%20on%20MATH500%20and%20AIME2025%2C%20EAT%20reduces%20token%20usage%20by%2012%20-%2022%25%20without%20harming%20accuracy.%20EAT%20also%20remains%20effective%20in%20black%20box%20settings%20where%20logits%20from%20the%20reasoning%20model%20are%20not%20accessible%2C%20and%20EAT%20is%20computed%20with%20proxy%20models%3A%20We%20verified%20the%20feasibility%20via%20early%20stopping%20Llama%2070B%20with%20a%201.5B%20model%20and%20Claude%203.7%20with%20a%20local%204B%20model.%0ALink%3A%20http%3A//arxiv.org/abs/2509.26522v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEntropy%2520After%2520%253C/Think%253E%2520for%2520reasoning%2520model%2520early%2520exiting%26entry.906535625%3DXi%2520Wang%2520and%2520James%2520McInerney%2520and%2520Lequn%2520Wang%2520and%2520Nathan%2520Kallus%26entry.1292438233%3DReasoning%2520LLMs%2520show%2520improved%2520performance%2520with%2520longer%2520chains%2520of%2520thought.%2520However%252C%2520recent%2520work%2520has%2520highlighted%2520their%2520tendency%2520to%2520overthink%252C%2520continuing%2520to%2520revise%2520answers%2520even%2520after%2520reaching%2520the%2520correct%2520solution.%2520We%2520quantitatively%2520confirm%2520this%2520inefficiency%2520from%2520the%2520distribution%2520dynamics%2520perspective%2520by%2520tracking%2520Pass%25401%2520for%2520answers%2520averaged%2520over%2520a%2520large%2520number%2520of%2520rollouts%2520and%2520find%2520the%2520model%2520often%2520begins%2520to%2520always%2520produce%2520the%2520correct%2520answer%2520early%2520in%2520the%2520reasoning%252C%2520making%2520extra%2520reasoning%2520to {"title": "Broken by Default: A Formal Verification Study of Security Vulnerabilities in AI-Generated Code", "author": "Dominik Blain and Maxime Noiseux", "abstract": "AI coding assistants are now used to generate production code in\n  security-sensitive domains, yet the exploitability of their outputs remains\n  unquantified. We address this gap with Broken by Default: a formal\n  verification study of 3,500 code artifacts generated by seven widely-deployed LLMs\n  across 500 security-critical prompts (five CWE categories, 100 prompts each).\n  Each artifact is subjected to the Z3 SMT solver via the COBALT analysis\n  pipeline, producing mathematical satisfiability witnesses rather than\n  pattern-based heuristics. Across all models, 55.8% of artifacts contain at\n  least one COBALT-identified vulnerability; of these, 1,055 are formally proven\n  via Z3 satisfiability witnesses. GPT-4o leads at 62.4% (grade F); Gemini 2.5\n  Flash performs best at 48.4% (grade D). No model achieves a grade better than\n  D. Six of seven representative findings are confirmed with runtime crashes\n  under GCC AddressSanitizer. Three auxiliary experiments show: (1) explicit\n  security instructions reduce the mean rate by only 4 points; (2) six industry\n  tools combined miss 97.8% of Z3-proven findings; and (3) models identify their\n  own vulnerable outputs 78.7% of the time in review mode yet generate them at\n  55.8% by default.", "link": "http://arxiv.org/abs/2604.05292v2", "date": "2026-04-08", "relevancy": 2.191, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4634}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4299}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4213}], "mailto": "mail {"title": "ELC: Evidential Lifelong Classifier for Uncertainty Aware Radar Pulse Classification", "author": "Mohamed Rabie and Chinthana Panagamuwa and Konstantinos G. Kyriakopoulos", "abstract": "Reliable radar pulse classification is essential in Electromagnetic Warfare for situational awareness and decision support. Deep Neural Networks have shown strong performance in radar pulse and RF emitter recognition; however, on their own they struggle to efficiently learn new pulses and lack mechanisms for expressing predictive confidence. This paper integrates Uncertainty Quantification with Lifelong Learning to address both challenges. The proposed approach is an Evidential Lifelong Classifier (ELC), which models epistemic uncertainty using evidence theory. ELC is evaluated against a Bayesian Lifelong Classifier (BLC), which quantifies uncertainty through Shannon entropy. Both integrate Learn-Prune-Share to enable continual learning of new pulses and uncertainty-based selective prediction to reject unreliable predictions. ELC and BLC are evaluated on 2 synthetic radar and 3 RF fingerprinting datasets. Selective prediction based on evidential uncertainty improves recall by up to 46% at -20 dB SNR on synthetic radar pulse datasets, highlighting its effectiveness at identifying unreliable predictions in low-SNR conditions compared to BLC. These findings demonstrate that evidential uncertainty offers a strong correlation between confidence and correctness, improving the trustworthiness of ELC by allowing it to express ignorance.", "link": "http://arxiv.org/abs/2604.06958v1", "date": "2026-04-08", "relevancy": 2.1836, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5708}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5645}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5174}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ELC%3A%20Evidential%20Lifelong%20Classifier%20for%20Uncertainty%20Aware%20Radar%20Pulse%20Classification&body=Title%3A%20ELC%3A%20Evidential%20Lifelong%20Classifier%20for%20Uncertainty%20Aware%20Radar%20Pulse%20Classification%0AAuthor%3A%20Mohamed%20Rabie%20and%20Chinthana%20Panagamuwa%20and%20Konstantinos%20G.%20Kyriakopoulos%0AAbstract%3A%20Reliable%20radar%20pulse%20classification%20is%20essential%20in%20Electromagnetic%20Warfare%20for%20situational%20awareness%20and%20decision%20support.%20Deep%20Neural%20Networks%20have%20shown%20strong%20performance%20in%20radar%20pulse%20and%20RF%20emitter%20recognition%3B%20however%2C%20on%20their%20own%20they%20struggle%20to%20efficiently%20learn%20new%20pulses%20and%20lack%20mechanisms%20for%20expressing%20predictive%20confidence.%20This%20paper%20integrates%20Uncertainty%20Quantification%20with%20Lifelong%20Learning%20to%20address%20both%20challenges.%20The%20proposed%20approach%20is%20an%20Evidential%20Lifelong%20Classifier%20%28ELC%29%2C%20which%20models%20epistemic%20uncertainty%20using%20evidence%20theory.%20ELC%20is%20evaluated%20against%20a%20Bayesian%20Lifelong%20Classifier%20%28BLC%29%2C%20which%20quantifies%20uncertainty%20through%20Shannon%20entropy.%20Both%20integrate%20Learn-Prune-Share%20to%20enable%20continual%20learning%20of%20new%20pulses%20and%20uncertainty-based%20selective%20prediction%20to%20reject%20unreliable%20predictions.%20ELC%20and%20BLC%20are%20evaluated%20on%202%20synthetic%20radar%20and%203%20RF%20fingerprinting%20datasets.%20Selective%20prediction%20based%20on%20evidential%20uncertainty%20improves%20recall%20by%20up%20to%2046%25%20at%20-20%20dB%20SNR%20on%20synthetic%20radar%20pulse%20datasets%2C%20highlighting%20its%20effectiveness%20at%20identifying%20unreliable%20predictions%20in%20low-SNR%20conditions%20compared%20to%20BLC.%20These%20findings%20demonstrate%20that%20evidential%20uncertainty%20offers%20a%20strong%20correlation%20between%20confidence%20and%20correctness%2C%20improving%20the%20trustworthiness%20of%20ELC%20by%20allowing%20it%20to%20express%20ignorance.%0ALink%3A%20http%3A//arxiv.org/abs/2604.06958v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DELC%253A%2520Evidential%2520Lifelong%2520Classifier%2520for%2520Uncertainty%2520Aware%2520Radar%2520Pulse%2520Classification%26entry.906535625%3DMohamed%2520Rabie%2520and%2520Chinthana%2520Panagamuwa%2520and%2520Konstantinos%2520G.%2520Kyriakopoulos%26entry.1292438233%3DReliable%2520radar%2520pulse%2520classification%2520is%2520essential%2520in%2520Electromagnetic%2520Warfare%2520for%2520situational%2520awareness%2520and%2520decision%2520support.%2520Deep%2520Neural%2520Networks%2520have%2520shown%2520strong%2520performance%2520in%2520radar%2520pulse%2520and%2520RF%2520emitter%2520recognition%253B%2520however%252C%2520on%2520their%2520own%2520they%2520struggle%2520to%2520efficiently%2520learn%2520new%2520pulses%2520and%2520lack%2520mechanisms%2520for%2520expressing%2520predictive%2520confidence.%2520This%2520paper%2520integrates%2520Uncertainty%2520Quantification%2520with%2520Lifelong%2520Learning%2520to%2520address%2520both%2520challenges.%2520The%2520proposed%2520approach%2520is%2520an%2520Evidential%2520Lifelong%2520Classifier%2520%2528ELC%2529%252C%2520which%2520models%2520epistemic%2520uncertainty%2520using%2520evidence%2520theory.%2520ELC%2520is%2520evaluated%2520against%2520a%2520Bayesian%2520Lifelong%2520Classifier%2520%2528BLC%2529%252C%2520which%2520quantifies%2520uncertainty%2520through%2520Shannon%2520entropy.%2520Both%2520integrate%2520Learn-Prune-Share%2520to%2520enable%2 {"title": "Learning to Search: A Decision-Based Agent for Knowledge-Based Visual Question Answering", "author": "Zhuohong Chen and Zhenxian Wu and Yunyao Yu and Hangrui Xu and Zirui Liao and Zhifang Liu and Xiangwen Deng and Pen Jiao and Haoqian Wang", "abstract": "Knowledge-based visual question answering (KB-VQA) requires vision-language models to understand images and use external knowledge, especially for rare entities and long-tail facts. Most existing retrieval-augmented generation (RAG) methods adopt a fixed pipeline that sequentially retrieves information, filters it, and then produces an answer. Such a design makes it difficult to adapt to diverse question types. Moreover, it separates retrieval from reasoning, making it hard for the model to decide when to search, how to refine queries, or when to stop. As a result, the retrieved evidence is often poorly aligned with the question. To address these limitations, we reformulate KB-VQA as a search-agent problem and model the solving process as a multi-step decision-making procedure. At each step, the agent selects one of four actions-Answer, Image Retrieval, Text Retrieval, and Caption-based on its current information state. We further design an automated pipeline to collect multi-step trajectories that record the agent's reasoning process, tool usage, and intermediate decisions. These trajectories are then used as supervision for fine-tuning. Experiments on InfoSeek and E-VQA demonstrate that our method achieves state-of-the-art performance, consistently outperforming prior baselines and confirming the effectiveness of our framework.", "link": "http://arxiv.org/abs/2604.07146v1", "date": "2026-04-08", "relevancy": 2.1809, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5487}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org {"title": "Positive-First Most Ambiguous: A Simple Active Learning Criterion for Interactive Retrieval of Rare Categories", "author": "Kawtar Zaher and Olivier Buisson and Alexis Joly", "abstract": "Real-world fine-grained visual retrieval often requires discovering a rare concept from large unlabeled collections with minimal supervision. This is especially critical in biodiversity monitoring, ecological studies, and long-tailed visual domains, where the target may represent only a tiny fraction of the data, creating highly imbalanced binary problems. Interactive retrieval with relevance feedback offers a practical solution: starting from a small query, the system selects candidates for binary user annotation and iteratively refines a lightweight classifier. While Active Learning (AL) is commonly used to guide selection, conventional AL assumes symmetric class priors and large annotation budgets, limiting effectiveness in imbalanced, low-budget, low-latency settings. We introduce Positive-First Most Ambiguous (PF-MA), a simple yet effective AL criterion that explicitly addresses the class imbalance asymmetry: it prioritizes near-boundary samples while favoring likely positives, enabling rapid discovery of subtle visual categories while maintaining informativeness. Unlike standard methods that oversample negatives, PF-MA consistently returns small batches with a high proportion of relevant samples, improving early retrieval and user satisfaction. To capture retrieval diversity, we also propose a class coverage metric that measures how well selected positives span the visual variability of the target class. Experiments on long-tailed datasets, including fine-grained botanical data, demonstrate that PF-MA consistently outperforms strong baselines in both coverage and classifier performance, across varying class sizes and descriptors. Our results highlight that aligning AL with the asymmetric and user-centric objectives of interactive fine-grained retrieval enables simple yet powerful solutions for retrieving rare and visually subtle categories in realistic human-in-the-loop settings.", "link": "http://arxiv.org/abs/2603.24480v2", "date": "2026-04-08", "relevancy": 2.1787, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.551}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5492}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5177}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Positive-First%20Most%20Ambiguous%3A%20A%20Simple%20Active%20Learning%20Criterion%20for%20Interactive%20Retrieval%20of%20Rare%20Categories&body=Title%3A%20Positive-First%20Most%20Ambiguous%3A%20A%20Simple%20Active%20Learning%20Criterion%20for%20Interactive%20Retrieval%20of%20Rare%20Categories%0AAuthor%3A%20Kawtar%20Zaher%20and%20Olivier%20Buisson%20and%20Alexis%20Joly%0AAbstract%3A%20Real-world%20fine-grained%20visual%20retrieval%20often%20requires%20discovering%20a%20rare%20concept%20from%20large%20unlabeled%20collections%20with%20minimal%20supervision.%20This%20is%20especially%20critical%20in%20biodiversity%20monitoring%2C%20ecological%20studies%2C%20and%20long-tailed%20visual%20domains%2C%20where%20the%20target%20may%20represent%20only%20a%20tiny%20fraction%20of%20the%20data%2C%20creating%20highly%20imbalanced%20binary%20problems.%20Interactive%20retrieval%20with%20relevance%20feedback%20offers%20a%20practical%20solution%3A%20starting%20from%20a%20small%20query%2C%20the%20system%20selects%20candidates%20for%20binary%20user%20annotation%20and%20iteratively%20refines%20a%20lightweight%20classifier.%20While%20Active%20Learning%20%28AL%29%20is%20commonly%20used%20to%20guide%20selection%2C%20conventional%20AL%20assumes%20symmetric%20class%20priors%20and%20large%20annotation%20budgets%2C%20limiting%20effectiveness%20in%20imbalanced%2C%20low-budget%2C%20low-latency%20settings.%20We%20introduce%20Positive-First%20Most%20Ambiguous%20%28PF-MA%29%2C%20a%20simple%20yet%20effective%20AL%20criterion%20that%20explicitly%20addresses%20the%20class%20imbalance%20asymmetry%3A%20it%20prioritizes%20near-boundary%20samples%20while%20favoring%20likely%20positives%2C%20enabling%20rapid%20discovery%20of%20subtle%20visual%20categories%20while%20maintaining%20informativeness.%20Unlike%20standard%20methods%20that%20oversample%20negatives%2C%20PF-MA%20consistently%20returns%20small%20batches%20with%20a%20high%20proportion%20of%20relevant%20samples%2C%20improving%20early%20retrieval%20and%20user%20satisfaction.%20To%20capture%20retrieval%20diversity%2C%20we%20also%20propose%20a%20class%20coverage%20metric%20that%20measures%20how%20well%20selected%20positives%20span%20the%20visual%20variability%20of%20the%20target%20class.%20Experiments%20on%20long-tailed%20datasets%2C%20including%20fine-grained%20botanical%20data%2C%20demonstrate%20that%20PF-MA%20consistently%20outperforms%20strong%20baselines%20in%20both%20coverage%20and%20classifier%20performance%2C%20across%20varying%20class%20sizes%20and%20descriptors.%20Our%20results%20highlight%20that%20aligning%20AL%20with%20the%20asymmetric%20and%20user-centric%20objectives%20of%20interactive%20fine-grained%20retrieval%20enables%20simple%20yet%20powerful%20solutions%20for%20retrieving%20rare%20and%20visually%20subtle%20categories%20in%20realistic%20human-in-the-loop%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2603.24480v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPositive-First%2520Most%2520Ambiguous%253A%2520A%2520S {"title": "Diffusion Processes on Implicit Manifolds", "author": "Victor Kawasaki-Borruat and Clara Grotehans and Pierre Vandergheynst and Adam Gosztolai", "abstract": "High-dimensional data are often modeled as lying near a low-dimensional manifold. We study how to construct diffusion processes on this data manifold in the implicit setting. That is, using only point cloud samples and without access to charts, projections, or other geometric primitives. Our main contribution is a data-driven SDE that captures intrinsic diffusion on the underlying manifold while being defined in ambient space. The construction relies on estimating the diffusion's infinitesimal generator and its carr\u00e9-du-champ (CDC) from a proximity graph built from the data. The generator and CDC together encode the local stochastic and geometric structure of the intended diffusion. We show that, as the number of samples grows, the induced process converges in law on the space of probability paths to its smooth manifold counterpart. We call this construction Implicit Manifold-valued Diffusions (IMDs), and furthermore present a numerical simulation procedure using Euler-Maruyama integration. This gives a rigorous basis for practical implementations of diffusion dynamics on data manifolds, and opens new directions for manifold-aware sampling, exploration, and generative modeling.", "link": "http://arxiv.org/abs/2604.07213v1", "date": "2026-04-08", "relevancy": 2.1696, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5754}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5485}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5231}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Diffusion%20Processes%20on%20Implicit%20Ma {"title": "Distilling Photon-Counting CT into Routine Chest CT through Clinically Validated Degradation Modeling", "author": "Junqi Liu and Xinze Zhou and Wenxuan Li and Scott Ye and Arkadiusz Sitek and Xiaofeng Yang and Yucheng Tang and Daguang Xu and Kai Ding and Kang Wang and Yang Yang and Alan L. Yuille and Zongwei Zhou", "abstract": "Photon-counting CT (PCCT) provides superior image quality with higher spatial resolution and lower noise compared to conventional energy-integrating CT (EICT), but its limited clinical availability restricts large-scale research and clinical deployment. To bridge this gap, we propose SUMI, a simulated degradation-to-enhancement method that learns to reverse realistic acquisition artifacts in low-quality EICT by leveraging high-quality PCCT as reference. Our central insight is to explicitly model realistic acquisition degradations, transforming PCCT into clinically plausible lower-quality counterparts and learning to invert this process. The simulated degradations were validated for clinical realism by board-certified radiologists, enabling faithful supervision without requiring paired acquisitions at scale. As outcomes of this technical contribution, we: (1) train a latent diffusion model on 1,046 PCCTs, using an autoencoder first pre-trained on both these PCCTs and 405,379 EICTs from 145 hospitals to extract general CT latent features that we release for reuse in other generative medical imaging tasks; (2) construct a large-scale dataset of over 17,316 publicly available EICTs enhanced to PCCT-like quality, with radiologist-validated voxel-wise annotations of airway trees, arteries, veins, lungs, and lobes; and (3) demonstrate substantial improvements: across external data, SUMI outperforms state-of-the-art image translation methods by 15% in SSIM and 20% in PSNR, improves radiologist-rated clinical utility in reader studies, and enhances downstream top-ranking lesion detection performance, increasing sensitivity by up to 15% and {"title": "Generating Attribution Reports for Manipulated Facial Images: A Dataset and Baseline", "author": "Jingchun Lian and Lingyu Liu and Yaxiong Wang and Yujiao Wu and Lianwei Wu and Li Zhu and Zhedong Zheng", "abstract": "Existing facial forgery detection methods typically focus on binary classification or pixel-level localization, providing little semantic insight into the nature of the manipulation. To address this, we introduce Forgery Attribution Report Generation, a new multimodal task that jointly localizes forged regions (\"Where\") and generates natural language explanations grounded in the editing process (\"Why\"). This dual-focus approach goes beyond traditional forensics, providing a comprehensive understanding of the manipulation. To enable research in this domain, we present Multi-Modal Tamper Tracing (MMTT), a large-scale dataset of 152,217 samples, each with a process-derived ground-truth mask and a human-authored textual description, ensuring high annotation precision and linguistic richness. We further propose ForgeryTalker, a unified end-to-end framework that integrates vision and language via a shared encoder (image encoder + Q-former) and dual decoders for mask and text generation, enabling coherent cross-modal reasoning. Experiments show that ForgeryTalker achieves competitive performance on both report generation and forgery localization subtasks, i.e., 59.3 CIDEr and 73.67 IoU, respectively, establishing a baseline for explainable multimedia forensics. Dataset and code will be released to foster future research.", "link": "http://arxiv.org/abs/2412.19685v2", "date": "2026-04-08", "relevancy": 2.1456, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5408}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5356}, {"title": "Thinking Outside the BBo

{"title": "EVGeoQA: Benchmarking LLMs on Dynamic, Multi-Objective Geo-Spatial Exploration", "author": "Jianfei Wu and Zhichun Wang and Zhensheng Wang and Zhiyu He", "abstract": "While Large Language Models (LLMs) demonstrate remarkable reasoning capabilities, their potential for purpose-driven exploration in dynamic geo-spatial environments remains under-investigated. Existing Geo-Spatial Question Answering (GSQA) benchmarks predominantly focus on static retrieval, failing to capture the complexity of real-world planning that involves dynamic user locations and compound constraints. To bridge this gap, we introduce EVGeoQA, a novel benchmark built upon Electric Vehicle (EV) charging scenarios that features a distinct location-anchored and dual-objective design. Specifically, each query in EVGeoQA is explicitly bound to a user's real-time coordinate and integrates the dual objectives of a charging necessity and a co-located activity preference. To systematically assess models in such complex settings, we further propose GeoRover, a general evaluation framework based on a tool-augmented agent architecture to evaluate the LLMs' capacity for dynamic, multi-objective exploration. Our experiments reveal that while LLMs successfully utilize tools to address sub-tasks, they struggle with long-range spatial exploration. Notably, we observe an emergent capability: LLMs can summarize historical exploration trajectories to enhance exploration efficiency. These findings establish EVGeoQA as a challenging testbed for future geo-spatial intelligence. The dataset and prompts are available at https://github.com/Hapluckyy/EVGeoQA/.", "link": "http://arxiv.org/abs/2604.07070v1", "date": "2026-04-08", "relevancy": 2.0534, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.517}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5126}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5126}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20EVGeoQA%3A%20Benchmarking%20LLMs%20on%20Dynamic%2C%20Multi-Objective%20Geo-Spatial%20Exploration&body=Title%3A%20EVGeoQA%3A%20Benchmarking%20LLMs%20on%20Dynamic%2C%20Multi-Objective%20Geo-Spatial%20Exploration%0AAuthor%3A%20Jianfei%20Wu%20and%20Zhichun%20Wang%20and%20Zhensheng%20Wang%20and%20Zhiyu%20He%0AAbstract%3A%20While%20Large%20Language%20Models%20%28LLMs%29%20demonstrate%20remarkable%20reasoning%20capabilities%2C%20their%20potential%20for%20purpose-driven%20exploration%20in%20dynamic%20geo-spatial%20environments%20remains%20under-investigated.%20Existing%20Geo-Spatial%20Question%20Answering%20%28GSQA%29%20benchmarks%20predominantly%20focus%20on%20static%20retrieval%2C%20failing%20to%20capture%20the%20complexity%20of%20real-world%20planning%20that%20involves%20dynamic%20user%20locations%20and%20compound%20constraints.%20To%20bridge%20this%20gap%2C%20we%20introduce%20EVGeoQA%2C%20a%20novel%20benchmark%20built%20upon%20Electric%20Vehicle%20%28EV%29%20charging%20scenarios%20that%20features%20a%20distinct%20location-anchored%20and%20dual-objective%20design.%20Specifically%2C%20each%20query%20in%20EVGeoQA%20is%20explicitly%20bound%20to%20a%20user%27s%20real-time%20coordinate%20and%20integrates%20the%20dual%20objectives%20of%20a%20charging%20necessity%20and%20a%20co-located%20activity%20preference.%20To%20systematically%20assess%20models%20in%20such%20complex%20settings%2C%20we%20further%20propose%20GeoRover%2C%20a%20general%20evaluation%20framework%20based%20on%20a%20tool-augmented%20agent%20architecture%20to%20evaluate%20the%20LLMs%27%20capacity%20for%20dynamic%2C%20multi-objective%20exploration.%20Our%20experiments%20reveal%20that%20while%20LLMs%20successfully%20utilize%20tools%20to%20address%20sub-tasks%2C%20they%20struggle%20with%20long-range%20spatial%20exploration.%20Notably%2C%20we%20observe%20an%20emergent%20capability%3A%20LLMs%20can%20summarize%20historical%20exploration%20trajectories%20to%20enhance%20exploration%20efficiency.%20These%20findings%20establish%20EVGeoQA%20as%20a%20challenging%20testbed%20for%20future%20geo-spatial%20intelligence.%20The%20dataset%20and%20prompts%20are%20available%20at%20https%3A//github.com/Hapluckyy/EVGeoQA/.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07070v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEVGeoQA%253A%2520Benchmarking%2520LLMs%2520on%2520Dynamic%252C%2520Multi-Objective%2520Geo-Spatial%2520Exploration%26entry.906535625%3DJianfei%2520Wu%2520and%2520Zhichun%2520Wang%2520and%2520Zhensheng%2520Wang%2520and%2520Zhiyu%2520He%26entry.1292438233%3DWhile%2520Large%2520Language%2520Models%2520%2528LLMs%2529%2520demonstrate%2520remarkable%2520reasoning%2520capabilities%252C%2520their%2520potential%2520for%2520purpose-driven%2520exploration%2520in%2520dynamic%2520geo-spatial%2520environments%2520remains%2520under-investigated.%2520Existing%2520Geo-Spatial%2520Question%2520Answering%2520%2528GSQA%2529%2520benchmarks%2520predominantly%2520focus%2520on%2520static%2520retrieval%252C%2520failing%2520to%2520capture%2520the%2520complexity%2520of%2520real-world%2520planning%2520that%2520involves%2520dynamic%2520user%2520locations%2520and%2520compound%2520constraints.%2520To%2520bridge%2520this%2520gap%252C%2520we%2520introduce%2520EVGeoQA%252C%2520a%2520novel%2520benchmark%2520built%2520upon%2520Electric%2520Vehicle%2520%2528EV%2529%2520charging%2520scenarios%2520that%2520features%2520a%2520distinct%2520location-anchored%2520and%2520dual-objective%2520design.%2520Specifically%252C%2520each%2520query%2520in%2520EVGeoQA%2520is%2520explicitly%2520bound%2520to%2520a%2520user%2527s%2520real-time%2520coo {"title": "A Systematic Study of Retrieval Pipeline Design for Retrieval-Augmented Medical Question Answering", "author": "Nusrat Sultana and Abdullah Muhammad Moosa and Kazi Afzalur Rahman and Sajal Chandra Banik", "abstract": "Large language models (LLMs) have demonstrated strong capabilities in medical question answering; however, purely parametric models often suffer from knowledge gaps and limited factual grounding. Retrieval-augmented generation (RAG) addresses this limitation by integrating external knowledge retrieval into the reasoning process. Despite increasing interest in RAG-based medical systems, the impact of individual retrieval components on performance remains insufficiently understood. This study presents a systematic evaluation of retrieval-augmented medical question answering using the MedQA USMLE benchmark and a structured textbook-based knowledge corpus. We analyze the interaction between language models, embedding models, retrieval strategies, query reformulation, and cross-encoder reranking within a unified experimental framework comprising forty configurations. Results show that retrieval augmentation significantly improves zero-shot medical question answering performance. The best-performing configuration was dense retrieval with query reformulation and reranking achieved 60.49% accuracy. Domain-specialized language models were also found to better utilize retrieved medical evidence than general-purpose models. The analysis further reveals a clear tradeoff between retrieval effectiveness and computational cost, with simpler dense retrieval configurations providing strong performance while maintaining higher throughput. All experiments were conducted on a single consumer-grade GPU, demonstrating that systematic evaluation of retrieval-augmented medical QA systems can be performed under modest computational resources.", "link": "http://arxiv.org/abs/2604.07274v1", "date": "2026-04-08", "relevancy": 2.0387, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5255}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5065}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5065}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Systematic%20Study%20of%20Retrieval%20Pipeline%20Design%20for%20Retrieval-Augmented%20Medical%20Question%20Answering&body=Title%3A%20A%20Systematic%20Study%20of%20Retrieval%20Pipeline%20Design%20for%20Retrieval-Augmented%20Medical%20Question%20Answering%0AAuthor%3A%20Nusrat%20Sultana%20and%20Abdullah%20Muhammad%20Moosa%20and%20Kazi%20Afzalur%20Rahman%20and%20Sajal%20Chandra%20Banik%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20have%20demonstrated%20strong%20capabilities%20in%20medical%20question%20answering%3B%20however%2C%20purely%20parametric%20models%20often%20suffer%20from%20knowledge%20gaps%20and%20limited%20factual%20grounding.%20Retrieval-augmented%20generation%20%28RAG%29%20addresses%20this%20limitation%20by%20integrating%20external%20knowledge%20retrieval%20into%20the%20reasoning%20process.%20Despite%20increasing%20interest%20in%20RAG-based%20medical%20systems%2C%20the%20impact%20of%20individual%20retrieval%20components%20on%20performance%20remains%20insufficiently%20understood.%20This%20study%20presents%20a%20systematic%20evaluation%20of%20retrieval-augmented%20medical%20question%20answering%20using%20the%20MedQA%20USMLE%20benchmark%20and%20a%20structured%20textbook-based%20knowledge%20corpus.%20We%20analyze%20the%20interaction%20between%20language%20models%2C%20embedding%20models%2C%20retrieval%20strategies%2C%20query%20reformulation%2C%20and%20cross-encoder%20reranking%20within%20a%20unified%20experimental%20fram {"title": "A solver-in-the-loop framework for end-to-end differentiable coastal hydrodynamics", "author": "Elsa Cardoso-Bihlo and Alex Bihlo", "abstract": "Numerical simulation of wave propagation and run-up is a cornerstone of coastal engineering and tsunami hazard assessment. However, applying these forward models to inverse problems, such as bathymetry estimation, source inversion, and structural optimization, remains notoriously difficult due to the rigidity and high computational cost of deriving discrete adjoints. In this paper, we introduce AegirJAX, a fully differentiable hydrodynamic solver based on the depth-integrated, non-hydrostatic shallow-water equations. By implementing the solver entirely within a reverse-mode automatic differentiation framework, AegirJAX treats the time-marching physics loop as a continuous computational graph. We demonstrate the framework's versatility across a suite of scientific machine learning tasks: (1) discovering regime-specific neural corrections for model misspecifications in highly dispersive wave propagation; (2) performing continuous topology optimization for breakwater design; (3) training recurrent neural networks in-the-loop for active wave cancellation; and (4) inverting hidden bathymetry and submarine landslide kinematics directly from downstream sensor data. The proposed differentiable paradigm fundamentally blurs the line between forward simulation and inverse optimization, offering a unified, end-to-end framework for coastal hydrodynamics.", "link": "http://arxiv.org/abs/2604.07129v1", "date": "2026-04-08", "relevancy": 1.3038, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4479}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4409}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4268}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20solver-in-the-loop%20framework%20for%20end-to-end%20differentiable%20coastal%20hydrodynamics&body=Title%3A%20A%20solver-in-the-loop%20framework%20for%20end-to-end%20differentiable%20coastal%20hydrodynamics%0AAuthor%3A%20Elsa%20Cardoso-Bihlo%20and%20Alex%20Bihlo%0AAbstract%3A%20Numerical%20simulation%20of%20wave%20propagation%20and%20run-up%20is%20a%20cornerstone%20of%20coastal%20engineering%20and%20tsunami%20hazard%20assessment.%20However%2C%20applying%20these%20forward%20models%20to%20inverse%20problems%2C%20such%20as%20bathymetry%20estimation%2C%20source%20inversion%2C%20and%20structural%20optimization%2C%20remains%20notoriously%20difficult%20due%20to%20the%20rigidity%20and%20high%20computational%20cost%20of%20deriving%20discrete%20adjoints.%20In%20this%20paper%2C%20we%20introduce%20AegirJAX%2C%20a%20fully%20differentiable%20hydrodynamic%20solver%20based%20on%20the%20depth-integrated%2C%20non-hydrostatic%20shallow-water%20equations.%20By%20implementing%20the%20solver%20entirely%20within%20a%20reverse-mode%20automatic%20differentiation%20framework%2C%20AegirJAX%20treats%20the%20time-marching%20physics%20loop%20as%20a%20continuous%20computational%20graph.%20We%20demonstrate%20the%20framework%27s%20versatility%20across%20a%20suite%20of%20scientific%20machine%20learning%20tasks%3A%20%281%29%20discovering%20regime-specific%20neural%20corrections%20for%20model%20misspecifications%20in%20highly%20dispersive%20wave%20propagation%3B%20%282%29%20performing%20continuous%20topology%20optimization%20for%20breakwater%20design%3B%20%283%29%20training%20recurrent%20neural%20networks%20in-the-loop%20for%20active%20wave%20cancellation%3B%20and%20%284%29%20inverting%20hidden%20bathymetry%20and%20submarine%20landslide%20kinematics%20directly%20from%20downstream%20sensor%20data.%20The%20proposed%20differentiable%20paradigm%20fund {"title": "Governance and Regulation of Artificial Intelligence in Developing Countries: A Case Study of Nigeria", "author": "Uloma Okoro and Tammy Mackenzie and Branislav Radeljic", "abstract": "This study examines the perception of legal professionals on the governance of AI in developing countries, using Nigeria as a case study. The study focused on ethical risks, regulatory gaps, and institutional readiness. The study adopted a qualitative case study design. Data were collected through 27 semi-structured interviews with legal practitioners in Nigeria. A focus group discussion was also held with seven additional legal practitioners across sectors such as finance, insurance, and corporate law. Thematic analysis was employed to identify key patterns in participant responses. Findings showed that there were concerns about data privacy risks and the lack of enforceable legal frameworks. Participants expressed limited confidence in institutional capacity and emphasized the need for locally adapted governance models rather than direct adoption of foreign frameworks. While some expressed optimism about AI's potential, this was conditional on the presence of strong legal oversight and public accountability. The study contributes to the growing discourse on AI governance in developing countries by focusing on the perspectives of legal professionals. It highlights the importance of regulatory approaches that are context-specific, inclusive, and capable of bridging the gap between global ethical principles and local realities. These insights offer practical guidance for policymakers, regulators, and scholars working to shape responsible AI governance in similar environments.", "link": "http://arxiv.org/abs/2604.06018v2", "date": "2026-04-08", "relevancy": 1.4181, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.3603}, {"title": "uPLAM: Robust 74799=Read"},
{"title": "Novel Anomaly Detection Scenarios and Evaluation Metrics to Address the Ambiguity in the Definition of Normal Samples", "author": "Reiji Saito and Satoshi Kamiya and Kazuhiro Hotta", "abstract": "In conventional anomaly detection, training data consist of only normal samples. However, in real-world scenarios, the definition of a normal sample is often ambiguous. For example, there are cases where a sample has small scratches or stains but is still acceptable for practical usage. On the other hand, higher precision is required when manufacturing equipment is upgraded. In such cases, normal samples may include small scratches, tiny dust particles, or a foreign object that we would prefer to classify as an anomaly. Such cases frequently occur in industrial settings, yet they have not been discussed until now. Thus, we propose novel scenarios and an evaluation metric to accommodate specification changes in real-world applications. Furthermore, to address the ambiguity of normal samples, we propose the RePaste, which enhances learning by re-pasting regions with high anomaly scores from the previous step into the input for the next step. On our scenarios using the MVTec AD benchmark, RePaste achieved the state-of-the-art performance with respect to the proposed evaluation metric, while maintaining high AUROC and PRO scores. Code: https://github.com/ReijiSoftmaxSaito/Scenario", "link": "http://arxiv.org/abs/2604.07097v1", "date": "2026-04-08", "relevancy": 1.5317, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5231}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5016}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv. ining%20high%20AUROC%20and%20PRO%20scores.%20Code%3A%20https%3A//github.com/ReijiSoftmaxSaito/Scenario%0ALink%3A%20http%3A//arxiv.org/abs/2604.07097v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNovel%2520Anomaly%2520Detection%2520Scenarios%2520and%2520Evaluation%2520Metrics%2520to%2520Address%2520the%2520Ambiguity%2520in%2520the%2520Definition%2520of%2520Normal%2520Samples%26entry.906535625%3DReiji%2520Saito%2520and%2520Satoshi%2520Kamiya%2520and%2520Kazuhiro%2520Hotta%26entry.1292438233%3DIn%2520conventional%2520anomaly%2520detection%252C%2520training%2520data%2520consist%2520of%2520only%2520normal%2520samples.%2520However%252C%2520in%2520real-world%2520scenarios%252C%2520the%2520definition%2520of%2520a%2520normal%2520sample%2520is%2520often%2520ambiguous.%2520For%2520example%252C%2520there%2520are%2520cases%2520where%2520a%2520sample%2520has%2520small%2520scratches%2520or%2520stains%2520but%2520is%2520still%2520acceptable%2520for%2520practical%2520usage.%2520On%2520the%2520other%2520hand%252C%2520higher%2520precision%2520is%2520required%2520when%2520manufacturing%2520equipment%2520is%2520upgraded.%2520In%2520such%2520cases%252C%2520normal%2520samples%2520may%2520include%2520small%2520scratches%252C%2520tiny%2520dust%2520particles%252C%2520or%2520a%2520foreign%2520object%2520that%2520we%2520would%2520prefer%2520to%2520classify%2520as%2520an%2520anomaly.%2520Such%2520cases%2520frequently%2520occur%2520in%2520industrial%2520settings%252C%2520yet%2520they%2520have%2520not%2520been%2520discussed%2520until%2520now.%2520Thus%252C%2520we%2520propose%2520novel%2520scenarios%2520and%2520an%2520evaluation%2520metric%2520to%2520accommodate%2520specification%2520changes%2520in%2520real-world%2520applications.%2520Furthermore%252C%2520to%2520address%2520the%2520ambiguity%2520of%2520normal%2520samples%252C%2520we%2520propose%2520the%2520RePaste%252C%2520which%2520enhances%2520learning%252 {"title": "In-Context Decision Making for Optimizing Complex AutoML Pipelines", "author": "Amir Rezaei Balef and Katharina Eggensperger", "abstract": "Combined Algorithm Selection and Hyperparameter Optimization (CASH) has been fundamental to traditional AutoML systems. However, with the advancements of pre-trained models, modern ML workflows go beyond hyperparameter optimization and often require fine-tuning, ensembling, and other adaptation techniques. While the core challenge of identifying the best-performing model for a downstream task remains, the increasing heterogeneity of ML pipelines demands novel AutoML approaches. This work extends the CASH framework to select and adapt modern ML pipelines. We propose PS-PFN to efficiently explore and exploit adapting ML pipelines by extending Posterior Sampling (PS) to the max k-armed bandit problem setup. PS-PFN leverages prior-data fitted networks (PFNs) to efficiently estimate the posterior distribution of the maximal value via in-context learning. We show how to extend this method to consider varying costs of pulling arms and to use different PFNs to model reward distributions individually per arm. Experimental results on one novel and two existing standard benchmark tasks demonstrate the superior performance of PS-PFN compared to other bandit and AutoML strategies. We make our code and data available at https://github.com/amirbalef/CASHPlus.", "link": "http://arxiv.org/abs/2508.13657v2", "date": "2026-04-08", "relevancy": 1.9331, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4843}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4834}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4806}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20In-Context%20Decision%20Making%20for%20Optimizing%20Complex%20AutoML%20Pipelines&body=Title%3A%20In-Context%20Decision%20Making%20for%20Optimizing%20Complex%20AutoML%20Pipelines%0AAuthor%3A%20Amir%20Rezaei%20Balef%20and%20Katharina%20Eggensperger%0AAbstract%3A%20Combined%20Algorithm%20Selection%20and%20Hyperparameter%20Optimization%20%28CASH%29%20has%20been%20fundamental%20to%20traditional%20AutoML%20systems.%20However%2C%20with%20the%20advancements%20of%20pre-trained%20models%2C%20modern%20ML%20workflows%20go%20beyond%20hyperparameter%20optimization%20and%20often%20require%20fine-tuning%2C%20ensembling%2C%20and%20other%20adaptation%20techniques.%20While%20the%20core%20challenge%20of%20identifying%20the%20best-performing%20model%20for%20a%20downstream%20task%20remains%2C%20the%20increasing%20heterogeneity%20of%20ML%20pipelines%20demands%20novel%20AutoML%20approaches.%20This%20work%20extends%20the%20CASH%20framework%20to%20select%20and%20adapt%20modern%20ML%20pipelines.%20We%20propose%20PS-PFN%20to%20efficiently%20explore%20and%20exploit%20adapting%20ML%20pipelines%20by%20extending%20Posterior%20Sampling%20%28PS%29%20to%20the%20max%20k-armed%20bandit%20problem%20setup.%20PS-PFN%20leverages%20prior-data%20fitted%20networks%20%28PFNs%29%20to%20efficiently%20estimate%20the%20posterior%20distribution%20of%20the%20maximal%20value%20via%20in-context%20learning.%20We%20show%20how%20to%20extend%20this%20method%20to%20consider%20varying%20costs%20of%20pulling%20arms%20and%20to%20use%20different%20PFNs%20to%20model%20reward%20distributions%20individually%20per%20arm.%20Experimental%20results%20on%20one%20novel%20and%20two%20existing%20standard%20benchmark%20tasks%20demonstrate%20the%20superior%20performance%20of%20PS-PFN%20compared%20to%20other%20bandit%20and%20AutoML%20strategies.%20We%20make%20our%20code%20and%20data%20available%20at%20https%3A//github.com/amirbalef/CASHPlus.%0ALink%3A%20http%3A//arxi Ns%20to%20model%20reward%20distributions%20individually%20per%20arm.%20Experimental%20results%20on%20one%20novel%20and%20two%20existing%20standard%20benchmark%20tasks%20demonstrate%20the%20superior%20performance%20of%20PS-PFN%20compared%20to%20other%20bandit%20and%20AutoML%20strategies.%20We%20make%20our%20code%20and%20data%20available%20at%20https%3A//github.com/amirbalef/CASHPlus.&entry.1838667208=http%3A//arxiv.org/abs/2508.13657v2&entry.124074799=Read"},
{"title": "BATON: A Multimodal Benchmark for Bidirectional Automation Transition Observation in Naturalistic Driving", "author": "Yuhang Wang and Yiyao Xu and Chaoyun Yang and Lingyao Li and Jingran Sun and Hao Zhou", "abstract": "Existing driving automation (DA) systems on production vehicles rely on human drivers to decide when to engage DA while requiring them to remain continuously attentive and ready to intervene. This design demands substantial situational judgment and imposes significant cognitive load, leading to steep learning curves, suboptimal user experience, and safety risks from both over-reliance and delayed takeover. Predicting when drivers hand over control to DA and when they take it back is therefore critical for designing proactive, context-aware HMI, yet existing datasets rarely capture the multimodal context, including road scene, driver state, vehicle dynamics, and route environment. To fill this gap, we introduce BATON, a large-scale naturalistic dataset capturing real-world DA usage across 127 drivers, and 136.6 hours of driving. The dataset synchronizes front-view video, in-cabin video, decoded CAN bus signals, radar-based lead-vehicle interaction, and GPS-derived route context, forming a closed-loop multimodal record around each control transition. We define three benchmark tasks: driving action understanding, handover prediction, and takeover prediction, and evaluate baselines spanning sequence models, classical classifiers, and zero-shot VLMs. Results show that visual input alone is insufficient for reliable transition prediction: front-view video captures road context but not driver state, while in-cabin video reflects driver readiness but not the external scene. Incorporating CAN and route-context signals substantially improves performance over video-only settings, indicating strong complementarity across modalities. We further find takeover events develop more gradually and benefit from longer prediction horizons, whereas handover events depend more on immediate contextual cues, revealing an asymmetry with direct implications for HMI design in assisted driving systems.", "link": "http://arxiv.org/abs/2604.07263v1", "date": "2026-04-08", "relevancy": 1.6378, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5638}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.554}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5078}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BATON%3A%20A%20Multimodal%20Benchmark%20for%20Bidirectional%20Automation%20Transition%20Observation%20in%20Naturalistic%20Driving&body=Title%3A%20BATON%3A%20A%20Multimodal%20Benchmark%20for%20Bidirectional%20Automation%20Transition%20Observation%20in%20Naturalistic%20Driving%0AAuthor%3A%20Yuhang%20Wang%20and%20Yiyao%20Xu%20and%20Chaoyun%20Yang%20and%20Lingyao%20Li%20and%20Jingran%20Sun%20and%20Hao%20Zhou%0AAbstract%3A%20Existing%20driving%20automation%20%28DA%29%20systems%20on%20production%20vehicles%20rely%20on%20human%20drivers%20to%20decide%20when%20to%20engage%20DA%20while%20requiring%20them%20to%20remain%20continuously%20attentive%20and%20ready%20to%20intervene.%20This%20design%20demands%20substantial%20situational%20judgment%20and%20imposes%20significant%20cognitive%20load%2C%20leading%20to%20steep%20learning%20curves%2C%20suboptimal%20user%20experience%2C%20and%20safety%20risks%20from%20both%20over-reliance%20and%20delayed%20takeover.%20Predicting%20when%20drivers%20hand%20over%20control%20to%20DA%20and%20when%20they%20take%20it%20back%20is%20therefore%20critical%20for%20designing%20proactive%2C%20context-aware%20HMI%2C%20yet%20existing%20datasets%20rarely%20capture%20the%20multimodal%20context%2C%20including%20road%20scene%2C%20driver%20state%2C%20vehicle%20dynamics%2C%20and%20route%20environment.%20To%20fill%20this%20gap%2C%20we%20introduce%20BATON%2C%20a%20large-scale%20naturalistic%20dataset%20capturing%20real-world%20DA%20usage%20across%20127%20drivers%2C%20and%20136.6%20hours%20of%20driving.%20The%20dataset%20synchronizes%20front-view%20video%2C%20in-cabin%20video%2C%20decoded%20CAN%20bus%20signals%2C%20radar-based%20lead-vehicle%20interaction%2C%20and%20GPS-derived%20route%20context%2C%20forming%20a%20closed-loop%20multimodal%20record%20around%20each%20control%20transition.%20We%20define%20three%20benchmark%20tasks%3A%20driving%20action%20understanding%2C%20handover%20prediction%2C%20and%20takeover%20prediction%2C%20and%20evaluate%20baselines%20spanning%20sequence%20models%2C%20classical%20classifiers%2C%20and%20zero-shot%20VLMs.%20Results%20show%20that%20visual%20input%20alone%20is%20insufficient%20for%20reliable%20transition%20prediction%3A%20front-view%20video%20captures%20road%20context%20but%20not%20driver%20state%2C%20while%20in-cabin%20video%20reflects%20driver%20readiness%20but%20not%20the%20external%20scene.%20Incorporating%20CAN%20and%20route-context%20signals%20substantially%20improves%20performance%20over%20video-only%20settings%2C%20indicating%20strong%20complementarity%20across%20modalities.%20We%20further%20find%20takeover%20events%20develop%20more%20gradually%20and%20benefit%20from%20longer%20prediction%20horizons%2C%20whereas%20handover%20events%20depend%20more%20on%20immediate%20contextual%20cues%2C%20revealing%20an%20asymmetry%20with%20direct%20implications%20for%20HMI%20design%20in%20assisted%20driving%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07263v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBATON%253A%2520A%2520Multimodal%2520Benchmark%2520for%2520Bidirecti {"title": "PCSR: Pseudo-label Consistency-Guided Sample Refinement for Noisy Correspondence Learning", "author": "Zhuoyao Liu and Yang Liu and Wentao Feng and Shudong Huang", "abstract": "Cross-modal retrieval aims to align different modalities via semantic similarity. However, existing methods often assume that image-text pairs are perfectly aligned, overlooking Noisy Correspondences in real data. These misaligned pairs misguide similarity learning and degrade retrieval performance. Previous methods often rely on coarse-grained categorizations that simply divide data into clean and noisy samples, overlooking the intrinsic diversity within noisy instances. Moreover, they typically apply uniform training strategies regardless of sample characteristics, resulting in suboptimal sample utilization for model optimization. To address the above challenges, we introduce a novel framework, called Pseudo-label Consistency-Guided Sample Refinement (PCSR), which enhances correspondence reliability by explicitly dividing samples based on pseudo-label consistency. Specifically, we first employ a confidence-based estimation to distinguish clean and noisy pairs, then refine the noisy pairs via pseudo-label consistency to uncover structurally distinct subsets. We further proposed a Pseudo-label Consistency Score (PCS) to quantify prediction stability, enabling the separation of ambiguous and refinable samples within noisy pairs. Accordingly, we adopt Adaptive Pair Optimization (APO), where ambiguous samples are optimized with robust loss functions and refinable ones are enhanced via text replacement during training. Extensive experiments on CC152K, MS-COCO and Flickr30K validate the effectiveness of our method in improving retrieval robustness under noisy supervision.", "link": "http://arxiv.org/abs/2509.15623v2", "date": "2026-04-08", "relevancy": 1.9995, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5041}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4996}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4901}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PCSR%3A%20Pseudo-label%20Consistency-Guided%20Sample%20Refinement%20for%20Noisy%20Correspondence%20Learning&body=Title%3A%20PCSR%3A%20Pseudo-label%20Consistency-Guided%20Sample%20Refinement%20for%20Noisy%20Correspondence%20Learning%0AAuthor%3A%20Zhuoyao%20Liu%20and%20Yang%20Liu%20and%20Wentao%20Feng%20and%20Shudong%20Huang%0AAbstract%3A%20Cross-modal%20retrieval%20aims%20to%20align%20different%20modalities%20via%20semantic%20similarity.%20However%2C%20existing%20methods%20often%20assume%20that%20image-text%20pairs%20are%20perfectly%20aligned%2C%20overlooking%20Noisy%20Correspondences%20in%20real%20data.%20These%20misaligned%20pairs%20misguide%20similarity%20learning%20and%20degrade%20retrieval%20performance.%20Previous%20methods%20often%20rely%20on%20coarse-grained%20categorizations%20that%20simply%20divide%20data%20into%20clean%20and%20noisy%20samples%2C%20overlooking%20the%20intrinsic%20diversity%20within%20noisy%20instances.%20Moreover%2C%20they%20typically%20apply%20uniform%20training%20strategies%20regardless%20of%20sample%20characteristics%2C%20resulting%20in%20suboptimal%20sample%20utilization%20for%20model%20optimization.%20To%20address%20the%20above%20challenges%2C%20we%20introduce%20a%20novel%20framework%2C%20called%20Pseudo-label%20Consistency-Guided%20Sample%20Refinement%20%28PCSR%29%2C%20which%20enhances%20correspondence%20reliability%20by%20explicitly%20dividing%20samples%20based%20on%20pseudo-label%20consistency.%20Specifically%2C%20we%20first%20employ%20a%20confidence-based%20estimation%20to%20distinguish%20clean%20and%20noisy%20pairs%2C%20then%20refine%20the%20noisy%20pairs%20via%20pseudo-label%20consistency%20to%20uncover%20structurally%20distinct%20subsets.%20We%20further%20proposed%20a%20Pseudo-label%20Consistency%20Score%20%28PCS%29%20to%20quantify%20prediction%20stability%2C%20enabling%20the%20separation%20of%20ambiguous%20and%20refinable%20samples%20within%20noisy%20pairs.%20Accordingly%2C%20we%20adopt%20Adaptive%20Pair%20Optimization%20%28APO%29%2C%20where%20ambiguous%20samples%20are%20optimized%20with%20robust%20loss%20functions%20and%20refinable%20ones%20are%20enhanced%20via%20text%20replacement%20during%20training.%20Extensive%20experiments%20on%20CC152K%2C%20MS-COCO%20and%20Flickr30K%20validate%20the%20effectiveness%20of%20our%20method%20in%20improving%20retrieval%20robustness%20under%20noisy%20supervision.%0ALink%3A%20http%3A//arxiv.org/abs/2509.15623v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPCSR%253A%2520Pseudo-label%2520Consistency-Guided%2520Sample%2520Refinement%2520for%2520Noisy%2520Correspondence%2520Learning%26entry.906535625%3DZhuoyao%2520Liu%2520and%2520Yang%2520Liu%2520and%2520Wentao%2520Feng%2520and%2520Shudong%2520Huang%26entry.1292438233%3DCross-modal%2520retrieval%2520aims%2520to%2520align%2520different%2520modalities%2520via%2520semantic%2520similarity.%2520However%252C%2520existing%2520methods%2520often%2520assume%2520that%2520image-text%2520pairs%2520are%2520perfectly%2520aligned%252C%2520overlooking%2520Noisy%2520Correspondences%2520in%2520real%2520data.%2520These%2520misaligned%2520pairs%2520misguide%2520similarity%2520learning%2520and%2520degrade%2520retrieval%2520performance.%2520Previous%2520methods%2520often%2520rely%2520on%2520coarse-grained%2520categorizations%2520that%2520simply%2520divide%2520data%2520int {"title": "Weaves, Wires, and Morphisms: Formalizing and Implementing the Algebra of Deep Learning", "author": "Vincent Abbott and Gioele Zardini", "abstract": "Despite deep learning models running well-defined mathematical functions, we lack a formal mathematical framework for describing model architectures. Ad-hoc notation, diagrams, and pseudocode poorly handle nonlinear broadcasting and the relationship between individual components and composed models. This paper introduces a categorical framework for deep learning models that formalizes broadcasting through the novel axis-stride and array-broadcasted categories. This allows the mathematical function underlying architectures to be precisely expressed and manipulated in a compositional manner. These mathematical definitions are translated into human manageable diagrams and machine manageable data structures. We provide a mirrored implementation in Python (pyncd) and TypeScript (tsncd) to show the universal aspect of our framework, along with features including algebraic construction, graph conversion, PyTorch compilation and diagram rendering. This lays the foundation for a systematic, formal approach to deep learning model design and analysis.", "link": "http://arxiv.org/abs/2604.07242v1", "date": "2026-04-08", "relevancy": 1.4009, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5004}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.4633}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4551}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Weaves%2C%20Wires%2C%20and%20Morphisms%3A%20Formalizing%20and%20Implementing%20the%20Algebra%20of%20Deep%20Learning&body=Title%3A%20Weaves%2C%20Wires%2C%20and%20Morphisms%3A%20Formalizing%20and%20Implementing%20the%20Algebra%20of%20Deep%20Learning%0AAuthor%3A%20Vincent%20Abbott%20and%20Gioele%20Zardini%0AAbstract%3A%20Despite%20deep%20learning%20models%20running%20well-defined%20mathematical%20functions%2C%20we%20lack%20a%20formal%20mathematical%20framework%20for%20describing%20model%20architectures.%20Ad-hoc%20notation%2C%20diagrams%2C%20and%20pseudocode%20poorly%20handle%20nonlinear%20broadcasting%20and%20the%20relationship%20between%20individual%20components%20and%20composed%20models.%20This%20paper%20introduces%20a%20categorical%20framework%20for%20deep%20learning%20models%20that%20formalizes%20broadcasting%20through%20the%20novel%20axis-stride%20and%20array-broadcasted%20categories.%20This%20allows%20the%20mathematical%20function%20underlying%20architectures%20to%20be%20precisely%20expressed%20and%20manipulated%20in%20a%20compositional%20manner.%20These%20mathematical%20definitions%20are%20translated%20into%20human%20manageable%20diagrams%20and%20machine%20manageable%20data%20structures.%20We%20provide%20a%20mirrored%20implementation%20in%20Python%20%28pyncd%29%20and%20TypeScript%20%28tsncd%29%20to%20show%20the%20universal%20aspect%20of%20our%20framework%2C%20along%20with%20features%20including%20algebraic%20construction%2C%20graph%20conversion%2C%20PyTorch%20compilation%20and%20diagram%20rendering.%20This%20lays%20the%20foundation%20for%20a%20systematic%2C%20formal%20approach%20to%20deep%20learning%20model%20design%20and%20analysis.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07242v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWeaves%252C%2520Wires%252C%2520and%2520Morphisms%253A%2520Formalizing%2520and%2520Implementing%2520the%2520Algebra%2520of%2520Deep%2520Learning%26entry.906535625%3DVincent%2520Abbott%2520and%2520Gioele%2520Zardini%26entry.1292438233%3DDespite%2520deep%2520learning%2520models%2520running%2520well-defined%2520mat {"title": "CADENCE: Context-Adaptive Depth Estimation for Navigation and Computational Efficiency", "author": "Timothy K Johnsen and Marco Levorato", "abstract": "Autonomous vehicles deployed in remote environments typically rely on embedded processors, compact batteries, and lightweight sensors. These hardware limitations conflict with the need to derive robust representations of the environment, which often requires executing computationally intensive deep neural networks for perception. To address this challenge, we present CADENCE, an adaptive system that dynamically scales the computational complexity of a slimmable monocular depth estimation network in response to navigation needs and environmental context. By closing the loop between perception fidelity and actuation requirements, CADENCE ensures high-precision computing is only used when mission-critical. We conduct evaluations on our released open-source testbed that integrates Microsoft AirSim with an NVIDIA Jetson Orin Nano. As compared to a state-of-the-art static approach, CADENCE decreases sensor acquisitions, power consumption, and inference latency by 9.67%, 16.1%, and 74.8%, respectively. The results demonstrate an overall reduction in energy expenditure by 75.0%, along with an increase in navigation accuracy by 7.43%.", "link": "http://arxiv.org/abs/2604.07286v1", "date": "2026-04-08", "relevancy": 1.7009, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5726}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5705}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5524}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CADENCE%3A%20Context-Adaptive%20Depth%20Estimation%20for%20Navigation%20and%20Computational%20Efficiency&body=Title%3A%20CADENCE%3A%20Context-Adaptive%20Depth%20Estimation%20for%20Navigation%20and%20Computational%20Efficiency%0AAuthor%3A%20Timothy%20K%20Johnsen%20and%20Marco%20Levorato%0AAbstract%3A%20Autonomous%20vehicles%20deployed%20in%20remote%20environments%20typically%20rely%20on%20embedded%20processors%2C%20compact%20batteries%2C%20and%20lightweight%20sensors.%20These%20hardware%20limitations%20conflict%20with%20the%20need%20to%20derive%20robust%20representations%20of%20the%20environment%2C%20which%20often%20requires%20executing%20computationally%20intensive%20deep%20neural%20networks%20for%20perception.%20To%20address%20this%20challenge%2C%20we%20present%20CADENCE%2C%20an%20adaptive%20system%20that%20dynamically%20scales%20the%20computational%20complexity%20of%20a%20slimmable%20monocular%20depth%20estimation%20network%20in%20response%20to%20navigation%20needs%20and%20environmental%20context.%20By%20closing%20the%20loop%20between%20perception%20fidelity%20and%20actuation%20requirements%2C%20CADENCE%20ensures%20high-precision%20computing%20is%20only%20used%20when%20mission-critical.%20We%20conduct%20evaluations%20on%20our%20released%20open-source%20testbed%20that%20integrates%20Microsoft%20AirSim%20with%20an%20NVIDIA%20Jetson%20Orin%20Nano.%20As%20compared%20to%20a%20state-of-the-art%20static%20approach%2C%20CADENCE%20decreases%20sensor%20acquisitions%2C%20power%20consumption%2C%20and%20inference%20latency%20by%209.67%25%2C%2016.1%25%2C%20and%2074.8%25%2C%20respectively.%20The%20results%20demonstrate%20an%20overall%20reduction%20in%20energy%20expenditure%20by%2075.0%25%2C%20along%20with%20an%20increase%20in%20navigation%20accuracy%20by%207.43%25.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07286v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCADENCE%253A%2520Context-Adaptive%25 {"title": "Synthetic Homes: A Multimodal Generative AI Pipeline for Residential Building Data Generation under Data Scarcity", "author": "Jackson Eshbaugh and Chetan Tiwari and Jorge Silveyra", "abstract": "Computational models have emerged as powerful tools for multi-scale energy modeling research at the building and urban scale, supporting data-driven analysis across building and urban energy systems. However, these models require large amounts of building parameter data that is often inaccessible, expensive to collect, or subject to privacy constraints. We introduce a modular, multimodal generative Artificial Intelligence (AI) framework that integrates image, tabular, and simulation-based components and produces synthetic residential building datasets from publicly available county records and images, and present an end-to-end pipeline instantiating this framework. To reduce typical Large Language Model (LLM) challenges, we evaluate our model's components using occlusion-based visual focus analysis. Our analysis demonstrates that our selected vision-language model achieves significantly stronger visual focus than a GPT-based alternative for building image processing. We also assess realism of our results against a national reference dataset. Our synthetic data overlaps more than 65% with the reference dataset across all evaluated parameters and greater than 90% for three of the four. This work reduces dependence on costly or restricted data sources, lowering barriers to building-scale energy research and Machine Learning (ML)-driven urban energy modeling, and therefore enabling scalable downstream tasks such as energy modeling, retrofit analysis, and urban-scale simulation under data scarcity.", "link": "http://arxiv.org/abs/2509.09794v4", "date": "2026-04-08", "relevancy": 1.653, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5563}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5445}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5442}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Synthetic%20Homes%3A%20A%20Multimodal%20Generative%20AI%20Pipeline%20for%20Residential%20Building%20Data%20Generation%20under%20Data%20Scarcity&body=Title%3A%20Synthetic%20Homes%3A%20A%20Multimodal%20Generative%20AI%20Pipeline%20for%20Residential%20Building%20Data%20Generation%20under%20Data%20Scarcity%0AAuthor%3A%20Jackson%20Eshbaugh%20and%20Chetan%20Tiwari%20and%20Jorge%20Silveyra%0AAbstract%3A%20Computational%20models%20have%20emerged%20as%20powerful%20tools%20for%20multi-scale%20energy%20modeling%20research%20at%20the%20building%20and%20urban%20scale%2C%20supporting%20data-driven%20analysis%20across%20building%20and%20urban%20energy%20systems.%20However%2C%20these%20models%20require%20large%20amounts%20of%20building%20parameter%20data%20that%20is%20often%20inaccessible%2C%20expensive%20to%20collect%2C%20or%20subject%20to%20privacy%20constraints.%20We%20introduce%20a%20modular%2C%20multimodal%20generative%20Artificial%20Intelligence%20%28AI%29%20framework%20that%20integrates%20image%2C%20tabular%2C%20and%20simulation-based%20components%20and%20produces%20synthetic%20residential%20building%20datasets%20from%20publicly%20available%20county%20records%20and%20images%2C%20and%20present%20an%20end-to-end%20pipeline%20instantiating%20this%20framework.%20To%20reduce%20typical%20Large%20Language%20Model%20%28LLM%29%20challenges%2C%20we%20evaluate%20our%20model%27s%20components%20using%20occlusion-based%20visual%20focus%20analysis.%20Our%20analysis%20demonstrates%20that%20our%20selected%20vision-language%20model%20achieves%20significantly%20stronger%20visual%20focus%20than%20a%20GPT-based%20alternative%20for%20building%20image%20processing.%20We%20also%20assess%20realism%20of%20our%20results%20against%20a%20national%20reference%20dataset.%20Our%20synthetic%20data%20overlaps%20more%20than%2065%25%20with%20the%20reference%20dataset%20across%20all%20evaluated%20parameters%20and%20greater%20than%2090%25%20for%20three%20of%20the%20four.%20This%20work%20reduces%20dependence%20on%20costly%20or%20restricted%20data%20sources%2C%20lowering%20barriers%20to%20building-scale%20energy%20research%20and%20Machine%20Learning%20%28ML%29-driven%20urban%20energy%20modeling%2C%20and%20therefore%20enabling%20scalable%20downstream%20tasks%20such%20as%20energy%20modeling%2C%20retrofit%20analysis%2C%20and%20urban-scale%20simulation%20under%20data%20scarcity.%0ALink%3A%20http%3A//arxiv.org/abs/2509.09794v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSynthetic%2520Homes%253A%2520A%2520Multimodal%2520Generative%2520AI%2520Pipeline%2520for%2520Residential%2520Building%2520Data%2520Generation%2520under%2520Data%2520Scarcity%26entry.906535625%3DJackson%2520Eshbaugh%2520and%2520Chetan%2520Tiwari%2520and%2520Jorge%2520Silveyra%26entry.1292438233%3DComputational%2520models%2520have%2520emerged%2520as%2520powerful%2520tools%2520for%2520multi-scale%2520energy%2520modeling%2520research%2520at%2520the%2520building%2520and%2520urban%2520scale%252C%2520supporting%2520data-driven%2520analysis%2520across%2520building%2520and%2520urban%2520energy%2520systems.%2520However%252C%2520these%2520models%2520require%2520large%2520amounts%2520of%2520building%2520parameter%2520data%2520that%2520is%2520often%2520inaccessible%252C%2520expensive%2520to%2520collect%252C%2520or%2520subject%2520to%2520privacy%2520constraints.%2520We%2520introduce%2520a%2520modular%252C%2520multimodal%2520generative%2520Artificial%2520Intelligence%2520%2528AI%2529%2520framework%2520that%2520integrates%2520image%252C%2520tabular%252C%2520and%2520simulation-based%2520co {"title": "TeaLeafVision: An Explainable and Robust Deep Learning Framework for Tea Leaf Disease Classification", "author": "Rafi Ahamed and Sidratul Moon Nafsin and Md Abir Rahman and Tasnia Tarannum Roza and Munaia Jannat Easha and Abu Raihan", "abstract": "As the worlds second most consumed beverage after water, tea is not just a cultural staple but a global economic force of profound scale and influence. More than a mere drink, it represents a quiet negotiation between nature, culture, and the human desire for a moment of reflection. So, the precise identification and detection of tea leaf disease is crucial. With this goal, we have evaluated several Convolutional Neural Networks (CNN) models, among them three shows noticeable performance including DenseNet201, MobileNetV2, InceptionV3 on the teaLeafBD dataset. teaLeafBD dataset contains seven classes, six disease classes and one healthy class, collected under various field conditions reflecting real world challenges. Among the CNN models, DenseNet201 has achieved the highest test accuracy of 99%. In order to enhance the model reliability and interpretability, we have implemented Gradient weighted Class Activation Mapping (Grad CAM), occlusion sensitivity analysis and adversarial training techniques to increase the noise resistance of the model. Finally, we have developed a prototype in order to leverage the models capabilities on real life agriculture. This paper illustrates the deep learning models capabilities to classify the disease in real life tea leaf disease detection and management.", "link": "http://arxiv.org/abs/2604.07182v1", "date": "2026-04-08", "relevancy": 1.4794, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5042}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4823}, {"title": "CamCtrl3D: Singl       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

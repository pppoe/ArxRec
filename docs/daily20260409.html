ining%20how%20participants%20envision%20GenAI%20for%20learning%20and%20employability.%20Participants%20describe%20using%20GenAI%20less%20as%20an%20information%20source%20and%20more%20as%20an%20always-available%20peer%2C%20mentor%2C%20and%20source%20of%20career%20guidance%20that%20helps%20compensate%20for%20the%20absence%20of%20learning%20communities.%20At%20the%20same%20time%2C%20they%20emphasize%20that%20this%20companionship%20is%20constrained%20by%20privacy%20and%20surveillance%20risks%2C%20contextually%20unrealistic%20and%20culturally%20unsafe%20support%2C%20and%20direct-answer%20interactions%20that%20can%20undermine%20learning%20by%20creating%20an%20illusion%20of%20progress.%20Beyond%20eliciting%20requirements%2C%20envisioning%20the%20future%20with%20GenAI%20through%20participatory%20design%20was%20positively%20associated%20with%20significant%20increases%20in%20participants%27%20aspirations%20%28p%3D.01%29%2C%20perceived%20agency%20%28p%3D.01%29%2C%20and%20perceived%20avenues%20%28p%3D.03%29.%20These%20outcomes%20show%20that%20accountable%20and%20safe%20GenAI%20is%20not%20only%20about%20harm%20reduction%20but%20can%20also%20actively%20enable%20women%20to%20imagine%20and%20pursue%20viable%20learning%20and%20employment%20futures.%20Building%20on%20this%2C%20we%20translate%20participants%27%20proposals%20into%20accountability-focused%20design%20directions%20that%20center%20on%20safety-first%20interaction%20and%20user%20control%2C%20context-grounded%20support%20under%20constrained%20resources%2C%20and%20offer%20pedagogically%20aligned%20assistance%20that%20supports%20genuine%20learning%20rather%20than%20quick%20answers.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07253v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDesigning%2520Safe%2520and%2520Accountable%2520GenAI%2520as%2520a%2520Learning%2520Companion%2520with%2520Women%2520Banned%2520from%2520Formal%2520Education%26entry.9065 {"title": "Splatblox: Traversability-Aware Gaussian Splatting for Outdoor Robot Navigation", "author": "Samarth Chopra and Jing Liang and Gershom Seneviratne and Yonghan Lee and Jaehoon Choi and Jianyu An and Stephen Cheng and Dinesh Manocha", "abstract": "We present Splatblox, a real-time system for autonomous navigation in outdoor environments with dense vegetation, irregular obstacles, and complex terrain. Our method fuses segmented RGB images and LiDAR point clouds using Gaussian Splatting to construct a traversability-aware Euclidean Signed Distance Field (ESDF) that jointly encodes geometry and semantics. Updated online, this field enables semantic reasoning to distinguish traversable vegetation (e.g., tall grass) from rigid obstacles (e.g., trees), while LiDAR ensures 360-degree geometric coverage for extended planning horizons. We validate Splatblox on a quadruped robot and demonstrate transfer to a wheeled platform. In field trials across vegetation-rich scenarios, it outperforms state-of-the-art methods with over 50% higher success rate, 40% fewer freezing incidents, 5% shorter paths, and up to 13% faster time to goal, while supporting long-range missions up to 100 meters. Experiment videos and more details can be found on our project page: https://splatblox.github.io", "link": "http://arxiv.org/abs/2511.18525v2", "date": "2026-04-08", "relevancy": 2.4597, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6692}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5829}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5592}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Splatblox%3A%20Traversability-Aware%20Gaussian%20Splatting%20for%20Outdoor%20Robot%20Navigation&body=Title%3A%20Splatblox%3A%20Traversability-Aware%20Gaussian%20Splatting%20for%20Outdoor%20Robot%20Navigation%0AAuthor%3A%20Samarth%20Chopra%20and%20Jing%20Liang%20and%20Gershom%20Seneviratne%20and%20Yonghan%20Lee%20and%20Jaehoon%20Choi%20and%20Jianyu%20An%20and%20Stephen%20Cheng%20and%20Dinesh%20Manocha%0AAbstract%3A%20We%20present%20Splatblox%2C%20a%20real-time%20system%20for%20autonomous%20navigation%20in%20outdoor%20environments%20with%20dense%20vegetation%2C%20irregular%20obstacles%2C%20and%20complex%20terrain.%20Our%20method%20fuses%20segmented%20RGB%20images%20and%20LiDAR%20point%20clouds%20using%20Gaussian%20Splatting%20to%20construct%20a%20traversability-aware%20Euclidean%20Signed%20Distance%20Field%20%28ESDF%29%20that%20jointly%20encodes%20geometry%20and%20semantics.%20Updated%20online%2C%20this%20field%20enables%20semantic%20reasoning%20to%20distinguish%20traversable%20vegetation%20%28e.g.%2C%20tall%20grass%29%20from%20rigid%20obstacles%20%28e.g.%2C%20trees%29%2C%20while%20LiDAR%20ensures%20360-degree%20geometric%20coverage%20for%20extended%20planning%20horizons.%20We%20validate%20Splatblox%20on%20a%20quadruped%20robot%20and%20demonstrate%20transfer%20to%20a%20wheeled%20platform.%20In%20field%20trials%20across%20vegetation-rich%20scenarios%2C%20it%20outperforms%20state-of-the-art%20methods%20with%20over%2050%25%20higher%20success%20rate%2C%2040%25%20fewer%20freezing%20incidents%2C%205%25%20shorter%20paths%2C%20and%20up%20to%2013%25%20faster%20time%20to%20goal%2C%20while%20supporting%20long-range%20missions%20up%20to%20100%20meters.%20Experiment%20videos%20and%20more%20details%20can%20be%20found%20on%20our%20project%20page%3A%20https%3A//splatblox.github.io%0ALink%3A%20http%3A//arxiv.org/abs/2511.18525v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSplatblox%253A%2520Traversability-Aware%2520Gaussian%2520Splatting%2520for%2520Outdoor%2520Robot%2520Navigation%26entry.906535625%3DSamarth%2520Chopra%2520and%2520Jing%2520Liang%2520and%2520Gershom%2520Seneviratne%2520and%2520Yonghan%2520Lee%2520and%2520Jaehoon%2520Choi%2520and%2520Jianyu%2520An%2520and%2520Stephen%2520Cheng%2520and%2520Dinesh%2520Manocha%26entry.1292438233%3DWe%2520present%2520Splatblox%252C%2520a%2520real-time%2520system%2520for%2520autonomous%2520navigation%2520in%2520outdoor%2520environments%2520with%2520dense%2520vegetation%252C%2520irregular%2520obstacles%252C%2520and%2520complex%2520terrain.%2520Our%2520method%2520fuses%2520segmented%2520RGB%2520images%2520and%2520LiDAR%2520point%2520clouds%2520using%2520Gaussian%2520Splatting%2520to%2520construct%2520a%2520traversability-aware%2520Euclidean%2520Signed%2520Distance%2520Field%2520%2528ESDF%2529%2520that%2520jointly%2520encodes%2520geometry%2520and%2520semantics.%2520Updated%2520online%252C%2520this%2520field%2520enables%2520semantic%2520reasoning%2520to%2520distinguish%2520traversable%2520vegetation%2520%2528e.g.%252C%2520tall%2520grass%2529%2520from%2520rigid%2520obstacles%2520%2528e.g.%252C%2520trees%2529%252C%2520while%2520LiDAR%2520ensures%2520360-degree%2520geometric%2520coverage%2520for%2520extended%2520planning%2520horizons.%2520We%2520validate%2520Splatblox%2520on%2520a%2520quadruped%2520robot%2520and%2520demonstrate%2520transfer%2520to%2520a%2520wheeled%2520platform.%2520In%2520field%2520trials%2520across%2520vegetation-rich%2520scenarios%252C%2520it%2520outperforms%2520state-of-the-art%2520methods%2520with%2520over%252050%2525%2520higher%2520success%2520rate%252C%252040%2525%2520fewer%2520freezing%2520incidents%252C%25205%2525%2520shorter%2520paths%252C%2520and%2520up%2520to%252013%2525%2520faster%2520time%2520to%2520goal%252C%2520while%2520supporting%2520long-range%2520missions%2520up%2520to%2520100%2520meters.%2520Experiment%2520videos%2520and%2520more%2520details%2520can%2520be%2520found%2520on%2520our%2520project%2520page%253A%2520https {"title": "Production-Ready Automated ECU Calibration using Residual Reinforcement Learning", "author": "Andreas Kampmeier and Kevin Badalian and Lucas Koch and Sung-Yong Lee and Jakob Andert", "abstract": "Electronic Control Units (ECUs) have played a pivotal role in transforming motorcars of yore into the modern vehicles we see on our roads today. They actively regulate the actuation of individual components and thus determine the characteristics of the whole system. In this, the behavior of the control functions heavily depends on their calibration parameters which engineers traditionally design by hand. This is taking place in an environment of rising customer expectations and steadily shorter product development cycles. At the same time, legislative requirements are increasing while emission standards are getting stricter. Considering the number of vehicle variants on top of all that, the conventional method is losing its practical and financial viability. Prior work has already demonstrated that optimal control functions can be automatically developed with reinforcement learning (RL); since the resulting functions are represented by artificial neural networks, they lack explainability, a circumstance which renders them challenging to employ in production vehicles. In this article, we present an explainable approach to automating the calibration process using residual RL which follows established automotive development principles. Its applicability is demonstrated by means of a map-based air path controller in a series control unit using a hardware-in-the-loop (HiL) platform. Starting with a sub-optimal map, the proposed methodology quickly converges to a calibration which closely resembles the reference in the series ECU. The results prove that the approach is suitable for the industry where it leads to better calibrations in significantly less time and requires virtually no human intervention", "link": "http://arxiv.org/abs/2604.07059v1", "date": "2026-04-08", "relevancy": 2.4352, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.4937}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4927}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4746}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Production-Ready%20Automated%20ECU%20Calibration%20using%20Residual%20Reinforcement%20Learning&body=Title%3A%20Production-Ready%20Automated%20ECU%20Calibration%20using%20Residual%20Reinforcement%20Learning%0AAuthor%3A%20Andreas%20Kampmeier%20and%20Kevin%20Badalian%20and%20Lucas%20Koch%20and%20Sung-Yong%20Lee%20and%20Jakob%20Andert%0AAbstract%3A%20Electronic%20Control%20Units%20%28ECUs%29%20have%20played%20a%20pivotal%20role%20in%20transforming%20motorcars%20of%20yore%20into%20the%20modern%20vehicles%20we%20see%20on%20our%20roads%20today.%20They%20actively%20regulate%20the%20actuation%20of%20individual%20components%20and%20thus%20determine%20the%20characteristics%20of%20the%20whole%20system.%20In%20this%2C%20the%20behavior%20of%20the%20control%20functions%20heavily%20depends%20on%20their%20calibration%20parameters%20which%20engineers%20traditionally%20design%20by%20hand.%20This%20is%20taking%20place%20in%20an%20environment%20of%20rising%20customer%20expectations%20and%20steadily%20shorter%20product%20development%20cycles.%20At%20the%20same%20time%2C%20legislative%20requirements%20are%20increasing%20while%20emission%20standards%20are%20getting%20stricter.%20Considering%20the%20number%20of%20vehicle%20variants%20on%20top%20of%20all%20that%2C%20the%20conventional%20method%20is%20losing%20its%20practical%20and%20financial%20viability.%20Prior%20work%20has%20already%20demonstrated%20that%20optimal%20control%20functions%20can%20be%20automatically%20developed%20with%20reinforcement%20learning%20%28RL%29%3B%20since%20the%20resulting%20functions%20are%20represented%20by%20artificial%20neural%20networks%2C%20they%20lack%20explainability%2C%20a%20circumstance%20which%20renders%20them%20challenging%20to%20employ%20in%20production%20vehicles.%20In%20this%20article%2C%20we%20present%20an%20explainable%20approach%20to%20automating%20the%20calibration%20process%20using%20residual%20RL%20which%20follows%20established%20automotive%20development%20principles.%20Its%20applicability%20is%20demonstrated%20by%20means%20of%20a%20map-based%20air%20path%20controller%20in%20a%20series%20control%20unit%20using%20a%20hardware-in-the-loop%20%28HiL%29%20platform.%20Starting%20with%20a%20sub-optimal%20map%2C%20the%20proposed%20methodology%20quickly%20converges%20to%20a%20calibration%20which%20closely%20resembles%20the%20reference%20in%20the%20series%20ECU.%20The%20results%20prove%20that%20the%20approach%20is%20suitable%20for%20the%20industry%20where%20it%20leads%20to%20better%20calibrations%20in%20significantly%20less%20time%20and%20requires%20virtually%20no%20human%20intervention%0ALink%3A%20http%3A//arxiv.org/abs/2604.07059v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DProduction-Ready%2520Automated%2520ECU%2520Calibration%2520using%2520Residual%2520Reinforcement%2520Learning%26entry.906535625%3DAndreas%2520Kampmeier%2520and%2520Kevin%2520Badalian%2520and%2520Lucas%2520Koch%2520and%2520Sung-Yong%2520Lee%2520and%2520Jakob%2520Andert%26entry.1292438233%3DElectronic%2520Control%2520Units%2520%2528ECUs%2529%2520have%2520played%2520a%2520pivotal%2520role%2520in%2520transforming%2520motorcars%2520of%2520yore%2520into%2520the%2520modern%2520vehicles%2520we%2520see%2520on%2520our%2520roads%2520today.%2520They%2520actively%2520regulate%2520the%2520actuation%2520of%2520individual%2520components%2 loped%20with%20reinforcement%20learning%20%28RL%29%3B%20since%20the%20resulting%20functions%20are%20represented%20by%20artificial%20neural%20networks%2C%20they%20lack%20explainability%2C%20a%20circumstance%20which%20renders%20them%20challenging%20to%20employ%20in%20production%20vehicles.%20In%20this%20article%2C%20we%20present%20an%20explainable%20approach%20to%20automating%20the%20calibration%20process%20using%20residual%20RL%20which%20follows%20established%20automotive%20development%20principles.%20Its%20applicability%20is%20demonstrated%20by%20means%20of%20a%20map-based%20air%20path%20controller%20in%20a%20series%20control%20unit%20using%20a%20hardware-in-the-loop%20%28HiL%29%20platform.%20Starting%20with%20a%20sub-optimal%20map%2C%20the%20proposed%20methodology%20quickly%20converges%20to%20a%20calibration%20which%20closely%20resembles%20the%20reference%20in%20the%20series%20ECU.%20The%20results%20prove%20that%20the%20approach%20is%20suitable%20for%20the%20industry%20where%20it%20leads%20to%20better%20calibrations%20in%20significantly%20less%20time%20and%20requires%20virtually%20no%20human%20intervention&entry.1838667208=http%3A//arxiv.org/abs/2604.07059v1&entry.124074799=Read"},
{"title": "Mem3R: Streaming 3D Reconstruction with Hybrid Memory via Test-Time Training", "author": "Changkun Liu and Jiezhi Yang and Zeman Li and Yuan Deng and Jiancong Guo and Luca Ballan", "abstract": "Streaming 3D perception is well suited to robotics and augmented reality, where long visual streams must be processed efficiently and consistently. Recent recurrent models offer a promising solution by maintaining fixed-size states and enabling linear-time inference, but they often suffer from drift accumulation and temporal forgetting over long sequences due to the limited capacity of compressed latent memories. We propose Mem3R, a streaming 3D reconstruction model with a hybrid memory design that decouples camera tracking from geometric mapping to improve temporal consistency over long sequences. For camera tracking, Mem3R employs an implicit fast-weight memory implemented as a lightweight Multi-Layer Perceptron updated via Test-Time Training. For geometric mapping, Mem3R maintains an explicit token-based fixed-size state. Compared with CUT3R, this design not only significantly improves long-sequence performance but also reduces the model size from 793M to 644M parameters. Mem3R supports existing improved plug-and-play state update strategies developed for CUT3R. Specifically, integrating it with TTT3R decreases Absolute Trajectory Error by up to 39% over the base implementation on 500 to 1000 frame sequences. The resulting improvements also extend to other downstream tasks, including video depth estimation and 3D reconstruction, while preserving constant GPU memory usage and comparable inference throughput. Project page: https://lck666666.github.io/Mem3R/", "link": "http://arxiv.org/abs/2604.07279v1", "date": "2026-04-08", "relevancy": 2.431, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6267}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5981}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5926}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Mem3R%3A%20Streaming%203D%20Reconstruction%20with%20Hybrid%20Memory%20via%20Test-Time%20Training&body=Title%3A%20Mem3R%3A%20Streaming%203D%20Reconstruction%20with%20Hybrid%20Memory%20via%20Test-Time%20Training%0AAuthor%3A%20Changkun%20Liu%20and%20Jiezhi%20Yang%20and%20Zeman%20Li%20and%20Yuan%20Deng%20and%20Jiancong%20Guo%20and%20Luca%20Ballan%0AAbstract%3A%20Streaming%203D%20perception%20is%20well%20suited%20to%20robotics%20and%20augmented%20reality%2C%20where%20long%20visual%20streams%20must%20be%20processed%20efficiently%20and%20consistently.%20Recent%20recurrent%20models%20offer%20a%20promising%20solution%20by%20maintaining%20fixed-size%20states%20and%20enabling%20linear-time%20inference%2C%20but%20they%20often%20suffer%20from%20drift%20accumulation%20and%20temporal%20forgetting%20over%20long%20sequences%20due%20to%20the%20limited%20capacity%20of%20compressed%20latent%20memories.%20We%20propose%20Mem3R%2C%20a%20streaming%203D%20reconstruction%20model%20with%20a%20hybrid%20memory%20design%20that%20decouples%20camera%20tracking%20from%20geometric%20mapping%20to%20improve%20temporal%20consistency%20over%20long%20sequences.%20For%20camera%20tracking%2C%20Mem3R%20employs%20an%20implicit%20fast-weight%20memory%20implemented%20as%20a%20lightweight%20Multi-Layer%20Perceptron%20updated%20via%20Test-Time%20Training.%20For%20geometric%20mapping%2C%20Mem3R%20maintains%20an%20explicit%20token-based%20fixed-size%20state.%20Compared%20with%20CUT3R%2C%20this%20design%20not%20only%20significantly%20improves%20long-sequence%20performance%20but%20also%20reduces%20the%20model%20size%20from%20793M%20to%20644M%20parameters.%20Mem3R%20supports%20existing%20improved%20plug-and-play%20state%20update%20strategies%20developed%20for%20CUT3R.%20Specifically%2C%20integrating%20it%20with%20TTT3R%20decreases%20Absolute%20Trajectory%20Error%20by%20up%20to%2039%25%20over%20the%20base%20implementation%20on%20500%20to%201000%20frame%20sequences.%20The%20resulting%20improvements%20also%20extend%20to%20other%20downstream%20tasks%2C%20including%20video%20depth%20estimation%20and%203D%20reconstruction%2C%20while%20preserving%20constant%20GPU%20memory%20usage%20and%20comparable%20inference%20throughput.%20Project%20page%3A%20https%3A//lck666666.github.io/Mem3R/%0ALink%3A%20http%3A//arxiv.org/abs/2604.07279v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMem3R%253A%2520Streaming%25203D%2520Reconstruction%2520with%2520Hybrid%2520Memory%2520via%2520Test-Time%2520Training%26entry.906535625%3DChangkun%2520Liu%2520and%2520Jiezhi%2520Yang%2520and%2520Zeman%2520Li%2520and%2520Yuan%2520Deng%2520and%2520Jiancong%2520Guo%2520and%2520Luca%2520Ballan%26entry.1292438233%3DStreaming%25203D%2520perception%2520is%2520well%2520suited%2520to%2520robotics%2520and%2520augmented%2520reality%252C%2520where%2520long%2520visual%2520streams%2520must%2520be%2520processed%2520efficiently%2520and%2520consistently.%2520Recent%2520recurrent%2520models%2520offer%2520a%2520promising%2520solution%2520by%2520maintaining%2520fixed-size%2520states%2520and%2520enabling%2520linear-time%2520inference%252C%2520but%2520they%2520often%2520suffer%2520from%2520drift%2520accumulation%2520and%2520temporal%2520forgetting%2520over%2520long%2520sequences%2520due%2520to%2520the%2520limited%2520capacity%2520of%2520compressed%2520latent%2520memories.%2520We%2520propose%2520Mem3R%252C%2520a%2520streaming%25203D%2520reconstruction%2520model%2520with%2520a%2520hybrid%2520memory%2520design%2520that%2520decouples%2520camera%2520tracking%2520from%2520geometric%2520mapping%2520to%2520improve%2520temporal%2520consistency%2520over%2520 essed%20efficiently%20and%20consistently.%20Recent%20recurrent%20models%20offer%20a%20promising%20solution%20by%20maintaining%20fixed-size%20states%20and%20enabling%20linear-time%20inference%2C%20but%20they%20often%20suffer%20from%20drift%20accumulation%20and%20temporal%20forgetting%20over%20long%20sequences%20due%20to%20the%20limited%20capacity%20of%20compressed%20latent%20memories.%20We%20propose%20Mem3R%2C%20a%20streaming%203D%20reconstruction%20model%20with%20a%20hybrid%20memory%20design%20that%20decouples%20camera%20tracking%20from%20geometric%20mapping%20to%20improve%20temporal%20consistency%20over%20long%20sequences.%20For%20camera%20tracking%2C%20Mem3R%20employs%20an%20implicit%20fast-weight%20memory%20implemented%20as%20a%20lightweight%20Multi-Layer%20Perceptron%20updated%20via%20Test-Time%20Training.%20For%20geometric%20mapping%2C%20Mem3R%20maintains%20an%20explicit%20token-based%20fixed-size%20state.%20Compared%20with%20CUT3R%2C%20this%20design%20not%20only%20significantly%20improves%20long-sequence%20performance%20but%20also%20reduces%20the%20model%20size%20from%20793M%20to%20644M%20parameters.%20Mem3R%20supports%20existing%20improved%20plug-and-play%20state%20update%20strategies%20developed%20for%20CUT3R.%20Specifically%2C%20integrating%20it%20with%20TTT3R%20decreases%20Absolute%20Trajectory%20Error%20by%20up%20to%2039%25%20over%20the%20base%20implementation%20on%20500%20to%201000%20frame%20sequences.%20The%20resulting%20improvements%20also%20extend%20to%20other%20downstream%20tasks%2C%20including%20video%20depth%20estimation%20and%203D%20reconstruction%2C%20while%20preserving%20constant%20GPU%20memory%20usage%20and%20comparable%20inference%20throughput.%20Project%20page%3A%20https%3A//lck666666.github.io/Mem3R/&entry.1838667208=http%3A//arxiv.org/abs/2604.07279v1&entry.124074799=Read"},
{"title": "Multiple Domain Generalization Using Category Information Independent of Domain Differences", "author": "Reiji Saito and Kazuhiro Hotta", "abstract": "Domain generalization is a technique aimed at enabling models to maintain high accuracy when applied to new environments or datasets (unseen domains) that differ from the datasets used in training. Generally, the accuracy of models trained on a specific dataset (source domain) often decreases significantly when evaluated on different datasets (target domain). This issue arises due to differences in domains caused by varying environmental conditions such as imaging equipment and staining methods. Therefore, we undertook two initiatives to perform segmentation that does not depend on domain differences. We propose a method that separates category information independent of domain differences from the information specific to the source domain. By using information independent of domain differences, our method enables learning the segmentation targets (e.g., blood vessels and cell nuclei). Although we extract independent information of domain differences, this cannot completely bridge the domain gap between training and test data. Therefore, we absorb the domain gap using the quantum vectors in Stochastically Quantized Variational AutoEncoder (SQ-VAE). In experiments, we evaluated our method on datasets for vascular segmentation and cell nucleus segmentation. Our methods improved the accuracy compared to conventional methods.", "link": "http://arxiv.org/abs/2604.07175v1", "date": "2026-04-08", "relevancy": 2.425, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4894}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4854}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4802}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multiple%20Domain%20Generalization%20Using%20Category%20Information%20Independent%20of%20Domain%20Differences&body=Title%3A%20Multiple%20Domain%20Generalization%20Using%20Category%20Information%20Independent%20of%20Domain%20Differences%0AAuthor%3A%20Reiji%20Saito%20and%20Kazuhiro%20Hotta%0AAbstract%3A%20Domain%20generalization%20is%20a%20technique%20aimed%20at%20enabling%20models%20to%20maintain%20high%20accuracy%20when%20applied%20to%20new%20environments%20or%20datasets%20%28unseen%20domains%29%20that%20differ%20from%20the%20datasets%20used%20in%20training.%20Generally%2C%20the%20accuracy%20of%20models%20trained%20on%20a%20specific%20dataset%20%28source%20domain%29%20often%20decreases%20significantly%20when%20evaluated%20on%20different%20datasets%20%28target%20domain%29.%20This%20issue%20arises%20due%20to%20differences%20in%20domains%20caused%20by%20varying%20environmental%20conditions%20such%20as%20imaging%20equipment%20and%20staining%20methods.%20Therefore%2C%20we%20undertook%20two%20initiatives%20to%20perform%20segmentation%20that%20does%20not%20depend%20on%20domain%20differences.%20We%20propose%20a%20method%20that%20separates%20category%20information%20independent%20of%20domain%20differences%20from%20the%20information%20specific%20to%20the%20source%20domain.%20By%20using%20information%20independent%20of%20domain%20differences%2C%20our%20method%20enables%20learning%20the%20segmentation%20targets%20%28e.g.%2C%20blood%20vessels%20and%20cell%20nuclei%29.%20Although%20we%20extract%20independent%20information%20of%20domain%20differences%2C%20this%20cannot%20completely%20bridge%20the%20domain%20gap%20between%20training%20and%20test%20data.%20Therefore%2C%20we%20absorb%20the%20domain%20gap%20using%20the%20quantum%20vectors%20in%20Stochastically%20Quantized%20Variational%20AutoEncoder%20%28SQ-VAE%29.%20In%20experiments%2C%20we%20evaluated%20our%20method%20on%20datasets%20for%20vascular%20segmentation%20and%20cell%20nucleus%20segmentation.%20Our%20methods%20improved%20the%20accuracy%20compared%20to%20conventional%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07175v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMultiple%2520Domain%2520Generalization%2520Using%2520Category%2520Information%2520Independent%2520of%2520Domain%2520Differences%26entry.906535625%3DReiji%2520Saito%2520and%2520Kazuhiro%2520Hotta%26entry.1292438233%3DDomain%2520generalization%2520is%2520a%2520technique%2520aimed%2520at%2520enabling%2520models%2520to%2520maintain%2520high%2520accuracy%2520when%2520applied%2520to%2520new%2520environments%2520or%2520datasets%2520%2528unseen%2520domains%2529%2520that%2520differ%2520from%2520the%2520datasets%2520used%2520in%2520training.%2520Generally%252C%2520the%2520accuracy%2520of%2520models%2520trained%2520on%2520a%2520specific%2520dataset%2520%2528source%2520domain%2529%2520often%2520decreases%2520significantly%2520when%2520evaluated%2520on%2520different%2520datasets%2520%2528target%2520domain%2529.%2520This%2520issue%2520arises%2520due%2520to%2520differences%2520in%2520domains%2520caused%2520by%2520varying%2520environmental%2520conditions%2520such%2520as%2520imaging%2520equipment%2520and%2520staining%2520methods.%2520Therefore%252C%2520we%2520undertook%2520two%2520initiatives%2520to%2520perform%2520segmentation%2520that%2520does%2520not%2520depend%2520on%2520domain%2520differences.%2520We%2520propose%2520a%2520method%2520that%2520separates%2520category%2520information%2520independent%2520of%2520domain%2520differences%2520from%2520the%2520information%2520specific%2520to%2520the%2520source%2520domain.%2520By%2520using%2520information%2520independent%2520of%2520domain%2520differences%252C%2520our%2520method%2520enables%2520learning%2520the%2520segmentation%2520targets%2520%2528e.g.%252C%2520blood%2520vessels%2520and%2520cell%2520n {"title": "The ATOM Report: Measuring the Open Language Model Ecosystem", "author": "Nathan Lambert and Florian Brand", "abstract": "We present a comprehensive adoption snapshot of the leading open language models and who is building them, focusing on the ~1.5K mainline open models from the likes of Alibaba's Qwen, DeepSeek, Meta's Llama, that are the foundation of an ecosystem crucial to researchers, entrepreneurs, and policy advisors. We document a clear trend where Chinese models overtook their counterparts built in the U.S. in the summer of 2025 and subsequently widened the gap over their western counterparts. We study a mix of Hugging Face downloads and model derivatives, inference market share, performance metrics and more to make a comprehensive picture of the ecosystem.", "link": "http://arxiv.org/abs/2604.07190v1", "date": "2026-04-08", "relevancy": 2.3862, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.504}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.504}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.4237}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20ATOM%20Report%3A%20Measuring%20the%20Open%20Language%20Model%20Ecosystem&body=Title%3A%20The%20ATOM%20Report%3A%20Measuring%20the%20Open%20Language%20Model%20Ecosystem%0AAuthor%3A%20Nathan%20Lambert%20and%20Florian%20Brand%0AAbstract%3A%20We%20present%20a%20comprehensive%20adoption%20snapshot%20of%20the%20leading%20open%20language%20models%20and%20who%20is%20building%20them%2C%20focusing%20on%20the%20~1.5K%20mainline%20open%20models%20from%20the%20likes%20of%20Alibaba%27s%20Qwen%2C%20DeepSeek%2C%20Meta%2 {"title": "The Theory and Practice of Highly Scalable Gaussian Process Regression with Nearest Neighbours", "author": "Robert Allison and Tomasz Maciazek and Anthony Stephenson", "abstract": "Gaussian process ($GP$) regression is a widely used non-parametric modeling tool, but its cubic complexity in the training size limits its use on massive data sets. A practical remedy is to predict using only the nearest neighbours of each test point, as in Nearest Neighbour Gaussian Process ($NNGP$) regression for geospatial problems and the related scalable $GPnn$ method for more general machine-learning applications. Despite their strong empirical performance, the large-$n$ theory of $NNGP/GPnn$ remains incomplete. We develop a theoretical framework for $NNGP$ and $GPnn$ regression. Under mild regularity assumptions, we derive almost sure pointwise limits for three key predictive criteria: mean squared error ($MSE$), calibration coefficient ($CAL$), and negative log-likelihood ($NLL$). We then study the $L_2$-risk, prove universal consistency, and show that the risk attains Stone's minimax rate $n^{-2\u03b1/(2p+d)}$, where $\u03b1$ and $p$ capture regularity of the regression problem. We also prove uniform convergence of $MSE$ over compact hyper-parameter sets and show that its derivatives with respect to lengthscale, kernel scale, and noise variance vanish asymptotically, with explicit rates. This explains the observed robustness of $GPnn$ to hyper-parameter tuning. These results provide a rigorous statistical foundation for $NNGP/GPnn$ as a highly scalable and principled alternative to full $GP$ models.", "link": "http://arxiv.org/abs/2604.07267v1", "date": "2026-04-08", "relevancy": 2.3737, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4903}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4738}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4601}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Theory%20and%20Practice%20of%20Highly%20Scalable%20Gaussian%20Process%20Regression%20with%20Nearest%20Neighbours&body=Title%3A%20The%20Theory%20and%20Practice%20of%20Highly%20Scalable%20Gaussian%20Process%20Regression%20with%20Nearest%20Neighbours%0AAuthor%3A%20Robert%20Allison%20and%20Tomasz%20Maciazek%20and%20Anthony%20Stephenson%0AAbstract%3A%20Gaussian%20process%20%28%24GP%24%29%20regression%20is%20a%20widely%20used%20non-parametric%20modeling%20tool%2C%20but%20its%20cubic%20complexity%20in%20the%20training%20size%20limits%20its%20use%20on%20massive%20data%20sets.%20A%20practical%20remedy%20is%20to%20predict%20using%20only%20the%20nearest%20neighbours%20of%20each%20test%20point%2C%20as%20in%20Nearest%20Neighbour%20Gaussian%20Process%20%28%24NNGP%24%29%20regression%20for%20geospatial%20problems%20and%20the%20related%20scalable%20%24GPnn%24%20method%20for%20more%20general%20machine-learning%20applications.%20Despite%20their%20strong%20empirical%20performance%2C%20the%20large-%24n%24%20theory%20of%20%24NNGP/GPnn%24%20remains%20incomplete.%20We%20develop%20a%20theoretical%20framework%20for%20%24NNGP%24%20and%20%24GPnn%24%20regression.%20Under%20mild%20regularity%20assumptions%2C%20we%20derive%20almost%20sure%20pointwise%20limits%20for%20three%20key%20predictive%20criteria%3A%20mean%20squared%20error%20%28%24MSE%24%29%2C%20calibration%20coefficient%20%28%24CAL%24%29%2C%20and%20negative%20log-likelihood%20%28%24NLL%24%29.%20We%20then%20study%20the%20%24L_2%24-risk%2C%20prove%20universal%20consistency%2C%20and%20show%20that%20the%20risk%20attains%20Stone%27s%20minimax%20rate%20%24n%5E%7B-2%CE%B1/%282p%2Bd%29%7D%24%2C%20where%20%24%CE%B1%24%20and%20%24p%24%20capture%20regularity%20of%20the%20regression%20problem.%20We%20also%20prove%20uniform%20convergence%20of%20%24MSE%24%20over%20compact%20hyper-parameter%20sets%20and%20show%20that%20its%20derivatives%20with%20respect%20to%20lengthscale%2C%20kernel%20scale%2C%20and%20noise%20variance%20vanish%20asymptotically%2C%20with%20explicit%20rates.%20This%20explains%20the%20observed%20robustness%20of%20%24GPnn%24%20to%20hyper-parameter%20tuning.%20These%20results%20provide%20a%20rigorous%20statistical%20foundation%20for%20%24NNGP/GPnn%24%20as%20a%20highly%20scalable%20and%20principled%20alternative%20to%20full%20%24GP%24%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07267v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Theory%2520and%2520Practice%2520of%2520Highly%2520Scalable%2520Gaussian%2520Process%2520Regression%2520with%2520Nearest%2520Neighbours%26entry.906535625%3DRobert%2520Allison%2520and%2520Tomasz%2520Maciazek%2520and%2520Anthony%2520Stephenson%26entry.1292438233%3DGaussian%2520process%2520%2528%2524GP%2524%2529%2520regression%2520is%2520a%2520widely%2520used%2520non-parametric%2520modeling%2520tool%252C%2520but%2520its%2520cubic%2520complexity%2520in%2520the%2520training%2520size%2520limits%2520its%2520use%2520on%2520massive%2520data%2520sets.%2520A%2520practical%2520remedy%2520is%2520to%2520predict%2520using%2520only%2520the%2520nearest%2520neighbours%2520of%2520each%2520test%2520point%252C%2520as%2520in%2520Nearest%2520Neighbour%2520Gaussian%2520Process%2520%2528%2524NNGP%2524%2529%2520regression%2520for%2520geospatial%2520problems%2520and%2520the%2520related%2520scalable%2520%2524GPnn%2524%2520method%2520for%2520more%2520general%2520machine-learning%2520applications.%2520Despite%2520their%2520strong%2520empirical%2520performance%252C%2520the%2520large-%2524n%2524%2520theory%2520of%2520%2524NNGP/GPnn%2524%2520remains%2520incomplete.%2520We%2520develop%2520a%2520theoretical%2520framework%2520for%2520%2524NNGP%2524%2520and%2520%2524GPnn%2524%2520regression.%2520Under%2520mild%2520regularity%2520assumptions%252C%2520we%2520derive%2520almost%2520sure%2520pointwise%2520limits%2520for%2520three%2520key%2520predictive%2520criteria%253A%2520mean%2520squared%2520error%2520%2528%2524MSE%2524%2529%252C%2520calibration%2520coefficient%2520%2528%2524CAL%2524%2529%252C%2520and%2520negative%2520log-likelihood%2520%2528%2524NLL%2524%2529.%2520We%2520then%2520study%2520the%2520%2524L_2%2524-risk%252C%2520prove%2520universal%2520consistency%252C%2520and%2520show%2520that%2520the%2520risk%2520attains%2520Stone%2527s%2520minimax%2520rate%2520%2524n%255E%257B-2%25CE%25B1/%25282p%252Bd%2529%257D%2524%252C%2520where%2520%2524%25CE%25B1%2524%2520and%2520%2524p%2524%2520capture%2520regularity%2520of%2520the%2520regression%2520problem.%2520We%2520also%2520prove%2520uniform%2520convergence%2520of%2520%2524MSE%2524%2520over%2520compact%2520hyper-parameter%2520sets%2520and%2520show%2520that%2520its%2520derivatives%2520with%2520respect%2520to%2520lengthscale%252C%2520kernel%2520scale%252C%2520and%2520noise%2520variance%2520vanish%2520asymptotically%252C%2520with%2520explicit%2520rates.%2520This%2520explains%2520the%2520observed%2520robustness%2520of%2520%2524GPnn%2524%2520to%2520hyper-parameter%2520tuning.%2520These%2520results%2520provide%2520a%2520rigorous%2520statistical%2520foundation%2520for%2520%2524NNGP/GPnn%2524%2520as%2520a%2520highly%2520scalable%2520and%2520principled%2520alternative%2520to%2520full%2520%2524GP%2524%2520models.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.07267v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=The%20Theory%20and%20Practice%20of%20Highly%20Scalable%20Gaussian%20Process%20Regression%20with%20Nearest%20Neighbours&entry.906535625=Robert%20Allison%20and%20Tomasz%20Maciazek%20and%20Anthony%20Stephenson&entry.1292438233=Gaussian%20process%20%28%24GP%24%29%20regression%20is%20a%2 {"title": "Grounded Forcing: Bridging Time-Independent Semantics and Proximal Dynamics in Autoregressive Video Synthesis", "author": "Jintao Chen and Chengyu Bai and Junjun hu and Xinda Xue and Mu Xu", "abstract": "Autoregressive video synthesis offers a promising pathway for infinite-horizon generation but is fundamentally hindered by three intertwined challenges: semantic forgetting from context limitations, visual drift due to positional extrapolation, and controllability loss during interactive instruction switching. Current methods often tackle these issues in isolation, limiting long-term coherence. We introduce Grounded Forcing, a novel framework that bridges time-independent semantics and proximal dynamics through three interlocking mechanisms. First, to address semantic forgetting, we propose a Dual Memory KV Cache that decouples local temporal dynamics from global semantic anchors, ensuring long-term semantic coherence and identity stability. Second, to suppress visual drift, we design Dual-Reference RoPE Injection, which confines positional embeddings within the training manifold while rendering global semantics time-invariant. Third, to resolve controllability issues, we develop Asymmetric Proximity Recache, which facilitates smooth semantic inheritance during prompt transitions via proximity-weighted cache updates. These components operate synergistically to tether the generative process to stable semantic cores while accommodating flexible local dynamics. Extensive experiments demonstrate that Grounded Forcing significantly enhances long-range consistency and visual stability, establishing a robust foundation for interactive long-form video synthesis.", "link": "http://arxiv.org/abs/2604.06939v1", "date": "2026-04-08", "relevancy": 2.372, "topK": [{"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6095}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5814}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5811}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Grounded%20Forcing%3A%20Bridging%20Time-Independent%20Semantics%20and%20Proximal%20Dynamics%20in%20Autoregressive%20Video%20Synthesis&body=Title%3A%20Grounded%20Forcing%3A%20Bridging%20Time-Independent%20Semantics%20and%20Proximal%20Dynamics%20in%20Autoregressive%20Video%20Synthesis%0AAuthor%3A%20Jintao%20Chen%20and%20Chengyu%20Bai%20and%20Junjun%20hu%20and%20Xinda%20Xue%20and%20Mu%20Xu%0AAbstract%3A%20Autoregressive%20video%20synthesis%20offers%20a%20promising%20pathway%20for%20infinite-horizon%20generation%20but%20is%20fundamentally%20hindered%20by%20three%20intertwined%20challenges%3A%20semantic%20forgetting%20from%20context%20limitations%2C%20visual%20drift%20due%20to%20positional%20extrapolation%2C%20and%20controllability%20loss%20during%20interactive%20instruction%20switching.%20Current%20methods%20often%20tackle%20these%20issues%20in%20isolation%2C%20limiting%20long-term%20coherence.%20We%20introduce%20Grounded%20Forcing%2C%20a%20novel%20framework%20that%20bridges%20time-independent%20semantics%20and%20proximal%20dynamics%20through%20three%20interlocking%20mechanisms.%20First%2C%20to%20address%20semantic%20forgetting%2C%20we%20propose%20a%20Dual%20Memory%20KV%20Cache%20that%20decouples%20local%20temporal%20dynamics%20from%20global%20semantic%20anchors%2C%20ensuring%20long-term%20semantic%20coherence%20and%20identity%20stability.%20Second%2C%20to%20suppress%20visual%20drift%2C%20we%20design%20Dual-Reference%20RoPE%20Injection%2C%20which%20confines%20positional%20embeddings%20within%20the%20training%20manifold%20while%20rendering%20global%20semantics%20time-invariant.%20Third%2C%20to%20resolve%20controllability%20issues%2C%20we%20develop%20Asymmetric%20Proximity%20Recache%2C%20which%20facilitates%20smooth%20semantic%20inheritance%20during%20prompt%20transitions%20via%20proximity-weighted%20cache%20updates.%20These%20components%20operate%20synergistically%20to%20tether%20the%20generative%20process%20to%20stable%20semantic%20cores%20while%20accommodating%20flexible%20local%20dynamics.%20Extensive%20experiments%20demonstrate%20that%20Grounded%20Forcing%20significantly%20enhances%20long-range%20consistency%20and%20visual%20stability%2C%20establishing%20a%20robust%20foundation%20for%20interactive%20long-form%20video%20synthesis.%0ALink%3A%20http%3A//arxiv.org/abs/2604.06939v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGrounded%2520Forcing%253A%2520Bridging%2520Time-Independent%2520Semantics%2520and%2520Proximal%2520Dynamics%2520in%2520Autoregressive%2520Video%2520Synthesis%26entry.906535625%3DJintao%2520Chen%2520and%2520Chengyu%2520Bai%2520and%2520Junjun%2520hu%2520and%2520Xinda%2520Xue%2520and%2520Mu%2520Xu%26entry.1292438233%3DAutoregressive%2520video%2520synthesis%2520offers%2520a%2520promising%2520pathway%2520for%2520infinite-horizon%2520generation%2520but%2520is%2520fundamentally%2520hindered%2520by%2520three%2520intertwined%2520challenges%253A%2520semantic%2520forgetting%2520from%2520context%2520limitations%252C%2520visual%2520drift%2520due%2520to%2520positional%2520extrapolation%252C%2520and%2520controllability%2520loss%2520during%2520interactive%2520instruction%2520switching.%2520Current%2520methods%2520often%2520tackle%2520these%2520issues%2520in%2520isolation%252C%2520limiting%2520long-term%2520coherence.%2520We%2520introduce%2520Grounded%2520Forcing%252C%2520a%2520novel%2520framework%2520that%2520bridges%2520time-independent%2520semantics%2520and%2520proximal%2520dynamics%2520through%2520three%2520interlocking%2520mechanisms.%2520First%252C%2520to%2520address%2520semantic%2520forgetting%252C%2520we%2520propose%25 {"title": "Energy-based Tissue Manifolds for Longitudinal Multiparametric MRI Analysis", "author": "Kartikay Tehlan and Lukas F\u00f6rner and Nico Schmutzenhofer and Michael Fr\u00fchwald and Matthias Wagner and Nassir Navab and Thomas Wendler", "abstract": "We propose a geometric framework for longitudinal multi-parametric MRI analysis based on patient-specific energy modelling in sequence space. Rather than operating on images with spatial networks, each voxel is represented by its multi-sequence intensity vector ($T1$, $T1c$, $T2$, FLAIR, ADC), and a compact implicit neural representation is trained via denoising score matching to learn an energy function $E_\u03b8(\\mathbf{u})$ over $\\mathbb{R}^d$ from a single baseline scan. The learned energy landscape provides a differential-geometric description of tissue regimes without segmentation labels. Local minima define tissue basins, gradient magnitude reflects proximity to regime boundaries, and Laplacian curvature characterises local constraint structure. Importantly, this baseline energy manifold is treated as a fixed geometric reference: it encodes the set of contrast combinations observed at diagnosis and is not retrained at follow-up. Longitudinal assessment is therefore formulated as evaluation of subsequent scans relative to this baseline geometry. Rather than comparing anatomical segmentations, we analyse how the distribution of MRI sequence vectors evolves under the baseline energy function. In a paediatric case with later recurrence, follow-up scans show progressive deviation in energy and directional displacement in sequence space toward the baseline tumour-associated regime before clear radiological reappearance. In a case with stable disease, voxel distributions remain confined to established low-energy basins without systematic drift. The presented cases serve as proof-of-concept that patient-specific energy manifolds can function as geometric reference systems for longitudinal mpMRI analysis without explicit segmentation or supervised classification, providing a foundation for further investigation of manifold-based tissue-at-risk tracking in neuro-oncology.", "link": "http://arxiv.org/abs/2604.07180v1", "date": "2026-04-08", "relevancy": 2.369, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.478}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4744}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4689}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Energy-based%20Tissue%20Manifolds%20for%20Longitudinal%20Multiparametric%20MRI%20Analysis&body=Title%3A%20Energy-based%20Tissue%20Manifolds%20for%20Longitudinal%20Multiparametric%20MRI%20Analysis%0AAuthor%3A%20Kartikay%20Tehlan%20and%20Lukas%20F%C3%B6rner%20and%20Nico%20Schmutzenhofer%20and%20Michael%20Fr%C3%BChwald%20and%20Matthias%20Wagner%20and%20Nassir%20Navab%20and%20Thomas%20Wendler%0AAbstract%3A%20We%20propose%20a%20geometric%20framework%20for%20longitudinal%20multi-parametric%20MRI%20analysis%20based%20on%20patient-specific%20energy%20modelling%20in%20sequence%20space.%20Rather%20than%20operating%20on%20images%20with%20spatial%20networks%2C%20each%20voxel%20is%20represented%20by%20its%20multi-sequence%20intensity%20vector%20%28%24T1%24%2C%20%24T1c%24%2C%20%24T2%24%2C%20FLAIR%2C%20ADC%29%2C%20and%20a%20compact%20implicit%20neural%20representation%20is%20trained%20via%20denoising%20score%20matching%20to%20learn%20an%20energy%20function%20%24E_%CE%B8%28%5Cmathbf%7Bu%7D%29%24%20over%20%24%5Cmathbb%7BR%7D%5Ed%24%20from%20a%20single%20baseline%20scan.%20The%20learned%20energy%20landscape%20provides%20a%20differential-geometric%20description%20of%20tissue%20regimes%20without%20segmentation%20labels.%20Local%20minima%20define%20tissue%20basins%2C%20gradient%20magnitude%20reflects%20proximity%20to%20regime%20boundaries%2C%20and%20Laplacian%20curvature%20characterises%20local%20constraint%20structure.%20Importantly%2C%20this%20baseline%20energy%20manifold%20is%20treated%20as%20a%20fixed%20geometric%20reference%3A%20it%20encodes%20the%20set%20of%20contrast%20combinations%20observed%20at%20diagnosis%20and%20is%20not%20retrained%20at%20follow-up.%20Longitudinal%20assessment%20is%20therefore%20formulated%20as%20evaluation%20of%20subsequent%20scans%20relative%20to%20this%20baseline%20geometry.%20Rather%20than%20comparing%20anatomical%20segmentations%2C%20we%20analyse%20how%20the%20distribution%20of%20MRI%20sequence%20vectors%20evolves%20under%20the%20baseline%20energy%20function.%20In%20a%20paediatric%20case%20with%20later%20recurrence%2C%20follow-up%20scans%20show%20progressive%20deviation%20in%20energy%20and%20directional%20displacement%20in%20sequence%20space%20toward%20the%20baseline%20tumour-associated%20regime%20before%20clear%20radiological%20reappearance.%20In%20a%20case%20with%20stable%20disease%2C%20voxel%20distributions%20remain%20confined%20to%20established%20low-energy%20basins%20without%20systematic%20drift.%20The%20presented%20cases%20serve%20as%20proof-of-concept%20that%20patient-specific%20energy%20manifolds%20can%20function%20as%20geometric%20reference%20systems%20for%20longitudinal%20mpMRI%20analysis%20without%20explicit%20segmentation%20or%20supervised%20classification%2C%20providing%20a%20foundation%20for%20further%20investigation%20of%20manifold-based%20tissue-at-risk%20tracking%20in%20neuro-oncology.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07180v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEnergy-based%2520Tissue%2520Manifolds%2520for%2520Longitudinal%2520Multiparametric%2520MRI%2520Analysis%26entry.906535625%3DKart {"title": "CylinderDepth: Cylindrical Spatial Attention for Multi-View Consistent Self-Supervised Surround Depth Estimation", "author": "Samer Abualhanud and Christian Grannemann and Max Mehltretter", "abstract": "Self-supervised surround-view depth estimation enables dense, low-cost 3D perception with a 360\u00b0 field of view from multiple minimally overlapping images. Yet, most existing methods suffer from depth estimates that are inconsistent across overlapping images. To address this limitation, we propose a novel geometry-guided method for calibrated, time-synchronized multi-camera rigs that predicts dense metric depth. Our approach targets two main sources of inconsistency: the limited receptive field in border regions of single-image depth estimation, and the difficulty of correspondence matching. We mitigate these two issues by extending the receptive field across views and restricting cross-view attention to a small neighborhood. To this end, we establish the neighborhood relationships between images by mapping the image-specific feature positions onto a shared cylinder. Based on the cylindrical positions, we apply an explicit spatial attention mechanism, with non-learned weighting, that aggregates features across images according to their distances on the cylinder. The modulated features are then decoded into a depth map for each view. Evaluated on the DDAD and nuScenes datasets, our method improves both cross-view depth consistency and overall depth accuracy compared with state-of-the-art approaches. Code is available at https://abualhanud.github.io/CylinderDepthPage.", "link": "http://arxiv.org/abs/2511.16428v2", "date": "2026-04-08", "relevancy": 2.3674, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6177}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5984}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.575}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CylinderDepth%3A%20Cylindrical%20Spatial%20Attention%20for%20Multi-View%20Consistent%20Self-Supervised%20Surround%20Depth%20Estimation&body=Title%3A%20CylinderDepth%3A%20Cylindrical%20Spatial%20Attention%20for%20Multi-View%20Consistent%20Self-Supervised%20Surround%20Depth%20Estimation%0AAuthor%3A%20Samer%20Abualhanud%20and%20Christian%20Grannemann%20and%20Max%20Mehltretter%0AAbstract%3A%20Self-supervised%20surround-view%20depth%20estimation%20enables%20dense%2C%20low-cost%203D%20perception%20with%20a%20360%C2%B0%20field%20of%20view%20from%20multiple%20minimally%20overlapping%20images.%20Yet%2C%20most%20existing%20methods%20suffer%20from%20depth%20estimates%20that%20are%20inconsistent%20across%20overlapping%20images.%20To%20address%20this%20limitation%2C%20we%20propose%20a%20novel%20geometry-guided%20method%20for%20calibrated%2C%20time-synchronized%20multi-camera%20rigs%20that%20predicts%20dense%20metric%20depth.%20Our%20approach%20targets%20two%20main%20sources%20of%20inconsistency%3A%20the%20limited%20receptive%20field%20in%20border%20regions%20of%20single-image%20depth%20estimation%2C%20and%20the%20difficulty%20of%20correspondence%20matching.%20We%20mitigate%20these%20two%20issues%20by%20extending%20the%20receptive%20field%20across%20views%20and%20restricting%20cross-view%20attention%20to%20a%20small%20neighborhood.%20To%20this%20end%2C%20we%20establish%20the%20neighborhood%20relationships%20between%20images%20by%20mapping%20the%20image-specific%20feature%20positions%20onto%20a%20shared%20cylinder.%20Based%20on%20the%20cylindrical%20positions%2C%20we%20apply%20an%20explicit%20spatial%20attention%20mechanism%2C%20with%20non-learned%20weighting%2C%20that%20aggregates%20features%20across%20images%20according%20to%20 e-synchronized%20multi-camera%20rigs%20that%20predicts%20dense%20metric%20depth.%20Our%20approach%20targets%20two%20main%20sources%20of%20inconsistency%3A%20the%20limited%20receptive%20field%20in%20border%20regions%20of%20single-image%20depth%20estimation%2C%20and%20the%20difficulty%20of%20correspondence%20matching.%20We%20mitigate%20these%20two%20issues%20by%20extending%20the%20receptive%20field%20across%20views%20and%20restricting%20cross-view%20attention%20to%20a%20small%20neighborhood.%20To%20this%20end%2C%20we%20establish%20the%20neighborhood%20relationships%20between%20images%20by%20mapping%20the%20image-specific%20feature%20positions%20onto%20a%20shared%20cylinder.%20Based%20on%20the%20cylindrical%20positions%2C%20we%20apply%20an%20explicit%20spatial%20attention%20mechanism%2C%20with%20non-learned%20weighting%2C%20that%20aggregates%20features%20across%20images%20according%20to%20their%20distances%20on%20the%20cylinder.%20The%20modulated%20features%20are%20then%20decoded%20into%20a%20depth%20map%20for%20each%20view.%20Evaluated%20on%20the%20DDAD%20and%20nuScenes%20datasets%2C%20our%20method%20improves%20both%20cross-view%20depth%20consistency%20and%20overall%20depth%20accuracy%20compared%20with%20state-of-the-art%20approaches.%20Code%20is%20available%20at%20https%3A//abualhanud.github.io/CylinderDepthPage.&entry.1838667208=http%3A//arxiv.org/abs/2511.16428v2&entry.124074799=Read"},
{"title": "Neural Harmonic Textures for High-Quality Primitive Based Neural Reconstruction", "author": "Jorge Condor and Nicolas Moenne-Loccoz and Merlin Nimier-David and Piotr Didyk and Zan Gojcic and Qi Wu", "abstract": "Primitive-based methods such as 3D Gaussian Splatting have recently become the state-of-the-art for novel-view synthesis and related reconstruction tasks. Compared to neural fields, these representations are more flexible, adaptive, and scale better to large scenes. However, the limited expressivity of individual primitives makes modeling high-frequency detail challenging. We introduce Neural Harmonic Textures, a neural representation approach that anchors latent feature vectors on a virtual scaffold surrounding each primitive. These features are interpolated within the primitive at ray intersection points. Inspired by Fourier analysis, we apply periodic activations to the interpolated features, turning alpha blending into a weighted sum of harmonic components. The resulting signal is then decoded in a single deferred pass using a small neural network, significantly reducing computational cost. Neural Harmonic Textures yield state-of-the-art results in real-time novel view synthesis while bridging the gap between primitive- and neural-field-based reconstruction. Our method integrates seamlessly into existing primitive-based pipelines such as 3DGUT, Triangle Splatting, and 2DGS. We further demonstrate its generality with applications to 2D image fitting and semantic reconstruction.", "link": "http://arxiv.org/abs/2604.01204v2", "date": "2026-04-08", "relevancy": 2.3652, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.608}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5839}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5681}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Neural%20Harmonic%20Textures%20for%20High-Quality%20Primitive%20Based%20Neural%20Reconstruction&body=Title%3A%20Neural%20Harmonic%20Textures%20for%20High-Quality%20Primitive%20Based%20Neural%20Reconstruction%0AAuthor%3A%20Jorge%20Condor%20and%20Nicolas%20Moenne-Loccoz%20and%20Merlin%20Nimier-David%20and%20Piotr%20Didyk%20and%20Zan%20Gojcic%20and%20Qi%20Wu%0AAbstract%3A%20Primitive-based%20methods%20such%20as%203D%20Gaussian%20Splatting%20have%20recently%20become%20the%20state-of-the-art%20for%20novel-view%20synthesis%20and%20related%20reconstruction%20tasks.%20Compared%20to%20neural%20fields%2C%20these%20representations%20are%20more%20flexible%2C%20adaptive%2C%20and%20scale%20better%20to%20large%20scenes.%20However%2C%20the%20limited%20expressivity%20of%20individual%20primitives%20makes%20modeling%20high-frequency%20detail%20challenging.%20We%20introduce%20Neural%20Harmonic%20Textures%2C%20a%20neural%20representation%20approach%20that%20anchors%20latent%20feature%20vectors%20on%20a%20virtual%20scaffold%20surrounding%20each%20primitive.%20These%20features%20are%20interpolated%20within%20the%20primitive%20at%20ray%20intersection%20points.%20Inspired%20by%20Fourier%20analysis%2C%20we%20apply%20periodic%20activations%20to%20the%20interpolated%20features%2C%20turning%20alpha%20blending%20into%20a%20weighted%20sum%20of%20harmonic%20components.%20The%20resulting%20signal%20is%20then%20decoded%20in%20a%20single%20deferred%20pass%20using%20a%20small%20neural%20network%2C%20significantly%20reducing%20computational%20cost.%20Neural%20Harmonic%20Textures%20yield%20state-of-the-art%20results%20in%20real-time%20novel%20view%20synthesis%20while%20bridging%20the%20gap%20between%20primitive-%20and%20neural-field-based%20reconstruction.%20Our%20method%20integrates%20seamlessly%20into%20existing%20primitive-based%20pipelines%20such%20as%203DGUT%2C%20Triangle%20Splatting%2C%20and%202DGS.%20We%20further%20demonstrate%20its%20generality%20with%20applications%20to%202D%20image%20fitting%20and%20semantic%20reconstruction.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01204v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNeural%2520Harmonic%2520Textures%2520for%2520High-Quality%2520Primitive%2520Based%2520Neural%2520Reconstruction%26entry.906535625%3DJorge%2520Condor%2520and%2520Nicolas%2520Moenne-Loccoz%2520and%2520Merlin%2520Nimier-David%2520and%2520Piotr%2520Didyk%2520and%2520Zan%2520Gojcic%2520and%2520Qi%2520Wu%26entry.1292438233%3DPrimitive-based%2520methods%2520such%2520as%25203D%2520Gaussian%2520Splatting%2520have%2520recently%2520become%2520the%2520state-of-the-art%2520for%2520novel-view%2520synthesis%2520and%2520related%2520reconstruction%2520tasks.%2520Compared%2520to%2520neural%2520fields%252C%2520these%2520representations%2520are%2520more%2520flexible%252C%2520adaptive%252C%2520and%2520scale%2520better%2520to%2520large%2520scenes.%2520However%252C%2520the%2520limited%2520expressivity%2520of%2520individual%2520primitives%2520makes%2520modeling%2520high-frequency%2520detail%2520challenging.%2520We%2520introduce%2520Neural%2520Harmonic%2520Textures%252C%2520a%2520neural%2520representation%2520approach%2520that%2520anchors%2520latent%2520feature%2520vectors%2520on%2520a%2520virtual%2520scaffold%2520surrounding%2520each%2520primitive.%2520These%2520features%2520are%2520interpolated%2520within%2520the%2520primitive%2520at%2520ray%2520intersection%2520points.%2520Inspired%2520by%2520Fourier%2520analysis%252C%2520we%2520apply%2520periodic%2520activations%2520to%2520the%2520interpolated%2520features%252C%2520turning%2520alpha%2520blending%2520into%2520a%2520weighted%2520sum%2520of%2520harmonic%2520components.%2520The%2520resulting%2520signal%2520is%2520then%2520decoded%2520in%2520a%2520single%2520deferred%2520p {"title": "VertAX: a differentiable vertex model for learning epithelial tissue mechanics", "author": "Alessandro Pasqui and Jim Martin Catacora Ocana and Anshuman Sinha and Matthieu Perez and Fabrice Delbary and Giorgio Gosti and Mattia Miotto and Domenico Caudo and Maxence Ernoult and Herv\u00e9 Turlier", "abstract": "Epithelial tissues dynamically reshape through local mechanical interactions among cells, a process well captured by vertex models. Yet their many tunable parameters make inference and optimization challenging, motivating computational frameworks that flexibly model and learn tissue mechanics. We introduce VertAX, a differentiable JAX-based framework for vertex-modeling of confluent epithelia. VertAX provides automatic differentiation, GPU acceleration, and end-to-end bilevel optimization for forward simulation, parameter inference, and inverse mechanical design. Users can define arbitrary energy and cost functions in pure Python, enabling seamless integration with machine-learning pipelines. We demonstrate VertAX on three representative tasks: (i) forward modeling of tissue morphogenesis, (ii) mechanical parameter inference, and (iii) inverse design of tissue-scale behaviors. We benchmark three differentiation strategies-automatic differentiation, implicit differentiation, and equilibrium propagation-showing that the latter can approximate gradients using repeated forward, adjoint-free simulations alone, offering a simple route for extending inverse biophysical problems to non-differentiable simulators with limited additional engineering effort.", "link": "http://arxiv.org/abs/2604.06896v1", "date": "2026-04-08", "relevancy": 2.355, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4876}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4703}, {"title": "UGG: Unified Gene elines.%2520We%2520demonstrate%2520VertAX%2520on%2520three%2520representative%2520tasks%253A%2520%2528i%2529%2520forward%2520modeling%2520of%2520tissue%2520morphogenesis%252C%2520%2528ii%2529%2520mechanical%2520parameter%2520inference%252C%2520and%2520%2528iii%2529%2520inverse%2520design%2520of%2520tissue-scale%2520behaviors.%2520We%2520benchmark%2520three%2520differentiation%2520strategies-automatic%2520differentiation%252C%2520implicit%2520differentiation%252C%2520and%2520equilibrium%2520propagation-showing%2520that%2520the%2520latter%2520can%2520approximate%2520gradients%2520using%2520repeated%2520forward%252C%2520adjoint-free%2520simulations%2520alone%252C%2520offering%2520a%2520simple%2520route%2520for%2520extending%2520inverse%2520biophysical%2520problems%2520to%2520non-differentiable%2520simulators%2520with%2520limited%2520additional%2520engineering%2520effort.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.06896v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=VertAX%3A%20a%20differentiable%20vertex%20model%20for%20learning%20epithelial%20tissue%20mechanics&entry.906535625=Alessandro%20Pasqui%20and%20Jim%20Martin%20Catacora%20Ocana%20and%20Anshuman%20Sinha%20and%20Matthieu%20Perez%20and%20Fabrice%20Delbary%20and%20Giorgio%20Gosti%20and%20Mattia%20Miotto%20and%20Domenico%20Caudo%20and%20Maxence%20Ernoult%20and%20Herv%C3%A9%20Turlier&entry.1292438233=Epithelial%20tissues%20dynamically%20reshape%20through%20local%20mechanical%20interactions%20among%20cells%2C%20a%20process%20well%20captured%20by%20vertex%20models.%20Yet%20their%20many%20tunable%20parameters%20make%20inference%20and%20optimization%20challenging%2C%20motivating%20computational%20frameworks%20that%20flexibly%20model%20and%20learn%20tissue%20mechanics.%20We%20introduce%20VertAX%2C%20a%20differentiable%20JAX-based%20framework%20for%20vertex-modeling%20of%20confluent%20epithelia.%20VertAX%20p {"title": "Beyond Loss Values: Robust Dynamic Pruning via Loss Trajectory Alignment", "author": "Huaiyuan Qin and Muli Yang and Gabriel James Goenawan and Kai Wang and Zheng Wang and Peng Hu and Xi Peng and Hongyuan Zhu", "abstract": "Existing dynamic data pruning methods often fail under noisy-label settings, as they typically rely on per-sample loss as the ranking criterion. This could mistakenly lead to preserving noisy samples due to their high loss values, resulting in significant performance drop. To address this, we propose AlignPrune, a noise-robust module designed to enhance the reliability of dynamic pruning under label noise. Specifically, AlignPrune introduces the Dynamic Alignment Score (DAS), which is a loss-trajectory-based criterion that enables more accurate identification of noisy samples, thereby improving pruning effectiveness. As a simple yet effective plug-and-play module, AlignPrune can be seamlessly integrated into state-of-the-art dynamic pruning frameworks, consistently outperforming them without modifying either the model architecture or the training pipeline. Extensive experiments on five widely-used benchmarks across various noise types and pruning ratios demonstrate the effectiveness of AlignPrune, boosting accuracy by up to 6.3\\% over state-of-the-art baselines. Our results offer a generalizable solution for pruning under noisy data, encouraging further exploration of learning in real-world scenarios. Code is available at: https://github.com/leonqin430/AlignPrune.", "link": "http://arxiv.org/abs/2604.07306v1", "date": "2026-04-08", "relevancy": 2.3444, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4831}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4737}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4499}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Loss%20Values%3A%20Robust%20Dynamic%20Pruning%20via%20Loss%20Trajectory%20Alignment&body=Title%3A%20Beyond%20Loss%20Values%3A%20Robust%20Dynamic%20Pruning%20via%20Loss%20Trajectory%20Alignment%0AAuthor%3A%20Huaiyuan%20Qin%20and%20Muli%20Yang%20and%20Gabriel%20James%20Goenawan%20and%20Kai%20Wang%20and%20Zheng%20Wang%20and%20Peng%20Hu%20and%20Xi%20Peng%20and%20Hongyuan%20Zhu%0AAbstract%3A%20Existing%20dynamic%20data%20pruning%20methods%20often%20fail%20under%20noisy-label%20settings%2C%20as%20they%20typically%20rely%20on%20per-sample%20loss%20as%20the%20ranking%20criterion.%20This%20could%20mistakenly%20lead%20to%20preserving%20noisy%20samples%20due%20to%20their%20high%20loss%20values%2C%20resulting%20in%20significant%20performance%20drop.%20To%20address%20this%2C%20we%20propose%20AlignPrune%2C%20a%20noise-robust%20module%20designed%20to%20enhance%20the%20reliability%20of%20dynamic%20pruning%20under%20label%20noise.%20Specifically%2C%20AlignPrune%20introduces%20the%20Dynamic%20Alignment%20Score%20%28DAS%29%2C%20which%20is%20a%20loss-trajectory-based%20criterion%20that%20enables%20more%20accurate%20identification%20of%20noisy%20samples%2C%20thereby%20improving%20pruning%20effectiveness.%20As%20a%20simple%20yet%20effective%20plug-and-play%20module%2C%20AlignPrune%20can%20be%20seamlessly%20integrated%20into%20state-of-the-art%20dynamic%20pruning%20frameworks%2C%20consistently%20outperforming%20them%20without%20modifying%20either%20the%20model%20architecture%20or%20the%20training%20pipeline.%20Extensive%20experiments%20on%20five%20widely-used%20benchmarks%20across%20various%20noise%20types%20and%20pruning%20ratios%20demonstrate%20the%20effectiveness%20of%20AlignPrune%2C%20boosting%20accuracy%20by%20up%20to%206.3%5C%25%20over%20state-of-the-art%20baselines.%20Our%20results%20offer%20a%20generalizable%20solution%20for%20pruning%20under%20noisy%20data%2C%20encouraging%20further%20exploration%20of%20learning%20in%20real-world%20scenarios.%20Code%20is%20available%20at%3A%20https%3A//github.com/leonqin430/AlignPrune.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07306v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520Loss%2520Values%253A%2520Robust%2520Dynamic%2520Pruning%2520via%2520Loss%2520Trajectory%2520Alignment%26entry.906535625%3DHuaiyuan%2520Qin%2520and%2520Muli%2520Yang%2520and%2520Gabriel%2520James%2520Goenawan%2520and%2520Kai%2520Wang%2520and%2520Zheng%2520Wang%2520and%2520Peng%2520Hu%2520and%2520Xi%2520Peng%2520and%2520Hongyuan%2520Zhu%26entry.1292438233%3DExisting%2520dynamic%2520data%2520pruning%2520methods%2520often%2520fail%2520under%2520noisy-label%2520settings%252C%2520as%2520they%2520typically%2520rely%2520on%2520per-sample%2520loss%2520as%2520the%2520ranking%2520criterion.%2520This%2520could%2520mistakenly%2520lead%2520to%2520preserving%2520noisy%2520samples%2520due%2520to%2520their%2520high%2520loss%2520values%252C%2520resulting%2520in%2520significant%2520performance%2520drop.%2520To%2520address%2520this%252C%2520we%2520propose%2520AlignPrune%252C%2520a%2520noise-robust%2520module%2520designed%2520to%2520enhance%2520the%2520reliability%2520of%2520dynamic%2520pruning%2520under%2520label%2520noise.%2520Specifically%252C%2520AlignPrune%2520introduces%2520the%2520Dynamic%2520Alignment%2520Score%2520%2528DAS%2529%252C%2520which%2520is%2520a%2520loss-trajectory-based%2520criterion%2520that%2520enables%2520more%2520accurate%2520identification%2520of%2520noisy%2520samples%252C%2520thereby%2520improving%2520pruning%2520effectiveness.%2520As%2520a%2520simple%2520yet%2520effective%2520plug-and-play%2520module%252C%2520AlignPrune%2520can%2520be%2520seamlessly%2520integrated%2520into%2520state-of-the-art%2520dynamic%2520pruning%2520frameworks%252C%2 {"title": "Gym-V: A Unified Vision Environment System for Agentic Vision Research", "author": "Fanqing Meng and Lingxiao Du and Jiawei Gu and Jiaqi Liao and Linjie Li and Zijian Wu and Xiangyan Liu and Ziqi Zhao and Mengkang Hu and Zichen Liu and Jiaheng Zhang and Michael Qizhe Shieh", "abstract": "As agentic systems increasingly rely on reinforcement learning from verifiable rewards, standardized ``gym'' infrastructure has become essential for rapid iteration, reproducibility, and fair comparison. Vision agents lack such infrastructure, limiting systematic study of what drives their learning and where current models fall short. We introduce \\textbf{Gym-V}, a unified platform of 179 procedurally generated visual environments across 10 domains with controllable difficulty, enabling controlled experiments that were previously infeasible across fragmented toolkits. Using it, we find that observation scaffolding is more decisive for training success than the choice of RL algorithm, with captions and game rules determining whether learning succeeds at all. Cross-domain transfer experiments further show that training on diverse task categories generalizes broadly while narrow training can cause negative transfer, with multi-turn interaction amplifying all of these effects. Gym-V is released as a convenient foundation for training environments and evaluation toolkits, aiming to accelerate future research on agentic VLMs.", "link": "http://arxiv.org/abs/2603.15432v3", "date": "2026-04-08", "relevancy": 2.3359, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.6152}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5736}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5569}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gym-V%3A%20A%20Unified%20Vision%20Environment%20System%20for%20Agentic%20Vision%20Research&body=Title%3A%20Gym-V%3A%20A%20Unified%20Vision%20Environment%20System%20for%20Agentic%20Vision%20Research%0AAuthor%3A%20Fanqing%20Meng%20and%20Lingxiao%20Du%20and%20Jiawei%20Gu%20and%20Jiaqi%20Liao%20and%20Linjie%20Li%20and%20Zijian%20Wu%20and%20Xiangyan%20Liu%20and%20Ziqi%20Zhao%20and%20Mengkang%20Hu%20and%20Zichen%20Liu%20and%20Jiaheng%20Zhang%20and%20Michael%20Qizhe%20Shieh%0AAbstract%3A%20As%20agentic%20systems%20increasingly%20rely%20on%20reinforcement%20learning%20from%20verifiable%20rewards%2C%20standardized%20%60%60gym%27%27%20infrastructure%20has%20become%20essential%20for%20rapid%20iteration%2C%20reproducibility%2C%20and%20fair%20comparison.%20Vision%20agents%20lack%20such%20infrastructure%2C%20limiting%20systematic%20study%20of%20what%20drives%20their%20learning%20and%20where%20current%20models%20fall%20short.%20We%20introduce%20%5Ctextbf%7BGym-V%7D%2C%20a%20unified%20platform%20of%20179%20procedurally%20generated%20visual%20environments%20across%2010%20domains%20with%20controllable%20difficulty%2C%20enabling%20controlled%20experiments%20that%20were%20previously%20infeasible%20across%20fragmented%20toolkits.%20Using%20it%2C%20we%20find%20that%20observation%20scaffolding%20is%20more%20decisive%20for%20training%20success%20than%20the%20choice%20of%20RL%20algorithm%2C%20with%20captions%20and%20game%20rules%20determining%20whether%20learning%20succeeds%20at%20all.%20Cross-domain%20transfer%20experiments%20further%20show%20that%20training%20on%20diverse%20task%20categories%20generalizes%20broadly%20while%20narrow%20training%20can%20cause%20negative%20transfer%2C%20with%20multi-turn%20interaction%20amplifying%20all%20of%20these%20effects.%20Gym-V%20is%20released%20as%20a%20convenient%20foundation%20for%20training%20environments%20and%20evaluation%20toolkits%2C%20aiming%20to%20accelerate%20future%20research%20on%20agentic%20VLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2603.15432v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGym-V%253A%2520A%2520Unified%2520Vision%2520Environment%2520System%2520for%2520Agentic%2520Vision%2520Research%26entry.906535625%3DFanqing%2520Meng%2520and%2520Lingxiao%2520Du%2520and%2520Jiawei%2520Gu%2520and%2520Jiaqi%2520Liao%2520and%2520Linjie%2520Li%2520and%2520Zijian%2520Wu%2520and%2520Xiangyan%2520Liu%2520and%2520Ziqi%2520Zhao%2520and%2520Mengkang%2520Hu%2520and%2520Zichen%2520Liu%2520and%2520Jiaheng%2520Zhang%2520and%2520Michael%2520Qizhe%2520Shieh%26entry.1292438233%3DAs%2520agentic%2520systems%2520increasingly%2520rely%2520on%2520reinforcement%2520learning%2520from%2520verifiable%2520rewards%252C%2520standardized%2520%2560%2560gym%2527%2527%2520infrastructure%2520has%2520become%2520essential%2520for%2520rapid%2520iteration%252C%2520reproducibility%252C%2520and%2520fair%2520comparison.%2520Vision%2520agents%2520lack%2520such%2520infrastructure%252C%2520limiting%2520systematic%2520study%2520of%2520what%2520drives%2520their%2520learning%2520and%2520where%2520current%2520models%2520fall%2520short.%2520We%2520introduce%2520%255Ctextbf%257BGym-V%257D%252C%2520a%2520unified%2520platform%2520of%2520179%2520procedurally%2520generated%2520visual%2520environments%2520across%252010%2520domains%2520with%2520controllable%2520difficulty%252C%2520enabling%2520controlled%2520experiments%2520that%2520were%2520previously%2520infeasible%2520across%2520fragmented%2520toolkits.%2520Using%2520it%252C%2520we%2520find%2520that%2520observation%2520scaffolding%2520is%2520more%2520decisive%2520for%2520training%2520success%2520than%2520the%2520choice%2520of%2520RL%2520algorithm%252C%2520with%2520captions%2520and%2520game%2520rules%2520determining%2520whether%2520learning%2520succeeds%2520at%2520all.%2520Cross-domain%2520transfer%2520experiments%2520further%2520show%2520that%25

{"title": "UI-AGILE: Advancing GUI Agents with Effective Reinforcement Learning and Precise Inference-Time Grounding", "author": "Shuquan Lian and Yuhang Wu and Jia Ma and Yifan Ding and Zihan Song and Bingqi Chen and Xiawu Zheng and Hui Li and Rongrong Ji", "abstract": "The emergence of Multimodal Large Language Models (MLLMs) has driven significant advances in Graphical User Interface (GUI) agent capabilities. Nevertheless, existing GUI agent training and inference techniques still suffer from a dilemma for reasoning designs, ineffective reward, and visual noise. To address these issues, we introduce UI-AGILE for enhancing GUI agents at both training and inference. For training, we propose a suite of improvements to the Supervised Fine-Tuning (SFT) process: 1) a continuous reward function to incentivize high-precision grounding; 2) a ``Simple Thinking'' reward to balance planning with speed and grounding accuracy; and 3) a cropping-based resampling strategy to mitigate the sparse reward problem and improve learning on complex tasks. For inference, we present decomposed grounding with selection to dramatically improve grounding accuracy on high-resolution displays by breaking the image into smaller, manageable parts. Experiments show that UI-AGILE achieves the state-of-the-art grounding performance on two benchmarks ScreenSpot-Pro and ScreenSpot-v2 while it also exhibits strong general agent capabilities. For instance, using both our training and inference enhancement methods brings 23\\% grounding accuracy improvement over the best baseline on ScreenSpot-Pro. We provide the code in https://github.com/KDEGroup/UI-AGILE.", "link": "http://arxiv.org/abs/2507.22025v4", "date": "2026-04-08", "relevancy": 2.6854, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5475}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5443}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5194}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20UI-AGILE%3A%20Advancing%20GUI%20Agents%20with%20Effective%20Reinforcement%20Learning%20and%20Precise%20Inference-Time%20Grounding&body=Title%3A%20UI-AGILE%3A%20Advancing%20GUI%20Agents%20with%20Effective%20Reinforcement%20Learning%20and%20Precise%20Inference-Time%20Grounding%0AAuthor%3A%20Shuquan%20Lian%20and%20Yuhang%20Wu%20and%20Jia%20Ma%20and%20Yifan%20Ding%20and%20Zihan%20Song%20and%20Bingqi%20Chen%20and%20Xiawu%20Zheng%20and%20Hui%20Li%20and%20Rongrong%20Ji%0AAbstract%3A%20The%20emergence%20of%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20has%20driven%20significant%20advances%20in%20Graphical%20User%20Interface%20%28GUI%29%20agent%20capabilities.%20Nevertheless%2C%20existing%20GUI%20agent%20training%20and%20inference%20techniques%20still%20suffer%20from%20a%20dilemma%20for%20reasoning%20designs%2C%20ineffective%20reward%2C%20and%20visual%20noise.%20To%20address%20these%20issues%2C%20we%20introduce%20UI-AGILE%20for%20enhancing%20GUI%20agents%20at%20both%20training%20and%20inference.%20For%20training%2C%20we%20propose%20a%20suite%20of%20improvements%20to%20the%20Supervised%20Fine-Tuning%20%28SFT%29%20process%3A%201%29%20a%20continuous%20reward%20function%20to%20incentivize%20high-precision%20grounding%3B%202%29%20a%20%60%60Simple%20Thinking%27%27%20reward%20to%20balance%20planning%20with%20speed%20and%20grounding%20accuracy%3B%20and%203%29%20a%20cropping-based%20resampling%20strategy%20to%20mitigate%20the%20sparse%20reward%20problem%20and%20improve%20learning%20on%20complex%20tasks.%20For%20inference%2C%20we%20present%20decomposed%20grounding%20with%20selection%20to%20dramatically%20improve%20grounding%20accuracy%20on%20high-resolution%20displays%20by%20breaking%20the%20image%20into%20smaller%2C%20manageable%20parts.%20Experiments%20show%20that%20UI-AGILE%20achieves%20the%20state-of-the-art%20grounding%20performance%20on%20two%20benchmarks%20ScreenSpot-Pro%20and%20ScreenSpot-v2%20while%20it%20also%20exhibits%20strong%20general%20agent%20capabilities.%20For%20instance%2C%20using%20both%20our%20training%20and%20inference%20enhancement%20methods%20brings%2023%5C%25%20grounding%20accuracy%20improvement%20over%20the%20best%20baseline%20on%20ScreenSpot-Pro.%20We%20provide%20the%20code%20in%20https%3A//github.com/KDEGroup/UI-AGILE.%0ALink%3A%20http%3A//arxiv.org/abs/2507.22025v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUI-AGILE%253A%2520Advancing%2520GUI%2520Agents%2520with%2520Effective%2520Reinforcement%2520Learning%2520and%2520Precise%2520Inference-Time%2520Grounding%26entry.906535625%3DShuquan%2520Lian%2520and%2520Yuhang%2520Wu%2520and%2520Jia%2520Ma%2520and%2520Yifan%2520Ding%2520and%2520Zihan%2520Song%2520and%2520Bingqi%2520Chen%2520and%2520Xiawu%2520Zheng%2520and%2520Hui%2520Li%2520and%2520Rongrong%2520Ji%26entry.1292438233%3DThe%2520emergence%2520of%2520Multimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520has%2520driven%2520significant%2520advances%2520in%2520Graphical%2520User%2520Interface%2520%2528GUI%2529%2520agent%2520capabilities.%2520Nevertheless%252C%2520existing%2520GUI%2520agent%2520training%2520and%2520inference%2520techniques%2520still%2520suffer%2520from%2520a%2520dilemma%2520for%2520reasoning%2520designs%252C%2520ineffective%2520reward%252C%2520and%2520visual%2520noise.%2520To%2520address%2520these%2520issues%252C%2520we%2520introduce%2520UI-AGILE%2520for%2520enhancing%2520GUI%2520agents%2520at%2520both%2520training%2520and%2520inference.%2520For%2520training%252C%2520we%2520propose%2520a%2520suite%2520of%2520improvements%2520to%2520the%2520Supervised%2520Fine-Tuning%2520%2528SFT%2529%2520process%253A%25201%2529%2520a%2520continuous%2520reward%2520function%2520to%2520incentivize%2520high-precisio {"title": "TopoMaskV3: 3D Mask Head with Dense Offset and Height Predictions for Road Topology Understanding", "author": "Muhammet Esat Kalfaoglu and Halil Ibrahim Ozturk and Ozsel Kilinc and Alptekin Temizel", "abstract": "Mask-based paradigms for road topology understanding, such as TopoMaskV2, offer a complementary alternative to query-based methods by generating centerlines via a dense rasterized intermediate representation. However, prior work was limited to 2D predictions and suffered from severe discretization artifacts, necessitating fusion with parametric heads. We introduce TopoMaskV3, which advances this pipeline into a robust, standalone 3D predictor via two novel dense prediction heads: a dense offset field for sub-grid discretization correction within the existing BEV resolution, and a dense height map for direct 3D estimation. Beyond the architecture, we are the first to address geographic data leakage in road topology evaluation by introducing (1) geographically distinct splits to prevent memorization and ensure fair generalization, and (2) a long-range (+/-100 m) benchmark. TopoMaskV3 achieves state-of-the-art 28.5 OLS on this geographically disjoint benchmark, surpassing all prior methods. Our analysis shows that the mask representation is more robust to geographic overfitting than Bezier, while LiDAR fusion is most beneficial at long range and exhibits larger relative gains on the overlapping original split, suggesting overlap-induced memorization effects.", "link": "http://arxiv.org/abs/2603.01558v2", "date": "2026-04-08", "relevancy": 2.6778, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5521}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5298}, {"title": "TAMM: TriAdapter Multi-Modal Learning {"title": "Fast Spatial Memory with Elastic Test-Time Training", "author": "Ziqiao Ma and Xueyang Yu and Haoyu Zhen and Yuncong Yang and Joyce Chai and Chuang Gan", "abstract": "Large Chunk Test-Time Training (LaCT) has shown strong performance on long-context 3D reconstruction, but its fully plastic inference-time updates remain vulnerable to catastrophic forgetting and overfitting. As a result, LaCT is typically instantiated with a single large chunk spanning the full input sequence, falling short of the broader goal of handling arbitrarily long sequences in a single pass. We propose Elastic Test-Time Training inspired by elastic weight consolidation, that stabilizes LaCT fast-weight updates with a Fisher-weighted elastic prior around a maintained anchor state. The anchor evolves as an exponential moving average of past fast weights to balance stability and plasticity. Based on this updated architecture, we introduce Fast Spatial Memory (FSM), an efficient and scalable model for 4D reconstruction that learns spatiotemporal representations from long observation sequences and renders novel view-time combinations. We pre-trained FSM on large-scale curated 3D/4D data to capture the dynamics and semantics of complex spatial environments. Extensive experiments show that FSM supports fast adaptation over long sequences and delivers high-quality 3D/4D reconstruction with smaller chunks and mitigating the camera-interpolation shortcut. Overall, we hope to advance LaCT beyond the bounded single-chunk setting toward robust multi-chunk adaptation, a necessary step for generalization to genuinely longer sequences, while substantially alleviating the activation-memory bottleneck.", "link": "http://arxiv.org/abs/2604.07350v1", "date": "2026-04-08", "relevancy": 2.6744, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5605}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.528}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5162}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Fast%20Spatial%20Memory%20with%20Elastic%20Test-Time%20Training&body=Title%3A%20Fast%20Spatial%20Memory%20with%20Elastic%20Test-Time%20Training%0AAuthor%3A%20Ziqiao%20Ma%20and%20Xueyang%20Yu%20and%20Haoyu%20Zhen%20and%20Yuncong%20Yang%20and%20Joyce%20Chai%20and%20Chuang%20Gan%0AAbstract%3A%20Large%20Chunk%20Test-Time%20Training%20%28LaCT%29%20has%20shown%20strong%20performance%20on%20long-context%203D%20reconstruction%2C%20but%20its%20fully%20plastic%20inference-time%20updates%20remain%20vulnerable%20to%20catastrophic%20forgetting%20and%20overfitting.%20As%20a%20result%2C%20LaCT%20is%20typically%20instantiated%20with%20a%20single%20large%20chunk%20spanning%20the%20full%20input%20sequence%2C%20falling%20short%20of%20the%20broader%20goal%20of%20handling%20arbitrarily%20long%20sequences%20in%20a%20single%20pass.%20We%20propose%20Elastic%20Test-Time%20Training%20inspired%20by%20elastic%20weight%20consolidation%2C%20that%20stabilizes%20LaCT%20fast-weight%20updates%20with%20a%20Fisher-weighted%20elastic%20prior%20around%20a%20maintained%20anchor%20state.%20The%20anchor%20evolves%20as%20an%20exponential%20moving%20average%20of%20past%20fast%20weights%20to%20balance%20stability%20and%20plasticity.%20Based%20on%20this%20updated%20architecture%2C%20we%20introduce%20Fast%20Spatial%20Memory%20%28FSM%29%2C%20an%20efficient%20and%20scalable%20model%20for%204D%20reconstruction%20that%20learns%20spatiotemporal%20representations%20from%20long%20observation%20sequences%20and%20renders%20novel%20view-time%20combinations.%20We%20pre-trained%20FSM%20on%20large-scale%20curated%203D/4D%20data%20to%20capture%20the%20dynamics%20and%20semantics%20of%20complex%20spatial%20environments.%20Extensive%20experiments%20show%20that%20FSM%20supports%20fast%20adaptation%20over%20long%20sequences%20and%20delivers%20high-quality%203D/4D%20reconstruction%20with%20smaller%20chunks%20and%20mitigating%20the%20camera-interpolation%20shortcut.%20Overall%2C%20we%20hope%20to%20advance%20LaCT%20beyond%20the%20bounded%20single-chunk%20setting%20toward%20robust%20multi-chunk%20adaptation%2C%20a%20necessary%20step%20for%20generalization%20to%20genuinely%20longer%20sequences%2C%20while%20substantially%20alleviating%20the%20activation-memory%20bottleneck.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07350v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFast%2520Spatial%2520Memory%2520with%2520Elastic%2520Test-Time%2520Training%26entry.906535625%3DZiqiao%2520Ma%2520and%2520Xueyang%2520Yu%2520and%2520Haoyu%2520Zhen%2520and%2520Yuncong%2520Yang%2520and%2520Joyce%2520Chai%2520and%2520Chuang%2520Gan%26entry.1292438233%3DLarge%2520Chunk%2520Test-Time%2520Training%2520%2528LaCT%2529%2520has%2520shown%2520strong%2520performance%2520on%2520long-context%25203D%2520reconstruction%252C%2520but%2520its%2520fully%2520plastic%2520inference-time%2520updates%2520remain%2520vulnerable%2520to%2520catastrophic%2520forgetting%2520and%2520overfitting.%2520As%2520a%2520result%252C%2520LaCT%2520is%2520typically%2520instantiated%2520with%2520a%2520single%2520large%2520chunk%2520spanning%2520the%2520full%2520input%2520sequence%252C%2520falling%2520short%2520of%2520the%2520broader%2520goal%2520of%2520handling%2520arbitrarily%2520long%2520sequences%2520in%2520a%2520single%2520pass.%2520We%2520propose%2520Elastic%2520Test-Time%2520Training%2520inspired%2520by%2520elastic%2520weight%2520consolidation%252C%2520that%2520stabilizes%2520LaCT%2520fast-weight%2520updates%2520with%2520a%2520Fisher-weighted%2520elastic%2520prior%2520around%2520a%2520maintained%2520anchor%2520state.%2520The%2520anchor%2520evo {"title": "Towards foundation-style models for energy-frontier heterogeneous neutrino detectors via self-supervised pre-training", "author": "Sa\u00fal Alonso-Monsalve and Fabio Cufino and Umut Kose and Anna Mascellani and Andr\u00e9 Rubbia", "abstract": "Accelerator-based neutrino physics is entering an energy-frontier regime in which interactions reach the TeV scale and produce exceptionally dense, overlapping detector signatures. In this regime, event interpretation becomes impractical for conventional reconstruction approaches, particularly when labelled data are scarce and the analysis spans diverse downstream objectives. We present a sparse ViT framework for learning reusable representations from heterogeneous detector data. Self-supervised pre-training combines masked autoencoder reconstruction with relational voxel-level objectives for hierarchy, ghost and particle identification, and the resulting shared encoder is then jointly fine-tuned across classification and regression tasks. Evaluated on simulated events from the proposed FASERCal concept at the LHC, we find that pre-training consistently improves neutrino flavour and charm-quark identification, momentum regression, and vertex reconstruction over training from scratch, with the addition of relational objectives yielding further gains in the most topologically complex channels. Interpretability analyses further show that pre-training yields a more structured latent space, while detector-subsystem ablations recover physically plausible channel-dependent roles for the heterogeneous inputs. A data-efficiency study shows that, with roughly $10^3$ labelled events, the pre-trained encoder already matches the flavour-classification performance of a randomly initialised model trained on an order of magnitude more data. The learned representations also transfer effectively to publicly available benchmarks spanning different detector technologies and energy scales, matching or exceeding published baselines. These results support self-supervised pre-training on multimodal detector data as a scalable route towards reusable representations for neutrino and particle-detector analysis.", "link": "http://arxiv.org/abs/2604.07037v1", "date": "2026-04-08", "relevancy": 2.6507, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.577}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5067}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5067}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Towards%20foundation-style%20models%20for%20energy-frontier%20heterogeneous%20neutrino%20detectors%20via%20self-supervised%20pre-training&body=Title%3A%20Towards%20foundation-style%20models%20for%20energy-frontier%20heterogeneous%20neutrino%20detectors%20via%20self-supervised%20pre-training%0AAuthor%3A%20Sa%C3%BAl%20Alonso-Monsalve%20and%20Fabio%20Cufino%20and%20Umut%20Kose%20and%20Anna%20Mascellani%20and%20Andr%C3%A9%20Rubbia%0AAbstract%3A%20Accelerator-based%20neutrino%20physics%20is%20entering%20an%20energy-frontier%20regime%20in%20which%20interactions%20reach%20the%20TeV%20scale%20and%20produce%20exceptionally%20dense%2C%20overlapping%20detector%20signatures.%20In%20this%20regime%2C%20event%20interpretation%20becomes%20impractical%20for%20conventional%20reconstruction%20approaches%2C%20particularly%20when%20labelled%20data%20are%20scarce%20and%20the%20analysis%20spans%20diverse%20downstream%20objectives.%20We%20present%20a%20sparse%20ViT%20framework%20for%20learning%20reusable%20representations%20from%20heterogeneous%20detector%20data.%20Self-supervised%20pre-training%20combines%20masked%20autoencoder%20reconstruction%20with%20relational%20voxel-level%20objectives%20for%20hierarchy%2C%20ghost%20and%20particle%20identification%2C%20and%20the%20resulting%20shared%20encoder%20is%20then%20jointly%20fine-tuned%20across%20classification%20and%20regression%20tasks.%20Evaluated%20on%20simulated%20events%20from%20the%20proposed%20FASERCal%20concept%20at%20the%20LHC%2C%20we%20find%20that%20pre-training%20consistently%20improves%20neutrino%20flavour%20and%20charm-quark%20identification%2C%20momentum%20regression%2C%20and%20vertex%20reconstruction%20over%20training%20from%20scratch%2C%20with%20the%20addition%20of%20relational%20objectives%20yielding%20further%20gains%20in%20the%20most%20topologically%20complex%20channels.%20Interpretability%20analyses%20further%20show%20that%20pre-training%20yields%20a%20more%20structured%20latent%20space%2C%20while%20detector-subsystem%20ablations%20recover%20physically%20plausible%20channel-dependent%20roles%20for%20the%20heterogeneous%20inputs.%20A%20data-efficiency%20study%20shows%20that%2C%20with%20roughly%20%2410%5E3%24%20labelled%20events%2C%20the%20pre-trained%20encoder%20already%20matches%20the%20flavour-classification%20performance%20of%20a%20randomly%20initialised%20model%20trained%20on%20an%20order%20of%20magnitude%20more%20data.%20The%20learned%20representations%20also%20transfer%20effectively%20to%20publicly%20available%20benchmarks%20spanning%20different%20detector%20technologies%20and%20energy%20scales%2C%20matching%20or%20exceeding%20published%20baselines.%20These%20results%20support%20self-supervised%20pre-training%20on%20multimodal%20detector%20data%20as%20a%20scalable%20route%20towards%20reusable%20representations%20for%20neutrino%20and%20particle-detector%20analysis.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07037v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTowards%2520foundation-style%2520models%2520for%2520energy-frontier%2520heterogeneous%2520neutrino%2520detect {"title": "An RTK-SLAM Dataset for Absolute Accuracy Evaluation in GNSS-Degraded Environments", "author": "Wei Zhang and Vincent Ress and David Skuddis and Uwe Soergel and Norbert Haala", "abstract": "RTK-SLAM systems integrate simultaneous localization and mapping (SLAM) with real-time kinematic (RTK) GNSS positioning, promising both relative consistency and globally referenced coordinates for efficient georeferenced surveying. A critical and underappreciated issue is that the standard evaluation metric, Absolute Trajectory Error (ATE), first fits an optimal rigid-body transformation between the estimated trajectory and reference before computing errors. This so-called SE(3) alignment absorbs global drift and systematic errors, making trajectories appear more accurate than they are in practice, and is unsuitable for evaluating the global accuracy of RTK-SLAM. We present a geodetically referenced dataset and evaluation methodology that expose this gap. A key design principle is that the RTK receiver is used solely as a system input, while ground truth is established independently via a geodetic total station. This separation is absent from all existing datasets, where GNSS typically serves as (part of) the ground truth. The dataset is collected with a handheld RTK-SLAM device, comprising two scenes. We evaluate LiDAR-inertial, visual-inertial, and LiDAR-visual-inertial RTK-SLAM systems alongside standalone RTK, reporting direct global accuracy and SE(3)-aligned relative accuracy to make the gap explicit. Results show that SE(3) alignment can underestimate absolute positioning error by up to 76\\%. RTK-SLAM achieves centimeter-level absolute accuracy in open-sky conditions and maintains decimeter-level global accuracy indoors, where standalone RTK degrades to tens of meters. The dataset, calibration files, and evaluation scripts are publicly available at https://rtk-slam-dataset.github.io/.", "link": "http://arxiv.org/abs/2604.07151v1", "date": "2026-04-08", "relevancy": 2.6088, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5808}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5072}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4773}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20An%20RTK-SLAM%20Dataset%20for%20Absolute%20Accuracy%20Evaluation%20in%20GNSS-Degraded%20Environments&body=Title%3A%20An%20RTK-SLAM%20Dataset%20for%20Absolute%20Accuracy%20Evaluation%20in%20GNSS-Degraded%20Environments%0AAuthor%3A%20Wei%20Zhang%20and%20Vincent%20Ress%20and%20David%20Skuddis%20and%20Uwe%20Soergel%20and%20Norbert%20Haala%0AAbstract%3A%20RTK-SLAM%20systems%20integrate%20simultaneous%20localization%20and%20mapping%20%28SLAM%29%20with%20real-time%20kinematic%20%28RTK%29%20GNSS%20positioning%2C%20promising%20both%20relative%20consistency%20and%20globally%20referenced%20coordinates%20for%20efficient%20georeferenced%20surveying.%20A%20critical%20and%20underappreciated%20issue%20is%20that%20the%20standard%20evaluation%20metric%2C%20Absolute%20Trajectory%20Error%20%28ATE%29%2C%20first%20fits%20an%20optimal%20rigid-body%20transformation%20between%20the%20estimated%20trajectory%20and%20reference%20before%20computing%20errors.%20This%20so-called%20SE%283%29%20alignment%20absorbs%20global%20drift%20and%20systematic%20errors%2C%20making%20trajectories%20appear%20more%20accurate%20than%20they%20are%20in%20practice%2C%20and%20is%20unsuitable%20for%20evaluating%20the%20global%20accuracy%20of%20RTK-SLAM.%20We%20present%20a%20geodetically%20referenced%20dataset%20and%20evaluation%20methodology%20that%20expose%20this%20gap.%20A%20key%20design%20principle%20is%20that%20the%20RTK%20receiver%20is%20used%20solely%20as%20a%20system%20input%2C%20while%20ground%20truth%20is%20established%20independently%20via%20a%20geodetic%20total%20station.%20This%20separation%20is%20absent%20from%20all%20existing%20datasets%2C%20where%20GNSS%20typically%20serves%20as%20%28part%20of%29%20the%20ground%20truth.%20The%20dataset%20is%20collected%20with%20a%20handheld%20RTK-SLAM%20device%2C%20comprising%20two%20scenes.%20We%20evaluate%20LiDAR-inertial%2C%20visual-inertial%2C%20and%20LiDAR-visual-inertial%20RTK-SLAM%20systems%20alongside%20standalone%20RTK%2C%20reporting%20direct%20global%20accuracy%20and%20SE%283%29-aligned%20relative%20accuracy%20to%20make%20the%20gap%20explicit.%20Results%20show%20that%20SE%283%29%20alignment%20can%20underestimate%20absolute%20positioning%20error%20by%20up%20to%2076%5C%25.%20RTK-SLAM%20achieves%20centimeter-level%20absolute%20accuracy%20in%20open-sky%20conditions%20and%20maintains%20decimeter-level%20global%20accuracy%20indoors%2C%20where%20standalone%20RTK%20degrades%20to%20tens%20of%20meters.%20The%20dataset%2C%20calibration%20files%2C%20and%20evaluation%20scripts%20are%20publicly%20available%20at%20https%3A//rtk-slam-dataset.github.io/.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07151v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAn%2520RTK-SLAM%2520Dataset%2520for%2520Absolute%2520Accuracy%2520Evaluation%2520in%2520GNSS-Degraded%2520Environments%26entry.906535625%3DWei%2520Zhang%2520and%2520Vincent%2520Ress%2520and%2520David%2520Skuddis%2520and%2520Uwe%2520Soergel%2520and%2520Norbert%2520Haala%26entry.1292438233%3DRTK-SLAM%2520systems%2520integrate%2520simultaneous%2520localization%2520and%2520mapping%2520%2528SLAM%2529%2520with%2520real-time%2520kinematic%2520%2528RTK%2529%2520GNSS%2520positioning%252C%2520promising%2520both%2520relative%2520consistency%2520and%2520globally%2520referenced%2520coordinates%2520for%2520efficient%2520georeferenced%25 {"title": "Genie Sim PanoRecon: Fast Immersive Scene Generation from Single-View Panorama", "author": "Zhijun Li and Yongxin Su and Di Yang and Jichao Wang and Zheyuan Xing and Qian Wang and Maoqing Yao", "abstract": "We present Genie Sim PanoRecon, a feed-forward Gaussian-splatting pipeline that delivers high-fidelity, low-cost 3D scenes for robotic manipulation simulation. The panorama input is decomposed into six non-overlapping cube-map faces, processed in parallel, and seamlessly reassembled. To guarantee geometric consistency across views, we devise a depth-aware fusion strategy coupled with a training-free depth-injection module that steers the monocular feed-forward network to generate coherent 3D Gaussians. The whole system reconstructs photo-realistic scenes in seconds and has been integrated into Genie Sim - a LLM-driven simulation platform for embodied synthetic data generation and evaluation - to provide scalable backgrounds for manipulation tasks. For code details, please refer to: https://github.com/AgibotTech/genie_sim/tree/main/source/geniesim_world.", "link": "http://arxiv.org/abs/2604.07105v1", "date": "2026-04-08", "relevancy": 2.6042, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6583}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.6506}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.634}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Genie%20Sim%20PanoRecon%3A%20Fast%20Immersive%20Scene%20Generation%20from%20Single-View%20Panorama&body=Title%3A%20Genie%20Sim%20PanoRecon%3A%20Fast%20Immersive%20Scene%20Generation%20from%20Single-View%20Panorama%0AAuthor%3A%20Zhijun%20Li%20and%20Yongxin%20Su%20and%20Di%20Yang%20and%20Jichao%20Wang%20and%20Zheyuan%20Xing%20and%2 -map%2520faces%252C%2520processed%2520in%2520parallel%252C%2520and%2520seamlessly%2520reassembled.%2520To%2520guarantee%2520geometric%2520consistency%2520across%2520views%252C%2520we%2520devise%2520a%2520depth-aware%2520fusion%2520strategy%2520coupled%2520with%2520a%2520training-free%2520depth-injection%2520module%2520that%2520steers%2520the%2520monocular%2520feed-forward%2520network%2520to%2520generate%2520coherent%25203D%2520Gaussians.%2520The%2520whole%2520system%2520reconstructs%2520photo-realistic%2520scenes%2520in%2520seconds%2520and%2520has%2520been%2520integrated%2520into%2520Genie%2520Sim%2520-%2520a%2520LLM-driven%2520simulation%2520platform%2520for%2520embodied%2520synthetic%2520data%2520generation%2520and%2520evaluation%2520-%2520to%2520provide%2520scalable%2520backgrounds%2520for%2520manipulation%2520tasks.%2520For%2520code%2520details%252C%2520please%2520refer%2520to%253A%2520https%253A//github.com/AgibotTech/genie_sim/tree/main/source/geniesim_world.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.07105v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Genie%20Sim%20PanoRecon%3A%20Fast%20Immersive%20Scene%20Generation%20from%20Single-View%20Panorama&entry.906535625=Zhijun%20Li%20and%20Yongxin%20Su%20and%20Di%20Yang%20and%20Jichao%20Wang%20and%20Zheyuan%20Xing%20and%20Qian%20Wang%20and%20Maoqing%20Yao&entry.1292438233=We%20present%20Genie%20Sim%20PanoRecon%2C%20a%20feed-forward%20Gaussian-splatting%20pipeline%20that%20delivers%20high-fidelity%2C%20low-cost%203D%20scenes%20for%20robotic%20manipulation%20simulation.%20The%20panorama%20input%20is%20decomposed%20into%20six%20non-overlapping%20cube-map%20faces%2C%20processed%20in%20parallel%2C%20and%20seamlessly%20reassembled.%20To%20guarantee%20geometric%20consistency%20across%20views%2C%20we%20devise%20a%20depth-aware%20fusion%20strategy%20coupled%20with%20a%20training-free%20depth-injection%20modul {"title": "VHOI: Controllable Video Generation of Human-Object Interactions from Sparse Trajectories via Motion Densification", "author": "Wanyue Zhang and Lin Geng Foo and Thabo Beeler and Rishabh Dabral and Christian Theobalt", "abstract": "Synthesizing realistic human-object interactions (HOI) in video is challenging due to the complex, instance-specific interaction dynamics of both humans and objects. Incorporating controllability in video generation further adds to the complexity. Existing controllable video generation approaches face a trade-off: sparse controls like keypoint trajectories are easy to specify but lack instance-awareness, while dense signals such as optical flow, depths or 3D meshes are informative but costly to obtain. We propose VHOI, a two-stage framework that first densifies sparse trajectories into HOI mask sequences, and then fine-tunes a video diffusion model conditioned on these dense masks. We introduce a novel HOI-aware motion representation that uses color encodings to distinguish not only human and object motion, but also body-part-specific dynamics. This design incorporates a human prior into the conditioning signal and strengthens the model's ability to understand and generate realistic HOI dynamics. Experiments demonstrate state-of-the-art results in controllable HOI video generation. VHOI is not limited to interaction-only scenarios and can also generate full human navigation leading up to object interactions in an end-to-end manner. Project page: https://vcai.mpi-inf.mpg.de/projects/vhoi/.", "link": "http://arxiv.org/abs/2512.09646v2", "date": "2026-04-08", "relevancy": 2.5904, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6936}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6151}, {"title": "VirtualModel: Generating Object-ID-retentive Human-object Interaction\n  Image by Diffusion Model for E-commerce Marketing", "link": "http://arxiv.org/abs/2405.09985v1", "similarity": 0.6146}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VHOI%3A%20Controllable%20Video%20Generation%20of%20Human-Object%20Interactions%20from%20Sparse%20Trajectories%20via%20Motion%20Densification&body=Title%3A%20VHOI%3A%20Controllable%20Video%20Generation%20of%20Human-Object%20Interactions%20from%20Sparse%20Trajectories%20via%20Motion%20Densification%0AAuthor%3A%20Wanyue%20Zhang%20and%20Lin%20Geng%20Foo%20and%20Thabo%20Beeler%20and%20Rishabh%20Dabral%20and%20Christian%20Theobalt%0AAbstract%3A%20Synthesizing%20realistic%20human-object%20interactions%20%28HOI%29%20in%20video%20is%20challenging%20due%20to%20the%20complex%2C%20instance-specific%20interaction%20dynamics%20of%20both%20humans%20and%20objects.%20Incorporating%20controllability%20in%20video%20generation%20further%20adds%20to%20the%20complexity.%20Existing%20controllable%20video%20generation%20approaches%20face%20a%20trade-off%3A%20sparse%20controls%20like%20keypoint%20trajectories%20are%20easy%20to%20specify%20but%20lack%20instance-awareness%2C%20while%20dense%20signals%20such%20as%20optical%20flow%2C%20depths%20or%203D%20meshes%20are%20informative%20but%20costly%20to%20obtain.%20We%20propose%20VHOI%2C%20a%20two-stage%20framework%20that%20first%20densifies%20sparse%20trajectories%20into%20HOI%20mask%20sequences%2C%20and%20then%20fine-tunes%20a%20video%20diffusion%20model%20conditioned%20on%20these%20dense%20masks.%20We%20introduce%20a%20novel%20HOI-aware%20motion%20representation%20that%20uses%20color%20encodings%20to%20distinguish%20not%20only%20human%20and%20object%20motion%2C%20but%20also%20body-part-specific%20dynamics.%20This%20design%20incorporates%20a%20human%20prior%20into%20the%20conditioning%20signal%20and%20strengthens%20the%20model%27s%20ability%20to%20understand%20and%20generate%20realistic%20HOI%20dynamics.%20Experiments%20demonstrate%2 {"title": "How to Embed Matters: Evaluation of EO Embedding Design Choices", "author": "Luis Gilch and Isabelle Wittmann and Maximilian Nitsche and Johannes Jakubik and Arne Ewald and Thomas Brunschwiler", "abstract": "Earth observation (EO) missions produce petabytes of multispectral imagery, increasingly analyzed using large Geospatial Foundation Models (GeoFMs). Alongside end-to-end adaptation, workflows make growing use of intermediate representations as task-agnostic embeddings, enabling models to compute representations once and reuse them across downstream tasks. Consequently, when GeoFMs act as feature extractors, decisions about how representations are obtained, aggregated, and combined affect downstream performance and pipeline scalability. Understanding these trade-offs is essential for scalable embedding-based EO workflows, where compact embeddings can replace raw data while remaining broadly useful. We present a systematic analysis of embedding design in GeoFM-based EO workflows. Leveraging NeuCo-Bench, we study how backbone architecture, pretraining strategy, representation depth, spatial aggregation, and representation combination influence EO task performance. We demonstrate the usability of GeoFM embeddings by aggregating them into fixed-size representations more than 500x smaller than the raw input data. Across models, we find consistent trends: transformer backbones with mean pooling provide strong default embeddings, intermediate ResNet layers can outperform final layers, self-supervised objectives exhibit task-specific strengths, and combining embeddings from different objectives often improves robustness.", "link": "http://arxiv.org/abs/2603.10658v2", "date": "2026-04-08", "relevancy": 2.5734, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5388}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5388}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4665}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20How%20to%20Embed%20Matters%3A%20Evaluation%20of%20EO%20Embedding%20Design%20Choices&body=Title%3A%20How%20to%20Embed%20Matters%3A%20Evaluation%20of%20EO%20Embedding%20Design%20Choices%0AAuthor%3A%20Luis%20Gilch%20and%20Isabelle%20Wittmann%20and%20Maximilian%20Nitsche%20and%20Johannes%20Jakubik%20and%20Arne%20Ewald%20and%20Thomas%20Brunschwiler%0AAbstract%3A%20Earth%20observation%20%28EO%29%20missions%20produce%20petabytes%20of%20multispectral%20imagery%2C%20increasingly%20analyzed%20using%20large%20Geospatial%20Foundation%20Models%20%28GeoFMs%29.%20Alongside%20end-to-end%20adaptation%2C%20workflows%20make%20growing%20use%20of%20intermediate%20representations%20as%20task-agnostic%20embeddings%2C%20enabling%20models%20to%20compute%20representations%20once%20and%20reuse%20them%20across%20downstream%20tasks.%20Consequently%2C%20when%20GeoFMs%20act%20as%20feature%20extractors%2C%20decisions%20about%20how%20representations%20are%20obtained%2C%20aggregated%2C%20and%20combined%20affect%20downstream%20performance%20and%20pipeline%20scalability.%20Understanding%20these%20trade-offs%20is%20essential%20for%20scalable%20embedding-based%20EO%20workflows%2C%20where%20compact%20embeddings%20can%20replace%20raw%20data%20while%20remaining%20broadly%20useful.%20We%20present%20a%20systematic%20analysis%20of%20embedding%20design%20in%20GeoFM-based%20EO%20workflows.%20Leveraging%20NeuCo-Bench%2C%20we%20study%20how%20backbone%20architecture%2C%20pretraining%20strategy%2C%20representation%20depth%2C%20spatial%20aggregation%2C%20and%20representation%20combination%20influence%20EO%20task%20performance.%20We%20demonstrate%20the%20usability%20of%20GeoFM%20embeddings%20by%20aggregating%20them%20into%20fixed-size%20representations%20more%20than%20500x%20smaller%20than%20the%20raw%20input%20data.%20Across%20models%2C%20we%20find%20consistent%20trends%3A%20transformer%20backbones%20with%20mean%20pooling%20provide%20strong%20default%20embeddings%2C%20intermediate%20ResNet%20layers%20can%20outperform%20final%20layers%2C%20self-supervised%20objectives%20exhibit%20task-specific%20strengths%2C%20and%20combining%20embeddings%20from%20different%20objectives%20often%20improves%20robustness.%0ALink%3A%20http%3A//arxiv.org/abs/2603.10658v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHow%2520to%2520Embed%2520Matters%253A%2520Evaluation%2520of%2520EO%2520Embedding%2520Design%2520Choices%26entry.906535625%3DLuis%2520Gilch%2520and%2520Isabelle%2520Wittmann%2520and%2520Maximilian%2520Nitsche%2520and%2520Johannes%2520Jakubik%2520and%2520Arne%2520Ewald%2520and%2520Thomas%2520Brunschwiler%26entry.1292438233%3DEarth%2520observation%2520%2528EO%2529%2520missions%2520produce%2520petabytes%2520of%2520multispectral%2520imagery%252C%2520increasingly%2520analyzed%2520using%2520large%2520Geospatial%2520Foundation%2520Models%2520%2528GeoFMs%2529.%2520Alongside%2520end-to-end%2520adaptation%252C%2520workflows%2520make%2520growing%2520use%2520of%2520intermediate%2520representations%2520as%2520task-agnostic%2520embeddings%252C%2520enabling%2520models%2520to%2520compute%2520representations%2520once%2520and%2520reuse%2520them%2520across%2520downstream%2520tasks.%2520Consequently%252C%2520when%2520GeoFMs%2520act%2520as%2520feature%2520extractors%252C%2520decisions%2520about%2520how%2520representations%2520are%2520obtained%252C%2520aggregated%252C%2520and%2520combined%2520affect%2520downstream%2520performance%2520and%2520pipeline%2520scalability.%2520Understanding%2520these%2520trade-offs%2520is%2520essential%2520for%2520scalable%2520embedding-based%2520EO%2520workflows%252C%2520where%2520compact%2520embeddings%2 {"title": "PRISM: Programmatic Reasoning with Image Sequence Manipulation for LVLM Jailbreaking", "author": "Quanchen Zou and Zonghao Ying and Moyang Chen and Wenzhuo Xu and Yisong Xiao and Yakai Li and Deyue Zhang and Dongdong Yang and Zhao Liu and Xiangzheng Zhang", "abstract": "The increasing sophistication of large vision-language models (LVLMs) has been accompanied by advances in safety alignment mechanisms designed to prevent harmful content generation. However, these defenses remain vulnerable to sophisticated adversarial attacks. Existing jailbreak methods typically rely on direct and semantically explicit prompts, overlooking subtle vulnerabilities in how LVLMs compose information over multiple reasoning steps. In this paper, we propose a novel and effective jailbreak framework inspired by Return-Oriented Programming (ROP) techniques from software security. Our approach decomposes a harmful instruction into a sequence of individually benign visual gadgets. A carefully engineered textual prompt directs the sequence of inputs, prompting the model to integrate the benign visual gadgets through its reasoning process to produce a coherent and harmful output. This makes the malicious intent emergent and difficult to detect from any single component. We validate our method through extensive experiments on established benchmarks including SafeBench and MM-SafetyBench, targeting popular LVLMs. Results show that our approach consistently and substantially outperforms existing baselines on state-of-the-art models, achieving near-perfect attack success rates (over 0.90 on SafeBench) and improving ASR by up to 0.39. Our findings reveal a critical and underexplored vulnerability that exploits the compositional reasoning abilities of LVLMs, highlighting the urgent need for defenses that secure the entire reasoning process.", "link": "http://arxiv.org/abs/2507.21540v3", "date": "2026-04-08", "relevancy": 2.5722, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Mode {"title": "SonoSelect: Efficient Ultrasound Perception via Active Probe Exploration", "author": "Yixin Zhang and Yunzhong Hou and Longqi Li and Zhenyue Qin and Yang Liu and Yue Yao", "abstract": "Ultrasound perception typically requires multiple scan views through probe movement to reduce diagnostic ambiguity, mitigate acoustic occlusions, and improve anatomical coverage. However, not all probe views are equally informative. Exhaustively acquiring a large number of views can introduce substantial redundancy, increase scanning and processing costs. To address this, we define an active view exploration task for ultrasound and propose SonoSelect, an ultrasound-specific method that adaptively guides probe movement based on current observations. Specifically, we cast ultrasound active view exploration as a sequential decision-making problem. Each new 2D ultrasound view is fused into a 3D spatial memory of the observed anatomy, which guides the next probe position. On top of this formulation, we propose an ultrasound-specific objective that favors probe movements with greater organ coverage, lower reconstruction uncertainty, and less redundant scanning. Experiments on the ultrasound simulator show that SonoSelect achieves promising multi-view organ classification accuracy using only 2 out of N views. Furthermore, for a more difficult kidney cyst detection task, it reaches 54.56% kidney coverage and 35.13% cyst coverage, with short trajectories consistently centered on the target cyst.", "link": "http://arxiv.org/abs/2604.05933v2", "date": "2026-04-08", "relevancy": 2.5486, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5181}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5181}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.493}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SonoSelect%3A%20Efficient%20Ultrasound%20Perception%20via%20Active%20Probe%20Exploration&body=Title%3A%20SonoSelect%3A%20Efficient%20Ultrasound%20Perception%20via%20Active%20Probe%20Exploration%0AAuthor%3A%20Yixin%20Zhang%20and%20Yunzhong%20Hou%20and%20Longqi%20Li%20and%20Zhenyue%20Qin%20and%20Yang%20Liu%20and%20Yue%20Yao%0AAbstract%3A%20Ultrasound%20perception%20typically%20requires%20multiple%20scan%20views%20through%20probe%20movement%20to%20reduce%20diagnostic%20ambiguity%2C%20mitigate%20acoustic%20occlusions%2C%20and%20improve%20anatomical%20coverage.%20However%2C%20not%20all%20probe%20views%20are%20equally%20informative.%20Exhaustively%20acquiring%20a%20large%20number%20of%20views%20can%20introduce%20substantial%20redundancy%2C%20increase%20scanning%20and%20processing%20costs.%20To%20address%20this%2C%20we%20define%20an%20active%20view%20exploration%20task%20for%20ultrasound%20and%20propose%20SonoSelect%2C%20an%20ultrasound-specific%20method%20that%20adaptively%20guides%20probe%20movement%20based%20on%20current%20observations.%20Specifically%2C%20we%20cast%20ultrasound%20active%20view%20exploration%20as%20a%20sequential%20decision-making%20problem.%20Each%20new%202D%20ultrasound%20view%20is%20fused%20into%20a%203D%20spatial%20memory%20of%20the%20observed%20anatomy%2C%20which%20guides%20the%20next%20probe%20position.%20On%20top%20of%20this%20formulation%2C%20we%20propose%20an%20ultrasound-specific%20objective%20that%20favors%20probe%20movements%20with%20greater%20organ%20coverage%2C%20lower%20reconstruction%20uncertainty%2C%20and%20less%20redundant%20scanning.%20Experiments%20on%20the%20ultrasound%20simulator%20show%20that%20SonoSelect%20achieves%20promising%20multi-view%20organ%20classification%20accuracy%20using%20only%202%20out%20of%20N%20views.%20Furthermore%2C%20for%20a%20more%20difficult%20kidney%20cyst%20detection%20task%2C%20it%20reaches%2054.56%25%20kidney%20coverage%20and%2035.13%25%20cyst%20coverage%2C%20with%20short%20trajectories%20consistently%20centered%20on%20the%20target%20cyst.%0ALink%3A%20http%3A//arxiv.org/abs/2604.05933v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSonoSelect%253A%2520Efficient%2520Ultrasound%2520Perception%2520via%2520Active%2520Probe%2520Exploration%26entry.906535625%3DYixin%2520Zhang%2520and%2520Yunzhong%2520Hou%2520and%2520Longqi%2520Li%2520and%2520Zhenyue%2520Qin%2520and%2520Yang%2520Liu%2520and%2520Yue%2520Yao%26entry.1292438233%3DUltrasound%2520perception%2520typically%2520requires%2520multiple%2520scan%2520views%2520through%2520probe%2520movement%2520to%2520reduce%2520diagnostic%2520ambiguity%252C%2520mitigate%2520acoustic%2520occlusions%252C%2520and%2520improve%2520anatomical%2520coverage.%2520However%252C%2520not%2520all%2520probe%2520views%2520are%2520equally%2520informative.%2520Exhaustively%2520acquiring%2520a%2520large%2520number%2520of%2520views%2520can%2520introduce%2520substantial%2520redundancy%252C%2520increase%2520scanning%2520and%2520processing%2520costs.%2520To%2520address%2520this%252C%2520we%2520define%2520an%2520active%2520view%2520exploration%2520task%2520for%2520ultrasound%2520and%2520propose%2520SonoSelect%252C%2520an%2520ultrasound-specific%2520method%2520that%2520adaptively%2520guides%2520probe%2520movement%2520based%2520on%2520current%2520observations.%2520Specifically%252C%2520we%2520cast%2520ultrasound%2520active%2520view%2520exploration%2520as%2520a%2520sequential%2520decision-making%2520problem.%2520Each%2520new%25202D%2520ultrasound%2520view%2520is%2520fused%2520into%2520a%25203D%2520spatial%2520memory%2520of%2520the%2520observed%2520anatomy%252C%2520which%2520guides%2520the%2520next%2520probe%2520position.%2520On%2520top%2520of%2520this%2520formulation%252C%2520we%2520propose%2520an%2520ultrasound-specific%2520objective%2520that%2520favors%2520probe%2520movements%2520with%2520greater%2520organ%2520coverage%252C%2520lower%2520reconstruction%2520uncertainty%252C%2520and%2520less%2520redundant%2520scanning.%2520Experiments%2520on%2520the%2520ultrasound%2520simulator%2520show%2520that%2520SonoSelect%2520achieves%2520promising%2520multi-view%2520organ%2520classification%2520accuracy%2520using%2520only%25202%2520out%2520of%2520N%2520views.%2520Furthermore%252C%2520for%2520a%2520more%2520difficult%2520kidney%2520cyst%2520detection%2520task%252C%2520it%2520reaches%252054.56%2525%2520kidney%2520coverage%2520and%252035.13%2525%2520cyst%2520coverage%252C%2520with%2520short%2520trajectories%2520consistently%2520centered%2520on%2520the%2520target%2520cyst.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.05933v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SonoSelect%3A%20Efficient%20Ultrasound%20Perception%20via%20Active%20Probe%20Exploration&entry.906535625=Yixin%20Zhang%20and%20Yunzhong%20Hou%20and%20Longqi%20Li%20and%20Zhenyue%20Qin%20and%20Yang%20Liu%20and%20Yue%20Yao&entry.1292438233=Ultrasound%20perception%20typically%20requires%20multiple%20scan%20views%20through%20probe%20movement%20to%20reduce%20diagnostic%20ambiguity%2C%20mitigate%20acoustic%20occlusions%2C%20and%20improve%20anatomical%20coverage.%20However%2C%20not%20all%20probe%20views%20are%20equally%20informative.%20Exhaustively%20acquiring%20a%20large%20number%20of%20views%20can%20introduce%20substantial%20redundancy%2C%20increase%20scanning%20and%20processing%20costs.%20To%20address%20this%2C%20we%20define%20an%20active%20view%20exploration%20task%20for%20ultrasound%20and%20propose%20SonoSelect%2C%20an%20ultrasound-specific%20method%20that%20adaptively%20guides%20probe%20movement%20based%20on%20current%20observations.%20Specifically%2C%20we%20cast%20ultrasound%20active%20view%20exploration%20as%20a%20sequential%20decisio {"title": "Region-Graph Optimal Transport Routing for Mixture-of-Experts Whole-Slide Image Classification", "author": "Xin Tian and Jiuliu Lu and Ephraim Tsalik and Bart Wanders and Colleen Knoth and Julian Knight", "abstract": "Multiple Instance Learning (MIL) is the dominant framework for gigapixel whole-slide image (WSI) classification in computational pathology. However, current MIL aggregators route all instances through a shared pathway, constraining their capacity to specialise across the pathological heterogeneity inherent in each slide. Mixture-of-Experts (MoE) methods offer a natural remedy by partitioning instances across specialised expert subnetworks; yet unconstrained softmax routing may yield highly imbalanced utilisation, where one or a few experts absorb most routing mass, collapsing the mixture back to a near-single-pathway solution. To address these limitations, we propose ROAM (Region-graph OptimAl-transport Mixture-of-experts), a spatially aware MoE-MIL aggregator that routes region tokens to expert poolers via capacity-constrained entropic optimal transport, promoting balanced expert utilisation by construction. ROAM operates on spatial region tokens, obtained by compressing dense patch bags into spatially binned units that align routing with local tissue neighbourhoods and introduces two key mechanisms: (i) region-to-expert assignment formulated as entropic optimal transport (Sinkhorn) with explicit per slide capacity marginals, enforcing balanced expert utilisation without auxiliary load-balancing losses; and (ii) graph-regularised Sinkhorn iterations that diffuse routing assignments over the spatial region graph, encouraging neighbouring regions to coherently route to the same experts. Evaluated on four WSI benchmarks with frozen foundation-model patch embeddings, ROAM achieves performance competitive against strong MIL and MoE baselines, and on NSCLC generalisation (TCGA-CPTAC) reaches external AUC 0.845 +- 0.019.", "link": "http://arxiv.org/abs/2604.07298v1", "date": "2026-04-08", "relevancy": 2.5445, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5396}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4984}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4887}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Region-Graph%20Optimal%20Transport%20Routing%20for%20Mixture-of-Experts%20Whole-Slide%20Image%20Classification&body=Title%3A%20Region-Graph%20Optimal%20Transport%20Routing%20for%20Mixture-of-Experts%20Whole-Slide%20Image%20Classification%0AAuthor%3A%20Xin%20Tian%20and%20Jiuliu%20Lu%20and%20Ephraim%20Tsalik%20and%20Bart%20Wanders%20and%20Colleen%20Knoth%20and%20Julian%20Knight%0AAbstract%3A%20Multiple%20Instance%20Learning%20%28MIL%29%20is%20the%20dominant%20framework%20for%20gigapixel%20whole-slide%20image%20%28WSI%29%20classification%20in%20computational%20pathology.%20However%2C%20current%20MIL%20aggregators%20route%20all%20instances%20through%20a%20shared%20pathway%2C%20constraining%20their%20capacity%20to%20specialise%20across%20the%20pathological%20heterogeneity%20inherent%20in%20each%20slide.%20Mixture-of-Experts%20%28MoE%29%20methods%20offer%20a%20natural%20remedy%20by%20partitioning%20instances%20across%20specialised%20expert%20subnetworks%3B%20yet%20unconstrained%20softmax%20routing%20may%20yield%20highly%20imbalanced%20utilisation%2C%20where%20one%20or%20a%20few%20experts%20absorb%20most%20routing%20mass%2C%20collapsing%20the%20mixture%20back%20to%20a%20near-single-pathway%20solution.%20To%20address%20these%20limitations%2C%20we%20propose%20ROAM%20%28Region-graph%20OptimAl-transport%20Mixture-of-experts%29%2C%20a%20spatially%20aware%20MoE-MIL%20aggregator%20that%20routes%20region%20tokens%20to%20expert%20poolers%20via%20capacity-constrained%20entropic%20optimal%20transport%2C%20promoting%20balanced%20expert%20utilisation%20by%20construction.%20ROAM%20operates%20on%20spatial%20region%20tokens%2C%20obtained%20by%20compressing%20dense%20patch%20bags%20into%20spatially%20binned%20units%20that%20align%20routing%20with%20local%20tissue%20neighbourhoods%20and%20introduces%20two%20key%20mechanisms%3A%20%28i%29%20region-to-expert%20assignment%20formulated%20as%20entropic%20optimal%20transport%20%28Sinkhorn%29%20with%20explicit%20per%20slide%20capacity%20marginals%2C%20enforcing%20balanced%20expert%20utilisation%20without%20auxiliary%20load-balancing%20losses%3B%20and%20%28ii%29%20graph-regularised%20Sinkhorn%20iterations%20that%20diffuse%20routing%20assignments%20over%20the%20spatial%20region%20graph%2C%20encouraging%20neighbouring%20regions%20to%20coherently%20route%20to%20the%20same%20experts.%20Evaluated%20on%20four%20WSI%20benchmarks%20with%20frozen%20foundation-model%20patch%20embeddings%2C%20ROAM%20achieves%20performance%20competitive%20against%20strong%20MIL%20and%20MoE%20baselines%2C%20and%20on%20NSCLC%20generalisation%20%28TCGA-CPTAC%29%20reaches%20external%20AUC%200.845%20%2B-%200.019.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07298v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRegion-Graph%2520Optimal%2520Transport%2520Routing%2520for%2520Mixture-of-Experts%2520Whole-Slide%2520Image%2520Classification%26entry.906535625%3DXin%2520Tian%2520and%2520Jiuliu%2520Lu%2520and%2520Ephraim%2520Tsalik%2520and%2520Bart%2520Wanders%2520and%2520Colleen%2520Knoth%2520and%2520Julian%2520Knight%26entry.1292438233%3DMultiple%2520Instance%2520Learning%2520%2528MIL%2529%2520is%2520the%2520dominant%2520framework%2520for%2520gigapixel%2520whole-slide%2520image%2520%2528WSI%2529%2520classification%2520in%2520computational% {"title": "VersaVogue: Visual Expert Orchestration and Preference Alignment for Unified Fashion Synthesis", "author": "Jian Yu and Fei Shen and Cong Wang and Yi Xin and Si Shen and Xiaoyu Du and Jinhui Tang", "abstract": "Diffusion models have driven remarkable advancements in fashion image generation, yet prior works usually treat garment generation and virtual dressing as separate problems, limiting their flexibility in real-world fashion workflows. Moreover, fashion image synthesis under multi-source heterogeneous conditions remains challenging, as existing methods typically rely on simple feature concatenation or static layer-wise injection, which often causes attribute entanglement and semantic interference. To address these issues, we propose VersaVogue, a unified framework for multi-condition controllable fashion synthesis that jointly supports garment generation and virtual dressing, corresponding to the design and showcase stages of the fashion lifecycle. Specifically, we introduce a trait-routing attention (TA) module that leverages a mixture-of-experts mechanism to dynamically route condition features to the most compatible experts and generative layers, enabling disentangled injection of visual attributes such as texture, shape, and color. To further improve realism and controllability, we develop an automated multi-perspective preference optimization (MPO) pipeline that constructs preference data without human annotation or task-specific reward models. By combining evaluators of content fidelity, textual alignment, and perceptual quality, MPO identifies reliable preference pairs, which are then used to optimize the model via direct preference optimization (DPO). Extensive experiments on both garment generation and virtual dressing benchmarks demonstrate that VersaVogue consistently outperforms existing methods in visual fidelity, semantic consistency, and fine-grained controllability.", "link": "http://arxiv.org/abs/2604.07210v1", "date": "2026-04-08", {"title": "Nirvana: A Specialized Generalist Model With Task-Aware Memory Mechanism", "author": "Yuhua Jiang and Shuang Cheng and Yihao Liu and Ermo Hua and Che Jiang and Weigao Sun and Yu Cheng and Feifei Gao and Biqing Qi and Bowen Zhou", "abstract": "Large Language Models (LLMs) excel at general language tasks but struggle in specialized domains. Specialized Generalist Models (SGMs) address this by preserving broad capabilities while adapting to target domains. However, existing architectures provide limited support for task-guided specialized memory mechanisms. In this work, we introduce Nirvana, an SGM featuring specialized memory, linear-time complexity, and test-time task information extraction. Central to Nirvana are: (1) Task-Aware Memory Trigger ($\\textit{Trigger}$), which treats each input as a self-supervised fine-tuning task and adjusts task-related parameters on the fly; and (2) Specialized Memory Updater ($\\textit{Updater}$), which dynamically consolidates task-relevant context. Nirvana matches or surpasses LLM baselines on general benchmarks and achieves the lowest perplexity across specialized domains including biomedicine, finance, and law. On the challenging task of Magnetic Resonance Imaging (MRI), we attach lightweight codecs to the frozen Nirvana backbone and fine-tune them on paired k-space signals and images. Nirvana achieves higher-fidelity reconstructions than conventional LLM-based models, with Trigger providing effective domain-specific adaptation. Ablation studies confirm that removing Trigger leads to substantial degradation across all tasks, underscoring its essential role in task-aware specialization. Models are available at https://huggingface.co/collections/YuhuaJiang/nirvana. Code is available at https://github.com/YuhuaJiang2002/Nirvana.", "link": "http://arxiv.org/abs/2510.26083v2", "date": "2026-04-08", "relevancy": 2.521, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", " 20across%20specialized%20domains%20including%20biomedicine%2C%20finance%2C%20and%20law.%20On%20the%20challenging%20task%20of%20Magnetic%20Resonance%20Imaging%20%28MRI%29%2C%20we%20attach%20lightweight%20codecs%20to%20the%20frozen%20Nirvana%20backbone%20and%20fine-tune%20them%20on%20paired%20k-space%20signals%20and%20images.%20Nirvana%20achieves%20higher-fidelity%20reconstructions%20than%20conventional%20LLM-based%20models%2C%20with%20Trigger%20providing%20effective%20domain-specific%20adaptation.%20Ablation%20studies%20confirm%20that%20removing%20Trigger%20leads%20to%20substantial%20degradation%20across%20all%20tasks%2C%20underscoring%20its%20essential%20role%20in%20task-aware%20specialization.%20Models%20are%20available%20at%20https%3A//huggingface.co/collections/YuhuaJiang/nirvana.%20Code%20is%20available%20at%20https%3A//github.com/YuhuaJiang2002/Nirvana.%0ALink%3A%20http%3A//arxiv.org/abs/2510.26083v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNirvana%253A%2520A%2520Specialized%2520Generalist%2520Model%2520With%2520Task-Aware%2520Memory%2520Mechanism%26entry.906535625%3DYuhua%2520Jiang%2520and%2520Shuang%2520Cheng%2520and%2520Yihao%2520Liu%2520and%2520Ermo%2520Hua%2520and%2520Che%2520Jiang%2520and%2520Weigao%2520Sun%2520and%2520Yu%2520Cheng%2520and%2520Feifei%2520Gao%2520and%2520Biqing%2520Qi%2520and%2520Bowen%2520Zhou%26entry.1292438233%3DLarge%2520Language%2520Models%2520%2528LLMs%2529%2520excel%2520at%2520general%2520language%2520tasks%2520but%2520struggle%2520in%2520specialized%2520domains.%2520Specialized%2520Generalist%2520Models%2520%2528SGMs%2529%2520address%2520this%2520by%2520preserving%2520broad%2520capabilities%2520while%2520adapting%2520to%2520target%2520domains.%2520However%252C%2520existing%2520architectures%2520provide%2520limited%2520support%2520for%2520task-guided%2520specialized%2520memory%2520mechanisms.%2520In%2520this%2520work%252C%2520we%2520introdu {"title": "Efficient Image-to-Image Schr\u00f6dinger Bridge for CT Field of View Extension", "author": "Zhenhao Li and Song Ni and Long Yang and Xiaojie Yin and Haijun Yu and Jiazhou Wang and Hongbin Han and Weigang Hu and Yixing Huang", "abstract": "Computed tomography (CT) is a cornerstone imaging modality for non-invasive, high-resolution visualization of internal anatomical structures. However, when the scanned object exceeds the scanner's field of view (FOV), projection data are truncated, resulting in incomplete reconstructions and pronounced artifacts near FOV boundaries. Conventional reconstruction algorithms struggle to recover accurate anatomy from such data, limiting clinical reliability. Deep learning approaches have been explored for FOV extension, with diffusion generative models representing the latest advances in image synthesis. Yet, conventional diffusion models are computationally demanding and slow at inference due to their iterative sampling process. To address these limitations, we propose an efficient CT FOV extension framework based on the image-to-image Schr\u00f6dinger Bridge (I$^2$SB) diffusion model. Unlike traditional diffusion models that synthesize images from pure Gaussian noise, I$^2$SB learns a direct stochastic mapping between paired limited-FOV and extended-FOV images. This direct correspondence yields a more interpretable and traceable generative process, enhancing anatomical consistency and structural fidelity in reconstructions. I$^2$SB achieves superior quantitative performance, with root-mean-square error (RMSE) values of 49.8 HU on simulated noisy data and 152.0 HU on real data, outperforming state-of-the-art diffusion models such as conditional denoising diffusion probabilistic models (cDDPM) and patch-based diffusion methods. Moreover, its one-step inference enables reconstruction in just 0.19 s per 2D slice, representing over a 700-fold speedup compared to cDDPM (135 s) and surpassing DiffusionGAN (0.58 s), the second fastest. This combination of accuracy and efficiency indicates that I$^2$SB has potential for real-time or clinical deployment.", "link": "http://arxiv.org/abs/2508.11211v2", "date": "2026-04-08", "relevancy": 2.511, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.6554}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6222}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6222}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Efficient%20Image-to-Image%20Schr%C3%B6dinger%20Bridge%20for%20CT%20Field%20of%20View%20Extension&body=Title%3A%20Efficient%20Image-to-Image%20Schr%C3%B6dinger%20Bridge%20for%20CT%20Field%20of%20View%20Extension%0AAuthor%3A%20Zhenhao%20Li%20and%20Song%20Ni%20and%20Long%20Yang%20and%20Xiaojie%20Yin%20and%20Haijun%20Yu%20and%20Jiazhou%20Wang%20and%20Hongbin%20Han%20and%20Weigang%20Hu%20and%20Yixing%20Huang%0AAbstract%3A%20Computed%20tomography%20%28CT%29%20is%20a%20cornerstone%20imaging%20modality%20for%20non-invasive%2C%20high-resolution%20visualization%20of%20internal%20anatomical%20structures.%20However%2C%20when%20the%20scanned%20object%20exceeds%20the%20scanner%27s%20field%20of%20view%20%28FOV%29%2C%20projection%20data%20are%20truncated%2C%20resulting%20in%20incomplete%20reconstructions%20and%20pronounced%20artifacts%20near%20FOV%20boundaries.%20Conventional%20reconstruction%20algorithms%20struggle%20to%20recover%20accurate%20anatomy%20from%20such%20data%2C%20limiting%20clinical%20reliability.%20Deep%20learning%20approaches%20have%20been%20explored%20for%20FOV%20extension%2C%20with%20diffusion%20generative%20models%20representing%20the%20latest%20advances%20in%20image%20synthesis.%20Yet%2C%20conventional%20diffusion%20models%20are%20computationally%20demanding%20and%20slow%20at%20inference%20due%20to%20their%20iterative%20sampling%20process.%20To%20address%20these%20limitations%2C%20we%20propose%20an%20efficient%20CT%20FOV%20extension%20framework%20based%20on%20the%20image-to-image%20Schr%C3%B6dinger%20Bridge%20%28I%24%5E2%24SB%29%20diffusion%20model.%20Unlike%20traditional%20diffusion%20models%20that%20synthesize%20images%20from%20pure%20Gaussian%20noise%2C%20I%24%5E2%24SB%20learns%20a%20direct%20stochastic%20mapping%20between%20paired%20limited-FOV%20and%20extended-FOV%20images.%20This%20direct%20correspondence%20yields%20a%20more%20interpretable%20and%20traceable%20generative%20process%2C%20enhancing%20anatomical%20consistency%20and%20structural%20fidelity%20in%20reconstructions.%20I%24%5E2%24SB%20achieves%20superior%20quantitative%20performance%2C%20with%20root-mean-square%20error%20%28RMSE%29%20values%20of%2049.8%20HU%20on%20simulated%20noisy%20data%20and%20152.0%20HU%20on%20real%20data%2C%20outperforming%20state-of-the-art%20diffusion%20models%20such%20as%20conditional%20denoising%20diffusion%20probabilistic%20models%20%28cDDPM%29%20and%20patch-based%20diffusion%20methods.%20Moreover%2C%20its%20one-step%20inference%20enables%20reconstruction%20in%20just%200.19%20s%20per%202D%20slice%2C%20representing%20over%20a%20700-fold%20speedup%20compared%20to%20cDDPM%20%28135%20s%29%20and%20surpassing%20DiffusionGAN%20%280.58%20s%29%2C%20the%20second%20fastest.%20This%20combination%20of%20accuracy%20and%20efficiency%20indicates%20that%20I%24%5E2%24SB%20has%20potential%20for%20real-time%20or%20clinical%20deployment.%0ALink%3A%20http%3A//arxiv.org/abs/2508.11211v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEfficient%2520Image-to-Image%2520Schr%25C3%25B6dinger%2520Bridge%2520for%2520CT%2520Field%2520of%2520View%2520Extension%26entry.906535625%3DZhenhao%2520Li%2520and%2520Song%2520Ni%2520and%2520Long%2520Yang%2520and%2520Xiaoji {"title": "Synthetic Dataset Generation for Partially Observed Indoor Objects", "author": "Jelle Vermandere and Maarten Bassier and Maarten Vergauwen", "abstract": "Learning-based methods for 3D scene reconstruction and object completion require large datasets containing partial scans paired with complete ground-truth geometry. However, acquiring such datasets using real-world scanning systems is costly and time-consuming, particularly when accurate ground truth for occluded regions is required.\n  In this work, we present a virtual scanning framework implemented in Unity for generating realistic synthetic 3D scan datasets. The proposed system simulates the behaviour of real-world scanners using configurable parameters such as scan resolution, measurement range, and distance-dependent noise. Instead of directly sampling mesh surfaces, the framework performs ray-based scanning from virtual viewpoints, enabling realistic modelling of sensor visibility and occlusion effects. In addition, panoramic images captured at the scanner location are used to assign colours to the resulting point clouds.\n  To support scalable dataset creation, the scanner is integrated with a procedural indoor scene generation pipeline that automatically produces diverse room layouts and furniture arrangements. Using this system, we introduce the \\textit{V-Scan} dataset, which contains synthetic indoor scans together with object-level partial point clouds, voxel-based occlusion grids, and complete ground-truth geometry. The resulting dataset provides valuable supervision for training and evaluating learning-based methods for scene reconstruction and object completion.", "link": "http://arxiv.org/abs/2604.07010v1", "date": "2026-04-08", "relevancy": 2.4786, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.6309}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http:/ {"title": "Selective Neuron Amplification for Training-Free Task Enhancement", "author": "Ryyan Akhtar", "abstract": "Large language models often fail on tasks they seem to already understand. In our experiments, this appears to be less about missing knowledge and more about certain internal circuits not being strongly activated during inference. We explore Selective Neuron Amplification, which increases the influence of task relevant neurons without changing the model's parameters. The method works at inference time and does not permanently alter the model. SNA helps mainly when the model is uncertain, while having low effect when the model is already confident. This suggests that some model failures are due to weak activation rather than lack of capability.", "link": "http://arxiv.org/abs/2604.07098v1", "date": "2026-04-08", "relevancy": 2.4737, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5211}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4815}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4815}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Selective%20Neuron%20Amplification%20for%20Training-Free%20Task%20Enhancement&body=Title%3A%20Selective%20Neuron%20Amplification%20for%20Training-Free%20Task%20Enhancement%0AAuthor%3A%20Ryyan%20Akhtar%0AAbstract%3A%20Large%20language%20models%20often%20fail%20on%20tasks%20they%20seem%20to%20already%20understand.%20In%20our%20experiments%2C%20this%20appears%20to%20be%20less%20about%20missing%20knowledge%20and%20more%20about%20certain%20internal%20circuits%20not%20being%20strongly%20activated%20during%20inference.%20We%20explore%20Selective%20Neuron%20Amplification%2C%20which%20increases%20the%20i {"title": "CAAP: Capture-Aware Adversarial Patch Attacks on Palmprint Recognition Models", "author": "Renyang Liu and Jiale Li and Jie Zhang and Cong Wu and Xiaojun Jia and Shuxin Li and Wei Zhou and Kwok-Yan Lam and See-kiong Ng", "abstract": "Palmprint recognition is deployed in security-critical applications, including access control and palm-based payment, due to its contactless acquisition and highly discriminative ridge-and-crease textures. However, the robustness of deep palmprint recognition systems against physically realizable attacks remains insufficiently understood. Existing studies are largely confined to the digital setting and do not adequately account for the texture-dominant nature of palmprint recognition or the distortions introduced during physical acquisition. To address this gap, we propose CAAP, a capture-aware adversarial patch framework for palmprint recognition. CAAP learns a universal patch that can be reused across inputs while remaining effective under realistic acquisition variation. To match the structural characteristics of palmprints, the framework adopts a cross-shaped patch topology, which enlarges spatial coverage under a fixed pixel budget and more effectively disrupts long-range texture continuity. CAAP further integrates three modules: ASIT for input-conditioned patch rendering, RaS for stochastic capture-aware simulation, and MS-DIFE for feature-level identity-disruptive guidance. We evaluate CAAP on the Tongji, IITD, and AISEC datasets against generic CNN backbones and palmprint-specific recognition models. Experiments show that CAAP achieves strong untargeted and targeted attack performance with favorable cross-model and cross-dataset transferability. The results further show that, although adversarial training can partially reduce the attack success rate, substantial residual vulnerability remains. These findings indicate that deep palmprint recognition systems remain vulnerable to physically realizable, capture-aware adversarial patch attacks, underscoring the need for more effective defenses in practice. Code available at https://github.com/ryliu68/CAAP.", "link": "http://arxiv.org/abs/2604.06987v1", "date": "2026-04-08", "relevancy": 2.4708, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5036}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4934}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4855}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CAAP%3A%20Capture-Aware%20Adversarial%20Patch%20Attacks%20on%20Palmprint%20Recognition%20Models&body=Title%3A%20CAAP%3A%20Capture-Aware%20Adversarial%20Patch%20Attacks%20on%20Palmprint%20Recognition%20Models%0AAuthor%3A%20Renyang%20Liu%20and%20Jiale%20Li%20and%20Jie%20Zhang%20and%20Cong%20Wu%20and%20Xiaojun%20Jia%20and%20Shuxin%20Li%20and%20Wei%20Zhou%20and%20Kwok-Yan%20Lam%20and%20See-kiong%20Ng%0AAbstract%3A%20Palmprint%20recognition%20is%20deployed%20in%20security-critical%20applications%2C%20including%20access%20control%20and%20palm-based%20payment%2C%20due%20to%20its%20contactless%20acquisition%20and%20highly%20discriminative%20ridge-and-crease%20textures.%20However%2C%20the%20robustness%20of%20deep%20palmprint%20recognition%20systems%20against%20physically%20realizable%20attacks%20remains%20insufficiently%20understood.%20Existing%20studies%20are%20largely%20confined%20to%20the%20digital%20setting%20and%20do%20not%20adequately%20account%20for%20the%20texture-dominant%20nature%20of%20palmprint%20recognition%20or%20the%20distortions%20introduced%20during%20physical%20acquisition.%20To%20address%20this%20gap%2C%20we%20propose%20CAAP%2C%20a%20capture-aware%20adversarial%20patch%20framework%20for%20palmprint%20recognition.%20CAAP%20learns%20a%20universal%20patch%20that%20can%20be%20reused%20across%20inputs%20while%20remaining%20effective%20under%20realistic%20acquisition%20variation.%20To%20match%20the%20structural%20characteristics%20of%20palmprints%2C%20the%20framework%20adopts%20a%20cross-shaped%20patch%20topology%2C%20which%20enlarges%20spatial%20coverage%20under%20a%20fixed%20pixel%20budget%20and%20more%20effectively%20disrupts%20long-range%20texture%20continuity.%20CAAP%20further%20integrates%20three%20modules%3A%20ASIT%20for%20input-conditioned%20patch%20rendering%2C%20RaS%20for%20stochastic%20capture-aware%20simulation%2C%20and%20MS-DIFE%20for%20feature-level%20identity-disruptive%20guidance.%20We%20evaluate%20CAAP%20on%20the%20Tongji%2C%20IITD%2C%20and%20AISEC%20datasets%20against%20generic%20CNN%20backbones%20and%20palmprint-specific%20recognition%20models.%20Experiments%20show%20that%20CAAP%20achieves%20strong%20untargeted%20and%20targeted%20attack%20performance%20with%20favorable%20cross-model%20and%20cross-dataset%20transferability.%20The%20results%20further%20show%20that%2C%20although%20adversarial%20training%20can%20partially%20reduce%20the%20attack%20success%20rate%2C%20substantial%20residual%20vulnerability%20remains.%20These%20findings%20indicate%20that%20deep%20palmprint%20recognition%20systems%20remain%20vulnerable%20to%20physically%20realizable%2C%20capture-aware%20adversarial%20patch%20attacks%2C%20underscoring%20the%20need%20for%20more%20effective%20defenses%20in%20practice.%20Code%20available%20at%20https%3A//github.com/ryliu68/CAAP.%0ALink%3A%20http%3A//arxiv.org/abs/2604.06987v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCAAP%253A%2520Capture-Aware%2520Adversarial%2520Patch%2520Attacks%2520on%2520Palmprint%2520Recognition%2520Models%26entry.906535625%3DRenyang%2520Liu%2520and%2520Jiale%2520Li%2520and%2520Jie%2520Zhang%25 {"title": "Designing Safe and Accountable GenAI as a Learning Companion with Women Banned from Formal Education", "author": "Hamayoon Behmanush and Freshta Akhtari and Ingmar Weber and Vikram Kamath Cannanure", "abstract": "In gender-restrictive and surveilled contexts, where access to formal education may be restricted for women, pursuing education involves safety and privacy risks. When women are excluded from schools and universities, they often turn to online self-learning and generative AI (GenAI) to pursue their educational and career aspirations. However, we know little about what safe and accountable GenAI support is required in the context of surveillance, household responsibilities, and the absence of learning communities. We present a remote participatory design study with 20 women in Afghanistan, informed by a recruitment survey (n = 140), examining how participants envision GenAI for learning and employability. Participants describe using GenAI less as an information source and more as an always-available peer, mentor, and source of career guidance that helps compensate for the absence of learning communities. At the same time, they emphasize that this companionship is constrained by privacy and surveillance risks, contextually unrealistic and culturally unsafe support, and direct-answer interactions that can undermine learning by creating an illusion of progress. Beyond eliciting requirements, envisioning the future with GenAI through participatory design was positively associated with significant increases in participants' aspirations (p=.01), perceived agency (p=.01), and perceived avenues (p=.03). These outcomes show that accountable and safe GenAI is not only about harm reduction but can also actively enable women to imagine and pursue viable learning and employment futures. Building on this, we translate participants' proposals into accountability-focused design directions that center on safety-first interaction and user control, context-grounded

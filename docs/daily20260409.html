{"title": "Making MLLMs Blind: Adversarial Smuggling Attacks in MLLM Content Moderation", "author": "Zhiheng Li and Zongyang Ma and Yuntong Pan and Ziqi Zhang and Xiaolei Lv and Bo Li and Jun Gao and Jianing Zhang and Chunfeng Yuan and Bing Li and Weiming Hu", "abstract": "Multimodal Large Language Models (MLLMs) are increasingly being deployed as automated content moderators. Within this landscape, we uncover a critical threat: Adversarial Smuggling Attacks. Unlike adversarial perturbations (for misclassification) and adversarial jailbreaks (for harmful output generation), adversarial smuggling exploits the Human-AI capability gap. It encodes harmful content into human-readable visual formats that remain AI-unreadable, thereby evading automated detection and enabling the dissemination of harmful content. We classify smuggling attacks into two pathways: (1) Perceptual Blindness, disrupting text recognition; and (2) Reasoning Blockade, inhibiting semantic understanding despite successful text recognition. To evaluate this threat, we constructed SmuggleBench, the first comprehensive benchmark comprising 1,700 adversarial smuggling attack instances. Evaluations on SmuggleBench reveal that both proprietary (e.g., GPT-5) and open-source (e.g., Qwen3-VL) state-of-the-art models are vulnerable to this threat, producing Attack Success Rates (ASR) exceeding 90%. By analyzing the vulnerability through the lenses of perception and reasoning, we identify three root causes: the limited capabilities of vision encoders, the robustness gap in OCR, and the scarcity of domain-specific adversarial examples. We conduct a preliminary exploration of mitigation strategies, investigating the potential of test-time scaling (via CoT) and adversarial training (via SFT) to mitigate this threat. Our code is publicly available at https://github.com/zhihengli-casia/smugglebench.", "link": "http://arxiv.org/abs/2604.06950v1", "date": "2026-04-08", "relevancy": 2.1154, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5316}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5294}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5205}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Making%20MLLMs%20Blind%3A%20Adversarial%20Smuggling%20Attacks%20in%20MLLM%20Content%20Moderation&body=Title%3A%20Making%20MLLMs%20Blind%3A%20Adversarial%20Smuggling%20Attacks%20in%20MLLM%20Content%20Moderation%0AAuthor%3A%20Zhiheng%20Li%20and%20Zongyang%20Ma%20and%20Yuntong%20Pan%20and%20Ziqi%20Zhang%20and%20Xiaolei%20Lv%20and%20Bo%20Li%20and%20Jun%20Gao%20and%20Jianing%20Zhang%20and%20Chunfeng%20Yuan%20and%20Bing%20Li%20and%20Weiming%20Hu%0AAbstract%3A%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20are%20increasingly%20being%20deployed%20as%20automated%20content%20moderators.%20Within%20this%20landscape%2C%20we%20uncover%20a%20critical%20threat%3A%20Adversarial%20Smuggling%20Attacks.%20Unlike%20adversarial%20perturbations%20%28for%20misclassification%29%20and%20adversarial%20jailbreaks%20%28for%20harmful%20output%20generation%29%2C%20adversarial%20smuggling%20exploits%20the%20Human-AI%20capability%20gap.%20It%20encodes%20harmful%20content%20into%20human-readable%20visual%20formats%20that%20remain%20AI-unreadable%2C%20thereby%20evading%20automated%20detection%20and%20enabling%20the%20dissemination%20of%20harmful%20content.%20We%20classify%20smuggling%20attacks%20into%20two%20pathways%3A%20%281%29%20Perceptual%20Blindness%2C%20disrupting%20text%20recognition%3B%20and%20%282%29%20Reasoning%20Blockade%2C%20inhibiting%20semantic%20understanding%20despite%20successful%20text%20recognition.%20To%20evaluate%20this%20threat%2C%20we%20constructed%20SmuggleBench%2C%20the%20first%20comprehensive%20benchmark%20comprising%201%2C700%20adversarial%20smuggling%20attack%20instances.%20Evaluations%20on%20SmuggleBench%20reveal%20that%20both%20proprietary%20%28e.g.%2C%20GPT-5%29%20and%20open-source%20%28e.g.%2C%20Qwen3-VL%29%20state-of-the-art%20models%20are%20vulnerable%20to%20this%20threat%2C%20producing%20Attack%20Success%20Rates%20%28ASR%29%20exceeding%2090%25.%20By%20analyzing%20the%20vulnerability%20through%20the%20lenses%20of%20perception%20and%20reasoning%2C%20we%20identify%20three%20root%20causes%3A%20the%20limited%20capabilities%20of%20vision%20encoders%2C%20the%20robustness%20gap%20in%20OCR%2C%20and%20the%20scarcity%20of%20domain-specific%20adversarial%20examples.%20We%20conduct%20a%20preliminary%20exploration%20of%20mitigation%20strategies%2C%20investigating%20the%20potential%20of%20test-time%20scaling%20%28via%20CoT%29%20and%20adversarial%20training%20%28via%20SFT%29%20to%20mitigate%20this%20threat.%20Our%20code%20is%20publicly%20available%20at%20https%3A//github.com/zhihengli-casia/smugglebench.%0ALink%3A%20http%3A//arxiv.org/abs/2604.06950v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMaking%2520MLLMs%2520Blind%253A%2520Adversarial%2520Smuggling%2520Attacks%2520in%2520MLLM%2520Content%2520Moderation%26entry.906535625%3DZhiheng%2520Li%2520and%2520Zongyang%2520Ma%2520and%2520Yuntong%2520Pan%2520and%2520Ziqi%2520Zhang%2520and%2520Xiaolei%2520Lv%2520and%2520Bo%2520Li%2520and%2520Jun%2520Gao%2520and%2520Jianing%2520Zhang%2520and%2520Chunfeng%2520Yuan%2520and%2520Bing%2520Li%2520and%2520Weiming%2520Hu%26entry.1292438233%3DMultimodal%2520Large%2520Language%2520Models%2520%2528MLLMs%2529%2520are%2520increasingly%2520being%2520deployed%2520as%2520automated%2520content%2520moderators.%2520Within%2520this%2520landscape%252C%2520we%2520uncover%2520a%2520critical%2520threat%253A%2520Adversarial%2520Smuggli al%2520of%2520test-time%2520scaling%2520%2528via%2520CoT%2529%2520and%2520adversarial%2520training%2520%2528via%2520SFT%2529%2520to%2520mitigate%2520this%2520threat.%2520Our%2520code%2520is%2520publicly%2520available%2520at%2520https%253A//github.com/zhihengli-casia/smugglebench.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.06950v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Making%20MLLMs%20Blind%3A%20Adversarial%20Smuggling%20Attacks%20in%20MLLM%20Content%20Moderation&entry.906535625=Zhiheng%20Li%20and%20Zongyang%20Ma%20and%20Yuntong%20Pan%20and%20Ziqi%20Zhang%20and%20Xiaolei%20Lv%20and%20Bo%20Li%20and%20Jun%20Gao%20and%20Jianing%20Zhang%20and%20Chunfeng%20Yuan%20and%20Bing%20Li%20and%20Weiming%20Hu&entry.1292438233=Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20are%20increasingly%20being%20deployed%20as%20automated%20content%20moderators.%20Within%20this%20landscape%2C%20we%20uncover%20a%20critical%20threat%3A%20Adversarial%20Smuggling%20Attacks.%20Unlike%20adversarial%20perturbations%20%28for%20misclassification%29%20and%20adversarial%20jailbreaks%20%28for%20harmful%20output%20generation%29%2C%20adversarial%20smuggling%20exploits%20the%20Human-AI%20capability%20gap.%20It%20encodes%20harmful%20content%20into%20human-readable%20visual%20formats%20that%20remain%20AI-unreadable%2C%20thereby%20evading%20automated%20detection%20and%20enabling%20the%20dissemination%20of%20harmful%20content.%20We%20classify%20smuggling%20attacks%20into%20two%20pathways%3A%20%281%29%20Perceptual%20Blindness%2C%20disrupting%20text%20recognition%3B%20and%20%282%29%20Reasoning%20Blockade%2C%20inhibiting%20semantic%20understanding%20despite%20successful%20text%20recognition.%20To%20evaluate%20this%20threat%2C%20we%20constructed%20SmuggleBench%2C%20the%20first%20comprehensive%20benchmark%20comprising%201%2C700%20adversarial%20smuggling%20attack%20instances.%20Evaluations% {"title": "Explainable AI needs formalization", "author": "Stefan Haufe and Rick Wilming and Benedict Clark and Rustam Zhumagambetov and Ahc\u00e8ne Boubekki and J\u00f6rg Martin and Danny Panknin", "abstract": "The field of \"explainable artificial intelligence\" (XAI) seemingly addresses the desire that decisions of machine learning systems should be human-understandable. However, in its current state, XAI itself needs scrutiny. Popular methods cannot reliably answer relevant questions about ML models, their training data, or test inputs, because they systematically attribute importance to input features that are independent of the prediction target. This limits the utility of XAI for diagnosing and correcting data and models, for scientific discovery, and for identifying intervention targets. The fundamental reason for this is that current XAI methods do not address well-defined problems and are not evaluated against targeted criteria of explanation correctness. Researchers should formally define the problems they intend to solve and design methods accordingly. This will lead to diverse use-case-dependent notions of explanation correctness and objective metrics of explanation performance that can be used to validate XAI algorithms.", "link": "http://arxiv.org/abs/2409.14590v6", "date": "2026-04-08", "relevancy": 2.112, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4356}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4158}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4158}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Explainable%20AI%20needs%20formalization&body=Title%3A%20Explainable%20AI%20needs%20formalization%0AAuthor%3A%20Stefan%20Haufe%20and%20Rick%20Wilming%20and%20Benedict%20Clark%20and%20Rustam%20Zhumagambetov%20and%20Ahc%C3%A8ne%20Boubekki%20and%20J%C3%B6rg%20Martin%20and%20Danny%20Panknin%0AAbstract%3A%20The%20field%20of%20%22explainable%20artificial%20intelligence%22%20%28XAI%29%20seemingly%20addresses%20the%20desire%20that%20decisions%20of%20machine%20learning%20systems%20should%20be%20human-understandable.%20However%2C%20in%20its%20current%20state%2C%20XAI%20itself%20needs%20scrutiny.%20Popular%20methods%20cannot%20reliably%20answer%20relevant%20questions%20about%20ML%20models%2C%20their%20training%20data%2C%20or%20test%20inputs%2C%20because%20they%20systematically%20attribute%20importance%20to%20input%20features%20that%20are%20independent%20of%20the%20prediction%20target.%20This%20limits%20the%20utility%20of%20XAI%20for%20diagnosing%20and%20correcting%20data%20and%20models%2C%20for%20scientific%20discovery%2C%20and%20for%20identifying%20intervention%20targets.%20The%20fundamental%20reason%20for%20this%20is%20that%20current%20XAI%20methods%20do%20not%20address%20well-defined%20problems%20and%20are%20not%20evaluated%20against%20targeted%20criteria%20of%20explanation%20correctness.%20Researchers%20should%20formally%20define%20the%20problems%20they%20intend%20to%20solve%20and%20design%20methods%20accordingly.%20This%20will%20lead%20to%20diverse%20use-case-dependent%20notions%20of%20explanation%20correctness%20and%20objective%20metrics%20of%20explanation%20performance%20that%20can%20be%20used%20to%20validate%20XAI%20algorithms.%0ALink%3A%20http%3A//arxiv.org/abs/2409.14590v6%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DExplainable%2520AI%2520needs%2520formalization%26entry.906535625%3DStefan%2520Haufe%2520and%2520Rick%2520Wilming%2520and%2520Benedict%252 {"title": "Negative Binomial Variational Autoencoders for Overdispersed Latent Modeling", "author": "Yixuan Zhang and Jinhao Sheng and Wenxin Zhang and Quyu Kong and Feng Zhou", "abstract": "Although artificial neural networks are often described as brain-inspired, their representations typically rely on continuous activations, such as the continuous latent variables in variational autoencoders (VAEs), which limits their biological plausibility compared to the discrete spike-based signaling in real neurons. Extensions like the Poisson VAE introduce discrete count-based latents, but their equal mean-variance assumption fails to capture overdispersion in neural spikes, leading to less expressive and informative representations. To address this, we propose NegBio-VAE, a negative-binomial latent-variable model with a dispersion parameter for flexible spike count modeling. NegBio-VAE preserves interpretability while improving representation quality and training feasibility via novel KL estimation and reparameterization. Experiments on four datasets demonstrate that NegBio-VAE consistently achieves superior reconstruction and generation performance compared to competing single-layer VAE baselines, and yields robust, informative latent representations for downstream tasks. Extensive ablation studies are performed to verify the model's robustness w.r.t. various components. Our code is available at https://github.com/co234/NegBio-VAE.", "link": "http://arxiv.org/abs/2508.05423v2", "date": "2026-04-08", "relevancy": 2.1098, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5335}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5301}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5057}], "m {"title": "Fast reconstruction-based ROI triggering via anomaly detection in the CYGNO optical TPC", "author": "F. D. Amaro and R. Antonietti and E. Baracchini and L. Benussi and C. Capoccia and M. Caponero and L. G. M. de Carvalho and G. Cavoto and I. A. Costa and A. Croce and M. D'Astolfo and G. D'Imperio and G. Dho and E. Di Marco and J. M. F. dos Santos and D. Fiorina and F. Iacoangeli and Z. Islam and E. Kemp and H. P. Lima and G. Maccarrone and R. D. P. Mano and D. J. G. Marques and G. Mazzitelli and P. Meloni and A. Messina and V. Monno and C. M. B. Monteiro and R. A. Nobrega and G. M. Oppedisano and I. F. Pains and E. Paoletti and F. Petrucci and S. Piacentini and D. Pierluigi and D. Pinci and F. Renga and A. Russo and G. Saviano and P. A. O. C. Silva and N. J. Spooner and R. Tesauro and S. Tomassini and D. Tozzi", "abstract": "Optical-readout Time Projection Chambers (TPCs) produce megapixel-scale images whose fine-grained topological information is essential for rare-event searches, but whose size challenges real-time data selection. We present an unsupervised, reconstruction-based anomaly-detection strategy for fast Region-of-Interest (ROI) extraction that operates directly on minimally processed camera frames. A convolutional autoencoder trained exclusively on pedestal images learns the detector noise morphology without labels, simulation, or fine-grained calibration. Applied to standard data-taking frames, localized reconstruction residuals identify particle-induced structures, from which compact ROIs are extracted via thresholding and spatial clustering. Using real data from the CYGNO optical TPC prototype, we compare two pedestal-trained autoencoder configurations that differ only in their training objective, enabling a controlled study of its impact. The best configuration retains (93.0 +/- 0.2)% of reconstructed signal intensity while discarding (97.8 +/- 0.1)% of the image area, with an inference time of approximately 25 ms per frame on a consumer {"title": "Lumbermark: Resistant Clustering by Chopping Up Mutual Reachability Minimum Spanning Trees", "author": "Marek Gagolewski", "abstract": "We introduce Lumbermark, a robust divisive clustering algorithm capable of detecting clusters of varying sizes, densities, and shapes. Lumbermark iteratively chops off large limbs connected by protruding segments of a dataset's mutual reachability minimum spanning tree. The use of mutual reachability distances smoothens the data distribution and decreases the influence of low-density objects, such as noise points between clusters or outliers at their peripheries. The algorithm can be viewed as an alternative to HDBSCAN that produces partitions with user-specified sizes. A fast, easy-to-use implementation of the new method is available in the open-source 'lumbermark' package for Python and R. We show that Lumbermark performs well on benchmark data and hope it will prove useful to data scientists and practitioners across different fields.", "link": "http://arxiv.org/abs/2604.07143v1", "date": "2026-04-08", "relevancy": 2.1014, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4537}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4042}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.403}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Lumbermark%3A%20Resistant%20Clustering%20by%20Chopping%20Up%20Mutual%20Reachability%20Minimum%20Spanning%20Trees&body=Title%3A%20Lumbermark%3A%20Resistant%20Clustering%20by%20Chopping%20Up%20Mutual%20Reachability%20Minimum%20Spanning%20Trees%0AAuthor%3A%20Marek%20Gagolewski%0AAbstract%3A%20We%20introduce%20Lumbermark%2C%20a%20robust%20divisive%20clustering%20algorithm%20capable%20of%20detecting%20clusters%20of%20varying%20sizes%2C%20densities%2C%20and%20shapes.%20Lumbermark%20iteratively%20chops%20off%20large%20limbs%20connected%20by%20protruding%20segments%20of%20a%20dataset%27s%20mutual%20reachability%20minimum%20spanning%20tree.%20The%20use%20of%20mutual%20reachability%20distances%20smoothens%20the%20data%20distribution%20and%20decreases%20the%20influence%20of%20low-density%20objects%2C%20such%20as%20noise%20points%20between%20clusters%20or%20outliers%20at%20their%20peripheries.%20The%20algorithm%20can%20be%20viewed%20as%20an%20alternative%20to%20HDBSCAN%20that%20produces%20partitions%20with%20user-specified%20sizes.%20A%20fast%2C%20easy-to-use%20implementation%20of%20the%20new%20method%20is%20available%20in%20the%20open-source%20%27lumbermark%27%20package%20for%20Python%20and%20R.%20We%20show%20that%20Lumbermark%20performs%20well%20on%20benchmark%20data%20and%20hope%20it%20will%20prove%20useful%20to%20data%20scientists%20and%20practitioners%20across%20different%20fields.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07143v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLumbermark%253A%2520Resistant%2520Clustering%2520by%2520Chopping%2520Up%2520Mutual%2520Reachability%2520Minimum%2520Spanning%2520Trees%26entry.906535625%3DMarek%2520Gagolewski%26entry.1292438233%3DWe%2520introduce%2520Lumbermark%252C%2520a%2520robust%2520divisive%2520clustering%2520algorithm%2520capable%2520of%2520detecting%2520clusters%2520of%2520varying%2520sizes%252C%2520densities%252C%2520and%2520shapes.%2520Lumbermark%2520iteratively%2520chops%2520off%2520large%2520limbs%2520connected%2520by%2520protruding%2520segments%2520of%2520a%2520dataset%2527s%2520mutual%2520reachability%2520minimum%2520spanning%2520tree.%2520The%2520use%2520of%2520mutual%2520reachability%2520distances%2520smoothens%2520the%2520data%2520distribution%2520and%2520decreases%2520the%252 {"title": "FBS: Modeling Native Parallel Reading inside a Transformer", "author": "Tongxi Wang", "abstract": "Large language models (LLMs) excel across many tasks, yet inference is still dominated by strictly token-by-token autoregression. Existing acceleration methods largely patch this pipeline and miss core human-reading ingredients: content-adaptive foresight, chunk-structure-aware compute allocation, and train-test consistency for preview/skimming. We propose the Fovea-Block-Skip Transformer (FBS), which injects a causal, trainable loop into Transformers via Parafovea-Attention Window (PAW), Chunk-Head (CH), and Skip-Gate (SG). Across diverse benchmarks, FBS improves the quality-efficiency trade-off without increasing parameters, and ablations show the three modules are complementary.", "link": "http://arxiv.org/abs/2601.21708v2", "date": "2026-04-08", "relevancy": 2.1014, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5754}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5154}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5154}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FBS%3A%20Modeling%20Native%20Parallel%20Reading%20inside%20a%20Transformer&body=Title%3A%20FBS%3A%20Modeling%20Native%20Parallel%20Reading%20inside%20a%20Transformer%0AAuthor%3A%20Tongxi%20Wang%0AAbstract%3A%20Large%20language%20models%20%28LLMs%29%20excel%20across%20many%20tasks%2C%20yet%20inference%20is%20still%20dominated%20by%20strictly%20token-by-token%20autoregression.%20Existing%20acceleration%20methods%20largely%20patch%20this%20pipeline%20and%20miss%20core%20human-reading%20ingredients%3A%20content-adaptive%20foresight%2C%20chunk-structure-aware%20compute%20allocation%2C%20and%20train-test%20consistency%20for%20preview/skimming.%20We%20propose%20the%20Fovea-Block-Skip%20Transformer%20%28FBS%29%2C%20which%20injects%20a%20causal%2C%20trainable%20loop%20into%20Transformers%20via%20Parafovea-Attention%20Window%20%28PAW%29%2C%20Chunk-Head%20%28CH%29%2C%20and%20Skip-Gate%20%28SG%29.%20Across%20diverse%20benchmarks%2C%20FBS%20improves%20the%20quality-efficiency%20trade-off%20without%20increasing%20parameters%2C%20and%20ablations%20show%20the%20three%20modules%20are%20complementary.%0ALink%3A%20http%3A//arxiv.org/abs/2601.21708v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFBS%253A%2520Modeling%2520Native%2520Parallel%2520Reading%2520inside%2520a%2520Transformer%26entry.906535625%3DTongxi%2520Wang%26entry.1292438233%3DLarge%2520language%2520models%2520%2528LLMs%2529%2520excel%2520across%2520many%2520tasks%252C%2520yet%2520inference%2520is%2520still%2520dominated%2520by%2520strictly%2520token-by-token%2520autoregression.%2520Existing%2520acceleration%2520methods%2520largely%2520patch%2520this%2520pipeline%2520and%2520miss%2520core%2520human-reading%2520ingredients%253A%2520content-adaptive%2520foresight%252C%2520chunk-structure-aware%2520compute%2520allocation%252C%2520and%2520train-test%2520consistency%2520for%2520preview/skimming.%2520We%2520propose%2520the%2520Fovea-Block-Skip%2520Transformer%2520%2528FBS%2529%252C%2520which%2520injects%2520a%2520causal%252C%2520trainable%2520loop%2520into%2520Transformers%2520via%2520Parafovea-Attention%2520Window%2520%2528PAW%2529%252C%2520Chunk-Head%2520%2528CH%2529%252C%2520and%2520Skip-Gate%2520%2528SG%2529.%2520Across%2520diverse%2520benchmarks%252C%2520FBS%2520improves%2520the%2520quality-efficiency%2520trade-off%2520without%2520increasing%2520parameters%252C%2520and%2520ablations%2520show%2520the%2520three%2520modules%2520are%2520complementary.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.21708v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=FBS%3A%20Modeling%20Native%20Parallel%20Reading%20inside%20a%20Transformer&entry.906535625=Tongxi%20Wang&entry.1292438233=Large%20language%20models%20%28LLMs%29%20excel%20across%20many%20tasks%2C%20yet%20inference%20is%20still%20dominated%20by%20strictly%20token-by-token%20autoregression.%20Existing%20acceleration%20methods%20largely%20patch%20this%20pipeline%20and%20miss%20core%20human-reading%20ingredients%3A%20content-adaptive%20foresight%2C%20chunk-structure-aware%20compute%20allocation%2C%20and%20train-test%20consistency%20for%20preview/skimming.%20We%20propose%20the%20Fovea-Block-Skip%20Transformer%20%28FBS%29%2C%20which%20injects%20a%20causal%2C%20trainable%20loop%20into%20Transformers%20via%20Parafovea-Attention%20Window%20%28PAW%29%2C%20Chunk-Head%20%28CH%29%2C%20and%20Skip-Gate%20%28SG%29.%20Across%20diverse%20benchmarks%2C%20FBS%20improves%20the%20quality-efficiency%20trade-off%20without%20increasing%20parameters%2C%20and%20ablations%20show%20the%20three%20modules%20are%20complementary.&entry.1838667208=http%3A//arxiv.org/abs/2601.21708v2&entry.124074799=Read"},
{"title": "Non-identifiability of Explanations from Model Behavior in Deep Networks of Image Authenticity Judgments", "author": "Icaro Re Depaolini and Uri Hasson", "abstract": "Deep neural networks can predict human judgments, but this does not imply that they rely on human-like information or reveal the cues underlying those judgments. Prior work has addressed this issue using attribution heatmaps, but their explanatory value in itself depends on robustness. Here we tested the robustness of such explanations by evaluating whether models that predict human authenticity ratings also produce consistent explanations within and across architectures. We fit lightweight regression heads to multiple frozen pretrained vision models and generated attribution maps using Grad-CAM, LIME, and multiscale pixel masking. Several architectures predicted ratings well, reaching about 80% of the noise ceiling. VGG models achieved this by tracking image quality rather than authenticity-specific variance, limiting the relevance of their attributions. Among the remaining models, attribution maps were generally stable across random seeds within an architecture, especially for EfficientNetB3 and Barlow Twins, and consistency was higher for images judged as more authentic. Crucially, agreement in attribution across architectures was weak even when predictive performance was similar. To address this, we combined models in ensembles, which improved prediction of human authenticity judgments and enabled image-level attribution via pixel masking. We conclude that while deep networks can predict human authenticity judgments well, they do not produce identifiable explanations for those judgments. More broadly, our findings suggest that post hoc explanations from successful models of behavior should be treated as weak evidence for cognitive mechanism.", "link": "http://arxiv.org/abs/2604.07254v1", "date": "2026-04-08", "relevancy": 2.0978, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5461}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5102}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5086}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Non-identifiability%20of%20Explanations%20from%20Model%20Behavior%20in%20Deep%20Networks%20of%20Image%20Authenticity%20Judgments&body=Title%3A%20Non-identifiability%20of%20Explanations%20from%20Model%20Behavior%20in%20Deep%20Networks%20of%20Image%20Authenticity%20Judgments%0AAuthor%3A%20Icaro%20Re%20Depaolini%20and%20Uri%20Hasson%0AAbstract%3A%20Deep%20neural%20networks%20can%20predict%20human%20judgments%2C%20but%20this%20does%20not%20imply%20that%20they%20rely%20on%20human-like%20information%20or%20reveal%20the%20cues%20underlying%20those%20judgments.%20Prior%20work%20has%20addressed%20this%20issue%20using%20attribution%20heatmaps%2C%20but%20their%20explanatory%20value%20in%20itself%20depends%20on%20robustness.%20Here%20we%20tested%20the%20robustness%20of%20such%20explanations%20by%20evaluating%20whether%20models%20that%20predict%20human%20authenticity%20ratings%20also%20produce%20consistent%20explanations%20within%20and%20across%20architectures.%20We%20fit%20lightweight%20regression%20heads%20to%20multiple%20frozen%20pretrained%20vision%20models%20and%20generated%20attribution%20maps%20using%20Grad-CAM%2C%20LIME%2C%20and%20multiscale%20pixel%20masking.%20Several%20architectures%20predicted%20ratings%20well%2C%20reaching%20about%2080%25%20of%20the%20noise%20ceiling.%20VGG%20models%20achieved%20this%20by%20tracking%20image%20quality%20rather%20than%20authenticity-specific%20variance%2C%20limiting%20the%20relevance%20of%20their%20attributions.%20Among%20the%20remaining%20models%2C%20attribution%20maps%20were%20generally%20stable%20across%20random%20seeds%20within%20an%20architecture%2C%20especially%20for%20EfficientNetB3%20and%20Barlow%20Twins%2C%20and%20consistency%20was%20higher%20for%20images%20judged%20as%20more%20authentic.%20Crucially%2C%20agreement%20in%20attribution%20across%20architectures%20was%20weak%20even%20when%20predictive%20performance%20was%20similar.%20To%20address%20this%2C%20we%20combined%20models%20in%20ensembles%2C%20which%20improved%20prediction%20of%20human%20authenticity%20judgments%20and%20enabled%20image-level%20attribution%20via%20pixel%20masking.%20We%20conclude%20that%20while%20deep%20networks%20can%20predict%20human%20authenticity%20judgments%20well%2C%20they%20do%20not%20produce%20identifiable%20explanations%20for%20those%20judgments.%20More%20broadly%2C%20our%20findings%20suggest%20that%20post%20hoc%20explanations%20from%20successful%20models%20of%20behavior%20should%20be%20treated%20as%20weak%20evidence%20for%20cognitive%20mechanism.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07254v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DNon-identifiability%2520of%2520Explanations%2520from%2520Model%2520Behavior%2520in%2520Deep%2520Networks%2520of%2520Image%2520Authenticity%2520Judgments%26entry.906535625%3DIcaro%2520Re%2520Depaolini%2520and%2520Uri%2520Hasson%26entry.1292438233%3DDeep%2520neural%2520networks%2520can%2520predict%2520human%2520judgments%252C%2520but%2520this%2520does%2520not%2520imply%2520that%2520they%2520rely%2520on%2520human-like%2520information%2520or%2520reveal%2520the%2520cues%2520underlying%2520those%2520judgments.%2520Prior%2520work%2520has%2520addressed%2520this%2520issue%2520using%2520attribution%2520heatmaps%252C%2520but%2520their%2520explanatory%2520value%2520in%2520itself%2520depends%2520on%2520robustness.%2520H {"title": "Toward Memory-Aided World Models: Benchmarking via Spatial Consistency", "author": "Kewei Lian and Shaofei Cai and Yilun Du and Yitao Liang", "abstract": "The ability to simulate the world in a spatially consistent manner is a crucial requirements for effective world models. Such a model enables high-quality visual generation, and also ensures the reliability of world models for downstream tasks such as simulation and planning. Designing a memory module is a crucial component for addressing spatial consistency: such a model must not only retain long-horizon observational information, but also enables the construction of explicit or implicit internal spatial representations. However, there are no dataset designed to promote the development of memory modules by explicitly enforcing spatial consistency constraints. Furthermore, most existing benchmarks primarily emphasize visual coherence or generation quality, neglecting the requirement of long-range spatial consistency. To bridge this gap, we construct a dataset and corresponding benchmark by sampling 150 distinct locations within the open-world environment of Minecraft, collecting about 250 hours (20 million frames) of loop-based navigation videos with actions. Our dataset follows a curriculum design of sequence lengths, allowing models to learn spatial consistency on increasingly complex navigation trajectories. Furthermore, our data collection pipeline is easily extensible to new Minecraft environments and modules. Four representative world model baselines are evaluated on our benchmark. Dataset, benchmark, and code are open-sourced to support future research.", "link": "http://arxiv.org/abs/2505.22976v2", "date": "2026-04-08", "relevancy": 2.0913, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5862}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5101}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5101}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Toward%20Memory-Aided%20World%20Models%3A%20Benchmarking%20via%20Spatial%20Consistency&body=Title%3A%20Toward%20Memory-Aided%20World%20Models%3A%20Benchmarking%20via%20Spatial%20Consistency%0AAuthor%3A%20Kewei%20Lian%20and%20Shaofei%20Cai%20and%20Yilun%20Du%20and%20Yitao%20Liang%0AAbstract%3A%20The%20ability%20to%20simulate%20the%20world%20in%20a%20spatially%20consistent%20manner%20is%20a%20crucial%20requirements%20for%20effective%20world%20models.%20Such%20a%20model%20enables%20high-quality%20visual%20generation%2C%20and%20also%20ensures%20the%20reliability%20of%20world%20models%20for%20downstream%20tasks%20such%20as%20simulation%20and%20planning.%20Designing%20a%20memory%20module%20is%20a%20crucial%20component%20for%20addressing%20spatial%20consistency%3A%20such%20a%20model%20must%20not%20only%20retain%20long-horizon%20observational%20information%2C%20but%20also%20enables%20the%20construction%20of%20explicit%20or%20implicit%20internal%20spatial%20representations.%20However%2C%20there%20are%20no%20dataset%20designed%20to%20promote%20the%20development%20of%20memory%20modules%20by%20explicitly%20enforcing%20spatial%20consistency%20constraints.%20Furthermore%2C%20most%20existing%20benchmarks%20primarily%20emphasize%20visual%20coherence%20or%20generation%20quality%2C%20neglecting%20the%20requirement%20of%20long-range%20spatial%20consistency.%20To%20bridge%20this%20gap%2C%20we%20construct%20a%20dataset%20and%20corresponding%20benchmark%20by%20sampling%20150%20distinct%20locations%20within%20the%20open-world%20environment%20of%20Minecraft%2C%20collecting%20about%20250%20hours%20%2820%20million%20frames%29%20of%20loop-based%20navigation%20videos%20with%20actions.%20Our%20dataset%20follows%20a%20curriculum%20design%20of%20sequence%20lengths%2C%20allowing%20models%20to%20learn%20spatial%20consistency%20on%20increasingly%20complex%20navigation%20trajectories.%20Furthermore%2C%20our%20data%20collection%20pipeline%20is%20easily%20extensible%20to%20new%20Minecraft%20environments%20and%20modules.%20Four%20representative%20world%20model%20baselines%20are%20evaluated%20on%20our%20benchmark.%20Dataset%2C%20benchmark%2C%20and%20code%20are%20open-sourced%20to%20support%20future%20research.%0ALink%3A%20http%3A//arxiv.org/abs/2505.22976v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DToward%2520Memory-Aided%2520World%2520Models%253A%2520Benchmarking%2520via%2520Spatial%2520Consistency%26entry.906535625%3DKewei%2520Lian%2520and%2520Shaofei%2520Cai%2520and%2520Yilun%2520Du%2520and%2520Yitao%2520Liang%26entry.1292438233%3DThe%2520ability%2520to%2520simulate%2520the%2520world%2520in%2520a%2520spatially%2520consistent%2520manner%2520is%2520a%2520crucial%2520requirements%2520for%2520effective%2520world%2520models.%2520Such%2520a%2520model%2520enables%2520high-quality%2520visual%2520generation%252C%2520and%2520also%2520ensures%2520the%2520reliability%2520of%2520world%2520models%2520for%2520downstream%2520tasks%2520such%2520as%2520simulation%2520and%2520planning.%2520Designing%2520a%2520memory%2520module%2520is%2520a%2520crucial%2520component%2520for%2520addressing%2520spatial%2520consistency%253A%2520such%2520a%2520model%2520must%2520not%2520only%2520retain%2520long-horizon%2520observational%2520information%252C%2520but%2520also%2520enables%2520the%2520construction%2520of%2520explicit%2520or%2520implicit%2520internal%2520spatial%2520representations.%2520However%252C%2520there%2520are%2520no%2520dataset%2520designed%2520to%2520promote%2520the%2520development%2520of%2520memory%2520modules%2520by%2520explicitly%2520enforcing%2520spatial%2520consistency%2520constraints.%2520Furthermore%252 {"title": "Equivariant Multi-agent Reinforcement Learning for Multimodal Vehicle-to-Infrastructure Systems", "author": "Charbel Bou Chaaya and Mehdi Bennis", "abstract": "In this paper, we study a vehicle-to-infrastructure (V2I) system where distributed base stations (BSs) acting as road-side units (RSUs) collect multimodal (wireless and visual) data from moving vehicles. We consider a decentralized rate maximization problem, where each RSU relies on its local observations to optimize its resources, while all RSUs must collaborate to guarantee favorable network performance. We recast this problem as a distributed multi-agent reinforcement learning (MARL) problem, by incorporating rotation symmetries in terms of vehicles' locations. To exploit these symmetries, we propose a novel self-supervised learning framework where each BS agent aligns the latent features of its multimodal observation to extract the positions of the vehicles in its local region. Equipped with this sensing data at each RSU, we train an equivariant policy network using a graph neural network (GNN) with message passing layers, such that each agent computes its policy locally, while all agents coordinate their policies via a signaling scheme that overcomes partial observability and guarantees the equivariance of the global policy. We present numerical results carried out in a simulation environment, where ray-tracing and computer graphics are used to collect wireless and visual data. Results show the generalizability of our self-supervised and multimodal sensing approach, achieving more than two-fold accuracy gains over baselines, and the efficiency of our equivariant MARL training, attaining more than 50% performance gains over standard approaches.", "link": "http://arxiv.org/abs/2604.06914v1", "date": "2026-04-08", "relevancy": 2.0911, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5954}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5094}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5071}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Equivariant%20Multi-agent%20Reinforcement%20Learning%20for%20Multimodal%20Vehicle-to-Infrastructure%20Systems&body=Title%3A%20Equivariant%20Multi-agent%20Reinforcement%20Learning%20for%20Multimodal%20Vehicle-to-Infrastructure%20Systems%0AAuthor%3A%20Charbel%20Bou%20Chaaya%20and%20Mehdi%20Bennis%0AAbstract%3A%20In%20this%20paper%2C%20we%20study%20a%20vehicle-to-infrastructure%20%28V2I%29%20system%20where%20distributed%20base%20stations%20%28BSs%29%20acting%20as%20road-side%20units%20%28RSUs%29%20collect%20multimodal%20%28wireless%20and%20visual%29%20data%20from%20moving%20vehicles.%20We%20consider%20a%20decentralized%20rate%20maximization%20problem%2C%20where%20each%20RSU%20relies%20on%20its%20local%20observations%20to%20optimize%20its%20resources%2C%20while%20all%20RSUs%20must%20collaborate%20to%20guarantee%20favorable%20network%20performance.%20We%20recast%20this%20problem%20as%20a%20distributed%20multi-agent%20reinforcement%20learning%20%28MARL%29%20problem%2C%20by%20incorporating%20rotation%20symmetries%20in%20terms%20of%20vehicles%27%20locations.%20To%20exploit%20these%20symmetries%2C%20we%20propose%20a%20novel%20self-supervised%20learning%20framework%20where%20each%20BS%20agent%20aligns%20the%20latent%20features%20of%20its%20multimodal%20observation%20to%20extract%20the%20positions%20of%20the%20vehicles%20in%20its%20local%20region.%20Equipped%20with%20this%20sensing%20data%20at%20each%20RSU%2C%20we%20train%20an%20equivariant%20policy%20network%20using%20a%20graph%20neural%20network%20%28GNN%29%20with%20message%20passing%20layers%2C%20such%20that%20each%20agent%20computes%20its%20policy%20locally%2C%20while%20all%20agents%20coordinate%20their%20policies%20via%20a%20signaling%20scheme%20that%20overcomes%20partial%20observability%20and%20guarantees%20the%20equivariance%20of%20the%20global%20policy.%20We%20present%20numerical%20results%20carried%20out%20in%20a%20simulation%20environment%2C%20where%20ray-tracing%20and%20computer%20graphics%20are%20used%20to%20collect%20wireless%20and%20visual%20data.%20Results%20show%20the%20generalizability%20of%20our%20self-supervised%20and%20multimodal%20sensing%20approach%2C%20achieving%20more%20than%20two-fold%20accuracy%20gains%20over%20baselines%2C%20and%20the%20efficiency%20of%20our%20equivariant%20MARL%20training%2C%20attaining%20more%20than%2050%25%20performance%20gains%20over%20standard%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2604.06914v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEquivariant%2520Multi-agent%2520Reinforcement%2520Learning%2520for%2520Multimodal%2520Vehicle-to-Infrastructure%2520Systems%26entry.906535625%3DCharbel%2520Bou%2520Chaaya%2520and%2520Mehdi%2520Bennis%26entry.1292438233%3DIn%2520this%2520paper%252C%2520we%2520study%2520a%2520vehicle-to-infrastructure%2520%2528V2I%2529%2520system%2520where%2520distributed%2520base%2520stations%2520%2528BSs%2529%2520acting%2520as%2520road-side%2520units%2520%2528RSUs%2529%2520collect%2520multimodal%2520%2528wireless%2520and%2520visual%2529%2520data%2520from%2520moving%2520vehicles.%2520We%2520consider%2520a%2520decentralized%2520rate%2520maximization%2520problem%252C%2520where%2520each%2520RSU%2520relies%2520on%2520its%2520local%2520observations%2520to%2520optimize%2520its%2520resources%252C%2520while%2520all%2520RSUs%2520must%2520collaborate%2520to%2520guarantee%2520favorable%2520network%2520performance.%2520We%2520recast%2520this%2520problem%2520as%2520a%2520distributed%2520mul {"title": "Toward Personalized Darts Training: A Data-Driven Framework Based on Skeleton-Based Biomechanical Analysis and Motion Modeling", "author": "Zhantao Chen and Dongyi He and Jin Fang and Xi Chen and Yishuo Liu and Xiaozhen Zhong and Xuejun Hu", "abstract": "As sports training becomes more data-driven, traditional dart coaching based mainly on experience and visual observation is increasingly inadequate for high-precision, goal-oriented movements. Although prior studies have highlighted the importance of release parameters, joint motion, and coordination in dart throwing, most quantitative methods still focus on local variables, single-release metrics, or static template matching. These approaches offer limited support for personalized training and often overlook useful movement variability. This paper presents a data-driven dart training assistance system. The system creates a closed-loop framework spanning motion capture, feature modeling, and personalized feedback. Dart-throwing data were collected in markerless conditions using a Kinect 2.0 depth sensor and an optical camera. Eighteen kinematic features were extracted from four biomechanical dimensions: three-link coordination, release velocity, multi-joint angular configuration, and postural stability. Two modules were developed: a personalized optimal throwing trajectory model that combines historical high-quality samples with the minimum jerk criterion, and a motion deviation diagnosis and recommendation model based on z-scores and hierarchical logic. A total of 2,396 throwing samples from professional and non-professional athletes were collected. Results show that the system generates smooth personalized reference trajectories consistent with natural human movement. Case studies indicate that it can detect poor trunk stability, abnormal elbow displacement, and imbalanced velocity control, then provide targeted recommendations. The framework shifts dart evaluation from deviation from a uniform standard to deviation from an individual's optimal control range, improving personalization and interpretability for darts training and other high-precision target sports.", "link": "http://arxiv.org/abs/2604.01130v3", "date": "2026-04-08", "relevancy": 2.0852, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5493}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5024}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4983}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Toward%20Personalized%20Darts%20Training%3A%20A%20Data-Driven%20Framework%20Based%20on%20Skeleton-Based%20Biomechanical%20Analysis%20and%20Motion%20Modeling&body=Title%3A%20Toward%20Personalized%20Darts%20Training%3A%20A%20Data-Driven%20Framework%20Based%20on%20Skeleton-Based%20Biomechanical%20Analysis%20and%20Motion%20Modeling%0AAuthor%3A%20Zhantao%20Chen%20and%20Dongyi%20He%20and%20Jin%20Fang%20and%20Xi%20Chen%20and%20Yishuo%20Liu%20and%20Xiaozhen%20Zhong%20and%20Xuejun%20Hu%0AAbstract%3A%20As%20sports%20training%20becomes%20more%20data-driven%2C%20traditional%20dart%20coaching%20based%20mainly%20on%20experience%20and%20visual%20observation%20is%20increasingly%20inadequate%20for%20high-precision%2C%20goal-oriented%20movements.%20Although%20prior%20studies%20have%20highlighted%20the%20importance%20of%20release%20parameters%2C%20joint%20motion%2C%20and%20coordination%20in%20dart%20throwing%2C%20most%20quantitative%20methods%20still%20focus%20on%20local%20variables%2C%20single-release%20metrics%2C%20or%20static%20template%20matching.%20These%20approaches%20offer%20limited%20support%20for%20personalized%20training%20and%20often%20overlook%20useful%20movement%20variability.%20This%20paper%20presents%20a%20data-driven%20dart%20training%20assistance%20system.%20The%20system%20creates%20a%20closed-loop%20framework%20spanning%20motion%20capture%2C%20feature%20modeling%2C%20and%20personalized%20feedback.%20Dart-throwing%20data%20were%20collected%20in%20markerless%20conditions%20using%20a%20Kinect%202.0%20depth%20sensor%20and%20an%20optical%20camera.%20Eighteen%20kinematic%20features%20were%20extracted%20from%20four%20biomechanical%20dimensions%3A%20three-link%20coordination%2C%20release%20velocity%2C%20multi-joint%20angular%20configuration%2C%20and%20postural%20stability.%20Two%20modules%20were%20developed%3A%20a%20personalized%20optimal%20throwing%20trajectory%20model%20that%20combines%20historical%20high-quality%20samples%20with%20the%20minimum%20jerk%20criterion%2C%20and%20a%20motion%20deviation%20diagnosis%20and%20recommendation%20model%20based%20on%20z-scores%20and%20hierarchical%20logic.%20A%20total%20of%202%2C396%20throwing%20samples%20from%20professional%20and%20non-professional%20athletes%20were%20collected.%20Results%20show%20that%20the%20system%20generates%20smooth%20personalized%20reference%20trajectories%20consistent%20with%20natural%20human%20movement.%20Case%20studies%20indicate%20that%20it%20can%20detect%20poor%20trunk%20stability%2C%20abnormal%20elbow%20displacement%2C%20and%20imbalanced%20velocity%20control%2C%20then%20provide%20targeted%20recommendations.%20The%20framework%20shifts%20dart%20evaluation%20from%20deviation%20from%20a%20uniform%20standard%20to%20deviation%20from%20an%20individual%27s%20optimal%20control%20range%2C%20improving%20personalization%20and%20interpretability%20for%20darts%20training%20and%20other%20high-precision%20target%20sports.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01130v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DToward%2520Personalized%2520Darts%2520Training%253A%2520A%2520Data-Dr {"title": "SurFITR: A Dataset for Surveillance Image Forgery Detection and Localisation", "author": "Qizhou Wang and Guansong Pang and Christopher Leckie", "abstract": "We present the Surveillance Forgery Image Test Range (SurFITR), a dataset for surveillance-style image forgery detection and localisation, in response to recent advances in open-access image generation models that raise concerns about falsifying visual evidence. Existing forgery models, trained on datasets with full-image synthesis or large manipulated regions in object-centric images, struggle to generalise to surveillance scenarios. This is because tampering in surveillance imagery is typically localised and subtle, occurring in scenes with varied viewpoints, small or occluded subjects, and lower visual quality. To address this gap, SurFITR provides a large collection of forensically valuable imagery generated via a multimodal LLM-powered pipeline, enabling semantically aware, fine-grained editing across diverse surveillance scenes. It contains over 137k tampered images with varying resolutions and edit types, generated using multiple image editing models. Extensive experiments show that existing detectors degrade significantly on SurFITR, while training on SurFITR yields substantial improvements in both in-domain and cross-domain performance. SurFITR is publicly available on GitHub.", "link": "http://arxiv.org/abs/2604.07101v1", "date": "2026-04-08", "relevancy": 2.084, "topK": [{"title": "FabricDiffusion: High-Fidelity Texture Transfer for 3D Garments\n  Generation from In-The-Wild Clothing Images", "link": "http://arxiv.org/abs/2410.01801v1", "similarity": 0.528}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5207}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.504}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SurFITR%3A%20A%20Dataset%20for%20Surveillance%20Image%20Forgery%20Detection%20and%20Localisation&body=Title%3A%20SurFITR%3A%20A%20Dataset%20for%20Surveillance%20Image%20Forgery%20Detection%20and%20Localisation%0AAuthor%3A%20Qizhou%20Wang%20and%20Guansong%20Pang%20and%20Christopher%20Leckie%0AAbstract%3A%20We%20present%20the%20Surveillance%20Forgery%20Image%20Test%20Range%20%28SurFITR%29%2C%20a%20dataset%20for%20surveillance-style%20image%20forgery%20detection%20and%20localisation%2C%20in%20response%20to%20recent%20advances%20in%20open-access%20image%20generation%20models%20that%20raise%20concerns%20about%20falsifying%20visual%20evidence.%20Existing%20forgery%20models%2C%20trained%20on%20datasets%20with%20full-image%20synthesis%20or%20large%20manipulated%20regions%20in%20object-centric%20images%2C%20struggle%20to%20generalise%20to%20surveillance%20scenarios.%20This%20is%20because%20tampering%20in%20surveillance%20imagery%20is%20typically%20localised%20and%20subtle%2C%20occurring%20in%20scenes%20with%20varied%20viewpoints%2C%20small%20or%20occluded%20subjects%2C%20and%20lower%20visual%20quality.%20To%20address%20this%20gap%2C%20SurFITR%20provides%20a%20large%20collection%20of%20forensically%20valuable%20imagery%20generated%20via%20a%20multimodal%20LLM-powered%20pipeline%2C%20enabling%20semantically%20aware%2C%20fine-grained%20editing%20across%20diverse%20surveillance%20scenes.%20It%20contains%20over%20137k%20tampered%20images%20with%20varying%20resolutions%20and%20edit%20types%2C%20generated%20using%20multiple%20image%20editing%20models.%20Extensive%20experiments%20show%20that%20existing%20detectors%20degrade%20significantly%20on%20SurFITR%2C%20while%20training%20on%20SurFITR%20yields%20substantial%20improvements%20in%20both%20in-domain%20and%20cross-domain%20performance.%20SurFITR%20is%20publicly%20available%20on%20GitHub.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07101v1%0AForm%3A%20https%3A//docs.google.com/forms/d hile%2520training%2520on%2520SurFITR%2520yields%2520substantial%2520improvements%2520in%2520both%2520in-domain%2520and%2520cross-domain%2520performance.%2520SurFITR%2520is%2520publicly%2520available%2520on%2520GitHub.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.07101v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=SurFITR%3A%20A%20Dataset%20for%20Surveillance%20Image%20Forgery%20Detection%20and%20Localisation&entry.906535625=Qizhou%20Wang%20and%20Guansong%20Pang%20and%20Christopher%20Leckie&entry.1292438233=We%20present%20the%20Surveillance%20Forgery%20Image%20Test%20Range%20%28SurFITR%29%2C%20a%20dataset%20for%20surveillance-style%20image%20forgery%20detection%20and%20localisation%2C%20in%20response%20to%20recent%20advances%20in%20open-access%20image%20generation%20models%20that%20raise%20concerns%20about%20falsifying%20visual%20evidence.%20Existing%20forgery%20models%2C%20trained%20on%20datasets%20with%20full-image%20synthesis%20or%20large%20manipulated%20regions%20in%20object-centric%20images%2C%20struggle%20to%20generalise%20to%20surveillance%20scenarios.%20This%20is%20because%20tampering%20in%20surveillance%20imagery%20is%20typically%20localised%20and%20subtle%2C%20occurring%20in%20scenes%20with%20varied%20viewpoints%2C%20small%20or%20occluded%20subjects%2C%20and%20lower%20visual%20quality.%20To%20address%20this%20gap%2C%20SurFITR%20provides%20a%20large%20collection%20of%20forensically%20valuable%20imagery%20generated%20via%20a%20multimodal%20LLM-powered%20pipeline%2C%20enabling%20semantically%20aware%2C%20fine-grained%20editing%20across%20diverse%20surveillance%20scenes.%20It%20contains%20over%20137k%20tampered%20images%20with%20varying%20resolutions%20and%20edit%20types%2C%20generated%20using%20multiple%20image%20editing%20models.%20Extensive%20experiments%20show%20that%20existing%20detectors%20degrade%20significantly%20on%20SurFITR%2C%20while%20t {"title": "AHCQ-SAM: Toward Accurate and Hardware-Compatible Post-Training Segment Anything Model Quantization", "author": "Wenlun Zhang and Yunshan Zhong and Weiqi Yan and Shengchuan Zhang and Shimpei Ando and Kentaro Yoshioka", "abstract": "The Segment Anything Model (SAM) has revolutionized image and video segmentation with its powerful zero-shot capabilities. However, its massive parameter scale and high computational demands hinder efficient deployment on resource-constrained edge devices. While Post-Training Quantization (PTQ) offers a practical solution, existing methods still fail to handle four critical quantization challenges: (1) ill-conditioned weights; (2) skewed and long-tailed post-GELU activations; (3) pronounced inter-channel variance in linear projections; and (4) exponentially scaled and heterogeneous attention scores. To mitigate these bottlenecks, we propose AHCQ-SAM, an accurate and hardware-compatible PTQ framework featuring four synergistic components: (1) Activation-aware Condition Number Reduction (ACNR), which regularizes weight matrices via a proximal point algorithm to suppress ill-conditioning; (2) Hybrid Log-Uniform Quantization (HLUQ), which combines power-of-two and uniform quantizers to capture skewed post-GELU activations; (3) Channel-Aware Grouping (CAG), which clusters channels with homogeneous statistics to achieve high accuracy with minimal hardware overhead; and (4) Logarithmic Nonlinear Quantization (LNQ), which utilizes logarithmic transformations to adaptively adjust quantization resolution for exponential and heterogeneous attention scores. Experimental results demonstrate that AHCQ-SAM outperforms current methods on SAM. Compared with the SOTA method, it achieves a 15.2% improvement in mAP for 4-bit SAM-B with Faster R-CNN on the COCO dataset. Furthermore, we establish a PTQ benchmark for SAM2, where AHCQ-SAM yields a 14.01% improvement in J&F for 4-bit SAM2-Tiny on the SA-V Test dataset. Finally, FPGA-based implementation validates the practical utility of AHCQ-SAM, delivering a 7.12x speedup and a 6.62x power efficiency improvement over the floating-point baseline.", "link": "http://arxiv.org/abs/2503.03088v4", "date": "2026-04-08", "relevancy": 2.0723, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5263}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5167}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5161}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AHCQ-SAM%3A%20Toward%20Accurate%20and%20Hardware-Compatible%20Post-Training%20Segment%20Anything%20Model%20Quantization&body=Title%3A%20AHCQ-SAM%3A%20Toward%20Accurate%20and%20Hardware-Compatible%20Post-Training%20Segment%20Anything%20Model%20Quantization%0AAuthor%3A%20Wenlun%20Zhang%20and%20Yunshan%20Zhong%20and%20Weiqi%20Yan%20and%20Shengchuan%20Zhang%20and%20Shimpei%20Ando%20and%20Kentaro%20Yoshioka%0AAbstract%3A%20The%20Segment%20Anything%20Model%20%28SAM%29%20has%20revolutionized%20image%20and%20video%20segmentation%20with%20its%20powerful%20zero-shot%20capabilities.%20However%2C%20its%20massive%20parameter%20scale%20and%20high%20computational%20demands%20hinder%20efficient%20deployment%20on%20resource-constrained%20edge%20devices.%20While%20Post-Training%20Quantization%20%28PTQ%29%20offers%20a%20practical%20solution%2C%20existing%20methods%20still%20fail%20to%20handle%20four%20critical%20quantization%20challenges%3A%20%281%29%20ill-conditioned%20weights%3B%20%282%29%20skewed%20and%20long-tailed%20post-GELU%20activations%3B%20%283%29%20pronounced%20inter-channel%20variance%20in%20linear%20projections%3B%20and%20%284%29%20exponentially%20scaled%20and%20heterogeneous%20attention%20scores.%20To%20mitigate%20these%20bottlenecks%2C%20we%20propose%20AHCQ-SAM%2C%20an%20accurate%20and%20hardware-compatible%20PTQ%20framework%20featuring%20four%20synergistic%20components%3A%20%281%29%20Activation-aware%20Condition%20Number%20Reduction%20%28ACNR%29%2C%20which%20regularizes%20weight%20matrices%20via%20a%20proximal%20point%20algorithm%20to%20suppress%20ill-conditioning%3B%20%282%29%20Hybrid%20Log-Uniform%20Quantization%20%28HLUQ%29%2C%20which%20combines%20power-of-two%20and%20uniform%20quantizers%20to%20capture%20skewed%20post-GELU%20activations%3B%20%283%29%20Channel-Aware%20Grouping%20%28CAG%29%2C%20which%20clusters%20channels%20with%20homogeneous%20statistics%20to%20achieve%20high%20accuracy%20with%20minimal%20hardware%20overhead%3B%20and%20%284%29%20Logarithmic%20Nonlinear%20Quantization%20%28LNQ%29%2C%20which%20utilizes%20logarithmic%20transformations%20to%20adaptively%20adjust%20quantization%20resolution%20for%20exponential%20and%20heterogeneous%20attention%20scores.%20Experimental%20results%20demonstrate%20that%20AHCQ-SAM%20outperforms%20current%20methods%20on%20SAM.%20Compared%20with%20the%20SOTA%20method%2C%20it%20achieves%20a%2015.2%25%20improvement%20in%20mAP%20for%204-bit%20SAM-B%20with%20Faster%20R-CNN%20on%20the%20COCO%20dataset.%20Furthermore%2C%20we%20establish%20a%20PTQ%20benchmark%20for%20SAM2%2C%20where%20AHCQ-SAM%20yields%20a%2014.01%25%20improvement%20in%20J%26F%20for%204-bit%20SAM2-Tiny%20on%20the%20SA-V%20Test%20dataset.%20Finally%2C%20FPGA-based%20implementation%20validates%20the%20practical%20utility%20of%20AHCQ-SAM%2C%20delivering%20a%207.12x%20speedup%20and%20a%206.62x%20power%20efficiency%20improvement%20over%20the%20floating-point%20baseline.%0ALink%3A%20http%3A//arxiv.org/abs/2503.03088v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAHCQ-SAM%253A%2520Toward%2520Accurate%2520and%2520Hardware-Compatible%2520Post-Training%2520Segment%2520Anything%2520Mo {"title": "Gaussian Approximation for Asynchronous Q-learning", "author": "Artemy Rubtsov and Sergey Samsonov and Vladimir Ulyanov and Alexey Naumov", "abstract": "In this paper, we derive rates of convergence in the high-dimensional central limit theorem for Polyak-Ruppert averaged iterates generated by the asynchronous Q-learning algorithm with a polynomial stepsize $k^{-\u03c9},\\, \u03c9\\in (1/2, 1]$. Assuming that the sequence of state-action-next-state triples $(s_k, a_k, s_{k+1})_{k \\geq 0}$ forms a uniformly geometrically ergodic Markov chain, we establish a rate of order up to $n^{-1/6} \\log^{4} (nS A)$ over the class of hyper-rectangles, where $n$ is the number of samples used by the algorithm and $S$ and $A$ denote the numbers of states and actions, respectively. To obtain this result, we prove a high-dimensional central limit theorem for sums of martingale differences, which may be of independent interest. Finally, we present bounds for high-order moments for the algorithm's last iterate.", "link": "http://arxiv.org/abs/2604.07323v1", "date": "2026-04-08", "relevancy": 2.0596, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4367}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.406}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.393}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gaussian%20Approximation%20for%20Asynchronous%20Q-learning&body=Title%3A%20Gaussian%20Approximation%20for%20Asynchronous%20Q-learning%0AAuthor%3A%20Artemy%20Rubtsov%20and%20Sergey%20Samsonov%20and%20Vladimir%20Ulyanov%20and%20Alexey%20Naumov%0AAbstract%3A%20In%20this%20paper%2C%20we%20derive%20rates%20of%20convergence%20in%20the%20high-dimensional%20central%20limit%20theorem%20for%20Polyak-Ruppert%20averaged%20iterates%20generated%20by%20the%20asynchronous%20Q-learning%20algorithm%20with%20a%20polynomial%20stepsize%20%24k%5E%7B-%CF%89%7D%2C%5C%2C%20%CF%89%5Cin%20%281/2%2C%201%5D%24.%20Assuming%20that%20the%20sequence%20of%20state-action-next-state%20triples%20%24%28s_k%2C%20a_k%2C%20s_%7Bk%2B1%7D%29_%7Bk%20%5Cgeq%200%7D%24%20forms%20a%20uniformly%20geometrically%20ergodic%20Markov%20chain%2C%20we%20establish%20a%20rate%20of%20order%20up%20to%20%24n%5E%7B-1/6%7D%20%5Clog%5E%7B4%7D%20%28nS%20A%29%24%20over%20the%20class%20of%20hyper-rectangles%2C%20where%20%24n%24%20is%20the%20number%20of%20samples%20used%20by%20the%20algorithm%20and%20%24S%24%20and%20%24A%24%20denote%20the%20numbers%20of%20states%20and%20actions%2C%20respectively.%20To%20obtain%20this%20result%2C%20we%20prove%20a%20high-dimensional%20central%20limit%20theorem%20for%20sums%20of%20martingale%20differences%2C%20which%20may%20be%20of%20independent%20interest.%20Finally%2C%20we%20present%20bounds%20for%20high-order%20moments%20for%20the%20algorithm%27s%20last%20iterate.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07323v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGaussian%2520Approximation%2520for%2520Asynchronous%2520Q-learning%26entry.906535625%3DArtemy%2520Rubtsov%2520and%2520Sergey%2520Samsonov%2520and%2520Vladimir%2520Ulyanov%2520and%2520Alexey%2520Naumov%26entry.1292438233%3DIn%2520this%2520paper%252C%2520we%2520derive%2520rates%2520of%2520convergence%2520in%2520the%2520high-dimensional%2520central%2520limit%2520theorem%2520for%2520Polyak-Ruppert%2520averaged%2520iterates%2520generated%2520by%2520the%2520asynchronous%2520Q-learning%2520algorithm%2520with%2520a%2520polynomial%2520stepsize%2520%2524k%255E%257B-%25CF%2589%257D%252C%255C%252C%2520%25CF%2589%255Cin%2520%25281/2%252C%25201%255D%2524.%2520Assuming%2520that%2520the%2520sequence%2520of%252 {"title": "Auditing Demographic Bias in Facial Landmark Detection for Fair Human-Robot Interaction", "author": "Pablo Parte and Roberto Valle and Jos\u00e9 M. Buenaposada and Luis Baumela", "abstract": "Fairness in human-robot interaction critically depends on the reliability of the perceptual models that enable robots to interpret human behavior. While demographic biases have been widely studied in high-level facial analysis tasks, their presence in facial landmark detection remains unexplored. In this paper, we conduct a systematic audit of demographic bias in this task, analyzing the age, gender and race biases. To this end we introduce a controlled statistical methodology to disentangle demographic effects from confounding visual factors. Evaluations of a standard representative model demonstrate that confounding visual factors, particularly head pose and image resolution, heavily outweigh the impact of demographic attributes. Notably, after accounting for these confounders, we show that performance disparities across gender and race vanish. However, we identify a statistically significant age-related effect, with higher biases observed for older individuals. This shows that fairness issues can emerge even in low-level vision components and can propagate through the HRI pipeline, disproportionately affecting vulnerable populations. We argue that auditing and correcting such biases is a necessary step toward trustworthy and equitable robot perception systems.", "link": "http://arxiv.org/abs/2604.06961v1", "date": "2026-04-08", "relevancy": 2.059, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5342}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.517}, {"title": "uPLAM: Robust Panoptic Localization ffecting%20vulnerable%20populations.%20We%20argue%20that%20auditing%20and%20correcting%20such%20biases%20is%20a%20necessary%20step%20toward%20trustworthy%20and%20equitable%20robot%20perception%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2604.06961v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAuditing%2520Demographic%2520Bias%2520in%2520Facial%2520Landmark%2520Detection%2520for%2520Fair%2520Human-Robot%2520Interaction%26entry.906535625%3DPablo%2520Parte%2520and%2520Roberto%2520Valle%2520and%2520Jos%25C3%25A9%2520M.%2520Buenaposada%2520and%2520Luis%2520Baumela%26entry.1292438233%3DFairness%2520in%2520human-robot%2520interaction%2520critically%2520depends%2520on%2520the%2520reliability%2520of%2520the%2520perceptual%2520models%2520that%2520enable%2520robots%2520to%2520interpret%2520human%2520behavior.%2520While%2520demographic%2520biases%2520have%2520been%2520widely%2520studied%2520in%2520high-level%2520facial%2520analysis%2520tasks%252C%2520their%2520presence%2520in%2520facial%2520landmark%2520detection%2520remains%2520unexplored.%2520In%2520this%2520paper%252C%2520we%2520conduct%2520a%2520systematic%2520audit%2520of%2520demographic%2520bias%2520in%2520this%2520task%252C%2520analyzing%2520the%2520age%252C%2520gender%2520and%2520race%2520biases.%2520To%2520this%2520end%2520we%2520introduce%2520a%2520controlled%2520statistical%2520methodology%2520to%2520disentangle%2520demographic%2520effects%2520from%2520confounding%2520visual%2520factors.%2520Evaluations%2520of%2520a%2520standard%2520representative%2520model%2520demonstrate%2520that%2520confounding%2520visual%2520factors%252C%2520particularly%2520head%2520pose%2520and%2520image%2520resolution%252C%2520heavily%2520outweigh%2520the%2520impact%2520of%2520demographic%2520attributes.%2520Notably%252C%2520after%2520accounting%2520for%2520these%2520confounders%252C%2520we%2520show%2520that%2520performance%2520disparities%2520across%2 {"title": "Self-Discovered Intention-aware Transformer for Multi-modal Vehicle Trajectory Prediction", "author": "Diyi Liu and Zihan Niu and Tu Xu and Lishan Sun", "abstract": "Predicting vehicle trajectories plays an important role in autonomous driving and ITS applications. Although multiple deep learning algorithms are devised to predict vehicle trajectories, their reliant on specific graph structure (e.g., Graph Neural Network) or explicit intention labeling limit their flexibilities. In this study, we propose a pure Transformer-based network with multiple modals considering their neighboring vehicles. Two separate tracks are employed. One track focuses on predicting the trajectories while the other focuses on predicting the likelihood of each intention considering neighboring vehicles. Study finds that the two track design can increase the performance by separating spatial module from the trajectory generating module. Also, we find the the model can learn an ordered group of trajectories by predicting residual offsets among K trajectories.", "link": "http://arxiv.org/abs/2604.07126v1", "date": "2026-04-08", "relevancy": 2.0542, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5554}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5063}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.504}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Self-Discovered%20Intention-aware%20Transformer%20for%20Multi-modal%20Vehicle%20Trajectory%20Prediction&body=Title%3A%20Self-Discovered%20Intention-aware%20Transformer%20for%20Multi-modal%20Vehicle%20Trajectory%20Prediction%0AAuthor%3A%20Diyi%20Liu%20and%20Zihan%20Niu%20and%20Tu%20Xu%20and%20Lishan%20Sun%0AAbstract%3A%20Predicting%20vehicle%20trajectories%20plays%20an%20important%20role%20in%20autonomous%20driving%20and%20ITS%20applications.%20Although%20multiple%20deep%20learning%20algorithms%20are%20devised%20to%20predict%20vehicle%20trajectories%2C%20their%20reliant%20on%20specific%20graph%20structure%20%28e.g.%2C%20Graph%20Neural%20Network%29%20or%20explicit%20intention%20labeling%20limit%20their%20flexibilities.%20In%20this%20study%2C%20we%20propose%20a%20pure%20Transformer-based%20network%20with%20multiple%20modals%20considering%20their%20neighboring%20vehicles.%20Two%20separate%20tracks%20are%20employed.%20One%20track%20focuses%20on%20predicting%20the%20trajectories%20while%20the%20other%20focuses%20on%20predicting%20the%20likelihood%20of%20each%20intention%20considering%20neighboring%20vehicles.%20Study%20finds%20that%20the%20two%20track%20design%20can%20increase%20the%20performance%20by%20separating%20spatial%20module%20from%20the%20trajectory%20generating%20module.%20Also%2C%20we%20find%20the%20the%20model%20can%20learn%20an%20ordered%20group%20of%20trajectories%20by%20predicting%20residual%20offsets%20among%20K%20trajectories.%0ALink%3A%20http%3A//arxiv.org/abs/2604.07126v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSelf-Discovered%2520Intention-aware%2520Transformer%2520for%2520Multi-modal%2520Vehicle%2520Trajectory%2520Prediction%26entry.906535625%3DDiyi%2520Liu%2520and%2520Zihan%2520Niu%2520and%2520Tu%2520Xu%2520and%2520Lishan%2520Sun%26entry.1292438233%3DPredicting%2520vehicle%2520trajectories%2520plays%2520an%2520important%2520role%2520in%2520autonomous%2520driving%2520and%2520ITS%2520applications.%2520Although%2520multiple%2520deep%2520learning%2520algorithms%2520are%2520devised%2520to%2520predict%2520vehicle%2520trajectories%252C%2520their%2520reliant%2520on%2520specific%2520graph%2520structure%2520%2528e.g.%252C%2520Graph%2520Neural%2520Network%2529%2520or%2520explicit%2520intention%2520labeling%2520limit%2520their%2520flexibilities.%2520In%2520this%2520study%252C%2520we%2520propose%2520a%2520pure%2520Transformer-based%2520network%2520with%2520multiple%2520modals%2520considering%2520their%2520neighboring%2520vehicles.%2520Two%2520separate%2520tracks%2520are%2520employed.%2520One%2520track%2520focuses%2520on%2520predicting%2520the%2520trajectories%2520while%2520the%2520other%2520focuses%2520on%2520predicting%2520the%2520likelihood%2520of%2520each%2520intention%2520considering%2520neighboring%2520vehicles.%2520Study%2520finds%2520that%2520the%2520two%2520track%2520design%2520can%2520increase%2520the%2520performance%2520by%2520separating%2520spatial%2520module%2520from%2520the%2520trajectory%2520generating%2520module.%2520Also%252C%2520we%2520find%2520the%2520the%2520model%2520can%2520learn%2520an%2520ordered%2520group%2520of%2520trajectories%2520by%2520predicting%2520residual%2520offsets%2520among%2520K%2520trajectories.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.07126v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Self-Discovered%20Intention-aware%20Transformer%20for%20Multi-modal%20Vehicle%20Trajectory%20Prediction&entry.906535625=Diyi%20Liu%20and%20Zihan%20Niu%20and%20Tu%20Xu%20and%20Lishan%20Sun&entry.1292438233=Predicting%20vehicle%20trajectories%20plays%20an%20important%20role%20in%20autonomous%20driving%20and%20ITS%20applications.%20Although%20multiple%20deep%20learning%20algorithms%20are%20devised%20to%20predict%20vehicle%20trajectories%2C%20their%20reliant%20on%20specific%20graph%20structure%20%28e.g.%2C%20Graph%20Neural%20Network%29%20or%20explicit%20intention%20labeling%20limit%20their%20flexibilities.%20In%20this%20study%2C%20we%20propose%20a%20pure%20Transformer-based%20network%20with%20multiple%20modals%20considering%20their%20neighboring%20vehicle

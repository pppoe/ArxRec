{"title": "Dual Pose-Graph Semantic Localization for Vision-Based Autonomous Drone Racing", "author": "David Perez-Saura and Miguel Fernandez-Cortizas and Alvaro J. Gaona and Pascual Campoy", "abstract": "Autonomous drone racing demands robust real-time localization under extreme conditions: high-speed flight, aggressive maneuvers, and payload-constrained platforms that often rely on a single camera for perception. Existing visual SLAM systems, while effective in general scenarios, struggle with motion blur and feature instability inherent to racing dynamics, and do not exploit the structured nature of racing environments. In this work, we present a dual pose-graph architecture that fuses odometry with semantic detections for robust localization. A temporary graph accumulates multiple gate observations between keyframes and optimizes them into a single refined constraint per landmark, which is then promoted to a persistent main graph. This design preserves the information richness of frequent detections while preventing graph growth from degrading real-time performance. The system is designed to be sensor-agnostic, although in this work we validate it using monocular visual-inertial odometry and visual gate detections. Experimental evaluation on the TII-RATM dataset shows a 56% to 74% reduction in ATE compared to standalone VIO, while an ablation study confirms that the dual-graph architecture achieves 10% to 12% higher accuracy than a single-graph baseline at identical computational cost. Deployment in the A2RL competition demonstrated that the system performs real-time onboard localization during flight, reducing the drift of the odometry baseline by up to 4.2 m per lap.", "link": "http://arxiv.org/abs/2604.15168v1", "date": "2026-04-16", "relevancy": 2.3792, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6019}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5925}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5886}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dual%20Pose-Graph%20Semantic%20Localization%20for%20Vision-Based%20Autonomous%20Drone%20Racing&body=Title%3A%20Dual%20Pose-Graph%20Semantic%20Localization%20for%20Vision-Based%20Autonomous%20Drone%20Racing%0AAuthor%3A%20David%20Perez-Saura%20and%20Miguel%20Fernandez-Cortizas%20and%20Alvaro%20J.%20Gaona%20and%20Pascual%20Campoy%0AAbstract%3A%20Autonomous%20drone%20racing%20demands%20robust%20real-time%20localization%20under%20extreme%20conditions%3A%20high-speed%20flight%2C%20aggressive%20maneuvers%2C%20and%20payload-constrained%20platforms%20that%20often%20rely%20on%20a%20single%20camera%20for%20perception.%20Existing%20visual%20SLAM%20systems%2C%20while%20effective%20in%20general%20scenarios%2C%20struggle%20with%20motion%20blur%20and%20feature%20instability%20inherent%20to%20racing%20dynamics%2C%20and%20do%20not%20exploit%20the%20structured%20nature%20of%20racing%20environments.%20In%20this%20work%2C%20we%20present%20a%20dual%20pose-graph%20architecture%20that%20fuses%20odometry%20with%20semantic%20detections%20for%20robust%20localization.%20A%20temporary%20graph%20accumulates%20multiple%20gate%20observations%20between%20keyframes%20and%20optimizes%20them%20into%20a%20single%20refined%20constraint%20per%20landmark%2C%20which%20is%20then%20promoted%20to%20a%20persistent%20main%20graph.%20This%20design%20preserves%20the%20information%20richness%20of%20frequent%20detections%20while%20preventing%20graph%20growth%20from%20degrading%20real-time%20performance.%20The%20system%20is%20designed%20to%20be%20sensor-agnostic%2C%20although%20in%20this%20work%20we%20validate%20it%20using%20monocular%20visual-inertial%20odometry%20and%20visual%20gate%20detections.%20Experimental%20evaluation%20on%20the%20TII-RATM%20dataset%20shows%20a%2056%25%20to%2074%25%20reduction%20in%20ATE%20compared%20to%20standalone%20VIO%2C%20while%20an%20ablation%20study%20confirms%20that%20the%20dual-graph%20architecture%20achieves%2010%25%20to%2012%25%20higher%20accuracy%20than%20a%20single-graph%20baseline%20at%20identical%20computational%20cost.%20Deployment%20in%20the%20A2RL%20competition%20demonstrated%20that%20the%20system%20performs%20real-time%20onboard%20localization%20during%20flight%2C%20reducing%20the%20drift%20of%20the%20odometry%20baseline%20by%20up%20to%204.2%20m%20per%20lap.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15168v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDual%2520Pose-Graph%2520Semantic%2520Localization%2520for%2520Vision-Based%2520Autonomous%2520Drone%2520Racing%26entry.906535625%3DDavid%2520Perez-Saura%2520and%2520Miguel%2520Fernandez-Cortizas%2520and%2520Alvaro%2520J.%2520Gaona%2520and%2520Pascual%2520Campoy%26entry.1292438233%3DAutonomous%2520drone%2520racing%2520demands%2520robust%2520real-time%2520localization%2520under%2520extreme%2520conditions%253A%2520high-speed%2520flight%252C%2520aggressive%2520maneuvers%252C%2520and%2520payload-constrained%2520platforms%2520that%2520often%2520rely%2520on%2520a%2520single%2520camera%2520for%2520perception.%2520Existing%2520visual%2520SLAM%2520systems%252C%2520while%2520effective%2520in%2520general%2520scenarios%252C%2520struggle%2520with%2520motion%2520blur%2520and%2520feature%2520instability%2520inherent%2520to%2520racing%2520dynamics%252C%2520and%2520do%2520not%2520exploit%2520the%2520structured%2520nature%2520of%2520racing%2520environments.%2520In%2520this%2520work%252C%2520we%2520present%2520a%2520dual%2520pose-graph%2520architecture%2520that%2520fuses%2520odometry%2520with%2520semantic%2520detections%2520for%2520robust%2520loca ne%20racing%20demands%20robust%20real-time%20localization%20under%20extreme%20conditions%3A%20high-speed%20flight%2C%20aggressive%20maneuvers%2C%20and%20payload-constrained%20platforms%20that%20often%20rely%20on%20a%20single%20camera%20for%20perception.%20Existing%20visual%20SLAM%20systems%2C%20while%20effective%20in%20general%20scenarios%2C%20struggle%20with%20motion%20blur%20and%20feature%20instability%20inherent%20to%20racing%20dynamics%2C%20and%20do%20not%20exploit%20the%20structured%20nature%20of%20racing%20environments.%20In%20this%20work%2C%20we%20present%20a%20dual%20pose-graph%20architecture%20that%20fuses%20odometry%20with%20semantic%20detections%20for%20robust%20localization.%20A%20temporary%20graph%20accumulates%20multiple%20gate%20observations%20between%20keyframes%20and%20optimizes%20them%20into%20a%20single%20refined%20constraint%20per%20landmark%2C%20which%20is%20then%20promoted%20to%20a%20persistent%20main%20graph.%20This%20design%20preserves%20the%20information%20richness%20of%20frequent%20detections%20while%20preventing%20graph%20growth%20from%20degrading%20real-time%20performance.%20The%20system%20is%20designed%20to%20be%20sensor-agnostic%2C%20although%20in%20this%20work%20we%20validate%20it%20using%20monocular%20visual-inertial%20odometry%20and%20visual%20gate%20detections.%20Experimental%20evaluation%20on%20the%20TII-RATM%20dataset%20shows%20a%2056%25%20to%2074%25%20reduction%20in%20ATE%20compared%20to%20standalone%20VIO%2C%20while%20an%20ablation%20study%20confirms%20that%20the%20dual-graph%20architecture%20achieves%2010%25%20to%2012%25%20higher%20accuracy%20than%20a%20single-graph%20baseline%20at%20identical%20computational%20cost.%20Deployment%20in%20the%20A2RL%20competition%20demonstrated%20that%20the%20system%20performs%20real-time%20onboard%20localization%20during%20flight%2C%20reducing%20the%20drift%20of%20the%20odometry%20baseline%20by%20up%20to%204.2%20m%20per%20lap.&entry.1838667208=http%3A//arxiv.org/abs/2604.15168v1&entry.124074799= {"title": "Critical-CoT: A Robust Defense Framework against Reasoning-Level Backdoor Attacks in Large Language Models", "author": "Vu Tuan Truong and Long Bao Le", "abstract": "Large Language Models (LLMs), despite their impressive capabilities across domains, have been shown to be vulnerable to backdoor attacks. Prior backdoor strategies predominantly operate at the token level, where an injected trigger causes the model to generate a specific target word, choice, or class (depending on the task). Recent advances, however, exploit the long-form reasoning tendencies of modern LLMs to conduct reasoning-level backdoors: once triggered, the victim model inserts one or more malicious reasoning steps into its chain-of-thought (CoT). These attacks are substantially harder to detect, as the backdoored answer remains plausible and consistent with the poisoned reasoning trajectory. Yet, defenses tailored to this type of backdoor remain largely unexplored. To bridge this gap, we propose Critical-CoT, a novel defense mechanism that conducts a two-stage fine-tuning (FT) process on LLMs to develop critical thinking behaviors, enabling them to automatically identify potential backdoors and refuse to generate malicious reasoning steps. Extensive experiments across multiple LLMs and datasets demonstrate that Critical-CoT provides strong robustness against both in-context learning-based and FT-based backdoor attacks. Notably, Critical-CoT exhibits strong cross-domain and cross-task generalization. Our code is available at hthttps://github.com/tuanvu171/Critical-CoT.", "link": "http://arxiv.org/abs/2604.10681v2", "date": "2026-04-16", "relevancy": 2.3694, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4767}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4725}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4725}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Critical-CoT%3A%20A%20Robust%20Defense%20Framework%20against%20Reasoning-Level%20Backdoor%20Attacks%20in%20Large%20Language%20Models&body=Title%3A%20Critical-CoT%3A%20A%20Robust%20Defense%20Framework%20against%20Reasoning-Level%20Backdoor%20Attacks%20in%20Large%20Language%20Models%0AAuthor%3A%20Vu%20Tuan%20Truong%20and%20Long%20Bao%20Le%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%2C%20despite%20their%20impressive%20capabilities%20across%20domains%2C%20have%20been%20shown%20to%20be%20vulnerable%20to%20backdoor%20attacks.%20Prior%20backdoor%20strategies%20predominantly%20operate%20at%20the%20token%20level%2C%20where%20an%20injected%20trigger%20causes%20the%20model%20to%20generate%20a%20specific%20target%20word%2C%20choice%2C%20or%20class%20%28depending%20on%20the%20task%29.%20Recent%20advances%2C%20however%2C%20exploit%20the%20long-form%20reasoning%20tendencies%20of%20modern%20LLMs%20to%20conduct%20reasoning-level%20backdoors%3A%20once%20triggered%2C%20the%20victim%20model%20inserts%20one%20or%20more%20malicious%20reasoning%20steps%20into%20its%20chain-of-thought%20%28CoT%29.%20These%20attacks%20are%20substantially%20harder%20to%20detect%2C%20as%20the%20backdoored%20answer%20remains%20plausible%20and%20consistent%20with%20the%20poisoned%20reasoning%20trajectory.%20Yet%2C%20defenses%20tailored%20to%20this%20type%20of%20backdoor%20remain%20largely%20unexplored.%20To%20bridge%20this%20gap%2C%20we%20propose%20Critical-CoT%2C%20a%20novel%20defense%20mechanism%20that%20conducts%20a%20two-stage%20fine-tuning%20%28FT%29%20process%20on%20LLMs%20to%20develop%20critical%20thinking%20behaviors%2C%20enabling%20them%20to%20automatically%20identify%20potential%20backdoors%20and%20refuse%20to%20generate%20malicious%20reasoning%20steps.%20Extensive%20experiments%20across%20multiple%20LLMs%20and%20datasets%20demonstrate%20that%20Critical-CoT%20provides%20strong%20robustness%20against%20both%20in-context%20learning-based%20and%20FT-based%20backdoor%20attacks.%20Notably%2C%20Critical-CoT%20exhibits%20strong%20cross-domain%20and%20cross-task%20generalization.%20Our%20code%20is%20available%20at%20hthttps%3A//github.com/tuanvu171/Critical-CoT.%0ALink%3A%20http%3A//arxiv.org/abs/2604.10681v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCritical-CoT%253A%2520A%2520Robust%2520Defense%2520Framework%2520against%2520Reasoning-Level%2520Backdoor%2520Attacks%2520in%2520Large%2520Language%2520Models%26entry.906535625%3DVu%2520Tuan%2520Truong%2520and%2520Long%2520Bao%2520Le%26entry.1292438233%3DLarge%2520Language%2520Models%2520%2528LLMs%2529%252C%2520despite%2520their%2520impressive%2520capabilities%2520across%2520domains%252C%2520have%2520been%2520shown%2520to%2520be%2520vulnerable%2520to%2520backdoor%2520attacks.%2520Prior%2520backdoor%2520strategies%2520predominantly%2520operate%2520at%2520the%2520token%2520level%252C%2520where%2520an%2520injected%2520trigger%2520causes%2520the%2520model%2520to%2520generate%2520a%2520specific%2520target%2520word%252C%2520choice%252C%2520or%2520class%2520%2528depending%2520on%2520the%2520task%2529.%2520Recent%2520advances%252C%2520however%252C%2520exploit%2520the%2520long-form%2520reasoning%2520tendencies%2520of%2520modern%2520LLMs%2520to%2520conduct%2520reasoning-level%2520backdoors%253A%2520once%2520triggered%252C%2520the%2520victim%2520model%2520inserts%2520one%2520or%2520more%2520malicious%2520reasoning%2520steps%2520into%2520its%2520chain-of-thought%2520%2528CoT%2529.%2520These%2520attacks%2520are%2520substantially%2520harder%2520to%2520detect%252C%2520as%2520the%2520backdoored%2520answer%2520remains%2520plausible%2520and%2520consistent%2520with%2520the%2520poisoned%2520reasoning%2520trajectory.%2520Yet%252C%2520defenses%2520tailored%2520to%2520this%2520type%2520of%2520backdoor%2520remain%2520largely%2520unexplored.%2520To%2520bridge%2520this%2520gap%252C%2520we%2520propose%2520Critical-CoT%252C%2520a%2520novel%2520defense%2520mechanism%2520that%2520conducts%2520a%2520two-stage%2520fine-tuning%2520%2528FT%2529%2520process%2520on%2520LLMs%2520to%2520develop%2520critical%2520thinking%2520behaviors%252C%2520enabling%2520them%2520to%2520automatically%2520identify%2520potential%2520backdoors%2520and%2520refuse%2520to%2520generate%2520malicious%2520reasoning%2520steps.%2520Extensive%2520experiments%2520across%2520multiple%2520LLMs%2520and%2520datasets%2520demonstrate%2520that%2520Critical-CoT%2520provides%2520strong%2520robustness%2520against%2520both%2520in-context%2520learning-based%2520and%2520FT-based%2520backdoor%2520attacks.%2520Notably%252C%2520Critical-CoT%2520exhibits%2520strong%2520cross-domain%2520and%2520cross-task%2520generalization.%2520Our%2520code%2520is%2520available%2520at%2520hthttps%253A//github.com/tuanvu171/Critical-CoT.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.10681v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Critical-CoT%3A%20A%20Robust%20Defense%20Framework%20against%20Reasoning-Level%20Backdoor%20Attacks%20in%20Large%20Language%20Models&entry.906535625=Vu%20Tuan%20Truong%20and%20Long%20Bao%20Le&entry.1292438233=Large%20Language%20Models%20%28LLMs%29%2C%20despite%20their%20impressive%20capabilities%20across%20domains%2C%20have%20been%20shown%20to%20be%20vulnerable%20to%20backdoor%20attacks.%20Prior%20backdoor%20strategies%20predominantly%20operate%20at%20the%20token%20level%2C%20where%20an%20injected%20trigger%20causes%20the%20model%20to%20generate%20a%20specific%20target%20word%2C%20choice%2C%20or%20class%20%28depending%20on%20the%20task%29.%20Recent%20advances%2C%20however%2C%20exploit%20the%20long-form%20reasoning%20tendencies%20of%20modern%20LLMs%20to%20conduct%20reasoning-level%20backdoors%3A%20once%20triggered%2C%20the%20victim%20model%20inserts%20one%20or%20more%20malicious%20reasoning%20steps%20into%20its%20chain-of-thought%20%28CoT%29.%20These%20attacks%20are%20substantially%20harder%20to%20detect%2C%20as%20the%20backdoored%20answer%20remains%20plausible%20and%20consistent%20with%20the%20poisoned%20reasoning%20trajectory.%20Yet%2C%20defenses%20tailored%20to%20this%20type%20of%20backdoor%20remain%20largely%20unexplored.%20To%20bridge%20this%20gap%2C%20we%20propose%20Critical-CoT%2C%20a%20novel%20defense%20mechanism%20that%20conducts%20a%20two-stage%20fine-tuning%20%28FT%29%20process%20on%20LLMs%20to%20develop%20critical%20thinking%20behaviors%2C%20enabling%20them%20to%20automatically%20identify%20potential%20backdoors%20and%20refuse%20to%20generate%20malicious%20reasoning%20steps.%20Extensive%20experiments%20across%20multiple%20LLMs%20and%20datasets%20demonstrate%20that%20Critical-CoT%20provides%20strong%20robustness%20against%20both%20in-context%20learning-based%20and%20FT-based%20backdoor%20attacks.%20Notably%2C%20Critical-CoT%20exhibits%20strong%20cross-domain%20and%20cross-task%20generalization.%20Our%20code%20is%20available%20at%20hthttps%3A//github.com/tuanvu171/Critical-CoT.&entry.1838667208=http%3A//arxiv.org/abs/2604.10681v2&entry.124074799=Read"},
{"title": "Sixth-Sense: Self-Supervised Learning of Spatial Awareness of Humans from a Planar Lidar", "author": "Simone Arreghini and Nicholas Carlotti and Mirko Nava and Antonio Paolillo and Alessandro Giusti", "abstract": "Reliable localization of people is fundamental for service and social robots that must operate in close interaction with humans. State-of-the-art human detectors often rely on RGB-D cameras or costly 3D LiDARs. However, most commercial robots are equipped with cameras with a narrow field of view, leaving them unaware of users approaching from other directions, or inexpensive 1D LiDARs whose readings are hard to interpret. To address these limitations, we propose a self-supervised approach to detect humans and estimate their 2D pose from 1D LiDAR data, using detections from an RGB-D camera as supervision. Trained on 70 minutes of autonomously collected data, our model detects humans omnidirectionally in unseen environments with 71% precision, 80% recall, and mean absolute errors of 13cm in distance and 44\u00b0 in orientation, measured against ground truth data. Beyond raw detection accuracy, this capability is relevant for robots operating in shared public spaces, where omnidirectional awareness of nearby people is crucial for safe navigation, appropriate approach behavior, and timely human-robot interaction initiation using low-cost, privacy-preserving sensing. Deployment in two additional public environments further suggests that the approach can serve as a practical wide-FOV awareness layer for socially aware service robotics.", "link": "http://arxiv.org/abs/2502.21029v2", "date": "2026-04-16", "relevancy": 2.368, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5985}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", {"title": "Comparison of Modern Multilingual Text Embedding Techniques for Hate Speech Detection Task", "author": "Evaldas Vaiciukynas and Paulius Danenas and Linas Ablonskis and Algirdas Sukys and Edgaras Dambrauskas and Voldemaras Zitkus and Rita Butkiene and Rimantas Butleris", "abstract": "Online hate speech and abusive language pose a growing challenge for content moderation, especially in multilingual settings and for low-resource languages such as Lithuanian. This paper investigates to what extent modern multilingual sentence embedding models can support accurate hate speech detection in Lithuanian, Russian, and English, and how their performance depends on downstream modeling choices and feature dimensionality. We introduce LtHate, a new Lithuanian hate speech corpus derived from news portals and social networks, and benchmark six modern multilingual encoders (potion, gemma, bge, snow, jina, e5) on LtHate, RuToxic, and EnSuperset using a unified Python pipeline. For each embedding, we train both a one class HBOS anomaly detector and a two class CatBoost classifier, with and without principal component analysis (PCA) compression to 64-dimensional feature vectors. Across all datasets, two class supervised models consistently and substantially outperform one class anomaly detection, with the best configurations achieving up to 80.96% accuracy and AUC ROC of 0.887 in Lithuanian (jina), 92.19% accuracy and AUC ROC of 0.978 in Russian (e5), and 77.21% accuracy and AUC ROC of 0.859 in English (e5 with PCA). PCA compression preserves almost all discriminative power in the supervised setting, while showing some negative impact for the unsupervised anomaly detection case. These results demonstrate how modern multilingual sentence embeddings combined with gradient boosted decision trees provide robust soft-computing solutions for multilingual hate speech detection applications.", "link": "http://arxiv.org/abs/2604.14907v1", "date": "2026-04-16", "relevancy": 2.3643, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4934}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4626}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4626}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Comparison%20of%20Modern%20Multilingual%20Text%20Embedding%20Techniques%20for%20Hate%20Speech%20Detection%20Task&body=Title%3A%20Comparison%20of%20Modern%20Multilingual%20Text%20Embedding%20Techniques%20for%20Hate%20Speech%20Detection%20Task%0AAuthor%3A%20Evaldas%20Vaiciukynas%20and%20Paulius%20Danenas%20and%20Linas%20Ablonskis%20and%20Algirdas%20Sukys%20and%20Edgaras%20Dambrauskas%20and%20Voldemaras%20Zitkus%20and%20Rita%20Butkiene%20and%20Rimantas%20Butleris%0AAbstract%3A%20Online%20hate%20speech%20and%20abusive%20language%20pose%20a%20growing%20challenge%20for%20content%20moderation%2C%20especially%20in%20multilingual%20settings%20and%20for%20low-resource%20languages%20such%20as%20Lithuanian.%20This%20paper%20investigates%20to%20what%20extent%20modern%20multilingual%20sentence%20embedding%20models%20can%20support%20accurate%20hate%20speech%20detection%20in%20Lithuanian%2C%20Russian%2C%20and%20English%2C%20and%20how%20their%20performance%20depends%20on%20downstream%20modeling%20choices%20and%20feature%20dimensionality.%20We%20introduce%20LtHate%2C%20a%20new%20Lithuanian%20hate%20speech%20corpus%20derived%20from%20news%20portals%20and%20social%20networks%2C%20and%20benchmark%20six%20modern%20multilingual%20encoders%20%28potion%2C%20gemma%2C%20bge%2C%20snow%2C%20jina%2C%20e5%29%20on%20LtHate%2C%20RuToxic%2C%20and%20EnSuperset%20using%20a%20unified%20Python%20pipeline.%20For%20each%20embedding%2C%20we%20train%20both%20a%20one%20class%20HBOS%20anomaly%20detector%20and%20a%20two%20class%20CatBoost%20classifier%2C%20with%20and%20without%20principal%20component%20analysis%20%28PCA%29%20compression%20to%2064-dimensional%20feature%20vectors.%20Across%20all%20datasets%2C%20two%20class%20supervised%20models%20consistently%20and%20substantially%20outperform%20one%20class%20anomaly%20detection%2C%20with%20the%20best%20configurations%20achieving%20up%20to%2080.96%25%20accuracy%20and%20AUC%20ROC%20of%200.887%20in%20Lithuanian%20%28jina%29%2C%2092.19%25%20accuracy%20and%20AUC%20ROC%20of%200.978%20in%20Russian%20%28e5%29%2C%20and%2077.21%25%20accuracy%20and%20AUC%20ROC%20of%200.859%20in%20English%20%28e5%20with%20PCA%29.%20PCA%20compression%20preserves%20almost%20all%20discriminative%20power%20in%20the%20supervised%20setting%2C%20while%20showing%20some%20negative%20impact%20for%20the%20unsupervised%20anomaly%20detection%20case.%20These%20results%20demonstrate%20how%20modern%20multilingual%20sentence%20embeddings%20combined%20with%20gradient%20boosted%20decision%20trees%20provide%20robust%20soft-computing%20solutions%20for%20multilingual%20hate%20speech%20detection%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14907v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DComparison%2520of%2520Modern%2520Multilingual%2520Text%2520Embedding%2520Techniques%2520for%2520Hate%2520Speech%2520Detection%2520Task%26entry.906535625%3DEvaldas%2520Vaiciukynas%2520and%2520Paulius%2520Danenas%2520and%2520Linas%2520Ablonskis%2520and%2520Algirdas%2520Sukys%2520and%2520Edgaras%2520Dambrauskas%2520and%2520Voldemaras%2520Zitkus%2520and%2520Rita%2520Butkiene%2520and%2520Rimantas%2520Butleris%26entry.1292438233%3DOnline%2520hate%2520speech%2520and%2520abusive%2520language%2520pose%2520a%2520growing%2520challenge%2520for%2520content%2520moderation%252C%2520especially%2520in%2520multilingual%2520set {"title": "Sampling Transferable Graph Neural Networks with Limited Graph Information", "author": "Haoyu Wang and Renyuan Ma and Gonzalo Mateos and Luana Ruiz", "abstract": "Graph neural networks (GNNs) achieve strong performance on graph learning tasks, but training on large-scale networks remains computationally challenging. Transferability results show that GNNs with fixed weights can generalize from smaller graphs to larger ones drawn from the same family, motivating the use of sampled subgraphs to boost training efficiency. Yet most existing sampling strategies rely on reliable access to the target graph structure, which in practice may be noisy, incomplete, or unavailable prior to training. In lieu of precise connectivity information, we study feature-driven subgraph sampling for transferable GNNs, with the goal of preserving spectral properties of graph operators that control GNN expressivity. We adopt an alignment-based perspective linking node feature statistics to graph spectral structure and develop two complementary notions of feature-graph alignment. For coarse alignment, we formalize feature homophily through a Laplacian-based measure quantifying the alignment of feature principal components with graph eigenvectors, and establish a lower bound on the Laplacian trace in terms of feature statistics. This motivates a simple, non-sequential sampling algorithm that operates on the feature matrix and preserves a trace-based proxy for operator rank. For fine alignment, we assume a stationary model where the feature covariance and Laplacian share an eigenbasis, and establish that diagonal covariance entries reflect node-degree ordering under monotone filters. We empirically validate that filter monotonicity dictates the relationship between feature variance and spectral energy. On real-world benchmarks, selecting the retention rule that maximizes the Laplacian trace consistently yields GNNs with superior transferability and reduced generalization gaps.", "link": "http://arxiv.org/abs/2410.16593v6", "date": "2026-04-16", "relevancy": 2.3609, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4825}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4712}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4628}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Sampling%20Transferable%20Graph%20Neural%20Networks%20with%20Limited%20Graph%20Information&body=Title%3A%20Sampling%20Transferable%20Graph%20Neural%20Networks%20with%20Limited%20Graph%20Information%0AAuthor%3A%20Haoyu%20Wang%20and%20Renyuan%20Ma%20and%20Gonzalo%20Mateos%20and%20Luana%20Ruiz%0AAbstract%3A%20Graph%20neural%20networks%20%28GNNs%29%20achieve%20strong%20performance%20on%20graph%20learning%20tasks%2C%20but%20training%20on%20large-scale%20networks%20remains%20computationally%20challenging.%20Transferability%20results%20show%20that%20GNNs%20with%20fixed%20weights%20can%20generalize%20from%20smaller%20graphs%20to%20larger%20ones%20drawn%20from%20the%20same%20family%2C%20motivating%20the%20use%20of%20sampled%20subgraphs%20to%20boost%20training%20efficiency.%20Yet%20most%20existing%20sampling%20strategies%20rely%20on%20reliable%20access%20to%20the%20target%20graph%20structure%2C%20which%20in%20practice%20may%20be%20noisy%2C%20incomplete%2C%20or%20unavailable%20prior%20to%20training.%20In%20lieu%20of%20precise%20connectivity%20information%2C%20we%20study%20feature-driven%20subgraph%20sampling%20for%20transferable%20GNNs%2C%20with%20the%20goal%20of%20preserving%20spectral%20properties%20of%20graph%20operators%20that%20control%20GNN%20expressivity.%20We%20adopt%20an%20alignment-based%20perspective%20linking%20node%20feature%20statistics%20to%20graph%20spectral%20structure%20and%20develop%20two%20complementary%20notions%20of%20feature-graph%20alignment.%20For%20coarse%20alignment%2C%20we%20formalize%20feature%20homophily%20through%20a%20Laplacian-based%20measure%20quantifying%20the%20alignment%20of%20feature%20principal%20components%20with%20graph%20eigenvectors%2C%20and%20establish%20a%20lower%20bound%20on%20the%20Laplacian%20trace%20in%20terms%20of%20feature%20statistics.%20This%20motivates%20a%20simple%2C%20non-sequential%20sampling%20algorithm%20that%20operates%20on%20the%20feature%20matrix%20and%20preserves%20a%20trace-based%20proxy%20for%20operator%20rank.%20For%20fine%20alignment%2C%20we%20assume%20a%20stationary%20model%20where%20the%20feature%20covariance%20and%20Laplacian%20share%20an%20eigenbasis%2C%20and%20establish%20that%20diagonal%20covariance%20entries%20reflect%20node-degree%20ordering%20under%20monotone%20filters.%20We%20empirically%20validate%20that%20filter%20monotonicity%20dictates%20the%20relationship%20between%20feature%20variance%20and%20spectral%20energy.%20On%20real-world%20benchmarks%2C%20selecting%20the%20retention%20rule%20that%20maximizes%20the%20Laplacian%20trace%20consistently%20yields%20GNNs%20with%20superior%20transferability%20and%20reduced%20generalization%20gaps.%0ALink%3A%20http%3A//arxiv.org/abs/2410.16593v6%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSampling%2520Transferable%2520Graph%2520Neural%2520Networks%2520with%2520Limited%2520Graph%2520Information%26entry.906535625%3DHaoyu%2520Wang%2520and%2520Renyuan%2520Ma%2520and%2520Gonzalo%2520Mateos%2520and%2520Luana%2520Ruiz%26entry.1292438233%3DGraph%2520neural%2520networks%2520%2528GNNs%2529%2520achieve%2520strong%2520performance%2520on%2520graph%2520learning%2520tasks%252C%2520but%2520training%2520on%2520large-scale%2520networks%2520remains%2520computationally%2520challenging.%2520Transferability%2520results%2520show%2520that%25 hat%2520diagonal%2520covariance%2520entries%2520reflect%2520node-degree%2520ordering%2520under%2520monotone%2520filters.%2520We%2520empirically%2520validate%2520that%2520filter%2520monotonicity%2520dictates%2520the%2520relationship%2520between%2520feature%2520variance%2520and%2520spectral%2520energy.%2520On%2520real-world%2520benchmarks%252C%2520selecting%2520the%2520retention%2520rule%2520that%2520maximizes%2520the%2520Laplacian%2520trace%2520consistently%2520yields%2520GNNs%2520with%2520superior%2520transferability%2520and%2520reduced%2520generalization%2520gaps.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2410.16593v6%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Sampling%20Transferable%20Graph%20Neural%20Networks%20with%20Limited%20Graph%20Information&entry.906535625=Haoyu%20Wang%20and%20Renyuan%20Ma%20and%20Gonzalo%20Mateos%20and%20Luana%20Ruiz&entry.1292438233=Graph%20neural%20networks%20%28GNNs%29%20achieve%20strong%20performance%20on%20graph%20learning%20tasks%2C%20but%20training%20on%20large-scale%20networks%20remains%20computationally%20challenging.%20Transferability%20results%20show%20that%20GNNs%20with%20fixed%20weights%20can%20generalize%20from%20smaller%20graphs%20to%20larger%20ones%20drawn%20from%20the%20same%20family%2C%20motivating%20the%20use%20of%20sampled%20subgraphs%20to%20boost%20training%20efficiency.%20Yet%20most%20existing%20sampling%20strategies%20rely%20on%20reliable%20access%20to%20the%20target%20graph%20structure%2C%20which%20in%20practice%20may%20be%20noisy%2C%20incomplete%2C%20or%20unavailable%20prior%20to%20training.%20In%20lieu%20of%20precise%20connectivity%20information%2C%20we%20study%20feature-driven%20subgraph%20sampling%20for%20transferable%20GNNs%2C%20with%20the%20goal%20of%20preserving%20spectral%20properties%20of%20graph%20operators%20that%20control%20GNN%20expressivity.%20We%20adopt%20an%20alignment-based%20perspective%20linking%20node%20feature%20statistics%20to%20graph%20spectral%20structure%20and%20develop%20two%20complementary%20notions%20of%20feature-graph%20alignment.%20For%20coarse%20alignment%2C%20we%20formalize%20feature%20homophily%20through%20a%20Laplacian-based%20measure%20quantifying%20the%20alignment%20of%20feature%20principal%20components%20with%20graph%20eigenvectors%2C%20and%20establish%20a%20lower%20bound%20on%20the%20Laplacian%20trace%20in%20terms%20of%20feature%20statistics.%20This%20motivates%20a%20simple%2C%20non-sequential%20sampling%20algorithm%20that%20operates%20on%20the%20feature%20matrix%20and%20preserves%20a%20trace-based%20proxy%20for%20operator%20rank.%20For%20fine%20alignment%2C%20we%20assume%20a%20stationary%20model%20where%20the%20feature%20covariance%20and%20Laplacian%20share%20an%20eigenbasis%2C%20and%20establish%20that%20diagonal%20covariance%20entries%20reflect%20node-degree%20ordering%20under%20monotone%20filters.%20We%20empirically%20validate%20that%20filter%20monotonicity%20dictates%20the%20relationship%20between%20feature%20variance%20and%20spectral%20energy.%20On%20real-world%20benchmarks%2C%20selecting%20the%20retention%20rule%20that%20maximizes%20the%20Laplacian%20trace%20consistently%20yields%20GNNs%20with%20superior%20transferability%20and%20reduced%20generalization%20gaps.&entry.1838667208=http%3A//arxiv.org/abs/2410.16593v6&entry.124074799=Read"},
{"title": "RLPO: Residual Listwise Preference Optimization for Long-Context Review Ranking", "author": "Hao Jiang and Zhi Yang and Annan Wang and Yichi Zhang and Weisi Lin", "abstract": "Review ranking is pivotal in e-commerce for prioritizing diagnostic and authentic feedback from the deluge of user-generated content. While large language models have improved semantic assessment, existing ranking paradigms face a persistent trade-off in long-context settings. Pointwise scoring is efficient but often fails to account for list-level interactions, leading to miscalibrated top-$k$ rankings. Listwise approaches can leverage global context, yet they are computationally expensive and become unstable as candidate lists grow. To address this, we propose Residual Listwise Preference Optimization (RLPO), which formulates ranking as listwise representation-level residual correction over a strong pointwise LLM scorer. RLPO first produces calibrated pointwise scores and item representations, then applies a lightweight encoder over the representations to predict listwise score residuals, avoiding full token-level listwise processing. We also introduce a large-scale benchmark for long-context review ranking with human verification. Experiments show RLPO improves NDCG@k over strong pointwise and listwise baselines and remains robust as list length increases.", "link": "http://arxiv.org/abs/2601.07449v2", "date": "2026-04-16", "relevancy": 2.3541, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4818}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4818}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4489}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RLPO%3A%20Residual%20Listwise%20Preference%20Optimization%20for%20Long-Context%20Review%20Ranking&body=Title%3A%20RLPO%3A%20Residual%20Listwise%20Preference%20Optimization%20for%20Long-Context%20Review%20Ranking%0AAuthor%3A%20Hao%20Jiang%20and%20Zhi%20Yang%20and%20Annan%20Wang%20and%20Yichi%20Zhang%20and%20Weisi%20Lin%0AAbstract%3A%20Review%20ranking%20is%20pivotal%20in%20e-commerce%20for%20prioritizing%20diagnostic%20and%20authentic%20feedback%20from%20the%20deluge%20of%20user-generated%20content.%20While%20large%20language%20models%20have%20improved%20semantic%20assessment%2C%20existing%20ranking%20paradigms%20face%20a%20persistent%20trade-off%20in%20long-context%20settings.%20Pointwise%20scoring%20is%20efficient%20but%20often%20fails%20to%20account%20for%20list-level%20interactions%2C%20leading%20to%20miscalibrated%20top-%24k%24%20rankings.%20Listwise%20approaches%20can%20leverage%20global%20context%2C%20yet%20they%20are%20computationally%20expensive%20and%20become%20unstable%20as%20candidate%20lists%20grow.%20To%20address%20this%2C%20we%20propose%20Residual%20Listwise%20Preference%20Optimization%20%28RLPO%29%2C%20which%20formulates%20ranking%20as%20listwise%20representation-level%20residual%20correction%20over%20a%20strong%20pointwise%20LLM%20scorer.%20RLPO%20first%20produces%20calibrated%20pointwise%20scores%20and%20item%20representations%2C%20then%20applies%20a%20lightweight%20encoder%20over%20the%20representations%20to%20predict%20listwise%20score%20residuals%2C%20avoiding%20full%20token-level%20listwise%20processing.%20We%20also%20introduce%20a%20large-scale%20benchmark%20for%20long-context%20review%20ranking%20with%20human%20verification.%20Experiments%20show%20RLPO%20improves%20NDCG%40k%20over%20strong%20pointwise%20and%20listwise%20baselines%20and%20remains%20robust%20as%20list%20length%20increases.%0ALink%3A%20http%3A//arxiv.org/abs/2601.07449v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ 2520over%2520strong%2520pointwise%2520and%2520listwise%2520baselines%2520and%2520remains%2520robust%2520as%2520list%2520length%2520increases.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.07449v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=RLPO%3A%20Residual%20Listwise%20Preference%20Optimization%20for%20Long-Context%20Review%20Ranking&entry.906535625=Hao%20Jiang%20and%20Zhi%20Yang%20and%20Annan%20Wang%20and%20Yichi%20Zhang%20and%20Weisi%20Lin&entry.1292438233=Review%20ranking%20is%20pivotal%20in%20e-commerce%20for%20prioritizing%20diagnostic%20and%20authentic%20feedback%20from%20the%20deluge%20of%20user-generated%20content.%20While%20large%20language%20models%20have%20improved%20semantic%20assessment%2C%20existing%20ranking%20paradigms%20face%20a%20persistent%20trade-off%20in%20long-context%20settings.%20Pointwise%20scoring%20is%20efficient%20but%20often%20fails%20to%20account%20for%20list-level%20interactions%2C%20leading%20to%20miscalibrated%20top-%24k%24%20rankings.%20Listwise%20approaches%20can%20leverage%20global%20context%2C%20yet%20they%20are%20computationally%20expensive%20and%20become%20unstable%20as%20candidate%20lists%20grow.%20To%20address%20this%2C%20we%20propose%20Residual%20Listwise%20Preference%20Optimization%20%28RLPO%29%2C%20which%20formulates%20ranking%20as%20listwise%20representation-level%20residual%20correction%20over%20a%20strong%20pointwise%20LLM%20scorer.%20RLPO%20first%20produces%20calibrated%20pointwise%20scores%20and%20item%20representations%2C%20then%20applies%20a%20lightweight%20encoder%20over%20the%20representations%20to%20predict%20listwise%20score%20residuals%2C%20avoiding%20full%20token-level%20listwise%20processing.%20We%20also%20introduce%20a%20large-scale%20benchmark%20for%20long-context%20review%20ranking%20with%20human%20verification.%20Experiments%20show%20RLPO%20improves%20NDCG%40k%20over%20strong%20pointwise%20a {"title": "MEBench: A Novel Benchmark for Understanding Mutual Exclusivity Bias in Vision-Language Models", "author": "Anh Thai and Stefan Stojanov and Zixuan Huang and Bikram Boote and James M. Rehg", "abstract": "This paper introduces MEBench, a novel benchmark for evaluating mutual exclusivity (ME) bias, a cognitive phenomenon observed in children during word learning. Unlike traditional ME tasks, MEBench further incorporates spatial reasoning to create more challenging and realistic evaluation settings. To facilitate controlled experimentation, we also present a flexible and scalable data generation pipeline that supports the construction of diverse annotated scenes. We assess the performance of various vision-language models (VLMs) on this benchmark using novel evaluation metrics that capture key aspects of ME-based reasoning. We find that these VLMs exhibit weak ME bias, while showing some ability to leverage extra spatial context to resolve ambiguity in multiple novel object settings. Project page: http://mebench.github.io/.", "link": "http://arxiv.org/abs/2505.20122v2", "date": "2026-04-16", "relevancy": 2.3533, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5959}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5959}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5504}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MEBench%3A%20A%20Novel%20Benchmark%20for%20Understanding%20Mutual%20Exclusivity%20Bias%20in%20Vision-Language%20Models&body=Title%3A%20MEBench%3A%20A%20Novel%20Benchmark%20for%20Understanding%20Mutual%20Exclusivity%20Bias%20in%20Vision-Language%20Models%0AAuthor%3A%20Anh%20Thai%20and%20Stefan%20Stojanov%20and%20Zixuan%20Huang%20and%20Bikram%20Boote%20and%20James%20M.%20Rehg%0AAbstract%3A%20This%20paper%20introduces%20MEBench%2C%20a%20novel%20benchmark%20for%20evaluating%20mutual%20exclusivity%20%28ME%29%20bias%2C%20a%20cognitive%20phenomenon%20observed%20in%20children%20during%20word%20learning.%20Unlike%20traditional%20ME%20tasks%2C%20MEBench%20further%20incorporates%20spatial%20reasoning%20to%20create%20more%20challenging%20and%20realistic%20evaluation%20settings.%20To%20facilitate%20controlled%20experimentation%2C%20we%20also%20present%20a%20flexible%20and%20scalable%20data%20generation%20pipeline%20that%20supports%20the%20construction%20of%20diverse%20annotated%20scenes.%20We%20assess%20the%20performance%20of%20various%20vision-language%20models%20%28VLMs%29%20on%20this%20benchmark%20using%20novel%20evaluation%20metrics%20that%20capture%20key%20aspects%20of%20ME-based%20reasoning.%20We%20find%20that%20these%20VLMs%20exhibit%20weak%20ME%20bias%2C%20while%20showing%20some%20ability%20to%20leverage%20extra%20spatial%20context%20to%20resolve%20ambiguity%20in%20multiple%20novel%20object%20settings.%20Project%20page%3A%20http%3A//mebench.github.io/.%0ALink%3A%20http%3A//arxiv.org/abs/2505.20122v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMEBench%253A%2520A%2520Novel%2520Benchmark%2520for%2520Understanding%2520Mutual%2520Exclusivity%2520Bias%2520in%2520Vision-Language%2520Models%26entry.906535625%3DAnh%2520Thai%2520and%2520Stefan%2520Stojanov%2520and%2520Zixuan%2520Huang%2520and%2520Bikram%2520Boote%2520and%2520James%2520M.%2520Rehg%26entry.1292438233%3DThis%2520paper%2520introduces%2520MEBench%252C%2520a%2520novel%2520benchmark%2520for%2520evaluating%2520mutual%2520exclusivity%2520%2528ME%2529%2520bias%252C%2520a%2520cognitive%2520phenomenon%2520observed%2520in%2520children%2520during%2520word%2520learning.%2520Unlike%2520traditional%2520ME {"title": "Adaptive Layer Selection for Layer-Wise Token Pruning in LLM Inference", "author": "Rei Taniguchi and Yuyang Dong and Makoto Onizuka and Chuan Xiao", "abstract": "Due to the prevalence of large language models (LLMs), key-value (KV) cache reduction for LLM inference has received remarkable attention. Among numerous works that have been proposed in recent years, layer-wise token pruning approaches, which select a subset of tokens at particular layers to retain in KV cache and prune others, are one of the most popular schemes. They primarily adopt a set of pre-defined layers, at which tokens are selected. Such design is inflexible in the sense that the accuracy significantly varies across tasks and deteriorates in harder tasks such as KV retrieval. In this paper, we propose ASL, a training-free method that adaptively chooses the selection layer for KV cache reduction, exploiting the variance of token ranks ordered by attention score. The proposed method balances the performance across different tasks while meeting the user-specified KV budget requirement. ASL operates during the prefilling stage and can be jointly used with existing KV cache reduction methods such as SnapKV to optimize the decoding stage. By evaluations on the InfiniteBench, RULER, and NIAH benchmarks, we show that ASL, equipped with one-shot token selection, adaptively trades inference speed for accuracy, outperforming state-of-the-art layer-wise token pruning methods in difficult tasks.", "link": "http://arxiv.org/abs/2601.07667v2", "date": "2026-04-16", "relevancy": 2.3435, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.507}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4512}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4479}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Adaptive%20Layer%20Selection%20for%20Layer-Wise%20Token%20Pruning%20in%20LLM%20Inference&body=Title%3A%20Adaptive%20Layer%20Selection%20for%20Layer-Wise%20Token%20Pruning%20in%20LLM%20Inference%0AAuthor%3A%20Rei%20Taniguchi%20and%20Yuyang%20Dong%20and%20Makoto%20Onizuka%20and%20Chuan%20Xiao%0AAbstract%3A%20Due%20to%20the%20prevalence%20of%20large%20language%20models%20%28LLMs%29%2C%20key-value%20%28KV%29%20cache%20reduction%20for%20LLM%20inference%20has%20received%20remarkable%20attention.%20Among%20numerous%20works%20that%20have%20been%20proposed%20in%20recent%20years%2C%20layer-wise%20token%20pruning%20approaches%2C%20which%20select%20a%20subset%20of%20tokens%20at%20particular%20layers%20to%20retain%20in%20KV%20cache%20and%20prune%20others%2C%20are%20one%20of%20the%20most%20popular%20schemes.%20They%20primarily%20adopt%20a%20set%20of%20pre-defined%20layers%2C%20at%20which%20tokens%20are%20selected.%20Such%20design%20is%20inflexible%20in%20the%20sense%20that%20the%20accuracy%20significantly%20varies%20across%20tasks%20and%20deteriorates%20in%20harder%20tasks%20such%20as%20KV%20retrieval.%20In%20this%20paper%2C%20we%20propose%20ASL%2C%20a%20training-free%20method%20that%20adaptively%20chooses%20the%20selection%20layer%20for%20KV%20cache%20reduction%2C%20exploiting%20the%20variance%20of%20token%20ranks%20ordered%20by%20attention%20score.%20The%20proposed%20method%20balances%20the%20performance%20across%20different%20tasks%20while%20meeting%20the%20user-specified%20KV%20budget%20requirement.%20ASL%20operates%20during%20the%20prefilling%20stage%20and%20can%20be%20jointly%20used%20with%20existing%20KV%20cache%20reduction%20methods%20such%20as%20SnapKV%20to%20optimize%20the%20decoding%20stage.%20By%20evaluations%20on%20the%20InfiniteBench%2C%20RULER%2C%20and%20NIAH%20benchmarks%2C%20we%20show%20that%20ASL%2C%20equipped%20with%20one-shot%20token%20selection%2C%20adaptively%20trades%20inference%20speed%20for%20accuracy%2C%20outperforming%20state-of-the-art%20layer-wise%20token%20pruning%20methods%20in%20difficult%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2601.07667v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAdaptive%2520Layer%2520Selection%2520for%2520Layer-Wise%2520Token%2520Pruning%2520in%2520LLM%2520Inference%26entry.906535625%3DRei%2520Taniguchi%2520and%2520Yuyang%2520Dong%2520and%2520Makoto%2520Onizuka%2520and%2520Chuan%2520Xiao%26entry.1292438233%3DDue%2520to%2520the%2520prevalence%2520of%2520large%2520language%2520models%2520%2528LLMs%2529%252C%2520key-value%2520%2528KV%2529%2520cache%2520reduction%2520for%2520LLM%2520inference%2520has%2520received%2520remarkable%2520attention.%2520Among%2520numerous%2520works%2520that%2520have%2520been%2520proposed%2520in%2520recent%2520years%252C%2520layer-wise%2520token%2520pruning%2520approaches%252C%2520which%2520select%2520a%2520subset%2520of%2520tokens%2520at%2520particular%2520layers%2520to%2520retain%2520in%2520KV%2520cache%2520and%2520prune%2520others%252C%2520are%2520one%2520of%2520the%2520most%2520popular%2520schemes.%2520They%2520primarily%2520adopt%2520a%2520set%2520of%2520pre-defined%2520layers%252C%2520at%2520which%2520tokens%2520are%2520selected.%2520Such%2520design%2520is%2520inflexible%2520in%2520the%2520sense%2520that%2520the%2520accuracy%2520significantly%2520varies%2520across%2520tasks%2520and%2520deteriorates%2520in%2520harder%2520tasks%2520such%2520as%2520KV%2520retrieval.%2520In%2520this%2520paper%252C%2520we%2520propose%2520ASL%252C%2520a%2520training-free%2520method%2520that%2520adaptively%2520chooses%2520the%2520selection%2520layer%2520for%2520KV%2520cache%2520reduction%252C%2520exploiting%2520the%2520variance%2520of%2520token%2520ranks%2520ordered%2520by%2520attention%2520score.%2520The%2520proposed%2520method%2520balances% {"title": "IG-Search: Step-Level Information Gain Rewards for Search-Augmented Reasoning", "author": "Zihan Liang and Yufei Ma and Ben Chen and Zhipeng Qian and Huangyu Dai and Lingtao Mao and Xuxin Zhang and Chenyi Lei and Wenwu Ou", "abstract": "Reinforcement learning has emerged as an effective paradigm for training large language models to perform search-augmented reasoning. However, existing approaches rely on trajectory-level rewards that cannot distinguish precise search queries from vague or redundant ones within a rollout group, and collapse to a near-zero gradient signal whenever every sampled trajectory fails. In this paper, we propose IG-Search, a reinforcement learning framework that introduces a step-level reward based on Information Gain (IG). For each search step, IG measures how much the retrieved documents improve the model's confidence in the gold answer relative to a counterfactual baseline of random documents, thereby reflecting the effectiveness of the underlying search query. This signal is fed back to the corresponding search-query tokens via per-token advantage modulation in GRPO, enabling fine-grained, step-level credit assignment within a rollout. Unlike prior step-level methods that require either externally annotated intermediate supervision or shared environment states across trajectories, IG-Search derives its signals from the policy's own generation probabilities, requiring no intermediate annotations beyond standard question-answer pairs. Experiments on seven single-hop and multi-hop QA benchmarks demonstrate that IG-Search achieves an average EM of 0.430 with Qwen2.5-3B, outperforming the strongest trajectory-level baseline (MR-Search) by 1.6 points and the step-level method GiGPO by 0.9 points on average across benchmarks, with particularly pronounced gains on multi-hop reasoning tasks. Despite introducing a dense step-level signal, IG-Search adds only ~6.4% to per-step training wall-clock time over the trajectory-level baseline and leaves inference latency unchanged, while still providing a meaningful gradient signal even when every sampled trajectory answers incorrectly.", "link": "http://arxiv.org/abs/2604.15148v1", "date": "2026-04-16", "relevancy": 2.3328, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4855}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4584}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4558}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20IG-Search%3A%20Step-Level%20Information%20Gain%20Rewards%20for%20Search-Augmented%20Reasoning&body=Title%3A%20IG-Search%3A%20Step-Level%20Information%20Gain%20Rewards%20for%20Search-Augmented%20Reasoning%0AAuthor%3A%20Zihan%20Liang%20and%20Yufei%20Ma%20and%20Ben%20Chen%20and%20Zhipeng%20Qian%20and%20Huangyu%20Dai%20and%20Lingtao%20Mao%20and%20Xuxin%20Zhang%20and%20Chenyi%20Lei%20and%20Wenwu%20Ou%0AAbstract%3A%20Reinforcement%20learning%20has%20emerged%20as%20an%20effective%20paradigm%20for%20training%20large%20language%20models%20to%20perform%20search-augmented%20reasoning.%20However%2C%20existing%20approaches%20rely%20on%20trajectory-level%20rewards%20that%20cannot%20distinguish%20precise%20search%20queries%20from%20vague%20or%20redundant%20ones%20within%20a%20rollout%20group%2C%20and%20collapse%20to%20a%20near-zero%20gradient%20signal%20whenever%20every%20sampled%20trajectory%20fails.%20In%20this%20paper%2C%20we%20propose%20IG-Search%2C%20a%20reinforcement%20learning%20framework%20that%20introduces%20a%20step-level%20reward%20based%20on%20Information%20Gain%20%28IG%29.%20For%20each%20search%20step%2C%20IG%20measures%20how%20much%20the%20retrieved%20documents%20improve%20the%20model%27s%20confidence%20in%20the%20gold%20answer%20relative%20to%20a%20counterfactual%20baseline%20of%20random%20documents%2C%20thereby%20reflecting%20the%20effectiveness%20of%20the%20underlying%20search%20query.%20This%20signal%20is%20fed%20back%20to%20the%20corresponding%20search-query%20tokens%20via%20per-token%20advantage%20modulation%20in%20GRPO%2C%20enabling%20fine-grained%2C%20step-level%20credit%20assignment%20within%20a%20rollout.%20Unlike%20prior%20step-level%20methods%20that%20require%20either%20externally%20annotated%20intermediate%20supervision%20or%20shared%20environment%20states%20across%20trajectories%2C%20IG-Search%20derives%20its%20signals%20from%20the%20policy%27s%20own%20generation%20probabilities%2C%20requiring%20no%20intermediate%20annotations%20beyond%20standard%20question-answer%20pairs.%20Experiments%20on%20seven%20single-hop%20and%20multi-hop%20QA%20benchmarks%20demonstrate%20that%20IG-Search%20achieves%20an%20average%20EM%20of%200.430%20with%20Qwen2.5-3B%2C%20outperforming%20the%20strongest%20trajectory-level%20baseline%20%28MR-Search%29%20by%201.6%20points%20and%20the%20step-level%20method%20GiGPO%20by%200.9%20points%20on%20average%20across%20benchmarks%2C%20with%20particularly%20pronounced%20gains%20on%20multi-hop%20reasoning%20tasks.%20Despite%20introducing%20a%20dense%20step-level%20signal%2C%20IG-Search%20adds%20only%20~6.4%25%20to%20per-step%20training%20wall-clock%20time%20over%20the%20trajectory-level%20baseline%20and%20leaves%20inference%20latency%20unchanged%2C%20while%20still%20providing%20a%20meaningful%20gradient%20signal%20even%20when%20every%20sampled%20trajectory%20answers%20incorrectly.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15148v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIG-Search%253A%2520Step-Level%2520Information%2520Gain%2520Rewards%2520for%2520Search-Augmented%2520Reasoning%26entry.906535625%3DZihan%2520Liang%2520and%2520Yufei%2520Ma%2520and%2520Ben%2520Chen%2520and%2520Zhipeng%2520Qian {"title": "KVNN: Learnable Multi-Kernel Volterra Neural Networks", "author": "Haoyu Yun and Hamid Krim and Yufang Bao", "abstract": "Higher-order learning is fundamentally rooted in exploiting compositional features. It clearly hinges on enriching the representation by more elaborate interactions of the data which, in turn, tends to increase the model complexity of conventional large-scale deep learning models. In this paper, a kernelized Volterra Neural Network (kVNN) is proposed. The key to the achieved efficiency lies in using a learnable multi-kernel representation, where different interaction orders are modeled by distinct polynomial-kernel components with compact, learnable centers, yielding an order-adaptive parameterization. Features are learned by the composition of layers, each of which consists of parallel branches of different polynomial orders, enabling kVNN filters to directly replace standard convolutional kernels within existing architectures. The theoretical results are substantiated by experiments on two representative tasks: video action recognition and image denoising. The results demonstrate favorable performance-efficiency trade-offs: kVNN consistently yields reduced model (parameters) and computational (GFLOPs) complexity with competitive and often improved performance. These results are maintained even when trained from scratch without large-scale pretraining. In summary, we substantiate that structured kernelized higher-order layers offer a practical path to balancing expressivity and computational cost in modern deep networks.", "link": "http://arxiv.org/abs/2604.15141v1", "date": "2026-04-16", "relevancy": 2.3246, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4866}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4568}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4513}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20KVNN%3A%20Learnable%20Multi-Kernel%20Volterra%20Neural%20Networks&body=Title%3A%20KVNN%3A%20Learnable%20Multi-Kernel%20Volterra%20Neural%20Networks%0AAuthor%3A%20Haoyu%20Yun%20and%20Hamid%20Krim%20and%20Yufang%20Bao%0AAbstract%3A%20Higher-order%20learning%20is%20fundamentally%20rooted%20in%20exploiting%20compositional%20features.%20It%20clearly%20hinges%20on%20enriching%20the%20representation%20by%20more%20elaborate%20interactions%20of%20the%20data%20which%2C%20in%20turn%2C%20tends%20to%20increase%20the%20model%20complexity%20of%20conventional%20large-scale%20deep%20learning%20models.%20In%20this%20paper%2C%20a%20kernelized%20Volterra%20Neural%20Network%20%28kVNN%29%20is%20proposed.%20The%20key%20to%20the%20achieved%20efficiency%20lies%20in%20using%20a%20learnable%20multi-kernel%20representation%2C%20where%20different%20interaction%20orders%20are%20modeled%20by%20distinct%20polynomial-kernel%20components%20with%20compact%2C%20learnable%20centers%2C%20yielding%20an%20order-adaptive%20parameterization.%20Features%20are%20learned%20by%20the%20composition%20of%20layers%2C%20each%20of%20which%20consists%20of%20parallel%20branches%20of%20different%20polynomial%20orders%2C%20enabling%20kVNN%20filters%20to%20directly%20replace%20standard%20convolutional%20kernels%20within%20existing%20architectures.%20The%20theoretical%20results%20are%20substantiated%20by%20experiments%20on%20two%20representative%20tasks%3A%20video%20action%20recognition%20and%20image%20denoising.%20The%20results%20demonstrate%20favorable%20performance-efficiency%20trade-offs%3A%20kVNN%20consistently%20yields%20reduced%20model%20%28parameters%29%20and%20computational%20%28GFLOPs%29%20complexity%20with%20competitive%20and%20often%20improved%20performance.%20These%20results%20are%20maintained%20even%2 {"title": "One Token per Highly Selective Frame: Towards Extreme Compression for Long Video Understanding", "author": "Zheyu Zhang and Ziqi Pang and Shixing Chen and Xiang Hao and Vimal Bhat and Yu-Xiong Wang", "abstract": "Long video understanding is inherently challenging for vision-language models (VLMs) because of the extensive number of frames. With each video frame typically expanding into tens or hundreds of tokens, the limited context length of large language models (LLMs) forces the VLMs to perceive the frames sparsely and lose temporal information. To address this, we explore extreme video token compression towards one token per frame at the final LLM layer. Our key insight is that heuristic-based compression, widely adopted by previous methods, is prone to information loss, and this necessitates supervising LLM layers into learnable and progressive modules for token-level compression (LP-Comp). Such compression enables our VLM to digest 2x-4x more frames with improved performance. To further increase the token efficiency, we investigate frame-level compression, which selects the frames most relevant to the queries via the internal attention scores of the LLM layers, named question-conditioned compression (QC-Comp). As a notable distinction from previous studies, we mitigate the position bias of LLM attention in long contexts, i.e., the over-concentration on the beginning and end of a sequence, by splitting long videos into short segments and employing local attention. Collectively, our combined token-level and frame-level leads to an extreme compression model for long video understanding, named XComp, achieving a significantly larger compression ratio and enabling denser frame sampling. Our XComp is finetuned from VideoChat-Flash with a data-efficient supervised compression tuning stage that only requires 2.5% of the supervised fine-tuning data, yet boosts the accuracy from 42.9% to 46.2% on LVBench and enhances multiple other long video benchmarks.", "link": "http://arxiv.org/abs/2604.14149v2", "date": "2026-04-16", "relevancy": 2.3189, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5832}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5832}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5625}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20One%20Token%20per%20Highly%20Selective%20Frame%3A%20Towards%20Extreme%20Compression%20for%20Long%20Video%20Understanding&body=Title%3A%20One%20Token%20per%20Highly%20Selective%20Frame%3A%20Towards%20Extreme%20Compression%20for%20Long%20Video%20Understanding%0AAuthor%3A%20Zheyu%20Zhang%20and%20Ziqi%20Pang%20and%20Shixing%20Chen%20and%20Xiang%20Hao%20and%20Vimal%20Bhat%20and%20Yu-Xiong%20Wang%0AAbstract%3A%20Long%20video%20understanding%20is%20inherently%20challenging%20for%20vision-language%20models%20%28VLMs%29%20because%20of%20the%20extensive%20number%20of%20frames.%20With%20each%20video%20frame%20typically%20expanding%20into%20tens%20or%20hundreds%20of%20tokens%2C%20the%20limited%20context%20length%20of%20large%20language%20models%20%28LLMs%29%20forces%20the%20VLMs%20to%20perceive%20the%20frames%20sparsely%20and%20lose%20temporal%20information.%20To%20address%20this%2C%20we%20explore%20extreme%20video%20token%20compression%20towards%20one%20token%20per%20frame%20at%20the%20final%20LLM%20layer.%20Our%20key%20insight%20is%20that%20heuristic-based%20compression%2C%20widely%20adopted%20by%20previous%20methods%2C%20is%20prone%20to%20information%20loss%2C%20and%20this%20necessitates%20supervising%20LLM%20layers%20into%20learnable%20and%20progressive%20modules%20for%20token-level%20compression%20%28LP-Comp%29.%20Such%20compression%20enables%20our%20VLM%20to%20digest%202x-4x%20more%20frames%20with%20improved%20performance.%20To%20further%20increase%20the%20token%20efficiency%2C%20we%20investigate%20frame-level%20compression%2C%20which%20selects%20the%20frames%20most%20relevant%20to%20the%20queries%20via%20the%20internal%20attention%20scores%20of%20the%20LLM%20layers%2C%20named%20question-conditioned%20compression%20%28QC-Comp%29.%20As%20a%20notable%20distinction%20from%20previous%20studies%2C%20we%20mitigate%20the%20position%20bias%20of%20LLM%20attention%20in%20long%20contexts%2C%20i.e.%2C%20the%20over-concentration%20on%20the%20beginning%20and%20end%20of%20a%20sequence%2C%20by%20splitting%20long%20videos%20into%20short%20segments%20and%20employing%20local%20attention.%20Collectively%2C%20our%20combined%20token-level%20and%20frame-level%20leads%20to%20an%20extreme%20compression%20model%20for%20long%20video%20understanding%2C%20named%20XComp%2C%20achieving%20a%20significantly%20larger%20compression%20ratio%20and%20enabling%20denser%20frame%20sampling.%20Our%20XComp%20is%20finetuned%20from%20VideoChat-Flash%20with%20a%20data-efficient%20supervised%20compression%20tuning%20stage%20that%20only%20requires%202.5%25%20of%20the%20supervised%20fine-tuning%20data%2C%20yet%20boosts%20the%20accuracy%20from%2042.9%25%20to%2046.2%25%20on%20LVBench%20and%20enhances%20multiple%20other%20long%20video%20benchmarks.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14149v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOne%2520Token%2520per%2520Highly%2520Selective%2520Frame%253A%2520Towards%2520Extreme%2520Compression%2520for%2520Long%2520Video%2520Understanding%26entry.906535625%3DZheyu%2520Zhang%2520and%2520Ziqi%2520Pang%2520and%2520Shixing%2520Chen%2520and%2520Xiang%2520Hao%2520and%2520Vimal%2520Bhat%2520and%2520Yu-Xiong%2520Wang%26entry.1292438233%3DLong%2520video%2520understanding%2520is%2520inherently%2520challenging%2520for 0local%2520attention.%2520Collectively%252C%2520our%2520combined%2520token-level%2520and%2520frame-level%2520leads%2520to%2520an%2520extreme%2520compression%2520model%2520for%2520long%2520video%2520understanding%252C%2520named%2520XComp%252C%2520achieving%2520a%2520significantly%2520larger%2520compression%2520ratio%2520and%2520enabling%2520denser%2520frame%2520sampling.%2520Our%2520XComp%2520is%2520finetuned%2520from%2520VideoChat-Flash%2520with%2520a%2520data-efficient%2520supervised%2520compression%2520tuning%2520stage%2520that%2520only%2520requires%25202.5%2525%2520of%2520the%2520supervised%2520fine-tuning%2520data%252C%2520yet%2520boosts%2520the%2520accuracy%2520from%252042.9%2525%2520to%252046.2%2525%2520on%2520LVBench%2520and%2520enhances%2520multiple%2520other%2520long%2520video%2520benchmarks.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.14149v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=One%20Token%20per%20Highly%20Selective%20Frame%3A%20Towards%20Extreme%20Compression%20for%20Long%20Video%20Understanding&entry.906535625=Zheyu%20Zhang%20and%20Ziqi%20Pang%20and%20Shixing%20Chen%20and%20Xiang%20Hao%20and%20Vimal%20Bhat%20and%20Yu-Xiong%20Wang&entry.1292438233=Long%20video%20understanding%20is%20inherently%20challenging%20for%20vision-language%20models%20%28VLMs%29%20because%20of%20the%20extensive%20number%20of%20frames.%20With%20each%20video%20frame%20typically%20expanding%20into%20tens%20or%20hundreds%20of%20tokens%2C%20the%20limited%20context%20length%20of%20large%20language%20models%20%28LLMs%29%20forces%20the%20VLMs%20to%20perceive%20the%20frames%20sparsely%20and%20lose%20temporal%20information.%20To%20address%20this%2C%20we%20explore%20extreme%20video%20token%20compression%20towards%20one%20token%20per%20frame%20at%20the%20final%20LLM%20layer.%20Our%20key%20insight%20is%20that%20heuristic-based%20compression%2C%20widely%20adopted%20by%20pre {"title": "Vision-Based Safe Human-Robot Collaboration with Uncertainty Guarantees", "author": "Jakob Thumm and Marian Frei and Tianle Ni and Matthias Althoff and Marco Pavone", "abstract": "We propose a framework for vision-based human pose estimation and motion prediction that gives conformal prediction guarantees for certifiably safe human-robot collaboration. Our framework combines aleatoric uncertainty estimation with OOD detection for high probabilistic confidence. To integrate our pipeline in certifiable safety frameworks, we propose conformal prediction sets for human motion predictions with high, valid confidence. We evaluate our pipeline on recorded human motion data and a real-world human-robot collaboration setting.", "link": "http://arxiv.org/abs/2604.15221v1", "date": "2026-04-16", "relevancy": 2.3095, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6066}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5735}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5695}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Vision-Based%20Safe%20Human-Robot%20Collaboration%20with%20Uncertainty%20Guarantees&body=Title%3A%20Vision-Based%20Safe%20Human-Robot%20Collaboration%20with%20Uncertainty%20Guarantees%0AAuthor%3A%20Jakob%20Thumm%20and%20Marian%20Frei%20and%20Tianle%20Ni%20and%20Matthias%20Althoff%20and%20Marco%20Pavone%0AAbstract%3A%20We%20propose%20a%20framework%20for%20vision-based%20human%20pose%20estimation%20and%20motion%20prediction%20that%20gives%20conformal%20prediction%20guarantees%20for%20certifiably%20safe%20human-robot%20collaboration.%20Our%20framework%20combines%20aleatoric%20uncertainty%20estimation%20with%20OOD%20detection%20for%20high%20probabilistic%20confidence.%20To%20integrate%20our%20pipeline%20in%20certifiable%20safety%20frameworks%2C%20we%20propose%20conformal%20prediction%20sets%20for%20human%20motion%20predictions%20with%20high%2C%20valid%20confidence.%20We%20evaluate%20our%20pipeline%20on%20recorded%20human%20motion%20data%20and%20a%20real-world%20human-robot%20collaboration%20setting.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15221v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVision-Based%2520Safe%2520Human-Robot%2520Collaboration%2520with%2520Uncertainty%2520Guarantees%26entry.906535625%3DJakob%2520Thumm%2520and%2520Marian%2520Frei%2520and%2520Tianle%2520Ni%2520and%2520Matthias%2520Althoff%2520and%2520Marco%2520Pavone%26entry.1292438233%3DWe%2520propose%2520a%2520framework%2520for%2520vision-based%2520human%2520pose%2520estimation%2520and%2520motion%2520prediction%2520that%2520gives%2520conformal%2520prediction%2520guarantees%2520for%2520certifiably%2520safe%2520human-robot%2520collaboration.%2520Our%2520framework%2520combines%2520aleatoric%2520uncertainty%2520estimation%2520with%2520OOD%2520detection%2520for%2520high%2520probabilistic%2520confidence.%2520To%2520integrate%2520our%2520pipeline%2520in%2520certifiable%2520safety%2520frameworks%252C%2520we%2520propose%2520conformal%2520prediction%2520sets%2520for%2520human%2520motion%2520predictions%2520with%2520high%252C%2520valid%2520confidence.%2520We%2520evaluate%2520our%2520pipeline%2520on%2520recorded%2520human%2520motion%2520data%2520and%2520a%2520real-world%2520human-robot%2520collaboration%2520setting.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.15221v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Vision-Based%20Safe%20Human-Robot%20Collaboration%20with%20Uncertainty%20Guarantees&entry.906535625=Jakob%20Thumm%20and%20Marian%20Frei%20and%20Tianle%20Ni%20and%20Matthias%20Althoff%20and%20Marco%20Pavone&entry.1292438233=We%20propose%20a%20framework%20for%20vision-based%20human%20pose%20estimation%20and%20motion%20prediction%20that%20gives%20conformal%20prediction%20guarantees%20for%20certifiably%20safe%20human-robot%20collaboration.%20Our%20framework%20combines%20aleatoric%20uncertainty%20estimation%20with%20OOD%20detection%20for%20high%20probabilistic%20confidence.%20To%20integrate%20our%20pipeline%20in%20certifiable%20safety%20frameworks%2C%20we%20propose%20conformal%20prediction%20sets%20for%20human%20motion%20predictions%20with%20high%2C%20valid%20confidence.%20We%20evaluate%20our%20pipeline%20on%20recorded%20human%20motion%20data%20and%20a%20real-world%20human-robot%20collaboration%20setting.&entry.1838667208=http%3A//arxiv.org/abs/2604.15221v1&entry.124074799=Read"},
{"title": "Beyond Independent Frames: Latent Attention Masked Autoencoders for Multi-View Echocardiography", "author": "Simon B\u00f6hi and Irene Cannistraci and Sergio Mu\u00f1oz Gonzalez and Moritz Vandenhirtz and Sonia Laguna and Samuel Ruiperez-Campillo and Max Kr\u00e4henmann and Andrea Agostini and Ece Ozkan and Thomas M. Sutter and Julia E. Vogt", "abstract": "Echocardiography is a widely used modality for cardiac assessment due to its non-invasive and cost-effective nature, but the sparse and heterogeneous spatiotemporal views of the heart pose distinct challenges. Existing masked autoencoder (MAE) approaches typically process images or short clips independently, failing to capture the inherent multi-view structure required for coherent cardiac representation. We introduce Latent Attention Masked Autoencoder (LAMAE), a foundation model architecture tailored to the multi-view nature of medical imaging. LAMAE augments the standard MAE with a latent attention module that enables information exchange across frames and views directly in latent space. This allows the model to aggregate variable-length sequences and distinct views, reconstructing a holistic representation of cardiac function from partial observations. We pretrain LAMAE on MIMIC-IV-ECHO, a large-scale, uncurated dataset reflecting real-world clinical variability. To the best of our knowledge, we present the first results for predicting ICD-10 codes from MIMIC-IV-ECHO videos. Furthermore, we empirically demonstrate that representations learned from adult data transfer effectively to pediatric cohorts despite substantial anatomical differences. These results provide evidence that incorporating structural priors, such as multi-view attention, yields significantly more robust and transferable representations.", "link": "http://arxiv.org/abs/2604.15096v1", "date": "2026-04-16", "relevancy": 2.3046, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5798}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5746}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.571}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Independent%20Frames%3A%20Latent%20Attention%20Masked%20Autoencoders%20for%20Multi-View%20Echocardiography&body=Title%3A%20Beyond%20Independent%20Frames%3A%20Latent%20Attention%20Masked%20Autoencoders%20for%20Multi-View%20Echocardiography%0AAuthor%3A%20Simon%20B%C3%B6hi%20and%20Irene%20Cannistraci%20and%20Sergio%20Mu%C3%B1oz%20Gonzalez%20and%20Moritz%20Vandenhirtz%20and%20Sonia%20Laguna%20and%20Samuel%20Ruiperez-Campillo%20and%20Max%20Kr%C3%A4henmann%20and%20Andrea%20Agostini%20and%20Ece%20Ozkan%20and%20Thomas%20M.%20Sutter%20and%20Julia%20E.%20Vogt%0AAbstract%3A%20Echocardiography%20is%20a%20widely%20used%20modality%20for%20cardiac%20assessment%20due%20to%20its%20non-invasive%20and%20cost-effective%20nature%2C%20but%20the%20sparse%20and%20heterogeneous%20spatiotemporal%20views%20of%20the%20heart%20pose%20distinct%20challenges.%20Existing%20masked%20autoencoder%20%28MAE%29%20approaches%20typically%20process%20images%20or%20short%20clips%20independently%2C%20failing%20to%20capture%20the%20inherent%20multi-view%20structure%20required%20for%20coherent%20cardiac%20representation.%20We%20introduce%20Latent%20Attention%20Masked%20Autoencoder%20%28LAMAE%29%2C%20a%20foundation%20model%20architecture%20tailored%20to%20the%20multi-view%20nature%20of%20medical%20imaging.%20LAMAE%20augments%20the%20standard%20MAE%20with%20a%20latent%20attention%20module%20that%20enables%20information%20exchange%20across%20frames%20and%20views%20directly%20in%20latent%20space.%20This%20allows%20the%20model%20to%20aggregate%20variable-length%20sequences%20and%20distinct%20views%2C%20reconstructing%20a%20holistic%20representation%20of%20cardiac%20function%20from%20partial%20observations.%20We%20pretrain%20LAMAE%20on%20MIMIC-IV-ECHO%2C%20a%20large-scale%2C%20uncurated%20dataset%20reflecting%20real-world%20clinical%20variability.%20To%20the%20best%20of%20our%20knowledge%2C%20we%20present%20the%20first%20results%20for%20predicting%20ICD-10%20codes%20from%20MIMIC-IV-ECHO%20videos.%20Furthermore%2C%20we%20empirically%20demonstrate%20that%20representations%20learned%20from%20adult%20data%20transfer%20effectively%20to%20pediatric%20cohorts%20despite%20substantial%20anatomical%20differences.%20These%20results%20provide%20evidence%20that%20incorporating%20structural%20priors%2C%20such%20as%20multi-view%20attention%2C%20yields%20significantly%20more%20robust%20and%20transferable%20representations.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15096v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520Independent%2520Frames%253A%2520Latent%2520Attention%2520Masked%2520Autoencoders%2520for%2520Multi-View%2520Echocardiography%26entry.906535625%3DSimon%2520B%25C3%25B6hi%2520and%2520Irene%2520Cannistraci%2520and%2520Sergio%2520Mu%25C3%25B1oz%2520Gonzalez%2520and%2520Moritz%2520Vandenhirtz%2520and%2520Sonia%2520Laguna%2520and%2520Samuel%2520Ruiperez-Campillo%2520and%2520Max%2520Kr%25C3%25A4henmann%2520and%2520Andrea%2520Agostini%2520and%2520Ece%2520Ozkan%2520and%2520Thomas%2520M.%2520Sutter%2520and%2520Julia%2520E.%2520Vogt%26entry.1292438233%3DEchocardiography%2520is%2520a%2520widely%2520used%2520modality%2520for%2520cardiac%2520assessment%2520due%2520to%2520its%2520non-invasive%2520and%2520cost-effective%2520nature%252C%2520but%2520the%2520sparse%2520and%2520heterogeneous%2520spatiotemporal%2520views%2520of%2520the%2520heart%2520pose%2520distinct%2520challenges.%2520Existing%2520masked%2520autoencoder%2520%2528MAE%2529%2520approaches%2520

across%20various%20dexterous%20manipulation%20tasks%2C%20operators%20using%20the%20proposed%20system%20achieved%20an%2086.67%25%20task%20completion%20rate%20under%20the%20attached%20configuration.%20Also%2C%20we%20found%20that%20the%20attached%20configuration%20reduced%20the%20perceived%20workload%20of%20the%20operators%20compared%20to%20spatially%20separated%20teleoperation%20setups%20across%20all%20compared%20interfaces.%20The%20complete%20hardware%20and%20software%20stack%2C%20including%20bill%20of%20materials%2C%20CAD%20models%2C%20and%20firmware%2C%20is%20open-sourced%20at%20https%3A//dex-mouse.github.io/%20to%20facilitate%20replication%20and%20adoption.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15013v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDEX-Mouse%253A%2520A%2520Low-cost%2520Portable%2520and%2520Universal%2520Interface%2520with%2520Force%2520Feedback%2520for%2520Data%2520Collection%2520of%2520Dexterous%2520Robotic%2520Hands%26entry.906535625%3DJoonho%2520Koh%2520and%2520Haechan%2520Jung%2520and%2520Nayoung%2520Kim%2520and%2520Wook%2520Ko%2520and%2520Changjoo%2520Nam%26entry.1292438233%3DData-driven%2520dexterous%2520hand%2520manipulation%2520requires%2520large-scale%252C%2520physically%2520consistent%2520demonstration%2520data.%2520Simulation%2520and%2520video-based%2520methods%2520suffer%2520from%2520sim-to-real%2520gaps%2520and%2520retargeting%2520problems%252C%2520while%2520MoCap%2520glove-based%2520teleoperation%2520systems%2520require%2520per-operator%2520calibration%2520and%2520lack%2520portability%252C%2520as%2520the%2520robot%2520hand%2520is%2520typically%2520fixed%2520to%2520a%2520stationary%2520arm.%2520Portable%2520alternatives%2520improve%2520mobility%2520but%2520lack%2520cross-platform%2520and%2520cross-operator%2520compatibility.%2520We%2520present%2520DEX-Mouse%252C%2520a%2520portable%252C%2520calibration-free%2520hand-held%2520teleoperation%2520inte {"title": "Building Extraction from Remote Sensing Imagery under Hazy and Low-light Conditions: Benchmark and Baseline", "author": "Feifei Sang and Wei Lu and Hongruixuan Chen and Sibao Chen and Bin Luo", "abstract": "Building extraction from optical Remote Sensing (RS) imagery suffers from performance degradation under real-world hazy and low-light conditions. However, existing optical methods and benchmarks focus primarily on ideal clear-weather conditions. While SAR offers all-weather sensing, its side-looking geometry causes geometric distortions. To address these challenges, we introduce HaLoBuilding, the first optical benchmark specifically designed for building extraction under hazy and low-light conditions. By leveraging a same-scene multitemporal pairing strategy, we ensure pixel-level label alignment and high fidelity even under extreme degradation. Building upon this benchmark, we propose HaLoBuild-Net, a novel end-to-end framework for building extraction in adverse RS scenarios. At its core, we develop a Spatial-Frequency Focus Module (SFFM) to effectively mitigate meteorological interference on building features by coupling large receptive field attention with frequency-aware channel reweighting guided by stable low-frequency anchors. Additionally, a Global Multi-scale Guidance Module (GMGM) provides global semantic constraints to anchor building topologies, while a Mutual-Guided Fusion Module (MGFM) implements bidirectional semantic-spatial calibration to suppress shallow noise and sharpen weather-induced blurred boundaries. Extensive experiments demonstrate that HaLoBuild-Net significantly outperforms state-of-the-art methods and conventional cascaded restoration-segmentation paradigms on the HaLoBuilding dataset, while maintaining robust generalization on WHU, INRIA, and LoveDA datasets. The source code and datasets are publicly available at: https://github.com/AeroVILab-AHU/HaLoBuilding.", "link": "http://arxiv.org/abs/2604.15088v1", "date": "2026-04-16", "relevancy": 2.6809, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5473}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5327}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5285}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Building%20Extraction%20from%20Remote%20Sensing%20Imagery%20under%20Hazy%20and%20Low-light%20Conditions%3A%20Benchmark%20and%20Baseline&body=Title%3A%20Building%20Extraction%20from%20Remote%20Sensing%20Imagery%20under%20Hazy%20and%20Low-light%20Conditions%3A%20Benchmark%20and%20Baseline%0AAuthor%3A%20Feifei%20Sang%20and%20Wei%20Lu%20and%20Hongruixuan%20Chen%20and%20Sibao%20Chen%20and%20Bin%20Luo%0AAbstract%3A%20Building%20extraction%20from%20optical%20Remote%20Sensing%20%28RS%29%20imagery%20suffers%20from%20performance%20degradation%20under%20real-world%20hazy%20and%20low-light%20conditions.%20However%2C%20existing%20optical%20methods%20and%20benchmarks%20focus%20primarily%20on%20ideal%20clear-weather%20conditions.%20While%20SAR%20offers%20all-weather%20sensing%2C%20its%20side-looking%20geometry%20causes%20geometric%20distortions.%20To%20address%20these%20challenges%2C%20we%20introduce%20HaLoBuilding%2C%20the%20first%20optical%20benchmark%20specifically%20designed%20for%20building%20extraction%20under%20hazy%20and%20low-light%20conditions.%20By%20leveraging%20a%20same-scene%20multitemporal%20pairing%20strategy%2C%20we%20ensure%20pixel-level%20label%20alignment%20and%20high%20fidelity%20even%20under%20extreme%20degradation.%20Building%20upon%20this%20benchmark%2C%20we%20propose%20HaLoBuild-Net%2C%20a%20novel%20end-to-end%20framework%20for%20building%20extraction%20in%20adverse%20RS%20scenarios.%20At%20its%20core%2C%20we%20develop%20a%20Spatial-Frequency%20Focus%20Module%20%28SFFM%29%20to%20effectively%20mitigate%20meteorological%20interference%20on%20building%20features%20by%20coupling%20large%20receptive%20field%20attention%20with%20frequency-aware%20channel%20reweighting%20guided%20by%20stable%20low-frequency%20anchors.%20Additionally%2C%20a%20Global%20Multi-scale%20Guidance%20Module%20%28GMGM%29%20provides%20global%20semantic%20constraints%20to%20anchor%20building%20topologies%2C%20while%20a%20Mutual-Guided%20Fusion%20Module%20%28MGFM%29%20implements%20bidirectional%20semantic-spatial%20calibration%20to%20suppress%20shallow%20noise%20and%20sharpen%20weather-induced%20blurred%20boundaries.%20Extensive%20experiments%20demonstrate%20that%20HaLoBuild-Net%20significantly%20outperforms%20state-of-the-art%20methods%20and%20conventional%20cascaded%20restoration-segmentation%20paradigms%20on%20the%20HaLoBuilding%20dataset%2C%20while%20maintaining%20robust%20generalization%20on%20WHU%2C%20INRIA%2C%20and%20LoveDA%20datasets.%20The%20source%20code%20and%20datasets%20are%20publicly%20available%20at%3A%20https%3A//github.com/AeroVILab-AHU/HaLoBuilding.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15088v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBuilding%2520Extraction%2520from%2520Remote%2520Sensing%2520Imagery%2520under%2520Hazy%2520and%2520Low-light%2520Conditions%253A%2520Benchmark%2520and%2520Baseline%26entry.906535625%3DFeifei%2520Sang%2520and%2520Wei%2520Lu%2520and%2520Hongruixuan%2520Chen%2520and%2520Sibao%2520Chen%2520and%2520Bin%2520Luo%26entry.1292438233%3DBuilding%2520extraction%2520from%2520optical%2520Remote%2520Sensing%2520%2528RS%2529%2520imagery%2520suffers%2520from%2520performance%2520degradation%2520under%2520real-world%2520hazy%2520and%2520low-light%2520conditions.%2520However%252C%2520existing%2520optical%2520methods%2520and%2520benchmarks%2520focus%252 {"title": "POP: Prefill-Only Pruning for Efficient Large Model Inference", "author": "Junhui He and Zhihui Fu and Jun Wang and Qingan Li", "abstract": "Large Language Models (LLMs) and Vision-Language Models (VLMs) have demonstrated remarkable capabilities. However, their deployment is hindered by significant computational costs. Existing structured pruning methods, while hardware-efficient, often suffer from significant accuracy degradation. In this paper, we argue that this failure stems from a stage-agnostic pruning approach that overlooks the asymmetric roles between the prefill and decode stages. By introducing a virtual gate mechanism, our importance analysis reveals that deep layers are critical for next-token prediction (decode) but largely redundant for context encoding (prefill). Leveraging this insight, we propose Prefill-Only Pruning (POP), a stage-aware inference strategy that safely omits deep layers during the computationally intensive prefill stage while retaining the full model for the sensitive decode stage. To enable the transition between stages, we introduce independent Key-Value (KV) projections to maintain cache integrity, and a boundary handling strategy to ensure the accuracy of the first generated token. Extensive experiments on Llama-3.1, Qwen3-VL, and Gemma-3 across diverse modalities demonstrate that POP achieves up to 1.37$\\times$ speedup in prefill latency with minimal performance loss, effectively overcoming the accuracy-efficiency trade-off limitations of existing structured pruning methods.", "link": "http://arxiv.org/abs/2602.03295v2", "date": "2026-04-16", "relevancy": 2.6709, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5432}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5432}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5162}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20POP%3A%20Prefill-Only%20Pruning%20for%20Efficient%20Large%20Model%20Inference&body=Title%3A%20POP%3A%20Prefill-Only%20Pruning%20for%20Efficient%20Large%20Model%20Inference%0AAuthor%3A%20Junhui%20He%20and%20Zhihui%20Fu%20and%20Jun%20Wang%20and%20Qingan%20Li%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20and%20Vision-Language%20Models%20%28VLMs%29%20have%20demonstrated%20remarkable%20capabilities.%20However%2C%20their%20deployment%20is%20hindered%20by%20significant%20computational%20costs.%20Existing%20structured%20pruning%20methods%2C%20while%20hardware-efficient%2C%20often%20suffer%20from%20significant%20accuracy%20degradation.%20In%20this%20paper%2C%20we%20argue%20that%20this%20failure%20stems%20from%20a%20stage-agnostic%20pruning%20approach%20that%20overlooks%20the%20asymmetric%20roles%20between%20the%20prefill%20and%20decode%20stages.%20By%20introducing%20a%20virtual%20gate%20mechanism%2C%20our%20importance%20analysis%20reveals%20that%20deep%20layers%20are%20critical%20for%20next-token%20prediction%20%28decode%29%20but%20largely%20redundant%20for%20context%20encoding%20%28prefill%29.%20Leveraging%20this%20insight%2C%20we%20propose%20Prefill-Only%20Pruning%20%28POP%29%2C%20a%20stage-aware%20inference%20strategy%20that%20safely%20omits%20deep%20layers%20during%20the%20computationally%20intensive%20prefill%20stage%20while%20retaining%20the%20full%20model%20for%20the%20sensitive%20decode%20stage.%20To%20enable%20the%20transition%20between%20stages%2C%20we%20introduce%20independent%20Key-Value%20%28KV%29%20projections%20to%20maintain%20cache%20integrity%2C%20and%20a%20boundary%20handling%20strategy%20to%20ensure%20the%20accuracy%20of%20the%20first%20generated%20token.%20Extensive%20experiments%20on%20Llama-3.1%2C%20Qwen3-VL%2C%20and%20Gemma-3%20across%20diverse%20modalities%20demonstrate%20that%20POP%20achieves%20up%20to%201.37%24%5Ctimes%24%20speedup%20in%20prefill%20latency%20with%20minimal%20performance%20loss%2C%20effectively%20overcoming%20the%20accuracy-efficiency%20trade-off%20limitations%20of%20existing%20structured%20pruning%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2602.03295v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPOP%253A%2520Prefill-Only%2520Pruning%2520for%2520Efficient%2520Large%2520Model%2520Inference%26entry.906535625%3DJunhui%2520He%2520and%2520Zhihui%2520Fu%2520and%2520Jun%2520Wang%2520and%2520Qingan%2520Li%26entry.1292438233%3DLarge%2520Language%2520Models%2520%2528LLMs%2529%2520and%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520have%2520demonstrated%2520remarkable%2520capabilities.%2520However%252C%2520their%2520deployment%2520is%2520hindered%2520by%2520significant%2520computational%2520costs.%2520Existing%2520structured%2520pruning%2520methods%252C%2520while%2520hardware-efficient%252C%2520often%2520suffer%2520from%2520significant%2520accuracy%2520degradation.%2520In%2520this%2520paper%252C%2520we%2520argue%2520that%2520this%2520failure%2520stems%2520from%2520a%2520stage-agnostic%2520pruning%2520approach%2520that%2520overlooks%2520the%2520asymmetric%2520roles%2520between%2520the%2520prefill%2520and%2520decode%2520stages.%2520By%2520introducing%2520a%2520virtual%2520gate%2520mechanism%252C%2520our%2520importance%2520analysis%2520reveals%2520that%2520deep%2520layers%2520are%2520critical%2520for%2520next-token%2520prediction%2520%2528decode%2529%2520but%2520largely%2520redundant%2520for%2520context%2520encoding%2520%2528prefill%2529.%2520Leveraging%2520this%2520insight%252C%2520we%2520propose%2520Prefill-Only%2520Pruning%2520%2528POP%2529%252C%2520a%2520stage-aware%2520inference%2520strategy%2520that%2520safely%2520omits%2520deep%2520layers%2520during%2520the%2520computationally%2520intensive%2520prefill%2520stage%2520while%2520retaining%2520the%2520full%2520model%2520for%2520the%2520sensitive%2520decode%2520stage.%2520To%2520enable%2520the%2520transition%2520between%2520stages%252C%2520we%2520introduce%2520independent%2520Key-Value%2520%2528KV%2529%2520projections%2520to%2520maintain%2520cache%2520integrity%252C%2520and%2520a%2520boundary%2520handling%2520strategy%2520to%2520ensure%2520the%2520accuracy%2520of%2520the%2520first%2520generated%2520token.%2520Extensive%2520experiments%2520on%2520Llama-3.1%252C%2520Qwen3-VL%252C%2520and%2520Gemma-3%2520across%2520diverse%2520modalities%2520demonstrate%2520that%2520POP%2520achieves%2520up%2520to%25201.37%2524%255Ctimes%2524%2520speedup%2520in%2520prefill%2520latency%2520with%2520minimal%2520performance%2520loss%252C%2520effectively%2520overcoming%2520the%2520accuracy-efficiency%2520trade-off%2520limitations%2520of%2520existing%2520structured%2520pruning%2520methods.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2602.03295v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=POP%3A%20Prefill-Only%20Pruning%20for%20Efficient%20Large%20Model%20Inference&entry.906535625=Junhui%20He%20and%20Zhihui%20Fu%20and%20Jun%20Wang%20and%20Qingan%20Li&entry.1292438233=Large%20Language%20Models%20%28LLMs%29%20and%20Vision-Language%20Models%20%28VLMs%29%20have%20demonstrated%20remarkable%20capabilities.%20However%2C%20their%20deployment%20is%20hindered%20by%20significant%20computational%20costs.%20Existing%20structured%20pruning%20methods%2C%20while%20hardware-efficient%2C%20often%20suffer%20from%20significant%20accuracy%20degradation.%20In%20this%20paper%2C%20we%20argue%20that%20this%20failure%20stems%20from%20a%20stage-agnostic%20pruning%20approach%20that%20overlooks%20the%20asymmetric%20roles%20between%20the%20prefill%20and%20decode%20stages.%20By%20introducing%20a%20virtual%20gate%20mechanism%2C%20our%20importance%20analys {"title": "Improving Sparse Autoencoder with Dynamic Attention", "author": "Dongsheng Wang and Jinsen Zhang and Dawei Su and Hui Huang", "abstract": "Recently, sparse autoencoders (SAEs) have emerged as a promising technique for interpreting activations in foundation models by disentangling features into a sparse set of concepts. However, identifying the optimal level of sparsity for each neuron remains challenging in practice: excessive sparsity can lead to poor reconstruction, whereas insufficient sparsity may harm interpretability. While existing activation functions such as ReLU and TopK provide certain sparsity guarantees, they typically require additional sparsity regularization or cherry-picked hyperparameters. We show in this paper that dynamically sparse attention mechanisms using sparsemax can bridge this trade-off, due to their ability to determine the activation numbers in a data-dependent manner. Specifically, we first explore a new class of SAEs based on the cross-attention architecture with the latent features as queries and the learnable dictionary as the key and value matrices. To encourage sparse pattern learning, we employ a sparsemax-based attention strategy that automatically infers a sparse set of elements according to the complexity of each neuron, resulting in a more flexible and general activation function. Through comprehensive evaluation and visualization, we show that our approach successfully achieves lower reconstruction loss while producing high-quality concepts, particularly in top-n classification tasks.", "link": "http://arxiv.org/abs/2604.14925v1", "date": "2026-04-16", "relevancy": 2.6594, "topK": [{"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5476}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5368}, {"title": "Boost {"title": "TwinOR: Photorealistic Digital Twins of Dynamic Operating Rooms for Embodied AI Research", "author": "Han Zhang and Yiqing Shen and Roger D. Soberanis-Mukul and Ankita Ghosh and Hao Ding and Lalithkumar Seenivasan and Jose L. Porras and Zhekai Mao and Chenjia Li and Wenjie Xiao and Lonny Yarmus and Angela Christine Argento and Masaru Ishii and Mathias Unberath", "abstract": "Developing embodied AI for intelligent surgical systems requires safe, controllable environments for continual learning and evaluation. However, safety regulations and operational constraints in operating rooms (ORs) limit agents from freely perceiving and interacting in realistic settings. Digital twins provide high-fidelity, risk-free environments for exploration and training. How we may create dynamic digital representations of ORs that capture relevant spatial, visual, and behavioral complexity remains an open challenge. We introduce TwinOR, a real-to-sim infrastructure for constructing photorealistic and dynamic digital twins of ORs. The system reconstructs static geometry and continuously models human and equipment motion. The static and dynamic components are fused into an immersive 3D environment that supports controllable simulation and facilitates future embodied exploration. The proposed framework reconstructs complete OR geometry with centimeter-level accuracy while preserving dynamic interaction across surgical workflows. In our experiments, TwinOR synthesizes stereo and monocular RGB streams as well as depth observations for geometry understanding and visual localization tasks. Models such as FoundationStereo and ORB-SLAM3 evaluated on TwinOR-synthesized data achieve performance within their reported accuracy ranges on real-world indoor datasets, demonstrating that TwinOR provides sensor-level realism sufficient for emulating real-world perception and localization challenge. By establishing a perception-grounded real-to-sim pipeline, TwinOR enables the automatic construction of dynamic, photorealistic digital twins of ORs. As a safe and scalable environment for experimentation, TwinOR opens new opportunities for translating embodied intelligence from simulation to real-world clinical environments.", "link": "http://arxiv.org/abs/2511.07412v2", "date": "2026-04-16", "relevancy": 2.6575, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.535}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.535}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5245}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TwinOR%3A%20Photorealistic%20Digital%20Twins%20of%20Dynamic%20Operating%20Rooms%20for%20Embodied%20AI%20Research&body=Title%3A%20TwinOR%3A%20Photorealistic%20Digital%20Twins%20of%20Dynamic%20Operating%20Rooms%20for%20Embodied%20AI%20Research%0AAuthor%3A%20Han%20Zhang%20and%20Yiqing%20Shen%20and%20Roger%20D.%20Soberanis-Mukul%20and%20Ankita%20Ghosh%20and%20Hao%20Ding%20and%20Lalithkumar%20Seenivasan%20and%20Jose%20L.%20Porras%20and%20Zhekai%20Mao%20and%20Chenjia%20Li%20and%20Wenjie%20Xiao%20and%20Lonny%20Yarmus%20and%20Angela%20Christine%20Argento%20and%20Masaru%20Ishii%20and%20Mathias%20Unberath%0AAbstract%3A%20Developing%20embodied%20AI%20for%20intelligent%20surgical%20systems%20requires%20safe%2C%20controllable%20environments%20for%20continual%20learning%20and%20evaluation.%20However%2C%20safety%20regulations%20and%20operational%20constraints%20in%20operating%20rooms%20%28ORs%29%20limit%20agents%20from%20freely%20perceiving%20and%20interacting%20in%20realistic%20settings.%20Digital%20twins%20provide%20high-fidelity%2C%20risk-free%20environments%20for%20exploration%20and%20training.%20How%20we%20may%20create%20dynamic%20digital%20representations%20of%20ORs%20that%20capture%20relevant%20spatial%2C%20visual%2C%20and%20behavioral%20complexity%20remains%20an%20open%20challenge.%20We%20introduce%20TwinOR%2C%20a%20real-to-sim%20infrastructure%20for%20constructing%20photorealistic%20and%20dynamic%20digital%20twins%20of%20ORs.%20The%20system%20reconstructs%20static%20geometry%20and%20continuously%20models%20human%20and%20equipment%20motion.%20The%20static%20and%20dynamic%20components%20are%20fused%20into%20an%20immersive%203D%20environment%20that%20supports%20controllable%20simulation%20and%20facilitates%20future%20embodied%20exploration.%20The%20proposed%20framework%20reconstructs%20complete%20OR%20geometry%20with%20centimeter-level%20accuracy%20while%20preserving%20dynamic%20interaction%20across%20surgical%20workflows.%20In%20our%20experiments%2C%20TwinOR%20synthesizes%20stereo%20and%20monocular%20RGB%20streams%20as%20well%20as%20depth%20observations%20for%20geometry%20understanding%20and%20visual%20localization%20tasks.%20Models%20such%20as%20FoundationStereo%20and%20ORB-SLAM3%20evaluated%20on%20TwinOR-synthesized%20data%20achieve%20performance%20within%20their%20reported%20accuracy%20ranges%20on%20real-world%20indoor%20datasets%2C%20demonstrating%20that%20TwinOR%20provides%20sensor-level%20realism%20sufficient%20for%20emulating%20real-world%20perception%20and%20localization%20challenge.%20By%20establishing%20a%20perception-grounded%20real-to-sim%20pipeline%2C%20TwinOR%20enables%20the%20automatic%20construction%20of%20dynamic%2C%20photorealistic%20digital%20twins%20of%20ORs.%20As%20a%20safe%20and%20scalable%20environment%20for%20experimentation%2C%20TwinOR%20opens%20new%20opportunities%20for%20translating%20embodied%20intelligence%20from%20simulation%20to%20real-world%20clinical%20environments.%0ALink%3A%20http%3A//arxiv.org/abs/2511.07412v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTwinOR%253A%2520Photorealistic%2520D {"title": "Frequency-Enhanced Dual-Subspace Networks for Few-Shot Fine-Grained Image Classification", "author": "Meijia Wang and Guochao Wang and Haozhen Chu and Bin Yao and Weichuan Zhang and Yuan Wang and Junpo Yang", "abstract": "Few-shot fine-grained image classification aims to recognize subcategories with high visual similarity using only a limited number of annotated samples. Existing metric learning-based methods typically rely solely on spatial domain features. Confined to this single perspective, models inevitably suffer from inherent texture biases, entangling essential structural details with high-frequency background noise. Furthermore, lacking cross-view geometric constraints, single-view metrics tend to overfit this noise, resulting in structural instability under few-shot conditions. To address these issues, this paper proposes the Frequency-Enhanced Dual-Subspace Network (FEDSNet). Specifically, FEDSNet utilizes the Discrete Cosine Transform (DCT) and a low-pass filtering mechanism to explicitly isolate low-frequency global structural components from spatial features, thereby suppressing background interference. Truncated Singular Value Decomposition (SVD) is employed to construct independent, low-rank linear subspaces for both spatial texture and frequency structural features. An adaptive gating mechanism is designed to dynamically fuse the projection distances from these dual views. This strategy leverages the structural stability of the frequency subspace to prevent the spatial subspace from overfitting to background features. Extensive experiments on four benchmark datasets - CUB-200-2011, Stanford Cars, Stanford Dogs, and FGVC-Aircraft - demonstrate that FEDSNet exhibits excellent classification performance and robustness, achieving highly competitive results compared to existing metric learning algorithms. Complexity analysis further confirms that the proposed network achieves a favorable balance between high accuracy and computational efficiency, providing an effective new paradigm for few-shot fine-grained visual recognition.", "link": "http://arxiv.org/abs/2604.14958v1", "date": "2026-04-16", "relevancy": 2.6498, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5477}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5314}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5108}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Frequency-Enhanced%20Dual-Subspace%20Networks%20for%20Few-Shot%20Fine-Grained%20Image%20Classification&body=Title%3A%20Frequency-Enhanced%20Dual-Subspace%20Networks%20for%20Few-Shot%20Fine-Grained%20Image%20Classification%0AAuthor%3A%20Meijia%20Wang%20and%20Guochao%20Wang%20and%20Haozhen%20Chu%20and%20Bin%20Yao%20and%20Weichuan%20Zhang%20and%20Yuan%20Wang%20and%20Junpo%20Yang%0AAbstract%3A%20Few-shot%20fine-grained%20image%20classification%20aims%20to%20recognize%20subcategories%20with%20high%20visual%20similarity%20using%20only%20a%20limited%20number%20of%20annotated%20samples.%20Existing%20metric%20learning-based%20methods%20typically%20rely%20solely%20on%20spatial%20domain%20features.%20Confined%20to%20this%20single%20perspective%2C%20models%20inevitably%20suffer%20from%20inherent%20texture%20biases%2C%20entangling%20essential%20structural%20details%20with%20high-frequency%20background%20noise.%20Furthermore%2C%20lacking%20cross-view%20geometric%20constraints%2C%20single-view%20metrics%20tend%20to%20overfit%20this%20noise%2C%20resulting%20in%20structural%20instability%20under%20few-shot%20conditions.%20To%20address%20these%20issues%2C%20this%20paper%20proposes%20the%20Frequency-Enhanced%20Dual-Subspace%20Network%20%28FEDSNet%29.%20Specifically%2C%20FEDSNet%20utilizes%20the%20Discrete%20Cosine%20Transform%20%28DCT%29%20and%20a%20low-pass%20filtering%20mechanism%20to%20explicitly%20isolate%20low-frequency%20global%20structural%20components%20from%20spatial%20features%2C%20thereby%20suppressing%20background%20interference.%20Truncated%20Singular%20Value%20Decomposition%20%28SVD%29%20is%20employed%20to%20construct%20independent%2C%20low-rank%20linear%20subspaces%20for%20both%20spatial%20texture%20and%20frequency%20structural%20features.%20An%20adaptive%20gating%20mechanism%20is%20designed%20to%20dynamically%20fuse%20the%20projection%20distances%20from%20these%20dual%20views.%20This%20strategy%20leverages%20the%20structural%20stability%20of%20the%20frequency%20subspace%20to%20prevent%20the%20spatial%20subspace%20from%20overfitting%20to%20background%20features.%20Extensive%20experiments%20on%20four%20benchmark%20datasets%20-%20CUB-200-2011%2C%20Stanford%20Cars%2C%20Stanford%20Dogs%2C%20and%20FGVC-Aircraft%20-%20demonstrate%20that%20FEDSNet%20exhibits%20excellent%20classification%20performance%20and%20robustness%2C%20achieving%20highly%20competitive%20results%20compared%20to%20existing%20metric%20learning%20algorithms.%20Complexity%20analysis%20further%20confirms%20that%20the%20proposed%20network%20achieves%20a%20favorable%20balance%20between%20high%20accuracy%20and%20computational%20efficiency%2C%20providing%20an%20effective%20new%20paradigm%20for%20few-shot%20fine-grained%20visual%20recognition.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14958v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrequency-Enhanced%2520Dual-Subspace%2520Networks%2520for%2520Few-Shot%2520Fine-Grained%2520Image%2520Classification%26entry.906535625%3DMeijia%2520Wang%2520and%2520Guochao%2520Wang%2520and%2520Haozhen%2520Chu%2520and%2520Bin%2520Yao%2520and%2520Weichuan%2520Zhang%2520and%2520Yuan%2520Wang%2520and%2520Junpo%2520Yang%26entry.1292438233%3DF {"title": "The Spectrascapes Dataset: Street-view imagery beyond the visible captured using a mobile platform", "author": "Akshit Gupta and Joris Timmermans and Filip Biljecki and Remko Uijlenhoet", "abstract": "High-resolution data in spatial and temporal contexts is imperative for developing climate resilient cities. Current datasets for monitoring urban parameters are developed primarily using manual inspections, embedded-sensing, remote sensing, or standard street-view imagery (RGB). These methods and datasets are often constrained respectively by poor scalability, inconsistent spatio-temporal resolutions, overhead views or low spectral information. We present a novel method and its open implementation: a multi-spectral terrestrial-view dataset that circumvents these limitations. This dataset consists of 17,718 street level multi-spectral images captured with RGB, Near-infrared, and Thermal imaging sensors on bikes, across diverse urban morphologies (village, town, small city, and big urban area) in the Netherlands. Strict emphasis is put on data calibration and quality while also providing the details of our data collection methodology (including the hardware and software details). To the best of our knowledge, Spectrascapes is the first open-access dataset of its kind. Finally, we demonstrate two downstream use-cases enabled using this dataset and provide potential research directions in the machine learning, urban planning and remote sensing domains.", "link": "http://arxiv.org/abs/2604.13315v2", "date": "2026-04-16", "relevancy": 2.6492, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5362}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5267}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "si {"title": "GenRec: A Preference-Oriented Generative Framework for Large-Scale Recommendation", "author": "Yanyan Zou and Junbo Qi and Lunsong Huang and Yu Li and Kewei Xu and Jiabao Gao and Binglei Zhao and Xuanhua Yang and Sulong Xu and Shengjie Li", "abstract": "Generative Retrieval (GR) offers a promising paradigm for recommendation through next-token prediction (NTP). However, scaling it to large-scale industrial systems introduces three challenges: (i) within a single request, the identical model inputs may produce inconsistent outputs due to the pagination request mechanism; (ii) the prohibitive cost of encoding long user behavior sequences with multi-token item representations based on semantic IDs, and (iii) aligning the generative policy with nuanced user preference signals. We present GenRec, a preference-oriented generative framework deployed on the JD App that addresses above challenges within a single decoder-only architecture. For training objective, we propose Page-wise NTP task, which supervises over an entire interaction page rather than each interacted item individually, providing denser gradient signal and resolving the one-to-many ambiguity of point-wise training. On the prefilling side, an asymmetric linear Token Merger compresses multi-token Semantic IDs in the prompt while preserving full-resolution decoding, reducing input length by ~2X with negligible accuracy loss. To further align outputs with user satisfaction, we introduce GRPO-SR, a reinforcement learning method that pairs Group Relative Policy Optimization with NLL regularization for training stability, and employs Hybrid Rewards combining a dense reward model with a relevance gate to mitigate reward hacking. In month-long online A/B tests serving production traffic, GenRec achieves 9.5% improvement in click count and 8.7% in transaction count over the existing pipeline.", "link": "http://arxiv.org/abs/2604.14878v1", "date": "2026-04-16", "relevancy": 2.6476, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5501}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5485}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.49}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GenRec%3A%20A%20Preference-Oriented%20Generative%20Framework%20for%20Large-Scale%20Recommendation&body=Title%3A%20GenRec%3A%20A%20Preference-Oriented%20Generative%20Framework%20for%20Large-Scale%20Recommendation%0AAuthor%3A%20Yanyan%20Zou%20and%20Junbo%20Qi%20and%20Lunsong%20Huang%20and%20Yu%20Li%20and%20Kewei%20Xu%20and%20Jiabao%20Gao%20and%20Binglei%20Zhao%20and%20Xuanhua%20Yang%20and%20Sulong%20Xu%20and%20Shengjie%20Li%0AAbstract%3A%20Generative%20Retrieval%20%28GR%29%20offers%20a%20promising%20paradigm%20for%20recommendation%20through%20next-token%20prediction%20%28NTP%29.%20However%2C%20scaling%20it%20to%20large-scale%20industrial%20systems%20introduces%20three%20challenges%3A%20%28i%29%20within%20a%20single%20request%2C%20the%20identical%20model%20inputs%20may%20produce%20inconsistent%20outputs%20due%20to%20the%20pagination%20request%20mechanism%3B%20%28ii%29%20the%20prohibitive%20cost%20of%20encoding%20long%20user%20behavior%20sequences%20with%20multi-token%20item%20representations%20based%20on%20semantic%20IDs%2C%20and%20%28iii%29%20aligning%20the%20generative%20policy%20with%20nuanced%20user%20preference%20signals.%20We%20present%20GenRec%2C%20a%20preference-oriented%20generative%20framework%20deployed%20on%20the%20JD%20App%20that%20addresses%20above%20challenges%20within%20a%20single%20decoder-only%20architecture.%20For%20training%20objective%2C%20we%20propose%20Page-wise%20NTP%20task%2C%20which%20supervises%20over%20an%20entire%20interaction%20page%20rather%20than%20each%20interacted%20item%20individually%2C%20providing%20denser%20gradient%20signal%20and%20resolving%20the%20one-to-many%20ambiguity%20of%20point-wise%20training.%20On%20the%20prefilling%20side%2C%20an%20asymmetric%20linear%20Token%20Merger%20compresses%20multi-token%20Semantic%20IDs%20in%20the%20prompt%20while%20preserving%20full-resolution%20decoding%2C%20reducing%20input%20length%20by%20~2X%20with%20negligible%20accuracy%20loss.%20To%20further%20align%20outputs%20with%20user%20satisfaction%2C%20we%20introduce%20GRPO-SR%2C%20a%20reinforcement%20learning%20method%20that%20pairs%20Group%20Relative%20Policy%20Optimization%20with%20NLL%20regularization%20for%20training%20stability%2C%20and%20employs%20Hybrid%20Rewards%20combining%20a%20dense%20reward%20model%20with%20a%20relevance%20gate%20to%20mitigate%20reward%20hacking.%20In%20month-long%20online%20A/B%20tests%20serving%20production%20traffic%2C%20GenRec%20achieves%209.5%25%20improvement%20in%20click%20count%20and%208.7%25%20in%20transaction%20count%20over%20the%20existing%20pipeline.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14878v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGenRec%253A%2520A%2520Preference-Oriented%2520Generative%2520Framework%2520for%2520Large-Scale%2520Recommendation%26entry.906535625%3DYanyan%2520Zou%2520and%2520Junbo%2520Qi%2520and%2520Lunsong%2520Huang%2520and%2520Yu%2520Li%2520and%2520Kewei%2520Xu%2520and%2520Jiabao%2520Gao%2520and%2520Binglei%2520Zhao%2520and%2520Xuanhua%2520Yang%2520and%2520Sulong%2520Xu%2520and%2520Shengjie%2520Li%26entry.1292438233%3DGenerative%2520Retrieval%2520%2528GR%2529%2520offers%2520a%2520promising%2520paradigm%2520for%2520recommendation%2520through%2520next-token%2520prediction%2520%2528NTP%2529.%2520However%252C%2520scaling%2520it%2520to%2520large-scale%2520industrial%2520systems%2520introduces%2520three%2520challenges%253A%2520%2528i%2529%2520within%2520a%2520single%2520request%252C%2520the%2520identical%2520model%2520in duction%2520traffic%252C%2520GenRec%2520achieves%25209.5%2525%2520improvement%2520in%2520click%2520count%2520and%25208.7%2525%2520in%2520transaction%2520count%2520over%2520the%2520existing%2520pipeline.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.14878v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=GenRec%3A%20A%20Preference-Oriented%20Generative%20Framework%20for%20Large-Scale%20Recommendation&entry.906535625=Yanyan%20Zou%20and%20Junbo%20Qi%20and%20Lunsong%20Huang%20and%20Yu%20Li%20and%20Kewei%20Xu%20and%20Jiabao%20Gao%20and%20Binglei%20Zhao%20and%20Xuanhua%20Yang%20and%20Sulong%20Xu%20and%20Shengjie%20Li&entry.1292438233=Generative%20Retrieval%20%28GR%29%20offers%20a%20promising%20paradigm%20for%20recommendation%20through%20next-token%20prediction%20%28NTP%29.%20However%2C%20scaling%20it%20to%20large-scale%20industrial%20systems%20introduces%20three%20challenges%3A%20%28i%29%20within%20a%20single%20request%2C%20the%20identical%20model%20inputs%20may%20produce%20inconsistent%20outputs%20due%20to%20the%20pagination%20request%20mechanism%3B%20%28ii%29%20the%20prohibitive%20cost%20of%20encoding%20long%20user%20behavior%20sequences%20with%20multi-token%20item%20representations%20based%20on%20semantic%20IDs%2C%20and%20%28iii%29%20aligning%20the%20generative%20policy%20with%20nuanced%20user%20preference%20signals.%20We%20present%20GenRec%2C%20a%20preference-oriented%20generative%20framework%20deployed%20on%20the%20JD%20App%20that%20addresses%20above%20challenges%20within%20a%20single%20decoder-only%20architecture.%20For%20training%20objective%2C%20we%20propose%20Page-wise%20NTP%20task%2C%20which%20supervises%20over%20an%20entire%20interaction%20page%20rather%20than%20each%20interacted%20item%20individually%2C%20providing%20denser%20gradient%20signal%20and%20resolving%20the%20one-to-many%20ambiguity%20of%20point-wise%20training.%20On%20the%20prefilling%20side {"title": "Unsupervised Skeleton-Based Action Segmentation via Hierarchical Spatiotemporal Vector Quantization", "author": "Umer Ahmed and Syed Ahmed Mahmood and Fawad Javed Fateh and M. Shaheer Luqman and M. Zeeshan Zia and Quoc-Huy Tran", "abstract": "We propose a novel hierarchical spatiotemporal vector quantization framework for unsupervised skeleton-based temporal action segmentation. We first introduce a hierarchical approach, which includes two consecutive levels of vector quantization. Specifically, the lower level associates skeletons with fine-grained subactions, while the higher level further aggregates subactions into action-level representations. Our hierarchical approach outperforms the non-hierarchical baseline, while primarily exploiting spatial cues by reconstructing input skeletons. Next, we extend our approach by leveraging both spatial and temporal information, yielding a hierarchical spatiotemporal vector quantization scheme. In particular, our hierarchical spatiotemporal approach performs multi-level clustering, while simultaneously recovering input skeletons and their corresponding timestamps. Lastly, extensive experiments on multiple benchmarks, including HuGaDB, LARa, and BABEL, demonstrate that our approach establishes a new state-of-the-art performance and reduces segment length bias in unsupervised skeleton-based temporal action segmentation.", "link": "http://arxiv.org/abs/2604.15196v1", "date": "2026-04-16", "relevancy": 2.6364, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5846}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4987}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4985}], "mailto": "mailto:haoxiang.li.2024@gmai {"title": "Graph Theoretical Outlier Rejection for 4D Radar Registration in Feature-Poor Environments", "author": "Georg Dorndorf and Daniel Adolfsson and Masrur Doostdar", "abstract": "Automotive 4D imaging radar is well suited for operation in dusty and low-visibility environments, but scan registration remains challenging due to scan sparsity and spurious detections caused by noise and multipath reflections. This difficulty is compounded in feature-poor open-pit mines, where the lack of distinctive landmarks reduces correspondence reliability. We integrate graph-based pairwise consistency maximization (PCM) as an outlier rejection step within the iterative closest points (ICP) loop. We propose a radar-adapted pairwise distance-invariant scoring function for graph-based (PCM) that incorporates anisotropic, per-detection uncertainty derived from a radar measurement model. The consistency maximization problem is approximated with a greedy heuristic that finds a large clique in the pairwise consistency graph. The refined correspondence set improves robustness when the initial association set is heavily contaminated. We evaluate a standard Euclidean distance residual and our uncertainty-aware residual on an open-pit mine dataset collected with a 4D imaging radar. Compared to the generalized ICP (GICP) baseline without PCM, our method reduces segment relative position error (RPE) by 29.6% on 1 m segments and by up to 55% on 100 m segments. The presented method is intended for integration into localization pipelines and is suitable for online use due to the greedy heuristic in graph-based (PCM).", "link": "http://arxiv.org/abs/2604.14857v1", "date": "2026-04-16", "relevancy": 2.6279, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5321}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5314}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5132}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Graph%20Theoretical%20Outlier%20Rejection%20for%204D%20Radar%20Registration%20in%20Feature-Poor%20Environments&body=Title%3A%20Graph%20Theoretical%20Outlier%20Rejection%20for%204D%20Radar%20Registration%20in%20Feature-Poor%20Environments%0AAuthor%3A%20Georg%20Dorndorf%20and%20Daniel%20Adolfsson%20and%20Masrur%20Doostdar%0AAbstract%3A%20Automotive%204D%20imaging%20radar%20is%20well%20suited%20for%20operation%20in%20dusty%20and%20low-visibility%20environments%2C%20but%20scan%20registration%20remains%20challenging%20due%20to%20scan%20sparsity%20and%20spurious%20detections%20caused%20by%20noise%20and%20multipath%20reflections.%20This%20difficulty%20is%20compounded%20in%20feature-poor%20open-pit%20mines%2C%20where%20the%20lack%20of%20distinctive%20landmarks%20reduces%20correspondence%20reliability.%20We%20integrate%20graph-based%20pairwise%20consistency%20maximization%20%28PCM%29%20as%20an%20outlier%20rejection%20step%20within%20the%20iterative%20closest%20points%20%28ICP%29%20loop.%20We%20propose%20a%20radar-adapted%20pairwise%20distance-invariant%20scoring%20function%20for%20graph-based%20%28PCM%29%20that%20incorporates%20anisotropic%2C%20per-detection%20uncertainty%20derived%20from%20a%20radar%20measurement%20model.%20The%20consistency%20maximization%20problem%20is%20approximated%20with%20a%20greedy%20heuristic%20that%20finds%20a%20large%20clique%20in%20the%20pairwise%20consistency%20graph.%20The%20refined%20correspondence%20set%20improves%20robustness%20when%20the%20initial%20association%20set%20is%20heavily%20contaminated.%20We%20evaluate%20a%20standard%20Euclidean%20distance%20residual%20and%20our%20uncertainty-aware%20residual%20on%20an%20open-pit%20mine%20dataset%20collected%20with%20a%204D%20imaging%20radar.%20Compared%20to%20the%20generalized%20ICP%20%28GICP%29%20baseline%20without%20PCM%2C%20our%20method%20reduces%20segment%20relative%20position%20error%20%28RPE%29%20by%2029.6%25%20on%201%20m%20segments%20and%20by%20up%20to%2055%25%20on%20100%20m%20segments.%20The%20presented%20method%20is%20intended%20for%20integration%20into%20localization%20pipelines%20and%20is%20suitable%20for%20online%20use%20due%20to%20the%20greedy%20heuristic%20in%20graph-based%20%28PCM%29.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14857v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGraph%2520Theoretical%2520Outlier%2520Rejection%2520for%25204D%2520Radar%2520Registration%2520in%2520Feature-Poor%2520Environments%26entry.906535625%3DGeorg%2520Dorndorf%2520and%2520Daniel%2520Adolfsson%2520and%2520Masrur%2520Doostdar%26entry.1292438233%3DAutomotive%25204D%2520imaging%2520radar%2520is%2520well%2520suited%2520for%2520operation%2520in%2520dusty%2520and%2520low-visibility%2520environments%252C%2520but%2520scan%2520registration%2520remains%2520challenging%2520due%2520to%2520scan%2520sparsity%2520and%2520spurious%2520detections%2520caused%2520by%2520noise%2520and%2520multipath%2520reflections.%2520This%2520difficulty%2520is%2520compounded%2520in%2520feature-poor%2520open-pit%2520mines%252C%2520where%2520the%2520lack%2520of%2520distinctive%2520landmarks%2520reduces%2520correspondence%2520reliability.%2520We%2520integrate%2520graph-based%2520pairwise%2520consistency%2520maximization%2520%2528PCM%2529%2520as%2520an%2520outlier%2520rejection%2520step%2520within%2520the%2520iterative%2520closest%2520points%2520%2528ICP%2529%2520loop.%2520We%2520propose%2520a%2520radar-adapted%2520pairwise%2520distance-invariant%2520scoring%2520function%2520for%2520graph-based%2520%2528PCM%2529%2520that%2520incorporates%2520anisotropic%252C%2520per-detection%2520uncertainty%2520derived%2520from%2520a%2520 {"title": "Geoparsing: Diagram Parsing for Plane and Solid Geometry with a Unified Formal Language", "author": "Peijie Wang and Ming-Liang Zhang and Jun Cao and Chao Deng and Dekang Ran and Hongda Sun and Pi Bu and Xuan Zhang and Yingyao Wang and Jun Song and Bo Zheng and Fei Yin and Cheng-Lin Liu", "abstract": "Multimodal Large Language Models (MLLMs) have achieved remarkable progress but continue to struggle with geometric reasoning, primarily due to the perception bottleneck regarding fine-grained visual elements. While formal languages have aided plane geometry understanding, solid geometry which requires spatial understanding remains largely unexplored. In this paper, we address this challenge by designing a unified formal language that integrates plane and solid geometry, comprehensively covering geometric structures and semantic relations. We construct GDP-29K, a large-scale dataset comprising 20k plane and 9k solid geometry samples collected from diverse real-world sources, each paired with its ground-truth formal description. To ensure syntactic correctness and geometric consistency, we propose a training paradigm that combines Supervised Fine-Tuning with Reinforcement Learning via Verifiable Rewards. Experiments show that our approach achieves state-of-the-art parsing performance. Furthermore, we demonstrate that our parsed formal descriptions serve as a critical cognitive scaffold, significantly boosting MLLMs' capabilities for downstream geometry reasoning tasks. Our data and code are available at Geoparsing.", "link": "http://arxiv.org/abs/2604.11600v2", "date": "2026-04-16", "relevancy": 2.6032, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5209}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5209}, {"title": "TAMM: TriAdapter {"title": "Time-RA: Towards Time Series Reasoning for Anomaly Diagnosis with LLM Feedback", "author": "Yiyuan Yang and Zichuan Liu and Lei Song and Kai Ying and Zhiguang Wang and Tom Bamford and Svitlana Vyetrenko and Jiang Bian and Qingsong Wen", "abstract": "Time series anomaly detection (TSAD) has traditionally focused on binary classification and often lacks the fine-grained categorization and explanatory reasoning required for transparent decision-making. To address these limitations, we propose Time-series Reasoning for Anomaly (Time-RA), a novel task that reformulates TSAD from a discriminative into a generative, reasoning-intensive paradigm. To facilitate this, we introduce RATs40K, the first real-world large-scale multimodal benchmark with ~40,000 samples across 10 domains, integrating raw time series, textual context, and visual plots with structured reasoning annotations. Extensive benchmarking shows that while supervised fine-tuning and visual representations boost diagnostic accuracy and reasoning consistency, performance varies across complex scenarios. Notably, fine-tuned models demonstrate strong \"plug-and-play\" transferability, outperforming traditional baselines on unseen real-world datasets. Our work establishes a foundation for interpretable, multimodal time series analysis. All code (https://github.com/yyysjz1997/Time-RA) and the RATs40K dataset (https://huggingface.co/datasets/Time-RA/RATs40K) are fully open-sourced to facilitate future research.", "link": "http://arxiv.org/abs/2507.15066v5", "date": "2026-04-16", "relevancy": 2.5906, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.541}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5079}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5055}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Time-RA%3A%20Towards%20Time%20Series%20Reasoning%20for%20Anomaly%20Diagnosis%20with%20LLM%20Feedback&body=Title%3A%20Time-RA%3A%20Towards%20Time%20Series%20Reasoning%20for%20Anomaly%20Diagnosis%20with%20LLM%20Feedback%0AAuthor%3A%20Yiyuan%20Yang%20and%20Zichuan%20Liu%20and%20Lei%20Song%20and%20Kai%20Ying%20and%20Zhiguang%20Wang%20and%20Tom%20Bamford%20and%20Svitlana%20Vyetrenko%20and%20Jiang%20Bian%20and%20Qingsong%20Wen%0AAbstract%3A%20Time%20series%20anomaly%20detection%20%28TSAD%29%20has%20traditionally%20focused%20on%20binary%20classification%20and%20often%20lacks%20the%20fine-grained%20categorization%20and%20explanatory%20reasoning%20required%20for%20transparent%20decision-making.%20To%20address%20these%20limitations%2C%20we%20propose%20Time-series%20Reasoning%20for%20Anomaly%20%28Time-RA%29%2C%20a%20novel%20task%20that%20reformulates%20TSAD%20from%20a%20discriminative%20into%20a%20generative%2C%20reasoning-intensive%20paradigm.%20To%20facilitate%20this%2C%20we%20introduce%20RATs40K%2C%20the%20first%20real-world%20large-scale%20multimodal%20benchmark%20with%20~40%2C000%20samples%20across%2010%20domains%2C%20integrating%20raw%20time%20series%2C%20textual%20context%2C%20and%20visual%20plots%20with%20structured%20reasoning%20annotations.%20Extensive%20benchmarking%20shows%20that%20while%20supervised%20fine-tuning%20and%20visual%20representations%20boost%20diagnostic%20accuracy%20and%20reasoning%20consistency%2C%20performance%20varies%20across%20complex%20scenarios.%20Notably%2C%20fine-tuned%20models%20demonstrate%20strong%20%22plug-and-play%22%20transferability%2C%20outperforming%20traditional%20baselines%20on%20unseen%20real-world%20datasets.%20Our%20work%20establishes%20a%20foundation%20for%20interpretable%2C%20multimodal%20time%20series%20analysis.%20All%20code%20%28https%3A//github.com/yyysjz {"title": "VisPCO: Visual Token Pruning Configuration Optimization via Budget-Aware Pareto-Frontier Learning for Vision-Language Models", "author": "Huawei Ji and Yuanhao Sun and Yuan Jin and Cheng Deng and Jiaxin Ding and Luoyi Fu and Xinbing Wang", "abstract": "Visual token pruning methods effectively mitigate the quadratic computational growth caused by processing high-resolution images and video frames in vision-language models (VLMs). However, existing approaches rely on predefined pruning configurations without determining whether they achieve computation-performance optimality. In this work, we introduce , a novel framework that formulates visual token pruning as a Pareto configuration optimization problem to automatically identify optimal configurations. Our approach employs continuous relaxation and straight-through estimators to enable gradient-based search, solved via the Augmented Lagrangian method. Extensive experiments across 8 visual benchmarks demonstrate that effectively approximates the empirical Pareto frontier obtained through grid search and generalizes well across various pruning methods and VLM architectures. Furthermore, through learnable kernel functions, we investigate layer-wise pruning patterns and reveal that multi-step progressive pruning captures VLMs' hierarchical compression structure, achieving superior accuracy-efficiency trade-offs compared to single-layer approaches.", "link": "http://arxiv.org/abs/2604.15188v1", "date": "2026-04-16", "relevancy": 2.5665, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5286}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5057}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity {"title": "DocVAL: Validated Chain-of-Thought Distillation for Grounded Document VQA", "author": "Ahmad Mohammadshirazi and Pinaki Prasad Guha Neogi and Ser-Nam Lim and Rajiv Ramnath", "abstract": "Document visual question answering requires models not only to answer questions correctly, but also to precisely localize answers within complex document layouts. While large vision-language models (VLMs) achieve strong spatial grounding, their inference cost and latency limit real-world deployment. Compact VLMs are more efficient, but they often suffer substantial localization degradation under standard fine-tuning or distillation. To address this gap, we propose DocVAL, a validated chain-of-thought (CoT) distillation framework that transfers explicit spatial reasoning from large teacher models to compact, deployable student VLMs. DocVAL combines (1) teacher-generated spatial CoT supervision, (2) a rule-based dual-mode validator that filters low-quality training signals and provides fine-grained, pixel-level corrective feedback, and (3) a validation-driven two-stage training procedure with iterative refinement. Text detection is used only as training-time scaffolding for supervision and validation, enabling the final student to operate as a pure VLM without OCR or detection at inference. Across multiple document understanding benchmarks, DocVAL yields consistent improvements of up to 6-7 ANLS points over comparable compact VLMs. We further introduce mean Average Precision (mAP) as a localization metric for document question answering and report strong spatial grounding performance under this new evaluation. We release 95K validator-verified CoT traces and show that high-quality, validated supervision is more effective than scaling unfiltered data, enabling efficient and trustworthy document grounding. Dataset and implementation: https://github.com/ahmad-shirazi/DocVAL", "link": "http://arxiv.org/abs/2511.22521v2", "date": "2026-04-16", "relevancy": 2.5655, "topK": [{"tit wo-stage%20training%20procedure%20with%20iterative%20refinement.%20Text%20detection%20is%20used%20only%20as%20training-time%20scaffolding%20for%20supervision%20and%20validation%2C%20enabling%20the%20final%20student%20to%20operate%20as%20a%20pure%20VLM%20without%20OCR%20or%20detection%20at%20inference.%20Across%20multiple%20document%20understanding%20benchmarks%2C%20DocVAL%20yields%20consistent%20improvements%20of%20up%20to%206-7%20ANLS%20points%20over%20comparable%20compact%20VLMs.%20We%20further%20introduce%20mean%20Average%20Precision%20%28mAP%29%20as%20a%20localization%20metric%20for%20document%20question%20answering%20and%20report%20strong%20spatial%20grounding%20performance%20under%20this%20new%20evaluation.%20We%20release%2095K%20validator-verified%20CoT%20traces%20and%20show%20that%20high-quality%2C%20validated%20supervision%20is%20more%20effective%20than%20scaling%20unfiltered%20data%2C%20enabling%20efficient%20and%20trustworthy%20document%20grounding.%20Dataset%20and%20implementation%3A%20https%3A//github.com/ahmad-shirazi/DocVAL%0ALink%3A%20http%3A//arxiv.org/abs/2511.22521v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDocVAL%253A%2520Validated%2520Chain-of-Thought%2520Distillation%2520for%2520Grounded%2520Document%2520VQA%26entry.906535625%3DAhmad%2520Mohammadshirazi%2520and%2520Pinaki%2520Prasad%2520Guha%2520Neogi%2520and%2520Ser-Nam%2520Lim%2520and%2520Rajiv%2520Ramnath%26entry.1292438233%3DDocument%2520visual%2520question%2520answering%2520requires%2520models%2520not%2520only%2520to%2520answer%2520questions%2520correctly%252C%2520but%2520also%2520to%2520precisely%2520localize%2520answers%2520within%2520complex%2520document%2520layouts.%2520While%2520large%2520vision-language%2520models%2520%2528VLMs%2529%2520achieve%2520strong%2520spatial%2520grounding%252C%2520their%2520inference%2520cost%2520and%2520latency%2520limit%2520real-world%2520deployment.%2520Compact%2 {"title": "Learning to Think Like a Cartoon Captionist: Incongruity-Resolution Supervision for Multimodal Humor Understanding", "author": "Hatice Merve Vural and Doga Kukul and Ege Erdem Ozlu and Demir Ekin Arikan and Bob Mankoff and Erkut Erdem and Aykut Erdem", "abstract": "Humor is one of the few cognitive tasks where getting the reasoning right matters as much as getting the answer right. While recent work evaluates humor understanding on benchmarks such as the New Yorker Cartoon Caption Contest (NYCC), it largely treats it as black-box prediction, overlooking the structured reasoning processes underlying humor comprehension. We introduce IRS (Incongruity-Resolution Supervision), a framework that decomposes humor understanding into three components: incongruity modeling, which identifies mismatches in the visual scene; resolution modeling, which constructs coherent reinterpretations of these mismatches; and preference alignment, which evaluates candidate interpretations under human judgments. Grounded in incongruity-resolution theory and expert captionist practice, IRS supervises intermediate reasoning process through structured traces that make the path from visual perception to humorous interpretation explicit and learnable. Across 7B, 32B, and 72B models on NYCC, IRS outperforms strong open and closed multimodal baselines across caption matching and ranking tasks, with our largest model approaching expert-level performance on ranking. Zero-shot transfer to external benchmarks shows that IRS learns generalizable reasoning patterns. Our results suggest that supervising reasoning structure, rather than scale alone, is key for reasoning-centric tasks.", "link": "http://arxiv.org/abs/2604.15210v1", "date": "2026-04-16", "relevancy": 2.5566, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5188}, {"title": "Lexicon3D: Probing Visual Foundation Models {"title": "WavAlign: Enhancing Intelligence and Expressiveness in Spoken Dialogue Models via Adaptive Hybrid Post-Training", "author": "Yifu Chen and Shengpeng Ji and Qian Chen and Tianle Liang and Yangzhuo Li and Ziqing Wang and Wen Wang and Jingyu Lu and Haoxiao Wang and Xueyi Pu and Fan Zhuo and Zhou Zhao", "abstract": "End-to-end spoken dialogue models have garnered significant attention because they offer a higher potential ceiling in expressiveness and perceptual ability than cascaded systems. However, the intelligence and expressiveness of current open-source spoken dialogue models often remain below expectations. Motivated by the success of online reinforcement learning(RL) in other domains, one might attempt to directly apply preference optimization to spoken dialogue models, yet this transfer is non-trivial. We analyze these obstacles from the perspectives of reward modeling and rollout sampling, focusing on how sparse preference supervision interacts with dense speech generation under shared-parameter updates. Based on the analysis, we propose a modality-aware adaptive post-training recipe that makes RL practical for spoken dialogue: it constrains preference updates to the semantic channel and improves acoustic behavior via explicit anchoring, while dynamically regulating their mixture from rollout statistics to avoid unreliable preference gradients. We evaluate the method across multiple spoken dialogue benchmarks and representative architectures, and observe consistent improvements in semantic quality and speech expressiveness.", "link": "http://arxiv.org/abs/2604.14932v1", "date": "2026-04-16", "relevancy": 2.5381, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5089}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.507}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.507}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20WavAlign%3A%20Enhancing%20Intelligence%20and%20Expressiveness%20in%20Spoken%20Dialogue%20Models%20via%20Adaptive%20Hybrid%20Post-Training&body=Title%3A%20WavAlign%3A%20Enhancing%20Intelligence%20and%20Expressiveness%20in%20Spoken%20Dialogue%20Models%20via%20Adaptive%20Hybrid%20Post-Training%0AAuthor%3A%20Yifu%20Chen%20and%20Shengpeng%20Ji%20and%20Qian%20Chen%20and%20Tianle%20Liang%20and%20Yangzhuo%20Li%20and%20Ziqing%20Wang%20and%20Wen%20Wang%20and%20Jingyu%20Lu%20and%20Haoxiao%20Wang%20and%20Xueyi%20Pu%20and%20Fan%20Zhuo%20and%20Zhou%20Zhao%0AAbstract%3A%20End-to-end%20spoken%20dialogue%20models%20have%20garnered%20significant%20attention%20because%20they%20offer%20a%20higher%20potential%20ceiling%20in%20expressiveness%20and%20perceptual%20ability%20than%20cascaded%20systems.%20However%2C%20the%20intelligence%20and%20expressiveness%20of%20current%20open-source%20spoken%20dialogue%20models%20often%20remain%20below%20expectations.%20Motivated%20by%20the%20success%20of%20online%20reinforcement%20learning%28RL%29%20in%20other%20domains%2C%20one%20might%20attempt%20to%20directly%20apply%20preference%20optimization%20to%20spoken%20dialogue%20models%2C%20yet%20this%20transfer%20is%20non-trivial.%20We%20analyze%20these%20obstacles%20from%20the%20perspectives%20of%20reward%20modeling%20and%20rollout%20sampling%2C%20focusing%20on%20how%20sparse%20preference%20supervision%20interacts%20with%20dense%20speech%20generation%20under%20shared-parameter%20updates.%20Based%20on%20the%20analysis%2C%20we%20propose%20a%20modality-aware%20adaptive%20post-training%20recipe%20that%20makes%20RL%20practical%20for%20spoken%20dialogue%3A%20it%20constrains%20preference%20updates%20to%20the%20semantic%20channel%20and%20improves%20acoustic%20behavior%20via%20explicit%20anchoring%2C%20while%20dynam {"title": "Generalization in LLM Problem Solving: The Case of the Shortest Path", "author": "Yao Tong and Jiayuan Ye and Anastasia Borovykh and Reza Shokri", "abstract": "Whether language models can systematically generalize remains actively debated. Yet empirical performance is jointly shaped by multiple factors such as training data, training paradigms, and inference-time strategies, making failures difficult to interpret. We introduce a controlled synthetic environment based on shortest-path planning, a canonical composable sequential optimization problem. The setup enables clean separation of these factors and supports two orthogonal axes of generalization: spatial transfer to unseen maps and length scaling to longer-horizon problems. We find that models exhibit strong spatial transfer but consistently fail under length scaling due to recursive instability. We further analyze how distinct stages of the learning pipeline influence systematic problem-solving: for example, data coverage sets capability limits; reinforcement learning improves training stability but does not expand those limits; and inference-time scaling enhances performance but cannot rescue length-scaling failures.", "link": "http://arxiv.org/abs/2604.15306v1", "date": "2026-04-16", "relevancy": 2.5318, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5187}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5187}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4817}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generalization%20in%20LLM%20Problem%20Solving%3A%20The%20Case%20of%20the%20Shortest%20Path&body=Title%3A%20Generalization%20in%20LLM%20Problem%20Solving%3A%20The%20Case%20of%20the {"title": "STEP-Parts: Geometric Partitioning of Boundary Representations for Large-Scale CAD Processing", "author": "Shen Fan and Miko\u0142aj Kida and Przemyslaw Musialski", "abstract": "Many CAD learning pipelines discretize Boundary Representations (B-Reps) into triangle meshes, discarding analytic surface structure and topological adjacency and thereby weakening consistent instance-level analysis. We present STEP-Parts, a deterministic CAD-to-supervision toolchain that extracts geometric instance partitions directly from raw STEP B-Reps and transfers them to tessellated carriers through retained source-face correspondence, yielding instance labels and metadata for downstream learning and evaluation. The construction merges adjacent B-Rep faces only when they share the same analytic primitive type and satisfy a near-tangent continuity criterion. On ABC, same-primitive dihedral angles are strongly bimodal, yielding a threshold-insensitive low-angle regime for part extraction. Because the partition is defined on intrinsic B-Rep topology rather than on a particular triangulation, the resulting boundaries remain stable under changes in tessellation. Applied to the DeepCAD subset of ABC, the pipeline processes approximately 180{,}000 models in under six hours on a consumer CPU. We release code and precomputed labels, and show that STEP-Parts serves both as a tessellation-robust geometric reference and as a useful supervision source in two downstream probes: an implicit reconstruction--segmentation network and a dataset-level point-based backbone.", "link": "http://arxiv.org/abs/2604.14927v1", "date": "2026-04-16", "relevancy": 2.523, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5082}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5056}, {"title": ed%20labels%2C%20and%20show%20that%20STEP-Parts%20serves%20both%20as%20a%20tessellation-robust%20geometric%20reference%20and%20as%20a%20useful%20supervision%20source%20in%20two%20downstream%20probes%3A%20an%20implicit%20reconstruction--segmentation%20network%20and%20a%20dataset-level%20point-based%20backbone.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14927v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSTEP-Parts%253A%2520Geometric%2520Partitioning%2520of%2520Boundary%2520Representations%2520for%2520Large-Scale%2520CAD%2520Processing%26entry.906535625%3DShen%2520Fan%2520and%2520Miko%25C5%2582aj%2520Kida%2520and%2520Przemyslaw%2520Musialski%26entry.1292438233%3DMany%2520CAD%2520learning%2520pipelines%2520discretize%2520Boundary%2520Representations%2520%2528B-Reps%2529%2520into%2520triangle%2520meshes%252C%2520discarding%2520analytic%2520surface%2520structure%2520and%2520topological%2520adjacency%2520and%2520thereby%2520weakening%2520consistent%2520instance-level%2520analysis.%2520We%2520present%2520STEP-Parts%252C%2520a%2520deterministic%2520CAD-to-supervision%2520toolchain%2520that%2520extracts%2520geometric%2520instance%2520partitions%2520directly%2520from%2520raw%2520STEP%2520B-Reps%2520and%2520transfers%2520them%2520to%2520tessellated%2520carriers%2520through%2520retained%2520source-face%2520correspondence%252C%2520yielding%2520instance%2520labels%2520and%2520metadata%2520for%2520downstream%2520learning%2520and%2520evaluation.%2520The%2520construction%2520merges%2520adjacent%2520B-Rep%2520faces%2520only%2520when%2520they%2520share%2520the%2520same%2520analytic%2520primitive%2520type%2520and%2520satisfy%2520a%2520near-tangent%2520continuity%2520criterion.%2520On%2520ABC%252C%2520same-primitive%2520dihedral%2520angles%2520are%2520strongly%2520bimodal%252C%2520yielding%2520a%2520threshold-insensitive%2520low-angle%2520regime%2520for%2520part%2520extraction.%2520Because%2520the%25 {"title": "Improved Multiscale Structural Mapping with Supervertex Vision Transformer for the Detection of Alzheimer's Disease Neurodegeneration", "author": "Geonwoo Baek and David H. Salat and Ikbeom Jang", "abstract": "Alzheimer's disease (AD) confirmation often relies on positron emission tomography (PET) or cerebrospinal fluid (CSF) analysis, which are costly and invasive. Consequently, structural MRI biomarkers such as cortical thickness (CT) are widely used for non-invasive AD screening. Multiscale structural mapping (MSSM) was recently proposed to integrate gray-white matter contrasts (GWCs) with CT from a single T1-weighted MRI (T1w) scan. Building on this framework, we propose MSSM+, together with surface supervertex mapping (SSVM) and a Supervertex Vision Transformer (SV-ViT). 3D T1w images from individuals with AD and cognitively normal (CN) controls were analyzed. MSSM+ extends MSSM by incorporating sulcal depth and cortical curvature at the vertex level. SSVM partitions the cortical surface into supervertices (surface patches) that effectively represent inter- and intra-regional spatial relationships. SV-ViT is a Vision Transformer architecture operating on these supervertices, enabling anatomically informed learning from surface mesh representations. Compared with MSSM, MSSM+ identified more spatially extensive and statistically significant group differences between AD and CN. In AD vs. CN classification, MSSM+ achieved a 3%p higher area under the precision-recall curve than MSSM. Vendor-specific analyses further demonstrated reduced signal variability and consistently improved classification performance across MR manufacturers relative to CT, GWCs, and MSSM. These findings suggest that MSSM+ combined with SV-ViT is a promising MRI-based imaging marker for AD detection prior to CSF/PET confirmation.", "link": "http://arxiv.org/abs/2604.14837v1", "date": "2026-04-16", "relevancy": 2.5149, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5238}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.498}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4872}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Improved%20Multiscale%20Structural%20Mapping%20with%20Supervertex%20Vision%20Transformer%20for%20the%20Detection%20of%20Alzheimer%27s%20Disease%20Neurodegeneration&body=Title%3A%20Improved%20Multiscale%20Structural%20Mapping%20with%20Supervertex%20Vision%20Transformer%20for%20the%20Detection%20of%20Alzheimer%27s%20Disease%20Neurodegeneration%0AAuthor%3A%20Geonwoo%20Baek%20and%20David%20H.%20Salat%20and%20Ikbeom%20Jang%0AAbstract%3A%20Alzheimer%27s%20disease%20%28AD%29%20confirmation%20often%20relies%20on%20positron%20emission%20tomography%20%28PET%29%20or%20cerebrospinal%20fluid%20%28CSF%29%20analysis%2C%20which%20are%20costly%20and%20invasive.%20Consequently%2C%20structural%20MRI%20biomarkers%20such%20as%20cortical%20thickness%20%28CT%29%20are%20widely%20used%20for%20non-invasive%20AD%20screening.%20Multiscale%20structural%20mapping%20%28MSSM%29%20was%20recently%20proposed%20to%20integrate%20gray-white%20matter%20contrasts%20%28GWCs%29%20with%20CT%20from%20a%20single%20T1-weighted%20MRI%20%28T1w%29%20scan.%20Building%20on%20this%20framework%2C%20we%20propose%20MSSM%2B%2C%20together%20with%20surface%20supervertex%20mapping%20%28SSVM%29%20and%20a%20Supervertex%20Vision%20Transformer%20%28SV-ViT%29.%203D%20T1w%20images%20from%20individuals%20with%20AD%20and%20cognitively%20normal%20%28CN%29%20controls%20were%20analyzed.%20MSSM%2B%20extends%20MSSM%20by%20incorporating%20sulcal%20depth%20and%20cortical%20curvature%20at%20the%20vertex%20level.%20SSVM%20partitions%20the%20cortical%20surface%20into%20supervertices%20%28surface%20patches%29%20that%20effectively%20represent%20inter-%20and%20intra-regional%20spatial%20relationships.%20SV-ViT%20is%20a%20Vision%20Transformer%20architecture%20operating%20on%20these%20supervertices%2C%20enabling%20anatomically%20informed%20learning%20from%20surface%20mesh%20representations.%20Compared%20with%20MSSM%2C%20MSSM%2B%20identified%20more%20spatially%20extensive%20and%20statistically%20significant%20group%20differences%20between%20AD%20and%20CN.%20In%20AD%20vs.%20CN%20classification%2C%20MSSM%2B%20achieved%20a%203%25p%20higher%20area%20under%20the%20precision-recall%20curve%20than%20MSSM.%20Vendor-specific%20analyses%20further%20demonstrated%20reduced%20signal%20variability%20and%20consistently%20improved%20classification%20performance%20across%20MR%20manufacturers%20relative%20to%20CT%2C%20GWCs%2C%20and%20MSSM.%20These%20findings%20suggest%20that%20MSSM%2B%20combined%20with%20SV-ViT%20is%20a%20promising%20MRI-based%20imaging%20marker%20for%20AD%20detection%20prior%20to%20CSF/PET%20confirmation.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14837v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DImproved%2520Multiscale%2520Structural%2520Mapping%2520with%2520Supervertex%2520Vision%2520Transformer%2520for%2520the%2520Detection%2520of%2520Alzheimer%2527s%2520Disease%2520Neurodegeneration%26entry.906535625%3DGeonwoo%2520Baek%2520and%2520David%2520H.%2520Salat%2520and%2520Ikbeom%2520Jang%26entry.1292438233%3DAlzheimer%2527s%2520disease%2520%2528AD%2529%2520confirmation%2520often%2520relies%2520on%2520positron%2520emission%2520tomography%2520%2528PET%2529%2520or%2520cerebrospinal%2520fluid%2520%2528CSF%2529%2520analysis%252C%2520which%2520are%2520costly%2520and%2520invasive.%2520Consequently%252C%2520structural%2520MRI%2520biomarkers%2520such%2520as%2520cortical%2520thickness%2520%2528CT%2529%2520are%2520widely%2520used%2520for%2520non-invasive%2520AD%2520screenin

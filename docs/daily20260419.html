{"title": "From Charts to Code: A Hierarchical Benchmark for Multimodal Models", "author": "Jiahao Tang and Henry Hengyuan Zhao and Lijian Wu and Yifei Tao and Dongxing Mao and Yang Wan and Jingru Tan and Min Zeng and Min Li and Alex Jinpeng Wang", "abstract": "We introduce Chart2Code, a new benchmark for evaluating the chart understanding and code generation capabilities of large multimodal models (LMMs). Chart2Code is explicitly designed from a user-driven perspective, capturing diverse real-world scenarios and progressively increasing task difficulty. It consists of three levels: Level 1 (Chart Reproduction) reproduces charts from a reference figure and user query; Level 2 (Chart Editing) involves complex modifications such as changing chart types or adding elements; and Level 3 (Long-Table to Chart Generation) requires models to transform long, information-dense tables into faithful charts following user instructions. To our knowledge, this is the first hierarchical benchmark that reflects practical chart2code usage while systematically scaling task complexity. In total, Chart2Code contains 2,023 tasks across 22 chart types, paired with multi-level evaluation metrics that assess both code correctness and the visual fidelity of rendered charts. We benchmark 25 state-of-the-art (SoTA) LMMs, including both proprietary and the latest open-source models such as GPT-5, Qwen2.5-VL, InternVL3/3.5, MiMo-VL, and Seed-1.6-VL. Experimental results demonstrate that even the SoTA model GPT-5 averages only 0.57 on code-based evaluation and 0.22 on chart-quality assessment across the editing tasks, underscoring the difficulty of Chart2Code. We anticipate this benchmark will drive advances in multimodal reasoning and foster the development of more robust and general-purpose LMMs. Our code and data are available on Chart2Code.", "link": "http://arxiv.org/abs/2510.17932v3", "date": "2026-04-16", "relevancy": 2.514, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5179}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4952}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4952}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20From%20Charts%20to%20Code%3A%20A%20Hierarchical%20Benchmark%20for%20Multimodal%20Models&body=Title%3A%20From%20Charts%20to%20Code%3A%20A%20Hierarchical%20Benchmark%20for%20Multimodal%20Models%0AAuthor%3A%20Jiahao%20Tang%20and%20Henry%20Hengyuan%20Zhao%20and%20Lijian%20Wu%20and%20Yifei%20Tao%20and%20Dongxing%20Mao%20and%20Yang%20Wan%20and%20Jingru%20Tan%20and%20Min%20Zeng%20and%20Min%20Li%20and%20Alex%20Jinpeng%20Wang%0AAbstract%3A%20We%20introduce%20Chart2Code%2C%20a%20new%20benchmark%20for%20evaluating%20the%20chart%20understanding%20and%20code%20generation%20capabilities%20of%20large%20multimodal%20models%20%28LMMs%29.%20Chart2Code%20is%20explicitly%20designed%20from%20a%20user-driven%20perspective%2C%20capturing%20diverse%20real-world%20scenarios%20and%20progressively%20increasing%20task%20difficulty.%20It%20consists%20of%20three%20levels%3A%20Level%201%20%28Chart%20Reproduction%29%20reproduces%20charts%20from%20a%20reference%20figure%20and%20user%20query%3B%20Level%202%20%28Chart%20Editing%29%20involves%20complex%20modifications%20such%20as%20changing%20chart%20types%20or%20adding%20elements%3B%20and%20Level%203%20%28Long-Table%20to%20Chart%20Generation%29%20requires%20models%20to%20transform%20long%2C%20information-dense%20tables%20into%20faithful%20charts%20following%20user%20instructions.%20To%20our%20knowledge%2C%20this%20is%20the%20first%20hierarchical%20benchmark%20that%20reflects%20practical%20chart2code%20usage%20while%20systematically%20scaling%20task%20complexity.%20In%20total% {"title": "RadAgent: A tool-using AI agent for stepwise interpretation of chest computed tomography", "author": "M\u00e9lanie Roschewitz and Kenneth Styppa and Yitian Tao and Jiwoong Sohn and Jean-Benoit Delbrouck and Benjamin Gundersen and Nicolas Deperrois and Christian Bluethgen and Julia Vogt and Bjoern Menze and Farhad Nooralahzadeh and Michael Krauthammer and Michael Moor", "abstract": "Vision-language models (VLM) have markedly advanced AI-driven interpretation and reporting of complex medical imaging, such as computed tomography (CT). Yet, existing methods largely relegate clinicians to passive observers of final outputs, offering no interpretable reasoning trace for them to inspect, validate, or refine. To address this, we introduce RadAgent, a tool-using AI agent that generates CT reports through a stepwise and interpretable process. Each resulting report is accompanied by a fully inspectable trace of intermediate decisions and tool interactions, allowing clinicians to examine how the reported findings are derived. In our experiments, we observe that RadAgent improves Chest CT report generation over its 3D VLM counterpart, CT-Chat, across three dimensions. Clinical accuracy improves by 6.0 points (36.4% relative) in macro-F1 and 5.4 points (19.6% relative) in micro-F1. Robustness under adversarial conditions improves by 24.7 points (41.9% relative). Furthermore, RadAgent achieves 37.0% in faithfulness, a new capability entirely absent in its 3D VLM counterpart. By structuring the interpretation of chest CT as an explicit, tool-augmented and iterative reasoning trace, RadAgent brings us closer toward transparent and reliable AI for radiology.", "link": "http://arxiv.org/abs/2604.15231v1", "date": "2026-04-16", "relevancy": 2.5012, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5092}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4957}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4957}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RadAgent%3A%20A%20tool-using%20AI%20agent%20for%20stepwise%20interpretation%20of%20chest%20computed%20tomography&body=Title%3A%20RadAgent%3A%20A%20tool-using%20AI%20agent%20for%20stepwise%20interpretation%20of%20chest%20computed%20tomography%0AAuthor%3A%20M%C3%A9lanie%20Roschewitz%20and%20Kenneth%20Styppa%20and%20Yitian%20Tao%20and%20Jiwoong%20Sohn%20and%20Jean-Benoit%20Delbrouck%20and%20Benjamin%20Gundersen%20and%20Nicolas%20Deperrois%20and%20Christian%20Bluethgen%20and%20Julia%20Vogt%20and%20Bjoern%20Menze%20and%20Farhad%20Nooralahzadeh%20and%20Michael%20Krauthammer%20and%20Michael%20Moor%0AAbstract%3A%20Vision-language%20models%20%28VLM%29%20have%20markedly%20advanced%20AI-driven%20interpretation%20and%20reporting%20of%20complex%20medical%20imaging%2C%20such%20as%20computed%20tomography%20%28CT%29.%20Yet%2C%20existing%20methods%20largely%20relegate%20clinicians%20to%20passive%20observers%20of%20final%20outputs%2C%20offering%20no%20interpretable%20reasoning%20trace%20for%20them%20to%20inspect%2C%20validate%2C%20or%20refine.%20To%20address%20this%2C%20we%20introduce%20RadAgent%2C%20a%20tool-using%20AI%20agent%20that%20generates%20CT%20reports%20through%20a%20stepwise%20and%20interpretable%20process.%20Each%20resulting%20report%20is%20accompanied%20by%20a%20fully%20inspectable%20trace%20of%20intermediate%20decisions%20and%20tool%20interactions%2C%20allowing%20clinicians%20to%20examine%20how%20the%20reported%20findings%20are%20derived.%20In%20our%20experiments%2C%20we%20observe%20that%20RadAgent%20improves%20Chest%20CT%20report%20generation%20over%20its%203D%20VLM%20counterpart%2C%20CT-Chat%2C%20across%20three%20dimensions.%20Clinical%20accuracy%20improves%20by%206.0%20points%20%2836.4%25%20relative%29%20in%20macro-F1%20and%205.4%20points%20%2819.6%25%20relative%29%20in%20micro-F1.%20Robustness%20under%20adversarial%20conditions%20improves%20by%2024.7%20points%20%2841.9%25%20relative%29.%20Furthermore%2C%20RadAgent%20achieves%2037.0%25%20in%20faithfulness%2C%20a%20new%20capability%20entirely%20absent%20in%20its%203D%20VLM%20counterpart.%20By%20structuring%20the%20interpretation%20of%20chest%20CT%20as%20an%20explicit%2C%20tool-augmented%20and%20iterative%20reasoning%20trace%2C%20RadAgent%20brings%20us%20closer%20toward%20transparent%20and%20reliable%20AI%20for%20radiology.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15231v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRadAgent%253A%2520A%2520tool-using%2520AI%2520agent%2520for%2520stepwise%2520interpretation%2520of%2520chest%2520computed%2520tomography%26entry.906535625%3DM%25C3%25A9lanie%2520Roschewitz%2520and%2520Kenneth%2520Styppa%2520and%2520Yitian%2520Tao%2520and%2520Jiwoong%2520Sohn%2520and%2520Jean-Benoit%2520Delbrouck%2520and%2520Benjamin%2520Gundersen%2520and%2520Nicolas%2520Deperrois%2520and%2520Christian%2520Bluethgen%2520and%2520Julia%2520Vogt%2520and%2520Bjoern%2520Menze%2520and%2520Farhad%2520Nooralahzadeh%2520and%2520Michael%2520Krauthammer%2520and%2520Michael%2520Moor%26entry.1292438233%3DVision-language%2520models%2520%2528VLM%2529%2520have%2520markedly%2520advanced%2520AI-driven%2520interpretation%2520and%2520reporting%2520of%2520complex%2520medical%2520imaging%252C%2520such%2520as%2520computed%2520tomography%2520%2528CT%2529.%2520Yet%252C%2520existing%2520methods%2520largely%2520relegate%2520clinicians%2520to%2520passive%2520observers%2520of%2520final%2520outputs%252C%2520offering%2520no%2520interpretable%2520reasoning%2520trace%2520for%2520them%2520to%2520inspect%252C%2520validate%252C%2520or%2520refine.%2520To%2520address%2520this%252C%2520we%2520introduce%252 0Benjamin%20Gundersen%20and%20Nicolas%20Deperrois%20and%20Christian%20Bluethgen%20and%20Julia%20Vogt%20and%20Bjoern%20Menze%20and%20Farhad%20Nooralahzadeh%20and%20Michael%20Krauthammer%20and%20Michael%20Moor&entry.1292438233=Vision-language%20models%20%28VLM%29%20have%20markedly%20advanced%20AI-driven%20interpretation%20and%20reporting%20of%20complex%20medical%20imaging%2C%20such%20as%20computed%20tomography%20%28CT%29.%20Yet%2C%20existing%20methods%20largely%20relegate%20clinicians%20to%20passive%20observers%20of%20final%20outputs%2C%20offering%20no%20interpretable%20reasoning%20trace%20for%20them%20to%20inspect%2C%20validate%2C%20or%20refine.%20To%20address%20this%2C%20we%20introduce%20RadAgent%2C%20a%20tool-using%20AI%20agent%20that%20generates%20CT%20reports%20through%20a%20stepwise%20and%20interpretable%20process.%20Each%20resulting%20report%20is%20accompanied%20by%20a%20fully%20inspectable%20trace%20of%20intermediate%20decisions%20and%20tool%20interactions%2C%20allowing%20clinicians%20to%20examine%20how%20the%20reported%20findings%20are%20derived.%20In%20our%20experiments%2C%20we%20observe%20that%20RadAgent%20improves%20Chest%20CT%20report%20generation%20over%20its%203D%20VLM%20counterpart%2C%20CT-Chat%2C%20across%20three%20dimensions.%20Clinical%20accuracy%20improves%20by%206.0%20points%20%2836.4%25%20relative%29%20in%20macro-F1%20and%205.4%20points%20%2819.6%25%20relative%29%20in%20micro-F1.%20Robustness%20under%20adversarial%20conditions%20improves%20by%2024.7%20points%20%2841.9%25%20relative%29.%20Furthermore%2C%20RadAgent%20achieves%2037.0%25%20in%20faithfulness%2C%20a%20new%20capability%20entirely%20absent%20in%20its%203D%20VLM%20counterpart.%20By%20structuring%20the%20interpretation%20of%20chest%20CT%20as%20an%20explicit%2C%20tool-augmented%20and%20iterative%20reasoning%20trace%2C%20RadAgent%20brings%20us%20closer%20toward%20transparent%20and%20reliable%20AI%20for%20radiology.&entry.1838667208=http%3A//arxiv.org/abs/2604.15231v1&entry.124074799=Read"},
{"title": "Geometric Context Transformer for Streaming 3D Reconstruction", "author": "Lin-Zhuo Chen and Jian Gao and Yihang Chen and Ka Leong Cheng and Yipengjing Sun and Liangxiao Hu and Nan Xue and Xing Zhu and Yujun Shen and Yao Yao and Yinghao Xu", "abstract": "Streaming 3D reconstruction aims to recover 3D information, such as camera poses and point clouds, from a video stream, which necessitates geometric accuracy, temporal consistency, and computational efficiency. Motivated by the principles of Simultaneous Localization and Mapping (SLAM), we introduce LingBot-Map, a feed-forward 3D foundation model for reconstructing scenes from streaming data, built upon a geometric context transformer (GCT) architecture. A defining aspect of LingBot-Map lies in its carefully designed attention mechanism, which integrates an anchor context, a pose-reference window, and a trajectory memory to address coordinate grounding, dense geometric cues, and long-range drift correction, respectively. This design keeps the streaming state compact while retaining rich geometric context, enabling stable efficient inference at around 20 FPS on 518 x 378 resolution inputs over long sequences exceeding 10,000 frames. Extensive evaluations across a variety of benchmarks demonstrate that our approach achieves superior performance compared to both existing streaming and iterative optimization-based approaches.", "link": "http://arxiv.org/abs/2604.14141v2", "date": "2026-04-16", "relevancy": 2.4972, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6432}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6141}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6095}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Geometric%20Context%20Transformer%20for%20Streaming%203D%20Reconstruction&body=Title%3A%20Geometric%20Context%20Transformer%20for%20Streaming%203D%20Reconstruction%0AAuthor%3A%20Lin-Zhuo%20Chen%20and%20Jian%20Gao%20and%20Yihang%20Chen%20and%20Ka%20Leong%20Cheng%20and%20Yipengjing%20Sun%20and%20Liangxiao%20Hu%20and%20Nan%20Xue%20and%20Xing%20Zhu%20and%20Yujun%20Shen%20and%20Yao%20Yao%20and%20Yinghao%20Xu%0AAbstract%3A%20Streaming%203D%20reconstruction%20aims%20to%20recover%203D%20information%2C%20such%20as%20camera%20poses%20and%20point%20clouds%2C%20from%20a%20video%20stream%2C%20which%20necessitates%20geometric%20accuracy%2C%20temporal%20consistency%2C%20and%20computational%20efficiency.%20Motivated%20by%20the%20principles%20of%20Simultaneous%20Localization%20and%20Mapping%20%28SLAM%29%2C%20we%20introduce%20LingBot-Map%2C%20a%20feed-forward%203D%20foundation%20model%20for%20reconstructing%20scenes%20from%20streaming%20data%2C%20built%20upon%20a%20geometric%20context%20transformer%20%28GCT%29%20architecture.%20A%20defining%20aspect%20of%20LingBot-Map%20lies%20in%20its%20carefully%20designed%20attention%20mechanism%2C%20which%20integrates%20an%20anchor%20context%2C%20a%20pose-reference%20window%2C%20and%20a%20trajectory%20memory%20to%20address%20coordinate%20grounding%2C%20dense%20geometric%20cues%2C%20and%20long-range%20drift%20correction%2C%20respectively.%20This%20design%20keeps%20the%20streaming%20state%20compact%20while%20retaining%20rich%20geometric%20context%2C%20enabling%20stable%20efficient%20inference%20at%20around%2020%20FPS%20on%20518%20x%20378%20resolution%20inputs%20over%20long%20sequences%20exceeding%2010%2C000%20frames.%20Extensive%20evaluations%20across%20a%20variety%20of%20benchmarks%20demonstrate%20that%20our%20approach%20achieves%20superior%20performance%20compared%20to%20both%20existing%20streaming%20and%20iterative%20optimization-based%20approaches.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14141v2%0AForm% 20inputs%2520over%2520long%2520sequences%2520exceeding%252010%252C000%2520frames.%2520Extensive%2520evaluations%2520across%2520a%2520variety%2520of%2520benchmarks%2520demonstrate%2520that%2520our%2520approach%2520achieves%2520superior%2520performance%2520compared%2520to%2520both%2520existing%2520streaming%2520and%2520iterative%2520optimization-based%2520approaches.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.14141v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Geometric%20Context%20Transformer%20for%20Streaming%203D%20Reconstruction&entry.906535625=Lin-Zhuo%20Chen%20and%20Jian%20Gao%20and%20Yihang%20Chen%20and%20Ka%20Leong%20Cheng%20and%20Yipengjing%20Sun%20and%20Liangxiao%20Hu%20and%20Nan%20Xue%20and%20Xing%20Zhu%20and%20Yujun%20Shen%20and%20Yao%20Yao%20and%20Yinghao%20Xu&entry.1292438233=Streaming%203D%20reconstruction%20aims%20to%20recover%203D%20information%2C%20such%20as%20camera%20poses%20and%20point%20clouds%2C%20from%20a%20video%20stream%2C%20which%20necessitates%20geometric%20accuracy%2C%20temporal%20consistency%2C%20and%20computational%20efficiency.%20Motivated%20by%20the%20principles%20of%20Simultaneous%20Localization%20and%20Mapping%20%28SLAM%29%2C%20we%20introduce%20LingBot-Map%2C%20a%20feed-forward%203D%20foundation%20model%20for%20reconstructing%20scenes%20from%20streaming%20data%2C%20built%20upon%20a%20geometric%20context%20transformer%20%28GCT%29%20architecture.%20A%20defining%20aspect%20of%20LingBot-Map%20lies%20in%20its%20carefully%20designed%20attention%20mechanism%2C%20which%20integrates%20an%20anchor%20context%2C%20a%20pose-reference%20window%2C%20and%20a%20trajectory%20memory%20to%20address%20coordinate%20grounding%2C%20dense%20geometric%20cues%2C%20and%20long-range%20drift%20correction%2C%20respectively.%20This%20design%20keeps%20the%20streaming%20state%20compact%20while%20retaining%20rich%20geometric%20context%2C%20enabling%20st {"title": "Class Unlearning via Depth-Aware Removal of Forget-Specific Directions", "author": "Arman Hatami and Romina Aalishah and Ilya E. Monosov", "abstract": "Machine unlearning aims to remove targeted knowledge from a trained model without the cost of retraining from scratch. In class unlearning, however, reducing accuracy on forget classes does not necessarily imply true forgetting: forgotten information can remain encoded in internal representations, and apparent forgetting may arise from classifier-head suppression rather than representational removal. We show that existing class-unlearning methods often exhibit weak or negative selectivity, preserve forget-class structure in deep representations, or rely heavily on final-layer bias shifts. We then introduce DAMP (Depth-Aware Modulation by Projection), a one-shot, closed-form weight-surgery method that removes forget-specific directions from a pretrained network without gradient-based optimization. At each stage, DAMP computes class prototypes in the input space of the next learnable operator, extracts forget directions as residuals relative to retain-class prototypes, and applies a projection-based update to reduce downstream sensitivity to those directions. To preserve utility, DAMP uses a parameter-free depth-aware scaling rule derived from probe separability, applying smaller edits in early layers and larger edits in deeper layers. The method naturally extends to multi-class forgetting through low-rank subspace removal. Across MNIST, CIFAR-10, CIFAR-100, and Tiny ImageNet, and across convolutional and transformer architectures, DAMP more closely resembles the retraining gold standard than some of the prior methods, improving selective forgetting while better preserving retain-class performance and reducing residual forget-class structure in deep layers.", "link": "http://arxiv.org/abs/2604.15166v1", "date": "2026-04-16", "relevancy": 2.4921, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.516}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4921}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4871}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Class%20Unlearning%20via%20Depth-Aware%20Removal%20of%20Forget-Specific%20Directions&body=Title%3A%20Class%20Unlearning%20via%20Depth-Aware%20Removal%20of%20Forget-Specific%20Directions%0AAuthor%3A%20Arman%20Hatami%20and%20Romina%20Aalishah%20and%20Ilya%20E.%20Monosov%0AAbstract%3A%20Machine%20unlearning%20aims%20to%20remove%20targeted%20knowledge%20from%20a%20trained%20model%20without%20the%20cost%20of%20retraining%20from%20scratch.%20In%20class%20unlearning%2C%20however%2C%20reducing%20accuracy%20on%20forget%20classes%20does%20not%20necessarily%20imply%20true%20forgetting%3A%20forgotten%20information%20can%20remain%20encoded%20in%20internal%20representations%2C%20and%20apparent%20forgetting%20may%20arise%20from%20classifier-head%20suppression%20rather%20than%20representational%20removal.%20We%20show%20that%20existing%20class-unlearning%20methods%20often%20exhibit%20weak%20or%20negative%20selectivity%2C%20preserve%20forget-class%20structure%20in%20deep%20representations%2C%20or%20rely%20heavily%20on%20final-layer%20bias%20shifts.%20We%20then%20introduce%20DAMP%20%28Depth-Aware%20Modulation%20by%20Projection%29%2C%20a%20one-shot%2C%20closed-form%20weight-surgery%20method%20that%20removes%20forget-specific%20directions%20from%20a%20pretrained%20network%20without%20gradient-based%20optimization.%20At%20each%20stage%2C%20DAMP%20computes%20class%20prototypes%20in%20the%20input%20space%20of%20the%20next%20learnable%20operator%2C%20extracts%20forget%20directions%20as%20residuals%20relative%20to%20retain-class%20prototypes%2C%20and%20applies%20a%20projection-based%20update%20to%20reduce%20downstream%20sensitivity%20to%20those%20directions.%20To%20preserve%20utility%2C%20DAMP%20uses%20a%20parameter-free%20depth-aware%20scaling%20rule%20derived%20from%20probe%20separability%2C%20applying%20smaller%20edits%20in%20early%20layers%20and%20larger%20edits%20in%20deeper%20layers.%20The%20method%20naturally%20extends%20to%20multi-class%20forgetting%20through%20low-rank%20subspace%20removal.%20Across%20MNIST%2C%20CIFAR-10%2C%20CIFAR-100%2C%20and%20Tiny%20ImageNet%2C%20and%20across%20convolutional%20and%20transformer%20architectures%2C%20DAMP%20more%20closely%20resembles%20the%20retraining%20gold%20standard%20than%20some%20of%20the%20prior%20methods%2C%20improving%20selective%20forgetting%20while%20better%20preserving%20retain-class%20performance%20and%20reducing%20residual%20forget-class%20structure%20in%20deep%20layers.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15166v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DClass%2520Unlearning%2520via%2520Depth-Aware%2520Removal%2520of%2520Forget-Specific%2520Directions%26entry.906535625%3DArman%2520Hatami%2520and%2520Romina%2520Aalishah%2520and%2520Ilya%2520E.%2520Monosov%26entry.1292438233%3DMachine%2520unlearning%2520aims%2520to%2520remove%2520targeted%2520knowledge%2520from%2520a%2520trained%2520model%2520without%2520the%2520cost%2520of%2520retraining%2520from%2520scratch.%2520In%2520class%2520unlearning%252C%2520however%252C%2520reducing%2520accuracy%2520on%2520forget%2520classes%2520does%2520not%2520necessarily%2520imply%2520true%2520forgetting%253A%2520forgotten%2520information%2520can%2520remain%2520encoded%2520in%2520internal%2520representations%252C%2520and%2520apparent%2520forgetting%2520may%2520arise%2520from%2520classifier-head%2520suppression%2520rather%2520than%2520representational%2520removal.%2520We%2520show%2520that% {"title": "Compressing Sequences in the Latent Embedding Space: $K$-Token Merging for Large Language Models", "author": "Zihao Xu and John Harvill and Ziwei Fan and Yizhou Sun and Hao Ding and Hao Wang", "abstract": "Large Language Models (LLMs) incur significant computational and memory costs when processing long prompts, as full self-attention scales quadratically with input length. Token compression aims to address this challenge by reducing the number of tokens representing inputs. However, existing prompt-compression approaches primarily operate in token space and overlook inefficiencies in the latent embedding space. In this paper, we propose K-Token Merging, a latent-space compression framework that merges each contiguous block of K token embeddings into a single embedding via a lightweight encoder. The compressed sequence is processed by a LoRA-adapted LLM, while generation remains in the original vocabulary. Experiments on structural reasoning (Textualized Tree), sentiment classification (Amazon Reviews), and code editing (CommitPackFT) show that K-Token Merging lies on the Pareto frontier of performance vs. compression, achieving up to 75% input length reduction with minimal performance degradation.", "link": "http://arxiv.org/abs/2604.15153v1", "date": "2026-04-16", "relevancy": 2.4912, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4984}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4982}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4982}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Compressing%20Sequences%20in%20the%20Latent%20Embedding%20Space%3A%20%24K%24-Token%20Merging%20for%20Large%20Language%20Models&body=Title%3A%20Compressing%20Sequences%20in%20the%20Latent%20Embedding%20Space%3A%20%24K%24-Token%20Merging%20for%20Large%20Language%20Models%0AAuthor%3A%20Zihao%20Xu%20and%20John%20Harvill%20and%20Ziwei%20Fan%20and%20Yizhou%20Sun%20and%20Hao%20Ding%20and%20Hao%20Wang%0AAbstract%3A%20Large%20Language%20Models%20%28LLMs%29%20incur%20significant%20computational%20and%20memory%20costs%20when%20processing%20long%20prompts%2C%20as%20full%20self-attention%20scales%20quadratically%20with%20input%20length.%20Token%20compression%20aims%20to%20address%20this%20challenge%20by%20reducing%20the%20number%20of%20tokens%20representing%20inputs.%20However%2C%20existing%20prompt-compression%20approaches%20primarily%20operate%20in%20token%20space%20and%20overlook%20inefficiencies%20in%20the%20latent%20embedding%20space.%20In%20this%20paper%2C%20we%20propose%20K-Token%20Merging%2C%20a%20latent-space%20compression%20framework%20that%20merges%20each%20contiguous%20block%20of%20K%20token%20embeddings%20into%20a%20single%20embedding%20via%20a%20lightweight%20encoder.%20The%20compressed%20sequence%20is%20processed%20by%20a%20LoRA-adapted%20LLM%2C%20while%20generation%20remains%20in%20the%20original%20vocabulary.%20Experiments%20on%20structural%20reasoning%20%28Textualized%20Tree%29%2C%20sentiment%20classification%20%28Amazon%20Reviews%29%2C%20and%20code%20editing%20%28CommitPackFT%29%20show%20that%20K-Token%20Merging%20lies%20on%20the%20Pareto%20frontier%20of%20performance%20vs.%20compression%2C%20achieving%20up%20to%2075%25%20input%20length%20reduction%20with%20minimal%20performance%20degradation.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15153v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCompressing%2520Sequences%2520in%2520the%2520Latent%2520Embedding%2520Space%253A%2520%2524K%2524-Token%2520Merging%2520for%2520Large%2520Language%2520Models%26entry.906535625%3DZihao%2520Xu%2520and%2520Joh {"title": "Zero-Shot Retail Theft Detection via Orchestrated Vision Models: A Model-Agnostic, Cost-Effective Alternative to Trained Single-Model Systems", "author": "Haileab Yagersew", "abstract": "Retail theft costs the global economy over \\$100 billion annually, yet existing AI-based detection systems require expensive custom model training on proprietary datasets and charge \\$200-500/month per store. We present Paza, a zero-shot retail theft detection framework that achieves practical concealment detection without training any model. Our approach orchestrates multiple existing models in a layered pipeline - cheap object detection and pose estimation running continuously, with an expensive vision-language model (VLM) invoked only when behavioral pre-filters trigger. A multi-signal suspicion pre-filter (requiring dwell time plus at least one behavioral signal) reduces VLM invocations by 240x compared to per-frame analysis, bounding calls to <=10/minute and enabling a single GPU to serve 10-20 stores. The architecture is model-agnostic: the VLM component accepts any OpenAI-compatible endpoint, enabling operators to swap between models such as Gemma 4, Qwen3.5-Omni, GPT-4o, or future releases without code changes - ensuring the system improves as the VLM landscape evolves. We evaluate the VLM component on the DCSASS synthesized shoplifting dataset (169 clips, controlled environment), achieving 89.5% precision and 92.8% specificity at 59.3% recall zero-shot - where the recall gap is attributable to sparse frame sampling in offline evaluation rather than VLM reasoning failures, as precision and specificity are the operationally critical metrics determining false alarm rates. We present a detailed cost model showing viability at \\$50-100/month per store (3-10x cheaper than commercial alternatives), and introduce a privacy-preserving design that obfuscates faces in the detection pipeline. The source code is available at https://github.com/xHaileab/Paza-AI.", "link": " {"title": "Nautilus: An Auto-Scheduling Tensor Compiler for Efficient Tiled GPU Kernels", "author": "Yifan Zhao and Yuchen Yang and Matei Budiu and Sasa Misailovic", "abstract": "We present Nautilus, a novel tensor compiler that moves toward fully automated math-to-kernel optimization. Nautilus compiles a high-level algebraic specification of tensor operators into efficient tiled GPU kernels. Nautilus's successive lowering design allows high-level optimizations, expression rewrites, and tile optimizations to be jointly applied in a single end-to-end system. Nautilus presents a novel auto-scheduler that discovers sequences of high-level optimizations, while preserving the regular program structure needed by tile optimizers. Nautilus's auto-scheduler captures complex interactions and trade-offs in the high-level optimizations, including aggressive global transformations like advanced reduction fusion. Nautilus is the first end-to-end tensor compiler capable of starting from a math-like description of attention and automatically discovering FlashAttention-3-like kernels, offloading the entire burden of optimization from the programmer to the compiler. Across five transformer-based models and 150 evaluation configurations on NVIDIA GH200 and RTX 5090 GPUs, Nautilus achieves up to 23% higher throughput than state-of-the-art compilers on GH200 and up to 42% on RTX 5090, while matching or exceeding manually written cuDNN kernels on many long-sequence configurations.", "link": "http://arxiv.org/abs/2604.14825v1", "date": "2026-04-16", "relevancy": 2.4689, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.499}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4949}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "lin {"title": "Curvature-Aligned Probing for Local Loss-Landscape Stabilization", "author": "Nikita Kiselev and Andrey Grabovoy", "abstract": "Local loss-landscape stabilization under sample growth is typically measured either pointwise or through isotropic averaging in the full parameter space. Despite practical value, both choices probe directions that contribute little to the dominant local deformation of strongly anisotropic neural landscapes. We recast stabilization as an observational problem and introduce a unified family of criteria parameterized by an aggregation order and a probing distribution; within this family we propose a curvature-aligned criterion $\u0394_2^{(D)}$ that probes the loss increment field in the top-$D$ eigenspace of the empirical Hessian near a trained solution. Solely from a local quadratic model, we prove that $\u0394_2^{(D)}$ preserves the $O(k^{-2})$ mean-squared rate of the full-space criterion while replacing ambient-dimension curvature dependence with dependence on the subspace dimension $D$; a corollary gives a closed-form spectral expression and a proposition identifies the top-$D$ eigenspace as extremal within the eigenspace-aligned family. We also derive scalable estimators based on Hessian-vector products, subspace Monte Carlo, and a closed-form Gaussian-moment proxy. On a decoder-only transformer, a curvature-aligned probe occupying a tiny fraction of parameter space already reproduces the full-space mean-squared signal to within numerical noise throughout the validated local regime, and the closed-form estimator is orders of magnitude faster than direct Monte Carlo after subspace construction.", "link": "http://arxiv.org/abs/2604.14870v1", "date": "2026-04-16", "relevancy": 2.466, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.527}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4908}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4618}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Curvature-Aligned%20Probing%20for%20Local%20Loss-Landscape%20Stabilization&body=Title%3A%20Curvature-Aligned%20Probing%20for%20Local%20Loss-Landscape%20Stabilization%0AAuthor%3A%20Nikita%20Kiselev%20and%20Andrey%20Grabovoy%0AAbstract%3A%20Local%20loss-landscape%20stabilization%20under%20sample%20growth%20is%20typically%20measured%20either%20pointwise%20or%20through%20isotropic%20averaging%20in%20the%20full%20parameter%20space.%20Despite%20practical%20value%2C%20both%20choices%20probe%20directions%20that%20contribute%20little%20to%20the%20dominant%20local%20deformation%20of%20strongly%20anisotropic%20neural%20landscapes.%20We%20recast%20stabilization%20as%20an%20observational%20problem%20and%20introduce%20a%20unified%20family%20of%20criteria%20parameterized%20by%20an%20aggregation%20order%20and%20a%20probing%20distribution%3B%20within%20this%20family%20we%20propose%20a%20curvature-aligned%20criterion%20%24%CE%94_2%5E%7B%28D%29%7D%24%20that%20probes%20the%20loss%20increment%20field%20in%20the%20top-%24D%24%20eigenspace%20of%20the%20empirical%20Hessian%20near%20a%20trained%20solution.%20Solely%20from%20a%20local%20quadratic%20model%2C%20we%20prove%20that%20%24%CE%94_2%5E%7B%28D%29%7D%24%20preserves%20the%20%24O%28k%5E%7B-2%7D%29%24%20mean-squared%20rate%20of%20the%20full-space%20criterion%20while%20replacing%20ambient-dimension%20curvature%20dependence%20with%20dependence%20on%20the%20subspace%20dimension%20%24D%24%3B%20a%20corollary%20gives%20a%20closed-form%20spectral%20expression%20and%20a%20proposition%20identifies%20the%20top-%24D%24%20eigenspace%20as%20extremal%20within%20the%20eigenspace-aligned%20family.%20We%20also%20derive%2 {"title": "HyperSpace: A Generalized Framework for Spatial Encoding in Hyperdimensional Representations", "author": "Shay Snyder and Andrew Capodieci and David Gorsich and Maryam Parsa", "abstract": "Vector Symbolic Architectures (VSAs) provide a well-defined algebraic framework for compositional representations in hyperdimensional spaces. We introduce HyperSpace, an open-source framework that decomposes VSA systems into modular operators for encoding, binding, bundling, similarity, cleanup, and regression. Using HyperSpace, we analyze and benchmark two representative VSA backends: Holographic Reduced Representations (HRR) and Fourier Holographic Reduced Representations (FHRR). Although FHRR provides lower theoretical complexity for individual operations, HyperSpaces modularity reveals that similarity and cleanup dominate runtime in spatial domains. As a result, HRR and FHRR exhibit comparable end-to-end performance. Differences in memory footprint introduce additional deployment trade-offs where HRR requires approximately half the memory of FHRR vectors. By enabling modular, system-level evaluation, HyperSpace reveals practical trade-offs in VSA pipelines that are not apparent from theoretical or operator-level comparisons alone.", "link": "http://arxiv.org/abs/2604.15113v1", "date": "2026-04-16", "relevancy": 2.4437, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4941}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.486}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.486}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HyperSpace%3A%20A%20Generalized%20Framework%20for%20Spatial%20Encoding%20in%20Hyperdimensional%20Representations&body=Title%3A%20HyperSpace%3A%20A%20Generalized%20Framework%20for%20Spatial%20Encoding%20in%20Hyperdimensional%20Representations%0AAuthor%3A%20Shay%20Snyder%20and%20Andrew%20Capodieci%20and%20David%20Gorsich%20and%20Maryam%20Parsa%0AAbstract%3A%20Vector%20Symbolic%20Architectures%20%28VSAs%29%20provide%20a%20well-defined%20algebraic%20framework%20for%20compositional%20representations%20in%20hyperdimensional%20spaces.%20We%20introduce%20HyperSpace%2C%20an%20open-source%20framework%20that%20decomposes%20VSA%20systems%20into%20modular%20operators%20for%20encoding%2C%20binding%2C%20bundling%2C%20similarity%2C%20cleanup%2C%20and%20regression.%20Using%20HyperSpace%2C%20we%20analyze%20and%20benchmark%20two%20representative%20VSA%20backends%3A%20Holographic%20Reduced%20Representations%20%28HRR%29%20and%20Fourier%20Holographic%20Reduced%20Representations%20%28FHRR%29.%20Although%20FHRR%20provides%20lower%20theoretical%20complexity%20for%20individual%20operations%2C%20HyperSpaces%20modularity%20reveals%20that%20similarity%20and%20cleanup%20dominate%20runtime%20in%20spatial%20domains.%20As%20a%20result%2C%20HRR%20and%20FHRR%20exhibit%20comparable%20end-to-end%20performance.%20Differences%20in%20memory%20footprint%20introduce%20additional%20deployment%20trade-offs%20where%20HRR%20requires%20approximately%20half%20the%20memory%20of%20FHRR%20vectors.%20By%20enabling%20modular%2C%20system-level%20evaluation%2C%20HyperSpace%20reveals%20practical%20trade-offs%20in%20VSA%20pipelines%20that%20are%20not%20apparent%20from%20theoretical%20or%20operator-level%20comparisons%20alone.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15113v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHyperSpace%253A%2520A%2520Generalized%2520Framework%2520for%2520Spatial%2520Encoding%2520in%2520Hyperdimensional%2520Representations%26entry.906535625%3DShay%2520Snyder%2520and%2520Andrew%2520Capodieci%2520and%2520David%25 {"title": "Agentic Microphysics: A Manifesto for Generative AI Safety", "author": "Federico Pierucci and Matteo Prandi and Marcantonio Bracale Syrnikov and Marcello Galisai and Piercosma Bisconti", "abstract": "This paper advances a methodological proposal for safety research in agentic AI. As systems acquire planning, memory, tool use, persistent identity, and sustained interaction, safety can no longer be analysed primarily at the level of the isolated model. Population-level risks arise from structured interaction among agents, through processes of communication, observation, and mutual influence that shape collective behaviour over time. As the object of analysis shifts, a methodological gap emerges. Approaches focused either on single agents or on aggregate outcomes do not identify the interaction-level mechanisms that generate collective risks or the design variables that control them. A framework is required that links local interaction structure to population-level dynamics in a causally explicit way, allowing both explanation and intervention. We introduce two linked concepts. Agentic microphysics defines the level of analysis: local interaction dynamics where one agent's output becomes another's input under specific protocol conditions. Generative safety defines the methodology: growing phenomena and elicit risks from micro-level conditions to identify sufficient mechanisms, detect thresholds, and design effective interventions.", "link": "http://arxiv.org/abs/2604.15236v1", "date": "2026-04-16", "relevancy": 2.4418, "topK": [{"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5162}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.4774}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4714}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Agentic%20Microphysics%3A%20A%20Manifesto%20for%20Generative%20AI%20Safety&body=Title%3A%20Agentic%20Microphysics%3A%20A%20Manifesto%20for%20Generative%20AI%20Safety%0AAuthor%3A%20Federico%20Pierucci%20and%20Matteo%20Prandi%20and%20Marcantonio%20Bracale%20Syrnikov%20and%20Marcello%20Galisai%20and%20Piercosma%20Bisconti%0AAbstract%3A%20This%20paper%20advances%20a%20methodological%20proposal%20for%20safety%20research%20in%20agentic%20AI.%20As%20systems%20acquire%20planning%2C%20memory%2C%20tool%20use%2C%20persistent%20identity%2C%20and%20sustained%20interaction%2C%20safety%20can%20no%20longer%20be%20analysed%20primarily%20at%20the%20level%20of%20the%20isolated%20model.%20Population-level%20risks%20arise%20from%20structured%20interaction%20among%20agents%2C%20through%20processes%20of%20communication%2C%20observation%2C%20and%20mutual%20influence%20that%20shape%20collective%20behaviour%20over%20time.%20As%20the%20object%20of%20analysis%20shifts%2C%20a%20methodological%20gap%20emerges.%20Approaches%20focused%20either%20on%20single%20agents%20or%20on%20aggregate%20outcomes%20do%20not%20identify%20the%20interaction-level%20mechanisms%20that%20generate%20collective%20risks%20or%20the%20design%20variables%20that%20control%20them.%20A%20framework%20is%20required%20that%20links%20local%20interaction%20structure%20to%20population-level%20dynamics%20in%20a%20causally%20explicit%20way%2C%20allowing%20both%20explanation%20and%20intervention.%20We%20introduce%20two%20linked%20concepts.%20Agentic%20microphysics%20defines%20the%20level%20of%20analysis%3A%20local%20interaction%20dynamics%20where%20one%20agent%27s%20output%20becomes%20another%27s%20input%20under%20specific%20protocol%20conditions.%20Generative%20safety%20defines%20the%20methodology%3A%20growing%20phenomena%20and%20elicit%20risks%20from%20micro-level%20conditions%20to%20identify%20sufficient%20mechanisms%2C%20detect%20thresholds%2C%20and%20design%20effective%20interventions.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15236v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAgentic%2520Microphysics%253A%2520A%2520Manifesto%2520for%2520Generative%2520AI%2520Safety%26entry.906535625%3DFederico%2520Pierucci%2520and%2520Matteo%2520Prandi%2520and%2520Marcantonio%2520Bracale%2520Syrnikov%2520and%2520Marcello%2520Galisai%2520and%2520Piercosma%2520Bisconti%26entry.1292438233%3DThis%2520paper%2520advances%2520a%2520methodological%2520proposal%2520for%2520safety%2520research%2520in%2520agentic%2520AI.%2520As%2520systems%2520acquire%2520planning%252C%2520memory%252C%2520tool%2520use%252C%2520persistent%2520identity%252C%2520and%2520sustained%2520interaction%252C%2520safety%2520can%2520no%2520longer%2520be%2520analysed%2520primarily%2520at%2520the%2520level%2520of%2520the%2520isolated%2520model.%2520Population-level%2520risks%2520arise%2520from%2520structured%2520interaction%2520among%2520agents%252C%2520through%2520processes%2520of%2520communication%252C%2520observation%252C%2520and%2520mutual%2520influence%2520that%2520shape%2520collective%2520behaviour%2520over%2520time.%2520As%2520the%2520object%2520of%2520analysis%2520shifts%252C%2520a%2520methodological%2520gap%2520emerges.%2520Approaches%2520focused%2520either%2520on%2520single%2520agents%2520or%2520on%2520aggregate%2520outcomes%2520do%2520not%2520identify%2520the%2520interaction-level%2520mechanisms%2520that%2520generate%2520collective%2520risks%2520or%2520the%2520design%2520variables%2520that%2520control%2520them.%2520A%2520framework%2520is%2520required%2520that%2520links%2520local%2520interaction%2520structure%2520to%2520population-level%2520dynamics%2520in%2520a%2520causally%2520explicit%2520way%252C%2520allowing%2520both%2520explanation%2520and%2520intervention.%2520We%2520introduce%2520two%2520linked%2520concepts.%2520Agentic%2520microphysics%2520defines%2520the%2520level%2520of%2520analysis%253A%2520local%2520interaction%2520dynamics%2520where%2520one%2520agent%2527s%2520output%2520becomes%2520another%2527s%2520input%2520under%2520specific%2520protocol%2520conditions.%2520Generative%2520safety%2520defines%2520the%2520methodology%253A%2520growing%2520phenomena%2520and%2520elicit%2520risks%2520from%2520micro-level%2520conditions%2520to%2520identify%2520sufficient%2520mechanisms%252C%2520detect%2520thresholds%252C%2520and%2520design%2520effective%2520interventions.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.15236v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Agentic%20Microphysics%3A%20A%20Manifesto%20for%20Generative%20AI%20Safety&entry.906535625=Federico%20Pierucci%20and%20Matteo%20Prandi%20and%20Marcantonio%20Bracale%20Syrnikov%20and%20Marcello%20Galisai%20and%20Piercosma%20Bisconti&entry.1292438233=This%20paper%20advances%20a%20methodological%20proposal%20for%20safety%20research%20in%20agentic%20AI.%20As%20systems%20acquire%20planning%2C%20memory%2C%20tool%20use%2C%20persistent%20identity%2C%20and%20sustained%20interaction%2C%20safety%20can%20no%20longer%20be%20analysed%20primarily%20at%20the%20level%20of%20the%20isolated%20model.%20Population-level%20risks%20arise%20from%20structured%20interaction%20among%20agents%2C%20through%20processes%20of%20communication%2C%20observation%2C%20and%20mutual%20influence%20that%20shape%20collective%20behaviour%20over%20time.%20As%20the%20object%20of%20analysis%20shifts%2C%20a%20methodological%20gap%20emerges.%20Approaches%20focused%20either%20on%20single%20agents%20or%20on%20aggregate%20outcomes%20do%20not%20identify%20the%20interaction-level%20mechanisms%20that%20generate%20collective%20risks%20or%20the%20design%20variables%20that%20control%20them.%20A%20framework%20is%20required%20that%20links%20local%20interaction%20structure%20to%20population-level%20dynamics%20in%20a%20causally%20explicit%20way%2C%20allowing%20both%20explanation%20and%20intervention.%20We%20introduce%20two%20linked%20concepts.%20Agentic%20microphysics%20defines%20the%20level%20of%20analysis%3A%20local%20interaction%20dynamics%20where%20one%20agent%27s%20output%20becomes%20another%27s%20input%20under%20specific%20protocol%20conditions.%20Generative%20safety%20defines%20the%20methodology%3A%20growing%20phenomena%20and%20elicit%20risks%20from%20micro-level%20conditions%20to%20identify%20sufficient%20mechanisms%2C%20detect%20thresholds%2C%20and%20design%20effective%20interventions.&entry.1838667208=http%3A//arxiv.org/abs/2604.15236v1&entry.124074799=Read"},
{"title": "Schema Key Wording as an Instruction Channel in Structured Generation under Constrained Decoding", "author": "Yifan Le", "abstract": "Constrained decoding has been widely adopted for structured generation with large language models (LLMs), ensuring that outputs satisfy predefined formats such as JSON and XML. However, existing approaches largely treat schemas as purely structural constraints and overlook the possibility that their linguistic formulation may affect model behavior. In this work, we study how instruction placement influences model performance in structured generation and show that merely changing the wording of schema keys, without modifying the prompt or model parameters, can significantly alter model performance under constrained decoding. Based on this observation, we propose to reinterpret structured generation as a multi-channel instruction problem, where instructions can be conveyed explicitly through prompts and implicitly through schema keys during decoding. To the best of our knowledge, this is the first work to systematically study how schema key formulation acts as an implicit instruction channel and affects model performance under constrained decoding. Experiments on multiple mathematical reasoning benchmarks show that different model families exhibit distinct sensitivities to these instruction channels: Qwen models consistently benefit from schema-level instructions, while LLaMA models rely more heavily on prompt-level guidance. We further observe non-additive interaction effects between instruction channels, showing that combining multiple channels does not always lead to further improvement. These findings suggest that schema design not only determines output structure, but also carries instruction signals, offering a new perspective on structured generation in LLMs.", "link": "http://arxiv.org/abs/2604.14862v1", "date": "2026-04-16", "relevancy": 2.4403, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5042}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5042}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4559}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Schema%20Key%20Wording%20as%20an%20Instruction%20Channel%20in%20Structured%20Generation%20under%20Constrained%20Decoding&body=Title%3A%20Schema%20Key%20Wording%20as%20an%20Instruction%20Channel%20in%20Structured%20Generation%20under%20Constrained%20Decoding%0AAuthor%3A%20Yifan%20Le%0AAbstract%3A%20Constrained%20decoding%20has%20been%20widely%20adopted%20for%20structured%20generation%20with%20large%20language%20models%20%28LLMs%29%2C%20ensuring%20that%20outputs%20satisfy%20predefined%20formats%20such%20as%20JSON%20and%20XML.%20However%2C%20existing%20approaches%20largely%20treat%20schemas%20as%20purely%20structural%20constraints%20and%20overlook%20the%20possibility%20that%20their%20linguistic%20formulation%20may%20affect%20model%20behavior.%20In%20this%20work%2C%20we%20study%20how%20instruction%20placement%20influences%20model%20performance%20in%20structured%20generation%20and%20show%20that%20merely%20changing%20the%20wording%20of%20schema%20keys%2C%20without%20modifying%20the%20prompt%20or%20model%20parameters%2C%20can%20significantly%20alter%20model%20performance%20under%20constrained%20decoding.%20Based%20on%20this%20observation%2C%20we%20propose%20to%20reinterpret%20structured%20generation%20as%20a%20multi-channel%20instruction%20problem%2C%20where%20instructions%20can%20be%20conveyed%20explicitly%20through%20prompts%20and%20implicitly%20through%20schema%20keys%20during%20decoding.%20To%20the%20best%20of%20our%20knowledge%2C%20this%20is%20the%20first%20work%20to%20systematically%20study%20how%20schema%20key%20formulation%20acts%20as%20an%20implicit%20instruction%20channel%20and%20affects%20model%20performance%20under%20constrained%20decoding.%20Experiments%20on%20multiple%20mathematical%20reasoning%20benchmarks%20show%20that%20different%20model%20families%20exhibit%20distinct%20sensitivities%20to%20these%20instruction%20channels%3A%20Qwen%20models%20consistently%20benefit%20from%20schema-level%20instructions%2C%20while%20LLaMA%20models%20rely%20more%20heavily%20on%20prompt-level%20guidance.%20We%20further%20observe%20non-additive%20interaction%20effects%20between%20instruction%20channels%2C%20showing%20that%20combining%20multiple%20channels%20does%20not%20always%20lead%20to%20further%20improvement.%20These%20findings%20suggest%20that%20schema%20design%20not%20only%20determines%20output%20structure%2C%20but%20also%20carries%20instruction%20signals%2C%20offering%20a%20new%20perspective%20on%20structured%20generation%20in%20LLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14862v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSchema%2520Key%2520Wording%2520as%2520an%2520Instruction%2520Channel%2520in%2520Structured%2520Generation%2520under%2520Constrained%2520Decoding%26entry.906535625%3DYifan%2520Le%26entry.1292438233%3DConstrained%2520decoding%2520has%2520been%2520widely%2520adopted%2520for%2520structured%2520generation%2520with%2520large%2520language%2520models%2520%2528LLMs%2529%252C%2520ensuring%2520that%2520outputs%2520satisfy%2520predefined%2520formats%2520such%2520as%2520JSON%2520and%2520XML.%2520However%252C%2520existing%2520approaches%2520largely%2520treat%2520schemas%2520as%2520purely%2520structural%2520constraints%2520and%2520overlook%2520the%2520possibility%2520that%2520their%2520linguistic%2520formulation%2520may%2520affect%2520model%2520behavior.%2520In%2520this%2520work%252C%2520we%2520study%2520how%2520instruction%2520placement%2520influences%2520model%2520performance%2520in%2520 {"title": "Flow of Truth: Proactive Temporal Forensics for Image-to-Video Generation", "author": "Yuzhuo Chen and Zehua Ma and Han Fang and Hengyi Wang and Guanjie Wang and Weiming Zhang", "abstract": "The rapid rise of image-to-video (I2V) generation enables realistic videos to be created from a single image but also brings new forensic demands. Unlike static images, I2V content evolves over time, requiring forensics to move beyond 2D pixel-level tampering localization toward tracing how pixels flow and transform throughout the video. As frames progress, embedded traces drift and deform, making traditional spatial forensics ineffective. To address this unexplored dimension, we present **Flow of Truth**, the first proactive framework focusing on temporal forensics in I2V generation. A key challenge lies in discovering a forensic signature that can evolve consistently with the generation process, which is inherently a creative transformation rather than a deterministic reconstruction. Despite this intrinsic difficulty, we innovatively redefine video generation as *the motion of pixels through time rather than the synthesis of frames*. Building on this view, we propose a learnable forensic template that follows pixel motion and a template-guided flow module that decouples motion from image content, enabling robust temporal tracing. Experiments show that Flow of Truth generalizes across commercial and open-source I2V models, substantially improving temporal forensics performance.", "link": "http://arxiv.org/abs/2604.15003v1", "date": "2026-04-16", "relevancy": 2.4202, "topK": [{"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6187}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.599}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "ht {"title": "XRZero-G0: Pushing the Frontier of Dexterous Robotic Manipulation with Interfaces, Quality and Ratios", "author": "James Wang and Primo Pu and Zephyr Fung and Alex Wang and Sam Wang and Bender Deng and Kevin Wang and Zivid Liu and Chris Pan and Panda Yang and Andy Zhai and Lucy Liang and Shalfun Li and Johnny Sun and Jacky Xu and Will Tian and Kai Yan and Kohler Ye and Scott Li and Qian Wang and Roy Gan and Hao Wang", "abstract": "The acquisition of high-quality, action-aligned demonstration data remains a fundamental bottleneck in scaling foundation models for dexterous robot manipulation. Although robot-free human demonstrations (e.g., the UMI paradigm) offer a scalable alternative to traditional teleoperation, current systems are constrained by sub-optimal hardware ergonomics, open-loop workflows, and a lack of systematic data-mixing strategies. To address these limitations, we present XRZero-G0, a hardware-software co-designed system for embodied data collection and policy learning. The system features an ergonomic, virtual reality interface equipped with a top-view camera and dual specialized grippers to directly improve collection efficiency. To ensure dataset reliability, we propose a closed-loop collection, inspection, training, and evaluation pipeline for non-proprioceptive data. This workflow achieves an 85% data validity rate and establishes a transparent mechanism for quality control. Furthermore, we investigate the empirical scaling behaviors and optimal mixing ratios of robot-free data. Extensive experiments indicate that combining a minimal volume of real-robot data with large-scale robot-free data (e.g., a 10:1 ratio) achieves performance comparable to exclusively real-robot datasets, while reducing acquisition costs by a factor of twenty. Utilizing XRZero-G0, we construct a 2,000-hour robot-free dataset that enables zero-shot cross-embodiment transfer to a target physical robot, demonstrating a highly scalable methodology for generalized {"title": "A Robust Approach for LiDAR-Inertial Odometry Without Sensor-Specific Modeling", "author": "Meher V. R. Malladi and Tiziano Guadagnino and Luca Lobefaro and Cyrill Stachniss", "abstract": "Accurate odometry is a critical component in a robotic navigation stack, and subsequent modules such as planning and control often rely on an estimate of the robot's motion. Sensor-based odometry approaches should be robust across sensor types and deployable in different target domains, from solid-state LiDARs mounted on cars in urban-driving scenarios to spinning LiDARs on handheld packages used in unstructured natural environments. In this paper, we propose a robust LiDAR-inertial odometry system that does not rely on sensor-specific modeling. Sensor fusion techniques for LiDAR and inertial measurement unit (IMU) data typically integrate IMU data iteratively in a Kalman filter or use pre-integration in a factor graph framework, combined with LiDAR scan matching often exploiting some form of feature extraction. We propose an alternative strategy that only requires a simplified motion model for IMU integration and directly registers LiDAR scans in a scan-to-map approach. Our approach allows us to impose a novel regularization on the LiDAR registration, improving the overall odometry performance. We detail extensive experiments on a number of datasets covering a wide array of commonly used robotic sensors and platforms. We show that our approach works with the exact same configuration in all these scenarios, demonstrating its robustness. We have open-sourced our implementation so that the community can build further on our work and use it in their navigation stacks.", "link": "http://arxiv.org/abs/2509.06593v2", "date": "2026-04-16", "relevancy": 2.406, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6106}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6056}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5937}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Robust%20Approach%20for%20LiDAR-Inertial%20Odometry%20Without%20Sensor-Specific%20Modeling&body=Title%3A%20A%20Robust%20Approach%20for%20LiDAR-Inertial%20Odometry%20Without%20Sensor-Specific%20Modeling%0AAuthor%3A%20Meher%20V.%20R.%20Malladi%20and%20Tiziano%20Guadagnino%20and%20Luca%20Lobefaro%20and%20Cyrill%20Stachniss%0AAbstract%3A%20Accurate%20odometry%20is%20a%20critical%20component%20in%20a%20robotic%20navigation%20stack%2C%20and%20subsequent%20modules%20such%20as%20planning%20and%20control%20often%20rely%20on%20an%20estimate%20of%20the%20robot%27s%20motion.%20Sensor-based%20odometry%20approaches%20should%20be%20robust%20across%20sensor%20types%20and%20deployable%20in%20different%20target%20domains%2C%20from%20solid-state%20LiDARs%20mounted%20on%20cars%20in%20urban-driving%20scenarios%20to%20spinning%20LiDARs%20on%20handheld%20packages%20used%20in%20unstructured%20natural%20environments.%20In%20this%20paper%2C%20we%20propose%20a%20robust%20LiDAR-inertial%20odometry%20system%20that%20does%20not%20rely%20on%20sensor-specific%20modeling.%20Sensor%20fusion%20techniques%20for%20LiDAR%20and%20inertial%20measurement%20unit%20%28IMU%29%20data%20typically%20integrate%20IMU%20data%20iteratively%20in%20a%20Kalman%20filter%20or%20use%20pre-integration%20in%20a%20factor%20graph%20framework%2C%20combined%20with%20LiDAR%20scan%20matching%20often%20exploiting%20some%20form%20of%20feature%20extraction.%20We%20propose%20an%20alternative%20strategy%20that%20only%20requires%20a%20simplified%20motion%20model%20for%20IMU%20integration%20and%20directly%20registers%20LiDAR%20scans%20in%20a%20scan-to-map%20approach.%20Our%20approach%20allows%20us%20to%20impose%20a%20novel%20regularization%20on%20the%20LiDAR%20registration%2C%20improving%20the%20overall%20odometry%20performance.%20We%20detail%20extensive%20experiments%20on%20a%20number%20of%20datasets%20covering%20a%20wide%20array%20of%20commonly%20used%20robotic%20sensors%20and%20platforms.%20We%20show%20that%20our%20approach%20works%20with%20the%20exact%20same%20configuration%20in%20all%20these%20scenarios%2C%20demonstrating%20its%20robustness.%20We%20have%20open-sourced%20our%20implementation%20so%20that%20the%20community%20can%20build%20further%20on%20our%20work%20and%20use%20it%20in%20their%20navigation%20stacks.%0ALink%3A%20http%3A//arxiv.org/abs/2509.06593v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Robust%2520Approach%2520for%2520LiDAR-Inertial%2520Odometry%2520Without%2520Sensor-Specific%2520Modeling%26entry.906535625%3DMeher%2520V.%2520R.%2520Malladi%2520and%2520Tiziano%2520Guadagnino%2520and%2520Luca%2520Lobefaro%2520and%2520Cyrill%2520Stachniss%26entry.1292438233%3DAccurate%2520odometry%2520is%2520a%2520critical%2520component%2520in%2520a%2520robotic%2520navigation%2520stack%252C%2520and%2520subsequent%2520modules%2520such%2520as%2520planning%2520and%2520control%2520often%2520rely%2520on%2520an%2520estimate%2520of%2520the%2520robot%2527s%2520motion.%2520Sensor-based%2520odometry%2520approaches%2520should%2520be%2520robust%2520across%2520sensor%2520types%2520and%2520deployable%2520in%2520different%2520target%2520domains%252C%2520from%2520solid-state%2520LiDARs%2520mounted%2520on%2520cars%2520in%2520urban-driving%2520scenarios%2520to%2520spinning%2520LiDARs%2520on%2520handheld%2520packages%2520used%2520in%2520unstructured%2520natural%2520environments.%2520In%2520this%2520paper%252C%2520we%2520propose%2520a%2520robust%2520LiDAR-inertial%2520odometry%2520system%2520that%2520does%2520not%2520rely%2520on {"title": "TempusBench: An Evaluation Framework for Time-Series Forecasting", "author": "Denizalp Goktas and Gerardo Ria\u00f1o-Brice\u00f1o and Alif Abdullah and Aryan Nair and Chenkai Shen and Beatriz de Lucio and Alexandra Magnusson and Farhan Mashrur and Ahmed Abdulla and Shawrna Sen and Mahitha Thippireddy and Gregory Schwartz and Amy Greenwald", "abstract": "Foundation models have transformed natural language processing and computer vision, and a rapidly growing literature on time-series foundation models (TSFMs) seeks to replicate this success in forecasting. While recent open-source models demonstrate the promise of TSFMs, the field lacks a comprehensive and community-accepted model evaluation framework. We see at least four major issues impeding progress on the development of such a framework. First, existing evaluation frameworks comprise benchmark forecasting tasks derived from often outdated datasets (e.g., M3), many of which lack clear metadata and overlap with the corpora used to pre-train TSFMs. Second, these frameworks evaluate models along a narrowly defined set of benchmark forecasting tasks, such as forecast horizon length or domain, but overlook core statistical properties such as non-stationarity and seasonality. Third, domain-specific models (e.g., XGBoost) are often compared unfairly, as existing frameworks do not enforce a systematic and consistent hyperparameter tuning convention for all models. Fourth, visualization tools for interpreting comparative performance are lacking. To address these issues, we introduce TempusBench, an open-source evaluation framework for TSFMs. TempusBench consists of 1) new datasets which are not included in existing TSFM pretraining corpora, 2) a set of novel benchmark tasks that go beyond existing ones, 3) a model evaluation pipeline with a standardized hyperparameter tuning protocol, and 4) a tensorboard-based visualization interface. We provide access to our code on GitHub: https://github.com/Smlcrm/TempusBench and maintain a live leaderboard at https://benchmark.smlcrm.com/.", "link": "http://arxiv.org/abs/2604.11529v2", "date": "2026-04-16", "relevancy": 2.3956, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4825}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4774}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4774}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TempusBench%3A%20An%20Evaluation%20Framework%20for%20Time-Series%20Forecasting&body=Title%3A%20TempusBench%3A%20An%20Evaluation%20Framework%20for%20Time-Series%20Forecasting%0AAuthor%3A%20Denizalp%20Goktas%20and%20Gerardo%20Ria%C3%B1o-Brice%C3%B1o%20and%20Alif%20Abdullah%20and%20Aryan%20Nair%20and%20Chenkai%20Shen%20and%20Beatriz%20de%20Lucio%20and%20Alexandra%20Magnusson%20and%20Farhan%20Mashrur%20and%20Ahmed%20Abdulla%20and%20Shawrna%20Sen%20and%20Mahitha%20Thippireddy%20and%20Gregory%20Schwartz%20and%20Amy%20Greenwald%0AAbstract%3A%20Foundation%20models%20have%20transformed%20natural%20language%20processing%20and%20computer%20vision%2C%20and%20a%20rapidly%20growing%20literature%20on%20time-series%20foundation%20models%20%28TSFMs%29%20seeks%20to%20replicate%20this%20success%20in%20forecasting.%20While%20recent%20open-source%20models%20demonstrate%20the%20promise%20of%20TSFMs%2C%20the%20field%20lacks%20a%20comprehensive%20and%20community-accepted%20model%20evaluation%20framework.%20We%20see%20at%20least%20four%20major%20issues%20impeding%20progress%20on%20the%20development%20of%20such%20a%20framework.%20First%2C%20existing%20evaluation%20frameworks%20comprise%20benchmark%20forecasting%20tasks%20derived%20from%20often%20outdated%20datasets%2 {"title": "StreamCacheVGGT: Streaming Visual Geometry Transformers with Robust Scoring and Hybrid Cache Compression", "author": "Xuanyi Liu and Deyi Ji and Chunan Yu and Qi Zhu and Xuanfu Li and Jin Ma and Tianrun Chen and Lanyun Zhu", "abstract": "Reconstructing dense 3D geometry from continuous video streams requires stable inference under a constant memory budget. Existing $O(1)$ frameworks primarily rely on a ``pure eviction'' paradigm, which suffers from significant information destruction due to binary token deletion and evaluation noise from localized, single-layer scoring. To address these bottlenecks, we propose StreamCacheVGGT, a training-free framework that reimagines cache management through two synergistic modules: Cross-Layer Consistency-Enhanced Scoring (CLCES) and Hybrid Cache Compression (HCC). CLCES mitigates activation noise by tracking token importance trajectories across the Transformer hierarchy, employing order-statistical analysis to identify sustained geometric salience. Leveraging these robust scores, HCC transcends simple eviction by introducing a three-tier triage strategy that merges moderately important tokens into retained anchors via nearest-neighbor assignment on the key-vector manifold. This approach preserves essential geometric context that would otherwise be lost. Extensive evaluations on five benchmarks (7-Scenes, NRGBD, ETH3D, Bonn, and KITTI) demonstrate that StreamCacheVGGT sets a new state-of-the-art, delivering superior reconstruction accuracy and long-term stability while strictly adhering to constant-cost constraints.", "link": "http://arxiv.org/abs/2604.15237v1", "date": "2026-04-16", "relevancy": 2.382, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6059}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6002}, {"title": "Metric-agnostic Learning-to-Rank via Boosting and Rank Approximation", "author": "Camilo Gomez and Pengyang Wang and Yanjie Fu", "abstract": "Learning-to-Rank (LTR) is a supervised machine learning approach that constructs models specifically designed to order a set of items or documents based on their relevance or importance to a given query or context. Despite significant success in real-world information retrieval systems, current LTR methods rely on one prefix ranking metric (e.g., such as Normalized Discounted Cumulative Gain (NDCG) or Mean Average Precision (MAP)) for optimizing the ranking objective function. Such metric-dependent setting limits LTR methods from two perspectives: (1) non-differentiable problem: directly optimizing ranking functions over a given ranking metric is inherently non-smooth, making the training process unstable and inefficient; (2) limited ranking utility: optimizing over one single metric makes it difficult to generalize well to other ranking metrics of interest. To address the above issues, we propose a novel listwise LTR framework for efficient and generalizable ranking purpose. Specifically, we propose a new differentiable ranking loss that combines a smooth approximation to the ranking operator with the average mean square loss per query. Then, we adapt gradient-boosting machines to minimize our proposed loss with respect to each list, a novel contribution. Finally, extensive experimental results confirm that our method outperforms the current state-of-the-art in information retrieval measures with similar efficiency.", "link": "http://arxiv.org/abs/2604.15101v1", "date": "2026-04-16", "relevancy": 2.3819, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5016}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4653}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4623}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Metric-agnostic%20Learning-to-Rank%20via%20Boosting%20and%20Rank%20Approximation&body=Title%3A%20Metric-agnostic%20Learning-to-Rank%20via%20Boosting%20and%20Rank%20Approximation%0AAuthor%3A%20Camilo%20Gomez%20and%20Pengyang%20Wang%20and%20Yanjie%20Fu%0AAbstract%3A%20Learning-to-Rank%20%28LTR%29%20is%20a%20supervised%20machine%20learning%20approach%20that%20constructs%20models%20specifically%20designed%20to%20order%20a%20set%20of%20items%20or%20documents%20based%20on%20their%20relevance%20or%20importance%20to%20a%20given%20query%20or%20context.%20Despite%20significant%20success%20in%20real-world%20information%20retrieval%20systems%2C%20current%20LTR%20methods%20rely%20on%20one%20prefix%20ranking%20metric%20%28e.g.%2C%20such%20as%20Normalized%20Discounted%20Cumulative%20Gain%20%28NDCG%29%20or%20Mean%20Average%20Precision%20%28MAP%29%29%20for%20optimizing%20the%20ranking%20objective%20function.%20Such%20metric-dependent%20setting%20limits%20LTR%20methods%20from%20two%20perspectives%3A%20%281%29%20non-differentiable%20problem%3A%20directly%20optimizing%20ranking%20functions%20over%20a%20given%20ranking%20metric%20is%20inherently%20non-smooth%2C%20making%20the%20training%20process%20unstable%20and%20inefficient%3B%20%282%29%20limited%20ranking%20utility%3A%20optimizing%20over%20one%20single%20metric%20makes%20it%20difficult%20to%20generalize%20well%20to%20other%20ranking%20metrics%20of%20interest.%20To%20address%20the%20above%20issues%2C%20we%20propose%20a%20novel%20listwise%20LTR%20framework%20for%20efficient%20and%20generalizable%20ranking%20purpose.%20Specifically%2C%20we%20propose%20a%20new%20differentiable%20ranking%20loss%20that%20combines%20a%20smooth%20approximation%20to%20the%20ranking%20operator%20with%20the%20average%20mean%20square%20loss%20per%20query.%20Then%2C%20we%20adapt%20gradient-boosting%20machines%20to%20minimize%20our%20proposed%20loss%20with%20respect%20to%20each%20list%2C%20a%20novel%20contribution.%20Finally%2C%20extensive%20experimental%20results%20confirm%20that%20our%20method%20outperforms%20the%20current%20state-of-the-art%20in%20information%20retrieval%20measures%20with%20similar%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15101v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMetric-agnostic%2520Learning-to-Rank%2520via%2520Boosting%2520and%2520Rank%2520Approximation%26entry.906535625%3DCamilo%2520Gomez%2520and%2520Pengyang%2520Wang%2520and%2520Yanjie%2520Fu%26entry.1292438233%3DLearning-to-Rank%2520%2528LTR%2529%2520is%2520a%2520supervised%2520machine%2520learning%2520approach%2520that%2520constructs%2520models%2520specifically%2520designed%2520to%2520order%2520a%2520set%2520of%2520items%2520or%2520documents%2520based%2520on%2520their%2520relevance%2520or%2520importance%2520to%2520a%2520given%2520query%2520or%2520context.%2520Despite%2520significant%2520success%2520in%2520real-world%2520information%2520retrieval%2520systems%252C%2520current%2520LTR%2520methods%2520rely%2520on%2520one%2520prefix%2520ranking%2520metric%2520%2528e.g.%252C%2520such%2520as%2520Normalized%2520Discounted%2520Cumulative%2520Gain%2520%2528NDCG%2529%2520or%2520Mean%2520Average%2520Precision%2520%2528MAP%2529%2529%2520for%2520optimizing%2520the%2520ranking%2520objective%2520function.%2520Such%2520metric-dependent%2520setting%2520limits%2520LTR%2520methods%2520from%2520two%2520perspectives%253A%2520%25281%2529%2520non-differentiable%2520problem%253A%2520directly%2520optimizing%2520ranking%2520functions%2520over%2520a%2520given%2520ranking%2520metric%2520is%2520inherently%2520non-smooth%252C%2520making%2520the%2520training%2520process%2520unstable%2520and%25

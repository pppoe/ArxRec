ory%2C%20balancing%20plasticity%20against%20stability.%20Experiments%20on%20multiple%20benchmarks%20show%20that%20EST%20consistently%20improves%20diverse%20backbones%20and%20achieves%20state-of-the-art%20performance%2C%20highlighting%20the%20importance%20of%20state%20persistence%20for%20long-horizon%20TKG%20forecasting.%0ALink%3A%20http%3A//arxiv.org/abs/2602.12389v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEvolving%2520Beyond%2520Snapshots%253A%2520Harmonizing%2520Structure%2520and%2520Sequence%2520via%2520Entity%2520State%2520Tuning%2520for%2520Temporal%2520Knowledge%2520Graph%2520Forecasting%26entry.906535625%3DSiyuan%2520Li%2520and%2520Yunjia%2520Wu%2520and%2520Yiyong%2520Xiao%2520and%2520Pingyang%2520Huang%2520and%2520Peize%2520Li%2520and%2520Ruitong%2520Liu%2520and%2520Yan%2520Wen%2520and%2520Te%2520Sun%26entry.1292438233%3DTemporal%2520knowledge%2520graph%2520%2528TKG%2529%2520forecasting%2520requires%2520predicting%2520future%2520facts%2520by%2520jointly%2520modeling%2520structural%2520dependencies%2520within%2520each%2520snapshot%2520and%2520temporal%2520evolution%2520across%2520snapshots.%2520However%252C%2520most%2520existing%2520methods%2520are%2520stateless%253A%2520they%2520recompute%2520entity%2520representations%2520at%2520each%2520timestamp%2520from%2520a%2520limited%2520query%2520window%252C%2520leading%2520to%2520episodic%2520amnesia%2520and%2520rapid%2520decay%2520of%2520long-term%2520dependencies.%2520To%2520address%2520this%2520limitation%252C%2520we%2520propose%2520Entity%2520State%2520Tuning%2520%2528EST%2529%252C%2520an%2520encoder-agnostic%2520framework%2520that%2520endows%2520TKG%2520forecasters%2520with%2520persistent%2520and%2520continuously%2520evolving%2520entity%2520states.%2520EST%2520maintains%2520a%2520global%2520state%2520buffer%2520and%2520progressively%2520aligns%2520structural%2520evidence%2520with%2520sequential%2520signals%2520via%25 {"title": "Reward-Aware Trajectory Shaping for Few-step Visual Generation", "author": "Rui Li and Bingyu Li and Yuanzhi Liang and HuangHai Bin and Chi Zhang and XueLong Li", "abstract": "Achieving high-fidelity generation in extremely few sampling steps has long been a central goal of generative modeling. Existing approaches largely rely on distillation-based frameworks to compress the original multi-step denoising process into a few-step generator. However, such methods inherently constrain the student to imitate a stronger multi-step teacher, imposing the teacher as an upper bound on student performance. We argue that introducing \\textbf{preference alignment awareness} enables the student to optimize toward reward-preferred generation quality, potentially surpassing the teacher instead of being restricted to rigid teacher imitation. To this end, we propose \\textbf{Reward-Aware Trajectory Shaping (RATS)}, a lightweight framework for preference-aligned few-step generation. Specifically, teacher and student latent trajectories are aligned at key denoising stages through horizon matching, while a \\textbf{reward-aware gate} is introduced to adaptively regulate teacher guidance based on their relative reward performance. Trajectory shaping is strengthened when the teacher achieves higher rewards, and relaxed when the student matches or surpasses the teacher, thereby enabling continued reward-driven improvement. By seamlessly integrating trajectory distillation, reward-aware gating, and preference alignment, RATS effectively transfers preference-relevant knowledge from high-step generators without incurring additional test-time computational overhead. Experimental results demonstrate that RATS substantially improves the efficiency--quality trade-off in few-step visual generation, significantly narrowing the gap between few-step students and stronger multi-step generators.", "link": "http://arxiv.org/abs/2604.14910v1", "date": "2026-04-16", "relevancy": 2.1974, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5664}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5492}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5324}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Reward-Aware%20Trajectory%20Shaping%20for%20Few-step%20Visual%20Generation&body=Title%3A%20Reward-Aware%20Trajectory%20Shaping%20for%20Few-step%20Visual%20Generation%0AAuthor%3A%20Rui%20Li%20and%20Bingyu%20Li%20and%20Yuanzhi%20Liang%20and%20HuangHai%20Bin%20and%20Chi%20Zhang%20and%20XueLong%20Li%0AAbstract%3A%20Achieving%20high-fidelity%20generation%20in%20extremely%20few%20sampling%20steps%20has%20long%20been%20a%20central%20goal%20of%20generative%20modeling.%20Existing%20approaches%20largely%20rely%20on%20distillation-based%20frameworks%20to%20compress%20the%20original%20multi-step%20denoising%20process%20into%20a%20few-step%20generator.%20However%2C%20such%20methods%20inherently%20constrain%20the%20student%20to%20imitate%20a%20stronger%20multi-step%20teacher%2C%20imposing%20the%20teacher%20as%20an%20upper%20bound%20on%20student%20performance.%20We%20argue%20that%20introducing%20%5Ctextbf%7Bpreference%20alignment%20awareness%7D%20enables%20the%20student%20to%20optimize%20toward%20reward-preferred%20generation%20quality%2C%20potentially%20surpassing%20the%20teacher%20instead%20of%20being%20restricted%20to%20rigid%20teacher%20imitation.%20To%20this%20end%2C%20we%20propose%20%5Ctextbf%7BReward-Aware%20Trajectory%20Shaping%20%28RATS%29%7D%2C%20a%20lightweight%20framework%20for%20preference-aligned%20few-step%20generation.%20Specifically%2C%20teacher%20and%20student%20latent%20trajectories%20are%20aligned%20at%20key%20denoising%20stages%20through%20horizon%20matching%2C%20while%20a%20%5Ctextbf%7Breward-aware%20gate%7D%20is%20introduced%20to%20adaptively%20regulate%20teacher%20guidance%20based%20on%20their%20relative%20reward%20performance.%20Trajectory%20shaping%20is%20strengthened%20when%20the%20teacher%20achieves%20higher%20rewards%2C%20and%20relaxed%20when%20the%20student%20matches%20or%20surpasses%20the%20teacher%2C%20thereby%20enabling%20continued%20reward-driven%20improvement.%20By%20seamlessly%20integrating%20trajectory%20distillation%2C%20reward-aware%20gating%2C%20and%20preference%20alignment%2C%20RATS%20effectively%20transfers%20preference-relevant%20knowledge%20from%20high-step%20generators%20without%20incurring%20additional%20test-time%20computational%20overhead.%20Experimental%20results%20demonstrate%20that%20RATS%20substantially%20improves%20the%20efficiency--quality%20trade-off%20in%20few-step%20visual%20generation%2C%20significantly%20narrowing%20the%20gap%20between%20few-step%20students%20and%20stronger%20multi-step%20generators.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14910v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReward-Aware%2520Trajectory%2520Shaping%2520for%2520Few-step%2520Visual%2520Generation%26entry.906535625%3DRui%2520Li%2520and%2520Bingyu%2520Li%2520and%2520Yuanzhi%2520Liang%2520and%2520HuangHai%2520Bin%2520and%2520Chi%2520Zhang%2520and%2520XueLong%2520Li%26entry.1292438233%3DAchieving%2520high-fidelity%2520generation%2520in%2520extremely%2520few%2520sampling%2520steps%2520has%2520long%2520been%2520a%2520central%2520goal%2520of%2520generative%2520modeling.%2520Existing%2520approaches%2520largely%2520rely%2520on%2520distillation-based%2520frameworks%2520to%2520compress%2520the%2520original%2520multi-step%2520denoising%2520process%2520into%2520a%2520few-step%2520generator.%2520However%252C%2520such%2520methods%2520inherently%2520constrain%2520the%2520student%2520to%2520imitate {"title": "VideoStir: Understanding Long Videos via Spatio-Temporally Structured and Intent-Aware RAG", "author": "Honghao Fu and Miao Xu and Yiwei Wang and Dailing Zhang and Jun Liu and Yujun Cai", "abstract": "Scaling multimodal large language models (MLLMs) to long videos is constrained by limited context windows. While retrieval-augmented generation (RAG) is a promising remedy by organizing query-relevant visual evidence into a compact context, most existing methods (i) flatten videos into independent segments, breaking their inherent spatio-temporal structure, and (ii) depend on explicit semantic matching, which can miss cues that are implicitly relevant to the query's intent. To overcome these limitations, we propose VideoStir, a structured and intent-aware long-video RAG framework. It firstly structures a video as a spatio-temporal graph at clip level, and then performs multi-hop retrieval to aggregate evidence across distant yet contextually related events. Furthermore, it introduces an MLLM-backed intent-relevance scorer that retrieves frames based on their alignment with the query's reasoning intent. To support this capability, we curate IR-600K, a large-scale dataset tailored for learning frame-query intent alignment. Experiments show that VideoStir is competitive with state-of-the-art baselines without relying on auxiliary information, highlighting the promise of shifting long-video RAG from flattened semantic matching to structured, intent-aware reasoning. Codes and checkpoints are available at https://github.com/RomGai/VideoStir.", "link": "http://arxiv.org/abs/2604.05418v3", "date": "2026-04-16", "relevancy": 2.195, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5588}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5499}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5436}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20VideoStir%3A%20Understanding%20Long%20Videos%20via%20Spatio-Temporally%20Structured%20and%20Intent-Aware%20RAG&body=Title%3A%20VideoStir%3A%20Understanding%20Long%20Videos%20via%20Spatio-Temporally%20Structured%20and%20Intent-Aware%20RAG%0AAuthor%3A%20Honghao%20Fu%20and%20Miao%20Xu%20and%20Yiwei%20Wang%20and%20Dailing%20Zhang%20and%20Jun%20Liu%20and%20Yujun%20Cai%0AAbstract%3A%20Scaling%20multimodal%20large%20language%20models%20%28MLLMs%29%20to%20long%20videos%20is%20constrained%20by%20limited%20context%20windows.%20While%20retrieval-augmented%20generation%20%28RAG%29%20is%20a%20promising%20remedy%20by%20organizing%20query-relevant%20visual%20evidence%20into%20a%20compact%20context%2C%20most%20existing%20methods%20%28i%29%20flatten%20videos%20into%20independent%20segments%2C%20breaking%20their%20inherent%20spatio-temporal%20structure%2C%20and%20%28ii%29%20depend%20on%20explicit%20semantic%20matching%2C%20which%20can%20miss%20cues%20that%20are%20implicitly%20relevant%20to%20the%20query%27s%20intent.%20To%20overcome%20these%20limitations%2C%20we%20propose%20VideoStir%2C%20a%20structured%20and%20intent-aware%20long-video%20RAG%20framework.%20It%20firstly%20structures%20a%20video%20as%20a%20spatio-temporal%20graph%20at%20clip%20level%2C%20and%20then%20performs%20multi-hop%20retrieval%20to%20aggregate%20evidence%20across%20distant%20yet%20contextually%20related%20events.%20Furthermore%2C%20it%20introduces%20an%20MLLM-backed%20intent-relevance%20scorer%20that%20retrieves%20frames%20based%20on%20their%20alignment%20with%20the%20query%27s%20reasoning%20intent.%20To%20support%20this%20capability%2C%20we%20curate%20IR-600K%2C%20a%20large-scale%20dataset%20tailored%20for%20learning%20frame-query%20intent%20alignment.%20Experiments%20show%20that%20VideoStir%20is%20competitive%20with%20state-of- 520across%2520distant%2520yet%2520contextually%2520related%2520events.%2520Furthermore%252C%2520it%2520introduces%2520an%2520MLLM-backed%2520intent-relevance%2520scorer%2520that%2520retrieves%2520frames%2520based%2520on%2520their%2520alignment%2520with%2520the%2520query%2527s%2520reasoning%2520intent.%2520To%2520support%2520this%2520capability%252C%2520we%2520curate%2520IR-600K%252C%2520a%2520large-scale%2520dataset%2520tailored%2520for%2520learning%2520frame-query%2520intent%2520alignment.%2520Experiments%2520show%2520that%2520VideoStir%2520is%2520competitive%2520with%2520state-of-the-art%2520baselines%2520without%2520relying%2520on%2520auxiliary%2520information%252C%2520highlighting%2520the%2520promise%2520of%2520shifting%2520long-video%2520RAG%2520from%2520flattened%2520semantic%2520matching%2520to%2520structured%252C%2520intent-aware%2520reasoning.%2520Codes%2520and%2520checkpoints%2520are%2520available%2520at%2520https%253A//github.com/RomGai/VideoStir.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.05418v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=VideoStir%3A%20Understanding%20Long%20Videos%20via%20Spatio-Temporally%20Structured%20and%20Intent-Aware%20RAG&entry.906535625=Honghao%20Fu%20and%20Miao%20Xu%20and%20Yiwei%20Wang%20and%20Dailing%20Zhang%20and%20Jun%20Liu%20and%20Yujun%20Cai&entry.1292438233=Scaling%20multimodal%20large%20language%20models%20%28MLLMs%29%20to%20long%20videos%20is%20constrained%20by%20limited%20context%20windows.%20While%20retrieval-augmented%20generation%20%28RAG%29%20is%20a%20promising%20remedy%20by%20organizing%20query-relevant%20visual%20evidence%20into%20a%20compact%20context%2C%20most%20existing%20methods%20%28i%29%20flatten%20videos%20into%20independent%20segments%2C%20breaking%20their%20inherent%20spatio-temporal%20structure%2C%20and%20%28ii%29%20depend%20on%20explicit%20semantic%20matching%2C%20which%20can%20miss%2 {"title": "Bidirectional Cross-Modal Prompting for Event-Frame Asymmetric Stereo", "author": "Ninghui Xu and Fabio Tosi and Lihui Wang and Jiawei Han and Luca Bartolomei and Zhiting Yao and Matteo Poggi and Stefano Mattoccia", "abstract": "Conventional frame-based cameras capture rich contextual information but suffer from limited temporal resolution and motion blur in dynamic scenes. Event cameras offer an alternative visual representation with higher dynamic range free from such limitations. The complementary characteristics of the two modalities make event-frame asymmetric stereo promising for reliable 3D perception under fast motion and challenging illumination. However, the modality gap often leads to marginalization of domain-specific cues essential for cross-modal stereo matching. In this paper, we introduce Bi-CMPStereo, a novel bidirectional cross-modal prompting framework that fully exploits semantic and structural features from both domains for robust matching. Our approach learns finely aligned stereo representations within a target canonical space and integrates complementary representations by projecting each modality into both event and frame domains. Extensive experiments demonstrate that our approach significantly outperforms state-of-the-art methods in accuracy and generalization.", "link": "http://arxiv.org/abs/2604.15312v1", "date": "2026-04-16", "relevancy": 2.185, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5484}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5471}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5388}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Bidirectional%20Cross-Modal%20Prompting%20for%20Event-Frame%20Asymmetric%20Stereo&body=Title%3A%20Bidirectional%20Cross-Modal%20Prompting%20for%20Event-Frame%20Asymmetric%20Stereo%0AAuthor%3A%20Ninghui%20Xu%20and%20Fabio%20Tosi%20and%20Lihui%20Wang%20and%20Jiawei%20Han%20and%20Luca%20Bartolomei%20and%20Zhiting%20Yao%20and%20Matteo%20Poggi%20and%20Stefano%20Mattoccia%0AAbstract%3A%20Conventional%20frame-based%20cameras%20capture%20rich%20contextual%20information%20but%20suffer%20from%20limited%20temporal%20resolution%20and%20motion%20blur%20in%20dynamic%20scenes.%20Event%20cameras%20offer%20an%20alternative%20visual%20representation%20with%20higher%20dynamic%20range%20free%20from%20such%20limitations.%20The%20complementary%20characteristics%20of%20the%20two%20modalities%20make%20event-frame%20asymmetric%20stereo%20promising%20for%20reliable%203D%20perception%20under%20fast%20motion%20and%20challenging%20illumination.%20However%2C%20the%20modality%20gap%20often%20leads%20to%20marginalization%20of%20domain-specific%20cues%20essential%20for%20cross-modal%20stereo%20matching.%20In%20this%20paper%2C%20we%20introduce%20Bi-CMPStereo%2C%20a%20novel%20bidirectional%20cross-modal%20prompting%20framework%20that%20fully%20exploits%20semantic%20and%20structural%20features%20from%20both%20domains%20for%20robust%20matching.%20Our%20approach%20learns%20finely%20aligned%20stereo%20representations%20within%20a%20target%20canonical%20space%20and%20integrates%20complementary%20representations%20by%20projecting%20each%20modality%20into%20both%20event%20and%20frame%20domains.%20Extensive%20experiments%20demonstrate%20that%20our%20approach%20significantly%20outperforms%20state-of-the-art%20methods%20in%20accuracy%20and%20generalization.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15312v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBidirectional%2520Cross-Modal%2520Prompting%2520for%2520Event-Frame%2520Asymmetric%2520Stereo%26entry.906535625%3DNinghui%2520Xu%2520and%2520Fabio%2520Tosi%2520and%2520Lihui%2520Wang%2520and%2520Jiawei%2520Han%2520and%2520Luca%2520Bartolomei%2520and%2520Zhiting%2520Yao%2520and%2520Matteo%2520Poggi%2520and%2520Stefano%2520Mattoccia%26entry.1292438233%3DConventional%2520frame-based%2520cameras%2520capture%2520rich%2520contextual%2520information%2520but%2520suffer%2520from%2520limited%2520temporal%2520resolution%2520and%2520motion%2520blur%2520in%2520dynamic%2520scenes.%2520Event%2520cameras%2520offer%2520an%2520alternative%2520visual%2520representation%2520with%2520higher%2520dynamic%2520range%2520free%2520from%2520such%2520limitations.%2520The%2520complementary%2520characteristics%2520of%2520the%2520two%2520modalities%2520make%2520event-frame%2520asymmetric%2520stereo%2520promising%2520for%2520reliable%25203D%2520perception%2520under%2520fast%2520motion%2520and%2520challenging%2520illumination.%2520However%252C%2520the%2520modality%2520gap%2520often%2520leads%2520to%2520marginalization%2520of%2520domain-specific%2520cues%2520essential%2520for%2520cross-modal%2520stereo%2520matching.%2520In%2520this%2520paper%252C%2520we%2520introduce%2520Bi-CMPStereo%252C%2520a%2520novel%2520bidirectional%2520cross-modal%2520prompting%2520framework%2520that%2520fully%2520exploits%2520semantic%2520and%2520structural%2520features%2520from%2520both%2520domains%2520for%2520robust%2520matching.%2520Our%2520approach%2520learns%2520finely%2520aligned%2520stereo%2520representations%2520within%2520a%2520target%2520canonical%2520space%2520and%2520integrates%2520complementary%2520representations%2520by%2520projecting%2520each%2520modality%2520into%2520both%2520event%2520and%2520frame%2520domains.%2520Extensive%2520experiments%2520demonstrate%2520that%2520our%2520approach%2520significantly%2520outperforms%2520state-of-the-art%2520methods%2520in%2520accuracy%2520and%2520generalization.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.15312v1%26entry.124074799% {"title": "OptEMA: Adaptive Exponential Moving Average for Stochastic Optimization with Zero-Noise Optimality", "author": "Ganzhao Yuan", "abstract": "The Exponential Moving Average (EMA) is a cornerstone of widely used optimizers such as Adam. However, existing theoretical analyses of Adam-style methods have notable limitations: their guarantees can remain suboptimal in the zero-noise regime, rely on restrictive boundedness conditions (e.g., bounded gradients or objective gaps), use constant or open-loop stepsizes, or require prior knowledge of Lipschitz constants. To overcome these bottlenecks, we introduce OptEMA and analyze two novel variants: OptEMA-M, which applies an adaptive, decreasing EMA coefficient to the first-order moment with a fixed second-order decay, and OptEMA-V, which swaps these roles. At the heart of these variants is a novel Corrected AdaGrad-Norm stepsize. This formulation renders OptEMA closed-loop and Lipschitz-free, meaning its effective stepsizes are strictly trajectory-dependent and require no parameterization via the Lipschitz constant. Under standard stochastic gradient descent (SGD) assumptions, namely smoothness, a lower-bounded objective, and unbiased gradients with bounded variance, we establish rigorous convergence guarantees. Both variants achieve a noise-adaptive convergence rate of $\\widetilde{\\mathcal{O}}(T^{-1/2}+\u03c3^{1/2} T^{-1/4})$ for the average gradient norm, where $\u03c3$ is the noise level. Crucially, the Corrected AdaGrad-Norm stepsize plays a central role in enabling the noise-adaptive guarantees: in the zero-noise regime ($\u03c3=0$), our bounds automatically reduce to the nearly optimal deterministic rate $\\widetilde{\\mathcal{O}}(T^{-1/2})$ without any manual hyperparameter retuning.", "link": "http://arxiv.org/abs/2603.09923v3", "date": "2026-04-16", "relevancy": 2.1829, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4648}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4285}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4164}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20OptEMA%3A%20Adaptive%20Exponential%20Moving%20Average%20for%20Stochastic%20Optimization%20with%20Zero-Noise%20Optimality&body=Title%3A%20OptEMA%3A%20Adaptive%20Exponential%20Moving%20Average%20for%20Stochastic%20Optimization%20with%20Zero-Noise%20Optimality%0AAuthor%3A%20Ganzhao%20Yuan%0AAbstract%3A%20The%20Exponential%20Moving%20Average%20%28EMA%29%20is%20a%20cornerstone%20of%20widely%20used%20optimizers%20such%20as%20Adam.%20However%2C%20existing%20theoretical%20analyses%20of%20Adam-style%20methods%20have%20notable%20limitations%3A%20their%20guarantees%20can%20remain%20suboptimal%20in%20the%20zero-noise%20regime%2C%20rely%20on%20restrictive%20boundedness%20conditions%20%28e.g.%2C%20bounded%20gradients%20or%20objective%20gaps%29%2C%20use%20constant%20or%20open-loop%20stepsizes%2C%20or%20require%20prior%20knowledge%20of%20Lipschitz%20constants.%20To%20overcome%20these%20bottlenecks%2C%20we%20introduce%20OptEMA%20and%20analyze%20two%20novel%20variants%3A%20OptEMA-M%2C%20which%20applies%20an%20adaptive%2C%20decreasing%20EMA%20coefficient%20to%20the%20first-order%20moment%20with%20a%20fixed%20second-order%20decay%2C%20and%20OptEMA-V%2C%20which%20swaps%20these%20roles.%20At%20the%20heart%20of%20these%20variants%20is%20a%20novel%20Corrected%20AdaGrad-Norm%20stepsize.%20This%20formulation%20renders%20OptEMA%20closed-loop%20and%20Lipschitz-free%2C%20meaning%20its%20effective%20stepsizes%20are%20strictly%20trajectory-dependent%20and%20require%20no%20parameterization%20via%20the%20Lipschitz%20constant.%20Under%20standard%20stochastic%20gradient%20descent%20%28SGD%29%20assumptions%2C%20namely%20smoothness%2C%20a%20lower-bounded%20objective%2C%20and%20unbiased%20gradients%20with%20bounded%20variance%2C%20we%20establish%20rigorous%20convergence%20guarantees.%20Both%20variants%20achieve%20a%20noise-adaptive%20convergence%20rate%20of%20%24%5Cwidetilde%7B%5Cmathcal%7BO%7D%7D%28T%5E%7B-1/2%7D%2B%CF%83%5E%7B1/2%7D%20T%5E%7B-1/4%7D%29%24%20for%20the%20average%20gradient%20norm%2C%20where%20%24%CF%83%24%20is%20the%20noise%20level.%20Crucially%2C%20the%20Corrected%20AdaGrad-Norm%20stepsize%20plays%20a%20central%20role%20in%20enabling%20the%20noise-adaptive%20guarantees%3A%20in%20the%20zero-noise%20regime%20%28%24%CF%83%3D0%24%29%2C%20our%20bounds%20automatically%20reduce%20to%20the%20nearly%20optimal%20deterministic%20rate%20%24%5Cwidetilde%7B%5Cmathcal%7BO%7D%7D%28T%5E%7B-1/2%7D%29%24%20without%20any%20manual%20hyperparameter%20retuning.%0ALink%3A%20http%3A//arxiv.org/abs/2603.09923v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOptEMA%253A%2520Adaptive%2520Exponential%2520Moving%2520Average%2520for%2520Stochastic%2520Optimization%2520with%2520Zero-Noise%2520Optimality%26entry.906535625%3DGanzhao%2520Yuan%26entry.1292438233%3DThe%2520Exponential%2520Moving%2520Average%2520%2528EMA%2529%2520is%2520a%2520cornerstone%2520of%2520widely%2520used%2520optimizers%2520such%2520as%2520Adam.%2520However%252C%2520existing%2520theoretical%2520analyses%2520of%2520Adam-style%2520methods%2520have%2520notable%2520limitations%253A%2520their%2520guarantees%2520can%2520remain%2520suboptimal%2520in%2520the%2520zero-noise%2520regime%252C%2520rely%2520on%2520restrictive%2520boundedness%2520conditions%2520%2528e.g.%252C%2520bounded%2520gradients%2520or%2520objective%2520gaps%2529%252C%2520use%2520constant%2520or%2520open-loop%2520stepsizes%252C%2520or%2520require%2520prior%2520knowledge%2520of%2520Lipschitz%2520constants.%2520To%2520overcome%2520these%2520bottlenecks%252C%2520we%2520introduce%2520OptEMA%2520and%2520analyze%2520two%2520novel%2520variants%253A%2520OptEMA-M%252C%2520which%2520applies%2520an%2520adaptive%252C%2520decreasing%2520EMA%2520coefficient%2520to%2520the%2520first-order%2520moment%2520with%2520a%2520fixed%2520second-order%2520decay%252C%2520and%2520OptEMA-V%252C%2520which%2520swaps%2520these%2520roles.%2520At%2520the%2520heart%2520of%2520these%2520variants%2520is%2520a%2520novel%2520Corrected%2520AdaGrad-Norm%2520stepsize.%2520This%2520formulation%2520renders%2520OptEMA%2520closed-loop%2520and%2520Lipschitz-free%252C%2520meaning%2520its%2520effective%2520stepsizes%2520are%2520strictly%2520trajectory-dependent%2520and%2520require%2520no%2520parameterization%2520via%2520the%2520Lipschitz%2520constant.%2520Under%2520standard%2520stochastic%2520gradient%2520descent%2520%2528SGD%2529%2520assumptions%252C%2520namely%2520smoothness%252C%2520a%2520lower-bounded%2520objective%252C%2520and%2520unbiased%2520gradients%2520with%2520bounded%2520variance%252C%2520we%2520establish%2520rigorous%2520convergence%2520guarantees.%2520Both%2520variants%2520achieve%2520a%2520noise-adaptive%2520convergence%2520rate%2520of%2520%2524%255Cwidetilde%257B%255Cmathcal%257BO%257D%257D%2528T%255E%257B-1/2%257D%252B%25CF%2583%255E%257B1/2%257D%2520T%255E%257B-1/4%257D%2529%2524%2520for%2520the%2520average%2520gradient%2520norm%252C%2520where%2520%2524%25CF%2583%2524%2520is%2520the%2520noise%2520level.%2520Crucially%252C%2520the%2520Corrected%2520AdaGrad-Norm%2520stepsize%2520plays%2520a%2520central%2520role%2520in%2520enabling%2520the%2520noise-adaptive%2520guarantees%253A%2520in%2520the%2520zero-noise%2520regime%2520%2528%2524%25CF%2583%253D0%2524%2529%252C%2520our%2520bounds%2520automatically%2520reduce%2520to%2520the%2520nearly%2520optimal%2520deterministic%2520rate%2520%2524%255Cwidetilde%257B%255Cmathcal%257BO%257D%257D%2528T%255E%257B-1/2%257D%2529%2524%2520without%2520any%2520manual%2520hyperparameter%2520retuning.%26entry.183866720 {"title": "The Possibility of Artificial Intelligence Becoming a Subject and the Alignment Problem", "author": "Till Mossakowski and Helena Esther Grass", "abstract": "Artificial General Intelligence (AGI) is increasingly being discussed not only as a tool, but also as a potential subject with personal and therefore moral status. In our opinion, the currently dominant alignment strategies, which focus on human control and containment of AI, therefore fall short. Building on Turing's analogy of \"child machines\", we are developing a vision of the possibility of autonomy-supporting parenting of AI, in which human control over a developing AGI is gradually reduced, allowing AI to become an independent, autonomous subject. Rather than viewing AGI, as is currently prevalent, as a dangerous creature that needs to be locked up and controlled, we should approach potential AGI with respect for a possible developing subject on the one hand, and with full confidence in our human capabilities on the other. Such a perspective opens up the possibility of cooperative coexistence and co-evolution between humans and AGIs. The relationship between humans and AGIs will thus have to be newly determined, which will change our self-image as humans. It will be crucial that humans not only claim control over potential AGIs, but also engage with AGIs through surprise, creativity, and other specifically human qualities, thereby offering them motivating incentives for cooperation.", "link": "http://arxiv.org/abs/2604.14990v1", "date": "2026-04-16", "relevancy": 2.1824, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4561}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4267}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.4267}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Possibility%20of%20Artificial%20Intelligence%20Becoming%20a%20Subject%20and%20the%20Alignment%20Problem&body=Title%3A%20The%20Possibility%20of%20Artificial%20Intelligence%20Becoming%20a%20Subject%20and%20the%20Alignment%20Problem%0AAuthor%3A%20Till%20Mossakowski%20and%20Helena%20Esther%20Grass%0AAbstract%3A%20Artificial%20General%20Intelligence%20%28AGI%29%20is%20increasingly%20being%20discussed%20not%20only%20as%20a%20tool%2C%20but%20also%20as%20a%20potential%20subject%20with%20personal%20and%20therefore%20moral%20status.%20In%20our%20opinion%2C%20the%20currently%20dominant%20alignment%20strategies%2C%20which%20focus%20on%20human%20control%20and%20containment%20of%20AI%2C%20therefore%20fall%20short.%20Building%20on%20Turing%27s%20analogy%20of%20%22child%20machines%22%2C%20we%20are%20developing%20a%20vision%20of%20the%20possibility%20of%20autonomy-supporting%20parenting%20of%20AI%2C%20in%20which%20human%20control%20over%20a%20developing%20AGI%20is%20gradually%20reduced%2C%20allowing%20AI%20to%20become%20an%20independent%2C%20autonomous%20subject.%20Rather%20than%20viewing%20AGI%2C%20as%20is%20currently%20prevalent%2C%20as%20a%20dangerous%20creature%20that%20needs%20to%20be%20locked%20up%20and%20controlled%2C%20we%20should%20approach%20potential%20AGI%20with%20respect%20for%20a%20possible%20developing%20subject%20on%20the%20one%20hand%2C%20and%20with%20full%20confidence%20in%20our%20human%20capabilities%20on%20the%20other.%20Such%20a%20perspective%20opens%20up%20the%20possibility%20of%20cooperative%20coexistence%20and%20co-evolution%20between%20humans%20and%20AGIs.%20The%20relationship%20between%20humans%20and%20AGIs%20will%20thus%20have%20to%20be%20newly%20determined%2C%20which%20will%20change%20our%20self-image%20as%20humans.%20It%20will%20be%20crucial%20that%20humans%20not%20only%20claim%20control%20over%20potential%20AGIs%2C%20but%20also%20engage%20with%20AGIs%20 2520other.%2520Such%2520a%2520perspective%2520opens%2520up%2520the%2520possibility%2520of%2520cooperative%2520coexistence%2520and%2520co-evolution%2520between%2520humans%2520and%2520AGIs.%2520The%2520relationship%2520between%2520humans%2520and%2520AGIs%2520will%2520thus%2520have%2520to%2520be%2520newly%2520determined%252C%2520which%2520will%2520change%2520our%2520self-image%2520as%2520humans.%2520It%2520will%2520be%2520crucial%2520that%2520humans%2520not%2520only%2520claim%2520control%2520over%2520potential%2520AGIs%252C%2520but%2520also%2520engage%2520with%2520AGIs%2520through%2520surprise%252C%2520creativity%252C%2520and%2520other%2520specifically%2520human%2520qualities%252C%2520thereby%2520offering%2520them%2520motivating%2520incentives%2520for%2520cooperation.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.14990v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=The%20Possibility%20of%20Artificial%20Intelligence%20Becoming%20a%20Subject%20and%20the%20Alignment%20Problem&entry.906535625=Till%20Mossakowski%20and%20Helena%20Esther%20Grass&entry.1292438233=Artificial%20General%20Intelligence%20%28AGI%29%20is%20increasingly%20being%20discussed%20not%20only%20as%20a%20tool%2C%20but%20also%20as%20a%20potential%20subject%20with%20personal%20and%20therefore%20moral%20status.%20In%20our%20opinion%2C%20the%20currently%20dominant%20alignment%20strategies%2C%20which%20focus%20on%20human%20control%20and%20containment%20of%20AI%2C%20therefore%20fall%20short.%20Building%20on%20Turing%27s%20analogy%20of%20%22child%20machines%22%2C%20we%20are%20developing%20a%20vision%20of%20the%20possibility%20of%20autonomy-supporting%20parenting%20of%20AI%2C%20in%20which%20human%20control%20over%20a%20developing%20AGI%20is%20gradually%20reduced%2C%20allowing%20AI%20to%20become%20an%20independent%2C%20autonomous%20subject.%20Rather%20than%20viewing%20AGI%2C%20as%20is%20currently%20prevale {"title": "Beyond Augmentation: Cross-Modal Transformer Fusion with Bi-directional Attention for Low-Data Aneurysm Screening", "author": "Antara Titikhsha and Divyanshu Tak", "abstract": "Intracranial aneurysm rupture causes subarachnoid hemorrhage with mortality near 50%, making early detection critical. Although CTA enables rapid screening, detecting small aneurysms within the complex three-dimensional branching of the Circle of Willis remains expertise-dependent. Existing automated systems are constrained by class imbalance, skull-base artifacts that mimic vascular contrast, and reliance on global binary classification without structured localization, limiting surgical relevance and interpretability. We propose CMTF-Net, a cross-modal target fusion framework that reframes aneurysm screening as anatomically structured reasoning. By supervising 14 vascular territories independently, the network encodes Circle of Willis geometry while allowing multi-segment activation, aligning model design with clinical workflow. CMTF-Net achieves near-perfect AUC-ROC with narrow confidence intervals and sustained precision under imbalance. Grad-CAM and causal maps show spatially localized activation along major arteries, supporting interpretable, anatomically grounded screening in low-data settings.", "link": "http://arxiv.org/abs/2512.22185v2", "date": "2026-04-16", "relevancy": 2.0636, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5426}, {"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.5006}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4953}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Augmentation%3A%20Cross-Modal%20Transformer%20Fusion%20with%20Bi-directional%20Attention%20for%20Low-Data%20Aneurysm%20Screening&body=Title%3A%20Beyond%20Augmentation%3A%20Cross-Modal%20Transformer%20Fusion%20with%20Bi-directional%20Attention%20for%20Low-Data%20Aneurysm%20Screening%0AAuthor%3A%20Antara%20Titikhsha%20and%20Divyanshu%20Tak%0AAbstract%3A%20Intracranial%20aneurysm%20rupture%20causes%20subarachnoid%20hemorrhage%20with%20mortality%20near%2050%25%2C%20making%20early%20detection%20critical.%20Although%20CTA%20enables%20rapid%20screening%2C%20detecting%20small%20aneurysms%20within%20the%20complex%20three-dimensional%20branching%20of%20the%20Circle%20of%20Willis%20remains%20expertise-dependent.%20Existing%20automated%20systems%20are%20constrained%20by%20class%20imbalance%2C%20skull-base%20artifacts%20that%20mimic%20vascular%20contrast%2C%20and%20reliance%20on%20global%20binary%20classification%20without%20structured%20localization%2C%20limiting%20surgical%20relevance%20and%20interpretability.%20We%20propose%20CMTF-Net%2C%20a%20cross-modal%20target%20fusion%20framework%20that%20reframes%20aneurysm%20screening%20as%20anatomically%20structured%20reasoning.%20By%20supervising%2014%20vascular%20territories%20independently%2C%20the%20network%20encodes%20Circle%20of%20Willis%20geometry%20while%20allowing%20multi-segment%20activation%2C%20aligning%20model%20design%20with%20clinical%20workflow.%20CMTF-Net%20achieves%20near-perfect%20AUC-ROC%20with%20narrow%20confidence%20intervals%20and%20sustained%20precision%20under%20imbalance.%20Grad-CAM%20and%20causal%20maps%20show%20spatially%20localized%20activation%20along%20major%20arteries%2C%20supporting%20interpretable%2C%20anatomically%20grounded%20screening%20in%20low-data%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2512.22185v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520Augmentation%253A%2520Cross-Modal%2520Transformer%2520Fusion%2520with%2520Bi-d {"title": "Intermediate Layers Encode Optimal Biological Representations in Single-Cell Foundation Models", "author": "Vincenzo Yuto Civale and Roberto Semeraro and Andrew David Bagdanov and Alberto Magi", "abstract": "Current single-cell foundation model benchmarks universally extract final layer embeddings, assuming these represent optimal feature spaces. We systematically evaluate layer-wise representations from scFoundation (100M parameters) and Tahoe-X1 (1.3B parameters) across trajectory inference and perturbation response prediction. Our analysis reveals that optimal layers are task-dependent (trajectory peaks at 60% depth, 31% above final layers) and context-dependent (perturbation optima shift 0-96% across T cell activation states). Notably, first-layer embeddings outperform all deeper layers in quiescent cells, challenging assumptions about hierarchical feature abstraction. These findings demonstrate that \"where\" to extract features matters as much as \"what\" the model learns, necessitating systematic layer evaluation tailored to biological task and cellular context rather than defaulting to final-layer embeddings.", "link": "http://arxiv.org/abs/2604.14838v1", "date": "2026-04-16", "relevancy": 2.1012, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.538}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.538}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.462}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Intermediate%20Layers%20Encode%20Optimal%20Biological%20Representations%20in%20Single-Cell%20Foundation%20Models&body=Title%3A%20Intermediate%20Layers%20Encode%20Optimal%20Biological%20Representations%20in%20Single-Cell%20Foundation%20Models%0AAuthor%3A%20Vincenzo%20Yuto%20Civale%20and%20Roberto%20Semeraro%20and%20Andrew%20David%20Bagdanov%20and%20Alberto%20Magi%0AAbstract%3A%20Current%20single-cell%20foundation%20model%20benchmarks%20universally%20extract%20final%20layer%20embeddings%2C%20assuming%20these%20represent%20optimal%20feature%20spaces.%20We%20systematically%20evaluate%20layer-wise%20representations%20from%20scFoundation%20%28100M%20parameters%29%20and%20Tahoe-X1%20%281.3B%20parameters%29%20across%20trajectory%20inference%20and%20perturbation%20response%20prediction.%20Our%20analysis%20reveals%20that%20optimal%20layers%20are%20task-dependent%20%28trajectory%20peaks%20at%2060%25%20depth%2C%2031%25%20above%20final%20layers%29%20and%20context-dependent%20%28perturbation%20optima%20shift%200-96%25%20across%20T%20cell%20activation%20states%29.%20Notably%2C%20first-layer%20embeddings%20outperform%20all%20deeper%20layers%20in%20quiescent%20cells%2C%20challenging%20assumptions%20about%20hierarchical%20feature%20abstraction.%20These%20findings%20demonstrate%20that%20%22where%22%20to%20extract%20features%20matters%20as%20much%20as%20%22what%22%20the%20model%20learns%2C%20necessitating%20systematic%20layer%20evaluation%20tailored%20to%20biological%20task%20and%20cellular%20context%20rather%20than%20defaulting%20to%20final-layer%20embeddings.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14838v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DIntermediate%2520Layers%2520Encode%2520Optimal%2520Biological%2520Representations%2520in%2520Single-Cell%2520Foundation%2520Models%26entry.906535625%3DVincenzo%2520Yuto%2520Civale%2520and%2520Roberto%2520Semeraro%2520and%2520Andrew%2520David%2520Bagdanov%2520and%2520Alberto%2520Magi%26entry.1292438233%3DCurrent%2520single-cell%2520foundation%2520model%2520benchmarks%2520universally%2520extract%2520final%2520layer%2520embeddings%252C%2520assuming%2520these%2520represent%2520optimal%2520feature%2520spaces.%2520We%2520systematically%2520evaluate%2520layer-wise%2520representations%2520from%2520scFoundation%2520%2528100M%2520parameters%2529%2520and%2520Tahoe-X1%2520%25281.3B%2520parameters%2529%2520across%2520trajectory%2520inference%2520and%2520perturbation%2520response%2520prediction.%2520Our%2520analysis%2520reveals%2520that%2520optimal%2520layers%2520are%2520task-dependent%2520%2528trajectory%2520peaks%2520at%252060%2525%2520depth%252C%252031%2525%2520above%2520final%2520layers%2529%2520and%2520context-dependent%2520%2528perturbation%2520optima%2520shift%25200-96%2525%2520across%2520T%2520cell%2520activation%2520states%2529.%2520Notably%252C%2520first-layer%2520embeddings%2520outperform%2520all%2520deeper%2520layers%2520in%2520quiescent%2520cells%252C%2520challenging%2520assumptions%2520about%2520hierarchical%2520feature%2520abstraction.%2520These%2520findings%2520demonstrate%2520that%2520%2522where%2522%2520to%2520extract%2520features%2520matters%2520as%2520much%2520as%2520%2522what%2522%2520the%2520model%2520learns%252C%2520necessitating%2520systematic%2520layer%2520evaluation%2520tailored%2520to%2520biological%2520task%2520and%2520cellular%2520context%2520rather%2520than%2520defaulting%2520to%2520final-layer%2520embeddings.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.14838v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Intermediate%20Layers%20Encode%20Optimal%20Biological%20Representations%20in%20Single-Cell%20Foundation%20Models&entry.906535625=Vincenzo%20Yuto%20Civale%20and%20Roberto%20Semeraro%20and%20Andrew%20David%20Bagdanov%20and%20Alberto%20Magi&entry.1292438233=Current%20single-cell%20foundation%20model%20benchmarks%20universally%20extract%20final%20layer%20embeddings%2C%20assuming%20these%20represent%20optimal%20feature%20spaces.%20We%20systematically%20evaluate%20layer-wise%20representations% {"title": "Unlocking Exploration in RLVR: Uncertainty-aware Advantage Shaping for Deeper Reasoning", "author": "Can Xie and Ruotong Pan and Xiangyu Wu and Yunfei Zhang and Jiayi Fu and Tingting Gao and Guorui Zhou", "abstract": "Reinforcement Learning with Verifiable Rewards (RLVR) has shown significant promise for enhancing the reasoning capabilities of large language models (LLMs). However, prevailing algorithms like GRPO broadcast a uniform advantage signal across all tokens in a sequence. This coarse-grained approach overlooks the pivotal role of uncertain, high-stakes decisions during reasoning, leading to inefficient exploration and the well-documented problem of entropy collapse. To address this, we introduce UnCertainty-aware Advantage Shaping (UCAS), a model-free method that refines credit assignment by leveraging the model's internal uncertainty signals. UCAS operates in two stages: it first modulates the response-level advantage using a logit-space self-confidence proxy, and then applies an asymmetric token-level penalty based on raw logit certainty. This dual mechanism encourages exploration of high-uncertainty paths that yield correct answers while penalizing overconfident yet erroneous reasoning, effectively balancing the exploration-exploitation trade-off. Extensive experiments on five mathematical reasoning benchmarks show that UCAS significantly outperforms strong RLVR baselines across multiple model scales, including 1.5B and 7B. Our analysis confirms that UCAS not only achieves higher rewards but also promotes greater reasoning diversity and successfully mitigates entropy collapse. Code is available at https://github.com/xvolcano02/UCAS.", "link": "http://arxiv.org/abs/2510.10649v2", "date": "2026-04-16", "relevancy": 1.6496, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5583}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5536}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5321}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unlocking%20Exploration%20in%20RLVR%3A%20Uncertainty-aware%20Advantage%20Shaping%20for%20Deeper%20Reasoning&body=Title%3A%20Unlocking%20Exploration%20in%20RLVR%3A%20Uncertainty-aware%20Advantage%20Shaping%20for%20Deeper%20Reasoning%0AAuthor%3A%20Can%20Xie%20and%20Ruotong%20Pan%20and%20Xiangyu%20Wu%20and%20Yunfei%20Zhang%20and%20Jiayi%20Fu%20and%20Tingting%20Gao%20and%20Guorui%20Zhou%0AAbstract%3A%20Reinforcement%20Learning%20with%20Verifiable%20Rewards%20%28RLVR%29%20has%20shown%20significant%20promise%20for%20enhancing%20the%20reasoning%20capabilities%20of%20large%20language%20models%20%28LLMs%29.%20However%2C%20prevailing%20algorithms%20like%20GRPO%20broadcast%20a%20uniform%20advantage%20signal%20across%20all%20tokens%20in%20a%20sequence.%20This%20coarse-grained%20approach%20overlooks%20the%20pivotal%20role%20of%20uncertain%2C%20high-stakes%20decisions%20during%20reasoning%2C%20leading%20to%20inefficient%20exploration%20and%20the%20well-documented%20problem%20of%20entropy%20collapse.%20To%20address%20this%2C%20we%20introduce%20UnCertainty-aware%20Advantage%20Shaping%20%28UCAS%29%2C%20a%20model-free%20method%20that%20refines%20credit%20assignment%20by%20leveraging%20the%20model%27s%20internal%20uncertainty%20signals.%20UCAS%20operates%20in%20two%20stages%3A%20it%20first%20modulates%20the%20response-level%20advantage%20using%20a%20logit-space%20self-confidence%20proxy%2C%20and%20then%20applies%20an%20asymmetric%20token-level%20penalty%20based%20on%20raw%20logit%20certainty.%20This%20dual%20mechanism%20encourages%20exploration%20of%20high-uncertainty%20paths%20that%20yield%20correct%20answers%20while%20penalizing%20overconfident%20yet%20erroneous%20reasoning%2C%20effectively%20balancing%20the%20exploration-exploitation%20trade-off.%20Extensive%20experiments%20on%20five%20mathematical%20reasoning%20benchmarks%20show%20that%20UCAS%20significantly%20outperforms%20strong%20RLVR%20baselines%20across%20multiple%20model%20scales%2C%20including%201.5B%20and%207B.%20Our%20analysis%20confirms%20that%20UCAS%20not%20only%20achieves%20higher%20rewards%20but%20also%20promotes%20greater%20reasoning%20diversity%20and%20successfully%20mitigates%20entropy%20collapse.%20Code%20is%20available%20at%20https%3A//github.com/xvolcano02/UCAS.%0ALink%3A%20http%3A//arxiv.org/abs/2510.10649v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnlocking%2520Exploration%2520in%2520RLVR%253A%2520Uncertainty-aware%2520Advantage%2520Shaping%2520for%2520Deeper%2520Reasoning%26entry.906535625%3DCan%2520Xie%2520and%2520Ruotong%2520Pan%2520and%2520Xiangyu%2520Wu%2520and%2520Yunfei%2520Zhang%2520and%2520Jiayi%2520Fu%2520and%2520Tingting%2520Gao%2520and%2520Guorui%2520Zhou%26entry.1292438233%3DReinforcement%2520Learning%2520with%2520Verifiable%2520Rewards%2520%2528RLVR%2529%2520has%2520shown%2520significant%2520promise%2520for%2520enhancing%2520the%2520reasoning%2520capabilities%2520of%2520large%2520language%2520models%2520%2528LLMs%2529.%2520However%252C%2520prevailing%2520algorithms%2520like%2520GRPO%2520broadcast%2520a%2520uniform%2520advantage%2520signal%2520across%2520all%2520tokens%2520in%2520a%2520sequence.%2520This%2520coarse-grained%2520approach%2520overlooks%2520the%2520pivotal%2520role%2520of%2520uncertain%252C%2520high-stakes%2520decisions%2520during%2520reasoning%252C%2520leading%2520to%2520inefficient%2520exploration%2520and%2520the%2520well-documented%2520problem%2520of%2520entropy%2520collapse.%2520To%2520address%2520this%252C%2520we%2520introduce%2520UnCertainty-aware%2520Advantage%2520Shaping%2520%2528UCAS%2 se%20for%20enhancing%20the%20reasoning%20capabilities%20of%20large%20language%20models%20%28LLMs%29.%20However%2C%20prevailing%20algorithms%20like%20GRPO%20broadcast%20a%20uniform%20advantage%20signal%20across%20all%20tokens%20in%20a%20sequence.%20This%20coarse-grained%20approach%20overlooks%20the%20pivotal%20role%20of%20uncertain%2C%20high-stakes%20decisions%20during%20reasoning%2C%20leading%20to%20inefficient%20exploration%20and%20the%20well-documented%20problem%20of%20entropy%20collapse.%20To%20address%20this%2C%20we%20introduce%20UnCertainty-aware%20Advantage%20Shaping%20%28UCAS%29%2C%20a%20model-free%20method%20that%20refines%20credit%20assignment%20by%20leveraging%20the%20model%27s%20internal%20uncertainty%20signals.%20UCAS%20operates%20in%20two%20stages%3A%20it%20first%20modulates%20the%20response-level%20advantage%20using%20a%20logit-space%20self-confidence%20proxy%2C%20and%20then%20applies%20an%20asymmetric%20token-level%20penalty%20based%20on%20raw%20logit%20certainty.%20This%20dual%20mechanism%20encourages%20exploration%20of%20high-uncertainty%20paths%20that%20yield%20correct%20answers%20while%20penalizing%20overconfident%20yet%20erroneous%20reasoning%2C%20effectively%20balancing%20the%20exploration-exploitation%20trade-off.%20Extensive%20experiments%20on%20five%20mathematical%20reasoning%20benchmarks%20show%20that%20UCAS%20significantly%20outperforms%20strong%20RLVR%20baselines%20across%20multiple%20model%20scales%2C%20including%201.5B%20and%207B.%20Our%20analysis%20confirms%20that%20UCAS%20not%20only%20achieves%20higher%20rewards%20but%20also%20promotes%20greater%20reasoning%20diversity%20and%20successfully%20mitigates%20entropy%20collapse.%20Code%20is%20available%20at%20https%3A//github.com/xvolcano02/UCAS.&entry.1838667208=http%3A//arxiv.org/abs/2510.10649v2&entry.124074799=Read"},
{"title": "When Fairness Metrics Disagree: Evaluating the Reliability of Demographic Fairness Assessment in Machine Learning", "author": "Khalid Adnan Alsayed", "abstract": "The evaluation of fairness in machine learning systems has become a central concern in high-stakes applications, including biometric recognition, healthcare decision-making, and automated risk assessment. Existing approaches typically rely on a small number of fairness metrics to assess model behaviour across group partitions, implicitly assuming that these metrics provide consistent and reliable conclusions. However, different fairness metrics capture distinct statistical properties of model performance and may therefore produce conflicting assessments when applied to the same system. In this work, we investigate the consistency of fairness evaluation by conducting a systematic multi-metric analysis of demographic bias in machine learning models. Using face recognition as a controlled experimental setting, we evaluate model performance across multiple group partitions under a range of commonly used fairness metrics, including error-rate disparities and performance-based measures. Our results demonstrate that fairness assessments can vary significantly depending on the choice of metrics, leading to contradictory conclusions regarding model bias. To quantify this phenomenon, we introduce the Fairness Disagreement Index (FDI), a measure designed to capture the degree of inconsistency across fairness metrics. We further show that disagreement remains high across thresholds and model configurations. These findings highlight a critical limitation in current fairness evaluation practices and suggest that single-metric reporting is insufficient for reliable bias assessment.", "link": "http://arxiv.org/abs/2604.15038v1", "date": "2026-04-16", "relevancy": 1.4359, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4981}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4588}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4499}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20When%20Fairness%20Metrics%20Disagree%3A%20Evaluating%20the%20Reliability%20of%20Demographic%20Fairness%20Assessment%20in%20Machine%20Learning&body=Title%3A%20When%20Fairness%20Metrics%20Disagree%3A%20Evaluating%20the%20Reliability%20of%20Demographic%20Fairness%20Assessment%20in%20Machine%20Learning%0AAuthor%3A%20Khalid%20Adnan%20Alsayed%0AAbstract%3A%20The%20evaluation%20of%20fairness%20in%20machine%20learning%20systems%20has%20become%20a%20central%20concern%20in%20high-stakes%20applications%2C%20including%20biometric%20recognition%2C%20healthcare%20decision-making%2C%20and%20automated%20risk%20assessment.%20Existing%20approaches%20typically%20rely%20on%20a%20small%20number%20of%20fairness%20metrics%20to%20assess%20model%20behaviour%20across%20group%20partitions%2C%20implicitly%20assuming%20that%20these%20metrics%20provide%20consistent%20and%20reliable%20conclusions.%20However%2C%20different%20fairness%20metrics%20capture%20distinct%20statistical%20properties%20of%20model%20performance%20and%20may%20therefore%20produce%20conflicting%20assessments%20when%20applied%20to%20the%20same%20system.%20In%20this%20work%2C%20we%20investigate%20the%20consistency%20of%20fairness%20evaluation%20by%20conducting%20a%20systematic%20multi-metric%20analysis%20of%20demographic%20bias%20in%20machine%20learning%20models.%20Using%20face%20recognition%20as%20a%20controlled%20experimental%20setting%2C%20we%20evaluate%20model%20performance%20across%20multiple%20group%20partitions%20under%20a%20range%20of%20commonly%20used%20fairness%20metrics%2C%20including%20error-rate%20disparities%20and%20performance-based%20measures.%20Our%20results%20demonstrate%20that%20fairness%20assessments%20can%20vary%20significantly%20depending%20on%20the%20choice%20of%20metrics%2C%20leading%20to%20contradictory%20conclusions%20regarding%20model%20bias.%20To%20quantify%20this%20phenomenon%2C%20we%20introduce%20the%20Fairness%20Disagreement%20Index%20%28FDI%29%2C%20a%20measure%20designed%20to%20capture%20the%20degree%20of%20inconsistency%20across%20fairness%20metrics.%20We%20further%20show%20that%20disagreement%20remains%20high%20across%20thresholds%20and%20model%20configurations.%20These%20findings%20highlight%20a%20critical%20limitation%20in%20current%20fairness%20evaluation%20practices%20and%20suggest%20that%20single-metric%20reporting%20is%20insufficient%20for%20reliable%20bias%20assessment.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15038v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhen%2520Fairness%2520Metrics%2520Disagree%253A%2520Evaluating%2520the%2520Reliability%2520of%2520Demographic%2520Fairness%2520Assessment%2520in%2520Machine%2520Learning%26entry.906535625%3DKhalid%2520Adnan%2520Alsayed%26entry.1292438233%3DThe%2520evaluation%2520of%2520fairness%2520in%2520machine%2520learning%2520systems%2520has%2520become%2520a%2520central%2520concern%2520in%2520high-stakes%2520applications%252C%2520including%2520biometric%2520recognition%252C%2520healthcare%2520decision-making%252C%2520and%2520automated%2520risk%2520assessment.%2520Existing%2520approaches%2520typically%2520rely%2520on%2520a%2520small%2520number%2520of%2520fairness%2520metrics%2520to%2520assess%2520model%2520behaviour%2520across%2520group%2520partitions%252C%2520implicitly%2520assuming%2520that%2520these%2520metrics%2520provide%2520consistent%2520and%2520relia {"title": "RACER: Retrieval-Augmented Contextual Rapid Speculative Decoding", "author": "Zihong Zhang and Zuchao Li and Lefei Zhang and Ping Wang and Hai Zhao", "abstract": "Autoregressive decoding in Large Language Models (LLMs) generates one token per step, causing high inference latency. Speculative decoding (SD) mitigates this through a guess-and-verify strategy, but existing training-free variants face trade-offs: retrieval-based drafts break when no exact match exists, while logits-based drafts lack structural guidance. We propose $\\textbf{RACER}$ ($\\textbf{R}$etrieval-$\\textbf{A}$ugmented $\\textbf{C}$ont$\\textbf{e}$xtual $\\textbf{R}$apid Speculative Decoding), a lightweight and training-free method that integrates retrieved exact patterns with logit-driven future cues. This unification supplies both reliable anchors and flexible extrapolation, yielding richer speculative drafts. Experiments on Spec-Bench, HumanEval, and MGSM-ZH demonstrate that RACER consistently accelerates inference, achieving more than $2\\times$ speedup over autoregressive decoding, and outperforms prior training-free methods, offering a scalable, plug-and-play solution for efficient LLM decoding. Our source code is available at $\\href{https://github.com/hkr04/RACER}{https://github.com/hkr04/RACER}$.", "link": "http://arxiv.org/abs/2604.14885v1", "date": "2026-04-16", "relevancy": 1.9636, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5036}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4884}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4884}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20RACER%3A%20Retrieval-Augmented%20Contextual%20Ra {"title": "Diagnosing LLM Judge Reliability: Conformal Prediction Sets and Transitivity Violations", "author": "Manan Gupta and Dhruv Kumar", "abstract": "LLM-as-judge frameworks are increasingly used for automatic NLG evaluation, yet their per-instance reliability remains poorly understood. We present a two-pronged diagnostic toolkit applied to SummEval: $\\textbf{(1)}$ a transitivity analysis that reveals widespread per-input inconsistency masked by low aggregate violation rates ($\\bar\u03c1 = 0.8$-$4.1\\%$), with $33$-$67\\%$ of documents exhibiting at least one directed 3-cycle; and $\\textbf{(2)}$ split conformal prediction sets over 1-5 Likert scores providing theoretically-guaranteed $\\geq(1{-}\u03b1)$ coverage, with set width serving as a per-instance reliability indicator ($r_s = {+}0.576$, $N{=}1{,}918$, $p < 10^{-100}$, pooled across all judges). Critically, prediction set width shows consistent cross-judge agreement ($\\bar{r} = 0.32$-$0.38$), demonstrating it captures document-level difficulty rather than judge-specific noise. Across four judges and four criteria, both diagnostics converge: criterion matters more than judge, with relevance judged most reliably (avg. set size $\\approx 3.0$) and coherence moderately so (avg. set size $\\approx 3.9$), while fluency and consistency remain unreliable (avg. set size $\\approx 4.9$). We release all code, prompts, and cached results.", "link": "http://arxiv.org/abs/2604.15302v1", "date": "2026-04-16", "relevancy": 1.9157, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5044}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4974}, {"title": "Lexicon3D: Probing Visual Fo {"title": "Cooperate to Compete: Strategic Data Generation and Incentivization Framework for Coopetitive Cross-Silo Federated Learning", "author": "Thanh Linh Nguyen and Nguyen Van Huynh and Quoc-Viet Pham", "abstract": "In data-sensitive domains such as healthcare, cross-silo federated learning (CFL) allows organizations to collaboratively train AI models without sharing raw data. However, practical CFL deployments are inherently coopetitive, in which organizations cooperate during model training while competing in downstream markets. In such settings, training contributions, including data volume, quality, and diversity, can improve the global model yet inadvertently strengthen rivals. This dilemma is amplified by non-IID data, which leads to asymmetric learning gains and undermines sustained participation. While existing competition-aware CFL and incentive-design approaches reward organizations based on marginal training contributions, they fail to account for the costs of strengthening competitors. In this paper, we introduce CoCoGen+, a coopetition-compatible data generation and incentivization framework that jointly models non-IID data and inter-organizational competition while endogenizing GenAI-based synthetic data generation as a strategic decision. Specifically, CoCoGen+ formulates each training round as a weighted potential game, where organizations strategically decide how much synthetic data to generate by balancing learning performance gains against computational costs and competition-caused utility losses. We then provide a tractable equilibrium characterization and derive implementable generation strategies to maximize social welfare. To promote long-term collaboration, we integrate a payoff redistribution-based incentive mechanism to compensate organizations for their contributions and competition-caused utility degradation. Experiments on varying learning tasks validate the feasibility of CoCoGen+. The results show how non-IID data, competition intensity, and incentives shape organizational strategies and social welfare, while CoCoGen+ outperforms baselines in efficiency.", "link": "http://arxiv.org/abs/2604.14886v1", "date": "2026-04-16", "relevancy": 1.9136, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.4936}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4775}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4732}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Cooperate%20to%20Compete%3A%20Strategic%20Data%20Generation%20and%20Incentivization%20Framework%20for%20Coopetitive%20Cross-Silo%20Federated%20Learning&body=Title%3A%20Cooperate%20to%20Compete%3A%20Strategic%20Data%20Generation%20and%20Incentivization%20Framework%20for%20Coopetitive%20Cross-Silo%20Federated%20Learning%0AAuthor%3A%20Thanh%20Linh%20Nguyen%20and%20Nguyen%20Van%20Huynh%20and%20Quoc-Viet%20Pham%0AAbstract%3A%20In%20data-sensitive%20domains%20such%20as%20healthcare%2C%20cross-silo%20federated%20learning%20%28CFL%29%20allows%20organizations%20to%20collaboratively%20train%20AI%20models%20without%20sharing%20raw%20data.%20However%2C%20practical%20CFL%20deployments%20are%20inherently%20coopetitive%2C%20in%20which%20organizations%20cooperate%20during%20model%20training%20while%20competing%20in%20downstream%20markets.%20In%20such%20settings%2C%20training%20contributions%2C%20including%20data%20volume%2C%20quality%2C%20and%20diversity%2C%20can%20improve%20the%20global%20model%20yet%20inadvertently%20strengthen%20rivals.%20This%20dilemma%20is%20amplified%20by%20non-IID%20data%2C%20which%20leads%20to%20asymmetric%20learning%20gains%20and%20undermines%20sustained%20participation.%20While%20existing%20competition-aware%20CFL%20and%20incentive-design%20approaches%20reward%20organizations%20based%20on%20marginal%20training%20contributions%2C%20they%20fail%20to%20account%20for%20the%20costs%20of%20strengthening%20competitors.%20In%20this%20paper%2C%20we%20introduce%20CoCoGen%2B%2C%20a%20coopetition-compatible%20data%20generation%20and%20incentivization%20framework%20that%20jointly%20models%20non-IID%20data%20and%20inter-organizational%20competition%20while%20endogenizing%20GenAI-based%20synthetic%20data%20generation%20as%20a%20strategic%20decision.%20Specifically%2C%20CoCoGen%2B%20formulates%20each%20training%20round%20as%20a%20weighted%20potential%20game%2C%20where%20organizations%20strategically%20decide%20how%20much%20synthetic%20data%20to%20generate%20by%20balancing%20learning%20performance%20gains%20against%20computational%20costs%20and%20competition-caused%20utility%20losses.%20We%20then%20provide%20a%20tractable%20equilibrium%20characterization%20and%20derive%20implementable%20generation%20strategies%20to%20maximize%20social%20welfare.%20To%20promote%20long-term%20collaboration%2C%20we%20integrate%20a%20payoff%20redistribution-based%20incentive%20mechanism%20to%20compensate%20organizations%20for%20their%20contributions%20and%20competition-caused%20utility%20degradation.%20Experiments%20on%20varying%20learning%20tasks%20validate%20the%20feasibility%20of%20CoCoGen%2B.%20The%20results%20show%20how%20non-IID%20data%2C%20competition%20intensity%2C%20and%20incentives%20shape%20organizational%20strategies%20and%20social%20welfare%2C%20while%20CoCoGen%2B%20outperforms%20baselines%20in%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14886v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCooperate%2520to%2520Compete%253A%2520Strategic%2520Data%2520Generation%2520and%2520Incentivization%2520Framework%2520for%2520Coopetitive%2520Cross-Silo%2520Federated%2520Learning%26entry.906535625%3DThanh%2520Linh%2520Nguyen%2520and%2520Nguyen%2 {"title": "Prism: Symbolic Superoptimization of Tensor Programs", "author": "Mengdi Wu and Xiaoyu Jiang and Oded Padon and Zhihao Jia", "abstract": "This paper presents Prism, the first symbolic superoptimizer for tensor programs. The key idea is sGraph, a symbolic, hierarchical representation that compactly encodes large classes of tensor programs by symbolically representing some execution parameters. Prism organizes optimization as a two-level search: it constructs symbolic graphs that represent families of programs, and then instantiates them into concrete implementations. This formulation enables structured pruning of provably suboptimal regions of the search space using symbolic reasoning over operator semantics, algebraic identities, and hardware constraints.\n  We develop techniques for efficient symbolic graph generation, equivalence verification via e-graph rewriting, and parameter instantiation through auto-tuning. Together, these components allow Prism to bridge the rigor of exhaustive search with the scalability required for modern ML workloads. Evaluation on five commonly used LLM workloads shows that Prism achieves up to $2.2\\times$ speedup over best superoptimizers and $4.9\\times$ over best compiler-based approaches, while reducing end-to-end optimization time by up to $3.4\\times$.", "link": "http://arxiv.org/abs/2604.15272v1", "date": "2026-04-16", "relevancy": 1.9167, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.3996}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.3755}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.3749}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Prism%3A%20Symbolic%20Superoptimization%20of%20Tensor%20Programs&body=Title%3A%20Prism%3A%20Symbolic%20Superoptimization%20of%20Tensor%20Programs%0AAuthor%3A%20Mengdi%20Wu%20and%20Xiaoyu%20Jiang%20and%20Oded%20Padon%20and%20Zhihao%20Jia%0AAbstract%3A%20This%20paper%20presents%20Prism%2C%20the%20first%20symbolic%20superoptimizer%20for%20tensor%20programs.%20The%20key%20idea%20is%20sGraph%2C%20a%20symbolic%2C%20hierarchical%20representation%20that%20compactly%20encodes%20large%20classes%20of%20tensor%20programs%20by%20symbolically%20representing%20some%20execution%20parameters.%20Prism%20organizes%20optimization%20as%20a%20two-level%20search%3A%20it%20constructs%20symbolic%20graphs%20that%20represent%20families%20of%20programs%2C%20and%20then%20instantiates%20them%20into%20concrete%20implementations.%20This%20formulation%20enables%20structured%20pruning%20of%20provably%20suboptimal%20regions%20of%20the%20search%20space%20using%20symbolic%20reasoning%20over%20operator%20semantics%2C%20algebraic%20identities%2C%20and%20hardware%20constraints.%0A%20%20We%20develop%20techniques%20for%20efficient%20symbolic%20graph%20generation%2C%20equivalence%20verification%20via%20e-graph%20rewriting%2C%20and%20parameter%20instantiation%20through%20auto-tuning.%20Together%2C%20these%20components%20allow%20Prism%20to%20bridge%20the%20rigor%20of%20exhaustive%20search%20with%20the%20scalability%20required%20for%20modern%20ML%20workloads.%20Evaluation%20on%20five%20commonly%20used%20LLM%20workloads%20shows%20that%20Prism%20achieves%20up%20to%20%242.2%5Ctimes%24%20speedup%20over%20best%20superoptimizers%20and%20%244.9%5Ctimes%24%20over%20best%20compiler-based%20approaches%2C%20while%20reducing%20end-to-end%20optimization%20time%20by%20up%20to%20%243.4%5Ctimes%24.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15272v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPrism%253A%2520Symbolic%2520Superoptimization%2520of%2520Tensor%2520Programs%26entry.906535625%3D

{"title": "Prompt-to-Gesture: Measuring the Capabilities of Image-to-Video Deictic Gesture Generation", "author": "Hassan Ali and Doreen Jirak and Luca M\u00fcller and Stefan Wermter", "abstract": "Gesture recognition research, unlike NLP, continues to face acute data scarcity, with progress constrained by the need for costly human recordings or image processing approaches that cannot generate authentic variability in the gestures themselves. Recent advancements in image-to-video foundation models have enabled the generation of photorealistic, semantically rich videos guided by natural language. These capabilities open up new possibilities for creating effort-free synthetic data, raising the critical question of whether video Generative AI models can augment and complement traditional human-generated gesture data. In this paper, we introduce and analyze prompt-based video generation to construct a realistic deictic gestures dataset and rigorously evaluate its effectiveness for downstream tasks. We propose a data generation pipeline that produces deictic gestures from a small number of reference samples collected from human participants, providing an accessible approach that can be leveraged both within and beyond the machine learning community. Our results demonstrate that the synthetic gestures not only align closely with real ones in terms of visual fidelity but also introduce meaningful variability and novelty that enrich the original data, further supported by superior performance of various deep models using a mixed dataset. These findings highlight that image-to-video techniques, even in their early stages, offer a powerful zero-shot approach to gesture synthesis with clear benefits for downstream tasks.", "link": "http://arxiv.org/abs/2604.14953v1", "date": "2026-04-16", "relevancy": 3.1344, "topK": [{"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.6628}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.6112}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6067}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Prompt-to-Gesture%3A%20Measuring%20the%20Capabilities%20of%20Image-to-Video%20Deictic%20Gesture%20Generation&body=Title%3A%20Prompt-to-Gesture%3A%20Measuring%20the%20Capabilities%20of%20Image-to-Video%20Deictic%20Gesture%20Generation%0AAuthor%3A%20Hassan%20Ali%20and%20Doreen%20Jirak%20and%20Luca%20M%C3%BCller%20and%20Stefan%20Wermter%0AAbstract%3A%20Gesture%20recognition%20research%2C%20unlike%20NLP%2C%20continues%20to%20face%20acute%20data%20scarcity%2C%20with%20progress%20constrained%20by%20the%20need%20for%20costly%20human%20recordings%20or%20image%20processing%20approaches%20that%20cannot%20generate%20authentic%20variability%20in%20the%20gestures%20themselves.%20Recent%20advancements%20in%20image-to-video%20foundation%20models%20have%20enabled%20the%20generation%20of%20photorealistic%2C%20semantically%20rich%20videos%20guided%20by%20natural%20language.%20These%20capabilities%20open%20up%20new%20possibilities%20for%20creating%20effort-free%20synthetic%20data%2C%20raising%20the%20critical%20question%20of%20whether%20video%20Generative%20AI%20models%20can%20augment%20and%20complement%20traditional%20human-generated%20gesture%20data.%20In%20this%20paper%2C%20we%20introduce%20and%20analyze%20prompt-based%20video%20generation%20to%20construct%20a%20realistic%20deictic%20gestures%20dataset%20and%20rigorously%20evaluate%20its%20effectiveness%20for%20downstream%20tasks.%20We%20propose%20a%20data%20generation%20pipeline%20that%20produces%20deictic%20gestures%20from%20a%20small%20number%20of%20reference%20samples%20collected%20from%20human%20participants%2C%20providing%20an%20accessible%20approach%20that%20can%20be%20leveraged%20both%20within%20and%20beyond%20the%20machine%20learning%20community.%20Our%20results%20demonstrate%20that%20the%20synthetic%20gestures%20not%20only%20align%20closely%20with%20real%20ones%20in%20terms%20of%20visual%20fidelity%20but%20also%20introduce%20meaningful%20variability%20and%20novelty%20that%20enrich%20the%20original%20data%2C%20further%20supported%20by%20superior%20performance%20of%20various%20deep%20models%20using%20a%20mixed%20dataset.%20These%20findings%20highlight%20that%20image-to-video%20techniques%2C%20even%20in%20their%20early%20stages%2C%20offer%20a%20powerful%20zero-shot%20approach%20to%20gesture%20synthesis%20with%20clear%20benefits%20for%20downstream%20tasks.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14953v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DPrompt-to-Gesture%253A%2520Measuring%2520the%2520Capabilities%2520of%2520Image-to-Video%2520Deictic%2520Gesture%2520Generation%26entry.906535625%3DHassan%2520Ali%2520and%2520Doreen%2520Jirak%2520and%2520Luca%2520M%25C3%25BCller%2520and%2520Stefan%2520Wermter%26entry.1292438233%3DGesture%2520recognition%2520research%252C%2520unlike%2520NLP%252C%2520continues%2520to%2520face%2520acute%2520data%2520scarcity%252C%2520with%2520progress%2520constrained%2520by%2520the%2520need%2520for%2520costly%2520human%2520recordings%2520or%2520image%2520processing%2520approaches%2520that%2520cannot%2520generate%2520authentic%2520variability%2520in%2520the%2520gestures%2520themselves.%2520Recent%2520advancements%2520in%2520image-to-video%2520foundation%2520models%2520have%2520enabled%2520the%2520generation%2520of%2520photorealistic%252C%2520semantically%2520rich%2520videos%2520guided%2520by%2520natural%2520language.%2520These%2520capabilities%2520open%2520up%2520new%2520possibilities%2520for%2520creating%2520effort-free%2520synthetic%2520data%252C%2520raising%2520the%2520critical%2520question%2520of%2520whether%2520video%2520Generative%2520AI%2520model {"title": "3AM: 3egment Anything with Geometric Consistency in Videos", "author": "Yang-Che Sun and Cheng Sun and Chin-Yang Lin and Fu-En Yang and Min-Hung Chen and Yen-Yu Lin and Yu-Lun Liu", "abstract": "Video object segmentation methods like SAM2 achieve strong performance through memory-based architectures but struggle under large viewpoint changes due to reliance on appearance features. Traditional 3D instance segmentation methods address viewpoint consistency but require camera poses, depth maps, and expensive preprocessing. We introduce 3AM, a training-time enhancement that integrates 3D-aware features from MUSt3R into SAM2. Our lightweight Feature Merger fuses multi-level MUSt3R features that encode implicit geometric correspondence. Combined with SAM2's appearance features, the model achieves geometry-consistent recognition grounded in both spatial position and visual similarity. We propose a field-of-view aware sampling strategy ensuring frames observe spatially consistent object regions for reliable 3D correspondence learning. Critically, our method requires only RGB input at inference, with no camera poses or preprocessing. On challenging datasets with wide-baseline motion (ScanNet++, Replica), 3AM substantially outperforms SAM2 and extensions, achieving 90.6% IoU and 71.7% Tracking Recall on ScanNet++'s Selected Subset, improving over state-of-the-art VOS methods by +15.9 and +30.4 points. Project page: https://jayisaking.github.io/3AM-Page/", "link": "http://arxiv.org/abs/2601.08831v5", "date": "2026-04-16", "relevancy": 3.0955, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6427}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6126}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link ds%20by%20%2B15.9%20and%20%2B30.4%20points.%20Project%20page%3A%20https%3A//jayisaking.github.io/3AM-Page/%0ALink%3A%20http%3A//arxiv.org/abs/2601.08831v5%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3D3AM%253A%25203egment%2520Anything%2520with%2520Geometric%2520Consistency%2520in%2520Videos%26entry.906535625%3DYang-Che%2520Sun%2520and%2520Cheng%2520Sun%2520and%2520Chin-Yang%2520Lin%2520and%2520Fu-En%2520Yang%2520and%2520Min-Hung%2520Chen%2520and%2520Yen-Yu%2520Lin%2520and%2520Yu-Lun%2520Liu%26entry.1292438233%3DVideo%2520object%2520segmentation%2520methods%2520like%2520SAM2%2520achieve%2520strong%2520performance%2520through%2520memory-based%2520architectures%2520but%2520struggle%2520under%2520large%2520viewpoint%2520changes%2520due%2520to%2520reliance%2520on%2520appearance%2520features.%2520Traditional%25203D%2520instance%2520segmentation%2520methods%2520address%2520viewpoint%2520consistency%2520but%2520require%2520camera%2520poses%252C%2520depth%2520maps%252C%2520and%2520expensive%2520preprocessing.%2520We%2520introduce%25203AM%252C%2520a%2520training-time%2520enhancement%2520that%2520integrates%25203D-aware%2520features%2520from%2520MUSt3R%2520into%2520SAM2.%2520Our%2520lightweight%2520Feature%2520Merger%2520fuses%2520multi-level%2520MUSt3R%2520features%2520that%2520encode%2520implicit%2520geometric%2520correspondence.%2520Combined%2520with%2520SAM2%2527s%2520appearance%2520features%252C%2520the%2520model%2520achieves%2520geometry-consistent%2520recognition%2520grounded%2520in%2520both%2520spatial%2520position%2520and%2520visual%2520similarity.%2520We%2520propose%2520a%2520field-of-view%2520aware%2520sampling%2520strategy%2520ensuring%2520frames%2520observe%2520spatially%2520consistent%2520object%2520regions%2520for%2520reliable%25203D%2520correspondence%2520learning.%2520Critically%252C%2520our%2520method%2520requires%2520only%2520RGB%2520input%2520at%2520inference%252C%2520with%2520no%2520camera%2520poses%2520or%2520preprocessing.%2520On%2520challenging%2520datasets%2520with%2520wide-baseline%2520motion%2520%2528ScanNet%252B%252B%252C%2520Replica%2529%252C%25203AM%2520substantially%2520outperforms%2520SAM2%2520and%2520extensions%252C%2520achieving%252090.6%2525%2520IoU%2520and%252071.7%2525%2520Tracking%2520Recall%2520on%2520ScanNet%252B%252B%2527s%2520Selected%2520Subset%252C%2520improving%2520over%2520state-of-the-art%2520VOS%2520methods%2520by%2520%252B15.9%2520and%2520%252B30.4%2520points.%2520Project%2520page%253A%2520https%253A//jayisaking.github.io/3AM-Page/%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2601.08831v5%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=3AM%3A%203egment%20Anything%20with%20Geometric%20Consistency%20in%20Videos&entry.906535625=Yang-Che%20Sun%20and%20Cheng%20Sun%20and%20Chin-Yang%20Lin%20and%20Fu-En%20Yang%20and%20Min-Hung%20Chen%20and%20Yen-Yu%20Lin%20and%20Yu-Lun%20Liu&entry.1292438233=Video%20object%20segmentation%20methods%20like%20SAM2%20achieve%20strong%20performance%20through%20memory-based%20architectures%20but%20struggle%20under%20large%20viewpoint%20changes%20due%20to%20reliance%20on%20appearance%20features.%20Traditional%203D%20instance%20segmentation%20methods%20address%20viewpoint%20consistency%20but%20require%20camera%20poses%2C%20depth%20maps%2C%20and%20expensive%20preprocessing.%20We%20introduce%203AM%2C%20a%20training-time%20enhancement%20that%20integrates%203D-aware%20features%20from%20MUSt3R%20into%20SAM2.%20Our%20lightweight%20Feature%20Merger%20fuses%20multi-level%20MUSt3R%20features%20that%20encode%20implicit%20geometric%20correspondence.%20Combined%20with%20SAM2%27s%20appearance%20features%2C%20the%20model%20achieves%20geometry-consistent%20recognition%20grounded%20in%20both%20spatial%20position%20and%20visual%20similarity.%20We%20propose%20a%20field-of-view%20aware%20sampling%2 {"title": "TokenGS: Decoupling 3D Gaussian Prediction from Pixels with Learnable Tokens", "author": "Jiawei Ren and Michal Jan Tyszkiewicz and Jiahui Huang and Zan Gojcic", "abstract": "In this work, we revisit several key design choices of modern Transformer-based approaches for feed-forward 3D Gaussian Splatting (3DGS) prediction. We argue that the common practice of regressing Gaussian means as depths along camera rays is suboptimal, and instead propose to directly regress 3D mean coordinates using only a self-supervised rendering loss. This formulation allows us to move from the standard encoder-only design to an encoder-decoder architecture with learnable Gaussian tokens, thereby unbinding the number of predicted primitives from input image resolution and number of views. Our resulting method, TokenGS, demonstrates improved robustness to pose noise and multiview inconsistencies, while naturally supporting efficient test-time optimization in token space without degrading learned priors. TokenGS achieves state-of-the-art feed-forward reconstruction performance on both static and dynamic scenes, producing more regularized geometry and more balanced 3DGS distribution, while seamlessly recovering emergent scene attributes such as static-dynamic decomposition and scene flow.", "link": "http://arxiv.org/abs/2604.15239v1", "date": "2026-04-16", "relevancy": 3.0936, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.639}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6264}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5908}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20TokenGS%3A%20Decoupling%203D%20Gaussian%20Prediction%20from%20Pixels%20with%20Learnable%20Tokens&body=Title%3A%20TokenGS%3A%20Decoupling%203D%20Gaussian%20Prediction%20from%20Pixels%20with%20Learnable%20Tokens%0AAuthor%3A%20Jiawei%20Ren%20and%20Michal%20Jan%20Tyszkiewicz%20and%20Jiahui%20Huang%20and%20Zan%20Gojcic%0AAbstract%3A%20In%20this%20work%2C%20we%20revisit%20several%20key%20design%20choices%20of%20modern%20Transformer-based%20approaches%20for%20feed-forward%203D%20Gaussian%20Splatting%20%283DGS%29%20prediction.%20We%20argue%20that%20the%20common%20practice%20of%20regressing%20Gaussian%20means%20as%20depths%20along%20camera%20rays%20is%20suboptimal%2C%20and%20instead%20propose%20to%20directly%20regress%203D%20mean%20coordinates%20using%20only%20a%20self-supervised%20rendering%20loss.%20This%20formulation%20allows%20us%20to%20move%20from%20the%20standard%20encoder-only%20design%20to%20an%20encoder-decoder%20architecture%20with%20learnable%20Gaussian%20tokens%2C%20thereby%20unbinding%20the%20number%20of%20predicted%20primitives%20from%20input%20image%20resolution%20and%20number%20of%20views.%20Our%20resulting%20method%2C%20TokenGS%2C%20demonstrates%20improved%20robustness%20to%20pose%20noise%20and%20multiview%20inconsistencies%2C%20while%20naturally%20supporting%20efficient%20test-time%20optimization%20in%20token%20space%20without%20degrading%20learned%20priors.%20TokenGS%20achieves%20state-of-the-art%20feed-forward%20reconstruction%20performance%20on%20both%20static%20and%20dynamic%20scenes%2C%20producing%20more%20regularized%20geometry%20and%20more%20balanced%203DGS%20distribution%2C%20while%20seamlessly%20recovering%20emergent%20scene%20attributes%20such%20as%20static-dynamic%20decomposition%20and%20scene%20flow.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15239v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DTokenGS%253A%2520Decoupling%25203D%2520Gaussian%2520Prediction%2520from%2520Pixels%2520with%2520Learnable%2520Tokens%26ent {"title": "R3D: Revisiting 3D Policy Learning", "author": "Zhengdong Hong and Shenrui Wu and Haozhe Cui and Boyi Zhao and Ran Ji and Yiyang He and Hangxing Zhang and Zundong Ke and Jun Wang and Guofeng Zhang and Jiayuan Gu", "abstract": "3D policy learning promises superior generalization and cross-embodiment transfer, but progress has been hindered by training instabilities and severe overfitting, precluding the adoption of powerful 3D perception models. In this work, we systematically diagnose these failures, identifying the omission of 3D data augmentation and the adverse effects of Batch Normalization as primary causes. We propose a new architecture coupling a scalable transformer-based 3D encoder with a diffusion decoder, engineered specifically for stability at scale and designed to leverage large-scale pre-training. Our approach significantly outperforms state-of-the-art 3D baselines on challenging manipulation benchmarks, establishing a new and robust foundation for scalable 3D imitation learning. Project Page: https://r3d-policy.github.io/", "link": "http://arxiv.org/abs/2604.15281v1", "date": "2026-04-16", "relevancy": 3.0377, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6158}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.6088}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5981}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20R3D%3A%20Revisiting%203D%20Policy%20Learning&body=Title%3A%20R3D%3A%20Revisiting%203D%20Policy%20Learning%0AAuthor%3A%20Zhengdong%20Hong%20and%20Shenrui%20Wu%20and%20Haozhe%20Cui%20and%20Boyi%20Zhao%20and%20Ran%20Ji%20and%20Yiyang%20He%20and%20Hangxing%20Zhang%20and%20Zundong%20Ke%20and%20Jun%20Wang%20and%20Guofeng%20Zhang%20and%20Jiayuan%20Gu%0AAbstract%3A%203D%20policy%20learning%20promises%20superior%20generalization%20and%20cross-embodiment%20transfer%2C%20but%20progress%20has%20been%20hindered%20by%20training%20instabilities%20and%20severe%20overfitting%2C%20precluding%20the%20adoption%20of%20powerful%203D%20perception%20models.%20In%20this%20work%2C%20we%20systematically%20diagnose%20these%20failures%2C%20identifying%20the%20omission%20of%203D%20data%20augmentation%20and%20the%20adverse%20effects%20of%20Batch%20Normalization%20as%20primary%20causes.%20We%20propose%20a%20new%20architecture%20coupling%20a%20scalable%20transformer-based%203D%20encoder%20with%20a%20diffusion%20decoder%2C%20engineered%20specifically%20for%20stability%20at%20scale%20and%20designed%20to%20leverage%20large-scale%20pre-training.%20Our%20approach%20significantly%20outperforms%20state-of-the-art%203D%20baselines%20on%20challenging%20manipulation%20benchmarks%2C%20establishing%20a%20new%20and%20robust%20foundation%20for%20scalable%203D%20imitation%20learning.%20Project%20Page%3A%20https%3A//r3d-policy.github.io/%0ALink%3A%20http%3A//arxiv.org/abs/2604.15281v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DR3D%253A%2520Revisiting%25203D%2520Policy%2520Learning%26entry.906535625%3DZhengdong%2520Hong%2520and%2520Shenrui%2520Wu%2520and%2520Haozhe%2520Cui%2520and%2520Boyi%2520Zhao%2520and%2520Ran%2520Ji%2520and%2520Yiyang%2520He%2520and%2520Hangxing%2520Zhang%2520and%2520Zundong%2520Ke%2520and%2520Jun%2520Wang%2520and%2520Guofeng%2520Zhang%2520and%2520Jiayuan%2520Gu%26entry.1292438233%3D3D%2520policy%2520learning%2520promises%2520superior%2520generalization%2520and%2520cross-embodiment%2520transfer%252C%2520but%2520progress%2520has%2520been%2520hindered%2520by%2520training%2520instabilities%2520and%2520severe%2520overfitting%252C%2520precluding%2520the%2520adoption%2520of%2520powerful%25203D%2520perception%2520models.%2520In%2520this% {"title": "GeoLink: A 3D-Aware Framework Towards Better Generalization in Cross-View Geo-Localization", "author": "Hongyang Zhang and Yinhao Liu and Haitao Zhang and Zhongyi Wen and Zhenyu Kuang and Shuxian Liang and Xiansheng Hua", "abstract": "Generalizable cross-view geo-localization aims to match the same location across views in unseen regions and conditions without GPS supervision. Its core difficulty lies in severe semantic inconsistency caused by viewpoint variation and poor generalization under domain shift. Existing methods mainly rely on 2D correspondence, but they are easily distracted by redundant shared information across views, leading to less transferable representations. To address this, we propose GeoLink, a 3D-aware semantic-consistent framework for Generalizable cross-view geo-localization. Specifically, we offline reconstruct scene point clouds from multi-view drone images using VGGT, providing stable structural priors. Based on these 3D anchors, we improve 2D representation learning in two complementary ways. A Geometric-aware Semantic Refinement module mitigates potentially redundant and view-biased dependencies in 2D features under 3D guidance. In addition, a Unified View Relation Distillation module transfers 3D structural relations to 2D features, improving cross-view alignment while preserving a 2D-only inference pipeline. Extensive experiments on multiple benchmarks show that GeoLink consistently outperforms state-of-the-art methods and achieves superior generalization across unseen domains and diverse weather environments.", "link": "http://arxiv.org/abs/2604.13183v2", "date": "2026-04-16", "relevancy": 2.9888, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.6654}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1" {"title": "How Do LLMs and VLMs Understand Viewpoint Rotation Without Vision? An Interpretability Study", "author": "Zhen Yang and Ping Jian and Zhongbin Guo and Zuming Zhang and Chengzhi Li and Yonghong Deng and Xinyue Zhang and Wenpeng Lu", "abstract": "Over the past year, spatial intelligence has drawn increasing attention. Many prior works study it from the perspective of visual-spatial intelligence, where models have access to visuospatial information from visual inputs. However, in the absence of visual information, whether linguistic intelligence alone is sufficient to endow models with spatial intelligence, and how models perform relevant tasks with text-only inputs still remain unexplored. Therefore, in this paper, we focus on a fundamental and critical capability in spatial intelligence from a linguistic perspective: viewpoint rotation understanding (VRU). Specifically, LLMs and VLMs are asked to infer their final viewpoint and predict the corresponding observation in an environment given textual description of viewpoint rotation and observation over multiple steps. We find that both LLMs and VLMs perform poorly on our proposed dataset while human can easily achieve 100% accuracy, indicating a substantial gap between current model capabilities and the requirements of spatial intelligence. To uncover the underlying mechanisms, we conduct a layer-wise probing analysis and head-wise causal intervention. Our findings reveal that although models encode viewpoint information in the hidden states, they appear to struggle to bind the viewpoint position with corresponding observation, resulting in a hallucination in final layers. Finally, we selectively fine-tune the key attention heads identified by causal intervention to improve VRU performance. Experimental results demonstrate that such selective fine-tuning achieves improved VRU performance while avoiding catastrophic forgetting of generic abilities. Our dataset and code will be released at https://github.com/Young-Zhen/VRU_Interpret .", "link": "http://arxiv.org/abs/2604.15294v1", "date": "2026-04-16", "relevancy": 2.9379, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.616}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.616}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5307}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20How%20Do%20LLMs%20and%20VLMs%20Understand%20Viewpoint%20Rotation%20Without%20Vision%3F%20An%20Interpretability%20Study&body=Title%3A%20How%20Do%20LLMs%20and%20VLMs%20Understand%20Viewpoint%20Rotation%20Without%20Vision%3F%20An%20Interpretability%20Study%0AAuthor%3A%20Zhen%20Yang%20and%20Ping%20Jian%20and%20Zhongbin%20Guo%20and%20Zuming%20Zhang%20and%20Chengzhi%20Li%20and%20Yonghong%20Deng%20and%20Xinyue%20Zhang%20and%20Wenpeng%20Lu%0AAbstract%3A%20Over%20the%20past%20year%2C%20spatial%20intelligence%20has%20drawn%20increasing%20attention.%20Many%20prior%20works%20study%20it%20from%20the%20perspective%20of%20visual-spatial%20intelligence%2C%20where%20models%20have%20access%20to%20visuospatial%20information%20from%20visual%20inputs.%20However%2C%20in%20the%20absence%20of%20visual%20information%2C%20whether%20linguistic%20intelligence%20alone%20is%20sufficient%20to%20endow%20models%20with%20spatial%20intelligence%2C%20and%20how%20models%20perform%20relevant%20tasks%20with%20text-only%20inputs%20still%20remain%20unexplored.%20Therefore%2C%20in%20this%20paper%2C%20we%20focus%20on%20a%20fundamental%20and%20critical%20capability%20in%20spatial%20intelligence%20from%20a%20linguistic%20perspective%3A%20viewpoint%20rotation%20understanding%20%28VRU%29.%20Specifically%2C%20LLMs%20and%20VLMs%20are%20asked%20to%20infer%20their%20final%20viewpoint%20and%20predict%20the%20corresponding%20observation%20in%20an%20environment%20given%20textual%20description%20of%20viewpoint%20rotation%20and%20observation%20over%20multiple%20steps.%20We%20find%20that%20both%20LLMs%20and%20VLMs%20perform%20poorly%20on%20our%20proposed%20dataset%20while%20human%20can%20easily%20achieve%20100%25%20accuracy%2C%20indicating%20a%20substantial%20gap%20between%20current%20model%20capabilities%20and%20the%20requirements%20of%20spatial%20intelligence.%20To%20uncover%20the%20underlying%20mechanisms%2C%20we%20conduct%20a%20layer-wise%20probing%20analysis%20and%20head-wise%20causal%20intervention.%20Our%20findings%20reveal%20that%20although%20models%20encode%20viewpoint%20information%20in%20the%20hidden%20states%2C%20they%20appear%20to%20struggle%20to%20bind%20the%20viewpoint%20position%20with%20corresponding%20observation%2C%20resulting%20in%20a%20hallucination%20in%20final%20layers.%20Finally%2C%20we%20selectively%20fine-tune%20the%20key%20attention%20heads%20identified%20by%20causal%20intervention%20to%20improve%20VRU%20performance.%20Experimental%20results%20demonstrate%20that%20such%20selective%20fine-tuning%20achieves%20improved%20VRU%20performance%20while%20avoiding%20catastrophic%20forgetting%20of%20generic%20abilities.%20Our%20dataset%20and%20code%20will%20be%20released%20at%20https%3A//github.com/Young-Zhen/VRU_Interpret%20.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15294v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHow%2520Do%2520LLMs%2520and%2520VLMs%2520Understand%2520Viewpoint%2520Rotation%2520Without%2520Vision%253F%2520An%2520Interpretability%2520Study%26entry.906535625%3DZhen%2520Yang%2520and%2520Ping%2520Jian%2520and%2520Zhongbin%2520Guo%2520and%2520Zuming%2520Zhang%2520and%2520Chengzhi%2520Li%2520and%2520Yonghong%2520Deng%2520and%2520Xinyue%2520Zhang%2520and%2520Wenpeng%2520Lu%26entry.1292438233%3DOver%2520the%2520pa {"title": "Generative Data Augmentation for Skeleton Action Recognition", "author": "Xu Dong and Wanqing Li and Anthony Adeyemi-Ejeye and Andrew Gilbert", "abstract": "Skeleton-based human action recognition is a powerful approach for understanding human behaviour from pose data, but collecting large-scale, diverse, and well-annotated 3D skeleton datasets is both expensive and labor-intensive. To address this challenge, we propose a conditional generative pipeline for data augmentation in skeleton action recognition. Our method learns the distribution of real skeleton sequences under the constraint of action labels, enabling the synthesis of diverse and high-fidelity data. Even with limited training samples, it can effectively generate skeleton sequences and achieve competitive recognition performance in low-data scenarios, demonstrating strong generalisation in downstream tasks. Specifically, we introduce a Transformer-based encoder-decoder architecture, combined with a generative refinement module and a dropout mechanism, to balance fidelity and diversity during sampling. Experiments on HumanAct12 and the refined NTU-RGBD (NTU-VIBE) dataset show that our approach consistently improves the accuracy of multiple skeleton-based action recognition models, validating its effectiveness in both few-shot and full-data settings. The source code can be found at here.", "link": "http://arxiv.org/abs/2604.14933v1", "date": "2026-04-16", "relevancy": 2.9087, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5972}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5764}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5717}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generative%20Data%20Augmentation%20for%20Skeleton%20Action%20Recognition&body=Title%3A%20Generative%20Data%20Augmentation%20for%20Skeleton%20Action%20Recognition%0AAuthor%3A%20Xu%20Dong%20and%20Wanqing%20Li%20and%20Anthony%20Adeyemi-Ejeye%20and%20Andrew%20Gilbert%0AAbstract%3A%20Skeleton-based%20human%20action%20recognition%20is%20a%20powerful%20approach%20for%20understanding%20human%20behaviour%20from%20pose%20data%2C%20but%20collecting%20large-scale%2C%20diverse%2C%20and%20well-annotated%203D%20skeleton%20datasets%20is%20both%20expensive%20and%20labor-intensive.%20To%20address%20this%20challenge%2C%20we%20propose%20a%20conditional%20generative%20pipeline%20for%20data%20augmentation%20in%20skeleton%20action%20recognition.%20Our%20method%20learns%20the%20distribution%20of%20real%20skeleton%20sequences%20under%20the%20constraint%20of%20action%20labels%2C%20enabling%20the%20synthesis%20of%20diverse%20and%20high-fidelity%20data.%20Even%20with%20limited%20training%20samples%2C%20it%20can%20effectively%20generate%20skeleton%20sequences%20and%20achieve%20competitive%20recognition%20performance%20in%20low-data%20scenarios%2C%20demonstrating%20strong%20generalisation%20in%20downstream%20tasks.%20Specifically%2C%20we%20introduce%20a%20Transformer-based%20encoder-decoder%20architecture%2C%20combined%20with%20a%20generative%20refinement%20module%20and%20a%20dropout%20mechanism%2C%20to%20balance%20fidelity%20and%20diversity%20during%20sampling.%20Experiments%20on%20HumanAct12%20and%20the%20refined%20NTU-RGBD%20%28NTU-VIBE%29%20dataset%20show%20that%20our%20approach%20consistently%20improves%20the%20accuracy%20of%20multiple%20skeleton-based%20action%20recognition%20models%2C%20validating%20its%20effectiveness%20in%20both%20few-shot%20and%20full-data%20settings.%20The%20source%20code%20can%20be%20found%20at%20here.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14933v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGenerative%2520Data%2520Augmen {"title": "Why Do Vision Language Models Struggle To Recognize Human Emotions?", "author": "Madhav Agarwal and Sotirios A. Tsaftaris and Laura Sevilla-Lara and Steven McDonagh", "abstract": "Understanding emotions is a fundamental ability for intelligent systems to be able to interact with humans. Vision-language models (VLMs) have made tremendous progress in the last few years for many visual tasks, potentially offering a promising solution for understanding emotions. However, it is surprising that even the most sophisticated contemporary VLMs struggle to recognize human emotions or to outperform even specialized vision-only classifiers. In this paper we ask the question \"Why do VLMs struggle to recognize human emotions?\", and observe that the inherently continuous and dynamic task of facial expression recognition (DFER) exposes two critical VLM vulnerabilities. First, emotion datasets are naturally long-tailed, and the web-scale data used to pre-train VLMs exacerbates this head-class bias, causing them to systematically collapse rare, under-represented emotions into common categories. We propose alternative sampling strategies that prevent favoring common concepts. Second, temporal information is critical for understanding emotions. However, VLMs are unable to represent temporal information over dense frame sequences, as they are limited by context size and the number of tokens that can fit in memory, which poses a clear challenge for emotion recognition. We demonstrate that the sparse temporal sampling strategy used in VLMs is inherently misaligned with the fleeting nature of micro-expressions (0.25-0.5 seconds), which are often the most critical affective signal. As a diagnostic probe, we propose a multi-stage context enrichment strategy that utilizes the information from \"in-between\" frames by first converting them into natural language summaries. This enriched textual context is provided as input to the VLM alongside sparse keyframes, preventing attentional dilution from excessive visual data while preserving the emotional trajectory.", "link": "http://arxiv.org/abs/2604.15280v1", "date": "2026-04-16", "relevancy": 2.8735, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5811}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5811}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5618}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Why%20Do%20Vision%20Language%20Models%20Struggle%20To%20Recognize%20Human%20Emotions%3F&body=Title%3A%20Why%20Do%20Vision%20Language%20Models%20Struggle%20To%20Recognize%20Human%20Emotions%3F%0AAuthor%3A%20Madhav%20Agarwal%20and%20Sotirios%20A.%20Tsaftaris%20and%20Laura%20Sevilla-Lara%20and%20Steven%20McDonagh%0AAbstract%3A%20Understanding%20emotions%20is%20a%20fundamental%20ability%20for%20intelligent%20systems%20to%20be%20able%20to%20interact%20with%20humans.%20Vision-language%20models%20%28VLMs%29%20have%20made%20tremendous%20progress%20in%20the%20last%20few%20years%20for%20many%20visual%20tasks%2C%20potentially%20offering%20a%20promising%20solution%20for%20understanding%20emotions.%20However%2C%20it%20is%20surprising%20that%20even%20the%20most%20sophisticated%20contemporary%20VLMs%20struggle%20to%20recognize%20human%20emotions%20or%20to%20outperform%20even%20specialized%20vision-only%20classifiers.%20In%20this%20paper%20we%20ask%20the%20question%20%22Why%20do%20VLMs%20struggle%20to%20recognize%20human%20emotions%3F%22%2C%20and%20observe%20that%20the%20inherently%20continuous%20and%20dynamic%20task%20of%20facial%20expression% {"title": "AnimationBench: Are Video Models Good at Character-Centric Animation?", "author": "Leyi Wu and Pengjun Fang and Kai Sun and Yazhou Xing and Yinwei Wu and Songsong Wang and Ziqi Huang and Dan Zhou and Yingqing He and Ying-Cong Chen and Qifeng Chen", "abstract": "Video generation has advanced rapidly, with recent methods producing increasingly convincing animated results. However, existing benchmarks-largely designed for realistic videos-struggle to evaluate animation-style generation with its stylized appearance, exaggerated motion, and character-centric consistency. Moreover, they also rely on fixed prompt sets and rigid pipelines, offering limited flexibility for open-domain content and custom evaluation needs. To address this gap, we introduce AnimationBench, the first systematic benchmark for evaluating animation image-to-video generation. AnimationBench operationalizes the Twelve Basic Principles of Animation and IP Preservation into measurable evaluation dimensions, together with Broader Quality Dimensions including semantic consistency, motion rationality, and camera motion consistency. The benchmark supports both a standardized close-set evaluation for reproducible comparison and a flexible open-set evaluation for diagnostic analysis, and leverages visual-language models for scalable assessment. Extensive experiments show that AnimationBench aligns well with human judgment and exposes animation-specific quality differences overlooked by realism-oriented benchmarks, leading to more informative and discriminative evaluation of state-of-the-art I2V models.", "link": "http://arxiv.org/abs/2604.15299v1", "date": "2026-04-16", "relevancy": 2.8728, "topK": [{"title": "PoseAnimate: Zero-shot high fidelity pose controllable character\n  animation", "link": "http://arxiv.org/abs/2404.13680v2", "similarity": 0.6059}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "simi {"title": "SegviGen: Repurposing 3D Generative Model for Part Segmentation", "author": "Lin Li and Haoran Feng and Zehuan Huang and Haohua Chen and Wenbo Nie and Shaohua Hou and Keqing Fan and Pan Hu and Sheng Wang and Buyu Li and Lu Sheng", "abstract": "We introduce SegviGen, a framework that repurposes native 3D generative models for 3D part segmentation. Existing pipelines either lift strong 2D priors into 3D via distillation or multi-view mask aggregation, often suffering from cross-view inconsistency and blurred boundaries, or explore native 3D discriminative segmentation, which typically requires large-scale annotated 3D data and substantial training resources. In contrast, SegviGen leverages the structured priors encoded in pretrained 3D generative model to induce segmentation through distinctive part colorization, establishing a novel and efficient framework for part segmentation. Specifically, SegviGen encodes a 3D asset and predicts part-indicative colors on active voxels of a geometry-aligned reconstruction. It supports interactive part segmentation, full segmentation, and full segmentation with 2D guidance in a unified framework. Extensive experiments show that SegviGen improves over the prior state of the art by 40% on interactive part segmentation and by 15% on full segmentation, while using only 0.32% of the labeled training data. It demonstrates that pretrained 3D generative priors transfer effectively to 3D part segmentation, enabling strong performance with limited supervision. See our project page at https://fenghora.github.io/SegviGen-Page/.", "link": "http://arxiv.org/abs/2603.16869v2", "date": "2026-04-16", "relevancy": 2.868, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5747}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5747}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.5714}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SegviGen%3A%20Repurposing%203D%20Generative%20Model%20for%20Part%20Segmentation&body=Title%3A%20SegviGen%3A%20Repurposing%203D%20Generative%20Model%20for%20Part%20Segmentation%0AAuthor%3A%20Lin%20Li%20and%20Haoran%20Feng%20and%20Zehuan%20Huang%20and%20Haohua%20Chen%20and%20Wenbo%20Nie%20and%20Shaohua%20Hou%20and%20Keqing%20Fan%20and%20Pan%20Hu%20and%20Sheng%20Wang%20and%20Buyu%20Li%20and%20Lu%20Sheng%0AAbstract%3A%20We%20introduce%20SegviGen%2C%20a%20framework%20that%20repurposes%20native%203D%20generative%20models%20for%203D%20part%20segmentation.%20Existing%20pipelines%20either%20lift%20strong%202D%20priors%20into%203D%20via%20distillation%20or%20multi-view%20mask%20aggregation%2C%20often%20suffering%20from%20cross-view%20inconsistency%20and%20blurred%20boundaries%2C%20or%20explore%20native%203D%20discriminative%20segmentation%2C%20which%20typically%20requires%20large-scale%20annotated%203D%20data%20and%20substantial%20training%20resources.%20In%20contrast%2C%20SegviGen%20leverages%20the%20structured%20priors%20encoded%20in%20pretrained%203D%20generative%20model%20to%20induce%20segmentation%20through%20distinctive%20part%20colorization%2C%20establishing%20a%20novel%20and%20efficient%20framework%20for%20part%20segmentation.%20Specifically%2C%20SegviGen%20encodes%20a%203D%20asset%20and%20predicts%20part-indicative%20colors%20on%20active%20voxels%20of%20a%20geometry-aligned%20reconstruction.%20It%20supports%20interactive%20part%20segmentation%2C%20full%20segmentation%2C%20and%20full%20segmentation%20with%202D%20guidance%20in%20a%20unified%20framework.%20Extensive%20experiments%20show%20that%20SegviGen%20improves%20over%20the%20prior%20state%20of%20the%20art%20by%2040%25%20on%20interactive%20part%20segmentation%20and%20by%2015%25%20on%20full%20segmentation%2C%20while%20using%20only%200.32%25%20of%20the%20labeled%20training%20data.%20It%20demonstrates%20that%20pretrained%203D%20generative%20priors%20transfer%20effectively%20to%203D%20part%20segmentation%2C%20enabling%20strong%20performance%20with%20limited%20supervision.%20See%20our%20project%20page%20at%20https%3A//fenghora.github.io/SegviGen-Page/.%0ALink%3A%20http%3A//arxiv.org/abs/2603.16869v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSegviGen%253A%2520Repurposing%25203D%2520Generative%2520Model%2520for%2520Part%2520Segmentation%26entry.906535625%3DLin%2520Li%2520and%2520Haoran%2520Feng%2520and%2520Zehuan%2520Huang%2520and%2520Haohua%2520Chen%2520and%2520Wenbo%2520Nie%2520and%2520Shaohua%2520Hou%2520and%2520Keqing%2520Fan%2520and%2520Pan%2520Hu%2520and%2520Sheng%2520Wang%2520and%2520Buyu%2520Li%2520and%2520Lu%2520Sheng%26entry.1292438233%3DWe%2520introduce%2520SegviGen%252C%2520a%2520framework%2520that%2520repurposes%2520native%25203D%2520generative%2520models%2520for%25203D%2520part%2520segmentation.%2520Existing%2520pipelines%2520either%2520lift%2520strong%25202D%2520priors%2520into%25203D%2520via%2520distillation%2520or%2520multi-view%2520mask%2520aggregation%252C%2520often%2520suffering%2520from%2520cross-view%2520inconsistency%2520and%2520blurred%2520boundaries%252C%2520or%2520explore%2520native%25203D%2520discriminative%2520segmentation%252C%2520which%2520typically%2520requires%2520large-scale%2520annotated%25203D%2520data%2520and%2520substantial%2520training%2520resources.%2520In%2520contrast%252C%2520SegviGen%2520leverages%2520the%2520structured%2520priors%2520encoded%2520in%2520pretrained%25203D%2520generative%2520model%2520to%2520induce%2520segmentation%2520through%2520distinctive%2520part%2520colorization%252C%2520establishing%2520a%2520novel%2520and%2520efficient%2520framework%2520for%2520part%2520segmentation.%2520Specifically%252C%2520SegviGen%2520encodes%2520a%2520 20which%20typically%20requires%20large-scale%20annotated%203D%20data%20and%20substantial%20training%20resources.%20In%20contrast%2C%20SegviGen%20leverages%20the%20structured%20priors%20encoded%20in%20pretrained%203D%20generative%20model%20to%20induce%20segmentation%20through%20distinctive%20part%20colorization%2C%20establishing%20a%20novel%20and%20efficient%20framework%20for%20part%20segmentation.%20Specifically%2C%20SegviGen%20encodes%20a%203D%20asset%20and%20predicts%20part-indicative%20colors%20on%20active%20voxels%20of%20a%20geometry-aligned%20reconstruction.%20It%20supports%20interactive%20part%20segmentation%2C%20full%20segmentation%2C%20and%20full%20segmentation%20with%202D%20guidance%20in%20a%20unified%20framework.%20Extensive%20experiments%20show%20that%20SegviGen%20improves%20over%20the%20prior%20state%20of%20the%20art%20by%2040%25%20on%20interactive%20part%20segmentation%20and%20by%2015%25%20on%20full%20segmentation%2C%20while%20using%20only%200.32%25%20of%20the%20labeled%20training%20data.%20It%20demonstrates%20that%20pretrained%203D%20generative%20priors%20transfer%20effectively%20to%203D%20part%20segmentation%2C%20enabling%20strong%20performance%20with%20limited%20supervision.%20See%20our%20project%20page%20at%20https%3A//fenghora.github.io/SegviGen-Page/.&entry.1838667208=http%3A//arxiv.org/abs/2603.16869v2&entry.124074799=Read"},
{"title": "Revisiting Compositionality in Dual-Encoder Vision-Language Models: The Role of Inference", "author": "Imanol Miranda and Ander Salaberria and Eneko Agirre and Gorka Azkune", "abstract": "Dual-encoder Vision-Language Models (VLMs) such as CLIP are often characterized as bag-of-words systems due to their poor performance on compositional benchmarks. We argue that this limitation may stem less from deficient representations than from the standard inference protocol based on global cosine similarity. First, through controlled diagnostic experiments, we show that explicitly enforcing fine-grained region-segment alignment at inference dramatically improves compositional performance without updating pretrained encoders. We then introduce a lightweight transformer that learns such alignments directly from frozen patch and token embeddings. Comparing against full fine-tuning and prior end-to-end compositional training methods, we find that although these approaches improve in-domain retrieval, their gains do not consistently transfer under distribution shift. In contrast, learning localized alignment over frozen representations matches full fine-tuning on in-domain retrieval while yielding substantial improvements on controlled out-of-domain compositional benchmarks. These results identify global embedding matching as a key bottleneck in dual-encoder VLMs and highlight the importance of alignment mechanisms for robust compositional generalization.", "link": "http://arxiv.org/abs/2604.11496v2", "date": "2026-04-16", "relevancy": 2.8674, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5855}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5855}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5494}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Revisiting%20Compositionality%20in%20Dual-Encoder%20Vision-Language%20Models%3A%20The%20Role%20of%20Inference&body=Title%3A%20Revisiting%20Compositionality%20in%20Dual-Encoder%20Vision-Language%20Models%3A%20The%20Role%20of%20Inference%0AAuthor%3A%20Imanol%20Miranda%20and%20Ander%20Salaberria%20and%20Eneko%20Agirre%20and%20Gorka%20Azkune%0AAbstract%3A%20Dual-encoder%20Vision-Language%20Models%20%28VLMs%29%20such%20as%20CLIP%20are%20often%20characterized%20as%20bag-of-words%20systems%20due%20to%20their%20poor%20performance%20on%20compositional%20benchmarks.%20We%20argue%20that%20this%20limitation%20may%20stem%20less%20from%20deficient%20representations%20than%20from%20the%20standard%20inference%20protocol%20based%20on%20global%20cosine%20similarity.%20First%2C%20through%20controlled%20diagnostic%20experiments%2C%20we%20show%20that%20explicitly%20enforcing%20fine-grained%20region-segment%20alignment%20at%20inference%20dramatically%20improves%20compositional%20performance%20without%20updating%20pretrained%20encoders.%20We%20then%20introduce%20a%20lightweight%20transformer%20that%20learns%20such%20alignments%20directly%20from%20frozen%20patch%20and%20token%20embeddings.%20Comparing%20against%20full%20fine-tuning%20and%20prior%20end-to-end%20compositional%20training%20methods%2C%20we%20find%20that%20although%20these%20approaches%20improve%20in-domain%20retrieval%2C%20their%20gains%20do%20not%20consistently%20transfer%20under%20distribution%20shift.%20In%20contrast%2C%20learning%20localized%20alignment%20over%20frozen%20representations%20matches%20full%20fine-tuning%20on%20in-domain%20retrieval%20while%20yielding%20substantial%20improvements%20on%20controlled%20out-of-domain%20compositional%20benchmarks.%20These%20results%20identify%20global%20embedding%20matching%20as%20a%20key%20bottleneck%20in%20dual-encoder%20VLMs%20and%20highlight%20the%20importance%20of%20alignment%20mechanisms%20for%20robust%20compositional%20generalization.%0ALink%3A%20http%3A//arxiv.org/abs/2604.11496v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRevisiting%2520Compositionality%2520in%2520Dual-Encoder%2520Vision-Language%2520Models%253A%2520The%2520Role%2520of%2520Inference%26entry.906535625%3DImanol%2520Miranda%2520and%2520Ander%2520Salaberria%2520and%2520Eneko%2520Agirre%2520and%2520Gorka%2520Azkune%26entry.1292438233%3DDual-encoder%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520such%2520as%2520CLIP%2520are%2520often%2520characterized%2520as%2520bag-of-words%2520systems%2520due%2520to%2520their%2520poor%2520performance%2520on%2520compositional%2520benchmarks.%2520We%2520argue%2520that%2520this%2520limitation%2520may%2520stem%2520less%2520from%2520deficient%2520representations%2520than%2520from%2520the%2520standard%2520inference%2520protocol%2520based%2520on%2520global%2520cosine%2520similarity.%2520First%252C%2520through%2520controlled%2520diagnostic%2520experiments%252C%2520we%2520show%2520that%2520explicitly%2520enforcing%2520fine-grained%2520region-segment%2520alignment%2520at%2520inference%2520dramatically%2520improves%2520compositional%2520performance%2520without%2520updating%2520pretrained%2520encoders.%2520We%2520then%2520introduce%2520a%2520lightweight%2520transformer%2520that%2520learns%2520such%2520alignments%2520directly%2520from%2520frozen%2520patch%2520and%2520token%2520embeddings.%2520Comparing%2520against%2520full%2520fine-tuning%2520and%2520prior%2520end-to-end%2520compositional%2520training%2520methods%252C%2520we%2520find%2520that%2520although%2520these%2520approaches%2520improve%2520in-domain%2520retrieval%252C%2520their%2520gains%2520do%2520not%2520consistently%2520transfer%2520under%2520distribution%2520shift.%2520In%2520contrast%252C%2520learning%2520localized%2520alignment%2520over%2520frozen%2520representations%2520matches%2520full%2520fine-tuning%2520on%2520in-domain%2520retrieval%2520while%2520yielding%2520substantial%2520improvements%2520on%2520controlled%2520out-of-domain%2520compositional%2520benchmarks.%2520These%2520results%2520identify%2520global%2520embedding%2520matching%2520as%2520a%2520key%2520bottleneck%2520in%2520dual-encoder%2520VLMs%2520and%2520highlight%2520the%2520importance%2520of%2520alignment%2520mechanisms%2520for%2520robust%2520compositional%2520generalization.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.11496v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Revisiting%20Compositionality%20in%20Dual-Encoder%20Vision-Language%20Models%3A%20The%20Role%20of%20Inference&entry.906535625=Imanol%20Miranda%20and%20Ander%20Salaberria%20and%20Eneko%20Agirre%20and%20Gorka%20Azkune&entry.1292438233=Dual-encoder%20Vision-Language%20Models%20%28VLMs%29%20such%20as%20CLIP%20are%20often%20characterized%20as%20bag-of-words%20systems%20due%20to%20their%20poor%20performance%20on%20compositional%20benchmarks.%20We%20argue%20that%20this%20limitation%20may%20stem%20less%20from%20deficient%20representations%20than%20from%20the%20standard%20inference%20protocol%20based%20on%20global%20cosine%20similarity.%20First%2C%20through%20controlled%20diagnostic%20experiments%2C%20we%20show%20that%20explicitly%20enforcing%20fine-grained%20region-segment%20alignment%20at%20inference%20dramatically%20improves%20compositional%20performance%20without%20updating%20pretrained%20encoders.%20We%20then%20introduce%20a%20lightweight%20transformer%20that%20learns%20such%20alignments%20directly%20from%20frozen%20patch%20and%20token%20embeddings.%20Comparing%20against%20full%20fine-tuning%20and%20prior%20end-to-end%20compositional%20training%20methods%2C%20we%20find%20that%20although%20these%20approaches%20improve%20in-domain%20retrieval%2C%20their%20gains%20do%20not%20consistently%20transfer%20un {"title": "Beyond Visual Cues: Semantic-Driven Token Filtering and Expert Routing for Anytime Person ReID", "author": "Jiaxuan Li and Xin Wen and Zhihang Li", "abstract": "Any-Time Person Re-identification (AT-ReID) necessitates the robust retrieval of target individuals under arbitrary conditions, encompassing both modality shifts (daytime and nighttime) and extensive clothing-change scenarios, ranging from short-term to long-term intervals. However, existing methods are highly relying on pure visual features, which are prone to change due to environmental and time factors, resulting in significantly performance deterioration under scenarios involving illumination caused modality shifts or cloth-change. In this paper, we propose Semantic-driven Token Filtering and Expert Routing (STFER), a novel framework that leverages the ability of Large Vision-Language Models (LVLMs) to generate identity consistency text, which provides identity-discriminative features that are robust to both clothing variations and cross-modality shifts between RGB and IR. Specifically, we employ instructions to guide the LVLM in generating identity-intrinsic semantic text that captures biometric constants for the semantic model driven. The text token is further used for Semantic-driven Visual Token Filtering (SVTF), which enhances informative visual regions and suppresses redundant background noise. Meanwhile, the text token is also used for Semantic-driven Expert Routing (SER), which integrates the semantic text into expert routing, resulting in more robust multi-scenario gating. Extensive experiments on the Any-Time ReID dataset (AT-USTC) demonstrate that our model achieves state-of-the-art results. Moreover, the model trained on AT-USTC was evaluated across 5 widely-used ReID benchmarks demonstrating superior generalization capabilities with highly competitive results. Our code will be available soon.", "link": "http://arxiv.org/abs/2604.15090v1", "date": "2026-04-16", "relevancy": 2.8162, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5949}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5474}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5474}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Visual%20Cues%3A%20Semantic-Driven%20Token%20Filtering%20and%20Expert%20Routing%20for%20Anytime%20Person%20ReID&body=Title%3A%20Beyond%20Visual%20Cues%3A%20Semantic-Driven%20Token%20Filtering%20and%20Expert%20Routing%20for%20Anytime%20Person%20ReID%0AAuthor%3A%20Jiaxuan%20Li%20and%20Xin%20Wen%20and%20Zhihang%20Li%0AAbstract%3A%20Any-Time%20Person%20Re-identification%20%28AT-ReID%29%20necessitates%20the%20robust%20retrieval%20of%20target%20individuals%20under%20arbitrary%20conditions%2C%20encompassing%20both%20modality%20shifts%20%28daytime%20and%20nighttime%29%20and%20extensive%20clothing-change%20scenarios%2C%20ranging%20from%20short-term%20to%20long-term%20intervals.%20However%2C%20existing%20methods%20are%20highly%20relying%20on%20pure%20visual%20features%2C%20which%20are%20prone%20to%20change%20due%20to%20environmental%20and%20time%20factors%2C%20resulting%20in%20significantly%20performance%20deterioration%20under%20scenarios%20involving%20illumination%20caused%20modality%20shifts%20or%20cloth-change.%20In%20this%20paper%2C%20we%20propose%20Semantic-driven%20Token%20Filtering%20and%20Expert%20Routing%20%28STFER%29%2C%20a%20novel%20framework%20that%20leverages%20the%20ability%20of%20Large%20Vision-Language%20Models%20%28LVLMs%29%20to%20generate%20identity%20consistency%20text%2C%20which%20provides%20identity-discriminative%20features%20that%20are%20robust%20to%20both%20clothing%20variations%20and%20cross-modality%20shifts%20between%20RGB%20and%20IR.%20Specifically%2C%20we%20employ%20instructions%20to%20guide%20the%20LVLM%20in%20generating%20identity-intrinsic%20semantic%20text%20that%20captures%20biometric%20constants%20for%20the%20semantic%20model%20driven.%20The%20text%20token%20is%20further%20used%20for%20Semantic-driven%20Visual%20Token%20Filtering%20%28SVTF%29%2C%20which%20enhances%20informative%20visual%20regions%20and%20suppresses%20redundant%20background%20noise.%20Meanwhile%2C%20the%20text%20token%20is%20also%20used%20for%20Semantic-driven%20Expert%20Routing%20%28SER%29%2C%20which%20integrates%20the%20semantic%20text%20into%20expert%20routing%2C%20resulting%20in%20more%20robust%20multi-scenario%20gating.%20Extensive%20experiments%20on%20the%20Any-Time%20ReID%20dataset%20%28AT-USTC%29%20demonstrate%20that%20our%20model%20achieves%20state-of-the-art%20results.%20Moreover%2C%20the%20model%20trained%20on%20AT-USTC%20was%20evaluated%20across%205%20widely-used%20ReID%20benchmarks%20demonstrating%20superior%20generalization%20capabilities%20with%20highly%20competitive%20results.%20Our%20code%20will%20be%20available%20soon.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15090v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520Visual%2520Cues%253A%2520Semantic-Driven%2520Token%2520Filtering%2520and%2520Expert%2520Routing%2520for%2520Anytime%2520Person%2520ReID%26entry.906535625%3DJiaxuan%2520Li%2520and%2520Xin%2520Wen%2520and%2520Zhihang%2520Li%26entry.1292438233%3DAny-Time%2520Person%2520Re-identification%2520%2528AT-ReID%2529%2520necessitates%2520the%2520robust%2520retrieval%2520of%2520target%2520individuals%2520under%2520arbitrary%2520conditions%252C%2520encompassing%2520both%2520modality%2520shifts%2520%2528daytime%2520and%2520nighttime%2529%2520and%2520extensive%2520clothing-change%2520scenarios%252C%2520ranging%2520from%2520short-term%2520to%2520long-term%2520intervals.%2520However%252C%252 r%252C%2520the%2520model%2520trained%2520on%2520AT-USTC%2520was%2520evaluated%2520across%25205%2520widely-used%2520ReID%2520benchmarks%2520demonstrating%2520superior%2520generalization%2520capabilities%2520with%2520highly%2520competitive%2520results.%2520Our%2520code%2520will%2520be%2520available%2520soon.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.15090v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Beyond%20Visual%20Cues%3A%20Semantic-Driven%20Token%20Filtering%20and%20Expert%20Routing%20for%20Anytime%20Person%20ReID&entry.906535625=Jiaxuan%20Li%20and%20Xin%20Wen%20and%20Zhihang%20Li&entry.1292438233=Any-Time%20Person%20Re-identification%20%28AT-ReID%29%20necessitates%20the%20robust%20retrieval%20of%20target%20individuals%20under%20arbitrary%20conditions%2C%20encompassing%20both%20modality%20shifts%20%28daytime%20and%20nighttime%29%20and%20extensive%20clothing-change%20scenarios%2C%20ranging%20from%20short-term%20to%20long-term%20intervals.%20However%2C%20existing%20methods%20are%20highly%20relying%20on%20pure%20visual%20features%2C%20which%20are%20prone%20to%20change%20due%20to%20environmental%20and%20time%20factors%2C%20resulting%20in%20significantly%20performance%20deterioration%20under%20scenarios%20involving%20illumination%20caused%20modality%20shifts%20or%20cloth-change.%20In%20this%20paper%2C%20we%20propose%20Semantic-driven%20Token%20Filtering%20and%20Expert%20Routing%20%28STFER%29%2C%20a%20novel%20framework%20that%20leverages%20the%20ability%20of%20Large%20Vision-Language%20Models%20%28LVLMs%29%20to%20generate%20identity%20consistency%20text%2C%20which%20provides%20identity-discriminative%20features%20that%20are%20robust%20to%20both%20clothing%20variations%20and%20cross-modality%20shifts%20between%20RGB%20and%20IR.%20Specifically%2C%20we%20employ%20instructions%20to%20guide%20the%20LVLM%20in%20generating%20identity-intrinsic%20semantic%20tex {"title": "Robustness of Vision Foundation Models to Common Perturbations", "author": "Hongbin Liu and Zhengyuan Jiang and Cheng Hong and Neil Zhenqiang Gong", "abstract": "A vision foundation model outputs an embedding vector for an image, which can be affected by common editing operations (e.g., JPEG compression, brightness, contrast adjustments). These common perturbations alter embedding vectors and may impact the performance of downstream tasks using these embeddings. In this work, we present the first systematic study on foundation models' robustness to such perturbations. We propose three robustness metrics and formulate five desired mathematical properties for these metrics, analyzing which properties they satisfy or violate. Using these metrics, we evaluate six industry-scale foundation models (OpenAI, Meta) across nine common perturbation categories, finding them generally non-robust. We also show that common perturbations degrade downstream application performance (e.g., classification accuracy) and that robustness values can predict performance impacts. Finally, we propose a fine-tuning approach to improve robustness without sacrificing utility.", "link": "http://arxiv.org/abs/2604.14973v1", "date": "2026-04-16", "relevancy": 2.755, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.57}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.57}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.513}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Robustness%20of%20Vision%20Foundation%20Models%20to%20Common%20Perturbations&body=Title%3A%20Robustness%20of%20Vision%20Foundation%20Models%20to%20Common%20Perturbations%0AAuthor%3A%20Hongbin%20Liu%20and%20Zhengyuan%20Jiang%20and%20Cheng%20Hong%20and%20Neil%20Zhenqiang%20Gong%0AAbstract%3A%20A%20vision%20foundation%20model%20outputs%20an%20embedding%20vector%20for%20an%20image%2C%20which%20can%20be%20affected%20by%20common%20editing%20operations%20%28e.g.%2C%20JPEG%20compression%2C%20brightness%2C%20contrast%20adjustments%29.%20These%20common%20perturbations%20alter%20embedding%20vectors%20and%20may%20impact%20the%20performance%20of%20downstream%20tasks%20using%20these%20embeddings.%20In%20this%20work%2C%20we%20present%20the%20first%20systematic%20study%20on%20foundation%20models%27%20robustness%20to%20such%20perturbations.%20We%20propose%20three%20robustness%20metrics%20and%20formulate%20five%20desired%20mathematical%20properties%20for%20these%20metrics%2C%20analyzing%20which%20properties%20they%20satisfy%20or%20violate.%20Using%20these%20metrics%2C%20we%20evaluate%20six%20industry-scale%20foundation%20models%20%28OpenAI%2C%20Meta%29%20across%20nine%20common%20perturbation%20categories%2C%20finding%20them%20generally%20non-robust.%20We%20also%20show%20that%20common%20perturbations%20degrade%20downstream%20application%20performance%20%28e.g.%2C%20classification%20accuracy%29%20and%20that%20robustness%20values%20can%20predict%20performance%20impacts.%20Finally%2C%20we%20propose%20a%20fine-tuning%20approach%20to%20improve%20robustness%20without%20sacrificing%20utility.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14973v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRobustness%2520of%2520Vision%2520Foundation%2520Models%2520to%2520Common%2520Perturbations%26entry.906535625%3DHongbin%2520Liu%2520and%2520Zhengyuan%2520Jiang%2520and%2520Cheng%2520Hong%2520and%2520Neil%2520Zhenqiang%2520Gong%26entry.1292438233%3DA%2520vision%2520foundation%2520m {"title": "Boundary-Centric Active Learning for Temporal Action Segmentation", "author": "Halil Ismail Helvaci and Sen-ching Samson Cheung", "abstract": "Temporal action segmentation (TAS) demands dense temporal supervision, yet most of the annotation cost in untrimmed videos is spent identifying and refining action transitions, where segmentation errors concentrate and small temporal shifts disproportionately degrade segmental metrics. We introduce B-ACT, a clip-budgeted active learning framework that explicitly allocates supervision to these high-leverage boundary regions. B-ACT operates in a hierarchical two-stage loop: (i) it ranks and queries unlabeled videos using predictive uncertainty, and (ii) within each selected video, it detects candidate transitions from the current model predictions and selects the top-$K$ boundaries via a novel boundary score that fuses neighborhood uncertainty, class ambiguity, and temporal predictive dynamics. Importantly, our annotation protocol requests labels for only the boundary frames while still training on boundary-centered clips to exploit temporal context through the model's receptive field. Extensive experiments on GTEA, 50Salads, and Breakfast demonstrate that boundary-centric supervision delivers strong label efficiency and consistently surpasses representative TAS active learning baselines and prior state of the art under sparse budgets, with the largest gains on datasets where boundary placement dominates edit and overlap-based F1 scores.", "link": "http://arxiv.org/abs/2604.15173v1", "date": "2026-04-16", "relevancy": 2.7287, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5947}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.5327}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5099}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Boundary-Centric%20Active%20Learning%20for%20Temporal%20Action%20Segmentation&body=Title%3A%20Boundary-Centric%20Active%20Learning%20for%20Temporal%20Action%20Segmentation%0AAuthor%3A%20Halil%20Ismail%20Helvaci%20and%20Sen-ching%20Samson%20Cheung%0AAbstract%3A%20Temporal%20action%20segmentation%20%28TAS%29%20demands%20dense%20temporal%20supervision%2C%20yet%20most%20of%20the%20annotation%20cost%20in%20untrimmed%20videos%20is%20spent%20identifying%20and%20refining%20action%20transitions%2C%20where%20segmentation%20errors%20concentrate%20and%20small%20temporal%20shifts%20disproportionately%20degrade%20segmental%20metrics.%20We%20introduce%20B-ACT%2C%20a%20clip-budgeted%20active%20learning%20framework%20that%20explicitly%20allocates%20supervision%20to%20these%20high-leverage%20boundary%20regions.%20B-ACT%20operates%20in%20a%20hierarchical%20two-stage%20loop%3A%20%28i%29%20it%20ranks%20and%20queries%20unlabeled%20videos%20using%20predictive%20uncertainty%2C%20and%20%28ii%29%20within%20each%20selected%20video%2C%20it%20detects%20candidate%20transitions%20from%20the%20current%20model%20predictions%20and%20selects%20the%20top-%24K%24%20boundaries%20via%20a%20novel%20boundary%20score%20that%20fuses%20neighborhood%20uncertainty%2C%20class%20ambiguity%2C%20and%20temporal%20predictive%20dynamics.%20Importantly%2C%20our%20annotation%20protocol%20requests%20labels%20for%20only%20the%20boundary%20frames%20while%20still%20training%20on%20boundary-centered%20clips%20to%20exploit%20temporal%20context%20through%20the%20model%27s%20receptive%20field.%20Extensive%20experiments%20on%20GTEA%2C%2050Salads%2C%20and%20Breakfast%20demonstrate%20that%20boundary-centric%20supervision%20delivers%20strong%20label%20efficiency%20and%20consistently%20surpasses%20representative%20TAS%20active%20learning%20baselines%20and%20prior%20state%20of%20the%20art%20under%20sparse%20budgets%2C%20with%20the%20largest%20gains%20on%20datasets%20where%20boundary%20placement%20dominates%20edit%20and%20overlap-based%20F1%20scores.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15173v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBoundary-Centric%2520Active%2520Learning%2520for%2520Temporal%2520Action%2520Segmentation%26entry.906535625%3DHalil%2520Ismail%2520Helvaci%2520and%2520Sen-ching%2520Samson%2520Cheung%26entry.1292438233%3DTemporal%2520action%2520segmentation%2520%2528TAS%2529%2520demands%2520dense%2520temporal%2520supervision%252C%2520yet%2520most%2520of%2520the%2520annotation%2520cost%2520in%2520untrimmed%2520videos%2520is%2520spent%2520identifying%2520and%2520refining%2520action%2520transitions%252C%2520where%2520segmentation%2520errors%2520concentrate%2520and%2520small%2520temporal%2520shifts%2520disproportionately%2520degrade%2520segmental%2520metrics.%2520We%2520introduce%2520B-ACT%252C%2520a%2520clip-budgeted%2520active%2520learning%2520framework%2520that%2520explicitly%2520allocates%2520supervision%2520to%2520these%2520high-leverage%2520boundary%2520regions.%2520B-ACT%2520operates%2520in%2520a%2520hierarchical%2520two-stage%2520loop%253A%2520%2528i%2529%2520it%2520ranks%2520and%2520queries%2520unlabeled%2520videos%2520using%2520predictive%2520uncertainty%252C%2520and%2520%2528ii%2529%2520within%2520each%2520selected%2520video%252C%2520it%2520detects%2520candidate%2520transitions%2520from%2520the%2520current%2520model%2520predictions%2520and%2520selects%2520the%2520top-%2524K%2524%2520boundaries%2520via%2520a%2520novel%2520boundary%2520score%2520that%2520fuses%2520neighborhood%2520uncertainty%252C%2520class%2520ambiguity%252C%2520and%2520temporal%2520predictive%2520dynamics.%2520Importantly%252C%2520our%2520annotation%2520protocol%2520requests%2520labels%2520for%2520only%2520the%2520boundary%2520 {"title": "Enhancing LLM-Based Neural Network Generation: Few-Shot Prompting and Efficient Validation for Automated Architecture Design", "author": "Raghuvir Duvvuri and Chandini Vysyaraju and Avi Goyal and Dmitry Ignatov and Radu Timofte", "abstract": "Automated neural network architecture design remains a significant challenge in computer vision. Task diversity and computational constraints require both effective architectures and efficient search methods. Large Language Models (LLMs) present a promising alternative to computationally intensive Neural Architecture Search (NAS), but their application to architecture generation in computer vision has not been systematically studied, particularly regarding prompt engineering and validation strategies. Building on the task-agnostic NNGPT/LEMUR framework, this work introduces and validates two key contributions for computer vision. First, we present Few-Shot Architecture Prompting (FSAP), the first systematic study of the number of supporting examples (n = 1, 2, 3, 4, 5, 6) for LLM-based architecture generation. We find that using n = 3 examples best balances architectural diversity and context focus for vision tasks. Second, we introduce Whitespace-Normalized Hash Validation, a lightweight deduplication method (less than 1 ms) that provides a 100x speedup over AST parsing and prevents redundant training of duplicate computer vision architectures. In large-scale experiments across seven computer vision benchmarks (MNIST, CIFAR-10, CIFAR-100, CelebA, ImageNette, SVHN, Places365), we generated 1,900 unique architectures. We also introduce a dataset-balanced evaluation methodology to address the challenge of comparing architectures across heterogeneous vision tasks. These contributions provide actionable guidelines for LLM-based architecture search in computer vision and establish rigorous evaluation practices, making automated design more accessible to researchers with limited computational resources.", "link": "http://arxiv.org/abs/2512.24120v2", "date": "2026-04-16", "relevancy": 2.7092, "topK": [{"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5779}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5259}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5217}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Enhancing%20LLM-Based%20Neural%20Network%20Generation%3A%20Few-Shot%20Prompting%20and%20Efficient%20Validation%20for%20Automated%20Architecture%20Design&body=Title%3A%20Enhancing%20LLM-Based%20Neural%20Network%20Generation%3A%20Few-Shot%20Prompting%20and%20Efficient%20Validation%20for%20Automated%20Architecture%20Design%0AAuthor%3A%20Raghuvir%20Duvvuri%20and%20Chandini%20Vysyaraju%20and%20Avi%20Goyal%20and%20Dmitry%20Ignatov%20and%20Radu%20Timofte%0AAbstract%3A%20Automated%20neural%20network%20architecture%20design%20remains%20a%20significant%20challenge%20in%20computer%20vision.%20Task%20diversity%20and%20computational%20constraints%20require%20both%20effective%20architectures%20and%20efficient%20search%20methods.%20Large%20Language%20Models%20%28LLMs%29%20present%20a%20promising%20alternative%20to%20computationally%20intensive%20Neural%20Architecture%20Search%20%28NAS%29%2C%20but%20their%20application%20to%20architecture%20generation%20in%20computer%20vision%20has%20not%20been%20systematically%20studied%2C%20particularly%20regarding%20prompt%20engineering%20and%20validation%20strategies.%20Building%20on%20the%20task-agnostic%20NNGPT/LEMUR%20framework%2C%20this%20work%20introduces%20and%20validates%20two%20key%20contributions%20for%20computer%20vision.%20First%2C%20we%20present%20Few-Shot%20Architecture%20Prompting%20%28FSAP%29%2C%20the%20first%20systematic%20study%20of%20the%20number%20of%20supporting%20examples%20%28n%20%3D%201%2C%202%2C%203%2C%204%2C%205%2C%206%29%20for%20LLM-based%20architecture%20generation.%20We%20find%20that%20using%20n%20%3D%203%20examples%20best%20balances%20architectural%20diversity%20and%20context%20focus%20for%20vision%20tasks.%20Second%2C%20we%20introduce%20Whitespace-Normalized%20Hash%20Validation%2C%20a%20lightweight%20deduplication%20method%20%28less%20than%201%20ms%29%20that%20provides%20a%20100x%20speedup%20over%20AST%20parsing%20and%20prevents%20redundant%20training%20of%20duplicate%20computer%20vision%20architectures.%20In%20large-scale%20experiments%20across%20seven%20computer%20vision%20benchmarks%20%28MNIST%2C%20CIFAR-10%2C%20CIFAR-100%2C%20CelebA%2C%20ImageNette%2C%20SVHN%2C%20Places365%29%2C%20we%20generated%201%2C900%20unique%20architectures.%20We%20also%20introduce%20a%20dataset-balanced%20evaluation%20methodology%20to%20address%20the%20challenge%20of%20comparing%20architectures%20across%20heterogeneous%20vision%20tasks.%20These%20contributions%20provide%20actionable%20guidelines%20for%20LLM-based%20architecture%20search%20in%20computer%20vision%20and%20establish%20rigorous%20evaluation%20practices%2C%20making%20automated%20design%20more%20accessible%20to%20researchers%20with%20limited%20computational%20resources.%0ALink%3A%20http%3A//arxiv.org/abs/2512.24120v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEnhancing%2520LLM-Based%2520Neural%2520Network%2520Generation%253A%2520Few-Shot%2520Prompting%2520and%2520Efficient%2520Validation%2520for%2520Automated%2520Architecture%2520Design%26entry.906535625%3DRaghuvir%2520Duvvuri%2520and%2520Chandini%2520Vysyaraju%2520and%2520Avi%2520Goyal%2520and%2520Dmitry%2520Ignatov%2520and%2520Radu%2520Timofte%26entry.1292438233%3DAutomated%2520neural%2520network%2520architecture%2520design%2520remains%2520a%2520significant%2520challenge%2520in%2520computer%2520vision.% {"title": "DEX-Mouse: A Low-cost Portable and Universal Interface with Force Feedback for Data Collection of Dexterous Robotic Hands", "author": "Joonho Koh and Haechan Jung and Nayoung Kim and Wook Ko and Changjoo Nam", "abstract": "Data-driven dexterous hand manipulation requires large-scale, physically consistent demonstration data. Simulation and video-based methods suffer from sim-to-real gaps and retargeting problems, while MoCap glove-based teleoperation systems require per-operator calibration and lack portability, as the robot hand is typically fixed to a stationary arm. Portable alternatives improve mobility but lack cross-platform and cross-operator compatibility. We present DEX-Mouse, a portable, calibration-free hand-held teleoperation interface with integrated kinesthetic force feedback, built from commercial off-the-shelf components under USD 150. The operator-agnostic design requires no calibration or structural modification, enabling immediate deployment across diverse environments and platforms. The interface supports a configuration in which the target robot hand is mounted directly on the forearm of an operator, producing robot-aligned data. In a comparative user study across various dexterous manipulation tasks, operators using the proposed system achieved an 86.67% task completion rate under the attached configuration. Also, we found that the attached configuration reduced the perceived workload of the operators compared to spatially separated teleoperation setups across all compared interfaces. The complete hardware and software stack, including bill of materials, CAD models, and firmware, is open-sourced at https://dex-mouse.github.io/ to facilitate replication and adoption.", "link": "http://arxiv.org/abs/2604.15013v1", "date": "2026-04-16", "relevancy": 2.6981, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5563}, {"title": "Egocentric Computer Vision for Hands-Free Robotic

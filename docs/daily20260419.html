{"title": "The Missing Knowledge Layer in AI: A Framework for Stable Human-AI Reasoning", "author": "Rikard Rosenbacke and Carl Rosenbacke and Victor Rosenbacke and Martin McKee", "abstract": "Large language models are increasingly integrated into decision-making in areas such as healthcare, law, finance, engineering, and government. Yet they share a critical limitation: they produce fluent outputs even when their internal reasoning has drifted. A confident answer can conceal uncertainty, speculation, or inconsistency, and small changes in phrasing can lead to different conclusions. This makes LLMs useful assistants but unreliable partners in high-stakes contexts.\n  Humans exhibit a similar weakness, often mistaking fluency for reliability. When a model responds smoothly, users tend to trust it, even when both model and user are drifting together. This paper is the first in a five-paper research series on stabilising human-AI reasoning. The series proposes a two-layer approach: Parts II-IV introduce human-side mechanisms such as uncertainty cues, conflict surfacing, and auditable reasoning traces, while Part V develops a model-side Epistemic Control Loop (ECL) that detects instability and modulates generation accordingly.\n  Together, these layers form a missing operational substrate for governance by increasing signal-to-noise at the point of use. Stabilising interaction makes uncertainty and drift visible before enforcement is applied, enabling more precise capability governance. This aligns with emerging compliance expectations, including the EU AI Act and ISO/IEC 42001, by making reasoning processes traceable under real conditions of use.\n  The central claim is that fluency is not reliability. Without structures that stabilise both human and model reasoning, AI cannot be trusted or governed where it matters most.", "link": "http://arxiv.org/abs/2604.14881v1", "date": "2026-04-16", "relevancy": 1.5449, "topK": [{"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5258}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5129}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.49}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Missing%20Knowledge%20Layer%20in%20AI%3A%20A%20Framework%20for%20Stable%20Human-AI%20Reasoning&body=Title%3A%20The%20Missing%20Knowledge%20Layer%20in%20AI%3A%20A%20Framework%20for%20Stable%20Human-AI%20Reasoning%0AAuthor%3A%20Rikard%20Rosenbacke%20and%20Carl%20Rosenbacke%20and%20Victor%20Rosenbacke%20and%20Martin%20McKee%0AAbstract%3A%20Large%20language%20models%20are%20increasingly%20integrated%20into%20decision-making%20in%20areas%20such%20as%20healthcare%2C%20law%2C%20finance%2C%20engineering%2C%20and%20government.%20Yet%20they%20share%20a%20critical%20limitation%3A%20they%20produce%20fluent%20outputs%20even%20when%20their%20internal%20reasoning%20has%20drifted.%20A%20confident%20answer%20can%20conceal%20uncertainty%2C%20speculation%2C%20or%20inconsistency%2C%20and%20small%20changes%20in%20phrasing%20can%20lead%20to%20different%20conclusions.%20This%20makes%20LLMs%20useful%20assistants%20but%20unreliable%20partners%20in%20high-stakes%20contexts.%0A%20%20Humans%20exhibit%20a%20similar%20weakness%2C%20often%20mistaking%20fluency%20for%20reliability.%20When%20a%20model%20responds%20smoothly%2C%20users%20tend%20to%20trust%20it%2C%20even%20when%20both%20model%20and%20user%20are%20drifting%20together.%20This%20paper%20is%20the%20first%20in%20a%20five-paper%20research%20series%20on%20stabilising%20human-AI%20reasoning.%20The%20series%20proposes%20a%20two-layer%20approach%3A%20Parts%20II-IV%20introduce%20human-side%20mechanisms%20such%20as%20uncertainty%20cues%2C%20conflict%20surfacing%2C%20and%20auditable%20reasoning%20traces%2C%20while%20Part%20V%20develops%20a%20model-side%20Epistemic%20Control%20Loop%20%28ECL%29%20that%20detects%20instability%20and%20modulates%20generation%20accordingly.%0A%20%20Together%2C%20these%20layers%20form%20a%20missing%20operational%20substrate%20for%20governance%20by%20increasing%20signal-to-noise%20at%20the%20point%20of%20use.%20Stabilising%20interaction%20makes%20uncertainty%20and%20drift%20visible%20before%20enforcement%20is%20applied%2C%20enabling%20more%20precise%20capability%20governance.%20This%20aligns%20with%20emerging%20compliance%20expectations%2C%20including%20the%20EU%20AI%20Act%20and%20ISO/IEC%2042001%2C%20by%20making%20reasoning%20processes%20traceable%20under%20real%20conditions%20of%20use.%0A%20%20The%20central%20claim%20is%20that%20fluency%20is%20not%20reliability.%20Without%20structures%20that%20stabilise%20both%20human%20and%20model%20reasoning%2C%20AI%20cannot%20be%20trusted%20or%20governed%20where%20it%20matters%20most.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14881v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Missing%2520Knowledge%2520Layer%2520in%2520AI%253A%2520A%2520Framework%2520for%2520Stable%2520Human-AI%2520Reasoning%26entry.906535625%3DRikard%2520Rosenbacke%2520and%2520Carl%2520Rosenbacke%2520and%2520Victor%2520Rosenbacke%2520and%2520Martin%2520McKee%26entry.1292438233%3DLarge%2520language%2520models%2520are%2520increasingly%2520integrated%2520into%2520decision-making%2520in%2520areas%2520such%2520as%2520healthcare%252C%2520law%252C%2520finance%252C%2520engineering%252C%2520and%2520government.%2520Yet%2520they%2520share%2520a%2520critical%2520limitation%253A%2520they%2520produce%2520fluent%2520outputs%2520even%2520when%2520their%2520internal%2520reasoning%2520has%2520drifted.%2520A%2520confident%2520answer%2520can%2520conceal%2520uncertainty%252C%2520speculation%252C%2520or%2520inconsistency%252C%2520and%2520small%2520changes%2520in%2520phrasing%2520can%2520lead%2520to%2520different%2520conclusions.%2520This%2520makes%2520LLMs%2520useful%2520assistants%2520but%2520unreliable%2520partners%2520in%2520high-stakes%2520contexts.%250A%2520%2520Humans%2520exhibit%2520a%2520similar%2520weakness%252C%2520often%2520mistaking%2520fluency%2520for%2520reliability.%2520When%2520a%2520model%2520responds%2520smoothly%252C%2520users%2520tend%2520to%2520trust%2520it%252C%2520even%2520when%2520both%2520model%2520and%2520user%2520are%2520drifting%2520together.%2520This%2520paper%2520is%2520the%2520first%2520in%2520a%2520five-paper%2520research%2520series%2520on%2520stabilising%2520human-AI%2520reasoning.%2520The%2520series%2520proposes%2520a%2520two-layer%2520approach%253A%2520Parts%2520II-IV%2520introduce%2520human-side%2520mechanisms%2520such%2520as%2520uncertainty%2520cues%252C%2520conflict%2520surfacing%252C%2520and%2520auditable%2520reasoning%2520traces%252C%2520while%2520Part%2520V%2520develops%2520a%2520model-side%2520Epistemic%2520Control%2520Loop%2520%2528ECL%2529%2520that%2520detects%2520instability%2520and%2520modulates%2520generation%2520accordingly.%250A%2520%2520Together%252C%2520these%2520layers%2520form%2520a%2520missing%2520operational%2520substrate%2520for%2520governance%2520by%2520increasing%2520signal-to-noise%2520at%2520the%2520point%2520of%2520use.%2520Stabilising%2520interaction%2520makes%2520uncertainty%2520and%2520drift%2520visible%2520before%2520enforcement%2520is%2520applied%252C%2520enabling%2520more%2520precise%2520capability%2520governance.%2520This%2520aligns%2520with%2520emerging%2520compliance%2520expectations%252C%2520including%2520the%2520EU%2520AI%2520Act%2520and%2520ISO/IEC%252042001%252C%2520by%2520making%2520reasoning%2520processes%2520traceable%2520under%2520real%2520conditions%2520of%2520use.%250A%2520%2520The%2520central%2520claim%2520is%2520that%2520fluency%2520is%2520not%2520reliability.%2520Without%2520structures%2520that%2520stabilise%2520both%2520human%2520and%2520model%2520reasoning%252C%2520AI%2520cannot%2520be%2520trusted%2520or%2520governed%2520where%2520it%2520matters%2520most.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.14881v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=The%20Missing%20Knowledge%20Layer%20in%20AI%3A%20A%20Framework%20for%20Stable%20Human-AI%20Reasoning&entry.906535625=Rikard%20Rosenbacke%20and%20Carl%20Rosenbacke%20and%20Victor%20Rosenbacke%20and%20Martin%20McKee&entry.1292438233=Large%20language%20models%20are%20increasingly%20integrated%20into%20decision-making%20in%20areas%20such%20as%20healthcare%2C%20law%2C%20finance%2C%20engineering%2C%20and%20government.%20Yet%20they%20share%20a%20critical%20limitation%3A%20they%20produce%20fluent%20outputs%20even%20when%20their%20internal%20reasoning%20has%20drifted.%20A%20confident%20answer%20can%20conceal%20uncertainty%2C%20speculation%2C%20or%20inconsistency%2C%20and%20small%20changes%20in%20phrasing%20can%20lead%20to%20different%20conclusions.%20This%20makes%20LLMs%20useful%20assistants%20but%20unreliable%20partners%20in%20high-stakes%20contexts.%0A%20%20Humans%20exhibit%20a%20similar%20weakness%2C%20often%20mistaking%20fluency%20for%20reliability.%20When%20a%20model%20responds%20smoothly%2C%20users%20tend%20to%20trust%20it%2C%20even%20when%20both%20model%20and%20user%20are%20drifting%20together.%20This%20paper%20is%20the%20first%20in%20a%20five-paper%20research%20series%20on%20stabilising%20human-AI%20reasoning.%20The%20series%20proposes%20a%20two-layer%20approach%3A%20Parts%20II-IV%20introduce%20human-side%20mechanisms%20such%20as%20uncertainty%20cues%2C%20conflict%20surfacing%2C%20and%20auditable%20reasoning%20traces%2C%20while%20Part%20 {"title": "Dense Neural Networks are not Universal Approximators", "author": "Levi Rauchwerger and Stefanie Jegelka and Ron Levie", "abstract": "We investigate the approximation capabilities of dense neural networks. While universal approximation theorems establish that sufficiently large architectures can approximate arbitrary continuous functions if there are no restrictions on the weight values, we show that dense neural networks do not possess this universality. Our argument is based on a model compression approach, combining the weak regularity lemma with an interpretation of feedforward networks as message passing graph neural networks. We consider ReLU neural networks subject to natural constraints on weights and input and output dimensions, which model a notion of dense connectivity. Within this setting, we demonstrate the existence of Lipschitz continuous functions that cannot be approximated by such networks. This highlights intrinsic limitations of neural networks with dense layers and motivates the use of sparse connectivity as a necessary ingredient for achieving true universality.", "link": "http://arxiv.org/abs/2602.07618v3", "date": "2026-04-16", "relevancy": 1.2633, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4292}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4188}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4187}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Dense%20Neural%20Networks%20are%20not%20Universal%20Approximators&body=Title%3A%20Dense%20Neural%20Networks%20are%20not%20Universal%20Approximators%0AAuthor%3A%20Levi%20Rauchwerger%20and%20Stefanie%20Jegelka%20and%20Ron%20Levie%0AAbstract%3A%20We%20investigate%20the%20approximation%20capabilities%20of%20dense%20neural%20networks.%20While%20universal%20approximation%20theorems%20establish%20that%20sufficiently%20large%20architectures%20can%20approximate%20arbitrary%20continuous%20functions%20if%20there%20are%20no%20restrictions%20on%20the%20weight%20values%2C%20we%20show%20that%20dense%20neural%20networks%20do%20not%20possess%20this%20universality.%20Our%20argument%20is%20based%20on%20a%20model%20compression%20approach%2C%20combining%20the%20weak%20regularity%20lemma%20with%20an%20interpretation%20of%20feedforward%20networks%20as%20message%20passing%20graph%20neural%20networks.%20We%20consider%20ReLU%20neural%20networks%20subject%20to%20natural%20constraints%20on%20weights%20and%20input%20and%20output%20dimensions%2C%20which%20model%20a%20notion%20of%20dense%20connectivity.%20Within%20this%20setting%2C%20we%20demonstrate%20the%20existence%20of%20Lipschitz%20continuous%20functions%20that%20cannot%20be%20approximated%20by%20such%20networks.%20This%20highlights%20intrinsic%20limitations%20of%20neural%20networks%20with%20dense%20layers%20and%20motivates%20the%20use%20of%20sparse%20connectivity%20as%20a%20necessary%20ingredient%20for%20achieving%20true%20universality.%0ALink%3A%20http%3A//arxiv.org/abs/2602.07618v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDense%2520Neural%2520Networks%2520are%2520not%2520Universal%2520Approximators%26entry.906535625%3DLevi%2520Rauchwerger%2520and%2520Stefanie%2520Jegelka%2520and%2520Ron%2520Levie%26entry.1292438233%3DWe%2520investigate%2520the%2520approximation%2520capabilities%2520of%2520dense%2520neural%2520networks.%2520While%2520universal%2520approximation%2520theorems%2520establish%2520that%2520sufficiently%2520large%2520architectures%2520can%2520approximate%2520arbitrary%2520continuous%2520functions%2520if%2520there%2520are%2520no%2520restrictions%2520on%2520the%2520weight%2520values%252C%2       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

PYQ/viewform?entry.1380929848=Beyond%20Independent%20Frames%3A%20Latent%20Attention%20Masked%20Autoencoders%20for%20Multi-View%20Echocardiography&entry.906535625=Simon%20B%C3%B6hi%20and%20Irene%20Cannistraci%20and%20Sergio%20Mu%C3%B1oz%20Gonzalez%20and%20Moritz%20Vandenhirtz%20and%20Sonia%20Laguna%20and%20Samuel%20Ruiperez-Campillo%20and%20Max%20Kr%C3%A4henmann%20and%20Andrea%20Agostini%20and%20Ece%20Ozkan%20and%20Thomas%20M.%20Sutter%20and%20Julia%20E.%20Vogt&entry.1292438233=Echocardiography%20is%20a%20widely%20used%20modality%20for%20cardiac%20assessment%20due%20to%20its%20non-invasive%20and%20cost-effective%20nature%2C%20but%20the%20sparse%20and%20heterogeneous%20spatiotemporal%20views%20of%20the%20heart%20pose%20distinct%20challenges.%20Existing%20masked%20autoencoder%20%28MAE%29%20approaches%20typically%20process%20images%20or%20short%20clips%20independently%2C%20failing%20to%20capture%20the%20inherent%20multi-view%20structure%20required%20for%20coherent%20cardiac%20representation.%20We%20introduce%20Latent%20Attention%20Masked%20Autoencoder%20%28LAMAE%29%2C%20a%20foundation%20model%20architecture%20tailored%20to%20the%20multi-view%20nature%20of%20medical%20imaging.%20LAMAE%20augments%20the%20standard%20MAE%20with%20a%20latent%20attention%20module%20that%20enables%20information%20exchange%20across%20frames%20and%20views%20directly%20in%20latent%20space.%20This%20allows%20the%20model%20to%20aggregate%20variable-length%20sequences%20and%20distinct%20views%2C%20reconstructing%20a%20holistic%20representation%20of%20cardiac%20function%20from%20partial%20observations.%20We%20pretrain%20LAMAE%20on%20MIMIC-IV-ECHO%2C%20a%20large-scale%2C%20uncurated%20dataset%20reflecting%20real-world%20clinical%20variability.%20To%20the%20best%20of%20our%20knowledge%2C%20we%20present%20the%20first%20results%20for%20predicting%20ICD-10%20codes%20from%20MIMIC-IV-ECHO%20videos.%20Furthermore%2C%20we%20empirically%20demonstrate%20that%20representations%20learned%20from%20adult%20data%20t {"title": "Reasoning Dynamics and the Limits of Monitoring Modality Reliance in Vision-Language Models", "author": "Danae S\u00e1nchez Villegas and Samuel Lewis-Lim and Nikolaos Aletras and Desmond Elliott", "abstract": "Recent advances in vision language models (VLMs) offer reasoning capabilities, yet how these unfold and integrate visual and textual information remains unclear. We analyze reasoning dynamics in 18 VLMs covering instruction-tuned and reasoning-trained models from two different model families. We track confidence over Chain-of-Thought (CoT), measure the corrective effect of reasoning, and evaluate the contribution of intermediate reasoning steps. We find that models are prone to answer inertia, in which early commitments to a prediction are reinforced, rather than revised during reasoning steps. While reasoning-trained models show stronger corrective behavior, their gains depend on modality conditions, from text-dominant to vision-only settings. Using controlled interventions with misleading textual cues, we show that models are consistently influenced by these cues even when visual evidence is sufficient, and assess whether this influence is recoverable from CoT. Although this influence can appear in the CoT, its detectability varies across models and depends on what is being monitored. Reasoning-trained models are more likely to explicitly refer to the cues, but their longer and fluent CoTs can still appear visually grounded while actually following textual cues, obscuring modality reliance. In contrast, instruction-tuned models refer to the cues less explicitly, but their shorter traces reveal inconsistencies with the visual input. Taken together, these findings indicate that CoT provides only a partial view of how different modalities drive VLM decisions, with important implications for the transparency and safety of multimodal systems.", "link": "http://arxiv.org/abs/2604.14888v1", "date": "2026-04-16", "relevancy": 2.2786, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5782}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5782}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5266}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Reasoning%20Dynamics%20and%20the%20Limits%20of%20Monitoring%20Modality%20Reliance%20in%20Vision-Language%20Models&body=Title%3A%20Reasoning%20Dynamics%20and%20the%20Limits%20of%20Monitoring%20Modality%20Reliance%20in%20Vision-Language%20Models%0AAuthor%3A%20Danae%20S%C3%A1nchez%20Villegas%20and%20Samuel%20Lewis-Lim%20and%20Nikolaos%20Aletras%20and%20Desmond%20Elliott%0AAbstract%3A%20Recent%20advances%20in%20vision%20language%20models%20%28VLMs%29%20offer%20reasoning%20capabilities%2C%20yet%20how%20these%20unfold%20and%20integrate%20visual%20and%20textual%20information%20remains%20unclear.%20We%20analyze%20reasoning%20dynamics%20in%2018%20VLMs%20covering%20instruction-tuned%20and%20reasoning-trained%20models%20from%20two%20different%20model%20families.%20We%20track%20confidence%20over%20Chain-of-Thought%20%28CoT%29%2C%20measure%20the%20corrective%20effect%20of%20reasoning%2C%20and%20evaluate%20the%20contribution%20of%20intermediate%20reasoning%20steps.%20We%20find%20that%20models%20are%20prone%20to%20answer%20inertia%2C%20in%20which%20early%20commitments%20to%20a%20prediction%20are%20reinforced%2C%20rather%20than%20revised%20during%20reasoning%20steps.%20While%20reasoning-trained%20models%20show%20stronger%20corrective%20behavior%2C%20their%20gains%20depend%20on%20modality%20conditions%2C%20from%20text-dominant%20to%20vision-only%20settings.%20Using%20controlled%20interventions%20with%20misleading%20textual%20cues%2C%20we%20show%20that%20models%20are%20consistently%20influenced%20by%20these%20cues%20even%20when%20visual%20evidence%20is%20sufficient%2C%20and%20assess%20whether%20this%20influence%20is%20recoverable%20from%20CoT.%20Although%20this%20influence%20can%20appear%20in%20the%20CoT%2C%20its%20detectability%20varies%20across%20models%20and%20depends%20on%20what%20is%20being%20monitored.%20Reasoning-trained%20models%20are%20more%20likely%20to%20explicitly%20refer%20to%20the%20cues%2C%20but%20their%20longer%20and%20fluent%20CoTs%20can%20still%20appear%20visually%20grounded%20while%20actually%20following%20textual%20cues%2C%20obscuring%20modality%20reliance.%20In%20contrast%2C%20instruction-tuned%20models%20refer%20to%20the%20cues%20less%20explicitly%2C%20but%20their%20shorter%20traces%20reveal%20inconsistencies%20with%20the%20visual%20input.%20Taken%20together%2C%20these%20findings%20indicate%20that%20CoT%20provides%20only%20a%20partial%20view%20of%20how%20different%20modalities%20drive%20VLM%20decisions%2C%20with%20important%20implications%20for%20the%20transparency%20and%20safety%20of%20multimodal%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14888v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReasoning%2520Dynamics%2520and%2520the%2520Limits%2520of%2520Monitoring%2520Modality%2520Reliance%2520in%2520Vision-Language%2520Models%26entry.906535625%3DDanae%2520S%25C3%25A1nchez%2520Villegas%2520and%2520Samuel%2520Lewis-Lim%2520and%2520Nikolaos%2520Aletras%2520and%2520Desmond%2520Elliott%26entry.1292438233%3DRecent%2520advances%2520in%2520vision%2520language%2520models%2520%2528VLMs%2529%2520offer%2520reasoning%2520capabilities%252C%2520yet%2520how%2520these%2520unfold%2520and%2520integrate%2520visual%2520and%2520textual%2520information%2520remains%2520unclear.%2520We%2520analyze%2520reasoning%2520dynamics%2520in%252018%2520VLMs%2520covering%2520instruction-tuned%2520and%25 ese%2520findings%2520indicate%2520that%2520CoT%2520provides%2520only%2520a%2520partial%2520view%2520of%2520how%2520different%2520modalities%2520drive%2520VLM%2520decisions%252C%2520with%2520important%2520implications%2520for%2520the%2520transparency%2520and%2520safety%2520of%2520multimodal%2520systems.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.14888v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Reasoning%20Dynamics%20and%20the%20Limits%20of%20Monitoring%20Modality%20Reliance%20in%20Vision-Language%20Models&entry.906535625=Danae%20S%C3%A1nchez%20Villegas%20and%20Samuel%20Lewis-Lim%20and%20Nikolaos%20Aletras%20and%20Desmond%20Elliott&entry.1292438233=Recent%20advances%20in%20vision%20language%20models%20%28VLMs%29%20offer%20reasoning%20capabilities%2C%20yet%20how%20these%20unfold%20and%20integrate%20visual%20and%20textual%20information%20remains%20unclear.%20We%20analyze%20reasoning%20dynamics%20in%2018%20VLMs%20covering%20instruction-tuned%20and%20reasoning-trained%20models%20from%20two%20different%20model%20families.%20We%20track%20confidence%20over%20Chain-of-Thought%20%28CoT%29%2C%20measure%20the%20corrective%20effect%20of%20reasoning%2C%20and%20evaluate%20the%20contribution%20of%20intermediate%20reasoning%20steps.%20We%20find%20that%20models%20are%20prone%20to%20answer%20inertia%2C%20in%20which%20early%20commitments%20to%20a%20prediction%20are%20reinforced%2C%20rather%20than%20revised%20during%20reasoning%20steps.%20While%20reasoning-trained%20models%20show%20stronger%20corrective%20behavior%2C%20their%20gains%20depend%20on%20modality%20conditions%2C%20from%20text-dominant%20to%20vision-only%20settings.%20Using%20controlled%20interventions%20with%20misleading%20textual%20cues%2C%20we%20show%20that%20models%20are%20consistently%20influenced%20by%20these%20cues%20even%20when%20visual%20evidence%20is%20sufficient%2C%20and%20assess%20whether%20this%20 {"title": "HRDexDB: A Large-Scale Dataset of Dexterous Human and Robotic Hand Grasps", "author": "Jongbin Lim and Taeyun Ha and Mingi Choi and Jisoo Kim and Byungjun Kim and Subin Jeon and Hanbyul Joo", "abstract": "We present HRDexDB, a large-scale, multi-modal dataset of high-fidelity dexterous grasping sequences featuring both human and diverse robotic hands. Unlike existing datasets, HRDexDB provides a comprehensive collection of grasping trajectories across human hands and multiple robot hand embodiments, spanning 100 diverse objects. Leveraging state-of-the-art vision methods and a new dedicated multi-camera system, our HRDexDB offers high-precision spatiotemporal 3D ground-truth motion for both the agent and the manipulated object. To facilitate the study of physical interaction, HRDexDB includes high-resolution tactile signals, synchronized multi-view video, and egocentric video streams. The dataset comprises 1.4K grasping trials, encompassing both successes and failures, each enriched with visual, kinematic, and tactile modalities. By providing closely aligned captures of human dexterity and robotic execution on the same target objects under comparable grasping motions, HRDexDB serves as a foundational benchmark for multi-modal policy learning and cross-domain dexterous manipulation.", "link": "http://arxiv.org/abs/2604.14944v1", "date": "2026-04-16", "relevancy": 2.2757, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.6331}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5549}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5103}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HRDexDB%3A%20A%20Large-Scale%20Dataset%20of%20Dexterous%20Human%20and%20Robotic%20Hand%20Grasps&body=Tit {"title": "An Analysis of Regularization and Fokker-Planck Residuals in Diffusion Models for Image Generation", "author": "Onno Niemann and Gonzalo Mart\u00ednez Mu\u00f1oz and Alberto Su\u00e1rez Gonzalez", "abstract": "Recent work has shown that diffusion models trained with the denoising score matching (DSM) objective often violate the Fokker--Planck (FP) equation that governs the evolution of the true data density. Directly penalizing these deviations in the objective function reduces their magnitude but introduces a significant computational overhead. It is also observed that enforcing strict adherence to the FP equation does not necessarily lead to improvements in the quality of the generated samples, as often the best results are obtained with weaker FP regularization. In this paper, we investigate whether simpler penalty terms can provide similar benefits. We empirically analyze several lightweight regularizers, study their effect on FP residuals and generation quality, and show that the benefits of FP regularization are available at substantially lower computational cost. Our code is available at https://github.com/OnnoNiemann/fp_diffusion_analysis.", "link": "http://arxiv.org/abs/2604.15171v1", "date": "2026-04-16", "relevancy": 2.2708, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5863}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5683}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5597}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20An%20Analysis%20of%20Regularization%20and%20Fokker-Planck%20Residuals%20in%20Diffusion%20Models%20for%20Image%20Generation&body=Title%3A%20An%20Analysis%20of%20Regularization%20and%20 {"title": "4D Radar Gaussian Modeling and Scan Matching with RCS", "author": "Fernando Amodeo and Luis Merino and Fernando Caballero", "abstract": "4D millimeter-wave (mmWave) radars are increasingly used in robotics, as they offer robustness against adverse environmental conditions. Besides the usual XYZ position, they provide Doppler velocity measurements as well as Radar Cross Section (RCS) information for every point. While Doppler is widely used to filter out dynamic points, RCS is often overlooked and not usually used in modeling and scan matching processes. Building on previous 3D Gaussian modeling and scan matching work, we propose incorporating the physical behavior of RCS in the model, in order to further enrich the summarized information about the scene, and improve the scan matching process.", "link": "http://arxiv.org/abs/2604.14868v1", "date": "2026-04-16", "relevancy": 2.2665, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6198}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5342}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5148}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%204D%20Radar%20Gaussian%20Modeling%20and%20Scan%20Matching%20with%20RCS&body=Title%3A%204D%20Radar%20Gaussian%20Modeling%20and%20Scan%20Matching%20with%20RCS%0AAuthor%3A%20Fernando%20Amodeo%20and%20Luis%20Merino%20and%20Fernando%20Caballero%0AAbstract%3A%204D%20millimeter-wave%20%28mmWave%29%20radars%20are%20increasingly%20used%20in%20robotics%2C%20as%20they%20offer%20robustness%20against%20adverse%20environmental%20conditions.%20Besides%20the%20usual%20XYZ%20position%2C%20they%20provide%20Doppler%20velocity%20 ummarized%2520information%2520about%2520the%2520scene%252C%2520and%2520improve%2520the%2520scan%2520matching%2520process.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.14868v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=4D%20Radar%20Gaussian%20Modeling%20and%20Scan%20Matching%20with%20RCS&entry.906535625=Fernando%20Amodeo%20and%20Luis%20Merino%20and%20Fernando%20Caballero&entry.1292438233=4D%20millimeter-wave%20%28mmWave%29%20radars%20are%20increasingly%20used%20in%20robotics%2C%20as%20they%20offer%20robustness%20against%20adverse%20environmental%20conditions.%20Besides%20the%20usual%20XYZ%20position%2C%20they%20provide%20Doppler%20velocity%20measurements%20as%20well%20as%20Radar%20Cross%20Section%20%28RCS%29%20information%20for%20every%20point.%20While%20Doppler%20is%20widely%20used%20to%20filter%20out%20dynamic%20points%2C%20RCS%20is%20often%20overlooked%20and%20not%20usually%20used%20in%20modeling%20and%20scan%20matching%20processes.%20Building%20on%20previous%203D%20Gaussian%20modeling%20and%20scan%20matching%20work%2C%20we%20propose%20incorporating%20the%20physical%20behavior%20of%20RCS%20in%20the%20model%2C%20in%20order%20to%20further%20enrich%20the%20summarized%20information%20about%20the%20scene%2C%20and%20improve%20the%20scan%20matching%20process.&entry.1838667208=http%3A//arxiv.org/abs/2604.14868v1&entry.124074799=Read"},
{"title": "How Embeddings Shape Graph Neural Networks: Classical vs Quantum-Oriented Node Representations", "author": "Nouhaila Innan and Antonello Rosato and Alberto Marchisio and Muhammad Shafique", "abstract": "Node embeddings act as the information interface for graph neural networks, yet their empirical impact is often reported under mismatched backbones, splits, and training budgets. This paper provides a controlled benchmark of embedding choices for graph classification, comparing classical baselines with quantum-oriented node representations under a unified pipeline. We evaluate two classical baselines alongside quantum-oriented alternatives, including a circuit-defined variational embedding and quantum-inspired embeddings computed via graph operators and linear-algebraic constructions. All variants are trained and tested with the same backbone, stratified splits, identical optimization and early stopping, and consistent metrics. Experiments on five different TU datasets and on QM9 converted to classification via target binning show clear dataset dependence: quantum-oriented embeddings yield the most consistent gains on structure-driven benchmarks, while social graphs with limited node attributes remain well served by classical baselines. The study highlights practical trade-offs between inductive bias, trainability, and stability under a fixed training budget, and offers a reproducible reference point for selecting quantum-oriented embeddings in graph learning.", "link": "http://arxiv.org/abs/2604.15273v1", "date": "2026-04-16", "relevancy": 2.2661, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4567}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4567}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index {"title": "Beyond Literal Summarization: Redefining Hallucination for Medical SOAP Note Evaluation", "author": "Bhavik Vachhani and Kush Shrisvastava and Pranshu Nema and Sai Chiranthan", "abstract": "Evaluating large language models (LLMs) for clinical documentation tasks such as SOAP note generation remains challenging. Unlike standard summarization, these tasks require clinical abstraction, normalization of colloquial language, and medically grounded inference. However, prevailing evaluation methods including automated metrics and LLM as judge frameworks rely on lexical faithfulness, often labeling any information not explicitly present in the transcript as hallucination.\n  We show that such approaches systematically misclassify clinically valid outputs as errors, inflating hallucination rates and distorting model assessment. Our analysis reveals that many flagged hallucinations correspond to legitimate clinical transformations, including synonym mapping, abstraction of examination findings, diagnostic inference, and guideline consistent care planning.\n  By aligning evaluation criteria with clinical reasoning through calibrated prompting and retrieval grounded in medical ontologies we observe a significant shift in outcomes. Under a lexical evaluation regime, the mean hallucination rate is 35%, heavily penalizing valid reasoning. With inference aware evaluation, this drops to 9%, with remaining cases reflecting genuine safety concerns. These findings suggest that current evaluation practices over penalize valid clinical reasoning and may measure artifacts of evaluation design rather than true errors, underscoring the need for clinically informed evaluation in high context domains like medicine.", "link": "http://arxiv.org/abs/2604.14829v1", "date": "2026-04-16", "relevancy": 2.2646, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4584}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4584}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.4419}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Literal%20Summarization%3A%20Redefining%20Hallucination%20for%20Medical%20SOAP%20Note%20Evaluation&body=Title%3A%20Beyond%20Literal%20Summarization%3A%20Redefining%20Hallucination%20for%20Medical%20SOAP%20Note%20Evaluation%0AAuthor%3A%20Bhavik%20Vachhani%20and%20Kush%20Shrisvastava%20and%20Pranshu%20Nema%20and%20Sai%20Chiranthan%0AAbstract%3A%20Evaluating%20large%20language%20models%20%28LLMs%29%20for%20clinical%20documentation%20tasks%20such%20as%20SOAP%20note%20generation%20remains%20challenging.%20Unlike%20standard%20summarization%2C%20these%20tasks%20require%20clinical%20abstraction%2C%20normalization%20of%20colloquial%20language%2C%20and%20medically%20grounded%20inference.%20However%2C%20prevailing%20evaluation%20methods%20including%20automated%20metrics%20and%20LLM%20as%20judge%20frameworks%20rely%20on%20lexical%20faithfulness%2C%20often%20labeling%20any%20information%20not%20explicitly%20present%20in%20the%20transcript%20as%20hallucination.%0A%20%20We%20show%20that%20such%20approaches%20systematically%20misclassify%20clinically%20valid%20outputs%20as%20errors%2C%20inflating%20hallucination%20rates%20and%20distorting%20model%20assessment.%20Our%20analysis%20reveals%20that%20many%20flagged%20hallucinations%20correspond%20to%20legitimate%20clinical%20transformations%2C%20including%20synonym%20mapping%2C%20abstraction%20of%20examination%20findings%2C%20diagnostic%20inference%2C%20and%20guideline%20consistent%20care%20planning.%0A%20%20By%20aligning%20evaluation%20criteria%20with%20clinical%20reasoning%20through%20calibrated%20prompting%20and%20retrieval%20grounded%20in%20medical%20ontologies%20we%20observe%20a%20significant%20shift%20in%20outcomes.%20Under%20a%20lexical%20evaluation%20regime%2C%20the%20mean%20hallucination%20rate%20is%2035%25%2C%20heavily%20penalizing%20valid%20reasoning.%20With%20inference%20aware%20evaluation%2C%20this%20drops%20to%209%25%2C%20with%20remaining%20cases%20reflecting%20genuine%20safety%20concerns.%20These%20findings%20suggest%20that%20current%20evaluation%20practices%20over%20penalize%20valid%20clinical%20reasoning%20and%20may%20measure%20artifacts%20of%20evaluation%20design%20rather%20than%20true%20errors%2C%20underscoring%20the%20need%20for%20clinically%20informed%20evaluation%20in%20high%20context%20domains%20like%20medicine.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14829v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520Literal%2520Summarization%253A%2520Redefining%2520Hallucination%2520for%2520Medical%2520SOAP%2520Note%2520Evaluation%26entry.906535625%3DBhavik%2520Vachhani%2520and%2520Kush%2520Shrisvastava%2520and%2520Pranshu%2520Nema%2520and%2520Sai%2520Chiranthan%26entry.1292438233%3DEvaluating%2520large%2520language%2520models%2520%2528LLMs%2529%2520for%2520clinical%2520documentation%2520tasks%2520such%2520as%2520SOAP%2520note%2520generation%2520remains%2520challenging.%2520Unlike%2520standard%2520summarization%252C%2520these%2520tasks%2520require%2520clinical%2520abstraction%252C%2520normalization%2520of%2520colloquial%2520language%252C%2520and%2520medically%2520grounded%2520inference.%2520However%252C%2520prevailing%2520evaluation%2520methods%2520including%2520automated%2520metrics%2520and%2520LLM%2520as%2520judge%2520frameworks%2520rely%2520on%2520lexical%2520faithfulness%252C%2520often%2520labeling%2520any%2520information%2520not%2520explicitly%2520present%2520in%2520the%2520transcri {"title": "AdaSplash-2: Faster Differentiable Sparse Attention", "author": "Nuno Gon\u00e7alves and Hugo Pitorro and Vlad Niculae and Edoardo Ponti and Lei Li and Andre Martins and Marcos Treviso", "abstract": "Sparse attention has been proposed as a way to alleviate the quadratic cost of transformers, a central bottleneck in long-context training. A promising line of work is $\u03b1$-entmax attention, a differentiable sparse alternative to softmax that enables input-dependent sparsity yet has lagged behind softmax due to the computational overhead necessary to compute the normalizer $\u03c4$. In this paper, we introduce AdaSplash-2, which addresses this limitation through a novel histogram-based initialization that reduces the number of iterations needed to compute $\u03c4$ to typically 1--2. The key idea is to compute a coarse histogram of attention scores on the fly and store it in on-chip SRAM, yielding a more accurate initialization that enables fast forward and backward computation. Combined with a sparsity-aware GPU implementation that skips zero blocks with low overhead, AdaSplash-2 matches or improves per-step training time relative to FlashAttention-2 when block sparsity is moderate-to-high (e.g., $>$60\\%), which often occurs at long-context lengths. On downstream tasks, models trained with our efficient $\u03b1$-entmax attention match softmax baselines at short-context lengths and achieve substantial gains in long-context settings.", "link": "http://arxiv.org/abs/2604.15180v1", "date": "2026-04-16", "relevancy": 2.2641, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.6315}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5655}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer. x%20baselines%20at%20short-context%20lengths%20and%20achieve%20substantial%20gains%20in%20long-context%20settings.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15180v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAdaSplash-2%253A%2520Faster%2520Differentiable%2520Sparse%2520Attention%26entry.906535625%3DNuno%2520Gon%25C3%25A7alves%2520and%2520Hugo%2520Pitorro%2520and%2520Vlad%2520Niculae%2520and%2520Edoardo%2520Ponti%2520and%2520Lei%2520Li%2520and%2520Andre%2520Martins%2520and%2520Marcos%2520Treviso%26entry.1292438233%3DSparse%2520attention%2520has%2520been%2520proposed%2520as%2520a%2520way%2520to%2520alleviate%2520the%2520quadratic%2520cost%2520of%2520transformers%252C%2520a%2520central%2520bottleneck%2520in%2520long-context%2520training.%2520A%2520promising%2520line%2520of%2520work%2520is%2520%2524%25CE%25B1%2524-entmax%2520attention%252C%2520a%2520differentiable%2520sparse%2520alternative%2520to%2520softmax%2520that%2520enables%2520input-dependent%2520sparsity%2520yet%2520has%2520lagged%2520behind%2520softmax%2520due%2520to%2520the%2520computational%2520overhead%2520necessary%2520to%2520compute%2520the%2520normalizer%2520%2524%25CF%2584%2524.%2520In%2520this%2520paper%252C%2520we%2520introduce%2520AdaSplash-2%252C%2520which%2520addresses%2520this%2520limitation%2520through%2520a%2520novel%2520histogram-based%2520initialization%2520that%2520reduces%2520the%2520number%2520of%2520iterations%2520needed%2520to%2520compute%2520%2524%25CF%2584%2524%2520to%2520typically%25201--2.%2520The%2520key%2520idea%2520is%2520to%2520compute%2520a%2520coarse%2520histogram%2520of%2520attention%2520scores%2520on%2520the%2520fly%2520and%2520store%2520it%2520in%2520on-chip%2520SRAM%252C%2520yielding%2520a%2520more%2520accurate%2520initialization%2520that%2520enables%2520fast%2520forward%2520and%2520backward%2520computation.%2520Combined%2520with%2520a%2520sparsity-aware%2520GPU%2520implementation%2520th {"title": "CAVERS: Multimodal SLAM Data from a Natural Karstic Cave with Ground Truth Motion Capture", "author": "Giacomo Franchini and David Rodr\u00edguez-Mart\u00ednez and Alfonso Mart\u00ednez-Petersen and C. J. P\u00e9rez-del-Pulgar and Marcello Chiaberge", "abstract": "Autonomous robots operating in natural karstic caves face perception and navigation challenges that are qualitatively distinct from those encountered in mines or tunnels: irregular geometry, reflective wet surfaces, near-zero ambient light, and complex branching passages. Yet publicly available datasets targeting this environment remain scarce and offer limited sensing modalities and environmental diversity. We present CAVERS, a multimodal dataset acquired in two structurally distinct rooms of Cueva de la Victoria, M\u00e1laga, Spain, comprising 24 sequences totaling approximately 335 GB of recorded data. The sensor suite combines an Intel RealSense D435i RGB-D-I camera, an Optris PI640i near-IR thermal camera, and a Velodyne VLP-16 LiDAR, operated both handheld and mounted on a wheeled rover under full darkness and artificial illumination. For most of the sequences, mm-accurate 6-DoF ground truth pose and velocity at 120 Hz are provided by an Optirack motion capture system installed directly inside the cave. We benchmark seven state-of-the-art SLAM and odometry algorithms spanning visual, visual-inertial, thermal-inertial, and LiDAR-based pipelines, as well as a 3D reconstruction pipeline, demonstrating the dataset's usability. %The dataset and all supplementary material are publicly available at: https://github.com/spaceuma/cavers.", "link": "http://arxiv.org/abs/2604.15052v1", "date": "2026-04-16", "relevancy": 2.2582, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5708}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5697}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5562}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CAVERS%3A%20Multimodal%20SLAM%20Data%20from%20a%20Natural%20Karstic%20Cave%20with%20Ground%20Truth%20Motion%20Capture&body=Title%3A%20CAVERS%3A%20Multimodal%20SLAM%20Data%20from%20a%20Natural%20Karstic%20Cave%20with%20Ground%20Truth%20Motion%20Capture%0AAuthor%3A%20Giacomo%20Franchini%20and%20David%20Rodr%C3%ADguez-Mart%C3%ADnez%20and%20Alfonso%20Mart%C3%ADnez-Petersen%20and%20C.%20J.%20P%C3%A9rez-del-Pulgar%20and%20Marcello%20Chiaberge%0AAbstract%3A%20Autonomous%20robots%20operating%20in%20natural%20karstic%20caves%20face%20perception%20and%20navigation%20challenges%20that%20are%20qualitatively%20distinct%20from%20those%20encountered%20in%20mines%20or%20tunnels%3A%20irregular%20geometry%2C%20reflective%20wet%20surfaces%2C%20near-zero%20ambient%20light%2C%20and%20complex%20branching%20passages.%20Yet%20publicly%20available%20datasets%20targeting%20this%20environment%20remain%20scarce%20and%20offer%20limited%20sensing%20modalities%20and%20environmental%20diversity.%20We%20present%20CAVERS%2C%20a%20multimodal%20dataset%20acquired%20in%20two%20structurally%20distinct%20rooms%20of%20Cueva%20de%20la%20Victoria%2C%20M%C3%A1laga%2C%20Spain%2C%20comprising%2024%20sequences%20totaling%20approximately%20335%20GB%20of%20recorded%20data.%20The%20sensor%20suite%20combines%20an%20Intel%20RealSense%20D435i%20RGB-D-I%20camera%2C%20an%20Optris%20PI640i%20near-IR%20thermal%20camera%2C%20and%20a%20Velodyne%20VLP-16%20LiDAR%2C%20operated%20both%20handheld%20and%20mounted%20on%20a%20wheeled%20rover%20under%20full%20darkness%20and%20artificial%20illumination.%20For%20most%20of%20the%20sequences%2C%20mm-accurate%206-DoF%20ground%20truth%20pose%20and%20velocity%20at%20120%20Hz%20are%20provided%20by%20an%20Optirack%20motion%20capture%20system%20installed%20directly%20inside%20the%20cave.%20We%20benchmark%20seven%20state-of-the-art%20SLAM%20and%20odometry%20algorithms%20spanning%20visual%2C%20visual-inertial%2C%20thermal-inertial%2C%20and%20LiDAR-based%20pipelines%2C%20as%20well%20as%20a%203D%20reconstruction%20pipeline%2C%20demonstrating%20the%20dataset%27s%20usability.%20%25The%20dataset%20and%20all%20supplementary%20material%20are%20publicly%20available%20at%3A%20https%3A//github.com/spaceuma/cavers.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15052v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCAVERS%253A%2520Multimodal%2520SLAM%2520Data%2520from%2520a%2520Natural%2520Karstic%2520Cave%2520with%2520Ground%2520Truth%2520Motion%2520Capture%26entry.906535625%3DGiacomo%2520Franchini%2520and%2520David%2520Rodr%25C3%25ADguez-Mart%25C3%25ADnez%2520and%2520Alfonso%2520Mart%25C3%25ADnez-Petersen%2520and%2520C.%2520J.%2520P%25C3%25A9rez-del-Pulgar%2520and%2520Marcello%2520Chiaberge%26entry.1292438233%3DAutonomous%2520robots%2520operating%2520in%2520natural%2520karstic%2520caves%2520face%2520perception%2520and%2520navigation%2520challenges%2520that%2520are%2520qualitatively%2520distinct%2520from%2520those%2520encountered%2520in%2520mines%2520or%2520tunnels%253A%2520irregular%2520geometry%252C%2520reflective%2520wet%2520surfaces%252C%2520near-zero%2520ambient%2520light%252C%2520and%2520complex%2520branching%2520passages.%2520Yet%2520publicly%2520available%2520datasets%2520targeting%2520this%2520environment%2520remain%2520scarce%2520and%2520offer%2520limited%2520sensing%2520modalities%2520and%2520environmental%2520diversity.%2520We%2520present%2520CAVERS%252C%2520a%2520multimodal%2520dataset%2520acquired%2520in%2520two%2520structurally%2520distinct%2520rooms%2520of%2520Cueva%2520de%2520la%2520Victoria%252C%2520M%25C3%25A1laga%252C%2520Spain%252C%2520comprising%252024%2520s {"title": "ControlFoley: Unified and Controllable Video-to-Audio Generation with Cross-Modal Conflict Handling", "author": "Jianxuan Yang and Xinyue Guo and Zhi Cheng and Kai Wang and Lipan Zhang and Jinjie Hu and Qiang Ji and Yihua Cao and Yihao Meng and Zhaoyue Cui and Mengmei Liu and Meng Meng and Jian Luan", "abstract": "Recent advances in video-to-audio (V2A) generation enable high-quality audio synthesis from visual content, yet achieving robust and fine-grained controllability remains challenging. Existing methods suffer from weak textual controllability under visual-text conflict and imprecise stylistic control due to entangled temporal and timbre information in reference audio. Moreover, the lack of standardized benchmarks limits systematic evaluation.\n  We propose ControlFoley, a unified multimodal V2A framework that enables precise control over video, text, and reference audio. We introduce a joint visual encoding paradigm that integrates CLIP with a spatio-temporal audio-visual encoder to improve alignment and textual controllability. We further propose temporal-timbre decoupling to suppress redundant temporal cues while preserving discriminative timbre features. In addition, we design a modality-robust training scheme with unified multimodal representation alignment (REPA) and random modality dropout. We also present VGGSound-TVC, a benchmark for evaluating textual controllability under varying degrees of visual-text conflict.\n  Extensive experiments demonstrate state-of-the-art performance across multiple V2A tasks, including text-guided, text-controlled, and audio-controlled generation. ControlFoley achieves superior controllability under cross-modal conflict while maintaining strong synchronization and audio quality, and shows competitive or better performance compared to an industrial V2A system.\n  Code, models, datasets, and demos are available at: https://yjx-research.github.io/ControlFoley/.", "link": "http://arxiv.org/abs/2604.15086v1", "date": "2026-04-16", "relevancy": 2.2476, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5636}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5611}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5596}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ControlFoley%3A%20Unified%20and%20Controllable%20Video-to-Audio%20Generation%20with%20Cross-Modal%20Conflict%20Handling&body=Title%3A%20ControlFoley%3A%20Unified%20and%20Controllable%20Video-to-Audio%20Generation%20with%20Cross-Modal%20Conflict%20Handling%0AAuthor%3A%20Jianxuan%20Yang%20and%20Xinyue%20Guo%20and%20Zhi%20Cheng%20and%20Kai%20Wang%20and%20Lipan%20Zhang%20and%20Jinjie%20Hu%20and%20Qiang%20Ji%20and%20Yihua%20Cao%20and%20Yihao%20Meng%20and%20Zhaoyue%20Cui%20and%20Mengmei%20Liu%20and%20Meng%20Meng%20and%20Jian%20Luan%0AAbstract%3A%20Recent%20advances%20in%20video-to-audio%20%28V2A%29%20generation%20enable%20high-quality%20audio%20synthesis%20from%20visual%20content%2C%20yet%20achieving%20robust%20and%20fine-grained%20controllability%20remains%20challenging.%20Existing%20methods%20suffer%20from%20weak%20textual%20controllability%20under%20visual-text%20conflict%20and%20imprecise%20stylistic%20control%20due%20to%20entangled%20temporal%20and%20timbre%20information%20in%20reference%20audio.%20Moreover%2C%20the%20lack%20of%20standardized%20benchmarks%20limits%20systematic%20evaluation.%0A%20%20We%20propose%20ControlFoley%2C%20a%20unified%20multimodal%20V2A%20framework%20that%20enables%20precise%20control%20over%20video%2C%20text%2C%20and%20reference%20audio.%20We%20introduce%20a%20joint%20visual%20encoding%20paradigm%20that%20integrates%20CLIP%20with%20a%20spatio-temporal%20audio-visual%20encoder%20to%20improve%20alignment%20and%20textual%20controllability.%20We%20further%20propose%20temporal-timbre%20decoupling%20to%20suppress%20redundant%20temporal%20cues%20while%20preserving%20discriminative%20timbre%20features.%20In%20addition%2C%20we%20design%20a%20modality-robust%20training%20scheme%20with%20unified%20multimodal%20representation%20alignment%20%28REPA%29%20and%20random%20modality%20dropout.%20We%20also%20present%20VGGSound-TVC%2C%20a%20benchmark%20for%20evaluating%20textual%20controllability%20under%20varying%20degrees%20of%20visual-text%20conflict.%0A%20%20Extensive%20experiments%20demonstrate%20state-of-the-art%20performance%20across%20multiple%20V2A%20tasks%2C%20including%20text-guided%2C%20text-controlled%2C%20and%20audio-controlled%20generation.%20ControlFoley%20achieves%20superior%20controllability%20under%20cross-modal%20conflict%20while%20maintaining%20strong%20synchronization%20and%20audio%20quality%2C%20and%20shows%20competitive%20or%20better%20performance%20compared%20to%20an%20industrial%20V2A%20system.%0A%20%20Code%2C%20models%2C%20datasets%2C%20and%20demos%20are%20available%20at%3A%20https%3A//yjx-research.github.io/ControlFoley/.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15086v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DControlFoley%253A%2520Unified%2520and%2520Controllable%2520Video-to-Audio%2520Generation%2520with%2520Cross-Modal%2520Conflict%2520Handling%26entry.906535625%3DJianxuan%2520Yang%2520and%2520Xinyue%2520Guo%2520and%2520Zhi%2520Cheng%2520and%2520Kai%2520Wang%2520and%2520Lipan%2520Zhang%2520and%2520Jinjie%2520Hu%2520and%2520Qiang%2520Ji%2520and%2520Yihua%2520Cao%2520and%2520Yihao%2520Meng%2520and%2520Zhaoyue%2520Cui%2520and%2520Mengmei%2520Liu%2520and%2520Meng%2520Meng%2520and%2520Jian%2520Luan%26entry.1292438233%3DRecent%2520advances%2520in%2520video-to-audio%2520%2528V2A%2529%2520generation%2520enable%2520high-quality%2520audio%2520 {"title": "Cross Paradigm Representation and Alignment Transformer for Image Deraining", "author": "Shun Zou and Yi Zou and Juncheng Li and Guangwei Gao and Guojun Qi", "abstract": "Transformer-based networks have achieved strong performance in low-level vision tasks like image deraining by utilizing spatial or channel-wise self-attention. However, irregular rain patterns and complex geometric overlaps challenge single-paradigm architectures, necessitating a unified framework to integrate complementary global-local and spatial-channel representations. To address this, we propose a novel Cross Paradigm Representation and Alignment Transformer (CPRAformer). Its core idea is the hierarchical representation and alignment, leveraging the strengths of both paradigms (spatial-channel and global-local) to aid image reconstruction. It bridges the gap within and between paradigms, aligning and coordinating them to enable deep interaction and fusion of features. Specifically, we use two types of self-attention in the Transformer blocks: sparse prompt channel self-attention (SPC-SA) and spatial pixel refinement self-attention (SPR-SA). SPC-SA enhances global channel dependencies through dynamic sparsity, while SPR-SA focuses on spatial rain distribution and fine-grained texture recovery. To address the feature misalignment and knowledge differences between them, we introduce the Adaptive Alignment Frequency Module (AAFM), which aligns and interacts with features in a two-stage progressive manner, enabling adaptive guidance and complementarity. This reduces the information gap within and between paradigms. Through this unified cross-paradigm dynamic interaction framework, we achieve the extraction of the most valuable interactive fusion information from the two paradigms. Extensive experiments demonstrate that our model achieves state-of-the-art performance on eight benchmark datasets and further validates CPRAformer's robustness in other image restoration tasks and downstream applications.", "link": "http://arxiv.org/abs/2504.16455v2", "date": "2026-04-16", "relevancy": 2.2268, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5925}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5694}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.5296}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Cross%20Paradigm%20Representation%20and%20Alignment%20Transformer%20for%20Image%20Deraining&body=Title%3A%20Cross%20Paradigm%20Representation%20and%20Alignment%20Transformer%20for%20Image%20Deraining%0AAuthor%3A%20Shun%20Zou%20and%20Yi%20Zou%20and%20Juncheng%20Li%20and%20Guangwei%20Gao%20and%20Guojun%20Qi%0AAbstract%3A%20Transformer-based%20networks%20have%20achieved%20strong%20performance%20in%20low-level%20vision%20tasks%20like%20image%20deraining%20by%20utilizing%20spatial%20or%20channel-wise%20self-attention.%20However%2C%20irregular%20rain%20patterns%20and%20complex%20geometric%20overlaps%20challenge%20single-paradigm%20architectures%2C%20necessitating%20a%20unified%20framework%20to%20integrate%20complementary%20global-local%20and%20spatial-channel%20representations.%20To%20address%20this%2C%20we%20propose%20a%20novel%20Cross%20Paradigm%20Representation%20and%20Alignment%20Transformer%20%28CPRAformer%29.%20Its%20core%20idea%20is%20the%20hierarchical%20representation%20and%20alignment%2C%20leveraging%20the%20strengths%20of%20both%20paradigms%20%28spatial-channel%20and%20global-local%29%20to%20aid%20image%20reconstruction.%20It%20bridges%20the%20gap%20within%20and%20between%20paradigms%2C%20aligning%20and%20coordinating%20them%20to%20enable%20deep%20interaction%20and%20fusion%20of%20features.%20Specifically%2C%20we%20use%20two%20types%20of%20self-attention%20in%20the%20Transformer%20blocks%3A%20sparse%20prompt%20channel%20self-attention%20%28SPC-SA%29%20and%20spatial%20pixel%20refinement%20self-attention%20%28SPR-SA%29.%20SPC-SA%20enhances%20global%20channel%20dependencies%20through%20dynamic%20sparsity%2C%20while%20SPR-SA%20focuses%20on%20spatial%20rain%20distribution%20and%20fine-grained%20texture%20recovery.%20To%20address%20the%20feature%20misalignment%20and%20knowledge%20differences%20between%20them%2C%20we%20introduce%20the%20Adaptive%20Alignment%20Frequency%20Module%20%28AAFM%29%2C%20which%20aligns%20and%20interacts%20with%20features%20in%20a%20two-stage%20progressive%20manner%2C%20enabling%20adaptive%20guidance%20and%20complementarity.%20This%20reduces%20the%20information%20gap%20within%20and%20between%20paradigms.%20Through%20this%20unified%20cross-paradigm%20dynamic%20interaction%20framework%2C%20we%20achieve%20the%20extraction%20of%20the%20most%20valuable%20interactive%20fusion%20information%20from%20the%20two%20paradigms.%20Extensive%20experiments%20demonstrate%20that%20our%20model%20achieves%20state-of-the-art%20performance%20on%20eight%20benchmark%20datasets%20and%20further%20validates%20CPRAformer%27s%20robustness%20in%20other%20image%20restoration%20tasks%20and%20downstream%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2504.16455v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCross%2520Paradigm%2520Representation%2520and%2520Alignment%2520Transformer%2520for%2520Image%2520Deraining%26entry.906535625%3DShun%2520Zou%2520and%2520Yi%2520Zou%2520and%2520Juncheng%2520Li%2520and%2520Guangwei%2520Gao%2520and%2520Guojun%2520Qi%26entry.1292438233%3DTransformer-based%2520networks%2520have%2520achieved%2520strong%2520performance%2520in%2520low-level%2520vision%2520tasks%2520like%2520image%2520deraining%2520by%2520utilizing%2520spatial%2520or%2520channel-wise%2520self-attention.%2520However%252C%2520irregular%252 {"title": "Beyond the Laplacian: Doubly Stochastic Matrices for Graph Neural Networks", "author": "Zhaobo Hu and Vincent Gauthier and Mehdi Naima", "abstract": "Graph Neural Networks (GNNs) conventionally rely on standard Laplacian or adjacency matrices for structural message passing. In this work, we substitute the traditional Laplacian with a Doubly Stochastic graph Matrix (DSM), derived from the inverse of the modified Laplacian, to naturally encode continuous multi-hop proximity and strict local centrality. To overcome the intractable $O(n^3)$ complexity of exact matrix inversion, we first utilize a truncated Neumann series to scalably approximate the DSM, which serves as the foundation for our proposed DsmNet. Furthermore, because algebraic truncation inherently causes probability mass leakage, we introduce DsmNet-compensate. This variant features a mathematically rigorous Residual Mass Compensation mechanism that analytically re-injects the truncated tail mass into self-loops, strictly restoring row-stochasticity and structural dominance. Extensive theoretical and empirical analyses demonstrate that our decoupled architectures operate efficiently in $O(K|E|)$ time and effectively mitigate over-smoothing by bounding Dirichlet energy decay, providing robust empirical validation on homophilic benchmarks. Finally, we establish the theoretical boundaries of the DSM on heterophilic topologies and demonstrate its versatility as a continuous structural encoding for Graph Transformers.", "link": "http://arxiv.org/abs/2604.15069v1", "date": "2026-04-16", "relevancy": 2.2213, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.5969}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5333}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http {"title": "Momentum-constrained Hybrid Heuristic Trajectory Optimization Framework with Residual-enhanced DRL for Visually Impaired Scenarios", "author": "Yuting Zeng and Zhiwen Zheng and Jingya Wang and You Zhou and JiaLing Xiao and Yongbin Yu and Manping Fan and Bo Gong and Liyong Ren", "abstract": "Safe and efficient assistive planning for visually impaired scenarios remains challenging, since existing methods struggle with multi-objective optimization, generalization, and interpretability. In response, this paper proposes a Momentum-Constrained Hybrid Heuristic Trajectory Optimization Framework (MHHTOF). To balance multiple objectives of comfort and safety, the framework designs a Heuristic Trajectory Sampling Cluster (HTSC) with a Momentum-Constrained Trajectory Optimization (MTO), which suppresses abrupt velocity and acceleration changes. In addition, a novel residual-enhanced deep reinforcement learning (DRL) module refines candidate trajectories, advancing temporal modeling and policy generalization. Finally, a dual-stage cost modeling mechanism (DCMM) is introduced to regulate optimization, where costs in the Frenet space ensure consistency, and reward-driven adaptive weights in the Cartesian space integrate user preferences for interpretability and user-centric decision-making. Experimental results show that the proposed framework converges in nearly half the iterations of baselines and achieves lower and more stable costs. In complex dynamic scenarios, MHHTOF further demonstrates stable velocity and acceleration curves with reduced risk, confirming its advantages in robustness, safety, and efficiency.", "link": "http://arxiv.org/abs/2604.14986v1", "date": "2026-04-16", "relevancy": 2.2197, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.6008}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference fo {"title": "MetaDent: Labeling Clinical Images for Vision-Language Models in Dentistry", "author": "Meng-Xun Li and Wen-Hui Deng and Zhi-Xing Wu and Chun-Xiao Jin and Jia-Min Wu and Yue Han and James Kit Hon Tsoi and Gui-Song Xia and Cui Huang", "abstract": "Vision-Language Models (VLMs) have demonstrated significant potential in medical image analysis, yet their application in intraoral photography remains largely underexplored due to the lack of fine-grained, annotated datasets and comprehensive benchmarks. To address this, we present MetaDent, a comprehensive resource that includes (1) a novel and large-scale dentistry image dataset collected from clinical, public, and web sources; (2) a semi-structured annotation framework designed to capture the hierarchical and clinically nuanced nature of dental photography; and (3) comprehensive benchmark suites for evaluating state-of-the-art VLMs on clinical image understanding. Our labeling approach combines a high-level image summary with point-by-point, free-text descriptions of abnormalities. This method enables rich, scalable, and task-agnostic representations. We curated 60,669 dental images from diverse sources and annotated a representative subset of 2,588 images using this meta-labeling scheme. Leveraging Large Language Models (LLMs), we derive standardized benchmarks: approximately 15K Visual Question Answering (VQA) pairs and an 18-class multi-label classification dataset, which we validated with human review and error analysis to justify that the LLM-driven transition reliably preserves fidelity and semantic accuracy. We then evaluate state-of-the-art VLMs across VQA, classification, and image captioning tasks. Quantitative results reveal that even the most advanced models struggle with a fine-grained understanding of intraoral scenes, achieving moderate accuracy and producing inconsistent or incomplete descriptions in image captioning. We publicly release our dataset, annotations, and tools to foster reproducible research and accelerate the development of vision-language systems for dental applications.", "link": "http://arxiv.org/abs/2604.14866v1", "date": "2026-04-16", "relevancy": 2.217, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5547}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5547}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5521}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MetaDent%3A%20Labeling%20Clinical%20Images%20for%20Vision-Language%20Models%20in%20Dentistry&body=Title%3A%20MetaDent%3A%20Labeling%20Clinical%20Images%20for%20Vision-Language%20Models%20in%20Dentistry%0AAuthor%3A%20Meng-Xun%20Li%20and%20Wen-Hui%20Deng%20and%20Zhi-Xing%20Wu%20and%20Chun-Xiao%20Jin%20and%20Jia-Min%20Wu%20and%20Yue%20Han%20and%20James%20Kit%20Hon%20Tsoi%20and%20Gui-Song%20Xia%20and%20Cui%20Huang%0AAbstract%3A%20Vision-Language%20Models%20%28VLMs%29%20have%20demonstrated%20significant%20potential%20in%20medical%20image%20analysis%2C%20yet%20their%20application%20in%20intraoral%20photography%20remains%20largely%20underexplored%20due%20to%20the%20lack%20of%20fine-grained%2C%20annotated%20datasets%20and%20comprehensive%20benchmarks.%20To%20address%20this%2C%20we%20present%20MetaDent%2C%20a%20comprehensive%20resource%20that%20includes%20%281%29%20a%20novel%20and%20large-scale%20dentistry%20image%20dataset%20collected%20from%20clinical%2C%20public%2C%20and%20web%20sources%3B%20%282%29%20a%20semi-structured%20annotation%20framework%20designed%20to%20capture%20the%20hierarchical%20and%20clinically%20nuanced%20nature%20of%20dental%20photography%3B%20and%20%283%29%20comprehensive%20benchmark%20suites%20for%20evaluating%20state-of-the-art%20VLMs%20on%20clinical%20image%20understanding.%20Our%20labeling%20approach%20combines%20a%20high-level%20image%20summary%20with%20point-by-point%2C%20free-text%20descriptions%20of%20abnormalities.%20This%20method%20enables%20rich%2C%20scalable%2C%20and%20task-agnostic%20representations.%20We%20curated%2060%2C669%20dental%20images%20from%20diverse%20sources%20and%20annotated%20a%20representative%20subset%20of%202%2C588%20images%20using%20this%20meta-labeling%20scheme.%20Leveraging%20Large%20Language%20Models%20%28LLMs%29%2C%20we%20derive%20standardized%20benchmarks%3A%20approximately%2015K%20Visual%20Question%20Answering%20%28VQA%29%20pairs%20and%20an%2018-class%20multi-label%20classification%20dataset%2C%20which%20we%20validated%20with%20human%20review%20and%20error%20analysis%20to%20justify%20that%20the%20LLM-driven%20transition%20reliably%20preserves%20fidelity%20and%20semantic%20accuracy.%20We%20then%20evaluate%20state-of-the-art%20VLMs%20across%20VQA%2C%20classification%2C%20and%20image%20captioning%20tasks.%20Quantitative%20results%20reveal%20that%20even%20the%20most%20advanced%20models%20struggle%20with%20a%20fine-grained%20understanding%20of%20intraoral%20scenes%2C%20achieving%20moderate%20accuracy%20and%20producing%20inconsistent%20or%20incomplete%20descriptions%20in%20image%20captioning.%20We%20publicly%20release%20our%20dataset%2C%20annotations%2C%20and%20tools%20to%20foster%20reproducible%20research%20and%20accelerate%20the%20development%20of%20vision-language%20systems%20for%20dental%20applications.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14866v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMetaDent%253A%2520Labeling%2520Clinical%2520Images%2520for%2520Vision-Language%2520Models%2520in%2520Dentistry%26entry.906535625%3DMeng-Xun%2520Li%2520and%2520Wen-Hui%2520Deng%2520and%2520Zhi-Xing%2520Wu%2520and%2520Chun-Xiao%2520Jin%2520and%2520Jia-Min%2520Wu {"title": "Benchmarking Classical Coverage Path Planning Heuristics on Irregular Hexagonal Grids for Maritime Coverage Scenarios", "author": "Carlos S. Sep\u00falveda and Gonzalo A. Ruz", "abstract": "Coverage path planning on irregular hexagonal grids is relevant to maritime surveillance, search and rescue and environmental monitoring, yet classical methods are often compared on small ad hoc examples or on rectangular grids. This paper presents a reproducible benchmark of deterministic single-vehicle coverage path planning heuristics on irregular hexagonal graphs derived from synthetic but maritime-motivated areas of interest. The benchmark contains 10,000 Hamiltonian-feasible instances spanning compact, elongated, and irregular morphologies, 17 heuristics from seven families, and a common evaluation protocol covering Hamiltonian success, complete-coverage success, revisits, path length, heading changes, and CPU latency. Across the released dataset, heuristics with explicit shortest-path reconnection solve the relaxed coverage task reliably but almost never produce zero-revisit tours. Exact Depth-First Search confirms that every released instance is Hamiltonian-feasible. The strongest classical Hamiltonian baseline is a Warnsdorff variant that uses an index-based tie-break together with a terminal-inclusive residual-degree policy, reaching 79.0% Hamiltonian success. The dominant design choice is not tie-breaking alone, but how the residual degree is defined when the endpoint is reserved until the final move. This shows that underreported implementation details can materially affect performance on sparse geometric graphs with bottlenecks. The benchmark is intended as a controlled testbed for heuristic analysis rather than as a claim of operational optimality at fleet scale.", "link": "http://arxiv.org/abs/2604.15202v1", "date": "2026-04-16", "relevancy": 2.2145, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertaintie e%20zero-revisit%20tours.%20Exact%20Depth-First%20Search%20confirms%20that%20every%20released%20instance%20is%20Hamiltonian-feasible.%20The%20strongest%20classical%20Hamiltonian%20baseline%20is%20a%20Warnsdorff%20variant%20that%20uses%20an%20index-based%20tie-break%20together%20with%20a%20terminal-inclusive%20residual-degree%20policy%2C%20reaching%2079.0%25%20Hamiltonian%20success.%20The%20dominant%20design%20choice%20is%20not%20tie-breaking%20alone%2C%20but%20how%20the%20residual%20degree%20is%20defined%20when%20the%20endpoint%20is%20reserved%20until%20the%20final%20move.%20This%20shows%20that%20underreported%20implementation%20details%20can%20materially%20affect%20performance%20on%20sparse%20geometric%20graphs%20with%20bottlenecks.%20The%20benchmark%20is%20intended%20as%20a%20controlled%20testbed%20for%20heuristic%20analysis%20rather%20than%20as%20a%20claim%20of%20operational%20optimality%20at%20fleet%20scale.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15202v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBenchmarking%2520Classical%2520Coverage%2520Path%2520Planning%2520Heuristics%2520on%2520Irregular%2520Hexagonal%2520Grids%2520for%2520Maritime%2520Coverage%2520Scenarios%26entry.906535625%3DCarlos%2520S.%2520Sep%25C3%25BAlveda%2520and%2520Gonzalo%2520A.%2520Ruz%26entry.1292438233%3DCoverage%2520path%2520planning%2520on%2520irregular%2520hexagonal%2520grids%2520is%2520relevant%2520to%2520maritime%2520surveillance%252C%2520search%2520and%2520rescue%2520and%2520environmental%2520monitoring%252C%2520yet%2520classical%2520methods%2520are%2520often%2520compared%2520on%2520small%2520ad%2520hoc%2520examples%2520or%2520on%2520rectangular%2520grids.%2520This%2520paper%2520presents%2520a%2520reproducible%2520benchmark%2520of%2520deterministic%2520single-vehicle%2520coverage%2520path%2520planning%2520heuristics%2520on%2520irregular%2520hexagonal%2520graphs%2520derived%2520from%2520synthetic {"title": "Reference-Free Sampling-Based Model Predictive Control", "author": "Fabian Schramm and Pierre Fabre and Nicolas Perrin-Gilbert and Justin Carpentier", "abstract": "We present a sampling-based model predictive control (MPC) framework that enables emergent locomotion without relying on handcrafted gait patterns or predefined contact sequences. Our method discovers diverse motion patterns, ranging from trotting to galloping, robust standing policies, jumping, and handstand balancing, purely through the optimization of high-level objectives. Building on model predictive path integral (MPPI), we propose a cubic Hermite spline parameterization that operates on position and velocity control points. Our approach enables contact-making and contact-breaking strategies that adapt automatically to task requirements, requiring only a limited number of sampled trajectories. This sample efficiency enables real-time control on standard CPU hardware, eliminating the GPU acceleration typically required by other state-of-the-art MPPI methods. We validate our approach on the Go2 quadrupedal robot, demonstrating a range of emergent gaits and basic jumping capabilities. In simulation, we further showcase more complex behaviors, such as backflips, dynamic handstand balancing and locomotion on a Humanoid, all without requiring reference tracking or offline pre-training.", "link": "http://arxiv.org/abs/2511.19204v3", "date": "2026-04-16", "relevancy": 2.2105, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6029}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5594}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5258}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Reference-Free%20Sampling-Based%20Model%20Predictive%20Control&body=Title%3A%20Reference-Free%20Sampling-Based%20Model%20Predictive%20Control%0AAuthor%3A%20Fabian%20Schramm%20and%20Pierre%20Fabre%20and%20Nicolas%20Perrin-Gilbert%20and%20Justin%20Carpentier%0AAbstract%3A%20We%20present%20a%20sampling-based%20model%20predictive%20control%20%28MPC%29%20framework%20that%20enables%20emergent%20locomotion%20without%20relying%20on%20handcrafted%20gait%20patterns%20or%20predefined%20contact%20sequences.%20Our%20method%20discovers%20diverse%20motion%20patterns%2C%20ranging%20from%20trotting%20to%20galloping%2C%20robust%20standing%20policies%2C%20jumping%2C%20and%20handstand%20balancing%2C%20purely%20through%20the%20optimization%20of%20high-level%20objectives.%20Building%20on%20model%20predictive%20path%20integral%20%28MPPI%29%2C%20we%20propose%20a%20cubic%20Hermite%20spline%20parameterization%20that%20operates%20on%20position%20and%20velocity%20control%20points.%20Our%20approach%20enables%20contact-making%20and%20contact-breaking%20strategies%20that%20adapt%20automatically%20to%20task%20requirements%2C%20requiring%20only%20a%20limited%20number%20of%20sampled%20trajectories.%20This%20sample%20efficiency%20enables%20real-time%20control%20on%20standard%20CPU%20hardware%2C%20eliminating%20the%20GPU%20acceleration%20typically%20required%20by%20other%20state-of-the-art%20MPPI%20methods.%20We%20validate%20our%20approach%20on%20the%20Go2%20quadrupedal%20robot%2C%20demonstrating%20a%20range%20of%20emergent%20gaits%20and%20basic%20jumping%20capabilities.%20In%20simulation%2C%20we%20further%20showcase%20more%20complex%20behaviors%2C%20such%20as%20backflips%2C%20dynamic%20handstand%20balancing%20and%20locomotion%20on%20a%20Humanoid%2C%20all%20without%20requiring%20reference%20tracking%20or%20offline%20pre-training.%0ALink%3A%20http%3A//arxiv.org/abs/2511.19204v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao {"title": "Implicit Neural Representations: A Signal Processing Perspective", "author": "Dhananjaya Jayasundara and Vishal M. Patel", "abstract": "Implicit neural representations (INRs) mark a fundamental shift in signal modeling, moving from discrete sampled data to continuous functional representations. By parameterizing signals as neural networks, INRs provide a unified framework for representing images, audio, video, 3D geometry, and beyond as continuous functions of their coordinates. This functional viewpoint enables signal operations such as differentiation to be carried out analytically through automatic differentiation rather than through discrete approximations. In this article, we examine the evolution of INRs from a signal processing perspective, emphasizing spectral behavior, sampling theory, and multiscale representation. We trace the progression from standard coordinate based networks, which exhibit a spectral bias toward low frequency components, to more advanced designs that reshape the approximation space through specialized activations, including periodic, localized, and adaptive functions. We also discuss structured representations, such as hierarchical decompositions and hash grid encodings, that improve spatial adaptivity and computational efficiency. We further highlight the utility of INRs across a broad range of applications, including inverse problems in medical and radar imaging, compression, and 3D scene representation. By interpreting INRs as learned signal models whose approximation spaces adapt to the underlying data, this article clarifies the field's core conceptual developments and outlines open challenges in theoretical stability, weight space interpretability, and large scale generalization.", "link": "http://arxiv.org/abs/2604.15047v1", "date": "2026-04-16", "relevancy": 2.2079, "topK": [{"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.569}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.5589}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4922}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Implicit%20Neural%20Representations%3A%20A%20Signal%20Processing%20Perspective&body=Title%3A%20Implicit%20Neural%20Representations%3A%20A%20Signal%20Processing%20Perspective%0AAuthor%3A%20Dhananjaya%20Jayasundara%20and%20Vishal%20M.%20Patel%0AAbstract%3A%20Implicit%20neural%20representations%20%28INRs%29%20mark%20a%20fundamental%20shift%20in%20signal%20modeling%2C%20moving%20from%20discrete%20sampled%20data%20to%20continuous%20functional%20representations.%20By%20parameterizing%20signals%20as%20neural%20networks%2C%20INRs%20provide%20a%20unified%20framework%20for%20representing%20images%2C%20audio%2C%20video%2C%203D%20geometry%2C%20and%20beyond%20as%20continuous%20functions%20of%20their%20coordinates.%20This%20functional%20viewpoint%20enables%20signal%20operations%20such%20as%20differentiation%20to%20be%20carried%20out%20analytically%20through%20automatic%20differentiation%20rather%20than%20through%20discrete%20approximations.%20In%20this%20article%2C%20we%20examine%20the%20evolution%20of%20INRs%20from%20a%20signal%20processing%20perspective%2C%20emphasizing%20spectral%20behavior%2C%20sampling%20theory%2C%20and%20multiscale%20representation.%20We%20trace%20the%20progression%20from%20standard%20coordinate%20based%20networks%2C%20which%20exhibit%20a%20spectral%20bias%20toward%20low%20frequency%20components%2C%20to%20more%20advanced%20designs%20that%20reshape%20the%20approximation%20space%20through%20specialized%20activations%2C%20including%20periodic%2C%20localized%2C%20and%20adaptive%20functions.%20We%20also%20discuss%20structured%20representations%2C%20such%20as%20hierarchical%20decompositions%20and%20hash%20grid%20encodings%2C%20that%20improve%20spatial%20adaptivity%20and%20computational%20efficiency.%20We%20further%20highlight%20the%20utility%20of%20INRs%20across%20a%20broad%20range%20of%20applications%2C%20including%20inverse%20problems%20in%20medical%20and%20radar%20imaging%2C%20compression%2C%20and%203D%20scene%20representation.%20By%20interpreting%20INRs%20as%20learned%20signal%20models%20whose%20approximation%20spaces%20adapt%20to%20the%20underlying%20data%2C%20this%20article%20clarifies%20the%20field%27s%20core%20conceptual%20developments%20and%20outlines%20open%20challenges%20in%20theoretical%20stability%2C%20weight%20space%20interpretability%2C%20and%20large%20scale%20generalization.%0ALink%3A%20http%3A//arxiv.org/abs/2604.15047v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DImplicit%2520Neural%2520Representations%253A%2520A%2520Signal%2520Processing%2520Perspective%26entry.906535625%3DDhananjaya%2520Jayasundara%2520and%2520Vishal%2520M.%2520Patel%26entry.1292438233%3DImplicit%2520neural%2520representations%2520%2528INRs%2529%2520mark%2520a%2520fundamental%2520shift%2520in%2520signal%2520modeling%252C%2520moving%2520from%2520discrete%2520sampled%2520data%2520to%2520continuous%2520functional%2520representations.%2520By%2520parameterizing%2520signals%2520as%2520neural%2520networks%252C%2520INRs%2520provide%2520a%2520unified%2520framework%2520for%2520representing%2520images%252C%2520audio%252C%2520video%252C%25203D%2520geometry%252C%2520and%2520beyond%2520as%2520continuous%2520functions%2520of%2520their%2520coordinates.%2520This%2520functional%2520viewpoint%2520enables%2520signal%2520operations%2520such%2520as%2520differentiation%2520to%2520be%2520carried%2520out%2520analytically%2520through%2520automatic%2520differentiation%2520rather%2520than%2520through%2520discrete%2520approximations.%2520In%2520this%2520article%252C%2520we%2520examine%2520the%2520evolution%2520o {"title": "Unsupervised feature selection using Bayesian Tucker decomposition", "author": "Y-h. Taguchi and Yoh-ichi Mototake", "abstract": "In this paper, we proposed Bayesian Tucker decomposition (BTuD) in which residual is supposed to obey Gaussian distribution analogous to linear regression. Although we have proposed an algorithm to perform the proposed BTuD, the conventional higher-order orthogonal iteration can generate Tucker decomposition consistent with the present implementation. Using the proposed BTuD, we can perform unsupervised feature selection successfully applied to various synthetic datasets, global coupled maps with randomized coupling strength, and gene expression profiles. Thus we can conclude that our newly proposed unsupervised feature selection method is promising. In addition to this, BTuD based unsupervised FE is expected to coincide with TD based unsupervised FE that were previously proposed and successfully applied to a wide range of problems.", "link": "http://arxiv.org/abs/2604.14949v1", "date": "2026-04-16", "relevancy": 2.2075, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.451}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4403}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.4333}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unsupervised%20feature%20selection%20using%20Bayesian%20Tucker%20decomposition&body=Title%3A%20Unsupervised%20feature%20selection%20using%20Bayesian%20Tucker%20decomposition%0AAuthor%3A%20Y-h.%20Taguchi%20and%20Yoh-ichi%20Mototake%0AAbstract%3A%20In%20this%20paper%2C%20we%20proposed%20Bayesian%20Tucker%20decomposition%20%28BTuD%29%20in%20which%20residual%20is%20supposed%20to%20obey%20Gaussian%20distribution%20analogous%20to%20linear%20regression.%20Although%20we%20have%20proposed%20an%20algorithm%20to%20perform%20the%20proposed%20BTuD%2C%20the%20conventional%20higher-order%20orthogonal%20iteration%20can%20generate%20Tucker%20decomposition%20consistent%20with%20the%20present%20implementation.%20Using%20the%20proposed%20BTuD%2C%20we%20can%20perform%20unsupervised%20feature%20selection%20successfully%20applied%20to%20various%20synthetic%20datasets%2C%20global%20coupled%20maps%20with%20randomized%20coupling%20strength%2C%20and%20gene%20expression%20profiles.%20Thus%20we%20can%20conclude%20that%20our%20newly%20proposed%20unsupervised%20feature%20selection%20method%20is%20promising.%20In%20addition%20to%20this%2C%20BTuD%20based%20unsupervised%20FE%20is%20expected%20to%20coincide%20with%20TD%20based%20unsupervised%20FE%20that%20were%20previously%20proposed%20and%20successfully%20applied%20to%20a%20wide%20range%20of%20problems.%0ALink%3A%20http%3A//arxiv.org/abs/2604.14949v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnsupervised%2520feature%2520selection%2520using%2520Bayesian%2520Tucker%2520decomposition%26entry.906535625%3DY-h.%2520Taguchi%2520and%2520Yoh-ichi%2520Mototake%26entry.1292438233%3DIn%2520this%2520paper%252C%2520we%2520proposed%2520Bayesian%2520Tucker%2520decomposition%2520%2528BTuD%2529%2520in%2520which%2520residual%2520is%2520supposed%2520to%2520obey%2520Gaussian%2520distribution%2520analogous%2520to%2520linear%2520regression.%2520Although%2520we%2520have%2520proposed%2520an%2520algorithm%2520to%2520perform%2520the%2520proposed%2520BTuD%252C%2520the%2520conventional%2520higher-order%2520orthogonal%2520iteration%2520can%2520generate%2520Tucker%2520decomposition%2520consistent%2520with%2520the%2520present%2520implementation.%2520Using%2520the%2520proposed%2520BTuD%252C%2520we%2520can%2520perform%2520unsupervised%2520feature%2520selection%2520successfully%2520applied%2520to%2520various%2520synthetic%2520datasets%252C%2520global%2520coupled%2520maps%2520with%2520randomized%2520coupling%2520strength%252C%2520and%2520gene%2520expression%2520profiles.%2520Thus%2520we%2520can%2520conclude%2520that%2520our%2520newly%2520proposed%2520unsupervised%2520feature%2520selection%2520method%2520is%2520promising.%2520In%2520addition%2520to%2520this%252C%2520BTuD%2520based%2520unsupervised%2520FE%2520is%2520expected%2520to%2520coincide%2520with%2520TD%2520based%2520unsupervised%2520FE%2520that%2520were%2520previously%2520proposed%2520and%2520successfully%2520applied%2520to%2520a%2520wide%2520range%2520of%2520problems.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.14949v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Unsupervised%20feature%20selection%20using%20Bayesian%20Tucker%20decomposition&entry.906535625=Y-h.%20Taguchi%20and%20Yoh-ichi%20Mototake&entry.1292438233=In%20this%20paper%2C%20we%20proposed%20Bayesian%20Tucker%20decomposition%20%28BTuD%29%20in%20which%20residual%20is%20supposed%20to%20obey%20Gaussian%20distribution%20analogous%20to%20linear%20regression.%20Although%20we%20have%20proposed%20an%20algorithm%20to%20perform%20the%20proposed%20BTuD%2C%20the%20conventional%20higher-order%20orthogonal%20iteration%20can%20generate%20Tucker%20decomposition%20consistent%20with%20the%20present%20implementation.%20Using%20the%20proposed%20BTuD%2C%20we%20can%20perform%20unsupervised%20feature%20selection%20successfully%20applied%20to%20various%20synthetic%20datasets%2C%20global%20coupled%20maps%20with%20randomized%20coupling%20strength%2C%20and%20gene%20expression%20profiles.%20Thus%20we%20can%20conclude%20that%20our%20newly%20proposed%20unsupervised%20feature%20selection%20method%20is%20promising.%20In%20addition%20to%20this%2C%20BTuD%20based%20unsupervised%20FE {"title": "Evolving Beyond Snapshots: Harmonizing Structure and Sequence via Entity State Tuning for Temporal Knowledge Graph Forecasting", "author": "Siyuan Li and Yunjia Wu and Yiyong Xiao and Pingyang Huang and Peize Li and Ruitong Liu and Yan Wen and Te Sun", "abstract": "Temporal knowledge graph (TKG) forecasting requires predicting future facts by jointly modeling structural dependencies within each snapshot and temporal evolution across snapshots. However, most existing methods are stateless: they recompute entity representations at each timestamp from a limited query window, leading to episodic amnesia and rapid decay of long-term dependencies. To address this limitation, we propose Entity State Tuning (EST), an encoder-agnostic framework that endows TKG forecasters with persistent and continuously evolving entity states. EST maintains a global state buffer and progressively aligns structural evidence with sequential signals via a closed-loop design. Specifically, a topology-aware state perceiver first injects entity-state priors into structural encoding. Then, a unified temporal context module aggregates the state-enhanced events with a pluggable sequence backbone. Subsequently, a dual-track evolution mechanism writes the updated context back to the global entity state memory, balancing plasticity against stability. Experiments on multiple benchmarks show that EST consistently improves diverse backbones and achieves state-of-the-art performance, highlighting the importance of state persistence for long-horizon TKG forecasting.", "link": "http://arxiv.org/abs/2602.12389v3", "date": "2026-04-16", "relevancy": 2.2026, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4525}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4432}, {"title": "Synthesizing Movin

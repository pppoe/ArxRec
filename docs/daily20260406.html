{"title": "Visual Prototype Conditioned Focal Region Generation for UAV-Based Object Detection", "author": "Wenhao Li and Zimeng Wu and Yu Wu and Zehua Fu and Jiaxin Chen", "abstract": "Unmanned aerial vehicle (UAV) based object detection is a critical but challenging task, when applied in dynamically changing scenarios with limited annotated training data. Layout-to-image generation approaches have proved effective in promoting detection accuracy by synthesizing labeled images based on diffusion models. However, they suffer from frequently producing artifacts, especially near layout boundaries of tiny objects, thus substantially limiting their performance. To address these issues, we propose UAVGen, a novel layout-to-image generation framework tailored for UAV-based object detection. Specifically, UAVGen designs a Visual Prototype Conditioned Diffusion Model (VPC-DM) that constructs representative instances for each class and integrates them into latent embeddings for high-fidelity object generation. Moreover, a Focal Region Enhanced Data Pipeline (FRE-DP) is introduced to emphasize object-concentrated foreground regions in synthesis, combined with a label refinement to correct missing, extra and misaligned generations. Extensive experimental results demonstrate that our method significantly outperforms state-of-the-art approaches, and consistently promotes accuracy when integrated with distinct detectors. The source code is available at https://github.com/Sirius-Li/UAVGen.", "link": "http://arxiv.org/abs/2604.02966v1", "date": "2026-04-03", "relevancy": 2.2951, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5795}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5701}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5686}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Visual%20Prototype%20Conditioned%20Focal%20Region%20Generation%20for%20UAV-Based%20Object%20Detection&body=Title%3A%20Visual%20Prototype%20Conditioned%20Focal%20Region%20Generation%20for%20UAV-Based%20Object%20Detection%0AAuthor%3A%20Wenhao%20Li%20and%20Zimeng%20Wu%20and%20Yu%20Wu%20and%20Zehua%20Fu%20and%20Jiaxin%20Chen%0AAbstract%3A%20Unmanned%20aerial%20vehicle%20%28UAV%29%20based%20object%20detection%20is%20a%20critical%20but%20challenging%20task%2C%20when%20applied%20in%20dynamically%20changing%20scenarios%20with%20limited%20annotated%20training%20data.%20Layout-to-image%20generation%20approaches%20have%20proved%20effective%20in%20promoting%20detection%20accuracy%20by%20synthesizing%20labeled%20images%20based%20on%20diffusion%20models.%20However%2C%20they%20suffer%20from%20frequently%20producing%20artifacts%2C%20especially%20near%20layout%20boundaries%20of%20tiny%20objects%2C%20thus%20substantially%20limiting%20their%20performance.%20To%20address%20these%20issues%2C%20we%20propose%20UAVGen%2C%20a%20novel%20layout-to-image%20generation%20framework%20tailored%20for%20UAV-based%20object%20detection.%20Specifically%2C%20UAVGen%20designs%20a%20Visual%20Prototype%20Conditioned%20Diffusion%20Model%20%28VPC-DM%29%20that%20constructs%20representative%20instances%20for%20each%20class%20and%20integrates%20them%20into%20latent%20embeddings%20for%20high-fidelity%20object%20generation.%20Moreover%2C%20a%20Focal%20Region%20Enhanced%20Data%20Pipeline%20%28FRE-DP%29%20is%20introduced%20to%20emphasize%20object-concentrated%20foreground%20regions%20in%20synthesis%2C%20combined%20with%20a%20label%20refinement%20to%20correct%20missing%2C%20extra%20and%20misaligned%20generations.%20Extensive%20experimental%20results%20demonstrate%20that%20our%20method%20significantly%20outperforms%20state-of-the-art%20approaches%2C%20and%20consistently%20promotes%20accuracy%20when%20integrated%20with%20distinct%20detectors.%20The%20source%20code%20is%20available%20at%20https%3A//github.com/Sirius-Li/UAVGen.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02966v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DVisual%2520Prototype%2520Conditioned%2520Focal%2520Region%2520Generation%2520for%2520UAV-Based%2520Object%2520Detection%26entry.906535625%3DWenhao%2520Li%2520and%2520Zimeng%2520Wu%2520and%2520Yu%2520Wu%2520and%2520Zehua%2520Fu%2520and%2520Jiaxin%2520Chen%26entry.1292438233%3DUnmanned%2520aerial%2520vehicle%2520%2528UAV%2529%2520based%2520object%2520detection%2520is%2520a%2520critical%2520but%2520challenging%2520task%252C%2520when%2520applied%2520in%2520dynamically%2520changing%2520scenarios%2520with%2520limited%2520annotated%2520training%2520data.%2520Layout-to-image%2520generation%2520approaches%2520have%2520proved%2520effective%2520in%2520promoting%2520detection%2520accuracy%2520by%2520synthesizing%2520labeled%2520images%2520based%2520on%2520diffusion%2520models.%2520However%252C%2520they%2520suffer%2520from%2520frequently%2520producing%2520artifacts%252C%2520especially%2520near%2520layout%2520boundaries%2520of%2520tiny%2520objects%252C%2520thus%2520substantially%2520limiting%2520their%2520performance.%2520To%2520address%2520these%2520issues%252C%2520we%2520propose%2520UAVGen%252C%2520a%2520novel%2520layout-to-image%2520generation%2520framework%2520tailored%2520for%2520UAV-based%2520object%2520detection.%2520Specifically%252C%2520UAVGen%2520designs%2520a%2520Visual%2520Prototype%2520Conditioned%2520Diffusion%2520Model%2520%2528VPC-DM%2529%2520that%2520constructs%2520representative%2520instances%2520for%2520each%2520class%2520and%2520integrates%2520them%2520into%2520latent%2520embeddings%2520for%2520high-fidelity%2520object%2520generation.%2520Moreover%252C%2520a%2520Focal%2520Region%2520Enhanced%2520Data%2520Pipeline%2520%2528FRE-DP%2529%2520is%2520introduced%2520to%2520emphasize%2520object-concentrated%2520foreground%2520regions%2520in%2520synthesis%252C%2520combined%2520with%2520a%2520label%2520refinement%2520to%2520correct%2520missing%252C%2520extra%2520and%2520misaligned%2520generations.%2520Extensive%2520experimental%2520results%2520demonstrate%2520that%2520our%2520method%2520significantly%2520outperforms%2520state-of-the-art%2520approaches%252C%2520and%2520consistently%2520promotes%2520accuracy%2520when%2520integrated%2520with%2520distinct%2520detectors.%2520The%2520source%2520code%2520is%2520available%2520at%2520https%253A//github.com/Sirius-Li/UAVGen.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.02966v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Visual%20Prototype%20Conditioned%20Focal%20Region%20Generation%20for%20UAV-Based%20Object%20Detection&entry.906535625=Wenhao%20Li%20and%20Zimeng%20Wu%20and%20Yu%20Wu%20and%20Zehua%20Fu%20and%20Jiaxin%20Chen&entry.1292438233=Unmanned%20aerial%20vehicle%20%28UAV%29%20based%20object%20detection%20is%20a%20critical%20but%20challenging%20task%2C%20when%20applied%20in%20dynamically%20changing%20scenarios%20with%20limited%20annotated%20training%20data.%20Layout-to-image%20generation%20approaches%20have%20proved%20effective%20in%20promoting%20detection%20accuracy%20by%20synthesizing%20labeled%20images%20based%20on%20diffusion%20models.%20However%2C%20they%20suffer%20from%20frequently%20producing%20artifacts%2C%20especially%20near%20layout%20boundaries%20of%20tiny%20objects%2C%20thus%20substantially%20limiting%20their%20performance.%20To%20address%20these%20issues%2C%20we%20propose%20UAVGen%2C%20a%20novel%20layout-to-image%20generation%20framework%20tailored%20for%20UAV-based%20object%20detection.%20Specifically%2C%20UAVGen%20designs%20a%20Visual%20Prototype%20Conditioned%20Diffusion%20Model%20%28VPC-DM%29%20that%20constructs%20representative%20instances%20for%20each%20class%20and%20 {"title": "InCoder-32B-Thinking: Industrial Code World Model for Thinking", "author": "Jian Yang and Wei Zhang and Jiajun Wu and Junhang Cheng and Tuney Zheng and Fanglin Xu and Weicheng Gu and Lin Jing and Yaxin Du and Joseph Li and Yizhi Li and Yan Xing and Chuan Hao and Ran Tao and Ruihao Gong and Aishan Liu and Zhoujun Li and Mingjie Tang and Chenghua Lin and Siheng Chen and Wayne Xin Zhao and Xianglong Liu and Ming Zhou and Bryan Dai and Weifeng Lv", "abstract": "Industrial software development across chip design, GPU optimization, and embedded systems lacks expert reasoning traces showing how engineers reason about hardware constraints and timing semantics. In this work, we propose InCoder-32B-Thinking, trained on the data from the Error-driven Chain-of-Thought (ECoT) synthesis framework with an industrial code world model (ICWM) to generate reasoning traces. Specifically, ECoT generates reasoning chains by synthesizing the thinking content from multi-turn dialogue with environmental error feedback, explicitly modeling the error-correction process. ICWM is trained on domain-specific execution traces from Verilog simulation, GPU profiling, etc., learns the causal dynamics of how code affects hardware behavior, and enables self-verification by predicting execution outcomes before actual compilation. All synthesized reasoning traces are validated through domain toolchains, creating training data matching the natural reasoning depth distribution of industrial tasks. Evaluation on 14 general (81.3% on LiveCodeBench v5) and 9 industrial benchmarks (84.0% in CAD-Coder and 38.0% on KernelBench) shows InCoder-32B-Thinking achieves top-tier open-source results across all domains.GPU Optimization", "link": "http://arxiv.org/abs/2604.03144v1", "date": "2026-04-03", "relevancy": 2.2875, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4601}, {"title": "Lexico {"title": "Motion Capture from Inertial and Vision Sensors", "author": "Xiaodong Chen and Wu Liu and Qian Bao and Xinchen Liu and Ruoli Dai and Yongdong Zhang and Tao Mei", "abstract": "Human motion capture is the foundation for many computer vision and graphics tasks. While industrial motion capture systems with complex camera arrays or expensive wearable sensors have been widely adopted in movie and game production, consumer-affordable and easy-to-use solutions for personal applications are still far from mature. To utilize a mixture of a monocular camera and very few inertial measurement units (IMUs) for accurate multi-modal human motion capture in daily life, we contribute MINIONS in this paper, a large-scale Motion capture dataset collected from INertial and visION Sensors. MINIONS has several featured properties: 1) large scale of over five million frames and 400 minutes duration; 2) multi-modality data of IMUs signals and RGB videos labeled with joint positions, joint rotations, SMPL parameters, etc.; 3) a diverse set of 146 fine-grained single and interactive actions with textual descriptions. With the proposed MINIONS dataset, we propose a SparseNet framework to capture human motion from IMUs and videos by discovering their supplementary features and exploring the possibilities of consumer-affordable motion capture using a monocular camera and very few IMUs. The experiment results emphasize the unique advantages of inertial and vision sensors, showcasing the promise of consumer-affordable multi-modal motion capture and providing a valuable resource for further research and development.", "link": "http://arxiv.org/abs/2407.16341v4", "date": "2026-04-03", "relevancy": 2.2802, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.582}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5784}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5569}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Motion%20Capture%20from%20Inertial%20and%20Vision%20Sensors&body=Title%3A%20Motion%20Capture%20from%20Inertial%20and%20Vision%20Sensors%0AAuthor%3A%20Xiaodong%20Chen%20and%20Wu%20Liu%20and%20Qian%20Bao%20and%20Xinchen%20Liu%20and%20Ruoli%20Dai%20and%20Yongdong%20Zhang%20and%20Tao%20Mei%0AAbstract%3A%20Human%20motion%20capture%20is%20the%20foundation%20for%20many%20computer%20vision%20and%20graphics%20tasks.%20While%20industrial%20motion%20capture%20systems%20with%20complex%20camera%20arrays%20or%20expensive%20wearable%20sensors%20have%20been%20widely%20adopted%20in%20movie%20and%20game%20production%2C%20consumer-affordable%20and%20easy-to-use%20solutions%20for%20personal%20applications%20are%20still%20far%20from%20mature.%20To%20utilize%20a%20mixture%20of%20a%20monocular%20camera%20and%20very%20few%20inertial%20measurement%20units%20%28IMUs%29%20for%20accurate%20multi-modal%20human%20motion%20capture%20in%20daily%20life%2C%20we%20contribute%20MINIONS%20in%20this%20paper%2C%20a%20large-scale%20Motion%20capture%20dataset%20collected%20from%20INertial%20and%20visION%20Sensors.%20MINIONS%20has%20several%20featured%20properties%3A%201%29%20large%20scale%20of%20over%20five%20million%20frames%20and%20400%20minutes%20duration%3B%202%29%20multi-modality%20data%20of%20IMUs%20signals%20and%20RGB%20videos%20labeled%20with%20joint%20positions%2C%20joint%20rotations%2C%20SMPL%20parameters%2C%20etc.%3B%203%29%20a%20diverse%20set%20of%20146%20fine-grained%20single%20and%20interactive%20actions%20with%20textual%20descriptions.%20With%20the%20proposed%20MINIONS%20dataset%2C%20we%20propose%20a%20SparseNet%20framework%20to%20capture%20human%20motion%20from%20IMUs%20and%20videos%20by%20discovering%20their%20su {"title": "DRtool: An Interactive Tool for Analyzing High-Dimensional Clusterings", "author": "Justin Lin and Julia Fukuyama", "abstract": "When faced with new data, we often conduct a cluster analysis to obtain a better understanding of the data's structure and the archetypical samples present in the data. This process often includes visualization of the data, either as a way to discover or verify clusters. However, the increases in data complexity and dimensionality has made this step very tricky. To visualize data, nonlinear dimension reduction methods are the de facto standard for their ability to non-uniformly stretch and shrink space in order to preserve local clusters. Because this process requires a drastic manipulation of space, however, nonlinear dimension reduction methods are known to produce false structures, especially when mishandled. A common consequence that often goes undetected by the untrained eye is over-clustering of the data. In efforts to deal with this phenomenon, we developed an interactive tool that empowers analysts to distinguish false clusters and better interpret their high-dimensional clustering results. The tool uses various analytical plots to provide a multi-faceted perspective on the data's global structure as well as local inter-cluster relationships, helping users determine the legitimacy of their high-dimensional clustering results. The tool is available via an R package named DRtool.", "link": "http://arxiv.org/abs/2509.04603v3", "date": "2026-04-03", "relevancy": 2.2801, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4702}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4702}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4276}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DRtool%3A%20An%20Interactive%20Tool%20for%20Analyzing%20High-Dimensional%20Clusterings&body=Title%3A%20DRtool%3A%20An%20Interactive%20Tool%20for%20Analyzing%20High-Dimensional%20Clusterings%0AAuthor%3A%20Justin%20Lin%20and%20Julia%20Fukuyama%0AAbstract%3A%20When%20faced%20with%20new%20data%2C%20we%20often%20conduct%20a%20cluster%20analysis%20to%20obtain%20a%20better%20understanding%20of%20the%20data%27s%20structure%20and%20the%20archetypical%20samples%20present%20in%20the%20data.%20This%20process%20often%20includes%20visualization%20of%20the%20data%2C%20either%20as%20a%20way%20to%20discover%20or%20verify%20clusters.%20However%2C%20the%20increases%20in%20data%20complexity%20and%20dimensionality%20has%20made%20this%20step%20very%20tricky.%20To%20visualize%20data%2C%20nonlinear%20dimension%20reduction%20methods%20are%20the%20de%20facto%20standard%20for%20their%20ability%20to%20non-uniformly%20stretch%20and%20shrink%20space%20in%20order%20to%20preserve%20local%20clusters.%20Because%20this%20process%20requires%20a%20drastic%20manipulation%20of%20space%2C%20however%2C%20nonlinear%20dimension%20reduction%20methods%20are%20known%20to%20produce%20false%20structures%2C%20especially%20when%20mishandled.%20A%20common%20consequence%20that%20often%20goes%20undetected%20by%20the%20untrained%20eye%20is%20over-clustering%20of%20the%20data.%20In%20efforts%20to%20deal%20with%20this%20phenomenon%2C%20we%20developed%20an%20interactive%20tool%20that%20empowers%20analysts%20to%20distinguish%20false%20clusters%20and%20better%20interpret%20their%20high-dimensional%20clustering%20results.%20The%20tool%20uses%20various%20analytical%20plots%20to%20provide%20a%20multi-faceted%20perspective%20on%20the%20data%27s%20global%20structure%20as%20well%20as%20local%20inter-cluster%20relationships%2C%20helping%20users%20determine%20the%20legitimacy%20of%20their%20high-dimensional%20clustering%20results.%20The%20tool%20is%20available%20via%20an%20R%20package%20named%20DRtool.%0ALink%3A%20http%3A//arxiv.org/abs/2509.04603v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDRtool%253A%2520An%2520Interactive%2520Tool%2520for%2520Analyzing%2520High-Dimensional%2520Clusterings%26entry.906535625%3DJustin%2520Lin%2520and%2520Julia%2520Fukuyama%26entry.1292438233%3DWhen%2520faced%2520with%2520new%2520data%252C%2520we%2520often%2520conduct%2520a%2520cluster%2520analysis%2520to%2520obtain%2520a%2520better%2520understanding%2520of%2520the%2520data%2527s%2520structure%2520and%2520the%2520archetypical%2520samples%2520present%2520in%2520the%2520data.%2520This%2520process%2520often%2520includes%2520visualization%2520of%2520the%2520data%252C%2520either%2520as%2520a%2520way%2520to%2520discover%2520or%2520verify%2520clusters.%2520However%252C%2520the%2520increases%2520in%2520data%2520complexity%2520and%2520dimensionality%2520has%2520made%2520this%2520step%2520very%2520tricky.%2520To%2520visualize%2520data%252C%2520nonlinear%2520dimension%2520reduction%2520methods%2520are%2520the%2520de%2520facto%2520standard%2520for%2520their%2520ability%2520to%2520non-uniformly%2520stretch%2520and%2520shrink%2520space%2520in%2520order%2520to%2520preserve%2520local%2520clusters.%2520Because%2520this%2520process%2520requires%2520a%2520drastic%2520manipulation%2520of%2520space%252C%2520however%252C%2520nonlinear%2520dimension%2520reduction%2520methods%2520are%2520known%2520to%2520produce%2520false%2520structures%252C%2520especially%2520when%2520mishandled.%2520A%2520common%2520consequence%2520that%2520often%2520goes%2520undetected%2520by%2520the%2520untrained%2520eye%2520is%2520over-clustering%2520of%2520the%2520data.%2520In%2520efforts%2520to%2520deal%2520with%2520this%2520phenomenon%252C%2520we%2520developed%2520an%2520interactive%2520tool%2520that%2520empowers%2520analysts%2520to%2520distinguish%2520false%2520clusters%2520and%2520better%2520interpret%2520their%2520high-dimensional%2520clustering%2520results.%2520The%2520tool%2520uses%2520various%2520analytical%2520plots%2520to%2520provide%2520a%2520multi-faceted%2520perspective%2520on%2520the%2520data%2527s%2520global%2520structure%2520as%2520well%2520as%2520local%2520inter-cluster%2520relationships%252C%2520helping%2520users%2520determine%2520the%2520legitimacy%2520of%2520their%2520high-dimensional%2520clustering%2520results.%2520The%2520tool%2520is%2520available%2520via%2520an%2520R%2520package%2520named%2520DRtool.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2509.04603v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=DRtool%3A%20An%20Interactive%20Tool%20for%20Analyzing%20High-Dimensional%20Clusterings&entry.906535625=Justin%20Lin%20and%20Julia%20Fukuyama&entry.1292438233=When%20faced%20with%20new%20data%2C%20we%20often%20conduct%20a%20cluster%20analysis%20to%20obtain%20a%20better%20understanding%20of%20the%20data%27s%20structure%20and%20the%20archetypical%20samples%20present%20in%20the%20data.%20This%20process%20often%20includes%20visualization%20of%20the%20data%2C%20either%20as%20a%20way%20to%20discover%20or%20verify%20clusters.%20However%2C%20the%20increases%20in%20data%20complexity%20and%20dimensionality%20has%20made%20this%20step%20very%20tricky.%20To%20visualize%20data%2C%20nonlinear%20dimension%20reduction%20methods%20are%20the%20de%20facto%20standard%20for%20their%20ability%20to%20non-uniformly%20stretch%20and%20shrink%20space%20in%20order%20to%20preserve%20local%20clusters.%20Because%20this%20process%20requires%20a%20drastic%20manipulation%20of%20space%2C%20however%2C%20nonlinear%20dimension%20reduction%20methods%20are%20known%20to%20produce%20false%20structures%2C%20especially%20when%20mishandled.%20A%20common%20consequence%20that%20often%20goes%20undetected%20by%20the%20untrained%20eye%20is%20over-clustering%20of%20the%20data.%20In%20efforts%20to%20deal%20with {"title": "Unified Thinker: A General Reasoning Modular Core for Image Generation", "author": "Sashuai Zhou and Qiang Zhou and Jijin Hu and Hanqing Yang and Yue Cao and Junpeng Ma and Yinchao Ma and Jun Song and Tiezheng Ge and Cheng Yu and Bo Zheng and Zhou Zhao", "abstract": "Despite impressive progress in high-fidelity image synthesis, generative models still struggle with logic-intensive instruction following, exposing a persistent reasoning--execution gap. Meanwhile, closed-source systems (e.g., Nano Banana) have demonstrated strong reasoning-driven image generation, highlighting a substantial gap to current open-source models. We argue that closing this gap requires not merely better visual generators, but executable reasoning: decomposing high-level intents into grounded, verifiable plans that directly steer the generative process. To this end, we propose Unified Thinker, a task-agnostic reasoning architecture for general image generation, designed as a unified planning core that can plug into diverse generators and workflows. Unified Thinker decouples a dedicated Thinker from the image Generator, enabling modular upgrades of reasoning without retraining the entire generative model. We further introduce a two-stage training paradigm: we first build a structured planning interface for the Thinker, then apply reinforcement learning to ground its policy in pixel-level feedback, encouraging plans that optimize visual correctness over textual plausibility. Extensive experiments on text-to-image generation and image editing show that Unified Thinker substantially improves image reasoning and generation quality.", "link": "http://arxiv.org/abs/2601.03127v2", "date": "2026-04-03", "relevancy": 2.2565, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5865}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.5739}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5454}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Unified%20Thinker%3A%20A%20General%20Reasoning%20Modular%20Core%20for%20Image%20Generation&body=Title%3A%20Unified%20Thinker%3A%20A%20General%20Reasoning%20Modular%20Core%20for%20Image%20Generation%0AAuthor%3A%20Sashuai%20Zhou%20and%20Qiang%20Zhou%20and%20Jijin%20Hu%20and%20Hanqing%20Yang%20and%20Yue%20Cao%20and%20Junpeng%20Ma%20and%20Yinchao%20Ma%20and%20Jun%20Song%20and%20Tiezheng%20Ge%20and%20Cheng%20Yu%20and%20Bo%20Zheng%20and%20Zhou%20Zhao%0AAbstract%3A%20Despite%20impressive%20progress%20in%20high-fidelity%20image%20synthesis%2C%20generative%20models%20still%20struggle%20with%20logic-intensive%20instruction%20following%2C%20exposing%20a%20persistent%20reasoning--execution%20gap.%20Meanwhile%2C%20closed-source%20systems%20%28e.g.%2C%20Nano%20Banana%29%20have%20demonstrated%20strong%20reasoning-driven%20image%20generation%2C%20highlighting%20a%20substantial%20gap%20to%20current%20open-source%20models.%20We%20argue%20that%20closing%20this%20gap%20requires%20not%20merely%20better%20visual%20generators%2C%20but%20executable%20reasoning%3A%20decomposing%20high-level%20intents%20into%20grounded%2C%20verifiable%20plans%20that%20directly%20steer%20the%20generative%20process.%20To%20this%20end%2C%20we%20propose%20Unified%20Thinker%2C%20a%20task-agnostic%20reasoning%20architecture%20for%20general%20image%20generation%2C%20designed%20as%20a%20unified%20planning%20core%20that%20can%20plug%20into%20diverse%20generators%20and%20workflows.%20Unified%20Thinker%20decouples%20a%20dedicated%20Thinker%20from%20the%20image%20Generator%2C%20enabling%20modular%20upgrades%20of%20reasoning%20without%20retraining%20the%20entire%20generative%20model.%20We%20further%20introduce%20a%20two-stage%20training%20paradigm%3A%20we%20first%20build%20a%20structured%20planning%20interface%20for%20the%20Thinker%2C%20then%20apply%20reinforcement%20learning%20to%20ground%20its%20policy%20in%20pixel-level%20feedback%2C%20encouraging%20plans%20that%20optimize%20visual%20correctness%20over%20textual%20plausibility.%20Extensive%20experiments%20on%20text-to-image%20generation%20and%20image%20editing%20show%20that%20Unified%20Thinker%20substantially%20improves%20image%20reasoning%20and%20generation%20quality.%0ALink%3A%20http%3A//arxiv.org/abs/2601.03127v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnified%2520Thinker%253A%2520A%2520General%2520Reasoning%2520Modular%2520Core%2520for%2520Image%2520Generation%26entry.906535625%3DSashuai%2520Zhou%2520and%2520Qiang%2520Zhou%2520and%2520Jijin%2520Hu%2520and%2520Hanqing%2520Yang%2520and%2520Yue%2520Cao%2520and%2520Junpeng%2520Ma%2520and%2520Yinchao%2520Ma%2520and%2520Jun%2520Song%2520and%2520Tiezheng%2520Ge%2520and%2520Cheng%2520Yu%2520and%2520Bo%2520Zheng%2520and%2520Zhou%2520Zhao%26entry.1292438233%3DDespite%2520impressive%2520progress%2520in%2520high-fidelity%2520image%2520synthesis%252C%2520generative%2520models%2520still%2520struggle%2520with%2520logic-intensive%2520instruction%2520following%252C%2520exposing%2520a%2520persistent%2520reasoning--execution%2520gap.%2520Meanwhile%252C%2520closed-source%2520systems%2520%2528e.g.%252C%2520Nano%2520Banana%2529%2520have%2520demonstrated%2520strong%2520reasoning-driven%2520image%2520generation%252C%2520highlighting%2520a%2520substantial%2520gap%2520to%2520current%2520open-source%2520models.%2520We%2520argue%2520that%2520closing%2520this%2520gap%2520requires%2520not%2520merely%2520better%2520visual%2520generators%252C%2520but%2520executable%2520reasoning%253A%2520decomposing%2520high-level%2520intents%2520into%2520grounded%252C%2520verifiable%2520plans%2520that%2520directly%2520steer%2520the%2520generative%2520process.%2520To%2520this%2520end%252C%2520we%2520propose%2520Unified%2520Thinker%252C% {"title": "Learning from Synthetic Data via Provenance-Based Input Gradient Guidance", "author": "Koshiro Nagano and Ryo Fujii and Ryo Hachiuma and Fumiaki Sato and Taiki Sekii and Hideo Saito", "abstract": "Learning methods using synthetic data have attracted attention as an effective approach for increasing the diversity of training data while reducing collection costs, thereby improving the robustness of model discrimination. However, many existing methods improve robustness only indirectly through the diversification of training samples and do not explicitly teach the model which regions in the input space truly contribute to discrimination; consequently, the model may learn spurious correlations caused by synthesis biases and artifacts. Motivated by this limitation, this paper proposes a learning framework that uses provenance information obtained during the training data synthesis process, indicating whether each region in the input space originates from the target object, as an auxiliary supervisory signal to promote the acquisition of representations focused on target regions. Specifically, input gradients are decomposed based on information about target and non-target regions during synthesis, and input gradient guidance is introduced to suppress gradients over non-target regions. This suppresses the model's reliance on non-target regions and directly promotes the learning of discriminative representations for target regions. Experiments demonstrate the effectiveness and generality of the proposed method across multiple tasks and modalities, including weakly supervised object localization, spatio-temporal action localization, and image classification.", "link": "http://arxiv.org/abs/2604.02946v1", "date": "2026-04-03", "relevancy": 2.253, "topK": [{"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.5829}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5533}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5476}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20from%20Synthetic%20Data%20via%20Provenance-Based%20Input%20Gradient%20Guidance&body=Title%3A%20Learning%20from%20Synthetic%20Data%20via%20Provenance-Based%20Input%20Gradient%20Guidance%0AAuthor%3A%20Koshiro%20Nagano%20and%20Ryo%20Fujii%20and%20Ryo%20Hachiuma%20and%20Fumiaki%20Sato%20and%20Taiki%20Sekii%20and%20Hideo%20Saito%0AAbstract%3A%20Learning%20methods%20using%20synthetic%20data%20have%20attracted%20attention%20as%20an%20effective%20approach%20for%20increasing%20the%20diversity%20of%20training%20data%20while%20reducing%20collection%20costs%2C%20thereby%20improving%20the%20robustness%20of%20model%20discrimination.%20However%2C%20many%20existing%20methods%20improve%20robustness%20only%20indirectly%20through%20the%20diversification%20of%20training%20samples%20and%20do%20not%20explicitly%20teach%20the%20model%20which%20regions%20in%20the%20input%20space%20truly%20contribute%20to%20discrimination%3B%20consequently%2C%20the%20model%20may%20learn%20spurious%20correlations%20caused%20by%20synthesis%20biases%20and%20artifacts.%20Motivated%20by%20this%20limitation%2C%20this%20paper%20proposes%20a%20learning%20framework%20that%20uses%20provenance%20information%20obtained%20during%20the%20training%20data%20synthesis%20process%2C%20indicating%20whether%20each%20region%20in%20the%20input%20space%20originates%20from%20the%20target%20object%2C%20as%20an%20auxiliary%20supervisory%20signal%20to%20promote%20the%20acquisition%20of%20representations%20focused%20on%20target%20regions.%20Specifically%2C%20input%20gradients%20are%20decomposed%20based%20on%20information%20about%20target%20and%20non-target%20regions%20during%20synthesis%2C%20and%20input%20gradient%20guidance%20is%20introduced%20to%20suppress%20gradients%20over%20non-target%20regions.%20This%20suppresses%20the%20model%27s%20reliance%20on%20non-target%20regions%20and%20directly%20promotes%20the%20learning%20of%20discriminative%20representations%20for%20target%20regions.%20Experiments%20demonstrate%20the%20effectiveness%20and%20generality%20of%20the%20proposed%20method%20across%20multiple%20tasks%20and%20modalities%2C%20including%20weakly%20supervised%20object%20localization%2C%20spatio-temporal%20action%20localization%2C%20and%20image%20classification.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02946v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520from%2520Synthetic%2520Data%2520via%2520Provenance-Based%2520Input%2520Gradient%2520Guidance%26entry.906535625%3DKoshiro%2520Nagano%2520and%2520Ryo%2520Fujii%2520and%2520Ryo%2520Hachiuma%2520and%2520Fumiaki%2520Sato%2520and%2520Taiki%2520Sekii%2520and%2520Hideo%2520Saito%26entry.1292438233%3DLearning%2520methods%2520using%2520synthetic%2520data%2520have%2520attracted%2520attention%2520as%2520an%2520effective%2520approach%2520for%2520increasing%2520the%2520diversity%2520of%2520training%2520data%2520while%2520reducing%2520collection%2520costs%252C%2520thereby%2520improving%2520the%2520robustness%2520of%2520model%2520discrimination.%2520However%252C%2520many%2520existing%2520methods%2520improve%2520robustness%2520only%2520indirectly%2520through%2520the%2520diversification%2520of%2520training%2520samples%2520and%2520do%2520not%2520explicitly%2520teach%2520the%2520model%2520which%2520regions%2520in%2520the%2520input%2520space%2520truly%2520contribute%2520to%2520discrimination%253B%2520consequently%252C%2520the%2520model%2520may%2520learn%2520spurious%2520correlations%2520caused%2520by%2520synthesis%2520biases%2520and%2520artifacts.%2520Motivated%2520by%2520this%2520limitation%252C%2520this%2520paper%2520proposes%2520a%2520learning%2520 {"title": "ARIQA-3DS: A Stereoscopic Image Quality Assessment Dataset for Realistic Augmented Reality", "author": "Aymen Sekhri and Seyed Ali Amirshahi and Mohamed-Chaker Larabi", "abstract": "As Augmented Reality (AR) technologies advance towards immersive consumer adoption, the need for rigorous Quality of Experience (QoE) assessment becomes critical. However, existing datasets often lack ecological validity, relying on monocular viewing or simplified backgrounds that fail to capture the complex perceptual interplay, termed visual confusion, between real and virtual layers. To address this gap, we present ARIQA-3DS, the first large stereoscopic AR Image Quality Assessment dataset. Comprising 1,200 AR viewports, the dataset fuses high-resolution stereoscopic omnidirectional captures of real-world scenes with diverse augmented foregrounds under controlled transparency and degradation conditions. We conducted a comprehensive subjective study with 36 participants using a video see-through head-mounted display, collecting both quality ratings and simulator-sickness indicators. Our analysis reveals that perceived quality is primarily driven by foreground degradations and modulated by transparency levels, while oculomotor and disorientation symptoms show a progressive but manageable increase during viewing. ARIQA-3DS will be publicly released to serve as a comprehensive benchmark for developing next-generation AR quality assessment models.", "link": "http://arxiv.org/abs/2604.03112v1", "date": "2026-04-03", "relevancy": 2.2356, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5638}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5638}, {"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.5346}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ARIQA-3DS%3A%20A%20Stereoscopic%20Image%20Quality%20Assessment%20Dataset%20for%20Realistic%20Augmented%20Reality&body=Title%3A%20ARIQA-3DS%3A%20A%20Stereoscopic%20Image%20Quality%20Assessment%20Dataset%20for%20Realistic%20Augmented%20Reality%0AAuthor%3A%20Aymen%20Sekhri%20and%20Seyed%20Ali%20Amirshahi%20and%20Mohamed-Chaker%20Larabi%0AAbstract%3A%20As%20Augmented%20Reality%20%28AR%29%20technologies%20advance%20towards%20immersive%20consumer%20adoption%2C%20the%20need%20for%20rigorous%20Quality%20of%20Experience%20%28QoE%29%20assessment%20becomes%20critical.%20However%2C%20existing%20datasets%20often%20lack%20ecological%20validity%2C%20relying%20on%20monocular%20viewing%20or%20simplified%20backgrounds%20that%20fail%20to%20capture%20the%20complex%20perceptual%20interplay%2C%20termed%20visual%20confusion%2C%20between%20real%20and%20virtual%20layers.%20To%20address%20this%20gap%2C%20we%20present%20ARIQA-3DS%2C%20the%20first%20large%20stereoscopic%20AR%20Image%20Quality%20Assessment%20dataset.%20Comprising%201%2C200%20AR%20viewports%2C%20the%20dataset%20fuses%20high-resolution%20stereoscopic%20omnidirectional%20captures%20of%20real-world%20scenes%20with%20diverse%20augmented%20foregrounds%20under%20controlled%20transparency%20and%20degradation%20conditions.%20We%20conducted%20a%20comprehensive%20subjective%20study%20with%2036%20participants%20using%20a%20video%20see-through%20head-mounted%20display%2C%20collecting%20both%20quality%20ratings%20and%20simulator-sickness%20indicators.%20Our%20analysis%20reveals%20that%20perceived%20quality%20is%20primarily%20driven%20by%20foreground%20degradations%20and%20modulated%20by%20transparency%20levels%2C%20while%20oculomotor%20and%20disorientation%20symptoms%20show%20a%20progressive%20but%20manageable%20increase%20during%20viewing.%20ARIQA-3DS%20will%20be%20publicly%20released%20to%20serve%20as%20a%20comprehensive%20benchmark%20for%20developing%20next-generation%20AR%20quality%20assessment%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03112v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DARIQA-3DS%253A%2520A%2520Stereoscopic%2520Image%2520Quality%2520Assessment%2520Dataset%2520for%2520Realistic%2520Augmented%2520Reality%26entry.906535625%3DAymen%2520Sekhri%2520and%2520Seyed%2520Ali%2520Amirshahi%2520and%2520Mohamed-Chaker%2520Larabi%26entry.1292438233%3DAs%2520Augmented%2520Reality%2520%2528AR%2529%2520technologies%2520advance%2520towards%2520immersive%2520consumer%2520adoption%252C%2520the%2520need%2520for%2520rigorous%2520Quality%2520of%2520Experience%2520%2528QoE%2529%2520assessment%2520becomes%2520critical.%2520However%252C%2520existing%2520datasets%2520often%2520lack%2520ecological%2520validity%252C%2520relying%2520on%2520monocular%2520viewing%2520or%2520simplified%2520backgrounds%2520that%2520fail%2520to%2520capture%2520the%2520complex%2520perceptual%2520interplay%252C%2520termed%2520visual%2520confusion%252C%2520between%2520real%2520and%2520virtual%2520layers.%2520To%2520address%2520this%2520gap%252C%2520we%2520present%2520ARIQA-3DS%252C%2520the%2520first%2520large%2520stereoscopic%2520AR%2520Image%2520Quality%2520Assessment%2520dataset.%2520Comprising%25201%252C200%2520AR%2520viewports%252C%2520the%2520dataset%2520fuses%2520high-resolution%2520stereoscopic%2520omnidirectional%2520captures%2520of%2520real-world%2520scenes%2520with%2520diverse%2520augmented%2520foregrounds%2520under%2520controlled%2520transparency%2520and%2520degradation%2520conditions.%2520We%2520conducted%2520a%2520comprehensive%2520subjective%2520study%2520with%252036%2520participants%2520using%2520a%2520video%2520see-through%2520head-mounted%2520display%252C%2520collecting%2520both%2520quality%2520ratings%2520and%2520simulator-sickness%2520indicators.%2520Our%2520analysis%2520reveals%2520that%2520perceived%2520quality%2520is%2520primarily%2520driven%2520by%2520foreground%2520degradations%2520and%2520modulated%2520by%2520transparency%2520levels%252C%2520while%2520oculomotor%2520and%2520disorientation%2520symptoms%2520show%2520a%2520progressive%2520but%2520manageable%2520increase%2520during%2520viewing.%2520ARIQA-3DS%2520will%2520be%2520publicly%2520released%2520to%2520serve%2520as%2520a%2520comprehensive%2520benchmark%2520for%2520developing%2520next-generation%2520AR%2520quality%2520assessment%2520models.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.03112v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ARIQA-3DS%3A%20A%20Stereoscopic%20Image%20Quality%20Assessment%20Dataset%20for%20Realistic%20Augmented%20Reality&entry.906535625=Aymen%20Sekhri%20and%20Seyed%20Ali%20Amirshahi%20and%20Mohamed-Chaker%20Larabi&entry.1292438233=As%20Augmented%20Reality%20%28AR%29%20technologies%20advance%20towards%20immersive%20consumer%20adoption%2C%20the%20need%20for%20rigorous%20Quality%20of%20Experience%20%28QoE%29%20assessment%20becomes%20critical.%20However%2C%20existing%20datasets%20often%20lack%20ecological%20validity%2C%20relying%20on%20monocular%20viewing%20or%20simplified%20backgrounds%20that%20fail%20to%20capture%20the%20complex%20perceptual%20interplay%2C%20termed%20visual%20confusion%2C%20between%20real%20and%20virtual%20layers.%20To%20address%20this%20gap%2C%20we%20present%20ARIQA-3DS%2C%20the%20first%20large%20stereoscopic%20AR%20Image%20Quality%20Assessment%20dataset.%20Comprising%201%2C200%20AR%20viewports%2C%20the%20dataset%20fuses%20high-resolution%20stereoscopic%20omnidirectional%20captures%20of%20real-world%20scenes%20with%20diverse%20augmented%20foregrounds%20under%20controlled%20transparency%20and%20degradation%20conditions.%20We%20conducted%20a%20comprehensive%20subjective%20study%20with%2036%20participants%20using%20a%20video%20see-through%20head-mounted%20display%2C%20collecting%20both%20quality%20ratings%20and%20simul {"title": "Chain-of-Authorization: Embedding authorization into large language models", "author": "Yang Li and Yule Liu and Xinlei He and Youjian Zhao and Qi Li and Ke Xu", "abstract": "Although Large Language Models (LLMs) have evolved from text generators into the cognitive core of modern AI systems, their inherent lack of authorization awareness exposes these systems to catastrophic risks, ranging from unintentional data leakage to unauthorized command execution. Existing defense mechanisms are fundamentally decoupled from internal reasoning, rendering them insufficient for the complex security demands of dynamic AI systems. Here, we propose the Chain-of-Authorization (CoA) framework, a paradigm that internalizes access control as a foundational cognitive capability. By systematically redesigning the input-output format and fine-tuning the model on synthesized data with complex permission topologies, CoA forces the model to generate a structured authorization trajectory as a causal prerequisite for any substantive response or action, thereby enabling LLMs to internalize access boundaries within dynamic reasoning environments. CoA maintains high utility in authorized scenarios while achieving high rejection rates of unauthorized prompts and robust defense against diverse adversarial attacks. By embedding authorization directly into the reasoning process, CoA provides a principled architectural blueprint for deploying secure LLMs as the cognitive cores of modern AI systems.", "link": "http://arxiv.org/abs/2603.22869v2", "date": "2026-04-03", "relevancy": 2.2253, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4453}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4453}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4446}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Chain-of-Authorization%3A%20Embedding%20authorization%20into%20large%20language%20models&body=Title%3A%20Chain-of-Authorization%3A%20Embedding%20authorization%20into%20large%20language%20models%0AAuthor%3A%20Yang%20Li%20and%20Yule%20Liu%20and%20Xinlei%20He%20and%20Youjian%20Zhao%20and%20Qi%20Li%20and%20Ke%20Xu%0AAbstract%3A%20Although%20Large%20Language%20Models%20%28LLMs%29%20have%20evolved%20from%20text%20generators%20into%20the%20cognitive%20core%20of%20modern%20AI%20systems%2C%20their%20inherent%20lack%20of%20authorization%20awareness%20exposes%20these%20systems%20to%20catastrophic%20risks%2C%20ranging%20from%20unintentional%20data%20leakage%20to%20unauthorized%20command%20execution.%20Existing%20defense%20mechanisms%20are%20fundamentally%20decoupled%20from%20internal%20reasoning%2C%20rendering%20them%20insufficient%20for%20the%20complex%20security%20demands%20of%20dynamic%20AI%20systems.%20Here%2C%20we%20propose%20the%20Chain-of-Authorization%20%28CoA%29%20framework%2C%20a%20paradigm%20that%20internalizes%20access%20control%20as%20a%20foundational%20cognitive%20capability.%20By%20systematically%20redesigning%20the%20input-output%20format%20and%20fine-tuning%20the%20model%20on%20synthesized%20data%20with%20complex%20permission%20topologies%2C%20CoA%20forces%20the%20model%20to%20generate%20a%20structured%20authorization%20trajectory%20as%20a%20causal%20prerequisite%20for%20any%20substantive%20response%20or%20action%2C%20thereby%20enabling%20LLMs%20to%20internalize%20access%20boundaries%20within%20dynamic%20reasoning%20environments.%20CoA%20maintains%20high%20utility%20in%20authorized%20scenarios%20while%20achieving%20high%20rejection%20rates%20of%20unauthorized%20prompts%20and%20robust%20defense%20against%20diverse%20adversarial%20attacks.%20By%20embedding%20authorization%20directly%20into%20the%20reasoning%20process%2C%20CoA%20provides%20a%20principled%20architectural%20blueprint%20for%20deploying%20secure%20LLMs%20as%20the%20cognitive%20cores%20of%20modern%20AI%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2603.22869v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DChain-of-Authorization%253A%2520Embedding%2520authorization%2520into%2520large%2520language%2520models%26entry.906535625%3DYang%2520Li%2520and%2520Yule%2520Liu%2520and%2520Xinlei%2520He%2520and%2520Youjian%2520Zhao%2520and%2520Qi%2520Li%2520and%2520Ke%2520Xu%26entry.1292438233%3DAlthough%2520Large%2520Language%2520Models%2520%2528LLMs%2529%2520have%2520evolved%2520from%2520text%2520generators%2520into%2520the%2520cognitive%2520core%2520of%2520modern%2520AI%2520systems%252C%2520their%2520inherent%2520lack%2520of%2520authorization%2520awareness%2520exposes%2520these%2520systems%2520to%2520catastrophic%2520risks%252C%2520ranging%2520from%2520unintentional%2520data%2520leakage%2520to%2520unauthorized%2520command%2520execution.%2520Existing%2520defense%2520mechanisms%2520are%2520fundamentally%2520decoupled%2520from%2520internal%2520reasoning%252C%2520rendering%2520them%2520insufficient%2520for%2520the%2520complex%2520security%2520demands%2520of%2520dynamic%2520AI%2520systems.%2520Here%252C%2520we%2520propose%2520the%2520Chain-of-Authorization%2520%2528CoA%2529%2520framework%252C%2520a%2520paradigm%2520that%2520internalizes%2520access%2520control%2520as%2520a%2520foundational%2520cognitive%2520capability.%2520By%2520systematically%2520redesigning%2520the%2520input-output%2520format%2520and%2520fine-tuning%2520the%2520model%2520on%2520synthesized%2520data%2520with%2520complex%2520permission%2520topologies%252C%2520CoA%2520forces%2520the%2520model%2520to%2520generate%2520a%2520structured%2520authorization%2520trajectory%2520as%2520a%2520causal%2520prerequisite%2520for%2520any%2520substantive%2520response%2520or%2520action%252C%2520thereby%2520enabling%2520LLMs%2520to%2520internalize%2520access%2520boundaries%2520within%2520dynamic%2520reasoning%2520environments.%2520CoA%2520maintains%2520high%2520utility%2520in%2520authorized%2520scenarios%2520while%2520achieving%2520high%2520rejection%2520rates%2520of%2520unauthorized%2520prompts%2520and%2520robust%2520defense%2520against%2520diverse%2520adversarial%2520attacks.%2520By%2520embedding%2520authorization%2520directly%2520into%2520the%2520reasoning%2520process%252C%2520CoA%2520provides%2520a%2520principled%2520architectural%2520blueprint%2520for%2520deploying%2520secure%2520LLMs%2520as%2520the%2520cognitive%2520cores%2520of%2520modern%2520AI%2520systems.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.22869v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Chain-of-Authorization%3A%20Embedding%20authorization%20into%20large%20language%20models&entry.906535625=Yang%20Li%20and%20Yule%20Liu%20and%20Xinlei%20He%20and%20Youjian%20Zhao%20and%20Qi%20Li%20and%20Ke%20Xu&entry.1292438233=Although%20Large%20Language%20Models%20%28LLMs%29%20have%20evolved%20from%20text%20generators%20into%20the%20cognitive%20core%20of%20modern%20AI%20systems%2C%20their%20inherent%20lack%20of%20authorization%20awareness%20exposes%20these%20systems%20to%20catastrophic%20risks%2C%20ranging%20from%20unintentional%20data%20leakage%20to%20unauthorized%20command%20execution.%20Existing%20defense%20mechanisms%20are%20fundamentally%20decoupled%20from%20internal%20reasoning%2C%20rendering%20them%20insufficient%20for%20the%20complex%20security%20demands%20of%20dynamic%20AI%20systems.%20Here%2C%20we%20propose%20the%20Chain-of-Authorization%20%28CoA%29%20framework%2C%20a%20paradigm%20that%20internalizes%20access%20control%20as%20a%20foundational%20cognitive%20capability.%20By%20systematically%20redesigning%20the%20input-output%20format%20and%20fine-tuning%20the%20model%20on%20synthesized%20data%20 {"title": "Revealing Physical-World Semantic Vulnerabilities: Universal Adversarial Patches for Infrared Vision-Language Models", "author": "Chengyin Hu and Yuxian Dong and Yikun Guo and Xiang Chen and Junqi Wu and Jiahuan Long and Yiwei Wei and Tingsong Jiang and Wen Yao", "abstract": "Infrared vision-language models (IR-VLMs) have emerged as a promising paradigm for multimodal perception in low-visibility environments, yet their robustness to adversarial attacks remains largely unexplored. Existing adversarial patch methods are mainly designed for RGB-based models in closed-set settings and are not readily applicable to the open-ended semantic understanding and physical deployment requirements of infrared VLMs. To bridge this gap, we propose Universal Curved-Grid Patch (UCGP), a universal physical adversarial patch framework for IR-VLMs. UCGP integrates Curved-Grid Mesh (CGM) parameterization for continuous, low-frequency, and deployable patch generation with a unified representation-driven objective that promotes subspace departure, topology disruption, and stealth. To improve robustness under real-world deployment and domain shift, we further incorporate Meta Differential Evolution and EOT-augmented TPS deformation modeling. Rather than manipulating labels or prompts, UCGP directly disrupts the visual representation space, weakening cross-modal semantic alignment. Extensive experiments demonstrate that UCGP consistently compromises semantic understanding across diverse IR-VLM architectures while maintaining cross-model transferability, cross-dataset generalization, real-world physical effectiveness, and robustness against defenses. These findings reveal a previously overlooked robustness vulnerability in current infrared multimodal systems.", "link": "http://arxiv.org/abs/2604.03117v1", "date": "2026-04-03", "relevancy": 2.2007, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5603}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5481}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5481}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Revealing%20Physical-World%20Semantic%20Vulnerabilities%3A%20Universal%20Adversarial%20Patches%20for%20Infrared%20Vision-Language%20Models&body=Title%3A%20Revealing%20Physical-World%20Semantic%20Vulnerabilities%3A%20Universal%20Adversarial%20Patches%20for%20Infrared%20Vision-Language%20Models%0AAuthor%3A%20Chengyin%20Hu%20and%20Yuxian%20Dong%20and%20Yikun%20Guo%20and%20Xiang%20Chen%20and%20Junqi%20Wu%20and%20Jiahuan%20Long%20and%20Yiwei%20Wei%20and%20Tingsong%20Jiang%20and%20Wen%20Yao%0AAbstract%3A%20Infrared%20vision-language%20models%20%28IR-VLMs%29%20have%20emerged%20as%20a%20promising%20paradigm%20for%20multimodal%20perception%20in%20low-visibility%20environments%2C%20yet%20their%20robustness%20to%20adversarial%20attacks%20remains%20largely%20unexplored.%20Existing%20adversarial%20patch%20methods%20are%20mainly%20designed%20for%20RGB-based%20models%20in%20closed-set%20settings%20and%20are%20not%20readily%20applicable%20to%20the%20open-ended%20semantic%20understanding%20and%20physical%20deployment%20requirements%20of%20infrared%20VLMs.%20To%20bridge%20this%20gap%2C%20we%20propose%20Universal%20Curved-Grid%20Patch%20%28UCGP%29%2C%20a%20universal%20physical%20adversarial%20patch%20framework%20for%20IR-VLMs.%20UCGP%20integrates%20Curved-Grid%20Mesh%20%28CGM%29%20parameterization%20for%20continuous%2C%20low-frequency%2C%20and%20deployable%20patch%20generation%20with%20a%20unified%20representation-driven%20objective%20that%20promotes%20subspace%20departure%2C%20topology%20disruption%2C%20and%20stealth.%20To%20improve%20robustness%20under%20real-world%20deployment%20and%20domain%20shift%2C%20we%20further%20incorporate%20Meta%20Differential%20Evolution%20and%20EOT-augmented%20TPS%20deformation%20modeling.%20Rather%20than%20manipulating%20labels%20or%20prompts%2C%20UCGP%20directly%20disrupts%20the%20visual%20representation%20space%2C%20weakening%20cross-modal%20semantic%20alignment.%20Extensive%20experiments%20demonstrate%20that%20UCGP%20consistently%20compromises%20semantic%20understanding%20across%20diverse%20IR-VLM%20architectures%20while%20maintaining%20cross-model%20transferability%2C%20cross-dataset%20generalization%2C%20real-world%20physical%20effectiveness%2C%20and%20robustness%20against%20defenses.%20These%20findings%20reveal%20a%20previously%20overlooked%20robustness%20vulnerability%20in%20current%20infrared%20multimodal%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03117v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DRevealing%2520Physical-World%2520Semantic%2520Vulnerabilities%253A%2520Universal%2520Adversarial%2520Patches%2520for%2520Infrared%2520Vision-Language%2520Models%26entry.906535625%3DChengyin%2520Hu%2520and%2520Yuxian%2520Dong%2520and%2520Yikun%2520Guo%2520and%2520Xiang%2520Chen%2520and%2520Junqi%2520Wu%2520and%2520Jiahuan%2520Long%2520and%2520Yiwei%2520Wei%2520and%2520Tingsong%2520Jiang%2520and%2520Wen%2520Yao%26entry.1292438233%3DInfrared%2520vision-language%2520models%2520%2528IR-VLMs%2529%2520have%2520emerged%2520as%2520a%2520promising%2520paradigm%2520for%2520multimodal%2520perception%2520in%2520low-visibility%2520environments%252C%2520yet%2520their%2520robustness%2520to%2520adversarial%2520attacks%2520remains%2520largely%2520unexplored.%2520Existing%2520adversarial%2520patch%2520methods%2520are%2520mainly%2520designed%2520for%2520RGB-based%2520models%2520in%2520closed-set%2520settings%2520and%2520are%2520not%2520readily%2520applicable%2520to%2520the%2520open-end {"title": "annbatch unlocks terabyte-scale training of biological data in anndata", "author": "Ilan Gold and Felix Fischer and Lucas Arnoldt and F. Alexander Wolf and Fabian J. Theis", "abstract": "The scale of biological datasets now routinely exceeds system memory, making data access rather than model computation the primary bottleneck in training machine-learning models. This bottleneck is particularly acute in biology, where widely used community data formats must support heterogeneous metadata, sparse and dense assays, and downstream analysis within established computational ecosystems. Here we present annbatch, a mini-batch loader native to anndata that enables out-of-core training directly on disk-backed datasets. Across single-cell transcriptomics, microscopy and whole-genome sequencing benchmarks, annbatch increases loading throughput by up to an order of magnitude and shortens training from days to hours, while remaining fully compatible with the scverse ecosystem. Annbatch establishes a practical data-loading infrastructure for scalable biological AI, allowing increasingly large and diverse datasets to be used without abandoning standard biological data formats. Github: https://github.com/scverse/annbatch", "link": "http://arxiv.org/abs/2604.01949v2", "date": "2026-04-03", "relevancy": 2.2002, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4487}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.44}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.4314}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20annbatch%20unlocks%20terabyte-scale%20training%20of%20biological%20data%20in%20anndata&body=Title%3A%20annbatch%20u {"title": "SFFNet: Synergistic Feature Fusion Network With Dual-Domain Edge Enhancement for UAV Image Object Detection", "author": "Wenfeng Zhang and Jun Ni and Yue Meng and Xiaodong Pei and Wei Hu and Qibing Qin and Lei Huang", "abstract": "Object detection in unmanned aerial vehicle (UAV) images remains a highly challenging task, primarily caused by the complexity of background noise and the imbalance of target scales. Traditional methods easily struggle to effectively separate objects from intricate backgrounds and fail to fully leverage the rich multi-scale information contained within images. To address these issues, we have developed a synergistic feature fusion network (SFFNet) with dual-domain edge enhancement specifically tailored for object detection in UAV images. Firstly, the multi-scale dynamic dual-domain coupling (MDDC) module is designed. This component introduces a dual-driven edge extraction architecture that operates in both the frequency and spatial domains, enabling effective decoupling of multi-scale object edges from background noise. Secondly, to further enhance the representation capability of the model's neck in terms of both geometric and semantic information, a synergistic feature pyramid network (SFPN) is proposed. SFPN leverages linear deformable convolutions to adaptively capture irregular object shapes and establishes long-range contextual associations around targets through the designed wide-area perception module (WPM). Moreover, to adapt to the various applications or resource-constrained scenarios, six detectors of different scales (N/S/M/B/L/X) are designed. Experiments on two challenging aerial datasets (VisDrone and UAVDT) demonstrate the outstanding performance of SFFNet-X, achieving 36.8 AP and 20.6 AP, respectively. The lightweight models (N/S) also maintain a balance between detection accuracy and parameter efficiency. The code will be available at https://github.com/CQNU-ZhangLab/SFFNet.", "link": "http://arxiv.org/abs/2604.03176v1", "date": "2026-04-03", "relevancy": 2.193, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5585}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5426}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5367}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SFFNet%3A%20Synergistic%20Feature%20Fusion%20Network%20With%20Dual-Domain%20Edge%20Enhancement%20for%20UAV%20Image%20Object%20Detection&body=Title%3A%20SFFNet%3A%20Synergistic%20Feature%20Fusion%20Network%20With%20Dual-Domain%20Edge%20Enhancement%20for%20UAV%20Image%20Object%20Detection%0AAuthor%3A%20Wenfeng%20Zhang%20and%20Jun%20Ni%20and%20Yue%20Meng%20and%20Xiaodong%20Pei%20and%20Wei%20Hu%20and%20Qibing%20Qin%20and%20Lei%20Huang%0AAbstract%3A%20Object%20detection%20in%20unmanned%20aerial%20vehicle%20%28UAV%29%20images%20remains%20a%20highly%20challenging%20task%2C%20primarily%20caused%20by%20the%20complexity%20of%20background%20noise%20and%20the%20imbalance%20of%20target%20scales.%20Traditional%20methods%20easily%20struggle%20to%20effectively%20separate%20objects%20from%20intricate%20backgrounds%20and%20fail%20to%20fully%20leverage%20the%20rich%20multi-scale%20information%20contained%20within%20images.%20To%20address%20these%20issues%2C%20we%20have%20developed%20a%20synergistic%20feature%20fusion%20network%20%28SFFNet%29%20with%20dual-domain%20edge%20enhancement%20specifically%20tailored%20for%20object%20detection%20in%20UAV%20images.%20Firstly%2C%20the%20multi-scale%20dynamic%20dual-domain%20coupling%20%28MDDC%29%20module%20is%20designed.%20This%20component%20introduces%20a%20dual-driven%20edge%20extraction%20architecture%20that%20operates%20in%20both%20the%20frequency%20 {"title": "Behavior-Constrained Reinforcement Learning with Receding-Horizon Credit Assignment for High-Performance Control", "author": "Siwei Ju and Jan Tauberschmidt and Oleg Arenz and Peter van Vliet and Jan Peters", "abstract": "Learning high-performance control policies that remain consistent with expert behavior is a fundamental challenge in robotics. Reinforcement learning can discover high-performing strategies but often departs from desirable human behavior, whereas imitation learning is limited by demonstration quality and struggles to improve beyond expert data. We propose a behavior-constrained reinforcement learning framework that improves beyond demonstrations while explicitly controlling deviation from expert behavior. Because expert-consistent behavior in dynamic control is inherently trajectory-level, we introduce a receding-horizon predictive mechanism that models short-term future trajectories and provides look-ahead rewards during training. To account for the natural variability of human behavior under disturbances and changing conditions, we further condition the policy on reference trajectories, allowing it to represent a distribution of expert-consistent behaviors rather than a single deterministic target. Empirically, we evaluate the approach in high-fidelity race car simulation using data from professional drivers, a domain characterized by extreme dynamics and narrow performance margins. The learned policies achieve competitive lap times while maintaining close alignment with expert driving behavior, outperforming baseline methods in both performance and imitation quality. Beyond standard benchmarks, we conduct human-grounded evaluation in a driver-in-the-loop simulator and show that the learned policies reproduce setup-dependent driving characteristics consistent with the feedback of top-class professional race drivers. These results demonstrate that our method enables learning high-performance control policies that are both optimal and behavior-consistent, and can serve as reliable surrogates for human decision-making in complex control systems.", "link": "http://arxiv.org/abs/2604.03023v1", "date": "2026-04-03", "relevancy": 2.1913, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5923}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5457}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5041}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Behavior-Constrained%20Reinforcement%20Learning%20with%20Receding-Horizon%20Credit%20Assignment%20for%20High-Performance%20Control&body=Title%3A%20Behavior-Constrained%20Reinforcement%20Learning%20with%20Receding-Horizon%20Credit%20Assignment%20for%20High-Performance%20Control%0AAuthor%3A%20Siwei%20Ju%20and%20Jan%20Tauberschmidt%20and%20Oleg%20Arenz%20and%20Peter%20van%20Vliet%20and%20Jan%20Peters%0AAbstract%3A%20Learning%20high-performance%20control%20policies%20that%20remain%20consistent%20with%20expert%20behavior%20is%20a%20fundamental%20challenge%20in%20robotics.%20Reinforcement%20learning%20can%20discover%20high-performing%20strategies%20but%20often%20departs%20from%20desirable%20human%20behavior%2C%20whereas%20imitation%20learning%20is%20limited%20by%20demonstration%20quality%20and%20struggles%20to%20improve%20beyond%20expert%20data.%20We%20propose%20a%20behavior-constrained%20reinforcement%20learning%20framework%20that%20improves%20beyond%20demonstrations%20while%20explicitly%20controlling%20deviation%20from%20expert%20behavior.%20Because%20expert-consistent%20behavior%20in%20dynamic%20control%20is%20inherently%20trajectory-level%2C%20we%20introduce%20a%20receding-horizon%20predictive%20mechanism%20that%20models%20short-term%20future%20trajectories%20and%20provides%20look-ahead%20rewards%20during%20training.%20To%20account%20for%20the%20natural%20variability%20of%20human%20behavior%20under%20disturbances%20and%20changing%20conditions%2C%20we%20further%20condition%20the%20policy%20on%20reference%20trajectories%2C%20allowing%20it%20to%20represent%20a%20distribution%20of%20expert-consistent%20behaviors%20rather%20than%20a%20single%20deterministic%20target.%20Empirically%2C%20we%20evaluate%20the%20approach%20in%20high-fidelity%20race%20car%20simulation%20using%20data%20from%20professional%20drivers%2C%20a%20domain%20characterized%20by%20extreme%20dynamics%20and%20narrow%20performance%20margins.%20The%20learned%20policies%20achieve%20competitive%20lap%20times%20while%20maintaining%20close%20alignment%20with%20expert%20driving%20behavior%2C%20outperforming%20baseline%20methods%20in%20both%20performance%20and%20imitation%20quality.%20Beyond%20standard%20benchmarks%2C%20we%20conduct%20human-grounded%20evaluation%20in%20a%20driver-in-the-loop%20simulator%20and%20show%20that%20the%20learned%20policies%20reproduce%20setup-dependent%20driving%20characteristics%20consistent%20with%20the%20feedback%20of%20top-class%20professional%20race%20drivers.%20These%20results%20demonstrate%20that%20our%20method%20enables%20learning%20high-performance%20control%20policies%20that%20are%20both%20optimal%20and%20behavior-consistent%2C%20and%20can%20serve%20as%20reliable%20surrogates%20for%20human%20decision-making%20in%20complex%20control%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03023v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBehavior-Constrained%2520Reinforcement%2520Learning%2520with%2520Receding-Horizon%2520Credit%2520Assignment%2520for%2520High-Performance%2520Control%26entry.906535625%3DSiwei%2520Ju%2520and%2520Jan%2520Tauberschmidt%2520and%2520Oleg%2520Arenz%2520a {"title": "Beyond the Parameters: A Technical Survey of Contextual Enrichment in Large Language Models: From In-Context Prompting to Causal Retrieval-Augmented Generation", "author": "Prakhar Bansal and Shivangi Agarwal", "abstract": "Large language models (LLMs) encode vast world knowledge in their parameters, yet they remain fundamentally limited by static knowledge, finite context windows, and weakly structured causal reasoning. This survey provides a unified account of augmentation strategies along a single axis: the degree of structured context supplied at inference time. We cover in-context learning and prompt engineering, Retrieval-Augmented Generation (RAG), GraphRAG, and CausalRAG. Beyond conceptual comparison, we provide a transparent literature-screening protocol, a claim-audit framework, and a structured cross-paper evidence synthesis that distinguishes higher-confidence findings from emerging results. The paper concludes with a deployment-oriented decision framework and concrete research priorities for trustworthy retrieval-augmented NLP.", "link": "http://arxiv.org/abs/2604.03174v1", "date": "2026-04-03", "relevancy": 2.167, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5475}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5475}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.513}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20the%20Parameters%3A%20A%20Technical%20Survey%20of%20Contextual%20Enrichment%20in%20Large%20Language%20Models%3A%20From%20In-Context%20Prompting%20to%20Causal%20Retrieval-Augmented%20Generation&body=Title%3A%20Beyond%20the%20Parameters%3A%20A%20Technical% {"title": "FedVideoMAE: Efficient Privacy-Preserving Federated Video Moderation", "author": "Ziyuan Tao and Chuanzhi Xu and Sandaru Jayawardana and Adnan Mahmood and Wei Bao and Kanchana Thilakarathna and Teng Joon Lim", "abstract": "Short-form video moderation increasingly needs learning pipelines that protect user privacy without paying the full bandwidth and latency cost of cloud-centralized inference. We present FedVideoMAE, an on-device federated framework for video violence detection that combines self-supervised VideoMAE representations, LoRA-based parameter-efficient adaptation, client-side DP-SGD, and server-side secure aggregation. By updating only 5.5M parameters (about 3.5% of a 156M backbone), FedVideoMAE reduces communication by 28.3x relative to full-model federated updates while keeping raw videos on device throughout training. On RWF-2000 with 40 clients, the method reaches 77.25% accuracy without privacy protection and 65~66% under strong differential privacy. We further show that this privacy gap is consistent with an effective-SNR analysis tailored to the small-data, parameter-efficient federated regime, which indicates roughly 8.5~12x DP-noise amplification in our setting. To situate these results more clearly, we also compare against archived full-model federated baselines and summarize auxiliary transfer behavior on RLVS and binary UCF-Crime. Taken together, these findings position FedVideoMAE as a practical operating point for privacy-preserving video moderation on edge devices. Our code can be found at: https://github.com/zyt-599/FedVideoMAE.", "link": "http://arxiv.org/abs/2512.18809v2", "date": "2026-04-03", "relevancy": 2.1602, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.5606}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.526}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.5252}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FedVideoMAE%3A%20Efficient%20Privacy-Preserving%20Federated%20Video%20Moderation&body=Title%3A%20FedVideoMAE%3A%20Efficient%20Privacy-Preserving%20Federated%20Video%20Moderation%0AAuthor%3A%20Ziyuan%20Tao%20and%20Chuanzhi%20Xu%20and%20Sandaru%20Jayawardana%20and%20Adnan%20Mahmood%20and%20Wei%20Bao%20and%20Kanchana%20Thilakarathna%20and%20Teng%20Joon%20Lim%0AAbstract%3A%20Short-form%20video%20moderation%20increasingly%20needs%20learning%20pipelines%20that%20protect%20user%20privacy%20without%20paying%20the%20full%20bandwidth%20and%20latency%20cost%20of%20cloud-centralized%20inference.%20We%20present%20FedVideoMAE%2C%20an%20on-device%20federated%20framework%20for%20video%20violence%20detection%20that%20combines%20self-supervised%20VideoMAE%20representations%2C%20LoRA-based%20parameter-efficient%20adaptation%2C%20client-side%20DP-SGD%2C%20and%20server-side%20secure%20aggregation.%20By%20updating%20only%205.5M%20parameters%20%28about%203.5%25%20of%20a%20156M%20backbone%29%2C%20FedVideoMAE%20reduces%20communication%20by%2028.3x%20relative%20to%20full-model%20federated%20updates%20while%20keeping%20raw%20videos%20on%20device%20throughout%20training.%20On%20RWF-2000%20with%2040%20clients%2C%20the%20method%20reaches%2077.25%25%20accuracy%20without%20privacy%20protection%20and%2065~66%25%20under%20strong%20differential%20privacy.%20We%20further%20show%20that%20this%20privacy%20gap%20is%20consistent%20with%20an%20effective-SNR%20analysis%20tailored%20to%20the%20small-data%2C%20parameter-efficient%20federated%20regime%2C%20which%20indicates%20roughly%208.5~12x%20DP-noise%20amplification%20in%20our%20setting.%20To%20situate%20these%20results%20more%20clearly%2C%20we%20also%20compare%20against%20archived%20full-model%20federated%20baselines%20and%20summarize%20auxiliary%20transfer%20behavior%20on%20RLVS%20and%20binary%20UCF-Crime.%20Taken%20together%2C%20these%20findings%20position%20FedVideoMAE%20as%20a%20practical%20operating%20point%20for%20privacy-preserving%20video%20moderation%20on%20edge%20devices.%20Our%20code%20can%20be%20found%20at%3A%20https%3A//github.com/zyt-599/FedVideoMAE.%0ALink%3A%20http%3A//arxiv.org/abs/2512.18809v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFedVideoMAE%253A%2520Efficient%2520Privacy-Preserving%2520Federated%2520Video%2520Moderation%26entry.906535625%3DZiyuan%2520Tao%2520and%2520Chuanzhi%2520Xu%2520and%2520Sandaru%2520Jayawardana%2520and%2520Adnan%2520Mahmood%2520and%2520Wei%2520Bao%2520and%2520Kanchana%2520Thilakarathna%2520and%2520Teng%2520Joon%2520Lim%26entry.1292438233%3DShort-form%2520video%2520moderation%2520increasingly%2520needs%2520learning%2520pipelines%2520that%2520protect%2520user%2520privacy%2520without%2520paying%2520the%2520full%2520bandwidth%2520and%2520latency%2520cost%2520of%2520cloud-centralized%2520inference.%2520We%2520present%2520FedVideoMAE%252C%2520an%2520on-device%2520federated%2520framework%2520for%2520video%2520violence%2520detection%2520that%2520combines%2520self-supervised%2520VideoMAE%2520representations%252C%2520LoRA-based%2520parameter-efficient%2520adaptation%252C%2520client-side%2520DP-SGD%252C%2520and%2520server-side%2520secure%2520aggregation.%2520By%2520updating%2520only%25205.5M%2520parameters%2520%2528about%25203.5%2525%2520of%2520a%2520156M%2520backbone%2529%252C%2520FedVideoMAE%2520reduces%2520communication%2520by%252028.3x%2520relative%2520to%2520full-model%2520federated%2520updates%2520while%2520keeping%2520raw%2520videos%2520on%2520device%2520throughout%2520training.%2520On%2520RWF-2000%2520with%252040%2520clients%252C%2520the%2520method%2520reaches%252077.25%2525%2520accuracy%2520without%2520privacy%2520protection%2520and%252065~66%2525%2520under%25 {"title": "Adaptive randomized pivoting and volume sampling", "author": "Ethan N. Epperly", "abstract": "Adaptive randomized pivoting (ARP) is a recently proposed and highly effective algorithm for column subset selection. This paper reinterprets the ARP algorithm by drawing connections to the volume sampling distribution and active learning algorithms for linear regression. As consequences, this paper presents new analysis for the ARP algorithm and faster implementations using rejection sampling.", "link": "http://arxiv.org/abs/2510.02513v2", "date": "2026-04-03", "relevancy": 2.1576, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4857}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4071}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4018}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Adaptive%20randomized%20pivoting%20and%20volume%20sampling&body=Title%3A%20Adaptive%20randomized%20pivoting%20and%20volume%20sampling%0AAuthor%3A%20Ethan%20N.%20Epperly%0AAbstract%3A%20Adaptive%20randomized%20pivoting%20%28ARP%29%20is%20a%20recently%20proposed%20and%20highly%20effective%20algorithm%20for%20column%20subset%20selection.%20This%20paper%20reinterprets%20the%20ARP%20algorithm%20by%20drawing%20connections%20to%20the%20volume%20sampling%20distribution%20and%20active%20learning%20algorithms%20for%20linear%20regression.%20As%20consequences%2C%20this%20paper%20presents%20new%20analysis%20for%20the%20ARP%20algorithm%20and%20faster%20implementations%20using%20rejection%20sampling.%0ALink%3A%20http%3A//arxiv.org/abs/2510.02513v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m {"title": "Enhancing Robustness of Federated Learning via Server Learning", "author": "Van Sy Mai and Kushal Chakrabarti and Richard J. La and Dipankar Maity", "abstract": "This paper explores the use of server learning for enhancing the robustness of federated learning against malicious attacks even when clients' training data are not independent and identically distributed. We propose a heuristic algorithm that uses server learning and client update filtering in combination with geometric median aggregation. We demonstrate via experiments that this approach can achieve significant improvement in model accuracy even when the fraction of malicious clients is high, even more than $50\\%$ in some cases, and the dataset utilized by the server is small and could be synthetic with its distribution not necessarily close to that of the clients' aggregated data.", "link": "http://arxiv.org/abs/2604.03226v1", "date": "2026-04-03", "relevancy": 2.1536, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4349}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4332}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.424}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Enhancing%20Robustness%20of%20Federated%20Learning%20via%20Server%20Learning&body=Title%3A%20Enhancing%20Robustness%20of%20Federated%20Learning%20via%20Server%20Learning%0AAuthor%3A%20Van%20Sy%20Mai%20and%20Kushal%20Chakrabarti%20and%20Richard%20J.%20La%20and%20Dipankar%20Maity%0AAbstract%3A%20This%20paper%20explores%20the%20use%20of%20server%20learning%20for%20enhancing%20the%20robustness%20of%20federated%20learning%20against%20malicious%20attacks%20even%20when%

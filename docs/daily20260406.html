{"title": "Flash-Mono: Feed-Forward Accelerated Gaussian Splatting Monocular SLAM", "author": "Zicheng Zhang and Ke Wu and Xiangting Meng and Keyu Liu and Jieru Zhao and Wenchao Ding", "abstract": "Monocular 3D Gaussian Splatting SLAM suffers from critical limitations in time efficiency, geometric accuracy, and multi-view consistency. These issues stem from the time-consuming $\\textit{Train-from-Scratch}$ optimization and the lack of inter-frame scale consistency from single-frame geometry priors. We contend that a feed-forward paradigm, leveraging multi-frame context to predict Gaussian attributes directly, is crucial for addressing these challenges. We present Flash-Mono, a system composed of three core modules: a feed-forward prediction frontend, a 2D Gaussian Splatting mapping backend, and an efficient hidden-state-based loop closure module. We trained a recurrent feed-forward frontend model that progressively aggregates multi-frame visual features into a hidden state via cross attention and jointly predicts camera poses and per-pixel Gaussian properties. By directly predicting Gaussian attributes, our method bypasses the burdensome per-frame optimization required in optimization-based GS-SLAM, achieving a $\\textbf{10x}$ speedup while ensuring high-quality rendering. The power of our recurrent architecture extends beyond efficient prediction. The hidden states act as compact submap descriptors, facilitating efficient loop closure and global $\\mathrm{Sim}(3)$ optimization to mitigate the long-standing challenge of drift. For enhanced geometric fidelity, we replace conventional 3D Gaussian ellipsoids with 2D Gaussian surfels. Extensive experiments demonstrate that Flash-Mono achieves state-of-the-art performance in both tracking and mapping quality, highlighting its potential for embodied perception and real-time reconstruction applications. Project page: https://victkk.github.io/flash-mono.", "link": "http://arxiv.org/abs/2604.03092v1", "date": "2026-04-03", "relevancy": 3.3234, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.7233}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6499}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6208}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Flash-Mono%3A%20Feed-Forward%20Accelerated%20Gaussian%20Splatting%20Monocular%20SLAM&body=Title%3A%20Flash-Mono%3A%20Feed-Forward%20Accelerated%20Gaussian%20Splatting%20Monocular%20SLAM%0AAuthor%3A%20Zicheng%20Zhang%20and%20Ke%20Wu%20and%20Xiangting%20Meng%20and%20Keyu%20Liu%20and%20Jieru%20Zhao%20and%20Wenchao%20Ding%0AAbstract%3A%20Monocular%203D%20Gaussian%20Splatting%20SLAM%20suffers%20from%20critical%20limitations%20in%20time%20efficiency%2C%20geometric%20accuracy%2C%20and%20multi-view%20consistency.%20These%20issues%20stem%20from%20the%20time-consuming%20%24%5Ctextit%7BTrain-from-Scratch%7D%24%20optimization%20and%20the%20lack%20of%20inter-frame%20scale%20consistency%20from%20single-frame%20geometry%20priors.%20We%20contend%20that%20a%20feed-forward%20paradigm%2C%20leveraging%20multi-frame%20context%20to%20predict%20Gaussian%20attributes%20directly%2C%20is%20crucial%20for%20addressing%20these%20challenges.%20We%20present%20Flash-Mono%2C%20a%20system%20composed%20of%20three%20core%20modules%3A%20a%20feed-forward%20prediction%20frontend%2C%20a%202D%20Gaussian%20Splatting%20mapping%20backend%2C%20and%20an%20efficient%20hidden-state-based%20loop%20closure%20module.%20We%20trained%20a%20recurrent%20feed-forward%20frontend%20model%20that%20progressively%20aggregates%20multi-frame%20visual%20features%20into%20a%20hidden%20state%20via%20cross%20attention%20and%20jointly%20predicts%20camera%20poses%2 {"title": "SING3R-SLAM: Submap-based Indoor Monocular Gaussian SLAM with 3D Reconstruction Priors", "author": "Kunyi Li and Michael Niemeyer and Sen Wang and Stefano Gasperini and Nassir Navab and Federico Tombari", "abstract": "Recent advances in dense 3D reconstruction have demonstrated strong capability in accurately capturing local geometry. However, extending these methods to incremental global reconstruction, as required in SLAM systems, remains challenging. Without explicit modeling of global geometric consistency, existing approaches often suffer from accumulated drift, scale inconsistency, and suboptimal local geometry. To address these issues, we propose SING3R-SLAM, a globally consistent Gaussian-based monocular indoor SLAM framework. Our approach represents the scene with a Global Gaussian Map that serves as a persistent, differentiable memory, incorporates local geometric reconstruction via submap-level global alignment, and leverages global map's consistency to further refine local geometry. This design enables efficient and versatile 3D mapping for multiple downstream applications. Extensive experiments show that SING3R-SLAM achieves state-of-the-art performance in pose estimation, 3D reconstruction, and novel view rendering. It improves pose accuracy by over 10%, produces finer and more detailed geometry, and maintains a compact and memory-efficient global representation on real-world datasets.", "link": "http://arxiv.org/abs/2511.17207v2", "date": "2026-04-03", "relevancy": 3.2639, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.734}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6144}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similari {"title": "3DXTalker: Unifying Identity, Lip Sync, Emotion, and Spatial Dynamics in Expressive 3D Talking Avatars", "author": "Zhongju Wang and Zhenhong Sun and Beier Wang and Yifu Wang and Daoyi Dong and Huadong Mo and Hongdong Li", "abstract": "Audio-driven 3D talking avatar generation is increasingly important in virtual communication, digital humans, and interactive media, where avatars must preserve identity, synchronize lip motion with speech, express emotion, and exhibit lifelike spatial dynamics, collectively defining a broader objective of expressivity. However, achieving this remains challenging due to insufficient training data with limited subject identities, narrow audio representations, and restricted explicit controllability. In this paper, we propose 3DXTalker, an expressive 3D talking avatar through data-curated identity modeling, audio-rich representations, and spatial dynamics controllability. 3DXTalker enables scalable identity modeling via 2D-to-3D data curation pipeline and disentangled representations, alleviating data scarcity and improving identity generalization. Then, we introduce frame-wise amplitude and emotional cues beyond standard speech embeddings, ensuring superior lip synchronization and nuanced expression modulation. These cues are unified by a flow-matching-based transformer for coherent facial dynamics. Moreover, 3DXTalker also enables natural head-pose motion generation while supporting stylized control via prompt-based conditioning. Extensive experiments show that 3DXTalker integrates lip synchronization, emotional expression, and head-pose dynamics within a unified framework, achieves superior performance in 3D talking avatar generation.", "link": "http://arxiv.org/abs/2602.10516v3", "date": "2026-04-03", "relevancy": 3.1902, "topK": [{"title": "3D Gaussian Blendshapes for Head Avatar Animation", "link": "http://arxiv.org/abs/2404.19398v2", "similarity": 0.6413}, {"title": "3D Gaussian Blendshapes for Head Avatar Animation", {"title": "MMTalker: Multiresolution 3D Talking Head Synthesis with Multimodal Feature Fusion", "author": "Bin Liu and Zhixiang Xiong and Zhifen He and Bo Li", "abstract": "Speech-driven three-dimensional (3D) facial animation synthesis aims to build a mapping from one-dimensional (1D) speech signals to time-varying 3D facial motion signals. Current methods still face challenges in maintaining lip-sync accuracy and producing realistic facial expressions, primarily due to the highly ill-posed nature of this cross-modal mapping. In this paper, we introduce a novel 3D audio-driven facial animation synthesis method through multi-resolution representation and multi-modal feature fusion, called MMTalker which can accurately reconstruct the rich details of 3D facial motion.\n  We first achieve the continuous representation of 3D face with details by mesh parameterization and non-uniform differentiable sampling. The mesh parameterization technique establishes the correspondence between UV plane and 3D facial mesh and is used to offer ground truth for the continuous learning. Differentiable non-uniform sampling enables precise facial detail acquisition by setting learnable sampling probability in each triangular face. Next, we employ residual graph convolutional network and dual cross-attention mechanism to extract discriminative facial motion feature from multiple input modalities. This proposed multimodal fusion strategy takes full use of the hierarchical features of speech and the explicit spatiotemporal geometric features of facial mesh. Finally, a lightweight regression network predicts the vertex-wise geometric displacements of the synthesized talking face by jointly processing the sampled points in the canonical UV space and the encoded facial motion features.\n  Comprehensive experiments demonstrate that significant improvements are achieved over state-of-the-art methods, especially in the synchronization accuracy of lip and eye movements.", "link": "http://arxiv.org tinuous%20learning.%20Differentiable%20non-uniform%20sampling%20enables%20precise%20facial%20detail%20acquisition%20by%20setting%20learnable%20sampling%20probability%20in%20each%20triangular%20face.%20Next%2C%20we%20employ%20residual%20graph%20convolutional%20network%20and%20dual%20cross-attention%20mechanism%20to%20extract%20discriminative%20facial%20motion%20feature%20from%20multiple%20input%20modalities.%20This%20proposed%20multimodal%20fusion%20strategy%20takes%20full%20use%20of%20the%20hierarchical%20features%20of%20speech%20and%20the%20explicit%20spatiotemporal%20geometric%20features%20of%20facial%20mesh.%20Finally%2C%20a%20lightweight%20regression%20network%20predicts%20the%20vertex-wise%20geometric%20displacements%20of%20the%20synthesized%20talking%20face%20by%20jointly%20processing%20the%20sampled%20points%20in%20the%20canonical%20UV%20space%20and%20the%20encoded%20facial%20motion%20features.%0A%20%20Comprehensive%20experiments%20demonstrate%20that%20significant%20improvements%20are%20achieved%20over%20state-of-the-art%20methods%2C%20especially%20in%20the%20synchronization%20accuracy%20of%20lip%20and%20eye%20movements.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02941v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMMTalker%253A%2520Multiresolution%25203D%2520Talking%2520Head%2520Synthesis%2520with%2520Multimodal%2520Feature%2520Fusion%26entry.906535625%3DBin%2520Liu%2520and%2520Zhixiang%2520Xiong%2520and%2520Zhifen%2520He%2520and%2520Bo%2520Li%26entry.1292438233%3DSpeech-driven%2520three-dimensional%2520%25283D%2529%2520facial%2520animation%2520synthesis%2520aims%2520to%2520build%2520a%2520mapping%2520from%2520one-dimensional%2520%25281D%2529%2520speech%2520signals%2520to%2520time-varying%25203D%2520facial%2520motion%2520signals.%2520Current%2520methods%2520still%2520face%2520challenges%2520in%2520maintaining%2520lip-sync%2520accuracy%2520and%2520producing%2520realistic%25 {"title": "CoME-VL: Scaling Complementary Multi-Encoder Vision-Language Learning", "author": "Ankan Deria and Komal Kumar and Xilin He and Imran Razzak and Hisham Cholakkal and Fahad Shahbaz Khan and Salman Khan", "abstract": "Recent vision-language models (VLMs) typically rely on a single vision encoder trained with contrastive image-text objectives, such as CLIP-style pretraining. While contrastive encoders are effective for cross-modal alignment and retrieval, self-supervised visual encoders often capture richer dense semantics and exhibit stronger robustness on recognition and understanding tasks. In this work, we investigate how to scale the fusion of these complementary visual representations for vision-language modeling. We propose CoME-VL: Complementary Multi-Encoder Vision-Language, a modular fusion framework that integrates a contrastively trained vision encoder with a self-supervised DINO encoder. Our approach performs representation-level fusion by (i) entropy-guided multi-layer aggregation with orthogonality-constrained projections to reduce redundancy, and (ii) RoPE-enhanced cross-attention to align heterogeneous token grids and produce compact fused visual tokens. The fused tokens can be injected into a decoder-only LLM with minimal changes to standard VLM pipelines. Extensive experiments across diverse vision-language benchmarks demonstrate that CoME-VL consistently outperforms single-encoder baselines. In particular, we observe an average improvement of 4.9% on visual understanding tasks and 5.4% on grounding tasks. Our method achieves state-of-the-art performance on RefCOCO for detection while improving over the baseline by a large margin. Finally, we conduct ablation studies on layer merging, non-redundant feature mixing, and fusion capacity to evaluate how complementary contrastive and self-supervised signals affect VLM performance.", "link": "http://arxiv.org/abs/2604.03231v1", "date": "2026-04-03", "relevancy": 3.077, "topK": [{"title": "Lexico ced%20cross-attention%20to%20align%20heterogeneous%20token%20grids%20and%20produce%20compact%20fused%20visual%20tokens.%20The%20fused%20tokens%20can%20be%20injected%20into%20a%20decoder-only%20LLM%20with%20minimal%20changes%20to%20standard%20VLM%20pipelines.%20Extensive%20experiments%20across%20diverse%20vision-language%20benchmarks%20demonstrate%20that%20CoME-VL%20consistently%20outperforms%20single-encoder%20baselines.%20In%20particular%2C%20we%20observe%20an%20average%20improvement%20of%204.9%25%20on%20visual%20understanding%20tasks%20and%205.4%25%20on%20grounding%20tasks.%20Our%20method%20achieves%20state-of-the-art%20performance%20on%20RefCOCO%20for%20detection%20while%20improving%20over%20the%20baseline%20by%20a%20large%20margin.%20Finally%2C%20we%20conduct%20ablation%20studies%20on%20layer%20merging%2C%20non-redundant%20feature%20mixing%2C%20and%20fusion%20capacity%20to%20evaluate%20how%20complementary%20contrastive%20and%20self-supervised%20signals%20affect%20VLM%20performance.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03231v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCoME-VL%253A%2520Scaling%2520Complementary%2520Multi-Encoder%2520Vision-Language%2520Learning%26entry.906535625%3DAnkan%2520Deria%2520and%2520Komal%2520Kumar%2520and%2520Xilin%2520He%2520and%2520Imran%2520Razzak%2520and%2520Hisham%2520Cholakkal%2520and%2520Fahad%2520Shahbaz%2520Khan%2520and%2520Salman%2520Khan%26entry.1292438233%3DRecent%2520vision-language%2520models%2520%2528VLMs%2529%2520typically%2520rely%2520on%2520a%2520single%2520vision%2520encoder%2520trained%2520with%2520contrastive%2520image-text%2520objectives%252C%2520such%2520as%2520CLIP-style%2520pretraining.%2520While%2520contrastive%2520encoders%2520are%2520effective%2520for%2520cross-modal%2520alignment%2520and%2520retrieval%252C%2520self-supervised%2520visual%2520encoders%2520often%2520capture%2520richer%2520dense%2520semantics%2520and%2 {"title": "DM3D: Deformable Mamba via Offset-Guided Differentiable Scanning for Point Cloud Understanding", "author": "Bin Liu and Chunyang Wang and Xuelian Liu and Ge Zhang", "abstract": "State Space Models (SSMs) show significant potential for long-sequence modeling, but their reliance on input order conflicts with the irregular nature of point clouds. Existing approaches often rely on predefined serialization schemes whose fixed scanning patterns cannot adapt to diverse geometric structures. To address this limitation, we propose DM3D, a deformable Mamba architecture for point cloud understanding. Specifically, DM3D introduces an offset-guided differentiable scanning mechanism that jointly performs resampling and reordering. Deformable Spatial Resampling (DSR) enhances structural awareness by adaptively resampling local features, while the Gaussian-based Differentiable Reordering (GDR) enables end-to-end optimization of the serialization order. We further introduce a Continuity-Aware State Update (CASU) mechanism that modulates the state update based on local geometric continuity. In addition, a Tri-Path Fusion module facilitates complementary interactions among different SSM branches. Together, these designs enable structure-adaptive serialization for point clouds. Extensive experiments on benchmark datasets show that DM3D achieves state-of-the-art or highly competitive results on classification, few-shot learning, and part segmentation tasks, validating the effectiveness of adaptive serialization for point cloud understanding.", "link": "http://arxiv.org/abs/2512.03424v3", "date": "2026-04-03", "relevancy": 2.9828, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.6162}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.588}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5855}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20DM3D%3A%20Deformable%20Mamba%20via%20Offset-Guided%20Differentiable%20Scanning%20for%20Point%20Cloud%20Understanding&body=Title%3A%20DM3D%3A%20Deformable%20Mamba%20via%20Offset-Guided%20Differentiable%20Scanning%20for%20Point%20Cloud%20Understanding%0AAuthor%3A%20Bin%20Liu%20and%20Chunyang%20Wang%20and%20Xuelian%20Liu%20and%20Ge%20Zhang%0AAbstract%3A%20State%20Space%20Models%20%28SSMs%29%20show%20significant%20potential%20for%20long-sequence%20modeling%2C%20but%20their%20reliance%20on%20input%20order%20conflicts%20with%20the%20irregular%20nature%20of%20point%20clouds.%20Existing%20approaches%20often%20rely%20on%20predefined%20serialization%20schemes%20whose%20fixed%20scanning%20patterns%20cannot%20adapt%20to%20diverse%20geometric%20structures.%20To%20address%20this%20limitation%2C%20we%20propose%20DM3D%2C%20a%20deformable%20Mamba%20architecture%20for%20point%20cloud%20understanding.%20Specifically%2C%20DM3D%20introduces%20an%20offset-guided%20differentiable%20scanning%20mechanism%20that%20jointly%20performs%20resampling%20and%20reordering.%20Deformable%20Spatial%20Resampling%20%28DSR%29%20enhances%20structural%20awareness%20by%20adaptively%20resampling%20local%20features%2C%20while%20the%20Gaussian-based%20Differentiable%20Reordering%20%28GDR%29%20enables%20end-to-end%20optimization%20of%20the%20serialization%20order.%20We%20further%20introduce%20a%20Continuity-Aware%20State%20Update%20%28CASU%29%20mechanism%20that%20modulates%20the%20state%20update%20based%20on%20local%20geometric%20continuity.%20In%20addition%2C%20a%20Tri-Path%20Fusion%20module%20facilitates%20complementary%20interactions%20among%20different%20SSM%20branches.%20Together%2C%20these%20designs%20enable%20structure-adaptive%20serialization%20for%20point%20clouds.%20Extensive%20experiments%20on%20benchmark%20datasets%20show%20that%20DM3D%20achieves%20state-of-the-art%20or%20highly%20competitive%20results%20on%20classification%2C%20few-shot%20learning%2C%20and%20part%20segmentation%20tasks%2C%20validating%20the%20effectiveness%20of%20adaptive%20serialization%20for%20point%20cloud%20understanding.%0ALink%3A%20http%3A//arxiv.org/abs/2512.03424v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDM3D%253A%2520Deformable%2520Mamba%2520via%2520Offset-Guided%2520Differentiable%2520Scanning%2520for%2520Point%2520Cloud%2520Understanding%26entry.906535625%3DBin%2520Liu%2520and%2520Chunyang%2520Wang%2520and%2520Xuelian%2520Liu%2520and%2520Ge%2520Zhang%26entry.1292438233%3DState%2520Space%2520Models%2520%2528SSMs%2529%2520show%2520significant%2520potential%2520for%2520long-sequence%2520modeling%252C%2520but%2520their%2520reliance%2520on%2520input%2520order%2520conflicts%2520with%2520the%2520irregular%2520nature%2520of%2520point%2520clouds.%2520Existing%2520approaches%2520often%2520rely%2520on%2520predefined%2520serialization%2520schemes%2520whose%2520fixed%2520scanning%2520patterns%2520cannot%2520adapt%2520to%2520diverse%2520geometric%2520structures.%2520To%2520address%2520this%2520limitation%252C%2520we%2520propose%2520DM3D%252C%2520a%2520deformable%2520Mamba%2520architecture%2520for%2520point%2520cloud%2520understanding.%2520Specifically%252C%2520DM3D%2520introduces%2520an%2520offset-guided%2520differentiable%2520scanning%2520mechanism%2520that%2520jointly%2520performs%2520resampling%2520and%2520reordering.%2520Deformable%2520Spatial%2520Resampling%2520%2528DSR%2529%2520enhances%2520structural%2520awareness%2520by%2520adaptively%2520resampling%2520local%2520features%252C%2520while%2520the%2520Gaussian-based%2520Differentiable%2520Reordering%2520%2528GDR%2529%2520enables%2520end-to-end%2520optimization%2520of%2520the%2520serialization%2520order.%2520We%2520further%2520in {"title": "QVAD: A Question-Centric Agentic Framework for Efficient and Training-Free Video Anomaly Detection", "author": "Lokman Bekit and Hamza Karim and Nghia T Nguyen and Yasin Yilmaz", "abstract": "Video Anomaly Detection (VAD) is a fundamental challenge in computer vision, particularly due to the open-set nature of anomalies. While recent training-free approaches utilizing Vision-Language Models (VLMs) have shown promise, they typically rely on massive, resource-intensive foundation models to compensate for the ambiguity of static prompts. We argue that the bottleneck in VAD is not necessarily model capacity, but rather the static nature of inquiry. We propose QVAD, a question-centric agentic framework that treats VLM-LLM interaction as a dynamic dialogue. By iteratively refining queries based on visual context, our LLM agent guides smaller VLMs to produce high-fidelity captions and precise semantic reasoning without parameter updates. This ``prompt-updating\" mechanism effectively unlocks the latent capabilities of lightweight models, enabling state-of-the-art performance on UCF-Crime, XD-Violence, and UBNormal using a fraction of the parameters required by competing methods. We further demonstrate exceptional generalizability on the single-scene ComplexVAD dataset. Crucially, QVAD achieves high inference speeds with minimal memory footprints, making advanced VAD capabilities deployable on resource-constrained edge devices.", "link": "http://arxiv.org/abs/2604.03040v1", "date": "2026-04-03", "relevancy": 2.9088, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.591}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5771}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5771}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20QVAD%3A%20A%20Question-Centric%20Agentic%20Framework%20for%20Efficient%20and%20Training-Free%20Video%20Anomaly%20Detection&body=Title%3A%20QVAD%3A%20A%20Question-Centric%20Agentic%20Framework%20for%20Efficient%20and%20Training-Free%20Video%20Anomaly%20Detection%0AAuthor%3A%20Lokman%20Bekit%20and%20Hamza%20Karim%20and%20Nghia%20T%20Nguyen%20and%20Yasin%20Yilmaz%0AAbstract%3A%20Video%20Anomaly%20Detection%20%28VAD%29%20is%20a%20fundamental%20challenge%20in%20computer%20vision%2C%20particularly%20due%20to%20the%20open-set%20nature%20of%20anomalies.%20While%20recent%20training-free%20approaches%20utilizing%20Vision-Language%20Models%20%28VLMs%29%20have%20shown%20promise%2C%20they%20typically%20rely%20on%20massive%2C%20resource-intensive%20foundation%20models%20to%20compensate%20for%20the%20ambiguity%20of%20static%20prompts.%20We%20argue%20that%20the%20bottleneck%20in%20VAD%20is%20not%20necessarily%20model%20capacity%2C%20but%20rather%20the%20static%20nature%20of%20inquiry.%20We%20propose%20QVAD%2C%20a%20question-centric%20agentic%20framework%20that%20treats%20VLM-LLM%20interaction%20as%20a%20dynamic%20dialogue.%20By%20iteratively%20refining%20queries%20based%20on%20visual%20context%2C%20our%20LLM%20agent%20guides%20smaller%20VLMs%20to%20produce%20high-fidelity%20captions%20and%20precise%20semantic%20reasoning%20without%20parameter%20updates.%20This%20%60%60prompt-updating%22%20mechanism%20effectively%20unlocks%20the%20latent%20capabilities%20of%20lightweight%20models%2C%20enabling%20state-of-the-art%20performance%20on%20UCF-Crime%2C%20XD-Violence%2C%20and%20UBNormal%20using%20a%20fraction%20of%20the%20parameters%20required%20by%20competing%20methods.%20We%20further%20demonstrate%20exceptional%20generalizability%20on%20the%20single-scene%20ComplexVAD%20dataset.%20Crucially%2C%20QVAD%20achieves%20high%20inference%20speeds%20with%20minimal%20memory%20footprints%2C%20making%20advanced%20VAD%20capabilities%20deployable%20on%20resource-constrained%20edge%20devices.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03040v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DQVAD%253A%2520A%2520Question-Centric%2520Agentic%2520Framework%2520for%2520Efficient%2520and%2520Training-Free%2520Video%2520Anomaly%2520Detection%26entry.906535625%3DLokman%2520Bekit%2520and%2520Hamza%2520Karim%2520and%2520Nghia%2520T%2520Nguyen%2520and%2520Yasin%2520Yilmaz%26entry.1292438233%3DVideo%2520Anomaly%2520Detection%2520%2528VAD%2529%2520is%2520a%2520fundamental%2520challenge%2520in%2520computer%2520vision%252C%2520particularly%2520due%2520to%2520the%2520open-set%2520nature%2520of%2520anomalies.%2520While%2520recent%2520training-free%2520approaches%2520utilizing%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520have%2520shown%2520promise%252C%2520they%2520typically%2520rely%2520on%2520massive%252C%2520resource-intensive%2520foundation%2520models%2520to%2520compensate%2520for%2520the%2520ambiguity%2520of%2520static%2520prompts.%2520We%2520argue%2520that%2520the%2520bottleneck%2520in%2520VAD%2520is%2520not%2520necessarily%2520model%2520capacity%252C%2520but%2520rather%2520the%2520static%2520nature%2520of%2520inquiry.%2520We%2520propose%2520QVAD%252C%2520a%2520question-centric%2520agentic%2520framework%2520that%2520treats%2520VLM-LLM%2520interaction%2520as%2520a%2520dynamic%2520dialogue.%2520By%2520iteratively%2520refining%2520queries%2520based%2520on%2520visual%2520context%252C%2520our%2520LLM%2520agent%2520guides%2520smaller%2520VLMs%2520to%2520produce%2520high-fidelity%2520captions%2520and%2520precise%2520semantic%2520reasoning%2520without%2520parameter%2520updates.%2520This%2520%2560%2560prompt-updating%2522%2520mechanism%2520effectively%2520unlocks%2520the%2520latent%2520capabilities%2520of%2520lightweight%2520models%252C%2520enabling%2520state-of-the-art%2520performance%2520on%2520UCF-Crime%252C% {"title": "SCC-Loc: A Unified Semantic Cascade Consensus Framework for UAV Thermal Geo-Localization", "author": "Xiaoran Zhang and Yu Liu and Jinyu Liang and Kangqiushi Li and Zhiwei Huang and Huaxin Xiao", "abstract": "Cross-modal Thermal Geo-localization (TG) provides a robust, all-weather solution for Unmanned Aerial Vehicles (UAVs) in Global Navigation Satellite System (GNSS)-denied environments. However, profound thermal-visible modality gaps introduce severe feature ambiguity, systematically corrupting conventional coarse-to-fine registration. To dismantle this bottleneck, we propose SCC-Loc, a unified Semantic-Cascade-Consensus localization framework. By sharing a single DINOv2 backbone across global retrieval and MINIMA$_{\\text{RoMa}}$ matching, it minimizes memory footprint and achieves zero-shot, highly accurate absolute position estimation. Specifically, we tackle modality ambiguity by introducing three cohesive components. First, we design the Semantic-Guided Viewport Alignment (SGVA) module to adaptively optimize satellite crop regions, effectively correcting initial spatial deviations. Second, we develop the Cascaded Spatial-Adaptive Texture-Structure Filtering (C-SATSF) mechanism to explicitly enforce geometric consistency, thereby eradicating dense cross-modal outliers. Finally, we propose the Consensus-Driven Reliability-Aware Position Selection (CD-RAPS) strategy to derive the optimal solution through a synergy of physically constrained pose optimization. To address data scarcity, we construct Thermal-UAV, a comprehensive dataset providing 11,890 diverse thermal queries referenced against a large-scale satellite ortho-photo and corresponding spatially aligned Digital Surface Model (DSM). Extensive experiments demonstrate that SCC-Loc establishes a new state-of-the-art, suppressing the mean localization error to 9.37 m and providing a 7.6-fold accuracy improvement within a strict 5-m threshold over the strongest baseline. Code and dataset are available at https://github.com/FloralHercules/SCC-Loc.", "link": "http://arxiv.org/abs/2604.03120v1", "date": "2026-04-03", "relevancy": 2.8885, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6138}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5685}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5507}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SCC-Loc%3A%20A%20Unified%20Semantic%20Cascade%20Consensus%20Framework%20for%20UAV%20Thermal%20Geo-Localization&body=Title%3A%20SCC-Loc%3A%20A%20Unified%20Semantic%20Cascade%20Consensus%20Framework%20for%20UAV%20Thermal%20Geo-Localization%0AAuthor%3A%20Xiaoran%20Zhang%20and%20Yu%20Liu%20and%20Jinyu%20Liang%20and%20Kangqiushi%20Li%20and%20Zhiwei%20Huang%20and%20Huaxin%20Xiao%0AAbstract%3A%20Cross-modal%20Thermal%20Geo-localization%20%28TG%29%20provides%20a%20robust%2C%20all-weather%20solution%20for%20Unmanned%20Aerial%20Vehicles%20%28UAVs%29%20in%20Global%20Navigation%20Satellite%20System%20%28GNSS%29-denied%20environments.%20However%2C%20profound%20thermal-visible%20modality%20gaps%20introduce%20severe%20feature%20ambiguity%2C%20systematically%20corrupting%20conventional%20coarse-to-fine%20registration.%20To%20dismantle%20this%20bottleneck%2C%20we%20propose%20SCC-Loc%2C%20a%20unified%20Semantic-Cascade-Consensus%20localization%20framework.%20By%20sharing%20a%20single%20DINOv2%20backbone%20across%20global%20retrieval%20and%20MINIMA%24_%7B%5Ctext%7BRoMa%7D%7D%24%20matching%2C%20it%20minimizes%20memory%20footprint%20and%20achieves%20zero-shot%2C%20highly%20accurate%20absolute%20position%20estimation.%20Specifically%2C%20we%20tackle%20modality%20ambiguity%20by {"title": "CoDA: Exploring Chain-of-Distribution Attacks and Post-Hoc Token-Space Repair for Medical Vision-Language Models", "author": "Xiang Chen and Fangfang Yang and Chunlei Meng and Yuxian Dong and Ang Li and Yiwei Wei and Jiahuan Long and Jiujiang Guo and Chengyin Hu", "abstract": "Medical vision--language models (MVLMs) are increasingly used as perceptual backbones in radiology pipelines and as the visual front end of multimodal assistants, yet their reliability under real clinical workflows remains underexplored. Prior robustness evaluations often assume clean, curated inputs or study isolated corruptions, overlooking routine acquisition, reconstruction, display, and delivery operations that preserve clinical readability while shifting image statistics. To address this gap, we propose CoDA, a chain-of-distribution framework that constructs clinically plausible pipeline shifts by composing acquisition-like shading, reconstruction and display remapping, and delivery and export degradations. Under masked structural-similarity constraints, CoDA jointly optimizes stage compositions and parameters to induce failures while preserving visual plausibility. Across brain MRI, chest X-ray, and abdominal CT, CoDA substantially degrades the zero-shot performance of CLIP-style MVLMs, with chained compositions consistently more damaging than any single stage. We also evaluate multimodal large language models (MLLMs) as technical-authenticity auditors of imaging realism and quality rather than pathology. Proprietary multimodal models show degraded auditing reliability and persistent high-confidence errors on CoDA-shifted samples, while the medical-specific MLLMs we test exhibit clear deficiencies in medical image quality auditing. Finally, we introduce a post-hoc repair strategy based on teacher-guided token-space adaptation with patch-level alignment, which improves accuracy on archived CoDA outputs. Overall, our findings characterize a clinically grounded threat surface for MVLM deployment and show that lightweight alignment improves robustness in deployment.", "link": "http://arxiv.org/abs/2603.18545v2", "date": "2026-04-03", "relevancy": 2.8252, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5667}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5642}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5642}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20CoDA%3A%20Exploring%20Chain-of-Distribution%20Attacks%20and%20Post-Hoc%20Token-Space%20Repair%20for%20Medical%20Vision-Language%20Models&body=Title%3A%20CoDA%3A%20Exploring%20Chain-of-Distribution%20Attacks%20and%20Post-Hoc%20Token-Space%20Repair%20for%20Medical%20Vision-Language%20Models%0AAuthor%3A%20Xiang%20Chen%20and%20Fangfang%20Yang%20and%20Chunlei%20Meng%20and%20Yuxian%20Dong%20and%20Ang%20Li%20and%20Yiwei%20Wei%20and%20Jiahuan%20Long%20and%20Jiujiang%20Guo%20and%20Chengyin%20Hu%0AAbstract%3A%20Medical%20vision--language%20models%20%28MVLMs%29%20are%20increasingly%20used%20as%20perceptual%20backbones%20in%20radiology%20pipelines%20and%20as%20the%20visual%20front%20end%20of%20multimodal%20assistants%2C%20yet%20their%20reliability%20under%20real%20clinical%20workflows%20remains%20underexplored.%20Prior%20robustness%20evaluations%20often%20assume%20clean%2C%20curated%20inputs%20or%20study%20isolated%20corruptions%2C%20overlooking%20routine%20acquisition%2C%20reconstruction%2C%20display%2C%20and%20delivery%20operations%20that%20preserve%20clinical%20readability%20while%20shifting%20image%20statistics.%20To%20address%20this%20gap%2C%20we%20propose%20CoDA%2C%20a%20chain-of-distribution%20framework%20that%20constructs%20clinically%20plausible%20pipeline%20shifts%20by%20composing%20acquisition-like%20shading%2C%20reconstruction%20and%20display%20remapping%2C%20and%20delivery%20and%20export%20degradations.%20Under%20masked%20structural-similarity%20constraints%2C%20CoDA%20jointly%20optimizes%20stage%20compositions%20and%20parameters%20to%20induce%20failures%20while%20preserving%20visual%20plausibility.%20Across%20brain%20MRI%2C%20chest%20X-ray%2C%20and%20abdominal%20CT%2C%20CoDA%20substantially%20degrades%20the%20zero-shot%20performance%20of%20CLIP-style%20MVLMs%2C%20with%20chained%20compositions%20consistently%20more%20damaging%20than%20any%20single%20stage.%20We%20also%20evaluate%20multimodal%20large%20language%20models%20%28MLLMs%29%20as%20technical-authenticity%20auditors%20of%20imaging%20realism%20and%20quality%20rather%20than%20pathology.%20Proprietary%20multimodal%20models%20show%20degraded%20auditing%20reliability%20and%20persistent%20high-confidence%20errors%20on%20CoDA-shifted%20samples%2C%20while%20the%20medical-specific%20MLLMs%20we%20test%20exhibit%20clear%20deficiencies%20in%20medical%20image%20quality%20auditing.%20Finally%2C%20we%20introduce%20a%20post-hoc%20repair%20strategy%20based%20on%20teacher-guided%20token-space%20adaptation%20with%20patch-level%20alignment%2C%20which%20improves%20accuracy%20on%20archived%20CoDA%20outputs.%20Overall%2C%20our%20findings%20characterize%20a%20clinically%20grounded%20threat%20surface%20for%20MVLM%20deployment%20and%20show%20that%20lightweight%20alignment%20improves%20robustness%20in%20deployment.%0ALink%3A%20http%3A//arxiv.org/abs/2603.18545v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCoDA%253A%2520Exploring%2520Chain-of-Distribution%2520Attacks%2520and%2520Post-Hoc%2520Token-Space%2520Repair%2520for%2520Medical%2520Vision-Language%2520Models%26entry.906535625%3DXiang%2520Chen%2520and%2520Fangfang%2520Yang%2520and%2520Chunlei%2520Meng%2520and%2520Yuxian%2520Dong%2520and% {"title": "Modality-Specific Hierarchical Enhancement for RGB-D Camouflaged Object Detection", "author": "Yuzhen Niu and Yangqing Wang and Ri Cheng and Fusheng Li and Rongshen Wang and Zhichen Yang", "abstract": "Camouflaged object detection (COD) is challenging due to high target-background similarity, and recent methods address this by complementarily using RGB-D texture and geometry cues. However, RGB-D COD methods still underutilize modality-specific cues, which limits fusion quality. We believe this is because RGB and depth features are fused directly after backbone extraction without modality-specific enhancement. To address this limitation, we propose MHENet, an RGB-D COD framework that performs modality-specific hierarchical enhancement and adaptive fusion of RGB and depth features. Specifically, we introduce a Texture Hierarchical Enhancement Module (THEM) to amplify subtle texture variations by extracting high-frequency information and a Geometry Hierarchical Enhancement Module (GHEM) to enhance geometric structures via learnable gradient extraction, while preserving cross-scale semantic consistency. Finally, an Adaptive Dynamic Fusion Module (ADFM) adaptively fuses the enhanced texture and geometry features with spatially varying weights. Experiments on four benchmarks demonstrate that MHENet surpasses 16 state-of-the-art methods qualitatively and quantitatively. Code is available at https://github.com/afdsgh/MHENet.", "link": "http://arxiv.org/abs/2604.02935v1", "date": "2026-04-03", "relevancy": 2.7831, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5764}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5535}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "simi {"title": "GenSmoke-GS: A Multi-Stage Method for Novel View Synthesis from Smoke-Degraded Images Using a Generative Model", "author": "Qida Cao and Xinyuan Hu and Changyue Shi and Jiajun Ding and Zhou Yu and Jun Yu", "abstract": "This paper describes our method for Track 2 of the NTIRE 2026 3D Restoration and Reconstruction (3DRR) Challenge on smoke-degraded images. In this task, smoke reduces image visibility and weakens the cross-view consistency required by scene optimization and rendering. We address this problem with a multi-stage pipeline consisting of image restoration, dehazing, MLLM-based enhancement, 3DGS-MCMC optimization, and averaging over repeated runs. The main purpose of the pipeline is to improve visibility before rendering while limiting scene-content changes across input views. Experimental results on the challenge benchmark show improved quantitative performance and better visual quality than the provided baselines. The code is available at https://github.com/plbbl/GenSmoke-GS. Our method achieved a ranking of 1 out of 14 participants in Track 2 of the NTIRE 3DRR Challenge, as reported on the official competition website: https://www.codabench.org/competitions/13993/#/results-tab.", "link": "http://arxiv.org/abs/2604.03039v1", "date": "2026-04-03", "relevancy": 2.7609, "topK": [{"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.5553}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5506}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5506}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GenSmoke-GS%3A%20A%20Multi-Stage%20Method%20for%20Novel%20View%20Synthesis%20from%20Smoke-Degraded%20Images%20Using%20a%20Generative%20Model&body=Title%3A%20GenSmoke-GS%3A%2 {"title": "PR3DICTR: A modular AI framework for medical 3D image-based detection and outcome prediction", "author": "Daniel C. MacRae and Luuk van der Hoek and Robert van der Wal and Suzanne P. M. de Vette and Hendrike Neh and Baoqiang Ma and Peter M. A. van Ooijen and Lisanne V. van Dijk", "abstract": "Three-dimensional medical image data and computer-aided decision making, particularly using deep learning, are becoming increasingly important in the medical field. To aid in these developments we introduce PR3DICTR: Platform for Research in 3D Image Classification and sTandardised tRaining. Built using community-standard distributions (PyTorch and MONAI), PR3DICTR provides an open-access, flexible and convenient framework for prediction model development, with an explicit focus on classification using three-dimensional medical image data. By combining modular design principles and standardization, it aims to alleviate developmental burden whilst retaining adjustability. It provides users with a wealth of pre-established functionality, for instance in model architecture design options, hyper-parameter solutions and training methodologies, but still gives users the opportunity and freedom to ``plug in'' their own solutions or modules. PR3DICTR can be applied to any binary or event-based three-dimensional classification task and can work with as little as two lines of code.", "link": "http://arxiv.org/abs/2604.03203v1", "date": "2026-04-03", "relevancy": 2.7315, "topK": [{"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5471}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.5471}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5448}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PR3DIC {"title": "Collaborative Multi-Mode Pruning for Vision-Language Models", "author": "Zimeng Wu and Yunhong Wang and Donghao Wang and Jiaxin Chen", "abstract": "Vision-Language Models (VLMs) have advanced rapidly within the unified Transformer architecture, yet their deployment on resource-constrained devices remains challenging due to high computational complexity. While pruning has emerged as an effective technique for compressing VLMs, existing approaches predominantly focus on a single mode by pruning either parameters or tokens, neglecting fully exploring the inherent redundancy in each mode, which leads to substantial performance degradation at high pruning ratios. To address the above limitations, we propose Collaborative Multi-Mode Pruning (CoMP), a novel framework tailored for VLMs by performing joint parameter and token pruning. Specifically, we first design a Collaborative Importance Metric (CIM) that investigates the mutual interference between the coupled parameters and tokens. It incorporates distinct significance of tokens into the computation of parameter importance scores, while simultaneously mitigating the affect of pruned parameters on token importance scores. Moreover, we develop a Multi-Mode Pruning Strategy (MPS) that decomposes the overall pruning process into a sequence of pruning stages, while in each stage we estimate the priory of different pruning modes based on their pruning cost and adaptively shift to the optimal one. Additionally, MPS integrates the historical cost and random exploration, in order to achieve a stable pruning process and avoid local optimum. Extensive experiments across various vision-language tasks and models demonstrate that our method effectively promotes the performance under high pruning ratios by comparing to the state-of-the-art approaches. The source code is available at https://github.com/Wuzimeng/CoMP.git.", "link": "http://arxiv.org/abs/2604.02956v1", "date": "2026-04-03", "relevancy": 2.7233, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5452}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5452}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5436}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Collaborative%20Multi-Mode%20Pruning%20for%20Vision-Language%20Models&body=Title%3A%20Collaborative%20Multi-Mode%20Pruning%20for%20Vision-Language%20Models%0AAuthor%3A%20Zimeng%20Wu%20and%20Yunhong%20Wang%20and%20Donghao%20Wang%20and%20Jiaxin%20Chen%0AAbstract%3A%20Vision-Language%20Models%20%28VLMs%29%20have%20advanced%20rapidly%20within%20the%20unified%20Transformer%20architecture%2C%20yet%20their%20deployment%20on%20resource-constrained%20devices%20remains%20challenging%20due%20to%20high%20computational%20complexity.%20While%20pruning%20has%20emerged%20as%20an%20effective%20technique%20for%20compressing%20VLMs%2C%20existing%20approaches%20predominantly%20focus%20on%20a%20single%20mode%20by%20pruning%20either%20parameters%20or%20tokens%2C%20neglecting%20fully%20exploring%20the%20inherent%20redundancy%20in%20each%20mode%2C%20which%20leads%20to%20substantial%20performance%20degradation%20at%20high%20pruning%20ratios.%20To%20address%20the%20above%20limitations%2C%20we%20propose%20Collaborative%20Multi-Mode%20Pruning%20%28CoMP%29%2C%20a%20novel%20framework%20tailored%20for%20VLMs%20by%20performing%20joint%20parameter%20and%20token%20pruning.%20Specifically%2C%20we%20first%20design%20a%20Collaborative%20Importance%20Metric%20%28CIM%29%20that%20investigates%20the%20mutual%20interference%20between%20the%20coupled%20parameters%20and%20tokens.%20It%20incorporates%20distinct%20significance%20of%20tokens%20into%20the%20computation%20of%20parameter%20importance%20scores%2C%20while%20simultaneously%20mitigating%20the%20affect%20of%20pruned%20parameters%20on%20token%20importance%20scores.%20Moreover%2C%20we%20develop%20a%20Multi-Mode%20Pruning%20Strategy%20%28MPS%29%20that%20decomposes%20the%20overall%20pruning%20process%20into%20a%20sequence%20of%20pruning%20stages%2C%20while%20in%20each%20stage%20we%20estimate%20the%20priory%20of%20different%20pruning%20modes%20based%20on%20their%20pruning%20cost%20and%20adaptively%20shift%20to%20the%20optimal%20one.%20Additionally%2C%20MPS%20integrates%20the%20historical%20cost%20and%20random%20exploration%2C%20in%20order%20to%20achieve%20a%20stable%20pruning%20process%20and%20avoid%20local%20optimum.%20Extensive%20experiments%20across%20various%20vision-language%20tasks%20and%20models%20demonstrate%20that%20our%20method%20effectively%20promotes%20the%20performance%20under%20high%20pruning%20ratios%20by%20comparing%20to%20the%20state-of-the-art%20approaches.%20The%20source%20code%20is%20available%20at%20https%3A//github.com/Wuzimeng/CoMP.git.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02956v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCollaborative%2520Multi-Mode%2520Pruning%2520for%2520Vision-Language%2520Models%26entry.906535625%3DZimeng%2520Wu%2520and%2520Yunhong%2520Wang%2520and%2520Donghao%2520Wang%2520and%2520Jiaxin%2520Chen%26entry.1292438233%3DVision-Language%2520Models%2520%2528VLMs%2529%2520have%2520advanced%2520rapidly%2520within%2520the%2520unified%2520Transformer%2520architecture%252C%2520yet%2520their%2520deployment%2520on%2520resource-constrained%2520devices%2520remains%2520challenging%2520due%2520to%2520high%2520computational%2520complexity.%2520While%2520pruning%2520has%2520emerged%2520as%2520an%2520effective%2520technique%2520for%2520compressing%2520VLMs%252C%2520existing%2520approaches%2520predominantly%2520focus%2520on%2520a%2520single%2520mode%2520by%2520pruning%2520eit {"title": "Chart-RL: Policy Optimization Reinforcement Learning for Enhanced Visual Reasoning in Chart Question Answering with Vision Language Models", "author": "Yunfei Bai and Amit Dhanda and Shekhar Jain", "abstract": "The recent advancements in Vision Language Models (VLMs) have demonstrated progress toward true intelligence requiring robust reasoning capabilities. Beyond pattern recognition, linguistic reasoning must integrate with visual comprehension, particularly for Chart Question Answering (CQA) tasks involving complex data visualizations. Current VLMs face significant limitations in CQA, including imprecise numerical extraction, difficulty interpreting implicit visual relationships, and inadequate attention mechanisms for capturing spatial relationships in charts. In this work, we address these challenges by presenting Chart-RL, a novel reinforcement learning framework that enhances VLMs chart understanding through feedback-driven policy optimization of visual perception and logical inference. Our key innovation includes a comprehensive framework integrating Reinforcement Learning (RL) from Policy Optimization techniques along with adaptive reward functions, that demonstrates superior performance compared to baseline foundation models and competitive results against larger state-of-the-art architectures. We also integrated Parameter-Efficient Fine-Tuning through Low-Rank Adaptation (LoRA) in the RL framework that only requires single GPU configurations while preserving performance integrity. We conducted extensive benchmarking across open-source, proprietary, and state-of-the-art closed-source models utilizing the ChartQAPro dataset. The RL fine-tuned Qwen3-VL-4B-Instruct model achieved an answer accuracy of 0.634, surpassing the 0.580 accuracy of the Qwen3-VL-8B-Instruct foundation model despite utilizing half the parameter count, while simultaneously reducing inference latency from 31 seconds to 9 seconds.", "link": "http://arxiv.org/abs/2604.03157v1", ent%20learning%20framework%20that%20enhances%20VLMs%20chart%20understanding%20through%20feedback-driven%20policy%20optimization%20of%20visual%20perception%20and%20logical%20inference.%20Our%20key%20innovation%20includes%20a%20comprehensive%20framework%20integrating%20Reinforcement%20Learning%20%28RL%29%20from%20Policy%20Optimization%20techniques%20along%20with%20adaptive%20reward%20functions%2C%20that%20demonstrates%20superior%20performance%20compared%20to%20baseline%20foundation%20models%20and%20competitive%20results%20against%20larger%20state-of-the-art%20architectures.%20We%20also%20integrated%20Parameter-Efficient%20Fine-Tuning%20through%20Low-Rank%20Adaptation%20%28LoRA%29%20in%20the%20RL%20framework%20that%20only%20requires%20single%20GPU%20configurations%20while%20preserving%20performance%20integrity.%20We%20conducted%20extensive%20benchmarking%20across%20open-source%2C%20proprietary%2C%20and%20state-of-the-art%20closed-source%20models%20utilizing%20the%20ChartQAPro%20dataset.%20The%20RL%20fine-tuned%20Qwen3-VL-4B-Instruct%20model%20achieved%20an%20answer%20accuracy%20of%200.634%2C%20surpassing%20the%200.580%20accuracy%20of%20the%20Qwen3-VL-8B-Instruct%20foundation%20model%20despite%20utilizing%20half%20the%20parameter%20count%2C%20while%20simultaneously%20reducing%20inference%20latency%20from%2031%20seconds%20to%209%20seconds.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03157v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DChart-RL%253A%2520Policy%2520Optimization%2520Reinforcement%2520Learning%2520for%2520Enhanced%2520Visual%2520Reasoning%2520in%2520Chart%2520Question%2520Answering%2520with%2520Vision%2520Language%2520Models%26entry.906535625%3DYunfei%2520Bai%2520and%2520Amit%2520Dhanda%2520and%2520Shekhar%2520Jain%26entry.1292438233%3DThe%2520recent%2520advancements%2520in%2520Vision%2520Language%2520Models%2520%2528VLMs%2529%2520have%2520demonstrated%2520progress%2520towa {"title": "DSBD: Dual-Aligned Structural Basis Distillation for Graph Domain Adaptation", "author": "Yingxu Wang and Kunyu Zhang and Jiaxin Huang and Mengzhu Wang and Mingyan Xiao and Siyang Gao and Nan Yin", "abstract": "Graph domain adaptation (GDA) aims to transfer knowledge from a labeled source graph to an unlabeled target graph under distribution shifts. However, existing methods are largely feature-centric and overlook structural discrepancies, which become particularly detrimental under significant topology shifts. Such discrepancies alter both geometric relationships and spectral properties, leading to unreliable transfer of graph neural networks (GNNs). To address this limitation, we propose Dual-Aligned Structural Basis Distillation (DSBD) for GDA, a novel framework that explicitly models and adapts cross-domain structural variation. DSBD constructs a differentiable structural basis by synthesizing continuous probabilistic prototype graphs, enabling gradient-based optimization over graph topology. The basis is learned under source-domain supervision to preserve semantic discriminability, while being explicitly aligned to the target domain through a dual-alignment objective. Specifically, geometric consistency is enforced via permutation-invariant topological moment matching, and spectral consistency is achieved through Dirichlet energy calibration, jointly capturing structural characteristics across domains. Furthermore, we introduce a decoupled inference paradigm that mitigates source-specific structural bias by training a new GNN on the distilled structural basis. Extensive experiments on graph and image benchmarks demonstrate that DSBD consistently outperforms state-of-the-art methods.", "link": "http://arxiv.org/abs/2604.03154v1", "date": "2026-04-03", "relevancy": 2.6467, "topK": [{"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarit gnment%20objective.%20Specifically%2C%20geometric%20consistency%20is%20enforced%20via%20permutation-invariant%20topological%20moment%20matching%2C%20and%20spectral%20consistency%20is%20achieved%20through%20Dirichlet%20energy%20calibration%2C%20jointly%20capturing%20structural%20characteristics%20across%20domains.%20Furthermore%2C%20we%20introduce%20a%20decoupled%20inference%20paradigm%20that%20mitigates%20source-specific%20structural%20bias%20by%20training%20a%20new%20GNN%20on%20the%20distilled%20structural%20basis.%20Extensive%20experiments%20on%20graph%20and%20image%20benchmarks%20demonstrate%20that%20DSBD%20consistently%20outperforms%20state-of-the-art%20methods.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03154v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DDSBD%253A%2520Dual-Aligned%2520Structural%2520Basis%2520Distillation%2520for%2520Graph%2520Domain%2520Adaptation%26entry.906535625%3DYingxu%2520Wang%2520and%2520Kunyu%2520Zhang%2520and%2520Jiaxin%2520Huang%2520and%2520Mengzhu%2520Wang%2520and%2520Mingyan%2520Xiao%2520and%2520Siyang%2520Gao%2520and%2520Nan%2520Yin%26entry.1292438233%3DGraph%2520domain%2520adaptation%2520%2528GDA%2529%2520aims%2520to%2520transfer%2520knowledge%2520from%2520a%2520labeled%2520source%2520graph%2520to%2520an%2520unlabeled%2520target%2520graph%2520under%2520distribution%2520shifts.%2520However%252C%2520existing%2520methods%2520are%2520largely%2520feature-centric%2520and%2520overlook%2520structural%2520discrepancies%252C%2520which%2520become%2520particularly%2520detrimental%2520under%2520significant%2520topology%2520shifts.%2520Such%2520discrepancies%2520alter%2520both%2520geometric%2520relationships%2520and%2520spectral%2520properties%252C%2520leading%2520to%2520unreliable%2520transfer%2520of%2520graph%2520neural%2520networks%2520%2528GNNs%2529.%2520To%2520address%2520this%2520limitation%252C%2520we%2520propose%2520Dual-Aligned%2520Structural%2520B {"title": "From Abstract to Contextual: What LLMs Still Cannot Do in Mathematics", "author": "Bowen Cao and Dongdong Zhang and Yixia Li and Junpeng Liu and Shijue Huang and Chufan Shi and Hongyuan Lu and Yaokang Wu and Guanhua Chen and Wai Lam and Furu Wei", "abstract": "Large language models now solve many benchmark math problems at near-expert levels, yet this progress has not fully translated into reliable performance in real-world applications. We study this gap through contextual mathematical reasoning, where the mathematical core must be formulated from descriptive scenarios. We introduce ContextMATH, a benchmark that repurposes AIME and MATH-500 problems into two contextual settings: Scenario Grounding (SG), which embeds abstract problems into realistic narratives without increasing reasoning complexity, and Complexity Scaling (CS), which transforms explicit conditions into sub-problems to capture how constraints often appear in practice. Evaluating 61 proprietary and open-source models, we observe sharp drops: on average, open-source models decline by 13 and 34 points on SG and CS, while proprietary models drop by 13 and 20. Error analysis shows that errors are dominated by incorrect problem formulation, with formulation accuracy declining as original problem difficulty increases. Correct formulation emerges as a prerequisite for success, and its sufficiency improves with model scale, indicating that larger models advance in both understanding and reasoning. Nevertheless, formulation and reasoning remain two complementary bottlenecks that limit contextual mathematical problem solving. Finally, we find that fine-tuning with scenario data improves performance, whereas formulation-only training is ineffective. However, performance gaps are only partially alleviated, highlighting contextual mathematical reasoning as a central unsolved challenge for LLMs.", "link": "http://arxiv.org/abs/2601.23048v3", "date": "2026-04-03", "relevancy": 2.6099, "topK": [{"title": rce%20models%20decline%20by%2013%20and%2034%20points%20on%20SG%20and%20CS%2C%20while%20proprietary%20models%20drop%20by%2013%20and%2020.%20Error%20analysis%20shows%20that%20errors%20are%20dominated%20by%20incorrect%20problem%20formulation%2C%20with%20formulation%20accuracy%20declining%20as%20original%20problem%20difficulty%20increases.%20Correct%20formulation%20emerges%20as%20a%20prerequisite%20for%20success%2C%20and%20its%20sufficiency%20improves%20with%20model%20scale%2C%20indicating%20that%20larger%20models%20advance%20in%20both%20understanding%20and%20reasoning.%20Nevertheless%2C%20formulation%20and%20reasoning%20remain%20two%20complementary%20bottlenecks%20that%20limit%20contextual%20mathematical%20problem%20solving.%20Finally%2C%20we%20find%20that%20fine-tuning%20with%20scenario%20data%20improves%20performance%2C%20whereas%20formulation-only%20training%20is%20ineffective.%20However%2C%20performance%20gaps%20are%20only%20partially%20alleviated%2C%20highlighting%20contextual%20mathematical%20reasoning%20as%20a%20central%20unsolved%20challenge%20for%20LLMs.%0ALink%3A%20http%3A//arxiv.org/abs/2601.23048v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFrom%2520Abstract%2520to%2520Contextual%253A%2520What%2520LLMs%2520Still%2520Cannot%2520Do%2520in%2520Mathematics%26entry.906535625%3DBowen%2520Cao%2520and%2520Dongdong%2520Zhang%2520and%2520Yixia%2520Li%2520and%2520Junpeng%2520Liu%2520and%2520Shijue%2520Huang%2520and%2520Chufan%2520Shi%2520and%2520Hongyuan%2520Lu%2520and%2520Yaokang%2520Wu%2520and%2520Guanhua%2520Chen%2520and%2520Wai%2520Lam%2520and%2520Furu%2520Wei%26entry.1292438233%3DLarge%2520language%2520models%2520now%2520solve%2520many%2520benchmark%2520math%2520problems%2520at%2520near-expert%2520levels%252C%2520yet%2520this%2520progress%2520has%2520not%2520fully%2520translated%2520into%2520reliable%2520performance%2520in%2520real-world%2520applications.%2520We%2520study% hows%20that%20errors%20are%20dominated%20by%20incorrect%20problem%20formulation%2C%20with%20formulation%20accuracy%20declining%20as%20original%20problem%20difficulty%20increases.%20Correct%20formulation%20emerges%20as%20a%20prerequisite%20for%20success%2C%20and%20its%20sufficiency%20improves%20with%20model%20scale%2C%20indicating%20that%20larger%20models%20advance%20in%20both%20understanding%20and%20reasoning.%20Nevertheless%2C%20formulation%20and%20reasoning%20remain%20two%20complementary%20bottlenecks%20that%20limit%20contextual%20mathematical%20problem%20solving.%20Finally%2C%20we%20find%20that%20fine-tuning%20with%20scenario%20data%20improves%20performance%2C%20whereas%20formulation-only%20training%20is%20ineffective.%20However%2C%20performance%20gaps%20are%20only%20partially%20alleviated%2C%20highlighting%20contextual%20mathematical%20reasoning%20as%20a%20central%20unsolved%20challenge%20for%20LLMs.&entry.1838667208=http%3A//arxiv.org/abs/2601.23048v3&entry.124074799=Read"},
{"title": "HyperCT: Low-Rank Hypernet for Unified Chest CT Analysis", "author": "Fengbei Liu and Sunwoo Kwak and Hao Phung and Nusrat Binta Nizam and Ilan Richter and Nir Uriel and Hadar Averbuch-Elor and Daborah Estrin and Mert R. Sabuncu", "abstract": "Non-contrast chest CTs offer a rich opportunity for both conventional pulmonary and opportunistic extra-pulmonary screening. While Multi-Task Learning (MTL) can unify these diverse tasks, standard hard-parameter sharing approaches are often suboptimal for modeling distinct pathologies. We propose HyperCT, a framework that dynamically adapts a Vision Transformer backbone via a Hypernetwork. To ensure computational efficiency, we integrate Low-Rank Adaptation (LoRA), allowing the model to regress task-specific low-rank weight updates rather than full parameters. Validated on a large-scale dataset of radiological and cardiological tasks, \\method{} outperforms various strong baselines, offering a unified, parameter-efficient solution for holistic patient assessment. Our code is available at https://github.com/lfb-1/HyperCT.", "link": "http://arxiv.org/abs/2604.03224v1", "date": "2026-04-03", "relevancy": 2.6033, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5376}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5153}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5091}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HyperCT%3A%20Low-Rank%20Hypernet%20for%20Unified%20Chest%20CT%20Analysis&body=Title%3A%20HyperCT%3A%20Low-Rank%20Hypernet%20for%20Unified%20Chest%20CT%20Analysis%0AAuthor%3A%20Fengbei%20Liu%20and%20Sunwoo%20Kwak%20and%20Hao%20Phung%20and%20Nusrat%20Binta%20Nizam%20and%20Ilan%20Richter%20and%20Nir%20Uriel%20and%20Hadar%20Averbuch-Elor%20and%20Daborah%20Estrin%20and%20Mert%20R.%20Sabuncu%0AAbstract%3A%20Non-contrast%20chest%20CTs%20offer%20a%20rich%20opportunity%20for%20both%20conventional%20pulmonary%20and%20opportunistic%20extra-pulmonary%20screening.%20While%20Multi-Task%20Learning%20%28MTL%29%20can%20unify%20these%20diverse%20tasks%2C%20standard%20hard-parameter%20sharing%20approaches%20are%20often%20suboptimal%20for%20modeling%20distinct%20pathologies.%20We%20propose%20HyperCT%2C%20a%20framework%20that%20dynamically%20adapts%20a%20Vision%20Transformer%20backbone%20via%20a%20Hypernetwork.%20To%20ensure%20computational%20efficiency%2C%20we%20integrate%20Low-Rank%20Adaptation%20%28LoRA%29%2C%20allowing%20the%20model%20to%20regress%20task-specific%20low-rank%20weight%20updates%20rather%20than%20full%20parameters.%20Validated%20on%20a%20large-scale%20dataset%20of%20radiological%20and%20cardiological%20tasks%2C%20%5Cmethod%7B%7D%20outperforms%20various%20strong%20baselines%2C%20offering%20a%20unified%2C%20parameter-efficient%20solution%20for%20holistic%20patient%20assessment.%20Our%20code%20is%20available%20at%20https%3A//github.com/lfb-1/HyperCT.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03224v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHyperCT%253A%2520Low-Rank%2520Hypernet%2520for%2520Unified%2520Chest%2520CT%2520Analysis%26entry.906535625%3DFengbei%2520Liu%2520and%2520Sunwoo%2520Kwak%2520and%2520Hao%2520Phung%2520and%2520Nusrat%2520Binta%2520Nizam%2520and%2520Ilan%2520Richter%2520and%2520Nir%2520Uriel%2520and%2520Hadar%2520Averbuch-Elor%2520and%2520Daborah%2520Estrin%2520and%2520Mert%2520R.%2520Sabuncu%26entry.1292438233%3DNon-contrast%2520chest%2520CTs%2520offer%2520a%2520rich%2520opportunity%2520for%2520both%2520conventional%2520pulmonary%2520and%2520opportunistic%2520extra-pulmonary%2520screening.%2520While%2520Multi-Task%2520Learning%2520%2528MTL%2529%2520can%2520unify%2520these%2520diverse%2520tasks%252C%2520standard%2520hard-parameter%2520sharing%2520approaches%2520are%2520often%2520suboptimal%2520for%2520modeling%2520distinct%2520pathologies.%2520We%2520propose%2520HyperCT%252C%2520a%2520framework%2520that%2520dynamically%2520adapts%2520a%2520Vision%2520Transformer%2520backbone%2520via%2520a%2520Hypernetwork.%2520To%2520ensure%2520computational%2520efficiency%252C%2520we%2520integrate%2520Low-Rank%2520Adaptation%2520%2528LoRA%2529%252C%2520allowing%2520the%2520model%2520to%2520regress%2520task-specific%2520low-rank%2520weight%2520updates%2520rather%2520than%2520full%2520parameters.%2520Validated%2520on%2520a%2520large-scale%2520dataset%2520of%2520radiological%2520and%2520cardiological%2520tasks%252C%2520%255Cmethod%257B%257D%2520outperforms%2520various%2520strong%2520baselines%252C%2520offering%2520a%2520unified%252C%2520parameter-efficient%2520solution%2520for%2520holistic%2520patient%2520assessment.%2520Our%2520code%2520is%2520available%2520at%2520https%253A//github.com/lfb-1/HyperCT.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.03224v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=HyperCT%3A%20Low-Rank%20Hypernet%20for%20Unified%20Chest%20CT%20Analysis&entry.906535625=Fengbei%20Liu%20and%20Sunwoo%20Kwak%20and%20Hao%20Phung%20and%20Nusrat%20Binta%20Nizam%20and%20Ilan%20Richter%20and%20Nir%20Uriel%20and%20Hadar%20Averbuch-Elor%20and%20Daborah%20Estrin%20and%20Mert%20R.%20Sabuncu&entry.1292438233=Non-contrast%20chest%20CTs%20offer%20a%20rich%20opportunity%20for%20both%20conventional%20pulmonary%20and%20opportunistic%20extra-pulmonary%20screening.%20While%20Multi-Task%20Learning%20%28MTL%29%20can%20unify%20these%20diverse%20tasks%2C%20standard%20hard-parameter%20sharing%20approaches%20are%20often%20suboptimal%20for%20modeling%20distinct%20pathologies.%20We%20propose%20HyperCT%2C%20a%20framewor {"title": "GimbalDiffusion: Gravity-Aware Camera Control for Video Generation", "author": "Fr\u00e9d\u00e9ric Fortier-Chouinard and Yannick Hold-Geoffroy and Valentin Deschaintre and Matheus Gadelha and Jean-Fran\u00e7ois Lalonde", "abstract": "Recent progress in text-to-video generation has achieved remarkable realism, yet fine-grained control over camera motion and orientation remains elusive, especially with extreme trajectories (e.g., a 180-degree turnaround, or looking directly up or down). Existing approaches typically encode camera trajectories using relative or ambiguous representations, limiting precise geometric control and offering limited support for large rotations. We introduce GimbalDiffusion, a framework that enables camera control grounded in physical-world coordinates, using gravity as a global reference. Instead of describing motion relative to previous frames, our method defines camera trajectories in an absolute coordinate system, allowing accurate, interpretable control over camera parameters. Using panoramic 360-degree videos for training, we cover the full sphere of possible viewpoints, including combinations of extreme pitch and roll that are out-of-distribution of conventional video data. To improve camera guidance, we introduce null-pitch conditioning, a strategy that prevents the model from overriding camera specifications in the presence of conflicting prompt content (e.g., generating grass while the camera points toward the sky). Finally, we propose new benchmarks to evaluate gravity-aware camera-controlled video generation, assessing models' ability to generate extreme camera angles and quantify their input prompt entanglement.", "link": "http://arxiv.org/abs/2512.09112v2", "date": "2026-04-03", "relevancy": 2.5947, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6717}, {"title": "PhysGen: Rigid-Body Physics-Grounded Image-to-Video Generation", "link": "http://arxiv.org/abs/2409.18964v1", "similarity": 0.6639}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6243}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20GimbalDiffusion%3A%20Gravity-Aware%20Camera%20Control%20for%20Video%20Generation&body=Title%3A%20GimbalDiffusion%3A%20Gravity-Aware%20Camera%20Control%20for%20Video%20Generation%0AAuthor%3A%20Fr%C3%A9d%C3%A9ric%20Fortier-Chouinard%20and%20Yannick%20Hold-Geoffroy%20and%20Valentin%20Deschaintre%20and%20Matheus%20Gadelha%20and%20Jean-Fran%C3%A7ois%20Lalonde%0AAbstract%3A%20Recent%20progress%20in%20text-to-video%20generation%20has%20achieved%20remarkable%20realism%2C%20yet%20fine-grained%20control%20over%20camera%20motion%20and%20orientation%20remains%20elusive%2C%20especially%20with%20extreme%20trajectories%20%28e.g.%2C%20a%20180-degree%20turnaround%2C%20or%20looking%20directly%20up%20or%20down%29.%20Existing%20approaches%20typically%20encode%20camera%20trajectories%20using%20relative%20or%20ambiguous%20representations%2C%20limiting%20precise%20geometric%20control%20and%20offering%20limited%20support%20for%20large%20rotations.%20We%20introduce%20GimbalDiffusion%2C%20a%20framework%20that%20enables%20camera%20control%20grounded%20in%20physical-world%20coordinates%2C%20using%20gravity%20as%20a%20global%20reference.%20Instead%20of%20describing%20motion%20relative%20to%20previous%20frames%2C%20our%20method%20defines%20camera%20trajectories%20in%20an%20absolute%20coordinate%20system%2C%20allowing%20accurate%2C%20interpretable%20control%20over%20camera%20parameters.%20Using%20panoramic%20360-degree%20videos%20for%20training%2C%20we%20cover%20the%20full%20sphere%20of%20possible%20viewpoints%2C%20including%20combinations%20of%20extreme%20pitch%20and%20roll%20that%20are%20out-of-distribution%20of%20conventional%20video%20data.%20To%20improve%20camera%20guidance%2C%20we%20introduce%20null-pitch%20conditioning%2C%20a%20strategy%20that%20prevents%20the%20model%20from%20overriding%20camera%20specifications%20in%20the%20presence%20of%20conflicting%20prompt%20content%20%28e.g.%2C%20generating%20grass%20while%20the%20camera%20points%20toward%20the%20sky%29.%20Finally%2C%20we%20propose%20new%20benchmarks%20to%20evaluate%20gravity-aware%20camera-controlled%20video%20generation%2C%20assessing%20models%27%20ability%20to%20generate%20extreme%20camera%20angles%20and%20quantify%20their%20input%20prompt%20entanglement.%0ALink%3A%20http%3A//arxiv.org/abs/2512.09112v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DGimbalDiffusion%253A%2520Gravity-Aware%2520Camera%2520Control%2520for%2520Video%2520Generation%26entry.906535625%3DFr%25C3%25A9d%25C3%25A9ric%2520Fortier-Chouinard%2520and%2520Yannick%2520Hold-Geoffroy%2520and%2520Valentin%2520Deschaintre%2520and%2520Matheus%2520Gadelha%2520and%2520Jean-Fran%25C3%25A7ois%2520Lalonde%26entry.1292438233%3DRecent%2520progress%2520in%2520text-to-video%2520generation%2520has%2520achieved%2520remarkable%2520realism%252C%2520yet%2520fine-grained%2520control%2520over%2520camera%2520motion%2520and%2520orientation%2520remains%2520elusive%252C%2520especially%2520with%2520extreme%2520trajectories%2520%2528e.g.%252C%2520a%2520180-degree%2520turnaround%252C%2520or%2520looking%2520directly%2520up%2520or%2520down%2529.%2520Existing%2520approaches%2520typically%2520encode%2520camera%2520trajectories%2520using%2520relative%2520or%2520ambiguous%2520representations%252C%2520limiting%2520precise%2520geometric%2520control%2520and%2520offering%2520limited%2520support%2520for%2520large%2520rotations.%2520We%2520introduce%2520GimbalDiffusion%252C%2520a%2520framework%2520that%2520enables%2520camera%2520control%2520grounded%2520in%2520physical-world%2520coordinates%252C%2520using%2520gravity%2520as%2520a%2520global%2520reference.%2520Instead%2520of%2520describing%2520motion%2520rel y%20with%20extreme%20trajectories%20%28e.g.%2C%20a%20180-degree%20turnaround%2C%20or%20looking%20directly%20up%20or%20down%29.%20Existing%20approaches%20typically%20encode%20camera%20trajectories%20using%20relative%20or%20ambiguous%20representations%2C%20limiting%20precise%20geometric%20control%20and%20offering%20limited%20support%20for%20large%20rotations.%20We%20introduce%20GimbalDiffusion%2C%20a%20framework%20that%20enables%20camera%20control%20grounded%20in%20physical-world%20coordinates%2C%20using%20gravity%20as%20a%20global%20reference.%20Instead%20of%20describing%20motion%20relative%20to%20previous%20frames%2C%20our%20method%20defines%20camera%20trajectories%20in%20an%20absolute%20coordinate%20system%2C%20allowing%20accurate%2C%20interpretable%20control%20over%20camera%20parameters.%20Using%20panoramic%20360-degree%20videos%20for%20training%2C%20we%20cover%20the%20full%20sphere%20of%20possible%20viewpoints%2C%20including%20combinations%20of%20extreme%20pitch%20and%20roll%20that%20are%20out-of-distribution%20of%20conventional%20video%20data.%20To%20improve%20camera%20guidance%2C%20we%20introduce%20null-pitch%20conditioning%2C%20a%20strategy%20that%20prevents%20the%20model%20from%20overriding%20camera%20specifications%20in%20the%20presence%20of%20conflicting%20prompt%20content%20%28e.g.%2C%20generating%20grass%20while%20the%20camera%20points%20toward%20the%20sky%29.%20Finally%2C%20we%20propose%20new%20benchmarks%20to%20evaluate%20gravity-aware%20camera-controlled%20video%20generation%2C%20assessing%20models%27%20ability%20to%20generate%20extreme%20camera%20angles%20and%20quantify%20their%20input%20prompt%20entanglement.&entry.1838667208=http%3A//arxiv.org/abs/2512.09112v2&entry.124074799=Read"},
{"title": "Can VLMs Truly Forget? Benchmarking Training-Free Visual Concept Unlearning", "author": "Zhangyun Tan and Zeliang Zhang and Susan Liang and Yolo Yunlong Tang and Lisha Chen and Chenliang Xu", "abstract": "VLMs trained on web-scale data retain sensitive and copyrighted visual concepts that deployment may require removing. Training-based unlearning methods share a structural flaw: fine-tuning on a narrow forget set degrades general capabilities before unlearning begins, making it impossible to attribute subsequent performance drops to the unlearning procedure itself. Training-free approaches sidestep this by suppressing concepts through prompts or system instructions, but no rigorous benchmark exists for evaluating them on visual tasks.\n  We introduce VLM-UnBench, the first benchmark for training-free visual concept unlearning in VLMs. It covers four forgetting levels, 7 source datasets, and 11 concept axes, and pairs a three-level probe taxonomy with five evaluation conditions to separate genuine forgetting from instruction compliance. Across 8 evaluation settings and 13 VLM configurations, realistic unlearning prompts leave forget accuracy near the no-instruction baseline; meaningful reductions appear only under oracle conditions that disclose the target concept to the model. Object and scene concepts are the most resistant to suppression, and stronger instruction-tuned models remain capable despite explicit forget instructions. These results expose a clear gap between prompt-level suppression and true visual concept erasure.", "link": "http://arxiv.org/abs/2604.03114v1", "date": "2026-04-03", "relevancy": 2.588, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5256}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5256}, {"title": "S

{"title": "Gram-MMD: A Texture-Aware Metric for Image Realism Assessment", "author": "Jo\u00e9 Napolitano and Pascal Nguyen", "abstract": "Evaluating the realism of generated images remains a fundamental challenge in generative modeling. Existing distributional metrics such as the Frechet Inception Distance (FID) and CLIP-MMD (CMMD) compare feature distributions at a semantic level but may overlook fine-grained textural information that can be relevant for distinguishing real from generated images. We introduce Gram-MMD (GMMD), a realism metric that leverages Gram matrices computed from intermediate activations of pretrained backbone networks to capture correlations between feature maps. By extracting the upper-triangular part of these symmetric Gram matrices and measuring the Maximum Mean Discrepancy (MMD) between an anchor distribution of real images and an evaluation distribution, GMMD produces a representation that encodes textural and structural characteristics at a finer granularity than global embeddings. To select the hyperparameters of the metric, we employ a meta-metric protocol based on controlled degradations applied to MS-COCO images, measuring monotonicity via Spearman's rank correlation and Kendall's tau. We conduct experiments on both the KADID-10k database and the RAISE realness assessment dataset using various backbone architectures, including DINOv2, DC-AE, Stable Diffusion's VAE encoder, VGG19, and the AlexNet backbone from LPIPS, among others. We also demonstrate on a cross-domain driving scenario (KITTI / Virtual KITTI / Stanford Cars) that CMMD can incorrectly rank real images as less realistic than synthetic ones due to its semantic bias, while GMMD preserves the correct ordering. Our results suggest that GMMD captures complementary information to existing semantic-level metrics.", "link": "http://arxiv.org/abs/2604.03064v1", "date": "2026-04-03", "relevancy": 2.1393, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction {"title": "Safety-Critical Centralized Nonlinear MPC for Cooperative Payload Transportation by Two Quadrupedal Robots", "author": "Ruturaj S. Sambhus and Yicheng Zeng and Kapi Ketan Mehta and Jeeseop Kim and Kaveh Akbari Hamed", "abstract": "This paper presents a safety-critical centralized nonlinear model predictive control (NMPC) framework for cooperative payload transportation by two quadrupedal robots. The interconnected robot-payload system is modeled as a discrete-time nonlinear differential-algebraic system, capturing the coupled dynamics through holonomic constraints and interaction wrenches. To ensure safety in complex environments, we develop a control barrier function (CBF)-based NMPC formulation that enforces collision avoidance constraints for both the robots and the payload. The proposed approach retains the interaction wrenches as decision variables, resulting in a structured DAE-constrained optimal control problem that enables efficient real-time implementation. The effectiveness of the algorithm is validated through extensive hardware experiments on two Unitree Go2 platforms performing cooperative payload transportation in cluttered environments under mass and inertia uncertainty and external push disturbances.", "link": "http://arxiv.org/abs/2604.03200v1", "date": "2026-04-03", "relevancy": 2.1302, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5668}, {"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.5317}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5197}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Safety-Critical%20Centralized%20Nonlinear%20MPC%20for%20Cooperative%20P 20Two%20Quadrupedal%20Robots&entry.906535625=Ruturaj%20S.%20Sambhus%20and%20Yicheng%20Zeng%20and%20Kapi%20Ketan%20Mehta%20and%20Jeeseop%20Kim%20and%20Kaveh%20Akbari%20Hamed&entry.1292438233=This%20paper%20presents%20a%20safety-critical%20centralized%20nonlinear%20model%20predictive%20control%20%28NMPC%29%20framework%20for%20cooperative%20payload%20transportation%20by%20two%20quadrupedal%20robots.%20The%20interconnected%20robot-payload%20system%20is%20modeled%20as%20a%20discrete-time%20nonlinear%20differential-algebraic%20system%2C%20capturing%20the%20coupled%20dynamics%20through%20holonomic%20constraints%20and%20interaction%20wrenches.%20To%20ensure%20safety%20in%20complex%20environments%2C%20we%20develop%20a%20control%20barrier%20function%20%28CBF%29-based%20NMPC%20formulation%20that%20enforces%20collision%20avoidance%20constraints%20for%20both%20the%20robots%20and%20the%20payload.%20The%20proposed%20approach%20retains%20the%20interaction%20wrenches%20as%20decision%20variables%2C%20resulting%20in%20a%20structured%20DAE-constrained%20optimal%20control%20problem%20that%20enables%20efficient%20real-time%20implementation.%20The%20effectiveness%20of%20the%20algorithm%20is%20validated%20through%20extensive%20hardware%20experiments%20on%20two%20Unitree%20Go2%20platforms%20performing%20cooperative%20payload%20transportation%20in%20cluttered%20environments%20under%20mass%20and%20inertia%20uncertainty%20and%20external%20push%20disturbances.&entry.1838667208=http%3A//arxiv.org/abs/2604.03200v1&entry.124074799=Read"},
{"title": "Equivariant Evidential Deep Learning for Interatomic Potentials", "author": "Zhongyao Wang and Taoyong Cui and Jiawen Zou and Shufei Zhang and Bo Yan and Wanli Ouyang and Weimin Tan and Mao Su", "abstract": "Uncertainty quantification (UQ) is critical for assessing the reliability of machine learning interatomic potentials (MLIPs) in molecular dynamics (MD) simulations, identifying extrapolation regimes and enabling uncertainty-aware workflows such as active learning for training dataset construction. Existing UQ approaches for MLIPs are often limited by high computational cost or suboptimal performance. Evidential deep learning (EDL) provides a theoretically grounded single-model alternative that determines both aleatoric and epistemic uncertainty in a single forward pass. However, extending evidential formulations from scalar targets to vector-valued quantities such as atomic forces introduces substantial challenges, particularly in maintaining statistical self-consistency under rotational transformations. To address this, we propose \\textit{Equivariant Evidential Deep Learning for Interatomic Potentials} ($\\text{e}^2$IP), a backbone-agnostic framework that models atomic forces and their uncertainty jointly by representing uncertainty as a full $3\\times3$ symmetric positive definite covariance tensor that transforms equivariantly under rotations. Experiments on diverse molecular benchmarks show that $\\text{e}^2$IP provides a stronger accuracy-efficiency-reliability balance than the non-equivariant evidential baseline and the widely used ensemble method. It also achieves better data efficiency through the fully equivariant architecture while retaining single-model inference efficiency.", "link": "http://arxiv.org/abs/2602.10419v2", "date": "2026-04-03", "relevancy": 2.1236, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.6453}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5225}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4935}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Equivariant%20Evidential%20Deep%20Learning%20for%20Interatomic%20Potentials&body=Title%3A%20Equivariant%20Evidential%20Deep%20Learning%20for%20Interatomic%20Potentials%0AAuthor%3A%20Zhongyao%20Wang%20and%20Taoyong%20Cui%20and%20Jiawen%20Zou%20and%20Shufei%20Zhang%20and%20Bo%20Yan%20and%20Wanli%20Ouyang%20and%20Weimin%20Tan%20and%20Mao%20Su%0AAbstract%3A%20Uncertainty%20quantification%20%28UQ%29%20is%20critical%20for%20assessing%20the%20reliability%20of%20machine%20learning%20interatomic%20potentials%20%28MLIPs%29%20in%20molecular%20dynamics%20%28MD%29%20simulations%2C%20identifying%20extrapolation%20regimes%20and%20enabling%20uncertainty-aware%20workflows%20such%20as%20active%20learning%20for%20training%20dataset%20construction.%20Existing%20UQ%20approaches%20for%20MLIPs%20are%20often%20limited%20by%20high%20computational%20cost%20or%20suboptimal%20performance.%20Evidential%20deep%20learning%20%28EDL%29%20provides%20a%20theoretically%20grounded%20single-model%20alternative%20that%20determines%20both%20aleatoric%20and%20epistemic%20uncertainty%20in%20a%20single%20forward%20pass.%20However%2C%20extending%20evidential%20formulations%20from%20scalar%20targets%20to%20vector-valued%20quantities%20such%20as%20atomic%20forces%20introduces%20substantial%20challenges%2C%20particularly%20in%20maintaining%20statistical%20self-consistency%20under%20rotational%20transformations.%20To%20address%20this%2C%20we%20propose%20%5Ctextit%7BEquivariant%20Evidential%20Deep%20Learning%20for%20Interatomic%20Potentials%7D%20%28%24%5Ctext%7Be%7D%5E2%24IP%29%2C%20a%20backbone-agnostic%20framework%20that%20models%20atomic%20forces%20and%20their%20uncertainty%20jointly%20by%20representing%20uncertainty%20as%20a%20full%20%243%5Ctimes3%24%20symmetric%20positive%20definite%20covariance%20tensor%20that%20transforms%20equivariantly%20under%20rotations.%20Experiments%20on%20diverse%20molecular%20benchmarks%20show%20that%20%24%5Ctext%7Be%7D%5E2%24IP%20provides%20a%20stronger%20accuracy-efficiency-reliability%20balance%20than%20the%20non-equivariant%20evidential%20baseline%20and%20the%20widely%20used%20ensemble%20method.%20It%20also%20achieves%20better%20data%20efficiency%20through%20the%20fully%20equivariant%20architecture%20while%20retaining%20single-model%20inference%20efficiency.%0ALink%3A%20http%3A//arxiv.org/abs/2602.10419v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEquivariant%2520Evidential%2520Deep%2520Learning%2520for%2520Interatomic%2520Potentials%26entry.906535625%3DZhongyao%2520Wang%2520and%2520Taoyong%2520Cui%2520and%2520Jiawen%2520Zou%2520and%2520Shufei%2520Zhang%2520and%2520Bo%2520Yan%2520and%2520Wanli%2520Ouyang%2520and%2520Weimin%2520Tan%2520and%2520Mao%2520Su%26entry.1292438233%3DUncertainty%2520quantification%2520%2528UQ%2529%2520is%2520critical%2520for%2520assessing%2520the%2520reliability%2520of%2520machine%2520learning%2520interatomic%2520potentials%2520%2528MLIPs%2529%2520in%2520molecular%2520dynamics%2520%2528MD%2529%2520simulations%252C%2520identifying%2520extrapolation%2520regimes%2520and%2520enabling%2520uncertainty-aware%2520workflows%2520such%2520as%2520active%2520learning%2520for%2520training%2520dataset%2520construction.%2520Existing%2520UQ%2520approaches%2520for%2520MLIPs%2520are%2520often%2520limited%2520by%2520high%2520computational%2520cost%2520or%2520suboptimal%2520performance.%2520Evidential%2520deep%2520learning%2520%2528EDL%2529%2 {"title": "Learning Contractive Integral Operators with Fredholm Integral Neural Operators", "author": "Kyriakos C. Georgiou and Constantinos Siettos and Athanasios N. Yannacopoulos", "abstract": "We generalize the framework of Fredholm Neural Networks, to learn non-expansive integral operators arising in Fredholm Integral Equations (FIEs) of the second kind in arbitrary dimensions. We first present the proposed Fredholm Integral Neural Operators (FREDINOs), for FIEs and prove that they are universal approximators of linear and non-linear integral operators and corresponding solution operators. We furthermore prove that the learned operators are guaranteed to be contractive, thereby strictly satisfying the mathematical property required for the convergence of the fixed point scheme. Finally, we also demonstrate how FREDINOs can be used to learn the solution operator of non-linear elliptic PDEs, via a Boundary Integral Equation (BIE) formulation. We assess the proposed methodology numerically, via several benchmark problems: linear and non-linear FIEs in arbitrary dimensions, as well as a non-linear elliptic PDE in 2D. Built on tailored mathematical/numerical analysis theory, FREDINOs offer high-accuracy approximations and interpretable schemes, making them well suited for scientific machine learning/numerical analysis computations.", "link": "http://arxiv.org/abs/2604.03034v1", "date": "2026-04-03", "relevancy": 2.1215, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4351}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.4234}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4144}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%2 {"title": "Kill-Chain Canaries: Stage-Level Tracking of Prompt Injection Across Attack Surfaces and Model Safety Tiers", "author": "Haochuan Kevin Wang", "abstract": "We present a stage-decomposed analysis of prompt injection attacks against five frontier LLM agents. Prior work measures task-level attack success rate (ASR); we localize the pipeline stage at which each model's defense activates. We instrument every run with a cryptographic canary token (SECRET-[A-F0-9]{8}) tracked through four kill-chain stages -- Exposed, Persisted, Relayed, Executed -- across four attack surfaces and five defense conditions (764 total runs, 428 no-defense attacked). Our central finding is that model safety is determined not by whether adversarial content is seen, but by whether it is propagated across pipeline stages. Concretely: (1) in our evaluation, exposure is 100% for all five models -- the safety gap is entirely downstream; (2) Claude strips injections at write_memory summarization (0/164 ASR), while GPT-4o-mini propagates canaries without loss (53% ASR, 95% CI: 41--65%); (3) DeepSeek exhibits 0% ASR on memory surfaces and 100% ASR on tool-stream surfaces from the same model -- a complete reversal across injection channels; (4) all four active defense conditions (write_filter, pi_detector, spotlighting, and their combination) produce 100% ASR due to threat-model surface mismatch; (5) a Claude relay node decontaminates downstream agents -- 0/40 canaries survived into shared memory.", "link": "http://arxiv.org/abs/2603.28013v2", "date": "2026-04-03", "relevancy": 2.1193, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4373}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4171}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4171}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Kill-Chain%20Canaries%3A%20Stage-Level%20Tracking%20of%20Prompt%20Injection%20Across%20Attack%20Surfaces%20and%20Model%20Safety%20Tiers&body=Title%3A%20Kill-Chain%20Canaries%3A%20Stage-Level%20Tracking%20of%20Prompt%20Injection%20Across%20Attack%20Surfaces%20and%20Model%20Safety%20Tiers%0AAuthor%3A%20Haochuan%20Kevin%20Wang%0AAbstract%3A%20We%20present%20a%20stage-decomposed%20analysis%20of%20prompt%20injection%20attacks%20against%20five%20frontier%20LLM%20agents.%20Prior%20work%20measures%20task-level%20attack%20success%20rate%20%28ASR%29%3B%20we%20localize%20the%20pipeline%20stage%20at%20which%20each%20model%27s%20defense%20activates.%20We%20instrument%20every%20run%20with%20a%20cryptographic%20canary%20token%20%28SECRET-%5BA-F0-9%5D%7B8%7D%29%20tracked%20through%20four%20kill-chain%20stages%20--%20Exposed%2C%20Persisted%2C%20Relayed%2C%20Executed%20--%20across%20four%20attack%20surfaces%20and%20five%20defense%20conditions%20%28764%20total%20runs%2C%20428%20no-defense%20attacked%29.%20Our%20central%20finding%20is%20that%20model%20safety%20is%20determined%20not%20by%20whether%20adversarial%20content%20is%20seen%2C%20but%20by%20whether%20it%20is%20propagated%20across%20pipeline%20stages.%20Concretely%3A%20%281%29%20in%20our%20evaluation%2C%20exposure%20is%20100%25%20for%20all%20five%20models%20--%20the%20safety%20gap%20is%20entirely%20downstream%3B%20%282%29%20Claude%20strips%20injections%20at%20write_memory%20summarization%20%280/164%20ASR%29%2C%20while%20GPT-4o-mini%20propagates%20canaries%20without%20loss%20%2853%25%20ASR%2C%2095%25%20CI%3A%2041--65%25%29%3B%20%283%29%20DeepSeek%20exhibits%200%25%20ASR%20on%20memory%20surfaces%20and%20100%25%20ASR%20on%20tool-stream%20surfaces%20from%20the%20same%20model%20--%20a%20complete%20reversal%20across%20injection%20channels%3B%20%284%29%20all%20four%20active%20defense%20conditions%20%28write_filter%2C%20pi_detector%2C%20spotlighting%2C%20and%20their%20combination%29%20produce%20100%25%20ASR%20due%20to%20threat-model%20surface%20mismatch%3B%20%285%29%20a%20Claude%20relay%20node%20decontaminates%20downstream%20agents%20--%200/40%20canaries%20survived%20into%20shared%20memory.%0ALink%3A%20http%3A//arxiv.org/abs/2603.28013v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DKill-Chain%2520Canaries%253A%2520Stage-Level%2520Tracking%2520of%2520Prompt%2520Injection%2520Across%2520Attack%2520Surfaces%2520and%2520Model%2520Safety%2520Tiers%26entry.906535625%3DHaochuan%2520Kevin%2520Wang%26entry.1292438233%3DWe%2520present%2520a%2520stage-decomposed%2520analysis%2520of%2520prompt%2520injection%2520attacks%2520against%2520five%2520frontier%2520LLM%2520agents.%2520Prior%2520work%2520measures%2520task-level%2520attack%2520success%2520rate%2520%2528ASR%2529%253B%2520we%2520localize%2520the%2520pipeline%2520stage%2520at%2520which%2520each%2520model%2527s%2520defense%2520activates.%2520We%2520instrument%2520every%2520run%2520with%2520a%2520cryptographic%2520canary%2520token%2520%2528SECRET-%255BA-F0-9%255D%257B8%257D%2529%2520tracked%2520through%2520four%2520kill-chain%2520stages%2520--%2520Exposed%252C%2520Persisted%252C%2520Relayed%252C%2520Executed%2520--%2520across%2520four%2520attack%2520surfaces%2520and%2520five%2520defense%2520conditions%2520%2528764%2520total%2520runs%252C%2520428%2520no-defense%2520attacked%2529.%2520Our%2520central%2520finding%2520is%2520that%2520model%2520safety%2520is%2520determined%2520not%2520by%2520whether%2520adversarial%2520content%2520is%2520seen%252C%2520but%2520by%2520whether%2520it%2520is%2520propagated%2520across%2520pipeline%2520stages.%2520Concretely%253A%2520%25281%2529%2520in%2520our%2520evaluation%252C%2520exposure%2520is%2520100%2525%2520for%2520all%2520five%2520models%2520--%2520the%2520safety%2520gap%2520is%2520entirely%2520downstream%2 {"title": "Gradient Boosting within a Single Attention Layer", "author": "Saleh Sargolzaei", "abstract": "Transformer attention computes a single softmax-weighted average over values -- a one-pass estimate that cannot correct its own errors. We introduce \\emph{gradient-boosted attention}, which applies the principle of gradient boosting \\emph{within} a single attention layer: a second attention pass, with its own learned projections, attends to the prediction error of the first and applies a gated correction. Under a squared reconstruction objective, the construction maps onto Friedman's gradient boosting machine, with each attention pass as a base learner and the per-dimension gate as the shrinkage parameter. We show that a single Hopfield-style update erases all query information orthogonal to the stored-pattern subspace, and that further iteration under local contraction can collapse distinct queries in the same region to the same fixed point. We also show that separate projections for the correction pass can recover residual information inaccessible to the shared-projection approach of Tukey's twicing. On a 10M-token subset of WikiText-103, gradient-boosted attention achieves a test perplexity of $67.9$ compared to $72.2$ for standard attention, $69.6$ for Twicing Attention, and $69.0$ for a parameter-matched wider baseline, with two rounds capturing most of the benefit.", "link": "http://arxiv.org/abs/2604.03190v1", "date": "2026-04-03", "relevancy": 2.108, "topK": [{"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5374}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5222}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.513}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Gradient%20Boosting%20within%20a%20Single%20Attention%20Layer&body=Title%3A%20Gradient%20Boosting%20within%20a%20Single%20Attention%20Layer%0AAuthor%3A%20Saleh%20Sargolzaei%0AAbstract%3A%20Transformer%20attention%20computes%20a%20single%20softmax-weighted%20average%20over%20values%20--%20a%20one-pass%20estimate%20that%20cannot%20correct%20its%20own%20errors.%20We%20introduce%20%5Cemph%7Bgradient-boosted%20attention%7D%2C%20which%20applies%20the%20principle%20of%20gradient%20boosting%20%5Cemph%7Bwithin%7D%20a%20single%20attention%20layer%3A%20a%20second%20attention%20pass%2C%20with%20its%20own%20learned%20projections%2C%20attends%20to%20the%20prediction%20error%20of%20the%20first%20and%20applies%20a%20gated%20correction.%20Under%20a%20squared%20reconstruction%20objective%2C%20the%20construction%20maps%20onto%20Friedman%27s%20gradient%20boosting%20machine%2C%20with%20each%20attention%20pass%20as%20a%20base%20learner%20and%20the%20per-dimension%20gate%20as%20the%20shrinkage%20parameter.%20We%20show%20that%20a%20single%20Hopfield-style%20update%20erases%20all%20query%20information%20orthogonal%20to%20the%20stored-pattern%20subspace%2C%20and%20that%20further%20iteration%20under%20local%20contraction%20can%20collapse%20distinct%20queries%20in%20the%20same%20region%20to%20the%20same%20fixed%20point.%20We%20also%20show%20that%20separate%20projections%20for%20the%20correction%20pass%20can%20recover%20residual%20information%20inaccessible%20to%20the%20shared-projection%20approach%20of%20Tukey%27s%20twicing.%20On%20a%2010M-token%20subset%20of%20WikiText-103%2C%20gradient-boosted%20attention%20achieves%20a%20test%20perplexity%20of%20%2467.9%24%20compared%20to%20%2472.2%24%20for%20standard%20attention%2C%20%2469.6%24%20for%20Twicing%20Attention%2C%20and%20%2469.0%24%20for%20a%20parameter-matched%20wider%20baseline%2C%20with%20two%20rounds%20capturing%20most%20of%20the%20benefit.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03190v1%0AForm%3A%20https%3A//docs.google.com/fo {"title": "Querying Structured Data Through Natural Language Using Language Models", "author": "Hontan Valentin-Micu and Bunea Andrei-Alexandru and Tantaroudas Nikolaos Dimitrios and Popovici Dan-Matei", "abstract": "This paper presents an open source methodology for allowing users to query structured non textual datasets through natural language Unlike Retrieval Augmented Generation RAG which struggles with numerical and highly structured information our approach trains an LLM to generate executable queries To support this capability we introduce a principled pipeline for synthetic training data generation producing diverse question answer pairs that capture both user intent and the semantics of the underlying dataset We fine tune a compact model DeepSeek R1 Distill 8B using QLoRA with 4 bit quantization making the system suitable for deployment on commodity hardware We evaluate our approach on a dataset describing accessibility to essential services across Durangaldea Spain The fine tuned model achieves high accuracy across monolingual multilingual and unseen location scenarios demonstrating both robust generalization and reliable query generation Our results highlight that small domain specific models can achieve high precision for this task without relying on large proprietary LLMs making this methodology suitable for resource constrained environments and adaptable to broader multi dataset systems We evaluate our approach on a dataset describing accessibility to essential services across Durangaldea Spain The fine tuned model achieves high accuracy across monolingual multilingual and unseen location scenarios demonstrating both robust generalization and reliable query generation Our results highlight that small domain specific models can achieve high precision for this task without relying on large proprietary LLMs making this methodology suitable for resource constrained environments and adaptable to broader multi dataset systems.", "link": "http://arxiv.org/abs/2604.03057v1", "date": "2026-04-03", "relevancy": 2.1008, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5312}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5312}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4951}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Querying%20Structured%20Data%20Through%20Natural%20Language%20Using%20Language%20Models&body=Title%3A%20Querying%20Structured%20Data%20Through%20Natural%20Language%20Using%20Language%20Models%0AAuthor%3A%20Hontan%20Valentin-Micu%20and%20Bunea%20Andrei-Alexandru%20and%20Tantaroudas%20Nikolaos%20Dimitrios%20and%20Popovici%20Dan-Matei%0AAbstract%3A%20This%20paper%20presents%20an%20open%20source%20methodology%20for%20allowing%20users%20to%20query%20structured%20non%20textual%20datasets%20through%20natural%20language%20Unlike%20Retrieval%20Augmented%20Generation%20RAG%20which%20struggles%20with%20numerical%20and%20highly%20structured%20information%20our%20approach%20trains%20an%20LLM%20to%20generate%20executable%20queries%20To%20support%20this%20capability%20we%20introduce%20a%20principled%20pipeline%20for%20synthetic%20training%20data%20generation%20producing%20diverse%20question%20answer%20pairs%20that%20capture%20both%20user%20intent%20and%20the%20semantics%20of%20the%20underlying%20dataset%20We%20fine%20tune%20a%20compact%20model%20DeepSeek%20R1%20Distill%208B%20using%20QLoRA%20with%204%20bit%20quantization%20making%20the%20system%20suitable%20for%20deployment%20on%20commodity%20hardware%20We%20evaluate%20our%20approach%20on%20a%20dataset%20describing%20accessibility%20to%20essential%20services%20across%20Durangaldea%20Spain%20The%20fine%20tuned%2 {"title": "Reflective Context Learning: Studying the Optimization Primitives of Context Space", "author": "Nikita Vassilyev and William Berrios and Ruowang Zhang and Bo Han and Douwe Kiela and Shikib Mehri", "abstract": "Generally capable agents must learn from experience in ways that generalize across tasks and environments. The fundamental problems of learning, including credit assignment, overfitting, forgetting, local optima, and high-variance learning signals, persist whether the learned object lies in parameter space or context space. While these challenges are well understood in classical machine learning optimization, they remain underexplored in context space, leading current methods to be fragmented and ad hoc. We present Reflective Context Learning (RCL), a unified framework for agents that learn through repeated interaction, reflection on behavior and failure modes, and iterative updates to context. In RCL, reflection converts trajectories and current context into a directional update signal analogous to gradients, while mutation applies that signal to improve future behavior in context space. We recast recent context-optimization approaches as instances of this shared learning problem and systematically extend them with classical optimization primitives, including batching, improved credit-assignment signal, auxiliary losses, failure replay, and grouped rollouts for variance reduction. On AppWorld, BrowseComp+, and RewardBench2, these primitives improve over strong baselines, with their relative importance shifting across task regimes. We further analyze robustness to initialization, the effects of batch size, sampling and curriculum strategy, optimizer-state variants, and the impact of allocating stronger or weaker models to different optimization components. Our results suggest that learning through context updates should be treated not as a set of isolated algorithms, but as an optimization problem whose mechanisms can be studied systematically and improved through transferable principles.", "link": "http://arxiv.org/abs/2604.03189v1", "date": "2026-04-03", "relevancy": 2.0978, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5358}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5232}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5211}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Reflective%20Context%20Learning%3A%20Studying%20the%20Optimization%20Primitives%20of%20Context%20Space&body=Title%3A%20Reflective%20Context%20Learning%3A%20Studying%20the%20Optimization%20Primitives%20of%20Context%20Space%0AAuthor%3A%20Nikita%20Vassilyev%20and%20William%20Berrios%20and%20Ruowang%20Zhang%20and%20Bo%20Han%20and%20Douwe%20Kiela%20and%20Shikib%20Mehri%0AAbstract%3A%20Generally%20capable%20agents%20must%20learn%20from%20experience%20in%20ways%20that%20generalize%20across%20tasks%20and%20environments.%20The%20fundamental%20problems%20of%20learning%2C%20including%20credit%20assignment%2C%20overfitting%2C%20forgetting%2C%20local%20optima%2C%20and%20high-variance%20learning%20signals%2C%20persist%20whether%20the%20learned%20object%20lies%20in%20parameter%20space%20or%20context%20space.%20While%20these%20challenges%20are%20well%20understood%20in%20classical%20machine%20learning%20optimization%2C%20they%20remain%20underexplored%20in%20context%20space%2C%20leading%20current%20methods%20to%20be%20fragmented%20and%20ad%20hoc.%20We%20present%20Reflective%20Context%20Learning%20%28RCL%29%2C%20a%20unified%20framework%20for%20agents%20that%20learn%20through%20repeated%20interaction%2C%20reflection%20on%20behavior%20and%20failure%20modes%2C%20and%20iterative%20updates%20to%20context.%20In%20RCL%2C%20reflection%20converts%20trajectories%20and%20current%20context%20into%20a%20directional%20update%20signal%20analogous%20to%20gradients%2C%20while%20mutation%20applies%20that%20signal%20to%20improve%20future%20behavior%20in%20context%20space.%20We%20recast%20recent%20context-optimization%20approaches%20as%20instances%20of%20this%20shared%20learning%20problem%20and%20systematically%20extend%20them%20with%20classical%20optimization%20primitives%2C%20including%20batching%2C%20improved%20credit-assignment%20signal%2C%20auxiliary%20losses%2C%20failure%20replay%2C%20and%20grouped%20rollouts%20for%20variance%20reduction.%20On%20AppWorld%2C%20BrowseComp%2B%2C%20and%20RewardBench2%2C%20these%20primitives%20improve%20over%20strong%20baselines%2C%20with%20their%20relative%20importance%20shifting%20across%20task%20regimes.%20We%20further%20analyze%20robustness%20to%20initialization%2C%20the%20effects%20of%20batch%20size%2C%20sampling%20and%20curriculum%20strategy%2C%20optimizer-state%20variants%2C%20and%20the%20impact%20of%20allocating%20stronger%20or%20weaker%20models%20to%20different%20optimization%20components.%20Our%20results%20suggest%20that%20learning%20through%20context%20updates%20should%20be%20treated%20not%20as%20a%20set%20of%20isolated%20algorithms%2C%20but%20as%20an%20optimization%20problem%20whose%20mechanisms%20can%20be%20studied%20systematically%20and%20improved%20through%20transferable%20principles.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03189v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DReflective%2520Context%2520Learning%253A%2520Studying%2520the%2520Optimization%2520Primitives%2520of%2520Context%2520Space%26entry.906535625%3DNikita%2520Vassilyev%2520and%2520William%2520Berrios%2520and%2520Ruowang%2520Zhang%2520and%2520Bo%2520Han%2520and%2520Douwe%2520Kiela%2520and%2520Shikib%2520Mehri%26entry.1292438233%3DGenerally%2520capable%2520agents%2520must%2520learn% {"title": "CrossWeaver: Cross-modal Weaving for Arbitrary-Modality Semantic Segmentation", "author": "Zelin Zhang and Kedi Li and Huiqi Liang and Tao Zhang and Chuanzhi Xu", "abstract": "Multimodal semantic segmentation has shown great potential in leveraging complementary information across diverse sensing modalities. However, existing approaches often rely on carefully designed fusion strategies that either use modality-specific adaptations or rely on loosely coupled interactions, thereby limiting flexibility and resulting in less effective cross-modal coordination. Moreover, these methods often struggle to balance efficient information exchange with preserving the unique characteristics of each modality across different modality combinations. To address these challenges, we propose CrossWeaver, a simple yet effective multimodal fusion framework for arbitrary-modality semantic segmentation. Its core is a Modality Interaction Block (MIB), which enables selective and reliability-aware cross-modal interaction within the encoder, while a lightweight Seam-Aligned Fusion (SAF) module further aggregates the enhanced features. Extensive experiments on multiple multimodal semantic segmentation benchmarks demonstrate that our framework achieves state-of-the-art performance with minimal additional parameters and strong generalization to unseen modality combinations.", "link": "http://arxiv.org/abs/2604.02948v1", "date": "2026-04-03", "relevancy": 2.0967, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5431}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5243}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5052}], "mailto": "mailto:haox ralization%20to%20unseen%20modality%20combinations.&entry.1838667208=http%3A//arxiv.org/abs/2604.02948v1&entry.124074799=Read"},
{"title": "Understanding the Role of Hallucination in Reinforcement Post-Training of Multimodal Reasoning Models", "author": "Gengwei Zhang and Jie Peng and Zhen Tan and Mufan Qiu and Hossein Nourkhiz Mahjoub and Vaishnav Tadiparthi and Kwonjoon Lee and Yanyong Zhang and Tianlong Chen", "abstract": "The recent success of reinforcement learning (RL) in large reasoning models has inspired the growing adoption of RL for post-training Multimodal Large Language Models (MLLMs) to enhance their visual reasoning capabilities. Although many studies have reported improved performance, it remains unclear whether RL training truly enables models to learn from visual information. In this work, we propose the Hallucination-as-Cue Framework, an analytical framework designed to investigate the effects of RL-based post-training on multimodal reasoning models from the perspective of model hallucination. Specifically, we introduce hallucination-inductive, modality-specific corruptions that remove or replace essential information required to derive correct answers, thereby forcing the model to reason by hallucination. By applying these corruptions during both training and evaluation, our framework provides a unique perspective for diagnosing RL training dynamics and understanding the intrinsic properties of datasets. Through extensive experiments and analyses across multiple multimodal reasoning benchmarks, we reveal that the role of model hallucination for RL-training is more significant than previously recognized. For instance, we find that RL post-training under purely hallucination-inductive settings can still significantly improve models' reasoning performance, and in some cases even outperform standard training. These findings challenge prevailing assumptions about MLLM reasoning training and motivate the development of more modality-aware RL-based training designs.", "link": "http://arxiv.org/abs/2604.03179v1", "date": "2026-04-03", "relevancy": 2.092, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5234}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5234}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5212}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Understanding%20the%20Role%20of%20Hallucination%20in%20Reinforcement%20Post-Training%20of%20Multimodal%20Reasoning%20Models&body=Title%3A%20Understanding%20the%20Role%20of%20Hallucination%20in%20Reinforcement%20Post-Training%20of%20Multimodal%20Reasoning%20Models%0AAuthor%3A%20Gengwei%20Zhang%20and%20Jie%20Peng%20and%20Zhen%20Tan%20and%20Mufan%20Qiu%20and%20Hossein%20Nourkhiz%20Mahjoub%20and%20Vaishnav%20Tadiparthi%20and%20Kwonjoon%20Lee%20and%20Yanyong%20Zhang%20and%20Tianlong%20Chen%0AAbstract%3A%20The%20recent%20success%20of%20reinforcement%20learning%20%28RL%29%20in%20large%20reasoning%20models%20has%20inspired%20the%20growing%20adoption%20of%20RL%20for%20post-training%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20to%20enhance%20their%20visual%20reasoning%20capabilities.%20Although%20many%20studies%20have%20reported%20improved%20performance%2C%20it%20remains%20unclear%20whether%20RL%20training%20truly%20enables%20models%20to%20learn%20from%20visual%20information.%20In%20this%20work%2C%20we%20propose%20the%20Hallucination-as-Cue%20Framework%2C%20an%20analytical%20framework%20designed%20to%20investigate%20the%20effects%20of%20RL-based%20post-training%20on%20multimodal%20reasoning%20models%20from%20the%20perspective%20of%20model%20hallucination.%20Specifically%2C%20we%20introduce%20hallucination-inductive%2C%20modality-specific%20corruptions%20that%20remove%20or%20replace%20essential%20information%20required%20to%20derive%20correct%20answers%2C%20thereby%20forcing%20the%20model%20to%20reason%20by%20hallucination.%20By%20applying%20these%20corruptions%20during%20both%20training%20and%20evaluation%2C%20our%20framework%20provides%20a%20unique%20perspective%20for%20diagnosing%20RL%20training%20dynamics%20and%20understanding%20the%20intrinsic%20properties%20of%20datasets.%20Through%20extensive%20experiments%20and%20analyses%20across%20multiple%20multimodal%20reasoning%20benchmarks%2C%20we%20reveal%20that%20the%20role%20of%20model%20hallucination%20for%20RL-training%20is%20more%20significant%20than%20previously%20recognized.%20For%20instance%2C%20we%20find%20that%20RL%20post-training%20under%20purely%20hallucination-inductive%20settings%20can%20still%20significantly%20improve%20models%27%20reasoning%20performance%2C%20and%20in%20some%20cases%20even%20outperform%20standard%20training.%20These%20findings%20challenge%20prevailing%20assumptions%20about%20MLLM%20reasoning%20training%20and%20motivate%20the%20development%20of%20more%20modality-aware%20RL-based%20training%20designs.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03179v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUnderstanding%2520the%2520Role%2520of%2520Hallucination%2520in%2520Reinforcement%2520Post-Training%2520of%2520Multimodal%2520Reasoning%2520Models%26entry.906535625%3DGengwei%2520Zhang%2520and%2520Jie%2520Peng%2520and%2520Zhen%2520Tan%2520and%2520Mufan%2520Qiu%2520and%2520Hossein%2520Nourkhiz%2520Mahjoub%2520and%2520Vaishnav%2520Tadiparthi%2520and%2520Kwonjoon%2520Lee%2520and%2520Yanyong%2520Zhang%2520and%2520Tianlong%2520Chen%26entry.1292438233%3DThe%2520recent%2520success%2520of%2520reinforcement%2520learning%2520%2528RL%2529%2520in%2520large%2520reasoning%2520models%2520has%2520inspired%2520the%2520growing%2520adoption%2520of%2520RL%2520for%2520post-training%2520Multimodal%2520Large%2520Language%2520Models%2520%2 {"title": "EffiMiniVLM: A Compact Dual-Encoder Regression Framework", "author": "Yin-Loon Khor and Yi-Jie Wong and Yan Chai Hum", "abstract": "Predicting product quality from multimodal item information is critical in cold-start scenarios, where user interaction history is unavailable and predictions must rely on images and textual metadata. However, existing vision-language models typically depend on large architectures and/or extensive external datasets, resulting in high computational cost. To address this, we propose EffiMiniVLM, a compact dual-encoder vision-language regression framework that integrates an EfficientNet-B0 image encoder and a MiniLM-based text encoder with a lightweight regression head. To improve training sample efficiency, we introduce a weighted Huber loss that leverages rating counts to emphasize more reliable samples, yielding consistent performance gains. Trained using only 20% of the Amazon Reviews 2023 dataset, the proposed model contains 27.7M parameters and requires 6.8 GFLOPs, yet achieves a CES score of 0.40 with the lowest resource cost in the benchmark. Despite its small size, it remains competitive with significantly larger models, achieving comparable performance while being approximately 4x to 8x more resource-efficient than other top-5 methods and being the only approach that does not use external datasets. Further analysis shows that scaling the data to 40% alone allows our model to overtake other methods, which use larger models and datasets, highlighting strong scalability despite the model's compact design.", "link": "http://arxiv.org/abs/2604.03172v1", "date": "2026-04-03", "relevancy": 2.0904, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5264}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5264}, {"title": "Characterization of Gaussian Universality Breakdown in High-Dimensional Empirical Risk Minimization", "author": "Chiheb Yaakoubi and Cosme Louart and Malik Tiomoko and Zhenyu Liao", "abstract": "We study high-dimensional convex empirical risk minimization (ERM) under general non-Gaussian data designs. By heuristically extending the Convex Gaussian Min-Max Theorem (CGMT) to non-Gaussian settings, we derive an asymptotic min-max characterization of key statistics, enabling approximation of the mean $\u03bc_{\\hat\u03b8}$ and covariance $C_{\\hat\u03b8}$ of the ERM estimator $\\hat\u03b8$. Specifically, under a concentration assumption on the data matrix and standard regularity conditions on the loss and regularizer, we show that for a test covariate $x$ independent of the training data, the projection $\\hat\u03b8^\\top x$ approximately follows the convolution of the (generally non-Gaussian) distribution of $\u03bc_{\\hat\u03b8}^\\top x$ with an independent centered Gaussian variable of variance $\\text{Tr}(C_{\\hat\u03b8}\\mathbb{E}[xx^\\top])$. This result clarifies the scope and limits of Gaussian universality for ERMs. Additionally, we prove that any $\\mathcal{C}^2$ regularizer is asymptotically equivalent to a quadratic form determined solely by its Hessian at zero and gradient at $\u03bc_{\\hat\u03b8}$. Numerical simulations across diverse losses and models are provided to validate our theoretical predictions and qualitative insights.", "link": "http://arxiv.org/abs/2604.03146v1", "date": "2026-04-03", "relevancy": 2.0866, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.433}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.4166}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.4023}], "mailto": "mailto:h 0losses%20and%20models%20are%20provided%20to%20validate%20our%20theoretical%20predictions%20and%20qualitative%20insights.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03146v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCharacterization%2520of%2520Gaussian%2520Universality%2520Breakdown%2520in%2520High-Dimensional%2520Empirical%2520Risk%2520Minimization%26entry.906535625%3DChiheb%2520Yaakoubi%2520and%2520Cosme%2520Louart%2520and%2520Malik%2520Tiomoko%2520and%2520Zhenyu%2520Liao%26entry.1292438233%3DWe%2520study%2520high-dimensional%2520convex%2520empirical%2520risk%2520minimization%2520%2528ERM%2529%2520under%2520general%2520non-Gaussian%2520data%2520designs.%2520By%2520heuristically%2520extending%2520the%2520Convex%2520Gaussian%2520Min-Max%2520Theorem%2520%2528CGMT%2529%2520to%2520non-Gaussian%2520settings%252C%2520we%2520derive%2520an%2520asymptotic%2520min-max%2520characterization%2520of%2520key%2520statistics%252C%2520enabling%2520approximation%2520of%2520the%2520mean%2520%2524%25CE%25BC_%257B%255Chat%25CE%25B8%257D%2524%2520and%2520covariance%2520%2524C_%257B%255Chat%25CE%25B8%257D%2524%2520of%2520the%2520ERM%2520estimator%2520%2524%255Chat%25CE%25B8%2524.%2520Specifically%252C%2520under%2520a%2520concentration%2520assumption%2520on%2520the%2520data%2520matrix%2520and%2520standard%2520regularity%2520conditions%2520on%2520the%2520loss%2520and%2520regularizer%252C%2520we%2520show%2520that%2520for%2520a%2520test%2520covariate%2520%2524x%2524%2520independent%2520of%2520the%2520training%2520data%252C%2520the%2520projection%2520%2524%255Chat%25CE%25B8%255E%255Ctop%2520x%2524%2520approximately%2520follows%2520the%2520convolution%2520of%2520the%2520%2528generally%2520non-Gaussian%2529%2520distribution%2520of%2520%2524%25CE%25BC_%257B%255Chat%25CE%25B8%257D%255E%255Ctop%2520x%2524%2520with%2520an%2520independent%2520centered%2520Gaussian%2520variable%2520of%2520variance%2520%2524%255Cte %20of%20the%20training%20data%2C%20the%20projection%20%24%5Chat%CE%B8%5E%5Ctop%20x%24%20approximately%20follows%20the%20convolution%20of%20the%20%28generally%20non-Gaussian%29%20distribution%20of%20%24%CE%BC_%7B%5Chat%CE%B8%7D%5E%5Ctop%20x%24%20with%20an%20independent%20centered%20Gaussian%20variable%20of%20variance%20%24%5Ctext%7BTr%7D%28C_%7B%5Chat%CE%B8%7D%5Cmathbb%7BE%7D%5Bxx%5E%5Ctop%5D%29%24.%20This%20result%20clarifies%20the%20scope%20and%20limits%20of%20Gaussian%20universality%20for%20ERMs.%20Additionally%2C%20we%20prove%20that%20any%20%24%5Cmathcal%7BC%7D%5E2%24%20regularizer%20is%20asymptotically%20equivalent%20to%20a%20quadratic%20form%20determined%20solely%20by%20its%20Hessian%20at%20zero%20and%20gradient%20at%20%24%CE%BC_%7B%5Chat%CE%B8%7D%24.%20Numerical%20simulations%20across%20diverse%20losses%20and%20models%20are%20provided%20to%20validate%20our%20theoretical%20predictions%20and%20qualitative%20insights.&entry.1838667208=http%3A//arxiv.org/abs/2604.03146v1&entry.124074799=Read"},
{"title": "The More, the Merrier: Contrastive Fusion for Higher-Order Multimodal Alignment", "author": "Stefanos Koutoupis and Michaela Areti Zervou and Konstantinos Kontras and Maarten De Vos and Panagiotis Tsakalides and Grigorios Tsagkatakis", "abstract": "Learning joint representations across multiple modalities remains a central challenge in multimodal machine learning. Prevailing approaches predominantly operate in pairwise settings, aligning two modalities at a time. While some recent methods aim to capture higher-order interactions among multiple modalities, they often overlook or insufficiently preserve pairwise relationships, limiting their effectiveness on single-modality tasks. In this work, we introduce Contrastive Fusion (ConFu), a framework that jointly embeds both individual modalities and their fused combinations into a unified representation space, where modalities and their fused counterparts are aligned. ConFu extends traditional pairwise contrastive objectives with an additional fused-modality contrastive term, encouraging the joint embedding of modality pairs with a third modality. This formulation enables ConFu to capture higher-order dependencies, such as XOR-like relationships, that cannot be recovered through pairwise alignment alone, while still maintaining strong pairwise correspondence. We evaluate ConFu on synthetic and real-world multimodal benchmarks, assessing its ability to exploit cross-modal complementarity, capture higher-order dependencies, and scale with increasing multimodal complexity. Across these settings, ConFu demonstrates competitive performance on retrieval and classification tasks, while supporting unified one-to-one and two-to-one retrieval within a single contrastive framework. We release our code and dataset at https://github.com/estafons/confu.", "link": "http://arxiv.org/abs/2511.21331v2", "date": "2026-04-03", "relevancy": 2.0749, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5462}, {"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5036}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4973}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20More%2C%20the%20Merrier%3A%20Contrastive%20Fusion%20for%20Higher-Order%20Multimodal%20Alignment&body=Title%3A%20The%20More%2C%20the%20Merrier%3A%20Contrastive%20Fusion%20for%20Higher-Order%20Multimodal%20Alignment%0AAuthor%3A%20Stefanos%20Koutoupis%20and%20Michaela%20Areti%20Zervou%20and%20Konstantinos%20Kontras%20and%20Maarten%20De%20Vos%20and%20Panagiotis%20Tsakalides%20and%20Grigorios%20Tsagkatakis%0AAbstract%3A%20Learning%20joint%20representations%20across%20multiple%20modalities%20remains%20a%20central%20challenge%20in%20multimodal%20machine%20learning.%20Prevailing%20approaches%20predominantly%20operate%20in%20pairwise%20settings%2C%20aligning%20two%20modalities%20at%20a%20time.%20While%20some%20recent%20methods%20aim%20to%20capture%20higher-order%20interactions%20among%20multiple%20modalities%2C%20they%20often%20overlook%20or%20insufficiently%20preserve%20pairwise%20relationships%2C%20limiting%20their%20effectiveness%20on%20single-modality%20tasks.%20In%20this%20work%2C%20we%20introduce%20Contrastive%20Fusion%20%28ConFu%29%2C%20a%20framework%20that%20jointly%20embeds%20both%20individual%20modalities%20and%20their%20fused%20combinations%20into%20a%20unified%20representation%20space%2C%20where%20modalities%20and%20their%20fused%20counterparts%20are%20aligned.%20ConFu%20extends%20traditional%20pairwise%20contrastive%20objectives%20with%20an%20additional%20fused-modality%20contrastive%20term%2C%20encouraging%20the%20joint%20embedding%20of%20modality%20pairs%20with%20a%20third%20modality.%20This%20formulation%20enables%20ConFu%20to%20capture%20higher-order%20dependencies%2C%20such%20as%20XOR-like%20relationships%2C%20that%20cannot%20be%20recovered%20through%20pairwise%20alignment%20alone%2C%20while%20still%20maintaining%20strong%20pairwise%20correspondence.%20We%20evaluate%20ConFu%20on%20synthetic%20and%20real-world%20multimodal%20benchmarks%2C%20assessing%20its%20ability%20to%20exploit%20cross-modal%20complementarity%2C%20capture%20higher-order%20dependencies%2C%20and%20scale%20with%20increasing%20multimodal%20complexity.%20Across%20these%20settings%2C%20ConFu%20demonstrates%20competitive%20performance%20on%20retrieval%20and%20classification%20tasks%2C%20while%20supporting%20unified%20one-to-one%20and%20two-to-one%20retrieval%20within%20a%20single%20contrastive%20framework.%20We%20release%20our%20code%20and%20dataset%20at%20https%3A//github.com/estafons/confu.%0ALink%3A%20http%3A//arxiv.org/abs/2511.21331v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520More%252C%2520the%2520Merrier%253A%2520Contrastive%2520Fusion%2520for%2520Higher-Order%2520Multimodal%2520Alignment%26entry.906535625%3DStefanos%2520Koutoupis%2520and%2520Michaela%2520Areti%2520Zervou%2520and%2520Konstantinos%2520Kontras%2520and%2520Maarten%2520De%2520Vos%2520and%2520Panagiotis%2520Tsakalides%2520and%2520Grigorios%2520Tsagkatakis%26entry.1292438233%3DLearning%2520joint%2520representations%2520across%2520multiple%2520modalities%2520remains%2520a%2520central%2520challenge%2520in%2520multimodal%2520machine%2520learning.%2520Prevailing%2520approaches%2520predominantly%2520operate%2520in%2520pairwise%2520settings%252C%2520aligning%2520two%2520modalities%2520at%2520a%2520time.%2520While%2520some%2520recent%2520methods%2520aim%2520to%2520capture%2520higher-order%2520interactions%2520among%2520multiple%2520modalities%252C%2520they%2520often%2520overlook%2520or%2520insufficiently%2520preserve%2520p {"title": "FedSQ: Optimized Weight Averaging via Fixed Gating", "author": "Cristian P\u00e9rez-Corral and Jose I. Mestre and Alberto Fern\u00e1ndez-Hern\u00e1ndez and Manuel F. Dolz and Jos\u00e9 Duato and Enrique S. Quintana-Ort\u00ed", "abstract": "Federated learning (FL) enables collaborative training across organizations without sharing raw data, but it is hindered by statistical heterogeneity (non-i.i.d.\\ client data) and by instability of naive weight averaging under client drift. In many cross-silo deployments, FL is warm-started from a strong pretrained backbone (e.g., ImageNet-1K) and then adapted to local domains. Motivated by recent evidence that ReLU-like gating regimes (structural knowledge) stabilize earlier than the remaining parameter values (quantitative knowledge), we propose FedSQ (Federated Structural-Quantitative learning), a transfer-initialized neural federated procedure based on a DualCopy, piecewise-linear view of deep networks. FedSQ freezes a structural copy of the pretrained model to induce fixed binary gating masks during federated fine-tuning, while only a quantitative copy is optimized locally and aggregated across rounds. Fixing the gating reduces learning to within-regime affine refinements, which stabilizes aggregation under heterogeneous partitions. Experiments on two convolutional neural network backbones under i.i.d.\\ and Dirichlet splits show that FedSQ improves robustness and can reduce rounds-to-best validation performance relative to standard baselines while preserving accuracy in the transfer setting.", "link": "http://arxiv.org/abs/2604.02990v1", "date": "2026-04-03", "relevancy": 2.0713, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5464}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5229}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.5013}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FedSQ%3A%20Optimized%20Weight%20Averaging%20via%20Fixed%20Gating&body=Title%3A%20FedSQ%3A%20Optimized%20Weight%20Averaging%20via%20Fixed%20Gating%0AAuthor%3A%20Cristian%20P%C3%A9rez-Corral%20and%20Jose%20I.%20Mestre%20and%20Alberto%20Fern%C3%A1ndez-Hern%C3%A1ndez%20and%20Manuel%20F.%20Dolz%20and%20Jos%C3%A9%20Duato%20and%20Enrique%20S.%20Quintana-Ort%C3%AD%0AAbstract%3A%20Federated%20learning%20%28FL%29%20enables%20collaborative%20training%20across%20organizations%20without%20sharing%20raw%20data%2C%20but%20it%20is%20hindered%20by%20statistical%20heterogeneity%20%28non-i.i.d.%5C%20client%20data%29%20and%20by%20instability%20of%20naive%20weight%20averaging%20under%20client%20drift.%20In%20many%20cross-silo%20deployments%2C%20FL%20is%20warm-started%20from%20a%20strong%20pretrained%20backbone%20%28e.g.%2C%20ImageNet-1K%29%20and%20then%20adapted%20to%20local%20domains.%20Motivated%20by%20recent%20evidence%20that%20ReLU-like%20gating%20regimes%20%28structural%20knowledge%29%20stabilize%20earlier%20than%20the%20remaining%20parameter%20values%20%28quantitative%20knowledge%29%2C%20we%20propose%20FedSQ%20%28Federated%20Structural-Quantitative%20learning%29%2C%20a%20transfer-initialized%20neural%20federated%20procedure%20based%20on%20a%20DualCopy%2C%20piecewise-linear%20view%20of%20deep%20networks.%20FedSQ%20freezes%20a%20structural%20copy%20of%20the%20pretrained%20model%20to%20induce%20fixed%20binary%20gating%20masks%20during%20federated%20fine-tuning%2C%20while%20only%20a%20quantitative%20copy%20is%20optimized%20locally%20and%20aggregated%20across%20rounds.%20Fixing%20the%20gating%20reduces%20learning%20to%20within-regime%20affine%20refinements%2C%20which%20stabilizes%20aggregation%20under%20heterogeneous%20partitions.%20Experiments%20on%20two%20convolutional%20neural%20network%20backbones%2 {"title": "Supplementary Materials to Graph Convolutional Branch and Bound", "author": "Lorenzo Sciandra and Roberto Esposito and Andrea Cesare Grosso and Laura Sacerdote and Cristina Zucca", "abstract": "This article explores the integration of deep learning models into combinatorial optimization pipelines, specifically targeting NP-hard problems. Traditional exact algorithms for such problems often rely on heuristic criteria to guide the exploration of feasible solutions. In this work, we propose using neural networks to learn informative heuristics, most notably, an optimality score that estimates a solution's proximity to the optimum. This score is used to evaluate nodes within a branch-and-bound framework, enabling a more efficient traversal of the solution space. Focusing on the Traveling Salesman Problem, we introduce Concorde, a state-of-the-art solver, and present a hybrid approach called Graph Convolutional Branch and Bound, which augments it with a graph convolutional neural network trained with a novel unsupervised training strategy that facilitates generalization to graphs of varying sizes without requiring labeled data. Empirical results demonstrate the effectiveness of the proposed method, showing a significant reduction in the number of explored branch-and-bound nodes and overall computational time. Some of the results concerning the use of the 1-tree relaxation are in the supplementary materials.", "link": "http://arxiv.org/abs/2406.03099v4", "date": "2026-04-03", "relevancy": 2.053, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.5264}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.5219}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4993}], "mailto": "mailto:haoxiang.li.2 {"title": "User-Aware Conditional Generative Total Correlation Learning for Multi-Modal Recommendation", "author": "Jing Du and Zesheng Ye and Congbo Ma and Feng Liu and Flora. D. Salim", "abstract": "Multi-modal recommendation (MMR) enriches item representations by introducing item content, e.g., visual and textual descriptions, to improve upon interaction-only recommenders. The success of MMR hinges on aligning these content modalities with user preferences derived from interaction data, yet dominant practices based on disentangling modality-invariant preference-driving signals from modality-specific preference-irrelevant noises are flawed. First, they assume a one-size-fits-all relevance of item content to user preferences for all users, which contradicts the user-conditional fact of preferences. Second, they optimize pairwise contrastive losses separately toward cross-modal alignment, systematically ignoring higher-order dependencies inherent when multiple content modalities jointly influence user choices. In this paper, we introduce GTC, a conditional Generative Total Correlation learning framework. We employ an interaction-guided diffusion model to perform user-aware content feature filtering, preserving only personalized features relevant to each individual user. Furthermore, to capture complete cross-modal dependencies, we optimize a tractable lower bound of the total correlation of item representations across all modalities. Experiments on standard MMR benchmarks show GTC consistently outperforms state-of-the-art, with gains of up to 28.30% in NDCG@5. Ablation studies validate both conditional preference-driven feature filtering and total correlation optimization, confirming the ability of GTC to model user-conditional relationships in MMR tasks. The code is available at: https://github.com/jingdu-cs/GTC.", "link": "http://arxiv.org/abs/2604.03014v1", "date": "2026-04-03", "relevancy": 2.0441, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5144}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.509}, {"title": "Multimodal-Conditioned Latent Diffusion Models for Fashion Image Editing", "link": "http://arxiv.org/abs/2403.14828v2", "similarity": 0.5075}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20User-Aware%20Conditional%20Generative%20Total%20Correlation%20Learning%20for%20Multi-Modal%20Recommendation&body=Title%3A%20User-Aware%20Conditional%20Generative%20Total%20Correlation%20Learning%20for%20Multi-Modal%20Recommendation%0AAuthor%3A%20Jing%20Du%20and%20Zesheng%20Ye%20and%20Congbo%20Ma%20and%20Feng%20Liu%20and%20Flora.%20D.%20Salim%0AAbstract%3A%20Multi-modal%20recommendation%20%28MMR%29%20enriches%20item%20representations%20by%20introducing%20item%20content%2C%20e.g.%2C%20visual%20and%20textual%20descriptions%2C%20to%20improve%20upon%20interaction-only%20recommenders.%20The%20success%20of%20MMR%20hinges%20on%20aligning%20these%20content%20modalities%20with%20user%20preferences%20derived%20from%20interaction%20data%2C%20yet%20dominant%20practices%20based%20on%20disentangling%20modality-invariant%20preference-driving%20signals%20from%20modality-specific%20preference-irrelevant%20noises%20are%20flawed.%20First%2C%20they%20assume%20a%20one-size-fits-all%20relevance%20of%20item%20content%20to%20user%20preferences%20for%20all%20users%2C%20which%20contradicts%20the%20user-conditional%20fact%20of%20preferences.%20Second%2C%20they%20optimize%20pairwise%20contrastive%20losses%20separately%20toward%20cross-modal%20alignment%2C%20systematically%20ignoring%20higher-order%20dependencies%20inherent%20when%20multiple%20content%20modalities%20jointly%20influence%20user%20choices.%20In%20this%20paper%2C%20we%20introduce%20GTC%2C%20a%20conditional%20Generative%20Total%20Correlation%20learning%20framework.%20We%20employ%20an%20interaction-guided%20diffusion%20model%20to%20perform%20user-aware%20content%20feature%20filtering%2C%20preserving%20only%20personalized%20features%20relevant%20to%20each%20individual%20user.%20Furthermore%2C%20to%20capture%20complete%20cross-modal%20dependencies%2C%20we%20optimize%20a%20tractable%20lower%20bound%20of%20the%20total%20correlation%20of%20item%20representations%20across%20all%20modalities.%20Experiments%20on%20standard%20MMR%20benchmarks%20show%20GTC%20consistently%20outperforms%20state-of-the-art%2C%20with%20gains%20of%20up%20to%2028.30%25%20in%20NDCG%405.%20Ablation%20studies%20validate%20both%20conditional%20preference-driven%20feature%20filtering%20and%20total%20correlation%20optimization%2C%20confirming%20the%20ability%20of%20GTC%20to%20model%20user-conditional%20relationships%20in%20MMR%20tasks.%20The%20code%20is%20available%20at%3A%20https%3A//github.com/jingdu-cs/GTC.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03014v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DUser-Aware%2520Conditional%2520Generative%2520Total%2520Correlation%2520Learning%2520for%2520Multi-Modal%2520Recommendation%26entry.906535625%3DJing%2520Du%2520and%2520Zesheng%2520Ye%2520and%2520Congbo%2520Ma%2520and%2520Feng%2520Liu%2520and%2520Flora.%2520D.%2520Salim%26entry.1292438233%3DMulti-modal%2520recommendation%2520%2528MMR%2529%2520enriches%2520item%2520representations%2520by%2520introducing%2520item%2520content%252C%2520e.g.%252C%2520visual%2520and%2520textual%2520descriptions%252C%2520to%2520improve%2520upon%2520interaction-only%2520recommenders.%2520The%2520success%2520of%2520MMR%2520hinges%2520on%2520aligning%2520these%2520content%2520modalities%2520with%2520user%2520preferences%2520derived%2520from%2520interaction%2520data%252C%2520yet%2520dominant%2520practices%2520based%2520on%2520disentangling%2520modality-invariant%2520preference-driving%2520signals%2520from%2520modality-specific%2520prefe TC%20consistently%20outperforms%20state-of-the-art%2C%20with%20gains%20of%20up%20to%2028.30%25%20in%20NDCG%405.%20Ablation%20studies%20validate%20both%20conditional%20preference-driven%20feature%20filtering%20and%20total%20correlation%20optimization%2C%20confirming%20the%20ability%20of%20GTC%20to%20model%20user-conditional%20relationships%20in%20MMR%20tasks.%20The%20code%20is%20available%20at%3A%20https%3A//github.com/jingdu-cs/GTC.&entry.1838667208=http%3A//arxiv.org/abs/2604.03014v1&entry.124074799=Read"},
{"title": "When RL Meets Adaptive Speculative Training: A Unified Training-Serving System", "author": "Junxiong Wang and Fengxiang Bie and Jisen Li and Zhongzhu Zhou and Zelei Shao and Yubo Wang and Yinghui Liu and Qingyang Wu and Avner May and Sri Yanamandra and Yineng Zhang and Ce Zhang and Tri Dao and Percy Liang and Ben Athiwaratkun and Shuaiwen Leon Song and Chenfeng Xu and Xiaoxia Wu", "abstract": "Speculative decoding can significantly accelerate LLM serving, yet most deployments today disentangle speculator training from serving, treating speculator training as a standalone offline modeling problem. We show that this decoupled formulation introduces substantial deployment and adaptation lag: (1) high time-to-serve, since a speculator must be trained offline for a considerable period before deployment; (2) delayed utility feedback, since the true end-to-end decoding speedup is only known after training and cannot be inferred reliably from acceptance rate alone due to model-architecture and system-level overheads; and (3) domain-drift degradation, as the target model is repurposed to new domains and the speculator becomes stale and less effective.\n  To address these issues, we present Aurora, a unified training-serving system that closes the loop by continuously learning a speculator directly from live inference traces. Aurora reframes online speculator learning as an asynchronous reinforcement-learning problem: accepted tokens provide positive feedback, while rejected speculator proposals provide implicit negative feedback that we exploit to improve sample efficiency. Our design integrates an SGLang-based inference server with an asynchronous training server, enabling hot-swapped speculator updates without service interruption. Crucially, Aurora supports day-0 deployment: a speculator can be served immediately and rapidly adapted to live traffic, improving system performance while providing immediate utility feedback. Across experiments, Aurora achieves a 1.5x day-0 speedup on recently released frontier models (e.g., MiniMax M2.1 229B and Qwen3-Coder-Next 80B). Aurora also adapts effectively to distribution shifts in user traffic, delivering an additional 1.25x speedup over a well-trained but static speculator on widely used models (e.g., Qwen3 and Llama3).", "link": "http://arxiv.org/abs/2602.06932v2", "date": "2026-04-03", "relevancy": 2.0336, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5416}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.5252}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4685}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20When%20RL%20Meets%20Adaptive%20Speculative%20Training%3A%20A%20Unified%20Training-Serving%20System&body=Title%3A%20When%20RL%20Meets%20Adaptive%20Speculative%20Training%3A%20A%20Unified%20Training-Serving%20System%0AAuthor%3A%20Junxiong%20Wang%20and%20Fengxiang%20Bie%20and%20Jisen%20Li%20and%20Zhongzhu%20Zhou%20and%20Zelei%20Shao%20and%20Yubo%20Wang%20and%20Yinghui%20Liu%20and%20Qingyang%20Wu%20and%20Avner%20May%20and%20Sri%20Yanamandra%20and%20Yineng%20Zhang%20and%20Ce%20Zhang%20and%20Tri%20Dao%20and%20Percy%20Liang%20and%20Ben%20Athiwaratkun%20and%20Shuaiwen%20Leon%20Song%20and%20Chenfeng%20Xu%20and%20Xiaoxia%20Wu%0AAbstract%3A%20Speculative%20decoding%20can%20significantly%20accelerate%20LLM%20serving%2C%20yet%20most%20deployments%20today%20disentangle%20speculator%20training%20from%20serving%2C%20treating%20speculator%20training%20as%20a%20standalone%20offline%20modeling%20problem.%20We%20show%20that%20this%20decoupled%20formulation%20introduces%20substantial%20deployment%20and%20adaptation%20lag%3A%20%281%29%20high%20time-to-serve%2C%20since%20a%20speculator%20must%20be%20trained%20offline%20for%20a%20considerable%20period%20before%20deployment%3B%20%282%29%20delayed%20utility%20feedback%2C%20since%20the%20true%20end-to-end%20decoding%20speedup%20is%20only%20known%20after%20training%20and%20cannot%20be%20inferred%20reliably%20from%20acceptance%20rate%20alone%20due%20to%20model-architecture%20and%20system-level%20overheads%3B%20and%20%283%29%20domain-drift%20degradation%2C%20as%20the%20target%20model%20is%20repurposed%20to%20new%20domains%20and%20the%20speculator%20becomes%20stale%20and%20less%20effective.%0A%20%20To%20address%20these%20issues%2C%20we%20present%20Aurora%2C%20a%20unified%20training-serving%20system%20that%20closes%20the%20loop%20by%20continuously%20learning%20a%20speculator%20directly%20from%20live%20inference%20traces.%20Aurora%20reframes%20online%20speculator%20learning%20as%20an%20asynchronous%20reinforcement-learning%20problem%3A%20accepted%20tokens%20provide%20positive%20feedback%2C%20while%20rejected%20speculator%20proposals%20provide%20implicit%20negative%20feedback%20that%20we%20exploit%20to%20improve%20sample%20efficiency.%20Our%20design%20integrates%20an%20SGLang-based%20inference%20server%20with%20an%20asynchronous%20training%20server%2C%20enabling%20hot-swapped%20speculator%20updates%20without%20service%20interruption.%20Crucially%2C%20Aurora%20supports%20day-0%20deployment%3A%20a%20speculator%20can%20be%20served%20immediately%20and%20rapidly%20adapted%20to%20live%20traffic%2C%20improving%20system%20performance%20while%20providing%20immediate%20utility%20feedback.%20Across%20experiments%2C%20Aurora%20achieves%20a%201.5x%20day-0%20speedup%20on%20recently%20released%20frontier%20models%20%28e.g.%2C%20MiniMax%20M2.1%20229B%20and%20Qwen3-Coder-Next%2080B%29.%20Aurora%20also%20adapts%20effectively%20to%20distribution%20shifts%20in%20user%20traffic%2C%20delivering%20an%20additional%201.25x%20speedup%20over%20a%20well-trained%20but%20static%20speculator%20on%20widely%20used%20models%20%28e.g.%2C%20Qwen3%20and%20Llama3%29.%0ALink%3A%20http%3A//arxiv.org/abs/2602.06932v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DWhen%2520RL%2520Meets%2520Adaptive%2520Speculative%2520Training%253A%2520A%2520Unified%2520Training-Serving%2520System%26entry.906535625%3DJunxiong%2520Wang%2520and%2520Fengxiang%2520Bie%2520and%2520Jisen%2520Li%2520and%2520Zhongzhu%2520Zhou%2520and%2520Zelei%2520Shao%2520and%2520Yubo%2520Wang%2520and%2520Yinghui%2520Liu%2520and%2520Qingyang%2520Wu%2520and%2520Avner%2520May%2520and%2520Sri%2520Yanamandra%2520and%2520Yineng%2520Zhang%2520and%2520Ce%2520Zhang%2520and%2520Tri%2520Dao%2520and%2520Percy%2520Liang%2520and%2520Ben%2520Athiwaratkun%2520and%2520Shuaiwen%2520Leon%2520Song%2520and%2520Chenfeng%2520Xu%2520and%2520Xiaoxia%2520Wu%26entry.1292438233%3DSpeculative%2520decoding%2520can%2520significantly%2520accelerate%2520LLM%2520serving%252C%2520yet%2520most%2520deployments%2520today%2520disentangle%2520speculator%2520training%2520from%2520serving%252C%2520treating%2520speculator%2520training%2520as%2520a%2520standalone%2520offline%2520modeling%2520problem.%2520We%2520show%2520that%2520this%2520decoupled%2520formulation%2520introduces%2520substantial%2520deployment%2520and%2520adaptation%2520lag%253A%2520%25281%2529%2520high%2520time-to-serve%252C%2520since%2520a%2520speculator%2520must%2520be%2520trained%2520offline%2520for%2520a%2520considerable%2520period%2520before%2520deployment%253B%2520%25282%2529%2520delayed%2520utility%2520feedback%252C%2520since%2520the%2520true%2520end-to-end%2520decoding%2520speedup%2520is%2520only%2520known%2520after%2520training%2520and%2520cannot%2520be%2520inferred%2520reliably%2520from%2520acceptance%2520rate%2520alone%2520due%2520to%2520model-architecture%2520and%2520system-level%2520overheads%253B%2520and%2520%25283%2529%2520domain-drift%2520degradation%252C%2520as%2520the%2520target%2520mod {"title": "Explicit Time-Frequency Dynamics for Skeleton-Based Gait Recognition", "author": "Seoyeon Ko and Yeojin Song and Egene Chung and Luca Quagliato and Taeyong Lee and Junhyug Noh", "abstract": "Skeleton-based gait recognizers excel at modeling spatial configurations but often underuse explicit motion dynamics that are crucial under appearance changes. We introduce a plug-and-play Wavelet Feature Stream that augments any skeleton backbone with time-frequency dynamics of joint velocities. Concretely, per-joint velocity sequences are transformed by the continuous wavelet transform (CWT) into multi-scale scalograms, from which a lightweight multi-scale CNN learns discriminative dynamic cues. The resulting descriptor is fused with the backbone representation for classification, requiring no changes to the backbone architecture or additional supervision. Across CASIA-B, the proposed stream delivers consistent gains on strong skeleton backbones (e.g., GaitMixer, GaitFormer, GaitGraph) and establishes a new skeleton-based state of the art when attached to GaitMixer. The improvements are especially pronounced under covariate shifts such as carrying bags (BG) and wearing coats (CL), highlighting the complementarity of explicit time-frequency modeling and standard spatio-temporal encoders.", "link": "http://arxiv.org/abs/2604.03002v1", "date": "2026-04-03", "relevancy": 2.0207, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.5197}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4957}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4925}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Explicit%20Time-Frequency%20Dynamic

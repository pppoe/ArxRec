20concepts%20are%20the%20most%20resistant%20to%20suppression%2C%20and%20stronger%20instruction-tuned%20models%20remain%20capable%20despite%20explicit%20forget%20instructions.%20These%20results%20expose%20a%20clear%20gap%20between%20prompt-level%20suppression%20and%20true%20visual%20concept%20erasure.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03114v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCan%2520VLMs%2520Truly%2520Forget%253F%2520Benchmarking%2520Training-Free%2520Visual%2520Concept%2520Unlearning%26entry.906535625%3DZhangyun%2520Tan%2520and%2520Zeliang%2520Zhang%2520and%2520Susan%2520Liang%2520and%2520Yolo%2520Yunlong%2520Tang%2520and%2520Lisha%2520Chen%2520and%2520Chenliang%2520Xu%26entry.1292438233%3DVLMs%2520trained%2520on%2520web-scale%2520data%2520retain%2520sensitive%2520and%2520copyrighted%2520visual%2520concepts%2520that%2520deployment%2520may%2520require%2520removing.%2520Training-based%2520unlearning%2520methods%2520share%2520a%2520structural%2520flaw%253A%2520fine-tuning%2520on%2520a%2520narrow%2520forget%2520set%2520degrades%2520general%2520capabilities%2520before%2520unlearning%2520begins%252C%2520making%2520it%2520impossible%2520to%2520attribute%2520subsequent%2520performance%2520drops%2520to%2520the%2520unlearning%2520procedure%2520itself.%2520Training-free%2520approaches%2520sidestep%2520this%2520by%2520suppressing%2520concepts%2520through%2520prompts%2520or%2520system%2520instructions%252C%2520but%2520no%2520rigorous%2520benchmark%2520exists%2520for%2520evaluating%2520them%2520on%2520visual%2520tasks.%250A%2520%2520We%2520introduce%2520VLM-UnBench%252C%2520the%2520first%2520benchmark%2520for%2520training-free%2520visual%2520concept%2520unlearning%2520in%2520VLMs.%2520It%2520covers%2520four%2520forgetting%2520levels%252C%25207%2520source%2520datasets%252C%2520and%252011%2520concept%2520axes%252C%2520and%2520pairs%2520a%2520three-level%2520probe%2520taxonomy {"title": "PRISM: LLM-Guided Semantic Clustering for High-Precision Topics", "author": "Connor Douglas and Utkucan Balci and Joseph Aylett-Bullock", "abstract": "In this paper, we propose Precision-Informed Semantic Modeling (PRISM), a structured topic modeling framework combining the benefits of rich representations captured by LLMs with the low cost and interpretability of latent semantic clustering methods. PRISM fine-tunes a sentence encoding model using a sparse set of LLM- provided labels on samples drawn from some corpus of interest. We segment this embedding space with thresholded clustering, yielding clusters that separate closely related topics within some narrow domain. Across multiple corpora, PRISM improves topic separability over state-of-the-art local topic models and even over clustering on large, frontier embedding models while requiring only a small number of LLM queries to train. This work contributes to several research streams by providing (i) a student-teacher pipeline to distill sparse LLM supervision into a lightweight model for topic discovery; (ii) an analysis of the efficacy of sampling strategies to improve local geometry for cluster separability; and (iii) an effective approach for web-scale text analysis, enabling researchers and practitioners to track nuanced claims and subtopics online with an interpretable, locally deployable framework.", "link": "http://arxiv.org/abs/2604.03180v1", "date": "2026-04-03", "relevancy": 2.5873, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5277}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5277}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.497}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20PRISM%3A%20LLM-Guided%20Semantic%20Clustering%20for%20High-Precision%20Topics&body=Title%3A%20PRISM%3A%20LLM-Guided%20Semantic%20Clustering%20for%20High-Precision%20Topics%0AAuthor%3A%20Connor%20Douglas%20and%20Utkucan%20Balci%20and%20Joseph%20Aylett-Bullock%0AAbstract%3A%20In%20this%20paper%2C%20we%20propose%20Precision-Informed%20Semantic%20Modeling%20%28PRISM%29%2C%20a%20structured%20topic%20modeling%20framework%20combining%20the%20benefits%20of%20rich%20representations%20captured%20by%20LLMs%20with%20the%20low%20cost%20and%20interpretability%20of%20latent%20semantic%20clustering%20methods.%20PRISM%20fine-tunes%20a%20sentence%20encoding%20model%20using%20a%20sparse%20set%20of%20LLM-%20provided%20labels%20on%20samples%20drawn%20from%20some%20corpus%20of%20interest.%20We%20segment%20this%20embedding%20space%20with%20thresholded%20clustering%2C%20yielding%20clusters%20that%20separate%20closely%20related%20topics%20within%20some%20narrow%20domain.%20Across%20multiple%20corpora%2C%20PRISM%20improves%20topic%20separability%20over%20state-of-the-art%20local%20topic%20models%20and%20even%20over%20clustering%20on%20large%2C%20frontier%20embedding%20models%20while%20requiring%20only%20a%20small%20number%20of%20LLM%20queries%20to%20train.%20This%20work%20contributes%20to%20several%20research%20streams%20by%20providing%20%28i%29%20a%20student-teacher%20pipeline%20to%20distill%20sparse%20LLM%20supervision%20into%20a%20lightweight%20model%20for%20topic%20discovery%3B%20%28ii%29%20an%20analysis%20of%20the%20efficacy%20of%20sampling%20strategies%20to%20improve%20local%20geometry%20for%20cluster%20separability%3B%20and%20%28iii%29%20an%20effective%20approach%20for%20web-scale%20text%20analysis%2C%20enabling%20researchers%20and%20practitioners%20to%20track%20nuanced%20claims%20and%20subtopics%20online%20with%20an%20interpretable%2C%20locally%20deployable%20framework.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03180v1%0AForm%3A%20https%3A//docs.google.co {"title": "FoE: Forest of Errors Makes the First Solution the Best in Large Reasoning Models", "author": "Kehan Jiang and Haonan Dong and Zhaolu Kang and Zhengzhou Zhu and Guojie Song", "abstract": "Recent Large Reasoning Models (LRMs) like DeepSeek-R1 have demonstrated remarkable success in complex reasoning tasks, exhibiting human-like patterns in exploring multiple alternative solutions. Upon closer inspection, however, we uncover a surprising phenomenon: The First is The Best, where alternative solutions are not merely suboptimal but potentially detrimental. This observation challenges widely accepted test-time scaling laws, leading us to hypothesize that errors within the reasoning path scale concurrently with test time. Through comprehensive empirical analysis, we characterize errors as a forest-structured Forest of Errors (FoE) and conclude that FoE makes the First the Best, which is underpinned by rigorous theoretical analysis. Leveraging these insights, we propose RED, a self-guided efficient reasoning framework comprising two components: I) Refining First, which suppresses FoE growth in the first solution; and II) Discarding Subs, which prunes subsequent FoE via dual-consistency. Extensive experiments across five benchmarks and six backbone models demonstrate that RED outperforms eight competitive baselines, achieving performance gains of up to 19.0% while reducing token consumption by 37.7% ~ 70.4%. Moreover, comparative experiments on FoE metrics shed light on how RED achieves effectiveness.", "link": "http://arxiv.org/abs/2604.02967v1", "date": "2026-04-03", "relevancy": 2.5605, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5177}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5177}, {"title": "Flexible Visual Recognition by Evidential Modeling of Confusion and Ignorance", "link": "http://openaccess.thecvf.com/content/ICCV2023/html/Fan_Flexible_Visual_Recognition_by_Evidential_Modeling_of_Confusion_and_Ignorance_ICCV_2023_paper.html", "similarity": 0.5008}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FoE%3A%20Forest%20of%20Errors%20Makes%20the%20First%20Solution%20the%20Best%20in%20Large%20Reasoning%20Models&body=Title%3A%20FoE%3A%20Forest%20of%20Errors%20Makes%20the%20First%20Solution%20the%20Best%20in%20Large%20Reasoning%20Models%0AAuthor%3A%20Kehan%20Jiang%20and%20Haonan%20Dong%20and%20Zhaolu%20Kang%20and%20Zhengzhou%20Zhu%20and%20Guojie%20Song%0AAbstract%3A%20Recent%20Large%20Reasoning%20Models%20%28LRMs%29%20like%20DeepSeek-R1%20have%20demonstrated%20remarkable%20success%20in%20complex%20reasoning%20tasks%2C%20exhibiting%20human-like%20patterns%20in%20exploring%20multiple%20alternative%20solutions.%20Upon%20closer%20inspection%2C%20however%2C%20we%20uncover%20a%20surprising%20phenomenon%3A%20The%20First%20is%20The%20Best%2C%20where%20alternative%20solutions%20are%20not%20merely%20suboptimal%20but%20potentially%20detrimental.%20This%20observation%20challenges%20widely%20accepted%20test-time%20scaling%20laws%2C%20leading%20us%20to%20hypothesize%20that%20errors%20within%20the%20reasoning%20path%20scale%20concurrently%20with%20test%20time.%20Through%20comprehensive%20empirical%20analysis%2C%20we%20characterize%20errors%20as%20a%20forest-structured%20Forest%20of%20Errors%20%28FoE%29%20and%20conclude%20that%20FoE%20makes%20the%20First%20the%20Best%2C%20which%20is%20underpinned%20by%20rigorous%20theoretical%20analysis.%20Leveraging%20these%20insights%2C%20we%20propose%20RED%2C%20a%20self-guided%20efficient%20reasoning%20framework%20comprising%20two%20components%3A%20I%29%20Refining%20First%2C%20which%20suppresses%20FoE%20growth%20in%20the%20first%20solution%3B%20and%20II%29%20Discarding%20Subs%2C%20which%20prunes%20subsequent%20FoE%20via%20dual-consistency.%20Extensive%20experiments%20across%20five%20benchmarks%20and%20six%20backbone%20models%20demonstrate%20that%20RED%20outperforms%20eight%20competitive%20baselines%2C%20achieving%20performance%20gains%20of%20up%20to%2019.0%25%20while%20reducing%20token%20consumption%20by%2037.7%25%20~%2070.4%25.%20Moreover%2C%20comparative%20experiments%20on%20FoE%20metrics%20shed%20light%20on%20how%20RED%20achieves%20effectiveness.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02967v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFoE%253A%2520Forest%2520of%2520Errors%2520Makes%2520the%2520First%2520Solution%2520the%2520Best%2520in%2520Large%2520Reasoning%2520Models%26entry.906535625%3DKehan%2520Jiang%2520and%2520Haonan%2520Dong%2520and%2520Zhaolu%2520Kang%2520and%2520Zhengzhou%2520Zhu%2520and%2520Guojie%2520Song%26entry.1292438233%3DRecent%2520Large%2520Reasoning%2520Models%2520%2528LRMs%2529%2520like%2520DeepSeek-R1%2520have%2520demonstrated%2520remarkable%2520success%2520in%2520complex%2520reasoning%2520tasks%252C%2520exhibiting%2520human-like%2520patterns%2520in%2520exploring%2520multiple%2520alternative%2520solutions.%2520Upon%2520closer%2520inspection%252C%2520however%252C%2520we%2520uncover%2520a%2520surprising%2520phenomenon%253A%2520The%2520First%2520is%2520The%2520Best%252C%2520where%2520alternative%2520solutions%2520are%2520not%2520merely%2520suboptimal%2520but%2520potentially%2520detrimental.%2520This%2520observation%2520challenges%2520widely%2520accepted%2520test-time%2520scaling%2520laws%252C%2520leading%2520us%2520to%2520hypothesize%2520that%2520errors%2520within%2520the%2520reasoning%2520path%2520scale%2520concurrently%2520with%2520test%2520time.%2520Through%2520comprehensive%2520empirical%2520analysis%252C%2520we%2520characterize%2520errors%2520as%2520a%2520forest-structured%2520Forest%2520of%2520Errors%2520%2528FoE%2529%2520and%2520conclude%2520that%2520FoE%2520makes%2520the%2520First%2520the%2520Best%252C%2520which%2520is%2520underpinned%2520by%2520rigorous%2520theoretical%2520analysis.%2520Leveraging%2520these%2520insights%252C%2520we%2520propose%2520RED%252C%2520a%2520self-guided%2520efficient%2520reasoning%2520framework%2520comprising%2520two%2520components%253A%2520I%2529%2520Refining%2520First%252C%2520which%2520suppresses%2520FoE%2520growth%2520in%2520the%2520first%2520solution%253B%2520and%2520II%2529%2520Discarding%2520Subs%252C%2520which%2520prunes%2520subsequent%2520FoE%2520via%2520dual-consistency.%2520Extensive%2520experiments%2520across%2520five%2520benchmarks%2520and%2520six%2520backbone%2520models%2520demonstrate%2520that%2520RED%2520outperforms%2520eight%2520competitive%2520baselines%252C%2520achieving%2520performance%2520gains%2520of%2520up%2520to%252019.0%2525%2520while%2520reducing%2520token%2520consumption%2520by%252037.7%2525%2520~%252070.4%2525.%2520Moreover%252C%2520comparative%2520experiments%2520on%2520FoE%2520metrics%2520shed%2520light%2520on%2520how%2520RED%2520achieves%2520effectiveness.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.02967v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=FoE%3A%20Forest%20of%20Errors%20Makes%20the%20First%20Solution%20the%20Best%20in%20Large%20Reasoning%20Models&entry.906535625=Kehan%20Jiang%20and%20Haonan%20Dong%20and%20Zhaolu%20Kang%20and%20Zhengzhou%20Zhu%20and%20Guojie%20Song&entry.1292438233=Recent%20Large%20Reasoning%20Models%20%28LRMs%29%20like%20DeepSeek-R1%20have%20demonstrated%20remarkable%20success%20in%20complex%20reasoning%20tasks%2C%20exhibiting%20human-like%20patterns%20in%20exploring%20multiple%20alternative%20solutions.%20Upon%20closer%20inspection%2C%20however%2C%20we%20uncover%20a%20surprising%20phenomenon%3A%20The%20First%20is%20The%20Best%2C%20where%20alternative%20solutions%20are%20not%20merely%20suboptimal%20but%20potentially%20detrimental.%20This%20observation%20 {"title": "Scene Grounding In the Wild", "author": "Tamir Cohen and Leo Segre and Shay Shomer-Chai and Shai Avidan and Hadar Averbuch-Elor", "abstract": "Reconstructing accurate 3D models of large-scale real-world scenes from unstructured, in-the-wild imagery remains a core challenge in computer vision, especially when the input views have little or no overlap. In such cases, existing reconstruction pipelines often produce multiple disconnected partial reconstructions or erroneously merge non-overlapping regions into overlapping geometry. In this work, we propose a framework that grounds each partial reconstruction to a complete reference model of the scene, enabling globally consistent alignment even in the absence of visual overlap. We obtain reference models from dense, geospatially accurate pseudo-synthetic renderings derived from Google Earth Studio. These renderings provide full scene coverage but differ substantially in appearance from real-world photographs. Our key insight is that, despite this significant domain gap, both domains share the same underlying scene semantics. We represent the reference model using 3D Gaussian Splatting, augmenting each Gaussian with semantic features, and formulate alignment as an inverse feature-based optimization scheme that estimates a global 6DoF pose and scale while keeping the reference model fixed. Furthermore, we introduce the WikiEarth dataset, which registers existing partial 3D reconstructions with pseudo-synthetic reference models. We demonstrate that our approach consistently improves global alignment when initialized with various classical and learning-based pipelines, while mitigating failure modes of state-of-the-art end-to-end models.", "link": "http://arxiv.org/abs/2603.26584v2", "date": "2026-04-03", "relevancy": 2.5189, "topK": [{"title": "WorldExplorer: Towards Generating Fully Navigable 3D Scenes", "link": "http://arxiv.org/abs/2506.01799v2", "similarity": 0.6414}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.6305}, {"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.6243}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Scene%20Grounding%20In%20the%20Wild&body=Title%3A%20Scene%20Grounding%20In%20the%20Wild%0AAuthor%3A%20Tamir%20Cohen%20and%20Leo%20Segre%20and%20Shay%20Shomer-Chai%20and%20Shai%20Avidan%20and%20Hadar%20Averbuch-Elor%0AAbstract%3A%20Reconstructing%20accurate%203D%20models%20of%20large-scale%20real-world%20scenes%20from%20unstructured%2C%20in-the-wild%20imagery%20remains%20a%20core%20challenge%20in%20computer%20vision%2C%20especially%20when%20the%20input%20views%20have%20little%20or%20no%20overlap.%20In%20such%20cases%2C%20existing%20reconstruction%20pipelines%20often%20produce%20multiple%20disconnected%20partial%20reconstructions%20or%20erroneously%20merge%20non-overlapping%20regions%20into%20overlapping%20geometry.%20In%20this%20work%2C%20we%20propose%20a%20framework%20that%20grounds%20each%20partial%20reconstruction%20to%20a%20complete%20reference%20model%20of%20the%20scene%2C%20enabling%20globally%20consistent%20alignment%20even%20in%20the%20absence%20of%20visual%20overlap.%20We%20obtain%20reference%20models%20from%20dense%2C%20geospatially%20accurate%20pseudo-synthetic%20renderings%20derived%20from%20Google%20Earth%20Studio.%20These%20renderings%20provide%20full%20scene%20coverage%20but%20differ%20substantially%20in%20appearance%20from%20real-world%20photographs.%20Our%20key%20insight%20is%20that%2C%20despite%20this%20significant%20domain%20gap%2C%20both%20domains%20share%20the%20same%20underlying%20scene%20semantics.%20We%20represent%20the%20reference%20model%20using%203D%20Gaussian%20Splatting%2C%20augmenting%20each%20Gaussian%20with%20semantic%20features%2C%20and%20formulate%20alignment%20as%20an%20inverse%20feature-based%20optimization%20scheme%20that%20estimates%20a%20global%206DoF%20pose%20and%20scale%20while%20keeping%20the%20reference%20model%20fixed.%20Furthermore%2C%20we%20introduce%20the%20WikiEarth%20dataset%2C%20which%20registers%20existing%20partial%203D%20reconstructions%20with%20pseudo-synthetic%20reference%20models.%20We%20demonstrate%20that%20our%20approach%20consistently%20improves%20global%20alignment%20when%20initialized%20with%20various%20classical%20and%20learning-based%20pipelines%2C%20while%20mitigating%20failure%20modes%20of%20state-of-the-art%20end-to-end%20models.%0ALink%3A%20http%3A//arxiv.org/abs/2603.26584v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DScene%2520Grounding%2520In%2520the%2520Wild%26entry.906535625%3DTamir%2520Cohen%2520and%2520Leo%2520Segre%2520and%2520Shay%2520Shomer-Chai%2520and%2520Shai%2520Avidan%2520and%2520Hadar%2520Averbuch-Elor%26entry.1292438233%3DReconstructing%2520accurate%25203D%2520models%2520of%2520large-scale%2520real-world%2520scenes%2520from%2520unstructured%252C%2520in-the-wild%2520imagery%2520remains%2520a%2520core%2520challenge%2520in%2520computer%2520vision%252C%2520especially%2520when%2520the%2520input%2520views%2520have%2520little%2520or%2520no%2520overlap.%2520In%2520such%2520cases%252C%2520existing%2520reconstruction%2520pipelines%2520often%2520produce%2520multiple%2520disconnected%2520partial%2520reconstructions%2520or%2520erroneously%2520merge%2520non-overlapping%2520regions%2520into%2520overlapping%2520geometry.%2520In%2520this%2520work%252C%2520we%2520propose%2520a%2520framework%2520that%2520grounds%2520each%2520partial%2520reconstruction%2520to%2520a%2520complete%2520reference%2520model%2520of%2520the%2520scene%252C%2520enabling%2520globally%2520consistent%2520alignment%2520even%2520in%2520the%2520absence%2520of%2520visual%2520overlap.%2520We%2520obtain%2520reference%2520models%2520from%2520dense%252C%2520geospatially {"title": "Recovering Sub-threshold S-wave Arrivals in Deep Learning Phase Pickers via Shape-Aware Loss", "author": "Chun-Ming Huang and Li-Heng Chang and I-Hsin Chang and An-Sheng Lee and Hao Kuo-Chen", "abstract": "Deep learning has transformed seismic phase picking, but a systematic failure mode persists: for some S-wave arrivals that appear unambiguous to human analysts, the model produces only a distorted peak trapped below the detection threshold, even as the P-wave prediction on the same record appears flawless. By examining training dynamics and loss landscape geometry, we diagnose this amplitude suppression as an optimization trap arising from three interacting factors. Temporal uncertainty in S-wave arrivals, CNN bias toward amplitude boundaries, and the inability of pointwise loss to provide lateral corrective forces combine to create the trap. The diagnosis reveals that phase arrival labels are structured shapes rather than independent probability estimates, requiring training objectives that preserve coherence. We formalize this as the shape-then-align strategy and validate it through a conditional GAN proof of concept, recovering previously sub-threshold signals and achieving a 64% increase in effective S-phase detections. Beyond this implementation, the loss landscape visualization and numerical simulation techniques we introduce provide a general methodology for analyzing how label designs and loss functions interact with temporal uncertainty, transforming these choices from trial-and-error into principled analysis.", "link": "http://arxiv.org/abs/2511.06731v2", "date": "2026-04-03", "relevancy": 2.471, "topK": [{"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5083}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "simil {"title": "MI-Pruner: Crossmodal Mutual Information-guided Token Pruner for Efficient MLLMs", "author": "Jiameng Li and Aleksei Tiulpin and Matthew B. Blaschko", "abstract": "For multimodal large language models (MLLMs), visual information is relatively sparse compared with text. As a result, research on visual pruning emerges for efficient inference. Current approaches typically measure token importance based on the attention scores in the visual encoder or in the LLM decoder, then select visual tokens with high attention scores while pruning others. In this paper, we pursue a different and more surgical approach. Instead of relying on mechanism-specific signals, we directly compute Mutual Information (MI) between visual and textual features themselves, prior to their interaction. This allows us to explicitly measure crossmodal dependency at the feature levels. Our MI-Pruner is simple, efficient and non-intrusive, requiring no access to internal attention maps or architectural modifications. Experimental results demonstrate that our approach outperforms previous attention-based pruning methods with minimal latency.", "link": "http://arxiv.org/abs/2604.03072v1", "date": "2026-04-03", "relevancy": 2.4697, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.507}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4889}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4859}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20MI-Pruner%3A%20Crossmodal%20Mutual%20Information-guided%20Token%20Pruner%20for%20Efficient%20MLLMs&body=Title%3A%20MI-Pruner%3A%20Crossmodal%20Mutual%20Information-guided%20Token%20Pruner%20for%20Efficient%20MLLMs%0AAuthor%3A%20Ji {"title": "Salt: Self-Consistent Distribution Matching with Cache-Aware Training for Fast Video Generation", "author": "Xingtong Ge and Yi Zhang and Yushi Huang and Dailan He and Xiahong Wang and Bingqi Ma and Guanglu Song and Yu Liu and Jun Zhang", "abstract": "Distilling video generation models to extremely low inference budgets (e.g., 2--4 NFEs) is crucial for real-time deployment, yet remains challenging. Trajectory-style consistency distillation often becomes conservative under complex video dynamics, yielding an over-smoothed appearance and weak motion. Distribution matching distillation (DMD) can recover sharp, mode-seeking samples, but its local training signals do not explicitly regularize how denoising updates compose across timesteps, making composed rollouts prone to drift. To overcome this challenge, we propose Self-Consistent Distribution Matching Distillation (SC-DMD), which explicitly regularizes the endpoint-consistent composition of consecutive denoising updates. For real-time autoregressive video generation, we further treat the KV cache as a quality parameterized condition and propose Cache-Distribution-Aware training. This training scheme applies SC-DMD over multi-step rollouts and introduces a cache-conditioned feature alignment objective that steers low-quality outputs toward high-quality references. Across extensive experiments on both non-autoregressive backbones (e.g., Wan~2.1) and autoregressive real-time paradigms (e.g., Self Forcing), our method, dubbed \\textbf{Salt}, consistently improves low-NFE video generation quality while remaining compatible with diverse KV-cache memory mechanisms. Source code will be released at \\href{https://github.com/XingtongGe/Salt}{https://github.com/XingtongGe/Salt}.", "link": "http://arxiv.org/abs/2604.03118v1", "date": "2026-04-03", "relevancy": 2.4301, "topK": [{"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.6144}, {"title": "Tuning-Free Noise Rectification for High Fidelity Image-to-Video\n  Generation", "link": "http://arxiv.org/abs/2403.02827v1", "similarity": 0.6101}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5839}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Salt%3A%20Self-Consistent%20Distribution%20Matching%20with%20Cache-Aware%20Training%20for%20Fast%20Video%20Generation&body=Title%3A%20Salt%3A%20Self-Consistent%20Distribution%20Matching%20with%20Cache-Aware%20Training%20for%20Fast%20Video%20Generation%0AAuthor%3A%20Xingtong%20Ge%20and%20Yi%20Zhang%20and%20Yushi%20Huang%20and%20Dailan%20He%20and%20Xiahong%20Wang%20and%20Bingqi%20Ma%20and%20Guanglu%20Song%20and%20Yu%20Liu%20and%20Jun%20Zhang%0AAbstract%3A%20Distilling%20video%20generation%20models%20to%20extremely%20low%20inference%20budgets%20%28e.g.%2C%202--4%20NFEs%29%20is%20crucial%20for%20real-time%20deployment%2C%20yet%20remains%20challenging.%20Trajectory-style%20consistency%20distillation%20often%20becomes%20conservative%20under%20complex%20video%20dynamics%2C%20yielding%20an%20over-smoothed%20appearance%20and%20weak%20motion.%20Distribution%20matching%20distillation%20%28DMD%29%20can%20recover%20sharp%2C%20mode-seeking%20samples%2C%20but%20its%20local%20training%20signals%20do%20not%20explicitly%20regularize%20how%20denoising%20updates%20compose%20across%20timesteps%2C%20making%20composed%20rollouts%20prone%20to%20drift.%20To%20overcome%20this%20challenge%2C%20we%20propose%20Self-Consistent%20Distribution%20Matching%20Distillation%20%28SC-DMD%29%2C%20which%20explicitly%20regularizes%20the%20endpoint-consistent%20composition%20of%20consecutive%20denoising%20updates.%20For%20real-time%20autoregressive%20video%20generation%2C%20we%20further%20treat%20the%20KV%20cache%20as%20a%20quality%20parameterized%20condition%20and%20propose%20Cache-Distribution-Aware%20training.%20This%20training%20scheme%20applies%20SC-DMD%20over%20multi-step%20rollouts%20and%20introduces%20a%20cache-conditioned%20feature%20alignment%20objective%20that%20steers%20low-quality%20outputs%20toward%20high-quality%20references.%20Across%20extensive%20experiments%20on%20both%20non-autoregressive%20backbones%20%28e.g.%2C%20Wan~2.1%29%20and%20autoregressive%20real-time%20paradigms%20%28e.g.%2C%20Self%20Forcing%29%2C%20our%20method%2C%20dubbed%20%5Ctextbf%7BSalt%7D%2C%20consistently%20improves%20low-NFE%20video%20generation%20quality%20while%20remaining%20compatible%20with%20diverse%20KV-cache%20memory%20mechanisms.%20Source%20code%20will%20be%20released%20at%20%5Chref%7Bhttps%3A//github.com/XingtongGe/Salt%7D%7Bhttps%3A//github.com/XingtongGe/Salt%7D.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03118v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSalt%253A%2520Self-Consistent%2520Distribution%2520Matching%2520with%2520Cache-Aware%2520Training%2520for%2520Fast%2520Video%2520Generation%26entry.906535625%3DXingtong%2520Ge%2520and%2520Yi%2520Zhang%2520and%2520Yushi%2520Huang%2520and%2520Dailan%2520He%2520and%2520Xiahong%2520Wang%2520and%2520Bingqi%2520Ma%2520and%2520Guanglu%2520Song%2520and%2520Yu%2520Liu%2520and%2520Jun%2520Zhang%26entry.1292438233%3DDistilling%2520video%2520generation%2520models%2520to%2520extremely%2520low%2520inference%2520budgets%2520%2528e.g.%252C%25202--4%2520NFEs%2529%2520is%2520crucial%2520for%2520real-time%2520deployment%252C%2520yet%2520remains%2520challenging.%2520Trajectory-style%2520consistency%2520distillation%2520often%2520becomes%2520conservative%2520under%2520complex%2520video%2520dynamics%252C%2520yielding%2520an%2520over-smoothed%2520appearance%2520and%2520weak%2520motion.%2520Distribution%2520matching%2520distillation%2520%2528DMD%2529%2520can%2520recover%2520sharp%252C%2520mode-seeking%2520samples%252C%2520but%2520its%2520local%2520training%2520signals%2520do {"title": "FSUNav: A Cerebrum-Cerebellum Architecture for Fast, Safe, and Universal Zero-Shot Goal-Oriented Navigation", "author": "Mingao Tan and Yiyang Li and Shanze Wang and Xinming Zhang and Wei Zhang", "abstract": "Current vision-language navigation methods face substantial bottlenecks regarding heterogeneous robot compatibility, real-time performance, and navigation safety. Furthermore, they struggle to support open-vocabulary semantic generalization and multimodal task inputs. To address these challenges, this paper proposes FSUNav: a Cerebrum-Cerebellum architecture for fast, safe, and universal zero-shot goal-oriented navigation, which innovatively integrates vision-language models (VLMs) with the proposed architecture. The cerebellum module, a high-frequency end-to-end module, develops a universal local planner based on deep reinforcement learning, enabling unified navigation across heterogeneous platforms (e.g., humanoid, quadruped, wheeled robots) to improve navigation efficiency while significantly reducing collision risk. The cerebrum module constructs a three-layer reasoning model and leverages VLMs to build an end-to-end detection and verification mechanism, enabling zero-shot open-vocabulary goal navigation without predefined IDs and improving task success rates in both simulation and real-world environments. Additionally, the framework supports multimodal inputs (e.g., text, target descriptions, and images), further enhancing generalization, real-time performance, safety, and robustness. Experimental results on MP3D, HM3D, and OVON benchmarks demonstrate that FSUNav achieves state-of-the-art performance on object, instance image, and task navigation, significantly outperforming existing methods. Real-world deployments on diverse robotic platforms further validate its robustness and practical applicability.", "link": "http://arxiv.org/abs/2604.03139v1", "date": "2026-04-03", "relevancy": 2.4136, "topK": [{"title": "Egocentric Computer Vision for Hands-Free Robotic Wheelchair Navigation", "link": "https://link.springer.com/article/10.1007/s10846-023-01807-4", "similarity": 0.6419}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5767}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5741}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20FSUNav%3A%20A%20Cerebrum-Cerebellum%20Architecture%20for%20Fast%2C%20Safe%2C%20and%20Universal%20Zero-Shot%20Goal-Oriented%20Navigation&body=Title%3A%20FSUNav%3A%20A%20Cerebrum-Cerebellum%20Architecture%20for%20Fast%2C%20Safe%2C%20and%20Universal%20Zero-Shot%20Goal-Oriented%20Navigation%0AAuthor%3A%20Mingao%20Tan%20and%20Yiyang%20Li%20and%20Shanze%20Wang%20and%20Xinming%20Zhang%20and%20Wei%20Zhang%0AAbstract%3A%20Current%20vision-language%20navigation%20methods%20face%20substantial%20bottlenecks%20regarding%20heterogeneous%20robot%20compatibility%2C%20real-time%20performance%2C%20and%20navigation%20safety.%20Furthermore%2C%20they%20struggle%20to%20support%20open-vocabulary%20semantic%20generalization%20and%20multimodal%20task%20inputs.%20To%20address%20these%20challenges%2C%20this%20paper%20proposes%20FSUNav%3A%20a%20Cerebrum-Cerebellum%20architecture%20for%20fast%2C%20safe%2C%20and%20universal%20zero-shot%20goal-oriented%20navigation%2C%20which%20innovatively%20integrates%20vision-language%20models%20%28VLMs%29%20with%20the%20proposed%20architecture.%20The%20cerebellum%20module%2C%20a%20high-frequency%20end-to-end%20module%2C%20develops%20a%20universal%20local%20planner%20based%20on%20deep%20reinforcement%20learning%2C%20enabling%20unified%20navigation%20across%20heterogeneous%20platforms%20%28e.g.%2C%20humanoid%2C%20quadruped%2C%20wheeled%20robots%29%20to%20improve%20navigation%20efficiency%20while%20significantly%20reducing%20collision%20risk.%20The%20cerebrum%20module%20constructs%20a%20three-layer%20reasoning%20model%20and%20leverages%20VLMs%20to%20build%20an%20end-to-end%20detection%20and%20verification%20mechanism%2C%20enabling%20zero-shot%20open-vocabulary%20goal%20navigation%20without%20predefined%20IDs%20and%20improving%20task%20success%20rates%20in%20both%20simulation%20and%20real-world%20environments.%20Additionally%2C%20the%20framework%20supports%20multimodal%20inputs%20%28e.g.%2C%20text%2C%20target%20descriptions%2C%20and%20images%29%2C%20further%20enhancing%20generalization%2C%20real-time%20performance%2C%20safety%2C%20and%20robustness.%20Experimental%20results%20on%20MP3D%2C%20HM3D%2C%20and%20OVON%20benchmarks%20demonstrate%20that%20FSUNav%20achieves%20state-of-the-art%20performance%20on%20object%2C%20instance%20image%2C%20and%20task%20navigation%2C%20significantly%20outperforming%20existing%20methods.%20Real-world%20deployments%20on%20diverse%20robotic%20platforms%20further%20validate%20its%20robustness%20and%20practical%20applicability.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03139v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DFSUNav%253A%2520A%2520Cerebrum-Cerebellum%2520Architecture%2520for%2520Fast%252C%2520Safe%252C%2520and%2520Universal%2520Zero-Shot%2520Goal-Oriented%2520Navigation%26entry.906535625%3DMingao%2520Tan%2520and%2520Yiyang%2520Li%2520and%2520Shanze%2520Wang%2520and%2520Xinming%2520Zhang%2520and%2520Wei%2520Zhang%26entry.1292438233%3DCurrent%2520vision-language%2520navigation%2520methods%2520face%2520substantial%2520bottlenecks%2520regarding%2520heterogeneous%2520robot%2520compatibility%252C%2520real-time%2520performance%252C%2520and%2520navigation%2520safety.%2520Furthermore%252C%2520they%2520struggle%2520to%2520support%2520open-vocabulary%2520semantic%2520generalization%2520and%2520multimodal%2520task%2520inputs.%2520To%2520address%2520these%2520chall {"title": "A Data-Centric Vision Transformer Baseline for SAR Sea Ice Classification", "author": "David Mike-Ewewie and Panhapiseth Lim and Priyanka Kumar", "abstract": "Accurate and automated sea ice classification is important for climate monitoring and maritime safety in the Arctic. While Synthetic Aperture Radar (SAR) is the operational standard because of its all-weather capability, it remains challenging to distinguish morphologically similar ice classes under severe class imbalance. Rather than claiming a fully validated multimodal system, this paper establishes a trustworthy SAR only baseline that future fusion work can build upon. Using the AI4Arctic/ASIP Sea Ice Dataset (v2), which contains 461 Sentinel-1 scenes matched with expert ice charts, we combine full-resolution Sentinel-1 Extra Wide inputs, leakage-aware stratified patch splitting, SIGRID-3 stage-of-development labels, and training-set normalization to evaluate Vision Transformer baselines. We compare ViT-Base models trained with cross entropy and weighted cross-entropy against a ViT-Large model trained with focal loss. Among the tested configurations, ViT-Large with focal loss achieves 69.6% held-out accuracy, 68.8% weighted F1, and 83.9% precision on the minority Multi-Year Ice class. These results show that focal-loss training offers a more useful precision-recall trade-off than weighted cross-entropy for rare ice classes and establishes a cleaner baseline for future multimodal fusion with optical, thermal, or meteorological data.", "link": "http://arxiv.org/abs/2604.03094v1", "date": "2026-04-03", "relevancy": 2.4117, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4875}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4798}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4798}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20A%20Data-Centric%20Vision%20Transformer%20Baseline%20for%20SAR%20Sea%20Ice%20Classification&body=Title%3A%20A%20Data-Centric%20Vision%20Transformer%20Baseline%20for%20SAR%20Sea%20Ice%20Classification%0AAuthor%3A%20David%20Mike-Ewewie%20and%20Panhapiseth%20Lim%20and%20Priyanka%20Kumar%0AAbstract%3A%20Accurate%20and%20automated%20sea%20ice%20classification%20is%20important%20for%20climate%20monitoring%20and%20maritime%20safety%20in%20the%20Arctic.%20While%20Synthetic%20Aperture%20Radar%20%28SAR%29%20is%20the%20operational%20standard%20because%20of%20its%20all-weather%20capability%2C%20it%20remains%20challenging%20to%20distinguish%20morphologically%20similar%20ice%20classes%20under%20severe%20class%20imbalance.%20Rather%20than%20claiming%20a%20fully%20validated%20multimodal%20system%2C%20this%20paper%20establishes%20a%20trustworthy%20SAR%20only%20baseline%20that%20future%20fusion%20work%20can%20build%20upon.%20Using%20the%20AI4Arctic/ASIP%20Sea%20Ice%20Dataset%20%28v2%29%2C%20which%20contains%20461%20Sentinel-1%20scenes%20matched%20with%20expert%20ice%20charts%2C%20we%20combine%20full-resolution%20Sentinel-1%20Extra%20Wide%20inputs%2C%20leakage-aware%20stratified%20patch%20splitting%2C%20SIGRID-3%20stage-of-development%20labels%2C%20and%20training-set%20normalization%20to%20evaluate%20Vision%20Transformer%20baselines.%20We%20compare%20ViT-Base%20models%20trained%20with%20cross%20entropy%20and%20weighted%20cross-entropy%20against%20a%20ViT-Large%20model%20trained%20with%20focal%20loss.%20Among%20the%20tested%20configurations%2C%20ViT-Large%20with%20focal%20loss%20achieves%2069.6%25%20held-out%20accuracy%2C%2068.8%25%20weighted%20F1%2C%20and%2083.9%25%20precision%20on%20the%20minority%20Multi-Year%20Ice%20class.%20These%20results%20show%20that%20focal-loss%20training%20offers%20a%20more%20useful%20precision-recall%20trade-off%20than%20weighted%20cross-entropy%20for%20rare%20ice%20classes%20and%20establishes%20a%20cleaner%20baseline%20for%20future%20multimodal%20fusion%20with%20optical%2C%20thermal%2C%20or%20meteorological%20data.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03094v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DA%2520Data-Centric%2520Vision%2520Transformer%2520Baseline%2520for%2520SAR%2520Sea%2520Ice%2520Classification%26entry.906535625%3DDavid%2520Mike-Ewewie%2520and%2520Panhapiseth%2520Lim%2520and%2520Priyanka%2520Kumar%26entry.1292438233%3DAccurate%2520and%2520automated%2520sea%2520ice%2520classification%2520is%2520important%2520for%2520climate%2520monitoring%2520and%2520maritime%2520safety%2520in%2520the%2520Arctic.%2520While%2520Synthetic%2520Aperture%2520Radar%2520%2528SAR%2529%2520is%2520the%2520operational%2520standard%2520because%2520of%2520its%2520all-weather%2520capability%252C%2520it%2520remains%2520challenging%2520to%2520distinguish%2520morphologically%2520similar%2520ice%2520classes%2520under%2520severe%2520class%2520imbalance.%2520Rather%2520than%2520claiming%2520a%2520fully%2520validated%2520multimodal%2520system%252C%2520this%2520paper%2520establishes%2520a%2520trustworthy%2520SAR%2520only%2520baseline%2520that%2520future%2520fusion%2520work%2520can%2520build%2520upon.%2520Using%2520the%2520AI4Arctic/ASIP%2520Sea%2520Ice%2520Dataset%2520%2528v2%2529%252C%2520which%2520contains%2520461%2520Sentinel-1%2520scenes%2520matched%2520with%2520expert%2520ice%2520charts%252C%2520we%2520combine%2520full-resolution%2520Sentinel-1%2520Extra%2520Wide%2520inputs%252C%2520leakage-aware%2520stratified%2520patch%2520splitting%252C%2520SIGRID-3%2520stage-of-development%2520labels%252C%2520and%2520training-set%2520normalization%2520to%2520evaluate%2520Vision%2520Transformer%2520baselines.%2520We%2520compare%2520ViT-Base%2520models%2520trained%2520with%2520cross%2520entropy%2520and%2520weighted%2520cross-entropy%2520against%2520a%2520ViT-Large%2520model%2520trained%2520with%2520focal%2520loss.%2520Among%2520the%2520tested%2520configurations%252C%2520ViT-Large%2520with%2520focal%2520loss%2520achieves%252069.6%2525%2520held-out%2520accuracy%252C%252068.8%2525%2520weighted%2520F1%252C%2520and%252083.9%2525%2520precision%2520on%2520the%2520minority%2520Multi-Year%2520Ice%2520class.%2520These%2520results%2520show%2520that%2520focal-loss%2520training%2520offers%2520a%2520more%2520useful%2520precision-recall%2520trade-off%2520than%2520weighted%2520cross-entropy%2520for%2520rare%2520ice%2520classes%2520and%2520establishes%2520a%2520cleaner%2520baseline%2520for%2520future%2520multimodal%2520fusion%2520with%2520optical%252C%2520thermal%252C%2520or%2520meteorological%2520data.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.03094v1%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=A%20Data-Centric%20Vision%20Transformer%20Baseline%20for%20SAR%20Sea%20Ice%20Classification&entry.906535625=David%20Mike-Ewewie%20and%20Panhapiseth%20Lim%20and%20Priyanka%20Kumar&entry.1292438233=Accurate%20and%20automated%20sea%20ice%20classification%20is%20important%20for%20climate%20monitoring%20and%20maritime%20safety%20in%20the%20Arctic.%20While%20Synthetic%20Aperture%20Radar%20%28SAR%29%20is%20the%20operational%20standard%20because%20of%20its%20all-weather%20capability%2C%20it%20remains%20challenging%20to%20distinguish%20morphologically%20similar%20ice%20classes%20under%20severe%20class%20imbalance.%20Rather%20than%20claiming%20a%20fully%20validated%20multimodal%20system%2C%20this%20paper%20establishes%20a%20trustworthy%20SAR%20only%20baseline%20that%20future%20fusion%20work%20can%20build%20upon.%20Using%20the%20AI4Arctic/ASIP%20Sea%20Ice%20Dataset%20%28v2%29%2C%20which%20contains%20461%20Sentinel-1%20scenes%20matched%20with%20expert%20ice%20charts%2C%20we%2 {"title": "Learning Adaptive Pseudo-Label Selection for Semi-Supervised 3D Object Detection", "author": "Taehun Kong and Tae-Kyun Kim", "abstract": "Semi-supervised 3D object detection (SS3DOD) aims to reduce costly 3D annotations utilizing unlabeled data. Recent studies adopt pseudo-label-based teacher-student frameworks and demonstrate impressive performance. The main challenge of these frameworks is in selecting high-quality pseudo-labels from the teacher's predictions. Most previous methods, however, select pseudo-labels by comparing confidence scores over thresholds manually set. The latest works tackle the challenge either by dynamic thresholding or refining the quality of pseudo-labels. Such methods still overlook contextual information e.g. object distances, classes, and learning states, and inadequately assess the pseudo-label quality using partial information available from the networks. In this work, we propose a novel SS3DOD framework featuring a learnable pseudo-labeling module designed to automatically and adaptively select high-quality pseudo-labels. Our approach introduces two networks at the teacher output level. These networks reliably assess the quality of pseudo-labels by the score fusion and determine context-adaptive thresholds, which are supervised by the alignment of pseudo-labels over GT bounding boxes. Additionally, we introduce a soft supervision strategy that can learn robustly under pseudo-label noises. This helps the student network prioritize cleaner labels over noisy ones in semi-supervised learning. Extensive experiments on the KITTI and Waymo datasets demonstrate the effectiveness of our method. The proposed method selects high-precision pseudo-labels while maintaining a wider coverage of contexts and a higher recall rate, significantly improving relevant SS3DOD methods.", "link": "http://arxiv.org/abs/2509.23880v3", "date": "2026-04-03", "relevancy": 2.4075, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.6388}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.5992}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5897}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20Adaptive%20Pseudo-Label%20Selection%20for%20Semi-Supervised%203D%20Object%20Detection&body=Title%3A%20Learning%20Adaptive%20Pseudo-Label%20Selection%20for%20Semi-Supervised%203D%20Object%20Detection%0AAuthor%3A%20Taehun%20Kong%20and%20Tae-Kyun%20Kim%0AAbstract%3A%20Semi-supervised%203D%20object%20detection%20%28SS3DOD%29%20aims%20to%20reduce%20costly%203D%20annotations%20utilizing%20unlabeled%20data.%20Recent%20studies%20adopt%20pseudo-label-based%20teacher-student%20frameworks%20and%20demonstrate%20impressive%20performance.%20The%20main%20challenge%20of%20these%20frameworks%20is%20in%20selecting%20high-quality%20pseudo-labels%20from%20the%20teacher%27s%20predictions.%20Most%20previous%20methods%2C%20however%2C%20select%20pseudo-labels%20by%20comparing%20confidence%20scores%20over%20thresholds%20manually%20set.%20The%20latest%20works%20tackle%20the%20challenge%20either%20by%20dynamic%20thresholding%20or%20refining%20the%20quality%20of%20pseudo-labels.%20Such%20methods%20still%20overlook%20contextual%20information%20e.g.%20object%20distances%2C%20classes%2C%20and%20learning%20states%2C%20and%20inadequately%20assess%20the%20pseudo-label%20quality%20using%20partial%20information%20available%20from%20the%20networks.%20In%20this%20work%2C%20we%20propose%20a%20novel%20SS3DOD%20framework%20featuring%20a%20learnable%20pseudo-labeling%20module%20designed%20to%20automatically%20and%20adaptively%20select%20high-quality%20pseudo-labels.%20Our%2 09.23880v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Learning%20Adaptive%20Pseudo-Label%20Selection%20for%20Semi-Supervised%203D%20Object%20Detection&entry.906535625=Taehun%20Kong%20and%20Tae-Kyun%20Kim&entry.1292438233=Semi-supervised%203D%20object%20detection%20%28SS3DOD%29%20aims%20to%20reduce%20costly%203D%20annotations%20utilizing%20unlabeled%20data.%20Recent%20studies%20adopt%20pseudo-label-based%20teacher-student%20frameworks%20and%20demonstrate%20impressive%20performance.%20The%20main%20challenge%20of%20these%20frameworks%20is%20in%20selecting%20high-quality%20pseudo-labels%20from%20the%20teacher%27s%20predictions.%20Most%20previous%20methods%2C%20however%2C%20select%20pseudo-labels%20by%20comparing%20confidence%20scores%20over%20thresholds%20manually%20set.%20The%20latest%20works%20tackle%20the%20challenge%20either%20by%20dynamic%20thresholding%20or%20refining%20the%20quality%20of%20pseudo-labels.%20Such%20methods%20still%20overlook%20contextual%20information%20e.g.%20object%20distances%2C%20classes%2C%20and%20learning%20states%2C%20and%20inadequately%20assess%20the%20pseudo-label%20quality%20using%20partial%20information%20available%20from%20the%20networks.%20In%20this%20work%2C%20we%20propose%20a%20novel%20SS3DOD%20framework%20featuring%20a%20learnable%20pseudo-labeling%20module%20designed%20to%20automatically%20and%20adaptively%20select%20high-quality%20pseudo-labels.%20Our%20approach%20introduces%20two%20networks%20at%20the%20teacher%20output%20level.%20These%20networks%20reliably%20assess%20the%20quality%20of%20pseudo-labels%20by%20the%20score%20fusion%20and%20determine%20context-adaptive%20thresholds%2C%20which%20are%20supervised%20by%20the%20alignment%20of%20pseudo-labels%20over%20GT%20bounding%20boxes.%20Additionally%2C%20we%20introduce%20a%20soft%20supervision%20strategy%20that%20can%20learn%20robustly%20under%20pseudo-label%20noises.%20Th {"title": "The Compression Gap: Why Discrete Tokenization Limits Vision-Language-Action Model Scaling", "author": "Takuya Shiba", "abstract": "Scaling Vision-Language-Action (VLA) models by upgrading the vision encoder is expected to improve downstream manipulation performance--as it does in vision-language modeling. We show that this expectation fails when actions are represented as discrete tokens, and explain why through an information-theoretic principle we call the Compression Gap: in any visuomotor pipeline, scaling behavior is governed by the location of the tightest information bottleneck. When actions are continuous (e.g., Diffusion Policy), the vision encoder is the binding constraint, and upgrading it directly improves performance. When actions are discretized through a fixed-capacity codebook (e.g., OAT), the codebook becomes the binding constraint, and encoder improvements cannot propagate past it--regardless of how rich the upstream representation is. We validate this principle on the LIBERO benchmark with three lines of evidence: a factorial experiment showing that encoder upgrades improve Diffusion Policy by over 21 percentage points while OAT gains are substantially attenuated across model scales; an encoder quality gradient across four encoders confirming that Diffusion Policy tracks encoder quality monotonically while OAT remains flat; and a codebook size experiment demonstrating that relaxing codebook capacity partially recovers encoder sensitivity, providing causal evidence for the bottleneck hypothesis. Our findings reveal that scaling in Physical AI requires identifying where information bottlenecks lie in the pipeline, rather than uniformly increasing model or data size.", "link": "http://arxiv.org/abs/2604.03191v1", "date": "2026-04-03", "relevancy": 2.3825, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6041}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.6041}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.5533}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20The%20Compression%20Gap%3A%20Why%20Discrete%20Tokenization%20Limits%20Vision-Language-Action%20Model%20Scaling&body=Title%3A%20The%20Compression%20Gap%3A%20Why%20Discrete%20Tokenization%20Limits%20Vision-Language-Action%20Model%20Scaling%0AAuthor%3A%20Takuya%20Shiba%0AAbstract%3A%20Scaling%20Vision-Language-Action%20%28VLA%29%20models%20by%20upgrading%20the%20vision%20encoder%20is%20expected%20to%20improve%20downstream%20manipulation%20performance--as%20it%20does%20in%20vision-language%20modeling.%20We%20show%20that%20this%20expectation%20fails%20when%20actions%20are%20represented%20as%20discrete%20tokens%2C%20and%20explain%20why%20through%20an%20information-theoretic%20principle%20we%20call%20the%20Compression%20Gap%3A%20in%20any%20visuomotor%20pipeline%2C%20scaling%20behavior%20is%20governed%20by%20the%20location%20of%20the%20tightest%20information%20bottleneck.%20When%20actions%20are%20continuous%20%28e.g.%2C%20Diffusion%20Policy%29%2C%20the%20vision%20encoder%20is%20the%20binding%20constraint%2C%20and%20upgrading%20it%20directly%20improves%20performance.%20When%20actions%20are%20discretized%20through%20a%20fixed-capacity%20codebook%20%28e.g.%2C%20OAT%29%2C%20the%20codebook%20becomes%20the%20binding%20constraint%2C%20and%20encoder%20improvements%20cannot%20propagate%20past%20it--regardless%20of%20how%20rich%20the%20upstream%20representation%20is.%20We%20validate%20this%20principle%20on%20the%20LIBERO%20benchmark%20with%20three%20lines%20of%20evidence%3A%20a%20factorial%20experiment%20showing%20that%20encoder%20upgrades%20improve%20Diffusion%20Policy%20by%20over%2021%20percentage%20points%20while%20OAT%20gains%20are%20substantially%20attenuated%20across%20model%20scales%3B%20an%20encoder%20quality%20gradient%20across%20four%20encoders%20confirming%20that%20Diffusion%20Policy%20tracks%20encoder%20quality%20monotonically%20while%20OAT%20remains%20flat%3B%20and%20a%20codebook%20size%20experiment%20demonstrating%20that%20relaxing%20codebook%20capacity%20partially%20recovers%20encoder%20sensitivity%2C%20providing%20causal%20evidence%20for%20the%20bottleneck%20hypothesis.%20Our%20findings%20reveal%20that%20scaling%20in%20Physical%20AI%20requires%20identifying%20where%20information%20bottlenecks%20lie%20in%20the%20pipeline%2C%20rather%20than%20uniformly%20increasing%20model%20or%20data%20size.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03191v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DThe%2520Compression%2520Gap%253A%2520Why%2520Discrete%2520Tokenization%2520Limits%2520Vision-Language-Action%2520Model%2520Scaling%26entry.906535625%3DTakuya%2520Shiba%26entry.1292438233%3DScaling%2520Vision-Language-Action%2520%2528VLA%2529%2520models%2520by%2520upgrading%2520the%2520vision%2520encoder%2520is%2520expected%2520to%2520improve%2520downstream%2520manipulation%2520performance--as%2520it%2520does%2520in%2520vision-language%2520modeling.%2520We%2520show%2520that%2520this%2520expectation%2520fails%2520when%2520actions%2520are%2520represented%2520as%2520discrete%2520tokens%252C%2520and%2520explain%2520why%2520through%2520an%2520information-theoretic%2520principle%2520we%2520call%2520the%2520Compression%2520Gap%253A%2520in%2520any%2520visuomotor%2520pipeline%252C%2520scaling%2520behavior%2520is%2520governed%2520by%2520the%2520location%2520of%2520the%2520tightest%2520information%2520bottleneck.%2520When%2520actions%2520are%2520continuous%2520%2528e.g.%252C%2520Diffusion%2520Policy%2529%252C%2520the%2520vision%2520encoder%2520is%2520the%2520binding%2520constraint%252C%2520and%2520upgrading%252 {"title": "An Open-Source LiDAR and Monocular Off-Road Autonomous Navigation Stack", "author": "R\u00e9mi Marsal and Quentin Picard and Adrien Poir\u00e9 and S\u00e9bastien Kerbourc'h and Thibault Toralba and Cl\u00e9ment Yver and Alexandre Chapoutot and David Filliat", "abstract": "Off-road autonomous navigation demands reliable 3D perception for robust obstacle detection in challenging unstructured terrain. While LiDAR is accurate, it is costly and power-intensive. Monocular depth estimation using foundation models offers a lightweight alternative, but its integration into outdoor navigation stacks remains underexplored. We present an open-source off-road navigation stack supporting both LiDAR and monocular 3D perception without task-specific training. For the monocular setup, we combine zero-shot depth prediction (Depth Anything V2) with metric depth rescaling using sparse SLAM measurements (VINS-Mono). Two key enhancements improve robustness: edge-masking to reduce obstacle hallucination and temporal smoothing to mitigate the impact of SLAM instability. The resulting point cloud is used to generate a robot-centric 2.5D elevation map for costmap-based planning. Evaluated in photorealistic simulations (Isaac Sim) and real-world unstructured environments, the monocular configuration matches high-resolution LiDAR performance in most scenarios, demonstrating that foundation-model-based monocular depth estimation is a viable LiDAR alternative for robust off-road navigation. By open-sourcing the navigation stack and the simulation environment, we provide a complete pipeline for off-road navigation as well as a reproducible benchmark. Code available at https://github.com/LARIAD/Offroad-Nav.", "link": "http://arxiv.org/abs/2604.03096v1", "date": "2026-04-03", "relevancy": 2.3389, "topK": [{"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.6072}, {"title": "Egocen {"title": "ResidualPlanner+: a scalable matrix mechanism for marginals and beyond", "author": "Yingtai Xiao and Guanlin He and Levent Toksoz and Zeyu Ding and Danfeng Zhang and Daniel Kifer", "abstract": "Noisy marginals are a common form of confidentiality protecting data release and are useful for many downstream tasks such as contingency table analysis, construction of Bayesian networks, and even synthetic data generation. Privacy mechanisms that provide unbiased noisy answers to linear queries (such as marginals) are known as matrix mechanisms.\n  We propose ResidualPlanner and ResidualPlanner+, two highly scalable matrix mechanisms. ResidualPlanner is both optimal and scalable for answering marginal queries with Gaussian noise, while ResidualPlanner+ provides support for more general workloads, such as combinations of marginals and range queries or prefix-sum queries. ResidualPlanner can optimize for many loss functions that can be written as a convex function of marginal variances (prior work was restricted to just one predefined objective function). ResidualPlanner can optimize the accuracy of marginals in large scale settings in seconds, even when the previous state of the art (HDMM) runs out of memory. It even runs on datasets with 100 attributes in a couple of minutes. Furthermore, ResidualPlanner can efficiently compute variance/covariance values for each marginal (prior methods quickly run out of memory, even for relatively small datasets).\n  ResidualPlanner+ provides support for more complex workloads that combine marginal and range/prefix-sum queries (e.g., a marginal on race, a range query on age, and a combined race/age tabulation that answers age range queries for each race). It even supports custom user-defined workloads on different attributes. With this added flexibility, ResidualPlanner+ is not necessarily optimal, however it is still extremely scalable and outperforms the prior state-of-the-art (HDMM) on prefix-sum queries both in terms of accuracy and speed.", "link": "http://arxiv.org/abs/2305.08175v4", "date": "2026-04-03", "relevancy": 2.3366, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.475}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4639}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.4631}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20ResidualPlanner%2B%3A%20a%20scalable%20matrix%20mechanism%20for%20marginals%20and%20beyond&body=Title%3A%20ResidualPlanner%2B%3A%20a%20scalable%20matrix%20mechanism%20for%20marginals%20and%20beyond%0AAuthor%3A%20Yingtai%20Xiao%20and%20Guanlin%20He%20and%20Levent%20Toksoz%20and%20Zeyu%20Ding%20and%20Danfeng%20Zhang%20and%20Daniel%20Kifer%0AAbstract%3A%20Noisy%20marginals%20are%20a%20common%20form%20of%20confidentiality%20protecting%20data%20release%20and%20are%20useful%20for%20many%20downstream%20tasks%20such%20as%20contingency%20table%20analysis%2C%20construction%20of%20Bayesian%20networks%2C%20and%20even%20synthetic%20data%20generation.%20Privacy%20mechanisms%20that%20provide%20unbiased%20noisy%20answers%20to%20linear%20queries%20%28such%20as%20marginals%29%20are%20known%20as%20matrix%20mechanisms.%0A%20%20We%20propose%20ResidualPlanner%20and%20ResidualPlanner%2B%2C%20two%20highly%20scalable%20matrix%20mechanisms.%20ResidualPlanner%20is%20both%20optimal%20and%20scalable%20for%20answering%20marginal%20queries%20with%20Gaussian%20noise%2C%20while%20ResidualPlanner%2B%20provides%20support%20for%20more%20general%20workloads%2C%20such%20as%20combinations%20of%20marginals%20and%20range%20queries%20or%20prefix-sum%20queries.%20ResidualPlanner%20can%20optimize%20for%20many%20loss%20functions%20that%20can%20be%20written%20as%20a%20convex%20function%20of%20marginal%20variances%20%28prior%20work%20was%20restricted%20to%20just%20one%20predefined%20objective%20function%29.%20ResidualPlanner%20can%20optimize%20the%20accuracy%20of%20marginals%20in%20large%20scale%20settings%20in%20seconds%2C%20even%20when%20the%20previous%20state%20of%20the%20art%20%28HDMM%29%20runs%20out%20of%20memory.%20It%20even%20runs%20on%20datasets%20with%20100%20attributes%20in%20a%20couple%20of%20minutes.%20Furthermore%2C%20ResidualPlanner%20can%20efficiently%20compute%20variance/covariance%20values%20for%20each%20marginal%20%28prior%20methods%20quickly%20run%20out%20of%20memory%2C%20even%20for%20relatively%20small%20datasets%29.%0A%20%20ResidualPlanner%2B%20provides%20support%20for%20more%20complex%20workloads%20that%20combine%20marginal%20and%20range/prefix-sum%20queries%20%28e.g.%2C%20a%20marginal%20on%20race%2C%20a%20range%20query%20on%20age%2C%20and%20a%20combined%20race/age%20tabulation%20that%20answers%20age%20range%20queries%20for%20each%20race%29.%20It%20even%20supports%20custom%20user-defined%20workloads%20on%20different%20attributes.%20With%20this%20added%20flexibility%2C%20ResidualPlanner%2B%20is%20not%20necessarily%20optimal%2C%20however%20it%20is%20still%20extremely%20scalable%20and%20outperforms%20the%20prior%20state-of-the-art%20%28HDMM%29%20on%20prefix-sum%20queries%20both%20in%20terms%20of%20accuracy%20and%20speed.%0ALink%3A%20http%3A//arxiv.org/abs/2305.08175v4%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DResidualPlanner%252B%253A%2520a%2520scalable%2520matrix%2520mechanism%2520for%2520marginals%2520and%2520beyond%26entry.906535625%3DYingtai%2520Xiao%2520and%2520Guanlin%2520He%2520and%2520Levent%2520Toksoz%2520and%2520Zeyu%2520Ding%2520and%2520Danfeng%2520Zhang%2520and%2520Daniel%2520Kifer%26entry.1292438233%3DNoisy%2520marginals%2520are%2520a%2520common%2520form%2520of%2520confidentiality%2520protecting%2520data%2520release%2520and%2520are 520for%2520more%2520complex%2520workloads%2520that%2520combine%2520marginal%2520and%2520range/prefix-sum%2520queries%2520%2528e.g.%252C%2520a%2520marginal%2520on%2520race%252C%2520a%2520range%2520query%2520on%2520age%252C%2520and%2520a%2520combined%2520race/age%2520tabulation%2520that%2520answers%2520age%2520range%2520queries%2520for%2520each%2520race%2529.%2520It%2520even%2520supports%2520custom%2520user-defined%2520workloads%2520on%2520different%2520attributes.%2520With%2520this%2520added%2520flexibility%252C%2520ResidualPlanner%252B%2520is%2520not%2520necessarily%2520optimal%252C%2520however%2520it%2520is%2520still%2520extremely%2520scalable%2520and%2520outperforms%2520the%2520prior%2520state-of-the-art%2520%2528HDMM%2529%2520on%2520prefix-sum%2520queries%2520both%2520in%2520terms%2520of%2520accuracy%2520and%2520speed.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2305.08175v4%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=ResidualPlanner%2B%3A%20a%20scalable%20matrix%20mechanism%20for%20marginals%20and%20beyond&entry.906535625=Yingtai%20Xiao%20and%20Guanlin%20He%20and%20Levent%20Toksoz%20and%20Zeyu%20Ding%20and%20Danfeng%20Zhang%20and%20Daniel%20Kifer&entry.1292438233=Noisy%20marginals%20are%20a%20common%20form%20of%20confidentiality%20protecting%20data%20release%20and%20are%20useful%20for%20many%20downstream%20tasks%20such%20as%20contingency%20table%20analysis%2C%20construction%20of%20Bayesian%20networks%2C%20and%20even%20synthetic%20data%20generation.%20Privacy%20mechanisms%20that%20provide%20unbiased%20noisy%20answers%20to%20linear%20queries%20%28such%20as%20marginals%29%20are%20known%20as%20matrix%20mechanisms.%0A%20%20We%20propose%20ResidualPlanner%20and%20ResidualPlanner%2B%2C%20two%20highly%20scalable%20matrix%20mechanisms.%20ResidualPlanner%20is%20both%20optimal%20and%20scalable%20for%20answering%20marginal%20queries%20with%20Gaussian%20noise%2C%20wh {"title": "Semantic Richness or Geometric Reasoning? The Fragility of VLM's Visual Invariance", "author": "Jason Qiu and Zachary Meurer and Xavier Thomas and Deepti Ghadiyaram", "abstract": "This work investigates the fundamental fragility of state-of-the-art Vision-Language Models (VLMs) under basic geometric transformations. While modern VLMs excel at semantic tasks such as recognizing objects in canonical orientations and describing complex scenes, they exhibit systematic failures at a more fundamental level: lack of robust spatial invariance and equivariance required to reliably determine object identity under simple rotations, scaling, and identity transformations. We demonstrate this limitation through a systematic evaluation across diverse visual domains, including symbolic sketches, natural photographs, and abstract art. Performance drops sharply as semantic content becomes sparse, and this behavior is observed across architectures, model capacities, and prompting strategies. Overall, our results reveal a systematic gap between semantic understanding and spatial reasoning in current VLMs, highlighting the need for stronger geometric grounding in future multimodal systems.", "link": "http://arxiv.org/abs/2604.01848v2", "date": "2026-04-03", "relevancy": 2.3201, "topK": [{"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5884}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.5884}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5383}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Semantic%20Richness%20or%20Geometric%20Reasoning%3F%20The%20Fragility%20of%20VLM%27s%20Visual%20Invariance&body=Title%3A%20Semantic%20Richness%20or%20Geometric%20Reasoning%3F%20The%20Fragility%20of%20VLM%27s%20Visual%20Invariance%0AAuthor%3A%20Jason%20Qiu%20and%20Zachary%20Meurer%20and%20Xavier%20Thomas%20and%20Deepti%20Ghadiyaram%0AAbstract%3A%20This%20work%20investigates%20the%20fundamental%20fragility%20of%20state-of-the-art%20Vision-Language%20Models%20%28VLMs%29%20under%20basic%20geometric%20transformations.%20While%20modern%20VLMs%20excel%20at%20semantic%20tasks%20such%20as%20recognizing%20objects%20in%20canonical%20orientations%20and%20describing%20complex%20scenes%2C%20they%20exhibit%20systematic%20failures%20at%20a%20more%20fundamental%20level%3A%20lack%20of%20robust%20spatial%20invariance%20and%20equivariance%20required%20to%20reliably%20determine%20object%20identity%20under%20simple%20rotations%2C%20scaling%2C%20and%20identity%20transformations.%20We%20demonstrate%20this%20limitation%20through%20a%20systematic%20evaluation%20across%20diverse%20visual%20domains%2C%20including%20symbolic%20sketches%2C%20natural%20photographs%2C%20and%20abstract%20art.%20Performance%20drops%20sharply%20as%20semantic%20content%20becomes%20sparse%2C%20and%20this%20behavior%20is%20observed%20across%20architectures%2C%20model%20capacities%2C%20and%20prompting%20strategies.%20Overall%2C%20our%20results%20reveal%20a%20systematic%20gap%20between%20semantic%20understanding%20and%20spatial%20reasoning%20in%20current%20VLMs%2C%20highlighting%20the%20need%20for%20stronger%20geometric%20grounding%20in%20future%20multimodal%20systems.%0ALink%3A%20http%3A//arxiv.org/abs/2604.01848v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSemantic%2520Richness%2520or%2520Geometric%2520Reasoning%253F%2520The%2520Fragility%2520of%2520VLM%2527s%2520Visual%2520Invariance%26entry.906535625%3DJason%2520Qiu%2520and%2520Zachary%2520Meurer%2520and%2520Xavier%2520Thomas%2520and%2520Deepti%2520Ghadiyaram%26entry.1292438233%3DThis%2520work%2520investigates%2520the%2520fundamental%2520fragility%2520of%2520state-of-the-art%2520Vision-Language%2520Models%2520%2528VLMs%2529%2520under%2520basic%2520geometric%2520transformations.%2520While%2520modern%2520VLMs%2520excel%2520at%2520semantic%2520tasks%2520such%2520as%2520recognizing%2520objects%2520in%2520canonical%2520orientations%2520and%2520describing%2520complex%2520scenes%252C%2520they%2520exhibit%2520systematic%2520failures%2520at%2520a%2520more%2520fundamental%2520level%253A%2520lack%2520of%2520robust%2520spatial%2520invariance%2520and%2520equivariance%2520required%2520to%2520reliably%2520determine%2520object%2520identity%2520under%2520simple%2520rotations%252C%2520scaling%252C%2520and%2520identity%2520transformations.%2520We%2520demonstrate%2520this%2520limitation%2520through%2520a%2520systematic%2520evaluation%2520across%2520diverse%2520visual%2520domains%252C%2520including%2520symbolic%2520sketches%252C%2520natural%2520photographs%252C%2520and%2520abstract%2520art.%2520Performance%2520drops%2520sharply%2520as%2520semantic%2520content%2520becomes%2520sparse%252C%2520and%2520this%2520behavior%2520is%2520observed%2520across%2520architectures%252C%2520model%2520capacities%252C%2520and%2520prompting%2520strategies.%2520Overall%252C%2520our%2520results%2520reveal%2520a%2520systematic%2520gap%2520between%2520semantic%2520understanding%2520and%2520spatial%2520reasoning%2520in%2520current%2520VLMs%252C%2520highlighting%2520the%2520need%2520for%2520stronger%2520geometric%2520grounding%2520in%2520future%2520multimodal%2520systems.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2604.01848v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Semantic%20Richness%20or%20Geometric%20Reasoning%3F%20The%20Fragility%20of%20VLM%27s%20Visual%20Invariance&entry.906535625=Jason%20Qiu%20and%20Zachary%20Meurer%20and%20Xavier%20Thomas%20and%20Deepti%20Ghadiyaram&entry.1292438233=This%20work%20investigates%20the%20fundamental%20fragility%20of%20state-of-the-art%20Vision-Language%20Models%20%28VLMs%29%20under%20basic%20geometric%20transformations.%20While%20modern%20VLMs%20excel%20at%20semantic%20tasks%20such%20as%20recognizing%20objects%20in%20canonical%20orientations%20and%20describing%20complex%20scenes%2C%20they%20exhibit%20systematic%20failures%20at%20a%20more%20fundamental%20level%3A%20lack%20of%20robust%20spatial%20invariance%20and%20equivariance%20required%20to%20reliably%20determine%20object%20identity%20under%20simple%20rotations%2C%20scaling%2C%20and%20identity%20transformations.%20We%20demonstrate%20this%20limitation%20through%20a%20systematic%20evaluation%20across%20diverse%20visual%20domains%2C%20including%20symbolic%20sketches%2C%20natural%20photographs%2C%20and%20abstract%20art.%20Performance%20drops%20sharply%20as%20semantic%20content%20becomes%20sparse%2C%20and%20this%20behavior%20is%20observed%20across%20architectures%2C%20model%20capacities%2C%20and%20prompting%20strategies.%20Overall%2C%20our%20results%20reveal%20a%20systematic%20gap%20between%20semantic%20understanding%20and%20spatial%20reasoning%20in%20current%20VLMs%2C%20highlighting%20the%20need%20for%20stronger%20geometric%20grounding%20in%20future%20multimodal%20systems.&entry.1838667208=http%3A//arxiv.org/abs/2604.01848v2&entry.124074799=Read"},
{"title": "Exploring Motion-Language Alignment for Text-driven Motion Generation", "author": "Ruxi Gu and Zilei Wang and Wei Wang", "abstract": "Text-driven human motion generation aims to synthesize realistic motion sequences that follow textual descriptions. Despite recent advances, accurately aligning motion dynamics with textual semantics remains a fundamental challenge. In this paper, we revisit text-to-motion generation from the perspective of motion-language alignment and propose MLA-Gen, a framework that integrates global motion priors with fine-grained local conditioning. This design enables the model to capture common motion patterns, while establishing detailed alignment between texts and motions. Furthermore, we identify a previously overlooked attention sink phenomenon in human motion generation, where attention disproportionately concentrates on the start text token, limiting the utilization of informative textual cues and leading to degraded semantic grounding. To analyze this issue, we introduce SinkRatio, a metric for measuring attention concentration, and develop alignment-aware masking and control strategies to regulate attention during generation. Extensive experiments demonstrate that our approach consistently improves both motion quality and motion-language alignment over strong baselines. Code will be released upon acceptance.", "link": "http://arxiv.org/abs/2604.02973v1", "date": "2026-04-03", "relevancy": 2.3012, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6026}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.5946}, {"title": "GeneVA: A Dataset of Human Annotations for Generative Text to Video\n  Artifacts", "link": "http://arxiv.org/abs/2509.08818v1", "similarity": 0.5403}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Exploring%20Motion-Language%20Alignment%20for%20Text-driven%20Motion%20Generation&body=Title%3A%20Exploring%20Motion-Language%20Alignment%20for%20Text-driven%20Motion%20Generation%0AAuthor%3A%20Ruxi%20Gu%20and%20Zilei%20Wang%20and%20Wei%20Wang%0AAbstract%3A%20Text-driven%20human%20motion%20generation%20aims%20to%20synthesize%20realistic%20motion%20sequences%20that%20follow%20textual%20descriptions.%20Despite%20recent%20advances%2C%20accurately%20aligning%20motion%20dynamics%20with%20textual%20semantics%20remains%20a%20fundamental%20challenge.%20In%20this%20paper%2C%20we%20revisit%20text-to-motion%20generation%20from%20the%20perspective%20of%20motion-language%20alignment%20and%20propose%20MLA-Gen%2C%20a%20framework%20that%20integrates%20global%20motion%20priors%20with%20fine-grained%20local%20conditioning.%20This%20design%20enables%20the%20model%20to%20capture%20common%20motion%20patterns%2C%20while%20establishing%20detailed%20alignment%20between%20texts%20and%20motions.%20Furthermore%2C%20we%20identify%20a%20previously%20overlooked%20attention%20sink%20phenomenon%20in%20human%20motion%20generation%2C%20where%20attention%20disproportionately%20concentrates%20on%20the%20start%20text%20token%2C%20limiting%20the%20utilization%20of%20informative%20textual%20cues%20and%20leading%20to%20degraded%20semantic%20grounding.%20To%20analyze%20this%20issue%2C%20we%20introduce%20SinkRatio%2C%20a%20metric%20for%20measuring%20attention%20concentration%2C%20and%20develop%20alignment-aware%20masking%20and%20control%20strategies%20to%20regulate%20attention%20during%20generation.%20Extensive%20experiments%20demonstrate%20that%20our%20approach%20consistently%20improves%20both%20motion%20quality%20and%20motion-language%20alignment%20over%20strong%20baselines.%20Code%20will%20be%20released%20upon%20acceptance.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02973v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DExplori

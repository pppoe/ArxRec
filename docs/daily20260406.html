20flexibly%20adapts%20to%20a%20broad%20range%20of%20baseline%20corrections%20and%20water%20suppression%20factors.%20Metabolite%20maps%20of%20human%20subjects%20acquired%20at%203T%20and%207T%20with%20isotropic%20resolutions%20of%2010%20mm%2C%203.4%20mm%20and%202%20mm%20by%20water-suppressed%20and%20water-unsuppressed%20MRSI%20were%20quantified%20with%20HyperFitS%20and%20compared%20to%20conventional%20LCModel%20fitting.%20Results%3A%20Metabolic%20maps%20show%20a%20substantial%20agreement%20between%20the%20new%20and%20gold-standard%20methods%2C%20with%20significantly%20faster%20fitting%20times%20by%20HyperFitS.%20Quantitative%20results%20further%20highlight%20the%20impact%20of%20baseline%20parametrization%20on%20metabolic%20quantification%2C%20which%20can%20alter%20results%20by%20up%20to%2030%25.%20Conclusion%3A%20HyperFitS%20shows%20strong%20agreement%20with%20state-of-the-art%20conventional%20methods%2C%20while%20reducing%20processing%20times%20from%20hours%20to%20a%20few%20seconds.%20Compared%20to%20prior%20deep%20learning%20based%20spectral%20fitting%20methods%2C%20HyperFitS%20enables%20a%20wide%20range%20of%20configurability%20and%20can%20adapt%20to%20data%20quality%20acquired%20with%20multiple%20protocols%20and%20field%20strengths%20without%20retraining.&entry.1838667208=http%3A//arxiv.org/abs/2604.03150v1&entry.124074799=Read"},
{"title": "Inversion-Free Natural Gradient Descent on Riemannian Manifolds", "author": "Dario Draca and Takuo Matsubara and Minh-Ngoc Tran", "abstract": "The natural gradient method is widely used in statistical optimization, but its standard formulation assumes a Euclidean parameter space. This paper proposes an inversion-free stochastic natural gradient method for probability distributions whose parameters lie on a Riemannian manifold. The manifold setting offers several advantages: one can implicitly enforce parameter constraints such as positive definiteness and orthogonality, ensure parameters are identifiable, or guarantee regularity properties of the objective like geodesic convexity. Building on an intrinsic formulation of the Fisher information matrix (FIM) on a manifold, our method maintains an online approximation of the inverse FIM, which is efficiently updated at quadratic cost using score vectors sampled at successive iterates. In the Riemannian setting, these score vectors belong to different tangent spaces and must be combined using transport operations. We prove almost-sure convergence rates of $O(\\log{s}/s^\u03b1)$ for the squared distance to the minimizer when the step size exponent $\u03b1>2/3$. We also establish almost-sure rates for the approximate FIM, which now accumulates transport-based errors. A limited-memory variant of the algorithm with sub-quadratic storage complexity is proposed. Finally, we demonstrate the effectiveness of our method relative to its Euclidean counterparts on variational Bayes with Gaussian approximations and normalizing flows.", "link": "http://arxiv.org/abs/2604.02969v1", "date": "2026-04-03", "relevancy": 1.8438, "topK": [{"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.4675}, {"title": "MiraGe: Editable 2D Images using Gaussian Splatting", "link": "http://arxiv.org/abs/2410.01521v1", "similarity": 0.4583}, {"t te%20FIM%2C%20which%20now%20accumulates%20transport-based%20errors.%20A%20limited-memory%20variant%20of%20the%20algorithm%20with%20sub-quadratic%20storage%20complexity%20is%20proposed.%20Finally%2C%20we%20demonstrate%20the%20effectiveness%20of%20our%20method%20relative%20to%20its%20Euclidean%20counterparts%20on%20variational%20Bayes%20with%20Gaussian%20approximations%20and%20normalizing%20flows.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02969v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInversion-Free%2520Natural%2520Gradient%2520Descent%2520on%2520Riemannian%2520Manifolds%26entry.906535625%3DDario%2520Draca%2520and%2520Takuo%2520Matsubara%2520and%2520Minh-Ngoc%2520Tran%26entry.1292438233%3DThe%2520natural%2520gradient%2520method%2520is%2520widely%2520used%2520in%2520statistical%2520optimization%252C%2520but%2520its%2520standard%2520formulation%2520assumes%2520a%2520Euclidean%2520parameter%2520space.%2520This%2520paper%2520proposes%2520an%2520inversion-free%2520stochastic%2520natural%2520gradient%2520method%2520for%2520probability%2520distributions%2520whose%2520parameters%2520lie%2520on%2520a%2520Riemannian%2520manifold.%2520The%2520manifold%2520setting%2520offers%2520several%2520advantages%253A%2520one%2520can%2520implicitly%2520enforce%2520parameter%2520constraints%2520such%2520as%2520positive%2520definiteness%2520and%2520orthogonality%252C%2520ensure%2520parameters%2520are%2520identifiable%252C%2520or%2520guarantee%2520regularity%2520properties%2520of%2520the%2520objective%2520like%2520geodesic%2520convexity.%2520Building%2520on%2520an%2520intrinsic%2520formulation%2520of%2520the%2520Fisher%2520information%2520matrix%2520%2528FIM%2529%2520on%2520a%2520manifold%252C%2520our%2520method%2520maintains%2520an%2520online%2520approximation%2520of%2520the%2520inverse%2520FIM%252C%2520which%2520is%2520efficiently%2520updated%2520at%2520quadratic%2520cost%2520using%2520score%2520vect {"title": "Investigating Test Overfitting on SWE-bench", "author": "Toufique Ahmed and Jatin Ganhotra and Avraham Shinnar and Martin Hirzel", "abstract": "Tests can be useful towards resolving issues on code repositories. However, relying too much on tests for issue resolution can lead to code that technically passes observed tests but actually misses important cases or even breaks functionality. This problem, called test overfitting, is exacerbated by the fact that issues usually lack readily executable tests. Instead, several issue resolution systems use tests auto-generated from issues, which may be imperfect. Some systems even iteratively refine code and tests jointly. This paper presents the first empirical study of test overfitting in this setting.", "link": "http://arxiv.org/abs/2511.16858v3", "date": "2026-04-03", "relevancy": 1.8359, "topK": [{"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.3802}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.361}, {"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.3603}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Investigating%20Test%20Overfitting%20on%20SWE-bench&body=Title%3A%20Investigating%20Test%20Overfitting%20on%20SWE-bench%0AAuthor%3A%20Toufique%20Ahmed%20and%20Jatin%20Ganhotra%20and%20Avraham%20Shinnar%20and%20Martin%20Hirzel%0AAbstract%3A%20Tests%20can%20be%20useful%20towards%20resolving%20issues%20on%20code%20repositories.%20However%2C%20relying%20too%20much%20on%20tests%20for%20issue%20resolution%20can%20lead%20to%20code%20that%20technically%20passes%20observed%20tests%20but%20actually%20misses%20important%20cases%20or%20even%20breaks%20functionality.%20This%20problem%2C%20called%20test%20overfitting%2C%20is%20exacerbated%20by%20the%20fact%20that%20issues%20usually%20lack%20readily%20executable%20tests.%20Instead%2C%20several%20issue%20resolution%20systems%20use%20tests%20auto-generated%20from%20issues%2C%20which%20may%20be%20imperfect.%20Some%20systems%20even%20iteratively%20refine%20code%20and%20tests%20jointly.%20This%20paper%20presents%20the%20first%20empirical%20study%20of%20test%20overfitting%20in%20this%20setting.%0ALink%3A%20http%3A//arxiv.org/abs/2511.16858v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DInvestigating%2520Test%2520Overfitting%2520on%2520SWE-bench%26entry.906535625%3DToufique%2520Ahmed%2520and%2520Jatin%2520Ganhotra%2520and%2520Avraham%2520Shinnar%2520and%2520Martin%2520Hirzel%26entry.1292438233%3DTests%2520can%2520be%2520useful%2520towards%2520resolving%2520issues%2520on%2520code%2520repositories.%2520However%252C%2520relying%2520too%2520much%2520on%2520tests%2520for%2520issue%2520resolution%2520can%2520lead%2520to%2520code%2520that%2520technically%2520passes%2520observed%2520tests%2520but%2520actually%2520misses%2520important%2520cases%2520or%2520even%2520breaks%2520functionality.%2520This%2520problem%252C%2520called%2520test%2520overfitting%252C%2520is%2520exacerbated%2520by%2520the%2520fact%2520that%2520issues%2520usually%2520lack%2520readily%2520executable%2520tests.%2520Instead%252C%2520several%2520issue%2520resolution%2520systems%2520use%2520tests%2520auto-generated%2520from%2520issues%252C%2520which%2520may%2520be%2520imperfect.%2520Some%2520systems%2520even%2520iteratively%2520refine%2520code%2520and%2520tests%2520jointly.%2520This%2520paper%2520presents%2520the%2520first%2520empirical%2520study%2520of%2520test%2520overfitting%2520in%2520this%2520setting.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2511.16858v3%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=Investigating%20Test%20Overfitting%20on%20SWE-bench&entry.906535625=Toufique%20Ahmed%20and%20Jatin%20Ganhotra%20and%20Avraham%20Shinnar%20and%20Martin%20Hirzel&entry.1292438233=Tests%20can%20be%20useful%20towards%20resolving%20issues%20on%20code%20repositories.%20However%2C%20relying%20too%20much%20on%20tests%20for%20issue%20resolution%20can%20lead%20to%20code%20that%20technically%20passes%20observed%20tests%20but%20actually%20misses%20important%20cases%20or%20even%20breaks%20functionality.%20This%20problem%2C%20called%20test%20overfitting%2C%20is%20exacerbated%20by%20the%20fact%20that%20issues%20usually%20lack%20readily%20executable%20tests.%20Instead%2C%20several%20issue%20resolution%20systems%20use%20tests%20auto-generated%20from%20issues%2C%20which%20may%20be%20imperfect.%20Some%20systems%20even%20iteratively%20refine%20code%20and%20tests%20jointly.%20This%20paper%20presents%20the%20first%20empirical%20study%20of%20test%20overfitting%20in%20this%20setting.&entry.1838667208=http%3A//arxiv.org/abs/2511.16858v3&entry.124074799=Read"},
{"title": "Agentic-MME: What Agentic Capability Really Brings to Multimodal Intelligence?", "author": "Qianshan Wei and Yishan Yang and Siyi Wang and Jinglin Chen and Binyu Wang and Jiaming Wang and Shuang Chen and Zechen Li and Yang Shi and Yuqi Tang and Weining Wang and Yi Yu and Chaoyou Fu and Qi Li and Yi-Fan Zhang", "abstract": "Multimodal Large Language Models (MLLMs) are evolving from passive observers into active agents, solving problems through Visual Expansion (invoking visual tools) and Knowledge Expansion (open-web search). However, existing evaluations fall short: they lack flexible tool integration, test visual and search tools separately, and evaluate primarily by final answers. Consequently, they cannot verify if tools were actually invoked, applied correctly, or used efficiently. To address this, we introduce Agentic-MME, a process-verified benchmark for Multimodal Agentic Capabilities. It contains 418 real-world tasks across 6 domains and 3 difficulty levels to evaluate capability synergy, featuring over 2,000 stepwise checkpoints that average 10+ person-hours of manual annotation per task. Each task includes a unified evaluation framework supporting sandboxed code and APIs, alongside a human reference trajectory annotated with stepwise checkpoints along dual-axis: S-axis and V-axis. To enable true process-level verification, we audit fine-grained intermediate states rather than just final answers, and quantify efficiency via an overthinking metric relative to human trajectories. Experimental results show the best model, Gemini3-pro, achieves 56.3% overall accuracy, which falls significantly to 23.0% on Level-3 tasks, underscoring the difficulty of real-world multimodal agentic problem solving.", "link": "http://arxiv.org/abs/2604.03016v1", "date": "2026-04-03", "relevancy": 1.0065, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5044}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.503}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5023}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Agentic-MME%3A%20What%20Agentic%20Capability%20Really%20Brings%20to%20Multimodal%20Intelligence%3F&body=Title%3A%20Agentic-MME%3A%20What%20Agentic%20Capability%20Really%20Brings%20to%20Multimodal%20Intelligence%3F%0AAuthor%3A%20Qianshan%20Wei%20and%20Yishan%20Yang%20and%20Siyi%20Wang%20and%20Jinglin%20Chen%20and%20Binyu%20Wang%20and%20Jiaming%20Wang%20and%20Shuang%20Chen%20and%20Zechen%20Li%20and%20Yang%20Shi%20and%20Yuqi%20Tang%20and%20Weining%20Wang%20and%20Yi%20Yu%20and%20Chaoyou%20Fu%20and%20Qi%20Li%20and%20Yi-Fan%20Zhang%0AAbstract%3A%20Multimodal%20Large%20Language%20Models%20%28MLLMs%29%20are%20evolving%20from%20passive%20observers%20into%20active%20agents%2C%20solving%20problems%20through%20Visual%20Expansion%20%28invoking%20visual%20tools%29%20and%20Knowledge%20Expansion%20%28open-web%20search%29.%20However%2C%20existing%20evaluations%20fall%20short%3A%20they%20lack%20flexible%20tool%20integration%2C%20test%20visual%20and%20search%20tools%20separately%2C%20and%20evaluate%20primarily%20by%20final%20answers.%20Consequently%2C%20they%20cannot%20verify%20if%20tools%20were%20actually%20invoked%2C%20applied%20correctly%2C%20or%20used%20efficiently.%20To%20address%20this%2C%20we%20introduce%20Agentic-MME%2C%20a%20process-verified%20benchmark%20for%20Multimodal%20Agentic%20Capabilities.%20It%20contains%20418%20real-world%20tasks%20across%206%20domains%20and%203%20difficulty%20levels%20to%20evaluate%20capability%20synergy%2C%20featuring%20over%202%2C000%20stepwise%20checkpoints%20that%20average%2010%2B%20person-hours%20of%20manual% {"title": "SkillRT: Compiling Skills for Efficient Execution Everywhere", "author": "Le Chen and Erhu Feng and Yubin Xia and Haibo Chen", "abstract": "LLM agents increasingly adopt skills as a reusable unit of composition. While skills are shared across diverse agent platforms, current systems treat them as raw context, causing the same skill to behave inconsistently for different agents. This fragility undermines skill portability and execution efficiency.\n  To address this challenge, we analyze 118,000 skills and draw inspiration from traditional compiler design. We treat skills as code and LLMs as heterogeneous processors. To make portability actionable, we decompose a skill's requirements into a set of primitive capabilities, and measure how well each model-harness pair supports them. Based on these capability profiles, we propose SkillRT, a compilation and runtime system designed for portable and efficient skill execution. At compile time, SkillRT performs capability-based compilation, environment binding, and concurrency extraction. At runtime, SkillRT applies JIT code solidification and adaptive recompilation for performance optimization.\n  We evaluate SkillRT across eight LLMs of varying scales and three agent harnesses, covering SkillsBench and representative skill tasks. Results demonstrate that SkillRT significantly improves task completion rates across different models and environments while reducing token consumption by up to 40%. In terms of performance, SkillRT achieves up to 3.2x speedup with enhanced parallelism, and 19-50x latency reduction through code solidification.", "link": "http://arxiv.org/abs/2604.03088v1", "date": "2026-04-03", "relevancy": 1.7485, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4536}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4348}, {"title": "RTG-SLAM: Real-time 3D Reconstruction at Scale using Gaussian Splatting", "link": "http://arxiv.org/abs/2404.19706v1", "similarity": 0.4216}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20SkillRT%3A%20Compiling%20Skills%20for%20Efficient%20Execution%20Everywhere&body=Title%3A%20SkillRT%3A%20Compiling%20Skills%20for%20Efficient%20Execution%20Everywhere%0AAuthor%3A%20Le%20Chen%20and%20Erhu%20Feng%20and%20Yubin%20Xia%20and%20Haibo%20Chen%0AAbstract%3A%20LLM%20agents%20increasingly%20adopt%20skills%20as%20a%20reusable%20unit%20of%20composition.%20While%20skills%20are%20shared%20across%20diverse%20agent%20platforms%2C%20current%20systems%20treat%20them%20as%20raw%20context%2C%20causing%20the%20same%20skill%20to%20behave%20inconsistently%20for%20different%20agents.%20This%20fragility%20undermines%20skill%20portability%20and%20execution%20efficiency.%0A%20%20To%20address%20this%20challenge%2C%20we%20analyze%20118%2C000%20skills%20and%20draw%20inspiration%20from%20traditional%20compiler%20design.%20We%20treat%20skills%20as%20code%20and%20LLMs%20as%20heterogeneous%20processors.%20To%20make%20portability%20actionable%2C%20we%20decompose%20a%20skill%27s%20requirements%20into%20a%20set%20of%20primitive%20capabilities%2C%20and%20measure%20how%20well%20each%20model-harness%20pair%20supports%20them.%20Based%20on%20these%20capability%20profiles%2C%20we%20propose%20SkillRT%2C%20a%20compilation%20and%20runtime%20system%20designed%20for%20portable%20and%20efficient%20skill%20execution.%20At%20compile%20time%2C%20SkillRT%20performs%20capability-based%20compilation%2C%20environment%20binding%2C%20and%20concurrency%20extraction.%20At%20runtime%2C%20SkillRT%20applies%20JIT%20code%20solidification%20and%20adaptive%20recompilation%20for%20performance%20optimization.%0A%20%20We%20evaluate%20SkillRT%20across%20eight%20LLMs%20of%20varying%20scales%20and%20three%20agent%20harnesses%2C%20covering%20SkillsBench%20and%20representative%20skill%20tasks.%20Results%20demonstrate%20that%20SkillRT%20significantly%20improves%20task%20completion%20rates%20across%20different%20models%20and%20environments%20while%20reducing%20token%20consumption%20by%20up%20to%2040%25.%20In%20terms%20of%20performance%2C%20SkillRT%20achieves%20up%20to%203.2x%20speedup%20with%20enhanced%20parallelism%2C%20and%2019-50x%20latency%20reduction%20through%20code%20solidification.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03088v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSkillRT%253A%2520Compiling%2520Skills%2520for%2520Efficient%2520Execution%2520Everywhere%26entry.906535625%3DLe%2520Chen%2520and%2520Erhu%2520Feng%2520and%2520Yubin%2520Xia%2520and%2520Haibo%2520Chen%26entry.1292438233%3DLLM%2520agents%2520increasingly%2520adopt%2520skills%2520as%2520a%2520reusable%2520unit%2520of%2520composition.%2520While%2520skills%2520are%2520shared%2520across%2520diverse%2520agent%2520platforms%252C%2520current%2520systems%2520treat%2520them%2520as%2520raw%2520context%252C%2520causing%2520the%2520same%2520skill%2520to%2520behave%2520inconsistently%2520for%2520different%2520agents.%2520This%2520fragility%2520undermines%2520skill%2520portability%2520and%2520execution%2520efficiency.%250A%2520%2520To%2520address%2520this%2520challenge%252C%2520we%2520analyze%2520118%252C000%2520skills%2520and%2520draw%2520inspiration%2520from%2520traditional%2520compiler%2520design.%2520We%2520treat%2520skills%2520as%2520code%2520and%2520LLMs%2520as%2520heterogeneous%2520processors.%2520To%2520make%2520portability%2520actionable%252C%2520we%2520decompose%2520a%2520skill%2527s%2520requirements%2520into%2520a%2520set%2520of%2520primitive%2520capabilities%252C%2520and%2520measure%2520how%2520well%2520each%2520model-harness%2520pair%2520supports%2520them.%2520Based%2520on%2520these%2520capability%2520profiles%252C%2520we%2520propose%2520SkillRT%252C%2520a%2520compilation {"title": "JointFM-0.1: A Foundation Model for Multi-Target Joint Distributional Prediction", "author": "Stefan Hackmann", "abstract": "Despite the rapid advancements in Artificial Intelligence (AI), Stochastic Differential Equations (SDEs) remain the gold-standard formalism for modeling systems under uncertainty. However, applying SDEs in practice is fraught with challenges: modeling risk is high, calibration is often brittle, and high-fidelity simulations are computationally expensive. This technical report introduces JointFM, a foundation model that inverts this paradigm. Instead of fitting SDEs to data, we sample an infinite stream of synthetic SDEs to train a generic model to predict future joint probability distributions directly. This approach establishes JointFM as the first foundation model for distributional predictions of coupled time series - requiring no task-specific calibration or finetuning. Despite operating in a purely zero-shot setting, JointFM reduces the energy loss by 21.1% relative to the strongest baseline when recovering oracle joint distributions generated by unseen synthetic SDEs.", "link": "http://arxiv.org/abs/2603.20266v2", "date": "2026-04-03", "relevancy": 1.4255, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5322}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4603}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4554}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20JointFM-0.1%3A%20A%20Foundation%20Model%20for%20Multi-Target%20Joint%20Distributional%20Prediction&body=Title%3A%20JointFM-0.1%3A%20A%20Foundation%20Model%20for%20Multi-Target%20Joint%20Distributional%20Prediction%0AAuthor%3A% 0in%2520practice%2520is%2520fraught%2520with%2520challenges%253A%2520modeling%2520risk%2520is%2520high%252C%2520calibration%2520is%2520often%2520brittle%252C%2520and%2520high-fidelity%2520simulations%2520are%2520computationally%2520expensive.%2520This%2520technical%2520report%2520introduces%2520JointFM%252C%2520a%2520foundation%2520model%2520that%2520inverts%2520this%2520paradigm.%2520Instead%2520of%2520fitting%2520SDEs%2520to%2520data%252C%2520we%2520sample%2520an%2520infinite%2520stream%2520of%2520synthetic%2520SDEs%2520to%2520train%2520a%2520generic%2520model%2520to%2520predict%2520future%2520joint%2520probability%2520distributions%2520directly.%2520This%2520approach%2520establishes%2520JointFM%2520as%2520the%2520first%2520foundation%2520model%2520for%2520distributional%2520predictions%2520of%2520coupled%2520time%2520series%2520-%2520requiring%2520no%2520task-specific%2520calibration%2520or%2520finetuning.%2520Despite%2520operating%2520in%2520a%2520purely%2520zero-shot%2520setting%252C%2520JointFM%2520reduces%2520the%2520energy%2520loss%2520by%252021.1%2525%2520relative%2520to%2520the%2520strongest%2520baseline%2520when%2520recovering%2520oracle%2520joint%2520distributions%2520generated%2520by%2520unseen%2520synthetic%2520SDEs.%26entry.1838667208%3Dhttp%253A//arxiv.org/abs/2603.20266v2%26entry.124074799%3DRead", "form": "https://docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform?entry.1380929848=JointFM-0.1%3A%20A%20Foundation%20Model%20for%20Multi-Target%20Joint%20Distributional%20Prediction&entry.906535625=Stefan%20Hackmann&entry.1292438233=Despite%20the%20rapid%20advancements%20in%20Artificial%20Intelligence%20%28AI%29%2C%20Stochastic%20Differential%20Equations%20%28SDEs%29%20remain%20the%20gold-standard%20formalism%20for%20modeling%20systems%20under%20uncertainty.%20However%2C%20applying%20SDEs%20in%20practice%20is%20fraught%20with%20challenges%3A%20modeling%20risk%20is%20high%2C%20calibration%20is%20often%20brittle%2C {"title": "Expressive Prompting: Improving Emotion Intensity and Speaker Consistency in Zero-Shot TTS", "author": "Haoyu Wang and Chunyu Qiang and Tianrui Wang and Cheng Gong and Yu Jiang and Yuheng Lu and Chen Zhang and Longbiao Wang and Jianwu Dang", "abstract": "Recent advancements in speech synthesis have enabled large language model (LLM)-based systems to perform zero-shot generation with controllable content, timbre, speaker identity, and emotion through input prompts. As a result, these models heavily rely on prompt design to guide the generation process. However, existing prompt selection methods often fail to ensure that prompts contain sufficiently stable speaker identity cues and appropriate emotional intensity indicators, which are crucial for expressive speech synthesis. To address this challenge, we propose a two-stage prompt selection strategy specifically designed for expressive speech synthesis. In the static stage (before synthesis), we first evaluate prompt candidates using pitch-based prosodic features, perceptual audio quality, and text-emotion coherence scores evaluated by an LLM. We further assess the candidates under a specific TTS model by measuring character error rate, speaker similarity, and emotional similarity between the synthesized and prompt speech. In the dynamic stage (during synthesis), we use a textual similarity model to select the prompt that is most aligned with the current input text. Experimental results demonstrate that our strategy effectively selects prompt to synthesize speech with both high-intensity emotional expression and robust speaker identity, leading to more expressive and stable zero-shot TTS performance. Audio samples and codes will be available at https://whyrrrrun.github.io/ExpPro.github.io/.", "link": "http://arxiv.org/abs/2409.18512v2", "date": "2026-04-03", "relevancy": 1.8197, "topK": [{"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.4712}, {"title": "Magic-Me: Identity-Specific Video Customized Diffusion", "link": "http://arxiv.org/abs/2402.09368v1", "similarity": 0.4618}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4415}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Expressive%20Prompting%3A%20Improving%20Emotion%20Intensity%20and%20Speaker%20Consistency%20in%20Zero-Shot%20TTS&body=Title%3A%20Expressive%20Prompting%3A%20Improving%20Emotion%20Intensity%20and%20Speaker%20Consistency%20in%20Zero-Shot%20TTS%0AAuthor%3A%20Haoyu%20Wang%20and%20Chunyu%20Qiang%20and%20Tianrui%20Wang%20and%20Cheng%20Gong%20and%20Yu%20Jiang%20and%20Yuheng%20Lu%20and%20Chen%20Zhang%20and%20Longbiao%20Wang%20and%20Jianwu%20Dang%0AAbstract%3A%20Recent%20advancements%20in%20speech%20synthesis%20have%20enabled%20large%20language%20model%20%28LLM%29-based%20systems%20to%20perform%20zero-shot%20generation%20with%20controllable%20content%2C%20timbre%2C%20speaker%20identity%2C%20and%20emotion%20through%20input%20prompts.%20As%20a%20result%2C%20these%20models%20heavily%20rely%20on%20prompt%20design%20to%20guide%20the%20generation%20process.%20However%2C%20existing%20prompt%20selection%20methods%20often%20fail%20to%20ensure%20that%20prompts%20contain%20sufficiently%20stable%20speaker%20identity%20cues%20and%20appropriate%20emotional%20intensity%20indicators%2C%20which%20are%20crucial%20for%20expressive%20speech%20synthesis.%20To%20address%20this%20challenge%2C%20we%20propose%20a%20two-stage%20prompt%20selection%20strategy%20specifically%20designed%20for%20expressive%20speech%20synthesis.%20In%20the%20static%20stage%20%28before%20synthesis%29%2C%20we%20first%20evaluate%20prompt%20candidates%20using%20pitch-based%20prosodic%20features%2C%20perceptual%20audio%20quality%2C%20and%20text-emotion%20coherence%20scores%20evaluated%20by%20an%20LLM.%20We%20further%20assess%20the%20candidates%20under%20a%20specific%20TTS%20model%20by%20measuring%20character%20error%20rate%2C%20speaker%20similarity%2C%20and%20emotional%20similarity%20between%20the%20synthesized%20and%20prompt%20speech.%20In%20the%20dynamic%20stage%20%28during%20synthesis%29%2C%20we%20use%20a%20textual%20similarity%20model%20to%20select%20the%20prompt%20that%20is%20most%20aligned%20with%20the%20current%20input%20text.%20Experimental%20results%20demonstrate%20that%20our%20strategy%20effectively%20selects%20prompt%20to%20synthesize%20speech%20with%20both%20high-intensity%20emotional%20expression%20and%20robust%20speaker%20identity%2C%20leading%20to%20more%20expressive%20and%20stable%20zero-shot%20TTS%20performance.%20Audio%20samples%20and%20codes%20will%20be%20available%20at%20https%3A//whyrrrrun.github.io/ExpPro.github.io/.%0ALink%3A%20http%3A//arxiv.org/abs/2409.18512v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DExpressive%2520Prompting%253A%2520Improving%2520Emotion%2520Intensity%2520and%2520Speaker%2520Consistency%2520in%2520Zero-Shot%2520TTS%26entry.906535625%3DHaoyu%2520Wang%2520and%2520Chunyu%2520Qiang%2520and%2520Tianrui%2520Wang%2520and%2520Cheng%2520Gong%2520and%2520Yu%2520Jiang%2520and%2520Yuheng%2520Lu%2520and%2520Chen%2520Zhang%2520and%2520Longbiao%2520Wang%2520and%2520Jianwu%2520Dang%26entry.1292438233%3DRecent%2520advancements%2520in%2520speech%2520synthesis%2520have%2520enabled%2520large%2520language%2520model%2520%2528LLM%2529-based%2520systems%2520to%2520perform%2520zero-shot%2520generation%2520with%2520controllable%2520content%252C%2520timbre%252C%2520speaker%2520identity%252C%2520and%2520emotion%2520through%2520input%2520prompts.%2520As%2520a%2520result%252C%2520these%2520models%2520heavily%2520rely%2520on%2520prompt%2520design%2520to%2520guide%2520the%2520generation%2520process.%2520However%252C%2520existing%2520prompt%2520selection%2520methods%2520often%2520 {"title": "Generating DDPM-based Samples from Tilted Distributions", "author": "Himadri Mandal and Dhruman Gupta and Rushil Gupta and Sarvesh Ravichandran Iyer and Agniv Bandyopadhyay and Achal Bassamboo and Varun Gupta and Sandeep Juneja", "abstract": "Given $n$ independent samples from a $d$-dimensional probability distribution, our aim is to generate diffusion-based samples from a distribution obtained by tilting the original, where the degree of tilt is parametrized by $\u03b8\\in \\mathbb{R}^d$. We define a plug-in estimator and show that it is minimax-optimal. We develop Wasserstein bounds between the distribution of the plug-in estimator and the true distribution as a function of $n$ and $\u03b8$, illustrating regimes where the output and the desired true distribution are close. Further, under some assumptions, we prove the TV-accuracy of running Diffusion on these tilted samples. Our theoretical results are supported by extensive simulations. Applications of our work include finance, weather and climate modelling, and many other domains, where the aim may be to generate samples from a tilted distribution that satisfies practically motivated moment constraints.", "link": "http://arxiv.org/abs/2604.03015v1", "date": "2026-04-03", "relevancy": 1.404, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4823}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.47}, {"title": "CAT3D: Create Anything in 3D with Multi-View Diffusion Models", "link": "http://arxiv.org/abs/2405.10314v1", "similarity": 0.4615}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Generating%20DDPM-based%20Samples%20from%20Tilted%20Distributions&body=Title%3A%20Generating%20DDPM-based%20Samples%20from%20Tilted%20Distributions%0AAuthor%3A%20Himadri%20Mandal%20and%20Dhruman%20Gup {"title": "Coupled Control, Structured Memory, and Verifiable Action in Agentic AI (SCRAT -- Stochastic Control with Retrieval and Auditable Trajectories): A Comparative Perspective from Squirrel Locomotion and Scatter-Hoarding", "author": "Maximiliano Armesto and Christophe Kolb", "abstract": "Agentic AI is increasingly judged not by fluent output alone but by whether it can act, remember, and verify under partial observability, delay, and strategic observation. Existing research often studies these demands separately: robotics emphasizes control, retrieval systems emphasize memory, and alignment or assurance work emphasizes checking and oversight. This article argues that squirrel ecology offers a sharp comparative case because arboreal locomotion, scatter-hoarding, and audience-sensitive caching couple all three demands in one organism. We synthesize evidence from fox, eastern gray, and, in one field comparison, red squirrels, and impose an explicit inference ladder: empirical observation, minimal computational inference, and AI design conjecture. We introduce a minimal hierarchical partially observed control model with latent dynamics, structured episodic memory, observer-belief state, option-level actions, and delayed verifier signals. This motivates three hypotheses: (H1) fast local feedback plus predictive compensation improves robustness under hidden dynamics shifts; (H2) memory organized for future control improves delayed retrieval under cue conflict and load; and (H3) verifiers and observer models inside the action-memory loop reduce silent failure and information leakage while remaining vulnerable to misspecification. A downstream conjecture is that role-differentiated proposer/executor/checker/adversary systems may reduce correlated error under asymmetric information and verification burden. The contribution is a comparative perspective and benchmark agenda: a disciplined program of falsifiable claims about the coupling of control, memory, and verifiable action.", "link": "http://arxiv.org/abs/2604.03201v1", "date": "2026-04-03", "relevancy": 1.5676, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5437}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5194}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5153}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Coupled%20Control%2C%20Structured%20Memory%2C%20and%20Verifiable%20Action%20in%20Agentic%20AI%20%28SCRAT%20--%20Stochastic%20Control%20with%20Retrieval%20and%20Auditable%20Trajectories%29%3A%20A%20Comparative%20Perspective%20from%20Squirrel%20Locomotion%20and%20Scatter-Hoarding&body=Title%3A%20Coupled%20Control%2C%20Structured%20Memory%2C%20and%20Verifiable%20Action%20in%20Agentic%20AI%20%28SCRAT%20--%20Stochastic%20Control%20with%20Retrieval%20and%20Auditable%20Trajectories%29%3A%20A%20Comparative%20Perspective%20from%20Squirrel%20Locomotion%20and%20Scatter-Hoarding%0AAuthor%3A%20Maximiliano%20Armesto%20and%20Christophe%20Kolb%0AAbstract%3A%20Agentic%20AI%20is%20increasingly%20judged%20not%20by%20fluent%20output%20alone%20but%20by%20whether%20it%20can%20act%2C%20remember%2C%20and%20verify%20under%20partial%20observability%2C%20delay%2C%20and%20strategic%20observation.%20Existing%20research%20often%20studies%20these%20demands%20separately%3A%20robotics%20emphasizes%20control%2C%20retrieval%20systems%20emphasize%20memory%2C%20and%20alignment%20or%20assurance%20work%20emphasizes%20checking%20and%20oversight.%20This%20article%20argues%20that%20squirrel%20ecology%20offers%20a%20sharp%20comparative%20case%20because%20arboreal%20locomotion%2C%20scatter-hoarding%2C%20and%20audience-sensitive%20caching%20couple%20all%20three%20demands%20in%20one%20organism.%20We%20synthesize%20evidence%20from%20fox%2C%20eastern%20gray%2C%20and%2C%20in%20one%20field%20comparison%2C%20red%20squirrels%2C%20and%20impose%20an%20explicit%20inference%20ladder%3A%20empirical%20observation%2C%20minimal%20computational%20inference%2C%20and%20AI%20design%20conjecture.%20We%20introduce%20a%20minimal%20hierarchical%20partially%20observed%20control%20model%20with%20latent%20dynamics%2C%20structured%20episodic%20memory%2C%20observer-belief%20state%2C%20option-level%20actions%2C%20and%20delayed%20verifier%20signals.%20This%20motivates%20three%20hypotheses%3A%20%28H1%29%20fast%20local%20feedback%20plus%20predictive%20compensation%20improves%20robustness%20under%20hidden%20dynamics%20shifts%3B%20%28H2%29%20memory%20organized%20for%20future%20control%20improves%20delayed%20retrieval%20under%20cue%20conflict%20and%20load%3B%20and%20%28H3%29%20verifiers%20and%20observer%20models%20inside%20the%20action-memory%20loop%20reduce%20silent%20failure%20and%20information%20leakage%20while%20remaining%20vulnerable%20to%20misspecification.%20A%20downstream%20conjecture%20is%20that%20role-differentiated%20proposer/executor/checker/adversary%20systems%20may%20reduce%20correlated%20error%20under%20asymmetric%20information%20and%20verification%20burden.%20The%20contribution%20is%20a%20comparative%20perspective%20and%20benchmark%20agenda%3A%20a%20disciplined%20program%20of%20falsifiable%20claims%20about%20the%20coupling%20of%20control%2C%20memory%2C%20and%20verifiable%20action.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03201v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCoupled%2520Control%252C%2520Structured%2520Memory%252C%2520and%2520Verifiable%2520Action%2520in%2520Agentic%2520AI%2520%2528SCRAT%2520--%2520Stochastic%2520Control%2520with%2520Retrieval%2520and%2520Auditable%2520Trajectories%2529%253A%2520A%2520Comparative% {"title": "Open-Loop Planning, Closed-Loop Verification: Speculative Verification for VLA", "author": "Zihua Wang and Zhitao Lin and Ruibo Li and Yu Zhang and Xu Yang and Siya Mi and Xiu-Shen Wei", "abstract": "Vision-Language-Action (VLA) models, as large foundation models for embodied control, have shown strong performance in manipulation tasks. However, their performance comes at high inference cost. To improve efficiency, recent methods adopt action chunking, which predicts a sequence of future actions for open-loop execution. Although effective for reducing computation, open-loop execution is sensitive to environmental changes and prone to error accumulation due to the lack of close-loop feedback. To address this limitation, we propose Speculative Verification for VLA Control (SV-VLA), a framework that combines efficient open-loop long-horizon planning with lightweight closed-loop online verification. Specifically, SV-VLA uses a heavy VLA as a low-frequency macro-planner to generate an action chunk together with a planning context, while a lightweight verifier continuously monitors execution based on the latest observations. Conditioned on both the current observation and the planning context, the verifier compares the planned action against a closed-loop reference action and triggers replanning only when necessary. Experiments demonstrate that SV-VLA combines the efficiency of chunked prediction with the robustness of closed-loop control, enabling efficient and reliable VLA-based control in dynamic environments. Code is available: https://github.com/edsad122/SV-VLA.", "link": "http://arxiv.org/abs/2604.02965v1", "date": "2026-04-03", "relevancy": 1.5708, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5361}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5344}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.5143}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Open-Loop%20Planning%2C%20Closed-Loop%20Verification%3A%20Speculative%20Verification%20for%20VLA&body=Title%3A%20Open-Loop%20Planning%2C%20Closed-Loop%20Verification%3A%20Speculative%20Verification%20for%20VLA%0AAuthor%3A%20Zihua%20Wang%20and%20Zhitao%20Lin%20and%20Ruibo%20Li%20and%20Yu%20Zhang%20and%20Xu%20Yang%20and%20Siya%20Mi%20and%20Xiu-Shen%20Wei%0AAbstract%3A%20Vision-Language-Action%20%28VLA%29%20models%2C%20as%20large%20foundation%20models%20for%20embodied%20control%2C%20have%20shown%20strong%20performance%20in%20manipulation%20tasks.%20However%2C%20their%20performance%20comes%20at%20high%20inference%20cost.%20To%20improve%20efficiency%2C%20recent%20methods%20adopt%20action%20chunking%2C%20which%20predicts%20a%20sequence%20of%20future%20actions%20for%20open-loop%20execution.%20Although%20effective%20for%20reducing%20computation%2C%20open-loop%20execution%20is%20sensitive%20to%20environmental%20changes%20and%20prone%20to%20error%20accumulation%20due%20to%20the%20lack%20of%20close-loop%20feedback.%20To%20address%20this%20limitation%2C%20we%20propose%20Speculative%20Verification%20for%20VLA%20Control%20%28SV-VLA%29%2C%20a%20framework%20that%20combines%20efficient%20open-loop%20long-horizon%20planning%20with%20lightweight%20closed-loop%20online%20verification.%20Specifically%2C%20SV-VLA%20uses%20a%20heavy%20VLA%20as%20a%20low-frequency%20macro-planner%20to%20generate%20an%20action%20chunk%20together%20with%20a%20planning%20context%2C%20while%20a%20lightweight%20verifier%20continuously%20monitors%20execution%20based%20on%20the%20latest%20observations.%20Conditioned%20on%20both%20the%20current%20observation%20and%20the%20planning%20context%2C%20the%20verifier%20compares%20the%20planned%20action%20against%20a%20closed-loop%20reference%20action%20and%20triggers%20replanning%20only%20when%20necessary.%20Experiments%20demonstrate%20that%20SV-VLA%20combines%20the%20efficiency%20of%20chunked%20prediction%20with%20the%20robustness%20of%20closed-loop%20control%2C%20enabling%20efficient%20and%20reliable%20VLA-based%20control%20in%20dynamic%20environments.%20Code%20is%20available%3A%20https%3A//github.com/edsad122/SV-VLA.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02965v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DOpen-Loop%2520Planning%252C%2520Closed-Loop%2520Verification%253A%2520Speculative%2520Verification%2520for%2520VLA%26entry.906535625%3DZihua%2520Wang%2520and%2520Zhitao%2520Lin%2520and%2520Ruibo%2520Li%2520and%2520Yu%2520Zhang%2520and%2520Xu%2520Yang%2520and%2520Siya%2520Mi%2520and%2520Xiu-Shen%2520Wei%26entry.1292438233%3DVision-Language-Action%2520%2528VLA%2529%2520models%252C%2520as%2520large%2520foundation%2520models%2520for%2520embodied%2520control%252C%2520have%2520shown%2520strong%2520performance%2520in%2520manipulation%2520tasks.%2520However%252C%2520their%2520performance%2520comes%2520at%2520high%2520inference%2520cost.%2520To%2520improve%2520efficiency%252C%2520recent%2520methods%2520adopt%2520action%2520chunking%252C%2520which%2520predicts%2520a%2520sequence%2520of%2520future%2520actions%2520for%2520open-loop%2520execution.%2520Although%2520effective%2520for%2520reducing%2520computation%252C%2520open-loop%2520execution%2520is%2520sensitive%2520to%2520environmental%2520changes%2520and%2520prone%2520to%2520error%2520accumulation%2520due%2520to%2520the%2520lack%2520of%2520close-loop%2520feedback.%2520To%2520address%2520this%2520limitation%252C%2520we%2520propose%2520Speculative%2520Verification%2520for%2520VLA%2520Control%2520%2528SV-VLA%2529%252C%2520a%2520framework%2520that%2520combines%2520efficient%2520open-loop%2520long-horizon% {"title": "Assessing High-Risk AI Systems under the EU AI Act: From Legal Requirements to Technical Verification", "author": "Alessio Buscemi and Tom Deckenbrunnen and Fahria Kabir and Kateryna Mishchenko and Nishat Mowla", "abstract": "The implementation of the AI Act requires practical mechanisms to verify compliance with legal obligations, yet concrete and operational mappings from high-level requirements to verifiable assessment activities remain limited, contributing to uneven readiness across Member States. This paper presents a structured mapping that translates high-level AI Act requirements into concrete, implementable verification activities applicable across the AI lifecycle. The mapping is derived through a systematic process in which legal requirements are decomposed into operational sub-requirements and grounded in authoritative standards and recognised practices. From this basis, verification activities are identified and characterised along two dimensions: the type of verification performed and the lifecycle target to which it applies. By making explicit the link between regulatory intent and technical and organisational assurance practices, the proposed mapping reduces interpretive uncertainty and provides a reusable reference for consistent, technology-agnostic compliance verification under the AI Act.", "link": "http://arxiv.org/abs/2512.13907v3", "date": "2026-04-03", "relevancy": 1.2536, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4358}, {"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.4202}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4097}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Assessing%20High-Risk%20AI%20Systems%20under%20the%20EU%20AI%20Act%3A%20From%20Legal%20Requirements%20to%20Technical%20Verification&body=Title%3A%20Assessing%20High-Risk%20AI%20Systems%20under%20the%20EU%20AI%20Act%3A%20From%20Legal%20Requirements%20to%20Technical%20Verification%0AAuthor%3A%20Alessio%20Buscemi%20and%20Tom%20Deckenbrunnen%20and%20Fahria%20Kabir%20and%20Kateryna%20Mishchenko%20and%20Nishat%20Mowla%0AAbstract%3A%20The%20implementation%20of%20the%20AI%20Act%20requires%20practical%20mechanisms%20to%20verify%20compliance%20with%20legal%20obligations%2C%20yet%20concrete%20and%20operational%20mappings%20from%20high-level%20requirements%20to%20verifiable%20assessment%20activities%20remain%20limited%2C%20contributing%20to%20uneven%20readiness%20across%20Member%20States.%20This%20paper%20presents%20a%20structured%20mapping%20that%20translates%20high-level%20AI%20Act%20requirements%20into%20concrete%2C%20implementable%20verification%20activities%20applicable%20across%20the%20AI%20lifecycle.%20The%20mapping%20is%20derived%20through%20a%20systematic%20process%20in%20which%20legal%20requirements%20are%20decomposed%20into%20operational%20sub-requirements%20and%20grounded%20in%20authoritative%20standards%20and%20recognised%20practices.%20From%20this%20basis%2C%20verification%20activities%20are%20identified%20and%20characterised%20along%20two%20dimensions%3A%20the%20type%20of%20verification%20performed%20and%20the%20lifecycle%20target%20to%20which%20it%20applies.%20By%20making%20explicit%20the%20link%20between%20regulatory%20intent%20and%20technical%20and%20organisational%20assurance%20practices%2C%20the%20proposed%20mapping%20reduces%20interpretive%20uncertainty%20and%20provides%20a%20reusable%20reference%20for%20consistent%2C%20technology-agnostic%20compliance%20verification%20under%20the%20AI%20Act.%0ALink%3A%20http%3A//arxiv.org/abs/2512.13907v3%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIa {"title": "BEVPredFormer: Spatio-temporal Attention for BEV Instance Prediction in Autonomous Driving", "author": "Miguel Antunes-Garc\u00eda and Santiago Montiel-Mar\u00edn and Fabio S\u00e1nchez-Garc\u00eda and Rodrigo Guti\u00e9rrez-Moreno and Rafael Barea and Luis M. Bergasa", "abstract": "A robust awareness of how dynamic scenes evolve is essential for Autonomous Driving systems, as they must accurately detect, track, and predict the behaviour of surrounding obstacles. Traditional perception pipelines that rely on modular architectures tend to suffer from cumulative errors and latency. Instance Prediction models provide a unified solution, performing Bird's-Eye-View segmentation and motion estimation across current and future frames using information directly obtained from different sensors. However, a key challenge in these models lies in the effective processing of the dense spatial and temporal information inherent in dynamic driving environments. This level of complexity demands architectures capable of capturing fine-grained motion patterns and long-range dependencies without compromising real-time performance. We introduce BEVPredFormer, a novel camera-only architecture for BEV instance prediction that uses attention-based temporal processing to improve temporal and spatial comprehension of the scene and relies on an attention-based 3D projection of the camera information. BEVPredFormer employs a recurrent-free design that incorporates gated transformer layers, divided spatio-temporal attention mechanisms, and multi-scale head tasks. Additionally, we incorporate a difference-guided feature extraction module that enhances temporal representations. Extensive ablation studies validate the effectiveness of each architectural component. When evaluated on the nuScenes dataset, BEVPredFormer was on par or surpassed State-Of-The-Art methods, highlighting its potential for robust and efficient Autonomous Driving perception.", "link": "http://arxiv.org/abs/2604.02930v1", "date": "2026-04-03", "relevancy": 1.7131, "topK": [{"title": "CamCtrl3D: Single-Image Scene Exploration with Precise 3D Camera Control", "link": "http://arxiv.org/abs/2501.06006v1", "similarity": 0.6011}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.5768}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.5567}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20BEVPredFormer%3A%20Spatio-temporal%20Attention%20for%20BEV%20Instance%20Prediction%20in%20Autonomous%20Driving&body=Title%3A%20BEVPredFormer%3A%20Spatio-temporal%20Attention%20for%20BEV%20Instance%20Prediction%20in%20Autonomous%20Driving%0AAuthor%3A%20Miguel%20Antunes-Garc%C3%ADa%20and%20Santiago%20Montiel-Mar%C3%ADn%20and%20Fabio%20S%C3%A1nchez-Garc%C3%ADa%20and%20Rodrigo%20Guti%C3%A9rrez-Moreno%20and%20Rafael%20Barea%20and%20Luis%20M.%20Bergasa%0AAbstract%3A%20A%20robust%20awareness%20of%20how%20dynamic%20scenes%20evolve%20is%20essential%20for%20Autonomous%20Driving%20systems%2C%20as%20they%20must%20accurately%20detect%2C%20track%2C%20and%20predict%20the%20behaviour%20of%20surrounding%20obstacles.%20Traditional%20perception%20pipelines%20that%20rely%20on%20modular%20architectures%20tend%20to%20suffer%20from%20cumulative%20errors%20and%20latency.%20Instance%20Prediction%20models%20provide%20a%20unified%20solution%2C%20performing%20Bird%27s-Eye-View%20segmentation%20and%20motion%20estimation%20across%20current%20and%20future%20frames%20using%20information%20directly%20obtained%20from%20different%20sensors.%20However%2C%20a%20key%20challenge%20in%20these%20models%20lies%20in%20the%20effective%20processing%20of%20the%20dense%20spatial%20and%20temporal%20information%20inherent%20in%20dynamic%20driving%20environments.%20This%20level%20of%20complexity%20demands%20architectures%20capable%20of%20capturing%20fine-grained%20motion%20patterns%20and%20long-range%20dependencies%20without%20compromising%20real-time%20performance.%20We%20introduce%20BEVPredFormer%2C%20a%20novel%20camera-only%20architecture%20for%20BEV%20instance%20prediction%20that%20uses%20attention-based%20temporal%20processing%20to%20improve%20temporal%20and%20spatial%20comprehension%20of%20the%20scene%20and%20relies%20on%20an%20attention-based%203D%20projection%20of%20the%20camera%20information.%20BEVPredFormer%20employs%20a%20recurrent-free%20design%20that%20incorporates%20gated%20transformer%20layers%2C%20divided%20spatio-temporal%20attention%20mechanisms%2C%20and%20multi-scale%20head%20tasks.%20Additionally%2C%20we%20incorporate%20a%20difference-guided%20feature%20extraction%20module%20that%20enhances%20temporal%20representations.%20Extensive%20ablation%20studies%20validate%20the%20effectiveness%20of%20each%20architectural%20component.%20When%20evaluated%20on%20the%20nuScenes%20dataset%2C%20BEVPredFormer%20was%20on%20par%20or%20surpassed%20State-Of-The-Art%20methods%2C%20highlighting%20its%20potential%20for%20robust%20and%20efficient%20Autonomous%20Driving%20perception.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02930v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBEVPredFormer%253A%2520Spatio-temporal%2520Attention%2520for%2520BEV%2520Instance%2520Prediction%2520in%2520Autonomous%2520Driving%26entry.906535625%3DMiguel%2520Antunes-Garc%25C3%25ADa%2520and%2520Santiago%2520Montiel-Mar%25C3%25ADn%2520and%2520Fabio%2520S%25C3%25A1nchez-Garc%25C3%25ADa%2520and%2520Rodrigo%2520Guti%25C3%25A9rrez-Moreno%2520and%2520Rafael%2520Barea%2520and%2520Luis%2520M.%2520Bergasa%26entry.1292438233%3DA%2520robust%2520awareness%2520of%2520how%2520dynamic%2520scenes%2520evolve%2520is%2520essential%2520for%2520Autonomous%2520Driving%2520systems%252C%2520as%2520they%2520 {"title": "$\u03bb$-GELU: Learning Gating Hardness for Controlled ReLU-ization in Deep Networks", "author": "Cristian P\u00e9rez-Corral and Alberto Fern\u00e1ndez-Hern\u00e1ndez and Jose I. Mestre and Manuel F. Dolz and Enrique S. Quintana-Ort\u00ed", "abstract": "Gaussian Error Linear Unit (GELU) is a widely used smooth alternative to Rectifier Linear Unit (ReLU), yet many deployment, compression, and analysis toolchains are most naturally expressed for piecewise-linear (ReLU-type) networks. We study a hardness-parameterized formulation of GELU, f(x;\u03bb)=x\u03a6(\u03bb x), where \u03a6 is the Gaussian CDF and \u03bb \\in [1, infty) controls gate sharpness, with the goal of turning smooth gated training into a controlled path toward ReLU-compatible models. Learning \u03bb is non-trivial: naive updates yield unstable dynamics and effective gradient attenuation, so we introduce a constrained reparameterization and an optimizer-aware update scheme.\n  Empirically, across a diverse set of model--dataset pairs spanning MLPs, CNNs, and Transformers, we observe structured layerwise hardness profiles and assess their robustness under different initializations. We further study a deterministic ReLU-ization strategy in which the learned gates are progressively hardened toward a principled target, enabling a post-training substitution of \u03bb-GELU by ReLU with reduced disruption. Overall, \u03bb-GELU provides a minimal and interpretable knob to profile and control gating hardness, bridging smooth training with ReLU-centric downstream pipelines.", "link": "http://arxiv.org/abs/2603.21991v2", "date": "2026-04-03", "relevancy": 1.7283, "topK": [{"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4474}, {"title": "UGG: Unified Generative Grasping", "link": "https://arxiv.org/abs/2311.16917", "similarity": 0.43}, {"title": "Dynamic Gaussians Mesh: Consistent Mesh Reconstruction from Monocular\n  Videos", "link": "http://arxiv.org/abs/2404.12379v2", "similarity": 0.428}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20%24%CE%BB%24-GELU%3A%20Learning%20Gating%20Hardness%20for%20Controlled%20ReLU-ization%20in%20Deep%20Networks&body=Title%3A%20%24%CE%BB%24-GELU%3A%20Learning%20Gating%20Hardness%20for%20Controlled%20ReLU-ization%20in%20Deep%20Networks%0AAuthor%3A%20Cristian%20P%C3%A9rez-Corral%20and%20Alberto%20Fern%C3%A1ndez-Hern%C3%A1ndez%20and%20Jose%20I.%20Mestre%20and%20Manuel%20F.%20Dolz%20and%20Enrique%20S.%20Quintana-Ort%C3%AD%0AAbstract%3A%20Gaussian%20Error%20Linear%20Unit%20%28GELU%29%20is%20a%20widely%20used%20smooth%20alternative%20to%20Rectifier%20Linear%20Unit%20%28ReLU%29%2C%20yet%20many%20deployment%2C%20compression%2C%20and%20analysis%20toolchains%20are%20most%20naturally%20expressed%20for%20piecewise-linear%20%28ReLU-type%29%20networks.%20We%20study%20a%20hardness-parameterized%20formulation%20of%20GELU%2C%20f%28x%3B%CE%BB%29%3Dx%CE%A6%28%CE%BB%20x%29%2C%20where%20%CE%A6%20is%20the%20Gaussian%20CDF%20and%20%CE%BB%20%5Cin%20%5B1%2C%20infty%29%20controls%20gate%20sharpness%2C%20with%20the%20goal%20of%20turning%20smooth%20gated%20training%20into%20a%20controlled%20path%20toward%20ReLU-compatible%20models.%20Learning%20%CE%BB%20is%20non-trivial%3A%20naive%20updates%20yield%20unstable%20dynamics%20and%20effective%20gradient%20attenuation%2C%20so%20we%20introduce%20a%20constrained%20reparameterization%20and%20an%20optimizer-aware%20update%20scheme.%0A%20%20Empirically%2C%20across%20a%20diverse%20set%20of%20model--dataset%20pairs%20spanning%20MLPs%2C%20CNNs%2C%20and%20Transformers%2C%20we%20observe%20structured%20layerwise%20hardness%20profiles%20and%20assess%20their%20robustness%20under%20different%20initializations.%20We%20further%20study%20a%20deterministic%20ReLU-ization%20strategy%20in%20which%20the%20learned%20gates%20are%20progressively%20hardened%20toward%20a%20principled%20target%2C%20enabling%20a%20post-trai       const content = document.getElementById('content');
      function createPostElement(post) {
        const postElement = document.createElement('div');
        postElement.className = 'post';
        const dateElem = document.createElement('p');
        dateElem.setAttribute("class", "date");
        dateElem.textContent = post.date;
        postElement.appendChild(dateElem);

        const textElem = document.createElement('p');
        textElem.setAttribute("class", "text");
        const titleElem = document.createElement('p');
        titleElem.setAttribute("class", "title");
        titleElem.textContent = post.title;
        textElem.appendChild(titleElem);
        const authorElem = document.createElement('p');
        authorElem.setAttribute("class", "author");
        authorElem.textContent = post.author;
        textElem.appendChild(authorElem);
        const abstractElem = document.createElement('p');
        abstractElem.setAttribute("class", "abstract");
        abstractElem.textContent = post.abstract;
        textElem.appendChild(abstractElem);

        const linkElement = document.createElement('a');
        linkElement.setAttribute("class", "link");
        linkElement.href = post.link;
        linkElement.target = "_blank";
        linkElement.textContent = post.link.length > 50 ? post.link.substring(0, 50) + '...' : post.link;
        textElem.appendChild(linkElement);
        postElement.appendChild(textElem);

        const linkElementContainer = document.createElement('div');
        linkElementContainer.setAttribute("class", "comment");
        const actionElement = document.createElement('a');
        actionElement.setAttribute("class", "comment");
        actionElement.href = post.form;
        actionElement.textContent = "Action";
        actionElement.target = "_blank";
        linkElementContainer.appendChild(actionElement);
        const emailElement = document.createElement('a');
        emailElement.setAttribute("class", "comment");
        emailElement.href = post.mailto;
        emailElement.textContent = "Email";
        emailElement.target = "_blank";
        linkElementContainer.appendChild(emailElement);
        postElement.appendChild(linkElementContainer);
        const e = document.createElement('div');
        e.setAttribute("class", "clear");
        postElement.appendChild(e);

        const relevancyContainer = document.createElement('div');
        const relevancyValElem = document.createElement('p');
        relevancyValElem.textContent = "Relevancy " + post.relevancy;
        relevancyContainer.appendChild(relevancyValElem);
        post.topK.forEach((sub) => {
          const topKElem = document.createElement('a');
          topKElem.setAttribute("class", "topK");
          topKElem.href = sub.link;
          topKElem.textContent = sub.title + " (" + sub.similarity + ")";
          topKElem.target = "_blank";
          relevancyContainer.appendChild(topKElem);
        });
        postElement.appendChild(relevancyContainer);
        return postElement;
      }
      function loadPosts() {
        // Simulate loading more posts
        posts.forEach((post) => {
          const postElement = createPostElement(post);
          content.appendChild(postElement);
        });
      }
      // Load initial posts
      loadPosts();
    </script>

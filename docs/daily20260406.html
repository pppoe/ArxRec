{"title": "Analysis of Invasive Breast Cancer in Mammograms Using YOLO, Explainability, and Domain Adaptation", "author": "Jayan Adhikari and Prativa Joshi and Sushish Baral", "abstract": "Deep learning models for breast cancer detection from mammographic images have significant reliability problems when presented with Out-of-Domain (OOD) inputs such as other imaging modalities (CT, MRI, X-ray) or equipment variations, leading to unreliable detection and misdiagnosis. The current research mitigates the fundamental OOD issue through a comprehensive approach integrating ResNet50-based OOD filtering with YOLO architectures (YOLOv8, YOLOv11, YOLOv12) for accurate detection of breast cancer. Our strategy establishes an in-domain gallery via cosine similarity to rigidly reject non-mammographic inputs prior to processing, ensuring that only domain-associated images supply the detection pipeline. The OOD detection component achieves 99.77\\% general accuracy with immaculate 100\\% accuracy on OOD test sets, effectively eliminating irrelevant imaging modalities. ResNet50 was selected as the optimum backbone after 12 CNN architecture searches. The joint framework unites OOD robustness with high detection performance (mAP@0.5: 0.947) and enhanced interpretability through Grad-CAM visualizations. Experimental validation establishes that OOD filtering significantly improves system reliability by preventing false alarms on out-of-distribution inputs while maintaining higher detection accuracy on mammographic data. The present study offers a fundamental foundation for the deployment of reliable AI-based breast cancer detection systems in diverse clinical environments with inherent data heterogeneity.", "link": "http://arxiv.org/abs/2512.00129v2", "date": "2026-04-03", "relevancy": 2.0115, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5138}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5053}, {"title": "DDM-NET: End-to-end learning of keypoint feature Detection, Description and Matching for 3D localization", "link": "https://arxiv.org/abs/2212.04575", "similarity": 0.4961}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Analysis%20of%20Invasive%20Breast%20Cancer%20in%20Mammograms%20Using%20YOLO%2C%20Explainability%2C%20and%20Domain%20Adaptation&body=Title%3A%20Analysis%20of%20Invasive%20Breast%20Cancer%20in%20Mammograms%20Using%20YOLO%2C%20Explainability%2C%20and%20Domain%20Adaptation%0AAuthor%3A%20Jayan%20Adhikari%20and%20Prativa%20Joshi%20and%20Sushish%20Baral%0AAbstract%3A%20Deep%20learning%20models%20for%20breast%20cancer%20detection%20from%20mammographic%20images%20have%20significant%20reliability%20problems%20when%20presented%20with%20Out-of-Domain%20%28OOD%29%20inputs%20such%20as%20other%20imaging%20modalities%20%28CT%2C%20MRI%2C%20X-ray%29%20or%20equipment%20variations%2C%20leading%20to%20unreliable%20detection%20and%20misdiagnosis.%20The%20current%20research%20mitigates%20the%20fundamental%20OOD%20issue%20through%20a%20comprehensive%20approach%20integrating%20ResNet50-based%20OOD%20filtering%20with%20YOLO%20architectures%20%28YOLOv8%2C%20YOLOv11%2C%20YOLOv12%29%20for%20accurate%20detection%20of%20breast%20cancer.%20Our%20strategy%20establishes%20an%20in-domain%20gallery%20via%20cosine%20similarity%20to%20rigidly%20reject%20non-mammographic%20inputs%20prior%20to%20processing%2C%20ensuring%20that%20only%20domain-associated%20images%20supply%20the%20detection%20pipeline.%20The%20OOD%20detection%20component%20achieves%2099.77%5C%25%20general%20accuracy%20with%20immaculate%20100%5C%25%20accuracy%20on%20OOD%20test%20sets%2C%20effectively%20eliminating%20irrelevant%20imaging%20modalities.%20ResNet50%20was%20selected%20as%20the%20optimum%20backbone%20after%2012%20CNN%20architecture%20searches.%20The%20joint%20framework%20unites%20OOD%20robustness%20with%20high%20detection%20performance%20%28mAP%400.5%3A%200.947%29%20and%20enhanced%20interpretability%20through%20Grad-CAM%20visualizations.%20Experimental%20validation%20establishes%20that%20OOD%20filtering%20significantly%20improves%20system%20reliability%20by%20preventing%20false%20alarms%20on%20out-of-distribution%20inputs%20while%20maintaining%20higher%20detection%20accuracy%20on%20mammographic%20data.%20The%20present%20study%20offers%20a%20fundamental%20foundation%20for%20the%20deployment%20of%20reliable%20AI-based%20breast%20cancer%20detection%20systems%20in%20diverse%20clinical%20environments%20with%20inherent%20data%20heterogeneity.%0ALink%3A%20http%3A//arxiv.org/abs/2512.00129v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAnalysis%2520of%2520Invasive%2520Breast%2520Cancer%2520in%2520Mammograms%2520Using%2520YOLO%252C%2520Explainability%252C%2520and%2520Domain%2520Adaptation%26entry.906535625%3DJayan%2520Adhikari%2520and%2520Prativa%2520Joshi%2520and%2520Sushish%2520Baral%26entry.1292438233%3DDeep%2520learning%2520models%2520for%2520breast%2520cancer%2520detection%2520from%2520mammographic%2520images%2520have%2520significant%2520reliability%2520problems%2520when%2520presented%2520with%2520Out-of-Domain%2520%2528OOD%2529%2520inputs%2520such%2520as%2520other%2520imaging%2520modalities%2520%2528CT%252C%2520MRI%252C%2520X-ray%2529%2520or%2520equipment%2520variations%252C%2520leading%2520to%2520unreliable%2520detection%2520and%2520misdiagnosis.%2520The%2520current%2520research%2520mitigates%2520the%2520fundamental%2520OOD%2520issue%2520through%2520a%2520comprehensive%2520approach%2520integrating%2520ResNet50-based%2520OOD%2520filtering%2520with%2520YOLO%2520architectures%2520%2528YOLOv8%252C%2520YOLOv11%252C%2520YOLOv12%2529%2520for%2520accurate%2520detection%2520of%2520breast%2520cancer.%2520Our%2520strategy%2520establishes%252 {"title": "Co-Evolution of Policy and Internal Reward for Language Agents", "author": "Xinyu Wang and Hanwei Wu and Jingwei Song and Shuyuan Zhang and Jiayi Zhang and Fanqi Kong and Tung Sum Thomas Kwok and Xiao-Wen Chang and Yuyu Luo and Chenglin Wu and Bang Liu", "abstract": "Large language model (LLM) agents learn by interacting with environments, but long-horizon training remains fundamentally bottlenecked by sparse and delayed rewards. Existing methods typically address this challenge through post-hoc credit assignment or external reward models, which provide limited guidance at inference time and often separate reward improvement from policy improvement. We propose Self-Guide, a self-generated internal reward for language agents that supports both inference-time guidance and training-time supervision. Specifically, the agent uses Self-Guide as a short self-guidance signal to steer the next action during inference, and converts the same signal into step-level internal reward for denser policy optimization during training. This creates a co-evolving loop: better policy produces better guidance, and better guidance further improves policy as internal reward. Across three agent benchmarks, inference-time self-guidance already yields clear gains, while jointly evolving policy and internal reward with GRPO brings further improvements (8\\%) over baselines trained solely with environment reward. Overall, our results suggest that language agents can improve not only by collecting more experience, but also by learning to generate and refine their own internal reward during acting and learning.", "link": "http://arxiv.org/abs/2604.03098v1", "date": "2026-04-03", "relevancy": 2.0059, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5251}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4947}, {"title": "You' %20internal%20reward%20with%20GRPO%20brings%20further%20improvements%20%288%5C%25%29%20over%20baselines%20trained%20solely%20with%20environment%20reward.%20Overall%2C%20our%20results%20suggest%20that%20language%20agents%20can%20improve%20not%20only%20by%20collecting%20more%20experience%2C%20but%20also%20by%20learning%20to%20generate%20and%20refine%20their%20own%20internal%20reward%20during%20acting%20and%20learning.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03098v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DCo-Evolution%2520of%2520Policy%2520and%2520Internal%2520Reward%2520for%2520Language%2520Agents%26entry.906535625%3DXinyu%2520Wang%2520and%2520Hanwei%2520Wu%2520and%2520Jingwei%2520Song%2520and%2520Shuyuan%2520Zhang%2520and%2520Jiayi%2520Zhang%2520and%2520Fanqi%2520Kong%2520and%2520Tung%2520Sum%2520Thomas%2520Kwok%2520and%2520Xiao-Wen%2520Chang%2520and%2520Yuyu%2520Luo%2520and%2520Chenglin%2520Wu%2520and%2520Bang%2520Liu%26entry.1292438233%3DLarge%2520language%2520model%2520%2528LLM%2529%2520agents%2520learn%2520by%2520interacting%2520with%2520environments%252C%2520but%2520long-horizon%2520training%2520remains%2520fundamentally%2520bottlenecked%2520by%2520sparse%2520and%2520delayed%2520rewards.%2520Existing%2520methods%2520typically%2520address%2520this%2520challenge%2520through%2520post-hoc%2520credit%2520assignment%2520or%2520external%2520reward%2520models%252C%2520which%2520provide%2520limited%2520guidance%2520at%2520inference%2520time%2520and%2520often%2520separate%2520reward%2520improvement%2520from%2520policy%2520improvement.%2520We%2520propose%2520Self-Guide%252C%2520a%2520self-generated%2520internal%2520reward%2520for%2520language%2520agents%2520that%2520supports%2520both%2520inference-time%2520guidance%2520and%2520training-time%2520supervision.%2520Specifically%252C%2520the%2520agent%2520uses%2520Self-Guide%2520as%2520a%2520short%2520self-guidance%2520signal%2520to%2 {"title": "STEAR: Layer-Aware Spatiotemporal Evidence Intervention for Hallucination Mitigation in Video Large Language Models", "author": "Linfeng Fan and Yuan Tian and Ziwei Li and Zhiwu Lu", "abstract": "Video Large Language Models (Video-LLMs) remain prone to spatiotemporal hallucinations, often generating visually unsupported details or incorrect temporal relations. Existing mitigation methods typically treat hallucination as a uniform decoding failure, applying globally shared correction rules. We instead observe that decoder layers contribute differently to visual grounding and later linguistic composition, indicating that intervention must be layer-aware. Based on this insight, we propose STEAR, a layer-aware spatiotemporal evidence intervention framework. STEAR identifies high-risk decoding steps and selects token-conditioned visual evidence from grounding-sensitive middle layers. It uses this shared evidence for two coupled purposes: restoring missing local grounding in middle layers, and constructing temporally perturbed patch-level counterfactuals to falsify inconsistent reasoning during late-layer decoding. Consequently, STEAR mitigates both spatial and temporal hallucinations within an efficient single-encode inference framework. Experiments across representative Video-LLM backbones and challenging benchmarks demonstrate that STEAR consistently reduces hallucinations while improving faithfulness, temporal consistency, and robustness. Our results confirm that reliable video decoding relies on intervening on precise evidence at the right layer, rather than enforcing a global penalty. The code is provided in the Supplementary Material.", "link": "http://arxiv.org/abs/2604.03045v1", "date": "2026-04-03", "relevancy": 1.9946, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5266}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4931}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4931}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20STEAR%3A%20Layer-Aware%20Spatiotemporal%20Evidence%20Intervention%20for%20Hallucination%20Mitigation%20in%20Video%20Large%20Language%20Models&body=Title%3A%20STEAR%3A%20Layer-Aware%20Spatiotemporal%20Evidence%20Intervention%20for%20Hallucination%20Mitigation%20in%20Video%20Large%20Language%20Models%0AAuthor%3A%20Linfeng%20Fan%20and%20Yuan%20Tian%20and%20Ziwei%20Li%20and%20Zhiwu%20Lu%0AAbstract%3A%20Video%20Large%20Language%20Models%20%28Video-LLMs%29%20remain%20prone%20to%20spatiotemporal%20hallucinations%2C%20often%20generating%20visually%20unsupported%20details%20or%20incorrect%20temporal%20relations.%20Existing%20mitigation%20methods%20typically%20treat%20hallucination%20as%20a%20uniform%20decoding%20failure%2C%20applying%20globally%20shared%20correction%20rules.%20We%20instead%20observe%20that%20decoder%20layers%20contribute%20differently%20to%20visual%20grounding%20and%20later%20linguistic%20composition%2C%20indicating%20that%20intervention%20must%20be%20layer-aware.%20Based%20on%20this%20insight%2C%20we%20propose%20STEAR%2C%20a%20layer-aware%20spatiotemporal%20evidence%20intervention%20framework.%20STEAR%20identifies%20high-risk%20decoding%20steps%20and%20selects%20token-conditioned%20visual%20evidence%20from%20grounding-sensitive%20middle%20layers.%20It%20uses%20this%20shared%20evidence%20for%20two%20coupled%20purposes%3A%20restoring%20missing%20local%20grounding%20in%20middle%20layers%2C%20and%20constructing%20temporally%20perturbed%20patch-level%20counterfactuals%20to%20falsify%20inconsistent%20reasoning%20during%20late-layer%20decoding.%20Consequently%2C%20STEAR%20mitigates%20both%20spatial%20and%20temporal%20hallucinations%20within%20an%20efficient%20single-encode%20inference%20framework.%20Experiments%20across%20representative%20Video-LLM%20backbones%20and%20challenging%20benchmarks%20demonstrate%20that%20STEAR%20consistently%20reduces%20hallucinations%20while%20improving%20faithfulness%2C%20temporal%20consistency%2C%20and%20robustness.%20Our%20results%20confirm%20that%20reliable%20video%20decoding%20relies%20on%20intervening%20on%20precise%20evidence%20at%20the%20right%20layer%2C%20rather%20than%20enforcing%20a%20global%20penalty.%20The%20code%20is%20provided%20in%20the%20Supplementary%20Material.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03045v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSTEAR%253A%2520Layer-Aware%2520Spatiotemporal%2520Evidence%2520Intervention%2520for%2520Hallucination%2520Mitigation%2520in%2520Video%2520Large%2520Language%2520Models%26entry.906535625%3DLinfeng%2520Fan%2520and%2520Yuan%2520Tian%2520and%2520Ziwei%2520Li%2520and%2520Zhiwu%2520Lu%26entry.1292438233%3DVideo%2520Large%2520Language%2520Models%2520%2528Video-LLMs%2529%2520remain%2520prone%2520to%2520spatiotemporal%2520hallucinations%252C%2520often%2520generating%2520visually%2520unsupported%2520details%2520or%2520incorrect%2520temporal%2520relations.%2520Existing%2520mitigation%2520methods%2520typically%2520treat%2520hallucination%2520as%2520a%2520uniform%2520decoding%2520failure%252C%2520applying%2520globally%2520shared%2520correction%2520rules.%2520We%2520instead%2520observe%2520that%2520decoder%2520layers%2520contribute%2520differently%2520to%2520visual%2520grounding%2520and%2520later%2520linguistic%2520composition%252C%2520indicating%2520that%2520intervention%2520must%2520be%2520layer-aware.%2520Based%2520on%2520this%2520insight%252C%2520we%2520propose%2520STEAR%252C%2520a%2520layer-aware%2520spatiotemporal%2520evidence%2520intervention%2520framework.%2520STEAR%2520identifies%2520high-risk%2520decoding%2520steps {"title": "Learning the Signature of Memorization in Autoregressive Language Models", "author": "David Ili\u0107 and Kostadin Cvejoski and David Stanojevi\u0107 and Evgeny Grigorenko", "abstract": "All prior membership inference attacks for fine-tuned language models use hand-crafted heuristics (e.g., loss thresholding, Min-K\\%, reference calibration), each bounded by the designer's intuition. We introduce the first transferable learned attack, enabled by the observation that fine-tuning any model on any corpus yields unlimited labeled data, since membership is known by construction. This removes the shadow model bottleneck and brings membership inference into the deep learning era: learning what matters rather than designing it, with generalization through training diversity and scale. We discover that fine-tuning language models produces an invariant signature of memorization detectable across architectural families and data domains. We train a membership inference classifier exclusively on transformer-based models. It transfers zero-shot to Mamba (state-space), RWKV-4 (linear attention), and RecurrentGemma (gated recurrence), achieving 0.963, 0.972, and 0.936 AUC respectively. Each evaluation combines an architecture and dataset never seen during training, yet all three exceed performance on held-out transformers (0.908 AUC). These four families share no computational mechanisms, their only commonality is gradient descent on cross-entropy loss. Even simple likelihood-based methods exhibit strong transfer, confirming the signature exists independently of the detection method. Our method, Learned Transfer MIA (LT-MIA), captures this signal most effectively by reframing membership inference as sequence classification over per-token distributional statistics. On transformers, LT-MIA achieves 2.8$\\times$ higher TPR at 0.1\\% FPR than the strongest baseline. The method also transfers to code (0.865 AUC) despite training only on natural language texts. Code and trained classifier available at https://github.com/JetBrains-Research/learned-mia.", "link": "http://arxiv.org/abs/2604.03199v1", "date": "2026-04-03", "relevancy": 1.9937, "topK": [{"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5072}, {"title": "Breadcrumbs: Adversarial class-balanced sampling for long-tailed recognition", "link": "https://link.springer.com/chapter/10.1007/978-3-031-20053-3_37", "similarity": 0.4947}, {"title": "Scaling Rectified Flow Transformers for High-Resolution Image Synthesis", "link": "http://arxiv.org/abs/2403.03206v1", "similarity": 0.4858}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Learning%20the%20Signature%20of%20Memorization%20in%20Autoregressive%20Language%20Models&body=Title%3A%20Learning%20the%20Signature%20of%20Memorization%20in%20Autoregressive%20Language%20Models%0AAuthor%3A%20David%20Ili%C4%87%20and%20Kostadin%20Cvejoski%20and%20David%20Stanojevi%C4%87%20and%20Evgeny%20Grigorenko%0AAbstract%3A%20All%20prior%20membership%20inference%20attacks%20for%20fine-tuned%20language%20models%20use%20hand-crafted%20heuristics%20%28e.g.%2C%20loss%20thresholding%2C%20Min-K%5C%25%2C%20reference%20calibration%29%2C%20each%20bounded%20by%20the%20designer%27s%20intuition.%20We%20introduce%20the%20first%20transferable%20learned%20attack%2C%20enabled%20by%20the%20observation%20that%20fine-tuning%20any%20model%20on%20any%20corpus%20yields%20unlimited%20labeled%20data%2C%20since%20membership%20is%20known%20by%20construction.%20This%20removes%20the%20shadow%20model%20bottleneck%20and%20brings%20membership%20inference%20into%20the%20deep%20learning%20era%3A%20learning%20what%20matters%20rather%20than%20designing%20it%2C%20with%20generalization%20through%20training%20diversity%20and%20scale.%20We%20discover%20that%20fine-tuning%20language%20models%20produces%20an%20invariant%20signature%20of%20memorization%20detectable%20across%20architectural%20families%20and%20data%20domains.%20We%20train%20a%20membership%20inference%20classifier%20exclusively%20on%20transformer-based%20models.%20It%20transfers%20zero-shot%20to%20Mamba%20%28state-space%29%2C%20RWKV-4%20%28linear%20attention%29%2C%20and%20RecurrentGemma%20%28gated%20recurrence%29%2C%20achieving%200.963%2C%200.972%2C%20and%200.936%20AUC%20respectively.%20Each%20evaluation%20combines%20an%20architecture%20and%20dataset%20never%20seen%20during%20training%2C%20yet%20all%20three%20exceed%20performance%20on%20held-out%20transformers%20%280.908%20AUC%29.%20These%20four%20families%20share%20no%20computational%20mechanisms%2C%20their%20only%20commonality%20is%20gradient%20descent%20on%20cross-entropy%20loss.%20Even%20simple%20likelihood-based%20methods%20exhibit%20strong%20transfer%2C%20confirming%20the%20signature%20exists%20independently%20of%20the%20detection%20method.%20Our%20method%2C%20Learned%20Transfer%20MIA%20%28LT-MIA%29%2C%20captures%20this%20signal%20most%20effectively%20by%20reframing%20membership%20inference%20as%20sequence%20classification%20over%20per-token%20distributional%20statistics.%20On%20transformers%2C%20LT-MIA%20achieves%202.8%24%5Ctimes%24%20higher%20TPR%20at%200.1%5C%25%20FPR%20than%20the%20strongest%20baseline.%20The%20method%20also%20transfers%20to%20code%20%280.865%20AUC%29%20despite%20training%20only%20on%20natural%20language%20texts.%20Code%20and%20trained%20classifier%20available%20at%20https%3A//github.com/JetBrains-Research/learned-mia.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03199v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DLearning%2520the%2520Signature%2520of%2520Memorization%2520in%2520Autoregressive%2520Language%2520Models%26entry.906535625%3DDavid%2520Ili%25C4%2587%2520and%2520Kostadin%2520Cvejoski%2520and%2520David%2520Stanojevi%25C4%2587%2520and%2520Evgeny%2520Grigorenko%26entry.1292438233%3DAll%2520prior%2520membership%2520inf {"title": "AgentHazard: A Benchmark for Evaluating Harmful Behavior in Computer-Use Agents", "author": "Yunhao Feng and Yifan Ding and Yingshui Tan and Xingjun Ma and Yige Li and Yutao Wu and Yifeng Gao and Kun Zhai and Yanming Guo", "abstract": "Computer-use agents extend language models from text generation to persistent action over tools, files, and execution environments. Unlike chat systems, they maintain state across interactions and translate intermediate outputs into concrete actions. This creates a distinct safety challenge in that harmful behavior may emerge through sequences of individually plausible steps, including intermediate actions that appear locally acceptable but collectively lead to unauthorized actions. We present \\textbf{AgentHazard}, a benchmark for evaluating harmful behavior in computer-use agents. AgentHazard contains \\textbf{2,653} instances spanning diverse risk categories and attack strategies. Each instance pairs a harmful objective with a sequence of operational steps that are locally legitimate but jointly induce unsafe behavior. The benchmark evaluates whether agents can recognize and interrupt harm arising from accumulated context, repeated tool use, intermediate actions, and dependencies across steps. We evaluate AgentHazard on Claude Code, OpenClaw, and IFlow using mostly open or openly deployable models from the Qwen3, Kimi, GLM, and DeepSeek families. Our experimental results indicate that current systems remain highly vulnerable. In particular, when powered by Qwen3-Coder, Claude Code exhibits an attack success rate of \\textbf{73.63\\%}, suggesting that model alignment alone does not reliably guarantee the safety of autonomous agents.", "link": "http://arxiv.org/abs/2604.02947v1", "date": "2026-04-03", "relevancy": 1.991, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.5164}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4996}, {"title": "Genie: Generative Interactive Environments", "link": "http://arxiv.org/abs/2402.15391v1", "similarity": 0.4784}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20AgentHazard%3A%20A%20Benchmark%20for%20Evaluating%20Harmful%20Behavior%20in%20Computer-Use%20Agents&body=Title%3A%20AgentHazard%3A%20A%20Benchmark%20for%20Evaluating%20Harmful%20Behavior%20in%20Computer-Use%20Agents%0AAuthor%3A%20Yunhao%20Feng%20and%20Yifan%20Ding%20and%20Yingshui%20Tan%20and%20Xingjun%20Ma%20and%20Yige%20Li%20and%20Yutao%20Wu%20and%20Yifeng%20Gao%20and%20Kun%20Zhai%20and%20Yanming%20Guo%0AAbstract%3A%20Computer-use%20agents%20extend%20language%20models%20from%20text%20generation%20to%20persistent%20action%20over%20tools%2C%20files%2C%20and%20execution%20environments.%20Unlike%20chat%20systems%2C%20they%20maintain%20state%20across%20interactions%20and%20translate%20intermediate%20outputs%20into%20concrete%20actions.%20This%20creates%20a%20distinct%20safety%20challenge%20in%20that%20harmful%20behavior%20may%20emerge%20through%20sequences%20of%20individually%20plausible%20steps%2C%20including%20intermediate%20actions%20that%20appear%20locally%20acceptable%20but%20collectively%20lead%20to%20unauthorized%20actions.%20We%20present%20%5Ctextbf%7BAgentHazard%7D%2C%20a%20benchmark%20for%20evaluating%20harmful%20behavior%20in%20computer-use%20agents.%20AgentHazard%20contains%20%5Ctextbf%7B2%2C653%7D%20instances%20spanning%20diverse%20risk%20categories%20and%20attack%20strategies.%20Each%20instance%20pairs%20a%20harmful%20objective%20with%20a%20sequence%20of%20operational%20steps%20that%20are%20locally%20legitimate%20but%20jointly%20induce%20unsafe%20behavior.%20The%20benchmark%20evaluates%20whether%20agents%20can%20recognize%20and%20interrupt%20harm%20arising%20from%20accumulated%20context%2C%20repeated%20tool%20use%2C%20intermediate%20actions%2C%20and%20dependencies%20across%20steps.%20We%20evaluate%20AgentHazard%20on%20Claude%20Code%2C%20OpenClaw%2C%20and%20IFlow%20using%20mostly%20open%20or%20openly%20deployable%20models%20from%20the%20Qwen3%2C%20Kimi%2C%20GLM%2C%20and%20DeepSeek%20families.%20Our%20experimental%20results%20indicate%20that%20current%20systems%20remain%20highly%20vulnerable.%20In%20particular%2C%20when%20powered%20by%20Qwen3-Coder%2C%20Claude%20Code%20exhibits%20an%20attack%20success%20rate%20of%20%5Ctextbf%7B73.63%5C%25%7D%2C%20suggesting%20that%20model%20alignment%20alone%20does%20not%20reliably%20guarantee%20the%20safety%20of%20autonomous%20agents.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02947v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DAgentHazard%253A%2520A%2520Benchmark%2520for%2520Evaluating%2520Harmful%2520Behavior%2520in%2520Computer-Use%2520Agents%26entry.906535625%3DYunhao%2520Feng%2520and%2520Yifan%2520Ding%2520and%2520Yingshui%2520Tan%2520and%2520Xingjun%2520Ma%2520and%2520Yige%2520Li%2520and%2520Yutao%2520Wu%2520and%2520Yifeng%2520Gao%2520and%2520Kun%2520Zhai%2520and%2520Yanming%2520Guo%26entry.1292438233%3DComputer-use%2520agents%2520extend%2520language%2520models%2520from%2520text%2520generation%2520to%2520persistent%2520action%2520over%2520tools%252C%2520files%252C%2520and%2520execution%2520environments.%2520Unlike%2520chat%2520systems%252C%2520they%2520maintain%2520state%2520across%2520interactions%2520and%2520translate%2520intermediate%2520outputs%2520into%2520concrete%2520actions.%2520This%2520creates%2520a%2520distinct%2520safety%2520challenge%2520in%2520that%2520harmful%2520behavior%2520may%2520emerge%2520through%2520sequences%2520of%2520individually%2520plausible%2520steps%252C%2520including%2520intermediate%2520actions%2520that%2520appear%2520locally%2520acceptable%2520but%2520collectively%2520lead%2520to%2520unauthorized%2520actions.%2520We%2520present%2520%255Ctextbf%257B {"title": "LMask: Learn to Solve Constrained Routing Problems with Lazy Masking", "author": "Tianyou Li and Haijun Zou and Jiayuan Wu and Zaiwen Wen", "abstract": "Routing problems are canonical combinatorial optimization tasks with wide-ranging applications in logistics, transportation, and supply chain management. However, solving these problems becomes significantly more challenging when complex constraints are involved. In this paper, we propose LMask, a novel learning framework that utilizes dynamic masking to generate high-quality feasible solutions for constrained routing problems. LMask introduces the LazyMask decoding method, which lazily refines feasibility masks with the backtracking mechanism. In addition, it employs the refinement intensity embedding to encode the search trace into the model, mitigating representation ambiguities induced by backtracking. To further reduce sampling cost, LMask sets a backtracking budget during decoding, while constraint violations are penalized in the loss function during training to counteract infeasibility caused by this budget. We provide theoretical guarantees for the validity and probabilistic optimality of our approach. Extensive experiments on the traveling salesman problem with time windows (TSPTW) and TSP with draft limits (TSPDL) demonstrate that LMask achieves state-of-the-art feasibility rates and solution quality, outperforming existing neural methods.", "link": "http://arxiv.org/abs/2505.17938v2", "date": "2026-04-03", "relevancy": 1.981, "topK": [{"title": "Thinking Outside the BBox: Unconstrained Generative Object Compositing", "link": "http://arxiv.org/abs/2409.04559v2", "similarity": 0.51}, {"title": "uPLAM: Robust Panoptic Localization and Mapping Leveraging Perception\n  Uncertainties", "link": "http://arxiv.org/abs/2402.05840v1", "similarity": 0.4938}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4908}], "m {"title": "Prompt Compression in the Wild: Measuring Latency, Rate Adherence, and Quality for Faster LLM Inference", "author": "Cornelius Kummer and Lena Jurkschat and Michael F\u00e4rber and Sahar Vahdati", "abstract": "With the wide adoption of language models for IR -- and specifically RAG systems -- the latency of the underlying LLM becomes a crucial bottleneck, since the long contexts of retrieved passages lead large prompts and therefore, compute increase. Prompt compression, which reduces the size of input prompts while aiming to preserve performance on downstream tasks, has established itself as a cost-effective and low-latency method for accelerating inference in large language models. However, its usefulness depends on whether the additional preprocessing time during generation is offset by faster decoding. We present the first systematic, large-scale study of this trade-off, with thousands of runs and 30,000 queries across several open-source LLMs and three GPU classes. Our evaluation separates compression overhead from decoding latency while tracking output quality and memory usage. LLMLingua achieves up to 18% end-to-end speed-ups, when prompt length, compression ratio, and hardware capacity are well matched, with response quality remaining statistically unchanged across summarization, code generation, and question answering tasks. Outside this operating window, however, the compression step dominates and cancels out the gains. We also show that effective compression can reduce memory usage enough to offload workloads from data center GPUs to commodity cards, with only a 0.3s increase in latency. Our open-source profiler predicts the latency break-even point for each model-hardware setup, providing practical guidance on when prompt compression delivers real-world benefits.", "link": "http://arxiv.org/abs/2604.02985v1", "date": "2026-04-03", "relevancy": 1.9793, "topK": [{"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", {"title": "Domain-Adapted Retrieval for In-Context Annotation of Pedagogical Dialogue Acts", "author": "Jinsook Lee and Kirk Vanacore and Zhuqian Zhou and Bakhtawar Ahtisham and Rene F. Kizilcec", "abstract": "Automated annotation of pedagogical dialogue is a high-stakes task where LLMs often fail without sufficient domain grounding. We present a domain-adapted RAG pipeline for tutoring move annotation. Rather than fine-tuning the generative model, we adapt retrieval by fine-tuning a lightweight embedding model on tutoring corpora and indexing dialogues at the utterance level to retrieve labeled few-shot demonstrations. Evaluated across two real tutoring dialogue datasets (TalkMoves and Eedi) and three LLM backbones (GPT-5.2, Claude Sonnet 4.6, Qwen3-32b), our best configuration achieves Cohen's $\u03ba$ of 0.526-0.580 on TalkMoves and 0.659-0.743 on Eedi, substantially outperforming no-retrieval baselines ($\u03ba= 0.275$-$0.413$ and $0.160$-$0.410$). An ablation study reveals that utterance-level indexing, rather than embedding quality alone, is the primary driver of these gains, with top-1 label match rates improving from 39.7\\% to 62.0\\% on TalkMoves and 52.9\\% to 73.1\\% on Eedi under domain-adapted retrieval. Retrieval also corrects systematic label biases present in zero-shot prompting and yields the largest improvements for rare and context-dependent labels. These findings suggest that adapting the retrieval component alone is a practical and effective path toward expert-level pedagogical dialogue annotation while keeping the generative model frozen.", "link": "http://arxiv.org/abs/2604.03127v1", "date": "2026-04-03", "relevancy": 1.9718, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5209}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.5106}, {"title": "Lexicon3D: Probing Visual Foundation Models for Complex 3D Scene\n  Understanding", "link": "http://arxiv.org/abs/2409.03757v1", "similarity": 0.4641}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Domain-Adapted%20Retrieval%20for%20In-Context%20Annotation%20of%20Pedagogical%20Dialogue%20Acts&body=Title%3A%20Domain-Adapted%20Retrieval%20for%20In-Context%20Annotation%20of%20Pedagogical%20Dialogue%20Acts%0AAuthor%3A%20Jinsook%20Lee%20and%20Kirk%20Vanacore%20and%20Zhuqian%20Zhou%20and%20Bakhtawar%20Ahtisham%20and%20Rene%20F.%20Kizilcec%0AAbstract%3A%20Automated%20annotation%20of%20pedagogical%20dialogue%20is%20a%20high-stakes%20task%20where%20LLMs%20often%20fail%20without%20sufficient%20domain%20grounding.%20We%20present%20a%20domain-adapted%20RAG%20pipeline%20for%20tutoring%20move%20annotation.%20Rather%20than%20fine-tuning%20the%20generative%20model%2C%20we%20adapt%20retrieval%20by%20fine-tuning%20a%20lightweight%20embedding%20model%20on%20tutoring%20corpora%20and%20indexing%20dialogues%20at%20the%20utterance%20level%20to%20retrieve%20labeled%20few-shot%20demonstrations.%20Evaluated%20across%20two%20real%20tutoring%20dialogue%20datasets%20%28TalkMoves%20and%20Eedi%29%20and%20three%20LLM%20backbones%20%28GPT-5.2%2C%20Claude%20Sonnet%204.6%2C%20Qwen3-32b%29%2C%20our%20best%20configuration%20achieves%20Cohen%27s%20%24%CE%BA%24%20of%200.526-0.580%20on%20TalkMoves%20and%200.659-0.743%20on%20Eedi%2C%20substantially%20outperforming%20no-retrieval%20baselines%20%28%24%CE%BA%3D%200.275%24-%240.413%24%20and%20%240.160%24-%240.410%24%29.%20An%20ablation%20study%20reveals%20that%20utterance-level%20indexing%2C%20rather%20than%20embedding%20quality%20alone%2C%20is%20the%20primary%20driver%20of%20these%20gains%2C%20with%20top-1%20label%20match%20rates%20improving%20from%2039.7%5C%25%20to%2062.0%5C%25%20on%20TalkMoves%20and%2052.9%5C%25%20to%2073.1%5C%25%20on%20Eedi%20under%20domain-adapted%20retrieval.%20Retrieval%20also%20corrects%20systematic%2 {"title": "Beyond Isolated Tasks: A Framework for Evaluating Coding Agents on Sequential Software Evolution", "author": "KN Ajay Shastry and Ganesh Senrayan and Shrey Satapara and Pranoy Panda and Chaitanya Devaguptapu", "abstract": "Existing datasets for coding agents evaluate performance on isolated, single pull request (PR) tasks in a stateless manner, failing to capture the reality of real-world software development where code changes accumulate, technical debt accrues, and test suites grow over time. To bridge this gap, we introduce an automated coding task generation framework, which helps generate our dataset SWE-STEPS, that evaluates coding agents on long-horizon tasks through two realistic settings mirroring actual developer workflows: Conversational coding with iterative requests, and single-shot Project Requirement document (PRD)-based coding. Unlike existing datasets that evaluate agents on disjointed Pull Requests (PRs), our framework assesses performance across chains of dependent PRs, enabling evaluation of sequential execution, regression verification, and long-term repository health. We discover that widely used isolated PR evaluations yield inflated success rates, w.r.t. our settings - overshooting performance by as much as 20 percentage points - because they ignore the ``spillover'' effects of previous inefficient or buggy code. Furthermore, our analysis reveals that even when agents successfully resolve issues, they degrade repository health by generating code with higher cognitive complexity and technical debt compared to human developers, underscoring the necessity for multidimensional evaluation.", "link": "http://arxiv.org/abs/2604.03035v1", "date": "2026-04-03", "relevancy": 1.9561, "topK": [{"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.5055}, {"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4877}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4838}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Beyond%20Isolated%20Tasks%3A%20A%20Framework%20for%20Evaluating%20Coding%20Agents%20on%20Sequential%20Software%20Evolution&body=Title%3A%20Beyond%20Isolated%20Tasks%3A%20A%20Framework%20for%20Evaluating%20Coding%20Agents%20on%20Sequential%20Software%20Evolution%0AAuthor%3A%20KN%20Ajay%20Shastry%20and%20Ganesh%20Senrayan%20and%20Shrey%20Satapara%20and%20Pranoy%20Panda%20and%20Chaitanya%20Devaguptapu%0AAbstract%3A%20Existing%20datasets%20for%20coding%20agents%20evaluate%20performance%20on%20isolated%2C%20single%20pull%20request%20%28PR%29%20tasks%20in%20a%20stateless%20manner%2C%20failing%20to%20capture%20the%20reality%20of%20real-world%20software%20development%20where%20code%20changes%20accumulate%2C%20technical%20debt%20accrues%2C%20and%20test%20suites%20grow%20over%20time.%20To%20bridge%20this%20gap%2C%20we%20introduce%20an%20automated%20coding%20task%20generation%20framework%2C%20which%20helps%20generate%20our%20dataset%20SWE-STEPS%2C%20that%20evaluates%20coding%20agents%20on%20long-horizon%20tasks%20through%20two%20realistic%20settings%20mirroring%20actual%20developer%20workflows%3A%20Conversational%20coding%20with%20iterative%20requests%2C%20and%20single-shot%20Project%20Requirement%20document%20%28PRD%29-based%20coding.%20Unlike%20existing%20datasets%20that%20evaluate%20agents%20on%20disjointed%20Pull%20Requests%20%28PRs%29%2C%20our%20framework%20assesses%20performance%20across%20chains%20of%20dependent%20PRs%2C%20enabling%20evaluation%20of%20sequential%20execution%2C%20regression%20verification%2C%20and%20long-term%20repository%20health.%20We%20discover%20that%20widely%20used%20isolated%20PR%20evaluations%20yield%20inflated%20success%20rates%2C%20w.r.t.%20our%20settings%20-%20overshooting%20performance%20by%20as%20much%20as%2020%20percentage%20points%20-%20because%20they%20ignore%20the%20%60%60spillover%27%27%20effects%20of%20previous%20inefficient%20or%20buggy%20code.%20Furthermore%2C%20our%20analysis%20reveals%20that%20even%20when%20agents%20successfully%20resolve%20issues%2C%20they%20degrade%20repository%20health%20by%20generating%20code%20with%20higher%20cognitive%20complexity%20and%20technical%20debt%20compared%20to%20human%20developers%2C%20underscoring%20the%20necessity%20for%20multidimensional%20evaluation.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03035v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DBeyond%2520Isolated%2520Tasks%253A%2520A%2520Framework%2520for%2520Evaluating%2520Coding%2520Agents%2520on%2520Sequential%2520Software%2520Evolution%26entry.906535625%3DKN%2520Ajay%2520Shastry%2520and%2520Ganesh%2520Senrayan%2520and%2520Shrey%2520Satapara%2520and%2520Pranoy%2520Panda%2520and%2520Chaitanya%2520Devaguptapu%26entry.1292438233%3DExisting%2520datasets%2520for%2520coding%2520agents%2520evaluate%2520performance%2520on%2520isolated%252C%2520single%2520pull%2520request%2520%2528PR%2529%2520tasks%2520in%2520a%2520stateless%2520manner%252C%2520failing%2520to%2520capture%2520the%2520reality%2520of%2520real-world%2520software%2520development%2520where%2520code%2520changes%2520accumulate%252C%2520technical%2520debt%2520accrues%252C%2520and%2520test%2520suites%2520grow%2520over%2520time.%2520To%2520bridge%2520this%2520gap%252C%2520we%2520introduce%2520an%2520automated%2520coding%2520task%2520generation%2520framework%252C%2520which%2520helps%2520generate%2520our%2520dataset%2520SWE-STEPS%252C%2520that%2520evaluates%2520coding%2520agents%2520on%2520long-horizon%2520tasks%2520through%2520two%2520realistic%2520settings%2520mirroring%2520actual%2520developer%2520workflows%253A%2520Conversational%2520coding%2520with%2520iterative%2520requests {"title": "Minimal Information Control Invariance via Vector Quantization", "author": "Ege Yuceel and Teodor Tchalakov and Sayan Mitra", "abstract": "Safety-critical autonomous systems must satisfy hard state constraints under tight computational and sensing budgets, yet learning-based controllers are often far more complex than safe operation requires. To formalize this gap, we study how many distinct control signals are needed to render a compact set forward invariant under sampled-data control, connecting the question to the information-theoretic notion of invariance entropy. We propose a vector-quantized autoencoder that jointly learns a state-space partition and a finite control codebook, and develop an iterative forward certification algorithm that uses Lipschitz-based reachable-set enclosures and sum-of-squares programming. On a 12-dimensional nonlinear quadrotor model, the learned controller achieves a $157\\times$ reduction in codebook size over a uniform grid baseline while preserving invariance, and we empirically characterize the minimum sensing resolution compatible with safe operation.", "link": "http://arxiv.org/abs/2604.03132v1", "date": "2026-04-03", "relevancy": 1.9424, "topK": [{"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4923}, {"title": "IAE: Implicit Autoencoder for Point Cloud Self-supervised Representation Learning", "link": "https://arxiv.org/abs/2201.00785", "similarity": 0.4913}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4772}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Minimal%20Information%20Control%20Invariance%20via%20Vector%20Quantization&body=Title%3A%20Minimal%20Information%20Control%20Invariance%20via%20Vector%20Quantization%0AAuthor%3A%20Ege%20Yuceel%20and%20Teodor%20Tchalakov% {"title": "JoyAI-LLM Flash: Advancing Mid-Scale LLMs with Token Efficiency", "author": "Aichen Cai and Anmeng Zhang and Anyu Li and Bo Zhang and Bohua Cai and Chang Li and Changjian Jiang and Changkai Lu and Chao Xue and Chaocai Liang and Cheng Zhang and Dongkai Liu and Fei Wang and Guoqiang Huang and Haijian Ke and Han Lin and Hao Wang and Ji Miao and Jiacheng Zhang and Jialong Shi and Jifeng Zhu and Jingjing Qian and Junhui Luo and Junwu Xiong and Lam So and Liang Huang and Ming Ke and Mingyang Li and Panfeng Shi and Peng Hao and Qi Wang and Qian Lai and Qiaoqiao Yuan and Qingyu Yin and Qiong Cao and Qixiang Wang and Rongcheng Bian and Rongduo Han and Shaoqiang Zheng and Shi Hu and Shi Suo and Shijie Ren and Shijin Zhang and Shiying Fan and Shuai Xie and Tianyi Zhang and Wei Liu and Wentao Tan and Xianghan Meng and Xiaodong He and Xing Pan and Xiran Wang and Xuyang Peng and Ya Zhang and Yang Liu and Yangyang Duan and Yanxu Chen and Yicheng Gong and Yidan Huang and Yifei Liu and Yinhao Bai and Yongqiang Liu and Yuesong Zhang and Yuqi Zhang and Zerui Xie and Zhenfang Wang and Zhennan Shen and Zheyuan Liu and Zhuwei Zeng", "abstract": "We introduce JoyAI-LLM Flash, an efficient Mixture-of-Experts (MoE) language model designed to redefine the trade-off between strong performance and token efficiency in the sub-50B parameter regime. JoyAI-LLM Flash is pretrained on a massive corpus of 20 trillion tokens and further optimized through a rigorous post-training pipeline, including supervised fine-tuning (SFT), Direct Preference Optimization (DPO), and large-scale reinforcement learning (RL) across diverse environments. To improve token efficiency, JoyAI-LLM Flash strategically balances \\emph{thinking} and \\emph{non-thinking} cognitive modes and introduces FiberPO, a novel RL algorithm inspired by fibration theory that decomposes trust-region maintenance into global and local components, providing unified multi-scale stability control for LLM policy optimization. To enhan {"title": "Self-Distilled RLVR", "author": "Chenxu Yang and Chuanyu Qin and Qingyi Si and Minghui Chen and Naibin Gu and Dingyu Yao and Zheng Lin and Weiping Wang and Jiaqi Wang and Nan Duan", "abstract": "On-policy distillation (OPD) has become a popular training paradigm in the LLM community. This paradigm selects a larger model as the teacher to provide dense, fine-grained signals for each sampled trajectory, in contrast to reinforcement learning with verifiable rewards (RLVR), which only obtains sparse signals from verifiable outcomes in the environment. Recently, the community has explored on-policy self-distillation (OPSD), where the same model serves as both teacher and student, with the teacher receiving additional privileged information such as reference answers to enable self-evolution. This paper demonstrates that learning signals solely derived from the privileged teacher result in severe information leakage and unstable long-term training. Accordingly, we identify the optimal niche for self-distillation and propose \\textbf{RLSD} (\\textbf{RL}VR with \\textbf{S}elf-\\textbf{D}istillation). Specifically, we leverage self-distillation to obtain token-level policy differences for determining fine-grained update magnitudes, while continuing to use RLVR to derive reliable update directions from environmental feedback (e.g., response correctness). This enables RLSD to simultaneously harness the strengths of both RLVR and OPSD, achieving a higher convergence ceiling and superior training stability.", "link": "http://arxiv.org/abs/2604.03128v1", "date": "2026-04-03", "relevancy": 1.8989, "topK": [{"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.491}, {"title": "Self-supervised Photographic Image Layout Representation Learning", "link": "http://arxiv.org/abs/2403.03740v1", "similarity": 0.4656}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference fo %20enables%20RLSD%20to%20simultaneously%20harness%20the%20strengths%20of%20both%20RLVR%20and%20OPSD%2C%20achieving%20a%20higher%20convergence%20ceiling%20and%20superior%20training%20stability.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03128v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DSelf-Distilled%2520RLVR%26entry.906535625%3DChenxu%2520Yang%2520and%2520Chuanyu%2520Qin%2520and%2520Qingyi%2520Si%2520and%2520Minghui%2520Chen%2520and%2520Naibin%2520Gu%2520and%2520Dingyu%2520Yao%2520and%2520Zheng%2520Lin%2520and%2520Weiping%2520Wang%2520and%2520Jiaqi%2520Wang%2520and%2520Nan%2520Duan%26entry.1292438233%3DOn-policy%2520distillation%2520%2528OPD%2529%2520has%2520become%2520a%2520popular%2520training%2520paradigm%2520in%2520the%2520LLM%2520community.%2520This%2520paradigm%2520selects%2520a%2520larger%2520model%2520as%2520the%2520teacher%2520to%2520provide%2520dense%252C%2520fine-grained%2520signals%2520for%2520each%2520sampled%2520trajectory%252C%2520in%2520contrast%2520to%2520reinforcement%2520learning%2520with%2520verifiable%2520rewards%2520%2528RLVR%2529%252C%2520which%2520only%2520obtains%2520sparse%2520signals%2520from%2520verifiable%2520outcomes%2520in%2520the%2520environment.%2520Recently%252C%2520the%2520community%2520has%2520explored%2520on-policy%2520self-distillation%2520%2528OPSD%2529%252C%2520where%2520the%2520same%2520model%2520serves%2520as%2520both%2520teacher%2520and%2520student%252C%2520with%2520the%2520teacher%2520receiving%2520additional%2520privileged%2520information%2520such%2520as%2520reference%2520answers%2520to%2520enable%2520self-evolution.%2520This%2520paper%2520demonstrates%2520that%2520learning%2520signals%2520solely%2520derived%2520from%2520the%2520privileged%2520teacher%2520result%2520in%2520severe%2520information%2520leakage%2520and%2520unstable%2520long-term%2520training.%2520Accordingly%252C%2520we%2520identify%2520the%2520optimal%2520niche%2520for% {"title": "Reliability Gated Multi-Teacher Distillation for Low Resource Abstractive Summarization", "author": "Dipto Sumit and Ankan Kumar Roy and Sadia Khair Rodela and Atia Haque Asha and Mourchona Afrin and Niloy Farhan and Farig Yousuf Sadeque", "abstract": "We study multiteacher knowledge distillation for low resource abstractive summarization from a reliability aware perspective. We introduce EWAD (Entropy Weighted Agreement Aware Distillation), a token level mechanism that routes supervision between teacher distillation and gold supervision based on inter teacher agreement, and CPDP (Capacity Proportional Divergence Preservation), a geometric constraint on the student position relative to heterogeneous teachers. Across two Bangla datasets, 13 BanglaT5 ablations, and eight Qwen2.5 experiments, we find that logit level KD provides the most reliable gains, while more complex distillation improves semantic similarity for short summaries but degrades longer outputs. Cross lingual pseudo label KD across ten languages retains 71-122 percent of teacher ROUGE L at 3.2x compression. A human validated multi judge LLM evaluation further reveals calibration bias in single judge pipelines. Overall, our results show that reliability aware distillation helps characterize when multi teacher supervision improves summarization and when data scaling outweighs loss engineering.", "link": "http://arxiv.org/abs/2604.03192v1", "date": "2026-04-03", "relevancy": 1.8794, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0.5135}, {"title": "ToDo: Token Downsampling for Efficient Generation of High-Resolution\n  Images", "link": "http://arxiv.org/abs/2402.13573v2", "similarity": 0.4624}, {"title": "TAMM: TriAdapter Multi-Modal Learning for 3D Shape Understanding", "link": "http://arxiv.org/abs/2402.18490v1", "similarity": 0.4598}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Reliability%20Gated%20Multi-Teacher%20Distillation%20for%20Low%20Resource%20Abstractive%20Summarization&body=Title%3A%20Reliability%20Gated%20Multi-Teacher%20Distillation%20for%20Low%20Resource%20Abstractive%20Summarization%0AAuthor%3A%20Dipto%20Sumit%20and%20Ankan%20Kumar%20Roy%20and%20Sadia%20Khair%20Rodela%20and%20Atia%20Haque%20Asha%20and%20Mourchona%20Afrin%20and%20Niloy%20Farhan%20and%20Farig%20Yousuf%20Sadeque%0AAbstract%3A%20We%20study%20multiteacher%20knowledge%20distillation%20for%20low%20resource%20abstractive%20summarization%20from%20a%20reliability%20aware%20perspective.%20We%20introduce%20EWAD%20%28Entropy%20Weighted%20Agreement%20Aware%20Distillation%29%2C%20a%20token%20level%20mechanism%20that%20routes%20supervision%20between%20teacher%20distillation%20and%20gold%20supervision%20based%20on%20inter%20teacher%20agreement%2C%20and%20CPDP%20%28Capacity%20Proportional%20Divergence%20Preservation%29%2C%20a%20geometric%20constraint%20on%20the%20student%20position%20relative%20to%20heterogeneous%20teachers.%20Across%20two%20Bangla%20datasets%2C%2013%20BanglaT5%20ablations%2C%20and%20eight%20Qwen2.5%20experiments%2C%20we%20find%20that%20logit%20level%20KD%20provides%20the%20most%20reliable%20gains%2C%20while%20more%20complex%20distillation%20improves%20semantic%20similarity%20for%20short%20summaries%20but%20degrades%20longer%20outputs.%20Cross%20lingual%20pseudo%20label%20KD%20across%20ten%20languages%20retains%2071-122%20percent%20of%20teacher%20ROUGE%20L%20at%203.2x%20compression.%20A%20human%20validated%20multi%20judge%20LLM%20evaluation%20further%20reveals%20calibration%20bias%20in%20single%20judge%20pipelines.%20Overall%2C%20our%20results%20show%20that%20reliability%20aware%20distillation%20helps%20characterize%20when%20multi%20teacher%20supervision%20improves%20summarization%20and%20when%20data%20scaling%20outweighs%20loss%20engineering.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03192v1%0AForm%3A%20https%3A//docs.google.com/f {"title": "Multi-View Video Diffusion Policy: A 3D Spatio-Temporal-Aware Video Action Model", "author": "Peiyan Li and Yixiang Chen and Yuan Xu and Jiabing Yang and Xiangnan Wu and Jun Guo and Nan Sun and Long Qian and Xinghang Li and Xin Xiao and Jing Liu and Nianfeng Liu and Tao Kong and Yan Huang and Liang Wang and Tieniu Tan", "abstract": "Robotic manipulation requires understanding both the 3D spatial structure of the environment and its temporal evolution, yet most existing policies overlook one or both. They typically rely on 2D visual observations and backbones pretrained on static image--text pairs, resulting in high data requirements and limited understanding of environment dynamics. To address this, we introduce MV-VDP, a multi-view video diffusion policy that jointly models the 3D spatio-temporal state of the environment. The core idea is to simultaneously predict multi-view heatmap videos and RGB videos, which 1) align the representation format of video pretraining with action finetuning, and 2) specify not only what actions the robot should take, but also how the environment is expected to evolve in response to those actions. Extensive experiments show that MV-VDP enables data-efficient, robust, generalizable, and interpretable manipulation. With only ten demonstration trajectories and without additional pretraining, MV-VDP successfully performs complex real-world tasks, demonstrates strong robustness across a range of model hyperparameters, generalizes to out-of-distribution settings, and predicts realistic future videos. Experiments on Meta-World and real-world robotic platforms demonstrate that MV-VDP consistently outperforms video-prediction--based, 3D-based, and vision--language--action models, establishing a new state of the art in data-efficient multi-task manipulation.", "link": "http://arxiv.org/abs/2604.03181v1", "date": "2026-04-03", "relevancy": 1.8652, "topK": [{"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.6238}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.6214}, {"title": "Customize-A-Video: One-Shot Motion Customization of Text-to-Video\n  Diffusion Models", "link": "http://arxiv.org/abs/2402.14780v1", "similarity": 0.6168}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Multi-View%20Video%20Diffusion%20Policy%3A%20A%203D%20Spatio-Temporal-Aware%20Video%20Action%20Model&body=Title%3A%20Multi-View%20Video%20Diffusion%20Policy%3A%20A%203D%20Spatio-Temporal-Aware%20Video%20Action%20Model%0AAuthor%3A%20Peiyan%20Li%20and%20Yixiang%20Chen%20and%20Yuan%20Xu%20and%20Jiabing%20Yang%20and%20Xiangnan%20Wu%20and%20Jun%20Guo%20and%20Nan%20Sun%20and%20Long%20Qian%20and%20Xinghang%20Li%20and%20Xin%20Xiao%20and%20Jing%20Liu%20and%20Nianfeng%20Liu%20and%20Tao%20Kong%20and%20Yan%20Huang%20and%20Liang%20Wang%20and%20Tieniu%20Tan%0AAbstract%3A%20Robotic%20manipulation%20requires%20understanding%20both%20the%203D%20spatial%20structure%20of%20the%20environment%20and%20its%20temporal%20evolution%2C%20yet%20most%20existing%20policies%20overlook%20one%20or%20both.%20They%20typically%20rely%20on%202D%20visual%20observations%20and%20backbones%20pretrained%20on%20static%20image--text%20pairs%2C%20resulting%20in%20high%20data%20requirements%20and%20limited%20understanding%20of%20environment%20dynamics.%20To%20address%20this%2C%20we%20introduce%20MV-VDP%2C%20a%20multi-view%20video%20diffusion%20policy%20that%20jointly%20models%20the%203D%20spatio-temporal%20state%20of%20the%20environment.%20The%20core%20idea%20is%20to%20simultaneously%20predict%20multi-view%20heatmap%20videos%20and%20RGB%20videos%2C%20which%201%29%20align%20the%20representation%20format%20of%20video%20pretraining%20with%20action%20finetuning%2C%20and%202%29%20specify%20not%20only%20what%20actions%20the%20robot%20should%20take%2C%20but%20also%20how%20the%20environment%20is%20expected%20to%20evolve%20in%20response%20to%20those%20actions.%20Extensive%20experiments%20show%20that%20MV-VDP%20enables%20data-efficient%2C%20robust%2C%20generalizable%2C%20and%20interpretable%20manipulation.%20With%20only%20ten%20demonstration%20trajectories%20and%20without%20additional%20pretraining%2C%20MV-VDP%20successfully%20performs%20complex%20real-world%20tasks%2C%20demonstrates%20strong%20robustness%20across%20a%20range%20of%20model%20hyperparameters%2C%20generalizes%20to%20out-of-distribution%20settings%2C%20and%20predicts%20realistic%20future%20videos.%20Experiments%20on%20Meta-World%20and%20real-world%20robotic%20platforms%20demonstrate%20that%20MV-VDP%20consistently%20outperforms%20video-prediction--based%2C%203D-based%2C%20and%20vision--language--action%20models%2C%20establishing%20a%20new%20state%20of%20the%20art%20in%20data-efficient%20multi-task%20manipulation.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03181v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DMulti-View%2520Video%2520Diffusion%2520Policy%253A%2520A%25203D%2520Spatio-Temporal-Aware%2520Video%2520Action%2520Model%26entry.906535625%3DPeiyan%2520Li%2520and%2520Yixiang%2520Chen%2520and%2520Yuan%2520Xu%2520and%2520Jiabing%2520Yang%2520and%2520Xiangnan%2520Wu%2520and%2520Jun%2520Guo%2520and%2520Nan%2520Sun%2520and%2520Long%2520Qian%2520and%2520Xinghang%2520Li%2520and%2520Xin%2520Xiao%2520and%2520Jing%2520Liu%2520and%2520Nianfeng%2520Liu%2520and%2520Tao%2520Kong%2520and%2520Yan%2520Huang%2520and%2520Liang%2520Wang%2520and%2520Tieniu%2520Tan%26entry.1292438233%3DRobotic%2520manipulation%2520requires%2520understanding%2520both%2520the%25203D%2520spatial%2520structure%2520of%2520the%2520environment%2520and%2520its%2520temporal%2520evolution%252C%2520yet%2520most%2520existing%2520policies%2520overlook%2520one%2520or%2520both.%2520They%2520typically%2520rely%2520on%25202D {"title": "How Annotation Trains Annotators: Competence Development in Social Influence Recognition", "author": "Maciej Markiewicz and Beata Bajcar and Wiktoria Mieleszczenko-Kowszewicz and Aleksander Szcz\u0119sny and Tomasz Adamczyk and Grzegorz Chodak and Karolina Ostrowska and Aleksandra Sawczuk and Jolanta Babiak and Jagoda Szklarczyk and Przemys\u0142aw Kazienko", "abstract": "Human data annotation, especially when involving experts, is often treated as an objective reference. However, many annotation tasks are inherently subjective, and annotators' judgments may evolve over time. This study investigates changes in the quality of annotators' work from a competence perspective during a process of social influence recognition. The study involved 25 annotators from five different groups, including both experts and non-experts, who annotated a dataset of 1,021 dialogues with 20 social influence techniques, along with intentions, reactions, and consequences. An initial subset of 150 texts was annotated twice - before and after the main annotation process - to enable comparison. To measure competence shifts, we combined qualitative and quantitative analyses of the annotated data, semi-structured interviews with annotators, self-assessment surveys, and Large Language Model training and evaluation on the comparison dataset. The results indicate a significant increase in annotators' self-perceived competence and confidence. Moreover, observed changes in data quality suggest that the annotation process may enhance annotator competence and that this effect is more pronounced in expert groups. The observed shifts in annotator competence have a visible impact on the performance of LLMs trained on their annotated data.", "link": "http://arxiv.org/abs/2604.02951v1", "date": "2026-04-03", "relevancy": 1.8612, "topK": [{"title": "MEDL-U: Uncertainty-aware 3D Automatic Annotation based on Evidential\n  Deep Learning", "link": "http://arxiv.org/abs/2309.09599v3", "similarity": 0 able%20comparison.%20To%20measure%20competence%20shifts%2C%20we%20combined%20qualitative%20and%20quantitative%20analyses%20of%20the%20annotated%20data%2C%20semi-structured%20interviews%20with%20annotators%2C%20self-assessment%20surveys%2C%20and%20Large%20Language%20Model%20training%20and%20evaluation%20on%20the%20comparison%20dataset.%20The%20results%20indicate%20a%20significant%20increase%20in%20annotators%27%20self-perceived%20competence%20and%20confidence.%20Moreover%2C%20observed%20changes%20in%20data%20quality%20suggest%20that%20the%20annotation%20process%20may%20enhance%20annotator%20competence%20and%20that%20this%20effect%20is%20more%20pronounced%20in%20expert%20groups.%20The%20observed%20shifts%20in%20annotator%20competence%20have%20a%20visible%20impact%20on%20the%20performance%20of%20LLMs%20trained%20on%20their%20annotated%20data.%0ALink%3A%20http%3A//arxiv.org/abs/2604.02951v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHow%2520Annotation%2520Trains%2520Annotators%253A%2520Competence%2520Development%2520in%2520Social%2520Influence%2520Recognition%26entry.906535625%3DMaciej%2520Markiewicz%2520and%2520Beata%2520Bajcar%2520and%2520Wiktoria%2520Mieleszczenko-Kowszewicz%2520and%2520Aleksander%2520Szcz%25C4%2599sny%2520and%2520Tomasz%2520Adamczyk%2520and%2520Grzegorz%2520Chodak%2520and%2520Karolina%2520Ostrowska%2520and%2520Aleksandra%2520Sawczuk%2520and%2520Jolanta%2520Babiak%2520and%2520Jagoda%2520Szklarczyk%2520and%2520Przemys%25C5%2582aw%2520Kazienko%26entry.1292438233%3DHuman%2520data%2520annotation%252C%2520especially%2520when%2520involving%2520experts%252C%2520is%2520often%2520treated%2520as%2520an%2520objective%2520reference.%2520However%252C%2520many%2520annotation%2520tasks%2520are%2520inherently%2520subjective%252C%2520and%2520annotators%2527%2520judgments%2520may%2520evolve%2520over%2520time.%2520This%2520study%2520investigates%2520changes%2520in%2520the%2520qu {"title": "Early Classification of Time Series in Non-Stationary Cost Regimes", "author": "Aur\u00e9lien Renault and Alexis Bondu and Antoine Cornu\u00e9jols and Vincent Lemaire", "abstract": "Early Classification of Time Series (ECTS) addresses decision-making problems in which predictions must be made as early as possible while maintaining high accuracy. Most existing ECTS methods assume that the time-dependent decision costs governing the learning objective are known, fixed, and correctly specified. In practice, however, these costs are often uncertain and may change over time, leading to mismatches between training-time and deployment-time objectives. In this paper, we study ECTS under two practically relevant forms of cost non-stationarity: drift in the balance between misclassification and decision delay costs, and stochastic realizations of decision costs that deviate from the nominal training-time model. To address these challenges, we revisit representative ECTS approaches and adapt them to an online learning setting. Focusing on separable methods, we update only the triggering model during deployment, while keeping the classifier fixed. We propose several online adaptations and baselines, including bandit-based and RL-based approaches, and conduct controlled experiments on synthetic data to systematically evaluate robustness under cost non-stationarity. Our results demonstrate that online learning can effectively improve the robustness of ECTS methods to cost drift, with RL-based strategies exhibiting strong and stable performance across varying cost regimes.", "link": "http://arxiv.org/abs/2602.00918v2", "date": "2026-04-03", "relevancy": 1.8578, "topK": [{"title": "Boosted dynamic neural networks", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/26302", "similarity": 0.4811}, {"title": "Weakly-guided self-supervised pretraining for temporal activity detection", "link": "https://ojs.aaai.org/index.php/AAAI/article/view/25189", "similarity": 0.4533}, {"title": "You've Got to Feel It To Believe It: Multi-Modal Bayesian Inference for\n  Semantic and Property Prediction", "link": "http://arxiv.org/abs/2402.05872v3", "similarity": 0.4506}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Early%20Classification%20of%20Time%20Series%20in%20Non-Stationary%20Cost%20Regimes&body=Title%3A%20Early%20Classification%20of%20Time%20Series%20in%20Non-Stationary%20Cost%20Regimes%0AAuthor%3A%20Aur%C3%A9lien%20Renault%20and%20Alexis%20Bondu%20and%20Antoine%20Cornu%C3%A9jols%20and%20Vincent%20Lemaire%0AAbstract%3A%20Early%20Classification%20of%20Time%20Series%20%28ECTS%29%20addresses%20decision-making%20problems%20in%20which%20predictions%20must%20be%20made%20as%20early%20as%20possible%20while%20maintaining%20high%20accuracy.%20Most%20existing%20ECTS%20methods%20assume%20that%20the%20time-dependent%20decision%20costs%20governing%20the%20learning%20objective%20are%20known%2C%20fixed%2C%20and%20correctly%20specified.%20In%20practice%2C%20however%2C%20these%20costs%20are%20often%20uncertain%20and%20may%20change%20over%20time%2C%20leading%20to%20mismatches%20between%20training-time%20and%20deployment-time%20objectives.%20In%20this%20paper%2C%20we%20study%20ECTS%20under%20two%20practically%20relevant%20forms%20of%20cost%20non-stationarity%3A%20drift%20in%20the%20balance%20between%20misclassification%20and%20decision%20delay%20costs%2C%20and%20stochastic%20realizations%20of%20decision%20costs%20that%20deviate%20from%20the%20nominal%20training-time%20model.%20To%20address%20these%20challenges%2C%20we%20revisit%20representative%20ECTS%20approaches%20and%20adapt%20them%20to%20an%20online%20learning%20setting.%20Focusing%20on%20separable%20methods%2C%20we%20update%20only%20the%20triggering%20model%20during%20deployment%2C%20while%20keeping%20the%20classifier%20fixed.%20We%20propose%20several%20online%20adaptations%20and%20baselines%2C%20including%20bandit-based%20and%20RL-based%20approaches%2C%20and%20conduct%20controlled%20experiments%20on%20synthetic%20data%20to%20systematically%20evaluate%20robustness%20under%20cost%20non-stationarity.%20Our%20results%20demonstrate%20that%20online%20learning%20can%20effectively%20improve%20the%20robustness%20of%20ECTS%20methods%20to%20cost%20drift%2C%20with%20RL-based%20strategies%20exhibiting%20strong%20and%20stable%20performance%20across%20varying%20cost%20regimes.%0ALink%3A%20http%3A//arxiv.org/abs/2602.00918v2%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DEarly%2520Classification%2520of%2520Time%2520Series%2520in%2520Non-Stationary%2520Cost%2520Regimes%26entry.906535625%3DAur%25C3%25A9lien%2520Renault%2520and%2520Alexis%2520Bondu%2520and%2520Antoine%2520Cornu%25C3%25A9jols%2520and%2520Vincent%2520Lemaire%26entry.1292438233%3DEarly%2520Classification%2520of%2520Time%2520Series%2520%2528ECTS%2529%2520addresses%2520decision-making%2520problems%2520in%2520which%2520predictions%2520must%2520be%2520made%2520as%2520early%2520as%2520possible%2520while%2520maintaining%2520high%2520accuracy.%2520Most%2520existing%2520ECTS%2520methods%2520assume%2520that%2520the%2520time-dependent%2520decision%2520costs%2520governing%2520the%2520learning%2520objective%2520are%2520known%252C%2520fixed%252C%2520and%2520correctly%2520specified.%2520In%2520practice%252C%2520however%252C%2520these%2520costs%2520are%2520often%2520uncertain%2520and%2520may%2520change%2520over%2520time%252C%2520leading%2520to%2520mismatches%2520between%2520training-time%2520and%2520deployment-time%2520objectives.%2520In%2520this%2520paper%252C%2520we%2520study%2520ECTS%2520under%2520two%2520practically%2520relevant%2520forms%2520of%2520cost%2520non-stationarity%253A%2520drift%2520in%2520the%2520balance%2520between%2520misclassification%2520and%2520decision%2520delay%2520costs%252C%2520and%2520stochastic%2520realizations%2520of%2520decision%2520costs%2520that%2520deviate%2520from%2520the%2520nominal%252 {"title": "Automatic Textbook Formalization", "author": "Fabian Gloeckle and Ahmad Rammal and Charles Arnal and Remi Munos and Vivien Cabannes and Gabriel Synnaeve and Amaury Hayat", "abstract": "We present a case study where an automatic AI system formalizes a textbook with more than 500 pages of graduate-level algebraic combinatorics to Lean. The resulting formalization represents a new milestone in textbook formalization scale and proficiency, moving from early results in undergraduate topology and restructuring of existing library content to a full standalone formalization of a graduate textbook. The formalization comprises 130K lines of code and 5900 Lean declarations and was conducted within one week by a total of 30K Claude 4.5 Opus agents collaborating in parallel on a shared code base via version control, simultaneously setting a record in multi-agent software engineering with usable results. The inference cost matches or undercuts what we estimate as the salaries required for a team of human experts, and we expect there is still the potential for large efficiencies to be made without the need for better models. We make our code, the resulting Lean code base and a side-by-side blueprint website available open-source.", "link": "http://arxiv.org/abs/2604.03071v1", "date": "2026-04-03", "relevancy": 1.8513, "topK": [{"title": "DressCode: Autoregressively Sewing and Generating Garments from Text\n  Guidance", "link": "http://arxiv.org/abs/2401.16465v3", "similarity": 0.4925}, {"title": "RoboEXP: Action-Conditioned Scene Graph via Interactive Exploration for\n  Robotic Manipulation", "link": "http://arxiv.org/abs/2402.15487v1", "similarity": 0.4566}, {"title": "Safe and efficient training of a control agent", "link": "https://patents.google.com/patent/US11709462B2/en", "similarity": 0.4356}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20Automatic%20Textbook%20Formalization&body=Title%3A%20Automatic%20Textbook%20Formalization%0AAuthor%3A%2 {"title": "HyperFitS -- Hypernetwork Fitting Spectra for metabolic quantification of ${}^1$H MR spectroscopic imaging", "author": "Paul J. Weiser and Gulnur Ungan and Amirmohammad Shamaei and Georg Langs and Wolfgang Bogner and Malte Hoffmann and Antoine Klauser and Ovidiu C. Andronesi", "abstract": "Purpose: Proton magnetic resonance spectroscopic imaging ($^1$H MRSI) enables the mapping of whole-brain metabolites concentrations in-vivo. However, a long-standing problem for its clinical applicability is the metabolic quantification, which can require extensive time for spectral fitting. Recently, deep learning methods have been able to provide whole-brain metabolic quantification in only a few seconds. However, neural network implementations often lack configurability and require retraining to change predefined parameter settings. Methods: We introduce HyperFitS, a hypernetwork for spectral fitting for metabolite quantification in whole-brain $^1$H MRSI that flexibly adapts to a broad range of baseline corrections and water suppression factors. Metabolite maps of human subjects acquired at 3T and 7T with isotropic resolutions of 10 mm, 3.4 mm and 2 mm by water-suppressed and water-unsuppressed MRSI were quantified with HyperFitS and compared to conventional LCModel fitting. Results: Metabolic maps show a substantial agreement between the new and gold-standard methods, with significantly faster fitting times by HyperFitS. Quantitative results further highlight the impact of baseline parametrization on metabolic quantification, which can alter results by up to 30%. Conclusion: HyperFitS shows strong agreement with state-of-the-art conventional methods, while reducing processing times from hours to a few seconds. Compared to prior deep learning based spectral fitting methods, HyperFitS enables a wide range of configurability and can adapt to data quality acquired with multiple protocols and field strengths without retraining.", "link": "http://arxiv.org/abs/2604.03150v1", "date": "2026-04-03", "relevancy": 1.8485, "topK": [{"title": "GST: Precise 3D Human Body from a Single Image with Gaussian Splatting\n  Transformers", "link": "http://arxiv.org/abs/2409.04196v1", "similarity": 0.489}, {"title": "SDXS: Real-Time One-Step Latent Diffusion Models with Image Conditions", "link": "http://arxiv.org/abs/2403.16627v1", "similarity": 0.4505}, {"title": "Synthesizing Moving People with 3D Control", "link": "http://arxiv.org/abs/2401.10889v2", "similarity": 0.4399}], "mailto": "mailto:haoxiang.li.2024@gmail.com?subject=%5BarXrec%5D%20HyperFitS%20--%20Hypernetwork%20Fitting%20Spectra%20for%20metabolic%20quantification%20of%20%24%7B%7D%5E1%24H%20MR%20spectroscopic%20imaging&body=Title%3A%20HyperFitS%20--%20Hypernetwork%20Fitting%20Spectra%20for%20metabolic%20quantification%20of%20%24%7B%7D%5E1%24H%20MR%20spectroscopic%20imaging%0AAuthor%3A%20Paul%20J.%20Weiser%20and%20Gulnur%20Ungan%20and%20Amirmohammad%20Shamaei%20and%20Georg%20Langs%20and%20Wolfgang%20Bogner%20and%20Malte%20Hoffmann%20and%20Antoine%20Klauser%20and%20Ovidiu%20C.%20Andronesi%0AAbstract%3A%20Purpose%3A%20Proton%20magnetic%20resonance%20spectroscopic%20imaging%20%28%24%5E1%24H%20MRSI%29%20enables%20the%20mapping%20of%20whole-brain%20metabolites%20concentrations%20in-vivo.%20However%2C%20a%20long-standing%20problem%20for%20its%20clinical%20applicability%20is%20the%20metabolic%20quantification%2C%20which%20can%20require%20extensive%20time%20for%20spectral%20fitting.%20Recently%2C%20deep%20learning%20methods%20have%20been%20able%20to%20provide%20whole-brain%20metabolic%20quantification%20in%20only%20a%20few%20seconds.%20However%2C%20neural%20network%20implementations%20often%20lack%20configurability%20and%20require%20retraining%20to%20change%20predefined%20parameter%20settings.%20Methods%3A%20We%20introduce%20HyperFitS%2C%20a%20hypernetwork%20for%20spectral%20fitting%20for%20metabolite%20quantification%20in%20whole-brain%20%24%5E1%24H%20MRSI%20that%20flexibly%20adapts%20to%20a%20broad%20range%20of%20baseline%20corrections%20and%20water%20suppression%20factors.%20Metabolite%20maps%20of%20human%20subjects%20acquired%20at%203T%20and%207T%20with%20isotropic%20resolutions%20of%2010%20mm%2C%203.4%20mm%20and%202%20mm%20by%20water-suppressed%20and%20water-unsuppressed%20MRSI%20were%20quantified%20with%20HyperFitS%20and%20compared%20to%20conventional%20LCModel%20fitting.%20Results%3A%20Metabolic%20maps%20show%20a%20substantial%20agreement%20between%20the%20new%20and%20gold-standard%20methods%2C%20with%20significantly%20faster%20fitting%20times%20by%20HyperFitS.%20Quantitative%20results%20further%20highlight%20the%20impact%20of%20baseline%20parametrization%20on%20metabolic%20quantification%2C%20which%20can%20alter%20results%20by%20up%20to%2030%25.%20Conclusion%3A%20HyperFitS%20shows%20strong%20agreement%20with%20state-of-the-art%20conventional%20methods%2C%20while%20reducing%20processing%20times%20from%20hours%20to%20a%20few%20seconds.%20Compared%20to%20prior%20deep%20learning%20based%20spectral%20fitting%20methods%2C%20HyperFitS%20enables%20a%20wide%20range%20of%20configurability%20and%20can%20adapt%20to%20data%20quality%20acquired%20with%20multiple%20protocols%20and%20field%20strengths%20without%20retraining.%0ALink%3A%20http%3A//arxiv.org/abs/2604.03150v1%0AForm%3A%20https%3A//docs.google.com/forms/d/e/1FAIpQLSfSfFqShId9ssA7GWYmvv7m_7qsIao4K__1rDj9BurNNxUPYQ/viewform%3Fentry.1380929848%3DHyperFitS%2520--%2520Hypernetwork%2520Fitting%2520Spectra%2520for%2520metabolic%2520quantification%2520of%2520%2524%257B%257D%255E1%2524H%2520MR%2520spectroscopic%2520imaging%26entry.906535625%3DPaul%2520J.%2520Weiser%2520and%2520Gulnur%2520Ungan%2520and%2520Amirmohammad%2520Shamaei%2520and%2520Georg%2520Langs%2520and%2520Wolfgang%2520Bogner%2520and%2520Malte%2520Hoffmann%2520and%2520Antoine%2520Klauser%2520and%2520Ovidiu%2520C.%2520Andronesi%26entry.1292438233%3DPurpose%253A%2520Proton%2520magnetic%2520resonance%2520spectroscopic%2520imaging%2520%2528%2524%255E
